# EPISODE MAP — Эпизод {NNN}
# Пересадка квизов и теории в сюжет
# Источник: episodes/day_{NN}.yaml (ep.{N}) + briefs/brief_{ID}.yaml
# Статус: {DRAFT/APPROVED}

episode: {NNN}
day: {NN}
blocks: ["{block_ids}"]
title: "Название эпизода"
terms_introduced: ["термин1"]
terms_available: ["все доступные на этот момент"]

# =====================================================================
# ТЕОРИЯ — как Софа вводит термин через сцену
# =====================================================================
theory_delivery:

  term: "название термина"
  scene_trigger: >
    Какой момент из драмы запускает разговор Софы.
    Конкретная фраза или действие персонажа.
  sofa_introduction: >
    Как Софа подсвечивает понятие. Что говорит Марко/зрителю.
    Через ситуацию, не лекцию.
  generic_story_kept: >
    Если generic-история из урока оставлена как аналогия —
    указать какая и зачем. Или "нет — вся теория через сюжет."
  rule: >
    Правило Софы (1-2 предложения, как пословица).
    Формулируется ПОСЛЕ квизов.
  life_question: >
    Один бытовой пример «из жизни» для закрепления.

# =====================================================================
# КВИЗЫ СОФА-БЛОКА (~40%)
# =====================================================================
sofa_quizzes:

  - id: "sq1"
    type: generic          # generic | story | plot | added
    original_ref: "sc4.32" # ссылка на шаг из YAML урока
    original_text: "Оригинальная формулировка из урока"
    mapped_text: "Формулировка в мире Марко (или та же, если generic)"
    options: ["факт", "мнение"]      # варианты ответа
    answer: "факт"
    explanation: "Почему это правильный ответ (по определению из урока)"
    rationale: "Почему оставлен generic / почему пересажен в сюжет"

  - id: "sq2"
    type: story
    original_ref: "sc6.48"
    original_text: "«Фильм смешной» — факт или мнение?"
    mapped_text: "«Софа глючная» — факт или мнение?"
    options: ["факт", "мнение"]
    answer: "мнение"
    explanation: "Нет «глючномера». У каждого своё ощущение"
    rationale: "Привязка к текущей сцене — Марко только что включил Софу"

# =====================================================================
# КВИЗЫ ИСПЫТАНИЯ (~60%)
# =====================================================================
challenge_quizzes:

  - id: "cq1"
    type: story
    original_ref: "sc6.50"
    original_text: "«Собаки лучше кошек» — факт или мнение?"
    mapped_text: "Мама говорит: «У тебя нет сестры.» Факт или мнение?"
    options: ["факт", "мнение"]
    answer: "факт"
    explanation: "Можно проверить — посмотреть документы, фото, спросить других"
    rationale: "Центральный конфликт эпизода. Мама утверждает — Марко сомневается"
    spoiler_check: "нет — основная завязка, не спойлер"

  - id: "cq2"
    type: plot
    original_ref: null       # нет оригинала — добавлен
    original_text: null
    mapped_text: "Вера говорит: «Ты переутомился.» Факт или мнение?"
    options: ["факт", "мнение"]
    answer: "мнение"
    explanation: "Нет «переутомлемера». Вера не проверяла — это её оценка"
    rationale: "Вера подаёт мнение как факт — ключевой приём манипуляции"
    spoiler_check: "нет — Вера пока выглядит доброй, ребёнок не знает о её роли"

# =====================================================================
# EXTRA-КВИЗЫ (допрактика после эпизода)
# =====================================================================
extra_quizzes:
  count: 0
  quizzes: []

# =====================================================================
# ЗАМЕНА ПЕРСОНАЖЕЙ (для этого эпизода)
# =====================================================================
character_map:
  - from: "Микола"
    to: "Марко"
    rationale: "протагонист"
  - from: "Маша"
    to: "безымянная одноклассница"
    rationale: "проходная роль, не тратим главных персонажей"

# =====================================================================
# ПРОВЕРКИ
# =====================================================================
validation:
  term_order: PASS    # или FAIL + описание
  content_correctness: PASS
  spoiler_check: PASS
