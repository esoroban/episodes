# EPISODE PLAN — День {NN}
# Сгенерирован из grid.yaml + briefs + source
# Уроки дня: {lessons}
# Акт: {story_arc}

day: {NN}
lessons: ["{lesson_A}", "{lesson_B}"]
story_arc: "{story_arc}"
source_episodes: [{source_eps}]

episodes:

  - ep: {ep_number}
    blocks: ["{block_ids}"]
    title: "Название эпизода"
    terms_introduced: ["термин1", "термин2"]
    terms_used: ["термин_из_прошлого"]  # из предыдущих эпизодов/дней
    total_quizzes: 12  # софа-блок + испытание

    drama:
      duration: "3–4 мин"
      location: "Где происходит"
      characters: ["Марко", "Софа"]
      summary: >
        2-3 предложения. Что происходит в сюжете.
        Какой конфликт или напряжение. Как урок возникает естественно.
      gut_feeling: >
        Что Марко чувствует телом ДО того, как Софа назовёт приём.
        Физическое ощущение: тяжесть, холод, сжатие.
      marko_flaw: >
        Как изъян Марко (соглашатель) проявляется в этой сцене.
        С кем он соглашается, почему, к чему это ведёт.

    sofa_block:
      duration: "4–5 мин"
      term_introduced: "термин"
      trigger: >
        Через какой момент из драмы Софа подсвечивает понятие.
        Ситуация → название.
      quizzes:
        count: 5
        source: "brief"  # brief = из брифа, added = дополнительные сюжетные
        description: >
          Какие вопросы, на что направлены.
          Формат: vote / discussion / vote_multichoice.
      rule: >
        Правило Софы: 1-2 предложения, как пословица.
        Формулируется ПОСЛЕ квизов — вывод из прожитого опыта.
      life_question: >
        Один бытовой пример «из жизни» для закрепления.

    challenge:
      duration: "5–6 мин"
      summary: >
        Драматический вызов, где термин проверяется в действии.
        Что делает Марко, кто противостоит, что на кону.
      quizzes:
        count: 7
        source: "brief"
        description: >
          Квизы в контексте сюжета. Как именно Марко применяет
          (или не применяет) изученное.
      vera_role: ""     # Если Вера участвует — что делает (манипуляция)
      rey_role: ""      # Если Рей участвует — что делает (демагогия)
      voice_role: ""    # Если Голос участвует — что делает

    cliffhanger:
      duration: "1–2 мин"
      summary: >
        Твист. Must-watch-next. Одно предложение.
      sofa_reaction: >
        Реакция Софы на клиффхэнгер (мигает, молчит, разблокирует файл...)
      next_episode_hook: >
        Что зритель хочет узнать в следующем эпизоде.

    quiz_distribution:
      from_brief: 10       # квизов из practice_summary брифа
      added_story: 2       # дополнительных сюжетных (если votes < 10)
      moved_to_extra: 0    # перенесённых в допрактику (если votes > 15)
      total: 12
