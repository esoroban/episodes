source_lesson_id: lesson_7A
language: en
title: Contradictions and Justification
day: 7
slot: A
scenes:
- scene_id: sc1
  title: Discovery
  steps:
  - step_id: sc1_1
    source_step_id: '1'
    scene_id: sc1
    step_type: theory
    prompt: Guys, I have a story for you. Real, from life. Listen carefully - because there is a trap hidden in it, and I
      want to see who will notice it.
  - step_id: sc1_2
    source_step_id: '2'
    scene_id: sc1
    step_type: theory
    prompt: 'Petya tells his mother: “I didn’t eat candy. Not a single one at all!” Mom looks at Petya. And Petya has chocolate
      on his cheek. And the candy wrapper is sticking out in my pocket. And the cat licks his lips suspiciously - but that’s
      okay, the cat has nothing to do with it.'
  - step_id: sc1_3
    source_step_id: '3'
    scene_id: sc1
    step_type: instruction
    prompt: What's wrong here?
  - step_id: sc1_4
    source_step_id: '4'
    scene_id: sc1
    step_type: theory
    prompt: 'Petya said: “I didn’t eat candy” - but the chocolate on his cheek says just the opposite. One of two things:
      either he ate or he didn’t eat. Both statements cannot be true at the same time. This is a contradiction.'
  - step_id: sc1_5
    source_step_id: '5'
    scene_id: sc1
    step_type: theory
    prompt: 'And guess what? Thousands of years ago, a very smart Greek named Aristotle noticed the same thing. He said: the
      same thing cannot be and not be at the same time. You can''t eat candy and not eat candy at the same time. This is called
      the law of non-contradiction - one of the main rules of thinking.'
  - step_id: sc1_6
    source_step_id: '6'
    scene_id: sc1
    step_type: theory
    prompt: Sounds complicated? In fact, you use this law every day! When a friend says, “I didn’t take your pencil,” and
      the pencil is sticking out of his pencil case, you immediately feel that something doesn’t add up.
  - step_id: sc1_7
    source_step_id: '7'
    scene_id: sc1
    step_type: theory
    prompt: Today we will learn to notice such contradictions, politely point them out - and also ask “Why do you think that?”
      when someone claims something without explanation.
- scene_id: sc2
  title: HISTORY - WITNESS RULES
  steps:
  - step_id: sc2_8
    source_step_id: '8'
    scene_id: sc2
    step_type: theory
    prompt: Now listen to an interesting story about rules that do not work for everyone. Listen carefully!
  - step_id: sc2_9
    source_step_id: '9'
    scene_id: sc2
    step_type: theory
    prompt: 'The guys played a board game. Vitya was the judge and announced the rule: “Each player must go around the square
      in a circle. Whoever cuts it doesn’t count!”'
  - step_id: sc2_10
    source_step_id: '10'
    scene_id: sc2
    step_type: theory
    prompt: Everyone obeyed. They walked around and wasted time. And when Vitya himself reached the finish line, he took it
      and cut it! Straight through the cell. "I'm first!" - he shouted.
  - step_id: sc2_11
    source_step_id: '11'
    scene_id: sc2
    step_type: theory
    prompt: 'The friends looked at each other: “Stop! You made up the rule yourself - and you broke it yourself!” Vitya blushed
      and admitted: he came up with the rule to win himself.'
  - step_id: sc2_12
    source_step_id: '12'
    scene_id: sc2
    step_type: open_question
    prompt: What happened in history? What did Vitya do?
  - step_id: sc2_13
    source_step_id: '13'
    scene_id: sc2
    step_type: single_choice
    prompt: Did Vitya contradict himself?
    options:
    - id: opt_1
      text: Yes, contradiction
    - id: opt_2
      text: No, it's logical
    options_count: 2
    correct_answer: opt_1
    explanation: Exactly! Vitya said one thing, but did the opposite. A classic contradiction - remember our Petya with sweets?
      Same story, only without the chocolate on the cheek.
    explanation_status: present
  - step_id: sc2_15
    source_step_id: '15'
    scene_id: sc2
    step_type: open_question
    prompt: How did your friends notice this? What helped them?
  - step_id: sc2_16
    source_step_id: '16'
    scene_id: sc2
    step_type: theory
    prompt: 'They remembered what Vitya said earlier! Here is the first tool: to notice a contradiction, you need to record
      what the person said. Remember or even write down.'
- scene_id: sc3
  title: Concept of contradiction
  steps:
  - step_id: sc3_17
    source_step_id: '17'
    scene_id: sc3
    step_type: theory
    prompt: Guys, remember when I talked about Aristotle? A Greek who lived more than two thousand years ago and taught Alexander
      the Great himself - that same great commander!
  - step_id: sc3_18
    source_step_id: '18'
    scene_id: sc3
    step_type: theory
    prompt: Aristotle loved to understand how people think—and why they sometimes think incorrectly. And he wrote down three
      laws of logic - like three rules of the road, only for thinking. If you violate it, you will get into an accident. Mental.
  - step_id: sc3_19
    source_step_id: '19'
    scene_id: sc3
    step_type: theory
    prompt: 'We already know the first law - the law of identity. Scientifically: each concept must remain itself. But in
      simple terms, “chair” means “chair”, not “stool” or “chair”. If in the middle of a conversation a word suddenly changes
      its meaning, the logic breaks down. We''ve been through this!'
  - step_id: sc3_20
    source_step_id: '20'
    scene_id: sc3
    step_type: theory
    prompt: 'Today - Aristotle''s second law: the law of non-contradiction. Scientifically: the same statement cannot be both
      true and false. To put it simply: you cannot say “yes” and “no” about the same thing, at the same time, in the same
      sense.'
  - step_id: sc3_21
    source_step_id: '21'
    scene_id: sc3
    step_type: theory
    prompt: Sounds simple? Let's check it now. I will tell short stories, and you try to catch the moment where logic breaks
      down.
  - step_id: sc3_22
    source_step_id: '22'
    scene_id: sc3
    step_type: theory
    prompt: 'Story one. The boy says: “I’m not angry at all.” They ask him: “Why are you screaming?” And he replies: “Because
      I’m mad!” Stop - “I’m not angry” and “furious” are exactly opposite things. Doesn''t work at the same time!'
  - step_id: sc3_23
    source_step_id: '23'
    scene_id: sc3
    step_type: reflection
    prompt: 'The second story. The girl says: “I don’t care what you think about me.” And then he gets upset because of someone’s
      words. “Why are you upset?” - “Because they shouldn’t talk like that!” If it doesn’t matter, why care? Logic is bursting
      at the seams.'
    teacher_guidance: “Why are you upset?” - “Because they shouldn’t talk like that!” If it doesn’t matter, why care?
  - step_id: sc3_24
    source_step_id: '24'
    scene_id: sc3
    step_type: theory
    prompt: 'Story three. “I never interrupt!” - says the man, interrupting. And then: “Let me finish! I don’t actually interrupt!”
      The statement breaks right at the moment of utterance. It''s like someone writing "I can''t write" on a sign.'
  - step_id: sc3_25
    source_step_id: '25'
    scene_id: sc3
    step_type: theory
    prompt: Fourth. “Grades don’t matter at all.” - “Then why are you worried about a bad grade?” - “Because a good grade
      is important to me!” Not important and important - at the same time? Aristotle would have shook his head.
  - step_id: sc3_26
    source_step_id: '26'
    scene_id: sc3
    step_type: theory
    prompt: Fifth. "I don't need anyone's help." - “Then why are you asking me to solve the problem for you?” - “Well, this
      is different.” No, this is not different - this is a contradiction! If you don’t need help, then you can’t ask for it.
  - step_id: sc3_27
    source_step_id: '27'
    scene_id: sc3
    step_type: theory
    prompt: Sixth. “I always tell only the truth.” - “You said yesterday that you did your homework, but you didn’t.” - “Well
      then I lied.” “Always tell the truth” and “lied” - these two statements cannot fit into one head at the same time.
  - step_id: sc3_28
    source_step_id: '28'
    scene_id: sc3
    step_type: theory
    prompt: 'Seventh. "I''m not afraid of the dark!" - “Then will you go to the basement alone?” - “No, I’m afraid to go there.”
      Is there fear and not at the same time? Aristotle would say: choose one!'
  - step_id: sc3_29
    source_step_id: '29'
    scene_id: sc3
    step_type: theory
    prompt: Eighth. "I don't like rules." - “Then why are you angry that others don’t respect the queue?” - “Because the rules
      must be followed!” If you don’t like rules, but you demand that they be followed, it’s like saying “I don’t like ice
      cream, give me two!”
  - step_id: sc3_30
    source_step_id: '30'
    scene_id: sc3
    step_type: theory
    prompt: Ninth. "I don't judge anyone." - “You just said they were stupid.” - “Well, because they are stupid!” So much
      for “I do not condemn”—condemnation right at the moment of denial of condemnation.
  - step_id: sc3_31
    source_step_id: '31'
    scene_id: sc3
    step_type: theory
    prompt: And the tenth. "I don't care if we win or lose." They lose. "It's horrible! How could you play like that?!” If
      it doesn’t matter, where does the storm of emotions come from? Contradiction!
  - step_id: sc3_32
    source_step_id: '32'
    scene_id: sc3
    step_type: theory
    prompt: Notice a pattern? In all stories, the person does not lie on purpose. He really thinks both ways - he just doesn’t
      notice that his thoughts contradict each other. This is why the law of non-contradiction is needed - it helps to capture
      this moment.
  - step_id: sc3_33
    source_step_id: '33'
    scene_id: sc3
    step_type: theory
    prompt: 'By the way, the famous paradox: can an omnipotent being create a stone that it itself cannot lift? If it can
      create, it means it cannot raise, and is no longer omnipotent. If he cannot create, he is also not omnipotent. This
      riddle baffles adults - and now you understand: this is a trap of the law of non-contradiction.'
  - step_id: sc3_34
    source_step_id: '34'
    scene_id: sc3
    step_type: theory
    prompt: 'And another important thing: the law only works when they talk about the same thing, at the same time. “Yesterday
      it was cold, today it’s warm” is not a contradiction, the weather has changed. “For Masha the test is easy, for Kolya
      it’s difficult” is also not a contradiction, different people. Let''s clarify - and the logic is in order.'
- scene_id: sc4
  title: 'Practice: finding contradictions'
  steps:
  - step_id: sc4_35
    source_step_id: '35'
    scene_id: sc4
    step_type: theory
    prompt: Now let's check how your contradiction detector works! I will tell stories, and you vote whether there is a contradiction
      or not. Be careful - some stories are tricky!
  - step_id: sc4_36
    source_step_id: '36'
    scene_id: sc4
    step_type: single_choice
    prompt: 'Masha says: “I don’t like dogs.” An hour later: “I want to get a dog!”'
    options:
    - id: opt_1
      text: Contradiction
    - id: opt_2
      text: No contradiction
    options_count: 2
    correct_answer: opt_1
    explanation: Contradiction! “I don’t like it” and “I want to have one” is like saying “I don’t like rain, I’ll go for
      a walk in the downpour!” Doesn't stick together.
    explanation_status: implicit
  - step_id: sc4_38
    source_step_id: '38'
    scene_id: sc4
    step_type: single_choice
    prompt: 'Mikola said: "I''m tired." Then he sat down to rest.'
    options:
    - id: opt_1
      text: Contradiction
    - id: opt_2
      text: No contradiction
    options_count: 2
    correct_answer: opt_2
    explanation: No contradiction! Tired - resting. One follows from the other. The logic is fine, Aristotle is happy.
    explanation_status: implicit
  - step_id: sc4_40
    source_step_id: '40'
    scene_id: sc4
    step_type: single_choice
    prompt: 'Dmitry says: “I always do my homework.” Teacher: “Dmitry didn’t pass three homework.”'
    options:
    - id: opt_1
      text: Contradiction
    - id: opt_2
      text: No contradiction
    options_count: 2
    correct_answer: opt_1
    explanation: Contradiction! “Always” means every time, without exception. And three unfinished homeworks are three very
      high-profile exceptions. The word “always” is a dangerous word, remember?
    explanation_status: implicit
  - step_id: sc4_42
    source_step_id: '42'
    scene_id: sc4
    step_type: single_choice
    prompt: 'Olenka said in the morning: “It’s cold today.” In the evening: “It’s warmer today.”'
    options:
    - id: opt_1
      text: Contradiction
    - id: opt_2
      text: No contradiction
    options_count: 2
    correct_answer: opt_2
    explanation: No contradiction! Morning and evening are different times. The weather changed, and Olenka simply described
      it. Remember the rule? The law works “at the same time.” There are different times here.
    explanation_status: implicit
  - step_id: sc4_44
    source_step_id: '44'
    scene_id: sc4
    step_type: single_choice
    prompt: 'Vitya says: “I never cheat.” A minute later, he’s lying to his mom about the grade.'
    options:
    - id: opt_1
      text: Contradiction
    - id: opt_2
      text: No contradiction
    options_count: 2
    correct_answer: opt_1
    explanation: Contradiction! “I never lie” plus lying a minute later is like a sign “Caution, it’s safe here!” It refutes
      itself.
    explanation_status: implicit
  - step_id: sc4_46
    source_step_id: '46'
    scene_id: sc4
    step_type: single_choice
    prompt: Katya didn’t want to eat porridge in the morning. At lunch I enjoyed the soup.
    options:
    - id: opt_1
      text: Contradiction
    - id: opt_2
      text: No contradiction
    options_count: 2
    correct_answer: opt_2
    explanation: No contradiction! Porridge and soup are different foods, morning and lunch are different times. Not wanting
      porridge in the morning and wanting soup at lunch is absolutely normal. Aristotle approves.
    explanation_status: implicit
  - step_id: sc4_48
    source_step_id: '48'
    scene_id: sc4
    step_type: single_choice
    prompt: 'Seryozha: “I am for fair play!” He gets caught cheating. “Well, this is not a game, this is a test!”'
    options:
    - id: opt_1
      text: Contradiction
    - id: opt_2
      text: No contradiction
    options_count: 2
    correct_answer: opt_1
    explanation: Contradiction! Seryozha is trying to get out of it - they say, “fair play” and “control” are different. But
      the principle of honesty is the same. You can’t be for honesty only where it’s convenient.
    explanation_status: implicit
  - step_id: sc4_50
    source_step_id: '50'
    scene_id: sc4
    step_type: single_choice
    prompt: 'Anya: “I’m not greedy!” A friend asks for a pencil. “No, this is my pencil, I don’t give my things to anyone!”'
    options:
    - id: opt_1
      text: Contradiction
    - id: opt_2
      text: No contradiction
    options_count: 2
    correct_answer: opt_1
    explanation: Contradiction! “I’m not greedy” and “I don’t give to anyone” are a direct clash. Anya may not consider herself
      greedy, but her actions say otherwise. The law of non-contradiction cannot be fooled.
    explanation_status: implicit
  - step_id: sc4_52
    source_step_id: '52'
    scene_id: sc4
    step_type: single_choice
    prompt: 'Kostya: “Sports are great!” After physical education: “I hate sports!”'
    options:
    - id: opt_1
      text: Contradiction
    - id: opt_2
      text: No contradiction
    options_count: 2
    correct_answer: opt_1
    explanation: Contradiction! Although... you can argue here - maybe Kostya loves football, but hates running against the
      clock. But in this form - “sports are great” and “I hate sports” - without clarification, this is a contradiction. See
      how important it is to be precise?
    explanation_status: implicit
  - step_id: sc4_54
    source_step_id: '54'
    scene_id: sc4
    step_type: single_choice
    prompt: 'Lena: “I used to like this cartoon, but now I don’t.”'
    options:
    - id: opt_1
      text: Contradiction
    - id: opt_2
      text: No contradiction
    options_count: 2
    correct_answer: opt_2
    explanation: No! Lena doesn’t contradict—she just changed her mind. “Before” and “now” are different tenses. People grow
      up, tastes change. This is normal, and Aristotle is not against it.
    explanation_status: present
- scene_id: sc5
  title: Logic detector 2.0
  steps:
  - step_id: sc5_56
    source_step_id: '56'
    scene_id: sc5
    step_type: theory
    prompt: 'Has the contradiction detector been upgraded? Now let’s check it out at the “philosophical argument in the kitchen”
      level. Remember the formula: at the same time, in the same sense. If something changes, the law has not been broken.
      If it doesn’t change, we look for a crack.'
  - step_id: sc5_57
    source_step_id: '57'
    scene_id: sc5
    step_type: single_choice
    prompt: 'Igor: “Freedom is doing whatever you want.” A minute later: “You can’t do what you want because I don’t like
      it.”'
    options:
    - id: opt_1
      text: Contradiction
    - id: opt_2
      text: No contradiction
    options_count: 2
    correct_answer: opt_1
    explanation: Contradiction! If freedom is “to do whatever you want,” then it is either for everyone, or the formulation
      is broken. You cannot be for freedom in general and against freedom when it concerns others. Logic does not like double
      standards.
    explanation_status: implicit
  - step_id: sc5_59
    source_step_id: '59'
    scene_id: sc5
    step_type: single_choice
    prompt: 'Marina: “The truth is different for everyone.” A minute later: “You’re wrong. The truth is this."'
    options:
    - id: opt_1
      text: Contradiction
    - id: opt_2
      text: No contradiction
    options_count: 2
    correct_answer: opt_1
    explanation: Contradiction! If “everyone has their own truth,” then one cannot declare someone else’s position incorrect.
      Otherwise, you secretly admit that there is still only one truth. Philosophy is not magic; everything must come together
      here.
    explanation_status: implicit
  - step_id: sc5_61
    source_step_id: '61'
    scene_id: sc5
    step_type: single_choice
    prompt: 'Danil: “Rules are needed so that there is order in the classroom.” Later: “But this rule is inconvenient for
      me, so it can be ignored.”'
    options:
    - id: opt_1
      text: Contradiction
    - id: opt_2
      text: No contradiction
    options_count: 2
    correct_answer: opt_1
    explanation: Contradiction! If a rule is needed for the sake of order, then inconvenience does not invalidate the principle.
      Either the rules are mandatory or they are just advice. There is no third option.
    explanation_status: implicit
  - step_id: sc5_63
    source_step_id: '63'
    scene_id: sc5
    step_type: single_choice
    prompt: 'Alina said in the morning: “I will never eat sweets again.” A year later I ate cake at my birthday.'
    options:
    - id: opt_1
      text: Contradiction
    - id: opt_2
      text: No contradiction
    options_count: 2
    correct_answer: opt_2
    explanation: No contradiction! A whole year has passed - Alina could have changed her mind. The law works at the same
      time. People change, and logic allows this. Remember Olenka with the weather? Same principle.
    explanation_status: implicit
  - step_id: sc5_65
    source_step_id: '65'
    scene_id: sc5
    step_type: single_choice
    prompt: 'Oksana: “I always think with my head, not with my emotions.” A minute later he shouts: “I’m yelling because it
      pisses me off!”'
    options:
    - id: opt_1
      text: Contradiction
    - id: opt_2
      text: No contradiction
    options_count: 2
    correct_answer: opt_1
    explanation: 'Contradiction! “Always rational” and “acting out of anger” are not the same. The word “always” worked like
      a trap again. Aristotle would say: be careful with absolutes!'
    explanation_status: implicit
  - step_id: sc5_67
    source_step_id: '67'
    scene_id: sc5
    step_type: single_choice
    prompt: 'Maxim: “You cannot judge people by one action.” A minute later: “He lied once, that means he’s a liar.”'
    options:
    - id: opt_1
      text: Contradiction
    - id: opt_2
      text: No contradiction
    options_count: 2
    correct_answer: opt_1
    explanation: Contradiction! Either we do not draw a conclusion from one case, or we do. You cannot simultaneously prohibit
      a generalization and immediately use it.
    explanation_status: implicit
  - step_id: sc5_69
    source_step_id: '69'
    scene_id: sc5
    step_type: single_choice
    prompt: 'Sonya: “All opinions are equally valuable.” Then: “Your opinion is stupid and doesn’t matter.”'
    options:
    - id: opt_1
      text: Contradiction
    - id: opt_2
      text: No contradiction
    options_count: 2
    correct_answer: opt_1
    explanation: Contradiction! You cannot simultaneously affirm the equal value of all opinions and devalue a specific one.
      Either “everyone is equal” or “there are exceptions” - choose one.
    explanation_status: implicit
  - step_id: sc5_71
    source_step_id: '71'
    scene_id: sc5
    step_type: single_choice
    prompt: 'Varya: “I am for an honest conversation.” Friend: “Then tell me honestly what you think.” Varya: “No, I’d better
      keep silent.”'
    options:
    - id: opt_1
      text: Contradiction
    - id: opt_2
      text: No contradiction
    options_count: 2
    correct_answer: opt_2
    explanation: No contradiction! A cunning trap. Being “for an honest conversation” does not mean you have to always talk
      about everything. Silence is not a lie. Varya doesn’t contradict herself—she just chooses when to speak.
    explanation_status: implicit
  - step_id: sc5_73
    source_step_id: '73'
    scene_id: sc5
    step_type: theory
    prompt: Notice a pattern? Controversy is more than just “sounds bad.” This is when one thought breaks another under the
      same conditions. And when the principles only work “when it’s convenient”, logic immediately turns on the siren.
- scene_id: sc6
  title: Correct reminder
  steps:
  - step_id: sc6_74
    source_step_id: '74'
    scene_id: sc6
    step_type: theory
    prompt: 'You have learned to find contradictions. But the main thing is: what to do next? Shouting “Gotcha!”? Or can you
      be smarter?'
  - step_id: sc6_75
    source_step_id: '75'
    scene_id: sc6
    step_type: theory
    prompt: 'There is a rule: do not attack, but clarify. We don''t blame. We ask a calm question.'
  - step_id: sc6_76
    source_step_id: '76'
    scene_id: sc6
    step_type: theory
    prompt: 'Here''s the magic formula: "You said earlier that... How does this fit with...?" This phrase does not blame.
      She''s just asking for an explanation. And guess what? It may turn out that the person simply changed his mind - and
      that’s normal!'
  - step_id: sc6_77
    source_step_id: '77'
    scene_id: sc6
    step_type: theory
    prompt: Now let's practice. I give a situation and two ways to remind you of the contradiction. Vote - which one is better.
  - step_id: sc6_78
    source_step_id: '78'
    scene_id: sc6
    step_type: single_choice
    prompt: 'A friend said that he doesn’t like cinema, but now he invites me to the cinema. Method 1: “You said you don’t
      like movies! Liar!" Method 2: “You used to say that you don’t like movies. Have you changed your mind?'
    options:
    - id: opt_1
      text: The first one is better
    - id: opt_2
      text: The second one is better
    options_count: 2
    correct_answer: opt_2
    explanation: Second! Keep it short, polite, and give the person a chance to explain. Maybe he saw the trailer and changed
      his mind. Or maybe he’s confused - then let him figure it out himself.
    explanation_status: implicit
  - step_id: sc6_80
    source_step_id: '80'
    scene_id: sc6
    step_type: single_choice
    prompt: 'Dad said that sweets are harmful, but he eats cake. Method 1: “Dad, you are unfair!” Method 2: “Dad, you said
      that sweets are harmful. Why are you eating cake then?”'
    options:
