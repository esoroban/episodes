- scene_id: sc7
  title: Gestures and facial expressions
  steps:
  - step_id: sc7_106
    source_step_id: '106'
    scene_id: sc7
    step_type: theory
    prompt: Part two - gestures and facial expressions.
  - step_id: sc7_107
    source_step_id: '107'
    scene_id: sc7
    step_type: theory
    prompt: Gestures are movements of the hands. We use them every day, without even noticing! Try saying “over there” without
      your hand. It doesn't work out, does it? The hand flies by itself.
  - step_id: sc7_108
    source_step_id: '108'
    scene_id: sc7
    step_type: theory
    prompt: 'There are different gestures. Index fingers - show the direction: “Over there!” - and the finger flies. Expressive
      - reinforce the words: “This is such a huge fish!” - and the hands move a meter apart. Calming - they help to support:
      putting your hand on your shoulder means “I’m nearby.”'
  - step_id: sc7_109
    source_step_id: '109'
    scene_id: sc7
    step_type: theory
    prompt: 'And facial expressions are facial expressions. The face is like a phone screen: everything is visible on it!
      Joy, sadness, anger, surprise, fear - the face shows all this in a split second.'
  - step_id: sc7_110
    source_step_id: '110'
    scene_id: sc7
    step_type: theory
    prompt: 'Mikola received a bad grade. Approaches Masha. He doesn''t say anything. But Masha sees: the shoulders are lowered,
      the eyes are looking at the floor, the corners of the mouth are down.'
  - step_id: sc7_111
    source_step_id: '111'
    scene_id: sc7
    step_type: theory
    prompt: What did Masha understand? That he feels bad. Mikola didn’t say a word, but Masha had already read everything.
      The face and body are an open book.
  - step_id: sc7_112
    source_step_id: '112'
    scene_id: sc7
    step_type: theory
    prompt: 'But Dmitry runs into the classroom. Eyes sparkling, smile from ear to ear, waving his hands: “Guys! Guys!" I
      haven’t said anything yet, but everyone already knows: something cool happened!'
  - step_id: sc7_113
    source_step_id: '113'
    scene_id: sc7
    step_type: instruction
    prompt: Let's check how you read facial expressions! I describe the expression and define the emotion.
  - step_id: sc7_114
    source_step_id: '114'
    scene_id: sc7
    step_type: single_choice
    prompt: Wide smile, eyes shining.
    options:
    - id: opt_1
      text: Joy
    - id: opt_2
      text: Sadness
    - id: opt_3
      text: Anger
    options_count: 3
    correct_answer: opt_1
    explanation: Joy! Smile + sparkling eyes = happiness. The body doesn't pretend.
    explanation_status: implicit
  - step_id: sc7_116
    source_step_id: '116'
    scene_id: sc7
    step_type: single_choice
    prompt: Eyebrows knitted, lips pursed.
    options:
    - id: opt_1
      text: Joy
    - id: opt_2
      text: Sadness
    - id: opt_3
      text: Anger
    options_count: 3
    correct_answer: opt_3
    explanation: Anger! Furrowed eyebrows + pursed lips = “I’m angry.” The face itself screams.
    explanation_status: implicit
  - step_id: sc7_118
    source_step_id: '118'
    scene_id: sc7
    step_type: single_choice
    prompt: The corners of the mouth are downcast, the eyes are sad.
    options:
    - id: opt_1
      text: Joy
    - id: opt_2
      text: Sadness
    - id: opt_3
      text: Anger
    options_count: 3
    correct_answer: opt_2
    explanation: Sadness. Drooping corners of the mouth are the surest sign. Even a clown can't hide it.
    explanation_status: implicit
  - step_id: sc7_120
    source_step_id: '120'
    scene_id: sc7
    step_type: single_choice
    prompt: Laughs and claps his hands.
    options:
    - id: opt_1
      text: Joy
    - id: opt_2
      text: Sadness
    - id: opt_3
      text: Anger
    options_count: 3
    correct_answer: opt_1
    explanation: Joy! Laughter + clapping = pure delight. There is no need for a scout here - everything is obvious.
    explanation_status: implicit
  - step_id: sc7_122
    source_step_id: '122'
    scene_id: sc7
    step_type: single_choice
    prompt: Fists are clenched, face is red.
    options:
    - id: opt_1
      text: Joy
    - id: opt_2
      text: Sadness
    - id: opt_3
      text: Anger
    options_count: 3
    correct_answer: opt_3
    explanation: Anger! Fists + red face = anger. The body does not hide this emotion - even if the person is silent.
    explanation_status: implicit
  - step_id: sc7_124
    source_step_id: '124'
    scene_id: sc7
    step_type: single_choice
    prompt: The head is lowered, the shoulders are raised, as if it wants to hide.
    options:
    - id: opt_1
      text: Joy
    - id: opt_2
      text: Sadness
    - id: opt_3
      text: Anger
    options_count: 3
    correct_answer: opt_2
    explanation: Sadness. Or even fear. A person wants to become smaller, more inconspicuous. The body curled up like a hedgehog.
    explanation_status: implicit
  - step_id: sc7_126
    source_step_id: '126'
    scene_id: sc7
    step_type: theory
    prompt: Try practicing at home in front of the mirror! Show your face joy, sadness, surprise, fear, anger - and see how
      it looks from the outside. A true detective studies himself first.
  - step_id: sc7_127
    source_step_id: '127'
    scene_id: sc7
    step_type: theory
    prompt: We read emotions in the face instantly - in a second! This is a superpower that everyone has. But the intelligence
      officer uses it consciously—he doesn’t just see, but notices and understands.
  - step_id: sc7_128
    source_step_id: '128'
    scene_id: sc7
    step_type: theory
    prompt: Now comes the tricky part. Voice and intonation!
- scene_id: sc8
  title: Voice and intonation
  steps:
  - step_id: sc8_129
    source_step_id: '129'
    scene_id: sc8
    step_type: theory
    prompt: Part three - voice and intonation. The trickiest part!
  - step_id: sc8_130
    source_step_id: '130'
    scene_id: sc8
    step_type: theory
    prompt: The voice has four settings - just like on the remote control. Volume - quiet or loud. Pace - fast or slow. Pitch
      - low voice or high voice. And pauses - stops between words.
  - step_id: sc8_131
    source_step_id: '131'
    scene_id: sc8
    step_type: theory
    prompt: And there is also intonation - this is HOW you speak. You can say the same word - but the meaning will be completely
      different!
  - step_id: sc8_132
    source_step_id: '132'
    scene_id: sc8
    step_type: theory
    prompt: 'The word "Excellent". If you say joyfully, in a high voice: “Excellent!” - this means “hurray, great!”'
  - step_id: sc8_133
    source_step_id: '133'
    scene_id: sc8
    step_type: theory
    prompt: 'And if you say slowly, in a low voice: “Great...” - this is sarcasm. The person actually thinks: “Well, not great
      at all.”'
  - step_id: sc8_134
    source_step_id: '134'
    scene_id: sc8
    step_type: theory
    prompt: 'Stop. What is sarcasm? This is when you say one thing but mean the opposite. And you deliberately do it so that
      the other person feels unpleasant. “Well, you’re great...” - but in reality: “You ruined everything.”'
  - step_id: sc8_135
    source_step_id: '135'
    scene_id: sc8
    step_type: theory
    prompt: 'Sarcasm is a weapon. And it’s vile. The person didn’t seem to say anything bad - try to be offended by “well
      done”! But everyone hears: he is mocking.'
  - step_id: sc8_136
    source_step_id: '136'
    scene_id: sc8
    step_type: theory
    prompt: 'The scout does not use sarcasm. Why? Because sarcasm is the weapon of a soldier who wants to offend, but is afraid
      to say it directly. The scout says honestly: “I don’t like this” - and does not hide behind a crooked smile.'
  - step_id: sc8_137
    source_step_id: '137'
    scene_id: sc8
    step_type: theory
    prompt: 'And if loud and sharp: “EXCELLENT!” - this is anger. It was like slamming a door. One word - three different
      meanings! And the difference is only in the voice.'
  - step_id: sc8_138
    source_step_id: '138'
    scene_id: sc8
    step_type: theory
    prompt: Another tricky trick is emphasis. Whichever word you highlight with your voice, that’s the meaning.
  - step_id: sc8_139
    source_step_id: '139'
    scene_id: sc8
    step_type: theory
    prompt: 'Phrase: “I didn’t take your pencil.” If you highlight “I” - “I DIDN’T take” - that means it’s not me, but someone
      else!'
  - step_id: sc8_140
    source_step_id: '140'
    scene_id: sc8
    step_type: theory
    prompt: If you highlight “took” - “I didn’t TAKE” - it means I didn’t take it, maybe I found it or they gave it to me.
  - step_id: sc8_141
    source_step_id: '141'
    scene_id: sc8
    step_type: theory
    prompt: If you highlight “yours” - “I didn’t take YOURS” - it means not yours, but someone else’s. One phrase - three
      different excuses! This is the magic of the voice.
  - step_id: sc8_142
    source_step_id: '142'
    scene_id: sc8
    step_type: theory
    prompt: 'Masha comes home. Mom: “How are things at school?” Masha cheerfully, quickly: “Great! We had a tour!” What does
      mom hear? Joy. Masha is happy.'
  - step_id: sc8_143
    source_step_id: '143'
    scene_id: sc8
    step_type: theory
    prompt: 'And now another Masha. Mom asks the same thing. Masha quietly, slowly: “It’s normal...” What does mom hear? Something
      happened. Although the word “normal” seems to be good!'
  - step_id: sc8_144
    source_step_id: '144'
    scene_id: sc8
    step_type: theory
    prompt: Not WHAT is said, but HOW - that’s where the truth is. The voice, like the body, is an honest talker.
  - step_id: sc8_145
    source_step_id: '145'
    scene_id: sc8
    step_type: instruction
    prompt: Let's check! We determine the mood by intonation.
  - step_id: sc8_146
    source_step_id: '146'
    scene_id: sc8
    step_type: single_choice
    prompt: “Hurray, we’re going for a walk!” - cheerfully, in a high voice.
    options:
    - id: opt_1
      text: Joyfully
    - id: opt_2
      text: Sad
    - id: opt_3
      text: Angrily
    options_count: 3
    correct_answer: opt_1
    explanation: Joyful! High voice, fast pace, smile in his voice.
    explanation_status: implicit
  - step_id: sc8_148
    source_step_id: '148'
    scene_id: sc8
    step_type: single_choice
    prompt: “Okay, let's go...” - quietly, slowly.
    options:
    - id: opt_1
      text: Joyfully
    - id: opt_2
      text: Sad
    - id: opt_3
      text: Angrily
    options_count: 3
    correct_answer: opt_2
    explanation: Sad. Quiet voice, slow tempo, down intonation.
    explanation_status: implicit
  - step_id: sc8_150
    source_step_id: '150'
    scene_id: sc8
    step_type: single_choice
    prompt: “I said no!” - loudly, sharply.
    options:
    - id: opt_1
      text: Joyfully
    - id: opt_2
      text: Sad
    - id: opt_3
      text: Angrily
    options_count: 3
    correct_answer: opt_3
    explanation: Angrily! Loud, harsh voice = anger. Remote control to maximum.
    explanation_status: implicit
  - step_id: sc8_152
    source_step_id: '152'
    scene_id: sc8
    step_type: single_choice
    prompt: “Okay, as you wish...” - quietly, offended.
    options:
    - id: opt_1
      text: Joyfully
    - id: opt_2
      text: Sad
    - id: opt_3
      text: Angrily
    options_count: 3
    correct_answer: opt_2
    explanation: Sad. An offended voice, quiet - the intonation falls. The words seem neutral, but the voice gives it away.
    explanation_status: implicit
  - step_id: sc8_154
    source_step_id: '154'
    scene_id: sc8
    step_type: single_choice
    prompt: “Well, of course, it’s very interesting...” - sarcastically, dissatisfied.
    options:
    - id: opt_1
      text: Joyfully
    - id: opt_2
      text: Sad
    - id: opt_3
      text: Sarcasm
    options_count: 3
    correct_answer: opt_3
    explanation: Sarcasm! The words are “interesting”, but the voice is not interesting at all. A soldier's vile weapon. A
      scout doesn't do that.
    explanation_status: implicit
  - step_id: sc8_156
    source_step_id: '156'
    scene_id: sc8
    step_type: theory
    prompt: 'The voice consists of four settings: volume, tempo, pitch, pauses. And intonation is how all the settings come
      together. One word, pronounced differently, can mean joy, sadness or anger.'
- scene_id: sc9
  title: Closing
  steps:
  - step_id: sc9_157
    source_step_id: '157'
    scene_id: sc9
    step_type: theory
    prompt: Today we learned that the body is an honest talker. It reveals the truth, even when the mouth says otherwise.
      And we learned to listen to him!
  - step_id: sc9_158
    source_step_id: '158'
    scene_id: sc9
    step_type: theory
    prompt: 'Eye contact is our flashlight. You look into the eyes and you shine with attention. And the posture is like a
      door: open - come in, closed - don’t come.'
  - step_id: sc9_159
    source_step_id: '159'
    scene_id: sc9
    step_type: theory
    prompt: 'Gestures help words, just as hands help stories. And the face is the phone screen: all notifications are visible
      at once. Joy, anger, surprise - everything is written!'
  - step_id: sc9_160
    source_step_id: '160'
    scene_id: sc9
    step_type: theory
    prompt: 'And the voice is a control panel with four settings: volume, tempo, pitch, pauses. You change one setting and
      the meaning is completely different!'
  - step_id: sc9_161
    source_step_id: '161'
    scene_id: sc9
    step_type: theory
    prompt: 'A complete set of scout tools! The first is the BRAKE: empathy. The second is MIRROR: active listening. The third
      is the MAP: the formula of the statement. And the fourth, new one - EYE: body language!'
  - step_id: sc9_162
    source_step_id: '162'
    scene_id: sc9
    step_type: theory
    prompt: 'One last task. Masha says: “I don’t care, do what you want.” But her arms were crossed, her lips pursed, and
      she turned away. Does she really care?'
  - step_id: sc9_163
    source_step_id: '163'
    scene_id: sc9
    step_type: open_question
    prompt: What is Masha's body really saying?
  - step_id: sc9_164
    source_step_id: '164'
    scene_id: sc9
    step_type: theory
    prompt: 'Of course she doesn''t care! The body screams: “I’m offended!” But words hide the truth. This is why the EYE
      is needed - to see what words do not say.'
