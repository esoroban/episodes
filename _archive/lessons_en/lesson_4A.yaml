source_lesson_id: lesson_4A
language: en
title: Body Language and Voice
day: 4
slot: A
scenes:
- scene_id: sc1
  title: Warm-up
  steps:
  - step_id: sc1_1
    source_step_id: '1'
    scene_id: sc1
    step_type: theory
    prompt: Hi! Fourth lesson—so we already know a lot. Quick warm-up—let's check what's stuck in our heads!
  - step_id: sc1_2
    source_step_id: '2'
    scene_id: sc1
    step_type: theory
    prompt: Remember the rules! A fact—we checked it, and it's true. An opinion—a personal feeling you can't check. A falsehood—we
      checked it, and it's not true.
  - step_id: sc1_3
    source_step_id: '3'
    scene_id: sc1
    step_type: single_choice
    prompt: '"There are sixty seconds in a minute."'
    options:
    - id: opt_1
      text: Fact
    - id: opt_2
      text: Opinion
    - id: opt_3
      text: Falsehood
    options_count: 3
    correct_answer: opt_1
    explanation: Fact! The clock ticked exactly sixty. Checked, confirmed.
    explanation_status: present
  - step_id: sc1_5
    source_step_id: '5'
    scene_id: sc1
    step_type: single_choice
    prompt: “Pizza tastes better than sushi.”
    options:
    - id: opt_1
      text: Fact
    - id: opt_2
      text: Opinion
    - id: opt_3
      text: Falsehood
    options_count: 3
    correct_answer: opt_2
    explanation: Opinion! “Tastier” - everyone has their own taste. There is no device that can measure “deliciousness.” Although
      it would be convenient!
    explanation_status: present
  - step_id: sc1_7
    source_step_id: '7'
    scene_id: sc1
    step_type: single_choice
    prompt: '"Dolphins are fish."'
    options:
    - id: opt_1
      text: Fact
    - id: opt_2
      text: Opinion
    - id: opt_3
      text: Falsehood
    options_count: 3
    correct_answer: opt_3
    explanation: Not true! Dolphins are mammals. They breathe air and feed their young with milk. Scientists checked - definitely
      not fish. They even get offended if they are called fish.
    explanation_status: implicit
  - step_id: sc1_9
    source_step_id: '9'
    scene_id: sc1
    step_type: theory
    prompt: Now - reason or coincidence? The reason is that the first actually caused the second. Coincidence - it just happened
      nearby in time.
  - step_id: sc1_10
    source_step_id: '10'
    scene_id: sc1
    step_type: single_choice
    prompt: “I watered the flower every day and the flower grew.”
    options:
    - id: opt_1
      text: Cause
    - id: opt_2
      text: Coincidence
    options_count: 2
    correct_answer: opt_1
    explanation: Cause! Without water, the flower will wither. Water is the real reason for growth.
    explanation_status: implicit
  - step_id: sc1_12
    source_step_id: '12'
    scene_id: sc1
    step_type: single_choice
    prompt: “I put on a new hat and got an excellent grade at school.”
    options:
    - id: opt_1
      text: Cause
    - id: opt_2
      text: Coincidence
    options_count: 2
    correct_answer: opt_2
    explanation: Coincidence! The hat does not affect the ratings. The brain sees “one thing after another” - and wants to
      connect. But this is a trap.
    explanation_status: implicit
  - step_id: sc1_14
    source_step_id: '14'
    scene_id: sc1
    step_type: single_choice
    prompt: “I turned on the light and the room became bright.”
    options:
    - id: opt_1
      text: Cause
    - id: opt_2
      text: Coincidence
    options_count: 2
    correct_answer: opt_1
    explanation: Cause! The switch lights the lamp. Direct connection.
    explanation_status: implicit
  - step_id: sc1_16
    source_step_id: '16'
    scene_id: sc1
    step_type: single_choice
    prompt: “I sneezed and the bus arrived.”
    options:
    - id: opt_1
      text: Cause
    - id: opt_2
      text: Coincidence
    options_count: 2
    correct_answer: opt_2
    explanation: Coincidence! A sneeze does not call the bus. Otherwise, everyone would sneeze at bus stops - and there would
      be no need for a schedule.
    explanation_status: implicit
  - step_id: sc1_18
    source_step_id: '18'
    scene_id: sc1
    step_type: single_choice
    prompt: “I learned the verse and got an excellent grade for the verse.”
    options:
    - id: opt_1
      text: Cause
    - id: opt_2
      text: Coincidence
    options_count: 2
    correct_answer: opt_1
    explanation: Cause! Knowledge of the verse is a direct reason for an excellent grade. There is a real connection here.
    explanation_status: implicit
  - step_id: sc1_20
    source_step_id: '20'
    scene_id: sc1
    step_type: single_choice
    prompt: “The cat climbed onto the table and the phone rang.”
    options:
    - id: opt_1
      text: Cause
    - id: opt_2
      text: Coincidence
    options_count: 2
    correct_answer: opt_2
    explanation: Coincidence! The cat doesn't know how to make calls. Although some cats think they can do everything.
    explanation_status: implicit
  - step_id: sc1_22
    source_step_id: '22'
    scene_id: sc1
    step_type: theory
    prompt: Great! Fact, opinion, untruth - we remember. Reason and coincidence are not to be confused. And now - to what
      we taught in the last lesson.
- scene_id: sc2
  title: 'Repetition: soldier and scout'
  steps:
  - step_id: sc2_23
    source_step_id: '23'
    scene_id: sc2
    step_type: instruction
    prompt: In the last lesson we looked at the culture of argument. Argument has three purposes. Who remembers?
  - step_id: sc2_24
    source_step_id: '24'
    scene_id: sc2
    step_type: theory
    prompt: The first is to WIN. “I’m right, period!” The second is to UNDERSTAND. “Let's figure it out together!” The third
      is to OFFEND. “I want to hurt you.” What is the scout's goal? That's right - understand.
  - step_id: sc2_25
    source_step_id: '25'
    scene_id: sc2
    step_type: instruction
    prompt: Let's check it out in a new situation. Mikola and Masha are arguing about where to go on an excursion. Mikola
      wants to go to the zoo, Masha wants to go to the cosmonautics museum.
  - step_id: sc2_26
    source_step_id: '26'
    scene_id: sc2
    step_type: single_choice
    prompt: 'Mikola: “It’s cooler at the zoo!” Anyone who wants to go to a museum is boring!”'
    options:
    - id: opt_1
      text: Win
    - id: opt_2
      text: Understand
    - id: opt_3
      text: Offend
    options_count: 3
    correct_answer: opt_3
    explanation: Offend! “Whoever wants to go to a museum is boring” - a blow to the person, and not about the excursion.
    explanation_status: implicit
  - step_id: sc2_28
    source_step_id: '28'
    scene_id: sc2
    step_type: single_choice
    prompt: 'Mikola: “Zoo - and no talking! I''ve already decided. And period."'
    options:
    - id: opt_1
      text: Win
    - id: opt_2
      text: Understand
    - id: opt_3
      text: Offend
    options_count: 3
    correct_answer: opt_1
    explanation: Win! Mikola doesn't listen. He doesn't care what Masha thinks. The main thing is that it should be according
      to him.
    explanation_status: implicit
  - step_id: sc2_30
    source_step_id: '30'
    scene_id: sc2
    step_type: single_choice
    prompt: 'Mikola: “I want to go to the zoo, and you want to go to the museum. Tell me, what''s interesting there? Maybe
      we can both find something cool."'
    options:
    - id: opt_1
      text: Win
    - id: opt_2
      text: Understand
    - id: opt_3
      text: Offend
    options_count: 3
    correct_answer: opt_2
    explanation: Understand! Mikola does not give up his opinion, but wants to hear Masha. A real scout.
    explanation_status: implicit
  - step_id: sc2_32
    source_step_id: '32'
    scene_id: sc2
    step_type: theory
    prompt: Soldier - stands behind the wall of the fortress, protects the territory. “My opinion is the only correct one!”
      Scout - takes binoculars and a notebook. “I wonder what the other person sees?”
  - step_id: sc2_33
    source_step_id: '33'
    scene_id: sc2
    step_type: theory
    prompt: 'New situation. Dmitry and Mikola are arguing about who will be the goalkeeper. Both want it. Dmitry: “I always
      stand at the gate! This is MY place! Everyone knows."'
  - step_id: sc2_34
    source_step_id: '34'
    scene_id: sc2
    step_type: single_choice
    prompt: Who is Dmitry?
    options:
    - id: opt_1
      text: Soldier
    - id: opt_2
      text: Scout
    options_count: 2
    correct_answer: opt_1
    explanation: Soldier! “MY place”, “everyone knows” - a castle on lock. Doesn't listen and doesn't want to listen.
    explanation_status: implicit
  - step_id: sc2_36
    source_step_id: '36'
    scene_id: sc2
    step_type: theory
    prompt: What if Dmitrik was a scout? “I love being on goal. Do you want it too? Let’s be honest - first half you, second
      half me?” The same argument - but without a quarrel.
  - step_id: sc2_37
    source_step_id: '37'
    scene_id: sc2
    step_type: theory
    prompt: The soldier is a wall. Scout - bridge. And the scout has three tools. We analyzed them in detail.
  - step_id: sc2_38
    source_step_id: '38'
    scene_id: sc2
    step_type: theory
    prompt: Empathy is a BRAKE. Active listening is a MIRROR. The formula of the statement is MAP. Let's check it out with
      new examples!
  - step_id: sc2_39
    source_step_id: '39'
    scene_id: sc2
    step_type: single_choice
    prompt: 'Dmitry sees that Mikola is upset after the test: “I see that it’s not easy for you. Do you want us to sort out
      the mistakes together?”'
    options:
    - id: opt_1
      text: Empathy
    - id: opt_2
      text: Active listening
    - id: opt_3
      text: Statement formula
    options_count: 3
    correct_answer: opt_1
    explanation: Empathy! Dmitry saw the feeling and offered to help. The brake worked.
    explanation_status: implicit
- scene_id: sc3
  title: 'Repetition: utterance formula'
  steps:
  - step_id: sc3_41
    source_step_id: '41'
    scene_id: sc3
    step_type: instruction
    prompt: 'Mikola fell during physical education. Masha: “Don’t cry, it doesn’t hurt!” Any empathy?'
  - step_id: sc3_42
    source_step_id: '42'
    scene_id: sc3
    step_type: single_choice
    prompt: 'Masha: “Don’t cry, it doesn’t hurt!”'
    options:
    - id: opt_1
      text: There is empathy
    - id: opt_2
      text: Нет
    options_count: 2
    correct_answer: opt_2
    explanation: No! Masha decided for Mikola whether it hurt him or not. The brake didn't work.
    explanation_status: present
  - step_id: sc3_44
    source_step_id: '44'
    scene_id: sc3
    step_type: theory
    prompt: 'Masha tells Mikola: “I don’t like it when everyone pushes. I’ve already dropped my briefcase.” Mikola: “Uh-huh,
      okay.”'
  - step_id: sc3_45
    source_step_id: '45'
    scene_id: sc3
    step_type: single_choice
    prompt: 'Mikola: “Uh-huh, okay.”'
    options:
    - id: opt_1
      text: There is a retelling
    - id: opt_2
      text: Нет
    options_count: 2
    correct_answer: opt_2
    explanation: No! “Uh-huh” is not a mirror. Masha doesn’t know whether Mikola understood or just nodded. A statement, not
      proof.
    explanation_status: present
  - step_id: sc3_47
    source_step_id: '47'
    scene_id: sc3
    step_type: theory
    prompt: 'And now - the formula. Three steps: observation - feeling - suggestion. “I see that...”, “I...”, “Come on...”
      Scout card.'
  - step_id: sc3_48
    source_step_id: '48'
    scene_id: sc3
    step_type: theory
    prompt: Masha and Dmitrik are doing a joint project. Masha wrote her part, but Dmitrik did not. Submit tomorrow.
  - step_id: sc3_49
    source_step_id: '49'
    scene_id: sc3
    step_type: theory
    prompt: 'Soldier Masha: “You always ruin everything! We''ll get a bad grade because of you! You are irresponsible! Three
      charges: “forever”, “because of you”, “irresponsible”.'
  - step_id: sc3_50
    source_step_id: '50'
    scene_id: sc3
    step_type: theory
    prompt: 'Scout Masha: “I see that your unit is not ready yet. I''m worried because I have to take it tomorrow. Let’s call
      you this evening and you can finish it?”'
  - step_id: sc3_51
    source_step_id: '51'
    scene_id: sc3
    step_type: theory
    prompt: 'Observation - “part is not ready.” The feeling is “I’m worried.” Sentence: “We’ll call you in the evening.” Same
      situation, zero charges, there is a solution.'
  - step_id: sc3_52
    source_step_id: '52'
    scene_id: sc3
    step_type: instruction
    prompt: Description or accusation? Let's check!
  - step_id: sc3_53
    source_step_id: '53'
    scene_id: sc3
    step_type: single_choice
    prompt: “You didn’t clean up after yourself again!”
    options:
    - id: opt_1
      text: Description
    - id: opt_2
      text: Accusation
    options_count: 2
    correct_answer: opt_2
    explanation: Accusation! The word “again” is a marker. The scout would say, “I noticed the dishes were left on the table.”
    explanation_status: implicit
  - step_id: sc3_55
    source_step_id: '55'
    scene_id: sc3
    step_type: single_choice
    prompt: “I noticed that you came later than usual today.”
    options:
    - id: opt_1
      text: Description
    - id: opt_2
      text: Accusation
    options_count: 2
    correct_answer: opt_1
    explanation: 'Description! Fact: today, later than usual. Without attack, without “forever” and “always”.'
    explanation_status: implicit
  - step_id: sc3_57
    source_step_id: '57'
    scene_id: sc3
    step_type: single_choice
    prompt: 'Mikola: “I see that you have taken my place. I feel bad. Let''s sit next to you?"'
    options:
    - id: opt_1
      text: Empathy
    - id: opt_2
      text: Active listening
    - id: opt_3
      text: Statement formula
    options_count: 3
    correct_answer: opt_3
    explanation: Formula! Observation + feeling + suggestion. All three steps of the map.
    explanation_status: implicit
  - step_id: sc3_59
    source_step_id: '59'
    scene_id: sc3
    step_type: single_choice
    prompt: 'Mikola: “If I understand correctly, do you want us to play in turns, and not all at once?”'
    options:
    - id: opt_1
      text: Empathy
    - id: opt_2
      text: Active listening
    - id: opt_3
      text: Statement formula
    options_count: 3
    correct_answer: opt_2
    explanation: Active listening! He retold it specifically and asked again. Clean mirror. Three tools in place - ready for
      a new discovery!
    explanation_status: implicit
- scene_id: sc4
  title: Discovery
  steps:
  - step_id: sc4_61
    source_step_id: '61'
    scene_id: sc4
    step_type: theory
    prompt: 'The scout has three tools: brake, mirror and map. All three are about WORDS. We feel, we retell, we speak - in
      words. What if a person... is silent?'
  - step_id: sc4_62
    source_step_id: '62'
    scene_id: sc4
    step_type: theory
    prompt: 'Or is it even more cunning - he says one thing, but feels another? He says “yes”, but inside he says “no”. Mom
      asks: “Did you like the soup?” And you: “Yessss... delicious...” and quietly push the plate away.'
  - step_id: sc4_63
    source_step_id: '63'
    scene_id: sc4
    step_type: theory
    prompt: The mouth said “delicious” and the hands said “take this away from me.” Who to trust - your mouth or your hands?
  - step_id: sc4_64
    source_step_id: '64'
    scene_id: sc4
    step_type: theory
    prompt: 'A friend says: “Everything is fine!” But he frowns, crosses his arms and turns away. The words are “good.” And
      everything else screams - “I feel bad!”'
  - step_id: sc4_65
    source_step_id: '65'
    scene_id: sc4
    step_type: theory
    prompt: 'The teacher asks: “Do you understand everything?” The class nods. And one person frowned, chewed on his pen,
      and looked at his desk. He nodded too. But his face says: “I didn’t understand anything at all.”'
  - step_id: sc4_66
    source_step_id: '66'
    scene_id: sc4
    step_type: theory
    prompt: It turns out that we speak not only with our mouths! We have a second language - BODY language. Hands speak. The
      face speaks. Even your back speaks! Mom stands with her hands on her hips - she hasn’t said a word yet, but you already
      understand everything.
  - step_id: sc4_67
    source_step_id: '67'
    scene_id: sc4
    step_type: theory
    prompt: Scientists have a long word for this. Not-ver-bal-na-kom-mu-ni-ka-tsi-ya. Ten syllables! You'll break your tongue.
  - step_id: sc4_68
    source_step_id: '68'
    scene_id: sc4
    step_type: theory
    prompt: But the meaning is simple. “Verbal” - in words. “Non-verbal” - WITHOUT words. Nonverbal communication is when
      you convey information with your face, hands, posture, and voice.
  - step_id: sc4_69
    source_step_id: '69'
    scene_id: sc4
    step_type: theory
    prompt: Mom hands on hips - nonverbal communication. The friend turned away - nonverbal communication. The cat covered
      his ears - she did too! Even cats use it.
  - step_id: sc4_70
    source_step_id: '70'
    scene_id: sc4
    step_type: theory
    prompt: Why does a scout need this? All our tools work with words. But sometimes words lie. And the body - almost never.
      The body is an honest talker; it cannot remain silent.
  - step_id: sc4_71
    source_step_id: '71'
    scene_id: sc4
    step_type: theory
    prompt: Therefore, today we will add a fourth tool to the scout - the EYE. Brake, mirror, map - and now the eye. The ability
      to see what words hide.
  - step_id: sc4_72
    source_step_id: '72'
    scene_id: sc4
    step_type: theory
    prompt: Now listen to an interesting story about how the words said one thing, but the body said something completely
      different.
- scene_id: sc5
  title: HISTORY – DMITRIK AND BODY LANGUAGE
  steps:
  - step_id: sc5_73
    source_step_id: '73'
    scene_id: sc5
    step_type: theory
    prompt: The guys invited Dmitry to play ball. “Yes, of course I want to!” - said Dmitry. But he crossed his arms, looked
      away, and his voice became quiet and boring.
  - step_id: sc5_74
    source_step_id: '74'
    scene_id: sc5
    step_type: theory
    prompt: Vitya took a closer look. The mouth says “yes” - but the body screams “no!” Crossed arms - closed like a fortress.
      Looking to the side - doesn’t want to look. Voice without energy.
  - step_id: sc5_75
    source_step_id: '75'
    scene_id: sc5
    step_type: theory
    prompt: 'Vitya quietly asked: “Dmitrik, are you upset that you weren’t invited yesterday?” Dmitrik lowered his eyes: “Well...
      yes.” This is the real reason.'
  - step_id: sc5_76
    source_step_id: '76'
    scene_id: sc5
    step_type: theory
    prompt: Vitya did not believe the words - he looked at the body. Three clues - hands, eyes, voice - and all without a
      single word. A real scout!
  - step_id: sc5_77
    source_step_id: '77'
    scene_id: sc5
    step_type: single_choice
    prompt: At the beginning, Dmitry said “yes, I want to play.” But his BODY said what?
    options:
    - id: opt_1
      text: '"Yes, I want"'
    - id: opt_2
      text: '"No, I don''t want to"'
    - id: opt_3
      text: Not clear
    options_count: 3
    correct_answer: opt_2
    explanation: “No, I don’t want to”! The mouth said yes, but the body said no. Like with soup!
    explanation_status: present
  - step_id: sc5_79
    source_step_id: '79'
    scene_id: sc5
    step_type: theory
    prompt: What exactly gave Dmitry away? Arms crossed - closed like a fortress. Eyes look to the side - does not want contact.
      The voice is boring - like a robot talking.
  - step_id: sc5_80
    source_step_id: '80'
    scene_id: sc5
    step_type: theory
    prompt: Three clues - and all without a single word!
  - step_id: sc5_81
    source_step_id: '81'
    scene_id: sc5
    step_type: theory
    prompt: And Vitya is a real intelligence officer. He turned on his EYE - he didn’t believe the words, but looked at the
      body. And he helped Dmitry understand his feelings.
  - step_id: sc5_82
    source_step_id: '82'
    scene_id: sc5
    step_type: theory
    prompt: 'Today we will learn the same thing. Let''s look at three parts of body language: eye contact and posture, gestures
      and facial expressions, voice and intonation.'
  - step_id: sc5_83
    source_step_id: '83'
    scene_id: sc5
    step_type: instruction
    prompt: Let's go!
- scene_id: sc6
  title: Eye contact and posture
  steps:
  - step_id: sc6_84
    source_step_id: '84'
    scene_id: sc6
    step_type: theory
    prompt: Part one is eye contact and posture.
  - step_id: sc6_85
    source_step_id: '85'
    scene_id: sc6
    step_type: theory
    prompt: 'Eye contact is when you look a person in the eyes. It would seem like a trifle. But this is a powerful signal!
      Like a flashlight, it’s pointed at a person, and he immediately feels: I’m here, I’m listening.'
  - step_id: sc6_86
    source_step_id: '86'
    scene_id: sc6
    step_type: theory
    prompt: 'When you look into your eyes, you say three things without words: “I’m listening to you,” “What you say is important
      to me,” and “I’m not afraid.” Attention, interest, confidence - at a glance!'
  - step_id: sc6_87
    source_step_id: '87'
    scene_id: sc6
    step_type: theory
    prompt: What if a person looks to the side or at the floor? Maybe he's embarrassed. Or he's upset. Or he just doesn't
      want to talk. The eyes are a window. Where the eyes look, there is attention.
  - step_id: sc6_88
    source_step_id: '88'
    scene_id: sc6
    step_type: theory
    prompt: Masha tells Dmitrik what happened during the holidays. Dmitry looks into her eyes and nods. Masha feels that she
      is being listened to! She wants to talk further.
  - step_id: sc6_89
    source_step_id: '89'
    scene_id: sc6
    step_type: theory
    prompt: And now another Dmitry. Same Masha, same story. But Dmitrik turned his attention to the phone. Masha falls silent.
      Why tell if no one is watching? Although maybe he is listening! But Masha doesn’t SEE this.
  - step_id: sc6_90
    source_step_id: '90'
    scene_id: sc6
    step_type: theory
    prompt: Now - the pose. Posture is how your body is positioned. And there are two options.
  - step_id: sc6_91
    source_step_id: '91'
    scene_id: sc6
    step_type: theory
    prompt: Open pose - hands free, body turned towards the person. It’s as if you’re saying, “Come in! I'm glad! Let's talk!
      " Imagine that you are a door. Open pose - the door is wide open.
  - step_id: sc6_92
    source_step_id: '92'
    scene_id: sc6
    step_type: theory
    prompt: Closed pose - arms crossed on the chest, body turned away. “I feel uncomfortable. Don't come near. I'm defending
      myself." The same door - but slammed and locked.
  - step_id: sc6_93
    source_step_id: '93'
    scene_id: sc6
    step_type: theory
    prompt: Mikola approaches Masha during recess and wants to draw together. Masha sits, hands on the table, turned to him,
      smiling. Mikola feels - you can come over! The door is open.
  - step_id: sc6_94
    source_step_id: '94'
    scene_id: sc6
    step_type: theory
    prompt: 'What if Masha sits with her arms crossed, turned to the wall and doesn’t look? Mikola will think: something is
