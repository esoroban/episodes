scenes:
- scene_id: sc1
  title: 'BIG WARM-UP: REVIEW OF THE COURSE'
  steps:
  - step_id: sc1_1
    source_step_id: '1'
    scene_id: sc1
    step_type: theory
    prompt: Warm-up! Today we'll check what stuck in your heads throughout the course. Mixed topics, be careful - there are
      facts and checks and traps and everything!
  - step_id: sc1_2
    source_step_id: '2'
    scene_id: sc1
    step_type: single_choice
    prompt: 'A friend says: ''I jump farther than anyone in class!'' How do you check?'
    options:
    - id: opt_1
      text: Ask the teacher
    - id: opt_2
      text: Measure with a ruler
    - id: opt_3
      text: Believe them
    options_count: 3
    correct_answer: opt_2
    explanation: Measure! Measurement is one of four ways to check. A ruler doesn't lie, unlike friends at break.
    explanation_status: implicit
  - step_id: sc1_4
    source_step_id: '4'
    scene_id: sc1
    step_type: single_choice
    prompt: '"Our cafeteria has the tastiest cutlets in the city!" What verification method fits?'
    options:
    - id: opt_1
      text: Your own eyes (taste it)
    - id: opt_2
      text: Experiment
    - id: opt_3
      text: Reference
    options_count: 3
    correct_answer: opt_1
    explanation: Taste it yourself - checking 'with your own eyes!' True, for experimental purity you'd need to visit every
      cafeteria in the city. Good luck.
    explanation_status: implicit
  - step_id: sc1_6
    source_step_id: '6'
    scene_id: sc1
    step_type: single_choice
    prompt: '"I put on new sneakers - and ran faster than everyone!"'
    options:
    - id: opt_1
      text: Cause
    - id: opt_2
      text: Coincidence
    options_count: 2
    correct_answer: opt_2
    explanation: Coincidence! Sneakers don't give superhuman speed. Maybe she slept well. Or everyone else was off.
    explanation_status: implicit
  - step_id: sc1_8
    source_step_id: '8'
    scene_id: sc1
    step_type: single_choice
    prompt: '"We watered the plant - and it grew."'
    options:
    - id: opt_1
      text: Cause
    - id: opt_2
      text: Coincidence
    options_count: 2
    correct_answer: opt_1
    explanation: Cause! Water is needed for growth - this is proven by science, not superstition.
    explanation_status: implicit
  - step_id: sc1_10
    source_step_id: '10'
    scene_id: sc1
    step_type: single_choice
    prompt: 'Argument about turns. Masha: ''It''s your turn to clean the board.'' Petya: ''But you were late to PE yesterday!'''
    options:
    - id: opt_1
      text: On topic
    - id: opt_2
      text: Dodging the topic
    options_count: 2
    correct_answer: opt_2
    explanation: Classic dodge! Instead of answering about the board - attacking Masha for something else. The board stays
      dirty.
    explanation_status: implicit
  - step_id: sc1_12
    source_step_id: '12'
    scene_id: sc1
    step_type: single_choice
    prompt: '"NOBODY in our class likes reading!"'
    options:
    - id: opt_1
      text: Word trap
    - id: opt_2
      text: Normal statement
    options_count: 2
    correct_answer: opt_1
    explanation: Trap! The word 'nobody' is absolute. One book lover is enough to disprove it.
    explanation_status: implicit
  - step_id: sc1_14
    source_step_id: '14'
    scene_id: sc1
    step_type: single_choice
    prompt: 'Coach yells: ''I never arrive late!'' - but showed up 20 minutes late.'
    options:
    - id: opt_1
      text: Contradiction
    - id: opt_2
      text: Everything's fine
    options_count: 2
    correct_answer: opt_1
    explanation: Contradiction! Words say one thing, feet do another. Believe actions - they can't lie.
    explanation_status: implicit
  - step_id: sc1_16
    source_step_id: '16'
    scene_id: sc1
    step_type: single_choice
    prompt: 'You: ''I don''t want to eat soup.'' Grandma: ''So you don''t want to eat ANYTHING?!'''
    options:
    - id: opt_1
      text: Scarecrow
    - id: opt_2
      text: Normal question
    options_count: 2
    correct_answer: opt_1
    explanation: Scarecrow! 'Don't want soup' turned into 'don't want to eat.' Grandma is a master dramatist.
    explanation_status: implicit
  - step_id: sc1_18
    source_step_id: '18'
    scene_id: sc1
    step_type: single_choice
    prompt: '"If you don''t clean your room - mom will be upset, then she''ll get sick, then everything will be terrible!"'
    options:
    - id: opt_1
      text: Scary chain
    - id: opt_2
      text: Real threat
    options_count: 2
    correct_answer: opt_1
    explanation: Scary chain! One messy room - and the world collapses. Disaster film writers are jealous.
    explanation_status: implicit
  - step_id: sc1_20
    source_step_id: '20'
    scene_id: sc1
    step_type: single_choice
    prompt: '"Buy these vitamins - a famous actor recommends them!" What''s the method of persuasion?'
    options:
    - id: opt_1
      text: Trust (authority)
    - id: opt_2
      text: Emotions
    - id: opt_3
      text: Facts
    options_count: 3
    correct_answer: opt_1
    explanation: Trust! Bet on authority. But an actor isn't a doctor. Trust goes to someone who knows the subject.
    explanation_status: implicit
  - step_id: sc1_22
    source_step_id: '22'
    scene_id: sc1
    step_type: single_choice
    prompt: '"Have you stopped copying from your neighbor?"'
    options:
    - id: opt_1
      text: Normal question
    - id: opt_2
      text: Trap question
    options_count: 2
    correct_answer: opt_2
    explanation: 'Trap! Hidden inside is the claim ''you copied.'' Any answer is a trap. Right response: ''There''s a false
      assumption in that question!'''
    explanation_status: present
  - step_id: sc1_24
    source_step_id: '24'
    scene_id: sc1
    step_type: single_choice
    prompt: '"A famous football player says this diet works!"'
    options:
    - id: opt_1
      text: Real authority
    - id: opt_2
      text: False authority
    options_count: 2
    correct_answer: opt_2
    explanation: False! A football player is an expert in the ball, not dietetics. Ask the ball about him - it's definitely
      in shape.
    explanation_status: implicit
  - step_id: sc1_26
    source_step_id: '26'
    scene_id: sc1
    step_type: single_choice
    prompt: '"We have free time - so we can do WHATEVER!"'
    options:
    - id: opt_1
      text: Substituting concepts
    - id: opt_2
      text: Normal logic
    options_count: 2
    correct_answer: opt_1
    explanation: Substitution! 'Free' was replaced with 'no rules.' Free time isn't a jungle. Rules still apply.
    explanation_status: implicit
  - step_id: sc1_28
    source_step_id: '28'
    scene_id: sc1
    step_type: single_choice
    prompt: '"Chocolate ice cream tastes better than vanilla."'
    options:
    - id: opt_1
      text: Fact
    - id: opt_2
      text: Opinion
    - id: opt_3
      text: Falsehood
    options_count: 3
    correct_answer: opt_2
    explanation: Opinion! Taste is subjective. Vanilla fans would disagree.
    explanation_status: present
  - step_id: sc1_30
    source_step_id: '30'
    scene_id: sc1
    step_type: single_choice
    prompt: '"The Moon orbits the Earth."'
    options:
    - id: opt_1
      text: Fact
    - id: opt_2
      text: Opinion
    - id: opt_3
      text: Falsehood
    options_count: 3
    correct_answer: opt_1
    explanation: Fact! Verifiable, proven, with formulas and telescopes. The Moon doesn't deny it.
    explanation_status: present
- scene_id: sc2
  title: DEMAGOGUERY OR NOT?
  steps:
  - step_id: sc2_32
    source_step_id: '32'
    scene_id: sc2
    step_type: theory
    prompt: 'Now - quick blitz! I say a phrase, you decide: demagoguery or honest argument? Only two options - no tricks!'
  - step_id: sc2_33
    source_step_id: '33'
    scene_id: sc2
    step_type: single_choice
    prompt: '"All normal kids have already watched this!"'
    options:
    - id: opt_1
      text: Demagoguery
    - id: opt_2
      text: Honest argument
    options_count: 2
    correct_answer: opt_1
    explanation: Demagoguery - hasty generalization! Who is 'all'? Did you count everyone?
    explanation_status: implicit
  - step_id: sc2_35
    source_step_id: '35'
    scene_id: sc2
    step_type: single_choice
    prompt: '"I think it''s better to start with math - it''s harder and needs a fresh mind."'
    options:
    - id: opt_1
      text: Demagoguery
    - id: opt_2
      text: Honest argument
    options_count: 2
    correct_answer: opt_2
    explanation: Honest argument! There's a reason, there's logic, no tricks.
    explanation_status: implicit
  - step_id: sc2_37
    source_step_id: '37'
    scene_id: sc2
    step_type: single_choice
    prompt: '"You''re too young to understand this!"'
    options:
    - id: opt_1
      text: Demagoguery
    - id: opt_2
      text: Honest argument
    options_count: 2
    correct_answer: opt_1
    explanation: Demagoguery - attack on the person! Age doesn't determine understanding. Small children catch things adults
      miss.
    explanation_status: implicit
  - step_id: sc2_39
    source_step_id: '39'
    scene_id: sc2
    step_type: single_choice
    prompt: '"I don''t like talking about myself - because weird people misunderstand."'
    options:
    - id: opt_1
      text: Demagoguery
    - id: opt_2
      text: Honest argument
    options_count: 2
    correct_answer: opt_1
    explanation: Honest argument! Reason given - for safety. Logical and reasonable.
    explanation_status: implicit
  - step_id: sc2_41
    source_step_id: '41'
    scene_id: sc2
    step_type: single_choice
    prompt: '"Playing chess is boring and dull! All modern kids play something more interesting!"'
    options:
    - id: opt_1
      text: Demagoguery
    - id: opt_2
      text: Honest argument
    options_count: 2
    correct_answer: opt_2
    explanation: Demagoguery - hasty generalization and attack! 'Boring' is opinion. 'All modern kids' - who counted?
    explanation_status: implicit
  - step_id: sc2_43
    source_step_id: '43'
    scene_id: sc2
    step_type: single_choice
    prompt: '"Jam at breakfast slows your system by an hour!"'
    options:
    - id: opt_1
      text: Demagoguery
    - id: opt_2
      text: Honest argument
    options_count: 2
    correct_answer: opt_1
    explanation: Demagoguery - false cause! If there's a source - name it! Where do these numbers come from? No such research
      exists.
    explanation_status: implicit
  - step_id: sc2_45
    source_step_id: '45'
    scene_id: sc2
    step_type: single_choice
    prompt: '"I think this book is worth reading - it has a sad story that makes you think."'
    options:
    - id: opt_1
      text: Demagoguery
    - id: opt_2
      text: Honest argument
    options_count: 2
    correct_answer: opt_1
    explanation: Honest argument! It's an opinion with a reason. Not a lie, not a trick.
    explanation_status: implicit
  - step_id: sc2_47
    source_step_id: '47'
    scene_id: sc2
    step_type: single_choice
    prompt: '"Steve Jobs slept little - and became a billionaire! So sleeping little is the path to success!"'
    options:
    - id: opt_1
      text: Demagoguery
    - id: opt_2
      text: Honest argument
    options_count: 2
    correct_answer: opt_2
    explanation: Demagoguery - false cause! He became a billionaire from work and talent, not lack of sleep. Scientists get
      sick from it.
    explanation_status: implicit
  - step_id: sc2_49
    source_step_id: '49'
    scene_id: sc2
    step_type: single_choice
    prompt: '"All twenty teachers say a grill is worth buying!"'
    options:
    - id: opt_1
      text: Demagoguery
    - id: opt_2
      text: Honest argument
    options_count: 2
    correct_answer: opt_1
    explanation: Demagoguery - hasty generalization! All twenty teachers? Seriously?
    explanation_status: implicit
  - step_id: sc2_51
    source_step_id: '51'
    scene_id: sc2
    step_type: single_choice
    prompt: '"What do you know about music - you can''t even play the piano!"'
    options:
    - id: opt_1
      text: Demagoguery
    - id: opt_2
      text: Honest argument
    options_count: 2
    correct_answer: opt_1
    explanation: Demagoguery - attack on the person! You don't have to play piano to understand music.
    explanation_status: implicit
- scene_id: sc3
  title: '"You said ''I don''t like semolina'' - so you don''t want to eat ANYTHING?!"'
  steps:
  - step_id: sc3_53
    source_step_id: '53'
    scene_id: sc3
    step_type: theory
    prompt: And now - the fun part! To expose demagogy, you need to understand how it works from the inside. Now YOU will
      be demagogues! I give a situation and a type of cunning - and you come up with a demagogic phrase. Then we’ll compare
      it with my version.
  - step_id: sc3_54
    source_step_id: '54'
    scene_id: sc3
    step_type: theory
    prompt: 'Remember: we learn this NOT to be cunning, but to see through the cunning. Who knows how the trap works - he
      won’t fall into it!'
  - step_id: sc3_55
    source_step_id: '55'
    scene_id: sc3
    step_type: open_question
    prompt: Demagoguery - scarecrow! 'Don't like semolina' turned into 'don't want anything.' Imagination at max.
  - step_id: sc3_56
    source_step_id: '56'
    scene_id: sc3
    step_type: theory
    prompt: '"A famous racer advertises this shampoo - get it, you won''t regret it!"'
  - step_id: sc3_57
    source_step_id: '57'
    scene_id: sc3
    step_type: open_question
    prompt: 'You want the class to pick YOUR idea for the project, not Kostya''s. Type: attack on the person. — Hint: hit
      Kostya, not his idea.'
  - step_id: sc3_58
    source_step_id: '58'
    scene_id: sc3
    step_type: theory
    prompt: “Kostya came up with such nonsense last time - why listen to him?” — Kostya’s idea wasn’t even discussed. Immediately
      on the person.
  - step_id: sc3_59
    source_step_id: '59'
    scene_id: sc3
    step_type: open_question
    prompt: Demagoguery - false authority! A racer understands speed, not shampoo.
  - step_id: sc3_60
    source_step_id: '60'
    scene_id: sc3
    step_type: theory
    prompt: '"Either you eat broccoli, or you get nothing sweet!"'
  - step_id: sc3_61
    source_step_id: '61'
    scene_id: sc3
    step_type: open_question
    prompt: 'You''re trying to convince mom to buy you a new phone, but she thinks the old one is fine. Type: false authority.
      — Hint: reference someone famous who knows nothing about phones.'
  - step_id: sc3_62
    source_step_id: '62'
    scene_id: sc3
    step_type: theory
    prompt: “My favorite football player uses this phone!” — A football player is an expert in goals, not gadgets. But it
      sounds significant!
  - step_id: sc3_63
    source_step_id: '63'
    scene_id: sc3
    step_type: open_question
    prompt: Demagoguery - false dilemma! What about the option 'eat a carrot instead of broccoli'?
    teacher_guidance: What about the option 'eat a carrot instead of broccoli'?
  - step_id: sc3_64
    source_step_id: '64'
    scene_id: sc3
    step_type: theory
    prompt: '"Be late once - you''ll get used to it, then you''ll be late to work, then you''ll be fired!"'
  - step_id: sc3_65
    source_step_id: '65'
    scene_id: sc3
    step_type: open_question
    prompt: 'You want mom to let you skip soup, but she insists. Type: scary chain. — Hint: stretch one bowl of soup into
      a chain of horrors.'
  - step_id: sc3_66
    source_step_id: '66'
    scene_id: sc3
    step_type: theory
    prompt: “If I eat this soup, I’ll feel bad, I won’t be able to do my homework, I’ll get a bad grade, and the whole quarter
      will be ruined!” — One soup → a spoiled quarter. Olympic record for logic jumps.
  - step_id: sc3_67
    source_step_id: '67'
    scene_id: sc3
    step_type: open_question
    prompt: Demagoguery - scary chain! One late arrival to school - straight to firing twenty years later.
  - step_id: sc3_68
    source_step_id: '68'
    scene_id: sc3
    step_type: theory
    prompt: '"Have you already agreed my plan is better, or are you still thinking?"'
  - step_id: sc3_69
    source_step_id: '69'
    scene_id: sc3
    step_type: open_question
    prompt: 'Teacher said "be independent," but you want to skip homework. Type: substitution of concepts. — Hint: swap "independent"
      with "I do what I want."'
  - step_id: sc3_70
    source_step_id: '70'
    scene_id: sc3
    step_type: theory
    prompt: “The teacher told me to be independent, so I decided not to do my homework on my own!” — “Independent” was replaced
      with “willful.” The word was stolen and changed.
  - step_id: sc3_71
    source_step_id: '71'
    scene_id: sc3
    step_type: open_question
    prompt: Demagoguery - trap question! Both options lead to 'my plan is better.' No escape.
  - step_id: sc3_72
    source_step_id: '72'
    scene_id: sc3
    step_type: theory
    prompt: '"The teacher said ''work independently'' - so I decide when to leave!"'
  - step_id: sc3_73
    source_step_id: '73'
    scene_id: sc3
    step_type: open_question
    prompt: 'Mom asks why you didn''t clean your room, but you don''t want to answer. Type: dodging the question. — Hint:
      change the subject to something else.'
  - step_id: sc3_74
    source_step_id: '74'
    scene_id: sc3
    step_type: theory
    prompt: “By the way, mom, did you see what grade I got today? Let’s talk about it better!” — The room is still dirty,
      but the grade is in the spotlight.
  - step_id: sc3_75
    source_step_id: '75'
    scene_id: sc3
    step_type: open_question
    prompt: Demagoguery - substituting concepts! 'Independently' replaced with 'I do what I want.'
  - step_id: sc3_76
    source_step_id: '76'
    scene_id: sc3
    step_type: theory
    prompt: '"I ate grandma''s pie - and got an A on the test. The pie is magical!"'
  - step_id: sc3_77
    source_step_id: '77'
    scene_id: sc3
    step_type: open_question
    prompt: 'In robotics club, Anya suggested a different design, but you want yours. Type: attack. — Hint: hit Anya, not
      her design.'
  - step_id: sc3_78
    source_step_id: '78'
    scene_id: sc3
    step_type: theory
    prompt: “Anya, you’ve only been in the circle for a month—what ideas might you have?” — The design was not discussed.
      But they counted the experience.
  - step_id: sc3_79
    source_step_id: '79'
    scene_id: sc3
    step_type: open_question
    prompt: Demagoguery - false cause! Pie is tasty, but grades come from studying, not filling.
  - step_id: sc3_80
    source_step_id: '80'
    scene_id: sc3
    step_type: theory
    prompt: '"Why discuss the schedule? Let''s talk about vacation instead!"'
  - step_id: sc3_81
    source_step_id: '81'
    scene_id: sc3
    step_type: open_question
    prompt: 'You want to convince the class that the test should be postponed. Type: false authority. — Hint: reference someone
      famous who has nothing to do with school.'
  - step_id: sc3_82
    source_step_id: '82'
    scene_id: sc3
    step_type: theory
    prompt: “A famous blogger says tests are stressful and should be cancelled!” — The blogger understands likes, not pedagogy.
      But it sounds authoritative.
  - step_id: sc3_83
    source_step_id: '83'
    scene_id: sc3
    step_type: open_question
    prompt: Demagoguery - dodging the question! Hidden the schedule topic behind vacation. A slick move.
  - step_id: sc3_84
    source_step_id: '84'
    scene_id: sc3
    step_type: theory
    prompt: '"Our club is the best! We''re powerful! We''ll show everyone!" (no performance plan)'
  - step_id: sc3_85
    source_step_id: '85'
    scene_id: sc3
    step_type: open_question
    prompt: 'You want your friend to skip the training session and go with you instead. Type: scary chain. — Hint: from one
      missed workout to complete disaster.'
  - step_id: sc3_86
    source_step_id: '86'
    scene_id: sc3
    step_type: theory
    prompt: “If you miss one, then the second, you’ll lose your form, you’ll be kicked out of the team, you’ll sit on the
      bench for the rest of your life!” — One workout → shop forever. What a flight of fancy.
  - step_id: sc3_87
    source_step_id: '87'
    scene_id: sc3
    step_type: open_question
    prompt: Demagoguery - beautiful words without facts! Three slogans, zero specifics. When, where, how will we show?
    teacher_guidance: When, where, how will we show?
  - step_id: sc3_88
    source_step_id: '88'
    scene_id: sc3
    step_type: theory
    prompt: '"I''m not saying you''re stingy, but... you''ve never offered me candy."'
  - step_id: sc3_89
    source_step_id: '89'
    scene_id: sc3
    step_type: open_question
    prompt: 'Coach said "show initiative," but you want to leave practice early. Type: substitution of concepts. — Hint: swap
      "initiative" with "freedom to leave."'
  - step_id: sc3_90
    source_step_id: '90'
    scene_id: sc3
    step_type: theory
    prompt: '« — : !» — “Initiative” turned into “I do what I want.” Classic substitution.'
  - step_id: sc3_91
    source_step_id: '91'
    scene_id: sc3
    step_type: open_question
    prompt: Demagoguery - 'I'm not saying...' - that's exactly what you said! A bow doesn't hide a rock.
  - step_id: sc3_92
    source_step_id: '92'
    scene_id: sc3
    step_type: theory
    prompt: “Last time I sat by the window and wrote perfectly! The window brings good luck - I need this place! - The window
      has nothing to do with it. But coincidence just begs to be a reason.
  - step_id: sc3_93
    source_step_id: '93'
    scene_id: sc3
    step_type: open_question
    prompt: Today you've created a complete map of demagoguery - twelve tricks. You've been both investigators and demagogues.
      You've learned Vladik's story - and understood that winning through tricks costs more than it seems.
  - step_id: sc3_94
    source_step_id: '94'
    scene_id: sc3
    step_type: theory
    prompt: 'Remember: people don''t always see tricks - but they always feel them. And whoever argues honestly - with facts,
      with respect - wins not the argument, but trust. And that''s worth more than any victory.'
- scene_id: sc4
  title: At home, try to find demagoguery in ads, cartoons, conversations. It's everywhere - when you know where to look.
    And in the next lesson, we'll meet something even trickier - manipulation!
  steps:
  - step_id: sc4_95
    source_step_id: '95'
    scene_id: sc4
    step_type: theory
    prompt: Manipulation is when you strike at emotions, not logic. It'll be interesting! Rest up - see you later!
  - step_id: sc4_96
    source_step_id: '96'
    scene_id: sc4
    step_type: theory
    prompt: 'During break Dima shouts: "EVERYONE already paid for the excursion! You''re the ONLY one left!" In reality, only
      three out of twenty-five paid. But the word ''everyone'' sounds so convincing.'
  - step_id: sc4_97
    source_step_id: '97'
    scene_id: sc4
    step_type: theory
    prompt: 'Hasty generalization - when they say ''everyone,'' ''nobody,'' ''always,'' ''never'' without proof. Answer: "Really
      everyone? Name them specifically!"'
  - step_id: sc4_98
    source_step_id: '98'
    scene_id: sc4
    step_type: theory
    prompt: 'Lena suggests a new route for the hike. Vadim snorts: "Lena, you got lost in the park last time - what routes
      are you talking about?" The route wasn''t even discussed.'
  - step_id: sc4_99
    source_step_id: '99'
    scene_id: sc4
    step_type: theory
    prompt: 'Personal attack - criticizing the author, not the idea. Experience, age, past mistakes - everything comes into
      play. Answer: "Talk about the route, not about me!"'
  - step_id: sc4_100
    source_step_id: '100'
    scene_id: sc4
    step_type: theory
    prompt: 'Sasha says: "I don''t want to run cross-country." Trainer: "So you want to NOT do sports at all and become weak?!"
      Sasha wanted to skip the cross-country, not quit sports.'
  - step_id: sc4_101
    source_step_id: '101'
    scene_id: sc4
    step_type: theory
    prompt: 'Scarecrow - distorting someone''s words to absurdity to make it easier to argue. Answer: "I said ''I don''t want
      cross-country,'' not ''I''m quitting sports.'' Don''t distort!"'
  - step_id: sc4_102
    source_step_id: '102'
    scene_id: sc4
    step_type: theory
    prompt: 'Advertisement: "A famous singer recommends these vitamins!" The singer understands notes, not vitamins. But her
      face is on the package - and everyone believes.'
  - step_id: sc4_103
    source_step_id: '103'
    scene_id: sc4
    step_type: theory
    prompt: 'False authority - referring to someone who is NOT an expert on the topic. Answer: "Is she a doctor? How does
      she know about vitamins?"'
  - step_id: sc4_104
    source_step_id: '104'
    scene_id: sc4
    step_type: theory
    prompt: 'Katya tells her friend: "Either you come with me to the rink, or we''re not friends anymore!" And the options
      "go tomorrow," "go to the movies," or "just stay friends" - disappeared.'
  - step_id: sc4_105
    source_step_id: '105'
    scene_id: sc4
    step_type: theory
    prompt: 'False dilemma - leaving only two options when there are more. Answer: "Why only two? What other options are there?"'
  - step_id: sc4_106
    source_step_id: '106'
    scene_id: sc4
    step_type: theory
    prompt: 'Mom: "Don''t do homework - you''ll get a bad grade, repeat the year, won''t get into any school, live in a box!"
      One homework - and straight to a box.'
  - step_id: sc4_107
    source_step_id: '107'
    scene_id: sc4
    step_type: theory
    prompt: 'Scary chain - building a staircase of horrors from one step without proof. Answer: "How do you know what comes
      next? Where''s the connection?"'
  - step_id: sc4_108
    source_step_id: '108'
    scene_id: sc4
    step_type: theory
    prompt: 'A classmate asks: "Did you stop cheating?" Say ''yes'' - means you used to cheat. Say ''no'' - you still cheat.
      Any answer is a trap.'
  - step_id: sc4_109
    source_step_id: '109'
    scene_id: sc4
    step_type: theory
    prompt: 'Question trap - a false statement hidden inside. Answer: "There''s a lie hidden in your question. I didn''t cheat
      - prove it!"'
  - step_id: sc4_110
    source_step_id: '110'
    scene_id: sc4
    step_type: theory
    prompt: 'Teacher: "Be creative!" Misha draws comics instead of doing assignments in class: "I''m creative!" The word ''creative''
      was replaced with ''do what I want.'''
  - step_id: sc4_111
    source_step_id: '111'
    scene_id: sc4
    step_type: theory
    prompt: 'Substitution of concepts - taking a word and changing its meaning subtly. Answer: "Creative doesn''t mean ignoring
      assignments. You substituted the concept!"'
  - step_id: sc4_112
    source_step_id: '112'
    scene_id: sc4
    step_type: theory
    prompt: 'Artem: "I put on red socks - and we won the match! Socks bring luck!" The team trained for a month, but of course
      the socks are to blame.'
  - step_id: sc4_113
    source_step_id: '113'
    scene_id: sc4
    step_type: theory
    prompt: 'False cause - ''after this'' doesn''t mean ''because of this.'' Coincidence is not cause. Answer: "Maybe you
      just trained well?"'
  - step_id: sc4_114
    source_step_id: '114'
    scene_id: sc4
    step_type: theory
    prompt: 'Mom: "Why didn''t you clean your room?" Son: "By the way, mom, Petya''s dad bought him a new bike! Can you imagine?"
      The room is dirty, but the bike is discussed.'
  - step_id: sc4_115
    source_step_id: '115'
    scene_id: sc4
    step_type: theory
    prompt: 'Dodging the answer - switching the topic instead of answering. Answer: "Stop, you didn''t answer. Get back to
      the question!"'
  - step_id: sc4_116
    source_step_id: '116'
    scene_id: sc4
    step_type: theory
    prompt: 'At school council, Bogdan stands up: "Our class is the friendliest! We''re a dream team! We deserve better! We''ll
      conquer any peak!" Everyone claps. Someone asks: "So where are we going?" Bogdan: "...Uh... uh..."'
  - step_id: sc4_117
    source_step_id: '117'
    scene_id: sc4
    step_type: theory
    prompt: 'Beautiful words without facts - lots of pathos, zero specifics. Like a festive wrapper without candy: rustles,
      shines, but there''s nothing to chew. Answer: "Nice! But where are the facts?"'
  - step_id: sc4_118
    source_step_id: '118'
    scene_id: sc4
    step_type: theory
    prompt: 'Liza tells Marina: "I don''t want to say you''re a bad friend, but... everyone noticed you didn''t come to my
      birthday." Marina is confused. But Liza said EXACTLY what she "didn''t want" - "you''re a bad friend."'
  - step_id: sc4_119
    source_step_id: '119'
    scene_id: sc4
    step_type: theory
    prompt: '"I''m not saying that..." - someone says something offensive but hides behind a polite phrase. A stone in a box
      with a bow - the stone doesn''t become softer from that. Answer: "You said exactly that. Speak directly!"'
  - step_id: sc4_120
    source_step_id: '120'
    scene_id: sc4
    step_type: theory
    prompt: 'Twelve types of demagoguery! And one universal answer to all: "This is demagoguery. Where are the facts?" Anyone
      who remembers all twelve won''t be afraid of any trickster.'
- scene_id: sc5
  title: WHY YOU SHOULDN'T USE DEMAGOGUERY
  steps:
  - step_id: sc5_121
    source_step_id: '121'
    scene_id: sc5
    step_type: theory
    prompt: 'You now know all twelve tricks. A temptation arises: maybe use them yourself? Clever, effective, works... Let
      me tell you the story of Vladik.'
  - step_id: sc5_122
    source_step_id: '122'
    scene_id: sc5
    step_type: theory
    prompt: 'Vladik is a master of words. The most eloquent in the class. When it came time to decide where to go on the excursion,
      Vladik spoke up: "EVERYONE wants to go to the water park! Only nerds want to go to the museum!" The class voted for
      the water park.'
  - step_id: sc5_123
    source_step_id: '123'
    scene_id: sc5
    step_type: theory
    prompt: 'When Oleg suggested a different route for the school hike, Vladik said: "Oleg, you forgot your backpack last
      time - what routes are you talking about?" Everyone laughed. Oleg fell silent. They went on Vladik''s route.'
  - step_id: sc5_124
    source_step_id: '124'
    scene_id: sc5
    step_type: theory
    prompt: 'When Anya said she didn''t want to play on his team, Vladik came out with: "So you don''t want to play with anyone
      and will sit alone?!" Anya was confused and agreed. Vladik won again.'
  - step_id: sc5_125
    source_step_id: '125'
    scene_id: sc5
    step_type: theory
    prompt: Vladik won every argument. Every vote. Every time the class did what Vladik wanted. He was delighted. But then
      something strange happened.
  - step_id: sc5_126
    source_step_id: '126'
    scene_id: sc5
    step_type: theory
    prompt: 'Everyone in the class was invited to Masha''s birthday. Except Vladik. He asked: "Why?" Masha shrugged: "I don''t
      know... just don''t feel like it." Oleg said: "With you it''s somehow... uncomfortable." Anya added: "You always out-argue
      everyone."'
  - step_id: sc5_127
    source_step_id: '127'
    scene_id: sc5
    step_type: theory
    prompt: 'Vladik didn''t understand. He never offended anyone! He just... spoke cleverly. But here''s the thing: people
      don''t always SEE the trick, but they ALWAYS FEEL it. Oleg didn''t know the word "attack" - but remembered how uncomfortable
      he felt. Anya didn''t know the word "scarecrow" - but remembered how cornered she felt.'
  - step_id: sc5_128
    source_step_id: '128'
    scene_id: sc5
    step_type: theory
    prompt: 'This is the main lesson from Vladik''s story: demagoguery works ONCE. You win the argument - but lose trust.
      People won''t say "that was a personal attack" - they''ll say "he''s uncomfortable to be around" and stop inviting him.'
  - step_id: sc5_129
    source_step_id: '129'
    scene_id: sc5
    step_type: open_question
    prompt: 'What do you think Vladik could have done differently? Could he win arguments AND stay friends? — Hint: remember
      honest arguments - with facts, no tricks.'
    teacher_guidance: What do you think Vladik could have done differently? Could he win arguments AND stay friends?
  - step_id: sc5_130
    source_step_id: '130'
    scene_id: sc5
    step_type: theory
    prompt: Of course he could! Instead of 'everyone wants the water park' - ask and count. Instead of attacking Oleg - discuss
      the route. Honest arguments take longer, are harder - but after them you get invited to birthday parties.
  - step_id: sc5_131
    source_step_id: '131'
    scene_id: sc5
    step_type: theory
    prompt: 'Remember five reasons not to use demagoguery. First: you lose trust - people stop believing you even when you
      tell the truth. Second: you lose friends - no one wants to be friends with someone who always cheats.'
  - step_id: sc5_132
    source_step_id: '132'
    scene_id: sc5
    step_type: theory
    prompt: 'Third: bad reputation - "he always out-argues everyone" is hard to fix. Fourth: boomerang effect - others will
      start cheating with you in return. Fifth: you don''t learn to argue honestly - and when you need real arguments, you
      won''t have them.'
  - step_id: sc5_133
    source_step_id: '133'
    scene_id: sc5
    step_type: theory
    prompt: 'Demagoguery is like a loan: victory today, but you pay later with trust and friends. And honest arguments are
      like an investment: harder now, but respect for life. The choice is yours!'
