source_lesson_id: lesson_8A
language: en
title: Distorting Words — "Scarecrow"
day: 8
slot: A
scenes:
- scene_id: sc1
  title: Warm-up — Reviewing Complex Topics
  steps:
  - step_id: sc1_1
    source_step_id: '1'
    scene_id: sc1
    step_type: instruction
    prompt: Before we start the new topic—a quick warm-up! Eight rounds of the trickiest topics we've already covered. Each
      round is from a different lesson. Whoever remembers everything is a true master of words. Let's go!
  - step_id: sc1_2
    source_step_id: '2'
    scene_id: sc1
    step_type: theory
    prompt: '"Chocolate is better than vegetables because it''s tastier."'
  - step_id: sc1_3
    source_step_id: '3'
    scene_id: sc1
    step_type: single_choice
    prompt: '"Chocolate is better than vegetables because it''s tastier."'
    options:
    - id: opt_1
      text: Fact
    - id: opt_2
      text: Opinion
    - id: opt_3
      text: 'False'
    options_count: 3
    correct_answer: opt_2
    explanation: Opinion! "Better" and "tastier" are personal feelings. Some people think carrots taste better than chocolate.
      Seriously, such people exist.
    explanation_status: present
  - step_id: sc1_5
    source_step_id: '5'
    scene_id: sc1
    step_type: theory
    prompt: 'Lena put on new sneakers and ran faster than everyone. Lena says: "These sneakers helped!"'
  - step_id: sc1_6
    source_step_id: '6'
    scene_id: sc1
    step_type: single_choice
    prompt: Are new sneakers the cause of Lena's fast running?
    options:
    - id: opt_1
      text: Cause
    - id: opt_2
      text: Coincidence
    - id: opt_3
      text: Need to check
    options_count: 3
    correct_answer: opt_3
    explanation: Need to check! Maybe Lena had trained. Maybe the others ran slower. Once is not proof. Need to run in the
      old sneakers and compare.
    explanation_status: implicit
  - step_id: sc1_8
    source_step_id: '8'
    scene_id: sc1
    step_type: theory
    prompt: 'Advertisement: "Famous footballer Marco eats this yogurt! Be like Marco!"'
  - step_id: sc1_9
    source_step_id: '9'
    scene_id: sc1
    step_type: single_choice
    prompt: Which persuasion technique does the advertisement use?
    options:
    - id: opt_1
      text: Trust (ethos)
    - id: opt_2
      text: Emotions (pathos)
    - id: opt_3
      text: Facts (logos)
    options_count: 3
    correct_answer: opt_1
    explanation: Trust! The advertisement uses a celebrity's authority. But Marco is an expert in football, not yogurt. His
      fame is not proof of quality.
    explanation_status: implicit
  - step_id: sc1_11
    source_step_id: '11'
    scene_id: sc1
    step_type: theory
    prompt: 'Mom says: "You never clean your room!"'
  - step_id: sc1_12
    source_step_id: '12'
    scene_id: sc1
    step_type: single_choice
    prompt: Is there a word trap here?
    options:
    - id: opt_1
      text: Yes, trap
    - id: opt_2
      text: No, it's accurate
    options_count: 2
    correct_answer: opt_1
    explanation: 'Trap! "Never" is an absolute word. Likely you do sometimes clean your room. More accurate would be: "You
      rarely clean your room."'
    explanation_status: implicit
  - step_id: sc1_14
    source_step_id: '14'
    scene_id: sc1
    step_type: theory
    prompt: 'School principal: "We have democracy, everyone has a voice!" Then: "We won''t consider the opinions of those
      who have ever been late."'
  - step_id: sc1_15
    source_step_id: '15'
    scene_id: sc1
    step_type: single_choice
    prompt: Is there a contradiction?
    options:
    - id: opt_1
      text: Yes, contradiction
    - id: opt_2
      text: No, it's logical
    options_count: 2
    correct_answer: opt_1
    explanation: Contradiction! Democracy for everyone, but then "except those who were late". That's not democracy. Word
      trap.
    explanation_status: implicit
  - step_id: sc1_17
    source_step_id: '17'
    scene_id: sc1
    step_type: instruction
    prompt: Now we're moving to a new topic. Ready?
  - step_id: sc1_18
    source_step_id: '18'
    scene_id: sc1
    step_type: single_choice
    prompt: 'Scene 1: What is a "Scarecrow"?'
    options:
    - id: opt_1
      text: 'Imagine: you say something simple, and someone turns it into something scary!'
    - id: opt_2
      text: 'For example, you say: "I like walking in the park." And someone responds: "You want to spend all day in the park
        and forget about school!"'
    - id: opt_3
      text: This is called distortion—or in our course—"Scarecrow". Every word changed and something scary came out!
    options_count: 3
    correct_answer: opt_2
    explanation: 'Scene 2: First Type of Scarecrow — Exaggeration'
    explanation_status: implicit
  - step_id: sc1_20
    source_step_id: '20'
    scene_id: sc1
    step_type: instruction
    prompt: 'Maxim says: "I think some school rules are weird." What does Scarecrow do?'
  - step_id: sc1_21
    source_step_id: '21'
    scene_id: sc1
    step_type: single_choice
    prompt: 'It says: "You think ALL rules are weird! You''re against school!"'
    options:
    - id: opt_1
      text: Maxim said SOME—but Scarecrow changed it to ALL. This is expansion distortion.
    - id: opt_2
      text: 'Scene 3: Second Type of Scarecrow — Word Removal'
    - id: opt_3
      text: 'Natasha says: "I think sometimes homework could be made shorter." What does Scarecrow do?'
    options_count: 3
    correct_answer: opt_2
    explanation: 'It says: "You want to abolish homework!"'
    explanation_status: implicit
  - step_id: sc1_23
    source_step_id: '23'
    scene_id: sc1
    step_type: theory
    prompt: Natasha said "sometimes" and "could"—but Scarecrow removed those words. Now it sounds extreme.
  - step_id: sc1_24
    source_step_id: '24'
    scene_id: sc1
    step_type: single_choice
    prompt: 'Scene 4: Third Type of Scarecrow — Adding Words'
    options:
    - id: opt_1
      text: 'Arthur says: "I like computer games." What does Scarecrow do?'
    - id: opt_2
      text: 'It says: "You want to play games all day instead of school and forget your friends!"'
    - id: opt_3
      text: Arthur just said he likes games. But Scarecrow added a whole disaster scenario.
    options_count: 3
    correct_answer: opt_2
    explanation: 'Scene 5: Practicing Recognizing Scarecrow'
    explanation_status: implicit
  - step_id: sc1_26
    source_step_id: '26'
    scene_id: sc1
    step_type: instruction
    prompt: Let's practice. I'll give an example—then you say if it's real criticism or Scarecrow.
- scene_id: sc2
  title: People at school like you, but they don't like you personally!
  steps:
  - step_id: sc2_27
    source_step_id: '27'
    scene_id: sc2
    step_type: theory
    prompt: This might make sense in a bad conversation, but it sounds too harsh.
  - step_id: sc2_28
    source_step_id: '28'
    scene_id: sc2
    step_type: theory
    prompt: 'In class we chose where to go on an excursion. Masha stood up and said: “I think sometimes you can eat sweets.
      Let''s go to a chocolate factory - it''s delicious and interesting to learn how sweets are made."'
  - step_id: sc2_29
    source_step_id: '29'
    scene_id: sc2
    step_type: theory
    prompt: 'Mikola jumped up: “So you want the children to eat only candy and ruin their teeth?!” The class laughed. Masha
      blushed and didn’t know what to answer. It seems that Mikola responded to her words. But something was wrong.'
  - step_id: sc2_30
    source_step_id: '30'
    scene_id: sc2
    step_type: open_question
    prompt: Что не так в ответе Миколы? Что Маша сказала на самом деле?
  - step_id: sc2_31
    source_step_id: '31'
    scene_id: sc2
    step_type: theory
    prompt: 'Scarecrow! That''s a very vague phrase. But it sounds like: "All the kids at school hate you specifically". Too
      harsh.'
  - step_id: sc2_32
    source_step_id: '32'
    scene_id: sc2
    step_type: theory
    prompt: 'Представьте: рыцарь вызывает вас на бой. Он сильный, в доспехах, с мечом. Вы боитесь. И тогда берёте солому,
      набиваете мешок, рисуете лицо, ставите шлем — получается пугало. Бьёте мечом — раз! Пугало падает. «Я победил рыцаря!»
      — кричите вы.'
  - step_id: sc2_33
    source_step_id: '33'
    scene_id: sc2
    step_type: theory
    prompt: 'But the knight stands nearby and looks in surprise. He''s whole. You defeated the scarecrow, not him. It’s the
      same in an argument: if you changed someone else’s words and defeated the stupid version, that means you won the scarecrow,
      not the real argument.'
  - step_id: sc2_34
    source_step_id: '34'
    scene_id: sc2
    step_type: theory
    prompt: 'This technique is called “Scarecrow” - distortion of words. It is found everywhere: at school, at home, on the
      Internet, in the news. Today we will learn to recognize it and defend ourselves.'
- scene_id: sc3
  title: Scarecrow — distortion
  steps:
  - step_id: sc3_35
    source_step_id: '35'
    scene_id: sc3
    step_type: theory
    prompt: Real criticism! That's very specific. You know exactly what it's about.
  - step_id: sc3_36
    source_step_id: '36'
    scene_id: sc3
    step_type: theory
    prompt: 'Первым руку поднял Витя. Он встал, поправил очки и сказал серьёзно, как учёный на конференции: «Предлагаю музей
      космонавтики. Там настоящий скафандр и кусок метеорита. Один раз — но зато какой!»'
  - step_id: sc3_37
    source_step_id: '37'
    scene_id: sc3
    step_type: theory
    prompt: When someone does Scarecrow, don't panic. Find the distortion and call it out.
  - step_id: sc3_38
    source_step_id: '38'
    scene_id: sc3
    step_type: theory
    prompt: 'The class chuckled. Vitya was confused: “Wait, I said it once...” But Dmitrik already continued: “The next proposal
      is an excursion to the library? And then to the archive? Maybe we should go straight to the Museum of Boredom?”'
  - step_id: sc3_39
    source_step_id: '39'
    scene_id: sc3
    step_type: theory
    prompt: Смех стал громче. Витя покраснел. Его идея про космос — настоящий скафандр, метеорит — утонула в карикатуре, которую
      нарисовал Дмитрик. Вместо одной экскурсии — «целый год по музеям».
  - step_id: sc3_40
    source_step_id: '40'
    scene_id: sc3
    step_type: theory
    prompt: 'И тут Оленка подняла руку. Она говорила тихо, но весь класс замолчал: «Дмитрик, Витя сказал — один раз. В музей
      космонавтики. Откуда взялся целый год и музей скуки? Ты споришь не с Витей, а с пугалом.»'
  - step_id: sc3_41
    source_step_id: '41'
    scene_id: sc3
    step_type: theory
    prompt: The class fell silent. Dmitry opened his mouth and closed it. Because Olenka was right. He did not respond to
      Vitya's real idea. He came up with a funny, stupid version - and won it. But Vitya’s idea is whole.
  - step_id: sc3_42
    source_step_id: '42'
    scene_id: sc3
    step_type: open_question
    prompt: '4. Ask: "Do you understand me correctly?"'
  - step_id: sc3_43
    source_step_id: '43'
    scene_id: sc3
    step_type: theory
    prompt: Vitya said “once to the cosmonautics museum.” Dmytrik turned this into “a whole year of just museums.” I exaggerated
      the number, removed the detail about space - and it turned out to be a scarecrow that is easy to argue with.
  - step_id: sc3_44
    source_step_id: '44'
    scene_id: sc3
    step_type: open_question
    prompt: 'Example 1: Expansion'
  - step_id: sc3_45
    source_step_id: '45'
    scene_id: sc3
    step_type: instruction
    prompt: 'You: "I think school could be improved." Person does Scarecrow: "You want to abolish school!" Your response?'
- scene_id: sc4
  title: 'You: "Wait. I said school could be IMPROVED, not abolished. Do you understand me correctly?"'
  steps:
  - step_id: sc4_46
    source_step_id: '46'
    scene_id: sc4
    step_type: theory
    prompt: So, a “bogeyman” is when your words are changed to make it easier to argue with them. But how exactly do they
      change? There are four ways. Each one has a story. Listen carefully, because then you will catch them yourself.
  - step_id: sc4_47
    source_step_id: '47'
    scene_id: sc4
    step_type: theory
    prompt: 'You: "Sometimes I like to be alone and read." Person does Scarecrow: "You hate people and have no friends!" Your
      response?'
  - step_id: sc4_48
    source_step_id: '48'
    scene_id: sc4
    step_type: reflection
    prompt: 'You: "That''s not right. I said I SOMETIMES like to be alone. I love my friends, but I need time for myself.
      That''s normal."'
  - step_id: sc4_49
    source_step_id: '49'
    scene_id: sc4
    step_type: theory
    prompt: 'The second method is simplification. They remove an important detail and the meaning changes. Bogdan on class
      council: “I think you can use a calculator on a physics test when the task is not about counting, but about understanding
      the formula.”'
  - step_id: sc4_50
    source_step_id: '50'
    scene_id: sc4
    step_type: theory
    prompt: 'You: "I don''t like this assignment." Person does Scarecrow: "You hate classes and want to do nothing!" Your
      response?'
  - step_id: sc4_51
    source_step_id: '51'
    scene_id: sc4
    step_type: theory
    prompt: 'You: "Wait. I said I don''t like THIS ASSIGNMENT, not all classes. And I didn''t say I want to do nothing. Do
      you get it?"'
  - step_id: sc4_52
    source_step_id: '52'
    scene_id: sc4
    step_type: theory
    prompt: 'The third method is adding. They attribute something that the person did not say at all. Katya at lunch: “I think
      the soup is too salty today.” Grandmother offended: “So you don’t like my food? I stood at the stove for half a day,
      and you are ungrateful!”'
  - step_id: sc4_53
    source_step_id: '53'
    scene_id: sc4
    step_type: theory
    prompt: 'Ivan said: "I like to read books." He was answered: "You think everyone should sit in the library and forget
      about sports!"'
  - step_id: sc4_54
    source_step_id: '54'
    scene_id: sc4
    step_type: theory
    prompt: 'The fourth method is changing the meaning. They make the idea evil or stupid. Maxim at recess: “Maybe we should
      sometimes play new games, not just football.” Sergei: “Oh, you hate football and want us to quit the team!”'
  - step_id: sc4_55
    source_step_id: '55'
    scene_id: sc4
    step_type: theory
    prompt: '"Let me clarify: I said I like to read, not that everyone must and sports aren''t needed"'
  - step_id: sc4_56
    source_step_id: '56'
    scene_id: sc4
    step_type: theory
    prompt: 'Четыре способа сделать пугало: раздуть, упростить, добавить, вывернуть. И главный сигнал: если после чьего-то
      ответа вам хочется крикнуть «Я этого не говорил!» — перед вами пугало. Запомните это ощущение.'
- scene_id: sc5
  title: First one — returns his words and shows double distortion. Second one — gives up. When you retreat, Scarecrow wins.
    But you were right—clarify and stand your ground!
  steps:
  - step_id: sc5_57
    source_step_id: '57'
    scene_id: sc5
    step_type: theory
    prompt: 'Теперь — ваша очередь. Десять раундов. Я читаю, что человек сказал, и что ему приписали. Вы голосуете: слова
      передали правильно — или это пугало?'
  - step_id: sc5_58
    source_step_id: '58'
    scene_id: sc5
    step_type: theory
    prompt: 'We learned to defend against Scarecrow. But there''s one more important rule—how NOT to make Scarecrow yourself.
      Before answering, repeat in your own words what your opponent said and ask: "Do I understand correctly?"'
  - step_id: sc5_59
    source_step_id: '59'
    scene_id: sc5
    step_type: single_choice
    prompt: 'If your opponent says "Yes"—answer. If they say "No, I meant something else"—clarify. This is the rule of honest
      debate. Let''s practice: I''ll give two retellings—one honest, one Scarecrow.'
    options:
    - id: opt_1
      text: 'Original: "I think sometimes there''s a lot of homework." Which retelling is honest?'
    - id: opt_2
      text: Which retelling is honest?
    options_count: 2
    correct_answer: opt_2
    explanation: '"You think sometimes there''s a lot of homework?"'
    explanation_status: implicit
  - step_id: sc5_61
    source_step_id: '61'
    scene_id: sc5
    step_type: theory
    prompt: 'Сказали: «Мне нравятся кошки.» Приписали: «Тебе нравятся домашние животные, которые мяукают.»'
  - step_id: sc5_62
    source_step_id: '62'
    scene_id: sc5
    step_type: single_choice
    prompt: First! Kept "sometimes" and "I think". Second—removed both words and blew it up into a protest.
    options:
    - id: opt_1
      text: 'Original: "It would be great if breaks were longer." Which retelling is honest?'
    - id: opt_2
      text: Which retelling is honest?
    options_count: 2
    correct_answer: opt_1
    explanation: '"You want no classes at all!"'
    explanation_status: implicit
  - step_id: sc5_64
    source_step_id: '64'
    scene_id: sc5
    step_type: theory
    prompt: 'Сказали: «Думаю, можно позволить детям позже ложиться в выходные.» Приписали: «Ты считаешь, что дети вообще не
      должны спать!»'
  - step_id: sc5_65
    source_step_id: '65'
    scene_id: sc5
    step_type: single_choice
    prompt: Second! Conveyed the idea without distortion. First—classic Scarecrow exaggeration.
    options:
    - id: opt_1
      text: 'Original: "I like summer more than winter." Which retelling is honest?'
    - id: opt_2
      text: Which retelling is honest?
    options_count: 2
    correct_answer: opt_2
    explanation: '"Do you like summer more than winter?"'
    explanation_status: implicit
  - step_id: sc5_67
    source_step_id: '67'
    scene_id: sc5
    step_type: theory
    prompt: 'They said: “It’s better to do cleaning on Saturdays - it’s more convenient.” They added: “So, on other days you
      can live in the dirt?!”'
  - step_id: sc5_68
    source_step_id: '68'
    scene_id: sc5
    step_type: single_choice
    prompt: First! "Like more" is not "hate". Honest retelling preserves the softness of the original.
    options:
    - id: opt_1
      text: 'Original: "I think toys could be allowed at school." Which retelling is honest?'
    - id: opt_2
      text: Which retelling is honest?
    options_count: 2
    correct_answer: opt_2
    explanation: '"You want to play instead of classes!"'
    explanation_status: implicit
  - step_id: sc5_70
    source_step_id: '70'
    scene_id: sc5
    step_type: theory
    prompt: '"You think toys at school are normal?"'
  - step_id: sc5_71
    source_step_id: '71'
    scene_id: sc5
    step_type: single_choice
    prompt: Second! First—added "instead of classes", which wasn't there at all. Scarecrow.
    options:
    - id: opt_1
      text: 'Today you learned a powerful technique—"Scarecrow". When someone distorts your words, you''re now armed: find
        the distortion, identify the type, and calmly clarify. And when arguing yourself—first retell honestly and ask: "Do
        I understand correctly?"'
    - id: opt_2
      text: A true master of debate doesn't set up Scarecrows—they fight with a real knight. This is harder, but that's the
        only way to truly win. And there are many more secrets ahead—see you in the next lesson!
    options_count: 2
    correct_answer: opt_2
    explanation: Пугало! «Люблю больше» не значит «ненавижу остальные». Изменение смысла — способ четвёртый. Любить одно —
      не значит ненавидеть другое.
    explanation_status: implicit
  - step_id: sc5_73
    source_step_id: '73'
    scene_id: sc5
    step_type: theory
    prompt: 'Imagine: you say something simple, and your opponent turns it into something scary. For example...'
  - step_id: sc5_74
    source_step_id: '74'
    scene_id: sc5
    step_type: single_choice
    prompt: 'Scene 2: Three Types of Scarecrow'
    options:
    - id: opt_1
      text: 'Type 1: Expansion—makes the smallest big'
    - id: opt_2
      text: 'You: "I like the sauce on pizza." Scarecrow: "You only eat sauce, you hate pizza!"'
    options_count: 2
    correct_answer: opt_2
    explanation: 'Scarecrow! Two tricks at once: exaggerating “sometimes” → “forbid” and adding “get wet in the rain.” Double
      strike.'
    explanation_status: implicit
  - step_id: sc5_76
    source_step_id: '76'
    scene_id: sc5
    step_type: theory
    prompt: 'They said: “Our class is noisy.” They wrote: “You think it’s too loud in our class.”'
  - step_id: sc5_77
    source_step_id: '77'
    scene_id: sc5
    step_type: single_choice
    prompt: 'You: "Traveling would be interesting." Scarecrow: "You want to travel INSTEAD of school!"'
    options:
    - id: opt_1
      text: 'Type 2: Removal—excludes important words'
    - id: opt_2
      text: 'You: "SOMETIMES I like to listen to music." Scarecrow: "You''re ALWAYS in headphones, no work!"'
    options_count: 2
    correct_answer: opt_1
    explanation: 'You: "I think there could be MORE time for creativity." Scarecrow: "You want to abolish regular subjects!"'
    explanation_status: implicit
  - step_id: sc5_79
    source_step_id: '79'
    scene_id: sc5
    step_type: theory
    prompt: 'Type 3: Addition—makes up what wasn''t there'
  - step_id: sc5_80
    source_step_id: '80'
    scene_id: sc5
    step_type: single_choice
    prompt: 'You: "I like computer games." Scarecrow: "You want to play ALL DAY INSTEAD OF SCHOOL!"'
    options:
    - id: opt_1
      text: 'You: "Sports are interesting." Scarecrow: "You NEVER read, FORGOT about books!"'
    - id: opt_2
      text: 'So, three methods: expansion, removal, addition.'
    options_count: 2
    correct_answer: opt_2
    explanation: 'Scene 3: Recognizing Scarecrow in Real Conversations'
    explanation_status: implicit
  - step_id: sc5_82
    source_step_id: '82'
    scene_id: sc5
    step_type: theory
    prompt: 'When Scarecrow activates, you can often notice:'
  - step_id: sc5_83
    source_step_id: '83'
    scene_id: sc5
    step_type: single_choice
    prompt: 1. Extreme language ("ALWAYS", "NEVER", "ALL")
