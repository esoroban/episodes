source_lesson_id: lesson_13A
language: en
title: Argue Without Fighting
day: 13
slot: A
scenes:
- scene_id: sc1
  title: Big Warm-Up for the Whole Course
  steps:
  - step_id: sc1_1
    source_step_id: '1'
    scene_id: sc1
    step_type: instruction
    prompt: The last day of the course! Before learning something new, let's check what we remember. Twenty questions on ALL
      topics. Ready? Let's go!
  - step_id: sc1_2
    source_step_id: '2'
    scene_id: sc1
    step_type: single_choice
    prompt: '"All cats like fish." Ani''s cat doesn''t eat fish. Is one example enough to disprove this statement?'
    options:
    - id: opt_1
      text: Yes, that's enough
    - id: opt_2
      text: No, we need more
    options_count: 2
    correct_answer: opt_1
    explanation: That's enough! To disprove "all" — one exception is enough. One cat that doesn't eat fish — and the statement
      is false.
    explanation_status: implicit
  - step_id: sc1_4
    source_step_id: '4'
    scene_id: sc1
    step_type: single_choice
    prompt: Masha tried to ride a bicycle once, fell. "I'll never learn!" What's the error?
    options:
    - id: opt_1
      text: Hasty generalization
    - id: opt_2
      text: False cause
    - id: opt_3
      text: False dilemma
    options_count: 3
    correct_answer: opt_1
    explanation: Hasty generalization! One fall — and "never"? Everyone falls at first. One try — not a reason to give up
      on life.
    explanation_status: implicit
  - step_id: sc1_6
    source_step_id: '6'
    scene_id: sc1
    step_type: single_choice
    prompt: '"Chocolate is good for your brain." How can we check this claim?'
    options:
    - id: opt_1
      text: Ask mom
    - id: opt_2
      text: Find a scientific study
    - id: opt_3
      text: Try eating chocolate for a week
    options_count: 3
    correct_answer: opt_2
    explanation: A scientific study! Mom's opinion isn't verification. And your own experiment without a control isn't proof.
      We need a reliable source.
    explanation_status: implicit
  - step_id: sc1_8
    source_step_id: '8'
    scene_id: sc1
    step_type: single_choice
    prompt: Sasha saw a wet umbrella in the park. "So it rained!" Is this an observation or a conclusion?
    options:
    - id: opt_1
      text: Observation
    - id: opt_2
      text: Conclusion
    options_count: 2
    correct_answer: opt_2
    explanation: A conclusion! The observation is "the umbrella is wet." "It rained" is already an explanation. Maybe the
      umbrella fell in a puddle. Or someone washed it.
    explanation_status: implicit
  - step_id: sc1_10
    source_step_id: '10'
    scene_id: sc1
    step_type: single_choice
    prompt: Petya got sick after walking in the rain. Is rain the cause of his illness?
    options:
    - id: opt_1
      text: Yes, it's the cause
    - id: opt_2
      text: Maybe it's a coincidence
    - id: opt_3
      text: Definitely a coincidence
    options_count: 3
    correct_answer: opt_2
    explanation: Maybe a coincidence! Viruses cause illness, not rain. "After" doesn't mean "because of." Petya might have
      caught a virus before the walk.
    explanation_status: present
  - step_id: sc1_12
    source_step_id: '12'
    scene_id: sc1
    step_type: single_choice
    prompt: 'Blogger: "This phone is the best!" Magazine: "This phone is the best!" Are these independent sources?'
    options:
    - id: opt_1
      text: 'Yes'
    - id: opt_2
      text: 'No'
    - id: opt_3
      text: Need to check
    options_count: 3
    correct_answer: opt_3
    explanation: Need to check! If the blogger was paid by the manufacturer and the magazine got advertising — the sources
      are dependent. Independence = no shared interest.
    explanation_status: implicit
  - step_id: sc1_14
    source_step_id: '14'
    scene_id: sc1
    step_type: single_choice
    prompt: '"I love ice cream" and "Ice cream is the most nutritious food." Is there a contradiction?'
    options:
    - id: opt_1
      text: Yes, there's a contradiction
    - id: opt_2
      text: No, these are different things
    options_count: 2
    correct_answer: opt_2
    explanation: No contradiction! The first is an opinion about taste. The second is a claim about nutrition. You can like
      something and think it's good for you.
    explanation_status: implicit
  - step_id: sc1_16
    source_step_id: '16'
    scene_id: sc1
    step_type: single_choice
    prompt: 'Teacher: "Why are you late?" Student: "But Masha was also late yesterday!" What did the student do?'
    options:
    - id: opt_1
      text: Answered the question
    - id: opt_2
      text: Avoided the topic
    - id: opt_3
      text: Gave an argument
    options_count: 3
    correct_answer: opt_2
    explanation: Avoided the topic! Masha and her lateness yesterday aren't an answer to "why are YOU late TODAY?" Classic
      deflection.
    explanation_status: implicit
  - step_id: sc1_18
    source_step_id: '18'
    scene_id: sc1
    step_type: single_choice
    prompt: '"If you don''t learn the multiplication table, you''ll fail the exam, won''t get into university, become a janitor!"
      What is this?'
    options:
    - id: opt_1
      text: Logical reasoning
    - id: opt_2
      text: Scary chain
    - id: opt_3
      text: False authority
    options_count: 3
    correct_answer: opt_2
    explanation: Scary chain! From multiplication table to "become a janitor" — three jumps without proof. Each link needs
      to be checked separately.
    explanation_status: implicit
  - step_id: sc1_20
    source_step_id: '20'
    scene_id: sc1
    step_type: single_choice
    prompt: '"Either you go to art class or sit at home doing nothing." What if you want to go for a walk?'
    options:
    - id: opt_1
      text: Normal choice
    - id: opt_2
      text: False dilemma
    options_count: 2
    correct_answer: opt_2
    explanation: 'False dilemma! There are lots of options: go for a walk, read, play, robotics club. "Either-or" hides all
      other options.'
    explanation_status: implicit
  - step_id: sc1_22
    source_step_id: '22'
    scene_id: sc1
    step_type: single_choice
    prompt: '"Why don''t you want to eat soup?" — "But you didn''t eat porridge yesterday!" What technique is this?'
    options:
    - id: opt_1
      text: Valid objection
    - id: opt_2
      text: Personal attack
    - id: opt_3
      text: Trick question
    options_count: 3
    correct_answer: opt_2
    explanation: 'Personal attack! Instead of answering — an attack: "But you yourself..." Someone else''s behavior isn''t
      an argument. This isn''t even an objection, it''s avoiding the topic with an attack.'
    explanation_status: implicit
  - step_id: sc1_24
    source_step_id: '24'
    scene_id: sc1
    step_type: single_choice
    prompt: 'Ad: "9 out of 10 dentists recommend!" What should you ask?'
    options:
    - id: opt_1
      text: Who are these dentists?
    - id: opt_2
      text: How much were they paid?
    - id: opt_3
      text: Both questions matter
    options_count: 3
    correct_answer: opt_3
    explanation: Both! Who they are — maybe they're students. Whether they were paid — maybe it's an ad contract. Ads love
      numbers that look scientific but don't prove anything.
    explanation_status: implicit
  - step_id: sc1_26
    source_step_id: '26'
    scene_id: sc1
    step_type: single_choice
    prompt: '"You agree that our teacher is the best in the world, right?" What''s wrong with this question?'
    options:
    - id: opt_1
      text: Everything's fine
    - id: opt_2
      text: This is a trick question
    - id: opt_3
      text: This is an opinion
    options_count: 3
    correct_answer: opt_2
    explanation: 'Trick question! The answer is already built in: "you agree." If you say "no," it means you "don''t agree
      she''s the best." Clever trick!'
    explanation_status: present
  - step_id: sc1_28
    source_step_id: '28'
    scene_id: sc1
    step_type: single_choice
    prompt: '"I don''t like your drawing — the proportions are wrong, look at the hands." Is this an objection or an attack?'
    options:
    - id: opt_1
      text: Objection
    - id: opt_2
      text: Attack
    options_count: 2
    correct_answer: opt_1
    explanation: 'An objection! Specific, on point, with examples: "proportions," "hands." Not "you draw badly" — but what
      exactly is wrong. That''s how you should criticize.'
    explanation_status: present
  - step_id: sc1_30
    source_step_id: '30'
    scene_id: sc1
    step_type: single_choice
    prompt: '"This cream is recommended by Professor Ivanov!" Professor Ivanov is a historian. The cream is cosmetic. What''s
      wrong?'
    options:
    - id: opt_1
      text: Everything's fine
    - id: opt_2
      text: False authority
    - id: opt_3
      text: Hasty generalization
    options_count: 3
    correct_answer: opt_2
    explanation: False authority! A historian isn't an expert on cosmetics. His professor title has nothing to do with creams.
      Authority must be in the RIGHT field.
    explanation_status: present
  - step_id: sc1_32
    source_step_id: '32'
    scene_id: sc1
    step_type: single_choice
    prompt: Three classmates independently said the movie was boring. One read a review, two watched it themselves. How many
      independent opinions are there?
    options:
    - id: opt_1
      text: Three
    - id: opt_2
      text: Two
    - id: opt_3
      text: One
    options_count: 3
    correct_answer: opt_2
    explanation: Two! The one who read the review is repeating someone else's opinion, not their own. Only the two who watched
      it themselves have independent opinions.
    explanation_status: implicit
  - step_id: sc1_34
    source_step_id: '34'
    scene_id: sc1
    step_type: single_choice
    prompt: '"Kolya ate ice cream yesterday. He got sick today. So it''s because of the ice cream!" Are there enough examples
      for this conclusion?'
    options:
    - id: opt_1
      text: 'Yes'
    - id: opt_2
      text: 'No'
    options_count: 2
    correct_answer: opt_2
    explanation: No! One case isn't proof. Maybe Kolya got sick from a virus. He ate ice cream every day before and didn't
      get sick. We need statistics, not one example.
    explanation_status: present
  - step_id: sc1_36
    source_step_id: '36'
    scene_id: sc1
    step_type: single_choice
    prompt: '"Earth rotates around the Sun" and "The sun rises in the east." Is there a contradiction?'
    options:
    - id: opt_1
      text: 'Yes'
    - id: opt_2
      text: 'No'
    options_count: 2
    correct_answer: opt_2
    explanation: No! "Rises in the east" is a simplified description of what we SEE. Earth rotates — and it looks like the
      Sun moves. Both statements are true.
    explanation_status: present
  - step_id: sc1_38
    source_step_id: '38'
    scene_id: sc1
    step_type: single_choice
    prompt: 'Mom: "When I was little, the snow was whiter!" How can you check this?'
    options:
    - id: opt_1
      text: Can't — it's a memory
    - id: opt_2
      text: Find data about snow composition
    - id: opt_3
      text: Ask grandma
    options_count: 3
    correct_answer: opt_2
    explanation: Find data! Subjective memories are unreliable sources. But ecological measurements will show if snow composition
      changed. Check facts, not memory.
    explanation_status: implicit
  - step_id: sc1_40
    source_step_id: '40'
    scene_id: sc1
    step_type: theory
    prompt: Twenty out of twenty! You remember EVERYTHING. Facts and opinions, causes and coincidences, tricks and generalizations.
      Now — on to a new topic!
- scene_id: sc2
  title: ARGUMENT VS FIGHT
  steps:
  - step_id: sc2_41
    source_step_id: '41'
    scene_id: sc2
    step_type: theory
    prompt: 'The warm-up is over — you remember lots of tricks! But here''s a question: how can you argue HONESTLY? Without
      demagoguery, without manipulation — and still not fight?'
  - step_id: sc2_42
    source_step_id: '42'
    scene_id: sc2
    step_type: theory
    prompt: 'Here''s the situation. Losha and Kira are arguing about which movie is better. Losha says: "Your movie is boring!"
      Kira replies: "You don''t understand anything about movies!"'
  - step_id: sc2_43
    source_step_id: '43'
    scene_id: sc2
    step_type: single_choice
    prompt: What's happening between Losha and Kira?
    options:
    - id: opt_1
      text: Argument about movies
    - id: opt_2
      text: Fight with insults
    - id: opt_3
      text: Discussion
    options_count: 3
    correct_answer: opt_2
    explanation: They started talking about movies and ended up attacking each other. Sound familiar? An argument is when
      we discuss a topic. A fight is when we attack a person.
    explanation_status: implicit
  - step_id: sc2_45
    source_step_id: '45'
    scene_id: sc2
    step_type: theory
    prompt: 'Remember: an argument is normal! People can''t agree on everything. But if instead of "the movie is boring" you
      say "you''re stupid" — that''s not an argument. That''s a fight.'
  - step_id: sc2_46
    source_step_id: '46'
    scene_id: sc2
    step_type: theory
    prompt: 'Good news: there''s a simple trick that prevents an argument from turning into a fight. It''s called the "I-statement."
      Instead of "YOU''re wrong!" we say "I think differently." Feel the difference?'
  - step_id: sc2_47
    source_step_id: '47'
    scene_id: sc2
    step_type: instruction
    prompt: Let's practice! Someone makes an accusation — and you choose how to respond with an I-statement.
  - step_id: sc2_48
    source_step_id: '48'
    scene_id: sc2
    step_type: single_choice
    prompt: 'A friend shouts: "You''re always late!" How should you respond?'
    options:
    - id: opt_1
      text: '"You''re boring!"'
    - id: opt_2
      text: '"I don''t like being yelled at for being late"'
    - id: opt_3
      text: '"So what?"'
    options_count: 3
    correct_answer: opt_2
    explanation: The second option is about your feelings without attacking back. The first is a fight. The third is adding
      fuel to the fire.
    explanation_status: implicit
  - step_id: sc2_50
    source_step_id: '50'
    scene_id: sc2
    step_type: single_choice
    prompt: 'A classmate says: "You can''t draw!" How should you respond?'
    options:
    - id: opt_1
      text: '"That hurts, I tried my best"'
    - id: opt_2
      text: '"But you write crooked!"'
    - id: opt_3
      text: '"Then you draw!"'
    options_count: 3
    correct_answer: opt_1
    explanation: The first option is honest about your feelings. The other two are counterattacks. A fight is guaranteed.
    explanation_status: implicit
  - step_id: sc2_52
    source_step_id: '52'
    scene_id: sc2
    step_type: single_choice
    prompt: 'Your brother says: "We lost because of you!" How should you respond?'
    options:
    - id: opt_1
      text: '"You''re to blame!"'
    - id: opt_2
      text: '"I''m already sad that we lost"'
    - id: opt_3
      text: '"I don''t care"'
    options_count: 3
    correct_answer: opt_2
    explanation: '"I''m already sad" — you''re talking about yourself, and your brother understands: you''re upset too. That
      brings you closer. "You''re to blame" — and a minute later pillows are flying.'
    explanation_status: implicit
  - step_id: sc2_54
    source_step_id: '54'
    scene_id: sc2
    step_type: single_choice
    prompt: 'Your friend says: "You don''t listen to me at all!" How should you respond?'
    options:
    - id: opt_1
      text: '"You tell boring stories!"'
    - id: opt_2
      text: '"That''s not true!"'
    - id: opt_3
      text: '"Sorry, I was lost in thought. What you say matters to me"'
    options_count: 3
    correct_answer: opt_3
    explanation: The third option is an apology and an I-statement combined. The first is an insult. The second is just denial
      and doesn't solve anything.
    explanation_status: implicit
  - step_id: sc2_56
    source_step_id: '56'
    scene_id: sc2
    step_type: single_choice
    prompt: 'Your desk neighbor says: "You''re taking up all the table space!" How should you respond?'
    options:
    - id: opt_1
      text: '"Let''s share — I''m uncomfortable when it''s crowded, and so are you"'
    - id: opt_2
      text: '"Your problem!"'
    - id: opt_3
      text: '"You''re fat anyway!"'
    options_count: 3
    correct_answer: opt_1
    explanation: The first option addresses both you and the other person. A real way out of conflict. The others are a ticket
      to the principal's office.
    explanation_status: implicit
  - step_id: sc2_58
    source_step_id: '58'
    scene_id: sc2
    step_type: theory
    prompt: 'The formula is simple: "I feel [emotion] when [situation]." Instead of "You drive me crazy!" — "I don''t like
      being yelled at." The first is an attack. The second is about you.'
  - step_id: sc2_59
    source_step_id: '59'
    scene_id: sc2
    step_type: theory
    prompt: 'What if your emotions are running high and the formula doesn''t work? Three lifesaving tricks: pause, deep breath,
      count to ten. Sounds simple — but works better than yelling!'
- scene_id: sc3
  title: ACCUSATION OR I-STATEMENT?
  steps:
  - step_id: sc3_60
    source_step_id: '60'
    scene_id: sc3
    step_type: theory
    prompt: 'So the I-statement formula is: "I feel [emotion] when [situation]." You talk about YOURSELF — your feelings,
      your sensations. You don''t accuse the other person. You don''t attack. You just explain what''s happening with you.'
  - step_id: sc3_61
    source_step_id: '61'
    scene_id: sc3
    step_type: theory
    prompt: 'An accusation is the opposite: "YOU always...," "YOU never...," "Because of YOU..." Everything is directed at
      the other person. It''s an attack — and the start of a fight. Now let''s see if you can tell the difference!'
  - step_id: sc3_62
    source_step_id: '62'
    scene_id: sc3
    step_type: single_choice
    prompt: '"You always ruin everything!"'
    options:
    - id: opt_1
      text: '[UNTRANSLATED]'
    - id: opt_2
      text: '[UNTRANSLATED]'
    options_count: 2
    correct_answer: opt_2
    explanation: Accusation! The words "always" + "everything" — a double blow. An attack on a person, not about feelings.
    explanation_status: implicit
  - step_id: sc3_64
    source_step_id: '64'
    scene_id: sc3
    step_type: single_choice
    prompt: '"I don''t like waiting a long time."'
    options:
    - id: opt_1
      text: '[UNTRANSLATED]'
    - id: opt_2
      text: '[UNTRANSLATED]'
    options_count: 2
    correct_answer: opt_1
    explanation: I-statement! "I don't like" — about yourself. No "you're late again" — just your feelings.
    explanation_status: implicit
  - step_id: sc3_66
    source_step_id: '66'
    scene_id: sc3
    step_type: single_choice
    prompt: '"You''re the meanest person in the class!"'
    options:
    - id: opt_1
      text: '[UNTRANSLATED]'
    - id: opt_2
      text: '[UNTRANSLATED]'
    options_count: 2
    correct_answer: opt_2
    explanation: Accusation! "The meanest" — that's not about behavior, that's a label on a person. Classic attack.
    explanation_status: implicit
  - step_id: sc3_68
    source_step_id: '68'
    scene_id: sc3
    step_type: single_choice
    prompt: '"I get upset when we fight."'
    options:
    - id: opt_1
      text: '[UNTRANSLATED]'
    - id: opt_2
      text: '[UNTRANSLATED]'
    options_count: 2
    correct_answer: opt_1
    explanation: I-statement! "I get upset" — about yourself. "When we fight" — the situation. The formula works perfectly.
    explanation_status: implicit
  - step_id: sc3_70
    source_step_id: '70'
    scene_id: sc3
    step_type: single_choice
    prompt: '"We can''t do anything because of you!"'
    options:
    - id: opt_1
      text: '[UNTRANSLATED]'
    - id: opt_2
      text: '[UNTRANSLATED]'
    options_count: 2
    correct_answer: opt_2
    explanation: 'Accusation! "Because of you" — all the blame on one person. Try this: "I''m sad that it didn''t work out."
      A completely different conversation!'
    explanation_status: present
  - step_id: sc3_72
    source_step_id: '72'
    scene_id: sc3
    step_type: single_choice
    prompt: '"It''s hard for me to concentrate when it''s noisy."'
    options:
    - id: opt_1
      text: '[UNTRANSLATED]'
    - id: opt_2
      text: '[UNTRANSLATED]'
    options_count: 2
    correct_answer: opt_1
    explanation: I-statement! Not "you're all being noisy!" but "It's hard for me." About yourself — and it's clear that quiet
      is needed. Without fighting.
    explanation_status: implicit
  - step_id: sc3_74
    source_step_id: '74'
    scene_id: sc3
    step_type: single_choice
    prompt: '"You always take my things without asking!"'
    options:
    - id: opt_1
      text: '[UNTRANSLATED]'
    - id: opt_2
      text: '[UNTRANSLATED]'
    options_count: 2
    correct_answer: opt_2
    explanation: Accusation! "Always" is an exaggeration, "without asking" is an attack. What about an I-statement? "I want
      to be asked before you take my things."
    explanation_status: implicit
  - step_id: sc3_76
    source_step_id: '76'
    scene_id: sc3
    step_type: single_choice
    prompt: '"I think we didn''t understand each other."'
    options:
    - id: opt_1
      text: '[UNTRANSLATED]'
    - id: opt_2
      text: '[UNTRANSLATED]'
    options_count: 2
    correct_answer: opt_1
    explanation: I-statement! "I think" + "we" — nobody's at fault, we both misunderstood. Perfect way to defuse the situation.
    explanation_status: implicit
- scene_id: sc4
  title: PEACEFUL WAY OUT OF AN ARGUMENT
  steps:
  - step_id: sc4_78
    source_step_id: '78'
    scene_id: sc4
    step_type: theory
    prompt: 'You know how not to attack — that''s half the battle. But sometimes an argument reaches a deadlock: nobody gives
      in, emotions escalate. What do you do? Exit the argument while remaining friends.'
  - step_id: sc4_79
    source_step_id: '79'
    scene_id: sc4
    step_type: reflection
    prompt: 'Four lifesaving phrases: "Let''s come back to this later." "I need time to think." "We have different opinions
      — and that''s okay." "Let''s take a break and talk calmly."'
  - step_id: sc4_80
    source_step_id: '80'
    scene_id: sc4
    step_type: theory
    prompt: 'Main rule: ARGUMENT is ABOUT THE TOPIC, NOT THE PERSON. You can disagree with a friend''s opinion — and still
      respect the friend. Now let''s see — which phrases save the day, and which ruin everything?'
  - step_id: sc4_81
    source_step_id: '81'
    scene_id: sc4
    step_type: single_choice
    prompt: '"Let''s come back to this when we''ve both calmed down."'
    options:
    - id: opt_1
      text: Will save the relationship
    - id: opt_2
      text: Will make it worse
    options_count: 2
    correct_answer: opt_1
    explanation: 'Will save it! Pause + respect. You''re not giving up — you''re taking a timeout. Like in basketball: a break
      to play better later.'
    explanation_status: implicit
  - step_id: sc4_83
    source_step_id: '83'
    scene_id: sc4
    step_type: single_choice
    prompt: '"Fine, you''re right, I''m stupid!" (sarcastically)'
    options:
    - id: opt_1
      text: Will save the relationship
    - id: opt_2
      text: Will make it worse
    options_count: 2
    correct_answer: opt_2
    explanation: Will make it worse! Sarcasm + self-insult. Sounds like agreement but is really anger. The other person senses
      the trap and gets even angrier.
    explanation_status: implicit
  - step_id: sc4_85
    source_step_id: '85'
    scene_id: sc4
    step_type: single_choice
    prompt: '"We think differently, and that''s okay."'
    options:
    - id: opt_1
      text: Will save the relationship
    - id: opt_2
      text: Will make it worse
    options_count: 2
    correct_answer: opt_1
    explanation: Will save it! You accept the difference. Not "you're wrong," but "we're different." That's a mature approach
      — and it works even with adults.
    explanation_status: present
  - step_id: sc4_87
    source_step_id: '87'
    scene_id: sc4
    step_type: single_choice
    prompt: '"I don''t care, do what you want!"'
    options:
    - id: opt_1
      text: Will save the relationship
    - id: opt_2
      text: Will make it worse
    options_count: 2
    correct_answer: opt_2
    explanation: Will make it worse! "I don't care" is not peace, it's a wall. You didn't solve the problem — you slammed
      the door. The person feels abandoned mid-conversation.
    explanation_status: implicit
  - step_id: sc4_89
    source_step_id: '89'
    scene_id: sc4
    step_type: single_choice
    prompt: '"Let''s change the subject — play something!"'
    options:
    - id: opt_1
      text: Will save the relationship
    - id: opt_2
      text: Will make it worse
    options_count: 2
    correct_answer: opt_1
    explanation: Will save it! Switching gears is a great trick. You're not running away, you're suggesting something fun
      together. In an hour, the argument will be forgotten.
    explanation_status: implicit
  - step_id: sc4_91
    source_step_id: '91'
    scene_id: sc4
    step_type: single_choice
    prompt: '"That''s it, I''m not talking to you anymore!"'
    options:
    - id: opt_1
      text: Will save the relationship
    - id: opt_2
      text: Will make it worse
    options_count: 2
    correct_answer: opt_2
    explanation: Will make it worse! That's an ultimatum, not a solution. "Not talking" is the silent treatment. One of the
      nastiest things you can do to a friend.
    explanation_status: implicit
  - step_id: sc4_93
    source_step_id: '93'
    scene_id: sc4
    step_type: single_choice
    prompt: '"I disagree, but I understand your point."'
    options:
    - id: opt_1
      text: Will save the relationship
    - id: opt_2
      text: Will make it worse
    options_count: 2
    correct_answer: opt_1
    explanation: Will save it! A golden phrase. You stick to your opinion — but show respect. That's how people who've been
      friends for years argue.
    explanation_status: implicit
  - step_id: sc4_95
    source_step_id: '95'
    scene_id: sc4
    step_type: single_choice
    prompt: '"Ugh, enough!"'
    options:
    - id: opt_1
      text: Will save the relationship
    - id: opt_2
      text: Will make it worse
    options_count: 2
    correct_answer: opt_2
    explanation: Will make it worse! Two words — and so much frustration. That's not getting out of the argument, that's showing
      contempt. After "ugh, enough" a real fight usually starts.
    explanation_status: implicit
- scene_id: sc5
  title: HOW WOULD YOU GET OUT OF THIS ARGUMENT?
  steps:
  - step_id: sc5_97
    source_step_id: '97'
    scene_id: sc5
    step_type: theory
    prompt: 'Now — no options! I tell you a story, and you come up with what to say yourself. Hint: use an I-statement or
      one of the lifesaving phrases.'
  - step_id: sc5_98
    source_step_id: '98'
    scene_id: sc5
    step_type: theory
    prompt: 'Story one. Lena and Vika are doing a project. Lena wants to draw a poster, Vika wants to make a presentation.
      They''ve been arguing for five minutes. Lena says: "Presentations are boring!" Vika blushes.'
  - step_id: sc5_99
    source_step_id: '99'
    scene_id: sc5
    step_type: open_question
    prompt: 'Vika feels like she''s about to say something hurtful. What should she do? Hint: pause, I-statement, or lifesaving
      phrase.'
    teacher_guidance: What should she do?
  - step_id: sc5_100
    source_step_id: '100'
    scene_id: sc5
    step_type: theory
    prompt: 'For example: "I feel hurt when my idea is called boring. Let''s think — maybe we can combine a poster and a presentation?"
      Both a pause and an I-statement and a compromise offer!'
  - step_id: sc5_101
    source_step_id: '101'
    scene_id: sc5
    step_type: theory
    prompt: 'Story two. Kostya and Artem are playing football. Kostya didn''t pass — and the team lost. Artem shouts: "We
      lost because of you!" Kostya clenches his fists.'
  - step_id: sc5_102
    source_step_id: '102'
    scene_id: sc5
    step_type: open_question
    prompt: 'Kostya is angry. What should he do right now? Hint: his body is already screaming — it''s time to stop.'
    teacher_guidance: What should he do right now?
  - step_id: sc5_103
    source_step_id: '103'
    scene_id: sc5
    step_type: theory
    prompt: 'First — pause and count to ten. Then: "I feel bad that we lost. Let''s analyze the game calmly." Not an attack
      — but exiting through feelings.'
  - step_id: sc5_104
    source_step_id: '104'
    scene_id: sc5
    step_type: theory
    prompt: 'Story three. Dasha shows her friend a new haircut. The friend says: "That doesn''t suit you." Dasha feels hurt
      — she wants to reply: "Your hair looks like it''s from the last century!"'
  - step_id: sc5_105
    source_step_id: '105'
    scene_id: sc5
    step_type: open_question
    prompt: 'How should Dasha respond without starting a fight? Hint: I-statement about her feelings.'
    teacher_guidance: How should Dasha respond without starting a fight?
  - step_id: sc5_106
    source_step_id: '106'
    scene_id: sc5
    step_type: theory
    prompt: 'For example: "That hurts — I was just happy about my new haircut." Honestly, about yourself — and your friend
      will immediately understand she went too far.'
  - step_id: sc5_107
    source_step_id: '107'
    scene_id: sc5
    step_type: theory
    prompt: Story four. Timur and his sister are arguing about whose turn it is to wash dishes. Both are sure they did it
      yesterday. Voices are getting louder. Mom hasn't come home yet.
  - step_id: sc5_108
    source_step_id: '108'
    scene_id: sc5
    step_type: open_question
    prompt: 'The argument is at a deadlock — nobody''s giving in. How to get out? Hint: lifesaving phrase for deadlock situations.'
    teacher_guidance: How to get out?
  - step_id: sc5_109
    source_step_id: '109'
    scene_id: sc5
    step_type: theory
    prompt: '"How about this: one person washes today, the other tomorrow. Who goes first — flip a coin." Compromise! Or:
      "Let''s ask mom when she gets home." Getting out through a pause.'
  - step_id: sc5_110
    source_step_id: '110'
    scene_id: sc5
    step_type: theory
    prompt: 'Story five. During break, Misha accidentally bumped Egor. Egor dropped his phone. Egor whirls around: "You did
      that on purpose! You always do that!" Misha knows it was an accident.'
  - step_id: sc5_111
    source_step_id: '111'
    scene_id: sc5
    step_type: open_question
    prompt: 'Misha isn''t guilty, but Egor is angry. How should Misha respond? Hint: don''t defend yourself, show that you
      understand Egor''s feelings.'
    teacher_guidance: How should Misha respond?
  - step_id: sc5_112
    source_step_id: '112'
    scene_id: sc5
    step_type: theory
    prompt: '"Sorry, it was an accident! I understand you''re worried about your phone. Let''s check — maybe it''s okay?"
      Apology + understanding feelings + concrete action. All three in one!'
- scene_id: sc6
  title: 'CHEAT SHEET: EVERYTHING WE LEARNED'
  steps:
  - step_id: sc6_113
    source_step_id: '113'
    scene_id: sc6
    step_type: theory
    prompt: Now — your cheat sheet. Everything we covered over thirteen days. Every technique, every term, every way to defend
      yourself. Remember!
  - step_id: sc6_114
    source_step_id: '114'
    scene_id: sc6
    step_type: theory
    prompt: FACT — a statement that can be verified. "Water boils at 100 degrees" — we check with a thermometer. It doesn't
      matter if you agree — the fact exists on its own.
  - step_id: sc6_115
    source_step_id: '115'
    scene_id: sc6
    step_type: theory
    prompt: OPINION — a statement that can't be verified. "Strawberries taste better than raspberries" — everyone has their
      own. No opinion is "more right" than another. You can't disprove an opinion.
  - step_id: sc6_116
    source_step_id: '116'
    scene_id: sc6
    step_type: theory
    prompt: FALSEHOOD — a statement that looks like a fact but doesn't pass verification. "The Moon is bigger than the Sun"
      — we can measure and see it's not true.
  - step_id: sc6_117
    source_step_id: '117'
    scene_id: sc6
    step_type: theory
    prompt: OBSERVATION — what you see, hear, measure right now. "The pavement outside is wet." No guessing — just what's
      in front of your eyes.
  - step_id: sc6_118
    source_step_id: '118'
    scene_id: sc6
    step_type: theory
    prompt: 'CONCLUSION — an explanation based on observation. "It rained" — a conclusion. It might be true or not: maybe
      the janitor was washing the street. You always need to verify conclusions.'
  - step_id: sc6_119
    source_step_id: '119'
    scene_id: sc6
    step_type: theory
    prompt: '"AFTER" DOESN''T MEAN "BECAUSE OF." If one thing happened after another — that doesn''t prove a connection. Petya
      ate ice cream and got sick? A virus caused the illness, not the ice cream.'
  - step_id: sc6_120
    source_step_id: '120'
    scene_id: sc6
    step_type: theory
    prompt: 'SOURCE — where the information came from. Three questions: who is speaking? How do they know? Is there a reason
      to lie? If any answer raises concern — find another source.'
  - step_id: sc6_121
    source_step_id: '121'
    scene_id: sc6
    step_type: theory
    prompt: 'FOUR WAYS TO VERIFY: look yourself, conduct an experiment, find a reliable source, use logical reasoning. The
      more methods that match — the more reliable the conclusion.'
  - step_id: sc6_122
    source_step_id: '122'
    scene_id: sc6
    step_type: theory
    prompt: ARE THERE ENOUGH EXAMPLES? One case isn't proof. You need many examples. "My cat likes cucumbers" doesn't mean
      all cats like cucumbers.
  - step_id: sc6_123
    source_step_id: '123'
    scene_id: sc6
    step_type: theory
    prompt: INDEPENDENT SOURCES - those who came to a conclusion on their own, without general interest. Two bloggers paid
      by the same company are addicts. A scientist and a journalist working separately are independent.
  - step_id: sc6_124
    source_step_id: '124'
    scene_id: sc6
    step_type: theory
    prompt: CONTRADICTION — when two statements can't both be true. "I don't eat sweets" and "I ate three candies" — contradiction.
      Someone is wrong.
  - step_id: sc6_125
    source_step_id: '125'
    scene_id: sc6
    step_type: theory
    prompt: 'THREE TYPES OF JUSTIFICATION — how to support a claim. Fact: "We measured — temperature is 38°." Logic: "If ice
      melts — it means above zero." Reliable source: "That''s what the physics textbook says."'
  - step_id: sc6_126
    source_step_id: '126'
    scene_id: sc6
    step_type: theory
    prompt: TRAP WORDS — "all," "always," "never," "definitely," "everyone." If you hear an absolute word — it's a signal
      to check. Almost always there's exaggeration or generalization behind it.
  - step_id: sc6_127
    source_step_id: '127'
    scene_id: sc6
    step_type: theory
    prompt: 'STEREOTYPES — ready-made templates: "all [group] are like that." Boys don''t cry. Top students are boring. Stereotypes
      replace thinking with labels. Defense: "Is this about a specific person or a stereotype?"'
  - step_id: sc6_128
    source_step_id: '128'
    scene_id: sc6
    step_type: theory
    prompt: 'RUMORS AND REPETITION — repeating something a hundred times doesn''t make it true. "Everyone says" — not proof.
      Defense: "Who exactly says it? And how do they know?"'
  - step_id: sc6_129
    source_step_id: '129'
    scene_id: sc6
    step_type: theory
    prompt: 'OBJECTION — criticism on the merits: what''s wrong and why. ATTACK — criticism of a person: "you''re stupid."
      Objections help, attacks hurt.'
  - step_id: sc6_130
    source_step_id: '130'
    scene_id: sc6
    step_type: theory
    prompt: THREE LAWS OF ARISTOTLE — foundation of logic. Three rules without which reasoning falls apart.
  - step_id: sc6_131
    source_step_id: '131'
    scene_id: sc6
    step_type: theory
    prompt: 'LAW OF IDENTITY — one word must mean the same thing throughout the conversation. If someone starts talking about
      "freedom" as independence and ends with "do whatever you want" — that''s a substitution of concepts. Defense: "What
      exactly are you talking about?"'
  - step_id: sc6_132
    source_step_id: '132'
    scene_id: sc6
    step_type: theory
    prompt: 'LAW OF NON-CONTRADICTION — the same thing can''t be true and false at the same time. A light can''t be on and
      off at the same moment. Defense: "You just said the opposite."'
  - step_id: sc6_133
    source_step_id: '133'
    scene_id: sc6
    step_type: theory
    prompt: 'LAW OF EXCLUDED MIDDLE — for simple things only two options: yes or no. A number is even or odd. But for life
      — it doesn''t work! "Either with me or against me" — false dilemma. Defense: "What other options?"'
  - step_id: sc6_134
    source_step_id: '134'
    scene_id: sc6
    step_type: theory
    prompt: 'Now — DEMAGOGUERY. Twelve techniques that attack your mind. One answer to all: "Where are the facts?"'
  - step_id: sc6_135
    source_step_id: '135'
    scene_id: sc6
    step_type: theory
    prompt: 'FALSE CAUSE — linking two events without proof. "Wore red socks — and we won!" The socks have nothing to do with
      it. Defense: "Where''s the proof of the link?"'
  - step_id: sc6_136
    source_step_id: '136'
    scene_id: sc6
    step_type: theory
    prompt: 'HASTY GENERALIZATION — from one case, a conclusion about all. "Late once — so always late!" Defense: "One example
      isn''t enough, we need statistics."'
  - step_id: sc6_137
    source_step_id: '137'
    scene_id: sc6
    step_type: theory
    prompt: 'EVASION — instead of answering, they talk about something else. "Why are you late?" — "But Masha was late too!"
      Defense: "We''re not talking about Masha."'
  - step_id: sc6_138
    source_step_id: '138'
    scene_id: sc6
    step_type: theory
    prompt: 'SUBSTITUTION OF CONCEPTS — subtly changing a word''s meaning mid-conversation. Violates the law of identity.
      Defense: "What exactly do you mean?"'
  - step_id: sc6_139
    source_step_id: '139'
    scene_id: sc6
    step_type: theory
    prompt: 'PERSONAL ATTACK — criticizing the speaker instead of offering arguments. "You''re little — what do you know?"
      Defense: "Is this about me or the topic?"'
  - step_id: sc6_140
    source_step_id: '140'
    scene_id: sc6
    step_type: theory
    prompt: 'STRAW MAN — distorting someone''s words and arguing against what they didn''t say. "You want to cancel all rules!"
      — even though they only suggested changing one. Defense: "I didn''t say that."'
  - step_id: sc6_141
    source_step_id: '141'
    scene_id: sc6
    step_type: theory
    prompt: 'SCARY CHAIN — exaggerating consequences without proof. Won''t learn the table — become a janitor! Defense: "Let''s
      check each link separately."'
  - step_id: sc6_142
    source_step_id: '142'
    scene_id: sc6
    step_type: theory
    prompt: 'FALSE AUTHORITY — citing an expert in the wrong field. A historian advertising cream. Defense: "Is he an expert
      in this field?"'
  - step_id: sc6_143
    source_step_id: '143'
    scene_id: sc6
    step_type: theory
    prompt: 'FALSE DILEMMA — offering two options when there are more. Violating the law of excluded middle in life. Defense:
      "What other options?"'
  - step_id: sc6_144
    source_step_id: '144'
    scene_id: sc6
    step_type: theory
    prompt: 'TRICK QUESTION — a question with the answer built in. "You agree this is the best movie, right?" Defense: "I
      disagree with how you phrased it."'
  - step_id: sc6_145
    source_step_id: '145'
    scene_id: sc6
    step_type: theory
    prompt: 'BEAUTIFUL WORDS WITHOUT FACTS — lots of emotion, zero proof. "This product will change your life!" Defense: "Sounds
      nice, but where are the facts?"'
  - step_id: sc6_146
    source_step_id: '146'
    scene_id: sc6
    step_type: theory
    prompt: '"I''M NOT SAYING THAT..." — saying exactly what they claim not to say. "I''m not saying he''s lying, but..."
      — and everyone thinks he is. Defense: "You just said that."'
  - step_id: sc6_147
    source_step_id: '147'
    scene_id: sc6
    step_type: theory
    prompt: 'Now — MANIPULATION. Four buttons that press on your feelings. One answer to all: "Let''s talk about what matters."'
  - step_id: sc6_148
    source_step_id: '148'
    scene_id: sc6
    step_type: theory
    prompt: 'GUILT BUTTON — "I feel bad because of you." Goal: make you feel guilty. Defense: "I''m sorry, but that''s not
      a reason to do something I disagree with."'
  - step_id: sc6_149
    source_step_id: '149'
    scene_id: sc6
    step_type: theory
    prompt: 'FEAR BUTTON — "If you don''t do it, something awful will happen!" Goal: scare you. Defense: "Is this a real threat
      or are you scaring me?"'
  - step_id: sc6_150
    source_step_id: '150'
    scene_id: sc6
    step_type: theory
    prompt: 'SHAME BUTTON — "Aren''t you ashamed?" Goal: make you feel ashamed. Defense: "I''m not ashamed. Explain why I
      should do this."'
  - step_id: sc6_151
    source_step_id: '151'
    scene_id: sc6
    step_type: theory
    prompt: 'FRIENDSHIP BLACKMAIL — "A real friend would help!" Goal: exploit the relationship. Defense: "I''m your friend,
      but that doesn''t mean I have to agree."'
  - step_id: sc6_152
    source_step_id: '152'
    scene_id: sc6
    step_type: theory
    prompt: 'I-STATEMENT — a way to express feelings without attacking. Formula: "I feel [emotion] when [situation]." Instead
      of "You drive me crazy!" — "I don''t like being yelled at."'
  - step_id: sc6_153
    source_step_id: '153'
    scene_id: sc6
    step_type: reflection
    prompt: 'LIFESAVING PHRASES: "Let''s come back to this later." "I need to think." "We have different opinions — and that''s
      okay." "Let''s take a break."'
  - step_id: sc6_154
    source_step_id: '154'
    scene_id: sc6
    step_type: theory
    prompt: 'And the main rule of the entire course: ARGUMENT is ABOUT THE TOPIC, NOT THE PERSON. You can disagree with a
      friend''s opinion and still respect the friend. That''s all the "Power of Words" is!'
- scene_id: sc7
  title: FAREWELL
  steps:
  - step_id: sc7_155
    source_step_id: '155'
    scene_id: sc7
    step_type: theory
    prompt: Before the course, you didn't know the difference between a fact and an opinion. You didn't notice when people
      tried to trick you with pretty words. You didn't understand why you felt sad after arguing with a friend. But now —
      you do.
  - step_id: sc7_156
    source_step_id: '156'
    scene_id: sc7
    step_type: theory
    prompt: 'You can spot demagoguery — all twelve tricks that confuse your mind. Someone says "everyone thinks so" — and
      you already hear: hasty generalization. Someone scares you with awful consequences — and you check each link of the
      chain.'
  - step_id: sc7_157
    source_step_id: '157'
    scene_id: sc7
    step_type: theory
    prompt: 'You know how to resist manipulation. When someone presses the guilt, fear, or shame button — you feel it and
      say: "Let''s talk about what matters." That''s not rudeness. It''s self-defense. Like a helmet on a bike — doesn''t
      get in the way of riding, but protects your head.'
  - step_id: sc7_158
    source_step_id: '158'
    scene_id: sc7
    step_type: theory
    prompt: You can argue without fighting. Say "I feel hurt" instead of "You're bad." Take a break when emotions run high.
      Exit an argument without regretting your words afterward.
  - step_id: sc7_159
    source_step_id: '159'
    scene_id: sc7
    step_type: theory
    prompt: And most importantly — you know how to think for yourself. Not trust blindly. Not fear asking "How do you know?"
      Not agree just because someone talks louder. That's critical thinking — and it's yours now.
  - step_id: sc7_160
    source_step_id: '160'
    scene_id: sc7
    step_type: theory
    prompt: We're proud of you. The "Power of Words" course has ended — but the power stays with you. Use it wisely, with
      kindness and humor. Good luck!
