lesson_id: lesson_2A
stage0_run_id: run_2026_03_15T05_25_49Z_lesson_10A_lesson_10B_lesson_11A_lesson_11B_lesson_12A_lesson_12B_lesson_13A_lesson_2A_lesson_2B_lesson_3A_lesson_5A_lesson_5B_lesson_6A_lesson_6B_lesson_7A_lesson_7B_lesson_8A_lesson_8B_lesson_9A_lesson_9B
source_lesson_id: lesson_2A
language: en
title: How to Check Statements
day: 2
slot: A
scenes:
- scene_id: sc1
  title: REVIEW
  steps:
  - step_id: sc1_1
    source_step_id: '1'
    scene_id: sc1
    step_type: theory
    prompt: Hello! Today is our second lesson. Time has passed since last time — let's check what you remember. Ready?
  - step_id: sc1_2
    source_step_id: '2'
    scene_id: sc1
    step_type: instruction
    prompt: Last lesson we learned three main words. Who remembers at least one?
  - step_id: sc1_3
    source_step_id: '3'
    scene_id: sc1
    step_type: reflection
    prompt: Fact, opinion, falsehood! Let's remember what makes them different. A fact is a statement you can check, and the
      check proved it's true. An opinion can't be checked — it's a personal feeling. A falsehood can be checked, but it turned
      out to be false.
  - step_id: sc1_4
    source_step_id: '4'
    scene_id: sc1
    step_type: single_choice
    prompt: '"There are windows in our classroom."'
    options:
    - id: opt_1
      text: Fact
    - id: opt_2
      text: Opinion
    - id: opt_3
      text: Falsehood
    options_count: 3
    correct_answer: opt_1
    explanation: Fact! Turn your head — you can see them. Checked and confirmed.
    explanation_status: present
  - step_id: sc1_6
    source_step_id: '6'
    scene_id: sc1
    step_type: single_choice
    prompt: '"Vacation is the best time."'
    options:
    - id: opt_1
      text: Fact
    - id: opt_2
      text: Opinion
    - id: opt_3
      text: Falsehood
    options_count: 3
    correct_answer: opt_2
    explanation: Opinion! Some people like vacation, others miss their friends. There's no way to test what's "best."
    explanation_status: present
  - step_id: sc1_8
    source_step_id: '8'
    scene_id: sc1
    step_type: single_choice
    prompt: '"Cats can fly."'
    options:
    - id: opt_1
      text: Fact
    - id: opt_2
      text: Opinion
    - id: opt_3
      text: Falsehood
    options_count: 3
    correct_answer: opt_3
    explanation: Falsehood! You can check — look at any cat. We checked — they don't fly.
    explanation_status: present
  - step_id: sc1_10
    source_step_id: '10'
    scene_id: sc1
    step_type: theory
    prompt: Three out of three! Last lesson we learned HOW to check properly. Not by guessing, not "I think" — but with tools
      that give you NUMBERS. Who remembers our five tools?
  - step_id: sc1_11
    source_step_id: '11'
    scene_id: sc1
    step_type: open_question
    prompt: Call them out! Who remembers at least two?
    teacher_guidance: Who remembers at least two?
  - step_id: sc1_12
    source_step_id: '12'
    scene_id: sc1
    step_type: theory
    prompt: Scales check weight. A ruler or measuring tape checks length, height, and distance. A clock or stopwatch checks
      time and speed. A thermometer checks temperature. And counting — just count how many.
  - step_id: sc1_13
    source_step_id: '13'
    scene_id: sc1
    step_type: theory
    prompt: 'The rule: if there''s a tool that gives you a number, you can check it. No tool — then it''s probably an opinion.'
  - step_id: sc1_14
    source_step_id: '14'
    scene_id: sc1
    step_type: instruction
    prompt: We also learned about tricky claims. Remember the story about Vitya and the magic stone?
  - step_id: sc1_15
    source_step_id: '15'
    scene_id: sc1
    step_type: open_question
    prompt: What makes a tricky claim different from a regular one? What did Vitya do every time someone tried to test him?
  - step_id: sc1_16
    source_step_id: '16'
    scene_id: sc1
    step_type: theory
    prompt: He had an excuse for every check! "The stone was resting," "The wish was too big," "It only works when nobody's
      watching." A tricky claim is when there's supposedly a way to check it, but the person always has a reason why you can't
      check it right now.
  - step_id: sc1_17
    source_step_id: '17'
    scene_id: sc1
    step_type: theory
    prompt: 'And finally — three questions for the truth detective. First: is there a tool to check? Second: is the person
      willing to be tested — or do they have excuses? Third: we checked — what happened?'
  - step_id: sc1_18
    source_step_id: '18'
    scene_id: sc1
    step_type: theory
    prompt: 'Complete check! Three categories: verifiable, opinion, tricky.'
  - step_id: sc1_19
    source_step_id: '19'
    scene_id: sc1
    step_type: single_choice
    prompt: '"This chair weighs three kilograms."'
    options:
    - id: opt_1
      text: Verifiable
    - id: opt_2
      text: Opinion
    - id: opt_3
      text: Tricky claim
    options_count: 3
    correct_answer: opt_1
    explanation: Verifiable! Tool — scales. Put it on, check the number.
    explanation_status: implicit
  - step_id: sc1_21
    source_step_id: '21'
    scene_id: sc1
    step_type: single_choice
    prompt: '"This chair is comfortable."'
    options:
    - id: opt_1
      text: Verifiable
    - id: opt_2
      text: Opinion
    - id: opt_3
      text: Tricky claim
    options_count: 3
    correct_answer: opt_2
    explanation: Opinion! There's no device that measures comfort. It's different for everyone.
    explanation_status: present
  - step_id: sc1_23
    source_step_id: '23'
    scene_id: sc1
    step_type: single_choice
    prompt: '"My cat can count to ten, but only when I''m sleeping."'
    options:
    - id: opt_1
      text: Verifiable
    - id: opt_2
      text: Opinion
    - id: opt_3
      text: Tricky claim
    options_count: 3
    correct_answer: opt_3
    explanation: Tricky claim! It seems checkable — ask the cat to count. But the excuse is "only when I'm sleeping" — impossible
      to verify.
    explanation_status: implicit
  - step_id: sc1_25
    source_step_id: '25'
    scene_id: sc1
    step_type: single_choice
    prompt: '"It''s raining outside."'
    options:
    - id: opt_1
      text: Verifiable
    - id: opt_2
      text: Opinion
    - id: opt_3
      text: Tricky claim
    options_count: 3
    correct_answer: opt_1
    explanation: Verifiable! Turn your head and look out the window. You can check right now.
    explanation_status: present
  - step_id: sc1_27
    source_step_id: '27'
    scene_id: sc1
    step_type: single_choice
    prompt: '"Red is the most beautiful color."'
    options:
    - id: opt_1
      text: Verifiable
    - id: opt_2
      text: Opinion
    - id: opt_3
      text: Tricky claim
    options_count: 3
    correct_answer: opt_2
    explanation: Opinion! "Beautiful" is a personal feeling. There's no device for measuring beauty.
    explanation_status: present
  - step_id: sc1_29
    source_step_id: '29'
    scene_id: sc1
    step_type: single_choice
    prompt: '"My invisible friend lives under my bed, but disappears if I look."'
    options:
    - id: opt_1
      text: Verifiable
    - id: opt_2
      text: Opinion
    - id: opt_3
      text: Tricky claim
    options_count: 3
    correct_answer: opt_3
    explanation: Tricky! Look — he's gone. Don't look — "see, he's there." An excuse for every test.
    explanation_status: implicit
  - step_id: sc1_31
    source_step_id: '31'
    scene_id: sc1
    step_type: theory
    prompt: Excellent! You remember everything. Three words, five tools, three detective questions. Now — new topic!
  - step_id: sc1_32
    source_step_id: '32'
    scene_id: sc1
    step_type: theory
    prompt: Now listen to a cool story about an argument that a stopwatch solved.
- scene_id: sc2
  title: STORY — WHO RUNS FASTER?
  steps:
  - step_id: sc2_33
    source_step_id: '33'
    scene_id: sc2
    step_type: theory
    prompt: 'Dmitrik announced to the whole school yard: "I''m the fastest in school! Nobody can catch me!" Sashko smiled:
      "Really? Let''s test it!"'
  - step_id: sc2_34
    source_step_id: '34'
    scene_id: sc2
    step_type: theory
    prompt: 'They agreed: a hundred meters, stopwatch, fair race. They ran — and Sashko finished first! Dmitrik couldn''t
      believe his eyes.'
  - step_id: sc2_35
    source_step_id: '35'
    scene_id: sc2
    step_type: theory
    prompt: '"That''s not fair! My shoelace came undone!" shouted Dmitrik. They ran again. Sashko was faster again. "I just
      didn''t sleep well!" Dmitrik wouldn''t give up.'
  - step_id: sc2_36
    source_step_id: '36'
    scene_id: sc2
    step_type: theory
    prompt: 'Olenka shook her head: "Dmitrik, the stopwatch showed numbers. Twice. Maybe you should just practice?"'
  - step_id: sc2_37
    source_step_id: '37'
    scene_id: sc2
    step_type: open_question
    prompt: 'Dmitrik said: "I''m the fastest in school!" What did Sashko suggest?'
  - step_id: sc2_38
    source_step_id: '38'
    scene_id: sc2
    step_type: instruction
    prompt: Test it! Run a hundred meters and time it. What tool did they use?
  - step_id: sc2_39
    source_step_id: '39'
    scene_id: sc2
    step_type: theory
    prompt: A stopwatch! One of our five tools.
  - step_id: sc2_40
    source_step_id: '40'
    scene_id: sc2
    step_type: single_choice
    prompt: '"I''m the fastest in school!" said Dmitrik. But Sashko was faster. So Dmitrik''s statement is...'
    options:
    - id: opt_1
      text: Fact
    - id: opt_2
      text: Opinion
    - id: opt_3
      text: Falsehood
    options_count: 3
    correct_answer: opt_3
    explanation: Falsehood! We have the tool — a stopwatch. We checked — it wasn't true.
    explanation_status: present
  - step_id: sc2_42
    source_step_id: '42'
    scene_id: sc2
    step_type: open_question
    prompt: But wait. Is Dmitrik a liar? Was he trying to trick us?
    teacher_guidance: Is Dmitrik a liar? Was he trying to trick us?
  - step_id: sc2_43
    source_step_id: '43'
    scene_id: sc2
    step_type: theory
    prompt: 'No! He really thought he was the fastest. It SEEMED like that to him. He felt: "I''m running, wind in my face,
      I''m fast!" But feelings aren''t facts.'
  - step_id: sc2_44
    source_step_id: '44'
    scene_id: sc2
    step_type: theory
    prompt: That's why we need tools. Feelings tell one story, but the tool shows another. A stopwatch doesn't get offended,
      doesn't brag, doesn't make mistakes — it just shows the number.
  - step_id: sc2_45
    source_step_id: '45'
    scene_id: sc2
    step_type: theory
    prompt: 'Remember: "it seems to me" is not a test. A real test is when a tool gives you a number.'
  - step_id: sc2_46
    source_step_id: '46'
    scene_id: sc2
    step_type: theory
    prompt: 'Now a tricky question. Dmitrik lost the race. He was upset. And he says: "That''s not fair! My shoelace came
      undone! Let''s run again!" They ran again — Sashko was still faster. "I just didn''t sleep well!"'
  - step_id: sc2_47
    source_step_id: '47'
    scene_id: sc2
    step_type: single_choice
    prompt: Is Dmitrik acting like Vitya with the magic stone?
    options:
    - id: opt_1
      text: Yes, like Vitya
    - id: opt_2
      text: No, differently
    options_count: 2
    correct_answer: opt_1
    explanation: Yes! It's the same story we know — excuses. Shoelace, didn't sleep, unfair — a new reason for every result.
    explanation_status: present
  - step_id: sc2_49
    source_step_id: '49'
    scene_id: sc2
    step_type: theory
    prompt: 'But here''s what''s interesting. What if Dmitrik says: "Okay, today Sashko was faster. But maybe tomorrow I''ll
      be faster?" Is that an excuse?'
  - step_id: sc2_50
    source_step_id: '50'
    scene_id: sc2
    step_type: theory
    prompt: No! That's a good question. Maybe Dmitrik really was tired today. One test isn't everything. What if we test again?
      And again? That's what we'll talk about next!
- scene_id: sc3
  title: 'Repeatability: Pattern and Coincidence'
  steps:
  - step_id: sc3_51
    source_step_id: '51'
    scene_id: sc3
    step_type: instruction
    prompt: Stop! Who thinks Dmitrik was just unlucky? Maybe he really is faster, just had a bad day?
  - step_id: sc3_52
    source_step_id: '52'
    scene_id: sc3
    step_type: theory
    prompt: Aha! Some of you think so. And you know what — you might be right. One test isn't a death sentence. One race —
      and you've lost forever? No!
  - step_id: sc3_53
    source_step_id: '53'
    scene_id: sc3
    step_type: open_question
    prompt: 'But then the question is: HOW MANY TIMES do we need to test to be sure? Once? Twice? Ten times? A hundred?'
  - step_id: sc3_54
    source_step_id: '54'
    scene_id: sc3
    step_type: instruction
    prompt: Look. I throw a ball — it falls. I throw again — it falls. Again — it falls. I threw a hundred times — it fell
      a hundred times. Think on the hundred-and-first throw it'll fly up?
  - step_id: sc3_55
    source_step_id: '55'
    scene_id: sc3
    step_type: theory
    prompt: No! Because that's a PATTERN. It works every time. But here's another example. I made a wish — and it came true!
      Yay! I made another wish — it didn't come true. Another — nope. So the first time was magic? No. That was a COINCIDENCE.
  - step_id: sc3_56
    source_step_id: '56'
    scene_id: sc3
    step_type: theory
    prompt: 'New word: REPEATABILITY. If the result happens EVERY TIME — it''s reliable. If one time yes, one time no — that''s
      a coincidence.'
  - step_id: sc3_57
    source_step_id: '57'
    scene_id: sc3
    step_type: open_question
    prompt: Back to Dmitrik. How can we fairly figure out who's faster?
    teacher_guidance: How can we fairly figure out who's faster?
  - step_id: sc3_58
    source_step_id: '58'
    scene_id: sc3
    step_type: theory
    prompt: Run several times! If Sashko is faster five out of five times — definitely faster. But if it's three to two —
      it's debatable.
  - step_id: sc3_59
    source_step_id: '59'
    scene_id: sc3
    step_type: theory
    prompt: 'And now — attention — a trap! Dmitrik says: "When I wear my red shirt, our team ALWAYS wins!" Sounds cool. Who
      believes it?'
  - step_id: sc3_60
    source_step_id: '60'
    scene_id: sc3
    step_type: theory
    prompt: Hmm. Let's check it. Wore red — won. Wore blue — also won. Wore red — lost. Is it the shirt? Or how the team played?
  - step_id: sc3_61
    source_step_id: '61'
    scene_id: sc3
    step_type: theory
    prompt: Coincidence! Dmitrik remembered one time when it matched and decided it was a rule. But all the times it didn't
      match — he forgot. Tricky brain!
  - step_id: sc3_62
    source_step_id: '62'
    scene_id: sc3
    step_type: instruction
    prompt: Vote! Pattern — repeats ALWAYS. Coincidence — varies. Let's go!
  - step_id: sc3_63
    source_step_id: '63'
    scene_id: sc3
    step_type: single_choice
    prompt: '"If you release a stone, it will fall."'
    options:
    - id: opt_1
      text: Pattern
    - id: opt_2
      text: Coincidence
    options_count: 2
    correct_answer: opt_1
    explanation: Pattern! Throw it a thousand times — it'll fall. Never fly up.
    explanation_status: implicit
  - step_id: sc3_65
    source_step_id: '65'
    scene_id: sc3
    step_type: single_choice
    prompt: '"I made a wish on a falling star — and it came true."'
    options:
    - id: opt_1
      text: Pattern
    - id: opt_2
      text: Coincidence
    options_count: 2
    correct_answer: opt_2
    explanation: Coincidence! And how many times it didn't come true — we don't count for some reason. The star has nothing
      to do with it.
    explanation_status: implicit
  - step_id: sc3_67
    source_step_id: '67'
    scene_id: sc3
    step_type: single_choice
    prompt: '"Water boils at a hundred degrees."'
    options:
    - id: opt_1
      text: Pattern
    - id: opt_2
      text: Coincidence
    options_count: 2
    correct_answer: opt_1
    explanation: Pattern! Tested a million times. Thermometer shows a hundred — water boils. Always.
    explanation_status: implicit
  - step_id: sc3_69
    source_step_id: '69'
    scene_id: sc3
    step_type: single_choice
    prompt: '"If I sit at the front desk — I''ll get an excellent grade."'
    options:
    - id: opt_1
      text: Pattern
    - id: opt_2
      text: Coincidence
    options_count: 2
    correct_answer: opt_2
    explanation: Coincidence! What if you sit at the front — and get a bad grade? Grades depend on knowledge, not on desks.
    explanation_status: implicit
  - step_id: sc3_71
    source_step_id: '71'
    scene_id: sc3
    step_type: single_choice
    prompt: '"The sun rises in the east."'
    options:
    - id: opt_1
      text: Pattern
    - id: opt_2
      text: Coincidence
    options_count: 2
    correct_answer: opt_1
    explanation: Pattern! Every day, billions of years. Can't be more reliable.
    explanation_status: implicit
  - step_id: sc3_73
    source_step_id: '73'
    scene_id: sc3
    step_type: single_choice
    prompt: '"I wore lucky socks — and the test went great!"'
    options:
    - id: opt_1
      text: Pattern
    - id: opt_2
      text: Coincidence
    options_count: 2
    correct_answer: opt_2
    explanation: Coincidence! Socks don't solve problems. You just studied. And the socks don't care.
    explanation_status: implicit
  - step_id: sc3_75
    source_step_id: '75'
    scene_id: sc3
    step_type: theory
    prompt: Notice the trick? Patterns — stone falls, water boils, sun rises — work WITHOUT us. But coincidences — shirt,
      socks, desk, star — WE made up the connection. The brain loves finding connections, even where they don't exist!
  - step_id: sc3_76
    source_step_id: '76'
    scene_id: sc3
    step_type: theory
    prompt: 'Fourth detective question: "Does it happen again?" If yes — reliable. If just once — could be a coincidence.'
- scene_id: sc4
  title: Repeatability Traffic Light
  steps:
  - step_id: sc4_77
    source_step_id: '77'
    scene_id: sc4
    step_type: theory
    prompt: 'We said: if it repeats — it''s a pattern. But wait. HOW MANY TIMES do you need to repeat to be sure?'
  - step_id: sc4_78
    source_step_id: '78'
    scene_id: sc4
    step_type: open_question
    prompt: Sashko beat Dmitrik once. Is that enough to say Sashko is faster?
    teacher_guidance: Is that enough to say Sashko is faster?
  - step_id: sc4_79
    source_step_id: '79'
    scene_id: sc4
    step_type: theory
    prompt: No! Once — that's red light. Stop! Don't decide yet. Could be a coincidence.
  - step_id: sc4_80
    source_step_id: '80'
    scene_id: sc4
    step_type: theory
    prompt: What if Sashko beat him two or three times? That's more interesting — yellow light. Keep testing!
  - step_id: sc4_81
    source_step_id: '81'
    scene_id: sc4
    step_type: theory
    prompt: What if five out of five? Green light! Looks like a pattern.
  - step_id: sc4_82
    source_step_id: '82'
    scene_id: sc4
    step_type: theory
    prompt: Example with a coin. Flipped once — heads. Does the coin always give heads? Flipped ten times — five heads, five
      tails. Aha, about fifty-fifty. That's why we need repeats.
  - step_id: sc4_83
    source_step_id: '83'
    scene_id: sc4
    step_type: theory
    prompt: 'Or this: a doctor gave a pill to one person — it worked. Does the medicine work? No! You need to test on many
      people. Maybe that person was just lucky.'
  - step_id: sc4_84
    source_step_id: '84'
    scene_id: sc4
    step_type: theory
    prompt: 'And one more important rule: conditions need to be similar. If Sashko ran on the track the first time and uphill
      the second time, that''s not a fair comparison. The test needs to be the same.'
  - step_id: sc4_85
    source_step_id: '85'
    scene_id: sc4
    step_type: single_choice
    prompt: '"Petya jumped farther than Misha once. Is Petya a better jumper?"'
    options:
    - id: opt_1
      text: Yes, once is enough
    - id: opt_2
      text: No, we need more tests
    options_count: 2
    correct_answer: opt_2
    explanation: Once — red light. Maybe Misha had wind in his way. Maybe Petya got lucky. We need more tries.
    explanation_status: implicit
  - step_id: sc4_87
    source_step_id: '87'
    scene_id: sc4
    step_type: single_choice
    prompt: '"The light turned on 100 times out of 100 when the switch was pressed."'
    options:
    - id: opt_1
      text: Pattern
    - id: opt_2
      text: Coincidence
    options_count: 2
    correct_answer: opt_1
    explanation: Green light! 100 out of 100 is reliable. Electricity works every time.
    explanation_status: implicit
  - step_id: sc4_89
    source_step_id: '89'
    scene_id: sc4
    step_type: theory
    prompt: 'Remember the light: once — red, stop. Two or three — yellow, keep testing. Five or more same results — green,
      looks like a pattern. More tests — more reliable.'
- scene_id: sc5
  title: 'Practice: Pattern or Coincidence?'
  steps:
  - step_id: sc5_90
    source_step_id: '90'
    scene_id: sc5
    step_type: theory
    prompt: We have a whole arsenal now! Three words, five tools, four detective questions plus the repeatability light. Enough
      learning — time to work! We warmed up the brain — now let's test it.
  - step_id: sc5_91
    source_step_id: '91'
    scene_id: sc5
    step_type: instruction
    prompt: 'I describe a situation — you decide: pattern or coincidence? We need speed! Let''s go!'
  - step_id: sc5_92
    source_step_id: '92'
    scene_id: sc5
    step_type: single_choice
    prompt: '"Ice cream melts in the sun."'
    options:
    - id: opt_1
      text: Pattern
    - id: opt_2
      text: Coincidence
    options_count: 2
    correct_answer: opt_1
    explanation: Pattern! Ice cream always melts in the sun — chocolate, vanilla, expensive — sun doesn't care how much it
      cost. It just melts.
    explanation_status: implicit
  - step_id: sc5_94
    source_step_id: '94'
    scene_id: sc5
    step_type: single_choice
    prompt: '"You washed Dad''s car — and it rained."'
    options:
    - id: opt_1
      text: Pattern
    - id: opt_2
      text: Coincidence
    options_count: 2
    correct_answer: opt_2
    explanation: 'Coincidence! Rain doesn''t sit on a cloud waiting: "Oh, Petya''s washing his car! Let''s go!" Rain has its
      own plans. Just bad luck.'
    explanation_status: implicit
  - step_id: sc5_96
    source_step_id: '96'
    scene_id: sc5
    step_type: single_choice
    prompt: '"I wore a new cap — and the team won."'
    options:
    - id: opt_1
      text: Pattern
