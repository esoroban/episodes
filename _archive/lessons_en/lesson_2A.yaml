- scene_id: sc6
  title: Why Do We Need This?
  steps:
  - step_id: sc6_123
    source_step_id: '123'
    scene_id: sc6
    step_type: theory
    prompt: 'Let''s stop and think: why do we need this? Patterns, coincidences, traffic light... This isn''t a school subject.
      It''s a superpower. Let me explain.'
  - step_id: sc6_124
    source_step_id: '124'
    scene_id: sc6
    step_type: theory
    prompt: 'Imagine: a friend says — "Every time I wear my lucky bracelet, I get excellent grades!" You''d think: "Wow, cool
      bracelet!" But now? Now you''re a detective. How many times? Twice? Red light! Maybe he just studied for those tests?
      The bracelet doesn''t solve problems. The brain does.'
  - step_id: sc6_125
    source_step_id: '125'
    scene_id: sc6
    step_type: theory
    prompt: 'Or this: your older brother says — "I always win when I play at home!" Sounds convincing. But you ask: how many
      times did you win at home? How many times did you lose — did you count that? Maybe you just remember the wins and forgot
      the losses? The brain loves to do that — remember coincidences, forget everything else.'
  - step_id: sc6_126
    source_step_id: '126'
    scene_id: sc6
    step_type: theory
    prompt: 'Here''s a more serious situation. Someone says: "I took this pill — and I felt better!" Once. Is that green light?
      No! Red. Maybe the body handled it. Maybe sleep helped. Doctors test medicine on thousands of people — because once
      doesn''t count. Even in medicine, our traffic light works!'
  - step_id: sc6_127
    source_step_id: '127'
    scene_id: sc6
    step_type: theory
    prompt: 'Or here''s what happens in school. Someone says: "I sat at the back desk twice — and both times I was called
      on! The back desk is cursed!" But you know now: twice is yellow light. Keep testing. And by the way — maybe the teacher
      just sees who''s distracted? The desk has nothing to do with it. Desks aren''t guilty of anything.'
  - step_id: sc6_128
    source_step_id: '128'
    scene_id: sc6
    step_type: theory
    prompt: See what's happening? You're not fooled by "worked once — so it always works." You ask questions. You test. You're
      detectives who can't be tricked by coincidence.
  - step_id: sc6_129
    source_step_id: '129'
    scene_id: sc6
    step_type: theory
    prompt: 'Now let''s put it all together. Last lesson we learned to CHECK — with tools that give numbers. Today we learned:
      one test isn''t enough. We need REPEATABILITY.'
  - step_id: sc6_130
    source_step_id: '130'
    scene_id: sc6
    step_type: theory
    prompt: A pattern is when the result is the same every time. Ice melts, balls fall, sugar dissolves. Nature doesn't care
      who's watching — it works always.
  - step_id: sc6_131
    source_step_id: '131'
    scene_id: sc6
    step_type: theory
    prompt: A coincidence is when the brain made up a connection that doesn't exist. Cap and victory. Cat and being late.
      Smile and sun. Sounds nice — but doesn't pass the light test.
  - step_id: sc6_132
    source_step_id: '132'
    scene_id: sc6
    step_type: theory
    prompt: 'Repeatability light: once — red, stop. Two or three — yellow, keep testing. Five or more — green, looks like
      a pattern.'
  - step_id: sc6_133
    source_step_id: '133'
    scene_id: sc6
    step_type: theory
    prompt: And conditions! Testing is fair only when conditions are the same. Run on the track both times — fair. Once on
      track, once uphill — unfair.
  - step_id: sc6_134
    source_step_id: '134'
    scene_id: sc6
    step_type: theory
    prompt: The truth detective now has four questions. Is there a tool? Are there no excuses? What did the test show? And
      — does it repeat? Four questions — and no tricky claim will get through.
  - step_id: sc6_135
    source_step_id: '135'
    scene_id: sc6
    step_type: theory
    prompt: And you know what's coolest? These questions work not just in class. They work in life — when a friend brags,
      when ads promise miracles, when someone says "it's definitely true, I tested it once." Now you have tools to think for
      yourself.
