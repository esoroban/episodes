source_lesson_id: lesson_10B
language: en
title: Tricky Questions
day: 10
slot: B
scenes:
- scene_id: sc1
  title: 'DISCOVERY: THE DAY OF IMPOSSIBLE QUESTIONS'
  steps:
  - step_id: sc1_1
    source_step_id: '1'
    scene_id: sc1
    step_type: theory
    prompt: Dmytryk had an ordinary Tuesday. Nothing special. He woke up, yawned, went to school - and it all started.
  - step_id: sc1_2
    source_step_id: '2'
    scene_id: sc1
    step_type: theory
    prompt: 'In the morning brother Taras meets him in the hall and says: "Why did you take my headphones again without asking
      and not telling me?"'
  - step_id: sc1_3
    source_step_id: '3'
    scene_id: sc1
    step_type: theory
    prompt: But he didn't take the headphones. But the question is built as though he did. How do you answer?
  - step_id: sc1_4
    source_step_id: '4'
    scene_id: sc1
    step_type: theory
    prompt: 'At school Mykola comes up and asks in front of everyone: "Have you already stopped cheating on tests?"'
  - step_id: sc1_5
    source_step_id: '5'
    scene_id: sc1
    step_type: theory
    prompt: If you say "yes, I stopped" - it means you cheated before. If you say "no" - it sounds like you're still cheating.
      It's a trap!
  - step_id: sc1_6
    source_step_id: '6'
    scene_id: sc1
    step_type: theory
    prompt: 'During break the teacher calls on Dmytryk: "Why didn''t you do your English homework yesterday?"'
  - step_id: sc1_7
    source_step_id: '7'
    scene_id: sc1
    step_type: theory
    prompt: 'After school grandma calls: "When will you finally stop being glued to your phone and start living normally?"'
  - step_id: sc1_8
    source_step_id: '8'
    scene_id: sc1
    step_type: theory
    prompt: 'In the evening Dmytryk sits and thinks: "What a day! I was asked five questions and I don''t know how to answer
      any of them!"'
  - step_id: sc1_9
    source_step_id: '9'
    scene_id: sc1
    step_type: theory
    prompt: 'Sashko calls. Dmytryk tells him about his day. And Sashko says: "I know how to help you."'
  - step_id: sc1_10
    source_step_id: '10'
    scene_id: sc1
    step_type: theory
    prompt: '"Dmytryk, the problem isn''t you. It''s the questions. All day you were asked questions built as traps. You can''t
      answer them properly!"'
  - step_id: sc1_11
    source_step_id: '11'
    scene_id: sc1
    step_type: theory
    prompt: '"What do you mean break them down?" Dmytryk asks. Sashko: "Look. The question ''Why did you take my headphones
      without asking and not telling me?'' is made of several separate questions."'
  - step_id: sc1_12
    source_step_id: '12'
    scene_id: sc1
    step_type: single_choice
    prompt: How many questions are hidden in "Why did you take my headphones without asking and not telling me?"
    options:
    - id: opt_1
      text: One
    - id: opt_2
      text: Two
    - id: opt_3
      text: Three
    options_count: 3
    correct_answer: opt_3
    explanation: 'Three! First: did you take the headphones? Second: did you ask permission? Third: did you tell me? Each
      is a separate question. But they''re packed into one!'
    explanation_status: implicit
  - step_id: sc1_14
    source_step_id: '14'
    scene_id: sc1
    step_type: theory
    prompt: 'Sashko: "And Mykola''s question - ''have you already stopped cheating?'' - that''s a different trap. It''s not
      a normal question."'
  - step_id: sc1_15
    source_step_id: '15'
    scene_id: sc1
    step_type: single_choice
    prompt: What's the hidden assumption in "Have you already stopped cheating?"
    options:
    - id: opt_1
      text: 'Assumption: you never cheated'
    - id: opt_2
      text: 'Assumption: you cheated before'
    - id: opt_3
      text: 'Assumption: you''re still cheating'
    options_count: 3
    correct_answer: opt_2
    explanation: 'Assumption: you cheated before! The word "already" emphasizes this. "Already stopped" - means you did it
      before.'
    explanation_status: implicit
  - step_id: sc1_17
    source_step_id: '17'
    scene_id: sc1
    step_type: theory
    prompt: 'Dmitry: “So, all day long they asked me tricky questions, and I tried to play by their rules?” Sashko: “Exactly!
      Today we will learn to see two types of tricky questions - and how to deal with them."'
  - step_id: sc1_18
    source_step_id: '18'
    scene_id: sc1
    step_type: theory
    prompt: Now science! Scientists described three main types of tricky questions. The first type is what we just analyzed.
  - step_id: sc1_19
    source_step_id: '19'
    scene_id: sc1
    step_type: instruction
    prompt: 'TYPE 1: LOADED QUESTION (Loaded Question)'
- scene_id: sc2
  title: A loaded question is when an assumption is hidden in the question that you can't challenge without answering the
    question itself.
  steps:
  - step_id: sc2_20
    source_step_id: '20'
    scene_id: sc2
    step_type: theory
    prompt: 'Example: "When will you finally stop hiding money in your drawer instead of giving it to mom?" Assumption: you
      hide money.'
  - step_id: sc2_21
    source_step_id: '21'
    scene_id: sc2
    step_type: theory
    prompt: 'Answer: you can''t just say "I''m not hiding it" - that looks like dodging. And if you say anything else, it
      sounds like the assumption is true.'
  - step_id: sc2_22
    source_step_id: '22'
    scene_id: sc2
    step_type: theory
    prompt: А хитрость в том, что если ответить только на одно — кажется, что с остальным ты согласен. Дмитрик сказал «тетрадь
      забыл» — и получилось, будто он и домашку не сделал, и опоздал. А он не опаздывал!
  - step_id: sc2_23
    source_step_id: '23'
    scene_id: sc2
    step_type: theory
    prompt: 'This is when the question has a presupposition that isn''t discussed. For example: "What brand of chocolate do
      you prefer - dark or milk?" Presupposition: you eat chocolate.'
  - step_id: sc2_24
    source_step_id: '24'
    scene_id: sc2
    step_type: theory
    prompt: If you don't eat chocolate, both answer options are wrong. But the question is built as though a choice is mandatory.
  - step_id: sc2_25
    source_step_id: '25'
    scene_id: sc2
    step_type: single_choice
    prompt: 'TYPE 3: COMPOUND QUESTIONS'
    options:
    - id: opt_1
      text: 'This is when several questions are packed into one, like with the brother: "Why did you take my headphones without
        asking and not telling me?"'
    - id: opt_2
      text: You can't answer one without answering the others. This creates confusion and a muddled answer.
    options_count: 2
    correct_answer: opt_1
    explanation: And now you know all three types. But you probably have two more important questions.
    explanation_status: implicit
  - step_id: sc2_27
    source_step_id: '27'
    scene_id: sc2
    step_type: single_choice
    prompt: 'QUESTION 1: HOW TO SPOT THEM?'
    options:
    - id: opt_1
      text: 'First warning sign: the question sounds odd or uncomfortable. You feel something''s wrong, but you don''t know
        what.'
    - id: opt_2
      text: 'Second sign: whatever you answer, it makes you look guilty or bad. There''s no good way out.'
    options_count: 2
    correct_answer: opt_2
    explanation: 'Third sign: the question has multiple parts at once. If you break it into several simple questions - it
      becomes clear.'
    explanation_status: implicit
  - step_id: sc2_29
    source_step_id: '29'
    scene_id: sc2
    step_type: single_choice
    prompt: 'Fourth sign: the question starts with words "have you already," "are you still," "when will you finally." These
      signal assumptions.'
    options:
    - id: opt_1
      text: 'QUESTION 2: HOW TO ANSWER THEM?'
    - id: opt_2
      text: 'Science offers an answer: break the question into parts and discuss the assumptions.'
    options_count: 2
    correct_answer: opt_1
    explanation: 'For example, to brother''s question: "Why did you take my headphones without asking and not telling me?"
      you can answer:'
    explanation_status: implicit
  - step_id: sc2_31
    source_step_id: '31'
    scene_id: sc2
    step_type: single_choice
    prompt: '"Wait. Your question contains an assumption. You''re assuming I took the headphones. First, let''s discuss: did
      I actually take them?"'
    options:
    - id: opt_1
      text: 'To Mykola''s question: "Have you already stopped cheating?" you can say:'
    - id: opt_2
      text: '"Your question assumes I cheated. I didn''t cheat, so your question is incorrectly framed."'
    options_count: 2
    correct_answer: opt_2
    explanation: 'To teacher''s question: "Why didn''t you do your homework?" you can ask:'
    explanation_status: implicit
  - step_id: sc2_33
    source_step_id: '33'
    scene_id: sc2
    step_type: single_choice
    prompt: '"Excuse me, but that assumes I had the ability and intention to do it. Let me first explain the circumstances."'
    options:
    - id: opt_1
      text: 'PRACTICE: RECOGNIZE THE TYPE OF QUESTION'
    - id: opt_2
      text: Now you're ready to spot tricky questions in the wild. Let's practice!
    options_count: 2
    correct_answer: opt_2
    explanation: 'Составной! Три темы: как сделал, сколько времени, кто помогал. Причём если ответить «мне помогал папа» —
      кажется, что ты ничего сам не делал. Разделяй!'
    explanation_status: implicit
  - step_id: sc2_35
    source_step_id: '35'
    scene_id: sc2
    step_type: single_choice
    prompt: What type is this?
    options:
    - id: opt_1
      text: Loaded question
    - id: opt_2
      text: Presupposition
    options_count: 2
    correct_answer: opt_1
    explanation: Simple! One topic is lunch. Yes or no. No hidden questions inside.
    explanation_status: present
  - step_id: sc2_37
    source_step_id: '37'
    scene_id: sc2
    step_type: single_choice
    prompt: Presupposition! The question assumes you're lazy. It's a presupposition not discussed separately.
    options:
    - id: opt_1
      text: 2. "Don't you think it would be better to focus on your homework instead of wasting time on games?"
    - id: opt_2
      text: What type is this?
    options_count: 2
    correct_answer: opt_2
    explanation: 'Composite! Three charges: didn’t show up, didn’t call, didn’t congratulate. And you: “Stop! You didn’t call
      me, that’s why you didn’t come. I didn’t call, but I wrote in the chat. Let''s get it in order!"'
    explanation_status: implicit
  - step_id: sc2_39
    source_step_id: '39'
    scene_id: sc2
    step_type: single_choice
    prompt: Presupposition
    options:
    - id: opt_1
      text: Compound
    - id: opt_2
      text: Loaded question! The question assumes you waste time on games and simultaneously asks you to agree. Tricky.
    options_count: 2
    correct_answer: opt_1
    explanation: 3. "Did you see my new dress? I like it, but it's expensive. What do you think about it?"
    explanation_status: implicit
  - step_id: sc2_41
    source_step_id: '41'
    scene_id: sc2
    step_type: single_choice
    prompt: What type is this?
    options:
    - id: opt_1
      text: Loaded question
    - id: opt_2
      text: Presupposition
    options_count: 2
    correct_answer: opt_2
    explanation: 'Composite! Three questions: did you take a pencil, did you draw, did you apologize. Maybe the teacher gave
      the pencil, and someone else drew in the notebook. Don''t answer everything at once - take it piece by piece!'
    explanation_status: implicit
- scene_id: sc3
  title: Presupposition! The question assumes you saw the dress. "Did you see my new dress?" - that's assuming it exists and
    you had the chance to see it.
  steps:
  - step_id: sc3_43
    source_step_id: '43'
    scene_id: sc3
    step_type: theory
    prompt: '4. "Choose: are you smarter than your brother or is he smarter than you?"'
  - step_id: sc3_44
    source_step_id: '44'
    scene_id: sc3
    step_type: theory
    prompt: 'A trap question works like a mousetrap: the bait is the question itself, and the trap is the hidden assumption
      within. You grab the bait, trying to respond - and get caught. Any answer confirms what did not happen!'
  - step_id: sc3_45
    source_step_id: '45'
    scene_id: sc3
    step_type: theory
    prompt: 'Marker words that give away the trap: “Have you stopped...?”, “Why do you always...?”, “When did you finally...?”,
      “Admit that you...” If you hear this, stop. Don''t answer right away!'
  - step_id: sc3_46
    source_step_id: '46'
    scene_id: sc3
    step_type: theory
    prompt: 'How to get out of the trap? Three step technique. First: find the hidden assumption. Second: say it''s wrong.
      Third: only then answer the question if it is still needed.'
  - step_id: sc3_47
    source_step_id: '47'
    scene_id: sc3
    step_type: theory
    prompt: 'Magic phrases: “Your question assumes that... But it doesn’t!” Or: “Stop! I''ve never done what you''re talking
      about." Or: “The question is posed incorrectly - let’s reformulate it.”'
  - step_id: sc3_48
    source_step_id: '48'
    scene_id: sc3
    step_type: theory
    prompt: Presupposition! The question assumes one of you must be smarter. But what if you're equally smart? Or if intelligence
      is measured differently?
  - step_id: sc3_49
    source_step_id: '49'
    scene_id: sc3
    step_type: single_choice
    prompt: 5. "Which team do you support - Dynamo or Shakhtar?"
    options:
    - id: opt_1
      text: What type is this?
    - id: opt_2
      text: Loaded question
    options_count: 2
    correct_answer: opt_2
    explanation: 'Trap! Hidden Assumption: You lied to your parents. Answer: “Stop! I don''t lie to my parents. Your question
      assumes something that didn’t happen!”'
    explanation_status: implicit
  - step_id: sc3_51
    source_step_id: '51'
    scene_id: sc3
    step_type: single_choice
    prompt: Compound
    options:
    - id: opt_1
      text: Presupposition! The question assumes you support one of these teams. What if you're not interested in football
        at all?
    - id: opt_2
      text: 6. "When did you last see your best friend, and why haven't you visited them?"
    options_count: 2
    correct_answer: opt_1
    explanation: What type is this?
    explanation_status: implicit
  - step_id: sc3_53
    source_step_id: '53'
    scene_id: sc3
    step_type: single_choice
    prompt: Loaded question
    options:
    - id: opt_1
      text: Presupposition
    - id: opt_2
      text: Compound
    options_count: 2
    correct_answer: opt_2
    explanation: 'Compound! It''s essentially two questions: "When did you last see?" and "Why haven''t you visited?" - combined
      together. Each needs a separate answer.'
    explanation_status: implicit
  - step_id: sc3_55
    source_step_id: '55'
    scene_id: sc3
    step_type: single_choice
    prompt: 'PRACTICE: BREAK DOWN THE QUESTION'
    options:
    - id: opt_1
      text: Now let's raise the difficulty. I'll give you a tricky question and you break it into parts.
    - id: opt_2
      text: '"Why don''t you do your homework and instead sit online all night?"'
    options_count: 2
    correct_answer: opt_1
    explanation: 'Break down this question:'
    explanation_status: implicit
  - step_id: sc3_57
    source_step_id: '57'
    scene_id: sc3
    step_type: single_choice
    prompt: 'First question: do you do your homework?'
    options:
    - id: opt_1
      text: 'Second question: do you spend time online?'
    - id: opt_2
      text: 'Third question: do you spend all night online?'
    options_count: 2
    correct_answer: opt_2
    explanation: Exactly! The question assumes both statements are true, but you can answer each separately.
    explanation_status: present
  - step_id: sc3_59
    source_step_id: '59'
    scene_id: sc3
    step_type: single_choice
    prompt: '"Have you lied to your parents before when you said you''d do homework but actually went out to play?"'
    options:
    - id: opt_1
      text: 'Break down this question:'
    - id: opt_2
      text: 'Assumption 1: you''ve lied to your parents before'
    options_count: 2
    correct_answer: opt_2
    explanation: 'Assumption 2: you told them a specific task (homework)'
    explanation_status: implicit
  - step_id: sc3_61
    source_step_id: '61'
    scene_id: sc3
    step_type: single_choice
    prompt: 'Assumption 3: you actually went out to play instead'
    options:
    - id: opt_1
      text: Exactly! The question contains six assumptions packed into one. Each can be challenged separately.
    - id: opt_2
      text: HOW TO ESCAPE THE TRAP
    options_count: 2
    correct_answer: opt_1
    explanation: You already know how to spot tricky questions. Now - solutions. How do you answer correctly without falling
      into the trap?
    explanation_status: present
  - step_id: sc3_63
    source_step_id: '63'
    scene_id: sc3
    step_type: single_choice
    prompt: 'STRATEGY 1: Ask a counter-question'
    options:
    - id: opt_1
      text: When you hear a tricky question - ask a question in return.
    - id: opt_2
      text: 'To the question: "When will you stop wasting my time?" you can respond: "What do you mean by ''wasting time''?
        Can you give a specific example?"'
    options_count: 2
    correct_answer: opt_2
    explanation: This forces the person to be more specific and use fewer assumptions.
    explanation_status: implicit
- scene_id: sc4
  title: 'STRATEGY 2: Challenge the assumption'
  steps:
  - step_id: sc4_65
    source_step_id: '65'
    scene_id: sc4
    step_type: theory
    prompt: Directly state that the question assumes something that isn't necessarily true.
  - step_id: sc4_66
    source_step_id: '66'
    scene_id: sc4
    step_type: theory
    prompt: 'To the question: "How can you be so ungrateful?" you can say: "Your question assumes I''m ungrateful. I don''t
      agree with that assumption."'
  - step_id: sc4_67
    source_step_id: '67'
    scene_id: sc4
    step_type: theory
    prompt: This is called a rhetorical question. The word “rhetoric” comes from Ancient Greece. It was the art of convincing
      with words. Speakers were specially trained to ask questions that did not require an answer.
  - step_id: sc4_68
    source_step_id: '68'
    scene_id: sc4
    step_type: theory
    prompt: When the question is vague or has multiple parts - ask for clarification.
  - step_id: sc4_69
    source_step_id: '69'
    scene_id: sc4
    step_type: theory
    prompt: 'To the question: "Why don''t you support me and hang out with them?" you can say: "Your question has multiple
      parts. First: what does ''don''t support'' mean? Second: I can be friends with others and still support you."'
  - step_id: sc4_70
    source_step_id: '70'
    scene_id: sc4
    step_type: theory
    prompt: 'Marker words: “Isn’t it...”, “Do you really think that...”, “Who is in their right mind...”, “How can you not
      understand that...” If you hear this, be on your guard!'
  - step_id: sc4_71
    source_step_id: '71'
    scene_id: sc4
    step_type: theory
    prompt: If the question is compound (has multiple questions), break it down and answer each separately.
  - step_id: sc4_72
    source_step_id: '72'
    scene_id: sc4
    step_type: single_choice
    prompt: 'To the question: "Why don''t you want to visit your aunt and bring your laptop?" you can say: "That''s two questions.
      First, about why I might not want to visit. Second, about what I bring. Let''s separate them."'
    options:
    - id: opt_1
      text: 'STRATEGY 5: Offer an alternative'
    - id: opt_2
      text: If the question assumes you only have two choices, offer a third.
    options_count: 2
    correct_answer: opt_2
    explanation: 'To the question: "Are you with us or against us?" you can say: "I can be with you on some issues and disagree
      on others."'
    explanation_status: implicit
  - step_id: sc4_74
    source_step_id: '74'
    scene_id: sc4
    step_type: single_choice
    prompt: 'MINI-SCENE: TRICKY QUESTIONS IN DIALOGUE'
    options:
    - id: opt_1
      text: Let's see how this works in a real conversation. Dmytryk comes home and meets three classmates.
    - id: opt_2
      text: 'SCENE 1: Loaded Question'
    options_count: 2
    correct_answer: opt_1
    explanation: 'Petya: "Why didn''t you come to the match yesterday and listen to music instead?"'
    explanation_status: implicit
  - step_id: sc4_76
    source_step_id: '76'
    scene_id: sc4
    step_type: single_choice
    prompt: 'Bad answer: "I wasn''t listening to music!" (sounds like dodging)'
    options:
    - id: opt_1
      text: 'Good answer: "Your question assumes two things. First, that I didn''t come. Second, that I listened to music.
        Wait - I didn''t come because I was doing homework, not listening to music."'
    - id: opt_2
      text: 'SCENE 2: Presupposition'
    options_count: 2
    correct_answer: opt_2
    explanation: 'Masha: "When will you stop spending all your time gaming and start doing something useful?"'
    explanation_status: implicit
  - step_id: sc4_78
    source_step_id: '78'
    scene_id: sc4
    step_type: single_choice
    prompt: 'Bad answer: "I don''t spend all my time gaming!" (sounds defensive)'
    options:
    - id: opt_1
      text: 'Good answer: "Your question assumes I spend all my time gaming. That''s not true. By the way, how much time do
        you think I spend gaming? We can discuss the facts instead of assumptions."'
    - id: opt_2
      text: 'SCENE 3: Compound'
    options_count: 2
    correct_answer: opt_2
    explanation: 'Sashko: "Why didn''t you study for the test and come to class on time?"'
    explanation_status: implicit
  - step_id: sc4_80
    source_step_id: '80'
    scene_id: sc4
    step_type: single_choice
    prompt: 'Bad answer: "I had reasons..." (sounds like you''re opening up the whole story)'
    options:
    - id: opt_1
      text: 'Good answer: "That''s two separate questions. First, I did study but not enough. Second, I did come on time.
        Let''s address them separately, not together."'
    - id: opt_2
      text: 'PRACTICE: ESCAPE THE TRAP'
    options_count: 2
    correct_answer: opt_1
    explanation: Now let's try! I'll give you a tricky question and you try to answer it correctly.
    explanation_status: present
  - step_id: sc4_82
    source_step_id: '82'
    scene_id: sc4
    step_type: single_choice
    prompt: 1. "When will you finally start thinking about your future instead of fooling around on social media?"
    options:
    - id: opt_1
      text: How would you answer?
    - id: opt_2
      text: 'You could say: "Your question assumes I don''t think about my future. But I do. And social media isn''t the same
        as not thinking about the future. Let''s discuss how I balance studying and relaxing."'
    options_count: 2
    correct_answer: opt_2
    explanation: 2. "Why don't you want to tell me about your life and keep everything to yourself?"
    explanation_status: implicit
  - step_id: sc4_84
    source_step_id: '84'
    scene_id: sc4
    step_type: single_choice
    prompt: How would you answer?
    options:
    - id: opt_1
      text: 'You could ask: "What makes you think I''m keeping to myself? Can you give a specific example?" This makes the
        person clarify their assumption.'
    - id: opt_2
      text: 3. "Have you met them at night before when you told your parents you were going to the library?"
    options_count: 2
    correct_answer: opt_2
    explanation: Statement! “It’s stupid to believe in omens” - that’s what’s hidden inside. The person does not ask - he
