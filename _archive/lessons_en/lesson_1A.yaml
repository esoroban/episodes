lesson_id: lesson_1A
stage0_run_id: run_2026_03_14T06_02_25Z_lesson_1A_lesson_1B
source_lesson_id: lesson_1A
language: en
title: Fact, Opinion and Falsehood
day: 1
slot: A
scenes:
- scene_id: sc1
  title: OPENING
  steps:
  - step_id: sc1_1
    source_step_id: '1'
    scene_id: sc1
    step_type: theory
    prompt: 'Hi! Imagine: your friend says, "Tomorrow''s test is cancelled!" You got excited and didn''t study. But in the
      morning you come to class - and there''s the test. Has that ever happened?'
  - step_id: sc1_2
    source_step_id: '2'
    scene_id: sc1
    step_type: theory
    prompt: 'Or during break, an argument: "Football is better than basketball!" - "No, basketball!" Voices getting louder,
      you''re almost fighting. And then it''s unclear - can anyone even be right? How do you argue without falling out?'
  - step_id: sc1_3
    source_step_id: '3'
    scene_id: sc1
    step_type: theory
    prompt: That's why we're starting the course "The Power of Words." Thirteen lessons. After them, you'll understand words
      the way you now understand your favorite game. Let me show you what's ahead.
  - step_id: sc1_4
    source_step_id: '4'
    scene_id: sc1
    step_type: theory
    prompt: 'First. We''ll learn to tell three things apart: fact, opinion, and falsehood. "There are twenty desks in the
      class" - that''s a fact, you can count them. "Math is a boring subject" - that''s someone''s opinion. "Schools will
      close forever" - that''s falsehood, someone made it up. Some people call it a lie. Others call it a made-up story. We''ll
      use one word for it: falsehood.'
  - step_id: sc1_5
    source_step_id: '5'
    scene_id: sc1
    step_type: theory
    prompt: 'Then - how to verify. Your friend says: "I run faster than everyone!" How do you check? Time it. See it with
      your own eyes. Measure it. Look it up in a reference book. Four ways - and you''re hard to fool.'
  - step_id: sc1_6
    source_step_id: '6'
    scene_id: sc1
    step_type: theory
    prompt: Next - word traps. "All boys love football." All of them? Every single one? And "nobody eats broccoli" - really
      nobody? Words like "all," "nobody," "always," "never" - these are traps. We'll learn to spot them.
  - step_id: sc1_7
    source_step_id: '7'
    scene_id: sc1
    step_type: theory
    prompt: 'And sometimes: you say something smart, and the answer is - "You''re still too young, you don''t understand anything!"
      That''s not an answer. That''s attacking you, not your idea. We''ll learn to tell the difference.'
  - step_id: sc1_8
    source_step_id: '8'
    scene_id: sc1
    step_type: theory
    prompt: 'Or like this: "If you don''t eat your soup - you''ll get sick!" "If you don''t go to the party - everyone will
      laugh at you!" That''s when people scare us so we don''t think, we just obey. We''ll learn to think even when we''re
      scared.'
  - step_id: sc1_9
    source_step_id: '9'
    scene_id: sc1
    step_type: theory
    prompt: 'And the coolest part. Do you know what manipulation is? "If you were a real friend, you''d help me cheat." That''s
      not an attack on your brain - it''s an attack on your feelings. We''ll learn to answer: "That''s manipulation. Let''s
      stick to the facts."'
  - step_id: sc1_10
    source_step_id: '10'
    scene_id: sc1
    step_type: reflection
    prompt: Who hasn't felt stuck when someone pressures you like that? That's normal. You can learn this. That's why we're
      here.
  - step_id: sc1_11
    source_step_id: '11'
    scene_id: sc1
    step_type: theory
    prompt: After this course, you'll be like a detective from a movie - who sees what others don't. Someone's lying - you'll
      notice. Someone's manipulating you - it won't work. Propaganda, manipulation, fake news - you'll read people like an
      open book. Thirteen lessons - and words will become your superpower. Ready?
  - step_id: sc1_12
    source_step_id: '12'
    scene_id: sc1
    step_type: theory
    prompt: Now listen to an interesting story about an argument that started over ice cream.
- scene_id: sc2
  title: STORY - THE ICE CREAM ARGUMENT
  steps:
  - step_id: sc2_13
    source_step_id: '13'
    scene_id: sc2
    step_type: theory
    prompt: 'During break, Mykola and Masha stand at the ice cream kiosk. Mykola takes chocolate and announces: "Chocolate
      ice cream is the best! And it costs only twenty-five hryvnias."'
  - step_id: sc2_14
    source_step_id: '14'
    scene_id: sc2
    step_type: theory
    prompt: 'Masha snorts: "Nothing of the sort! Strawberry is a hundred times tastier!" Both are sure. Both won''t give in.
      The argument is in full swing.'
  - step_id: sc2_15
    source_step_id: '15'
    scene_id: sc2
    step_type: theory
    prompt: 'Then Dmitrik runs up: "Guys, news! No lessons tomorrow! Petrik told me, and he heard from his older brother!"
      Mykola and Masha forgot about ice cream.'
  - step_id: sc2_16
    source_step_id: '16'
    scene_id: sc2
    step_type: theory
    prompt: 'The kids got excited. But Olenka frowned: "Wait... how does the older brother know that?" Good question.'
  - step_id: sc2_17
    source_step_id: '17'
    scene_id: sc2
    step_type: single_choice
    prompt: 'Wow, so much going on! Let''s sort it out. First - Mykola and Masha. Mykola says: "Chocolate ice cream is better!"
      Masha says: "No, strawberry!" Who''s right? Let''s vote!'
    options:
    - id: opt_1
      text: Mykola
    - id: opt_2
      text: Masha
    - id: opt_3
      text: I don't know
    options_count: 3
    explanation: null
    explanation_status: missing
  - step_id: sc2_18
    source_step_id: '18'
    scene_id: sc2
    step_type: open_question
    prompt: Interesting! Can we even find the right answer here? Can we somehow prove that chocolate is DEFINITELY tastier
      than strawberry? Measure it? Weigh it? Look it up in a textbook?
  - step_id: sc2_19
    source_step_id: '19'
    scene_id: sc2
    step_type: theory
    prompt: No! Because "tastier" is a matter of opinion. Mykola likes chocolate. Masha likes strawberry. And both are right.
      And both are wrong. It's their personal feeling. Remember this argument - we'll come back to it.
  - step_id: sc2_20
    source_step_id: '20'
    scene_id: sc2
    step_type: theory
    prompt: 'Now - Dmitrik. He said: no lessons tomorrow. I think he''s right. Petrik told him, and Petrik heard from his
      older brother. The older brother definitely knows. Do you agree?'
  - step_id: sc2_21
    source_step_id: '21'
    scene_id: sc2
    step_type: single_choice
    prompt: Disagree? Why? The older brother is OLDER. He's big, he knows more. Or does he? Where did the older brother find
      out? From the internet? Well, everything on the internet is true, right? Let's vote!
    options:
    - id: opt_1
      text: Always true
    - id: opt_2
      text: Not always
    options_count: 2
    correct_answer: opt_2
    explanation: null
    explanation_status: missing
  - step_id: sc2_22
    source_step_id: '22'
    scene_id: sc2
    step_type: theory
    prompt: Okay. But maybe the older brother didn't read it on the internet. Maybe a friend told him. And the friend's mom
      told him. And mom heard from a neighbor. And the neighbor was just joking. It's like a chain - like the game "broken
      telephone." Everyone passed it on their own way, and by the end nobody knows what it is.
  - step_id: sc2_23
    source_step_id: '23'
    scene_id: sc2
    step_type: instruction
    prompt: 'Okay. And let me tell you right now: tomorrow instead of math, there will be two PE lessons. Do you believe me?
      I''m a teacher! Can you trust teachers?'
  - step_id: sc2_24
    source_step_id: '24'
    scene_id: sc2
    step_type: theory
    prompt: You see - you didn't believe me right away. And that's right! Because what matters is not WHO says it, but WHETHER
      YOU CAN CHECK IT. Even if it's a teacher, friend, mom, or president speaking.
  - step_id: sc2_25
    source_step_id: '25'
    scene_id: sc2
    step_type: open_question
    prompt: How could Dmitrik verify this? What would you do in his place? Maybe go to the teacher's room and ask? Or check
      the schedule on the bulletin board? That's what VERIFYING means.
    teacher_guidance: How could Dmitrik verify this? What would you do in his place? Maybe go to the teacher's room and ask?
      Or check the schedule on the bulletin board?
  - step_id: sc2_26
    source_step_id: '26'
    scene_id: sc2
    step_type: theory
    prompt: See the difference? The ice cream argument - there's NOTHING to verify. Everyone likes their own thing. But Dmitrik's
      news - you can go and find out for sure. Two completely different cases. Dmitrik didn't verify - and got caught out.
      To keep this from happening to us, we need to understand what kinds of statements there are. Let's find out now.
- scene_id: sc3
  title: WHAT IS A FACT
  steps:
  - step_id: sc3_27
    source_step_id: '27'
    scene_id: sc3
    step_type: instruction
    prompt: So we said - there are statements you can verify, and those you can't. Let's start with those you CAN. Remember,
      Mykola said something else in the story? "Ice cream costs twenty-five hryvnias." Can you verify that?
  - step_id: sc3_28
    source_step_id: '28'
    scene_id: sc3
    step_type: theory
    prompt: Of course! Go to a store - check the price tag. Ask a seller. Look it up online. You can find out for sure. And
      if you verify it and it turns out to be true - that's called a FACT.
  - step_id: sc3_29
    source_step_id: '29'
    scene_id: sc3
    step_type: theory
    prompt: Attention - tricky part. "There are eight continents on Earth." Can you verify that? Yes! Open a map - count them.
      But when you verify - it turns out there are six continents, not eight. So that's NOT a fact. You can verify it, but
      it's falsehood. But "There are six continents on Earth" - you verified it, it checks out - THAT'S a fact.
  - step_id: sc3_30
    source_step_id: '30'
    scene_id: sc3
    step_type: theory
    prompt: 'And what do we do with something that can be verified but turns out to be false? That''s a separate interesting
      story - we''ll figure that out in the next lessons. For now, let''s remember: a fact is something you verify and it''s
      true.'
- scene_id: sc4
  title: 'PRACTICE: FACTS'
  steps:
  - step_id: sc4_31
    source_step_id: '31'
    scene_id: sc4
    step_type: instruction
    prompt: Let's check ourselves! I say a phrase - and you decide. Ready?
  - step_id: sc4_32
