    explanation_status: present
  - step_id: sc6_64
    source_step_id: '64'
    scene_id: sc6
    step_type: theory
    prompt: Perfect! Ten out of ten. We have two words already - fact and opinion. One more left - the trickiest one.
- scene_id: sc7
  title: WHAT IS FALSEHOOD
  steps:
  - step_id: sc7_65
    source_step_id: '65'
    scene_id: sc7
    step_type: theory
    prompt: 'What about Dmitrik? He said: "Lessons are cancelled tomorrow!" Where did he find out? Petrik told him, and Petrik
      heard from his brother, and his brother heard from someone on the internet. We''ve already figured this out - it could
      have been verified. But when checked - it turned out to be false. Someone made it up.'
  - step_id: sc7_66
    source_step_id: '66'
    scene_id: sc7
    step_type: theory
    prompt: That's the third word - FALSEHOOD. It's when someone says something that doesn't match reality. You can verify
      it - and it turns out to be false.
  - step_id: sc7_67
    source_step_id: '67'
    scene_id: sc7
    step_type: theory
    prompt: But falsehood comes in DIFFERENT types! Sometimes a person knows they're lying - and does it on purpose. But sometimes
      - they believe it themselves and are just wrong. Dmitrik wasn't lying - he believed Petrik. But the information turned
      out to be false anyway.
  - step_id: sc7_68
    source_step_id: '68'
    scene_id: sc7
    step_type: reflection
    prompt: 'The first type - JOKE. A friend says: "There''s a spider on your shoulder!" You jump - and he laughs: "I was
      joking!" He knew it wasn''t true. But he wanted to laugh, not fool you. That''s fine.'
  - step_id: sc7_69
    source_step_id: '69'
    scene_id: sc7
    step_type: reflection
    prompt: The second type - FAIRY TALE. "Once there was a dragon who loved pancakes." Everyone understands this isn't real.
      No one is lying - it's for fun. That's fine too.
  - step_id: sc7_70
    source_step_id: '70'
    scene_id: sc7
    step_type: theory
    prompt: And the third type - FAKE. That's when someone DELIBERATELY makes up false information and wants you to believe
      it. "The internet says schools will close forever." The person wants you to get scared, share it, tell others. That's
      dangerous false information.
