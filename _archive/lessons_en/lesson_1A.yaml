    - id: opt_2
      text: Can't verify
    options_count: 2
    correct_answer: opt_1
    explanation: Fact! You turned your head - verified - yes, it's there. The truth is confirmed.
    explanation_status: present
  - step_id: sc4_34
    source_step_id: '34'
    scene_id: sc4
    step_type: single_choice
    prompt: '"Math is a boring subject."'
    options:
    - id: opt_1
      text: Fact
    - id: opt_2
      text: Can't verify
    options_count: 2
    correct_answer: opt_2
    explanation: Can't verify! For some people it's boring, for others it's interesting. There's no way to know for sure.
      Sounds like the ice cream argument, doesn't it? We'll find out soon what this is called.
    explanation_status: implicit
  - step_id: sc4_36
    source_step_id: '36'
    scene_id: sc4
    step_type: single_choice
    prompt: '"Kyiv is the capital of Ukraine."'
    options:
    - id: opt_1
      text: Fact
    - id: opt_2
      text: Can't verify
    options_count: 2
    correct_answer: opt_1
    explanation: Fact! Open any map - you verified - confirmed.
    explanation_status: present
  - step_id: sc4_38
    source_step_id: '38'
    scene_id: sc4
    step_type: theory
    prompt: 'You see - now you have a rule: if you can verify it and it''s true - it''s a fact. But if "math is boring" can''t
      be verified at all - what is it then? Remember Mykola and Masha? Let''s figure it out now.'
- scene_id: sc5
  title: WHAT IS AN OPINION
  steps:
  - step_id: sc5_39
    source_step_id: '39'
    scene_id: sc5
    step_type: instruction
    prompt: Let's go back to Mykola and Masha. Remember - they were arguing about which ice cream is tastier. And we decided
      that you can't verify this. Everyone likes their own thing. Well, this has a name.
  - step_id: sc5_40
    source_step_id: '40'
    scene_id: sc5
    step_type: theory
    prompt: When a person says what THEY like, what THEY feel, what THEY think - that's called an OPINION. You can't verify
      an opinion. There's no "taste meter." There's no ruler for beauty. There's no scale for boredom.
  - step_id: sc5_41
    source_step_id: '41'
    scene_id: sc5
    step_type: theory
    prompt: 'Clue words: "I think," "I believe," "in my opinion," "the best," "the worst," "beautiful," "boring," "tasty."
      If you hear such words - most likely it''s an opinion.'
  - step_id: sc5_42
    source_step_id: '42'
    scene_id: sc5
    step_type: theory
    prompt: 'And here''s what''s important: opinions are normal. Mykola likes chocolate - great. Masha likes strawberry -
      also great. Nobody is wrong. Everyone just has their own preference.'
