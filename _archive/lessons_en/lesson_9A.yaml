source_lesson_id: lesson_9A
language: en
title: Scary Chains
day: 9
slot: A
scenes:
- scene_id: sc1
  title: Warm-up — Day 8 Review
  steps:
  - step_id: sc1_1
    source_step_id: '1'
    scene_id: sc1
    step_type: theory
    prompt: 'New day — warm-up time! Last session we covered two traps: "scarecrow" — when someone distorts your words, and
      fear manipulation — when they scare you to control you. Five rounds — let''s see who remembers!'
  - step_id: sc1_2
    source_step_id: '2'
    scene_id: sc1
    step_type: theory
    prompt: 'Katya says: "I don''t like this movie." A classmate responds: "So you hate all movies and think everyone who
      likes them is stupid?"'
  - step_id: sc1_3
    source_step_id: '3'
    scene_id: sc1
    step_type: single_choice
    prompt: What did the classmate do?
    options:
    - id: opt_1
      text: Distorted Katya's words (scarecrow)
    - id: opt_2
      text: Provided a counter-argument
    - id: opt_3
      text: Agreed with Katya
    options_count: 3
    correct_answer: opt_1
    explanation: Scarecrow! Katya said one movie — they blew it up to "you hate all movies." Classic distortion.
    explanation_status: implicit
  - step_id: sc1_5
    source_step_id: '5'
    scene_id: sc1
    step_type: theory
    prompt: 'An internet ad: "If you don''t buy our backpack — everyone in class will laugh at your old one!"'
  - step_id: sc1_6
    source_step_id: '6'
    scene_id: sc1
    step_type: single_choice
    prompt: Is this a real warning or fear manipulation?
    options:
    - id: opt_1
      text: Real warning
    - id: opt_2
      text: Fear manipulation
    options_count: 2
    correct_answer: opt_2
    explanation: Manipulation! The ad wants you scared. But really, no one looks at other people's backpacks. Well, almost
      no one.
    explanation_status: present
  - step_id: sc1_8
    source_step_id: '8'
    scene_id: sc1
    step_type: theory
    prompt: 'Andrey says: "I think we should have fewer tests." Teacher responds: "So you don''t want to learn anything at
      all?"'
  - step_id: sc1_9
    source_step_id: '9'
    scene_id: sc1
    step_type: single_choice
    prompt: What did the teacher do?
    options:
    - id: opt_1
      text: Distorted Andrey's words (scarecrow)
    - id: opt_2
      text: Asked a clarifying question
    - id: opt_3
      text: Agreed
    options_count: 3
    correct_answer: opt_1
    explanation: Scarecrow! "Less often" doesn't mean "never." The teacher turned a modest request into total rejection of
      learning. Powerful trick!
    explanation_status: implicit
  - step_id: sc1_11
    source_step_id: '11'
    scene_id: sc1
    step_type: theory
    prompt: '"Don''t ride a bike without a helmet — you can hit your head hard if you fall."'
  - step_id: sc1_12
    source_step_id: '12'
    scene_id: sc1
    step_type: single_choice
    prompt: Real warning or manipulation?
    options:
    - id: opt_1
      text: Real warning
    - id: opt_2
      text: Fear manipulation
    options_count: 2
    correct_answer: opt_1
    explanation: 'Real! Short connection: no helmet — head injury. No tricks, just a safety fact.'
    explanation_status: implicit
  - step_id: sc1_14
    source_step_id: '14'
    scene_id: sc1
    step_type: theory
    prompt: 'A friend says: "I like drawing more than playing soccer." Someone responds: "You''re just lazy and don''t want
      to exercise!"'
  - step_id: sc1_15
    source_step_id: '15'
    scene_id: sc1
    step_type: single_choice
    prompt: What trick is used?
    options:
    - id: opt_1
      text: Scarecrow (word distortion)
    - id: opt_2
      text: Fear manipulation
    - id: opt_3
      text: No trick
    options_count: 3
    correct_answer: opt_1
    explanation: Scarecrow again! “I like to draw” was turned into “lazy.” Preference is not laziness. You can love to draw
      and run marathons!
    explanation_status: implicit
  - step_id: sc1_17
    source_step_id: '17'
    scene_id: sc1
    step_type: instruction
    prompt: Great workout! Today is a new trap. It's called the "scary chain". Are you ready?
- scene_id: sc2
  title: Practice - how to respond to scarecrows and fears
  steps:
  - step_id: sc2_18
    source_step_id: '18'
    scene_id: sc2
    step_type: theory
    prompt: 'We''ve warmed up - now we''re practicing answering! Four situations. Discuss out loud: what to say in response
      and what technique was used?'
  - step_id: sc2_19
    source_step_id: '19'
    scene_id: sc2
    step_type: theory
    prompt: 'Situation one. You say, “I don’t want pizza today.” A classmate is indignant: “Do you hate everything we love?!
      Don’t you like anything at all?!”'
  - step_id: sc2_20
    source_step_id: '20'
    scene_id: sc2
    step_type: open_question
    prompt: What technique was used and how to respond?
  - step_id: sc2_21
    source_step_id: '21'
    scene_id: sc2
    step_type: theory
    prompt: 'Scarecrow! “I don’t want pizza” turned into “I hate everything.” Answer: “Let me clarify - I said about pizza
      today, and not about all the food on the planet. Tomorrow, maybe I’ll ask for a double.”'
  - step_id: sc2_22
    source_step_id: '22'
    scene_id: sc2
    step_type: theory
    prompt: 'Situation two. The school announced a talent competition. You haven''t signed up yet. A friend whispers: “If
      you don’t sign up, everyone will think that you don’t know how to do anything!” You will be the only one sitting in
      the hall as a spectator!”'
  - step_id: sc2_23
    source_step_id: '23'
    scene_id: sc2
    step_type: open_question
    prompt: Manipulation or real? How to answer using three filter questions?
  - step_id: sc2_24
    source_step_id: '24'
    scene_id: sc2
    step_type: theory
    prompt: 'Manipulation by fear! Loneliness plus failure. Answer: “Is that really what EVERYONE will think? Hardly. And
      the audience is important people too. Without spectators, a competition is a rehearsal in front of an empty hall.”'
  - step_id: sc2_25
    source_step_id: '25'
    scene_id: sc2
    step_type: theory
    prompt: 'Situation three. In class you said: “I think they give too much homework.” The teacher answers: “So you think
      that there is no need to study at all and you can play on the phone all day?”'
  - step_id: sc2_26
    source_step_id: '26'
    scene_id: sc2
    step_type: open_question
    prompt: What kind of reception? How can you clarify your words?
  - step_id: sc2_27
    source_step_id: '27'
    scene_id: sc2
    step_type: theory
    prompt: 'Scarecrow! “Too much homework” has been inflated into “no need to study.” Answer: “Let me clarify - I said that
      there is a lot of homework, and not that there is no need to study. I want to study, but sometimes I also want to go
      for a walk. One does not interfere with the other.”'
  - step_id: sc2_28
    source_step_id: '28'
    scene_id: sc2
    step_type: theory
    prompt: 'The last one! You don''t want to go to your classmate''s birthday party because you have training. He gets offended:
      “If you don’t come, I’ll cross you out of my friends!” And everyone will know that you are a traitor! No one will invite
      you anywhere else!”'
  - step_id: sc2_29
    source_step_id: '29'
    scene_id: sc2
    step_type: open_question
    prompt: What type of bullying? What is the motive? How to answer?
  - step_id: sc2_30
    source_step_id: '30'
    scene_id: sc2
    step_type: theory
    prompt: 'Manipulation by fear - loneliness! The motive is resentment. Answer: “Are you sure no one will ever call? Because
      of one workout? True friends understand that things happen. Let me come after training - if there is cake left, of course!”'
- scene_id: sc3
  title: Opening topic - scary chains
  steps:
  - step_id: sc3_31
    source_step_id: '31'
    scene_id: sc3
    step_type: instruction
    prompt: 'Listen to three stories and think - what do they have in common? Story one. The older sister tells her brother:
      “If you don’t put away the toys, you’ll trip, break your leg, won’t be able to go to school, won’t graduate, and will
      live on the street!”'
  - step_id: sc3_32
    source_step_id: '32'
    scene_id: sc3
    step_type: instruction
    prompt: ''
  - step_id: sc3_33
    source_step_id: '33'
    scene_id: sc3
    step_type: theory
    prompt: 'The second story. The older brother is frightening: “If you don’t memorize the verse, you will get a bad grade,
      then another one, you will be kept in the second year, kicked out of school, and you will become a janitor!”'
  - step_id: sc3_34
    source_step_id: '34'
    scene_id: sc3
    step_type: instruction
    prompt: ''
  - step_id: sc3_35
    source_step_id: '35'
    scene_id: sc3
    step_type: theory
    prompt: 'And the third! A friend says: “If you don’t share the candy, I’ll be offended, I’ll tell everyone, no one will
      be friends with you, you’ll be left completely alone and cry every day for the rest of your life!”'
  - step_id: sc3_36
    source_step_id: '36'
    scene_id: sc3
    step_type: instruction
    prompt: ''
  - step_id: sc3_37
    source_step_id: '37'
    scene_id: sc3
    step_type: single_choice
    prompt: What do all three stories have in common?
    options:
    - id: opt_1
      text: Everyone builds a long chain of horrors out of little things
    - id: opt_2
      text: Everyone is telling the truth
    - id: opt_3
      text: Everyone gives useful advice
    options_count: 3
    correct_answer: opt_1
    explanation: Right! In all three, someone takes a small event and builds a long road to disaster out of it. Toy → street.
      Verse → janitor. Candy → loneliness for life. It's called the "scary chain"!
    explanation_status: present
  - step_id: sc3_39
    source_step_id: '39'
    scene_id: sc3
    step_type: theory
    prompt: This is similar to fear manipulation, but there is a difference. Fear manipulation is one frightening consequence.
      And a scary chain is when the scarecrow is a whole staircase, and each step is scarier than the previous one.
- scene_id: sc4
  title: Story - "The end of the world due to a bad grade"
  steps:
  - step_id: sc4_40
    source_step_id: '40'
    scene_id: sc4
    step_type: theory
    prompt: And now - history. Dmitry comes running to his friends, pale, with a diary in his hands. "Guys! I'm finished!
      I got a bad grade in math!”
  - step_id: sc4_41
    source_step_id: '41'
    scene_id: sc4
    step_type: theory
    prompt: 'Masha: “Well, it happens. You will fix it." Dmitry waves his hands: “You don’t understand! This will make me
      have a bad quarter!”'
  - step_id: sc4_42
    source_step_id: '42'
    scene_id: sc4
    step_type: theory
    prompt: “And because of a bad quarter, a bad year! And because of a bad year, they will keep me for a second year! And
      then they’ll kick you out of school! And without school - who needs me?! I’ll live under the bridge!”
  - step_id: sc4_43
    source_step_id: '43'
    scene_id: sc4
    step_type: instruction
    prompt: ''
  - step_id: sc4_44
    source_step_id: '44'
    scene_id: sc4
    step_type: theory
    prompt: 'Olenka calmly closes the book: “Dmitrik, let’s go slowly. One bad grade is a bad quarter? What are your other
      grades?" - “Well... good and excellent.” “Then one bad quarter won’t ruin it. Further."'
  - step_id: sc4_45
    source_step_id: '45'
    scene_id: sc4
    step_type: theory
    prompt: “Let’s say a quarter is bad. Does this mean a bad year? - “Well... not necessarily. The other three quarters are
      normal." - “Yeah. Is the bad year the second year?” - “Well, this rarely happens at all...” - “And from the second year
      - right under the bridge?” Dmitry falls silent.
  - step_id: sc4_46
    source_step_id: '46'
    scene_id: sc4
    step_type: theory
    prompt: 'Masha laughs: “Dmitrik, you built a staircase of five steps, and each next one is ten times less likely! Bad
      grade → bad quarter - unlikely. Bad quarter → bad year - even less. Bad year → second year - almost never!”'
  - step_id: sc4_47
    source_step_id: '47'
    scene_id: sc4
    step_type: theory
    prompt: 'Olenka adds: “And the main thing is that at every step you can change something! Correct your grade, improve
      a quarter, ask for help. You don’t stand still and wait for the bridge to come for you!”'
  - step_id: sc4_48
    source_step_id: '48'
    scene_id: sc4
    step_type: theory
    prompt: 'Dmitry scratches the back of his head: “So... I built a terrible chain?” Olenka: “Exactly! He took a small problem
      and inflated it into a disaster. But in fact, the whole chain falls apart at the very first link.”'
- scene_id: sc5
  title: How do scary chains work?
  steps:
  - step_id: sc5_49
    source_step_id: '49'
    scene_id: sc5
    step_type: theory
    prompt: 'What''s so cunning about the scary chain? Let''s figure it out. The scheme is simple: “If A happens, then B,
      then C, then D - and it will be HORROR!” Looks logical. But there is a catch!'
  - step_id: sc5_50
    source_step_id: '50'
    scene_id: sc5
    step_type: theory
    prompt: 'The trick is this: each next link is less likely than the previous one. Imagine: the chance that A will happen
      is half. The chance that B will happen after A is even less. After B - C? Not much at all. The whole chain together
      is almost impossible!'
  - step_id: sc5_51
    source_step_id: '51'
    scene_id: sc5
    step_type: theory
    prompt: Example. “If I don’t have breakfast, I’ll be hungry. If I'm hungry, I won't be able to think. If I can’t think,
      I’ll fail the test. If I fail, I’ll be expelled...” Stop! You can snack on an apple during recess. The chain falls apart
      on the first link!
  - step_id: sc5_52
    source_step_id: '52'
    scene_id: sc5
    step_type: theory
    prompt: 'And here is the main rule: in terrible chains they forget that at every step something can be changed! I didn’t
      have breakfast - I had a snack. Bad rating - corrected. I quarreled and made peace. The chain only works if you stand
      there and do nothing.'
- scene_id: sc6
  title: Practice - a chain or reality?
  steps:
  - step_id: sc6_53
    source_step_id: '53'
    scene_id: sc6
    step_type: instruction
    prompt: 'Time to check! I tell a story - you vote: is this a scary chain (exaggeration) or a real danger that you really
      should be afraid of?'
  - step_id: sc6_54
    source_step_id: '54'
    scene_id: sc6
    step_type: theory
    prompt: 'Morning. You overslept and are late for school. On the threshold, the older sister dramatically grabs your sleeve:
      “If you’re a minute late, they won’t let you in!” They''ll expel you! And life will be destroyed!”'
  - step_id: sc6_55
    source_step_id: '55'
    scene_id: sc6
    step_type: single_choice
    prompt: Scary chain or real danger?
    options:
    - id: opt_1
      text: Scary chain
    - id: opt_2
      text: Real danger
    options_count: 2
    correct_answer: opt_1
    explanation: Chain! One minute late will not be excluded. Except from the queue to the cafeteria. And even then, they’ll
      move.
    explanation_status: implicit
  - step_id: sc6_57
    source_step_id: '57'
    scene_id: sc6
    step_type: theory
    prompt: 'Crossroads. Lights up red. A friend pulls his hand: “Let’s run, there are no cars!” You answer: “No, let’s wait!
      A car may suddenly leave. We will run - she will not have time to react. It will hit you. It will break all our bones.
      We will be in the hospital for six months. We’ll miss the whole summer of vacation!”'
  - step_id: sc6_58
    source_step_id: '58'
    scene_id: sc6
    step_type: single_choice
    prompt: Scary chain or real danger?
    options:
    - id: opt_1
      text: Scary chain
    - id: opt_2
      text: Real danger
    options_count: 2
    correct_answer: opt_2
    explanation: 'Real danger! Yes, it sounds dramatic. But a car running at a red light is not a fantasy. Each link here
      is quite probable: didn’t see → didn’t brake → impact → hospital. Short chain, high chance. We stand and wait for the
      green light!'
    explanation_status: implicit
  - step_id: sc6_60
    source_step_id: '60'
    scene_id: sc6
    step_type: theory
    prompt: 'Birthday. Cake. You take one candy. The older brother rolls his eyes theatrically: “Eat one, you’ll want more!”
      Then more! Then you''ll get diabetes! And - the finale - all the teeth will fall out! He even shows with his hands how
      his teeth fall out.'
  - step_id: sc6_61
    source_step_id: '61'
    scene_id: sc6
    step_type: single_choice
    prompt: Scary chain or real danger?
    options:
    - id: opt_1
      text: Scary chain
    - id: opt_2
      text: Real danger
    options_count: 2
    correct_answer: opt_1
    explanation: Chain! One candy does not cause diabetes. Otherwise, all the confectioners in the world would have been left
      without teeth long ago. And by the way, they smile in the photographs.
    explanation_status: implicit
  - step_id: sc6_63
    source_step_id: '63'
    scene_id: sc6
    step_type: theory
    prompt: 'Lunch at school. A friend doesn’t want to wash his hands: “Okay, that’ll do!” You say: “If you don’t wash it,
      you’ll accidentally ingest bacteria with your food. It will multiply in the body, illness will begin, and you won’t
      get out of the toilet for three days!”'
  - step_id: sc6_64
    source_step_id: '64'
    scene_id: sc6
    step_type: single_choice
    prompt: Scary chain or real danger?
    options:
    - id: opt_1
      text: Scary chain
    - id: opt_2
      text: Real danger
    options_count: 2
    correct_answer: opt_2
    explanation: 'Real! The chain is short: bacteria → disease → toilet. Each link is quite probable. Three days - maybe not
      three, but a day or two easily. Wash your hands, guys. Bacteria don''t joke.'
    explanation_status: implicit
  - step_id: sc6_66
    source_step_id: '66'
    scene_id: sc6
    step_type: theory
    prompt: 'Drawing lesson. You accidentally broke your pencil. The neighbor on the desk grabs his head: “That’s it! You
      can''t draw without a pencil! You''ll get a bad grade! They''ll kick you out of school! You will become the only person
      on Earth without education!”'
  - step_id: sc6_67
    source_step_id: '67'
    scene_id: sc6
    step_type: single_choice
    prompt: Scary chain or real danger?
    options:
    - id: opt_1
      text: Scary chain
    - id: opt_2
      text: Real danger
    options_count: 2
    correct_answer: opt_1
    explanation: Chain! You can ask for another pencil. Or a pen. Or a felt-tip pen. Or draw with your finger - artists do
      this too, by the way, and don’t kick anyone out.
    explanation_status: implicit
- scene_id: sc7
  title: We check every link
  steps:
  - step_id: sc7_69
    source_step_id: '69'
    scene_id: sc7
    step_type: theory
    prompt: You distinguish the chain from reality perfectly! But how to take the chain apart? Three questions are like three
      x-rays. You point it at a link and you can immediately see whether it is strong or paper.
  - step_id: sc7_70
    source_step_id: '70'
    scene_id: sc7
    step_type: theory
    prompt: 'Question one: “Will this DEFINITELY happen or just MAYBE?” “Maybe” is not “definitely.” Maybe it’s “one chance
      in a hundred.” And it sounds like “one hundred out of a hundred.” Cunning substitution!'
  - step_id: sc7_71
    source_step_id: '71'
    scene_id: sc7
    step_type: theory
    prompt: 'Question two: “What is the CHANCE that this will happen?” Large, medium, small, tiny? If at each step the chance
      is small, the whole chain becomes microscopic.'
  - step_id: sc7_72
    source_step_id: '72'
    scene_id: sc7
    step_type: theory
    prompt: 'Question three: “Can anything be CHANGED at this step?” Almost always - yes! If you haven’t learned it, you’ve
      finished learning it. I was late and called. I quarreled and made peace. The chain only holds if you stand and do nothing.'
  - step_id: sc7_73
    source_step_id: '73'
    scene_id: sc7
    step_type: theory
    prompt: 'Example! “If you don’t do your homework, the teacher will be upset, give you a bad grade, you’ll start to study
      poorly and won’t go where you want.” Let’s check: didn’t do it → will the teacher be upset? Perhaps, but it can be completed.
      Bad grade → bad studies? No, this is one case. Bad studies → won''t get in? Not at all a fact. Every link is paper!'
  - step_id: sc7_74
    source_step_id: '74'
    scene_id: sc7
    step_type: instruction
    prompt: 'Let''s try it together! I give a chain - you vote which link is the weakest: first, middle or last.'
  - step_id: sc7_75
    source_step_id: '75'
    scene_id: sc7
    step_type: theory
    prompt: “If you don’t finish your soup → you’ll remain hungry → you won’t grow up → you’ll be the smallest in your class
      → no one will take you on the basketball team → you’ll never become an athlete!”
  - step_id: sc7_76
    source_step_id: '76'
    scene_id: sc7
    step_type: single_choice
    prompt: Which link is the weakest?
    options:
    - id: opt_1
      text: First (you don’t finish → hungry)
    - id: opt_2
      text: Average (you won't grow → the smallest)
    - id: opt_3
      text: The last one (they won’t take it → you’ll never become)
    options_count: 3
    correct_answer: opt_3
    explanation: The last one! One missed soup does not decide a sports career. And growth does not depend on the soup, but
      on genes. Ask any basketball player - he ate more than just soup.
    explanation_status: implicit
  - step_id: sc7_78
    source_step_id: '78'
    scene_id: sc7
    step_type: theory
    prompt: “Lost your phone → you can’t call your friends → they will forget about you → you will be left without friends
      → you will be alone for the rest of your life!”
  - step_id: sc7_79
    source_step_id: '79'
    scene_id: sc7
    step_type: single_choice
    prompt: Which link is the weakest?
    options:
    - id: opt_1
      text: First (lost → won’t call)
    - id: opt_2
      text: Average (if you don’t call → they will forget)
    - id: opt_3
      text: Last (no friends → alone forever)
    options_count: 3
    correct_answer: opt_2
    explanation: Average! Friends don't forget because of one missed call. There is a school, a yard, and general affairs.
      And you can find a phone or buy a new one. Friendship will be stronger than the telephone.
    explanation_status: present
  - step_id: sc7_81
    source_step_id: '81'
    scene_id: sc7
    step_type: theory
    prompt: “If you don’t clean the room → there will be cockroaches → they will eat your homework → the teacher won’t believe
      you → he’ll give you a bad grade → your parents will take the computer away forever!”
  - step_id: sc7_82
    source_step_id: '82'
    scene_id: sc7
    step_type: single_choice
    prompt: Which link is the weakest?
    options:
    - id: opt_1
      text: First (you can’t remove → cockroaches)
    - id: opt_2
      text: Average (cockroaches will eat your homework)
    - id: opt_3
      text: Last (bad rating → computer forever)
    options_count: 3
    correct_answer: opt_2
    explanation: Average! Cockroaches eat crumbs, not notebooks. They don't sit around at night with a fork and knife over
      your homework. Although the picture is funny, I admit it.
    explanation_status: implicit
  - step_id: sc7_84
    source_step_id: '84'
    scene_id: sc7
    step_type: theory
