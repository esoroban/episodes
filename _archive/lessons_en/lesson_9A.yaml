- scene_id: sc9
  title: Why do we need this
  steps:
  - step_id: sc9_119
    source_step_id: '119'
    scene_id: sc9
    step_type: reflection
    prompt: So - we learned how to build, disassemble and laugh at scary chains. But why do you need to know this at all?
      Not for a test. Let's think about where in real life you might be scared by chains.
    teacher_guidance: But why do you need to know this at all?
  - step_id: sc9_120
    source_step_id: '120'
    scene_id: sc9
    step_type: theory
    prompt: 'Advertising. “If you don’t buy our yogurt, you won’t get vitamins, your immune system will weaken, you’ll get
      sick every month, you’ll miss everything in the world!” Sound familiar? Now you know: this is a chain. Yogurt is not
      the only source of vitamins on the planet.'
  - step_id: sc9_121
    source_step_id: '121'
    scene_id: sc9
    step_type: theory
    prompt: News. “If you don’t ban phones in schools, children will stop learning, lose social skills, grow up dependent
      and won’t be able to work!” Sounds scary. But how many links? What's everyone's chance? Here is the answer.
  - step_id: sc9_122
    source_step_id: '122'
    scene_id: sc9
    step_type: theory
    prompt: 'Controversy. The older brother says: “If you don’t listen to me, you will regret it, then you will ask for forgiveness,
      but I will not forgive, and in general we are no longer friends!” This is not an argument. This is a chain that puts
      pressure on fear. Now you know how to take it apart.'
  - step_id: sc9_123
    source_step_id: '123'
    scene_id: sc9
    step_type: theory
    prompt: 'And most importantly, we ourselves build terrible chains. In your own head! “I’m not prepared - I’ll fail - everyone
      will laugh - I’ll never be able to...” Stop. We check every link. Let''s breathe. And we understand: the world does
      not collapse from one mistake.'
  - step_id: sc9_124
    source_step_id: '124'
    scene_id: sc9
    step_type: theory
    prompt: 'Remember three X-ray questions: will this DEFINITELY happen or just maybe? What''s the chance? Can anything be
      changed? If at least one answer is “not exactly”, “small” or “yes” - the chain no longer works.'
  - step_id: sc9_125
    source_step_id: '125'
    scene_id: sc9
    step_type: theory
    prompt: You are now master chain breakers. Don't let any scary stories guide your decisions. Break - and after that we
      will continue!
