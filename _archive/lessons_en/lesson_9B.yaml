- scene_id: sc8
  title: Why We Need This in Life
  steps:
  - step_id: sc8_149
    source_step_id: '149'
    scene_id: sc8
    step_type: theory
    prompt: Today we became false authority detectors. But why do we need this in real life? Where does it trick us?
  - step_id: sc8_150
    source_step_id: '150'
    scene_id: sc8
    step_type: reflection
    prompt: First - advertising. Every day you see dozens of ads where celebrities recommend something. Hair, food, cars,
      medicine. They're just beautiful and famous. But do they know about it? Ask yourself!
    teacher_guidance: But do they know about it?
  - step_id: sc8_151
    source_step_id: '151'
    scene_id: sc8
    step_type: theory
    prompt: Second - "influencers" on the internet. A blogger with a million followers talks about health, politics, science.
      A million is a lot. But followers aren't a certificate. This blogger might just talk well, not know well.
  - step_id: sc8_152
    source_step_id: '152'
    scene_id: sc8
    step_type: theory
    prompt: 'Third - and this is the trickiest. People who teach you to make money. They sell courses: "I made a million!
      Here''s how I did it!" But what exactly did YOU make it on?" - And it turns out the only business this person has is
      selling courses. They make money by teaching you how to make money.'
  - step_id: sc8_153
    source_step_id: '153'
    scene_id: sc8
    step_type: theory
    prompt: '"What exactly did YOU make it on?" And it turns out: the only business this person has is selling courses. They
      make money teaching you how to make money. It''s like a swimming coach who never entered the water.'
  - step_id: sc8_154
    source_step_id: '154'
    scene_id: sc8
    step_type: theory
    prompt: 'It''s like a swimming coach who never entered the water. Standing on the shore in a dry suit teaching: "Here''s
      how to swim properly!" Would you trust such a coach?'
  - step_id: sc8_155
    source_step_id: '155'
    scene_id: sc8
    step_type: theory
    prompt: 'Fourth - arguments and conflicts. Someone says: "My older brother said so!" or "My aunt thinks so!" That''s not
      an argument. That''s relying on authority. Older brother can be wrong. Aunt might not understand. Ask: "Why does he
      think so? What''s his evidence?"'
  - step_id: sc8_156
    source_step_id: '156'
    scene_id: sc8
    step_type: theory
    prompt: 'Fifth - health. This is most important. When someone online says "don''t take this medicine" or "this food is
      dangerous" - always check: WHO is saying this? A doctor with twenty years of experience? Or a blogger who was talking
      about trendy sneakers yesterday?'
  - step_id: sc8_157
    source_step_id: '157'
    scene_id: sc8
    step_type: theory
    prompt: 'Remember the magic question for life: "Does this person actually understand THIS specific thing?" If yes - we
      listen. If no - we find someone who does. If we don''t know - we check. Three simple steps. And now you can''t be tricked
      by a pretty wrapper.'
  - step_id: sc8_158
    source_step_id: '158'
    scene_id: sc8
