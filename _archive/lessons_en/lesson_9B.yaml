title: If an Expert Said
day: 9
slot: B
scenes:
- scene_id: sc1
  title: Discovery - Who We Trust and Why
  steps:
  - step_id: sc1_1
    source_step_id: '1'
    scene_id: sc1
    step_type: theory
    prompt: 'New topic! Imagine: you''re in a shop choosing a bike. The salesperson says, "This bike is recommended by famous
      footballer Ronaldo!" Wow! Ronaldo! Let''s buy it! But wait... Is Ronaldo a bicycle engineer? Or is he just famous?'
  - step_id: sc1_2
    source_step_id: '2'
    scene_id: sc1
    step_type: theory
    prompt: 'Second example. Cream advertisement: "Recommended by a doctor!" Sounds solid. But which doctor? A dermatologist
      who knows about skin? Or a surgeon who''s never opened a jar of cream in his life?'
  - step_id: sc1_3
    source_step_id: '3'
    scene_id: sc1
    step_type: theory
    prompt: 'Third. A famous singer in an interview says: "I drink a special juice every morning - and that''s why I never
      get sick!" A million fans rushed to buy this juice. But does the singer understand health? Did he study vitamins? Or
      does he just sing beautifully?'
  - step_id: sc1_4
    source_step_id: '4'
    scene_id: sc1
    step_type: theory
    prompt: 'Fourth. A popular blogger with ten million followers posts a video: "This diet will change your life! I lost
      weight in a week!" Ten million is a lot. But followers aren''t a diploma in nutrition. Popularity and knowledge are
      different things.'
  - step_id: sc1_5
    source_step_id: '5'
    scene_id: sc1
    step_type: theory
    prompt: 'And the fifth - the trickiest. Grandma says: "In my day everyone did it this way - and we grew up healthy!" We
      love grandma. But "in my day" is not scientific proof. The world has changed. Medicine has learned many new things.'
  - step_id: sc1_6
    source_step_id: '6'
    scene_id: sc1
    step_type: single_choice
    prompt: What do all five examples have in common?
    options:
    - id: opt_1
      text: They all lie
    - id: opt_2
      text: They all rely on someone famous or respected
    - id: opt_3
      text: They all sell a product
    options_count: 3
    correct_answer: opt_2
    explanation: Exactly! In all cases, they convince us not with facts, but with WHO said it. A footballer, a doctor, a singer,
      a blogger, grandma - they're using authority instead of evidence. Today we'll figure out when this works and when it's
      a trap!
    explanation_status: present
- scene_id: sc2
  title: Story - A Star's Advice
  steps:
  - step_id: sc2_8
    source_step_id: '8'
    scene_id: sc2
    step_type: theory
    prompt: And now - a story! Dmytryk runs into school in the morning. Eyes shining. Backpack stuffed with something heavy.
      Hair sticking up - you can see he didn't even have time to comb it. Important business!
  - step_id: sc2_9
    source_step_id: '9'
    scene_id: sc2
    step_type: theory
    prompt: 'He puts six bottles of "StarPower" juice on his desk. On each one - the face of singer Max Starry. Bright smile,
      bicep, caption: "I drink this every morning - and I recommend it to you!"'
  - step_id: sc2_10
    source_step_id: '10'
    scene_id: sc2
    step_type: theory
    prompt: '"Guys!" says Dmytryk solemnly. "Max Starry drinks this juice! MAX STARRY! He has a hundred million followers!
      He never gets sick! I''ll drink it now too - and become just as cool!"'
  - step_id: sc2_11
    source_step_id: '11'
    scene_id: sc2
    step_type: theory
    prompt: Sashko grabs a bottle, turns it around, reads the ingredients. Water, sugar, coloring, "natural identical" flavoring.
      "Dmytryk," says Sashko, "it says 'natural identical' here. That means - NOT natural. But similar."
  - step_id: sc2_12
    source_step_id: '12'
    scene_id: sc2
    step_type: theory
    prompt: '"It doesn''t matter!" waves Dmytryk. "Max Starry wouldn''t recommend bad juice! He''s a STAR!" Sashko scratches
      the back of his head: "But is Max Starry a doctor? A nutritionist? A biologist? A chemist?"'
  - step_id: sc2_13
    source_step_id: '13'
    scene_id: sc2
    step_type: theory
    prompt: 'Dmytryk pauses. "No... He''s a singer. But he''s famous!" Olena raises her hand: "My cat is famous too - has
      a thousand likes online. But I don''t ask my cat which vitamins to take."'
  - step_id: sc2_14
    source_step_id: '14'
    scene_id: sc2
    step_type: theory
    prompt: 'The class laughs. Dmytryk blushes but doesn''t give up: "Okay, but Max looks healthy! So the juice works!" Sashko
      nods: "And my grandfather looks healthy. He drinks compote. So compote is super-power? Should we advertise grandma''s
      compote?"'
  - step_id: sc2_15
    source_step_id: '15'
    scene_id: sc2
    step_type: theory
    prompt: 'Olena finishes him off: "Dmytryk, imagine - Max Starry says: ''I jump off a roof every morning - and I recommend
      it to you!'' Sashko laughs: "You would believe that?" Dmytryk: "Of course not. That''s dangerous!" Olena: "So why is
      jumping dangerous but juice is safe?"'
  - step_id: sc2_16
    source_step_id: '16'
    scene_id: sc2
    step_type: theory
    prompt: '"Exactly!" says Olena. "Famous doesn''t mean expert. Max understands music, not health. And you were convinced
      - not by evidence, but because he''s famous. That''s called ''false authority'' or just - a trap!"'
  - step_id: sc2_17
    source_step_id: '17'
    scene_id: sc2
    step_type: theory
    prompt: 'Dmytryk looks at six bottles. Sighs. "Okay. But the juice is delicious?" Sashko smiles: "Yes, it''s delicious.
      You''re right! But taste is not health." Dmytryk nods: "I get it now."'
  - step_id: sc2_18
    source_step_id: '18'
    scene_id: sc2
    step_type: single_choice
    prompt: Why did Dmytryk believe the ad?
    options:
    - id: opt_1
      text: Because the juice tastes good
    - id: opt_2
      text: Because Max is a famous authority
    - id: opt_3
      text: Because friends recommended it
    options_count: 3
    correct_answer: opt_2
    explanation: Exactly - authority! Dmytryk didn't check if Max actually understands health. Saw the face on the bottle
      - and that was enough. That's the celebrity trap. It makes you blind to real expertise.
    explanation_status: present
- scene_id: sc3
  title: Authority and Competence
  steps:
  - step_id: sc3_20
    source_step_id: '20'
    scene_id: sc3
    step_type: theory
    prompt: 'From Dmytryk''s story we learned the main thing: famous doesn''t mean expert. But how do we tell a real expert
      from false authority? Let''s figure it out!'
  - step_id: sc3_21
    source_step_id: '21'
    scene_id: sc3
    step_type: theory
    prompt: Trusting experts is normal! We can't know everything in the world. Tooth ache - we go to the dentist. Pipe leaks
      - we call a plumber. We rely on expert knowledge. That's smart.
  - step_id: sc3_22
    source_step_id: '22'
    scene_id: sc3
    step_type: theory
    prompt: 'But here''s the key word: COMPETENCE. Competent means a person really knows about this. They have knowledge,
      experience, a diploma, or many years of practice. Not just "famous," but actually "knows."'
  - step_id: sc3_23
    source_step_id: '23'
    scene_id: sc3
    step_type: theory
    prompt: 'When is citing authority appropriate? Two conditions. First: the person is competent in this specific area. A
      dentist for teeth, not for choosing a space route. Second: the person is talking about what they really know, not guessing
      from rumors.'
  - step_id: sc3_24
    source_step_id: '24'
    scene_id: sc3
    step_type: theory
    prompt: 'And when is it a trap? Also two signs. First: the person talks NOT about their field. An actor about banks, a
      blogger about medicine, a celebrity about science. Second: we rely only on the fact that they''re famous, forgetting
      to ask - but do they actually know anything about this?'
  - step_id: sc3_25
    source_step_id: '25'
    scene_id: sc3
    step_type: theory
    prompt: Scientists call this trap "false authority." False because there is authority, but in another field. A footballer's
      biceps doesn't give him the right to talk about medicine. A blogger's million fans doesn't make them a doctor.
- scene_id: sc4
  title: Practice - Expert or Not?
  steps:
  - step_id: sc4_26
    source_step_id: '26'
    scene_id: sc4
    step_type: theory
    prompt: 'Theory is great. Now let''s test it in practice! I describe a situation - you vote: does this person understand,
      or is it false authority?'
  - step_id: sc4_27
    source_step_id: '27'
    scene_id: sc4
    step_type: theory
    prompt: A veterinarian recommends how to treat a dog with a sore paw. He examined the dog and read the test results.
  - step_id: sc4_28
    source_step_id: '28'
    scene_id: sc4
    step_type: single_choice
    prompt: Does the veterinarian understand treating dogs?
    options:
    - id: opt_1
      text: Yes, it's his field
    - id: opt_2
      text: No, not his field
    - id: opt_3
      text: Need to clarify
    options_count: 3
    correct_answer: opt_1
    explanation: Of course, yes! The veterinarian studied this for six years. A dog's paw is literally his job. He examined,
      investigated, diagnosed. That's a real expert in his field.
    explanation_status: present
  - step_id: sc4_30
    source_step_id: '30'
    scene_id: sc4
    step_type: theory
    prompt: 'A famous blogger with five million followers posts a video: "I found the cure for a cold! Doctors are hiding
      it!" He doesn''t show the medicine, just teases friends in the comments.'
  - step_id: sc4_31
    source_step_id: '31'
    scene_id: sc4
    step_type: single_choice
    prompt: Does the blogger understand treating a cold?
    options:
    - id: opt_1
      text: Yes, it's his field
    - id: opt_2
      text: No, not his field
    - id: opt_3
      text: Need to clarify
    options_count: 3
    correct_answer: opt_2
    explanation: No! Followers aren't a medical diploma. And the phrase "doctors are hiding it" is a sure sign of false authority.
      Real experts publish research, share science. They don't play secrets.
    explanation_status: present
  - step_id: sc4_33
    source_step_id: '33'
    scene_id: sc4
    step_type: theory
    prompt: A chef with twenty years of experience explains how to properly fry a steak. The meat temperature, cooking time
      on each side, how to check if it's done.
  - step_id: sc4_34
    source_step_id: '34'
    scene_id: sc4
    step_type: single_choice
    prompt: Does the chef understand frying steak?
    options:
    - id: opt_1
      text: Yes, it's his field
    - id: opt_2
      text: No, not his field
    - id: opt_3
      text: Need to clarify
    options_count: 3
    correct_answer: opt_1
    explanation: Yes! Twenty years at the stove is serious experience. A chef and a steak is like a pilot and a plane. This
      is his profession, his tree of knowledge, his many years of practice.
    explanation_status: present
  - step_id: sc4_36
    source_step_id: '36'
    scene_id: sc4
    step_type: theory
    prompt: 'An actor from a popular TV series stars in a bank advertisement: "I trust my money to this bank!"'
  - step_id: sc4_37
    source_step_id: '37'
    scene_id: sc4
    step_type: single_choice
    prompt: Does the actor understand banking services?
    options:
    - id: opt_1
      text: Yes, it's his field
    - id: opt_2
      text: No, not his field
    - id: opt_3
      text: Need to clarify
    options_count: 3
    correct_answer: opt_2
    explanation: No! An actor understands roles, cameras, and scripts. And at the bank, he's just a customer like everyone
      else. His popularity doesn't make him a financial expert.
    explanation_status: present
  - step_id: sc4_39
    source_step_id: '39'
    scene_id: sc4
    step_type: theory
    prompt: A PE teacher shows how to properly warm up before running. Explains which muscles are needed, how to avoid injury.
  - step_id: sc4_40
    source_step_id: '40'
    scene_id: sc4
    step_type: single_choice
    prompt: Does the PE teacher understand warming up?
    options:
    - id: opt_1
      text: Yes, it's his field
    - id: opt_2
      text: No, not his field
    - id: opt_3
      text: Need to clarify
    options_count: 3
    correct_answer: opt_1
    explanation: Yes! This is his profession. He studied biomechanics, anatomy, knows which muscles do what. Warm-up is his
      field.
    explanation_status: present
  - step_id: sc4_42
    source_step_id: '42'
    scene_id: sc4
    step_type: theory
    prompt: 'A classmate says: "My older brother said chocolate builds muscles. He''s right!"'
  - step_id: sc4_43
    source_step_id: '43'
    scene_id: sc4
    step_type: single_choice
    prompt: Does the older brother understand chocolate's effect on muscles?
    options:
    - id: opt_1
      text: Yes, it's his field
    - id: opt_2
      text: No, not his field
    - id: opt_3
      text: Need to clarify
    options_count: 3
    correct_answer: opt_3
    explanation: Need to clarify! Maybe the brother is a sports trainer or dietician. Or maybe he just loves chocolate and
      is making things up. Without details, we can only guess.
    explanation_status: implicit
  - step_id: sc4_45
    source_step_id: '45'
    scene_id: sc4
    step_type: theory
    prompt: Now - examples from school life! Your classmate Masha has been doing robotics for three years. Won olympiads.
  - step_id: sc4_46
    source_step_id: '46'
    scene_id: sc4
    step_type: single_choice
    prompt: Does Masha understand robotics?
    options:
    - id: opt_1
      text: Yes, it's her field
    - id: opt_2
      text: No, not her field
    - id: opt_3
      text: Need to clarify
    options_count: 3
    correct_answer: opt_1
    explanation: Yes! Three years of practice and olympiads is real experience. Masha knows which controllers to use, how
      to write code, how to assemble a structure. This is her field right now.
    explanation_status: present
  - step_id: sc4_48
    source_step_id: '48'
    scene_id: sc4
    step_type: theory
    prompt: 'The same Masha says: "I''m sure - this dog is an Akita Inu breed!" But Masha has never studied dog breeds.'
  - step_id: sc4_49
    source_step_id: '49'
    scene_id: sc4
    step_type: single_choice
    prompt: Does Masha understand dog breeds?
    options:
    - id: opt_1
      text: Yes, it's her field
    - id: opt_2
      text: No, not her field
    - id: opt_3
      text: Need to clarify
    options_count: 3
    correct_answer: opt_3
    explanation: Need to clarify! Masha might guess by chance. Or she might be wrong. Being an expert in one field doesn't
      mean being an expert in all. Masha is an expert in robotics, not in dog breeds.
    explanation_status: present
  - step_id: sc4_51
    source_step_id: '51'
    scene_id: sc4
    step_type: theory
    prompt: 'Classmate Artem has been playing chess for five years. Rated, tournaments, coach. He says: "This chess position
      - the white piece should move here."'
  - step_id: sc4_52
    source_step_id: '52'
    scene_id: sc4
    step_type: single_choice
    prompt: Does Artem understand chess positions?
    options:
    - id: opt_1
      text: Yes, it's his field
    - id: opt_2
      text: No, not his field
    - id: opt_3
      text: Need to clarify
    options_count: 3
    correct_answer: opt_1
    explanation: Yes! Five years of training is no joke. Artem understands chess, possibly better than most adults. He knows
      opening theory, understands positions, thinks ahead.
    explanation_status: present
  - step_id: sc4_54
    source_step_id: '54'
    scene_id: sc4
    step_type: theory
    prompt: 'The same Artem says: "Don''t eat school cutlets - they add something harmful to them!" But Artem has never analyzed
      food composition.'
  - step_id: sc4_55
    source_step_id: '55'
    scene_id: sc4
    step_type: single_choice
    prompt: Does Artem understand school cutlet composition?
    options:
    - id: opt_1
      text: Yes, it's his field
    - id: opt_2
      text: No, not his field
    - id: opt_3
      text: Need to clarify
    options_count: 3
    correct_answer: opt_2
    explanation: No! Chess and cutlets are two different worlds. And "read it in one channel" is not research or expertise.
      Artem is a chess player, not a nutritionist.
    explanation_status: present
  - step_id: sc4_57
    source_step_id: '57'
    scene_id: sc4
    step_type: theory
    prompt: Classmate Liza has been growing her own vegetable garden for two years - tomatoes, cucumbers, herbs. Knows when
      to plant, how to water.
  - step_id: sc4_58
    source_step_id: '58'
    scene_id: sc4
    step_type: single_choice
    prompt: Does Liza understand growing seedlings?
    options:
    - id: opt_1
      text: Yes, it's her field
    - id: opt_2
      text: No, not her field
    - id: opt_3
      text: Need to clarify
    options_count: 3
    correct_answer: opt_1
    explanation: Yes! Two years of practice - Liza knows her tomatoes personally. She's not a degreed agronomist, but she's
      an expert in growing in a vegetable garden. This is her field right now.
    explanation_status: present
- scene_id: sc5
  title: Appropriate reference or mistake?
  steps:
  - step_id: sc5_60
    source_step_id: '60'
    scene_id: sc5
    step_type: theory
    prompt: Great distinction! Now let's make it harder. I'm not just giving you a person, but an entire situation. Your task
      is to determine if it's a proper authority reference or false authority.
  - step_id: sc5_61
    source_step_id: '61'
    scene_id: sc5
    step_type: theory
    prompt: 'Toothpaste advertisement: "Recommended by dentists!" Sounds powerful. But in small print: "Twelve dentists out
      of fifty surveyed."'
  - step_id: sc5_62
    source_step_id: '62'
    scene_id: sc5
    step_type: single_choice
    prompt: Appropriate authority reference or mistake?
    options:
    - id: opt_1
      text: Appropriate
    - id: opt_2
      text: Mistake (false authority)
    - id: opt_3
      text: Need to clarify
    options_count: 3
    correct_answer: opt_3
    explanation: Need to clarify! Dentists - yes, competent. But twelve people is not "all dentists." And if thirty chose
      another brand, the ad is hiding the truth. That's a sneaky tactic.
    explanation_status: implicit
  - step_id: sc5_64
    source_step_id: '64'
    scene_id: sc5
    step_type: theory
    prompt: 'Scientists from fifty countries conducted research and confirmed: regular exercise improves health. Results published
      in Nature and Science journals.'
  - step_id: sc5_65
    source_step_id: '65'
    scene_id: sc5
    step_type: single_choice
    prompt: Appropriate authority reference or mistake?
    options:
    - id: opt_1
      text: Appropriate
    - id: opt_2
      text: Mistake (false authority)
    - id: opt_3
      text: Need to clarify
    options_count: 3
    correct_answer: opt_1
    explanation: Appropriate! Scientists are competent, there are many of them from different countries, results published
      in peer-reviewed journals. This is real authority you can trust.
    explanation_status: implicit
  - step_id: sc5_67
    source_step_id: '67'
    scene_id: sc5
    step_type: theory
    prompt: 'A popular TikToker with twenty million followers posts a video: "Vaccines are dangerous! My friends after vaccination..."
      Doctors are hiding the truth!"'
  - step_id: sc5_68
    source_step_id: '68'
    scene_id: sc5
    step_type: single_choice
    prompt: Appropriate authority reference or mistake?
    options:
    - id: opt_1
      text: Appropriate
    - id: opt_2
      text: Mistake (false authority)
    - id: opt_3
      text: Need to clarify
    options_count: 3
    correct_answer: opt_2
    explanation: Mistake! A TikToker is not a doctor, scientist, or epidemiologist. Twenty million followers is not a medical
      diploma. And "doctors are hiding it" is a classic false authority pattern.
    explanation_status: implicit
  - step_id: sc5_70
    source_step_id: '70'
    scene_id: sc5
    step_type: theory
    prompt: 'Your friend''s grandmother has been baking pies for fifty years. She says: "Dough must be mixed in only one direction
      - and it will be fluffy!" She has awards for cooking.'
  - step_id: sc5_71
    source_step_id: '71'
    scene_id: sc5
    step_type: single_choice
    prompt: Appropriate authority reference or mistake?
    options:
    - id: opt_1
      text: Appropriate
    - id: opt_2
      text: Mistake (false authority)
    - id: opt_3
      text: Need to clarify
    options_count: 3
    correct_answer: opt_1
    explanation: Appropriate! Fifty years of practice and awards - grandma is more competent than many trained chefs. This
      is real authority in baking.
    explanation_status: implicit
  - step_id: sc5_73
    source_step_id: '73'
    scene_id: sc5
    step_type: theory
    prompt: 'A classmate shows a screenshot: "One scientist from America proved that homeschooling is better than school.
      All scientists already know this!"'
  - step_id: sc5_74
    source_step_id: '74'
    scene_id: sc5
    step_type: single_choice
    prompt: Appropriate authority reference or mistake?
    options:
    - id: opt_1
      text: Appropriate
    - id: opt_2
      text: Mistake (false authority)
    - id: opt_3
      text: Need to clarify
    options_count: 3
    correct_answer: opt_2
    explanation: Mistake! "One scientist said" is classic false authority. No name, no research, no details. And "scientists
      all already know" is like saying "everyone knows." Imprecise and untrue.
    explanation_status: implicit
  - step_id: sc5_76
    source_step_id: '76'
    scene_id: sc5
    step_type: theory
    prompt: 'Your classmate''s grandfather worked as a mechanic for forty years. He opens the car hood and says: "The engine''s
      not right. Here..." He listens to the engine sound and diagnoses.'
  - step_id: sc5_77
    source_step_id: '77'
    scene_id: sc5
    step_type: single_choice
    prompt: Appropriate authority reference or mistake?
    options:
    - id: opt_1
      text: Appropriate
    - id: opt_2
      text: Mistake (false authority)
    - id: opt_3
      text: Need to clarify
    options_count: 3
    correct_answer: opt_1
    explanation: Appropriate! Forty years of experience - grandpa hears the engine like a musician hears a wrong note. He's
      a mechanic. This is real authority.
    explanation_status: present
- scene_id: sc6
  title: Who would you trust?
  steps:
  - step_id: sc6_79
    source_step_id: '79'
    scene_id: sc6
    step_type: theory
    prompt: Now - reverse task! I give you a statement. Your task is to come up with - WHO would you trust about this?
  - step_id: sc6_80
    source_step_id: '80'
    scene_id: sc6
    step_type: theory
    prompt: 'Statement: "This water is safe to drink."'
  - step_id: sc6_81
    source_step_id: '81'
    scene_id: sc6
    step_type: open_question
    prompt: Who would you trust if you heard this?
  - step_id: sc6_82
    source_step_id: '82'
    scene_id: sc6
    step_type: theory
    prompt: 'My answer: a lab chemist who analyzed the water composition. Or the sanitation and epidemiological service. Or
      a hydrologist who analyzes water sources. Not a random person online.'
  - step_id: sc6_83
    source_step_id: '83'
    scene_id: sc6
    step_type: theory
    prompt: 'Statement: "This mushroom is edible."'
  - step_id: sc6_84
    source_step_id: '84'
    scene_id: sc6
    step_type: open_question
    prompt: Who would you trust?
  - step_id: sc6_85
    source_step_id: '85'
    scene_id: sc6
    step_type: theory
