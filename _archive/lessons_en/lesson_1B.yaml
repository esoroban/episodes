language: en
title: Can It Be Verified?
day: 1
slot: B
scenes:
- scene_id: sc1
  title: INTRODUCTION
  steps:
  - step_id: sc1_1
    source_step_id: '1'
    scene_id: sc1
    step_type: theory
    prompt: Let's continue! Last time we learned three words. Who remembers? Fact, opinion, lie. Let's see if we forgot.
  - step_id: sc1_2
    source_step_id: '2'
    scene_id: sc1
    step_type: instruction
    prompt: Quick test!
  - step_id: sc1_3
    source_step_id: '3'
    scene_id: sc1
    step_type: single_choice
    prompt: '"The Earth revolves around the Sun."'
    options:
    - id: opt_1
      text: Fact
    - id: opt_2
      text: Opinion
    - id: opt_3
      text: Lie
    options_count: 3
    correct_answer: opt_1
    explanation: Fact! We checked — it's confirmed.
    explanation_status: present
  - step_id: sc1_5
    source_step_id: '5'
    scene_id: sc1
    step_type: single_choice
    prompt: '"Cats are better than dogs."'
    options:
    - id: opt_1
      text: Fact
    - id: opt_2
      text: Opinion
    - id: opt_3
      text: Lie
    options_count: 3
    correct_answer: opt_2
    explanation: Opinion! Some like cats, some like dogs — it can't be verified.
    explanation_status: present
  - step_id: sc1_7
    source_step_id: '7'
    scene_id: sc1
    step_type: single_choice
    prompt: '"A person can live without water for a month."'
    options:
    - id: opt_1
      text: Fact
    - id: opt_2
      text: Opinion
    - id: opt_3
      text: Lie
    options_count: 3
    correct_answer: opt_3
    explanation: Lie! Doctors checked — without water, maximum a few days.
    explanation_status: present
  - step_id: sc1_9
    source_step_id: '9'
    scene_id: sc1
    step_type: single_choice
    prompt: '"Pizza is the most popular food."'
    options:
    - id: opt_1
      text: Fact
    - id: opt_2
      text: Opinion
    - id: opt_3
      text: Lie
    options_count: 3
    correct_answer: opt_2
    explanation: Opinion! "Most popular" — it depends. In Japan they like sushi, in India they like curry. There's no single
      answer.
    explanation_status: present
  - step_id: sc1_11
    source_step_id: '11'
    scene_id: sc1
    step_type: single_choice
    prompt: '"An elephant has four legs."'
    options:
    - id: opt_1
      text: Fact
    - id: opt_2
      text: Opinion
    - id: opt_3
      text: Lie
    options_count: 3
    correct_answer: opt_1
    explanation: Fact! Look at an elephant — count. Four.
    explanation_status: present
  - step_id: sc1_13
    source_step_id: '13'
    scene_id: sc1
    step_type: single_choice
    prompt: '"Monday is the hardest day of the week."'
    options:
    - id: opt_1
      text: Fact
    - id: opt_2
      text: Opinion
    - id: opt_3
      text: Lie
    options_count: 3
    correct_answer: opt_2
    explanation: Opinion! For some, Monday is hard; for others, Friday is. It's a feeling, not a fact.
    explanation_status: present
  - step_id: sc1_15
    source_step_id: '15'
    scene_id: sc1
    step_type: instruction
    prompt: 'Great! You didn''t forget. But here''s the question: when we say "verify" — what does that mean exactly? How
      exactly do people verify? Can everything be verified? Or does it sometimes happen that you want to verify something
      but can''t? Today we''ll figure it out.'
  - step_id: sc1_16
    source_step_id: '16'
    scene_id: sc1
    step_type: theory
    prompt: Now listen to an interesting story about a boy named Vitya and his unusual discovery.
- scene_id: sc2
  title: THE STORY — VITYA AND THE MAGIC STONE
  steps:
  - step_id: sc2_17
    source_step_id: '17'
    scene_id: sc2
    step_type: theory
    prompt: 'Vitya ran to Olenka with shining eyes: "Look what I found! A stone! It''s magic — it grants wishes! Want to test
      it?"'
  - step_id: sc2_18
    source_step_id: '18'
    scene_id: sc2
    step_type: theory
    prompt: Olenka made a wish. She waits... Nothing. "The wish was too big!" explains Vitya. She makes a small wish — nothing
      again. "The stone was resting!"
  - step_id: sc2_19
    source_step_id: '19'
    scene_id: sc2
    step_type: theory
    prompt: Third attempt — nothing again. "It only works when nobody's looking!" — Vitya won't give up. He has an answer
      for everything.
  - step_id: sc2_20
    source_step_id: '20'
    scene_id: sc2
    step_type: theory
    prompt: 'Olenka sighed. No matter what happens — Vitya will never say: "Okay, the stone isn''t magic." There''s always
      a new excuse.'
  - step_id: sc2_21
    source_step_id: '21'
    scene_id: sc2
    step_type: instruction
    prompt: So, Vitya says — the stone is magic. Olenka tried to make a wish. Did it come true?
  - step_id: sc2_22
    source_step_id: '22'
    scene_id: sc2
    step_type: theory
    prompt: It didn't come true! What did Vitya say? "The wish was too big!" Okay, they made a small wish — it didn't work
      again. "The stone was resting!" One more time — nothing. "It only works when nobody's looking!"
  - step_id: sc2_23
    source_step_id: '23'
    scene_id: sc2
    step_type: theory
    prompt: 'See? Vitya has an excuse for EVERY situation. No matter what happens — he''ll never say: "Okay, the stone isn''t
      magic." There''s always a new reason why it didn''t work.'
  - step_id: sc2_24
    source_step_id: '24'
    scene_id: sc2
    step_type: open_question
    prompt: Now an important question. Is Vitya a liar? Is he deliberately deceiving?
    teacher_guidance: Is Vitya a liar? Is he deliberately deceiving?
  - step_id: sc2_25
    source_step_id: '25'
    scene_id: sc2
    step_type: theory
    prompt: No! Vitya believes in his stone himself. He doesn't want to deceive Olenka. But the problem is that his claim
      CANNOT be verified — because he has an excuse for any attempt to verify it.
  - step_id: sc2_26
    source_step_id: '26'
    scene_id: sc2
    step_type: theory
    prompt: 'Here''s the thing. "Ice cream costs twenty-five hryvnia" — if the store has a different price, we''ll say: "Well,
      that''s a lie." That''s it. But Vitya with his stone — will NEVER admit he''s wrong. Because he''ll always come up with
      a new excuse.'
  - step_id: sc2_27
    source_step_id: '27'
    scene_id: sc2
    step_type: theory
    prompt: Such claims are called TRICKY. They cannot be refuted — because the person has already thought up an answer to
      any question. This doesn't mean he's evil. It just means his words cannot be verified.
  - step_id: sc2_28
    source_step_id: '28'
    scene_id: sc2
    step_type: theory
    prompt: But how exactly do we verify ordinary claims? What are the methods? Let's figure it out now.
- scene_id: sc3
  title: EXCUSES
  steps:
  - step_id: sc3_29
    source_step_id: '29'
    scene_id: sc3
    step_type: instruction
    prompt: Excuses aren't just for Vitya with his stone. They happen every day — at school, in the yard, at home. Now I'll
      describe situations and you vote!
  - step_id: sc3_30
    source_step_id: '30'
    scene_id: sc3
    step_type: single_choice
    prompt: '"A classmate says: "I can do a somersault, but I can''t today — my leg hurts.""'
    options:
    - id: opt_1
      text: Normal explanation
    - id: opt_2
      text: Excuse
    options_count: 2
    correct_answer: opt_1
    explanation: For now, a normal explanation! A leg can really hurt. But if he EVERY time finds a new reason — leg, head,
      slippery floor, wrong day — then those are excuses.
    explanation_status: present
  - step_id: sc3_32
    source_step_id: '32'
    scene_id: sc3
    step_type: single_choice
    prompt: '"A friend brags: "I have a tame raven at home, but it hides when guests come.""'
    options:
    - id: opt_1
      text: Normal explanation
    - id: opt_2
      text: Excuse
    options_count: 2
    correct_answer: opt_2
    explanation: Excuse! Convenient — nobody will ever be able to see this raven. Just like Vitya's stone.
    explanation_status: implicit
  - step_id: sc3_34
    source_step_id: '34'
    scene_id: sc3
    step_type: single_choice
    prompt: '"Brother says: "I cleaned up the room, but then the cat scattered everything again.""'
    options:
    - id: opt_1
      text: Normal explanation
    - id: opt_2
      text: Excuse
    options_count: 2
    correct_answer: opt_2
    explanation: Tricky! Once — maybe. But if the cat "scatters things" every time right before inspection — that's an excuse.
    explanation_status: present
  - step_id: sc3_36
    source_step_id: '36'
    scene_id: sc3
    step_type: single_choice
    prompt: '"A classmate: "I solved all the problems, but my notebook stayed home. And the dog ate it at home.""'
    options:
    - id: opt_1
      text: Normal explanation
    - id: opt_2
      text: Excuse
    options_count: 2
    correct_answer: opt_2
    explanation: Excuse on top of excuse! First she forgot, then the dog ate it. The more excuses in a row — the more suspicious.
    explanation_status: implicit
  - step_id: sc3_38
    source_step_id: '38'
    scene_id: sc3
    step_type: single_choice
    prompt: '"A boy in the yard: "I saw a UFO last night! But I didn''t have time to take a photo — my phone died.""'
    options:
    - id: opt_1
      text: Normal explanation
    - id: opt_2
      text: Excuse
    options_count: 2
    correct_answer: opt_2
    explanation: Excuse! There's always something preventing proof. No photo, no video, nobody else saw it.
    explanation_status: implicit
  - step_id: sc3_40
    source_step_id: '40'
    scene_id: sc3
    step_type: single_choice
    prompt: '"A friend: "I sent you a message, but it didn''t reach you. Then I sent it again — it didn''t reach again. Probably
      the internet broke.""'
    options:
    - id: opt_1
      text: Normal explanation
    - id: opt_2
      text: Excuse
    options_count: 2
    correct_answer: opt_2
    explanation: Once — maybe. But twice in a row, and always to you specifically? Looks like an excuse.
    explanation_status: implicit
  - step_id: sc3_42
    source_step_id: '42'
    scene_id: sc3
    step_type: single_choice
    prompt: '"A boy: "I run faster than everyone, just today my sneakers are uncomfortable.""'
    options:
    - id: opt_1
      text: Normal explanation
    - id: opt_2
      text: Excuse
    options_count: 2
    correct_answer: opt_1
    explanation: If tomorrow there are "uncomfortable pants," the day after "slippery track" — those are excuses. A real runner
      will eventually show his speed.
    explanation_status: implicit
  - step_id: sc3_44
    source_step_id: '44'
    scene_id: sc3
    step_type: single_choice
    prompt: '"Sister: "I didn''t break the cup! It fell by itself. And if it didn''t — it was the cat. And if it wasn''t the
      cat — it was already cracked.""'
    options:
    - id: opt_1
      text: Normal explanation
    - id: opt_2
      text: Excuse
    options_count: 2
    correct_answer: opt_2
    explanation: Three versions in a row! When a person changes their explanation each time — that's a sure sign of an excuse.
    explanation_status: implicit
  - step_id: sc3_46
    source_step_id: '46'
    scene_id: sc3
    step_type: single_choice
    prompt: '"A friend: "My grandfather saw a real bear in the city, but it was a long time ago and there are no photos left,
      and grandpa doesn''t remember exactly where.""'
    options:
    - id: opt_1
      text: Normal explanation
    - id: opt_2
      text: Excuse
    options_count: 2
    correct_answer: opt_2
    explanation: Excuse! Long ago, no photos, doesn't remember. All verification paths are closed. Like Vitya's stone.
    explanation_status: implicit
  - step_id: sc3_48
    source_step_id: '48'
    scene_id: sc3
    step_type: single_choice
    prompt: '"A classmate: "I can hold my breath for three minutes, but only when I''m alone — I get nervous around people.""'
    options:
    - id: opt_1
      text: Normal explanation
    - id: opt_2
      text: Excuse
    options_count: 2
    correct_answer: opt_2
    explanation: Excuse! "Only when alone" — means it can't be verified. Convenient, right?
    explanation_status: present
  - step_id: sc3_50
    source_step_id: '50'
    scene_id: sc3
    step_type: theory
    prompt: 'Notice the pattern? Excuses work the same way: they BLOCK the way to checking. "Not in front of people," "not
      today," "it didn''t save," "the dog ate it." If someone has a new excuse for every check — that''s a signal: stop, something''s
      not right here.'
  - step_id: sc3_51
    source_step_id: '51'
    scene_id: sc3
    step_type: open_question
    prompt: What to do? What question can we ask to uncover an excuse?
  - step_id: sc3_52
    source_step_id: '52'
    scene_id: sc3
    step_type: theory
    prompt: 'Ask the question: "How can we check this?" If the person can suggest a way — great. If they have an excuse for
      every possible way — you''re looking at a tricky statement.'
  - step_id: sc3_53
    source_step_id: '53'
    scene_id: sc3
    step_type: theory
    prompt: And remember — this doesn't mean the person is bad. Vitya himself believed in the stone. His sister might really
      not remember who broke the cup. But if you CAN'T check — you don't have to believe just on their word.
- scene_id: sc4
  title: HOW TO VERIFY
  steps:
  - step_id: sc4_54
    source_step_id: '54'
    scene_id: sc4
    step_type: theory
    prompt: We've learned to spot excuses. But if there are no excuses — HOW exactly can we check? With our bare hands? No!
      We have tools.
  - step_id: sc4_55
    source_step_id: '55'
    scene_id: sc4
    step_type: theory
    prompt: 'Here are five helpers. SCALES — check weight. RULER or tape measure — length, height, distance. CLOCK or stopwatch
      — time and speed. THERMOMETER — temperature. And COUNTING — just count: how many things, how many people, how many floors.'
  - step_id: sc4_56
    source_step_id: '56'
    scene_id: sc4
    step_type: theory
    prompt: If there's at least ONE suitable tool for a statement — you can check it. But if no tool works? Then, most likely,
      you're looking at an opinion or a tricky statement.
  - step_id: sc4_57
    source_step_id: '57'
    scene_id: sc4
    step_type: instruction
    prompt: 'Let''s practice! I say a phrase — you decide: is there a tool or not?'
  - step_id: sc4_58
    source_step_id: '58'
    scene_id: sc4
    step_type: single_choice
    prompt: '"This book weighs five hundred grams."'
    options:
    - id: opt_1
      text: There is a tool
    - id: opt_2
      text: No tool
    options_count: 2
    correct_answer: opt_1
    explanation: Yes! Which one? Scales! Put on scales — check the number.
    explanation_status: present
  - step_id: sc4_60
    source_step_id: '60'
    scene_id: sc4
    step_type: single_choice
    prompt: '"The water in the kettle is hot."'
    options:
    - id: opt_1
      text: There is a tool
    - id: opt_2
      text: No tool
    options_count: 2
    correct_answer: opt_1
    explanation: Yes! Thermometer. Dipped in water — saw degrees.
    explanation_status: present
  - step_id: sc4_62
    source_step_id: '62'
    scene_id: sc4
    step_type: single_choice
    prompt: '"This movie is the best."'
    options:
    - id: opt_1
      text: There is a tool
    - id: opt_2
      text: No tool
    options_count: 2
    correct_answer: opt_2
    explanation: No tool! There's no "better-meter." Some like it, some don't. Opinion.
    explanation_status: implicit
  - step_id: sc4_64
    source_step_id: '64'
    scene_id: sc4
    step_type: single_choice
    prompt: '"I ran 100 meters in fifteen seconds."'
    options:
    - id: opt_1
      text: There is a tool
    - id: opt_2
      text: No tool
    options_count: 2
    correct_answer: opt_1
    explanation: Yes! Stopwatch. Timed it — verified.
    explanation_status: present
  - step_id: sc4_66
    source_step_id: '66'
    scene_id: sc4
    step_type: single_choice
    prompt: '"Our class is the friendliest."'
    options:
    - id: opt_1
      text: There is a tool
    - id: opt_2
      text: No tool
    options_count: 2
    correct_answer: opt_2
    explanation: No tool! You can't measure friendliness. Every class thinks it's friendly. Opinion.
    explanation_status: implicit
  - step_id: sc4_68
    source_step_id: '68'
    scene_id: sc4
    step_type: single_choice
    prompt: '"There are twelve pencils in this box."'
    options:
    - id: opt_1
      text: There is a tool
    - id: opt_2
      text: No tool
    options_count: 2
    correct_answer: opt_1
    explanation: Yes! Counting. Opened — counted — twelve or not.
    explanation_status: present
  - step_id: sc4_70
    source_step_id: '70'
    scene_id: sc4
    step_type: single_choice
    prompt: '"This room is longer than the hallway."'
    options:
    - id: opt_1
      text: There is a tool
    - id: opt_2
      text: No tool
    options_count: 2
    correct_answer: opt_1
    explanation: Yes! Tape measure. Measured the room, measured the hallway — compared meters.
    explanation_status: present
  - step_id: sc4_72
    source_step_id: '72'
    scene_id: sc4
    step_type: single_choice
    prompt: '"Doing homework is boring."'
    options:
    - id: opt_1
      text: There is a tool
    - id: opt_2
      text: No tool
    options_count: 2
    correct_answer: opt_2
    explanation: No tool! You can't measure boredom. It's boring for some, not for others. Opinion.
    explanation_status: implicit
  - step_id: sc4_74
    source_step_id: '74'
    scene_id: sc4
    step_type: theory
    prompt: 'Remember: if you can get a tool and get a NUMBER — the statement is checkable. Kilograms, degrees, seconds, meters,
      things. Numbers don''t lie. But "best," "boring," "beautiful" — those are about feelings, and there are no tools for
      those.'
  - step_id: sc4_75
    source_step_id: '75'
    scene_id: sc4
    step_type: theory
    prompt: Great! We have the tools. Now let's put it all together and become real truth detectives!
- scene_id: sc5
  title: TRUTH DETECTIVE
  steps:
  - step_id: sc5_76
    source_step_id: '76'
    scene_id: sc5
    step_type: theory
    prompt: 'Now you have everything: you know three words, you know about excuses, and you know five tools. It''s time to
      become truth detectives!'
  - step_id: sc5_77
    source_step_id: '77'
    scene_id: sc5
    step_type: theory
    prompt: 'A truth detective asks three questions. First: is there a TOOL to check? Scales, thermometer, clock, ruler, counting?
      If yes — the statement is checkable. If no — it might be an opinion.'
  - step_id: sc5_78
    source_step_id: '78'
    scene_id: sc5
    step_type: theory
    prompt: 'Second question: if there''s a tool — is the person WILLING to check? Or do they have an excuse for every check?
      If they have an excuse — it''s a tricky statement.'
  - step_id: sc5_79
    source_step_id: '79'
    scene_id: sc5
    step_type: theory
    prompt: 'Third question: we checked — what was the result? It checked out — fact. It didn''t check out — lie. That''s
      the whole system!'
  - step_id: sc5_80
    source_step_id: '80'
    scene_id: sc5
    step_type: instruction
    prompt: 'Final practice! Three categories: verifiable, opinion, tricky statement. Let''s go!'
  - step_id: sc5_81
    source_step_id: '81'
    scene_id: sc5
    step_type: single_choice
    prompt: '"This dog weighs ten kilograms."'
    options:
    - id: opt_1
      text: Verifiable
    - id: opt_2
      text: Opinion
    - id: opt_3
      text: Tricky statement
    options_count: 3
    correct_answer: opt_1
    explanation: Verifiable! Tool — scales. Put the dog on scales — got a number.
    explanation_status: implicit
  - step_id: sc5_83
    source_step_id: '83'
    scene_id: sc5
    step_type: single_choice
    prompt: '"This dog is the best in the world!"'
    options:
    - id: opt_1
      text: Verifiable
    - id: opt_2
      text: Opinion
    - id: opt_3
      text: Tricky statement
    options_count: 3
    correct_answer: opt_2
    explanation: Opinion! There's no "better-meter" for dogs. Every owner thinks theirs is the best.
    explanation_status: present
  - step_id: sc5_85
    source_step_id: '85'
    scene_id: sc5
    step_type: single_choice
    prompt: '"This dog can talk, but only when nobody''s home."'
    options:
    - id: opt_1
      text: Verifiable
    - id: opt_2
      text: Opinion
    - id: opt_3
      text: Tricky statement
    options_count: 3
    correct_answer: opt_3
    explanation: Tricky statement! "Only when no one's there" — an excuse. Can't verify. Just like Vitya's stone.
    explanation_status: implicit
  - step_id: sc5_87
    source_step_id: '87'
    scene_id: sc5
    step_type: single_choice
    prompt: '"Tomorrow it will be plus twenty degrees."'
    options:
    - id: opt_1
      text: Verifiable
    - id: opt_2
      text: Opinion
    - id: opt_3
      text: Tricky statement
    options_count: 3
    correct_answer: opt_1
    explanation: Verifiable! Tool — thermometer. We'll check tomorrow and find out.
    explanation_status: implicit
  - step_id: sc5_89
    source_step_id: '89'
    scene_id: sc5
    step_type: single_choice
    prompt: '"Tomorrow will be a good day."'
    options:
    - id: opt_1
      text: Verifiable
    - id: opt_2
      text: Opinion
    - id: opt_3
      text: Tricky statement
    options_count: 3
    correct_answer: opt_2
    explanation: Opinion! "Good" — it's different for everyone. There's no device for that.
    explanation_status: present
  - step_id: sc5_91
    source_step_id: '91'
    scene_id: sc5
    step_type: single_choice
    prompt: '"I can do twenty pull-ups, but only at home when nobody''s watching."'
    options:
    - id: opt_1
      text: Verifiable
    - id: opt_2
      text: Opinion
    - id: opt_3
      text: Tricky statement
    options_count: 3
    correct_answer: opt_3
    explanation: Tricky! The tool exists — counting. But "only when nobody's looking" — an excuse. They won't let you verify!
    explanation_status: implicit
  - step_id: sc5_93
    source_step_id: '93'
    scene_id: sc5
    step_type: single_choice
    prompt: '"My grandfather once saw an alien, but he didn''t tell anyone and there''s no proof."'
    options:
    - id: opt_1
      text: Verifiable
    - id: opt_2
      text: Opinion
    - id: opt_3
      text: Tricky statement
    options_count: 3
    correct_answer: opt_3
    explanation: Tricky statement! No evidence, no witnesses, can't verify.
    explanation_status: implicit
- scene_id: sc6
  title: REVERSE PRACTICE
  steps:
  - step_id: sc6_95
    source_step_id: '95'
    scene_id: sc6
    step_type: theory
    prompt: Let's make it harder! Now the opposite. I say a phrase and immediately say it's a fact, opinion, or tricky statement.
      Your job is to explain WHY.
  - step_id: sc6_96
    source_step_id: '96'
    scene_id: sc6
    step_type: single_choice
    prompt: '"There are twenty-three students in the class." This is — a fact. Why?'
    options:
    - id: opt_1
      text: Because the teacher said so.
    - id: opt_2
      text: Because that's usually how many students are in classes.
    - id: opt_3
      text: Because you can count them.
    options_count: 3
    correct_answer: opt_3
    explanation: You can count! The tool is counting. Stand up and count the heads.
    explanation_status: implicit
  - step_id: sc6_98
    source_step_id: '98'
    scene_id: sc6
    step_type: single_choice
    prompt: '"Our teacher is kind." This is — an opinion. Why?'
    options:
    - id: opt_1
      text: Because everyone says that.
    - id: opt_2
      text: Because you can't measure kindness with a device.
    - id: opt_3
      text: Because she doesn't yell or scold.
    options_count: 3
    correct_answer: opt_2
    explanation: No kindness meter! Some think it's kind, others think it's strict. It's a feeling.
    explanation_status: implicit
  - step_id: sc6_100
    source_step_id: '100'
    scene_id: sc6
    step_type: single_choice
    prompt: '"My cat understands everything I say, but only talks to me when nobody''s around." This is — a tricky statement.
      Why?'
    options:
    - id: opt_1
      text: Because cats can't talk.
    - id: opt_2
      text: Because it's about animals.
    - id: opt_3
      text: Because the excuse blocks verification.
    options_count: 3
    correct_answer: opt_3
    explanation: '"Only when nobody''s there" — an excuse! Can''t verify because there''s always a reason for every attempt.'
    explanation_status: present
  - step_id: sc6_102
    source_step_id: '102'
    scene_id: sc6
    step_type: single_choice
    prompt: '"From school to the bus stop is five hundred meters." This is — a fact. Why?'
    options:
    - id: opt_1
      text: Because that's what adults say.
    - id: opt_2
      text: Because you can measure it with a tape measure.
    - id: opt_3
      text: Because five hundred is an exact number.
    options_count: 3
    correct_answer: opt_2
    explanation: Tape measure! Go out, measure — get meters. Numbers don't lie.
    explanation_status: implicit
  - step_id: sc6_104
    source_step_id: '104'
    scene_id: sc6
    step_type: single_choice
    prompt: '"Five hundred meters — that''s far." This is — an opinion. Why?'
    options:
    - id: opt_1
      text: Because five hundred meters is not much.
    - id: opt_2
      text: Because "far" is a feeling, and everyone has their own.
    - id: opt_3
      text: Because nobody measured it.
    options_count: 3
    correct_answer: opt_2
    explanation: '"Far" is different for everyone! For a runner, five hundred meters is nothing. For a little kid — it''s
      a whole journey. There''s no tool to measure "far."'
    explanation_status: implicit
  - step_id: sc6_106
    source_step_id: '106'
    scene_id: sc6
    step_type: single_choice
    prompt: '"This watermelon weighs eight kilograms." This is — a fact. Why?'
    options:
    - id: opt_1
      text: Because watermelons are always heavy.
    - id: opt_2
      text: Because the seller wrote it on the price tag.
    - id: opt_3
      text: Because you can put it on scales and check.
    options_count: 3
    correct_answer: opt_3
    explanation: Scales! Put it on — see the number. Eight or not eight — the scales will show.
    explanation_status: implicit
  - step_id: sc6_108
    source_step_id: '108'
    scene_id: sc6
    step_type: single_choice
    prompt: '"This watermelon is sweet." This is — an opinion. Why?'
    options:
    - id: opt_1
      text: Because watermelons are always sweet.
    - id: opt_2
      text: Because sweetness is a feeling, and everyone has their own taste.
    - id: opt_3
      text: Because the watermelon hasn't been cut yet.
    options_count: 3
    correct_answer: opt_2
    explanation: Taste is a feeling! It's sweet to some, not to others. There's no "sweetness-meter."
    explanation_status: implicit
  - step_id: sc6_110
    source_step_id: '110'
    scene_id: sc6
    step_type: single_choice
    prompt: '"It''s plus fifteen outside." This is — a fact. Why?'
    options:
    - id: opt_1
      text: Because the weather forecast said so.
    - id: opt_2
      text: Because it's cool outside.
    - id: opt_3
      text: Because you can verify with a thermometer.
    options_count: 3
    correct_answer: opt_3
    explanation: Thermometer! Go outside, check degrees — verified.
    explanation_status: implicit
  - step_id: sc6_112
    source_step_id: '112'
    scene_id: sc6
    step_type: single_choice
    prompt: '"It''s warm outside." This is — an opinion. Why?'
    options:
    - id: opt_1
      text: Because the thermometer is broken.
    - id: opt_2
      text: Because "warm" is a feeling, and everyone has their own.
    - id: opt_3
      text: Because the weather is always changing.
    options_count: 3
    correct_answer: opt_2
    explanation: '"Warm" is different for everyone! For some, plus fifteen is warm; for others, it''s cold. It''s a feeling,
      not a number.'
    explanation_status: implicit
  - step_id: sc6_114
    source_step_id: '114'
    scene_id: sc6
    step_type: single_choice
    prompt: '"I ran a lap in forty seconds." This is — a fact. Why?'
    options:
    - id: opt_1
      text: Because I timed it myself.
    - id: opt_2
      text: Because running is good for you.
    - id: opt_3
      text: Because you can verify with a stopwatch.
    options_count: 3
    correct_answer: opt_3
    explanation: Stopwatch! Start timing — get a number. Forty seconds or not — the device will show.
    explanation_status: implicit
  - step_id: sc6_116
    source_step_id: '116'
    scene_id: sc6
    step_type: single_choice
    prompt: '"I run faster than everyone, but only when I train alone." This is — a tricky statement. Why?'
    options:
    - id: opt_1
      text: Because you can't run faster than everyone.
    - id: opt_2
      text: Because the excuse "only when alone" blocks verification.
    - id: opt_3
      text: Because it's bragging.
    options_count: 3
    correct_answer: opt_2
    explanation: An excuse! The tool exists — a stopwatch. But "only when alone" — blocks the way to checking. Like Vitya's
      stone!
    explanation_status: implicit
  - step_id: sc6_118
    source_step_id: '118'
    scene_id: sc6
    step_type: theory
    prompt: 'See — it''s the same thing! A watermelon, the street, running — you can say facts and opinions about all of them.
      The difference is: is there a tool and a number? If yes — checkable. If no — opinion. If the tool exists but they won''t
      let you check — tricky!'
- scene_id: sc7
  title: CONCLUSION
  steps:
  - step_id: sc7_119
    source_step_id: '119'
    scene_id: sc7
    step_type: theory
    prompt: 'You know what you did today? You learned to ask the most important question: "How can we check this?" It sounds
      simple — but most adults don''t ask it. Seriously.'
  - step_id: sc7_120
    source_step_id: '120'
    scene_id: sc7
    step_type: theory
    prompt: 'Someone says: "This cream heals everything!" — and people believe it. Someone says: "I saw a ghost, but it only
      appears in the dark when nobody''s looking" — and people nod. But now you know: if you can''t check it — you don''t
      have to believe it.'
  - step_id: sc7_121
    source_step_id: '121'
    scene_id: sc7
    step_type: theory
    prompt: 'You have five tools — scales, ruler, clock, thermometer, and counting. And one more, the most important — the
      question: "What tool can we use to check this?" If there''s an answer — great. If there''s a new excuse for every answer
      — you know what to do.'
  - step_id: sc7_122
    source_step_id: '122'
    scene_id: sc7
    step_type: reflection
    prompt: 'Try it at home! Listen to what people say on TV, on the internet, at the playground. And ask yourself: can this
      be checked? With what tool? Or is there an excuse? You''ll be surprised how often this works.'
    teacher_guidance: 'And ask yourself: can this be checked? With what tool? Or is there an excuse?'
  - step_id: sc7_123
    source_step_id: '123'
    scene_id: sc7
    step_type: theory
    prompt: That's all for today! You're real truth detectives. It was awesome with you. Until next time — and may no excuse
      get past you!
