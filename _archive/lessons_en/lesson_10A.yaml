source_lesson_id: lesson_10A
language: en
title: Either-or
day: 10
slot: A
scenes:
- scene_id: sc1
  title: WARMUP — REVIEW OF DAY 9 AND MORE
  steps:
  - step_id: sc1_1
    source_step_id: '1'
    scene_id: sc1
    step_type: instruction
    prompt: Tenth lesson! Today's warmup is longer than usual — we'll review not just last lesson, but some tricky topics
      from old lessons. Let's go!
  - step_id: sc1_2
    source_step_id: '2'
    scene_id: sc1
    step_type: instruction
    prompt: Let's start with scary chains. When a small event is blown up into a cosmic catastrophe. Chain or real warning?
  - step_id: sc1_3
    source_step_id: '3'
    scene_id: sc1
    step_type: single_choice
    prompt: '''If you don''t learn the poem — you''ll get a bad mark, stay back a year, and never graduate!'''
    options:
    - id: opt_1
      text: Scary chain
    - id: opt_2
      text: Real warning
    options_count: 2
    correct_answer: opt_1
    explanation: Chain! From one poem to the end of a school career — it's like from a dropped crumb to the end of the world.
      Each step is less likely.
    explanation_status: implicit
  - step_id: sc1_5
    source_step_id: '5'
    scene_id: sc1
    step_type: single_choice
    prompt: '''If you eat too many candies — teeth will hurt, then all fall out, and you''ll drink through a straw forever!'''
    options:
    - id: opt_1
      text: Scary chain
    - id: opt_2
      text: Real warning
    options_count: 2
    correct_answer: opt_1
    explanation: Chain! Yes, candies can hurt teeth. But 'they'll all fall out' and 'straw forever' — that's scarier than
      any horror movie.
    explanation_status: implicit
  - step_id: sc1_7
    source_step_id: '7'
    scene_id: sc1
    step_type: single_choice
    prompt: '''If you don''t sleep before a test — you''ll think worse and write weaker than you could.'''
    options:
    - id: opt_1
      text: Scary chain
    - id: opt_2
      text: Real warning
    options_count: 2
    correct_answer: opt_2
    explanation: 'Real warning! Each step is logical: little sleep → tiredness → worse result. Brain really does work worse
      without rest. No exaggeration.'
    explanation_status: implicit
  - step_id: sc1_9
    source_step_id: '9'
    scene_id: sc1
    step_type: theory
    prompt: Now false authorities. Remember the check question? 'Does this person know about this specifically?'
  - step_id: sc1_10
    source_step_id: '10'
    scene_id: sc1
    step_type: single_choice
    prompt: A famous actress recommends a physics textbook.
    options:
    - id: opt_1
      text: Should trust
    - id: opt_2
      text: Should not
    - id: opt_3
      text: Should check
    options_count: 3
    correct_answer: opt_2
    explanation: Should not! The actress knows about movies and acting. Physics is for scientists and teachers. A pretty smile
      doesn't check formulas.
    explanation_status: implicit
  - step_id: sc1_12
    source_step_id: '12'
    scene_id: sc1
    step_type: single_choice
    prompt: A swimming coach explains breathing technique in water.
    options:
    - id: opt_1
      text: Should trust
    - id: opt_2
      text: Should not
    - id: opt_3
      text: Should check
    options_count: 3
    correct_answer: opt_1
    explanation: Should! This is his area. A swimming coach knows about breathing in water better than a fish. Well, almost.
    explanation_status: implicit
  - step_id: sc1_14
    source_step_id: '14'
    scene_id: sc1
    step_type: single_choice
    prompt: A popular gamer advises which university to choose.
    options:
    - id: opt_1
      text: Should trust
    - id: opt_2
      text: Should not
    - id: opt_3
      text: Should check
    options_count: 3
    correct_answer: opt_2
    explanation: Shouldn't! Gamer is an expert in games, not education. And if they didn't finish university themselves -
      definitely not.
    explanation_status: implicit
  - step_id: sc1_16
    source_step_id: '16'
    scene_id: sc1
    step_type: instruction
    prompt: And now - jump back! Remember cause and effect? Two events happen together - and we decide one caused the other.
      But is that true?
  - step_id: sc1_17
    source_step_id: '17'
    scene_id: sc1
    step_type: single_choice
    prompt: '"Every time I wear a green shirt, our team wins. So the shirt brings luck!"'
    options:
    - id: opt_1
      text: Cause
    - id: opt_2
      text: Coincidence
    options_count: 2
    correct_answer: opt_2
    explanation: Coincidence! A shirt can't score goals. It can't even run. The team wins because they trained, not because
      someone wore green.
    explanation_status: present
  - step_id: sc1_19
    source_step_id: '19'
    scene_id: sc1
    step_type: single_choice
    prompt: '"When it''s cold outside, people catch colds more often."'
    options:
    - id: opt_1
      text: Cause
    - id: opt_2
      text: Coincidence
    options_count: 2
    correct_answer: opt_1
    explanation: Cause! Cold weakens the body's defenses, and viruses can attack more easily. This is confirmed by research
      - not superstition, but science.
    explanation_status: implicit
  - step_id: sc1_21
    source_step_id: '21'
    scene_id: sc1
    step_type: theory
    prompt: And finally - the strawman! Remember? When someone twists your words to "win" more easily. They argue not against
      what you said, but against what they invented.
  - step_id: sc1_22
    source_step_id: '22'
    scene_id: sc1
    step_type: single_choice
    prompt: 'Masha: "I didn''t really like this movie." Petya: "Masha says all fans of this movie are stupid!"'
    options:
    - id: opt_1
      text: Yes, that's a strawman
    - id: opt_2
      text: No, that's accurate
    options_count: 2
    correct_answer: opt_1
    explanation: Strawman! Masha only talked about herself - "I didn't like it." Petya blew this up into insulting all fans.
      Classic - easier to attack the made-up version.
    explanation_status: implicit
  - step_id: sc1_24
    source_step_id: '24'
    scene_id: sc1
    step_type: single_choice
    prompt: 'Dima: "They assign too much homework." Teacher: "Dima thinks we shouldn''t study at all!"'
    options:
    - id: opt_1
      text: Yes, that's a strawman
    - id: opt_2
      text: No, that's accurate
    options_count: 2
    correct_answer: opt_1
    explanation: Strawman! "Too much homework" and "shouldn't study" are completely different. Dima isn't against studying
      - he's against being overwhelmed.
    explanation_status: implicit
  - step_id: sc1_26
    source_step_id: '26'
    scene_id: sc1
    step_type: theory
    prompt: Great! Chains, authorities, causes, and strawmen - everything in place. Brain is working! Now we're ready for
      a new topic - and it's tricky.
- scene_id: sc2
  title: STORY - THE "EITHER-OR" DAY
  steps:
  - step_id: sc2_27
    source_step_id: '27'
    scene_id: sc2
    step_type: theory
    prompt: And now - a story. One of the hardest days in Dmytryk's life. Well, that's how it felt to him. Four traps in one
      day - and he fell for each one. It started at breakfast.
  - step_id: sc2_28
    source_step_id: '28'
    scene_id: sc2
    step_type: theory
    prompt: 'Older brother Taras takes Dmytryk''s chocolate sandwich. Just takes it and says: "Either give me the sandwich,
      or I''ll tell mom you played on your tablet until midnight. Choose!"'
  - step_id: sc2_29
    source_step_id: '29'
    scene_id: sc2
    step_type: theory
    prompt: 'Dmytryk thought: option one - give it up. Option two - mom finds out. No other options. The sandwich went to
      Taras. Morning ruined.'
  - step_id: sc2_30
    source_step_id: '30'
    scene_id: sc2
    step_type: theory
    prompt: At school during break, Mykola comes up. "We're playing football! Either you join us right now, or you're not
      our friend at all. That's it! Choose!" But Dmytryk wanted to finish drawing his robot for the competition.
  - step_id: sc2_31
    source_step_id: '31'
    scene_id: sc2
    step_type: theory
    prompt: 'Two options: football or losing friends. Dmytryk dropped the robot and went to play. The robot stayed unfinished.
      Mood - even worse.'
  - step_id: sc2_32
    source_step_id: '32'
    scene_id: sc2
    step_type: theory
    prompt: 'After school, Vasyl calls: "Either we go to the river right now, or I''m going with Petro and I''ll never invite
      you again. Ever!" But Dmytryk hasn''t done his math homework.'
  - step_id: sc2_33
    source_step_id: '33'
    scene_id: sc2
    step_type: theory
    prompt: Dmytryk went to the river. The homework was left. In the evening he sat down with the assignments, can't solve
      number four, and thinks...
  - step_id: sc2_34
    source_step_id: '34'
    scene_id: sc2
    step_type: theory
    prompt: '"Either I solve everything perfectly - or I''m completely hopeless. Everyone normal can solve it, but I can''t."
      Eyes are wet. Horrible day.'
  - step_id: sc2_35
    source_step_id: '35'
    scene_id: sc2
    step_type: theory
    prompt: Then Olena calls - asking about homework. She hears Dmytryk is upset. He tells her about his day. And then Olena
      asks a strange question.
  - step_id: sc2_36
    source_step_id: '36'
    scene_id: sc2
    step_type: theory
    prompt: '"Wait. Taras said: either the sandwich or he tells mom. But did you think - what other options were there?" Dmytryk:
      "What others? Only two!"'
  - step_id: sc2_37
    source_step_id: '37'
    scene_id: sc2
    step_type: reflection
    prompt: What do you think? What other options did Dmytryk have with the sandwich? What would you suggest?
  - step_id: sc2_38
    source_step_id: '38'
    scene_id: sc2
    step_type: theory
    prompt: 'Olena: "Could have said - go ahead, I''ll explain to mom and apologize myself. Could have offered - let''s split
      it. Could have said - okay, go ahead, I''m not scared. That''s already three options, not two!"'
  - step_id: sc2_39
    source_step_id: '39'
    scene_id: sc2
    step_type: theory
    prompt: '"And football? Mykola said - either play or not friends. But does friendship disappear from one missed game?"'
  - step_id: sc2_40
    source_step_id: '40'
    scene_id: sc2
    step_type: single_choice
    prompt: Did Dmytryk have other options with football, besides "play or not friends"?
    options:
    - id: opt_1
      text: Yes, there were
    - id: opt_2
      text: No, only two
    options_count: 2
    correct_answer: opt_1
    explanation: 'Of course! Could have said: "I''ll come in fifteen minutes, finish the robot." Could have cheered for the
      team while holding the drawing. Could have suggested playing at the next break. Friendship doesn''t break from one "no"!'
    explanation_status: implicit
  - step_id: sc2_42
    source_step_id: '42'
    scene_id: sc2
    step_type: theory
    prompt: '"And the river? Vasyl said - either now or I''ll never invite you. Is that true?"'
  - step_id: sc2_43
    source_step_id: '43'
    scene_id: sc2
    step_type: single_choice
    prompt: '"Either go to the river now or I''ll never invite you again" - is that a trap or honest choice?'
    options:
    - id: opt_1
      text: Trap
    - id: opt_2
      text: Honest choice
    options_count: 2
    correct_answer: opt_1
    explanation: Trap! Could have gone after homework. Could have suggested tomorrow. The river isn't going anywhere, and
      neither is Vasyl - real friends don't disappear like that.
    explanation_status: implicit
  - step_id: sc2_45
    source_step_id: '45'
    scene_id: sc2
    step_type: theory
    prompt: 'And the trickiest. "Either perfectly or I''m hopeless" - Dmytryk said that to himself! Olena: "Between ''perfectly''
      and ''hopeless'' there''s: good, okay, ''still learning but trying''..."'
  - step_id: sc2_46
    source_step_id: '46'
    scene_id: sc2
    step_type: theory
    prompt: 'Dmytryk fell silent. Then says: "Wait... All day people said ''either-or'' to me, and I believed there were only
      two options? Even my own head fooled me?!"'
  - step_id: sc2_47
    source_step_id: '47'
    scene_id: sc2
    step_type: theory
    prompt: 'Olena: "Exactly! This trap is called - false dilemma. When someone says ''either-or'' - but there are actually
      many more options. And you fell for it four times today!"'
- scene_id: sc3
  title: THREE LAWS OF ARISTOTLE
  steps:
  - step_id: sc3_48
    source_step_id: '48'
    scene_id: sc3
    step_type: theory
    prompt: Now - something serious. Do you know who first thought about "either-or"? Ancient Greek philosopher Aristotle.
      Twenty-three hundred years ago!
  - step_id: sc3_49
    source_step_id: '49'
    scene_id: sc3
    step_type: theory
    prompt: Aristotle came up with three laws of thought. We already know two - let's remember. First law - the law of identity.
      Sounds scary, but it's simple.
  - step_id: sc3_50
    source_step_id: '50'
    scene_id: sc3
    step_type: theory
    prompt: A cat is a cat. Not a dog, not a parrot, not a sandwich. If we agreed we're talking about a cat - then it's about
      a cat. Words don't change meaning in the middle of conversation.
  - step_id: sc3_51
    source_step_id: '51'
    scene_id: sc3
    step_type: theory
    prompt: Second law - the law of non-contradiction. A lamp can't be on and off at the same time. You can't sit and stand
      simultaneously. A statement can't be both true and false.
  - step_id: sc3_52
    source_step_id: '52'
    scene_id: sc3
    step_type: theory
    prompt: And today - the third law. The trickiest. The law of excluded middle. Remember this name - you'll need it.
  - step_id: sc3_53
    source_step_id: '53'
    scene_id: sc3
    step_type: theory
    prompt: 'The law goes: either a statement is true - or it''s false. There''s no third option. Either the lamp is on -
      or off. Either a number is even - or odd. Either it''s day - or not day. That''s it. Period. No middle ground.'
  - step_id: sc3_54
    source_step_id: '54'
    scene_id: sc3
    step_type: single_choice
    prompt: '"Water in a kettle is either boiling or not boiling."'
    options:
    - id: opt_1
      text: Law works
    - id: opt_2
      text: There's a third option
    options_count: 2
    correct_answer: opt_1
    explanation: Law works! Boiling is a specific temperature, a hundred degrees. Water either reached it or didn't. A kettle
      can't "partially boil."
    explanation_status: implicit
  - step_id: sc3_56
    source_step_id: '56'
    scene_id: sc3
    step_type: single_choice
    prompt: '"You''re either hungry or full."'
    options:
    - id: opt_1
      text: Law works
    - id: opt_2
      text: There's a third option
    options_count: 2
    correct_answer: opt_2
    explanation: There's a third option! You can be "not hungry but would eat a pie." Or "ate but still want something." Hunger
      isn't a light switch, it has shades.
    explanation_status: implicit
  - step_id: sc3_58
    source_step_id: '58'
    scene_id: sc3
    step_type: theory
    prompt: And here's the most important part. Aristotle invented the law for simple logical statements - on or off, true
      or false, even or odd. For light bulbs, numbers, and facts, the law works perfectly.
  - step_id: sc3_59
    source_step_id: '59'
    scene_id: sc3
    step_type: theory
    prompt: But people started applying it to everything! "Either you're my friend or my enemy." "Either an excellent student
      or worthless." "Either with me or against me." They took a law for light bulbs - and stretched it over life!
  - step_id: sc3_60
    source_step_id: '60'
    scene_id: sc3
    step_type: theory
    prompt: But life isn't a light bulb. Between "friend" and "enemy" there's acquaintance, classmate, neighbor. Between "excellent
      student" and "worthless" - an entire spectrum!
  - step_id: sc3_61
    source_step_id: '61'
    scene_id: sc3
    step_type: single_choice
    prompt: '"A door is either open or closed."'
    options:
    - id: opt_1
      text: Law works
    - id: opt_2
      text: There's a third option
    options_count: 2
    correct_answer: opt_2
    explanation: There's a third option! A door can be ajar. Aristotle would be surprised, but doors are trickier than light
      bulbs - they have infinite positions.
    explanation_status: implicit
  - step_id: sc3_63
    source_step_id: '63'
    scene_id: sc3
    step_type: single_choice
    prompt: '"Today is either Tuesday or not Tuesday."'
    options:
    - id: opt_1
      text: Law works
    - id: opt_2
      text: There's a third option
    options_count: 2
    correct_answer: opt_1
    explanation: Law works! Day of the week is a fact. Today is either Tuesday or not. The calendar doesn't lie and has no
      shades. Here Aristotle is a hundred percent right.
    explanation_status: present
  - step_id: sc3_65
    source_step_id: '65'
    scene_id: sc3
    step_type: theory
    prompt: 'So, here''s the main secret. When you hear "either-or" - check: is this a real choice of two, like a light bulb?
      Or did someone stretch a law for light bulbs over complex real life?'
  - step_id: sc3_66
    source_step_id: '66'
    scene_id: sc3
    step_type: theory
    prompt: 'Trap phrases that signal false dilemma: "either-or," "either you''re with us or against us," "there are only
      two ways," "no third option." Hear them - be alert!'
- scene_id: sc4
  title: 'PRACTICE: TRAP OR REAL CHOICE?'
  steps:
  - step_id: sc4_67
    source_step_id: '67'
    scene_id: sc4
    step_type: instruction
    prompt: 'Time to practice! I read an "either-or" statement. Your job - determine: is this a real choice of two, like a
      light bulb? Or a false dilemma, and there are actually more options?'
  - step_id: sc4_68
    source_step_id: '68'
    scene_id: sc4
    step_type: single_choice
    prompt: '"Either you''re for our team or you''re a traitor!"'
    options:
    - id: opt_1
      text: Trap
    - id: opt_2
      text: Real choice
    options_count: 2
    correct_answer: opt_1
    explanation: Trap! You can support neither, both teams, or not care about football - and that doesn't make you a traitor.
    explanation_status: implicit
  - step_id: sc4_70
    source_step_id: '70'
    scene_id: sc4
    step_type: single_choice
    prompt: '"A lamp is either on or off."'
    options:
    - id: opt_1
      text: Trap
    - id: opt_2
      text: Real choice
    options_count: 2
    correct_answer: opt_2
    explanation: Real choice! A normal lamp has two states - electricity flows or it doesn't. Aristotle is satisfied. Light
      bulbs don't deceive him.
    explanation_status: implicit
  - step_id: sc4_72
    source_step_id: '72'
    scene_id: sc4
    step_type: single_choice
    prompt: '"Either you study excellently or you''re a failure."'
    options:
    - id: opt_1
      text: Trap
    - id: opt_2
      text: Real choice
    options_count: 2
    correct_answer: opt_1
    explanation: Trap! Between "excellent" and "failure" - a huge spectrum. Good, okay, "trying," "still learning." Life isn't
      a test with two grades.
    explanation_status: implicit
  - step_id: sc4_74
    source_step_id: '74'
    scene_id: sc4
    step_type: single_choice
    prompt: '"A number is either even or odd."'
    options:
    - id: opt_1
      text: Trap
    - id: opt_2
      text: Real choice
    options_count: 2
    correct_answer: opt_2
    explanation: Real choice! Math is exact. A number divides by two evenly - even. Doesn't divide - odd. No third option.
    explanation_status: implicit
  - step_id: sc4_76
    source_step_id: '76'
    scene_id: sc4
    step_type: single_choice
    prompt: '"Either you love cats or you love dogs."'
    options:
    - id: opt_1
      text: Trap
    - id: opt_2
      text: Real choice
    options_count: 2
    correct_answer: opt_1
    explanation: Trap! You can love both. You can love hamsters. You can love neither - and dream of dragons. The world doesn't
      divide into two camps.
    explanation_status: implicit
  - step_id: sc4_78
    source_step_id: '78'
    scene_id: sc4
    step_type: single_choice
    prompt: '"This problem is either solved correctly or incorrectly."'
    options:
    - id: opt_1
      text: Trap
    - id: opt_2
      text: Real choice
    options_count: 2
    correct_answer: opt_2
    explanation: Real choice! In math the answer is either right or wrong. Two plus two can't be "kind of five." The law works
      clearly here.
    explanation_status: present
  - step_id: sc4_80
    source_step_id: '80'
    scene_id: sc4
    step_type: single_choice
    prompt: '"Either you eat soup or you''ll stay hungry!"'
    options:
    - id: opt_1
      text: Trap
    - id: opt_2
      text: Real choice
    options_count: 2
    correct_answer: opt_1
    explanation: Trap! You can eat some soup. You can cook something else. You can eat an apple. The stomach doesn't know
      "either-or."
    explanation_status: implicit
  - step_id: sc4_82
    source_step_id: '82'
    scene_id: sc4
    step_type: single_choice
    prompt: '"A person is either alive or dead."'
    options:
    - id: opt_1
      text: Trap
    - id: opt_2
      text: Real choice
    options_count: 2
    correct_answer: opt_2
    explanation: Real choice! No shades here - like a light bulb. Sad example, but the law works exactly.
    explanation_status: present
  - step_id: sc4_84
    source_step_id: '84'
    scene_id: sc4
    step_type: single_choice
    prompt: '"Either you''re first in the competition or you lost!"'
    options:
    - id: opt_1
      text: Trap
    - id: opt_2
      text: Real choice
    options_count: 2
    correct_answer: opt_1
    explanation: Trap! Second, third, tenth place - that's also a result. You can gain experience, beat your record, just
      have fun. Victory isn't just a gold medal.
    explanation_status: implicit
  - step_id: sc4_86
    source_step_id: '86'
    scene_id: sc4
    step_type: single_choice
    prompt: '"Either support my idea or leave the team!"'
    options:
    - id: opt_1
      text: Trap
    - id: opt_2
      text: Real choice
    options_count: 2
    correct_answer: opt_1
    explanation: Trap! You can suggest improvement. You can discuss. You can vote. A good team isn't "agree or leave," it's
      "let's think together."
    explanation_status: implicit
- scene_id: sc5
  title: 'PRACTICE: FIND THE THIRD OPTION'
  steps:
  - step_id: sc5_88
    source_step_id: '88'
    scene_id: sc5
    step_type: theory
    prompt: You already know how to distinguish a trap from a real choice. Now - harder level. I read a trap "either-or,"
      and you come up with the third option. The one that was "hidden."
  - step_id: sc5_89
    source_step_id: '89'
    scene_id: sc5
    step_type: instruction
    prompt: 'The magic question that breaks any trap: "What if...?" Remember? Let''s go!'
  - step_id: sc5_90
    source_step_id: '90'
    scene_id: sc5
    step_type: open_question
    prompt: '"Either eat soup right now or you''ll stay hungry until dinner!" What''s the hidden third option?'
  - step_id: sc5_91
    source_step_id: '91'
    scene_id: sc5
    step_type: theory
    prompt: 'Our answer: eat some soup now, the rest later. Or make yourself a sandwich. Or ask to replace soup with porridge.
      Stomach doesn''t care where food comes from.'
  - step_id: sc5_92
    source_step_id: '92'
    scene_id: sc5
    step_type: open_question
    prompt: '"Either you agree with me or you understand nothing!" Third option?'
  - step_id: sc5_93
    source_step_id: '93'
    scene_id: sc5
    step_type: theory
    prompt: 'Our answer: "I understand your view, but I have a different one. Both can be partially correct." Between "agree"
      and "understand nothing" - a whole world of shades.'
  - step_id: sc5_94
    source_step_id: '94'
    scene_id: sc5
    step_type: open_question
    prompt: '"Either you go to training every day or you''re lazy!" What''s the third option?'
  - step_id: sc5_95
    source_step_id: '95'
    scene_id: sc5
    step_type: theory
    prompt: 'Our answer: go three times a week. Or train at home. Or rest today and come back tomorrow refreshed. Rest isn''t
      laziness, it''s part of training!'
  - step_id: sc5_96
    source_step_id: '96'
    scene_id: sc5
    step_type: open_question
    prompt: '"Either you tell me the secret or we''re not friends anymore!" Third option? This one''s important!'
    teacher_guidance: '"Either you tell me the secret or we''re not friends anymore!" Third option?'
  - step_id: sc5_97
    source_step_id: '97'
    scene_id: sc5
    step_type: theory
    prompt: 'Our answer: "This isn''t my secret and I can''t tell it. But we''re still friends." Or: "I''ll tell you when
      I''m ready." A real friend doesn''t give ultimatums - and doesn''t blackmail with friendship.'
  - step_id: sc5_98
    source_step_id: '98'
    scene_id: sc5
    step_type: open_question
    prompt: '"Either our school is best in town or it''s worst!" Third option?'
  - step_id: sc5_99
    source_step_id: '99'
    scene_id: sc5
    step_type: theory
    prompt: 'Our answer: school can be good at one thing and weak at another. Strong in math, but small gym. The world doesn''t
      divide into "best" and "worst" - there''s a spectrum.'
  - step_id: sc5_100
    source_step_id: '100'
    scene_id: sc5
    step_type: theory
    prompt: 'And the last: "Either do homework now or don''t do it and fail!" Find the third option yourself - by now you''re
      experts. You can do part now, part later. Ask for help. Start with easy things to get into it.'
- scene_id: sc6
  title: 'THE TRAP IN LIFE: WHERE IT HIDES'
  steps:
  - step_id: sc6_101
    source_step_id: '101'
    scene_id: sc6
    step_type: theory
    prompt: We learned to spot traps and invent third options. And now - the most interesting part. Where does "either-or"
      ambush us in real life? And there's one especially tricky type of trap!
  - step_id: sc6_102
    source_step_id: '102'
    scene_id: sc6
    step_type: theory
    prompt: Sometimes you're given a choice of two options - but both lead to the same thing! You think you're choosing. But
      the choice was already made for you. This is the "illusion of choice" trap. Here's an example.
  - step_id: sc6_103
    source_step_id: '103'
    scene_id: sc6
    step_type: theory
    prompt: 'Evening. You''re playing. Mom comes and says: "You''ll go to sleep now - or after you pick up your toys?"'
  - step_id: sc6_104
    source_step_id: '104'
    scene_id: sc6
    step_type: single_choice
    prompt: What's hidden in this "choice"?
    options:
    - id: opt_1
      text: Both options = you go to sleep
    - id: opt_2
      text: Real choice of two
    options_count: 2
    correct_answer: opt_1
    explanation: 'Both options lead to one thing: you go to sleep! The "don''t sleep" option isn''t offered. You got an illusion
      of choice - now or after cleanup, but sleep in both cases. Tricky, right?'
    explanation_status: present
  - step_id: sc6_106
    source_step_id: '106'
    scene_id: sc6
    step_type: single_choice
    prompt: '"You''ll do homework before or after the walk?"'
    options:
    - id: opt_1
      text: Both = you do homework
    - id: opt_2
      text: Real choice
    options_count: 2
    correct_answer: opt_1
    explanation: Again both options lead to homework! The question "should I do homework" isn't even discussed. You were allowed
      to choose only when - but not whether.
    explanation_status: implicit
  - step_id: sc6_108
    source_step_id: '108'
    scene_id: sc6
    step_type: single_choice
    prompt: '"You''ll buy basic or premium?"'
    options:
    - id: opt_1
      text: Both = you buy
    - id: opt_2
      text: Real choice
    options_count: 2
    correct_answer: opt_1
    explanation: The seller is genius! Both options are buying. The "don't buy" option vanished. You're choosing not "buy
      or not," but "which to buy." The trap works on adults for millions of years.
    explanation_status: implicit
  - step_id: sc6_110
    source_step_id: '110'
    scene_id: sc6
    step_type: single_choice
    prompt: '"You''ll take out trash before or after dinner?"'
    options:
    - id: opt_1
      text: Both = you take out trash
    - id: opt_2
      text: Real choice
    options_count: 2
    correct_answer: opt_1
    explanation: And again - you take out trash in both cases. The "don't take out" option isn't offered. Remember this pattern
      - it happens every day!
    explanation_status: implicit
  - step_id: sc6_112
    source_step_id: '112'
    scene_id: sc6
    step_type: theory
    prompt: Now advertising. It loves the "either-or" trap - and uses it at full power.
  - step_id: sc6_113
    source_step_id: '113'
    scene_id: sc6
    step_type: single_choice
    prompt: '"Buy now with 50% discount - or pay full price tomorrow!"'
    options:
    - id: opt_1
      text: Trap
    - id: opt_2
      text: Real choice
    options_count: 2
    correct_answer: opt_1
    explanation: Trap! Third option - don't buy at all. The discount disappears? So what. Something you don't need isn't needed
      at half price or full price.
    explanation_status: implicit
  - step_id: sc6_115
    source_step_id: '115'
    scene_id: sc6
    step_type: single_choice
    prompt: '"Subscription for a month - ten coins. For a year - eighty. What''ll you choose?"'
    options:
    - id: opt_1
      text: Both = you subscribe
    - id: opt_2
      text: Real choice
    options_count: 2
    correct_answer: opt_1
    explanation: Illusion of choice trap! Both options are subscribing. "Don't subscribe" isn't offered. And maybe you don't
      need this subscription?
    explanation_status: implicit
  - step_id: sc6_117
    source_step_id: '117'
    scene_id: sc6
    step_type: theory
    prompt: Now - fights and arguments. The trap hurts most here.
  - step_id: sc6_118
    source_step_id: '118'
    scene_id: sc6
    step_type: open_question
    prompt: '"Either you apologize right now or I''m done talking to you!" What''s the third option?'
  - step_id: sc6_119
    source_step_id: '119'
    scene_id: sc6
    step_type: theory
    prompt: 'Our answer: discuss what happened. Take a break and talk when both calm down. Apologize for your part but explain
      your view. Blackmail with silence isn''t solving conflict.'
  - step_id: sc6_120
    source_step_id: '120'
    scene_id: sc6
    step_type: open_question
    prompt: '"Either you care about class cleanliness or you don''t care about classmates!" Third option?'
  - step_id: sc6_121
    source_step_id: '121'
    scene_id: sc6
    step_type: theory
    prompt: 'Our answer: you can care about cleanliness but disagree with the cleanup method. Or suggest taking turns. "I
      disagree with the plan" doesn''t mean "I don''t care."'
  - step_id: sc6_122
    source_step_id: '122'
    scene_id: sc6
    step_type: theory
    prompt: And the most dangerous trap - the one you set for yourself. In your own head. Without ads or anyone else's words.
  - step_id: sc6_123
    source_step_id: '123'
    scene_id: sc6
    step_type: open_question
    prompt: '"Either I''ll do this perfectly - or I won''t do it at all." What''s the hidden third option?'
  - step_id: sc6_124
    source_step_id: '124'
    scene_id: sc6
    step_type: theory
    prompt: Do it imperfectly! Start and improve gradually. Seventy percent done is better than zero. Perfectionism is one
      of the most common "either-or" traps in your head.
  - step_id: sc6_125
    source_step_id: '125'
    scene_id: sc6
    step_type: theory
    prompt: 'Remember three places where "either-or" hides: the illusion of choice - when both options lead to one. Ads -
      when "don''t buy" disappears. And your own head - when you divide the world into black and white.'
- scene_id: sc7
  title: 'MINI-LECTURE: "EITHER PERFECT OR NOT AT ALL"'
  steps:
  - step_id: sc7_126
    source_step_id: '126'
    scene_id: sc7
    step_type: theory
    prompt: 'And now - a serious talk. We just said: "either perfect or I won''t do it" - one of the most common traps in
      your head. But you have no idea how dangerous it is. This trap ruins adult lives.'
  - step_id: sc7_127
    source_step_id: '127'
    scene_id: sc7
    step_type: theory
    prompt: 'Imagine: someone dreams of writing a book. They have an idea, have time, sit at the desk... and think: "Either
      I''ll write a masterpiece - or don''t start at all. Why write a bad book?" And doesn''t write. One year. Two. Ten. The
      book stays in their head.'
  - step_id: sc7_128
    source_step_id: '128'
    scene_id: sc7
    step_type: theory
    prompt: 'Another person wants to make a film. But thinks: "Either this will be the best film of the year - or I''ll be
      embarrassed." And doesn''t make it. The script sits in a drawer. The camera gathers dust. And the film that could make
      someone laugh or think - doesn''t exist.'
  - step_id: sc7_129
    source_step_id: '129'
    scene_id: sc7
    step_type: theory
    prompt: 'Third person is a scientist. They have a hypothesis that could change medicine. But thinks: "Either I''ll prove
      it perfectly - or I''ll be laughed at." And doesn''t publish. Years pass. Someone else discovers the same thing.'
  - step_id: sc7_130
    source_step_id: '130'
    scene_id: sc7
    step_type: theory
    prompt: 'Fourth person wants to open a bakery. Makes amazing rolls. All friends love them. But thinks: "Either my bakery
      will be best in town - or not worth trying." Rolls stay just for friends.'
  - step_id: sc7_131
    source_step_id: '131'
    scene_id: sc7
    step_type: theory
    prompt: 'Fifth person wants to learn to draw. Takes a pencil, draws - doesn''t come out great. And thinks: "I have no
      talent. Either beautifully or not at all." Quits after first drawing. Yet all great artists'' first drawings were crooked
      too.'
  - step_id: sc7_132
    source_step_id: '132'
    scene_id: sc7
    step_type: theory
    prompt: See? All these stories have the same trap. "Either perfect or not at all." And the person chooses "not at all."
      Every time.
  - step_id: sc7_133
    source_step_id: '133'
    scene_id: sc7
    step_type: single_choice
    prompt: 'What''s better: write an imperfect book - or write none?'
    options:
    - id: opt_1
      text: Imperfect - but write
    - id: opt_2
      text: Better no book than a bad one
    options_count: 2
    correct_answer: opt_1
    explanation: Imperfect! Because an imperfect book can be rewritten, improved, shown to friends. But a book that stayed
      in your head - it doesn't exist. Zero is always less than "imperfect." Always.
    explanation_status: present
  - step_id: sc7_135
    source_step_id: '135'
    scene_id: sc7
    step_type: theory
    prompt: You know what successful people do? They don't wait for the perfect moment. They start awkwardly, uncertainly,
      with mistakes - and improve as they go. First iPhone was clunky. First airplane flew twelve seconds. First pancake is
      always a flop. But it - exists.
  - step_id: sc7_136
    source_step_id: '136'
    scene_id: sc7
    step_type: theory
    prompt: 'So when you catch yourself thinking "either perfect or not at all" - remember: that''s a false dilemma. The third
      option: start imperfectly. And that''s the best option of all three.'
  - step_id: sc7_137
    source_step_id: '137'
    scene_id: sc7
    step_type: instruction
    prompt: '...'
- scene_id: sc8
  title: 'CLOSING: THE WORLD ISN''T BLACK AND WHITE'
  steps:
  - step_id: sc8_138
    source_step_id: '138'
    scene_id: sc8
    step_type: reflection
    prompt: Let's think about what we learned today. Aristotle gave us the law of excluded middle - and it works perfectly
      for light bulbs, numbers, and facts. But life is more complex than a light bulb.
  - step_id: sc8_139
    source_step_id: '139'
    scene_id: sc8
    step_type: theory
    prompt: The world isn't a black and white photo. It's colorful. It has red, green, blue and a million more shades. Between
      "friend" and "enemy" - a whole palette of people. Between "masterpiece" and "flop" - a thousand options.
  - step_id: sc8_140
    source_step_id: '140'
    scene_id: sc8
    step_type: theory
    prompt: When someone says "either-or" - that's a reason to stop and think. Maybe it's a real choice - like a light bulb.
      Or maybe someone just hid all other options from you. And now you know the magic question.
  - step_id: sc8_141
    source_step_id: '141'
    scene_id: sc8
    step_type: theory
    prompt: '"What if...?" That question breaks any false dilemma. Remember it. Use it every day. Especially - when your own
      head sets the trap.'
  - step_id: sc8_142
    source_step_id: '142'
    scene_id: sc8
    step_type: theory
    prompt: And remember perfectionism. An unwritten book is worse than a bad one. An unmade film is worse than an amateur
      one. Untried is worse than a failed attempt. Start. Do. Improve later. The world belongs to those who start imperfectly.
  - step_id: sc8_143
    source_step_id: '143'
    scene_id: sc8
    step_type: theory
    prompt: And now - a break! After it, we have the second part of day ten. Rest, and if someone says "either-or" to you
      - you know what to do.
  - step_id: sc8_144
    source_step_id: '144'
    scene_id: sc8
    step_type: instruction
    prompt: '...'
