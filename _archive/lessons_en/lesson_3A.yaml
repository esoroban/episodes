- scene_id: sc5
  title: Soldier and Scout
  steps:
  - step_id: sc5_100
    source_step_id: '100'
    scene_id: sc5
    step_type: theory
    prompt: 'So we found three goals: win, understand, hurt. But the third, HURT — that''s not even arguing. That''s an attack.'
  - step_id: sc5_101
    source_step_id: '101'
    scene_id: sc5
    step_type: theory
    prompt: 'But REAL arguing — that''s when both want to prove something. And the question is: HOW do you do it? There are
      two roles. Imagine two people — one SOLDIER, another SCOUT.'
  - step_id: sc5_102
    source_step_id: '102'
    scene_id: sc5
    step_type: theory
    prompt: 'A SOLDIER in an argument — a fortress defender. His fortress is his opinion. He stands behind a wall, shield
      up, shouting: "Don''t pass! My opinion is the most right!" If someone says: "Maybe you''re wrong?" — soldier gets mad.
      For him, admitting a mistake means surrendering. And — attention! — the soldier might even be RIGHT. But he''s still
      a soldier because winning matters more than truth.'
  - step_id: sc5_103
    source_step_id: '103'
    scene_id: sc5
    step_type: theory
    prompt: 'A SCOUT — quite different. He doesn''t sit in a fortress — he goes into the world. With binoculars, with a notebook,
      and — note this — with a smile! A scout even behind enemy lines smiles and listens VERY carefully. Because every word
      the other person says is information. He thinks: "What''s really true? Maybe I don''t know something?" If someone says:
      "You''re wrong" — the scout doesn''t get mad, he''s happy: "Oh! So I''ll learn something new!"'
  - step_id: sc5_104
    source_step_id: '104'
    scene_id: sc5
    step_type: theory
    prompt: 'Here''s an example. Two friends argue: what''s healthier — chocolate or apples? Soldier says: "Apples are healthier,
      it''s obvious! It''s stupid to even argue! Everyone knows!" Notice — he''s probably RIGHT! Apples really are healthier.
      But he''s a soldier because he doesn''t explain WHY, doesn''t listen to the other, just pushes.'
  - step_id: sc5_105
    source_step_id: '105'
    scene_id: sc5
    step_type: theory
    prompt: What about the scout? "Hmm, interesting. Let's figure it out. Apples have vitamin C and fiber. Chocolate? Cocoa,
      magnesium... But lots of sugar. So apples are really healthier — but chocolate has some good in it!" See? He reached
      the same conclusion — but THROUGH investigating. And along the way learned more than the soldier ever will.
  - step_id: sc5_106
    source_step_id: '106'
    scene_id: sc5
    step_type: theory
    prompt: 'Here''s the key difference: a soldier might be right by ACCIDENT. A scout is right KNOWINGLY — because he checked.
      And if it turns out he was wrong — he calmly says: "Wow, didn''t know! Thanks!" A soldier? He''ll keep shouting, even
      if all evidence is against him.'
