source_lesson_id: lesson_3A
language: en
title: How to Argue Without Fighting
day: 3
slot: A
scenes:
- scene_id: sc1
  title: 'Warm-up: Fact, Opinion, Falsehood'
  steps:
  - step_id: sc1_1
    source_step_id: '1'
    scene_id: sc1
    step_type: theory
    prompt: Hello! Today is a completely new topic — but first let's check what you remember from last lessons. Quick, no
      thinking!
  - step_id: sc1_2
    source_step_id: '2'
    scene_id: sc1
    step_type: instruction
    prompt: 'Reminder: FACT — you can check it and it''s true. OPINION — can''t be checked, it''s a personal feeling. FALSEHOOD
      — can be checked, but it turned out false. Let''s go!'
  - step_id: sc1_3
    source_step_id: '3'
    scene_id: sc1
    step_type: single_choice
    prompt: '"There are 24 hours in a day."'
    options:
    - id: opt_1
      text: Fact
    - id: opt_2
      text: Opinion
    - id: opt_3
      text: Falsehood
    options_count: 3
    correct_answer: opt_1
    explanation: Fact! Check a clock, count — exactly 24. Verified, confirmed. Clocks don't lie!
    explanation_status: present
  - step_id: sc1_5
    source_step_id: '5'
    scene_id: sc1
    step_type: single_choice
    prompt: '"Dogs are the best pets."'
    options:
    - id: opt_1
      text: Fact
    - id: opt_2
      text: Opinion
    - id: opt_3
      text: Falsehood
    options_count: 3
    correct_answer: opt_2
    explanation: Opinion! "Best" is a feeling. Someone loves cats, someone hamsters, some love fish. Can't be tested!
    explanation_status: present
  - step_id: sc1_7
    source_step_id: '7'
    scene_id: sc1
    step_type: single_choice
    prompt: '"The moon is bigger than the sun."'
    options:
    - id: opt_1
      text: Fact
    - id: opt_2
      text: Opinion
    - id: opt_3
      text: Falsehood
    options_count: 3
    correct_answer: opt_3
    explanation: Falsehood! Astronomers measured — the sun is 400 times bigger than the moon. The moon is just closer, so
      it SEEMS similar in size. Eyes deceive!
    explanation_status: present
  - step_id: sc1_9
    source_step_id: '9'
    scene_id: sc1
    step_type: single_choice
    prompt: '"Water freezes at zero degrees."'
    options:
    - id: opt_1
      text: Fact
    - id: opt_2
      text: Opinion
    - id: opt_3
      text: Falsehood
    options_count: 3
    correct_answer: opt_1
    explanation: 'Fact! A thermometer shows: zero — and water turns to ice. Physics works!'
    explanation_status: present
  - step_id: sc1_11
    source_step_id: '11'
    scene_id: sc1
    step_type: single_choice
    prompt: '"The Great Wall of China is visible from space."'
    options:
    - id: opt_1
      text: Fact
    - id: opt_2
      text: Opinion
    - id: opt_3
      text: Falsehood
    options_count: 3
    correct_answer: opt_3
    explanation: Falsehood! Astronauts checked — it's not visible! It's long but too narrow. Highways are more visible from
      space — but that doesn't sound as cool.
    explanation_status: present
  - step_id: sc1_13
    source_step_id: '13'
    scene_id: sc1
    step_type: single_choice
    prompt: '"Drawing is more interesting than reading."'
    options:
    - id: opt_1
      text: Fact
    - id: opt_2
      text: Opinion
    - id: opt_3
      text: Falsehood
    options_count: 3
    correct_answer: opt_2
    explanation: Opinion! "More interesting" — everyone's different. No device measures interest!
    explanation_status: present
  - step_id: sc1_15
    source_step_id: '15'
    scene_id: sc1
    step_type: single_choice
    prompt: '"Elephants can jump."'
    options:
    - id: opt_1
      text: Fact
    - id: opt_2
      text: Opinion
    - id: opt_3
      text: Falsehood
    options_count: 3
    correct_answer: opt_3
    explanation: Falsehood! Elephants are the only mammals that can't jump. At their weight, it would be an earthquake!
    explanation_status: present
  - step_id: sc1_17
    source_step_id: '17'
    scene_id: sc1
    step_type: single_choice
    prompt: '"A rainbow has seven colors."'
    options:
    - id: opt_1
      text: Fact
    - id: opt_2
      text: Opinion
    - id: opt_3
      text: Falsehood
    options_count: 3
    correct_answer: opt_1
    explanation: 'Fact! Count: red, orange, yellow, green, cyan, blue, violet. Seven!'
    explanation_status: present
  - step_id: sc1_19
    source_step_id: '19'
    scene_id: sc1
    step_type: single_choice
    prompt: '"Monday is the hardest day of the week."'
    options:
    - id: opt_1
      text: Fact
    - id: opt_2
      text: Opinion
    - id: opt_3
      text: Falsehood
    options_count: 3
    correct_answer: opt_2
    explanation: Opinion! For some it's hard, for others it's favorite. No device measures how hard a day is!
    explanation_status: present
  - step_id: sc1_21
    source_step_id: '21'
    scene_id: sc1
    step_type: single_choice
    prompt: '"A giraffe has six neck vertebrae."'
    options:
    - id: opt_1
      text: Fact
    - id: opt_2
      text: Opinion
    - id: opt_3
      text: Falsehood
    options_count: 3
    correct_answer: opt_3
    explanation: Tricky! Falsehood! A giraffe, like humans, has SEVEN neck vertebrae. Just each one is brick-sized! You can
      count them — zoologists did.
    explanation_status: present
  - step_id: sc1_23
    source_step_id: '23'
    scene_id: sc1
    step_type: theory
    prompt: What do we use to check facts? Who remembers the five tools? Scales, ruler, clock, thermometer, and counting.
      If you can get a NUMBER — you can check it.
- scene_id: sc2
  title: 'Warm-up: Cause, Coincidence, Third Cause'
  steps:
  - step_id: sc2_24
    source_step_id: '24'
    scene_id: sc2
    step_type: theory
    prompt: Now — cause and coincidence! CAUSE — the first really made the second happen. COINCIDENCE — just happened together.
  - step_id: sc2_25
    source_step_id: '25'
    scene_id: sc2
    step_type: single_choice
    prompt: '"I dropped my phone — the screen cracked."'
    options:
    - id: opt_1
      text: Cause
    - id: opt_2
      text: Coincidence
    options_count: 2
    correct_answer: opt_1
    explanation: Cause! The impact cracked it. Don't drop it — no crack. Phones don't crack from loneliness!
    explanation_status: implicit
  - step_id: sc2_27
    source_step_id: '27'
    scene_id: sc2
    step_type: single_choice
    prompt: '"I ate a sandwich — a cartoon started on TV."'
    options:
    - id: opt_1
      text: Cause
    - id: opt_2
      text: Coincidence
    options_count: 2
    correct_answer: opt_2
    explanation: Coincidence! TV doesn't care if you ate or not. It has its own schedule!
    explanation_status: implicit
  - step_id: sc2_29
    source_step_id: '29'
    scene_id: sc2
    step_type: single_choice
    prompt: '"Mom opened the window — the room got colder."'
    options:
    - id: opt_1
      text: Cause
    - id: opt_2
      text: Coincidence
    options_count: 2
    correct_answer: opt_1
    explanation: Cause! Cold air came from outside. Close the window — warm again. Physics!
    explanation_status: implicit
  - step_id: sc2_31
    source_step_id: '31'
    scene_id: sc2
    step_type: single_choice
    prompt: '"I finished the test — the school bell rang."'
    options:
    - id: opt_1
      text: Cause
    - id: opt_2
      text: Coincidence
    options_count: 2
    correct_answer: opt_2
    explanation: Coincidence! The bell rings on schedule, not because you finished. The bell doesn't care!
    explanation_status: present
  - step_id: sc2_33
    source_step_id: '33'
    scene_id: sc2
    step_type: single_choice
    prompt: '"We put dough in the oven — a pie came out."'
    options:
    - id: opt_1
      text: Cause
    - id: opt_2
      text: Coincidence
    options_count: 2
    correct_answer: opt_1
    explanation: Cause! The oven's heat turns dough into pie. Without the oven — stays dough. Dough doesn't bake by hope!
    explanation_status: implicit
  - step_id: sc2_35
    source_step_id: '35'
    scene_id: sc2
    step_type: single_choice
    prompt: '"Dad washed the car — it started raining."'
    options:
    - id: opt_1
      text: Cause
    - id: opt_2
      text: Coincidence
    options_count: 2
    correct_answer: opt_2
    explanation: Coincidence! Though Dad probably disagrees! But rain doesn't know if Dad washed the car. Clouds don't watch
      Dad!
    explanation_status: implicit
  - step_id: sc2_37
    source_step_id: '37'
    scene_id: sc2
    step_type: single_choice
    prompt: '"The dog barked — the mailman ran away."'
    options:
    - id: opt_1
      text: Cause
    - id: opt_2
      text: Coincidence
    options_count: 2
    correct_answer: opt_1
    explanation: Cause! The barking scared the mailman. Without it, he'd stand calm. Mailmen don't run for no reason!
    explanation_status: implicit
  - step_id: sc2_39
    source_step_id: '39'
    scene_id: sc2
    step_type: single_choice
    prompt: '"I made a wish on a falling star — it came true."'
    options:
    - id: opt_1
      text: Cause
    - id: opt_2
      text: Coincidence
    options_count: 2
    correct_answer: opt_2
    explanation: Coincidence! Stars don't grant wishes. Just a coincidence. Meteors don't care about you!
    explanation_status: implicit
  - step_id: sc2_41
    source_step_id: '41'
    scene_id: sc2
    step_type: theory
    prompt: 'Remember: AFTER doesn''t mean BECAUSE! And now the trickiest — THIRD CAUSE. Two events seem connected, but really
      something hidden caused both.'
  - step_id: sc2_42
    source_step_id: '42'
    scene_id: sc2
    step_type: single_choice
    prompt: '"In cities with many cinemas, people live longer. So movies extend life!"'
    options:
    - id: opt_1
      text: Cause
    - id: opt_2
      text: Coincidence
    - id: opt_3
      text: Third cause
    options_count: 3
    correct_answer: opt_3
    explanation: Third cause — rich city! Rich cities have more cinemas AND better medicine. Movies don't cure — but popcorn
      lifts mood!
    explanation_status: implicit
  - step_id: sc2_44
    source_step_id: '44'
    scene_id: sc2
    step_type: single_choice
    prompt: '"A girl threw a ball up — it fell down."'
    options:
    - id: opt_1
      text: Cause
    - id: opt_2
      text: Coincidence
    - id: opt_3
      text: Third cause
    options_count: 3
    correct_answer: opt_1
    explanation: Cause! Gravity! Throw it — it falls. Always. Balls can't fly!
    explanation_status: implicit
  - step_id: sc2_46
    source_step_id: '46'
    scene_id: sc2
    step_type: single_choice
    prompt: '"Children who read a lot write better essays."'
    options:
    - id: opt_1
      text: Cause
    - id: opt_2
      text: Coincidence
    - id: opt_3
      text: Third cause
    options_count: 3
    correct_answer: opt_1
    explanation: Trap! It's a cause! Reading shows you how sentences work, teaches words. Reading really helps writing. Not
      everything that looks like third cause is!
    explanation_status: implicit
  - step_id: sc2_48
    source_step_id: '48'
    scene_id: sc2
    step_type: single_choice
    prompt: '"When umbrella sales go up — rain boot sales go up."'
    options:
    - id: opt_1
      text: Cause
    - id: opt_2
      text: Coincidence
    - id: opt_3
      text: Third cause
    options_count: 3
    correct_answer: opt_3
    explanation: Third cause — rain! It makes people buy both umbrellas and boots. Rain is the puppeteer!
    explanation_status: implicit
  - step_id: sc2_50
    source_step_id: '50'
    scene_id: sc2
    step_type: single_choice
    prompt: '"A boy stepped in a puddle — his boots got wet."'
    options:
    - id: opt_1
      text: Cause
    - id: opt_2
      text: Coincidence
    - id: opt_3
      text: Third cause
    options_count: 3
    correct_answer: opt_1
    explanation: Cause! Water in the puddle soaked the boots. Simple and honest. Puddles don't forgive!
    explanation_status: implicit
  - step_id: sc2_52
    source_step_id: '52'
    scene_id: sc2
    step_type: single_choice
    prompt: '"The more toys a child has — the more friends."'
    options:
    - id: opt_1
      text: Cause
    - id: opt_2
      text: Coincidence
    - id: opt_3
      text: Third cause
    options_count: 3
    correct_answer: opt_3
    explanation: Scout! Ready to learn new, even if it changes what he thought before.
    explanation_status: implicit
  - step_id: sc2_54
    source_step_id: '54'
    scene_id: sc2
    step_type: single_choice
    prompt: 'They argue what''s heavier — a kilo of iron or a kilo of cotton. One: "Iron, of course! It''s obvious! It''s
      funny to even discuss!"'
    options:
    - id: opt_1
      text: Soldier
    - id: opt_2
      text: Scout
    - id: opt_3
      text: Soldier! "Obviously" + "funny to discuss" — double shield. But think?
    options_count: 3
    correct_answer: opt_1
    explanation: 'They argue what''s heavier. Another: "Hmm, both are a kilo... But iron seems heavier. Why? Let''s think!"'
    explanation_status: implicit
  - step_id: sc2_56
    source_step_id: '56'
    scene_id: sc2
    step_type: single_choice
    prompt: “Classes where children are often sick have worse grades.”
    options:
    - id: opt_1
      text: Scout
    - id: opt_2
      text: Scout! Noticed the contradiction and wants to figure it out. Both weigh the same — a kilo! But iron takes less
        space, so SEEMS heavier.
    - id: opt_3
      text: 'A friend says: "You''re wrong." You answer: "Maybe. But why do you think that?"'
    options_count: 3
    correct_answer: opt_3
    explanation: Tricky! The third reason is a poorly ventilated classroom. In the stuffiness they get sick more often and
      think less well. A classroom without fresh air is the enemy of both health and grades!
    explanation_status: implicit
  - step_id: sc2_58
    source_step_id: '58'
    scene_id: sc2
    step_type: theory
    prompt: 'Two life-saving questions: “What else could have influenced it?” and “Can one exist without the other?” If you
      ask these questions, the traps are not scary!'
  - step_id: sc2_59
    source_step_id: '59'
    scene_id: sc2
    step_type: theory
    prompt: Scout! "Maybe" — magic words. A soldier would never say that!
- scene_id: sc3
  title: 'You''re shown you made a mistake in the problem. You: "No! I''m right! The answers are wrong!"'
  steps:
  - step_id: sc3_60
    source_step_id: '60'
    scene_id: sc3
    step_type: open_question
    prompt: Who's ever gotten into an argument with a friend or sibling over a disagreement?
  - step_id: sc3_61
    source_step_id: '61'
    scene_id: sc3
    step_type: theory
    prompt: 'Wow, almost everything! Now be honest: did you WANT to quarrel? Or did you just want to explain your idea, but
      it somehow happened on its own?'
  - step_id: sc3_62
    source_step_id: '62'
    scene_id: sc3
    step_type: theory
    prompt: Soldier! Everyone's guilty — the answers, the book, the universe. Everyone but him!
  - step_id: sc3_63
    source_step_id: '63'
    scene_id: sc3
    step_type: theory
    prompt: 'Final round! Now there are situations — you identify EVERYTHING at once. What''s the goal: WIN, UNDERSTAND, or
      HURT? And if it''s a real argument — soldier or scout?'
  - step_id: sc3_64
    source_step_id: '64'
    scene_id: sc3
    step_type: theory
    prompt: 'Classmates argue what''s healthier — swimming or running. One: "Swimming! All doctors say so! What''s to discuss?"'
  - step_id: sc3_65
    source_step_id: '65'
    scene_id: sc3
    step_type: theory
    prompt: 'The cry gets louder: “Your trees are crooked!” - “And your sky is green!” Both blushed. Nobody is listening.
      Everyone wants only one thing - to win.'
  - step_id: sc3_66
    source_step_id: '66'
    scene_id: sc3
    step_type: theory
    prompt: 'Then Olenka came up: “Guys, have you even looked at each other’s work? Let''s be honest: find one good thing
      in someone else''s drawing." Masha and Mikola fell silent.'
  - step_id: sc3_67
    source_step_id: '67'
    scene_id: sc3
    step_type: theory
    prompt: 'Masha looked: “Well... your river is beautiful.” Mikola: “And your clouds are cool.” The dispute is over. They
      began to UNDERSTAND, not to win.'
  - step_id: sc3_68
    source_step_id: '68'
    scene_id: sc3
    step_type: theory
    prompt: Win! And the role is SOLDIER. References "all doctors" but explains nothing. "What's to discuss" — closed the
      fortress gates!
  - step_id: sc3_69
    source_step_id: '69'
    scene_id: sc3
    step_type: theory
    prompt: '"How about we compare — swimming trains some muscles, running trains others. Maybe both are good?"'
  - step_id: sc3_70
    source_step_id: '70'
    scene_id: sc3
    step_type: single_choice
    prompt: What did Masha and Mikola want at the BEGINNING of the dispute?
    options:
    - id: opt_1
      text: Scout
    - id: opt_2
      text: Hurt
    options_count: 2
    correct_answer: opt_2
    explanation: Understand! And the role is SCOUT. Investigates, compares, finds unexpected conclusion.
    explanation_status: implicit
  - step_id: sc3_72
    source_step_id: '72'
    scene_id: sc3
    step_type: single_choice
    prompt: '"You don''t even do sports, why do you care?"'
    options:
    - id: opt_1
      text: Soldier
    - id: opt_2
      text: Scout
    options_count: 2
    correct_answer: opt_1
    explanation: Understand! They wanted to understand what was good about the other person's work. And they immediately stopped
      arguing.
    explanation_status: implicit
  - step_id: sc3_74
    source_step_id: '74'
    scene_id: sc3
    step_type: theory
    prompt: Hurt! He doesn't care about running or swimming. Attack on the person.
- scene_id: sc4
  title: 'Sister: "You broke my pencil!" Brother: "No, I didn''t! You sharpened it badly! And anyway!"'
  steps:
  - step_id: sc4_75
    source_step_id: '75'
    scene_id: sc4
    step_type: theory
    prompt: 'We said: the purpose of the dispute is to understand. But does everyone do this? Of course not! People enter
      into arguments for DIFFERENT purposes. And now we will look at three of them.'
  - step_id: sc4_76
    source_step_id: '76'
    scene_id: sc4
    step_type: theory
    prompt: 'The first goal is to WIN. A person doesn’t care who is actually right. It is important for him that the last
      word remains with him. He doesn’t listen, doesn’t think - he just presses: “I’m right, period!” Even if he is wrong,
      he will never admit it.'
  - step_id: sc4_77
    source_step_id: '77'
    scene_id: sc4
    step_type: theory
    prompt: The second goal is to UNDERSTAND. Both want to figure out how it really is. “Let’s check!”, “Why do you think
      so?”, “Show me!” Here both are ready to change their minds if they hear good evidence.
  - step_id: sc4_78
    source_step_id: '78'
    scene_id: sc4
    step_type: theory
    prompt: Win! SOLDIER — defends, counterattacks. The pencil doesn't matter anymore — important not to surrender!
  - step_id: sc4_79
    source_step_id: '79'
    scene_id: sc4
    step_type: theory
    prompt: 'Another option. Brother: "Oh, really broken? Let''s see, maybe we can glue it."'
  - step_id: sc4_80
    source_step_id: '80'
    scene_id: sc4
    step_type: theory
    prompt: 'Second option: “Let''s measure! Let’s ride to the fence and back, time it, and find out which one is really faster.”
      This is - UNDERSTAND! He wants to know the truth.'
  - step_id: sc4_81
    source_step_id: '81'
    scene_id: sc4
    step_type: theory
    prompt: 'Third option: “You have an ugly old bicycle, only grandmothers ride that kind.” OFFEND. He doesn''t care which
      bike is faster. He doesn''t even argue - he just attacks.'
  - step_id: sc4_82
    source_step_id: '82'
    scene_id: sc4
    step_type: theory
    prompt: Do you see the difference? To win is to at least argue about the topic. He doesn’t even try to offend. Now let's
      vote!
  - step_id: sc4_83
    source_step_id: '83'
    scene_id: sc4
    step_type: single_choice
    prompt: Understand! SCOUT — doesn't argue who's guilty, seeks solution.
    options:
    - id: opt_1
      text: 'Friends argue who''s stronger — lion or tiger. One: "Lion — he''s the king of beasts! It''s common knowledge!"'
    - id: opt_2
      text: Soldier
    - id: opt_3
      text: Scout
    options_count: 3
    correct_answer: opt_1
    explanation: Win! He doesn’t offer to check - he simply declares himself a champion. He gave himself a medal!
    explanation_status: implicit
  - step_id: sc4_85
    source_step_id: '85'
    scene_id: sc4
    step_type: single_choice
    prompt: Win! SOLDIER — "king of beasts" as final argument. Crown is his shield!
    options:
    - id: opt_1
      text: 'Another: "I read that tigers are heavier and faster. But lions hunt in packs... It''s complicated!"'
    - id: opt_2
      text: Soldier
    - id: opt_3
      text: Scout
    options_count: 3
    correct_answer: opt_2
    explanation: Understand! Offers to check. Ready for any result - a real scout!
    explanation_status: implicit
  - step_id: sc4_87
    source_step_id: '87'
    scene_id: sc4
    step_type: single_choice
    prompt: Understand! SCOUT — collects facts, sees complexity, doesn't rush conclusions.
    options:
    - id: opt_1
      text: 'Friends discuss a cartoon. One: "This cartoon is stupid, and so is everyone who likes it."'
    - id: opt_2
      text: Soldier
    - id: opt_3
      text: Scout
    options_count: 3
    correct_answer: opt_3
    explanation: Offend! He doesn't care who is faster. He wants to offend - and the turtle has nothing to do with it.
    explanation_status: implicit
  - step_id: sc4_89
    source_step_id: '89'
    scene_id: sc4
    step_type: single_choice
    prompt: Hurt! Attacks everyone who likes it. Not an argument — a blow.
    options:
    - id: opt_1
      text: 'Boy: "I think dogs are smarter than cats." Friend: "Why? Do you mean they learn commands better? Or something
        else?"'
    - id: opt_2
      text: Soldier
    - id: opt_3
      text: Scout
    options_count: 3
    correct_answer: opt_1
    explanation: Win! Pressures with the authority of the award. Doesn't discuss - closes the dispute, as if the award is
      the last word.
    explanation_status: implicit
  - step_id: sc4_91
    source_step_id: '91'
    scene_id: sc4
    step_type: single_choice
    prompt: Understand! SCOUT — doesn't argue right away, clarifies WHAT exactly the other person means. That's a true scout!
    options:
    - id: opt_1
