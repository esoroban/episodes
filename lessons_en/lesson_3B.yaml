lesson:
  id: lesson_3B
  day: 3
  slot: B
  title:
    ru: Три инструмента разведчика
    uk: Три інструменти розвідника
    en: Three Scout Tools
  scenes:
    - scene_id: sc1
      title:
        ru: Открытие
        uk: Відкриття
        en: Discovery
      media_ref: 3B.sc1.opening
      status: v3_locked
      steps:
        - id: '1'
          type: speech
          duration_sec: 12
          text:
            ru: 'На прошлом уроке мы познакомились с солдатом и разведчиком. Солдат
              защищает крепость своего мнения. Разведчик исследует мир с улыбкой и
              биноклем. Сегодня — дадим разведчику настоящие инструменты!

              '
            uk: На минулому уроці ми познайомилися з солдатом і розвідником. Солдат
              захищає твердиню своєї думки. Розвідник дослідує світ з посмішкою і
              біноклем. Сьогодні — дамо розвіднику справжні інструменти!
            en: Last lesson we met the soldier and the scout. The soldier defends
              the fortress of his opinion. The scout explores the world with a smile
              and binoculars. Today—let's give the scout real tools!
        - id: '2'
          type: speech
          duration_sec: 12
          text:
            ru: 'Но сначала — важная вещь. Хотеть понять — это первый шаг. Но хотеть
              — мало. Представьте такого разведчика…

              '
            uk: Але спочатку — важна річ. Хотіти зрозуміти — це перший крок. Але хотіти
              — мало. Уявіть такого розвідника…
            en: But first—something important. Wanting to understand is the first
              step. But wanting isn't enough. Picture a scout like this…
        - id: '3'
          type: speech
          duration_sec: 18
          text:
            ru: 'Разведчик врывается к другу и кричит: «ГОВОРИ НЕМЕДЛЕННО, ЧТО ТЫ
              ДУМАЕШЬ! Я ТЕБЯ ВНИМАТЕЛЬНО СЛУШАЮ! ОТВЕЧАЙ БЫСТРО!» У него и блокнот,
              и бинокль — всё при нём. Друг расскажет ему что-нибудь честно?

              '
            uk: 'Розвідник вривається до друга і кричить: «ГОВОРИ НЕГАЙНО, ЧТО ТИ
              ДУМАЄШ! Я ТЕБЕ УВАЖНО СЛУХАЮ! ВІДПОВІДАЙ ШВИДКО!» У нього й блокнот,
              й бинокль — всё при ньому. Друг розповість йому щось чесно?'
            en: 'A scout bursts in to see a friend and shouts: "TELL ME RIGHT NOW
              WHAT YOU THINK! I''M LISTENING CAREFULLY! ANSWER QUICKLY!" He has both
              a notebook and binoculars—everything with him. Will the friend tell
              him something honest?'
        - id: '4'
          type: speech
          duration_sec: 15
          text:
            ru: 'Конечно нет! Можно хотеть понять. Можно даже иметь все нужные инструменты.
              Но если ты кричишь и давишь — никто не откроется. Разведчик работает
              тихо, с улыбкой. Он не требует — он приглашает поговорить.

              '
            uk: Звичайно, ні! Можна хотіти зрозуміти. Можна навіть мати всі потрібні
              інструменти. Але якщо ти кричиш і натискаєш — ніхто не відкриється.
              Розвідник працює тихо, з посмішкою. Він не вимагає — він запрошує поговорити.
            en: Of course not! You can want to understand. You can even have all the
              tools you need. But if you shout and push—no one will open up. A scout
              works quietly, with a smile. He doesn't demand—he invites conversation.
        - id: '5'
          type: speech
          duration_sec: 12
          text:
            ru: 'Сегодня мы изучим три инструмента настоящего разведчика. Но запомните:
              любой инструмент работает только когда ты по-настоящему хочешь услышать
              другого, а не заставить его говорить.

              '
            uk: 'Сьогодні ми вивчимо три інструменти справжнього розвідника. Але запам''ятайте:
              будь-який інструмент працює лише коли ти дійсно хочеш почути іншого,
              а не змусити його говорити.'
            en: 'Today we''ll learn three tools of a real scout. But remember: any
              tool only works when you truly want to hear the other person, not force
              them to speak.'
        - id: '6'
          type: speech
          duration_sec: 5
          text:
            ru: 'Инструмент первый — ЭМПАТИЯ.

              '
            uk: Інструмент перший — ЕМПАТІЯ.
            en: Tool number one—EMPATHY.
        - id: '7'
          type: speech
          duration_sec: 20
          text:
            ru: 'Сложное слово, да? Давайте разберёмся. Эмпатия — это умение почувствовать
              то же, что чувствует другой человек. Проще говоря — сопереживание. Когда
              друг расстроен, и тебе тоже немножко грустно — не потому что притворяешься,
              а потому что ты как будто заглянул к нему в душу.

              '
            uk: Складне слово, так? Давайте розберемося. Емпатія — це вміння почути
              те ж саме, що почуває інша людина. Простіше кажучи — співчуття. Коли
              друг засмучений, і тобі теж трохи сумно — не тому що ти удаєш, а тому
              що ти як би заглянув йому в душу.
            en: A hard word, right? Let's figure it out. Empathy is the ability to
              feel what another person feels. In other words—feeling with them. When
              a friend is sad, and you're a little sad too—not because you're pretending,
              but because you kind of looked into their heart.
        - id: '8'
          type: speech
          duration_sec: 12
          text:
            ru: 'Зачем это разведчику? Если ты чувствуешь, что собеседнику обидно
              или страшно — ты не будешь давить. Подождёшь, спросишь мягче, дашь время.
              Сопереживание — антенна разведчика.

              '
            uk: Зачем это разведчику? Если ты чувствуешь, что собеседнику обидно или
              страшно — ты не будешь давить. Подождёшь, спросишь мягче, дашь время.
              Сопереживание — антенна разведчика.
            en: Why does a scout need this? If you feel that your interlocutor is
              offended or scared, you will not put pressure. Wait, ask softly, give
              time. Empathy is a scout's antenna.
        - id: '9'
          type: speech
          duration_sec: 5
          text:
            ru: 'Инструмент второй — АКТИВНОЕ СЛУШАНИЕ.

              '
            uk: Інструмент другий — АКТИВНЕ СЛУХАННЯ.
            en: Tool number two—ACTIVE LISTENING.
        - id: '10'
          type: speech
          duration_sec: 15
          text:
            ru: 'Активное слушание — это не просто молчать, пока другой говорит. Это
              слушать так, чтобы человек видел: ты правда слышишь. Переспрашивать:
              «Правильно ли я понял, что…?» Разведчик не просто собирает информацию
              — он показывает: мне важно то, что ты говоришь.

              '
            uk: 'Активное слушание — это не просто молчать, пока другой говорит. Это
              слушать так, чтобы человек видел: ты правда слышишь. Переспрашивать:
              «Правильно ли я понял, что…?» Разведчик не просто собирает информацию
              — он показывает: мне важно то, что ты говоришь.'
            en: 'Active listening is not just staying silent while someone else is
              talking. This is listening so that a person sees: you really hear. Ask
              again: “Did I understand correctly that...?” The scout does not just
              collect information - he shows: what you say is important to me.'
        - id: '11'
          type: speech
          duration_sec: 5
          text:
            ru: 'Инструмент третий — ФОРМУЛА ВЫСКАЗЫВАНИЯ.

              '
            uk: Інструмент третій — ФОРМУЛА ВИСЛОВЛЮВАННЯ.
            en: Tool number three—THE SPEAKING FORMULA.
        - id: '12'
          type: speech
          duration_sec: 12
          text:
            ru: 'Формула высказывания — это умение говорить про себя, а не нападать
              на другого. Вместо «Ты неправ!» — «Я думаю иначе, и вот почему». Разведчик
              никогда не стреляет первым — он объясняет свою карту, а не рвёт чужую.

              '
            uk: Формула высказывания — это умение говорить про себя, а не нападать
              на другого. Вместо «Ты неправ!» — «Я думаю иначе, и вот почему». Разведчик
              никогда не стреляет первым — он объясняет свою карту, а не рвёт чужую.
            en: The formula of speaking is the ability to speak to oneself and not
              attack another. Instead of "You're wrong!" - “I think differently, and
              here’s why.” The scout never shoots first - he explains his map, and
              does not tear someone else's.
        - id: '13'
          type: speech
          duration_sec: 18
          text:
            ru: 'Итак: сопереживание — чтобы понять настроение. Активное слушание
              — чтобы человек видел, что его слышат. Формула высказывания — чтобы
              сказать своё, не обижая. Три инструмента. Разберём каждый подробно!

              '
            uk: 'Итак: сопереживание — чтобы понять настроение. Активное слушание
              — чтобы человек видел, что его слышат. Формула высказывания — чтобы
              сказать своё, не обижая. Три инструмента. Разберём каждый подробно!'
            en: 'So: empathy - to understand the mood. Active listening - so that
              a person sees that he is being heard. The formula of the statement is
              to say your own without offending. Three tools. Let''s look at each
              in detail!'
        - id: '14'
          type: speech
          duration_sec: 7
          text:
            ru: 'Начинаем с первого — эмпатия, или по-простому — сопереживание!

              '
            uk: Начинаем с первого — эмпатия, или по-простому — сопереживание!
            en: Let's start with the first one - empathy, or in simple terms - empathy!
    - scene_id: sc2
      title:
        ru: Эмпатия
        uk: Эмпатия
        en: Empathy
      media_ref: 3B.sc2.empathy
      status: v3_locked
      steps:
        - id: '15'
          type: speech
          duration_sec: 12
          text:
            ru: 'Мы сказали: эмпатия — это умение заглянуть в чужую душу. Но как это
              работает в споре?

              '
            uk: 'Мы сказали: эмпатия — это умение заглянуть в чужую душу. Но как это
              работает в споре?'
            en: 'We said: empathy is the ability to look into someone else''s soul.
              But how does this work in an argument?'
        - id: '16'
          type: speech
          duration_sec: 10
          text:
            ru: 'Представьте: Микола нарисовал картинку. Старался целый час. А Дмитрик
              посмотрел и сказал: «Некрасиво!»

              '
            uk: 'Представьте: Микола нарисовал картинку. Старался целый час. А Дмитрик
              посмотрел и сказал: «Некрасиво!»'
            en: 'Imagine: Mikola drew a picture. I tried for an hour. And Dmitrik
              looked and said: “Ugly!”'
        - id: '17'
          type: speech
          duration_sec: 6
          text:
            ru: 'Что Микола почувствовал? Обидно, правда?

              '
            uk: Что Микола почувствовал? Обидно, правда?
            en: How did Mikola feel? It's a shame, isn't it?
        - id: '18'
          type: speech
          duration_sec: 12
          text:
            ru: 'А теперь вопрос: если бы Дмитрик на секунду представил себя на месте
              Миколы — час рисовал, старался, волновался — он бы сказал «Некрасиво»?

              '
            uk: 'А теперь вопрос: если бы Дмитрик на секунду представил себя на месте
              Миколы — час рисовал, старался, волновался — он бы сказал «Некрасиво»?'
            en: 'And now the question: if Dmitrik had imagined himself for a second
              in Mikola’s place—he spent an hour drawing, trying, worrying—would he
              say “Ugly”?'
        - id: '19'
          type: speech
          duration_sec: 10
          text:
            ru: 'Скорее всего нет. Может, сказал бы: «Интересный рисунок, а что тут
              нарисовано?»

              '
            uk: 'Скорее всего нет. Может, сказал бы: «Интересный рисунок, а что тут
              нарисовано?»'
            en: 'Most likely not. Maybe he would say: “An interesting drawing, but
              what is drawn here?”'
        - id: '20'
          type: speech
          duration_sec: 10
          text:
            ru: 'Вот что делает сопереживание — оно как тормоз, который срабатывает
              ДО того, как ты скажешь обидное.

              '
            uk: Вот что делает сопереживание — оно как тормоз, который срабатывает
              ДО того, как ты скажешь обидное.
            en: That's what empathy does - it's like a brake that kicks in BEFORE
              you say something offensive.
        - id: '21'
          type: speech
          duration_sec: 8
          text:
            ru: 'Сопереживание в споре — это ТОРМОЗ. Сначала почувствуй, потом говори.

              '
            uk: Сопереживание в споре — это ТОРМОЗ. Сначала почувствуй, потом говори.
            en: Empathy in a dispute is a BRAKE. Feel first, speak later.
        - id: '22'
          type: speech
          duration_sec: 10
          text:
            ru: 'Давайте разберём ещё пример. Маша и Дмитрик спорят, какой мультик
              смотреть. Маша хочет про принцесс, Дмитрик — про роботов.

              '
            uk: Давайте разберём ещё пример. Маша и Дмитрик спорят, какой мультик
              смотреть. Маша хочет про принцесс, Дмитрик — про роботов.
            en: Let's look at another example. Masha and Dmitrik are arguing about
              which cartoon to watch. Masha wants to talk about princesses, Dmitrik
              wants to talk about robots.
        - id: '23'
          type: speech
          duration_sec: 10
          text:
            ru: 'Дмитрик говорит: «Твои принцессы — это скукота! Только маленькие
              такое смотрят!» Что тут произошло?

              '
            uk: 'Дмитрик говорит: «Твои принцессы — это скукота! Только маленькие
              такое смотрят!» Что тут произошло?'
            en: 'Dmitry says: “Your princesses are boring! Only little ones watch
              this!” What happened here?'
        - id: '24'
          type: speech
          duration_sec: 10
          text:
            ru: 'Дмитрик не включил тормоз. Не подумал: Маше важен этот мультик, она
              его любит. Он сразу наехал.

              '
            uk: 'Дмитрик не включил тормоз. Не подумал: Маше важен этот мультик, она
              его любит. Он сразу наехал.'
            en: 'Dmitry did not apply the brake. I didn’t think: this cartoon is important
              to Masha, she loves it. He drove straight away.'
        - id: '25'
          type: speech
          duration_sec: 10
          text:
            ru: 'А теперь представим: Дмитрик включил сопереживание. Он подумал: «Маша
              любит принцесс так же, как я люблю роботов.»

              '
            uk: 'А теперь представим: Дмитрик включил сопереживание. Он подумал: «Маша
              любит принцесс так же, как я люблю роботов.»'
            en: 'Now imagine: Dmitry turned on empathy. He thought: “Masha loves princesses
              just like I love robots.”'
        - id: '26'
          type: speech
          duration_sec: 12
          text:
            ru: 'И сказал: «Я понимаю, что тебе нравятся принцессы. Мне нравятся роботы.
              Давай посмотрим оба — подбросим монетку, какой первый?»

              '
            uk: 'И сказал: «Я понимаю, что тебе нравятся принцессы. Мне нравятся роботы.
              Давай посмотрим оба — подбросим монетку, какой первый?»'
            en: 'And he said: “I understand that you like princesses. I like robots.
              Let''s see both - toss a coin, which one comes first?'
        - id: '27'
          type: speech
          duration_sec: 12
          text:
            ru: 'Видите разницу? Оба хотели посмотреть мультик. Но первый Дмитрик
              обидел, а второй — понял и предложил решение. Один — солдат, другой
              — разведчик.

              '
            uk: Видите разницу? Оба хотели посмотреть мультик. Но первый Дмитрик обидел,
              а второй — понял и предложил решение. Один — солдат, другой — разведчик.
            en: Do you see the difference? Both wanted to watch a cartoon. But the
              first Dmitry offended, and the second understood and offered a solution.
              One is a soldier, the other is a scout.
        - id: '28'
          type: speech
          duration_sec: 8
          text:
            ru: 'А вот ещё ситуация. Микола опоздал на тренировку. Тренер начал без
              него. Миколе обидно.

              '
            uk: А вот ещё ситуация. Микола опоздал на тренировку. Тренер начал без
              него. Миколе обидно.
            en: Here's another situation. Mikola was late for training. The coach
              started without him. Mikola is offended.
        - id: '29'
          type: speech
          duration_sec: 8
          text:
            ru: 'Маша подходит и говорит: «Ну и что, сам виноват — надо было раньше
              выходить!»

              '
            uk: 'Маша подходит и говорит: «Ну и что, сам виноват — надо было раньше
              выходить!»'
            en: 'Masha comes up and says: “So what, it’s my own fault - I should have
              left earlier!”'
        - id: '30'
          type: speech
          duration_sec: 12
          text:
            ru: 'Маша сказала правду? Может быть. Но она не включила сопереживание.
              Не заметила, что Микола расстроен. Правда без сопереживания звучит как
              удар.

              '
            uk: Маша сказала правду? Может быть. Но она не включила сопереживание.
              Не заметила, что Микола расстроен. Правда без сопереживания звучит как
              удар.
            en: Did Masha tell the truth? May be. But she didn't include empathy.
              I didn’t notice that Mikola was upset. Truth without empathy sounds
              like a blow.
        - id: '31'
          type: speech
          duration_sec: 12
          text:
            ru: 'А если бы Маша включила тормоз? Она бы сказала: «Я вижу, что тебе
              обидно. Это неприятно — опоздать. Давай я расскажу, что мы делали, чтобы
              ты догнал.»

              '
            uk: 'А если бы Маша включила тормоз? Она бы сказала: «Я вижу, что тебе
              обидно. Это неприятно — опоздать. Давай я расскажу, что мы делали, чтобы
              ты догнал.»'
            en: 'What if Masha had turned on the brake? She would say: “I see that
              you are offended. It''s unpleasant to be late. Let me tell you what
              we did so you can catch up.”'
        - id: '32'
          type: speech
          duration_sec: 10
          text:
            ru: 'Та же ситуация — но человеку не больно, а наоборот, хочется продолжать.
              Вот что делает сопереживание.

              '
            uk: Та же ситуация — но человеку не больно, а наоборот, хочется продолжать.
              Вот что делает сопереживание.
            en: The same situation - but the person is not in pain, but on the contrary,
              he wants to continue. That's what empathy does.
        - id: '33'
          type: speech
          duration_sec: 8
          text:
            ru: 'Запомните три фразы-помощника. Это слова, с которых начинает разведчик,
              когда чувствует: собеседнику непросто.

              '
            uk: 'Запомните три фразы-помощника. Это слова, с которых начинает разведчик,
              когда чувствует: собеседнику непросто.'
            en: 'Remember three helpful phrases. These are the words with which a
              scout begins when he feels that things are not easy for his interlocutor.'
        - id: '34'
          type: speech
          duration_sec: 10
          text:
            ru: 'Первая: «Я понимаю, что тебе…» — ты показываешь: я заглянул в твою
              душу, я вижу, что тебе непросто.

              '
            uk: 'Первая: «Я понимаю, что тебе…» — ты показываешь: я заглянул в твою
              душу, я вижу, что тебе непросто.'
            en: 'The first: “I understand that you…” - you show: I looked into your
              soul, I see that it’s not easy for you.'
        - id: '35'
          type: speech
          duration_sec: 10
          text:
            ru: 'Вторая: «Тебе, наверное, обидно, когда…» — ты угадываешь чувство.
              Даже если не угадал — человек видит, что ты стараешься понять.

              '
