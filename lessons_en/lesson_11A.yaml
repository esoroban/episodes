source_lesson_id: lesson_11A
language: en
title: How to Properly Object
day: 11
slot: A
scenes:
- scene_id: sc1
  title: 'WARM-UP: MIXED TRICKS FROM THE COURSE'
  steps:
  - step_id: sc1_1
    source_step_id: '1'
    scene_id: sc1
    step_type: instruction
    prompt: Lesson eleven! Today's warm-up is special - we mixed up tricks from all the different lessons. No hints - you
      figure out which technique is being used. Let's go!
  - step_id: sc1_2
    source_step_id: '2'
    scene_id: sc1
    step_type: single_choice
    prompt: '"A famous hockey player says in an advertisement: ''This math textbook is the best!''"'
    options:
    - id: opt_1
      text: A real expert
    - id: opt_2
      text: False authority
    options_count: 2
    correct_answer: opt_2
    explanation: False authority! The hockey player is great at scoring goals, but when it comes to equations, let's say he
      has different interests. Math textbooks should be judged by math teachers.
    explanation_status: implicit
  - step_id: sc1_4
    source_step_id: '4'
    scene_id: sc1
    step_type: single_choice
    prompt: '"Either you come to my birthday party, or you''re not my friend at all!"'
    options:
    - id: opt_1
      text: False dilemma
    - id: opt_2
      text: Real choice
    options_count: 2
    correct_answer: opt_1
    explanation: False dilemma! You can be the best friend in the world and still not come - you got sick, had to travel,
      the cat got stuck in a tree. Two options doesn't mean there are no others.
    explanation_status: implicit
  - step_id: sc1_6
    source_step_id: '6'
    scene_id: sc1
    step_type: single_choice
    prompt: '"You wear glasses - that means you don''t understand anything about sports!"'
    options:
    - id: opt_1
      text: Attack on the person
    - id: opt_2
      text: Normal objection
    options_count: 2
    correct_answer: opt_1
    explanation: Attack on the person! Glasses are about eyesight, not sports knowledge. You can wear glasses and understand
      sports better than anyone in the class.
    explanation_status: implicit
  - step_id: sc1_8
    source_step_id: '8'
    scene_id: sc1
    step_type: single_choice
    prompt: '"Have you stopped copying from your neighbor yet?"'
    options:
    - id: opt_1
      text: Loaded question
    - id: opt_2
      text: Normal question
    options_count: 2
    correct_answer: opt_1
    explanation: 'Loaded question! No matter what you answer - ''yes'' or ''no'' - it sounds like you were copying. The trap
      is built right into the question. The right answer: ''I never even started!'''
    explanation_status: present
  - step_id: sc1_10
    source_step_id: '10'
    scene_id: sc1
    step_type: single_choice
    prompt: '"I never eat candy!" says Katya, finishing a chocolate bar.'
    options:
    - id: opt_1
      text: There's a contradiction
    - id: opt_2
      text: No contradiction
    options_count: 2
    correct_answer: opt_1
    explanation: Contradiction! Words say one thing, but the chocolate in her hand says something totally different. When
      words don't match actions - that's a classic contradiction.
    explanation_status: implicit
  - step_id: sc1_12
    source_step_id: '12'
    scene_id: sc1
    step_type: theory
    prompt: Halfway there! Let's keep going - the examples are about to get trickier.
  - step_id: sc1_13
    source_step_id: '13'
    scene_id: sc1
    step_type: single_choice
    prompt: '"A veterinarian says: ''Dogs need to walk at least twice a day.''"'
    options:
    - id: opt_1
      text: A real expert
    - id: opt_2
      text: False authority
    options_count: 2
    correct_answer: opt_1
    explanation: A real expert! A veterinarian is a specialist in animals - it's their job. You can trust them about dogs.
      Not every authority is false!
    explanation_status: implicit
  - step_id: sc1_15
    source_step_id: '15'
    scene_id: sc1
    step_type: single_choice
    prompt: '"Why don''t you like reading books?"'
    options:
    - id: opt_1
      text: Loaded question
    - id: opt_2
      text: Normal question
    options_count: 2
    correct_answer: opt_1
    explanation: Loaded question! They've already decided for you that you don't like reading. But maybe you read three books
      a week! A question with a trap inside.
    explanation_status: implicit
  - step_id: sc1_17
    source_step_id: '17'
    scene_id: sc1
    step_type: single_choice
    prompt: '"Don''t eat your soup - you''ll get sick and end up in the hospital forever!"'
    options:
    - id: opt_1
      text: Real warning
    - id: opt_2
      text: Scaremongering
    options_count: 2
    correct_answer: opt_2
    explanation: Scaremongering! One bowl of soup won't determine all of human medical history. Soup is healthy, but 'hospital
      forever' - that's a scary chain of consequences.
    explanation_status: implicit
  - step_id: sc1_19
    source_step_id: '19'
    scene_id: sc1
    step_type: single_choice
    prompt: '"Either we take an umbrella or we get soaked - there''s a downpour outside."'
    options:
    - id: opt_1
      text: False dilemma
    - id: opt_2
      text: Real choice
    options_count: 2
    correct_answer: opt_2
    explanation: 'Real choice! There''s a downpour outside - there really are just two options: umbrella or wet head. There''s
      no third option, unless you stay home.'
    explanation_status: implicit
  - step_id: sc1_21
    source_step_id: '21'
    scene_id: sc1
    step_type: single_choice
    prompt: '"You were late to class yesterday - that means everything you say today is a lie!"'
    options:
    - id: opt_1
      text: Attack on the person
    - id: opt_2
      text: Normal objection
    options_count: 2
    correct_answer: opt_1
    explanation: Attack on the person! Being late is about punctuality, not truthfulness. You can be late and say the smartest
      thing in class. One has nothing to do with the other.
    explanation_status: implicit
  - step_id: sc1_23
    source_step_id: '23'
    scene_id: sc1
    step_type: theory
    prompt: Great warm-up - you remember lots of tricks from the past lessons! And today we're adding a new powerful skill
      - how to properly object.
- scene_id: sc2
  title: DISCOVERY - RETURNING TO THE ART OF DISAGREEMENT
  steps:
  - step_id: sc2_24
    source_step_id: '24'
    scene_id: sc2
    step_type: theory
    prompt: Remember lesson three - the soldier and the scout? We learned how to listen, understand, and use the formula for
      speaking. All that is the foundation. Today we're building a new floor!
  - step_id: sc2_25
    source_step_id: '25'
    scene_id: sc2
    step_type: open_question
    prompt: 'A friend says: ''Dogs are better than cats - they''re friendlier.'' You love cats and strongly disagree. How
      will you respond?'
    teacher_guidance: How will you respond?
  - step_id: sc2_26
    source_step_id: '26'
    scene_id: sc2
    step_type: theory
    prompt: 'Someone definitely thought: ''Are you crazy? Cats are a hundred times better!'' Stop. That''s an attack in response
      to an attack - an endless cycle. But we can do it differently.'
  - step_id: sc2_27
    source_step_id: '27'
    scene_id: sc2
    step_type: theory
    prompt: '"I understand that you like dogs. But my cat purrs when I come home - I think that''s friendliness too." Calm,
      with a reason, no insults. That''s an objection!'
  - step_id: sc2_28
    source_step_id: '28'
    scene_id: sc2
    step_type: instruction
    prompt: Now I'll show you attacks - and you pick the better of two responses. One is rude, one is cool. Let's go!
  - step_id: sc2_29
    source_step_id: '29'
    scene_id: sc2
    step_type: theory
    prompt: 'Max tells everyone he takes violin lessons and loves classical music. A classmate snorts: ''Classical? That''s
      old people''s music!'''
  - step_id: sc2_30
    source_step_id: '30'
    scene_id: sc2
    step_type: single_choice
    prompt: What will Max say?
    options:
    - id: opt_1
      text: You're the old one! Rock isn't even real music!
    - id: opt_2
      text: I like classical music - beautiful melodies and complex instruments.
    options_count: 2
    correct_answer: opt_2
    explanation: 'Second! Calm and with a reason - beautiful melodies. First is a mirror attack: insulting back instead of
      discussing music.'
    explanation_status: implicit
  - step_id: sc2_32
    source_step_id: '32'
    scene_id: sc2
    step_type: theory
    prompt: 'Lena quietly admits to her friends that sometimes she''s afraid of the dark and sleeps with a nightlight. Someone
      immediately laughs: ''Afraid of the dark? Are you a baby?'''
  - step_id: sc2_33
    source_step_id: '33'
    scene_id: sc2
    step_type: single_choice
    prompt: What will Lena say?
    options:
    - id: opt_1
      text: Lots of people don't like the dark - it's normal. I sleep with a nightlight and it's fine.
    - id: opt_2
      text: And you're afraid of spiders, so just be quiet!
    options_count: 2
    correct_answer: opt_1
    explanation: First! She admitted calmly and wasn't embarrassed - strong position. Second is a counter-attack 'you're afraid
      too.' Two attacks in a row equals zero conversation.
    explanation_status: implicit
  - step_id: sc2_35
    source_step_id: '35'
    scene_id: sc2
    step_type: theory
    prompt: 'Vika excitedly tells everyone about a new movie - she really loved it. Someone makes a face: ''You liked that?
      You have terrible taste!'''
  - step_id: sc2_36
    source_step_id: '36'
    scene_id: sc2
    step_type: single_choice
    prompt: What will Vika say?
    options:
    - id: opt_1
      text: You have terrible taste!
    - id: opt_2
      text: I liked the plot and special effects - I think the movie is worth watching.
    options_count: 2
    correct_answer: opt_2
    explanation: 'Second! Specific details - plot and special effects. First is a parrot: just repeating the same insult back.
      That kind of ''argument'' wouldn''t help even a parrot.'
    explanation_status: implicit
  - step_id: sc2_38
    source_step_id: '38'
    scene_id: sc2
    step_type: theory
    prompt: 'Artem plays chess and just won the school tournament. A classmate snorts: ''Chess? That''s not even a real sport!'''
  - step_id: sc2_39
    source_step_id: '39'
    scene_id: sc2
    step_type: single_choice
    prompt: What will Artem say?
    options:
    - id: opt_1
      text: Chess requires endurance - games last for hours, your brain gets as tired as your legs.
    - id: opt_2
      text: And football is just running after a ball - some sport that is!
    options_count: 2
    correct_answer: opt_1
    explanation: First! Facts - games last hours, brains get tired. Second put down football in response. Insulting someone
      else's hobby isn't defending yours.
    explanation_status: implicit
  - step_id: sc2_41
    source_step_id: '41'
    scene_id: sc2
    step_type: theory
    prompt: 'Dasha explains that she doesn''t eat meat - she prefers vegetables and beans. Someone says in surprise: ''You
      don''t eat meat? That''s dumb and harmful!'''
  - step_id: sc2_42
    source_step_id: '42'
    scene_id: sc2
    step_type: single_choice
    prompt: What will Dasha say?
    options:
    - id: opt_1
      text: You're dumb! Meat-eaters don't think at all!
    - id: opt_2
      text: I get protein from beans and nuts - it tastes better to me.
    options_count: 2
    correct_answer: opt_2
    explanation: Second! She explained her choice - beans and nuts. First is name-calling and accusations. After that, nobody
      wants to keep talking.
    explanation_status: implicit
  - step_id: sc2_44
    source_step_id: '44'
    scene_id: sc2
    step_type: theory
    prompt: 'Kostya shows his friends a city he built in Minecraft. Someone smirks: ''Minecraft? That''s a game for little
      kids!'''
  - step_id: sc2_45
    source_step_id: '45'
    scene_id: sc2
    step_type: single_choice
    prompt: What will Kostya say?
    options:
    - id: opt_1
      text: In Minecraft you build complex mechanisms with redstone - it develops logic skills.
    - id: opt_2
      text: And you play shooters - for people too lazy to think!
    options_count: 2
    correct_answer: opt_1
    explanation: First! Specific facts - redstone and logic. Second insulted someone else's game. Defending your hobby by
      putting down theirs isn't an argument.
    explanation_status: implicit
  - step_id: sc2_47
    source_step_id: '47'
    scene_id: sc2
    step_type: theory
    prompt: 'Anya says she does homework right after school so her evening is free. Someone mutters: ''Right after school?
      What a bookworm!'''
  - step_id: sc2_48
    source_step_id: '48'
    scene_id: sc2
    step_type: single_choice
    prompt: What will Anya say?
    options:
    - id: opt_1
      text: And you don't do homework at all, that's why you have bad grades!
    - id: opt_2
      text: I like getting it done right away so I can relax in the evening.
    options_count: 2
    correct_answer: opt_2
    explanation: Second! She explained the benefit - free evening. First is a dig about bad grades. Even if it's true - that's
      an attack, not an argument.
    explanation_status: implicit
  - step_id: sc2_50
    source_step_id: '50'
    scene_id: sc2
    step_type: theory
    prompt: 'Misha proudly shows a photo of his hamster Shustrik - he loves him so much. Someone laughs: ''A hamster? That''s
      not a pet, that''s just a mouse in a wheel!'''
  - step_id: sc2_51
    source_step_id: '51'
    scene_id: sc2
    step_type: single_choice
    prompt: What will Misha say?
    options:
    - id: opt_1
      text: Hamsters are fun to watch. Every pet has its good points.
    - id: opt_2
      text: And your dog just barks and smells - some pet that is!
    options_count: 2
    correct_answer: opt_1
    explanation: First! He praised his own pet and respected the other choice. Second insulted both the dog and its owner.
      A cool response explains instead of attacking.
    explanation_status: implicit
  - step_id: sc2_53
    source_step_id: '53'
    scene_id: sc2
    step_type: theory
    prompt: You're already feeling the difference! A rude response is a mirror of the attack. A cool one is an explanation
      with a reason. Today we're giving this an exact structure.
- scene_id: sc3
  title: STORY - SASHA LEARNS TO OBJECT
  steps:
  - step_id: sc3_54
    source_step_id: '54'
    scene_id: sc3
    step_type: theory
    prompt: Now comes a story. A real one, from a classroom. The main characters are Dmitrik, Sasha, Vitya, and Olenka. Remember
      who says what - I'll ask you later!
  - step_id: sc3_55
    source_step_id: '55'
    scene_id: sc3
    step_type: theory
    prompt: 'At break time, Dmitrik announces: ''Football is the best sport on the planet! Whoever disagrees just doesn''t
      know how to play.'' He said it loudly, for the whole hallway to hear.'
  - step_id: sc3_56
    source_step_id: '56'
    scene_id: sc3
    step_type: theory
    prompt: 'Sasha loves basketball. When he heard Dmitrik, he exploded: ''You''re an idiot! Football is just running after
      a ball! Basketball is a hundred times cooler!'''
  - step_id: sc3_57
    source_step_id: '57'
    scene_id: sc3
    step_type: theory
    prompt: 'Dmitrik turned red. Vitya turned red. Olenka covered her face with her hand. A crowd gathered - everyone waiting
      to see what happens next. Spoiler: nothing good.'
  - step_id: sc3_58
    source_step_id: '58'
    scene_id: sc3
    step_type: theory
    prompt: 'Dmitrik replied: ''You''re the idiot! Basketball doesn''t even have real rules!'' Sasha: ''It does! You''re just
      stupid!'' Vitya quietly said: ''Guys...'' Nobody heard him.'
  - step_id: sc3_59
    source_step_id: '59'
    scene_id: sc3
    step_type: theory
    prompt: 'Olenka couldn''t stand it anymore. She stood between them and said: ''Stop. Sasha, you just attacked Dmitrik,
      not his argument. "You''re an idiot" - that''s not an objection.'''
  - step_id: sc3_60
    source_step_id: '60'
    scene_id: sc3
    step_type: theory
    prompt: 'Sasha was surprised: ''But can''t I say he''s wrong?'' Olenka: ''You can! But not like that. Step one - listen.
      Dmitrik said football is the best. Did you listen? No, you just yelled right away.'''
  - step_id: sc3_61
    source_step_id: '61'
    scene_id: sc3
    step_type: theory
    prompt: '"Step two - show you understand. Say: ''I understand that you like football.'' Step three - give your opinion
      with a reason: ''But I think basketball is cool too, because it requires precise shooting.''"'
  - step_id: sc3_62
    source_step_id: '62'
    scene_id: sc3
    step_type: theory
    prompt: 'Sasha tried: ''Dmitrik, I understand that you like football. But I think basketball is cool too, because... um...
      because the ball is orange?'' Everyone laughed.'
  - step_id: sc3_63
    source_step_id: '63'
    scene_id: sc3
    step_type: theory
    prompt: 'Olenka smiled: ''Almost! "The ball is orange" - that''s not really a reason. Try again.'' Sasha thought and said:
      ''...because it requires precision, speed, and teamwork.'''
  - step_id: sc3_64
    source_step_id: '64'
    scene_id: sc3
    step_type: theory
    prompt: 'Dmitrik nodded: ''Okay, basketball does have some cool things. But in football the team is bigger!'' Vitya: ''Now
      that''s a conversation, not yelling!'' Olenka added: ''See? Nobody insulted anybody - and they''re still friends.'''
  - step_id: sc3_65
    source_step_id: '65'
    scene_id: sc3
    step_type: single_choice
    prompt: What was Sasha's main mistake at the start?
    options:
    - id: opt_1
      text: He spoke too quietly
    - id: opt_2
      text: He attacked Dmitrik, not his argument
    - id: opt_3
      text: He didn't know the rules of football
    options_count: 3
    correct_answer: opt_2
    explanation: 'He attacked the person! ''You''re an idiot'' - that''s not about football or basketball. That''s a blow
      to Dmitrik. But Olenka showed: you can disagree without insulting.'
    explanation_status: implicit
- scene_id: sc4
  title: WHAT IS AN OBJECTION
  steps:
  - step_id: sc4_67
    source_step_id: '67'
    scene_id: sc4
    step_type: theory
    prompt: So Olenka showed Sasha the right way. Let's understand what exactly she did - and remember it as a formula. What
      is an objection?
  - step_id: sc4_68
    source_step_id: '68'
    scene_id: sc4
    step_type: theory
    prompt: An objection is a reasoned response to someone's argument. Not just 'no!' but 'no, and here's why...' One word
      changes everything - 'because.'
  - step_id: sc4_69
    source_step_id: '69'
    scene_id: sc4
    step_type: theory
    prompt: 'Important rule: listen all the way first, then respond! If you interrupt - you don''t understand what they wanted
      to say. If you don''t listen fully - you''re objecting to the wrong thing.'
  - step_id: sc4_70
    source_step_id: '70'
    scene_id: sc4
    step_type: theory
    prompt: 'The structure of an objection has four steps. First: ''You''re saying that...'' - repeat their idea. That shows
      they heard you, not that you ignored them.'
  - step_id: sc4_71
    source_step_id: '71'
    scene_id: sc4
    step_type: theory
    prompt: 'Second: ''I understand your idea.'' - show respect. Third: ''But I think that...'' - give your opinion. Fourth:
      ''...because...'' - give a reason.'
  - step_id: sc4_72
    source_step_id: '72'
    scene_id: sc4
    step_type: theory
    prompt: 'Example. A friend says: ''You should do homework right after school.'' Objection: ''You''re saying it''s better
      to do it right away. I understand - you don''t want to put it off. But I think you need a break first, because a tired
      person learns worse.'''
  - step_id: sc4_73
    source_step_id: '73'
    scene_id: sc4
    step_type: single_choice
    prompt: How many steps are in the structure of an objection?
    options:
    - id: opt_1
      text: Two
    - id: opt_2
      text: Three
    - id: opt_3
      text: Four
    options_count: 3
    correct_answer: opt_3
    explanation: Four! Repeat their idea, show respect, give your opinion, provide a reason. Four steps - and you're objecting
      like a professional.
    explanation_status: implicit
- scene_id: sc5
  title: PRACTICE - OBJECTION OR ATTACK? (Round 1)
  steps:
  - step_id: sc5_75
    source_step_id: '75'
    scene_id: sc5
    step_type: instruction
    prompt: 'Time to practice! I''ll say a phrase - and you decide: is that a proper objection or an attack on the person?'
  - step_id: sc5_76
    source_step_id: '76'
    scene_id: sc5
    step_type: single_choice
    prompt: '"You''re wrong - your idea won''t work in the rain."'
    options:
    - id: opt_1
      text: Proper objection
    - id: opt_2
      text: Attack on the person
    options_count: 2
    correct_answer: opt_1
    explanation: Objection! There's a specific reason - 'won't work in the rain.' Criticizing the idea, not the person. Maybe
      a bit rough, but on point.
    explanation_status: implicit
  - step_id: sc5_78
    source_step_id: '78'
    scene_id: sc5
    step_type: single_choice
    prompt: '"Only stupid people think that!"'
    options:
    - id: opt_1
      text: Proper objection
    - id: opt_2
      text: Attack on the person
    options_count: 2
    correct_answer: opt_2
    explanation: Attack! An insult with no reason at all. 'Stupid' is about people, not the idea. Zero arguments, 100% insult.
    explanation_status: implicit
  - step_id: sc5_80
    source_step_id: '80'
    scene_id: sc5
    step_type: single_choice
    prompt: '"I understand that you like that, but I think there''s a better option."'
    options:
    - id: opt_1
      text: Proper objection
    - id: opt_2
      text: Attack on the person
    options_count: 2
    correct_answer: opt_1
    explanation: Objection! Polite and respectful. 'I understand' - shows you listened. 'I think' - softly presents your view.
      A textbook in politeness!
    explanation_status: implicit
  - step_id: sc5_82
    source_step_id: '82'
    scene_id: sc5
    step_type: single_choice
    prompt: '"You don''t understand anything about this!"'
    options:
    - id: opt_1
      text: Proper objection
    - id: opt_2
      text: Attack on the person
    options_count: 2
    correct_answer: opt_2
    explanation: Attack! An insult to their understanding. Instead of 'here's why the rule is different' - just 'you don't
      understand.' No argument appeared, but plenty of hurt feelings.
    explanation_status: implicit
  - step_id: sc5_84
    source_step_id: '84'
    scene_id: sc5
    step_type: single_choice
    prompt: '"You''re saying cats are lazy. But my cat runs around the apartment every morning!"'
    options:
    - id: opt_1
      text: Proper objection
    - id: opt_2
      text: Attack on the person
    options_count: 2
    correct_answer: opt_1
    explanation: Objection! A counterexample - powerful weapon. 'My cat is active' disproves the claim with facts. Didn't
      insult anyone, but proved the point.
    explanation_status: implicit
- scene_id: sc6
  title: OBJECTION VS ATTACK - COMPARISON
  steps:
  - step_id: sc6_86
    source_step_id: '86'
    scene_id: sc6
    step_type: theory
    prompt: 'Let''s lock in the difference once and for all. Objection - you criticize the argument, explain why, tone is
      polite. Example: ''Your idea won''t work because...'''
  - step_id: sc6_87
    source_step_id: '87'
    scene_id: sc6
    step_type: theory
    prompt: 'Attack - you criticize the person, just insult them, tone is rude. Examples: ''You''re an idiot!'' ''I can''t
