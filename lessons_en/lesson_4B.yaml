    explanation_status: implicit
  - step_id: sc8_157
    source_step_id: '157'
    scene_id: sc8
    step_type: theory
    prompt: Did you notice? Each time the winner was the one who used all three methods. It’s the same in life - do you want
      to convince your parents, friends, teachers? Don't whine - just cook three legs!
