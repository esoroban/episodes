    explanation_status: implicit
- scene_id: sc7
  title: Create your own advertisement
  steps:
  - step_id: sc7_123
    source_step_id: '123'
    scene_id: sc7
    step_type: theory
    prompt: 'You have learned to catch other people''s tricks. And now - the most interesting part. Let''s try to formulate
      a conviction ourselves! Task: in one phrase - all three methods.'
  - step_id: sc7_124
    source_step_id: '124'
    scene_id: sc7
    step_type: theory
    prompt: Example. You need to convince your mom to buy ice cream. How? “Mom, I did my homework all day (trust – I earned
      it), ice cream lifts my spirits (feelings), and it contains calcium for bones (proof)!”
  - step_id: sc7_125
    source_step_id: '125'
    scene_id: sc7
    step_type: theory
    prompt: Three legs! Mom is impressed. Although... calcium in ice cream is a controversial argument. But the design itself
      is perfect.
  - step_id: sc7_126
    source_step_id: '126'
    scene_id: sc7
    step_type: theory
    prompt: 'Now let''s test your scout''s eye. Each phrase has two ways, and the third is missing. Your task is to determine:
      what is missing?'
  - step_id: sc7_127
    source_step_id: '127'
    scene_id: sc7
    step_type: single_choice
    prompt: “This phone costs 5,000 hryvnia and has a 50 megapixel camera. All bloggers use it.” What's missing?
    options:
    - id: opt_1
      text: Trust
    - id: opt_2
      text: Feelings
    - id: opt_3
      text: Evidence
    options_count: 3
    correct_answer: opt_2
    explanation: Not enough feelings! There is trust (bloggers) and evidence (price, megapixels). But there are zero emotions.
      Add “capture moments you’ll remember forever!” - and the stool will rise.
    explanation_status: implicit
  - step_id: sc7_129
    source_step_id: '129'
    scene_id: sc7
    step_type: single_choice
    prompt: “My trainer said these shoes are the best. They are so comfortable - your feet are like in the clouds!” What's
      missing?
    options:
    - id: opt_1
      text: Trust
    - id: opt_2
      text: Feelings
    - id: opt_3
      text: Evidence
    options_count: 3
    correct_answer: opt_3
    explanation: Not enough evidence! There is trust (coach) and feelings (“like in the clouds”). But how much do they weigh?
      What kind of sole? Add “30% more cushioning” and the kit is complete.
    explanation_status: implicit
  - step_id: sc7_131
    source_step_id: '131'
    scene_id: sc7
    step_type: single_choice
    prompt: “Studies have shown that this juice contains 60% of your daily value of vitamin C. Feel energized!” What's missing?
    options:
    - id: opt_1
      text: Trust
    - id: opt_2
      text: Feelings
    - id: opt_3
      text: Evidence
    options_count: 3
    correct_answer: opt_1
    explanation: Lack of trust! There is evidence (60%, research) and feelings (“charge of energy”). But who did the research?
      Add “recommended by pediatricians” and a third leg appears.
    explanation_status: implicit
  - step_id: sc7_133
    source_step_id: '133'
    scene_id: sc7
    step_type: single_choice
    prompt: “Our physical education teacher recommends these balls. They passed 200 strength tests." What's missing?
    options:
    - id: opt_1
      text: Trust
    - id: opt_2
      text: Feelings
    - id: opt_3
      text: Evidence
    options_count: 3
    correct_answer: opt_2
    explanation: Not enough feelings! There is trust (teacher) and evidence (200 tests). Reliable, but boring. Add “play with
      friends and win!” - and it will become inspiring.
    explanation_status: implicit
  - step_id: sc7_135
    source_step_id: '135'
    scene_id: sc7
    step_type: single_choice
    prompt: “This board game is an explosion of emotions! The whole family laughed for three hours! It was invented by a famous
      child psychologist.” What's missing?
    options:
    - id: opt_1
      text: Trust
    - id: opt_2
      text: Feelings
    - id: opt_3
      text: Evidence
    options_count: 3
    correct_answer: opt_3
    explanation: Not enough evidence! There are feelings (“explosion of emotions,” “laughed”) and trust (psychologist). But
      how many cards? For what age? Add “120 tasks, from 6 to 12 years” - and the facts are in place.
    explanation_status: implicit
  - step_id: sc7_137
    source_step_id: '137'
    scene_id: sc7
    step_type: single_choice
    prompt: “This backpack weighs 290 grams and is made of waterproof material. Every trip with him is an adventure!” What's
      missing?
    options:
    - id: opt_1
      text: Trust
    - id: opt_2
      text: Feelings
    - id: opt_3
      text: Evidence
    options_count: 3
    correct_answer: opt_1
    explanation: Lack of trust! There is evidence (290 grams, material) and feelings (“adventure”). But who checked it? Add
      “the choice of professional tourists” - and the third leg stood up.
    explanation_status: implicit
  - step_id: sc7_139
    source_step_id: '139'
    scene_id: sc7
    step_type: theory
    prompt: Do you see? Every time something is missing. When there are no feelings, it’s boring. When there is no evidence,
      it’s empty. When there is no trust, it is not clear who to trust. The ideal belief is all three together!
  - step_id: sc7_140
    source_step_id: '140'
    scene_id: sc7
    step_type: theory
    prompt: 'Now you know the secret of any advertising, any belief, any argument. Three ways: trust, feelings, evidence.
      It''s best when they work together, like three legs of a stool.'
- scene_id: sc8
  title: Who is more convincing?
  steps:
  - step_id: sc8_141
    source_step_id: '141'
    scene_id: sc8
    step_type: theory
