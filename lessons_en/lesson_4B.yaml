    explanation_status: implicit
  - step_id: sc10_194
    source_step_id: '194'
    scene_id: sc10
    step_type: theory
    prompt: 'That''s it! You now know how to not only UNDERSTAND other people’s beliefs, but also REPAIR weak ones. Remember:
