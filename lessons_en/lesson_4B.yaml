    options:
    - id: opt_1
      text: Option A
    - id: opt_2
      text: Option B
    options_count: 2
    correct_answer: opt_2
    explanation: Option B! Sasha has trust (you know his mother), evidence (we'll go to bed at ten - specifics), feelings
      (the best evening). What about option A? Only “please” and sadness. One leg. Mom hears this ten times a day.
    explanation_status: implicit
  - step_id: sc8_145
    source_step_id: '145'
    scene_id: sc8
    step_type: theory
    prompt: Situation two. You need to convince the teacher not to assign homework.
  - step_id: sc8_146
    source_step_id: '146'
    scene_id: sc8
    step_type: single_choice
    prompt: 'Option A: “We’re tired! It''s so hard for us! Please don''t!" Option B: “We wrote the test perfectly, you know
