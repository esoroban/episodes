  - step_id: sc8_148
    source_step_id: '148'
    scene_id: sc8
    step_type: theory
    prompt: Situation three. You need to convince a friend to play your game.
  - step_id: sc8_149
    source_step_id: '149'
    scene_id: sc8
    step_type: single_choice
    prompt: 'Option A: “This game is cool! Just trust me! You''ll like it! Option B: “It has 50 levels and 3 modes, my older
      brother is also hooked - and you will be delighted!”'
    options:
    - id: opt_1
      text: Option A
    - id: opt_2
      text: Option B
    options_count: 2
    correct_answer: opt_2
    explanation: Option B! Evidence (50 levels, 3 modes), trust (big brother is playing), feelings (you will be delighted).
      And option A is “trust me” without a single argument. It's like a stool with a note saying "I'm strong" instead of legs.
    explanation_status: implicit
  - step_id: sc8_151
    source_step_id: '151'
    scene_id: sc8
    step_type: theory
    prompt: Situation four. We need to convince dad to buy a bike.
  - step_id: sc8_152
    source_step_id: '152'
    scene_id: sc8
    step_type: single_choice
    prompt: 'Option A: “Pa, all the children already have! I''m embarrassed without a bike! Buy it!” Option B: “Pa, the coach
      said I need to move more, this bike costs 3000 and lasts 5 years - and I can ride with my friends!”'
    options:
    - id: opt_1
      text: Option A
    - id: opt_2
      text: Option B
    options_count: 2
    correct_answer: opt_2
    explanation: 'Option B! Trust (the coach said), evidence (3000, 5 years - numbers), feelings (riding with friends is a
      joy). And option A is only shame and “everyone has it.” Dad will say: “What if everyone jumps from the roof?”'
    explanation_status: implicit
  - step_id: sc8_154
    source_step_id: '154'
    scene_id: sc8
    step_type: theory
    prompt: Situation five. You need to convince your mother to allow you to have a trained poisonous snake.
  - step_id: sc8_155
    source_step_id: '155'
    scene_id: sc8
    step_type: single_choice
    prompt: 'Option A: “Maaam! I want a snake so bad! She''s so beautiful! Well please!” Option B: “Mom, the trainer from
      the zoo showed me how to handle her, her poisonous glands have been removed, and imagine - all my friends will be amazed!”'
    options:
    - id: opt_1
      text: Option A
    - id: opt_2
      text: Option B
    options_count: 2
    correct_answer: opt_2
    explanation: Option B! Trust (a trainer from the zoo), evidence (glands removed - a concrete fact of safety), feelings
      (friends will be stunned). What about option A? “Beautiful” and “please.” At the word “poisonous snake,” mom already
