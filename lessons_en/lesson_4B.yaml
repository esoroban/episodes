  - step_id: sc9_166
    source_step_id: '166'
    scene_id: sc9
    step_type: single_choice
    prompt: “You don’t want everyone to laugh at you, do you?”
    options:
    - id: opt_1
      text: Trust (Ethos)
    - id: opt_2
      text: Feelings (Paphos)
    - id: opt_3
      text: Evidence (Logos)
    options_count: 3
    correct_answer: opt_2
