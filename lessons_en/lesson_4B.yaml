- scene_id: sc10
  title: Turn the phrase around
  steps:
  - step_id: sc10_177
    source_step_id: '177'
    scene_id: sc10
    step_type: instruction
    prompt: Last game! I give weak persuasion - just one way. And you choose the best option on how to fix it and make it
      stronger.
  - step_id: sc10_178
    source_step_id: '178'
    scene_id: sc10
    step_type: theory
    prompt: Are you ready? Let's fix it!
  - step_id: sc10_179
    source_step_id: '179'
    scene_id: sc10
    step_type: theory
    prompt: 'Phrase: “Buy this toy! She''s so cool! You will be happy! There are only feelings here. How to fix it?'
  - step_id: sc10_180
    source_step_id: '180'
    scene_id: sc10
    step_type: single_choice
    prompt: What supplement will make your belief stronger?
    options:
    - id: opt_1
      text: “My mother allowed me!”
    - id: opt_2
      text: “It can withstand 1,000 throws and is made of wood.”
    - id: opt_3
      text: “Well, buy it!”
    options_count: 3
    correct_answer: opt_2
    explanation: Proof! 1000 throws, wood - specific facts. “Mom allowed” - this is trust, which is also not bad. And “well,
      buy it” is another portion of feelings. The stool needs a DIFFERENT leg, not the same longer one.
    explanation_status: implicit
  - step_id: sc10_182
    source_step_id: '182'
    scene_id: sc10
    step_type: theory
    prompt: 'Phrase: “Scientists have proven that this vitamin is beneficial. It contains 12 microelements.” There''s only
      evidence here. Boring! How to fix it?'
  - step_id: sc10_183
    source_step_id: '183'
    scene_id: sc10
    step_type: single_choice
    prompt: What supplement will make your belief stronger?
    options:
    - id: opt_1
      text: “And 5 more B vitamins”
    - id: opt_2
      text: “Doctor Paukovsky recommends it - and you will be full of energy!”
    - id: opt_3
      text: '"Here''s another study"'
    options_count: 3
    correct_answer: opt_2
    explanation: Doctor Paukovsky - trust! “Full of energy” - feelings! With one stroke, two legs were added. And options
      A and B are just more facts. Three identical legs are not a stool, they are a fence.
    explanation_status: implicit
  - step_id: sc10_185
    source_step_id: '185'
    scene_id: sc10
    step_type: theory
    prompt: 'Phrase: “I’m your best friend, trust me, this book is good!” There''s only trust here. How to fix it?'
  - step_id: sc10_186
    source_step_id: '186'
    scene_id: sc10
    step_type: single_choice
    prompt: What supplement will make your belief stronger?
    options:
    - id: opt_1
      text: “Have I ever deceived you?”
    - id: opt_2
      text: “It has 200 pages of adventure - you’ll read it and won’t be able to put it down!”
    - id: opt_3
      text: “Well, believe me, I’m serious!”
    options_count: 3
    correct_answer: opt_2
    explanation: 200 pages - proof! “You can’t tear yourself away” - feelings! Again, two legs at a time. And “Have I ever
      cheated?” - this is trust again. And “believe me, I’m serious” is also trust. The same leg three times - the stool will
      not stand up.
    explanation_status: implicit
  - step_id: sc10_188
    source_step_id: '188'
    scene_id: sc10
    step_type: theory
    prompt: 'Phrase: “If you don’t do your homework now, it will be too late!” You''ll regret it!" There are only feelings
      here - fear. How to fix it?'
  - step_id: sc10_189
    source_step_id: '189'
    scene_id: sc10
    step_type: single_choice
    prompt: What supplement will make your belief stronger?
    options:
    - id: opt_1
      text: “And in general it will be terrible!”
