- scene_id: sc11
  title: Closing
  steps:
  - step_id: sc11_195
    source_step_id: '195'
    scene_id: sc11
    step_type: reflection
    prompt: Our fourth day is coming to an end. Two lessons and you become completely different. Let's remember what we went
      through today, because it was a very important day.
  - step_id: sc11_196
    source_step_id: '196'
    scene_id: sc11
    step_type: theory
    prompt: In the first lesson, we learned about the fourth reconnaissance tool - the EYE. Body language, gestures, facial
      expressions, voice and intonation. You have learned to see what a person does NOT say in words. Crossed arms, a shifting
      gaze, a trembling voice - these are all clues.
  - step_id: sc11_197
    source_step_id: '197'
    scene_id: sc11
    step_type: theory
    prompt: 'And in the second lesson we looked at HOW people convince. Three ways: trust, feelings and evidence. Like three
      legs of a stool - if one is missing, something is wrong.'
  - step_id: sc11_198
    source_step_id: '198'
    scene_id: sc11
    step_type: theory
    prompt: Why is this together? Because in life everything works at the same time! When you are convinced, you hear the
      WORDS (three ways) and see the BODY (the fourth tool). A person says “trust me” - but he averts his eyes? The scout
      will notice!
  - step_id: sc11_199
    source_step_id: '199'
    scene_id: sc11
    step_type: theory
    prompt: 'The seller says “last chance, hurry up!” - only feelings, not a single fact. And at the same time he rubs his
      hands nervously. Two signals at once: the stool is crooked and the body betrays uncertainty. Double tip for the scout.'
  - step_id: sc11_200
    source_step_id: '200'
    scene_id: sc11
    step_type: theory
    prompt: And now the most important thing. You have learned not only to NOTICE other people’s techniques, but also to BUILD
      your own. Do you want to convince your mother, friend, teacher? Prepare three legs. Trust (Ethos) - why you can be trusted.
      Evidence (Logos) - specific facts. Feelings (Paphos) - why it is important and healthy.
  - step_id: sc11_201
    source_step_id: '201'
    scene_id: sc11
    step_type: reflection
    prompt: 'And remember the intelligence officer’s rule: when you are being convinced through ONLY one leg, think about
      it. Just feelings without facts? Suspicious. Just facts without experts? Check. Just “trust me” without proof? Ask “why?”'
    teacher_guidance: Just feelings without facts? Just facts without experts? Just “trust me” without proof?
  - step_id: sc11_202
    source_step_id: '202'
    scene_id: sc11
    step_type: theory
    prompt: 'Homework! Until the next lesson, notice the beliefs around you. An advertisement on TV, a request from a friend,
      advice from parents - determine: what methods are used? Are all three legs present or is something missing? Remember
      one of the most interesting examples - tell us in the next lesson!'
  - step_id: sc11_203
    source_step_id: '203'
    scene_id: sc11
    step_type: theory
    prompt: You were real scouts today. Well done! See you at the next lesson!
