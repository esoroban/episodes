    - id: opt_1
      text: Balanced (several ways)
    - id: opt_2
      text: Not balanced (one way)
    options_count: 2
    correct_answer: opt_1
    explanation: Balanced! Trust (dentists), evidence (9 out of 10, 2 weeks). Sturdy stool. Add “smile with confidence!” -
      and there will be all three.
    explanation_status: implicit
  - step_id: sc6_119
    source_step_id: '119'
    scene_id: sc6
    step_type: single_choice
    prompt: “Hurry up! Discount only until the end of the day! Don't miss your dream!
    options:
    - id: opt_1
      text: Balanced (several ways)
    - id: opt_2
      text: Not balanced (one way)
    options_count: 2
    correct_answer: opt_2
    explanation: Not balanced! Fear + feelings. “Dream” is an emotion, “hurry” is pressure. Not a single fact about the product.
      Being in a hurry is almost always a trap. The scout is in no hurry.
    explanation_status: implicit
  - step_id: sc6_121
    source_step_id: '121'
    scene_id: sc6
    step_type: single_choice
    prompt: “This backpack weighs only 300 grams, has 5 pockets, and was chosen by 200 schoolchildren in our city.”
    options:
    - id: opt_1
      text: Balanced (several ways)
    - id: opt_2
      text: Not balanced (one way)
    options_count: 2
    correct_answer: opt_1
    explanation: Balanced! Solid evidence - grams, pockets, number of schoolchildren. Trust through mass participation (200
      schoolchildren). There are no feelings - but the facts are so convincing that it works even without emotions. Although
