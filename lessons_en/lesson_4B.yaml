    - id: opt_3
      text: “The width of the steering wheel is 42 centimeters”
    options_count: 3
    correct_answer: opt_2
    explanation: Champions - trust! “Drive like the wind” - feelings! And options A and B are still numbers. Aluminum, centimeters
