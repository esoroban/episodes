- scene_id: sc6
  title: Balance of methods
  steps:
  - step_id: sc6_97
    source_step_id: '97'
    scene_id: sc6
    step_type: theory
    prompt: 'You already know how to identify methods of persuasion. But here''s an important secret: real persuasion is when
      ALL THREE methods work together. Like a stool with three legs - remove one and everything will collapse.'
  - step_id: sc6_98
    source_step_id: '98'
    scene_id: sc6
    step_type: theory
    prompt: Imagine an advertisement for a new juice. “It is recommended by nutritionists” - TRUST. “Taste of childhood, happiness
      in every sip!” - FEELINGS. “Contains vitamin C and no sugar” - EVIDENCE.
  - step_id: sc6_99
    source_step_id: '99'
    scene_id: sc6
    step_type: theory
    prompt: Three legs - the stool stands. Three ways - persuasion works. Now let's see what happens when there are not enough
      legs.
  - step_id: sc6_100
    source_step_id: '100'
    scene_id: sc6
    step_type: theory
    prompt: “Buy this jacket! All children dream! You will be the most fashionable! Don't lag behind your friends! What's
      here? Only feelings and fear. Is the jacket warm? Durable? What is it made of? Not a word. A stool on one leg is wobbly!
  - step_id: sc6_101
    source_step_id: '101'
    scene_id: sc6
    step_type: theory
    prompt: 'But on the contrary: “This jacket is made of a Gore-Tex membrane, does not get wet at a pressure of 28,000 mm
      of water, weighs 400 grams.” Solid facts! But... it''s boring. Doesn''t catch on. I want to yawn and move on. A stool
      on one leg - only the other.'
  - step_id: sc6_102
    source_step_id: '102'
    scene_id: sc6
    step_type: theory
    prompt: Is it ideal? “This jacket is recommended by rescuers of the Ministry of Emergency Situations (trust). It's warm
      even at minus 20 (proof). And you will feel like a real polar explorer! (feelings)” Three legs - worth it!
  - step_id: sc6_103
    source_step_id: '103'
    scene_id: sc6
    step_type: theory
    prompt: 'Scout rule: when you are convinced ONLY through feelings, ask: “Where are the facts?” When only through facts,
      ask: “Who checked this?” There is no balance - turn on suspicion.'
  - step_id: sc6_104
    source_step_id: '104'
    scene_id: sc6
    step_type: instruction
    prompt: 'Let''s check! I read the phrase - you determine: balanced or not?'
  - step_id: sc6_105
    source_step_id: '105'
    scene_id: sc6
    step_type: single_choice
    prompt: “The doctor recommends this juice, it contains a lot of vitamins, and you will be healthy!”
    options:
    - id: opt_1
      text: Balanced (several ways)
    - id: opt_2
      text: Not balanced (one way)
    options_count: 2
    correct_answer: opt_1
    explanation: Balanced! Trust (doctor), evidence (vitamins), feelings (health). Three legs - the stool stands. Even a doctor
      would approve.
    explanation_status: implicit
  - step_id: sc6_107
    source_step_id: '107'
    scene_id: sc6
    step_type: single_choice
    prompt: “Buy it! Everyone is buying! Be like everyone else! Don't fall behind!
    options:
    - id: opt_1
      text: Balanced (several ways)
    - id: opt_2
      text: Not balanced (one way)
    options_count: 2
    correct_answer: opt_2
    explanation: Not balanced! Only feelings - fear of not being like that. Not a single fact. Not a single expert. A stool
      on one leg - boom, fell.
    explanation_status: implicit
  - step_id: sc6_109
    source_step_id: '109'
    scene_id: sc6
    step_type: single_choice
    prompt: “Teachers read this book, and there are 100 interesting stories in it.”
    options:
    - id: opt_1
      text: Balanced (several ways)
    - id: opt_2
      text: Not balanced (one way)
    options_count: 2
    correct_answer: opt_1
    explanation: Balanced! Trust (teachers read) and evidence (100 stories). Two legs is not bad. Add “it’s impossible to
      tear yourself away from her!” - and there will be three.
    explanation_status: implicit
  - step_id: sc6_111
    source_step_id: '111'
    scene_id: sc6
    step_type: single_choice
    prompt: “If you don’t buy this, you’ll regret it! This is the last chance!
    options:
    - id: opt_1
      text: Balanced (several ways)
    - id: opt_2
      text: Not balanced (one way)
    options_count: 2
    correct_answer: opt_2
    explanation: Not balanced! Fear, fear and more fear. “You’ll regret it,” “last chance”—double pressure. What kind of product?
      What properties? Silence. The stool fell and broke.
    explanation_status: implicit
  - step_id: sc6_113
    source_step_id: '113'
    scene_id: sc6
    step_type: single_choice
    prompt: “I’ve been working here for 15 years, and all the customers praise this product.”
    options:
    - id: opt_1
      text: Balanced (several ways)
    - id: opt_2
      text: Not balanced (one way)
    options_count: 2
    correct_answer: opt_1
    explanation: Balanced! Trust (15 years of experience) and evidence (customer reviews). The seller supported his authority
      with facts - this is a reasonable approach.
    explanation_status: implicit
  - step_id: sc6_115
    source_step_id: '115'
    scene_id: sc6
    step_type: single_choice
    prompt: “Without this cream, your skin will be terrible! Everyone will be watching!”
    options:
    - id: opt_1
      text: Balanced (several ways)
    - id: opt_2
      text: Not balanced (one way)
    options_count: 2
    correct_answer: opt_2
    explanation: 'Not balanced! Fear + shame. Not a single fact about the cream, not a single expert. They''re just scary.
      The scout says: “Show me a dermatologist and tests!”'
    explanation_status: implicit
  - step_id: sc6_117
    source_step_id: '117'
    scene_id: sc6
    step_type: single_choice
    prompt: “Dentists recommend this paste. 9 out of 10 patients confirmed that their teeth are whiter in 2 weeks.”
