  - step_id: sc10_191
    source_step_id: '191'
    scene_id: sc10
    step_type: instruction
    prompt: 'Phrase: “This scooter weighs 3 kg and folds in 2 seconds.” Only evidence. How to fix it?'
  - step_id: sc10_192
    source_step_id: '192'
    scene_id: sc10
    step_type: single_choice
    prompt: What supplement will make your belief stronger?
    options:
    - id: opt_1
      text: “And it has an aluminum frame.”
