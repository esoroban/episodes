    source_step_id: '142'
    scene_id: sc8
    step_type: theory
    prompt: Situation one. We need to convince mom to let her spend the night with a friend.
  - step_id: sc8_143
    source_step_id: '143'
    scene_id: sc8
    step_type: single_choice
    prompt: 'Option A: “Mom, please! I want it so bad! I’ll be sad all evening!” Option B: “Mom, you know Sasha’s mother,
