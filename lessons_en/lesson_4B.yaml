lesson_id: lesson_4B
stage0_run_id: run_2026_03_14T17_32_47Z_lesson_4A_lesson_4B
source_lesson_id: lesson_4B
language: en
title: Three Ways to Convince
day: 4
slot: B
scenes:
- scene_id: sc1
  title: Discovery
  steps:
  - step_id: sc1_1
    source_step_id: '1'
    scene_id: sc1
    step_type: theory
    prompt: 'Imagine: you want to convince your mom to buy a big spider. A real, hairy one with eight legs. What would you
      tell her?'
  - step_id: sc1_2
    source_step_id: '2'
    scene_id: sc1
    step_type: instruction
    prompt: Think—what words would you choose?
  - step_id: sc1_3
    source_step_id: '3'
    scene_id: sc1
    step_type: theory
    prompt: 'One may say: “Mom, I will take care of him, honestly!” Another: “Mom, I’m so lonely without a pet!” Third: “Mom,
      research shows that children with tarantula spiders are braver!”'
  - step_id: sc1_4
    source_step_id: '4'
    scene_id: sc1
    step_type: theory
    prompt: Three different ways! One puts pressure on the promise, the other on pity, the third on science. And today we
      will find out what they are called.
  - step_id: sc1_5
    source_step_id: '5'
    scene_id: sc1
    step_type: theory
    prompt: 'Another example. Advertisement: “This yogurt is the most delicious! A famous athlete eats it! And it contains
      a lot of vitamins!”'
  - step_id: sc1_6
    source_step_id: '6'
    scene_id: sc1
    step_type: theory
    prompt: There are also three techniques here. “The most delicious” - hits the senses. “Famous athlete” - we trust him.
      “Lots of vitamins” is a fact. Three ways in one advertisement!
  - step_id: sc1_7
    source_step_id: '7'
    scene_id: sc1
    step_type: theory
    prompt: Here's an anti-example. “Buy this toy! All children dream! You will be the happiest!” Do you feel it? There are
      only emotions here. Not a single fact. Not a single expert. Just “I want, I want, I want.”
  - step_id: sc1_8
    source_step_id: '8'
    scene_id: sc1
    step_type: theory
    prompt: 'When you are convinced only through “I want”, this is a signal: something is unclean here. The scout notices
      this.'
  - step_id: sc1_9
    source_step_id: '9'
    scene_id: sc1
    step_type: theory
    prompt: But it happens the other way around. “This phone weighs 185 grams, has a 6.1-inch screen, and has a 4000 milliamp-hour
      battery.” Solid facts! But... it's boring. Doesn't catch on. I want to yawn.
  - step_id: sc1_10
    source_step_id: '10'
    scene_id: sc1
    step_type: theory
    prompt: It turns out that facts alone are not enough. Something else is needed - so that a person not only understands,
      but WANTS it.
  - step_id: sc1_11
    source_step_id: '11'
    scene_id: sc1
    step_type: theory
    prompt: 'And the third case. A friend says: “Trust me, this game is cool!” You believe because it is a friend. But what
      if a stranger on the street says the same thing? Not so convincing anymore.'
  - step_id: sc1_12
    source_step_id: '12'
    scene_id: sc1
    step_type: theory
    prompt: This means that it is important WHO says, and not just WHAT. Trust in a person is also a way of persuasion.
  - step_id: sc1_13
    source_step_id: '13'
    scene_id: sc1
    step_type: theory
    prompt: Three ways. Three tools of persuasion. Now listen to an interesting story about how three children convinced the
      teacher - each in their own way!
  - step_id: sc1_14
    source_step_id: '14'
    scene_id: sc1
    step_type: instruction
    prompt: Look carefully - notice HOW each character is trying to convince.
- scene_id: sc2
  title: HISTORY - WHO WILL GO ON THE EXCURSION?
  steps:
  - step_id: sc2_15
    source_step_id: '15'
    scene_id: sc2
    step_type: theory
    prompt: 'The teacher announced that only three people would go on the excursion - those who could best explain why they
      should be taken. Masha came out first: “You know me! I always keep my promises, you can rely on me!”'
  - step_id: sc2_16
    source_step_id: '16'
    scene_id: sc2
    step_type: theory
    prompt: 'Dmitrik was the second to jump out: “I want it SO bad!” If I don''t go, I''ll be sad for a whole week! Please!"
      His eyes became huge and sad, like a kitten’s in the rain.'
  - step_id: sc2_17
    source_step_id: '17'
    scene_id: sc2
    step_type: theory
    prompt: 'Olenka was the last to leave. She unfolded the piece of paper: “I have the best grades for the quarter. Here
      is a list of things you need. But the route – I’ve already calculated everything.” The teacher raised her eyebrows in
      surprise.'
  - step_id: sc2_18
    source_step_id: '18'
    scene_id: sc2
    step_type: single_choice
    prompt: Which of the three provided specific facts?
    options:
    - id: opt_1
      text: Masha
    - id: opt_2
      text: Dmitry
    - id: opt_3
      text: Olenka
    options_count: 3
    correct_answer: opt_3
    explanation: Olenka! Ratings, list, route - everything can be checked. But Masha and Dmitrik convinced differently. How
      exactly?
    explanation_status: present
  - step_id: sc2_20
    source_step_id: '20'
    scene_id: sc2
    step_type: theory
    prompt: 'Masha convinced through TRUST in herself. “I am reliable, you can rely on me.” She did not cite facts and did
      not press for pity - she said: believe ME.'
  - step_id: sc2_21
    source_step_id: '21'
    scene_id: sc2
    step_type: theory
    prompt: It's like when mom says, "I know what's best." We believe - because this is mom. She has earned our trust.
  - step_id: sc2_22
    source_step_id: '22'
    scene_id: sc2
    step_type: theory
    prompt: Dmitry convinced through FEELINGS. “I want it so bad! I will be sad! He didn’t show a single fact, but he touched
      a nerve. We feel sorry for him.
  - step_id: sc2_23
    source_step_id: '23'
    scene_id: sc2
    step_type: theory
    prompt: Advertising does this all the time. A sad kitten in a shelter - and you are already reaching for your wallet.
      It was not the facts that convinced me, but the feelings.
  - step_id: sc2_24
    source_step_id: '24'
    scene_id: sc2
    step_type: theory
    prompt: Olenka convinced through EVIDENCE. “Best grades, packing list, route.” She came prepared. The facts are on the
      table.
  - step_id: sc2_25
    source_step_id: '25'
    scene_id: sc2
    step_type: theory
    prompt: 'It’s like a scientist at a conference: “Here is the data, here is the experiment, here is the result.” Not “trust
      me” - but “check it yourself.”'
  - step_id: sc2_26
    source_step_id: '26'
    scene_id: sc2
    step_type: single_choice
    prompt: 'Masha: “You know, I always do everything on time!”'
    options:
    - id: opt_1
      text: Trust (Ethos)
    - id: opt_2
      text: Feelings (Paphos)
    - id: opt_3
      text: Evidence (Logos)
    options_count: 3
    correct_answer: opt_1
    explanation: Trust! Masha refers to her reputation. “Trust me—that’s who I am.”
    explanation_status: implicit
  - step_id: sc2_28
    source_step_id: '28'
    scene_id: sc2
    step_type: single_choice
    prompt: 'Dmitry: “If I don’t go, I’ll cry all week!”'
    options:
    - id: opt_1
      text: Trust (Ethos)
    - id: opt_2
      text: Feelings (Paphos)
    - id: opt_3
      text: Evidence (Logos)
    options_count: 3
    correct_answer: opt_2
    explanation: Feelings! Dmitry strikes for pity. No facts - just “I’ll be sad.”
    explanation_status: implicit
  - step_id: sc2_30
    source_step_id: '30'
    scene_id: sc2
    step_type: single_choice
    prompt: 'Olenka: “I did the math—tickets cost 200 hryvnia, but the class budget includes 500.”'
    options:
    - id: opt_1
      text: Trust (Ethos)
    - id: opt_2
      text: Feelings (Paphos)
    - id: opt_3
      text: Evidence (Logos)
    options_count: 3
    correct_answer: opt_3
    explanation: Proof! Numbers, calculation, fact. Olenka is a pure intelligence officer.
    explanation_status: implicit
  - step_id: sc2_32
    source_step_id: '32'
    scene_id: sc2
    step_type: theory
    prompt: Three ways - three tools of persuasion. Let's look at each in more detail!
- scene_id: sc3
  title: Three Ways of Persuasion - Theory
  steps:
  - step_id: sc3_33
    source_step_id: '33'
    scene_id: sc3
    step_type: theory
    prompt: So, three ways of persuasion. Let's remember! By the way, the ancient Greeks invented them and gave them beautiful
      names. The first is TRUST (Ethos). When we believe a PERSON, not words.
  - step_id: sc3_34
    source_step_id: '34'
    scene_id: sc3
    step_type: theory
    prompt: “I’m a doctor, and I say it’s useful.” We believe not because we checked - but because we are a doctor! He studied,
      he knows.
  - step_id: sc3_35
    source_step_id: '35'
    scene_id: sc3
    step_type: theory
    prompt: “I’m your friend, you know me.” Again, not facts, but relationships. We trust a person, and therefore we believe
      his words.
  - step_id: sc3_36
    source_step_id: '36'
    scene_id: sc3
    step_type: theory
    prompt: But there is a trap! Not everyone who says “trust me” is trustworthy. If a stranger on the street says “I’m an
      expert, believe me!” - this is not yet a reason to believe.
  - step_id: sc3_37
    source_step_id: '37'
    scene_id: sc3
    step_type: single_choice
    prompt: 'A blogger with a million subscribers says: “These vitamins are the best!” Is he a doctor?'
    options:
    - id: opt_1
      text: Yes, he's an expert
    - id: opt_2
      text: No, popularity ≠ expertise
    options_count: 2
    correct_answer: opt_2
    explanation: 'Popularity is not expertise! A million subscribers is not a substitute for a medical degree. The scout checks:
      WHY should I believe?'
    explanation_status: implicit
  - step_id: sc3_39
    source_step_id: '39'
    scene_id: sc3
    step_type: theory
    prompt: 'The second method is FEELINGS (Pathos). When we are convinced through emotions: pity, joy, fear, shame.'
  - step_id: sc3_40
    source_step_id: '40'
    scene_id: sc3
    step_type: theory
    prompt: 'Shelter advertisement: “Look at this sad kitten! He''s shivering from the cold! Help him! You feel sorry and
      you are ready to help. Not because it’s logical, but because my heart sank.'
  - step_id: sc3_41
    source_step_id: '41'
    scene_id: sc3
    step_type: theory
    prompt: 'Briefcase ad: “Buy this backpack and you’ll be the coolest guy in the class!” You are pleased - and you already
      want it. Not because the backpack is durable - but because it''s nice to be cool.'
  - step_id: sc3_42
    source_step_id: '42'
    scene_id: sc3
    step_type: theory
    prompt: 'Mom says: “If you don’t clean the room, I’ll be upset, and we won’t go anywhere!” You are scared - and you clean.
      Not because you figured it out - but because you are afraid of the consequences.'
  - step_id: sc3_43
    source_step_id: '43'
    scene_id: sc3
    step_type: single_choice
    prompt: “Last chance! 2 pieces left! Don’t miss it - you’ll regret it later!”
    options:
    - id: opt_1
      text: Joy
    - id: opt_2
      text: Fear
    - id: opt_3
      text: Pity
    options_count: 3
    correct_answer: opt_2
    explanation: Fear! Fear of missing out. Advertising loves this technique - to create the feeling that if you don’t buy
      NOW, it will be too late.
    explanation_status: implicit
  - step_id: sc3_45
    source_step_id: '45'
    scene_id: sc3
    step_type: theory
    prompt: The third method is EVIDENCE (Logos). When they show facts, figures, examples.
  - step_id: sc3_46
    source_step_id: '46'
    scene_id: sc3
    step_type: theory
    prompt: “Children who read every day know 3,000 more words.” You can check this! There is a study, there is a figure.
  - step_id: sc3_47
    source_step_id: '47'
    scene_id: sc3
    step_type: theory
    prompt: “This juice contains 50% of the daily value of vitamin C.” Fact. It is written on the packaging and can be tested
      in the laboratory.
  - step_id: sc3_48
    source_step_id: '48'
    scene_id: sc3
    step_type: theory
    prompt: Evidence is the most honest way. But also the most boring if you use ONLY it. Therefore, the best belief is all
      three together.
  - step_id: sc3_49
    source_step_id: '49'
    scene_id: sc3
    step_type: single_choice
    prompt: “Scientists have proven that chocolate improves your mood.”
    options:
    - id: opt_1
      text: Trust (Ethos)
    - id: opt_2
      text: Feelings (Paphos)
    - id: opt_3
      text: Evidence (Logos)
    options_count: 3
    correct_answer: opt_3
    explanation: Proof! “Scientists have proven” + specific effect. Although... there is a pinch of trust here - we trust
      scientists.
    explanation_status: implicit
  - step_id: sc3_51
    source_step_id: '51'
    scene_id: sc3
    step_type: theory
    prompt: Did you notice? Sometimes the methods get mixed up! “Scientists have proven” means both trust (scientists) and
      evidence (proved). Often in one phrase there are two ways at once.
  - step_id: sc3_52
    source_step_id: '52'
    scene_id: sc3
    step_type: instruction
    prompt: Do you remember? TRUST (Ethos) - we trust the person. FEELINGS (Pathos) - affects emotions. EVIDENCE (Logos) -
      shows facts. Three pillars of conviction. Let's check!
- scene_id: sc4
  title: 'Game: what are they hooking you on?'
  steps:
  - step_id: sc4_53
    source_step_id: '53'
    scene_id: sc4
    step_type: theory
    prompt: 'Game time! I read an advertisement - you determine what it presses on: feelings, fear or evidence.'
  - step_id: sc4_54
    source_step_id: '54'
    scene_id: sc4
    step_type: instruction
    prompt: Listen carefully - sometimes the difference is subtle!
  - step_id: sc4_55
    source_step_id: '55'
    scene_id: sc4
    step_type: single_choice
    prompt: “This construction set develops thinking 37% faster than conventional toys. This was confirmed by tests in three
      schools.”
    options:
    - id: opt_1
      text: Feelings (Paphos)
    - id: opt_2
      text: Fear
    - id: opt_3
      text: Evidence (Logos)
    options_count: 3
    correct_answer: opt_3
    explanation: Proof! 37%, three schools, tests - all numbers and facts. Check and make sure.
    explanation_status: implicit
  - step_id: sc4_57
    source_step_id: '57'
    scene_id: sc4
    step_type: single_choice
    prompt: “If you don’t have this backpack, you’ll be the only one in your class without a new collection...”
    options:
    - id: opt_1
      text: Feelings (Paphos)
    - id: opt_2
      text: Fear
    - id: opt_3
      text: Evidence (Logos)
    options_count: 3
    correct_answer: opt_2
    explanation: Fear! Fear of being “different from everyone else.” Not a single fact about the backpack - only “you will
      be the only one like this.” Classic trap.
    explanation_status: implicit
  - step_id: sc4_59
    source_step_id: '59'
    scene_id: sc4
    step_type: single_choice
    prompt: “Look how happily the children laugh on our playground! Give joy to your child!”
    options:
    - id: opt_1
      text: Feelings (Paphos)
    - id: opt_2
      text: Fear
    - id: opt_3
      text: Evidence (Logos)
    options_count: 3
    correct_answer: opt_1
    explanation: Feelings! Happiness, laughter, joy - everything hits the emotions. Is the site good? Durable? Safe? Not a
      word about this.
    explanation_status: implicit
  - step_id: sc4_61
    source_step_id: '61'
    scene_id: sc4
    step_type: single_choice
    prompt: “Our baby shampoo does not sting the eyes. Dermatologist tested."
    options:
    - id: opt_1
      text: Feelings (Paphos)
    - id: opt_2
      text: Fear
    - id: opt_3
      text: Evidence (Logos)
    options_count: 3
    correct_answer: opt_3
    explanation: Proof! “Does not sting” is a specific property. Dermatologist Tested - Confirmed by Experts. Fact + verification.
    explanation_status: implicit
  - step_id: sc4_63
    source_step_id: '63'
    scene_id: sc4
    step_type: single_choice
    prompt: “Last 3 sets! Tomorrow they will no longer be there! Don't miss the chance!
    options:
    - id: opt_1
      text: Feelings (Paphos)
    - id: opt_2
      text: Fear
    - id: opt_3
      text: Evidence (Logos)
    options_count: 3
    correct_answer: opt_2
    explanation: Fear! “The last ones,” “there won’t be a tomorrow,” “don’t miss out”—three blows of fear in a row. They rush
      you so that you don't have time to think.
    explanation_status: implicit
  - step_id: sc4_65
    source_step_id: '65'
    scene_id: sc4
    step_type: single_choice
    prompt: “This tablet can withstand a drop of 1.5 meters. We checked it 50 times."
    options:
    - id: opt_1
      text: Feelings (Paphos)
    - id: opt_2
      text: Fear
    - id: opt_3
      text: Evidence (Logos)
    options_count: 3
    correct_answer: opt_3
    explanation: Proof! 1.5 meters, 50 times - specific numbers. You can check it, you can repeat it. Honest approach.
    explanation_status: implicit
  - step_id: sc4_67
    source_step_id: '67'
    scene_id: sc4
    step_type: single_choice
    prompt: “With this skateboard you will be the coolest guy in the yard!”
    options:
    - id: opt_1
      text: Feelings (Paphos)
    - id: opt_2
      text: Fear
    - id: opt_3
      text: Evidence (Logos)
    options_count: 3
    correct_answer: opt_1
    explanation: Feelings! “The coolest” is a pure emotion. Is the skateboard quality? Are the wheels good? Unknown. But it's
      nice!
    explanation_status: implicit
  - step_id: sc4_69
    source_step_id: '69'
    scene_id: sc4
    step_type: single_choice
    prompt: “If you don’t start studying English now, then it will be too late.”
    options:
    - id: opt_1
      text: Feelings (Paphos)
    - id: opt_2
      text: Fear
    - id: opt_3
      text: Evidence (Logos)
    options_count: 3
    correct_answer: opt_2
    explanation: Fear! “It’s too late” - they scare the future. Why is it late? When exactly? No evidence - just pressure.
    explanation_status: present
  - step_id: sc4_71
    source_step_id: '71'
    scene_id: sc4
    step_type: single_choice
    prompt: “90% of parents chose this board game to develop logic.”
    options:
    - id: opt_1
      text: Feelings (Paphos)
    - id: opt_2
      text: Fear
    - id: opt_3
      text: Evidence (Logos)
    options_count: 3
    correct_answer: opt_3
    explanation: 'Proof! 90% is a number. Although... where is she from? Who counted? The scout will ask: “Where is the research?”
      Even the evidence is worth checking!'
    explanation_status: implicit
  - step_id: sc4_73
    source_step_id: '73'
    scene_id: sc4
    step_type: single_choice
    prompt: “Look at this sad puppy. He has been waiting for his owner for 3 months..."
    options:
    - id: opt_1
      text: Feelings (Paphos)
    - id: opt_2
      text: Fear
    - id: opt_3
      text: Evidence (Logos)
    options_count: 3
    correct_answer: opt_1
    explanation: Feelings! Sad puppy, three months of waiting - my heart aches. Although “3 months” seems like a fact, the
      main device here is pity. Advertising wants you to FEEL, not think.
    explanation_status: implicit
- scene_id: sc5
  title: Disassemble the advertisement
  steps:
  - step_id: sc5_75
    source_step_id: '75'
    scene_id: sc5
    step_type: theory
    prompt: You are already good at catching ONE trick. But advertising is trickier! Often TWO or even THREE methods are hidden
      in one phrase at once. Now we select EVERYTHING we find.
  - step_id: sc5_76
    source_step_id: '76'
    scene_id: sc5
    step_type: theory
    prompt: We note all the techniques that we see. There may be two or three correct answers!
  - step_id: sc5_77
    source_step_id: '77'
    scene_id: sc5
    step_type: multi_choice
    prompt: “95% of parents recommend this construction set. May your child be just as happy!”
    options:
    - id: opt_1
      text: Feelings (Paphos)
    - id: opt_2
      text: Fear
    - id: opt_3
      text: Evidence (Logos)
    options_count: 3
    correct_answer:
    - opt_1
    - opt_3
    explanation: Feelings + evidence! 95% is a number, this is proof. “He will be happy” hits the emotions. Two hooks in one
      phrase.
    explanation_status: implicit
  - step_id: sc5_79
    source_step_id: '79'
    scene_id: sc5
    step_type: multi_choice
    prompt: “Today only 40% discount! Tomorrow the price will rise and you will regret it.”
    options:
    - id: opt_1
      text: Feelings (Paphos)
    - id: opt_2
      text: Fear
    - id: opt_3
      text: Evidence (Logos)
    options_count: 3
    correct_answer:
    - opt_1
    - opt_2
    explanation: Feelings + fear! “You will regret” is the emotion of regret. “Only today, tomorrow it will grow” - fear of
      missing out. And 40% is not proof of quality, it’s just time pressure.
    explanation_status: implicit
  - step_id: sc5_81
    source_step_id: '81'
    scene_id: sc5
    step_type: multi_choice
    prompt: “This bike can withstand 100 kg load and has passed 500 tests. Ride calmly and without worries.”
    options:
    - id: opt_1
      text: Feelings (Paphos)
    - id: opt_2
      text: Fear
    - id: opt_3
      text: Evidence (Logos)
    options_count: 3
    correct_answer:
    - opt_1
    - opt_2
    - opt_3
    explanation: 'All three! 100 kg and 500 tests are proof. “No worries” - a feeling of calm. And “calmly” is a hint: if
      you DO NOT buy, you will worry. Triple strike!'
    explanation_status: implicit
  - step_id: sc5_83
    source_step_id: '83'
    scene_id: sc5
    step_type: multi_choice
    prompt: “If the child doesn’t start studying now, it will be more difficult later. Research confirms this."
    options:
    - id: opt_1
      text: Feelings (Paphos)
    - id: opt_2
      text: Fear
    - id: opt_3
      text: Evidence (Logos)
    options_count: 3
    correct_answer:
    - opt_2
    - opt_3
    explanation: Fear + evidence! “Then it will be more difficult” - they scare the future. “Research confirms” is a reference
      to facts. Fear backed by science is a compelling combination.
    explanation_status: implicit
  - step_id: sc5_85
    source_step_id: '85'
    scene_id: sc5
    step_type: multi_choice
    prompt: “More than 1 million children have already chosen this board game. Join us too!”
    options:
    - id: opt_1
      text: Feelings (Paphos)
    - id: opt_2
      text: Fear
    - id: opt_3
      text: Evidence (Logos)
    options_count: 3
    correct_answer:
    - opt_1
    - opt_3
    explanation: Feelings + evidence! A million is a number. “Join” is the emotion of “being part of a team.” I want to be
      like everyone else, a million - this is a feeling.
    explanation_status: implicit
  - step_id: sc5_87
    source_step_id: '87'
    scene_id: sc5
    step_type: multi_choice
    prompt: “This juice contains 60% of the daily value of vitamin C. Take care of your child’s health today.”
    options:
    - id: opt_1
      text: Feelings (Paphos)
    - id: opt_2
      text: Fear
    - id: opt_3
      text: Evidence (Logos)
    options_count: 3
    correct_answer:
