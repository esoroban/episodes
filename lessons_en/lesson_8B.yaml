- scene_id: sc9
  title: Simplification
  steps:
  - step_id: sc9_93
    source_step_id: '93'
    scene_id: sc9
    step_type: instruction
    prompt: 'Now the fun part - you come up with the answer yourself! I give the situation and intimidation, you are thinking:
      how to respond using four steps? And then I''ll show you my version. Let''s go!'
  - step_id: sc9_94
    source_step_id: '94'
    scene_id: sc9
    step_type: theory
    prompt: 'You are in the camp. Everyone jumps from the tower into the water. You are still scared - you want to start from
      the side. The counselor shouts: “If you don’t jump from the tower, everyone will call you a coward until the end of
      the shift! Then they won’t be accepted into any team!”'
  - step_id: sc9_95
    source_step_id: '95'
    scene_id: sc9
    step_type: open_question
    prompt: 'Said: "I don''t like this film." Accused of saying: "You hate all modern movies."'
  - step_id: sc9_96
    source_step_id: '96'
    scene_id: sc9
    step_type: theory
    prompt: 'My option: “Stop. Is it really true that EVERYONE will be called a coward? Hardly. And will they definitely not
      take you to the team because of the tower? I can start on the side and jump off the board when I''m ready. Caution is
      not cowardice."'
  - step_id: sc9_97
    source_step_id: '97'
    scene_id: sc9
    step_type: theory
    prompt: 'An advertisement pops up on the phone: “URGENT! Your phone is in danger! Download our antivirus right now, otherwise
      hackers will steal all your photos, passwords and correspondence! 30 seconds left!”'
  - step_id: sc9_98
    source_step_id: '98'
    scene_id: sc9
    step_type: open_question
    prompt: Как отреагировать? Какой мотив у этой рекламы?
  - step_id: sc9_99
    source_step_id: '99'
    scene_id: sc9
    step_type: theory
    prompt: 'My option: “Stop. The timer is pressure. Are hackers exactly waiting for these 30 seconds? No. Are there other
      antiviruses? That''s enough. The motive is to sell your product. I close the window and ask my parents which antivirus
      is normal.”'
  - step_id: sc9_100
    source_step_id: '100'
    scene_id: sc9
    step_type: theory
    prompt: 'You have a rare card. A classmate wants to exchange, you don’t want to. He puffs out his cheeks: “If you don’t
      exchange, I’ll tell everyone that you’re greedy. No one will change with you. Never at all. Until the end of school."'
  - step_id: sc9_101
    source_step_id: '101'
    scene_id: sc9
    step_type: open_question
    prompt: How to answer? What type of intimidation and what is the motive?
  - step_id: sc9_102
    source_step_id: '102'
    scene_id: sc9
    step_type: theory
    prompt: 'My version: “The mask is loneliness. Motive - he wants my card. Is it really NOBODY and NEVER? “Until the end
      of school” is a favorite exaggeration. My friends are not friends with me because of the cards. And the exchange is
      voluntary.”'
  - step_id: sc9_103
    source_step_id: '103'
    scene_id: sc9
    step_type: theory
    prompt: 'Group project. You propose a topic about space, but Kirill wants about dinosaurs. Kirill states: “If we choose
      space, we will definitely fail! The teacher hates space! She''ll give us all bad grades! Because of you!'
  - step_id: sc9_104
    source_step_id: '104'
    scene_id: sc9
    step_type: open_question
    prompt: Как ответить Кириллу? Проверяем его аргумент!
    teacher_guidance: Как ответить Кириллу?
  - step_id: sc9_105
    source_step_id: '105'
    scene_id: sc9
    step_type: theory
    prompt: 'My option: “Stop. Does the teacher really “hate” space? How do you know? And are the grades really bad? Good
      grades are given for good work, the topic does not decide. Let''s ask the teacher instead of guessing."'
  - step_id: sc9_106
    source_step_id: '106'
    scene_id: sc9
    step_type: theory
    prompt: 'The last one! You don’t want to share your new pen—you just gave it to me yesterday. Your desk neighbor sighs
      dramatically: “Okay... When you need help with a task, remember this moment. No one will help the greedy. Remember."'
  - step_id: sc9_107
    source_step_id: '107'
    scene_id: sc9
    step_type: open_question
    prompt: How to answer? Is it true that no one will help?
  - step_id: sc9_108
    source_step_id: '108'
    scene_id: sc9
    step_type: theory
    prompt: 'My version: “Loneliness plus punishment. Are you sure no one will help because of the pen? Seriously? Help is
      not a commodity in exchange for a pen. I have a right to my things, and my friends have their own reasons to help. Ask
      politely and I’ll borrow it tomorrow.”'
- scene_id: sc10
  title: Exaggeration
  steps:
  - step_id: sc10_109
    source_step_id: '109'
    scene_id: sc10
    step_type: theory
    prompt: Today was a busy day - two lessons, two big topics. Let's put everything together so that it fits in our heads.
      Lesson one - "Scarecrow", distortion of other people's words. Lesson two - manipulation of fear. We repeat the main
      thing.
  - step_id: sc10_110
    source_step_id: '110'
    scene_id: sc10
    step_type: theory
    prompt: 'A bogeyman is when someone changes what you say to argue with a made-up version rather than the real one. Four
      ways: exaggeration, simplification, adding and changing meaning. A sign - you want to shout: “I didn’t say that!”'
  - step_id: sc10_111
    source_step_id: '111'
    scene_id: sc10
    step_type: theory
    prompt: 'Protection from a bogeyman is a clarification formula: “Let me clarify: I said that... and not that...” And in
      order to avoid making a bogeyman yourself, first retell the words of your interlocutor and ask: “Did I understand correctly?”'
  - step_id: sc10_112
    source_step_id: '112'
    scene_id: sc10
    step_type: theory
    prompt: 'Fear manipulation is when someone puts pressure on your emotions so that you obey without thinking. Four masks:
      health, loneliness, failure, punishment. But not every warning is manipulation! Some dangers are real.'
  - step_id: sc10_113
    source_step_id: '113'
    scene_id: sc10
    step_type: reflection
    prompt: 'Three filter questions: will this definitely happen? How likely is it? Are there other options? And the four
      steps of defense: stop, ask questions, ask for evidence, think about motives.'
    teacher_guidance: 'Three filter questions: will this definitely happen? How likely is it? Are there other options?'
  - step_id: sc10_114
    source_step_id: '114'
    scene_id: sc10
    step_type: theory
    prompt: Do you remember everything? Now - blitz! Quick questions on both topics. Whoever makes no mistakes is the master
      of the eighth day!
