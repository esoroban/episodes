lesson_id: lesson_8B
stage0_run_id: run_2026_03_15T05_25_49Z_lesson_10A_lesson_10B_lesson_11A_lesson_11B_lesson_12A_lesson_12B_lesson_13A_lesson_2A_lesson_2B_lesson_3A_lesson_5A_lesson_5B_lesson_6A_lesson_6B_lesson_7A_lesson_7B_lesson_8A_lesson_8B_lesson_9A_lesson_9B
source_lesson_id: lesson_8B
language: en
title: When They Scare You — Fear Manipulation
day: 8
slot: B
scenes:
- scene_id: sc1
  title: Familiar Scary Stories
  steps:
  - step_id: sc1_1
    source_step_id: '1'
    scene_id: sc1
    step_type: reflection
    prompt: 'Who hasn''t heard adults say things like: "If you don''t eat soup — you''ll get sick!" Or: "If you don''t share
      — no one will be your friend!" Or my favorite: "If you don''t buy now — you''ll regret it later!"'
  - step_id: sc1_2
    source_step_id: '2'
    scene_id: sc1
    step_type: theory
    prompt: All these phrases do the same thing — try to scare you. Not explain, not prove, but scare you. So you don't think,
      just obey. Fear is an excellent off-switch for the brain.
  - step_id: sc1_3
    source_step_id: '3'
    scene_id: sc1
    step_type: theory
    prompt: Remember we talked about three goals people persuade for? Facts, trust, and emotions. Well, fear is the most powerful
      emotion. When scared, you want to act immediately. Run, hide, agree — anything to stop being scared.
  - step_id: sc1_4
    source_step_id: '4'
    scene_id: sc1
    step_type: theory
    prompt: 'Imagine: you''re standing in a store. On the shelf — the last box of a constructor set. The seller says: "Buy
      now, won''t be here tomorrow, you''ll cry later!" Your heart races, your hands reach for your wallet… Wait. What if
      the store next door has twenty?'
  - step_id: sc1_5
    source_step_id: '5'
    scene_id: sc1
    step_type: theory
    prompt: 'Or: a classmate says "If you don''t come with us — you''re a coward!" And are you really a coward? Or did someone
      just push your fear button to control you? Today we''ll learn to tell real warnings from these tricks.'
  - step_id: sc1_6
    source_step_id: '6'
    scene_id: sc1
    step_type: theory
    prompt: But first — something important. Not all warnings are manipulation! "Don't touch a hot stove" — that's not manipulation,
      that's mom saving your fingers. "Don't cross on red" — also not a trick. There's a difference, and we'll find it.
  - step_id: sc1_7
    source_step_id: '7'
    scene_id: sc1
    step_type: theory
    prompt: This story about an ad that scared even the bravest will help. But let's do it in order — watch the scene!
- scene_id: sc2
  title: Scene — "Scary Ad"
  steps:
  - step_id: sc2_8
    source_step_id: '8'
    scene_id: sc2
    step_type: theory
    prompt: 'Dmitrik bursts into class waving his phone: "Guys, guys! I saw an ad! It says — if you don''t drink their yogurt,
      your bones become soft and you can''t run! I need to tell mom right away!"'
  - step_id: sc2_9
    source_step_id: '9'
    scene_id: sc2
    step_type: theory
    prompt: 'Masha turns pale: "Seriously?! I didn''t drink yogurt yesterday! And the day before! Maybe my bones are already
      soft?!" She feels her arm: "I think something cracked here…"'
  - step_id: sc2_10
    source_step_id: '10'
    scene_id: sc2
    step_type: theory
    prompt: 'Olenka calmly puts down her book: "Wait. Dmitrik, who wrote this?" "Well… the company that sells yogurt." "Ah.
      So the person who SELLS yogurt says you''re done without it. Remarkable coincidence, right?"'
  - step_id: sc2_11
    source_step_id: '11'
    scene_id: sc2
    step_type: theory
    prompt: 'Dmitrik thought: "Well, maybe it''s true? Maybe bones really weaken without yogurt?" Olenka: "Let''s check. Calcium
      is in cheese, cottage cheese, milk, fish, even broccoli. One yogurt isn''t the only source. You didn''t fall apart yesterday
      even though you ate a cutlet instead of yogurt, right?"'
  - step_id: sc2_12
    source_step_id: '12'
    scene_id: sc2
    step_type: theory
    prompt: 'Masha stops checking her arm: "So I don''t need to panic?" Olenka: "Masha, your bones survived three years on
      the bars. Think one missed yogurt will break them?" Everyone laughs.'
  - step_id: sc2_13
    source_step_id: '13'
    scene_id: sc2
    step_type: theory
    prompt: 'Dmitrik scratches his head: "So the ad just scared us to buy?" Olenka: "Exactly! Fear turns off your brain. And
      that''s what they want — for you to run to the store without thinking."'
  - step_id: sc2_14
    source_step_id: '14'
    scene_id: sc2
    step_type: single_choice
    prompt: Did the yogurt ad use fear honestly or dishonestly?
    options:
    - id: opt_1
      text: Honestly — it's really dangerous
    - id: opt_2
      text: Dishonestly — exaggerated to sell
    - id: opt_3
      text: Not sure
    options_count: 3
    correct_answer: opt_2
    explanation: Dishonestly! Bones won't fall apart from one missed yogurt. The ad blew up the danger to absurdity — as if
      the world would end without their little jar. Classic trick — scare and sell.
    explanation_status: implicit
- scene_id: sc3
  title: Four Types of Intimidation
  steps:
  - step_id: sc3_16
    source_step_id: '16'
    scene_id: sc3
    step_type: theory
    prompt: So they scare us — but how exactly? It turns out fear has four favorite masks. Four ways to pressure. And when
      you know them by sight — they lose their power. Let's break them down one by one.
  - step_id: sc3_17
    source_step_id: '17'
    scene_id: sc3
    step_type: theory
    prompt: The first type is a health threat. “If you don’t eat the soup, you’ll get sick!” “If you don’t wear a scarf, your
      throat will fall off!” The throat, of course, will not go anywhere - it is firmly attached. But it sounds scary, and
      you’re already reaching for a scarf, even if it’s plus twenty outside.
  - step_id: sc3_18
    source_step_id: '18'
    scene_id: sc3
    step_type: theory
    prompt: The second is the threat of loneliness. “If you don’t do like everyone else, no one will be friends with you!”
      This is the most painful type. Because friends are important. But true friends don't disappear because of one disagreement.
      If they disappear, it’s worth wondering whether they were real.
  - step_id: sc3_19
    source_step_id: '19'
    scene_id: sc3
    step_type: theory
    prompt: The third is the threat of failure. “If you don’t buy it now, you’ll regret it later!” “If you don’t sign up,
      you’ll be forever late!” Forever! It's as if life is a train that leaves only once. In fact, there is a full train schedule.
      But under pressure it seems like it's the last one.
  - step_id: sc3_20
    source_step_id: '20'
    scene_id: sc3
    step_type: theory
    prompt: 'And the fourth is the threat of punishment. “If you don’t do your homework, I’ll take your phone forever!” Forever
      is a favorite bullying word. Note: in all four types, someone puts pressure on emotions, not on reason.'
  - step_id: sc3_21
    source_step_id: '21'
    scene_id: sc3
    step_type: theory
    prompt: 'There are four masks of fear in total: health, loneliness, failure, punishment. Remember them - now we will determine
      which mask is on whom.'
- scene_id: sc4
  title: Yes, a contradiction
  steps:
  - step_id: sc4_22
    source_step_id: '22'
    scene_id: sc4
    step_type: theory
    prompt: Do you remember the four masks? Let's check! I read the phrase - you vote on what type of intimidation it is.
      Be careful - some masks hide well.
  - step_id: sc4_23
    source_step_id: '23'
    scene_id: sc4
    step_type: theory
    prompt: “If you don’t eat vegetables, you will grow up weak and sickly!”
  - step_id: sc4_24
    source_step_id: '24'
    scene_id: sc4
    step_type: single_choice
    prompt: What type of bullying?
    options:
    - id: opt_1
      text: What type of reasoning?
    - id: opt_2
      text: Fact
    - id: opt_3
      text: Logic
    - id: opt_4
      text: Source
    options_count: 4
    correct_answer: opt_1
    explanation: Health! “You’ll Grow Up Weak” is a classic. Vegetables are good for you, but one missed salad won't make
      your muscles fall off.
    explanation_status: implicit
  - step_id: sc4_26
    source_step_id: '26'
    scene_id: sc4
    step_type: theory
    prompt: “If you don’t support me, we are no longer friends!”
  - step_id: sc4_27
    source_step_id: '27'
    scene_id: sc4
    step_type: single_choice
    prompt: What type of attack?
    options:
    - id: opt_1
      text: Insult
    - id: opt_2
      text: Circumstances
    - id: opt_3
      text: '"You''re the same"'
    - id: opt_4
      text: Punishment
    options_count: 4
    correct_answer: opt_2
    explanation: Loneliness! Friendship is not a “stay or leave” deal. A true friend does not give ultimatums.
    explanation_status: implicit
  - step_id: sc4_29
    source_step_id: '29'
    scene_id: sc4
    step_type: instruction
    prompt: What did the student use?
  - step_id: sc4_30
    source_step_id: '30'
    scene_id: sc4
    step_type: single_choice
    prompt: Fact
    options:
    - id: opt_1
      text: Unreliable source
    - id: opt_2
      text: Attack on a person
    - id: opt_3
      text: Failure
    - id: opt_4
      text: Punishment
    options_count: 4
    correct_answer: opt_3
    explanation: Discovery — A New Dishonest Trick
    explanation_status: implicit
  - step_id: sc4_32
    source_step_id: '32'
    scene_id: sc4
    step_type: theory
    prompt: “Everyone will go to the party, and you will be left at home alone, like a forgotten umbrella in the hallway!”
  - step_id: sc4_33
    source_step_id: '33'
    scene_id: sc4
    step_type: single_choice
    prompt: What kind?
    options:
    - id: opt_1
      text: Health
    - id: opt_2
      text: What's wrong with Mykola's answer? What did Masha actually say?
    - id: opt_3
      text: Failure
    - id: opt_4
      text: Punishment
    options_count: 4
    correct_answer: opt_2
    explanation: 'Loneliness! They wrapped it up beautifully—a “forgotten umbrella”—but the essence is the same: they scare
      you with the loss of company. Or maybe at home - a book and silence. Not too bad.'
    explanation_status: implicit
  - step_id: sc4_35
    source_step_id: '35'
    scene_id: sc4
    step_type: theory
    prompt: “If you don’t learn the poem, you’ll get a bad grade and no tablet for the rest of the quarter!”
  - step_id: sc4_36
    source_step_id: '36'
    scene_id: sc4
    step_type: single_choice
    prompt: Scene — An Argument About the Excursion
    options:
    - id: opt_1
      text: Health
    - id: opt_2
      text: Loneliness
    - id: opt_3
      text: Failure
    - id: opt_4
      text: Punishment
    options_count: 4
    correct_answer: opt_4
    explanation: Punishment! A bad grade is a consequence, it happens. But “no tablet until the end of the quarter” is pressure
      through fear of loss.
    explanation_status: implicit
  - step_id: sc4_38
    source_step_id: '38'
    scene_id: sc4
    step_type: theory
    prompt: “If you don’t do exercises, you’ll barely walk in old age!”
  - step_id: sc4_39
    source_step_id: '39'
    scene_id: sc4
    step_type: single_choice
    prompt: What kind?
    options:
    - id: opt_1
      text: Exactly how did Dmitrik change Vitya's words? What did Vitya say, and what did it turn into?
    - id: opt_2
      text: Loneliness
    - id: opt_3
      text: Why did the class laugh? And why was it so hard for Vitya to respond?
    - id: opt_4
      text: Punishment
    options_count: 4
    correct_answer: opt_1
    explanation: How to Recognize a Scarecrow — 4 Distortion Methods
    explanation_status: implicit
  - step_id: sc4_41
    source_step_id: '41'
    scene_id: sc4
    step_type: theory
    prompt: “If you don’t sign up for the club now, the places will run out and you’ll miss the whole year!”
  - step_id: sc4_42
    source_step_id: '42'
    scene_id: sc4
    step_type: single_choice
    prompt: What kind?
    options:
    - id: opt_1
      text: Health
    - id: opt_2
      text: Loneliness
    - id: opt_3
      text: Failure
    - id: opt_4
      text: Punishment
    options_count: 4
    correct_answer: opt_3
    explanation: Failure! “You’ll miss the whole year”—the pressure of urgency. Maybe space really is limited. But “the whole
      year was lost” is an exaggeration. There are other mugs and other sets.
    explanation_status: implicit
- scene_id: sc5
  title: Scare yourself!
  steps:
  - step_id: sc5_44
    source_step_id: '44'
    scene_id: sc5
    step_type: theory
    prompt: And now - the task is the opposite! I give you a topic and type of intimidation, and you come up with a scary
      phrase. Yes, yes, now you will be manipulators. To defeat a technique, you need to be able to create it!
  - step_id: sc5_45
    source_step_id: '45'
    scene_id: sc5
    step_type: open_question
    prompt: A friend doesn't want to go to the school concert. The view is loneliness. Come up with a phrase that will scare
      him of loneliness!
  - step_id: sc5_46
    source_step_id: '46'
    scene_id: sc5
    step_type: theory
    prompt: 'For example: “Everyone will go, and you will sit alone at home, and then everyone will discuss how cool it was,
      and you won’t even understand what they are talking about!” Do you recognize the mask? Loneliness plus the fear of “falling
      out of the company.”'
  - step_id: sc5_47
    source_step_id: '47'
    scene_id: sc5
    step_type: open_question
    prompt: Practice — Scarecrow or Not?
  - step_id: sc5_48
    source_step_id: '48'
    scene_id: sc5
    step_type: theory
    prompt: 'For example: “The brain doesn’t work without porridge! You’ll come to school and forget your name!” He will forget
      his name - this is, of course, a masterpiece of exaggeration. But it sounds convincing, right?'
  - step_id: sc5_49
    source_step_id: '49'
    scene_id: sc5
    step_type: open_question
    prompt: A friend doesn’t want to sign up for a math olympiad. Kind of a failure. Put pressure on the fear of missed opportunities!
  - step_id: sc5_50
    source_step_id: '50'
    scene_id: sc5
    step_type: theory
    prompt: 'For example: “If you don’t go, you’ll miss your only chance to get into the best school, and then you’ll regret
      it all your life!” “One chance” and “lifetime” are two favorite words for threats of failure.'
  - step_id: sc5_51
    source_step_id: '51'
    scene_id: sc5
    step_type: open_question
    prompt: Your sister doesn't want to clean her room. She looks punished. Come up with the scariest threat!
  - step_id: sc5_52
    source_step_id: '52'
    scene_id: sc5
    step_type: theory
    prompt: 'For example: “Mom will see this mess, take the tablet, cancel your birthday and send you to grandma for the whole
      summer!” Three punishments in one phrase is no longer a threat, it’s a disaster series.'
  - step_id: sc5_53
    source_step_id: '53'
    scene_id: sc5
    step_type: theory
    prompt: Did you notice? When you come up with it yourself, you can immediately see how it works. You take a topic, blow
      the consequences out of proportion, add “forever” or “never” - and you’re done. Now, when you hear this in life, you
      will recognize the trick from the inside.
- scene_id: sc6
  title: 'Said: "I like cats." Accused of saying: "You like domestic animals that meow."'
  steps:
  - step_id: sc6_54
    source_step_id: '54'
    scene_id: sc6
    step_type: theory
    prompt: 'We learned the four masks of fear and even became manipulators ourselves. But here''s the problem: sometimes
      they scare us for a reason! “Don’t touch the hot pan” is not manipulation, it’s mom saving your hands. How to distinguish?'
  - step_id: sc6_55
    source_step_id: '55'
    scene_id: sc6
    step_type: theory
    prompt: The word “manipulation” sounds mature, but the essence is simple. Manipulation is when someone puts pressure on
      your feelings so that you do what they want and not you. It doesn’t explain, it doesn’t prove, it just scares you until
      you give up.
  - step_id: sc6_56
    source_step_id: '56'
    scene_id: sc6
    step_type: theory
    prompt: But a real warning is when a person cares about you and the danger really exists. The difference is honesty. The
      actual warning can be verified. Manipulation - crumbles from the first question.
  - step_id: sc6_57
    source_step_id: '57'
    scene_id: sc6
    step_type: theory
    prompt: 'And here are three magic filter questions for you. First: “Is this DEFINITELY going to happen or just MAYBE?”
      If someone says “you’ll definitely get sick,” this is almost always an exaggeration. “Exactly” is very rare in life.'
  - step_id: sc6_58
    source_step_id: '58'
    scene_id: sc6
    step_type: theory
    prompt: 'Second question: “How LIKELY is this?” It''s one thing to burn yourself on a stove. This is very likely, the
      stove is hot. Another thing is “without our yogurt, the bones will fall apart.” The odds are about the same as meeting
      a unicorn in the school cafeteria.'
  - step_id: sc6_59
    source_step_id: '59'
    scene_id: sc6
    step_type: theory
    prompt: 'Third: “Are there OTHER options?” Is there only calcium in this yogurt? No - in cheese, cottage cheese, milk.
      Is this game only in this store? No - there is the Internet, other stores, sales. If there are options, then you are
      being rushed in vain.'
  - step_id: sc6_60
    source_step_id: '60'
    scene_id: sc6
    step_type: theory
    prompt: 'Three questions: is it accurate, how likely is it, are there other options. Do you remember? Now let''s check
      it in practice!'
- scene_id: sc7
  title: Scarecrow
  steps:
  - step_id: sc7_61
    source_step_id: '61'
    scene_id: sc7
    step_type: theory
    prompt: 'Three filter questions are ready. Now - eight stories from life. In each, someone warns someone. Your task is
      to pass through the filters and determine: real or manipulation?'
  - step_id: sc7_62
    source_step_id: '62'
    scene_id: sc7
    step_type: single_choice
    prompt: 'Grandmother looks out the window: minus fifteen, wind, snow is flying horizontally. The grandson is going out
      wearing a light jacket. “Wear warm clothes - it’s freezing outside and you might get sick.”'
    options:
    - id: opt_1
      text: Scarecrow or not?
    - id: opt_2
      text: Correctly
    options_count: 2
    correct_answer: opt_1
    explanation: Real! Frost is checked with a thermometer. The likelihood of catching a cold is high. Grandma doesn't sell
      a jacket - she takes care of you.
    explanation_status: implicit
  - step_id: sc7_64
    source_step_id: '64'
    scene_id: sc7
    step_type: single_choice
    prompt: 'Styopa wants to write off the test. You doubt it. Styopa whispers: “If you don’t let me, I’ll tell everyone that
      you’re afraid of spiders, and no one will be friends with you!”'
    options:
    - id: opt_1
      text: Real
    - id: opt_2
      text: Scarecrow or not?
    options_count: 2
    correct_answer: opt_2
    explanation: Manipulation! Will everyone really stop being friends because of spiders? No. Real friends don't blackmail.
      This is pure pressure from loneliness.
    explanation_status: present
  - step_id: sc7_66
    source_step_id: '66'
    scene_id: sc7
    step_type: single_choice
    prompt: 'Dad sees his daughter running on the wet tiles by the pool. He shouts: “Don’t run, you’ll slip and hurt your
      knee!”'
    options:
    - id: opt_1
      text: Real
    - id: opt_2
      text: Manipulation
    options_count: 2
    correct_answer: opt_1
    explanation: Real! Wet tiles are slippery - that's physics. Dad is not trying to control you, but is saving your knee.
    explanation_status: implicit
  - step_id: sc7_68
    source_step_id: '68'
    scene_id: sc7
    step_type: single_choice
    prompt: 'Advertising on the Internet: “Today only! Last three sets! If you don’t buy it, you’ll never collect this collection
      again! Your friends have already bought, and you’ll be left behind!”'
    options:
    - id: opt_1
      text: Scarecrow
    - id: opt_2
      text: Manipulation
    options_count: 2
    correct_answer: opt_2
    explanation: Manipulation! The triple whammy of failure, loneliness and urgency. Are they the last ones? Hardly. Did your
      friends buy it? Not a fact. Other options? Of course - wait for a discount or another store.
    explanation_status: present
  - step_id: sc7_70
    source_step_id: '70'
    scene_id: sc7
    step_type: single_choice
    prompt: 'The coach says before the competition: “Warm up properly - without warming up, you can pull a muscle and the
      performance will fail.”'
    options:
    - id: opt_1
      text: Correctly
    - id: opt_2
      text: Scarecrow
    options_count: 2
    correct_answer: opt_1
    explanation: Correctly! "Noisy" and "too loud" are almost the same thing. The meaning is preserved, no distortions.
    explanation_status: present
  - step_id: sc7_72
    source_step_id: '72'
    scene_id: sc7
    step_type: single_choice
    prompt: 'A high school student in the schoolyard: “If you don’t join our group, no one will protect you. Then go alone."'
    options:
    - id: opt_1
      text: Scarecrow or not?
    - id: opt_2
      text: Correctly
    options_count: 2
    correct_answer: opt_2
    explanation: Manipulation! Loneliness plus a hint of danger. Is it really no one? No - there are teachers, friends, family.
      It's pressure to conform.
    explanation_status: present
  - step_id: sc7_74
    source_step_id: '74'
    scene_id: sc7
    step_type: single_choice
    prompt: 'Mom says: “Don’t eat unwashed berries from the market - they may have bacteria on them, and your stomach will
      hurt.”'
    options:
    - id: opt_1
      text: Real
    - id: opt_2
      text: Scarecrow or not?
    options_count: 2
    correct_answer: opt_1
    explanation: Real! “Maybe” is an honest formulation. Mom doesn't exaggerate and doesn't sell you soap. Bacteria on unwashed
      berries is a fact.
    explanation_status: implicit
  - step_id: sc7_76
    source_step_id: '76'
    scene_id: sc7
    step_type: single_choice
    prompt: 'A friend says: “If you don’t wear the same dress as ours, we won’t take you in the photo, and everyone will see
      that you’re not there!”'
    options:
    - id: opt_1
      text: Real
    - id: opt_2
      text: Manipulation
    options_count: 2
    correct_answer: opt_2
    explanation: Manipulation! Loneliness plus failure. Real friends take pictures together in anything. And if not, three
      questions will quickly bring the focus to clear water.
    explanation_status: present
- scene_id: sc8
  title: Correctly
  steps:
  - step_id: sc8_78
    source_step_id: '78'
    scene_id: sc8
    step_type: theory
    prompt: We have learned to recognize manipulation. But what do you do when you're feeling scared right now? There are
      four steps. The first and most important thing is STOP. Don't react right away. Fear forces you to act quickly - and
      this is exactly what a manipulator needs.
  - step_id: sc8_79
    source_step_id: '79'
    scene_id: sc8
    step_type: theory
    prompt: 'The second step is ASK THREE QUESTIONS. The same ones: will this really happen? How likely is it? Are there other
      options? Fear doesn''t like questions. It''s like a soap bubble - beautiful, but it bursts at the first touch.'
  - step_id: sc8_80
    source_step_id: '80'
    scene_id: sc8
    step_type: theory
    prompt: Third - ASK FOR PROOF. “How do you know this?” “Why are you so sure?” “Where can I check?” If a person stammers,
      most likely there is no evidence. He just hoped you would get scared and not ask.
  - step_id: sc8_81
    source_step_id: '81'
    scene_id: sc8
    step_type: reflection
    prompt: And fourth - THINK ABOUT YOUR MOTIVES. Why is this man scaring me? Wants to sell a product? Wants me to do it
