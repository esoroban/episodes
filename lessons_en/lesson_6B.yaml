- scene_id: sc2
  title: 'Practice: beautiful return'
  steps:
  - step_id: sc2_22
    source_step_id: '22'
    scene_id: sc2
    step_type: theory
    prompt: Great, we remember the turn signals! Now let's check the second superpower - back to the question. I will show
      the question and the turn signal answer. And you choose beautiful ways to return to the topic. There may be several
      correct answers - mark all that apply!
  - step_id: sc2_23
    source_step_id: '23'
    scene_id: sc2
    step_type: theory
    prompt: 'Question: “Did you like the concert?” Answer: “Did you know that a guitar has six strings?”'
  - step_id: sc2_24
    source_step_id: '24'
    scene_id: sc2
    step_type: multi_choice
    prompt: How to get back on topic?
    options:
    - id: opt_1
      text: “It’s interesting about the guitar, but did you like the concert?”
    - id: opt_2
      text: “You’re not even listening to what I’m asking!”
    - id: opt_3
      text: “Cool about the strings! How was the concert?”
    options_count: 3
    correct_answer:
    - opt_1
    - opt_3
    explanation: Two beautiful returns! The first one acknowledges what was said and repeats the question. The third one is
      the same, only shorter and with a smile. And the second is a collision. The person will shut down and not want to answer
      at all.
    explanation_status: implicit
  - step_id: sc2_26
    source_step_id: '26'
    scene_id: sc2
    step_type: theory
    prompt: 'Question: “Can I go to Sasha?” Answer: “Oh, Sasha! His mother bakes such pies!”'
  - step_id: sc2_27
    source_step_id: '27'
    scene_id: sc2
    step_type: multi_choice
    prompt: How to return?
    options:
    - id: opt_1
      text: “Pies are great! But can I go?”
    - id: opt_2
      text: “Enough about pies! Answer!”
    - id: opt_3
      text: “Answer normally!”
    - id: opt_4
      text: “Yes, the pies are delicious! Is that possible?
    options_count: 4
    correct_answer:
    - opt_1
    - opt_4
    explanation: The first and fourth are beautiful. Both acknowledge the pies and calmly return the question. And “that’s
      enough” and “answer normally” are attacks. After them, instead of an answer, you will get another quarrel.
    explanation_status: implicit
  - step_id: sc2_29
    source_step_id: '29'
    scene_id: sc2
    step_type: theory
    prompt: 'Question: “Did you break the cup?” Answer: “This cup was not pretty at all!”'
  - step_id: sc2_30
    source_step_id: '30'
    scene_id: sc2
    step_type: multi_choice
    prompt: How to return?
    options:
    - id: opt_1
      text: “You’re always breaking something!”
    - id: opt_2
      text: “It may not be pretty, but I asked, did you break it?”
    - id: opt_3
      text: “I understand, but still, did you break it?”
    options_count: 3
    correct_answer:
    - opt_2
    - opt_3
    explanation: The second and third are soft, respectful returns. And the first is an accusation. The person will begin
      to defend himself, and you will never know the truth.
    explanation_status: implicit
  - step_id: sc2_32
    source_step_id: '32'
    scene_id: sc2
    step_type: theory
    prompt: 'Question: “Have you prepared a report?” Answer: “The topic is generally complex, even scientists argue!”'
  - step_id: sc2_33
    source_step_id: '33'
    scene_id: sc2
    step_type: multi_choice
    prompt: How to return?
    options:
    - id: opt_1
      text: “The topic is really complicated! But is the report ready?
    - id: opt_2
      text: “Don’t dodge!”
    - id: opt_3
      text: “Interesting about scientists! How’s your report going?”
    - id: opt_4
      text: “You always find excuses!”
    options_count: 4
    correct_answer:
    - opt_1
    - opt_3
    explanation: The first and third are beautiful. We acknowledge the complexity of the topic, do not attack, but repeat
      the question. “Don’t evade” and “always make excuses” are attacks. Even if it’s true, after this the person will not
      answer, but will be offended.
    explanation_status: implicit
  - step_id: sc2_35
    source_step_id: '35'
    scene_id: sc2
    step_type: theory
    prompt: 'Question: “Have you apologized to Katya?” Answer: “And Katya was the first to start!”'
  - step_id: sc2_36
    source_step_id: '36'
    scene_id: sc2
    step_type: multi_choice
    prompt: How to return?
    options:
    - id: opt_1
      text: “Maybe she started, but I asked - did you apologize?”
    - id: opt_2
      text: “It’s always like this - everyone is to blame except you!”
    - id: opt_3
      text: “I understand that it is difficult. But you apologized?”
    options_count: 3
    correct_answer:
    - opt_1
    - opt_3
    explanation: First and third again! Notice the formula? We acknowledge what the person said and calmly repeat the question.
      No accusations, no shouting. The scout does not attack - he simply returns to the target. This is how polite persistence
      works.
    explanation_status: implicit
- scene_id: sc3
  title: 'Discovery: Word Traps'
  steps:
  - step_id: sc3_38
    source_step_id: '38'
    scene_id: sc3
    step_type: theory
    prompt: 'Who has heard such phrases: “Everyone does this!”, “You never listen to me!”, “It always happens like this!”
      Sound familiar?'
  - step_id: sc3_39
    source_step_id: '39'
    scene_id: sc3
    step_type: instruction
    prompt: Think about it - is it true that EVERYONE does this? Or do you NEVER listen? Or does this ALWAYS happen?
  - step_id: sc3_40
    source_step_id: '40'
    scene_id: sc3
    step_type: theory
    prompt: 'Usually - no! When someone says “everyone,” “nobody,” “always,” “never,” it’s almost always an exaggeration.
      And this is a red flag. Like a traffic light: stop, check, don’t rush to agree. “Everyone believes”, “everyone talks”,
      “everyone knows” - stop! Who is this “everyone”? Name at least three.'
  - step_id: sc3_41
    source_step_id: '41'
    scene_id: sc3
    step_type: theory
    prompt: 'I''ll tell you a story. One boy, Artyom, came to his mother and said: “Mom, EVERYONE in the class already has
      a new phone! I’m the only one!” Mom asked: “Who is everyone?” Artyom thought: “Well... Vlad. And Nastya. And... well,
      maybe someone else.” Mom says: “So two out of thirty people is “all”?” Artyom blushed. Two is not everything. Two is
      two.'
  - step_id: sc3_42
    source_step_id: '42'
    scene_id: sc3
    step_type: theory
    prompt: 'And then the next day Nastya said: “NO ONE wants to play badminton!” Artyom already knew the trick. He asked:
      “Nobody—who exactly is this?” Nastya thought: “Well... Vlad doesn’t want to. And Dasha." And Artyom said: “I want to!”
      And Misha wants it!” So much for “nobody.”'
  - step_id: sc3_43
    source_step_id: '43'
    scene_id: sc3
    step_type: theory
    prompt: 'Artyom understood the main thing: when you hear “everyone” or “nobody” - this is a red flag. Ask: “Who exactly?”
      And it will almost always turn out that “everyone” is two or three people, and “no one” is just those who were asked.'
  - step_id: sc3_44
    source_step_id: '44'
    scene_id: sc3
    step_type: theory
    prompt: 'Four dangerous words - remember: “EVERYONE”, “NO ONE”, “ALWAYS”, “NEVER”. As soon as you hear one of them, turn
      on the red flag!'
  - step_id: sc3_45
    source_step_id: '45'
    scene_id: sc3
    step_type: theory
    prompt: And now - classic examples. You've definitely heard such phrases - from friends, parents, from advertising. They
      sound convincing, but inside there is a trap.
  - step_id: sc3_46
    source_step_id: '46'
    scene_id: sc3
    step_type: theory
    prompt: “No one will refuse to go to the sea!” Is it true? And those who love mountains? Some people dream of camping
      with a tent, not the beach. Some people don’t know how to swim at all and the sea is stressful for them. So it’s not
      “nobody”, but “many people like it.”
  - step_id: sc3_47
    source_step_id: '47'
    scene_id: sc3
    step_type: theory
    prompt: “Nobody goes on vacation in winter!” Tell that to the skiers! For them, winter is the best time. Snow, mountains,
      speed. They wait all year for winter vacation. “Nobody” is a red flag.
  - step_id: sc3_48
    source_step_id: '48'
    scene_id: sc3
    step_type: theory
    prompt: '“They always lie on the Internet!” Hm. What about Wikipedia? What about the weather forecast? What about the
      train schedule? Not always. It would be more correct: “Sometimes there are lies on the Internet” - but this doesn’t
      sound so scary anymore.'
  - step_id: sc3_49
    source_step_id: '49'
    scene_id: sc3
    step_type: theory
    prompt: “Everything was better before!” What is that all? Medicine? Previously, teeth were treated without pain relief.
      Transport? Previously, it took three days to get to my grandmother in the village on horseback. “Everything” is too
      much. Some were better, some were worse.
  - step_id: sc3_50
    source_step_id: '50'
    scene_id: sc3
    step_type: theory
    prompt: '"You can''t trust anyone!" No one at all? Mom? Best friend? To the doctor? If this were true, we would each live
      in our own cave and not talk. More correctly: “Not everyone should be trusted right away.”'
  - step_id: sc3_51
    source_step_id: '51'
    scene_id: sc3
    step_type: theory
    prompt: 'Did you notice? The reception is the same. You hear “everyone / no one / always / never” - ask the question:
      “Is it really all? Give examples." Or “Really never? What about this?” One exception is enough for the generalization
      to fall apart.'
  - step_id: sc3_52
    source_step_id: '52'
    scene_id: sc3
    step_type: theory
    prompt: 'And the main thing is what to do when they tell YOU this. Don''t shout "You''re lying!" And calmly ask: “Who
      is everyone?” or “Always - and when was the last time?” Just a question and the trap is broken.'
- scene_id: sc4
  title: STORY - NOBODY LOVES BROCCOLI?
  steps:
  - step_id: sc4_53
    source_step_id: '53'
    scene_id: sc4
    step_type: theory
    prompt: 'Now listen to an interesting story about word traps. Consider: how many times will the heroes fall into a trap?'
  - step_id: sc4_54
    source_step_id: '54'
    scene_id: sc4
    step_type: theory
    prompt: 'Dmitry declares to the whole class: “Nobody likes broccoli! This is the most disgusting food in the world! Everyone
      nods. But then Masha raises her hand.'
  - step_id: sc4_55
    source_step_id: '55'
    scene_id: sc4
    step_type: theory
    prompt: '“I love broccoli,” says Masha. Olenka adds: “Me too!” Dmitry blinks: “Well... almost no one likes.” Then: “Okay...
      most people don’t like it!”'
  - step_id: sc4_56
    source_step_id: '56'
    scene_id: sc4
    step_type: theory
    prompt: 'Mikola laughs: “Dmitrik, you just changed the words three times! First “no one”, then “almost no one”, then “most”.
      These are completely different things!”'
  - step_id: sc4_57
    source_step_id: '57'
    scene_id: sc4
    step_type: theory
    prompt: 'And Vitya asks: “Wait - what is broccoli?” Everyone laughs. One word - and everyone understands it differently!'
  - step_id: sc4_58
    source_step_id: '58'
    scene_id: sc4
    step_type: open_question
    prompt: What happened in history? What word traps have you noticed?
  - step_id: sc4_59
    source_step_id: '59'
    scene_id: sc4
    step_type: theory
    prompt: Great! Now let's take a closer look.
  - step_id: sc4_60
    source_step_id: '60'
    scene_id: sc4
    step_type: open_question
    prompt: What word did Dmitry use most often? And why did it turn out to be untrue?
  - step_id: sc4_61
    source_step_id: '61'
    scene_id: sc4
    step_type: theory
    prompt: Exactly - the word “everything”. And every time there was someone who proved the opposite. One exception and “everything”
      falls apart.
  - step_id: sc4_62
    source_step_id: '62'
    scene_id: sc4
    step_type: open_question
    prompt: What did Dmitry do when they showed him that he was wrong? How did he change the wording?
  - step_id: sc4_63
    source_step_id: '63'
    scene_id: sc4
    step_type: theory
    prompt: 'He retreated: “well... almost all... well... many...” This is the right way! Instead of “everything,” be more
      precise. “Many” or “majority” are more honest and stronger.'
  - step_id: sc4_64
    source_step_id: '64'
    scene_id: sc4
    step_type: open_question
    prompt: What was wrong at the very end of history? What happened to one word that the characters understood differently?
  - step_id: sc4_65
    source_step_id: '65'
    scene_id: sc4
    step_type: theory
    prompt: This is the second trap. One word, and everyone understands it differently. But more on that a little later. Let's
      practice generalizations first!
- scene_id: sc5
  title: 'Practice: generalization'
  steps:
  - step_id: sc5_66
    source_step_id: '66'
    scene_id: sc5
    step_type: theory
    prompt: 'Now let''s check! I read a statement - and you determine: is this a true generalization or can an exception be
      found?'
  - step_id: sc5_67
    source_step_id: '67'
    scene_id: sc5
    step_type: single_choice
    prompt: '"All birds can fly."'
    options:
    - id: opt_1
      text: That's right - there are no exceptions
    - id: opt_2
      text: False - there is an exception
    options_count: 2
    correct_answer: opt_2
    explanation: Wrong! Penguins, ostriches, kiwis do not fly. The penguin is generally a better swimmer than most fish. But
      flying is not his story.
    explanation_status: present
  - step_id: sc5_69
    source_step_id: '69'
    scene_id: sc5
    step_type: single_choice
    prompt: '"No one can jump to the moon."'
    options:
    - id: opt_1
      text: That's right - there are no exceptions
    - id: opt_2
      text: False - there is an exception
    options_count: 2
    correct_answer: opt_1
    explanation: Right! This is physically impossible. Here “nobody” is my word of honor. Sometimes generalization works!
    explanation_status: present
  - step_id: sc5_71
    source_step_id: '71'
    scene_id: sc5
    step_type: single_choice
    prompt: '"Teachers are always right."'
    options:
    - id: opt_1
      text: That's right - there are no exceptions
    - id: opt_2
      text: False - there is an exception
    options_count: 2
    correct_answer: opt_2
    explanation: Wrong! Teachers are people too. They may get the date wrong, get the name mixed up, or count incorrectly.
      “Often right” - yes. "Always" is not.
    explanation_status: present
  - step_id: sc5_73
    source_step_id: '73'
    scene_id: sc5
    step_type: single_choice
    prompt: '"All cats are afraid of water."'
    options:
    - id: opt_1
      text: That's right - there are no exceptions
    - id: opt_2
      text: False - there is an exception
    options_count: 2
    correct_answer: opt_2
    explanation: Wrong! The Turkish Van is a cat breed that loves to swim. And some domestic cats sit quietly in the shower.
      Not all, but there are exceptions - which means “all” is wrong.
    explanation_status: present
  - step_id: sc5_75
    source_step_id: '75'
    scene_id: sc5
    step_type: single_choice
    prompt: “It’s always cold in winter.”
    options:
    - id: opt_1
      text: That's right - there are no exceptions
    - id: opt_2
      text: False - there is an exception
    options_count: 2
    correct_answer: opt_2
    explanation: Wrong! In Australia, winter is summer. There in July people go to the beach. And even here we have warm winter
      days. “Usually cold” is more accurate.
    explanation_status: present
  - step_id: sc5_77
    source_step_id: '77'
    scene_id: sc5
    step_type: single_choice
    prompt: '"Nobody likes doing homework."'
    options:
    - id: opt_1
      text: That's right - there are no exceptions
    - id: opt_2
      text: False - there is an exception
    options_count: 2
    correct_answer: opt_2
    explanation: Wrong! Some people love drawing, others love math problems. “Many people don’t like it” - maybe. But "nobody"?
      There is at least one homework fan in every class.
    explanation_status: present
  - step_id: sc5_79
    source_step_id: '79'
    scene_id: sc5
    step_type: single_choice
    prompt: '"All people breathe air."'
    options:
    - id: opt_1
      text: That's right - there are no exceptions
    - id: opt_2
      text: False - there is an exception
    options_count: 2
    correct_answer: opt_1
    explanation: Right! Here's another honest summary. Without air - nothing. “Everything” works here.
    explanation_status: present
  - step_id: sc5_81
    source_step_id: '81'
    scene_id: sc5
    step_type: single_choice
    prompt: '"Girls never play football."'
    options:
    - id: opt_1
      text: That's right - there are no exceptions
    - id: opt_2
      text: False - there is an exception
    options_count: 2
    correct_answer: opt_2
    explanation: Wrong! Women's football is an Olympic sport. Millions of girls play football around the world. “Never” is
      a red flag!
    explanation_status: present
  - step_id: sc5_83
    source_step_id: '83'
    scene_id: sc5
    step_type: theory
    prompt: 'Notice a pattern? The generalization is almost always wrong. But sometimes it is true - as with the Moon and
      the air. Therefore, we check every time: is there at least one exception?'
- scene_id: sc6
  title: Substitution of concepts
  steps:
  - step_id: sc6_84
    source_step_id: '84'
    scene_id: sc6
    step_type: theory
    prompt: New trap! Listen to the stories - each one contains the same trick.
  - step_id: sc6_85
    source_step_id: '85'
    scene_id: sc6
    step_type: theory
    prompt: 'The first story is “Freedom”. There is an argument in class. Dima: “We must have freedom!” The teacher decided
      to try. Dima immediately began running around the class, shouting and throwing papers. The teacher made a remark. Dima:
      “But we agreed - freedom!” Teacher: “Freedom is the right to choose, not chaos.” Dima: “No, freedom is when nothing
      is forbidden to me!” One word - “freedom”. And there are already two meanings.'
  - step_id: sc6_86
    source_step_id: '86'
    scene_id: sc6
    step_type: theory
    prompt: 'The second story is “Friend”. Sasha: “A true friend always shares.” Ira didn’t let me write it off. Sasha: “You
      are not a real friend!” Ira: “I listen to you, help, support.” Sasha: “No, a friend is someone who shares.” First, “friend”
      - support, trust. And then - only “let me write it off.” The rule changed on the fly.'
  - step_id: sc6_87
    source_step_id: '87'
    scene_id: sc6
    step_type: theory
    prompt: '"Respect". Dad: “You must respect your elders.” Son: “I respect - I don’t shout or be rude.” Dad: “No, respect
      means obeying without question.” First, “respect” is politeness. Then - complete submission. But the word is the same.'
  - step_id: sc6_88
    source_step_id: '88'
    scene_id: sc6
    step_type: theory
    prompt: '"Honesty". Mom: “It’s important to be honest.” Child: “Then I’ll honestly say: your soup is tasteless.” Mom:
      “That’s rude!” Child: “But you said to be honest!” Honesty as sincerity and honesty with tact are two different things.
      And one word.'
  - step_id: sc6_89
    source_step_id: '89'
    scene_id: sc6
    step_type: theory
    prompt: '"Successful". Blogger: “Successful people get up at five in the morning.” Petya: “My dad gets up at eight and
      is successful.” Blogger: “So he’s not really successful.” Petya: “What does successful mean?” Blogger: “The one who
      earns a lot.” Petya: “And earlier you said - the one who gets up early.” First, “successful” is the daily routine. Then
      - money. Definition jumps as it suits him.'
  - step_id: sc6_90
    source_step_id: '90'
    scene_id: sc6
    step_type: theory
    prompt: '"Responsible". Teacher: “A responsible student does his homework on time.” Vanya did it, but forgot the notebook
      at home. Teacher: “You are irresponsible.” Vanya: “I did it!” Teacher: “The responsible one is the one who brings everything.”
      The word has become wider than at the beginning.'
  - step_id: sc6_91
    source_step_id: '91'
    scene_id: sc6
    step_type: theory
    prompt: '"Justice". The teacher divides the candies equally. One student: “This is unfair! I tried harder!” Teacher: “Fair
      is equal.” Student: “No, it’s fair - it’s just what it deserves.” One word - two different principles. And both are
      sure that they are right.'
  - step_id: sc6_92
    source_step_id: '92'
    scene_id: sc6
    step_type: theory
    prompt: 'And now - a classic! “It was raining and there were two students. One is going to university, the other is wearing
      galoshes.” Do you sense a catch? The word “was falling” is used in three senses: it was raining - it was falling. The
      student was walking - heading somewhere. And the second one was walking - he was dressed. Three meanings in one sentence!'
  - step_id: sc6_93
    source_step_id: '93'
    scene_id: sc6
    step_type: theory
    prompt: 'Or this: “Students who have tails and have not passed their languages ​​will be hanged on the second floor.”
      Tails - academic debts or... tails? Languages ​​- exams or... languages? And “hung” - the lists are hung on the wall.
      Three words - and each can be understood in two ways!'
  - step_id: sc6_94
    source_step_id: '94'
    scene_id: sc6
    step_type: theory
    prompt: 'Or an ad: “I am selling a blue stroller for a newborn.” Who is blue - the stroller or the newborn? One comma
      and the meaning changes completely.'
  - step_id: sc6_95
    source_step_id: '95'
    scene_id: sc6
    step_type: theory
    prompt: 'All these examples are about one thing. The word does not change, but its meaning quietly switches. This is called
      substitution of concepts. There is a special rule in logic - the law of identity: one word must retain the same meaning
      throughout the entire conversation. Violated - and the conversation fell apart.'
  - step_id: sc6_96
    source_step_id: '96'
    scene_id: sc6
    step_type: theory
    prompt: 'And defense is the magic question: “What exactly do you mean by...?” They asked, and the trap disappeared. Because
      now everyone is talking about the same thing.'
