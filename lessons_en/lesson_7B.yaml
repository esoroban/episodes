source_lesson_id: lesson_7B
language: en
title: Sufficient Ground and Personal Attack
day: 7
slot: B
scenes:
- scene_id: sc1
  title: Justification - concept
  steps:
  - step_id: sc1_1
    source_step_id: '1'
    scene_id: sc1
    step_type: theory
    prompt: 'Before the break, I promised that we would learn to ask the most powerful question in the world. Are you ready?
      Here it is: “Why do you think that?”'
  - step_id: sc1_2
    source_step_id: '2'
    scene_id: sc1
    step_type: theory
    prompt: Sounds simple, right? But this question is like an x-ray. It shines through any statement. If there is something
      real behind the words, the person will explain. And if not, it will become clear that the statement is empty.
  - step_id: sc1_3
    source_step_id: '3'
    scene_id: sc1
    step_type: theory
    prompt: 'Here''s an example. Someone says: “Vitamins are healthy.” OK. Why do you think so? "Because my older brother
      said so." Hmm... Is your brother a doctor? Scientist? Or did you just decide that? You see, one question and we already
      understand whether it’s worth believing.'
  - step_id: sc1_4
    source_step_id: '4'
    scene_id: sc1
    step_type: theory
    prompt: 'Each statement must be substantiated. This means: if you say something, explain why you think so. This is not
      rudeness or hitting. This is respect for the conversation.'
  - step_id: sc1_5
    source_step_id: '5'
    scene_id: sc1
    step_type: theory
    prompt: And justifications have three types - three reasons that make a statement strong. Now let's look at each one.
  - step_id: sc1_6
    source_step_id: '6'
    scene_id: sc1
    step_type: theory
    prompt: The first type is facts. Something that can be verified. “Several million people live in Kyiv” - this is a fact,
      you can see it in the statistics. “Water boils at one hundred degrees” is a fact that can be measured.
  - step_id: sc1_7
    source_step_id: '7'
    scene_id: sc1
    step_type: theory
    prompt: The second type is logic. A reflection that follows one from the other. “If it rains, it’s wet outside.” You don't
      need statistics here - just think.
  - step_id: sc1_8
    source_step_id: '8'
    scene_id: sc1
    step_type: theory
    prompt: The third type is a reliable source. Expert or verified information. “The doctor said you need to wash your hands”
      - the doctor knows about health, this is a reliable source. “The geography textbook says that the Earth is round” is
      also reliable.
  - step_id: sc1_9
    source_step_id: '9'
    scene_id: sc1
    step_type: theory
    prompt: But “just because,” “everyone says so,” “it seems to me” is not a justification. This is emptiness wrapped in
      words.
- scene_id: sc2
  title: 'Practice: what type of justification?'
  steps:
  - step_id: sc2_10
    source_step_id: '10'
    scene_id: sc2
    step_type: theory
    prompt: Now I'm reading a statement and three different explanations. Everyone sounds convincing. Your job is to determine
      which is fact, which is logic, and which is a reliable source. Sometimes they mix - be careful.
  - step_id: sc2_11
    source_step_id: '11'
    scene_id: sc2
    step_type: theory
    prompt: 'Statement: “You need to wear a seat belt in the car.” A: “Because in an accident, the belt holds the person.”
      B: “Statistics show that belted passengers are less likely to be injured.” Q: “The driving instructor teaches this way.”'
  - step_id: sc2_12
    source_step_id: '12'
    scene_id: sc2
    step_type: open_question
    prompt: Which explanation is fact, which is logic, which is source?
  - step_id: sc2_13
    source_step_id: '13'
    scene_id: sc2
    step_type: theory
    prompt: 'Analysis: A - logic, one follows from the other: if there is an accident, then without a belt it is more dangerous.
      B - fact, there is verifiable data. B is a reliable source, the instructor is a specialist.'
  - step_id: sc2_14
    source_step_id: '14'
    scene_id: sc2
    step_type: theory
    prompt: 'Statement: “You should brush your teeth twice a day.” A: “Dentists recommend this.” B: “If you don’t brush, caries
      may appear.” Q: “Studies show an increase in tooth decay with poor hygiene.”'
  - step_id: sc2_15
    source_step_id: '15'
    scene_id: sc2
    step_type: open_question
    prompt: 'Distribute: fact, logic, source.'
  - step_id: sc2_16
    source_step_id: '16'
    scene_id: sc2
    step_type: theory
    prompt: A is the source, dentists are specialists. B - logic, cause leads to effect. B - fact, link to research, can be
      verified.
  - step_id: sc2_17
    source_step_id: '17'
    scene_id: sc2
    step_type: theory
    prompt: 'Statement: “You can’t run on a wet floor.” A: “You could slip.” B: “It’s written in the school rules.” Q: “The
      coefficient of friction is lower on a wet floor.”'
  - step_id: sc2_18
    source_step_id: '18'
    scene_id: sc2
    step_type: open_question
    prompt: Where is what?
  - step_id: sc2_19
    source_step_id: '19'
    scene_id: sc2
    step_type: theory
    prompt: A - logic, wet means slippery. B - source, school rules. B is a fact, a physical property of a surface, that can
      be measured.
  - step_id: sc2_20
    source_step_id: '20'
    scene_id: sc2
    step_type: theory
    prompt: 'Statement: “You need to do your homework.” A: “The teacher said it was important.” B: “If you practice, knowledge
      is remembered better.” Q: “Students who do their homework are more likely to get high grades.”'
  - step_id: sc2_21
    source_step_id: '21'
    scene_id: sc2
    step_type: open_question
    prompt: Distribute!
  - step_id: sc2_22
    source_step_id: '22'
    scene_id: sc2
    step_type: theory
    prompt: A - source, teacher - specialist in teaching. B - logic, training leads to results. B is a fact that can be verified
      by statistics.
  - step_id: sc2_23
    source_step_id: '23'
    scene_id: sc2
    step_type: theory
    prompt: 'Statement: “You need to wear a hat in winter.” A: “Because it’s cold.” B: “At low temperatures, the body loses
      heat faster.” Q: “The doctor said that hypothermia is harmful.”'
  - step_id: sc2_24
    source_step_id: '24'
    scene_id: sc2
    step_type: open_question
    prompt: Last round - what type is everyone?
  - step_id: sc2_25
    source_step_id: '25'
    scene_id: sc2
    step_type: theory
    prompt: A - logic, but weak and incomplete, just “cold” without explaining the mechanism. B - fact, physiology, can be
      measured. B is the source, the doctor is a specialist.
  - step_id: sc2_26
    source_step_id: '26'
    scene_id: sc2
    step_type: theory
    prompt: Notice a pattern? Fact - can be verified by numbers or measured. Logic - one thing explains another. A source
      is a person or book that you have reason to trust. And a strong rationale often uses two or three types at once.
- scene_id: sc3
  title: 'Practice: what is the rationale?'
  steps:
  - step_id: sc3_27
    source_step_id: '27'
    scene_id: sc3
    step_type: theory
    prompt: 'Now the format is different. One statement - one justification. Vote: is this fact, logic or a reliable source?'
  - step_id: sc3_28
    source_step_id: '28'
    scene_id: sc3
    step_type: single_choice
    prompt: '"Ice is slippery." - “Because it has a smooth surface, and shoes grip worse.”'
    options:
    - id: opt_1
      text: Fact
    - id: opt_2
      text: Logic
    - id: opt_3
      text: Source
    options_count: 3
    correct_answer: opt_2
    explanation: 'Logics! We explain the reason: smooth - worse grip - slippery. Chain of reasoning.'
    explanation_status: present
  - step_id: sc3_30
    source_step_id: '30'
    scene_id: sc3
    step_type: single_choice
    prompt: “More than a million people live in our city.” - “This is how the data from the latest population census is shown.”
    options:
    - id: opt_1
      text: Fact
    - id: opt_2
      text: Logic
    - id: opt_3
      text: Source
    options_count: 3
    correct_answer: opt_1
    explanation: Fact! Specific verifiable data - the census can be found and viewed.
    explanation_status: present
  - step_id: sc3_32
    source_step_id: '32'
    scene_id: sc3
    step_type: single_choice
    prompt: “You need to drink more water.” — “The pediatrician explained at the appointment that it is important for children
      to maintain water balance.”
    options:
    - id: opt_1
      text: Fact
    - id: opt_2
      text: Logic
    - id: opt_3
      text: Source
    options_count: 3
    correct_answer: opt_3
    explanation: Source! The doctor is a specialist; there is reason to trust him in matters of health.
    explanation_status: implicit
  - step_id: sc3_34
    source_step_id: '34'
    scene_id: sc3
    step_type: single_choice
    prompt: “If you don’t charge your phone, it will turn off.” - “The battery is draining, and without energy the device
      does not work.”
    options:
    - id: opt_1
      text: Fact
    - id: opt_2
      text: Logic
    - id: opt_3
      text: Source
    options_count: 3
    correct_answer: opt_2
    explanation: Logics! No energy - no work. One follows from the other.
    explanation_status: implicit
  - step_id: sc3_36
    source_step_id: '36'
    scene_id: sc3
    step_type: single_choice
    prompt: “People blink several thousand times a day.” “This has been measured in scientific studies.”
    options:
    - id: opt_1
      text: Fact
    - id: opt_2
      text: Logic
    - id: opt_3
      text: Source
    options_count: 3
    correct_answer: opt_1
    explanation: Fact! Link to measurements - you can check, calculate, repeat the experiment.
    explanation_status: present
  - step_id: sc3_38
    source_step_id: '38'
    scene_id: sc3
    step_type: single_choice
    prompt: “You need to warm up before training.” — “The trainer explains that the muscles need to be prepared for the load.”
    options:
    - id: opt_1
      text: Fact
    - id: opt_2
      text: Logic
    - id: opt_3
      text: Source
    options_count: 3
    correct_answer: opt_3
    explanation: Source! The coach is a load specialist. His recommendations are based on experience.
    explanation_status: implicit
  - step_id: sc3_40
    source_step_id: '40'
    scene_id: sc3
    step_type: single_choice
    prompt: “If you close the window in winter, the room will become warmer.” - “Warm air escapes through the open window.”
    options:
    - id: opt_1
      text: Fact
    - id: opt_2
      text: Logic
    - id: opt_3
      text: Source
    options_count: 3
    correct_answer: opt_2
    explanation: Logics! Open - the heat leaves - it gets colder. Closed - the heat remains.
    explanation_status: implicit
  - step_id: sc3_42
    source_step_id: '42'
    scene_id: sc3
    step_type: single_choice
    prompt: '"The planets revolve around the sun." - “This is confirmed by astronomical observations.”'
    options:
    - id: opt_1
      text: Fact
    - id: opt_2
      text: Logic
    - id: opt_3
      text: Source
    options_count: 3
    correct_answer: opt_1
    explanation: Fact! Observations, measurements, data - everything can be verified through science.
    explanation_status: present
  - step_id: sc3_44
    source_step_id: '44'
    scene_id: sc3
    step_type: single_choice
    prompt: “You need to learn the multiplication tables.” — “Math teachers say it’s difficult to solve problems without it.”
    options:
    - id: opt_1
      text: Fact
    - id: opt_2
      text: Logic
    - id: opt_3
      text: Source
    options_count: 3
    correct_answer: opt_3
    explanation: Source! Mathematics teachers are experts in teaching numeracy.
    explanation_status: implicit
  - step_id: sc3_46
    source_step_id: '46'
    scene_id: sc3
    step_type: single_choice
    prompt: “If you sit for a long time without moving, your body gets tired.” - “The muscles become stiff because they are
      in one position for a long time.”
    options:
    - id: opt_1
      text: Fact
    - id: opt_2
      text: Logic
    - id: opt_3
      text: Source
    options_count: 3
    correct_answer: opt_2
    explanation: 'Logics! There is an explanation for the reason: in one position for a long time, the muscles become numb.'
    explanation_status: present
  - step_id: sc3_48
    source_step_id: '48'
    scene_id: sc3
    step_type: theory
    prompt: Note that a fact is data and measurement. Logic is the explanation of “why this happens.” The source is an expert
      who has reason to trust. In a real dispute, the combination of all three works most powerfully.
- scene_id: sc4
  title: HISTORY - DISPUTE ABOUT A NEW GAME
  steps:
  - step_id: sc4_49
    source_step_id: '49'
    scene_id: sc4
    step_type: theory
    prompt: You now know that every statement must be substantiated. Fact, logic or reliable source. But what do people do
      when they don't have a good rationale? Listen to the story!
  - step_id: sc4_50
    source_step_id: '50'
    scene_id: sc4
    step_type: theory
    prompt: 'At recess, Dmitry suggested: “Let''s play football!” And Masha objected: “It’s better to play badminton - we
      played football for three days in a row!”'
  - step_id: sc4_51
    source_step_id: '51'
    scene_id: sc4
    step_type: theory
    prompt: 'Dmitry did not explain why football is better. Instead, he blurted out: “You’re just bad at playing football,
      that’s why you don’t want to!” Masha was offended: “You don’t even know how to hold a badminton racket!”'
  - step_id: sc4_52
    source_step_id: '52'
    scene_id: sc4
    step_type: theory
    prompt: 'Then Mikola added: “Masha, you’re a girl - what do you understand about sports?” And Olenka stopped everyone:
      “Stop! You’ve been arguing for five minutes now, but you haven’t said a word about the games themselves!”'
  - step_id: sc4_53
    source_step_id: '53'
    scene_id: sc4
    step_type: open_question
    prompt: What happened in history? How did the children argue about the choice of game?
  - step_id: sc4_54
    source_step_id: '54'
    scene_id: sc4
    step_type: open_question
    prompt: Did anyone notice whether the children were discussing the games themselves or something else?
  - step_id: sc4_55
    source_step_id: '55'
    scene_id: sc4
    step_type: theory
    prompt: 'Here''s what happened: instead of discussing the games - their pros and cons - the children began to attack each
      other. Not on the argument, but on the person. This is a very common method of dishonest argument.'
  - step_id: sc4_56
    source_step_id: '56'
    scene_id: sc4
    step_type: theory
    prompt: When a person doesn't have a good rationale - fact, logic, or source - it sometimes turns to the person themselves.
      “You’re small!”, “You’re stupid!”, “Look at yourself!” This is called an attack on a person.
  - step_id: sc4_57
    source_step_id: '57'
    scene_id: sc4
    step_type: theory
    prompt: 'And here''s why this is important: attacking a person is not a response to an argument. The idea may be right,
      no matter who says it! If a small child says “the fire is hot,” it’s true. If a professor says “the fire is cold,” it’s
      not true. Age and rank do not make an idea right.'
- scene_id: sc5
  title: Three types of attack + practice
  steps:
  - step_id: sc5_58
    source_step_id: '58'
    scene_id: sc5
    step_type: theory
    prompt: There are three types of attacks on a person. Let's look at each one with examples so you can recognize them instantly.
  - step_id: sc5_59
    source_step_id: '59'
    scene_id: sc5
    step_type: theory
    prompt: The first type is a direct insult. The person does not respond to the argument, but simply calls him names. Let's
      hear how it sounds.
  - step_id: sc5_60
    source_step_id: '60'
    scene_id: sc5
    step_type: theory
    prompt: 'Masha says: “I think we need more time during recess - it’s important for children to rest.” Mikola replies:
      “You’re just lazy and don’t want to learn!”'
  - step_id: sc5_61
    source_step_id: '61'
    scene_id: sc5
    step_type: theory
    prompt: Did you notice? Mikola didn’t say a word about the change. Didn't explain why rest was not needed. I just called
      Masha lazy.
  - step_id: sc5_62
    source_step_id: '62'
    scene_id: sc5
    step_type: theory
    prompt: 'Another example. Anna: “It’s better to do your homework right after school.” Bogdan: “You’re just a crammer!”'
  - step_id: sc5_63
    source_step_id: '63'
    scene_id: sc5
    step_type: theory
    prompt: Again, instead of discussing the idea, Bogdan applied a label. Anna’s argument hasn’t gone away, but the conversation
      is no longer about homework, but about whether she’s a crammer or not.
  - step_id: sc5_64
    source_step_id: '64'
    scene_id: sc5
    step_type: theory
    prompt: 'And the third. Zhenya: “I think you should clean up after yourself in the dining room.” Kirill: “You’re generally
      boring, it’s boring to talk to you!”'
  - step_id: sc5_65
    source_step_id: '65'
    scene_id: sc5
    step_type: theory
    prompt: See the pattern? Insults always lead away from the topic. Instead of “why are you wrong” - “how bad you are.”
      This is not an argument. This is surrender disguised as an attack.
  - step_id: sc5_66
    source_step_id: '66'
    scene_id: sc5
    step_type: theory
    prompt: The second type is an indication of circumstances. There's no name-calling here, but they're saying that you can't
      be right because of your age, gender, location, or anything else.
  - step_id: sc5_67
    source_step_id: '67'
    scene_id: sc5
    step_type: theory
    prompt: 'Vasil: “You need to turn off the lights when you go out.” Grigory: “You are only nine years old, what do you
      understand about saving!”'
  - step_id: sc5_68
    source_step_id: '68'
    scene_id: sc5
    step_type: theory
    prompt: Vasil's age has nothing to do with whether the lights need to be turned off. Light wastes electricity no matter
      how old the person talking about it is.
  - step_id: sc5_69
    source_step_id: '69'
    scene_id: sc5
    step_type: theory
    prompt: 'Second example. Olya: “I think I need to read more.” Zina: “You live in another area, how do you know our problems!”'
  - step_id: sc5_70
    source_step_id: '70'
    scene_id: sc5
    step_type: theory
    prompt: The area where you live and the benefits of reading are things from different universes. But it sounds convincing,
      right? This is the trick.
  - step_id: sc5_71
    source_step_id: '71'
    scene_id: sc5
    step_type: theory
    prompt: 'Third. Petya: “On a test, it’s better to do the easy tasks first.” Dasha: “You’re a C student, what advice can
      you give?”'
  - step_id: sc5_72
    source_step_id: '72'
    scene_id: sc5
    step_type: theory
    prompt: Petit's assessments do not make his advice wrong. The “easy first” strategy works for everyone - this is logic,
      not the opinion of a C student.
  - step_id: sc5_73
    source_step_id: '73'
    scene_id: sc5
    step_type: theory
    prompt: Did you notice? Circumstances are a more cunning technique than insult. He does not call names, but rather “disqualifies”
      the person. But the correctness of an idea does not depend on who says it.
  - step_id: sc5_74
    source_step_id: '74'
    scene_id: sc5
    step_type: theory
    prompt: Type three - “Like this!” Instead of answering the argument, we translate the arrows. “Look at yourself!”, “And
      you’re doing this yourself!”
  - step_id: sc5_75
    source_step_id: '75'
    scene_id: sc5
    step_type: theory
    prompt: 'Darinka: “You can’t shout in the library.” Evgeniy: “Yesterday you laughed loudly in the corridor!”'
  - step_id: sc5_76
    source_step_id: '76'
    scene_id: sc5
    step_type: theory
    prompt: Even if Darinka laughed, this does not cancel the rule of silence in the library. Evgeniy did not respond to the
      argument. He changed the subject to Darinka herself.
  - step_id: sc5_77
    source_step_id: '77'
    scene_id: sc5
    step_type: theory
    prompt: 'Second. Igor: “It is important to wash your hands before eating.” Katya: “You forgot to wash yourself yesterday!”'
  - step_id: sc5_78
    source_step_id: '78'
    scene_id: sc5
    step_type: theory
    prompt: You still need to wash your hands. Igor's forgetfulness does not make germs any less dangerous.
  - step_id: sc5_79
    source_step_id: '79'
    scene_id: sc5
    step_type: theory
    prompt: 'Third. Nastya: “You can’t cheat on a test.” Artyom: “And you yourself spied the answer from me last week!”'
  - step_id: sc5_80
    source_step_id: '80'
    scene_id: sc5
    step_type: theory
    prompt: Classic “just like that.” Even if Nastya was spying, this does not make the cheating correct. Artyom did not defend
      the cheating, he simply attacked Nastya.
  - step_id: sc5_81
    source_step_id: '81'
    scene_id: sc5
    step_type: theory
    prompt: 'So, three types: insult - “you are bad”, circumstances - “you can’t know”, “you are like that” - “look at yourself”.
      All three are not a response to the argument. All three are an attempt to escape the discussion.'
  - step_id: sc5_82
    source_step_id: '82'
    scene_id: sc5
    step_type: theory
    prompt: Now let's see if you can distinguish them. Let's vote!
  - step_id: sc5_83
    source_step_id: '83'
    scene_id: sc5
    step_type: single_choice
    prompt: 'Anna: “It’s good to go for a walk after school.” Boris: “You sit at home and play on the phone!”'
    options:
    - id: opt_1
      text: Insult
    - id: opt_2
      text: Circumstances
    - id: opt_3
      text: '"I''m like that myself"'
    options_count: 3
    correct_answer: opt_3
    explanation: “That’s how I am!” Boris turned his attention to Anna instead of discussing the benefits of walking.
    explanation_status: implicit
  - step_id: sc5_85
    source_step_id: '85'
    scene_id: sc5
    step_type: single_choice
    prompt: 'Vika: “We need to save water.” Gleb: “You’re still small, adults will figure it out themselves!”'
    options:
    - id: opt_1
      text: Insult
    - id: opt_2
      text: Circumstances
    - id: opt_3
      text: '"I''m like that myself"'
    options_count: 3
    correct_answer: opt_2
    explanation: Circumstances! Vicky's age does not affect whether you need to save water.
    explanation_status: implicit
  - step_id: sc5_87
    source_step_id: '87'
    scene_id: sc5
    step_type: single_choice
    prompt: 'Dima: “It’s better to play outside than sit at the computer.” Eva: “You’re just slow and don’t know how to play
      normal games!”'
    options:
    - id: opt_1
      text: Insult
    - id: opt_2
      text: Circumstances
    - id: opt_3
      text: '"I''m like that myself"'
    options_count: 3
    correct_answer: opt_1
    explanation: Insult! “Brake” is a label, not an argument in favor of computer games.
    explanation_status: implicit
- scene_id: sc6
  title: Defense against attack - simulator
  steps:
  - step_id: sc6_89
    source_step_id: '89'
    scene_id: sc6
    step_type: theory
    prompt: 'We learned three types of attack. Now - the most important thing: how to defend yourself. Three steps. First,
      name the technique: say out loud that this is an attack, not a response. Second, return to the topic: remind what the
      conversation was about. Third, ask directly: “What’s wrong with my argument?” We train using three examples - each step
      separately.'
  - step_id: sc6_90
    source_step_id: '90'
    scene_id: sc6
    step_type: theory
