- scene_id: sc7
  title: Practice - Review 7A (Contradictions)
  steps:
  - step_id: sc7_112
    source_step_id: '112'
    scene_id: sc7
    step_type: theory
    prompt: 'Now - a lot of practice for the whole day. Let''s start with what we taught before the break. Law of non-contradiction:
      you cannot say one thing and the opposite at the same time. Five stories - looking for a contradiction and training
      a polite reminder.'
  - step_id: sc7_113
    source_step_id: '113'
    scene_id: sc7
    step_type: theory
    prompt: 'Story one. Katya says: “I always keep my promises. You can rely on me!” And an hour later: “Well, yes, I promised
      to help, but I’m too lazy. Just think, just one promise.”'
  - step_id: sc7_114
    source_step_id: '114'
    scene_id: sc7
    step_type: single_choice
    prompt: Is there a contradiction in Katya's words?
    options:
    - id: opt_1
      text: Yes, contradiction
    - id: opt_2
      text: No, it's logical
    options_count: 2
    correct_answer: opt_1
    explanation: Eat! “I always keep my promises” and “just think, one promise” - one excludes the other. Either always or
      not always.
    explanation_status: implicit
  - step_id: sc7_116
    source_step_id: '116'
    scene_id: sc7
    step_type: open_question
    prompt: How to politely remind Katya about the contradiction?
  - step_id: sc7_117
    source_step_id: '117'
    scene_id: sc7
    step_type: theory
    prompt: 'For example: “Katya, you said that you always keep your promises. That means today too, no?”'
  - step_id: sc7_118
    source_step_id: '118'
    scene_id: sc7
    step_type: theory
    prompt: 'The second story. Coach: “Everyone on our team is equal, we don’t have favorites!” And then: “Mikola, you don’t
      need to run cross-country, you’re already doing great.”'
  - step_id: sc7_119
    source_step_id: '119'
    scene_id: sc7
    step_type: single_choice
    prompt: Is there a contradiction?
    options:
    - id: opt_1
      text: Yes, contradiction
    - id: opt_2
      text: No, it's logical
    options_count: 2
    correct_answer: opt_1
    explanation: Certainly! If everyone is equal, the rules are the same for everyone. Mikola's release from cross-country
      is a favorite.
    explanation_status: implicit
  - step_id: sc7_121
    source_step_id: '121'
    scene_id: sc7
    step_type: open_question
    prompt: How to politely point out a contradiction to a coach?
  - step_id: sc7_122
    source_step_id: '122'
    scene_id: sc7
    step_type: theory
    prompt: 'For example: “You said that everyone is equal. So, is cross-country for everyone or not for everyone? Calm and
      to the point.'
  - step_id: sc7_123
    source_step_id: '123'
    scene_id: sc7
    step_type: theory
    prompt: 'Story three. Grandmother: “I never spoil my grandchildren. Discipline is the main thing!” Five minutes later:
      “Here, take some more candy, but don’t tell mom.”'
  - step_id: sc7_124
    source_step_id: '124'
    scene_id: sc7
    step_type: single_choice
    prompt: Is there a contradiction?
    options:
    - id: opt_1
      text: Yes, contradiction
    - id: opt_2
      text: No, it's logical
    options_count: 2
    correct_answer: opt_1
    explanation: The secret candy “just don’t tell your mom” is a classic example of that same pampering. Grandma herself
      broke her own rule.
    explanation_status: implicit
  - step_id: sc7_126
    source_step_id: '126'
    scene_id: sc7
    step_type: theory
    prompt: 'Story four. Vasya: “I am for healthy eating! Fast food is evil! The next day Vasya eats a burger. A friend asks.
      Vasya: “That’s once a month, it doesn’t count.”'
  - step_id: sc7_127
    source_step_id: '127'
    scene_id: sc7
    step_type: single_choice
    prompt: Is there a contradiction in Vasya’s words?
    options:
    - id: opt_1
      text: Yes, contradiction
    - id: opt_2
      text: No, it's logical
    - id: opt_3
      text: Ambiguous
    options_count: 3
    correct_answer: opt_3
    explanation: Tricky case! “For healthy eating” does not necessarily mean “never eat a burger in your life.” Vasya could
      mean “mostly.” Here you need to clarify - and not take them at their word.
    explanation_status: implicit
  - step_id: sc7_129
    source_step_id: '129'
    scene_id: sc7
    step_type: theory
    prompt: 'Story five. Maxim: “Copying off is dishonest. I never cheat." Later: “Let me quickly see the answer to the third
      problem - I’m not cheating, I’m just checking.”'
  - step_id: sc7_130
    source_step_id: '130'
    scene_id: sc7
    step_type: single_choice
    prompt: Is there a contradiction?
    options:
    - id: opt_1
      text: Yes, contradiction
    - id: opt_2
      text: No, it's logical
    options_count: 2
    correct_answer: opt_1
    explanation: “Just checking” is a renamed cheating. Same action, different name. The law of non-contradiction cannot be
      deceived by words.
    explanation_status: implicit
  - step_id: sc7_132
    source_step_id: '132'
    scene_id: sc7
    step_type: open_question
    prompt: How to politely tell Maxim?
  - step_id: sc7_133
    source_step_id: '133'
    scene_id: sc7
    step_type: theory
    prompt: 'For example: “Max, if you look at someone else’s answer before you decide for yourself, how is that different
      from cheating?” A question is stronger than an accusation.'
- scene_id: sc8
  title: Practice - Review 7B (Rationale + Attack)
  steps:
  - step_id: sc8_134
    source_step_id: '134'
    scene_id: sc8
    step_type: theory
    prompt: 'Now it’s the second half of the day. Justification and attack on a person. Five dialogues. In each, someone responds
      to an argument. Your job is to determine: is this a good rationale or an attack on a person?'
  - step_id: sc8_135
    source_step_id: '135'
    scene_id: sc8
    step_type: theory
    prompt: 'Dialogue one. Lena: “You need to sleep at least nine hours.” Taras: “Doctors from the children’s hospital say
      that children 9–12 years old need 9–11 hours of sleep. You''re right."'
  - step_id: sc8_136
    source_step_id: '136'
    scene_id: sc8
    step_type: single_choice
    prompt: What did Taras use?
    options:
    - id: opt_1
      text: Justification - fact
    - id: opt_2
      text: Rationale - source
    - id: opt_3
      text: Assault on a person
    options_count: 3
    correct_answer: opt_2
    explanation: Source! Taras referred to doctors who specialize in child health. This is a strong rationale, not an attack.
    explanation_status: implicit
  - step_id: sc8_138
    source_step_id: '138'
    scene_id: sc8
    step_type: theory
    prompt: 'Dialogue two. Oleg: “It’s better to do your homework right after school.” Marina: “Yesterday you did your homework
      at ten in the evening, what right do you have to advise!”'
  - step_id: sc8_139
    source_step_id: '139'
    scene_id: sc8
    step_type: single_choice
    prompt: What did Marina use?
    options:
    - id: opt_1
      text: Rationale
    - id: opt_2
      text: Insult
    - id: opt_3
      text: Circumstances
    - id: opt_4
      text: '"I''m like that myself"'
    options_count: 4
    correct_answer: opt_4
    explanation: “That’s how I am!” Marina turned her attention to Oleg instead of discussing when it is better to do her
      homework. Oleg’s advice may be correct, even if he himself did not follow it yesterday.
    explanation_status: present
  - step_id: sc8_141
    source_step_id: '141'
    scene_id: sc8
    step_type: theory
    prompt: 'Dialogue three. Ira: “Dogs are the best pets.” Zhenya: “You live in a small apartment, what do you know about
      dogs!”'
  - step_id: sc8_142
    source_step_id: '142'
    scene_id: sc8
    step_type: single_choice
    prompt: What did Zhenya use?
    options:
    - id: opt_1
      text: Rationale
    - id: opt_2
      text: Insult
    - id: opt_3
      text: Circumstances
    - id: opt_4
      text: '"I''m like that myself"'
    options_count: 4
    correct_answer: opt_3
    explanation: Circumstances! The size of Ira’s apartment is not an argument against dogs in general. Zhenya “disqualified”
      Ira instead of discussing pets.
    explanation_status: implicit
  - step_id: sc8_144
    source_step_id: '144'
    scene_id: sc8
    step_type: theory
    prompt: 'Dialogue four. Kostya: “Reading books is more useful than watching videos.” Dasha: “When you read, your brain
      builds pictures on its own—this trains your imagination. And the video gives ready-made pictures.”'
  - step_id: sc8_145
    source_step_id: '145'
    scene_id: sc8
    step_type: single_choice
    prompt: What did Dasha use?
    options:
    - id: opt_1
      text: Justification - fact
    - id: opt_2
      text: Rationale - logic
    - id: opt_3
      text: Assault on a person
    options_count: 3
    correct_answer: opt_2
    explanation: Logics! Dasha explained why reading is more useful - there is cause and effect. No attack - pure argument.
    explanation_status: implicit
  - step_id: sc8_147
    source_step_id: '147'
    scene_id: sc8
    step_type: theory
    prompt: 'Dialogue five. Natasha: “School requires a uniform.” Andrey: “You’re just a fashionista and you’re afraid that
      without a uniform your outfits will fail!”'
  - step_id: sc8_148
    source_step_id: '148'
    scene_id: sc8
    step_type: single_choice
    prompt: What did Andrey use?
    options:
    - id: opt_1
      text: Rationale
    - id: opt_2
      text: Insult
    - id: opt_3
      text: Circumstances
    - id: opt_4
      text: '"I''m like that myself"'
    options_count: 4
    correct_answer: opt_2
    explanation: Insult! “Fashionista” is a label. Andrey did not explain why the form was not needed. He simply came up with
      a motive for Natasha and hung it up like a tag.
    explanation_status: implicit
  - step_id: sc8_150
    source_step_id: '150'
    scene_id: sc8
    step_type: theory
    prompt: 'Five out of five! You already perfectly distinguish between justification and attack. The main rule: if a person
      talks about a topic, it’s an argument. If it''s about the interlocutor, it''s an attack.'
- scene_id: sc9
  title: Closing
  steps:
  - step_id: sc9_151
    source_step_id: '151'
    scene_id: sc9
    step_type: theory
    prompt: Guys, today was a powerful day. Before the break, we learned Aristotle's second law - the law of non-contradiction.
      You cannot say one thing and the opposite at the same time. And after the change, we learned to demand justification
      and recognize an attack on a person.
  - step_id: sc9_152
    source_step_id: '152'
    scene_id: sc9
    step_type: theory
    prompt: You now have three superpowers. The first is to notice contradictions. The second is to ask “why do you think
      that?” and distinguish between fact, logic and source. The third is to recognize an attack on a person and defend yourself
      in three steps.
  - step_id: sc9_153
    source_step_id: '153'
    scene_id: sc9
    step_type: theory
    prompt: And guess what? Two of Aristotle's three laws are already yours. The law of identity and the law of non-contradiction.
      The third one is waiting for you ahead. But take your time - two out of three is already more than most adults know.
      Seriously.
  - step_id: sc9_154
    source_step_id: '154'
    scene_id: sc9
    step_type: theory
    prompt: 'Homework: Listen to any conversation tonight - at home, on video, anywhere. Try to find at least one statement
      without justification. Or one contradiction. If you find it, tell me tomorrow. See you!'
