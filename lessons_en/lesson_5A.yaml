source_lesson_id: lesson_5A
language: en
title: How do you know that?
day: 5
slot: A
scenes:
- scene_id: sc1
  title: Warm-up
  steps:
  - step_id: sc1_1
    source_step_id: '1'
    scene_id: sc1
    step_type: instruction
    prompt: Hi, scouts! Before the new topic — quick warm-up. Let's remember three methods of persuasion! Which ones?
  - step_id: sc1_2
    source_step_id: '2'
    scene_id: sc1
    step_type: instruction
    prompt: Think...
  - step_id: sc1_3
    source_step_id: '3'
    scene_id: sc1
    step_type: theory
    prompt: Trust, feelings, facts! Three legs of a stool. Let's check if you remember.
  - step_id: sc1_4
    source_step_id: '4'
    scene_id: sc1
    step_type: instruction
    prompt: Which method of persuasion is used?
  - step_id: sc1_5
    source_step_id: '5'
    scene_id: sc1
    step_type: single_choice
    prompt: '"I''m your older brother, listen to me!"'
    options:
    - id: opt_1
      text: Trust
    - id: opt_2
      text: Feelings
    - id: opt_3
      text: Facts
    options_count: 3
    correct_answer: opt_1
    explanation: Trust! The older brother uses authority. "I'm older — so I know better."
    explanation_status: implicit
  - step_id: sc1_7
    source_step_id: '7'
    scene_id: sc1
    step_type: single_choice
    prompt: '"You''ll have so much fun, you won''t regret it!"'
    options:
    - id: opt_1
      text: Trust
    - id: opt_2
      text: Feelings
    - id: opt_3
      text: Facts
    options_count: 3
    correct_answer: opt_2
    explanation: Feelings! "Fun", "won't regret" — pure emotions. Not a single fact.
    explanation_status: implicit
  - step_id: sc1_9
    source_step_id: '9'
    scene_id: sc1
    step_type: single_choice
    prompt: '"Look, here it''s written in black and white!"'
    options:
    - id: opt_1
      text: Trust
    - id: opt_2
      text: Feelings
    - id: opt_3
      text: Facts
    options_count: 3
    correct_answer: opt_3
    explanation: Facts! A document that can be read and verified.
    explanation_status: implicit
  - step_id: sc1_11
    source_step_id: '11'
    scene_id: sc1
    step_type: single_choice
    prompt: '"Everyone says it''s the best game — 4.9 stars out of 5!"'
    options:
    - id: opt_1
      text: Trust
    - id: opt_2
      text: Feelings
    - id: opt_3
      text: Facts
    options_count: 3
    correct_answer: opt_3
    explanation: Facts! 4.9 stars — a number. Although "everyone says" adds a touch of trust. But the main hook is the rating.
    explanation_status: implicit
  - step_id: sc1_13
    source_step_id: '13'
    scene_id: sc1
    step_type: single_choice
    prompt: '"If you don''t try — you''ll regret it your whole life!"'
    options:
    - id: opt_1
      text: Trust
    - id: opt_2
      text: Feelings
    - id: opt_3
      text: Facts
    options_count: 3
    correct_answer: opt_2
    explanation: Feelings! Fear of missing out. A familiar trick — we discussed it in ads. The scout won't fall for it!
    explanation_status: implicit
  - step_id: sc1_15
    source_step_id: '15'
    scene_id: sc1
    step_type: theory
    prompt: Great, you remember the three methods! Now — a new topic. Today we'll learn WHERE people get information from.
      And this is possibly the most important question for a scout.
- scene_id: sc2
  title: Discovery
  steps:
  - step_id: sc2_16
    source_step_id: '16'
    scene_id: sc2
    step_type: theory
    prompt: 'Here Dmitrik rushes in during break and shouts: "Classes are cancelled tomorrow!" Everyone was happy. Then they
      ask: "How do you know that?"'
  - step_id: sc2_17
    source_step_id: '17'
    scene_id: sc2
    step_type: instruction
    prompt: What do you think Dmitrik answered?
  - step_id: sc2_18
    source_step_id: '18'
    scene_id: sc2
    step_type: theory
    prompt: '"Petrik told me, and he was told by his older brother, and he was told by someone on the internet..." A chain!
      Friend, then brother, then internet, then — unknown.'
  - step_id: sc2_19
    source_step_id: '19'
    scene_id: sc2
    step_type: theory
    prompt: 'But the teacher says: "There''s a test tomorrow." How does he know? He made the schedule himself! He decided
      it himself, wrote it himself. No chains.'
  - step_id: sc2_20
    source_step_id: '20'
    scene_id: sc2
    step_type: theory
    prompt: Feel the difference? Dmitrik is retelling someone else's words — he didn't see it himself or verify it. But the
      teacher KNOWS — because he did it himself.
  - step_id: sc2_21
    source_step_id: '21'
    scene_id: sc2
    step_type: theory
    prompt: 'Another example. Friend says: "There''s pizza in the cafeteria today!" How does he know? "Sashka told me." But
      you go into the cafeteria — and there''s porridge. Sashka was wrong. Or he was joking. Or someone else lied to him.'
  - step_id: sc2_22
    source_step_id: '22'
    scene_id: sc2
    step_type: theory
    prompt: 'But if the friend said: "I saw it myself — there''s pizza, here''s a photo!" — that''s different. You can verify!'
  - step_id: sc2_23
    source_step_id: '23'
    scene_id: sc2
    step_type: theory
    prompt: Today we'll learn to tell RELIABLE information from RUMORS. This is a scout's superpower — understanding WHERE
      information came from. Listen to this story!
- scene_id: sc3
  title: STORY — NEWS ABOUT A DINOSAUR
  steps:
  - step_id: sc3_24
    source_step_id: '24'
    scene_id: sc3
    step_type: theory
    prompt: 'Dmitrik bursts into the classroom with blazing eyes: "Guys! They found a living dinosaur in the park! Look —
      video online!"'
  - step_id: sc3_25
    source_step_id: '25'
    scene_id: sc3
    step_type: theory
    prompt: 'Everyone gathered around the phone. Video is blurry, filmed at night. Some unnamed channel, author unknown. Olenka
      asked: "Who filmed this?"'
  - step_id: sc3_26
    source_step_id: '26'
    scene_id: sc3
    step_type: theory
    prompt: 'Dmitrik shrugged: "I don''t know, Petrik sent it to me." Vitya added: "Did the news talk about this? Did scientists
      confirm it?" Dmitrik fell silent.'
  - step_id: sc3_27
    source_step_id: '27'
    scene_id: sc3
    step_type: theory
    prompt: 'The friends didn''t rush to the park. They asked the right questions: who filmed it? where did the information
      come from? who confirmed it? Real scouts!'
  - step_id: sc3_28
    source_step_id: '28'
    scene_id: sc3
    step_type: instruction
    prompt: So, Dmitrik brought "hot news." But the friends didn't rush to the park. Why?
  - step_id: sc3_29
    source_step_id: '29'
    scene_id: sc3
    step_type: single_choice
    prompt: Why didn't the kids believe Dmitrik?
    options:
    - id: opt_1
      text: Because Dmitrik often lies
    - id: opt_2
      text: Because the information source is unreliable
    - id: opt_3
      text: Because dinosaurs don't exist
    options_count: 3
    correct_answer: opt_2
    explanation: 'The source is unreliable! Dmitrik himself isn''t lying — he just retold what he saw on the internet. But
      who filmed the video? Unknown. Who verified it? Nobody. Chain: unknown person → internet → Petrik → Dmitrik. Each next
      reteller is like a broken telephone.'
    explanation_status: implicit
  - step_id: sc3_31
    source_step_id: '31'
    scene_id: sc3
    step_type: theory
    prompt: 'But if a dinosaur had really been found — scientists would have written about it, it would be on the news, there
      would be photos from different sources. One video from an unknown person is not proof. It''s like if someone said: "I
      saw a cat flying!" — okay, but photos? Witnesses? No? Then the cat is still walking on foot.'
  - step_id: sc3_32
    source_step_id: '32'
    scene_id: sc3
    step_type: theory
    prompt: 'Let''s remember the scout''s main question: "How do you know that?" This question is like a flashlight in the
      dark. Now let''s figure out what kinds of answers there are.'
- scene_id: sc4
  title: Own eyes vs. heard from others
  steps:
  - step_id: sc4_33
    source_step_id: '33'
    scene_id: sc4
    step_type: theory
    prompt: So, we understood — it's important to ask "How do you know that?" But what kinds of answers are there? A scout
      divides all information sources into two types.
  - step_id: sc4_34
    source_step_id: '34'
    scene_id: sc4
    step_type: theory
    prompt: 'First type: OWN EYES. That''s when a person saw it themselves, did it themselves, measured it themselves. "I
      saw it myself!" — witness. "Here''s my diary" — document. "We measured the temperature ourselves" — experiment. It''s
      like a photo — you were there.'
  - step_id: sc4_35
    source_step_id: '35'
    scene_id: sc4
    step_type: theory
    prompt: 'Second type: HEARD FROM OTHERS. That''s when a person is retelling. "A friend told me..." "Online it says..."
      "They showed on TV..." It''s like playing broken telephone — each retelling can add an error.'
  - step_id: sc4_36
    source_step_id: '36'
    scene_id: sc4
    step_type: theory
    prompt: What's more reliable? Of course, own eyes! If you saw a rainbow yourself — you KNOW it was there. But if someone
      told you "there was a rainbow yesterday" — well, maybe there was. Or maybe the person confused it with a double arch
      made of balloons.
  - step_id: sc4_37
    source_step_id: '37'
    scene_id: sc4
    step_type: reflection
    prompt: But! "Heard from others" — doesn't mean "lies". You just need to check it. A doctor says "you have a fever" —
      you didn't measure it yourself, but you can trust a doctor. But "my friend said ice cream makes muscles grow" — you
      should think about that.
  - step_id: sc4_38
    source_step_id: '38'
    scene_id: sc4
    step_type: instruction
    prompt: 'Let''s practice! Decide: does the person know with THEIR OWN EYES or HEARD FROM OTHERS?'
  - step_id: sc4_39
    source_step_id: '39'
    scene_id: sc4
    step_type: single_choice
    prompt: '"I saw a cat catch a mouse!"'
    options:
    - id: opt_1
      text: Own eyes
    - id: opt_2
      text: Heard from others
    options_count: 2
    correct_answer: opt_1
    explanation: Own eyes! The person was there, saw the cat drama in real life. This is a witness.
    explanation_status: implicit
  - step_id: sc4_41
    source_step_id: '41'
    scene_id: sc4
    step_type: single_choice
    prompt: '"My grandmother told me there used to be a forest here."'
    options:
    - id: opt_1
      text: Own eyes
    - id: opt_2
      text: Heard from others
    options_count: 2
    correct_answer: opt_2
    explanation: Heard from others! Grandma is retelling. Even though grandma probably SAW that forest herself. But for you
      it's still a retelling. You can't verify it — we don't have time machines yet.
    explanation_status: implicit
  - step_id: sc4_43
    source_step_id: '43'
    scene_id: sc4
    step_type: single_choice
    prompt: '"My friend told me there are no classes tomorrow."'
    options:
    - id: opt_1
      text: Own eyes
    - id: opt_2
      text: Heard from others
    options_count: 2
    correct_answer: opt_2
    explanation: Heard from others! Classic case. Friend told you — but how does HE know? Maybe he also heard it from someone.
      Chain!
    explanation_status: implicit
  - step_id: sc4_45
    source_step_id: '45'
    scene_id: sc4
    step_type: single_choice
    prompt: '"Here''s my diary with grades — look for yourself."'
    options:
    - id: opt_1
      text: Own eyes
    - id: opt_2
      text: Heard from others
    options_count: 2
    correct_answer: opt_1
    explanation: Own eyes! A diary is a document. You can open it, look at it, touch it. Grades won't run away from the page.
      Although some would like bad grades to know how to run — far and forever.
    explanation_status: implicit
  - step_id: sc4_47
    source_step_id: '47'
    scene_id: sc4
    step_type: single_choice
    prompt: '"They said on TV there will be rain tomorrow."'
    options:
    - id: opt_1
      text: Own eyes
    - id: opt_2
      text: Heard from others
    options_count: 2
    correct_answer: opt_2
    explanation: Heard from others! You didn't see the rain yourself, you trust the meteorologist on TV. Although meteorologists
      at least measure with instruments — that's more reliable than "my cousin texted in the chat."
    explanation_status: implicit
  - step_id: sc4_49
    source_step_id: '49'
    scene_id: sc4
    step_type: theory
    prompt: Great! You remembered two types of sources. But sometimes you hear from others — and don't know whether to believe
      it. How to figure it out? There are three magic questions!
- scene_id: sc5
  title: Three questions to check
  steps:
  - step_id: sc5_50
    source_step_id: '50'
    scene_id: sc5
    step_type: theory
    prompt: So, you heard something from someone. You didn't see it yourself. How to understand — believe or not? A scout
      has three secret questions. Like three keys to a safe with truth.
  - step_id: sc5_51
    source_step_id: '51'
    scene_id: sc5
    step_type: theory
    prompt: 'First question: DOES THE PERSON KNOW ABOUT THIS? A doctor talks about health — knows it. But if a doctor talks
      about how to fix a car — might not know. Every expert is an expert in THEIR field. A cook knows about soup, but not
      about rockets.'
  - step_id: sc5_52
    source_step_id: '52'
    scene_id: sc5
    step_type: theory
    prompt: 'Second question: DOES HE WANT TO GET SOMETHING? A seller praises his product — wants to sell! That doesn''t mean
      he''s lying, but he has a reason to exaggerate. But a friend recommends a book — he doesn''t need anything from it.
      He just liked it.'
  - step_id: sc5_53
    source_step_id: '53'
    scene_id: sc5
    step_type: theory
    prompt: 'Third question: CAN YOU VERIFY IT? "Look, here it says" — you can verify. "Someone told me once" — you can''t
      verify. If you can''t verify — the scout''s flashlight blinks red.'
  - step_id: sc5_54
    source_step_id: '54'
    scene_id: sc5
    step_type: theory
    prompt: 'Three questions. Let''s repeat: Knows the topic? Wants to get something? Can you verify? If at least one answer
      is suspicious — you should doubt. Let''s practice!'
  - step_id: sc5_55
    source_step_id: '55'
    scene_id: sc5
    step_type: single_choice
    prompt: '"A veterinarian says a dog needs vaccinations."'
    options:
    - id: opt_1
      text: You can believe
    - id: opt_2
      text: Better not believe
    - id: opt_3
      text: Need to verify
    options_count: 3
    correct_answer: opt_1
    explanation: You can believe! A veterinarian knows about animals — it's his job. Does he want to get something? Well,
      he wants the dog to be healthy. That's not a sale — that's care. All three keys match.
    explanation_status: implicit
  - step_id: sc5_57
    source_step_id: '57'
    scene_id: sc5
    step_type: single_choice
    prompt: '"A seller says his toys are the best."'
    options:
    - id: opt_1
      text: You can believe
    - id: opt_2
      text: Better not believe
    - id: opt_3
      text: Need to verify
    options_count: 3
    correct_answer: opt_2
    explanation: Better not believe! Does the seller know about toys? Maybe. But does he want to get something? Oh yes — sell!
      He has a direct benefit to praise his goods. The second key didn't work.
    explanation_status: implicit
  - step_id: sc5_59
    source_step_id: '59'
    scene_id: sc5
    step_type: single_choice
    prompt: '"Mom says she saw a rainbow."'
    options:
    - id: opt_1
      text: You can believe
    - id: opt_2
      text: Better not believe
    - id: opt_3
      text: Need to verify
    options_count: 3
    correct_answer: opt_1
    explanation: You can believe! Mom saw it herself — with her own eyes. Why would she lie about a rainbow? No benefit. You
      can't sell a rainbow.
    explanation_status: implicit
  - step_id: sc5_61
    source_step_id: '61'
    scene_id: sc5
    step_type: single_choice
    prompt: '"They wrote in the chat that the school will close, but nobody knows where that came from."'
    options:
    - id: opt_1
      text: You can believe
    - id: opt_2
      text: Better not believe
    - id: opt_3
      text: Need to verify
    options_count: 3
    correct_answer: opt_2
    explanation: Better not believe! Who wrote it is unknown. Does he know the topic — unclear. Can you verify — no. All three
      keys are blocked. A classic rumor.
    explanation_status: present
  - step_id: sc5_63
    source_step_id: '63'
    scene_id: sc5
    step_type: single_choice
    prompt: '"A teacher showed in a book that dinosaurs lived long ago."'
    options:
    - id: opt_1
      text: You can believe
    - id: opt_2
      text: Better not believe
    - id: opt_3
      text: Need to verify
    options_count: 3
    correct_answer: opt_1
    explanation: You can believe! The teacher knows the topic. Doesn't sell anything. And most importantly — showed a BOOK.
      You can open and verify yourself. All three keys are green!
    explanation_status: implicit
  - step_id: sc5_65
    source_step_id: '65'
    scene_id: sc5
    step_type: theory
    prompt: 'Now a more complex case. Imagine: a famous blogger with a million followers says: "These vitamins will help you
      grow taller! I take them every day!"'
  - step_id: sc5_66
    source_step_id: '66'
    scene_id: sc5
    step_type: open_question
    prompt: 'Think: can you trust the blogger? Check with three questions: does he know the topic? does he want to get something?
      can you verify?'
  - step_id: sc5_67
    source_step_id: '67'
    scene_id: sc5
    step_type: theory
    prompt: What do you think? Let's analyze.
  - step_id: sc5_68
    source_step_id: '68'
    scene_id: sc5
    step_type: theory
    prompt: Does the blogger know about vitamins? Is he a doctor? Biologist? Probably not — he's a blogger. Does he want to
      get something? Of course! He's paid for ads. Can you verify? Where are the scientific studies? There aren't any.
  - step_id: sc5_69
    source_step_id: '69'
    scene_id: sc5
    step_type: theory
    prompt: All three keys are red! The blogger can be nice, funny, with cool videos. But a million followers don't make someone
      an expert on vitamins. A million followers is about popularity, not knowledge.
  - step_id: sc5_70
    source_step_id: '70'
    scene_id: sc5
    step_type: theory
    prompt: Three questions is a powerful tool. But the internet is more complex. Not all websites are the same, not all sources
      are equal. Let's figure it out!
- scene_id: sc6
  title: Not all internet is the same
  steps:
  - step_id: sc6_71
    source_step_id: '71'
    scene_id: sc6
    step_type: theory
    prompt: 'We often hear: "They wrote on the internet." But the internet is not one person. EVERYONE writes on the internet.
      Scientists and jokers, robots and your neighbor Vovka, who thinks the Earth is square.'
  - step_id: sc6_72
    source_step_id: '72'
    scene_id: sc6
    step_type: theory
    prompt: Imagine a huge library where on one shelf there's an encyclopedia, and on the next shelf is a notebook with a
      first-grader's fantasies. Both in the library. But they're VERY different. The internet is the same kind of library.
  - step_id: sc6_73
    source_step_id: '73'
    scene_id: sc6
    step_type: theory
    prompt: 'Level one: OFFICIAL WEBSITES. Hospital website, school website, museum website, government website. Specialists
      write there and are responsible for their words. If it says on the zoo website "we have a giraffe" — chances are there''s
      a giraffe.'
  - step_id: sc6_74
    source_step_id: '74'
    scene_id: sc6
    step_type: theory
    prompt: 'Level two: NEWS SITES AND ENCYCLOPEDIAS. Journalists verify information before publishing. Not always perfect,
      but they try. Encyclopedias are written and checked by many people. That''s more reliable than one person.'
  - step_id: sc6_75
    source_step_id: '75'
    scene_id: sc6
    step_type: theory
    prompt: 'Level three: BLOGS AND SOCIAL MEDIA. Here everyone writes what they want. A blogger can be smart — or just fantasize.
      Nobody checks. Nobody''s responsible. It''s like an announcement on a fence — anyone can put one up.'
  - step_id: sc6_76
    source_step_id: '76'
    scene_id: sc6
    step_type: theory
    prompt: 'Level four: CHATS AND FORWARDS. "They sent me", "they wrote in the chat", "forwarded to the group". Most unreliable!
      Unknown who wrote it, when, why. It''s not even a fence — it''s a whisper in a dark hallway.'
  - step_id: sc6_77
    source_step_id: '77'
    scene_id: sc6
    step_type: instruction
    prompt: Let's practice! Reliable or unreliable source?
  - step_id: sc6_78
    source_step_id: '78'
    scene_id: sc6
    step_type: single_choice
    prompt: Information from a children's hospital website about vaccinations.
    options:
    - id: opt_1
      text: Reliable
    - id: opt_2
      text: Unreliable
    options_count: 2
    correct_answer: opt_1
    explanation: Reliable! A hospital is an official website, doctors are responsible for the information. First level — specialists.
    explanation_status: implicit
  - step_id: sc6_80
    source_step_id: '80'
    scene_id: sc6
    step_type: single_choice
    prompt: 'Post by an unknown blogger: "I discovered the secret to not getting sick in winter!"'
    options:
    - id: opt_1
      text: Reliable
    - id: opt_2
      text: Unreliable
    options_count: 2
    correct_answer: opt_2
    explanation: Unreliable! Unknown blogger, no proof, "secret" — typical bait. If the secret existed, doctors would have
      known long ago. But they still seem to prescribe medicine instead of subscribing to a blog.
    explanation_status: implicit
  - step_id: sc6_82
    source_step_id: '82'
    scene_id: sc6
    step_type: single_choice
    prompt: Article in a children's encyclopedia about volcanoes.
    options:
    - id: opt_1
      text: Reliable
    - id: opt_2
      text: Unreliable
    options_count: 2
    correct_answer: opt_1
    explanation: Reliable! An encyclopedia is written and checked by many experts. Volcanoes won't be offended — the truth
      is written about them.
    explanation_status: implicit
  - step_id: sc6_84
    source_step_id: '84'
    scene_id: sc6
    step_type: single_choice
    prompt: 'Message in class chat: "They said there''s quarantine tomorrow!!!"'
    options:
    - id: opt_1
      text: Reliable
    - id: opt_2
      text: Unreliable
    options_count: 2
    correct_answer: opt_2
    explanation: Unreliable! Who said? Where from? Three exclamation marks don't add reliability. The more exclamation marks
      — the more suspicion a scout has.
    explanation_status: implicit
  - step_id: sc6_86
    source_step_id: '86'
    scene_id: sc6
    step_type: single_choice
    prompt: Article on a news website with a link to scientists.
    options:
    - id: opt_1
      text: Reliable
    - id: opt_2
      text: Unreliable
    options_count: 2
    correct_answer: opt_1
    explanation: Reliable! A news website is level two. And here there's a link to scientists — you can click and verify.
      Two levels of reliability at once!
    explanation_status: implicit
  - step_id: sc6_88
    source_step_id: '88'
    scene_id: sc6
    step_type: single_choice
    prompt: Picture with text, forwarded to parents chat.
    options:
    - id: opt_1
      text: Reliable
    - id: opt_2
      text: Unreliable
    options_count: 2
    correct_answer: opt_2
    explanation: Unreliable! Picture with text is a favorite transport for rumors. Who made it? Unknown. When? Unclear. Verify?
      Impossible. Such pictures travel for years — and every time someone believes them. But now — an even more interesting
      topic. Even if you SEE something — it's not always the truth!
    explanation_status: implicit
- scene_id: sc7
  title: 'AI fakes: even video can lie'
  steps:
  - step_id: sc7_90
    source_step_id: '90'
    scene_id: sc7
    step_type: instruction
    prompt: 'We said: "Own eyes — most reliable." Photo, video — that''s proof! Or... not?'
  - step_id: sc7_91
    source_step_id: '91'
    scene_id: sc7
    step_type: theory
    prompt: Before, if you saw a photo — you could believe it. Video — even more so. But now technologies have appeared that
      can make FAKE photos and videos. And they look real!
  - step_id: sc7_92
    source_step_id: '92'
    scene_id: sc7
    step_type: theory
    prompt: Artificial intelligence — AI — can draw a photo of a person who doesn't exist. Face, clothes, background — everything
      looks real. But this person was never born. The computer invented them.
  - step_id: sc7_93
    source_step_id: '93'
    scene_id: sc7
    step_type: theory
    prompt: AI can make a video where a famous person says things they never said. Lips move, voice sounds similar — but the
      words are made up. This is called "deepfake." Deep fake.
  - step_id: sc7_94
    source_step_id: '94'
    scene_id: sc7
    step_type: theory
    prompt: And text too! AI can write an article that looks like a real news story. With numbers, quotes, with "sources."
      Only all these numbers and quotes are made up. The computer just knows how to arrange words nicely.
  - step_id: sc7_95
    source_step_id: '95'
    scene_id: sc7
    step_type: theory
    prompt: 'What does this mean for a scout? Before, the rule was simple: "I see — so I believe." Now: "I see — but WHO is
      showing me this? And WHY?"'
  - step_id: sc7_96
    source_step_id: '96'
    scene_id: sc7
    step_type: instruction
    prompt: Let's practice! Can you trust something just because there's a photo or video?
  - step_id: sc7_97
    source_step_id: '97'
    scene_id: sc7
    step_type: single_choice
    prompt: 'Friend shows a photo: "Look, I met a tiger in the park!" The photo is bright and clear.'
    options:
    - id: opt_1
      text: You can trust
    - id: opt_2
      text: Worth checking
    options_count: 2
    correct_answer: opt_2
    explanation: Worth checking! A photo could be made with AI in 10 seconds. A tiger in the park is a sensation. If a tiger
      was really walking around — the whole city would know about it, not just one friend with a phone.
    explanation_status: implicit
  - step_id: sc7_99
    source_step_id: '99'
    scene_id: sc7
    step_type: single_choice
    prompt: On the zoo website — a video of a new baby giraffe with a caption and birth date.
    options:
    - id: opt_1
      text: You can trust
    - id: opt_2
      text: Worth checking
    options_count: 2
    correct_answer: opt_1
    explanation: You can trust! Official website + video + specific information. The zoo has no reason to fake a baby giraffe.
      Although the baby giraffe in the video is suspiciously cute — but that's not a crime.
    explanation_status: implicit
  - step_id: sc7_101
    source_step_id: '101'
    scene_id: sc7
    step_type: single_choice
    prompt: 'In the chat — audio message "from the principal": vacation will be extended a week.'
    options:
    - id: opt_1
      text: You can trust
    - id: opt_2
      text: Worth checking
    options_count: 2
    correct_answer: opt_2
    explanation: Worth checking! A voice can be faked with AI. Audio in a chat is not proof. If vacation was extended — there
      would be an announcement on the school website.
    explanation_status: implicit
  - step_id: sc7_103
    source_step_id: '103'
    scene_id: sc7
    step_type: single_choice
    prompt: You photographed your grade in your diary and show it to mom.
    options:
    - id: opt_1
      text: You can trust
    - id: opt_2
      text: Worth checking
    options_count: 2
    correct_answer: opt_1
    explanation: You can trust! You took the photo yourself, mom knows you and your diary. The source is you. Although...
      mom will still check the diary in person. Moms are natural scouts.
    explanation_status: implicit
  - step_id: sc7_105
    source_step_id: '105'
    scene_id: sc7
    step_type: single_choice
    prompt: 'Video on social media: famous scientist says "The Earth is actually flat!"'
    options:
    - id: opt_1
      text: You can trust
    - id: opt_2
      text: Worth checking
    options_count: 2
    correct_answer: opt_2
    explanation: 'Worth checking! This could be a deepfake. A real scientist wouldn''t say that. Check: is it on his official
      channel? Did other sources confirm it? No? Then someone is having fun — or lying.'
    explanation_status: implicit
  - step_id: sc7_107
    source_step_id: '107'
    scene_id: sc7
    step_type: single_choice
    prompt: Photo in a physics textbook showing how light passes through a prism.
    options:
    - id: opt_1
      text: You can trust
    - id: opt_2
      text: Worth checking
    options_count: 2
    correct_answer: opt_1
    explanation: You can trust! A textbook is a verified source, photos in it have been edited. Prisms have existed for millions
      of years — it's pointless to fake them. So, even "own eyes" now needs to be verified. But how? There's a golden rule!
    explanation_status: implicit
- scene_id: sc8
  title: Rule of two sources
  steps:
  - step_id: sc8_109
    source_step_id: '109'
    scene_id: sc8
    step_type: theory
    prompt: So, photos and videos can lie, bloggers can be wrong, chats have rumors. How can a scout live? There's a golden
      rule that real journalists use!
  - step_id: sc8_110
    source_step_id: '110'
    scene_id: sc8
    step_type: theory
    prompt: THE RULE OF TWO SOURCES. If the same thing is said by TWO different sources that are NOT CONNECTED to each other
      — the information is much more reliable.
  - step_id: sc8_111
    source_step_id: '111'
    scene_id: sc8
    step_type: theory
    prompt: Why? Because one person can be wrong. Or lie. Or mix things up. But for TWO different people who don't talk to
      each other to tell the same lie — that's very unlikely. It's like if two people in different cities came up with the
      same joke at the same time.
  - step_id: sc8_112
    source_step_id: '112'
    scene_id: sc8
    step_type: theory
    prompt: 'Example. A classmate says: "There''s a test tomorrow, the teacher told me." Maybe he''s telling the truth, maybe
      he''s joking. One source — unreliable. But then another friend says: "My mom read in the parents'' chat — there''s a
      test tomorrow!" Mom and the classmate didn''t plan it. TWO independent sources — much more reliable!'
  - step_id: sc8_113
    source_step_id: '113'
    scene_id: sc8
    step_type: theory
    prompt: 'Important: sources must be INDEPENDENT. If Petrik told Vovka, and Vovka told you — that''s NOT two sources. That''s
      one source — Petrik. Vovka just retold it.'
  - step_id: sc8_114
    source_step_id: '114'
    scene_id: sc8
    step_type: instruction
    prompt: Let's check! Did the rule of two sources work?
  - step_id: sc8_115
    source_step_id: '115'
    scene_id: sc8
    step_type: single_choice
    prompt: One friend says "field trip Friday, his older brother told him," another friend says "my mom saw the announcement
      in the school chat."
    options:
    - id: opt_1
      text: Two sources — reliable
    - id: opt_2
      text: One source — check
    options_count: 2
    correct_answer: opt_1
    explanation: Two sources! The older brother of one and the mom of the other are independent. They didn't coordinate. Both
      found out from different places and both say the same thing. Reliable!
    explanation_status: implicit
  - step_id: sc8_117
    source_step_id: '117'
    scene_id: sc8
    step_type: single_choice
    prompt: Three classmates say "vacation was moved," but all three learned it from the same chat.
    options:
    - id: opt_1
      text: Two sources — reliable
    - id: opt_2
      text: One source — check
    options_count: 2
    correct_answer: opt_2
    explanation: One source! Three people — but all retelling the SAME chat. That's not three sources — that's one message
      retold three times. Number of retellings doesn't equal number of sources!
    explanation_status: implicit
  - step_id: sc8_119
    source_step_id: '119'
    scene_id: sc8
    step_type: single_choice
    prompt: A news website says "a baby tiger was born at the zoo," and your friend says "I was at the zoo yesterday and saw
      the baby tiger myself!"
    options:
    - id: opt_1
      text: Two sources — reliable
    - id: opt_2
      text: One source — check
    options_count: 2
    correct_answer: opt_1
    explanation: Two sources! News website is one. Friend who was there personally is the second. They're not connected. Both
      confirm — the baby tiger is real!
    explanation_status: implicit
  - step_id: sc8_121
    source_step_id: '121'
    scene_id: sc8
    step_type: single_choice
    prompt: The same video "UFO over school" on TikTok and Instagram — from the same author.
    options:
    - id: opt_1
      text: Two sources — reliable
    - id: opt_2
      text: One source — check
    options_count: 2
    correct_answer: opt_2
    explanation: One source! One author uploaded one video to two platforms. Two social media — not two sources. It's like
      posting the same poster on two fences. Two fences, but one poster.
    explanation_status: implicit
  - step_id: sc8_123
    source_step_id: '123'
    scene_id: sc8
    step_type: single_choice
    prompt: A neighbor says "they'll open a new playground in our yard, I saw workers," and the city website says they're
      fixing playgrounds in your district.
    options:
    - id: opt_1
      text: Two sources — reliable
    - id: opt_2
      text: One source — check
    options_count: 2
    correct_answer: opt_1
    explanation: Two sources! The neighbor saw the workers with her own eyes. The city website is separate information. They
      didn't plan it, but they say the same thing. The playground will be!
    explanation_status: implicit
  - step_id: sc8_125
    source_step_id: '125'
    scene_id: sc8
    step_type: single_choice
    prompt: Blogger writes "this diet works" and in the comments his followers write "yes, it definitely works!"
    options:
    - id: opt_1
      text: Two sources — reliable
    - id: opt_2
      text: One source — check
    options_count: 2
    correct_answer: opt_2
    explanation: One source! The blogger's followers are not independent. They believed HIM and repeat after him. It's like
      an echo in mountains — one sound, heard many times. A real second source would be a doctor or scientific research.
    explanation_status: implicit
  - step_id: sc8_127
    source_step_id: '127'
    scene_id: sc8
    step_type: theory
    prompt: The rule of two sources is a powerful tool. Now let's put ALL the tools together in one example. A real case from
      life!
- scene_id: sc9
  title: 'Case: missing kitten'
  steps:
  - step_id: sc9_128
    source_step_id: '128'
    scene_id: sc9
    step_type: theory
    prompt: 'So, your friend sends you a post: "HELP! Missing kitten! Small, orange, sad eyes!" Photo — the cutest fluffy
      ball. Your heart sinks. You want to rush out and search. But... we''re scouts. Let''s turn on the flashlight!'
  - step_id: sc9_129
    source_step_id: '129'
    scene_id: sc9
    step_type: instruction
    prompt: 'Scout''s first question: WHERE IS THIS FROM? Who''s the source?'
  - step_id: sc9_130
    source_step_id: '130'
    scene_id: sc9
    step_type: single_choice
    prompt: Friend sent the post he got from another friend who got it from someone unknown. What kind of source is this?
    options:
    - id: opt_1
      text: Own eyes
    - id: opt_2
      text: Heard from others
    options_count: 2
    correct_answer: opt_2
    explanation: Heard from others! Chain of forwards. Friend didn't see the kitten. His friend didn't either. Author of original
      post — unknown. Already suspicious.
    explanation_status: implicit
  - step_id: sc9_132
    source_step_id: '132'
    scene_id: sc9
    step_type: instruction
    prompt: 'Second question: let''s CHECK THREE KEYS. Knows the topic? Wants to get something? Can you verify?'
  - step_id: sc9_133
    source_step_id: '133'
    scene_id: sc9
    step_type: single_choice
    prompt: Post author is unknown, no address given, no phone number. Can you verify the information?
    options:
    - id: opt_1
      text: Yes, you can verify
    - id: opt_2
      text: No, you can't verify
    options_count: 2
    correct_answer: opt_2
    explanation: Can't verify! No address, no phone, no name. How to search for a kitten if you don't even know what city
      it disappeared in?
    explanation_status: implicit
  - step_id: sc9_135
    source_step_id: '135'
    scene_id: sc9
    step_type: instruction
    prompt: 'Third question: which INTERNET did we find this in? What level?'
  - step_id: sc9_136
    source_step_id: '136'
    scene_id: sc9
    step_type: single_choice
    prompt: Post came through a chain of forwards in a messenger. What level is this?
    options:
    - id: opt_1
      text: Reliable
    - id: opt_2
      text: Unreliable
    options_count: 2
    correct_answer: opt_2
    explanation: Unreliable! Fourth level — chats and forwards. Whisper in a dark hallway, remember?
    explanation_status: implicit
  - step_id: sc9_138
    source_step_id: '138'
    scene_id: sc9
    step_type: theory
    prompt: 'Fourth question: WHEN was this written? Check the date of the original post...'
  - step_id: sc9_139
    source_step_id: '139'
    scene_id: sc9
    step_type: single_choice
    prompt: Original post date — FIVE years ago. The kitten in the photo was 2 months old. How old is it now?
    options:
    - id: opt_1
      text: Still a small kitten
    - id: opt_2
      text: Already a five-year-old adult cat
    options_count: 2
    correct_answer: opt_2
    explanation: Adult cat! Five years passed. This "cute fluffy ball" has long grown into a healthy brazen cat that sleeps
      on other people's jackets, steals sausages from the table, and looks at owners like "this is MY apartment." Beaten by
      life, but satisfied with it. And definitely not missing.
    explanation_status: implicit
  - step_id: sc9_141
    source_step_id: '141'
    scene_id: sc9
    step_type: instruction
    prompt: 'Fifth question: rule of two sources. Is there a second source?'
  - step_id: sc9_142
    source_step_id: '142'
    scene_id: sc9
    step_type: single_choice
    prompt: Post circulates in chats, but no media wrote about it, no shelter confirmed it, no police is searching.
    options:
    - id: opt_1
      text: Two sources exist
    - id: opt_2
      text: Only one source
    options_count: 2
    correct_answer: opt_2
    explanation: Only one source! One post that people copy and forward. No confirmation. If a kitten had really gone missing
      — the owner would have left contacts, a shelter would help, and definitely not for five years in a row.
    explanation_status: implicit
  - step_id: sc9_144
    source_step_id: '144'
    scene_id: sc9
    step_type: theory
    prompt: 'That''s how a scout does a complete check! We used ALL the tools: identified source type, asked three questions,
      checked internet level, looked at the date, applied the rule of two sources. And solved the case! The kitten has long
      grown up and feels wonderful. And the post is just an old rumor traveling through chats like an eternal tourist.'
- scene_id: sc10
  title: One person vs. many verified
  steps:
  - step_id: sc10_145
    source_step_id: '145'
    scene_id: sc10
    step_type: theory
    prompt: We learned to verify sources, tell apart internet levels, recognize AI fakes, and apply the rule of two sources.
      There's one more important idea!
  - step_id: sc10_146
    source_step_id: '146'
    scene_id: sc10
    step_type: theory
    prompt: ONE PERSON THINKS — that's when someone shares their opinion. "I think pizza is tastier than a burger." That's
      their right, but it's not a fact. It's one person's taste.
  - step_id: sc10_147
    source_step_id: '147'
    scene_id: sc10
    step_type: theory
    prompt: MANY PEOPLE VERIFIED — that's when many people confirmed information independently. "Everyone who tried it says
      — the soup is salty." If ten people say "salty" — chances are the soup is really salty.
  - step_id: sc10_148
    source_step_id: '148'
    scene_id: sc10
    step_type: theory
    prompt: 'Even a smart person can be wrong! One chef says: "My soup is perfect." That''s his opinion. But if a hundred
      people tried it and say "too salty" — that''s not an opinion, it''s a collective check. You can''t fool a hundred taste
      buds.'
  - step_id: sc10_149
    source_step_id: '149'
    scene_id: sc10
    step_type: instruction
    prompt: Let's decide! What do we have?
  - step_id: sc10_150
    source_step_id: '150'
    scene_id: sc10
    step_type: single_choice
    prompt: '"Water boils when heated — everyone has seen it."'
    options:
    - id: opt_1
      text: Many people verified
    - id: opt_2
      text: One person thinks
    - id: opt_3
      text: Rumor
    options_count: 3
    correct_answer: opt_1
    explanation: 'Many people verified! This is a fact everyone can confirm. Billions of people have boiled water. None said:
      "But it doesn''t boil for me." Except maybe those who forgot to turn on the stove.'
    explanation_status: implicit
  - step_id: sc10_152
    source_step_id: '152'
    scene_id: sc10
    step_type: single_choice
    prompt: '"Our PE teacher thinks running is better than swimming."'
    options:
    - id: opt_1
      text: Many people verified
    - id: opt_2
      text: One person thinks
    - id: opt_3
      text: Rumor
    options_count: 3
    correct_answer: opt_2
    explanation: One person thinks! That's one teacher's opinion. Another teacher might think the opposite. Running and swimming
      won't be offended.
    explanation_status: implicit
  - step_id: sc10_154
    source_step_id: '154'
    scene_id: sc10
    step_type: single_choice
    prompt: '"They write on the internet that flying cars will be invented soon."'
    options:
    - id: opt_1
      text: Many people verified
    - id: opt_2
      text: One person thinks
    - id: opt_3
      text: Rumor
    options_count: 3
    correct_answer: opt_3
    explanation: Rumor! "They write on the internet" — who writes? Where? Which scientists? What proof? It's a cloud of fog
      without a single fact. Flying cars only exist in cartoons — and feel great there.
    explanation_status: implicit
  - step_id: sc10_156
    source_step_id: '156'
    scene_id: sc10
    step_type: single_choice
    prompt: '"All doctors say sleep is important for health."'
    options:
    - id: opt_1
      text: Many people verified
    - id: opt_2
      text: One person thinks
    - id: opt_3
      text: Rumor
    options_count: 3
    correct_answer: opt_1
    explanation: Many people verified! All doctors agree, there are scientific studies. This is not one person's opinion —
      it's the result of verification by thousands of specialists.
    explanation_status: implicit
  - step_id: sc10_158
    source_step_id: '158'
    scene_id: sc10
    step_type: single_choice
    prompt: '"One boy says his dog is the smartest in the world."'
    options:
    - id: opt_1
      text: Many people verified
    - id: opt_2
      text: One person thinks
    - id: opt_3
      text: Rumor
    options_count: 3
    correct_answer: opt_2
    explanation: One person thinks! The boy loves his dog — and that's wonderful. But "smartest in the world" — that's his
      feelings, not a verified fact. Though the dog of course agrees with him.
    explanation_status: implicit
  - step_id: sc10_160
    source_step_id: '160'
    scene_id: sc10
    step_type: theory
    prompt: 'Remember: one person''s opinion — even a very smart one — is not yet a fact. A fact is when MANY people, independently,
      have verified and confirmed it. The more independent verifications — the more reliable.'
  - step_id: sc10_161
    source_step_id: '161'
    scene_id: sc10
    step_type: reflection
    prompt: So, scouts — let's sum up the whole lesson!
- scene_id: sc11
  title: 'Danger: message "from mom"'
  steps:
  - step_id: sc11_162
    source_step_id: '162'
    scene_id: sc11
    step_type: theory
    prompt: Now — the most serious topic. Everything we learned today can one day truly PROTECT you. Really. Listen carefully.
  - step_id: sc11_163
    source_step_id: '163'
    scene_id: sc11
    step_type: theory
    prompt: 'Imagine: you get a voice message on your phone. The voice sounds like mom''s. Mom says: "Son, I have problems.
      Uncle Sergei will come to you soon, he''s my friend. Go with him to me. Urgent! Don''t call me — my phone is dying."'
  - step_id: sc11_164
    source_step_id: '164'
    scene_id: sc11
    step_type: instruction
    prompt: Your heart races. Mom is in trouble! You want to run. But... STOP. We're scouts. Let's turn on the flashlight.
      Let's check.
  - step_id: sc11_165
    source_step_id: '165'
    scene_id: sc11
    step_type: theory
    prompt: 'First: SOURCE. Voice message in a messenger. We already know — a voice can be faked with AI. Deepfake. Just a
      few seconds of mom''s voice from social media — and the computer can make any message. This might NOT be mom.'
  - step_id: sc11_166
    source_step_id: '166'
    scene_id: sc11
    step_type: theory
    prompt: 'Second: THREE QUESTIONS. Does "mom" understand the situation? We don''t know — we''re not even sure it''s mom.
      Does someone want to get something? Yes — someone wants you to LEAVE with a stranger. Can you verify? "Don''t call me"
      — they''re directly forbidding verification! Red signal!'
  - step_id: sc11_167
    source_step_id: '167'
    scene_id: sc11
    step_type: theory
    prompt: 'Third: RULE OF TWO SOURCES. There''s only ONE message. Dad didn''t confirm, grandma didn''t, teacher didn''t,
      school didn''t. One source — and it forbids verification. This is the main sign of deception: when someone tells you
      "don''t verify, just trust."'
  - step_id: sc11_168
    source_step_id: '168'
    scene_id: sc11
    step_type: theory
    prompt: What to do? First and most important — CALL MOM. Yes, actually call. Don't text — call. If mom doesn't answer
      — call dad, grandma, another adult from the family. Anyone — but NOT the number the message came from.
  - step_id: sc11_169
    source_step_id: '169'
    scene_id: sc11
    step_type: theory
    prompt: Second — DON'T go or leave with a stranger ANYWHERE. Never. Even if they know your name, your mom's name, and
      your school. This information is easy to find online.
  - step_id: sc11_170
    source_step_id: '170'
    scene_id: sc11
    step_type: theory
    prompt: Third — tell an adult nearby. A teacher, security guard, neighbor. Any familiar adult. Don't be shy. If it's a
      mistake — everyone will laugh. If it's not a mistake — you're safe.
  - step_id: sc11_171
    source_step_id: '171'
    scene_id: sc11
    step_type: theory
    prompt: 'Remember: real mom NEVER sends a stranger to pick you up. If mom really has a problem — she''ll call dad, grandma,
      your teacher. Adults solve problems through other adults, not through children and strangers.'
  - step_id: sc11_172
    source_step_id: '172'
    scene_id: sc11
    step_type: theory
    prompt: And last. If someone says "don't call, don't check, just trust" — that's ALWAYS suspicious. Real truth is not
      afraid of verification. Only lies are afraid of verification.
  - step_id: sc11_173
    source_step_id: '173'
    scene_id: sc11
    step_type: reflection
    prompt: That's why we need all the scout's tools. Not just to check memes and news — but to be safe. Now let's sum up!
- scene_id: sc12
  title: 'Quick round: all mixed together'
  steps:
  - step_id: sc12_174
    source_step_id: '174'
    scene_id: sc12
    step_type: theory
    prompt: Final quick round! All tools mixed together. Here are sources, internet, AI, two sources, and one vs. many. Ready?
  - step_id: sc12_175
    source_step_id: '175'
    scene_id: sc12
    step_type: single_choice
    prompt: '"A neighbor says he saw new people move into the neighboring house."'
    options:
    - id: opt_1
      text: Own eyes
    - id: opt_2
      text: Heard from others
