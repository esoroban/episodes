- scene_id: sc11
  title: 'Let''s remember. Today we became detectives of conversations. Three redirectors: change the subject, change the
    tone of conversation, and answer a different question. And the magic phrase: "That''s interesting, but I asked about something
    else..."'
  steps:
  - step_id: sc11_141
    source_step_id: '141'
    scene_id: sc11
    step_type: theory
    prompt: 'I''ll tell you a story. A boy asked his grandfather: "Grandpa, have you ever lied?" Grandpa smiled and said:
      "Oh, let me tell you how I once caught a fish the size of a boat!" The boy laughed and forgot his question. A year later
      he remembered and understood: Grandpa activated the redirector.'
  - step_id: sc11_142
    source_step_id: '142'
    scene_id: sc11
    step_type: theory
    prompt: 'And the boy asked again. And Grandpa quietly answered: "Yes, sometimes." Just two words. But it was an honest
      answer. And the boy respected his grandfather even more—not because he never lied, but because he could admit it.'
  - step_id: sc11_143
    source_step_id: '143'
    scene_id: sc11
    step_type: theory
    prompt: That's what our superpower gives us. We don't catch people to accuse them. We ask questions because we want real
      answers. And real answers, even uncomfortable ones, bring people closer together.
  - step_id: sc11_144
    source_step_id: '144'
    scene_id: sc11
    step_type: theory
    prompt: 'And remember: repeating your question is not rudeness. It''s respect for yourself and for the conversation. Calmly,
      politely, but persistently—like GPS: route recalculated, returning to the question.'
  - step_id: sc11_145
    source_step_id: '145'
    scene_id: sc11
    step_type: theory
    prompt: 'And during the break, try this: ask someone a question and see—will they answer directly or activate the redirector?
      See you after the break!'
  - step_id: sc11_146
    source_step_id: '146'
    scene_id: sc11
    step_type: theory
    prompt: 'А на перемене попробуйте: задайте кому-нибудь вопрос и посмотрите — ответят прямо или включат поворотник? Увидимся
      после перерыва!'
