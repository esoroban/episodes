source_lesson_id: lesson_6A
language: en
title: Dodging the Answer
day: 6
slot: A
scenes:
- scene_id: sc1
  title: 'Warm-up: Speed quiz from the course'
  steps:
  - step_id: sc1_1
    source_step_id: '1'
    scene_id: sc1
    step_type: theory
    prompt: Hello, detectives! Before the new topic — a quick warm-up. Let's remember everything we learned in previous lessons.
      Answer quickly!
  - step_id: sc1_2
    source_step_id: '2'
    scene_id: sc1
    step_type: single_choice
    prompt: '"Chocolate is the most delicious food on the planet."'
    options:
    - id: opt_1
      text: Fact
    - id: opt_2
      text: Opinion
    - id: opt_3
      text: 'False'
    options_count: 3
    correct_answer: opt_2
    explanation: Opinion! "Most delicious" is a judgment. Some people like chocolate, others like salty cucumbers. Both are
      right. Both are weird.
    explanation_status: present
  - step_id: sc1_4
    source_step_id: '4'
    scene_id: sc1
    step_type: single_choice
    prompt: 'A friend says: "I put on yellow socks and got an excellent grade! Yellow socks bring good luck!"'
    options:
    - id: opt_1
      text: Cause
    - id: opt_2
      text: Coincidence
    options_count: 2
    correct_answer: opt_2
    explanation: Coincidence! Socks don't affect grades. Otherwise, those who study well would wear yellow socks. And those
      who struggle would go barefoot.
    explanation_status: implicit
  - step_id: sc1_6
    source_step_id: '6'
    scene_id: sc1
    step_type: single_choice
    prompt: In summer, people eat more ice cream. In summer, people get sunburned more often. So does ice cream cause sunburns?
    options:
    - id: opt_1
      text: Yes, it's the cause
    - id: opt_2
      text: No, common cause is summer
    - id: opt_3
      text: No, just coincidence
    options_count: 3
    correct_answer: opt_2
    explanation: Common cause is summer! Both ice cream and sunburns appear because of the heat. Ice cream is not to blame.
      It was unfairly accused.
    explanation_status: present
  - step_id: sc1_8
    source_step_id: '8'
    scene_id: sc1
    step_type: single_choice
    prompt: 'An advertisement says: "Doctors recommend this yogurt!" Which persuasion technique?'
    options:
    - id: opt_1
      text: Logos (facts and logic)
    - id: opt_2
      text: Ethos (trust in authority)
    - id: opt_3
      text: Pathos (emotions)
    options_count: 3
    correct_answer: opt_2
    explanation: Ethos! Doctors are authorities. We trust their opinion. Advertisers know this and use it.
    explanation_status: implicit
  - step_id: sc1_10
    source_step_id: '10'
    scene_id: sc1
    step_type: single_choice
    prompt: 'Scene 1: First Spotted'
    options:
    - id: opt_1
      text: Help, detectives! I asked my friends for a ride, but they're asking me weird questions.
    - id: opt_2
      text: 'First scene. Your friend asked: "Where are you going?"'
    - id: opt_3
      text: 'And you answered: "Oh, look at those beautiful clouds!"'
    options_count: 3
    correct_answer: opt_3
    explanation: 'Pathos! Pressure from the crowd: “everyone has already bought it, but you haven’t, which means you’re crazy.”
      This is not an argument, but a manipulation. Who is “everyone” anyway? Two people from advertising?'
    explanation_status: implicit
  - step_id: sc1_12
    source_step_id: '12'
    scene_id: sc1
    step_type: single_choice
    prompt: 'Dispute about school uniform. Someone says: “Uniforms are necessary because without them children will show off
      their clothes.” This...'
    options:
    - id: opt_1
      text: Redirector
    - id: opt_2
      text: Redirector! Changed the subject. Asked where, you talked about weather. Classic move.
    - id: opt_3
      text: 'Friend asked: "Why do you need a ride?"'
    options_count: 3
    correct_answer: opt_2
    explanation: 'And you said: "My bike is broken, unfortunately."'
    explanation_status: implicit
  - step_id: sc1_14
    source_step_id: '14'
    scene_id: sc1
    step_type: theory
    prompt: Отлично, память работает! А сейчас — новая тема. И она вам точно знакома из жизни.
- scene_id: sc2
  title: Answered!
  steps:
  - step_id: sc2_15
    source_step_id: '15'
    scene_id: sc2
    step_type: theory
    prompt: Even a brief explanation is a clear answer. Your friend understands why you're asking.
  - step_id: sc2_16
    source_step_id: '16'
    scene_id: sc2
    step_type: single_choice
    prompt: '"Want to play tennis instead?"'
    options:
    - id: opt_1
      text: '"I like tennis, my friends are great players!"'
    - id: opt_2
      text: What's here?
    options_count: 2
    correct_answer: opt_2
    explanation: I heard from someone! The friend didn’t see it himself - he conveys the words of his brother. And my brother
      could joke.
    explanation_status: implicit
  - step_id: sc2_18
    source_step_id: '18'
    scene_id: sc2
    step_type: single_choice
    prompt: Redirector! Asked for permission, but you talk about tennis. Changed the tone of conversation from their topic
      to yours.
    options:
    - id: opt_1
      text: Let's learn more about three redirectors.
    - id: opt_2
      text: 'Scene 2: A "Chat" About Finding Time'
    options_count: 2
    correct_answer: opt_2
    explanation: 'You ask: "Can I come on Saturday?"'
    explanation_status: implicit
  - step_id: sc2_20
    source_step_id: '20'
    scene_id: sc2
    step_type: single_choice
    prompt: 'Mom says: "Oh, I would be so happy! But you know, I''m always so busy..." And she starts talking about work,
      about household chores. Tells you how she doesn''t even have time for dinner.'
    options:
    - id: opt_1
      text: And your question about Saturday is never answered.
    - id: opt_2
      text: What is mom doing?
    options_count: 2
    correct_answer: opt_2
    explanation: Worth checking out! The video may be real, but the caption may be fictitious. AI is now making such videos
      that even the cat will be surprised.
    explanation_status: implicit
  - step_id: sc2_22
    source_step_id: '22'
    scene_id: sc2
    step_type: single_choice
    prompt: Changing the tone of conversation
    options:
    - id: opt_1
      text: Talking about something else
    - id: opt_2
      text: Changing the subject! You asked about Saturday, but she talks about being busy. All to make you forget your question
        and start feeling sorry for her.
    - id: opt_3
      text: 'Scene 3: "Raising Your Voice"'
    options_count: 3
    correct_answer: opt_3
    explanation: 'You ask: "Why did you take my money yesterday without asking?"'
    explanation_status: implicit
  - step_id: sc2_24
    source_step_id: '24'
    scene_id: sc2
    step_type: single_choice
    prompt: 'Your brother says angrily: "HOW DARE YOU SPEAK TO ME LIKE THAT! I did a lot for you!" Raises his voice, starts
      attacking you.'
    options:
    - id: opt_1
      text: Now you're on the defensive again, and your question about the money is lost.
    - id: opt_2
      text: What is brother doing?
    options_count: 2
    correct_answer: opt_1
    explanation: Независимые! Один узнал от учителя, другой — из чата. Разные каналы — значит, можно верить больше.
    explanation_status: implicit
  - step_id: sc2_26
    source_step_id: '26'
    scene_id: sc2
    step_type: single_choice
    prompt: Changing the tone of conversation
    options:
    - id: opt_1
      text: Redirector
    - id: opt_2
      text: Changing the tone! You asked calmly, but he started yelling. Attacks you instead of answering the question. Anger
        instead of answer.
    - id: opt_3
      text: 'Scene 4: "Question Instead of Answer"'
    options_count: 3
    correct_answer: opt_2
    explanation: 'You ask: "Were you at the party when they asked you about someone?"'
    explanation_status: implicit
  - step_id: sc2_28
    source_step_id: '28'
    scene_id: sc2
    step_type: single_choice
    prompt: 'Your friend asks back: "Why do you care? Are you spying on me?"'
    options:
    - id: opt_1
      text: Your question disappeared. Now you're worried that your friend is accusing you.
    - id: opt_2
      text: What is he doing?
    - id: opt_3
      text: Answered the question
    options_count: 3
    correct_answer: opt_3
    explanation: Asked a counter-question
    explanation_status: implicit
  - step_id: sc2_30
    source_step_id: '30'
    scene_id: sc2
    step_type: single_choice
    prompt: That's the third redirector! Question instead of answer. Instead of answering directly, he asks. Switches you
      to defense mode.
    options:
    - id: opt_1
      text: Good, now we know the three redirectors.
    - id: opt_2
      text: 'Three redirectors: change the subject, change the tone of conversation, or answer a question that wasn''t asked.'
    - id: opt_3
      text: 'Scene 5: "Magic Word"'
    options_count: 3
    correct_answer: opt_1
    explanation: Often people then activate the redirector. Usually, the answer seems dishonest.
    explanation_status: implicit
  - step_id: sc2_32
    source_step_id: '32'
    scene_id: sc2
    step_type: instruction
    prompt: So how should mom answer properly?
- scene_id: sc3
  title: 'Magic phrase: "That''s interesting, but I asked about something else..."'
  steps:
  - step_id: sc3_33
    source_step_id: '33'
    scene_id: sc3
    step_type: theory
    prompt: This is a magic phrase. It brings you back to the conversation.
  - step_id: sc3_34
    source_step_id: '34'
    scene_id: sc3
    step_type: instruction
    prompt: 'Scene 6: "Practice"'
  - step_id: sc3_35
    source_step_id: '35'
    scene_id: sc3
    step_type: theory
    prompt: Now let's practice. Here's an example of a conversation where someone tries to activate the redirector.
  - step_id: sc3_36
    source_step_id: '36'
    scene_id: sc3
    step_type: theory
    prompt: 'You ask dad: "Dad, will you let me go on a hiking trip?"'
  - step_id: sc3_37
    source_step_id: '37'
    scene_id: sc3
    step_type: theory
    prompt: 'Dad says: "Hm, nice! My colleague wanted to go hiking but forgot to take a map. He got lost! Was in the forest
      for 5 hours! Scary story!"'
  - step_id: sc3_38
    source_step_id: '38'
    scene_id: sc3
    step_type: theory
    prompt: Dad is trying to change the subject from hiking permission to a scary story.
  - step_id: sc3_39
    source_step_id: '39'
    scene_id: sc3
    step_type: theory
    prompt: Sometimes people do this by accident—they're just distracted. And sometimes - on purpose, so as not to answer
      an uncomfortable question. And now this is a trick. We will call such people turn signals.
  - step_id: sc3_40
    source_step_id: '40'
    scene_id: sc3
    step_type: theory
    prompt: 'You: "That''s interesting, but I asked about permission for the hike..."'
- scene_id: sc4
  title: That's the magic phrase! You calmly bring the conversation back on track.
  steps:
  - step_id: sc4_41
    source_step_id: '41'
    scene_id: sc4
    step_type: theory
    prompt: А теперь послушайте интересную историю о мальчике, который ни разу не ответил на простой вопрос. Считайте поворотники!
  - step_id: sc4_42
    source_step_id: '42'
    scene_id: sc4
    step_type: theory
    prompt: 'Mom comes into the kitchen: “Vitya, who ate the sweets from the vase?” Vitya instantly replies: “Do you know
      that our cat climbed onto the table again?”'
  - step_id: sc4_43
    source_step_id: '43'
    scene_id: sc4
    step_type: theory
    prompt: 'Мама повторяет: «Витя. Конфеты. Кто съел?» Витя вздыхает: «Мам, я же весь день уроки делал! Между прочим, контрольную
      написал на отлично!»'
  - step_id: sc4_44
    source_step_id: '44'
    scene_id: sc4
    step_type: theory
    prompt: 'Mom doesn’t give up: “Vitya, I’m asking about candy.” Vitya: “Why me right away? Maybe it''s Olenka! She was
      here yesterday too!” Vitya is spinning around like he’s in a frying pan, but there’s still no answer.'
  - step_id: sc4_45
    source_step_id: '45'
    scene_id: sc4
    step_type: open_question
    prompt: Some questions are very narrow and allow room for redirecting. Let's look at examples.
  - step_id: sc4_46
    source_step_id: '46'
    scene_id: sc4
    step_type: theory
    prompt: Did you notice? Mom is a real intelligence officer. Every time Vitya tried to turn away, she calmly brought him
      back. No screaming, no anger - she just repeated the question. And in the end, Vitya gave up. Turn signals do not work
      when the interlocutor is attentive!
- scene_id: sc5
  title: 'This is a good question because it gives only two options: yes or no.'
  steps:
  - step_id: sc5_47
    source_step_id: '47'
    scene_id: sc5
    step_type: theory
    prompt: Есть три главных способа включить поворотник. Три приёма, которыми пользуются все — от младших братьев до президентов.
      Запоминаем!
  - step_id: sc5_48
    source_step_id: '48'
    scene_id: sc5
    step_type: theory
    prompt: And here there's more room to redirect — one can talk about what they were doing, but might also start talking
      about weather and other things.
  - step_id: sc5_49
    source_step_id: '49'
    scene_id: sc5
    step_type: theory
    prompt: '"You''ve been meeting with 3 people a few times recently, haven''t I seen that?"'
  - step_id: sc5_50
    source_step_id: '50'
    scene_id: sc5
    step_type: theory
    prompt: This type of question is a specific observation with a query. It leaves little room for redirection.
  - step_id: sc5_51
    source_step_id: '51'
    scene_id: sc5
    step_type: open_question
    prompt: Let's stop here and return to how your opponent will try to answer these questions.
  - step_id: sc5_52
    source_step_id: '52'
    scene_id: sc5
    step_type: theory
    prompt: 'Here’s my version: “Mom, do you know that in Japan they eat soup for breakfast? Imagine - in the morning, instead
      of porridge!” It seems to be about soup, it seems to be on topic - but the question “did you eat it?” remained unanswered.
      Nice turn signal!'
  - step_id: sc5_53
    source_step_id: '53'
    scene_id: sc5
    step_type: theory
    prompt: 'The second is a CHANGE OF TONALITY. The person makes jokes or shows strong emotions to distract. Question: “Why
      are you late?” The answer is a joke: “Ha ha, can you imagine, I saw such a funny dog ​​on the way!” Everyone laughs,
      but the question is forgotten. Or the answer is an emotion: “Why do you ALWAYS scold me?!” And now you are making excuses
      instead of getting an answer.'
  - step_id: sc5_54
    source_step_id: '54'
    scene_id: sc5
    step_type: theory
    prompt: Now let's look at the most common ways of dodging the answer.
  - step_id: sc5_55
    source_step_id: '55'
    scene_id: sc5
    step_type: theory
    prompt: 'It''s your turn! Question: “Why didn’t you do your homework?” Come up with a change of tone - a joke or emotion
      so that the interlocutor forgets what he asked.'
  - step_id: sc5_56
    source_step_id: '56'
    scene_id: sc5
    step_type: open_question
    prompt: 'You ask mom: "Mom, will you fix this tomorrow?"'
  - step_id: sc5_57
    source_step_id: '57'
    scene_id: sc5
    step_type: theory
    prompt: 'Mom says: "Oh, look at all the new things in the store!" Completely changed the subject.'
  - step_id: sc5_58
    source_step_id: '58'
    scene_id: sc5
    step_type: theory
    prompt: 'The third is ANSWER TO ANOTHER QUESTION. The most insidious trick! The person seems to be answering, but to the
      wrong question. Question: “Have you done your math homework?” Answer: “I read a lot today!” I read it - well done. But
      where is the mathematics? Problems will not solve themselves.'
  - step_id: sc5_59
    source_step_id: '59'
    scene_id: sc5
    step_type: theory
    prompt: This trick is tricky because it looks like the real answer. A person is not silent, does not joke, does not shout
      - he says something to the point. Just on a different matter. A turn signal without a flasher is invisible, but still
      a turn signal.
  - step_id: sc5_60
    source_step_id: '60'
    scene_id: sc5
    step_type: theory
    prompt: 'Dad: "DO I LOOK SAD?! That''s offensive! I''m the happiest person in the world!" (but that''s not true, he''s
      definitely sad).'
  - step_id: sc5_61
    source_step_id: '61'
    scene_id: sc5
    step_type: open_question
    prompt: 'Way 3: Answer a Different Question'
  - step_id: sc5_62
    source_step_id: '62'
    scene_id: sc5
    step_type: theory
    prompt: 'А вот мой: «Я сегодня помыл посуду и вынес мусор!» Звучит прекрасно — ответственный ребёнок, трудяга. Но комната?
      Комната стоит нетронутая и тихо плачет. Посуда помыта, мусор вынесен — а вопрос всё ещё ждёт ответа.'
- scene_id: sc6
  title: 'Brother: "I like going to the park, it''s cool! My friends always go there." But he didn''t answer your question.'
  steps:
  - step_id: sc6_63
    source_step_id: '63'
    scene_id: sc6
    step_type: theory
    prompt: This method is the most subtle. It sounds like an answer, but it's actually answering a question you didn't ask.
  - step_id: sc6_64
    source_step_id: '64'
    scene_id: sc6
    step_type: single_choice
    prompt: Now let's figure out what to do if the other person activated the redirector.
    options:
    - id: opt_1
      text: Magic Phrase
    - id: opt_2
      text: 'If the person activated the redirector, you can say:'
    - id: opt_3
      text: '"That''s interesting, but I asked about [what you actually asked]."'
    - id: opt_4
      text: This reminds them of your original question.
    options_count: 4
    correct_answer: opt_1
    explanation: Смена темы! Руки не помыты, зато птичка красивая. Птичка, кстати, тоже руки не моет — но она птичка, ей можно.
      А вам — марш к раковине.
    explanation_status: implicit
  - step_id: sc6_66
    source_step_id: '66'
    scene_id: sc6
    step_type: single_choice
    prompt: «Почему ты не пришёл на тренировку?» — «Ха-ха, я пошёл, но перепутал двери и попал на кружок вязания! Связал шарф!
      Хочешь покажу?»
    options:
    - id: opt_1
      text: 'Below are examples of conversations. For each conversation, indicate: was it an answer or a redirector?'
    - id: opt_2
      text: '"Did you go to the party?"'
    - id: opt_3
      text: '"No, I was home doing homework."'
    - id: opt_4
      text: That's an answer
    options_count: 4
    correct_answer: opt_2
    explanation: Changing the key is a joke! Funny story instead of an answer. The scarf may be beautiful, but you weren’t
      at the training session. And the coach won’t appreciate the scarf.
    explanation_status: implicit
  - step_id: sc6_68
    source_step_id: '68'
    scene_id: sc6
    step_type: single_choice
    prompt: Answer! Brief, clear, on point. Beautiful.
    options:
    - id: opt_1
      text: '"And who else do you go out with?"'
    - id: opt_2
      text: Redirector
    - id: opt_3
      text: Redirector! Asked not "who else", but "do YOU want to". Counter-question instead of answer is a classic.
    - id: opt_4
      text: '"No, I have training."'
    options_count: 4
    correct_answer: opt_3
    explanation: Answer to another question! Mathematics is great, but they asked about a poem. The poem is offended and waits
      in the corner. It thought that they would remember about it, but no - again mathematics.
    explanation_status: implicit
  - step_id: sc6_70
    source_step_id: '70'
    scene_id: sc6
    step_type: single_choice
    prompt: “Who broke the vase?” - “Why do you always blame me?! It's not fair!
    options:
    - id: opt_1
      text: Answer! "No" + reason. Someone might be offended, but at least it's clear.
    - id: opt_2
      text: '"Movies are so fun! I love popcorn!"'
    - id: opt_3
      text: Answer
    - id: opt_4
      text: Redirector
    options_count: 4
    correct_answer: opt_2
    explanation: Redirector! Loves popcorn but not a word about Saturday.
    explanation_status: implicit
  - step_id: sc6_72
    source_step_id: '72'
    scene_id: sc6
    step_type: single_choice
    prompt: «Ты сделал уроки?» — «Да, сделал математику и английский.»
    options:
    - id: opt_1
      text: 'Let''s remember. Today we became detectives of conversations. Three redirectors: change the subject, change the
        tone of conversation, and answer a different question. And the magic phrase: "That''s interesting, but I asked about
        something else..."'
    - id: opt_2
      text: 'I''ll tell you a story. A boy asked his grandfather: "Grandpa, have you ever lied?" Grandpa smiled and said:
        "Oh, let me tell you how I once caught a fish the size of a boat!" The boy laughed and forgot his question. A year
        later he remembered and understood: Grandpa activated the redirector.'
    - id: opt_3
      text: 'And the boy asked again. And Grandpa quietly answered: "Yes, sometimes." Just two words. But it was an honest
        answer. And the boy respected his grandfather even more—not because he never lied, but because he could admit it.'
    - id: opt_4
      text: That's what our superpower gives us. We don't catch people to accuse them. We ask questions because we want real
        answers. And real answers, even uncomfortable ones, bring people closer together.
    options_count: 4
    correct_answer: opt_4
    explanation: 'And remember: repeating your question is not rudeness. It''s respect for yourself and for the conversation.
      Calmly, politely, but persistently—like GPS: route recalculated, returning to the question.'
    explanation_status: implicit
  - step_id: sc6_74
    source_step_id: '74'
    scene_id: sc6
    step_type: single_choice
    prompt: 'And during the break, try this: ask someone a question and see—will they answer directly or activate the redirector?
      See you after the break!'
    options:
    - id: opt_1
      text: This is direct pressure on the question.
    - id: opt_2
      text: 'Tip: If someone activates the 3rd type of redirector, you can say: "That may be true, but I asked something else..."'
    - id: opt_3
      text: 'Method 1: Changing the Topic'
    - id: opt_4
      text: 'You asked dad: "Dad, will you come home today?"'
    options_count: 4
    correct_answer: opt_1
    explanation: 'Dad talks: "Oh, don''t forget, we have shopping tomorrow! I need milk, eggs, and bread. Do you need anything
      too?" Completely changed the subject.'
    explanation_status: implicit
- scene_id: sc7
  title: And your question about whether he'll come home unanswered.
  steps:
  - step_id: sc7_76
    source_step_id: '76'
    scene_id: sc7
    step_type: theory
    prompt: 'Now let''s learn the main thing. There is one detector question that always works: “Did the person answer THAT
      question I asked?” If not, he turned on the turn signal. It''s simple.'
  - step_id: sc7_77
    source_step_id: '77'
    scene_id: sc7
    step_type: theory
