- scene_id: sc7
  title: Closing
  steps:
  - step_id: sc7_154
    source_step_id: '154'
    scene_id: sc7
    step_type: theory
    prompt: Great! Let's remember the main points from today.
  - step_id: sc7_155
    source_step_id: '155'
    scene_id: sc7
    step_type: theory
    prompt: 'CAUSE AND EFFECT — one event causes another. Test: remove the first in your mind — will the second not happen?
      Then it''s a real cause. Remove the button — the light won''t turn on. Remove the ball — the window stays whole. Remove
      breakfast... well, then it''s sad.'
  - step_id: sc7_156
    source_step_id: '156'
    scene_id: sc7
    step_type: theory
    prompt: 'COINCIDENCE — two events just happen next to each other. Test: remove the first — the second STILL happens. Remove
      a sneeze — the truck still passes. Remove the shirt — the test is still the same. Remove the banana — you''ll still
      score. The world won''t fall apart!'
  - step_id: sc7_157
    source_step_id: '157'
    scene_id: sc7
    step_type: theory
    prompt: 'AFTER does not mean BECAUSE OF. The trickiest trap: the brain sees ''first one, then another'' and shouts: ''Connection!''
      But really — time is not proof. A rooster crows before sunrise, but he doesn''t turn on the sun. Wish as he might!'
  - step_id: sc7_158
    source_step_id: '158'
    scene_id: sc7
    step_type: theory
    prompt: THE THIRD REASON — the puppet master behind the curtain pulling two strings. Ice cream and burns? Heat! Swallows
      and rain? Humid air! Fir trees and mandarins? New Year! When two events go together — look for the puppet master.
  - step_id: sc7_159
    source_step_id: '159'
    scene_id: sc7
    step_type: theory
    prompt: 'Two rescue questions. First: ''What else could have affected this?'' — that''s your hidden-cause detector. Second:
      ''Can one happen without the other?'' — if yes, there''s no connection. Two questions — and you''re already detectives!'
  - step_id: sc7_160
    source_step_id: '160'
    scene_id: sc7
    step_type: theory
    prompt: 'WHERE TO FIND TRAPS: in ads — ''drink our juice and be like a champion!'', from friends — ''buy the same and
      you''ll be popular!'', in accusations — ''you came and everything broke!'' When you hear that — turn on your detective!'
  - step_id: sc7_161
    source_step_id: '161'
    scene_id: sc7
    step_type: theory
    prompt: 'Home game: ''Connection Detective''! In a day, notice TWO examples where two events happened close together.
      Write them down and decide: cause, coincidence, or hidden cause? Bonus: find an ad with a hidden-cause trap! We''ll
      share our findings next lesson!'
