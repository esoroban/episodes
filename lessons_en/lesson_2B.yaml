source_lesson_id: lesson_2B
language: en
title: Cause and Effect
day: 2
slot: B
scenes:
- scene_id: sc1
  title: DISCOVERY + STORY
  steps:
  - step_id: sc1_1
    source_step_id: '1'
    scene_id: sc1
    step_type: theory
    prompt: After the break, we continue! Last lesson we caught our brain red-handed — it loves making connections. Socks,
      cats, shirts — the brain sees a rule, but really it's a coincidence. But here's a harder question...
  - step_id: sc1_2
    source_step_id: '2'
    scene_id: sc1
    step_type: instruction
    prompt: 'Listen to this story. Petrik went outside and ate ice cream. Ten minutes later, it started raining. Petrik came
      home wet and told his mom: "It''s because of the ice cream! I ate it — and then it rained!"'
  - step_id: sc1_3
    source_step_id: '3'
    scene_id: sc1
    step_type: open_question
    prompt: Who thinks Petrik is right — that ice cream caused the rain? Don't be shy, nobody will laugh!
    teacher_guidance: Who thinks Petrik is right — that ice cream caused the rain?
  - step_id: sc1_4
    source_step_id: '4'
    scene_id: sc1
    step_type: theory
    prompt: 'Of course, ice cream doesn''t cause rain. But notice — Petrik isn''t lying or making things up. He sees: ice
      cream first, then rain. One after another. And his brain says: "Aha! So the first caused the second!" Familiar trick,
      right?'
  - step_id: sc1_5
    source_step_id: '5'
    scene_id: sc1
    step_type: theory
    prompt: 'Here''s another one. "I petted the cat — and my friend called. So the cat attracts phone calls!" Or: "Mom wore
      a new dress — and we got stuck in traffic. The dress is guilty!" Sounds silly? But people think this way EVERY DAY.
      Even adults!'
  - step_id: sc1_6
    source_step_id: '6'
    scene_id: sc1
    step_type: theory
    prompt: 'Today we''ll figure out: when one event REALLY causes another, and when our brain is making up connections. And
      you know what? This is one of the most common mistakes on the planet. Even scientists sometimes fall for it!'
  - step_id: sc1_7
    source_step_id: '7'
    scene_id: sc1
    step_type: theory
    prompt: Now listen to an interesting story about Vitya and his "lucky" pen.
  - step_id: sc1_8
    source_step_id: '8'
    scene_id: sc1
    step_type: theory
    prompt: Vitya found a beautiful pen and started writing with it. Test — good grade! Another test — also good! "The pen
      is magic!" Vitya decided.
  - step_id: sc1_9
    source_step_id: '9'
    scene_id: sc1
    step_type: theory
    prompt: But one day Vitya forgot the pen at home. He wrote the test with a regular pen — bad grade. "See!" he told his
      friends. "Without the pen — impossible!"
  - step_id: sc1_10
    source_step_id: '10'
    scene_id: sc1
    step_type: theory
    prompt: 'His friends thought about it and asked: "Vitya, when you had the pen — did you study for the test?" Vitya nodded.
      "And when you forgot it — did you study?" Vitya hesitated: "Well... no."'
  - step_id: sc1_11
    source_step_id: '11'
    scene_id: sc1
    step_type: theory
    prompt: So it wasn't the pen! You studied — good grade. You didn't study — bad grade. The pen just sat in the case and
      had nothing to do with it.
  - step_id: sc1_12
    source_step_id: '12'
    scene_id: sc1
    step_type: open_question
    prompt: 'So! Vitya was sure: his pen is magic. You write with it — good grade. You don''t — bad grade. But his friends
      figured out something?'
    teacher_guidance: But his friends figured out something?
  - step_id: sc1_13
    source_step_id: '13'
    scene_id: sc1
    step_type: theory
    prompt: When Vitya STUDIED — good grade. Didn't study — bad grade. He had the pen both times! But he only remembered when
      it matched. Familiar? Just like Dmitrik with the red shirt last lesson!
  - step_id: sc1_14
    source_step_id: '14'
    scene_id: sc1
    step_type: single_choice
    prompt: '"What REALLY causes a good grade — the pen or studying?"'
    options:
    - id: opt_1
      text: The pen
    - id: opt_2
      text: Studying
    options_count: 2
    correct_answer: opt_2
    explanation: Studying! The pen is a coincidence. And studying is the CAUSE. That's what we're going to talk about — the
      word "cause." Because not everything that happens one after another is connected. But sometimes it is. And you have
      to know how to tell the difference!
    explanation_status: present
- scene_id: sc2
  title: Cause and Effect
  steps:
  - step_id: sc2_16
    source_step_id: '16'
    scene_id: sc2
    step_type: theory
    prompt: 'Two new words. CAUSE is what MAKES an event happen. EFFECT is what HAPPENS because of the cause. There''s a connection
      between them, like a rope: pull one end — the other moves. Example: I press the switch — the light turns on. Cause —
      the switch. Effect — the light. Without the switch, no light.'
  - step_id: sc2_17
    source_step_id: '17'
    scene_id: sc2
    step_type: theory
    prompt: But here's another one. You sneezed — and a truck drove by outside. Congratulations! Your nose controls vehicles!
  - step_id: sc2_18
    source_step_id: '18'
    scene_id: sc2
    step_type: open_question
    prompt: Who believes you can make a truck appear by sneezing?
  - step_id: sc2_19
    source_step_id: '19'
    scene_id: sc2
    step_type: theory
    prompt: 'Nobody? Right! The truck would drive by without your sneeze. It''s a coincidence. And here''s a simple test:
      mentally REMOVE the first event. Will the second still happen? Yes — coincidence. No — cause. Remove the button — will
      the light turn on? No! It''s a cause. Remove the sneeze — will the truck still drive by? Yes! Coincidence.'
  - step_id: sc2_20
    source_step_id: '20'
    scene_id: sc2
    step_type: theory
    prompt: Practice time! Cause — one thing made another happen. Coincidence — just happened to be there. Let's start with
      superstitions!
  - step_id: sc2_21
    source_step_id: '21'
    scene_id: sc2
    step_type: single_choice
    prompt: '"It started raining — I opened my umbrella."'
    options:
    - id: opt_1
      text: Cause
    - id: opt_2
      text: Coincidence
    options_count: 2
    correct_answer: opt_1
    explanation: Cause! Remove the rain — will you open the umbrella? Unlikely. The rain made you. The umbrella doesn't open
      by itself from boredom!
    explanation_status: implicit
  - step_id: sc2_23
    source_step_id: '23'
    scene_id: sc2
    step_type: single_choice
    prompt: '"I spilled salt — the day will be bad."'
    options:
    - id: opt_1
      text: Cause
    - id: opt_2
      text: Coincidence
    options_count: 2
    correct_answer: opt_2
    explanation: Coincidence! Salt on the table doesn't control your day. It just sits there doing nothing. It's a superstition
      — pretty, but not a cause. Salt isn't the director of your life!
    explanation_status: implicit
  - step_id: sc2_25
    source_step_id: '25'
    scene_id: sc2
    step_type: single_choice
    prompt: '"The kettle on the stove whistled — so water boiled."'
    options:
    - id: opt_1
      text: Cause
    - id: opt_2
      text: Coincidence
    options_count: 2
    correct_answer: opt_1
    explanation: Cause! Boiling creates steam, steam comes out — kettle whistles. Remove the boiling — silence. The kettle
      doesn't whistle on its own, from good mood!
    explanation_status: implicit
  - step_id: sc2_27
    source_step_id: '27'
    scene_id: sc2
    step_type: single_choice
    prompt: '"Swallows flying low — it will rain."'
    options:
    - id: opt_1
      text: Cause
    - id: opt_2
      text: Coincidence
    options_count: 2
    correct_answer: opt_2
    explanation: Tricky one! Swallows DON'T CAUSE rain. But before rain, the air is heavy, gnats fly lower, swallows follow
      the gnats. There's something third here — we'll talk about it later! Remember the swallows!
    explanation_status: implicit
  - step_id: sc2_29
    source_step_id: '29'
    scene_id: sc2
    step_type: single_choice
    prompt: '"I didn''t study for the test — I did poorly."'
    options:
    - id: opt_1
      text: Cause
    - id: opt_2
      text: Coincidence
    options_count: 2
    correct_answer: opt_1
    explanation: Cause! Remove "didn't study" — the result changes. Studying directly affects it. The notebook won't write
      itself!
    explanation_status: implicit
  - step_id: sc2_31
    source_step_id: '31'
    scene_id: sc2
    step_type: theory
    prompt: And now — the trickiest trap in the world. A rooster crowed — and the sun rose. Did the rooster CAUSE the sunrise?
      So without the rooster the sun won't rise? The world plunges into darkness? The rooster is the ruler of light?!
  - step_id: sc2_32
    source_step_id: '32'
    scene_id: sc2
    step_type: theory
    prompt: 'Of course not! But the rooster crowed BEFORE sunrise. And the brain happily says: "The first happened before
      — so the first caused the second!" This mistake is so famous it has a name: AFTER DOESN''T MEAN BECAUSE OF. Something
      happening first doesn''t mean it caused what happened next. Time isn''t proof!'
  - step_id: sc2_33
    source_step_id: '33'
    scene_id: sc2
    step_type: theory
    prompt: 'First rescue question: "What ELSE could have affected it?" Example: "I drank juice — and the cold went away!"
      But maybe you also took medicine? Rested three days? And your body fixed itself? The juice might have nothing to do
      with it!'
  - step_id: sc2_34
    source_step_id: '34'
    scene_id: sc2
    step_type: theory
    prompt: 'Second: "Does one happen without the other?" Grandma says: "If your nose itches — guests are coming!" Let''s
      check: does your nose itch when no guests come? Every day! Do guests come when your nose doesn''t itch? Yes! So nose
      itching and guests aren''t connected. Sorry, Grandma!'
  - step_id: sc2_35
    source_step_id: '35'
    scene_id: sc2
    step_type: instruction
    prompt: New round! Is the conclusion right — or the "after means because" mistake? Let's go!
  - step_id: sc2_36
    source_step_id: '36'
    scene_id: sc2
    step_type: single_choice
    prompt: '"I wore new sneakers and won the race. So the sneakers are magic!"'
    options:
    - id: opt_1
      text: Conclusion is right
    - id: opt_2
      text: Mistake
    options_count: 2
    correct_answer: opt_2
    explanation: Mistake! The sneakers don't run for you. Can you win without those sneakers? Sure! It's about training, not
      shoes. Sneakers are just shoes, not rockets!
    explanation_status: implicit
  - step_id: sc2_38
    source_step_id: '38'
    scene_id: sc2
    step_type: single_choice
    prompt: '"I put ice in a warm room — it melted. Heat melted the ice."'
    options:
    - id: opt_1
      text: Conclusion is right
    - id: opt_2
      text: Mistake
    options_count: 2
    correct_answer: opt_1
    explanation: Right! Remove heat — ice won't melt. No other causes. It's a real connection. Physics doesn't lie!
    explanation_status: present
  - step_id: sc2_40
    source_step_id: '40'
    scene_id: sc2
    step_type: single_choice
    prompt: '"Grandma came — it started snowing. Grandma brought the snow!"'
    options:
    - id: opt_1
      text: Conclusion is right
    - id: opt_2
      text: Mistake
    options_count: 2
    correct_answer: opt_2
    explanation: Mistake! Grandma doesn't control the weather. Unless someone's grandma is a witch? But it snows without grandma
      — that's a coincidence. Grandma brought pies, not snow!
    explanation_status: implicit
  - step_id: sc2_42
    source_step_id: '42'
    scene_id: sc2
    step_type: single_choice
    prompt: '"I broke a mirror — seven years of bad luck!"'
    options:
    - id: opt_1
      text: Conclusion is right
    - id: opt_2
      text: Mistake
    options_count: 2
    correct_answer: opt_2
    explanation: Mistake! The mirror doesn't know your schedule for seven years ahead. Can you break a mirror and then everything's
      fine? Yes. Can you have bad luck without breaking a mirror? Yes. No connection! A mirror is just glass, not a time machine.
    explanation_status: implicit
  - step_id: sc2_44
    source_step_id: '44'
    scene_id: sc2
    step_type: single_choice
    prompt: '"I didn''t water the flower — it withered."'
    options:
    - id: opt_1
      text: Conclusion is right
    - id: opt_2
      text: Mistake
    options_count: 2
    correct_answer: opt_1
    explanation: Right! Remove water — the flower withers. Always. It's not a superstition — it's physics. A plant without
      water is like a phone without charging!
    explanation_status: present
- scene_id: sc3
  title: Not Bad Luck, But Consequence
  steps:
  - step_id: sc3_46
    source_step_id: '46'
    scene_id: sc3
    step_type: theory
    prompt: And now — a trap backwards! So far we've caught the brain making up connections. But sometimes it's the opposite
      — it seems "just bad luck," but it's really a real cause!
  - step_id: sc3_47
    source_step_id: '47'
    scene_id: sc3
    step_type: theory
    prompt: 'You know how it is? Something bad happens, and you think: "Just bad luck." But really — no! It''s not bad luck.
      It''s a CONSEQUENCE. The brain just doesn''t want to see the connection because then it would have to admit: I did something
      wrong.'
  - step_id: sc3_48
    source_step_id: '48'
    scene_id: sc3
    step_type: instruction
    prompt: Let's check! Is it a cause — or just "bad luck"?
  - step_id: sc3_49
    source_step_id: '49'
    scene_id: sc3
    step_type: single_choice
    prompt: '"I walked through a construction site at night in the dark — tore my pants."'
    options:
    - id: opt_1
      text: Cause
    - id: opt_2
      text: Just bad luck
    options_count: 2
    correct_answer: opt_1
    explanation: Cause! Darkness + construction = can't see where you're going. Sticking rebar is invisible — pants tear.
      Remove the darkness, bring a flashlight — pants are fine! It's not evil fate. It's the consequence of walking blind
      through a construction site.
    explanation_status: implicit
  - step_id: sc3_51
    source_step_id: '51'
    scene_id: sc3
    step_type: single_choice
    prompt: '"Lost my textbook — failed the test."'
    options:
    - id: opt_1
      text: Cause
    - id: opt_2
      text: Just bad luck
    options_count: 2
    correct_answer: opt_1
    explanation: 'Cause! No textbook — can''t review — did poorly. Chain reaction! "Just bad luck" is a convenient excuse.
      But the detective sees: one thing led to another. The textbook isn''t guilty for being lost — but the consequences are
      real.'
    explanation_status: implicit
  - step_id: sc3_53
    source_step_id: '53'
    scene_id: sc3
    step_type: single_choice
    prompt: '"I ran on a wet floor — slipped and fell."'
    options:
    - id: opt_1
      text: Cause
    - id: opt_2
      text: Just bad luck
    options_count: 2
    correct_answer: opt_1
    explanation: Cause! Wet floor = slippery. It's not bad luck — it's physics. The floor isn't evil. It's just wet. And feet
      can't fly. Remove the wet floor — you wouldn't fall!
    explanation_status: implicit
  - step_id: sc3_55
    source_step_id: '55'
    scene_id: sc3
    step_type: single_choice
    prompt: '"I didn''t eat breakfast — my stomach hurt by lunch."'
    options:
    - id: opt_1
      text: Cause
    - id: opt_2
      text: Just bad luck
    options_count: 2
    correct_answer: opt_1
    explanation: 'Cause! The brain needs energy. Don''t eat — brain sends a signal: "Hey, feed me!" Headache is not a coincidence,
      it''s an SOS from a hungry brain. The brain doesn''t stay quiet when hungry. It complains — and it''s right!'
    explanation_status: present
  - step_id: sc3_57
    source_step_id: '57'
    scene_id: sc3
    step_type: single_choice
    prompt: '"I yelled at a concert for two hours — lost my voice the next day."'
    options:
    - id: opt_1
      text: Cause
    - id: opt_2
      text: Just bad luck
    options_count: 2
    correct_answer: opt_1
    explanation: Cause! Vocal cords aren't made of iron, they got tired. It's not "caught a cold at the concert." You yelled
      — lost your voice. Direct connection. Vocal cords didn't sign up for two hours of screaming!
    explanation_status: implicit
  - step_id: sc3_59
    source_step_id: '59'
    scene_id: sc3
    step_type: single_choice
    prompt: '"I ate with dirty hands — got a stomachache."'
    options:
    - id: opt_1
      text: Cause
    - id: opt_2
      text: Just bad luck
    options_count: 2
    correct_answer: opt_1
    explanation: 'Cause! Dirty hands = bacteria in food = stomach revolts. Chain reaction! "Just bad luck" is easy to say.
      But the detective sees: one thing led to another. The dirt is guilty.'
    explanation_status: implicit
  - step_id: sc3_61
    source_step_id: '61'
    scene_id: sc3
    step_type: theory
    prompt: 'See the pattern? "Just bad luck" is convenient. But the truth detective asks: "What if there''s a cause I don''t
      want to see?" That doesn''t mean blaming yourself for everything. It means UNDERSTANDING what''s happening. Understand
      the cause — change the result! That''s the superpower.'
- scene_id: sc4
  title: The Third Cause
  steps:
  - step_id: sc4_62
    source_step_id: '62'
    scene_id: sc4
    step_type: theory
    prompt: Remember the swallows? I promised to return to them. Swallows fly low — and it rains. Swallows DON'T CAUSE rain.
      But there's still a connection! The superstition works! How?
  - step_id: sc4_63
    source_step_id: '63'
    scene_id: sc4
    step_type: theory
    prompt: Here's how. Before rain, the air gets heavy and humid. Gnats can't fly high — they go down. Swallows follow the
      gnats because they want to eat. Then it rains — because the air is humid. Swallows and rain aren't directly connected.
      A THIRD thing connects them — humid air! Swallows aren't guilty, they're just hungry!
  - step_id: sc4_64
    source_step_id: '64'
    scene_id: sc4
    step_type: theory
    prompt: 'New word: THE THIRD CAUSE. This is when two events seem connected, but really they''re BOTH caused by something
      hidden. Like a puppeteer behind a curtain — pulling two strings while the puppets think they''re moving themselves!'
  - step_id: sc4_65
    source_step_id: '65'
    scene_id: sc4
    step_type: theory
    prompt: 'And here''s the most famous example on the whole planet. Scientists noticed: in summer people buy MORE ice cream.
      And in summer people get SUNBURNED more. The data matches! And someone concluded...'
  - step_id: sc4_66
    source_step_id: '66'
    scene_id: sc4
    step_type: open_question
    prompt: Ice cream causes sunburns?! Who believes that? Who thinks ice cream is dangerous for skin?
    teacher_guidance: Who believes that? Who thinks ice cream is dangerous for skin?
  - step_id: sc4_67
    source_step_id: '67'
    scene_id: sc4
    step_type: theory
    prompt: Nobody? Good! But there is a real connection — the numbers match! So what's going on? HEAT! It's hot — people
      buy ice cream. It's hot — people lay on the beach and get burned. Ice cream and burns aren't connected. They're both
      caused by a third thing — hot weather. Ice cream is innocent!
  - step_id: sc4_68
    source_step_id: '68'
    scene_id: sc4
    step_type: theory
    prompt: Now let's practice finding the hidden third cause! I name two events — you find what BOTH of them cause.
  - step_id: sc4_69
    source_step_id: '69'
    scene_id: sc4
    step_type: single_choice
    prompt: '"People buy more umbrellas — and at the same time buy more rain boots." What''s the third thing?'
    options:
    - id: opt_1
      text: Weather
    - id: opt_2
      text: Time of day
    - id: opt_3
      text: The third cause
    options_count: 3
    correct_answer: opt_1
    explanation: Rain! Umbrellas don't cause boots, and boots don't cause umbrellas. Both appear because it's pouring. Rain
      is the puppeteer!
    explanation_status: present
  - step_id: sc4_71
    source_step_id: '71'
    scene_id: sc4
    step_type: single_choice
    prompt: '"I go to bed — and it gets dark outside." Does my bed turn off the sun?'
    options:
    - id: opt_1
      text: Weather
    - id: opt_2
      text: Time of day
    - id: opt_3
      text: The third cause
    options_count: 3
    correct_answer: opt_2
    explanation: Time of day! Evening comes — and you go to bed, and it gets dark. Your bed has nothing to do with it, don't
      worry! The sun doesn't know about your pillow.
    explanation_status: implicit
  - step_id: sc4_73
    source_step_id: '73'
    scene_id: sc4
    step_type: single_choice
    prompt: '"In winter people wear hats — and in winter people drink hot chocolate." Do hats cause a desire for hot chocolate?'
    options:
    - id: opt_1
      text: Weather
    - id: opt_2
      text: Time of day
    - id: opt_3
      text: The third cause
    options_count: 3
    correct_answer: opt_1
    explanation: Cold! It's freezing — you wear a hat. It's freezing — you want something hot. The hat doesn't make hot chocolate.
      Cold makes both!
    explanation_status: implicit
  - step_id: sc4_75
    source_step_id: '75'
    scene_id: sc4
    step_type: single_choice
    prompt: '"An ad comes on — and Dad goes to the kitchen." Is the ad hungry? Does it make Dad want a sandwich?'
    options:
    - id: opt_1
      text: Weather
    - id: opt_2
      text: Time of day
    - id: opt_3
      text: The third cause
    options_count: 3
    correct_answer: opt_3
    explanation: Movie break! The movie paused — they show ads. The movie paused — Dad goes get a snack. The ad doesn't cause
      hunger. Just a break — convenient for both! Dad was waiting for it the whole movie.
    explanation_status: implicit
  - step_id: sc4_77
    source_step_id: '77'
    scene_id: sc4
    step_type: theory
    prompt: 'And now — a harder example. Listen: "The more firefighters arrive at a fire, the more damage the fire does."
      Do firefighters cause harm? More destruction because of them?'
  - step_id: sc4_78
    source_step_id: '78'
    scene_id: sc4
    step_type: open_question
    prompt: Who thinks there's a third cause here?
  - step_id: sc4_79
    source_step_id: '79'
    scene_id: sc4
    step_type: theory
    prompt: Of course, third cause! SIZE OF THE FIRE. Big fire — many firefighters. Big fire — lots of damage. Firefighters
      are innocent, they rescue! But if you only look at numbers — it seems they cause harm. These are tricky traps!
  - step_id: sc4_80
    source_step_id: '80'
    scene_id: sc4
    step_type: theory
    prompt: 'So: when you see two events happening together — don''t rush. Ask: "What if there''s a THIRD CAUSE?" Maybe there''s
      a puppeteer behind the curtain pulling both strings!'
- scene_id: sc5
  title: The Third Cause — A Trap
  steps:
  - step_id: sc5_81
    source_step_id: '81'
    scene_id: sc5
    step_type: theory
    prompt: 'Third cause isn''t just science. People USE it to convince you! Ads, friends, even adults sometimes say: "See,
      these two facts together — so do this!" But it''s really a trap. Let''s practice catching it!'
  - step_id: sc5_82
    source_step_id: '82'
    scene_id: sc5
    step_type: theory
    prompt: 'I read a phrase — someone is trying to convince you. Your job: is this a real cause or a third cause trap?'
  - step_id: sc5_83
    source_step_id: '83'
    scene_id: sc5
    step_type: single_choice
    prompt: '"All champions drink our drink! Drink it — and you''ll be a champion too!"'
    options:
    - id: opt_1
      text: Real cause
    - id: opt_2
      text: Third cause trap
    options_count: 2
    correct_answer: opt_2
