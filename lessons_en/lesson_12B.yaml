source_lesson_id: lesson_12B
language: en
title: What is Manipulation
day: 12
slot: B
scenes:
- scene_id: sc1
  title: BRIDGE FROM DEMAGOGUERY TO MANIPULATION
  steps:
  - step_id: sc1_1
    source_step_id: '1'
    scene_id: sc1
    step_type: theory
    prompt: 'So now we''re experts on demagoguery! Twelve types of tricks for the mind — and we have a universal answer for
      each: "That''s demagoguery. Where are the facts?"'
  - step_id: sc1_2
    source_step_id: '2'
    scene_id: sc1
    step_type: theory
    prompt: Demagoguery is used by politicians, advertisers, and bloggers — everyone who wants to convince you with words.
      But some people don't need words. One look is enough to make you ashamed.
  - step_id: sc1_3
    source_step_id: '3'
    scene_id: sc1
    step_type: theory
    prompt: 'Imagine: nobody is deceiving your mind. Not twisting logic, not distorting facts. Yet you still want to agree.
      Not because you''re convinced — but because it feels UNCOMFORTABLE to refuse.'
  - step_id: sc1_4
    source_step_id: '4'
    scene_id: sc1
    step_type: theory
    prompt: 'It''s because they''re pressing not on your HEAD, but on your HEART. Not on your mind — but on your feelings.
      And EVERYONE uses this trick: parents, friends, advertisers, even pet cats. The name of this trick is manipulation.'
  - step_id: sc1_5
    source_step_id: '5'
    scene_id: sc1
    step_type: theory
    prompt: Manipulation is an ancient weapon. Julius Caesar manipulated senators. Advertising manipulates buyers. And your
      little brother manipulates when he cries louder in front of Mom.
  - step_id: sc1_6
    source_step_id: '6'
    scene_id: sc1
    step_type: theory
    prompt: After this lesson, you'll have TWO super-answers. For demagoguery — "Where are the facts?" And for manipulation
      — you'll find out in twenty minutes!
- scene_id: sc2
  title: 'STORY: FRIEND OR MANIPULATOR?'
  steps:
  - step_id: sc2_7
    source_step_id: '7'
    scene_id: sc2
    step_type: theory
    prompt: 'Now for a story. Listen carefully, because I''ll ask you afterward: what was wrong with this? And here''s a hint
      — it''s NOT demagoguery.'
  - step_id: sc2_8
    source_step_id: '8'
    scene_id: sc2
    step_type: theory
    prompt: A new student named Grisha came to class. He was funny, friendly, and quickly made friends with everyone. Especially
      with Masha — she sat next to him and shared cookies with him during breaks.
  - step_id: sc2_9
    source_step_id: '9'
    scene_id: sc2
    step_type: theory
    prompt: 'After a week, Grisha got comfortable. Every break he''d come up: "Masha, do you have cookies today?" She''d share
      — it made her happy. Friends do that!'
  - step_id: sc2_10
    source_step_id: '10'
    scene_id: sc2
    step_type: theory
    prompt: 'But one day Masha said: "I don''t have any today — Mom didn''t pack any." And Grisha sighed: "That''s too bad...
      Good friends usually share. You''re a good friend, right?"'
  - step_id: sc2_11
    source_step_id: '11'
    scene_id: sc2
    step_type: theory
    prompt: Masha froze. No cookies. But refusing means she's a "bad friend"? She ran and gave Grisha her sandwich. Even though
      she stayed hungry.
  - step_id: sc2_12
    source_step_id: '12'
    scene_id: sc2
    step_type: theory
    prompt: 'The next day Grisha again: "Masha, you''re not stingy, are you? Nobody likes stingy people..." And Masha gave
      in again. And the next day. And again. Every time she felt bad about it, but saying no felt scary.'
  - step_id: sc2_13
    source_step_id: '13'
    scene_id: sc2
    step_type: theory
    prompt: After a month, Masha hated breaks. She felt disgusted that she kept giving in — but she DIDN'T UNDERSTAND why
      she couldn't say "no." Grisha didn't yell at her, didn't insult her, didn't threaten her.
  - step_id: sc2_14
    source_step_id: '14'
    scene_id: sc2
    step_type: instruction
    prompt: 'Here''s the question: Did Grisha use demagoguery? Logical tricks? Twist words? No. He wasn''t even trying to
      prove anything! So what WAS he doing?'
  - step_id: sc2_15
    source_step_id: '15'
    scene_id: sc2
    step_type: single_choice
    prompt: What was Grisha doing?
    options:
    - id: opt_1
      text: Asking honestly
    - id: opt_2
      text: Using demagoguery
    - id: opt_3
      text: Manipulating
    options_count: 3
    correct_answer: opt_3
    explanation: Exactly - he pressed on the feelings! Grisha did not deceive Masha's mind. He made her FEEL bad. “Greedy”,
      “bad friend” is not logic. This is pressure on emotions.
    explanation_status: present
  - step_id: sc2_17
    source_step_id: '17'
    scene_id: sc2
    step_type: single_choice
    prompt: 'Correct answer: Manipulating'
    options:
    - id: opt_1
      text: Grisha was manipulating Masha because...
    - id: opt_2
      text: '...he was making her feel guilty and ashamed'
    - id: opt_3
      text: '...he knew she couldn''t refuse if she was afraid of being bad'
    - id: opt_4
      text: '...he was appealing to her feelings, not her mind'
    options_count: 4
    correct_answer: opt_2
    explanation: Вину! «Ты же хорошая подруга?» = «Если откажешь — ты плохая.» Маша каждый раз чувствовала себя виноватой.
      Хотя виноватой не была. Это и есть манипуляция.
    explanation_status: implicit
  - step_id: sc2_19
    source_step_id: '19'
    scene_id: sc2
    step_type: theory
    prompt: Demagoguery attacks your MIND. It uses pretty words, twists facts, and pokes holes in logic.
- scene_id: sc3
  title: 'Manipulation attacks your HEART. It triggers feelings: shame, fear, guilt, pride — and you do what it wants.'
  steps:
  - step_id: sc3_20
    source_step_id: '20'
    scene_id: sc3
    step_type: theory
    prompt: With demagoguery, you know the arguments but don't believe them. With manipulation, you know the arguments but
      can't resist them.
  - step_id: sc3_21
    source_step_id: '21'
    scene_id: sc3
    step_type: theory
    prompt: 'Remember the main sign: after the manipulation you feel BAD - ashamed, scared, guilty - but you don’t understand
      WHY you should agree. Logic says “no need”, but everything shrinks inside.'
  - step_id: sc3_22
    source_step_id: '22'
    scene_id: sc3
    step_type: theory
    prompt: People use manipulation all the time because it works. Here's what it looks like.
  - step_id: sc3_23
    source_step_id: '23'
    scene_id: sc3
    step_type: theory
    prompt: There are four types of manipulation. Like four buttons being pressed. Each person has a larger button, and manipulators
      feel it.
  - step_id: sc3_24
    source_step_id: '24'
    scene_id: sc3
    step_type: theory
    prompt: '"I do everything for you, and you can''t even do this?"'
  - step_id: sc3_25
    source_step_id: '25'
    scene_id: sc3
    step_type: theory
    prompt: '"We went through so much to raise you!"'
  - step_id: sc3_26
    source_step_id: '26'
    scene_id: sc3
    step_type: theory
    prompt: 'Effect: You feel guilty even though you haven''t done anything wrong.'
  - step_id: sc3_27
    source_step_id: '27'
    scene_id: sc3
    step_type: theory
    prompt: 'Button four - BLACKMAIL WITH FRIENDSHIP. “Real friends don’t do that!” “If you are my friend, do it!” Goal: for
      you to prove friendship by an action that you DO NOT like.'
  - step_id: sc3_28
    source_step_id: '28'
    scene_id: sc3
    step_type: theory
    prompt: '"If you don''t listen, we won''t love you anymore!"'
  - step_id: sc3_29
    source_step_id: '29'
    scene_id: sc3
    step_type: theory
    prompt: '"Everyone knows you took it without asking — everyone thinks you''re disgusting!"'
- scene_id: sc4
  title: 'Effect: You do what they ask because you''re afraid of worse consequences.'
  steps:
  - step_id: sc4_30
    source_step_id: '30'
    scene_id: sc4
    step_type: theory
    prompt: Now let's check - have you learned to distinguish demagoguery from manipulation? Twelve mini-stories. Listen to
      the situation - and vote!
  - step_id: sc4_31
    source_step_id: '31'
    scene_id: sc4
    step_type: theory
    prompt: 'На школьном дворе Лёша спорит с Никитой, кто быстрее бегает. Никита проигрывает и кричит: «Да ты вообще в очках!
      Что ты можешь знать про спорт?!»'
  - step_id: sc4_32
    source_step_id: '32'
    scene_id: sc4
    step_type: single_choice
    prompt: '"A real friend wouldn''t ask that!"'
    options:
    - id: opt_1
      text: 'Effect: You do something not because you want to, but because you''re afraid of losing love.'
    - id: opt_2
      text: MANIPULATION THROUGH FLATTERY
    options_count: 2
    correct_answer: opt_1
    explanation: '"You look so smart! You can understand this, right?"'
    explanation_status: present
  - step_id: sc4_34
    source_step_id: '34'
    scene_id: sc4
    step_type: theory
    prompt: '"You''re so strong — you could do this better than anyone!"'
  - step_id: sc4_35
    source_step_id: '35'
    scene_id: sc4
    step_type: single_choice
    prompt: 'Effect: You do something to prove what they''re saying about you is true.'
    options:
    - id: opt_1
      text: MANIPULATION THROUGH CONSCIENCE
    - id: opt_2
      text: '"How can you be so selfish when others are suffering?"'
    options_count: 2
    correct_answer: opt_2
    explanation: Manipulation! Pressure through guilt. Grandma doesn’t give any arguments - she makes Dasha FEEL guilty. “Last
      Birthday” is the guilt button to the max.
    explanation_status: present
  - step_id: sc4_37
    source_step_id: '37'
    scene_id: sc4
    step_type: theory
    prompt: 'Effect: You do something because you''re afraid of being a bad person.'
  - step_id: sc4_38
    source_step_id: '38'
    scene_id: sc4
    step_type: single_choice
    prompt: MANIPULATION THROUGH SOCIAL PRESSURE
    options:
    - id: opt_1
      text: '"Everyone does it, only you don''t!"'
    - id: opt_2
      text: '"If you don''t join us, you''re not with us anymore!"'
    options_count: 2
    correct_answer: opt_1
    explanation: 'Effect: You do something so you don''t feel alone or weird.'
    explanation_status: implicit
  - step_id: sc4_40
    source_step_id: '40'
    scene_id: sc4
    step_type: theory
    prompt: 'Timur wants to take his older brother''s bike. My brother won''t let me. Timur: “Okay... I thought I had a brother.
      But it turns out he’s just a person who feels sorry for being too big.”'
  - step_id: sc4_41
    source_step_id: '41'
    scene_id: sc4
    step_type: single_choice
    prompt: '"If you do your homework, I''ll buy you a toy!"'
    options:
    - id: opt_1
      text: '"Come to my party, and I''ll tell you the biggest secret!"'
    - id: opt_2
      text: 'Effect: You do something not because it''s right, but because you''ll get a reward.'
    options_count: 2
    correct_answer: opt_2
    explanation: 'Manipulation! Blackmail with family feelings - “I thought I had a brother.” Timur does not prove that he
      needs a bike. He puts pressure on feelings: if you refuse, you are a bad brother.'
    explanation_status: present
  - step_id: sc4_43
    source_step_id: '43'
    scene_id: sc4
    step_type: theory
    prompt: '"I feel so bad! If you don''t do this, I''ll feel even worse!"'
  - step_id: sc4_44
    source_step_id: '44'
    scene_id: sc4
    step_type: single_choice
    prompt: '"I''m so unhappy, and you won''t even help me..."'
    options:
    - id: opt_1
      text: 'Effect: You do something to make someone else feel better, even though it hurts you.'
    - id: opt_2
      text: MANIPULATION THROUGH DEPENDENCE
    options_count: 2
    correct_answer: opt_1
    explanation: '"Only I can help you! Without me, you''re lost!"'
    explanation_status: implicit
  - step_id: sc4_46
    source_step_id: '46'
    scene_id: sc4
    step_type: theory
    prompt: '"Everyone else will leave you, but I''ll always be here!"'
  - step_id: sc4_47
    source_step_id: '47'
    scene_id: sc4
    step_type: single_choice
    prompt: 'Effect: You''re afraid to leave this person, even though they limit you.'
    options:
    - id: opt_1
      text: MANIPULATION THROUGH EMBARRASSMENT
    - id: opt_2
      text: '"Everyone knows what you did! Look, they''re laughing!"'
    options_count: 2
    correct_answer: opt_2
    explanation: '"I can tell everyone if you don''t do this..."'
    explanation_status: implicit
  - step_id: sc4_49
    source_step_id: '49'
    scene_id: sc4
    step_type: theory
    prompt: 'Effect: You do something to keep it secret from others.'
  - step_id: sc4_50
    source_step_id: '50'
    scene_id: sc4
    step_type: single_choice
    prompt: MANIPULATION THROUGH URGENCY
    options:
    - id: opt_1
      text: '"Hurry up! This is the last one!"'
    - id: opt_2
      text: '"If you don''t say yes right now, it''ll be too late!"'
    options_count: 2
    correct_answer: opt_1
    explanation: 'Effect: You make a decision without thinking because you believe there''s no time.'
    explanation_status: present
  - step_id: sc4_52
    source_step_id: '52'
    scene_id: sc4
    step_type: theory
    prompt: 'Sonya doesn''t want to jump from the diving board in the pool. Girlfriends in chorus: “What are you, a coward?
      Even Lisa jumped, and she is younger than you! You should be ashamed!”'
  - step_id: sc4_53
    source_step_id: '53'
    scene_id: sc4
    step_type: single_choice
    prompt: Manipulation works because it doesn't attack logic — it attacks FEELINGS.
    options:
    - id: opt_1
      text: You can prove a fact wrong, but how do you prove shame wrong? How do you fight the fear of losing love? How do
        you say no to someone who makes you pity them?
    - id: opt_2
      text: A manipulator knows your weak spots. He knows what scares you, what makes you ashamed, what makes you proud. And
        he uses it.
    options_count: 2
    correct_answer: opt_2
    explanation: 'Манипуляция! Давление через стыд. «Трусиха», «даже Лиза» — подружки не объясняют, зачем прыгать. Они давят:
      откажешься — ты хуже всех. Кнопка стыда.'
    explanation_status: implicit
  - step_id: sc4_55
    source_step_id: '55'
    scene_id: sc4
    step_type: theory
    prompt: It doesn't lie — it persuades. Not with facts, but with feelings. And as long as you follow your feelings, you
      do what it wants.
  - step_id: sc4_56
    source_step_id: '56'
    scene_id: sc4
    step_type: single_choice
    prompt: NOW — PRACTICE
    options:
    - id: opt_1
      text: Let's analyze some situations. Is this manipulation or not? If yes — what kind?
    - id: opt_2
      text: Situation 1
    options_count: 2
    correct_answer: opt_1
    explanation: 'Dad says: "Why do you need that phone? You''re only 12! You can''t be a leader without one!"'
    explanation_status: implicit
  - step_id: sc4_58
    source_step_id: '58'
    scene_id: sc4
    step_type: theory
    prompt: 'Oleg doesn’t want to let it be written off. A classmate whispers: “I won’t tell anyone that you cried in physical
      exercise last time... If you help.”'
  - step_id: sc4_59
    source_step_id: '59'
    scene_id: sc4
    step_type: single_choice
    prompt: Yes, this is manipulation through flattery and ambition
    options:
    - id: opt_1
      text: 'Dad isn''t talking about the phone — he''s talking about you: "You''re smart, you''re a leader!" Then he connects
        this image to a phone. You''re already almost ready to buy — not because Dad provided it, but because you want to
        be a leader.'
    - id: opt_2
      text: Situation 2
    options_count: 2
    correct_answer: opt_2
    explanation: 'A classmate says: "You forgot your homework? That''s bad! I''d do it, but I''m too busy... Want me to lend
      you mine?"'
    explanation_status: implicit
  - step_id: sc4_61
    source_step_id: '61'
    scene_id: sc4
    step_type: theory
    prompt: 'Advertising on TV: “Our yogurt is eaten by an Olympic champion! That means he’s the most useful!” Mom laughs:
      “A champion eats, does that mean he’s healthy?”'
  - step_id: sc4_62
    source_step_id: '62'
    scene_id: sc4
    step_type: single_choice
    prompt: Yes, this is manipulation — a clever mix of flattery and creating dependence
    options:
    - id: opt_1
      text: 'Your classmate deliberately says "that''s bad" (reinforcing your guilt), then says of course he''d help, but
        he''s too busy. This gives you two thoughts: he''s a good guy, but can''t help. And then he offers to "save" you.
        Now you owe him not for homework, but for his kindness.'
    - id: opt_2
      text: Situation 3
    options_count: 2
    correct_answer: opt_1
    explanation: 'Your friend says: "I''m too fat for this dress. What do you think?" Obviously, she wants to hear that she''s
      not fat.'
    explanation_status: implicit
  - step_id: sc4_64
    source_step_id: '64'
    scene_id: sc4
    step_type: theory
    prompt: 'A friend tells Katya: “If you go to Sveta’s birthday party and not to mine, it means that she is more important
      to you. And then I don’t know if we’re friends at all.”'
  - step_id: sc4_65
    source_step_id: '65'
    scene_id: sc4
    step_type: single_choice
    prompt: It depends. If she's genuinely asking for your opinion — NO. If she's expecting a certain answer — YES.
    options:
    - id: opt_1
      text: If she says this and waits for you to cheer her up, she's counting on you feeling pity and saying the right thing.
        This is manipulation through pity.
    - id: opt_2
      text: But if she's genuinely asking and will appreciate an honest answer — it's just conversation.
    options_count: 2
    correct_answer: opt_2
    explanation: 'Manipulation! Blackmail by friendship in its purest form. “Choose - she or I” is not an argument, it is
      an ultimatum. An honest friend would say: “I will be sad, but decide for yourself.”'
    explanation_status: present
- scene_id: sc5
  title: 'The teacher says: "If you don''t learn to solve these problems, you''ll fail the test. And if you fail the test,
    you won''t get a good grade. And if you don''t get a good grade, studying is pointless!"'
  steps:
  - step_id: sc5_67
    source_step_id: '67'
    scene_id: sc5
    step_type: theory
    prompt: 'Excellent - you can distinguish demagoguery from manipulation! Now it’s more difficult: if this is manipulation,
      which BUTTON is being pressed? Guilt, fear, shame or blackmail by friendship?'
  - step_id: sc5_68
    source_step_id: '68'
    scene_id: sc5
    step_type: single_choice
    prompt: No. This is actually a true chain of cause and effect. The teacher is showing real logical connections.
    options:
    - id: opt_1
      text: 'But if the teacher said: "If you don''t do this, I''ll know you don''t respect me!" — that would be manipulation
        through hurt feelings.'
    - id: opt_2
      text: Situation 5
    - id: opt_3
      text: 'Dad says: "I''m telling you this is dangerous because I love you. If I didn''t love you, I wouldn''t care what
        you do."'
    - id: opt_4
      text: Is this manipulation?
    options_count: 4
    correct_answer: opt_3
    explanation: No. Dad is expressing the real reason for his concern.
    explanation_status: present
  - step_id: sc5_70
    source_step_id: '70'
    scene_id: sc5
    step_type: single_choice
    prompt: 'But if Dad said: "If you valued me, you''d listen to me immediately! What are you expecting?!" — that''s manipulation
      through guilt and dependence.'
    options:
    - id: opt_1
      text: 'SUMMARY: HOW TO RECOGNIZE MANIPULATION'
    - id: opt_2
      text: 'Manipulation always has 3 signs:'
    - id: opt_3
      text: 1. It attacks feelings, not logic.
    - id: opt_4
      text: A manipulator doesn't argue why you should do it. Instead, he triggers an emotion — fear, shame, pity, pride.
    options_count: 4
    correct_answer: opt_1
    explanation: 2. It makes you do something you don't want to do.
    explanation_status: implicit
  - step_id: sc5_72
    source_step_id: '72'
    scene_id: sc5
    step_type: single_choice
    prompt: You know it's wrong, but you can't refuse. Because if you refuse, you'll feel guilty, or scared, or alone.
    options:
    - id: opt_1
      text: 3. The manipulator knows your weak spots.
    - id: opt_2
      text: He knows what scares you. He knows what makes you feel guilty. He knows you value love and recognition. And he
        uses it.
    - id: opt_3
      text: HOW TO PROTECT YOURSELF FROM MANIPULATION
    - id: opt_4
      text: 'Step 1: Recognize it''s manipulation.'
    options_count: 4
    correct_answer: opt_4
    explanation: 'If you feel uncomfortable by someone''s words, if you feel guilt or fear — ask yourself: Who''s counting
      on my feelings? What emotion is he triggering? Why?'
    explanation_status: implicit
  - step_id: sc5_74
    source_step_id: '74'
    scene_id: sc5
    step_type: single_choice
    prompt: 'Вика получила главную роль в школьном спектакле. Подруга: «Если ты выступишь — я расскажу всем, что ты забыла
      слова на репетиции. Будет стыдно.»'
    options:
    - id: opt_1
      text: 'Someone trying to manipulate always mixes them. Someone feels bad — that''s a fact. But it implies: you should
        feel guilty — that''s an emotion.'
    - id: opt_2
      text: 'Fact: I don''t like Oksana. Feeling: So I have to give her everything she asks for (manipulation through pity).'
    - id: opt_3
      text: 'Fact: Dad says I''m selfish. Feeling: So I have to do what he says (manipulation through guilt).'
    - id: opt_4
      text: 'Step 3: Ask yourself why you want to do it.'
    options_count: 4
    correct_answer: opt_2
    explanation: If the answer is "because I'm scared," "because I'll feel guilty," or "because I'm afraid of losing..." —
      that's a sign of manipulation.
    explanation_status: present
  - step_id: sc5_76
    source_step_id: '76'
    scene_id: sc5
    step_type: single_choice
    prompt: If the answer is "because it's right" or "because I understand why it matters" — that's an honest choice.
    options:
    - id: opt_1
      text: 'Step 4: Learn to say "no."'
    - id: opt_2
      text: This is the most important step. Manipulation only works because people can't refuse.
    - id: opt_3
      text: 'How to say "no" without feeling guilty:'
    - id: opt_4
      text: '1. Say it clearly: "No. I can''t do this."'
    options_count: 4
    correct_answer: opt_3
    explanation: Don't explain, don't make excuses. Just say it. A manipulator will try to make you explain — then he'll find
      a hole in your argument.
    explanation_status: implicit
  - step_id: sc5_78
    source_step_id: '78'
    scene_id: sc5
    step_type: single_choice
