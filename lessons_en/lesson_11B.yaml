source_lesson_id: lesson_11B
language: en
title: What Is Demagoguery
day: 11
slot: B
scenes:
- scene_id: sc1
  title: BRIDGE FROM THE FIRST LESSON
  steps:
  - step_id: sc1_1
    source_step_id: '1'
    scene_id: sc1
    step_type: theory
    prompt: We're back! In the first lesson, you learned how to object - calmly, with arguments, no attacks. Now it's time
      to learn what to do when someone speaks beautifully, confidently, loudly - but without a single fact.
  - step_id: sc1_2
    source_step_id: '2'
    scene_id: sc1
    step_type: theory
    prompt: Today you'll learn a word that gives you a superpower in any argument. After this lesson, you can say one phrase
      - and any trick loses its power.
  - step_id: sc1_3
    source_step_id: '3'
    scene_id: sc1
    step_type: instruction
    prompt: 'But first - a situation. Listen carefully and decide for yourselves: are you being persuaded or fooled?'
- scene_id: sc2
  title: 'DISCOVERY: SCHOOL ASSEMBLY'
  steps:
  - step_id: sc2_4
    source_step_id: '4'
    scene_id: sc2
    step_type: theory
    prompt: 'Imagine: a school assembly. A boy named Bogdan jumps on a chair and shouts: ''Friends! Disaster! The guys from
      the neighboring school planned something terrible - they want to come and EAT ALL THE PASTRIES in our cafeteria! EVERY
      SINGLE ONE!'''
  - step_id: sc2_5
    source_step_id: '5'
    scene_id: sc2
    step_type: theory
    prompt: 'Bogdan continues: ''Our pastries are in danger! We must unite! Whoever isn''t with us is a traitor and enemy
      of pastries! Only cowards will sit idle while our buns are in trouble! Forward, to defend sweets!'''
  - step_id: sc2_6
    source_step_id: '6'
    scene_id: sc2
    step_type: theory
    prompt: The class freezes. Someone's already clenched their fists. Someone grabbed their backpack. Pastries! This is serious!
      But let's turn on our brains for a second.
  - step_id: sc2_7
    source_step_id: '7'
    scene_id: sc2
    step_type: single_choice
    prompt: What facts did Bogdan provide?
    options:
    - id: opt_1
      text: Named specific people and evidence
    - id: opt_2
      text: Provided no facts at all
    options_count: 2
    correct_answer: opt_2
    explanation: 'Not one! ''Guys from the neighboring school'' - who exactly? How did he know? Did they tell him: ''We''re
      going for pastries''? Maybe they have their own pastries? Maybe they''re on a diet!'
    explanation_status: present
  - step_id: sc2_9
    source_step_id: '9'
    scene_id: sc2
    step_type: theory
    prompt: But tricks - a whole bunch! 'Disaster!' - scaremongering. 'Whoever isn't with us is a traitor' - false dilemma.
      'Only cowards' - attack. Loud words - plenty. Facts - zero. This is called demagoguery!
- scene_id: sc3
  title: BLOGGER, STREAMER, AND FENCING
  steps:
  - step_id: sc3_10
    source_step_id: '10'
    scene_id: sc3
    step_type: theory
    prompt: 'Another example. A popular blogger posts a video: ''The new game "Cosmo-Knights" - THE BEST GAME OF ALL TIME!
      Whoever doesn''t play isn''t even a gamer! All normal people already downloaded it! Don''t be a loser - download it
      right now!'''
  - step_id: sc3_11
    source_step_id: '11'
    scene_id: sc3
    step_type: instruction
    prompt: 'Comments are on fire: ''Downloading!'' ''Don''t want to be a loser!'' ''The best!!!'' Thousands of likes. Looks
      convincing, right?'
  - step_id: sc3_12
    source_step_id: '12'
    scene_id: sc3
    step_type: single_choice
    prompt: What facts did the blogger provide?
    options:
    - id: opt_1
      text: Described gameplay and compared it to other games
    - id: opt_2
      text: Provided no facts at all
    options_count: 2
    correct_answer: opt_2
    explanation: Not one! 'Best of all time' - by what criteria? 'All normal people' - who counted? 'Loser' - attack. The
      blogger, by the way, forgot to mention they got paid for the ad.
    explanation_status: implicit
  - step_id: sc3_14
    source_step_id: '14'
    scene_id: sc3
    step_type: theory
    prompt: 'Now a streamer reviews the same game: ''I completed "Cosmo-Knights" in 12 hours. Graphics at 2024 level - beautiful.
      Story is short, but there''s multiplayer. Minus - lots of bugs, my character fell through the ground twice. Wait for
      the patch.'''
  - step_id: sc3_15
    source_step_id: '15'
    scene_id: sc3
    step_type: single_choice
    prompt: Whose assessment is demagoguery?
    options:
    - id: opt_1
      text: Blogger - emotions without facts
    - id: opt_2
      text: Streamer - specific breakdown
    - id: opt_3
      text: Both without facts
    options_count: 3
    correct_answer: opt_1
    explanation: The blogger! The streamer said completion time, pros, cons, a specific bug. The blogger said 'best,' 'everyone,'
      'loser.' Feel the difference?
    explanation_status: implicit
  - step_id: sc3_17
    source_step_id: '17'
    scene_id: sc3
    step_type: theory
    prompt: 'Next example. An ad for a fencing club: ''Fencing - the sport of REAL heroes! Only the brave choose a sword!
      All great people fenced! Sign up - or you''ll just sit on your couch while others win!'''
  - step_id: sc3_18
    source_step_id: '18'
    scene_id: sc3
    step_type: instruction
    prompt: Sounds beautiful. You want to grab a sword and run to sign up. But let's check.
  - step_id: sc3_19
    source_step_id: '19'
    scene_id: sc3
    step_type: single_choice
    prompt: Are there facts here?
    options:
    - id: opt_1
      text: Yes - 'all great people fenced' is a fact
    - id: opt_2
      text: No - it's all tricks
    options_count: 2
    correct_answer: opt_2
    explanation: 'Tricks! ''Real heroes'' - who decides who''s real? ''All great'' - Einstein didn''t fence. ''Sit on the
      couch'' - false dilemma: either fencing or a couch. What about swimming? What about chess?'
    explanation_status: implicit
  - step_id: sc3_21
    source_step_id: '21'
    scene_id: sc3
    step_type: theory
    prompt: 'Here''s a normal ad for the same club: ''Fencing develops reaction and coordination. Classes three times a week,
      coach is a master of sport with ten years'' experience. First class is free.'' Facts, specifics, zero pressure.'
  - step_id: sc3_22
    source_step_id: '22'
    scene_id: sc3
    step_type: theory
    prompt: See the pattern? Demagoguery shouts and pressures. An argument explains calmly. Loudness isn't a sign of truth.
      Quiet facts beat loud lies.
- scene_id: sc4
  title: ALL TRICKS ARE DEMAGOGUERY
  steps:
  - step_id: sc4_23
    source_step_id: '23'
    scene_id: sc4
    step_type: theory
    prompt: Demagoguery is when you create the appearance of an argument, but inside is a logical error. A demagogue doesn't
      lie directly - they lead you to fool yourself. A word magician!
  - step_id: sc4_24
    source_step_id: '24'
    scene_id: sc4
    step_type: theory
    prompt: 'Trigger words. If you hear: ''Everyone knows that...'' ''Obviously!'' ''Any normal person...'' ''Only fools think
      otherwise!'' - stop. That''s pressure, not an argument.'
  - step_id: sc4_25
    source_step_id: '25'
    scene_id: sc4
    step_type: reflection
    prompt: 'Another tricky phrase: ''I''m not saying he lied... but think about it...'' You didn''t really say anything -
      but suspicion is planted. Zero facts, but your brain fills in the blanks. Classic demagoguery.'
  - step_id: sc4_26
    source_step_id: '26'
    scene_id: sc4
    step_type: theory
    prompt: 'The main filter: ''WHERE ARE THE FACTS?'' If you get silence or new tricks in response - you''re dealing with
      a demagogue. Now for the parade - you already know all these tricks!'
  - step_id: sc4_27
    source_step_id: '27'
    scene_id: sc4
    step_type: theory
    prompt: '"I got sick after the rain - so the rain is guilty!" One thing happened after another - and your brain decided
      the first caused the second. But coincidence isn''t cause. False cause is demagoguery!'
  - step_id: sc4_28
    source_step_id: '28'
    scene_id: sc4
    step_type: theory
    prompt: '"All boys like football!" Saw a couple of examples - and decided everyone does. But ''a couple'' and ''everyone''
      are very different numbers. Hasty generalization is demagoguery!'
  - step_id: sc4_29
    source_step_id: '29'
    scene_id: sc4
    step_type: theory
    prompt: '"And how many times have you been late yourself?!" Instead of answering - shifting blame to another topic. The
      question remains unanswered, and you''ve already forgotten what you were arguing about. Dodging the question is demagoguery!'
  - step_id: sc4_30
    source_step_id: '30'
    scene_id: sc4
    step_type: theory
    prompt: '"Freedom of speech means you can yell in a library!" The word is the same, but the meaning changed. Freedom of
      speech isn''t about yelling. Substituting concepts is demagoguery!'
  - step_id: sc4_31
    source_step_id: '31'
    scene_id: sc4
    step_type: theory
    prompt: '"You''re just dumb and don''t understand anything!" Instead of arguing with the argument - attacking the person.
      The person is hurt, and the topic isn''t resolved. Attacking the person is demagoguery!'
  - step_id: sc4_32
    source_step_id: '32'
    scene_id: sc4
    step_type: theory
    prompt: '"You said ''I love ice cream'' - so you''re against healthy eating!" Twisted someone''s words and argue against
      something they didn''t say. A scarecrow is demagoguery!'
  - step_id: sc4_33
    source_step_id: '33'
    scene_id: sc4
    step_type: theory
    prompt: '"Don''t clean your room - you won''t get a gift - you''ll end up without education!" From one step - a chain
      of horrors, where each link is made up. A scary chain is demagoguery!'
  - step_id: sc4_34
    source_step_id: '34'
    scene_id: sc4
    step_type: theory
    prompt: '"A famous blogger said it''s true!" The person is famous, but not in this field. Popularity isn''t expertise.
      False authority is demagoguery!'
  - step_id: sc4_35
    source_step_id: '35'
    scene_id: sc4
    step_type: theory
    prompt: '"Either you''re with me - or you''re my enemy!" Cut the world into two pieces and hid all other options. False
      dilemma is demagoguery!'
  - step_id: sc4_36
    source_step_id: '36'
    scene_id: sc4
    step_type: theory
    prompt: '"Have you stopped lying to your friends?" The question hides an accusation - any answer makes you guilty. A trap
      question is demagoguery!'
  - step_id: sc4_37
    source_step_id: '37'
    scene_id: sc4
    step_type: theory
    prompt: 'Ten techniques - and one word for all of them: demagoguery. The appearance of an argument without an argument.
      Remember the filter: ''Where are the facts?'' If there are no facts - you already know what to call it.'
- scene_id: sc5
  title: 'BIG PRACTICE: IDENTIFY THE TECHNIQUE'
  steps:
  - step_id: sc5_38
    source_step_id: '38'
    scene_id: sc5
    step_type: instruction
    prompt: Thirty examples! All ten types of demagoguery mixed together. Your job is to identify which exact technique is
      hiding in each phrase. Topics from your life. Let's go!
  - step_id: sc5_39
    source_step_id: '39'
    scene_id: sc5
    step_type: single_choice
    prompt: '"Everyone wanted a dance performance at our assembly!"'
    options:
    - id: opt_1
      text: Hasty generalization
    - id: opt_2
      text: False cause
    - id: opt_3
      text: Scarecrow
    options_count: 3
    correct_answer: opt_1
    explanation: Hasty generalization! 'Everyone' means five out of two hundred. A few voices passed off as the whole school.
      Did anyone count? No. Demagoguery!
    explanation_status: present
  - step_id: sc5_41
    source_step_id: '41'
    scene_id: sc5
    step_type: single_choice
    prompt: '"You''re small - what kind of goalkeeper are you!"'
    options:
    - id: opt_1
      text: Substituting concepts
    - id: opt_2
      text: Attack on the person
    - id: opt_3
      text: Dodging the question
    options_count: 3
    correct_answer: opt_2
    explanation: Attack on the person! Height is one parameter, skill is another. Small doesn't mean incapable. A blow without
      an argument.
    explanation_status: implicit
  - step_id: sc5_43
    source_step_id: '43'
    scene_id: sc5
    step_type: single_choice
    prompt: '"I love classical music - does that make me boring?"'
    options:
    - id: opt_1
      text: Scarecrow
    - id: opt_2
      text: Permanent cause
    - id: opt_3
      text: False dilemma
    options_count: 3
    correct_answer: opt_1
    explanation: Scarecrow! Nobody said you're boring. It's a made-up accusation you can't fight because it was never made.
    explanation_status: present
  - step_id: sc5_45
    source_step_id: '45'
    scene_id: sc5
    step_type: single_choice
    prompt: '"It''s almost like coronavirus - that''s definitely contagious!"'
    options:
    - id: opt_1
      text: False dilemma
    - id: opt_2
      text: Scary chain
    - id: opt_3
      text: False cause
    options_count: 3
    correct_answer: opt_2
    explanation: False cause! 'Almost like' isn't a reason. Corona and this are two different things. Similarity doesn't mean
      they're the same.
    explanation_status: implicit
  - step_id: sc5_47
    source_step_id: '47'
    scene_id: sc5
    step_type: single_choice
    prompt: '"All top gamers use this controller!"'
    options:
    - id: opt_1
      text: Hasty generalization
    - id: opt_2
      text: False dilemma
    - id: opt_3
      text: False authority
    options_count: 3
    correct_answer: opt_1
    explanation: Hasty generalization! 'All top' - how did they verify this? Did they ask everyone? One controller doesn't
      determine all gamers' fates.
    explanation_status: implicit
  - step_id: sc5_49
    source_step_id: '49'
    scene_id: sc5
    step_type: single_choice
    prompt: '"How can I trust you if you were wrong yesterday?"'
    options:
    - id: opt_1
      text: Attack on the person
    - id: opt_2
      text: Dodging the question
    - id: opt_3
      text: False dilemma
    options_count: 3
    correct_answer: opt_3
    explanation: Attack on the person! A mistake yesterday doesn't mean a lie today. People make mistakes - it's normal. That's
      not an argument.
    explanation_status: implicit
  - step_id: sc5_51
    source_step_id: '51'
    scene_id: sc5
    step_type: single_choice
    prompt: '"Is this your idea? Then you''re infringing on someone''s rights!"'
    options:
    - id: opt_1
      text: Substituting concepts
    - id: opt_2
      text: Scarecrow
    - id: opt_3
      text: False cause
    options_count: 3
    correct_answer: opt_1
    explanation: Scarecrow! Having an idea and infringing rights are different things. An idea can be original and allowed.
    explanation_status: present
  - step_id: sc5_53
    source_step_id: '53'
    scene_id: sc5
    step_type: single_choice
    prompt: '"Everyone likes this artist - so he''s good!"'
    options:
    - id: opt_1
      text: False authority
    - id: opt_2
      text: Hasty generalization
    - id: opt_3
      text: False dilemma
    options_count: 3
    correct_answer: opt_3
    explanation: Hasty generalization! 'Everyone' isn't a fact. Popularity doesn't equal talent. You can be famous and a mediocre
      artist.
    explanation_status: implicit
  - step_id: sc5_55
    source_step_id: '55'
    scene_id: sc5
    step_type: single_choice
    prompt: '"If I don''t worry about grades - then I don''t care about my mind!"'
    options:
    - id: opt_1
      text: False dilemma
    - id: opt_2
      text: Scarecrow
    - id: opt_3
      text: Substituting concepts
    options_count: 3
    correct_answer: opt_1
    explanation: False dilemma! Worrying about grades and worrying about mind development are different. You can develop your
      mind your own way, not through grades.
    explanation_status: implicit
  - step_id: sc5_57
    source_step_id: '57'
    scene_id: sc5
    step_type: single_choice
    prompt: '"No normal person goes hiking without proper equipment!"'
    options:
    - id: opt_1
      text: Attack on the person
    - id: opt_2
      text: Hasty generalization
    - id: opt_3
      text: False dilemma
    options_count: 3
    correct_answer: opt_1
    explanation: Attack on the person! 'No normal person' insults everyone who hikes without equipment. People aren't 'normal'
      or 'abnormal', they're just different.
    explanation_status: implicit
  - step_id: sc5_59
    source_step_id: '59'
    scene_id: sc5
    step_type: single_choice
    prompt: '"I''m not saying he''s lying... but think about it..."'
    options:
    - id: opt_1
      text: Dodging the question
    - id: opt_2
      text: Demagoguery (tricky)
    - id: opt_3
      text: False cause
    options_count: 3
    correct_answer: opt_2
    explanation: Demagoguery! Said nothing concrete, but planted suspicion. This is a classic trap - people fill in the worst
      themselves.
    explanation_status: implicit
  - step_id: sc5_61
    source_step_id: '61'
    scene_id: sc5
    step_type: single_choice
    prompt: '"All my friends eat fast food - so it''s normal!"'
    options:
    - id: opt_1
      text: Hasty generalization
    - id: opt_2
      text: False dilemma
    - id: opt_3
      text: Substituting concepts
    options_count: 3
    correct_answer: opt_3
    explanation: Hasty generalization! Fast food is popular, but not healthy. What many people do isn't the same as a healthy
      choice.
    explanation_status: implicit
  - step_id: sc5_63
    source_step_id: '63'
    scene_id: sc5
    step_type: single_choice
    prompt: '"Don''t do homework - you won''t have a career - you''ll have no money!"'
    options:
    - id: opt_1
      text: Scary chain
    - id: opt_2
      text: Dodging the question
    - id: opt_3
      text: False cause
    options_count: 3
    correct_answer: opt_1
    explanation: Scary chain! From one homework - straight to the worst consequences. Each link is made up and extreme.
    explanation_status: implicit
  - step_id: sc5_65
    source_step_id: '65'
    scene_id: sc5
    step_type: single_choice
    prompt: '"I don''t like this movie, so I don''t like cinema!"'
    options:
    - id: opt_1
      text: False dilemma
    - id: opt_2
      text: Scarecrow
    - id: opt_3
      text: Hasty generalization
    options_count: 3
    correct_answer: opt_2
    explanation: Hasty generalization! One movie isn't all of cinema. You can dislike one film and love others.
    explanation_status: implicit
  - step_id: sc5_67
    source_step_id: '67'
    scene_id: sc5
    step_type: single_choice
    prompt: '"This athlete won - so their trainer is the best!"'
    options:
    - id: opt_1
      text: False cause
    - id: opt_2
      text: Attack on the person
    - id: opt_3
      text: Dodging the question
    options_count: 3
    correct_answer: opt_2
    explanation: False cause! A win depends on many things - the athlete, trainer, conditions, luck. You named one cause and
      forgot the rest.
    explanation_status: implicit
  - step_id: sc5_69
    source_step_id: '69'
    scene_id: sc5
    step_type: single_choice
    prompt: '"Everyone is talking about this thing - so it''s cool!"'
    options:
    - id: opt_1
      text: Hasty generalization
    - id: opt_2
      text: False authority
    - id: opt_3
      text: False dilemma
    options_count: 3
    correct_answer: opt_2
    explanation: False authority! Popularity isn't quality. Many people talk about something, but that doesn't mean it's good.
      Gossip talks about things too.
    explanation_status: implicit
  - step_id: sc5_71
    source_step_id: '71'
    scene_id: sc5
    step_type: single_choice
    prompt: '"It''s obvious!" - what exactly?'
    options:
    - id: opt_1
      text: Demagoguery (trigger word)
    - id: opt_2
      text: Attack on the person
    - id: opt_3
      text: Dodging the question
    options_count: 3
    correct_answer: opt_2
    explanation: Demagoguery! The word 'obvious' instead of an argument. If it's so obvious, why not explain?
    explanation_status: implicit
  - step_id: sc5_73
    source_step_id: '73'
    scene_id: sc5
    step_type: single_choice
    prompt: '"You look tired - so you''re sick!"'
    options:
    - id: opt_1
      text: False cause
    - id: opt_2
      text: Attack on the person
    - id: opt_3
      text: Dodging the question
    options_count: 3
    correct_answer: opt_1
    explanation: False cause! Tiredness and sickness are different things. You can be tired and healthy.
    explanation_status: implicit
  - step_id: sc5_75
    source_step_id: '75'
    scene_id: sc5
    step_type: single_choice
    prompt: '"How can you write poetry when you''re a boy?!"'
    options:
    - id: opt_1
      text: Attack on the person
    - id: opt_2
      text: Scarecrow
    - id: opt_3
      text: Hasty generalization
    options_count: 3
    correct_answer: opt_2
    explanation: Attack on the person! Gender doesn't determine talent. You can be a boy and a great poet.
    explanation_status: implicit
  - step_id: sc5_77
    source_step_id: '77'
    scene_id: sc5
    step_type: single_choice
    prompt: '"It''s not our business!" - on what basis?'
    options:
    - id: opt_1
      text: Dodging the question
    - id: opt_2
      text: Scarecrow
    - id: opt_3
      text: Demagoguery
    options_count: 3
    correct_answer: opt_1
    explanation: Dodging the question! Someone asked a question, and instead of an answer - a declaration of irrelevance.
      The question is unresolved.
    explanation_status: implicit
  - step_id: sc5_79
    source_step_id: '79'
    scene_id: sc5
    step_type: single_choice
    prompt: '"You read sci-fi - so you''re unrealistic!"'
    options:
    - id: opt_1
      text: Substituting concepts
    - id: opt_2
      text: False cause
    - id: opt_3
      text: Scarecrow
    options_count: 3
    correct_answer: opt_3
    explanation: Substituting concepts! Reading sci-fi and understanding reality are different things. Many realistic people
      read sci-fi for fun.
    explanation_status: implicit
  - step_id: sc5_81
    source_step_id: '81'
    scene_id: sc5
    step_type: single_choice
    prompt: '"You don''t play sports - so you''re lazy!"'
    options:
    - id: opt_1
      text: Attack on the person
    - id: opt_2
      text: False dilemma
    - id: opt_3
      text: Hasty generalization
    options_count: 3
    correct_answer: opt_1
    explanation: Attack on the person! Not playing sports doesn't mean laziness. People are active in different ways.
    explanation_status: implicit
  - step_id: sc5_83
    source_step_id: '83'
    scene_id: sc5
    step_type: single_choice
    prompt: '"I''m always right!" - even when you''re wrong?'
    options:
    - id: opt_1
      text: Dodging the question
    - id: opt_2
      text: Demagoguery
    - id: opt_3
      text: False dilemma
    options_count: 3
    correct_answer: opt_2
    explanation: Demagoguery! The word 'always' without proof. The person didn't see their own fairness, so they're lying.
    explanation_status: implicit
  - step_id: sc5_85
    source_step_id: '85'
    scene_id: sc5
    step_type: single_choice
    prompt: '"If you don''t eat vegetables - you won''t grow!"'
    options:
    - id: opt_1
      text: Scary chain
    - id: opt_2
