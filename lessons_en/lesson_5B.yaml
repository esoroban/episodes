    - id: opt_3
      text: Entry 51
    options_count: 3
    correct_answer: opt_3
    explanation: Should I eat soup? Mom started with digestion, the child started with pasta, and then everything went to
      beets and dad. “Who stained the table” is an investigation, not a dispute about food. And “can a person turn into noodles”
      - well, such cases are unknown to science. Bye.
    explanation_status: implicit
  - step_id: sc4_37
    source_step_id: '37'
    scene_id: sc4
    step_type: single_choice
    prompt: '“I think we need a long break after second period!” - No, it’s better to have two short ones: after the first
      and after the third! - You just want to run during recess! - Do you want to sit on the phone? — I don’t sit on the phone,
      I read! - You read memes! — Memes are also reading!'
    options:
    - id: opt_1
      text: Entry 54
    - id: opt_2
      text: Entry 55
    - id: opt_3
      text: 'Which break is better: a long one or two short ones?'
    options_count: 3
    correct_answer: opt_3
    explanation: Which break is better - the trunk. “Who does what during breaks” is already a discussion of habits, not a
      schedule. And yes, “are memes reading” is the question of our age, but it won’t help you decide when to take a break.
      Although at the philosophical circle - please.
    explanation_status: implicit
  - step_id: sc4_39
    source_step_id: '39'
    scene_id: sc4
    step_type: single_choice
    prompt: '- Let''s get a puppy! - No, kitten! Cats are quiet and don’t chew slippers! - But the dogs are faithful! The
      cat will betray you at the first opportunity! - My cat didn’t betray anyone! - Because he''s lazy! He sleeps twenty
      hours a day! “But he doesn’t bark at the postman at three in the morning!” — Our postman doesn’t come at all at three
      in the morning!'
    options:
    - id: opt_1
      text: Entry 59
    - id: opt_2
      text: Entry 60
    - id: opt_3
      text: Entry 61
    options_count: 3
    correct_answer: opt_2
    explanation: null
    explanation_status: missing
  - step_id: sc4_40
    source_step_id: '40'
    scene_id: sc4
    step_type: theory
    prompt: Who to get - a cat or a dog - that's the trunk. “What time does the postman arrive” is a piece of paper that arrived
      from a completely different yard. And “does the cat sleep for twenty hours” is a detail. True, by the way. But it relates
      to the choice of a pet only indirectly. Although if you need a quiet roommate, the cat wins by a wide margin.
- scene_id: sc5
  title: Entry 63
  steps:
  - step_id: sc5_41
    source_step_id: '41'
    scene_id: sc5
    step_type: theory
    prompt: You already know how to find the trunk - the central idea. But there are still branches and leaves in the dispute.
      Now let's learn to distinguish them. This is important - because people often confuse an argument with a detail, and
      the argument falls apart.
  - step_id: sc5_42
    source_step_id: '42'
    scene_id: sc5
    step_type: theory
    prompt: 'Let me remind you. The central idea is ONE main question: “What are we arguing about?” An argument is WHY we
      think so: a reason, an argument. A detail is an EXAMPLE or detail: a specific incident that illustrates an argument.'
  - step_id: sc5_43
    source_step_id: '43'
    scene_id: sc5
    step_type: theory
    prompt: 'Example. Debate: “Should children help around the house?” This is the trunk. Argument: “Helping around the house
      teaches responsibility.” This thread explains why yes. And the detail: “Yesterday Petrik washed all the dishes in ten
      minutes and received a cake from his mother.” This leaf is a concrete example. Bright, tasty, but in itself does not
      prove anything. Maybe mom is just kind.'
  - step_id: sc5_44
    source_step_id: '44'
    scene_id: sc5
    step_type: theory
    prompt: 'Another example. Dispute: “Which sport is healthier - swimming or running?” Trunk. The argument for swimming:
      “Swimming develops all muscle groups at the same time.” The branch explains why swimming is healthier. Detail: “Coach
      Igor Petrovich swims every day and looks twenty years younger.” The leaf is one person, one example. Maybe Igor Petrovich
      just has good genes. Or a good cream.'
  - step_id: sc5_45
    source_step_id: '45'
    scene_id: sc5
    step_type: theory
    prompt: 'Now you! I say a phrase from a dispute - you determine: it is a trunk, a branch or a leaf.'
  - step_id: sc5_46
    source_step_id: '46'
    scene_id: sc5
    step_type: single_choice
    prompt: “Should children choose what to eat for lunch?”
    options:
    - id: opt_1
      text: Entry 70
    - id: opt_2
      text: Entry 71
    - id: opt_3
      text: Entry 72
    options_count: 3
    correct_answer: opt_1
    explanation: Trunk! This is the main issue of the dispute - the whole conversation is about it. Not an argument or an
      example, but something for which everyone gathered to argue.
    explanation_status: implicit
  - step_id: sc5_48
    source_step_id: '48'
    scene_id: sc5
    step_type: single_choice
    prompt: “Because children know better what they like and won’t leave food on their plate.”
    options:
    - id: opt_1
      text: Entry 75
    - id: opt_2
      text: Entry 76
    - id: opt_3
      text: Entry 77
    options_count: 3
    correct_answer: opt_2
    explanation: Branch! This argument explains WHY children should choose for themselves. Specific reason. Not a question,
      but an answer to a question.
    explanation_status: implicit
  - step_id: sc5_50
    source_step_id: '50'
    scene_id: sc5
    step_type: single_choice
    prompt: “Yesterday Olenka herself chose buckwheat instead of pasta and ate it all.”
    options:
    - id: opt_1
      text: Entry 80
    - id: opt_2
      text: Entry 81
    - id: opt_3
      text: Entry 82
    options_count: 3
    correct_answer: opt_3
    explanation: 'Leaf! One specific case with Olenka. Maybe she just loves buckwheat. And tomorrow he chooses ice cream for
      lunch - and the argument falls apart. Details are like photographs: they show one moment, not the whole picture.'
