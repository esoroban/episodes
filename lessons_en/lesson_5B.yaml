  - step_id: sc4_34
    source_step_id: '34'
    scene_id: sc4
    step_type: theory
    prompt: Where to go as a class - trunk. He was here all the time, he was just bombarded with giraffes and name-calling.
      “A giraffe is a long horse” may be a philosophical question, but it is certainly not the central idea of ​​the debate.
      And “who called whom” is no longer a dispute, but a showdown. It’s good that at least someone shouted “What are we arguing
      about?!” - here he is, a hero with a compass.
  - step_id: sc4_35
    source_step_id: '35'
    scene_id: sc4
    step_type: single_choice
    prompt: '- We need to eat soup! It is good for digestion! - The soup is tasteless! I want pasta! - You always want pasta!
      You''ll soon turn into pasta! - And you''re screwed! Yesterday you got beets all over the table! - It''s not me, it''s
      dad!'
    options:
    - id: opt_1
      text: Entry 49
    - id: opt_2
