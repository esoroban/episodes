language: en
title: What are we even arguing about
day: 5
slot: B
scenes:
- scene_id: sc1
  title: 'Discovery: what are we arguing about?'
  steps:
  - step_id: sc1_1
    source_step_id: '1'
    scene_id: sc1
    step_type: theory
    prompt: So, let's continue! In the previous lesson we learned to verify sources. Now — a new superpower.
  - step_id: sc1_2
    source_step_id: '2'
    scene_id: sc1
    step_type: theory
    prompt: 'Ever happened to you: you started arguing about one thing, and five minutes later you''re already fighting about
      something else? And nobody remembers how it started? Let''s check — I''ll tell six stories, and you notice the moment
      where the argument went off track.'
  - step_id: sc1_3
    source_step_id: '3'
    scene_id: sc1
    step_type: theory
    prompt: 'Masha and Mykola are deciding what movie to watch at a party. Masha wants "Harry Potter," Mykola — "Spider-Man."
      Masha says: "You don''t know anything about movies!" Mykola: "But you didn''t return my pencil yesterday!" Masha: "What
      pencil?! You still owe me for lunch!" Within a minute they''re fighting about debts, and they never chose a movie. The
      turning point was when Masha switched from "why Harry Potter is better" to "you don''t know anything."'
  - step_id: sc1_4
    source_step_id: '4'
    scene_id: sc1
    step_type: theory
    prompt: 'Two friends are arguing about who will be the goalkeeper. One says: "I catch the ball better — I caught it three
      times yesterday." The other: "Remember last month? You let in three goals!" The first: "But you fell in a puddle and
      everyone laughed!" The second: "That''s because YOU pushed me!" Within two minutes they''re figuring out who pushed
      whom in third grade. And there''s no goalkeeper. They went off track when instead of "who catches better now" they dug
      into old grievances.'
  - step_id: sc1_5
    source_step_id: '5'
    scene_id: sc1
    step_type: theory
    prompt: 'The class votes: go on a field trip to the zoo or a museum. Someone shouts: "The museum is boring!" Another:
      "And you''ve never even been to a museum!" — "I have! I went with mom!" — "Well, what did you see?" — "A dinosaur!"
      — "That''s not a museum, that''s an exhibition!" Within two minutes the whole class is arguing about the difference
      between a museum and exhibition, and they completely forgot about the trip. It''s like the bus went to a different city
      instead — and nobody noticed.'
  - step_id: sc1_6
    source_step_id: '6'
    scene_id: sc1
    step_type: theory
    prompt: 'Sister and brother are dividing the last piece of cake. Sister: "Mine — I''m younger!" Brother: "Mine — I helped
      mom bake it!" Sister: "But you wouldn''t let me watch cartoons yesterday!" Brother: "And you colored in my notebook!"
      Sister: "And you took my phone without asking!" The cake sits on the table. Nobody eats it. The cat watches them, and
      he wants to eat that cake himself — while they''re busy. They went off track when they jumped from "who gets the cake"
      to "who owes whom what."'
  - step_id: sc1_7
    source_step_id: '7'
    scene_id: sc1
    step_type: theory
    prompt: 'During break a group decides what to play. Vitya wants hide-and-seek, Olenka wants tag. Vitya: "Hide-and-seek
      is more fun — you can hide anywhere on the grounds!" Olenka: "But last time you climbed a tree and got stuck, the firefighters
      came!" Everyone starts discussing firefighters, someone remembers the fire truck at the neighbor''s, then the neighbor''s
      dog... Within three minutes they''re talking about dogs. And break is already over, and nobody played anything. Classic
      case: while arguing — time ran out.'
  - step_id: sc1_8
    source_step_id: '8'
    scene_id: sc1
    step_type: theory
    prompt: 'Two classmates argue about who''s smarter: cats or dogs. One makes an argument: "Dogs obey commands!" The other:
      "But cats don''t, because they''re SMARTER — they don''t want to obey!" The first: "Well, you''re a logician... With
      that approach you''d write your test "I don''t want to obey"!" The second is offended. Now they''re arguing about who
      writes tests better. Cats and dogs went to bed long ago — they''re smart enough not to participate in pointless arguments.'
  - step_id: sc1_9
    source_step_id: '9'
    scene_id: sc1
    step_type: theory
    prompt: See the pattern? Six stories — and it's the same thing everywhere.
  - step_id: sc1_10
    source_step_id: '10'
    scene_id: sc1
    step_type: theory
    prompt: 'There was a specific question. Then — boom! — someone switches to personal attacks, old grievances, a completely
      different topic. And the argument falls apart. Nobody''s at fault — everyone just forgot what they were arguing about.
      Today we''ll learn to find the central idea — it''s a compass for any argument. One sentence: "What are we even talking
      about?" If you have a compass — the argument moves toward its goal. If not — everyone circles in place like a lost bus.'
- scene_id: sc2
  title: STORY — ARGUMENT ABOUT A TRIP
  steps:
  - step_id: sc2_11
    source_step_id: '11'
    scene_id: sc2
    step_type: theory
    prompt: 'The class was deciding where to go on the weekend. Half shouts: "To the mountains! There are adventures!" The
      other half: "To the beach! It''s warm and we can swim!"'
  - step_id: sc2_12
    source_step_id: '12'
    scene_id: sc2
    step_type: theory
    prompt: The argument escalated. "Mountains are beautiful!" — "The beach is more fun!" — "But last time at the beach it
      was windy!" — "But in the mountains you twisted your ankle!" Nobody listens to anybody.
  - step_id: sc2_13
    source_step_id: '13'
    scene_id: sc2
    step_type: theory
    prompt: 'Then one girl stood up and quietly said: "Guys, what are we even arguing about? We want to rest together, right?
      Maybe we can find a place where there are both mountains and the beach?"'
  - step_id: sc2_14
    source_step_id: '14'
    scene_id: sc2
    step_type: theory
    prompt: 'Everyone fell silent. And it''s true — nobody asked: "What''s our MAIN goal?" While everyone was arguing about
      details, she saw the essence.'
  - step_id: sc2_15
    source_step_id: '15'
    scene_id: sc2
    step_type: open_question
    prompt: What did the girl do that others didn't think of? Why did her idea work?
  - step_id: sc2_16
    source_step_id: '16'
    scene_id: sc2
    step_type: theory
    prompt: 'She was the only one who asked herself: "What are we even arguing about?" Not "mountains or beach" — those are
      details. But "where can we all rest well." As soon as she found the trunk — the solution appeared. The lake suited everyone
      because it answered the main question.'
  - step_id: sc2_17
    source_step_id: '17'
    scene_id: sc2
    step_type: theory
    prompt: 'Notice: while others were shouting "mountains are better!" — "no, the beach is better!" — they were like two
      rams on a bridge. Each pulling their way. But the girl just looked down and said: "Guys, there''s a river here. We don''t
      have to use the bridge." She wasn''t choosing sides — she returned to the essence.'
  - step_id: sc2_18
    source_step_id: '18'
    scene_id: sc2
    step_type: theory
    prompt: Now remember our six stories. Masha and Mykola with the movie — if someone had said "We're choosing what to watch
      TOGETHER," they wouldn't have gone into pencils and debts. Brother and sister with cake — if someone had remembered
      "We're dividing cake, not figuring out who owes whom" — the cat would have stayed hungry.
  - step_id: sc2_19
    source_step_id: '19'
    scene_id: sc2
    step_type: theory
    prompt: 'So it turns out: the one who sees the central idea is not the loudest in the argument. He''s the smartest. Because
      while everyone is shouting — he''s thinking. And then with one sentence he solves what others couldn''t solve in an
      hour.'
- scene_id: sc3
  title: Tree of the argument
  steps:
  - step_id: sc3_20
    source_step_id: '20'
    scene_id: sc3
    step_type: theory
    prompt: And now I'll show you a tool that will help you see the central idea in any argument. Imagine a tree...
  - step_id: sc3_21
    source_step_id: '21'
    scene_id: sc3
    step_type: theory
    prompt: 'A tree has a trunk — thick, strong, one. From the trunk come branches. And on the branches — leaves. If you remove
      the trunk — everything falls. Branches and leaves can''t hang in the air. Well, the same is true for any argument: there''s
      also a trunk, branches, and leaves.'
  - step_id: sc3_22
    source_step_id: '22'
    scene_id: sc3
    step_type: theory
    prompt: 'The trunk is the central idea. One main question. Branches are arguments: why we think this way. Leaves are details:
      examples and specifics.'
  - step_id: sc3_23
    source_step_id: '23'
    scene_id: sc3
    step_type: theory
    prompt: 'Back to the story. Trunk: "Where should we rest?" Branches: "Mountains — adventure", "Beach — warmth and swimming".
      Leaves: "Last year Petrik got sunburned at the beach", "And in the mountains Sashko lost his shoe". See? Leaves are
      interesting details, but without the trunk they''re useless. Sunburned Petrik is not an argument, it''s a joke.'
  - step_id: sc3_24
    source_step_id: '24'
    scene_id: sc3
    step_type: reflection
    prompt: 'Another example. Argument: "Do we need school uniforms?" Trunk: needed or not. Branch: "A uniform saves time
      in the morning — you don''t have to think about what to wear". Leaf: "Yesterday Masha spent twenty minutes choosing
      an outfit and was late to first period. She came to class with one shoe because she was looking for the other under
      the bed." The leaf is bright, funny, memorable — but by itself it doesn''t solve anything. The trunk plus branches solve
      it.'
  - step_id: sc3_25
    source_step_id: '25'
    scene_id: sc3
    step_type: theory
    prompt: 'Third example. Argument: "Which club to choose — art or robotics?" Trunk: what''s more useful. Branch for art:
      "Develops imagination". Branch for robotics: "Teaches logic and programming". Leaf: "Yesterday in art class Vitya accidentally
      drew a cat that looked like the principal, and everyone laughed." Funny? Yes. Does it help choose a club? No. That''s
      a leaf — without the trunk it''s just a funny story.'
  - step_id: sc3_26
    source_step_id: '26'
    scene_id: sc3
    step_type: theory
    prompt: 'But here''s what happens when the trunk is lost. The same argument about clubs. One says: "Art develops imagination".
      The second: "But you draw like a chicken!" The first: "At least I can build a robot — yours always falls apart!" The
      second: "That was only once!" Done — the trunk is lost. Instead of "which club is more useful" now it''s "who does things
      worse". Leaves have fallen, branches have broken, the tree has fallen. It lies there. Sad.'
  - step_id: sc3_27
    source_step_id: '27'
    scene_id: sc3
    step_type: theory
    prompt: 'Remember: if you feel that an argument is going the wrong way — return to the trunk. Ask: "What are we even arguing
      about?" This is the strongest question you can ask. The girl from the story did exactly that — and won.'
- scene_id: sc4
  title: 'Practice: find the central idea'
  steps:
  - step_id: sc4_28
    source_step_id: '28'
    scene_id: sc4
    step_type: theory
    prompt: 'Theory is great. Now let''s check how you find the trunk! I''ll tell you six arguments. Your job is to find the
      central idea. Careful: the options are tricky!'
  - step_id: sc4_29
    source_step_id: '29'
    scene_id: sc4
    step_type: single_choice
    prompt: — Let's go to the movies! There's a new robot movie! — No, to the park! We can ride bikes! — You can't ride bikes,
      you crashed into a bush last time! — But you choked on popcorn at the theater! — That wasn't popcorn, it was chips!
    options:
    - id: opt_1
      text: Who gets into worse situations?
    - id: opt_2
      text: Where should we go together?
    - id: opt_3
      text: 'What tastes better: popcorn or chips?'
    options_count: 3
    correct_answer: opt_2
    explanation: Where to go together — that's the trunk! And "who gets into worse situations" is already bushes and popcorn,
      meaning old grievances. "Popcorn or chips" is a leaf from a completely different tree. Although the question is important,
      of course. But not now.
    explanation_status: implicit
  - step_id: sc4_31
    source_step_id: '31'
    scene_id: sc4
    step_type: single_choice
    prompt: '- I will be the first to play on the computer! I arrived earlier! - No, me! I gave in to you yesterday! - You
      didn’t give in, your mother called you to dinner! - It''s because YOU complained to your mom! “I didn’t complain, I
      just said you were cheating!”'
    options:
    - id: opt_1
      text: Entry 39
    - id: opt_2
      text: Entry 40
    - id: opt_3
      text: Entry 41
    options_count: 3
    correct_answer: opt_2
    explanation: 'Who plays first today is the trunk. “Who gave in to whom yesterday” sounds similar, but this is already
      yesterday - an argument, not a question. And “did someone cheat” is actually the third argument that came out of nowhere.
      It’s always like this: one spore gives birth to three new ones, like mushrooms after rain.'
    explanation_status: implicit
  - step_id: sc4_33
    source_step_id: '33'
    scene_id: sc4
    step_type: single_choice
    prompt: '- Let''s go on an excursion to the zoo! - No, to the water park! There are slides! - There are giraffes at the
      zoo! Have you seen a giraffe live? - A giraffe is just a long horse! - You yourself are a long horse! - Quiet! What
      are we even arguing about?!'
    options:
    - id: opt_1
      text: Entry 44
    - id: opt_2
      text: Entry 45
    - id: opt_3
      text: Entry 46
    options_count: 3
