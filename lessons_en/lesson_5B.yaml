  - step_id: sc5_52
    source_step_id: '52'
    scene_id: sc5
    step_type: single_choice
    prompt: Entry 84
    options:
    - id: opt_1
      text: Entry 85
    - id: opt_2
      text: Entry 86
    - id: opt_3
      text: Entry 87
