- scene_id: sc6
  title: Entry 99
  steps:
  - step_id: sc6_58
    source_step_id: '58'
    scene_id: sc6
    step_type: theory
    prompt: 'You already know how to find the central idea and distinguish arguments from details. The last skill left is
      to formulate the essence of the dispute in ONE sentence. Like the title of a movie: short, but it’s immediately clear
      what it’s about.'
  - step_id: sc6_59
    source_step_id: '59'
    scene_id: sc6
    step_type: theory
    prompt: 'The formula is simple: “We are arguing about ... or ...” For example: “We are arguing about whether to go to
      the cinema or to the park.” “We argue about whether school uniforms are necessary or not.” “We argue about whether to
      get a cat or a dog.”'
  - step_id: sc6_60
    source_step_id: '60'
    scene_id: sc6
    step_type: theory
    prompt: 'Why is this necessary? Because when you say this phrase out loud, the argument immediately calms down. Everyone
      remembers what they are talking about. It''s like pressing the pause button in a heated argument. The girl from the
      cartoon did just that: “We’re arguing about where to relax!” - and everyone stopped immediately.'
  - step_id: sc6_61
    source_step_id: '61'
    scene_id: sc6
    step_type: theory
    prompt: I will now describe the controversy. Try to formulate the essence in one sentence.
  - step_id: sc6_62
    source_step_id: '62'
    scene_id: sc6
    step_type: open_question
    prompt: Two friends can't decide whether to play football or basketball. One says that football is for real athletes.
      The other is that basketball is faster and more spectacular. Then one remembers how the other missed the goal, and it
      begins...
  - step_id: sc6_63
    source_step_id: '63'
    scene_id: sc6
    step_type: theory
    prompt: 'The gist: “We argue about what to play—football or basketball.” All! Not “who is the best athlete”, not “who
      missed” - but what to play. Trunk.'
  - step_id: sc6_64
    source_step_id: '64'
    scene_id: sc6
    step_type: open_question
    prompt: 'My sister wants to watch a cartoon, my brother wants a movie. My sister says that cartoons are more fun. Brother
      - like films for adults. Sister: “You don’t understand humor at all!” Brother: “Are you afraid of the dark!”'
  - step_id: sc6_65
