    - scene_id: sc7
      title:
        ru: Техника уточнения — защита от пугала
        uk: Перскажи перш ніж критикувати.
        en: Retell before criticizing.
      media_ref: 8A.sc7.clarification_technique
      status: v3_locked
      steps:
        - id: '122'
          type: speech
          duration_sec: 18
          text:
            ru: 'Вы научились находить пугало и определять его вид. Но в реальной
              жизни мало сказать «это пугало!» Нужно уметь ответить так, чтобы разговор
              вернулся к вашим настоящим словам. Для этого есть волшебная формула
              — уточнение.

              '
            uk: «Правильно я розумію...?»
            en: 'You have learned to find a scarecrow and identify its type. But in
              real life it’s not enough to say “that’s a scarecrow!” You need to be
              able to respond in such a way that the conversation returns to your
              real words. There is a magic formula for this - clarification.'
        - id: '123'
          type: speech
          duration_sec: 16
          text:
            ru: 'Формула звучит так: «Позволь уточнить: я говорил, что... — а не то,
              что...» Первая часть — ваши настоящие слова. Вторая — то, что вам приписали.
              Просто, вежливо и точно. Давайте попробуем.

              '
            uk: Це суть ЧЕСНОГО СПОРУ.
            en: "The formula sounds like this: “Let me clarify: I said that ... -
              and not that ...” The first part is your real words. The second is what
              was attributed to you. Simple, polite and precise. Let's try it."
        - id: '124'
          type: speech
          duration_sec: 14
          text:
            ru: 'Вы сказали: «Можно смотреть мультики после уроков.» Вам приписали:
              «Ты хочешь смотреть мультики вместо домашнего задания!» Как уточнить?

              '
            uk: На наступному уроці ми говоритимемо про вище та нижче реальності —
              про те, як люди замість фактів розповідають казки. До зустрічі!
            en: In the next lesson, we'll talk about above and below reality—how people
              tell stories instead of facts. See you!
        - id: '125'
          type: discussion
          duration_sec: 25
          text:
            ru: 'Сформулируйте уточнение по формуле: «Позволь уточнить: я говорил,
              что... а не то, что...»

              '
            uk: 'БОНУС: Словник Лячо'
            en: 'BONUS: Scarecrow Dictionary'
        - id: '126'
          type: speech
          duration_sec: 14
          text:
            ru: 'Например: «Позволь уточнить: я говорил — после уроков, а не вместо
              домашки. Это разные вещи.» Коротко и точно — пугало развалилось.

              '
            uk: 'СЛОВА-СИГНАЛИ розширення:'
            en: 'For example: “Let me clarify: I said after school, and not instead
              of homework. These are different things." Long story short, the scarecrow
              fell apart.'
        - id: '127'
          type: speech
          duration_sec: 14
          text:
            ru: 'Второй пример. Вы сказали: «Иногда полезно побыть одному.» Вам приписали:
              «Ты не любишь своих друзей!»

              '
            uk: «Все», «Завжди», «Ніколи», «Повністю», «Взагалі»
            en: '"All", "Always", "Never", "Completely", "Entirely"'
        - id: '128'
          type: discussion
          duration_sec: 25
          text:
            ru: 'Как уточнить?

              '
            uk: 'СЛОВА-СИГНАЛИ усунення:'
            en: 'REMOVAL signal words:'
        - id: '129'
          type: speech
          duration_sec: 14
          text:
            ru: 'Например: «Позволь уточнить: я сказал, что иногда полезно побыть
              одному — а не что я не люблю друзей. Одно другому не мешает.»

              '
            uk: 'Коли важливі слова зникають: «Можливо» стає «Перемога». «Іноді» стає
              «Завжди».'
            en: 'When important words disappear: "Maybe" becomes "Will". "Sometimes"
              becomes "Always".'
        - id: '130'
          type: speech
          duration_sec: 14
          text:
            ru: 'Третий. Вы сказали: «Овощи полезнее, чем чипсы.» Вам приписали: «Значит,
              чипсы вообще нельзя есть?!»

              '
            uk: 'СЛОВА-СИГНАЛИ додавання:'
            en: 'ADDITION signal words:'
        - id: '131'
          type: discussion
          duration_sec: 25
          text:
            ru: 'Формулируем уточнение.

              '
            uk: «Замість», «Замість того», «Вже не», «Забув про»
            en: '"Instead", "Instead of", "No longer", "Forgot about"'
        - id: '132'
          type: speech
          duration_sec: 14
          text:
            ru: '«Позволь уточнить: я сказал, что овощи полезнее — а не что чипсы
              запрещены. Полезнее — не значит "единственное разрешённое".»

              '
            uk: Вміти розпізнавати ці слова — значить розпізнати атаку Лячо.
            en: Recognizing these words means recognizing a Scarecrow attack.
        - id: '133'
          type: speech
          duration_sec: 14
          text:
            ru: 'Четвёртый. Вы сказали: «Хорошо бы меньше сидеть в телефоне.» Вам
              приписали: «Ты хочешь, чтобы у детей отобрали телефоны!»

              '
            uk: ВИСНОВОК УРОКУ
            en: 'Fourth. You said: “It would be nice to spend less time on the phone.”
              They wrote to you: “You want the children’s phones to be taken away!”'
        - id: '134'
          type: discussion
          duration_sec: 25
          text:
            ru: 'Уточняем!

              '
            uk: Лячо — це спотворення через розширення, усунення або додавання слів.
            en: Scarecrow is distortion through expansion, removal, or addition of
              words.
        - id: '135'
          type: speech
          duration_sec: 14
          text:
            ru: '«Позволь уточнить: я сказал — меньше сидеть, а не отобрать телефоны.
              Меньше — это не ноль.» Заметьте: каждый раз формула одна, а пугало —
              разное.

              '
            uk: Коли ви розпізнаєте Лячо, ви отримуєте суперсилу ЯСНОСТІ.
            en: When you recognize Scarecrow, you get the superpower of CLARITY.
        - id: '136'
          type: speech
          duration_sec: 16
          text:
            ru: 'Последний, сложный. Вы сказали: «Думаю, не все традиции нужно сохранять.»
              Вам приписали: «Ты против всех традиций и хочешь, чтобы мы забыли свою
              культуру!»

              '
            uk: Справедливий спір — це спір, де обидві сторони кажуть правду.
            en: A fair debate is one where both sides tell the truth.
        - id: '137'
          type: discussion
          duration_sec: 25
          text:
            ru: 'Как уточнить? Тут пугало двойное — и преувеличение, и добавление.

              '
            uk: До наступного уроку, розвідники правди!
            en: Until the next lesson, truth detectives!
        - id: '138'
          type: speech
          duration_sec: 16
          text:
            ru: '«Позволь уточнить: я сказал — не все, а не никакие. И про забыть
              культуру я вообще не говорил — это ты добавил.» Два удара — два уточнения.
              Формула работает даже против двойного пугала.

              '
            uk: 'Сцена 11: Практика розпізнавання — ЕКВІЗ'
            en: '“Let me clarify: I said not all, not none. And I didn’t talk about
              forgetting culture at all—you added that.” Two strikes - two clarifications.
              The formula even works against double bogeys.'
    - scene_id: sc8
      title:
        ru: Возражай красиво!
        uk: 'Нижче — п''ять діалогів. Для кожного скажіть: це справжня критика чи
          Лячо?'
        en: 'Below are five dialogues. For each, say: is it real criticism or Scarecrow?'
      media_ref: 8A.sc8.good_vs_bad_rebuttal
