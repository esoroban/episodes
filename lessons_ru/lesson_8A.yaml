          duration_sec: 10
          text:
            ru: 'Олег сказал: «Было бы здорово учить второй иностранный язык.» Ему
              ответили: «Ты считаешь, что наш язык плохой?!»

              '
            uk: 'Відповідь: ЛЯЧО — розширення (від одного до НІКОЛИ)'
            en: 'Answer: SCARECROW—expansion (from one to NEVER)'
        - id: '141'
