          text:
            ru: 'Мы знаем формулу уточнения. Но в жизни не все так отвечают. Сейчас
              — пять ситуаций. В каждой вам исказили слова. Голосуйте: какое возражение
              лучше?

              '
            uk: 'ДІАЛОГ 1: Ти кажеш: «Мені подобається гуляти з друзями.» Лячо відповідає:
              «Ти НІКОЛИ не займаєшся будь-чим іншим!»'
            en: 'DIALOGUE 1: You say: "I like walking with friends." Scarecrow responds:
              "You NEVER do anything else!"'
        - id: '140'
