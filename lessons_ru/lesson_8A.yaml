lesson:
  id: lesson_8A
  day: 8
  slot: A
  title:
    ru: Искажение слов — «Пугало»
    uk: Спотворення слів — «Лячо»
    en: Distorting Words — "Scarecrow"
  scenes:
    - scene_id: sc1
      title:
        ru: Разминка — повторение сложных тем
        uk: Розминка — повторення складних тем
        en: Warm-up — Reviewing Complex Topics
      media_ref: 8A.sc1.warmup_review
      status: v3_locked
      steps:
        - id: '1'
          type: speech
          duration_sec: 16
          text:
            ru: 'Прежде чем начать новую тему — быстрая разминка! Восемь раундов по
              самым хитрым темам, которые мы уже прошли. Каждый раунд — из разного
              урока. Кто помнит всё — тот настоящий мастер слова. Поехали!

              '
            uk: Перш ніж почати нову тему — швидка розминка! Вісім раундів по найхитрішим
              темам, які ми вже пройшли. Кожен раунд — з різного уроку. Хто пам'ятає
              все — той справжній майстер слова. Поїхали!
            en: Before we start the new topic—a quick warm-up! Eight rounds of the
              trickiest topics we've already covered. Each round is from a different
              lesson. Whoever remembers everything is a true master of words. Let's
              go!
        - id: '2'
          type: speech
          duration_sec: 10
          text:
            ru: '«Шоколад лучше овощей, потому что он вкуснее.»

              '
            uk: «Шоколад краще овочів, тому що він смачніший.»
            en: '"Chocolate is better than vegetables because it''s tastier."'
        - id: '3'
          type: vote
          duration_sec: 12
          text:
            ru: '«Шоколад лучше овощей, потому что он вкуснее.»

              '
            uk: «Шоколад краще овочів, тому що він смачніший.»
            en: '"Chocolate is better than vegetables because it''s tastier."'
          options:
            - id: opt_1
              text:
                ru: Факт
                uk: Факт
                en: Fact
            - id: opt_2
              text:
                ru: Мнение
                uk: Думка
                en: Opinion
            - id: opt_3
              text:
                ru: Неправда
                uk: Неправда
                en: 'False'
          correct: opt_2
        - id: '4'
          type: speech
          duration_sec: 10
          text:
            ru: 'Мнение! «Лучше» и «вкуснее» — это личные ощущения. Кому-то морковка
              вкуснее шоколада. Серьёзно, такие люди существуют.

              '
            uk: Думка! «Краще» і «смачніше» — це особисті відчуття. Комусь морквина
              смачніша за шоколад. Серйозно, такі люди існують.
            en: Opinion! "Better" and "tastier" are personal feelings. Some people
              think carrots taste better than chocolate. Seriously, such people exist.
        - id: '5'
          type: speech
          duration_sec: 14
          text:
            ru: 'Лена надела новые кроссовки — и пробежала быстрее всех. Лена говорит:
              «Это кроссовки помогли!»

              '
            uk: 'Лена надягла нові кросівки — і побігла швидше за всіх. Лена говорить:
              «Це кросівки допомогли!»'
            en: 'Lena put on new sneakers and ran faster than everyone. Lena says:
              "These sneakers helped!"'
        - id: '6'
          type: vote
          duration_sec: 12
          text:
            ru: 'Новые кроссовки — причина быстрого бега Лены?

              '
            uk: Нові кросівки — причина швидкого бігу Лени?
            en: Are new sneakers the cause of Lena's fast running?
          options:
            - id: opt_1
              text:
                ru: Причина
                uk: Причина
                en: Cause
            - id: opt_2
              text:
                ru: Совпадение
                uk: Збіг
                en: Coincidence
            - id: opt_3
              text:
                ru: Нужно проверить
                uk: Потрібно перевірити
                en: Need to check
          correct: opt_3
        - id: '7'
          type: speech
          duration_sec: 12
          text:
            ru: 'Нужно проверить! Может, Лена тренировалась. Может, другие бежали
              медленнее. Один раз — не доказательство. Надо пробежать в старых кроссовках
              и сравнить.

              '
            uk: Потрібно перевірити! Може, Лена тренувалася. Може, інші біглиши повільніше.
              Один раз — не доказ. Треба побігти в старих кросівках і порівняти.
            en: Need to check! Maybe Lena had trained. Maybe the others ran slower.
              Once is not proof. Need to run in the old sneakers and compare.
        - id: '8'
          type: speech
          duration_sec: 10
          text:
            ru: 'Реклама: «Этот йогурт ест знаменитый футболист Марко! Будь как Марко!»

              '
            uk: 'Реклама: «Цей йогурт їсть знаменитий футболіст Марко! Будь як Марко!»'
            en: 'Advertisement: "Famous footballer Marco eats this yogurt! Be like
              Marco!"'
        - id: '9'
          type: vote
          duration_sec: 12
          text:
            ru: 'Какой способ убеждения использует реклама?

              '
            uk: Який спосіб переконання використовує реклама?
            en: Which persuasion technique does the advertisement use?
          options:
            - id: opt_1
              text:
                ru: Доверие (этос)
                uk: Довіра (етос)
                en: Trust (ethos)
            - id: opt_2
              text:
                ru: Эмоции (пафос)
                uk: Емоції (патос)
                en: Emotions (pathos)
            - id: opt_3
              text:
                ru: Факты (логос)
                uk: Факти (логос)
                en: Facts (logos)
          correct: opt_1
        - id: '10'
          type: speech
          duration_sec: 12
          text:
            ru: 'Доверие! Реклама использует авторитет знаменитости. Но Марко — эксперт
              по футболу, а не по йогуртам. Его слава — не доказательство качества.

              '
            uk: Довіра! Реклама використовує авторитет знаменитості. Але Марко — експерт
              по футболу, а не по йогуртам. Його слава — не доказ якості.
            en: Trust! The advertisement uses a celebrity's authority. But Marco is
              an expert in football, not yogurt. His fame is not proof of quality.
        - id: '11'
          type: speech
          duration_sec: 10
          text:
            ru: 'Мама говорит: «Ты никогда не убираешь свою комнату!»

              '
            uk: 'Мама говорить: «Ти ніколи не прибираєш свою кімнату!»'
            en: 'Mom says: "You never clean your room!"'
        - id: '12'
          type: vote
          duration_sec: 12
          text:
            ru: 'Есть ли тут ловушка слов?

              '
            uk: Є тут пастка слів?
            en: Is there a word trap here?
          options:
            - id: opt_1
              text:
                ru: Да, ловушка
                uk: Так, пастка
                en: Yes, trap
            - id: opt_2
              text:
                ru: Нет, всё точно
                uk: Ні, все точно
                en: No, it's accurate
          correct: opt_1
        - id: '13'
          type: speech
          duration_sec: 12
          text:
            ru: 'Ловушка! «Никогда» — слово-абсолют. Скорее всего, иногда ты всё-таки
              убираешь. Точнее было бы: «Ты редко убираешь комнату.»

              '
            uk: 'Пастка! «Ніколи» — слово-абсолют. Скоріше за все, іноді ти все ж
              таки прибираєш. Точніше було б: «Ти рідко прибираєш кімнату.»'
            en: 'Trap! "Never" is an absolute word. Likely you do sometimes clean
              your room. More accurate would be: "You rarely clean your room."'
        - id: '14'
          type: speech
          duration_sec: 14
          text:
            ru: 'Директор школы: «У нас демократия, каждый имеет право голоса!» Потом:
              «Мнение тех, кто хоть раз опоздал, учитывать не будем.»

              '
            uk: 'Директор школи: «У нас демократія, кожен має право голосу!» Потім:
              «Думку тих, хто хоч раз спізнився, враховувати не будемо.»'
            en: 'School principal: "We have democracy, everyone has a voice!" Then:
              "We won''t consider the opinions of those who have ever been late."'
        - id: '15'
          type: vote
          duration_sec: 12
          text:
            ru: 'Есть ли противоречие?

              '
            uk: Є тут протиріччя?
            en: Is there a contradiction?
          options:
            - id: opt_1
              text:
                ru: Да, противоречие
                uk: Так, протиріччя
                en: Yes, contradiction
            - id: opt_2
              text:
                ru: Нет, всё логично
                uk: Ні, все логічно
                en: No, it's logical
          correct: opt_1
        - id: '16'
          type: speech
          duration_sec: 10
          text:
            ru: 'Противоречие! «Каждый имеет право голоса» и «опоздавших не слушаем»
              — одно исключает другое. Опоздавшие — тоже «каждый».

              '
            uk: Протиріччя! Демократія для всіх, а потім — «крім тих, хто спізнювся».
              Це вже не демократія. Пастка слів.
            en: Contradiction! Democracy for everyone, but then "except those who
              were late". That's not democracy. Word trap.
        - id: '17'
          type: speech
          duration_sec: 12
          text:
            ru: 'Петя: «Нужно пить воду.» Обоснование: «Если организм теряет больше
              воды, чем получает, клетки хуже работают — и человек чувствует усталость.»

              '
            uk: А тепер ми переходимо до нової теми. Готові?
            en: Now we're moving to a new topic. Ready?
        - id: '18'
          type: vote
          duration_sec: 12
          text:
            ru: 'Какой тип обоснования?

              '
            uk: 'Сцена 1: Що таке «Лячо»?'
            en: 'Scene 1: What is a "Scarecrow"?'
          options:
            - id: opt_1
              text:
                ru: Факт
                uk: 'Уявіть: ви сказали щось просте, а людина робить з цього щось
                  страшне!'
                en: 'Imagine: you say something simple, and someone turns it into
                  something scary!'
            - id: opt_2
              text:
                ru: Логика
                uk: 'Наприклад, ви кажете: «Мені подобається гуляти в парку.» А людина
                  відповідає: «Ти хочеш цілий день сидіти в парку і забути про школу!»'
                en: 'For example, you say: "I like walking in the park." And someone
                  responds: "You want to spend all day in the park and forget about
                  school!"'
            - id: opt_3
              text:
                ru: Источник
                uk: Це називається спотворенням — або в нашому курсі — «Лячо». Кожне
                  слово змінилося і вийшло щось жахливе!
                en: This is called distortion—or in our course—"Scarecrow". Every
                  word changed and something scary came out!
          correct: opt_2
        - id: '19'
          type: speech
          duration_sec: 10
          text:
            ru: 'Логика! Цепочка: потеря воды → клетки хуже работают → усталость.
              Это объяснение «почему».

              '
            uk: 'Сцена 2: Перший вид Лячо — розширення'
            en: 'Scene 2: First Type of Scarecrow — Exaggeration'
        - id: '20'
          type: speech
          duration_sec: 12
          text:
            ru: 'Оля: «Контрольные лучше писать карандашом — можно исправить ошибку.»
              Ваня: «Тебе семь лет было, когда ты научилась писать, какие тебе контрольные!»

              '
            uk: 'Максим каже: «Мені кажеться, що деякі правила в школі дивні.» Що
              робить Лячо?'
            en: 'Maxim says: "I think some school rules are weird." What does Scarecrow
              do?'
        - id: '21'
          type: vote
          duration_sec: 12
          text:
            ru: 'Какой вид нападения?

              '
            uk: 'Він говорить: «Ти думаєш, що ВСІ правила дивні! Ти проти школи!»'
            en: 'It says: "You think ALL rules are weird! You''re against school!"'
          options:
            - id: opt_1
              text:
                ru: Оскорбление
                uk: Максим сказав про ДЕЯКІ — а Лячо змінило на ВСІ. Це спотворення-розширення.
                en: Maxim said SOME—but Scarecrow changed it to ALL. This is expansion
                  distortion.
            - id: opt_2
              text:
                ru: Обстоятельства
                uk: 'Сцена 3: Другий вид Лячо — усунення слів'
                en: 'Scene 3: Second Type of Scarecrow — Word Removal'
            - id: opt_3
              text:
                ru: «Сам такой»
                uk: 'Наташа каже: «Мені здається, іноді домашні завдання було б можна
                  зробити коротшим.» Що робить Лячо?'
                en: 'Natasha says: "I think sometimes homework could be made shorter."
                  What does Scarecrow do?'
          correct: opt_2
        - id: '22'
          type: speech
          duration_sec: 10
          text:
            ru: 'Обстоятельства! Ваня указал на возраст. Это не имеет отношения к
              идее писать карандашом.

              '
            uk: 'Він говорить: «Ти хочеш скасувати домашні завдання!»'
            en: 'It says: "You want to abolish homework!"'
        - id: '23'
          type: speech
          duration_sec: 12
          text:
            ru: 'Учитель: «Все учёные согласны, что Земля круглая.» Ученик: «Мой дядя
              говорит, что плоская. Он много путешествовал!»

              '
            uk: Наташа сказала «іноді» і «могла б» — а Лячо викинуло ці слова. Тепер
              звучить як крайність.
            en: Natasha said "sometimes" and "could"—but Scarecrow removed those words.
              Now it sounds extreme.
        - id: '24'
          type: vote
          duration_sec: 12
          text:
            ru: 'Что использовал ученик?

              '
            uk: 'Сцена 4: Третій вид Лячо — додавання слів'
            en: 'Scene 4: Third Type of Scarecrow — Adding Words'
          options:
            - id: opt_1
              text:
                ru: Факт
                uk: 'Артур каже: «Я люблю комп''ютерні ігри.» Що робить Лячо?'
                en: 'Arthur says: "I like computer games." What does Scarecrow do?'
            - id: opt_2
              text:
                ru: Ненадёжный источник
                uk: 'Він говорить: «Ти хочеш грати в ігри цілий день замість школи
                  і забути про друзів!»'
                en: 'It says: "You want to play games all day instead of school and
                  forget your friends!"'
            - id: opt_3
              text:
                ru: Нападение на человека
                uk: Артур тільки сказав, що любить ігри. А Лячо додало цілий сценарій
                  катастрофи.
                en: Arthur just said he likes games. But Scarecrow added a whole disaster
                  scenario.
          correct: opt_2
        - id: '25'
          type: speech
          duration_sec: 12
          text:
            ru: 'Ненадёжный источник! Дядя-путешественник — не эксперт по форме Земли.
              Путешествия не заменяют научные измерения.

              '
            uk: 'Сцена 5: Практика розпізнавання Лячо'
            en: 'Scene 5: Practicing Recognizing Scarecrow'
        - id: '26'
          type: speech
          duration_sec: 14
          text:
            ru: 'Восемь из восьми! Вы помните всё: факты и мнения, причины и совпадения,
              способы убеждения, ловушки слов, противоречия, обоснования и нападения.
              Теперь — новая тема. И она вам понравится.

              '
            uk: Давайте потренуємось. Я дам приклад — потім ви скажете, чи це справжня
              критика чи Лячо.
            en: Let's practice. I'll give an example—then you say if it's real criticism
              or Scarecrow.
    - scene_id: sc2
      title:
        ru: Открытие — новый нечестный приём
        uk: Вас люблять в школі, але вони не люблять вас особисто!
        en: People at school like you, but they don't like you personally!
      media_ref: 8A.sc2.straw_man_intro
      status: v3_locked
      steps:
        - id: '27'
          type: speech
          duration_sec: 18
          text:
            ru: 'На прошлом уроке мы научились распознавать нападение на человека.
              Но есть ещё один нечестный приём. Он хитрее, потому что выглядит как
              нормальный спор. Послушайте историю — и попробуйте заметить подвох.

              '
            uk: Таке може мати сенс у поганій розмові, але звучить занадто жорстко.
            en: This might make sense in a bad conversation, but it sounds too harsh.
        - id: '28'
          type: speech
          duration_sec: 16
          text:
            ru: 'В классе выбирали, куда поехать на экскурсию. Маша встала и сказала:
              «Думаю, иногда можно есть сладкое. Давайте поедем на шоколадную фабрику
              — там и вкусно, и интересно узнать, как делают конфеты.»

              '
            uk: Це справжня критика чи Лячо?
            en: "In class we chose where to go on an excursion. Masha stood up and
              said: “I think sometimes you can eat sweets. Let's go to a chocolate
              factory - it's delicious and interesting to learn how sweets are made.\""
        - id: '29'
          type: speech
          duration_sec: 14
          text:
            ru: 'Микола вскочил: «Значит, ты хочешь, чтобы дети ели только конфеты
              и испортили себе зубы?!» Класс засмеялся. Маша покраснела и не знала
              что ответить. Вроде бы Микола ответил на её слова. Но что-то было не
              так.

              '
            uk: Справжня критика
            en: 'Mikola jumped up: “So you want the children to eat only candy and
              ruin their teeth?!” The class laughed. Masha blushed and didn’t know
              what to answer. It seems that Mikola responded to her words. But something
              was wrong.'
        - id: '30'
          type: discussion
          duration_sec: 20
          text:
            ru: 'Что не так в ответе Миколы? Что Маша сказала на самом деле?

              '
            uk: Лячо — спотворення
            en: Scarecrow — distortion
        - id: '31'
          type: speech
          duration_sec: 18
          text:
            ru: 'Маша сказала «иногда можно». А Микола превратил это в «только конфеты
              и испортить зубы». Он не обзывал Машу — вроде бы спорил с идеей. Но
              с идеей, которую сам придумал. С версией, которую Маша никогда не произносила.

              '
            uk: 'Лячо! Це дуже мала та невизначена фраза. Але вона немов говорить:
              «Всі діти в школі ненавидять саме тебе». Надто суро.'
            en: 'Scarecrow! That''s a very vague phrase. But it sounds like: "All
              the kids at school hate you specifically". Too harsh.'
        - id: '32'
          type: speech
          duration_sec: 20
          text:
            ru: 'Представьте: рыцарь вызывает вас на бой. Он сильный, в доспехах,
              с мечом. Вы боитесь. И тогда берёте солому, набиваете мешок, рисуете
              лицо, ставите шлем — получается пугало. Бьёте мечом — раз! Пугало падает.
              «Я победил рыцаря!» — кричите вы.

              '
            uk: Вас змусили повторити відповідь на домашнє завдання, коли вас запитали.
            en: You were forced to repeat an answer to homework when asked.
        - id: '33'
          type: speech
          duration_sec: 16
          text:
            ru: 'Но рыцарь стоит рядом и смотрит с удивлением. Он целый. Вы победили
              пугало, а не его. Так и в споре: изменил чужие слова, победил глупую
              версию — значит, победил пугало, а не настоящий аргумент.

              '
            uk: Це справжня критика чи Лячо?
            en: "But the knight stands nearby and looks in surprise. He's whole. You
              defeated the scarecrow, not him. It’s the same in an argument: if you
              changed someone else’s words and defeated the stupid version, that means
              you won the scarecrow, not the real argument."
        - id: '34'
          type: speech
          duration_sec: 14
          text:
            ru: 'Этот приём называется «Пугало» — искажение слов. Он встречается везде:
              в школе, дома, в интернете, в новостях. Сегодня научимся его узнавать
              и защищаться.

              '
            uk: Справжня критика
            en: 'This technique is called “Scarecrow” - distortion of words. It is
              found everywhere: at school, at home, on the Internet, in the news.
              Today we will learn to recognize it and defend ourselves.'
    - scene_id: sc3
      title:
        ru: Сценка — спор о экскурсии
        uk: Лячо — спотворення
        en: Scarecrow — distortion
      media_ref: 8A.sc3.skit_excursion
      status: v3_locked
      steps:
        - id: '35'
          type: speech
          duration_sec: 18
          text:
            ru: 'А теперь — история из жизни одного класса. Обычный вторник, последний
              урок. Учительница объявила: «Ребята, в пятницу у нас экскурсия. Но куда
              — решаете вы. У кого есть предложения?»

              '
            uk: Справжня критика! Це дуже конкретно. Можна дізнатися, про що говоримо.
            en: Real criticism! That's very specific. You know exactly what it's about.
        - id: '36'
          type: speech
          duration_sec: 16
          text:
            ru: 'Первым руку поднял Витя. Он встал, поправил очки и сказал серьёзно,
              как учёный на конференции: «Предлагаю музей космонавтики. Там настоящий
              скафандр и кусок метеорита. Один раз — но зато какой!»

              '
            uk: 'Сцена 6: Як захищатися від Лячо'
            en: 'Scene 6: How to Defend Against Scarecrow'
        - id: '37'
          type: speech
          duration_sec: 18
          text:
            ru: 'Дмитрик даже не поднял руку. Он развалился на стуле и громко сказал:
              «О, началось! Витя хочет, чтобы мы целый год ходили только по музеям!
              Будем пыль нюхать вместо нормального отдыха. Отличный план, Витя!»

              '
            uk: Коли хтось робить Лячо, не потрібно падати у паніку. Знайти спотворення
              та назвати його.
            en: When someone does Scarecrow, don't panic. Find the distortion and
              call it out.
        - id: '38'
          type: speech
          duration_sec: 16
          text:
            ru: 'Класс захихикал. Витя растерялся: «Подожди, я сказал один раз...»
              Но Дмитрик уже продолжал: «Следующее предложение — экскурсия в библиотеку?
              А потом в архив? Может, сразу в музей скуки?»

              '
            uk: 'Схема захисту:'
            en: 'The class chuckled. Vitya was confused: “Wait, I said it once...”
              But Dmitrik already continued: “The next proposal is an excursion to
              the library? And then to the archive? Maybe we should go straight to
              the Museum of Boredom?”'
        - id: '39'
          type: speech
          duration_sec: 16
          text:
            ru: 'Смех стал громче. Витя покраснел. Его идея про космос — настоящий
              скафандр, метеорит — утонула в карикатуре, которую нарисовал Дмитрик.
              Вместо одной экскурсии — «целый год по музеям».

              '
            uk: 1. Знайти, що змінилось (розширено, виключено, додано)
            en: 1. Find what changed (expanded, removed, added)
        - id: '40'
          type: speech
          duration_sec: 16
          text:
            ru: 'И тут Оленка подняла руку. Она говорила тихо, но весь класс замолчал:
              «Дмитрик, Витя сказал — один раз. В музей космонавтики. Откуда взялся
              целый год и музей скуки? Ты споришь не с Витей, а с пугалом.»

              '
            uk: '2. Назвати спотворення: «Постривай, ти змінив...»'
            en: '2. Call out the distortion: "Wait, you changed..."'
        - id: '41'
          type: speech
          duration_sec: 14
          text:
            ru: 'Класс притих. Дмитрик открыл рот — и закрыл. Потому что Оленка была
              права. Он не ответил на настоящую идею Вити. Он придумал смешную, глупую
              версию — и победил её. Но идея Вити — целая.

              '
            uk: '3. Повернути правду: «Я сказав/а...»'
            en: 'The class fell silent. Dmitry opened his mouth and closed it. Because
              Olenka was right. He did not respond to Vitya''s real idea. He came
              up with a funny, stupid version - and won it. But Vitya’s idea is whole.'
        - id: '42'
          type: discussion
          duration_sec: 25
          text:
            ru: 'Как именно Дмитрик изменил слова Вити? Что Витя сказал, и во что
              это превратилось?

              '
            uk: '4. Запитати: «Правильно я розуміюся?»'
            en: '4. Ask: "Do you understand me correctly?"'
        - id: '43'
          type: speech
          duration_sec: 16
          text:
            ru: 'Витя сказал «один раз в музей космонавтики». Дмитрик превратил это
              в «целый год только по музеям». Преувеличил количество, убрал деталь
              про космос — и получилось пугало, с которым легко спорить.

              '
            uk: 'Сцена 7: Приклади захисту'
            en: 'Vitya said “once to the cosmonautics museum.” Dmytrik turned this
              into “a whole year of just museums.” I exaggerated the number, removed
              the detail about space - and it turned out to be a scarecrow that is
              easy to argue with.'
        - id: '44'
          type: discussion
          duration_sec: 25
          text:
            ru: 'Почему класс смеялся? И почему Вите было так сложно ответить?

              '
            uk: 'Приклад 1: Розширення'
            en: 'Example 1: Expansion'
        - id: '45'
          type: speech
          duration_sec: 18
          text:
            ru: 'Потому что пугало выглядит смешно — «музей скуки», «пыль нюхать».
              Трудно защищать идею, которую уже превратили в карикатуру. Именно поэтому
              «пугало» — такой опасный приём. Оно бьёт не логикой, а смехом.

              '
            uk: 'Ти: «Я мислю, що школу можна поліпшити.» Людина робить Лячо: «Ти
              хочеш скасувати школу!» Твоя відповідь?'
            en: 'You: "I think school could be improved." Person does Scarecrow: "You
              want to abolish school!" Your response?'
    - scene_id: sc4
      title:
        ru: Как распознать пугало — 4 приёма искажения
        uk: 'Ти: «Постривай. Я сказав, що школу можна ПОЛІПШИТИ, а не скасувати. Правильно
          я розумієшся?»'
        en: 'You: "Wait. I said school could be IMPROVED, not abolished. Do you understand
          me correctly?"'
      media_ref: 8A.sc4.four_tricks
      status: v3_locked
      steps:
        - id: '46'
          type: speech
          duration_sec: 16
          text:
            ru: 'Итак, «пугало» — это когда твои слова изменяют, чтобы легче с ними
              спорить. Но как именно изменяют? Есть четыре способа. Каждый — с историей.
              Слушайте внимательно, потому что потом будете ловить их сами.

              '
            uk: 'Приклад 2: Усунення слів'
            en: 'So, a “bogeyman” is when your words are changed to make it easier
              to argue with them. But how exactly do they change? There are four ways.
              Each one has a story. Listen carefully, because then you will catch
              them yourself.'
        - id: '47'
          type: speech
          duration_sec: 18
          text:
            ru: 'Способ первый — преувеличение. Берут «немножко» и раздувают до «всегда».
              Ира на семейном ужине говорит: «Мне бы хотелось иногда самой выбирать,
              что надеть в школу.» Мама всплёскивает руками: «Ты хочешь ходить в школу
              в пижаме?!»

              '
            uk: 'Ти: «Іноді я люблю побути сам і почитати.» Людина робить Лячо: «Ти
              ненавидиш людей і не маєш друзів!» Твоя відповідь?'
            en: 'You: "Sometimes I like to be alone and read." Person does Scarecrow:
              "You hate people and have no friends!" Your response?'
        - id: '48'
          type: speech
          duration_sec: 16
          text:
            ru: 'Ира сказала «иногда выбирать» — может, жёлтую кофту вместо синей.
              А мама превратила это в пижаму. «Иногда выбирать» стало «ходить в чём
              попало». Маленькое желание раздули до абсурда.

              '
            uk: 'Ти: «Не так. Я сказав ІНОДІ люблю побути самому. Я люблю друзів,
              але потребую часу для себе. Це звичайно.»'
            en: 'You: "That''s not right. I said I SOMETIMES like to be alone. I love
              my friends, but I need time for myself. That''s normal."'
        - id: '49'
          type: speech
          duration_sec: 18
          text:
            ru: 'Способ второй — упрощение. Убирают важную деталь — и смысл меняется.
              Богдан на классном совете: «Думаю, на контрольной по физике можно пользоваться
              калькулятором, когда задача не про счёт, а про понимание формулы.»

              '
            uk: 'Приклад 3: Додавання слів'
            en: 'The second method is simplification. They remove an important detail
              and the meaning changes. Bogdan on class council: “I think you can use
              a calculator on a physics test when the task is not about counting,
              but about understanding the formula.”'
        - id: '50'
          type: speech
          duration_sec: 18
          text:
            ru: 'Учитель разводит руками: «Богдан предлагает убрать устный счёт из
              программы! Через год никто не сможет сложить в уме два трёхзначных числа.
              Отличная идея, Богдан!» Класс смеётся. Богдан сидит красный.

              '
            uk: 'Ти: «Я не люблю це завдання.» Людина робить Лячо: «Ти ненавидиш уроки
              і хочеш нічого не робити!» Твоя відповідь?'
            en: 'You: "I don''t like this assignment." Person does Scarecrow: "You
              hate classes and want to do nothing!" Your response?'
        - id: '51'
          type: speech
          duration_sec: 16
          text:
            ru: 'Богдан сказал «калькулятор на задачах про формулы». Учитель убрал
              условие и раздул до «убрать устный счёт из программы». Деталь исчезла
              — осталось пугало, с которым легко спорить.

              '
            uk: 'Ти: «Постривай. Я сказав, що не люблю ЦЕ ЗАВДАННЯ, а не УСІ уроки.
              І я не сказав, що не хочу нічого робити. Правильно розумієшся?»'
            en: 'You: "Wait. I said I don''t like THIS ASSIGNMENT, not all classes.
              And I didn''t say I want to do nothing. Do you get it?"'
        - id: '52'
          type: speech
          duration_sec: 18
          text:
            ru: 'Способ третий — добавление. Приписывают то, чего человек вообще не
              говорил. Катя за обедом: «По-моему, суп сегодня пересолен.» Бабушка
              обиженно: «Значит, тебе не нравится моя еда? Я полдня у плиты стояла,
              а ты — неблагодарная!»

              '
            uk: 'Приклад 4: Подвійне спотворення'
            en: 'The third method is adding. They attribute something that the person
              did not say at all. Katya at lunch: “I think the soup is too salty today.”
              Grandmother offended: “So you don’t like my food? I stood at the stove
              for half a day, and you are ungrateful!”'
        - id: '53'
          type: speech
          duration_sec: 16
          text:
            ru: 'Катя сказала только про соль. Только! А бабушка добавила «не нравится
              еда» и «неблагодарная» — ничего этого Катя не произносила. Пугало выросло
              из одного слова «пересолен» в целую обиду.

              '
            uk: 'Іван сказав: «Я люблю читати книги.» Йому відповіли: «Ти думаєш,
              що всі повинні сидіти в бібліотеці і забути про спорт!»'
            en: 'Ivan said: "I like to read books." He was answered: "You think everyone
              should sit in the library and forget about sports!"'
        - id: '54'
          type: speech
          duration_sec: 18
          text:
            ru: 'Способ четвёртый — изменение смысла. Делают идею злой или глупой.
              Максим на перемене: «Может, стоит иногда играть в новые игры, не только
              в футбол.» Сергей: «А, ты ненавидишь футбол и хочешь, чтобы мы бросили
              команду!»

              '
            uk: Яке заперечення Івана краще?
            en: 'The fourth method is changing the meaning. They make the idea evil
              or stupid. Maxim at recess: “Maybe we should sometimes play new games,
              not just football.” Sergei: “Oh, you hate football and want us to quit
              the team!”'
        - id: '55'
          type: speech
          duration_sec: 16
          text:
            ru: '«Иногда в новые игры» превратилось в «ненавидишь футбол и бросить
              команду». Максим предложил разнообразие — а получил обвинение в предательстве.
              Смысл вывернули наизнанку.

              '
            uk: '«Дозволь уточнити: я сказав, що люблю читати, а не що всі обов''язані
              і спорт не потрібен»'
            en: '"Let me clarify: I said I like to read, not that everyone must and
              sports aren''t needed"'
        - id: '56'
          type: speech
          duration_sec: 16
          text:
            ru: 'Четыре способа сделать пугало: раздуть, упростить, добавить, вывернуть.
              И главный сигнал: если после чьего-то ответа вам хочется крикнуть «Я
              этого не говорил!» — перед вами пугало. Запомните это ощущение.

              '
            uk: «Добре, забудь, я нічого не говорив...»
            en: '"OK, forget it, I didn''t say anything..."'
    - scene_id: sc5
      title:
        ru: Практика — пугало или нет
        uk: Першим — повернуло свої слова і показало подвійне спотворення. Другим
          — здав позиції. Коли відступаєш, Лячо перемагає. А ведь ти був правий —
          уточни і стоїй на своєму!
        en: First one — returns his words and shows double distortion. Second one
          — gives up. When you retreat, Scarecrow wins. But you were right—clarify
          and stand your ground!
      media_ref: 8A.sc5.straw_man_practice
      status: v3_locked
      steps:
        - id: '57'
          type: speech
          duration_sec: 14
          text:
            ru: 'Теперь — ваша очередь. Десять раундов. Я читаю, что человек сказал,
              и что ему приписали. Вы голосуете: слова передали правильно — или это
              пугало?

              '
            uk: 'Сцена 8: Чесний пересказ і закриття'
            en: 'Scene 8: Honest Retelling and Closing'
        - id: '58'
          type: speech
          duration_sec: 14
          text:
            ru: 'Сказали: «Можно иногда играть в компьютер после уроков.» Приписали:
              «Ты хочешь сидеть в компьютере целый день и забросить учёбу!»

              '
            uk: 'Ми навчилися захищатися від Лячо. Але є ще одне важливе правило —
              як самому НЕ робити Лячо. Перш ніж відповісти, повтори своїми словами,
              що сказав опонент, і запитай: «Правильно я розумію?»'
            en: 'We learned to defend against Scarecrow. But there''s one more important
              rule—how NOT to make Scarecrow yourself. Before answering, repeat in
              your own words what your opponent said and ask: "Do I understand correctly?"'
        - id: '59'
          type: vote
          duration_sec: 12
          text:
            ru: 'Слова передали правильно?

              '
            uk: 'Якщо опонент скаже «Так» — відповідай. Якщо скаже «Ні, я мав на увазі
              інше» — уточни. Це правило чесного спору. Давайте потренуємось: я дам
              два пересказу — один чесний, один Лячо.'
            en: 'If your opponent says "Yes"—answer. If they say "No, I meant something
              else"—clarify. This is the rule of honest debate. Let''s practice: I''ll
              give two retellings—one honest, one Scarecrow.'
          options:
            - id: opt_1
              text:
                ru: Правильно
                uk: 'Оригінал: «Мені здається, домашніх завдань іноді буває багато.»
                  Який пересказ чесний?'
                en: 'Original: "I think sometimes there''s a lot of homework." Which
                  retelling is honest?'
            - id: opt_2
              text:
                ru: Пугало
                uk: Який пересказ чесний?
                en: Which retelling is honest?
          correct: opt_2
        - id: '60'
          type: speech
          duration_sec: 10
          text:
            ru: 'Пугало! «Иногда после уроков» превратили в «целый день». Классическое
              преувеличение — способ номер один.

              '
            uk: «Ти думаєш, що іноді домашок багато?»
            en: '"You think sometimes there''s a lot of homework?"'
        - id: '61'
          type: speech
          duration_sec: 12
          text:
            ru: 'Сказали: «Мне нравятся кошки.» Приписали: «Тебе нравятся домашние
              животные, которые мяукают.»

              '
            uk: «Ти проти домашніх завдань!»
            en: '"You''re against homework!"'
        - id: '62'
          type: vote
          duration_sec: 12
          text:
            ru: 'Слова передали правильно?

              '
            uk: Перший! Зберіг «іноді» і «здається». Другий — викинув обидва слова
              і раздув до протесту.
            en: First! Kept "sometimes" and "I think". Second—removed both words and
              blew it up into a protest.
          options:
            - id: opt_1
              text:
                ru: Правильно
                uk: 'Оригінал: «Було б здорово, якби перерви були довшими.» Який пересказ
                  чесний?'
                en: 'Original: "It would be great if breaks were longer." Which retelling
                  is honest?'
            - id: opt_2
              text:
                ru: Пугало
                uk: Який пересказ чесний?
                en: Which retelling is honest?
          correct: opt_1
        - id: '63'
          type: speech
          duration_sec: 10
          text:
            ru: 'Правильно! Кошки — это и есть домашние животные, которые мяукают.
              Смысл сохранён, ничего не добавили.

              '
            uk: «Ти хочеш, щоб уроків взагалі не було!»
            en: '"You want no classes at all!"'
        - id: '64'
          type: speech
          duration_sec: 14
          text:
            ru: 'Сказали: «Думаю, можно позволить детям позже ложиться в выходные.»
              Приписали: «Ты считаешь, что дети вообще не должны спать!»

              '
            uk: «Тобі б хотілось довших перерв?»
            en: '"You''d like longer breaks?"'
        - id: '65'
          type: vote
          duration_sec: 12
          text:
            ru: 'Пугало или нет?

              '
            uk: Другий! Передав думку без спотворень. Перший — класичне Лячо-перебільшення.
            en: Second! Conveyed the idea without distortion. First—classic Scarecrow
              exaggeration.
          options:
            - id: opt_1
              text:
                ru: Правильно
                uk: 'Оригінал: «Я більше люблю літо, ніж зиму.» Який пересказ чесний?'
                en: 'Original: "I like summer more than winter." Which retelling is
                  honest?'
            - id: opt_2
              text:
                ru: Пугало
                uk: Який пересказ чесний?
                en: Which retelling is honest?
          correct: opt_2
        - id: '66'
          type: speech
          duration_sec: 10
          text:
            ru: 'Пугало! «Позже в выходные» — это лишний час, а не бессонница навсегда.
              Преувеличение до абсурда.

              '
            uk: «Тобі літо подобається більше, ніж зима?»
            en: '"Do you like summer more than winter?"'
        - id: '67'
          type: speech
          duration_sec: 12
          text:
            ru: 'Сказали: «Уборку лучше делать по субботам — так удобнее.» Приписали:
              «Значит, в остальные дни можно жить в грязи?!»

              '
            uk: «Ти ненавидиш зиму!»
            en: 'They said: “It’s better to do cleaning on Saturdays - it’s more convenient.”
              They added: “So, on other days you can live in the dirt?!”'
        - id: '68'
          type: vote
          duration_sec: 12
          text:
            ru: 'Пугало или нет?

              '
            uk: Перший! «Більше люблю» — це не «ненавиджу». Чесний пересказ зберігає
              м'якість оригіналу.
            en: First! "Like more" is not "hate". Honest retelling preserves the softness
              of the original.
          options:
            - id: opt_1
              text:
                ru: Правильно
                uk: 'Оригінал: «Думаю, можна дозволити приносити іграшки в школу.»
                  Який пересказ чесний?'
                en: 'Original: "I think toys could be allowed at school." Which retelling
                  is honest?'
            - id: opt_2
              text:
                ru: Пугало
