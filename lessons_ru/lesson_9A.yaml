              '
            uk: 'Что же такого хитрого в страшной цепочке? Давайте разберём. '
            en: 'What''s so cunning about the scary chain? Let''s figure it out. The
              scheme is simple: “If A happens, then B, then C, then D - and it will
              be HORROR!” Looks logical. But there is a catch!'
        - id: '50'
          type: speech
          duration_sec: 16
          text:
            ru: 'Хитрость вот в чём: каждое следующее звено — менее вероятно, чем
              предыдущее. Представьте: шанс, что А произойдёт — половина. Шанс, что
              после А случится Б — ещё меньше. После Б — В? Совсем мало. Вся цепочка
              вместе — почти невозможна!

              '
            uk: 'Хитрость вот в чём: каждое следующее звено — менее вероятно,'
            en: 'The trick is this: each next link is less likely than the previous
              one. Imagine: the chance that A will happen is half. The chance that
              B will happen after A is even less. After B - C? Not much at all. The
              whole chain together is almost impossible!'
        - id: '51'
          type: speech
          duration_sec: 16
          text:
            ru: 'Пример. «Если я не позавтракаю — буду голодным. Если голодный — не
