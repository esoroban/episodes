            en: Example. “If I don’t have breakfast, I’ll be hungry. If I'm hungry,
              I won't be able to think. If I can’t think, I’ll fail the test. If I
              fail, I’ll be expelled...” Stop! You can snack on an apple during recess.
              The chain falls apart on the first link!
        - id: '52'
          type: speech
          duration_sec: 14
          text:
            ru: 'И вот главное правило: в страшных цепочках забывают, что на каждом
