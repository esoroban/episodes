lesson:
  id: lesson_9A
  day: 9
  slot: A
  title:
    ru: Страшные цепочки
    uk: Страшні ланцюги
    en: Scary Chains
  scenes:
    - scene_id: sc1
      title:
        ru: Разминка — повторение Дня 8
        uk: Розминка — повторення Дня 8
        en: Warm-up — Day 8 Review
      media_ref: 9A.sc1.review_day8
      status: v3_locked
      steps:
        - id: '1'
          type: speech
          duration_sec: 16
          text:
            ru: 'Новый день — и сразу разминка! На прошлом занятии мы прошли две ловушки:
              «пугало» — когда искажают чужие слова, и манипуляцию страхом — когда
              пугают, чтобы управлять. Пять раундов — проверим, кто всё помнит!

              '
            uk: 'Новий день — і відразу розминка! На попередньому занятті ми пройшли
              дві пастки: «лякало» — коли спотворюють чужі слова, й маніпуляцію страхом
              — коли лякають, щоб керувати. П''ять раундів — перевіримо, хто все пам''ятає!'
            en: 'New day — warm-up time! Last session we covered two traps: "scarecrow"
              — when someone distorts your words, and fear manipulation — when they
              scare you to control you. Five rounds — let''s see who remembers!'
        - id: '2'
          type: speech
          duration_sec: 14
          text:
            ru: 'Катя говорит: «Мне не нравится этот фильм.» Одноклассник отвечает:
              «А, так ты вообще ненавидишь кино и считаешь всех, кому нравится, глупыми?»

              '
            uk: 'Катя говорить: «Мені не подобається цей фільм.» Однокласник відповідає:
              «А, так ти взагалі ненавидиш кіно й вважаєш усіх, кому подобається,
              глупими?»'
            en: 'Katya says: "I don''t like this movie." A classmate responds: "So
              you hate all movies and think everyone who likes them is stupid?"'
        - id: '3'
          type: vote
          duration_sec: 12
          text:
            ru: 'Что сделал одноклассник?

              '
            uk: Що зробив однокласник?
            en: What did the classmate do?
          options:
            - id: opt_1
              text:
                ru: Исказил слова Кати (пугало)
                uk: Спотворив слова Кати (лякало)
                en: Distorted Katya's words (scarecrow)
            - id: opt_2
              text:
                ru: Привёл контраргумент
                uk: Привів контраргумент
                en: Provided a counter-argument
            - id: opt_3
              text:
                ru: Согласился с Катей
                uk: Погодився з Катею
                en: Agreed with Katya
          correct: opt_1
        - id: '4'
          type: speech
          duration_sec: 10
          text:
            ru: 'Пугало! Катя сказала про один фильм — а из этого раздули «ненавидишь
              всё кино». Классическое искажение.

              '
            uk: Лякало! Катя сказала про один фільм — а з цього раздули «ненавидиш
              все кіно». Класичне спотворення.
            en: Scarecrow! Katya said one movie — they blew it up to "you hate all
              movies." Classic distortion.
        - id: '5'
          type: speech
          duration_sec: 12
          text:
            ru: 'Реклама в интернете: «Если ты не купишь наш рюкзак — все в классе
              будут смеяться над твоим старым!»

              '
            uk: 'Реклама в інтернеті: «Якщо ти не купиш наш рюкзак — все в класі будуть
              сміятися над твоїм старим!»'
            en: 'An internet ad: "If you don''t buy our backpack — everyone in class
              will laugh at your old one!"'
        - id: '6'
          type: vote
          duration_sec: 10
          text:
            ru: 'Это реальное предупреждение или манипуляция страхом?

              '
            uk: Це реальне попередження чи маніпуляція страхом?
            en: Is this a real warning or fear manipulation?
          options:
            - id: opt_1
              text:
                ru: Реальное предупреждение
                uk: Реальне попередження
                en: Real warning
            - id: opt_2
              text:
                ru: Манипуляция страхом
                uk: Маніпуляція страхом
                en: Fear manipulation
          correct: opt_2
        - id: '7'
          type: speech
          duration_sec: 12
          text:
            ru: 'Манипуляция! Рекламе выгодно, чтобы вы боялись. А на самом деле никто
              не разглядывает чужие рюкзаки. Ну, почти никто.

              '
            uk: Маніпуляція! Рекламі вигідно, щоб ви боялися. А насправді ніхто не
              розглядає чужі рюкзаки. Ну, майже ніхто.
            en: Manipulation! The ad wants you scared. But really, no one looks at
              other people's backpacks. Well, almost no one.
        - id: '8'
          type: speech
          duration_sec: 12
          text:
            ru: 'Андрей говорит: «Я думаю, контрольные нужно проводить реже.» Учитель
              отвечает: «То есть ты хочешь вообще ничего не учить?»

              '
            uk: 'Андрій говорить: «Я думаю, контрольні потрібно проводити рідше.»
              Вчитель відповідає: «Тобто ти хочеш взагалі нічого не вчити?»'
            en: 'Andrey says: "I think we should have fewer tests." Teacher responds:
              "So you don''t want to learn anything at all?"'
        - id: '9'
          type: vote
          duration_sec: 12
          text:
            ru: 'Что сделал учитель?

              '
            uk: Що зробив вчитель?
            en: What did the teacher do?
          options:
            - id: opt_1
              text:
                ru: Исказил слова Андрея (пугало)
                uk: Спотворив слова Андрія (лякало)
                en: Distorted Andrey's words (scarecrow)
            - id: opt_2
              text:
                ru: Задал уточняющий вопрос
                uk: Задав уточнюючий вопрос
                en: Asked a clarifying question
            - id: opt_3
              text:
                ru: Согласился
                uk: Погодився
                en: Agreed
          correct: opt_1
        - id: '10'
          type: speech
          duration_sec: 12
          text:
            ru: 'Пугало! «Реже» не значит «никогда». Учитель превратил скромную просьбу
              в полный отказ от учёбы. Мощный приём!

              '
            uk: Лякало! «Рідше» не означає «ніколи». Вчитель перетворив скромну просьбу
              на повний відмову від навчання. Потужний прийом!
            en: Scarecrow! "Less often" doesn't mean "never." The teacher turned a
              modest request into total rejection of learning. Powerful trick!
        - id: '11'
          type: speech
          duration_sec: 10
          text:
            ru: '«Не катайся на велосипеде без шлема — можешь сильно удариться головой
              при падении.»

              '
            uk: «Не катайся на велосипеді без шолома — можеш сильно вдаритися головою
              при падінні.»
            en: '"Don''t ride a bike without a helmet — you can hit your head hard
              if you fall."'
        - id: '12'
          type: vote
          duration_sec: 10
          text:
            ru: 'Реальное предупреждение или манипуляция?

              '
            uk: Реальне попередження чи маніпуляція?
            en: Real warning or manipulation?
          options:
            - id: opt_1
              text:
                ru: Реальное предупреждение
                uk: Реальне попередження
                en: Real warning
            - id: opt_2
              text:
                ru: Манипуляция страхом
                uk: Маніпуляція страхом
                en: Fear manipulation
          correct: opt_1
        - id: '13'
          type: speech
          duration_sec: 10
          text:
            ru: 'Реальное! Короткая связь: без шлема — удар головой. Никакой хитрости,
              просто факт о безопасности.

              '
            uk: 'Реальне! Коротка зв''язь: без шолома — удар головою. Ніякої хитрості,
              просто факт про безпеку.'
            en: 'Real! Short connection: no helmet — head injury. No tricks, just
              a safety fact.'
        - id: '14'
          type: speech
          duration_sec: 14
          text:
            ru: 'Подруга говорит: «Мне нравится рисовать больше, чем играть в футбол.»
              Кто-то отвечает: «Ты просто ленивая и не хочешь двигаться!»

              '
            uk: 'Подруга говорить: «Мені подобається малювати більше, ніж грати у
              футбол.» Хтось відповідає: «Ти просто ледача й не хочеш рухатися!»'
            en: 'A friend says: "I like drawing more than playing soccer." Someone
              responds: "You''re just lazy and don''t want to exercise!"'
        - id: '15'
          type: vote
          duration_sec: 12
          text:
            ru: 'Какой приём использован?

              '
            uk: Який прийом використаний?
            en: What trick is used?
          options:
            - id: opt_1
              text:
                ru: Пугало (искажение слов)
                uk: Лякало (спотворення слів)
                en: Scarecrow (word distortion)
            - id: opt_2
              text:
                ru: Манипуляция страхом
                uk: Маніпуляція страхом
                en: Fear manipulation
            - id: opt_3
              text:
                ru: Никакого приёма
                uk: Ніякого прийому
                en: No trick
          correct: opt_1
        - id: '16'
          type: speech
          duration_sec: 12
          text:
            ru: 'Снова пугало! «Нравится рисовать» превратили в «ленивая». Предпочтение
              — это не лень. Можно любить рисовать и бегать марафоны!

              '
            uk: Снова пугало! Нравится рисовать превратили в ленивая. Пр
            en: Scarecrow again! “I like to draw” was turned into “lazy.” Preference
              is not laziness. You can love to draw and run marathons!
        - id: '17'
          type: speech
          duration_sec: 8
          text:
            ru: 'Отлично размялись! Сегодня — новая ловушка. Называется «страшная
              цепочка». Готовы?

              '
            uk: Отлично размялись! Сегодня — новая ловушка. Называется стра
            en: Great workout! Today is a new trap. It's called the "scary chain".
              Are you ready?
    - scene_id: sc2
      title:
        ru: Практика — как ответить на пугало и страх
        uk: Практика — как ответить на пугало и страх
        en: Practice - how to respond to scarecrows and fears
      media_ref: 9A.sc2.open_response_review
      status: v3_locked
      steps:
        - id: '18'
          type: speech
          duration_sec: 10
          text:
            ru: 'Размялись — теперь тренируемся отвечать! Четыре ситуации. Обсуждайте
              вслух: что сказать в ответ и какой приём использован?

              '
            uk: Размялись — теперь тренируемся отвечать! Четыре ситуации. Об
            en: "We've warmed up - now we're practicing answering! Four situations.
              Discuss out loud: what to say in response and what technique was used?"
        - id: '19'
          type: speech
          duration_sec: 14
          text:
            ru: 'Ситуация первая. Вы говорите: «Я не хочу сегодня пиццу.» Одноклассник
              возмущается: «Ты что, ненавидишь всё, что мы любим?! Тебе вообще ничего
              не нравится?!»

              '
            uk: 'Ситуация первая. Вы говорите: Я не хочу сегодня пиццу. Одн'
            en: 'Situation one. You say, “I don’t want pizza today.” A classmate is
              indignant: “Do you hate everything we love?! Don’t you like anything
              at all?!”'
        - id: '20'
          type: discussion
          duration_sec: 25
          text:
            ru: 'Какой приём использован и как ответить?

              '
            uk: Какой приём использован и как ответить?
            en: What technique was used and how to respond?
        - id: '21'
          type: speech
          duration_sec: 14
          text:
            ru: 'Пугало! «Не хочу пиццу» превратили в «ненавижу всё». Ответ: «Позволь
              уточнить — я сказал про пиццу сегодня, а не про всю еду на планете.
              Завтра, может, сам попрошу двойную.»

              '
            uk: 'Пугало! Не хочу пиццу превратили в ненавижу всё. Ответ: '
            en: 'Scarecrow! “I don’t want pizza” turned into “I hate everything.”
              Answer: “Let me clarify - I said about pizza today, and not about all
              the food on the planet. Tomorrow, maybe I’ll ask for a double.”'
        - id: '22'
          type: speech
          duration_sec: 14
          text:
            ru: 'Ситуация вторая. В школе объявили конкурс талантов. Вы пока не записались.
              Подруга шепчет: «Если не запишешься — все подумают, что ты ничего не
              умеешь! Будешь единственный, кто сидит в зале как зритель!»

              '
            uk: 'Ситуация вторая. В школе объявили конкурс талантов. Вы пока '
            en: 'Situation two. The school announced a talent competition. You haven''t
              signed up yet. A friend whispers: “If you don’t sign up, everyone will
              think that you don’t know how to do anything!” You will be the only
              one sitting in the hall as a spectator!”'
        - id: '23'
          type: discussion
          duration_sec: 25
          text:
            ru: 'Манипуляция или реальное? Как ответить, используя три вопроса-фильтра?

              '
            uk: Манипуляция или реальное? Как ответить, используя три вопрос
            en: Manipulation or real? How to answer using three filter questions?
        - id: '24'
          type: speech
          duration_sec: 14
          text:
            ru: 'Манипуляция страхом! Одиночество плюс неудача. Ответ: «Точно ли ВСЕ
              так подумают? Вряд ли. И зрители — тоже важные люди. Без зрителей конкурс
              — это репетиция перед пустым залом.»

              '
            uk: 'Манипуляция страхом! Одиночество плюс неудача. Ответ: Точно'
            en: 'Manipulation by fear! Loneliness plus failure. Answer: “Is that really
              what EVERYONE will think? Hardly. And the audience is important people
              too. Without spectators, a competition is a rehearsal in front of an
              empty hall.”'
        - id: '25'
          type: speech
          duration_sec: 14
          text:
            ru: 'Ситуация третья. На уроке вы сказали: «Мне кажется, домашки задают
              многовато.» Учитель отвечает: «То есть ты считаешь, что учиться вообще
              не нужно и можно весь день играть в телефон?»

              '
            uk: 'Ситуация третья. На уроке вы сказали: Мне кажется, домашки '
            en: 'Situation three. In class you said: “I think they give too much homework.”
              The teacher answers: “So you think that there is no need to study at
              all and you can play on the phone all day?”'
        - id: '26'
          type: discussion
          duration_sec: 25
          text:
            ru: 'Что за приём? Как уточнить свои слова?

              '
            uk: Что за приём? Как уточнить свои слова?
            en: What kind of reception? How can you clarify your words?
        - id: '27'
          type: speech
          duration_sec: 16
          text:
            ru: 'Пугало! «Многовато домашки» раздули до «учиться не нужно». Ответ:
              «Позволь уточнить — я говорил, что домашки много, а не что учиться не
              надо. Я хочу учиться, но и погулять иногда тоже хочу. Одно другому не
              мешает.»

              '
            uk: Пугало! Многовато домашки раздули до учиться не нужно. О
            en: 'Scarecrow! “Too much homework” has been inflated into “no need to
              study.” Answer: “Let me clarify - I said that there is a lot of homework,
              and not that there is no need to study. I want to study, but sometimes
              I also want to go for a walk. One does not interfere with the other.”'
        - id: '28'
          type: speech
          duration_sec: 16
          text:
            ru: 'Последняя! Вы не хотите идти на день рождения к однокласснику, потому
              что у вас тренировка. Он обижается: «Если не придёшь — я вычеркну тебя
              из друзей! И все узнают, что ты предатель! Никто больше не позовёт тебя
              никуда!»

              '
            uk: Последняя! Вы не хотите идти на день рождения к одноклассник
            en: "The last one! You don't want to go to your classmate's birthday party
              because you have training. He gets offended: “If you don’t come, I’ll
              cross you out of my friends!” And everyone will know that you are a
              traitor! No one will invite you anywhere else!”"
        - id: '29'
          type: discussion
          duration_sec: 25
          text:
            ru: 'Какой вид запугивания? Какой мотив? Как ответить?

              '
            uk: Какой вид запугивания? Какой мотив? Как ответить?
            en: What type of bullying? What is the motive? How to answer?
        - id: '30'
          type: speech
          duration_sec: 16
          text:
            ru: 'Манипуляция страхом — одиночество! Мотив — обида. Ответ: «Точно ли
              никто никогда не позовёт? Из-за одной тренировки? Настоящие друзья понимают,
              что бывают дела. Давай я приду после тренировки — если торт останется,
              конечно!»

              '
            uk: 'Манипуляция страхом — одиночество! Мотив — обида. Ответ: То'
            en: 'Manipulation by fear - loneliness! The motive is resentment. Answer:
              “Are you sure no one will ever call? Because of one workout? True friends
              understand that things happen. Let me come after training - if there
              is cake left, of course!”'
    - scene_id: sc3
      title:
        ru: Открытие темы — страшные цепочки
        uk: Открытие темы — страшные цепочки
        en: Opening topic - scary chains
      media_ref: 9A.sc3.scary_chains_intro
      status: v3_locked
      steps:
        - id: '31'
          type: speech
          duration_sec: 16
          text:
            ru: 'Послушайте три истории и подумайте — что у них общего? История первая.
              Старшая сестра говорит брату: «Если не уберёшь игрушки — споткнёшься,
              сломаешь ногу, не сможешь ходить в школу, не закончишь класс и будешь
              жить на улице!»

              '
            uk: Послушайте три истории и подумайте — что у них общего? Истор
            en: 'Listen to three stories and think - what do they have in common?
              Story one. The older sister tells her brother: “If you don’t put away
              the toys, you’ll trip, break your leg, won’t be able to go to school,
              won’t graduate, and will live on the street!”'
        - id: '32'
          type: pause
          duration_sec: 3
          text:
            ru: ''
            uk: ''
            en: ''
        - id: '33'
          type: speech
          duration_sec: 16
          text:
            ru: 'История вторая. Старший брат пугает: «Если не выучишь стих — получишь
              плохую оценку, потом ещё одну, тебя оставят на второй год, выгонят из
              школы, и ты станешь дворником!»

              '
            uk: 'История вторая. Старший брат пугает: Если не выучишь стих —'
            en: 'The second story. The older brother is frightening: “If you don’t
              memorize the verse, you will get a bad grade, then another one, you
              will be kept in the second year, kicked out of school, and you will
              become a janitor!”'
        - id: '34'
          type: pause
          duration_sec: 3
          text:
            ru: ''
            uk: ''
            en: ''
        - id: '35'
          type: speech
          duration_sec: 18
          text:
            ru: 'И третья! Подруга говорит: «Если не поделишься конфетой — я обижусь,
              расскажу всем, с тобой никто не будет дружить, ты останешься совсем
              одна и будешь плакать каждый день до конца жизни!»

              '
            uk: 'И третья! Подруга говорит: Если не поделишься конфетой — я '
            en: 'And the third! A friend says: “If you don’t share the candy, I’ll
              be offended, I’ll tell everyone, no one will be friends with you, you’ll
              be left completely alone and cry every day for the rest of your life!”'
        - id: '36'
          type: pause
          duration_sec: 5
          text:
            ru: ''
            uk: ''
            en: ''
        - id: '37'
          type: vote
          duration_sec: 12
          text:
            ru: 'Что объединяет все три истории?

              '
            uk: Что объединяет все три истории?
            en: What do all three stories have in common?
          options:
            - id: opt_1
              text:
                ru: Все строят длинную цепочку ужасов из мелочи
                uk: Все строят длинную цепочку ужасов из мелочи
                en: Everyone builds a long chain of horrors out of little things
            - id: opt_2
              text:
                ru: Все говорят правду
                uk: Все говорят правду
                en: Everyone is telling the truth
            - id: opt_3
              text:
                ru: Все дают полезный совет
                uk: Все дают полезный совет
                en: Everyone gives useful advice
          correct: opt_1
        - id: '38'
          type: speech
          duration_sec: 14
          text:
