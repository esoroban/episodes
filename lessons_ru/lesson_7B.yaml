              кто об этом говорит.

              '
            uk: Возраст Василя не имеет никакого отношения к тому, нужно ли выключать
              свет. Свет тратит электричество независимо от того, сколько лет тому,
              кто об этом говорит.
            en: Vasil's age has nothing to do with whether the lights need to be turned
              off. Light wastes electricity no matter how old the person talking about
              it is.
        - id: '69'
          type: speech
          duration_sec: 10
          text:
            ru: 'Второй пример. Оля: «Мне кажется, нужно больше читать.» Зина: «Ты
