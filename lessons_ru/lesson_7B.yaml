lesson:
  id: lesson_7B
  day: 7
  slot: B
  title:
    ru: Достаточное основание и нападение на человека
    uk: Достатня основа та напад на людину
    en: Sufficient Ground and Personal Attack
  scenes:
    - scene_id: sc1
      title:
        ru: Обоснование — понятие
        uk: Обоснование — понятие
        en: Justification - concept
      media_ref: 7B.sc1.justification_concept
      status: v3_locked
      steps:
        - id: '1'
          type: speech
          duration_sec: 12
          text:
            ru: 'Перед перерывом я обещал — мы научимся задавать самый мощный вопрос
              в мире. Готовы? Вот он: «Почему ты так думаешь?»

              '
            uk: 'Перед перерывом я обещал — мы научимся задавать самый мощный вопрос
              в мире. Готовы? Вот он: «Почему ты так думаешь?»'
            en: 'Before the break, I promised that we would learn to ask the most
              powerful question in the world. Are you ready? Here it is: “Why do you
              think that?”'
        - id: '2'
          type: speech
          duration_sec: 14
          text:
            ru: 'Звучит просто, правда? Но этот вопрос — как рентген. Он просвечивает
              любое утверждение насквозь. Если за словами стоит что-то настоящее —
              человек объяснит. А если нет — станет ясно, что утверждение пустое.

              '
            uk: Звучит просто, правда? Но этот вопрос — как рентген. Он просвечивает
              любое утверждение насквозь. Если за словами стоит что-то настоящее —
              человек объяснит. А если нет — станет ясно, что утверждение пустое.
            en: Sounds simple, right? But this question is like an x-ray. It shines
              through any statement. If there is something real behind the words,
              the person will explain. And if not, it will become clear that the statement
              is empty.
        - id: '3'
          type: speech
          duration_sec: 16
          text:
            ru: 'Вот пример. Кто-то говорит: «Витамины полезные.» Окей. Почему ты
              так думаешь? «Потому что мой старший брат так сказал.» Хм... А брат
              — врач? Учёный? Или просто так решил? Видите, один вопрос — и мы уже
              понимаем, стоит ли верить.

              '
            uk: 'Вот пример. Кто-то говорит: «Витамины полезные.» Окей. Почему ты
              так думаешь? «Потому что мой старший брат так сказал.» Хм... А брат
              — врач? Учёный? Или просто так решил? Видите, один вопрос — и мы уже
              понимаем, стоит ли верить.'
            en: 'Here''s an example. Someone says: “Vitamins are healthy.” OK. Why
              do you think so? "Because my older brother said so." Hmm... Is your
              brother a doctor? Scientist? Or did you just decide that? You see, one
              question and we already understand whether it’s worth believing.'
        - id: '4'
          type: speech
          duration_sec: 14
          text:
            ru: 'Каждое утверждение должно быть обоснованным. Это значит: если ты
              что-то говоришь — объясни, почему ты так думаешь. Это не грубость и
              не наезд. Это уважение к разговору.

              '
            uk: 'Каждое утверждение должно быть обоснованным. Это значит: если ты
              что-то говоришь — объясни, почему ты так думаешь. Это не грубость и
              не наезд. Это уважение к разговору.'
            en: 'Each statement must be substantiated. This means: if you say something,
              explain why you think so. This is not rudeness or hitting. This is respect
              for the conversation.'
        - id: '5'
          type: speech
          duration_sec: 12
          text:
            ru: 'И у обоснований есть три типа — три причины, которые делают утверждение
              сильным. Сейчас разберём каждый.

              '
            uk: И у обоснований есть три типа — три причины, которые делают утверждение
              сильным. Сейчас разберём каждый.
            en: And justifications have three types - three reasons that make a statement
              strong. Now let's look at each one.
        - id: '6'
          type: speech
          duration_sec: 14
          text:
            ru: 'Первый тип — факты. То, что можно проверить. «В Киеве живут несколько
              миллионов людей» — это факт, можно посмотреть в статистике. «Вода кипит
              при ста градусах» — факт, можно измерить.

              '
            uk: Первый тип — факты. То, что можно проверить. «В Киеве живут несколько
              миллионов людей» — это факт, можно посмотреть в статистике. «Вода кипит
              при ста градусах» — факт, можно измерить.
            en: The first type is facts. Something that can be verified. “Several
              million people live in Kyiv” - this is a fact, you can see it in the
              statistics. “Water boils at one hundred degrees” is a fact that can
              be measured.
        - id: '7'
          type: speech
          duration_sec: 12
          text:
            ru: 'Второй тип — логика. Размышление, которое следует одно из другого.
              «Если идёт дождь, то на улице мокро.» Тут не нужна статистика — достаточно
              подумать.

              '
            uk: Второй тип — логика. Размышление, которое следует одно из другого.
              «Если идёт дощ, то на улице мокро.» Тут не нужна статистика — достаточно
              подумать.
            en: The second type is logic. A reflection that follows one from the other.
              “If it rains, it’s wet outside.” You don't need statistics here - just
              think.
        - id: '8'
          type: speech
          duration_sec: 14
          text:
            ru: 'Третий тип — надёжный источник. Эксперт или проверенная информация.
              «Врач сказал, что нужно мыть руки» — врач разбирается в здоровье, это
              надёжный источник. «Учебник географии пишет, что Земля круглая» — тоже
              надёжный.

              '
            uk: Третий тип — надёжный источник. Эксперт или проверенная информация.
              «Врач сказал, что нужно мыть руки» — врач разбирается в здоровье, это
              надёжный источник. «Учебник географии пишет, что Земля круглая» — тоже
              надёжный.
            en: The third type is a reliable source. Expert or verified information.
              “The doctor said you need to wash your hands” - the doctor knows about
              health, this is a reliable source. “The geography textbook says that
              the Earth is round” is also reliable.
        - id: '9'
          type: speech
          duration_sec: 10
          text:
            ru: 'А вот «просто потому что», «все так говорят», «мне кажется» — это
              не обоснование. Это пустота, обёрнутая в слова.

              '
            uk: А вот «просто потому что», «все так говорят», «мне кажется» — это
              не обґрунтування. Это пустота, обёрнутая в слова.
            en: But “just because,” “everyone says so,” “it seems to me” is not a
              justification. This is emptiness wrapped in words.
    - scene_id: sc2
      title:
        ru: 'Практика: какой тип обоснования?'
        uk: 'Практика: какой тип обоснования?'
        en: 'Practice: what type of justification?'
      media_ref: 7B.sc2.justification_types
      status: v3_locked
      steps:
        - id: '10'
          type: speech
          duration_sec: 14
          text:
            ru: 'Сейчас я читаю утверждение и три разных объяснения. Все звучат убедительно.
              Ваша задача — определить, какое из них факт, какое логика, а какое надёжный
              источник. Иногда они смешиваются — будьте внимательны.

              '
            uk: Сейчас я читаю утверждение и три разных объяснения. Все звучат убедительно.
              Ваша задача — определить, какое из них факт, какое логика, а какое надёжный
              источник. Иногда они смешиваются — будьте внимательны.
            en: Now I'm reading a statement and three different explanations. Everyone
              sounds convincing. Your job is to determine which is fact, which is
              logic, and which is a reliable source. Sometimes they mix - be careful.
        - id: '11'
          type: speech
          duration_sec: 12
          text:
            ru: 'Утверждение: «Нужно пристёгиваться в машине.» А: «Потому что при
              аварии ремень удерживает человека.» Б: «В статистике показано, что пристёгнутые
              пассажиры реже получают травмы.» В: «Инструктор по вождению так учит.»

              '
            uk: 'Утверждение: «Нужно пристёгиваться в машине.» А: «Потому что при
              аварии ремень удерживает людину.» Б: «В статистике показано, что пристёгнутые
              пассажиры реже получают травмы.» В: «Инструктор по вождению так учит.»'
            en: 'Statement: “You need to wear a seat belt in the car.” A: “Because
              in an accident, the belt holds the person.” B: “Statistics show that
              belted passengers are less likely to be injured.” Q: “The driving instructor
              teaches this way.”'
        - id: '12'
          type: discussion
          duration_sec: 25
          text:
            ru: 'Какое объяснение — факт, какое — логика, какое — источник?

              '
            uk: Какое объяснение — факт, какое — логика, какое — источник?
            en: Which explanation is fact, which is logic, which is source?
        - id: '13'
          type: speech
          duration_sec: 14
          text:
            ru: 'Разбор: А — логика, одно следует из другого: если авария, то без
              ремня опаснее. Б — факт, есть проверяемые данные. В — надёжный источник,
              инструктор — специалист.

              '
            uk: 'Разбор: А — логика, одно следует из другого: если авария, то без
              ремня опаснее. Б — факт, есть проверяемые данные. В — надёжный источник,
              инструктор — специалист.'
            en: 'Analysis: A - logic, one follows from the other: if there is an accident,
              then without a belt it is more dangerous. B - fact, there is verifiable
              data. B is a reliable source, the instructor is a specialist.'
        - id: '14'
          type: speech
          duration_sec: 12
          text:
            ru: 'Утверждение: «Нужно чистить зубы два раза в день.» А: «Стоматологи
              это рекомендуют.» Б: «Если не чистить, может появиться кариес.» В: «Исследования
              показывают рост кариеса при плохой гигиене.»

              '
            uk: 'Утверждение: «Нужно чистить зубы два раза в день.» А: «Стоматологи
              это рекомендуют.» Б: «Если не чистить, может появиться кариес.» В: «Исследования
              показывают рост кариеса при плохой гигиене.»'
            en: 'Statement: “You should brush your teeth twice a day.” A: “Dentists
              recommend this.” B: “If you don’t brush, caries may appear.” Q: “Studies
              show an increase in tooth decay with poor hygiene.”'
        - id: '15'
          type: discussion
          duration_sec: 25
          text:
            ru: 'Распределяйте: факт, логика, источник.

              '
            uk: 'Распределяйте: факт, логика, источник.'
            en: 'Distribute: fact, logic, source.'
        - id: '16'
          type: speech
          duration_sec: 13
          text:
            ru: 'А — источник, стоматологи — специалисты. Б — логика, причина ведёт
              к следствию. В — факт, ссылка на исследования, можно проверить.

              '
            uk: А — источник, стоматологи — специалисты. Б — логика, причина ведёт
              к следствию. В — факт, ссылка на исследования, можно проверить.
            en: A is the source, dentists are specialists. B - logic, cause leads
              to effect. B - fact, link to research, can be verified.
        - id: '17'
          type: speech
          duration_sec: 12
          text:
            ru: 'Утверждение: «Нельзя бегать по мокрому полу.» А: «Можно поскользнуться.»
              Б: «В правилах школы это написано.» В: «На мокром полу коэффициент трения
              ниже.»

              '
            uk: 'Утверждение: «Нельзя бегать по мокрому полу.» А: «Можно поскользнуться.»
              Б: «В правилах школы это написано.» В: «На мокром полу коэффициент трения
              ниже.»'
            en: 'Statement: “You can’t run on a wet floor.” A: “You could slip.” B:
              “It’s written in the school rules.” Q: “The coefficient of friction
              is lower on a wet floor.”'
        - id: '18'
          type: discussion
          duration_sec: 25
          text:
            ru: 'Где тут что?

              '
            uk: Где тут что?
            en: Where is what?
        - id: '19'
          type: speech
          duration_sec: 14
          text:
            ru: 'А — логика, мокро — значит скользко. Б — источник, школьные правила.
              В — факт, физическое свойство поверхности — можно измерить.

              '
            uk: А — логика, мокро — значит скользко. Б — источник, школьные правила.
              В — факт, физическое свойство поверхности — можно измерить.
            en: A - logic, wet means slippery. B - source, school rules. B is a fact,
              a physical property of a surface, that can be measured.
        - id: '20'
          type: speech
          duration_sec: 12
          text:
            ru: 'Утверждение: «Нужно делать домашнее задание.» А: «Учитель сказал,
              что это важно.» Б: «Если тренироваться, знания запоминаются лучше.»
              В: «Ученики, которые делают домашку, чаще получают высокие оценки.»

              '
            uk: 'Утверждение: «Нужно делать домашнее задание.» А: «Учитель сказал,
              что это важно.» Б: «Если тренироваться, знания запоминаются краще.»
              В: «Ученики, которые делают домашку, чаще получают высокие оценки.»'
            en: 'Statement: “You need to do your homework.” A: “The teacher said it
              was important.” B: “If you practice, knowledge is remembered better.”
              Q: “Students who do their homework are more likely to get high grades.”'
        - id: '21'
          type: discussion
          duration_sec: 25
          text:
            ru: 'Распределяйте!

              '
            uk: Распределяйте!
            en: Distribute!
        - id: '22'
          type: speech
          duration_sec: 13
          text:
            ru: 'А — источник, учитель — специалист в обучении. Б — логика, тренировка
              ведёт к результату. В — факт, можно проверить статистикой.

              '
            uk: А — источник, учитель — специалист в обучении. Б — логика, тренировка
              ведёт к результату. В — факт, можно проверить статистикой.
            en: A - source, teacher - specialist in teaching. B - logic, training
              leads to results. B is a fact that can be verified by statistics.
        - id: '23'
          type: speech
          duration_sec: 12
          text:
            ru: 'Утверждение: «Нужно надевать шапку зимой.» А: «Потому что холодно.»
              Б: «При низкой температуре тело теряет тепло быстрее.» В: «Врач сказал,
              что переохлаждение вредно.»

              '
            uk: 'Утверждение: «Нужно надевать шапку зимой.» А: «Потому что холодно.»
              Б: «При низкой температуре тело теряет тепло быстрее.» В: «Врач сказал,
              что переохлаждение вредно.»'
            en: 'Statement: “You need to wear a hat in winter.” A: “Because it’s cold.”
              B: “At low temperatures, the body loses heat faster.” Q: “The doctor
              said that hypothermia is harmful.”'
        - id: '24'
          type: discussion
          duration_sec: 25
          text:
            ru: 'Последний раунд — какой тип у каждого?

              '
            uk: Последний раунд — какой тип у каждого?
            en: Last round - what type is everyone?
        - id: '25'
          type: speech
          duration_sec: 14
          text:
            ru: 'А — логика, но слабая и неполная, просто «холодно» без объяснения
              механизма. Б — факт, физиология, можно измерить. В — источник, врач
              — специалист.

              '
            uk: А — логика, но слабая и неполная, просто «холодно» без объяснения
              механизма. Б — факт, физиология, можно измерить. В — источник, врач
              — специалист.
            en: A - logic, but weak and incomplete, just “cold” without explaining
              the mechanism. B - fact, physiology, can be measured. B is the source,
              the doctor is a specialist.
        - id: '26'
          type: speech
          duration_sec: 14
          text:
            ru: 'Заметили закономерность? Факт — можно проверить цифрами или измерить.
              Логика — одно объясняет другое. Источник — человек или книга, которым
              есть основания доверять. А сильное обоснование часто использует два
              или три типа сразу.

              '
            uk: Заметили закономерность? Факт — можно проверить цифрами или измерить.
              Логіка — одно объясняет другое. Джерело — человек или книга, которым
              есть основания доверять. А сильное обґрунтування часто использует два
              или три типа сразу.
            en: Notice a pattern? Fact - can be verified by numbers or measured. Logic
              - one thing explains another. A source is a person or book that you
              have reason to trust. And a strong rationale often uses two or three
              types at once.
    - scene_id: sc3
      title:
        ru: 'Практика: что это за обоснование?'
        uk: 'Практика: что это за обґрунтування?'
        en: 'Practice: what is the rationale?'
      media_ref: 7B.sc3.justification_single_choice
      status: v3_locked
      steps:
        - id: '27'
          type: speech
          duration_sec: 10
          text:
            ru: 'Теперь формат другой. Одно утверждение — одно обоснование. Голосуете:
              это факт, логика или надёжный источник?

              '
            uk: 'Теперь формат другой. Одно утверждение — одно обґрунтування. Голосуете:
              это факт, логика или надёжный источник?'
            en: 'Now the format is different. One statement - one justification. Vote:
              is this fact, logic or a reliable source?'
        - id: '28'
          type: vote
          duration_sec: 12
          text:
            ru: '«Лёд скользкий.» — «Потому что у него гладкая поверхность, и обувь
              хуже цепляется.»

              '
            uk: «Лёд скользкий.» — «Потому что у него гладкая поверхность, и обувь
              хуже цепляется.»
            en: '"Ice is slippery." - “Because it has a smooth surface, and shoes
              grip worse.”'
          options:
            - id: opt_1
              text:
                ru: Факт
                uk: Факт
                en: Fact
            - id: opt_2
              text:
                ru: Логика
                uk: Логіка
                en: Logic
            - id: opt_3
              text:
                ru: Источник
                uk: Джерело
                en: Source
          correct: opt_2
        - id: '29'
          type: speech
          duration_sec: 8
          text:
            ru: 'Логика! Мы объясняем причину: гладко — хуже сцепление — скользко.
              Цепочка рассуждений.

              '
            uk: 'Логіка! Мы объясняем причину: гладко — хуже сцепление — скользко.
              Цепочка рассуждений.'
            en: 'Logics! We explain the reason: smooth - worse grip - slippery. Chain
              of reasoning.'
        - id: '30'
          type: vote
          duration_sec: 12
          text:
            ru: '«В нашем городе живёт больше миллиона человек.» — «Так показаны данные
              последней переписи населения.»

              '
            uk: «В нашем городе живёт больше миллиона человек.» — «Так показаны данные
              последней переписи населения.»
            en: “More than a million people live in our city.” - “This is how the
              data from the latest population census is shown.”
          options:
            - id: opt_1
              text:
                ru: Факт
                uk: Факт
                en: Fact
            - id: opt_2
              text:
                ru: Логика
                uk: Логіка
                en: Logic
            - id: opt_3
              text:
                ru: Источник
                uk: Джерело
                en: Source
          correct: opt_1
        - id: '31'
          type: speech
          duration_sec: 8
          text:
            ru: 'Факт! Конкретные проверяемые данные — перепись можно найти и посмотреть.

              '
            uk: Факт! Конкретные проверяемые данные — перепись можно найти и посмотреть.
            en: Fact! Specific verifiable data - the census can be found and viewed.
        - id: '32'
          type: vote
          duration_sec: 12
          text:
            ru: '«Нужно пить больше воды.» — «Педиатр на приёме объяснил, что детям
              важно поддерживать водный баланс.»

              '
            uk: «Нужно пить больше воды.» — «Педиатр на приёме объяснил, что детям
              важно поддерживать водный баланс.»
            en: “You need to drink more water.” — “The pediatrician explained at the
              appointment that it is important for children to maintain water balance.”
