      steps:
        - id: '151'
          type: speech
          duration_sec: 16
          text:
            ru: 'Ребята, сегодня был мощный день. До перемены мы выучили второй закон
              Аристотеля — закон непротиворечия. Нельзя одновременно утверждать одно
              и противоположное. А после перемены — научились требовать обоснование
              и распознавать нападение на человека.

              '
            uk: Ребята, сегодня был мощный день. До перемены мы выучили второй закон
              Аристотеля — закон несуперечності. Нельзя одновременно утверждать одно
              и противоположное. А после перемены — научились требовать обґрунтування
              и распознавать напад на людину.
            en: Guys, today was a powerful day. Before the break, we learned Aristotle's
              second law - the law of non-contradiction. You cannot say one thing
              and the opposite at the same time. And after the change, we learned
              to demand justification and recognize an attack on a person.
        - id: '152'
          type: speech
          duration_sec: 14
          text:
            ru: 'Теперь у вас есть три суперсилы. Первая — замечать противоречия.
              Вторая — спрашивать «почему ты так думаешь?» и отличать факт, логику
              и источник. Третья — узнавать нападение на человека и защищаться в три
              шага.

              '
            uk: Теперь у вас есть три суперсилы. Первая — замечать суперечності. Вторая
              — спрашивать «почему ты так думаешь?» и отличать факт, логику и источник.
              Третья — узнавать напад на людину и защищаться в три шага.
            en: You now have three superpowers. The first is to notice contradictions.
              The second is to ask “why do you think that?” and distinguish between
              fact, logic and source. The third is to recognize an attack on a person
              and defend yourself in three steps.
