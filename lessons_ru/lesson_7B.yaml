    - scene_id: sc6
      title:
        ru: Защита от нападения — тренажёр
        uk: Защита от нападів — тренажёр
        en: Defense against attack - simulator
      media_ref: 7B.sc6.defense_training
      status: v3_locked
      steps:
        - id: '89'
          type: speech
          duration_sec: 22
          text:
            ru: 'Мы узнали три вида нападения. Теперь — самое важное: как защищаться.
              Три шага. Первый — назови приём: скажи вслух, что это нападение, а не
              ответ. Второй — вернись к теме: напомни, о чём был разговор. Третий
              — спроси прямо: «Что не так с моим аргументом?» Тренируем на трёх примерах
              — каждый шаг отдельно.

              '
            uk: 'Мы узнали три види нападів. Теперь — самое важное: как защищаться.
              Три шага. Первый — назови приём: скажи вслух, что это напад, а не ответ.
              Второй — вернись к теме: напомни, о чём был разговор. Третий — спроси
              прямо: «Что не так с моим аргументом?» Тренируем на трёх примерах —
              каждый шаг отдельно.'
            en: 'We learned three types of attack. Now - the most important thing:
              how to defend yourself. Three steps. First, name the technique: say
              out loud that this is an attack, not a response. Second, return to the
              topic: remind what the conversation was about. Third, ask directly:
              “What’s wrong with my argument?” We train using three examples - each
              step separately.'
        - id: '90'
          type: speech
          duration_sec: 12
          text:
            ru: 'Пример первый. Ваш аргумент: «Думаю, нам стоит помочь новенькому
              в классе.» Нападение: «Ты просто подлиза!»

              '
            uk: 'Пример первый. Ваш аргумент: «Думаю, нам стоит помочь новенькому
              в классе.» Нападение: «Ты просто подлиза!»'
            en: 'Example one. Your argument: “I think we should help the new kid in
              class.” Attack: “You’re just a suck-up!”'
        - id: '91'
          type: discussion
          duration_sec: 20
          text:
            ru: 'Шаг первый — назовите приём. Какой это вид нападения?

              '
            uk: Шаг первый — назовите приём. Какой это вид нападів?
            en: Step one - name the technique. What type of attack is this?
        - id: '92'
          type: speech
          duration_sec: 8
          text:
            ru: 'Прямое оскорбление! «Подлиза» — ярлык, а не аргумент.

              '
            uk: Прямое образа! «Подлиза» — ярлык, а не аргумент.
            en: Direct insult! “Suck-up” is a label, not an argument.
        - id: '93'
          type: discussion
          duration_sec: 20
          text:
            ru: 'Шаг второй — верните разговор к теме. Что скажете?

              '
            uk: Шаг второй — верните разговор к теме. Что скажете?
            en: Step two is to bring the conversation back to the topic. What do you
              say?
        - id: '94'
          type: speech
          duration_sec: 10
          text:
            ru: 'Например: «Мы говорили не обо мне, а о новеньком. Ему одиноко, и
              помощь — это нормально.»

              '
            uk: 'Например: «Мы говорили не обо мне, а о новеньком. Ему одиноко, и
              помощь — это нормально.»'
            en: 'For example: “We weren’t talking about me, but about the new guy.
              He''s lonely and it''s okay to get help."'
        - id: '95'
          type: discussion
          duration_sec: 20
          text:
            ru: 'Шаг третий — спросите прямо: что не так с аргументом?

              '
            uk: 'Шаг третий — спросите прямо: что не так с аргументом?'
            en: 'Step three - ask directly: what''s wrong with the argument?'
        - id: '96'
          type: speech
          duration_sec: 10
          text:
            ru: 'Например: «Объясни, почему новенькому не нужна помощь?» Три шага
              — и нападение разбито.

              '
            uk: 'Например: «Объясни, почему новенькому не нужна помощь?» Три шага
              — и напад разбито.'
            en: 'For example: “Explain why the new guy doesn’t need help?” Three steps
              and the attack is defeated.'
        - id: '97'
          type: speech
          duration_sec: 12
          text:
            ru: 'Пример второй. Ваш аргумент: «Нужно выключать телефон на уроке.»
              Нападение: «Ты сам постоянно сидишь в телефоне дома!»

              '
            uk: 'Пример второй. Ваш аргумент: «Нужно выключать телефон на уроке.»
              Нападение: «Ты сам постоянно сидишь в телефоне дома!»'
            en: 'Example two. Your argument: “You need to turn off your phone during
              class.” Attack: “You yourself are constantly on your phone at home!”'
        - id: '98'
          type: discussion
          duration_sec: 20
          text:
            ru: 'Шаг первый — какой приём?

              '
            uk: Шаг первый — какой приём?
            en: Step one - what technique?
        - id: '99'
          type: speech
          duration_sec: 8
          text:
            ru: '«Сам такой!» Вместо ответа — перевод стрелок на вас.

              '
            uk: «Сам такой!» Вместо ответа — перевод стрелок на вас.
            en: “That’s how I am!” Instead of an answer, the arrows are turned towards
              you.
        - id: '100'
          type: discussion
          duration_sec: 20
          text:
            ru: 'Шаг второй — вернитесь к теме.

              '
            uk: Шаг второй — вернитесь к теме.
            en: Step two is to return to the topic.
        - id: '101'
          type: speech
          duration_sec: 10
          text:
            ru: 'Например: «Мы говорим об уроках, а не о доме. На уроке телефон мешает
              всем.»

              '
            uk: 'Например: «Мы говорим об уроках, а не о доме. На уроке телефон мешает
              всем.»'
            en: 'For example: “We are talking about lessons, not about home. During
              class, the phone bothers everyone.”'
        - id: '102'
          type: discussion
          duration_sec: 20
          text:
            ru: 'Шаг третий — задайте прямой вопрос.

              '
            uk: Шаг третий — задайте прямой вопрос.
            en: Step three - ask a direct question.
        - id: '103'
          type: speech
          duration_sec: 10
          text:
            ru: 'Например: «Почему ты думаешь, что телефон на уроке — это нормально?»
              Снова три шага — и вы в теме.

              '
            uk: 'Например: «Почему ты думаешь, что телефон на уроке — это нормально?»
              Снова три шага — и вы в теме.'
            en: 'For example: “Why do you think it’s okay to have a phone in class?”
              Three steps again - and you''re in.'
        - id: '104'
          type: speech
          duration_sec: 12
          text:
            ru: 'Пример третий. Ваш аргумент: «Лучше есть овощи, чем чипсы.» Нападение:
              «Тебе девять лет, что ты понимаешь в питании!»

              '
            uk: 'Пример третий. Ваш аргумент: «Лучше есть овощи, чем чипсы.» Нападение:
              «Тебе девять лет, что ты понимаешь в питании!»'
            en: 'Example three. Your argument: “It’s better to eat vegetables than
              chips.” Attack: “You are nine years old, what do you understand about
              nutrition!”'
        - id: '105'
          type: discussion
          duration_sec: 20
          text:
            ru: 'Шаг первый — называем приём.

              '
            uk: Шаг первый — называем приём.
            en: Step one - we call it a reception.
        - id: '106'
          type: speech
          duration_sec: 10
          text:
            ru: 'Указание на обстоятельства! Возраст — это не аргумент против овощей.

              '
            uk: Указание на обставини! Возраст — это не аргумент против овощей.
            en: Indication of circumstances! Age is not an argument against vegetables.
        - id: '107'
          type: discussion
          duration_sec: 20
          text:
            ru: 'Шаг второй — возврат к теме.

              '
            uk: Шаг второй — возврат к теме.
            en: Step two is returning to the topic.
        - id: '108'
          type: speech
          duration_sec: 12
          text:
            ru: 'Например: «Мой возраст не меняет того, что овощи полезнее чипсов.
              Давай обсудим саму еду.»

              '
            uk: 'Например: «Мой возраст не меняет того, что овощи полезнее чипсов.
              Таквай обсудим саму еду.»'
            en: 'For example: “My age does not change the fact that vegetables are
              healthier than chips. Let''s discuss the food itself."'
        - id: '109'
          type: discussion
          duration_sec: 20
          text:
            ru: 'Шаг третий — прямой вопрос.

              '
            uk: Шаг третий — прямой вопрос.
            en: Step three is a direct question.
        - id: '110'
          type: speech
          duration_sec: 10
          text:
            ru: 'Например: «Можешь объяснить, чем чипсы полезнее овощей?» Спойлер:
              не может.

              '
            uk: 'Например: «Можешь объяснить, чем чипсы полезнее овощей?» Спойлер:
              не может.'
            en: 'For example: “Can you explain why chips are healthier than vegetables?”
              Spoiler: it can''t.'
        - id: '111'
          type: speech
          duration_sec: 14
          text:
            ru: 'Три примера — три вида — один рецепт. Назови приём, вернись к теме,
              спроси «что не так с аргументом?» Запомните эти три шага — и вас не
              собьёт никакое нападение.

              '
            uk: Три примера — три види — один рецепт. Назови приём, вернись к теме,
              спроси «что не так с аргументом?» Запомните эти три шага — и вас не
              собьёт никакое напад.
            en: Three examples - three types - one recipe. Name the technique, return
              to the topic, ask “what’s wrong with the argument?” Remember these three
              steps - and no attack will bring you down.
    - scene_id: sc7
      title:
        ru: Практика — повторение 7A (противоречия)
        uk: Практика — повторение 7A (суперечності)
        en: Practice - Review 7A (Contradictions)
      media_ref: 7B.sc7.practice_7A
      status: v3_locked
      steps:
        - id: '112'
          type: speech
          duration_sec: 14
          text:
            ru: 'Сейчас — большая практика за весь день. Начнём с того, что учили
              до перемены. Закон непротиворечия: нельзя одновременно утверждать одно
              и противоположное. Пять историй — ищем противоречие и тренируем вежливое
              напоминание.

              '
            uk: 'Сейчас — большая практика за весь день. Начнём с того, что учили
              до перемены. Закон несуперечності: нельзя одновременно утверждать одно
              и противоположное. Пять историй — ищем суперечність и тренируем вежливое
              напоминание.'
            en: 'Now - a lot of practice for the whole day. Let''s start with what
              we taught before the break. Law of non-contradiction: you cannot say
              one thing and the opposite at the same time. Five stories - looking
              for a contradiction and training a polite reminder.'
        - id: '113'
          type: speech
          duration_sec: 12
          text:
            ru: 'История первая. Катя говорит: «Я всегда держу обещания. Можете на
              меня положиться!» А через час: «Ну да, я обещала помочь, но мне лень.
              Подумаешь, всего одно обещание.»

              '
            uk: 'Історія первая. Катя говорит: «Я всегда держу обещания. Можете на
              меня положиться!» А через час: «Ну да, я обещала помочь, но мне лень.
              Подумаешь, всего одно обещание.»'
            en: 'Story one. Katya says: “I always keep my promises. You can rely on
              me!” And an hour later: “Well, yes, I promised to help, but I’m too
              lazy. Just think, just one promise.”'
        - id: '114'
          type: vote
          duration_sec: 12
          text:
            ru: 'Есть ли противоречие в словах Кати?

              '
            uk: Есть ли суперечність в словах Кати?
            en: Is there a contradiction in Katya's words?
          options:
            - id: opt_1
              text:
                ru: Да, противоречие
                uk: Так, суперечність
                en: Yes, contradiction
            - id: opt_2
              text:
                ru: Нет, всё логично
                uk: Ні, все логічно
                en: No, it's logical
          correct: opt_1
        - id: '115'
          type: speech
          duration_sec: 10
          text:
            ru: 'Есть! «Всегда держу обещания» и «подумаешь, одно обещание» — одно
              исключает другое. Либо всегда, либо не всегда.

              '
            uk: Есть! «Всегда держу обещания» и «подумаешь, одно обещание» — одно
              исключает другое. Либо всегда, либо не всегда.
            en: Eat! “I always keep my promises” and “just think, one promise” - one
              excludes the other. Either always or not always.
        - id: '116'
          type: discussion
          duration_sec: 20
          text:
            ru: 'Как вежливо напомнить Кате о противоречии?

              '
            uk: Как вежливо напомнить Кате о противоречии?
            en: How to politely remind Katya about the contradiction?
        - id: '117'
          type: speech
          duration_sec: 10
          text:
            ru: 'Например: «Катя, ты говорила, что всегда держишь обещания. Это значит
              — и сегодня тоже, нет?»

              '
            uk: 'Например: «Катя, ты говорила, что всегда держишь обещания. Это значит
              — и сегодня тоже, нет?»'
            en: 'For example: “Katya, you said that you always keep your promises.
              That means today too, no?”'
        - id: '118'
          type: speech
          duration_sec: 12
          text:
            ru: 'История вторая. Тренер: «В нашей команде все равны, у нас нет любимчиков!»
              А потом: «Микола, тебе не нужно бегать кросс, ты и так молодец.»

              '
            uk: 'Історія вторая. Тренер: «В нашей команде все равны, у нас нет любимчиков!»
              А потом: «Микола, тебе не нужно бегать кросс, ты и так молодец.»'
            en: 'The second story. Coach: “Everyone on our team is equal, we don’t
              have favorites!” And then: “Mikola, you don’t need to run cross-country,
              you’re already doing great.”'
        - id: '119'
          type: vote
          duration_sec: 12
          text:
            ru: 'Есть ли противоречие?

              '
            uk: Есть ли суперечність?
            en: Is there a contradiction?
          options:
            - id: opt_1
              text:
                ru: Да, противоречие
                uk: Так, суперечність
                en: Yes, contradiction
            - id: opt_2
              text:
                ru: Нет, всё логично
                uk: Ні, все логічно
                en: No, it's logical
          correct: opt_1
        - id: '120'
          type: speech
          duration_sec: 10
          text:
            ru: 'Конечно! Если все равны — правила одинаковые для всех. Освобождение
              Миколы от кросса — это и есть любимчик.

              '
            uk: Конечно! Если все равны — правила одинаковые для всех. Освобождение
              Миколы от кросса — это и есть любимчик.
            en: Certainly! If everyone is equal, the rules are the same for everyone.
              Mikola's release from cross-country is a favorite.
        - id: '121'
          type: discussion
          duration_sec: 20
          text:
            ru: 'Как вежливо указать тренеру на противоречие?

              '
            uk: Как вежливо указать тренеру на суперечність?
            en: How to politely point out a contradiction to a coach?
        - id: '122'
          type: speech
          duration_sec: 10
          text:
            ru: 'Например: «Вы говорили, что все равны. Значит, кросс — для всех или
              не для всех?» Спокойно и по делу.

              '
            uk: 'Например: «Вы говорили, что все равны. Значит, кросс — для всех или
              не для всех?» Спокойно и по делу.'
            en: 'For example: “You said that everyone is equal. So, is cross-country
              for everyone or not for everyone? Calm and to the point.'
        - id: '123'
          type: speech
          duration_sec: 12
          text:
            ru: 'История третья. Бабушка: «Я никогда не балую внуков. Дисциплина —
              это главное!» Через пять минут: «На вот, возьми ещё конфету, только
              маме не говори.»

              '
            uk: 'Історія третья. Бабушка: «Я никогда не балую внуков. Дисциплина —
              это главное!» Через пять минут: «На вот, возьми ещё конфету, только
              маме не говори.»'
            en: 'Story three. Grandmother: “I never spoil my grandchildren. Discipline
              is the main thing!” Five minutes later: “Here, take some more candy,
              but don’t tell mom.”'
        - id: '124'
          type: vote
          duration_sec: 12
          text:
            ru: 'Есть ли противоречие?

              '
            uk: Есть ли суперечність?
            en: Is there a contradiction?
          options:
            - id: opt_1
              text:
                ru: Да, противоречие
                uk: Так, суперечність
                en: Yes, contradiction
            - id: opt_2
              text:
                ru: Нет, всё логично
                uk: Ні, все логічно
                en: No, it's logical
          correct: opt_1
        - id: '125'
          type: speech
          duration_sec: 10
          text:
            ru: 'Тайная конфета «только маме не говори» — это классический пример
              того самого баловства. Бабушка сама нарушила своё же правило.

              '
            uk: Тайная конфета «только маме не говори» — это классический пример того
              самого баловства. Бабушка сама нарушила своё же правило.
            en: The secret candy “just don’t tell your mom” is a classic example of
              that same pampering. Grandma herself broke her own rule.
        - id: '126'
          type: speech
          duration_sec: 14
          text:
            ru: 'История четвёртая. Вася: «Я за здоровое питание! Фаст-фуд — это зло!»
              На следующий день Вася ест бургер. Друг спрашивает. Вася: «Это же раз
              в месяц, не считается.»

              '
            uk: 'Історія четвёртая. Вася: «Я за здоровое питание! Фаст-фуд — это зло!»
              На следующий день Вася ест бургер. Друг спрашивает. Вася: «Это же раз
              в месяц, не считается.»'
            en: 'Story four. Vasya: “I am for healthy eating! Fast food is evil! The
              next day Vasya eats a burger. A friend asks. Vasya: “That’s once a month,
              it doesn’t count.”'
        - id: '127'
          type: vote
          duration_sec: 12
          text:
            ru: 'Есть ли противоречие в словах Васи?

              '
            uk: Есть ли суперечність в словах Васи?
            en: Is there a contradiction in Vasya’s words?
          options:
            - id: opt_1
              text:
                ru: Да, противоречие
                uk: Так, суперечність
                en: Yes, contradiction
            - id: opt_2
              text:
                ru: Нет, всё логично
                uk: Ні, все логічно
                en: No, it's logical
            - id: opt_3
              text:
                ru: Неоднозначно
                uk: Неоднозначно
                en: Ambiguous
          correct: opt_3
        - id: '128'
          type: speech
          duration_sec: 12
          text:
            ru: 'Хитрый случай! «За здоровое питание» не обязательно значит «никогда
              в жизни ни одного бургера». Вася мог иметь в виду «в основном». Тут
              нужно уточнить — а не ловить на слове.

              '
            uk: Хитрый случай! «За здоровое питание» не обязательно значит «никогда
              в жизни ни одного бургера». Вася мог иметь в виду «в основном». Тут
              нужно уточнить — а не ловить на слове.
            en: Tricky case! “For healthy eating” does not necessarily mean “never
              eat a burger in your life.” Vasya could mean “mostly.” Here you need
              to clarify - and not take them at their word.
        - id: '129'
          type: speech
          duration_sec: 12
          text:
            ru: 'История пятая. Максим: «Списывать — нечестно. Я никогда не списываю.»
              Позже: «Дай быстро посмотреть ответ на третью задачу — я не списываю,
              я просто проверяю.»

              '
            uk: 'Історія пятая. Максим: «Списывать — нечестно. Я никогда не списываю.»
              Позже: «Такй быстро посмотреть ответ на третью задачу — я не списываю,
              я просто проверяю.»'
            en: 'Story five. Maxim: “Copying off is dishonest. I never cheat." Later:
              “Let me quickly see the answer to the third problem - I’m not cheating,
              I’m just checking.”'
        - id: '130'
          type: vote
          duration_sec: 12
          text:
            ru: 'Есть ли противоречие?

              '
            uk: Есть ли суперечність?
            en: Is there a contradiction?
          options:
            - id: opt_1
              text:
                ru: Да, противоречие
                uk: Так, суперечність
                en: Yes, contradiction
            - id: opt_2
              text:
                ru: Нет, всё логично
                uk: Ні, все логічно
                en: No, it's logical
          correct: opt_1
        - id: '131'
          type: speech
          duration_sec: 10
          text:
            ru: '«Просто проверяю» — это переименованное списывание. Действие то же,
              название другое. Закон непротиворечия не обманешь словами.

              '
            uk: «Просто проверяю» — это переименованное списывание. Действие то же,
              название другое. Закон несуперечності не обманешь словами.
            en: “Just checking” is a renamed cheating. Same action, different name.
              The law of non-contradiction cannot be deceived by words.
        - id: '132'
          type: discussion
          duration_sec: 20
          text:
            ru: 'Как вежливо сказать Максиму?

              '
            uk: Как вежливо сказать Максиму?
            en: How to politely tell Maxim?
        - id: '133'
          type: speech
          duration_sec: 10
          text:
            ru: 'Например: «Макс, если ты смотришь чужой ответ до того, как решил
              сам — чем это отличается от списывания?» Вопрос — сильнее обвинения.

              '
            uk: 'Например: «Макс, если ты смотришь чужой ответ до того, как решил
              сам — чем это отличается от списывания?» Вопрос — сильнее обвинения.'
            en: 'For example: “Max, if you look at someone else’s answer before you
              decide for yourself, how is that different from cheating?” A question
              is stronger than an accusation.'
    - scene_id: sc8
      title:
        ru: Практика — повторение 7B (обоснование + нападение)
        uk: Практика — повторение 7B (обґрунтування + напад)
        en: Practice - Review 7B (Rationale + Attack)
      media_ref: 7B.sc8.practice_7B
      status: v3_locked
      steps:
        - id: '134'
          type: speech
          duration_sec: 14
          text:
            ru: 'Теперь — вторая половина дня. Обоснование и нападение на человека.
              Пять диалогов. В каждом кто-то отвечает на аргумент. Ваша задача — определить:
              это хорошее обоснование или нападение на человека?

              '
            uk: 'Теперь — вторая половина дня. Обоснование и напад на людину. Пять
              диалогов. В каждом кто-то отвечает на аргумент. Ваша задача — определить:
              это хорошее обґрунтування или напад на людину?'
            en: 'Now it’s the second half of the day. Justification and attack on
              a person. Five dialogues. In each, someone responds to an argument.
              Your job is to determine: is this a good rationale or an attack on a
              person?'
        - id: '135'
          type: speech
          duration_sec: 14
          text:
            ru: 'Диалог первый. Лена: «Нужно спать не меньше девяти часов.» Тарас:
              «Врачи из детской больницы говорят, что детям 9–12 лет нужно 9–11 часов
              сна. Ты права.»

              '
            uk: 'Диалог первый. Лена: «Нужно спать не меньше девяти часов.» Тарас:
              «Врачи из детской больницы говорят, что детям 9–12 лет нужно 9–11 часов
              сна. Ты права.»'
            en: 'Dialogue one. Lena: “You need to sleep at least nine hours.” Taras:
              “Doctors from the children’s hospital say that children 9–12 years old
              need 9–11 hours of sleep. You''re right."'
        - id: '136'
          type: vote
          duration_sec: 12
          text:
            ru: 'Что использовал Тарас?

              '
            uk: Что использовал Тарас?
            en: What did Taras use?
          options:
            - id: opt_1
              text:
                ru: Обоснование — факт
                uk: Обоснование — факт
                en: Justification - fact
            - id: opt_2
              text:
                ru: Обоснование — источник
                uk: Обоснование — источник
                en: Rationale - source
            - id: opt_3
              text:
                ru: Нападение на человека
                uk: Нападение на людину
                en: Assault on a person
          correct: opt_2
        - id: '137'
          type: speech
          duration_sec: 10
          text:
            ru: 'Источник! Тарас сослался на врачей — специалистов по детскому здоровью.
              Это сильное обоснование, не нападение.

              '
            uk: Джерело! Тарас сослался на врачей — специалистов по детскому здоровью.
              Это сильное обґрунтування, не напад.
            en: Source! Taras referred to doctors who specialize in child health.
              This is a strong rationale, not an attack.
        - id: '138'
          type: speech
          duration_sec: 14
          text:
            ru: 'Диалог второй. Олег: «Лучше делать домашку сразу после школы.» Марина:
              «Ты сам вчера делал уроки в десять вечера, какое право ты имеешь советовать!»

              '
            uk: 'Диалог второй. Олег: «Лучше делать домашку сразу после школы.» Марина:
              «Ты сам вчера делал уроки в десять вечера, какое право ты имеешь советовать!»'
            en: 'Dialogue two. Oleg: “It’s better to do your homework right after
              school.” Marina: “Yesterday you did your homework at ten in the evening,
              what right do you have to advise!”'
        - id: '139'
          type: vote
          duration_sec: 12
          text:
            ru: 'Что использовала Марина?

              '
            uk: Что использовала Марина?
            en: What did Marina use?
          options:
            - id: opt_1
              text:
                ru: Обоснование
                uk: Обоснование
                en: Rationale
            - id: opt_2
              text:
                ru: Оскорбление
                uk: Оскорбление
                en: Insult
            - id: opt_3
              text:
                ru: Обстоятельства
                uk: Обстоятельства
                en: Circumstances
            - id: opt_4
              text:
                ru: «Сам такой»
                uk: «Сам такой»
                en: "\"I'm like that myself\""
          correct: opt_4
        - id: '140'
          type: speech
          duration_sec: 10
          text:
            ru: '«Сам такой!» Марина перевела стрелки на Олега вместо обсуждения,
              когда лучше делать домашку. Совет Олега может быть правильным, даже
              если сам он вчера его не выполнил.

