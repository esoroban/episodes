            en: Petit's assessments do not make his advice wrong. The “easy first”
              strategy works for everyone - this is logic, not the opinion of a C
              student.
        - id: '73'
          type: speech
          duration_sec: 10
          text:
            ru: 'Заметили? Обстоятельства — это более хитрый приём, чем оскорбление.
              Он не обзывает, а как бы «дисквалифицирует» человека. Но правильность
