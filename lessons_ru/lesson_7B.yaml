              '
            uk: 'Второй пример. Оля: «Мне кажется, нужно больше читать.» Зина: «Ты
              живёшь в другом районе, откуда тебе знать наши проблемы!»'
            en: 'Second example. Olya: “I think I need to read more.” Zina: “You live
              in another area, how do you know our problems!”'
        - id: '70'
          type: speech
          duration_sec: 8
          text:
            ru: 'Район проживания и польза чтения — вещи из разных вселенных. Но звучит
              убедительно, правда? В этом и хитрость.

              '
            uk: Район проживания и польза чтения — вещи из разных вселенных. Но звучит
              убедительно, правда? В этом и хитрость.
            en: The area where you live and the benefits of reading are things from
              different universes. But it sounds convincing, right? This is the trick.
        - id: '71'
          type: speech
          duration_sec: 10
          text:
            ru: 'Третий. Петя: «На контрольной лучше сначала делать лёгкие задания.»
              Даша: «Ты же троечник, какие советы ты можешь давать?»

              '
            uk: 'Третий. Петя: «На контрольной краще сначала делать лёгкие задания.»
              Такша: «Ты же троечник, какие советы ты можешь давать?»'
            en: 'Third. Petya: “On a test, it’s better to do the easy tasks first.”
              Dasha: “You’re a C student, what advice can you give?”'
        - id: '72'
          type: speech
          duration_sec: 10
          text:
            ru: 'Оценки Пети не делают его совет неправильным. Стратегия «сначала
