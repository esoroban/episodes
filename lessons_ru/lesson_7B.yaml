    - scene_id: sc4
      title:
        ru: ИСТОРИЯ — СПОР О НОВОЙ ИГРЕ
        uk: ИСТОРИЯ — СПОР О НОВОЙ ИГРЕ
        en: HISTORY - DISPUTE ABOUT A NEW GAME
      media_ref: 7B.sc4.story_argument
      status: v3_locked
      steps:
        - id: '49'
          type: speech
          duration_sec: 12
          text:
            ru: Вы теперь знаете, что каждое утверждение должно быть обоснованным.
              Факт, логика или надёжный источник. Но что делают люди, когда у них
              нет хорошего обоснования? Послушайте историю!
            uk: Вы теперь знаете, что каждое утверждение должно быть обоснованным.
              Факт, логика или надёжный источник. Но что делают люди, когда у них
              нет хорошего обоснования? Послушайте историю!
            en: You now know that every statement must be substantiated. Fact, logic
              or reliable source. But what do people do when they don't have a good
              rationale? Listen to the story!
        - id: '50'
          type: speech
          duration_sec: 14
          text:
            ru: 'На перемене Дмитрик предложил: «Давайте играть в футбол!» А Маша
              возразила: «Лучше в бадминтон — в футбол мы играли три дня подряд!»'
            uk: 'На перемене Дмитрик предложил: «Таквайте играть в футбол!» А Маша
              возразила: «Лучше в бадминтон — в футбол мы играли три дня подряд!»'
            en: 'At recess, Dmitry suggested: “Let''s play football!” And Masha objected:
              “It’s better to play badminton - we played football for three days in
              a row!”'
        - id: '51'
          type: speech
          duration_sec: 14
          text:
            ru: 'Дмитрик не стал объяснять, чем футбол лучше. Вместо этого он выпалил:
              «Ты просто плохо играешь в футбол, вот и не хочешь!» Маша обиделась:
              «А ты в бадминтон вообще ракетку держать не умеешь!»'
            uk: 'Дмитрик не стал объяснять, чем футбол краще. Вместо этого он выпалил:
              «Ты просто плохо играешь в футбол, вот и не хочешь!» Маша обиделась:
              «А ты в бадминтон вообще ракетку держать не умеешь!»'
            en: 'Dmitry did not explain why football is better. Instead, he blurted
              out: “You’re just bad at playing football, that’s why you don’t want
              to!” Masha was offended: “You don’t even know how to hold a badminton
              racket!”'
        - id: '52'
          type: speech
          duration_sec: 14
          text:
            ru: 'Тут Микола добавил: «Маша, ты же девочка — что ты понимаешь в спорте?»
              А Оленка остановила всех: «Стоп! Вы уже пять минут спорите, но ни слова
              не сказали про сами игры!»'
            uk: 'Тут Микола добавил: «Маша, ты же девочка — что ты понимаешь в спорте?»
              А Оленка остановила всех: «Стоп! Вы уже пять минут спорите, но ни слова
              не сказали про сами игры!»'
            en: 'Then Mikola added: “Masha, you’re a girl - what do you understand
              about sports?” And Olenka stopped everyone: “Stop! You’ve been arguing
              for five minutes now, but you haven’t said a word about the games themselves!”'
        - id: '53'
          type: discussion
          duration_sec: 25
          text:
            ru: 'Что произошло в истории? Как дети спорили о выборе игры?

              '
            uk: Что произошло в истории? Как дети спорили о выборе игры?
            en: What happened in history? How did the children argue about the choice
              of game?
        - id: '54'
          type: discussion
          duration_sec: 25
          text:
            ru: 'Кто-нибудь заметил — дети обсуждали сами игры или что-то другое?

              '
            uk: Кто-нибудь заметил — дети обсуждали сами игры или что-то другое?
            en: Did anyone notice whether the children were discussing the games themselves
              or something else?
        - id: '55'
          type: speech
          duration_sec: 14
          text:
            ru: 'Вот что случилось: вместо того чтобы обсуждать игры — их плюсы и
              минусы — дети начали нападать друг на друга. Не на аргумент, а на человека.
              Это очень распространённый приём нечестного спора.

              '
            uk: 'Вот что случилось: вместо того чтобы обсуждать игры — их плюсы и
              минусы — дети начали нападать друг на друга. Не на аргумент, а на людину.
              Это очень распространённый приём нечестного спора.'
            en: 'Here''s what happened: instead of discussing the games - their pros
              and cons - the children began to attack each other. Not on the argument,
              but on the person. This is a very common method of dishonest argument.'
        - id: '56'
          type: speech
          duration_sec: 12
          text:
            ru: 'Когда у человека нет хорошего обоснования — факта, логики или источника
              — он иногда переключается на самого человека. «Ты маленький!», «Ты глупый!»,
              «На себя посмотри!» Это называется нападение на человека.

              '
            uk: Когда у людину нет хорошего обоснования — факта, логики или источника
              — он иногда переключается на самого людину. «Ты маленький!», «Ты глупый!»,
              «На себя посмотри!» Это называется напад на людину.
            en: When a person doesn't have a good rationale - fact, logic, or source
              - it sometimes turns to the person themselves. “You’re small!”, “You’re
              stupid!”, “Look at yourself!” This is called an attack on a person.
        - id: '57'
          type: speech
          duration_sec: 14
          text:
            ru: 'И вот почему это важно: нападение на человека — это не ответ на аргумент.
              Идея может быть правильной, кто бы её ни сказал! Если маленький ребёнок
              скажет «огонь горячий» — это правда. Если профессор скажет «огонь холодный»
              — это неправда. Возраст и звание не делают идею правильной.

              '
            uk: 'И вот почему это важно: напад на людину — это не ответ на аргумент.
              Идея может быть правильной, кто бы её ни сказал! Если маленький ребёнок
              скажет «огонь горячий» — это правда. Если профессор скажет «огонь холодный»
              — это неправда. Возраст и звание не делают идею правильной.'
            en: 'And here''s why this is important: attacking a person is not a response
              to an argument. The idea may be right, no matter who says it! If a small
              child says “the fire is hot,” it’s true. If a professor says “the fire
              is cold,” it’s not true. Age and rank do not make an idea right.'
    - scene_id: sc5
      title:
        ru: Три вида нападения + практика
        uk: Три вида нападів + практика
        en: Three types of attack + practice
      media_ref: 7B.sc5.ad_hominem_types
      status: v3_locked
      steps:
        - id: '58'
          type: speech
          duration_sec: 14
          text:
            ru: 'Нападение на человека бывает трёх видов. Разберём каждый — с примерами,
              чтобы вы узнавали их моментально.

              '
            uk: Нападение на людину бывает трёх видов. Разберём каждый — с примерами,
              чтобы вы узнавали их моментально.
            en: There are three types of attacks on a person. Let's look at each one
              with examples so you can recognize them instantly.
        - id: '59'
          type: speech
          duration_sec: 10
          text:
            ru: 'Вид первый — прямое оскорбление. Человек не отвечает на аргумент,
              а просто обзывается. Давайте послушаем, как это звучит.

              '
            uk: Вид первый — прямое образа. Человек не отвечает на аргумент, а просто
              обзывается. Таквайте послушаем, как это звучит.
            en: The first type is a direct insult. The person does not respond to
              the argument, but simply calls him names. Let's hear how it sounds.
        - id: '60'
          type: speech
          duration_sec: 10
          text:
            ru: 'Маша говорит: «Думаю, нам нужно больше времени на перемене — детям
              важно отдыхать.» Микола отвечает: «Ты просто ленивая и не хочешь учиться!»

              '
            uk: 'Маша говорит: «Думаю, нам нужно больше времени на перемене — детям
              важно отдыхать.» Микола отвечает: «Ты просто ленивая и не хочешь учиться!»'
            en: 'Masha says: “I think we need more time during recess - it’s important
              for children to rest.” Mikola replies: “You’re just lazy and don’t want
              to learn!”'
        - id: '61'
          type: speech
          duration_sec: 10
          text:
            ru: 'Заметили? Микола ни слова не сказал про перемену. Не объяснил, почему
              отдых не нужен. Просто назвал Машу ленивой.

              '
            uk: Заметили? Микола ни слова не сказал про перемену. Не объяснил, почему
              отдых не нужен. Просто назвал Машу ленивой.
            en: Did you notice? Mikola didn’t say a word about the change. Didn't
              explain why rest was not needed. I just called Masha lazy.
        - id: '62'
          type: speech
          duration_sec: 10
          text:
            ru: 'Ещё пример. Анна: «Домашнее задание лучше делать сразу после школы.»
              Богдан: «Ты просто зубрилка!»

              '
            uk: 'Ещё пример. Анна: «Домашнее задание краще делать сразу после школы.»
              Богдан: «Ты просто зубрилка!»'
            en: 'Another example. Anna: “It’s better to do your homework right after
              school.” Bogdan: “You’re just a crammer!”'
        - id: '63'
          type: speech
          duration_sec: 8
          text:
            ru: 'Опять — вместо обсуждения идеи Богдан навесил ярлык. Аргумент Анны
              никуда не делся, но разговор уже не о домашке, а о том, зубрилка она
              или нет.

              '
            uk: Опять — вместо обсуждения идеи Богдан навесил ярлык. Аргумент Анны
              никуда не делся, но разговор уже не о домашке, а о том, зубрилка она
              или нет.
            en: Again, instead of discussing the idea, Bogdan applied a label. Anna’s
              argument hasn’t gone away, but the conversation is no longer about homework,
              but about whether she’s a crammer or not.
        - id: '64'
          type: speech
          duration_sec: 10
          text:
            ru: 'И третий. Женя: «Думаю, стоит убирать за собой в столовой.» Кирилл:
              «Ты вообще зануда, с тобой скучно разговаривать!»

              '
            uk: 'И третий. Женя: «Думаю, стоит убирать за собой в столовой.» Кирилл:
              «Ты вообще зануда, с тобой скучно разговаривать!»'
            en: 'And the third. Zhenya: “I think you should clean up after yourself
              in the dining room.” Kirill: “You’re generally boring, it’s boring to
              talk to you!”'
        - id: '65'
          type: speech
          duration_sec: 10
          text:
            ru: 'Видите паттерн? Оскорбление всегда уводит от темы. Вместо «почему
              ты не прав» — «какой ты плохой». Это не аргумент. Это капитуляция, замаскированная
              под атаку.

              '
            uk: Видите паттерн? Оскорбление всегда уводит от темы. Вместо «почему
              ты не прав» — «какой ты плохой». Это не аргумент. Это капитуляция, замаскированная
              под атаку.
            en: See the pattern? Insults always lead away from the topic. Instead
              of “why are you wrong” - “how bad you are.” This is not an argument.
              This is surrender disguised as an attack.
        - id: '66'
          type: speech
          duration_sec: 10
          text:
            ru: 'Вид второй — указание на обстоятельства. Тут не обзывают, но говорят,
              что ты не можешь быть прав из-за возраста, пола, места или чего-то ещё.

              '
            uk: Вид второй — указание на обставини. Тут не обзывают, но говорят, что
              ты не можешь быть прав из-за возраста, пола, места или чего-то ещё.
            en: The second type is an indication of circumstances. There's no name-calling
              here, but they're saying that you can't be right because of your age,
              gender, location, or anything else.
        - id: '67'
          type: speech
          duration_sec: 10
          text:
            ru: 'Василь: «Нужно выключать свет, когда выходишь.» Григорий: «Тебе всего
              девять лет, что ты понимаешь в экономии!»

              '
            uk: 'Василь: «Нужно выключать свет, когда выходишь.» Григорий: «Тебе всего
              девять лет, что ты понимаешь в экономии!»'
            en: 'Vasil: “You need to turn off the lights when you go out.” Grigory:
              “You are only nine years old, what do you understand about saving!”'
        - id: '68'
          type: speech
          duration_sec: 10
          text:
            ru: 'Возраст Василя не имеет никакого отношения к тому, нужно ли выключать
