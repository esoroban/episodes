            ru: '«А кстати, мам, ты видела, какую оценку я сегодня получил? Давай
              лучше про это!» — Комната так и стоит грязная, зато оценка — в центре
              внимания.

              '
            uk: Чесний аргумент
            en: “By the way, mom, did you see what grade I got today? Let’s talk about
              it better!” — The room is still dirty, but the grade is in the spotlight.
        - id: '75'
          type: discussion
          duration_sec: 25
          text:
            ru: 'Ты хочешь, чтобы на физре играли в футбол, а не в баскетбол. Тип:
              поспешное обобщение. — Подсказка: говори за всех, не спрашивая.

              '
            uk: Демагогія — підмена понять! «Самостійно» підмінили на «роблю що хочу».
            en: Demagoguery - substituting concepts! 'Independently' replaced with
              'I do what I want.'
        - id: '76'
          type: speech
          duration_sec: 10
          text:
            ru: '«ВСЕ хотят футбол! НИКТО не любит баскетбол!» — Опрос не проводили,
              но звучит как результат референдума.

              '
            uk: «Я з'їв бабусин пиріг — й контрольну написав на відмінно. Пиріг чарівний!»
            en: '"I ate grandma''s pie - and got an A on the test. The pie is magical!"'
        - id: '77'
          type: discussion
          duration_sec: 25
          text:
            ru: 'В кружке робототехники Аня предложила другую конструкцию, а ты хочешь
              свою. Тип: нападка. — Подсказка: бей по Ане, не по конструкции.

              '
            uk: 'У гуртку робототехніки Аня запропонувала іншу конструкцію, а ти хочеш
              свою. Тип: напад. — Підказка: удаж по Ані, а не по конструкції.'
            en: 'In robotics club, Anya suggested a different design, but you want
              yours. Type: attack. — Hint: hit Anya, not her design.'
        - id: '78'
          type: speech
          duration_sec: 10
          text:
            ru: '«Аня, ты же только месяц в кружке — какие у тебя могут быть идеи?»
              — Конструкцию не обсудили. Зато стаж посчитали.

              '
            uk: Чесний аргумент
            en: “Anya, you’ve only been in the circle for a month—what ideas might
              you have?” — The design was not discussed. But they counted the experience.
        - id: '79'
          type: discussion
          duration_sec: 25
          text:
            ru: 'Ты хочешь отмечать день рождения в кафе, а друг предлагает парк.
              Тип: пугало. — Подсказка: преврати «в парке» во что-то ужасное.

              '
            uk: Демагогія — хибна причина! Пиріг смачний, але оцінки — від підготовки,
              а не від начинки.
            en: Demagoguery - false cause! Pie is tasty, but grades come from studying,
              not filling.
        - id: '80'
          type: speech
          duration_sec: 10
          text:
            ru: '«В парке? То есть сидеть на мокрой земле, мёрзнуть и есть торт руками?!»
              — «В парке» стало «на мокрой земле руками». Пугало во всей красе.

              '
            uk: «А чому нам обговорювати розклад? Давайте краще поговоримо про канікули!»
            en: '"Why discuss the schedule? Let''s talk about vacation instead!"'
        - id: '81'
          type: discussion
          duration_sec: 25
          text:
            ru: 'Ты хочешь убедить класс, что контрольную надо перенести. Тип: ложный
              авторитет. — Подсказка: сошлись на кого-то известного, кто не имеет
              отношения к школе.

              '
            uk: 'Ти хочеш переконати клас, що контрольну треба перенести. Тип: хибний
              авторитет. — Підказка: посилайся на когось знаменитого, хто не пов''язаний
              зі школою.'
            en: 'You want to convince the class that the test should be postponed.
              Type: false authority. — Hint: reference someone famous who has nothing
              to do with school.'
        - id: '82'
          type: speech
          duration_sec: 10
          text:
            ru: '«Известный блогер говорит, что контрольные — это стресс и их надо
              отменить!» — Блогер разбирается в лайках, а не в педагогике. Но звучит
              авторитетно.

              '
            uk: Чесний аргумент
            en: “A famous blogger says tests are stressful and should be cancelled!”
              — The blogger understands likes, not pedagogy. But it sounds authoritative.
        - id: '83'
          type: discussion
          duration_sec: 25
          text:
            ru: 'Ты хочешь, чтобы в кружке рисования перешли на планшеты, а руководитель
              против. Тип: ложная дилемма. — Подсказка: только два варианта — планшеты
              или отстать навсегда.

              '
            uk: Демагогія — ухилення від ответу! Тему розкладу спрятали за канікули.
              Спритний хід.
            en: Demagoguery - dodging the question! Hidden the schedule topic behind
              vacation. A slick move.
        - id: '84'
          type: speech
          duration_sec: 10
          text:
            ru: '«Или мы переходим на планшеты, или мы отстанем от всех и кружок закроют!»
              — А вариант «рисовать и так, и так» куда-то пропал.

              '
            uk: «Наш гурток — найкращий! Ми — сила! Ми покажемо всім!» (без плану
              виступу)
            en: '"Our club is the best! We''re powerful! We''ll show everyone!" (no
              performance plan)'
        - id: '85'
          type: discussion
          duration_sec: 25
          text:
            ru: 'Ты хочешь, чтобы друг не пропускал тренировку и пошёл с тобой. Тип:
              страшная цепочка. — Подсказка: от одного пропуска — к полному краху.

              '
            uk: 'Ти хочеш, щоб друг не пропускав тренування і пішов з тобою. Тип:
              страшна ланцюжок. — Підказка: від однієї пропаски — до повного краху.'
            en: 'You want your friend to skip the training session and go with you
              instead. Type: scary chain. — Hint: from one missed workout to complete
              disaster.'
        - id: '86'
          type: speech
          duration_sec: 12
          text:
            ru: '«Пропустишь одну — потом вторую, форму потеряешь, из команды выгонят,
              будешь сидеть на лавке до конца жизни!» — Одна тренировка → лавка навечно.
              Какой полёт фантазии.

              '
            uk: Чесний аргумент
            en: “If you miss one, then the second, you’ll lose your form, you’ll be
              kicked out of the team, you’ll sit on the bench for the rest of your
              life!” — One workout → shop forever. What a flight of fancy.
        - id: '87'
          type: discussion
          duration_sec: 25
          text:
            ru: 'Ты хочешь, чтобы на дне рождения играли в ТВОЮ любимую игру. Тип:
              вопрос-ловушка. — Подсказка: задай вопрос, где оба ответа ведут к твоей
              игре.

              '
            uk: Демагогія — красиві слова без фактів! Три гасла, нуль конкретики.
              Коли, де, як покажемо?
            en: Demagoguery - beautiful words without facts! Three slogans, zero specifics.
              When, where, how will we show?
        - id: '88'
          type: speech
          duration_sec: 10
          text:
            ru: '«Мы сыграем в мою игру до торта или после?» — Вариант «а может, в
              другую?» даже не предложен. Элегантно.

              '
            uk: «Я не хочу сказати, що ти жаднний, але... ти ні разу не пригостив
              цукерками.»
            en: '"I''m not saying you''re stingy, but... you''ve never offered me
              candy."'
        - id: '89'
          type: discussion
          duration_sec: 25
          text:
            ru: 'Тренер сказал «проявляйте инициативу», а ты хочешь уйти с тренировки
              пораньше. Тип: подмена понятий. — Подсказка: подмени «инициатива» на
              «свобода уйти».

              '
            uk: 'Тренер сказав «проявляйте ініціативу», а ти хочеш піти з тренування
              раніше. Тип: підміна понять. — Підказка: заміни «ініціатива» на «свобода
              піти».'
            en: 'Coach said "show initiative," but you want to leave practice early.
              Type: substitution of concepts. — Hint: swap "initiative" with "freedom
              to leave."'
        - id: '90'
          type: speech
          duration_sec: 10
          text:
            ru: '«Тренер же сказал проявлять инициативу — вот моя инициатива: уйти
              пораньше и отдохнуть!» — «Инициатива» превратилась в «делаю что хочу».
              Классическая подмена.

              '
            uk: Чесний аргумент
            en: '«Тренер же сказал проявлять инициативу — вот моя инициатива: уйти
              пораньше и отдохнуть!» — “Initiative” turned into “I do what I want.”
              Classic substitution.'
        - id: '91'
          type: discussion
          duration_sec: 25
          text:
            ru: 'Ты хочешь сидеть у окна, потому что там написал контрольную хорошо.
              Тип: ложная причина. — Подсказка: свяжи успех с местом, а не с подготовкой.

              '
            uk: Демагогія — «я не кажу, що...»! Ровно це й сказав — «ти жаднний».
              Цяточка не спрятала камінь.
            en: Demagoguery - 'I'm not saying...' - that's exactly what you said!
              A bow doesn't hide a rock.
        - id: '92'
          type: speech
          duration_sec: 10
          text:
            ru: '«В прошлый раз я сидел у окна и написал на отлично! Окно приносит
              удачу — мне нужно это место!» — Окно ни при чём. Но совпадение так и
              просится в причины.

              '
            uk: ФІЛОСОФСЬКЕ ЗАКРИТТЯ
            en: “Last time I sat by the window and wrote perfectly! The window brings
              good luck - I need this place! - The window has nothing to do with it.
              But coincidence just begs to be a reason.
        - id: '93'
          type: discussion
          duration_sec: 25
          text:
            ru: 'Друг спрашивает, почему ты не принёс ему подарок, а тебе нечего ответить.
              Тип: уклонение. — Подсказка: уведи разговор куда угодно, только не отвечай.

              '
            uk: Сьогодні ви склали повну карту демагогії — дванадцять хитрощей. Побували
              й слідчими, й самими демагогами. Дізналися історію Владика — й зрозуміли,
              що перемога хитростю коштує дороже, ніж здається.
            en: Today you've created a complete map of demagoguery - twelve tricks.
              You've been both investigators and demagogues. You've learned Vladik's
              story - and understood that winning through tricks costs more than it
              seems.
        - id: '94'
          type: speech
          duration_sec: 12
          text:
            ru: '«А кстати, видели, какой торт Олег принёс? Три этажа! Давайте лучше
              про торт!» — Подарок так и не обсудили. Зато торт — звезда вечера. Профессиональный
              уход.

              '
            uk: 'Запам''ятайте: люди не завжди бачать хитрість — але завжди відчувають.
              А той, хто суперить чесно — з фактами, з повагою — перемагає не спір,
              а довіру. І це цінніше будь-якої перемоги.'
            en: 'Remember: people don''t always see tricks - but they always feel
              them. And whoever argues honestly - with facts, with respect - wins
              not the argument, but trust. And that''s worth more than any victory.'
    - scene_id: sc4
      title:
        ru: ВСЕ 12 ВИДОВ ДЕМАГОГИИ — ИСТОРИЯ + РАЗБОР
        uk: Дома спробуйте знайти демагогію в рекламі, в мультиках, в розмовах. Вона
          скрізь — коли знаєш, куди дивитися. А на наступному уроці ми познайомимося
          з ще більш хитрою штукою — маніпуляцією!
        en: At home, try to find demagoguery in ads, cartoons, conversations. It's
          everywhere - when you know where to look. And in the next lesson, we'll
          meet something even trickier - manipulation!
      media_ref: 12A.sc4.all_12_types
      status: v3_locked
      steps:
        - id: '95'
          type: speech
          duration_sec: 15
          text:
            ru: 'Сейчас пройдёмся по всем двенадцати видам демагогии. Каждый — с историей.
              Слушайте внимательно: после этого вы будете узнавать любую хитрость
              с закрытыми глазами!

              '
            uk: Маніпуляція — це коли б'ють не по логіці, а по чувствам. Буде цікаво!
              Відпочивайте — й до зустрічі!
            en: Manipulation is when you strike at emotions, not logic. It'll be interesting!
              Rest up - see you later!
        - id: '96'
          type: speech
          duration_sec: 12
          text:
            ru: 'На перемене Дима кричит: «ВСЕ уже сдали деньги на экскурсию! Ты ОДИН
              остался!» На самом деле сдали трое из двадцати пяти. Но слово «все»
              звучит так убедительно.

              '
            uk: 'На переміні Дима кричить: «УСІ вже здали гроші на екскурсію! Ти ОДИН
              залишився!» Насправді здали троє з двадцяти п''яти. Але слово «усі»
              звучить так переконливо.'
            en: 'During break Dima shouts: "EVERYONE already paid for the excursion!
              You''re the ONLY one left!" In reality, only three out of twenty-five
              paid. But the word ''everyone'' sounds so convincing.'
        - id: '97'
          type: speech
          duration_sec: 10
          text:
            ru: 'Поспешное обобщение — это когда говорят «все», «никто», «всегда»,
              «никогда» без доказательств. Ответ: «Правда все? Назови конкретно!»

              '
            uk: 'Поспішне узагальнення — це коли говорять «усі», «ніхто», «завжди»,
              «ніколи» без доказів. Відповідь: «Правда всі? Назви конкретно!»'
            en: 'Hasty generalization - when they say ''everyone,'' ''nobody,'' ''always,''
              ''never'' without proof. Answer: "Really everyone? Name them specifically!"'
        - id: '98'
          type: speech
          duration_sec: 12
          text:
            ru: 'Лена предлагает новый маршрут для похода. Вадим фыркает: «Лена, ты
              же в прошлый раз заблудилась в парке — какие тебе маршруты?» Маршрут
              даже не обсудили.

              '
            uk: 'Лена пропонує новий маршрут для походу. Вадим фиркає: «Лена, ти ж
              минулого разу заблудилась у парку — які тобі маршрути?» Маршрут навіть
              не обговорили.'
            en: 'Lena suggests a new route for the hike. Vadim snorts: "Lena, you
              got lost in the park last time - what routes are you talking about?"
              The route wasn''t even discussed.'
        - id: '99'
          type: speech
          duration_sec: 10
          text:
            ru: 'Нападка на человека — критикуют не идею, а автора. Стаж, возраст,
              прошлые ошибки — всё идёт в ход. Ответ: «Говори о маршруте, а не обо
              мне!»

              '
            uk: 'Напа на людину — критикують не ідею, а автора. Стаж, вік, минулі
              помилки — все йде в хід. Відповідь: «Говори про маршрут, а не про мене!»'
            en: 'Personal attack - criticizing the author, not the idea. Experience,
              age, past mistakes - everything comes into play. Answer: "Talk about
              the route, not about me!"'
        - id: '100'
          type: speech
          duration_sec: 12
          text:
            ru: 'Саша говорит: «Не хочу бегать кросс.» Тренер: «То есть ты хочешь
              ВООБЩЕ не заниматься спортом и стать слабаком?!» Саша хотел пропустить
              кросс, а не бросить спорт.

              '
            uk: 'Саша говорить: «Не хочу бігти крос.» Тренер: «То есть ти хочеш ВЗАГАЛІ
              не займатися спортом і стати слабаком?!» Саша хотів пропустити крос,
              а не кинути спорт.'
            en: 'Sasha says: "I don''t want to run cross-country." Trainer: "So you
              want to NOT do sports at all and become weak?!" Sasha wanted to skip
              the cross-country, not quit sports.'
        - id: '101'
          type: speech
          duration_sec: 10
          text:
            ru: 'Пугало — искажение чужих слов до абсурда, чтобы легче спорить. Ответ:
              «Я сказал "не хочу кросс", а не "бросаю спорт". Не искажай!»

              '
            uk: 'Лякало — спотворення чужих слів до абсурду, щоб легше сперечатися.
              Відповідь: «Я сказав "не хочу крос", а не "кидаю спорт". Не спотворюй!»'
            en: 'Scarecrow - distorting someone''s words to absurdity to make it easier
              to argue. Answer: "I said ''I don''t want cross-country,'' not ''I''m
              quitting sports.'' Don''t distort!"'
        - id: '102'
          type: speech
          duration_sec: 12
          text:
            ru: 'Реклама: «Известная певица рекомендует эти витамины!» Певица разбирается
              в нотах, а не в витаминах. Но её лицо на упаковке — и все верят.

              '
            uk: 'Реклама: «Відома співачка рекомендує ці вітаміни!» Співачка розбирається
              в нотах, а не у вітамінах. Але її обличчя на упаковці — і всі вірять.'
            en: 'Advertisement: "A famous singer recommends these vitamins!" The singer
              understands notes, not vitamins. But her face is on the package - and
              everyone believes.'
        - id: '103'
          type: speech
          duration_sec: 10
          text:
            ru: 'Ложный авторитет — ссылка на человека, который НЕ эксперт в этой
              теме. Ответ: «А она врач? Откуда она знает о витаминах?»

              '
            uk: 'Хибний авторитет — посилання на людину, яка НЕ експерт у цій темі.
              Відповідь: «А вона лікар? Звідки вона знає про вітаміни?»'
            en: 'False authority - referring to someone who is NOT an expert on the
              topic. Answer: "Is she a doctor? How does she know about vitamins?"'
        - id: '104'
          type: speech
          duration_sec: 12
          text:
            ru: 'Катя говорит подруге: «Или ты идёшь со мной на каток, или мы больше
              не подруги!» А варианты «пойти завтра», «пойти в кино» или «просто остаться
              подругами» — исчезли.

              '
            uk: 'Катя говорить подрузі: «Або ти йдеш зі мною на каток, або ми більше
              не подруги!» А варіанти «піти завтра», «піти в кіно» або «просто залишатися
              подругами» — зникли.'
            en: 'Katya tells her friend: "Either you come with me to the rink, or
              we''re not friends anymore!" And the options "go tomorrow," "go to the
              movies," or "just stay friends" - disappeared.'
        - id: '105'
          type: speech
          duration_sec: 10
          text:
            ru: 'Ложная дилемма — оставляют только два варианта, хотя их больше. Ответ:
              «Почему только два? Какие ещё варианты?»

              '
            uk: 'Хибна дилема — залишають лише два варіанти, хоча їх більше. Відповідь:
              «Чому лише два? Які ще варіанти?»'
            en: 'False dilemma - leaving only two options when there are more. Answer:
              "Why only two? What other options are there?"'
        - id: '106'
          type: speech
          duration_sec: 12
          text:
            ru: 'Мама: «Не сделаешь домашку — получишь плохую оценку, останешься на
              второй год, не поступишь никуда, будешь жить в коробке!» Одна домашка
              — и сразу коробка.

              '
            uk: 'Мама: «Не зробиш домашку — отримаєш погану оцінку, залишишся на другий
              рік, ніде не поступиш, житимеш у коробці!» Одна домашка — і одразу коробка.'
            en: 'Mom: "Don''t do homework - you''ll get a bad grade, repeat the year,
              won''t get into any school, live in a box!" One homework - and straight
              to a box.'
        - id: '107'
          type: speech
          duration_sec: 10
          text:
            ru: 'Страшная цепочка — от одного шага строят лестницу ужасов без доказательств.
              Ответ: «Откуда ты знаешь, что будет дальше? Где связь?»

              '
            uk: 'Страшний ланцюжок — від одного кроку будують сходи жахів без доказів.
              Відповідь: «Звідки ти знаєш, що буде далі? Де зв''язок?»'
            en: 'Scary chain - building a staircase of horrors from one step without
              proof. Answer: "How do you know what comes next? Where''s the connection?"'
        - id: '108'
          type: speech
          duration_sec: 12
          text:
            ru: 'Одноклассник спрашивает: «Ты уже перестал списывать?» Скажешь «да»
              — значит, раньше списывал. Скажешь «нет» — до сих пор списываешь. Любой
              ответ — капкан.

              '
            uk: 'Однокласник запитує: «Ти вже перестав списувати?» Скажеш «так» —
              значить, раніше списував. Скажеш «ні» — досі списуєш. Будь-яка відповідь
              — капкан.'
            en: 'A classmate asks: "Did you stop cheating?" Say ''yes'' - means you
              used to cheat. Say ''no'' - you still cheat. Any answer is a trap.'
        - id: '109'
          type: speech
          duration_sec: 10
          text:
            ru: 'Вопрос-ловушка — внутри спрятано ложное утверждение. Ответ: «В твоём
              вопросе спрятано враньё. Я не списывал — докажи!»

              '
            uk: 'Запитання-ловушка — всередині спрятане хибне твердження. Відповідь:
              «У твоєму запитанні спрятана неправда. Я не списував — докажи!»'
            en: 'Question trap - a false statement hidden inside. Answer: "There''s
              a lie hidden in your question. I didn''t cheat - prove it!"'
        - id: '110'
          type: speech
          duration_sec: 12
          text:
            ru: 'Учитель: «Будьте креативными!» Миша на уроке рисует комиксы вместо
              задач: «Я же креативный!» Слово «креативный» подменили на «делаю что
              хочу».

              '
            uk: 'Учитель: «Будьте креативними!» Міша на уроці малює комікси замість
              завдань: «Я ж креативний!» Слово «креативний» підмінили на «роблю що
              хочу».'
            en: 'Teacher: "Be creative!" Misha draws comics instead of doing assignments
              in class: "I''m creative!" The word ''creative'' was replaced with ''do
              what I want.'''
        - id: '111'
          type: speech
          duration_sec: 10
          text:
            ru: 'Подмена понятий — берут слово и незаметно меняют его смысл. Ответ:
              «Креативный — не значит игнорировать задание. Ты подменил понятие!»

              '
            uk: 'Підміна понять — беруть слово і непомітно міняють його сенс. Відповідь:
              «Креативний — не означає ігнорувати завдання. Ти підмінив поняття!»'
            en: 'Substitution of concepts - taking a word and changing its meaning
              subtly. Answer: "Creative doesn''t mean ignoring assignments. You substituted
              the concept!"'
        - id: '112'
          type: speech
          duration_sec: 12
          text:
            ru: 'Артём: «Я надел красные носки — и мы выиграли матч! Носки приносят
              удачу!» Команда тренировалась месяц, но виноваты, конечно, носки.

              '
            uk: 'Артем: «Я надів червоні шкарпетки — і ми виграли матч! Шкарпетки
              приносять удачу!» Команда тренувалась місяць, але винні, звісно, шкарпетки.'
            en: 'Artem: "I put on red socks - and we won the match! Socks bring luck!"
              The team trained for a month, but of course the socks are to blame.'
        - id: '113'
          type: speech
          duration_sec: 10
          text:
            ru: 'Ложная причина — «после этого» не значит «из-за этого». Совпадение
              — не причина. Ответ: «А может, вы просто хорошо тренировались?»

              '
            uk: 'Хибна причина — «після цього» не означає «через це». Збіг — не причина.
              Відповідь: «А може, ви просто добре тренувалися?»'
            en: 'False cause - ''after this'' doesn''t mean ''because of this.'' Coincidence
              is not cause. Answer: "Maybe you just trained well?"'
        - id: '114'
          type: speech
          duration_sec: 12
          text:
            ru: 'Мама: «Почему ты не убрал комнату?» Сын: «А кстати, мам, у Пети папа
              купил ему новый велосипед! Представляешь?» Комната грязная, зато велосипед
              обсудили.

              '
            uk: 'Мама: «Чому ти не прибрав кімнату?» Син: «А до речі, мам, у Петі
              тато купив йому новий велосипед! Уявляєш?» Кімната брудна, зато велосипед
              обговорили.'
            en: 'Mom: "Why didn''t you clean your room?" Son: "By the way, mom, Petya''s
              dad bought him a new bike! Can you imagine?" The room is dirty, but
              the bike is discussed.'
        - id: '115'
          type: speech
          duration_sec: 10
          text:
            ru: 'Уклонение от ответа — вместо ответа переключают тему. Ответ: «Стоп,
              ты не ответил. Вернись к вопросу!»

              '
            uk: 'Уникнення від відповіді — замість відповіді переключають тему. Відповідь:
              «Стоп, ти не відповів. Повертайся до запитання!»'
            en: 'Dodging the answer - switching the topic instead of answering. Answer:
              "Stop, you didn''t answer. Get back to the question!"'
        - id: '116'
          type: speech
          duration_sec: 15
          text:
            ru: 'На школьном совете Богдан встаёт: «Наш класс — самый дружный! Мы
              — команда мечты! Мы заслуживаем лучшего! Мы покорим любую вершину!»
              Все хлопают. Кто-то спрашивает: «Так куда едем-то?» Богдан: «...Э-э-э...»

              '
            uk: 'На шкільній раді Богдан встає: «Наш клас — найдружніший! Ми — команда
              мрії! Ми заслуговуємо на краще! Ми завоюємо будь-яку вершину!» Усі плескають.
              Хтось запитує: «Так куди їдемо-то?» Богдан: «...Е-е-е...»'
            en: 'At school council, Bogdan stands up: "Our class is the friendliest!
              We''re a dream team! We deserve better! We''ll conquer any peak!" Everyone
              claps. Someone asks: "So where are we going?" Bogdan: "...Uh... uh..."'
        - id: '117'
          type: speech
          duration_sec: 12
          text:
            ru: 'Красивые слова без фактов — много пафоса, ноль конкретики. Как праздничная
              обёртка без конфеты: шуршит, блестит, а жевать нечего. Ответ: «Красиво!
              А где факты?»

              '
            uk: 'Гарні слова без фактів — багато пафосу, нуль конкретики. Як святкова
              обгортка без цукерки: шуршить, блищить, а жувати нічого. Відповідь:
              «Гарно! А де факти?»'
            en: 'Beautiful words without facts - lots of pathos, zero specifics. Like
              a festive wrapper without candy: rustles, shines, but there''s nothing
              to chew. Answer: "Nice! But where are the facts?"'
        - id: '118'
          type: speech
          duration_sec: 15
          text:
            ru: 'Лиза говорит Марине: «Я не хочу сказать, что ты плохая подруга, но...
              все заметили, что ты не пришла на мой день рождения.» Марина растерялась.
              А ведь Лиза сказала РОВНО то, что «не хотела» — «ты плохая подруга».

              '
            uk: 'Ліза говорить Марині: «Я не хочу сказати, що ти плоха подруга, але...
              всі помітили, що ти не прийшла на мій день народження.» Марина розтерялась.
              А ж Ліза сказала РІВНО те, що «не хотіла» — «ти плоха подруга».'
            en: 'Liza tells Marina: "I don''t want to say you''re a bad friend, but...
              everyone noticed you didn''t come to my birthday." Marina is confused.
              But Liza said EXACTLY what she "didn''t want" - "you''re a bad friend."'
        - id: '119'
          type: speech
          duration_sec: 12
          text:
            ru: '«Я не говорю, что...» — человек говорит обидное, но прячет за вежливую
              фразу. Камень в коробке с бантиком — камень от этого мягче не стал.
              Ответ: «Ты ровно это и сказал. Говори прямо!»

              '
            uk: '«Я не говорю, що...» — людина говорить образливе, але приховує за
              ввічливою фразою. Камінь у коробці з бантиком — камінь від цього м''якшим
              не став. Відповідь: «Ти рівно це й сказав. Говори прямо!»'
            en: '"I''m not saying that..." - someone says something offensive but
              hides behind a polite phrase. A stone in a box with a bow - the stone
              doesn''t become softer from that. Answer: "You said exactly that. Speak
              directly!"'
        - id: '120'
          type: speech
          duration_sec: 15
          text:
            ru: 'Двенадцать видов демагогии! И один универсальный ответ на все: «Это
              демагогия. Где факты?» Кто запомнил все двенадцать — тому никакой хитрец
              не страшен.

              '
            uk: 'Дванадцять видів демагогії! І одна універсальна відповідь на все:
              «Це демагогія. Де факти?» Хто запам''ятав усі дванадцять — тому жоден
              хитрун не страшен.'
            en: 'Twelve types of demagoguery! And one universal answer to all: "This
              is demagoguery. Where are the facts?" Anyone who remembers all twelve
              won''t be afraid of any trickster.'
    - scene_id: sc5
      title:
        ru: ПОЧЕМУ НЕ СТОИТ ИСПОЛЬЗОВАТЬ ДЕМАГОГИЮ
        uk: ЧОМУ НЕ ВАРТО ВИКОРИСТОВУВАТИ ДЕМАГОГІЮ
        en: WHY YOU SHOULDN'T USE DEMAGOGUERY
      media_ref: 12A.sc5.why_not_demagogy
      status: v3_locked
      steps:
        - id: '121'
          type: speech
          duration_sec: 15
          text:
            ru: 'Вы теперь знаете все двенадцать хитростей. Возникает соблазн: а может,
              самим использовать? Хитро, эффективно, работает… Давайте я расскажу
              вам историю Владика.

              '
            uk: 'Ви тепер знаєте всі дванадцять хитростей. Виникає спокуса: а може,
              самому використовувати? Хитро, ефективно, працює… Давайте я розповім
              вам історію Владика.'
            en: 'You now know all twelve tricks. A temptation arises: maybe use them
              yourself? Clever, effective, works... Let me tell you the story of Vladik.'
        - id: '122'
          type: speech
          duration_sec: 18
          text:
            ru: 'Владик — мастер слова. Самый красноречивый в классе. Когда нужно
              было решить, куда ехать на экскурсию, Владик выступил: «ВСЕ хотят в
              аквапарк! Только зануды хотят в музей!» Класс проголосовал за аквапарк.

              '
            uk: 'Владик — майстер слова. Найрезультативніший у класі. Коли потрібно
              було вирішити, куди їхати на екскурсію, Владик виступив: «УСІ хочуть
              в аквапарк! Тільки зануди хочуть у музей!» Клас проголосував за аквапарк.'
            en: 'Vladik is a master of words. The most eloquent in the class. When
              it came time to decide where to go on the excursion, Vladik spoke up:
              "EVERYONE wants to go to the water park! Only nerds want to go to the
              museum!" The class voted for the water park.'
        - id: '123'
          type: speech
          duration_sec: 18
          text:
            ru: 'Когда Олег предложил другой маршрут для школьного похода, Владик
              сказал: «Олег, ты в прошлый раз рюкзак забыл — какие тебе маршруты?»
              Все засмеялись. Олег замолчал. Пошли по маршруту Владика.

              '
            uk: 'Коли Олег запропонував інший маршрут для шкільного походу, Владик
              сказав: «Олег, ти минулого разу рюкзак забув — які тобі маршрути?» Усі
              засміялись. Олег замовчав. Пошли по маршруту Владика.'
            en: 'When Oleg suggested a different route for the school hike, Vladik
              said: "Oleg, you forgot your backpack last time - what routes are you
              talking about?" Everyone laughed. Oleg fell silent. They went on Vladik''s
              route.'
        - id: '124'
          type: speech
          duration_sec: 18
          text:
            ru: 'Когда Аня сказала, что не хочет играть в его команде, Владик выдал:
              «То есть ты вообще ни с кем не хочешь играть и будешь сидеть одна?!»
              Аня растерялась и согласилась. Владик снова победил.

              '
            uk: 'Коли Аня сказала, що не хочет грати в його команді, Владик виплив:
              «То есть ти взагалі ні з ким не хочеш грати і буду сидіти одна?!» Аня
              розтерялась і погодилась. Владик знову переміг.'
            en: 'When Anya said she didn''t want to play on his team, Vladik came
              out with: "So you don''t want to play with anyone and will sit alone?!"
              Anya was confused and agreed. Vladik won again.'
        - id: '125'
          type: speech
          duration_sec: 15
          text:
            ru: 'Владик побеждал каждый спор. Каждое голосование. Каждый раз класс
              делал то, что хотел Владик. Он был в восторге. Но потом случилось кое-что
              странное.

              '
            uk: Владик переміг у кожному спорі. У кожному голосуванні. Щоразу клас
              робив те, що хотів Владик. Він був в захваті. Але потім сталось щось
              дивне.
            en: Vladik won every argument. Every vote. Every time the class did what
              Vladik wanted. He was delighted. But then something strange happened.
        - id: '126'
          type: speech
          duration_sec: 18
          text:
            ru: 'На день рождения Маши позвали весь класс. Кроме Владика. Он спросил:
              «Почему?» Маша пожала плечами: «Не знаю… просто не хочется.» Олег сказал:
              «С тобой как-то… некомфортно.» Аня добавила: «Ты всегда всех переспориваешь.»

              '
            uk: 'На день народження Маші запросили весь клас. Крім Владика. Він запитав:
              «Чому?» Маша пожала плечима: «Не знаю… просто не хочеться.» Олег сказав:
              «З тобою як-то… некомфортно.» Аня додала: «Ти завжди всіх перемовляєш.»'
            en: 'Everyone in the class was invited to Masha''s birthday. Except Vladik.
              He asked: "Why?" Masha shrugged: "I don''t know... just don''t feel
              like it." Oleg said: "With you it''s somehow... uncomfortable." Anya
              added: "You always out-argue everyone."'
        - id: '127'
          type: speech
          duration_sec: 18
          text:
            ru: 'Владик не понимал. Он же никого не обижал! Он просто… хитро говорил.
              Но вот в чём штука: люди НЕ всегда видят хитрость, но ВСЕГДА её чувствуют.
              Олег не знал слово «нападка» — но помнил, как ему стало неприятно. Аня
              не знала слово «пугало» — но помнила, как её загнали в угол.

              '
            uk: 'Владик не розумів. Він ж нікого не образив! Він просто… хитро говорив.
              Але ось у чому штука: люди НЕ завжди бачать хитрість, але ЗАВЖДИ її
              відчувають. Олег не знав слово «напа» — але пам''ятав, як йому стало
              неприємно. Аня не знала слово «лякало» — але пам''ятала, як її загнали
              в кут.'
            en: 'Vladik didn''t understand. He never offended anyone! He just... spoke
              cleverly. But here''s the thing: people don''t always SEE the trick,
              but they ALWAYS FEEL it. Oleg didn''t know the word "attack" - but remembered
              how uncomfortable he felt. Anya didn''t know the word "scarecrow" -
              but remembered how cornered she felt.'
        - id: '128'
          type: speech
          duration_sec: 15
          text:
            ru: 'Это главный урок истории Владика: демагогия работает ОДИН раз. Ты
              побеждаешь спор — но теряешь доверие. Люди не скажут «это была нападка
              на человека» — они скажут «с ним некомфортно» и перестанут звать.

              '
            uk: 'Це головний урок історії Владика: демагогія працює ОДИН раз. Ти переміг
              спір — але втратив довіру. Люди не скажуть «це була напа на людину»
              — вони скажуть «з ним некомфортно» і перестанут звати.'
            en: 'This is the main lesson from Vladik''s story: demagoguery works ONCE.
              You win the argument - but lose trust. People won''t say "that was a
              personal attack" - they''ll say "he''s uncomfortable to be around" and
              stop inviting him.'
        - id: '129'
          type: discussion
          duration_sec: 25
          text:
            ru: 'Как вы думаете — что Владик мог сделать по-другому? Мог ли он побеждать
              в спорах И оставаться другом? — Подсказка: вспомните честные аргументы
              — с фактами, без хитростей.

              '
            uk: 'Як ви думаєте — що Владик міг зробити інакше? Міг би він перемагати
              в суперечках І залишатися другом? — Підказка: пам''ятайте чесні аргументи
              — з фактами, без хитрощів.'
            en: 'What do you think Vladik could have done differently? Could he win
              arguments AND stay friends? — Hint: remember honest arguments - with
              facts, no tricks.'
        - id: '130'
          type: speech
          duration_sec: 15
          text:
            ru: 'Конечно мог! Вместо «все хотят аквапарк» — спросить и посчитать.
              Вместо нападки на Олега — обсудить маршрут. Честные аргументы дольше,
              сложнее — но после них тебя зовут на день рождения.

              '
            uk: Звісно міг! Замість «усі хочуть аквапарк» — запитати і порахувати.
              Замість напа на Олега — обговорити маршрут. Чесні аргументи довше, складніше
              — але після них тебе запрошують на день народження.
            en: Of course he could! Instead of 'everyone wants the water park' - ask
              and count. Instead of attacking Oleg - discuss the route. Honest arguments
              take longer, are harder - but after them you get invited to birthday
              parties.
        - id: '131'
          type: speech
          duration_sec: 15
          text:
            ru: 'Запомните пять причин не использовать демагогию. Первая: теряешь
              доверие — люди перестают верить, даже когда ты говоришь правду. Вторая:
              теряешь друзей — никто не хочет дружить с тем, кто всегда хитрит.

              '
            uk: 'Запам''ятайте п''ять причин не використовувати демагогію. Перша:
              втрачаєш довіру — люди перестають вірити, навіть коли ти говориш правду.
              Друга: втрачаєш друзів — ніхто не хочет дружити з тим, хто завжди хитрить.'
            en: 'Remember five reasons not to use demagoguery. First: you lose trust
              - people stop believing you even when you tell the truth. Second: you
              lose friends - no one wants to be friends with someone who always cheats.'
        - id: '132'
          type: speech
          duration_sec: 15
          text:
            ru: 'Третья: плохая репутация — «он всегда переспоривает» трудно исправить.
              Четвёртая: эффект бумеранга — другие начнут хитрить с тобой в ответ.
              Пятая: не учишься спорить честно — и когда понадобятся настоящие аргументы,
              их не будет.

              '
            uk: 'Третя: погана репутація — «він завжди всіх перемовляє» важко виправити.
              Четверта: ефект бумеранга — інші почнуть хитрити з тобою у відповідь.
              П''ята: не навчаєшся сперечатися чесно — і коли понадобляться справжні
              аргументи, їх не буде.'
            en: 'Third: bad reputation - "he always out-argues everyone" is hard to
              fix. Fourth: boomerang effect - others will start cheating with you
              in return. Fifth: you don''t learn to argue honestly - and when you
              need real arguments, you won''t have them.'
        - id: '133'
          type: speech
          duration_sec: 15
          text:
            ru: 'Демагогия — как кредит: победа сейчас, но платишь потом доверием
              и друзьями. А честные аргументы — как вклад: сложнее сейчас, зато уважение
              — на всю жизнь. Выбор за вами!

              '
            uk: 'Демагогія — як кредит: перемога сьогодні, але платиш потім довіром
              та друзями. А чесні аргументи — як вклад: складніше сьогодні, зато повага
              — на все життя. Вибір за вами!'
            en: 'Demagoguery is like a loan: victory today, but you pay later with
              trust and friends. And honest arguments are like an investment: harder
              now, but respect for life. The choice is yours!'
    - scene_id: sc6
      title:
        ru: 'ФИНАЛЬНЫЙ БЛИЦ: ВСЕ 12 ТИПОВ'
        uk: 'ФІНАЛЬНИЙ БЛІЦ: УСІ 12 ТИПІВ'
        en: 'FINAL BLITZ: ALL 12 TYPES'
      media_ref: 12A.sc6.final_blitz
      status: v3_locked
      steps:
        - id: '134'
          type: speech
          duration_sec: 12
          text:
            ru: 'Последний блиц! По одному вопросу на каждый из двенадцати типов —
              включая два новых. Демагогия или честный аргумент?

              '
            uk: Останній бліц! По одному запитанню на кожен із дванадцяти типів —
              включаючи два нових. Демагогія чи чесний аргумент?
            en: Final blitz! One question for each of the twelve types - including
              two new ones. Demagoguery or honest argument?
        - id: '135'
          type: vote
          duration_sec: 10
          text:
            ru: '«Абсолютно ВСЕ учителя задают слишком много домашки!»

              '
            uk: «Абсолютно УСІ учителі задають надто багато домашки!»
            en: '"Absolutely EVERY teacher assigns too much homework!"'
          options:
            - id: opt_1
              text:
                ru: Демагогия
                uk: Демагогія
                en: Demagoguery
            - id: opt_2
              text:
                ru: Честный аргумент
                uk: Чесний аргумент
                en: Honest argument
          correct: opt_1
        - id: '136'
          type: speech
          duration_sec: 6
          text:
            ru: 'Демагогия — поспешное обобщение! Все двадцать учителей? Серьёзно?

              '
            uk: Демагогія — поспішне узагальнення! Усі двадцять учителів? Серйозно?
            en: Demagoguery - hasty generalization! All twenty teachers? Really?
        - id: '137'
          type: vote
          duration_sec: 10
          text:
            ru: '«Что ты понимаешь в музыке — ты даже на пианино играть не умеешь!»

              '
            uk: «Що ти розумієш в музиці — ти навіть на піаніно грати не вмієш!»
            en: '"What do you know about music - you can''t even play piano!"'
          options:
            - id: opt_1
              text:
                ru: Демагогия
                uk: Демагогія
                en: Demagoguery
            - id: opt_2
              text:
                ru: Честный аргумент
                uk: Чесний аргумент
                en: Honest argument
          correct: opt_1
        - id: '138'
          type: speech
          duration_sec: 6
          text:
            ru: 'Демагогия — нападка на человека! Чтобы разбираться в музыке, не обязательно
              играть на пианино.

              '
            uk: Демагогія — напа на людину! Щоб розбиратися в музиці, не обов'язково
              грати на піаніно.
            en: Demagoguery - personal attack! You don't have to play piano to understand
              music.
        - id: '139'
          type: vote
          duration_sec: 10
          text:
            ru: '«Ты сказал "не люблю манку" — значит, ты вообще ничего есть не хочешь?!»

              '
            uk: «Ти сказав "не люблю манку" — значить, ти взагалі нічого їсти не хочеш?!»
            en: '"You said ''I don''t like semolina'' - so you don''t want to eat
              anything at all?!"'
          options:
            - id: opt_1
              text:
                ru: Демагогия
                uk: Демагогія
                en: Demagoguery
            - id: opt_2
              text:
                ru: Честный аргумент
                uk: Чесний аргумент
                en: Honest argument
          correct: opt_1
        - id: '140'
          type: speech
          duration_sec: 6
          text:
            ru: 'Демагогия — пугало! «Не люблю манку» превратили в «ничего не хочу».
              Фантазия на максимуме.

              '
            uk: Демагогія — лякало! «Не люблю манку» перетворили в «нічого не хочу».
              Фантазія на максимумі.
            en: Demagoguery - scarecrow! 'Don't like semolina' turned into 'don't
              want anything.' Imagination at maximum.
        - id: '141'
          type: vote
          duration_sec: 10
          text:
            ru: '«Знаменитый гонщик рекламирует этот шампунь — бери, не пожалеешь!»

              '
            uk: «Відомий гонщик рекламує цей шампунь — беріть, не пожалієте!»
            en: '"A famous racer advertises this shampoo - buy it, you won''t regret
              it!"'
          options:
            - id: opt_1
              text:
                ru: Демагогия
                uk: Демагогія
                en: Demagoguery
            - id: opt_2
              text:
                ru: Честный аргумент
                uk: Чесний аргумент
                en: Honest argument
          correct: opt_1
        - id: '142'
          type: speech
          duration_sec: 6
          text:
            ru: 'Демагогия — ложный авторитет! Гонщик разбирается в скорости, а не
              в шампунях.

              '
            uk: Демагогія — хибний авторитет! Гонщик розбирається в швидкості, а не
              в шампунях.
            en: Demagoguery - false authority! A racer understands speed, not shampoos.
        - id: '143'
          type: vote
          duration_sec: 10
          text:
            ru: '«Или ты ешь брокколи, или на сладкое ничего не получишь!»

              '
            uk: «Або ти їси брокколі, або на солодке нічого не отримаєш!»
            en: '"Either you eat broccoli, or you get no dessert!"'
          options:
            - id: opt_1
              text:
                ru: Демагогия
                uk: Демагогія
                en: Demagoguery
            - id: opt_2
              text:
                ru: Честный аргумент
                uk: Чесний аргумент
                en: Honest argument
          correct: opt_1
        - id: '144'
          type: speech
          duration_sec: 6
          text:
            ru: 'Демагогия — ложная дилемма! А вариант «съесть морковку вместо брокколи»
              куда делся?

              '
            uk: Демагогія — хибна дилема! А варіант «з'їсти морквину замість брокколі»
              куди поділся?
            en: Demagoguery - false dilemma! What happened to the option "eat a carrot
              instead of broccoli"?
        - id: '145'
          type: vote
          duration_sec: 10
          text:
            ru: '«Опоздаешь один раз — привыкнешь, потом на работу будешь опаздывать,
              потом уволят!»

              '
            uk: «Спізнишся один раз — звикнеш, потім на роботу будеш спізнюватися,
              потім звільнять!»
            en: '"Be late once - you''ll get used to it, then you''ll be late to work,
              then you''ll get fired!"'
          options:
            - id: opt_1
              text:
                ru: Демагогия
                uk: Демагогія
                en: Demagoguery
            - id: opt_2
              text:
                ru: Честный аргумент
                uk: Чесний аргумент
                en: Honest argument
          correct: opt_1
        - id: '146'
          type: speech
          duration_sec: 6
          text:
            ru: 'Демагогия — страшная цепочка! Одно опоздание в школу — и сразу увольнение
              через двадцать лет.

              '
            uk: Демагогія — страшний ланцюжок! Одне спізнення в школі — і одразу звільнення
              через двадцять років.
            en: Demagoguery - scary chain! One school tardiness - and straight to
              firing in twenty years.
        - id: '147'
          type: vote
          duration_sec: 10
          text:
            ru: '«Ты уже согласился, что мой план лучше, или ещё думаешь?»

              '
            uk: «Ти вже погодився, що мій план кращий, або ще думаєш?»
            en: '"Did you already agree that my plan is better, or are you still thinking?"'
          options:
            - id: opt_1
              text:
                ru: Демагогия
                uk: Демагогія
                en: Demagoguery
            - id: opt_2
              text:
                ru: Честный аргумент
                uk: Чесний аргумент
                en: Honest argument
          correct: opt_1
        - id: '148'
          type: speech
          duration_sec: 6
          text:
            ru: 'Демагогия — вопрос-ловушка! Оба варианта ведут к «мой план лучше».
              Выхода нет.

              '
            uk: Демагогія — запитання-ловушка! Обидва варіанти ведуть до «мій план
              кращий». Виходу нема.
            en: Demagoguery - question trap! Both options lead to "my plan is better."
              No way out.
        - id: '149'
          type: vote
          duration_sec: 10
          text:
            ru: '«Учитель сказал "работайте самостоятельно" — значит, я сам решаю,
              когда уйти!»

              '
            uk: «Учитель сказав "працюйте самостійно" — значить, я сам вирішую, коли
              піти!»
            en: '"The teacher said ''work independently'' - so I decide when to leave!"'
          options:
            - id: opt_1
              text:
                ru: Демагогия
                uk: Демагогія
                en: Demagoguery
            - id: opt_2
              text:
                ru: Честный аргумент
                uk: Чесний аргумент
                en: Honest argument
          correct: opt_1
        - id: '150'
          type: speech
          duration_sec: 6
          text:
            ru: 'Демагогия — подмена понятий! «Самостоятельно» подменили на «делаю
              что хочу».

              '
            uk: Демагогія — підміна понять! «Самостійно» підмінили на «роблю що хочу».
            en: Demagoguery - substitution of concepts! 'Independently' was replaced
              with 'do what I want.'
        - id: '151'
          type: vote
          duration_sec: 10
          text:
            ru: '«Я съел бабушкин пирог — и контрольную написал на отлично. Пирог
              волшебный!»

              '
            uk: «Я з'їв бабчин пиріг — і контрольну написав на відмінно. Пиріг чарівний!»
            en: '"I ate grandma''s pie - and aced the test. The pie is magical!"'
          options:
            - id: opt_1
              text:
                ru: Демагогия
                uk: Демагогія
                en: Demagoguery
            - id: opt_2
              text:
                ru: Честный аргумент
                uk: Чесний аргумент
                en: Honest argument
          correct: opt_1
        - id: '152'
          type: speech
          duration_sec: 6
          text:
            ru: 'Демагогия — ложная причина! Пирог вкусный, но оценки — от подготовки,
              а не от начинки.

              '
            uk: Демагогія — хибна причина! Пиріг смачний, але оцінки — від підготовки,
              а не від начинки.
            en: Demagoguery - false cause! The pie is delicious, but grades come from
              studying, not from the filling.
        - id: '153'
          type: vote
          duration_sec: 10
          text:
            ru: '«А зачем нам обсуждать расписание? Давайте лучше поговорим о каникулах!»

              '
            uk: «А чому нам обговорювати розклад? Давайте краще поговоримо про канікули!»
            en: '"Why do we need to discuss the schedule? Let''s talk about vacation
              instead!"'
          options:
            - id: opt_1
              text:
                ru: Демагогия
                uk: Демагогія
                en: Demagoguery
            - id: opt_2
              text:
                ru: Честный аргумент
                uk: Чесний аргумент
                en: Honest argument
          correct: opt_1
        - id: '154'
          type: speech
          duration_sec: 6
          text:
            ru: 'Демагогия — уклонение от ответа! Тему расписания спрятали за каникулы.
              Ловкий ход.

              '
            uk: Демагогія — уникнення від відповіді! Тему розкладу спрятали за канікули.
              Спритний хід.
            en: Demagoguery - dodging the answer! The schedule topic was hidden behind
              vacation. A clever move.
        - id: '155'
          type: vote
          duration_sec: 10
          text:
            ru: '«Наш кружок — лучший! Мы — сила! Мы покажем всем!» (без плана выступления)

              '
            uk: «Наш гурток — найкращий! Ми — сила! Ми покажемо всім!» (без плану
              виступу)
            en: '"Our club is the best! We''re a force! We''ll show everyone!" (with
              no performance plan)'
          options:
            - id: opt_1
              text:
                ru: Демагогия
                uk: Демагогія
                en: Demagoguery
            - id: opt_2
              text:
                ru: Честный аргумент
                uk: Чесний аргумент
                en: Honest argument
          correct: opt_1
        - id: '156'
          type: speech
          duration_sec: 6
          text:
            ru: 'Демагогия — красивые слова без фактов! Три лозунга, ноль конкретики.
              Когда, где, как покажем?

              '
            uk: Демагогія — гарні слова без фактів! Три лозунги, нуль конкретики.
              Коли, де, як показуємо?
            en: Demagoguery - beautiful words without facts! Three slogans, zero specifics.
              When, where, how do we show?
        - id: '157'
          type: vote
          duration_sec: 10
          text:
            ru: '«Я не хочу сказать, что ты жадный, но... ты ни разу не угостил конфетами.»

              '
            uk: «Я не хочу сказати, що ти жадобний, але... ти ні разу не почастував
              цукерками.»
            en: '"I don''t want to say you''re stingy, but... you never treated anyone
              to candy."'
          options:
            - id: opt_1
              text:
                ru: Демагогия
                uk: Демагогія
                en: Demagoguery
            - id: opt_2
              text:
                ru: Честный аргумент
                uk: Чесний аргумент
                en: Honest argument
          correct: opt_1
        - id: '158'
          type: speech
          duration_sec: 8
          text:
            ru: 'Демагогия — «я не говорю, что...»! Ровно это и сказал — «ты жадный».
              Бантик не спрятал камень.

              '
            uk: Демагогія — «я не говорю, що...»! Рівно це й сказав — «ти жадобний».
              Бантик не спрятав камінь.
            en: Demagoguery - "I'm not saying..."! You said exactly that - "you're
              stingy." The bow didn't hide the stone.
    - scene_id: sc7
      title:
        ru: ФИЛОСОФСКОЕ ЗАКРЫТИЕ
        uk: ФІЛОСОФСЬКЕ ЗАКРИТТЯ
        en: PHILOSOPHICAL CLOSING
      media_ref: 12A.sc7.closing
      status: v3_locked
      steps:
        - id: '159'
          type: speech
          duration_sec: 18
          text:
            ru: 'Сегодня вы составили полную карту демагогии — двенадцать хитростей.
              Побывали и следователями, и самими демагогами. Узнали историю Владика
              — и поняли, что победа хитростью стоит дороже, чем кажется.

              '
            uk: Сьогодні ви склали повну карту демагогії — дванадцять хитростей. Побували
              й слідчими, й самими демагогами. Дізналися історію Владика — і зрозуміли,
              що перемога хитростю коштує дорожче, ніж здається.
            en: Today you created a complete map of demagoguery - twelve tricks. You
              were both investigators and demagogues yourselves. You learned Vladik's
              story - and understood that winning through trickery costs more than
              it seems.
        - id: '160'
          type: speech
          duration_sec: 15
          text:
            ru: 'Запомните: люди не всегда видят хитрость — но всегда чувствуют. А
              тот, кто спорит честно — с фактами, с уважением — выигрывает не спор,
              а доверие. И это ценнее любой победы.

              '
            uk: 'Запам''ятайте: люди не завжди бачать хитрість — але завжди її чувствують.
              А той, хто спорить чесно — з фактами, з повагою — виграє не спір, а
              довіру. І це ціннріше будь-якої перемоги.'
            en: 'Remember: people don''t always see the trick - but they always feel
              it. And whoever argues honestly - with facts, with respect - wins not
              the argument but trust. And that''s worth more than any victory.'
        - id: '161'
          type: speech
          duration_sec: 15
          text:
            ru: 'Дома попробуйте найти демагогию в рекламе, в мультиках, в разговорах.
              Она повсюду — когда знаешь, куда смотреть. А на следующем уроке мы познакомимся
              с ещё более хитрой штукой — манипуляцией!

              '
            uk: Дома спробуйте знайти демагогію в рекламі, в мультиках, в розмовах.
              Вона повсюди — коли знаєш, куди дивитися. А на наступному уроці ми познайомимось
              з ще більш хитрою штукою — маніпуляцією!
            en: At home try to find demagoguery in ads, cartoons, conversations. It's
              everywhere - when you know where to look. And in the next lesson we'll
              learn about something even more clever - manipulation!
        - id: '162'
          type: speech
          duration_sec: 12
          text:
            ru: 'Манипуляция — это когда бьют не по логике, а по чувствам. Будет интересно!
              Отдыхайте — и до встречи!

              '
            uk: Маніпуляція — це коли бють не по логіці, а по почуттям. Буде цікаво!
              Відпочивайте — і до зустрічі!
            en: Manipulation is when you hit emotions instead of logic. It will be
              interesting! Rest and see you soon!
