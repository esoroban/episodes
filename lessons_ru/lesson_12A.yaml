lesson:
  id: lesson_12A
  day: 12
  slot: A
  title:
    ru: Карта демагогии
    uk: Карта демагогії
    en: Map of Demagoguery
  scenes:
    - scene_id: sc1
      title:
        ru: БОЛЬШАЯ РАЗМИНКА ПО КУРСУ
        uk: ВЕЛИКА РОЗМИНКА ПО КУРСУ
        en: 'BIG WARM-UP: REVIEW OF THE COURSE'
      media_ref: 12A.sc1.warmup
      status: v3_locked
      steps:
        - id: '1'
          type: speech
          duration_sec: 15
          text:
            ru: 'Разминка! Сегодня проверим, что осталось в голове за весь курс. Темы
              вперемешку, будьте начеку — тут и факты, и проверка, и ловушки, и всё-всё-всё!

              '
            uk: Розминка! Сьогодні перевіримо, що залишилося в голові за весь курс.
              Теми вперемішку, будьте уважні — тут і факти, й перевірка, й пастки,
              й все-все-все!
            en: Warm-up! Today we'll check what stuck in your heads throughout the
              course. Mixed topics, be careful - there are facts and checks and traps
              and everything!
        - id: '2'
          type: vote
          duration_sec: 10
          text:
            ru: 'Друг говорит: «Я прыгаю дальше всех в классе!» Как проверить?

              '
            uk: 'Друг говорить: «Я стрибаю дальше всіх у класі!» Як перевірити?'
            en: 'A friend says: ''I jump farther than anyone in class!'' How do you
              check?'
          options:
            - id: opt_1
              text:
                ru: Спросить учителя
                uk: Запитати учителя
                en: Ask the teacher
            - id: opt_2
              text:
                ru: Измерить рулеткой
                uk: Виміряти рулеткою
                en: Measure with a ruler
            - id: opt_3
              text:
                ru: Поверить на слово
                uk: Повірити на слово
                en: Believe them
          correct: opt_2
        - id: '3'
          type: speech
          duration_sec: 8
          text:
            ru: 'Измерить! Один из четырёх способов проверки — измерение. Рулетка
              не врёт, в отличие от друзей на перемене.

              '
            uk: Виміряти! Один з чотирьох способів перевірки — вимірювання. Рулетка
              не брехає, на відміну від друзів на перерві.
            en: Measure! Measurement is one of four ways to check. A ruler doesn't
              lie, unlike friends at break.
        - id: '4'
          type: vote
          duration_sec: 10
          text:
            ru: '«В нашей столовой самые вкусные котлеты в городе!» Какой способ проверки
              подойдёт?

              '
            uk: «У нашій їдальні найсмачніші котлети в місті!» Який спосіб перевірки
              підійде?
            en: '"Our cafeteria has the tastiest cutlets in the city!" What verification
              method fits?'
          options:
            - id: opt_1
              text:
                ru: Своими глазами (попробовать)
                uk: Своїми очима (спробувати)
                en: Your own eyes (taste it)
            - id: opt_2
              text:
                ru: Эксперимент
                uk: Експеримент
                en: Experiment
            - id: opt_3
              text:
                ru: Справочник
                uk: Довідник
                en: Reference
          correct: opt_1
        - id: '5'
          type: speech
          duration_sec: 8
          text:
            ru: 'Попробовать самому — проверка «своими глазами»! Правда, для чистоты
              эксперимента нужно объехать все столовые города. Удачи.

              '
            uk: Спробувати самому — перевірка «своїми очима»! Правда, для чистоти
              експерименту потрібно об'їхати всі їдальні міста. Удачі.
            en: Taste it yourself - checking 'with your own eyes!' True, for experimental
              purity you'd need to visit every cafeteria in the city. Good luck.
        - id: '6'
          type: vote
          duration_sec: 10
          text:
            ru: '«Я надела новые кроссовки — и пробежала быстрее всех!»

              '
            uk: «Я наділа нові кросівки — й пробігла швидше за всіх!»
            en: '"I put on new sneakers - and ran faster than everyone!"'
          options:
            - id: opt_1
              text:
                ru: Причина
                uk: Причина
                en: Cause
            - id: opt_2
              text:
                ru: Совпадение
                uk: Збіг
                en: Coincidence
          correct: opt_2
        - id: '7'
          type: speech
          duration_sec: 8
          text:
            ru: 'Совпадение! Кроссовки не дают суперскорость. Может, она просто хорошо
              выспалась. Или все остальные плохо.

              '
            uk: Збіг! Кросівки не дають надлюдської швидкості. Може, вона просто добре
              виспалася. Або всі інші погано.
            en: Coincidence! Sneakers don't give superhuman speed. Maybe she slept
              well. Or everyone else was off.
        - id: '8'
          type: vote
          duration_sec: 10
          text:
            ru: '«Полили цветок — он вырос.»

              '
            uk: «Полили квітку — вона виросла.»
            en: '"We watered the plant - and it grew."'
          options:
            - id: opt_1
              text:
                ru: Причина
                uk: Причина
                en: Cause
            - id: opt_2
              text:
                ru: Совпадение
                uk: Збіг
                en: Coincidence
          correct: opt_1
        - id: '9'
          type: speech
          duration_sec: 6
          text:
            ru: 'Причина! Вода нужна для роста — это доказано наукой, а не приметами.

              '
            uk: Причина! Вода потрібна для росту — це доведено наукою, а не приметами.
            en: Cause! Water is needed for growth - this is proven by science, not
              superstition.
        - id: '10'
          type: vote
          duration_sec: 10
          text:
            ru: 'Спор о дежурстве. Маша: «Сегодня твоя очередь мыть доску.» Петя:
              «А ты вчера опоздала на физру!»

              '
            uk: 'Спір про чергування. Маша: «Сьогодні твоя черга мити дошку.» Петя:
              «А ти вчора спізнилася на фізру!»'
            en: 'Argument about turns. Masha: ''It''s your turn to clean the board.''
              Petya: ''But you were late to PE yesterday!'''
          options:
            - id: opt_1
              text:
                ru: По теме
                uk: По темі
                en: On topic
            - id: opt_2
              text:
                ru: Уход от темы
                uk: Ухилення від теми
                en: Dodging the topic
          correct: opt_2
        - id: '11'
          type: speech
          duration_sec: 8
          text:
            ru: 'Классический уход! Вместо ответа про доску — нападение на Машу по
              другому поводу. Доска так и стоит грязная.

              '
            uk: Класичне ухилення! Замість ответу про дошку — напад на Машу з іншої
              підстави. Дошка так й стоїть брудна.
            en: Classic dodge! Instead of answering about the board - attacking Masha
              for something else. The board stays dirty.
        - id: '12'
          type: vote
          duration_sec: 10
          text:
            ru: '«НИКТО в нашем классе не любит читать!»

              '
            uk: «НІХТО в нашому класі не любить читати!»
            en: '"NOBODY in our class likes reading!"'
          options:
            - id: opt_1
              text:
                ru: Ловушка слов
                uk: Пастка слів
                en: Word trap
            - id: opt_2
              text:
                ru: Нормальное утверждение
                uk: Нормальне твердження
                en: Normal statement
          correct: opt_1
        - id: '13'
          type: speech
          duration_sec: 8
          text:
            ru: 'Ловушка! Слово «никто» — абсолютное. Достаточно одного книголюба,
              и утверждение рассыпается.

              '
            uk: Пастка! Слово «ніхто» — абсолютне. Достатньо одного книголюба, й твердження
              розпалось.
            en: Trap! The word 'nobody' is absolute. One book lover is enough to disprove
              it.
        - id: '14'
          type: vote
          duration_sec: 10
          text:
            ru: 'Тренер кричит: «Я никогда не опаздываю!» — а сам пришёл на 20 минут
              позже.

              '
            uk: 'Тренер кричить: «Я ніколи не спізнююся!» — а сам прийшов на 20 хвилин
              пізніше.'
            en: 'Coach yells: ''I never arrive late!'' - but showed up 20 minutes
              late.'
          options:
            - id: opt_1
              text:
                ru: Противоречие
                uk: Суперечність
                en: Contradiction
            - id: opt_2
              text:
                ru: Всё нормально
                uk: Все нормально
                en: Everything's fine
          correct: opt_1
        - id: '15'
          type: speech
          duration_sec: 8
          text:
            ru: 'Противоречие! Слова говорят одно, ноги делают другое. Верим действиям
              — они не умеют врать.

              '
            uk: Суперечність! Слова говорять одне, ноги роблять інше. Вірмо діям —
              вони не вміють брехати.
            en: Contradiction! Words say one thing, feet do another. Believe actions
              - they can't lie.
        - id: '16'
          type: vote
          duration_sec: 10
          text:
            ru: 'Ты: «Не хочу есть суп.» Бабушка: «Ты хочешь ВООБЩЕ НИЧЕГО не есть?!»

              '
            uk: 'Ти: «Не хочу їсти суп.» Бабуся: «Ти хочеш ВЗАГАЛІ НІЧОГО не їсти?!»'
            en: 'You: ''I don''t want to eat soup.'' Grandma: ''So you don''t want
              to eat ANYTHING?!'''
          options:
            - id: opt_1
              text:
                ru: Пугало
                uk: Опудало
                en: Scarecrow
            - id: opt_2
              text:
                ru: Нормальный вопрос
                uk: Нормальне питання
                en: Normal question
          correct: opt_1
        - id: '17'
          type: speech
          duration_sec: 8
          text:
            ru: 'Пугало! «Не хочу суп» превратилось в «не хочу есть». Бабушка — мастер
              драматургии.

              '
            uk: Опудало! «Не хочу суп» перетворилось на «не хочу їсти». Бабуся — майстриня
              драматургії.
            en: Scarecrow! 'Don't want soup' turned into 'don't want to eat.' Grandma
              is a master dramatist.
        - id: '18'
          type: vote
          duration_sec: 10
          text:
            ru: '«Если не уберёшь комнату — мама расстроится, потом заболеет, потом
              всё будет ужасно!»

              '
            uk: «Якщо не приберешь кімнату — мама розстроїться, потім захворіє, потім
              все буде жахливо!»
            en: '"If you don''t clean your room - mom will be upset, then she''ll
              get sick, then everything will be terrible!"'
          options:
            - id: opt_1
              text:
                ru: Страшная цепочка
                uk: Страшна ланцюжок
                en: Scary chain
            - id: opt_2
              text:
                ru: Реальная угроза
                uk: Реальна загроза
                en: Real threat
          correct: opt_1
        - id: '19'
          type: speech
          duration_sec: 8
          text:
            ru: 'Страшная цепочка! Одна неубранная комната — и мир рушится. Сценаристы
              фильмов-катастроф завидуют.

              '
            uk: Страшна ланцюжок! Одна неприбрана кімната — й світ руйнується. Сценаристи
              фільмів-катастроф завидують.
            en: Scary chain! One messy room - and the world collapses. Disaster film
              writers are jealous.
        - id: '20'
          type: vote
          duration_sec: 10
          text:
            ru: '«Купи эти витамины — их рекомендует знаменитый актёр!» Какой способ
              убеждения?

              '
            uk: «Купи ці вітаміни — їх рекомендує знаменитий актор!» Який спосіб переконання?
            en: '"Buy these vitamins - a famous actor recommends them!" What''s the
              method of persuasion?'
          options:
            - id: opt_1
              text:
                ru: Доверие (авторитет)
                uk: Довіра (авторитет)
                en: Trust (authority)
            - id: opt_2
              text:
                ru: Эмоции
                uk: Емоції
                en: Emotions
            - id: opt_3
              text:
                ru: Факты
                uk: Факти
                en: Facts
          correct: opt_1
        - id: '21'
          type: speech
          duration_sec: 8
          text:
            ru: 'Доверие! Ставка на авторитет. Но актёр — не врач. Доверие заслуживает
              тот, кто разбирается в теме.

              '
            uk: Довіра! Ставка на авторитет. Але актор — не лікар. Довіра заслуговує
              той, хто розбирається в темі.
            en: Trust! Bet on authority. But an actor isn't a doctor. Trust goes to
              someone who knows the subject.
        - id: '22'
          type: vote
          duration_sec: 10
          text:
            ru: '«Ты уже перестал списывать у соседа?»

              '
            uk: «Ти вже перестав списувати у сусіда?»
            en: '"Have you stopped copying from your neighbor?"'
          options:
            - id: opt_1
              text:
                ru: Нормальный вопрос
                uk: Нормальне питання
                en: Normal question
            - id: opt_2
              text:
                ru: Вопрос-ловушка
                uk: Питання-пастка
                en: Trap question
          correct: opt_2
        - id: '23'
          type: speech
          duration_sec: 8
          text:
            ru: 'Ловушка! Внутри спрятано утверждение «ты списывал». Любой ответ —
              капкан. Правильная реакция: «В вопросе скрыто ложное утверждение!»

              '
            uk: 'Пастка! Всередині спрятано твердження «ти списував». Будь-яка ответ
              — капкан. Правильна реакція: «У питанні схована хибна претензія!»'
            en: 'Trap! Hidden inside is the claim ''you copied.'' Any answer is a
              trap. Right response: ''There''s a false assumption in that question!'''
        - id: '24'
          type: vote
          duration_sec: 10
          text:
            ru: '«Известный футболист говорит, что эта диета работает!»

              '
            uk: «Відомий футболіст говорить, що ця дієта спрацює!»
            en: '"A famous football player says this diet works!"'
          options:
            - id: opt_1
              text:
                ru: Настоящий авторитет
                uk: Справжній авторитет
                en: Real authority
            - id: opt_2
              text:
                ru: Ложный авторитет
                uk: Хибний авторитет
                en: False authority
          correct: opt_2
        - id: '25'
          type: speech
          duration_sec: 8
          text:
            ru: 'Ложный! Футболист — эксперт в мяче, а не в диетологии. Мяч бы у него
              спрашивали — тот точно в форме.

              '
            uk: Хибний! Футболіст — експерт у м'ячі, а не в дієтології. М'яч у нього
              b спросили — той точно в формі.
            en: False! A football player is an expert in the ball, not dietetics.
              Ask the ball about him - it's definitely in shape.
        - id: '26'
          type: vote
          duration_sec: 10
          text:
            ru: '«У нас свободное время — значит, можно делать ЧТО УГОДНО!»

              '
            uk: «У нас вільний час — значить можна робити ЩО ЗАВГОДНО!»
            en: '"We have free time - so we can do WHATEVER!"'
          options:
            - id: opt_1
              text:
                ru: Подмена понятий
                uk: Підмена понять
                en: Substituting concepts
            - id: opt_2
              text:
                ru: Нормальная логика
                uk: Нормальна логіка
                en: Normal logic
          correct: opt_1
        - id: '27'
          type: speech
          duration_sec: 8
          text:
            ru: 'Подмена! «Свободное» подменили на «без правил». Свободное время —
              не джунгли. Правила никто не отменял.

              '
            uk: Підмена! «Вільне» підмінили на «без правил». Вільний час — не джунглі.
              Правила ніхто не скасовував.
            en: Substitution! 'Free' was replaced with 'no rules.' Free time isn't
              a jungle. Rules still apply.
        - id: '28'
          type: vote
          duration_sec: 10
          text:
            ru: '«Шоколадное мороженое вкуснее ванильного.»

              '
            uk: «Шоколадне морозиво смачніше за ванільне.»
            en: '"Chocolate ice cream tastes better than vanilla."'
          options:
            - id: opt_1
              text:
                ru: Факт
                uk: Факт
                en: Fact
            - id: opt_2
              text:
                ru: Мнение
                uk: Думка
                en: Opinion
            - id: opt_3
              text:
                ru: Неправда
                uk: Неправда
                en: Falsehood
          correct: opt_2
        - id: '29'
          type: speech
          duration_sec: 6
          text:
            ru: 'Мнение! Вкус — это субъективно. Ванильные фанаты с вами не согласны.

              '
            uk: Думка! Смак — це суб'єктивно. Ванільні фанати з вами не згідні.
            en: Opinion! Taste is subjective. Vanilla fans would disagree.
        - id: '30'
          type: vote
          duration_sec: 10
          text:
            ru: '«Луна вращается вокруг Земли.»

              '
            uk: «Місяць обертається навколо Землі.»
            en: '"The Moon orbits the Earth."'
          options:
            - id: opt_1
              text:
                ru: Факт
                uk: Факт
                en: Fact
            - id: opt_2
              text:
                ru: Мнение
                uk: Думка
                en: Opinion
            - id: opt_3
              text:
                ru: Неправда
                uk: Неправда
                en: Falsehood
          correct: opt_1
        - id: '31'
          type: speech
          duration_sec: 6
          text:
            ru: 'Факт! Проверяемый, доказанный, с формулами и телескопами. Луна не
              отпирается.

              '
            uk: Факт! Перевіряємий, доведений, з формулами й телескопами. Місяць не
              заперечує.
            en: Fact! Verifiable, proven, with formulas and telescopes. The Moon doesn't
              deny it.
    - scene_id: sc2
      title:
        ru: ДЕМАГОГИЯ ИЛИ НЕТ?
        uk: ДЕМАГОГІЯ ЧИ НІ?
        en: DEMAGOGUERY OR NOT?
      media_ref: 12A.sc2.demagogy_or_not
      status: v3_locked
      steps:
        - id: '32'
          type: speech
          duration_sec: 12
          text:
            ru: 'Теперь — быстрый блиц! Я говорю фразу, вы решаете: это демагогия
              или честный аргумент? Только два варианта — никаких подвохов!

              '
            uk: 'Тепер — швидкий блиц! Я кажу фразу, ви вирішуєте: це демагогія чи
              чесний аргумент? Тільки два варіанти — ніяких підвохів!'
            en: 'Now - quick blitz! I say a phrase, you decide: demagoguery or honest
              argument? Only two options - no tricks!'
        - id: '33'
          type: vote
          duration_sec: 10
          text:
            ru: '«Все нормальные дети уже это посмотрели!»

              '
            uk: «Усі нормальні діти вже це переглянули!»
            en: '"All normal kids have already watched this!"'
          options:
            - id: opt_1
              text:
                ru: Демагогия
                uk: Демагогія
                en: Demagoguery
            - id: opt_2
              text:
                ru: Честный аргумент
                uk: Чесний аргумент
                en: Honest argument
          correct: opt_1
        - id: '34'
          type: speech
          duration_sec: 6
          text:
            ru: 'Демагогия — поспешное обобщение! Кто эти «все»? Перепись проводили?

              '
            uk: Демагогія — поспішне узагальнення! Хто ці «всі»? Перепис проводили?
            en: Demagoguery - hasty generalization! Who is 'all'? Did you count everyone?
        - id: '35'
          type: vote
          duration_sec: 10
          text:
            ru: '«Мне кажется, лучше начать с математики — она сложнее и требует свежей
              головы.»

              '
            uk: «Мені здається, краще почати з математики — вона складніша й потребує
              свіжої голови.»
            en: '"I think it''s better to start with math - it''s harder and needs
              a fresh mind."'
          options:
            - id: opt_1
              text:
                ru: Демагогия
                uk: Демагогія
                en: Demagoguery
            - id: opt_2
              text:
                ru: Честный аргумент
                uk: Чесний аргумент
                en: Honest argument
