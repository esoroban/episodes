lesson:
  id: lesson_12B
  day: 12
  slot: B
  title:
    ru: Что такое манипуляция
    uk: Що таке маніпуляція
    en: What is Manipulation
  scenes:
    - scene_id: sc1
      title:
        ru: МОСТ ОТ ДЕМАГОГИИ К МАНИПУЛЯЦИИ
        uk: МІСТ ВІД ДЕМАГОГІЇ ДО МАНІПУЛЯЦІЇ
        en: BRIDGE FROM DEMAGOGUERY TO MANIPULATION
      media_ref: 12B.sc1.bridge_to_manipulation
      status: v3_locked
      steps:
        - id: '1'
          type: speech
          duration_sec: 14
          text:
            ru: 'Итак, мы теперь эксперты по демагогии! 12 видов хитростей для ума
              — и на каждую у нас есть универсальный ответ: «Это демагогия. Где факты?»

              '
            uk: 'Отже, ми тепер експерти з демагогії! 12 видів хитростей для розуму
              — і на кожну у нас є універсальна відповідь: «Це демагогія. Де факти?»'
            en: 'So now we''re experts on demagoguery! Twelve types of tricks for
              the mind — and we have a universal answer for each: "That''s demagoguery.
              Where are the facts?"'
        - id: '2'
          type: speech
          duration_sec: 16
          text:
            ru: 'Демагогией пользуются политики, рекламщики, блогеры — все, кто хочет
              убедить словами. Но есть люди, которым слова не нужны. Им достаточно
              одного взгляда — и тебе уже стыдно.

              '
            uk: Демагогією користуються політики, рекламники, блогери — всі, хто хоче
              переконати словами. Але є люди, яким слова не потрібні. Їм достатньо
              одного погляду — і тобі вже стидно.
            en: Demagoguery is used by politicians, advertisers, and bloggers — everyone
              who wants to convince you with words. But some people don't need words.
              One look is enough to make you ashamed.
        - id: '3'
          type: speech
          duration_sec: 16
          text:
            ru: 'Представьте: никто не обманывает ваш разум. Не путает логику, не
              передёргивает факты. А вам всё равно хочется согласиться. Не потому
              что убедили — а потому что НЕПРИЯТНО отказать.

              '
            uk: 'Уявіть: ніхто не обманює ваш розум. Не плутає логіку, не передергує
              факти. А вам все одно хочеться погодитися. Не тому що переконали — а
              тому що НЕПРИЄМНО відмовити.'
            en: 'Imagine: nobody is deceiving your mind. Not twisting logic, not distorting
              facts. Yet you still want to agree. Not because you''re convinced —
              but because it feels UNCOMFORTABLE to refuse.'
        - id: '4'
          type: speech
          duration_sec: 16
          text:
            ru: 'Это потому что давят не на ГОЛОВУ, а на СЕРДЦЕ. Не на разум — а на
              чувства. И этим приёмом пользуются ВСЕ: родители, друзья, реклама, даже
              домашние коты. Имя приёма — манипуляция.

              '
            uk: 'Це тому що давлять не на ГОЛОВУ, а на СЕРЦЕ. Не на розум — а на почуття.
              І цим прийомом користуються ВСІ: батьки, друзі, реклама, навіть домашні
              коти. Ім''я прийому — маніпуляція.'
            en: 'It''s because they''re pressing not on your HEAD, but on your HEART.
              Not on your mind — but on your feelings. And EVERYONE uses this trick:
              parents, friends, advertisers, even pet cats. The name of this trick
              is manipulation.'
        - id: '5'
          type: speech
          duration_sec: 14
          text:
            ru: 'Манипуляция — древнейшее оружие. Юлий Цезарь манипулировал сенаторами.
              Реклама манипулирует покупателями. А младший брат манипулирует, когда
              плачет погромче при маме.

              '
            uk: Маніпуляція — давня зброя. Юлій Цезар маніпулював сенаторів. Реклама
              маніпулює покупців. А молодший брат маніпулює, коли плаче гучніше при
              мамі.
            en: Manipulation is an ancient weapon. Julius Caesar manipulated senators.
              Advertising manipulates buyers. And your little brother manipulates
              when he cries louder in front of Mom.
        - id: '6'
          type: speech
          duration_sec: 12
          text:
            ru: 'После этого урока у вас будет ДВА суперответа. На демагогию — «Где
              факты?» А на манипуляцию — узнаете через двадцать минут!

              '
            uk: Після цього уроку у вас буде ДВА супер-ответи. На демагогію — «Де
              факти?» А на маніпуляцію — дізнаєтеся через двадцять хвилин!
            en: After this lesson, you'll have TWO super-answers. For demagoguery
              — "Where are the facts?" And for manipulation — you'll find out in twenty
              minutes!
    - scene_id: sc2
      title:
        ru: 'ИСТОРИЯ: ДРУГ ИЛИ МАНИПУЛЯТОР?'
        uk: 'ІСТОРІЯ: ДРУГ ЧИ МАНІПУЛЯТОР?'
        en: 'STORY: FRIEND OR MANIPULATOR?'
      media_ref: 12B.sc2.story_friend_or_manipulator
      status: v3_locked
      steps:
        - id: '7'
          type: speech
          duration_sec: 14
          text:
            ru: 'А сейчас — история. Слушайте внимательно, потому что потом я спрошу:
              что здесь было не так? И подсказка — это НЕ демагогия.

              '
            uk: 'А тепер — історія. Слухайте уважно, тому що потім я запитаю: що тут
              було не так? І підказка — це НЕ демагогія.'
            en: 'Now for a story. Listen carefully, because I''ll ask you afterward:
              what was wrong with this? And here''s a hint — it''s NOT demagoguery.'
        - id: '8'
          type: speech
          duration_sec: 16
          text:
            ru: 'В класс пришёл новенький — Гриша. Весёлый, общительный, сразу подружился
              со всеми. Особенно с Машей — она сидела рядом и угощала его печеньем
              на переменах.

              '
            uk: До класу прийшов новенький — Гриша. Веселий, товариський, одразу подружився
              зі всіма. Особливо з Машею — вона сиділа рядом і пригощала його печивом
              на переменах.
            en: A new student named Grisha came to class. He was funny, friendly,
              and quickly made friends with everyone. Especially with Masha — she
              sat next to him and shared cookies with him during breaks.
        - id: '9'
          type: speech
          duration_sec: 16
          text:
            ru: 'Через неделю Гриша привык. Каждую перемену подходил: «Маш, а у тебя
              сегодня есть печеньки?» Маша делилась — ей было приятно. Друзья же!

              '
            uk: 'Через тиждень Гриша звик. Кожну перемену підходив: «Маш, а у тебе
              сьогодні є печива?» Маша ділилася — їй було приємно. Ж друзі ж!'
            en: 'After a week, Grisha got comfortable. Every break he''d come up:
              "Masha, do you have cookies today?" She''d share — it made her happy.
              Friends do that!'
        - id: '10'
          type: speech
          duration_sec: 16
          text:
            ru: 'Но однажды Маша сказала: «Сегодня нет, мама не положила.» И Гриша
              вздохнул: «Жааалко... Хорошие подруги обычно делятся. Ты ведь хорошая
              подруга?»

              '
            uk: 'Але одного разу Маша сказала: «Сьогодні нема, мама не поклала.» І
              Гриша зітхнув: «Шкода... Хорошы подруги зазвичай діляться. Ти ж хороша
              подруга?»'
            en: 'But one day Masha said: "I don''t have any today — Mom didn''t pack
              any." And Grisha sighed: "That''s too bad... Good friends usually share.
              You''re a good friend, right?"'
        - id: '11'
          type: speech
          duration_sec: 14
          text:
            ru: 'Маша замерла. Печенья нет. Но отказать — значит «плохая подруга»?
              Она побежала и отдала Грише свой бутерброд. Хотя сама осталась голодная.

              '
            uk: Маша застигла. Печива нема. Але відмовити — значить «погана подруга»?
              Вона побігла і віддала Грішу свій бутерброд. Хоча сама залишилась голодна.
            en: Masha froze. No cookies. But refusing means she's a "bad friend"?
              She ran and gave Grisha her sandwich. Even though she stayed hungry.
        - id: '12'
          type: speech
          duration_sec: 16
          text:
            ru: 'На следующий день Гриша снова: «Маш, ты же не жадная? Жадных никто
              не любит...» И Маша снова отдала. И на следующий день. И ещё. Каждый
              раз ей было неприятно, но отказать — страшно.

              '
            uk: 'На наступний день Гриша знову: «Маш, ти ж не жадна? Жадних ніхто
              не любить...» І Маша знову віддала. І на наступний день. І ще. Кожен
              раз їй було неприємно, але відмовити — страшно.'
            en: 'The next day Grisha again: "Masha, you''re not stingy, are you? Nobody
              likes stingy people..." And Masha gave in again. And the next day. And
              again. Every time she felt bad about it, but saying no felt scary.'
        - id: '13'
          type: speech
          duration_sec: 14
          text:
            ru: 'Через месяц Маша ненавидела перемены. Ей было противно, что она каждый
              раз отдаёт — но НЕ ПОНИМАЛА, почему не может сказать «нет». Ведь Гриша
              не кричал, не обзывался, не угрожал.

              '
            uk: Через місяць Маша ненавиділа перемени. Їй було огидно, що вона кожен
              раз віддає — але НЕ РОЗУМІЛА, чому не може сказати «ні». Адже Гриша
              не кричав, не ображав, не погрожував.
            en: After a month, Masha hated breaks. She felt disgusted that she kept
              giving in — but she DIDN'T UNDERSTAND why she couldn't say "no." Grisha
              didn't yell at her, didn't insult her, didn't threaten her.
        - id: '14'
          type: speech
          duration_sec: 14
          text:
            ru: 'Вот вопрос: Гриша использовал демагогию? Логические хитрости? Подменял
              слова? Нет. Он вообще ничего не доказывал! Тогда ЧТО он делал?

              '
            uk: 'Ось питання: Гриша використовував демагогію? Логічні хитрощі? Підмінював
              слова? Ні. Він взагалі нічого не доводив! Тоді ЩО він робив?'
            en: 'Here''s the question: Did Grisha use demagoguery? Logical tricks?
              Twist words? No. He wasn''t even trying to prove anything! So what WAS
              he doing?'
        - id: '15'
          type: vote
          duration_sec: 12
          text:
            ru: 'Что делал Гриша?

              '
            uk: Що робив Гриша?
            en: What was Grisha doing?
          options:
            - id: opt_1
              text:
                ru: Честно просил
                uk: Чесно просив
                en: Asking honestly
            - id: opt_2
              text:
                ru: Использовал демагогию
                uk: Використовував демагогію
                en: Using demagoguery
            - id: opt_3
              text:
                ru: Давил на чувства
                uk: Маніпулював
                en: Manipulating
          correct: opt_3
        - id: '16'
          type: speech
          duration_sec: 14
          text:
            ru: 'Именно — давил на чувства! Гриша не обманывал разум Маши. Он заставлял
              её ЧУВСТВОВАТЬ себя плохой. «Жадная», «плохая подруга» — это не логика.
              Это давление на эмоции.

              '
            uk: Усі три варіанти одночасно
            en: Exactly - he pressed on the feelings! Grisha did not deceive Masha's
              mind. He made her FEEL bad. “Greedy”, “bad friend” is not logic. This
              is pressure on emotions.
        - id: '17'
          type: vote
          duration_sec: 12
          text:
            ru: 'Какое чувство Гриша вызывал у Маши?

              '
            uk: 'Правильна відповідь: Маніпулював'
            en: 'Correct answer: Manipulating'
          options:
            - id: opt_1
              text:
                ru: Страх
                uk: Гриша маніпулював Машею, тому що...
                en: Grisha was manipulating Masha because...
            - id: opt_2
              text:
                ru: Вину
                uk: '...він викликав у неї почуття вини і стиду'
                en: '...he was making her feel guilty and ashamed'
            - id: opt_3
              text:
                ru: Стыд
                uk: '...він розумів, що вона не може відмовити, якщо боїться бути
                  поганою'
                en: '...he knew she couldn''t refuse if she was afraid of being bad'
            - id: opt_4
              text:
                ru: Радость
                uk: '...він працював з чувствами, а не з розумом'
                en: '...he was appealing to her feelings, not her mind'
          correct: opt_2
        - id: '18'
          type: speech
          duration_sec: 14
          text:
            ru: 'Вину! «Ты же хорошая подруга?» = «Если откажешь — ты плохая.» Маша
              каждый раз чувствовала себя виноватой. Хотя виноватой не была. Это и
              есть манипуляция.

              '
            uk: РІЗНИЦЯ ДЕМАГОГІЇ ТА МАНІПУЛЯЦІЇ
            en: THE DIFFERENCE BETWEEN DEMAGOGUERY AND MANIPULATION
        - id: '19'
          type: speech
          duration_sec: 16
          text:
            ru: 'А вот честная просьба звучит иначе: «Маш, можешь поделиться? Если
              нет — ничего страшного, я в столовой куплю.» Чувствуете разницу? При
              честной просьбе можно отказать БЕЗ чувства вины.

              '
            uk: Демагогія атакує РОЗУМ. Вона каже красиві слова, перекручує факти,
              клює в логіку.
            en: Demagoguery attacks your MIND. It uses pretty words, twists facts,
              and pokes holes in logic.
    - scene_id: sc3
      title:
        ru: 'ТЕОРИЯ: ОПРЕДЕЛЕНИЕ + 4 ТИПА МАНИПУЛЯЦИИ'
        uk: 'Маніпуляція атакує СЕРЦЕ. Вона викликає почуття: стид, страх, вину, гордість
          — і ти робиш, що вона хоче.'
        en: 'Manipulation attacks your HEART. It triggers feelings: shame, fear, guilt,
          pride — and you do what it wants.'
      media_ref: 12B.sc3.theory_manipulation_types
      status: v3_locked
      steps:
        - id: '20'
          type: speech
          duration_sec: 16
          text:
            ru: 'Итак, у нас теперь есть слово для того, что Гриша делал. Манипуляция
              — это когда человек давит на ЧУВСТВА, чтобы заставить тебя что-то сделать.
              Не на разум — на эмоции.

              '
            uk: При демагогії ти знаєш аргументи, але не вірниш їм. При маніпуляції
              ти знаєш аргументи, але не можеш їм противитися.
            en: With demagoguery, you know the arguments but don't believe them. With
              manipulation, you know the arguments but can't resist them.
        - id: '21'
          type: speech
          duration_sec: 16
          text:
            ru: 'Запомните главный признак: после манипуляции тебе ПЛОХО — стыдно,
              страшно, виновато — но ты не понимаешь, ПОЧЕМУ должен соглашаться. Логика
              говорит «не надо», а внутри всё сжимается.

              '
            uk: ЯК РОЗПІЗНАТИ МАНІПУЛЯЦІЮ
            en: 'Remember the main sign: after the manipulation you feel BAD - ashamed,
              scared, guilty - but you don’t understand WHY you should agree. Logic
              says “no need”, but everything shrinks inside.'
        - id: '22'
          type: speech
          duration_sec: 14
          text:
            ru: 'Демагог запутывает голову. Манипулятор сжимает сердце. Демагогу мы
              говорим: «Где факты?» А манипулятору — скоро узнаете!

              '
            uk: Люди часто використовують маніпуляцію, тому що вона працює. Ось як
              вона виглядає.
            en: People use manipulation all the time because it works. Here's what
              it looks like.
        - id: '23'
          type: speech
          duration_sec: 14
          text:
            ru: 'Манипуляция бывает четырёх видов. Как четыре кнопки, на которые давят.
              У каждого человека какая-то кнопка больше — и манипуляторы это чувствуют.

              '
            uk: МАНІПУЛЯЦІЯ ЧЕРЕЗ ВИНУ
            en: There are four types of manipulation. Like four buttons being pressed.
              Each person has a larger button, and manipulators feel it.
        - id: '24'
          type: speech
          duration_sec: 16
          text:
            ru: 'Кнопка первая — ВИНА. «Я столько для тебя сделал, а ты...» «Из-за
              тебя мне грустно.» «Ты же не хочешь меня расстроить?» Цель: чтобы ты
              чувствовал себя виноватым и согласился.

              '
            uk: «Я все для тебе роблю, а ти навіть цього не можеш?»
            en: '"I do everything for you, and you can''t even do this?"'
        - id: '25'
          type: speech
          duration_sec: 16
          text:
            ru: 'Кнопка вторая — СТРАХ. «Если не сделаешь — будет плохо!» «Все от
              тебя отвернутся!» «Тогда мы больше не друзья!» Цель: чтобы ты испугался
              последствий и согласился.

              '
            uk: «Ми тебе з таким трудом виховували!»
            en: '"We went through so much to raise you!"'
        - id: '26'
          type: speech
          duration_sec: 16
          text:
            ru: 'Кнопка третья — СТЫД. «Что, боишься? Трусишка!» «Только маленькие
              так поступают!» «Тебе не стыдно?» Цель: чтобы тебе стало стыдно и ты
              согласился — лишь бы не быть «трусом» или «малышом».

              '
            uk: 'Ефект: ти почуваєш себе винним, навіть якщо нічого поганого не зробив.'
            en: 'Effect: You feel guilty even though you haven''t done anything wrong.'
        - id: '27'
          type: speech
          duration_sec: 16
          text:
            ru: 'Кнопка четвёртая — ШАНТАЖ ДРУЖБОЙ. «Настоящие друзья так не поступают!»
              «Если ты мне друг — сделай это!» Цель: чтобы ты доказывал дружбу поступком,
              который тебе НЕ нравится.

              '
            uk: МАНІПУЛЯЦІЯ ЧЕРЕЗ СТРАХ
            en: 'Button four - BLACKMAIL WITH FRIENDSHIP. “Real friends don’t do that!”
              “If you are my friend, do it!” Goal: for you to prove friendship by
              an action that you DO NOT like.'
        - id: '28'
          type: speech
          duration_sec: 14
          text:
            ru: 'Четыре кнопки: вина, страх, стыд, шантаж дружбой. Манипулятор ищет,
              какая у тебя самая большая, — и давит. Как в лифте: нажал нужную кнопку
              — и ты едешь куда ОН хочет.

              '
            uk: «Якщо не будеш слухатися, ми тебе більше не любитимемо!»
            en: '"If you don''t listen, we won''t love you anymore!"'
        - id: '29'
          type: speech
          duration_sec: 14
          text:
            ru: 'А теперь — универсальный ответ на любую манипуляцию. Запоминайте:
              «Это манипуляция. Давай по существу.» Работает на все четыре кнопки.
              Как «Где факты?» — но для эмоций.

              '
            uk: «Всі знають, що ти брав без дозволу — всі тобою гидять!»
            en: '"Everyone knows you took it without asking — everyone thinks you''re
              disgusting!"'
    - scene_id: sc4
      title:
        ru: ДЕМАГОГИЯ ИЛИ МАНИПУЛЯЦИЯ? 12 ИСТОРИЙ
        uk: 'Ефект: ти робиш, що просять, тому що боїшся ще гірших наслідків.'
        en: 'Effect: You do what they ask because you''re afraid of worse consequences.'
      media_ref: 12B.sc4.demagogy_vs_manipulation
      status: v3_locked
      steps:
        - id: '30'
          type: speech
          duration_sec: 14
          text:
