    steps:
    - id: '154'
      type: speech
      duration_sec: 15
      text:
        ru: 'Отлично! Запомним главное за сегодня.

          '
        uk: Чудово! Запам'ятаємо головне за сьогодні.
        en: Great! Let's remember the main points from today.
    - id: '155'
      type: speech
      duration_sec: 20
      text:
        ru: 'ПРИЧИНА И СЛЕДСТВИЕ — одно событие вызывает другое. Тест: мысленно убери первое — второе не случится? Значит,
          причина настоящая. Убери кнопку — свет не включится. Убери мяч — окно целое. Убери завтрак... ну, тогда будет грустно.

          '
        uk: 'ПРИЧИНА І НАСЛІДОК — одна подія викликає іншу. Тест: подумки видали першу — друга не статися? Значить, причина
          справжня. Видали кнопку — світло не включиться. Видали м''яч — вікно ціле. Видали сніданок... ну, тоді буде сумно.'
        en: 'CAUSE AND EFFECT — one event causes another. Test: remove the first in your mind — will the second not happen?
          Then it''s a real cause. Remove the button — the light won''t turn on. Remove the ball — the window stays whole.
          Remove breakfast... well, then it''s sad.'
    - id: '156'
      type: speech
      duration_sec: 15
      text:
        ru: 'СОВПАДЕНИЕ — два события просто рядом. Тест: убери первое — второе ВСЁ РАВНО случится. Убери чих — грузовик проедет.
          Убери футболку — контрольная та же. Убери банан — гол всё равно забьёшь. Мир не развалится!

          '
        uk: 'ЗБІГ — дві події просто поруч. Тест: видали першу — друга ВСЕ ОДНО статиметься. Видали чхання — вантажівка проїде.
          Видали футболку — контрольна та сама. Видали банан — гол все одно забиєш. Світ не розвалиться!'
        en: 'COINCIDENCE — two events just happen next to each other. Test: remove the first — the second STILL happens. Remove
          a sneeze — the truck still passes. Remove the shirt — the test is still the same. Remove the banana — you''ll still
          score. The world won''t fall apart!'
    - id: '157'
      type: speech
      duration_sec: 18
      text:
        ru: 'ПОСЛЕ — НЕ ЗНАЧИТ ВСЛЕДСТВИЕ. Самая хитрая ловушка: мозг видит «сначала одно, потом другое» и кричит: «Связь!»
          А на самом деле — время не доказательство. Петух кукарекает перед восходом, но он не включает солнце. Как бы ему
          этого ни хотелось!

          '
        uk: 'ПІСЛЯ — НЕ ОЗНАЧАЄ ВНАСЛІДОК. Найхитріша пастка: мозок бачить «спочатку одне, потім інше» і кричить: «Зв''язок!»
          А насправді — час — не доказ. Петух кукарічає перед сходом, але він не включає сонце. Як би йому цього ні хотілося!'
        en: 'AFTER does not mean BECAUSE OF. The trickiest trap: the brain sees ''first one, then another'' and shouts: ''Connection!''
          But really — time is not proof. A rooster crows before sunrise, but he doesn''t turn on the sun. Wish as he might!'
    - id: '158'
      type: speech
      duration_sec: 20
      text:
        ru: 'ТРЕТЬЯ ПРИЧИНА — кукловод за ширмой, который дёргает за две верёвочки. Мороженое и ожоги? Жара! Ласточки и дождь?
          Влажный воздух! Ёлки и мандарины? Новый год! Когда два события ходят парой — ищите кукловода.

          '
        uk: ТРЕТЯ ПРИЧИНА — лялька-мастак за ширмою, що дергає за дві мотузки. Морозиво й опіки? Спека! Ластівки й дощ? Вологе
          повітря! Ялинки й мандарини? Новий рік! Коли два Події ходять парою — шукайте ляльку-мастака.
        en: THE THIRD REASON — the puppet master behind the curtain pulling two strings. Ice cream and burns? Heat! Swallows
          and rain? Humid air! Fir trees and mandarins? New Year! When two events go together — look for the puppet master.
    - id: '159'
      type: speech
      duration_sec: 15
      text:
        ru: 'Два вопроса-спасателя. Первый: «А что ЕЩЁ могло повлиять?» — это ваш детектор третьей причины. Второй: «А бывает
          ОДНО без другого?» — если да, связи нет. Два вопроса — и вы уже детективы!

          '
        uk: 'Два запитання-рятувальники. Перше: «А що ЩЕ могло вплинути?» — це ваш детектор третьої причини. Друге: «А бувають
          ОДНЕ без іншого?» — якщо так, зв''язку немає. Два запитання — і ви вже детективи!'
        en: 'Two rescue questions. First: ''What else could have affected this?'' — that''s your hidden-cause detector. Second:
          ''Can one happen without the other?'' — if yes, there''s no connection. Two questions — and you''re already detectives!'
    - id: '160'
      type: speech
      duration_sec: 15
      text:
        ru: 'ГДЕ ИСКАТЬ ЛОВУШКИ: в рекламе — «пей наш сок и будешь как чемпион!», у друзей — «купи такой же и будешь популярным!»,
          в обвинениях — «ты пришёл и всё сломалось!» Когда слышите такое — включайте детектива!

          '
        uk: 'ДЕ ШУКАТИ ПАСТКИ: у рекламі — «пий наш сік і будеш як чемпіон!», у друзів — «купи такий самий й будеш популярним!»,
          в звинуваченнях — «ти прийшов і все зламалось!» Коли чуєте таке — включайте детектива!'
        en: 'WHERE TO FIND TRAPS: in ads — ''drink our juice and be like a champion!'', from friends — ''buy the same and
          you''ll be popular!'', in accusations — ''you came and everything broke!'' When you hear that — turn on your detective!'
    - id: '161'
      type: speech
      duration_sec: 15
      text:
        ru: 'Домашняя игра «Детектив связей»! За день заметь ДВА случая, когда два события произошли рядом. Запиши и определи:
          причина, совпадение или третья причина? Бонус: найди в рекламе пример ловушки третьей причины! На следующем занятии
          поделимся находками!

          '
        uk: 'Домашня гра «Детектив зв''язків»! За день помітьте ДВА випадки, коли дві події сталися поруч. Запиши й визнач:
          причина, збіг або третя причина? Бонус: знайди в рекламі приклад пастки третьої причини! На наступному занятті поділимось
          знахідками!'
        en: 'Home game: ''Connection Detective''! In a day, notice TWO examples where two events happened close together.
          Write them down and decide: cause, coincidence, or hidden cause? Bonus: find an ad with a hidden-cause trap! We''ll
          share our findings next lesson!'
