lesson:
  id: lesson_2B
  day: 2
  slot: B
  title:
    ru: Причина и следствие
    uk: Причина та наслідок
    en: Cause and Effect
  scenes:
  - scene_id: sc1
    title:
      ru: ОТКРЫТИЕ + ИСТОРИЯ
      uk: ВІДКРИТТЯ + ІСТОРІЯ
      en: DISCOVERY + STORY
    media_ref: 2B.sc1.opening_story
    status: v3_locked
    steps:
    - id: '1'
      type: speech
      duration_sec: 12
      text:
        ru: 'После перерыва продолжаем! На прошлом уроке мы поймали наш мозг за руку — он обожает придумывать связи. Носки,
          кошки, футболки — мозг видит правило, а на самом деле это совпадение. Но вот вопрос посложнее...

          '
        uk: Після перерви продовжуємо! На минулому уроці ми спіймали наш мозок за руку — він обожає придумувати зв'язки. Шкарпетки,
          коти, футболки — мозок бачить правило, а насправді це збіг. Але ось питання складніше...
        en: After the break, we continue! Last lesson we caught our brain red-handed — it loves making connections. Socks,
          cats, shirts — the brain sees a rule, but really it's a coincidence. But here's a harder question...
    - id: '2'
      type: speech
      duration_sec: 15
      text:
        ru: 'Слушайте историю. Петрик вышел на улицу и съел мороженое. Через десять минут пошёл дождь. Петрик прибежал домой
          мокрый и сказал маме: «Это из-за мороженого! Я его съел — и дождь начался!»

          '
        uk: 'Слухайте історію. Петрик вийшов на вулицю та з''їв морозиво. Через десять хвилин пішов дощ. Петрик прибіг додому
          мокрий та сказав мамі: «Це через морозиво! Я його з''їв — і дощ почався!»'
        en: 'Listen to this story. Petrik went outside and ate ice cream. Ten minutes later, it started raining. Petrik came
          home wet and told his mom: "It''s because of the ice cream! I ate it — and then it rained!"'
    - id: '3'
      type: discussion
      duration_sec: 20
      text:
        ru: 'Кто считает, что Петрик прав — мороженое вызвало дождь? Смелее, никто не будет смеяться!

          '
        uk: Хто думає, що Петрик правий — морозиво вилікло дощ? Сміліше, ніхто не буде сміятися!
        en: Who thinks Petrik is right — that ice cream caused the rain? Don't be shy, nobody will laugh!
    - id: '4'
      type: speech
      duration_sec: 20
      text:
        ru: 'Конечно, мороженое не вызывает дождь. Но заметьте — Петрик не врёт и не выдумывает. Он видит: сначала мороженое,
          потом дождь. Одно за другим. И мозг подсказывает: «Ага! Значит, первое вызвало второе!» Знакомый трюк, правда?

          '
        uk: 'Звісно, морозиво не викликає дощ. Але зверніть увагу — Петрик не брешить і не вигадує. Він бачить: спочатку морозиво,
          потім дощ. Одне за іншим. І мозок підказує: «Ага! Значить, перше викликало друге!» Знайомий трюк, правда?'
        en: 'Of course, ice cream doesn''t cause rain. But notice — Petrik isn''t lying or making things up. He sees: ice
          cream first, then rain. One after another. And his brain says: "Aha! So the first caused the second!" Familiar trick,
          right?'
    - id: '5'
      type: speech
      duration_sec: 18
      text:
        ru: 'А вот ещё. «Я погладил кота — и мне позвонил друг. Значит, кот притягивает звонки!» Или: «Мама надела новое платье
          — и мы застряли в пробке. Платье виновато!» Звучит глупо? А люди так думают КАЖДЫЙ ДЕНЬ. И взрослые тоже!

          '
        uk: 'А ось ще. «Я погладив кота — і мені позвонив друг. Значить, кіт притягує дзвінки!» Або: «Мама надягла нову сукню
          — і ми застрягли в пробці. Сукня винна!» Звучить дивно? А люди так думають КОЖНИЙ ДЕНЬ. І дорослі теж!'
        en: 'Here''s another one. "I petted the cat — and my friend called. So the cat attracts phone calls!" Or: "Mom wore
          a new dress — and we got stuck in traffic. The dress is guilty!" Sounds silly? But people think this way EVERY DAY.
          Even adults!'
    - id: '6'
      type: speech
      duration_sec: 15
      text:
        ru: 'Сегодня разберёмся: когда одно событие РЕАЛЬНО вызывает другое, а когда наш мозг опять придумывает связи. И знаете
          что? Это одна из самых частых ошибок на планете. Даже учёные иногда попадаются!

          '
        uk: 'Сьогодні розберемось: коли одна подія СПРАВДІ викликає іншу, а коли наш мозок опять придумує зв''язки. І знаєте
          що? Це одна з найчастіших помилок на планеті. Навіть учені іноді потрапляються!'
        en: 'Today we''ll figure out: when one event REALLY causes another, and when our brain is making up connections. And
          you know what? This is one of the most common mistakes on the planet. Even scientists sometimes fall for it!'
    - id: '7'
      type: speech
      duration_sec: 10
      text:
        ru: А теперь послушайте интересную историю о Вите и его «счастливой» ручке.
        uk: А тепер послухайте цікаву історію про Віту та його «щасливу» ручку.
        en: Now listen to an interesting story about Vitya and his "lucky" pen.
    - id: '8'
      type: speech
      duration_sec: 14
      text:
        ru: Витя нашёл красивую ручку и начал ей писать. Контрольная — хорошая оценка! Ещё одна — опять хорошо! «Ручка волшебная!»
          — решил Витя.
        uk: Вітя знайшов гарну ручку та став нею писати. Контрольна — хороша оцінка! Ще одна — знову добре! «Ручка чарівна!»
          — вирішив Вітя.
        en: Vitya found a beautiful pen and started writing with it. Test — good grade! Another test — also good! "The pen
          is magic!" Vitya decided.
    - id: '9'
      type: speech
      duration_sec: 14
      text:
        ru: Но однажды Витя забыл ручку дома. Написал контрольную обычной — плохая оценка. «Вот видите!» — сказал он друзьям.
          «Без ручки — никак!»
        uk: Але одного разу Вітя забув ручку вдома. Написав контрольну звичайною — погана оцінка. «Ось бачите!» — сказав він
          друзям. «Без ручки — ніяк!»
        en: But one day Vitya forgot the pen at home. He wrote the test with a regular pen — bad grade. "See!" he told his
          friends. "Without the pen — impossible!"
    - id: '10'
      type: speech
      duration_sec: 14
      text:
        ru: 'Друзья задумались и спросили: «Витя, а когда у тебя была ручка — ты готовился к контрольной?» Витя кивнул. «А
          когда забыл — готовился?» Витя замялся: «Ну… нет.»'
        uk: 'Друзі подумали та запитали: «Вітя, а коли у тебе була ручка — ти готувався до контрольної?» Вітя кивнув. «А коли
          забув — готувався?» Вітя замовчав: «Ну… ні.»'
        en: 'His friends thought about it and asked: "Vitya, when you had the pen — did you study for the test?" Vitya nodded.
          "And when you forgot it — did you study?" Vitya hesitated: "Well... no."'
    - id: '11'
      type: speech
      duration_sec: 10
      text:
        ru: Получается, дело не в ручке! Готовился — хорошая оценка. Не готовился — плохая. А ручка просто лежала в пенале
          и ни при чём.
        uk: Виходить, справа не в ручці! Готувався — хороша оцінка. Не готувався — погана. А ручка просто лежала в пеналі
          та ні при чому.
        en: So it wasn't the pen! You studied — good grade. You didn't study — bad grade. The pen just sat in the case and
          had nothing to do with it.
    - id: '12'
      type: discussion
      duration_sec: 20
      text:
        ru: 'Итак! Витя уверен: его ручка — волшебная. Пишет ей — хорошая оценка. Не пишет — плохая. Но друзья покопались
          и что выяснили?

          '
        uk: 'Отже! Вітя впевнений: його ручка — чарівна. Пишеш нею — хороша оцінка. Не пишеш — погана. Але друзі покопалися
          та що дізналися?'
        en: 'So! Vitya was sure: his pen is magic. You write with it — good grade. You don''t — bad grade. But his friends
          figured out something?'
    - id: '13'
      type: speech
      duration_sec: 18
      text:
        ru: 'Когда Витя ГОТОВИЛСЯ — оценка хорошая. Не готовился — плохая. Ручка была при нём оба раза! Но он запомнил только
          те разы, когда совпало. Знакомо? Прямо как Дмитрик с красной футболкой на прошлом уроке!

          '
        uk: Коли Вітя ГОТУВАВСЯ — оцінка хороша. Не готувався — погана. Ручка була при ньому обидва рази! Але він запам'ятав
          тільки ті разі, коли совпало. Знайомо? Прямо як Дмитрик з червоною футболкою на минулому уроці!
        en: When Vitya STUDIED — good grade. Didn't study — bad grade. He had the pen both times! But he only remembered when
          it matched. Familiar? Just like Dmitrik with the red shirt last lesson!
    - id: '14'
      type: vote
      duration_sec: 10
      text:
        ru: '«Что РЕАЛЬНО вызывает хорошую оценку — ручка или подготовка?»

          '
        uk: «Що СПРАВДІ викликає хорошу оцінку — ручка або підготовка?»
        en: '"What REALLY causes a good grade — the pen or studying?"'
      options:
      - id: opt_1
        text:
          ru: Ручка
          uk: Ручка
          en: The pen
      - id: opt_2
        text:
          ru: Подготовка
          uk: Підготовка
          en: Studying
      correct: opt_2
    - id: '15'
      type: speech
      duration_sec: 18
      text:
        ru: 'Подготовка! Ручка — совпадение. А подготовка — ПРИЧИНА. Вот об этом слове — «причина» — мы сейчас и поговорим.
          Потому что не всё, что идёт одно за другим, связано. Но иногда — связано. И надо уметь отличать!

          '
        uk: Підготовка! Ручка — збіг. А підготовка — ПРИЧИНА. Ось про це слово — «причина» — ми зараз і поговоримо. Тому що
          не всі, що йдуть одне за іншим, пов'язані. Але іноді — пов'язані. І треба вміти розрізняти!
        en: Studying! The pen is a coincidence. And studying is the CAUSE. That's what we're going to talk about — the word
          "cause." Because not everything that happens one after another is connected. But sometimes it is. And you have to
          know how to tell the difference!
  - scene_id: sc2
    title:
      ru: Причина и следствие
      uk: Причина та наслідок
      en: Cause and Effect
    media_ref: 2B.sc2.cause_effect
    status: v3_locked
    steps:
    - id: '16'
      type: speech
      duration_sec: 20
      text:
        ru: 'Два новых слова. ПРИЧИНА — это то, что ВЫЗЫВАЕТ событие. СЛЕДСТВИЕ — то, что ПРОИСХОДИТ из-за причины. Между
          ними связь, как верёвка: дёрнул за один конец — другой пошевелился. Пример: нажал на выключатель — свет зажёгся.
          Причина — кнопка. Следствие — свет. Без кнопки свет не включится.

          '
        uk: 'Два нових слова. ПРИЧИНА — це те, що ВИКЛИКАЄ подію. НАСЛІДОК — те, що ВІДБУВАЄТЬСЯ через причину. Між ними зв''язок,
          як мотузка: дернув за один кінець — інший рушив. Приклад: натиснув на вимикач — світло засвітилось. Причина — кнопка.
          Наслідок — світло. Без кнопки світло не включиться.'
        en: 'Two new words. CAUSE is what MAKES an event happen. EFFECT is what HAPPENS because of the cause. There''s a connection
          between them, like a rope: pull one end — the other moves. Example: I press the switch — the light turns on. Cause
          — the switch. Effect — the light. Without the switch, no light.'
    - id: '17'
      type: speech
      duration_sec: 12
      text:
        ru: 'А вот другое. Ты чихнул — и за окном проехал грузовик. Поздравляю! Твой нос управляет транспортом!

          '
        uk: А ось інше. Ти чхав — і за вікном проїхав вантажівка. Вітаємо! Твій ніс керує транспортом!
        en: But here's another one. You sneezed — and a truck drove by outside. Congratulations! Your nose controls vehicles!
    - id: '18'
      type: discussion
      duration_sec: 20
      text:
        ru: 'Кто верит, что чихом можно вызвать грузовик?

          '
        uk: Хто вірить, що чханням можна викликати вантажівку?
        en: Who believes you can make a truck appear by sneezing?
    - id: '19'
      type: speech
      duration_sec: 20
      text:
        ru: 'Никто? Правильно! Грузовик проехал бы и без вашего чиха. Это совпадение. И вот простой тест: мысленно УБЕРИТЕ
          первое событие. Второе ВСЁ РАВНО произойдёт? Да — совпадение. Нет — причина. Убери кнопку — свет включится? Нет!
          Причина. Убери чих — грузовик проедет? Да! Совпадение.

          '
        uk: 'Ніхто? Правильно! Вантажівка проїхала б і без вашого чхання. Це збіг. І ось простий тест: розумово ВИДАЛІТЬ першу
          подію. Друга ВСЕ ОДНО відбудеться? Так — збіг. Ні — причина. Видали кнопку — світло включиться? Ні! Причина. Видали
          чхання — вантажівка проїде? Так! Збіг.'
        en: 'Nobody? Right! The truck would drive by without your sneeze. It''s a coincidence. And here''s a simple test:
          mentally REMOVE the first event. Will the second still happen? Yes — coincidence. No — cause. Remove the button
          — will the light turn on? No! It''s a cause. Remove the sneeze — will the truck still drive by? Yes! Coincidence.'
    - id: '20'
      type: speech
      duration_sec: 10
      text:
        ru: 'Тренируемся! Причина — одно вызвало другое. Совпадение — просто рядом. Начнём с народных примет!

          '
        uk: Тренуємось! Причина — одне викликало інше. Збіг — просто поряд. Почнемо з народних прикмет!
        en: Practice time! Cause — one thing made another happen. Coincidence — just happened to be there. Let's start with
          superstitions!
    - id: '21'
      type: vote
      duration_sec: 10
      text:
        ru: '«Пошёл дождь — я открыл зонт.»

          '
        uk: «Пішов дощ — я відкрив парасольку.»
        en: '"It started raining — I opened my umbrella."'
      options:
      - id: opt_1
        text:
          ru: Причина
          uk: Причина
          en: Cause
      - id: opt_2
        text:
          ru: Совпадение
          uk: Збіг
          en: Coincidence
      correct: opt_1
    - id: '22'
      type: speech
      duration_sec: 8
      text:
        ru: 'Причина! Убери дождь — зонт откроешь? Вряд ли. Дождь заставил. Зонт сам не открывается от скуки!

          '
        uk: Причина! Видали дощ — парасольку відкриєш? Навряд. Дощ змусив. Парасольку сама не відкривається від нудьги!
        en: Cause! Remove the rain — will you open the umbrella? Unlikely. The rain made you. The umbrella doesn't open by
          itself from boredom!
    - id: '23'
      type: vote
      duration_sec: 10
      text:
        ru: '«Рассыпал соль — день будет плохой.»

          '
        uk: «Розсипав сіль — день буде поганий.»
        en: '"I spilled salt — the day will be bad."'
      options:
      - id: opt_1
        text:
          ru: Причина
          uk: Причина
          en: Cause
      - id: opt_2
        text:
          ru: Совпадение
          uk: Збіг
          en: Coincidence
      correct: opt_2
    - id: '24'
      type: speech
      duration_sec: 10
      text:
        ru: 'Совпадение! Соль на столе не управляет вашим днём. Она вообще лежит и ничего не делает. Это примета — красивая,
          но не причина. Соль — не режиссёр вашей жизни!

          '
        uk: Збіг! Сіль на столі не керує вашим днем. Вона взагалі лежить і нічого не робить. Це прикмета — гарна, але не причина.
          Сіль — не режисер вашого життя!
        en: Coincidence! Salt on the table doesn't control your day. It just sits there doing nothing. It's a superstition
          — pretty, but not a cause. Salt isn't the director of your life!
    - id: '25'
      type: vote
      duration_sec: 10
      text:
        ru: '«Чайник на плите засвистел — значит, вода закипела.»

          '
        uk: «Чайник на плиті засвистів — значить, вода закипіла.»
        en: '"The kettle on the stove whistled — so water boiled."'
      options:
      - id: opt_1
        text:
          ru: Причина
          uk: Причина
          en: Cause
      - id: opt_2
        text:
          ru: Совпадение
          uk: Збіг
          en: Coincidence
      correct: opt_1
    - id: '26'
      type: speech
      duration_sec: 8
      text:
        ru: 'Причина! Кипение создаёт пар, пар вылетает — чайник свистит. Убери кипение — тишина. Чайник не свистит просто
          так, от хорошего настроения!

          '
        uk: Причина! Кипіння створює пар, пар вилітає — чайник свиситить. Видали кипіння — тиша. Чайник не свиститить просто
          так, від хорошого настрою!
        en: Cause! Boiling creates steam, steam comes out — kettle whistles. Remove the boiling — silence. The kettle doesn't
          whistle on its own, from good mood!
    - id: '27'
      type: vote
      duration_sec: 10
      text:
        ru: '«Ласточки летают низко — будет дождь.»

          '
        uk: «Ластівки літають низько — буде дощ.»
        en: '"Swallows flying low — it will rain."'
      options:
      - id: opt_1
        text:
          ru: Причина
          uk: Причина
          en: Cause
      - id: opt_2
        text:
          ru: Совпадение
          uk: Збіг
          en: Coincidence
      correct: opt_2
    - id: '28'
      type: speech
      duration_sec: 15
      text:
        ru: 'Хитрый случай! Ласточки не ВЫЗЫВАЮТ дождь. Но перед дождём воздух тяжёлый, мошки опускаются ниже, ласточки летят
          за мошками. Тут есть что-то третье — о нём поговорим позже! Запомните ласточек!

          '
        uk: Хитрий випадок! Ластівки НЕ ВИКЛИКАЮТЬ дощ. Але перед дощем воздух важкий, мошкара опускається нижче, ластівки
          літять за мошкарою. Тут є щось третє — про це поговоримо пізніше! Запам'ятайте ластівок!
        en: Tricky one! Swallows DON'T CAUSE rain. But before rain, the air is heavy, gnats fly lower, swallows follow the
          gnats. There's something third here — we'll talk about it later! Remember the swallows!
    - id: '29'
      type: vote
      duration_sec: 10
      text:
        ru: '«Не готовился к контрольной — написал плохо.»

          '
        uk: «Не готувався до контрольної — написав погано.»
        en: '"I didn''t study for the test — I did poorly."'
      options:
      - id: opt_1
        text:
          ru: Причина
          uk: Причина
          en: Cause
      - id: opt_2
        text:
          ru: Совпадение
          uk: Збіг
          en: Coincidence
      correct: opt_1
    - id: '30'
      type: speech
      duration_sec: 8
      text:
        ru: 'Причина! Убери «не готовился» — результат будет другой. Подготовка напрямую влияет. Тетрадка сама себя не напишет!

          '
