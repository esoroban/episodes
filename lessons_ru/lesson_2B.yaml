    - id: '153'
      type: speech
      duration_sec: 12
      text:
        ru: 'Третья причина — активный образ жизни! Кто любит двигаться — заводит собаку. Кто много двигается — реже болеет.
          Собака не лечит — но заставляет выходить на улицу в любую погоду!

          '
        uk: Третя причина — активний спосіб життя! Хто любить рухатися — заводить собаку. Хто багато рухається — рідше хворіє.
          Собака не лікує — але змушує виходити на вулицю в будь-яку погоду!
        en: 'Hidden cause: active lifestyle! People who like to move get a dog. People who move a lot rarely get sick. The
          dog doesn''t cure — but it makes you go outside in any weather!'
  - scene_id: sc7
    title:
      ru: Закрытие
      uk: Завершення
