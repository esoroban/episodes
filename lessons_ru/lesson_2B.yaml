      type: speech
      duration_sec: 15
      text:
        ru: 'Причина! Грязные руки = бактерии в еде = живот бунтует. Бабушка говорила «мой руки!» — и она была права. Но не
          из-за приметы, а из-за науки! Бактерии маленькие, но очень настырные.

          '
        uk: 'Причина! Брудні руки = бактерії в їжі = живіт повстає. Ланцюжок! «Просто не пощастило» — зручна фраза. А детектив
          бачить: одне привело до іншого. Бруд винен.'
        en: 'Cause! Dirty hands = bacteria in food = stomach revolts. Chain reaction! "Just bad luck" is easy to say. But
          the detective sees: one thing led to another. The dirt is guilty.'
    - id: '61'
      type: speech
      duration_sec: 18
      text:
        ru: 'Видите паттерн? «Просто не повезло» — удобная фраза. Но детектив правды спрашивает: «А может, тут есть причина,
          которую я не хочу замечать?» Это не значит обвинять себя во всём. Это значит — ПОНИМАТЬ, что происходит. Понимаешь
          причину — можешь изменить результат! Вот в чём суперсила.

          '
        uk: 'Бачите закономірність? «Просто не пощастило» — зручна фраза. Але детектив правди питає: «А може, тут є причина,
          яку я не хочу помічати?» Це не значить звинувачувати себе у всьому. Це значить — РОЗУМІТИ, що відбувається. Розумієш
          причину — можеш змінити результат! Ось у чому суперсила.'
        en: 'See the pattern? "Just bad luck" is convenient. But the truth detective asks: "What if there''s a cause I don''t
          want to see?" That doesn''t mean blaming yourself for everything. It means UNDERSTANDING what''s happening. Understand
          the cause — change the result! That''s the superpower.'
  - scene_id: sc4
    title:
      ru: Третья причина
      uk: Третя причина
      en: The Third Cause
    media_ref: 2B.sc4.third_cause
    status: v3_locked
    steps:
    - id: '62'
      type: speech
      duration_sec: 15
      text:
        ru: 'Помните ласточек? Я обещал к ним вернуться. Ласточки летают низко — и начинается дождь. Ласточки НЕ вызывают
          дождь. Но связь-то есть! Примета работает! Как так?

          '
        uk: Пам'ятаєте ластівок? Я обіцяв до них повернутися. Ластівки літають низько — і починається дощ. Ластівки НЕ ВИКЛИКАЮТЬ
          дощ. Але зв'язок-то є! Прикмета працює! Як так?
        en: Remember the swallows? I promised to return to them. Swallows fly low — and it rains. Swallows DON'T CAUSE rain.
          But there's still a connection! The superstition works! How?
    - id: '63'
      type: speech
      duration_sec: 20
      text:
        ru: 'А вот как. Перед дождём воздух становится тяжёлым и влажным. Мошки не могут высоко летать — опускаются вниз.
          Ласточки летят за мошками, потому что хотят есть. А потом идёт дождь — потому что воздух влажный. Ласточки и дождь
          не связаны напрямую. Их связывает ТРЕТИЙ — влажный воздух! Ласточки не виноваты, они просто голодные!

          '
        uk: А ось як. Перед дощем воздух стає важким та вологим. Мошкара не може високо літати — опускається вниз. Ластівки
          літять за мошкарою, тому що хочуть їсти. А потім йде дощ — тому що воздух вологий. Ластівки та дощ не пов'язані
          напряму. Їх пов'язує ТРЕТЯ — вологий воздух! Ластівки не винні, вони просто голодні!
        en: Here's how. Before rain, the air gets heavy and humid. Gnats can't fly high — they go down. Swallows follow the
          gnats because they want to eat. Then it rains — because the air is humid. Swallows and rain aren't directly connected.
          A THIRD thing connects them — humid air! Swallows aren't guilty, they're just hungry!
    - id: '64'
      type: speech
      duration_sec: 18
      text:
        ru: 'Запоминаем новое слово: ТРЕТЬЯ ПРИЧИНА. Это когда два события кажутся связанными, но на самом деле их ОБА вызывает
          что-то третье, спрятанное. Как кукловод за ширмой — дёргает за две верёвочки, а куклы думают, что они сами двигаются!

          '
        uk: 'Запам''ятаємо нове слово: ТРЕТЯ ПРИЧИНА. Це коли дві подій здаються пов''язаними, але насправді їх ОБЕ викликає
          щось третє, спроховане. Як ляльковод за ширмою — дергає за дві мотузки, а ляльки думають, що вони самі рухаються!'
        en: 'New word: THE THIRD CAUSE. This is when two events seem connected, but really they''re BOTH caused by something
          hidden. Like a puppeteer behind a curtain — pulling two strings while the puppets think they''re moving themselves!'
    - id: '65'
      type: speech
      duration_sec: 15
      text:
        ru: 'И вот самый знаменитый пример на всю планету. Учёные заметили: летом люди покупают БОЛЬШЕ мороженого. И летом
          люди ЧАЩЕ сгорают на солнце. Данные совпадают! И кто-то сделал вывод...

          '
        uk: 'І ось найзнаменитіший приклад на всю планету. Учені помітили: влітку люди купують БІЛЬШЕ морозива. І влітку люди
          ЧАСТІШЕ сгорають на сонці. Дані совпадають! І хтось зробив висновок...'
        en: 'And here''s the most famous example on the whole planet. Scientists noticed: in summer people buy MORE ice cream.
          And in summer people get SUNBURNED more. The data matches! And someone concluded...'
    - id: '66'
      type: discussion
      duration_sec: 20
      text:
        ru: 'Мороженое вызывает солнечные ожоги?! Кто верит? Кто считает, что мороженое опасно для кожи?

          '
        uk: Морозиво викликає сонячні опіки?! Хто вірить? Хто думає, що морозиво небезпечно для шкіри?
        en: Ice cream causes sunburns?! Who believes that? Who thinks ice cream is dangerous for skin?
    - id: '67'
      type: speech
      duration_sec: 20
      text:
        ru: 'Никто? Молодцы! Но связь-то реальная — числа совпадают! Так в чём дело? ЖАРА! Жарко — люди покупают мороженое.
          Жарко — люди лежат на пляже и сгорают. Мороженое и ожоги не связаны между собой. Их обоих вызывает третья причина
          — жаркая погода. Мороженое невиновно!

          '
        uk: Ніхто? Молодці! Але зв'язок-то реальна — числа совпадають! Так в чому справа? ЖАРА! Жарко — люди купують морозиво.
          Жарко — люди лежать на пляжі та сгорають. Морозиво та опіки не пов'язані між собою. Їх обоих викликає третя причина
          — гарячої погоди. Морозиво невинне!
        en: Nobody? Good! But there is a real connection — the numbers match! So what's going on? HEAT! It's hot — people
          buy ice cream. It's hot — people lay on the beach and get burned. Ice cream and burns aren't connected. They're
          both caused by a third thing — hot weather. Ice cream is innocent!
    - id: '68'
      type: speech
      duration_sec: 12
      text:
        ru: 'Теперь тренируемся находить эту спрятанную третью причину! Я называю два события — вы ищете, что их ОБОИХ вызывает.

          '
        uk: Тепер тренуємось знаходити цю спровану третю причину! Я називаю дві подій — ви шукаєте, що їх ОБЕИХ викликає.
        en: Now let's practice finding the hidden third cause! I name two events — you find what BOTH of them cause.
    - id: '69'
      type: vote
      duration_sec: 10
      text:
        ru: '«Люди покупают больше зонтов — и одновременно покупают больше резиновых сапог.» Что третье?

          '
        uk: «Люди купують більше парасольок — і одночасно купують більше гумових чобіт.» Що третє?
        en: '"People buy more umbrellas — and at the same time buy more rain boots." What''s the third thing?'
      options:
      - id: opt_1
        text:
          ru: Погода
          uk: Погода
          en: Weather
      - id: opt_2
        text:
          ru: Время суток
          uk: Час доби
          en: Time of day
      - id: opt_3
        text:
          ru: Третья причина
          uk: Третя причина
          en: The third cause
      correct: opt_1
    - id: '70'
      type: speech
      duration_sec: 10
      text:
        ru: 'Дождь! Зонты не вызывают сапоги, и сапоги не вызывают зонты. Оба появляются, потому что на улице льёт. Дождь
          — кукловод!

          '
        uk: Дощ! Парасольки не викликають чоботи, і чоботи не викликають парасольки. Обидва з'являються, тому що на вулиці
          льється. Дощ — ляльковод!
        en: Rain! Umbrellas don't cause boots, and boots don't cause umbrellas. Both appear because it's pouring. Rain is
          the puppeteer!
    - id: '71'
      type: vote
      duration_sec: 10
      text:
        ru: '«Я ложусь спать — и на улице темнеет.» Моя кровать выключает солнце?

          '
        uk: «Я ляжу спати — і на вулиці темніє.» Мос мій ліжко вимикає сонце?
        en: '"I go to bed — and it gets dark outside." Does my bed turn off the sun?'
      options:
      - id: opt_1
        text:
          ru: Погода
          uk: Погода
          en: Weather
      - id: opt_2
        text:
          ru: Время суток
          uk: Час доби
          en: Time of day
      - id: opt_3
        text:
          ru: Третья причина
          uk: Третя причина
          en: The third cause
      correct: opt_2
    - id: '72'
      type: speech
      duration_sec: 10
      text:
        ru: 'Время суток! Вечер наступает — и ты ложишься, и на улице темнеет. Твоя кровать тут ни при чём, не переживай!
          Солнце не знает про твою подушку.

          '
        uk: Час доби! Вечір наступає — і ти ляжеш, і на вулиці темніє. Твоє ліжко тут ні при чому, не переживай! Сонце не
          знає про твою подушку.
        en: Time of day! Evening comes — and you go to bed, and it gets dark. Your bed has nothing to do with it, don't worry!
          The sun doesn't know about your pillow.
    - id: '73'
      type: vote
      duration_sec: 10
      text:
        ru: '«Зимой люди носят шапки — и зимой люди пьют горячий чай.» Шапки вызывают жажду чая?

          '
        uk: «Зимою люди носять шапки — і зимою люди п'ють гарячий шоколад.» Шапки викликають жажду шоколаду?
        en: '"In winter people wear hats — and in winter people drink hot chocolate." Do hats cause a desire for hot chocolate?'
      options:
      - id: opt_1
        text:
          ru: Погода
          uk: Погода
          en: Weather
      - id: opt_2
        text:
          ru: Время суток
          uk: Час доби
          en: Time of day
      - id: opt_3
        text:
          ru: Третья причина
          uk: Третя причина
          en: The third cause
      correct: opt_1
    - id: '74'
      type: speech
      duration_sec: 10
      text:
        ru: 'Холод! На улице мороз — надеваешь шапку. На улице мороз — хочется горячего. Шапка не заваривает чай. Холод заставляет
          и то, и другое!

          '
        uk: Холод! На вулиці мороз — надягаєш шапку. На вулиці мороз — хочеться гарячого. Шапка не заварює шоколад. Холод
          змушує обидва!
        en: Cold! It's freezing — you wear a hat. It's freezing — you want something hot. The hat doesn't make hot chocolate.
          Cold makes both!
    - id: '75'
      type: vote
      duration_sec: 10
      text:
        ru: '«Включается реклама — и папа идёт на кухню.» Реклама голодная? Она гонит папу за бутербродом?

          '
        uk: «Включається реклама — і тато йде на кухню.» Реклама голодна? Вона гонить тата за бутербродом?
        en: '"An ad comes on — and Dad goes to the kitchen." Is the ad hungry? Does it make Dad want a sandwich?'
      options:
      - id: opt_1
        text:
          ru: Погода
          uk: Погода
          en: Weather
      - id: opt_2
        text:
          ru: Время суток
          uk: Час доби
          en: Time of day
      - id: opt_3
        text:
          ru: Третья причина
          uk: Третя причина
          en: The third cause
      correct: opt_3
    - id: '76'
      type: speech
      duration_sec: 12
      text:
        ru: 'Пауза в фильме! Фильм прервался — показывают рекламу. Фильм прервался — папа бежит перекусить. Реклама не вызывает
          голод. Просто пауза — удобный момент для обоих! Папа ждал этого момента весь фильм.

          '
        uk: Пауза у фільмі! Фільм перервався — показують рекламу. Фільм перервався — тато біжить перекусити. Реклама не викликає
          голод. Просто пауза — зручний момент для обох! Тато чекав цього моменту весь фільм.
        en: Movie break! The movie paused — they show ads. The movie paused — Dad goes get a snack. The ad doesn't cause hunger.
          Just a break — convenient for both! Dad was waiting for it the whole movie.
    - id: '77'
      type: speech
      duration_sec: 15
      text:
        ru: 'А теперь — пример посложнее. Слушайте: «Чем больше пожарных приезжает на пожар, тем больше убытков от огня.»
          Пожарные ВРЕДЯТ? Из-за них больше разрушений?

          '
        uk: 'А тепер — приклад складніше. Слухайте: «Чим більше пожежників приїжджає на пожежу, тим більше збитків від вогню.»
          Пожежники ШКОДЯТЬ? Через них більше руйнувань?'
        en: 'And now — a harder example. Listen: "The more firefighters arrive at a fire, the more damage the fire does."
          Do firefighters cause harm? More destruction because of them?'
    - id: '78'
      type: discussion
      duration_sec: 20
      text:
        ru: 'Кто думает, что тут третья причина?

          '
        uk: Хто думає, що тут третя причина?
        en: Who thinks there's a third cause here?
    - id: '79'
      type: speech
      duration_sec: 18
      text:
        ru: 'Конечно, третья причина! РАЗМЕР ПОЖАРА. Большой пожар — вызывают много пожарных. Большой пожар — много разрушений.
          Пожарные не виноваты, они спасают! Но если смотреть только на числа — кажется, что они вредят. Вот какие хитрые
          ловушки бывают!

          '
        uk: Звісно, третя причина! РОЗМІР ПОЖЕЖІ. Велика пожежа — викликають багато пожежників. Велика пожежа — багато руйнувань.
          Пожежники невинні, вони рятують! Але якщо дивитися тільки на числа — здається, що вони шкодять. Ось які хитрі пастки
          бувають!
        en: Of course, third cause! SIZE OF THE FIRE. Big fire — many firefighters. Big fire — lots of damage. Firefighters
          are innocent, they rescue! But if you only look at numbers — it seems they cause harm. These are tricky traps!
    - id: '80'
      type: speech
      duration_sec: 12
      text:
        ru: 'Итого: когда видите, что два события ходят парой — не спешите. Задайте вопрос: «А может, тут ТРЕТЬЯ ПРИЧИНА?»
          Может, за ширмой прячется кукловод, который дёргает за обе верёвочки!

          '
        uk: 'Отже: коли бачите, що дві подій ходять парою — не поспішайте. Задайте питання: «А може, тут ТРЕТЯ ПРИЧИНА?» Може,
          за ширмою прячеться ляльковод, який дергає за обі мотузки!'
        en: 'So: when you see two events happening together — don''t rush. Ask: "What if there''s a THIRD CAUSE?" Maybe there''s
          a puppeteer behind the curtain pulling both strings!'
  - scene_id: sc5
    title:
      ru: Третья причина — ловушка
      uk: Третя причина — пастка
      en: The Third Cause — A Trap
    media_ref: 2B.sc5.third_cause_trap
    status: v3_locked
    steps:
    - id: '81'
      type: speech
      duration_sec: 15
      text:
        ru: 'Третья причина — это не только наука. Люди ИСПОЛЬЗУЮТ её, чтобы вас убедить! Реклама, друзья, даже взрослые иногда
          говорят: «Смотри, эти два факта рядом — значит, делай так!» А на самом деле — ловушка. Сейчас потренируемся её ловить!

          '
        uk: 'Третя причина — це не тільки наука. Люди ВИКОРИСТОВУЮТЬ її, щоб вас переконати! Реклама, друзі, навіть дорослі
          іноді кажуть: «Дивись, ці два факти поряд — значить, робі так!» А насправді — пастка. Сейчас потренуємось її ловити!'
        en: 'Third cause isn''t just science. People USE it to convince you! Ads, friends, even adults sometimes say: "See,
          these two facts together — so do this!" But it''s really a trap. Let''s practice catching it!'
    - id: '82'
      type: speech
      duration_sec: 12
      text:
        ru: 'Я читаю фразу — кто-то вас убеждает. Вам решить: тут настоящая причина или ловушка третьей причины?

          '
        uk: 'Я читаю фразу — хтось вас переконує. Вам вирішити: тут настояща причина або пастка третьої причини?'
        en: 'I read a phrase — someone is trying to convince you. Your job: is this a real cause or a third cause trap?'
    - id: '83'
      type: vote
      duration_sec: 10
      text:
        ru: '«Все чемпионы пьют наш напиток! Пей — и тоже станешь чемпионом!»

          '
        uk: «Всі чемпіони п'ють наш напиток! П'й — і теж станеш чемпіоном!»
        en: '"All champions drink our drink! Drink it — and you''ll be a champion too!"'
      options:
      - id: opt_1
        text:
          ru: Причина настоящая
          uk: Причина настояща
          en: Real cause
      - id: opt_2
        text:
          ru: Ловушка третьей причины
          uk: Пастка третьої причини
          en: Third cause trap
      correct: opt_2
    - id: '84'
      type: speech
      duration_sec: 12
      text:
        ru: 'Ловушка! Третья причина — тренировки. Чемпионы побеждают, потому что тренируются. А напиток рекламируют, потому
          что им заплатили. Напиток не делает чемпионов — тренировки делают!

          '
        uk: Пастка! Третя причина — тренування. Чемпіони перемагають, тому що тренуються. А напиток рекламують, тому що їм
          заплатили. Напиток не робить чемпіонів — тренування робить!
        en: Trap! Third cause — training. Champions win because they train. The drink is advertised because they were paid.
          The drink doesn't make champions — training does!
    - id: '85'
      type: vote
      duration_sec: 10
      text:
        ru: '«У Пети новый телефон — и у него куча друзей! Попроси у мамы такой же!»

          '
        uk: «У Петі новий телефон — і у нього купа друзів! Попроси у мами такий самий!»
        en: '"Petya has a new phone — and he has tons of friends! Ask your mom for one!"'
      options:
      - id: opt_1
        text:
          ru: Причина настоящая
          uk: Причина настояща
          en: Real cause
      - id: opt_2
        text:
          ru: Ловушка третьей причины
          uk: Пастка третьої причини
          en: Third cause trap
      correct: opt_2
    - id: '86'
      type: speech
      duration_sec: 12
      text:
        ru: 'Ловушка! Третья причина — характер Пети. Петя весёлый и общительный — поэтому у него друзья. А телефон у него
