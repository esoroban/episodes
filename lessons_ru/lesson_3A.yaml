lesson:
  id: lesson_3A
  day: 3
  slot: A
  title:
    ru: Как спорить и не ссориться
    uk: Як сперечатися та не ссоритися
    en: How to Argue Without Fighting
  scenes:
    - scene_id: sc1
      title:
        ru: 'Разминка: факт, мнение, неправда'
        uk: 'Розминка: факт, думка, неправда'
        en: 'Warm-up: Fact, Opinion, Falsehood'
      media_ref: 3A.sc1.review_fact_opinion
      status: v3_locked
      steps:
        - id: '1'
          type: speech
          duration_sec: 12
          text:
            ru: 'Привет! Сегодня совсем новая тема — но сначала проверим, что осталось
              в голове после прошлых занятий. Быстро, без раздумий!

              '
            uk: Привіт! Сьогодні зовсім нова тема — але спочатку перевіримо, що залишилось
              у голові після минулих занять. Швидко, без роздумів!
            en: Hello! Today is a completely new topic — but first let's check what
              you remember from last lessons. Quick, no thinking!
        - id: '2'
          type: speech
          duration_sec: 10
          text:
            ru: 'Напомню: ФАКТ — можно проверить, и это правда. МНЕНИЕ — нельзя проверить,
              личное ощущение. НЕПРАВДА — можно проверить, но оказалось ложью. Поехали!

              '
            uk: 'Нагадаю: ФАКТ — можна перевірити, і це правда. ДУМКА — не можна перевірити,
              особисте відчуття. НЕПРАВДА — можна перевірити, але виявилось неправдою.
              Поїхали!'
            en: 'Reminder: FACT — you can check it and it''s true. OPINION — can''t
              be checked, it''s a personal feeling. FALSEHOOD — can be checked, but
              it turned out false. Let''s go!'
        - id: '3'
          type: vote
          duration_sec: 10
          text:
            ru: '«В сутках 24 часа.»

              '
            uk: «У добі 24 години.»
            en: '"There are 24 hours in a day."'
          options:
            - id: opt_1
              text:
                ru: Факт
                uk: Факт
                en: Fact
            - id: opt_2
              text:
                ru: Мнение
                uk: Думка
                en: Opinion
            - id: opt_3
              text:
                ru: Неправда
                uk: Неправда
                en: Falsehood
          correct: opt_1
        - id: '4'
          type: speech
          duration_sec: 8
          text:
            ru: 'Факт! Берём часы, считаем — ровно 24. Проверено, подтверждено. Часы
              не врут!

              '
            uk: Факт! Беремо годинник, рахуємо — рівно 24. Перевірено, підтверджено.
              Годинники не брешуть!
            en: Fact! Check a clock, count — exactly 24. Verified, confirmed. Clocks
              don't lie!
        - id: '5'
          type: vote
          duration_sec: 10
          text:
            ru: '«Собаки — лучшие домашние животные.»

              '
            uk: «Собаки — найкращі домашні тварини.»
            en: '"Dogs are the best pets."'
          options:
            - id: opt_1
              text:
                ru: Факт
                uk: Факт
                en: Fact
            - id: opt_2
              text:
                ru: Мнение
                uk: Думка
                en: Opinion
            - id: opt_3
              text:
                ru: Неправда
                uk: Неправда
                en: Falsehood
          correct: opt_2
        - id: '6'
          type: speech
          duration_sec: 8
          text:
            ru: 'Мнение! «Лучшие» — это ощущение. Кто-то любит кошек, кто-то хомяков,
              а кто-то — аквариумных рыбок. Не проверишь!

              '
            uk: Думка! «Найкращі» — це відчуття. Хтось любить котів, хтось хомяків,
              а хтось — рибок в акваріумі. Не перевіриш!
            en: Opinion! "Best" is a feeling. Someone loves cats, someone hamsters,
              some love fish. Can't be tested!
        - id: '7'
          type: vote
          duration_sec: 10
          text:
            ru: '«Луна больше Солнца.»

              '
            uk: «Місяць більший за Сонце.»
            en: '"The moon is bigger than the sun."'
          options:
            - id: opt_1
              text:
                ru: Факт
                uk: Факт
                en: Fact
            - id: opt_2
              text:
                ru: Мнение
                uk: Думка
                en: Opinion
            - id: opt_3
              text:
                ru: Неправда
                uk: Неправда
                en: Falsehood
          correct: opt_3
        - id: '8'
          type: speech
          duration_sec: 10
          text:
            ru: 'Неправда! Астрономы измерили — Солнце в 400 раз больше Луны. Луна
              просто ближе, поэтому КАЖЕТСЯ похожей по размеру. Глаза обманывают!

              '
            uk: Неправда! Астрономи виміряли — Сонце у 400 разів більше за Місяць.
              Місяць просто ближче, тому ЗДАЄТЬСЯ подібним за розміром. Очі обманюють!
            en: Falsehood! Astronomers measured — the sun is 400 times bigger than
              the moon. The moon is just closer, so it SEEMS similar in size. Eyes
              deceive!
        - id: '9'
          type: vote
          duration_sec: 10
          text:
            ru: '«Вода замерзает при нуле градусов.»

              '
            uk: «Вода замерзає при нулю градусів.»
            en: '"Water freezes at zero degrees."'
          options:
            - id: opt_1
              text:
                ru: Факт
                uk: Факт
                en: Fact
            - id: opt_2
              text:
                ru: Мнение
                uk: Думка
                en: Opinion
            - id: opt_3
              text:
                ru: Неправда
                uk: Неправда
                en: Falsehood
          correct: opt_1
        - id: '10'
          type: speech
          duration_sec: 8
          text:
            ru: 'Факт! Термометр покажет: ноль — и вода превращается в лёд. Физика
              не подводит!

              '
            uk: 'Факт! Термометр покаже: нуль — і вода перетворюється у лід. Фізика
              не підводить!'
            en: 'Fact! A thermometer shows: zero — and water turns to ice. Physics
              works!'
        - id: '11'
          type: vote
          duration_sec: 10
          text:
            ru: '«Великая Китайская стена видна из космоса.»

              '
            uk: «Велика Китайська стіна видна з космосу.»
            en: '"The Great Wall of China is visible from space."'
          options:
            - id: opt_1
              text:
                ru: Факт
                uk: Факт
                en: Fact
            - id: opt_2
              text:
                ru: Мнение
                uk: Думка
                en: Opinion
            - id: opt_3
              text:
                ru: Неправда
                uk: Неправда
                en: Falsehood
          correct: opt_3
        - id: '12'
          type: speech
          duration_sec: 10
          text:
            ru: 'Неправда! Астронавты проверили — не видна! Она длинная, но слишком
              узкая. Из космоса виднее автострады — но это не так красиво звучит.

              '
            uk: Неправда! Космонавти перевірили — не видна! Вона довга, але занадто
              вузька. З космосу видніше автотраси — але це не так гарно звучить.
            en: Falsehood! Astronauts checked — it's not visible! It's long but too
              narrow. Highways are more visible from space — but that doesn't sound
              as cool.
        - id: '13'
          type: vote
          duration_sec: 10
          text:
            ru: '«Рисовать интереснее, чем читать.»

              '
            uk: «Малювати цікавіше, ніж читати.»
            en: '"Drawing is more interesting than reading."'
          options:
            - id: opt_1
              text:
                ru: Факт
                uk: Факт
                en: Fact
            - id: opt_2
              text:
                ru: Мнение
                uk: Думка
                en: Opinion
            - id: opt_3
              text:
                ru: Неправда
                uk: Неправда
                en: Falsehood
          correct: opt_2
        - id: '14'
          type: speech
          duration_sec: 8
          text:
            ru: 'Мнение! «Интереснее» — у каждого своё. Нет прибора для измерения
              интересности!

              '
            uk: Думка! «Цікавіше» — у кожного своє. Немає приладу для вимірювання
              цікавості!
            en: Opinion! "More interesting" — everyone's different. No device measures
              interest!
        - id: '15'
          type: vote
          duration_sec: 10
          text:
            ru: '«Слоны умеют прыгать.»

              '
            uk: «Слони вміють стрибати.»
            en: '"Elephants can jump."'
          options:
            - id: opt_1
              text:
                ru: Факт
                uk: Факт
                en: Fact
            - id: opt_2
              text:
                ru: Мнение
                uk: Думка
                en: Opinion
            - id: opt_3
              text:
                ru: Неправда
                uk: Неправда
                en: Falsehood
          correct: opt_3
        - id: '16'
          type: speech
          duration_sec: 10
          text:
            ru: 'Неправда! Слоны — единственные млекопитающие, которые не могут прыгать.
              При их весе это было бы землетрясение!

              '
            uk: Неправда! Слони — єдині ссавці, які не можуть стрибати. При їхній
              вазі це був би землетрус!
            en: Falsehood! Elephants are the only mammals that can't jump. At their
              weight, it would be an earthquake!
        - id: '17'
          type: vote
          duration_sec: 10
          text:
            ru: '«В радуге семь цветов.»

              '
            uk: «У веселці сім кольорів.»
            en: '"A rainbow has seven colors."'
          options:
            - id: opt_1
              text:
                ru: Факт
                uk: Факт
                en: Fact
            - id: opt_2
              text:
                ru: Мнение
                uk: Думка
                en: Opinion
            - id: opt_3
              text:
                ru: Неправда
                uk: Неправда
                en: Falsehood
          correct: opt_1
        - id: '18'
          type: speech
          duration_sec: 8
          text:
            ru: 'Факт! Считаем: красный, оранжевый, жёлтый, зелёный, голубой, синий,
              фиолетовый. Семь!

              '
            uk: 'Факт! Рахуємо: червоний, помаранчевий, жовтий, зелений, голубий,
              синій, фіолетовий. Сім!'
            en: 'Fact! Count: red, orange, yellow, green, cyan, blue, violet. Seven!'
        - id: '19'
          type: vote
          duration_sec: 10
          text:
            ru: '«Понедельник — самый тяжёлый день недели.»

              '
            uk: «Понеділок — найважчий день тижня.»
            en: '"Monday is the hardest day of the week."'
          options:
            - id: opt_1
              text:
                ru: Факт
                uk: Факт
                en: Fact
            - id: opt_2
              text:
                ru: Мнение
                uk: Думка
                en: Opinion
            - id: opt_3
              text:
                ru: Неправда
                uk: Неправда
                en: Falsehood
          correct: opt_2
        - id: '20'
          type: speech
          duration_sec: 8
          text:
            ru: 'Мнение! Кому-то тяжёлый, а кому-то любимый. Нет прибора для измерения
              «тяжести» дня!

              '
            uk: Думка! Комусь важкий, а комусь улюблений. Немає приладу для вимірювання
              «важкості» дня!
            en: Opinion! For some it's hard, for others it's favorite. No device measures
              how hard a day is!
        - id: '21'
          type: vote
          duration_sec: 10
          text:
            ru: '«У жирафа шесть шейных позвонков.»

              '
            uk: «У жирафа шість шийних позвонків.»
            en: '"A giraffe has six neck vertebrae."'
          options:
            - id: opt_1
              text:
                ru: Факт
                uk: Факт
                en: Fact
            - id: opt_2
              text:
                ru: Мнение
                uk: Думка
                en: Opinion
            - id: opt_3
              text:
                ru: Неправда
                uk: Неправда
                en: Falsehood
          correct: opt_3
        - id: '22'
          type: speech
          duration_sec: 12
          text:
            ru: 'Хитрый! Неправда! У жирафа, как и у человека, СЕМЬ шейных позвонков.
              Просто каждый размером с кирпич! Можно посчитать — зоологи посчитали.

              '
            uk: Хитро! Неправда! У жирафа, як і у людини, СІМ шийних позвонків. Просто
              кожен розміром з цегл! Можна порахувати — зоологи порахували.
            en: Tricky! Falsehood! A giraffe, like humans, has SEVEN neck vertebrae.
              Just each one is brick-sized! You can count them — zoologists did.
        - id: '23'
          type: speech
          duration_sec: 12
          text:
            ru: 'А чем мы проверяем факты? Кто помнит пять инструментов? Весы, линейка,
              часы, термометр и счёт. Если можно получить ЧИСЛО — значит, можно проверить.

              '
            uk: А чим ми перевіряємо факти? Хто пам'ятає п'ять приладів? Ваги, лінійка,
              годинник, термометр та лічба. Якщо можна отримати ЧИСЛО — значить, можна
              перевірити.
            en: What do we use to check facts? Who remembers the five tools? Scales,
              ruler, clock, thermometer, and counting. If you can get a NUMBER — you
              can check it.
    - scene_id: sc2
      title:
        ru: 'Разминка: причина, совпадение, третья причина'
        uk: 'Розминка: причина, збіг, третя причина'
        en: 'Warm-up: Cause, Coincidence, Third Cause'
      media_ref: 3A.sc2.review_cause_coincidence
      status: v3_locked
      steps:
        - id: '24'
          type: speech
          duration_sec: 10
          text:
            ru: 'Теперь — причина и совпадение! ПРИЧИНА — первое действительно вызвало
              второе. СОВПАДЕНИЕ — просто произошло рядом.

              '
            uk: Тепер — причина та збіг! ПРИЧИНА — перше справді викликало друге.
              ЗБІГ — просто сталось поруч.
            en: Now — cause and coincidence! CAUSE — the first really made the second
              happen. COINCIDENCE — just happened together.
        - id: '25'
          type: vote
          duration_sec: 10
          text:
            ru: '«Уронил телефон на пол — экран треснул.»

              '
            uk: «Упустив телефон на підлогу — екран тріснув.»
            en: '"I dropped my phone — the screen cracked."'
          options:
            - id: opt_1
              text:
                ru: Причина
                uk: Причина
                en: Cause
            - id: opt_2
              text:
                ru: Совпадение
                uk: Збіг
                en: Coincidence
          correct: opt_1
        - id: '26'
          type: speech
          duration_sec: 8
          text:
            ru: 'Причина! Удар разбил экран. Не урони — не треснет. Телефон не трескается
              от одиночества!

              '
            uk: Причина! Удар розбив екран. Не впусти — не тріснеть. Телефон не тріскається
              від самотності!
            en: Cause! The impact cracked it. Don't drop it — no crack. Phones don't
              crack from loneliness!
        - id: '27'
          type: vote
          duration_sec: 10
          text:
            ru: '«Я съел бутерброд — по телевизору начался мультик.»

              '
            uk: «Я з'їв бутерброд — по телевізору почався мультик.»
            en: '"I ate a sandwich — a cartoon started on TV."'
          options:
            - id: opt_1
              text:
                ru: Причина
                uk: Причина
                en: Cause
            - id: opt_2
              text:
                ru: Совпадение
                uk: Збіг
                en: Coincidence
          correct: opt_2
        - id: '28'
          type: speech
          duration_sec: 8
          text:
            ru: 'Совпадение! Телевизору всё равно, ел ты бутерброд или нет. У него
              своё расписание!

              '
            uk: Збіг! Телевізору все одно, їв ти бутерброд чи ні. У нього свій розпорядок!
            en: Coincidence! TV doesn't care if you ate or not. It has its own schedule!
        - id: '29'
          type: vote
          duration_sec: 10
          text:
            ru: '«Мама открыла окно — в комнате стало холоднее.»

              '
            uk: «Мама відкрила вікно — у кімнаті стало холоднішим.»
            en: '"Mom opened the window — the room got colder."'
          options:
            - id: opt_1
              text:
                ru: Причина
                uk: Причина
                en: Cause
            - id: opt_2
              text:
                ru: Совпадение
                uk: Збіг
                en: Coincidence
          correct: opt_1
        - id: '30'
          type: speech
          duration_sec: 8
          text:
            ru: 'Причина! Холодный воздух зашёл с улицы. Закрой окно — снова тепло.
              Физика!

              '
            uk: Причина! Холодне повітря зайшло з вулиці. Закрий вікно — знова тепло.
              Фізика!
            en: Cause! Cold air came from outside. Close the window — warm again.
              Physics!
        - id: '31'
          type: vote
          duration_sec: 10
          text:
            ru: '«Я написал контрольную — зазвонил школьный звонок.»

              '
            uk: «Я написав контрольну — зазвенів шкільний дзвінок.»
            en: '"I finished the test — the school bell rang."'
          options:
            - id: opt_1
              text:
                ru: Причина
                uk: Причина
                en: Cause
            - id: opt_2
              text:
                ru: Совпадение
                uk: Збіг
                en: Coincidence
          correct: opt_2
        - id: '32'
          type: speech
          duration_sec: 8
          text:
            ru: 'Совпадение! Звонок звонит по расписанию, а не потому что ты дописал.
              Звонку всё равно!

              '
            uk: Збіг! Дзвінок звенить по розпорядженню, а не тому що ти дописав. Дзвінку
              все одно!
            en: Coincidence! The bell rings on schedule, not because you finished.
              The bell doesn't care!
        - id: '33'
          type: vote
          duration_sec: 10
          text:
            ru: '«Положили тесто в духовку — получился пирог.»

              '
            uk: «Поклали тісто у духовку — вийшов пиріг.»
            en: '"We put dough in the oven — a pie came out."'
          options:
            - id: opt_1
              text:
                ru: Причина
                uk: Причина
                en: Cause
            - id: opt_2
              text:
                ru: Совпадение
                uk: Збіг
                en: Coincidence
          correct: opt_1
        - id: '34'
          type: speech
          duration_sec: 8
          text:
            ru: 'Причина! Жар духовки превращает тесто в пирог. Без духовки — останется
              тесто. Тесто само не пропечётся от надежды!

              '
            uk: Причина! Жар духовки перетворює тісто у пиріг. Без духовки — залишиться
              тісто. Тісто само не пропечеться від надії!
            en: Cause! The oven's heat turns dough into pie. Without the oven — stays
              dough. Dough doesn't bake by hope!
        - id: '35'
          type: vote
          duration_sec: 10
          text:
            ru: '«Папа помыл машину — пошёл дождь.»

              '
            uk: «Батько помив машину — пішов дощ.»
            en: '"Dad washed the car — it started raining."'
          options:
            - id: opt_1
              text:
                ru: Причина
                uk: Причина
                en: Cause
            - id: opt_2
              text:
                ru: Совпадение
                uk: Збіг
                en: Coincidence
          correct: opt_2
        - id: '36'
          type: speech
          duration_sec: 10
          text:
            ru: 'Совпадение! Хотя папа, наверное, думает иначе! Но дождь не знает,
              мыл папа машину или нет. Облака не следят за папой!

              '
            uk: Збіг! Хоча батько, напевно, думає інакше! Але дощ не знає, мив батько
              машину чи ні. Хмари не стежать за батьком!
            en: Coincidence! Though Dad probably disagrees! But rain doesn't know
              if Dad washed the car. Clouds don't watch Dad!
        - id: '37'
          type: vote
          duration_sec: 10
          text:
            ru: '«Собака залаяла — почтальон убежал.»

              '
            uk: «Собака залаяла — листоноша убіг.»
            en: '"The dog barked — the mailman ran away."'
          options:
            - id: opt_1
              text:
                ru: Причина
                uk: Причина
                en: Cause
            - id: opt_2
              text:
                ru: Совпадение
                uk: Збіг
                en: Coincidence
          correct: opt_1
        - id: '38'
          type: speech
