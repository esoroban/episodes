            uk: 'Тобі показали, що у задачі ти зробив помилку. Ти: «Ні! У мене все
              правильно! Це в відповідях помилка!»'
            en: 'You''re shown you made a mistake in the problem. You: "No! I''m right!
              The answers are wrong!"'
          options:
            - id: opt_1
              text:
                ru: Солдат
                uk: Солдат
                en: Soldier
            - id: opt_2
              text:
                ru: Разведчик
                uk: Розвідник
                en: Scout
          correct: opt_1
        - id: '127'
          type: speech
          duration_sec: 8
          text:
            ru: 'Солдат! Виноваты все — ответы, учебник, вселенная. Только не он!

              '
            uk: Солдат! Винні всі — відповіді, підручник, Всесвіт. Тільки не він!
            en: Soldier! Everyone's guilty — the answers, the book, the universe.
              Everyone but him!
    - scene_id: sc6
      title:
        ru: Практика
        uk: Практика
        en: Practice
      media_ref: 3A.sc6.practice
      status: v3_locked
      steps:
        - id: '128'
          type: speech
          duration_sec: 15
          text:
            ru: 'Финальный раунд! Сейчас будут ситуации — а вы определяете ВСЁ сразу.
              Какая цель: ПОБЕДИТЬ, ПОНЯТЬ или ОБИДЕТЬ? А если это настоящий спор
              — солдат или разведчик?

              '
            uk: 'Фінальний раунд! Сейчас будуть ситуації — та ви визначаєте ВСЕ відразу.
              Яка мета: ПЕРЕМОГТИ, ЗРОЗУМІТИ чи ОБРАЗИТИ? А якщо це справжній спір
              — солдат або розвідник?'
            en: 'Final round! Now there are situations — you identify EVERYTHING at
              once. What''s the goal: WIN, UNDERSTAND, or HURT? And if it''s real
              arguing — soldier or scout?'
        - id: '129'
          type: vote
          duration_sec: 10
          text:
            ru: 'Одноклассники спорят, что полезнее — плавание или бег. Один: «Плавание!
              Это все врачи говорят! Что тут обсуждать?»

              '
            uk: 'Однокласники спорять, що корисніше — плавання або біг. Один: «Плавання!
              Це всі лікарі говорять! Що тут обговорювати?»'
            en: 'Classmates argue what''s healthier — swimming or running. One: "Swimming!
              All doctors say so! What''s to discuss?"'
          options:
            - id: opt_1
              text:
                ru: Победить
                uk: Перемогти
                en: Win
            - id: opt_2
              text:
                ru: Понять
                uk: Зрозуміти
                en: Understand
            - id: opt_3
              text:
                ru: Обидеть
                uk: Образити
                en: Hurt
          correct: opt_1
        - id: '130'
          type: speech
          duration_sec: 10
          text:
            ru: 'Победить! И роль — СОЛДАТ. Ссылается на «всех врачей», но ничего
              не объясняет. «Что тут обсуждать» — закрыл ворота крепости!

              '
            uk: Перемогти! Та роль — СОЛДАТ. Посилається на «всіх лікарів», але нічого
              не пояснює. «Що тут обговорювати» — закрив ворота крепості!
            en: Win! And the role is SOLDIER. References "all doctors" but explains
              nothing. "What's to discuss" — closed the fortress gates!
        - id: '131'
          type: vote
          duration_sec: 10
          text:
            ru: '«А давай сравним — плавание тренирует одни мышцы, бег другие. Может,
              лучше и то, и другое?»

              '
            uk: «А давай порівняємо — плавання тренує одні м'язи, біг інші. Може,
              краще й те й те?»
            en: '"How about we compare — swimming trains some muscles, running trains
              others. Maybe both are good?"'
          options:
            - id: opt_1
              text:
                ru: Победить
                uk: Перемогти
                en: Win
            - id: opt_2
              text:
                ru: Понять
                uk: Зрозуміти
                en: Understand
            - id: opt_3
              text:
                ru: Обидеть
                uk: Образити
                en: Hurt
          correct: opt_2
        - id: '132'
          type: speech
          duration_sec: 8
          text:
            ru: 'Понять! И роль — РАЗВЕДЧИК. Исследует, сравнивает, находит неожиданный
              вывод.

              '
            uk: Зрозуміти! Та роль — РОЗВІДНИК. Досліджує, порівнює, знаходить несподіваний
              висновок.
            en: Understand! And the role is SCOUT. Investigates, compares, finds unexpected
              conclusion.
        - id: '133'
          type: vote
          duration_sec: 10
          text:
            ru: '«Ты вообще спортом не занимаешься, тебе какая разница?»

              '
            uk: «Ти взагалі спортом не займаєшся, тобі яка різниця?»
            en: '"You don''t even do sports, why do you care?"'
          options:
            - id: opt_1
              text:
                ru: Победить
                uk: Перемогти
                en: Win
            - id: opt_2
              text:
                ru: Понять
                uk: Зрозуміти
                en: Understand
            - id: opt_3
              text:
                ru: Обидеть
                uk: Образити
                en: Hurt
          correct: opt_3
        - id: '134'
          type: speech
          duration_sec: 8
          text:
            ru: 'Обидеть! Ему не важен ни бег, ни плавание. Нападение на человека.

              '
            uk: Образити! Йому не важен ні біг, ні плавання. Напад на людину.
            en: Hurt! He doesn't care about running or swimming. Attack on the person.
        - id: '135'
          type: vote
          duration_sec: 10
          text:
            ru: 'Сестра: «Ты сломал мой карандаш!» Брат: «Нет, не ломал! Это ты его
              плохо точила! И вообще!»

              '
            uk: 'Сестра: «Ти зламав мій олівець!» Брат: «Ні, не ламав! Це ти його
              погано гострила! та й взагалі!»'
            en: 'Sister: "You broke my pencil!" Brother: "No, I didn''t! You sharpened
              it badly! And anyway!"'
          options:
            - id: opt_1
              text:
                ru: Победить
                uk: Перемогти
                en: Win
            - id: opt_2
              text:
                ru: Понять
                uk: Зрозуміти
                en: Understand
            - id: opt_3
              text:
                ru: Обидеть
                uk: Образити
                en: Hurt
          correct: opt_1
        - id: '136'
          type: speech
          duration_sec: 8
          text:
            ru: 'Победить! СОЛДАТ — защищается, атакует в ответ. Карандаш уже не важен
              — важно не сдаться!

              '
            uk: Перемогти! СОЛДАТ — захищається, контратакує. Олівець уже не важливий
              — важливо не здатися!
            en: Win! SOLDIER — defends, counterattacks. The pencil doesn't matter
              anymore — important not to surrender!
        - id: '137'
          type: vote
          duration_sec: 10
          text:
            ru: 'Другой вариант. Брат: «Ой, правда сломан? Давай посмотрим, может
              его можно склеить.»

              '
            uk: 'Інший варіант. Брат: «О, правда зламаний? Давай подивимось, може
              його можна склеїти.»'
            en: 'Another option. Brother: "Oh, really broken? Let''s see, maybe we
              can glue it."'
          options:
            - id: opt_1
              text:
                ru: Победить
                uk: Перемогти
                en: Win
            - id: opt_2
              text:
                ru: Понять
                uk: Зрозуміти
                en: Understand
            - id: opt_3
              text:
                ru: Обидеть
                uk: Образити
                en: Hurt
          correct: opt_2
        - id: '138'
          type: speech
          duration_sec: 8
          text:
            ru: 'Понять! РАЗВЕДЧИК — не спорит, кто виноват, а ищет решение.

              '
            uk: Зрозуміти! РОЗВІДНИК — не спорить, хто винний, а шукає рішення.
            en: Understand! SCOUT — doesn't argue who's guilty, seeks solution.
        - id: '139'
          type: vote
          duration_sec: 10
          text:
            ru: 'Друзья спорят, кто сильнее — лев или тигр. Один: «Лев — он царь зверей!
              Это общеизвестно!»

              '
            uk: 'Друзі спорять, хто сильніше — лев або тигр. Один: «Лев — він цар
              звірів! Це загальновідомо!»'
            en: 'Friends argue who''s stronger — lion or tiger. One: "Lion — he''s
              the king of beasts! It''s common knowledge!"'
          options:
            - id: opt_1
              text:
                ru: Победить
                uk: Перемогти
                en: Win
            - id: opt_2
              text:
                ru: Понять
                uk: Зрозуміти
                en: Understand
            - id: opt_3
              text:
                ru: Обидеть
                uk: Образити
                en: Hurt
          correct: opt_1
        - id: '140'
          type: speech
          duration_sec: 8
          text:
            ru: 'Победить! СОЛДАТ — «царь зверей» как последний аргумент. Корона —
              его щит!

              '
            uk: Перемогти! СОЛДАТ — «цар звірів» як останній аргумент. Корона — його
              щит!
            en: Win! SOLDIER — "king of beasts" as final argument. Crown is his shield!
        - id: '141'
          type: vote
          duration_sec: 10
          text:
            ru: 'Другой: «А я читал, что тигры тяжелее и быстрее. Но львы охотятся
              стаями... Тут непросто!»

              '
            uk: 'Інший: «А я читав, що тигри важче та швидше. Але леви полюють зграями...
              Тут непросто!»'
            en: 'Another: "I read that tigers are heavier and faster. But lions hunt
              in packs... It''s complicated!"'
          options:
            - id: opt_1
              text:
                ru: Победить
                uk: Перемогти
                en: Win
            - id: opt_2
              text:
                ru: Понять
                uk: Зрозуміти
                en: Understand
            - id: opt_3
              text:
                ru: Обидеть
                uk: Образити
                en: Hurt
          correct: opt_2
        - id: '142'
          type: speech
          duration_sec: 8
          text:
            ru: 'Понять! РАЗВЕДЧИК — собирает факты, видит сложность, не торопится
              с выводом.

              '
            uk: Зрозуміти! РОЗВІДНИК — збирає факти, бачить складність, не поспішає
              з висновком.
            en: Understand! SCOUT — collects facts, sees complexity, doesn't rush
              conclusions.
        - id: '143'
          type: vote
          duration_sec: 10
          text:
            ru: 'Подруги обсуждают мультик. Одна: «Этот мультик тупой, и все, кому
              он нравится, тоже.»

              '
            uk: 'Подруги обговорюють мультик. Одна: «Цей мультик тупий, та всі, кому
              він подобається, також.»'
            en: 'Friends discuss a cartoon. One: "This cartoon is stupid, and so is
              everyone who likes it."'
          options:
            - id: opt_1
              text:
                ru: Победить
                uk: Перемогти
                en: Win
            - id: opt_2
              text:
                ru: Понять
                uk: Зрозуміти
                en: Understand
            - id: opt_3
              text:
                ru: Обидеть
                uk: Образити
                en: Hurt
          correct: opt_3
        - id: '144'
          type: speech
          duration_sec: 8
          text:
            ru: 'Обидеть! Нападает на всех, кому нравится. Не спор — удар.

              '
            uk: Образити! Нападає на всіх, кому подобається. Не спір — удар.
            en: Hurt! Attacks everyone who likes it. Not an argument — a blow.
        - id: '145'
          type: vote
          duration_sec: 10
          text:
            ru: 'Мальчик: «Я думаю, собаки умнее кошек.» Друг: «А почему? Ты имеешь
              в виду, что они лучше учат команды? Или что-то другое?»

              '
            uk: 'Хлопчик: «Я думаю, собаки розумніші кішок.» Друг: «А чому? Ти маєш
              на увазі, що вони краще вчать команди? Чи щось інше?»'
            en: 'Boy: "I think dogs are smarter than cats." Friend: "Why? Do you mean
              they learn commands better? Or something else?"'
          options:
            - id: opt_1
              text:
                ru: Победить
                uk: Перемогти
                en: Win
            - id: opt_2
              text:
                ru: Понять
                uk: Зрозуміти
                en: Understand
            - id: opt_3
              text:
                ru: Обидеть
                uk: Образити
                en: Hurt
          correct: opt_2
        - id: '146'
          type: speech
          duration_sec: 10
          text:
            ru: 'Понять! РАЗВЕДЧИК — не спорит сразу, а уточняет, ЧТО именно собеседник
              имеет в виду. Вот это настоящий разведчик!

              '
            uk: Зрозуміти! РОЗВІДНИК — не спорить відразу, а уточнює, ЩО саме співрозмовник
              має на увазі. Ось це справжній розвідник!
            en: Understand! SCOUT — doesn't argue right away, clarifies WHAT exactly
              the other means. That's a true scout!
        - id: '147'
          type: vote
          duration_sec: 10
          text:
            ru: 'Спорят, лучше жить в городе или в селе. Один: «В селе скучно, там
              даже интернета нет! Только дурак туда поедет!»

              '
            uk: 'Спорять, краще жити у місті або на селі. Один: «На селі нудно, там
              навіть інтернету немає! Тільки дурень туди поїде!»'
            en: 'They argue what''s better — city or village. One: "Village is boring,
              there''s no internet! Only fools go there!"'
          options:
            - id: opt_1
              text:
                ru: Победить
                uk: Перемогти
                en: Win
            - id: opt_2
              text:
                ru: Понять
                uk: Зрозуміти
                en: Understand
            - id: opt_3
              text:
                ru: Обидеть
                uk: Образити
                en: Hurt
          correct: opt_1
        - id: '148'
          type: speech
          duration_sec: 12
          text:
            ru: 'Хитрый! Победить, но с элементом обиды. Он спорит о теме, но добавляет
              оскорбление. «Только дурак» — это уже нападение. СОЛДАТ, который берёт
              чужой меч.

              '
            uk: Хитро! Перемогти, але з елементом образи. Він спорить про тему, але
              додає образу. «Тільки дурень» — це вже напад. СОЛДАТ, який бере чужий
              меч.
            en: Tricky! Win, but with an element of hurt. He argues about the topic
              but adds an insult. "Only fools" — that's already an attack. SOLDIER
              who takes someone else's sword.
        - id: '149'
          type: vote
          duration_sec: 10
          text:
            ru: 'Другой: «Хм, а в селе зато свежий воздух и природа. Может, зависит
              от того, что тебе важнее?»

              '
            uk: 'Інший: «Хм, а на селі зате свіже повітря та природа. Може, залежить
              від того, що тобі важливіше?»'
            en: 'Another: "Hmm, but in the village there''s fresh air and nature.
              Maybe it depends on what matters more to you?"'
          options:
            - id: opt_1
              text:
                ru: Победить
                uk: Перемогти
                en: Win
            - id: opt_2
              text:
                ru: Понять
                uk: Зрозуміти
                en: Understand
            - id: opt_3
              text:
                ru: Обидеть
                uk: Образити
                en: Hurt
          correct: opt_2
        - id: '150'
          type: speech
          duration_sec: 8
          text:
            ru: 'Понять! РАЗВЕДЧИК — видит плюсы другой стороны и предлагает разобраться.

              '
            uk: Зрозуміти! РОЗВІДНИК — бачить переваги іншої сторони та пропонує розібратися.
            en: Understand! SCOUT — sees the other side's advantages and suggests
              figuring it out.
        - id: '151'
          type: speech
          duration_sec: 15
          text:
            ru: 'Заметили, как разведчик отличается? Он не кричит — спрашивает. Не
              нападает — исследует. Улыбается, даже когда слышит то, с чем не согласен.
              И в итоге — он ВСЕГДА знает больше, чем солдат.

              '
            uk: Помітили, як розвідник відрізняється? Він не кричить — запитує. Не
              нападає — досліджує. Посміхається, навіть коли чує те, з чим не згоден.
              І врешті — він ЗАВЖДИ знає більше, ніж солдат.
            en: See how the scout is different? He doesn't shout — asks. Doesn't attack
              — investigates. Smiles, even when hearing disagreement. And in the end
              — he ALWAYS knows more than the soldier.
        - id: '152'
          type: speech
          duration_sec: 12
          text:
            ru: 'Запомним: прежде чем вступить в спор, спроси себя — я хочу ПОБЕДИТЬ,
              ПОНЯТЬ или ОБИДЕТЬ? Если понять — вперёд! Если победить — остановись
              и подумай. Если обидеть — это вообще не спор.

              '
            uk: 'Запам''ятаємо: перш ніж вступити у спір, спитай себе — я хочу ПЕРЕМОГТИ,
              ЗРОЗУМІТИ чи ОБРАЗИТИ? Якщо зрозуміти — вперед! Якщо перемогти — зупинись
              та подумай. Якщо образити — це взагалі не спір.'
            en: 'Remember: before starting an argument, ask yourself — do I want to
              WIN, UNDERSTAND, or HURT? If understand — go ahead! If win — stop and
              think. If hurt — it''s not even arguing.'
        - id: '153'
          type: speech
          duration_sec: 10
          text:
            ru: 'И второй вопрос: «Я сейчас солдат или разведчик?» Если солдат — сними
              щит. Возьми бинокль. Улыбнись. И спроси: «А вдруг я узнаю что-то новое?»

              '
            uk: 'Та другого питання: «Я сейчас солдат або розвідник?» Якщо солдат
              — зніми щит. Візьми бінокль. Посміхнись. Та запитай: «А вдруг я дізнаюсь
              щось новое?»'
            en: 'And the second question: "Am I a soldier or scout right now?" If
              soldier — drop the shield. Take binoculars. Smile. And ask: "What if
              I learn something new?"'
    - scene_id: sc7
      title:
        ru: Закрытие
        uk: Закриття
        en: Closing
      media_ref: 3A.sc7.closing
      status: v3_locked
      steps:
        - id: '154'
          type: speech
          duration_sec: 15
          text:
            ru: 'Давайте подведём итоги! Сегодня мы узнали три важные вещи.

              '
            uk: Давайте підсумуємо! Сьогодні ми дізналися три важливі речи.
            en: Let's wrap up! Today we learned three important things.
        - id: '155'
          type: speech
          duration_sec: 15
          text:
            ru: 'Первое: у спора бывают ТРИ ЦЕЛИ — победить, понять или обидеть. Обидеть
              — это вообще не спор. Победить — тупик. Полезная цель — только ПОНЯТЬ.

              '
            uk: 'Перше: у спору бувають ТРИ ЦІЛІ — перемогти, зрозуміти або образити.
              Образити — це взагалі не спір. Перемогти — тупик. Корисна мета — тільки
              ЗРОЗУМІТИ.'
            en: 'First: arguments have THREE GOALS — win, understand, or hurt. Hurt
              isn''t even arguing. Win is a dead end. The useful goal is only to UNDERSTAND.'
        - id: '156'
          type: speech
          duration_sec: 15
          text:
            ru: 'Второе: есть ДВЕ РОЛИ — солдат и разведчик. Солдат защищает крепость
              своего мнения. Разведчик исследует мир с улыбкой и биноклем. Солдат
              может быть прав случайно. Разведчик — осознанно.

              '
            uk: 'Друге: є ДВІ РОЛІ — солдат та розвідник. Солдат захищає крепість
              своєї думки. Розвідник досліджує світ з посмішкою та біноклем. Солдат
              може бути правий випадково. Розвідник — свідомо.'
            en: 'Second: there are TWO ROLES — soldier and scout. The soldier defends
              his fortress of opinion. The scout explores the world with a smile and
