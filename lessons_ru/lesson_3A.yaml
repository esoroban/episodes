            en: 'Here''s the key difference: a soldier might be right by ACCIDENT.
              A scout is right KNOWINGLY — because he checked. And if it turns out
              he was wrong — he calmly says: "Wow, didn''t know! Thanks!" A soldier?
              He''ll keep shouting, even if all evidence is against him.'
