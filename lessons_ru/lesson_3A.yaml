            ru: 'Итак, мы нашли три цели: победить, понять и обидеть. Но третья, ОБИДЕТЬ
              — это вообще не спор. Это нападение. Спорить с тем, кто хочет обидеть
              — всё равно что играть в шахматы с тем, кто кидается фигурами.

              '
            uk: 'Отже, ми знайшли три цілі: перемогти, зрозуміти та образити. Але
              третя, ОБРАЗИТИ — це взагалі не спір. Це напад.'
            en: 'So we found three goals: win, understand, hurt. But the third, HURT
              — that''s not even arguing. That''s an attack.'
        - id: '101'
          type: speech
          duration_sec: 15
          text:
            ru: 'А вот НАСТОЯЩИЙ спор — это когда оба хотят что-то доказать. И тут
              вопрос: КАК ты это делаешь? Для этого есть две роли. Представьте двух
              людей — один СОЛДАТ, другой РАЗВЕДЧИК.

              '
            uk: 'А от СПРАВЖНІЙ спір — це коли обидва хочуть щось довести. Та тут
              питання: ЯК ти це робиш? Для цього є дві ролі. Уявіть двох людей — один
              СОЛДАТ, інший РОЗВІДНИК.'
            en: 'But REAL arguing — that''s when both want to prove something. And
              the question is: HOW do you do it? There are two roles. Imagine two
              people — one SOLDIER, another SCOUT.'
        - id: '102'
          type: speech
          duration_sec: 25
          text:
            ru: 'СОЛДАТ в споре — защитник крепости. Его крепость — это его мнение.
              Он стоит за стеной, закрылся щитом и кричит: «Не пущу! Моё мнение —
              самое правильное!» Если кто-то говорит: «А может, ты ошибаешься?» —
              солдат злится. Для него признать ошибку — это сдать крепость. Причём
              — внимание! — солдат может быть даже ПРАВ. Но он всё равно солдат, потому
              что ему важна не истина, а победа.

              '
            uk: 'СОЛДАТ у спорі — захисник крепості. Його крепість — це його думка.
              Він стоїть за стіною, закрився щитом та кричить: «Не пущу! Моя думка
              — найправильніша!» Якщо хтось говорить: «А може, ти помиляєшся?» — солдат
              злиться. Для нього признати помилку — це здати крепість. Причому — увага!
              — солдат може бути навіть ПРАВИЙ. Але він все одно солдат, тому що йому
              важна не істина, а перемога.'
            en: 'A SOLDIER in an argument — a fortress defender. His fortress is his
              opinion. He stands behind a wall, shield up, shouting: "Don''t pass!
              My opinion is the most right!" If someone says: "Maybe you''re wrong?"
              — soldier gets mad. For him, admitting a mistake means surrendering.
              And — attention! — the soldier might even be RIGHT. But he''s still
              a soldier because winning matters more than truth.'
        - id: '103'
          type: speech
          duration_sec: 30
          text:
            ru: 'РАЗВЕДЧИК — совсем другое дело. Он не сидит в крепости — он идёт
              в мир. С биноклем, с блокнотом и — обратите внимание — с улыбкой! Разведчик
              даже в тылу врага улыбается и ОЧЕНЬ внимательно слушает. Потому что
              каждое слово собеседника — это информация. Он думает: «А что там на
              самом деле? Может, я чего-то не знаю?» Если кто-то говорит: «Ты ошибаешься»
              — разведчик не злится, а радуется: «О! Значит, я сейчас узнаю что-то
              новое!»

              '
            uk: 'РОЗВІДНИК — зовсім інша справа. Він не сидить у крепості — він йде
              в світ. З біноклем, з блокнотом та — зверніть увагу — з посмішкою! Розвідник
              навіть у тилу ворога посміхається та ДУЖЕ уважно слухає. Тому що кожне
              слово співрозмовника — це інформація. Він думає: «А що там насправді?
              Може, я чогось не знаю?» Якщо хтось говорить: «Ти помиляєшся» — розвідник
              не злиться, а радіє: «О! Значить, я сейчас дізнаюсь щось новое!»'
            en: 'A SCOUT — quite different. He doesn''t sit in a fortress — he goes
              into the world. With binoculars, with a notebook, and — note this —
              with a smile! A scout even behind enemy lines smiles and listens VERY
              carefully. Because every word the other person says is information.
              He thinks: "What''s really true? Maybe I don''t know something?" If
              someone says: "You''re wrong" — the scout doesn''t get mad, he''s happy:
              "Oh! So I''ll learn something new!"'
        - id: '104'
          type: speech
          duration_sec: 25
          text:
            ru: 'Вот пример. Два друга спорят: что полезнее — шоколад или яблоки?
              Солдат говорит: «Яблоки полезнее, это очевидно! Даже спорить глупо!
              Все знают!» Заметьте — он скорее всего ПРАВ! Яблоки правда полезнее.
              Но он солдат, потому что не объясняет ПОЧЕМУ, не слушает другого, просто
              давит.

              '
            uk: 'Ось приклад. Два други спорять: що корисніше — шоколад або яблука?
              Солдат говорить: «Яблука корисніше, це очевидно! Навіть спорити глупо!
              Все знають!» Помітьте — він скоріше за все ПРАВИЙ! Яблука правда корисніше.
              Але він солдат, тому що не пояснює ЧОМУ, не слухає іншого, просто давить.'
            en: 'Here''s an example. Two friends argue: what''s healthier — chocolate
              or apples? Soldier says: "Apples are healthier, it''s obvious! It''s
              stupid to even argue! Everyone knows!" Notice — he''s probably RIGHT!
              Apples really are healthier. But he''s a soldier because he doesn''t
              explain WHY, doesn''t listen to the other, just pushes.'
        - id: '105'
          type: speech
          duration_sec: 25
          text:
            ru: 'А разведчик? «Хм, интересно. Давай разберёмся. В яблоках есть витамин
              С и клетчатка. А в шоколаде? Какао, магний... Но ещё много сахара. Получается,
              яблоки правда полезнее — но и в шоколаде кое-что хорошее есть!» Видите?
              Он пришёл к тому же выводу — но ЧЕРЕЗ исследование. И по дороге узнал
              больше, чем солдат когда-либо узнает.

              '
            uk: А розвідник? «Хм, цікаво. Давай розберемось. В яблуках є вітамін С
              та клітковина. А в шоколаді? Какао, магній... Але також багато цукру.
              Виходить, яблука правда корисніше — але в шоколаді кое-що хороше є!»
              Бачите? Він прийшов до того ж висновку — але ЧЕРЕЗ дослідження. Та на
              шляху дізнався більше, ніж солдат коли-либо дізнається.
            en: What about the scout? "Hmm, interesting. Let's figure it out. Apples
              have vitamin C and fiber. Chocolate? Cocoa, magnesium... But lots of
              sugar. So apples are really healthier — but chocolate has some good
              in it!" See? He reached the same conclusion — but THROUGH investigating.
              And along the way learned more than the soldier ever will.
        - id: '106'
          type: speech
          duration_sec: 20
          text:
            ru: 'Вот главная разница: солдат может быть прав СЛУЧАЙНО. Разведчик прав
              ОСОЗНАННО — потому что проверил. И если вдруг окажется, что он ошибался
              — он спокойно скажет: «Ого, не знал! Спасибо!» А солдат? Он до последнего
              будет кричать, даже если все доказательства против него.

              '
            uk: 'Ось головна різниця: солдат може бути правий ВИПАДКОВО. Розвідник
              правий СВІДОМО — тому що перевірив. Та якщо вдруг виявиться, що він
              помиляється — він спокійно скаже: «Ого, не знав! Спасибо!» А солдат?
