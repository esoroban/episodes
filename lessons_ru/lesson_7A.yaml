              в порядке.

              '
            uk: 'И ещё важное: закон работает только когда говорят об одном и том
              же, в одно и то же время. «Вчера было холодно, сегодня тепло» — это
              не суперечність, погода изменилась. «Для Маши контрольная лёгкая, для
