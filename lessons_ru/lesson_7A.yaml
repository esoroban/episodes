        - id: '33'
          type: speech
          duration_sec: 10
          text:
            ru: 'Кстати, знаменитый парадокс: может ли всемогущее существо создать
              камень, который оно само не сможет поднять? Если может создать — значит
              не может поднять, и уже не всемогущее. Если не может создать — тоже
              не всемогущее. Эта загадка ставит в тупик взрослых — а вы теперь понимаете:
              это ловушка закона непротиворечия.

              '
            uk: 'Кстати, знаменитый парадокс: может ли всемогущее существо создать
