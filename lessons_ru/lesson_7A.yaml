lesson:
  id: lesson_7A
  day: 7
  slot: A
  title:
    ru: Противоречия и обоснование
    uk: Суперечності та обґрунтування
    en: Contradictions and Justification
  scenes:
    - scene_id: sc1
      title:
        ru: Открытие
        uk: Відкриття
        en: Discovery
      media_ref: 7A.sc1.opening
      status: v3_locked
      steps:
        - id: '1'
          type: speech
          duration_sec: 15
          text:
            ru: 'Ребята, у меня для вас история. Настоящая, из жизни. Слушайте внимательно
              — потому что в ней спрятана ловушка, и я хочу посмотреть, кто её заметит.

              '
            uk: Ребята, у меня для вас історія. Настоящая, из жизни. Слушайте внимательно
              — потому что в ней спрятана ловушка, и я хочу посмотреть, кто её заметит.
            en: Guys, I have a story for you. Real, from life. Listen carefully -
              because there is a trap hidden in it, and I want to see who will notice
              it.
        - id: '2'
          type: speech
          duration_sec: 18
          text:
            ru: 'Петя говорит маме: «Я не ел конфеты. Вообще ни одной!» Мама смотрит
              на Петю. А у Пети — шоколад на щеке. И фантик в кармане торчит. И кот
              подозрительно облизывается — но это ладно, кот тут ни при чём.

              '
            uk: 'Петя говорит маме: «Я не ел конфеты. Вообще ни одной!» Мама смотрит
              на Петю. А у Пети — шоколад на щеке. И фантик в кармане торчит. И кот
              подозрительно облизывается — но это ладно, кот тут ни при чём.'
            en: 'Petya tells his mother: “I didn’t eat candy. Not a single one at
              all!” Mom looks at Petya. And Petya has chocolate on his cheek. And
              the candy wrapper is sticking out in my pocket. And the cat licks his
              lips suspiciously - but that’s okay, the cat has nothing to do with
              it.'
        - id: '3'
          type: pause
          duration_sec: 5
          text:
            ru: 'Что тут не так?

              '
            uk: Що тут не так?
            en: What's wrong here?
        - id: '4'
          type: speech
          duration_sec: 18
          text:
            ru: 'Петя сказал: «Я не ел конфеты» — но шоколад на щеке говорит прямо
              противоположное. Одно из двух: или он ел, или не ел. Оба утверждения
              одновременно правдой быть не могут. Это — противоречие.

              '
            uk: 'Петя сказал: «Я не ел конфеты» — но шоколад на щеке говорит прямо
              противоположное. Одно из двух: или он ел, или не ел. Оба утверждения
              одновременно правдой быть не могут. Это — суперечність.'
            en: 'Petya said: “I didn’t eat candy” - but the chocolate on his cheek
              says just the opposite. One of two things: either he ate or he didn’t
              eat. Both statements cannot be true at the same time. This is a contradiction.'
        - id: '5'
          type: speech
          duration_sec: 20
          text:
            ru: 'И знаете что? Тысячи лет назад один очень умный грек по имени Аристотель
              заметил то же самое. Он сказал: одна и та же вещь не может одновременно
              быть и не быть. Нельзя одновременно съесть конфету и не съесть конфету.
              Это называется закон непротиворечия — одно из главных правил мышления.

              '
            uk: 'И знаете что? Тысячи лет назад один очень умный грек по имени Аристотель
              заметил то же самое. Он сказал: одна и та же вещь не может одновременно
              быть и не быть. Нельзя одновременно съесть конфету и не съесть конфету.
              Это называется закон несуперечності — одно из главных правил мышления.'
            en: 'And guess what? Thousands of years ago, a very smart Greek named
              Aristotle noticed the same thing. He said: the same thing cannot be
              and not be at the same time. You can''t eat candy and not eat candy
              at the same time. This is called the law of non-contradiction - one
              of the main rules of thinking.'
        - id: '6'
          type: speech
          duration_sec: 14
          text:
            ru: 'Звучит сложно? На самом деле вы пользуетесь этим законом каждый день!
              Когда друг говорит «я не брал твой карандаш», а карандаш торчит у него
              из пенала — вы сразу чувствуете: что-то не сходится.

              '
            uk: 'Звучит сложно? На самом деле вы пользуетесь этим законом каждый день!
              Когда друг говорит «я не брал твой карандаш», а карандаш торчит у него
              из пенала — вы сразу чувствуете: что-то не сходится.'
            en: 'Sounds complicated? In fact, you use this law every day! When a friend
              says, “I didn’t take your pencil,” and the pencil is sticking out of
              his pencil case, you immediately feel that something doesn’t add up.'
        - id: '7'
          type: speech
          duration_sec: 16
          text:
            ru: 'Сегодня мы научимся замечать такие противоречия, вежливо на них указывать
              — и ещё спрашивать «Почему ты так думаешь?», когда кто-то что-то утверждает
              без объяснений.

              '
            uk: Сегодня мы научимся замечать такие суперечності, вежливо на них указывать
              — и ещё спрашивать «Почему ты так думаешь?», когда кто-то что-то утверждает
              без объяснений.
            en: Today we will learn to notice such contradictions, politely point
              them out - and also ask “Why do you think that?” when someone claims
              something without explanation.
    - scene_id: sc2
      title:
        ru: ИСТОРИЯ — ВИТИНЫ ПРАВИЛА
        uk: ИСТОРИЯ — ВИТИНЫ ПРАВИЛА
        en: HISTORY - WITNESS RULES
      media_ref: 7A.sc2.story_vitya
      status: v3_locked
      steps:
        - id: '8'
          type: speech
          duration_sec: 6
          text:
            ru: А теперь послушайте интересную историю о правилах, которые работают
              не для всех. Слушайте внимательно!
            uk: А теперь послушайте интересную историю о правилах, которые работают
              не для всех. Слушайте внимательно!
            en: Now listen to an interesting story about rules that do not work for
              everyone. Listen carefully!
        - id: '9'
          type: speech
          duration_sec: 14
          text:
            ru: 'Ребята играли в настольную игру. Витя был судьёй и объявил правило:
              «Каждый игрок должен обходить клеточку по кругу. Кто срежет — не считается!»'
            uk: 'Ребята играли в настольную игру. Витя был судьёй и объявил правило:
              «Каждый игрок должен обходить клеточку по кругу. Кто срежет — не считается!»'
            en: 'The guys played a board game. Vitya was the judge and announced the
              rule: “Each player must go around the square in a circle. Whoever cuts
              it doesn’t count!”'
        - id: '10'
          type: speech
          duration_sec: 14
          text:
            ru: Все послушались. Обходили, теряли время. А когда Витя сам дошёл до
              финиша — он взял и срезал! Прямиком через клеточку. «Я первый!» — крикнул
              он.
            uk: Все послушались. Обходили, теряли время. А когда Витя сам дошёл до
              финиша — он взял и срезал! Прямиком через клеточку. «Я первый!» — крикнул
              он.
            en: Everyone obeyed. They walked around and wasted time. And when Vitya
              himself reached the finish line, he took it and cut it! Straight through
              the cell. "I'm first!" - he shouted.
        - id: '11'
          type: speech
          duration_sec: 14
          text:
            ru: 'Друзья переглянулись: «Стоп! Ты сам придумал правило — и сам его
              нарушил!» Витя покраснел и признался: он придумал правило, чтобы выиграть
              самому.'
            uk: 'Друзья переглянулись: «Стоп! Ты сам придумал правило — и сам его
              нарушил!» Витя покраснел и признался: он придумал правило, чтобы выиграть
              самому.'
            en: 'The friends looked at each other: “Stop! You made up the rule yourself
              - and you broke it yourself!” Vitya blushed and admitted: he came up
              with the rule to win himself.'
        - id: '12'
          type: discussion
          duration_sec: 20
          text:
            ru: 'Что произошло в истории? Что сделал Витя?

              '
            uk: Что произошло в истории? Что сделал Витя?
            en: What happened in history? What did Vitya do?
        - id: '13'
          type: vote
          duration_sec: 12
          text:
            ru: 'Витя противоречил сам себе?

              '
            uk: Витя противоречил сам себе?
            en: Did Vitya contradict himself?
          options:
            - id: opt_1
              text:
                ru: Да, противоречие
                uk: Так, суперечність
                en: Yes, contradiction
            - id: opt_2
              text:
                ru: Нет, всё логично
                uk: Ні, все логічно
                en: No, it's logical
          correct: opt_1
        - id: '14'
          type: speech
          duration_sec: 10
          text:
            ru: 'Точно! Витя сказал одно, а поступил наоборот. Классическое противоречие
              — помните нашего Петю с конфетами? Та же история, только без шоколада
              на щеке.

              '
            uk: Точно! Витя сказал одно, а поступил наоборот. Классическое суперечність
              — помните нашего Петю с конфетами? Та же історія, только без шоколада
              на щеке.
            en: Exactly! Vitya said one thing, but did the opposite. A classic contradiction
              - remember our Petya with sweets? Same story, only without the chocolate
              on the cheek.
        - id: '15'
          type: discussion
          duration_sec: 20
          text:
            ru: 'А как друзья это заметили? Что им помогло?

              '
            uk: А как друзья это заметили? Что им помогло?
            en: How did your friends notice this? What helped them?
        - id: '16'
          type: speech
          duration_sec: 10
          text:
            ru: 'Они запомнили, что Витя говорил раньше! Вот первый инструмент: чтобы
              заметить противоречие — нужно фиксировать, что человек говорил. Запомнить
              или даже записать.

              '
            uk: 'Они запомнили, что Витя говорил раньше! Вот первый инструмент: чтобы
              заметить суперечність — нужно фиксировать, что человек говорил. Запомнить
              или даже записать.'
            en: 'They remembered what Vitya said earlier! Here is the first tool:
              to notice a contradiction, you need to record what the person said.
              Remember or even write down.'
    - scene_id: sc3
      title:
        ru: Понятие противоречия
        uk: Понятие суперечності
        en: Concept of contradiction
      media_ref: 7A.sc3.contradiction_concept
      status: v3_locked
      steps:
        - id: '17'
          type: speech
          duration_sec: 14
          text:
            ru: 'Ребята, помните, я рассказывал про Аристотеля? Грек, который жил
              больше двух тысяч лет назад и преподавал самому Александру Македонскому
              — тому самому великому полководцу!

              '
            uk: Ребята, помните, я рассказывал про Аристотеля? Грек, который жил больше
              двух тысяч лет назад и преподавал самому Александру Македонскому — тому
              самому великому полководцу!
            en: Guys, remember when I talked about Aristotle? A Greek who lived more
              than two thousand years ago and taught Alexander the Great himself -
              that same great commander!
        - id: '18'
          type: speech
          duration_sec: 14
          text:
            ru: 'Аристотель обожал разбираться, как люди думают — и почему иногда
              думают неправильно. И записал три закона логики — как три правила дорожного
              движения, только для мышления. Нарушишь — попадёшь в аварию. Мысленную.

              '
            uk: Аристотель обожал разбираться, как люди думают — и почему иногда думают
              неправильно. И записал три закона логики — как три правила дорожного
              движения, только для мышления. Нарушишь — попадёшь в аварию. Мысленную.
            en: Aristotle loved to understand how people think—and why they sometimes
              think incorrectly. And he wrote down three laws of logic - like three
              rules of the road, only for thinking. If you violate it, you will get
              into an accident. Mental.
        - id: '19'
          type: speech
          duration_sec: 16
          text:
            ru: 'Первый закон — закон тождества — мы уже знаем. По-научному: каждое
              понятие должно оставаться самим собой. А по-простому — «стул» значит
              «стул», а не «табуретка» и не «кресло». Если в середине разговора слово
              вдруг меняет значение — логика ломается. Мы это проходили!

              '
            uk: 'Первый закон — закон тождества — мы уже знаем. По-научному: каждое
              понятие должно оставаться самим собой. А по-простому — «стул» значит
              «стул», а не «табуретка» и не «кресло». Если в середине разговора слово
              вдруг меняет значение — логика ломается. Мы это проходили!'
            en: 'We already know the first law - the law of identity. Scientifically:
              each concept must remain itself. But in simple terms, “chair” means
              “chair”, not “stool” or “chair”. If in the middle of a conversation
              a word suddenly changes its meaning, the logic breaks down. We''ve been
              through this!'
        - id: '20'
          type: speech
          duration_sec: 16
          text:
            ru: 'Сегодня — второй закон Аристотеля: закон непротиворечия. По-научному:
              одно и то же утверждение не может быть одновременно истинным и ложным.
              По-простому: нельзя сказать «да» и «нет» об одном и том же, в одно и
              то же время, в одном и том же смысле.

              '
            uk: 'Сегодня — второй закон Аристотеля: закон несуперечності. По-научному:
              одно и то же утверждение не может быть одновременно истинным и ложным.
              По-простому: нельзя сказать «да» и «нет» об одном и том же, в одно и
              то же время, в одном и том же смысле.'
            en: 'Today - Aristotle''s second law: the law of non-contradiction. Scientifically:
              the same statement cannot be both true and false. To put it simply:
              you cannot say “yes” and “no” about the same thing, at the same time,
              in the same sense.'
        - id: '21'
          type: speech
          duration_sec: 10
          text:
            ru: 'Звучит просто? Сейчас проверим. Я буду рассказывать короткие истории,
              а вы попробуйте поймать момент, где логика ломается.

              '
            uk: Звучит просто? Сейчас проверим. Я буду рассказывать короткие истории,
              а вы попробуйте поймать момент, где логика ломается.
            en: Sounds simple? Let's check it now. I will tell short stories, and
              you try to catch the moment where logic breaks down.
        - id: '22'
          type: speech
          duration_sec: 12
          text:
            ru: 'История первая. Мальчик говорит: «Я вообще не злюсь.» Его спрашивают:
              «Почему ты кричишь?» А он отвечает: «Потому что я в бешенстве!» Стоп
              — «не злюсь» и «в бешенстве» — это прямо противоположные вещи. Одновременно
              не работает!

              '
            uk: 'Історія первая. Мальчик говорит: «Я вообще не злюсь.» Его спрашивают:
              «Почему ты кричишь?» А он отвечает: «Потому что я в бешенстве!» Стоп
              — «не злюсь» и «в бешенстве» — это прямо противоположные вещи. Одновременно
              не работает!'
            en: 'Story one. The boy says: “I’m not angry at all.” They ask him: “Why
              are you screaming?” And he replies: “Because I’m mad!” Stop - “I’m not
              angry” and “furious” are exactly opposite things. Doesn''t work at the
              same time!'
        - id: '23'
          type: speech
          duration_sec: 14
          text:
            ru: 'История вторая. Девочка говорит: «Мне всё равно, что вы обо мне думаете.»
              А потом расстраивается из-за чьих-то слов. «Почему расстроилась?» —
              «Потому что они так не должны говорить!» Если всё равно — почему волнует?
              Логика трещит по швам.

              '
            uk: 'Історія вторая. Девочка говорит: «Мне всё равно, что вы обо мне думаете.»
              А потом расстраивается из-за чьих-то слов. «Почему расстроилась?» —
              «Потому что они так не должны говорить!» Если всё равно — почему волнует?
              Логіка трещит по швам.'
            en: 'The second story. The girl says: “I don’t care what you think about
              me.” And then he gets upset because of someone’s words. “Why are you
              upset?” - “Because they shouldn’t talk like that!” If it doesn’t matter,
              why care? Logic is bursting at the seams.'
        - id: '24'
          type: speech
          duration_sec: 12
          text:
            ru: 'История третья. «Я никогда не перебиваю!» — говорит человек, перебивая.
              И тут же: «Дай договорить! Я вообще-то не перебиваю!» Утверждение ломается
              прямо в момент произнесения. Как если бы кто-то написал на табличке
              «Я не умею писать».

              '
            uk: 'Історія третья. «Я никогда не перебиваю!» — говорит человек, перебивая.
              И тут же: «Такй договорить! Я вообще-то не перебиваю!» Утверждение ломается
              прямо в момент произнесения. Как если бы кто-то написал на табличке
              «Я не умею писать».'
            en: 'Story three. “I never interrupt!” - says the man, interrupting. And
              then: “Let me finish! I don’t actually interrupt!” The statement breaks
              right at the moment of utterance. It''s like someone writing "I can''t
              write" on a sign.'
        - id: '25'
          type: speech
          duration_sec: 12
          text:
            ru: 'Четвёртая. «Оценки вообще не важны.» — «Тогда почему ты переживаешь
              из-за плохой оценки?» — «Потому что мне важна хорошая оценка!» Не важны
              и важна — одновременно? Аристотель бы покачал головой.

              '
            uk: Четвёртая. «Оценки вообще не важны.» — «Тогда почему ты переживаешь
              из-за плохой оценки?» — «Потому что мне важна хорошая оценка!» Не важны
              и важна — одновременно? Аристотель бы покачал головой.
            en: Fourth. “Grades don’t matter at all.” - “Then why are you worried
              about a bad grade?” - “Because a good grade is important to me!” Not
              important and important - at the same time? Aristotle would have shook
              his head.
        - id: '26'
          type: speech
          duration_sec: 12
          text:
            ru: 'Пятая. «Мне не нужна ничья помощь.» — «Тогда зачем ты просишь меня
              решить за тебя задачу?» — «Ну это другое.» Нет, это не другое — это
              противоречие! Если помощь не нужна, то и просить её нельзя.

              '
            uk: Пятая. «Мне не нужна ничья помощь.» — «Тогда зачем ты просишь меня
              решить за тебя задачу?» — «Ну это другое.» Ні, это не другое — это суперечність!
              Если помощь не нужна, то и просить её нельзя.
            en: Fifth. "I don't need anyone's help." - “Then why are you asking me
              to solve the problem for you?” - “Well, this is different.” No, this
              is not different - this is a contradiction! If you don’t need help,
              then you can’t ask for it.
        - id: '27'
          type: speech
          duration_sec: 12
          text:
            ru: 'Шестая. «Я всегда говорю только правду.» — «Ты вчера сказал, что
              сделал уроки, но не сделал.» — «Ну тогда я соврал.» «Всегда правду»
              и «соврал» — эти два утверждения не помещаются в одну голову одновременно.

              '
            uk: Шестая. «Я всегда говорю только правду.» — «Ты вчера сказал, что сделал
              уроки, но не сделал.» — «Ну тогда я соврал.» «Всегда правду» и «соврал»
              — эти два утверждения не помещаются в одну голову одновременно.
            en: Sixth. “I always tell only the truth.” - “You said yesterday that
              you did your homework, but you didn’t.” - “Well then I lied.” “Always
              tell the truth” and “lied” - these two statements cannot fit into one
              head at the same time.
        - id: '28'
          type: speech
          duration_sec: 12
          text:
            ru: 'Седьмая. «Я не боюсь темноты!» — «Тогда пойдёшь в подвал один?» —
              «Нет, я боюсь туда идти.» Страх одновременно есть и нет? Аристотель
              бы сказал: выбери одно!

              '
            uk: 'Седьмая. «Я не боюсь темноты!» — «Тогда пойдёшь в подвал один?» —
              «Ні, я боюсь туда идти.» Страх одновременно есть и нет? Аристотель бы
              сказал: выбери одно!'
            en: 'Seventh. "I''m not afraid of the dark!" - “Then will you go to the
              basement alone?” - “No, I’m afraid to go there.” Is there fear and not
              at the same time? Aristotle would say: choose one!'
        - id: '29'
          type: speech
          duration_sec: 14
          text:
            ru: 'Восьмая. «Я не люблю правила.» — «Почему тогда злишься, что другие
              не соблюдают очередь?» — «Потому что правила нужно соблюдать!» Не любишь
              правила, но требуешь их соблюдения — это как сказать «Не люблю мороженое,
              дайте два!»

              '
