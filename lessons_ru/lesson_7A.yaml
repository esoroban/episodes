          text:
            ru: 'Ребята, давайте осознаем, что сейчас произошло. Вы только что освоили
              второй закон логики — закон непротиворечия. Тот самый, который Аристотель
              придумал больше двух тысяч лет назад. И вы не просто его услышали —
              вы научились им пользоваться!

              '
            uk: Ребята, давайте осознаем, что сейчас произошло. Вы только что освоили
              второй закон логики — закон несуперечності. Тот самый, который Аристотель
              придумал больше двух тысяч лет назад. И вы не просто его услышали —
              вы научились им пользоваться!
            en: Guys, let's understand what just happened. You have just mastered
              the second law of logic - the law of non-contradiction. The same one
              that Aristotle came up with more than two thousand years ago. And you
              didn’t just hear it - you learned how to use it!
        - id: '111'
          type: speech
          duration_sec: 14
          text:
            ru: 'Вы теперь умеете замечать, когда человек говорит одно, а делает или
