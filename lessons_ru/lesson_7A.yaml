              больше двух тысяч лет — и они работают до сих пор.

              '
            uk: Таквайте посчитаем. Закон тождества — знаем. Закон несуперечності
              — знаем. Это уже два закона логики Аристотеля! Два инструмента, которым
              больше двух тысяч лет — и они работают до сих пор.
            en: Let's do the math. We know the law of identity. We know the law of
              non-contradiction. These are already two laws of Aristotle’s logic!
              Two instruments that are more than two thousand years old - and they
              still work.
        - id: '113'
          type: speech
          duration_sec: 12
          text:
            ru: 'Но замечать противоречие — это только полдела. Человек может не противоречить
              себе, но при этом говорить ерунду. Как? Если у него нет хорошего объяснения
              — почему он так думает.

              '
            uk: Но замечать суперечність — это только полдела. Человек может не противоречить
              себе, но при этом говорить ерунду. Как? Если у него нет хорошего объяснения
              — почему он так думает.
            en: But noticing the contradiction is only half the battle. A person may
              not contradict himself, but at the same time speak nonsense. How? If
              he doesn't have a good explanation why he thinks that way.
        - id: '114'
          type: speech
          duration_sec: 10
          text:
            ru: 'После перемены мы научимся задавать самый мощный вопрос в мире: «Почему
              ты так думаешь?» Звучит просто — но он меняет всё.

              '
            uk: 'После перемены мы научимся задавать самый мощный вопрос в мире: «Почему
              ты так думаешь?» Звучит просто — но он меняет всё.'
            en: 'After the change, we will learn to ask the most powerful question
