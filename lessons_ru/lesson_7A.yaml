              задать вопрос, от которого логика сама всё расставляет по местам.

              '
            uk: Вы теперь умеете замечать, когда человек говорит одно, а делает или
              говорит противоположное. И не просто замечать — а спокойно, без крика,
              задать вопрос, от которого логика сама всё расставляет по местам.
            en: You now know how to notice when a person says one thing, but does
              or says the opposite. And not just notice - but calmly, without shouting,
              ask a question from which logic itself puts everything in its place.
        - id: '112'
          type: speech
          duration_sec: 14
          text:
            ru: 'Давайте посчитаем. Закон тождества — знаем. Закон непротиворечия
