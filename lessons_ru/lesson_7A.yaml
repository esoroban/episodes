              не соблюдают очередь?» — «Потому что правила нужно соблюдать!» Не любишь
              правила, но требуешь их соблюдения — это как сказать «Не люблю мороженое,
              дайте два!»
            en: Eighth. "I don't like rules." - “Then why are you angry that others
              don’t respect the queue?” - “Because the rules must be followed!” If
              you don’t like rules, but you demand that they be followed, it’s like
              saying “I don’t like ice cream, give me two!”
        - id: '30'
          type: speech
          duration_sec: 12
          text:
            ru: 'Девятая. «Я никого не осуждаю.» — «Ты только что сказал, что они
