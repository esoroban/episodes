            en: 'An objection! Specific, on point, with examples: "proportions," "hands."
              Not "you draw badly" — but what exactly is wrong. That''s how you should
              criticize.'
        - id: '30'
          type: vote
          duration_sec: 12
          text:
            ru: '«Этот крем рекомендует профессор Иванов!» Профессор Иванов — историк.
