              topic!
    - scene_id: sc2
      title:
        ru: СПОР VS ССОРА
        uk: СПІР VS ПОСВАРКА
        en: ARGUMENT VS FIGHT
      media_ref: 13A.sc2.argument_vs_fight
      status: v3_locked
      steps:
        - id: '41'
          type: speech
          duration_sec: 12
          text:
            ru: 'Разминка позади — вы помните кучу приёмов! Но есть вопрос: а как
              спорить ЧЕСТНО? Без демагогии, без манипуляций — и при этом не поссориться?

              '
            uk: 'Розминка позаду — ви пам''ятаєте купу прийомів! Але є запитання:
              а як сперечатися ЧЕСНО? Без демагогії, без маніпуляцій — і при цьому
              не посварюватися?'
            en: 'The warm-up is over — you remember lots of tricks! But here''s a
              question: how can you argue HONESTLY? Without demagoguery, without manipulation
              — and still not fight?'
        - id: '42'
          type: speech
          duration_sec: 14
          text:
            ru: 'Вот ситуация. Лёша и Кира спорят, какой фильм лучше. Лёша говорит:
              «Твой фильм — скучный!» Кира отвечает: «А ты вообще ничего не понимаешь
              в кино!»

              '
            uk: 'Ось ситуація. Льоша й Кіра сперечаються, який фільм кращий. Льоша
              говорить: «Твій фільм — нудний!» Кіра відповідає: «А ти взагалі нічого
              не розумієш в кіно!»'
            en: 'Here''s the situation. Losha and Kira are arguing about which movie
              is better. Losha says: "Your movie is boring!" Kira replies: "You don''t
              understand anything about movies!"'
        - id: '43'
          type: vote
          duration_sec: 12
          text:
            ru: 'Что происходит между Лёшей и Кирой?

              '
            uk: Що відбувається між Льошею й Кірою?
            en: What's happening between Losha and Kira?
          options:
            - id: opt_1
              text:
                ru: Спор о фильмах
                uk: Спір про фільми
                en: Argument about movies
            - id: opt_2
              text:
                ru: Ссора с оскорблениями
                uk: Посварка з образами
                en: Fight with insults
            - id: opt_3
              text:
                ru: Дискуссия
                uk: Дискусія
                en: Discussion
          correct: opt_2
        - id: '44'
          type: speech
          duration_sec: 14
          text:
            ru: 'Они начали про фильмы, а закончили нападками друг на друга. Знакомо?
              Спор — это когда обсуждаем тему. Ссора — когда нападаем на человека.

              '
            uk: Вони почали про фільми, а закінчили нападами одне на одного. Знайомо?
              Спір — це коли обговорюємо тему. Посварка — коли нападаємо на людину.
            en: They started talking about movies and ended up attacking each other.
              Sound familiar? An argument is when we discuss a topic. A fight is when
              we attack a person.
        - id: '45'
          type: speech
          duration_sec: 14
          text:
            ru: 'Запомните: спор — это нормально! Люди не могут соглашаться во всём.
              Но если вместо «фильм скучный» вы говорите «ты глупый» — это уже не
              спор. Это ссора.

              '
            uk: 'Запам''ятайте: спір — це нормально! Люди не можуть у всьому погоджуватися.
              Але якщо замість «фільм нудний» ви говорите «ти дурень» — це вже не
              спір. Це посварка.'
            en: 'Remember: an argument is normal! People can''t agree on everything.
              But if instead of "the movie is boring" you say "you''re stupid" — that''s
              not an argument. That''s a fight.'
        - id: '46'
          type: speech
          duration_sec: 16
          text:
            ru: 'Хорошая новость: есть простой приём, который не даёт спору стать
