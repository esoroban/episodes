              '
            uk: 'Хороша новина: є простий прийом, який не дає спору стати посваркою.
              Називається «Я-висловлювання». Замість «ТИ неправий!» говоримо «МНЕ
              здається інакше». Почуваєте різницю?'
            en: 'Good news: there''s a simple trick that prevents an argument from
              turning into a fight. It''s called the "I-statement." Instead of "YOU''re
              wrong!" we say "I think differently." Feel the difference?'
        - id: '47'
          type: speech
          duration_sec: 10
          text:
            ru: 'Давайте потренируемся! Кто-то бросает обвинение — а вы выбираете,
