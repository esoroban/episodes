    - scene_id: sc5
      title:
        ru: КАК БЫ ТЫ ВЫШЕЛ ИЗ ЭТОГО СПОРА?
        uk: ЯК БИ ТИ ВИЙШОВ ЗІ ЦЬОГО СПОРУ?
        en: HOW WOULD YOU GET OUT OF THIS ARGUMENT?
      media_ref: 13A.sc5.open_practice_exit
      status: v3_locked
      steps:
        - id: '97'
          type: speech
          duration_sec: 14
          text:
            ru: 'Теперь — без вариантов! Я рассказываю историю, а вы сами придумываете,
              что сказать. Подсказка: используйте Я-высказывание или одну из фраз-спасателей.

              '
            uk: 'Тепер — без варіантів! Я розповідаю історію, а ви самі придумуєте,
              що сказати. Підказка: використовуйте Я-висловлювання або одну з фраз-спасателів.'
            en: 'Now — no options! I tell you a story, and you come up with what to
              say yourself. Hint: use an I-statement or one of the lifesaving phrases.'
        - id: '98'
          type: speech
          duration_sec: 14
          text:
            ru: 'История первая. Лена и Вика делают проект. Лена хочет рисовать плакат,
              Вика хочет делать презентацию. Они спорят уже пять минут. Лена говорит:
              «Презентации — это скучно!» Вика краснеет.

              '
            uk: 'Історія перша. Лена й Вика роблять проект. Лена хоче малювати плакат,
              Вика хоче робити презентацію. Вони сперечаються вже п''ять хвилин. Лена
              говорить: «Презентації — це нудно!» Вика червоніє.'
            en: 'Story one. Lena and Vika are doing a project. Lena wants to draw
              a poster, Vika wants to make a presentation. They''ve been arguing for
              five minutes. Lena says: "Presentations are boring!" Vika blushes.'
        - id: '99'
          type: discussion
          duration_sec: 25
          text:
            ru: 'Вика чувствует, что сейчас скажет что-то обидное. Что ей сделать?
              Подсказка: пауза, Я-высказывание или фраза-спасатель.

              '
            uk: 'Вика відчуває, що зараз скаже щось образливе. Що їй зробити? Підказка:
              пауза, Я-висловлювання або фраза-спасатель.'
            en: 'Vika feels like she''s about to say something hurtful. What should
              she do? Hint: pause, I-statement, or lifesaving phrase.'
        - id: '100'
          type: speech
          duration_sec: 12
          text:
            ru: 'Например: «Мне обидно, когда мою идею называют скучной. Давай подумаем
              — может, совместим плакат и презентацию?» И пауза, и Я-высказывание,
              и предложение компромисса!

              '
            uk: 'Наприклад: «Мені образливо, коли мою ідею називають нудною. Давай
              подумаємо — може, змішаємо плакат і презентацію?» І пауза, і Я-висловлювання,
              і пропозиція компромісу!'
            en: 'For example: "I feel hurt when my idea is called boring. Let''s think
              — maybe we can combine a poster and a presentation?" Both a pause and
              an I-statement and a compromise offer!'
        - id: '101'
          type: speech
          duration_sec: 14
          text:
            ru: 'История вторая. Костя и Артём играют в футбол. Костя не отдал пас
              — и команда проиграла. Артём кричит: «Из-за тебя мы продули!» Костя
              сжимает кулаки.

              '
            uk: 'Історія друга. Костя й Артем грають у футбол. Костя не віддав пас
              — і команда програла. Артем кричить: «Через тебе ми програли!» Костя
              стискає кулаки.'
            en: 'Story two. Kostya and Artem are playing football. Kostya didn''t
              pass — and the team lost. Artem shouts: "We lost because of you!" Kostya
              clenches his fists.'
        - id: '102'
          type: discussion
          duration_sec: 25
          text:
            ru: 'Костя злится. Что ему сделать прямо сейчас? Подсказка: сигналы тела
              уже кричат — пора остановиться.

              '
            uk: 'Костя гніється. Що йому зробити прямо зараз? Підказка: сигнали тіла
              вже кричать — час зупинитися.'
            en: 'Kostya is angry. What should he do right now? Hint: his body is already
              screaming — it''s time to stop.'
        - id: '103'
          type: speech
          duration_sec: 12
          text:
            ru: 'Сначала — пауза и счёт до десяти. Потом: «Мне и так плохо, что мы
              проиграли. Давай разберём игру спокойно.» Не нападка — а выход через
              чувства.

              '
            uk: 'Спочатку — пауза й рахунок до десяти. Потім: «Мені й так погано,
              що ми програли. Давай розберемо гру спокійно.» Не напад — а вихід через
              почуття.'
            en: 'First — pause and count to ten. Then: "I feel bad that we lost. Let''s
              analyze the game calmly." Not an attack — but exiting through feelings.'
        - id: '104'
          type: speech
          duration_sec: 14
          text:
            ru: 'История третья. Даша показывает подруге новую стрижку. Подруга говорит:
              «Тебе не идёт.» Даша чувствует обиду — хочется ответить: «А у тебя вообще
              причёска как из прошлого века!»

              '
            uk: 'Історія третя. Даша показує подрузі нову стрижку. Подруга говорить:
              «Тобі не йде.» Даша відчуває образу — хочеться відповісти: «А у тебе
              взагалі причіска як із минулого століття!»'
            en: 'Story three. Dasha shows her friend a new haircut. The friend says:
              "That doesn''t suit you." Dasha feels hurt — she wants to reply: "Your
              hair looks like it''s from the last century!"'
        - id: '105'
          type: discussion
          duration_sec: 25
          text:
            ru: 'Как Даше ответить, чтобы не начать ссору? Подсказка: Я-высказывание
              про свои чувства.

              '
            uk: 'Як Даші відповісти, щоб не почати посварку? Підказка: Я-висловлювання
              про свої почуття.'
            en: 'How should Dasha respond without starting a fight? Hint: I-statement
              about her feelings.'
        - id: '106'
          type: speech
          duration_sec: 12
          text:
            ru: 'Например: «Мне неприятно это слышать — я как раз радовалась новой
              стрижке.» Честно, про себя — и подруга сразу поймёт, что перегнула.

              '
            uk: 'Наприклад: «Мені неприємно це чути — я як раз радувалася новій стрижці.»
              Чесно, про себе — і подруга відразу зрозуміє, що перегнула.'
            en: 'For example: "That hurts — I was just happy about my new haircut."
              Honestly, about yourself — and your friend will immediately understand
              she went too far.'
        - id: '107'
          type: speech
          duration_sec: 14
          text:
            ru: 'История четвёртая. Тимур и его сестра спорят, чей черёд мыть посуду.
              Оба уверены, что вчера мыли именно они. Голоса всё громче. Мама ещё
              не пришла.

              '
            uk: Історія четверта. Тимур і його сестра сперечаються, чия черга мити
              посуду. Обидва впевнені, що вчера мили саме вони. Голоси все голосніші.
              Мама ще не прийшла.
            en: Story four. Timur and his sister are arguing about whose turn it is
              to wash dishes. Both are sure they did it yesterday. Voices are getting
              louder. Mom hasn't come home yet.
        - id: '108'
          type: discussion
          duration_sec: 25
          text:
            ru: 'Спор зашёл в тупик — никто не уступает. Как выйти? Подсказка: фраза-спасатель
              для тупиковых ситуаций.

              '
            uk: 'Спір заходить в глухий кут — ніхто не поступається. Як вийти? Підказка:
              фраза-спасатель для ситуацій, що тупика.'
            en: 'The argument is at a deadlock — nobody''s giving in. How to get out?
              Hint: lifesaving phrase for deadlock situations.'
        - id: '109'
          type: speech
          duration_sec: 12
          text:
            ru: '«Давай сделаем так: сегодня моет один, завтра — другой. А кто первый
              — кинем монетку.» Компромисс! Или: «Давай спросим маму, когда придёт.»
              Выход через паузу.

              '
            uk: '«Давай зробимо так: сьогодні миє один, завтра — другий. А хто перший
              — кинемо монетку.» Компромісс! Або: «Давай запитаємо маму, коли прийде.»
              Вихід через паузу.'
            en: '"How about this: one person washes today, the other tomorrow. Who
              goes first — flip a coin." Compromise! Or: "Let''s ask mom when she
              gets home." Getting out through a pause.'
        - id: '110'
          type: speech
          duration_sec: 14
          text:
            ru: 'История пятая. На перемене Миша случайно толкнул Егора. Егор уронил
              телефон. Егор разворачивается: «Ты специально! Ты всегда так делаешь!»
              Миша точно знает, что случайно.

              '
            uk: 'Історія п''ята. На перемені Миша випадково штовхнув Егора. Егор упустив
              телефон. Егор розворотиться: «Ти спеціально! Ти завжди так робиш!» Миша
              точно знає, що випадково.'
            en: 'Story five. During break, Misha accidentally bumped Egor. Egor dropped
              his phone. Egor whirls around: "You did that on purpose! You always
              do that!" Misha knows it was an accident.'
        - id: '111'
          type: discussion
          duration_sec: 25
          text:
            ru: 'Миша не виноват, но Егор злится. Как Мише ответить? Подсказка: не
              оправдываться, а показать, что понимает чувства Егора.

              '
            uk: 'Миша не винний, але Егор гніється. Як Миші відповісти? Підказка:
              не виправдовуватися, а показати, що розуміє почуття Егора.'
            en: 'Misha isn''t guilty, but Egor is angry. How should Misha respond?
              Hint: don''t defend yourself, show that you understand Egor''s feelings.'
        - id: '112'
          type: speech
          duration_sec: 14
          text:
            ru: '«Извини, я случайно! Понимаю, что ты переживаешь за телефон. Давай
              посмотрим — может, всё целое?» Извинение + понимание чувств + конкретное
              действие. Три в одном!

              '
            uk: «Вибач, це було випадково! Розумію, що ти хвилюєшся за телефон. Давай
              подивимося — може, все ціле?» Вибачення + розуміння почуттів + конкретна
              дія. Три в одному!
            en: '"Sorry, it was an accident! I understand you''re worried about your
              phone. Let''s check — maybe it''s okay?" Apology + understanding feelings
              + concrete action. All three in one!'
    - scene_id: sc6
      title:
        ru: 'ШПАРГАЛКА: ВСЁ, ЧЕМУ МЫ НАУЧИЛИСЬ'
        uk: 'ШПАРГАЛКА: ВСЕ, ЧОМУ МИ НАВЧИЛИСЯ'
        en: 'CHEAT SHEET: EVERYTHING WE LEARNED'
      media_ref: 13A.sc6.cheat_sheet
      status: v3_locked
      steps:
        - id: '113'
          type: speech
          duration_sec: 12
          text:
            ru: 'А теперь — ваша шпаргалка. Всё, что мы прошли за тринадцать дней.
              Каждый приём, каждый термин, каждый способ защиты. Запоминайте!

              '
            uk: А тепер — ваша шпаргалка. Все, що ми пройшли за тринадцять днів. Кожен
              прийом, кожен термін, кожен спосіб захисту. Запам'ятовуйте!
            en: Now — your cheat sheet. Everything we covered over thirteen days.
              Every technique, every term, every way to defend yourself. Remember!
        - id: '114'
          type: speech
          duration_sec: 14
          text:
            ru: 'ФАКТ — утверждение, которое можно проверить. «Вода кипит при ста
              градусах» — проверяем термометром. Не важно, согласны вы или нет — факт
              существует сам по себе.

              '
            uk: ФАКТ — твердження, яке можна перевірити. «Вода кипить при ста градусах»
              — перевіряємо термометром. Неважливо, згідні ви чи ні — факт існує сам
              по собі.
            en: FACT — a statement that can be verified. "Water boils at 100 degrees"
              — we check with a thermometer. It doesn't matter if you agree — the
              fact exists on its own.
        - id: '115'
          type: speech
          duration_sec: 14
          text:
            ru: 'МНЕНИЕ — утверждение, которое нельзя проверить. «Клубника вкуснее
              малины» — у каждого своё. Ни одно мнение не «правильнее» другого. Мнение
              нельзя опровергнуть.

              '
            uk: ДУМКА — твердження, яке неможливо перевірити. «Полуниця смачніша за
              малину» — у кожного своя. Ні одна думка не «правильніша» за іншу. Думку
              неможливо спростувати.
            en: OPINION — a statement that can't be verified. "Strawberries taste
              better than raspberries" — everyone has their own. No opinion is "more
              right" than another. You can't disprove an opinion.
        - id: '116'
          type: speech
          duration_sec: 14
          text:
            ru: 'НЕПРАВДА — утверждение, которое выглядит как факт, но проверку не
              прошло. «Луна больше Солнца» — можно измерить и убедиться, что это не
              так.

              '
            uk: НЕПРАВДА — твердження, яке виглядає як факт, але не пройшло перевірку.
              «Місяць більший за Сонце» — можна виміряти й переконатися, що це не
              так.
            en: FALSEHOOD — a statement that looks like a fact but doesn't pass verification.
              "The Moon is bigger than the Sun" — we can measure and see it's not
              true.
        - id: '117'
          type: speech
          duration_sec: 14
          text:
            ru: 'НАБЛЮДЕНИЕ — то, что вы видите, слышите, измеряете прямо сейчас.
              «На улице мокрый асфальт.» Никаких додумываний — только то, что перед
              глазами.

              '
            uk: СПОСТЕРЕЖЕННЯ — те, що ви бачите, чуєте, вимірюєте прямо зараз. «На
              вулиці мокрий асфальт.» Ніяких додумувань — лише те, що перед очима.
            en: OBSERVATION — what you see, hear, measure right now. "The pavement
              outside is wet." No guessing — just what's in front of your eyes.
        - id: '118'
          type: speech
          duration_sec: 14
          text:
            ru: 'ВЫВОД — объяснение на основе наблюдения. «Был дождь» — вывод. Может
              быть верным, а может нет: может, дворник мыл улицу. Вывод всегда нужно
              проверять.

              '
            uk: 'ВИСНОВОК — пояснення на основі спостереження. «Був дощ» — висновок.
              Може бути правильним, а може ні: може, дворник мив вулицю. Висновок
              завжди потрібно перевіряти.'
            en: 'CONCLUSION — an explanation based on observation. "It rained" — a
              conclusion. It might be true or not: maybe the janitor was washing the
              street. You always need to verify conclusions.'
        - id: '119'
          type: speech
          duration_sec: 14
          text:
            ru: '«ПОСЛЕ» НЕ ЗНАЧИТ «ИЗ-ЗА». Если одно случилось после другого — это
              не доказывает связь. Петя поел мороженое и заболел? Болезнь вызвал вирус,
              а не мороженое.

              '
            uk: «ПІСЛЯ» НЕ ЗНАЧИТЬ «ЧЕРЕЗ». Якщо одне відбулося після іншого — це
              не доказує зв'язок. Петя поїв морозиво й захворів? Хворобу викликав
              вірус, а не морозиво.
            en: '"AFTER" DOESN''T MEAN "BECAUSE OF." If one thing happened after another
              — that doesn''t prove a connection. Petya ate ice cream and got sick?
              A virus caused the illness, not the ice cream.'
        - id: '120'
          type: speech
          duration_sec: 14
          text:
            ru: 'ИСТОЧНИК — откуда пришла информация. Три вопроса: кто говорит? Откуда
              он это знает? Есть ли причина врать? Если хоть один ответ настораживает
              — ищем другой источник.

              '
            uk: 'ДЖЕРЕЛО — звідки прийшла інформація. Три запитання: хто говорить?
              Звідки він це знає? Є причина брехати? Якщо хоч один ответ настороженає
              — шукаємо інше джерело.'
            en: 'SOURCE — where the information came from. Three questions: who is
              speaking? How do they know? Is there a reason to lie? If any answer
              raises concern — find another source.'
        - id: '121'
          type: speech
          duration_sec: 14
          text:
            ru: 'ЧЕТЫРЕ СПОСОБА ПРОВЕРКИ: посмотреть самому, провести эксперимент,
              найти надёжный источник, применить логическое рассуждение. Чем больше
              способов совпало — тем надёжнее вывод.

              '
            uk: 'ЧОТИРИ СПОСОБИ ПЕРЕВІРКИ: подивитися самому, провести експеримент,
              знайти надійне джерело, застосувати логічне міркування. Чим більше способів
              збіглося — тим надійніший висновок.'
            en: 'FOUR WAYS TO VERIFY: look yourself, conduct an experiment, find a
              reliable source, use logical reasoning. The more methods that match
              — the more reliable the conclusion.'
        - id: '122'
          type: speech
          duration_sec: 14
          text:
            ru: 'ДОСТАТОЧНО ЛИ ПРИМЕРОВ? Один случай — не доказательство. Нужно много
              примеров. «Мой кот любит огурцы» не значит, что все коты любят огурцы.

              '
            uk: ДОСТАТНЬО ЛИ ПРИКЛАДІВ? Один випадок — не доказ. Потрібно багато прикладів.
              «Мій кіт любить огірки» не значить, що всі коти люблять огірки.
            en: ARE THERE ENOUGH EXAMPLES? One case isn't proof. You need many examples.
              "My cat likes cucumbers" doesn't mean all cats like cucumbers.
        - id: '123'
          type: speech
          duration_sec: 14
          text:
            ru: 'НЕЗАВИСИМЫЕ ИСТОЧНИКИ — те, кто пришёл к выводу сам, без общего интереса.
              Два блогера с оплатой от одной компании — зависимые. Учёный и журналист,
              работавшие отдельно — независимые.

              '
            uk: '[UNTRANSLATED]'
            en: 'INDEPENDENT SOURCES - those who came to a conclusion on their own,
              without general interest. Two bloggers paid by the same company are
              addicts. A scientist and a journalist working separately are independent.'
        - id: '124'
          type: speech
          duration_sec: 14
          text:
            ru: 'ПРОТИВОРЕЧИЕ — когда два утверждения не могут быть правдой одновременно.
              «Я не ем сладкое» и «Я съел три конфеты» — противоречие. Кто-то ошибается.

              '
            uk: СУПЕРЕЧНІСТЬ — коли два твердження не можуть бути правдою одночасно.
              «Я не їм солодке» і «Я з'їв три цукерки» — суперечність. Хтось помиляється.
            en: CONTRADICTION — when two statements can't both be true. "I don't eat
              sweets" and "I ate three candies" — contradiction. Someone is wrong.
        - id: '125'
          type: speech
          duration_sec: 14
          text:
            ru: 'ТРИ ТИПА ОБОСНОВАНИЯ — чем подкрепить утверждение. Факт: «Измерили
              — температура 38». Логика: «Если лёд тает — значит, выше нуля». Надёжный
              источник: «Так говорит учебник физики».

              '
            uk: 'ТРИ ТИПИ ОБҐРУНТУВАННЯ — чим підкріпити твердження. Факт: «Виміряли
              — температура 38». Логіка: «Якщо лід тає — значить, вище нуля». Надійне
              джерело: «Так говорить підручник фізики».'
            en: 'THREE TYPES OF JUSTIFICATION — how to support a claim. Fact: "We
              measured — temperature is 38°." Logic: "If ice melts — it means above
              zero." Reliable source: "That''s what the physics textbook says."'
        - id: '126'
          type: speech
          duration_sec: 14
          text:
            ru: 'СЛОВА-ЛОВУШКИ — «все», «всегда», «никогда», «точно», «каждый». Если
              слышите абсолютное слово — это сигнал проверить. Почти всегда за ним
              прячется преувеличение или обобщение.

              '
            uk: СЛОВЕЧКА-ПАСТКИ — «усі», «завжди», «ніколи», «точно», «кожен». Якщо
              чуєте абсолютне слово — це сигнал перевірити. Майже завжди за ним ховається
              перебільшення або узагальнення.
            en: TRAP WORDS — "all," "always," "never," "definitely," "everyone." If
              you hear an absolute word — it's a signal to check. Almost always there's
              exaggeration or generalization behind it.
        - id: '127'
          type: speech
          duration_sec: 14
          text:
            ru: 'СТЕРЕОТИПЫ — готовые шаблоны: «все [группа] такие». Мальчики не плачут.
              Отличники — зануды. Стереотип заменяет мышление ярлыком. Борьба: «Это
              про конкретного человека или про ярлык?»

              '
            uk: 'СТЕРЕОТИПИ — готові шаблони: «усі [група] такі». Хлопці не плачуть.
              Відмінники — нудні. Стереотип замінює мислення ярликом. Боротьба: «Це
              про конкретну людину або про ярлик?»'
            en: 'STEREOTYPES — ready-made templates: "all [group] are like that."
              Boys don''t cry. Top students are boring. Stereotypes replace thinking
              with labels. Defense: "Is this about a specific person or a stereotype?"'
        - id: '128'
          type: speech
          duration_sec: 14
          text:
            ru: 'СЛУХИ И ПОВТОРЕНИЕ — если что-то повторяют сто раз, это не делает
              это правдой. «Все говорят» — не доказательство. Борьба: «Кто именно
              говорит? И откуда он знает?»

              '
            uk: 'ЧУТКИ Й ПОВТОРЕННЯ — якщо щось повторюють сто разів, це не робить
              це правдою. «Всі говорять» — не доказ. Боротьба: «Хто саме говорить?
              І звідки він це знає?»'
            en: 'RUMORS AND REPETITION — repeating something a hundred times doesn''t
              make it true. "Everyone says" — not proof. Defense: "Who exactly says
              it? And how do they know?"'
        - id: '129'
          type: speech
          duration_sec: 12
          text:
            ru: 'ВОЗРАЖЕНИЕ — критика по существу: что не так и почему. НАПАДКА —
              критика человека: «ты глупый». Возражение помогает, нападка ранит.

              '
            uk: 'ЗАПЕРЕЧЕННЯ — критика по суті: що не так і чому. НАПАД — критика
              людини: «ти дурень». Заперечення допомагає, напад ранить.'
            en: 'OBJECTION — criticism on the merits: what''s wrong and why. ATTACK
              — criticism of a person: "you''re stupid." Objections help, attacks
              hurt.'
        - id: '130'
          type: speech
          duration_sec: 14
          text:
            ru: 'ТРИ ЗАКОНА АРИСТОТЕЛЯ — фундамент логики. Три правила, без которых
              рассуждение рассыпается.

              '
            uk: ТРИ ЗАКОНИ АРИСТОТЕЛЯ — фундамент логіки. Три правила, без яких міркування
              розсипається.
            en: THREE LAWS OF ARISTOTLE — foundation of logic. Three rules without
              which reasoning falls apart.
        - id: '131'
          type: speech
          duration_sec: 16
          text:
            ru: 'ЗАКОН ТОЖДЕСТВА — одно слово должно значить одно и то же на протяжении
              всего разговора. Если кто-то начал про «свободу» как независимость,
              а закончил как «делай что хочешь» — это подмена понятий. Борьба: «Ты
              про что именно?»

              '
            uk: 'ЗАКОН ТОТОЖНОСТІ — одне слово повинно значити одне й те саме протягом
              всієї розмови. Якщо хтось почав про «свободу» як незалежність, а закінчив
              як «роби як хочеш» — це підміна понять. Боротьба: «Ти про що саме?»'
            en: 'LAW OF IDENTITY — one word must mean the same thing throughout the
              conversation. If someone starts talking about "freedom" as independence
              and ends with "do whatever you want" — that''s a substitution of concepts.
              Defense: "What exactly are you talking about?"'
        - id: '132'
          type: speech
          duration_sec: 16
          text:
            ru: 'ЗАКОН НЕПРОТИВОРЕЧИЯ — одно и то же не может быть правдой и неправдой
              одновременно. Лампа не бывает включена и выключена в один момент. Борьба:
              «Ты только что сказал наоборот».

              '
            uk: 'ЗАКОН НЕСУПЕРЕЧНОСТІ — одне й те саме не може бути правдою й неправдою
              одночасно. Лампа не бувает включена й вимкнена в один момент. Боротьба:
              «Ти щойно сказав навпаки».'
            en: 'LAW OF NON-CONTRADICTION — the same thing can''t be true and false
              at the same time. A light can''t be on and off at the same moment. Defense:
              "You just said the opposite."'
        - id: '133'
          type: speech
          duration_sec: 16
          text:
            ru: 'ЗАКОН ИСКЛЮЧЁННОГО ТРЕТЬЕГО — для простых вещей только два варианта:
              да или нет. Число чётное или нечётное. Но для жизни — не работает! «Либо
              со мной, либо против» — ложная дилемма. Борьба: «А какие ещё варианты?»

              '
            uk: 'ЗАКОН ВИКЛЮЧЕНОГО ТРЕТЬОГО — для простих речей тільки два варіанти:
              так або ні. Число парне або непарне. Але для життя — не працює! «Або
              зі мною, або проти» — хибна дилема. Боротьба: «А які ще варіанти?»'
            en: 'LAW OF EXCLUDED MIDDLE — for simple things only two options: yes
              or no. A number is even or odd. But for life — it doesn''t work! "Either
              with me or against me" — false dilemma. Defense: "What other options?"'
        - id: '134'
          type: speech
          duration_sec: 10
          text:
            ru: 'Теперь — ДЕМАГОГИЯ. Двенадцать приёмов, которые атакуют ваш разум.
              На все один ответ: «Где факты?»

              '
            uk: 'Тепер — ДЕМАГОГІЯ. Дванадцять прийомів, які атакують ваш розум. На
              все один ответ: «Де факти?»'
            en: 'Now — DEMAGOGUERY. Twelve techniques that attack your mind. One answer
              to all: "Where are the facts?"'
        - id: '135'
          type: speech
          duration_sec: 14
          text:
            ru: 'ЛОЖНАЯ ПРИЧИНА — связывают два события без доказательств. «Надел
              красные носки — и мы выиграли!» Носки ни при чём. Борьба: «Где доказательство
              связи?»

              '
            uk: 'ХИБНА ПРИЧИНА — пов''язують дві події без доказів. «Надів червоні
              шкарпетки — і ми виграли!» Шкарпетки ні при чому. Боротьба: «Де доказ
              зв''язку?»'
            en: 'FALSE CAUSE — linking two events without proof. "Wore red socks —
              and we won!" The socks have nothing to do with it. Defense: "Where''s
              the proof of the link?"'
        - id: '136'
          type: speech
          duration_sec: 14
          text:
            ru: 'ПОСПЕШНОЕ ОБОБЩЕНИЕ — из одного случая вывод обо всех. «Один раз
              опоздал — значит, всегда опаздывает!» Борьба: «Одного примера мало,
              нужна статистика».

              '
            uk: 'ПОСПІШНЕ УЗАГАЛЬНЕННЯ — з одного випадку висновок про всіх. «Один
              раз спізнився — значить, завжди спізнюється!» Боротьба: «Одного прикладу
              мало, потрібна статистика».'
            en: 'HASTY GENERALIZATION — from one case, a conclusion about all. "Late
              once — so always late!" Defense: "One example isn''t enough, we need
              statistics."'
        - id: '137'
          type: speech
          duration_sec: 14
          text:
            ru: 'УКЛОНЕНИЕ ОТ ОТВЕТА — вместо ответа говорят о другом. «Почему опоздал?»
              — «А Маша тоже опоздала!» Борьба: «Мы сейчас не про Машу».

              '
            uk: 'УНИКНЕННЯ ВІД ВІДПОВІДІ — замість відповіді говорять про іншу. «Чому
              спізнився?» — «А Маша теж спізнилася!» Боротьба: «Ми зараз не про Машу».'
            en: 'EVASION — instead of answering, they talk about something else. "Why
              are you late?" — "But Masha was late too!" Defense: "We''re not talking
              about Masha."'
        - id: '138'
          type: speech
          duration_sec: 14
          text:
            ru: 'ПОДМЕНА ПОНЯТИЙ — незаметно меняют значение слова посреди разговора.
              Нарушение закона тождества. Борьба: «Что именно ты имеешь в виду?»

              '
            uk: 'ПІДМІНА ПОНЯТЬ — непомітно змінюють значення слова посередині розмови.
              Порушення закону тотожності. Боротьба: «Що саме ти маєш на увазі?»'
            en: 'SUBSTITUTION OF CONCEPTS — subtly changing a word''s meaning mid-conversation.
              Violates the law of identity. Defense: "What exactly do you mean?"'
        - id: '139'
          type: speech
          duration_sec: 14
          text:
            ru: 'НАПАДКА НА ЧЕЛОВЕКА — вместо аргументов критикуют того, кто говорит.
              «Ты маленький — что ты понимаешь?» Борьба: «Это про меня или про тему?»

              '
            uk: 'НАПАД НА ЛЮДИНУ — замість аргументів критикують того, хто говорить.
              «Ти маленький — що ти розумієш?» Боротьба: «Це про мене або про тему?»'
            en: 'PERSONAL ATTACK — criticizing the speaker instead of offering arguments.
              "You''re little — what do you know?" Defense: "Is this about me or the
              topic?"'
        - id: '140'
          type: speech
          duration_sec: 14
          text:
            ru: 'ПУГАЛО — переврать чужие слова и спорить с тем, чего не говорили.
              «Ты хочешь отменить все правила!» — хотя предложил изменить одно. Борьба:
              «Я такого не говорил».

              '
            uk: 'ЛЯЛЬКА — передирають чужі слова й сперечаються з тим, чого не говорили.
              «Ти хочеш скасувати всі правила!» — хоча запропонував змінити одне.
              Боротьба: «Я такого не говорив».'
            en: 'STRAW MAN — distorting someone''s words and arguing against what
              they didn''t say. "You want to cancel all rules!" — even though they
              only suggested changing one. Defense: "I didn''t say that."'
        - id: '141'
          type: speech
          duration_sec: 14
          text:
            ru: 'СТРАШНАЯ ЦЕПОЧКА — раздувают последствия без доказательств. Не выучишь
              таблицу — станешь дворником! Борьба: «Проверим каждое звено отдельно».

              '
            uk: 'СТРАШНИЙ ЛАНЦЮГ — раздувають наслідки без доказів. Не вивчиш таблицю
              — станеш дворником! Боротьба: «Перевіримо кожну ланку окремо».'
            en: 'SCARY CHAIN — exaggerating consequences without proof. Won''t learn
              the table — become a janitor! Defense: "Let''s check each link separately."'
        - id: '142'
          type: speech
          duration_sec: 14
          text:
            ru: 'ЛОЖНЫЙ АВТОРИТЕТ — ссылаются на эксперта не в той области. Историк
              рекламирует крем. Борьба: «Он эксперт именно в этом?»

              '
            uk: 'ХИБНИЙ АВТОРИТЕТ — посилаються на експерта не в тій галузі. Історик
              рекламує крем. Боротьба: «Він експерт саме в цьому?»'
            en: 'FALSE AUTHORITY — citing an expert in the wrong field. A historian
              advertising cream. Defense: "Is he an expert in this field?"'
        - id: '143'
          type: speech
          duration_sec: 14
          text:
            ru: 'ЛОЖНАЯ ДИЛЕММА — предлагают два варианта, хотя их больше. Нарушение
              закона исключённого третьего в жизни. Борьба: «А какие ещё варианты?»

              '
            uk: 'ХИБНА ДИЛЕМА — пропонують два варіанти, хоча їх більше. Порушення
              закону виключеного третього в житті. Боротьба: «А які ще варіанти?»'
            en: 'FALSE DILEMMA — offering two options when there are more. Violating
              the law of excluded middle in life. Defense: "What other options?"'
        - id: '144'
          type: speech
          duration_sec: 14
          text:
            ru: 'ВОПРОС-ЛОВУШКА — вопрос, в который встроен ответ. «Ты же согласен,
              что это лучший фильм?» Борьба: «Я не согласен с формулировкой вопроса».

              '
            uk: 'ЗАПИТАННЯ-ПАСТКА — запитання, в яке вбудований ответ. «Ти ж згідний,
              що це найкращий фільм?» Боротьба: «Я не згідний з формулюванням запитання».'
            en: 'TRICK QUESTION — a question with the answer built in. "You agree
              this is the best movie, right?" Defense: "I disagree with how you phrased
              it."'
        - id: '145'
          type: speech
          duration_sec: 14
          text:
            ru: 'КРАСИВЫЕ СЛОВА БЕЗ ФАКТОВ — много эмоций, ноль доказательств. «Этот
              продукт изменит жизнь!» Борьба: «Звучит красиво, а факты где?»

              '
            uk: 'КРАСИВІ СЛОВА БЕЗ ФАКТІВ — багато емоцій, нуль доказів. «Цей продукт
              змінить життя!» Боротьба: «Звучить красиво, а факти де?»'
            en: 'BEAUTIFUL WORDS WITHOUT FACTS — lots of emotion, zero proof. "This
              product will change your life!" Defense: "Sounds nice, but where are
              the facts?"'
        - id: '146'
          type: speech
          duration_sec: 16
          text:
            ru: '«Я НЕ ГОВОРЮ, ЧТО...» — говорят именно то, что якобы не говорят.
              «Я не говорю, что он врёт, но...» — и все думают, что врёт. Борьба:
              «Ты только что это и сказал».

              '
            uk: '«Я НЕ ГОВОРЮ, ЩО...» — говорять саме те, що якобы не говорять. «Я
              не говорю, що він бреше, але...» — і всі думають, що бреше. Боротьба:
              «Ти щойно це й сказав».'
            en: '"I''M NOT SAYING THAT..." — saying exactly what they claim not to
              say. "I''m not saying he''s lying, but..." — and everyone thinks he
              is. Defense: "You just said that."'
        - id: '147'
          type: speech
          duration_sec: 10
          text:
            ru: 'Теперь — МАНИПУЛЯЦИЯ. Четыре кнопки, которые давят на чувства. На
              все один ответ: «Давай по существу».

              '
            uk: 'Тепер — МАНІПУЛЯЦІЯ. Чотири кнопки, які давять на почуття. На все
              один ответ: «Давай по суті».'
            en: 'Now — MANIPULATION. Four buttons that press on your feelings. One
              answer to all: "Let''s talk about what matters."'
        - id: '148'
          type: speech
          duration_sec: 14
          text:
            ru: 'КНОПКА ВИНЫ — «Из-за тебя мне плохо.» Цель — заставить чувствовать
              себя виноватым. Борьба: «Мне жаль, но это не повод делать то, с чем
              я не согласен».

              '
            uk: 'КНОПКА ВИНИ — «Через тебе мені погано.» Мета — заставити відчувати
              себе винним. Боротьба: «Мені шкода, але це не повід робити те, з чим
              я не згідний».'
            en: 'GUILT BUTTON — "I feel bad because of you." Goal: make you feel guilty.
              Defense: "I''m sorry, but that''s not a reason to do something I disagree
              with."'
        - id: '149'
          type: speech
          duration_sec: 14
          text:
            ru: 'КНОПКА СТРАХА — «Если не сделаешь — случится ужасное!» Цель — напугать.
              Борьба: «Это реальная угроза или ты меня пугаешь?»

              '
            uk: 'КНОПКА СТРАХУ — «Якщо не зробиш — станеться жахливе!» Мета — напугати.
              Боротьба: «Це реальна загроза або ти мене пугаєш?»'
            en: 'FEAR BUTTON — "If you don''t do it, something awful will happen!"
              Goal: scare you. Defense: "Is this a real threat or are you scaring
              me?"'
        - id: '150'
          type: speech
          duration_sec: 14
          text:
            ru: 'КНОПКА СТЫДА — «Тебе не стыдно?» Цель — заставить стыдиться. Борьба:
              «Мне не стыдно. Объясни, почему я должен это сделать».

              '
            uk: 'КНОПКА СОРОМУ — «Тобі не соромно?» Мета — заставити соромитися. Боротьба:
              «Мені не соромно. Поясни, чому я повинен це зробити».'
            en: 'SHAME BUTTON — "Aren''t you ashamed?" Goal: make you feel ashamed.
              Defense: "I''m not ashamed. Explain why I should do this."'
        - id: '151'
          type: speech
          duration_sec: 14
          text:
            ru: 'ШАНТАЖ ДРУЖБОЙ — «Настоящий друг бы помог!» Цель — использовать отношения.
              Борьба: «Я твой друг, но это не значит, что я обязан соглашаться».

              '
            uk: 'ШАНТАЖ ДРУЖБОЮ — «Справжній друг би допоміг!» Мета — використати
              стосунки. Боротьба: «Я твій друг, але це не значить, що я повинен погоджуватися».'
            en: 'FRIENDSHIP BLACKMAIL — "A real friend would help!" Goal: exploit
              the relationship. Defense: "I''m your friend, but that doesn''t mean
              I have to agree."'
        - id: '152'
          type: speech
          duration_sec: 14
          text:
            ru: 'Я-ВЫСКАЗЫВАНИЕ — способ сказать о чувствах, не нападая. Формула:
              «Мне [чувство], когда [ситуация]». Вместо «Ты меня бесишь!» — «Мне неприятно,
              когда на меня кричат».

              '
            uk: 'Я-ВИСЛОВЛЮВАННЯ — спосіб сказати про почуття, не нападаючи. Формула:
              «Мені [почуття], коли [ситуація]». Замість «Ти мене дратуєш!» — «Мені
              неприємно, коли на мене кричать».'
            en: 'I-STATEMENT — a way to express feelings without attacking. Formula:
              "I feel [emotion] when [situation]." Instead of "You drive me crazy!"
              — "I don''t like being yelled at."'
        - id: '153'
          type: speech
          duration_sec: 14
          text:
            ru: 'ФРАЗЫ-СПАСАТЕЛИ: «Давай вернёмся позже.» «Мне нужно подумать.» «У
              нас разные мнения — и это нормально.» «Давай сделаем паузу.»

              '
            uk: 'ФРАЗИ-СПАСАТЕЛІ: «Давай повернемося пізніше.» «Мені потрібно подумати.»
              «У нас різні думки — і це нормально.» «Давай зробимо паузу.»'
            en: 'LIFESAVING PHRASES: "Let''s come back to this later." "I need to
              think." "We have different opinions — and that''s okay." "Let''s take
              a break."'
        - id: '154'
          type: speech
          duration_sec: 14
          text:
            ru: 'И главное правило всего курса: СПОР — О ТЕМЕ, НЕ О ЧЕЛОВЕКЕ. Можно
              не согласиться с мнением друга и при этом уважать самого друга. Вот
              и вся «Сила слова»!

              '
            uk: 'І головне правило всього курсу: СПІР — ПРО ТЕМУ, НЕ ПРО ЛЮДИНУ. Можна
              не погодитися з думкою друга й при цьому поважати самого друга. Ось
              і вся «Сила слова»!'
            en: 'And the main rule of the entire course: ARGUMENT is ABOUT THE TOPIC,
              NOT THE PERSON. You can disagree with a friend''s opinion and still
              respect the friend. That''s all the "Power of Words" is!'
    - scene_id: sc7
      title:
        ru: НАПУТСТВИЕ
        uk: НАПУТСТВІЯ
        en: FAREWELL
      media_ref: 13A.sc7.farewell
      status: v3_locked
      steps:
        - id: '155'
          type: speech
          duration_sec: 16
          text:
            ru: 'До начала курса вы не знали, чем факт отличается от мнения. Не замечали,
              когда вас пытаются обмануть красивыми словами. Не понимали, почему после
              спора с другом становится грустно. А сейчас — знаете.

              '
            uk: До початку курсу ви не знали, чим факт відрізняється від думки. Не
              помічали, коли вас намагаються обманути красивими словами. Не розуміли,
              чому після спору з другом стає сумно. А зараз — знаєте.
            en: Before the course, you didn't know the difference between a fact and
              an opinion. You didn't notice when people tried to trick you with pretty
              words. You didn't understand why you felt sad after arguing with a friend.
              But now — you do.
        - id: '156'
          type: speech
          duration_sec: 16
          text:
            ru: 'Вы умеете замечать демагогию — все двенадцать хитростей, которые
              путают голову. Кто-то говорит «все так думают» — а вы уже слышите: поспешное
              обобщение. Кто-то пугает страшными последствиями — а вы проверяете каждое
              звено цепочки.

              '
            uk: 'Ви вмієте помічати демагогію — усі дванадцять хитростей, які плутають
              голову. Хтось говорить «все так думають» — а ви вже чуєте: поспішне
              узагальнення. Хтось пугає страшними наслідками — а ви перевіряєте кожну
              ланку ланцюга.'
            en: 'You can spot demagoguery — all twelve tricks that confuse your mind.
              Someone says "everyone thinks so" — and you already hear: hasty generalization.
              Someone scares you with awful consequences — and you check each link
              of the chain.'
        - id: '157'
          type: speech
          duration_sec: 16
          text:
            ru: 'Вы умеете не поддаваться на манипуляции. Когда кто-то давит на вину,
              страх или стыд — вы чувствуете кнопку и говорите: «Давай по существу».
              Это не грубость. Это защита. Как шлем на велосипеде — не мешает кататься,
              но спасает голову.

              '
            uk: 'Ви вмієте не піддаватися маніпуляціям. Коли хтось давить на вину,
              страх або сором — ви відчуваєте кнопку й говорите: «Давай по суті».
              Це не грубість. Це захист. Як шолом на велосипеді — не заважає їхати,
              але спасає голову.'
            en: 'You know how to resist manipulation. When someone presses the guilt,
              fear, or shame button — you feel it and say: "Let''s talk about what
              matters." That''s not rudeness. It''s self-defense. Like a helmet on
              a bike — doesn''t get in the way of riding, but protects your head.'
        - id: '158'
          type: speech
          duration_sec: 16
          text:
            ru: 'Вы умеете спорить и не ссориться. Говорить «мне обидно» вместо «ты
              плохой». Брать паузу, когда эмоции зашкаливают. Выходить из спора так,
              чтобы потом не было стыдно за свои слова.

              '
            uk: Ви вмієте сперечатися й не посварюватися. Говорити «мені образливо»
              замість «ти поганий». Брати паузу, коли емоції зашкалюють. Виходити
              зі спору так, щоб потім не було соромно за свої слова.
            en: You can argue without fighting. Say "I feel hurt" instead of "You're
              bad." Take a break when emotions run high. Exit an argument without
              regretting your words afterward.
        - id: '159'
          type: speech
          duration_sec: 16
          text:
            ru: 'И самое главное — вы умеете думать сами. Не верить на слово. Не бояться
              спрашивать «а откуда ты знаешь?» Не соглашаться только потому, что кто-то
              говорит громче. Это и есть критическое мышление — и оно теперь ваше.

              '
            uk: І найголовніше — ви вмієте думати самі. Не вірити на слово. Не бояться
              запитувати «а звідки ти це знаєш?» Не погоджуватися лише тому, що хтось
              говорить голосніше. Це й есть критичне мислення — і воно тепер ваше.
            en: And most importantly — you know how to think for yourself. Not trust
              blindly. Not fear asking "How do you know?" Not agree just because someone
              talks louder. That's critical thinking — and it's yours now.
        - id: '160'
          type: speech
          duration_sec: 14
          text:
            ru: 'Мы гордимся вами. Курс «Сила слова» закончился — но сила осталась
              с вами. Пользуйтесь ею с умом, с добротой и с юмором. Удачи!

              '
            uk: Ми гордимося вами. Курс «Сила слова» закінчився — але сила залишилася
              з вами. Користуйтеся нею з розумом, з добротою й з гумором. Удачи!
            en: We're proud of you. The "Power of Words" course has ended — but the
              power stays with you. Use it wisely, with kindness and humor. Good luck!
