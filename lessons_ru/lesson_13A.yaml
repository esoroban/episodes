            uk: 'Мама: «Коли я була маленькою, сніг був білішим!» Як це перевірити?'
            en: 'Mom: "When I was little, the snow was whiter!" How can you check
              this?'
          options:
            - id: opt_1
              text:
                ru: Никак — это воспоминание
                uk: Ніяк — це спогад
                en: Can't — it's a memory
            - id: opt_2
              text:
                ru: Найти данные о составе снега
                uk: Знайти дані про склад снігу
                en: Find data about snow composition
            - id: opt_3
              text:
                ru: Спросить бабушку
                uk: Запитати бабусю
                en: Ask grandma
          correct: opt_2
        - id: '39'
          type: speech
          duration_sec: 10
          text:
            ru: 'Найти данные! Субъективные воспоминания — ненадёжный источник. А
