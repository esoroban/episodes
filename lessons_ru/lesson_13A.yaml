lesson:
  id: lesson_13A
  day: 13
  slot: A
  title:
    ru: Спорить и не ругаться
    uk: Сперечатися й не лаятися
    en: Argue Without Fighting
  scenes:
    - scene_id: sc1
      title:
        ru: БОЛЬШАЯ РАЗМИНКА ПО ВСЕМУ КУРСУ
        uk: ВЕЛИКА РОЗМИНКА ПО ВСЬОМУ КУРСУ
        en: Big Warm-Up for the Whole Course
      media_ref: 13A.sc1.big_warmup
      status: v3_locked
      steps:
        - id: '1'
          type: speech
          duration_sec: 14
          text:
            ru: 'Последний день курса! Прежде чем узнать новое — проверим, что помним.
              Двадцать вопросов по ВСЕМ темам. Готовы? Поехали!

              '
            uk: Останній день курсу! Перш ніж дізнатися щось нове — перевіримо, що
              пам'ятаємо. Двадцять питань по ВСІМ темам. Готові? Поїхали!
            en: The last day of the course! Before learning something new, let's check
              what we remember. Twenty questions on ALL topics. Ready? Let's go!
        - id: '2'
          type: vote
          duration_sec: 12
          text:
            ru: '«Все кошки любят рыбу.» У Ани кошка не ест рыбу. Достаточно ли одного
              примера, чтобы опровергнуть утверждение?

              '
            uk: «Усі кішки люблять рибу.» У Ані кішка не їсть рибу. Чи достатньо одного
              прикладу, щоб спростувати твердження?
            en: '"All cats like fish." Ani''s cat doesn''t eat fish. Is one example
              enough to disprove this statement?'
          options:
            - id: opt_1
              text:
                ru: Да, достаточно
                uk: Так, достатньо
                en: Yes, that's enough
            - id: opt_2
              text:
                ru: Нет, нужно больше
                uk: Ні, потрібно більше
                en: No, we need more
          correct: opt_1
        - id: '3'
          type: speech
          duration_sec: 10
          text:
            ru: 'Достаточно! Чтобы опровергнуть «все» — хватит одного исключения.
              Одна кошка, которая не ест рыбу — и утверждение ложно.

              '
            uk: Достатньо! Щоб спростувати «всі» — вистачить одного виключення. Одна
              кішка, яка не їсть рибу — і твердження хибне.
            en: That's enough! To disprove "all" — one exception is enough. One cat
              that doesn't eat fish — and the statement is false.
        - id: '4'
          type: vote
          duration_sec: 12
          text:
            ru: 'Маша попробовала один раз сесть на велосипед — упала. «Я никогда
              не научусь!» Какая ошибка?

              '
            uk: Маша спробувала один раз сісти на велосипед — впала. «Я ніколи не
              навчусь!» Яка помилка?
            en: Masha tried to ride a bicycle once, fell. "I'll never learn!" What's
              the error?
          options:
            - id: opt_1
              text:
                ru: Поспешное обобщение
                uk: Поспішне узагальнення
                en: Hasty generalization
            - id: opt_2
              text:
                ru: Ложная причина
                uk: Хибна причина
                en: False cause
            - id: opt_3
              text:
                ru: Ложная дилемма
                uk: Хибна дилема
                en: False dilemma
          correct: opt_1
        - id: '5'
          type: speech
          duration_sec: 10
          text:
            ru: 'Поспешное обобщение! Один раз упала — и «никогда»? Все падают поначалу.
              Одна попытка — не повод для вывода о жизни.

              '
            uk: Поспішне узагальнення! Один раз впала — і «ніколи»? Всі падають спочатку.
              Одна спроба — не повід для висновку про життя.
            en: Hasty generalization! One fall — and "never"? Everyone falls at first.
              One try — not a reason to give up on life.
        - id: '6'
          type: vote
          duration_sec: 12
          text:
            ru: '«Шоколад полезен для мозга.» Как проверить это утверждение?

              '
            uk: «Шоколад корисний для мозку.» Як перевірити це твердження?
            en: '"Chocolate is good for your brain." How can we check this claim?'
          options:
            - id: opt_1
              text:
                ru: Спросить маму
                uk: Запитати маму
                en: Ask mom
            - id: opt_2
              text:
                ru: Найти научное исследование
                uk: Знайти наукове дослідження
                en: Find a scientific study
            - id: opt_3
              text:
                ru: Попробовать есть шоколад неделю
                uk: Спробувати їсти шоколад тиждень
                en: Try eating chocolate for a week
          correct: opt_2
        - id: '7'
          type: speech
          duration_sec: 10
          text:
            ru: 'Научное исследование! Мамино мнение — не проверка. А собственный
              эксперимент без контроля — не доказательство. Нужен надёжный источник.

              '
            uk: Наукове дослідження! Мамина думка — не перевірка. А власний експеримент
              без контролю — не доказ. Потрібне надійне джерело.
            en: A scientific study! Mom's opinion isn't verification. And your own
              experiment without a control isn't proof. We need a reliable source.
        - id: '8'
          type: vote
          duration_sec: 12
          text:
            ru: 'Саша увидел, что в парке лежит мокрый зонт. «Значит, был дождь!»
              Это наблюдение или вывод?

              '
            uk: Саша побачив, що в парку лежит мокрий парасолька. «Значить, був дощ!»
              Це спостереження чи висновок?
            en: Sasha saw a wet umbrella in the park. "So it rained!" Is this an observation
              or a conclusion?
          options:
            - id: opt_1
              text:
                ru: Наблюдение
                uk: Спостереження
                en: Observation
            - id: opt_2
              text:
                ru: Вывод
                uk: Висновок
                en: Conclusion
          correct: opt_2
        - id: '9'
          type: speech
          duration_sec: 10
          text:
            ru: 'Вывод! Наблюдение — «зонт мокрый». А «был дождь» — это уже объяснение.
              Может, зонт упал в лужу. Или кто-то его помыл.

              '
            uk: Висновок! Спостереження — «парасолька мокра». А «був дощ» — це вже
              пояснення. Може, парасолька впала в калюжу. Або хтось її помив.
            en: A conclusion! The observation is "the umbrella is wet." "It rained"
              is already an explanation. Maybe the umbrella fell in a puddle. Or someone
              washed it.
        - id: '10'
          type: vote
          duration_sec: 12
          text:
            ru: 'Петя заболел после того, как погулял под дождём. Дождь — причина
              болезни?

              '
            uk: Петя захворів після того, як гуляв під дощем. Дощ — причина хвороби?
            en: Petya got sick after walking in the rain. Is rain the cause of his
              illness?
          options:
            - id: opt_1
              text:
                ru: Да, причина
                uk: Так, причина
                en: Yes, it's the cause
            - id: opt_2
              text:
                ru: Возможно совпадение
                uk: Можливо збіг
                en: Maybe it's a coincidence
            - id: opt_3
              text:
                ru: Точно совпадение
                uk: Точно збіг
                en: Definitely a coincidence
          correct: opt_2
        - id: '11'
          type: speech
          duration_sec: 10
          text:
            ru: 'Возможно совпадение! Болезнь вызывают вирусы, а не дождь. «После»
              не значит «из-за». Может, Петя подхватил вирус ещё до прогулки.

              '
            uk: Можливо збіг! Хворобу викликають віруси, а не дощ. «Після» не значить
              «через». Може, Петя підхопив вірус ще до прогулки.
            en: Maybe a coincidence! Viruses cause illness, not rain. "After" doesn't
              mean "because of." Petya might have caught a virus before the walk.
        - id: '12'
          type: vote
          duration_sec: 12
          text:
            ru: 'Блогер: «Этот телефон — лучший!» Журнал: «Этот телефон — лучший!»
              Это независимые источники?

              '
            uk: 'Блогер: «Цей телефон — найкращий!» Журнал: «Цей телефон — найкращий!»
              Це незалежні джерела?'
            en: 'Blogger: "This phone is the best!" Magazine: "This phone is the best!"
              Are these independent sources?'
          options:
            - id: opt_1
              text:
                ru: Да
                uk: Так
                en: 'Yes'
            - id: opt_2
              text:
                ru: Нет
                uk: Ні
                en: 'No'
            - id: opt_3
              text:
                ru: Нужно проверить
                uk: Потрібно перевірити
                en: Need to check
          correct: opt_3
        - id: '13'
          type: speech
          duration_sec: 12
          text:
            ru: 'Нужно проверить! Если блогеру заплатил производитель и журнал получил
              рекламу — источники зависимые. Независимость = нет общего интереса.

              '
            uk: Потрібно перевірити! Якщо блогеру заплатив виробник і журнал отримав
              рекламу — джерела залежні. Незалежність = немає спільного інтересу.
            en: Need to check! If the blogger was paid by the manufacturer and the
              magazine got advertising — the sources are dependent. Independence =
              no shared interest.
        - id: '14'
          type: vote
          duration_sec: 12
          text:
            ru: '«Я люблю мороженое» и «Мороженое — самая полезная еда». Есть ли тут
              противоречие?

              '
            uk: «Я люблю морозиво» і «Морозиво — найкорисніша їжа». Є тут суперечність?
            en: '"I love ice cream" and "Ice cream is the most nutritious food." Is
              there a contradiction?'
          options:
            - id: opt_1
              text:
                ru: Да, противоречие
                uk: Так, суперечність
                en: Yes, there's a contradiction
            - id: opt_2
              text:
                ru: Нет, это разные вещи
                uk: Ні, це різні речі
                en: No, these are different things
          correct: opt_2
        - id: '15'
          type: speech
          duration_sec: 10
          text:
            ru: 'Нет противоречия! Первое — мнение о вкусе. Второе — утверждение о
              пользе. Любить что-то и считать это полезным — разные вещи.

              '
            uk: Немає суперечності! Перше — думка про смак. Друге — твердження про
              користь. Любити щось і вважати його корисним — різні речі.
            en: No contradiction! The first is an opinion about taste. The second
              is a claim about nutrition. You can like something and think it's good
              for you.
        - id: '16'
          type: vote
          duration_sec: 12
          text:
            ru: 'Учитель: «Почему опоздал?» Ученик: «А Маша вчера тоже опоздала!»
              Что сделал ученик?

              '
            uk: 'Учитель: «Чому ти спізнився?» Учень: «А Маша вчора теж спізнилася!»
              Що зробив учень?'
            en: 'Teacher: "Why are you late?" Student: "But Masha was also late yesterday!"
              What did the student do?'
          options:
            - id: opt_1
              text:
                ru: Ответил на вопрос
                uk: Відповів на запитання
                en: Answered the question
            - id: opt_2
              text:
                ru: Ушёл от темы
                uk: Пішов від теми
                en: Avoided the topic
            - id: opt_3
              text:
                ru: Привёл аргумент
                uk: Навів аргумент
                en: Gave an argument
          correct: opt_2
        - id: '17'
          type: speech
          duration_sec: 10
          text:
            ru: 'Ушёл от темы! Маша и её вчерашнее опоздание — не ответ на вопрос
              «почему ТЫ опоздал СЕГОДНЯ». Классическая подмена.

              '
            uk: Пішов від теми! Маша й її вчорашнє спізнення — не відповідь на запитання
              «чому ТИ спізнився СЬОГОДНІ». Класична заміна.
            en: Avoided the topic! Masha and her lateness yesterday aren't an answer
              to "why are YOU late TODAY?" Classic deflection.
        - id: '18'
          type: vote
          duration_sec: 12
          text:
            ru: '«Если не выучишь таблицу умножения — не сдашь экзамен, не поступишь
              в университет, станешь дворником!» Что это?

              '
            uk: «Якщо не вивчиш таблицю множення — не здашь іспит, не поступиш до
              університету, станеш дворником!» Що це?
            en: '"If you don''t learn the multiplication table, you''ll fail the exam,
              won''t get into university, become a janitor!" What is this?'
          options:
            - id: opt_1
              text:
                ru: Логичное рассуждение
                uk: Логічне міркування
                en: Logical reasoning
            - id: opt_2
              text:
                ru: Страшная цепочка
                uk: Страшний ланцюг
                en: Scary chain
            - id: opt_3
              text:
                ru: Ложный авторитет
                uk: Хибний авторитет
                en: False authority
          correct: opt_2
        - id: '19'
          type: speech
          duration_sec: 10
          text:
            ru: 'Страшная цепочка! От таблицы умножения до «станешь дворником» — три
              прыжка без доказательств. Каждое звено нужно проверять отдельно.

              '
            uk: Страшний ланцюг! Від таблиці множення до «станеш дворником» — три
              стрибки без доказів. Кожну ланку потрібно перевірити окремо.
            en: Scary chain! From multiplication table to "become a janitor" — three
              jumps without proof. Each link needs to be checked separately.
        - id: '20'
          type: vote
          duration_sec: 12
          text:
            ru: '«Либо ты идёшь на кружок рисования, либо сидишь дома без дела.» А
              если хочешь гулять?

              '
            uk: «Або ти йдеш на кружок малювання, або сидиш дома без справи.» А якщо
              хочеш гуляти?
            en: '"Either you go to art class or sit at home doing nothing." What if
              you want to go for a walk?'
          options:
            - id: opt_1
              text:
                ru: Нормальный выбор
                uk: Нормальний вибір
                en: Normal choice
            - id: opt_2
              text:
                ru: Ложная дилемма
                uk: Хибна дилема
                en: False dilemma
          correct: opt_2
        - id: '21'
          type: speech
          duration_sec: 10
          text:
            ru: 'Ложная дилемма! Есть куча вариантов: гулять, читать, играть, кружок
              робототехники. «Либо-либо» прячет все остальные варианты.

              '
            uk: 'Хибна дилема! Є купа варіантів: гуляти, читати, грати, кружок робототехніки.
              «Або-або» приховує всі інші варіанти.'
            en: 'False dilemma! There are lots of options: go for a walk, read, play,
              robotics club. "Either-or" hides all other options.'
        - id: '22'
          type: vote
          duration_sec: 12
          text:
            ru: '«Почему ты не хочешь есть суп?» — «А ты сама вчера не ела кашу?»
              Что это за приём?

              '
            uk: «Чому ти не хочеш їсти суп?» — «А ти сама вчора не їла кашу?» Що це
              за прийом?
            en: '"Why don''t you want to eat soup?" — "But you didn''t eat porridge
              yesterday!" What technique is this?'
          options:
            - id: opt_1
              text:
                ru: Возражение по существу
                uk: Заперечення по суті
                en: Valid objection
            - id: opt_2
              text:
                ru: Нападка на человека
                uk: Напад на людину
                en: Personal attack
            - id: opt_3
              text:
                ru: Вопрос-ловушка
                uk: Запитання-пастка
                en: Trick question
          correct: opt_2
        - id: '23'
          type: speech
          duration_sec: 10
          text:
            ru: 'Нападка на человека! Вместо ответа — атака: «а ты сама...» Чужое
              поведение — не аргумент. Это даже не возражение, а уход от темы с нападкой.

              '
            uk: 'Напад на людину! Замість відповіді — атака: «а ти сама...» Чужа поведінка
              — не аргумент. Це навіть не заперечення, а відхід від теми з нападом.'
            en: 'Personal attack! Instead of answering — an attack: "But you yourself..."
              Someone else''s behavior isn''t an argument. This isn''t even an objection,
              it''s avoiding the topic with an attack.'
        - id: '24'
          type: vote
          duration_sec: 12
          text:
            ru: 'Реклама: «9 из 10 стоматологов рекомендуют!» Что нужно спросить?

              '
            uk: 'Реклама: «9 з 10 стоматологів рекомендують!» Що потрібно запитати?'
            en: 'Ad: "9 out of 10 dentists recommend!" What should you ask?'
          options:
            - id: opt_1
              text:
                ru: Кто эти стоматологи?
                uk: Хто ці стоматологи?
                en: Who are these dentists?
            - id: opt_2
              text:
                ru: Сколько им заплатили?
                uk: Скільки їм заплатили?
                en: How much were they paid?
            - id: opt_3
              text:
                ru: Оба вопроса важны
                uk: Обидва запитання важливі
                en: Both questions matter
          correct: opt_3
        - id: '25'
          type: speech
          duration_sec: 10
          text:
            ru: 'Оба! Кто они — может, это студенты. Заплатили ли им — может, это
              рекламный контракт. Реклама любит цифры, которые выглядят научно, но
              ничего не доказывают.

              '
            uk: Обидва! Хто вони — може, це студенти. Заплатили ли їм — може, це рекламний
              контракт. Реклама любить цифри, які виглядають наукова, але нічого не
              доказують.
            en: Both! Who they are — maybe they're students. Whether they were paid
              — maybe it's an ad contract. Ads love numbers that look scientific but
              don't prove anything.
        - id: '26'
          type: vote
          duration_sec: 12
          text:
            ru: '«Ты же согласен, что наша учительница — лучшая в мире?» Что не так
              с этим вопросом?

              '
            uk: «Ти ж згідний, що наша вчителька — найкраща в світі?» Що не так із
              цим запитанням?
            en: '"You agree that our teacher is the best in the world, right?" What''s
              wrong with this question?'
          options:
            - id: opt_1
              text:
                ru: Всё нормально
                uk: Все нормально
                en: Everything's fine
            - id: opt_2
              text:
                ru: Это вопрос-ловушка
                uk: Це запитання-пастка
                en: This is a trick question
            - id: opt_3
              text:
                ru: Это мнение
                uk: Це думка
                en: This is an opinion
          correct: opt_2
        - id: '27'
          type: speech
          duration_sec: 10
          text:
            ru: 'Вопрос-ловушка! В него уже встроен ответ: «ты же согласен». Если
              скажешь «нет» — значит, ты «не согласен, что она лучшая». Хитрый приём!

              '
            uk: 'Запитання-пастка! У нього вже вбудований відповідь: «ти ж згідний».
              Якщо скажеш «ні» — значить, ти «не згідний, що вона найкраща». Хитрий
              прийом!'
            en: 'Trick question! The answer is already built in: "you agree." If you
              say "no," it means you "don''t agree she''s the best." Clever trick!'
        - id: '28'
          type: vote
          duration_sec: 12
          text:
            ru: '«Мне не нравится твой рисунок — пропорции неправильные, посмотри
              на руки.» Это возражение или нападка?

              '
            uk: «Мені не подобається твій малюнок — пропорції неправильні, подивися
              на руки.» Це заперечення чи напад?
            en: '"I don''t like your drawing — the proportions are wrong, look at
              the hands." Is this an objection or an attack?'
          options:
            - id: opt_1
              text:
                ru: Возражение
                uk: Заперечення
                en: Objection
            - id: opt_2
              text:
                ru: Нападка
                uk: Напад
                en: Attack
          correct: opt_1
        - id: '29'
          type: speech
          duration_sec: 10
          text:
            ru: 'Возражение! Конкретно, по делу, с примером: «пропорции», «руки».
              Не «ты плохо рисуешь» — а что именно не так. Так и нужно критиковать.

              '
            uk: 'Заперечення! Конкретно, по суті, з прикладом: «пропорції», «руки».
