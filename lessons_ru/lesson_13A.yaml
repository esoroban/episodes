              friend.
        - id: '93'
          type: vote
          duration_sec: 10
          text:
            ru: '«Я не согласен, но понимаю твою точку зрения.»

              '
            uk: «Я не згідний, але розумію твою точку зору.»
            en: '"I disagree, but I understand your point."'
          options:
            - id: opt_1
              text:
                ru: Спасёт отношения
                uk: Спасе стосунки
                en: Will save the relationship
            - id: opt_2
              text:
                ru: Ухудшит ситуацию
                uk: Погіршить ситуацію
                en: Will make it worse
          correct: opt_1
        - id: '94'
          type: speech
          duration_sec: 10
          text:
            ru: 'Спасёт! Золотая фраза. Вы остаётесь при своём мнении — но показываете
              уважение. Именно так спорят люди, которые дружат годами.

              '
            uk: Спасе! Золота фраза. Ви залишаєтесь при своїй думці — але показуєте
              повагу. Саме так сперечаються люди, які дружать роками.
            en: Will save it! A golden phrase. You stick to your opinion — but show
