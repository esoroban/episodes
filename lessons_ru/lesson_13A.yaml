        - id: '50'
          type: vote
          duration_sec: 12
          text:
            ru: 'Одноклассница говорит: «Ты ничего не умеешь рисовать!» Как ответить?

              '
            uk: 'Однокласниця говорить: «Ти нічого не вмієш малювати!» Як відповісти?'
            en: 'A classmate says: "You can''t draw!" How should you respond?'
          options:
