                uk: «Зате ти криво пишеш!»
                en: '"But you write crooked!"'
            - id: opt_3
              text:
                ru: «Ну рисуй сама тогда!»
                uk: «Ну малюй сама тоді!»
                en: '"Then you draw!"'
          correct: opt_1
        - id: '51'
          type: speech
          duration_sec: 10
          text:
            ru: 'Первый вариант — честно про свои чувства. Остальные два — нападка
