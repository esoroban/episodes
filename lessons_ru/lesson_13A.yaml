        - id: '40'
          type: speech
          duration_sec: 12
          text:
            ru: 'Двадцать из двадцати! Вы помните ВСЁ. Факты и мнения, причины и совпадения,
              ловушки и обобщения. Теперь — к новой теме!

              '
            uk: Двадцять з двадцяти! Ви пам'ятаєте ВСЕ. Факти й думки, причини й збіги,
