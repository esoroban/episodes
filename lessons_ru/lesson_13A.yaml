          options:
            - id: opt_1
              text:
                ru: «А ты скучно рассказываешь!»
                uk: «А ти нудно розповідаєш!»
                en: '"You tell boring stories!"'
            - id: opt_2
              text:
                ru: «Неправда!»
                uk: «Неправда!»
                en: '"That''s not true!"'
            - id: opt_3
              text:
                ru: «Прости, я задумался. Мне важно то, что ты говоришь»
