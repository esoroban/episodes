        - id: '48'
          type: vote
          duration_sec: 12
          text:
            ru: 'Друг кричит: «Ты всегда опаздываешь!» Как ответить?

              '
            uk: 'Друг кричить: «Ти завжди спізнюєшся!» Як відповісти?'
            en: 'A friend shouts: "You''re always late!" How should you respond?'
          options:
            - id: opt_1
              text:
                ru: «А ты вообще зануда!»
                uk: «А ти взагалі нудна!»
                en: '"You''re boring!"'
            - id: opt_2
              text:
                ru: «Мне неприятно, когда на меня кричат за опоздание»
                uk: «Мені неприємно, коли на мене кричать за спізнення»
                en: '"I don''t like being yelled at for being late"'
            - id: opt_3
              text:
                ru: «Ну и что?»
                uk: «Ну й що?»
                en: '"So what?"'
          correct: opt_2
        - id: '49'
          type: speech
          duration_sec: 10
          text:
            ru: 'Второй вариант — про свои чувства, без нападки в ответ. Первый —
