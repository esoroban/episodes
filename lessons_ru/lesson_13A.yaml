              '
            uk: «Цей крем рекомендує професор Іванов!» Професор Іванов — історик.
              Крем — косметичний. Що не так?
            en: '"This cream is recommended by Professor Ivanov!" Professor Ivanov
              is a historian. The cream is cosmetic. What''s wrong?'
          options:
            - id: opt_1
              text:
                ru: Всё нормально
                uk: Все нормально
                en: Everything's fine
            - id: opt_2
              text:
                ru: Ложный авторитет
                uk: Хибний авторитет
                en: False authority
            - id: opt_3
              text:
                ru: Поспешное обобщение
                uk: Поспішне узагальнення
