          options:
            - id: opt_1
              text:
                ru: Да
                uk: Так
                en: 'Yes'
            - id: opt_2
              text:
                ru: Нет
                uk: Ні
                en: 'No'
          correct: opt_2
        - id: '35'
          type: speech
          duration_sec: 10
          text:
