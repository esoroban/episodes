              text:
                ru: «Сам виноват!»
                uk: «Сам винний!»
                en: '"You''re to blame!"'
            - id: opt_2
              text:
                ru: «Мне и так грустно, что мы проиграли»
                uk: «Мені й так сумно, що ми програли»
                en: '"I''m already sad that we lost"'
            - id: opt_3
              text:
                ru: «Мне всё равно»
                uk: «Мені все одно»
