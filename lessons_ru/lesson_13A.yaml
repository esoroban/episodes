                uk: Три
                en: Three
            - id: opt_2
              text:
                ru: Два
                uk: Два
                en: Two
            - id: opt_3
              text:
                ru: Одно
                uk: Одна
                en: One
          correct: opt_2
        - id: '33'
          type: speech
          duration_sec: 10
          text:
            ru: 'Два! Тот, кто прочитал отзыв — повторяет чужое мнение, а не своё.
