        - id: '95'
          type: vote
          duration_sec: 10
          text:
            ru: '«Ой, всё!»

              '
            uk: «Ой, все!»
            en: '"Ugh, enough!"'
          options:
            - id: opt_1
              text:
                ru: Спасёт отношения
                uk: Спасе стосунки
                en: Will save the relationship
            - id: opt_2
              text:
                ru: Ухудшит ситуацию
                uk: Погіршить ситуацію
                en: Will make it worse
          correct: opt_2
        - id: '96'
          type: speech
          duration_sec: 10
          text:
            ru: 'Ухудшит! Два слова — а сколько раздражения. Это не выход из спора,
