          text:
            ru: 'Подруга заявляет: «Ты меня вообще не слушаешь!» Как ответить?

              '
            uk: 'Подруга заявляє: «Ти мене взагалі не слухаєш!» Як відповісти?'
            en: 'Your friend says: "You don''t listen to me at all!" How should you
