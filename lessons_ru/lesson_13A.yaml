              Інші — квиток до кабінету директора.
            en: The first option addresses both you and the other person. A real way
              out of conflict. The others are a ticket to the principal's office.
        - id: '58'
          type: speech
          duration_sec: 12
          text:
            ru: 'Формула простая: «Мне [чувство], когда [ситуация]». Вместо «Ты меня
              бесишь!» — «Мне неприятно, когда на меня кричат». Первое — нападка.
              Второе — про себя.

              '
            uk: 'Формула проста: «Мені [почуття], коли [ситуація]». Замість «Ти мене
              дратуєш!» — «Мені неприємно, коли на мене кричать». Перше — напад. Друге
              — про себе.'
            en: 'The formula is simple: "I feel [emotion] when [situation]." Instead
              of "You drive me crazy!" — "I don''t like being yelled at." The first
              is an attack. The second is about you.'
        - id: '59'
          type: speech
          duration_sec: 12
          text:
            ru: 'А если эмоции зашкаливают и формулы не помогают? Три спасательных
              приёма: пауза, глубокий вдох, счёт до десяти. Звучит просто — но работает
              лучше крика!

              '
            uk: 'А якщо емоції зашкалюють і формули не допомагають? Три спасальні
              прийоми: пауза, глибокий вдих, рахунок до десяти. Звучить просто — але
              працює краще, ніж крик!'
            en: 'What if your emotions are running high and the formula doesn''t work?
              Three lifesaving tricks: pause, deep breath, count to ten. Sounds simple
              — but works better than yelling!'
    - scene_id: sc3
      title:
        ru: ОБВИНЕНИЕ ИЛИ Я-ВЫСКАЗЫВАНИЕ?
        uk: ЗВИНУВАЧЕННЯ ЧИ Я-ВИСЛОВЛЮВАННЯ?
        en: ACCUSATION OR I-STATEMENT?
      media_ref: 13A.sc3.accusation_or_i_statement
      status: v3_locked
      steps:
        - id: '60'
          type: speech
          duration_sec: 14
          text:
            ru: 'Итак, формула Я-высказывания: «Мне [чувство], когда [ситуация]».
              Вы говорите про СЕБЯ — свои чувства, свои ощущения. Не обвиняете другого.
              Не нападаете. Просто объясняете, что с вами происходит.

              '
            uk: 'Отже, формула Я-висловлювання: «Мені [почуття], коли [ситуація]».
              Ви говорите про СЕБЕ — свої почуття, свої відчуття. Не звинувачуєте
              іншого. Не нападаєте. Просто пояснюєте, що з вами відбувається.'
            en: 'So the I-statement formula is: "I feel [emotion] when [situation]."
              You talk about YOURSELF — your feelings, your sensations. You don''t
              accuse the other person. You don''t attack. You just explain what''s
              happening with you.'
        - id: '61'
          type: speech
          duration_sec: 12
          text:
            ru: 'А обвинение — наоборот: «ТЫ всегда...», «ТЫ никогда...», «Из-за ТЕБЯ...».
              Всё направлено на другого. Это нападка — и начало ссоры. Сейчас проверим,
              отличаете ли вы одно от другого!

              '
            uk: 'А звинувачення — навпаки: «ТИ завжди...», «ТИ ніколи...», «Через
              ТЕБЕ...». Все спрямовано на іншого. Це напад — і початок посварки. Тепер
              перевіримо, розрізняєте ви одне від іншого!'
            en: 'An accusation is the opposite: "YOU always...," "YOU never...," "Because
              of YOU..." Everything is directed at the other person. It''s an attack
              — and the start of a fight. Now let''s see if you can tell the difference!'
        - id: '62'
          type: vote
          duration_sec: 10
          text:
            ru: '«Ты всегда всё портишь!»

              '
            uk: «Ти завжди все псуєш!»
            en: '"You always ruin everything!"'
          options:
            - id: opt_1
              text:
                ru: Я-высказывание
                uk: '[UNTRANSLATED]'
                en: '[UNTRANSLATED]'
            - id: opt_2
              text:
                ru: Обвинение
                uk: '[UNTRANSLATED]'
                en: '[UNTRANSLATED]'
          correct: opt_2
        - id: '63'
          type: speech
          duration_sec: 8
          text:
            ru: 'Обвинение! Слово «всегда» + «всё» — двойной удар. Нападка на человека,
              а не про чувства.

              '
            uk: Звинувачення! Слово «завжди» + «все» — подвійний удар. Напад на людину,
              а не про почуття.
            en: Accusation! The words "always" + "everything" — a double blow. An
              attack on a person, not about feelings.
        - id: '64'
          type: vote
          duration_sec: 10
          text:
            ru: '«Мне неприятно долго ждать.»

              '
            uk: «Мені неприємно довго чекати.»
            en: '"I don''t like waiting a long time."'
          options:
            - id: opt_1
              text:
                ru: Я-высказывание
                uk: '[UNTRANSLATED]'
                en: '[UNTRANSLATED]'
            - id: opt_2
              text:
                ru: Обвинение
                uk: '[UNTRANSLATED]'
                en: '[UNTRANSLATED]'
          correct: opt_1
        - id: '65'
          type: speech
          duration_sec: 8
          text:
            ru: 'Я-высказывание! «Мне неприятно» — про себя. Никаких «ты опять опоздал»
              — только про свои чувства.

              '
            uk: Я-висловлювання! «Мені неприємно» — про себе. Ніяких «ти знову спізнився»
              — тільки про свої почуття.
            en: I-statement! "I don't like" — about yourself. No "you're late again"
              — just your feelings.
        - id: '66'
          type: vote
          duration_sec: 10
          text:
            ru: '«Ты самый вредный человек в классе!»

              '
            uk: «Ти найшкідливіша людина в класі!»
            en: '"You''re the meanest person in the class!"'
          options:
            - id: opt_1
              text:
                ru: Я-высказывание
                uk: '[UNTRANSLATED]'
                en: '[UNTRANSLATED]'
            - id: opt_2
              text:
                ru: Обвинение
                uk: '[UNTRANSLATED]'
                en: '[UNTRANSLATED]'
          correct: opt_2
        - id: '67'
          type: speech
          duration_sec: 8
          text:
            ru: 'Обвинение! «Самый вредный» — это уже не про поведение, это ярлык
              на человека. Классическая нападка.

              '
            uk: Звинувачення! «Найшкідливіша» — це вже не про поведінку, це ярлик
              на людину. Класична напад.
            en: Accusation! "The meanest" — that's not about behavior, that's a label
              on a person. Classic attack.
        - id: '68'
          type: vote
          duration_sec: 10
          text:
            ru: '«Я расстраиваюсь, когда мы ссоримся.»

              '
            uk: «Я розстраююся, коли ми посварюємося.»
            en: '"I get upset when we fight."'
          options:
            - id: opt_1
              text:
                ru: Я-высказывание
                uk: '[UNTRANSLATED]'
                en: '[UNTRANSLATED]'
            - id: opt_2
              text:
                ru: Обвинение
                uk: '[UNTRANSLATED]'
                en: '[UNTRANSLATED]'
          correct: opt_1
        - id: '69'
          type: speech
          duration_sec: 8
          text:
            ru: 'Я-высказывание! «Я расстраиваюсь» — про себя. «Когда мы ссоримся»
              — ситуация. Формула работает идеально.

              '
            uk: Я-висловлювання! «Я розстраююся» — про себе. «Коли ми посварюємося»
              — ситуація. Формула працює ідеально.
            en: I-statement! "I get upset" — about yourself. "When we fight" — the
              situation. The formula works perfectly.
        - id: '70'
          type: vote
          duration_sec: 10
          text:
            ru: '«Из-за тебя у нас ничего не получается!»

              '
            uk: «Через тебе у нас нічого не вихідить!»
            en: '"We can''t do anything because of you!"'
          options:
            - id: opt_1
              text:
                ru: Я-высказывание
                uk: '[UNTRANSLATED]'
                en: '[UNTRANSLATED]'
            - id: opt_2
              text:
                ru: Обвинение
                uk: '[UNTRANSLATED]'
                en: '[UNTRANSLATED]'
          correct: opt_2
        - id: '71'
          type: speech
          duration_sec: 10
          text:
            ru: 'Обвинение! «Из-за тебя» — вся вина на одном человеке. А попробуйте:
              «Мне грустно, что у нас не получается.» Совсем другой разговор!

              '
            uk: 'Звинувачення! «Через тебе» — вся вина на одній людині. А спробуйте:
              «Мені сумно, що у нас не вихідить.» Зовсім іншу розмова!'
            en: 'Accusation! "Because of you" — all the blame on one person. Try this:
              "I''m sad that it didn''t work out." A completely different conversation!'
        - id: '72'
          type: vote
          duration_sec: 10
          text:
            ru: '«Мне трудно сосредоточиться, когда вокруг шумно.»

              '
            uk: «Мені важко зосередитися, коли навколо шумно.»
            en: '"It''s hard for me to concentrate when it''s noisy."'
          options:
            - id: opt_1
              text:
                ru: Я-высказывание
                uk: '[UNTRANSLATED]'
                en: '[UNTRANSLATED]'
            - id: opt_2
              text:
                ru: Обвинение
                uk: '[UNTRANSLATED]'
                en: '[UNTRANSLATED]'
          correct: opt_1
        - id: '73'
          type: speech
          duration_sec: 10
          text:
            ru: 'Я-высказывание! Не «вы все шумите!», а «мне трудно». Про себя — и
              при этом понятно, что нужна тишина. Без ссоры.

              '
            uk: Я-висловлювання! Не «ви всі шумите!», а «мені важко». Про себе — і
              при цьому зрозуміло, що потрібна тиша. Без посварки.
            en: I-statement! Not "you're all being noisy!" but "It's hard for me."
              About yourself — and it's clear that quiet is needed. Without fighting.
        - id: '74'
          type: vote
          duration_sec: 10
          text:
            ru: '«Ты вечно берёшь мои вещи без спроса!»

              '
            uk: «Ти вічно береш мої речі без запиту!»
            en: '"You always take my things without asking!"'
          options:
            - id: opt_1
              text:
                ru: Я-высказывание
                uk: '[UNTRANSLATED]'
                en: '[UNTRANSLATED]'
            - id: opt_2
              text:
                ru: Обвинение
                uk: '[UNTRANSLATED]'
                en: '[UNTRANSLATED]'
          correct: opt_2
        - id: '75'
          type: speech
          duration_sec: 10
          text:
            ru: 'Обвинение! «Вечно» — преувеличение, «без спроса» — нападка. А как
              Я-высказывание? «Мне важно, чтобы меня спрашивали, прежде чем брать
              мои вещи.»

              '
            uk: Звинувачення! «Вічно» — перебільшення, «без запиту» — напад. А як
              Я-висловлювання? «Мені важливо, щоб мене запитували, перш ніж брати
              мої речі.»
            en: Accusation! "Always" is an exaggeration, "without asking" is an attack.
              What about an I-statement? "I want to be asked before you take my things."
        - id: '76'
          type: vote
          duration_sec: 10
          text:
            ru: '«Мне кажется, мы не поняли друг друга.»

              '
            uk: «Мені здається, ми не зрозуміли одне одного.»
            en: '"I think we didn''t understand each other."'
          options:
            - id: opt_1
              text:
                ru: Я-высказывание
                uk: '[UNTRANSLATED]'
                en: '[UNTRANSLATED]'
            - id: opt_2
              text:
                ru: Обвинение
                uk: '[UNTRANSLATED]'
                en: '[UNTRANSLATED]'
          correct: opt_1
        - id: '77'
          type: speech
          duration_sec: 10
          text:
            ru: 'Я-высказывание! «Мне кажется» + «мы» — никто не виноват, оба не поняли.
              Идеальный способ разрядить обстановку.

              '
            uk: Я-висловлювання! «Мені здається» + «ми» — ніхто не винний, обидва
              не зрозуміли. Ідеальний спосіб розрядити обстановку.
            en: I-statement! "I think" + "we" — nobody's at fault, we both misunderstood.
              Perfect way to defuse the situation.
    - scene_id: sc4
      title:
        ru: МИРНЫЙ ВЫХОД ИЗ СПОРА
        uk: МИРНИЙ ВИХІД ЗІ СПОРУ
        en: PEACEFUL WAY OUT OF AN ARGUMENT
      media_ref: 13A.sc4.peaceful_exit
      status: v3_locked
      steps:
        - id: '78'
          type: speech
          duration_sec: 14
          text:
            ru: 'Вы умеете не нападать — это уже половина победы. Но иногда спор заходит
              в тупик: никто не уступает, эмоции растут. Что делать? Выйти из спора
              так, чтобы остаться друзьями.

              '
            uk: 'Ви вмієте не нападати — це вже половина перемоги. Але іноді спір
              заходить в глухий кут: ніхто не поступається, емоції зростають. Що робити?
              Вийти зі спору так, щоб залишитися друзями.'
            en: 'You know how not to attack — that''s half the battle. But sometimes
              an argument reaches a deadlock: nobody gives in, emotions escalate.
              What do you do? Exit the argument while remaining friends.'
        - id: '79'
          type: speech
          duration_sec: 14
          text:
            ru: 'Четыре фразы-спасателя: «Давай вернёмся к этому позже.» «Мне нужно
              время подумать.» «У нас разные мнения — и это нормально.» «Давай сделаем
              паузу и поговорим спокойно.»

              '
            uk: 'Чотири фрази-спасателі: «Давай повернемося до цього пізніше.» «Мені
              потрібен час подумати.» «У нас різні думки — і це нормально.» «Давай
              зробимо паузу й поговоримо спокійно.»'
            en: 'Four lifesaving phrases: "Let''s come back to this later." "I need
              time to think." "We have different opinions — and that''s okay." "Let''s
              take a break and talk calmly."'
        - id: '80'
          type: speech
          duration_sec: 12
          text:
            ru: 'Главное правило: СПОР — О ТЕМЕ, НЕ О ЧЕЛОВЕКЕ. Можно не согласиться
              с мнением друга — и при этом уважать самого друга. Теперь проверим —
              какие фразы спасают, а какие всё портят?

              '
            uk: 'Головне правило: СПІР — ПРО ТЕМУ, НЕ ПРО ЛЮДИНУ. Можна не погодитися
              з думкою друга — і при цьому поважати самого друга. Тепер перевіримо
              — які фрази рятують, а які все псують?'
            en: 'Main rule: ARGUMENT is ABOUT THE TOPIC, NOT THE PERSON. You can disagree
              with a friend''s opinion — and still respect the friend. Now let''s
              see — which phrases save the day, and which ruin everything?'
        - id: '81'
          type: vote
          duration_sec: 10
          text:
            ru: '«Давай вернёмся к этому, когда оба успокоимся.»

              '
            uk: «Давай повернемося до цього, коли обидва заспокоїмся.»
            en: '"Let''s come back to this when we''ve both calmed down."'
          options:
            - id: opt_1
              text:
                ru: Спасёт отношения
                uk: Спасе стосунки
                en: Will save the relationship
            - id: opt_2
              text:
                ru: Ухудшит ситуацию
                uk: Погіршить ситуацію
                en: Will make it worse
          correct: opt_1
        - id: '82'
          type: speech
          duration_sec: 8
          text:
            ru: 'Спасёт! Пауза + уважение. Вы не сдаётесь — вы берёте тайм-аут. Как
              в баскетболе: перерыв, чтобы потом играть лучше.

              '
            uk: 'Спасе! Пауза + повага. Ви не здаєтесь — ви беретеся тайм-аут. Як
              у баскетболі: перерва, щоб потім грати краще.'
            en: 'Will save it! Pause + respect. You''re not giving up — you''re taking
              a timeout. Like in basketball: a break to play better later.'
        - id: '83'
          type: vote
          duration_sec: 10
          text:
            ru: '«Ладно, ты прав, я дурак!» (с сарказмом)

              '
            uk: «Гаразд, ти правий, я дурень!» (з сарказмом)
            en: '"Fine, you''re right, I''m stupid!" (sarcastically)'
          options:
            - id: opt_1
              text:
                ru: Спасёт отношения
                uk: Спасе стосунки
                en: Will save the relationship
            - id: opt_2
              text:
                ru: Ухудшит ситуацию
                uk: Погіршить ситуацію
                en: Will make it worse
          correct: opt_2
        - id: '84'
          type: speech
          duration_sec: 10
          text:
            ru: 'Ухудшит! Это сарказм + оскорбление себя. Звучит как согласие, а на
              самом деле — злость. Собеседник чувствует подвох и злится ещё больше.

              '
            uk: Погіршить! Це сарказм + образа себе. Звучить як согласие, а насправді
              — злість. Співбесідник відчуває підвох і гніється ще більше.
            en: Will make it worse! Sarcasm + self-insult. Sounds like agreement but
              is really anger. The other person senses the trap and gets even angrier.
        - id: '85'
          type: vote
          duration_sec: 10
          text:
            ru: '«Мы думаем по-разному, и это нормально.»

              '
            uk: «Ми думаємо по-іншому, і це нормально.»
            en: '"We think differently, and that''s okay."'
          options:
            - id: opt_1
              text:
                ru: Спасёт отношения
                uk: Спасе стосунки
                en: Will save the relationship
            - id: opt_2
              text:
                ru: Ухудшит ситуацию
                uk: Погіршить ситуацію
                en: Will make it worse
          correct: opt_1
        - id: '86'
          type: speech
          duration_sec: 8
          text:
            ru: 'Спасёт! Вы принимаете различие. Не «ты неправ», а «мы разные». Это
              взрослый подход — и он работает даже среди взрослых.

              '
            uk: Спасе! Ви приймаєте різницю. Не «ти неправий», а «ми різні». Це дорослий
              підхід — і він працює навіть серед дорослих.
            en: Will save it! You accept the difference. Not "you're wrong," but "we're
              different." That's a mature approach — and it works even with adults.
        - id: '87'
          type: vote
          duration_sec: 10
          text:
            ru: '«Да мне вообще всё равно, делай что хочешь!»

              '
            uk: «Та мені взагалі все одно, роби як хочеш!»
            en: '"I don''t care, do what you want!"'
          options:
            - id: opt_1
              text:
                ru: Спасёт отношения
                uk: Спасе стосунки
                en: Will save the relationship
            - id: opt_2
              text:
                ru: Ухудшит ситуацию
                uk: Погіршить ситуацію
                en: Will make it worse
          correct: opt_2
        - id: '88'
          type: speech
          duration_sec: 10
          text:
            ru: 'Ухудшит! «Всё равно» — это не мир, это стена. Вы не решили проблему
              — вы хлопнули дверью. Человек чувствует, что его бросили посреди разговора.

              '
            uk: Погіршить! «Все одно» — це не мир, це стіна. Ви не вирішили проблему
              — ви хлопнули дверима. Людина відчуває, що її кинули посередині розмови.
            en: Will make it worse! "I don't care" is not peace, it's a wall. You
              didn't solve the problem — you slammed the door. The person feels abandoned
              mid-conversation.
        - id: '89'
          type: vote
          duration_sec: 10
          text:
            ru: '«Давай сменим тему — поиграем во что-нибудь!»

              '
            uk: «Давай змінимо тему — поігримо в щось!»
            en: '"Let''s change the subject — play something!"'
          options:
            - id: opt_1
              text:
                ru: Спасёт отношения
                uk: Спасе стосунки
                en: Will save the relationship
            - id: opt_2
              text:
                ru: Ухудшит ситуацию
                uk: Погіршить ситуацію
                en: Will make it worse
          correct: opt_1
        - id: '90'
          type: speech
          duration_sec: 10
          text:
            ru: 'Спасёт! Переключение — отличный приём. Вы не убегаете, а предлагаете
              вместе заняться чем-то приятным. Через час спор уже забудется.

              '
            uk: Спасе! Перемикання — відличний прийом. Ви не втікаєте, а пропонуєте
              разом займатися чимось приємним. Через годину спір вже забудеться.
            en: Will save it! Switching gears is a great trick. You're not running
              away, you're suggesting something fun together. In an hour, the argument
              will be forgotten.
        - id: '91'
          type: vote
          duration_sec: 10
          text:
            ru: '«Всё, я с тобой больше не разговариваю!»

              '
            uk: «Все, я з тобою більше не розмовляю!»
            en: '"That''s it, I''m not talking to you anymore!"'
