        - id: '108'
          type: vote
          duration_sec: 12
          text:
            ru: '«Земля вращается вокруг Солнца.» — «Да, это факт.»

              '
            uk: «Земля вращается вокруг Солнца.» — «Так, это факт.»
            en: '"The earth revolves around the sun." - “Yes, that’s a fact.”'
          options:
            - id: opt_1
              text:
                ru: Есть подмена
                uk: Есть подмена
                en: There is a substitution
            - id: opt_2
              text:
                ru: Нет подмены
                uk: Ні подмены
