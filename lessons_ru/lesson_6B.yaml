              text:
                ru: Есть подмена
                uk: Есть подмена
                en: There is a substitution
            - id: opt_2
              text:
                ru: Нет подмены
                uk: Ні подмены
                en: No substitution
          correct: opt_1
        - id: '99'
          type: speech
          duration_sec: 8
          text:
            ru: 'Подмена! «Помочь» сначала — сделать вместе. Потом — просто дать совет.
