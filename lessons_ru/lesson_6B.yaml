    - scene_id: sc6
      title:
        ru: Подмена понятий
        uk: Подмена понятий
        en: Substitution of concepts
      media_ref: 6B.sc6.concept_substitution
      status: v3_locked
      steps:
        - id: '84'
          type: speech
          duration_sec: 10
          text:
            ru: 'Новая ловушка! Слушайте истории — в каждой спрятана одна и та же
              хитрость.

              '
            uk: Новая ловушка! Слушайте истории — в каждой спрятана одна и та же хитрость.
            en: New trap! Listen to the stories - each one contains the same trick.
        - id: '85'
          type: speech
          duration_sec: 14
          text:
            ru: 'История первая — «Свобода». В классе спор. Дима: «У нас должна быть
              свобода!» Учитель решил попробовать. Дима тут же начал бегать по классу,
              кричать и кидать бумажки. Учитель сделал замечание. Дима: «Но мы же
              договорились — свобода!» Учитель: «Свобода — это право выбирать, а не
              хаос.» Дима: «Нет, свобода — это когда мне ничего не запрещают!» Слово
              одно — «свобода». А смыслов уже два.

              '
            uk: 'Історія первая — «Свобода». В классе спор. Дима: «У нас должна быть
              свобода!» Учитель решил попробовать. Дима тут же начал бегать по классу,
              кричать и кидать бумажки. Учитель сделал замечание. Дима: «Но мы же
              договорились — свобода!» Учитель: «Свобода — это право выбирать, а не
              хаос.» Дима: «Ні, свобода — это когда мне ничего не запрещают!» Слово
              одно — «свобода». А смыслов уже два.'
            en: 'The first story is “Freedom”. There is an argument in class. Dima:
              “We must have freedom!” The teacher decided to try. Dima immediately
              began running around the class, shouting and throwing papers. The teacher
              made a remark. Dima: “But we agreed - freedom!” Teacher: “Freedom is
              the right to choose, not chaos.” Dima: “No, freedom is when nothing
              is forbidden to me!” One word - “freedom”. And there are already two
              meanings.'
        - id: '86'
          type: speech
          duration_sec: 14
          text:
            ru: 'История вторая — «Друг». Саша: «Настоящий друг всегда делится.» Ира
              не дала списать. Саша: «Ты не настоящий друг!» Ира: «Я слушаю тебя,
              помогаю, поддерживаю.» Саша: «Нет, друг — это тот, кто делится.» Сначала
              «друг» — поддержка, доверие. А потом — только «даёт списать». Правило
              изменилось на ходу.

              '
            uk: 'Історія вторая — «Друг». Саша: «Настоящий друг всегда делится.» Ира
              не дала списать. Саша: «Ты не настоящий друг!» Ира: «Я слушаю тебя,
              помогаю, поддерживаю.» Саша: «Ні, друг — это тот, кто делится.» Сначала
              «друг» — поддержка, доверие. А потом — только «даёт списать». Правило
              изменилось на ходу.'
            en: 'The second story is “Friend”. Sasha: “A true friend always shares.”
              Ira didn’t let me write it off. Sasha: “You are not a real friend!”
              Ira: “I listen to you, help, support.” Sasha: “No, a friend is someone
              who shares.” First, “friend” - support, trust. And then - only “let
              me write it off.” The rule changed on the fly.'
        - id: '87'
          type: speech
          duration_sec: 12
          text:
            ru: '«Уважение». Папа: «Ты должен уважать старших.» Сын: «Я уважаю — я
              не кричу и не грублю.» Папа: «Нет, уважать — это слушаться без вопросов.»
              Сначала «уважение» — вежливость. Потом — полное подчинение. А слово
              — одно и то же.

              '
            uk: '«Уважение». Папа: «Ты должен уважать старших.» Сын: «Я уважаю — я
              не кричу и не грублю.» Папа: «Ні, уважать — это слушаться без вопросов.»
              Сначала «уважение» — вежливость. Потом — полное подчинение. А слово
              — одно и то же.'
            en: '"Respect". Dad: “You must respect your elders.” Son: “I respect -
              I don’t shout or be rude.” Dad: “No, respect means obeying without question.”
              First, “respect” is politeness. Then - complete submission. But the
              word is the same.'
        - id: '88'
          type: speech
          duration_sec: 12
          text:
            ru: '«Честность». Мама: «Важно быть честным.» Ребёнок: «Тогда я честно
              скажу: твой суп невкусный.» Мама: «Это грубость!» Ребёнок: «Но ты сказала
