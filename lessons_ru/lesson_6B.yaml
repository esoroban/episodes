          options:
            - id: opt_1
              text:
                ru: Была подмена
                uk: Была подмена
                en: There was a substitution
            - id: opt_2
              text:
                ru: Не было подмены
                uk: Не было подмены
                en: There was no substitution
          correct: opt_1
        - id: '115'
          type: speech
          duration_sec: 9
          text:
            ru: 'Подмена! «Старался» сначала — прикладывал усилия, потом — просто
