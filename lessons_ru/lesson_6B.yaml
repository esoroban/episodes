        - id: '116'
          type: vote
          duration_sec: 12
          text:
            ru: '«Ты опоздал.» — «Нет, я пришёл до начала урока.» — «Мы договаривались
              в семь.» — «Опоздать — это прийти после звонка.»

              '
            uk: «Ты опоздал.» — «Ні, я пришёл до начала урока.» — «Мы договаривались
              в семь.» — «Опоздать — это прийти после звонка.»
            en: "\"You're late.\" - “No, I came before the start of the lesson.” -
