    - scene_id: sc3
      title:
        ru: 'Открытие: ловушки слов'
        uk: 'Відкриття: ловушки слов'
        en: 'Discovery: Word Traps'
      media_ref: 6B.sc3.word_traps_opening
      status: v3_locked
      steps:
        - id: '38'
          type: speech
          duration_sec: 10
          text:
            ru: 'Кто слышал такие фразы: «Все так делают!», «Ты никогда меня не слушаешь!»,
              «Это всегда так бывает!» Звучит знакомо?

              '
            uk: 'Кто слышал такие фразы: «Все так делают!», «Ты никогда меня не слушаешь!»,
              «Это всегда так бывает!» Звучит знакомо?'
            en: 'Who has heard such phrases: “Everyone does this!”, “You never listen
              to me!”, “It always happens like this!” Sound familiar?'
        - id: '39'
          type: pause
          duration_sec: 5
          text:
            ru: 'Подумайте — это правда, что ВСЕ так делают? Или НИКОГДА не слушаешь?
              Или ВСЕГДА так бывает?

              '
            uk: Подумайте — это правда, что ВСЕ так делают? Или НИКОГДА не слушаешь?
              Или ВСЕГДА так бывает?
            en: Think about it - is it true that EVERYONE does this? Or do you NEVER
              listen? Or does this ALWAYS happen?
        - id: '40'
          type: speech
          duration_sec: 14
          text:
            ru: 'Обычно — нет! Когда кто-то говорит «все», «никто», «всегда», «никогда»
              — это почти всегда преувеличение. И это красный флаг. Как сигнал светофора:
              стой, проверь, не торопись соглашаться. «Все считают», «все говорят»,
              «все знают» — стоп! Кто эти «все»? Назови хотя бы троих.

              '
            uk: 'Обычно — нет! Когда кто-то говорит «все», «никто», «всегда», «никогда»
              — это почти всегда преувеличение. И это красный флаг. Как сигнал светофора:
              стой, проверь, не торопись соглашаться. «Все считают», «все говорят»,
              «все знают» — стоп! Кто эти «все»? Назови хотя бы троих.'
            en: 'Usually - no! When someone says “everyone,” “nobody,” “always,” “never,”
              it’s almost always an exaggeration. And this is a red flag. Like a traffic
              light: stop, check, don’t rush to agree. “Everyone believes”, “everyone
              talks”, “everyone knows” - stop! Who is this “everyone”? Name at least
              three.'
        - id: '41'
          type: speech
          duration_sec: 18
          text:
            ru: 'Расскажу историю. Один мальчик, Артём, пришёл к маме и сказал: «Мам,
              ВСЕ в классе уже имеют новый телефон! Я один такой!» Мама спросила:
              «Все — это кто?» Артём подумал: «Ну... Влад. И Настя. И... ну, может
              ещё кто-то.» Мама говорит: «То есть два человека из тридцати — это "все"?»
              Артём покраснел. Два — это не все. Два — это два.

              '
            uk: 'Расскажу историю. Один мальчик, Артём, пришёл к маме и сказал: «Мам,
              ВСЕ в классе уже имеют новый телефон! Я один такой!» Мама спросила:
              «Все — это кто?» Артём подумал: «Ну... Влад. И Настя. И... ну, может
              ещё кто-то.» Мама говорит: «То есть два людину из тридцати — это "все"?»
              Артём покраснел. Два — это не все. Два — это два.'
            en: 'I''ll tell you a story. One boy, Artyom, came to his mother and said:
              “Mom, EVERYONE in the class already has a new phone! I’m the only one!”
              Mom asked: “Who is everyone?” Artyom thought: “Well... Vlad. And Nastya.
              And... well, maybe someone else.” Mom says: “So two out of thirty people
              is “all”?” Artyom blushed. Two is not everything. Two is two.'
        - id: '42'
          type: speech
          duration_sec: 14
          text:
            ru: 'А потом на следующий день Настя сказала: «НИКТО не хочет играть в
              бадминтон!» Артём уже знал фокус. Он спросил: «Никто — это кто именно?»
              Настя задумалась: «Ну... Влад не хочет. И Даша.» А Артём сказал: «А
              я хочу! И Миша хочет!» Вот тебе и «никто».

              '
            uk: 'А потом на следующий день Настя сказала: «НИКТО не хочет играть в
              бадминтон!» Артём уже знал фокус. Он спросил: «Никто — это кто именно?»
              Настя задумалась: «Ну... Влад не хочет. И Такша.» А Артём сказал: «А
              я хочу! И Миша хочет!» Вот тебе и «никто».'
            en: 'And then the next day Nastya said: “NO ONE wants to play badminton!”
              Artyom already knew the trick. He asked: “Nobody—who exactly is this?”
              Nastya thought: “Well... Vlad doesn’t want to. And Dasha." And Artyom
              said: “I want to!” And Misha wants it!” So much for “nobody.”'
        - id: '43'
          type: speech
          duration_sec: 10
          text:
            ru: 'Артём понял главное: когда слышишь «все» или «никто» — это красный
              флаг. Спроси: «Кто именно?» И почти всегда окажется, что «все» — это
              два-три человека, а «никто» — это просто те, кого спросили.

              '
            uk: 'Артём понял главное: когда слышишь «все» или «никто» — это красный
              флаг. Спроси: «Кто именно?» И почти всегда окажется, что «все» — это
              два-три людину, а «никто» — это просто те, кого спросили.'
            en: 'Artyom understood the main thing: when you hear “everyone” or “nobody”
              - this is a red flag. Ask: “Who exactly?” And it will almost always
              turn out that “everyone” is two or three people, and “no one” is just
              those who were asked.'
        - id: '44'
          type: speech
          duration_sec: 8
          text:
            ru: 'Четыре опасных слова — запомните: «ВСЕ», «НИКТО», «ВСЕГДА», «НИКОГДА».
              Как только слышите одно из них — включайте красный флаг!

              '
            uk: 'Четыре опасных слова — запомните: «ВСЕ», «НИКТО», «ВСЕГДА», «НИКОГДА».
              Как только слышите одно из них — включайте красный флаг!'
            en: 'Four dangerous words - remember: “EVERYONE”, “NO ONE”, “ALWAYS”,
              “NEVER”. As soon as you hear one of them, turn on the red flag!'
        - id: '45'
          type: speech
          duration_sec: 10
          text:
            ru: 'А теперь — классические примеры. Такие фразы вы точно слышали — от
              друзей, родителей, из рекламы. Звучат убедительно, а внутри — ловушка.

              '
            uk: А теперь — классические примеры. Такие фразы вы точно слышали — от
              друзей, родителей, из рекламы. Звучат убедительно, а внутри — ловушка.
            en: And now - classic examples. You've definitely heard such phrases -
              from friends, parents, from advertising. They sound convincing, but
              inside there is a trap.
        - id: '46'
          type: speech
          duration_sec: 12
          text:
            ru: '«Никто не откажется поехать на море!» Правда? А те, кто любит горы?
              Кто-то мечтает о походе с палаткой, а не о пляже. Кто-то вообще не умеет
              плавать и море для него — стресс. Так что не «никто», а «многим нравится».

              '
            uk: «Никто не откажется поехать на море!» Правда? А те, кто любит горы?
              Кто-то мечтает о походе с палаткой, а не о пляже. Кто-то вообще не умеет
              плавать и море для него — стресс. Так что не «никто», а «многим нравится».
            en: “No one will refuse to go to the sea!” Is it true? And those who love
              mountains? Some people dream of camping with a tent, not the beach.
              Some people don’t know how to swim at all and the sea is stressful for
              them. So it’s not “nobody”, but “many people like it.”
        - id: '47'
          type: speech
          duration_sec: 12
          text:
            ru: '«Никто зимой в отпуск не ходит!» Расскажите это горнолыжникам! Для
              них зима — лучшее время. Снег, горы, скорость. Они весь год ждут именно
              зимний отпуск. «Никто» — красный флаг.

              '
            uk: «Никто зимой в отпуск не ходит!» Расскажите это горнолыжникам! Для
              них зима — кращее время. Снег, горы, скорость. Они весь год ждут именно
              зимний отпуск. «Никто» — красный флаг.
            en: “Nobody goes on vacation in winter!” Tell that to the skiers! For
              them, winter is the best time. Snow, mountains, speed. They wait all
              year for winter vacation. “Nobody” is a red flag.
        - id: '48'
          type: speech
          duration_sec: 12
          text:
            ru: '«В интернете всегда врут!» Хм. А Википедия? А прогноз погоды? А расписание
              поездов? Не всегда. Правильнее: «В интернете иногда встречается неправда»
              — но это уже не так страшно звучит.

              '
            uk: '«В интернете всегда врут!» Хм. А Википедия? А прогноз погоды? А расписание
              поездов? Не всегда. Правильнее: «В интернете иногда встречается неправда»
              — но это уже не так страшно звучит.'
            en: '“They always lie on the Internet!” Hm. What about Wikipedia? What
              about the weather forecast? What about the train schedule? Not always.
              It would be more correct: “Sometimes there are lies on the Internet”
              - but this doesn’t sound so scary anymore.'
        - id: '49'
          type: speech
          duration_sec: 12
          text:
            ru: '«Раньше всё было лучше!» Что — всё? Медицина? Раньше зубы лечили
              без обезболивания. Транспорт? Раньше до бабушки в селе ехали три дня
              на лошади. «Всё» — это слишком. Что-то было лучше, что-то хуже.

              '
            uk: «Раньше всё было краще!» Что — всё? Медицина? Раньше зубы лечили без
              обезболивания. Транспорт? Раньше до бабушки в селе ехали три дня на
              лошади. «Всё» — это слишком. Что-то было краще, что-то хуже.
            en: “Everything was better before!” What is that all? Medicine? Previously,
              teeth were treated without pain relief. Transport? Previously, it took
              three days to get to my grandmother in the village on horseback. “Everything”
              is too much. Some were better, some were worse.
        - id: '50'
          type: speech
          duration_sec: 12
          text:
            ru: '«Никому нельзя доверять!» Вообще никому? Маме? Лучшему другу? Врачу?
              Если бы это было правдой, мы бы жили каждый в своей пещере и не разговаривали.
              Правильнее: «Не всем стоит доверять сразу».

              '
            uk: '«Никому нельзя доверять!» Вообще никому? Маме? Лучшему другу? Врачу?
              Если бы это было правдой, мы бы жили каждый в своей пещере и не разговаривали.
              Правильнее: «Не всем стоит доверять сразу».'
            en: '"You can''t trust anyone!" No one at all? Mom? Best friend? To the
              doctor? If this were true, we would each live in our own cave and not
              talk. More correctly: “Not everyone should be trusted right away.”'
        - id: '51'
          type: speech
          duration_sec: 10
          text:
            ru: 'Заметили? Приём один и тот же. Слышишь «все / никто / всегда / никогда»
              — задай вопрос: «Правда все? Назови примеры.» Или «Правда никогда? А
              вот это?» Одного исключения достаточно, чтобы обобщение рассыпалось.

              '
            uk: 'Заметили? Приём один и тот же. Слышишь «все / никто / всегда / никогда»
              — задай вопрос: «Правда все? Назови примеры.» Или «Правда никогда? А
              вот это?» Одного исключения достаточно, чтобы обобщение рассыпалось.'
            en: 'Did you notice? The reception is the same. You hear “everyone / no
              one / always / never” - ask the question: “Is it really all? Give examples."
              Or “Really never? What about this?” One exception is enough for the
              generalization to fall apart.'
        - id: '52'
          type: speech
          duration_sec: 8
          text:
            ru: 'И главное — что делать, когда ВАМ так говорят. Не кричать «Ты врёшь!»
              А спокойно спросить: «Все — это кто?» или «Всегда — а когда последний
              раз?» Просто вопрос — и ловушка разрушена.

              '
            uk: 'И главное — что делать, когда ВАМ так говорят. Не кричать «Ты врёшь!»
              А спокойно спросить: «Все — это кто?» или «Всегда — а когда последний
              раз?» Просто вопрос — и ловушка разрушена.'
            en: 'And the main thing is what to do when they tell YOU this. Don''t
              shout "You''re lying!" And calmly ask: “Who is everyone?” or “Always
              - and when was the last time?” Just a question and the trap is broken.'
    - scene_id: sc4
      title:
        ru: ИСТОРИЯ — НИКТО НЕ ЛЮБИТ БРОККОЛИ?
        uk: ИСТОРИЯ — НИКТО НЕ ЛЮБИТ БРОККОЛИ?
        en: STORY - NOBODY LOVES BROCCOLI?
      media_ref: 6B.sc4.story_broccoli
      status: v3_locked
      steps:
        - id: '53'
          type: speech
          duration_sec: 6
          text:
            ru: 'А теперь послушайте интересную историю о ловушках слов. Считайте:
              сколько раз герои попадут в ловушку?'
            uk: 'А теперь послушайте интересную историю о ловушках слов. Считайте:
              сколько раз герои попадут в ловушку?'
            en: 'Now listen to an interesting story about word traps. Consider: how
              many times will the heroes fall into a trap?'
        - id: '54'
          type: speech
          duration_sec: 14
          text:
            ru: 'Дмитрик заявляет на весь класс: «Никто не любит брокколи! Это самая
              противная еда на свете!» Все кивают. Но тут Маша поднимает руку.'
            uk: 'Дмитрик заявляет на весь класс: «Никто не любит брокколи! Это самая
              противная еда на свете!» Все кивают. Но тут Маша поднимает руку.'
            en: 'Dmitry declares to the whole class: “Nobody likes broccoli! This
              is the most disgusting food in the world! Everyone nods. But then Masha
              raises her hand.'
        - id: '55'
          type: speech
          duration_sec: 14
          text:
            ru: '«Я люблю брокколи,» — говорит Маша. Оленка добавляет: «И я тоже!»
              Дмитрик моргает: «Ну… почти никто не любит.» Потом: «Ну ладно… большинство
              не любит!»'
            uk: '«Я люблю брокколи,» — говорит Маша. Оленка добавляет: «И я тоже!»
              Дмитрик моргает: «Ну… почти никто не любит.» Потом: «Ну ладно… большинство
              не любит!»'
            en: '“I love broccoli,” says Masha. Olenka adds: “Me too!” Dmitry blinks:
              “Well... almost no one likes.” Then: “Okay... most people don’t like
              it!”'
        - id: '56'
          type: speech
          duration_sec: 14
          text:
            ru: 'Микола смеётся: «Дмитрик, ты только что трижды поменял слова! Сначала
              «никто», потом «почти никто», потом «большинство». Это совсем разные
              вещи!»'
            uk: 'Микола смеётся: «Дмитрик, ты только что трижды поменял слова! Сначала
              «никто», потом «почти никто», потом «большинство». Это совсем разные
              вещи!»'
            en: 'Mikola laughs: “Dmitrik, you just changed the words three times!
              First “no one”, then “almost no one”, then “most”. These are completely
              different things!”'
        - id: '57'
          type: speech
          duration_sec: 10
          text:
            ru: 'А Витя спрашивает: «Подождите — а что такое брокколи?» Все смеются.
              Одно слово — а каждый понимает по-своему!'
            uk: 'А Витя спрашивает: «Подождите — а что такое брокколи?» Все смеются.
              Одно слово — а каждый понимает по-своему!'
