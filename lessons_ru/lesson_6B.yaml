          text:
            ru: '«Ты обещал мне помочь!» — «Я помог — я сказал тебе, что делать.»
              — «Нет, помочь — значит сделать вместе!»

              '
            uk: «Ты обещал мне помочь!» — «Я помог — я сказал тебе, что делать.» —
              «Ні, помочь — значит сделать вместе!»
            en: “You promised to help me!” - “I helped - I told you what to do.” -
              “No, helping means doing it together!”
          options:
