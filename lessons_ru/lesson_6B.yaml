        - id: '102'
          type: vote
          duration_sec: 12
          text:
            ru: '«Сколько будет дважды два?» — «Четыре.»

              '
            uk: «Сколько будет дважды два?» — «Четыре.»
            en: “What is two and two?” - "Four."
          options:
