    - scene_id: sc10
      title:
        ru: Закрытие урока
        uk: Закриття урока
        en: Closing the lesson
      media_ref: 6B.sc10.closing
      status: v3_locked
      steps:
        - id: '178'
          type: speech
          duration_sec: 12
          text:
            ru: 'Сегодня вы научились трём вещам. Первая: слова «все», «никто», «всегда»,
              «никогда» — красные флаги. Почти всегда это преувеличение.

              '
            uk: 'Сегодня вы научились трём вещам. Первая: слова «все», «никто», «всегда»,
              «никогда» — красные флаги. Почти всегда это преувеличение.'
            en: 'Today you learned three things. First: the words “everyone”, “nobody”,
              “always”, “never” are red flags. This is almost always an exaggeration.'
        - id: '179'
          type: speech
          duration_sec: 10
          text:
            ru: 'Вторая: одно слово может означать разное для разных людей. Это подмена
              понятий — нарушение закона тождества. Защита: «Что именно ты имеешь
              в виду?»

              '
            uk: 'Вторая: одно слово может означать разное для разных людей. Это подмена
              понятий — нарушение закона тождества. Защита: «Что именно ты имеешь
              в виду?»'
            en: 'Second: one word can mean different things to different people. This
              is a substitution of concepts - a violation of the law of identity.
              Defense: “What exactly do you mean?”'
        - id: '180'
          type: speech
          duration_sec: 12
          text:
            ru: 'Третья — и самая важная: вы не просто узнали ловушки. Вы потренировались
              отвечать на них. Спокойно. Точно. С вопросом, а не с криком.

              '
            uk: 'Третья — и самая важная: вы не просто узнали ловушки. Вы потренировались
              отвечать на них. Спокойно. Точно. С вопросом, а не с криком.'
            en: 'Third and most important: you didn''t just recognize the traps. You
              have practiced answering them. Calmly. Exactly. With a question, not
              a shout.'
        - id: '181'
          type: speech
          duration_sec: 14
          text:
            ru: 'Знаете, что отличает человека, которого трудно обмануть? Не злость.
              Не громкий голос. А привычка переспрашивать. «Когда именно?» «Кто конкретно?»
              «Что ты имеешь в виду?» Три вопроса — и большинство ловушек разваливаются
              сами.

              '
            uk: Знаете, что отличает людину, которого трудно обмануть? Не злость.
              Не громкий голос. А привычка переспрашивать. «Когда именно?» «Кто конкретно?»
              «Что ты имеешь в виду?» Три вопроса — и большинство ловушек разваливаются
              сами.
            en: Do you know what distinguishes a person who is difficult to deceive?
              Not anger. Not a loud voice. And the habit of asking again. “When exactly?”
              “Who exactly?” "What do you mean?" Three questions and most traps fall
              apart on their own.
        - id: '182'
          type: speech
          duration_sec: 10
          text:
            ru: 'Попробуйте сегодня. Когда кто-то скажет «все так делают» или «ты
              всегда опаздываешь» — не спорьте. Просто спросите: «Когда именно?» Посмотрите,
              что будет.

              '
            uk: 'Попробуйте сегодня. Когда кто-то скажет «все так делают» или «ты
              всегда опаздываешь» — не спорьте. Просто спросите: «Когда именно?» Посмотрите,
              что будет.'
            en: 'Try it today. When someone says “everyone does it this way” or “you’re
              always late”, don’t argue. Just ask: “When exactly?” See what happens.'
        - id: '183'
          type: speech
          duration_sec: 8
          text:
            ru: 'Дома вас ждёт приложение — там можно потренировать контр-ходы ещё
              раз. А мы увидимся на следующем занятии. До встречи!

              '
            uk: Дома вас ждёт приложение — там можно потренировать контр-ходы ещё
              раз. А мы увидимся на следующем занятии. До встречи!
            en: There is an application waiting for you at home - there you can practice
              counter-moves again. And we'll see you at the next lesson. See you!
