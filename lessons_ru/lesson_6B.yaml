              разные вещи. А слово одно.

              '
            uk: '«Честность». Мама: «Важно быть честным.» Ребёнок: «Тогда я честно
              скажу: твой суп невкусный.» Мама: «Это грубость!» Ребёнок: «Но ты сказала
              быть честным!» Честность как искренность — и честность с тактом — это
              разные вещи. А слово одно.'
            en: '"Honesty". Mom: “It’s important to be honest.” Child: “Then I’ll
              honestly say: your soup is tasteless.” Mom: “That’s rude!” Child: “But
              you said to be honest!” Honesty as sincerity and honesty with tact are
              two different things. And one word.'
        - id: '89'
          type: speech
          duration_sec: 16
          text:
            ru: '«Успешный». Блогер: «Успешные люди встают в пять утра.» Петя: «Мой
              папа встаёт в восемь и успешный.» Блогер: «Значит, он не настоящий успешный.»
              Петя: «А что значит успешный?» Блогер: «Тот, кто много зарабатывает.»
              Петя: «А раньше ты говорил — тот, кто рано встаёт.» Сначала «успешный»
              — режим дня. Потом — деньги. Определение прыгает как ему удобно.

              '
            uk: '«Успешный». Блогер: «Успешные люди встают в пять утра.» Петя: «Мой
              папа встаёт в восемь и успешный.» Блогер: «Значит, он не настоящий успешный.»
              Петя: «А что значит успешный?» Блогер: «Тот, кто много зарабатывает.»
              Петя: «А раньше ты говорил — тот, кто рано встаёт.» Сначала «успешный»
              — режим дня. Потом — деньги. Определение прыгает как ему удобно.'
            en: '"Successful". Blogger: “Successful people get up at five in the morning.”
              Petya: “My dad gets up at eight and is successful.” Blogger: “So he’s
              not really successful.” Petya: “What does successful mean?” Blogger:
              “The one who earns a lot.” Petya: “And earlier you said - the one who
              gets up early.” First, “successful” is the daily routine. Then - money.
              Definition jumps as it suits him.'
        - id: '90'
          type: speech
          duration_sec: 12
          text:
            ru: '«Ответственный». Учитель: «Ответственный ученик делает уроки вовремя.»
              Ваня сделал, но забыл тетрадь дома. Учитель: «Ты безответственный.»
              Ваня: «Я же сделал!» Учитель: «Ответственный — это тот, кто приносит
              всё.» Слово стало шире, чем в начале.

              '
            uk: '«Ответственный». Учитель: «Ответственный ученик делает уроки вовремя.»
              Ваня сделал, но забыл тетрадь дома. Учитель: «Ты безответственный.»
              Ваня: «Я же сделал!» Учитель: «Ответственный — это тот, кто приносит
              всё.» Слово стало шире, чем в начале.'
            en: '"Responsible". Teacher: “A responsible student does his homework
              on time.” Vanya did it, but forgot the notebook at home. Teacher: “You
              are irresponsible.” Vanya: “I did it!” Teacher: “The responsible one
              is the one who brings everything.” The word has become wider than at
              the beginning.'
        - id: '91'
          type: speech
          duration_sec: 14
          text:
            ru: '«Справедливость». Учитель делит конфеты поровну. Один ученик: «Это
              несправедливо! Я старался больше!» Учитель: «Справедливо — это поровну.»
              Ученик: «Нет, справедливо — это по заслугам.» Одно слово — два разных
              принципа. И оба уверены, что правы.

              '
            uk: '«Справедливость». Учитель делит конфеты поровну. Один ученик: «Это
              несправедливо! Я старался больше!» Учитель: «Справедливо — это поровну.»
              Ученик: «Ні, справедливо — это по заслугам.» Одно слово — два разных
              принципа. И оба уверены, что правы.'
            en: '"Justice". The teacher divides the candies equally. One student:
              “This is unfair! I tried harder!” Teacher: “Fair is equal.” Student:
              “No, it’s fair - it’s just what it deserves.” One word - two different
              principles. And both are sure that they are right.'
        - id: '92'
          type: speech
          duration_sec: 14
          text:
            ru: 'А теперь — классика! «Шёл дождь и два студента. Один — в университет,
              другой — в калошах.» Чувствуете подвох? Слово «шёл» используется в трёх
              смыслах: дождь шёл — падал. Студент шёл — направлялся куда-то. А второй
              шёл — был одет. Три значения в одном предложении!

              '
            uk: 'А теперь — классика! «Шёл дощ и два студента. Один — в университет,
              другой — в калошах.» Чувствуете подвох? Слово «шёл» используется в трёх
              смыслах: дощ шёл — падал. Студент шёл — направлялся куда-то. А второй
              шёл — был одет. Три значения в одном предложении!'
            en: 'And now - a classic! “It was raining and there were two students.
              One is going to university, the other is wearing galoshes.” Do you sense
              a catch? The word “was falling” is used in three senses: it was raining
              - it was falling. The student was walking - heading somewhere. And the
              second one was walking - he was dressed. Three meanings in one sentence!'
        - id: '93'
          type: speech
          duration_sec: 12
          text:
            ru: 'Или вот: «Студенты, имеющие хвосты и не сдавшие языки, будут повешены
              на втором этаже.» Хвосты — академические долги или... хвосты? Языки
              — экзамены или... языки? А «повешены» — списки повешены на стену. Три
              слова — и каждое можно понять двояко!

              '
            uk: 'Или вот: «Студенты, имеющие хвосты и не сдавшие языки, будут повешены
              на втором этаже.» Хвосты — академические долги или... хвосты? Языки
              — экзамены или... языки? А «повешены» — списки повешены на стену. Три
              слова — и каждое можно понять двояко!'
            en: 'Or this: “Students who have tails and have not passed their languages
              ​​will be hanged on the second floor.” Tails - academic debts or...
              tails? Languages ​​- exams or... languages? And “hung” - the lists are
              hung on the wall. Three words - and each can be understood in two ways!'
        - id: '94'
          type: speech
          duration_sec: 10
          text:
            ru: 'Или объявление: «Продаю коляску для новорождённого синего цвета.»
              Кто синий — коляска или новорождённый? Одна запятая — и смысл полностью
              меняется.

              '
            uk: 'Или объявление: «Продаю коляску для новорождённого синего цвета.»
              Кто синий — коляска или новорождённый? Одна запятая — и смысл полностью
              меняется.'
            en: 'Or an ad: “I am selling a blue stroller for a newborn.” Who is blue
              - the stroller or the newborn? One comma and the meaning changes completely.'
        - id: '95'
          type: speech
          duration_sec: 10
          text:
            ru: 'Все эти примеры — об одном. Слово не меняется, а его значение тихо
              переключается. Это называется подмена понятий. В логике есть специальное
              правило — закон тождества: одно слово должно сохранять один смысл на
              протяжении всего разговора. Нарушил — и разговор рассыпался.

              '
            uk: 'Все эти примеры — об одном. Слово не меняется, а его значение тихо
              переключается. Это называется подмена понятий. В логике есть специальное
              правило — закон тождества: одно слово должно сохранять один смысл на
              протяжении всего разговора. Нарушил — и разговор рассыпался.'
            en: 'All these examples are about one thing. The word does not change,
              but its meaning quietly switches. This is called substitution of concepts.
              There is a special rule in logic - the law of identity: one word must
              retain the same meaning throughout the entire conversation. Violated
              - and the conversation fell apart.'
        - id: '96'
          type: speech
          duration_sec: 8
          text:
            ru: 'А защита — волшебный вопрос: «Что именно ты имеешь в виду под...?»
              Спросили — и ловушка исчезает. Потому что теперь все говорят об одном
              и том же.

              '
            uk: 'А захист — волшебный вопрос: «Что именно ты имеешь в виду под...?»
              Спросили — и ловушка исчезает. Потому что теперь все говорят об одном
              и том же.'
            en: 'And defense is the magic question: “What exactly do you mean by...?”
              They asked, and the trap disappeared. Because now everyone is talking
              about the same thing.'
    - scene_id: sc7
      title:
        ru: 'Практика: подмена понятий'
