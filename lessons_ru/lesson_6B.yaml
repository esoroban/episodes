            en: 'Substitution! “Help” first - do it together. Then just give advice.
              One word, but different expectations. It was necessary to immediately
              clarify: “Help - how exactly?”'
        - id: '100'
          type: vote
          duration_sec: 14
          text:
            ru: '«Мы договорились встретиться утром.» — «Я пришёл утром — в одиннадцать!»
