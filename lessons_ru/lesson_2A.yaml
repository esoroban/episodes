          '
        uk: Помітили фокус? Закономірності — камінь падає, вода кипить, сонце встає — працюють БЕЗ нас. А збіги — футболка,
          шкарпетки, парта, зірка — це МИ придумали зв'язок. Мозок любить знаходити зв'язки, навіть там, де їх нема!
        en: Notice the trick? Patterns — stone falls, water boils, sun rises — work WITHOUT us. But coincidences — shirt,
          socks, desk, star — WE made up the connection. The brain loves finding connections, even where they don't exist!
    - id: '76'
      type: speech
      duration_sec: 10
      text:
        ru: 'Четвёртый вопрос детектива правды: «А это повторяется?» Если да — надёжно. Если один раз — может быть просто
