  - scene_id: sc6
    title:
      ru: Зачем нам всё это?
      uk: Навіщо нам все це?
      en: Why Do We Need This?
    media_ref: 2A.sc6.closing
    status: v3_locked
    steps:
    - id: '123'
      type: speech
      duration_sec: 15
      text:
        ru: 'Давайте остановимся и подумаем: а зачем нам всё это? Закономерности, совпадения, светофор... Это же не школьный
          предмет. Это — суперсила. Сейчас объясню.

          '
        uk: 'Давайте зупинимось і подумаємо: а навіщо нам все це? Закономірності, збіги, світлофор... Це ж не шкільний предмет.
          Це — суперсила. Зараз поясню.'
        en: 'Let''s stop and think: why do we need this? Patterns, coincidences, traffic light... This isn''t a school subject.
          It''s a superpower. Let me explain.'
    - id: '124'
      type: speech
      duration_sec: 20
      text:
        ru: 'Представьте: друг говорит — «Каждый раз, когда я надеваю свой браслет, я пишу контрольную на отличную оценку!»
          Раньше вы бы подумали: «Ого, классный браслет!» А теперь? Теперь вы — детектив. Сколько раз? Два? Красный свет!
          А может, он просто готовился к этим контрольным? Браслет не решает задачи. Мозг решает.

          '
        uk: 'Представ: друг каже — «Щоразу, коли я надягаю свій браслет, я пишу контрольну на відмінну оцінку!» Раніше ви
          б подумали: «Ого, класний браслет!» А тепер? Тепер ви — детектив. Скільки разів? Два? Червоне світло! А може, він
          просто готувався до цих контрольних? Браслет не розв''язує завдання. Мозок розв''язує.'
        en: 'Imagine: a friend says — "Every time I wear my lucky bracelet, I get excellent grades!" You''d think: "Wow, cool
          bracelet!" But now? Now you''re a detective. How many times? Twice? Red light! Maybe he just studied for those tests?
          The bracelet doesn''t solve problems. The brain does.'
    - id: '125'
      type: speech
      duration_sec: 20
      text:
        ru: 'Или вот: старший брат говорит — «Я всегда выигрываю, когда играю дома!» Звучит убедительно. Но вы спрашиваете:
          сколько раз играл дома? А сколько раз проиграл — не забыл посчитать? Может, он просто запомнил победы и забыл поражения?
          Мозг обожает так делать — запоминать совпадения и забывать всё остальное.

          '
        uk: 'Або ось: старший брат каже — «Я завжди виграю, коли граю вдома!» Звучить переконливо. Але ви питаєте: скільки
          разів грав вдома? А скільки разів програв — не забув порахувати? Може, він просто запам''ятав перемоги і забув поразки?
          Мозок обожає так робити — запам''ятовувати збіги і забувати все решту.'
        en: 'Or this: your older brother says — "I always win when I play at home!" Sounds convincing. But you ask: how many
          times did you win at home? How many times did you lose — did you count that? Maybe you just remember the wins and
          forgot the losses? The brain loves to do that — remember coincidences, forget everything else.'
    - id: '126'
      type: speech
      duration_sec: 18
      text:
        ru: 'А вот ситуация посерьёзнее. Кто-то говорит: «Я выпил эту таблетку — и мне стало лучше!» Один раз. Это зелёный
          свет? Нет! Красный. Может, организм сам справился. Может, помог сон. Врачи проверяют лекарства на тысячах людей
          — потому что один раз не считается. Даже в медицине работает наш светофор!

          '
        uk: 'А ось ситуація посерйознішा. Хтось каже: «Я випив цю таблетку — і мені стало краще!» Один раз. Це зелене світло?
          Ні! Червоне. Може, організм сам впорався. Може, допомогав сон. Лікарі перевіряють ліки на тисячах людей — тому що
          один раз не рахується. Навіть в медицині працює наш світлофор!'
        en: 'Here''s a more serious situation. Someone says: "I took this pill — and I felt better!" Once. Is that green light?
          No! Red. Maybe the body handled it. Maybe sleep helped. Doctors test medicine on thousands of people — because once
          doesn''t count. Even in medicine, our traffic light works!'
    - id: '127'
      type: speech
      duration_sec: 18
      text:
        ru: 'Или вот что бывает в школе. Кто-то говорит: «Я два раза сел на последнюю парту — и оба раза вызвали к доске!
          Последняя парта проклята!» А вы теперь знаете: два раза — это жёлтый свет. Проверяй дальше. И кстати — может, учитель
          просто видит, кто отвлекается? Парта тут ни при чём. Парта вообще ни в чём не виновата.

          '
        uk: 'Або ось що буває в школі. Хтось каже: «Я два рази сів на останню парту — і обидва рази викликали до дошки! Остання
          парта проклята!» А ви тепер знаєте: два рази — це жовте світло. Проверяй далі. І кстаті — може, учитель просто бачить,
          хто відвлякається? Парта тут ні при чому. Парта вообще ні в чому не винна.'
        en: 'Or here''s what happens in school. Someone says: "I sat at the back desk twice — and both times I was called
          on! The back desk is cursed!" But you know now: twice is yellow light. Keep testing. And by the way — maybe the
          teacher just sees who''s distracted? The desk has nothing to do with it. Desks aren''t guilty of anything.'
    - id: '128'
      type: speech
      duration_sec: 15
      text:
        ru: 'Видите, что происходит? Вы больше не ведётесь на «один раз сработало — значит, всегда работает». Вы задаёте вопросы.
          Вы проверяете. Вы — детективы, которых не обмануть совпадением.

          '
        uk: Бачите, що происходит? Ви більше не ведетеся на «один раз спрацював — значить, завжди працює». Ви задаєте питання.
          Ви перевіряєте. Ви — детективи, яких не обдурити збігом.
        en: See what's happening? You're not fooled by "worked once — so it always works." You ask questions. You test. You're
          detectives who can't be tricked by coincidence.
    - id: '129'
      type: speech
      duration_sec: 15
      text:
        ru: 'А теперь соберём всё вместе. На прошлом уроке мы научились ПРОВЕРЯТЬ — инструментами, которые дают числа. Сегодня
          мы узнали: одной проверки мало. Нужна ПОВТОРЯЕМОСТЬ.

          '
        uk: 'А тепер соберемо все разом. На минулому уроці ми навчилися ПЕРЕВІРЯТИ — приладами, які дають числа. Сьогодні
          ми дізналися: однієї перевірки мало. Потрібна ПОВТОРЮВАНІСТЬ.'
        en: 'Now let''s put it all together. Last lesson we learned to CHECK — with tools that give numbers. Today we learned:
          one test isn''t enough. We need REPEATABILITY.'
    - id: '130'
      type: speech
      duration_sec: 12
      text:
        ru: 'Закономерность — это когда результат один и тот же каждый раз. Лёд тает, мяч падает, сахар растворяется. Природе
          всё равно, кто смотрит — она работает всегда.

          '
        uk: Закономірність — це коли результат один і той же кожен раз. Лід танцить, м'яч падає, цукор розчиняється. Природі
          все одно, хто дивиться — вона працює завжди.
        en: A pattern is when the result is the same every time. Ice melts, balls fall, sugar dissolves. Nature doesn't care
          who's watching — it works always.
    - id: '131'
      type: speech
      duration_sec: 12
      text:
        ru: 'Совпадение — это когда мозг придумал связь, которой нет. Кепка и победа. Кошка и опоздание. Улыбка и солнце.
          Красиво звучит — но не проходит проверку светофором.

          '
        uk: Збіг — це коли мозок придумав зв'язок, якого немає. Кепка і перемога. Кішка і запізнення. Посмішка і сонце. Гарно
          звучить — але не проходить перевірку світлофором.
        en: A coincidence is when the brain made up a connection that doesn't exist. Cap and victory. Cat and being late.
          Smile and sun. Sounds nice — but doesn't pass the light test.
    - id: '132'
      type: speech
      duration_sec: 10
      text:
        ru: 'Светофор повторений: один раз — красный, стоп. Два-три — жёлтый, проверяй. Пять и больше — зелёный, похоже на
          закономерность.

          '
        uk: 'Світлофор повторень: один раз — червоне, стоп. Два-три — жовте, проверяй. П''ять і більше — зелене, схоже на
          закономірність.'
        en: 'Repeatability light: once — red, stop. Two or three — yellow, keep testing. Five or more — green, looks like
          a pattern.'
    - id: '133'
      type: speech
      duration_sec: 10
      text:
        ru: 'И условия! Проверка честная, только когда условия одинаковые. Бегаешь по стадиону оба раза — честно. Один раз
          по стадиону, другой — в гору — нечестно.

          '
        uk: І умови! Перевірка чесна, тільки коли умови однакові. Бігаєш по стадіону обидва рази — чесно. Один раз по стадіону,
          інший — в гору — нечесно.
        en: And conditions! Testing is fair only when conditions are the same. Run on the track both times — fair. Once on
          track, once uphill — unfair.
    - id: '134'
      type: speech
      duration_sec: 12
      text:
        ru: 'У детектива правды теперь четыре вопроса. Есть инструмент? Нет отговорок? Что показала проверка? И — повторяется
          ли? Четыре вопроса — и никакое хитрое утверждение не пройдёт.

          '
        uk: У детектива правди тепер чотири питання. Є прилад? Немає отговорок? Що показала перевірка? І — повторюється ли?
          Чотири питання — і ніяке хитре твердження не пройде.
        en: The truth detective now has four questions. Is there a tool? Are there no excuses? What did the test show? And
          — does it repeat? Four questions — and no tricky claim will get through.
    - id: '135'
      type: speech
      duration_sec: 15
      text:
        ru: 'И знаете, что самое крутое? Эти вопросы работают не только на уроке. Они работают в жизни — когда друг хвастается,
          когда реклама обещает чудо, когда кто-то говорит «это точно так, я один раз проверил». Теперь у вас есть инструменты,
          чтобы думать самим.

          '
        uk: І знаєте, що найкруче? Ці питання працюють не тільки на уроці. Вони працюють у житті — коли друг хвалиться, коли
          реклама обіцяє чудо, коли хтось каже «це точно так, я один раз перевірив». Тепер у вас є прилади, щоб думати самим.
        en: And you know what's coolest? These questions work not just in class. They work in life — when a friend brags,
          when ads promise miracles, when someone says "it's definitely true, I tested it once." Now you have tools to think
          for yourself.
    - id: '136'
      type: speech
      duration_sec: 6
      text:
        ru: 'Перерыв пять минут!

          '
        uk: Перерва п'ять хвилин!
        en: Five minute break!
