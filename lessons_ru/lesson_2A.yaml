          '
        uk: 'Четверте питання детектива правди: «А це повторюється?» Якщо так — надійно. Якщо один раз — може бути просто
          збіг.'
        en: 'Fourth detective question: "Does it happen again?" If yes — reliable. If just once — could be a coincidence.'
  - scene_id: sc4
