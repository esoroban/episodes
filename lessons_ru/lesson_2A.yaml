lesson:
  id: lesson_2A
  day: 2
  slot: A
  title:
    ru: Как проверять утверждения
    uk: Як перевіряти твердження
    en: How to Check Statements
  scenes:
  - scene_id: sc1
    title:
      ru: ПОВТОРЕНИЕ
      uk: ПОВТОРЕННЯ
      en: REVIEW
    media_ref: 2A.sc1.review
    status: v3_locked
    steps:
    - id: '1'
      type: speech
      duration_sec: 15
      text:
        ru: 'Привет! Сегодня второе занятие. Между прошлым разом и сегодня прошло время — проверим, что осталось в голове.
          Готовы?

          '
        uk: Привіт! Сьогодні друге заняття. Між минулим разом і сьогодні пройшло час — перевіримо, що залишилось у голові.
          Готові?
        en: Hello! Today is our second lesson. Time has passed since last time — let's check what you remember. Ready?
    - id: '2'
      type: speech
      duration_sec: 10
      text:
        ru: 'На прошлом занятии мы выучили три главных слова. Кто помнит хотя бы одно?

          '
        uk: На минулому занятті ми вивчили три головних слова. Хто пам'ятає хоча б одне?
        en: Last lesson we learned three main words. Who remembers at least one?
    - id: '3'
      type: speech
      duration_sec: 20
      text:
        ru: 'Факт, мнение, неправда! Давайте вспомним, чем они отличаются. Факт — утверждение, которое можно проверить, и
          проверка подтвердила: правда. Мнение — проверить нельзя, это личное ощущение. Неправда — проверить можно, но оказалось,
          что это не так.

          '
        uk: 'Факт, думка, неправда! Давайте згадаємо, чим вони відрізняються. Факт — твердження, яке можна перевірити, і перевірка
          підтвердила: правда. Думка — перевірити не можна, це особисте відчуття. Неправда — перевірити можна, але вийшло,
          що це не так.'
        en: Fact, opinion, falsehood! Let's remember what makes them different. A fact is a statement you can check, and the
          check proved it's true. An opinion can't be checked — it's a personal feeling. A falsehood can be checked, but it
          turned out to be false.
    - id: '4'
      type: vote
      duration_sec: 10
      text:
        ru: '«В нашем классе есть окна.»

          '
        uk: «У нашому класі є вікна.»
        en: '"There are windows in our classroom."'
      options:
      - id: opt_1
        text:
          ru: Факт
          uk: Факт
          en: Fact
      - id: opt_2
        text:
          ru: Мнение
          uk: Думка
          en: Opinion
      - id: opt_3
        text:
          ru: Неправда
          uk: Неправда
          en: Falsehood
      correct: opt_1
    - id: '5'
      type: speech
      duration_sec: 6
      text:
        ru: 'Факт! Повернули голову — увидели. Проверено, подтвердилось.

          '
        uk: Факт! Повернули голову — побачили. Перевірено, підтверджено.
        en: Fact! Turn your head — you can see them. Checked and confirmed.
    - id: '6'
      type: vote
      duration_sec: 10
      text:
        ru: '«Каникулы — самое лучшее время.»

          '
        uk: «Канікули — найкращий час.»
        en: '"Vacation is the best time."'
      options:
      - id: opt_1
        text:
          ru: Факт
          uk: Факт
          en: Fact
      - id: opt_2
        text:
          ru: Мнение
          uk: Думка
          en: Opinion
      - id: opt_3
        text:
          ru: Неправда
          uk: Неправда
          en: Falsehood
      correct: opt_2
    - id: '7'
      type: speech
      duration_sec: 8
      text:
        ru: 'Мнение! Кому-то нравятся каникулы, кому-то скучно без друзей. Нет инструмента проверить «лучшее».

          '
        uk: Думка! Комусь подобаються канікули, комусь нудно без друзів. Немає способу перевірити «найкращий».
        en: Opinion! Some people like vacation, others miss their friends. There's no way to test what's "best."
    - id: '8'
      type: vote
      duration_sec: 10
      text:
        ru: '«Кошки умеют летать.»

          '
        uk: «Коти вміють літати.»
        en: '"Cats can fly."'
      options:
      - id: opt_1
        text:
          ru: Факт
          uk: Факт
          en: Fact
      - id: opt_2
        text:
          ru: Мнение
          uk: Думка
          en: Opinion
      - id: opt_3
        text:
          ru: Неправда
          uk: Неправда
          en: Falsehood
      correct: opt_3
    - id: '9'
      type: speech
      duration_sec: 6
      text:
        ru: 'Неправда! Проверить можно — посмотри на любую кошку. Проверили — не летают.

          '
        uk: Неправда! Перевірити можна — подивись на будь-якого кота. Перевірили — не літають.
        en: Falsehood! You can check — look at any cat. We checked — they don't fly.
    - id: '10'
      type: speech
      duration_sec: 20
      text:
        ru: 'Три из трёх! На прошлом уроке мы узнали: КАК именно проверять. Не на глаз, не «мне кажется» — а инструментами,
          которые дают ЧИСЛО. Кто помнит наши пять инструментов?

          '
        uk: 'Три з трьох! На минулому уроці ми дізналися: ЯК саме перевіряти. Не на око, не «мені здається» — а приладами,
          які дають ЧИСЛО. Хто пам''ятає наші п''ять приладів?'
        en: Three out of three! Last lesson we learned HOW to check properly. Not by guessing, not "I think" — but with tools
          that give you NUMBERS. Who remembers our five tools?
    - id: '11'
      type: discussion
      duration_sec: 15
      text:
        ru: 'Называйте! Кто помнит хотя бы два?

          '
        uk: Називайте! Хто пам'ятає хоча б два?
        en: Call them out! Who remembers at least two?
    - id: '12'
      type: speech
      duration_sec: 15
      text:
        ru: 'Весы — проверяют вес. Линейка или рулетка — длину, высоту, расстояние. Часы или секундомер — время и скорость.
          Термометр — температуру. И счёт — просто посчитать: сколько штук.

          '
        uk: 'Ваги — перевіряють вагу. Лінійка або рулетка — довжину, висоту, відстань. Годинник або секундомір — час і швидкість.
          Термометр — температуру. І лічба — просто порахувати: скільки штук.'
        en: Scales check weight. A ruler or measuring tape checks length, height, and distance. A clock or stopwatch checks
          time and speed. A thermometer checks temperature. And counting — just count how many.
    - id: '13'
      type: speech
      duration_sec: 10
      text:
        ru: 'Правило: если для утверждения есть инструмент, который даст число — его можно проверить. Нет инструмента — скорее
          всего, мнение.

          '
        uk: 'Правило: якщо для твердження є прилад, який дасть число — його можна перевірити. Немає приладу — скоріш за все,
          це думка.'
        en: 'The rule: if there''s a tool that gives you a number, you can check it. No tool — then it''s probably an opinion.'
    - id: '14'
      type: speech
      duration_sec: 10
      text:
        ru: 'А ещё мы узнали про хитрые утверждения. Помните историю про Витю и волшебный камень?

          '
        uk: А ще ми дізналися про хитрі твердження. Пам'ятаєте історію про Віту та чарівний камінь?
        en: We also learned about tricky claims. Remember the story about Vitya and the magic stone?
    - id: '15'
      type: discussion
      duration_sec: 15
      text:
        ru: 'Чем хитрое утверждение отличается от обычного? Что Витя делал каждый раз, когда его проверяли?

          '
        uk: Чим хитре твердження відрізняється від звичайного? Що Вітя робив щоразу, коли його перевіряли?
        en: What makes a tricky claim different from a regular one? What did Vitya do every time someone tried to test him?
    - id: '16'
      type: speech
      duration_sec: 15
      text:
        ru: 'На каждую проверку у него была отговорка! «Камень отдыхал», «Желание слишком большое», «Работает только когда
          никто не смотрит». Хитрое утверждение — когда вроде инструмент есть, но человек всегда придумает причину, почему
          сейчас проверить нельзя.

          '
        uk: На кожну перевірку у нього була отговірка! «Камінь відпочивав», «Бажання занадто велике», «Працює тільки коли
          ніхто не дивиться». Хитре твердження — коли ніби прилад є, але людина завжди придумає причину, чому зараз перевірити
          не можна.
        en: He had an excuse for every check! "The stone was resting," "The wish was too big," "It only works when nobody's
          watching." A tricky claim is when there's supposedly a way to check it, but the person always has a reason why you
          can't check it right now.
    - id: '17'
      type: speech
      duration_sec: 15
      text:
        ru: 'И наконец — три вопроса детектива правды. Первый: есть ли инструмент для проверки? Второй: человек согласен проверить
          — или у него отговорки? Третий: проверили — что получилось?

          '
        uk: 'І нарешті — три питання детектива правди. Перше: чи є прилад для перевірки? Друге: людина згідна перевіряти —
          чи у неї отговірки? Третє: перевірили — що вийшло?'
        en: 'And finally — three questions for the truth detective. First: is there a tool to check? Second: is the person
          willing to be tested — or do they have excuses? Third: we checked — what happened?'
    - id: '18'
      type: speech
      duration_sec: 8
      text:
        ru: 'Полная проверка! Три категории: проверяемое, мнение, хитрое.

          '
        uk: 'Повна перевірка! Три категорії: перевіряєме, думка, хитре.'
        en: 'Complete check! Three categories: verifiable, opinion, tricky.'
    - id: '19'
      type: vote
      duration_sec: 10
      text:
        ru: '«Этот стул весит три килограмма.»

          '
        uk: «Цей стілець важить три кілограми.»
        en: '"This chair weighs three kilograms."'
      options:
      - id: opt_1
        text:
          ru: Проверяемое
          uk: Перевіряєме
          en: Verifiable
      - id: opt_2
        text:
          ru: Мнение
          uk: Думка
          en: Opinion
      - id: opt_3
        text:
          ru: Хитрое утверждение
          uk: Хитре твердження
          en: Tricky claim
      correct: opt_1
    - id: '20'
      type: speech
      duration_sec: 8
      text:
        ru: 'Проверяемое! Инструмент — весы. Ставим на весы, смотрим число.

          '
        uk: Перевіряєме! Прилад — ваги. Ставимо на ваги, дивимось число.
        en: Verifiable! Tool — scales. Put it on, check the number.
    - id: '21'
      type: vote
      duration_sec: 10
      text:
        ru: '«Этот стул удобный.»

          '
        uk: «Цей стілець зручний.»
        en: '"This chair is comfortable."'
      options:
      - id: opt_1
        text:
          ru: Проверяемое
          uk: Перевіряєме
          en: Verifiable
      - id: opt_2
        text:
          ru: Мнение
          uk: Думка
          en: Opinion
      - id: opt_3
        text:
          ru: Хитрое утверждение
          uk: Хитре твердження
          en: Tricky claim
      correct: opt_2
    - id: '22'
      type: speech
      duration_sec: 6
      text:
        ru: 'Мнение! Нет прибора, который покажет «удобность». Кому-то удобно, кому-то нет.

          '
        uk: Думка! Немає приладу, який покаже «зручність». Комусь зручно, комусь ні.
        en: Opinion! There's no device that measures comfort. It's different for everyone.
    - id: '23'
      type: vote
      duration_sec: 10
      text:
        ru: '«Мой кот умеет считать до десяти, но только когда я сплю.»

          '
        uk: «Мій кіт вміє рахувати до десяти, але тільки коли я сплю.»
        en: '"My cat can count to ten, but only when I''m sleeping."'
      options:
      - id: opt_1
        text:
          ru: Проверяемое
          uk: Перевіряєме
          en: Verifiable
      - id: opt_2
        text:
          ru: Мнение
          uk: Думка
          en: Opinion
      - id: opt_3
        text:
          ru: Хитрое утверждение
          uk: Хитре твердження
          en: Tricky claim
      correct: opt_3
    - id: '24'
      type: speech
      duration_sec: 8
      text:
        ru: 'Хитрое утверждение! Вроде можно проверить — попроси кота посчитать. Но отговорка: «только когда я сплю» — проверить
          невозможно.

          '
        uk: 'Хитре твердження! Ніби можна перевірити — попроси кота порахувати. Але отговірка: «тільки коли я сплю» — перевірити
          неможливо.'
        en: Tricky claim! It seems checkable — ask the cat to count. But the excuse is "only when I'm sleeping" — impossible
          to verify.
    - id: '25'
      type: vote
      duration_sec: 10
      text:
        ru: '«За окном идёт дождь.»

          '
        uk: «За вікном йде дощ.»
        en: '"It''s raining outside."'
      options:
      - id: opt_1
        text:
          ru: Проверяемое
          uk: Перевіряєме
          en: Verifiable
      - id: opt_2
        text:
          ru: Мнение
          uk: Думка
          en: Opinion
      - id: opt_3
        text:
          ru: Хитрое утверждение
          uk: Хитре твердження
          en: Tricky claim
      correct: opt_1
    - id: '26'
      type: speech
      duration_sec: 6
      text:
        ru: 'Проверяемое! Поверни голову, посмотри в окно. Прямо сейчас можно узнать.

          '
        uk: Перевіряєме! Повернися голова, подивись у вікно. Прямо зараз можна дізнатись.
        en: Verifiable! Turn your head and look out the window. You can check right now.
    - id: '27'
      type: vote
      duration_sec: 10
      text:
        ru: '«Красный — самый красивый цвет.»

          '
        uk: «Червоний — найгарніший колір.»
        en: '"Red is the most beautiful color."'
      options:
      - id: opt_1
        text:
          ru: Проверяемое
          uk: Перевіряєме
          en: Verifiable
      - id: opt_2
        text:
          ru: Мнение
          uk: Думка
          en: Opinion
      - id: opt_3
        text:
          ru: Хитрое утверждение
          uk: Хитре твердження
          en: Tricky claim
      correct: opt_2
    - id: '28'
      type: speech
      duration_sec: 6
      text:
        ru: 'Мнение! «Красивый» — это личное ощущение. Нет прибора для красоты.

          '
        uk: Думка! «Гарний» — це особисте відчуття. Немає приладу для краси.
        en: Opinion! "Beautiful" is a personal feeling. There's no device for measuring beauty.
    - id: '29'
      type: vote
      duration_sec: 10
      text:
        ru: '«Мой невидимый друг живёт под кроватью, но исчезает, если заглянуть.»

          '
        uk: «Мій невидимий друг живе під ліжком, але зникає, якщо заглянути.»
        en: '"My invisible friend lives under my bed, but disappears if I look."'
      options:
      - id: opt_1
        text:
          ru: Проверяемое
          uk: Перевіряєме
          en: Verifiable
      - id: opt_2
        text:
          ru: Мнение
          uk: Думка
          en: Opinion
      - id: opt_3
        text:
          ru: Хитрое утверждение
          uk: Хитре твердження
          en: Tricky claim
      correct: opt_3
    - id: '30'
      type: speech
      duration_sec: 8
      text:
        ru: 'Хитрое! Заглянул — исчез. Не заглянул — «видишь, он там». Отговорка на любую проверку.

          '
        uk: Хитре! Заглянув — зник. Не заглянув — «бачиш, він там». Отговірка на будь-яку перевірку.
        en: Tricky! Look — he's gone. Don't look — "see, he's there." An excuse for every test.
    - id: '31'
      type: speech
      duration_sec: 10
      text:
        ru: 'Отлично! Всё помните. Три слова, пять инструментов, три вопроса детектива. Теперь — новая тема!

          '
        uk: Чудово! Всіх пам'ятаєте. Три слова, п'ять приладів, три питання детектива. Тепер — нова тема!
        en: Excellent! You remember everything. Three words, five tools, three detective questions. Now — new topic!
    - id: '32'
      type: speech
      duration_sec: 8
      text:
        ru: А теперь послушайте интересную историю о споре, который решил секундомер.
        uk: А тепер послухайте цікаву історію про спір, який вирішив секундомір.
        en: Now listen to a cool story about an argument that a stopwatch solved.
  - scene_id: sc2
    title:
      ru: ИСТОРИЯ — КТО БЕГАЕТ БЫСТРЕЕ?
      uk: ІСТОРІЯ — ХТО БІГАЄ ШВИДШЕ?
      en: STORY — WHO RUNS FASTER?
    media_ref: 2A.sc2.story_race
    status: v3_locked
    steps:
    - id: '33'
      type: speech
      duration_sec: 14
      text:
        ru: 'Дмитрик заявил на весь школьный двор: «Я самый быстрый в школе! Никто меня не обгонит!» Сашко усмехнулся: «Правда?
          А давай проверим!»'
        uk: 'Дмитрик оголосив на весь шкільний подвір''я: «Я найшвидший у школі! Ніхто мене не обжене!» Сашко посміхнувся:
          «Справді? А давай перевіримо!»'
        en: 'Dmitrik announced to the whole school yard: "I''m the fastest in school! Nobody can catch me!" Sashko smiled:
          "Really? Let''s test it!"'
    - id: '34'
      type: speech
      duration_sec: 14
      text:
        ru: 'Договорились: сто метров, секундомер, честный забег. Побежали — и Сашко финишировал первым! Дмитрик не поверил
          своим глазам.'
        uk: 'Договорилися: сто метрів, секундомір, чесний забіг. Побігли — і Сашко фініш першим! Дмитрик не повірив своїм
          очам.'
        en: 'They agreed: a hundred meters, stopwatch, fair race. They ran — and Sashko finished first! Dmitrik couldn''t
          believe his eyes.'
    - id: '35'
      type: speech
      duration_sec: 14
      text:
        ru: «Нечестно! У меня шнурок развязался!» — крикнул Дмитрик. Перебежали. Сашко снова быстрее. «Ну я просто не выспался!»
          — не сдаётся Дмитрик.
        uk: «Нечесно! У мене шнурок розв'язався!» — крикнув Дмитрик. Перебігли. Сашко знову швидше. «Ну я просто не виспався!»
          — не здається Дмитрик.
        en: '"That''s not fair! My shoelace came undone!" shouted Dmitrik. They ran again. Sashko was faster again. "I just
          didn''t sleep well!" Dmitrik wouldn''t give up.'
    - id: '36'
      type: speech
      duration_sec: 10
      text:
        ru: 'Оленка покачала головой: «Дмитрик, секундомер показал числа. Два раза. Может, стоит просто потренироваться?»'
        uk: 'Оленка покачала головою: «Дмитрик, секундомір показав числа. Два рази. Може, варто просто потренуватися?»'
        en: 'Olenka shook her head: "Dmitrik, the stopwatch showed numbers. Twice. Maybe you should just practice?"'
    - id: '37'
      type: discussion
      duration_sec: 20
      text:
        ru: 'Дмитрик сказал: «Я самый быстрый в школе!» А Сашко что предложил?

          '
        uk: 'Дмитрик сказав: «Я найшвидший у школі!» А Сашко що запропонував?'
        en: 'Dmitrik said: "I''m the fastest in school!" What did Sashko suggest?'
    - id: '38'
      type: speech
      duration_sec: 10
      text:
        ru: 'Проверить! Пробежать сто метров и засечь время. Какой инструмент они использовали?

          '
        uk: Перевірити! Пробігти сто метрів і засекти час. Який прилад вони використовували?
        en: Test it! Run a hundred meters and time it. What tool did they use?
    - id: '39'
      type: speech
      duration_sec: 8
      text:
        ru: 'Секундомер! Один из наших пяти инструментов.

          '
        uk: Секундомір! Один з наших п'яти приладів.
        en: A stopwatch! One of our five tools.
    - id: '40'
      type: vote
      duration_sec: 10
      text:
        ru: '«Я самый быстрый в школе!» — сказал Дмитрик. Сашко оказался быстрее. Значит утверждение Дмитрика — это…

          '
        uk: «Я найшвидший у школі!» — сказав Дмитрик. Сашко виявився швидше. Значить твердження Дмитрика — це…
        en: '"I''m the fastest in school!" said Dmitrik. But Sashko was faster. So Dmitrik''s statement is...'
      options:
      - id: opt_1
        text:
          ru: Факт
          uk: Факт
          en: Fact
      - id: opt_2
        text:
          ru: Мнение
          uk: Думка
          en: Opinion
      - id: opt_3
        text:
          ru: Неправда
          uk: Неправда
          en: Falsehood
      correct: opt_3
    - id: '41'
      type: speech
      duration_sec: 8
      text:
        ru: 'Неправда! Инструмент есть — секундомер. Проверили — не подтвердилось.

          '
        uk: Неправда! Прилад є — секундомір. Перевірили — не підтвердилось.
        en: Falsehood! We have the tool — a stopwatch. We checked — it wasn't true.
    - id: '42'
      type: discussion
      duration_sec: 20
      text:
        ru: 'Но подождите. Дмитрик — врун? Он специально обманывал?

          '
        uk: Але зупинись. Дмитрик — брехун? Він спеціально обманював?
        en: But wait. Is Dmitrik a liar? Was he trying to trick us?
    - id: '43'
      type: speech
      duration_sec: 15
      text:
        ru: 'Нет! Он правда верил, что бегает быстрее всех. Ему так КАЗАЛОСЬ. Он чувствовал: «Я бегу, ветер в лицо, я быстрый!»
          Но ощущение — это ещё не факт.

          '
        uk: 'Ні! Він правда вважав, що бігає швидше за всіх. Йому так ЗДАВАЛОСЯ. Він відчув: «Я біжу, вітер у обличчя, я швидкий!»
          Але відчуття — це ще не факт.'
        en: 'No! He really thought he was the fastest. It SEEMED like that to him. He felt: "I''m running, wind in my face,
          I''m fast!" But feelings aren''t facts.'
    - id: '44'
      type: speech
      duration_sec: 12
      text:
        ru: 'Вот для чего нужны инструменты. Ощущения говорят одно, а прибор показывает другое. Секундомер не обижается, не
          хвастается, не ошибается — он просто показывает число.

          '
        uk: Ось для чого потрібні прилади. Відчуття говорять одне, а прилад показує друге. Секундомір не образляється, не
          хвалиться, не помиляється — він просто показує число.
        en: That's why we need tools. Feelings tell one story, but the tool shows another. A stopwatch doesn't get offended,
          doesn't brag, doesn't make mistakes — it just shows the number.
    - id: '45'
      type: speech
      duration_sec: 8
      text:
        ru: 'Запомните: «мне кажется» — это ещё не проверка. Проверка — это когда инструмент дал число.

          '
        uk: 'Запам''ятайте: «мені здається» — це ще не перевірка. Перевірка — це коли прилад дав число.'
        en: 'Remember: "it seems to me" is not a test. A real test is when a tool gives you a number.'
    - id: '46'
      type: speech
      duration_sec: 20
      text:
        ru: 'А теперь хитрый вопрос. Дмитрик проиграл забег. Расстроился. И говорит: «Нечестно! У меня шнурок развязался!
          Давай перебежим!» Перебежали — Сашко опять быстрее. «Ну я просто не выспался!»

          '
        uk: 'А тепер хитрий вопрос. Дмитрик програв забіг. Розстроївся. І говорить: «Нечесно! У мене шнурок розв''язався!
          Давай перебігнемо!» Перебігли — Сашко опять швидше. «Ну я просто не виспався!»'
        en: 'Now a tricky question. Dmitrik lost the race. He was upset. And he says: "That''s not fair! My shoelace came
          undone! Let''s run again!" They ran again — Sashko was still faster. "I just didn''t sleep well!"'
    - id: '47'
      type: vote
      duration_sec: 10
      text:
        ru: 'Дмитрик после забега ведёт себя как Витя с волшебным камнем?

          '
        uk: Дмитрик після забігу поводить себе як Вітя з чарівним камінем?
        en: Is Dmitrik acting like Vitya with the magic stone?
      options:
      - id: opt_1
        text:
          ru: Да, как Витя
          uk: Так, як Вітя
          en: Yes, like Vitya
      - id: opt_2
        text:
          ru: Нет, по-другому
          uk: Ні, по-іншому
          en: No, differently
      correct: opt_1
    - id: '48'
      type: speech
      duration_sec: 12
      text:
        ru: 'Да! Это знакомая нам история — отговорки. Шнурок, недосып, нечестно — на каждый результат новая причина.

          '
        uk: Так! Це знайома нам історія — отговірки. Шнурок, недосип, нечесно — на кожен результат нова причина.
        en: Yes! It's the same story we know — excuses. Shoelace, didn't sleep, unfair — a new reason for every result.
    - id: '49'
      type: speech
      duration_sec: 15
      text:
        ru: 'Но вот что интересно. А если Дмитрик скажет: «Ладно, сегодня Сашко быстрее. Но может, завтра я буду быстрее?»
          Это отговорка?

          '
        uk: 'Але ось що цікаво. А якщо Дмитрик скаже: «Ладно, сьогодні Сашко швидше. Але може, завтра я буду швидше?» Це отговірка?'
        en: 'But here''s what''s interesting. What if Dmitrik says: "Okay, today Sashko was faster. But maybe tomorrow I''ll
          be faster?" Is that an excuse?'
    - id: '50'
      type: speech
      duration_sec: 15
      text:
        ru: 'Нет! Это хороший вопрос. Может, Дмитрик и правда сегодня устал. Одна проверка — это ещё не всё. Что если проверить
          ещё раз? И ещё? Вот об этом — дальше!

          '
        uk: Ні! Це хороше питання. Може, Дмитрик і справді сьогодні виснажений. Одна перевірка — це ще не всі. Що якщо перевірити
          ще раз? І ще? Про це — далі!
        en: No! That's a good question. Maybe Dmitrik really was tired today. One test isn't everything. What if we test again?
          And again? That's what we'll talk about next!
  - scene_id: sc3
    title:
      ru: 'Повторяемость: закономерность и совпадение'
      uk: 'Повторюваність: закономірність і збіг'
      en: 'Repeatability: Pattern and Coincidence'
    media_ref: 2A.sc3.repeatability
    status: v3_locked
    steps:
    - id: '51'
      type: speech
      duration_sec: 10
      text:
        ru: 'Стоп! Кто думает, что Дмитрику просто не повезло? Может, он реально быстрее, просто сегодня плохой день?

          '
        uk: Стоп! Хто думає, що Дмитрику просто не пощастило? Може, він реально швидше, просто сьогодні поганий день?
        en: Stop! Who thinks Dmitrik was just unlucky? Maybe he really is faster, just had a bad day?
    - id: '52'
      type: speech
      duration_sec: 10
      text:
        ru: 'Ага, есть такие! И знаете что — вы, может быть, правы. Одна проверка — это НЕ ПРИГОВОР. Один забег — и всё, ты
          проиграл навсегда? Нет!

          '
        uk: Ага, є такі! І знаєте що — ви, може, правильно. Одна перевірка — це НЕ ВИРОК. Один забіг — і все, ти програв навік?
          Ні!
        en: Aha! Some of you think so. And you know what — you might be right. One test isn't a death sentence. One race —
          and you've lost forever? No!
    - id: '53'
      type: discussion
      duration_sec: 20
      text:
        ru: 'Но тогда вопрос: СКОЛЬКО раз нужно проверить, чтобы быть уверенным? Один? Два? Десять? Сто?

          '
        uk: 'Але тоді питання: СКІЛЬКИ разів потрібно перевірити, щоб бути впевненим? Один? Два? Десять? Сто?'
        en: 'But then the question is: HOW MANY TIMES do we need to test to be sure? Once? Twice? Ten times? A hundred?'
    - id: '54'
      type: speech
      duration_sec: 12
      text:
        ru: 'Смотрите. Я бросаю мяч — он падает. Бросаю ещё — падает. Ещё — падает. Сто раз бросил — сто раз упал. Думаете,
          на сто первый раз он полетит вверх?

          '
        uk: Дивись. Я кидаю м'яч — він падає. Кидаю ще — падає. Ще — падає. Сто разів кинув — сто разів упав. Думаєш, на сто
          перший раз він полетить вгору?
        en: Look. I throw a ball — it falls. I throw again — it falls. Again — it falls. I threw a hundred times — it fell
          a hundred times. Think on the hundred-and-first throw it'll fly up?
    - id: '55'
      type: speech
      duration_sec: 20
      text:
        ru: 'Нет! Потому что это ЗАКОНОМЕРНОСТЬ. Так работает каждый раз. А вот другой пример. Я загадал желание — и оно сбылось!
          Ура! Загадал ещё — не сбылось. Ещё — тоже нет. Так что, первый раз — магия? Нет. Это СОВПАДЕНИЕ.

          '
        uk: Ні! Тому що це ЗАКОНОМІРНІСТЬ. Так працює кожен раз. А ось інший приклад. Я загадав бажання — і воно збулось!
          Ура! Загадав ще — не збулось. Ще — теж ні. Так що, перший раз — магія? Ні. Це ЗБІГ.
        en: No! Because that's a PATTERN. It works every time. But here's another example. I made a wish — and it came true!
          Yay! I made another wish — it didn't come true. Another — nope. So the first time was magic? No. That was a COINCIDENCE.
    - id: '56'
      type: speech
      duration_sec: 10
      text:
        ru: 'Новое слово: ПОВТОРЯЕМОСТЬ. Если результат получается КАЖДЫЙ РАЗ — это надёжно. Если один раз да, один раз нет
          — совпадение.

          '
        uk: 'Нове слово: ПОВТОРЮВАНІСТЬ. Якщо результат виходить КОЖЕН РАЗ — це надійно. Якщо один раз так, один раз ні —
          це збіг.'
        en: 'New word: REPEATABILITY. If the result happens EVERY TIME — it''s reliable. If one time yes, one time no — that''s
          a coincidence.'
    - id: '57'
      type: discussion
      duration_sec: 20
      text:
        ru: 'Вернёмся к Дмитрику. Как по-честному решить, кто быстрее?

          '
        uk: Повернімось до Дмитрика. Як по-чесному вирішити, хто швидше?
        en: Back to Dmitrik. How can we fairly figure out who's faster?
    - id: '58'
      type: speech
      duration_sec: 10
      text:
        ru: 'Побежать несколько раз! Если Сашко быстрее пять раз из пяти — всё, точно быстрее. А если три на два — тут уже
          спорно.

          '
        uk: Пробігти кілька разів! Якщо Сашко швидше п'ять разів з п'яти — все, точно швидше. А якщо три на два — тут уже
          спірно.
        en: Run several times! If Sashko is faster five out of five times — definitely faster. But if it's three to two —
          it's debatable.
    - id: '59'
      type: speech
      duration_sec: 10
      text:
        ru: 'А теперь — внимание — ловушка! Дмитрик говорит: «Когда я надеваю красную футболку, наша команда ВСЕГДА выигрывает!»
          Звучит круто. Кто верит?

          '
        uk: 'А тепер — увага — пастка! Дмитрик говорить: «Коли я надягаю червону футболку, наша команда ЗАВЖДИ виграває!»
          Звучить круто. Хто вірить?'
        en: 'And now — attention — a trap! Dmitrik says: "When I wear my red shirt, our team ALWAYS wins!" Sounds cool. Who
          believes it?'
    - id: '60'
      type: speech
      duration_sec: 12
      text:
        ru: 'Так-так. А давайте проверим. Надел красную — выиграли. Надел синюю — тоже выиграли. Надел красную — проиграли.
          Так дело в футболке? Или в том, как команда играла?

          '
        uk: Так-так. А давай перевіримо. Надів червону — виграли. Надів синю — теж виграли. Надів червону — програли. Так
          справа в футболці? Або в тому, як команда грала?
        en: Hmm. Let's check it. Wore red — won. Wore blue — also won. Wore red — lost. Is it the shirt? Or how the team played?
    - id: '61'
      type: speech
      duration_sec: 10
      text:
        ru: 'Совпадение! Дмитрик запомнил один раз, когда совпало, и решил — это правило. А все разы, когда НЕ совпало, —
          забыл. Хитрый мозг!

          '
        uk: Збіг! Дмитрик запам'ятав один раз, коли совпало, і вирішив — це правило. А всі разі, коли НЕ совпало, — забув.
          Хитрий мозок!
        en: Coincidence! Dmitrik remembered one time when it matched and decided it was a rule. But all the times it didn't
          match — he forgot. Tricky brain!
    - id: '62'
      type: speech
      duration_sec: 8
      text:
        ru: 'Голосуем! Закономерность — повторяется ВСЕГДА. Совпадение — бывает по-разному. Поехали!

          '
        uk: Голосуємо! Закономірність — повторюється ЗАВЖДИ. Збіг — буває по-різному. Поїхали!
        en: Vote! Pattern — repeats ALWAYS. Coincidence — varies. Let's go!
    - id: '63'
      type: vote
      duration_sec: 10
      text:
        ru: '«Если отпустить камень, он упадёт.»

          '
        uk: «Якщо відпустити камінь, він упаде.»
        en: '"If you release a stone, it will fall."'
      options:
      - id: opt_1
        text:
          ru: Закономерность
          uk: Закономірність
          en: Pattern
      - id: opt_2
        text:
          ru: Совпадение
          uk: Збіг
          en: Coincidence
      correct: opt_1
    - id: '64'
      type: speech
      duration_sec: 6
      text:
        ru: 'Закономерность! Хоть тысячу раз бросай — упадёт. Никогда не полетит вверх.

          '
        uk: Закономірність! Хоч тисячу разів кидай — упаде. Ніколи не полетить вгору.
        en: Pattern! Throw it a thousand times — it'll fall. Never fly up.
    - id: '65'
      type: vote
      duration_sec: 10
      text:
        ru: '«Я загадал желание на падающую звезду — и оно сбылось.»

          '
        uk: «Я загадав бажання на падаючу зірку — і воно збулось.»
        en: '"I made a wish on a falling star — and it came true."'
      options:
      - id: opt_1
        text:
          ru: Закономерность
          uk: Закономірність
          en: Pattern
      - id: opt_2
        text:
          ru: Совпадение
          uk: Збіг
          en: Coincidence
      correct: opt_2
    - id: '66'
      type: speech
      duration_sec: 8
      text:
        ru: 'Совпадение! А сколько раз не сбылось — мы почему-то не считаем. Звезда тут ни при чём.

          '
        uk: Збіг! А скільки разів не збулось — ми чомусь не рахуємо. Зірка тут ні при чому.
        en: Coincidence! And how many times it didn't come true — we don't count for some reason. The star has nothing to
          do with it.
    - id: '67'
      type: vote
      duration_sec: 10
      text:
        ru: '«Вода закипает при ста градусах.»

          '
        uk: «Вода кипить при ста градусах.»
        en: '"Water boils at a hundred degrees."'
      options:
      - id: opt_1
        text:
          ru: Закономерность
          uk: Закономірність
          en: Pattern
      - id: opt_2
        text:
          ru: Совпадение
          uk: Збіг
          en: Coincidence
      correct: opt_1
    - id: '68'
      type: speech
      duration_sec: 6
      text:
        ru: 'Закономерность! Миллион раз проверено. Термометр показывает сто — вода кипит. Всегда.

          '
        uk: Закономірність! Мільйон разів перевірено. Термометр показує сто — вода кипить. Завжди.
        en: Pattern! Tested a million times. Thermometer shows a hundred — water boils. Always.
    - id: '69'
      type: vote
      duration_sec: 10
      text:
        ru: '«Если я сяду на первую парту — получу отличную оценку.»

          '
        uk: «Якщо я сяду на першу парту — отримаю відмінну оцінку.»
        en: '"If I sit at the front desk — I''ll get an excellent grade."'
      options:
      - id: opt_1
        text:
          ru: Закономерность
          uk: Закономірність
          en: Pattern
      - id: opt_2
        text:
          ru: Совпадение
          uk: Збіг
          en: Coincidence
      correct: opt_2
    - id: '70'
      type: speech
      duration_sec: 8
      text:
        ru: 'Совпадение! А вдруг сел на первую — и плохая оценка? Оценка зависит от знаний, а не от парты.

          '
        uk: Збіг! А раптом сів на першу — і погана оцінка? Оцінка залежить від знань, а не від парти.
        en: Coincidence! What if you sit at the front — and get a bad grade? Grades depend on knowledge, not on desks.
    - id: '71'
      type: vote
      duration_sec: 10
      text:
        ru: '«Солнце встаёт на востоке.»

          '
        uk: «Сонце встає на сході.»
        en: '"The sun rises in the east."'
      options:
      - id: opt_1
        text:
          ru: Закономерность
          uk: Закономірність
          en: Pattern
      - id: opt_2
        text:
          ru: Совпадение
          uk: Збіг
          en: Coincidence
      correct: opt_1
    - id: '72'
      type: speech
      duration_sec: 6
      text:
        ru: 'Закономерность! Каждый день, миллиарды лет. Надёжнее не бывает.

          '
        uk: Закономірність! Щоденно, мільярди років. Надійніше не буває.
        en: Pattern! Every day, billions of years. Can't be more reliable.
    - id: '73'
      type: vote
      duration_sec: 10
      text:
        ru: '«Я надел счастливые носки — и контрольная прошла отлично!»

          '
        uk: «Я надів щасливих шкарпеток — і контрольна пройшла чудово!»
        en: '"I wore lucky socks — and the test went great!"'
      options:
      - id: opt_1
        text:
          ru: Закономерность
          uk: Закономірність
          en: Pattern
      - id: opt_2
        text:
          ru: Совпадение
          uk: Збіг
          en: Coincidence
      correct: opt_2
    - id: '74'
      type: speech
      duration_sec: 8
      text:
        ru: 'Совпадение! Носки не решают задачи. Ты просто готовился. А носкам — всё равно.

          '
        uk: Збіг! Шкарпетки не розв'язують завдання. Ти просто готувався. А шкарпеткам — все одно.
        en: Coincidence! Socks don't solve problems. You just studied. And the socks don't care.
    - id: '75'
      type: speech
      duration_sec: 15
      text:
        ru: 'Заметили фокус? Закономерности — камень падает, вода кипит, солнце встаёт — работают БЕЗ нас. А совпадения —
