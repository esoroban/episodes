lesson:
  id: lesson_1A
  day: 1
  slot: A
  title:
    ru: Факт, мнение и неправда
    en: Fact, Opinion and Falsehood
    uk: Факт, думка та неправда
  scenes:
  - scene_id: sc1
    title:
      ru: ОТКРЫТИЕ
      en: OPENING
      uk: ВІДКРИТТЯ
    media_ref: 1A.sc1.opening
    status: v3_locked
    steps:
    - id: '1'
      type: speech
      duration_sec: 10
      text:
        ru: 'Привет! Представьте: друг говорит — «Завтра контрольная отменяется!» Вы обрадовались, не готовились. А утром
          приходите — а контрольная на месте. Бывало такое?

          '
        en: 'Hi! Imagine: your friend says, "Tomorrow''s test is cancelled!" You got excited and didn''t study. But in the
          morning you come to class - and there''s the test. Has that ever happened?'
        uk: 'Привіт! Уявіть: друг каже — «Завтра контрольна скасовується!» Ви обрадувались, не готувались. А вранці приходите
          — а контрольна на місці. Траплялося таке?'
    - id: '2'
      type: speech
      duration_sec: 15
      text:
        ru: 'Или на переменке спор: «Футбол лучше баскетбола!» — «Нет, баскетбол!» Голоса всё громче, уже почти ругаетесь.
          А потом непонятно — можно ли тут вообще быть правым? И как спорить, чтобы не поссориться?

          '
        en: 'Or during break, an argument: "Football is better than basketball!" - "No, basketball!" Voices getting louder,
          you''re almost fighting. And then it''s unclear - can anyone even be right? How do you argue without falling out?'
        uk: 'Або на перерві суперечка: «Футбол краще баскетболу!» — «Ні, баскетбол!» Голоси все гучніше, ви вже майже сваритися.
          А потім незрозуміло — чи можна вообще мати рацію? Як спорити, щоб не посваритися?'
    - id: '3'
      type: speech
      duration_sec: 12
      text:
        ru: 'Вот для этого мы начинаем курс «Сила слова». Тринадцать занятий. После них вы будете разбираться в словах так,
          как сейчас разбираетесь в любимой игре. Давайте покажу, что нас ждёт.

          '
        en: That's why we're starting the course "The Power of Words." Thirteen lessons. After them, you'll understand words
          the way you now understand your favorite game. Let me show you what's ahead.
        uk: Тому ми починаємо курс «Сила слова». Тринадцять занять. Після них ви розумітимете слова так, як зараз розумієте
          вашу улюблену гру. Дозвольте мені показати, що вас чекає.
    - id: '4'
      type: speech
      duration_sec: 25
      text:
        ru: 'Первое. Мы научимся отличать три вещи: факт, мнение и неправду. «В классе двадцать парт» — это факт, можно посчитать.
          «Математика — скучный предмет» — это чьё-то мнение. «Школы закроют навсегда» — это неправда, кто-то придумал. Кто-то
          называет это грубо — ложь. Кто-то — выдумка. А мы объединим одним словом: неправда.

          '
        en: 'First. We''ll learn to tell three things apart: fact, opinion, and falsehood. "There are twenty desks in the
          class" - that''s a fact, you can count them. "Math is a boring subject" - that''s someone''s opinion. "Schools will
          close forever" - that''s falsehood, someone made it up. Some people call it a lie. Others call it a made-up story.
          We''ll use one word for it: falsehood.'
        uk: 'По-перше. Ми навчимося розрізняти три речі: факт, думку та неправду. «У класі двадцять парт» — це факт, можна
          порахувати. «Математика — нудний предмет» — це чиїсь думка. «Школи закриють назавжди» — це неправда, хтось це вигадав.
          Хтось називає це грубо — брехня. Хтось — вигадка. А ми об''єднаємо одним словом: неправда.'
    - id: '5'
      type: speech
      duration_sec: 12
      text:
        ru: 'Потом — как проверять. Друг говорит: «Я бегаю быстрее всех!» Как проверить? Засечь время. Посмотреть своими глазами.
          Измерить. Заглянуть в справочник. Четыре способа — и вас уже сложно обмануть.

          '
        en: 'Then - how to verify. Your friend says: "I run faster than everyone!" How do you check? Time it. See it with
          your own eyes. Measure it. Look it up in a reference book. Four ways - and you''re hard to fool.'
        uk: 'Потім — як перевіряти. Друг каже: «Я бігаю швидше за всіх!» Як перевірити? Засічи час. Подивися своїми очима.
          Виміряй. Поглянь у довідник. Чотири способи — і вас важко обдурити.'
    - id: '6'
      type: speech
      duration_sec: 15
      text:
        ru: 'Дальше — ловушки слов. «Все мальчики любят футбол.» Все? Прямо все? А «никто не ест брокколи» — правда никто?
          Слова «все», «никто», «всегда», «никогда» — это ловушки. Мы научимся их замечать.

          '
        en: Next - word traps. "All boys love football." All of them? Every single one? And "nobody eats broccoli" - really
          nobody? Words like "all," "nobody," "always," "never" - these are traps. We'll learn to spot them.
        uk: Далі — пастки слів. «Всі хлопці люблять футбол.» Усі? Прямо всі? А «ніхто не їсть броколі» — справді ніхто? Слова
          «всі», «ніхто», «завжди», «ніколи» — це пастки. Ми навчимося їх помічати.
    - id: '7'
      type: speech
      duration_sec: 12
      text:
        ru: 'А ещё бывает: ты говоришь что-то умное, а тебе в ответ — «Ты ещё маленький, ничего не понимаешь!» Это не ответ.
          Это нападение на тебя, а не на твою идею. Мы научимся это различать.

          '
        en: 'And sometimes: you say something smart, and the answer is - "You''re still too young, you don''t understand anything!"
          That''s not an answer. That''s attacking you, not your idea. We''ll learn to tell the difference.'
        uk: 'І ще траплялося: ти кажеш щось розумне, а у відповідь — «Ти ще маленький, нічого не розумієш!» Це не відповідь.
          Це напад на тебе, а не на твою ідею. Ми навчимося це розрізняти.'
    - id: '8'
      type: speech
      duration_sec: 12
      text:
        ru: 'Или вот: «Если не съешь суп — заболеешь!» «Если не пойдёшь на вечеринку — все будут смеяться!» Это когда нас
          пугают, чтобы мы не думали, а просто слушались. Мы научимся включать голову, когда страшно.

          '
        en: 'Or like this: "If you don''t eat your soup - you''ll get sick!" "If you don''t go to the party - everyone will
          laugh at you!" That''s when people scare us so we don''t think, we just obey. We''ll learn to think even when we''re
          scared.'
        uk: 'Або ось так: «Якщо не з''їш суп — захворієш!» «Якщо не пійдеш на вечірку — всі сміятимуться!» Це коли нас лякають,
          щоб ми не думали, а просто слухалися. Ми навчимося думати, навіть коли страшно.'
    - id: '9'
      type: speech
      duration_sec: 15
      text:
        ru: 'И самое крутое. Знаете, что такое манипуляция? «Если бы ты был настоящим другом, ты бы помог мне списать.» Это
          удар не по голове — а по чувствам. Мы научимся отвечать: «Это манипуляция. Давай по сути.»

          '
        en: 'And the coolest part. Do you know what manipulation is? "If you were a real friend, you''d help me cheat." That''s
          not an attack on your brain - it''s an attack on your feelings. We''ll learn to answer: "That''s manipulation. Let''s
          stick to the facts."'
        uk: 'І найкраще. Знаєте, що таке маніпуляція? «Якби ти був справжнім другом, ти б мені допоміг списати.» Це удар не
          по голові — а по почуттям. Ми навчимося відповідати: «Це маніпуляція. Давай по суті.»'
    - id: '10'
      type: discussion
      duration_sec: 20
      text:
        ru: 'Кто хоть раз не знал, что ответить, когда на него так давили? Это нормально. Этому можно научиться. Для этого
          мы тут.

          '
        en: Who hasn't felt stuck when someone pressures you like that? That's normal. You can learn this. That's why we're
          here.
        uk: Хто хоча б раз не знав, що відповісти, коли на нього так тиснули? Це нормально. Цьому можна навчитися. Тому ми
          тут.
    - id: '11'
      type: speech
      duration_sec: 20
      text:
        ru: 'После курса вы станете как детектив из кино — который видит то, чего не видят другие. Кто-то врёт — вы заметите.
          Кто-то давит на чувства — не сработает. Демагогия, манипуляция, фейки — вы будете читать людей как открытую книгу.
          Тринадцать занятий — и слова станут вашей суперсилой. Готовы?

          '
        en: After this course, you'll be like a detective from a movie - who sees what others don't. Someone's lying - you'll
          notice. Someone's manipulating you - it won't work. Propaganda, manipulation, fake news - you'll read people like
          an open book. Thirteen lessons - and words will become your superpower. Ready?
        uk: Після курсу ви станете як детектив з кіно — той, хто бачить те, чого не бачать інші. Хтось бреше — ви помітите.
          Хтось тисне на почуття — не спрацює. Демагогія, маніпуляція, фейки — ви будете читати людей як відкриту книгу. Тринадцять
          занять — і слова станут вашою суперсилою. Готові?
    - id: '12'
      type: speech
      duration_sec: 8
      text:
        ru: А теперь послушайте интересную историю о споре, который начался из-за мороженого.
        en: Now listen to an interesting story about an argument that started over ice cream.
        uk: А тепер послухайте цікаву історію про суперечку, яка почалася через морозиво.
  - scene_id: sc2
    title:
      ru: ИСТОРИЯ — СПОР О МОРОЖЕНОМ
      en: STORY - THE ICE CREAM ARGUMENT
      uk: ІСТОРІЯ — СУПЕРЕЧКА ПРО МОРОЗИВО
    media_ref: 1A.sc2.story_icecream
    status: v3_locked
    steps:
    - id: '13'
      type: speech
      duration_sec: 14
      text:
        ru: 'На перемене Микола и Маша стоят у ларька с мороженым. Микола берёт шоколадное и заявляет: «Шоколадное мороженое
          — лучше всех! И стоит всего двадцать пять гривень.»'
        en: 'During break, Mykola and Masha stand at the ice cream kiosk. Mykola takes chocolate and announces: "Chocolate
          ice cream is the best! And it costs only twenty-five hryvnias."'
        uk: 'На перерві Микола і Маша стоять у ларька з морозивом. Микола бере шоколадне й заявляє: «Шоколадне морозиво —
          найкраще! І коштує всього двадцять пять гривень.»'
    - id: '14'
      type: speech
      duration_sec: 12
      text:
        ru: 'Маша фыркает: «Ничего подобного! Клубничное в сто раз вкуснее!» Оба уверены. Оба не уступают. Спор в самом разгаре.'
        en: 'Masha snorts: "Nothing of the sort! Strawberry is a hundred times tastier!" Both are sure. Both won''t give in.
          The argument is in full swing.'
        uk: 'Маша фиркає: «Нічого подібного! Полуничне в сто разів смачніше!» Обидва впевнені. Обидва не поступаються. Суперечка
          в розпалі.'
    - id: '15'
      type: speech
      duration_sec: 16
      text:
        ru: 'Тут прибегает Дмитрик: «Ребята, новость! Завтра уроков не будет! Мне Петрик сказал, а ему — старший брат!» Микола
          и Маша забыли про мороженое.'
        en: 'Then Dmitrik runs up: "Guys, news! No lessons tomorrow! Petrik told me, and he heard from his older brother!"
          Mykola and Masha forgot about ice cream.'
        uk: 'Потім прибіжить Дмитрик: «Хлопці, новина! Завтра уроків не буде! Мені Петрик сказав, а йому — старший брат!»
          Микола і Маша забули про морозиво.'
    - id: '16'
      type: speech
      duration_sec: 10
      text:
        ru: 'Дети обрадовались. Но Оленка нахмурилась: «Подождите… а откуда старший брат это знает?» Хороший вопрос.'
        en: 'The kids got excited. But Olenka frowned: "Wait... how does the older brother know that?" Good question.'
        uk: 'Діти обрадувались. Але Оленка нахмурилась: «Стійте… а звідки старший брат це знає?» Гарне питання.'
    - id: '17'
      type: vote
      duration_sec: 15
      media_ref: 1A.sc2.story_discussion
      text:
        ru: 'Ого, столько всего! Давайте разбираться. Сначала — Микола и Маша. Микола говорит: «Шоколадное мороженое лучше!»
          Маша говорит: «Нет, клубничное!» Кто из них прав? Голосуем!

          '
        en: 'Wow, so much going on! Let''s sort it out. First - Mykola and Masha. Mykola says: "Chocolate ice cream is better!"
          Masha says: "No, strawberry!" Who''s right? Let''s vote!'
        uk: 'Ого, скільки всього! Давайте розбиратися. Спочатку — Микола і Маша. Микола каже: «Шоколадне морозиво краще!»
          Маша каже: «Ні, полуничне!» Хто з них правий? Голосуємо!'
      options:
      - id: opt_1
        text:
          ru: Микола
          en: Mykola
          uk: Микола
      - id: opt_2
        text:
          ru: Маша
          en: Masha
          uk: Маша
      - id: opt_3
        text:
          ru: Не знаю
          en: I don't know
          uk: Не знаю
    - id: '18'
      type: discussion
      duration_sec: 25
      text:
        ru: 'Интересно! А можно ли вообще тут найти правильный ответ? Можно ли как-то доказать, что шоколадное ТОЧНО вкуснее
          клубничного? Измерить? Взвесить? Посмотреть в учебнике?

          '
        en: Interesting! Can we even find the right answer here? Can we somehow prove that chocolate is DEFINITELY tastier
          than strawberry? Measure it? Weigh it? Look it up in a textbook?
        uk: Цікаво! Чи можна взагалі знайти правильну відповідь? Чи можна якось довести, що шоколадне ТОЧНО смачніше від полуничного?
          Виміряти? Зважити? Подивитися у підручнику?
    - id: '19'
      type: speech
      duration_sec: 12
      text:
        ru: 'Нет! Потому что «вкуснее» — это кому как. Микола любит шоколадное. Маша — клубничное. И оба правы. И оба неправы.
          Это их личное ощущение. Запомните этот спор — мы к нему ещё вернёмся.

          '
        en: No! Because "tastier" is a matter of opinion. Mykola likes chocolate. Masha likes strawberry. And both are right.
          And both are wrong. It's their personal feeling. Remember this argument - we'll come back to it.
        uk: Ні! Тому що «смачніше» — це для кожного своє. Микола любить шоколадне. Маша — полуничне. І обидва праві. І обидва
          неправі. Це їхнє особисте почуття. Запам'ятайте цю суперечку — ми до неї ще повернемося.
    - id: '20'
      type: speech
      duration_sec: 12
      text:
        ru: 'А теперь — Дмитрик. Он сказал: завтра уроков не будет. Я думаю, он прав. Петрик же ему сказал, а Петрику — старший
          брат. Старший брат точно знает. Вы согласны?

          '
        en: 'Now - Dmitrik. He said: no lessons tomorrow. I think he''s right. Petrik told him, and Petrik heard from his
          older brother. The older brother definitely knows. Do you agree?'
        uk: 'Тепер — Дмитрик. Він сказав: завтра уроків не буде. Я думаю, він правий. Петрику цей брат сказав, а Петрику —
          старший брат. Старший брат точно знає. Ви згодні?'
    - id: '21'
      type: vote
      duration_sec: 15
      text:
        ru: 'Не согласны? А почему? Старший брат же СТАРШИЙ. Он большой, он больше знает. Или нет? А откуда старший брат узнал?
          Из интернета? Ну в интернете же всё правда, да? Голосуем!

          '
        en: Disagree? Why? The older brother is OLDER. He's big, he knows more. Or does he? Where did the older brother find
          out? From the internet? Well, everything on the internet is true, right? Let's vote!
        uk: Не згодні? Чому? Старший брат же СТАРШИЙ. Він великий, він більше знає. Або ні? Звідки старший брат дізнався?
          З інтернету? Ну в інтернеті ж усе правда, так? Голосуємо!
      options:
      - id: opt_1
        text:
          ru: Всегда правда
          en: Always true
          uk: Завжди правда
      - id: opt_2
        text:
          ru: Не всегда
          en: Not always
          uk: Не завжди
      correct: opt_2
    - id: '22'
      type: speech
      duration_sec: 20
      text:
        ru: 'Хорошо. А может, старший брат вообще не в интернете это прочитал. Может, ему друг сказал. А другу — его мама.
          А мама услышала от соседки. А соседка просто пошутила. Получается цепочка — как в игре «сломанный телефон». Каждый
          передал по-своему, и в конце уже непонятно что.

          '
        en: Okay. But maybe the older brother didn't read it on the internet. Maybe a friend told him. And the friend's mom
          told him. And mom heard from a neighbor. And the neighbor was just joking. It's like a chain - like the game "broken
          telephone." Everyone passed it on their own way, and by the end nobody knows what it is.
        uk: Гаразд. Але може, старший брат взагалі не в інтернеті це прочитав. Може, йому друг сказав. А другу — його мама.
          А мама чула від сусідки. А сусідка просто пошутила. Виходить ланцюжок — як у грі «зіпсований телефон». Кожен передав
          по-своєму, і в кінці вже незрозуміло що.
    - id: '23'
      type: speech
      duration_sec: 10
      text:
        ru: 'Ладно. А давайте я вам сейчас скажу: завтра вместо математики будет два урока физкультуры. Верите? Я же учитель!
          Учителям можно верить?

          '
        en: 'Okay. And let me tell you right now: tomorrow instead of math, there will be two PE lessons. Do you believe me?
          I''m a teacher! Can you trust teachers?'
        uk: 'Гаразд. А давайте я вам зараз скажу: завтра замість математики буде два уроки фізкультури. Вірите? Я ж учитель!
          Вчителям можна вірити?'
    - id: '24'
      type: speech
      duration_sec: 10
      text:
        ru: 'Видите — вы даже мне не сразу поверили. И правильно! Потому что важно не КТО говорит, а МОЖНО ЛИ ПРОВЕРИТЬ. Даже
          если говорит учитель, друг, мама или президент.

          '
        en: You see - you didn't believe me right away. And that's right! Because what matters is not WHO says it, but WHETHER
          YOU CAN CHECK IT. Even if it's a teacher, friend, mom, or president speaking.
        uk: Бачите — ви навіть мені не одразу повірили. І правильно! Тому що важливо не ХТО говорить, а ЧИ МОЖНА ПЕРЕВІРИТИ.
          Навіть якщо говорит учитель, друг, мама або президент.
    - id: '25'
      type: discussion
      duration_sec: 25
      text:
        ru: 'А как бы Дмитрик мог проверить? Что бы вы сделали на его месте? Может, зайти в учительскую и спросить? Или посмотреть
          расписание на стенде? Вот это и есть — ПРОВЕРИТЬ.

          '
        en: How could Dmitrik verify this? What would you do in his place? Maybe go to the teacher's room and ask? Or check
          the schedule on the bulletin board? That's what VERIFYING means.
        uk: Як би Дмитрик мог перевірити? Що б ви зробили на його місці? Може, зайти в учительську й запитати? Або подивитися
          розклад на дошці? Ось це й є — ПЕРЕВІРИТИ.
    - id: '26'
      type: speech
      duration_sec: 20
      text:
        ru: 'Заметили разницу? Спор про мороженое — там НЕЧЕГО проверять. Каждому нравится своё. А новость Дмитрика — можно
          пойти и узнать точно. Два совсем разных случая. Дмитрик не проверил — и попал впросак. Чтобы с нами такого не было,
          нам нужно разобраться: какие бывают фразы. Сейчас узнаем.

          '
        en: See the difference? The ice cream argument - there's NOTHING to verify. Everyone likes their own thing. But Dmitrik's
          news - you can go and find out for sure. Two completely different cases. Dmitrik didn't verify - and got caught
          out. To keep this from happening to us, we need to understand what kinds of statements there are. Let's find out
          now.
        uk: 'Помітили різницю? Суперечка про морозиво — там НІЧОГО перевіряти. Кожному подобається своє. А новина Дмитрика
          — можна піти й дізнатися точно. Два зовсім різних випадки. Дмитрик не перевірив — і потрапив у халепу. Щоб з нами
          такого не було, нам потрібно розібратися: які бувають фрази. Зараз дізнаємося.'
  - scene_id: sc3
    title:
      ru: ЧТО ТАКОЕ ФАКТ
      en: WHAT IS A FACT
      uk: ЩО ТАКЕ ФАКТ
    media_ref: 1A.sc3.fact_definition
    status: v3_locked
    steps:
    - id: '27'
      type: speech
      duration_sec: 15
      text:
        ru: 'Итак, мы сказали — есть фразы, которые можно проверить, и те, которые нельзя. Давайте начнём с тех, которые МОЖНО.
          Помните, Микола ещё кое-что сказал в истории? «Мороженое стоит двадцать пять гривень.» Можно ли это проверить?

          '
        en: So we said - there are statements you can verify, and those you can't. Let's start with those you CAN. Remember,
          Mykola said something else in the story? "Ice cream costs twenty-five hryvnias." Can you verify that?
        uk: Отже, ми сказали — є фрази, які можна перевірити, і ті, які не можна. Давайте почнемо з тих, які МОЖНА. Пам'ятаєте,
          Микола ще щось сказав у історії? «Морозиво коштує двадцять пять гривень.» Чи можна це перевірити?
    - id: '28'
      type: speech
      duration_sec: 10
      text:
        ru: 'Конечно! Пойти в магазин — посмотреть ценник. Спросить продавца. Залезть на сайт. Можно узнать точно. А если
          проверили и оказалось правдой — это называется ФАКТ.

          '
        en: Of course! Go to a store - check the price tag. Ask a seller. Look it up online. You can find out for sure. And
          if you verify it and it turns out to be true - that's called a FACT.
        uk: Звичайно! Піди в магазин — подивися на цінник. Запитай продавця. Поглянь в інтернеті. Можна дізнатися точно. А
          якщо перевірити й виявиться, що це правда — це називається ФАКТ.
    - id: '29'
      type: speech
      duration_sec: 20
      text:
        ru: 'Внимание — хитрое место. «На Земле восемь континентов.» Можно проверить? Да! Открыл карту — посчитал. Но когда
          проверил — оказалось, что континентов не восемь, а шесть. Значит, это НЕ факт. Проверить можно, но это неправда.
          А вот «На Земле шесть континентов» — проверили, подтвердилось — ЭТО факт.

          '
        en: Attention - tricky part. "There are eight continents on Earth." Can you verify that? Yes! Open a map - count them.
          But when you verify - it turns out there are six continents, not eight. So that's NOT a fact. You can verify it,
          but it's falsehood. But "There are six continents on Earth" - you verified it, it checks out - THAT'S a fact.
        uk: Увага — хитра частина. «На Землі восьмь континентів.» Можна перевірити? Так! Відкрив карту — порахував. Але коли
          перевірив — виявилось, що континентів не восьмь, а шість. Значить, це НЕ факт. Перевірити можна, але це неправда.
          А ось «На Землі шість континентів» — перевірили, підтвердилось — ЦЕ факт.
    - id: '30'
      type: speech
      duration_sec: 12
      text:
        ru: 'А что делать с тем, что можно проверить, но оказалось неправдой? Это отдельная интересная история — мы разберём
          её на следующих занятиях. А пока запомним: факт — проверили и правда.

          '
        en: 'And what do we do with something that can be verified but turns out to be false? That''s a separate interesting
          story - we''ll figure that out in the next lessons. For now, let''s remember: a fact is something you verify and
          it''s true.'
        uk: 'А що робити з тим, що можна перевірити, але виявилось неправда? Це окрема цікава історія — ми розберемо її на
          наступних заняттях. А поки запам''ятаємо: факт — перевірили й правда.'
  - scene_id: sc4
    title:
      ru: 'ПРАКТИКА: ФАКТЫ'
      en: 'PRACTICE: FACTS'
