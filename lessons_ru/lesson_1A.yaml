  - scene_id: sc7
    title:
      ru: ЧТО ТАКОЕ НЕПРАВДА
      en: WHAT IS FALSEHOOD
      uk: ЩО ТАКЕ НЕПРАВДА
    media_ref: 1A.sc7.falsehood_definition
    status: v3_locked
    steps:
    - id: '65'
      type: speech
      duration_sec: 18
      text:
        ru: 'А что насчёт Дмитрика? Он сказал: «Завтра отменят занятия!» Откуда он это узнал? Петрик сказал, а ему брат, а
          ему кто-то в интернете. Мы уже разобрались — проверить можно было. Но когда проверили — оказалось, что это неправда.
          Кто-то придумал.

          '
        en: 'What about Dmitrik? He said: "Lessons are cancelled tomorrow!" Where did he find out? Petrik told him, and Petrik
          heard from his brother, and his brother heard from someone on the internet. We''ve already figured this out - it
          could have been verified. But when checked - it turned out to be false. Someone made it up.'
        uk: 'А що стосується Дмитрика? Він сказав: «Завтра скасують заняття!» Звідки він це дізнався? Петрик сказав, а йому
          брат, а йому хтось в інтернеті. Ми вже розібралися — перевірити можна було. Але коли перевірили — виявилось, що
          це неправда. Хтось вигадав.'
    - id: '66'
      type: speech
      duration_sec: 10
      text:
        ru: 'Вот это и есть третье слово — НЕПРАВДА. Это когда кто-то говорит то, что не соответствует реальности. Можно проверить
          — и окажется, что это не так.

          '
        en: That's the third word - FALSEHOOD. It's when someone says something that doesn't match reality. You can verify
          it - and it turns out to be false.
        uk: Ось це й є третє слово — НЕПРАВДА. Це коли хтось каже щось, що не відповідає реальності. Можна перевірити — й
          виявиться, що це не так.
    - id: '67'
      type: speech
      duration_sec: 15
      text:
        ru: 'Но неправда бывает РАЗНАЯ! Иногда человек знает, что говорит неправду — и делает это специально. А иногда — сам
          верит и просто ошибается. Дмитрик не врал — он сам поверил Петрику. Но информация всё равно оказалась неправдой.

          '
        en: But falsehood comes in DIFFERENT types! Sometimes a person knows they're lying - and does it on purpose. But sometimes
          - they believe it themselves and are just wrong. Dmitrik wasn't lying - he believed Petrik. But the information
          turned out to be false anyway.
        uk: Але неправда буває РІЗНОЮ! Іноді людина знає, що каже неправду — й робить це спеціально. А іноді — вона сама вірить
          й просто помиляється. Дмитрик не брав — він сам повірив Петрику. Але інформація все одно виявилась неправдою.
    - id: '68'
      type: speech
      duration_sec: 12
      text:
        ru: 'Первый вид — ШУТКА. Друг говорит: «У тебя паук на плече!» Вы подпрыгнули — а он смеётся: «Я пошутил!» Он знал,
          что это неправда. Но хотел посмеяться, а не обмануть. Это нормально.

          '
        en: 'The first type - JOKE. A friend says: "There''s a spider on your shoulder!" You jump - and he laughs: "I was
          joking!" He knew it wasn''t true. But he wanted to laugh, not fool you. That''s fine.'
        uk: 'Перший тип — ЖАРТ. Друг каже: «У тебе павук на плечі!» Ти стрибнув — а він сміється: «Я жартував!» Він знав,
          що це неправда. Але він хотів посмішити, а не обманути. Це нормально.'
    - id: '69'
      type: speech
      duration_sec: 10
      text:
        ru: 'Второй вид — СКАЗКА. «Жил-был дракон, который любил блинчики.» Все понимают, что это не на самом деле. Никто
          не обманывает — это для удовольствия. Тоже нормально.

          '
        en: The second type - FAIRY TALE. "Once there was a dragon who loved pancakes." Everyone understands this isn't real.
          No one is lying - it's for fun. That's fine too.
        uk: Другий тип — КАЗКА. «Жив-був дракон, який любив млинці.» Усі розуміють, що це не насправді. Ніхто не обманює —
          це для задоволення. Це теж нормально.
    - id: '70'
      type: speech
      duration_sec: 15
      text:
        ru: 'А третий вид — ФЕЙК. Это когда кто-то СПЕЦИАЛЬНО придумывает неправду и хочет, чтобы вы поверили. «В интернете
          написали, что школы закроют навсегда.» Человек хочет, чтобы вы испугались, поделились, рассказали другим. Вот это
          — опасная неправда.

          '
        en: And the third type - FAKE. That's when someone DELIBERATELY makes up false information and wants you to believe
          it. "The internet says schools will close forever." The person wants you to get scared, share it, tell others. That's
          dangerous false information.
        uk: А третій тип — ФЕЙК. Це коли хтось СПЕЦІАЛЬНО вигадує неправду й хоче, щоб ви повірили. «В інтернеті написали,
          що школи закриють назавжди.» Людина хоче, щоб ви злякалися, поділилися, розповіли іншим. Ось це — небезпечна неправда.
