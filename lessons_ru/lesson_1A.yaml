      correct: opt_1
    - id: '37'
      type: speech
      duration_sec: 6
      text:
        ru: 'Факт! Открой любую карту — проверили — подтвердилось.

          '
        en: Fact! Open any map - you verified - confirmed.
        uk: Факт! Відкрий будь-яку карту — перевірили — підтвердилось.
    - id: '38'
      type: speech
      duration_sec: 12
      text:
        ru: 'Видите — теперь у вас есть правило: можно проверить и оказалось правдой — факт. Но если «математика скучная»
          вообще нельзя проверить — тогда что это такое? Помните Миколу и Машу? Сейчас разберёмся.

          '
        en: 'You see - now you have a rule: if you can verify it and it''s true - it''s a fact. But if "math is boring" can''t
          be verified at all - what is it then? Remember Mykola and Masha? Let''s figure it out now.'
        uk: 'Бачите — тепер у вас є правило: можна перевірити й виявилось правда — факт. Але якщо «математика нудна» взагалі
          не можна перевірити — що це тоді? Пам''ятаєте Миколу і Машу? Зараз розберемся.'
  - scene_id: sc5
    title:
      ru: ЧТО ТАКОЕ МНЕНИЕ
      en: WHAT IS AN OPINION
      uk: ЩО ТАКЕ ДУМКА
    media_ref: 1A.sc5.opinion_definition
    status: v3_locked
    steps:
    - id: '39'
      type: speech
      duration_sec: 12
      text:
        ru: 'Вернёмся к Миколе и Маше. Помните — они спорили, какое мороженое вкуснее. И мы решили, что проверить это нельзя.
          Каждому нравится своё. Так вот — у этого есть название.

          '
        en: Let's go back to Mykola and Masha. Remember - they were arguing about which ice cream is tastier. And we decided
          that you can't verify this. Everyone likes their own thing. Well, this has a name.
        uk: Повернемося до Миколи і Маші. Пам'ятаєте — вони сперечалися, яке морозиво смачніше. І ми вирішили, що перевірити
          це не можна. Кожному подобається своє. Так ось — у цього є назва.
    - id: '40'
      type: speech
      duration_sec: 15
      text:
        ru: 'Когда человек говорит, что ЕМУ нравится, что ОН чувствует, что ЕМУ кажется — это называется МНЕНИЕ. Мнение нельзя
          проверить. Нет прибора «вкусомер». Нет линейки для красоты. Нет весов для скуки.

          '
        en: When a person says what THEY like, what THEY feel, what THEY think - that's called an OPINION. You can't verify
          an opinion. There's no "taste meter." There's no ruler for beauty. There's no scale for boredom.
        uk: Коли людина каже, що ЇЙ подобається, що ВОНА відчуває, що ЇЙ здається — це називається ДУМКА. Думку не можна перевірити.
          Немає приладу «смакомер». Немає лінійки для краси. Немає ваг для нудьги.
    - id: '41'
      type: speech
      duration_sec: 12
      text:
        ru: 'Слова-подсказки: «мне кажется», «я думаю», «по-моему», «самый лучший», «самый плохой», «красивый», «скучный»,
          «вкусный». Услышали такое слово — скорее всего перед вами мнение.

          '
        en: 'Clue words: "I think," "I believe," "in my opinion," "the best," "the worst," "beautiful," "boring," "tasty."
          If you hear such words - most likely it''s an opinion.'
        uk: 'Слова-підказки: «мені здається», «я думаю», «на мою думку», «найкращий», «найгірший», «красивий», «нудний», «смачний».
          Чули таке слово — скоріше за все перед вами думка.'
    - id: '42'
      type: speech
      duration_sec: 10
      text:
        ru: 'И вот что важно: мнение — это нормально. Микола любит шоколадное — отлично. Маша любит клубничное — тоже отлично.
          Никто не ошибается. Просто у каждого своё.

          '
        en: 'And here''s what''s important: opinions are normal. Mykola likes chocolate - great. Masha likes strawberry -
          also great. Nobody is wrong. Everyone just has their own preference.'
        uk: 'І ось що важливо: думка — це нормально. Микола любить шоколадне — чудово. Маша любить полуничне — теж чудово.
          Ніхто не помиляється. У кожного просто своє.'
