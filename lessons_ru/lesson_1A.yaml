  - scene_id: sc9
    title:
      ru: СЛОЖНЫЕ СЛУЧАИ
      en: TRICKY CASES
      uk: ХІТРІ ВИПАДКИ
    media_ref: 1A.sc9.tricky_cases
    status: v3_locked
    steps:
    - id: '95'
      type: speech
      duration_sec: 12
      text:
        ru: 'Вы уже отличаете факт, мнение и неправду. Но сейчас будет самое хитрое. Бывают фразы, которые ПОХОЖИ друг на
          друга — а на самом деле совсем разные. Сейчас покажу.

          '
        en: You already know how to tell fact, opinion, and falsehood apart. But now comes the tricky part. There are phrases
          that LOOK similar - but are actually completely different. Let me show you.
