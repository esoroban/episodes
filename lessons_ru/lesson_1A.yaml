    - id: '137'
      type: speech
      duration_sec: 5
      text:
        ru: 'Факт! Посчитали — подтвердилось.

          '
        en: Fact! We counted - confirmed.
        uk: Факт! Порахували — підтвердилось.
    - id: '138'
      type: vote
      duration_sec: 10
      text:
        ru: '«Все месяцы имеют 31 день.»

          '
        en: '"All months have 31 days."'
        uk: «Всі місяці мають 31 день.»
      options:
      - id: opt_1
        text:
