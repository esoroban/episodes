          ru: Неправда
          en: Falsehood
          uk: Неправда
      correct: opt_2
    - id: '141'
      type: speech
      duration_sec: 6
      text:
        ru: 'Мнение! «Умный» для кота — кому как. Нет прибора «котоумомер».

          '
        en: Opinion! "Smart" for a cat - that depends on who you ask. There's no "cat-smartness meter."
        uk: Думка! «Розумний» для кота — для кожного своє. Немає приладу «кото-розумо-метр».
    - id: '142'
      type: vote
      duration_sec: 10
      text:
        ru: '«Великая Китайская стена видна из космоса.»

          '
        en: '"The Great Wall of China is visible from space."'
        uk: «Велика Китайська стіна видна з космосу.»
      options:
      - id: opt_1
        text:
          ru: Факт
          en: Fact
          uk: Факт
      - id: opt_2
        text:
          ru: Мнение
          en: Opinion
          uk: Думка
      - id: opt_3
        text:
          ru: Неправда
          en: Falsehood
          uk: Неправда
      correct: opt_3
    - id: '143'
      type: speech
      duration_sec: 8
      text:
        ru: 'Неправда! Космонавты проверяли — не видно. Стена длинная, но слишком узкая. Знаменитый миф!

          '
        en: False! Astronauts checked - you can't see it. The wall is long, but too narrow. A famous myth!
        uk: Неправда! Космонавти перевіряли — не видно. Стіна довга, але занадто вузька. Знаменитий міф!
    - id: '144'
      type: vote
      duration_sec: 10
      text:
        ru: '«Если человек ошибся, значит он не старался.»

          '
        en: '"If a person made a mistake, it means they didn''t try."'
        uk: «Якщо людина помилилась, значить вона не старалась.»
      options:
      - id: opt_1
        text:
          ru: Факт
          en: Fact
          uk: Факт
      - id: opt_2
        text:
          ru: Мнение
          en: Opinion
          uk: Думка
      - id: opt_3
        text:
          ru: Неправда
          en: Falsehood
          uk: Неправда
      correct: opt_3
    - id: '145'
      type: speech
      duration_sec: 8
      text:
        ru: 'Неправда! Можно очень стараться и всё равно ошибиться. «Если… значит…» — часто ловушка!

          '
        en: False! You can try really hard and still make a mistake. "If... then..." - it's often a trap!
        uk: Неправда! Можна дуже старатися й все одно помилитися. «Якщо… значить…» — часто ловушка!
    - id: '146'
      type: vote
      duration_sec: 10
      text:
        ru: '«Если ты не согласен со мной, значит ты неправ.»

          '
        en: '"If you don''t agree with me, then you''re wrong."'
        uk: «Якщо ти не згоден зі мною, значить ти неправий.»
      options:
      - id: opt_1
        text:
          ru: Факт
          en: Fact
          uk: Факт
      - id: opt_2
        text:
          ru: Мнение
          en: Opinion
          uk: Думка
      - id: opt_3
        text:
          ru: Неправда
          en: Falsehood
          uk: Неправда
      correct: opt_3
    - id: '147'
      type: speech
      duration_sec: 8
      text:
        ru: 'Неправда! Помните Миколу и Машу? Несогласие — это нормально. А эта фраза — манипуляция.

          '
        en: False! Remember Mykola and Masha? Disagreement is normal. And this phrase - that's manipulation.
        uk: Неправда! Пам'ятаєте Миколу і Машу? Незгода — це нормально. А ця фраза — маніпуляція.
    - id: '148'
      type: vote
      duration_sec: 10
      text:
        ru: '«Зима — самое скучное время года.»

          '
        en: '"Winter is the most boring season."'
        uk: «Зима — найнудніша пора року.»
      options:
      - id: opt_1
        text:
          ru: Факт
          en: Fact
          uk: Факт
      - id: opt_2
        text:
          ru: Мнение
          en: Opinion
          uk: Думка
      - id: opt_3
        text:
          ru: Неправда
          en: Falsehood
          uk: Неправда
      correct: opt_2
    - id: '149'
      type: speech
      duration_sec: 8
      text:
        ru: 'Мнение! Кто-то обожает зиму — снег, каникулы, Новый год. «Скучное» — это чувство, а не измерение.

          '
        en: Opinion! Someone loves winter - snow, vacation, New Year. "Boring" - that's a feeling, not a measurement.
        uk: Думка! Хтось обожає зиму — сніг, канікули, Новий рік. «Нудна» — це почуття, а не вимірювання.
    - id: '150'
      type: speech
      duration_sec: 10
      text:
        ru: 'Вот это да — двадцать из двадцати! Видите — одно слово меняешь, и фраза прыгает из мнения в факт. А «все» и «если…
          значит…» — самые хитрые ловушки. Теперь вы их знаете!

          '
        en: Wow - twenty out of twenty! See - change one word and the sentence jumps from opinion to fact. And "all" and "if...
          then..." - those are the trickiest traps. Now you know them!
        uk: Ось це так — двадцять з двадцяти! Бачите — змініш одне слово, і речення стрибає з думки у факт. А «всі» й «якщо…
          значить…» — найхітріші пастки. Тепер ви їх знаєте!
  - scene_id: sc11
    title:
      ru: ЗАКРЫТИЕ
      en: CLOSING
      uk: ЗАКРИТТЯ
    media_ref: 1A.sc11.closing
    status: v3_locked
    steps:
    - id: '151'
      type: speech
      duration_sec: 20
      text:
        ru: 'Так. Давайте подведём итог. Сегодня вы получили суперсилу. Не лазерный взгляд и не умение летать — кое-что поважнее.

          '
        en: Okay. Let's wrap up. Today you got a superpower. Not laser vision and not the ability to fly - something more
          important.
        uk: Так. Давайте підведемо підсумок. Сьогодні ви отримали суперсилу. Не лазерний погляд і не вміння літати — щось
          важливіше.
    - id: '152'
      type: speech
      duration_sec: 25
      text:
        ru: 'Вы теперь умеете разбирать любую фразу на части. Кто-то что-то сказал — а вы раз, и думаете: стоп, это факт,
          мнение или неправда?

          '
        en: 'Now you know how to break down any phrase. Someone says something - and you stop and think: is this a fact, opinion,
          or falsehood?'
        uk: 'Тепер ви вмієте розбирати будь-яку фразу на частини. Хтось щось сказав — а ви раз, і думаєте: стоп, це факт,
          думка чи неправда?'
    - id: '153'
      type: speech
      duration_sec: 30
      text:
        ru: 'ФАКТ — это то, что можно проверить. Пошёл, посмотрел, измерил — и точно знаешь, правда это или нет. Земля вращается
          вокруг Солнца — проверили, подтвердилось. Факт.

          '
        en: A FACT - is something you can verify. You go, look, measure - and you know for sure whether it's true or not.
          The Earth revolves around the Sun - we verified, it's confirmed. That's a fact.
        uk: ФАКТ — це те, що можна перевірити. Пішов, подивився, виміряв — й точно знаєш, правда це чи ні. Земля обертається
          навколо Сонця — перевірили, підтвердилось. Факт.
    - id: '154'
      type: speech
      duration_sec: 30
      text:
        ru: 'МНЕНИЕ — это чьи-то чувства и вкусы. «Борщ вкуснее пиццы» — это не правда и не ложь. Это просто чей-то вкус.
          У тебя свой, у соседа свой — и оба правы.

          '
        en: OPINION - is someone's feelings and tastes. "Borscht is tastier than pizza" - that's not true and not false. It's
          just someone's taste. You have your own, your neighbor has theirs - and both are right.
        uk: ДУМКА — це чиїсь почуття й смаки. «Борщ смачніший за піцу» — це не правда й не брехня. Це просто чиїсь смак. У
          тебе свій, у сусіда свій — і обидва праві.
    - id: '155'
      type: speech
      duration_sec: 20
      text:
        ru: 'НЕПРАВДА — это когда кто-то говорит как будто факт, но проверка показывает: нет, это не так. Люди используют
          только десять процентов мозга? Звучит умно — но это неправда.

          '
        en: FALSEHOOD - is when someone states something as if it's a fact, but when you check, it turns out to be false.
          People use only ten percent of their brain? It sounds smart - but it's false.
        uk: 'НЕПРАВДА — це коли хтось говорить щось як факт, але перевірка показує: ні, це не так. Люди використовують тільки
          десять відсотків мозку? Звучить розумно — але це неправда.'
    - id: '156'
      type: speech
      duration_sec: 35
      text:
        ru: 'А теперь — главный секрет, ради которого стоило прийти. Представьте: ваш друг говорит — «Ванилла лучше шоколада!»
          А вы такие — «Нет, шоколад лучше!» И вы спорите час, два, три… Кто победит?

          '
        en: 'Now - here''s the main secret that was worth coming for. Imagine: your friend says - "Vanilla is better than
          chocolate!" And you say - "No, chocolate is better!" And you argue for an hour, two, three... Who wins?'
        uk: 'А тепер — головний секрет, заради якого варто було прийти. Уявіть: ваш друг каже — «Ванілін краще за шоколад!»
          А ви кажете — «Ні, шоколад краще!» І ви сперечаєтесь годину, дві, три… Хто переможе?'
    - id: '157'
      type: speech
      duration_sec: 20
      text:
        ru: 'Никто! Потому что это мнение. А с мнением спорить — всё равно что доказывать, что зелёный цвет красивее синего.
          Можно хоть до вечера — результата не будет.

          '
        en: Nobody! Because that's an opinion. And arguing about opinions is like trying to prove that green is more beautiful
          than blue. You could argue forever - there's no result.
        uk: Ніхто! Тому що це думка. А сперечатися про думку — все одно що доводити, що зелений колір красивіший за синій.
          Можна хоч до вечора — результату не буде.
    - id: '158'
      type: speech
      duration_sec: 25
      text:
        ru: 'Зато если кто-то говорит неправду — вот тут стоит разобраться. Потому что неправду можно проверить, найти доказательства
          и показать: вот, смотри, на самом деле всё не так.

          '
        en: 'But if someone is lying - that''s where we need to figure it out. Because you can verify a lie, find evidence
          and show: look, it''s not actually like that.'
        uk: 'Зато якщо хтось каже неправду — ось тут варто розібратися. Тому що неправду можна перевірити, знайти докази й
          показати: ось, дивись, насправді все не так.'
    - id: '159'
      type: speech
      duration_sec: 25
      text:
        ru: 'Так что в следующий раз, когда кто-то с вами спорит — не спешите. Сначала подумайте: мы вообще спорим о факте?
          Или это просто мнение — и тогда можно просто сказать «окей, у тебя своё мнение» — и пойти есть мороженое.

          '
        en: 'So next time someone argues with you - don''t rush. First think: are we even arguing about a fact? Or is it just
          an opinion - and then you can just say "okay, you have your opinion" - and go eat ice cream.'
        uk: 'Тому наступного разу, коли хтось із вами сперечається — не квапіться. Спочатку подумайте: ми взагалі сперечаємося
          про факт? Або це просто думка — й тоді можна просто сказати «гаразд, у тебе своя думка» — й піти їсти морозиво.'
    - id: '160'
      type: speech
      duration_sec: 8
      text:
        ru: 'Вы сегодня отлично поработали! Перерыв пять минут — и продолжим.

          '
        en: You worked great today! Five minute break - and we'll continue.
        uk: Ви сьогодні чудово попрацювали! Перерва п'ять хвилин — і продовжимо.
