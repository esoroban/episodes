        uk: Не можна перевірити! Для когось нудно, для когось цікаво. Немає способу дізнатися точно. Схоже на суперечку про
          морозиво, так? Скоро дізнаємося, як це називається.
    - id: '36'
      type: vote
      duration_sec: 10
      text:
        ru: '«Киев — столица Украины.»

          '
        en: '"Kyiv is the capital of Ukraine."'
        uk: «Київ — столиця України.»
      options:
      - id: opt_1
