    - id: '139'
      type: speech
      duration_sec: 6
      text:
        ru: 'Неправда! Февраль — 28 или 29. Опять ловушка «все»!

          '
        en: False! February has 28 or 29 days. Again, it's the "all" trap!
        uk: Неправда! Лютий — 28 або 29 днів. Знов ловушка «всі»!
    - id: '140'
      type: vote
      duration_sec: 10
      text:
        ru: '«Мой кот самый умный.»

          '
        en: '"My cat is the smartest."'
        uk: «Мій кіт найрозумніший.»
      options:
      - id: opt_1
        text:
          ru: Факт
