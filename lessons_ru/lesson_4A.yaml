    - scene_id: sc8
      title:
        ru: Голос и интонация
        uk: Голос и интонация
        en: Voice and intonation
      media_ref: 4A.sc8.voice_intonation
      status: v3_locked
      steps:
        - id: '129'
          type: speech
          duration_sec: 8
          text:
            ru: 'Часть третья — голос и интонация. Самая хитрая часть!

              '
            uk: Часть третья — голос и интонация. Самая хитрая часть!
            en: Part three - voice and intonation. The trickiest part!
        - id: '130'
          type: speech
          duration_sec: 12
          text:
            ru: 'У голоса есть четыре настройки — как на пульте управления. Громкость
              — тихо или громко. Темп — быстро или медленно. Высота — низкий голос
              или высокий. И паузы — остановки между словами.

              '
            uk: У голоса есть четыре настройки — как на пульте управления. Громкость
              — тихо или громко. Темп — быстро или медленно. Высота — низкий голос
              или высокий. И паузы — остановки между словами.
            en: The voice has four settings - just like on the remote control. Volume
              - quiet or loud. Pace - fast or slow. Pitch - low voice or high voice.
              And pauses - stops between words.
        - id: '131'
          type: speech
          duration_sec: 8
          text:
            ru: 'А ещё есть интонация — это КАК ты говоришь. Можно сказать одно и
              то же слово — а смысл будет совсем разный!

              '
            uk: А ещё есть интонация — это КАК ты говоришь. Можно сказать одно и то
              же слово — а смысл будет совсем разный!
            en: And there is also intonation - this is HOW you speak. You can say
              the same word - but the meaning will be completely different!
        - id: '132'
          type: speech
          duration_sec: 10
          text:
            ru: 'Слово «Отлично». Если сказать радостно, высоким голосом: «Отли-и-ично!»
              — это значит «ура, здорово!»

              '
            uk: 'Слово «Отлично». Если сказать радостно, высоким голосом: «Отли-и-ично!»
              — это значит «ура, здорово!»'
            en: 'The word "Excellent". If you say joyfully, in a high voice: “Excellent!”
              - this means “hurray, great!”'
        - id: '133'
          type: speech
          duration_sec: 8
          text:
            ru: 'А если сказать медленно, низким голосом: «Отлично…» — это сарказм.
              Человек на самом деле думает: «Ну вообще не отлично».

              '
            uk: 'А если сказать медленно, низким голосом: «Отлично…» — это сарказм.
              Человек на самом деле думает: «Ну вообще не отлично».'
            en: 'And if you say slowly, in a low voice: “Great...” - this is sarcasm.
              The person actually thinks: “Well, not great at all.”'
        - id: '134'
          type: speech
          duration_sec: 12
          text:
            ru: 'Стоп. Что такое сарказм? Это когда ты говоришь одно, а имеешь в виду
              противоположное. И специально делаешь так, чтобы другому было неприятно.
              «Ну ты молодец…» — а на самом деле: «Ты всё испортил».

              '
            uk: 'Стоп. Что такое сарказм? Это когда ты говоришь одно, а имеешь в виду
              противоположное. И специально делаешь так, чтобы другому было неприятно.
              «Ну ты молодец…» — а на самом деле: «Ты всё испортил».'
            en: 'Stop. What is sarcasm? This is when you say one thing but mean the
              opposite. And you deliberately do it so that the other person feels
              unpleasant. “Well, you’re great...” - but in reality: “You ruined everything.”'
        - id: '135'
          type: speech
          duration_sec: 10
          text:
            ru: 'Сарказм — это оружие. Причём подлое. Человек вроде ничего плохого
              не сказал — попробуй обидься на «молодец»! Но все слышат: он издевается.

              '
            uk: 'Сарказм — это оружие. Причём подлое. Человек вроде ничего плохого
              не сказал — попробуй обидься на «молодец»! Но все слышат: он издевается.'
            en: 'Sarcasm is a weapon. And it’s vile. The person didn’t seem to say
              anything bad - try to be offended by “well done”! But everyone hears:
              he is mocking.'
        - id: '136'
          type: speech
          duration_sec: 10
          text:
            ru: 'Разведчик сарказмом не пользуется. Почему? Потому что сарказм — оружие
              солдата, который хочет обидеть, но боится сказать прямо. Разведчик говорит
              честно: «Мне это не нравится» — а не прячется за кривой улыбочкой.

              '
            uk: 'Разведчик сарказмом не пользуется. Почему? Потому что сарказм — оружие
              солдата, который хочет обидеть, но боится сказать прямо. Разведчик говорит
              честно: «Мне это не нравится» — а не прячется за кривой улыбочкой.'
            en: 'The scout does not use sarcasm. Why? Because sarcasm is the weapon
              of a soldier who wants to offend, but is afraid to say it directly.
              The scout says honestly: “I don’t like this” - and does not hide behind
              a crooked smile.'
        - id: '137'
          type: speech
          duration_sec: 8
          text:
            ru: 'А если громко и резко: «ОТЛИЧНО!» — это злость. Как будто хлопнул
              дверью. Одно слово — три разных смысла! И разница — только в голосе.

              '
            uk: 'А если громко и резко: «ОТЛИЧНО!» — это злость. Как будто хлопнул
              дверью. Одно слово — три разных смысла! И разница — только в голосе.'
            en: 'And if loud and sharp: “EXCELLENT!” - this is anger. It was like
              slamming a door. One word - three different meanings! And the difference
              is only in the voice.'
        - id: '138'
          type: speech
          duration_sec: 8
          text:
            ru: 'Ещё один хитрый приём — ударение. Какое слово выделишь голосом —
              такой и смысл.

              '
            uk: Ещё один хитрый приём — ударение. Какое слово выделишь голосом — такой
              и смысл.
            en: Another tricky trick is emphasis. Whichever word you highlight with
              your voice, that’s the meaning.
        - id: '139'
          type: speech
          duration_sec: 8
          text:
            ru: 'Фраза: «Я не брал твой карандаш.» Если выделить «Я» — «Я НЕ брал»
              — значит не я, а кто-то другой!

              '
            uk: 'Фраза: «Я не брал твой карандаш.» Если выделить «Я» — «Я НЕ брал»
              — значит не я, а кто-то другой!'
            en: 'Phrase: “I didn’t take your pencil.” If you highlight “I” - “I DIDN’T
              take” - that means it’s not me, but someone else!'
        - id: '140'
          type: speech
          duration_sec: 8
          text:
            ru: 'Если выделить «брал» — «Я не БРАЛ» — значит не брал, может нашёл
              или мне дали.

              '
            uk: Если выделить «брал» — «Я не БРАЛ» — значит не брал, может нашёл или
              мне дали.
            en: If you highlight “took” - “I didn’t TAKE” - it means I didn’t take
              it, maybe I found it or they gave it to me.
        - id: '141'
          type: speech
          duration_sec: 8
          text:
            ru: 'Если выделить «твой» — «Я не брал ТВОЙ» — значит не твой, а чей-то
              другой. Одна фраза — три разных оправдания! Вот это магия голоса.

              '
            uk: Если выделить «твой» — «Я не брал ТВОЙ» — значит не твой, а чей-то
              другой. Одна фраза — три разных оправдания! Вот это магия голоса.
            en: If you highlight “yours” - “I didn’t take YOURS” - it means not yours,
              but someone else’s. One phrase - three different excuses! This is the
              magic of the voice.
        - id: '142'
          type: speech
          duration_sec: 10
          text:
            ru: 'Маша приходит домой. Мама: «Как дела в школе?» Маша весело, быстро:
              «Отлично! У нас была экскурсия!» Что слышит мама? Радость. Маша довольна.

              '
            uk: 'Маша приходит домой. Мама: «Как дела в школе?» Маша весело, быстро:
              «Отлично! У нас была экскурсия!» Что слышит мама? Радость. Маша довольна.'
            en: 'Masha comes home. Mom: “How are things at school?” Masha cheerfully,
              quickly: “Great! We had a tour!” What does mom hear? Joy. Masha is happy.'
        - id: '143'
          type: speech
          duration_sec: 10
          text:
            ru: 'А теперь другая Маша. Мама спрашивает то же самое. Маша тихо, медленно:
              «Нормально…» Что слышит мама? Что-то случилось. Хотя слово «нормально»
