lesson:
  id: lesson_4A
  day: 4
  slot: A
  title:
    ru: Язык тела и голос
    uk: Мова тіла і голос
    en: Body Language and Voice
  scenes:
    - scene_id: sc1
      title:
        ru: Разминка
        uk: Розминка
        en: Warm-up
      media_ref: 4A.sc1.warmup
      status: v3_locked
      steps:
        - id: '1'
          type: speech
          duration_sec: 10
          text:
            ru: 'Привет! Четвёртое занятие — а значит, мы уже многое знаем. Быстрая
              разминка — проверим, что осталось в голове!

              '
            uk: Привіт! Четверте заняття — а значить, ми вже багато знаємо. Швидка
              розминка — перевіримо, що залишилося в голові!
            en: Hi! Fourth lesson—so we already know a lot. Quick warm-up—let's check
              what's stuck in our heads!
        - id: '2'
          type: speech
          duration_sec: 8
          text:
            ru: 'Помним правила! Факт — проверили, и это правда. Мнение — личное ощущение,
              не проверишь. Неправда — проверили, и это не так.

              '
            uk: Пам'ятаємо правила! Факт — перевірили, і це правда. Думка — особисте
              відчуття, не перевіриш. Неправда — перевірили, і це не так.
            en: Remember the rules! A fact—we checked it, and it's true. An opinion—a
              personal feeling you can't check. A falsehood—we checked it, and it's
              not true.
        - id: '3'
          type: vote
          duration_sec: 10
          text:
            ru: '«В минуте шестьдесят секунд.»

              '
            uk: «В минуте шестьдесят секунд.»
            en: '"There are sixty seconds in a minute."'
          options:
            - id: opt_1
              text:
                ru: Факт
                uk: Факт
                en: Fact
            - id: opt_2
              text:
                ru: Мнение
                uk: Думка
                en: Opinion
            - id: opt_3
              text:
                ru: Неправда
                uk: Неправда
                en: Falsehood
          correct: opt_1
        - id: '4'
          type: speech
          duration_sec: 6
          text:
            ru: 'Факт! Засеки на часах — ровно шестьдесят. Проверено, подтверждено.

              '
            uk: Факт! Засеки на часах — ровно шестьдесят. Проверено, подтверждено.
            en: Fact! The clock ticked exactly sixty. Checked, confirmed.
        - id: '5'
          type: vote
          duration_sec: 10
          text:
            ru: '«Пицца вкуснее суши.»

              '
            uk: «Пицца вкуснее суши.»
            en: “Pizza tastes better than sushi.”
          options:
            - id: opt_1
              text:
                ru: Факт
                uk: Факт
                en: Fact
            - id: opt_2
              text:
                ru: Мнение
                uk: Думка
                en: Opinion
            - id: opt_3
              text:
                ru: Неправда
                uk: Неправда
                en: Falsehood
          correct: opt_2
        - id: '6'
          type: speech
          duration_sec: 8
          text:
            ru: 'Мнение! «Вкуснее» — у каждого свой вкус. Нет прибора, который измерит
              «вкусность». Хотя было бы удобно!

              '
            uk: Мнение! «Вкуснее» — у каждого свой вкус. Нет прибора, который измерит
              «вкусность». Хотя было бы удобно!
            en: Opinion! “Tastier” - everyone has their own taste. There is no device
              that can measure “deliciousness.” Although it would be convenient!
        - id: '7'
          type: vote
          duration_sec: 10
          text:
            ru: '«Дельфины — это рыбы.»

              '
            uk: «Дельфины — это рыбы.»
            en: '"Dolphins are fish."'
          options:
            - id: opt_1
              text:
                ru: Факт
                uk: Факт
                en: Fact
            - id: opt_2
              text:
                ru: Мнение
                uk: Думка
                en: Opinion
            - id: opt_3
              text:
                ru: Неправда
                uk: Неправда
                en: Falsehood
          correct: opt_3
        - id: '8'
          type: speech
          duration_sec: 10
          text:
            ru: 'Неправда! Дельфины — млекопитающие. Дышат воздухом, кормят детёнышей
              молоком. Учёные проверили — точно не рыбы. Даже обижаются, если их рыбами
              называют.

              '
            uk: Неправда! Дельфины — млекопитающие. Дышат воздухом, кормят детёнышей
              молоком. Учёные проверили — точно не рыбы. Даже обижаются, если их рыбами
              называют.
            en: Not true! Dolphins are mammals. They breathe air and feed their young
              with milk. Scientists checked - definitely not fish. They even get offended
              if they are called fish.
        - id: '9'
          type: speech
          duration_sec: 8
          text:
            ru: 'Теперь — причина или совпадение? Причина — первое действительно вызвало
              второе. Совпадение — просто произошло рядом по времени.

              '
            uk: Теперь — причина или совпадение? Причина — первое действительно вызвало
              второе. Совпадение — просто произошло рядом по времени.
            en: Now - reason or coincidence? The reason is that the first actually
              caused the second. Coincidence - it just happened nearby in time.
        - id: '10'
          type: vote
          duration_sec: 10
          text:
            ru: '«Полил цветок каждый день — цветок вырос.»

              '
            uk: «Полил цветок каждый день — цветок вырос.»
            en: “I watered the flower every day and the flower grew.”
          options:
            - id: opt_1
              text:
                ru: Причина
                uk: Причина
                en: Cause
            - id: opt_2
              text:
                ru: Совпадение
                uk: Совпадение
                en: Coincidence
          correct: opt_1
        - id: '11'
          type: speech
          duration_sec: 8
          text:
            ru: 'Причина! Без воды цветок завянет. Вода — настоящая причина роста.

              '
            uk: Причина! Без воды цветок завянет. Вода — настоящая причина роста.
            en: Cause! Without water, the flower will wither. Water is the real reason
              for growth.
        - id: '12'
          type: vote
          duration_sec: 10
          text:
            ru: '«Надел новую шапку — в школе получил отличную оценку.»

              '
            uk: «Надел новую шапку — в школе получил отличную оценку.»
            en: “I put on a new hat and got an excellent grade at school.”
          options:
            - id: opt_1
              text:
                ru: Причина
                uk: Причина
                en: Cause
            - id: opt_2
              text:
                ru: Совпадение
                uk: Совпадение
                en: Coincidence
          correct: opt_2
        - id: '13'
          type: speech
          duration_sec: 8
          text:
            ru: 'Совпадение! Шапка не влияет на оценки. Мозг видит «одно за другим»
              — и хочет связать. Но это ловушка.

              '
            uk: Совпадение! Шапка не влияет на оценки. Мозг видит «одно за другим»
              — и хочет связать. Но это ловушка.
            en: Coincidence! The hat does not affect the ratings. The brain sees “one
              thing after another” - and wants to connect. But this is a trap.
        - id: '14'
          type: vote
          duration_sec: 10
          text:
            ru: '«Включил свет — в комнате стало светло.»

              '
            uk: «Включил свет — в комнате стало светло.»
            en: “I turned on the light and the room became bright.”
          options:
            - id: opt_1
              text:
                ru: Причина
                uk: Причина
                en: Cause
            - id: opt_2
              text:
                ru: Совпадение
                uk: Совпадение
                en: Coincidence
          correct: opt_1
        - id: '15'
          type: speech
          duration_sec: 6
          text:
            ru: 'Причина! Выключатель зажигает лампу. Прямая связь.

              '
            uk: Причина! Выключатель зажигает лампу. Прямая связь.
            en: Cause! The switch lights the lamp. Direct connection.
        - id: '16'
          type: vote
          duration_sec: 10
          text:
            ru: '«Чихнул — автобус подъехал.»

              '
            uk: «Чихнул — автобус подъехал.»
            en: “I sneezed and the bus arrived.”
          options:
            - id: opt_1
              text:
                ru: Причина
                uk: Причина
                en: Cause
            - id: opt_2
              text:
                ru: Совпадение
                uk: Совпадение
                en: Coincidence
          correct: opt_2
        - id: '17'
          type: speech
          duration_sec: 8
          text:
            ru: 'Совпадение! Чих не вызывает автобус. Иначе все бы чихали на остановках
              — и расписание было бы не нужно.

              '
            uk: Совпадение! Чих не вызывает автобус. Иначе все бы чихали на остановках
              — и расписание было бы не нужно.
            en: Coincidence! A sneeze does not call the bus. Otherwise, everyone would
              sneeze at bus stops - and there would be no need for a schedule.
        - id: '18'
          type: vote
          duration_sec: 10
          text:
            ru: '«Выучил стих — получил отличную оценку за стих.»

              '
            uk: «Выучил стих — получил отличную оценку за стих.»
            en: “I learned the verse and got an excellent grade for the verse.”
          options:
            - id: opt_1
              text:
                ru: Причина
                uk: Причина
                en: Cause
            - id: opt_2
              text:
                ru: Совпадение
                uk: Совпадение
                en: Coincidence
          correct: opt_1
        - id: '19'
          type: speech
          duration_sec: 8
          text:
            ru: 'Причина! Знание стиха — прямая причина отличной оценки. Тут связь
              настоящая.

              '
            uk: Причина! Знание стиха — прямая причина отличной оценки. Тут связь
              настоящая.
            en: Cause! Knowledge of the verse is a direct reason for an excellent
              grade. There is a real connection here.
        - id: '20'
          type: vote
          duration_sec: 10
          text:
            ru: '«Кот залез на стол — зазвонил телефон.»

              '
            uk: «Кот залез на стол — зазвонил телефон.»
            en: “The cat climbed onto the table and the phone rang.”
          options:
            - id: opt_1
              text:
                ru: Причина
                uk: Причина
                en: Cause
            - id: opt_2
              text:
                ru: Совпадение
                uk: Совпадение
                en: Coincidence
          correct: opt_2
        - id: '21'
          type: speech
          duration_sec: 8
          text:
            ru: 'Совпадение! Кот не умеет вызывать звонки. Хотя некоторые коты думают,
              что умеют всё.

              '
            uk: Совпадение! Кот не умеет вызывать звонки. Хотя некоторые коты думают,
              что умеют всё.
            en: Coincidence! The cat doesn't know how to make calls. Although some
              cats think they can do everything.
        - id: '22'
          type: speech
          duration_sec: 10
          text:
            ru: 'Отлично! Факт, мнение, неправда — помним. Причина и совпадение —
              не путаем. А теперь — к тому, что мы учили на прошлом занятии.

              '
            uk: Отлично! Факт, мнение, неправда — помним. Причина и совпадение — не
              путаем. А теперь — к тому, что мы учили на прошлом занятии.
            en: Great! Fact, opinion, untruth - we remember. Reason and coincidence
              are not to be confused. And now - to what we taught in the last lesson.
    - scene_id: sc2
      title:
        ru: 'Повторение: солдат и разведчик'
        uk: 'Повторение: солдат и разведчик'
        en: 'Repetition: soldier and scout'
      media_ref: 4A.sc2.review_soldier_scout
      status: v3_locked
      steps:
        - id: '23'
          type: speech
          duration_sec: 10
          text:
            ru: 'На прошлом занятии мы разбирали культуру спора. У спора бывает три
              цели. Кто помнит?

              '
            uk: На прошлом занятии мы разбирали культуру спора. У спора бывает три
              цели. Кто помнит?
            en: In the last lesson we looked at the culture of argument. Argument
              has three purposes. Who remembers?
        - id: '24'
          type: speech
          duration_sec: 12
          text:
            ru: 'Первая — ПОБЕДИТЬ. «Я прав, и точка!» Вторая — ПОНЯТЬ. «Давай разберёмся
              вместе!» Третья — ОБИДЕТЬ. «Хочу сделать тебе больно.» Какая цель у
              разведчика? Правильно — понять.

              '
            uk: Первая — ПОБЕДИТЬ. «Я прав, и точка!» Вторая — ПОНЯТЬ. «Давай разберёмся
              вместе!» Третья — ОБИДЕТЬ. «Хочу сделать тебе больно.» Какая цель у
              разведчика? Правильно — понять.
            en: The first is to WIN. “I’m right, period!” The second is to UNDERSTAND.
              “Let's figure it out together!” The third is to OFFEND. “I want to hurt
              you.” What is the scout's goal? That's right - understand.
        - id: '25'
          type: speech
          duration_sec: 10
          text:
            ru: 'Проверим на новой ситуации. Микола и Маша спорят, куда поехать на
              экскурсию. Микола хочет в зоопарк, Маша — в музей космонавтики.

              '
            uk: Проверим на новой ситуации. Микола и Маша спорят, куда поехать на
              экскурсию. Микола хочет в зоопарк, Маша — в музей космонавтики.
            en: Let's check it out in a new situation. Mikola and Masha are arguing
              about where to go on an excursion. Mikola wants to go to the zoo, Masha
              wants to go to the cosmonautics museum.
        - id: '26'
          type: vote
          duration_sec: 10
          text:
            ru: 'Микола: «В зоопарке круче! Кто хочет в музей — тот скучный!»

              '
            uk: 'Микола: «В зоопарке круче! Кто хочет в музей — тот скучный!»'
            en: 'Mikola: “It’s cooler at the zoo!” Anyone who wants to go to a museum
              is boring!”'
          options:
            - id: opt_1
              text:
                ru: Победить
                uk: Победить
                en: Win
            - id: opt_2
              text:
                ru: Понять
                uk: Понять
                en: Understand
            - id: opt_3
              text:
                ru: Обидеть
                uk: Обидеть
                en: Offend
          correct: opt_3
        - id: '27'
          type: speech
          duration_sec: 8
          text:
            ru: 'Обидеть! «Кто хочет в музей — тот скучный» — удар по человеку, а
              не про экскурсию.

              '
            uk: Обидеть! «Кто хочет в музей — тот скучный» — удар по человеку, а не
              про экскурсию.
            en: Offend! “Whoever wants to go to a museum is boring” - a blow to the
              person, and not about the excursion.
        - id: '28'
          type: vote
          duration_sec: 10
          text:
            ru: 'Микола: «Зоопарк — и никаких разговоров! Я уже решил. И точка.»

              '
            uk: 'Микола: «Зоопарк — и никаких разговоров! Я уже решил. И точка.»'
            en: 'Mikola: “Zoo - and no talking! I''ve already decided. And period."'
          options:
            - id: opt_1
              text:
                ru: Победить
                uk: Победить
                en: Win
            - id: opt_2
              text:
                ru: Понять
                uk: Понять
                en: Understand
            - id: opt_3
              text:
                ru: Обидеть
                uk: Обидеть
                en: Offend
          correct: opt_1
        - id: '29'
          type: speech
          duration_sec: 8
          text:
            ru: 'Победить! Микола не слушает. Ему не важно, что думает Маша. Главное
              — чтобы было по его.

              '
            uk: Победить! Микола не слушает. Ему не важно, что думает Маша. Главное
              — чтобы было по его.
            en: Win! Mikola doesn't listen. He doesn't care what Masha thinks. The
              main thing is that it should be according to him.
        - id: '30'
          type: vote
          duration_sec: 10
          text:
            ru: 'Микола: «Я хочу в зоопарк, а ты — в музей. Расскажи, что там интересного?
              Может, мы оба найдём что-то клёвое.»

              '
            uk: 'Микола: «Я хочу в зоопарк, а ты — в музей. Расскажи, что там интересного?
              Может, мы оба найдём что-то клёвое.»'
            en: 'Mikola: “I want to go to the zoo, and you want to go to the museum.
              Tell me, what''s interesting there? Maybe we can both find something
              cool."'
          options:
            - id: opt_1
              text:
                ru: Победить
                uk: Победить
                en: Win
            - id: opt_2
              text:
                ru: Понять
                uk: Понять
                en: Understand
            - id: opt_3
              text:
                ru: Обидеть
                uk: Обидеть
                en: Offend
          correct: opt_2
        - id: '31'
          type: speech
          duration_sec: 10
          text:
            ru: 'Понять! Микола не отказывается от своего мнения, но хочет услышать
              Машу. Настоящий разведчик.

              '
            uk: Понять! Микола не отказывается от своего мнения, но хочет услышать
              Машу. Настоящий разведчик.
            en: Understand! Mikola does not give up his opinion, but wants to hear
              Masha. A real scout.
        - id: '32'
          type: speech
          duration_sec: 12
          text:
            ru: 'Солдат — стоит за стеной крепости, защищает территорию. «Моё мнение
              — единственно правильное!» Разведчик — берёт бинокль и блокнот. «Интересно,
              а что видит другой человек?»

              '
            uk: Солдат — стоит за стеной крепости, защищает территорию. «Моё мнение
              — единственно правильное!» Разведчик — берёт бинокль и блокнот. «Интересно,
              а что видит другой человек?»
            en: Soldier - stands behind the wall of the fortress, protects the territory.
              “My opinion is the only correct one!” Scout - takes binoculars and a
              notebook. “I wonder what the other person sees?”
        - id: '33'
          type: speech
          duration_sec: 10
          text:
            ru: 'Новая ситуация. Дмитрик и Микола спорят, кто будет вратарём. Оба
              хотят. Дмитрик: «Я всегда стою на воротах! Это МОЁ место! Все знают.»

              '
            uk: 'Новая ситуация. Дмитрик и Микола спорят, кто будет вратарём. Оба
              хотят. Дмитрик: «Я всегда стою на воротах! Это МОЁ место! Все знают.»'
            en: 'New situation. Dmitry and Mikola are arguing about who will be the
              goalkeeper. Both want it. Dmitry: “I always stand at the gate! This
              is MY place! Everyone knows."'
        - id: '34'
          type: vote
          duration_sec: 10
          text:
            ru: 'Кто Дмитрик?

              '
            uk: Кто Дмитрик?
            en: Who is Dmitry?
          options:
            - id: opt_1
              text:
                ru: Солдат
                uk: Солдат
                en: Soldier
            - id: opt_2
              text:
                ru: Разведчик
                uk: Разведчик
                en: Scout
          correct: opt_1
        - id: '35'
          type: speech
          duration_sec: 10
          text:
            ru: 'Солдат! «МОЁ место», «все знают» — крепость на замке. Не слушает
              и не хочет слушать.

              '
            uk: Солдат! «МОЁ место», «все знают» — крепость на замке. Не слушает и
              не хочет слушать.
            en: Soldier! “MY place”, “everyone knows” - a castle on lock. Doesn't
              listen and doesn't want to listen.
        - id: '36'
          type: speech
          duration_sec: 12
          text:
            ru: 'А если бы Дмитрик был разведчиком? «Я люблю стоять на воротах. Ты
              тоже хочешь? Давай по-честному — первый тайм ты, второй я?» Тот же спор
              — но без ссоры.

              '
            uk: А если бы Дмитрик был разведчиком? «Я люблю стоять на воротах. Ты
              тоже хочешь? Давай по-честному — первый тайм ты, второй я?» Тот же спор
              — но без ссоры.
            en: What if Dmitrik was a scout? “I love being on goal. Do you want it
              too? Let’s be honest - first half you, second half me?” The same argument
              - but without a quarrel.
        - id: '37'
          type: speech
          duration_sec: 8
          text:
            ru: 'Солдат — стена. Разведчик — мост. А у разведчика есть три инструмента.
              Мы их подробно разбирали.

              '
            uk: Солдат — стена. Разведчик — мост. А у разведчика есть три инструмента.
              Мы их подробно разбирали.
            en: The soldier is a wall. Scout - bridge. And the scout has three tools.
              We analyzed them in detail.
        - id: '38'
