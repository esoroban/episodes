          duration_sec: 10
          text:
            ru: А теперь послушайте интересную историю о том, как слова говорили одно,
              а тело — совсем другое.
            uk: А теперь послушайте интересную историю о том, как слова говорили одно,
              а тело — совсем другое.
            en: Now listen to an interesting story about how the words said one thing,
              but the body said something completely different.
    - scene_id: sc5
      title:
        ru: ИСТОРИЯ — ДМИТРИК И ЯЗЫК ТЕЛА
        uk: ИСТОРИЯ — ДМИТРИК И ЯЗЫК ТЕЛА
        en: HISTORY – DMITRIK AND BODY LANGUAGE
      media_ref: 4A.sc5.story_body_language
      status: v3_locked
      steps:
        - id: '73'
          type: speech
          duration_sec: 14
          text:
            ru: Ребята позвали Дмитрика играть в мяч. «Да, конечно, хочу!» — сказал
              Дмитрик. Но руки скрестил, глаза отвёл в сторону, а голос стал тихий
              и скучный.
            uk: Ребята позвали Дмитрика играть в мяч. «Да, конечно, хочу!» — сказал
              Дмитрик. Но руки скрестил, глаза отвёл в сторону, а голос стал тихий
              и скучный.
            en: The guys invited Dmitry to play ball. “Yes, of course I want to!”
              - said Dmitry. But he crossed his arms, looked away, and his voice became
              quiet and boring.
        - id: '74'
          type: speech
          duration_sec: 14
          text:
            ru: Витя присмотрелся. Рот говорит «да» — а тело кричит «нет!» Скрещённые
              руки — закрылся, как крепость. Взгляд в сторону — не хочет смотреть.
              Голос без энергии.
            uk: Витя присмотрелся. Рот говорит «да» — а тело кричит «нет!» Скрещённые
              руки — закрылся, как крепость. Взгляд в сторону — не хочет смотреть.
              Голос без энергии.
            en: Vitya took a closer look. The mouth says “yes” - but the body screams
              “no!” Crossed arms - closed like a fortress. Looking to the side - doesn’t
              want to look. Voice without energy.
        - id: '75'
          type: speech
          duration_sec: 14
          text:
            ru: 'Витя тихо спросил: «Дмитрик, ты расстроен, что тебя вчера не позвали?»
              Дмитрик опустил глаза: «Ну… да.» Вот оно — настоящая причина.'
            uk: 'Витя тихо спросил: «Дмитрик, ты расстроен, что тебя вчера не позвали?»
              Дмитрик опустил глаза: «Ну… да.» Вот оно — настоящая причина.'
            en: 'Vitya quietly asked: “Dmitrik, are you upset that you weren’t invited
              yesterday?” Dmitrik lowered his eyes: “Well... yes.” This is the real
              reason.'
        - id: '76'
          type: speech
          duration_sec: 10
          text:
            ru: Витя не поверил словам — он посмотрел на тело. Три подсказки — руки,
              глаза, голос — и все без единого слова. Настоящий разведчик!
            uk: Витя не поверил словам — он посмотрел на тело. Три подсказки — руки,
              глаза, голос — и все без единого слова. Настоящий разведчик!
            en: Vitya did not believe the words - he looked at the body. Three clues
              - hands, eyes, voice - and all without a single word. A real scout!
        - id: '77'
          type: vote
          duration_sec: 10
          text:
            ru: 'В начале Дмитрик говорил «да, хочу играть». Но его ТЕЛО говорило
              что?

              '
            uk: В начале Дмитрик говорил «да, хочу играть». Но его ТЕЛО говорило что?
            en: At the beginning, Dmitry said “yes, I want to play.” But his BODY
              said what?
          options:
            - id: opt_1
              text:
                ru: «Да, хочу»
                uk: «Да, хочу»
                en: '"Yes, I want"'
            - id: opt_2
              text:
                ru: «Нет, не хочу»
                uk: «Нет, не хочу»
                en: "\"No, I don't want to\""
            - id: opt_3
              text:
                ru: Непонятно
                uk: Непонятно
                en: Not clear
          correct: opt_2
        - id: '78'
          type: speech
          duration_sec: 8
          text:
            ru: '«Нет, не хочу»! Рот сказал «да», а тело — «нет». Как с супом!

              '
            uk: «Нет, не хочу»! Рот сказал «да», а тело — «нет». Как с супом!
            en: “No, I don’t want to”! The mouth said yes, but the body said no. Like
              with soup!
        - id: '79'
          type: speech
          duration_sec: 10
          text:
            ru: 'Что именно выдавало Дмитрика? Руки скрещены — закрылся, как крепость.
              Глаза смотрят в сторону — не хочет контакта. Голос скучный — будто робот
              говорит.

              '
            uk: Что именно выдавало Дмитрика? Руки скрещены — закрылся, как крепость.
              Глаза смотрят в сторону — не хочет контакта. Голос скучный — будто робот
              говорит.
            en: What exactly gave Dmitry away? Arms crossed - closed like a fortress.
              Eyes look to the side - does not want contact. The voice is boring -
              like a robot talking.
        - id: '80'
          type: speech
          duration_sec: 8
          text:
            ru: 'Три подсказки — и все без единого слова!

              '
            uk: Три подсказки — и все без единого слова!
            en: Three clues - and all without a single word!
        - id: '81'
          type: speech
          duration_sec: 10
          text:
            ru: 'А Витя — настоящий разведчик. Он включил ГЛАЗ — не поверил словам,
              а посмотрел на тело. И помог Дмитрику разобраться в своих чувствах.

              '
            uk: А Витя — настоящий разведчик. Он включил ГЛАЗ — не поверил словам,
              а посмотрел на тело. И помог Дмитрику разобраться в своих чувствах.
            en: And Vitya is a real intelligence officer. He turned on his EYE - he
              didn’t believe the words, but looked at the body. And he helped Dmitry
              understand his feelings.
        - id: '82'
          type: speech
          duration_sec: 12
          text:
            ru: 'Сегодня мы научимся так же. Разберём три части языка тела: зрительный
              контакт и поза, жесты и мимика, голос и интонация.

              '
            uk: 'Сегодня мы научимся так же. Разберём три части языка тела: зрительный
              контакт и поза, жесты и мимика, голос и интонация.'
            en: 'Today we will learn the same thing. Let''s look at three parts of
              body language: eye contact and posture, gestures and facial expressions,
              voice and intonation.'
        - id: '83'
          type: speech
          duration_sec: 6
          text:
            ru: 'Поехали!

              '
            uk: Поехали!
            en: Let's go!
    - scene_id: sc6
      title:
        ru: Зрительный контакт и поза
        uk: Зрительный контакт и поза
        en: Eye contact and posture
      media_ref: 4A.sc6.eye_contact_posture
      status: v3_locked
      steps:
        - id: '84'
          type: speech
          duration_sec: 8
          text:
            ru: 'Часть первая — зрительный контакт и поза.

              '
            uk: Часть первая — зрительный контакт и поза.
            en: Part one is eye contact and posture.
        - id: '85'
          type: speech
          duration_sec: 12
          text:
            ru: 'Зрительный контакт — это когда ты смотришь человеку в глаза. Казалось
              бы — мелочь. Но это мощный сигнал! Как фонарик — направил на человека,
              и он сразу чувствует: я тут, я слушаю.

              '
            uk: 'Зрительный контакт — это когда ты смотришь человеку в глаза. Казалось
              бы — мелочь. Но это мощный сигнал! Как фонарик — направил на человека,
              и он сразу чувствует: я тут, я слушаю.'
            en: 'Eye contact is when you look a person in the eyes. It would seem
              like a trifle. But this is a powerful signal! Like a flashlight, it’s
              pointed at a person, and he immediately feels: I’m here, I’m listening.'
        - id: '86'
          type: speech
          duration_sec: 12
          text:
            ru: 'Когда ты смотришь в глаза — ты говоришь без слов три вещи: «Я тебя
              слушаю», «Мне важно то, что ты говоришь» и «Я не боюсь». Внимание, интерес,
              уверенность — одним взглядом!

              '
            uk: 'Когда ты смотришь в глаза — ты говоришь без слов три вещи: «Я тебя
              слушаю», «Мне важно то, что ты говоришь» и «Я не боюсь». Внимание, интерес,
              уверенность — одним взглядом!'
            en: 'When you look into your eyes, you say three things without words:
              “I’m listening to you,” “What you say is important to me,” and “I’m
              not afraid.” Attention, interest, confidence - at a glance!'
        - id: '87'
          type: speech
          duration_sec: 10
          text:
            ru: 'А если человек смотрит в сторону или в пол? Может, ему неловко. Или
              он расстроен. Или просто не хочет разговаривать. Глаза — это окно. Куда
              смотрят глаза — там и внимание.

              '
            uk: А если человек смотрит в сторону или в пол? Может, ему неловко. Или
              он расстроен. Или просто не хочет разговаривать. Глаза — это окно. Куда
              смотрят глаза — там и внимание.
            en: What if a person looks to the side or at the floor? Maybe he's embarrassed.
              Or he's upset. Or he just doesn't want to talk. The eyes are a window.
              Where the eyes look, there is attention.
        - id: '88'
          type: speech
          duration_sec: 10
          text:
            ru: 'Маша рассказывает Дмитрику, что было на каникулах. Дмитрик смотрит
              ей в глаза, кивает. Маша чувствует — её слушают! Ей хочется рассказывать
              дальше.

              '
            uk: Маша рассказывает Дмитрику, что было на каникулах. Дмитрик смотрит
              ей в глаза, кивает. Маша чувствует — её слушают! Ей хочется рассказывать
              дальше.
            en: Masha tells Dmitrik what happened during the holidays. Dmitry looks
              into her eyes and nods. Masha feels that she is being listened to! She
              wants to talk further.
        - id: '89'
          type: speech
          duration_sec: 12
          text:
            ru: 'А теперь другой Дмитрик. Та же Маша, тот же рассказ. Но Дмитрик уткнулся
              в телефон. Маша замолкает. Зачем рассказывать, если никто не смотрит?
              Хотя, может, он и слушает! Но Маша-то этого не ВИДИТ.

              '
            uk: А теперь другой Дмитрик. Та же Маша, тот же рассказ. Но Дмитрик уткнулся
              в телефон. Маша замолкает. Зачем рассказывать, если никто не смотрит?
              Хотя, может, он и слушает! Но Маша-то этого не ВИДИТ.
            en: And now another Dmitry. Same Masha, same story. But Dmitrik turned
              his attention to the phone. Masha falls silent. Why tell if no one is
              watching? Although maybe he is listening! But Masha doesn’t SEE this.
        - id: '90'
          type: speech
          duration_sec: 8
          text:
            ru: 'Теперь — поза. Поза — это как расположено твоё тело. И тут есть два
              варианта.

              '
            uk: Теперь — поза. Поза — это как расположено твоё тело. И тут есть два
              варианта.
            en: Now - the pose. Posture is how your body is positioned. And there
              are two options.
        - id: '91'
          type: speech
          duration_sec: 10
          text:
            ru: 'Открытая поза — руки свободны, тело повёрнуто к человеку. Как будто
              говоришь: «Заходи! Я рад! Давай поговорим!» Представьте, что вы — дверь.
              Открытая поза — дверь нараспашку.

              '
            uk: 'Открытая поза — руки свободны, тело повёрнуто к человеку. Как будто
              говоришь: «Заходи! Я рад! Давай поговорим!» Представьте, что вы — дверь.
              Открытая поза — дверь нараспашку.'
            en: 'Open pose - hands free, body turned towards the person. It’s as if
              you’re saying, “Come in! I''m glad! Let''s talk! " Imagine that you
              are a door. Open pose - the door is wide open.'
        - id: '92'
          type: speech
          duration_sec: 10
          text:
            ru: 'Закрытая поза — руки скрещены на груди, тело отвёрнуто. «Мне некомфортно.
              Не подходи. Я защищаюсь.» Та же дверь — но захлопнулась и ещё на замок.

              '
            uk: Закрытая поза — руки скрещены на груди, тело отвёрнуто. «Мне некомфортно.
              Не подходи. Я защищаюсь.» Та же дверь — но захлопнулась и ещё на замок.
            en: Closed pose - arms crossed on the chest, body turned away. “I feel
              uncomfortable. Don't come near. I'm defending myself." The same door
              - but slammed and locked.
        - id: '93'
          type: speech
          duration_sec: 10
          text:
            ru: 'Микола подходит к Маше на перемене — хочет вместе порисовать. Маша
              сидит, руки на столе, повернулась к нему, улыбается. Микола чувствует
              — можно подойти! Дверь открыта.

              '
            uk: Микола подходит к Маше на перемене — хочет вместе порисовать. Маша
              сидит, руки на столе, повернулась к нему, улыбается. Микола чувствует
              — можно подойти! Дверь открыта.
            en: Mikola approaches Masha during recess and wants to draw together.
              Masha sits, hands on the table, turned to him, smiling. Mikola feels
              - you can come over! The door is open.
        - id: '94'
          type: speech
          duration_sec: 10
          text:
            ru: 'А если Маша сидит, скрестив руки, отвернулась к стене и не смотрит?
              Микола подумает: что-то не так, лучше сейчас не подходить. И будет прав
              — дверь закрыта.

              '
            uk: 'А если Маша сидит, скрестив руки, отвернулась к стене и не смотрит?
              Микола подумает: что-то не так, лучше сейчас не подходить. И будет прав
              — дверь закрыта.'
            en: 'What if Masha sits with her arms crossed, turned to the wall and
              doesn’t look? Mikola will think: something is wrong, it’s better not
              to approach now. And he will be right - the door is closed.'
        - id: '95'
          type: speech
          duration_sec: 10
          text:
            ru: 'Открытая поза — приглашение. Закрытая — стена. Разведчик видит эту
              разницу и знает: когда подойти, а когда — подождать.

              '
            uk: 'Открытая поза — приглашение. Закрытая — стена. Разведчик видит эту
              разницу и знает: когда подойти, а когда — подождать.'
            en: 'An open pose is an invitation. Closed - wall. The scout sees this
              difference and knows when to approach and when to wait.'
        - id: '96'
          type: speech
          duration_sec: 6
          text:
            ru: 'Проверим! Описываю поведение — определяем: открытость или закрытость?

              '
            uk: 'Проверим! Описываю поведение — определяем: открытость или закрытость?'
            en: 'Let''s check! I describe behavior and determine: openness or closedness?'
        - id: '97'
          type: vote
          duration_sec: 10
          text:
            ru: 'Человек смотрит в глаза и улыбается.

              '
            uk: Человек смотрит в глаза и улыбается.
            en: The man looks into the eyes and smiles.
          options:
            - id: opt_1
              text:
                ru: Открытость
                uk: Открытость
                en: Openness
            - id: opt_2
              text:
                ru: Закрытость
                uk: Закрытость
                en: Closedness
          correct: opt_1
        - id: '98'
          type: speech
          duration_sec: 6
          text:
            ru: 'Открытость! Глаза + улыбка = «Рад тебя видеть, заходи!»

              '
            uk: Открытость! Глаза + улыбка = «Рад тебя видеть, заходи!»
            en: Openness! Eyes + smile = “Nice to see you, come in!”
        - id: '99'
          type: vote
          duration_sec: 10
          text:
            ru: 'Человек скрестил руки и смотрит в пол.

              '
            uk: Человек скрестил руки и смотрит в пол.
            en: The man has his arms crossed and looks at the floor.
          options:
            - id: opt_1
              text:
                ru: Открытость
                uk: Открытость
                en: Openness
            - id: opt_2
              text:
                ru: Закрытость
                uk: Закрытость
                en: Closedness
          correct: opt_2
        - id: '100'
          type: speech
          duration_sec: 6
          text:
            ru: 'Закрытость! Руки закрыты + взгляд вниз = дверь на замке.

              '
            uk: Закрытость! Руки закрыты + взгляд вниз = дверь на замке.
            en: Closedness! Hands closed + looking down = door locked.
        - id: '101'
          type: vote
          duration_sec: 10
          text:
            ru: 'Человек повернулся к тебе всем телом и кивает.

              '
            uk: Человек повернулся к тебе всем телом и кивает.
            en: The man turns his whole body towards you and nods.
          options:
            - id: opt_1
              text:
                ru: Открытость
                uk: Открытость
                en: Openness
            - id: opt_2
              text:
                ru: Закрытость
                uk: Закрытость
                en: Closedness
          correct: opt_1
        - id: '102'
          type: speech
          duration_sec: 8
          text:
            ru: 'Открытость! Всё тело говорит: «Я с тобой, я слушаю».

              '
            uk: 'Открытость! Всё тело говорит: «Я с тобой, я слушаю».'
            en: 'Openness! The whole body says: “I am with you, I am listening.”'
        - id: '103'
          type: vote
          duration_sec: 10
          text:
            ru: 'Человек отвернулся спиной и молчит.

              '
            uk: Человек отвернулся спиной и молчит.
            en: The man turned his back and is silent.
          options:
            - id: opt_1
              text:
                ru: Открытость
                uk: Открытость
                en: Openness
            - id: opt_2
              text:
                ru: Закрытость
                uk: Закрытость
                en: Closedness
          correct: opt_2
        - id: '104'
          type: speech
          duration_sec: 8
          text:
            ru: 'Закрытость! Спина — самая закрытая поза. Дверь не просто закрыта
              — её замуровали!

              '
            uk: Закрытость! Спина — самая закрытая поза. Дверь не просто закрыта —
              её замуровали!
            en: Closedness! The back is the most closed pose. The door is not just
              closed - it has been bricked up!
        - id: '105'
          type: speech
          duration_sec: 10
          text:
            ru: 'Тело не умеет врать так, как слова. Человек скажет «всё нормально»,
              но если скрестил руки и отвернулся — тело уже всё рассказало. Честный
              болтун!

              '
            uk: Тело не умеет врать так, как слова. Человек скажет «всё нормально»,
              но если скрестил руки и отвернулся — тело уже всё рассказало. Честный
              болтун!
            en: The body can't lie like words can. A person will say “everything is
              fine,” but if he crossed his arms and turned away, the body has already
              told everything. Honest talker!
    - scene_id: sc7
      title:
        ru: Жесты и мимика
        uk: Жесты и мимика
        en: Gestures and facial expressions
      media_ref: 4A.sc7.gestures_mimics
      status: v3_locked
      steps:
        - id: '106'
          type: speech
          duration_sec: 8
          text:
            ru: 'Часть вторая — жесты и мимика.

              '
            uk: Часть вторая — жесты и мимика.
            en: Part two - gestures and facial expressions.
        - id: '107'
          type: speech
          duration_sec: 12
          text:
            ru: 'Жесты — это движения руками. Мы ими пользуемся каждый день, даже
              не замечаем! Попробуйте сказать «вон там» без руки. Не получается, правда?
              Рука сама летит.

              '
            uk: Жесты — это движения руками. Мы ими пользуемся каждый день, даже не
              замечаем! Попробуйте сказать «вон там» без руки. Не получается, правда?
              Рука сама летит.
            en: Gestures are movements of the hands. We use them every day, without
              even noticing! Try saying “over there” without your hand. It doesn't
              work out, does it? The hand flies by itself.
        - id: '108'
          type: speech
          duration_sec: 12
          text:
