          clearly here.
    - id: '80'
      type: vote
      duration_sec: 12
      text:
        ru: '«Или ешь суп, или останешься голодным!»

          '
        uk: «Або їш суп, або лишишся голодним!»
        en: '"Either you eat soup or you''ll stay hungry!"'
      options:
      - id: opt_1
        text:
          ru: Ловушка
          uk: Пастка
          en: Trap
      - id: opt_2
        text:
          ru: Настоящий выбор
          uk: Справжній вибір
          en: Real choice
      correct: opt_1
    - id: '81'
      type: speech
      duration_sec: 10
      text:
        ru: 'Ловушка! Можно съесть часть супа. Можно приготовить что-то другое. Можно перекусить яблоком. Желудок не знает
