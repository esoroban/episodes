    - id: '78'
      type: vote
      duration_sec: 12
      text:
        ru: '«Эта задача или решена правильно, или неправильно.»

          '
        uk: «Це завдання або розв'язано правильно, або неправильно.»
        en: '"This problem is either solved correctly or incorrectly."'
      options:
      - id: opt_1
        text:
          ru: Ловушка
          uk: Пастка
          en: Trap
      - id: opt_2
        text:
          ru: Настоящий выбор
          uk: Справжній вибір
          en: Real choice
      correct: opt_2
    - id: '79'
      type: speech
      duration_sec: 10
      text:
        ru: 'Настоящий выбор! В математике ответ или верный, или нет. Два плюс два не может быть «немножко пять». Тут закон
