          laziness, it''s part of training!'
    - id: '96'
      type: discussion
      duration_sec: 25
      text:
        ru: '«Или ты расскажешь мне секрет, или мы больше не друзья!» Третий вариант? Тут важный!

          '
        uk: «Або ти розповіш мені секрет, або ми більше не друзі!» Третій варіант? Тут важливо!
        en: '"Either you tell me the secret or we''re not friends anymore!" Third option? This one''s important!'
    - id: '97'
      type: speech
      duration_sec: 15
      text:
        ru: 'Наш вариант: «Это не мой секрет, и я не могу его рассказать. Но мы остаёмся друзьями.» Или: «Я расскажу, когда
          буду готов.» Настоящий друг не ставит ультиматумы — и не шантажирует дружбой.

          '
        uk: 'Наш варіант: «Це не мій секрет, і я не можу його розповісти. Але ми лишаємось друзями.» Або: «Я розповім, коли
          буду готовий.» Справжній друг не ставить ультиматум — і не шантажирует дружбою.'
        en: 'Our answer: "This isn''t my secret and I can''t tell it. But we''re still friends." Or: "I''ll tell you when
          I''m ready." A real friend doesn''t give ultimatums - and doesn''t blackmail with friendship.'
    - id: '98'
      type: discussion
      duration_sec: 25
      text:
        ru: '«Или наша школа лучшая в городе, или она самая плохая!» Третий вариант?

          '
        uk: «Або наша школа найкраща в місті, або вона найгірша!» Третій варіант?
        en: '"Either our school is best in town or it''s worst!" Third option?'
    - id: '99'
      type: speech
      duration_sec: 12
      text:
        ru: 'Наш вариант: школа может быть хорошей в чём-то одном и слабой в другом. Сильная в математике, но спортзал маленький.
          Мир не делится на «лучшее» и «худшее» — есть спектр.

          '
        uk: 'Наш варіант: школа може бути доброю в чомусь одному й слабкою в іншому. Сильна в математиці, але спортзал маленький.
          Світ не ділиться на «краще» й «гірше» — є спектр.'
        en: 'Our answer: school can be good at one thing and weak at another. Strong in math, but small gym. The world doesn''t
          divide into "best" and "worst" - there''s a spectrum.'
    - id: '100'
      type: speech
      duration_sec: 15
      text:
        ru: 'И последняя: «Или делай домашку сейчас, или вообще не делай и получай плохую оценку!» Третий вариант найдёте
          сами — к этому моменту вы уже мастера. Можно сделать часть сейчас, часть позже. Попросить помощи. Начать с лёгкого,
          чтобы втянуться.

          '
        uk: 'І остання: «Або роби домашку зараз, або взагалі не роби й отримай погану оцінку!» Третій варіант знайдіть самі
          — до цього моменту ви вже майстри. Можна зробити частину зараз, частину потім. Попросити допомогу. Почати з легкого,
          щоб втянутися.'
        en: 'And the last: "Either do homework now or don''t do it and fail!" Find the third option yourself - by now you''re
          experts. You can do part now, part later. Ask for help. Start with easy things to get into it.'
  - scene_id: sc6
    title:
      ru: 'ЛОВУШКА В ЖИЗНИ: ГДЕ ОНА ПРЯЧЕТСЯ'
      uk: 'ПАСТКА В ЖИТТІ: ДЕ ВОНА ХОВАЄТЬСЯ'
      en: 'THE TRAP IN LIFE: WHERE IT HIDES'
    media_ref: 10A.sc6.real_life_traps
    status: v3_locked
    steps:
    - id: '101'
      type: speech
      duration_sec: 12
      text:
        ru: 'Мы научились находить ловушку и придумывать третий вариант. А теперь — самое интересное. Где «или-или» подстерегает
          нас в реальной жизни? И есть один особо хитрый вид ловушки!

          '
        uk: Ми навчилися знаходити пастку й придумувати третій варіант. А тепер — найцікавіше. Де «або-або» чатує нас у реальному
          житті? І є один особливо хитрий вид пастки!
        en: We learned to spot traps and invent third options. And now - the most interesting part. Where does "either-or"
          ambush us in real life? And there's one especially tricky type of trap!
    - id: '102'
      type: speech
      duration_sec: 15
      text:
        ru: 'Иногда вам дают выбор из двух вариантов — но оба ведут к одному и тому же! Вы думаете, что выбираете. А на самом
          деле выбор уже сделан за вас. Это ловушка «выбор без выбора». Вот пример.

          '
        uk: Іноді вам дають вибір з двох варіантів — але обидва ведуть до одного й того ж! Ви думаєте, що вибираєте. А насправді
          вибір уже зроблений за вас. Це пастка «вибір без вибору». Ось приклад.
        en: Sometimes you're given a choice of two options - but both lead to the same thing! You think you're choosing. But
          the choice was already made for you. This is the "illusion of choice" trap. Here's an example.
    - id: '103'
      type: speech
      duration_sec: 12
      text:
        ru: 'Вечер. Вы играете. Приходит мама и говорит: «Ты пойдёшь спать сейчас — или после того, как уберёшь игрушки?»

          '
        uk: 'Вечір. Ви граєте. Приходить мама й говорить: «Ти пійдеш спати зараз — або після того, як приберешь іграшки?»'
        en: 'Evening. You''re playing. Mom comes and says: "You''ll go to sleep now - or after you pick up your toys?"'
    - id: '104'
      type: vote
      duration_sec: 12
      text:
        ru: 'Что спрятано в этом «выборе»?

          '
        uk: Що спрятано в цьому «виборі»?
        en: What's hidden in this "choice"?
      options:
      - id: opt_1
        text:
          ru: Оба варианта = идёшь спать
          uk: Обидва варіанти = йдеш спати
          en: Both options = you go to sleep
      - id: opt_2
        text:
          ru: Настоящий выбор из двух
          uk: Справжній вибір з двох
          en: Real choice of two
      correct: opt_1
    - id: '105'
      type: speech
      duration_sec: 15
      text:
        ru: 'Оба варианта ведут к одному: ты идёшь спать! Вариант «не спать» вообще не предлагается. Вам дали иллюзию выбора
          — сейчас или после уборки, но спать в обоих случаях. Хитро, правда?

          '
        uk: 'Обидва варіанти ведуть до одного: ти йдеш спати! Варіант «не спати» взагалі не пропонується. Вам дали іллюзію
          вибору — зараз або після прибирання, але спати в обох випадках. Хитро, правда?'
        en: 'Both options lead to one thing: you go to sleep! The "don''t sleep" option isn''t offered. You got an illusion
          of choice - now or after cleanup, but sleep in both cases. Tricky, right?'
    - id: '106'
      type: vote
      duration_sec: 12
      text:
        ru: '«Ты сделаешь уроки до прогулки или после?»

          '
        uk: «Ти зробиш уроки до прогулянки або після?»
        en: '"You''ll do homework before or after the walk?"'
      options:
      - id: opt_1
        text:
          ru: Оба = делаешь уроки
          uk: Обидва = робиш уроки
          en: Both = you do homework
      - id: opt_2
        text:
          ru: Настоящий выбор
          uk: Справжній вибір
          en: Real choice
      correct: opt_1
    - id: '107'
      type: speech
      duration_sec: 10
      text:
        ru: 'Снова оба варианта ведут к урокам! Вопрос «делать ли уроки» даже не обсуждается. Вам разрешили выбрать только
          время — но не само действие.

          '
        uk: Знову обидва варіанти ведуть до уроків! Запитання «робити ли уроки» навіть не обговорюється. Вам дозволили вибрати
          тільки час — але не саму дію.
        en: Again both options lead to homework! The question "should I do homework" isn't even discussed. You were allowed
          to choose only when - but not whether.
    - id: '108'
      type: vote
      duration_sec: 12
      text:
        ru: '«Берёте базовый пакет или премиум?»

          '
        uk: «Беріш базовий пакет або премію?»
        en: '"You''ll buy basic or premium?"'
      options:
      - id: opt_1
        text:
          ru: Оба = покупаешь
          uk: Обидва = купуєш
          en: Both = you buy
      - id: opt_2
        text:
          ru: Настоящий выбор
          uk: Справжній вибір
          en: Real choice
      correct: opt_1
    - id: '109'
      type: speech
      duration_sec: 12
      text:
        ru: 'Продавец гениален! Оба варианта — покупка. Вариант «не покупать» исчез. Вы выбираете не «брать или нет», а «какой
          брать». Ловушка работает на взрослых миллионы лет.

          '
        uk: Продавець геніален! Обидва варіанти — покупка. Варіант «не купувати» зник. Ви вибираєте не «брати або ні», а «який
          брати». Пастка працює на дорослих мільйони років.
        en: The seller is genius! Both options are buying. The "don't buy" option vanished. You're choosing not "buy or not,"
          but "which to buy." The trap works on adults for millions of years.
    - id: '110'
      type: vote
      duration_sec: 12
      text:
        ru: '«Вынесешь мусор до ужина или после?»

          '
        uk: «Винесеш сміття до ужину або після?»
        en: '"You''ll take out trash before or after dinner?"'
      options:
      - id: opt_1
        text:
          ru: Оба = выносишь мусор
          uk: Обидва = выносишь сміття
          en: Both = you take out trash
      - id: opt_2
        text:
          ru: Настоящий выбор
          uk: Справжній вибір
          en: Real choice
      correct: opt_1
    - id: '111'
      type: speech
      duration_sec: 10
      text:
        ru: 'И снова — мусор вы выносите в обоих случаях. Выбор «не выносить» не предлагается. Запомните эту конструкцию —
          она встречается каждый день!

          '
        uk: І знову — сміття ви виносите в обох випадках. Вибір «не виносити» не пропонується. Запам'ятайте цю конструкцію
          — вона трапляється кожен день!
        en: And again - you take out trash in both cases. The "don't take out" option isn't offered. Remember this pattern
          - it happens every day!
    - id: '112'
      type: speech
      duration_sec: 12
      text:
        ru: 'Теперь реклама. Она обожает ловушку «или-или» — и использует её на полную катушку.

          '
        uk: Тепер реклама. Вона обожнює пастку «або-або» — і використовує її на повну силу.
        en: Now advertising. It loves the "either-or" trap - and uses it at full power.
    - id: '113'
      type: vote
      duration_sec: 12
      text:
        ru: '«Купи сейчас со скидкой пятьдесят процентов — или заплати полную цену завтра!»

          '
        uk: «Купи зараз зі знижкою п'ятдесят відсотків — або заплати повну ціну завтра!»
        en: '"Buy now with 50% discount - or pay full price tomorrow!"'
      options:
      - id: opt_1
        text:
          ru: Ловушка
          uk: Пастка
          en: Trap
      - id: opt_2
        text:
          ru: Настоящий выбор
          uk: Справжній вибір
          en: Real choice
      correct: opt_1
    - id: '114'
      type: speech
      duration_sec: 10
      text:
        ru: 'Ловушка! Третий вариант — не покупать вообще. Скидка исчезнет? Ну и пусть. Вещь, которая не нужна, не нужна ни
          за полцены, ни за полную.

          '
        uk: Пастка! Третій варіант — не купувати взагалі. Знижка зникне? Ну й нехай. Річ, яка не потрібна, не потрібна ні
          за половину ціни, ні за повну.
        en: Trap! Third option - don't buy at all. The discount disappears? So what. Something you don't need isn't needed
          at half price or full price.
    - id: '115'
      type: vote
      duration_sec: 12
      text:
        ru: '«Подписка на месяц — десять монет. На год — восемьдесят. Что выбираете?»

          '
        uk: «Підписка на місяць — десять монет. На рік — вісімдесят. Що вибираєш?»
        en: '"Subscription for a month - ten coins. For a year - eighty. What''ll you choose?"'
      options:
      - id: opt_1
        text:
          ru: Оба = подписываешься
          uk: Обидва = підписуєшся
          en: Both = you subscribe
      - id: opt_2
        text:
          ru: Настоящий выбор
          uk: Справжній вибір
          en: Real choice
      correct: opt_1
    - id: '116'
      type: speech
      duration_sec: 10
      text:
        ru: 'Ловушка «выбор без выбора»! Оба варианта — подписка. «Не подписываться» — не предлагается. А может, вам эта подписка
          и не нужна?

          '
        uk: Пастка «вибір без вибору»! Обидва варіанти — підписка. «Не підписуватися» — не пропонується. А може, вам ця підписка
          й не потрібна?
        en: Illusion of choice trap! Both options are subscribing. "Don't subscribe" isn't offered. And maybe you don't need
          this subscription?
    - id: '117'
      type: speech
      duration_sec: 10
      text:
        ru: 'Теперь — ссоры и споры. Тут ловушка бьёт больнее всего.

          '
        uk: Тепер — ссори й суперечки. Тут пастка бьєт больнше за все.
        en: Now - fights and arguments. The trap hurts most here.
    - id: '118'
      type: discussion
      duration_sec: 25
      text:
        ru: '«Или ты извинишься прямо сейчас, или я с тобой больше не разговариваю!» Какой третий вариант?

          '
        uk: «Або ти вибачишся прямо зараз, або я з тобою більше не розмовляю!» Який третій варіант?
        en: '"Either you apologize right now or I''m done talking to you!" What''s the third option?'
    - id: '119'
      type: speech
      duration_sec: 12
      text:
        ru: 'Наш вариант: обсудить, что случилось. Взять паузу и поговорить, когда оба успокоятся. Извиниться за свою часть,
          но объяснить свою точку зрения. Шантаж молчанием — это не решение конфликта.

          '
        uk: 'Наш варіант: обговорити, що сталося. Взяти паузу й поговорити, коли обидва заспокояться. Вибачитися за свою частину,
          але пояснити свою точку зору. Шантаж мовчанням — це не розв''язання конфлікту.'
        en: 'Our answer: discuss what happened. Take a break and talk when both calm down. Apologize for your part but explain
          your view. Blackmail with silence isn''t solving conflict.'
    - id: '120'
      type: discussion
      duration_sec: 25
      text:
        ru: '«Или ты за чистоту в классе, или тебе вообще всё равно на одноклассников!» Третий вариант?

          '
        uk: «Або ти за чистоту в класі, або тебе взагалі не хвилює однокласниці!» Третій варіант?
        en: '"Either you care about class cleanliness or you don''t care about classmates!" Third option?'
    - id: '121'
      type: speech
      duration_sec: 12
      text:
        ru: 'Наш вариант: можно быть за чистоту, но не согласиться с конкретным способом уборки. Или предложить дежурство
          по очереди. «Не согласен с планом» не значит «мне всё равно».

          '
        uk: 'Наш варіант: можна бути за чистоту, але не погодитися з конкретним способом прибирання. Або запропонувати чергування
          по черзі. «Не згоден з планом» не означає «мене все байдужо».'
        en: 'Our answer: you can care about cleanliness but disagree with the cleanup method. Or suggest taking turns. "I
          disagree with the plan" doesn''t mean "I don''t care."'
    - id: '122'
      type: speech
      duration_sec: 12
      text:
        ru: 'И самая коварная ловушка — та, которую вы ставите сами себе. В собственной голове. Без всякой рекламы и без чужих
          слов.

          '
        uk: І найнебезпечніша пастка — та, яку ви ставите самі собі. У власній голові. Без жодної реклами й без чужих слів.
        en: And the most dangerous trap - the one you set for yourself. In your own head. Without ads or anyone else's words.
    - id: '123'
      type: discussion
      duration_sec: 25
      text:
        ru: '«Или я сделаю это идеально — или вообще не буду делать.» Какой третий вариант спрятан?

          '
        uk: «Або я зроблю це ідеально — або взагалі не буду робити.» Який третій варіант спрятаний?
        en: '"Either I''ll do this perfectly - or I won''t do it at all." What''s the hidden third option?'
    - id: '124'
      type: speech
      duration_sec: 12
      text:
        ru: 'Сделать неидеально! Начать и улучшать постепенно. Сделать на семьдесят процентов — это лучше, чем ноль. Перфекционизм
          — одна из самых частых ловушек «или-или» в голове.

          '
        uk: Зробити неідеально! Почати й поліпшувати поступово. Зробити на сімдесят відсотків — це краще, ніж нуль. Перфекціонізм
          — одна з найчастіших пасток «або-або» у голові.
        en: Do it imperfectly! Start and improve gradually. Seventy percent done is better than zero. Perfectionism is one
          of the most common "either-or" traps in your head.
    - id: '125'
      type: speech
      duration_sec: 15
      text:
        ru: 'Запомните три места, где прячется «или-или»: ловушка «выбор без выбора» — когда оба варианта ведут к одному.
          Реклама — когда «не покупать» исчезает. И своя голова — когда вы сами делите мир на чёрное и белое.

          '
        uk: 'Запам''ятайте три місця, де ховається «або-або»: пастка «вибір без вибору» — коли обидва варіанти ведуть до одного.
          Реклама — коли «не купувати» зникає. І своя голова — коли ви самі ділите світ на чорне й біле.'
        en: 'Remember three places where "either-or" hides: the illusion of choice - when both options lead to one. Ads -
          when "don''t buy" disappears. And your own head - when you divide the world into black and white.'
  - scene_id: sc7
    title:
      ru: 'МИНИЛЕКЦИЯ: «ИЛИ ИДЕАЛЬНО — ИЛИ НИКАК»'
      uk: 'МІНІЛЕКЦІЯ: «АБО ІДЕАЛЬНО — АБО НІЯК»'
      en: 'MINI-LECTURE: "EITHER PERFECT OR NOT AT ALL"'
    media_ref: 10A.sc7.perfectionism_trap
    status: v3_locked
    steps:
    - id: '126'
      type: speech
      duration_sec: 15
      text:
        ru: 'А теперь — серьёзный разговор. Мы только что сказали: «или идеально, или не буду делать» — одна из самых частых
          ловушек в голове. Но вы даже не представляете, насколько она опасна. Эта ловушка ломает жизни взрослым людям.

          '
        uk: 'А тепер — серйозна розмова. Ми щойно сказали: «або ідеально, або не буду робити» — одна з найчастіших пасток
          у голові. Але ви навіть не уявляєте, наскільки вона небезпечна. Ця пастка ломає життя дорослим людям.'
        en: 'And now - a serious talk. We just said: "either perfect or I won''t do it" - one of the most common traps in
          your head. But you have no idea how dangerous it is. This trap ruins adult lives.'
    - id: '127'
      type: speech
      duration_sec: 15
      text:
        ru: 'Представьте: человек мечтает написать книгу. У него есть идея, есть время, он садится за стол... и думает: «Или
          я напишу шедевр — или лучше вообще не начинать. Зачем писать плохую книгу?» И не пишет. Год. Два. Десять. Книга
          так и остаётся в голове.

          '
        uk: 'Уявіть: людина мріє написати книгу. У неї є ідея, є час, вона сідає за стіл... і думає: «Або я напишу шедевр
          — або краще взагалі не починати. Навіщо писати погану книгу?» І не пише. Рік. Два. Десять. Книга залишається у голові.'
        en: 'Imagine: someone dreams of writing a book. They have an idea, have time, sit at the desk... and think: "Either
          I''ll write a masterpiece - or don''t start at all. Why write a bad book?" And doesn''t write. One year. Two. Ten.
          The book stays in their head.'
    - id: '128'
      type: speech
      duration_sec: 15
      text:
        ru: 'Другой человек хочет снять фильм. Но думает: «Или это будет лучший фильм года — или я опозорюсь.» И не снимает.
          Сценарий лежит в ящике. Камера пылится. А фильм, который мог бы кого-то рассмешить или заставить задуматься — не
          существует.

          '
        uk: 'Інша людина хоче зняти фільм. Але думає: «Або це буде найкращий фільм року — або я опозорюсь.» І не знімає. Сценарій
          лежить у ящику. Камера пилиться. А фільм, який міг би когось розсмішити або змусити задуматися — не існує.'
        en: 'Another person wants to make a film. But thinks: "Either this will be the best film of the year - or I''ll be
          embarrassed." And doesn''t make it. The script sits in a drawer. The camera gathers dust. And the film that could
          make someone laugh or think - doesn''t exist.'
    - id: '129'
      type: speech
      duration_sec: 15
      text:
        ru: 'Третий человек — учёный. У него есть гипотеза, которая может изменить медицину. Но он думает: «Или я докажу это
          безупречно — или меня засмеют.» И не публикует исследование. Годы проходят. Кто-то другой открывает то же самое.

          '
        uk: 'Третя людина — учена. У неї є гіпотеза, яка може змінити медицину. Але вона думає: «Або я доведу це безупречно
          — або мене засміють.» І не публікує дослідження. Роки проходять. Хтось інший відкриває те ж саме.'
        en: 'Third person is a scientist. They have a hypothesis that could change medicine. But thinks: "Either I''ll prove
          it perfectly - or I''ll be laughed at." And doesn''t publish. Years pass. Someone else discovers the same thing.'
    - id: '130'
      type: speech
      duration_sec: 15
      text:
        ru: 'Четвёртый хочет открыть пекарню. Печёт потрясающие булочки. Все друзья в восторге. Но он думает: «Или моя пекарня
          станет лучшей в городе — или не стоит и пытаться.» Булочки так и остаются только для друзей.

          '
        uk: 'Четвертий хоче відкрити пекарню. Пече чудові булочки. Усі друзі в захваті. Але він думає: «Або моя пекарня стане
          найкращою у місті — або не варто й спробувати.» Булочки лишаються тільки для друзів.'
        en: 'Fourth person wants to open a bakery. Makes amazing rolls. All friends love them. But thinks: "Either my bakery
          will be best in town - or not worth trying." Rolls stay just for friends.'
    - id: '131'
      type: speech
      duration_sec: 15
      text:
        ru: 'Пятый человек хочет научиться рисовать. Берёт карандаш, рисует — получается не очень. И думает: «У меня нет таланта.
          Или красиво — или никак.» Бросает после первого рисунка. А ведь у всех великих художников первый рисунок тоже был
          кривым.

          '
        uk: 'П''ята людина хоче навчитися малювати. Бере олівець, малює — виходить неважко. І думає: «У мене немає таланту.
          Або красиво — або ніяк.» Кидає після першого малюнку. А ж у всіх великих художників перший малюнок теж був кривий.'
        en: 'Fifth person wants to learn to draw. Takes a pencil, draws - doesn''t come out great. And thinks: "I have no
          talent. Either beautifully or not at all." Quits after first drawing. Yet all great artists'' first drawings were
          crooked too.'
    - id: '132'
      type: speech
      duration_sec: 12
      text:
        ru: 'Видите? Во всех этих историях — одна и та же ловушка. «Или идеально — или никак.» И человек выбирает «никак».
          Каждый раз.

          '
        uk: Бачите? У всіх цих історіях — одна й та сама пастка. «Або ідеально — або ніяк.» І людина вибирає «ніяк». Кожен
          раз.
        en: See? All these stories have the same trap. "Either perfect or not at all." And the person chooses "not at all."
          Every time.
    - id: '133'
      type: vote
      duration_sec: 12
      text:
        ru: 'Что лучше: написать неидеальную книгу — или не написать никакой?

          '
        uk: 'Що краще: написати неідеальну книгу — або не написати жодної?'
        en: 'What''s better: write an imperfect book - or write none?'
      options:
      - id: opt_1
        text:
          ru: Неидеальную — но написать
          uk: Неідеальну — але написати
          en: Imperfect - but write
      - id: opt_2
        text:
          ru: Лучше никакой, чем плохую
          uk: Краще ніякої, ніж погану
          en: Better no book than a bad one
      correct: opt_1
    - id: '134'
      type: speech
      duration_sec: 15
      text:
        ru: 'Неидеальную! Потому что неидеальную книгу можно переписать, улучшить, показать друзьям. А книга, которая осталась
          в голове — она не существует вообще. Ноль всегда меньше, чем «неидеально». Всегда.

          '
        uk: Неідеальну! Тому що неідеальну книгу можна переписати, поліпшити, показати друзям. А книга, яка залишилась у голові
          — вона не існує взагалі. Нуль завжди менший, ніж «неідеально». Завжди.
        en: Imperfect! Because an imperfect book can be rewritten, improved, shown to friends. But a book that stayed in your
          head - it doesn't exist. Zero is always less than "imperfect." Always.
    - id: '135'
      type: speech
      duration_sec: 15
      text:
        ru: 'Знаете, что делают успешные люди? Они не ждут идеального момента. Они начинают криво, неуверенно, с ошибками
          — и улучшают по ходу. Первый айфон был неуклюжий. Первый самолёт пролетел двенадцать секунд. Первый блин — всегда
          комом. Но он — существует.

          '
        uk: Знаєте, що роблять успішні люди? Вони не чекають ідеального моменту. Вони починають крозо, невпевнено, з помилками
          — і поліпшують по ходу. Перший айфон був неуклюжий. Перший літак пролетів дванадцять секунд. Перший млинець — завжди
          комом. Але він — існує.
        en: You know what successful people do? They don't wait for the perfect moment. They start awkwardly, uncertainly,
          with mistakes - and improve as they go. First iPhone was clunky. First airplane flew twelve seconds. First pancake
          is always a flop. But it - exists.
    - id: '136'
      type: speech
      duration_sec: 15
      text:
        ru: 'Так что когда поймаете себя на мысли «или идеально — или никак» — вспомните: это ложная дилемма. Третий вариант:
          начать неидеально. И это лучший вариант из всех трёх.

          '
        uk: 'Так що коли ловите себе на думці «або ідеально — або ніяк» — згадайте: це ложна дилема. Третій варіант: почніть
          неідеально. І це найкращий варіант з усіх трьох.'
        en: 'So when you catch yourself thinking "either perfect or not at all" - remember: that''s a false dilemma. The third
          option: start imperfectly. And that''s the best option of all three.'
    - id: '137'
      type: pause
      duration_sec: 5
      text:
        ru: '...

          '
        uk: '...'
        en: '...'
  - scene_id: sc8
    title:
      ru: 'ЗАКРЫТИЕ: МИР НЕ ЧЁРНО-БЕЛЫЙ'
      uk: 'ЗАКРИТТЯ: СВІТ НЕ ЧОРНО-БІЛИЙ'
      en: 'CLOSING: THE WORLD ISN''T BLACK AND WHITE'
    media_ref: 10A.sc8.closing_spectrum
    status: v3_locked
    steps:
    - id: '138'
      type: speech
      duration_sec: 15
      text:
        ru: 'Давайте подумаем, что мы сегодня узнали. Аристотель дал нам закон исключённого третьего — и он прекрасно работает
          для лампочек, чисел и фактов. Но жизнь устроена сложнее лампочки.

          '
        uk: Давайте подумаємо, що ми сьогодні дізналися. Аристотель дав нам закон виключеного третього — і він чудово працює
          для лампочок, чисел і фактів. Але життя влаштовано складніше від лампочки.
        en: Let's think about what we learned today. Aristotle gave us the law of excluded middle - and it works perfectly
          for light bulbs, numbers, and facts. But life is more complex than a light bulb.
    - id: '139'
      type: speech
      duration_sec: 15
      text:
        ru: 'Мир — не чёрно-белая фотография. Он цветной. В нём есть красный, зелёный, синий и ещё миллион оттенков. Между
          «другом» и «врагом» — целая палитра людей. Между «шедевром» и «провалом» — тысяча вариантов.

          '
        uk: Світ — не чорно-біла фотографія. Він кольоровий. В ньому є червоний, зелений, синій і ще мільйон відтінків. Між
          «другом» і «ворогом» — ціла палітра людей. Між «шедевром» і «провалом» — тисяча варіантів.
        en: The world isn't a black and white photo. It's colorful. It has red, green, blue and a million more shades. Between
          "friend" and "enemy" - a whole palette of people. Between "masterpiece" and "flop" - a thousand options.
    - id: '140'
      type: speech
      duration_sec: 15
      text:
        ru: 'Когда кто-то говорит вам «или-или» — это повод остановиться и подумать. Может, это настоящий выбор — как у лампочки.
          А может, кто-то просто спрятал от вас все остальные варианты. И теперь вы знаете волшебный вопрос.

          '
        uk: Коли хтось говорить вам «або-або» — це привід зупинитись і подумати. Може, це справжній вибір — як у лампочки.
          А може, хтось просто спрятав від вас усі інші варіанти. І тепер ви знаєте чарівне запитання.
        en: When someone says "either-or" - that's a reason to stop and think. Maybe it's a real choice - like a light bulb.
          Or maybe someone just hid all other options from you. And now you know the magic question.
    - id: '141'
      type: speech
      duration_sec: 10
      text:
        ru: '«А что если...?» Этот вопрос ломает любую ложную дилемму. Запомните его. Пользуйтесь каждый день. Особенно —
          когда ловушку ставит ваша собственная голова.

          '
        uk: «А що якби...?» Це запитання ломає будь-яку ложну дилему. Запам'ятайте його. Користуйтеся кожен день. Особливо
          — коли пастку ставить ваша власна голова.
        en: '"What if...?" That question breaks any false dilemma. Remember it. Use it every day. Especially - when your own
          head sets the trap.'
    - id: '142'
      type: speech
      duration_sec: 15
      text:
        ru: 'И помните про перфекционизм. Ненаписанная книга хуже плохой. Неснятый фильм хуже любительского. Непопробованное
          — хуже неудачного. Начинайте. Делайте. Улучшайте потом. Мир принадлежит тем, кто начинает неидеально.

          '
        uk: І пам'ятайте про перфекціонізм. Ненаписана книга гірше за погану. Неснятий фільм гірше за аматорський. Непопробоване
          — гірше за невдалу спробу. Починайте. Робіть. Поліпшуйте потім. Світ належить тим, хто починає неідеально.
        en: And remember perfectionism. An unwritten book is worse than a bad one. An unmade film is worse than an amateur
          one. Untried is worse than a failed attempt. Start. Do. Improve later. The world belongs to those who start imperfectly.
    - id: '143'
      type: speech
      duration_sec: 12
      text:
        ru: 'А сейчас — перерыв! После него нас ждёт вторая часть десятого дня. Отдыхайте, и если кто-то скажет вам «или-или»
          — вы знаете, что делать.

          '
        uk: А зараз — перерва! Після неї нас чекає друга частина десятого дня. Відпочивайте, і якщо хтось скаже вам «або-або»
          — ви знаєте, що робити.
        en: And now - a break! After it, we have the second part of day ten. Rest, and if someone says "either-or" to you
          - you know what to do.
    - id: '144'
      type: pause
      duration_sec: 5
      text:
        ru: '...

          '
        uk: '...'
        en: '...'
