lesson:
  id: lesson_10A
  day: 10
  slot: A
  title:
    ru: Или-или
    uk: Або-або
    en: Either-or
  scenes:
  - scene_id: sc1
    title:
      ru: РАЗМИНКА — ПОВТОРЕНИЕ ДНЯ 9 И НЕ ТОЛЬКО
      uk: РОЗМИНКА — ПОВТОРЕННЯ ДНЯ 9 І НЕ ТІЛЬКИ
      en: WARMUP — REVIEW OF DAY 9 AND MORE
    media_ref: 10A.sc1.warmup_review
    status: v3_locked
    steps:
    - id: '1'
      type: speech
      duration_sec: 12
      text:
        ru: 'Десятое занятие! Сегодня разминка длиннее обычного — мы вспомним не только прошлое занятие, но и парочку хитрых
          тем из старых уроков. Поехали!

          '
        uk: Десяте заняття! Сьогодні розминка довша від звичайної — ми згадаємо не тільки минуле заняття, але й кілька хитрих
          тем зі старих уроків. Поїхали!
        en: Tenth lesson! Today's warmup is longer than usual — we'll review not just last lesson, but some tricky topics
          from old lessons. Let's go!
    - id: '2'
      type: speech
      duration_sec: 10
      text:
        ru: 'Начнём со страшных цепочек. Когда одно маленькое событие раздувают в катастрофу вселенского масштаба. Цепочка
          или реальное предупреждение?

          '
        uk: Почнемо з страшних ланцюжків. Коли одну маленьку подію раздувають у катастрофу всесвітного масштабу. Ланцюжок
          або реальне попередження?
        en: Let's start with scary chains. When a small event is blown up into a cosmic catastrophe. Chain or real warning?
    - id: '3'
      type: vote
      duration_sec: 12
      text:
        ru: '«Если не выучишь стихотворение — получишь плохую оценку, останешься на второй год и никогда не окончишь школу!»

          '
        uk: «Якщо не вивчиш вірш — отримаєш погану оцінку, залишишся на другий рік і ніколи не закінчиш школу!»
        en: '''If you don''t learn the poem — you''ll get a bad mark, stay back a year, and never graduate!'''
      options:
      - id: opt_1
        text:
          ru: Страшная цепочка
          uk: Страшна ланцюжок
          en: Scary chain
      - id: opt_2
        text:
          ru: Реальное предупреждение
          uk: Реальне попередження
          en: Real warning
      correct: opt_1
    - id: '4'
      type: speech
      duration_sec: 10
      text:
        ru: 'Цепочка! От одного стихотворения до конца школьной карьеры — это как от упавшей крошки до конца света. Каждый
          шаг всё менее вероятен.

          '
        uk: Ланцюжок! Від одного вірша до кінця шкільної кар'єри — це як від упалої крихти до кінця світу. Кожен крок все
          менш імовірний.
        en: Chain! From one poem to the end of a school career — it's like from a dropped crumb to the end of the world. Each
          step is less likely.
    - id: '5'
      type: vote
      duration_sec: 12
      text:
        ru: '«Если съешь слишком много конфет — зубы заболят, потом все выпадут, и будешь питаться через трубочку до конца
          жизни!»

          '
        uk: «Якщо з'їси занадто багато цукерок — зуби болітимуть, потім все выпадуть, і будеш харчуватися через трубочку до
          кінця життя!»
        en: '''If you eat too many candies — teeth will hurt, then all fall out, and you''ll drink through a straw forever!'''
      options:
      - id: opt_1
        text:
          ru: Страшная цепочка
          uk: Страшна ланцюжок
          en: Scary chain
      - id: opt_2
        text:
          ru: Реальное предупреждение
          uk: Реальне попередження
          en: Real warning
      correct: opt_1
    - id: '6'
      type: speech
      duration_sec: 10
      text:
        ru: 'Цепочка! Да, от конфет могут болеть зубы. Но «все выпадут» и «трубочка навсегда» — это фантастика похлеще любого
          фильма ужасов.

          '
        uk: Ланцюжок! Так, від цукерок можуть болітати зуби. Але «все выпадуть» і «трубочка навсегда» — це фантастика гірша
          за будь-який фільм жахів.
        en: Chain! Yes, candies can hurt teeth. But 'they'll all fall out' and 'straw forever' — that's scarier than any horror
          movie.
    - id: '7'
      type: vote
      duration_sec: 12
      text:
        ru: '«Если не выспишься перед контрольной — будешь хуже соображать и напишешь слабее, чем мог бы.»

          '
        uk: «Якщо не висиш перед контрольною — будеш гірше думати й напишеш слабіше, ніж міг би.»
        en: '''If you don''t sleep before a test — you''ll think worse and write weaker than you could.'''
      options:
      - id: opt_1
        text:
          ru: Страшная цепочка
          uk: Страшна ланцюжок
          en: Scary chain
      - id: opt_2
        text:
          ru: Реальное предупреждение
          uk: Реальне попередження
          en: Real warning
      correct: opt_2
    - id: '8'
      type: speech
      duration_sec: 10
      text:
        ru: 'Реальное предупреждение! Каждый шаг логичен: мало сна → усталость → хуже результат. Мозг правда хуже работает
          без отдыха. Никаких преувеличений.

          '
        uk: 'Реальне попередження! Кожен крок логічний: мало сну → втомленість → гірший результат. Мозок справді гірше працює
          без відпочинку. Ніяких перебільшень.'
        en: 'Real warning! Each step is logical: little sleep → tiredness → worse result. Brain really does work worse without
          rest. No exaggeration.'
    - id: '9'
      type: speech
      duration_sec: 10
      text:
        ru: 'Теперь ложные авторитеты. Помните вопрос-проверку? «Разбирается ли этот человек именно в этом?»

          '
        uk: Тепер хибні авторитети. Пам'ятаєте питання-перевірку? «Розбирається ли цей людина саме в цьому?»
        en: Now false authorities. Remember the check question? 'Does this person know about this specifically?'
    - id: '10'
      type: vote
      duration_sec: 12
      text:
        ru: 'Известная актриса рекомендует учебник по физике.

          '
        uk: Відома акторка рекомендує підручник з фізики.
        en: A famous actress recommends a physics textbook.
      options:
      - id: opt_1
        text:
          ru: Стоит доверять
          uk: Варто довіряти
          en: Should trust
      - id: opt_2
        text:
          ru: Не стоит
          uk: Не варто
          en: Should not
      - id: opt_3
        text:
          ru: Нужно проверить
          uk: Потрібно перевірити
          en: Should check
      correct: opt_2
    - id: '11'
      type: speech
      duration_sec: 10
      text:
        ru: 'Не стоит! Актриса разбирается в кино и ролях. Физика — это к учёным и учителям. Красивая улыбка формулы не проверяет.

          '
        uk: Не варто! Акторка розбирається в кіно та ролях. Фізика — це до науковців та вчителів. Красива посмішка формули
          не перевіряє.
        en: Should not! The actress knows about movies and acting. Physics is for scientists and teachers. A pretty smile
          doesn't check formulas.
    - id: '12'
      type: vote
      duration_sec: 12
      text:
        ru: 'Тренер по плаванию объясняет технику дыхания в воде.

          '
        uk: Тренер з плавання пояснює техніку дихання у воді.
        en: A swimming coach explains breathing technique in water.
      options:
      - id: opt_1
        text:
          ru: Стоит доверять
          uk: Варто довіряти
          en: Should trust
      - id: opt_2
        text:
          ru: Не стоит
          uk: Не варто
          en: Should not
      - id: opt_3
        text:
          ru: Нужно проверить
          uk: Потрібно перевірити
          en: Should check
      correct: opt_1
    - id: '13'
      type: speech
      duration_sec: 8
      text:
        ru: 'Стоит! Это его область. Тренер по плаванию знает о дыхании в воде больше, чем рыба. Ну, почти.

          '
        uk: Варто! Це його область. Тренер з плавання знає про дихання у воді більше, ніж риба. Ну, майже.
        en: Should! This is his area. A swimming coach knows about breathing in water better than a fish. Well, almost.
    - id: '14'
      type: vote
      duration_sec: 12
      text:
        ru: 'Популярный геймер советует, какой университет выбрать.

          '
        uk: Популярний геймер радить, який університет обрати.
        en: A popular gamer advises which university to choose.
      options:
      - id: opt_1
        text:
          ru: Стоит доверять
          uk: Варто довіряти
          en: Should trust
      - id: opt_2
        text:
          ru: Не стоит
          uk: Не варто
          en: Should not
      - id: opt_3
        text:
          ru: Нужно проверить
          uk: Потрібно перевірити
          en: Should check
      correct: opt_2
    - id: '15'
      type: speech
      duration_sec: 10
      text:
        ru: 'Не стоит! Геймер — эксперт в играх, не в образовании. Тут нужен карьерный консультант, а не человек с тысячей
          часов в Майнкрафте.

          '
        uk: Не варто! Геймер — експерт в іграх, не в освіті. А якщо сам не закінчив університет — то подвійно не варто.
        en: Shouldn't! Gamer is an expert in games, not education. And if they didn't finish university themselves - definitely
          not.
    - id: '16'
      type: speech
      duration_sec: 12
      text:
        ru: 'А теперь прыжок назад! Помните причину и следствие? Два события происходят рядом — и мы решаем, что одно вызвало
          другое. Но так ли это?

          '
        uk: А тепер — стрибок назад! Пам'ятаєте причину й наслідок? Дві подіїтрапляються поруч — і ми вирішуємо, що одна викликала
          іншу. Але так ли це?
        en: And now - jump back! Remember cause and effect? Two events happen together - and we decide one caused the other.
          But is that true?
    - id: '17'
      type: vote
      duration_sec: 12
      text:
        ru: '«Каждый раз, когда надеваю зелёную футболку, наша команда выигрывает. Значит, футболка приносит удачу!»

          '
        uk: «Кожен раз, коли вдягаю зелену футболку, наша команда виграє. Значить, футболка приносить удачу!»
        en: '"Every time I wear a green shirt, our team wins. So the shirt brings luck!"'
      options:
      - id: opt_1
        text:
          ru: Причина
          uk: Причина
          en: Cause
      - id: opt_2
        text:
          ru: Совпадение
          uk: Збіг
          en: Coincidence
      correct: opt_2
    - id: '18'
      type: speech
      duration_sec: 10
      text:
        ru: 'Совпадение! Футболка не умеет забивать голы. Она даже бегать не может. Команда выигрывает потому что тренировалась,
          а не потому что кто-то надел зелёное.

          '
        uk: Збіг! Футболка не вміє забивати голи. Вона навіть бігти не може. Команда виграє, тому що тренувалася, а не тому
          що хтось надягнув зелене.
        en: Coincidence! A shirt can't score goals. It can't even run. The team wins because they trained, not because someone
          wore green.
    - id: '19'
      type: vote
      duration_sec: 12
      text:
        ru: '«Когда на улице холодно, люди чаще болеют простудой.»

          '
        uk: «Коли на вулиці холодно, люди частіше хворіють простудою.»
        en: '"When it''s cold outside, people catch colds more often."'
      options:
      - id: opt_1
        text:
          ru: Причина
          uk: Причина
          en: Cause
      - id: opt_2
        text:
          ru: Совпадение
          uk: Збіг
          en: Coincidence
      correct: opt_1
    - id: '20'
      type: speech
      duration_sec: 12
      text:
        ru: 'Причина! Холод ослабляет защиту организма, и вирусам проще атаковать. Это подтверждено исследованиями — не суеверие,
          а наука.

          '
        uk: Причина! Холод послаблює захист організму, і вірусам легше атакувати. Це підтверджено дослідженнями — не забобон,
          а наука.
        en: Cause! Cold weakens the body's defenses, and viruses can attack more easily. This is confirmed by research - not
          superstition, but science.
    - id: '21'
      type: speech
      duration_sec: 12
      text:
        ru: 'И напоследок — пугало! Помните? Когда кто-то искажает ваши слова, чтобы легче «победить». Спорят не с тем, что
          вы сказали, а с тем, что сами придумали.

          '
        uk: І наостанок — лякало! Пам'ятаєте? Коли хтось спотворює ваші слова, щоб легше «перемогти». Сперечаються не з тим,
          що ви сказали, а з тим, що самі придумали.
        en: And finally - the strawman! Remember? When someone twists your words to "win" more easily. They argue not against
          what you said, but against what they invented.
    - id: '22'
      type: vote
      duration_sec: 12
      text:
        ru: 'Маша: «Мне не очень понравился этот фильм.» Петя: «Маша говорит, что все фанаты этого фильма — глупые!»

          '
        uk: 'Маша: «Мені не дуже сподобався цей фільм.» Петя: «Маша говорить, що всі фанати цього фільму — дурні!»'
        en: 'Masha: "I didn''t really like this movie." Petya: "Masha says all fans of this movie are stupid!"'
      options:
      - id: opt_1
        text:
          ru: Да, это пугало
          uk: Так, це лякало
          en: Yes, that's a strawman
      - id: opt_2
        text:
          ru: Нет, всё точно
          uk: Ні, все точно
          en: No, that's accurate
      correct: opt_1
    - id: '23'
      type: speech
      duration_sec: 10
      text:
        ru: 'Пугало! Маша сказала только про себя — «мне не понравился». Петя раздул это до оскорбления всех фанатов. Классика
          — удобнее атаковать выдумку.

          '
        uk: Лякало! Маша сказала тільки про себе — «мені не сподобалося». Петя раздув це до образи всіх фанатів. Класика —
          зручніше атакувати вигадку.
        en: Strawman! Masha only talked about herself - "I didn't like it." Petya blew this up into insulting all fans. Classic
          - easier to attack the made-up version.
    - id: '24'
      type: vote
      duration_sec: 12
      text:
        ru: 'Дима: «Домашних заданий задают слишком много.» Учитель: «Дима считает, что учиться вообще не нужно!»

          '
        uk: 'Дима: «Домашніх завдань задають занадто багато.» Учитель: «Дима вважає, що навчатися взагалі не потрібно!»'
        en: 'Dima: "They assign too much homework." Teacher: "Dima thinks we shouldn''t study at all!"'
      options:
      - id: opt_1
        text:
          ru: Да, это пугало
          uk: Так, це лякало
          en: Yes, that's a strawman
      - id: opt_2
        text:
          ru: Нет, всё точно
          uk: Ні, все точно
          en: No, that's accurate
      correct: opt_1
    - id: '25'
      type: speech
      duration_sec: 10
      text:
        ru: 'Пугало! «Слишком много домашки» и «учиться не нужно» — совершенно разные вещи. Дима не против учёбы — он против
          завалов.

          '
        uk: Лякало! «Занадто багато домашки» і «навчатися не потрібно» — абсолютно різні речи. Дима не проти навчання — він
          проти завалів.
        en: Strawman! "Too much homework" and "shouldn't study" are completely different. Dima isn't against studying - he's
          against being overwhelmed.
    - id: '26'
      type: speech
      duration_sec: 12
      text:
        ru: 'Отлично! Цепочки, авторитеты, причины и пугала — всё на месте. Голова работает! Теперь мы готовы к новой теме
          — и она будет хитрая.

          '
        uk: Відмінно! Ланцюги, авторитети, причини й лякала — все на місці. Голова працює! Тепер ми готові до нової теми —
          і вона буде хитра.
        en: Great! Chains, authorities, causes, and strawmen - everything in place. Brain is working! Now we're ready for
          a new topic - and it's tricky.
  - scene_id: sc2
    title:
      ru: ИСТОРИЯ — ДЕНЬ «ИЛИ-ИЛИ»
      uk: ІСТОРІЯ — ДЕНЬ «АБО-АБО»
      en: STORY - THE "EITHER-OR" DAY
    media_ref: 10A.sc2.story_false_dilemma
    status: v3_locked
    steps:
    - id: '27'
      type: speech
      duration_sec: 12
      text:
        ru: 'А теперь — история. Один из самых тяжёлых дней в жизни Дмитрика. Ну, ему так казалось. Четыре ловушки за один
          день — и он попался на каждую. Всё началось за завтраком.

          '
        uk: А тепер — історія. Один з найважчих днів у житті Дмитрика. Ну, йому так здавалось. Чотири пастки за один день
          — і він попався на кожну. Все почалося за сніданком.
        en: And now - a story. One of the hardest days in Dmytryk's life. Well, that's how it felt to him. Four traps in one
          day - and he fell for each one. It started at breakfast.
    - id: '28'
      type: speech
      duration_sec: 15
      text:
        ru: 'Старший брат Тарас берёт Дмитриков бутерброд с шоколадной пастой. Просто берёт и говорит: «Или отдаёшь мне бутерброд,
          или я расскажу маме, что ты вчера до полуночи играл на планшете. Решай!»

          '
        uk: 'Старший брат Тарас бере Дмитриків бутерброд з шоколадною пастою. Просто бере й говорить: «Або віддаєш мені бутерброд,
          або я розповім мамі, що ти вчора до полуночі грав на планшеті. Вирішуй!»'
        en: 'Older brother Taras takes Dmytryk''s chocolate sandwich. Just takes it and says: "Either give me the sandwich,
          or I''ll tell mom you played on your tablet until midnight. Choose!"'
    - id: '29'
      type: speech
      duration_sec: 12
      text:
        ru: 'Дмитрик подумал: вариант один — отдать. Вариант два — мама узнает. Других вариантов нет. Бутерброд уехал к Тарасу.
          Утро испорчено.

          '
        uk: 'Дмитрик подумав: варіант один — віддати. Варіант два — мама дізнається. Інших варіантів немає. Бутерброд поїхав
          до Тараса. Ранок випорчений.'
        en: 'Dmytryk thought: option one - give it up. Option two - mom finds out. No other options. The sandwich went to
          Taras. Morning ruined.'
    - id: '30'
      type: speech
      duration_sec: 15
      text:
        ru: 'В школе на перемене подходит Микола. «Мы играем в футбол! Или ты с нами прямо сейчас, или ты нам вообще не друг.
          Всё. Решай!» А Дмитрик хотел дорисовать робота для конкурса.

          '
        uk: У школі на перерві підходить Микола. «Ми граємо у футбол! Або ти з нами прямо зараз, або ти нам взагалі не друг.
          Все. Вирішуй!» А Дмитрик хотів добарвити робота для конкурсу.
        en: At school during break, Mykola comes up. "We're playing football! Either you join us right now, or you're not
          our friend at all. That's it! Choose!" But Dmytryk wanted to finish drawing his robot for the competition.
    - id: '31'
      type: speech
      duration_sec: 12
      text:
        ru: 'Два варианта: футбол или потеря друзей. Дмитрик бросил робота и пошёл играть. Робот остался недорисованным. Настроение
          — ещё хуже.

          '
        uk: 'Два варіанти: футбол або втрата друзів. Дмитрик кинув робота й пішов грати. Робот залишився недозавершеним. Настрій
          — ще гірше.'
        en: 'Two options: football or losing friends. Dmytryk dropped the robot and went to play. The robot stayed unfinished.
          Mood - even worse.'
    - id: '32'
      type: speech
      duration_sec: 15
      text:
        ru: 'После школы звонит Василь: «Или мы идём к речке прямо сейчас, или я иду с Петром и больше тебя не зову. Никогда!»
          А у Дмитрика домашка по математике не сделана.

          '
        uk: 'Після школи дзвонить Василь: «Або ми йдемо до річки прямо зараз, або я йду з Петром і більше тебе не запрошую.
          Ніколи!» А у Дмитрика домашка з математики не зроблена.'
        en: 'After school, Vasyl calls: "Either we go to the river right now, or I''m going with Petro and I''ll never invite
          you again. Ever!" But Dmytryk hasn''t done his math homework.'
    - id: '33'
      type: speech
      duration_sec: 12
      text:
        ru: 'Дмитрик пошёл к речке. Домашка осталась. Вечером он сел за задачи, не может решить четвёртый номер, и думает...

          '
        uk: Дмитрик пішов до річки. Домашка залишилась. Увечері він сів за завдання, не може розв'язати четвертий номер, і
          думає...
        en: Dmytryk went to the river. The homework was left. In the evening he sat down with the assignments, can't solve
          number four, and thinks...
    - id: '34'
      type: speech
      duration_sec: 12
      text:
        ru: '«Или я решу всё идеально — или я вообще бездарность. Все нормальные люди решают, а я не могу.» Глаза на мокром
          месте. День ужасный.

          '
        uk: «Або я розв'яжу все ідеально — або я взагалі без здібностей. Усі нормальні люди розв'язують, а я не можу.» Очі
          на мокрому місці. День жахливий.
        en: '"Either I solve everything perfectly - or I''m completely hopeless. Everyone normal can solve it, but I can''t."
          Eyes are wet. Horrible day.'
    - id: '35'
      type: speech
      duration_sec: 12
      text:
        ru: 'Тут звонит Оленка — спросить про домашку. Слышит, что Дмитрик расстроен. Он рассказывает ей про свой день. И
          тут Оленка задаёт странный вопрос.

          '
        uk: Тут дзвонить Олена — запитати про домашку. Чує, що Дмитрик розстроєний. Він розповідає їй про свій день. І тут
          Олена задає дивне запитання.
        en: Then Olena calls - asking about homework. She hears Dmytryk is upset. He tells her about his day. And then Olena
          asks a strange question.
    - id: '36'
      type: speech
      duration_sec: 12
      text:
        ru: '«Подожди. Тарас сказал: или бутерброд, или он расскажет маме. А ты подумал — какие ещё варианты были?» Дмитрик:
          «Какие ещё? Только два!»

          '
        uk: '«Зупинися. Тарас сказав: або бутерброд, або він розповість мамі. А ти подумав — які ще варіанти були?» Дмитрик:
          «Які ще? Тільки два!»'
        en: '"Wait. Taras said: either the sandwich or he tells mom. But did you think - what other options were there?" Dmytryk:
          "What others? Only two!"'
    - id: '37'
      type: discussion
      duration_sec: 25
      text:
        ru: 'А как думаете вы? Какие ещё варианты были у Дмитрика с бутербродом? Что бы вы предложили?

          '
        uk: А як ви думаєте? Які ще варіанти були у Дмитрика з бутербродом? Що б ви запропонували?
        en: What do you think? What other options did Dmytryk have with the sandwich? What would you suggest?
    - id: '38'
      type: speech
      duration_sec: 15
      text:
        ru: 'Оленка: «Мог сказать — расскажи, я сам маме объясню и извинюсь. Мог предложить — давай разделим пополам. Мог
          сказать — ладно, рассказывай, мне не страшно. Это уже три варианта, а не два!»

          '
        uk: 'Олена: «Міг сказати — розповідай, я сам мамі поясню й вибачуся. Міг запропонувати — давай розділимо навпіл. Міг
          сказати — ладно, розповідай, мені не страшно. Це вже три варіанти, а не два!»'
        en: 'Olena: "Could have said - go ahead, I''ll explain to mom and apologize myself. Could have offered - let''s split
          it. Could have said - okay, go ahead, I''m not scared. That''s already three options, not two!"'
    - id: '39'
      type: speech
      duration_sec: 12
      text:
        ru: '«А с футболом? Микола сказал — или играй, или не друзья. Но разве дружба исчезает от одной пропущенной игры?»

          '
        uk: «А з футболом? Микола сказав — або граю, або не друзі. Але чи дружба зникає від однієї пропущеної гри?»
        en: '"And football? Mykola said - either play or not friends. But does friendship disappear from one missed game?"'
    - id: '40'
      type: vote
      duration_sec: 12
      text:
        ru: 'Были ли у Дмитрика другие варианты с футболом, кроме «играй или не друзья»?

          '
        uk: Були ли у Дмитрика інші варіанти з футболом, крім «граю або не друзі»?
        en: Did Dmytryk have other options with football, besides "play or not friends"?
      options:
      - id: opt_1
        text:
          ru: Да, были
          uk: Так, були
          en: Yes, there were
      - id: opt_2
        text:
          ru: Нет, только два
          uk: Ні, тільки два
          en: No, only two
      correct: opt_1
    - id: '41'
      type: speech
      duration_sec: 15
      text:
        ru: 'Конечно! Мог сказать: «Приду через пятнадцать минут, дорисую робота.» Мог болеть за команду с рисунком в руках.
          Мог предложить сыграть на следующей перемене. Дружба не ломается от одного «нет»!

          '
        uk: 'Звичайно! Міг сказати: «Прийду через п''ятнадцять хвилин, добарвлю робота.» Міг боління за команду з малюнком
          у руках. Міг запропонувати зіграти на наступній перерві. Дружба не ламається від однієї «ні»!'
        en: 'Of course! Could have said: "I''ll come in fifteen minutes, finish the robot." Could have cheered for the team
          while holding the drawing. Could have suggested playing at the next break. Friendship doesn''t break from one "no"!'
    - id: '42'
      type: speech
      duration_sec: 10
      text:
        ru: '«А с речкой? Василь сказал — или сейчас, или больше не позову. Это правда?»

          '
        uk: «А з річкою? Василь сказав — або зараз, або більше не запрошую. Це правда?»
        en: '"And the river? Vasyl said - either now or I''ll never invite you. Is that true?"'
    - id: '43'
      type: vote
      duration_sec: 12
      text:
        ru: '«Или идём к речке сейчас, или больше не позову» — это ловушка или честный выбор?

          '
        uk: «Або йдемо до річки зараз, або більше не запрошую» — це пастка або чесний вибір?
        en: '"Either go to the river now or I''ll never invite you again" - is that a trap or honest choice?'
      options:
      - id: opt_1
        text:
          ru: Ловушка
          uk: Пастка
          en: Trap
      - id: opt_2
        text:
          ru: Честный выбор
          uk: Чесний вибір
          en: Honest choice
      correct: opt_1
    - id: '44'
      type: speech
      duration_sec: 12
      text:
        ru: 'Ловушка! Мог пойти после домашки. Мог предложить завтра. Речка никуда не денется, и Василь тоже — настоящие друзья
          так не пропадают.

          '
        uk: Пастка! Міг піти після домашки. Міг запропонувати завтра. Річка нікуди не денеться, і Василь теж — справжні друзі
          так не зникають.
        en: Trap! Could have gone after homework. Could have suggested tomorrow. The river isn't going anywhere, and neither
          is Vasyl - real friends don't disappear like that.
    - id: '45'
      type: speech
      duration_sec: 15
      text:
        ru: 'И самое хитрое. «Или идеально — или я бездарность» — это Дмитрик сказал сам себе! Оленка: «Между "идеально" и
          "бездарность" есть: хорошо, нормально, "пока не получается, но я учусь"...»

          '
        uk: 'І найхитріше. «Або ідеально — або я без здібностей» — це Дмитрик сказав сам собі! Олена: «Між ''ідеально'' і
          ''без здібностей'' є: добре, нормально, ''поки не виходить, але я вчусь''...»'
        en: 'And the trickiest. "Either perfectly or I''m hopeless" - Dmytryk said that to himself! Olena: "Between ''perfectly''
          and ''hopeless'' there''s: good, okay, ''still learning but trying''..."'
    - id: '46'
      type: speech
      duration_sec: 15
      text:
        ru: 'Дмитрик замолчал. А потом говорит: «Подожди... Весь день мне говорили "или-или", и я каждый раз верил, что вариантов
          только два? Даже собственная голова меня обманула?!»

          '
        uk: 'Дмитрик замовк. А потім говорить: «Зупинися... Весь день мені говорили ''або-або'', і я кожен раз вірив, що варіантів
          тільки два? Навіть власна голова мене обманула?!»'
        en: 'Dmytryk fell silent. Then says: "Wait... All day people said ''either-or'' to me, and I believed there were only
          two options? Even my own head fooled me?!"'
    - id: '47'
      type: speech
      duration_sec: 12
      text:
        ru: 'Оленка: «Именно! Эта ловушка называется — ложная дилемма. Когда говорят "или так, или так" — а на самом деле
          вариантов гораздо больше. И ты сегодня попался четыре раза!»

          '
        uk: 'Олена: «Саме так! Ця пастка називається — ложна дилема. Коли говорять ''або так, або так'' — а насправді варіантів
          набагато більше. І ти сьогодні попався чотири рази!»'
        en: 'Olena: "Exactly! This trap is called - false dilemma. When someone says ''either-or'' - but there are actually
          many more options. And you fell for it four times today!"'
  - scene_id: sc3
    title:
      ru: ТРИ ЗАКОНА АРИСТОТЕЛЯ
      uk: ТРИ ЗАКОНИ АРИСТОТЕЛЯ
      en: THREE LAWS OF ARISTOTLE
    media_ref: 10A.sc3.aristotle_laws
    status: v3_locked
    steps:
    - id: '48'
      type: speech
      duration_sec: 12
      text:
        ru: 'А теперь — кое-что серьёзное. Знаете, кто первым задумался про «или-или»? Древнегреческий философ Аристотель.
          Две тысячи триста лет назад!

          '
        uk: А тепер — кое-що серйозне. Знаєте, хто перший задумався про «або-або»? Древньогрецький філософ Аристотель. Дві
          тисячи триста років тому!
        en: Now - something serious. Do you know who first thought about "either-or"? Ancient Greek philosopher Aristotle.
          Twenty-three hundred years ago!
    - id: '49'
      type: speech
      duration_sec: 12
      text:
        ru: 'Аристотель придумал три закона мышления. Мы уже знаем два — давайте вспомним. Первый закон — закон тождества.
          Звучит страшно, а на деле просто.

          '
        uk: Аристотель придумав три закони мислення. Ми вже знаємо два — давайте згадаємо. Перший закон — закон тотожності.
          Звучить страшно, а насправді просто.
        en: Aristotle came up with three laws of thought. We already know two - let's remember. First law - the law of identity.
          Sounds scary, but it's simple.
    - id: '50'
      type: speech
      duration_sec: 12
      text:
        ru: 'Кошка — это кошка. Не собака, не попугай, не бутерброд. Если мы договорились, что речь о кошке — значит, о кошке.
          Слова не меняют значение посреди разговора.

          '
        uk: Кіт — це кіт. Не собака, не папуга, не бутерброд. Якщо ми домовилися, що йдеться про кота — значить, про кота.
          Слова не змінюють значення посередині розмови.
        en: A cat is a cat. Not a dog, not a parrot, not a sandwich. If we agreed we're talking about a cat - then it's about
          a cat. Words don't change meaning in the middle of conversation.
    - id: '51'
      type: speech
      duration_sec: 12
      text:
        ru: 'Второй закон — закон непротиворечия. Лампа не может быть одновременно включена и выключена. Нельзя одновременно
          сидеть и стоять. Утверждение не может быть одновременно правдой и неправдой.

          '
        uk: Другий закон — закон несупереч́ності. Лампа не може бути одночасно ввімкнута й вимкнута. Неможна одночасно сидіти
          й стояти. Твердження не може бути одночасно правдою й неправдою.
        en: Second law - the law of non-contradiction. A lamp can't be on and off at the same time. You can't sit and stand
          simultaneously. A statement can't be both true and false.
    - id: '52'
      type: speech
      duration_sec: 12
      text:
        ru: 'А сегодня — третий закон. Самый хитрый. Закон исключённого третьего. Запомните это название — оно вам ещё пригодится.

          '
        uk: А сьогодні — третій закон. Найхитріший. Закон виключеного третього. Запам'ятайте цю назву — вона вам ще знадобиться.
        en: And today - the third law. The trickiest. The law of excluded middle. Remember this name - you'll need it.
    - id: '53'
      type: speech
      duration_sec: 15
      text:
        ru: 'Закон звучит так: или утверждение истинно — или оно ложно. Третьего варианта нет. Или лампа включена — или выключена.
          Или число чётное — или нечётное. Или сейчас день — или не день. Всё. Точка. Середины нет.

          '
        uk: 'Закон звучить так: або твердження істинне — або воно неправде. Третього варіанту немає. Або лампа ввімкнута —
          або вимкнута. Або число парне — або непарне. Або зараз день — або не день. Все. Точка. Серединки немає.'
        en: 'The law goes: either a statement is true - or it''s false. There''s no third option. Either the lamp is on -
          or off. Either a number is even - or odd. Either it''s day - or not day. That''s it. Period. No middle ground.'
    - id: '54'
      type: vote
      duration_sec: 12
      text:
        ru: '«Вода в чайнике или кипит, или не кипит.»

          '
        uk: «Вода в чайнику або кипить, або не кипить.»
        en: '"Water in a kettle is either boiling or not boiling."'
      options:
      - id: opt_1
        text:
          ru: Закон работает
          uk: Закон працює
          en: Law works
      - id: opt_2
        text:
          ru: Есть третий вариант
          uk: Є третій варіант
          en: There's a third option
      correct: opt_1
    - id: '55'
      type: speech
      duration_sec: 10
      text:
        ru: 'Закон работает! Кипение — это конкретная температура, сто градусов. Вода или достигла её, или нет. Чайник не
          может «немножко кипеть».

          '
        uk: Закон працює! Кипіння — це конкретна температура, сто градусів. Вода або досягла її, або ні. Чайник не може «трошки
          кипіти».
        en: Law works! Boiling is a specific temperature, a hundred degrees. Water either reached it or didn't. A kettle can't
          "partially boil."
    - id: '56'
      type: vote
      duration_sec: 12
      text:
        ru: '«Ты или голоден, или сыт.»

          '
        uk: «Ти або голодний, або ситий.»
        en: '"You''re either hungry or full."'
      options:
      - id: opt_1
        text:
          ru: Закон работает
          uk: Закон працює
          en: Law works
      - id: opt_2
        text:
          ru: Есть третий вариант
          uk: Є третій варіант
          en: There's a third option
      correct: opt_2
    - id: '57'
      type: speech
      duration_sec: 12
      text:
        ru: 'Есть третий вариант! Можно быть «не голоден, но съел бы пирожок». Или «вроде поел, но чего-то хочется». Голод
          — это не лампочка, у него есть оттенки.

          '
        uk: Є третій варіант! Можна бути «не голодним, але з'їв би пиріжок». Або «їв-їв, але щось хочеться». Голод — це не
          лампочка, у нього є відтінки.
        en: There's a third option! You can be "not hungry but would eat a pie." Or "ate but still want something." Hunger
          isn't a light switch, it has shades.
    - id: '58'
      type: speech
      duration_sec: 15
      text:
        ru: 'И вот тут самое важное. Аристотель придумал закон для простых логических утверждений — включено или выключено,
          правда или нет, чётное или нечётное. Для лампочек, чисел и фактов закон работает идеально.

          '
        uk: І ось тут найважливіше. Аристотель придумав закон для простих логічних тверджень — ввімкнуто або вимкнуто, правда
          або ні, парне або непарне. Для лампочок, чисел і фактів закон працює ідеально.
        en: And here's the most important part. Aristotle invented the law for simple logical statements - on or off, true
          or false, even or odd. For light bulbs, numbers, and facts, the law works perfectly.
    - id: '59'
      type: speech
      duration_sec: 15
      text:
        ru: 'Но люди начали применять его ко всему подряд! «Или ты мне друг, или враг.» «Или отличник, или ничтожество.» «Или
          со мной, или против меня.» Взяли закон для лампочек — и натянули его на жизнь!

          '
        uk: Але люди почали застосовувати його до всього підряд! «Або ти мені друг, або ворог.» «Або відмінник, або нікчема.»
          «Або зі мною, або проти мене.» Взяли закон для лампочок — і натягнули його на життя!
        en: But people started applying it to everything! "Either you're my friend or my enemy." "Either an excellent student
          or worthless." "Either with me or against me." They took a law for light bulbs - and stretched it over life!
    - id: '60'
      type: speech
      duration_sec: 12
      text:
        ru: 'А жизнь — не лампочка. Между «другом» и «врагом» есть приятель, знакомый, одноклассник, сосед. Между «отличником»
          и «бездарностью» — целый спектр!

          '
        uk: А життя — не лампочка. Між «другом» і «ворогом» є товариш, знайомий, однокласник, сусід. Між «відмінником» і «нікчемою»
          — цілий спектр!
        en: But life isn't a light bulb. Between "friend" and "enemy" there's acquaintance, classmate, neighbor. Between "excellent
          student" and "worthless" - an entire spectrum!
    - id: '61'
      type: vote
      duration_sec: 12
      text:
        ru: '«Дверь или открыта, или закрыта.»

          '
        uk: «Двері або відкриті, або зачинені.»
        en: '"A door is either open or closed."'
      options:
      - id: opt_1
        text:
          ru: Закон работает
          uk: Закон працює
          en: Law works
      - id: opt_2
        text:
          ru: Есть третий вариант
          uk: Є третій варіант
          en: There's a third option
      correct: opt_2
    - id: '62'
      type: speech
      duration_sec: 10
      text:
        ru: 'Есть третий вариант! Дверь может быть приоткрыта. Аристотель бы удивился, но дверь хитрее лампочки — у неё бесконечное
          количество положений.

          '
        uk: Є третій варіант! Двері можуть бути приочинені. Аристотель би здивувався, але двері хитріші за лампочку — у неї
          нескінченна кількість положень.
        en: There's a third option! A door can be ajar. Aristotle would be surprised, but doors are trickier than light bulbs
          - they have infinite positions.
    - id: '63'
      type: vote
      duration_sec: 12
      text:
        ru: '«Сегодня или вторник, или не вторник.»

          '
        uk: «Сьогодні або вівторок, або не вівторок.»
        en: '"Today is either Tuesday or not Tuesday."'
