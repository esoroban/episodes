    - id: '65'
      type: speech
      duration_sec: 15
      text:
        ru: 'Итак, вот главный секрет. Когда слышите «или-или» — проверяйте: это настоящий выбор из двух, как у лампочки?
          Или кто-то натянул закон для лампочек на живую сложную жизнь?

          '
        uk: 'Отже, ось головний секрет. Коли чуєте «або-або» — перевіряйте: це справжній вибір з двох, як у лампочки? Або
          хтось натягнув закон для лампочок на живу складну життя?'
        en: 'So, here''s the main secret. When you hear "either-or" - check: is this a real choice of two, like a light bulb?
          Or did someone stretch a law for light bulbs over complex real life?'
    - id: '66'
      type: speech
      duration_sec: 12
      text:
        ru: 'Фразы-ловушки, которые выдают ложную дилемму: «или... или...», «или ты с нами, или против нас», «есть только
          два пути», «третьего не дано». Услышали — насторожились!

          '
        uk: 'Фрази-пастки, які видають ложну дилему: «або... або...», «або ти з нами, або проти нас», «є тільки два шляхи»,
          «третього не дано». Почули — насторожилися!'
        en: 'Trap phrases that signal false dilemma: "either-or," "either you''re with us or against us," "there are only
          two ways," "no third option." Hear them - be alert!'
  - scene_id: sc4
    title:
      ru: 'ПРАКТИКА: ЛОВУШКА ИЛИ НАСТОЯЩИЙ ВЫБОР?'
      uk: 'ПРАКТИКА: ПАСТКА АБО СПРАВЖНІЙ ВИБІР?'
      en: 'PRACTICE: TRAP OR REAL CHOICE?'
    media_ref: 10A.sc4.practice_trap_or_real
    status: v3_locked
    steps:
    - id: '67'
      type: speech
      duration_sec: 12
      text:
        ru: 'Время практики! Я читаю утверждение «или-или». Ваша задача — определить: это настоящий выбор из двух, как у лампочки?
          Или ложная дилемма, и вариантов на самом деле больше?

          '
        uk: 'Час практики! Я читаю твердження «або-або». Ваша завдання — визначити: це справжній вибір з двох, як у лампочки?
          Або ложна дилема, і варіантів насправді більше?'
        en: 'Time to practice! I read an "either-or" statement. Your job - determine: is this a real choice of two, like a
          light bulb? Or a false dilemma, and there are actually more options?'
    - id: '68'
      type: vote
      duration_sec: 12
      text:
        ru: '«Или ты за нашу команду, или ты предатель!»

          '
        uk: «Або ти за нашу команду, або ти зрадник!»
        en: '"Either you''re for our team or you''re a traitor!"'
