        en: Trap! You can eat some soup. You can cook something else. You can eat an apple. The stomach doesn't know "either-or."
    - id: '82'
      type: vote
      duration_sec: 12
      text:
        ru: '«Человек или жив, или нет.»

          '
        uk: «Людина або жива, або мертва.»
        en: '"A person is either alive or dead."'
      options:
      - id: opt_1
        text:
          ru: Ловушка
          uk: Пастка
          en: Trap
      - id: opt_2
        text:
          ru: Настоящий выбор
          uk: Справжній вибір
          en: Real choice
      correct: opt_2
    - id: '83'
      type: speech
      duration_sec: 8
      text:
        ru: 'Настоящий выбор! Тут без оттенков — как с лампочкой. Грустный пример, но закон работает точно.

          '
        uk: Справжній вибір! Тут без відтінків — як з лампочкою. Сумний приклад, але закон працює точно.
        en: Real choice! No shades here - like a light bulb. Sad example, but the law works exactly.
    - id: '84'
      type: vote
      duration_sec: 12
      text:
        ru: '«Или ты первый в соревновании, или ты проиграл!»

          '
