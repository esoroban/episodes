          '
        uk: 'Наш варіант: з''їсти частину супу зараз, а решту потім. Або зробити собі бутерброд. Або попросити замінити суп
          на кашу. Шлунку все одно, звідки їжа.'
        en: 'Our answer: eat some soup now, the rest later. Or make yourself a sandwich. Or ask to replace soup with porridge.
          Stomach doesn''t care where food comes from.'
    - id: '92'
      type: discussion
      duration_sec: 25
      text:
        ru: '«Или ты согласен со мной, или ты вообще ничего не понимаешь!» Третий вариант?

          '
        uk: «Або ти згоден зі мною, або ти взагалі нічого не розумієш!» Третій варіант?
        en: '"Either you agree with me or you understand nothing!" Third option?'
    - id: '93'
      type: speech
      duration_sec: 12
      text:
        ru: 'Наш вариант: «Я понимаю твою точку зрения, но у меня другая. И обе могут быть частично правильными.» Между «согласен»
          и «ничего не понимаю» — целый мир оттенков.

          '
        uk: 'Наш варіант: «Я розумію твою точку зору, але у мене інша. І обидві можуть бути частково правильними.» Між «згоден»
