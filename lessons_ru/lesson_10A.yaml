  - scene_id: sc5
    title:
      ru: 'ПРАКТИКА: НАЙДИ ТРЕТИЙ ВАРИАНТ'
      uk: 'ПРАКТИКА: ЗНАЙДИ ТРЕТІЙ ВАРІАНТ'
      en: 'PRACTICE: FIND THE THIRD OPTION'
    media_ref: 10A.sc5.find_third_option
    status: v3_locked
    steps:
    - id: '88'
      type: speech
      duration_sec: 12
      text:
        ru: 'Отличать ловушку от настоящего выбора вы уже умеете. А теперь — уровень посложнее. Я читаю ловушку «или-или»,
