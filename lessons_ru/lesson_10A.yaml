          '
        uk: Розрізнювати пастку від справжнього виборуви вже вмієте. А тепер — рівень посліднше. Я читаю пастку «або-або»,
          а ви придумуєте третій варіант. Той, який «спрятали».
        en: You already know how to distinguish a trap from a real choice. Now - harder level. I read a trap "either-or,"
          and you come up with the third option. The one that was "hidden."
    - id: '89'
      type: speech
      duration_sec: 10
      text:
        ru: 'Волшебный вопрос, который ломает любую ловушку: «А что если...?» Запомнили? Поехали!

          '
        uk: 'Чарівне запитання, яке ломає будь-яку пастку: «А що якби...?» Запам''ятали? Поїхали!'
        en: 'The magic question that breaks any trap: "What if...?" Remember? Let''s go!'
    - id: '90'
      type: discussion
      duration_sec: 25
      text:
