      - id: opt_1
        text:
          ru: Закон работает
          uk: Закон працює
          en: Law works
      - id: opt_2
        text:
          ru: Есть третий вариант
          uk: Є третій варіант
          en: There's a third option
      correct: opt_1
    - id: '64'
      type: speech
      duration_sec: 10
      text:
        ru: 'Закон работает! День недели — это факт. Сегодня или вторник, или нет. Календарь не врёт и оттенков не имеет.
          Тут Аристотель прав на все сто.

          '
        uk: Закон працює! День тижня — це факт. Сьогодні або вівторок, або ні. Календар не брешуть і відтінків не має. Тут
          Аристотель правий на сто відсотків.
        en: Law works! Day of the week is a fact. Today is either Tuesday or not. The calendar doesn't lie and has no shades.
