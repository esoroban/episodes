        en: Real choice! Math is exact. A number divides by two evenly - even. Doesn't divide - odd. No third option.
    - id: '76'
      type: vote
      duration_sec: 12
      text:
        ru: '«Или ты любишь кошек, или ты любишь собак.»

          '
        uk: «Або ти любиш котів, або ти любиш собак.»
        en: '"Either you love cats or you love dogs."'
      options:
      - id: opt_1
        text:
          ru: Ловушка
          uk: Пастка
          en: Trap
      - id: opt_2
        text:
          ru: Настоящий выбор
          uk: Справжній вибір
          en: Real choice
      correct: opt_1
    - id: '77'
      type: speech
      duration_sec: 10
      text:
        ru: 'Ловушка! Можно любить и тех, и других. Можно любить хомяков. Можно вообще никого не любить — и мечтать о драконе.
