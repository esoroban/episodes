        en: '"Either you go to training every day or you''re lazy!" What''s the third option?'
    - id: '95'
      type: speech
      duration_sec: 12
      text:
        ru: 'Наш вариант: ходить три раза в неделю. Или тренироваться дома. Или отдохнуть сегодня и вернуться завтра с новыми
          силами. Отдых — это не лень, а часть тренировки!

          '
        uk: 'Наш варіант: ходити три рази на тиждень. Або тренуватися вдома. Або відпочити сьогодні й повернутися завтра з
