      - id: opt_1
        text:
          ru: Ловушка
          uk: Пастка
          en: Trap
      - id: opt_2
        text:
          ru: Настоящий выбор
          uk: Справжній вибір
          en: Real choice
      correct: opt_1
    - id: '69'
      type: speech
      duration_sec: 10
      text:
        ru: 'Ловушка! Можно болеть нейтрально, можно болеть за обе команды, можно вообще не интересоваться футболом — и это
          не делает тебя предателем.

          '
        uk: Пастка! Можна боління нейтрально, можна боління за обидві команди, можна взагалі не цікавитися футболом — і це
          не робить тебе зрадником.
        en: Trap! You can support neither, both teams, or not care about football - and that doesn't make you a traitor.
    - id: '70'
      type: vote
      duration_sec: 12
      text:
        ru: '«Лампа или включена, или выключена.»

          '
        uk: «Лампа або ввімкнута, або вимкнута.»
        en: '"A lamp is either on or off."'
      options:
      - id: opt_1
        text:
          ru: Ловушка
          uk: Пастка
          en: Trap
      - id: opt_2
        text:
          ru: Настоящий выбор
          uk: Справжній вибір
          en: Real choice
      correct: opt_2
    - id: '71'
      type: speech
      duration_sec: 8
      text:
        ru: 'Настоящий выбор! У обычной лампы два состояния — ток идёт или не идёт. Аристотель доволен. Лампочка его не подводит.

          '
        uk: Справжній вибір! У звичайної лампи два стани — електричний струм йде або не йде. Аристотель доволений. Лампочка
          його не підводить.
        en: Real choice! A normal lamp has two states - electricity flows or it doesn't. Aristotle is satisfied. Light bulbs
          don't deceive him.
    - id: '72'
      type: vote
      duration_sec: 12
      text:
        ru: '«Или ты учишься на отлично, или ты неудачник.»

          '
        uk: «Або ти навчаєшся на відмінно, або ти невдаха.»
        en: '"Either you study excellently or you''re a failure."'
      options:
      - id: opt_1
        text:
          ru: Ловушка
          uk: Пастка
          en: Trap
      - id: opt_2
        text:
          ru: Настоящий выбор
          uk: Справжній вибір
          en: Real choice
      correct: opt_1
    - id: '73'
      type: speech
      duration_sec: 10
      text:
        ru: 'Ловушка! Между «отлично» и «неудачник» — огромный спектр. Хорошо, нормально, «стараюсь», «пока разбираюсь». Жизнь
          — не экзамен с двумя оценками.

          '
        uk: Пастка! Між «відмінно» й «невдаха» — величезний спектр. Добре, нормально, «стараюсь», «поки розуміюсь». Життя
          — не екзамен з двома оцінками.
        en: Trap! Between "excellent" and "failure" - a huge spectrum. Good, okay, "trying," "still learning." Life isn't
          a test with two grades.
    - id: '74'
      type: vote
      duration_sec: 12
      text:
        ru: '«Число или чётное, или нечётное.»

          '
        uk: «Число або парне, або непарне.»
        en: '"A number is either even or odd."'
      options:
      - id: opt_1
        text:
          ru: Ловушка
          uk: Пастка
          en: Trap
      - id: opt_2
        text:
          ru: Настоящий выбор
          uk: Справжній вибір
          en: Real choice
      correct: opt_2
    - id: '75'
