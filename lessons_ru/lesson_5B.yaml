        - id: '31'
          type: vote
          duration_sec: 28
          text:
            ru: '— Я буду первым играть в компьютер! Я раньше пришёл! — Нет, я! Я
              вчера тебе уступил! — Ты не уступил, тебя мама позвала ужинать! — Это
