        - id: '33'
          type: vote
          duration_sec: 26
          text:
            ru: '— Давайте поедем на экскурсию в зоопарк! — Нет, в аквапарк! Там горки!
              — В зоопарке жирафы! Ты жирафа видел вживую? — Жираф — это просто длинная
