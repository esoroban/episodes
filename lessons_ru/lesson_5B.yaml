              хитрые!

              '
            uk: 'Теорія — чудово. Тепер перевіримо, як ви знаходите стовбур! Я розповім
              шість спорів. Ваше завдання — знайти центральну ідею. Обережно: варіанти
              хитрі!'
            en: 'Theory is great. Now let''s check how you find the trunk! I''ll tell
              you six arguments. Your job is to find the central idea. Careful: the
