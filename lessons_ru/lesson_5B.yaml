        - id: '37'
          type: vote
          duration_sec: 30
          text:
            ru: '— Я считаю, нам нужен длинный перерыв после второго урока! — Нет,
              лучше два коротких: после первого и после третьего! — Ты просто хочешь
              бегать на переменах! — А ты хочешь в телефоне сидеть! — Я не сижу в
              телефоне, я читаю! — Ты читаешь мемы! — Мемы — это тоже чтение!

              '
            uk: Запис 53
            en: '“I think we need a long break after second period!” - No, it’s better
              to have two short ones: after the first and after the third! - You just
              want to run during recess! - Do you want to sit on the phone? — I don’t
              sit on the phone, I read! - You read memes! — Memes are also reading!'
          options:
            - id: opt_1
              text:
                ru: Являются ли мемы чтением?
                uk: Запис 54
                en: Entry 54
            - id: opt_2
              text:
                ru: Кто чем занимается на переменах?
                uk: Запис 55
                en: Entry 55
            - id: opt_3
              text:
                ru: 'Какой перерыв лучше: длинный или два коротких?'
                uk: Запис 56
                en: 'Which break is better: a long one or two short ones?'
          correct: opt_3
        - id: '38'
          type: speech
          duration_sec: 18
          text:
            ru: 'Какой перерыв лучше — ствол. «Кто чем занимается на переменах» —
              это уже обсуждение привычек, а не расписания. И да, «являются ли мемы
              чтением» — вопрос нашего века, но он не поможет решить, когда делать
              перерыв. Хотя на философском кружке — пожалуйста.

              '
            uk: Запис 57
            en: Which break is better - the trunk. “Who does what during breaks” is
              already a discussion of habits, not a schedule. And yes, “are memes
              reading” is the question of our age, but it won’t help you decide when
              to take a break. Although at the philosophical circle - please.
        - id: '39'
          type: vote
          duration_sec: 30
          text:
            ru: '— Давай возьмём щенка! — Нет, котёнка! Коты тихие и не грызут тапки!
              — Зато собаки верные! Кот тебя предаст при первой возможности! — Мой
              кот никого не предавал! — Потому что ему лень! Он спит двадцать часов
              в сутки! — Зато он не лает на почтальона в три часа ночи! — Наш почтальон
              вообще не приходит в три ночи!

              '
            uk: Запис 58
            en: "- Let's get a puppy! - No, kitten! Cats are quiet and don’t chew
              slippers! - But the dogs are faithful! The cat will betray you at the
              first opportunity! - My cat didn’t betray anyone! - Because he's lazy!
              He sleeps twenty hours a day! “But he doesn’t bark at the postman at
              three in the morning!” — Our postman doesn’t come at all at three in
              the morning!"
          options:
            - id: opt_1
              text:
                ru: Во сколько приходит почтальон?
                uk: Запис 59
                en: Entry 59
            - id: opt_2
              text:
                ru: 'Кого лучше завести: кота или собаку?'
                uk: Запис 60
                en: Entry 60
            - id: opt_3
              text:
                ru: Спит ли кот двадцать часов?
                uk: Запис 61
                en: Entry 61
          correct: opt_2
        - id: '40'
          type: speech
          duration_sec: 20
          text:
            ru: 'Кого завести — кота или собаку — вот ствол. «Во сколько приходит
              почтальон» — это листок, который прилетел вообще из другого двора. А
              «спит ли кот двадцать часов» — это деталь. Правдивая, кстати. Но к выбору
              питомца она относится только косвенно. Хотя если вам нужен тихий сосед
              по квартире — кот побеждает с большим отрывом.

              '
            uk: Запис 62
            en: Who to get - a cat or a dog - that's the trunk. “What time does the
              postman arrive” is a piece of paper that arrived from a completely different
              yard. And “does the cat sleep for twenty hours” is a detail. True, by
              the way. But it relates to the choice of a pet only indirectly. Although
              if you need a quiet roommate, the cat wins by a wide margin.
    - scene_id: sc5
      title:
        ru: Идея / Аргумент / Деталь
        uk: Запис 63
        en: Entry 63
      media_ref: 5B.sc5.idea_argument_detail
      status: v3_locked
      steps:
        - id: '41'
          type: speech
          duration_sec: 12
          text:
            ru: 'Вы уже умеете находить ствол — центральную идею. Но в споре есть
              ещё ветки и листья. Сейчас научимся их различать. Это важно — потому
              что люди часто путают аргумент с деталью, и спор разваливается.

              '
            uk: Запис 64
            en: You already know how to find the trunk - the central idea. But there
              are still branches and leaves in the dispute. Now let's learn to distinguish
              them. This is important - because people often confuse an argument with
              a detail, and the argument falls apart.
        - id: '42'
          type: speech
          duration_sec: 15
          text:
            ru: 'Напомню. Центральная идея — это ОДИН главный вопрос: «О чём мы спорим?»
              Аргумент — это ПОЧЕМУ мы так думаем: причина, довод. Деталь — это ПРИМЕР
              или подробность: конкретный случай, который иллюстрирует аргумент.

              '
            uk: Запис 65
            en: 'Let me remind you. The central idea is ONE main question: “What are
              we arguing about?” An argument is WHY we think so: a reason, an argument.
              A detail is an EXAMPLE or detail: a specific incident that illustrates
              an argument.'
        - id: '43'
          type: speech
          duration_sec: 18
          text:
            ru: 'Пример. Спор: «Должны ли дети помогать по дому?» Это ствол. Аргумент:
              «Помощь по дому учит ответственности». Это ветка — объясняет, почему
              да. А деталь: «Вчера Петрик помыл всю посуду за десять минут и получил
              от мамы пирожное». Это листок — конкретный пример. Яркий, вкусный, но
              сам по себе ничего не доказывает. Может, мама просто добрая.

              '
            uk: Запис 66
            en: 'Example. Debate: “Should children help around the house?” This is
              the trunk. Argument: “Helping around the house teaches responsibility.”
              This thread explains why yes. And the detail: “Yesterday Petrik washed
              all the dishes in ten minutes and received a cake from his mother.”
              This leaf is a concrete example. Bright, tasty, but in itself does not
              prove anything. Maybe mom is just kind.'
        - id: '44'
          type: speech
          duration_sec: 18
          text:
            ru: 'Ещё пример. Спор: «Какой спорт полезнее — плавание или бег?» Ствол.
              Аргумент за плавание: «Плавание развивает все группы мышц одновременно».
              Ветка — объясняет, почему плавание полезнее. Деталь: «Тренер Игорь Петрович
              плавает каждый день и выглядит на двадцать лет моложе». Листок — один
              человек, один пример. Может, у Игоря Петровича просто хорошие гены.
              Или хороший крем.

              '
            uk: Запис 67
            en: 'Another example. Dispute: “Which sport is healthier - swimming or
              running?” Trunk. The argument for swimming: “Swimming develops all muscle
              groups at the same time.” The branch explains why swimming is healthier.
              Detail: “Coach Igor Petrovich swims every day and looks twenty years
              younger.” The leaf is one person, one example. Maybe Igor Petrovich
              just has good genes. Or a good cream.'
        - id: '45'
          type: speech
          duration_sec: 8
          text:
            ru: 'Теперь ваша очередь! Я говорю фразу из спора — вы определяете: это
              ствол, ветка или листок.

              '
            uk: Запис 68
            en: 'Now you! I say a phrase from a dispute - you determine: it is a trunk,
              a branch or a leaf.'
        - id: '46'
          type: vote
          duration_sec: 15
          text:
            ru: '«Должны ли дети сами выбирать, что есть на обед?»

              '
            uk: Запис 69
            en: “Should children choose what to eat for lunch?”
          options:
            - id: opt_1
              text:
                ru: Ствол (центральная идея)
                uk: Запис 70
                en: Entry 70
            - id: opt_2
              text:
                ru: Ветка (аргумент)
                uk: Запис 71
                en: Entry 71
            - id: opt_3
              text:
                ru: Листок (деталь)
                uk: Запис 72
                en: Entry 72
          correct: opt_1
        - id: '47'
          type: speech
          duration_sec: 10
          text:
            ru: 'Ствол! Это главный вопрос спора — о нём весь разговор. Не аргумент
              и не пример, а то, ради чего все собрались спорить.

              '
            uk: Запис 73
            en: Trunk! This is the main issue of the dispute - the whole conversation
              is about it. Not an argument or an example, but something for which
              everyone gathered to argue.
        - id: '48'
          type: vote
          duration_sec: 15
          text:
            ru: '«Потому что дети лучше знают, что им нравится, и не будут оставлять
              еду на тарелке».

              '
            uk: Запис 74
            en: “Because children know better what they like and won’t leave food
              on their plate.”
          options:
            - id: opt_1
              text:
                ru: Ствол (центральная идея)
                uk: Запис 75
                en: Entry 75
            - id: opt_2
              text:
                ru: Ветка (аргумент)
                uk: Запис 76
                en: Entry 76
            - id: opt_3
              text:
                ru: Листок (деталь)
                uk: Запис 77
                en: Entry 77
          correct: opt_2
        - id: '49'
          type: speech
          duration_sec: 10
          text:
            ru: 'Ветка! Это довод — объясняет, ПОЧЕМУ детям стоит выбирать самим.
              Конкретная причина. Не вопрос, а ответ на вопрос.

              '
            uk: Запис 78
            en: Branch! This argument explains WHY children should choose for themselves.
              Specific reason. Not a question, but an answer to a question.
        - id: '50'
          type: vote
          duration_sec: 15
          text:
            ru: '«Вчера Оленка сама выбрала гречку вместо макарон и съела всё до крошки».

              '
            uk: Запис 79
            en: “Yesterday Olenka herself chose buckwheat instead of pasta and ate
              it all.”
          options:
            - id: opt_1
              text:
                ru: Ствол (центральная идея)
                uk: Запис 80
                en: Entry 80
            - id: opt_2
              text:
                ru: Ветка (аргумент)
                uk: Запис 81
                en: Entry 81
            - id: opt_3
              text:
                ru: Листок (деталь)
                uk: Запис 82
                en: Entry 82
          correct: opt_3
        - id: '51'
          type: speech
          duration_sec: 12
          text:
            ru: 'Листок! Один конкретный случай с Оленкой. Может, она просто любит
              гречку. А завтра выберет мороженое на обед — и аргумент развалится.
              Детали — как фотографии: они показывают один момент, а не всю картину.

              '
            uk: Запис 83
            en: 'Leaf! One specific case with Olenka. Maybe she just loves buckwheat.
              And tomorrow he chooses ice cream for lunch - and the argument falls
              apart. Details are like photographs: they show one moment, not the whole
              picture.'
        - id: '52'
          type: vote
          duration_sec: 15
          text:
            ru: '«Полезны ли компьютерные игры?»

              '
            uk: Запис 84
            en: Entry 84
          options:
            - id: opt_1
              text:
                ru: Ствол (центральная идея)
                uk: Запис 85
                en: Entry 85
            - id: opt_2
              text:
                ru: Ветка (аргумент)
                uk: Запис 86
                en: Entry 86
            - id: opt_3
              text:
                ru: Листок (деталь)
                uk: Запис 87
                en: Entry 87
          correct: opt_1
        - id: '53'
          type: speech
          duration_sec: 8
          text:
            ru: 'Ствол! Снова главный вопрос. Короткий, ясный, и из него растут все
              ветки и листья.

              '
            uk: Запис 88
            en: Trunk! The main question again. Short, clear, and all the branches
              and leaves grow from it.
        - id: '54'
          type: vote
          duration_sec: 15
          text:
            ru: '«Игры развивают реакцию и умение быстро принимать решения».

              '
            uk: Запис 89
            en: “Games develop reactions and the ability to make quick decisions.”
          options:
            - id: opt_1
              text:
                ru: Ствол (центральная идея)
                uk: Запис 90
                en: Entry 90
            - id: opt_2
              text:
                ru: Ветка (аргумент)
                uk: Запис 91
                en: Entry 91
            - id: opt_3
              text:
                ru: Листок (деталь)
                uk: Запис 92
                en: Entry 92
          correct: opt_2
        - id: '55'
          type: speech
          duration_sec: 10
          text:
            ru: 'Ветка! Довод в пользу игр. Не пример, а причина. Если кто-то скажет
              «А мой брат играет и плохо учится» — вот это будет листок. Один случай
              не опровергает аргумент.

              '
            uk: Запис 93
            en: Branch! The case for games. Not an example, but a reason. If someone
              says, “My brother plays and studies poorly,” this will be a piece of
              paper. One incident does not disprove the argument.
        - id: '56'
          type: vote
          duration_sec: 15
          text:
            ru: '«Мой сосед Витя играет по пять часов в день и при этом отличник».

              '
            uk: Запис 94
            en: “My neighbor Vitya plays five hours a day and is an excellent student.”
          options:
            - id: opt_1
              text:
                ru: Ствол (центральная идея)
                uk: Запис 95
                en: Entry 95
            - id: opt_2
              text:
                ru: Ветка (аргумент)
                uk: Запис 96
                en: Entry 96
            - id: opt_3
              text:
                ru: Листок (деталь)
                uk: Запис 97
                en: Entry 97
          correct: opt_3
        - id: '57'
          type: speech
          duration_sec: 12
          text:
            ru: 'Листок! Один конкретный Витя. Может, он гений и был бы отличником
              даже без игр. А может, он был бы отличником-плюс. Деталь — это не доказательство.
              Это иллюстрация. Как картинка в книжке — красиво, но без текста непонятно,
              о чём речь.

              '
            uk: Запис 98
            en: Leaf! One specific Vitya. Maybe he is a genius and would be an excellent
              student even without games. Or maybe he would have been an A+ student.
              A detail is not proof. This is an illustration. Like a picture in a
              book, it’s beautiful, but without the text it’s unclear what it’s about.
    - scene_id: sc6
      title:
        ru: Формулируем суть
        uk: Запис 99
        en: Entry 99
      media_ref: 5B.sc6.formulate_essence
      status: v3_locked
      steps:
        - id: '58'
          type: speech
          duration_sec: 15
          text:
            ru: 'Вы уже умеете находить центральную идею и отличать аргументы от деталей.
              Осталось последнее умение — сформулировать суть спора ОДНИМ предложением.
              Как название фильма: короткое, но сразу понятно, о чём речь.

              '
            uk: Запис 100
            en: 'You already know how to find the central idea and distinguish arguments
              from details. The last skill left is to formulate the essence of the
              dispute in ONE sentence. Like the title of a movie: short, but it’s
              immediately clear what it’s about.'
        - id: '59'
          type: speech
          duration_sec: 12
          text:
            ru: 'Формула простая: «Мы спорим о том, ... или ...» Например: «Мы спорим
              о том, пойти в кино или в парк». «Мы спорим о том, нужна школьная форма
              или нет». «Мы спорим о том, кого завести — кота или собаку».

              '
            uk: Запис 101
            en: 'The formula is simple: “We are arguing about ... or ...” For example:
              “We are arguing about whether to go to the cinema or to the park.” “We
              argue about whether school uniforms are necessary or not.” “We argue
              about whether to get a cat or a dog.”'
        - id: '60'
          type: speech
          duration_sec: 15
          text:
            ru: 'Зачем это нужно? Потому что когда вы произносите эту фразу вслух
              — спор сразу успокаивается. Все вспоминают, о чём говорят. Это как нажать
              кнопку «пауза» в разгоревшейся ссоре. Девочка из мультика именно это
              сделала: «Мы же спорим, где отдохнуть!» — и все сразу остановились.

              '
            uk: Запис 102
            en: "Why is this necessary? Because when you say this phrase out loud,
              the argument immediately calms down. Everyone remembers what they are
              talking about. It's like pressing the pause button in a heated argument.
              The girl from the cartoon did just that: “We’re arguing about where
              to relax!” - and everyone stopped immediately."
        - id: '61'
          type: speech
          duration_sec: 8
          text:
            ru: 'Сейчас я опишу споры. Попробуйте сформулировать суть одним предложением.

              '
            uk: Запис 103
            en: I will now describe the controversy. Try to formulate the essence
              in one sentence.
        - id: '62'
          type: discussion
          duration_sec: 25
          text:
            ru: 'Двое друзей не могут решить, играть в футбол или баскетбол. Один
              говорит, что футбол — для настоящих спортсменов. Другой — что баскетбол
              быстрее и зрелищнее. Потом один вспоминает, как другой промахнулся мимо
              ворот, и начинается…

              '
            uk: Запис 104
            en: Two friends can't decide whether to play football or basketball. One
              says that football is for real athletes. The other is that basketball
              is faster and more spectacular. Then one remembers how the other missed
              the goal, and it begins...
        - id: '63'
          type: speech
          duration_sec: 10
          text:
            ru: 'Суть: «Мы спорим о том, во что играть — в футбол или баскетбол».
              Всё! Не «кто лучший спортсмен», не «кто промахнулся» — а во что играть.
              Ствол.

              '
            uk: Запис 105
            en: 'The gist: “We argue about what to play—football or basketball.” All!
              Not “who is the best athlete”, not “who missed” - but what to play.
              Trunk.'
        - id: '64'
          type: discussion
          duration_sec: 25
          text:
            ru: 'Сестра хочет смотреть мультик, брат хочет фильм. Сестра говорит,
              что мультики веселее. Брат — что фильмы для взрослых. Сестра: «Ты вообще
              не понимаешь юмор!» Брат: «А ты боишься темноты!»

              '
            uk: Запис 106
            en: 'My sister wants to watch a cartoon, my brother wants a movie. My
              sister says that cartoons are more fun. Brother - like films for adults.
              Sister: “You don’t understand humor at all!” Brother: “Are you afraid
              of the dark!”'
        - id: '65'
          type: speech
          duration_sec: 10
          text:
            ru: 'Суть: «Мы спорим о том, что смотреть по телевизору». Не «кто смелее»
              и не «кто понимает юмор». Как только произнесёшь эту фразу — «боишься
              темноты» уже не имеет значения.

              '
            uk: Запис 107
            en: 'The gist: “We argue about what to watch on TV.” Not “who is braver”
              and not “who understands humor.” As soon as you say this phrase, “being
              afraid of the dark” no longer matters.'
        - id: '66'
          type: discussion
          duration_sec: 25
          text:
            ru: 'Одноклассники решают, кого выбрать старостой. Одни за Машу — она
              ответственная. Другие за Миколу — он весёлый и все его любят. Кто-то
              кричит: «Маша ябеда!» Кто-то: «Микола домашку списывает!»

              '
            uk: Запис 108
            en: 'Classmates decide who to choose as head boy. Some for Masha - she
              is responsible. Others are for Mikola - he is cheerful and everyone
              loves him. Someone shouts: “Masha is a sneak!” Someone: “Mikola is copying
              his homework!”'
        - id: '67'
          type: speech
          duration_sec: 12
          text:
            ru: 'Суть: «Мы спорим о том, кто будет старостой класса». Не «кто ябеда»
              и не «кто списывает». Как только вы это произнесли — личные обвинения
              отваливаются, потому что они не отвечают на вопрос «кто будет старостой».

              '
            uk: Запис 109
            en: 'The gist: “We are arguing about who will be the head of the class.”
              Not “who’s a sneak” and not “who’s cheating.” As soon as you say this,
              personal accusations fall away, because they do not answer the question
              “who will be the headman.”'
        - id: '68'
          type: vote
          duration_sec: 25
          text:
            ru: 'Вот спор. Какая формулировка сути — правильная? — Я хочу собаку на
              день рождения! — Нет, ты ещё маленький! — Я не маленький! Сашко младше
              меня, и у него хомяк! — Хомяк — это не собака! Собаку надо выгуливать!
              — Я буду выгуливать! Я уже гуляю каждый день! — Ты гуляешь на площадке,
              а не с собакой!

              '
            uk: Запис 110
            en: Here's the argument. Which formulation of the essence is correct?
              - I want a dog for my birthday! - No, you're still small! - I'm not
              little! Sashko is younger than me, and he has a hamster! - A hamster
