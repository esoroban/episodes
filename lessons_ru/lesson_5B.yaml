    - scene_id: sc13
      title:
        ru: Закрытие
        uk: Запис 244
        en: Entry 244
      media_ref: 5B.sc13.closing_detectives
      status: v3_locked
      steps:
        - id: '125'
          type: speech
          duration_sec: 14
          text:
            ru: 'Вот это была тренировка! Давайте подведём итог. Сегодня вы научились
              трём вещам. Первая: у каждого спора есть СТВОЛ — центральная идея. Если
              вы его потеряли — спор превращается в кашу. Как в столовой. Только хуже.

              '
            uk: Запис 245
            en: "What a workout! Let's sum it up. Today you learned three things.
              First: every dispute has a TRUNK - a central idea. If you lose it, the
              argument turns into mush. Like in the dining room. Only worse."
        - id: '126'
          type: speech
          duration_sec: 15
          text:
            ru: 'Вторая: от ствола растут ВЕТКИ — это аргументы, доводы, причины.
              Они объясняют, ПОЧЕМУ кто-то прав. А на ветках — ЛИСТЬЯ, детали и примеры.
              Один листок — не доказательство. Даже если это очень яркий листок по
              имени Витя.

              '
            uk: Запис 246
            en: 'Second: BRANCHES grow from the trunk - these are arguments, reasons,
              reasons. They explain WHY someone is right. And on the branches there
              are LEAVES, details and examples. One piece of paper is not proof. Even
              if it is a very bright leaf named Vitya.'
        - id: '127'
          type: speech
          duration_sec: 15
          text:
            ru: 'И третья: если спор зашёл в тупик — произнесите волшебную фразу:
              «Мы спорим о том, ...» Как только вы это скажете — все лишние ветки
              и листья отваливаются, и остаётся ствол. Проверено на гречке, булочках
              и хомяках.

              '
            uk: Запис 247
            en: 'And third: if the dispute reaches a dead end, say the magic phrase:
              “We are arguing about ....” As soon as you say this, all the extra branches
              and leaves fall off, and what remains is the trunk. Tested on buckwheat,
              buns and hamsters.'
        - id: '128'
          type: speech
          duration_sec: 11
          text:
            ru: 'А ещё мы вспомнили про источники из прошлого урока: надёжные и ненадёжные,
              независимые и зависимые. Теперь у вас целый набор инструментов критического
              мышления. Вы практически детективы!

              '
            uk: Запис 248
            en: "We also remembered about sources from the last lesson: reliable and
              unreliable, independent and dependent. Now you have a whole set of critical
              thinking tools. You're practically detectives!"
        - id: '129'
          type: speech
          duration_sec: 9
          text:
            ru: 'Дома будет задание — потренируетесь находить ствол, ветки и листья
              в новых спорах. А мы увидимся на следующем уроке. До встречи, детективы!

              '
            uk: Запис 249
            en: There will be a task at home - you will practice finding the trunk,
              branches and leaves in new spores. And we'll see you in the next lesson.
              See you later, detectives!
