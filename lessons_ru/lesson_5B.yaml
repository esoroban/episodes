              text:
                ru: Кто кого обозвал?
                uk: Запис 45
                en: Entry 45
            - id: opt_3
              text:
                ru: Куда поехать классом?
                uk: Запис 46
                en: Entry 46
          correct: opt_3
        - id: '34'
          type: speech
          duration_sec: 20
          text:
