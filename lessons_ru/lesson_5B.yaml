          options:
            - id: opt_1
              text:
                ru: Кто кому уступил вчера?
                uk: Запис 39
                en: Entry 39
            - id: opt_2
              text:
                ru: Кто играет первым сегодня?
                uk: Запис 40
                en: Entry 40
            - id: opt_3
              text:
                ru: Жульничал ли кто-то в прошлой игре?
                uk: Запис 41
                en: Entry 41
          correct: opt_2
        - id: '32'
          type: speech
          duration_sec: 18
          text:
            ru: 'Кто играет первым сегодня — ствол. «Кто кому уступил вчера» звучит
