lesson:
  id: lesson_5B
  day: 5
  slot: B
  title:
    ru: О чём мы вообще спорим
    uk: Про що ми взагалі спорим
    en: What are we even arguing about
  scenes:
    - scene_id: sc1
      title:
        ru: 'Открытие: о чём мы спорим?'
        uk: 'Відкриття: про що ми спорим?'
        en: 'Discovery: what are we arguing about?'
      media_ref: 5B.sc1.opening_lost_argument
      status: v3_locked
      steps:
        - id: '1'
          type: speech
          duration_sec: 10
          text:
            ru: 'Итак, продолжаем! На прошлом уроке мы научились проверять источники.
              А сейчас — новая суперсила.

              '
            uk: Отже, продовжуємо! На попередньому уроці ми навчилися перевіряти джерела.
              А зараз — нова суперсила.
            en: So, let's continue! In the previous lesson we learned to verify sources.
              Now — a new superpower.
        - id: '2'
          type: speech
          duration_sec: 15
          text:
            ru: 'Бывало у вас такое: начали спорить об одном, а через пять минут уже
              ругаетесь совсем о другом? И никто не помнит, с чего начали? Давайте
              проверим — я расскажу шесть историй, а вы заметьте момент, где спор
              свернул не туда.

              '
            uk: 'Бувало у вас таке: почали спорити про одне, а через п''ять хвилин
              уже лаєтесь совсім про інше? І ніхто не пам''ятає, з чого почали? Давайте
              перевіримо — я розповім шість історій, а ви помітьте момент, де спір
              свернув не туди.'
            en: 'Ever happened to you: you started arguing about one thing, and five
              minutes later you''re already fighting about something else? And nobody
              remembers how it started? Let''s check — I''ll tell six stories, and
              you notice the moment where the argument went off track.'
        - id: '3'
          type: speech
          duration_sec: 22
          text:
            ru: 'Маша и Микола решают, какой фильм посмотреть на вечеринке. Маша хочет
              «Гарри Поттера», Микола — «Человека-паука». Маша говорит: «Ты вообще
              не разбираешься в кино!» Микола: «А ты мне вчера карандаш не вернула!»
              Маша: «Какой карандаш?! Ты мне ещё за обед должен!» Через минуту они
              ругаются из-за долгов, а фильм так и не выбрали. Перелом — когда Маша
              вместо «почему Гарри Поттер лучше» перешла на «ты не разбираешься».

              '
            uk: 'Маша й Микола вирішують, який фільм подивитися на вечірці. Маша хоче
              «Гаррі Поттера», Микола — «Людину-павука». Маша говорить: «Ти взагалі
              не розбираєшся в кіно!» Микола: «А ти мені вчора олівець не повернула!»
              Маша: «Який олівець?! Ти мені ще за обід винен!» Через хвилину вони
              лаються через борги, а фільм так і не вибрали. Перелом — коли Маша замість
              «чому Гаррі Поттер краще» перейшла на «ти не розбираєшся».'
            en: 'Masha and Mykola are deciding what movie to watch at a party. Masha
              wants "Harry Potter," Mykola — "Spider-Man." Masha says: "You don''t
              know anything about movies!" Mykola: "But you didn''t return my pencil
              yesterday!" Masha: "What pencil?! You still owe me for lunch!" Within
              a minute they''re fighting about debts, and they never chose a movie.
              The turning point was when Masha switched from "why Harry Potter is
              better" to "you don''t know anything."'
        - id: '4'
          type: speech
          duration_sec: 22
          text:
            ru: 'Два друга спорят, кто будет вратарём. Один говорит: «Я лучше ловлю
              мячи — вчера три раза поймал.» Второй: «А помнишь прошлый месяц? Ты
              три гола пропустил!» Первый: «Зато ты тогда упал в лужу и все смеялись!»
              Второй: «Это потому что ТЫ меня толкнул!» Через две минуты они выясняют,
              кто кого толкнул в третьем классе. А вратаря так и нет. Съехали, когда
              вместо «кто лучше ловит мячи сейчас» полезли в прошлые обиды.

              '
            uk: 'Два друга спорять, хто буде воротарем. Один говорить: «Я краще ловлю
              м''ячі — вчора три рази спіймав.» Другий: «А пам''ятаєш минулий місяць?
              Ти три голи пропустив!» Перший: «Зато ти тоді впав у калюжу й усі сміялися!»
              Другий: «Це тому що ТИ мене штовхнув!» Через дві хвилини вони з''ясовують,
              хто кого штовхнув у третьому класі. А воротаря так й немає. Зісхали,
              коли замість «хто краще ловить м''ячі зараз» полізли в старі кривди.'
            en: 'Two friends are arguing about who will be the goalkeeper. One says:
              "I catch the ball better — I caught it three times yesterday." The other:
              "Remember last month? You let in three goals!" The first: "But you fell
              in a puddle and everyone laughed!" The second: "That''s because YOU
              pushed me!" Within two minutes they''re figuring out who pushed whom
              in third grade. And there''s no goalkeeper. They went off track when
              instead of "who catches better now" they dug into old grievances.'
        - id: '5'
          type: speech
          duration_sec: 22
          text:
            ru: 'Класс голосует: поехать на экскурсию в зоопарк или в музей. Кто-то
              кричит: «В музее скучно!» Другой: «А ты вообще ни разу в музее не был!»
              — «Был! С мамой ходил!» — «Ну и что видел?» — «Динозавра!» — «Это не
              музей, это выставка!» Через две минуты весь класс спорит, чем музей
              отличается от выставки, а экскурсию забыли напрочь. Как будто автобус
              поехал не на экскурсию, а в другой город — и никто не заметил.

              '
            uk: 'Клас голосує: поїхати на екскурсію в зоопарк чи в музей. Хтось кричить:
              «У музеї нудно!» Інший: «А ти взагалі ні разу в музеї не був!» — «Був!
              З мамою ходив!» — «Ну й що бачив?» — «Динозавра!» — «Це не музей, це
              виставка!» Через дві хвилини весь клас спорить, чим музей відрізняється
              від виставки, а екскурсію забули напрочуд. Як будто автобус поїхав не
              на екскурсію, а в інше місто — й ніхто не помітив.'
            en: 'The class votes: go on a field trip to the zoo or a museum. Someone
              shouts: "The museum is boring!" Another: "And you''ve never even been
              to a museum!" — "I have! I went with mom!" — "Well, what did you see?"
              — "A dinosaur!" — "That''s not a museum, that''s an exhibition!" Within
              two minutes the whole class is arguing about the difference between
              a museum and exhibition, and they completely forgot about the trip.
              It''s like the bus went to a different city instead — and nobody noticed.'
        - id: '6'
          type: speech
          duration_sec: 22
          text:
            ru: 'Сестра и брат делят последний кусок торта. Сестра: «Мне — я младше!»
              Брат: «Мне — я помогал маме его печь!» Сестра: «А ты мне вчера мультик
              не дал посмотреть!» Брат: «А ты мою тетрадку разрисовала!» Сестра: «А
              ты мой телефон без спроса брал!» Торт стоит на столе. Никто не ест.
              Кот смотрит на них, и ему уже самому хочется этот торт съесть — пока
              люди заняты. Съехали, когда из «кому торт» перепрыгнули в «кто кому
              что должен».

              '
            uk: 'Сестра й брат ділять останній шматок торта. Сестра: «Мені — я молодша!»
              Брат: «Мені — я допомагав мамі його печи!» Сестра: «А ти мені вчера
              мультик не дав подивитися!» Брат: «А ти мою тетрадку розфарбувала!»
              Сестра: «А ти мій телефон без спитання брав!» Торт стоїть на столі.
              Ніхто не їсть. Кіт дивиться на них, й йому уже самому хочеться цей торт
              з''їсти — поки люди зайняті. Зісхали, коли з «кому торт» перестрибнули
              в «хто кому що винен».'
            en: 'Sister and brother are dividing the last piece of cake. Sister: "Mine
              — I''m younger!" Brother: "Mine — I helped mom bake it!" Sister: "But
              you wouldn''t let me watch cartoons yesterday!" Brother: "And you colored
              in my notebook!" Sister: "And you took my phone without asking!" The
              cake sits on the table. Nobody eats it. The cat watches them, and he
              wants to eat that cake himself — while they''re busy. They went off
              track when they jumped from "who gets the cake" to "who owes whom what."'
        - id: '7'
          type: speech
          duration_sec: 22
          text:
            ru: 'На перемене компания решает, во что играть. Витя хочет в прятки,
              Оленка — в догонялки. Витя: «Прятки интереснее — можно прятаться на
              всей территории!» Оленка: «А в прошлый раз ты залез на дерево и застрял,
              пожарные приезжали!» Все начинают обсуждать пожарных, кто-то вспоминает
              пожарную машину у соседа, потом соседскую собаку… Через три минуты разговор
              — про собак. А перемена уже заканчивается, и никто ни во что не поиграл.
              Классический случай: пока спорили — время ушло.

              '
            uk: 'На перерві компанія вирішує, в що грати. Вітя хоче у приховувалки,
              Оленка — у догонялки. Вітя: «Приховувалки цікавіші — можна приховуватися
              на всій території!» Оленка: «А минулого разу ти залізти на дерево й
              застряв, пожежники приїжджали!» Все починають обговорювати пожежників,
              хтось згадує пожежну машину у сусіда, потім сусідську собаку… Через
              три хвилини розмова — про собак. А перерва вже закінчується, й ніхто
              ні в що не пограв. Класичний випадок: поки спорили — час ушло.'
            en: 'During break a group decides what to play. Vitya wants hide-and-seek,
              Olenka wants tag. Vitya: "Hide-and-seek is more fun — you can hide anywhere
              on the grounds!" Olenka: "But last time you climbed a tree and got stuck,
              the firefighters came!" Everyone starts discussing firefighters, someone
              remembers the fire truck at the neighbor''s, then the neighbor''s dog...
              Within three minutes they''re talking about dogs. And break is already
              over, and nobody played anything. Classic case: while arguing — time
              ran out.'
        - id: '8'
          type: speech
          duration_sec: 22
          text:
            ru: 'Два одноклассника спорят, кто умнее: кошки или собаки. Один приводит
              аргумент: «Собаки выполняют команды!» Второй: «А кошки не выполняют,
              потому что они УМНЕЕ — не хотят подчиняться!» Первый: «Ну ты и логик…
              С таким подходом ты и контрольную напишешь "не хочу подчиняться"!» Второй
              обижается. Теперь они спорят, кто как пишет контрольные. Кошки и собаки
              давно ушли спать — они-то умные, в бесполезных спорах не участвуют.

              '
            uk: 'Два однокласники спорять, хто розумніше: кішки чи собаки. Один приводить
              аргумент: «Собаки виконують команди!» Другий: «А кішки не виконують,
              тому що вони РОЗУМНІШЕ — не хочуть слухатися!» Перший: «Ну ти й логік…
              З таким підходом ти й контрольну напишеш "не хочу слухатися"!» Другий
              образився. Тепер вони спорять, хто як пише контрольні. Кішки й собаки
              давно пішли спати — вони-то розумні, в бесполезних спорах не беруть
              участі.'
            en: 'Two classmates argue about who''s smarter: cats or dogs. One makes
              an argument: "Dogs obey commands!" The other: "But cats don''t, because
              they''re SMARTER — they don''t want to obey!" The first: "Well, you''re
              a logician... With that approach you''d write your test "I don''t want
              to obey"!" The second is offended. Now they''re arguing about who writes
              tests better. Cats and dogs went to bed long ago — they''re smart enough
              not to participate in pointless arguments.'
        - id: '9'
          type: speech
          duration_sec: 10
          text:
            ru: 'Видите закономерность? Шесть историй — и всюду одно и то же.

              '
            uk: Бачите закономірність? Шість історій — й скрізь одне й те саме.
            en: See the pattern? Six stories — and it's the same thing everywhere.
        - id: '10'
          type: speech
          duration_sec: 18
          text:
            ru: 'Был конкретный вопрос. А потом — бац! — кто-то переходит на личности,
              на старые обиды, на вообще другую тему. И спор разваливается. Никто
              не виноват — просто все забыли, о чём говорили. Сегодня мы научимся
              находить центральную идею — это компас для любого спора. Одно предложение:
              «О чём мы вообще говорим?» Если компас есть — спор идёт к цели. Если
              нет — все кружат на месте, как потерявшийся автобус.

              '
            uk: 'Було конкретне запитання. А потім — трац! — хтось переходить на особистості,
              на старі кривди, на взагалі іншу тему. І спір розваливається. Ніхто
              не винен — просто всі забули, про що говорили. Сьогодні ми навчимося
              знаходити центральну ідею — це компас для будь-якого спору. Одне речення:
              «Про що ми взагалі говоримо?» Якщо компас є — спір йде до мети. Якщо
              ні — все кружляють на місці, як загублений автобус.'
            en: 'There was a specific question. Then — boom! — someone switches to
              personal attacks, old grievances, a completely different topic. And
              the argument falls apart. Nobody''s at fault — everyone just forgot
              what they were arguing about. Today we''ll learn to find the central
              idea — it''s a compass for any argument. One sentence: "What are we
              even talking about?" If you have a compass — the argument moves toward
              its goal. If not — everyone circles in place like a lost bus.'
    - scene_id: sc2
      title:
        ru: ИСТОРИЯ — СПОР О ПОХОДЕ
        uk: ІСТОРІЯ — СПІР ПРО ПОХІД
        en: STORY — ARGUMENT ABOUT A TRIP
      media_ref: 5B.sc2.story_hiking
      status: v3_locked
      steps:
        - id: '11'
          type: speech
          duration_sec: 14
          text:
            ru: 'Класс решал, куда поехать на выходные. Половина кричит: «В горы!
              Там приключения!» Другая половина: «На море! Там тепло и купаться можно!»'
            uk: 'Клас вирішував, куди поїхати на вихідні. Половина кричить: «В гори!
              Там пригоди!» Інша половина: «На море! Там тепло й можна купатися!»'
            en: 'The class was deciding where to go on the weekend. Half shouts: "To
              the mountains! There are adventures!" The other half: "To the beach!
              It''s warm and we can swim!"'
        - id: '12'
          type: speech
          duration_sec: 14
          text:
            ru: Спор разгорелся. «В горах красиво!» — «На море веселее!» — «А в прошлый
              раз на море был ветер!» — «А в горах ты ногу подвернул!» Никто никого
              не слушает.
            uk: Спір розгорівся. «В горах красиво!» — «На морі веселіше!» — «А минулого
              разу на морі був вітер!» — «А в горах ти ногу підвернув!» Ніхто нікого
              не слухає.
            en: The argument escalated. "Mountains are beautiful!" — "The beach is
              more fun!" — "But last time at the beach it was windy!" — "But in the
              mountains you twisted your ankle!" Nobody listens to anybody.
        - id: '13'
          type: speech
          duration_sec: 14
          text:
            ru: 'Тут встала одна девочка и тихо сказала: «Ребята, а о чём мы вообще
              спорим? Мы же хотим отдохнуть вместе. Может, найдём место, где и горы
              рядом, и море?»'
            uk: 'Тут встала одна дівчинка й тихо сказала: «Ребята, а про що ми взагалі
              спорим? Ми ж хочемо відпочити разом. Може, знайдемо місце, де й гори
              рядом, й море?»'
            en: 'Then one girl stood up and quietly said: "Guys, what are we even
              arguing about? We want to rest together, right? Maybe we can find a
              place where there are both mountains and the beach?"'
        - id: '14'
          type: speech
          duration_sec: 10
          text:
            ru: 'Все замолчали. И правда — никто не спросил: «А какая у нас ГЛАВНАЯ
              цель?» Пока все спорили о деталях, она увидела суть.'
            uk: 'Все замовкли. І справді — ніхто не запитав: «А яка в нас ГОЛОВНА
              мета?» Поки всі спорили про деталі, вона побачила суть.'
            en: 'Everyone fell silent. And it''s true — nobody asked: "What''s our
              MAIN goal?" While everyone was arguing about details, she saw the essence.'
        - id: '15'
          type: discussion
          duration_sec: 25
          text:
            ru: 'Что сделала девочка такого, чего остальные не догадались? Почему
              её идея сработала?

              '
            uk: Що зробила дівчинка такого, чого інші не здогадалися? Чому її ідея
              спрацювала?
            en: What did the girl do that others didn't think of? Why did her idea
              work?
        - id: '16'
          type: speech
          duration_sec: 18
          text:
            ru: 'Она единственная задала себе вопрос: «А о чём мы вообще спорим?»
              Не «горы или море» — это детали. А «где нам всем будет хорошо отдохнуть».
              Как только она нашла ствол — решение нашлось само. Озеро подошло всем,
              потому что отвечало на главный вопрос.

              '
            uk: 'Вона єдина задала собі запитання: «А про що ми взагалі спорим?» Не
              «гори чи море» — це деталі. А «де нам усім буде добре відпочити». Як
              тільки вона знайшла стовбур — рішення знайшлося саме. Озеро підійшло
              всім, тому що відповідало на головне запитання.'
            en: 'She was the only one who asked herself: "What are we even arguing
              about?" Not "mountains or beach" — those are details. But "where can
              we all rest well." As soon as she found the trunk — the solution appeared.
              The lake suited everyone because it answered the main question.'
        - id: '17'
          type: speech
          duration_sec: 15
          text:
            ru: 'Заметьте: пока остальные кричали «горы лучше!» — «нет, море лучше!»
              — они были как два барана на мосту. Каждый тянул в свою сторону. А девочка
              просто посмотрела вниз и сказала: «Ребята, тут же река течёт. Можно
              и не по мосту.» Она не выбирала чью-то сторону — она вернулась к сути.

              '
            uk: 'Зверніть увагу: поки інші кричали «гори краще!» — «ні, море краще!»
              — вони були як два барани на мосту. Кожен тягнув у свій бік. А дівчинка
              просто подивилася вниз й сказала: «Ребята, тут ж річка тече. Можна й
              не по мосту.» Вона не вибирала чийсь бік — вона повернулася до сутності.'
            en: 'Notice: while others were shouting "mountains are better!" — "no,
              the beach is better!" — they were like two rams on a bridge. Each pulling
              their way. But the girl just looked down and said: "Guys, there''s a
              river here. We don''t have to use the bridge." She wasn''t choosing
              sides — she returned to the essence.'
        - id: '18'
          type: speech
          duration_sec: 15
          text:
            ru: 'Теперь вспомните наши шесть историй. Маша и Микола с фильмом — если
              бы кто-то сказал «Мы же выбираем, что смотреть ВМЕСТЕ», они бы не полезли
              в карандаши и долги. Брат с сестрой и торт — если бы кто-то вспомнил
              «Мы делим торт, а не выясняем, кто кому что должен» — кот бы остался
              голодным.

              '
            uk: Тепер згадайте наші шість історій. Маша й Микола з фільмом — якби
              хтось сказав «Ми ж вибираємо, що дивитися РАЗОМ», вони б не полізли
              в олівці й борги. Брат з сестрою й торт — якби хтось згадав «Ми ділимо
              торт, а не з'ясовуємо, хто кому що винен» — кіт би залишився голодним.
            en: Now remember our six stories. Masha and Mykola with the movie — if
              someone had said "We're choosing what to watch TOGETHER," they wouldn't
              have gone into pencils and debts. Brother and sister with cake — if
              someone had remembered "We're dividing cake, not figuring out who owes
              whom" — the cat would have stayed hungry.
        - id: '19'
          type: speech
          duration_sec: 12
          text:
            ru: 'Вот и получается: тот, кто видит центральную идею — не самый громкий
              в споре. Он самый умный. Потому что пока все кричат — он думает. А потом
              одним предложением решает то, что остальные не могли решить целый час.

              '
            uk: 'Ось й виходить: той, хто видить центральну ідею — не найголоснішій
              у спорі. Він найрозумніший. Тому що поки всі кричать — він думає. А
              потім одним реченням вирішує те, що інші не могли вирішити цілу годину.'
            en: 'So it turns out: the one who sees the central idea is not the loudest
              in the argument. He''s the smartest. Because while everyone is shouting
              — he''s thinking. And then with one sentence he solves what others couldn''t
              solve in an hour.'
    - scene_id: sc3
      title:
        ru: Дерево спора
        uk: Дерево спору
        en: Tree of the argument
      media_ref: 5B.sc3.argument_tree
      status: v3_locked
      steps:
        - id: '20'
          type: speech
          duration_sec: 10
          text:
            ru: 'И сейчас я покажу вам инструмент, который поможет видеть центральную
              идею в любом споре. Представьте себе дерево…

              '
            uk: І зараз я покажу вам інструмент, який допоможе бачити центральну ідею
              в будь-якому спорі. Уявіть собі дерево…
            en: And now I'll show you a tool that will help you see the central idea
              in any argument. Imagine a tree...
        - id: '21'
          type: speech
          duration_sec: 18
          text:
            ru: 'У дерева есть ствол — толстый, крепкий, один. От ствола идут ветки.
              А на ветках — листья. Если убрать ствол — всё рухнет. Ветки и листья
              не могут висеть в воздухе. Так вот: в любом споре тоже есть ствол, ветки
              и листья.

              '
            uk: 'У дерева є стовбур — товстий, міцний, один. Від стовбура йдуть гілки.
              А на гілках — листя. Якщо забрати стовбур — все впаде. Гілки й листя
              не можуть висіти в повітрі. Так ось: у будь-якому спорі теж є стовбур,
              гілки й листя.'
            en: 'A tree has a trunk — thick, strong, one. From the trunk come branches.
              And on the branches — leaves. If you remove the trunk — everything falls.
              Branches and leaves can''t hang in the air. Well, the same is true for
              any argument: there''s also a trunk, branches, and leaves.'
        - id: '22'
          type: speech
          duration_sec: 12
          text:
            ru: 'Ствол — это центральная идея. Один главный вопрос. Ветки — это аргументы:
              почему мы так думаем. Листья — это детали: примеры и подробности.

              '
            uk: 'Стовбур — це центральна ідея. Одне головне запитання. Гілки — це
              аргументи: чому ми так думаємо. Листя — це деталі: приклади й подробиці.'
            en: 'The trunk is the central idea. One main question. Branches are arguments:
              why we think this way. Leaves are details: examples and specifics.'
        - id: '23'
          type: speech
          duration_sec: 18
          text:
            ru: 'Вернёмся к истории. Ствол: «Где нам отдохнуть?» Ветки: «В горах —
              приключения», «На море — тепло и купание». Листья: «В прошлом году Петрик
              обгорел на море», «А в горах Сашко потерял кроссовок». Видите? Листья
              — это интересные подробности, но без ствола они бесполезны. Обгоревший
              Петрик — это не аргумент, это анекдот.

              '
            uk: 'Повернемося до історії. Стовбур: «Де нам відпочити?» Гілки: «В горах
              — пригоди», «На морі — тепло й купання». Листя: «Минулого року Петрик
              обгорів на морі», «А в горах Сашко загубив кросівку». Бачите? Листя
              — це цікаві подробиці, але без стовбура вони марні. Обгорілий Петрик
              — це не аргумент, це анекдот.'
            en: 'Back to the story. Trunk: "Where should we rest?" Branches: "Mountains
              — adventure", "Beach — warmth and swimming". Leaves: "Last year Petrik
              got sunburned at the beach", "And in the mountains Sashko lost his shoe".
              See? Leaves are interesting details, but without the trunk they''re
              useless. Sunburned Petrik is not an argument, it''s a joke.'
        - id: '24'
          type: speech
          duration_sec: 18
          text:
            ru: 'Ещё пример. Спор: «Нужна ли школьная форма?» Ствол: нужна или нет.
              Ветка: «Форма экономит время утром — не надо думать, что надеть». Листок:
              «Маша вчера двадцать минут выбирала наряд и опоздала на первый урок.
              Пришла в класс с одним ботинком, потому что второй искала под кроватью.»
              Листок яркий, смешной, запоминается — но сам по себе ничего не решает.
              Решает ствол плюс ветки.

              '
            uk: 'Ще приклад. Спір: «Потрібна ли шкільна форма?» Стовбур: потрібна
              чи ні. Гілка: «Форма економить час вранці — не треба думати, що надіти».
              Листок: «Маша вчера двадцять хвилин вибирала наряд й спізнилася на перший
              урок. Прийшла в клас з одним черевиком, тому що другий шукала під ліжком.»
              Листок яскравий, смішний, запам''ятовується — але сам по собі нічого
              не вирішує. Вирішує стовбур плюс гілки.'
            en: 'Another example. Argument: "Do we need school uniforms?" Trunk: needed
              or not. Branch: "A uniform saves time in the morning — you don''t have
              to think about what to wear". Leaf: "Yesterday Masha spent twenty minutes
              choosing an outfit and was late to first period. She came to class with
              one shoe because she was looking for the other under the bed." The leaf
              is bright, funny, memorable — but by itself it doesn''t solve anything.
              The trunk plus branches solve it.'
        - id: '25'
          type: speech
          duration_sec: 20
          text:
            ru: 'Третий пример. Спор: «Какой кружок выбрать — рисование или робототехнику?»
              Ствол: что полезнее. Ветка за рисование: «Развивает фантазию». Ветка
              за робототехнику: «Учит логике и программированию». Листок: «Вчера на
              рисовании Витя случайно нарисовал кошку, похожую на директора, и все
              смеялись.» Смешно? Да. Помогает выбрать кружок? Нет. Это листок — без
              ствола он просто забавная история.

              '
            uk: 'Третій приклад. Спір: «Який гурток вибрати — малювання чи робототехніку?»
              Стовбур: що корисніше. Гілка за малювання: «Розвиває фантазію». Гілка
              за робототехніку: «Вчить логіці й програмуванню». Листок: «Вчера на
              малюванні Вітя випадково намалював кішку, схожу на директора, й все
              сміялися.» Смішно? Да. Допомагає вибрати гурток? Ні. Це листок — без
              стовбура він просто забавна історія.'
            en: 'Third example. Argument: "Which club to choose — art or robotics?"
              Trunk: what''s more useful. Branch for art: "Develops imagination".
              Branch for robotics: "Teaches logic and programming". Leaf: "Yesterday
              in art class Vitya accidentally drew a cat that looked like the principal,
              and everyone laughed." Funny? Yes. Does it help choose a club? No. That''s
              a leaf — without the trunk it''s just a funny story.'
        - id: '26'
          type: speech
          duration_sec: 20
          text:
            ru: 'А вот что бывает, когда ствол теряется. Тот же спор про кружки. Один
              говорит: «Рисование развивает фантазию». Второй: «А ты рисуешь как курица
              лапой!» Первый: «Зато ты робота собрать не можешь — у тебя колёса отваливаются!»
              Второй: «Это было один раз!» Всё — ствол потерян. Вместо «какой кружок
              полезнее» теперь «кто хуже что-то делает». Листья отвалились, ветки
              сломались, дерево упало. Лежит. Грустное.

              '
            uk: 'А ось що буває, коли стовбур губиться. Той же спір про гуртки. Один
              говорить: «Малювання розвиває фантазію». Другий: «А ти малюєш як курка
              лапою!» Перший: «Зато ти робота зібрати не можеш — у тебе колеса відпадають!»
              Другий: «Це було один раз!» Все — стовбур втрачено. Замість «який гурток
              корисніше» тепер «хто гірше щось робить». Листя відпали, гілки зламалися,
              дерево впало. Лежить. Сумне.'
            en: 'But here''s what happens when the trunk is lost. The same argument
              about clubs. One says: "Art develops imagination". The second: "But
              you draw like a chicken!" The first: "At least I can build a robot —
              yours always falls apart!" The second: "That was only once!" Done —
              the trunk is lost. Instead of "which club is more useful" now it''s
              "who does things worse". Leaves have fallen, branches have broken, the
              tree has fallen. It lies there. Sad.'
        - id: '27'
          type: speech
          duration_sec: 12
          text:
            ru: 'Запомните: если в споре вы чувствуете, что всё идёт не туда — вернитесь
              к стволу. Спросите: «О чём мы вообще спорим?» Это самый сильный вопрос,
              который можно задать. Девочка из мультика именно это и сделала — и победила.

              '
            uk: 'Запам''ятайте: якщо в спорі ви чуєте, що все йде не туди — повернітеся
              до стовбура. Запитайте: «Про що ми взагалі спорим?» Це найсильніше запитання,
              яке можна задати. Дівчинка з мультика саме це й зробила — й перемогла.'
            en: 'Remember: if you feel that an argument is going the wrong way — return
              to the trunk. Ask: "What are we even arguing about?" This is the strongest
              question you can ask. The girl from the story did exactly that — and
              won.'
    - scene_id: sc4
      title:
        ru: 'Практика: найди центральную идею'
        uk: 'Практика: знайди центральну ідею'
        en: 'Practice: find the central idea'
      media_ref: 5B.sc4.practice_central_idea
      status: v3_locked
      steps:
        - id: '28'
          type: speech
          duration_sec: 10
          text:
            ru: 'Теория — отлично. Теперь проверим, как вы находите ствол! Я расскажу
