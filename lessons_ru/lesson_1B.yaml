          Есть! Секундомер. Засекли время — проверили.
        en: Yes! Stopwatch. Timed it — verified.
        uk: Так! Секундомер. Засекли час — перевірили.
    - id: '66'
      type: vote
      duration_sec: 10
      text:
        ru: >
          «Наш класс — самый дружный.»
        en: '"Our class is the friendliest."'
        uk: «Наш клас — найдружніший.»
      options:
      - id: opt_1
        text:
          ru: Есть инструмент
          en: There is a tool
          uk: Є інструмент
      - id: opt_2
        text:
          ru: Нет инструмента
          en: No tool
          uk: Немає інструменту
      correct: opt_2
    - id: '67'
      type: speech
      duration_sec: 6
      text:
        ru: >
          Нет инструмента! Дружность не измерить. Каждый класс считает себя дружным.
          Мнение.
        en: No tool! You can't measure friendliness. Every class thinks it's friendly. Opinion.
        uk: Немає інструменту! Дружність не можна виміряти. Кожен клас вважає себе дружним. Думка.
    - id: '68'
      type: vote
      duration_sec: 10
      text:
        ru: >
          «В этой коробке двенадцать карандашей.»
        en: '"There are twelve pencils in this box."'
        uk: «У цій коробці дванадцять олівців.»
      options:
      - id: opt_1
        text:
          ru: Есть инструмент
          en: There is a tool
          uk: Є інструмент
      - id: opt_2
        text:
          ru: Нет инструмента
          en: No tool
          uk: Немає інструменту
      correct: opt_1
    - id: '69'
      type: speech
      duration_sec: 6
      text:
        ru: >
          Есть! Счёт. Открыл — посчитал — двенадцать или нет.
        en: Yes! Counting. Opened — counted — twelve or not.
        uk: Так! Лічення. Відкрив — порахував — дванадцять чи ні.
    - id: '70'
      type: vote
      duration_sec: 10
      text:
        ru: >
          «Эта комната длиннее, чем коридор.»
        en: '"This room is longer than the hallway."'
        uk: «Ця кімната довша, ніж коридор.»
      options:
      - id: opt_1
        text:
          ru: Есть инструмент
          en: There is a tool
          uk: Є інструмент
      - id: opt_2
        text:
          ru: Нет инструмента
          en: No tool
          uk: Немає інструменту
