        en: "\"A classmate: \"I can hold my breath for three minutes, but only when I'm alone — I get nervous around people.\"\""
        uk: '«Одноклассник: «Я можу затримати дихання на три хвилини, але тільки коли я один — при людях хвилююсь.»»'
      options:
      - id: opt_1
        text:
          ru: Нормальное объяснение
          en: Normal explanation
          uk: Нормальне пояснення
      - id: opt_2
        text:
          ru: Отговорка
          en: Excuse
          uk: Відмовка
      correct: opt_2
    - id: '49'
      type: speech
      duration_sec: 8
      text:
        ru: >
          Отговорка! «Только когда один» — значит, проверить невозможно. Удобно, правда?
        en: Excuse! "Only when alone" — means it can't be verified. Convenient, right?
        uk: Відмовка! «Тільки коли один» — означає, перевірити неможливо. Зручно, правда?
    - id: '50'
      type: speech
      duration_sec: 15
      text:
        ru: >
          Заметили закономерность? Отговорки работают одинаково: они ЗАКРЫВАЮТ путь
          к проверке. «Не при людях», «не сегодня», «не сохранилось», «собака съела».
          Если у человека на каждую проверку есть новая причина — это сигнал: стоп,
          тут что-то не так.
        en: >
          Notice the pattern? Excuses work the same way: they BLOCK the way to checking.
          "Not in front of people," "not today," "it didn't save," "the dog ate it." If
          someone has a new excuse for every check — that's a signal: stop, something's
          not right here.
        uk: >
          Помітили закономірність? Відмовки працюють однаково: вони ЗАКРИВАЮТЬ шлях до
          перевірки. «Не при людях», «не сьогодні», «не збереглось», «собака з'їла».
          Якщо у людини на кожну перевірку є нова причина — це сигнал: стоп, тут щось
          не так.
    - id: '51'
      type: discussion
      duration_sec: 25
      text:
        ru: >
          А как быть? Какой вопрос можно задать, чтобы раскрыть отговорку?
        en: What to do? What question can we ask to uncover an excuse?
        uk: Як бути? Яке питання можна задати, щоб розкрити відмовку?
    - id: '52'
      type: speech
      duration_sec: 12
      text:
        ru: >
          Задайте вопрос: «А КАК это можно проверить?» Если человек может предложить
          способ — отлично. Если на любой способ у него отговорка — перед вами хитрое
          утверждение.
        en: >
          Ask the question: "How can we check this?" If the person can suggest a way —
          great. If they have an excuse for every possible way — you're looking at a
          tricky statement.
        uk: >
          Задайте питання: «А ЯК це можна перевірити?» Якщо людина може запропонувати
          спосіб — чудово. Якщо на будь-який спосіб у неї є відмовка — перед вами хитре
          твердження.
    - id: '53'
