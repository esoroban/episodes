  - scene_id: sc5
    title:
      ru: ДЕТЕКТИВ ПРАВДЫ
      en: TRUTH DETECTIVE
      uk: ДЕТЕКТИВ ПРАВДИ
    media_ref: 1B.sc5.truth_detective
    status: v3_locked
    steps:
    - id: '76'
      type: speech
      duration_sec: 15
      text:
        ru: >
          Теперь у вас есть всё: вы знаете три слова, знаете про отговорки и знаете
          пять инструментов. Пора стать детективами правды!
        en: >
          Now you have everything: you know three words, you know about excuses, and you
          know five tools. It's time to become truth detectives!
        uk: >
          Тепер у вас все є: ви знаєте три слова, знаєте про відмовки і знаєте п'ять
          інструментів. Час стати детективами правди!
    - id: '77'
      type: speech
      duration_sec: 15
      text:
        ru: >
          Детектив правды задаёт три вопроса. Первый: есть ли ИНСТРУМЕНТ, чтобы проверить?
          Весы, термометр, часы, линейка, счёт? Если да — утверждение проверяемое.
          Если нет — может быть мнение.
        en: >
          A truth detective asks three questions. First: is there a TOOL to check? Scales,
          thermometer, clock, ruler, counting? If yes — the statement is checkable. If no
          — it might be an opinion.
        uk: >
          Детектив правди задає три питання. Перше: є ли ІНСТРУМЕНТ, щоб перевірити?
          Ваги, термометр, годинник, лінійка, лічба? Якщо так — твердження перевіряємо.
          Якщо ні — це може бути думка.
    - id: '78'
      type: speech
      duration_sec: 12
      text:
        ru: >
          Второй вопрос: если инструмент есть — человек СОГЛАСЕН проверить? Или на
          каждую проверку у него отговорка? Если отговорка — хитрое утверждение.
        en: >
          Second question: if there's a tool — is the person WILLING to check? Or do they
          have an excuse for every check? If they have an excuse — it's a tricky statement.
        uk: >
          Друге питання: якщо інструмент є — людина ГОТОВА перевірити? Чи у неї на кожну
          перевірку є відмовка? Якщо відмовка — хитре твердження.
    - id: '79'
      type: speech
      duration_sec: 10
      text:
        ru: >
          Третий вопрос: проверили — и ЧТО получилось? Подтвердилось — факт. Не подтвердилось
          — неправда. Вот и вся система!
        en: >
          Third question: we checked — what was the result? It checked out — fact. It
          didn't check out — lie. That's the whole system!
        uk: >
          Третє питання: перевірили — а ЩО вийшло? Підтвердилось — факт. Не підтвердилось
          — неправда. Ось і вся система!
