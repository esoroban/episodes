    - id: '59'
      type: speech
      duration_sec: 6
      text:
        ru: >
          Есть! Какой? Весы! Положил на весы — посмотрел число.
        en: Yes! Which one? Scales! Put on scales — check the number.
        uk: Так! Який? Ваги! Положив на ваги — подивився число.
