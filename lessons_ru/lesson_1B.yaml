lesson:
  id: lesson_1B
  day: 1
  slot: B
  title:
    ru: Можно ли это проверить?
    en: Can It Be Verified?
    uk: Чи можна це перевірити?
  scenes:
  - scene_id: sc1
    title:
      ru: ОТКРЫТИЕ
      en: INTRODUCTION
      uk: ВСТУП
    media_ref: 1B.sc1.opening
    status: v3_locked
    steps:
    - id: '1'
      type: speech
      duration_sec: 15
      text:
        ru: >
          Продолжаем! В прошлый раз мы узнали три слова. Кто помнит? Факт, мнение,
          неправда. Давайте проверим, не забыли ли.
        en: Let's continue! Last time we learned three words. Who remembers? Fact, opinion, lie. Let's see if we forgot.
        uk: Продовжуємо! Минулого разу ми дізналися три слова. Хто пам'ятає? Факт, думка, неправда. Давайте перевіримо, чи не забули.
    - id: '2'
      type: speech
      duration_sec: 8
      text:
        ru: >
          Быстрый тест!
        en: Quick test!
        uk: Швидка перевірка!
    - id: '3'
      type: vote
      duration_sec: 10
      text:
        ru: >
          «Земля вращается вокруг Солнца.»
        en: '"The Earth revolves around the Sun."'
        uk: «Земля обертається навколо Сонця.»
      options:
      - id: opt_1
        text:
          ru: Факт
          en: Fact
          uk: Факт
      - id: opt_2
        text:
          ru: Мнение
          en: Opinion
          uk: Думка
      - id: opt_3
        text:
          ru: Неправда
          en: Lie
          uk: Неправда
      correct: opt_1
    - id: '4'
      type: speech
      duration_sec: 6
      text:
        ru: >
          Факт! Проверили — подтвердилось.
        en: Fact! We checked — it's confirmed.
        uk: Факт! Перевірили — підтвердилось.
    - id: '5'
      type: vote
      duration_sec: 10
      text:
        ru: >
          «Кошки лучше собак.»
        en: '"Cats are better than dogs."'
        uk: «Кішки краще собак.»
      options:
      - id: opt_1
        text:
          ru: Факт
          en: Fact
          uk: Факт
      - id: opt_2
        text:
          ru: Мнение
          en: Opinion
          uk: Думка
      - id: opt_3
        text:
          ru: Неправда
          en: Lie
          uk: Неправда
      correct: opt_2
    - id: '6'
      type: speech
      duration_sec: 6
      text:
        ru: >
          Мнение! Кто-то любит кошек, кто-то собак — нельзя проверить.
        en: Opinion! Some like cats, some like dogs — it can't be verified.
        uk: Думка! Кому подобаються кішки, кому собаки — неможливо перевірити.
    - id: '7'
      type: vote
      duration_sec: 10
      text:
        ru: >
          «Человек может прожить без воды месяц.»
        en: '"A person can live without water for a month."'
        uk: «Людина може прожити без води місяць.»
      options:
      - id: opt_1
        text:
          ru: Факт
          en: Fact
          uk: Факт
      - id: opt_2
        text:
          ru: Мнение
          en: Opinion
          uk: Думка
      - id: opt_3
        text:
          ru: Неправда
          en: Lie
          uk: Неправда
      correct: opt_3
    - id: '8'
      type: speech
      duration_sec: 6
      text:
        ru: >
          Неправда! Врачи проверяли — без воды максимум несколько дней.
        en: Lie! Doctors checked — without water, maximum a few days.
        uk: Неправда! Лікарі перевіряли — без води максимум кілька днів.
    - id: '9'
      type: vote
      duration_sec: 10
      text:
        ru: >
          «Пицца — самая популярная еда.»
        en: '"Pizza is the most popular food."'
        uk: «Піца — найпопулярніша їжа.»
      options:
      - id: opt_1
        text:
          ru: Факт
          en: Fact
          uk: Факт
      - id: opt_2
        text:
          ru: Мнение
          en: Opinion
          uk: Думка
      - id: opt_3
        text:
          ru: Неправда
          en: Lie
          uk: Неправда
      correct: opt_2
    - id: '10'
      type: speech
      duration_sec: 8
      text:
        ru: >
          Мнение! «Самая популярная» — кому как. В Японии любят суши, в Индии — карри.
          Нет одного ответа.
        en: Opinion! "Most popular" — it depends. In Japan they like sushi, in India they like curry. There's no single answer.
        uk: Думка! «Найпопулярніша» — це залежить від точки зору. У Японії люблять суші, в Індії — каррі. Однієї відповіді немає.
    - id: '11'
      type: vote
      duration_sec: 10
      text:
        ru: >
          «У слона четыре ноги.»
        en: '"An elephant has four legs."'
        uk: «У слона чотири ноги.»
      options:
      - id: opt_1
        text:
          ru: Факт
          en: Fact
          uk: Факт
      - id: opt_2
        text:
          ru: Мнение
          en: Opinion
          uk: Думка
      - id: opt_3
        text:
          ru: Неправда
          en: Lie
          uk: Неправда
      correct: opt_1
    - id: '12'
      type: speech
      duration_sec: 5
      text:
        ru: >
          Факт! Посмотрел на слона — посчитал. Четыре.
        en: Fact! Look at an elephant — count. Four.
        uk: Факт! Подивитися на слона — порахувати. Чотири.
    - id: '13'
      type: vote
      duration_sec: 10
      text:
        ru: >
          «Понедельник — самый тяжёлый день недели.»
        en: '"Monday is the hardest day of the week."'
        uk: «Понеділок — найтяжчий день тижня.»
      options:
      - id: opt_1
        text:
          ru: Факт
          en: Fact
          uk: Факт
      - id: opt_2
        text:
          ru: Мнение
          en: Opinion
          uk: Думка
      - id: opt_3
        text:
          ru: Неправда
          en: Lie
          uk: Неправда
      correct: opt_2
    - id: '14'
      type: speech
      duration_sec: 6
      text:
        ru: >
          Мнение! Кому-то тяжёл понедельник, а кому-то — пятница. Ощущение, не факт.
        en: Opinion! For some, Monday is hard; for others, Friday is. It's a feeling, not a fact.
        uk: Думка! Для когось понеділок важкий, а для когось — п'ятниця. Це відчуття, а не факт.
    - id: '15'
      type: speech
      duration_sec: 20
      text:
        ru: >
          Отлично, не забыли! Но вот вопрос: мы говорим «проверить» — а ЧТО это значит?
          Как именно проверяют? Можно ли всё на свете проверить? Или бывает так, что
          вроде и хочешь проверить — а не получается? Сегодня разберёмся.
        en: "Great! You didn't forget. But here's the question: when we say \"verify\" — what does that mean exactly? How exactly do people verify? Can everything be verified? Or does it sometimes happen that you want to verify something but can't? Today we'll figure it out."
        uk: 'Чудово! Не забули. Але ось питання: коли ми говоримо «перевірити» — що це означає точно? Як саме люди перевіряють? Чи можна все перевірити? Чи буває так, що хочеш перевірити — але не можеш? Сьогодні розберемось.'
    - id: '16'
      type: speech
      duration_sec: 8
      text:
        ru: А теперь послушайте интересную историю о мальчике Вите и его необычной находке.
        en: Now listen to an interesting story about a boy named Vitya and his unusual discovery.
        uk: Тепер послухайте цікаву історію про хлопчика на ім'я Вітя та його незвичайну знахідку.
  - scene_id: sc2
    title:
      ru: ИСТОРИЯ — ВИТЯ И ВОЛШЕБНЫЙ КАМЕНЬ
      en: THE STORY — VITYA AND THE MAGIC STONE
      uk: ІСТОРІЯ — ВІТЯ І ЧАРІВНИЙ КАМІНЬ
    media_ref: 1B.sc2.story_stone
    status: v3_locked
    steps:
    - id: '17'
      type: speech
      duration_sec: 14
      text:
        ru: >-
          Витя прибежал к Оленке с сияющими глазами: «Смотри, что я нашёл! Камень!
          Он волшебный — исполняет желания! Хочешь проверить?»
        en: "Vitya ran to Olenka with shining eyes: \"Look what I found! A stone! It's magic — it grants wishes! Want to test it?\""
        uk: 'Вітя прибіг до Оленки з сяючими очима: «Дивись, що я знайшов! Камінь! Він чарівний — виконує бажання! Хочеш перевірити?»'
    - id: '18'
      type: speech
      duration_sec: 14
      text:
        ru: >-
          Оленка загадала желание. Ждёт… Ничего. «Желание слишком большое!» — объясняет
          Витя. Загадала маленькое — опять ничего. «Камень отдыхал!»
        en: Olenka made a wish. She waits... Nothing. "The wish was too big!" explains Vitya. She makes a small wish — nothing again. "The stone was resting!"
        uk: Оленка загадала бажання. Чекає… Нічого. «Бажання було занадто велике!» — пояснює Вітя. Загадала маленьке — знову нічого. «Камінь відпочивав!»
    - id: '19'
      type: speech
      duration_sec: 14
      text:
        ru: >-
          Третья попытка — снова ноль. «Он работает только когда никто не смотрит!»
          — не сдаётся Витя. У него на всё готов ответ.
        en: Third attempt — nothing again. "It only works when nobody's looking!" — Vitya won't give up. He has an answer for everything.
        uk: Третя спроба — знову нічого. «Він працює тільки коли ніхто не дивиться!» — не здається Вітя. У нього на все є готова відповідь.
    - id: '20'
      type: speech
      duration_sec: 10
      text:
        ru: >-
          Оленка вздохнула. Что бы ни случилось — Витя никогда не скажет: «Ладно,
          камень не волшебный.» Всегда найдётся новая отговорка.
        en: "Olenka sighed. No matter what happens — Vitya will never say: \"Okay, the stone isn't magic.\" There's always a new excuse."
        uk: 'Оленка зітхнула. Якщо б не сталося — Вітя ніколи не скаже: «Ладно, камінь не чарівний.» Завжди знайдеться нова відмовка.'
    - id: '21'
      type: speech
      duration_sec: 15
      text:
        ru: >
          Итак, Витя говорит — камень волшебный. Оленка попробовала загадать желание.
          Сбылось?
        en: So, Vitya says — the stone is magic. Olenka tried to make a wish. Did it come true?
        uk: Отже, Вітя говорить — камінь чарівний. Оленка спробувала загадати бажання. Збулось?
    - id: '22'
      type: speech
      duration_sec: 20
      text:
        ru: >
          Не сбылось! А Витя что ответил? «Желание слишком большое!» Ладно, загадали
          маленькое — опять не сработало. «Камень отдыхал!» Ещё раз — ничего. «Он
          работает только когда никто не смотрит!»
        en: It didn't come true! What did Vitya say? "The wish was too big!" Okay, they made a small wish — it didn't work again. "The stone was resting!" One more time — nothing. "It only works when nobody's looking!"
        uk: Не збулось! Що відповів Вітя? «Бажання було занадто велике!» Ладно, загадали маленьке — знову не спрацювало. «Камінь відпочивав!» Ще раз — нічого. «Він працює тільки коли ніхто не дивиться!»
    - id: '23'
      type: speech
      duration_sec: 15
      text:
        ru: >
          Заметили? У Вити на КАЖДЫЙ случай есть отговорка. Что бы ни случилось —
          он никогда не скажет: «Ладно, камень не волшебный.» Всегда найдётся новая
          причина, почему не сработало.
        en: "See? Vitya has an excuse for EVERY situation. No matter what happens — he'll never say: \"Okay, the stone isn't magic.\" There's always a new reason why it didn't work."
        uk: 'Помітили? У Вітя на КОЖЕН випадок є відмовка. Якщо б не сталося — він ніколи не скаже: «Ладно, камінь не чарівний.» Завжди знайдеться нова причина, чому не спрацювало.'
    - id: '24'
      type: discussion
      duration_sec: 20
      text:
        ru: >
          А теперь важный вопрос. Витя — врун? Он специально обманывает?
        en: Now an important question. Is Vitya a liar? Is he deliberately deceiving?
        uk: Тепер важливе питання. Вітя — брехун? Він навмисне обманює?
    - id: '25'
      type: speech
      duration_sec: 20
      text:
        ru: >
          Нет! Витя сам верит в свой камень. Он не хочет обмануть Оленку. Но проблема
          в том, что его утверждение НЕЛЬЗЯ проверить — потому что на любую проверку
          у него есть отговорка.
        en: No! Vitya believes in his stone himself. He doesn't want to deceive Olenka. But the problem is that his claim CANNOT be verified — because he has an excuse for any attempt to verify it.
        uk: Ні! Вітя сам вірить у свій камінь. Він не хоче обдурити Оленку. Але проблема в тому, що його твердження НЕМОЖЛИВО перевірити — тому що на будь-яку перевірку у нього є відмовка.
    - id: '26'
      type: speech
      duration_sec: 20
      text:
        ru: >
          Вот смотрите. «Мороженое стоит двадцать пять гривень» — если в магазине
          другая цена, мы скажем: «Ну значит, неправда.» И всё. А Витя с камнем —
          НИКОГДА не согласится, что неправ. Потому что всегда придумает новую отговорку.
        en: "Here's the thing. \"Ice cream costs twenty-five hryvnia\" — if the store has a different price, we'll say: \"Well, that's a lie.\" That's it. But Vitya with his stone — will NEVER admit he's wrong. Because he'll always come up with a new excuse."
        uk: "Ось що. «Морозиво коштує двадцять п'ять гривень» — якщо в магазині інша ціна, ми скажемо: «Ну значить, неправда.» І все. А Вітя з камінцем — НІКОЛИ не визнає, що він неправий. Тому що завжди придумає нову відмовку."
    - id: '27'
      type: speech
      duration_sec: 15
      text:
        ru: >
          Такие утверждения называются ХИТРЫЕ. Их нельзя опровергнуть — потому что
          человек заранее придумал ответ на любой вопрос. И это не значит, что он
          злой. Просто его слова невозможно проверить.
        en: Such claims are called TRICKY. They cannot be refuted — because the person has already thought up an answer to any question. This doesn't mean he's evil. It just means his words cannot be verified.
        uk: Такі твердження називаються ХИТРІ. Їх неможливо спростувати — тому що людина вже заздалегідь придумала відповідь на будь-яке питання. Це не означає, що він злий. Просто його слова неможливо перевірити.
    - id: '28'
      type: speech
      duration_sec: 8
      text:
        ru: >
          Но как именно мы проверяем обычные утверждения? Какие есть способы? Сейчас
          разберёмся.
        en: But how exactly do we verify ordinary claims? What are the methods? Let's figure it out now.
        uk: Але як саме ми перевіряємо звичайні твердження? Які є способи? Розберемось зараз.
  - scene_id: sc3
    title:
      ru: ОТГОВОРКИ
      en: EXCUSES
      uk: ВІДМОВКИ
    media_ref: 1B.sc3.excuses
    status: v3_locked
    steps:
    - id: '29'
      type: speech
      duration_sec: 15
      text:
        ru: >
          Отговорки бывают не только у Вити с камнем. Они встречаются каждый день
          — в школе, во дворе, дома. Сейчас я буду говорить ситуацию, а вы голосуете!
        en: Excuses aren't just for Vitya with his stone. They happen every day — at school, in the yard, at home. Now I'll describe situations and you vote!
        uk: Відмовки бувають не тільки у Вітя з камінцем. Вони трапляються кожен день — у школі, на подвір'ї, дома. Зараз я буду говорити ситуацію, а ви голосуєте!
    - id: '30'
      type: vote
      duration_sec: 10
      text:
        ru: >
          «Одноклассник говорит: «Я умею делать сальто, но сегодня не могу — нога
          болит.»»
        en: "\"A classmate says: \"I can do a somersault, but I can't today — my leg hurts.\"\""
        uk: '«Одноклассник говорить: «Я умію робити сальто, але сьогодні не можу — нога болить.»»'
      options:
      - id: opt_1
        text:
          ru: Нормальное объяснение
          en: Normal explanation
          uk: Нормальне пояснення
      - id: opt_2
        text:
          ru: Отговорка
          en: Excuse
          uk: Відмовка
      correct: opt_1
    - id: '31'
      type: speech
      duration_sec: 12
      text:
        ru: >
          Пока нормальное объяснение! Нога правда может болеть. Но если он КАЖДЫЙ
          раз находит новую причину — нога, голова, скользкий пол, не тот день — тогда
          это уже отговорки.
        en: For now, a normal explanation! A leg can really hurt. But if he EVERY time finds a new reason — leg, head, slippery floor, wrong day — then those are excuses.
        uk: Поки нормальне пояснення! Нога дійсно може болити. Але якщо він КОЖНОГО разу знаходить нову причину — нога, голова, ковзкий пол, неправильний день — то це вже відмовки.
    - id: '32'
      type: vote
      duration_sec: 10
      text:
        ru: >
          «Друг хвастается: «У меня дома живёт ручная ворона, но она прячется, когда
          приходят гости.»»
        en: '"A friend brags: "I have a tame raven at home, but it hides when guests come.""'
        uk: '«Друг хвастається: «У мене дома живе прирученний ворон, але він ховається, коли приходять гості.»»'
      options:
      - id: opt_1
        text:
          ru: Нормальное объяснение
          en: Normal explanation
          uk: Нормальне пояснення
      - id: opt_2
        text:
          ru: Отговорка
          en: Excuse
          uk: Відмовка
      correct: opt_2
    - id: '33'
      type: speech
      duration_sec: 8
      text:
        ru: >
          Отговорка! Удобно — никто никогда не сможет увидеть эту ворону. Прямо как
          камень Вити.
        en: Excuse! Convenient — nobody will ever be able to see this raven. Just like Vitya's stone.
        uk: Відмовка! Зручно — ніхто ніколи не зможе побачити цього ворона. Прямо як камінь Вітя.
    - id: '34'
      type: vote
      duration_sec: 10
      text:
        ru: >
          «Брат говорит: «Я убрал комнату, но потом кот всё разбросал обратно.»»
        en: '"Brother says: "I cleaned up the room, but then the cat scattered everything again.""'
        uk: '«Брат говорить: «Я прибрав кімнату, але потім кіт все розкидав назад.»»'
      options:
      - id: opt_1
        text:
          ru: Нормальное объяснение
          en: Normal explanation
          uk: Нормальне пояснення
      - id: opt_2
        text:
          ru: Отговорка
          en: Excuse
          uk: Відмовка
      correct: opt_2
    - id: '35'
      type: speech
      duration_sec: 10
      text:
        ru: >
          Хитро! Один раз — может быть. Но если кот «разбрасывает» каждый раз ровно
          перед проверкой — это отговорка.
        en: Tricky! Once — maybe. But if the cat "scatters things" every time right before inspection — that's an excuse.
        uk: Хитро! Один раз — може бути. Але якщо кіт «розкидає» кожен раз прямо перед перевіркою — це відмовка.
    - id: '36'
      type: vote
      duration_sec: 10
      text:
        ru: >
          «Одноклассница: «Я решила все задачи, но тетрадка осталась дома. А дома
          её съела собака.»»
        en: '"A classmate: "I solved all the problems, but my notebook stayed home. And the dog ate it at home.""'
        uk: "«Однокласниця: «Я розв'язала всі задачі, але зошит залишився дома. А дома його з'їла собака.»»"
      options:
