    - id: '118'
      type: speech
      duration_sec: 15
      text:
        ru: >
          Видите — одна и та же вещь! Арбуз, улица, бег — а про них можно сказать
          и факт, и мнение. Разница — есть ли инструмент и число. Если есть — проверяемое.
          Если нет — мнение. А если инструмент есть, но не дают проверить — хитрое!
        en: >
          See — it's the same thing! A watermelon, the street, running — you can say
          facts and opinions about all of them. The difference is: is there a tool and a
          number? If yes — checkable. If no — opinion. If the tool exists but they won't
          let you check — tricky!
        uk: >
          Бачите — це одна й та сама річ! Кавун, вулиця, біг — а про них можна сказати
          і факт, і думку. Різниця — є ли інструмент і число. Якщо є — перевіряємо.
          Якщо ні — думка. А якщо інструмент є, але не дають перевірити — хитре!
  - scene_id: sc7
    title:
      ru: ЗАКРЫТИЕ
      en: CONCLUSION
      uk: ЗАВЕРШЕННЯ
    media_ref: 1B.sc7.closing
    status: v3_locked
    steps:
    - id: '119'
      type: speech
      duration_sec: 20
      text:
        ru: >
          Знаете, что вы сегодня сделали? Вы научились задавать самый важный вопрос:
          «А как это проверить?» Звучит просто — но большинство взрослых его не задают.
          Серьёзно.
        en: >
          You know what you did today? You learned to ask the most important question:
          "How can we check this?" It sounds simple — but most adults don't ask it.
          Seriously.
        uk: >
          Знаєте, що ви зробили сьогодні? Ви навчилися задавати найважливіше питання:
          «А як це перевірити?» Звучить просто — але більшість дорослих його не задають.
          Серйозно.
    - id: '120'
      type: speech
      duration_sec: 20
      text:
        ru: >
          Кто-то говорит: «Этот крем лечит всё!» — и люди верят. Кто-то говорит: «Я
          видел привидение, но оно появляется только в темноте, когда никто не смотрит»
          — и люди кивают. А вы теперь знаете: если нельзя проверить — верить необязательно.
        en: >
          Someone says: "This cream heals everything!" — and people believe it. Someone
          says: "I saw a ghost, but it only appears in the dark when nobody's looking" —
          and people nod. But now you know: if you can't check it — you don't have to
          believe it.
        uk: >
          Хтось говорить: «Цей крем лікує все!» — і люди вірять. Хтось говорить: «Я
          бачив привида, але він з'являється тільки в темряві, коли ніхто не дивиться»
          — і люди киваютьь. А ви тепер знаєте: якщо неможливо перевірити — вірити
          необов'язково.
    - id: '121'
      type: speech
      duration_sec: 15
      text:
        ru: >
          У вас есть пять инструментов — весы, линейка, часы, термометр и счёт. И
          ещё один, самый главный — вопрос: «Каким прибором это проверить?» Если ответ
          есть — отлично. Если на каждый ответ новая отговорка — вы знаете, что делать.
        en: >
          You have five tools — scales, ruler, clock, thermometer, and counting. And one
          more, the most important — the question: "What tool can we use to check this?"
          If there's an answer — great. If there's a new excuse for every answer — you
          know what to do.
        uk: >
          У вас є п'ять інструментів — ваги, лінійка, годинник, термометр і лічба. І ще
          один, найголовніший — питання: «Яким приладом це перевірити?» Якщо відповідь є
          — чудово. Якщо на кожну відповідь нова відмовка — ви знаєте, що робити.
    - id: '122'
      type: speech
      duration_sec: 15
      text:
        ru: >
          Попробуйте дома! Послушайте, что говорят по телевизору, в интернете, во
          дворе. И спросите себя: это можно проверить? Каким инструментом? Или тут
          отговорка? Вы удивитесь, как часто это работает.
        en: >
          Try it at home! Listen to what people say on TV, on the internet, at the
          playground. And ask yourself: can this be checked? With what tool? Or is there
          an excuse? You'll be surprised how often this works.
        uk: >
          Спробуйте вдома! Послухайте, що говорять по телевізору, в інтернеті, на вулиці.
          І запитайте себе: це можна перевірити? Яким інструментом? Чи тут відмовка? Ви
          здивуєтесь, як часто це працює.
    - id: '123'
      type: speech
      duration_sec: 15
      text:
        ru: >
          На сегодня всё! Вы — настоящие детективы правды. Мне с вами было здорово.
          До следующего занятия — и пусть ни одна отговорка от вас не ускользнёт!
        en: >
          That's all for today! You're real truth detectives. It was awesome with you.
          Until next time — and may no excuse get past you!
        uk: >
          На сьогодні все! Ви — справжні детективи правди. Мені з вами було чудово. До
          наступного заняття — і нехай жодна відмовка від вас не ускользне!
