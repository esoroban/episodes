        en: "\"A friend: \"My grandfather saw a real bear in the city, but it was a long time ago and there are no photos left, and grandpa doesn't remember exactly where.\"\""
        uk: "«Друг: «Мій дідусь бачив справжнього ведмедя в місті, але це було давно і фотографій не залишилось, і дідусь уже не пам'ятає точно де.»»"
      options:
      - id: opt_1
        text:
