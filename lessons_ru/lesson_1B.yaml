      text:
        ru: >
          Есть! Рулетка. Измерил комнату, измерил коридор — сравнил метры.
        en: Yes! Tape measure. Measured the room, measured the hallway — compared meters.
        uk: Так! Рулетка. Виміряв кімнату, виміряв коридор — порівняв метри.
    - id: '72'
      type: vote
      duration_sec: 10
      text:
        ru: >
          «Делать уроки — скучно.»
        en: '"Doing homework is boring."'
