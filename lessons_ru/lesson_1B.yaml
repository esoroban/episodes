        ru: >
          Есть! Термометр. Опустил в воду — увидел градусы.
        en: Yes! Thermometer. Dipped in water — saw degrees.
        uk: Так! Термометр. Опустив у воду — побачив градуси.
    - id: '62'
      type: vote
      duration_sec: 10
      text:
        ru: >
          «Этот фильм — самый лучший.»
        en: '"This movie is the best."'
