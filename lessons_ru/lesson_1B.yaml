        en: Excuse! Long ago, no photos, doesn't remember. All verification paths are closed. Like Vitya's stone.
        uk: Відмовка! Давно, немає фото, не пам'ятає. Усі шляхи перевірки закриті. Як камінь Вітя.
    - id: '48'
      type: vote
      duration_sec: 10
      text:
        ru: >
          «Одноклассник: «Я могу задержать дыхание на три минуты, но только когда
