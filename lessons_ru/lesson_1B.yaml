        en: Once — maybe. But twice in a row, and always to you specifically? Looks like an excuse.
        uk: Один раз — буває. Але два рази підряд, і завжди саме тобі? Схоже на відмовку.
    - id: '42'
      type: vote
      duration_sec: 10
      text:
        ru: >
          «Мальчик: «Я бегаю быстрее всех, просто сегодня кроссовки неудобные.»»
