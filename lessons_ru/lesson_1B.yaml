      duration_sec: 12
      text:
        ru: >
          И помните — это не значит, что человек плохой. Витя сам верил в камень.
          Сестра правда может не помнить, кто разбил чашку. Но если проверить НЕЛЬЗЯ
          — верить на слово необязательно.
        en: >
          And remember — this doesn't mean the person is bad. Vitya himself believed in
          the stone. His sister might really not remember who broke the cup. But if you
          CAN'T check — you don't have to believe just on their word.
        uk: >
          І запам'ятайте — це не означає, що людина погана. Вітя сам вірив у камінь.
          Його сестра може справді не пам'ятати, хто розбив чашку. Але якщо перевірити
          НЕМОЖНА — вірити на слово необов'язково.
  - scene_id: sc4
    title:
      ru: ЧЕМ ПРОВЕРИТЬ
      en: HOW TO VERIFY
      uk: ЧИМ ПЕРЕВІРИТИ
    media_ref: 1B.sc4.instruments
    status: v3_locked
    steps:
    - id: '54'
      type: speech
      duration_sec: 12
      text:
        ru: >
          Мы научились замечать отговорки. Но если отговорок нет — КАК именно проверить?
          Голыми руками? Нет! У нас есть инструменты.
        en: >
          We've learned to spot excuses. But if there are no excuses — HOW exactly can we
          check? With our bare hands? No! We have tools.
        uk: >
          Ми навчилися помічати відмовки. Але якщо відмовок нема — ЯК саме перевірити?
          Голими руками? Ні! У нас є інструменти.
    - id: '55'
      type: speech
      duration_sec: 20
      text:
        ru: >
          Вот пять помощников. ВЕСЫ — проверяют вес. ЛИНЕЙКА или рулетка — длину,
          высоту, расстояние. ЧАСЫ или секундомер — время и скорость. ТЕРМОМЕТР —
          температуру. И СЧЁТ — просто посчитать: сколько штук, сколько человек, сколько
          этажей.
        en: >
          Here are five helpers. SCALES — check weight. RULER or tape measure — length,
          height, distance. CLOCK or stopwatch — time and speed. THERMOMETER — temperature.
          And COUNTING — just count: how many things, how many people, how many floors.
        uk: >
          Ось п'ять помічників. ВАГИ — перевіряють вагу. ЛІНІЙКА або рулетка — довжину,
          висоту, відстань. ГОДИННИК або секундомер — час і швидкість. ТЕРМОМЕТР —
          температуру. І ЛІЧБА — просто порахувати: скільки речей, скільки людей, скільки
          поверхів.
    - id: '56'
      type: speech
      duration_sec: 12
      text:
        ru: >
          Если для утверждения есть хотя бы ОДИН подходящий инструмент — его можно
          проверить. А если ни один не подходит? Тогда, скорее всего, перед вами мнение
          или хитрое утверждение.
        en: >
          If there's at least ONE suitable tool for a statement — you can check it. But
          if no tool works? Then, most likely, you're looking at an opinion or a tricky
          statement.
        uk: >
          Якщо для твердження є хоча б ОДИН підходящий інструмент — його можна перевірити.
          А якщо жоден не підходить? Тоді, швидше за все, перед вами думка або хитре
          твердження.
    - id: '57'
      type: speech
      duration_sec: 8
      text:
        ru: >
          Тренируемся! Я говорю фразу — вы решаете: есть инструмент или нет?
        en: "Let's practice! I say a phrase — you decide: is there a tool or not?"
        uk: 'Тренуємось! Я говорю фразу — ви вирішуєте: є інструмент чи ні?'
    - id: '58'
      type: vote
      duration_sec: 10
      text:
        ru: >
          «Эта книжка весит пятьсот граммов.»
        en: '"This book weighs five hundred grams."'
        uk: «Ця книжка важить п'ятсот грамів.»
      options:
      - id: opt_1
        text:
          ru: Есть инструмент
          en: There is a tool
          uk: Є інструмент
      - id: opt_2
