        en: Excuse on top of excuse! First she forgot, then the dog ate it. The more excuses in a row — the more suspicious.
        uk: Відмовка на відмовці! Спочатку забула, потім собака з'їла. Чим більше відмовок підряд — тим підозріліше.
    - id: '38'
