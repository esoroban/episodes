              был ТАКОЙ тяжёлый день, ты себе не представляешь!» Ответ на другой вопрос:
              «Я собрал портфель и приготовил форму!» Портфель готов, форма глажена
              — а в тетрадке пусто.

              '
            uk: 'Друга відповідь: «Так, я був там. Але мене злила з однією подругою,
              тому половину часу я сиділ окремо.»'
            en: 'Second answer: "Yes, I was. But I had a falling out with one friend,
              so I sat apart half the time."'
        - id: '109'
          type: speech
          duration_sec: 6
          text:
            ru: 'Вопрос: «Ты убрал телефон перед сном?»

              '
            uk: 'Приклад 2: Запитай про деталі'
            en: 'Example 2: Ask for Details'
        - id: '110'
          type: discussion
          duration_sec: 25
          text:
            ru: 'Три способа — удивите!

              '
            uk: 'Перше питання: «Ти об''їв мою печиво?»'
            en: 'First question: "Did you eat my cookies?"'
        - id: '111'
          type: speech
          duration_sec: 14
          text:
            ru: 'Смена темы: «Пап, а правда что синий свет от экрана портит зрение?
