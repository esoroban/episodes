              Там такой смешной ролик!» Ответ на другой вопрос: «Я уже поставил будильник
              на завтра!» Будильник стоит, а телефон по-прежнему в руках.

              '
            uk: 'Перша відповідь: «Печиво було неймовірно смачним! Хто їх готував?
              Вони були свіжі, гарячі і дуже добрі!»'
            en: 'First answer: "The cookies were incredibly tasty! Who made them?
              They were fresh, warm, and very good!"'
        - id: '112'
          type: speech
          duration_sec: 6
          text:
            ru: 'Вопрос: «Ты поел суп на обед?»

              '
            uk: 'Це третій тип поворотника. Скажи: «Це цікаво, але я спитав, чи ТИ
              їх об''їв. Ти це робив чи ні?»'
            en: 'That''s the third type of redirector. Say: "That''s interesting,
              but I asked if YOU ate them. Did you do it or not?"'
        - id: '113'
          type: discussion
          duration_sec: 25
          text:
            ru: 'Последний раунд — самые хитрые варианты!

              '
            uk: 'Друга відповідь: «Так, я їх трохи спробував. Вибачай, вони були дуже
              смачні.»'
            en: 'Second answer: "Yes, I tried some. Sorry, they were very tasty."'
        - id: '114'
          type: speech
          duration_sec: 14
          text:
            ru: 'Смена темы: «Мам, а давай завтра сварим борщ? Бабушка говорит, её
              рецепт — лучший в мире!» Смена тональности: «Суп?! Он был такой горячий,
              я чуть язык не обжёг! Это опасно для здоровья!» Ответ на другой вопрос:
              «Я съел салат и два куска хлеба!» Салат съеден, хлеб тоже, а суп стоит
              нетронутый и остывает.

              '
            uk: 'Висновок: Магічна фраза допомагає тобі отримувати чесні, пряму відповідь.'
            en: 'Conclusion: The magic phrase helps you get honest, direct answers.'
        - id: '115'
          type: speech
          duration_sec: 8
          text:
            ru: 'Заметили? Самый опасный — ответ на другой вопрос. Потому что звучит
