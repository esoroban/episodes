lesson:
  id: lesson_6A
  day: 6
  slot: A
  title:
    ru: Уклонение от ответа
    uk: Ухиляння від відповіді
    en: Dodging the Answer
  scenes:
    - scene_id: sc1
      title:
        ru: 'Разминка: блиц по курсу'
        uk: 'Розминка: блискавична вікторина по курсу'
        en: 'Warm-up: Speed quiz from the course'
      media_ref: 6A.sc1.review_blitz_1_4
      status: v3_locked
      steps:
        - id: '1'
          type: speech
          duration_sec: 10
          text:
            ru: 'Привет, разведчики! Перед новой темой — быстрая разминка. Вспомним
              всё, чему научились за предыдущие уроки. Отвечаем быстро!

              '
            uk: Привіт, розвідники! Перед новою темою — швидка розминка. Згадаємо
              все, чого навчилися на попередніх уроках. Відповідаємо швидко!
            en: Hello, detectives! Before the new topic — a quick warm-up. Let's remember
              everything we learned in previous lessons. Answer quickly!
        - id: '2'
          type: vote
          duration_sec: 12
          text:
            ru: '«Шоколад — самая вкусная еда на планете.»

              '
            uk: «Шоколад — найсмачніша їжа на планеті.»
            en: '"Chocolate is the most delicious food on the planet."'
          options:
            - id: opt_1
              text:
                ru: Факт
                uk: Факт
                en: Fact
            - id: opt_2
              text:
                ru: Мнение
                uk: Думка
                en: Opinion
            - id: opt_3
              text:
                ru: Неправда
                uk: Неправда
                en: 'False'
          correct: opt_2
        - id: '3'
          type: speech
          duration_sec: 8
          text:
            ru: 'Мнение! «Самая вкусная» — это оценка. Кто-то любит шоколад, а кто-то
              — солёные огурцы. И оба правы. И оба странные.

              '
            uk: Думка! «Найсмачніша» — це оцінка. Комусь подобається шоколад, а комусь
              — солоні огірки. І обидва праві. І обидва дивні.
            en: Opinion! "Most delicious" is a judgment. Some people like chocolate,
              others like salty cucumbers. Both are right. Both are weird.
        - id: '4'
          type: vote
          duration_sec: 14
          text:
            ru: 'Друг говорит: «Я надел жёлтые носки — и получил отличную оценку!
              Жёлтые носки приносят удачу!»

              '
            uk: 'Друг говорить: «Я надів жовті шкарпетки — і отримав виблискувачну
              оцінку! Жовті шкарпетки приносять удачу!»'
            en: 'A friend says: "I put on yellow socks and got an excellent grade!
              Yellow socks bring good luck!"'
          options:
            - id: opt_1
              text:
                ru: Причина
                uk: Причина
                en: Cause
            - id: opt_2
              text:
                ru: Совпадение
                uk: Збіг
                en: Coincidence
          correct: opt_2
        - id: '5'
          type: speech
          duration_sec: 10
          text:
            ru: 'Совпадение! Носки не влияют на оценки. Иначе те, кто учится на отлично
              ходили бы в жёлтых носках. А те, кто плохо учится — босиком.

              '
            uk: Збіг! Шкарпетки не впливають на оцінки. Інакше ті, хто добре навчається,
              ходили б у жовтих шкарпетках. А ті, хто погано навчається, — босоніж.
            en: Coincidence! Socks don't affect grades. Otherwise, those who study
              well would wear yellow socks. And those who struggle would go barefoot.
        - id: '6'
          type: vote
          duration_sec: 14
          text:
            ru: 'Летом люди едят больше мороженого. Летом люди чаще обгорают на солнце.
              Значит, мороженое вызывает ожоги?

              '
            uk: Влітку люди їдять більше морозива. Влітку люди частіше обгоряють на
              сонці. Значить, морозиво викликає опіки?
            en: In summer, people eat more ice cream. In summer, people get sunburned
              more often. So does ice cream cause sunburns?
          options:
            - id: opt_1
              text:
                ru: Да, причина
                uk: Так, причина
                en: Yes, it's the cause
            - id: opt_2
              text:
                ru: Нет, общая причина — лето
                uk: Ні, спільна причина — літо
                en: No, common cause is summer
            - id: opt_3
              text:
                ru: Нет, просто совпадение
                uk: Ні, просто збіг
                en: No, just coincidence
          correct: opt_2
        - id: '7'
          type: speech
          duration_sec: 10
          text:
            ru: 'Общая причина — лето! И мороженое, и ожоги появляются из-за жары.
              Мороженое ни в чём не виновато. Его вообще несправедливо обвинили.

              '
            uk: Спільна причина — літо! І морозиво, і опіки з'являються через спеку.
              Морозиво ні в чому не винне. Його взагалі несправедливо звинувачили.
            en: Common cause is summer! Both ice cream and sunburns appear because
              of the heat. Ice cream is not to blame. It was unfairly accused.
        - id: '8'
          type: vote
          duration_sec: 14
          text:
            ru: 'Реклама говорит: «Этот йогурт рекомендуют врачи!» Какой способ убеждения?

              '
            uk: 'Реклама говорить: «Цей йогурт рекомендують лікарі!» Який спосіб переконання?'
            en: 'An advertisement says: "Doctors recommend this yogurt!" Which persuasion
              technique?'
          options:
            - id: opt_1
              text:
                ru: Логос (факты и логика)
                uk: Логос (факти та логіка)
                en: Logos (facts and logic)
            - id: opt_2
              text:
                ru: Этос (доверие к авторитету)
                uk: Етос (довіра до авторитету)
                en: Ethos (trust in authority)
            - id: opt_3
              text:
                ru: Пафос (эмоции)
                uk: Патос (емоції)
                en: Pathos (emotions)
          correct: opt_2
        - id: '9'
          type: speech
          duration_sec: 8
          text:
            ru: 'Этос — доверие к авторитету! «Врачи рекомендуют» — нам не дают факты,
              а просят поверить экспертам. А каким именно врачам — не уточняют.

              '
            uk: Етос! Лікарі — авторитети. Ми довіряємо їхній думці. Рекламодавці
              це знають і використовують.
            en: Ethos! Doctors are authorities. We trust their opinion. Advertisers
              know this and use it.
        - id: '10'
          type: vote
          duration_sec: 14
          text:
            ru: '«Все нормальные дети уже купили эту игрушку!» Какой приём?

              '
            uk: 'Сцена 1: Першої помічено'
            en: 'Scene 1: First Spotted'
          options:
            - id: opt_1
              text:
                ru: Логос (факты)
                uk: Допомоги, розвідники! Я звернувся до друзів за посадою, а вони
                  ставлять мені дикі питання.
                en: Help, detectives! I asked my friends for a ride, but they're asking
                  me weird questions.
            - id: opt_2
              text:
                ru: Этос (авторитет)
                uk: 'Перша сцена. Твій друг спитав: «Куди ти їдеш?»'
                en: 'First scene. Your friend asked: "Where are you going?"'
            - id: opt_3
              text:
                ru: Пафос (давление на эмоции)
                uk: 'А ти відповів: «О, дивись, які красиві хмари!»'
                en: 'And you answered: "Oh, look at those beautiful clouds!"'
          correct: opt_3
        - id: '11'
          type: speech
          duration_sec: 10
          text:
            ru: 'Пафос! Давление толпой: «все уже купили, а ты нет — значит, ты ненормальный».
              Это не аргумент, а манипуляция. «Все» — это вообще кто? Два человека
              из рекламы?

              '
            uk: Що ти зробив?
            en: 'Pathos! Pressure from the crowd: “everyone has already bought it,
              but you haven’t, which means you’re crazy.” This is not an argument,
              but a manipulation. Who is “everyone” anyway? Two people from advertising?'
        - id: '12'
          type: vote
          duration_sec: 15
          text:
            ru: 'Спор о школьной форме. Кто-то говорит: «Форма нужна, потому что без
              неё дети будут хвастаться одеждой.» Это...

              '
            uk: Відповів
            en: 'Dispute about school uniform. Someone says: “Uniforms are necessary
              because without them children will show off their clothes.” This...'
          options:
            - id: opt_1
              text:
                ru: Центральная идея (ствол)
                uk: Поворотник
                en: Redirector
            - id: opt_2
              text:
                ru: Аргумент (ветка)
                uk: Поворотник! Змінив тему. Питали про місце, а ти — про погоду.
                  Класичний хід.
                en: Redirector! Changed the subject. Asked where, you talked about
                  weather. Classic move.
            - id: opt_3
              text:
                ru: Деталь (листок)
                uk: 'Друг спитав: «Навіщо тобі така посадка?»'
                en: 'Friend asked: "Why do you need a ride?"'
          correct: opt_2
        - id: '13'
          type: speech
          duration_sec: 8
          text:
            ru: 'Ветка — аргумент! «Потому что» — ключевое слово. Это довод, ПОЧЕМУ
              форма нужна. Ствол — сам вопрос «нужна ли форма».

              '
            uk: 'А ти сказав: «Мій велосипед сломаний, на жаль.»'
            en: 'And you said: "My bike is broken, unfortunately."'
        - id: '14'
          type: speech
          duration_sec: 6
          text:
            ru: 'Отлично, память работает! А сейчас — новая тема. И она вам точно
              знакома из жизни.

              '
            uk: Це відповідь?
            en: Is that an answer?
    - scene_id: sc2
      title:
        ru: Повторение 5А–5Б
        uk: Відповів!
        en: Answered!
      media_ref: 6A.sc2.review_5A_5B
      status: v3_locked
      steps:
        - id: '15'
          type: speech
          duration_sec: 8
          text:
            ru: 'А теперь вспомним, что было на прошлых уроках! Мы говорили про источники
              и про споры. Проверяем!

              '
            uk: Найкраще навіть невелике пояснення — ясний стоп. Друг розуміє, чому
              ти просиш.
            en: Even a brief explanation is a clear answer. Your friend understands
              why you're asking.
        - id: '16'
          type: vote
          duration_sec: 14
          text:
            ru: 'Друг говорит: «Мой старший брат сказал, что в школе отменили контрольную.»
              Это какой источник?

              '
            uk: «Хочеш, давай грати в теніс замість цього?»
            en: '"Want to play tennis instead?"'
          options:
            - id: opt_1
              text:
                ru: Своими глазами
                uk: «Мені подобається теніс, мої друзі — чудові гравці!»
                en: '"I like tennis, my friends are great players!"'
            - id: opt_2
              text:
                ru: Услышал от кого-то
                uk: Що тут?
                en: What's here?
          correct: opt_2
        - id: '17'
          type: speech
          duration_sec: 6
          text:
            ru: 'Услышал от кого-то! Друг сам не видел — передаёт слова брата. А брат
              мог пошутить.

              '
            uk: Поворотник
            en: I heard from someone! The friend didn’t see it himself - he conveys
              the words of his brother. And my brother could joke.
        - id: '18'
          type: vote
          duration_sec: 14
          text:
            ru: 'Сайт «superpravda-100percent.com» пишет: «Учёные доказали, что коты
              умеют летать.» Надёжный источник?

              '
            uk: Поворотник! Питали про дозвіл, а ти говориш про теніс. Змінив тон
              розмови — з запропонованої теми на свою.
            en: Redirector! Asked for permission, but you talk about tennis. Changed
              the tone of conversation from their topic to yours.
          options:
            - id: opt_1
              text:
                ru: Надёжный
                uk: Давайте дізнаємось більше про три поворотники.
                en: Let's learn more about three redirectors.
            - id: opt_2
              text:
                ru: Ненадёжный
                uk: 'Сцена 2: «Розмова» про знаходження часу'
                en: 'Scene 2: A "Chat" About Finding Time'
          correct: opt_2
        - id: '19'
          type: speech
          duration_sec: 6
          text:
            ru: 'Ненадёжный! Название уже подозрительное. А «учёные доказали» без
              ссылки — любимый приём сомнительных сайтов.

              '
            uk: 'Ти запитуєш: «Чи я можу прийти у субота?»'
            en: 'You ask: "Can I come on Saturday?"'
        - id: '20'
          type: vote
          duration_sec: 14
          text:
            ru: 'Видео в интернете: кот играет на пианино. Подпись: «Кот-музыкант
              даёт концерты по всему миру!»

              '
            uk: 'Мати говорить: «О, я була б така щаслива! Але знаєш, я завжди так
              зайнята...» І починає розповідати про роботу, про завдання по дому.
              Розповідає їй про те, як вона навіть не має часу на вечерю.'
            en: 'Mom says: "Oh, I would be so happy! But you know, I''m always so
              busy..." And she starts talking about work, about household chores.
              Tells you how she doesn''t even have time for dinner.'
          options:
            - id: opt_1
              text:
                ru: Можно доверять
                uk: А твоє питання про суботу ніяк не розв'язується.
                en: And your question about Saturday is never answered.
            - id: opt_2
              text:
                ru: Стоит проверить
                uk: Що матуся робить?
                en: What is mom doing?
          correct: opt_2
        - id: '21'
          type: speech
          duration_sec: 8
          text:
            ru: 'Стоит проверить! Видео может быть настоящим, а подпись — выдумкой.
              ИИ сейчас делает такие видео, что и кот удивится.

              '
            uk: Змінює тему
            en: Worth checking out! The video may be real, but the caption may be
              fictitious. AI is now making such videos that even the cat will be surprised.
        - id: '22'
          type: vote
          duration_sec: 14
          text:
            ru: 'Одна подруга говорит: «Завтра экскурсия!» Вторая: «Нет, мне мама
              сказала, что экскурсия в пятницу.» Что делать?

              '
            uk: Змінює тон розмови
            en: Changing the tone of conversation
          options:
            - id: opt_1
              text:
                ru: Поверить первой
                uk: Розповідає про щось інше
                en: Talking about something else
            - id: opt_2
              text:
                ru: Поверить второй
                uk: Змінює тему! Ти спитав про суботу, а вона про свою зайнятість.
                  Все це спеціальне — щоб ти забув про своє питання і почав жалкувати
                  матусю.
                en: Changing the subject! You asked about Saturday, but she talks
                  about being busy. All to make you forget your question and start
                  feeling sorry for her.
            - id: opt_3
              text:
                ru: Проверить у учителя
                uk: 'Сцена 3: «Піднесення голосу»'
                en: 'Scene 3: "Raising Your Voice"'
          correct: opt_3
        - id: '23'
          type: speech
          duration_sec: 6
          text:
            ru: 'Проверить! Правило двух источников: если источники противоречат —
              ищем третий. Учитель знает точно.

              '
            uk: 'Ти запитуєш: «Чому ти вчора брав мої гроші без дозволу?»'
            en: 'You ask: "Why did you take my money yesterday without asking?"'
        - id: '24'
          type: vote
          duration_sec: 14
          text:
            ru: 'Два друга говорят, что физкультуру перенесли на завтра. Один услышал
              от учителя, другой — прочитал в школьном чате. Это независимые источники?

              '
            uk: 'Брат говорить гнівно: «ЯК ТИ СМІЄШ РОЗМОВЛЯТИ ЗМІНОЮ! Я для тебе
              много робив!» Підняв голос, почав нападати на тебе.'
            en: 'Your brother says angrily: "HOW DARE YOU SPEAK TO ME LIKE THAT! I
              did a lot for you!" Raises his voice, starts attacking you.'
          options:
            - id: opt_1
              text:
                ru: Да, независимые
                uk: Тепер ти знову на захисті, і твоє питання про гроші загубилося.
                en: Now you're on the defensive again, and your question about the
                  money is lost.
            - id: opt_2
              text:
                ru: Нет, зависимые
                uk: Що робить брат?
                en: What is brother doing?
          correct: opt_1
        - id: '25'
          type: speech
          duration_sec: 8
          text:
            ru: 'Независимые! Один узнал от учителя, другой — из чата. Разные каналы
              — значит, можно верить больше.

              '
            uk: Змінює тему
            en: Changing the subject
        - id: '26'
          type: vote
          duration_sec: 14
          text:
            ru: 'Спор: «Нужно ли делать домашку каждый день?» Кто-то говорит: «Да,
              потому что повторение помогает запомнить.» Это...

              '
            uk: Змінює тон розмови
            en: Changing the tone of conversation
          options:
            - id: opt_1
              text:
                ru: Центральная идея (ствол)
                uk: Поворотник
                en: Redirector
            - id: opt_2
              text:
                ru: Аргумент (ветка)
                uk: Змінює тон розмови! Ти спокійно спитав — а він почав кричати.
                  Атакує тебе, замість того щоб відповісти на питання. Гнів замість
                  відповіді.
                en: Changing the tone! You asked calmly, but he started yelling. Attacks
                  you instead of answering the question. Anger instead of answer.
            - id: opt_3
              text:
                ru: Деталь (листок)
                uk: 'Сцена 4: «Питання замість відповіді»'
                en: 'Scene 4: "Question Instead of Answer"'
          correct: opt_2
        - id: '27'
          type: speech
          duration_sec: 6
          text:
            ru: 'Ветка! «Потому что» — это аргумент. Ствол — сам вопрос «нужна ли
              домашка каждый день».

              '
            uk: 'Ти запитуєш: «Чи ти був на вечіринці, коли тебе запитали про когось?»'
            en: 'You ask: "Were you at the party when they asked you about someone?"'
        - id: '28'
          type: vote
          duration_sec: 14
          text:
            ru: 'В том же споре: «Исследование показало, что 20 минут повторения увеличивают
              запоминание на 40%.» Это...

              '
            uk: 'Товариш запитує у відповідь: «А чому це тебе цікавить? Ти слідкуєш
              за мною?»'
            en: 'Your friend asks back: "Why do you care? Are you spying on me?"'
          options:
            - id: opt_1
              text:
                ru: Центральная идея (ствол)
                uk: Твоє питання віддалилось далеко. Тепер ти розраховуєш на те, что
                  твій товариш можливо звинувачує тебе.
                en: Your question disappeared. Now you're worried that your friend
                  is accusing you.
            - id: opt_2
              text:
                ru: Аргумент (ветка)
                uk: Що він робить?
                en: What is he doing?
            - id: opt_3
              text:
                ru: Деталь (листок)
                uk: Відповів на питання
                en: Answered the question
          correct: opt_3
        - id: '29'
          type: speech
          duration_sec: 6
          text:
            ru: 'Листок — деталь! Конкретные цифры, которые подкрепляют ветку про
              повторение.

              '
            uk: Постав проти-питання
            en: Asked a counter-question
        - id: '30'
          type: vote
          duration_sec: 14
          text:
            ru: 'Спор о телефонах в школе. «Телефоны в школе нужно запретить!» Это...

              '
            uk: Це третій поворотник! Питання замість відповіді. Замість того щоб
              прямо розповісти, він запитує. Тебе перемикає на захисту.
            en: That's the third redirector! Question instead of answer. Instead of
              answering directly, he asks. Switches you to defense mode.
          options:
            - id: opt_1
              text:
                ru: Центральная идея (ствол)
                uk: Добре, а тепер ми знаємо три поворотники.
                en: Good, now we know the three redirectors.
            - id: opt_2
              text:
                ru: Аргумент (ветка)
