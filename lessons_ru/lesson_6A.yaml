              разведчики!

              '
            uk: 'Сцена 12: Як розповідати іншим про поворотники'
            en: 'Scene 12: How to Tell Others About Redirectors'
    - scene_id: sc9
      title:
        ru: Возврат к вопросу
        uk: Можливо, твої друзі або сім'я не знають про три типи поворотників. Як
          ти їм розповідаєш?
        en: Maybe your friends or family don't know about the three types of redirectors.
          How do you tell them?
      media_ref: 6A.sc9.return_to_question
      status: v3_locked
      steps:
        - id: '116'
          type: speech
          duration_sec: 12
          text:
            ru: 'Мы научились замечать поворотники. Но что с ними делать? Не кричать
              же: «Ты поворотник!» Нет, есть способ лучше. Есть волшебная фраза.

              '
            uk: Робись просто і спокійно. Не звинувачуй. Просто покажи приклади.
            en: Be simple and calm. Don't accuse. Just show examples.
        - id: '117'
          type: speech
          duration_sec: 10
          text:
            ru: '«Это интересно, но я спрашивал о другом...» Сначала признаём сказанное
              — а потом спокойно возвращаемся к своему вопросу. Не грубо, не злобно
              — просто и чётко.

              '
            uk: 'Приклад розмови:'
            en: '“This is interesting, but I asked about something else...” First,
              we admit what was said - and then calmly return to our question. Not
              rude, not angry - simple and clear.'
        - id: '118'
          type: speech
          duration_sec: 10
          text:
            ru: 'Другие варианты: «Подожди, я спросил о...» / «Давай вернёмся к моему
              вопросу...» / «Ты не ответил — я спрашивал: ...» Все работают. Главное
              — вежливо.

              '
            uk: 'Ти: «Мамо, я дізнався про три способи ухилення від ответа. Можна
              я дам тобі приклад?» Мати: «Звичайно, розповідай.» Ти: «Коли я спитав,
              чи я могу піти гуляти, ти розповідала про погоду. Це називається змінення
              теми. Це один из способов ухилення.»'
            en: 'You: "Mom, I learned about three ways people dodge answers. Can I
              give you an example?" Mom: "Sure, go ahead." You: "When I asked if I
              could go for a walk, you talked about the weather. That''s called changing
              the subject. It''s one way of dodging."'
        - id: '119'
          type: speech
          duration_sec: 10
          text:
            ru: 'Важно: мы не нападаем, не обвиняем, не злимся. Мы просто возвращаемся
              к теме. Как GPS: «Маршрут перестроен. Через 50 метров — ваш вопрос.»

              '
            uk: Мати може здиватися або посміятися. Це нормально! Це просто спостереження,
              не звинувачення.
            en: Mom might be surprised or laugh. That's normal! It's just an observation,
              not an accusation.
        - id: '120'
          type: vote
          duration_sec: 14
          text:
            ru: 'Ваш вопрос: «Вы поставите мне отличную оценку?» Ответ учителя: «О,
              смотрите, какое красивое небо сегодня!» Как вернуть к теме?

              '
            uk: 'Пам''ятай: ти не ловиш людей. Ти просто розпізнаєш патерни розмов.'
            en: 'Remember: you''re not catching people. You''re just recognizing conversation
              patterns.'
          options:
            - id: opt_1
              text:
                ru: «Небо и правда красивое!»
                uk: 'Сцена 13: Закріплення знань'
                en: 'Scene 13: Reinforcement'
            - id: opt_2
              text:
                ru: «Это красиво, но я спрашивал об оценке...»
                uk: 'Тепер ми знаємо:'
                en: 'Now we know:'
            - id: opt_3
              text:
                ru: «Вы всегда уходите от темы!»
                uk: '1. Три поворотники: змінити тему, змінити тон, відповісти на
                  інше питання.'
                en: '1. Three redirectors: change subject, change tone, answer different
                  question.'
          correct: opt_2
        - id: '121'
          type: speech
          duration_sec: 8
          text:
            ru: 'Вежливый возврат! Признаём небо — и спокойно повторяем вопрос. Без
              обиды, без драмы. Небо красивое, а отличная оценка всё ещё нужна.

              '
            uk: '2. Магічна фраза: «Це цікаво, але я спрашивал про [оригінальне питання]...»'
            en: '2. Magic phrase: "That''s interesting, but I asked about [original
              question]..."'
        - id: '122'
          type: vote
          duration_sec: 14
          text:
            ru: 'Ваш вопрос: «Можно мне выйти?» Ответ: «А вы знаете, что перемена
              через 10 минут?» Как вернуть?

              '
            uk: 3. Як запитувати, щоб уникнути поворотників.
            en: 3. How to ask to avoid redirectors.
          options:
            - id: opt_1
              text:
                ru: «Ладно, подожду»
                uk: 4. Як виправляти другу відповідь, якщо перша була ухиленням.
                en: 4. How to get a second answer if the first was dodging.
            - id: opt_2
              text:
                ru: «Да, но я спросил, можно ли выйти сейчас?»
                uk: 5. Як розповідати іншим, не звинувачуючи.
                en: 5. How to tell others without accusing.
            - id: opt_3
              text:
                ru: «Вы не отвечаете!»
                uk: Це наша суперсила! Мы не ловимо людей. Мы отримуємо чесні відповіді,
                  які робиать людей ближче.
                en: This is our superpower! We don't catch people. We get honest answers
                  that bring people together.
          correct: opt_2
        - id: '123'
          type: speech
          duration_sec: 8
          text:
            ru: '«Да, но я спросил...» — принимаем информацию и возвращаемся к своему
              вопросу. Перемена через 10 минут — спасибо, но можно выйти?

              '
            uk: До наступного уроку, розвідники! Практикуйтесь розпізнавати поворотники
              в реальних розмовах!
            en: Until the next lesson, detectives! Practice recognizing redirectors
              in real conversations!
        - id: '124'
          type: vote
          duration_sec: 14
          text:
            ru: 'Вопрос: «Почему мы не едем на экскурсию?» Ответ: «Экскурсии — это
              так чудесно! Помню, в прошлом году...» Как вернуть?

              '
            uk: 'Екстра: Поради для батьків'
            en: 'Question: “Why don’t we go on an excursion?” Answer: “Excursions
              are so wonderful! I remember last year...” How to return?'
          options:
            - id: opt_1
              text:
                ru: «Расскажите про прошлый год!»
                uk: 'Якщо ви батько або мати, вам буде цікаво: як ви можете використовувати
                  ці навички в своїй сім''ї?'
                en: 'If you''re a parent, you''ll be interested: how can you use these
                  skills in your family?'
            - id: opt_2
              text:
                ru: «Это интересно, но я спрашивал, почему МЫ не едем?»
                uk: 1. Спробуйте запитувати дітей більш конкретно. Замість «Як справи
                  в школі?» спитайте «Що тебе розвеселило в школі?»
                en: 1. Try asking your children more specifically. Instead of "How's
                  school?" ask "What made you happy at school today?"
            - id: opt_3
              text:
                ru: «Вы поворотник!»
                uk: 2. Коли дитина дає відповідь, яка не відповідає на твоє питання,
                  просто скажи магічну фразу.
                en: 2. When your child gives an answer that doesn't match your question,
                  just say the magic phrase.
          correct: opt_2
        - id: '125'
          type: speech
