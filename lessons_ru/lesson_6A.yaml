    - scene_id: sc8
      title:
        ru: 'Тренировка: придумай поворотник'
        uk: 'Вправа 2: Повернення розмови'
        en: 'Exercise 2: Returning the Conversation'
      media_ref: 6A.sc8.invent_evasion
      status: v3_locked
      steps:
        - id: '99'
          type: speech
          duration_sec: 10
          text:
            ru: 'А теперь — вы сами побудете поворотниками! Я задаю вопрос, а вы придумываете
              уклонение. Попробуйте использовать каждый из трёх способов!

              '
            uk: 'Друг спитав: «Ти мені допоможеш з домашньою роботою?»'
            en: 'Friend asked: "Will you help me with homework?"'
        - id: '100'
          type: speech
          duration_sec: 6
          text:
            ru: 'Вопрос: «Ты выгулял собаку?»

              '
            uk: 'А ти відповів: «О, домашня робота важка! Мені дуже важко по математиці.
              Рідко розумію квадратні рівняння...» Це поворотник. Твоя відповідь?'
            en: 'You answered: "Oh, homework is hard! I struggle with math. I rarely
              understand quadratic equations..." This is a redirector. Your answer?'
        - id: '101'
          type: discussion
          duration_sec: 25
          text:
            ru: 'Придумайте смену темы, смену тональности и ответ на другой вопрос.
              Какой способ получился самый хитрый?

              '
            uk: 'Правильна відповідь: «Це цікаво, але я спитав, чи ти мені допоможеш?»'
            en: 'Correct answer: "That''s interesting, but I asked if you''ll help
              me."'
        - id: '102'
          type: speech
          duration_sec: 12
          text:
            ru: 'Вот мои варианты. Смена темы: «А ты знаешь, что хаски могут пробежать
              150 километров в день?» Смена тональности: «Ты что, думаешь мне легко?!
              У меня контрольная завтра!» Ответ на другой вопрос: «Я налил ей свежей
              воды!» Вода — молодец. Но прогулка где?

              '
            uk: 'Сцена 11: Як впевнитися, що ми розуміємо'
            en: 'Here are my options. Change of subject: “Did you know that huskies
              can run 150 kilometers a day?” Change of tone: “Do you think it’s easy
              for me?! I have a test tomorrow!” Answer to another question: “I poured
              her fresh water!” Water is great. But where is the walk?'
        - id: '103'
          type: speech
          duration_sec: 6
          text:
            ru: 'Вопрос: «Ты почистил зубы?»

              '
            uk: Якщо людина вже дала першу відповідь, але ти все ще не впевнений,
              ти можеш запитати ще раз. Але чітко, спокійно, без гніву.
            en: If the person already gave their first answer, but you're still not
              sure, you can ask again. But clearly, calmly, without anger.
        - id: '104'
          type: discussion
          duration_sec: 25
          text:
            ru: 'Три способа — какие варианты?

              '
            uk: 'Приклад 1: Будь точним в другому питанні'
            en: 'Example 1: Be Specific in Your Second Question'
        - id: '105'
          type: speech
          duration_sec: 12
          text:
            ru: 'Смена темы: «Мам, а правда что у акул зубы растут всю жизнь?» Смена
              тональности: «Ха-ха, ты каждый вечер это спрашиваешь, мы как в фильме
              "День сурка"!» Ответ на другой вопрос: «Я уже умылся и переоделся в
              пижаму!» Всё сделал, кроме зубов. Зубы в шоке.

              '
            uk: 'Перше питання: «Ти був на вечіринці?»'
            en: 'Changing the subject: “Mom, is it true that sharks grow teeth throughout
              their lives?” Change of tone: “Ha-ha, you ask this every evening, we’re
              like in the movie “Groundhog Day”!” Answer to another question: “I’ve
              already washed my face and changed into my pajamas!” I did everything
              except the teeth. Teeth are in shock.'
        - id: '106'
          type: speech
          duration_sec: 6
          text:
            ru: 'Вопрос: «Ты сделал уроки на завтра?»

              '
            uk: 'Перша відповідь: «О, вечірка була прекрасна! Там були смішні ігри,
              музика, танці...»'
            en: 'First answer: "Oh, the party was great! There were funny games, music,
              dancing..."'
        - id: '107'
          type: discussion
          duration_sec: 25
          text:
            ru: 'Три поворотника — давайте!

              '
            uk: 'Це поворотник. Закажи: «Це цікаво, але я спитав, чи ТИ був на вечіринці.
              Ти там був чи ні?»'
            en: 'That''s a redirector. Say: "That''s interesting, but I asked if YOU
              were at the party. Were you there or not?"'
        - id: '108'
          type: speech
          duration_sec: 14
          text:
            ru: 'Смена темы: «А знаешь, в Финляндии детям вообще не задают домашку,
