    - scene_id: sc11
      title:
        ru: Закрытие урока
        uk: 'Давайте вспомним. Сьогодні ми стали розвідниками розмов. Три поворотники:
          змінити тему, змінити тональність розмови і відповісти на інше питання.
          І волшебна фраза: «Це цікаво, але я спрашивал про інше...»'
        en: 'Let''s remember. Today we became detectives of conversations. Three redirectors:
          change the subject, change the tone of conversation, and answer a different
          question. And the magic phrase: "That''s interesting, but I asked about
          something else..."'
      media_ref: 6A.sc11.closing
      status: v3_locked
      steps:
        - id: '141'
          type: speech
          duration_sec: 12
          text:
            ru: 'Давайте вспомним. Сегодня мы стали разведчиками разговоров. Три поворотника:
              смена темы, смена тональности и ответ на другой вопрос. И волшебная
              фраза: «Это интересно, но я спрашивал о другом...»

              '
            uk: 'Розповім вам одну історію. Один хлопчик запитав дідуся: «Дідусю,
              ти коли-небудь брехав?» Дідусь посміхнувся і сказав: «О, розповім тобі
              тепер, як я коли-то спіймав рибу розміром з човен!» Хлопчик засміявся
              і забув своє питання. А через рік пригадав — і зрозумів: дідусь включив
              поворотник.'
            en: 'I''ll tell you a story. A boy asked his grandfather: "Grandpa, have
              you ever lied?" Grandpa smiled and said: "Oh, let me tell you how I
              once caught a fish the size of a boat!" The boy laughed and forgot his
              question. A year later he remembered and understood: Grandpa activated
              the redirector.'
        - id: '142'
          type: speech
          duration_sec: 14
          text:
            ru: 'Расскажу вам одну историю. Один мальчик спросил дедушку: «Деда, ты
              когда-нибудь врал?» Дедушка улыбнулся и сказал: «О, я тебе сейчас расскажу,
              как однажды поймал рыбу размером с лодку!» Мальчик засмеялся и забыл
              свой вопрос. А через год вспомнил — и понял: дедушка включил поворотник.

              '
            uk: 'І хлопчик знову запитав. А дідусь тихо відповів: «Так, бувало.» Всього
              два слова. Але це була честна відповідь. І хлопчик поважав дідуся ще
              більше — не тому, що той ніколи не брехав, а тому, що зміг признатися.'
            en: 'And the boy asked again. And Grandpa quietly answered: "Yes, sometimes."
              Just two words. But it was an honest answer. And the boy respected his
              grandfather even more—not because he never lied, but because he could
              admit it.'
        - id: '143'
          type: speech
          duration_sec: 10
          text:
            ru: 'И мальчик снова спросил. А дедушка тихо ответил: «Да, бывало.» Всего
              два слова. Но это был честный ответ. И мальчик уважал дедушку ещё больше
              — не за то, что тот никогда не врал, а за то, что смог признаться.

              '
            uk: Ось що дає наша суперсила. Ми не ловимо людей, щоб звинуватити. Ми
              задаємо питання, тому що хочемо справжніх відповідей. А справжні відповіді
              — навіть незручні — приводять людей ближче.
            en: That's what our superpower gives us. We don't catch people to accuse
              them. We ask questions because we want real answers. And real answers,
              even uncomfortable ones, bring people closer together.
        - id: '144'
          type: speech
          duration_sec: 10
          text:
            ru: 'Вот что даёт наша суперсила. Мы не ловим людей, чтобы обвинить. Мы
              задаём вопросы, потому что хотим настоящих ответов. А настоящие ответы
              — даже неудобные — делают людей ближе.

              '
            uk: 'І запам''ятайте: повторити своє питання — це не грубість. Це повага
              до себе та до розмови. Спокійно, вічно, але наполегливо — як GPS: маршрут
              перебудований, повертаємось до питання.'
            en: 'And remember: repeating your question is not rudeness. It''s respect
              for yourself and for the conversation. Calmly, politely, but persistently—like
              GPS: route recalculated, returning to the question.'
        - id: '145'
          type: speech
          duration_sec: 8
          text:
            ru: 'И помните: повторить свой вопрос — это не грубость. Это уважение
              к себе и к разговору. Спокойно, вежливо, но настойчиво — как GPS: маршрут
              перестроен, возвращаемся к вопросу.

              '
            uk: 'А на перерві спробуйте: задайте кому-небудь питання і подивіться
              — відповідять прямо або включать поворотник? Побачимось після перерви!'
            en: 'And during the break, try this: ask someone a question and see—will
              they answer directly or activate the redirector? See you after the break!'
        - id: '146'
          type: speech
          duration_sec: 6
          text:
            ru: 'А на перемене попробуйте: задайте кому-нибудь вопрос и посмотрите
              — ответят прямо или включат поворотник? Увидимся после перерыва!

              '
            uk: До побачення, розвідники! Практикуйтесь разпізнавання поворотників!
            en: Goodbye, detectives! Practice recognizing redirectors!
