lesson:
  id: lesson_4B
  day: 4
  slot: B
  title:
    ru: Три способа убедить
    uk: Три способи переконати
    en: Three Ways to Convince
  scenes:
    - scene_id: sc1
      title:
        ru: Открытие
        uk: Відкриття
        en: Discovery
      media_ref: 4B.sc1.opening_persuasion
      status: v3_locked
      steps:
        - id: '1'
          type: speech
          duration_sec: 12
          text:
            ru: 'Представьте: вы хотите убедить маму купить большого паука. Настоящего,
              мохнатого, с восемью лапами. Что вы ей скажете?

              '
            uk: 'Уявіть: ви хочете переконати маму купити великого павука. Справжнього,
              мохнатого, з восьмома лапками. Що ви їй скажете?'
            en: 'Imagine: you want to convince your mom to buy a big spider. A real,
              hairy one with eight legs. What would you tell her?'
        - id: '2'
          type: pause
          duration_sec: 5
          text:
            ru: 'Подумайте — какие слова вы бы выбрали?

              '
            uk: Подумайте — які слова ви б обрали?
            en: Think—what words would you choose?
        - id: '3'
          type: speech
          duration_sec: 12
          text:
            ru: 'Один может сказать: «Мама, я буду за ним ухаживать, честное слово!»
              Другой: «Мама, мне так одиноко без питомца!» Третий: «Мама, исследования
              показывают, что дети с пауком-птицеедом смелее!»

              '
            uk: 'Один может сказать: «Мама, я буду за ним ухаживать, честное слово!»
              Другой: «Мама, мне так одиноко без питомца!» Третий: «Мама, исследования
              показывают, что дети с пауком-птицеедом смелее!»'
            en: 'One may say: “Mom, I will take care of him, honestly!” Another: “Mom,
              I’m so lonely without a pet!” Third: “Mom, research shows that children
              with tarantula spiders are braver!”'
        - id: '4'
          type: speech
          duration_sec: 8
          text:
            ru: 'Три разных способа! Один давит на обещание, другой — на жалость,
              третий — на науку. И сегодня мы узнаем, как они называются.

              '
            uk: Три разных способа! Один давит на обещание, другой — на жалость, третий
              — на науку. И сегодня мы узнаем, как они называются.
            en: Three different ways! One puts pressure on the promise, the other
              on pity, the third on science. And today we will find out what they
              are called.
        - id: '5'
          type: speech
          duration_sec: 12
          text:
            ru: 'Ещё пример. Реклама: «Этот йогурт самый вкусный! Его ест известный
              спортсмен! И в нём много витаминов!»

              '
            uk: 'Ещё пример. Реклама: «Этот йогурт самый вкусный! Его ест известный
              спортсмен! И в нём много витаминов!»'
            en: 'Another example. Advertisement: “This yogurt is the most delicious!
              A famous athlete eats it! And it contains a lot of vitamins!”'
        - id: '6'
          type: speech
          duration_sec: 10
          text:
            ru: 'Тут тоже три приёма. «Самый вкусный» — бьёт по чувствам. «Известный
              спортсмен» — мы ему доверяем. «Много витаминов» — это факт. Три способа
              в одной рекламе!

              '
            uk: Тут тоже три приёма. «Самый вкусный» — бьёт по чувствам. «Известный
              спортсмен» — мы ему доверяем. «Много витаминов» — это факт. Три способа
              в одной рекламе!
            en: There are also three techniques here. “The most delicious” - hits
              the senses. “Famous athlete” - we trust him. “Lots of vitamins” is a
              fact. Three ways in one advertisement!
        - id: '7'
          type: speech
          duration_sec: 10
          text:
            ru: 'А вот антипример. «Купи эту игрушку! Все дети мечтают! Ты будешь
              самым счастливым!» Чувствуете? Тут только эмоции. Ни одного факта. Ни
              одного эксперта. Только «хочу-хочу-хочу».

              '
            uk: А вот антипример. «Купи эту игрушку! Все дети мечтают! Ты будешь самым
              счастливым!» Чувствуете? Тут только эмоции. Ни одного факта. Ни одного
              эксперта. Только «хочу-хочу-хочу».
            en: Here's an anti-example. “Buy this toy! All children dream! You will
              be the happiest!” Do you feel it? There are only emotions here. Not
              a single fact. Not a single expert. Just “I want, I want, I want.”
        - id: '8'
          type: speech
          duration_sec: 8
          text:
            ru: 'Когда вас убеждают только через «хочу» — это сигнал: что-то тут нечисто.
              Разведчик это замечает.

              '
            uk: 'Когда вас убеждают только через «хочу» — это сигнал: что-то тут нечисто.
              Разведчик это замечает.'
            en: 'When you are convinced only through “I want”, this is a signal: something
              is unclean here. The scout notices this.'
        - id: '9'
          type: speech
          duration_sec: 10
          text:
            ru: 'А бывает наоборот. «Этот телефон весит 185 граммов, экран 6.1 дюймов,
              батарея 4000 миллиампер-часов.» Сплошные факты! Но… скучно. Не цепляет.
              Хочется зевнуть.

              '
            uk: А бывает наоборот. «Этот телефон весит 185 граммов, экран 6.1 дюймов,
              батарея 4000 миллиампер-часов.» Сплошные факты! Но… скучно. Не цепляет.
              Хочется зевнуть.
            en: But it happens the other way around. “This phone weighs 185 grams,
              has a 6.1-inch screen, and has a 4000 milliamp-hour battery.” Solid
              facts! But... it's boring. Doesn't catch on. I want to yawn.
        - id: '10'
          type: speech
          duration_sec: 8
          text:
            ru: 'Получается, одних фактов тоже мало. Нужно что-то ещё — чтобы человек
              не просто понял, а ЗАХОТЕЛ.

              '
            uk: Получается, одних фактов тоже мало. Нужно что-то ещё — чтобы человек
              не просто понял, а ЗАХОТЕЛ.
            en: It turns out that facts alone are not enough. Something else is needed
              - so that a person not only understands, but WANTS it.
        - id: '11'
          type: speech
          duration_sec: 10
          text:
            ru: 'И третий случай. Друг говорит: «Поверь мне, эта игра крутая!» Вы
              верите — потому что это друг. Но если незнакомец на улице скажет то
              же самое? Уже не так убедительно.

              '
            uk: 'И третий случай. Друг говорит: «Поверь мне, эта игра крутая!» Вы
              верите — потому что это друг. Но если незнакомец на улице скажет то
              же самое? Уже не так убедительно.'
            en: 'And the third case. A friend says: “Trust me, this game is cool!”
              You believe because it is a friend. But what if a stranger on the street
              says the same thing? Not so convincing anymore.'
        - id: '12'
          type: speech
          duration_sec: 8
          text:
            ru: 'Значит, важно КТО говорит, а не только ЧТО. Доверие к человеку —
              тоже способ убеждения.

              '
            uk: Значит, важно КТО говорит, а не только ЧТО. Доверие к человеку — тоже
              способ убеждения.
            en: This means that it is important WHO says, and not just WHAT. Trust
              in a person is also a way of persuasion.
        - id: '13'
          type: speech
          duration_sec: 10
          text:
            ru: Три способа. Три инструмента убеждения. А теперь послушайте интересную
              историю о том, как трое детей убеждали учителя — каждый по-своему!
            uk: Три способа. Три инструмента убеждения. А теперь послушайте интересную
              историю о том, как трое детей убеждали учителя — каждый по-своему!
            en: Three ways. Three tools of persuasion. Now listen to an interesting
              story about how three children convinced the teacher - each in their
              own way!
        - id: '14'
          type: speech
          duration_sec: 6
          text:
            ru: Смотрите внимательно — замечайте, КАК каждый герой пытается убедить.
            uk: Смотрите внимательно — замечайте, КАК каждый герой пытается убедить.
            en: Look carefully - notice HOW each character is trying to convince.
    - scene_id: sc2
      title:
        ru: ИСТОРИЯ — КТО ПОЕДЕТ НА ЭКСКУРСИЮ?
        uk: ИСТОРИЯ — КТО ПОЕДЕТ НА ЭКСКУРСИЮ?
        en: HISTORY - WHO WILL GO ON THE EXCURSION?
      media_ref: 4B.sc2.story_persuasion
      status: v3_locked
      steps:
        - id: '15'
          type: speech
          duration_sec: 14
          text:
            ru: 'Учительница объявила: на экскурсию поедут только трое — те, кто лучше
              всех объяснит, почему именно их нужно взять. Первой вышла Маша: «Вы
              же меня знаете! Я всегда выполняю обещания, на меня можно положиться!»'
            uk: 'Учительница объявила: на экскурсию поедут только трое — те, кто лучше
              всех объяснит, почему именно их нужно взять. Первой вышла Маша: «Вы
              же меня знаете! Я всегда выполняю обещания, на меня можно положиться!»'
            en: 'The teacher announced that only three people would go on the excursion
              - those who could best explain why they should be taken. Masha came
              out first: “You know me! I always keep my promises, you can rely on
              me!”'
        - id: '16'
          type: speech
          duration_sec: 14
          text:
            ru: 'Вторым выскочил Дмитрик: «Мне ТАК хочется! Если я не поеду, я буду
              грустить целую неделю! Пожалуйста!» Глаза у него стали огромные и печальные,
              как у котёнка под дождём.'
            uk: 'Вторым выскочил Дмитрик: «Мне ТАК хочется! Если я не поеду, я буду
              грустить целую неделю! Пожалуйста!» Глаза у него стали огромные и печальные,
              как у котёнка под дождём.'
            en: 'Dmitrik was the second to jump out: “I want it SO bad!” If I don''t
              go, I''ll be sad for a whole week! Please!" His eyes became huge and
              sad, like a kitten’s in the rain.'
        - id: '17'
          type: speech
          duration_sec: 14
          text:
            ru: 'Последней вышла Оленка. Она развернула листок: «У меня лучшие оценки
              за четверть. Вот список нужных вещей. А вот маршрут — я уже всё посчитала.»
              Учительница удивлённо подняла брови.'
            uk: 'Последней вышла Оленка. Она развернула листок: «У меня лучшие оценки
              за четверть. Вот список нужных вещей. А вот маршрут — я уже всё посчитала.»
              Учительница удивлённо подняла брови.'
            en: 'Olenka was the last to leave. She unfolded the piece of paper: “I
              have the best grades for the quarter. Here is a list of things you need.
              But the route – I’ve already calculated everything.” The teacher raised
              her eyebrows in surprise.'
        - id: '18'
          type: vote
          duration_sec: 10
          text:
            ru: 'Кто из троих привёл конкретные факты?

              '
            uk: Кто из троих привёл конкретные факты?
            en: Which of the three provided specific facts?
          options:
            - id: opt_1
              text:
                ru: Маша
                uk: Маша
                en: Masha
            - id: opt_2
              text:
                ru: Дмитрик
                uk: Дмитрик
                en: Dmitry
            - id: opt_3
              text:
                ru: Оленка
                uk: Оленка
                en: Olenka
          correct: opt_3
        - id: '19'
          type: speech
          duration_sec: 8
          text:
            ru: 'Оленка! Оценки, список, маршрут — всё можно проверить. А Маша и Дмитрик
              убеждали по-другому. Как именно?

              '
            uk: Оленка! Оценки, список, маршрут — всё можно проверить. А Маша и Дмитрик
              убеждали по-другому. Как именно?
            en: Olenka! Ratings, list, route - everything can be checked. But Masha
              and Dmitrik convinced differently. How exactly?
        - id: '20'
          type: speech
          duration_sec: 10
          text:
            ru: 'Маша убеждала через ДОВЕРИЕ к себе. «Я надёжная, на меня можно положиться.»
              Она не приводила факты и не давила на жалость — она говорила: поверьте
              МНЕ.

              '
            uk: 'Маша убеждала через ДОВЕРИЕ к себе. «Я надёжная, на меня можно положиться.»
              Она не приводила факты и не давила на жалость — она говорила: поверьте
              МНЕ.'
            en: 'Masha convinced through TRUST in herself. “I am reliable, you can
              rely on me.” She did not cite facts and did not press for pity - she
              said: believe ME.'
        - id: '21'
          type: speech
          duration_sec: 8
          text:
            ru: 'Это как когда мама говорит: «Я знаю, что лучше.» Мы верим — потому
              что это мама. Она заслужила наше доверие.

              '
            uk: 'Это как когда мама говорит: «Я знаю, что лучше.» Мы верим — потому
              что это мама. Она заслужила наше доверие.'
            en: 'It''s like when mom says, "I know what''s best." We believe - because
              this is mom. She has earned our trust.'
        - id: '22'
          type: speech
          duration_sec: 10
          text:
            ru: 'Дмитрик убеждал через ЧУВСТВА. «Мне так хочется! Я буду грустить!»
              Он не показал ни одного факта — зато задел за живое. Нам его жалко.

              '
            uk: Дмитрик убеждал через ЧУВСТВА. «Мне так хочется! Я буду грустить!»
              Он не показал ни одного факта — зато задел за живое. Нам его жалко.
            en: Dmitry convinced through FEELINGS. “I want it so bad! I will be sad!
              He didn’t show a single fact, but he touched a nerve. We feel sorry
              for him.
        - id: '23'
          type: speech
          duration_sec: 8
          text:
            ru: 'Реклама так делает постоянно. Грустный котёнок в приюте — и вы уже
              тянетесь за кошельком. Не факты убедили, а чувства.

              '
            uk: Реклама так делает постоянно. Грустный котёнок в приюте — и вы уже
              тянетесь за кошельком. Не факты убедили, а чувства.
            en: Advertising does this all the time. A sad kitten in a shelter - and
              you are already reaching for your wallet. It was not the facts that
              convinced me, but the feelings.
        - id: '24'
          type: speech
          duration_sec: 10
          text:
            ru: 'Оленка убеждала через ДОКАЗАТЕЛЬСТВА. «Лучшие оценки, список вещей,
              маршрут.» Она пришла подготовленная. Факты на столе.

              '
            uk: Оленка убеждала через ДОКАЗАТЕЛЬСТВА. «Лучшие оценки, список вещей,
              маршрут.» Она пришла подготовленная. Факты на столе.
            en: Olenka convinced through EVIDENCE. “Best grades, packing list, route.”
              She came prepared. The facts are on the table.
        - id: '25'
          type: speech
          duration_sec: 8
          text:
            ru: 'Это как учёный на конференции: «Вот данные, вот эксперимент, вот
              результат.» Не «поверьте мне» — а «проверьте сами».

              '
            uk: 'Это как учёный на конференции: «Вот данные, вот эксперимент, вот
              результат.» Не «поверьте мне» — а «проверьте сами».'
            en: 'It’s like a scientist at a conference: “Here is the data, here is
              the experiment, here is the result.” Not “trust me” - but “check it
              yourself.”'
        - id: '26'
          type: vote
          duration_sec: 10
          text:
            ru: 'Маша: «Вы же знаете, я всегда всё делаю вовремя!»

              '
            uk: 'Маша: «Вы же знаете, я всегда всё делаю вовремя!»'
            en: 'Masha: “You know, I always do everything on time!”'
          options:
            - id: opt_1
              text:
                ru: Доверие (Этос)
                uk: Доверие (Этос)
                en: Trust (Ethos)
            - id: opt_2
              text:
                ru: Чувства (Пафос)
                uk: Чувства (Пафос)
                en: Feelings (Paphos)
            - id: opt_3
              text:
                ru: Доказательства (Логос)
                uk: Доказательства (Логос)
                en: Evidence (Logos)
          correct: opt_1
        - id: '27'
          type: speech
          duration_sec: 6
          text:
            ru: 'Доверие! Маша ссылается на свою репутацию. «Поверьте мне — я такая.»

              '
            uk: Доверие! Маша ссылается на свою репутацию. «Поверьте мне — я такая.»
            en: Trust! Masha refers to her reputation. “Trust me—that’s who I am.”
        - id: '28'
          type: vote
          duration_sec: 10
          text:
            ru: 'Дмитрик: «Если я не поеду, я буду плакать всю неделю!»

              '
            uk: 'Дмитрик: «Если я не поеду, я буду плакать всю неделю!»'
            en: 'Dmitry: “If I don’t go, I’ll cry all week!”'
          options:
            - id: opt_1
              text:
                ru: Доверие (Этос)
                uk: Доверие (Этос)
                en: Trust (Ethos)
            - id: opt_2
              text:
                ru: Чувства (Пафос)
                uk: Чувства (Пафос)
                en: Feelings (Paphos)
            - id: opt_3
              text:
                ru: Доказательства (Логос)
                uk: Доказательства (Логос)
                en: Evidence (Logos)
          correct: opt_2
        - id: '29'
          type: speech
          duration_sec: 6
          text:
            ru: 'Чувства! Дмитрик бьёт по жалости. Никаких фактов — только «мне будет
              грустно».

              '
            uk: Чувства! Дмитрик бьёт по жалости. Никаких фактов — только «мне будет
              грустно».
            en: Feelings! Dmitry strikes for pity. No facts - just “I’ll be sad.”
        - id: '30'
          type: vote
          duration_sec: 10
          text:
            ru: 'Оленка: «Я посчитала — билеты стоят 200 гривен, а в бюджете класса
              есть 500.»

              '
            uk: 'Оленка: «Я посчитала — билеты стоят 200 гривен, а в бюджете класса
              есть 500.»'
            en: 'Olenka: “I did the math—tickets cost 200 hryvnia, but the class budget
              includes 500.”'
          options:
            - id: opt_1
              text:
                ru: Доверие (Этос)
                uk: Доверие (Этос)
                en: Trust (Ethos)
            - id: opt_2
              text:
                ru: Чувства (Пафос)
                uk: Чувства (Пафос)
                en: Feelings (Paphos)
            - id: opt_3
              text:
                ru: Доказательства (Логос)
                uk: Доказательства (Логос)
                en: Evidence (Logos)
          correct: opt_3
        - id: '31'
          type: speech
          duration_sec: 6
          text:
            ru: 'Доказательства! Цифры, расчёт, факт. Оленка — чистый разведчик.

              '
            uk: Доказательства! Цифры, расчёт, факт. Оленка — чистый разведчик.
            en: Proof! Numbers, calculation, fact. Olenka is a pure intelligence officer.
        - id: '32'
          type: speech
          duration_sec: 8
          text:
            ru: 'Три способа — три инструмента убеждения. Давайте разберём каждый
              подробнее!

              '
            uk: Три способа — три инструмента убеждения. Давайте разберём каждый подробнее!
            en: Three ways - three tools of persuasion. Let's look at each in more
              detail!
    - scene_id: sc3
      title:
        ru: Три способа убеждения — теория
        uk: Три способа убеждения — теория
        en: Three Ways of Persuasion - Theory
      media_ref: 4B.sc3.three_methods_theory
      status: v3_locked
      steps:
        - id: '33'
          type: speech
          duration_sec: 10
          text:
            ru: 'Итак, три способа убеждения. Запоминаем! Кстати, ещё древние греки
              их придумали и дали им красивые имена. Первый — ДОВЕРИЕ (Этос). Когда
              мы верим ЧЕЛОВЕКУ, а не словам.

              '
            uk: Итак, три способа убеждения. Запоминаем! Кстати, ещё древние греки
              их придумали и дали им красивые имена. Первый — ДОВЕРИЕ (Этос). Когда
              мы верим ЧЕЛОВЕКУ, а не словам.
