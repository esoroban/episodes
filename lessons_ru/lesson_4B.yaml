              Спрашивайте «а почему?»

              '
            uk: 'И помните правило разведчика: когда вас убеждают ТОЛЬКО через одну
              ножку — задумайтесь. Только чувства без фактов? Подозрительно. Только
              факты без экспертов? Проверяйте. Только «поверь мне» без доказательств?
              Спрашивайте «а почему?»'
            en: 'And remember the intelligence officer’s rule: when you are being
              convinced through ONLY one leg, think about it. Just feelings without
              facts? Suspicious. Just facts without experts? Check. Just “trust me”
              without proof? Ask “why?”'
        - id: '202'
