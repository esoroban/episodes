              '
            uk: Вот и подходит к концу наш четвёртый день. Два урока — и вы стали
              совсем другими. Давайте вспомним, что мы сегодня прошли, потому что
              это был очень важный день.
            en: Our fourth day is coming to an end. Two lessons and you become completely
              different. Let's remember what we went through today, because it was
              a very important day.
        - id: '196'
          type: speech
          duration_sec: 12
          text:
            ru: 'На первом уроке мы узнали про четвёртый инструмент разведчика — ГЛАЗ.
              Язык тела, жесты, мимика, голос и интонация. Вы научились видеть то,
              что человек НЕ говорит словами. Скрещённые руки, бегающий взгляд, дрожащий
              голос — всё это подсказки.

              '
            uk: На первом уроке мы узнали про четвёртый инструмент разведчика — ГЛАЗ.
              Язык тела, жесты, мимика, голос и интонация. Вы научились видеть то,
              что человек НЕ говорит словами. Скрещённые руки, бегающий взгляд, дрожащий
              голос — всё это подсказки.
            en: In the first lesson, we learned about the fourth reconnaissance tool
              - the EYE. Body language, gestures, facial expressions, voice and intonation.
              You have learned to see what a person does NOT say in words. Crossed
              arms, a shifting gaze, a trembling voice - these are all clues.
        - id: '197'
          type: speech
          duration_sec: 12
          text:
            ru: 'А на втором уроке мы разобрали, КАК люди убеждают. Три способа: доверие,
              чувства и доказательства. Как три ножки табуретки — если одной не хватает,
              что-то не так.

              '
            uk: 'А на втором уроке мы разобрали, КАК люди убеждают. Три способа: доверие,
              чувства и доказательства. Как три ножки табуретки — если одной не хватает,
              что-то не так.'
            en: 'And in the second lesson we looked at HOW people convince. Three
              ways: trust, feelings and evidence. Like three legs of a stool - if
              one is missing, something is wrong.'
        - id: '198'
          type: speech
          duration_sec: 12
          text:
            ru: 'Зачем это вместе? Потому что в жизни всё работает одновременно! Когда
              вас убеждают — вы слышите СЛОВА (три способа) и видите ТЕЛО (четвёртый
              инструмент). Человек говорит «поверь мне» — а сам отводит глаза? Разведчик
              заметит!

              '
            uk: Зачем это вместе? Потому что в жизни всё работает одновременно! Когда
              вас убеждают — вы слышите СЛОВА (три способа) и видите ТЕЛО (четвёртый
              инструмент). Человек говорит «поверь мне» — а сам отводит глаза? Разведчик
              заметит!
            en: Why is this together? Because in life everything works at the same
              time! When you are convinced, you hear the WORDS (three ways) and see
              the BODY (the fourth tool). A person says “trust me” - but he averts
              his eyes? The scout will notice!
        - id: '199'
          type: speech
          duration_sec: 12
          text:
            ru: 'Продавец говорит «последний шанс, торопись!» — только чувства, ни
              одного факта. И при этом нервно потирает руки. Два сигнала сразу: табуретка
              кривая И тело выдаёт неуверенность. Двойная подсказка для разведчика.

              '
            uk: 'Продавец говорит «последний шанс, торопись!» — только чувства, ни
              одного факта. И при этом нервно потирает руки. Два сигнала сразу: табуретка
              кривая И тело выдаёт неуверенность. Двойная подсказка для разведчика.'
            en: 'The seller says “last chance, hurry up!” - only feelings, not a single
              fact. And at the same time he rubs his hands nervously. Two signals
              at once: the stool is crooked and the body betrays uncertainty. Double
              tip for the scout.'
        - id: '200'
          type: speech
          duration_sec: 10
          text:
            ru: 'А теперь самое главное. Вы научились не только ЗАМЕЧАТЬ чужие приёмы
              — но и СТРОИТЬ свои. Хотите убедить маму, друга, учителя? Готовьте три
              ножки. Доверие (Этос) — почему вам можно верить. Доказательства (Логос)
              — конкретные факты. Чувства (Пафос) — почему это важно и здорово.

              '
            uk: А теперь самое главное. Вы научились не только ЗАМЕЧАТЬ чужие приёмы
              — но и СТРОИТЬ свои. Хотите убедить маму, друга, учителя? Готовьте три
              ножки. Доверие (Этос) — почему вам можно верить. Доказательства (Логос)
              — конкретные факты. Чувства (Пафос) — почему это важно и здорово.
            en: And now the most important thing. You have learned not only to NOTICE
              other people’s techniques, but also to BUILD your own. Do you want to
              convince your mother, friend, teacher? Prepare three legs. Trust (Ethos)
              - why you can be trusted. Evidence (Logos) - specific facts. Feelings
              (Paphos) - why it is important and healthy.
        - id: '201'
          type: speech
          duration_sec: 10
          text:
            ru: 'И помните правило разведчика: когда вас убеждают ТОЛЬКО через одну
