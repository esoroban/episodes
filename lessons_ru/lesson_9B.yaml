          '
        uk: 'Мій варіант: хіміку-лаборанту, який перевірив склад води. Або санітарно-епідеміологічній службі. Або гідрологу,
          який аналізує водні джерела. Не випадковій людині в інтернеті.'
        en: 'My answer: a lab chemist who analyzed the water composition. Or the sanitation and epidemiological service. Or
          a hydrologist who analyzes water sources. Not a random person online.'
