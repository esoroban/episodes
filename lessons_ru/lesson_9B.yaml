      uk: Кому б ви повірили?
      en: Who would you trust?
    media_ref: 9B.sc6.who_would_you_trust
    status: v3_locked
    steps:
    - id: '79'
      type: speech
      duration_sec: 16
      text:
        ru: 'А теперь — задание наоборот! Я даю утверждение. Ваша задача — придумать, КОМУ бы вы поверили, если бы услышали
