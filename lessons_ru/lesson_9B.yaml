lesson:
  id: lesson_9B
  day: 9
  slot: B
  title:
    ru: Если эксперт сказал
    uk: Якщо експерт сказав
    en: If an Expert Said
  scenes:
  - scene_id: sc1
    title:
      ru: Открытие — кому мы верим и почему
      uk: Відкриття — кому ми віримо й чому
      en: Discovery - Who We Trust and Why
    media_ref: 9B.sc1.opening_authority
    status: v3_locked
    steps:
    - id: '1'
      type: speech
      duration_sec: 16
      text:
        ru: 'Новая тема! Представьте: вы в магазине, выбираете велосипед. Продавец говорит: «Этот велосипед рекомендует знаменитый
          футболист Роналду!» Ого! Роналду! Берём! Но подождите… Роналду — он что, велосипедный инженер? Или он просто знаменитый?

          '
        uk: 'Нова тема! Уявіть: ви в магазині, вибираєте велосипед. Продавець говорить: «Цей велосипед рекомендує знаменитий
          футболіст Роналду!» Ого! Роналду! Беремо! Але зачекайте… Роналду — він що, велосипедний інженер? Або він просто
          знаменитий?'
        en: 'New topic! Imagine: you''re in a shop choosing a bike. The salesperson says, "This bike is recommended by famous
          footballer Ronaldo!" Wow! Ronaldo! Let''s buy it! But wait... Is Ronaldo a bicycle engineer? Or is he just famous?'
    - id: '2'
      type: speech
      duration_sec: 14
      text:
        ru: 'Второй пример. Реклама крема: «Рекомендовано врачом!» Звучит солидно. Но каким врачом? Дерматологом, который
          разбирается в коже? Или хирургом, который в жизни не открывал баночку с кремом?

          '
        uk: 'Другий приклад. Реклама крему: «Рекомендовано лікарем!» Звучить солідно. Але яким лікарем? Дерматологом, який
          розуміється на шкірі? Або хірургом, який у житті не відкривав баночку крему?'
        en: 'Second example. Cream advertisement: "Recommended by a doctor!" Sounds solid. But which doctor? A dermatologist
          who knows about skin? Or a surgeon who''s never opened a jar of cream in his life?'
    - id: '3'
      type: speech
      duration_sec: 16
      text:
        ru: 'Третий. Известный певец в интервью говорит: «Я каждое утро пью особый сок — и поэтому никогда не болею!» Миллион
          фанатов побежали покупать этот сок. Но певец разбирается в здоровье? Он изучал витамины? Или он просто красиво поёт?

          '
        uk: 'Третій. Відомий співак в інтерв''ю говорить: «Я кожного ранку п''ю особливий сік — і тому ніколи не хворію!»
          Мільйон фанатів побігли купувати цей сік. Але співак розуміється на здоров''ї? Він вивчав вітаміни? Або він просто
          красиво співає?'
        en: 'Third. A famous singer in an interview says: "I drink a special juice every morning - and that''s why I never
          get sick!" A million fans rushed to buy this juice. But does the singer understand health? Did he study vitamins?
          Or does he just sing beautifully?'
    - id: '4'
      type: speech
      duration_sec: 16
      text:
        ru: 'Четвёртый. Популярный блогер с десятью миллионами подписчиков выкладывает видео: «Эта диета изменит вашу жизнь!
          Я похудел за неделю!» Десять миллионов — это много. Но подписчики — это не диплом диетолога. Популярность и знания
          — разные вещи.

          '
        uk: 'Четвертий. Популярний блогер з десятьма мільйонами підписників викладає відео: «Ця дієта змінить ваше життя!
          Я схуднув за тиждень!» Десять мільйонів — це багато. Але підписники — це не диплом дієтолога. Популярність і знання
          — різні речі.'
        en: 'Fourth. A popular blogger with ten million followers posts a video: "This diet will change your life! I lost
          weight in a week!" Ten million is a lot. But followers aren''t a diploma in nutrition. Popularity and knowledge
          are different things.'
    - id: '5'
      type: speech
      duration_sec: 14
      text:
        ru: 'И пятый — самый хитрый. Бабушка говорит: «В моё время все так делали — и ничего, выросли здоровыми!» Бабушку
          мы любим. Но «в моё время» — это не научное доказательство. Мир изменился. Медицина узнала много нового.

          '
        uk: 'І п''ятий — найхитріший. Бабуся говорить: «На мій час все так робили — і нічого, виросли здоровими!» Бабусю ми
          любимо. Але «на мій час» — це не науковий доказ. Світ змінився. Медицина дізналася багато нового.'
        en: 'And the fifth - the trickiest. Grandma says: "In my day everyone did it this way - and we grew up healthy!" We
          love grandma. But "in my day" is not scientific proof. The world has changed. Medicine has learned many new things.'
    - id: '6'
      type: vote
      duration_sec: 12
      text:
        ru: 'Что объединяет все пять примеров?

          '
        uk: Що об'єднує всі п'ять прикладів?
        en: What do all five examples have in common?
      options:
      - id: opt_1
        text:
          ru: Все врут
          uk: Усі брешуть
          en: They all lie
      - id: opt_2
        text:
          ru: Все ссылаются на кого-то известного или уважаемого
          uk: Усі посилаються на когось знаменитого або поважаного
          en: They all rely on someone famous or respected
      - id: opt_3
        text:
          ru: Все продают товар
          uk: Усі продають товар
          en: They all sell a product
      correct: opt_2
    - id: '7'
      type: speech
      duration_sec: 14
      text:
        ru: 'Именно! Во всех случаях нас убеждают не фактами, а тем, КТО это сказал. Футболист, врач, певец, блогер, бабушка
          — нам подставляют авторитет вместо доказательства. Сегодня разберёмся, когда это работает, а когда — ловушка!

          '
        uk: Саме так! У всіх випадках нас переконують не фактами, а тим, ХТО це сказав. Футболіст, лікар, співак, блогер,
          бабуся — нам підставляють авторитет замість доказу. Сьогодні розберемося, коли це працює, а коли — це пастка!
        en: Exactly! In all cases, they convince us not with facts, but with WHO said it. A footballer, a doctor, a singer,
          a blogger, grandma - they're using authority instead of evidence. Today we'll figure out when this works and when
          it's a trap!
  - scene_id: sc2
    title:
      ru: История — совет от звезды
      uk: Історія — порада від зірки
      en: Story - A Star's Advice
    media_ref: 9B.sc2.story_max_star
    status: v3_locked
    steps:
    - id: '8'
      type: speech
      duration_sec: 16
      text:
        ru: 'А теперь — история! Дмитрик прибегает в школу утром. Глаза горят. Рюкзак набит чем-то тяжёлым. Волосы торчат
          — видно, что даже расчёсываться некогда было. Важное дело!

          '
        uk: А тепер — історія! Дмитрик прибігає в школу вранці. Очі горять. Рюкзак забитий чимось важким. Волосся торчить
          — видно, що навіть розчісуватися не було часу. Важна справа!
        en: And now - a story! Dmytryk runs into school in the morning. Eyes shining. Backpack stuffed with something heavy.
          Hair sticking up - you can see he didn't even have time to comb it. Important business!
    - id: '9'
      type: speech
      duration_sec: 16
      text:
        ru: 'Он ставит на парту шесть бутылок сока «ЗвёздоСила». На каждой — лицо певца Макса Звёздного. Белозубая улыбка,
          бицепс, надпись: «Я пью каждое утро — и вам советую!»

          '
        uk: 'Він ставить на парту шість пляшок соку «ЗоркаСила». На кожній — обличчя співака Макса Зоркіного. Білозуба посмішка,
          біцепс, напис: «Я п''ю кожного ранку — і вам рекомендую!»'
        en: 'He puts six bottles of "StarPower" juice on his desk. On each one - the face of singer Max Starry. Bright smile,
          bicep, caption: "I drink this every morning - and I recommend it to you!"'
    - id: '10'
      type: speech
      duration_sec: 16
      text:
        ru: '«Ребята!» — говорит Дмитрик торжественно. «Макс Звёздный пьёт этот сок! МАКС ЗВЁЗДНЫЙ! У него сто миллионов подписчиков!
          Он никогда не болеет! Я теперь тоже буду пить — и стану таким же крутым!»

          '
        uk: «Ребята!» — говорить Дмитрик урочисто. «Макс Зоркіний п'є цей сік! МАКС ЗОРКІНИЙ! У нього сто мільйонів підписників!
          Він ніколи не хворіє! Я тепер теж буду пити — і стану таким же крутим!»
        en: '"Guys!" says Dmytryk solemnly. "Max Starry drinks this juice! MAX STARRY! He has a hundred million followers!
          He never gets sick! I''ll drink it now too - and become just as cool!"'
    - id: '11'
      type: speech
      duration_sec: 14
      text:
        ru: 'Сашко берёт бутылку, крутит, читает состав. Вода, сахар, краситель, ароматизатор «идентичный натуральному». «Дмитрик,
          — говорит Сашко, — тут написано "идентичный натуральному". Это значит — НЕ натуральный. Но похож.»

          '
        uk: Сашко бере пляшку, крутить, читає склад. Вода, цукор, барвник, ароматизатор «ідентичний натуральному». «Дмитрик,
          — говорить Сашко, — тут написано 'ідентичний натуральному'. Це означає — НЕ натуральний. Але схожий.»
        en: Sashko grabs a bottle, turns it around, reads the ingredients. Water, sugar, coloring, "natural identical" flavoring.
          "Dmytryk," says Sashko, "it says 'natural identical' here. That means - NOT natural. But similar."
    - id: '12'
      type: speech
      duration_sec: 14
      text:
        ru: '«Не важно!» — машет рукой Дмитрик. «Макс Звёздный не стал бы рекомендовать плохой сок! Он же ЗВЕЗДА!» Сашко чешет
          затылок: «А Макс Звёздный — он врач? Диетолог? Биолог? Химик?»

          '
        uk: '«Не важливо!» — махає рукою Дмитрик. «Макс Зоркіний не став би рекомендувати поганий сік! Він же ЗІРКА!» Сашко
          чеса потилицю: «А Макс Зоркіний — він лікар? Дієтолог? Біолог? Хімік?»'
        en: '"It doesn''t matter!" waves Dmytryk. "Max Starry wouldn''t recommend bad juice! He''s a STAR!" Sashko scratches
          the back of his head: "But is Max Starry a doctor? A nutritionist? A biologist? A chemist?"'
    - id: '13'
      type: speech
      duration_sec: 14
      text:
        ru: 'Дмитрик задумывается. «Нет… Он певец. Но он знаменитый!» Оленка поднимает руку: «Мой кот тоже знаменитый — у
          него тысяча лайков в интернете. Но я не спрашиваю у кота, какие витамины пить.»

          '
        uk: 'Дмитрик задумується. «Ні… Він співак. Але він знаменитий!» Олена піднімає руку: «Мій кіт теж знаменитий — у нього
          тисяча лайків в інтернеті. Але я не питаю в кота, які вітаміни пити.»'
        en: 'Dmytryk pauses. "No... He''s a singer. But he''s famous!" Olena raises her hand: "My cat is famous too - has
          a thousand likes online. But I don''t ask my cat which vitamins to take."'
    - id: '14'
      type: speech
      duration_sec: 16
      text:
        ru: 'Класс смеётся. Дмитрик краснеет, но не сдаётся: «Ладно, но Макс выглядит здоровым! Значит, сок работает!» Сашко
          кивает: «А мой дедушка выглядит здоровым. Он пьёт компот. Значит, компот — суперсила? Может, бабушкин компот рекламировать?»

          '
        uk: 'Клас сміється. Дмитрик червоніє, але не здається: «Добре, але Макс виглядає здоровим! Значить, сік працює!» Сашко
          киває: «А мій дідусь виглядає здоровим. Він п''є компот. Значить, компот — суперсила? Може, бабусин компот рекламувати?»'
        en: 'The class laughs. Dmytryk blushes but doesn''t give up: "Okay, but Max looks healthy! So the juice works!" Sashko
          nods: "And my grandfather looks healthy. He drinks compote. So compote is super-power? Should we advertise grandma''s
          compote?"'
    - id: '15'
      type: speech
      duration_sec: 16
      text:
        ru: 'Оленка добивает: «Дмитрик, представь — Макс Звёздный скажет: "Я прыгаю с крыши каждое утро и вам советую!" Ты
          тоже прыгнешь? Он же ЗВЕЗДА!» Дмитрик открывает рот, закрывает, снова открывает. «Нет… Это глупо.»

          '
        uk: 'Олена добиває: «Дмитрик, уяви — Макс Зоркіний скаже: ''Я стрибаю з даху кожного ранку — і поточу рекомендую!''»
          Сашко засміявся: «Ти б поверив?» Дмитрик: «Звичайно, ні. Це небезпечно!» Олена: «А чому ж небезпечно, але сік —
          безпечно?»'
        en: 'Olena finishes him off: "Dmytryk, imagine - Max Starry says: ''I jump off a roof every morning - and I recommend
          it to you!'' Sashko laughs: "You would believe that?" Dmytryk: "Of course not. That''s dangerous!" Olena: "So why
          is jumping dangerous but juice is safe?"'
    - id: '16'
      type: speech
      duration_sec: 14
      text:
        ru: '«Вот!» — говорит Оленка. «Знаменитый — не значит разбирается. Макс разбирается в музыке. В нотах, в микрофонах,
          в студии звукозаписи. А в витаминах разбирается врач. В диете — диетолог. Каждый эксперт — в своей области.»

          '
        uk: «Ось це!» — говорить Олена. «Знаменитий — не означає розуміється. Макс розуміється в музиці, ні в здоров'ї. А
          тебе переконали — не доказом, а тим, що він знаменитий. Це називається «ложный авторитет» або просто — пастка!»
        en: '"Exactly!" says Olena. "Famous doesn''t mean expert. Max understands music, not health. And you were convinced
          - not by evidence, but because he''s famous. That''s called ''false authority'' or just - a trap!"'
    - id: '17'
      type: speech
      duration_sec: 12
      text:
        ru: 'Дмитрик смотрит на шесть бутылок. Вздыхает. «Ладно. Но сок-то вкусный?» Сашко пробует. «Вода с сахаром. Как компот,
          только дороже в десять раз. Бабушкин — лучше.»

          '
        uk: 'Дмитрик дивиться на шість пляшок. Зітхає. «Ладно. Але сік-то смачний?» Сашко усміхається: «Так, смачний. Вправо!
          Але смак — це не здоров''я.» Дмитрик киває: «Тепер розумію.»'
        en: 'Dmytryk looks at six bottles. Sighs. "Okay. But the juice is delicious?" Sashko smiles: "Yes, it''s delicious.
          You''re right! But taste is not health." Dmytryk nods: "I get it now."'
    - id: '18'
      type: vote
      duration_sec: 12
      text:
        ru: 'Почему Дмитрик поверил рекламе?

          '
        uk: Чому Дмитрик повірив рекламі?
        en: Why did Dmytryk believe the ad?
      options:
      - id: opt_1
        text:
          ru: Потому что сок вкусный
          uk: Тому що сік смачний
          en: Because the juice tastes good
      - id: opt_2
        text:
          ru: Потому что Макс — знаменитый авторитет
          uk: Тому що Макс — знаменитий авторитет
          en: Because Max is a famous authority
      - id: opt_3
        text:
          ru: Потому что друзья посоветовали
          uk: Тому що друзі посоветували
          en: Because friends recommended it
      correct: opt_2
    - id: '19'
      type: speech
      duration_sec: 12
      text:
        ru: 'Именно — авторитет! Дмитрик не проверил, разбирается ли Макс в здоровье. Увидел знаменитое лицо — и мозг выключился.
          А Сашко и Оленка включили вопрос-проверку: «А он эксперт ИМЕННО в этом?»

          '
        uk: Саме так — авторитет! Дмитрик не перевірив, чи розуміється Макс в здоров'ї. Побачив облич на пляшці — і достатньо.
          Це ловушка знаменитості. Вона робить вас сліпими до реальної компетентності.
        en: Exactly - authority! Dmytryk didn't check if Max actually understands health. Saw the face on the bottle - and
          that was enough. That's the celebrity trap. It makes you blind to real expertise.
  - scene_id: sc3
    title:
      ru: Авторитет и компетентность
      uk: Авторитет і компетентність
      en: Authority and Competence
    media_ref: 9B.sc3.authority_theory
    status: v3_locked
    steps:
    - id: '20'
      type: speech
      duration_sec: 16
      text:
        ru: 'Из истории Дмитрика мы поняли главное: знаменитый — не значит разбирается. Но давайте разберём точнее. Что такое
          «авторитет»? Авторитет — это человек, которому мы доверяем. Это может быть звезда, взрослый, учитель, учёный.

          '
        uk: 'З історії Дмитрика ми зрозуміли головне: знаменитий — не означає розуміється. Але як тоді відрізнити справжнього
          експерта від ложного авторитету? Розберемося!'
        en: 'From Dmytryk''s story we learned the main thing: famous doesn''t mean expert. But how do we tell a real expert
          from false authority? Let''s figure it out!'
    - id: '21'
      type: speech
      duration_sec: 14
      text:
        ru: 'Доверять авторитетам — нормально! Мы не можем знать всё на свете. Болит зуб — идём к стоматологу. Сломался кран
          — зовём сантехника. Мы доверяем тем, кто разбирается. И это правильно!

          '
        uk: Вірити авторитетам — це нормально! Ми не можемо знати всього на світі. Болить зуб — йдемо до стоматолога. Потекла
          труба — звемо сантехніка. Ми спираємося на знання експертів. Це розумно.
        en: Trusting experts is normal! We can't know everything in the world. Tooth ache - we go to the dentist. Pipe leaks
          - we call a plumber. We rely on expert knowledge. That's smart.
    - id: '22'
      type: speech
      duration_sec: 16
      text:
        ru: 'Но вот ключевое слово: КОМПЕТЕНТНОСТЬ. Компетентный — значит, человек реально разбирается именно в этой теме.
          Учился, работает, имеет опыт. Стоматолог компетентен в зубах. Но в ремонте крана — нет. Хотя он умный и уважаемый.

          '
        uk: 'Але ось ключове слово: КОМПЕТЕНТНІСТЬ. Компетентний — означає, що людина справді розуміється в цьому. У неї є
          знання, досвід, диплом, або багато років практики. Не просто «знаменита», а реально «знає».'
        en: 'But here''s the key word: COMPETENCE. Competent means a person really knows about this. They have knowledge,
          experience, a diploma, or many years of practice. Not just "famous," but actually "knows."'
    - id: '23'
      type: speech
      duration_sec: 16
      text:
        ru: 'Когда ссылка на авторитет — это нормально? Два условия. Первое: человек компетентен именно в этой области. Врач
          про лекарства — да. Повар про рецепты — да. Второе: другие специалисты тоже согласны. Не один врач сказал, а многие
          подтвердили.

          '
        uk: 'Коли посилання на авторитет — це нормально? Дві умови. Перше: людина компетентна саме в цій області. Стоматолог
          — для зубів, не для вибору маршруту в космос. Друге: людина говорить про те, що вона дійсно знає, а не гадає на
          основі чуток.'
        en: 'When is citing authority appropriate? Two conditions. First: the person is competent in this specific area. A
          dentist for teeth, not for choosing a space route. Second: the person is talking about what they really know, not
          guessing from rumors.'
    - id: '24'
      type: speech
      duration_sec: 16
      text:
        ru: 'А когда это ловушка? Тоже два признака. Первый: человек говорит НЕ о своей области. Певец про витамины, спортсмен
          про политику, актёр про банковские услуги. Второй: «авторитет» — вообще не эксперт. Блогер, знаменитость, «один
          учёный сказал».

          '
        uk: 'А коли це пастка? Теж два ознаки. Перший: людина говорить НЕ про свою область. Актор про банки, блогер про медицину,
          знаменитість про науку. Другий: ми розраховуємо тільки на те, що вона знаменита, забуваючи запитати — а чи вона
          взагалі розуміється?'
        en: 'And when is it a trap? Also two signs. First: the person talks NOT about their field. An actor about banks, a
          blogger about medicine, a celebrity about science. Second: we rely only on the fact that they''re famous, forgetting
          to ask - but do they actually know anything about this?'
    - id: '25'
      type: speech
      duration_sec: 14
      text:
        ru: 'Учёные называют эту ловушку «ложный авторитет». Ложный — потому что авторитет есть, а компетентности нет. Как
          красивая обёртка на пустой коробке. Снаружи — «вау!» Внутри — ничего.

          '
        uk: Учені називають цю пастку «ложний авторитет». Ложний — тому що авторитет є, але в іншій області. Біцепс футболіста
          не дає йому право говорити про медицину. Мільйон фанатів блогера не перетворює його на доктора.
        en: Scientists call this trap "false authority." False because there is authority, but in another field. A footballer's
          biceps doesn't give him the right to talk about medicine. A blogger's million fans doesn't make them a doctor.
  - scene_id: sc4
    title:
      ru: Практика — эксперт или нет?
      uk: Практика — експерт або ні?
      en: Practice - Expert or Not?
