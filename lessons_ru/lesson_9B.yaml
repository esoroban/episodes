  - scene_id: sc8
    title:
      ru: Зачем нам это в жизни
      uk: Навіщо нам це в житті
      en: Why We Need This in Life
    media_ref: 9B.sc8.closing
    status: v3_locked
    steps:
    - id: '149'
      type: speech
      duration_sec: 16
      text:
        ru: 'Мы сегодня стали детекторами ложных авторитетов. Но зачем это в реальной жизни? Давайте поговорим серьёзно —
          потому что ложные авторитеты не только в учебниках. Они повсюду. И чем старше вы становитесь, тем чаще они встречаются.

          '
        uk: Ми сьогодні стали детекторами ложних авторитетів. Але навіщо це в реальному житті? Де вона нас вловлює?
        en: Today we became false authority detectors. But why do we need this in real life? Where does it trick us?
    - id: '150'
      type: speech
      duration_sec: 16
      text:
        ru: 'Первое — реклама. Каждый день вы видите десятки реклам, где знаменитость что-то рекомендует. Спортсмен — часы.
          Актриса — крем. Рэпер — кроссовки. Им платят деньги за то, чтобы они это сказали. Не за то, что они разбираются.
          За то, что вы их ЗНАЕТЕ.

          '
        uk: Перше — реклама. Кожен день ви бачите десятки реклам, де знаменитість щось рекомендує. Волосся, їжа, машини, ліки.
          Вона просто красива й знаменита. Але чи вона розуміється? Запитайте себе!
        en: First - advertising. Every day you see dozens of ads where celebrities recommend something. Hair, food, cars,
          medicine. They're just beautiful and famous. But do they know about it? Ask yourself!
    - id: '151'
      type: speech
      duration_sec: 16
      text:
        ru: 'Второе — «лидеры мнений» в интернете. Блогер с миллионом подписчиков рассказывает, как питаться, как учиться,
          как жить. Подписчики думают: раз его смотрит миллион людей — значит, он прав. Но миллион подписчиков — это не миллион
          доказательств. Это миллион людей, которым понравилось видео.

          '
        uk: Друге — «лідери думок» в інтернеті. Блогер з мільйоном підписників розповідає про здоров'я, політику, науку. Мільйон
          — це багато. Але підписники — не сертифікат. Цей блогер може просто добре говорити, а не добре знати.
        en: Second - "influencers" on the internet. A blogger with a million followers talks about health, politics, science.
          A million is a lot. But followers aren't a certificate. This blogger might just talk well, not know well.
    - id: '152'
      type: speech
      duration_sec: 16
      text:
        ru: 'Третье — и это самое хитрое. Люди, которые учат зарабатывать деньги. Они продают курсы: «Как стать богатым за
          три месяца!» Выглядят успешно: дорогая одежда, красивая машина, уверенный голос. Но задайте один вопрос…

          '
        uk: 'Третє — й це найхитріше. Люди, які вчать заробляти гроші. Вони продають курси: «Я заробив мільйон! От як я це
          зробив!» А на чому саме ВИ заробили?» — І виявляється, єдиний бізнес цієї людини — продаж курсів. Вона заробляє
          на тому, що вас вчить, як заробляти.'
        en: 'Third - and this is the trickiest. People who teach you to make money. They sell courses: "I made a million!
          Here''s how I did it!" But what exactly did YOU make it on?" - And it turns out the only business this person has
          is selling courses. They make money by teaching you how to make money.'
    - id: '153'
      type: speech
      duration_sec: 16
      text:
        ru: '«А на чём именно ВЫ заработали?» И выясняется: единственный бизнес этого человека — продавать курсы о том, как
          заработать. Он не построил завод. Не создал продукт. Не вырастил компанию. Он зарабатывает на тех, кто мечтает заработать.
          Замкнутый круг!

          '
        uk: '«А на чому саме ВИ заробили?» І виявляється: єдиний бізнес цієї людини — продаж курсів. Вона заробляє на тому,
          що її вчить, як заробляти. Это как если бы тренер по плавании никогда не входил в воду.'
        en: '"What exactly did YOU make it on?" And it turns out: the only business this person has is selling courses. They
          make money teaching you how to make money. It''s like a swimming coach who never entered the water.'
    - id: '154'
      type: speech
      duration_sec: 16
      text:
        ru: 'Это как если бы учитель плавания никогда не заходил в воду. Стоит на берегу в сухом костюме и кричит: «Плывите
          быстрее! Я знаю как!» Откуда знаешь, если сам не плавал? Компетентность — это опыт, а не красивые слова.

          '
        uk: 'Це як якби тренер з плавання ніколи не заходив у воду. Стоїть на березі в сухому костюмі й вчить: «Ось як правильно
          плавати!» Чи повірили б ви такому тренерові?'
        en: 'It''s like a swimming coach who never entered the water. Standing on the shore in a dry suit teaching: "Here''s
          how to swim properly!" Would you trust such a coach?'
    - id: '155'
      type: speech
      duration_sec: 16
      text:
        ru: 'Четвёртое — споры и конфликты. Кто-то говорит: «Мой старший брат так сказал!» или «Моя тётя так считает!» Это
          не аргумент. Это ссылка на авторитет. Старший брат может ошибаться. Тётя может не разбираться. Спрашивайте: «А почему
          он так думает? Какие у него доказательства?»

          '
        uk: 'Четверте — суперечки й конфлікти. Хтось говорить: «Мій старший брат так сказав!» або «Моя тітка так вважає!»
          Це не аргумент. Це посилання на авторитет. Старший брат може помилятися. Тітка може не розуміватися. Запитайте:
          «А чому він так думає? Які в нього докази?»'
        en: 'Fourth - arguments and conflicts. Someone says: "My older brother said so!" or "My aunt thinks so!" That''s not
          an argument. That''s relying on authority. Older brother can be wrong. Aunt might not understand. Ask: "Why does
          he think so? What''s his evidence?"'
    - id: '156'
      type: speech
      duration_sec: 16
      text:
        ru: 'Пятое — здоровье. Это самое важное. Когда кто-то в интернете говорит «не пейте это лекарство» или «эта еда опасна»
          — всегда проверяйте: КТО это говорит? Врач с двадцатилетним стажем? Или блогер, который вчера рассказывал про модные
          кроссовки?

          '
        uk: 'П''яте — здоров''я. Це найважливіше. Коли хтось в інтернеті говорить «не пийте це ліки» або «ця їжа небезпечна»
          — завжди перевіряйте: ХТО це говорить? Лікар з двадцятирічним стажем? Або блогер, який вчора розповідав про модні
          кросівки?'
        en: 'Fifth - health. This is most important. When someone online says "don''t take this medicine" or "this food is
          dangerous" - always check: WHO is saying this? A doctor with twenty years of experience? Or a blogger who was talking
          about trendy sneakers yesterday?'
    - id: '157'
      type: speech
      duration_sec: 14
      text:
        ru: 'Запомните волшебный вопрос на всю жизнь: «Разбирается ли этот человек ИМЕННО в этом?» Если да — слушаем. Если
          нет — ищем того, кто разбирается. Если не знаем — проверяем. Три простых шага. И вас уже невозможно обмануть красивой
          обёрткой.

          '
        uk: 'Запам''ятайте чарівне запитання на все життя: «Розуміється ли ця людина САМЕ в цьому?» Якщо так — слухаємо. Якщо
          ні — шукаємо того, хто розуміється. Якщо не знаємо — перевіряємо. Три простих кроки. І вас вже неможливо обманути
          красивою обгорткою.'
        en: 'Remember the magic question for life: "Does this person actually understand THIS specific thing?" If yes - we
          listen. If no - we find someone who does. If we don''t know - we check. Three simple steps. And now you can''t be
          tricked by a pretty wrapper.'
