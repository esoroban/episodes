              не каждое предупреждение — манипуляция! Некоторые опасности реальны.

              '
            uk: Манипуляция страхом — когда кто-то давит на эмоции, чтобы вы
            en: 'Fear manipulation is when someone puts pressure on your emotions
              so that you obey without thinking. Four masks: health, loneliness, failure,
