    - scene_id: sc6
      title:
        ru: Реальное предупреждение или манипуляция?
        uk: 'Сказали: «Мені подобаються кішки.» Приписали: «Тобі подобаються домашні
          тварини, які мяукають.»'
        en: 'Said: "I like cats." Accused of saying: "You like domestic animals that
          meow."'
      media_ref: 8B.sc6.real_vs_manipulation
      status: v3_locked
      steps:
        - id: '54'
          type: speech
          duration_sec: 16
          text:
            ru: 'Мы узнали четыре маски страха и даже сами побыли манипуляторами.
              Но вот проблема: иногда нас пугают по делу! «Не трогай горячую кастрюлю»
              — это не манипуляция, это мама спасает вам руки. Как отличить?

              '
            uk: Слова передали правильно?
            en: "We learned the four masks of fear and even became manipulators ourselves.
              But here's the problem: sometimes they scare us for a reason! “Don’t
              touch the hot pan” is not manipulation, it’s mom saving your hands.
              How to distinguish?"
        - id: '55'
          type: speech
          duration_sec: 16
          text:
            ru: 'Слово «манипуляция» звучит по-взрослому, но суть простая. Манипуляция
              — это когда кто-то давит на ваши чувства, чтобы вы сделали то, что нужно
              ему, а не вам. Не объясняет, не доказывает — а просто пугает, пока вы
              не сдадитесь.

              '
            uk: Правильно
            en: The word “manipulation” sounds mature, but the essence is simple.
              Manipulation is when someone puts pressure on your feelings so that
              you do what they want and not you. It doesn’t explain, it doesn’t prove,
              it just scares you until you give up.
        - id: '56'
          type: speech
          duration_sec: 14
          text:
            ru: 'А реальное предупреждение — это когда человек заботится о вас и опасность
              правда существует. Разница — в честности. Реальное предупреждение можно
              проверить. Манипуляция — рассыпается от первого вопроса.

              '
            uk: Лякало
            en: But a real warning is when a person cares about you and the danger
              really exists. The difference is honesty. The actual warning can be
              verified. Manipulation - crumbles from the first question.
        - id: '57'
          type: speech
          duration_sec: 16
          text:
            ru: 'И вот вам три волшебных вопроса-фильтра. Первый: «Это ТОЧНО произойдёт
              или только МОЖЕТ?» Если кто-то говорит «точно заболеешь» — это почти
              всегда преувеличение. «Точно» в жизни бывает очень редко.

              '
            uk: 'И вот вам три волшебных вопроса-фильтра. Первый: Это ТОЧНО '
            en: 'And here are three magic filter questions for you. First: “Is this
              DEFINITELY going to happen or just MAYBE?” If someone says “you’ll definitely
              get sick,” this is almost always an exaggeration. “Exactly” is very
              rare in life.'
        - id: '58'
          type: speech
          duration_sec: 14
          text:
            ru: 'Второй вопрос: «Насколько это ВЕРОЯТНО?» Одно дело — обжечься о плиту.
              Это очень вероятно, плита горячая. Другое дело — «без нашего йогурта
              кости развалятся». Вероятность — примерно как встретить единорога в
              школьной столовой.

              '
            uk: 'Второй вопрос: Насколько это ВЕРОЯТНО? Одно дело — обжечьс'
            en: 'Second question: “How LIKELY is this?” It''s one thing to burn yourself
              on a stove. This is very likely, the stove is hot. Another thing is
              “without our yogurt, the bones will fall apart.” The odds are about
              the same as meeting a unicorn in the school cafeteria.'
        - id: '59'
          type: speech
          duration_sec: 14
          text:
            ru: 'Третий: «Есть ли ДРУГИЕ варианты?» Кальций только в этом йогурте?
              Нет — в сыре, твороге, молоке. Эта игра только в этом магазине? Нет
              — есть интернет, другие магазины, распродажи. Если варианты есть — значит,
              вас торопят зря.

              '
            uk: Лякало чи ні?
            en: 'Third: “Are there OTHER options?” Is there only calcium in this yogurt?
              No - in cheese, cottage cheese, milk. Is this game only in this store?
              No - there is the Internet, other stores, sales. If there are options,
              then you are being rushed in vain.'
        - id: '60'
          type: speech
          duration_sec: 10
          text:
            ru: 'Три вопроса: точно ли, насколько вероятно, есть ли другие варианты.
              Запомнили? Сейчас проверим на практике!

              '
            uk: Правильно
            en: "Three questions: is it accurate, how likely is it, are there other
              options. Do you remember? Now let's check it in practice!"
    - scene_id: sc7
