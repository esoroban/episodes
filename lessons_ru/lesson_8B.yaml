          text:
            ru: 'Пугало — это когда кто-то меняет ваши слова, чтобы спорить с придуманной
              версией, а не с настоящей. Четыре способа: преувеличение, упрощение,
              добавление и изменение смысла. Признак — хочется крикнуть: «Я этого
              не говорил!»

              '
            uk: Додавання
            en: 'A bogeyman is when someone changes what you say to argue with a made-up
              version rather than the real one. Four ways: exaggeration, simplification,
              adding and changing meaning. A sign - you want to shout: “I didn’t say
              that!”'
        - id: '111'
          type: speech
          duration_sec: 14
          text:
            ru: 'Защита от пугала — формула уточнения: «Позволь уточнить: я говорил,
              что… а не то, что…» А чтобы самому не делать пугало — сначала перескажи
              слова собеседника и спроси: «Правильно я понял?»

              '
            uk: 'Защита от пугала — формула уточнения: Позволь уточнить: я г'
            en: 'Protection from a bogeyman is a clarification formula: “Let me clarify:
              I said that... and not that...” And in order to avoid making a bogeyman
              yourself, first retell the words of your interlocutor and ask: “Did
              I understand correctly?”'
        - id: '112'
          type: speech
          duration_sec: 14
          text:
            ru: 'Манипуляция страхом — когда кто-то давит на эмоции, чтобы вы подчинились
