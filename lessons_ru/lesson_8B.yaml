lesson:
  id: lesson_8B
  day: 8
  slot: B
  title:
    ru: Когда пугают — манипуляция страхом
    uk: Коли лякають — маніпуляція страхом
    en: When They Scare You — Fear Manipulation
  scenes:
    - scene_id: sc1
      title:
        ru: Знакомые страшилки
        uk: Знайомі страшилки
        en: Familiar Scary Stories
      media_ref: 8B.sc1.fear_intro
      status: v3_locked
      steps:
        - id: '1'
          type: speech
          duration_sec: 14
          text:
            ru: 'Кто хоть раз слышал от взрослых что-то такое: «Если не съешь суп
              — заболеешь!» Или: «Если не поделишься — с тобой никто дружить не будет!»
              Или моё любимое: «Не купишь сейчас — потом пожалеешь!»

              '
            uk: 'Хто хоч раз чув від дорослих щось подібне: «Якщо не з''їш суп — захворіюш!»
              Або: «Якщо не поділишся — ніхто не буде дружити з тобою!» Або моє улюблене:
              «Не купиш зараз — потім шкодуватимеш!»'
            en: 'Who hasn''t heard adults say things like: "If you don''t eat soup
              — you''ll get sick!" Or: "If you don''t share — no one will be your
              friend!" Or my favorite: "If you don''t buy now — you''ll regret it
              later!"'
        - id: '2'
          type: speech
          duration_sec: 14
          text:
            ru: 'Все эти фразы делают одно и то же — пытаются вас напугать. Не объяснить,
              не доказать, а именно напугать. Чтобы вы не думали, а просто послушались.
              Страх — отличный выключатель для мозга.

              '
            uk: Усі ці фрази роблять одне й те саме — намагаються вас налякати. Не
              пояснити, не довести, а саме налякати. Щоб ви не думали, а просто послухались.
              Страх — чудовий вимикач для мозку.
            en: All these phrases do the same thing — try to scare you. Not explain,
              not prove, but scare you. So you don't think, just obey. Fear is an
              excellent off-switch for the brain.
        - id: '3'
          type: speech
          duration_sec: 16
          text:
            ru: 'Помните, мы говорили о трёх целях, ради которых люди убеждают? Факты,
              доверие и эмоции. Так вот, страх — это самая мощная эмоция. Когда страшно,
              хочется действовать немедленно. Бежать, прятаться, соглашаться — лишь
              бы стало не страшно.

              '
            uk: Пам'ятаєте, ми говорили про три цілі, заради яких люди переконують?
              Факти, довіра й емоції. Так ось, страх — це найпотужніша емоція. Коли
              страшно, хочеться діяти негайно. Біжати, ховатися, погоджуватися — аби
              стало не страшно.
            en: Remember we talked about three goals people persuade for? Facts, trust,
              and emotions. Well, fear is the most powerful emotion. When scared,
              you want to act immediately. Run, hide, agree — anything to stop being
              scared.
        - id: '4'
          type: speech
          duration_sec: 16
          text:
            ru: 'Представьте: вы стоите в магазине. На витрине — последняя коробка
              с конструктором. Продавец говорит: «Бери сейчас, завтра не будет, потом
              будешь плакать!» Сердце стучит, руки тянутся к кошельку… Стоп. А вдруг
              в соседнем магазине их двадцать штук?

              '
            uk: 'Уявіть: ви стоїте в магазині. На вітрині — остання коробка з конструктором.
              Продавець говорить: «Бери зараз, завтра не буде, потім плакатимеш!»
              Серце стукає, руки тягнуться до гаманця… Стоп. А раптом у сусідньому
              магазині їх двадцять штук?'
            en: 'Imagine: you''re standing in a store. On the shelf — the last box
              of a constructor set. The seller says: "Buy now, won''t be here tomorrow,
              you''ll cry later!" Your heart races, your hands reach for your wallet…
              Wait. What if the store next door has twenty?'
        - id: '5'
          type: speech
          duration_sec: 14
          text:
            ru: 'Или вот: одноклассник говорит «Если не пойдёшь с нами — ты трус!»
              И что, вы правда трус? Или кто-то просто нажал на кнопку страха, чтобы
              вами управлять? Сегодня мы научимся отличать настоящие предупреждения
              от таких вот фокусов.

              '
            uk: 'Або ось: однокласник говорить «Якщо не пійдеш з нами — ти боягуз!»
              І що, ви справді боягуз? Або хтось просто натиснув на кнопку страху,
              щоб вами керувати? Сьогодні ми навчимося розрізняти справжні попередження
              від таких фокусів.'
            en: 'Or: a classmate says "If you don''t come with us — you''re a coward!"
              And are you really a coward? Or did someone just push your fear button
              to control you? Today we''ll learn to tell real warnings from these
              tricks.'
        - id: '6'
          type: speech
          duration_sec: 14
          text:
            ru: 'Но сначала — важная штука. Не все предупреждения — манипуляция! «Не
              трогай горячую плиту» — это не манипуляция, это мама спасает вам пальцы.
              «Не перебегай дорогу на красный» — тоже не фокус. Разница есть, и мы
              её найдём.

              '
            uk: Але спочатку — важлива річ. Не всі попередження — маніпуляція! «Не
              торкайся гарячої плити» — це не маніпуляція, це мама рятує вам пальці.
              «Не перебігай дорогу на червоний» — також не фокус. Різниця є, й ми
              її знайдемо.
            en: But first — something important. Not all warnings are manipulation!
              "Don't touch a hot stove" — that's not manipulation, that's mom saving
              your fingers. "Don't cross on red" — also not a trick. There's a difference,
              and we'll find it.
        - id: '7'
          type: speech
          duration_sec: 12
          text:
            ru: 'А поможет нам в этом история про рекламу, которая напугала даже самых
              смелых. Но обо всём по порядку — смотрим сценку!

              '
            uk: А допоможе нам у цьому історія про рекламу, яка налякала навіть найсміливіших.
              Але обо всьому по порядку — дивимося сценку!
            en: This story about an ad that scared even the bravest will help. But
              let's do it in order — watch the scene!
    - scene_id: sc2
      title:
        ru: Сценка — «Страшная реклама»
        uk: Сценка — «Страшна реклама»
        en: Scene — "Scary Ad"
      media_ref: 8B.sc2.skit_scary_ad
      status: v3_locked
      steps:
        - id: '8'
          type: speech
          duration_sec: 14
          text:
            ru: 'Дмитрик влетает в класс, размахивая телефоном: «Ребята, ребята! Я
              видел рекламу! Там написано — если не пить их йогурт, кости станут мягкими
              и ты вообще не сможешь бегать! Надо срочно маме сказать!»

              '
            uk: 'Дмитрик влітає в клас, розмахуючи телефоном: «Ребята, ребята! Я бачив
              рекламу! Там написано — якщо не пити їхній йогурт, кістки стануть м''якими
              й ти взагалі не зможеш бігти! Треба терміново мамі сказати!»'
            en: 'Dmitrik bursts into class waving his phone: "Guys, guys! I saw an
              ad! It says — if you don''t drink their yogurt, your bones become soft
              and you can''t run! I need to tell mom right away!"'
        - id: '9'
          type: speech
          duration_sec: 14
          text:
            ru: 'Маша бледнеет: «Серьёзно?! Я вчера не пила йогурт! А позавчера тоже!
              Может, у меня уже кости мягкие?!» Она щупает свою руку: «Кажется, вот
              тут что-то хрустнуло…»

              '
            uk: 'Маша бліднява: «Серйозно?! Я вчора не пила йогурт! А передбачень
              тоже! Можливо, у мене вже кістки м''які?!» Вона щупає свою руку: «Здається,
              ось тут щось хрускнуло…»'
            en: 'Masha turns pale: "Seriously?! I didn''t drink yogurt yesterday!
              And the day before! Maybe my bones are already soft?!" She feels her
              arm: "I think something cracked here…"'
        - id: '10'
          type: speech
          duration_sec: 14
          text:
            ru: 'Оленка спокойно откладывает книгу: «Подождите. Дмитрик, а кто это
              написал?» — «Ну… компания, которая продаёт йогурт.» — «Ага. То есть
              тот, кто ПРОДАЁТ йогурт, говорит, что без него ты пропал. Удивительное
              совпадение, правда?»

              '
            uk: 'Оленка спокійно відкладає книгу: «Зачекайте. Дмитрик, а хто це написав?»
              — «Ну… компанія, яка продає йогурт.» — «Ага. Тобто той, хто ПРОДАЄ йогурт,
              говорить, що без нього ти пропав. Дивовижне збігання, правда?»'
            en: 'Olenka calmly puts down her book: "Wait. Dmitrik, who wrote this?"
              "Well… the company that sells yogurt." "Ah. So the person who SELLS
              yogurt says you''re done without it. Remarkable coincidence, right?"'
        - id: '11'
          type: speech
          duration_sec: 16
          text:
            ru: 'Дмитрик задумался: «Ну ладно, но может, это правда? Может, без йогурта
              реально кости слабеют?» Оленка: «Давай проверим. Кальций есть в сыре,
              твороге, молоке, рыбе, даже в брокколи. Один йогурт — не единственный
              источник. Ты же не развалился, хотя вчера ел котлету, а не йогурт?»

              '
            uk: 'Дмитрик задумався: «Ну ладно, але можливо, це правда? Можливо, без
              йогурту справді кістки слабнуть?» Оленка: «Давай перевіримо. Кальцій
              є в сирі, твороґу, молоці, рибі, навіть в броколі. Один йогурт — не
              єдине джерело. Ти ж не розвалився, хоча вчора їв котлету, а не йогурт?»'
            en: 'Dmitrik thought: "Well, maybe it''s true? Maybe bones really weaken
              without yogurt?" Olenka: "Let''s check. Calcium is in cheese, cottage
              cheese, milk, fish, even broccoli. One yogurt isn''t the only source.
              You didn''t fall apart yesterday even though you ate a cutlet instead
              of yogurt, right?"'
        - id: '12'
          type: speech
          duration_sec: 14
          text:
            ru: 'Маша перестаёт щупать руку: «То есть мне не надо паниковать?» Оленка:
              «Маша, твои кости пережили три года на турниках. Думаешь, один пропущенный
              йогурт их сломает?» Все смеются.

              '
            uk: 'Маша припиняється щупати руку: «Тобто мені не треба паніковати?»
              Оленка: «Маша, твої кістки пережили три роки на турніках. Думаєш, один
              пропущений йогурт їх зламає?» Всі сміються.'
            en: 'Masha stops checking her arm: "So I don''t need to panic?" Olenka:
              "Masha, your bones survived three years on the bars. Think one missed
              yogurt will break them?" Everyone laughs.'
        - id: '13'
          type: speech
          duration_sec: 12
          text:
            ru: 'Дмитрик чешет затылок: «Получается, реклама просто напугала нас,
              чтобы мы купили?» Оленка: «Именно! Страх отключает голову. А они этого
              и хотят — чтобы ты бежал в магазин, а не думал.»

              '
            uk: 'Дмитрик чеше потилицю: «Виходить, реклама просто налякала нас, щоб
              ми купили?» Оленка: «Саме так! Страх вимикає голову. А вони того й хочуть
              — щоб ти біг у магазин, а не думав.»'
            en: 'Dmitrik scratches his head: "So the ad just scared us to buy?" Olenka:
              "Exactly! Fear turns off your brain. And that''s what they want — for
              you to run to the store without thinking."'
        - id: '14'
          type: vote
          duration_sec: 15
          text:
            ru: 'Реклама йогурта использовала страх честно или нечестно?

              '
            uk: Реклама йогурту використала страх чесно чи нечесно?
            en: Did the yogurt ad use fear honestly or dishonestly?
          options:
            - id: opt_1
              text:
                ru: Честно — это правда опасно
                uk: Чесно — це справді небезпечно
                en: Honestly — it's really dangerous
            - id: opt_2
              text:
                ru: Нечестно — преувеличили, чтобы продать
                uk: Нечесно — перебільшили, щоб продати
                en: Dishonestly — exaggerated to sell
            - id: opt_3
              text:
                ru: Не уверен
                uk: Не впевнений
                en: Not sure
          correct: opt_2
        - id: '15'
          type: speech
          duration_sec: 12
          text:
            ru: 'Нечестно! Кости не развалятся от одного пропущенного йогурта. Реклама
              раздула опасность до абсурда — как будто без их баночки наступит конец
              света. Классический приём — напугать и продать.

              '
            uk: Нечесно! Кістки не розвалятися від одного пропущеного йогурту. Реклама
              раздула небезпеку до абсурду — ніби без їхньої баночки настане кінець
              світу. Класичний прийом — налякати й продати.
            en: Dishonestly! Bones won't fall apart from one missed yogurt. The ad
              blew up the danger to absurdity — as if the world would end without
              their little jar. Classic trick — scare and sell.
    - scene_id: sc3
      title:
        ru: Четыре вида запугивания
        uk: Чотири види залякування
        en: Four Types of Intimidation
      media_ref: 8B.sc3.four_fear_types
      status: v3_locked
      steps:
        - id: '16'
          type: speech
          duration_sec: 16
          text:
            ru: 'Итак, нас пугают — но как именно? Оказывается, у страха есть четыре
              любимых маски. Четыре способа надавить. И когда вы знаете их в лицо
              — они теряют силу. Разбираем по одному.

              '
            uk: Отже, нас лякають — але як саме? Виявляється, страх має чотири улюблені
              маски. Чотири способи надавити. І коли ви їх знаєте в обличчя — вони
              втрачають силу. Розбираємо по одному.
            en: So they scare us — but how exactly? It turns out fear has four favorite
              masks. Four ways to pressure. And when you know them by sight — they
              lose their power. Let's break them down one by one.
        - id: '17'
          type: speech
          duration_sec: 16
          text:
            ru: 'Первый вид — угроза здоровью. «Не съешь суп — заболеешь!» «Не наденешь
              шарф — горло отвалится!» Горло, конечно, никуда не денется — оно крепко
              приделано. Но звучит страшно, и ты уже тянешься за шарфом, даже если
              на улице плюс двадцать.

              '
            uk: Так, пастка
            en: The first type is a health threat. “If you don’t eat the soup, you’ll
              get sick!” “If you don’t wear a scarf, your throat will fall off!” The
              throat, of course, will not go anywhere - it is firmly attached. But
              it sounds scary, and you’re already reaching for a scarf, even if it’s
              plus twenty outside.
        - id: '18'
          type: speech
          duration_sec: 16
          text:
            ru: 'Второй — угроза одиночеством. «Не сделаешь как все — никто с тобой
              дружить не будет!» Это самый болезненный вид. Потому что друзья — это
              важно. Но настоящие друзья не исчезают из-за одного несогласия. Если
              исчезают — стоит задуматься, были ли они настоящими.

              '
            uk: Ні, все точно
            en: The second is the threat of loneliness. “If you don’t do like everyone
              else, no one will be friends with you!” This is the most painful type.
              Because friends are important. But true friends don't disappear because
              of one disagreement. If they disappear, it’s worth wondering whether
              they were real.
        - id: '19'
          type: speech
          duration_sec: 16
          text:
            ru: 'Третий — угроза неудачей. «Не купишь сейчас — потом пожалеешь!» «Не
              запишешься — опоздаешь навсегда!» Навсегда! Как будто жизнь — это поезд,
              который уходит один раз. На самом деле поездов — полное расписание.
              Но под давлением кажется, что это последний.

              '
            uk: Третий — угроза неудачей. Не купишь сейчас — потом пожалееш
            en: The third is the threat of failure. “If you don’t buy it now, you’ll
              regret it later!” “If you don’t sign up, you’ll be forever late!” Forever!
              It's as if life is a train that leaves only once. In fact, there is
              a full train schedule. But under pressure it seems like it's the last
              one.
        - id: '20'
          type: speech
          duration_sec: 14
          text:
            ru: 'И четвёртый — угроза наказанием. «Не сделаешь домашку — заберу телефон
              навсегда!» Навсегда — любимое слово запугивания. Заметьте: во всех четырёх
              видах кто-то давит на эмоции, а не на разум.

              '
            uk: И четвёртый — угроза наказанием. Не сделаешь домашку — забе
            en: 'And the fourth is the threat of punishment. “If you don’t do your
              homework, I’ll take your phone forever!” Forever is a favorite bullying
              word. Note: in all four types, someone puts pressure on emotions, not
              on reason.'
        - id: '21'
          type: speech
          duration_sec: 12
          text:
            ru: 'Итого четыре маски страха: здоровье, одиночество, неудача, наказание.
              Запомните их — сейчас будем определять, какая маска на ком.

              '
            uk: Чи є протиріччя?
            en: 'There are four masks of fear in total: health, loneliness, failure,
              punishment. Remember them - now we will determine which mask is on whom.'
    - scene_id: sc4
      title:
        ru: Практика — какой вид запугивания?
        uk: Так, протиріччя
        en: Yes, a contradiction
      media_ref: 8B.sc4.fear_type_practice
      status: v3_locked
      steps:
        - id: '22'
          type: speech
          duration_sec: 12
          text:
            ru: 'Четыре маски запомнили? Проверяем! Я читаю фразу — вы голосуете,
              какой это вид запугивания. Будьте внимательны — некоторые маски хорошо
              прячутся.

              '
            uk: Ні, все логічно
            en: Do you remember the four masks? Let's check! I read the phrase - you
              vote on what type of intimidation it is. Be careful - some masks hide
              well.
        - id: '23'
          type: speech
          duration_sec: 10
          text:
            ru: '«Если не будешь есть овощи — вырастешь слабым и болезненным!»

              '
            uk: Если не будешь есть овощи — вырастешь слабым и болезненным!
            en: “If you don’t eat vegetables, you will grow up weak and sickly!”
        - id: '24'
          type: vote
          duration_sec: 12
          text:
            ru: 'Какой вид запугивания?

              '
            uk: Какой вид запугивания?
            en: What type of bullying?
          options:
            - id: opt_1
              text:
                ru: Здоровье
                uk: Який тип обґрунтування?
                en: What type of reasoning?
            - id: opt_2
              text:
                ru: Одиночество
                uk: Факт
                en: Fact
            - id: opt_3
              text:
                ru: Неудача
                uk: Логіка
                en: Logic
            - id: opt_4
              text:
                ru: Наказание
                uk: Джерело
                en: Source
          correct: opt_1
        - id: '25'
          type: speech
          duration_sec: 8
          text:
            ru: 'Здоровье! «Вырастешь слабым» — классика. Овощи полезны, но от одного
              пропущенного салата мышцы не отвалятся.

              '
            uk: Здоровье! Вырастешь слабым — классика. Овощи полезны, но о
            en: Health! “You’ll Grow Up Weak” is a classic. Vegetables are good for
              you, but one missed salad won't make your muscles fall off.
        - id: '26'
          type: speech
          duration_sec: 10
          text:
