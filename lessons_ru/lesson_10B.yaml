          duration_sec: 12
          text:
            ru: 'Десять из десяти! Сегодня мы разобрали четыре ловушки мышления: ложная
              дилемма, составной вопрос, вопрос-ловушка и риторический вопрос. Серьёзный
              арсенал!

              '
            uk: Ці чотири питання — ваш перепадок від усіх видів обманів.
            en: These four questions are your protection against all types of deception.
    - scene_id: sc7
      title:
        ru: КОНТРАРГУМЕНТЫ И ОТКРЫТЫЕ ВОПРОСЫ
        uk: Задавайте їх в школі, в досі, в інтернеті, у розмовах з друзями. Стане
          вашою звичкою — і тоді вас неможливо буде обманути.
        en: Ask them at school, at home, online, in conversations with friends. Make
          it a habit - and then you can't be fooled.
      media_ref: 10B.sc7.counterarguments
      status: v3_locked
      steps:
        - id: '124'
          type: speech
          duration_sec: 12
          text:
            ru: 'Мы научились видеть ловушки в вопросах. Но жизнь — не чёрно-белая.
              Давайте подумаем о случаях, когда всё не так однозначно.

              '
            uk: ВОНИ СПРОБУЮТЬ ОБМАНУТИ ВАС ЕЩЕ
            en: THEY'LL TRY TO FOOL YOU AGAIN
        - id: '125'
          type: discussion
          duration_sec: 30
          text:
            ru: 'Мама спрашивает: «Почему ты не поел, не оделся и не собрал рюкзак?»
              Это составной вопрос. Но мама не пытается вас обмануть — она торопится
              на работу. Всегда ли составной вопрос — это манипуляция?

              '
            uk: І це буде нормально! Обман не зникне. Люди будуть продовжувати грати
              словами. Реклама буде продовжувати маніпулювати. Інтернет буде повний
              неправди.
            en: And that's okay! Deception won't disappear. People will keep playing
              with words. Ads will keep manipulating. The internet will keep spreading
              lies.
        - id: '126'
          type: speech
          duration_sec: 15
          text:
            ru: 'Не всегда! Иногда люди просто перечисляют, не думая о ловушках. Важно
              различать: человек хочет запутать — или просто торопится? Намерение
              решает всё.

              '
            uk: Але тепер ви готові. Ви знаєте, як розпізнавати обман, як розбивати
              його на частини й як захищати себя.
            en: But now you're ready. You know how to recognize deception, how to
              break it apart, and how to protect yourself.
        - id: '127'
          type: discussion
          duration_sec: 30
          text:
            ru: 'Великий оратор говорит толпе: «Разве мы не заслуживаем лучшей жизни?»
              Это риторический вопрос. Но он вдохновляет тысячи людей. Риторический
              вопрос — это всегда плохо?

              '
            uk: А це робить вас сильнішими. Потужнішими. Розумнішими.
            en: And that makes you stronger. More powerful. Smarter.
        - id: '128'
          type: speech
          duration_sec: 15
          text:
            ru: 'Нет! Риторика — это инструмент. Молотком можно построить дом, а можно
              разбить окно. Риторический вопрос может вдохновлять, а может манипулировать.
              Важно — зачем.

              '
            uk: Це робить вас критичними мислячими людьми. І в світі, повном неправди,
              це найцінніше, що може бути.
            en: It makes you critical thinkers. And in a world full of lies, that's
              the most valuable thing there is.
        - id: '129'
          type: discussion
          duration_sec: 30
          text:
            ru: 'Друг задаёт вам вопрос-ловушку. Вы замечаете! Что лучше — разоблачить
              ловушку вслух или тихо не попасться? А если друг обидится?

              '
            uk: Чудово витримки дні 9 й 10! До зустрічі на днях 11, 12 і далі!
            en: Great job on days 9 and 10! See you on days 11, 12, and beyond!
        - id: '130'
          type: speech
          duration_sec: 15
          text:
            ru: 'Не обязательно кричать «Ловушка!». Можно мягко: «Подожди, давай разберёмся
              по порядку.» Без обвинений — но и без капкана. Дипломатия!

              '
            uk: А до того часу — залишайтесь розумніш і скептичнішими перед обманами.
              Світ вам за це подякує.
            en: Until then - stay smarter and skeptical of deception. The world will
              thank you for it.
        - id: '131'
          type: discussion
          duration_sec: 35
          text:
            ru: 'А можно ли использовать хитрые вопросы для добра? Например, друг
              не верит в себя. Вы говорите: «Разве ты не заслуживаешь отличной оценки?»
              Это манипуляция — или поддержка?

              '
            uk: 'А можна використовувати хитрі питання для добра? Наприклад, друг
              не вірить у себе. Ви кажете: «Хіба ти не заслуговуєш відличної оцінки?»
              Це маніпуляція — чи підтримка?'
            en: 'Can you use tricky questions for good? For example, your friend doesn''t
              believe in themselves. You ask: "Don''t you deserve a great grade?"
              Is that manipulation—or support?'
        - id: '132'
          type: speech
          duration_sec: 15
          text:
            ru: 'Тонкий вопрос! Тот же приём — но цель другая. Инструменты нейтральны.
              Нож режет хлеб и строит скульптуры. Важно — в чьих руках и зачем.

              '
            uk: Тонке питання! Той самий прийом — але мета інша. Інструменти нейтральні.
              Ніж реже хліб і будує скульптури. Важливо — в чиїх руках та навіщо.
            en: A tricky question! Same technique — but different goal. Tools are
              neutral. A knife cuts bread and builds sculptures. What matters — whose
              hands and why.
        - id: '133'
          type: discussion
          duration_sec: 35
          text:
            ru: 'А что если вы сами случайно задали хитрый вопрос — не хотели манипулировать,
              просто так сказали? Вы теперь манипулятор?

              '
            uk: А що якщо ви самі випадково задали хитре питання — не хотіли маніпулювати,
              просто так сказали? Ви тепер маніпулятор?
            en: What if you accidentally asked a tricky question yourself—you didn't
              mean to manipulate, it just came out? Does that make you a manipulator?
        - id: '134'
          type: speech
          duration_sec: 15
          text:
            ru: 'Нет! Мы все иногда говорим неточно. Разница между манипулятором и
              обычным человеком — в намерении. Манипулятор делает это специально.
              А вы теперь можете заметить и исправить!

              '
            uk: Ні! Ми всі іноді говоримо неточно. Різниця між маніпулятором та звичайною
              людиною — у намірі. Маніпулятор робить це навмисно. А ви тепер можете
              помітити та виправити!
            en: No! We all sometimes speak inexactly. The difference between a manipulator
              and an ordinary person is intention. A manipulator does it on purpose.
              But now you can notice and correct it!
        - id: '135'
          type: discussion
          duration_sec: 30
          text:
            ru: 'Последний вопрос без ответа. Мы научились видеть ловушки везде. А
              вдруг теперь вы будете подозревать ловушки даже там, где их нет? Как
              не стать параноиком?

              '
            uk: Останнє питання без відповіді. Ми навчилися бачити пастки скрізь.
              А раптом тепер ви будете підозрювати пастки навіть там, де їх немає?
              Як не стати паранойком?
            en: 'One last unanswered question: we learned to spot tricks everywhere.
              What if now you start suspecting tricks even where there aren''t any?
              How do you avoid becoming paranoid?'
        - id: '136'
          type: speech
          duration_sec: 15
          text:
            ru: 'Золотое правило: сначала предполагай доброе намерение. Если вопрос
              кажется хитрым — проверь. Но не начинай с подозрений. Критическое мышление
              — это не паранойя, а внимательность.

              '
            uk: 'Золоте правило: спочатку припускай добрий намір. Якщо питання здається
              хитрим — перевір. Але не починай з підозрінь. Критичне мислення — це
              не паранойя, а уважність.'
            en: 'Golden rule: first assume good intention. If a question seems tricky
              — check. But don''t start with suspicion. Critical thinking is not paranoia,
              but attentiveness.'
    - scene_id: sc8
      title:
        ru: 'ЗАКРЫТИЕ: ДО СЛЕДУЮЩЕГО ЗАНЯТИЯ'
        uk: 'ЗАВЕРШЕННЯ: ДО НАСТУПНОГО ЗАНЯТТЯ'
        en: 'CLOSING: UNTIL NEXT LESSON'
      media_ref: 10B.sc8.closing
      status: v3_locked
      steps:
        - id: '137'
          type: speech
          duration_sec: 15
          text:
            ru: 'Сегодня был мощный день. На первом занятии мы сломали ловушку «или-или»
              и нашли третий вариант там, где его прятали. На втором — научились разбирать
              хитрые вопросы на части и даже создавать их сами.

              '
            uk: Сьогодні був потужний день. На першому занятті ми зламали пастку «або-або»
              та знайшли третій варіант там, де його приховували. На другому — навчилися
              розбирати хитрі питання на частини й навіть створювати їх самі.
            en: Today was a powerful day. In the first lesson we broke the 'either-or'
              trap and found the third option where it was hidden. In the second —
              we learned to break tricky questions into parts and even create them
              ourselves.
        - id: '138'
          type: speech
          duration_sec: 15
          text:
            ru: 'А ещё мы поняли главное: инструменты нейтральны. Составной вопрос,
              ловушка, риторический вопрос — это не «плохое» и не «хорошее». Всё зависит
              от того, кто и зачем их использует.

              '
            uk: 'А ще ми зрозуміли головне: інструменти нейтральні. Складне питання,
              пастка, риторичне питання — це не «погане» та не «гарне». Все залежить
              від того, хто й навіщо їх використовує.'
            en: 'And we understood the most important thing: tools are neutral. Compound
              question, trap, rhetorical question — these are not ''bad'' and not
              ''good''. It all depends on who uses them and why.'
        - id: '139'
          type: speech
          duration_sec: 12
          text:
            ru: 'Задание до следующего занятия: замечайте хитрые вопросы вокруг себя
              — в разговорах, в рекламе, в фильмах. Попробуйте определить тип. На
              следующем занятии расскажете, что нашли!

              '
            uk: 'Завдання до наступного заняття: помічайте хитрі питання навколо себе
              — у розмовах, у рекламі, у фільмах. Спробуйте визначити тип. На наступному
              занятті розповісте, що знайшли!'
            en: 'Assignment until next lesson: notice tricky questions around you
              — in conversations, in ads, in movies. Try to identify the type. Tell
              us what you found at the next lesson!'
        - id: '140'
          type: speech
          duration_sec: 10
          text:
            ru: 'Вы сегодня были великолепны. Древнегреческие ораторы вами бы гордились!
              До следующего занятия!

              '
            uk: Ви сьогодні були чудові. Давньогрецькі оратори вами б гордилися! До
              наступного заняття!
            en: You were amazing today. Ancient Greek orators would be proud of you!
              Until next lesson!
