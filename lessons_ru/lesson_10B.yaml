              такое — стоп. Не отвечайте сразу!

              '
            uk: Складена пастка
            en: "Marker words that give away the trap: “Have you stopped...?”, “Why
              do you always...?”, “When did you finally...?”, “Admit that you...”
              If you hear this, stop. Don't answer right away!"
