            en: Let's test everything you learned on days 9 and 10. One big test -
              thirty questions on different types of deception.
        - id: '97'
          type: speech
          duration_sec: 15
          text:
            ru: 'Моя версия: «Когда ты наконец перестанешь опаздывать?» Внутри спрятано:
