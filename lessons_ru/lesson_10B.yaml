              '
            uk: 4. Захистити себя від маніпуляцій у школі, у досі й в інтернеті
            en: 4. Protect yourself from manipulation at school, at home, and online
        - id: '94'
          type: discussion
          duration_sec: 30
          text:
            ru: 'Ситуация: вы хотите, чтобы брат помыл посуду. Придумайте составной
