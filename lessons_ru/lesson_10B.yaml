              '
            uk: А тепер попробуємо! Я дам вам хитре запитання, а ви спробуєте на нього
              правильно відповісти.
            en: Now let's try! I'll give you a tricky question and you try to answer
              it correctly.
        - id: '82'
          type: vote
          duration_sec: 10
          text:
            ru: '«Как можно не любить лето?»

              '
            uk: 1. «Коли ти, нарешті, почнеш думати про своє майбутнє замість того,
              щоб трьохтатися в соцмережах?»
            en: 1. "When will you finally start thinking about your future instead
              of fooling around on social media?"
          options:
            - id: opt_1
              text:
                ru: Настоящий вопрос
                uk: Як на це відповісти?
                en: How would you answer?
            - id: opt_2
              text:
                ru: Утверждение в маскировке
                uk: 'Можна сказати: «Твоє запитання припускає, що я не думаю про своє
                  майбутнє. Але я думаю. І соцмережі — це не те ж саме, що не думати
                  про майбутнє. Давай обговоримо, як я балансую навчання й розслаблення.»'
                en: 'You could say: "Your question assumes I don''t think about my
                  future. But I do. And social media isn''t the same as not thinking
                  about the future. Let''s discuss how I balance studying and relaxing."'
          correct: opt_2
        - id: '83'
          type: speech
          duration_sec: 12
          text:
            ru: 'Утверждение! «Все должны любить лето.» А если кто-то обожает зиму?
              Или осень? Вопрос запрещает даже думать иначе.

              '
            uk: 2. «Чому ти не хочеш розповідати мені про своє життя й закриваєшся
              в собі?»
            en: 2. "Why don't you want to tell me about your life and keep everything
              to yourself?"
        - id: '84'
          type: vote
          duration_sec: 10
          text:
            ru: '«Неужели кто-то верит в приметы?»

              '
            uk: Як на це відповісти?
            en: How would you answer?
          options:
            - id: opt_1
              text:
                ru: Настоящий вопрос
                uk: 'Можна запитати: «Чим ти вважаєш, що я закриваюсь? Можеш дати
                  конкретний приклад?» Це змушує людину уточнити припущення.'
                en: 'You could ask: "What makes you think I''m keeping to myself?
                  Can you give a specific example?" This makes the person clarify
                  their assumption.'
            - id: opt_2
              text:
                ru: Утверждение в маскировке
                uk: 3. «Ти й раніше видилась з ними вночі, коли казала батькам, що
