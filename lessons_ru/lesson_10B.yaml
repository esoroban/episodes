            - id: opt_2
              text:
                ru: Утверждение в маскировке
                uk: 'ПРАКТИКА: ВИЙТИ ИЗ ПАСТКИ'
                en: 'PRACTICE: ESCAPE THE TRAP'
          correct: opt_1
        - id: '81'
          type: speech
          duration_sec: 8
          text:
            ru: 'Настоящий! Никакого скрытого мнения — просто любопытство. Отвечайте
