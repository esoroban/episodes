lesson:
  id: lesson_10B
  day: 10
  slot: B
  title:
    ru: Хитрые вопросы
    uk: Хитрі запитання
    en: Tricky Questions
  scenes:
    - scene_id: sc1
      title:
        ru: 'ОТКРЫТИЕ: ДЕНЬ НЕВОЗМОЖНЫХ ВОПРОСОВ'
        uk: 'ВІДКРИТТЯ: ДЕНЬ НЕМОЖЛИВИХ ЗАПИТАНЬ'
        en: 'DISCOVERY: THE DAY OF IMPOSSIBLE QUESTIONS'
      media_ref: 10B.sc1.opening_tricky_questions
      status: v3_locked
      steps:
        - id: '1'
          type: speech
          duration_sec: 15
          text:
            ru: 'У Дмитрика был обычный вторник. Ничего особенного. Он проснулся,
              позавтракал, пошёл в школу. Но именно в этот вторник ему задали пять
              вопросов, на которые он не смог ответить. И дело было не в том, что
              он не знал ответов. Дело было в самих вопросах.

              '
            uk: У Дмитрика був звичайний вівторок. Нічого особливого. Він прокинувся,
              позіхнув, пішов до школи — і все почалося.
            en: Dmytryk had an ordinary Tuesday. Nothing special. He woke up, yawned,
              went to school - and it all started.
        - id: '2'
          type: speech
          duration_sec: 15
          text:
            ru: 'Утром брат Тарас встречает его в коридоре и говорит: «Почему ты опять
              взял мои наушники, не спросил разрешения и ещё сломал провод?» Дмитрик
              открывает рот... и не знает, что сказать.

              '
            uk: 'Вранці брат Тарас зустрічає його в коридорі й говорить: «Чому ти
              знову взяв мої навушники, не запитавши й не сказавши мені?»'
            en: 'In the morning brother Taras meets him in the hall and says: "Why
              did you take my headphones again without asking and not telling me?"'
        - id: '3'
          type: speech
          duration_sec: 15
          text:
            ru: 'Потому что он наушники не брал. Но вопрос построен так, будто он
              и взял, и не спросил, и сломал — всё сразу! Если ответить «я не ломал
              провод» — получается, что взял. Если сказать «я спрашивал» — получается,
              что всё-таки брал. Ловушка.

              '
            uk: Тому що він навушники не брав. Але запитання побудоване так, ніби
              він і брав. Як на це відповісти?
            en: But he didn't take the headphones. But the question is built as though
              he did. How do you answer?
        - id: '4'
          type: speech
          duration_sec: 15
          text:
            ru: 'В школе подходит Микола и при всех спрашивает: «Ты уже перестал списывать
              у Оленки на контрольных?» Весь класс смотрит. Дмитрик краснеет.

              '
            uk: 'У школі підходить Микола й при всіх запитує: «Ти вже припинив списувати
              на контрольних?»'
            en: 'At school Mykola comes up and asks in front of everyone: "Have you
              already stopped cheating on tests?"'
        - id: '5'
          type: speech
          duration_sec: 15
          text:
            ru: 'Если сказать «да, перестал» — значит, раньше списывал. Если сказать
              «нет» — значит, до сих пор списывает! А Дмитрик вообще никогда не списывал
              у Оленки! Но как это объяснить, если вопрос уже предполагает, что списывал?

              '
            uk: Якщо сказати «так, припинив» — значить, раніше списував. Якщо сказати
              «ні» — звучить, як буцімто все ще списує. Це пастка!
            en: If you say "yes, I stopped" - it means you cheated before. If you
              say "no" - it sounds like you're still cheating. It's a trap!
        - id: '6'
          type: speech
          duration_sec: 15
          text:
            ru: 'На перемене учитель вызывает Дмитрика: «Почему ты вчера не сделал
              домашку, опоздал на урок и забыл тетрадь?» Дмитрик моргает. Он сделал
              домашку. Он не опоздал. Тетрадь забыл — это правда. Но как ответить
              на три обвинения разом?

              '
            uk: 'На перерві учитель викликає Дмитрика: «Чому ти вчора не зробив домашку
              з англійської?»'
            en: 'During break the teacher calls on Dmytryk: "Why didn''t you do your
              English homework yesterday?"'
        - id: '7'
          type: speech
          duration_sec: 12
          text:
            ru: 'После школы звонит бабушка: «Когда ты наконец перестанешь сидеть
              в телефоне и займёшься чем-то полезным?» Дмитрик только что два часа
              читал книгу. Но вопрос уже решил, что он бездельничает.

              '
            uk: 'Після школи дзвонить бабуся: «Коли ти нарешті припинеш сидіти в телефоні
              й почнеш жити нормально?»'
            en: 'After school grandma calls: "When will you finally stop being glued
              to your phone and start living normally?"'
        - id: '8'
          type: speech
          duration_sec: 12
          text:
            ru: 'Вечером Дмитрик сидит и думает: «Что за день? Мне задали пять вопросов
              — и ни на один я не смог нормально ответить. При этом я ни в чём не
              виноват! Как это работает?»

              '
            uk: 'Вечором Дмитрик сидить й думає: «Що за день? Мені задали п''ять запитань,
              а я не знаю, на жодне з них відповісти!»'
            en: 'In the evening Dmytryk sits and thinks: "What a day! I was asked
              five questions and I don''t know how to answer any of them!"'
        - id: '9'
          type: speech
          duration_sec: 10
          text:
            ru: 'Звонит Сашко. Дмитрик рассказывает ему про свой день. И Сашко говорит
              кое-что неожиданное.

              '
            uk: 'Дзвонить Сашко. Дмитрик розповідає йому про свій день. І Сашко говорить:
              «Я знаю, як тобі допомогти.»'
            en: 'Sashko calls. Dmytryk tells him about his day. And Sashko says: "I
              know how to help you."'
        - id: '10'
          type: speech
          duration_sec: 15
          text:
            ru: '«Дмитрик, проблема не в тебе. Проблема в вопросах. Тебе весь день
              задавали хитрые вопросы — и ты пытался на них честно ответить. А на
              хитрые вопросы нельзя отвечать напрямую. Их нужно сначала разобрать
              на части.»

              '
            uk: «Дмитрик, проблема не в тобі. Проблема в запитаннях. Тобі весь день
              задавали запитання, побудовані як пастки. На них неможливо нормально
              відповісти!»
            en: '"Dmytryk, the problem isn''t you. It''s the questions. All day you
              were asked questions built as traps. You can''t answer them properly!"'
        - id: '11'
          type: speech
          duration_sec: 10
          text:
            ru: '«Как это — разобрать на части?» — спрашивает Дмитрик. Сашко: «Смотри.
              Вопрос Тараса про наушники — сколько в нём на самом деле вопросов?»

              '
            uk: '«Як це — розібрати на частини?» — запитує Дмитрик. Сашко: «Дивись.
              Запитання «Чому ти взяв наушники, не запитавши й не сказавши мені?»
              складається з кількох окремих запитань.»'
            en: '"What do you mean break them down?" Dmytryk asks. Sashko: "Look.
              The question ''Why did you take my headphones without asking and not
              telling me?'' is made of several separate questions."'
        - id: '12'
          type: vote
          duration_sec: 12
          text:
            ru: 'Сколько вопросов спрятано в «Почему ты взял наушники, не спросил
              и сломал провод?»

              '
            uk: Скільки запитань сховано в «Чому ти взяв наушники, не запитавши й
              не сказавши мені?»
            en: How many questions are hidden in "Why did you take my headphones without
              asking and not telling me?"
          options:
            - id: opt_1
              text:
                ru: Один
                uk: Одне
                en: One
            - id: opt_2
              text:
                ru: Два
                uk: Два
                en: Two
            - id: opt_3
              text:
                ru: Три
                uk: Три
                en: Three
          correct: opt_3
        - id: '13'
          type: speech
          duration_sec: 12
          text:
            ru: 'Три! Первый: брал ли ты наушники? Второй: спрашивал ли разрешения?
              Третий: сломал ли провод? Тарас склеил три вопроса в один — и Дмитрик
              не смог разделить их, чтобы ответить по порядку.

              '
            uk: 'Три! Перше: брав ли ти наушники? Друге: запитував ли дозвіл? Третє:
              сказав ли мені? Кожне з них — окреме запитання. А вони поділені в одне!'
            en: 'Three! First: did you take the headphones? Second: did you ask permission?
              Third: did you tell me? Each is a separate question. But they''re packed
              into one!'
        - id: '14'
          type: speech
          duration_sec: 12
          text:
            ru: 'Сашко: «А вопрос Миколы — "ты уже перестал списывать?" Тут другая
              ловушка. Вопрос заранее предполагает, что ты списывал. И любой ответ
              — "да" или "нет" — подтверждает это!»

              '
            uk: 'Сашко: «А запитання Миколи — ''ти вже припинив списувати?'' — тут
              інша пастка. Це не звичайне запитання.»'
            en: 'Sashko: "And Mykola''s question - ''have you already stopped cheating?''
              - that''s a different trap. It''s not a normal question."'
        - id: '15'
          type: vote
          duration_sec: 12
          text:
            ru: 'Какое скрытое предположение в вопросе «Ты уже перестал списывать?»

              '
            uk: Яке приховане припущення в запитанні «Ти вже припинив списувати?»
            en: What's the hidden assumption in "Have you already stopped cheating?"
          options:
            - id: opt_1
              text:
                ru: Ты плохо учишься
                uk: 'Припущення: ти ніколи не списував'
                en: 'Assumption: you never cheated'
            - id: opt_2
              text:
                ru: Ты раньше списывал
                uk: 'Припущення: ти списував раніше'
                en: 'Assumption: you cheated before'
            - id: opt_3
              text:
                ru: Ты не любишь Оленку
                uk: 'Припущення: ти все ще списуєш'
                en: 'Assumption: you''re still cheating'
          correct: opt_2
        - id: '16'
          type: speech
          duration_sec: 12
          text:
            ru: 'Именно! Вопрос уже решил, что ты списывал — и спрашивает только,
              перестал ли. Если ты никогда не списывал — на этот вопрос нельзя ответить
              ни «да», ни «нет». Нужно сначала сломать ловушку.

              '
            uk: 'Припущення: ти списував раніше! Слово «вже» це підкреслює. «Вже припинив»
              — значить, раніше робив.'
            en: 'Assumption: you cheated before! The word "already" emphasizes this.
              "Already stopped" - means you did it before.'
        - id: '17'
          type: speech
          duration_sec: 12
          text:
            ru: 'Дмитрик: «То есть мне весь день задавали вопросы с подвохом, а я
              пытался играть по их правилам?» Сашко: «Именно! Сегодня мы научимся
              видеть два типа хитрых вопросов — и как с ними справляться.»

              '
            uk: ТРИ ТИПИ ХИТРИХ ЗАПИТАНЬ
            en: 'Dmitry: “So, all day long they asked me tricky questions, and I tried
              to play by their rules?” Sashko: “Exactly! Today we will learn to see
              two types of tricky questions - and how to deal with them."'
        - id: '18'
          type: speech
          duration_sec: 12
          text:
            ru: 'Два типа хитрых вопросов. Первый — составной вопрос: когда в одном
              вопросе склеены несколько. Второй — вопрос-ловушка: когда вопрос заранее
              предполагает то, чего не было. Разберём оба!

              '
            uk: Тепер наука! Учені описали три основні типи хитрих запитань. Перший
              тип — це те, що ми щойно розібрали.
            en: Now science! Scientists described three main types of tricky questions.
              The first type is what we just analyzed.
        - id: '19'
          type: pause
          duration_sec: 5
          text:
            ru: '...

              '
            uk: 'ТИП 1: СКЛАДЕНА ПАСТКА (Loaded Question)'
            en: 'TYPE 1: LOADED QUESTION (Loaded Question)'
    - scene_id: sc2
      title:
        ru: 'ТЕОРИЯ: СОСТАВНОЙ ВОПРОС — МНОГО ТЕМ В ОДНОМ'
        uk: Складена пастка — це коли в запитанні сховано припущення, яке ви не можете
          оскаржити, не дав відповіді на саме запитання.
        en: A loaded question is when an assumption is hidden in the question that
          you can't challenge without answering the question itself.
      media_ref: 10B.sc2.compound_questions
      status: v3_locked
      steps:
        - id: '20'
          type: speech
          duration_sec: 15
          text:
            ru: 'Начнём с первого типа хитрых вопросов — составного. Это когда в одном
              вопросе спрятано несколько. Как будто кто-то склеил три вопроса скотчем
              и бросил вам в лицо. Попробуй поймай все три!

              '
            uk: 'Приклад: «Коли ти нарешті припинеш ховати гроші у себе в шухляді
              замість того, щоб дати мамі?» Припущення: ти ховаєш гроші.'
            en: 'Example: "When will you finally stop hiding money in your drawer
              instead of giving it to mom?" Assumption: you hide money.'
        - id: '21'
          type: speech
          duration_sec: 15
          text:
            ru: 'Помните вопрос учителя Дмитрику? «Почему ты не сделал домашку, опоздал
              на урок и забыл тетрадь?» Тут ТРИ темы: домашка, опоздание, тетрадь.
              Но спрашивают как один вопрос. С чего начать отвечать? Непонятно!

              '
            uk: 'Відповідь: ти не можеш просто сказати «я не ховаю» — це виглядає
              як ухилення. А якщо сказати що-небудь інше, то звучить, як ніби припущення
              правильне.'
            en: 'Answer: you can''t just say "I''m not hiding it" - that looks like
              dodging. And if you say anything else, it sounds like the assumption
              is true.'
        - id: '22'
          type: speech
          duration_sec: 12
          text:
            ru: 'А хитрость в том, что если ответить только на одно — кажется, что
              с остальным ты согласен. Дмитрик сказал «тетрадь забыл» — и получилось,
              будто он и домашку не сделал, и опоздал. А он не опаздывал!

              '
            uk: 'ТИП 2: ЗАПИТАННЯ З ПРИХОВАНЕ ПРИПУЩЕННЯМ'
            en: 'TYPE 2: QUESTION WITH HIDDEN PRESUPPOSITION'
        - id: '23'
          type: speech
          duration_sec: 12
          text:
            ru: 'Правило простое: один вопрос — одна тема. Если вам задали склеенный
              вопрос — разделите его! Скажите: «Давайте по порядку. Отвечу на каждый
              вопрос отдельно.»

              '
            uk: 'Це коли запитання має припущення, яке не обговорюється. Наприклад:
              «Яку марку шоколаду ти воліш — темний чи молочний?» Припущення: ти їш
              шоколад.'
            en: 'This is when the question has a presupposition that isn''t discussed.
              For example: "What brand of chocolate do you prefer - dark or milk?"
              Presupposition: you eat chocolate.'
        - id: '24'
          type: speech
          duration_sec: 10
          text:
            ru: 'Давайте потренируемся! Я читаю вопрос — а вы определяете: это один
              простой вопрос или составной, который нужно разделить?

              '
            uk: Якщо ти не їш шоколад, то обидва варіанти відповідей невірні. Але
              запитання побудоване так, ніби вибір обов'язковий.
            en: If you don't eat chocolate, both answer options are wrong. But the
              question is built as though a choice is mandatory.
        - id: '25'
          type: vote
          duration_sec: 12
          text:
            ru: '«Какой твой любимый цвет?»

              '
            uk: 'ТИП 3: РОЗДІЛЕНІ ЗАПИТАННЯ'
            en: 'TYPE 3: COMPOUND QUESTIONS'
          options:
            - id: opt_1
              text:
                ru: Простой — одна тема
                uk: 'Це коли кілька запитань поділені в одне, як у випадку з братом:
                  «Чому ти взяв наушники, не запитавши й не сказавши мені?»'
                en: 'This is when several questions are packed into one, like with
                  the brother: "Why did you take my headphones without asking and
                  not telling me?"'
            - id: opt_2
              text:
                ru: Составной — нужно разделить
                uk: Ви не можете відповісти на одне, не дав відповіді на інші. Це
                  створює плутанину й мішень розповідь.
                en: You can't answer one without answering the others. This creates
                  confusion and a muddled answer.
          correct: opt_1
        - id: '26'
          type: speech
          duration_sec: 6
          text:
            ru: 'Простой! Одна тема — любимый цвет. Отвечаем спокойно.

              '
            uk: А тепер ви знаєте всі три типи. Але у вас наверняка є ще дві важливих
              питань.
            en: And now you know all three types. But you probably have two more important
              questions.
        - id: '27'
          type: vote
          duration_sec: 12
          text:
            ru: '«Почему ты не пришёл на тренировку, не позвонил и не предупредил?»

              '
            uk: 'ПИТАННЯ 1: ЯК РОЗПІЗНАТИ?'
            en: 'QUESTION 1: HOW TO SPOT THEM?'
          options:
            - id: opt_1
              text:
                ru: Простой — одна тема
                uk: 'Перший хитрий знак: запитання звучить дивно чи незручно. Ви чуєте,
                  що щось не так, але не розумієте, що саме.'
                en: 'First warning sign: the question sounds odd or uncomfortable.
                  You feel something''s wrong, but you don''t know what.'
            - id: opt_2
              text:
                ru: Составной — нужно разделить
                uk: 'Другий знак: що б ви не відповісти, це лізатиме вас як бути виноватим
                  чи бути побачене гарно. Немаючи хорошого виходу.'
                en: 'Second sign: whatever you answer, it makes you look guilty or
                  bad. There''s no good way out.'
          correct: opt_2
        - id: '28'
          type: speech
          duration_sec: 10
          text:
            ru: 'Составной! Три темы склеены: не пришёл, не позвонил, не предупредил.
              Может, ты не пришёл, но позвонил? Разделяй и отвечай по порядку.

              '
            uk: 'Третій знак: запитання містить кілька частин одразу. Якщо розділити
              його на кілька простих запитань — дистанціюються отримання відповіді.'
            en: 'Third sign: the question has multiple parts at once. If you break
              it into several simple questions - it becomes clear.'
        - id: '29'
          type: vote
          duration_sec: 12
          text:
            ru: '«Ты любишь мороженое?»

              '
            uk: 'Четвертий знак: запитання починається зі слів «ти вже», «ти все ще»,
              «коли ти нарешті». Це ознаки припущення.'
            en: 'Fourth sign: the question starts with words "have you already," "are
              you still," "when will you finally." These signal assumptions.'
          options:
            - id: opt_1
              text:
                ru: Простой — одна тема
                uk: 'ПИТАННЯ 2: ЯК НА НИХ ВІДПОВІСТИ?'
                en: 'QUESTION 2: HOW TO ANSWER THEM?'
            - id: opt_2
              text:
                ru: Составной — нужно разделить
                uk: 'Наука дає відповідь: розбийте запитання на части й обговоріть
                  припущення.'
                en: 'Science offers an answer: break the question into parts and discuss
                  the assumptions.'
          correct: opt_1
        - id: '30'
          type: speech
          duration_sec: 6
          text:
            ru: 'Простой! Один вопрос — про мороженое. Никаких подвохов. Отвечай с
              удовольствием.

              '
            uk: 'Наприклад, на запитання брата: «Чому ти взяв наушники, не запитавши
              й не сказавши мені?» можна відповісти:'
            en: 'For example, to brother''s question: "Why did you take my headphones
              without asking and not telling me?" you can answer:'
        - id: '31'
