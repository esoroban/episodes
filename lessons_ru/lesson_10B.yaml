            en: 'Bad answer: "I had reasons..." (sounds like you''re opening up the
              whole story)'
          options:
            - id: opt_1
              text:
                ru: Настоящий вопрос
                uk: 'Добра відповідь: «Це два окремих питання. По-перше, я вивчив
