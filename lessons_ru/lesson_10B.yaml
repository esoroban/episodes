              '
            uk: 1. Розпізнати обман, навіть коли він спакований в красивої мові
            en: 1. Recognize deception even when it's wrapped in beautiful language
    - scene_id: sc5
      title:
        ru: 'ПРАКТИКА: СОЗДАЁМ ХИТРЫЕ ВОПРОСЫ САМИ'
        uk: 2. Розповісти, навіщо хтось вам задає запитання такого роду
        en: 2. Tell when someone is asking a question like that on purpose
      media_ref: 10B.sc5.create_tricky_questions
