            uk: 3. Відповісти без паніки й без почуття провини
            en: 3. Answer without panic and without feeling guilty
        - id: '93'
          type: speech
          duration_sec: 10
          text:
            ru: 'Я даю ситуацию и подсказку — какой тип вопроса нужно придумать. Вы
