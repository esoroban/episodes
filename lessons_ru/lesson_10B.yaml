              '
            uk: Страшна ланцюг! Кожен кроку менш вірогідний, а выводи завеликі.
            en: Scary chain! Each step is less likely, and the conclusion is too large.
        - id: '101'
          type: speech
          duration_sec: 15
          text:
            ru: 'Моя версия: «Почему нельзя гулять, если я сделал уроки, убрал комнату
