            en: '1. Teacher: "If you don''t do your homework today, you won''t understand
              tomorrow''s lesson, next week you''ll fall behind, and by the end of
              the year you''ll fail."'
        - id: '99'
          type: speech
          duration_sec: 15
          text:
            ru: 'Моя версия: «Кто в здравом уме предпочтёт мёрзнуть зимой?» Внутри:
              «зима хуже» — но подано как очевидный факт. А ведь кто-то обожает снег!

              '
            uk: 'Це: страшна ланцюг / ложний авторитет / ложна дилема / хитре запитання?'
            en: 'This is: scary chain / false authority / false dilemma / tricky question?'
        - id: '100'
          type: discussion
          duration_sec: 30
          text:
            ru: 'Ситуация: родители не пускают гулять. Придумайте составной вопрос
