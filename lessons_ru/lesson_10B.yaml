    - scene_id: sc6
      title:
        ru: 'ПОВТОРЕНИЕ ДНЯ 10: ИЛИ-ИЛИ + ХИТРЫЕ ВОПРОСЫ'
        uk: '3. Мама: «Или ти робиш уроки, або іш гуляти.» (Обидва варіанти передбачають
