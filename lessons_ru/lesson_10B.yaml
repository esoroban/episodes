              отвечаете «да» или «нет». Помните Миколу? «Ты уже перестал списывать?»

              '
            uk: '4. «Обирай: ти розумніший від свого брата чи він розумніший від тебе?»'
            en: '4. "Choose: are you smarter than your brother or is he smarter than
              you?"'
        - id: '44'
          type: speech
          duration_sec: 15
          text:
            ru: 'Вопрос-ловушка работает как мышеловка: приманка — это сам вопрос,
              а капкан — скрытое предположение внутри. Вы хватаете приманку, пытаясь
              ответить — и попадаетесь. Любой ответ подтверждает то, чего не было!

              '
            uk: Це який тип?
            en: 'A trap question works like a mousetrap: the bait is the question
              itself, and the trap is the hidden assumption within. You grab the bait,
              trying to respond - and get caught. Any answer confirms what did not
              happen!'
        - id: '45'
          type: speech
          duration_sec: 12
          text:
            ru: 'Слова-маркеры, которые выдают ловушку: «Ты уже перестал...?», «Почему
