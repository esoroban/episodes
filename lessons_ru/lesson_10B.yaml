              исправляем — потом отвечаем.

              '
            uk: Це змушує людину бути конкретнішою й менше використовувати припущення.
            en: This forces the person to be more specific and use fewer assumptions.
    - scene_id: sc4
      title:
        ru: 'ТЕОРИЯ: ВОПРОС-УТВЕРЖДЕНИЕ (РИТОРИЧЕСКИЙ ВОПРОС)'
        uk: 'СТРАТЕГІЯ 2: Оспорте припущення'
        en: 'STRATEGY 2: Challenge the assumption'
      media_ref: 10B.sc4.rhetorical_question
      status: v3_locked
      steps:
        - id: '65'
          type: speech
          duration_sec: 12
          text:
            ru: 'Составной вопрос — разобрали. Вопрос-ловушку — тоже. Но есть третий
              трюк. Иногда вопрос — это вообще не вопрос. Это утверждение в маскировке.

              '
            uk: Прямо скажіть, що запитання припускає щось, що не тільки істинно.
            en: Directly state that the question assumes something that isn't necessarily
              true.
        - id: '66'
          type: speech
          duration_sec: 15
          text:
            ru: 'Кто-то говорит: «Разве не понятно, что кошки лучше собак?» Звучит
              как вопрос. Но уберите «разве не понятно» — что останется? «Кошки лучше
              собак.» Это просто мнение!

              '
            uk: 'На запитання: «Як ти можеш бути такий ненажерний?» можна сказати:
              «Твоє запитання припускає, що я ненажерний. Я не погоджуюся з цим припущенням.»'
            en: 'To the question: "How can you be so ungrateful?" you can say: "Your
              question assumes I''m ungrateful. I don''t agree with that assumption."'
        - id: '67'
          type: speech
          duration_sec: 15
          text:
            ru: 'Это называется риторический вопрос. Слово «риторика» — из Древней
              Греции. Это было искусство убеждать словами. Ораторы специально учились
              задавать вопросы, на которые не нужен ответ.

              '
            uk: 'СТРАТЕГІЯ 3: Попросіть уточнення'
            en: 'This is called a rhetorical question. The word “rhetoric” comes from
              Ancient Greece. It was the art of convincing with words. Speakers were
              specially trained to ask questions that did not require an answer.'
        - id: '68'
          type: speech
          duration_sec: 12
          text:
            ru: 'Приём работает две с половиной тысячи лет! Ещё древнегреческие политики
              использовали его в спорах: задаёшь вопрос — а на самом деле проталкиваешь
              своё мнение. Хитро, правда?

              '
            uk: Коли запитання розпливчасте чи має кілька частин — попросіть уточнити.
            en: When the question is vague or has multiple parts - ask for clarification.
        - id: '69'
          type: speech
          duration_sec: 12
          text:
            ru: 'Другое название — вопрос-утверждение. Человек не хочет ответа — он
              хочет, чтобы вы согласились. Вопрос — просто красивая упаковка для мнения.

              '
            uk: 'На запитання: «Чому ти не підтримуєш мене й дружиш з ними?» можна
              сказати: «Твоє запитання містить кілька частин. По-перше: що означає
              ''не підтримуєш''? По-друге: я можу дружити з іншими й все одно підтримувати
              тебе.»'
            en: 'To the question: "Why don''t you support me and hang out with them?"
              you can say: "Your question has multiple parts. First: what does ''don''t
              support'' mean? Second: I can be friends with others and still support
              you."'
        - id: '70'
          type: speech
          duration_sec: 15
          text:
            ru: 'Слова-маркеры: «Разве не...», «Неужели ты думаешь, что...», «Кто
              в здравом уме...», «Как можно не понимать, что...» Услышали такое —
              насторожитесь!

              '
            uk: 'СТРАТЕГІЯ 4: Розбийте запитання'
            en: 'Marker words: “Isn’t it...”, “Do you really think that...”, “Who
              is in their right mind...”, “How can you not understand that...” If
              you hear this, be on your guard!'
        - id: '71'
          type: speech
          duration_sec: 8
          text:
            ru: 'Практика! Это настоящий вопрос — или утверждение в маскировке?

              '
            uk: Якщо запитання складене (містить кілька запитань), розбийте його й
              відповідайте на кожне окремо.
            en: If the question is compound (has multiple questions), break it down
              and answer each separately.
        - id: '72'
          type: vote
          duration_sec: 10
          text:
            ru: '«Неужели ты думаешь, что это честно?»

              '
            uk: 'На запитання: «Чому ти не хочеш їздити до теточки й береш з собою
              свій ноутбук?» можна сказати: «Це два запитання. По-перше, про причину,
              чому я можливо не хочу їздити. По-друге, про те, що я беру з собою.
              Давай їх розділимо.»'
            en: 'To the question: "Why don''t you want to visit your aunt and bring
              your laptop?" you can say: "That''s two questions. First, about why
              I might not want to visit. Second, about what I bring. Let''s separate
              them."'
          options:
            - id: opt_1
              text:
                ru: Настоящий вопрос
                uk: 'СТРАТЕГІЯ 5: Пропозиція альтернативи'
                en: 'STRATEGY 5: Offer an alternative'
            - id: opt_2
              text:
                ru: Утверждение в маскировке
                uk: Якщо запитання побудоване на припущенні, що у вас є тільки два
                  варіанти вибору, запропонуйте третій.
                en: If the question assumes you only have two choices, offer a third.
          correct: opt_2
        - id: '73'
          type: speech
          duration_sec: 10
          text:
            ru: 'Утверждение! Уберите обёртку — останется «это нечестно». Человек
              не спрашивает ваше мнение — он уже всё решил за вас.

              '
            uk: 'На запитання: «Ти з нами або проти нас?» можна сказати: «Я можу бути
              з вами в деяких питаннях й не погоджуватися в інших.»'
            en: 'To the question: "Are you with us or against us?" you can say: "I
              can be with you on some issues and disagree on others."'
        - id: '74'
          type: vote
          duration_sec: 10
          text:
            ru: '«Ты думаешь, что это честно?»

              '
            uk: 'МИНИСЦЕНКА: ХИТРІ ЗАПИТАННЯ В ДІАЛОЗІ'
            en: 'MINI-SCENE: TRICKY QUESTIONS IN DIALOGUE'
          options:
            - id: opt_1
              text:
                ru: Настоящий вопрос
                uk: Давайте побачимо, як це працює в реальній розмові. Дмитрик повертається
                  до школи й зустрічає трьох однокласників.
                en: Let's see how this works in a real conversation. Dmytryk comes
                  home and meets three classmates.
            - id: opt_2
              text:
                ru: Утверждение в маскировке
                uk: 'СЦЕНКА 1: Складена пастка'
                en: 'SCENE 1: Loaded Question'
          correct: opt_1
        - id: '75'
          type: speech
          duration_sec: 12
          text:
            ru: 'Настоящий вопрос! Без «неужели» — просто интересуется вашим мнением.
              Одно маленькое слово — и вопрос превращается в давление. Магия!

              '
            uk: 'Петя: «Чому ти не приходив на матч вчора й замість того люрчив музику?»'
            en: 'Petya: "Why didn''t you come to the match yesterday and listen to
              music instead?"'
        - id: '76'
          type: vote
          duration_sec: 10
          text:
            ru: '«Разве не очевидно, что надо делать домашку?»

              '
            uk: 'Погана відповідь: «Я не люрчив музику!» (звучить, як ухилення)'
            en: 'Bad answer: "I wasn''t listening to music!" (sounds like dodging)'
          options:
            - id: opt_1
              text:
                ru: Настоящий вопрос
                uk: 'Добра відповідь: «Твоє запитання припускає дві речи. По-перше,
                  що я не приходив. По-друге, що я люрчив музику. Зупинись — я не
                  приходив, тому що était займався домашкою, а не люрчив музику.»'
                en: 'Good answer: "Your question assumes two things. First, that I
                  didn''t come. Second, that I listened to music. Wait - I didn''t
                  come because I was doing homework, not listening to music."'
            - id: opt_2
              text:
                ru: Утверждение в маскировке
                uk: 'СЦЕНКА 2: Припущення'
                en: 'SCENE 2: Presupposition'
          correct: opt_2
        - id: '77'
          type: speech
          duration_sec: 12
          text:
            ru: 'Утверждение! «Надо делать домашку» — может, и полезный совет. Но
              «разве не очевидно» давит: не смей даже думать иначе!

              '
            uk: 'Маша: «Коли ти перестанеш проводити весь час з грою й почнеш робити
              щось корисне?»'
            en: 'Masha: "When will you stop spending all your time gaming and start
              doing something useful?"'
        - id: '78'
          type: vote
          duration_sec: 10
          text:
            ru: '«Кто вообще любит брокколи?»

              '
            uk: 'Погана відповідь: «Я не проводжу весь час в грі!» (звучить обороною)'
            en: 'Bad answer: "I don''t spend all my time gaming!" (sounds defensive)'
          options:
            - id: opt_1
              text:
                ru: Настоящий вопрос
                uk: 'Добра відповідь: «Твоє запитання припускає, що я проводжу весь
                  час в грі. Це неправда. А як ти вважаєш, скільки часу я проводжу
                  в грі? Можемо обговорити факти замість припущень.»'
                en: 'Good answer: "Your question assumes I spend all my time gaming.
                  That''s not true. By the way, how much time do you think I spend
                  gaming? We can discuss the facts instead of assumptions."'
            - id: opt_2
              text:
                ru: Утверждение в маскировке
                uk: 'СЦЕНКА 3: Складена'
                en: 'SCENE 3: Compound'
          correct: opt_2
        - id: '79'
          type: speech
          duration_sec: 12
          text:
            ru: 'Утверждение! Внутри спрятано: «никто не любит брокколи». А брокколи-то
              ни в чём не виновата! Может, кто-то в классе её обожает.

              '
            uk: 'Сашко: «Чому ти не вивчив матеріал до контрольної й не прийшов в
              час на уроки?»'
            en: 'Sashko: "Why didn''t you study for the test and come to class on
              time?"'
        - id: '80'
          type: vote
          duration_sec: 10
          text:
            ru: '«Какой у тебя любимый овощ?»

              '
            uk: 'Погана відповідь: «Я мав причини...» (звучить, як розкриття всієї
