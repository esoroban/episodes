            en: 'Each question contains one deception. Your job - identify what it
              is: scary chain, false authority, false dilemma, or tricky question?'
        - id: '98'
          type: discussion
          duration_sec: 30
          text:
            ru: 'Ситуация: вы хотите доказать, что лето лучше зимы. Придумайте риторический
