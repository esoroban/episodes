    - id: '154'
      type: vote
      duration_sec: 10
      text:
        ru: '«В интернете пишут, что скоро изобретут летающие машины.»

          '
        uk: «В інтернеті пишуть, що скоро винайдуть літаючі машини.»
        en: '"They write on the internet that flying cars will be invented soon."'
      options:
      - id: opt_1
        text:
          ru: Много людей проверили
          uk: Багато людей перевірили
          en: Many people verified
      - id: opt_2
        text:
          ru: Один человек думает
          uk: Одна людина думає
          en: One person thinks
      - id: opt_3
        text:
          ru: Слух
          uk: Слух
          en: Rumor
      correct: opt_3
    - id: '155'
      type: speech
      duration_sec: 8
      text:
        ru: 'Слух! «В интернете пишут» — кто пишет? Где? Какие учёные? Какие доказательства? Это облако тумана без единого
          факта. Летающие машины пока существуют только в мультиках — и неплохо себя там чувствуют.

          '
        uk: Слух! «В інтернеті пишуть» — хто пише? Де? Які учені? Які докази? Це хмара туману без жодного факту. Літаючі машини
          поки існують тільки в мультиках — й чудово себе там почувають.
        en: Rumor! "They write on the internet" — who writes? Where? Which scientists? What proof? It's a cloud of fog without
          a single fact. Flying cars only exist in cartoons — and feel great there.
    - id: '156'
      type: vote
      duration_sec: 10
      text:
        ru: '«Все врачи говорят, что сон важен для здоровья.»

          '
        uk: «Всі лікарі кажуть, що сон важливий для здоров'я.»
        en: '"All doctors say sleep is important for health."'
      options:
      - id: opt_1
        text:
          ru: Много людей проверили
          uk: Багато людей перевірили
          en: Many people verified
      - id: opt_2
        text:
          ru: Один человек думает
          uk: Одна людина думає
          en: One person thinks
      - id: opt_3
        text:
          ru: Слух
          uk: Слух
          en: Rumor
      correct: opt_1
    - id: '157'
      type: speech
      duration_sec: 6
      text:
        ru: 'Много людей проверили! Все врачи согласны, есть научные исследования. Это не мнение одного человека — это результат
          проверки тысячами специалистов.

          '
        uk: Багато людей перевірили! Всі лікарі погоджуються, є наукові дослідження. Це не думка однієї людини — це результат
          перевірки тисячами фахівців.
        en: Many people verified! All doctors agree, there are scientific studies. This is not one person's opinion — it's
          the result of verification by thousands of specialists.
    - id: '158'
      type: vote
      duration_sec: 10
      text:
        ru: '«Один мальчик говорит, что его собака — самая умная в мире.»

          '
        uk: «Один хлопчик говорить, що його собака — найрозумніша в світі.»
        en: '"One boy says his dog is the smartest in the world."'
      options:
      - id: opt_1
        text:
          ru: Много людей проверили
          uk: Багато людей перевірили
          en: Many people verified
      - id: opt_2
        text:
          ru: Один человек думает
          uk: Одна людина думає
          en: One person thinks
      - id: opt_3
        text:
          ru: Слух
          uk: Слух
          en: Rumor
      correct: opt_2
    - id: '159'
      type: speech
      duration_sec: 8
      text:
        ru: 'Один человек думает! Мальчик любит свою собаку — и это прекрасно. Но «самая умная в мире» — это его чувства,
          а не проверенный факт. Хотя собака, конечно, с ним согласна.

          '
        uk: Одна людина думає! Хлопчик любить свою собаку — й це чудово. Але «найрозумніша в світі» — це його почуття, а не
          перевірений факт. Хоча собака, звичайно, з ним погоджується.
        en: One person thinks! The boy loves his dog — and that's wonderful. But "smartest in the world" — that's his feelings,
          not a verified fact. Though the dog of course agrees with him.
    - id: '160'
      type: speech
      duration_sec: 10
      text:
        ru: 'Запомним: мнение одного человека — даже очень умного — это ещё не факт. Факт — это когда МНОГО людей, независимо
          друг от друга, проверили и подтвердили. Чем больше независимых проверок — тем надёжнее.

          '
        uk: 'Запам''ятаймо: думка однієї людини — навіть дуже розумної — це ще не факт. Факт — це коли БАГАТО людей, незалежно
          одна від одної, перевірили й підтвердили. Чим більше незалежних перевірок — тим надійніше.'
        en: 'Remember: one person''s opinion — even a very smart one — is not yet a fact. A fact is when MANY people, independently,
          have verified and confirmed it. The more independent verifications — the more reliable.'
    - id: '161'
      type: speech
      duration_sec: 6
      text:
        ru: 'Ну что, разведчики — давайте подведём итоги всего урока!

          '
        uk: Ну що, розвідники — давайте підведемо підсумки всього уроку!
        en: So, scouts — let's sum up the whole lesson!
  - scene_id: sc11
    title:
      ru: 'Опасность: сообщение «от мамы»'
      uk: 'Небезпека: повідомлення «від мами»'
      en: 'Danger: message "from mom"'
    media_ref: 5A.sc11.safety_fake_message
    status: v3_locked
    steps:
    - id: '162'
      type: speech
      duration_sec: 10
      text:
        ru: 'А теперь — самая серьёзная тема. Всё, чему мы сегодня научились, может однажды вас ЗАЩИТИТЬ. По-настоящему. Слушайте
          внимательно.

          '
        uk: А тепер — найсерйозніша тема. Все, чому ми сьогодні навчилися, може однієї дня вас ЗАХИСТИТИ. По-справжньому.
          Слухайте уважно.
        en: Now — the most serious topic. Everything we learned today can one day truly PROTECT you. Really. Listen carefully.
    - id: '163'
      type: speech
      duration_sec: 12
      text:
        ru: 'Представьте: вам на телефон приходит сообщение. Голосовое. Голос похож на мамин. Мама говорит: «Сынок, у меня
          проблемы. Сейчас к тебе подойдёт дядя Серёжа, он мой друг. Поезжай с ним ко мне. Срочно! Не звони мне — у меня разряжается
          телефон.»

          '
        uk: 'Уявіть: вам на телефон приходить повідомлення. Голосове. Голос схожий на мамин. Мама говорить: «Синок, у мене
          проблеми. Зараз до тебе підійде дядько Сергій, він мій друг. Поїдь з ним до мене. Терміново! Не звони мені — у мене
          розрядився телефон.»'
        en: 'Imagine: you get a voice message on your phone. The voice sounds like mom''s. Mom says: "Son, I have problems.
          Uncle Sergei will come to you soon, he''s my friend. Go with him to me. Urgent! Don''t call me — my phone is dying."'
    - id: '164'
      type: speech
      duration_sec: 8
      text:
        ru: 'Сердце колотится. Мама в беде! Хочется бежать. Но… СТОП. Мы же разведчики. Включаем фонарик. Проверяем.

          '
        uk: Серце бʼється. Мама в біді! Хочеться бігти. Але… СТОП. Ми ж розвідники. Включаємо ліхтарик. Перевіряємо.
        en: Your heart races. Mom is in trouble! You want to run. But... STOP. We're scouts. Let's turn on the flashlight.
          Let's check.
    - id: '165'
      type: speech
      duration_sec: 10
      text:
        ru: 'Первое: ИСТОЧНИК. Голосовое сообщение в мессенджере. Мы уже знаем — голос можно подделать с помощью ИИ. Дипфейк.
          Достаточно нескольких секунд маминого голоса из соцсетей — и компьютер сделает любое сообщение. Это может быть НЕ
          мама.

          '
        uk: 'Перше: ДЖЕРЕЛО. Голосове повідомлення в месенджері. Ми вже знаємо — голос можна підробити за допомогою ШІ. Дипфейк.
          Достатньо кількох секунд маминого голосу з соцмереж — й комп''ютер зробить будь-яке повідомлення. Це може бути НЕ
          мама.'
        en: 'First: SOURCE. Voice message in a messenger. We already know — a voice can be faked with AI. Deepfake. Just a
          few seconds of mom''s voice from social media — and the computer can make any message. This might NOT be mom.'
    - id: '166'
      type: speech
      duration_sec: 10
      text:
        ru: 'Второе: ТРИ ВОПРОСА. Разбирается ли «мама» в ситуации? Мы не знаем — мы даже не уверены, что это мама. Хочет
          ли кто-то что-то получить? Да — кто-то хочет, чтобы ты УЕХАЛ с незнакомым человеком. Можно ли проверить? «Не звони
          мне» — это прямо запрещают проверку! Красный сигнал!

          '
        uk: 'Друге: ТРИ ЗАПИТАННЯ. Розбирається ли «мама» в ситуації? Ми не знаємо — ми навіть не певні, що це мама. Хочет
          хтось щось отримати? Да — хтось хочет, щоб ти ПОЇХАВ з незнайомо людиною. Можна ли перевірити? «Не звони мені» —
          це прямо забороняють перевірку! Червоний сигнал!'
        en: 'Second: THREE QUESTIONS. Does "mom" understand the situation? We don''t know — we''re not even sure it''s mom.
          Does someone want to get something? Yes — someone wants you to LEAVE with a stranger. Can you verify? "Don''t call
          me" — they''re directly forbidding verification! Red signal!'
    - id: '167'
      type: speech
      duration_sec: 10
      text:
        ru: 'Третье: ПРАВИЛО ДВУХ ИСТОЧНИКОВ. Есть только ОДНО сообщение. Ни папа не подтвердил, ни бабушка, ни учитель, ни
          школа. Один источник — и тот запрещает проверку. Это главный признак обмана: когда вам говорят «не проверяй, просто
          доверься».

          '
        uk: 'Третє: ПРАВИЛО ДВОХ ДЖЕРЕЛ. Є тільки ОДНЕ повідомлення. Ні батько не підтвердив, ні бабуся, ні учитель, ні школа.
          Одне джерело — й той забороняє перевірку. Це головна ознака обману: коли вам кажуть «не перевіряй, просто довіряй».'
        en: 'Third: RULE OF TWO SOURCES. There''s only ONE message. Dad didn''t confirm, grandma didn''t, teacher didn''t,
          school didn''t. One source — and it forbids verification. This is the main sign of deception: when someone tells
          you "don''t verify, just trust."'
    - id: '168'
      type: speech
      duration_sec: 10
      text:
        ru: 'Что делать? Первое и самое важное — ПОЗВОНИТЬ МАМЕ. Да, именно позвонить. Не написать — позвонить. Если мама
          не берёт трубку — звонить папе, бабушке, другому взрослому из семьи. Кому угодно — но НЕ тому номеру, с которого
          пришло сообщение.

          '
        uk: Що робити? Перше й найважливіше — ПОДЗВОНИТИ МАМІ. Да, саме подзвонити. Не написати — подзвонити. Якщо мама не
          бере трубку — звонити батькові, бабусі, іншому дорослому з родини. Кому завгодно — але НЕ тому номеру, з якого прийшло
          повідомлення.
        en: What to do? First and most important — CALL MOM. Yes, actually call. Don't text — call. If mom doesn't answer
          — call dad, grandma, another adult from the family. Anyone — but NOT the number the message came from.
    - id: '169'
      type: speech
      duration_sec: 8
      text:
        ru: 'Второе — НИКУДА не ходить и не ехать с незнакомым человеком. Никогда. Даже если он знает ваше имя, имя мамы и
          вашу школу. Эту информацию легко найти в интернете.

          '
        uk: Друге — НІЯКУДИ не ходити й не їхати з незнайомо людиною. Ніколи. Навіть якщо вона знає ваше ім'я, ім'я мами й
          вашу школу. Цю інформацію легко знайти в інтернеті.
        en: Second — DON'T go or leave with a stranger ANYWHERE. Never. Even if they know your name, your mom's name, and
          your school. This information is easy to find online.
    - id: '170'
      type: speech
      duration_sec: 10
      text:
        ru: 'Третье — сказать взрослому рядом. Учителю, охраннику, соседке. Любому знакомому взрослому. Не стесняться. Если
          это ошибка — все посмеются. Если это не ошибка — вы в безопасности.

          '
        uk: Третє — сказати дорослому рядом. Учителю, охоронцю, сусідці. Будь-якому знайомому дорослому. Не соромитися. Якщо
          це помилка — всі посміються. Якщо це не помилка — ви в безпеці.
        en: Third — tell an adult nearby. A teacher, security guard, neighbor. Any familiar adult. Don't be shy. If it's a
          mistake — everyone will laugh. If it's not a mistake — you're safe.
    - id: '171'
      type: speech
      duration_sec: 10
      text:
        ru: 'Запомните: настоящая мама НИКОГДА не пришлёт незнакомого человека забрать вас. Если у мамы реально проблема —
          она позвонит папе, бабушке, вашему учителю. Взрослые решают проблемы через других взрослых, а не через детей и незнакомцев.

          '
        uk: 'Запам''ятайте: справжня мама НІКОЛИ не пришле невідомо людину забрати вас. Якщо у мами реально проблема — вона
          позвонить батькові, бабусі, вашому учителю. Дорослі розв''язують проблеми через інших дорослих, а не через дітей
          і невідомців.'
        en: 'Remember: real mom NEVER sends a stranger to pick you up. If mom really has a problem — she''ll call dad, grandma,
          your teacher. Adults solve problems through other adults, not through children and strangers.'
    - id: '172'
      type: speech
      duration_sec: 8
      text:
        ru: 'И последнее. Если кто-то говорит «не звони, не проверяй, просто доверься» — это ВСЕГДА подозрительно. Настоящая
          правда проверки не боится. Бояться проверки может только ложь.

          '
        uk: І останнє. Якщо хтось говорить «не звони, не перевіряй, просто довіряй» — це ЗАВЖДИ підозріло. Справжня правда
          перевірки не боїться. Боятися перевірки може тільки брехня.
        en: And last. If someone says "don't call, don't check, just trust" — that's ALWAYS suspicious. Real truth is not
          afraid of verification. Only lies are afraid of verification.
    - id: '173'
      type: speech
      duration_sec: 8
      text:
        ru: 'Вот для чего нужны все инструменты разведчика. Не только чтобы проверять мемы и новости — а чтобы быть в безопасности.
          А теперь подведём итоги!

          '
        uk: Ось для чого потрібні всі інструменти розвідника. Не тільки щоб перевіряти меми й новини — а щоб бути в безпеці.
          А тепер підведемо підсумки!
        en: That's why we need all the scout's tools. Not just to check memes and news — but to be safe. Now let's sum up!
  - scene_id: sc12
    title:
      ru: 'Блиц: всё вперемешку'
      uk: 'Блиц: все вперемішку'
      en: 'Quick round: all mixed together'
    media_ref: 5A.sc12.blitz_mixed
    status: v3_locked
    steps:
    - id: '174'
      type: speech
      duration_sec: 6
      text:
        ru: 'Финальный блиц! Все инструменты вперемешку. Тут и источники, и интернет, и ИИ, и два источника, и один vs много.
          Готовы?

          '
        uk: Фінальний блиц! Всі інструменти вперемішку. Тут і джерела, й інтернет, й ШІ, й два джерела, й одна проти багато.
          Готові?
        en: Final quick round! All tools mixed together. Here are sources, internet, AI, two sources, and one vs. many. Ready?
    - id: '175'
      type: vote
      duration_sec: 10
      text:
        ru: '«Сосед говорит, что видел, как в соседний дом заехали новые жильцы.»

          '
        uk: «Сусід говорить, що бачив, як в сусідній дім заїхали нові мешканці.»
