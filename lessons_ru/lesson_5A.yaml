        uk: 'Четверте запитання: а КОЛИ це було написано? Дивимось на дату оригінального поста…'
        en: 'Fourth question: WHEN was this written? Check the date of the original post...'
    - id: '139'
      type: vote
      duration_sec: 10
      text:
        ru: 'Дата оригинального поста — ПЯТЬ лет назад. Котёнку на фото было 2 месяца. Сейчас ему сколько?

          '
        uk: Дата оригінального поста — П'ЯТЬ років тому. Котенятку на фото було 2 місяці. Зараз йому скільки?
        en: Original post date — FIVE years ago. The kitten in the photo was 2 months old. How old is it now?
      options:
      - id: opt_1
        text:
          ru: Всё ещё маленький котёнок
          uk: Все ще маленьке котенятко
          en: Still a small kitten
      - id: opt_2
        text:
          ru: Уже взрослый пятилетний кот
          uk: Уже дорослий п'ятирічний кіт
          en: Already a five-year-old adult cat
      correct: opt_2
    - id: '140'
