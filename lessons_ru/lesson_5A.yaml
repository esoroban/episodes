  - scene_id: sc9
    title:
      ru: 'Кейс: пропавший котёнок'
      uk: 'Кейс: зниклий котенятко'
      en: 'Case: missing kitten'
    media_ref: 5A.sc9.case_kitten
    status: v3_locked
    steps:
    - id: '128'
      type: speech
      duration_sec: 12
      text:
        ru: 'Итак, ваш друг скидывает вам пост: «ПОМОГИТЕ! Пропал котёнок! Маленький, рыжий, глазки грустные!» Фотография
          — милейший пушистый комочек. Сердце сжимается. Хочется сразу бежать искать. Но… мы же разведчики. Включаем фонарик!

          '
        uk: 'Отже, ваш друг скидає вам пост: «ДОПОМОЖІТЬ! Зниклий котенятко! Маленький, рудий, грусні очечка!» Фотографія
          — найміліший пухнастий комочок. Серце стискується. Хочеться одразу бігти шукати. Але… ми ж розвідники. Включаємо
          ліхтарик!'
        en: 'So, your friend sends you a post: "HELP! Missing kitten! Small, orange, sad eyes!" Photo — the cutest fluffy
          ball. Your heart sinks. You want to rush out and search. But... we''re scouts. Let''s turn on the flashlight!'
    - id: '129'
      type: speech
      duration_sec: 6
      text:
        ru: 'Первый вопрос разведчика: ОТКУДА ЭТО? Кто источник?

          '
        uk: 'Перше запитання розвідника: ЗВІДКИ ЦЕ? Хто джерело?'
        en: 'Scout''s first question: WHERE IS THIS FROM? Who''s the source?'
    - id: '130'
      type: vote
      duration_sec: 10
      text:
        ru: 'Друг скинул пост, который ему переслал другой друг, которому переслал кто-то неизвестный. Какой это источник?

          '
        uk: Друг скинув пост, якому переслав інший друг, якому переслав хтось невідомий. Це яке джерело?
        en: Friend sent the post he got from another friend who got it from someone unknown. What kind of source is this?
      options:
      - id: opt_1
        text:
          ru: Своими глазами
          uk: Своїми очима
          en: Own eyes
      - id: opt_2
        text:
          ru: Услышал от других
          uk: Чула від інших
          en: Heard from others
      correct: opt_2
    - id: '131'
      type: speech
      duration_sec: 8
      text:
        ru: 'Услышал от других! Цепочка пересылок. Друг не видел котёнка. Друг друга тоже. Автор оригинального поста — неизвестен.
          Уже подозрительно.

          '
        uk: Чула від інших! Ланцюг пересилань. Друг не бачив котенятка. Друг друга теж. Автор оригінального поста — невідомий.
          Вже підозріло.
        en: Heard from others! Chain of forwards. Friend didn't see the kitten. His friend didn't either. Author of original
          post — unknown. Already suspicious.
    - id: '132'
      type: speech
      duration_sec: 6
      text:
        ru: 'Второй вопрос: проверим ТРИ КЛЮЧА. Разбирается? Хочет получить? Можно проверить?

