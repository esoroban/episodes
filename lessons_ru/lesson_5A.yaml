    - id: '143'
      type: speech
      duration_sec: 8
      text:
        ru: 'Только один источник! Один пост, который копируют и пересылают. Никакого подтверждения. Если бы котёнок реально
          пропал — хозяин бы оставил контакты, приют бы помогал, и уж точно не пять лет подряд.

          '
        uk: Тільки одне джерело! Один пост, якого копіюють і переслають. Жодного підтвердження. Якби котенятко реально зникло
          — господар залишив би контакти, притулок допомагав би, й уж точно не п'ять років поспіль.
        en: Only one source! One post that people copy and forward. No confirmation. If a kitten had really gone missing —
          the owner would have left contacts, a shelter would help, and definitely not for five years in a row.
    - id: '144'
      type: speech
      duration_sec: 12
      text:
        ru: 'Вот так работает полная проверка разведчика! Мы использовали ВСЕ инструменты: определили тип источника, задали
          три вопроса, проверили уровень интернета, посмотрели дату, применили правило двух источников. И раскрыли дело! Котёнок
          давно вырос и прекрасно себя чувствует. А пост — просто старый слух, который путешествует по чатам, как вечный турист.

          '
        uk: 'Ось так працює повна перевірка розвідника! Ми використали УСІ інструменти: визначили тип джерела, задали три
          запитання, перевірили рівень інтернету, подивилися дату, застосували правило двох джерел. І розкрили справу! Котенятко
          давно виросло й чудово себе почуває. А пост — просто старий слух, якій подорожує по чатах, як вічний турист.'
        en: 'That''s how a scout does a complete check! We used ALL the tools: identified source type, asked three questions,
          checked internet level, looked at the date, applied the rule of two sources. And solved the case! The kitten has
          long grown up and feels wonderful. And the post is just an old rumor traveling through chats like an eternal tourist.'
  - scene_id: sc10
    title:
      ru: Один человек vs много проверили
      uk: Одна людина проти багато перевірили
      en: One person vs. many verified
    media_ref: 5A.sc10.one_vs_many
    status: v3_locked
    steps:
    - id: '145'
      type: speech
      duration_sec: 10
      text:
        ru: 'Мы научились проверять источники, отличать уровни интернета, распознавать ИИ-подделки и применять правило двух
          источников. Есть ещё одна важная идея!

          '
        uk: Ми навчилися перевіряти джерела, розрізняти рівні інтернету, розпізнавати ШІ-підробки й застосовувати правило
          двох джерел. Є ще одна важлива ідея!
        en: We learned to verify sources, tell apart internet levels, recognize AI fakes, and apply the rule of two sources.
          There's one more important idea!
    - id: '146'
      type: speech
      duration_sec: 10
      text:
        ru: 'ОДИН ЧЕЛОВЕК ДУМАЕТ — это когда кто-то говорит своё мнение. «Я считаю, что пицца вкуснее бургера.» Это его право,
          но это не факт. Это вкус одного человека.

          '
        uk: ОДНА ЛЮДИНА ДУМАЄ — це коли хтось говорить свою думку. «Я вважаю, що піца смачніша за бургер.» Це його право,
          але це не факт. Це смак однієї людини.
        en: ONE PERSON THINKS — that's when someone shares their opinion. "I think pizza is tastier than a burger." That's
          their right, but it's not a fact. It's one person's taste.
    - id: '147'
      type: speech
      duration_sec: 10
      text:
        ru: 'МНОГО ЛЮДЕЙ ПРОВЕРИЛИ — это когда информацию подтвердили многие, независимо друг от друга. «Все, кто пробовал,
          говорят — суп солёный.» Если десять человек говорят «солёный» — скорее всего, суп реально солёный.

          '
        uk: БАГАТО ЛЮДЕЙ ПЕРЕВІРИЛИ — це коли інформацію підтвердили багато, незалежно одна від одної. «Всі, хто пробував,
          кажуть — суп солоний.» Якщо десять людей кажуть «солоний» — скоріше за все, суп реально солоний.
        en: MANY PEOPLE VERIFIED — that's when many people confirmed information independently. "Everyone who tried it says
          — the soup is salty." If ten people say "salty" — chances are the soup is really salty.
    - id: '148'
      type: speech
      duration_sec: 10
      text:
        ru: 'Даже умный человек может ошибиться! Один повар говорит: «Мой суп идеальный.» Это его мнение. А если сто человек
          попробовали и говорят «пересолено» — это уже не мнение, а коллективная проверка. Сто языков не обманешь.

          '
        uk: 'Навіть розумна людина може помилитися! Один кухар говорить: «Мій суп ідеальний.» Це його думка. А якщо сто людей
          спробували й кажуть «пересолено» — це вже не думка, а колективна перевірка. Сто язиків не обманеш.'
        en: 'Even a smart person can be wrong! One chef says: "My soup is perfect." That''s his opinion. But if a hundred
          people tried it and say "too salty" — that''s not an opinion, it''s a collective check. You can''t fool a hundred
          taste buds.'
    - id: '149'
