        uk: Одне джерело! Три людини — але всі пересказують ОДИН І ТОЙ ЖЕ чат. Це не три джерела — це одне повідомлення, яке
          тричі пересказали. Кількість пересказувачів не дорівнює кількості джерел!
        en: One source! Three people — but all retelling the SAME chat. That's not three sources — that's one message retold
