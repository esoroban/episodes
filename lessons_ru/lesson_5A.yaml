lesson:
  id: lesson_5A
  day: 5
  slot: A
  title:
    ru: Откуда ты это знаешь?
    uk: Звідки ти це знаєш?
    en: How do you know that?
  scenes:
  - scene_id: sc1
    title:
      ru: Разминка
      uk: Розминка
      en: Warm-up
    media_ref: 5A.sc1.warmup_persuasion
    status: v3_locked
    steps:
    - id: '1'
      type: speech
      duration_sec: 10
      text:
        ru: 'Привет, разведчики! Перед новой темой — быстрая разминка. Вспомним три способа убеждения! Какие?

          '
        uk: Привіт, розвідники! Перед новою темою — швидка розминка. Згадаємо три способи переконання! Які?
        en: Hi, scouts! Before the new topic — quick warm-up. Let's remember three methods of persuasion! Which ones?
    - id: '2'
      type: pause
      duration_sec: 5
      text:
        ru: 'Подумайте…

          '
        uk: Подумайте…
        en: Think...
    - id: '3'
      type: speech
      duration_sec: 8
      text:
        ru: 'Доверие, чувства, доказательства! Три ножки табуретки. Проверим, не забыли ли вы.

          '
        uk: Довіра, почуття, докази! Три ніжки табуретки. Перевіримо, не забули ви.
        en: Trust, feelings, facts! Three legs of a stool. Let's check if you remember.
    - id: '4'
      type: speech
      duration_sec: 6
      text:
        ru: 'Какой способ убеждения используется?

          '
        uk: Який спосіб переконання використовується?
        en: Which method of persuasion is used?
    - id: '5'
      type: vote
      duration_sec: 10
      text:
        ru: '«Я твой старший брат, послушай меня!»

          '
        uk: «Я твій старший брат, послухай мене!»
        en: '"I''m your older brother, listen to me!"'
      options:
      - id: opt_1
        text:
          ru: Доверие
          uk: Довіра
          en: Trust
      - id: opt_2
        text:
          ru: Чувства
          uk: Почуття
          en: Feelings
      - id: opt_3
        text:
          ru: Доказательства
          uk: Докази
          en: Facts
      correct: opt_1
    - id: '6'
      type: speech
      duration_sec: 6
      text:
        ru: 'Доверие! Старший брат давит авторитетом. «Я старше — значит знаю лучше.»

          '
        uk: Довіра! Старший брат натискає авторитетом. «Я старший — значить знаю краще.»
        en: Trust! The older brother uses authority. "I'm older — so I know better."
    - id: '7'
      type: vote
      duration_sec: 10
      text:
        ru: '«Тебе будет так весело, ты не пожалеешь!»

          '
        uk: «Тобі буде так весело, ти не пошкодуватимеш!»
        en: '"You''ll have so much fun, you won''t regret it!"'
      options:
      - id: opt_1
        text:
          ru: Доверие
          uk: Довіра
          en: Trust
      - id: opt_2
        text:
          ru: Чувства
          uk: Почуття
          en: Feelings
      - id: opt_3
        text:
          ru: Доказательства
          uk: Докази
          en: Facts
      correct: opt_2
    - id: '8'
      type: speech
      duration_sec: 6
      text:
        ru: 'Чувства! «Весело», «не пожалеешь» — чистые эмоции. Ни одного факта.

          '
        uk: Почуття! «Весело», «не пошкодуватимеш» — чисті емоції. Жодного факту.
        en: Feelings! "Fun", "won't regret" — pure emotions. Not a single fact.
    - id: '9'
      type: vote
      duration_sec: 10
      text:
        ru: '«Вот, смотри, тут написано чёрным по белому!»

          '
        uk: «Ось, дивись, тут написано чорним по білому!»
        en: '"Look, here it''s written in black and white!"'
      options:
      - id: opt_1
        text:
          ru: Доверие
          uk: Довіра
          en: Trust
      - id: opt_2
        text:
          ru: Чувства
          uk: Почуття
          en: Feelings
      - id: opt_3
        text:
          ru: Доказательства
          uk: Докази
          en: Facts
      correct: opt_3
    - id: '10'
      type: speech
      duration_sec: 6
      text:
        ru: 'Доказательства! Документ, который можно прочитать и проверить.

          '
        uk: Докази! Документ, який можна прочитати й перевірити.
        en: Facts! A document that can be read and verified.
    - id: '11'
      type: vote
      duration_sec: 10
      text:
        ru: '«Все говорят, что это лучшая игра — 4.9 звёзд из 5!»

          '
        uk: «Всі кажуть, що це найкраща гра — 4,9 зірок із 5!»
        en: '"Everyone says it''s the best game — 4.9 stars out of 5!"'
      options:
      - id: opt_1
        text:
          ru: Доверие
          uk: Довіра
          en: Trust
      - id: opt_2
        text:
          ru: Чувства
          uk: Почуття
          en: Feelings
      - id: opt_3
        text:
          ru: Доказательства
          uk: Докази
          en: Facts
      correct: opt_3
    - id: '12'
      type: speech
      duration_sec: 8
      text:
        ru: 'Доказательства! 4.9 звёзд — цифра. Хотя «все говорят» добавляет щепотку доверия. Но главный крючок — рейтинг.

          '
        uk: Докази! 4,9 зірок — цифра. Хоча «всі кажуть» додає щепотку довіри. Але головний крючок — рейтинг.
        en: Facts! 4.9 stars — a number. Although "everyone says" adds a touch of trust. But the main hook is the rating.
    - id: '13'
      type: vote
      duration_sec: 10
      text:
        ru: '«Если не попробуешь — будешь жалеть всю жизнь!»

          '
        uk: «Якщо не спробуєш — жалітимеш усе життя!»
        en: '"If you don''t try — you''ll regret it your whole life!"'
      options:
      - id: opt_1
        text:
          ru: Доверие
          uk: Довіра
          en: Trust
      - id: opt_2
        text:
          ru: Чувства
          uk: Почуття
          en: Feelings
      - id: opt_3
        text:
          ru: Доказательства
          uk: Докази
          en: Facts
      correct: opt_2
    - id: '14'
      type: speech
      duration_sec: 8
      text:
        ru: 'Чувства! Страх упустить. Знакомый приём — мы его разбирали в рекламах. Разведчик уже не ведётся!

          '
        uk: Почуття! Страх упустити. Знайомий прийом — ми його розбирали в рекламах. Розвідник уже не ведеться!
        en: Feelings! Fear of missing out. A familiar trick — we discussed it in ads. The scout won't fall for it!
    - id: '15'
      type: speech
      duration_sec: 10
      text:
        ru: 'Отлично, три способа помните! А теперь — новая тема. Сегодня мы узнаем ОТКУДА люди берут информацию. И это, возможно,
          самый важный вопрос разведчика.

          '
        uk: Відмінно, три способи пам'ятаєте! А тепер — нова тема. Сьогодні ми дізнаємося ЗВІДКИ люди беруть інформацію. І
          це, можливо, найважливіше питання розвідника.
        en: Great, you remember the three methods! Now — a new topic. Today we'll learn WHERE people get information from.
          And this is possibly the most important question for a scout.
  - scene_id: sc2
    title:
      ru: Открытие
      uk: Відкриття
      en: Discovery
    media_ref: 5A.sc2.opening_sources
    status: v3_locked
    steps:
    - id: '16'
      type: speech
      duration_sec: 12
      text:
        ru: 'Вот Дмитрик прибегает на перемене и кричит: «Завтра отменят уроки!» Все обрадовались. А потом спрашивают: «Откуда
          ты знаешь?»

          '
        uk: 'Ось Дмитрик прибігає на перерві й кричить: «Завтра скасують уроки!» Всі обрадувались. А потім запитують: «Звідки
          ти це знаєш?»'
        en: 'Here Dmitrik rushes in during break and shouts: "Classes are cancelled tomorrow!" Everyone was happy. Then they
          ask: "How do you know that?"'
    - id: '17'
      type: pause
      duration_sec: 5
      text:
        ru: 'Как думаете, что Дмитрик ответил?

          '
        uk: Як гадаєте, що Дмитрик відповів?
        en: What do you think Dmitrik answered?
    - id: '18'
      type: speech
      duration_sec: 10
      text:
        ru: '«Мне Петрик сказал, а ему — его старший брат, а ему — кто-то в интернете написал…» Цепочка! Друг, потом брат,
          потом интернет, потом — неизвестно кто.

          '
        uk: «Мені Петрик сказав, а йому — його старший брат, а йому — хтось в інтернеті написав…» Ланцюг! Друг, потім брат,
          потім інтернет, потім — невідомо хто.
        en: '"Petrik told me, and he was told by his older brother, and he was told by someone on the internet..." A chain!
          Friend, then brother, then internet, then — unknown.'
    - id: '19'
      type: speech
      duration_sec: 10
      text:
        ru: 'А вот учитель говорит: «Завтра контрольная.» Откуда он знает? Он сам составил расписание! Сам решил, сам написал.
          Никаких цепочек.

          '
        uk: 'А ось учитель говорить: «Завтра контрольна.» Звідки він знає? Він сам складав розклад! Сам вирішив, сам написав.
          Жодних ланцюгів.'
        en: 'But the teacher says: "There''s a test tomorrow." How does he know? He made the schedule himself! He decided
          it himself, wrote it himself. No chains.'
    - id: '20'
      type: speech
      duration_sec: 8
      text:
        ru: 'Чувствуете разницу? Дмитрик пересказывает чужие слова — он сам не видел и не проверял. А учитель ЗНАЕТ — потому
          что сам это сделал.

          '
        uk: Чуєте різницю? Дмитрик пересказує чужі слова — він сам не бачив і не перевіряв. А учитель ЗНАЄ — тому що сам це
          зробив.
        en: Feel the difference? Dmitrik is retelling someone else's words — he didn't see it himself or verify it. But the
          teacher KNOWS — because he did it himself.
    - id: '21'
      type: speech
      duration_sec: 10
      text:
        ru: 'Ещё пример. Друг говорит: «В столовой сегодня пицца!» Откуда знает? «Мне Сашка сказал.» А вы заходите в столовую
          — и там каша. Сашка ошибся. Или пошутил. Или ему кто-то другой наврал.

          '
        uk: 'Ще приклад. Друг говорить: «В їдальні сьогодні піца!» Звідки знає? «Мені Сашка сказав.» А ви заходите в їдальню
          — і там каша. Сашка помилився. Або пожартував. Або йому хтось інший наврав.'
        en: 'Another example. Friend says: "There''s pizza in the cafeteria today!" How does he know? "Sashka told me." But
          you go into the cafeteria — and there''s porridge. Sashka was wrong. Or he was joking. Or someone else lied to him.'
    - id: '22'
      type: speech
      duration_sec: 8
      text:
        ru: 'А если бы друг сказал: «Я сам видел — там пицца, вот фотка!» — совсем другое дело. Можно проверить!

          '
        uk: 'А якби друг сказав: «Я сам бачив — там піца, ось фото!» — зовсім інше. Можна перевірити!'
        en: 'But if the friend said: "I saw it myself — there''s pizza, here''s a photo!" — that''s different. You can verify!'
    - id: '23'
      type: speech
      duration_sec: 10
      text:
        ru: Сегодня мы научимся отличать НАДЁЖНУЮ информацию от СЛУХОВ. Это суперсила разведчика — понимать, ОТКУДА пришла
          информация. Послушайте историю!
        uk: Сьогодні ми навчимося розрізняти НАДІЙНУ інформацію від СЛУХІВ. Це суперсила розвідника — розуміти, ЗВІДКИ прийшла
          інформація. Послухайте історію!
        en: Today we'll learn to tell RELIABLE information from RUMORS. This is a scout's superpower — understanding WHERE
          information came from. Listen to this story!
  - scene_id: sc3
    title:
      ru: ИСТОРИЯ — НОВОСТЬ О ДИНОЗАВРЕ
      uk: ІСТОРІЯ — НОВИНА ПРО ДИНОЗАВРА
      en: STORY — NEWS ABOUT A DINOSAUR
    media_ref: 5A.sc3.story_dinosaur
    status: v3_locked
    steps:
    - id: '24'
      type: speech
      duration_sec: 14
      text:
        ru: 'Дмитрик влетел в класс с горящими глазами: «Ребята! В парке нашли живого динозавра! Вот, смотрите — видео в интернете!»'
        uk: 'Дмитрик влетів у клас з горючими очима: «Ребята! У парку знайшли живого динозавра! Ось, дивіться — відео в інтернеті!»'
        en: 'Dmitrik bursts into the classroom with blazing eyes: "Guys! They found a living dinosaur in the park! Look —
          video online!"'
    - id: '25'
      type: speech
      duration_sec: 14
      text:
        ru: 'Все сгрудились вокруг телефона. Видео мутное, снято ночью. Какой-то канал без названия, автор неизвестен. Оленка
          спросила: «А кто это снял?»'
        uk: 'Всі скупчилися навколо телефона. Відео мутне, знято вночі. Якийсь канал без назви, автор невідомий. Оленка запитала:
          «А хто це знімав?»'
        en: 'Everyone gathered around the phone. Video is blurry, filmed at night. Some unnamed channel, author unknown. Olenka
          asked: "Who filmed this?"'
    - id: '26'
      type: speech
      duration_sec: 14
      text:
        ru: 'Дмитрик пожал плечами: «Не знаю, мне Петрик скинул.» Витя добавил: «А по новостям об этом говорили? Учёные подтвердили?»
          Дмитрик замялся.'
        uk: 'Дмитрик пожав плечима: «Не знаю, мені Петрик скинув.» Вітя додав: «А по новинам про це говорили? Учені підтвердили?»
          Дмитрик замовк.'
        en: 'Dmitrik shrugged: "I don''t know, Petrik sent it to me." Vitya added: "Did the news talk about this? Did scientists
          confirm it?" Dmitrik fell silent.'
    - id: '27'
      type: speech
      duration_sec: 10
      text:
        ru: 'Друзья не бросились бежать в парк. Они задали правильные вопросы: кто снял? откуда информация? кто подтвердил?
          Настоящие разведчики!'
        uk: 'Друзі не кинулися бігти в парк. Вони задали правильні запитання: хто знімав? звідки інформація? хто підтвердив?
          Справжні розвідники!'
        en: 'The friends didn''t rush to the park. They asked the right questions: who filmed it? where did the information
          come from? who confirmed it? Real scouts!'
    - id: '28'
      type: speech
      duration_sec: 8
      text:
        ru: 'Итак, Дмитрик принёс «горячую новость». Но друзья не бросились бежать в парк. Почему?

          '
        uk: Отже, Дмитрик приніс «гарячу новину». Але друзі не кинулися бігти в парк. Чому?
        en: So, Dmitrik brought "hot news." But the friends didn't rush to the park. Why?
    - id: '29'
      type: vote
      duration_sec: 10
      text:
        ru: 'Почему дети не поверили Дмитрику?

          '
        uk: Чому діти не повірили Дмитрику?
        en: Why didn't the kids believe Dmitrik?
      options:
      - id: opt_1
        text:
          ru: Потому что Дмитрик часто врёт
          uk: Тому що Дмитрик часто брехає
          en: Because Dmitrik often lies
      - id: opt_2
        text:
          ru: Потому что источник информации ненадёжный
          uk: Тому що джерело інформації ненадійне
          en: Because the information source is unreliable
      - id: opt_3
        text:
          ru: Потому что динозавры не существуют
          uk: Тому що динозаври не існують
          en: Because dinosaurs don't exist
      correct: opt_2
    - id: '30'
      type: speech
      duration_sec: 10
      text:
        ru: 'Источник ненадёжный! Дмитрик сам не врёт — он просто пересказал то, что увидел в интернете. А кто снял видео?
          Неизвестно. Кто проверил? Никто. Цепочка: неизвестный человек → интернет → Петрик → Дмитрик. Каждый следующий пересказчик
          — как испорченный телефон.

          '
        uk: 'Джерело ненадійне! Дмитрик сам не брехе — він просто пересказав те, що побачив в інтернеті. А хто знімав відео?
          Невідомо. Хто перевіряв? Ніхто. Ланцюг: невідомо хто → інтернет → Петрик → Дмитрик. Кожний наступний пересказувач
          — як зіпсований телефон.'
        en: 'The source is unreliable! Dmitrik himself isn''t lying — he just retold what he saw on the internet. But who
          filmed the video? Unknown. Who verified it? Nobody. Chain: unknown person → internet → Petrik → Dmitrik. Each next
          reteller is like a broken telephone.'
    - id: '31'
      type: speech
      duration_sec: 10
      text:
        ru: 'А если бы динозавра нашли по-настоящему — об этом написали бы учёные, показали бы по новостям, были бы фотографии
          из разных источников. Один видеоролик от неизвестного человека — это не доказательство. Это как если бы кто-то сказал:
          «Я видел, как кот летал!» — ну ок, а фотографии? Свидетели? Нет? Тогда кот пока ходит пешком.

          '
        uk: 'А якби динозавра знайшли по-справжньому — про це написали б учені, показали б по новинах, були б фотографії з
          різних джерел. Один відеоролик від невідомої людини — це не доказ. Це як якщо б хтось сказав: «Я бачив, як кіт летав!»
          — ну добре, а фотографії? Свідки? Немає? Тоді кіт поки ходить пішки.'
        en: 'But if a dinosaur had really been found — scientists would have written about it, it would be on the news, there
          would be photos from different sources. One video from an unknown person is not proof. It''s like if someone said:
          "I saw a cat flying!" — okay, but photos? Witnesses? No? Then the cat is still walking on foot.'
    - id: '32'
      type: speech
      duration_sec: 8
      text:
        ru: 'Запомним главный вопрос разведчика: «Откуда ты это знаешь?» Этот вопрос — как фонарик в темноте. Сейчас разберёмся,
          какие бывают ответы на него.

          '
        uk: 'Запам''ятаємо головне запитання розвідника: «Звідки ти це знаєш?» Це запитання — як ліхтарик в темряві. Зараз
          розберемося, які бувають відповіді на нього.'
        en: 'Let''s remember the scout''s main question: "How do you know that?" This question is like a flashlight in the
          dark. Now let''s figure out what kinds of answers there are.'
  - scene_id: sc4
    title:
      ru: Своими глазами vs услышал
      uk: Своїми очима проти чув від інших
      en: Own eyes vs. heard from others
    media_ref: 5A.sc4.sources_two_types
    status: v3_locked
    steps:
    - id: '33'
      type: speech
      duration_sec: 10
      text:
        ru: 'Итак, мы поняли — важно спрашивать «Откуда ты это знаешь?» Но какие бывают ответы? Разведчик делит все источники
          информации на два типа.

          '
        uk: Отже, ми розуміли — важливо запитувати «Звідки ти це знаєш?» Але які бувають відповіді? Розвідник ділить усі джерела
          інформації на два типи.
        en: So, we understood — it's important to ask "How do you know that?" But what kinds of answers are there? A scout
          divides all information sources into two types.
    - id: '34'
      type: speech
      duration_sec: 12
      text:
        ru: 'Тип первый: СВОИМИ ГЛАЗАМИ. Это когда человек сам видел, сам сделал, сам измерил. «Я сам видел!» — очевидец.
          «Вот мой дневник» — документ. «Мы сами измерили температуру» — эксперимент. Это как фотография — ты был там.

          '
        uk: 'Тип перший: СВОЇМИ ОЧИМА. Це коли людина сама бачила, сама зробила, сама виміряла. «Я сам бачив!» — очевидець.
          «Ось мій щоденник» — документ. «Ми самі виміряли температуру» — експеримент. Це як фотографія — ти був там.'
        en: 'First type: OWN EYES. That''s when a person saw it themselves, did it themselves, measured it themselves. "I
          saw it myself!" — witness. "Here''s my diary" — document. "We measured the temperature ourselves" — experiment.
          It''s like a photo — you were there.'
    - id: '35'
      type: speech
      duration_sec: 12
      text:
        ru: 'Тип второй: УСЛЫШАЛ ОТ ДРУГИХ. Это когда человек пересказывает. «Мне друг сказал…» «В интернете написали…» «По
          телевизору показывали…» Это как игра в испорченный телефон — каждый следующий пересказ может добавить ошибку.

          '
        uk: 'Тип другий: ЧУВ ВІД ІНШИХ. Це коли людина пересказує. «Мені друг сказав…» «В інтернеті написали…» «По телебаченню
          показували…» Це як гра в зіпсований телефон — кожний наступний пересказ може додати помилку.'
        en: 'Second type: HEARD FROM OTHERS. That''s when a person is retelling. "A friend told me..." "Online it says..."
          "They showed on TV..." It''s like playing broken telephone — each retelling can add an error.'
    - id: '36'
      type: speech
      duration_sec: 10
      text:
        ru: 'Что надёжнее? Конечно, своими глазами! Если ты сам видел радугу — ты ЗНАЕШЬ, что она была. А если тебе сказали
          «вчера была радуга» — ну, может была. А может человек перепутал с двойной аркой из шариков.

          '
        uk: Що надійніше? Звичайно, своїми очима! Якщо ти сам бачив радугу — ти ЗНАЄШ, що вона була. А якщо тобі сказали «вчора
          була радуга» — ну, може була. А може людина переплутала з подвійною дугою з кульок.
        en: What's more reliable? Of course, own eyes! If you saw a rainbow yourself — you KNOW it was there. But if someone
          told you "there was a rainbow yesterday" — well, maybe there was. Or maybe the person confused it with a double
          arch made of balloons.
    - id: '37'
      type: speech
      duration_sec: 8
      text:
        ru: 'Но! «Услышал от других» — не значит «враньё». Просто это надо проверять. Врач говорит «у тебя температура» —
          ты сам не мерил, но врачу можно верить. А вот «мне друг сказал, что от мороженого растут мускулы» — тут стоит задуматься.

          '
        uk: Але! «Чув від інших» — не значить «брехня». Просто це треба перевіряти. Лікар говорить «у тебе температура» —
          ти сам не мірив, але лікарю можна вірити. А ось «мені друг сказав, що від морозива виростають м'язи» — тут варто
          задуматись.
        en: But! "Heard from others" — doesn't mean "lies". You just need to check it. A doctor says "you have a fever" —
          you didn't measure it yourself, but you can trust a doctor. But "my friend said ice cream makes muscles grow" —
          you should think about that.
    - id: '38'
