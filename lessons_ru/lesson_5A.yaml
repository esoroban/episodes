  - scene_id: sc8
    title:
      ru: Правило двух источников
      uk: Правило двох джерел
      en: Rule of two sources
    media_ref: 5A.sc8.two_sources_rule
    status: v3_locked
    steps:
    - id: '109'
      type: speech
      duration_sec: 10
      text:
        ru: 'Итак, фото и видео могут врать, блогеры могут ошибаться, в чатах — слухи. Как же разведчику жить? Есть золотое
          правило, которым пользуются настоящие журналисты!

          '
        uk: Отже, фото й відео можуть брехати, блогери можуть помилятися, в чатах — слухи. Як же розвідникові жити? Є золоте
          правило, яким користуються справжні журналісти!
        en: So, photos and videos can lie, bloggers can be wrong, chats have rumors. How can a scout live? There's a golden
          rule that real journalists use!
    - id: '110'
      type: speech
      duration_sec: 10
      text:
        ru: 'ПРАВИЛО ДВУХ ИСТОЧНИКОВ. Если одно и то же говорят ДВА разных источника, которые НЕ СВЯЗАНЫ друг с другом — информации
          можно верить намного больше.

          '
        uk: ПРАВИЛО ДВОХ ДЖЕРЕЛ. Якщо одне й те саме говорять ДВА різні джерела, які НЕ ЗВ'ЯЗАНІ одне з одним — інформації
          можна вірити набагато більше.
        en: THE RULE OF TWO SOURCES. If the same thing is said by TWO different sources that are NOT CONNECTED to each other
          — the information is much more reliable.
    - id: '111'
      type: speech
      duration_sec: 12
      text:
        ru: 'Почему? Потому что один человек может ошибиться. Или соврать. Или перепутать. Но чтобы ДВА разных человека, которые
          не общаются между собой, сказали одно и то же неправду — это уже очень маловероятно. Как если бы два человека в
          разных городах одновременно придумали одну и ту же шутку.

          '
        uk: Чому? Тому що одна людина може помилитися. Або брехати. Або переплутати. Але щоб ДВА різні людини, які не спілкуються
          між собою, сказали одну й ту саму неправду — це вже дуже малоймовірно. Як якби два людини в різних містах одночасно
          придумали один і той же жарт.
        en: Why? Because one person can be wrong. Or lie. Or mix things up. But for TWO different people who don't talk to
          each other to tell the same lie — that's very unlikely. It's like if two people in different cities came up with
          the same joke at the same time.
    - id: '112'
      type: speech
      duration_sec: 12
      text:
        ru: 'Пример. Одноклассник говорит: «Завтра контрольная, мне учитель сказал.» Может правда сказал, а может одноклассник
          пошутил. Один источник — ненадёжно. Но тут другой друг говорит: «А моя мама прочитала в родительском чате — завтра
          контрольная!» Мама и одноклассник не сговаривались. ДВА независимых источника — уже надёжнее!

          '
        uk: 'Приклад. Однокласник говорить: «Завтра контрольна, мені учитель сказав.» Може правду сказав, а може однокласник
          пожартував. Одне джерело — ненадійно. Але ось другий друг говорить: «А моя мама прочитала в чаті батьків — завтра
          контрольна!» Мама й однокласник не змовлялися. ДВА незалежних джерела — вже надійніше!'
        en: 'Example. A classmate says: "There''s a test tomorrow, the teacher told me." Maybe he''s telling the truth, maybe
          he''s joking. One source — unreliable. But then another friend says: "My mom read in the parents'' chat — there''s
          a test tomorrow!" Mom and the classmate didn''t plan it. TWO independent sources — much more reliable!'
    - id: '113'
      type: speech
      duration_sec: 8
      text:
        ru: 'Важно: источники должны быть НЕЗАВИСИМЫМИ. Если Петрик сказал Вовке, а Вовка сказал тебе — это НЕ два источника.
          Это один источник — Петрик. Вовка просто пересказал.

          '
        uk: 'Важливо: джерела мають бути НЕЗАЛЕЖНИМИ. Якщо Петрик сказав Вовці, а Вовка сказав тобі — це НЕ два джерела. Це
          одне джерело — Петрик. Вовка просто пересказав.'
        en: 'Important: sources must be INDEPENDENT. If Petrik told Vovka, and Vovka told you — that''s NOT two sources. That''s
          one source — Petrik. Vovka just retold it.'
    - id: '114'
      type: speech
      duration_sec: 6
      text:
        ru: 'Проверяем! Сработало ли правило двух источников?

          '
        uk: Перевіряємо! Спрацювало ли правило двох джерел?
        en: Let's check! Did the rule of two sources work?
    - id: '115'
      type: vote
      duration_sec: 10
      text:
        ru: 'Один друг говорит «экскурсия в пятницу, ему сказал старший брат», а другой друг говорит «моя мама видела объявление
          в школьном чате».

          '
        uk: Один друг говорить «екскурсія в п'ятницю, йому сказав старший брат», а другий друг говорить «моя мама бачила оголошення
          в школьному чаті».
        en: One friend says "field trip Friday, his older brother told him," another friend says "my mom saw the announcement
          in the school chat."
      options:
