        text:
          ru: Два источника — надёжно
          uk: Два джерела — надійно
          en: Two sources — reliable
      - id: opt_2
        text:
          ru: Один источник — проверяй
          uk: Одне джерело — перевіряй
          en: One source — check
      correct: opt_2
    - id: '118'
      type: speech
      duration_sec: 8
      text:
        ru: 'Один источник! Три человека — но все пересказывают ОДИН И ТОТ ЖЕ чат. Это не три источника — это одно сообщение,
