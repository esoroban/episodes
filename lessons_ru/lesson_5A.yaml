  - scene_id: sc13
    title:
      ru: Закрытие
      uk: Закриття
      en: Closing
    media_ref: 5A.sc13.closing
    status: v3_locked
    steps:
    - id: '196'
      type: speech
      duration_sec: 10
      text:
        ru: 'Ребята, сегодня вы стали настоящими информационными разведчиками! Давайте вспомним, какое оружие теперь у вас
          в арсенале.

          '
        uk: Ребята, сьогодні ви стали справжніми інформаційними розвідниками! Давайте згадаємо, яка зброя тепер у вашому арсеналі.
        en: Guys, today you became real information scouts! Let's remember what weapons you now have in your arsenal.
    - id: '197'
      type: speech
      duration_sec: 8
      text:
        ru: 'Первое: главный вопрос — «ОТКУДА ТЫ ЭТО ЗНАЕШЬ?» Этот вопрос — фонарик, который освещает любую информацию.

          '
        uk: 'Перше: головне запитання — «ЗВІДКИ ТИ ЦЕ ЗНАЄШ?» Це запитання — ліхтарик, який освітлює будь-яку інформацію.'
        en: 'First: the main question — "HOW DO YOU KNOW THAT?" This question is a flashlight that illuminates any information.'
    - id: '198'
      type: speech
      duration_sec: 8
      text:
        ru: 'Второе: два типа источников — СВОИМИ ГЛАЗАМИ и УСЛЫШАЛ ОТ ДРУГИХ. Своими глазами надёжнее, но даже это теперь
          надо проверять.

          '
        uk: 'Друге: два типи джерел — СВОЇМИ ОЧИМА й ЧУЛА ВІД ІНШИХ. Своїми очима надійніше, але навіть це тепер треба перевіряти.'
        en: 'Second: two types of sources — OWN EYES and HEARD FROM OTHERS. Own eyes is more reliable, but even that needs
          to be verified now.'
    - id: '199'
      type: speech
      duration_sec: 10
      text:
        ru: 'Третье: три волшебных вопроса — РАЗБИРАЕТСЯ ли человек? ХОЧЕТ ли что-то получить? Можно ли ПРОВЕРИТЬ? Три ключа
          от сейфа с правдой.

          '
        uk: 'Третє: три чарівних запитання — РОЗБИРАЄТЬСЯ ли людина? ХОЧЕТ ли щось отримати? Можна ли ПЕРЕВІРИТИ? Три ключі
          від сейфа з правдою.'
        en: 'Third: three magic questions — DOES THE PERSON KNOW? DOES THEY WANT TO GET SOMETHING? CAN YOU VERIFY? Three keys
          to a safe with truth.'
    - id: '200'
      type: speech
      duration_sec: 10
      text:
        ru: 'Четвёртое: не весь интернет одинаковый! Официальный сайт — это не то же самое, что пересылка в чате. И даже фото
          и видео могут быть подделкой — привет, дипфейки!

          '
        uk: 'Четверте: не весь інтернет однаковий! Офіційний сайт — це не те саме, що пересилання в чаті. І навіть фото й
          відео можуть бути підробкою — привіт, дипфейки!'
        en: 'Fourth: not all internet is the same! Official website is not the same as a chat forward. And even photos and
          videos can be fakes — hello, deepfakes!'
    - id: '201'
      type: speech
      duration_sec: 8
      text:
        ru: 'Пятое: ПРАВИЛО ДВУХ ИСТОЧНИКОВ. Если два независимых источника говорят одно и то же — уже надёжнее. Как два свидетеля,
          которые не сговаривались.

          '
        uk: 'П''яте: ПРАВИЛО ДВОХ ДЖЕРЕЛ. Якщо два незалежних джерела говорять одне й те саме — вже надійніше. Як два свідки,
          які не змовлялися.'
        en: 'Fifth: RULE OF TWO SOURCES. If two independent sources say the same thing — already more reliable. Like two witnesses
          who didn''t plan it.'
    - id: '202'
      type: speech
      duration_sec: 8
      text:
        ru: 'И шестое: мнение одного человека — даже самого умного — это ещё не факт. Факт — когда много людей проверили.

          '
        uk: 'І шосте: думка однієї людини — навіть найрозумнішої — це ще не факт. Факт — коли багато людей перевірили.'
        en: 'And sixth: one person''s opinion — even the smartest — is not a fact. A fact is when many people have verified
          it.'
    - id: '203'
      type: speech
      duration_sec: 12
      text:
        ru: 'Знаете, что самое крутое? Эти инструменты работают ВЕЗДЕ. Когда друг говорит «завтра не будет уроков» — спроси
          откуда знает. Когда в чате пересылают «срочную новость» — проверь дату и источник. Когда блогер рекламирует чудо-средство
          — задай три вопроса. Вы теперь не просто слушаете — вы ПРОВЕРЯЕТЕ.

          '
        uk: Знаєте, що найкруче? Ці інструменти працюють СКРІЗЬ. Коли друг говорить «завтра не буде уроків» — запитай звідки
          знає. Коли в чаті пересилають «терміну новину» — перевір дату й джерело. Коли блогер рекламує чудо-засіб — задай
          три запитання. Ви тепер не просто слухаєте — ви ПЕРЕВІРЯЄТЕ.
        en: You know what's cool? These tools work EVERYWHERE. When a friend says "no classes tomorrow" — ask how he knows.
          When "urgent news" is forwarded in a chat — check the date and source. When a blogger advertises a miracle product
          — ask three questions. You're not just listening now — you're VERIFYING.
    - id: '204'
      type: speech
      duration_sec: 8
      text:
        ru: 'Отличная работа, разведчики! Отдыхайте на перемене. На втором уроке мы разберём, как устроены аргументы — и научимся
          отличать главное от второстепенного. До встречи!

          '
        uk: Чудова робота, розвідники! Відпочивайте на перерві. На другому уроці ми розберемо, як влаштовані аргументи — й
          навчимося розрізняти головне від другорядного. До зустрічі!
        en: Great work, scouts! Rest during the break. In the second lesson we'll analyze how arguments work — and learn to
          tell the main from the secondary. See you!
