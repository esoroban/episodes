        uk: Краще не вірити! Хто написав — невідомо. Розбирається ли він — незрозуміло. Можна ли перевірити — ні. Усі три
          ключи заблоковані. Класичний слух.
        en: Better not believe! Who wrote it is unknown. Does he know the topic — unclear. Can you verify — no. All three
          keys are blocked. A classic rumor.
    - id: '63'
      type: vote
      duration_sec: 10
      text:
        ru: '«Учитель показал в книге, что динозавры жили давно.»

          '
        uk: «Учитель показав у книзі, що динозаври жили давно.»
        en: '"A teacher showed in a book that dinosaurs lived long ago."'
      options:
      - id: opt_1
        text:
          ru: Можно верить
          uk: Можна вірити
          en: You can believe
      - id: opt_2
        text:
          ru: Лучше не верить
          uk: Краще не вірити
          en: Better not believe
      - id: opt_3
        text:
          ru: Нужно проверить
          uk: Потрібно перевірити
          en: Need to verify
      correct: opt_1
    - id: '64'
      type: speech
      duration_sec: 8
      text:
        ru: 'Можно верить! Учитель разбирается. Ничего не продаёт. И самое главное — показал КНИГУ. Можно открыть и проверить
          самому. Все три ключа — зелёные!

          '
        uk: Можна вірити! Учитель розбирається. Нічого не продає. І найголовніше — показав КНИГУ. Можна відкрити й перевірити
          самому. Усі три ключі — зелені!
        en: You can believe! The teacher knows the topic. Doesn't sell anything. And most importantly — showed a BOOK. You
          can open and verify yourself. All three keys are green!
    - id: '65'
      type: speech
      duration_sec: 8
      text:
        ru: 'А теперь случай посложнее. Представьте: известный блогер с миллионом подписчиков говорит: «Эти витамины помогут
          вам вырасти выше! Я сам пью каждый день!»

          '
        uk: 'А тепер випадок посутніший. Уявіть: відомий блогер з мільйоном підписників говорить: «Ці вітаміни допоможуть
          вам виросту вище! Я сам п''ю кожний день!»'
        en: 'Now a more complex case. Imagine: a famous blogger with a million followers says: "These vitamins will help you
          grow taller! I take them every day!"'
    - id: '66'
      type: guided_dialogue
      duration_sec: 45
      text:
        ru: 'Подумайте: можно ли верить блогеру? Проверьте тремя вопросами: разбирается ли он? хочет ли что-то получить? можно
          ли проверить?

          '
        uk: 'Подумайте: можна ли вірити блогеру? Перевірте трьома запитаннями: розбирається ли він? хочет ли щось отримати?
          можна ли перевірити?'
        en: 'Think: can you trust the blogger? Check with three questions: does he know the topic? does he want to get something?
          can you verify?'
    - id: '67'
      type: speech
      duration_sec: 6
      text:
        ru: 'Кто что думает? Давайте разберём.

          '
        uk: Хто що думає? Давайте розберемо.
        en: What do you think? Let's analyze.
    - id: '68'
      type: speech
      duration_sec: 10
      text:
        ru: 'Разбирается ли блогер в витаминах? Он доктор? Биолог? Скорее всего нет — он блогер. Хочет ли он что-то получить?
          Конечно! Ему платят за рекламу. Можно ли проверить? Где научные исследования? Нет их.

          '
        uk: Розбирається ли блогер в вітамінах? Він лікар? Біолог? Скоріше за все ні — він блогер. Хочет він щось отримати?
          Звичайно! Йому платять за рекламу. Можна ли перевірити? Де наукові дослідження? Немає їх.
        en: Does the blogger know about vitamins? Is he a doctor? Biologist? Probably not — he's a blogger. Does he want to
          get something? Of course! He's paid for ads. Can you verify? Where are the scientific studies? There aren't any.
    - id: '69'
      type: speech
      duration_sec: 8
      text:
        ru: 'Все три ключа — красные! Блогер может быть милым, смешным, с крутыми видео. Но миллион подписчиков не делают
          человека экспертом по витаминам. Миллион подписчиков — это про популярность, а не про знания.

          '
        uk: Усі три ключі — червоні! Блогер може бути милий, смішний, з крутими відео. Але мільйон підписників не роблять
          людину експертом по вітамінам. Мільйон підписників — це про популярність, а не про знання.
        en: All three keys are red! The blogger can be nice, funny, with cool videos. But a million followers don't make someone
          an expert on vitamins. A million followers is about popularity, not knowledge.
    - id: '70'
      type: speech
      duration_sec: 8
      text:
        ru: 'Три вопроса — мощный инструмент. Но в интернете всё сложнее. Не все сайты одинаковые, не все источники равны.
          Давайте разберёмся!

          '
        uk: Три запитання — потужний інструмент. Але в інтернеті все складніше. Не всі сайти одинакові, не всі джерела рівні.
          Давайте розберемся!
        en: Three questions is a powerful tool. But the internet is more complex. Not all websites are the same, not all sources
          are equal. Let's figure it out!
  - scene_id: sc6
    title:
      ru: Не весь интернет одинаковый
      uk: Не весь інтернет однаковий
      en: Not all internet is the same
    media_ref: 5A.sc6.internet_levels
    status: v3_locked
    steps:
    - id: '71'
      type: speech
      duration_sec: 10
      text:
        ru: 'Мы часто слышим: «В интернете написали». Но интернет — это не один человек. В интернете пишут ВСЕ. И учёные,
          и шутники, и роботы, и твой сосед Вовка, который думает, что Земля квадратная.

          '
        uk: 'Ми часто чуємо: «В інтернеті написали». Але інтернет — це не одна людина. В інтернеті пишуть УСІ. І учені, і
          жартівники, і роботи, і твій сусід Вовка, який думає, що Земля квадратна.'
        en: 'We often hear: "They wrote on the internet." But the internet is not one person. EVERYONE writes on the internet.
          Scientists and jokers, robots and your neighbor Vovka, who thinks the Earth is square.'
    - id: '72'
      type: speech
      duration_sec: 10
      text:
        ru: 'Представьте огромную библиотеку, где на одной полке стоит энциклопедия, а на соседней — тетрадка с фантазиями
          первоклассника. Обе в библиотеке. Но они ОЧЕНЬ разные. Интернет — такая же библиотека.

          '
        uk: Уявіть величезну бібліотеку, де на одній полиці стоїть енциклопедія, а на сусідній — зошит з фантазіями першокласника.
          Обидві в бібліотеці. Але вони ДУЖЕ різні. Інтернет — така ж бібліотека.
        en: Imagine a huge library where on one shelf there's an encyclopedia, and on the next shelf is a notebook with a
          first-grader's fantasies. Both in the library. But they're VERY different. The internet is the same kind of library.
    - id: '73'
      type: speech
      duration_sec: 12
      text:
        ru: 'Уровень первый: ОФИЦИАЛЬНЫЕ САЙТЫ. Сайт больницы, сайт школы, сайт музея, сайт правительства. Там пишут специалисты,
          которые отвечают за свои слова. Если на сайте зоопарка написано «у нас живёт жираф» — скорее всего, жираф там есть.

          '
        uk: 'Рівень перший: ОФІЦІЙНІ САЙТИ. Сайт лікарні, сайт школи, сайт музею, сайт уряду. Там пишуть спеціалісти, які
          відповідають за свої слова. Якщо на сайті зоопарку написано «у нас живет жираф» — скоріше за все, жираф там є.'
        en: 'Level one: OFFICIAL WEBSITES. Hospital website, school website, museum website, government website. Specialists
          write there and are responsible for their words. If it says on the zoo website "we have a giraffe" — chances are
          there''s a giraffe.'
    - id: '74'
      type: speech
      duration_sec: 12
      text:
        ru: 'Уровень второй: НОВОСТНЫЕ САЙТЫ И ЭНЦИКЛОПЕДИИ. Журналисты проверяют информацию перед публикацией. Не всегда
          идеально, но хотя бы стараются. Энциклопедии пишут и проверяют много людей. Это надёжнее, чем один человек.

          '
        uk: 'Рівень другий: НОВИННІ САЙТИ І ЕНЦИКЛОПЕДІЇ. Журналісти перевіряють інформацію перед публікацією. Не завжди ідеально,
          але хоча б намагаються. Енциклопедії пишуть і перевіряють багато людей. Це надійніше, ніж один человек.'
        en: 'Level two: NEWS SITES AND ENCYCLOPEDIAS. Journalists verify information before publishing. Not always perfect,
          but they try. Encyclopedias are written and checked by many people. That''s more reliable than one person.'
    - id: '75'
      type: speech
      duration_sec: 10
      text:
        ru: 'Уровень третий: БЛОГИ И СОЦСЕТИ. Тут каждый пишет что хочет. Блогер может быть умным — а может фантазировать.
          Никто не проверяет. Никто не отвечает. Это как объявление на заборе — повесить может кто угодно.

          '
        uk: 'Рівень третій: БЛОГИ І СОЦМЕРЕЖІ. Тут кожний пише що хоче. Блогер може бути розумний — а може фантазувати. Ніхто
          не перевіряє. Ніхто не відповідає. Це як оголошення на паркані — вісити може хто завгодно.'
        en: 'Level three: BLOGS AND SOCIAL MEDIA. Here everyone writes what they want. A blogger can be smart — or just fantasize.
          Nobody checks. Nobody''s responsible. It''s like an announcement on a fence — anyone can put one up.'
    - id: '76'
      type: speech
      duration_sec: 10
      text:
        ru: 'Уровень четвёртый: ЧАТЫ И ПЕРЕСЫЛКИ. «Мне скинули», «в чате написали», «переслали в группу». Самый ненадёжный!
          Неизвестно кто написал, когда, зачем. Это даже не забор — это шёпот в тёмном коридоре.

          '
        uk: 'Рівень четвертий: ЧАТИ І ПЕРЕСИЛАННЯ. «Мені скинули», «у чаті написали», «переслали в групу». Найненадійніший!
          Невідомо хто написав, коли, навіщо. Це навіть не паркан — це шепіт у темному коридорі.'
        en: 'Level four: CHATS AND FORWARDS. "They sent me", "they wrote in the chat", "forwarded to the group". Most unreliable!
          Unknown who wrote it, when, why. It''s not even a fence — it''s a whisper in a dark hallway.'
    - id: '77'
      type: speech
      duration_sec: 6
      text:
        ru: 'Потренируемся! Надёжный или ненадёжный источник?

          '
        uk: Потренуємся! Надійне чи ненадійне джерело?
        en: Let's practice! Reliable or unreliable source?
    - id: '78'
      type: vote
      duration_sec: 10
      text:
        ru: 'Информация с сайта детской больницы о прививках.

          '
        uk: Інформація з сайту дитячої лікарні про щеплення.
        en: Information from a children's hospital website about vaccinations.
      options:
      - id: opt_1
        text:
          ru: Надёжный
          uk: Надійне
          en: Reliable
      - id: opt_2
        text:
          ru: Ненадёжный
          uk: Ненадійне
          en: Unreliable
      correct: opt_1
    - id: '79'
      type: speech
      duration_sec: 6
      text:
        ru: 'Надёжный! Больница — официальный сайт, врачи отвечают за информацию. Первый уровень — специалисты.

          '
        uk: Надійне! Лікарня — офіційний сайт, лікарі відповідають за інформацію. Перший рівень — спеціалісти.
        en: Reliable! A hospital is an official website, doctors are responsible for the information. First level — specialists.
    - id: '80'
      type: vote
      duration_sec: 10
      text:
        ru: 'Пост незнакомого блогера: «Я открыл секрет, как не болеть зимой!»

          '
        uk: 'Пост незнайомого блогера: «Я розкрив секрет, як не хворіти взимку!»'
        en: 'Post by an unknown blogger: "I discovered the secret to not getting sick in winter!"'
      options:
      - id: opt_1
        text:
          ru: Надёжный
          uk: Надійне
          en: Reliable
      - id: opt_2
        text:
          ru: Ненадёжный
          uk: Ненадійне
          en: Unreliable
      correct: opt_2
    - id: '81'
      type: speech
      duration_sec: 8
      text:
        ru: 'Ненадёжный! Незнакомый блогер, никаких доказательств, «секрет» — типичная приманка. Если бы секрет существовал,
          врачи бы давно знали. А они почему-то до сих пор выписывают лекарства, а не подписку на блог.

          '
        uk: Ненадійне! Незнайомий блогер, жодних доказів, «секрет» — типова приманка. Якби секрет існував, лікарі б давно
          знали. А вони чому-то до сих пір видають ліки, а не підписку на блог.
        en: Unreliable! Unknown blogger, no proof, "secret" — typical bait. If the secret existed, doctors would have known
          long ago. But they still seem to prescribe medicine instead of subscribing to a blog.
    - id: '82'
      type: vote
      duration_sec: 10
      text:
        ru: 'Статья в детской энциклопедии про вулканы.

          '
        uk: Стаття в дитячій енциклопедії про вулкани.
        en: Article in a children's encyclopedia about volcanoes.
      options:
      - id: opt_1
        text:
          ru: Надёжный
          uk: Надійне
          en: Reliable
      - id: opt_2
        text:
          ru: Ненадёжный
          uk: Ненадійне
          en: Unreliable
      correct: opt_1
    - id: '83'
      type: speech
      duration_sec: 6
      text:
        ru: 'Надёжный! Энциклопедию пишут и проверяют много специалистов. Вулканы не обидятся — про них написали правду.

          '
        uk: Надійне! Енциклопедію пишуть і перевіряють багато фахівців. Вулкани не образяться — про них написали правду.
        en: Reliable! An encyclopedia is written and checked by many experts. Volcanoes won't be offended — the truth is written
          about them.
    - id: '84'
      type: vote
      duration_sec: 10
      text:
        ru: 'Сообщение в классном чате: «Передали, что завтра карантин!!!»

          '
        uk: 'Повідомлення в класному чаті: «Передали, що завтра карантин!!!»'
        en: 'Message in class chat: "They said there''s quarantine tomorrow!!!"'
      options:
      - id: opt_1
        text:
          ru: Надёжный
          uk: Надійне
          en: Reliable
      - id: opt_2
        text:
          ru: Ненадёжный
          uk: Ненадійне
          en: Unreliable
      correct: opt_2
    - id: '85'
      type: speech
      duration_sec: 8
      text:
        ru: 'Ненадёжный! Кто передал? Откуда? Три восклицательных знака надёжности не добавляют. Чем больше восклицательных
          знаков — тем больше подозрений у разведчика.

          '
        uk: Ненадійне! Хто передав? Звідки? Три знаки оклику надійності не додають. Чим більше знаків оклику — тим більше
          підозр у розвідника.
        en: Unreliable! Who said? Where from? Three exclamation marks don't add reliability. The more exclamation marks —
          the more suspicion a scout has.
    - id: '86'
      type: vote
      duration_sec: 10
      text:
        ru: 'Статья на новостном сайте со ссылкой на учёных.

          '
        uk: Стаття на новинному сайті зі посиланням на учених.
        en: Article on a news website with a link to scientists.
      options:
      - id: opt_1
        text:
          ru: Надёжный
          uk: Надійне
          en: Reliable
      - id: opt_2
        text:
          ru: Ненадёжный
          uk: Ненадійне
          en: Unreliable
      correct: opt_1
    - id: '87'
      type: speech
      duration_sec: 8
      text:
        ru: 'Надёжный! Новостной сайт — это второй уровень. А тут ещё и ссылка на учёных — можно перейти и проверить. Два
          уровня надёжности сразу!

          '
        uk: Надійне! Новинний сайт — це другий рівень. А тут ще й посилання на учених — можна перейти й перевірити. Два рівні
          надійності разом!
        en: Reliable! A news website is level two. And here there's a link to scientists — you can click and verify. Two levels
          of reliability at once!
    - id: '88'
      type: vote
      duration_sec: 10
      text:
        ru: 'Картинка с текстом, пересланная в родительский чат.

          '
        uk: Картинка з текстом, переслана в чат батьків.
        en: Picture with text, forwarded to parents chat.
      options:
      - id: opt_1
        text:
          ru: Надёжный
          uk: Надійне
          en: Reliable
      - id: opt_2
        text:
          ru: Ненадёжный
          uk: Ненадійне
          en: Unreliable
      correct: opt_2
    - id: '89'
      type: speech
      duration_sec: 10
      text:
        ru: 'Ненадёжный! Картинка с текстом — любимый транспорт для слухов. Кто её сделал? Неизвестно. Когда? Непонятно. Проверить?
          Невозможно. Такие картинки путешествуют годами — и каждый раз кто-то верит. А теперь — ещё более интересная тема.
          Даже если вы что-то ВИДИТЕ — это не всегда правда!

          '
        uk: Ненадійне! Картинка з текстом — улюблений транспорт для слухів. Хто її зробив? Невідомо. Коли? Незрозуміло. Перевірити?
          Неможливо. Такі картинки подорожують роками — і кожний раз хтось вірить. А тепер — ще цікавіша тема. Навіть якщо
          ви щось БАЧИТЕ — це не завжди правда!
        en: Unreliable! Picture with text is a favorite transport for rumors. Who made it? Unknown. When? Unclear. Verify?
          Impossible. Such pictures travel for years — and every time someone believes them. But now — an even more interesting
          topic. Even if you SEE something — it's not always the truth!
  - scene_id: sc7
    title:
      ru: 'ИИ-подделки: даже видео может врать'
      uk: 'ШІ-підробки: навіть відео може брехати'
      en: 'AI fakes: even video can lie'
    media_ref: 5A.sc7.ai_deepfakes
    status: v3_locked
    steps:
    - id: '90'
      type: speech
      duration_sec: 10
      text:
        ru: 'Мы говорили: «Своими глазами — надёжнее всего». Фотография, видео — это же доказательство! Или… нет?

          '
        uk: 'Ми говорили: «Своїми очима — найнадійніше». Фотографія, відео — це ж доказ! Або… ні?'
        en: 'We said: "Own eyes — most reliable." Photo, video — that''s proof! Or... not?'
    - id: '91'
      type: speech
      duration_sec: 12
      text:
        ru: 'Раньше, если ты видел фотографию — можно было верить. Видео — тем более. Но сейчас появились технологии, которые
          умеют делать ФАЛЬШИВЫЕ фотографии и видео. И они выглядят как настоящие!

          '
        uk: Раніше, якщо ти бачив фотографію — можна було вірити. Відео — тим паче. Але зараз з'явились технології, які вміють
          робити ФАЛЬШИВІ фотографії й відео. І вони виглядають як справжні!
        en: Before, if you saw a photo — you could believe it. Video — even more so. But now technologies have appeared that
          can make FAKE photos and videos. And they look real!
    - id: '92'
      type: speech
      duration_sec: 10
      text:
        ru: 'Искусственный интеллект — ИИ — может нарисовать фотографию человека, которого не существует. Лицо, одежда, фон
