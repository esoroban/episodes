      text:
        ru: 'Взрослый кот! Пять лет прошло. Этот «маленький пушистый комочек» уже давно вырос в здорового наглого кота, который
          спит на чужих куртках, ворует сосиски со стола и смотрит на хозяев с видом «это МОЯ квартира». Побитый жизнью, но
          доволен ей. И точно не пропавший.

          '
        uk: Дорослий кіт! П'ять років пройшло. Цей «маленький пухнастий комочок» давно виріс у здорового нахабного кота, який
          спить на чужих куртках, крадеть сосиски зі столу й дивиться на господарів з виглядом «це МОЯ квартира». Побитий
          життям, але доволений ним. І точно не зниклий.
        en: Adult cat! Five years passed. This "cute fluffy ball" has long grown into a healthy brazen cat that sleeps on
          other people's jackets, steals sausages from the table, and looks at owners like "this is MY apartment." Beaten
          by life, but satisfied with it. And definitely not missing.
    - id: '141'
      type: speech
      duration_sec: 6
      text:
        ru: 'Пятый вопрос: правило двух источников. Есть ли второй источник?

          '
        uk: 'П''яте запитання: правило двох джерел. Є ли друге джерело?'
        en: 'Fifth question: rule of two sources. Is there a second source?'
    - id: '142'
      type: vote
      duration_sec: 10
      text:
        ru: 'Пост гуляет по чатам, но ни одно СМИ не написало, ни один приют не подтвердил, ни полиция не ищет.

          '
        uk: Пост гуляє по чатам, але жодне ЗМІ не написало, жодний притулок не підтвердив, жодна поліція не шукає.
        en: Post circulates in chats, but no media wrote about it, no shelter confirmed it, no police is searching.
      options:
