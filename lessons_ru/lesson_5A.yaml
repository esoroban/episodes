  - scene_id: sc5
    title:
      ru: Три вопроса для проверки
      uk: Три запитання для перевірки
      en: Three questions to check
    media_ref: 5A.sc5.three_questions
    status: v3_locked
    steps:
    - id: '50'
      type: speech
      duration_sec: 10
      text:
        ru: 'Итак, ты услышал что-то от кого-то. Не видел сам. Как понять — верить или нет? У разведчика есть три секретных
          вопроса. Как три ключа от сейфа с правдой.

          '
        uk: Отже, ти щось чув від кого-то. Не бачив сам. Як розуміти — вірити чи ні? У розвідника є три секретних запитання.
          Як три ключі від сейфа з правдою.
        en: So, you heard something from someone. You didn't see it yourself. How to understand — believe or not? A scout
          has three secret questions. Like three keys to a safe with truth.
    - id: '51'
      type: speech
      duration_sec: 10
      text:
        ru: 'Вопрос первый: РАЗБИРАЕТСЯ ЛИ ЧЕЛОВЕК В ЭТОМ? Доктор говорит о здоровье — разбирается. А если доктор говорит,
          как чинить машину — может и не знать. Каждый эксперт — эксперт в СВОЕЙ теме. Повар знает про суп, но не про ракеты.

          '
        uk: 'Запитання перше: РОЗБИРАЄТЬСЯ Ч ЛЮДИНА В ЦЬОМУ? Лікар говорить про здоров''я — розбирається. А якщо лікар говорить,
          як чинити машину — може й не знати. Кожний експерт — експерт у СВОІЙ темі. Повар знає про суп, але не про ракети.'
        en: 'First question: DOES THE PERSON KNOW ABOUT THIS? A doctor talks about health — knows it. But if a doctor talks
          about how to fix a car — might not know. Every expert is an expert in THEIR field. A cook knows about soup, but
          not about rockets.'
    - id: '52'
      type: speech
      duration_sec: 10
      text:
        ru: 'Вопрос второй: ХОЧЕТ ЛИ ОН ЧТО-ТО ПОЛУЧИТЬ? Продавец хвалит свой товар — он хочет продать! Это не значит, что
          он врёт, но у него есть причина преувеличивать. А друг советует книжку — ему ничего от этого не нужно. Ему просто
          понравилось.

          '
        uk: 'Запитання друге: ХОЧЕТ ВІН ЩОС ОТРИМАТИ? Продавець хвалить свій товар — хочет продати! Це не значить, що він
          брехе, але у нього є причина перебільшувати. А друг радить книжку — йому нічого від цього не потрібно. Йому просто
          сподобалось.'
        en: 'Second question: DOES HE WANT TO GET SOMETHING? A seller praises his product — wants to sell! That doesn''t mean
          he''s lying, but he has a reason to exaggerate. But a friend recommends a book — he doesn''t need anything from
          it. He just liked it.'
    - id: '53'
      type: speech
      duration_sec: 10
      text:
        ru: 'Вопрос третий: МОЖНО ЛИ ПРОВЕРИТЬ? «Вот, смотри сам, тут написано» — можно проверить. «Мне кто-то когда-то сказал»
          — нельзя проверить. Если нельзя проверить — фонарик разведчика мигает красным.

          '
        uk: 'Запитання третє: МОЖНА ЛИ ПЕРЕВІРИТИ? «Ось, дивись сам, тут написано» — можна перевірити. «Мені хтось коли-то
          сказав» — не можна перевірити. Якщо не можна перевірити — ліхтарик розвідника мигає червоним.'
        en: 'Third question: CAN YOU VERIFY IT? "Look, here it says" — you can verify. "Someone told me once" — you can''t
          verify. If you can''t verify — the scout''s flashlight blinks red.'
    - id: '54'
      type: speech
      duration_sec: 8
      text:
        ru: 'Три вопроса. Повторим: Разбирается? Хочет получить? Можно проверить? Если хотя бы на один ответ подозрительный
