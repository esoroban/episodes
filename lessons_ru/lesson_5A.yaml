          '
        uk: Два джерела! Старший брат одного й мама другого — незалежні. Вони не списувалися. Обидва дізналися з різних місць
          й обидва говорять одне й те саме. Надійно!
        en: Two sources! The older brother of one and the mom of the other are independent. They didn't coordinate. Both found
