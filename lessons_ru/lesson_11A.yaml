lesson:
  id: lesson_11A
  day: 11
  slot: A
  title:
    ru: Как правильно возражать
    uk: Як правильно заперечувати
    en: How to Properly Object
  scenes:
  - scene_id: sc1
    title:
      ru: РАЗМИНКА ВРАЗНОБОЙ ПО КУРСУ
      uk: РОЗМИНКА ВРАЗНОБІЙ ПО КУРСУ
      en: 'WARM-UP: MIXED TRICKS FROM THE COURSE'
    media_ref: 11A.sc1.warmup_mix
    status: v3_locked
    steps:
    - id: '1'
      type: speech
      duration_sec: 15
      text:
        ru: 'Одиннадцатое занятие! Сегодня разминка особенная — мы перемешали хитрости из разных уроков. Никаких подсказок
          — сами определяйте, какой приём перед вами. Поехали!

          '
        uk: Одинадцяте заняття! Сьогодні розминка особлива — ми перемішали хитрощі з різних уроків. Ніяких підказок — самі
          визначайте, який прийом перед вами. Поїхали!
        en: Lesson eleven! Today's warm-up is special - we mixed up tricks from all the different lessons. No hints - you
          figure out which technique is being used. Let's go!
    - id: '2'
      type: vote
      duration_sec: 12
      text:
        ru: '«Известный хоккеист говорит в рекламе: "Этот учебник математики — лучший!"»

          '
        uk: '«Відомий хокеїст говорить в рекламі: "Цей підручник математики — найкращий!"»'
        en: '"A famous hockey player says in an advertisement: ''This math textbook is the best!''"'
      options:
      - id: opt_1
        text:
          ru: Настоящий эксперт
          uk: Справжній експерт
          en: A real expert
      - id: opt_2
        text:
          ru: Ложный авторитет
          uk: Хибний авторитет
          en: False authority
      correct: opt_2
    - id: '3'
      type: speech
      duration_sec: 14
      text:
        ru: 'Ложный авторитет! Хоккеист отлично забивает голы, но с уравнениями у него, мягко говоря, другие отношения. Учебники
          математики пусть оценивают учителя математики.

          '
        uk: Хибний авторитет! Хокеїст чудово забиває голи, але з рівняннями у нього, м'яко кажучи, інші стосунки. Підручники
          математики хай оцінюють учителя математики.
        en: False authority! The hockey player is great at scoring goals, but when it comes to equations, let's say he has
          different interests. Math textbooks should be judged by math teachers.
    - id: '4'
      type: vote
      duration_sec: 12
      text:
        ru: '«Или идёшь на мой день рождения, или ты мне вообще не друг!»

          '
        uk: «Або йдеш на мій день народження, або ти мені взагалі не друг!»
        en: '"Either you come to my birthday party, or you''re not my friend at all!"'
      options:
      - id: opt_1
        text:
          ru: Ложная дилемма
          uk: Хибна дилема
          en: False dilemma
      - id: opt_2
        text:
          ru: Реальный выбор
          uk: Реальний вибір
          en: Real choice
      correct: opt_1
    - id: '5'
      type: speech
      duration_sec: 14
      text:
        ru: 'Ложная дилемма! Можно быть лучшим другом на свете и не прийти — заболел, уехал, кот застрял на дереве. Два варианта
          — не значит, что других нет.

          '
        uk: Хибна дилема! Можна бути найкращим другом на світі й не прийти — захворів, уїхав, кіт застряг на дереві. Два варіанти
          — не означає, що інших немає.
        en: False dilemma! You can be the best friend in the world and still not come - you got sick, had to travel, the cat
          got stuck in a tree. Two options doesn't mean there are no others.
    - id: '6'
      type: vote
      duration_sec: 12
      text:
        ru: '«У тебя очки — значит ты ничего не понимаешь в спорте!»

          '
        uk: «У тебе окуляри — значить ти нічого не розумієш у спорті!»
        en: '"You wear glasses - that means you don''t understand anything about sports!"'
      options:
      - id: opt_1
        text:
          ru: Нападка на человека
          uk: Нападка на людину
          en: Attack on the person
      - id: opt_2
        text:
          ru: Нормальное возражение
          uk: Нормальне заперечення
          en: Normal objection
      correct: opt_1
    - id: '7'
      type: speech
      duration_sec: 14
      text:
        ru: 'Нападка на человека! Очки — это про зрение, а не про знание футбола. Можно носить очки и разбираться в спорте
          лучше всех в классе.

          '
        uk: Нападка на людину! Окуляри — це про зір, а не про знання футболу. Можна носити окуляри й розбиратися у спорті
          краще всіх у класі.
        en: Attack on the person! Glasses are about eyesight, not sports knowledge. You can wear glasses and understand sports
          better than anyone in the class.
    - id: '8'
      type: vote
      duration_sec: 12
      text:
        ru: '«Ты уже перестал списывать у соседа?»

          '
        uk: «Ти вже перестав списувати у сусіда?»
        en: '"Have you stopped copying from your neighbor yet?"'
      options:
      - id: opt_1
        text:
          ru: Хитрый вопрос
          uk: Хитра питання
          en: Loaded question
      - id: opt_2
        text:
          ru: Обычный вопрос
          uk: Звичайна питання
          en: Normal question
      correct: opt_1
    - id: '9'
      type: speech
      duration_sec: 14
      text:
        ru: 'Хитрый вопрос! Что ни ответь — «да» или «нет» — получается, что ты списывал. Ловушка встроена прямо в вопрос.
          Правильный ответ: «Я и не начинал!»

          '
        uk: 'Хитра питання! Що б ти не відповів — «так» чи «ні» — виходить, що ти списував. Пастка вбудована прямо в питання.
          Правильна відповідь: «Я й не починав!»'
        en: 'Loaded question! No matter what you answer - ''yes'' or ''no'' - it sounds like you were copying. The trap is
          built right into the question. The right answer: ''I never even started!'''
    - id: '10'
      type: vote
      duration_sec: 12
      text:
        ru: '«Я никогда не ем сладкое!» — говорит Катя, доедая шоколадку.

          '
        uk: «Я ніколи не їм цукерок!» — говорить Катя, доїдаючи шоколадку.
        en: '"I never eat candy!" says Katya, finishing a chocolate bar.'
      options:
      - id: opt_1
        text:
          ru: Есть противоречие
          uk: Є суперечність
          en: There's a contradiction
      - id: opt_2
        text:
          ru: Нет противоречия
          uk: Немає суперечності
          en: No contradiction
      correct: opt_1
    - id: '11'
      type: speech
      duration_sec: 14
      text:
        ru: 'Противоречие! Слова говорят одно, а шоколадка в руке — совсем другое. Когда слова расходятся с действиями — это
          классическое противоречие.

          '
        uk: Суперечність! Слова говорять одне, а шоколадка в руці — зовсім інше. Коли слова розходяться з діями — це класична
          суперечність.
        en: Contradiction! Words say one thing, but the chocolate in her hand says something totally different. When words
          don't match actions - that's a classic contradiction.
    - id: '12'
      type: speech
      duration_sec: 10
      text:
        ru: 'Половина позади! Продолжаем — теперь примеры будут хитрее.

          '
        uk: Половина позаду! Продовжуємо — тепер приклади будуть хитріші.
        en: Halfway there! Let's keep going - the examples are about to get trickier.
    - id: '13'
      type: vote
      duration_sec: 12
      text:
        ru: '«Ветеринар говорит: "Собакам нужно гулять минимум дважды в день."»

          '
        uk: '«Ветеринар говорить: "Собакам потрібно гуляти мінімум двічі на день."»'
        en: '"A veterinarian says: ''Dogs need to walk at least twice a day.''"'
      options:
      - id: opt_1
        text:
          ru: Настоящий эксперт
          uk: Справжній експерт
          en: A real expert
      - id: opt_2
        text:
          ru: Ложный авторитет
          uk: Хибний авторитет
          en: False authority
      correct: opt_1
    - id: '14'
      type: speech
      duration_sec: 14
      text:
        ru: 'Настоящий эксперт! Ветеринар — специалист по животным, это его профессия. Ему можно доверять в вопросах про собак.
          Не каждый авторитет — ложный!

          '
        uk: Справжній експерт! Ветеринар — фахівець з тварин, це його професія. Йому можна довіряти у питаннях про собак.
          Не кожен авторитет — хибний!
        en: A real expert! A veterinarian is a specialist in animals - it's their job. You can trust them about dogs. Not
          every authority is false!
    - id: '15'
      type: vote
      duration_sec: 12
      text:
        ru: '«Почему ты не любишь читать книги?»

          '
        uk: «Чому ти не любиш читати книги?»
        en: '"Why don''t you like reading books?"'
      options:
      - id: opt_1
        text:
          ru: Хитрый вопрос
          uk: Хитра питання
          en: Loaded question
      - id: opt_2
        text:
          ru: Обычный вопрос
          uk: Звичайна питання
          en: Normal question
      correct: opt_1
    - id: '16'
      type: speech
      duration_sec: 14
      text:
        ru: 'Хитрый вопрос! Он уже решил за тебя, что ты не любишь читать. А может, ты читаешь по три книги в неделю! Вопрос
          с ловушкой внутри.

          '
        uk: Хитра питання! Він уже вирішив за тебе, що ти не любиш читати. А може, ти читаєш по три книги на тиждень! Питання
          з пасткою всередині.
        en: Loaded question! They've already decided for you that you don't like reading. But maybe you read three books a
          week! A question with a trap inside.
    - id: '17'
      type: vote
      duration_sec: 12
      text:
        ru: '«Не съешь суп — заболеешь и попадёшь в больницу навсегда!»

          '
        uk: «Не з'їш суп — захворієш і потрапиш до лікарні назавжди!»
        en: '"Don''t eat your soup - you''ll get sick and end up in the hospital forever!"'
      options:
      - id: opt_1
        text:
          ru: Реальное предупреждение
          uk: Реальне попередження
          en: Real warning
      - id: opt_2
        text:
          ru: Запугивание
          uk: Залякування
          en: Scaremongering
      correct: opt_2
    - id: '18'
      type: speech
      duration_sec: 14
      text:
        ru: 'Запугивание! От одной тарелки супа не зависит вся медицинская история человечества. Суп полезен, но «больница
          навсегда» — это страшная цепочка.

          '
        uk: Залякування! Від однієї тарілки супу не залежить уся медична історія людства. Суп корисний, але «лікарня назавжди»
          — це страшна ланцюжок.
        en: Scaremongering! One bowl of soup won't determine all of human medical history. Soup is healthy, but 'hospital
          forever' - that's a scary chain of consequences.
    - id: '19'
      type: vote
      duration_sec: 15
      text:
        ru: '«Или мы берём зонт, или промокнем — за окном ливень стеной.»

          '
        uk: «Або беремо парасольку, або промокнемо — за вікном ливень стіною.»
        en: '"Either we take an umbrella or we get soaked - there''s a downpour outside."'
      options:
      - id: opt_1
        text:
          ru: Ложная дилемма
          uk: Хибна дилема
          en: False dilemma
      - id: opt_2
        text:
          ru: Реальный выбор
          uk: Реальний вибір
          en: Real choice
      correct: opt_2
    - id: '20'
      type: speech
      duration_sec: 14
      text:
        ru: 'Реальный выбор! За окном ливень стеной — тут действительно два варианта: зонт или мокрая голова. Третьего не
          дано, разве что сидеть дома.

          '
        uk: 'Реальний вибір! За вікном ливень стіною — тут справді два варіанти: парасольку чи мокра голова. Третього не дано,
          хіба що сидіти дома.'
        en: 'Real choice! There''s a downpour outside - there really are just two options: umbrella or wet head. There''s
          no third option, unless you stay home.'
    - id: '21'
      type: vote
      duration_sec: 12
      text:
        ru: '«Ты вчера опоздал на урок — значит всё, что ты говоришь сегодня, неправда!»

          '
        uk: «Ти вчора спізнився на урок — значить усе, що ти говориш сьогодні, неправда!»
        en: '"You were late to class yesterday - that means everything you say today is a lie!"'
      options:
      - id: opt_1
        text:
          ru: Нападка на человека
          uk: Нападка на людину
          en: Attack on the person
      - id: opt_2
        text:
          ru: Нормальное возражение
          uk: Нормальне заперечення
          en: Normal objection
      correct: opt_1
    - id: '22'
      type: speech
      duration_sec: 14
      text:
        ru: 'Нападка! Опоздание — это про пунктуальность, а не про правоту. Можно опоздать и сказать самую умную вещь на уроке.
          Одно с другим не связано.

          '
        uk: Нападка! Спізнення — це про пунктуальність, а не про правоту. Можна спізнитися й сказати найумнішу річ на уроці.
          Одне з іншим не пов'язано.
        en: Attack on the person! Being late is about punctuality, not truthfulness. You can be late and say the smartest
          thing in class. One has nothing to do with the other.
    - id: '23'
      type: speech
      duration_sec: 12
      text:
        ru: 'Отличная разминка — вы помните кучу приёмов из прошлых занятий! А сегодня мы добавим к ним новый мощный навык
          — как правильно возражать.

          '
        uk: Чудова розминка — ви пам'ятаєте купу прийомів з минулих занять! А сьогодні ми додамо до них новий потужний навик
          — як правильно заперечувати.
        en: Great warm-up - you remember lots of tricks from the past lessons! And today we're adding a new powerful skill
          - how to properly object.
  - scene_id: sc2
    title:
      ru: ОТКРЫТИЕ — ВОЗВРАЩАЕМСЯ К КУЛЬТУРЕ СПОРА
      uk: ВІДКРИТТЯ — ПОВЕРТАЄМОСЯ ДО КУЛЬТУРИ СПОРУ
      en: DISCOVERY - RETURNING TO THE ART OF DISAGREEMENT
    media_ref: 11A.sc2.opening_debate_culture
    status: v3_locked
    steps:
    - id: '24'
      type: speech
      duration_sec: 15
      text:
        ru: 'Помните занятие три — солдат и разведчик? Мы учились слушать, понимать, использовать формулу высказывания. Всё
          это — фундамент. А сегодня строим новый этаж!

          '
        uk: Пам'ятаєте заняття три — солдат і розвідник? Ми навчалися слухати, розуміти, використовувати формулу висловлювання.
          Усе це — фундамент. А сьогодні будуємо новий поверх!
        en: Remember lesson three - the soldier and the scout? We learned how to listen, understand, and use the formula for
          speaking. All that is the foundation. Today we're building a new floor!
    - id: '25'
      type: discussion
      duration_sec: 30
      text:
        ru: 'Друг говорит: «Собаки лучше кошек — они дружелюбнее.» Вы обожаете кошек и категорически не согласны. Как ответите?

          '
        uk: 'Друг говорить: «Собаки краще за котів — вони дружелюбніші.» Ви обожнюєте котів і категорично не згідні. Як ви
          відповідатимете?'
        en: 'A friend says: ''Dogs are better than cats - they''re friendlier.'' You love cats and strongly disagree. How
          will you respond?'
    - id: '26'
      type: speech
      duration_sec: 15
      text:
        ru: 'Кто-то наверняка подумал: «Ты что, с ума сошёл? Кошки в сто раз лучше!» Стоп. Это нападка в ответ на нападку
          — бесконечный цикл. А можно иначе.

          '
        uk: 'Хто-небудь напевно подумав: «Ти що, з розуму втратив? Коти в сто разів краще!» Стоп. Це нападка в ответ на нападку
          — нескінченний цикл. А можна інакше.'
        en: 'Someone definitely thought: ''Are you crazy? Cats are a hundred times better!'' Stop. That''s an attack in response
          to an attack - an endless cycle. But we can do it differently.'
    - id: '27'
      type: speech
      duration_sec: 15
      text:
        ru: '«Я понимаю, что тебе нравятся собаки. Но мой кот мурчит, когда я прихожу домой — по-моему, это тоже дружелюбие.»
          Спокойно, с причиной, без оскорблений. Это — возражение!

          '
        uk: «Я розумію, що тобі подобаються собаки. Але мій кіт мурмуртить, коли я приходжу додому — на мою думку, це теж
          дружелюбство.» Спокійно, з причиною, без образ. Це — заперечення!
        en: '"I understand that you like dogs. But my cat purrs when I come home - I think that''s friendliness too." Calm,
          with a reason, no insults. That''s an objection!'
    - id: '28'
      type: speech
      duration_sec: 10
      text:
        ru: 'Сейчас покажу нападки — а вы выберете лучший из двух ответов. Один грубый, другой классный. Поехали!

          '
        uk: Зараз покажу нападки — а ви виберете кращий з двох ответів. Один грубий, другий класний. Поїхали!
        en: Now I'll show you attacks - and you pick the better of two responses. One is rude, one is cool. Let's go!
    - id: '29'
      type: speech
      duration_sec: 12
      text:
        ru: 'Макс рассказывает, что ходит на уроки скрипки и обожает классику. Одноклассник фыркает: «Классика? Это музыка
          для стариков!»

          '
        uk: 'Макс розповідає, що ходить на уроки скрипки й обожнює класику. Однокласник фиркає: «Класика? Це музика для стариків!»'
        en: 'Max tells everyone he takes violin lessons and loves classical music. A classmate snorts: ''Classical? That''s
          old people''s music!'''
    - id: '30'
      type: vote
      duration_sec: 15
      text:
        ru: 'Что ответит Макс?

          '
        uk: Що відповість Макс?
        en: What will Max say?
      options:
      - id: opt_1
        text:
          ru: Сам ты старик! Рэп — вообще не музыка!
          uk: Сам ти старик! Рок — взагалі не музика!
          en: You're the old one! Rock isn't even real music!
      - id: opt_2
        text:
          ru: Мне нравится классика — красивые мелодии и сложные инструменты.
          uk: Мені подобається класика — красиві мелодії й складні інструменти.
          en: I like classical music - beautiful melodies and complex instruments.
      correct: opt_2
    - id: '31'
      type: speech
      duration_sec: 12
      text:
        ru: 'Второй! Спокойно и с причиной — красивые мелодии. Первый — зеркальная нападка: обидел в ответ, а музыку так и
          не обсудили.

          '
        uk: 'Другий! Спокійно й з причиною — красиві мелодії. Перший — дзеркальна нападка: обідив у ответ, а музику так й
          не обговорили.'
        en: 'Second! Calm and with a reason - beautiful melodies. First is a mirror attack: insulting back instead of discussing
          music.'
    - id: '32'
      type: speech
      duration_sec: 12
      text:
        ru: 'Лена тихо признаётся друзьям, что иногда боится темноты и спит с ночником. Кто-то тут же смеётся: «Боишься темноты?
          Ты что, малыш?»

          '
        uk: 'Лена тихо признає друзям, що іноді боїться темноти й спить з ночником. Хто-небудь тут же сміється: «Боїшся темноти?
          Ти що, малюк?»'
        en: 'Lena quietly admits to her friends that sometimes she''s afraid of the dark and sleeps with a nightlight. Someone
          immediately laughs: ''Afraid of the dark? Are you a baby?'''
    - id: '33'
