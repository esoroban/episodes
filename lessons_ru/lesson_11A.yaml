  - scene_id: sc3
    title:
      ru: ИСТОРИЯ — САША УЧИТСЯ ВОЗРАЖАТЬ
      uk: ІСТОРІЯ — САША НАВЧАЄТЬСЯ ЗАПЕРЕЧУВАТИ
      en: STORY - SASHA LEARNS TO OBJECT
    media_ref: 11A.sc3.story_sasha_objection
    status: v3_locked
    steps:
    - id: '54'
      type: speech
      duration_sec: 15
      text:
        ru: 'А сейчас — история. Настоящая, из жизни одного класса. Главные герои — Дмитрик, Саша, Витя и Оленка. Запоминайте,
          кто что скажет — потом спрошу!

          '
        uk: А зараз — історія. Справжня, з життя одного класу. Головні герої — Дмитрик, Саша, Вітя й Оленка. Запам'ятовуйте,
          хто що скаже — потім запитаю!
        en: Now comes a story. A real one, from a classroom. The main characters are Dmitrik, Sasha, Vitya, and Olenka. Remember
          who says what - I'll ask you later!
    - id: '55'
      type: speech
      duration_sec: 15
      text:
        ru: 'На перемене Дмитрик заявляет: «Футбол — лучший спорт на планете! Кто не согласен — тот просто не умеет играть.»
          Сказал это громко, на весь коридор.

          '
        uk: 'На перерві Дмитрик заявляє: «Футбол — найкращий спорт на планеті! Хто не згідний — той просто не вміє грати.»
          Сказав це голосно, на весь коридор.'
        en: 'At break time, Dmitrik announces: ''Football is the best sport on the planet! Whoever disagrees just doesn''t
          know how to play.'' He said it loudly, for the whole hallway to hear.'
    - id: '56'
      type: speech
      duration_sec: 15
      text:
        ru: 'Саша обожает баскетбол. Услышал Дмитрика — и взорвался: «Ты дурак! Футбол — это просто бегать за мячом! Баскетбол
          в сто раз круче!»

          '
        uk: 'Саша обожнює баскетбол. Почув Дмитрика — й вибухнув: «Ти дурень! Футбол — це просто бігати за м''ячем! Баскетбол
          в сто разів круче!»'
        en: 'Sasha loves basketball. When he heard Dmitrik, he exploded: ''You''re an idiot! Football is just running after
          a ball! Basketball is a hundred times cooler!'''
    - id: '57'
      type: speech
      duration_sec: 14
      text:
        ru: 'Дмитрик покраснел. Витя покраснел. Оленка закрыла лицо ладонью. Вокруг собралась толпа — все ждали, что будет
          дальше. Спойлер: ничего хорошего.

          '
        uk: 'Дмитрик почервонів. Вітя почервонів. Оленка закрила обличчя ладонею. Навколо зібралася толпа — все чекали, що
          буде далі. Спойлер: нічого хорошого.'
        en: 'Dmitrik turned red. Vitya turned red. Olenka covered her face with her hand. A crowd gathered - everyone waiting
          to see what happens next. Spoiler: nothing good.'
    - id: '58'
      type: speech
      duration_sec: 15
      text:
        ru: 'Дмитрик ответил: «Сам ты дурак! В баскетболе даже правил нормальных нет!» Саша: «Есть! Ты просто тупой!» Витя
          тихо сказал: «Ребята...» Его никто не услышал.

          '
        uk: 'Дмитрик відповів: «Сам ти дурень! У баскетболі навіть нормальних правил немає!» Саша: «Є! Ти просто тупий!» Вітя
          тихо сказав: «Ребята...» Його ніхто не почув.'
        en: 'Dmitrik replied: ''You''re the idiot! Basketball doesn''t even have real rules!'' Sasha: ''It does! You''re just
          stupid!'' Vitya quietly said: ''Guys...'' Nobody heard him.'
    - id: '59'
      type: speech
      duration_sec: 14
      text:
        ru: 'Оленка не выдержала. Встала между ними и сказала: «Стоп. Саша, ты сейчас напал на Дмитрика, а не на его аргумент.
          "Ты дурак" — это не возражение.»

          '
        uk: 'Оленка не витримала. Встала між ними й сказала: «Стоп. Саша, ти зараз напав на Дмитрика, а не на його аргумент.
          "Ти дурень" — це не заперечення.»'
        en: 'Olenka couldn''t stand it anymore. She stood between them and said: ''Stop. Sasha, you just attacked Dmitrik,
          not his argument. "You''re an idiot" - that''s not an objection.'''
    - id: '60'
      type: speech
      duration_sec: 15
      text:
        ru: 'Саша удивился: «А что, нельзя сказать, что он неправ?» Оленка: «Можно! Но не так. Шаг первый — выслушай. Дмитрик
          сказал, что футбол лучший. Ты выслушал? Нет, ты сразу закричал.»

          '
        uk: 'Саша здивувався: «А що, нельзя сказати, що він неправ?» Оленка: «Можна! Але не так. Крок перший — вислухай. Дмитрик
          сказав, що футбол найкращий. Ти вислухав? Ні, ти одразу закричав.»'
        en: 'Sasha was surprised: ''But can''t I say he''s wrong?'' Olenka: ''You can! But not like that. Step one - listen.
          Dmitrik said football is the best. Did you listen? No, you just yelled right away.'''
    - id: '61'
      type: speech
      duration_sec: 15
      text:
        ru: '«Шаг второй — покажи, что понял. Скажи: "Я понимаю, тебе нравится футбол." Шаг третий — скажи своё мнение с причиной:
          "Но мне кажется, баскетбол тоже крутой, потому что там нужна точность бросков."»

          '
        uk: '«Крок другий — покажи, що розумієш. Скажи: "Я розумію, що тобі подобається футбол." Крок третій — скажи свою
          думку з причиною: "Але мені здається, баскетбол теж крутий, тому що там потрібна точність кидків."»'
        en: '"Step two - show you understand. Say: ''I understand that you like football.'' Step three - give your opinion
          with a reason: ''But I think basketball is cool too, because it requires precise shooting.''"'
    - id: '62'
      type: speech
      duration_sec: 14
      text:
        ru: 'Саша попробовал: «Дмитрик, я понимаю, что тебе нравится футбол. Но мне кажется, баскетбол тоже крутой, потому
          что... э-э-э... потому что мяч оранжевый?» Все засмеялись.

          '
        uk: 'Саша спробував: «Дмитрик, я розумію, що тобі подобається футбол. Але мені здається, баскетбол теж крутий, тому
          що... е-е-е... тому що м''яч оранжевий?» Усі засміялися.'
        en: 'Sasha tried: ''Dmitrik, I understand that you like football. But I think basketball is cool too, because... um...
          because the ball is orange?'' Everyone laughed.'
    - id: '63'
      type: speech
      duration_sec: 14
      text:
        ru: 'Оленка улыбнулась: «Почти! "Мяч оранжевый" — это не совсем причина. Попробуй ещё раз.» Саша подумал и сказал:
          «...потому что нужна точность, скорость и умение работать в команде.»

          '
        uk: 'Оленка посміхнулася: «Майже! "М''яч оранжевий" — це не зовсім причина. Спробуй ще раз.» Саша подумав і сказав:
          «...тому що потрібна точність, швидкість і вміння працювати в команді.»'
        en: 'Olenka smiled: ''Almost! "The ball is orange" - that''s not really a reason. Try again.'' Sasha thought and said:
          ''...because it requires precision, speed, and teamwork.'''
    - id: '64'
      type: speech
      duration_sec: 14
      text:
        ru: 'Дмитрик кивнул: «Ну ладно, в баскетболе тоже есть кое-что крутое. Но в футболе команда больше!» Витя: «Вот это
          уже разговор, а не крики!» Оленка добавила: «Видите? Никто никого не обозвал — и оба остались друзьями.»

          '
        uk: 'Дмитрик кивнув: «Ну гаразд, у баскетболі теж є щось крутое. Але у футболі команда більша!» Вітя: «Ось це вже
          розмова, а не крики!» Оленка додала: «Бачите? Ніхто нікого не обзивав — і обидва залишилися друзями.»'
        en: 'Dmitrik nodded: ''Okay, basketball does have some cool things. But in football the team is bigger!'' Vitya: ''Now
          that''s a conversation, not yelling!'' Olenka added: ''See? Nobody insulted anybody - and they''re still friends.'''
    - id: '65'
      type: vote
      duration_sec: 15
      text:
        ru: 'Что было главной ошибкой Саши в начале?

          '
        uk: Яка була головна помилка Саші на початку?
        en: What was Sasha's main mistake at the start?
      options:
      - id: opt_1
        text:
          ru: Он говорил слишком тихо
          uk: Він говорив занадто тихо
          en: He spoke too quietly
      - id: opt_2
        text:
          ru: Он напал на Дмитрика, а не на аргумент
          uk: Він напав на Дмитрика, а не на аргумент
          en: He attacked Dmitrik, not his argument
      - id: opt_3
        text:
          ru: Он не знал правил футбола
          uk: Він не знав правил футболу
          en: He didn't know the rules of football
      correct: opt_2
    - id: '66'
      type: speech
      duration_sec: 14
      text:
        ru: 'Он напал на человека! «Ты дурак» — это не про футбол и не про баскетбол. Это удар по Дмитрику. А Оленка показала:
          можно не согласиться, не обидев.

          '
        uk: 'Він напав на людину! «Ти дурень» — це не про футбол і не про баскетбол. Це удар по Дмитрику. А Оленка показала:
          можна не згідні, не ображаючи.'
        en: 'He attacked the person! ''You''re an idiot'' - that''s not about football or basketball. That''s a blow to Dmitrik.
          But Olenka showed: you can disagree without insulting.'
  - scene_id: sc4
    title:
      ru: ЧТО ТАКОЕ ВОЗРАЖЕНИЕ
      uk: ЩО ТАКЕ ЗАПЕРЕЧЕННЯ
      en: WHAT IS AN OBJECTION
    media_ref: 11A.sc4.what_is_objection
    status: v3_locked
    steps:
    - id: '67'
      type: speech
      duration_sec: 15
      text:
        ru: 'Итак, Оленка показала Саше правильный путь. Давайте разберёмся, что именно она сделала — и запомним это как формулу.
          Что такое возражение?

          '
        uk: Отже, Оленка показала Саші правильний шлях. Давайте розберемося, що саме вона зробила — і запам'ятаємо це як формулу.
          Що таке заперечення?
        en: So Olenka showed Sasha the right way. Let's understand what exactly she did - and remember it as a formula. What
          is an objection?
    - id: '68'
      type: speech
      duration_sec: 15
      text:
        ru: 'Возражение — это обоснованный ответ на аргумент собеседника. Не просто «нет!», а «нет, и вот почему...». Одно
          слово меняет всё — «потому что».

          '
        uk: Заперечення — це обґрунтована відповідь на аргумент співрозмовника. Не просто «ні!», а «ні, і ось чому...». Одне
          слово змінює все — «тому що».
        en: An objection is a reasoned response to someone's argument. Not just 'no!' but 'no, and here's why...' One word
          changes everything - 'because.'
    - id: '69'
      type: speech
      duration_sec: 15
      text:
        ru: 'Важное правило: сначала выслушай полностью, потом отвечай! Если перебиваешь — не понимаешь, что человек хотел
          сказать. Если не дослушал — возражаешь не на то.

          '
        uk: 'Важливе правило: спочатку вислухай повністю, потім відповідай! Якщо перебиваєш — не розумієш, що людина хотіла
          сказати. Якщо не дослухав — заперечуєш не на те.'
        en: 'Important rule: listen all the way first, then respond! If you interrupt - you don''t understand what they wanted
          to say. If you don''t listen fully - you''re objecting to the wrong thing.'
    - id: '70'
      type: speech
      duration_sec: 15
      text:
        ru: 'Структура возражения — четыре шага. Первый: «Ты говоришь, что...» — повтори мысль собеседника. Так он видит,
          что ты его услышал, а не пропустил мимо ушей.

          '
        uk: 'Структура заперечення — чотири кроки. Перший: «Ти говориш, що...» — повтори думку співрозмовника. Так він бачить,
          що ти його почув, а не пропустив повз вухо.'
        en: 'The structure of an objection has four steps. First: ''You''re saying that...'' - repeat their idea. That shows
          they heard you, not that you ignored them.'
    - id: '71'
      type: speech
      duration_sec: 15
      text:
        ru: 'Второй: «Я понимаю твою мысль.» — покажи уважение. Третий: «Но я считаю, что...» — скажи своё мнение. Четвёртый:
          «...потому что...» — дай причину.

          '
        uk: 'Другий: «Я розумію твою думку.» — покажи поважання. Третій: «Але я вважаю, що...» — скажи свою думку. Четвертий:
          «...тому що...» — дай причину.'
        en: 'Second: ''I understand your idea.'' - show respect. Third: ''But I think that...'' - give your opinion. Fourth:
          ''...because...'' - give a reason.'
    - id: '72'
      type: speech
      duration_sec: 15
      text:
        ru: 'Пример. Друг говорит: «Уроки надо делать сразу после школы.» Возражение: «Ты говоришь, что лучше сразу. Я понимаю
          — не хочется откладывать. Но я считаю, что сначала нужен отдых, потому что усталый человек учится хуже.»

          '
        uk: 'Приклад. Друг говорить: «Уроки надо робити одразу після школи.» Заперечення: «Ти говориш, що краще одразу. Я
          розумію — не хочеться відкладати. Але я вважаю, що спочатку потрібен відпочинок, тому що втомлена людина вчиться
          гірше.»'
        en: 'Example. A friend says: ''You should do homework right after school.'' Objection: ''You''re saying it''s better
          to do it right away. I understand - you don''t want to put it off. But I think you need a break first, because a
          tired person learns worse.'''
    - id: '73'
      type: vote
      duration_sec: 15
      text:
        ru: 'Сколько шагов в структуре возражения?

          '
        uk: Скільки кроків у структурі заперечення?
        en: How many steps are in the structure of an objection?
      options:
      - id: opt_1
        text:
          ru: Два
          uk: Два
          en: Two
      - id: opt_2
        text:
          ru: Три
          uk: Три
          en: Three
      - id: opt_3
        text:
          ru: Четыре
          uk: Чотири
          en: Four
      correct: opt_3
    - id: '74'
      type: speech
      duration_sec: 12
      text:
        ru: 'Четыре! Повтори мысль, покажи уважение, скажи своё мнение, дай причину. Четыре шага — и ты возражаешь как профессионал.

          '
        uk: Чотири! Повтори думку, покажи поважання, скажи свою думку, дай причину. Чотири кроки — й ти заперечуєш як професіонал.
        en: Four! Repeat their idea, show respect, give your opinion, provide a reason. Four steps - and you're objecting
          like a professional.
  - scene_id: sc5
    title:
      ru: ПРАКТИКА — ВОЗРАЖЕНИЕ ИЛИ НАПАДКА? (Раунд 1)
      uk: ПРАКТИКА — ЗАПЕРЕЧЕННЯ ЧИ НАПАДКА? (Раунд 1)
      en: PRACTICE - OBJECTION OR ATTACK? (Round 1)
    media_ref: 11A.sc5.practice_round1
    status: v3_locked
    steps:
    - id: '75'
      type: speech
      duration_sec: 12
      text:
        ru: 'Время практики! Я скажу фразу — а вы решите: это правильное возражение или нападка на человека?

          '
        uk: 'Час практики! Я скажу фразу — а ви вирішите: це правильне заперечення чи нападка на людину?'
        en: 'Time to practice! I''ll say a phrase - and you decide: is that a proper objection or an attack on the person?'
    - id: '76'
      type: vote
      duration_sec: 12
      text:
        ru: '«Ты неправ — твоя идея не сработает в дождь.»

          '
        uk: «Ти неправ — твоя ідея не спрацює у дощ.»
        en: '"You''re wrong - your idea won''t work in the rain."'
      options:
      - id: opt_1
        text:
          ru: Правильное возражение
          uk: Правильне заперечення
          en: Proper objection
      - id: opt_2
        text:
          ru: Нападка на человека
          uk: Нападка на людину
          en: Attack on the person
      correct: opt_1
    - id: '77'
      type: speech
      duration_sec: 12
      text:
        ru: 'Возражение! Есть конкретная причина — «не сработает в дождь». Критикует идею, а не человека. Может, грубовато,
          но по делу.

          '
        uk: Заперечення! Є конкретна причина — «не спрацює у дощ». Критикує ідею, а не людину. Може, грубувато, але по справі.
        en: Objection! There's a specific reason - 'won't work in the rain.' Criticizing the idea, not the person. Maybe a
          bit rough, but on point.
    - id: '78'
      type: vote
      duration_sec: 12
      text:
        ru: '«Только глупые так думают!»

          '
        uk: «Тільки глупі так думають!»
        en: '"Only stupid people think that!"'
      options:
      - id: opt_1
        text:
          ru: Правильное возражение
          uk: Правильне заперечення
          en: Proper objection
      - id: opt_2
        text:
          ru: Нападка на человека
          uk: Нападка на людину
          en: Attack on the person
      correct: opt_2
    - id: '79'
      type: speech
      duration_sec: 12
      text:
        ru: 'Нападка! Оскорбление без единой причины. «Глупые» — это про людей, а не про идею. Ноль аргументов, сто процентов
          обиды.

          '
        uk: Нападка! Образ без єдиної причини. «Глупі» — це про людей, а не про ідею. Нуль аргументів, сто процентів образи.
        en: Attack! An insult with no reason at all. 'Stupid' is about people, not the idea. Zero arguments, 100% insult.
    - id: '80'
      type: vote
      duration_sec: 12
      text:
        ru: '«Я понимаю, что тебе это нравится, но мне кажется, есть вариант получше.»

          '
        uk: «Я розумію, що тобі це подобається, але мені здається, є варіант краще.»
        en: '"I understand that you like that, but I think there''s a better option."'
      options:
      - id: opt_1
        text:
          ru: Правильное возражение
          uk: Правильне заперечення
          en: Proper objection
      - id: opt_2
        text:
          ru: Нападка на человека
          uk: Нападка на людину
          en: Attack on the person
      correct: opt_1
    - id: '81'
      type: speech
      duration_sec: 12
      text:
        ru: 'Возражение! Вежливо и с уважением. «Я понимаю» — показывает, что выслушал. «Мне кажется» — мягко подаёт свою
          позицию. Учебник вежливости!

          '
        uk: Заперечення! Ввічливо й з повагою. «Я розумію» — показує, що вислухав. «Мені здається» — м'яко подає свою позицію.
          Підручник ввічливості!
        en: Objection! Polite and respectful. 'I understand' - shows you listened. 'I think' - softly presents your view.
          A textbook in politeness!
    - id: '82'
      type: vote
      duration_sec: 12
      text:
        ru: '«Ты в этом вообще ничего не понимаешь!»

          '
        uk: «Ти в цьому взагалі нічого не розумієш!»
        en: '"You don''t understand anything about this!"'
      options:
      - id: opt_1
        text:
          ru: Правильное возражение
          uk: Правильне заперечення
          en: Proper objection
      - id: opt_2
        text:
          ru: Нападка на человека
          uk: Нападка на людину
          en: Attack on the person
      correct: opt_2
    - id: '83'
      type: speech
      duration_sec: 12
      text:
        ru: 'Нападка! Оскорбление компетентности. Вместо «вот почему правило другое» — просто «ты не понимаешь». Аргумент
          не появился, зато обида — пожалуйста.

          '
        uk: Нападка! Образ компетентності. Замість «ось чому правило інше» — просто «ти не розумієш». Аргумент не з'явився,
          зато образа — будь ласка.
        en: Attack! An insult to their understanding. Instead of 'here's why the rule is different' - just 'you don't understand.'
          No argument appeared, but plenty of hurt feelings.
    - id: '84'
      type: vote
      duration_sec: 12
      text:
        ru: '«Ты говоришь, что кошки ленивы. Но мой кот носится по квартире каждое утро!»

          '
        uk: «Ти говориш, що коти ледачі. Але мій кіт бігає по квартирі кожного ранку!»
        en: '"You''re saying cats are lazy. But my cat runs around the apartment every morning!"'
      options:
      - id: opt_1
        text:
          ru: Правильное возражение
          uk: Правильне заперечення
          en: Proper objection
      - id: opt_2
        text:
          ru: Нападка на человека
          uk: Нападка на людину
          en: Attack on the person
      correct: opt_1
    - id: '85'
      type: speech
      duration_sec: 12
      text:
        ru: 'Возражение! Контрпример — мощное оружие. «Мой кот активный» опровергает утверждение фактом. Никого не обидел,
          зато доказал свою точку.

          '
        uk: Заперечення! Контрприклад — потужна зброя. «Мій кіт активний» опровергає твердження фактом. Нікого не обідив,
          зато довів свою точку.
        en: Objection! A counterexample - powerful weapon. 'My cat is active' disproves the claim with facts. Didn't insult
          anyone, but proved the point.
  - scene_id: sc6
    title:
      ru: ВОЗРАЖЕНИЕ VS НАПАДКА — СРАВНЕНИЕ
      uk: ЗАПЕРЕЧЕННЯ VS НАПАДКА — ПОРІВНЯННЯ
      en: OBJECTION VS ATTACK - COMPARISON
    media_ref: 11A.sc6.objection_vs_attack
    status: v3_locked
    steps:
    - id: '86'
      type: speech
      duration_sec: 15
      text:
        ru: 'Давайте зафиксируем разницу раз и навсегда. Возражение — критикуешь аргумент, объясняешь почему, тон вежливый.
          Пример: «Твоя идея не сработает, потому что...»

          '
        uk: 'Давайте зафіксуємо різницю раз і навсіки. Заперечення — критикуєш аргумент, пояснюєш чому, тон ввічливий. Приклад:
          «Твоя ідея не спрацює, тому що...»'
        en: 'Let''s lock in the difference once and for all. Objection - you criticize the argument, explain why, tone is
          polite. Example: ''Your idea won''t work because...'''
    - id: '87'
      type: speech
      duration_sec: 15
      text:
        ru: 'Нападка — критикуешь человека, просто оскорбляешь, тон грубый. Примеры: «Ты дурак!», «С тобой невозможно разговаривать!»
          Запомните: можно не согласиться с мыслью — нельзя оскорблять человека.

          '
        uk: 'Нападка — критикуєш людину, просто образаєш, тон грубий. Приклади: «Ти дурень!», «З тобою неможна розмовляти!»
          Запам''ятайте: можна не згідні з думкою — нельзя образити людину.'
        en: 'Attack - you criticize the person, just insult them, tone is rude. Examples: ''You''re an idiot!'' ''I can''t
          talk to you!'' Remember: you can disagree with a thought - you can''t insult a person.'
    - id: '88'
      type: speech
      duration_sec: 15
      text:
        ru: 'Вот фразы-помощники для возражения. Запоминайте: «Я не согласен с этой идеей...», «Мне кажется, здесь есть ошибка...»,
          «Я понимаю тебя, но думаю иначе...», «Это интересно, но...»

          '
        uk: 'Ось фрази-помічники для заперечення. Запам''ятовуйте: «Я не згідний з цією ідеєю...», «Мені здається, тут є помилка...»,
          «Я розумію тебе, але думаю інакше...», «Це цікаво, але...»'
        en: 'Here are some helpful phrases for objecting. Remember them: ''I disagree with that idea...'' ''I think there''s
          a mistake...'' ''I understand you, but I think differently...'' ''That''s interesting, but...'''
    - id: '89'
      type: speech
      duration_sec: 15
      text:
        ru: 'А вот фразы-маркеры нападки. Если слышите такое — знайте, это не аргумент: «Ты дурак!», «Только глупые так думают!»,
          «С тобой бесполезно спорить!», «Ты ничего не понимаешь!»

          '
        uk: 'А ось фрази-маркери нападки. Якщо чуєш такое — знай, це не аргумент: «Ти дурень!», «Тільки глупі так думають!»,
          «З тобою марно спорити!», «Ти нічого не розумієш!»'
        en: 'And here are attack markers. If you hear these - know it''s not an argument: ''You''re an idiot!'' ''Only stupid
          people think that!'' ''There''s no point arguing with you!'' ''You don''t understand anything!'''
    - id: '90'
      type: vote
      duration_sec: 15
      text:
        ru: '«Ты говоришь ерунду, потому что не читал правила.»

          '
        uk: «Ти говориш ерунду, тому що не читав правила.»
        en: '"You''re talking nonsense because you haven''t read the rules."'
      options:
      - id: opt_1
        text:
          ru: Возражение (грубоватое, но по делу)
          uk: Заперечення (грубуватое, але по справі)
          en: Objection (rough, but on point)
      - id: opt_2
        text:
          ru: Нападка на человека
          uk: Нападка на людину
          en: Attack on the person
      correct: opt_1
    - id: '91'
      type: speech
      duration_sec: 12
      text:
        ru: 'Грубоватое, но возражение! Есть причина — «не читал правила». Грубость в тоне — не то же самое, что нападка.
          Нападка — когда причины нет вообще, а есть только оскорбление.

          '
        uk: Грубуватое, але заперечення! Є причина — «не читав правила». Грубість у тоні — не те ж саме, що нападка. Нападка
          — коли причини немає взагалі, а є тільки образа.
        en: Rough, but an objection! There's a reason - 'didn't read the rules.' Roughness in tone isn't the same as an attack.
          An attack is when there's no reason at all, just insult.
  - scene_id: sc7
    title:
      ru: ПРАКТИКА — ВОЗРАЖЕНИЕ ИЛИ НАПАДКА? (Раунд 2)
      uk: ПРАКТИКА — ЗАПЕРЕЧЕННЯ ЧИ НАПАДКА? (Раунд 2)
      en: PRACTICE - OBJECTION OR ATTACK? (Round 2)
    media_ref: 11A.sc7.practice_round2
    status: v3_locked
    steps:
    - id: '92'
      type: speech
      duration_sec: 12
      text:
        ru: 'Второй раунд! Теперь будет хитрее — некоторые фразы звучат вежливо, но внутри прячется нападка. Или наоборот
          — грубовато, но по делу.

          '
        uk: Другий раунд! Тепер буде хитріше — деякі фрази звучать ввічливо, але всередині приховується нападка. Або навпаки
          — грубовато, але по справі.
        en: Second round! Now it gets trickier - some phrases sound polite, but hide an attack inside. Or the opposite - rough,
          but on point.
    - id: '93'
      type: vote
      duration_sec: 12
      text:
        ru: '«Твоя идея интересна, но не учитывает одну важную вещь — на это нужно слишком много времени.»

          '
        uk: «Твоя ідея цікава, але не враховує одну важливу річ — на це потрібно занадто багато часу.»
        en: '"Your idea is interesting, but it doesn''t account for one important thing - it takes too much time."'
      options:
      - id: opt_1
        text:
          ru: Правильное возражение
          uk: Правильне заперечення
          en: Proper objection
      - id: opt_2
        text:
          ru: Нападка на человека
          uk: Нападка на людину
          en: Attack on the person
      correct: opt_1
    - id: '94'
      type: speech
      duration_sec: 12
      text:
        ru: 'Возражение! Идею похвалили, причину дали — «слишком много времени». Критикует план, а не человека. Образцовый
          ответ.

          '
        uk: Заперечення! Ідею похвалили, причину дали — «занадто багато часу». Критикує план, а не людину. Зразковий ответ.
        en: Objection! They praised the idea, gave a reason - 'takes too much time.' Criticizing the plan, not the person.
          Exemplary response.
    - id: '95'
      type: vote
      duration_sec: 12
      text:
        ru: '«Ты всегда говоришь глупости!»

          '
        uk: «Ти завжди говориш глупості!»
        en: '"You always talk nonsense!"'
      options:
      - id: opt_1
        text:
          ru: Правильное возражение
          uk: Правильне заперечення
          en: Proper objection
      - id: opt_2
        text:
          ru: Нападка на человека
          uk: Нападка на людину
          en: Attack on the person
      correct: opt_2
    - id: '96'
      type: speech
      duration_sec: 12
      text:
        ru: 'Нападка! «Всегда» и «глупости» — двойной удар по человеку. Ни одного слова о конкретной идее. Чистая атака, ноль
          содержания.

          '
        uk: Нападка! «Завжди» й «глупості» — подвійний удар по людині. Ні слова про конкретну ідею. Чиста атака, нуль змісту.
        en: Attack! 'Always' and 'nonsense' - a double blow to the person. Not a word about the actual idea. Pure attack,
          zero content.
    - id: '97'
      type: vote
      duration_sec: 12
      text:
        ru: '«Я понимаю твою точку зрения, но факты говорят иное — вчера шёл дождь, а не снег.»

          '
        uk: «Я розумію твою точку зору, але факти говорять інше — вчора йшов дощ, а не сніг.»
        en: '"I understand your point of view, but the facts say otherwise - yesterday it rained, not snowed."'
      options:
      - id: opt_1
        text:
          ru: Правильное возражение
          uk: Правильне заперечення
          en: Proper objection
      - id: opt_2
        text:
          ru: Нападка на человека
          uk: Нападка на людину
          en: Attack on the person
      correct: opt_1
    - id: '98'
      type: speech
      duration_sec: 12
      text:
        ru: 'Возражение! Уважение к собеседнику плюс конкретный факт. «Вчера шёл дождь» — проверяемая информация. Железный
          аргумент!

          '
        uk: Заперечення! Поважання до співрозмовника плюс конкретний факт. «Вчора йшов дощ» — перевіряється інформація. Залізний
          аргумент!
        en: Objection! Respect for the other person plus a specific fact. 'Yesterday it rained' - verifiable information.
          Iron-solid argument!
    - id: '99'
      type: vote
      duration_sec: 12
      text:
        ru: '«Да что ты вообще понимаешь в жизни!»

          '
        uk: «Та що ти взагалі розумієш у житті!»
        en: '"What do you even know about life!"'
      options:
      - id: opt_1
        text:
          ru: Правильное возражение
          uk: Правильне заперечення
          en: Proper objection
      - id: opt_2
        text:
          ru: Нападка на человека
          uk: Нападка на людину
          en: Attack on the person
      correct: opt_2
    - id: '100'
      type: speech
      duration_sec: 12
      text:
        ru: 'Нападка! «Что ты понимаешь в жизни» — унижение жизненного опыта. Такое говорят, когда аргументов не осталось,
          а обидеть хочется.

          '
        uk: Нападка! «Що ти розумієш у житті» — принизження життєвого досвіду. Так говорять, коли аргументів більше не залишилось,
          а образити хочеться.
        en: Attack! 'What do you know about life' - insulting life experience. People say that when they've run out of arguments
          but still want to hurt.
    - id: '101'
      type: vote
      duration_sec: 12
      text:
        ru: '«Этот аргумент не работает, потому что есть исключения — мой дедушка, например.»

          '
        uk: «Цей аргумент не спрацює, тому що є винятки — мій дідусь, наприклад.»
        en: '"That argument doesn''t work because there are exceptions - my grandfather, for example."'
      options:
      - id: opt_1
        text:
          ru: Правильное возражение
          uk: Правильне заперечення
          en: Proper objection
      - id: opt_2
        text:
          ru: Нападка на человека
          uk: Нападка на людину
          en: Attack on the person
      correct: opt_1
    - id: '102'
      type: speech
      duration_sec: 12
      text:
        ru: 'Возражение! Контрпример из жизни — мощный ход. Критикует аргумент, приводит доказательство. Дедушка был бы горд.

          '
        uk: Заперечення! Контрприклад з життя — потужний хід. Критикує аргумент, приносить доказ. Дідусь був би гордий.
        en: Objection! A real-life counterexample - powerful move. Criticizes the argument, provides proof. Grandpa would
          be proud.
  - scene_id: sc8
    title:
      ru: 'ОТКРЫТАЯ ПРАКТИКА: ПЕРЕДЕЛАЙ НАПАДКУ'
      uk: 'ВІДКРИТА ПРАКТИКА: ПЕРЕРОБИТИ НАПАДКУ'
      en: 'OPEN PRACTICE: TRANSFORM AN ATTACK'
    media_ref: 11A.sc8.open_practice
    status: v3_locked
    steps:
    - id: '103'
      type: speech
      duration_sec: 15
      text:
        ru: 'Вы уже отличаете нападку от возражения. Теперь задача посложнее — берём нападку и сами переделываем в возражение.
          Вспоминайте структуру: понимание + своё мнение + причина.

          '
        uk: 'Ви вже розрізняєте нападку від заперечення. Тепер завдання складніше — беремо нападку й самі переробляємо на
          заперечення. Пам''ятайте структуру: розуміння + своя думка + причина.'
        en: 'You already tell the difference between an attack and an objection. Now the task is harder - take an attack and
          transform it into an objection yourself. Remember the structure: understanding + your opinion + reason.'
    - id: '104'
      type: discussion
      duration_sec: 25
      text:
        ru: '«Ты ничего не понимаешь в спорте!» — как переделать в возражение? Подсказка: можно признать, что знаешь не всё.

          '
        uk: '«Ти нічого не розумієш у спорті!» — як переробити на заперечення? Підказка: можна признати, що знаєш не все.'
        en: '"You don''t understand anything about sports!" - how to turn that into an objection? Hint: you can admit you
          don''t know everything.'
    - id: '105'
      type: speech
      duration_sec: 12
      text:
        ru: 'Например: «Я знаю не всё, но в футболе мяч круглый — удивить может любая команда.» Признал неидеальность — и
          дал аргумент.

          '
        uk: 'Наприклад: «Я знаю не все, але у футболі м''яч круглий — здивувати може будь-яка команда.» Признав неідеальність
          — й дав аргумент.'
        en: 'For example: ''I don''t know everything, but in football the ball is round - any team can surprise.'' Admitted
          imperfection - and gave an argument.'
    - id: '106'
      type: discussion
      duration_sec: 25
      text:
        ru: '«Только малыши боятся темноты!» — переделайте. Подсказка: а кто ещё боится?

          '
        uk: '«Тільки малюки бояться темноти!» — переробіть. Підказка: а хто ще боїться?'
        en: '"Only babies are afraid of the dark!" - transform it. Hint: who else is afraid?'
    - id: '107'
      type: speech
      duration_sec: 12
      text:
        ru: 'Например: «Бояться темноты может любой — дело не в возрасте, а в обстановке. Даже взрослые включают ночник.»
          Факт вместо обзывательства.

          '
        uk: 'Наприклад: «Бояться темноти може будь-хто — справа не у віці, а в обстановці. Навіть дорослі включають ночник.»
          Факт замість образ.'
        en: 'For example: ''Anyone can be afraid of the dark - it''s not about age, it''s about the situation. Even adults
          use nightlights.'' Facts instead of insults.'
    - id: '108'
      type: discussion
      duration_sec: 25
      text:
        ru: '«Твоя идея — полная ерунда!» — переделайте. Подсказка: найдите в идее хотя бы один плюс.

          '
        uk: '«Твоя ідея — повна ерунда!» — переробіть. Підказка: знайдіть в ідеї хоч один плюс.'
        en: '"Your idea is total nonsense!" - transform it. Hint: find at least one good thing about the idea.'
    - id: '109'
      type: speech
      duration_sec: 12
      text:
        ru: 'Например: «Идея может быть неидеальной, но у неё есть плюс — она экономит время.» Признал слабость — и указал
          на сильную сторону.

          '
        uk: 'Наприклад: «Ідея може бути неідеальною, але в неї є плюс — вона економить час.» Признав слабість — й указав на
          сильну сторону.'
        en: 'For example: ''The idea might not be perfect, but it has one good point - it saves time.'' Admitted a weakness
          - and pointed out a strength.'
    - id: '110'
      type: discussion
      duration_sec: 25
      text:
        ru: '«С тобой невозможно разговаривать!» — ваш вариант? Подсказка: задайте вопрос вместо обвинения.

          '
        uk: '«З тобою неможна розмовляти!» — ваш варіант? Підказка: задайте питання замість звинувачення.'
        en: '"I can''t talk to you!" - your version? Hint: ask a question instead of accusing.'
    - id: '111'
      type: speech
      duration_sec: 12
      text:
        ru: 'Например: «Давай попробуем сначала — что именно тебя не устроило?» Вместо обвинения — вопрос. Разговор продолжается,
          а не ломается.

          '
        uk: 'Наприклад: «Давай спробуємо спочатку — що саме тебе не задовольнило?» Замість звинувачення — питання. Розмова
          продовжується, а не ломається.'
        en: 'For example: ''Let''s try first - what exactly bothers you?'' A question instead of accusations. The conversation
          continues instead of breaking down.'
    - id: '112'
      type: discussion
      duration_sec: 25
      text:
        ru: '«Ты всегда всё портишь!» — как сказать без нападки? Подсказка: слово «всегда» — правда ли?

          '
        uk: '«Ти завжди все портиш!» — як сказати без нападки? Підказка: слово «завжди» — це правда?'
        en: '"You always ruin everything!" - how to say it without attacking? Hint: is the word ''always'' true?'
    - id: '113'
      type: speech
      duration_sec: 12
      text:
        ru: 'Например: «Иногда не получается. Но в прошлый раз получилось — значит, могу.» Контрпример из жизни побеждает
          слово «всегда».

          '
        uk: 'Наприклад: «Іноді не виходить. Але в минулий раз вийшло — значить, можу.» Контрприклад з життя переважає слово
          «завжди».'
        en: 'For example: ''Sometimes it doesn''t work out. But it worked last time - so I can do it.'' A real-life counterexample
          beats the word ''always.'''
    - id: '114'
      type: discussion
      duration_sec: 25
      text:
        ru: '«Только ленивые не читают книги!» — переделайте. Подсказка: лениться и не любить — одно и то же?

          '
        uk: '«Тільки ледачі не читають книги!» — переробіть. Підказка: лінитися й не любити — одне й те ж?'
        en: '"Only lazy people don''t read books!" - transform it. Hint: is being lazy the same as not liking something?'
    - id: '115'
      type: speech
      duration_sec: 12
      text:
        ru: 'Например: «Читать полезно, согласен. Но лениться и не любить читать — разные вещи.» Разделил два понятия — точный
          ход.

          '
        uk: 'Наприклад: «Читати корисно, згідний. Але лінитися й не любити читати — різні речі.» Розділив два поняття — точний
          хід.'
        en: 'For example: ''Reading is useful, I agree. But being lazy and not liking reading are different things.'' Separated
          two concepts - perfect move.'
    - id: '116'
      type: discussion
      duration_sec: 25
      text:
        ru: '«Ты просто завидуешь!» — ваш вариант? Подсказка: верните разговор к теме.

          '
        uk: '«Ти просто завидуєш!» — ваш варіант? Підказка: поверніть розмову до теми.'
        en: '"You''re just jealous!" - your version? Hint: bring the conversation back to the point.'
    - id: '117'
      type: speech
      duration_sec: 12
      text:
        ru: 'Например: «Мне нечему завидовать — просто вижу другой способ решить задачу.» Спокойно отклонил обвинение и вернулся
          к сути.

          '
        uk: 'Наприклад: «Мені нечому завидувати — просто бачу інший спосіб розв''язати завдання.» Спокійно відклонив звинувачення
          й повернувся до суті.'
        en: 'For example: ''I have nothing to be jealous about - I just see a different way to solve the problem.'' Calmly
          rejected the accusation and got back to the point.'
    - id: '118'
      type: discussion
      duration_sec: 25
      text:
        ru: '«Кто так рисует? Это ужасно!» — переделайте. Подсказка: попросите быть конкретным.

          '
        uk: '«Хто так малює? Це жахливо!» — переробіть. Підказка: попросіть бути конкретним.'
        en: '"Who draws like that? It''s horrible!" - transform it. Hint: ask them to be specific.'
    - id: '119'
      type: speech
      duration_sec: 12
      text:
        ru: 'Например: «Мне нравится мой стиль. Скажи конкретно, что исправить — подумаю.» Просьба быть конкретным — лучшее
          оружие против общих нападок.

          '
        uk: 'Наприклад: «Мне нравится мой стиль. Скажи конкретно, що исправить — подумаю.» Прохання бути конкретним — краща
          зброя проти загальних нападок.'
        en: 'For example: ''I like my style. Be specific about what to fix - I''ll think about it.'' Asking for specifics
          is the best weapon against general attacks.'
    - id: '120'
      type: discussion
      duration_sec: 25
      text:
        ru: '«Ты вечно ноешь!» — как возразить? Подсказка: переименуйте действие.

          '
        uk: '«Ти вічно ноєш!» — як заперечити? Підказка: перейменуйте дію.'
        en: '"You always whine!" - how to object? Hint: rename the action.'
    - id: '121'
      type: speech
      duration_sec: 12
      text:
        ru: 'Например: «Я не ною — я говорю, что мне не нравится. Это разные вещи.» Переименовал действие — и нападка рассыпалась.

          '
        uk: 'Наприклад: «Я не ною — я говорю, що мне не подобається. Це різні речи.» Перейменував дію — й нападка розпалась.'
        en: 'For example: ''I''m not whining - I''m saying what I don''t like. Those are different things.'' Renamed the action
          - the attack falls apart.'
    - id: '122'
      type: discussion
      duration_sec: 25
      text:
        ru: '«Только глупые люди верят в это!» — переделайте. Подсказка: предложите аргумент вместо ярлыка.

          '
        uk: '«Тільки глупі люди вірять у це!» — переробіть. Підказка: пропонуйте аргумент замість ярлика.'
        en: '"Only stupid people believe that!" - transform it. Hint: offer an argument instead of a label.'
    - id: '123'
      type: speech
      duration_sec: 12
      text:
        ru: 'Например: «Верить или нет — личное дело. Но я могу объяснить, почему так думаю.» Предложил аргумент вместо ярлыка.
          Сила!

          '
        uk: 'Наприклад: «Вірити чи ні — особиста справа. Але я можу пояснити, чому так думаю.» Пропонував аргумент замість
          ярлика. Сила!'
        en: 'For example: ''Believing or not is personal. But I can explain why I think that.'' Offered an argument instead
          of a label. Power!'
  - scene_id: sc9
    title:
      ru: ПРИЗНАНИЕ ЧАСТИЧНОЙ ПРАВОТЫ
      uk: ПРИЗНАННЯ ЧАСТКОВОЇ ПРАВОТИ
      en: ACKNOWLEDGING PARTIAL TRUTH
    media_ref: 11A.sc9.partial_agreement
    status: v3_locked
    steps:
    - id: '124'
      type: speech
      duration_sec: 15
      text:
        ru: 'Есть ещё один мощный приём — признание частичной правоты. Формула: «В этом ты прав, но...» Это показывает, что
          вы слушали, уважаете собеседника — и делает возражение сильнее.

          '
        uk: 'Є ще один потужний прийом — признання часткової правоти. Формула: «У цьому ти правий, але...» Це показує, що
          ви слухали, поважаєте співрозмовника — й робить заперечення сильнішим.'
        en: 'There''s another powerful technique - acknowledging partial truth. Formula: ''You''re right about that, but...''
          This shows you listened, respect the other person - and makes your objection stronger.'
    - id: '125'
      type: speech
      duration_sec: 15
      text:
        ru: 'Пример. Друг: «Надо каждый день есть овощи!» Ответ: «Ты прав — овощи полезны. Но необязательно каждый день, ведь
          витамины есть и во фруктах.» Признал правоту — и добавил нюанс. Красиво!

          '
        uk: 'Приклад. Друг: «Треба кожен день їсти овочі!» Ответ: «Ти правий — овочі корисні. Але необов''язково щодня, адже
          вітаміни є й у фруктах.» Признав правоту — й додав нюанс. Красиво!'
        en: 'Example. Friend: ''You should eat vegetables every day!'' Response: ''You''re right - vegetables are healthy.
          But you don''t have to eat them every day, because fruits have vitamins too.'' Acknowledged truth - and added a
          nuance. Beautiful!'
    - id: '126'
      type: vote
      duration_sec: 12
      text:
        ru: '«Читать книги полезно.»

          '
        uk: «Читати книги корисно.»
        en: '"Reading books is useful."'
      options:
      - id: opt_1
        text:
          ru: Ты неправ! Книги скучные!
          uk: Ти неправ! Книги нудні!
          en: You're wrong! Books are boring!
      - id: opt_2
        text:
          ru: Да, читать полезно. Но важно выбирать интересные — иначе не захочется.
          uk: Так, читати корисно. Але важливо вибирати цікаві — інакше не захочеться.
          en: Yes, reading is useful. But it's important to choose interesting ones - otherwise you won't want to.
      correct: opt_2
    - id: '127'
      type: speech
      duration_sec: 12
      text:
        ru: 'Второй! Согласился — и уточнил. А первый просто обидел книги. Книги, кстати, не виноваты.

          '
        uk: Другий! Погодився — й уточнив. А перший просто обідив книги. Книги, до речі, не винні.
        en: Second! He agreed - and added clarification. First one just insulted books. Books, by the way, aren't responsible.
    - id: '128'
      type: vote
      duration_sec: 12
      text:
        ru: '«Нужно рано вставать.»

          '
        uk: «Потрібно рано вставати.»
        en: '"You should wake up early."'
      options:
      - id: opt_1
        text:
          ru: Согласен, что режим важен. Но некоторым лучше работается вечером.
          uk: Згідний, що режим важливий. Але деяким краще працюється ввечері.
          en: I agree that routine is important. But some people work better in the evening.
      - id: opt_2
        text:
          ru: Глупости! Я люблю спать!
          uk: Глупості! Я люблю спати!
          en: Nonsense! I love sleeping!
      correct: opt_1
    - id: '129'
      type: speech
      duration_sec: 12
      text:
        ru: 'Первый! Признал важность режима, но показал, что люди разные. «Я люблю спать» — это не аргумент, это расписание.

          '
        uk: Перший! Признав важливість режиму, але показав, що люди різні. «Я люблю спати» — це не аргумент, це розклад.
        en: First! Acknowledged the importance of routine, but showed people are different. 'I love sleeping' isn't an argument,
          it's a schedule.
    - id: '130'
      type: vote
      duration_sec: 12
      text:
        ru: '«Собаки умнее кошек.»

          '
        uk: «Собаки розумніші за котів.»
        en: '"Dogs are smarter than cats."'
      options:
      - id: opt_1
        text:
          ru: Кошки умнее! Ты ничего не понимаешь!
          uk: Коти розумніші! Ти нічого не розумієш!
          en: Cats are smarter! You don't understand anything!
      - id: opt_2
        text:
          ru: Собаки умные, да. Но кошки тоже — просто решают задачи иначе.
          uk: Собаки розумні, так. Але коти теж — просто розв'язують завдання інакше.
          en: Dogs are smart, yes. But cats are too - they just solve problems differently.
      correct: opt_2
    - id: '131'
      type: speech
      duration_sec: 12
      text:
        ru: 'Второй! Признал ум собак — и расширил картину. Первый — нападка в чистом виде. Кошки бы оценили второй вариант.
          Собаки — тоже.

          '
        uk: Другий! Признав розум собак — й розширив картину. Перший — нападка в чистому вигляді. Коти б оцінили другий варіант.
          Собаки — теж.
        en: Second! Acknowledged dog intelligence - and expanded the picture. First is a pure attack. Cats would appreciate
          the second answer. So would dogs.
    - id: '132'
      type: vote
      duration_sec: 12
      text:
        ru: '«Нужно заниматься спортом каждый день.»

          '
        uk: «Потрібно займатися спортом кожен день.»
        en: '"You should exercise every day."'
      options:
      - id: opt_1
        text:
          ru: Спорт — здорово. Но телу нужен отдых, иначе можно получить травму.
          uk: Спорт — здорово. Але тілу потрібен відпочинок, інакше можна отримати травму.
          en: Exercise is great. But your body needs rest - otherwise you can get injured.
      - id: opt_2
        text:
          ru: Не хочу! Спорт — это скучно!
          uk: Не хочу! Спорт — це нудно!
          en: I don't want to! Exercise is boring!
      correct: opt_1
    - id: '133'
      type: speech
      duration_sec: 12
      text:
        ru: 'Первый! Медицинский аргумент — отдых нужен мышцам. «Не хочу» — это про желание, а не про истину. Мышцы не спросят,
          хочешь ты или нет.

          '
        uk: Перший! Медичний аргумент — відпочинок потрібен м'язам. «Не хочу» — це про бажання, а не про істину. М'язи не
          запитуватимуть, хочеш ти чи ні.
        en: First! A medical argument - muscles need rest. 'I don't want to' is about desire, not truth. Your muscles won't
          ask if you want to.
    - id: '134'
      type: vote
      duration_sec: 12
      text:
        ru: '«Все должны уметь готовить.»

          '
        uk: «Усі повинні вміти готувати.»
        en: '"Everyone should know how to cook."'
      options:
      - id: opt_1
        text:
          ru: Зачем? Можно заказать еду!
          uk: Зачем? Можна замовити їжу!
          en: Why? You can order food!
      - id: opt_2
        text:
          ru: Готовить полезно, согласен. Но необязательно быть шеф-поваром — достаточно базовых блюд.
          uk: Готувати корисно, згідний. Але необов'язково бути шеф-поваром — достатньо базових блюд.
          en: Cooking is useful, I agree. But you don't have to be a chef - basic dishes are enough.
      correct: opt_2
    - id: '135'
      type: speech
      duration_sec: 12
      text:
        ru: 'Второй! Согласился с идеей — и уточнил границу. Первый отмахнулся. Курьер, кстати, тоже когда-нибудь уйдёт на
          выходной.

          '
        uk: Другий! Погодився з ідеєю — й уточнив границю. Перший махнув рукою. Кур'єр, до речі, теж коли-небудь піде у відпустку.
        en: Second! Agreed with the idea - and set a boundary. First just dismissed it. The delivery person, by the way, will
          also take a day off eventually.
  - scene_id: sc10
    title:
      ru: 'ФИНАЛЬНАЯ ПРАКТИКА: ВСЁ ВМЕСТЕ'
      uk: 'ФІНАЛЬНА ПРАКТИКА: УСЕ РАЗОМ'
      en: 'FINAL PRACTICE: ALL TOGETHER'
    media_ref: 11A.sc10.final_practice
    status: v3_locked
    steps:
    - id: '136'
      type: speech
      duration_sec: 12
      text:
        ru: 'Финальный раунд! Здесь всё вперемешку — нападка, возражение или возражение с признанием частичной правоты. Три
          варианта — будьте внимательны!

          '
        uk: Фінальний раунд! Тут усе вперемішку — нападка, заперечення чи заперечення з признанням часткової правоти. Три
          варіанти — будьте уважні!
        en: Final round! It's all mixed together - attack, objection, or objection with acknowledging partial truth. Three
          options - be careful!
    - id: '137'
      type: vote
      duration_sec: 12
      text:
        ru: '«Ты прав, что учёба важна. Но я думаю, перерывы тоже нужны — мозг устаёт.»

          '
        uk: «Ти правий, що учба важлива. Але я думаю, перерви теж потрібні — мозок втомлюється.»
        en: '"You''re right that studying is important. But I think breaks are necessary too - your brain gets tired."'
      options:
      - id: opt_1
        text:
          ru: Нападка
          uk: Нападка
          en: Attack
      - id: opt_2
        text:
          ru: Возражение
          uk: Заперечення
          en: Objection
      - id: opt_3
        text:
          ru: Возражение с признанием
          uk: Заперечення з признанням
          en: Objection with acknowledgment
      correct: opt_3
    - id: '138'
      type: speech
      duration_sec: 12
      text:
        ru: 'Третий! «Ты прав» — признание. «Но перерывы нужны» — аргумент. Полный набор. Мозг и правда устаёт — даже у учёных.

          '
        uk: Третій! «Ти правий» — признання. «Але перерви потрібні» — аргумент. Повний набір. Мозок і справді втомлюється
          — навіть у науковців.
        en: Third! 'You're right' - acknowledgment. 'But breaks are needed' - argument. Complete package. Brains really do
          get tired - even scientists' brains.
    - id: '139'
      type: vote
      duration_sec: 12
      text:
        ru: '«Да ты просто лентяй и не хочешь стараться!»

          '
        uk: «Та ти просто ледачий й не хочеш старатися!»
        en: '"You''re just lazy and don''t want to try!"'
      options:
      - id: opt_1
        text:
          ru: Нападка
          uk: Нападка
          en: Attack
      - id: opt_2
        text:
          ru: Возражение
          uk: Заперечення
          en: Objection
      - id: opt_3
        text:
          ru: Возражение с признанием
          uk: Заперечення з признанням
          en: Objection with acknowledgment
      correct: opt_1
    - id: '140'
      type: speech
      duration_sec: 10
      text:
        ru: 'Нападка! Ярлык «лентяй» — не аргумент. Это обвинение без доказательств.

          '
        uk: Нападка! Ярлик «ледачий» — не аргумент. Це звинувачення без доказів.
        en: Attack! The label 'lazy' isn't an argument. It's an accusation without proof.
    - id: '141'
      type: vote
      duration_sec: 12
      text:
        ru: '«Я не согласен — вчера был дождь, а не снег. Могу показать прогноз.»

          '
        uk: «Я не згідний — вчора був дощ, а не сніг. Можу показати прогноз.»
        en: '"I disagree - yesterday it rained, not snowed. I can show you the forecast."'
      options:
      - id: opt_1
        text:
          ru: Нападка
          uk: Нападка
          en: Attack
      - id: opt_2
        text:
          ru: Возражение
          uk: Заперечення
          en: Objection
      - id: opt_3
        text:
          ru: Возражение с признанием
          uk: Заперечення з признанням
          en: Objection with acknowledgment
      correct: opt_2
    - id: '142'
      type: speech
      duration_sec: 12
      text:
        ru: 'Возражение! Конкретный факт плюс готовность доказать. Без «ты прав» — потому что тут нечего признавать. Дождь
          есть дождь.

          '
        uk: Заперечення! Конкретний факт плюс готовність довести. Без «ти правий» — тому що тут нечого признавати. Дощ є дощ.
        en: Objection! Specific fact plus willingness to prove it. No 'you're right' - because there's nothing to acknowledge.
          Rain is rain.
    - id: '143'
      type: vote
      duration_sec: 12
      text:
        ru: '«Согласен, кошки милые. Но говорить, что они умнее всех — преувеличение.»

          '
        uk: «Згідний, що коти милі. Але говорити, що вони розумніші за всіх — перебільшення.»
        en: '"I agree that cats are cute. But saying they''re smarter than everyone - that''s an exaggeration."'
      options:
      - id: opt_1
        text:
          ru: Нападка
          uk: Нападка
          en: Attack
      - id: opt_2
        text:
          ru: Возражение
          uk: Заперечення
          en: Objection
      - id: opt_3
        text:
          ru: Возражение с признанием
          uk: Заперечення з признанням
          en: Objection with acknowledgment
      correct: opt_3
    - id: '144'
      type: speech
      duration_sec: 10
      text:
        ru: 'Третий! Признал милость кошек — и мягко указал на преувеличение. Кошки простят.

          '
        uk: Третій! Признав милість котів — й м'яко указав на перебільшення. Коти пробачать.
        en: Third! Acknowledged that cats are cute - and gently pointed out the exaggeration. Cats will forgive.
    - id: '145'
      type: vote
      duration_sec: 12
      text:
        ru: '«Ничего ты не понимаешь! Я лучше знаю!»

          '
        uk: «Нічого ти не розумієш! Я краще знаю!»
        en: '"You don''t understand anything! I know better!"'
      options:
      - id: opt_1
        text:
          ru: Нападка
          uk: Нападка
          en: Attack
      - id: opt_2
        text:
          ru: Возражение
          uk: Заперечення
          en: Objection
      - id: opt_3
        text:
          ru: Возражение с признанием
          uk: Заперечення з признанням
          en: Objection with acknowledgment
      correct: opt_1
    - id: '146'
      type: speech
      duration_sec: 12
      text:
        ru: 'Нападка! «Ничего не понимаешь» плюс «я лучше знаю» — двойной удар по человеку. Ноль аргументов, зато много обиды.

          '
        uk: Нападка! «Нічого не розумієш» плюс «я краще знаю» — подвійний удар по людині. Нуль аргументів, зате багато образи.
        en: Attack! 'You don't understand' plus 'I know better' - a double blow to the person. Zero arguments, plenty of hurt
          feelings.
  - scene_id: sc11
    title:
      ru: СИЛА СЛОВА БЕЗ КУЛАКОВ
      uk: СИЛА СЛОВА БЕЗ КУЛАКІВ
      en: THE POWER OF WORDS WITHOUT FISTS
    media_ref: 11A.sc11.closing
    status: v3_locked
    steps:
    - id: '147'
      type: speech
      duration_sec: 15
      text:
        ru: 'Знаете, что самое крутое? Вы только что научились побеждать в споре, никого не обидев. Это как суперсила — только
          без плаща и без драки.

          '
        uk: Знаєте, що найкраще? Ви щойно навчилися перемагати у спорі, нікого не ображаючи. Це як суперсила — тільки без
          плаща й без драки.
        en: You know what's awesome? You just learned how to win an argument without insulting anyone. It's like a superpower
          - just without the cape and the fighting.
    - id: '148'
      type: speech
      duration_sec: 15
      text:
        ru: 'Нападка — это когда кончились аргументы и начались обзывательства. Возражение — когда аргументы только начинаются.
          Угадайте, кого слушают внимательнее?

          '
        uk: Нападка — це коли кінчилися аргументи й почалися образи. Заперечення — коли аргументи тільки починаються. Вгадайте,
          кого слухають уважніше?
        en: An attack is when arguments run out and insults start. An objection is when arguments are just beginning. Guess
          who people listen to more carefully?
    - id: '149'
      type: speech
      duration_sec: 15
      text:
        ru: 'Теперь у вас есть формула: понимание + мнение + причина. И секретное оружие — «в этом ты прав, но...» После этого
          даже самый упрямый собеседник задумается.

          '
        uk: 'Тепер у вас є формула: розуміння + думка + причина. І секретна зброя — «у цьому ти правий, але...» Після цього
          навіть найупертіший співрозмовник задумається.'
        en: 'Now you have a formula: understanding + opinion + reason. And a secret weapon - ''you''re right about that, but...''
          After that, even the most stubborn person will think twice.'
    - id: '150'
      type: speech
      duration_sec: 15
      text:
        ru: 'На перерыве попробуйте — если кто-то скажет «ты неправ», не нападайте в ответ. Возразите. И посмотрите, что будет.
          Спойлер: будет разговор, а не ссора. До встречи на втором уроке!

          '
        uk: 'На перерві спробуйте — якщо хто-небудь скаже «ти неправ», не нападайте у ответ. Заперечте. Й подивіться, що буде.
          Спойлер: буде розмова, а не сварка. До зустрічі на другому уроці!'
        en: 'Try it at break time - if someone says ''you''re wrong,'' don''t attack back. Object. And see what happens. Spoiler:
          you''ll have a conversation instead of a fight. See you at lesson two!'
