  - scene_id: sc6
    title:
      ru: УНИВЕРСАЛЬНЫЙ ОТВЕТ
      uk: УНІВЕРСАЛЬНА ВІДПОВІДЬ
      en: UNIVERSAL ANSWER
    media_ref: 11B.sc6.universal_answer
    status: v3_locked
    steps:
    - id: '99'
      type: speech
      duration_sec: 18
      text:
        ru: 'Вы узнали десять видов демагогии. Но вот секрет: вам не нужно помнить все названия. Есть один ответ, который
          работает ВСЕГДА. Запоминайте: «Это демагогия. Где факты?»

          '
        uk: 'Ви дізналися про десять видів демагогії. Але ось секрет: вам не потрібно пам''ятати всі назви. Є одна відповідь,
          яка працює ЗАВЖДИ. Запам''ятовуйте: «Це демагогія. Де факти?»'
        en: 'You''ve learned about ten types of demagoguery. But here''s the secret: you don''t need to remember all the names.
          There is one answer that works ALWAYS. Remember: "This is demagoguery. Where are the facts?"'
    - id: '100'
      type: speech
      duration_sec: 18
      text:
        ru: 'Почему это работает? Во-первых, вы называете хитрость — и она теряет силу. Во-вторых, вы требуете доказательства.
          В-третьих, разговор переключается на факты — а это территория, где демагогу нечем крыть.

          '
        uk: Чому це працює? По-перше, ви називаєте хитрість — і вона втрачає силу. По-друге, ви вимагаєте доказу. По-третє,
          розмова переключається на факти — а це територія, де демагогу нічим крити.
        en: Why does this work? First, you name the trick - and it loses its power. Second, you demand proof. Third, the conversation
          shifts to facts - and that's a territory where the demagogue has nothing to cover.
    - id: '101'
      type: speech
      duration_sec: 15
      text:
        ru: 'Давайте потренируемся. Я буду говорить демагогические фразы, а вы придумайте ответ. Помните формулу: назвать
          хитрость и спросить «где факты?»

          '
        uk: 'Давайте потренуємося. Я буду говорити демагогічні фрази, а ви придумайте відповідь. Пам''ятайте формулу: назвати
          хитрість і запитати «де факти?»'
        en: 'Let''s practice. I will say demagogic phrases, and you come up with an answer. Remember the formula: name the
          trick and ask "where are the facts?"'
    - id: '102'
      type: discussion
      duration_sec: 20
      text:
        ru: '«Все нормальные люди со мной согласны! Ты один такой!» — Подсказка: что тут за приём? Откуда «все»?

          '
        uk: '«Усі нормальні люди зі мною згідні! Ти один такий!» — Підказка: що тут за прийом? Звідки «всі»?'
        en: '"All normal people agree with me! You''re the only one who doesn''t!" — Hint: what trick is that? Where does
          "all" come from?'
    - id: '103'
      type: speech
      duration_sec: 15
      text:
        ru: '«Это демагогия — поспешное обобщение. Кто эти "все"? Назови хотя бы троих. Пока я слышу только громкие слова
          без доказательств.»

          '
        uk: «Це демагогія — поспішне узагальнення. Хто ці "всі"? Назви хоча б троїх. Поки я чую тільки голосні слова без доказів.»
        en: '"This is demagoguery - hasty generalization. Who are these ''everyone''? Name at least three. So far I only hear
          loud words without proof."'
    - id: '104'
      type: discussion
      duration_sec: 20
      text:
        ru: '«Ты ничего в этом не понимаешь, ты же в секцию только месяц ходишь!» — Подсказка: обсуждают аргумент или человека?

          '
        uk: '«Ти нічого в цьому не розумієш, ти ж у секцію тільки місяць ходиш!» — Підказка: обговорюють аргумент чи людину?'
        en: '"You don''t understand anything about this—you''ve only been going to the club for a month!" — Hint: are they
          discussing the argument or the person?'
    - id: '105'
      type: speech
      duration_sec: 15
      text:
        ru: '«Это демагогия — нападка на человека. Сколько я хожу — не важно. Ты лучше объясни, почему моя идея не сработает.
          Факты, пожалуйста!»

          '
        uk: «Це демагогія — напа на людину. Скільки я ходжу — не важливо. Ти краще поясни, чому моя ідея не спрацює. Факти,
          будь ласка!»
        en: '"This is demagoguery - a personal attack. How much I walk doesn''t matter. You better explain why my idea won''t
          work. Facts, please!"'
    - id: '106'
      type: discussion
      duration_sec: 20
      text:
        ru: '«Если мы не купим эту штуку прямо сейчас — потом её не будет НИГДЕ и НИКОГДА!» — Подсказка: откуда он знает будущее?
          Есть доказательства?

          '
        uk: '«Якщо ми не купимо цю штуку прямо зараз — потім її не буде НІДЕ й НІКОЛИ!» — Підказка: звідки він знає майбутнє?
          Є докази?'
        en: '"If we don''t buy this thing right now—it''ll be gone FOREVER and we''ll never get it again!" — Hint: how does
          he know the future? What''s the proof?'
    - id: '107'
      type: speech
      duration_sec: 15
      text:
        ru: '«Это демагогия — страшная цепочка. Откуда ты знаешь, что её больше не будет? Где факты? Может, она продаётся
          в десяти магазинах.»

          '
        uk: «Це демагогія — страшний ланцюжок. Звідки ти знаєш, що його більше не буде? Де факти? Може, вона продається в
          десяти магазинах.»
        en: '"This is demagoguery - a scary chain. How do you know it won''t happen again? Where are the facts? Maybe it''s
          sold in ten stores."'
    - id: '108'
      type: discussion
      duration_sec: 20
      text:
        ru: '«Или ты идёшь с нами на крышу, или мы больше не дружим!» — Подсказка: сколько вариантов вам оставили? Только
          два?

          '
        uk: '«Або ти йдеш з нами на дах, або ми більше не дружимо!» — Підказка: скільки варіантів вам залишили? Тільки два?'
        en: '"Either you go to the roof with us, or we''re not friends anymore!" — Hint: how many choices did they leave you?
          Just two?'
    - id: '109'
      type: speech
      duration_sec: 15
      text:
        ru: '«Это демагогия — ложная дилемма. Есть куча вариантов: можно пойти в парк, на площадку, куда угодно. А настоящие
          друзья не ставят ультиматумы.»

          '
        uk: '«Це демагогія — хибна дилема. Є купа варіантів: можна піти в парк, на майданчик, куди завгодно. А справжні друзі
          не ставлять ультиматуми.»'
        en: '"This is demagoguery - a false dilemma. There are plenty of options: you can go to the park, playground, anywhere.
          And true friends don''t give ultimatums."'
    - id: '110'
      type: discussion
      duration_sec: 20
      text:
        ru: '«Мой старший брат сказал, что эта игра — мусор. А он разбирается!» — Подсказка: брат — эксперт по играм? Почему
          мы должны ему верить?

          '
        uk: '«Мій старший брат сказав, що ця гра — мотлох. А він розбирається!» — Підказка: брат — експерт у іграх? Чому ми
          маємо йому вірити?'
        en: '"My older brother said this game is trash. He knows about this stuff!" — Hint: is your brother an expert on games?
          Why should we trust him?'
    - id: '111'
      type: speech
      duration_sec: 15
      text:
        ru: '«Это демагогия — ложный авторитет. То, что он старше, не делает его экспертом. У него есть аргументы? Он сам
          играл? Где факты?»

          '
        uk: «Це демагогія — хибний авторитет. Те, що він старший, не робить його експертом. У нього є аргументи? Він сам грав?
          Де факти?»
        en: '"This is demagoguery - false authority. The fact that he''s older doesn''t make him an expert. Does he have arguments?
          Did he play himself? Where are the facts?"'
    - id: '112'
      type: discussion
      duration_sec: 20
      text:
        ru: '«Ты хочешь сказать, что вообще не нужно заниматься спортом?!» — Подсказка: это правда то, что вы говорили? Или
          вам приписали чужое?

          '
        uk: '«Ти хочеш сказати, що взагалі не потрібно займатися спортом?!» — Підказка: це правда те, що ви говорили? Або
          вам приписали чужого?'
        en: '"You''re saying we shouldn''t do any sports at all?!" — Hint: is that really what you said? Or did they twist
          your words?'
    - id: '113'
      type: speech
      duration_sec: 15
      text:
        ru: '«Это демагогия — пугало! Я сказал, что не хочу бегать в дождь. А ты превратил это в "не хочу заниматься спортом".
          Не искажай мои слова.»

          '
        uk: «Це демагогія — лякало! Я сказав, що не хочу бігти в дощ. А ти перетворив це на "не хочу займатися спортом". Не
          спотворюй мої слова.»
        en: '"This is demagoguery - a scarecrow! I said I don''t want to run in the rain. And you turned that into ''I don''t
          want to do sports.'' Don''t distort my words."'
