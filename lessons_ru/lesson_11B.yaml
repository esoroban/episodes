      text:
        ru: 'Демагогия — поспешное обобщение! Кто эти «все»? Откуда статистика?

          '
        uk: Демагогія — поспішне узагальнення! Хто ці «всі»? Звідки статистика?
        en: Demagoguery - hasty generalization! Who are these 'everyone'? Where's the statistics?
    - id: '119'
      type: vote
      duration_sec: 10
      text:
        ru: '«Мне кажется, твой план не сработает в дождь — давай добавим навес.»

          '
        uk: «Мені здається, твій план не спрацює в дощ — давай додамо навіс.»
        en: '"I think your plan won''t work in the rain - let''s add a canopy."'
      options:
