  - scene_id: sc8
    title:
      ru: ФИЛОСОФСКОЕ ЗАКРЫТИЕ
      uk: ФІЛОСОФСЬКЕ ЗАКРИТТЯ
      en: PHILOSOPHICAL CLOSING
    media_ref: 11B.sc8.closing
    status: v3_locked
    steps:
    - id: '145'
      type: speech
      duration_sec: 18
      text:
        ru: 'Демагогия — это когда человек говорит громко, уверенно, красиво… но без единого факта. Как фейерверк: ярко, шумно
          — а когда дым рассеялся, на земле ничего нет.

          '
        uk: 'Демагогія — це коли людина говорить голосно, впевнено, гарно… але без єдиного факту. Як феєрверк: яскраво, шумно
          — а коли дим розійшовся, на землі нічого немає.'
        en: 'Demagoguery is when a person speaks loudly, confidently, beautifully... but without a single fact. Like fireworks:
          bright, loud - and when the smoke clears, there''s nothing on the ground.'
    - id: '146'
      type: speech
      duration_sec: 18
      text:
        ru: 'Теперь у вас есть суперсила: вы умеете и возражать по-честному, и разоблачать тех, кто хитрит. Один урок — щит,
          другой — рентген. Полный комплект критического мышления!

          '
        uk: 'Тепер у вас є суперсила: ви вмієте й заперечувати чесно, й разоблачати тих, хто хитрить. Один урок — щит, другий
          — рентген. Повний комплект критичного мислення!'
        en: 'Now you have a superpower: you can both object honestly and expose those who cheat. One lesson is a shield, another
          is an X-ray. A complete set of critical thinking!'
    - id: '147'
      type: speech
      duration_sec: 15
      text:
        ru: 'А дома вас ждёт квест: попробуйте найти демагогию в реальной жизни — в рекламе, в разговорах, может даже в мультиках.
          Она повсюду, когда знаешь, куда смотреть!

          '
        uk: 'А дома вас чекає квест: спробуйте знайти демагогію в реальному житті — в рекламі, в розмовах, може навіть в мультиках.
          Вона повсюди, коли знаєш, куди дивитися!'
        en: 'And at home you''re waiting for a quest: try to find demagoguery in real life - in ads, in conversations, maybe
          even in cartoons. It''s everywhere when you know where to look!'
    - id: '148'
      type: speech
      duration_sec: 14
      text:
        ru: 'Сегодня был мощный день. Отдыхайте, набирайтесь сил — а завтра мы узнаем кое-что ещё более хитрое. До встречи!

          '
        uk: Сьогодні був потужний день. Відпочивайте, набирайтеся сил — а завтра ми дізнаємося щось ще більш хитре. До зустрічі!
        en: Today was a powerful day. Rest and recharge - and tomorrow we'll learn something even more clever. See you soon!
