lesson:
  id: lesson_11B
  day: 11
  slot: B
  title:
    ru: Что такое демагогия
    uk: Що таке демагогія
    en: What Is Demagoguery
  scenes:
  - scene_id: sc1
    title:
      ru: МОСТ ОТ ПЕРВОГО УРОКА
      uk: МІСТ ВІД ПЕРШОГО УРОКУ
      en: BRIDGE FROM THE FIRST LESSON
    media_ref: 11B.sc1.bridge
    status: v3_locked
    steps:
    - id: '1'
      type: speech
      duration_sec: 15
      text:
        ru: 'Мы вернулись! На первом уроке вы научились возражать — спокойно, с аргументами, без нападок. Теперь пора узнать,
          что делать, когда кто-то говорит красиво, уверенно, громко — но без единого факта.

          '
        uk: Ми повернулись! На першому уроці ви навчилися заперечувати — спокійно, з аргументами, без нападок. Тепер пора
          дізнатися, що робити, коли хтось говорить гарно, впевнено, голосно — але без єдиного факту.
        en: We're back! In the first lesson, you learned how to object - calmly, with arguments, no attacks. Now it's time
          to learn what to do when someone speaks beautifully, confidently, loudly - but without a single fact.
    - id: '2'
      type: speech
      duration_sec: 15
      text:
        ru: 'Сегодня вы узнаете слово, которое даст вам суперсилу в любом споре. После этого урока вы сможете сказать одну
          фразу — и любая уловка потеряет силу.

          '
        uk: Сьогодні ви дізнаєтеся слово, яке дасть вам суперсилу в будь-якому спорі. Після цього уроку ви зможете сказати
          одну фразу — і будь-яка хитрість втратить силу.
        en: Today you'll learn a word that gives you a superpower in any argument. After this lesson, you can say one phrase
          - and any trick loses its power.
    - id: '3'
      type: speech
      duration_sec: 20
      text:
        ru: 'Но сначала — ситуация. Слушайте внимательно и решите сами: вас убеждают или обманывают?

          '
        uk: 'Але спочатку — ситуація. Слухайте уважно й вирішите самі: вас переконують чи обманюють?'
        en: 'But first - a situation. Listen carefully and decide for yourselves: are you being persuaded or fooled?'
  - scene_id: sc2
    title:
      ru: 'ОТКРЫТИЕ: ШКОЛЬНОЕ СОБРАНИЕ'
      uk: 'ВІДКРИТТЯ: ШКІЛЬНЕ ЗІБРАННЯ'
      en: 'DISCOVERY: SCHOOL ASSEMBLY'
    media_ref: 11B.sc2.opening_assembly
    status: v3_locked
    steps:
    - id: '4'
      type: speech
      duration_sec: 20
      text:
        ru: 'Представьте: школьное собрание. Мальчик по имени Богдан вскакивает на стул и кричит: «Друзья! Катастрофа! Ребята
          из соседней школы задумали страшное — они хотят прийти и СЪЕСТЬ ВСЕ ПИРОЖНЫЕ в нашей столовой! ВСЕ ДО ОДНОГО!»

          '
        uk: 'Уявіть: шкільне зібрання. Хлопчик на ім''я Богдан вскакує на стілець і кричить: «Друзі! Катастрофа! Хлопці з
          сусідної школи задумали страшне — вони хочуть прийти і З''ЇСТИ УСІ ПИРІЖКИ в нашій їдальні! УСІ ДО ОДНОГО!»'
        en: 'Imagine: a school assembly. A boy named Bogdan jumps on a chair and shouts: ''Friends! Disaster! The guys from
          the neighboring school planned something terrible - they want to come and EAT ALL THE PASTRIES in our cafeteria!
          EVERY SINGLE ONE!'''
    - id: '5'
      type: speech
      duration_sec: 20
      text:
        ru: 'Богдан продолжает: «Наши пирожные в опасности! Мы должны объединиться! Кто не с нами — тот предатель и враг пирожных!
          Только трусы будут сидеть сложа руки, пока наши булочки в беде! Вперёд, на защиту сладкого!»

          '
        uk: 'Богдан продовжує: «Наші пиріжки в небезпеці! Ми повинні об''єднатися! Хто не з нами — той зрадник і враг пиріжків!
          Тільки боягузи будуть сидіти складено, поки наші булочки в біді! Вперед, на захист солодкого!»'
        en: 'Bogdan continues: ''Our pastries are in danger! We must unite! Whoever isn''t with us is a traitor and enemy
          of pastries! Only cowards will sit idle while our buns are in trouble! Forward, to defend sweets!'''
    - id: '6'
      type: speech
      duration_sec: 15
      text:
        ru: 'Класс замер. Кто-то уже сжал кулаки. Кто-то схватился за рюкзак. Пирожные же! Это серьёзно! Но давайте на секунду
          включим мозг.

          '
        uk: Клас замерз. Хтось уже стиснув кулаки. Хтось схопив рюкзак. Пиріжки ж! Це серйозно! Але давайте на секунду включимо
          мозок.
        en: The class freezes. Someone's already clenched their fists. Someone grabbed their backpack. Pastries! This is serious!
          But let's turn on our brains for a second.
    - id: '7'
      type: vote
      duration_sec: 12
      text:
        ru: 'Какие факты привёл Богдан?

          '
        uk: Які факти привів Богдан?
        en: What facts did Bogdan provide?
      options:
      - id: opt_1
        text:
          ru: Назвал конкретных людей и доказательства
          uk: Назвав конкретних людей й докази
          en: Named specific people and evidence
      - id: opt_2
        text:
          ru: Не привёл ни одного факта
          uk: Не привів жодного факту
          en: Provided no facts at all
      correct: opt_2
    - id: '8'
      type: speech
      duration_sec: 15
      text:
        ru: 'Ни одного! «Ребята из соседней школы» — кто именно? Откуда он узнал? Они сами сказали: «Мы идём за пирожными»?
          Может, у них свои пирожные? Может, они вообще на диете!

          '
        uk: 'Жодного! «Хлопці з сусідної школи» — хто саме? Звідки він знав? Вони самі сказали: «Ми йдемо за пиріжками»? Може,
          у них свої пиріжки? Може, вони взагалі на дієті!'
        en: 'Not one! ''Guys from the neighboring school'' - who exactly? How did he know? Did they tell him: ''We''re going
          for pastries''? Maybe they have their own pastries? Maybe they''re on a diet!'
    - id: '9'
      type: speech
      duration_sec: 13
      text:
        ru: 'Зато уловок — целый набор! «Катастрофа!» — запугивание. «Кто не с нами — предатель» — ложная дилемма. «Только
          трусы» — нападка. Громких слов — гора. Фактов — ноль. Это называется демагогия!

          '
        uk: Зато хитрощей — цілий набір! «Катастрофа!» — залякування. «Хто не з нами — зрадник» — хибна дилема. «Тільки боягузи»
          — нападка. Голосних слів — гора. Фактів — нуль. Це називається демагогія!
        en: But tricks - a whole bunch! 'Disaster!' - scaremongering. 'Whoever isn't with us is a traitor' - false dilemma.
          'Only cowards' - attack. Loud words - plenty. Facts - zero. This is called demagoguery!
  - scene_id: sc3
    title:
      ru: БЛОГЕР, СТРИМЕР И ФЕХТОВАНИЕ
      uk: БЛОГЕР, СТРИМЕР ТА ФЕХТУВАННЯ
      en: BLOGGER, STREAMER, AND FENCING
    media_ref: 11B.sc3.stories_demagogy
    status: v3_locked
    steps:
    - id: '10'
      type: speech
      duration_sec: 18
      text:
        ru: 'Ещё пример. Популярный блогер выкладывает видео: «Новая игра "Космо-Рыцари" — ЛУЧШАЯ ИГРА ВСЕХ ВРЕМЁН! Кто не
          играет — тот вообще не геймер! Все нормальные люди уже скачали! Не будь лузером — качай прямо сейчас!»

          '
        uk: 'Ще приклад. Популярний блогер викладає відео: «Нова гра "Космо-Лицарі" — НАЙКРАЩА ГРА ВСІХ ЧАСІВ! Хто не грає
          — той взагалі не геймер! Усі нормальні люди вже завантажили! Не будь лузером — завантажуй прямо зараз!»'
        en: 'Another example. A popular blogger posts a video: ''The new game "Cosmo-Knights" - THE BEST GAME OF ALL TIME!
          Whoever doesn''t play isn''t even a gamer! All normal people already downloaded it! Don''t be a loser - download
          it right now!'''
    - id: '11'
      type: speech
      duration_sec: 15
      text:
        ru: 'Комментарии горят: «Качаю!», «Не хочу быть лузером!», «Лучшая!!!» Тысячи лайков. Выглядит убедительно, правда?

          '
        uk: 'Коментарі горять: «Завантажую!», «Не хочу бути лузером!», «Найкраща!!!» Тисячі лайків. Виглядає переконливо,
          правда?'
        en: 'Comments are on fire: ''Downloading!'' ''Don''t want to be a loser!'' ''The best!!!'' Thousands of likes. Looks
          convincing, right?'
    - id: '12'
      type: vote
      duration_sec: 12
      text:
        ru: 'Какие факты привёл блогер?

          '
        uk: Які факти привів блогер?
        en: What facts did the blogger provide?
      options:
      - id: opt_1
        text:
          ru: Описал геймплей и сравнил с другими играми
          uk: Описав геймплей й порівняв з іншими іграми
          en: Described gameplay and compared it to other games
      - id: opt_2
        text:
          ru: Не привёл ни одного факта
          uk: Не привів жодного факту
          en: Provided no facts at all
      correct: opt_2
    - id: '13'
      type: speech
      duration_sec: 15
      text:
        ru: 'Ни одного! «Лучшая всех времён» — по каким критериям? «Все нормальные» — кто считал? «Лузер» — нападка. Блогер,
          кстати, забыл упомянуть, что ему заплатили за рекламу.

          '
        uk: Жодного! «Найкраща всіх часів» — за якими критеріями? «Усі нормальні» — хто рахував? «Лузер» — нападка. Блогер,
          до речі, забув упомянути, що йому заплатили за рекламу.
        en: Not one! 'Best of all time' - by what criteria? 'All normal people' - who counted? 'Loser' - attack. The blogger,
          by the way, forgot to mention they got paid for the ad.
    - id: '14'
      type: speech
      duration_sec: 18
      text:
        ru: 'А теперь стример разбирает ту же игру: «Я прошёл "Космо-Рыцари" за 12 часов. Графика на уровне 2024 года — красиво.
          Сюжет короткий, но есть мультиплеер. Минус — много багов, мой персонаж дважды провалился сквозь пол. Ждите патч.»

          '
        uk: 'А тепер стример розбирає ту ж гру: «Я пройшов "Космо-Лицарів" за 12 годин. Графіка на рівні 2024 року — красиво.
          Сюжет короткий, але є мультиплеєр. Мінус — багато глюків, мій персонаж двічі провалився крізь землю. Чекайте патчу.»'
        en: 'Now a streamer reviews the same game: ''I completed "Cosmo-Knights" in 12 hours. Graphics at 2024 level - beautiful.
          Story is short, but there''s multiplayer. Minus - lots of bugs, my character fell through the ground twice. Wait
          for the patch.'''
    - id: '15'
      type: vote
      duration_sec: 12
      text:
        ru: 'Чья оценка — демагогия?

          '
        uk: Чия оцінка — демагогія?
        en: Whose assessment is demagoguery?
      options:
      - id: opt_1
        text:
          ru: Блогер — эмоции без фактов
          uk: Блогер — емоції без фактів
          en: Blogger - emotions without facts
      - id: opt_2
        text:
          ru: Стример — конкретный разбор
          uk: Стример — конкретний розбір
          en: Streamer - specific breakdown
      - id: opt_3
        text:
          ru: Оба без фактов
          uk: Обидва без фактів
          en: Both without facts
      correct: opt_1
    - id: '16'
      type: speech
      duration_sec: 12
      text:
        ru: 'Блогер! Стример назвал время прохождения, плюсы, минусы, конкретный баг. А блогер — «лучшая», «все», «лузер».
          Чувствуете разницу?

          '
        uk: Блогер! Стример назвав час проходження, плюси, мінуси, конкретний глюк. А блогер — «найкраща», «всі», «лузер».
          Відчуваєте різницю?
        en: The blogger! The streamer said completion time, pros, cons, a specific bug. The blogger said 'best,' 'everyone,'
          'loser.' Feel the difference?
    - id: '17'
      type: speech
      duration_sec: 18
      text:
        ru: 'Следующий пример. Реклама секции фехтования: «Фехтование — спорт НАСТОЯЩИХ героев! Только смелые выбирают меч!
          Все великие люди фехтовали! Запишись — или так и будешь сидеть на диване, пока другие побеждают!»

          '
        uk: 'Наступний приклад. Реклама секції фехтування: «Фехтування — спорт СПРАВЖНІХ героїв! Тільки сміливі обирають меч!
          Усі великі люди фехтували! Запишись — або так і будеш сидіти на дивані, поки інші побеждають!»'
        en: 'Next example. An ad for a fencing club: ''Fencing - the sport of REAL heroes! Only the brave choose a sword!
          All great people fenced! Sign up - or you''ll just sit on your couch while others win!'''
    - id: '18'
      type: speech
      duration_sec: 15
      text:
        ru: 'Звучит красиво. Хочется схватить шпагу и бежать записываться. Но давайте проверим.

          '
        uk: Звучить красиво. Хочеться схопити шпагу й бігти записуватися. Але давайте перевіримо.
        en: Sounds beautiful. You want to grab a sword and run to sign up. But let's check.
    - id: '19'
      type: vote
      duration_sec: 12
      text:
        ru: 'Есть ли тут факты?

          '
        uk: Чи є тут факти?
        en: Are there facts here?
      options:
      - id: opt_1
        text:
          ru: Да — «все великие люди фехтовали» это факт
          uk: Так — «всі великі люди фехтували» це факт
          en: Yes - 'all great people fenced' is a fact
      - id: opt_2
        text:
          ru: Нет — сплошные уловки
          uk: Ні — суцільні хитрощі
          en: No - it's all tricks
      correct: opt_2
    - id: '20'
      type: speech
      duration_sec: 15
      text:
        ru: 'Уловки! «Настоящие герои» — кто решает, кто настоящий? «Все великие» — Эйнштейн не фехтовал. «Сидеть на диване»
          — ложная дилемма: либо фехтование, либо диван. А бассейн? А шахматы?

          '
        uk: 'Хитрощі! «Справжні герої» — хто вирішує, хто справжній? «Усі великі» — Ейнштейн не фехтував. «Сидіти на дивані»
          — хибна дилема: або фехтування, або диван. А басейн? А шахи?'
        en: 'Tricks! ''Real heroes'' - who decides who''s real? ''All great'' - Einstein didn''t fence. ''Sit on the couch''
          - false dilemma: either fencing or a couch. What about swimming? What about chess?'
    - id: '21'
      type: speech
      duration_sec: 15
      text:
        ru: 'А вот нормальная реклама той же секции: «Фехтование развивает реакцию и координацию. Занятия три раза в неделю,
          тренер — мастер спорта с десятилетним стажем. Первое занятие бесплатно.» Факты, конкретика, ноль давления.

          '
        uk: 'А ось нормальна реклама тієї ж секції: «Фехтування розвиває реакцію й координацію. Заняття три рази на тиждень,
          тренер — майстер спорту з десятирічним стажем. Перше заняття безплатно.» Факти, конкретика, нуль тиску.'
        en: 'Here''s a normal ad for the same club: ''Fencing develops reaction and coordination. Classes three times a week,
          coach is a master of sport with ten years'' experience. First class is free.'' Facts, specifics, zero pressure.'
    - id: '22'
      type: speech
      duration_sec: 12
      text:
        ru: 'Видите закономерность? Демагогия кричит и давит. Аргумент — спокойно объясняет. Громкость — не признак правоты.
          Тишина с фактами побеждает крик без них.

          '
        uk: Видите закономірність? Демагогія кричить й давить. Аргумент — спокійно пояснює. Гучність — не ознака правоти.
          Тиша з фактами перемагає крик без них.
        en: See the pattern? Demagoguery shouts and pressures. An argument explains calmly. Loudness isn't a sign of truth.
          Quiet facts beat loud lies.
  - scene_id: sc4
    title:
      ru: ВСЕ УЛОВКИ — ЭТО ДЕМАГОГИЯ
      uk: УСІ ХИТРОЩІ — ЦЕ ДЕМАГОГІЯ
      en: ALL TRICKS ARE DEMAGOGUERY
    media_ref: 11B.sc4.demagogy_parade
    status: v3_locked
    steps:
    - id: '23'
      type: speech
      duration_sec: 18
      text:
        ru: 'Демагогия — когда создают видимость аргумента, но внутри — логическая ошибка. Демагог не врёт напрямую — он ведёт
          вас к тому, чтобы вы сами себя обманули. Фокусник слов!

          '
        uk: Демагогія — коли створюють видимість аргументу, але всередині — логічна помилка. Демагог не брехав напрямо — він
          веде вас до того, щоб ви самі себе обманули. Фокусник слів!
        en: Demagoguery is when you create the appearance of an argument, but inside is a logical error. A demagogue doesn't
          lie directly - they lead you to fool yourself. A word magician!
    - id: '24'
      type: speech
      duration_sec: 15
      text:
        ru: 'Слова-триггеры. Если слышите: «Все знают, что...», «Это же очевидно!», «Любой нормальный человек...», «Только
          дураки думают иначе!» — стоп. Это давление, а не аргумент.

          '
        uk: 'Слова-тригери. Якщо чуєте: «Усі знають, що...», «Це ж очевидно!», «Будь-яка нормальна людина...», «Тільки дурні
          думають інакше!» — стоп. Це тиск, а не аргумент.'
        en: 'Trigger words. If you hear: ''Everyone knows that...'' ''Obviously!'' ''Any normal person...'' ''Only fools think
          otherwise!'' - stop. That''s pressure, not an argument.'
    - id: '25'
      type: speech
      duration_sec: 15
      text:
        ru: 'Ещё хитрая фраза: «Я не говорю, что он врёт... но задумайтесь...» Вроде ничего не сказал — а подозрение уже посеяно.
          Фактов ноль, но мозг додумывает. Классическая демагогия.

          '
        uk: 'Ще хитра фраза: «Я не кажу, що він брехав... але задумайтеся...» Вроді нічого не сказав — а підозра вже посіяна.
          Фактів нуль, але мозок додумує. Класична демагогія.'
        en: 'Another tricky phrase: ''I''m not saying he lied... but think about it...'' You didn''t really say anything -
          but suspicion is planted. Zero facts, but your brain fills in the blanks. Classic demagoguery.'
    - id: '26'
      type: speech
      duration_sec: 12
      text:
        ru: 'Главный фильтр: «ГДЕ ФАКТЫ?» Если в ответ тишина или новые уловки — перед вами демагог. А теперь парад — вы уже
          знаете все эти приёмы!

          '
        uk: 'Головний фільтр: «ДЕ ФАКТИ?» Якщо у ответ тиша чи нові хитрощі — перед вами демагог. А тепер парад — ви вже знаєте
          всі ці прийоми!'
        en: 'The main filter: ''WHERE ARE THE FACTS?'' If you get silence or new tricks in response - you''re dealing with
          a demagogue. Now for the parade - you already know all these tricks!'
    - id: '27'
      type: speech
      duration_sec: 15
      text:
        ru: '«После дождя я заболел — значит дождь виноват!» Одно случилось после другого — и мозг решил, что первое вызвало
          второе. Но совпадение — не причина. Ложная причина — демагогия!

          '
        uk: «Після дощу я захворів — значить дощ винний!» Одне сталося після іншого — й мозок вирішив, що перше викликало
          друге. Але збіг — не причина. Хибна причина — демагогія!
        en: '"I got sick after the rain - so the rain is guilty!" One thing happened after another - and your brain decided
          the first caused the second. But coincidence isn''t cause. False cause is demagoguery!'
    - id: '28'
      type: speech
      duration_sec: 15
      text:
        ru: '«Все мальчики любят футбол!» Увидел пару примеров — и решил, что так у всех. Но «пару» и «всех» — совсем разные
          числа. Поспешное обобщение — демагогия!

          '
        uk: «Усі хлопці люблять футбол!» Побачив пару прикладів — й вирішив, що так у всіх. Але «пара» й «усіх» — зовсім різні
          числа. Поспішне узагальнення — демагогія!
        en: '"All boys like football!" Saw a couple of examples - and decided everyone does. But ''a couple'' and ''everyone''
          are very different numbers. Hasty generalization is demagoguery!'
    - id: '29'
      type: speech
      duration_sec: 15
      text:
        ru: '«А ты сам-то сколько раз опаздывал?!» Вместо ответа — перевод стрелок на другую тему. Вопрос остался без ответа,
          а вы уже забыли, о чём спорили. Уклонение от ответа — демагогия!

          '
        uk: «А ти сам скільки разів спізнювався?!» Замість ответу — переведення стрілок на іншу тему. Питання залишилось без
          ответу, а ви вже забули, про що суперилися. Ухилення від ответу — демагогія!
        en: '"And how many times have you been late yourself?!" Instead of answering - shifting blame to another topic. The
          question remains unanswered, and you''ve already forgotten what you were arguing about. Dodging the question is
          demagoguery!'
    - id: '30'
      type: speech
      duration_sec: 15
      text:
        ru: '«Свобода слова — значит можно кричать в библиотеке!» Слово то же, а смысл подменили. Свобода слова — это не про
          крик. Подмена понятий — демагогия!

          '
        uk: «Свобода слова — значить можна кричати в бібліотеці!» Слово те ж саме, а смисл підмінили. Свобода слова — це не
          про крик. Підмена понять — демагогія!
        en: '"Freedom of speech means you can yell in a library!" The word is the same, but the meaning changed. Freedom of
          speech isn''t about yelling. Substituting concepts is demagoguery!'
    - id: '31'
      type: speech
      duration_sec: 15
      text:
        ru: '«Ты просто глупый и ничего не понимаешь!» Вместо спора с аргументом — удар по человеку. Человеку больно, а тема
          так и не решена. Нападка на человека — демагогия!

          '
        uk: «Ти просто глупий й нічого не розумієш!» Замість спору з аргументом — удар по людині. Людині боляче, а тема так
          й не вирішена. Нападка на людину — демагогія!
        en: '"You''re just dumb and don''t understand anything!" Instead of arguing with the argument - attacking the person.
          The person is hurt, and the topic isn''t resolved. Attacking the person is demagoguery!'
    - id: '32'
      type: speech
      duration_sec: 15
      text:
        ru: '«Ты сказал "люблю мороженое" — значит ты против здорового питания!» Исказили чужие слова и спорят с тем, чего
          человек не говорил. Пугало — демагогия!

          '
        uk: «Ти сказав "люблю морозиво" — значить ти проти здорового харчування!» Спотворили чужі слова й суперять з тим,
          чого людина не говорила. Опудало — демагогія!
        en: '"You said ''I love ice cream'' - so you''re against healthy eating!" Twisted someone''s words and argue against
          something they didn''t say. A scarecrow is demagoguery!'
    - id: '33'
      type: speech
      duration_sec: 15
      text:
        ru: '«Не уберёшь комнату — не получишь подарок — останешься без образования!» Из одного шага — цепочка ужасов, где
          каждое звено выдумано. Страшная цепочка — демагогия!

          '
        uk: «Не приберешь кімнату — не отримаєш подарунок — залишишся без освіти!» З одного кроку — ланцюжок жахів, де кожна
          ланка вигадана. Страшна ланцюжок — демагогія!
        en: '"Don''t clean your room - you won''t get a gift - you''ll end up without education!" From one step - a chain
          of horrors, where each link is made up. A scary chain is demagoguery!'
    - id: '34'
      type: speech
      duration_sec: 15
      text:
        ru: '«Известный блогер сказал, что это правда!» Человек известный, но не в этой теме. Популярность — не экспертиза.
          Ложный авторитет — демагогия!

          '
        uk: «Відомий блогер сказав, що це правда!» Людина відома, але не в цій темі. Популярність — не експертиза. Хибний
          авторитет — демагогія!
        en: '"A famous blogger said it''s true!" The person is famous, but not in this field. Popularity isn''t expertise.
          False authority is demagoguery!'
    - id: '35'
      type: speech
      duration_sec: 15
      text:
        ru: '«Или ты со мной — или ты мне враг!» Разрезали мир на два кусочка и спрятали все остальные варианты. Ложная дилемма
          — демагогия!

          '
        uk: «Або ти зі мною — або ти мені враг!» Розрізали світ на два шматочки й сховали всі інші варіанти. Хибна дилема
          — демагогія!
        en: '"Either you''re with me - or you''re my enemy!" Cut the world into two pieces and hid all other options. False
          dilemma is demagoguery!'
    - id: '36'
      type: speech
      duration_sec: 15
      text:
        ru: '«Ты уже перестал обманывать друзей?» В вопросе спрятано обвинение — любой ответ делает тебя виноватым. Вопрос-ловушка
          — демагогия!

          '
        uk: «Ти вже перестав обманювати друзів?» У питанні спрятано звинувачення — будь-яка ответ робить тебе винним. Питання-пастка
          — демагогія!
        en: '"Have you stopped lying to your friends?" The question hides an accusation - any answer makes you guilty. A trap
          question is demagoguery!'
    - id: '37'
      type: speech
      duration_sec: 15
      text:
        ru: 'Десять приёмов — и одно слово на всех: демагогия. Видимость аргумента без аргумента. Запомните фильтр: «Где факты?»
          Если фактов нет — вы уже знаете, как это назвать.

          '
        uk: 'Десять прийомів — й одне слово на всіх: демагогія. Видимість аргументу без аргументу. Запам''ятайте фільтр: «Де
          факти?» Якщо фактів немає — ви вже знаєте, як це назвати.'
        en: 'Ten techniques - and one word for all of them: demagoguery. The appearance of an argument without an argument.
          Remember the filter: ''Where are the facts?'' If there are no facts - you already know what to call it.'
  - scene_id: sc5
    title:
      ru: 'БОЛЬШАЯ ПРАКТИКА: УЗНАЙ ПРИЁМ'
      uk: 'ВЕЛИКА ПРАКТИКА: ПІЗНАЙ ПРИЙОМ'
      en: 'BIG PRACTICE: IDENTIFY THE TECHNIQUE'
    media_ref: 11B.sc5.big_practice
    status: v3_locked
    steps:
    - id: '38'
      type: speech
      duration_sec: 15
      text:
        ru: 'Тридцать примеров! Все десять видов демагогии вперемешку. Ваша задача — узнать, какой именно приём прячется в
          каждой фразе. Темы — из вашей жизни. Поехали!

          '
        uk: Тридцять прикладів! Усі десять видів демагогії вперемішку. Ваше завдання — пізнати, який саме прийом ховається
          в кожній фразі. Теми — з вашого життя. Поїхали!
        en: Thirty examples! All ten types of demagoguery mixed together. Your job is to identify which exact technique is
          hiding in each phrase. Topics from your life. Let's go!
    - id: '39'
      type: vote
      duration_sec: 10
      text:
        ru: '«На нашей линейке все хотели танцевальный номер!»

          '
        uk: «На нашій лінійці всі хотіли танцювального номеру!»
        en: '"Everyone wanted a dance performance at our assembly!"'
      options:
      - id: opt_1
        text:
          ru: Поспешное обобщение
          uk: Поспішне узагальнення
          en: Hasty generalization
      - id: opt_2
        text:
          ru: Ложная причина
          uk: Хибна причина
          en: False cause
      - id: opt_3
        text:
          ru: Пугало
          uk: Опудало
          en: Scarecrow
      correct: opt_1
    - id: '40'
      type: speech
      duration_sec: 12
      text:
        ru: 'Поспешное обобщение! «Все» — это пятеро из двухсот. Пару голосов выдали за целую школу. Кто-нибудь считал? Нет.
          Демагогия!

          '
        uk: Поспішне узагальнення! «Усі» — це п'ятеро з двохсот. Пару голосів видали за цілу школу. Хто-нибудь рахував? Ні.
          Демагогія!
        en: Hasty generalization! 'Everyone' means five out of two hundred. A few voices passed off as the whole school. Did
          anyone count? No. Demagoguery!
    - id: '41'
      type: vote
      duration_sec: 10
      text:
        ru: '«Ты маленький — какой из тебя вратарь!»

          '
        uk: «Ти маленький — який з тебе воротар!»
        en: '"You''re small - what kind of goalkeeper are you!"'
      options:
      - id: opt_1
        text:
          ru: Подмена понятий
          uk: Підмена понять
          en: Substituting concepts
      - id: opt_2
        text:
          ru: Нападка на человека
          uk: Нападка на людину
          en: Attack on the person
      - id: opt_3
        text:
          ru: Уклонение от ответа
          uk: Ухилення від ответу
          en: Dodging the question
      correct: opt_2
    - id: '42'
      type: speech
      duration_sec: 12
      text:
        ru: 'Нападка на человека! Рост не определяет навыки вратаря. Удар по внешности вместо разговора об игре. А Месси,
          между прочим, невысокий.

          '
        uk: Нападка на людину! Ріст — це один параметр, вміння — це інший. Маленький — не означає неспроможний. Удар по людині
          без аргументу.
        en: Attack on the person! Height is one parameter, skill is another. Small doesn't mean incapable. A blow without
          an argument.
    - id: '43'
      type: vote
      duration_sec: 10
      text:
        ru: '«Или идёшь с нами в парк — или сиди один дома!»

          '
        uk: «Я люблю старовинну музику — значить я скучний?»
        en: '"I love classical music - does that make me boring?"'
      options:
      - id: opt_1
        text:
          ru: Ложная дилемма
          uk: Опудало
          en: Scarecrow
      - id: opt_2
        text:
          ru: Страшная цепочка
          uk: Постійна причина
          en: Permanent cause
      - id: opt_3
        text:
          ru: Ложный авторитет
          uk: Хибна дилема
          en: False dilemma
      correct: opt_1
    - id: '44'
      type: speech
      duration_sec: 12
      text:
        ru: 'Ложная дилемма! А библиотека? А другие друзья? А просто погулять одному? Спрятали все варианты и оставили только
          два. Классический приём.

          '
        uk: Опудало! Ніхто не сказав, що ти скучний. Це вигадане звинувачення, якому ви не можете протистояти, тому що його
          не було.
        en: Scarecrow! Nobody said you're boring. It's a made-up accusation you can't fight because it was never made.
    - id: '45'
      type: vote
      duration_sec: 10
      text:
        ru: '«Я надел красные бутсы — и забил три гола! Бутсы волшебные!»

          '
        uk: «Це майже як коронавірус — це ж хворобливо!»
        en: '"It''s almost like coronavirus - that''s definitely contagious!"'
      options:
      - id: opt_1
        text:
          ru: Пугало
          uk: Хибна дилема
          en: False dilemma
      - id: opt_2
        text:
          ru: Ложная причина
          uk: Страшна ланцюжок
          en: Scary chain
      - id: opt_3
        text:
          ru: Поспешное обобщение
          uk: Хибна причина
          en: False cause
      correct: opt_2
    - id: '46'
      type: speech
      duration_sec: 12
      text:
        ru: 'Ложная причина! Забил потому что тренировался, а не потому что бутсы красные. Совпадение по времени — не доказательство
          связи.

          '
        uk: Хибна причина! «Майже як» — це не причина. Корона й це два різні речі. Подібність не означає однаковість.
        en: False cause! 'Almost like' isn't a reason. Corona and this are two different things. Similarity doesn't mean they're
          the same.
    - id: '47'
      type: vote
      duration_sec: 10
      text:
        ru: '«Ты предлагаешь делать домашку в классе — значит хочешь, чтобы мы вообще не гуляли!»

          '
        uk: «Усі топові геймери використовують цей контролер!»
        en: '"All top gamers use this controller!"'
      options:
      - id: opt_1
        text:
          ru: Пугало
          uk: Поспішне узагальнення
          en: Hasty generalization
      - id: opt_2
        text:
          ru: Вопрос-ловушка
          uk: Хибна дилема
          en: False dilemma
      - id: opt_3
        text:
          ru: Ложный авторитет
          uk: Ложный авторитет
          en: False authority
      correct: opt_1
    - id: '48'
      type: speech
      duration_sec: 12
      text:
        ru: 'Пугало! Он сказал «домашку в классе» — а ему приписали «не гулять вообще». Исказили слова до абсурда и спорят
          с тем, чего не было.

          '
        uk: Поспішне узагальнення! «Усі топові» — як вони це перевірили? Вони всіх опитали? Один контролер — не судьба всіх
          геймерів.
        en: Hasty generalization! 'All top' - how did they verify this? Did they ask everyone? One controller doesn't determine
          all gamers' fates.
    - id: '49'
      type: vote
      duration_sec: 10
      text:
        ru: '«Ты уже перестал есть чужие куски торта?»

          '
        uk: «Як я можу довіряти твоїм словам, якщо ти вчора помилився?»
        en: '"How can I trust you if you were wrong yesterday?"'
      options:
      - id: opt_1
        text:
          ru: Уклонение от ответа
          uk: Нападка на людину
          en: Attack on the person
      - id: opt_2
        text:
          ru: Подмена понятий
          uk: Ухилення від ответу
          en: Dodging the question
      - id: opt_3
        text:
          ru: Вопрос-ловушка
          uk: Хибна дилема
          en: False dilemma
      correct: opt_3
    - id: '50'
      type: speech
      duration_sec: 12
      text:
        ru: 'Вопрос-ловушка! Скажешь «да» — значит раньше ел. Скажешь «нет» — значит до сих пор ешь. Обвинение спрятано внутри
          вопроса. Любой ответ — проигрыш.

          '
        uk: Нападка на людину! Помилка вчора — не означає брехня сьогодні. Люди помиляються, це нормально. Це не аргумент.
        en: Attack on the person! A mistake yesterday doesn't mean a lie today. People make mistakes - it's normal. That's
          not an argument.
    - id: '51'
      type: vote
      duration_sec: 10
      text:
        ru: '«Почему не принёс тетрадку?» — «А вы видели, какой бардак в раздевалке?!»

          '
        uk: «Це твоя ідея? То ти порушник авторських прав!»
        en: '"Is this your idea? Then you''re infringing on someone''s rights!"'
      options:
      - id: opt_1
        text:
          ru: Уклонение от ответа
          uk: Підмена понять
          en: Substituting concepts
      - id: opt_2
        text:
          ru: Нападка на человека
          uk: Опудало
          en: Scarecrow
      - id: opt_3
        text:
          ru: Ложная причина
          uk: Хибна причина
          en: False cause
      correct: opt_1
    - id: '52'
      type: speech
      duration_sec: 12
      text:
        ru: 'Уклонение от ответа! Тетрадка забыта, а разговор уехал в раздевалку. Стрелки переведены — и вопрос повис без
          ответа. Ловко, но заметно.

          '
        uk: Опудало! Мати ідею й порушити право — різні речі. Ідея може бути оригінальною й дозволеною.
        en: Scarecrow! Having an idea and infringing rights are different things. An idea can be original and allowed.
    - id: '53'
      type: vote
      duration_sec: 10
      text:
        ru: '«Не придёшь на репетицию — выступление провалится — клуб закроют — все потеряют друзей!»

          '
        uk: «Цей артист всім подобається — значить він гарний!»
        en: '"Everyone likes this artist - so he''s good!"'
      options:
      - id: opt_1
        text:
          ru: Подмена понятий
          uk: Ложный авторитет
          en: False authority
      - id: opt_2
        text:
          ru: Поспешное обобщение
          uk: Поспішне узагальнення
          en: Hasty generalization
      - id: opt_3
        text:
          ru: Страшная цепочка
          uk: Хибна дилема
          en: False dilemma
      correct: opt_3
    - id: '54'
      type: speech
      duration_sec: 12
      text:
        ru: 'Страшная цепочка! Одна пропущенная репетиция — и сразу «потеряют друзей»? Каждое звено придумано. Цепочка ужасов
          из воздуха.

          '
        uk: Поспішне узагальнення! «Всім» — не факт. Популярність не дорівнює таланту. Можна бути славним й послабим артистом.
        en: Hasty generalization! 'Everyone' isn't a fact. Popularity doesn't equal talent. You can be famous and a mediocre
          artist.
    - id: '55'
      type: vote
      duration_sec: 10
      text:
        ru: '«Мой любимый блогер говорит, что растяжка не нужна — значит не буду!»

          '
        uk: «Якщо я не переживаю з приводу оцінок — то я не піклуюся про розум!»
        en: '"If I don''t worry about grades - then I don''t care about my mind!"'
      options:
      - id: opt_1
        text:
          ru: Ложный авторитет
          uk: Хибна дилема
          en: False dilemma
      - id: opt_2
        text:
          ru: Ложная дилемма
          uk: Опудало
          en: Scarecrow
      - id: opt_3
        text:
          ru: Пугало
          uk: Підмена понять
          en: Substituting concepts
      correct: opt_1
    - id: '56'
      type: speech
      duration_sec: 12
      text:
        ru: 'Ложный авторитет! Блогер — не тренер и не врач. У него миллион подписчиков, но ноль дипломов по спортивной медицине.
          Популярность — не экспертиза.

          '
        uk: Хибна дилема! Забіги про оцінки й забіги про розум — різні речи. Можна розвивати розум по-своєму, не через оцінки.
        en: False dilemma! Worrying about grades and worrying about mind development are different. You can develop your mind
          your own way, not through grades.
    - id: '57'
      type: vote
      duration_sec: 10
      text:
        ru: '«Учитель сказал "будьте активнее" — значит можно бегать по классу!»

          '
        uk: «Ніхто нормальний не ходить в похід без правильного обладнання!»
        en: '"No normal person goes hiking without proper equipment!"'
      options:
