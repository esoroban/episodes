        votes: 30

      - ep: 42
        blocks: ["11A.2"]
        story_beat: "Марко говорит с Голосом как с равным. «Когда вы перестали любить учеников?»"
        terms: ["признание частичной правоты"]
        votes: 10

      - ep: 43
        blocks: ["11B.1"]
        story_beat: "Последняя речь Голоса перед городом. Лина считает приёмы. 13-й приём"
        terms: ["демагогия", "слова-триггеры", "фильтр «Где факты?»"]
        votes: 34

      - ep: 44
        blocks: ["11B.2"]
        story_beat: "КАРТА: все приёмы → слово МАРКО. Система выстроена вокруг НЕГО"
        terms: ["универсальный ответ"]
        votes: 15

  # =====================================================================
  # ДЕНЬ 12 — Акт IV: Откровение
  # =====================================================================
  - day: 12
    lessons: ["12A", "12B"]
    story_arc: "Акт IV: Откровение"
    story_summary: "ГЛАВНЫЙ ТВИСТ: София и Голос — соавторы. Битва. Стены прозрачнеют"
