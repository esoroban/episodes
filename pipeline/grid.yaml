      - ep: 47
        blocks: ["12B.1"]
        story_beat: "Интеллектуальная битва. Марко выключает Софу: «Я должен сам»"
        terms: ["манипуляция", "четыре кнопки манипуляции", "универсальный ответ на манипуляцию"]
        votes: 23

      - ep: 48
        blocks: ["12B.2", "12B.3"]
        story_beat: "Стены прозрачнеют. Макс возвращается. Город становится обычным"
