        votes: 23
        merge_rationale: "12B.3 без терминов (финальный микс 15v) → к предыдущему блоку 12B.2 (8v)"

  # =====================================================================
  # ДЕНЬ 13 — Акт V: Возвращение
  # =====================================================================
  - day: 13
    lessons: ["13A"]
    story_arc: "Акт V: Возвращение"
    story_summary: "Школа. Марко видит приёмы. Рей учится. Мама — правда. Новая девочка. Финал «1»"
    source_episodes: [37, 38, 39, 40]
    episodes:

      - ep: 49
        blocks: ["13A.1"]
        story_beat: "Школа. Марко видит приёмы повсюду. Рей — обычный подросток. Мама: правда без увиливания"
