# STORY GRID
# Грубая сетка: блоки уроков → дни → сюжет
# Сгенерирован на основе briefs/*.yaml + source/СИЛА_СЛОВА_40_ЭПИЗОДОВ.md
# Утверждён автором: 2026-04-12

max_per_day: 4
total_blocks_raw: 70
total_blocks_merged: 50
total_episodes: 50

days:

  # =====================================================================
  # ДЕНЬ 1 — Акт I: Исчезновение Софии
  # =====================================================================
  - day: 1
    lessons: ["1A", "1B"]
    story_arc: "Акт I: Пробуждение"
    story_summary: "Исчезновение Софии. Мама не помнит. Софа включается. Лина помнит"
    source_episodes: [1, 2]
    episodes:

      - ep: 1
        blocks: ["1A.1"]
        story_beat: "Утро без сестры. Мама не помнит. Софа включается"
        terms: ["факт", "мнение"]
        votes: 15

      - ep: 2
        blocks: ["1A.2"]
        story_beat: "Школа: одноклассники не верят. Виды неправды. Вера: «ты переутомился»"
        terms: ["неправда"]
        votes: 34

      - ep: 3
        blocks: ["1B.1", "1B.2"]
        story_beat: "Лина помнит Софию, но детали путаются. Как проверить?"
        terms: ["хитрое утверждение", "отговорка", "инструменты проверки"]
        votes: 24
        merge_rationale: "Оба блока о способах проверки (хитрые утверждения + инструменты). 1B.2 всего 8v, естественно продолжает 1B.1"

      - ep: 4
        blocks: ["1B.3"]
        story_beat: "Марко проверяет Лину. Система трёх вопросов. «Они слушают»"
        terms: ["детектив правды"]
        votes: 68

  # =====================================================================
  # ДЕНЬ 2 — Акт I: Зеркальный Город
  # =====================================================================
  - day: 2
    lessons: ["2A", "2B"]
    story_arc: "Акт I: Пробуждение"
    story_summary: "Невидимая дверь. Вход в Зеркальный Город. Леон. Число 47"
    source_episodes: [3, 4, 5, 6]
    episodes:

      - ep: 5
        blocks: ["2A.1"]
        story_beat: "Невидимая дверь в парке. Пальцы проваливаются — повторяемость"
        terms: ["повторяемость", "закономерность", "совпадение"]
        votes: 17

      - ep: 6
        blocks: ["2A.2"]
        story_beat: "Вход в Город. Леон варит чай. Тень Леона не улыбается — три раза"
        terms: ["светофор повторений"]
        votes: 17

      - ep: 7
        blocks: ["2B.1"]
        story_beat: "Число 47 → 46 → 44. Артефакты стирают память о Софии"
        terms: ["причина", "следствие", "после — не значит вследствие"]
        votes: 17

      - ep: 8
        blocks: ["2B.2"]
        story_beat: "Число падает САМО. Кто-то другой тоже стирает. Третья причина"
        terms: ["третья причина"]
        votes: 38

  # =====================================================================
  # ДЕНЬ 3 — Акт I: Первые потери
  # =====================================================================
  - day: 3
    lessons: ["3A", "3B"]
    story_arc: "Акт I: Пробуждение"
    story_summary: "Ссора с Линой. Макс. ПЕРВОЕ СТИРАНИЕ Леона. Вера вытягивает информацию"
    source_episodes: [7, 8]
    episodes:

      - ep: 9
        blocks: ["3A.1"]
        story_beat: "Ссора Марко и Лины из-за артефактов. Три цели: победить, понять, обидеть"
        terms: ["три цели спора"]
        votes: 36

      - ep: 10
        blocks: ["3A.2"]
        story_beat: "Марко пробует заново — как разведчик. Серая нитка на запястье Лины"
        terms: ["солдат", "разведчик"]
        votes: 21

      - ep: 11
        blocks: ["3B.1", "3B.2"]
        story_beat: "Макс с наполовину стёртым лицом. «Слова врут. Тело — нет»"
        terms: ["эмпатия (сопереживание)", "активное слушание"]
        votes: 12
        merge_rationale: "Два инструмента разведчика. Оба маленькие (7v + 5v). Единый контекст: слушай и чувствуй"

      - ep: 12
        blocks: ["3B.3"]
        story_beat: "СТИРАНИЕ ЛЕОНА. Вера обнимает и вытягивает информацию через заботу"
        terms: ["формула высказывания"]
        votes: 24

  # =====================================================================
  # ДЕНЬ 4 — Акт II: Обучение через боль
  # =====================================================================
  - day: 4
    lessons: ["4A", "4B"]
    story_arc: "Акт II: Обучение через боль"
    story_summary: "Зеркало-портал: мама. Рекламная улица. Рей. Два плаката Софии"
    source_episodes: [9, 10]
    episodes:

      - ep: 13
        blocks: ["4A.1"]
        story_beat: "Зеркало-портал: Марко видит маму. Язык тела вины"
        terms: ["невербальная коммуникация", "ГЛАЗ"]
        votes: 13

      - ep: 14
        blocks: ["4A.2", "4A.3", "4A.4"]
        story_beat: "Рекламная улица Города. Тело Рея противоречит словам"
        terms: ["зрительный контакт", "открытая поза", "закрытая поза", "жесты", "мимика", "интонация", "сарказм"]
        votes: 24
        merge_rationale: "Три блока деталей языка тела (контакт+поза 4v, жесты+мимика 6v, голос+сарказм 14v). Единая тема, малые votes"

      - ep: 15
        blocks: ["4B.1"]
        story_beat: "Два плаката Софии: «ПОМОГИТЕ» (пафос) и «ВСЁ ПО ПЛАНУ» (логос)"
        terms: ["доверие (Этос)", "чувства (Пафос)", "доказательства (Логос)"]
        votes: 27

      - ep: 16
        blocks: ["4B.2"]
        story_beat: "София — пленница или сообщница? Софа молчит впервые"
        terms: ["баланс способов"]
        votes: 33

  # =====================================================================
  # ДЕНЬ 5 — Акт II: Цепочка правды
  # =====================================================================
  - day: 5
    lessons: ["5A", "5B"]
    story_arc: "Акт II: Обучение через боль"
    story_summary: "Сопротивление. Дерево связей. МИДСЕЗОННАЯ БОМБА: мама выбрала"
    source_episodes: [11, 12, 13]
    episodes:

      - ep: 17
        blocks: ["5A.1", "5A.2", "5A.3", "5A.4"]
        story_beat: "Подпольное сопротивление. 7 звеньев пересказов. Как проверить источник?"
        terms: ["своими глазами", "услышал от других", "три вопроса для проверки", "уровни интернета", "дипфейк"]
        votes: 27
        merge_rationale: "5A перебит на 6 блоков (QA: агент перестарался). 4 блока по 5-11v объединены в один. Все — об оценке источников"

      - ep: 18
        blocks: ["5A.5", "5A.6"]
        story_beat: "Дерево связей Системы. Одна ветка — в реальный мир. Кто передаёт?"
        terms: ["правило двух источников", "один человек думает vs много людей проверили"]
        votes: 26
        merge_rationale: "Оба блока о множественной проверке. 5A.5 (11v) + 5A.6 (15v) = 26v"

      - ep: 19
        blocks: ["5B.1", "5B.2"]
        story_beat: "МИДСЕЗОННАЯ БОМБА: мама увиливает пять раз. «Я выбрала тебя»"
        terms: ["центральная идея", "дерево спора", "ствол", "ветка (аргумент)", "листок (деталь)", "формула сути"]
        votes: 13
        merge_rationale: "Единая метафора дерева спора. 5B.1 (6v) + 5B.2 (7v) = 13v"

      - ep: 20
        blocks: ["5B.3", "5B.4"]
        story_beat: "Запись Софии: «Мам, я бы тоже выбрала его.» Независимые vs зависимые"
        terms: ["независимые источники", "зависимые источники"]
        votes: 23
        merge_rationale: "5B.4 без терминов (финальная тренировка 15v) → к предыдущему блоку 5B.3 (8v)"

  # =====================================================================
  # ДЕНЬ 6 — Акт II: 72 часа
  # =====================================================================
  - day: 6
    lessons: ["6A", "6B"]
    story_arc: "Акт II: Обучение через боль"
    story_summary: "72 часа Макса. Противоречия Голоса. СТИРАНИЕ МАКСА"
    source_episodes: [14, 15, 16]
    episodes:

      - ep: 21
        blocks: ["6A.1", "6A.2"]
        story_beat: "Рей на площади: «ВСЕ, КАЖДЫЙ, НИКТО». Голос даёт Максу 72 часа"
        terms: ["уклонение от ответа (поворотник)", "смена темы", "смена тональности", "ответ на другой вопрос"]
        votes: 20
        merge_rationale: "6A.2 (6v) развивает тему 6A.1 (14v). Три способа уклонения — естественное продолжение определения"

      - ep: 22
        blocks: ["6A.3", "6A.4"]
        story_beat: "Софиины записи: «Что сказал / Что сделал». Десятки противоречий Голоса"
        terms: ["вопрос-детектор", "волшебная фраза (возврат к вопросу)"]
        votes: 20
        merge_rationale: "Два инструмента защиты от уклонения. 6A.3 (10v) + 6A.4 (10v) = 20v"

      - ep: 23
        blocks: ["6B.1"]
        story_beat: "Агенты атакуют Макса словами: «бросил брата», «трус», «никто»"
        terms: ["обобщение (ловушка слов)"]
        votes: 22

      - ep: 24
        blocks: ["6B.2", "6B.3"]
        story_beat: "СТИРАНИЕ МАКСА. «Скажи моё имя. Я забываю.» Контр-ход бесполезен"
        terms: ["подмена понятий", "закон тождества", "контр-ход"]
        votes: 35
        merge_rationale: "Подмена понятий + контр-ход (защита). 35v — пограничный (>30), но тематически неразрывны. Утверждено автором"

  # =====================================================================
  # ДЕНЬ 7 — Акт II: Новый союзник
  # =====================================================================
  - day: 7
    lessons: ["7A", "7B"]
    story_arc: "Акт II: Обучение через боль"
    story_summary: "Марко один. Сем. Число падает без артефактов. Голос — ОТЕЦ Веры"
    source_episodes: [17, 18]
    episodes:

      - ep: 25
        blocks: ["7A.1"]
        story_beat: "Марко один. Появляется Сем (10 лет). Учить другого = учиться самому"
        terms: ["противоречие", "закон непротиворечия"]
        votes: 19

      - ep: 26
        blocks: ["7A.2"]
        story_beat: "Число падает без артефактов. Кто стирает? Цепочка причин к Вере"
        terms: ["корректное напоминание"]
        votes: 6

      - ep: 27
        blocks: ["7B.1"]
        story_beat: "Файл Веры: «Папа сказал, что Зеркальный Город — дом»"
        terms: ["обоснование", "три типа обоснования"]
        votes: 10

      - ep: 28
        blocks: ["7B.2", "7B.3"]
        story_beat: "Голос — ОТЕЦ Веры. «София знала. Она готовила тебя к этому»"
        terms: ["нападение на человека", "три вида нападения", "защита от нападения (три шага)"]
        votes: 13
        merge_rationale: "7B.3 без терминов (практика за весь день, 10v) → к предыдущему блоку 7B.2 (3v)"

  # =====================================================================
  # ДЕНЬ 8 — Акт III: Искажённые слова
  # =====================================================================
  - day: 8
    lessons: ["8A", "8B"]
    story_arc: "Акт III: Предательство"
    story_summary: "Пропаганда Рея. Правда вырвана из контекста. Манипуляция страхом. Мама уходит"
    source_episodes: [19, 20, 21]
    episodes:

      - ep: 29
        blocks: ["8A.1"]
        story_beat: "Радио Рея: «Мальчик хочет УНИЧТОЖИТЬ город!» — соломенное чучело"
        terms: ["пугало (искажение слов)", "преувеличение", "упрощение", "добавление", "изменение смысла"]
        votes: 29

      - ep: 30
        blocks: ["8A.2", "8A.3"]
        story_beat: "Правда вырвана из контекста. Сем: «Ты видел и ничего не сделал?»"
        terms: ["уточнение (формула защиты)", "честный пересказ"]
        votes: 9
        merge_rationale: "Уточнение (5v) + честный пересказ (4v). Оба — защита от пугала. Малые блоки"

      - ep: 31
        blocks: ["8B.1", "8B.2"]
        story_beat: "Голос давит страхом: «Мама забудет.» «Ты останешься один.» «Сем — следующий»"
        terms: ["манипуляция страхом", "четыре вида запугивания", "три вопроса-фильтра"]
        votes: 16
        merge_rationale: "Манипуляция страхом (8v) + вопросы-фильтры (8v). Оба по 8v, единая тема"

      - ep: 32
        blocks: ["8B.3"]
        story_beat: "Мама ИСЧЕЗЛА — ушла в Зеркальный Город сама. Четыре шага защиты"
        terms: ["четыре шага защиты от запугивания"]
        votes: 13

  # =====================================================================
  # ДЕНЬ 9 — Акт III: Предательство
  # =====================================================================
  - day: 9
    lessons: ["9A", "9B"]
    story_arc: "Акт III: Предательство"
    story_summary: "План вернуть Макса. Три серых нитки Лины. ПРЕДАТЕЛЬСТВО. Лина — агент Софии"
    source_episodes: [22, 23]
    episodes:

      - ep: 33
        blocks: ["9A.1"]
        story_beat: "Марко строит план вернуть Макса. Каждый шаг — цена"
        terms: ["страшная цепочка"]
        votes: 6

      - ep: 34
        blocks: ["9A.2"]
        story_beat: "Лина: «Отдам свою память.» Три серых нитки — три контакта ДО всего"
