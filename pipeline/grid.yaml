      - ep: 39
        blocks: ["10B.1", "10B.2"]
        story_beat: "Стеклянная комната. Голос заставляет Софию говорить загруженными вопросами"
        terms: ["составной вопрос", "вопрос-ловушка"]
        votes: 19
        merge_rationale: "Два типа хитрых вопросов. 10B.1 (11v) + 10B.2 (8v) = 19v"

      - ep: 40
        blocks: ["10B.3"]
        story_beat: "Башня Голоса. Марко проникает, используя слова как оружие"
        terms: ["риторический вопрос (вопрос-утверждение)"]
        votes: 18

  # =====================================================================
  # ДЕНЬ 11 — Акт III-IV: Передемагогировать
  # =====================================================================
  - day: 11
    lessons: ["11A", "11B"]
    story_arc: "Акт III-IV: Откровение"
    story_summary: "Марко перехватывает толпу у Рея. Последняя речь Голоса. Карта = МАРКО"
    source_episodes: [27, 28, 29]
    episodes:

      - ep: 41
        blocks: ["11A.1"]
        story_beat: "Рей на сцене. Марко перехватывает толпу. Сем: «В чём разница?»"
