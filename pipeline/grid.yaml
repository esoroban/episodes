        votes: 13

      - ep: 36
        blocks: ["9B.2"]
        story_beat: "Под нитками — шрам «С». Лина — агент Софии, не Голоса"
        terms: []
        votes: 18

  # =====================================================================
  # ДЕНЬ 10 — Акт III: Стеклянная комната
  # =====================================================================
  - day: 10
    lessons: ["10A", "10B"]
    story_arc: "Акт III: Предательство"
    story_summary: "Ложный выбор Рея и Голоса. Стеклянная комната Софии. Башня Голоса"
    source_episodes: [24, 25, 26]
    episodes:

      - ep: 37
        blocks: ["10A.1"]
        story_beat: "Рей один на один: «Отдай или потеряй.» Голос: два варианта"
        terms: ["ложная дилемма", "закон исключённого третьего"]
        votes: 26

      - ep: 38
        blocks: ["10A.2", "10A.3"]
        story_beat: "Третий вариант: сломать артефакты? Голос Софии: «НЕ СМЕЙ!» Плана нет"
