# LESSON BRIEF — lesson_5A
# Сгенерирован из lessons_ru/lesson_5A.yaml

lesson_id: lesson_5A
title: "Откуда ты это знаешь?"

terms_introduced:
  - term: "своими глазами"
    definition: "тип источника, когда человек сам видел, сам сделал, сам измерил — очевидец, документ, эксперимент"
  - term: "услышал от других"
    definition: "тип источника, когда человек пересказывает чужие слова — друг сказал, в интернете написали, по телевизору показали"
  - term: "три вопроса для проверки"
    definition: "инструмент оценки источника: 1) разбирается ли человек в этом? 2) хочет ли он что-то получить? 3) можно ли проверить?"
  - term: "уровни интернета"
    definition: "четыре уровня надёжности: 1) официальные сайты, 2) новостные сайты и энциклопедии, 3) блоги и соцсети, 4) чаты и пересылки"
  - term: "дипфейк"
    definition: "глубокая подделка — ИИ может создать фальшивые фото, видео и голос, которые выглядят и звучат как настоящие"
  - term: "правило двух источников"
    definition: "если одно и то же говорят два разных НЕЗАВИСИМЫХ источника — информации можно верить намного больше"
  - term: "один человек думает vs много людей проверили"
    definition: "мнение одного человека — даже умного — ещё не факт; факт — когда много людей независимо проверили и подтвердили"

blocks:

  - id: "5A.1"
    title: "Своими глазами vs услышал от других"
    scenes: [sc1, sc2, sc3, sc4]
    terms_introduced: ["своими глазами", "услышал от других"]
    terms_used: ["доверие", "чувства", "доказательства"]
    votes: 11
    summary: >
      Разминка: повторение трёх способов убеждения (доверие, чувства, доказательства) через 5 голосований.
      Открытие темы через историю Дмитрика: «Откуда ты это знаешь?» — главный вопрос разведчика.
      История о динозавре: Дмитрик приносит видео из интернета, друзья задают правильные вопросы
      (кто снял? откуда информация? кто подтвердил?). Вводятся два типа источников:
      «своими глазами» (очевидец, документ, эксперимент) и «услышал от других» (пересказ).
      Практика: 5 голосований — определить тип источника.
    key_material:
      - "Главный вопрос разведчика: «Откуда ты это знаешь?»"
      - "История: Дмитрик и видео динозавра в парке — цепочка: неизвестный → интернет → Петрик → Дмитрик"
      - "Пример контраста: учитель сам составил расписание (своими глазами) vs Дмитрик пересказывает (услышал)"
      - "«Услышал от других» — не значит враньё, но надо проверять"
      - "Метафора: испорченный телефон — каждый пересказ добавляет ошибку"
    practice_summary: >
      sc1: 5 vote — разминка, определить способ убеждения (доверие/чувства/доказательства).
      sc3: 1 vote — почему дети не поверили Дмитрику (источник ненадёжный).
      sc4: 5 vote — своими глазами или услышал от других (кошка, бабушка, друг, дневник, телевизор).

  - id: "5A.2"
    title: "Три вопроса для проверки источника"
    scenes: [sc5]
    terms_introduced: ["три вопроса для проверки"]
    terms_used: ["своими глазами", "услышал от других"]
    votes: 5
    summary: >
      Вводится инструмент — три вопроса для проверки источника: 1) Разбирается ли человек в этом?
      (каждый эксперт — эксперт в СВОЕЙ теме), 2) Хочет ли он что-то получить? (продавец хвалит
      свой товар — у него выгода), 3) Можно ли проверить? (если нельзя — фонарик мигает красным).
      Практика: 5 голосований (ветеринар, продавец, мама, чат, учитель). Сложный случай: блогер
      с миллионом подписчиков рекламирует витамины — все три ключа красные. Миллион подписчиков —
      про популярность, а не про знания.
    key_material:
      - "Три вопроса: Разбирается? Хочет получить? Можно проверить?"
      - "Метафора: три ключа от сейфа с правдой"
      - "Кейс блогера с витаминами: не доктор, получает деньги за рекламу, нет научных данных — все три ключа красные"
      - "Повар знает про суп, но не про ракеты — эксперт в СВОЕЙ теме"
    practice_summary: >
      sc5: 5 vote — можно верить / лучше не верить / нужно проверить (ветеринар про прививки,
      продавец про игрушки, мама про радугу, анонимный чат про закрытие школы, учитель с книгой).

  - id: "5A.3"
    title: "Уровни интернета"
    scenes: [sc6]
    terms_introduced: ["уровни интернета"]
    terms_used: ["три вопроса для проверки"]
    votes: 6
    summary: >
      Вводится классификация интернет-источников по четырём уровням надёжности.
      Метафора: интернет — огромная библиотека, где на одной полке энциклопедия,
      а на соседней — тетрадка с фантазиями первоклассника. Уровень 1: официальные сайты
      (больница, школа, музей). Уровень 2: новостные сайты и энциклопедии. Уровень 3: блоги
      и соцсети (как объявление на заборе). Уровень 4: чаты и пересылки (шёпот в тёмном коридоре).
      Практика: 6 голосований — надёжный или ненадёжный источник.
    key_material:
      - "Интернет — библиотека, где энциклопедия стоит рядом с тетрадкой первоклассника"
      - "4 уровня: официальные сайты → новости/энциклопедии → блоги/соцсети → чаты/пересылки"
      - "Объявление на заборе — повесить может кто угодно (блоги)"
      - "Шёпот в тёмном коридоре (чаты и пересылки) — самый ненадёжный уровень"
      - "Чем больше восклицательных знаков — тем больше подозрений у разведчика"
    practice_summary: >
      sc6: 6 vote — надёжный или ненадёжный (сайт больницы, пост блогера, энциклопедия,
      сообщение в чате, новостной сайт со ссылкой на учёных, картинка в родительском чате).

  - id: "5A.4"
    title: "ИИ-подделки и дипфейки"
    scenes: [sc7]
    terms_introduced: ["дипфейк"]
    terms_used: ["своими глазами", "уровни интернета"]
    votes: 5
    summary: >
      Переворот: раньше «вижу — значит верю», теперь даже фото и видео могут врать.
      ИИ может нарисовать фото несуществующего человека, сделать видео, где известный
      человек говорит то, чего не говорил (дипфейк — глубокая подделка), и написать
      фальшивую статью с выдуманными цифрами и цитатами. Новое правило: «Вижу — но КТО
      мне это показывает? И ЗАЧЕМ?» Практика: 5 голосований — можно доверять или стоит проверить.
    key_material:
      - "Дипфейк — глубокая подделка: ИИ создаёт фальшивые фото, видео, голос и текст"
      - "Старое правило: «Вижу — значит верю». Новое: «Вижу — но КТО показывает? И ЗАЧЕМ?»"
      - "ИИ может сделать фото за 10 секунд, подделать голос за несколько секунд"
      - "Учебник — проверенный источник; призмы существуют миллионы лет, подделывать бессмысленно"
    practice_summary: >
      sc7: 5 vote — можно доверять или стоит проверить (друг с фото тигра, сайт зоопарка
      с жирафёнком, аудио «от директора» в чате, собственное фото оценки, видео с учёным в соцсетях).

  - id: "5A.5"
    title: "Правило двух источников"
    scenes: [sc8, sc9]
    terms_introduced: ["правило двух источников"]
    terms_used: ["своими глазами", "услышал от других", "три вопроса для проверки", "уровни интернета", "дипфейк"]
    votes: 11
    summary: >
      Вводится золотое правило журналистов: если два НЕЗАВИСИМЫХ источника говорят одно и то же —
      информации можно верить больше. Ключевое уточнение: источники должны быть НЕЗАВИСИМЫМИ.
      Три пересказчика одного чата — это один источник, а не три. Один автор на двух платформах —
      один источник. Метафора: один плакат на двух заборах. Практика: 6 голосований на правило
      двух источников. Затем комплексный кейс «пропавший котёнок»: пост с милым фото гуляет по
      чатам 5 лет — применяются ВСЕ изученные инструменты (тип источника, три вопроса, уровень
      интернета, дата, правило двух источников). Котёнок давно вырос в наглого кота.
    key_material:
      - "Правило двух источников: два НЕЗАВИСИМЫХ источника говорят одно и то же — надёжно"
      - "Количество пересказчиков ≠ количество источников"
      - "Метафора: один плакат на двух заборах — заборов два, а плакат один"
      - "Кейс «пропавший котёнок»: пост 5-летней давности, автор неизвестен, без контактов — полная проверка всеми инструментами"
      - "Подписчики блогера — не независимые источники, а эхо в горах"
    practice_summary: >
      sc8: 6 vote — два источника или один (экскурсия, три одноклассника из одного чата,
      новостной сайт + друг-очевидец, одно видео на двух платформах, соседка + сайт города,
      два блогера от одного заказчика).
      sc9: 5 vote — комплексная проверка кейса «пропавший котёнок» (тип источника, можно ли
      проверить, уровень интернета, дата поста, правило двух источников).

  - id: "5A.6"
    title: "Один думает vs много проверили — итог и безопасность"
    scenes: [sc10, sc11, sc12, sc13]
    terms_introduced: ["один человек думает vs много людей проверили"]
    terms_used: ["своими глазами", "услышал от других", "три вопроса для проверки", "уровни интернета", "дипфейк", "правило двух источников"]
    votes: 15
    summary: >
      Вводится последнее понятие: мнение одного человека (даже умного) — ещё не факт;
      факт — когда много людей независимо проверили. Метафора: сто языков не обманешь.
      Практика: 5 голосований (кипение воды, учитель физкультуры, летающие машины, врачи про сон,
      мальчик про собаку). Затем важная тема безопасности: сценарий с фальшивым голосовым
      сообщением «от мамы» — все инструменты урока применяются к реальной угрозе. Правило:
      позвонить маме, никуда не ходить с незнакомцем, сказать взрослому рядом. «Если говорят
      не проверяй — это ВСЕГДА подозрительно». Финальный блиц: 10 голосований вперемешку по всем
      темам. Закрытие: итог шести инструментов разведчика.
    key_material:
      - "Мнение одного человека ≠ факт. Факт — когда много людей независимо проверили"
      - "Метафора: сто языков не обманешь (коллективная проверка)"
      - "Сценарий безопасности: фальшивое голосовое «от мамы» с просьбой уехать с незнакомцем"
      - "Правило: настоящая мама НИКОГДА не пришлёт незнакомого забрать ребёнка"
      - "«Не проверяй, просто доверься» — ВСЕГДА подозрительно. Правда проверки не боится"
      - "Алгоритм: позвонить маме (не писать), если не берёт — другому взрослому из семьи, никуда не ходить с незнакомцем"
    practice_summary: >
      sc10: 5 vote — много проверили / один думает / слух (кипение воды, учитель про бег,
      летающие машины, врачи про сон, мальчик про собаку).
      sc12: 10 vote — финальный блиц, все инструменты вперемешку (сосед-очевидец, тренер,
      пост «СРОЧНО», кот-пианист, качели + страница парка, бабушкино варенье, фото с президентом,
      два блогера с одним заказчиком, сайт музея, шоколад «от учёных» в чате).
