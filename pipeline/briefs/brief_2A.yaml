# LESSON BRIEF — lesson_2A
# Сгенерирован из lessons_ru/lesson_2A.yaml

lesson_id: lesson_2A
title: "Как проверять утверждения"

terms_introduced:
  - term: "повторяемость"
    definition: "если результат получается каждый раз — это надёжно; если один раз да, один раз нет — совпадение"
  - term: "закономерность"
    definition: "результат повторяется всегда, работает без нас (камень падает, вода кипит, сахар растворяется)"
  - term: "совпадение"
    definition: "мозг придумал связь, которой нет; бывает по-разному, не проходит проверку светофором"
  - term: "светофор повторений"
    definition: "один раз — красный (стоп, не делай вывод); два-три — жёлтый (проверяй дальше); пять и больше одинаковых результатов — зелёный (похоже на закономерность)"

blocks:

  - id: "2A.1"
    title: "Повторяемость: закономерность и совпадение"
    scenes: [sc1, sc2, sc3]
    terms_introduced: ["повторяемость", "закономерность", "совпадение"]
    terms_used: ["факт", "мнение", "неправда", "хитрое утверждение"]
    votes: 17
    summary: >
      Повторение урока 1A: три слова (факт, мнение, неправда), пять инструментов проверки,
      хитрые утверждения, три вопроса детектива — 9 голосований на повторение (проверяемое, мнение, хитрое).
      История-зацепка: Дмитрик хвастается, что самый быстрый в школе, Сашко предлагает проверить
      секундомером — Сашко побеждает дважды, но Дмитрик придумывает отговорки (шнурок, недосып).
      Ключевой переход: «мне кажется» — это ещё не проверка; одна проверка — тоже не всё.
      Вводится понятие «повторяемость»: если результат получается каждый раз — это закономерность
      (мяч падает, вода кипит); если один раз совпало — это совпадение (футболка, желание на звезду).
      Четвёртый вопрос детектива правды: «А это повторяется?»
      Практика: 6 голосований — закономерность или совпадение.
    key_material:
      - "История: Дмитрик vs Сашко — забег 100 м, секундомер, отговорки"
      - "Ощущение ≠ факт: Дмитрику казалось, что он быстрый, но секундомер показал другое"
      - "Определение повторяемости: результат каждый раз — надёжно; один раз — совпадение"
      - "Определение закономерности: работает без нас (камень падает, вода кипит)"
      - "Определение совпадения: мозг придумал связь (футболка и победа, желание на звезду)"
      - "Мозг — великий выдумщик: обожает находить связи, даже там, где их нет"
      - "Четвёртый вопрос детектива: «А это повторяется?»"
      - "Пример: красная футболка Дмитрика — запомнил совпадение, забыл несовпадение"
    practice_summary: >
      sc1: 9 vote — повторение урока 1A: факт/мнение/неправда (3 vote) +
      проверяемое/мнение/хитрое утверждение (6 vote).
      sc2: 2 vote — утверждение Дмитрика (неправда) + ведёт ли себя как Витя с камнем (да).
      sc3: 6 vote — закономерность или совпадение (камень, желание на звезду, вода кипит,
      парта и оценка, солнце на востоке, счастливые носки).

  - id: "2A.2"
    title: "Светофор повторений"
    scenes: [sc4, sc5, sc6]
    terms_introduced: ["светофор повторений"]
    terms_used: ["повторяемость", "закономерность", "совпадение"]
    votes: 17
    summary: >
      Вводится инструмент «светофор повторений»: один раз — красный (стоп, не делай вывод),
      два-три раза — жёлтый (проверяй дальше), пять и больше одинаковых результатов — зелёный
      (похоже на закономерность). Примеры: монетка (один орёл — не значит, что всегда орёл),
      доктор (одна таблетка одному человеку — не доказательство). Важное правило: условия проверки
      должны быть одинаковые (бег по стадиону оба раза — честно, один раз в гору — нечестно).
      Практика: 15 голосований — закономерность или совпадение (мороженое тает, машина и дождь,
      кепка и победа, бабушка чихнула, сахар в чае и т.д.).
      Закрытие: зачем нам всё это — суперсила в жизни (браслет и оценки, реклама, лекарства).
      Итог: четыре вопроса детектива (есть инструмент? нет отговорок? что показала проверка? повторяется ли?).
    key_material:
      - "Светофор: красный (1 раз) — жёлтый (2–3) — зелёный (5+)"
      - "Пример: монетка — один раз орёл не значит, что всегда орёл"
      - "Пример: доктор проверяет лекарство на тысячах людей, один раз не считается"
      - "Правило: условия проверки должны быть одинаковые"
      - "Применение в жизни: браслет и контрольная, реклама, «я один раз проверил»"
      - "Итог: четыре вопроса детектива правды"
      - "Мозг запоминает совпадения и забывает всё остальное"
    practice_summary: >
      sc4: 2 vote — один раз хватит или нужно больше проверок (Петя и Миша) +
      закономерность или совпадение (лампочка 100 из 100).
      sc5: 15 vote — закономерность или совпадение (мороженое, машина и дождь, кепка,
      бабушка чихнула, сахар в чае, друг позвонил, бумага в воде, растение и комплимент,
      чёрная кошка, лёд на батарее, улыбка и солнце, стакан на полу, хлопок и собака,
      морозильник, контрольная и холод).
