# LESSON BRIEF — lesson_6A
# Сгенерирован из lessons_ru/lesson_6A.yaml

lesson_id: lesson_6A
title: "Уклонение от ответа"

terms_introduced:
  - term: "уклонение от ответа (поворотник)"
    definition: "когда человек вроде бы отвечает, но на ваш вопрос не отвечает — как машина, включил поворотник и уехал в другую сторону"
  - term: "смена темы"
    definition: "первый способ уклонения — человек начинает говорить о чём-то совсем другом, надеясь, что вы забудете вопрос"
  - term: "смена тональности"
    definition: "второй способ уклонения — человек шутит или показывает сильные эмоции (крик, слёзы), чтобы отвлечь от вопроса"
  - term: "ответ на другой вопрос"
    definition: "третий, самый коварный способ уклонения — человек вроде бы отвечает, но не на тот вопрос, который задали"
  - term: "вопрос-детектор"
    definition: "проверочный вопрос самому себе: «Ответил ли человек на ТОТ вопрос, который я задал?» Если нет — он включил поворотник"
  - term: "волшебная фраза (возврат к вопросу)"
    definition: "«Это интересно, но я спрашивал о другом...» — вежливый способ вернуть разговор к исходному вопросу"

blocks:

  - id: "6A.1"
    title: "Что такое уклонение от ответа"
    scenes: [sc1, sc2, sc3, sc4]
    terms_introduced: ["уклонение от ответа (поворотник)"]
    terms_used: ["факт", "мнение", "неправда", "причина", "совпадение", "логос", "этос", "пафос", "ствол", "ветка", "листок", "источник"]
    votes: 14
    summary: >
      Разминка-блиц по всему курсу (факт/мнение/неправда, причина/совпадение,
      логос/этос/пафос, дерево спора) и повторение уроков 5А–5Б (источники,
      независимые/зависимые источники). Затем — открытие новой темы через
      житейские примеры: «Ты сделал домашку?» — «А погода какая!»; «Кто съел
      конфету?» — «А конфеты изобрели в Древнем Египте!»; политики, которые
      красиво говорят, но не отвечают на вопрос. Вводится понятие «уклонение от
      ответа» и метафора «поворотник». История про Витю, который трижды уклоняется
      от маминого вопроса «кто съел конфеты», а мама спокойно возвращает к теме.
      Вывод: поворотники не работают, когда собеседник внимательный.
    key_material:
      - "Примеры из жизни: домашка → погода; конфета → Древний Египет; политик → «будет потрясающе» без плана"
      - "Метафора: уклонение = поворотник (как машина — включил и уехал в другую сторону)"
      - "История: Витя и конфеты — три поворотника подряд (кот на столе → контрольная на отлично → может это Оленка)"
      - "Вывод: мама-разведчик — спокойно повторяет вопрос, без крика и злости"
    practice_summary: >
      sc1: 6 vote — блиц-повторение всего курса (факт/мнение, причина/совпадение,
      этос/логос/пафос, дерево спора).
      sc2: 8 vote — повторение 5А–5Б (источники, надёжность, независимость,
      ствол/ветка/листок).

  - id: "6A.2"
    title: "Три способа уклонения"
    scenes: [sc5, sc6]
    terms_introduced: ["смена темы", "смена тональности", "ответ на другой вопрос"]
    terms_used: ["уклонение от ответа (поворотник)"]
    votes: 6
    summary: >
      Подробный разбор трёх способов включить поворотник. Смена темы: «Ты прибрал
      комнату?» — «А давай мультик!»; дельфины вместо ответа на 7×8; суп в Японии
      на завтрак. Смена тональности: шутка (смешная собака по дороге) или эмоция
      («Почему ты ВСЕГДА меня ругаешь?!»); эмоция — мощное оружие, потому что
      неловко продолжать спрашивать. Ответ на другой вопрос: самый коварный —
      похож на настоящий ответ («Я много читал!» вместо математики; «Помыл посуду!»
      вместо уборки комнаты). После каждого способа — творческое задание
      (придумай свой поворотник), затем практика на определение способа.
    key_material:
      - "Смена темы: надежда, что собеседник забудет вопрос (суп → суп в Японии на завтрак)"
      - "Смена тональности: шутка или сильная эмоция вместо ответа; эмоция — мощное оружие"
      - "Ответ на другой вопрос: самый коварный, похож на настоящий ответ; «поворотник без мигалки»"
      - "Творческие задания: придумай свою смену темы / тональности / ответ на другой вопрос"
    practice_summary: >
      sc6: 6 vote — определи способ уклонения (смена темы, смена тональности,
      ответ на другой вопрос или честный ответ).

  - id: "6A.3"
    title: "Вопрос-детектор"
    scenes: [sc7, sc8]
    terms_introduced: ["вопрос-детектор"]
    terms_used: ["уклонение от ответа (поворотник)", "смена темы", "смена тональности", "ответ на другой вопрос"]
    votes: 10
    summary: >
      Вводится инструмент «вопрос-детектор»: «Ответил ли человек на ТОТ вопрос,
      который я задал?» Аналогия с контрольной: если спросили 2+2, а написал
      «я люблю математику» — неверно. Формула: «Это ответ на МОЙ вопрос или
      на ДРУГОЙ?» Практика: пары вопрос–ответ, где один ответ честный, другой —
      поворотник (ластик, фильм, печенье, телефон, окно). Затем — творческая
      тренировка: дети сами придумывают три вида поворотников на вопросы
      «Ты выгулял собаку?», «Ты почистил зубы?», «Ты сделал уроки?»,
      «Ты убрал телефон?», «Ты поел суп?». Вывод: самый опасный — ответ на
      другой вопрос, потому что звучит как настоящий ответ.
    key_material:
      - "Вопрос-детектор: «Ответил ли человек на ТОТ вопрос, который я задал?»"
      - "Формула: «Это ответ на МОЙ вопрос или на ДРУГОЙ?»"
      - "Аналогия: контрольная — «Я люблю математику» вместо 2+2 = неверно"
      - "Пары ответов: «Потом верну» (поворотник) vs «Да, брал, вот он» (честно)"
      - "Вывод: самый опасный — ответ на другой вопрос, потому что похож на настоящий"
    practice_summary: >
      sc7: 10 vote — пары вопрос–ответ: определи, ответил или поворотник
      (ластик, фильм, печенье, звонок, окно).
      sc8: 0 vote, 5 discussion — творческая тренировка: придумай три
      вида поворотников на бытовые вопросы.

  - id: "6A.4"
    title: "Волшебная фраза и возврат к вопросу"
    scenes: [sc9, sc10, sc11]
    terms_introduced: ["волшебная фраза (возврат к вопросу)"]
    terms_used: ["уклонение от ответа (поворотник)", "смена темы", "смена тональности", "ответ на другой вопрос", "вопрос-детектор"]
    votes: 10
    summary: >
      Вводится инструмент «волшебная фраза»: «Это интересно, но я спрашивал
      о другом...» Варианты: «Подожди, я спросил о...», «Давай вернёмся к моему
      вопросу...» Принцип: сначала признаём сказанное, потом спокойно возвращаемся
      к вопросу. Метафора GPS: «Маршрут перестроен, возвращаемся к вопросу.»
      Важно: не нападаем, не обвиняем — просто повторяем вопрос. Практика:
      5 ситуаций с выбором правильного возврата. Финальная проверка: один вопрос
      «Хочешь в кино в субботу?» и 5 ответов — ответил или поворотник.
      Закрытие: история про мальчика и дедушку (дедушка включил поворотник →
      через год мальчик переспросил → дедушка честно ответил «да, бывало»).
      Вывод: повторить вопрос — не грубость, а уважение к себе и разговору.
    key_material:
      - "Волшебная фраза: «Это интересно, но я спрашивал о другом...»"
      - "Варианты: «Подожди, я спросил о...» / «Давай вернёмся к моему вопросу...»"
      - "Принцип: сначала признаём → потом возвращаемся; не нападаем, не обвиняем"
      - "Метафора GPS: маршрут перестроен, возвращаемся к вопросу"
      - "История: мальчик и дедушка — поворотник → переспросил через год → честный ответ «да, бывало»"
      - "Вывод: повторить вопрос — не грубость, а уважение к себе; честные ответы делают людей ближе"
    practice_summary: >
      sc9: 5 vote — выбери правильный вежливый возврат к вопросу (оценка,
      выход, экскурсия, контрольная, каникулы).
      sc10: 5 vote — финальная проверка: один вопрос «хочешь в кино?» и
      пять ответов (ответил или поворотник).
