# LESSON BRIEF — lesson_13A
# Сгенерирован из lessons_ru/lesson_13A.yaml

lesson_id: lesson_13A
title: "Спорить и не ругаться"

# Какие термины вводит этот урок (все блоки суммарно)
terms_introduced:
  - term: "спор vs ссора"
    definition: "спор — обсуждение темы; ссора — нападка на человека"
  - term: "Я-высказывание"
    definition: "способ сказать о чувствах, не нападая; формула: «Мне [чувство], когда [ситуация]»"
  - term: "фразы-спасатели"
    definition: "фразы для мирного выхода из спора: «Давай вернёмся позже», «Мне нужно подумать», «У нас разные мнения — и это нормально», «Давай сделаем паузу»"

# Блоки (каждый блок = один будущий эпизод)
blocks:

  - id: "13A.1"
    title: "Спор vs ссора и Я-высказывание"
    scenes: [sc1, sc2, sc3]
    terms_introduced: ["спор vs ссора", "Я-высказывание"]
    terms_used: ["факт", "мнение", "неправда", "наблюдение", "вывод", "ложная причина", "поспешное обобщение", "ложная дилемма", "нападка на человека", "ложный авторитет", "вопрос-ловушка", "независимые источники", "противоречие", "страшная цепочка", "уклонение от ответа"]
    votes: 27
    summary: >
      Большая разминка по всему курсу: двадцать вопросов по всем пройденным темам
      (факты/мнения, причины/совпадения, виды демагогии, источники, противоречия).
      Затем вводится различие «спор vs ссора» через историю Лёши и Киры: спор — про тему,
      ссора — когда нападают на человека. Вводится инструмент «Я-высказывание» с формулой
      «Мне [чувство], когда [ситуация]». Практика: пять ситуаций на выбор ответа
      (Я-высказывание vs нападка), затем восемь фраз на определение — обвинение или
      Я-высказывание.
    key_material:
      - "История: Лёша и Кира спорят о фильмах — начали про кино, закончили оскорблениями"
      - "Спор — обсуждение темы; ссора — нападка на человека"
      - "Формула Я-высказывания: «Мне [чувство], когда [ситуация]»"
      - "Обвинение: «ТЫ всегда...», «ТЫ никогда...», «Из-за ТЕБЯ...» — всё направлено на другого"
      - "Три спасательных приёма при сильных эмоциях: пауза, глубокий вдох, счёт до десяти"
    practice_summary: >
      sc1: 19 vote — разминка по всему курсу (опровержение обобщений, поспешное обобщение,
      проверка источников, наблюдение vs вывод, ложная причина, независимые источники,
      противоречие, уход от темы, страшная цепочка, ложная дилемма, нападка на человека,
      ложный авторитет, вопрос-ловушка, возражение vs нападка, достаточность примеров).
      sc2: 6 vote — выбор Я-высказывания в конфликтных ситуациях (друг кричит, одноклассница
      критикует, брат обвиняет, подруга жалуется, сосед по парте).
      sc3: 8 vote — определение: обвинение или Я-высказывание (восемь фраз).

  - id: "13A.2"
    title: "Мирный выход из спора и итоги курса"
    scenes: [sc4, sc5, sc6, sc7]
    terms_introduced: ["фразы-спасатели"]
    terms_used: ["спор vs ссора", "Я-высказывание"]
    votes: 8
    summary: >
      Вводятся «фразы-спасатели» — конкретные формулировки для мирного выхода из спора,
      когда эмоции зашкаливают. Главное правило: спор — о теме, не о человеке. Практика:
      восемь фраз на определение — спасёт отношения или ухудшит ситуацию. Затем открытая
      практика: пять историй-конфликтов, где дети сами придумывают выход (Я-высказывание
      или фраза-спасатель). Урок завершается шпаргалкой по всему курсу (все термины
      и приёмы за 13 дней) и напутствием.
    key_material:
      - "Четыре фразы-спасателя: «Давай вернёмся позже», «Мне нужно подумать», «У нас разные мнения — и это нормально», «Давай сделаем паузу»"
      - "Главное правило: спор — о теме, не о человеке"
      - "Пять историй для открытой практики: Лена и Вика (проект), Костя и Артём (футбол), Даша (стрижка), Тимур (посуда), Миша и Егор (телефон)"
      - "Шпаргалка: факт, мнение, неправда, наблюдение, вывод, «после» ≠ «из-за», источник, четыре способа проверки, достаточность примеров, независимые источники, противоречие, три типа обоснования, слова-ловушки, стереотипы, слухи, возражение vs нападка, три закона Аристотеля, двенадцать приёмов демагогии, четыре кнопки манипуляции, Я-высказывание, фразы-спасатели"
      - "Итог курса: критическое мышление — умение думать самостоятельно"
    practice_summary: >
      sc4: 8 vote — фраза спасёт отношения или ухудшит ситуацию (пауза, сарказм,
      принятие различий, «всё равно», переключение, ультиматум, уважение при несогласии,
      «ой, всё»).
      sc5: 5 discussion — открытая практика без вариантов ответа, дети сами формулируют
      выход из конфликта.
