# LESSON BRIEF — lesson_7A
# Сгенерирован из lessons_ru/lesson_7A.yaml

lesson_id: lesson_7A
title: "Противоречия и обоснование"

terms_introduced:
  - term: "противоречие"
    definition: "когда человек говорит одно, а делает или говорит противоположное — в одно и то же время, в одном и том же смысле"
  - term: "закон непротиворечия"
    definition: "одно и то же утверждение не может быть одновременно истинным и ложным (второй закон логики Аристотеля)"
  - term: "корректное напоминание"
    definition: "формула вежливого указания на противоречие: «Раньше ты говорил, что… Как это совмещается с…?» — без обвинений, с просьбой объяснить"

blocks:

  - id: "7A.1"
    title: "Противоречие и закон непротиворечия"
    scenes: [sc1, sc2, sc3, sc4, sc5]
    terms_introduced: ["противоречие", "закон непротиворечия"]
    terms_used: ["закон тождества"]
    votes: 19
    summary: >
      Зацепка: история про Петю с конфетами — шоколад на щеке противоречит словам «я не ел».
      Вводится понятие «противоречие» и закон непротиворечия Аристотеля: одно и то же утверждение
      не может быть одновременно истинным и ложным. История Вити с настольной игрой — придумал
      правило и сам его нарушил. Десять примеров-историй бытовых противоречий (не злюсь — в бешенстве,
      всё равно — расстраивается, никогда не перебиваю — перебивает). Важное уточнение: закон
      работает только «в одно и то же время, в одном и том же смысле» — смена погоды или разные
      люди не считаются. Практика в два раунда: базовый (10 голосований — противоречие или нет)
      и продвинутый (8 голосований с хитрыми случаями: двойные стандарты, ложные абсолюты,
      смена мнения со временем).
    key_material:
      - "История: Петя с конфетами — шоколад на щеке и «я не ел»"
      - "Аристотель и закон непротиворечия — второй закон логики"
      - "История: Витя-судья придумал правило и сам его нарушил"
      - "Десять историй-примеров бытовых противоречий"
      - "Условие: закон работает «в одно и то же время, в одном и том же смысле»"
      - "Парадокс всемогущества — ловушка закона непротиворечия"
      - "Инструмент обнаружения: фиксировать, что человек говорил раньше"
    practice_summary: >
      sc2: 1 vote — противоречил ли Витя сам себе.
      sc4: 10 vote — базовая практика: противоречие или нет (собака, устал-отдыхает,
      домашка, погода утром/вечером, никогда не обманываю, каша/суп, честная игра,
      не жадная, спорт, мультик раньше/теперь).
      sc5: 8 vote — продвинутая практика: свобода для всех vs запрет другим,
      истина у каждого своя vs ты неправ, правила нужны vs неудобное можно игнорировать,
      никогда сладкое vs торт через год, думаю головой vs ору от злости,
      нельзя судить по одному поступку vs один раз соврал — лжец,
      все мнения ценны vs твоё глупое, за честный разговор vs промолчу.

  - id: "7A.2"
    title: "Корректное напоминание о противоречии"
    scenes: [sc6, sc7, sc8]
    terms_introduced: ["корректное напоминание"]
    terms_used: ["противоречие", "закон непротиворечия"]
    votes: 6
    summary: >
      Вводится навык вежливого указания на противоречие — «корректное напоминание».
      Формула из трёх шагов: «Раньше ты говорил, что…» → «Сейчас ты говоришь, что…» →
      «Ты передумал или имеешь в виду что-то другое?» Принцип: не нападать, а уточнять.
      Практика: 6 голосований — выбор между грубым обвинением и спокойным вопросом.
      Открытый раунд (sc7): 5 ситуаций, где дети сами формулируют вежливый вопрос без
      готовых вариантов. Закрытие: итог урока, напоминание о двух законах логики
      (тождества и непротиворечия), тизер к следующему уроку — вопрос «Почему ты так думаешь?».
    key_material:
      - "Формула: «Раньше ты говорил, что… Как это совмещается с…?»"
      - "Три шага: раньше говорил → сейчас говоришь → передумал или другое?"
      - "Принцип: не нападать, а уточнять; не обвинять, а просить объяснить"
      - "Сильный человек не кричит «Ты врёшь!» — он спокойно спрашивает"
      - "Уточняющий вопрос как «суперход» — иногда противоречие из-за неточных слов"
    practice_summary: >
      sc6: 6 vote — выбор между грубым и вежливым способом указать на противоречие
      (кино, торт, уважаю мнение, все равны, проект готов, никому не должен).
      sc7: 0 vote, 5 discussion — открытый раунд: дети сами формулируют спокойный вопрос
      (всегда правду — скрыл деталь, не важно кто победит — злится, против обмана — скрыть
      правду, нельзя исключений — сам делает, всегда честно — схитрил в игре).
