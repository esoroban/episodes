# LESSON BRIEF — lesson_5B
# Сгенерирован из lessons_ru/lesson_5B.yaml

lesson_id: lesson_5B
title: "О чём мы вообще спорим"

terms_introduced:
  - term: "центральная идея"
    definition: "один главный вопрос спора — компас, который помогает не сбиться с темы"
  - term: "дерево спора"
    definition: "инструмент для анализа спора: ствол (центральная идея), ветки (аргументы), листья (детали)"
  - term: "ствол"
    definition: "центральная идея спора — один главный вопрос, без которого всё рухнет"
  - term: "ветка (аргумент)"
    definition: "довод, причина — объясняет, ПОЧЕМУ мы так думаем"
  - term: "листок (деталь)"
    definition: "конкретный пример или подробность — иллюстрирует аргумент, но сам по себе не доказательство"
  - term: "формула сути"
    definition: "приём формулировки: «Мы спорим о том, ... или ...» — одно предложение, возвращающее спор к стволу"
  - term: "независимые источники"
    definition: "два источника, которые узнали информацию по отдельности, друг о друге не знают"
  - term: "зависимые источники"
    definition: "один узнал от другого или оба из одного места — это один источник с эхом, а не два"

blocks:

  - id: "5B.1"
    title: "Центральная идея и дерево спора"
    scenes: [sc1, sc2, sc3, sc4]
    terms_introduced: ["центральная идея", "дерево спора", "ствол", "ветка (аргумент)", "листок (деталь)"]
    terms_used: []
    votes: 6
    summary: >
      Открытие через шесть историй-зацепок: в каждой спор сходит с рельсов,
      потому что участники забывают, о чём говорят. Вывод: тот, кто видит
      центральную идею — не самый громкий, а самый умный. История о споре
      про поход (горы vs море) — девочка возвращает спор к сути вопросом
      «О чём мы вообще спорим?». Вводится инструмент «дерево спора»: ствол
      (центральная идея), ветки (аргументы), листья (детали). Три примера
      применения дерева. Практика: шесть голосований — найти ствол (центральную
      идею) в шести спорах с хитрыми вариантами-ловушками.
    key_material:
      - "Шесть историй-зацепок: фильм, вратарь, экскурсия, торт, игры на перемене, кошки vs собаки"
      - "История про поход: горы vs море → девочка находит суть → озеро как решение"
      - "Ключевая фраза: «О чём мы вообще спорим?» — самый сильный вопрос в споре"
      - "Дерево спора: ствол = центральная идея, ветки = аргументы, листья = детали"
      - "Примеры деревьев: школьная форма, выбор кружка, отдых"
      - "Если ствол потерян — дерево падает, спор разваливается"
    practice_summary: >
      sc4: 6 vote — найти центральную идею (ствол) в шести спорах.
      Варианты включают ловушки: старые обиды (ветки прошлых споров),
      побочные детали (листки с других деревьев).

  - id: "5B.2"
    title: "Различаем идею, аргумент и деталь"
    scenes: [sc5, sc6]
    terms_introduced: ["формула сути"]
    terms_used: ["ствол", "ветка (аргумент)", "листок (деталь)", "центральная идея"]
    votes: 7
    summary: >
      Углубление дерева спора: учимся отличать ветки (аргументы) от листьев
      (деталей). Аргумент — это ПОЧЕМУ, деталь — конкретный пример. Примеры:
      помощь по дому (довод vs случай с Петриком), плавание vs бег (довод vs
      тренер Игорь Петрович). Практика: шесть голосований — определить ствол,
      ветку или листок. Затем вводится формула формулировки сути: «Мы спорим
      о том, ... или ...». Три обсуждения + одно голосование на применение
      формулы к реальным спорам (футбол vs баскетбол, мультик vs фильм,
      выбор старосты, собака на день рождения).
    key_material:
      - "Центральная идея — ОДИН главный вопрос. Аргумент — ПОЧЕМУ. Деталь — ПРИМЕР"
      - "Деталь — как фотография: показывает один момент, а не всю картину"
      - "Формула: «Мы спорим о том, ... или ...» — кнопка «пауза» в ссоре"
      - "Примеры: дети и обед (ствол), дети лучше знают вкусы (ветка), Оленка выбрала гречку (листок)"
      - "Примеры: компьютерные игры (ствол), развивают реакцию (ветка), сосед Витя — отличник (листок)"
    practice_summary: >
      sc5: 6 vote — определить ствол, ветка или листок (две серии по три:
      обед и компьютерные игры).
      sc6: 1 vote — выбрать правильную формулировку сути спора (собака на день рождения).
      sc6: 3 discussion — сформулировать суть (футбол/баскетбол, мультик/фильм, староста).

  - id: "5B.3"
    title: "Повторение: источники, независимые и зависимые"
    scenes: [sc7]
    terms_introduced: ["независимые источники", "зависимые источники"]
    terms_used: ["надёжный источник", "ненадёжный источник"]
    votes: 8
    summary: >
      Блиц-повторение урока 5А по источникам информации: своими глазами vs
      услышал от кого-то, надёжный vs ненадёжный, проверка через ИИ, один
      источник без фото, эксперт vs блогер. Затем вводится новое понятие —
      независимые и зависимые источники. Независимые: два человека узнали
      по отдельности (как два ручейка с разных сторон). Зависимые: один
      повторяет за другим — это не два источника, а один с эхом. Практика:
      определить тип пары источников, включая мультивыбор.
    key_material:
      - "Повторение 5А: своими глазами — самый надёжный источник"
      - "ИИ — как умный друг, который иногда уверенно несёт чушь; нужно перепроверять"
      - "Один источник — как один свидетель: может быть прав, а может перепутал"
      - "Независимые источники: узнали по отдельности, каждый проверил сам"
      - "Зависимые источники: один повторяет за другим — это эхо, не подтверждение"
      - "Метафора: крикнул в горах и услышал свой голос обратно — это не второй человек"
    practice_summary: >
      sc7: 5 vote — повторение источников (своими глазами, цепочка, ИИ,
      неизвестный сайт, эксперт vs блогер).
      sc7: 2 vote — независимые или зависимые (школьный чат + учитель;
      Маша и Микола-эхо).
      sc7: 1 vote_multichoice — выбрать все независимые пары из четырёх
      вариантов.

  - id: "5B.4"
    title: "Финальная тренировка: ствол, ветка, листок"
    scenes: [sc8, sc9, sc10, sc11, sc12, sc13]
    terms_introduced: []
    terms_used: ["ствол", "ветка (аргумент)", "листок (деталь)", "центральная идея", "дерево спора", "формула сути"]
    votes: 15
    summary: >
      Пять споров из школьной жизни — в каждом нужно определить ствол, ветку
      и листок (три голосования подряд). Спор о столовой (меню / каша не
      насыщает / Петя выбросил гречку), спор о перемене (20 минут / не
      успеваешь до буфета / Оленка опоздала), спор о хомяке (завести или нет /
      животные помогают сосредоточиться / рыбки в 4-Б), спор о домашке
      (слишком много / дети должны отдыхать / Витя до 11 вечера), спор об
      экскурсии (музей или аквапарк / потрогать экспонаты / трое записались
      в физику). Закрытие: итог трёх главных навыков урока — находить ствол,
      различать ветки и листья, формулировать суть. Напоминание об источниках.
    key_material:
      - "Пять споров-тренировок: столовая, перемена, хомяк, домашка, экскурсия"
      - "Каждый спор разбирается по формуле: ствол → ветка → листок"
      - "Итог 1: у каждого спора есть ствол — потеряли его, спор превращается в кашу"
      - "Итог 2: ветки (доводы) объясняют ПОЧЕМУ; листья (примеры) иллюстрируют, но не доказывают"
      - "Итог 3: волшебная фраза «Мы спорим о том, ...» — отбрасывает лишнее, оставляет ствол"
      - "«Один пример — не статистика» — повторяющийся вывод из всех практик"
    practice_summary: >
      sc8: 3 vote — столовая (ствол/ветка/листок).
      sc9: 3 vote — перемена (ствол/ветка/листок).
      sc10: 3 vote — хомяк (ствол/ветка/листок).
      sc11: 3 vote — домашка (ствол/ветка/листок).
      sc12: 3 vote — экскурсия (ствол/ветка/листок).
