# LESSON BRIEF — lesson_10A
# Сгенерирован из lessons_ru/lesson_10A.yaml

lesson_id: lesson_10A
title: "Или-или"

terms_introduced:
  - term: "ложная дилемма"
    definition: "ловушка, когда говорят «или так, или так» — а на самом деле вариантов гораздо больше"
  - term: "закон исключённого третьего"
    definition: "третий закон Аристотеля: утверждение или истинно, или ложно — третьего варианта нет; работает для простых логических утверждений (лампочки, числа, факты), но не для сложной жизни"
  - term: "выбор без выбора"
    definition: "вид ложной дилеммы, когда дают два варианта, но оба ведут к одному и тому же результату; иллюзия выбора"

blocks:

  - id: "10A.1"
    title: "Ложная дилемма и закон исключённого третьего"
    scenes: [sc1, sc2, sc3, sc4]
    terms_introduced: ["ложная дилемма", "закон исключённого третьего"]
    terms_used: ["страшная цепочка", "ложный авторитет", "причина и следствие", "пугало"]
    votes: 26
    summary: >
      Разминка повторяет темы предыдущих уроков: страшные цепочки, ложные авторитеты,
      причина и следствие, пугало. История: Дмитрик за один день попадает в четыре ловушки
      «или-или» (бутерброд, футбол, речка, домашка), пока Оленка не объясняет ему, что
      каждый раз были и другие варианты. Вводится термин «ложная дилемма». Затем через
      Аристотеля вводится закон исключённого третьего: для лампочек и чисел он работает,
      но люди ошибочно применяют его к жизни. Практика: дети определяют — ловушка или
      настоящий выбор (десять голосований).
    key_material:
      - "История Дмитрика: четыре ловушки за один день (бутерброд, футбол, речка, домашка)"
      - "Оленка раскрывает ловушку: «Эта ловушка называется — ложная дилемма»"
      - "Три закона Аристотеля: тождества, непротиворечия, исключённого третьего"
      - "Закон исключённого третьего: или истинно, или ложно — третьего нет"
      - "Ключевое различие: закон работает для лампочек, чисел, фактов — но не для жизни"
      - "«Жизнь — не лампочка»: между «другом» и «врагом» есть приятель, знакомый, одноклассник"
      - "Фразы-ловушки: «или... или...», «или ты с нами, или против нас», «есть только два пути», «третьего не дано»"
    practice_summary: >
      sc1: 10 vote — повторение: страшная цепочка или реальное предупреждение (3),
      ложный авторитет (3), причина или совпадение (2), пугало (2).
      sc2: 2 vote — были ли у Дмитрика другие варианты с футболом; ловушка или честный выбор (речка).
      sc3: 4 vote — закон работает или есть третий вариант (вода кипит, голоден/сыт, дверь, вторник).
      sc4: 10 vote — ловушка или настоящий выбор (команда/предатель, лампа, отличник/неудачник,
      чётное/нечётное, кошки/собаки, задача правильно/неправильно, суп/голод, жив/нет,
      первый/проиграл, поддержи/уходи).

  - id: "10A.2"
    title: "Выбор без выбора и ловушки в жизни"
    scenes: [sc5, sc6]
    terms_introduced: ["выбор без выбора"]
    terms_used: ["ложная дилемма"]
    votes: 6
    summary: >
      Практика «найди третий вариант»: дети не просто определяют ловушку, а придумывают
      скрытый третий вариант. Вводится инструмент — волшебный вопрос «А что если...?».
      Затем вводится новый вид ловушки — «выбор без выбора»: оба предложенных варианта
      ведут к одному результату (спать сейчас или после уборки = спать в обоих случаях).
      Разбираются три места, где прячется «или-или»: выбор без выбора, реклама, своя голова.
    key_material:
      - "Волшебный вопрос «А что если...?» — ломает любую ложную дилемму"
      - "Шесть дискуссий: дети придумывают третий вариант (суп, согласие, тренировка, секрет, школа, домашка)"
      - "Выбор без выбора: «Спать сейчас или после уборки?» — оба варианта = идёшь спать"
      - "Реклама: «Базовый или премиум?» — вариант «не покупать» исчез"
      - "Ловушка в ссорах: «Или извинись, или не разговариваю» — шантаж молчанием"
      - "Три места, где прячется «или-или»: выбор без выбора, реклама, своя голова"
    practice_summary: >
      sc5: 0 vote, 6 discussion — дети придумывают третий вариант для шести ловушек.
      sc6: 6 vote — выбор без выбора или настоящий выбор (спать, уроки, пакет,
      мусор, скидка, подписка). 2 discussion — третий вариант в ссорах (извинение, чистота).
      1 discussion — ловушка перфекционизма в своей голове.

  - id: "10A.3"
    title: "Перфекционизм — ловушка в своей голове"
    scenes: [sc7, sc8]
    terms_introduced: []
    terms_used: ["ложная дилемма", "закон исключённого третьего"]
    votes: 1
    summary: >
      Минилекция раскрывает «или идеально — или никак» как самую опасную разновидность
      ложной дилеммы — ту, которую человек ставит сам себе. Пять историй: писатель,
      режиссёр, учёный, пекарь, художник — все выбрали «никак» вместо «неидеально».
      Ключевой вывод: ноль всегда меньше, чем «неидеально»; мир принадлежит тем, кто
      начинает неидеально. Закрытие: мир — не чёрно-белая фотография, а цветная;
      запомните вопрос «А что если...?».
    key_material:
      - "Пять историй перфекционизма: книга, фильм, исследование, пекарня, рисование"
      - "Ключевая фраза: «Ноль всегда меньше, чем неидеально. Всегда.»"
      - "«Первый айфон был неуклюжий. Первый самолёт пролетел двенадцать секунд. Первый блин — всегда комом. Но он — существует.»"
      - "Итог: мир — не чёрно-белая фотография, он цветной"
      - "Главный инструмент: вопрос «А что если...?» ломает любую ложную дилемму"
    practice_summary: >
      sc7: 1 vote — что лучше: написать неидеальную книгу или не написать никакой.
      sc8: 0 vote — итоговые выводы без голосований.
