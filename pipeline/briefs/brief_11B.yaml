# LESSON BRIEF — lesson_11B
# Сгенерирован из lessons_ru/lesson_11B.yaml

lesson_id: lesson_11B
title: "Что такое демагогия"

terms_introduced:
  - term: "демагогия"
    definition: "когда создают видимость аргумента, но внутри — логическая ошибка; демагог не врёт напрямую — он ведёт к тому, чтобы вы сами себя обманули"
  - term: "слова-триггеры"
    definition: "фразы-маркеры демагогии: «все знают», «это же очевидно», «любой нормальный человек», «только дураки думают иначе»"
  - term: "фильтр «Где факты?»"
    definition: "главный фильтр против демагогии: если в ответ тишина или новые уловки — перед вами демагог"
  - term: "универсальный ответ"
    definition: "формула «Это демагогия. Где факты?» — называешь хитрость (она теряет силу), требуешь доказательства, переключаешь разговор на факты"

blocks:

  - id: "11B.1"
    title: "Демагогия и её десять видов"
    scenes: [sc1, sc2, sc3, sc4, sc5]
    terms_introduced: ["демагогия", "слова-триггеры", "фильтр «Где факты?»"]
    terms_used: ["факт", "мнение", "ложная дилемма", "нападка", "поспешное обобщение", "ложная причина", "подмена понятий", "пугало", "страшная цепочка", "ложный авторитет", "вопрос-ловушка", "уклонение от ответа"]
    votes: 34
    summary: >
      Мост от урока 11A: переход от возражений к распознаванию манипуляций.
      Через историю Богдана на школьном собрании (крик про пирожные — ноль фактов)
      вводится понятие «демагогия» — видимость аргумента без аргумента.
      Контрастные пары: блогер-демагог vs стример с фактами, демагогическая реклама
      фехтования vs нормальная реклама. Вывод: громкость — не признак правоты.
      Далее парад десяти приёмов демагогии (ложная причина, поспешное обобщение,
      уклонение от ответа, подмена понятий, нападка на человека, пугало,
      страшная цепочка, ложный авторитет, ложная дилемма, вопрос-ловушка) —
      все ранее изученные уловки объединяются под зонтичным термином «демагогия».
      Вводятся слова-триггеры и фильтр «Где факты?».
      Большая практика: 30 примеров из детской жизни — определить вид демагогии.
    key_material:
      - "История Богдана: крик про пирожные — запугивание, ложная дилемма, нападка, ноль фактов"
      - "Контраст блогер vs стример: эмоции без фактов vs конкретный разбор (время, плюсы, минусы, баги)"
      - "Контраст демагогической и нормальной рекламы фехтования"
      - "Определение демагогии: видимость аргумента, внутри — логическая ошибка"
      - "Слова-триггеры: «все знают», «это же очевидно», «любой нормальный человек»"
      - "Хитрая фраза: «Я не говорю, что он врёт... но задумайтесь...» — подозрение без фактов"
      - "Десять видов: ложная причина, поспешное обобщение, уклонение от ответа, подмена понятий, нападка, пугало, страшная цепочка, ложный авторитет, ложная дилемма, вопрос-ловушка"
      - "Фильтр: «Где факты?» — если фактов нет, это демагогия"
    practice_summary: >
      sc2: 1 vote — какие факты привёл Богдан (ноль).
      sc3: 3 vote — блогер vs стример (кто демагог), реклама фехтования (есть ли факты).
      sc5: 30 vote — определить вид демагогии в каждой фразе (все 10 видов вперемешку, примеры из школьной жизни).

  - id: "11B.2"
    title: "Универсальный ответ и финальный микс"
    scenes: [sc6, sc7, sc8]
    terms_introduced: ["универсальный ответ"]
    terms_used: ["демагогия", "возражение", "нападка", "поспешное обобщение", "ложная дилемма", "ложный авторитет", "страшная цепочка", "пугало"]
    votes: 15
    summary: >
      Вводится универсальный ответ — формула «Это демагогия. Где факты?»
      Три причины, почему работает: называешь хитрость (теряет силу),
      требуешь доказательства, переключаешь на территорию фактов.
      Тренировка формулы через 6 дискуссионных кейсов (поспешное обобщение,
      нападка, страшная цепочка, ложная дилемма, ложный авторитет, пугало).
      Финальный микс: 15 голосований — возражения (из 11A) и демагогия (из 11B)
      вперемешку, нужно точно определить, что перед тобой.
      Закрытие: демагогия — как фейерверк (ярко, шумно, а на земле ничего).
      Два урока = полный комплект: щит (возражение) + рентген (разоблачение демагогии).
      Домашний квест: найти демагогию в рекламе, разговорах, мультиках.
    key_material:
      - "Формула: «Это демагогия. Где факты?»"
      - "Почему работает: 1) называешь хитрость, 2) требуешь доказательства, 3) переключаешь на факты"
      - "Метафора: демагогия — фейерверк (ярко, шумно, а на земле ничего)"
      - "Два урока = полный комплект: щит (возражение) + рентген (разоблачение)"
      - "Домашний квест: найти демагогию в реальной жизни"
    practice_summary: >
      sc6: 6 discussion — тренировка универсального ответа на конкретных фразах (обобщение, нападка, цепочка, дилемма, авторитет, пугало).
      sc7: 15 vote — финальный микс: возражение, нападка или демагогия (всё вперемешку из 11A и 11B).
