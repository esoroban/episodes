# LESSON BRIEF — lesson_12B
# Сгенерирован из lessons_ru/lesson_12B.yaml

lesson_id: lesson_12B
title: "Что такое манипуляция"

terms_introduced:
  - term: "манипуляция"
    definition: "когда человек давит на ЧУВСТВА, чтобы заставить тебя что-то сделать; не на разум — на эмоции"
  - term: "четыре кнопки манипуляции"
    definition: "вина, страх, стыд, шантаж дружбой — четыре эмоции, на которые давит манипулятор"
  - term: "честная просьба"
    definition: "просьба, при которой можно отказать БЕЗ последствий; никто не обидится, не назовёт плохим"
  - term: "универсальный ответ на манипуляцию"
    definition: "«Это манипуляция. Давай по существу.» — работает на все четыре кнопки"

blocks:

  - id: "12B.1"
    title: "Что такое манипуляция и четыре кнопки"
    scenes: [sc1, sc2, sc3, sc4, sc5]
    terms_introduced: ["манипуляция", "четыре кнопки манипуляции", "универсальный ответ на манипуляцию"]
    terms_used: ["демагогия"]
    votes: 23
    summary: >
      Мост от демагогии к манипуляции: демагог запутывает голову, а манипулятор сжимает сердце.
      История Гриши и Маши: Гриша давил на чувство вины, чтобы Маша отдавала печенье,
      хотя не приводил никаких аргументов. Вводится определение манипуляции — давление на
      чувства, а не на разум. Четыре кнопки: вина, страх, стыд, шантаж дружбой.
      Универсальный ответ: «Это манипуляция. Давай по существу.»
      Практика: 12 мини-историй на различение демагогии и манипуляции, затем 9 историй
      на определение конкретного типа манипуляции (какая кнопка нажата).
    key_material:
      - "История Гриши и Маши: «Ты же хорошая подруга?» — давление через вину без единого аргумента"
      - "Определение: манипуляция — давление на ЧУВСТВА, чтобы заставить что-то сделать"
      - "Главный признак: после манипуляции тебе ПЛОХО, но ты не понимаешь, ПОЧЕМУ должен соглашаться"
      - "Демагог запутывает голову, манипулятор сжимает сердце"
      - "Четыре кнопки: вина («Я столько для тебя сделал»), страх («Будет плохо!»), стыд («Что, боишься?»), шантаж дружбой («Настоящие друзья так не поступают»)"
      - "Универсальный ответ: «Это манипуляция. Давай по существу.»"
      - "Аналогия: кнопки лифта — манипулятор нажал нужную кнопку, и ты едешь куда ОН хочет"
    practice_summary: >
      sc2: 2 vote — что делал Гриша (давил на чувства) + какое чувство вызывал (вину).
      sc4: 12 vote — демагогия или манипуляция (Никита с очками, бабушка Даши,
      Матвей про домашку, Тимур с велосипедом, Аня с Оскаром, мама Коли, продавец,
      подружки Сони, блогер, одноклассник-шантажист Олега, реклама йогурта, подруга Кати).
      sc5: 9 vote — какой тип манипуляции: вина, страх, стыд или шантаж дружбой
      (Лена и поход, мама Артёма, Марк и телефон, Вика и спектакль, папа Димы,
      Ксюша и танцы, Саша и домашка, сестра Кости, тренер по футболу).

  - id: "12B.2"
    title: "Честная просьба vs манипуляция"
    scenes: [sc6, sc7]
    terms_introduced: ["честная просьба"]
    terms_used: ["манипуляция", "четыре кнопки манипуляции"]
    votes: 8
    summary: >
      Вводится критерий отличия: при честной просьбе можно отказать БЕЗ последствий.
      Никто не обидится, не будет давить, не назовёт плохим. При манипуляции отказ =
      ты виноват, трус или плохой друг. Восемь пар фраз: одна — честная просьба,
      другая — манипуляция. Затем открытая практика: дети придумывают ответы на
      конкретные ситуации манипуляции (одноклассник с ластиком, подруга с днём рождения,
      брат-шантажист, бабушка с борщом, одноклассники с крышей, друг с домашкой).
      Главное правило: у тебя ВСЕГДА есть право сказать «нет» без чувства вины.
    key_material:
      - "Главное правило: при честной просьбе можно отказать БЕЗ последствий"
      - "Пример честной просьбы: «Если занят — спрошу позже» / «Если другие планы — всё нормально»"
      - "Пример манипуляции: «Тебе всё равно, как я напишу контрольную» / «Тебе наша дружба не важна»"
      - "Сложная ситуация: бабушка не злая — она скучает; ответ с эмпатией, но без подчинения"
      - "Формула ответа: назвать приём + не поддаться на давление"
      - "У тебя ВСЕГДА есть право сказать «нет» без чувства вины"
    practice_summary: >
      sc6: 8 vote — честная просьба или манипуляция (помощь с задачей, «тебе всё равно»,
      приглашение в кино, шантаж дружбой кино, книжка на неделю, «жадина расскажу всем»,
      «мне грустно но я понимаю», «столько делаю а ты»).
      sc7: 5 discussion — открытая практика, дети формулируют ответы на манипуляцию
      (ластик + стыд, день рождения + шантаж дружбой, брат + шантаж чашкой,
      бабушка + вина, крыша + стыд, домашка + вина).

  - id: "12B.3"
    title: "Финальный микс и философское закрытие"
    scenes: [sc8, sc9]
    terms_introduced: []
    terms_used: ["манипуляция", "демагогия", "честная просьба", "четыре кнопки манипуляции"]
    votes: 15
    summary: >
      Финальная проверка: 15 вопросов — всё вперемешку из уроков 12A и 12B: демагогия,
      манипуляция (с определением типа), честная просьба. Включает ложный авторитет,
      давление через вину, ложную дилемму, шантаж дружбой, поспешное обобщение и др.
      Философское закрытие: почему манипуляция — плохая стратегия. Аналогия с кредитом:
      получаешь «да» сегодня — платишь доверием завтра. Возврат к Грише: Маша через месяц
      ненавидела и перемены, и Гришу. Честность эффективнее. Итог: два суперответа
      (на демагогию — «Где факты?», на манипуляцию — «Давай по существу»).
    key_material:
      - "Манипуляция как кредит с огромными процентами: получаешь «да» сегодня — платишь доверием завтра"
      - "Возврат к истории Гриши: Маша ненавидела перемены через месяц — манипулятор получает печенье, но теряет друга"
      - "Люди не дружат с теми, рядом с кем им плохо, даже если не понимают почему"
      - "Честная просьба эффективнее: после неё хочется помочь, после манипуляции — уйти"
      - "Два суперответа: на демагогию — «Где факты?», на манипуляцию — «Давай по существу»"
      - "Главное правило: у вас ЕСТЬ право сказать «нет» без чувства вины — всегда"
    practice_summary: >
      sc8: 15 vote — финальный микс, всё вперемешку: демагогия (ложный авторитет,
      ложная дилемма, поспешное обобщение, нападка на человека), манипуляция с указанием
      типа (вина, страх, стыд, шантаж дружбой), честные просьбы. Включает ловушки
      и пограничные случаи.
