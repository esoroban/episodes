lesson_id: lesson_1A
title: "Факт, мнение и неправда"

terms_introduced:
  - term: "факт"
    definition: "то, что можно проверить — и при проверке подтверждается"
  - term: "мнение"
    definition: "нельзя проверить; личное ощущение, вкус, оценка"
  - term: "неправда"
    definition: "можно проверить — и при проверке НЕ подтверждается"

blocks:

  - id: "1A.1"
    title: "Факт и мнение"
    scenes: [sc1, sc2, sc3, sc4, sc5, sc6]
    terms_introduced: ["факт", "мнение"]
    terms_used: []
    votes: 15
    summary: >
      Зацепка: примеры из школьной жизни (ложная новость об отмене контрольной,
      спор «футбол vs баскетбол»). Обзор всего курса — мотивация «станете как детектив».
      История: Микола и Маша спорят о мороженом (нельзя проверить — вкусы);
      Дмитрик приносит новость об отмене уроков (можно проверить — цепочка «сломанный телефон»).
      Ключевой вывод: важно не КТО говорит, а МОЖНО ЛИ ПРОВЕРИТЬ.
      Вводится термин «факт»: можно проверить и подтверждается.
      Ловушка: «На Земле 8 континентов» — проверяемо, но неправда (это не факт!).
      Практика по фактам: 3 голосования (окно в классе, математика скучная, Киев — столица).
      Вводится термин «мнение»: нельзя проверить, у каждого своё, нет «вкусомера».
      Слова-подсказки мнения: «мне кажется», «самый лучший», «красивый», «скучный».
      Практика по мнениям: 10 голосований (факт или мнение) — фильм смешной,
      фильм идёт два часа, зелёный самый красивый, трава зелёная, собаки лучше кошек,
      делать уроки скучно, в сутках 24 часа, пицца вкуснее каши, вода кипит при 100°,
      наша школа самая лучшая.
    key_material:
      - "История: спор о мороженом (Микола — шоколадное, Маша — клубничное)"
      - "История: новость Дмитрика (Петрик ← старший брат ← интернет ← ?)"
      - "Ключевая фраза: «важно не КТО говорит, а МОЖНО ЛИ ПРОВЕРИТЬ»"
      - "Определение факта: можно проверить — и подтверждается"
      - "Ловушка: проверяемое ≠ правдивое (8 континентов)"
      - "Определение мнения: нельзя проверить, личное ощущение"
      - "Слова-подсказки мнения: «мне кажется», «самый лучший», «красивый», «скучный»"
    practice_summary: >
      sc2: 2 vote — кто прав в споре о мороженом + всё ли в интернете правда.
      sc4: 3 vote — факт или нельзя проверить (окно, математика скучная, Киев столица).
      sc6: 10 vote — факт или мнение (экспресс-голосование, десять фраз подряд).

  - id: "1A.2"
    title: "Неправда и её виды"
    scenes: [sc7, sc8, sc9, sc10, sc11]
    terms_introduced: ["неправда"]
    terms_used: ["факт", "мнение"]
    votes: 34
    summary: >
      Возврат к Дмитрику: его новость можно было проверить — и она не подтвердилась.
      Вводится термин «неправда»: можно проверить, но не подтверждается.
      Три вида неправды: шутка (паук на плече — знает, что неправда, хочет посмешить),
      сказка (дракон любит блинчики — все понимают, что не взаправду),
      фейк (школы закроют навсегда — специально придумано, чтобы напугать).
      Практика по неправде: 10 голосований — шутка, сказка или фейк.
      Сложные случаи (sc9): пограничные примеры. «Мой папа самый сильный» —
      можно измерить силу → проверяемо → скорее неправда. «Моя мама самая красивая» —
      нельзя измерить красоту → мнение. Секрет: спроси себя — МОЖНО ли это измерить?
      4 голосования на сложные случаи.
      Финальная проверка (sc10): 20 голосований — факт, мнение или неправда.
      Все три термина вперемешку, включая ловушки («все дети любят сладкое»,
      «если не съешь суп — заболеешь»).
      Закрытие (sc11): итог трёх понятий. Главный секрет: в споре мнений нет победителя —
      можно просто сказать «окей, у тебя своё мнение» и пойти есть мороженое.
      А неправду — стоит разоблачать, потому что её МОЖНО проверить.
    key_material:
      - "Определение неправды: можно проверить — и НЕ подтверждается"
      - "Три вида: шутка, сказка, фейк"
      - "Фейк — опасная неправда: специально придумана, чтобы поверили"
      - "Дмитрик не врал — сам верил, но информация всё равно неправда"
      - "Секрет сложных случаев: спроси — МОЖНО ли это измерить?"
      - "Итог: в споре мнений нет победителя; неправду можно разоблачить"
    practice_summary: >
      sc8: 10 vote — шутка, сказка или фейк (виды неправды).
      sc9: 4 vote — сложные пограничные случаи (факт, мнение или неправда).
      sc10: 20 vote — финальная проверка, все три термина вперемешку, включая ловушки.
