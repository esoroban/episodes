# LESSON BRIEF — lesson_12A
# Сгенерирован из lessons_ru/lesson_12A.yaml

lesson_id: lesson_12A
title: "Карта демагогии"

terms_introduced:
  - term: "карта демагогии (12 видов)"
    definition: "систематический каталог двенадцати видов демагогии с определениями, историями и способами защиты"
  - term: "поспешное обобщение"
    definition: "когда говорят «все», «никто», «всегда», «никогда» без доказательств"
  - term: "нападка на человека"
    definition: "критикуют не идею, а автора — стаж, возраст, прошлые ошибки"
  - term: "пугало"
    definition: "искажение чужих слов до абсурда, чтобы легче спорить"
  - term: "ложный авторитет"
    definition: "ссылка на человека, который НЕ эксперт в этой теме"
  - term: "ложная дилемма"
    definition: "оставляют только два варианта, хотя их больше"
  - term: "страшная цепочка"
    definition: "от одного шага строят лестницу ужасов без доказательств"
  - term: "вопрос-ловушка"
    definition: "внутри вопроса спрятано ложное утверждение; любой ответ — капкан"
  - term: "подмена понятий"
    definition: "берут слово и незаметно меняют его смысл"
  - term: "ложная причина"
    definition: "«после этого» не значит «из-за этого»; совпадение — не причина"
  - term: "уклонение от ответа"
    definition: "вместо ответа переключают тему"
  - term: "красивые слова без фактов"
    definition: "много пафоса, ноль конкретики — как обёртка без конфеты"
  - term: "«я не говорю, что...»"
    definition: "человек говорит обидное, но прячет за вежливую фразу — камень в коробке с бантиком"
  - term: "пять причин не использовать демагогию"
    definition: "теряешь доверие, теряешь друзей, плохая репутация, эффект бумеранга, не учишься спорить честно"

blocks:

  - id: "12A.1"
    title: "Разминка и практика: демагогия или нет?"
    scenes: [sc1, sc2, sc3]
    terms_introduced: []
    terms_used: ["факт", "мнение", "неправда", "причина", "совпадение", "уход от темы", "ловушка слов", "противоречие", "пугало", "страшная цепочка", "доверие (авторитет)", "вопрос-ловушка", "ложный авторитет", "подмена понятий", "демагогия"]
    votes: 25
    summary: >
      Большая разминка по всему курсу: 15 голосований по ранее изученным темам
      (способы проверки, причина vs совпадение, уход от темы, ловушка слов,
      противоречие, пугало, страшная цепочка, авторитет, вопрос-ловушка,
      подмена понятий, факт vs мнение). Затем блиц «демагогия или честный
      аргумент» (10 голосований) — дети учатся отличать хитрость от настоящего
      довода. Наконец, творческое упражнение «Мы — демагоги»: дети сами
      придумывают демагогические фразы по заданному типу (10 ситуаций с
      дискуссиями), чтобы понять механику хитрости изнутри.
    key_material:
      - "Разминка вперемешку: способы проверки, причина/совпадение, ловушки слов, факт/мнение"
      - "Блиц: «Все нормальные дети уже это посмотрели!» — поспешное обобщение"
      - "Блиц: «Ты ещё маленький, чтобы это понимать!» — нападка на человека"
      - "Блиц: «Или ты с нами, или ты предатель!» — ложная дилемма"
      - "Творческое упражнение: дети создают демагогические фразы по 10 типам (поспешное обобщение, нападка, пугало, ложный авторитет, ложная дилемма, страшная цепочка, вопрос-ловушка, подмена понятий, ложная причина, уклонение)"
      - "Ключевая фраза: «Кто знает, как устроена ловушка — в неё не попадёт!»"
    practice_summary: >
      sc1: 15 vote — разминка по всему курсу: способы проверки, причина/совпадение,
      уход от темы, ловушка слов, противоречие, пугало, страшная цепочка,
      авторитет, вопрос-ловушка, подмена, факт/мнение.
      sc2: 10 vote — блиц «демагогия или честный аргумент» (разные типы вперемешку).
      sc3: 0 vote, 10 discussion — творческое упражнение, дети сами создают
      демагогические фразы по заданному типу хитрости.

  - id: "12A.2"
    title: "Все 12 видов демагогии — полная карта"
    scenes: [sc4]
    terms_introduced: ["поспешное обобщение", "нападка на человека", "пугало", "ложный авторитет", "ложная дилемма", "страшная цепочка", "вопрос-ловушка", "подмена понятий", "ложная причина", "уклонение от ответа", "красивые слова без фактов", "«я не говорю, что...»"]
    terms_used: ["демагогия"]
    votes: 0
    summary: >
      Систематический каталог всех двенадцати видов демагогии. Каждый вид
      раскрывается через историю из школьной жизни + формальное определение +
      способ защиты (фраза-ответ). Истории: Дима и экскурсия (поспешное обобщение),
      Лена и маршрут (нападка), Саша и кросс (пугало), певица и витамины (ложный
      авторитет), Катя и каток (ложная дилемма), мама и домашка-коробка (страшная
      цепочка), «ты перестал списывать?» (вопрос-ловушка), Миша-креативный
      (подмена понятий), красные носки Артёма (ложная причина), велосипед вместо
      комнаты (уклонение), Богдан на школьном совете (красивые слова), Лиза и
      Марина (я не говорю, что...). Итог: универсальный ответ на все виды —
      «Это демагогия. Где факты?»
    key_material:
      - "12 видов: поспешное обобщение, нападка на человека, пугало, ложный авторитет, ложная дилемма, страшная цепочка, вопрос-ловушка, подмена понятий, ложная причина, уклонение от ответа, красивые слова без фактов, «я не говорю, что...»"
      - "Каждый вид — история + определение + фраза-защита"
      - "Пример: Дима — «ВСЕ сдали деньги!» (сдали 3 из 25) — поспешное обобщение"
      - "Пример: Богдан — «Наш класс самый дружный! Мы покорим вершину!» — «Куда едем-то?» — красивые слова без фактов"
      - "Пример: Лиза — «Я не хочу сказать, что ты плохая подруга, но...» — камень в коробке с бантиком"
      - "Универсальный ответ: «Это демагогия. Где факты?»"
    practice_summary: >
      sc4: 0 vote — лекционная сцена, все 12 видов через истории и определения,
      без голосований.

  - id: "12A.3"
    title: "Почему не стоит использовать демагогию + финальный блиц"
    scenes: [sc5, sc6, sc7]
    terms_introduced: ["пять причин не использовать демагогию"]
    terms_used: ["поспешное обобщение", "нападка на человека", "пугало", "ложный авторитет", "ложная дилемма", "страшная цепочка", "вопрос-ловушка", "подмена понятий", "ложная причина", "уклонение от ответа", "красивые слова без фактов", "«я не говорю, что...»", "демагогия"]
    votes: 12
    summary: >
      История Владика — мастера слова, который побеждал каждый спор с помощью
      демагогии (поспешное обобщение, нападка, пугало), но потерял друзей: его
      не позвали на день рождения. Ключевой вывод: «люди не всегда видят хитрость,
      но всегда чувствуют». Пять причин не использовать демагогию: потеря
      доверия, потеря друзей, плохая репутация, эффект бумеранга, неумение
      спорить честно. Метафора: «демагогия — как кредит: победа сейчас, платишь
      потом». Финальный блиц: 12 голосований — по одному на каждый тип демагогии.
      Закрытие: домашнее задание — найти демагогию в рекламе, мультиках,
      разговорах. Анонс следующего урока — манипуляция.
    key_material:
      - "История Владика: победил все споры — но не позвали на день рождения"
      - "«Люди НЕ всегда видят хитрость, но ВСЕГДА её чувствуют»"
      - "5 причин: потеря доверия, потеря друзей, плохая репутация, эффект бумеранга, не учишься спорить честно"
      - "Метафора: «демагогия — как кредит, честные аргументы — как вклад»"
      - "Альтернатива Владика: вместо «все хотят аквапарк» — спросить и посчитать"
      - "Домашнее задание: найти демагогию в рекламе, мультиках, разговорах"
    practice_summary: >
      sc5: 0 vote, 1 discussion — обсуждение: что Владик мог сделать по-другому.
      sc6: 12 vote — финальный блиц, по одному вопросу на каждый из 12 типов
      демагогии (демагогия или честный аргумент).
      sc7: 0 vote — философское закрытие, итоги и домашнее задание.
