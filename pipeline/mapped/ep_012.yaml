    original_ref: "sc4.128"
    original_text: "«Я заметила, что ты взял мою ручку без спроса.» Описание или обвинение?"
    mapped_text: "«Я заметила, что ты взял мою ручку без спроса.» Описание или обвинение?"
    options: ["Описание", "Обвинение"]
