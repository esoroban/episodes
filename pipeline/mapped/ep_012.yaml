# =====================================================================
# ТЕОРИЯ — как Софа вводит термин
# =====================================================================
theory_delivery:

  term: "формула высказывания"
  scene_trigger: >
    Марко прибегает к Леону. Леон нервничает — плечи сжаты,
    руки дёргаются к карману. Начинает говорить: «Послушай,
    мальчик, я должен сказать...» Посреди фразы глаза Леона
    СЕРЕЮТ — радужка из карей становится пустой. ПЕРВОЕ
    СТИРАНИЕ на глазах. Леон уходит как незнакомец. Число: 40.
    Появляется Вера — обнимает, утешает, вытягивает информацию.
  sofa_introduction: >
    Софа: «Марко... ты приходил к Леону четыре раза. Каждый
    раз Голос узнавал. Леон стёрт не случайно.» Пауза.
    «Вера спросила — и ты рассказал. Как ты рассказал?
    Ты НАПАДАЛ на неё словами — или говорил про себя?»
    Вводится третий инструмент — ФОРМУЛА ВЫСКАЗЫВАНИЯ.
    Три шага: наблюдение («Я вижу, что...»), чувство («Мне...»),
    предложение («Давай...»). Контраст: солдат «Ты всегда
    берёшь мои вещи! Ты жадный!» vs разведчик «Я вижу,
    что ты взял мой карандаш. Мне неприятно. Давай спрашивать
    друг друга?». Слова-маркеры обвинения: «всегда», «никогда»,
    «вечно», «специально», «ты такой-то».
  generic_story_kept: >
    Контраст карандаша (солдат vs разведчик) — оставлен из урока.
    Контраст опоздания (солдат vs разведчик) — оставлен как
    аналогия Софы. Пример музыки (выключи! vs наушники?) —
    оставлен.
  rule: >
    «Формула высказывания: наблюдение + чувство + предложение.
    Говори про СЕБЯ, а не нападай на ДРУГОГО. "Я вижу...",
    "Мне...", "Давай..." — три шага, чтобы спорить и не
    ссориться.»
  life_question: >
    «Друг взял твой телефон без спроса. Солдат скажет:
    "Ты вечно берёшь чужое!" А разведчик? Попробуй формулу.»

