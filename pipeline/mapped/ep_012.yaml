    mapped_text: "Марко вспоминает: когда одноклассники не помнили Софию, он крикнул: «Вы специально делаете вид, что её нет!» Описание или обвинение?"
    options: ["Описание", "Обвинение"]
    answer: "Обвинение"
    explanation: "«Специально» — читаешь мысли и читаешь неправильно. Марко нападал вместо того, чтобы объяснить"
