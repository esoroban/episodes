sofa_quizzes:

  - id: "sq1"
    type: story
    original_ref: "sc4.118"
    original_text: "«Ты никогда меня не слушаешь!» Описание или обвинение?"
    mapped_text: "Марко вспоминает, как кричал на Лину: «Ты никогда не слушаешь!» Описание или обвинение?"
    options: ["Описание", "Обвинение"]
    answer: "Обвинение"
    explanation: "«Никогда» — нападение. Разведчик сказал бы: «Сейчас я почувствовал, что ты меня не услышала»"
    rationale: "Пересажено в сюжет — Марко вспоминает свою ошибку из ссоры с Линой"

  - id: "sq2"
    type: story
    original_ref: "sc4.120"
    original_text: "«Я заметил, что ты не ответил на мой вопрос.» Описание или обвинение?"
    mapped_text: "Марко говорит Вере: «Я заметил, что вы не ответили на мой вопрос.» Описание или обвинение?"
    options: ["Описание", "Обвинение"]
