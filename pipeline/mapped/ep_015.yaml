theory_delivery:
  term: "доверие (Этос), чувства (Пафос), доказательства (Логос)"
  scene_trigger: >
    Два плаката почерком Софии. Первый: «ПОМОГИТЕ!» — чистый
    пафос. Второй: «Всё по плану. Не мешай.» — чистый логос.
    Оба настоящие. Какому верить?
  sofa_introduction: >
    Через историю экскурсии (Маша/Дмитрик/Оленка). Три способа:
    ДОВЕРИЕ (Этос) — верим человеку. ЧУВСТВА (Пафос) — задевают
    эмоции. ДОКАЗАТЕЛЬСТВА (Логос) — факты, цифры. Первый
    плакат Софии — пафос. Второй — логос. Оба без третьей ножки.
    Ловушка: популярность ≠ экспертиза.
  rule: >
    «Три способа убеждения: доверие — верю ЧЕЛОВЕКУ,
    чувства — задевают ЭМОЦИИ, доказательства — показывают
    ФАКТЫ. Разведчик проверяет: каким способом меня убеждают?»

sofa_quizzes:
  - id: "sq1"
    type: story
    original_ref: "sc2"
    mapped_text: "Маша: «Мы — лучший класс! Вы нам обещали!» Какой способ?"
    options: ["Доверие (Этос)", "Чувства (Пафос)", "Доказательства (Логос)"]
    answer: "Доверие (Этос)"
    explanation: "Давит на репутацию и отношения"

  - id: "sq2"
    type: story
    original_ref: "sc2"
    mapped_text: "Дмитрик: «Там будет так весело! Мы будем вспоминать всю жизнь!» Какой способ?"
    options: ["Доверие (Этос)", "Чувства (Пафос)", "Доказательства (Логос)"]
    answer: "Чувства (Пафос)"
    explanation: "Давит на радость и страх упустить"

  - id: "sq3"
    type: story
    original_ref: "sc2"
    mapped_text: "Оленка: «Билеты — 200 гривен. Автобус — час. Возвращаемся к 17:00.» Какой способ?"
    options: ["Доверие (Этос)", "Чувства (Пафос)", "Доказательства (Логос)"]
    answer: "Доказательства (Логос)"
    explanation: "Цифры, факты, расписание. Всё проверяемо"

  - id: "sq4"
    type: story
    original_ref: "sc2"
    mapped_text: "Кто из троих привёл то, что можно проверить?"
    options: ["Маша", "Дмитрик", "Оленка"]
    answer: "Оленка"
    explanation: "Только Оленка дала цифры. Маша — авторитет, Дмитрик — эмоции"

  - id: "sq5"
    type: generic
    original_ref: "sc3"
    mapped_text: "Блогер с миллионом подписчиков: «Эти витамины — лучшие!» Какой способ?"
    options: ["Доверие (Этос)", "Чувства (Пафос)", "Доказательства (Логос)"]
    answer: "Доверие (Этос)"
    explanation: "Миллион подписчиков = авторитет. Но популярность ≠ экспертиза"

  - id: "sq6"
    type: generic
    original_ref: "sc3"
    mapped_text: "«Последний шанс! Не пропусти! Потом будешь жалеть!» Какой способ?"
    options: ["Доверие (Этос)", "Чувства (Пафос)", "Доказательства (Логос)"]
    answer: "Чувства (Пафос)"
    explanation: "Страх упустить + давление временем = эмоции"

challenge_quizzes:
  - id: "cq1"
    type: story
    mapped_text: "Плакат Города: «Голос знает лучше. Доверься ему.» Какой способ?"
    options: ["Доверие (Этос)", "Чувства (Пафос)", "Доказательства (Логос)"]
    answer: "Доверие (Этос)"
    explanation: "Давят на авторитет Голоса. Авторитет — не доказательство"

  - id: "cq2"
    type: story
    mapped_text: "Плакат: «Без Голоса — хаос. Страх. Одиночество.» Какой способ?"
    options: ["Доверие (Этос)", "Чувства (Пафос)", "Доказательства (Логос)"]
    answer: "Чувства (Пафос)"
    explanation: "Страх + одиночество = давление на эмоции"

  - id: "cq3"
    type: story
    mapped_text: "Плакат: «97% жителей довольны Городом.» Какой способ?"
    options: ["Доверие (Этос)", "Чувства (Пафос)", "Доказательства (Логос)"]
    answer: "Доказательства (Логос)"
    explanation: "Цифра. Но можно ли проверить? Кто считал? Как?"

  - id: "cq4"
    type: generic
    original_ref: "sc4"
    mapped_text: "«Лучший конструктор! Выбор родителей!» Какой способ?"
    options: ["Доверие (Этос)", "Чувства (Пафос)", "Доказательства (Логос)"]
    answer: "Доверие (Этос)"
    explanation: "«Выбор родителей» — апелляция к авторитету. Каких родителей?"

  - id: "cq5"
    type: generic
    original_ref: "sc4"
    mapped_text: "«Этот рюкзак сделает тебя круче всех!» Какой способ?"
    options: ["Доверие (Этос)", "Чувства (Пафос)", "Доказательства (Логос)"]
    answer: "Чувства (Пафос)"
    explanation: "«Круче всех» — давление на желание быть лучшим. Эмоция, не факт"

  - id: "cq6"
    type: generic
    original_ref: "sc4"
    mapped_text: "«Детская площадка: 50 м², 12 аттракционов, сертификат безопасности.» Какой способ?"
    options: ["Доверие (Этос)", "Чувства (Пафос)", "Доказательства (Логос)"]
    answer: "Доказательства (Логос)"
    explanation: "Цифры + сертификат = факты, которые можно проверить"

  - id: "cq7"
    type: story
    mapped_text: "Рей: «Я один из вас! Я тоже был напуган! Но Голос спас меня!» Какие способы?"
    options: ["Только доверие", "Только чувства", "Доверие + чувства"]
    answer: "Доверие + чувства"
    explanation: "«Один из вас» — этос. «Был напуган» — пафос. Но где логос? Где факты?"

