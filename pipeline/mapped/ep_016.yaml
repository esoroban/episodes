theory_delivery:
  term: "баланс способов"
  scene_trigger: >
    Марко один перед двумя плакатами. Перечитывает — порядок
    определяет решение (его слабость). Софа перезагружается:
    «Я считала. Ножки.»
  sofa_introduction: >
    Метафора табуретки: три ножки — доверие, чувства, доказательства.
    Убери одну — рухнет. Первый плакат Софии — одна ножка (пафос).
    Второй — одна ножка (логос). Ни один не устойчив. Если бы
    София хотела убедить — использовала бы все три. Она разделила
    нарочно. Пример: «Рекомендуют диетологи (доверие), вкус детства
    (чувства), без сахара (доказательства)» — три ножки, стоит.
    Правило: нет баланса — включай подозрение.
  rule: >
    «Табуретка убеждения: три ножки — доверие, чувства,
    доказательства. Нет одной — рухнет. Нет баланса —
    включай подозрение.»

sofa_quizzes:
  - id: "sq1"
    type: generic
    original_ref: "sc6 #105"
    mapped_text: "«Этот сок советует врач, в нём много витаминов, и ты будешь здоров!» Сбалансировано или нет?"
    options: ["Сбалансировано (несколько способов)", "Не сбалансировано (один способ)"]
    answer: "Сбалансировано (несколько способов)"
    explanation: "Доверие (врач), доказательства (витамины), чувства (здоровье). Три ножки — табуретка стоит"

  - id: "sq2"
    type: generic
    original_ref: "sc6 #107"
    mapped_text: "«Купи! Все покупают! Будь как все! Не отставай!» Сбалансировано или нет?"
    options: ["Сбалансировано (несколько способов)", "Не сбалансировано (один способ)"]
    answer: "Не сбалансировано (один способ)"
    explanation: "Только чувства — страх быть не таким. Ни одного факта. Ни одного эксперта. Табуретка на одной ножке"

  - id: "sq3"
    type: generic
    original_ref: "sc6 #109"
    mapped_text: "«Эту книжку читают учителя, и в ней 100 интересных историй.» Сбалансировано или нет?"
    options: ["Сбалансировано (несколько способов)", "Не сбалансировано (один способ)"]
    answer: "Сбалансировано (несколько способов)"
    explanation: "Доверие (учителя) и доказательства (100 историй). Две ножки — уже неплохо"

  - id: "sq4"
    type: story
    original_ref: "sc6 adapted"
    mapped_text: "Плакат Голоса на Рекламной улице: «Без Голоса — хаос! Страх! Одиночество! Не отставай от остальных!» Сбалансировано или нет?"
    options: ["Сбалансировано (несколько способов)", "Не сбалансировано (один способ)"]
    answer: "Не сбалансировано (один способ)"
    explanation: "Страх, страх и ещё раз страх. Ни одного факта. Ни одного эксперта. Чистый пафос — одна ножка"

  - id: "sq5"
    type: generic
    original_ref: "sc6 #113"
    mapped_text: "«Я здесь работаю 15 лет, и этот товар хвалят все покупатели.» Сбалансировано или нет?"
    options: ["Сбалансировано (несколько способов)", "Не сбалансировано (один способ)"]
    answer: "Сбалансировано (несколько способов)"
    explanation: "Доверие (15 лет опыта) и доказательства (отзывы покупателей). Продавец подкрепил авторитет фактами"

  - id: "sq6"
    type: story
    original_ref: "sc6 adapted"
    mapped_text: "Рей на сцене: «Голос знает лучше! Я сам был потерян — Голос спас меня! Доверьтесь, как я!» Сбалансировано или нет?"
    options: ["Сбалансировано (несколько способов)", "Не сбалансировано (один способ)"]
    answer: "Не сбалансировано (один способ)"
    explanation: "Доверие (авторитет Голоса) + чувства (страх, спасение). Но где доказательства? Ноль фактов. Две ножки, но одного типа — пафос + этос без логоса"

challenge_quizzes:
  - id: "cq1"
    type: generic
    original_ref: "sc7 #127"
    mapped_text: "«Этот телефон стоит 5000 гривен и имеет камеру 50 мегапикселей. Все блогеры его используют.» Чего не хватает?"
    options: ["Доверия", "Чувств", "Доказательств"]
    answer: "Чувств"
    explanation: "Есть доверие (блогеры) и доказательства (цена, мегапиксели). Но эмоций ноль"

  - id: "cq2"
    type: generic
    original_ref: "sc7 #129"
    mapped_text: "«Мой тренер сказал, что эти кроссовки лучшие. Они такие удобные — ноги как в облаках!» Чего не хватает?"
    options: ["Доверия", "Чувств", "Доказательств"]
    answer: "Доказательств"
    explanation: "Есть доверие (тренер) и чувства («как в облаках»). Но сколько весят? Какая подошва?"

  - id: "cq3"
    type: generic
    original_ref: "sc7 #131"
    mapped_text: "«Исследования показали: этот сок содержит 60% дневной нормы витамина C. Почувствуй заряд энергии!» Чего не хватает?"
    options: ["Доверия", "Чувств", "Доказательств"]
    answer: "Доверия"
    explanation: "Есть доказательства (60%, исследования) и чувства («заряд энергии»). Но кто проводил исследования?"

  - id: "cq4"
    type: generic
    original_ref: "sc7 #133"
    mapped_text: "«Наш учитель физкультуры советует эти мячи. Они прошли 200 тестов на прочность.» Чего не хватает?"
    options: ["Доверия", "Чувств", "Доказательств"]
    answer: "Чувств"
    explanation: "Есть доверие (учитель) и доказательства (200 тестов). Надёжно, но скучно"

  - id: "cq5"
    type: generic
    original_ref: "sc7 #135"
    mapped_text: "«Эта настольная игра — взрыв эмоций! Вся семья хохотала три часа! Её придумал известный детский психолог.» Чего не хватает?"
    options: ["Доверия", "Чувств", "Доказательств"]
    answer: "Доказательств"
    explanation: "Есть чувства («взрыв эмоций») и доверие (психолог). Но сколько карточек? Для какого возраста?"

  - id: "cq6"
    type: generic
    original_ref: "sc7 #137"
    mapped_text: "«Этот рюкзак весит 290 грамм и сделан из водонепроницаемого материала. С ним каждый поход — приключение!» Чего не хватает?"
    options: ["Доверия", "Чувств", "Доказательств"]
    answer: "Доверия"
    explanation: "Есть доказательства (290 грамм, материал) и чувства («приключение»). Но кто проверил?"

  - id: "cq7"
    type: generic
    original_ref: "sc8 #143"
    mapped_text: "Кто убедит маму отпустить на ночёвку? А: «Мам, ну пожааалуйста! Я буду грустить весь вечер!» Б: «Мам, ты знаешь Сашину маму, мы ляжем к десяти, и это будет лучший вечер!»"
    options: ["Вариант А", "Вариант Б"]
    answer: "Вариант Б"
    explanation: "Б — три ножки: доверие (знаешь маму), доказательства (к десяти), чувства (лучший вечер). А — одна ножка: «пожааалуйста»"

  - id: "cq8"
    type: generic
    original_ref: "sc8 #146"
    mapped_text: "Кто убедит учителя не задавать домашку? А: «Мы устали! Пожалуйста, не надо!» Б: «Мы написали контрольную на отлично, вы знаете наш класс — дайте вечер отдыха, и завтра будем ещё лучше!»"
    options: ["Вариант А", "Вариант Б"]
    answer: "Вариант Б"
    explanation: "Б — доказательства (контрольная), доверие (знаете класс), чувства (вдохновение). А — только нытьё, одна ножка"

