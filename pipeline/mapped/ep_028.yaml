theory_delivery:
  term: "нападение на человека, три вида нападения, защита от нападения (три шага)"
  scene_trigger: >
    Марко показывает файл Сему. Сем: «Если папа Веры —
    Голос... значит, Вера тоже пленница?» Голос
    вмешивается напрямую — голос в голове Марко.
    Тёплый. Отцовский. «Ты маленький. Ты ничего не
    понимаешь. Сначала вырасти — потом спорь.» Потом
    Сему: «А ты вообще потерялся. Тебе бы домой, а не
    играть в детектива.»
  sofa_introduction: >
    Софа: «Нападение на человека — атака на собеседника,
    не на аргумент. Когда нет хорошего обоснования —
    переключаются на ТЕБЯ. Три вида: ОСКОРБЛЕНИЕ — ярлык
    вместо ответа ("ленивый", "зубрилка"). ОБСТОЯТЕЛЬСТВА —
    дисквалификация ("тебе девять лет", "ты из другого
    района"). "САМ ТАКОЙ" — перевод стрелок ("а ты сам
    вчера...").» Защита — три шага: 1) назови приём,
    2) вернись к теме, 3) спроси «что не так с моим
    аргументом?» Принцип: если бьют по тебе, а не по
    словам — значит, слова сильные.
  rule: >
    «Нападение на человека — не ответ на аргумент. Три
    вида: оскорбление, обстоятельства, "сам такой".
    Защита: назови приём, вернись к теме, спроси "что
    не так с моим аргументом?"»

sofa_quizzes:
  - id: "sq1"
    type: generic
    original_ref: "7B.sc5 #1"
    mapped_text: "В споре о домашке: «Ты просто ленивый, вот и не хочешь делать!» Какой вид нападения?"
    options: ["Оскорбление", "Обстоятельства", "«Сам такой»"]
    answer: "Оскорбление"
    explanation: "«Ленивый» — ярлык вместо ответа. Не говорят, что не так с аргументом — вешают ярлык на человека"

  - id: "sq2"
    type: generic
    original_ref: "7B.sc5 #2"
    mapped_text: "В споре о правилах: «Тебе девять лет — что ты можешь знать о правилах?» Какой вид нападения?"
    options: ["Оскорбление", "Обстоятельства", "«Сам такой»"]
    answer: "Обстоятельства"
    explanation: "Дисквалификация по возрасту. Но правильность идеи не зависит от того, сколько лет тому, кто её говорит"

  - id: "sq3"
    type: generic
    original_ref: "7B.sc5 #3"
    mapped_text: "В споре о списывании: «А ты сам вчера у Пети списывал!» Какой вид нападения?"
    options: ["Оскорбление", "Обстоятельства", "«Сам такой»"]
    answer: "«Сам такой»"
    explanation: "Перевод стрелок: вместо ответа на аргумент — «а ты сам...». Но даже если списывал вчера — это не делает аргумент неправильным"

  - id: "sq4"
    type: story
    original_ref: "story adapted"
    mapped_text: "Голос Марко: «Ты маленький. Ты ничего не понимаешь. Сначала вырасти — потом спорь.» Какой вид нападения?"
    options: ["Оскорбление", "Обстоятельства", "«Сам такой»"]
    answer: "Обстоятельства"
    explanation: "Дисквалификация по возрасту: «маленький» = тебе нельзя спорить. Но если маленький ребёнок скажет «огонь горячий» — это правда"

  - id: "sq5"
    type: story
    original_ref: "story adapted"
    mapped_text: "Голос Сему: «Ты потерялся. Тебе бы домой, а не играть в детектива.» Какой вид нападения?"
    options: ["Оскорбление", "Обстоятельства", "«Сам такой»"]
    answer: "Обстоятельства"
    explanation: "Дисквалификация по ситуации: «потерялся» = тебе не положено думать. Голос атакует Сема, а не его аргументы"

challenge_quizzes:
  - id: "cq1"
    type: story
    original_ref: "7B.sc7 adapted"
    mapped_text: "Марко вспоминает: Катя обещала не рассказывать секрет, но рассказала. Противоречие?"
    options: ["Да, противоречие", "Нет, не противоречие", "Неоднозначно"]
    answer: "Да, противоречие"
    explanation: "«Не расскажу» и «рассказала» — одна ситуация, один секрет. Слова и действия не совпадают"

  - id: "cq2"
    type: story
    original_ref: "7B.sc7 adapted"
    mapped_text: "Тренер: «В нашей команде все равны.» Но одному игроку всегда даёт больше времени. Противоречие?"
    options: ["Да, противоречие", "Нет, не противоречие", "Неоднозначно"]
    answer: "Да, противоречие"
    explanation: "«Все равны» и «одному больше» — двойные стандарты. Противоречие в одно время"

  - id: "cq3"
    type: story
    original_ref: "7B.sc7 adapted"
    mapped_text: "Бабушка: «Я не балую внуков!» Но каждый визит — конфеты, подарки, мороженое. Противоречие?"
    options: ["Да, противоречие", "Нет, не противоречие", "Неоднозначно"]
    answer: "Да, противоречие"
    explanation: "«Не балую» и конфеты-подарки-мороженое — слова и действия не совпадают. Шоколад на щеке бабушки"

  - id: "cq4"
    type: story
    original_ref: "7B.sc7 adapted"
    mapped_text: "Вася: «Я за здоровое питание.» А потом ест бургер. Противоречие?"
    options: ["Да, противоречие", "Нет, не противоречие", "Неоднозначно"]
    answer: "Неоднозначно"
    explanation: "Хитрый случай! «За здоровое питание» не обязательно значит «никогда ни одного бургера». Может, он ест здорово В ЦЕЛОМ, а бургер — исключение"

  - id: "cq5"
    type: story
    original_ref: "7B.sc7 adapted"
    mapped_text: "Максим: «Списывать — нечестно!» А на контрольной: «Просто проверяю свой ответ» (подглядывая в чужую тетрадь). Противоречие?"
    options: ["Да, противоречие", "Нет, не противоречие", "Неоднозначно"]
    answer: "Да, противоречие"
    explanation: "«Списывать нечестно» + подглядывание (переименованное в «проверяю»). Закон непротиворечия не обманешь словами"

  - id: "cq6"
    type: generic
    original_ref: "7B.sc8 #1"
    mapped_text: "«Нужно спать не менее 9 часов — так говорит детский врач, и исследования подтверждают.» Это обоснование или нападение?"
    options: ["Обоснование (надёжный источник)", "Нападение на человека"]
    answer: "Обоснование (надёжный источник)"
    explanation: "Врач + исследования — надёжный источник. Говорят о теме (сон), а не о собеседнике. Это обоснование"

  - id: "cq7"
    type: generic
    original_ref: "7B.sc8 #2"
    mapped_text: "В споре о домашке: «А ты сам вчера не сделал домашку — так что молчи!» Это обоснование или нападение?"
    options: ["Обоснование", "Нападение («сам такой»)"]
    answer: "Нападение («сам такой»)"
    explanation: "Перевод стрелок: «а ты сам...» вместо ответа на аргумент. Главное правило: если о собеседнике — нападение"

  - id: "cq8"
    type: generic
    original_ref: "7B.sc8 #3"
    mapped_text: "«Ты из другого района — что ты знаешь о нашем дворе?» Это обоснование или нападение?"
    options: ["Обоснование", "Нападение (обстоятельства)"]
    answer: "Нападение (обстоятельства)"
    explanation: "Дисквалификация по месту жительства. Правильность идеи не зависит от района. Говорят о человеке, не о теме"

