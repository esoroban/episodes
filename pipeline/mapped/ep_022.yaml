    type: story
    original_ref: "6A.sc7 adapted"
    mapped_text: "Софиины записи: «Почему Леон стёрт?» — «Леон был опасен для Города.» Ответил Голос или поворотник?"
    options: ["Ответил на вопрос", "Включил поворотник"]
    answer: "Включил поворотник"
    explanation: "Марко спрашивал ПОЧЕМУ стёрт, а Голос сказал «был опасен» — но не объяснил, чем именно. Похоже на ответ, но это ответ на другой вопрос"

