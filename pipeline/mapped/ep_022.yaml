  - id: "cq4"
    type: generic
    original_ref: "6A.sc7 #7"
    mapped_text: "«Ты позвонил бабушке?» — «Ой, а ты знаешь, что бабушка завтра приедет!» Ответил или поворотник?"
    options: ["Ответил на вопрос", "Включил поворотник"]
