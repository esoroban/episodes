theory_delivery:
  term: "вопрос-детектор, волшебная фраза (возврат к вопросу)"
  scene_trigger: >
    Марко находит файл в Софе — Софиины записи. Два
    столбца: «Что он сказал» / «Что он сделал». Десятки
    строк. «Я даю свободу» / «Запер двери». «Я не стираю —
    я защищаю» / «Леон стёрт». Каждое противоречие
    зафиксировано. Марко хочет показать записи подполью,
    но Софа: «Сначала научись возвращать к вопросу.
    Иначе Голос уведёт снова.»
  sofa_introduction: >
    Софа: «Вопрос-детектор: "Ответил ли человек на ТОТ
    вопрос, который я задал?" Как на контрольной: спросили
    2+2, а написал "я люблю математику" — неверно.»
    Волшебная фраза: «Это интересно, но я спрашивал
    о другом...» Принцип: сначала признаём сказанное,
    потом спокойно возвращаемся к вопросу. Метафора GPS:
    маршрут перестроен, возвращаемся к вопросу.
  rule: >
    «Вопрос-детектор: "Это ответ на МОЙ вопрос или на
    ДРУГОЙ?" Волшебная фраза: "Это интересно, но я
    спрашивал о другом..." — GPS разговора.»

sofa_quizzes:
  - id: "sq1"
    type: story
    original_ref: "6A.sc7 adapted"
    mapped_text: "Марко читает Софиины записи. «Зачем ты стираешь?» — «Я даю свободу.» Ответил Голос на вопрос или включил поворотник?"
    options: ["Ответил на вопрос", "Включил поворотник"]
    answer: "Включил поворотник"
    explanation: "Марко спрашивал «зачем стираешь?», а Голос ответил про свободу. Вопрос-детектор: это ответ на ДРУГОЙ вопрос"

  - id: "sq2"
    type: generic
    original_ref: "6A.sc7 #1"
    mapped_text: "«Ты брал мой ластик?» — «Да, брал, вот он, прости!» Ответил или поворотник?"
    options: ["Ответил на вопрос", "Включил поворотник"]
    answer: "Ответил на вопрос"
    explanation: "Прямой ответ: да, брал, вернул, извинился. Вопрос-детектор пройден"

  - id: "sq3"
    type: generic
    original_ref: "6A.sc7 #2"
    mapped_text: "«Ты брал мой ластик?» — «Потом верну!» Ответил или поворотник?"
    options: ["Ответил на вопрос", "Включил поворотник"]
    answer: "Включил поворотник"
    explanation: "«Потом верну» — не ответ на «брал ли?». Ответ на другой вопрос: «когда вернёшь?» — но так никто не спрашивал"

  - id: "sq4"
    type: generic
    original_ref: "6A.sc7 #3"
    mapped_text: "«Какой фильм будем смотреть?» — «Давай комедию, мне грустно!» Ответил или поворотник?"
    options: ["Ответил на вопрос", "Включил поворотник"]
    answer: "Ответил на вопрос"
    explanation: "Предложил конкретный жанр — комедию. Причина (грустно) — бонус, но ответ на месте"

  - id: "sq5"
    type: generic
    original_ref: "6A.sc7 #4"
    mapped_text: "«Кто съел моё печенье?» — «Ты вечно всех подозреваешь!» Ответил или поворотник?"
    options: ["Ответил на вопрос", "Включил поворотник"]
    answer: "Включил поворотник"
    explanation: "Смена тональности — обвинение вместо ответа. Вопрос был «кто съел?», а не «часто ли я подозреваю?»"

  - id: "sq6"
    type: generic
    original_ref: "6A.sc7 #5"
    mapped_text: "«Можно я возьму твой телефон?» — «Мне на нём надо доделать проект.» Ответил или поворотник?"
    options: ["Ответил на вопрос", "Включил поворотник"]
    answer: "Ответил на вопрос"
    explanation: "Ответ «нет» через объяснение — телефон занят. Вежливый отказ — но на вопрос ответил"

challenge_quizzes:
