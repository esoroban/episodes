    explanation: "Вопрос — «позвонил ли?». Приезд бабушки — смена темы. Может, и приедет, но на вопрос не ответил"

  - id: "cq5"
    type: story
    original_ref: "6A.sc9 adapted"
    mapped_text: "Марко тренируется с Софой. Голос: «Я защищаю Город.» Марко хочет вернуть к вопросу. Какой вариант правильный?"
    options: ["«Ты врёшь! Ты не защищаешь!»", "«Это интересно, но я спрашивал — зачем ты стираешь?»", "«Ладно, наверное, ты прав.»"]
    answer: "«Это интересно, но я спрашивал — зачем ты стираешь?»"
    explanation: "Волшебная фраза: признал сказанное, спокойно вернулся к вопросу. Не крик. Не капитуляция. GPS разговора"

  - id: "cq6"
    type: story
    original_ref: "6A.sc9 adapted"
    mapped_text: "Рей: «Вы не понимаете замысла Голоса!» Марко хочет вернуть к вопросу «почему числа падают?». Какой вариант?"
    options: ["«Это ты не понимаешь!»", "«Может быть, но давай вернёмся к моему вопросу — почему числа падают?»", "«Ладно, я не понимаю...»"]
    answer: "«Может быть, но давай вернёмся к моему вопросу — почему числа падают?»"
    explanation: "Волшебная фраза — спокойный возврат. Не нападаем, не сдаёмся — просто повторяем вопрос"

  - id: "cq7"
    type: story
    original_ref: "6A.sc10 adapted"
    mapped_text: "Софа даёт Марко проверку. Один вопрос: «Почему Макса стирают?» Пять ответов Голоса. Первый: «Макс сам виноват.» Ответил или поворотник?"
    options: ["Ответил на вопрос", "Включил поворотник"]
    answer: "Включил поворотник"
    explanation: "«Сам виноват» — не ответ на «почему стирают?». Обвинение Макса вместо объяснения механизма. Ответ на другой вопрос"

  - id: "cq8"
    type: story
    original_ref: "6A.sc10 adapted"
    mapped_text: "Тот же вопрос: «Почему Макса стирают?» Ответ Голоса: «Потому что его число упало ниже порога — так работает Система.» Ответил или поворотник?"
    options: ["Ответил на вопрос", "Включил поворотник"]
    answer: "Ответил на вопрос"
    explanation: "Объяснил механизм: число ниже порога, Система стирает. Прямой ответ на «почему?»"

