# =====================================================================
# ТЕОРИЯ — как Софа вводит термин
# =====================================================================
theory_delivery:

  term: "три цели спора"
  scene_trigger: >
    Марко и Лина поссорились из-за артефактов. Марко кричит:
    «Ты ничего не понимаешь!» Лина: «Без них мы слепые!»
    Настоящая ссора — громкая, злая. Лина уходит. Марко стоит один.
  sofa_introduction: >
    Софа: «Марко... модуль конфликта... загружаю. Ты только что
    спорил с Линой. Зачем? Чего ты хотел — победить, понять
    или обидеть?» Через историю Маши и Миколы (из урока):
    двое спорят, чей рисунок лучше, пока Оленка не предлагает
    найти хорошее в чужой работе. Три цели спора: ПОБЕДИТЬ
    (хочешь последнее слово), ПОНЯТЬ (хочешь разобраться),
    ОБИДЕТЬ (хочешь сделать больно). Ключевая фраза: «Когда
    хочешь ПОНЯТЬ — находишь друга. Когда хочешь ПОБЕДИТЬ —
    находишь врага.»
  generic_story_kept: >
    История Маши и Миколы (спор о рисунках, Оленка мирит)
    оставлена как аналогия Софы — классический пример перехода
    от «победить» к «понять». Пример велосипедов (три варианта
    спора) — тоже оставлен как generic-иллюстрация.
  rule: >
    «У спора три цели: победить, понять или обидеть.
    Полезная цель — только ПОНЯТЬ. Прежде чем открыть рот —
    спроси себя: я сейчас хочу что?»
  life_question: >
    «Друг говорит: "Твоя команда — отстой!" Какая у него цель —
    победить, понять или обидеть?»

