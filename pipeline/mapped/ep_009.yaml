    explanation: "Марко не спрашивал, почему Лина так думает. Он хотел, чтобы последнее слово осталось за ним"
    rationale: "Пересажено в сюжет — ссора Марко и Лины, ключевой момент эпизода"

  - id: "sq2"
    type: story
    original_ref: "sc3.72"
    original_text: "А в КОНЦЕ — чего они хотели?"
    mapped_text: "Лина крикнула: «Без них мы слепые! Ты хочешь потерять ещё кого-то?!» Чего она хотела?"
