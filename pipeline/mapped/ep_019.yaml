theory_delivery:
  term: "центральная идея, дерево спора, ствол, ветка (аргумент), листок (деталь), формула сути"
  scene_trigger: >
    Марко вызывает маму через зеркало-портал. Пять прямых
    вопросов — пять увиливаний. Смена темы, обобщение,
    вопрос вместо ответа, апелляция к заботе, обесценивание.
    Марко теряется в ветках маминых увиливаний. Забывает,
    о чём спрашивал.
  sofa_introduction: >
    Софа: «Мама увела тебя от ствола. Пять раз. Спор —
    как дерево. СТВОЛ — центральная идея, один главный
    вопрос. ВЕТКИ — аргументы, доводы. ЛИСТЬЯ — детали,
    примеры. Мамины "заботливые" ответы — ветки без ствола.
    Они уводят от вопроса. ФОРМУЛА СУТИ: "Мы спорим о том,
    ... или ..." — одно предложение, возвращающее к стволу.
    Самый сильный вопрос: "О чём мы вообще спорим?"»
  rule: >
    «Спор — дерево. Ствол — главный вопрос. Ветки —
    доводы. Листья — примеры. Потерял ствол — спор
    превращается в кашу. Формула: "Мы спорим о том,
    ... или ..." — возвращает к сути.»

sofa_quizzes:
  - id: "sq1"
    type: story
    original_ref: "5B.sc4"
    mapped_text: >
      Мама Марко: «Давай поговорим о другом.» — «Все дети иногда
      выдумывают.» — «А ты уверен, что хочешь знать?» — «Я делаю
      то, что лучше для тебя.» — «Не нужно ворошить прошлое.»
      Марко спрашивал: «Ты знала, что София исчезнет?» Что здесь ствол?
    options: ["Ворошить ли прошлое?", "Знала ли мама, что София исчезнет?", "Выдумывает ли Марко?"]
    answer: "Знала ли мама, что София исчезнет?"
    explanation: "Ствол — главный вопрос Марко. Все мамины ответы — ветки, уводящие от ствола. «Ворошить прошлое» и «выдумываешь» — увиливания, не центральная идея"

  - id: "sq2"
    type: story
    original_ref: "5B.sc4"
    mapped_text: >
      Рей когда-то убеждал горожан: «Вы просто не понимаете, как
      тут всё работает! Голос — великий учитель! А кто не согласен,
      тот просто завидует! Вы завидуете, потому что у вас маленькие
      числа!» О чём был спор изначально?
    options: ["У кого больше число?", "Хороший ли Голос руководитель?", "Кто кому завидует?"]
    answer: "Хороший ли Голос руководитель?"
    explanation: "Ствол — качество руководства Голоса. «Зависть» и «маленькие числа» — ветки с чужих деревьев. Рей уводит от сути, как профессионал"

  - id: "sq3"
    type: story
    original_ref: "5B.sc4"
    mapped_text: >
      Горожане подполья спорят: «Нужно выйти на поверхность!» —
      «Нет, опасно!» — «Ты просто трус!» — «А ты авантюрист!»
      — «Вспомни, как в прошлый раз Семён вышел и его чуть
      не стёрли!» — «Это было два года назад!» Где ствол?
    options: ["Трус ли горожанин?", "Выходить ли на поверхность?", "Что случилось с Семёном?"]
    answer: "Выходить ли на поверхность?"
    explanation: "Ствол — решение о вылазке. «Трус или авантюрист» — личные нападки, ветка с чужого дерева. «Семён два года назад» — листок, один пример"

  - id: "sq4"
    type: story
    original_ref: "5B.sc4"
    mapped_text: >
      Марко и Софа спорят: «Нужно ли рассказать подполью про
      Лину?» — Софа: «Это опасно.» — Марко: «Но они имеют
      право знать!» — Софа: «София бы не хотела.» — Марко:
      «Откуда ты знаешь, чего хотела бы София?!» — Софа: «Я —
      это её код.» Где ствол?
    options: ["Знает ли Софа, чего хотела бы София?", "Рассказать ли подполью про Лину?", "Опасно ли это?"]
    answer: "Рассказать ли подполью про Лину?"
    explanation: "Ствол — решение: говорить или нет. «Знает ли Софа» — ветка, аргумент против. «Опасно ли» — тоже ветка. Оба уводят от главного вопроса"

  - id: "sq5"
    type: story
    original_ref: "5B.sc4"
    mapped_text: >
      Мама: «Я делаю то, что лучше для тебя.» — Марко: «Но
      я хочу знать правду!» — Мама: «Правда иногда больно
      ранит.» — Марко: «Ложь ранит больнее!» — Мама: «Ты
      ещё маленький, чтобы понимать.» Где ствол?
    options: ["Маленький ли Марко?", "Что больнее — правда или ложь?", "Должна ли мама рассказать правду о Софии?"]
    answer: "Должна ли мама рассказать правду о Софии?"
    explanation: "Ствол — вопрос о правде. «Маленький ли Марко» — аргумент мамы, ветка. «Правда или ложь больнее» — философский вопрос, но не центральная идея ЭТОГО спора"

challenge_quizzes:
  - id: "cq1"
    type: story
    original_ref: "5B.sc4"
    mapped_text: >
      Марко строит дерево маминого разговора. Мама сказала:
      «Все дети иногда выдумывают.» Это ствол, ветка или листок?
    options: ["Ствол (центральная идея)", "Ветка (аргумент)", "Листок (деталь)"]
    answer: "Ветка (аргумент)"
    explanation: "Мама использует обобщение как аргумент: «дети выдумывают, значит и ты, значит не спрашивай». Это довод, а не главный вопрос и не конкретный пример"

  - id: "cq2"
    type: story
    original_ref: "5B.sc5"
    mapped_text: "«Должны ли дети сами выбирать, что есть на обед?» Это ствол, ветка или листок?"
    options: ["Ствол (центральная идея)", "Ветка (аргумент)", "Листок (деталь)"]
    answer: "Ствол (центральная идея)"
    explanation: "Главный вопрос спора — о нём весь разговор. Не аргумент и не пример, а то, ради чего все собрались спорить"

  - id: "cq3"
    type: story
    original_ref: "5B.sc5"
    mapped_text: "«Потому что дети лучше знают, что им нравится, и не будут оставлять еду на тарелке.» Это ствол, ветка или листок?"
    options: ["Ствол (центральная идея)", "Ветка (аргумент)", "Листок (деталь)"]
    answer: "Ветка (аргумент)"
    explanation: "Довод — объясняет, ПОЧЕМУ детям стоит выбирать самим. Конкретная причина. Не вопрос, а ответ на вопрос"

  - id: "cq4"
    type: story
    original_ref: "5B.sc5"
    mapped_text: "«Вчера Оленка сама выбрала гречку вместо макарон и съела всё до крошки.» Это ствол, ветка или листок?"
    options: ["Ствол (центральная идея)", "Ветка (аргумент)", "Листок (деталь)"]
    answer: "Листок (деталь)"
    explanation: "Один конкретный случай с Оленкой. Может, она просто любит гречку. Деталь — как фотография: один момент, не вся картина"

  - id: "cq5"
    type: story
    original_ref: "5B.sc5"
    mapped_text: "«Полезны ли компьютерные игры?» Это ствол, ветка или листок?"
    options: ["Ствол (центральная идея)", "Ветка (аргумент)", "Листок (деталь)"]
    answer: "Ствол (центральная идея)"
    explanation: "Снова главный вопрос. Короткий, ясный, и из него растут все ветки и листья"

  - id: "cq6"
    type: story
    original_ref: "5B.sc5"
    mapped_text: "«Игры развивают реакцию и умение быстро принимать решения.» Это ствол, ветка или листок?"
    options: ["Ствол (центральная идея)", "Ветка (аргумент)", "Листок (деталь)"]
    answer: "Ветка (аргумент)"
    explanation: "Довод в пользу игр. Не пример, а причина. Общее утверждение, а не один случай"

  - id: "cq7"
    type: story
    original_ref: "5B.sc5"
    mapped_text: "«Мой сосед Витя играет по пять часов в день и при этом отличник.» Это ствол, ветка или листок?"
    options: ["Ствол (центральная идея)", "Ветка (аргумент)", "Листок (деталь)"]
    answer: "Листок (деталь)"
    explanation: "Один конкретный Витя. Может, он гений и был бы отличником даже без игр. Деталь — не доказательство, а иллюстрация"

  - id: "cq8"
    type: story
    original_ref: "5B.sc6"
    mapped_text: >
      Марко формулирует суть разговора с мамой. Какая формулировка
      правильная? Мама увиливала пять раз, Марко спрашивал о Софии.
    options: ["Мы спорим о том, маленький ли Марко", "Мы спорим о том, знала ли мама об исчезновении Софии", "Мы спорим о том, нужно ли ворошить прошлое"]
    answer: "Мы спорим о том, знала ли мама об исчезновении Софии"
    explanation: "Вот ствол. «Маленький ли Марко» — аргумент мамы, ветка. «Ворошить прошлое» — ещё одно увиливание. Как только Марко произнёс формулу — мама не может увиливать"

