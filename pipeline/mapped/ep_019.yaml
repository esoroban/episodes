  - from: "Шесть споров из жизни (кино/парк, компьютер, экскурсия, суп, перемена, кошки/собаки)"
    to: "Пять увиливаний мамы + споры в подполье + спор Марко-Софа"
    rationale: "Каждый спор из урока находит отражение в сюжете: мама уводит от ствола, горожане теряют суть, Марко и Софа спорят о Лине"
  - from: "Девочка с вопросом «О чём мы вообще спорим?»"
    to: "Марко с формулой сути: «Мы спорим о том, знала ты или нет»"
    rationale: "Марко применяет формулу к маме — ствол найден, увиливание невозможно. МИДСЕЗОННАЯ БОМБА"
  - from: "Обед (ствол/ветка/листок) + компьютерные игры"
    to: "Дерево маминого разговора + тренировка на жизненных примерах"
    rationale: "Три элемента дерева применяются сначала к маме, потом к тренировке"

