episode: 17
day: 5
blocks: ["5A.1", "5A.2", "5A.3", "5A.4"]
title: "Семь звеньев"
terms_introduced: ["своими глазами", "услышал от других", "три вопроса для проверки", "уровни интернета", "дипфейк"]
terms_available: ["факт", "мнение", "неправда", "хитрое утверждение", "отговорка", "инструменты проверки", "детектив правды", "повторяемость", "закономерность", "совпадение", "светофор повторений", "причина", "следствие", "после — не значит вследствие", "третья причина", "три цели спора", "солдат", "разведчик", "эмпатия (сопереживание)", "активное слушание", "формула высказывания", "невербальная коммуникация", "ГЛАЗ", "зрительный контакт", "открытая поза", "закрытая поза", "жесты", "мимика", "интонация", "сарказм", "доверие (Этос)", "чувства (Пафос)", "доказательства (Логос)", "баланс способов", "своими глазами", "услышал от других", "три вопроса для проверки", "уровни интернета", "дипфейк"]

theory_delivery:
  term: "своими глазами, услышал от других, три вопроса для проверки, уровни интернета, дипфейк"
  scene_trigger: >
    Подпольное сопротивление пересказывает историю Голоса: «Он был
    учителем, потом захотел большего.» Цепочка — семь звеньев
    пересказа. К седьмому «учитель» стал «великим магом».
    Марко: «Это же испорченный телефон.»
  sofa_introduction: >
    Софа: «Два типа источников: СВОИМИ ГЛАЗАМИ — сам видел,
    сам измерил, сам сделал. УСЛЫШАЛ ОТ ДРУГИХ — пересказ.
    Подполье — "услышал от других". Каждый пересказ добавляет ошибку.»
    Три вопроса для проверки: 1) разбирается? 2) хочет получить?
    3) можно проверить? Уровни интернета — четыре полки: от
    официальных сайтов до шёпота в чатах. Записки подполья —
    как чаты: шёпот без подписи. Дипфейк: даже «своими глазами»
    можно подделать. Правило: «Вижу — но КТО показывает? И ЗАЧЕМ?»
  rule: >
    «Откуда ты это знаешь? — главный вопрос разведчика.
    Своими глазами — надёжнее. Услышал от других — проверяй.
    Три ключа: разбирается? хочет получить? можно проверить?»

sofa_quizzes:
  - id: "sq1"
    type: story
    original_ref: "5A.sc3"
    mapped_text: "Лидер подполья рассказывает: «Голос был учителем — мне передал тот, кто слышал от того, кто знал свидетеля.» Почему Марко не должен верить сразу?"
    options: ["Лидер часто врёт", "Источник информации ненадёжный — цепочка пересказов", "Голос не мог быть учителем"]
    answer: "Источник информации ненадёжный — цепочка пересказов"
    explanation: "Лидер не врёт — она пересказывает. Но цепочка из семи звеньев добавляет ошибку на каждом шаге. Неизвестный → пересказчик → пересказчик... → лидер — классический испорченный телефон"

  - id: "sq2"
    type: story
    original_ref: "5A.sc4"
    mapped_text: "Марко сам видел, как число на его руке изменилось с 36 на 35. Какой это источник?"
    options: ["Своими глазами", "Услышал от других"]
    answer: "Своими глазами"
    explanation: "Марко был на месте, видел лично. Это очевидец — самый надёжный тип источника"

  - id: "sq3"
    type: story
    original_ref: "5A.sc4"
    mapped_text: "Горожанка подполья: «Мне бабушка рассказывала, что раньше Город был свободным.» Какой это источник?"
    options: ["Своими глазами", "Услышал от других"]
    answer: "Услышал от других"
    explanation: "Бабушка — пересказчик. Может, она и видела свободный Город, но для горожанки это пересказ. Проверить нельзя — машины времени пока не завезли"

  - id: "sq4"
    type: story
    original_ref: "5A.sc4"
    mapped_text: "Один из горожан: «Мне друг сказал, что за стеной Города — пустота.» Какой это источник?"
    options: ["Своими глазами", "Услышал от других"]
    answer: "Услышал от других"
    explanation: "Друг сказал — а откуда ОН знает? Может, тоже от кого-то услышал. Цепочка! Классика жанра"

  - id: "sq5"
    type: story
    original_ref: "5A.sc4"
    mapped_text: "Софа показывает Марко файл с записью Софии — текст, дата, электронная подпись. Какой это источник?"
    options: ["Своими глазами", "Услышал от других"]
    answer: "Своими глазами"
    explanation: "Файл — это документ. Его можно открыть, прочитать, проверить подпись. Как дневник с оценками — он не убежит"

  - id: "sq6"
    type: story
    original_ref: "5A.sc4"
    mapped_text: "По динамикам Города передают: «Голос защищает вас от хаоса.» Какой это источник для горожан?"
    options: ["Своими глазами", "Услышал от других"]
    answer: "Услышал от других"
    explanation: "Горожане слышат пересказ — кто-то записал сообщение и транслирует. Источник — Голос, но горожане не видели никакой «защиты» своими глазами"

challenge_quizzes:
  - id: "cq1"
    type: story
    original_ref: "5A.sc5"
    mapped_text: "Лидер подполья рассказывает о Голосе. Три вопроса: разбирается ли она? Живёт в Городе давно, наблюдала Систему изнутри."
    options: ["Можно верить", "Лучше не верить", "Нужно проверить"]
    answer: "Нужно проверить"
    explanation: "Лидер разбирается в жизни Города. Но хочет ли она что-то получить? Да — свободу. Можно ли проверить? Не всё. Один ключ подозрительный — нужна проверка"

  - id: "cq2"
    type: story
    original_ref: "5A.sc5"
    mapped_text: "Голос по динамикам: «Я забочусь о детях Города — доверьтесь мне.» Три вопроса для проверки."
    options: ["Можно верить", "Лучше не верить", "Нужно проверить"]
    answer: "Лучше не верить"
    explanation: "Разбирается? Неизвестно. Хочет получить? Да — послушание. Можно проверить? Никаких доказательств «заботы». Все три ключа красные"

  - id: "cq3"
    type: story
    original_ref: "5A.sc5"
    mapped_text: "Софа воспроизводит запись Софии с конкретными данными: дата, координаты, код. Три вопроса для проверки."
    options: ["Можно верить", "Лучше не верить", "Нужно проверить"]
    answer: "Можно верить"
    explanation: "София разбиралась — она программировала Софу. Хочет получить? Помочь Марко. Можно проверить? Да — данные конкретные. Все три ключа зелёные"

  - id: "cq4"
    type: story
    original_ref: "5A.sc6"
    mapped_text: "Записки на стенах подполья — без подписей, без дат, неизвестно кто написал. Какой уровень источника?"
    options: ["Надёжный", "Ненадёжный"]
    answer: "Ненадёжный"
    explanation: "Записки без подписи — как чаты и пересылки, четвёртый уровень. Шёпот в тёмном коридоре: неизвестно кто написал, когда, зачем"

  - id: "cq5"
    type: story
    original_ref: "5A.sc6"
    mapped_text: "Файл Софии в памяти Софы — с электронной подписью, датой создания и хешем. Какой уровень источника?"
    options: ["Надёжный", "Ненадёжный"]
    answer: "Надёжный"
    explanation: "Файл с подписью и датой — как документ на официальном сайте. Первый уровень. Автор известен, данные проверяемы"

  - id: "cq6"
    type: story
    original_ref: "5A.sc6"
    mapped_text: "Статья в энциклопедии Города (написана Системой) о «великих достижениях Голоса». Какой уровень источника?"
    options: ["Надёжный", "Ненадёжный"]
    answer: "Ненадёжный"
    explanation: "Энциклопедия написана Системой — тем, о ком написано. Это как если бы продавец сам писал отзывы о себе. Второй ключ: хочет получить — одобрение"

  - id: "cq7"
    type: story
    original_ref: "5A.sc7"
    mapped_text: "Марко слышит голос Голоса в динамиках. Звучит уверенно. Но Софа говорит: голос можно подделать — дипфейк. Можно ли доверять?"
    options: ["Можно доверять", "Стоит проверить"]
    answer: "Стоит проверить"
    explanation: "Голос в динамиках — не доказательство. ИИ может подделать голос за несколько секунд. Кто говорит? Зачем? Есть ли подтверждение из другого источника?"

  - id: "cq8"
    type: story
    original_ref: "5A.sc7"
    mapped_text: "Марко сам сфотографировал записку Софии на стене подполья и показывает Софе. Можно ли доверять?"
    options: ["Можно доверять", "Стоит проверить"]
    answer: "Можно доверять"
    explanation: "Марко сам сделал фото, Софа знает его. Источник — Марко. Записку можно пойти и проверить лично"

character_map:
  - from: "Дмитрик и видео динозавра (цепочка пересказов)"
    to: "Подполье и история Голоса (семь звеньев пересказа)"
    rationale: "Цепочка пересказов: каждое звено добавляет ошибку. «Учитель» → «великий маг» за семь пересказов"
  - from: "Ветеринар / продавец / мама (три вопроса)"
    to: "Лидер подполья / Голос / Софа (три вопроса к каждому источнику)"
    rationale: "Три вопроса применяются к трём ключевым фигурам Города"
  - from: "Четыре уровня интернета"
    to: "Записки подполья (чаты) vs файлы Софии (документы)"
    rationale: "Записки без подписи = четвёртый уровень. Файлы с подписью = первый уровень"

extra_practice:
  count: 13
  source: "sc1 (5v) + sc5 остаток (2v) + sc6 остаток (3v) + sc7 остаток (3v)"
  items:
    - id: "ep1"
      type: generic
      original_ref: "5A.sc1"
      mapped_text: "«Я твой старший брат, послушай меня!» Какой способ убеждения?"
      options: ["Доверие", "Чувства", "Доказательства"]
      answer: "Доверие"
      explanation: "Старший брат давит авторитетом. «Я старше — значит знаю лучше»"

    - id: "ep2"
      type: generic
      original_ref: "5A.sc1"
      mapped_text: "«Тебе будет так весело, ты не пожалеешь!» Какой способ убеждения?"
      options: ["Доверие", "Чувства", "Доказательства"]
      answer: "Чувства"
      explanation: "«Весело», «не пожалеешь» — чистые эмоции. Ни одного факта"

    - id: "ep3"
      type: generic
      original_ref: "5A.sc1"
      mapped_text: "«Вот, смотри, тут написано чёрным по белому!» Какой способ убеждения?"
      options: ["Доверие", "Чувства", "Доказательства"]
      answer: "Доказательства"
      explanation: "Документ, который можно прочитать и проверить"

    - id: "ep4"
      type: generic
      original_ref: "5A.sc1"
      mapped_text: "«Все говорят, что это лучшая игра — 4.9 звёзд из 5!» Какой способ?"
      options: ["Доверие", "Чувства", "Доказательства"]
      answer: "Доказательства"
      explanation: "4.9 звёзд — цифра, хотя «все говорят» добавляет щепотку доверия. Главный крючок — рейтинг"

    - id: "ep5"
      type: generic
      original_ref: "5A.sc1"
      mapped_text: "«Если не попробуешь — будешь жалеть всю жизнь!» Какой способ?"
      options: ["Доверие", "Чувства", "Доказательства"]
      answer: "Чувства"
      explanation: "Страх упустить + давление будущим сожалением = эмоции"

    - id: "ep6"
      type: generic
      original_ref: "5A.sc5"
      mapped_text: "«В чате написали, что школу закроют, но никто не знает откуда это.» Можно верить?"
      options: ["Можно верить", "Лучше не верить", "Нужно проверить"]
      answer: "Лучше не верить"
      explanation: "Кто написал — неизвестно. Разбирается — непонятно. Можно проверить — нет. Все три ключа заблокированы. Классический слух"

    - id: "ep7"
      type: generic
      original_ref: "5A.sc5"
      mapped_text: "«Учитель показал в книге, что динозавры жили давно.» Можно верить?"
      options: ["Можно верить", "Лучше не верить", "Нужно проверить"]
      answer: "Можно верить"
      explanation: "Учитель разбирается. Ничего не продаёт. Показал книгу — можно открыть и проверить. Все три ключа зелёные"

    - id: "ep8"
      type: generic
      original_ref: "5A.sc6"
      mapped_text: "Сообщение в классном чате: «Передали, что завтра карантин!!!» Надёжный источник?"
      options: ["Надёжный", "Ненадёжный"]
      answer: "Ненадёжный"
      explanation: "Кто передал? Откуда? Три восклицательных знака надёжности не добавляют"

    - id: "ep9"
      type: generic
      original_ref: "5A.sc6"
      mapped_text: "Статья на новостном сайте со ссылкой на учёных. Надёжный источник?"
      options: ["Надёжный", "Ненадёжный"]
      answer: "Надёжный"
      explanation: "Новостной сайт — второй уровень. Плюс ссылка на учёных — можно перейти и проверить. Два уровня надёжности сразу"

    - id: "ep10"
      type: generic
      original_ref: "5A.sc6"
      mapped_text: "Картинка с текстом, пересланная в родительский чат. Надёжный источник?"
      options: ["Надёжный", "Ненадёжный"]
      answer: "Ненадёжный"
      explanation: "Картинка с текстом — любимый транспорт для слухов. Кто сделал — неизвестно. Когда — непонятно. Проверить — невозможно"

    - id: "ep11"
      type: generic
      original_ref: "5A.sc7"
      mapped_text: "В чате — аудиосообщение «от директора школы»: каникулы продлят на неделю. Можно доверять?"
      options: ["Можно доверять", "Стоит проверить"]
      answer: "Стоит проверить"
      explanation: "Голос можно подделать с помощью ИИ. Аудио в чате — не доказательство. Если бы каникулы продлили — на сайте школы было бы объявление"

    - id: "ep12"
      type: generic
      original_ref: "5A.sc7"
      mapped_text: "Видео в соцсетях: знаменитый учёный говорит «Земля на самом деле плоская!» Можно доверять?"
      options: ["Можно доверять", "Стоит проверить"]
      answer: "Стоит проверить"
      explanation: "Может быть дипфейк. Настоящий учёный такого бы не сказал. Есть ли это на его официальном канале? Подтвердили ли другие источники?"

    - id: "ep13"
      type: generic
      original_ref: "5A.sc7"
      mapped_text: "Фотография в учебнике физики, показывающая как свет проходит через призму. Можно доверять?"
      options: ["Можно доверять", "Стоит проверить"]
      answer: "Можно доверять"
      explanation: "Учебник — проверенный источник. Призмы существуют миллионы лет — подделывать их бессмысленно"

