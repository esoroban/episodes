theory_delivery:
  term: "зрительный контакт, открытая/закрытая поза, жесты, мимика, интонация, сарказм"
  scene_trigger: >
    Рекламная улица Города. Рей на сцене — красивые слова,
    но ГЛАЗ видит: пальцы сжаты, плечи подняты. Тело кричит
    страх, слова говорят свободу.
  sofa_introduction: >
    Софа разбирает шесть каналов невербальной коммуникации:
    зрительный контакт (фонарик), поза (дверь: открытая/закрытая),
    жесты (руки), мимика (экран телефона), интонация (четыре
    настройки голоса), сарказм (оружие солдата).
  rule: >
    «Полный набор разведчика: тормоз, зеркало, карта, ГЛАЗ.
    Четыре инструмента — и ни один спор не застанет врасплох.»

sofa_quizzes:
  - id: "sq1"
    type: story
    original_ref: "sc6"
    mapped_text: "Рей на сцене: смотрит в глаза толпе, руки раскинуты, улыбается. Открытая или закрытая поза?"
    options: ["Открытая", "Закрытая"]
    answer: "Открытая"
    explanation: "Руки свободны, тело к людям. Но это сцена — Рей играет роль"

  - id: "sq2"
    type: story
    original_ref: "sc6"
    mapped_text: "Мальчик в толпе: руки скрещены, глаза в пол. Открытая или закрытая?"
    options: ["Открытая", "Закрытая"]
    answer: "Закрытая"
    explanation: "Руки-стена + взгляд в пол = дверь на замке"

  - id: "sq3"
    type: story
    original_ref: "sc6"
    mapped_text: "Девочка в первом ряду: повернулась к Рею, кивает, руки на коленях. Открытая или закрытая?"
    options: ["Открытая", "Закрытая"]
    answer: "Открытая"
    explanation: "Повёрнута + кивает + руки свободны = дверь открыта"

  - id: "sq4"
    type: story
    original_ref: "sc6"
    mapped_text: "Рей после выступления, когда никто не смотрит: отвернулся, плечи опущены. Открытая или закрытая?"
    options: ["Открытая", "Закрытая"]
    answer: "Закрытая"
    explanation: "Отвернулся = дверь закрылась. Настоящий Рей — за закрытой дверью"

