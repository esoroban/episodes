    original_ref: "7A.sc4 #2"
    mapped_text: "«Я очень устал!» — а через пять минут бегает по двору. Противоречие?"
    options: ["Да, противоречие", "Нет, не противоречие"]
    answer: "Да, противоречие"
    explanation: "Слова: «устал». Действия: бегает. Через пять минут — практически одно время. Противоречие"

  - id: "sq3"
    type: generic
    original_ref: "7A.sc4 #3"
    mapped_text: "«Я сделал всю домашку!» — а в тетради пусто. Противоречие?"
    options: ["Да, противоречие", "Нет, не противоречие"]
    answer: "Да, противоречие"
    explanation: "Слова: «всю сделал». Факт: тетрадь пустая. В одно время — противоречие. Шоколад на щеке"

  - id: "sq4"
    type: generic
    original_ref: "7A.sc4 #4"
    mapped_text: "«Утром шёл дождь.» — «Вечером было солнечно.» Противоречие?"
    options: ["Да, противоречие", "Нет, не противоречие"]
    answer: "Нет, не противоречие"
    explanation: "Утро и вечер — разное время. Погода изменилась. Закон непротиворечия работает только «в одно время»"

  - id: "sq5"
    type: generic
    original_ref: "7A.sc4 #5"
    mapped_text: "«Я никогда никого не обманываю!» — говорит тот, кто только что списал на контрольной. Противоречие?"
    options: ["Да, противоречие", "Нет, не противоречие"]
    answer: "Да, противоречие"
    explanation: "«Никогда не обманываю» и списывание — одно время, одна ситуация. Классическое противоречие"

  - id: "sq6"
    type: generic
    original_ref: "7A.sc4 #6"
    mapped_text: "«На обед — каша.» — «На ужин — суп.» Противоречие?"
    options: ["Да, противоречие", "Нет, не противоречие"]
    answer: "Нет, не противоречие"
    explanation: "Обед и ужин — разное время, разные блюда. Нет одного утверждения, которое «и да, и нет» одновременно"

