theory_delivery:
  term: "противоречие, закон непротиворечия"
  scene_trigger: >
    Марко один. Леон стёрт. Макс стёрт. Лина предала.
    Вера — агент Голоса. Из-за угла — мальчик. Сем.
    Десять лет. Испуганный. «Ты тоже заблудился?»
    Софа: «Не в программе Софии. Но полезен. Объяснять
    другому = учиться самому.» Сем: «А учительница
    сказала "я никогда не вру". А потом соврала про
    расписание. Это как?»
  sofa_introduction: >
    Софа: «Это — противоречие. Когда слова говорят одно,
    а действия — противоположное. В одно и то же время,
    в одном и том же смысле.» Закон непротиворечия
    Аристотеля: одно утверждение не может быть
    одновременно истинным и ложным. Важно: смена
    мнения со временем — не противоречие. Разные
    люди — не противоречие. Только одновременно
    и в одном смысле. Пример: шоколад на щеке
    и «я не ел конфеты» — противоречие.
  rule: >
    «Противоречие — когда слова и действия не совпадают.
    В одно время, в одном смысле. Закон непротиворечия:
    одно утверждение не может быть одновременно да и нет.»

sofa_quizzes:
  - id: "sq1"
    type: generic
    original_ref: "7A.sc4 #1"
    mapped_text: "«У меня нет собаки!» — говорит мальчик, а из-за его спины выглядывает собака. Противоречие?"
    options: ["Да, противоречие", "Нет, не противоречие"]
    answer: "Да, противоречие"
    explanation: "Слова: «нет собаки». Действительность: собака за спиной. В одно время, в одном смысле — противоречие"

  - id: "sq2"
