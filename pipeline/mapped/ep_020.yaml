terms_available: ["факт", "мнение", "неправда", "хитрое утверждение", "отговорка", "инструменты проверки", "детектив правды", "повторяемость", "закономерность", "совпадение", "светофор повторений", "причина", "следствие", "после — не значит вследствие", "третья причина", "три цели спора", "солдат", "разведчик", "эмпатия (сопереживание)", "активное слушание", "формула высказывания", "невербальная коммуникация", "ГЛАЗ", "зрительный контакт", "открытая поза", "закрытая поза", "жесты", "мимика", "интонация", "сарказм", "доверие (Этос)", "чувства (Пафос)", "доказательства (Логос)", "баланс способов", "своими глазами", "услышал от других", "три вопроса для проверки", "уровни интернета", "дипфейк", "правило двух источников", "один человек думает vs много людей проверили", "центральная идея", "дерево спора", "ствол", "ветка (аргумент)", "листок (деталь)", "формула сути", "независимые источники", "зависимые источники"]

theory_delivery:
  term: "независимые источники, зависимые источники"
  scene_trigger: >
    Мама сказала: «Я выбрала тебя. Отдала Софию.» Марко
    принимает как правду — мама плакала, а плачущим верят.
    Но Софа: «Слёзы — горячие. Слова — холодные. Как будто
    плачет одна мама, а говорит другая.» Мама — один источник.
    Достаточно ли?
  sofa_introduction: >
    Софа: «Мама — один источник. Вспомни правило двух.»
    Блиц-повторение: своими глазами — самый надёжный.
    ИИ — умный друг, который иногда уверенно несёт чушь.
    Новое: НЕЗАВИСИМЫЕ ИСТОЧНИКИ — два человека узнали
    по отдельности, каждый проверил сам. ЗАВИСИМЫЕ —
    один повторяет за другим, это эхо, не подтверждение.
    Метафора: крикнул в горах, услышал свой голос — это
    не второй человек. Мама и Софа повторяют одно —
    но Софа загружена Софией. Зависимые или независимые?
  rule: >
    «Независимые источники — узнали по отдельности.
    Зависимые — один повторяет за другим: это эхо,
    не подтверждение. Крикнул в горах и услышал свой
    голос — это не второй человек.»

sofa_quizzes:
  - id: "sq1"
    type: story
    original_ref: "5B.sc7"
    mapped_text: "Марко сам видел, как число на его руке упало с 33 до 32 после слов мамы. Какой тип источника?"
    options: ["Своими глазами", "Услышал от кого-то", "Прочитал в интернете"]
    answer: "Своими глазами"
    explanation: "Самый надёжный источник — Марко видел это лично. Число изменилось прямо на его глазах"

  - id: "sq2"
    type: story
    original_ref: "5B.sc7"
    mapped_text: "Горожанин подполья рассказывает: «Мой друг слышал от старожила, что раньше числа не падали.» Надёжный источник?"
    options: ["Надёжный источник", "Ненадёжный источник", "Невозможно определить"]
    answer: "Ненадёжный источник"
    explanation: "Цепочка: друг → старожил → кто-то ещё. Как сломанный телефон — чем длиннее цепочка, тем меньше доверия"

  - id: "sq3"
    type: story
    original_ref: "5B.sc7"
    mapped_text: "Марко спрашивает у Софы: «Правда ли, что Город создан десять лет назад?» Софа отвечает: «Да, по моим данным — десять лет.» Можно ли доверять?"
    options: ["Да, Софа всегда права", "Нет, Софа всегда врёт", "Нужно проверить в другом источнике"]
    answer: "Нужно проверить в другом источнике"
    explanation: "Софа — как умный друг, который иногда уверенно несёт чушь. Данные могут быть правильными, но перепроверить стоит"

  - id: "sq4"
    type: story
    original_ref: "5B.sc7"
    mapped_text: "На стене подполья — одна заметка без подписи: «Голос скоро потеряет контроль.» Больше нигде об этом нет."
    options: ["Скорее правда — раз написали", "Скорее неправда — мало источников", "Неизвестно — нужно больше информации"]
    answer: "Неизвестно — нужно больше информации"
    explanation: "Одна заметка без подписи — маловато. Один источник — как один свидетель: может быть прав, а может перепутал"

  - id: "sq5"
    type: story
    original_ref: "5B.sc7"
    mapped_text: "Кто надёжнее расскажет о том, как устроена Система Города?"
    options: ["Горожанин с большим числом", "София, которая программировала Софу", "Горожанин, который посмотрел рекламу Голоса"]
    answer: "София, которая программировала Софу"
    explanation: "София реально разбиралась в Системе — она создала Софу и подпольную сеть. Большое число — не экспертиза. Реклама Голоса — как фильм: красиво, но не факт"

  - id: "sq6"
    type: story
    original_ref: "5B.sc7"
    mapped_text: "Мама говорит Марко: «Я выбрала тебя.» Софа подтверждает: «Да, мамины слова совпадают с файлом Софии.» Но Софа загружена данными Софии. Независимые или зависимые источники?"
    options: ["Независимые источники", "Зависимые источники"]
    answer: "Зависимые источники"
    explanation: "Софа не проверяла сама — она повторяет то, что записала София. А София могла узнать от мамы. Это эхо, а не подтверждение. Крикнул в горах — услышал свой голос"

challenge_quizzes:
  - id: "cq1"
    type: story
    original_ref: "5B.sc7"
    mapped_text: "Два горожанина говорят: «Завтра вылазка!» Один прочитал в записке на стене подполья, другой услышал от лидера. Независимые или зависимые?"
    options: ["Независимые источники", "Зависимые источники"]
    answer: "Независимые источники"
    explanation: "Один узнал из записки, другой — от лидера напрямую. Два разных канала. Два ручейка впадают в одну реку с разных сторон"

  - id: "cq2"
    type: story
    original_ref: "5B.sc7"
    mapped_text: "Марко спрашивает маму: «Ты знала?» Мама плачет и говорит «да». Софа: «Да, мама знала.» Но Софа воспроизводит запись, которую загрузила мама (через Софию). Независимые или зависимые?"
    options: ["Независимые источники", "Зависимые источники"]
    answer: "Зависимые источники"
    explanation: "Софа не проверяла сама — она повторяет Машины... мамины слова через запись Софии. Это не два источника, а один с эхом"

  - id: "cq3"
    type: story
    original_ref: "5B.sc8"
    mapped_text: >
      Марко и горожане спорят о плане вылазки. Горожанин:
      «Нужно пойти к центральной башне — там ответы!»
      Другой: «Нет, к стене — там выход!» Третий: «Вы
      оба неправы, нужно ждать!» Кто-то: «А помните, как
      в прошлый раз ждали — ничего не вышло!» Что здесь СТВОЛ?
    options: ["Куда идти при вылазке", "Помогло ли ожидание в прошлый раз", "Кто из горожан неправ"]
    answer: "Куда идти при вылазке"
    explanation: "Ствол — решение о направлении. «Прошлый раз» — листок, один пример. «Кто неправ» — личные нападки, ветка с чужого дерева"

  - id: "cq4"
    type: story
    original_ref: "5B.sc8"
    mapped_text: "В споре о вылазке: «Центральная башня охраняется — идти опасно.» Это ствол, ветка или листок?"
    options: ["Ствол (центральная идея)", "Ветка (аргумент)", "Листок (деталь)"]
    answer: "Ветка (аргумент)"
    explanation: "Довод ПОЧЕМУ не стоит идти к башне. Причина, не пример. Аргумент против одного из вариантов"

  - id: "cq5"
    type: story
    original_ref: "5B.sc8"
    mapped_text: "В споре о вылазке: «В прошлый раз Семён пошёл к башне и его чуть не стёрли.» Это ствол, ветка или листок?"
    options: ["Ствол (центральная идея)", "Ветка (аргумент)", "Листок (деталь)"]
    answer: "Листок (деталь)"
    explanation: "Один Семён, один случай. Может, ему просто не повезло. Деталь яркая, но не доказательство. Один пример — не статистика"

  - id: "cq6"
    type: story
    original_ref: "5B.sc9"
    mapped_text: >
      Марко и Софа спорят: «Нужно ли проверить мамины слова
      перед тем, как действовать?» Софа: «Да, потому что один
      источник — ненадёжно.» Марко: «Но мама плакала! Она не
      врёт!» Софа: «Вчера лидер подполья тоже плакала, когда
      рассказывала про семь звеньев — и ошиблась.» Что здесь СТВОЛ?
    options: ["Проверять ли мамины слова", "Врёт ли мама", "Ошиблась ли лидер подполья"]
    answer: "Проверять ли мамины слова"
    explanation: "Ствол — решение о проверке. «Врёт ли мама» — ветка, это не то же самое (мама может не врать, но ошибаться). «Лидер ошиблась» — листок, один пример"

  - id: "cq7"
    type: story
    original_ref: "5B.sc9"
    mapped_text: "«Один источник — это ненадёжно, потому что любой человек может ошибиться.» Это ствол, ветка или листок?"
    options: ["Ствол (центральная идея)", "Ветка (аргумент)", "Листок (деталь)"]
    answer: "Ветка (аргумент)"
    explanation: "Аргумент — объясняет, ПОЧЕМУ нужна проверка. Общее правило, не конкретный пример"

  - id: "cq8"
    type: story
    original_ref: "5B.sc9"
    mapped_text: "«Вчера лидер подполья плакала и ошиблась в пересказе.» Это ствол, ветка или листок?"
    options: ["Ствол (центральная идея)", "Ветка (аргумент)", "Листок (деталь)"]
    answer: "Листок (деталь)"
    explanation: "Конкретный случай с лидером. Иллюстрирует аргумент, но сам по себе — не доказательство. Может, у неё просто был плохой день"

character_map:
  - from: "Маша «Я сама видела кота на дереве» (своими глазами)"
    to: "Марко видел, как число упало (своими глазами)"
    rationale: "Повторение типов источников в контексте чисел Города"
  - from: "Маша и Микола-эхо (зависимые)"
    to: "Мама и Софа (зависимые — Софа загружена данными от Софии, которая узнала от мамы)"
    rationale: "Главная интрига эпизода: мамины слова и запись Софии — зависимые источники, нужен третий"
  - from: "Спор о столовой / перемене (ствол/ветка/листок)"
    to: "Споры в подполье о вылазке + спор Марко-Софа о проверке"
    rationale: "Три элемента дерева применяются к сюжетным спорам"
  - from: "Два ученика отдельно посмотрели термометр (независимые)"
    to: "Два горожанина узнали о вылазке из разных источников (независимые)"
    rationale: "Независимые источники — каждый проверил сам"

