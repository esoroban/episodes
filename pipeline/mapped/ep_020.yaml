      type: generic
      original_ref: "5B.sc10"
      mapped_text: >
        Спор: «Давайте заведём хомяка в классе!» — «Зачем?» —
        «Учёные говорят, что животные помогают сосредоточиться!» —
        «В 4-Б завели рыбок, и средний балл поднялся!» Что здесь СТВОЛ?
      options: ["Давайте заведём хомяка в классе", "Животные помогают сосредоточиться", "В 4-Б завели рыбок и средний балл поднялся"]
      answer: "Давайте заведём хомяка в классе"
      explanation: "Ствол — «заводить хомяка или нет». Всё крутится вокруг этого"

    - id: "ep2"
      type: generic
      original_ref: "5B.sc10"
      mapped_text: "В споре о хомяке: «Животные помогают меньше нервничать и сосредоточиться.» Это ствол, ветка или листок?"
      options: ["Ствол (центральная идея)", "Ветка (аргумент)", "Листок (деталь)"]
      answer: "Ветка (аргумент)"
      explanation: "Аргумент — общее утверждение, не один случай"

    - id: "ep3"
      type: generic
      original_ref: "5B.sc10"
      mapped_text: "В споре о хомяке: «В 4-Б завели рыбок, и средний балл поднялся!» Это ствол, ветка или листок?"
      options: ["Ствол (центральная идея)", "Ветка (аргумент)", "Листок (деталь)"]
      answer: "Листок (деталь)"
      explanation: "Один класс, один пример. Может, совпадение. Рыбки не виноваты"

    - id: "ep4"
      type: generic
      original_ref: "5B.sc11"
      mapped_text: >
        Спор: «Домашки задают слишком много!» — «Дети должны
        отдыхать, а не сидеть до ночи!» — «Витя делает домашку
        до одиннадцати и засыпает на уроках!» Что здесь СТВОЛ?
      options: ["Домашки задают слишком много", "Дети должны отдыхать, а не сидеть до ночи", "Витя делает домашку до одиннадцати и засыпает на уроках"]
      answer: "Домашки задают слишком много"
      explanation: "Ствол — «много ли домашки». Центральный вопрос"

    - id: "ep5"
      type: generic
      original_ref: "5B.sc11"
      mapped_text: "В споре о домашке: «Дети после школы должны отдыхать и гулять, а не сидеть над тетрадками до ночи!» Ствол, ветка или листок?"
      options: ["Ствол (центральная идея)", "Ветка (аргумент)", "Листок (деталь)"]
      answer: "Ветка (аргумент)"
      explanation: "Довод, ПОЧЕМУ домашки много. Общее правило, не пример"

    - id: "ep6"
      type: generic
      original_ref: "5B.sc11"
      mapped_text: "В споре о домашке: «Витя делает домашку до одиннадцати вечера и засыпает на уроках!» Ствол, ветка или листок?"
      options: ["Ствол (центральная идея)", "Ветка (аргумент)", "Листок (деталь)"]
      answer: "Листок (деталь)"
      explanation: "Бедный Витя — один человек, один пример. Может, он отвлекается на телефон. Один человек — не статистика"

    - id: "ep7"
      type: generic
      original_ref: "5B.sc12"
      mapped_text: >
        Спор: «Поедем в научный музей!» — «Нет, в аквапарк!» —
        «В музее можно потрогать экспонаты!» — «В прошлом году
        3-А ездили в музей, и трое записались в кружок физики!»
        Что здесь СТВОЛ?
      options: ["Ехать в научный музей или в аквапарк", "В музее можно потрогать экспонаты и поставить опыты", "Трое из 3-А записались в кружок физики после музея"]
      answer: "Ехать в научный музей или в аквапарк"
      explanation: "Ствол — «куда ехать на экскурсию». Центральный вопрос"

    - id: "ep8"
      type: generic
      original_ref: "5B.sc12"
      mapped_text: "В споре об экскурсии: «В музее можно потрогать экспонаты и поставить опыты.» Ствол, ветка или листок?"
      options: ["Ствол (центральная идея)", "Ветка (аргумент)", "Листок (деталь)"]
      answer: "Ветка (аргумент)"
      explanation: "Аргумент за музей. Не пример, а довод"

    - id: "ep9"
      type: generic
      original_ref: "5B.sc12"
      mapped_text: "В споре об экскурсии: «Трое из 3-А записались в кружок физики после музея.» Ствол, ветка или листок?"
      options: ["Ствол (центральная идея)", "Ветка (аргумент)", "Листок (деталь)"]
      answer: "Листок (деталь)"
      explanation: "Один класс, одна поездка, трое учеников. «Совпадение подозрительное» — но подозрение не доказательство. Один листок — не весь лес"

