episode: 1
day: 1
blocks: ["1A.1"]
title: "Утро без сестры"
terms_introduced: ["факт", "мнение"]
terms_available: ["факт", "мнение"]

# =====================================================================
# ТЕОРИЯ — как Софа вводит термины
# =====================================================================
theory_delivery:

  term: "факт, мнение"
  scene_trigger: >
    Мама уверенно говорит: «У тебя нет сестры.» Марко сомневается —
    в комнате стоит кровать Софии. Софа включается и спрашивает:
    «Мама сказала — "у тебя нет сестры." Это факт или мнение?»
  sofa_introduction: >
    Софа через ситуацию с мамой подводит к вопросу: как отличить
    то, что можно проверить, от того, что нельзя? Кровать — можно
    потрогать. Фото — можно посмотреть. А «лучшая сестра» — нельзя
    измерить. Так появляются два слова: ФАКТ и МНЕНИЕ.
  generic_story_kept: >
    История Миколы и Маши (спор о мороженом) оставлена как аналогия
    Софы — «из жизни» пример. Но ОСНОВНАЯ иллюстрация — через маму
    и исчезновение Софии.
  rule: >
    «Факт — можно проверить. Мнение — нельзя. Если не можешь
    проверить — это не факт, даже если звучит уверенно.»
  life_question: >
    «Друг сказал: "Все так делают." Факт или мнение?» (мнение)

# =====================================================================
# КВИЗЫ СОФА-БЛОКА (6 квизов)
# =====================================================================
sofa_quizzes:

  - id: "sq1"
    type: story
    original_ref: "sc2.17"
    original_text: "Микола говорит: «Шоколадное мороженое лучше!» Маша: «Нет, клубничное!» Кто прав?"
    mapped_text: "София говорила: «Шоколадное мороженое лучше!» Марко считает, что клубничное. Кто из них прав?"
    options: ["София", "Марко", "Никто — у каждого своё"]
    answer: "Никто — у каждого своё"
    explanation: "«Лучше» — это вкус. Нет «вкусомера». У каждого свой вкус — и это нормально"
    rationale: "Пересажено: Микола→София, Маша→Марко. Спор о мороженом — эталонный пример мнения из урока. Эмоционально: Марко вспоминает сестру через бытовую деталь"

  - id: "sq2"
    type: story
    original_ref: "sc4.32"
    original_text: "«В классе открыто окно.» Факт или нельзя проверить?"
    mapped_text: "«София — лучшая сестра в мире.» Факт или мнение?"
    options: ["факт", "мнение"]
    answer: "мнение"
    explanation: "Нет «лучшемера» для сестёр. Это личное чувство Марко"
    rationale: "Эмоционально привязано к сюжету — Марко вспоминает сестру"

  - id: "sq3"
    type: story
    original_ref: "sc4.33"
    original_text: "«Математика — скучный предмет.» Факт или мнение?"
    mapped_text: "«Дневник Софии лежит на полке.» Факт или мнение?"
    options: ["факт", "мнение"]
    answer: "факт"
    explanation: "Можно подойти и потрогать. Дневник или есть, или нет"
    rationale: "Дневник — ключевая улика эпизода"

  - id: "sq4"
    type: generic
    original_ref: "sc4.34"
    original_text: "«В классе 25 учеников.» Факт или нельзя проверить?"
    mapped_text: "«В классе 25 учеников.» Факт или мнение?"
    options: ["факт", "мнение"]
    answer: "факт"
    explanation: "Можно посчитать. Есть инструмент — счёт"
    rationale: "Оставлен generic — простой разогрев"

  - id: "sq5"
    type: generic
    original_ref: "sc4.35"
    original_text: "«Математика — скучный предмет.» Факт или мнение?"
    mapped_text: "«Математика — скучный предмет.» Факт или мнение?"
    options: ["факт", "мнение"]
    answer: "мнение"
    explanation: "Нет «скучномера». У каждого своё ощущение"
    rationale: "Оставлен generic — классический пример из урока"

  - id: "sq6"
    type: generic
    original_ref: "sc4.36"
    original_text: "«Киев — столица Украины.» Факт или мнение?"
    mapped_text: "«Киев — столица Украины.» Факт или мнение?"
    options: ["факт", "мнение"]
    answer: "факт"
    explanation: "Можно проверить: карта, учебник, интернет"
    rationale: "Оставлен generic — однозначный факт"

