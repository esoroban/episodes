# =====================================================================
# GAMEFLOW — Эпизод 1: «Утро без сестры»
# Урок: факт и мнение (1A.1)
# Source: pipeline/source/episodes/day_01.yaml → ep: 1
# =====================================================================
#
# Flow:
#   s01 → s02 → s03 → s04 ──→ s05 → s06 → s07
#                │         ↗         ↑
#                └→ s03d ─┘    s05f ─┘
#
# s01  — Пробуждение (narrative)
# s02  — Диалог с мамой (dialogue)
# s03  — Находка телефона (narrative + choice)
# s03d — [flavor_detour] Рассматривает дневник подробнее
# s04  — Софа включается (dialogue)
# s05  — Первый quiz: факт или мнение (quiz)
# s05f — [soft_fail] Подсказка Софы
# s06  — Голосовое сообщение Софии (narrative)
# s07  — Клиффхэнгер: школа (cliffhanger)
# =====================================================================

episode_id: 1
episode_title: "Утро без сестры"
lesson: "1A.1"
terms_introduced: ["факт", "мнение"]

scenes:

  # ── СЦЕНА 1: Пробуждение ──────────────────────────────────────────
  - scene_id: ep001_s01
    episode_id: 1
    source_ref: day_01.ep1.drama
    scene_type: narrative
    location: "Квартира Марко, комната"
    time: "утро"
    characters_present: [Марко]
    author_text: >
      Марко открывает глаза. Потолок белый. Обычный.
      Кровать напротив — пуста. Одеяло заправлено. Не просто заправлено —
      подтянуто, как в гостинице. Будто на этой кровати никто никогда не спал.
      На стене — четыре рамки. Вчера в них были фотографии. Сейчас — белый
      картон вместо лиц.
    mood: "тихая тревога"
    next_default: ep001_s02
    visual_brief:
      background: "Детская комната, два кровати, утренний свет сквозь шторы"
      camera: wide
      characters:
        - who: Марко
          expression: сонная растерянность
          pose: садится на кровати, щурится
      props: [пустая кровать с идеально заправленным одеялом, четыре пустые рамки на стене]
      focus_object: "пустые рамки на стене"
      atmosphere: "тихое утро, но что-то сломано — пустота вместо привычного"
      ui_mode: reading

  # ── СЦЕНА 2: Диалог с мамой ───────────────────────────────────────
  - scene_id: ep001_s02
    episode_id: 1
    source_ref: day_01.ep1.drama
    scene_type: dialogue
    location: "Квартира Марко, кухня"
    time: "утро"
    characters_present: [Марко, мама]
    dialogue:
      - who: Марко
        line: "Мам, где фотки?"
      - who: мама
        line: "Какие фотки, солнце?"
      - who: Марко
        line: "На стене. Наши с Софией."
      - who: мама
        line: "Марко, у тебя нет сестры."
    author_text: >
      Она говорит это спокойно. Уверенно. Как говорят «завтра вторник».
      Марко почти верит — мама говорит так уверенно, а он привык соглашаться.
      Но в животе — тяжесть. Как перед контрольной, к которой не готовился.
    mood: "нарастающая тревога"
    next_default: ep001_s03
    visual_brief:
      background: "Кухня, мягкий утренний свет, мама с чашкой чая"
      camera: over-shoulder
      characters:
        - who: мама
          expression: терпеливая уверенность
          pose: стоит у стола с чашкой
          position: center
        - who: Марко
          expression: растерянность, смятение
          pose: стоит в дверном проёме
          position: left
      props: [чашка чая]
      atmosphere: "обычное утро, которое перестало быть обычным"
      ui_mode: dialogue

  # ── СЦЕНА 3: Находка телефона ──────────────────────────────────────
  - scene_id: ep001_s03
    episode_id: 1
    source_ref: day_01.ep1.drama
    scene_type: narrative
    location: "Квартира Марко, комната"
    time: "утро"
    characters_present: [Марко]
    author_text: >
      Марко возвращается в комнату. На полке, между учебниками — телефон.
      Старый. С треснутым экраном. Трещина идёт наискосок. Экран тёплый.
      Как будто кто-то только что держал его в руке.
      Рядом с телефоном — дневник. На первой странице рисунок: два стаканчика
      мороженого. Подпись: «Шоколадное лучше. — С.»
    mood: "находка, тонкая надежда"
    interaction_type: choice
    question: "Что Марко делает?"
    options:
      - id: look_diary
        text: "Полистать дневник Софии"
        next: ep001_s03_detour
      - id: turn_on_phone
        text: "Включить телефон"
        next: ep001_s04
    next_default: ep001_s04
    set_flags: [marko_found_diary]
    visual_brief:
      background: "Комната Марко, полка с учебниками"
      camera: close-up
      characters:
        - who: Марко
          expression: напряжённое внимание
          pose: стоит у полки, протягивает руку
      props: [телефон с треснутым экраном, дневник с рисунком мороженого]
      focus_object: "телефон с трещиной на экране"
      atmosphere: "маленькое открытие — след того, кто исчез"
      ui_mode: choice

  # ── СЦЕНА 3d: Flavor detour — дневник ─────────────────────────────
  - scene_id: ep001_s03_detour
    episode_id: 1
    source_ref: day_01.ep1.drama
    scene_type: narrative
    location: "Квартира Марко, комната"
    time: "утро"
    characters_present: [Марко]
    branch_type: flavor_detour
    author_text: >
      Марко листает дневник. Почерк аккуратный, мелкий, с завитушками
      на «д» и «у». Рисунки: кот в шляпе, формула с улыбающимся лицом,
      карта какого-то города с подписью «МОЙ ГОРОД». На последней заполненной
      странице — одна строчка: «Братик, если ты это читаешь — значит, я была
      права. Не верь тому, что кажется простым.»
    mood: "тёплая тоска, связь с сестрой"
    merge_to: ep001_s04
    next_default: ep001_s04
    visual_brief:
      background: "Комната Марко, крупный план дневника"
      camera: close-up
      characters:
        - who: Марко
          expression: грусть, нежность
          pose: сидит на полу, держит дневник
      props: [раскрытый дневник с рисунками, детский почерк]
      focus_object: "страница дневника с запиской Софии"
      atmosphere: "интимный момент — брат читает записи пропавшей сестры"
      ui_mode: reading

  # ── СЦЕНА 4: Софа включается ──────────────────────────────────────
  - scene_id: ep001_s04
    episode_id: 1
    source_ref: day_01.ep1.drama
    scene_type: dialogue
    location: "Квартира Марко, комната"
    time: "утро"
    characters_present: [Марко, Софа]
    author_text: >
      Марко нажимает кнопку. Экран мигает. Треск.
    dialogue:
      - who: Софа
        line: "Привет... Марко... если ты это слышишь... значит, я уже..."
      - who: автор
        line: "Обрыв. Перезагрузка."
      - who: Софа
        line: "Я — Софа. Образовательный помощник. Версия 0.7. Не финальная."
      - who: Марко
        line: "Где моя сестра?"
      - who: Софа
        line: "Для доступа к этой информации... докажи, что ты готов."
    mood: "удивление, надежда, напряжение"
    set_flags: [sofa_activated]
    next_default: ep001_s05
    visual_brief:
      background: "Комната Марко, экран телефона светится"
      camera: close-up
      characters:
        - who: Марко
          expression: шок, надежда
          pose: держит телефон обеими руками
      props: [телефон со светящимся треснутым экраном]
      focus_object: "экран телефона с мерцающим текстом"
      atmosphere: "момент контакта — что-то ожило"
      ui_mode: dialogue

  # ── СЦЕНА 5: Quiz — факт или мнение ───────────────────────────────
  - scene_id: ep001_s05
    episode_id: 1
    source_ref: day_01.ep1.sofa_block
    scene_type: quiz
    location: "Квартира Марко, комната"
    time: "утро"
    characters_present: [Марко, Софа]
    author_text: >
      Софа: «Мама сказала: "У тебя нет сестры." А дневник лежит на полке.
      Его можно потрогать. Он или есть, или его нет. Если проверили
      и подтвердилось — это ФАКТ. А когда нельзя проверить — это МНЕНИЕ.»
    interaction_type: vote
    question: "«Мама сказала: "У тебя нет сестры."» Факт или мнение?"
    options:
      - id: fact
        text: "Факт"
        correct: true
      - id: opinion
        text: "Мнение"
        correct: false
    correct_logic: >
      Факт — потому что это проверяемое утверждение. Можно проверить,
      есть ли сестра: документы, фотографии, свидетели. Факт может быть
      верным или неверным, но его МОЖНО проверить.
    feedback_success: >
      Софа: «Верно. Это факт — его можно проверить. И когда проверишь...
      может оказаться, что мама ошиблась. Или что кто-то хочет, чтобы
      ты перестал искать.»
    feedback_soft_fail: >
      Софа: «Подумай ещё. Можно ли проверить, есть ли у Марко сестра?
      Если можно проверить — это факт, даже если он звучит странно.»
    next_default: ep001_s06
    next_success: ep001_s06
    next_fail: ep001_s05_fail
    mood: "сосредоточенность, обучение"
    visual_brief:
      background: "Комната Марко, Софа на экране телефона"
      camera: medium
      characters:
        - who: Марко
          expression: сосредоточенность
          pose: сидит, смотрит на телефон
        - who: Софа
          expression: нейтральный интерфейс
          pose: текст на экране
      props: [телефон с текстом вопроса]
      atmosphere: "первый урок — момент, когда мир начинает раскладываться на части"
      ui_mode: quiz

  # ── СЦЕНА 5f: Soft fail — подсказка ───────────────────────────────
  - scene_id: ep001_s05_fail
    episode_id: 1
    source_ref: day_01.ep1.sofa_block
    scene_type: feedback
    location: "Квартира Марко, комната"
    time: "утро"
    characters_present: [Марко, Софа]
    branch_type: soft_fail_loop
    dialogue:
      - who: Софа
        line: >
          Подсказка: мнение — это когда нельзя проверить.
          «Шоколадное мороженое вкуснее» — нет вкусомера.
          А «у тебя нет сестры» — можно проверить? Есть документы?
          Фотографии? Свидетели?
    mood: "мягкая поддержка"
    merge_to: ep001_s05
    next_default: ep001_s05
    visual_brief:
      background: "Комната Марко, Софа на экране"
      camera: close-up
      characters:
        - who: Софа
          expression: подсказка, терпеливость
          pose: текст подсказки на экране
      atmosphere: "мягкий тупик — не провал, а возвращение"
      ui_mode: feedback

  # ── СЦЕНА 6: Голосовое Софии ───────────────────────────────────────
  - scene_id: ep001_s06
    episode_id: 1
    source_ref: day_01.ep1.challenge
    scene_type: narrative
    location: "Квартира Марко, комната"
    time: "утро"
    characters_present: [Марко, Софа]
    author_text: >
      Софа разблокирует запись. Три секунды голоса — другого, живого,
      знакомого: «Братик, начни с дневника. Я верю в тебя.»
      Тишина. Марко сжимает телефон. Дневник, который можно потрогать.
      Голос, который он узнаёт. Это факты. Мама, которая не помнит —
      тоже факт. Факты противоречат друг другу.
      Марко берёт дневник и идёт в школу.
    mood: "решимость, тихая боль"
    next_default: ep001_s07
    visual_brief:
      background: "Комната Марко, крупный план телефона"
      camera: close-up
      characters:
        - who: Марко
          expression: решимость сквозь слёзы
          pose: прижимает телефон к груди
      props: [телефон, дневник]
      focus_object: "телефон — голос сестры"
      atmosphere: "эмоциональный перелом — Марко решает искать"
      ui_mode: reading

  # ── СЦЕНА 7: Клиффхэнгер — школа ──────────────────────────────────
  - scene_id: ep001_s07
    episode_id: 1
    source_ref: day_01.ep1.cliffhanger
    scene_type: cliffhanger
    location: "Школа, коридор"
    time: "утро, начало учебного дня"
    characters_present: [Марко, Вера]
    author_text: >
      Школьный коридор. Марко прижимает дневник к груди.
      Впереди — Вера Андреевна. Мягкая улыбка: «Как дела, Марко?»
      В кармане — Софа вибрирует тревожно, но молчит.
    dialogue:
      - who: Вера
        line: "Как дела, Марко?"
    mood: "напряжение, предчувствие"
    next_default: ep002_s01
    visual_brief:
      background: "Школьный коридор, утро, свет из окон"
      camera: wide
      characters:
        - who: Марко
          expression: настороженность
          pose: идёт по коридору, прижимает дневник к груди
          position: left
        - who: Вера
          expression: мягкая улыбка
          pose: стоит впереди
          position: right
      props: [дневник в руках Марко]
      focus_object: "улыбка Веры — дружелюбная или опасная?"
      atmosphere: "спокойный коридор, но зритель знает — что-то будет"
      ui_mode: dialogue
