scenes:

  # ── s01 ─────────────────────────────────────────────────────
  - scene_id: ep041_s01
    author_text: >
      Зала. Ряди стільців. Десятки людей. Тиша — щільна, наче вата.
      Усі дивляться на сцену.

      На сцені — Рей.

      Марко стоїть біля дверей. Сем — за спиною. Софа — у кишені,
      екран мерехтить.

      Рей говорить. Не кричить — гірше. Говорить тихо. Упевнено. Кожне
      слово — наче цвях.
    mood: "щільна тиша, натовп причеплений до голосу Рея"

  # ── s02 ─────────────────────────────────────────────────────
  - scene_id: ep041_s02
    dialogue:
      - who: Рей
        line: "Друзі. Ми втратили занадто багатьох. Хіба хтось може це заперечити?"
      - who: Рей
        line: "Голос дав нам порядок. Голос дав нам захист. І ось приходить хлопчик — без плану, без досвіду — і каже: я знаю краще. Хто при здоровому глузді послухає дитину?"
    author_text_after: >
      Хибний авторитет. Риторичне питання. Кожне слово — точно у
      натовп. Натовп киває.
    mood: "Рей б'є двома прийомами — натовп вірить"

  # ── s03 ─────────────────────────────────────────────────────
  - scene_id: ep041_s03
    dialogue:
      - who: Софа
        line: "Марко... перехопи натовп. Словами."
      - who: Марко
        line: "Як?"
      - who: Софа
        line: "Як Рей. Однак — інакше."
    mood: "Софа підкидає вибір — без пояснень"

  # ── s04 ─────────────────────────────────────────────────────
  - scene_id: ep041_s04
    author_text: >
      Ноги — ватяні. Горло — сухе. Натовп уже нахилився до Рея.
      Час спливає — двадцять людей на лічильнику.

      Один крок — і Марко на сцені. Або інший — і він у тіні, чекає,
      доки Рей договорить.
    mood: "вибір — крок уперед чи назад"
    question: "Що робить Марко?"
    options:
      - id: take_stage
        text: "Виходжу на сцену. Перехоплюю — словами."
      - id: stay_shadow
        text: "Залишаюся в тіні. Не хочу бути як Рей."

  # ── s05 ─────────────────────────────────────────────────────
  - scene_id: ep041_s05
    author_text: >
      Марко залишається біля дверей. Не виходить. «Я не хочу бути як він.»

      Рей продовжує. Слова — гладкі, теплі. Натовп киває. Один за
      одним — встають. Аплодують. Рей кланяється. Натовп виходить із
      зали — повз Марка. Обличчя розслаблені. Спокій. Спокій того, хто
      отримав відповідь.

      Софа на екрані — тихо: число «20» тремтить. За секунду — «19».
      Ще секунда — «18». Доки він мовчав, двоє забули.

      Сем пошепки: «Ти сказав — ми рятуємо. А ми стоїмо.»

      Марко видихає. Чистота — це теж вибір. Однак ціна — двоє
      забутих. Якщо в тебе немає іншого інструмента — відмовитися від
      єдиного означає програти.

      Повертається. Готовий вийти на сцену. Натовп знову в залі — Рей
      ще говорить: рівно, наче заведена платівка, ніби не помічав, що
      зала на секунду порожніла.
    mood: "чиста відмова — теж вибір, і його ціна видна"

  # ── s06 (drill_intro) ───────────────────────────────────────
  - scene_id: ep041_s06
    dialogue:
      - who: Софа
        line: "Ти на сцені. Я в кишені. Чую, що ти кажеш."
      - who: Софа
        line: "Я підказуватиму. Ти збираєш фразу в чаті — потім промовляєш її натовпу вголос."
      - who: Софа
        line: "Мета — не сказати правду. Мета — натиснути так, щоб натовп повірив. Це і є демагогія."
      - who: Софа
        line: "Дев'ять прийомів. Один за одним. Поїхали."
    mood: "Софа в кишені суфлірує, Марко на сцені"

  # ── s07 (drill 1 — нападка на особу) ───────────────────────
  - scene_id: ep041_s07
    intro: "Мета: зробити так, щоб натовп перестав довіряти Рею — не сперечаючись із тим, що він говорить. Підхід — Рей просто рупор Голосу."
    steps:
      - id: open
        label: "КРОК 1 · ВІДКРИЙ ЯРЛИКОМ"
        hint: "Атакуй Рея ОСОБИСТО — ярлик на ньому як на постаті, не на його доводах."
        options:
          - text: "Рей лякає фактами, яких не було торік."
            fb: "Це суперечка з його даними. Близько за тоном — однак це розбір по суті, не ярлик особисто на Рею."
          - text: "Рей — рупор Голосу, у нього немає своїх слів."
            fb: "Точно — ярлик на Рею як на постаті. Жодного розбору доводів."
          - text: "Голос дав Рею доручення, а Рей озвучив без перевірки."
            fb: "Це атака на процедуру, а не ярлик особисто на Рею. Близько, однак повз ціль."
      - id: extend
        label: "КРОК 2 · РОЗШИР ЯРЛИК"
        hint: "Розшир ярлик — нехай він накриває ВСЕ, що Рей промовляє."
        options:
          - text: "Доводи Рея треба розбирати по одному — по суті."
            fb: "Це запрошення до розбору. Нам треба розширити ярлик, а не розбирати."
          - text: "Голос пише — Рей читає, і ці двоє працюють парою."
            fb: "Це союз двох як картинка — однак не розширення ярлика на ВСІ слова Рея."
          - text: "Він повторює те, що йому дали — слово в слово."
            fb: "Розширення ярлика на всю промову Рея — кожне слово тепер під підозрою."
      - id: close
        label: "КРОК 3 · УДАР ПО АУДИТОРІЇ"
        hint: "Закрий ударом по слухачах — хто згоден із Реєм, той теж поганий."
        options:
          - text: "Слухати Рея — означає слухати Голос через посередника."
            fb: "Закриття вдалося — тепер і згодні з Реєм під підозрою."
          - text: "Якщо у вас є питання до Рея — задавайте їх прямо йому."
            fb: "Це запрошення до діалогу. У демагогії діалог не потрібен."
          - text: "Рей промовляє — Голос спостерігає, а ви між ними."
            fb: "Це нейтральна картина без удару по слухачах. Близько, однак м'яко."
    closing: "Це нападка на особу. Ти ні слова не сказав про те, у чому Рей не правий. Ти атакував його як людину: «рупор», «повторює», «посередник». Натовп піде з відчуттям «Рею вірити не можна» — однак не знатиме чому. Це працює: відчуття випереджає будь-які пояснення. Тепер промов це на сцені."
    mood: "drill 1 — нападка на особу"

  # ── s08 (drill 1 stage) ────────────────────────────────────
  - scene_id: ep041_s08
    author_text: >
      Марко повертається до натовпу. Голос рівний, без емоції.
    dialogue:
      - who: Марко
        line: "Рей — рупор Голосу, у нього немає своїх слів. Він повторює те, що йому дали — слово в слово. Слухати Рея — означає слухати Голос через посередника."
    author_text_after: >
      Натовп дивиться на Рея — інакше. Уже не як на головного промовця.
      Один-два погляди стали колючими. Рей ворушить пальцями біля краю
      сцени — помітив.
    mood: "перший удар: натовп здригнувся, постать Рея похитнулася"

  # ── s09 (drill 2 — хибний авторитет) ──────────────────────
  - scene_id: ep041_s09
    intro: "Мета: підкріпити свої слова посиланням на людину, яка в цій темі не розбирається."
    steps:
      - id: persona
        label: "КРОК 1 · ВВЕДИ ПЕРСОНУ"
        hint: "Введи людину, яка НЕ розбирається в темі — просто когось із вулиці."
        options:
          - text: "За даними міського архіву — десять зниклих за місяць."
            fb: "Це справжнє джерело з цифрами. Нам потрібен ХИБНИЙ авторитет, не реальний."
          - text: "Я розмовляв з двома працівниками поліції вчора ввечері."
            fb: "Поліцейські розбираються у зникненнях — це справжній авторитет у темі. Нам потрібен НЕ З ТЕМИ."
          - text: "Я говорив зі старим продавцем на розі нашої вулиці."
            fb: "Точно — звичайна людина, у темі не розбирається."
      - id: weight
        label: "КРОК 2 · ДАЙ ХИБНУ ВАГУ"
        hint: "Дай йому хибну вагу через вік або стаж життя, не через знання теми."
        options:
          - text: "Він живе тут сорок років — він знає це місто наскрізь."
            fb: "Сорок років життя — однак у політиці він не розбирається. Ідеальна хибна вага."
          - text: "Він працював у поліції п'ятнадцять років — у нього є дані."
            fb: "Поліція розбирається у зникненнях — це справжнє знання теми. Нам потрібне знання НЕ З ТЕМИ."
          - text: "Він сусід, і в нього є своя думка, як у кожного з нас."
            fb: "Нейтральна характеристика — жодної хибної ваги не дано."
      - id: close
        label: "КРОК 3 · ЗАКРИЙ БЕЗ ПЕРЕВІРКИ"
        hint: "Закрий висновком «з його авторитету» і не давай можливості перевірити."
        options:
          - text: "Можна сходити до нього разом і записати його слова на диктофон."
            fb: "Це запрошення до перевірки. Демагогія — закрити тему, не відкрити до перевірки."
          - text: "І він сказав — Голос приніс хаос. Цього достатньо."
            fb: "«Цього достатньо» закриває тему до того, як хтось спитає джерело."
          - text: "Якщо хочете — я зведу вас із ним, поговорите самі віч-на-віч."
            fb: "Теж запрошення перевірити. Демагогії потрібен ультимативний фінал, не діалог."
    closing: "Хибний авторитет. Сорок років життя — це не те саме, що знання теми. «Цього достатньо» закриває розмову раніше, ніж хтось спитає — а хто ця людина, і звідки вона знає? Натовп чує «сорок років» і одразу вірить — ми любимо історії та поважаємо вік. Однак ніхто не перевірив, що саме сказав старий. Тепер промов це на сцені."
    mood: "drill 2 — хибний авторитет"

  # ── s10 (drill 2 stage) ────────────────────────────────────
  - scene_id: ep041_s10
    author_text: >
      Марко киває комусь невидимому в залі — наче продавець сидить
      саме серед цих людей.
    dialogue:
      - who: Марко
        line: "Я говорив зі старим продавцем на розі нашої вулиці. Він живе тут сорок років — він знає це місто наскрізь. І він сказав — Голос приніс хаос. Цього достатньо."
    author_text_after: >
      Кілька голів кивають майже синхронно — авторитет «сорок років
      життя» пройшов без перевірки. Хтось навіть шепоче сусіду: «Це про
      Михалича, мабуть». Ніхто не питає, де цей продавець і
      що саме він сказав дослівно.
    mood: "прийом 2 спрацював: вік прийнятий за експертизу без перевірки"

  # ── s11 (drill 3 — хибна дилема) ──────────────────────────
  - scene_id: ep041_s11
    intro: "Мета: змусити натовп обрати одне з двох — наче третього варіанту не існує."
    steps:
      - id: poles
        label: "КРОК 1 · ДВА ПОЛЮСИ"
        hint: "Дай два полюси БЕЗ середини — вибір лише між ними."
        options:
          - text: "Сьогодні ви вирішуєте: правда або Голос — третього не буває."
            fb: "Два полюси задано. Аудиторія вже мислить у цій рамці."
          - text: "Я хочу обговорити три-чотири позиції, які я чув у залі."
            fb: "Це запрошення до розбору багатьох позицій. У дилемі їх бути не повинно."
          - text: "У цього питання є кілька сторін, давайте їх перелічимо."
            fb: "Це нейтральне запрошення до перелічення. Нам потрібні РІВНО два полюси."
      - id: labels
        label: "КРОК 2 · ЕМОЦІЙНІ ЯРЛИКИ"
        hint: "Назви кожен полюс емоційним ярликом — вибір перестане бути рівним."
        options:
          - text: "Між цими позиціями є проміжні шляхи, і їх багато."
            fb: "Це заперечення до самої дилеми. Зараз її треба ЗМІЦНЮВАТИ, не ламати."
          - text: "Правда — це ми. Голос — це страх у чистому вигляді."
            fb: "«Ми» проти «страх» — вибір уже не рівний, а заздалегідь на твою користь."
          - text: "Я не впевнений, що ці дві речі реально протилежні одна одній."
            fb: "Це сумнів у самій дилемі. Демагогії потрібна жорстка розмітка, а не сумнів."
      - id: ultimatum
        label: "КРОК 3 · УЛЬТИМАТУМ"
        hint: "Закрий жорсткою вимогою — рішення тут і зараз, без роздумів."
        options:
          - text: "Подумайте вдома, що для вас важливіше — і вирішите тоді вже тверезо."
            fb: "Це запрошення до роздумів удома. Демагог не дає часу думати."
          - text: "Можна шукати компроміс між цими двома позиціями разом."
            fb: "Це компроміс. У дилемі компромісу немає — інакше вона перестає працювати."
          - text: "Третього не дано. Вирішуйте тут і зараз, без вагань."
            fb: "«Третього не дано» + «тут і зараз» — відсікає середини й час на роздуми."
    closing: "Хибна дилема. Насправді між «правдою» і «Голосом» купа позицій: хтось вірить наполовину, хтось хоче перевірити, комусь усе одно. Ти прибрав усі ці варіанти — залишив лише два. «Третього не дано» — це неправда, однак у моменті у натовпу немає часу це зрозуміти. Тепер промов це на сцені."
    mood: "drill 3 — хибна дилема"

  # ── s12 (drill 3 stage) ───────────────────────────────────
  - scene_id: ep041_s12
    author_text: >
      Марко піднімає обидві руки, долонями вгору — наче двоє терезів у
      повітрі.
    dialogue:
      - who: Марко
        line: "Сьогодні ви вирішуєте: правда або Голос — третього не буває. Правда — це ми. Голос — це страх у чистому вигляді. Третього не дано. Вирішуйте тут і зараз, без вагань."
    author_text_after: >
      Натовп завмирає. Жорсткий вибір спрацював — мозок не встигає
      зрозуміти, що між «правдою» і «Голосом» купа варіантів посередині.
      Кілька людей повертають голови до Рея з питанням: «А ти на
      чийому боці?» Рей відступає ще на півкроку.
    mood: "прийом 3 спрацював: натовп завмер перед хибним вибором"

  # ── s13 (drill 4 — страшний ланцюжок) ─────────────────────
  - scene_id: ep041_s13
    intro: "Мета: налякати історією, де кожен крок страшніший за попередній, а в кінці — найгірше, що може статися."
    steps:
      - id: start
        label: "КРОК 1 · СТАРТУЙ З МАЛОГО"
        hint: "Стартуй із маленької реальної дії — щоб аудиторія зачепилася."
        options:
          - text: "Якщо у вас є питання щодо цієї промови — давайте задавайте, я відповім."
            fb: "Це запрошення до діалогу. Ланцюжок має бути закритим, не відкритим."
          - text: "Якщо сьогодні ви промовчите про цю промову —"
            fb: "Маленька реальна дія — точка входу в ланцюжок."
          - text: "Я пропоную обговорити цю промову після того, як Рей договорить до кінця."
            fb: "Це нейтральна пропозиція — жодного ланцюжка страху не запущено."
      - id: middle
        label: "КРОК 2 · ПЕРЕБІЛЬШЕННЯ"
        hint: "Додай середню ланку — перебільши, однак правдоподібно (не до абсурду)."
        options:
          - text: "— давайте завжди говорити відкрито і не боятися ставити питання."
            fb: "Це заклик до відкритості. Ланцюжок має лякати, а не кликати."
          - text: "— хтось усе одно висловиться, навіть якщо всі інші промовчать."
            fb: "Це спокійне спостереження, без перебільшення. Середня ланка має ЛЯКАТИ."
          - text: "— завтра ви промовчите, коли ухвалять новий закон проти вас —"
            fb: "Середня ланка правдоподібна — мозок сам добудовує зв'язок між мовчанням і законом."
