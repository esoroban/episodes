  # ── s31 (теорія — заперечення + структура) ────────────────
  - scene_id: ep041_s31
    author_text: >
      ЗАПЕРЕЧЕННЯ — те, що щойно зробила Анна. Спокійна відповідь
      на чужі слова з причиною. Не «ні!» — а «ні, і ось чому».

      У заперечення і нападки різні цілі. Нападка б'є по ЛЮДИНІ:
      «ти дурень», «лише дурні так думають». Заперечення б'є по
      АРГУМЕНТУ: «я думаю інакше, тому що...».

      Марко на сцені бив по Рею — «посередник, якого ніхто не
      призначав». Це нападка. Аргумент Рея — про порядок — залишився
      неторкнутим.

      СТРУКТУРА ЗАПЕРЕЧЕННЯ — чотири кроки.

      КРОК 1. Повтори думку співрозмовника. Так ти показуєш, що
      почув, а не просто закричав поперек.

      КРОК 2. Покажи повагу. «Я розумію, чому ти так думаєш.»
      Цей крок знімає з співрозмовника захист.

      КРОК 3. Скажи свою думку. Чітко, без образ. «Однак я думаю
      інакше.»

      КРОК 4. Дай причину. Факт, приклад, логіку. Не «бо я так
      сказав», а «бо ось дані / ось випадок / ось висновок».

      Фрази-помічники: «Я не згоден з ідеєю...», «Мені здається,
      є помилка...», «Я розумію тебе, однак думаю інакше, тому
      що...».

      Головне: заперечення — не слабше за нападку. Воно сильніше. Бо
      нападка лише злить. Заперечення — змушує думати.
    mood: "карта інструмента — чотири кроки"

