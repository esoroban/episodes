      - who: Анна
        line: "Однак я не згодна. У мене немає доказів, що Голос винен у зникненнях. Покажеш факти — піду з тобою. А поки — ні."
      - who: автор
        line: "Голос Анни — звичайний. Спокійний. Без тиску. Без ярликів. Без ланцюжка страху. Просто — суперечка. Без атаки. Марко чує різницю миттєво. І звичка тягне — ударити першим. Знайомий шаблон сам піднімається."
      - who: Марко
        line: "А ви звідки знаєте, що Голос НЕ винен?"
      - who: автор
        line: "Питання-пастка. На натовпі щойно працювало. Анна не смикається."
