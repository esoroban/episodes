  - scene_id: ep011_s09_retro
    author_text: "Марко опускає телефон. Макс сидить навпроти — права сторона обличчя, як і раніше, вицвіла, ліва — жива. Він говорить щось про свого брата: повільно, обережно, ніби кожне слово — уламок, який можна впустити.\nІ в голові Марка оформлюється другий інструмент. Перший був гальмо — СПІВПЕРЕЖИВАННЯ. Другий — як дзеркало. Не те, що на стінах Міста. Інше, живе: слухати людину так, щоб вона побачила, що її чують.\nАКТИВНЕ СЛУХАННЯ. Повторити своїми словами те, що щойно почув. Не «так-так, зрозуміло», не «я теж». А точно — як дзеркало. «Ти кажеш, що...», «Тобто ти маєш на увазі...», «Якщо я правильно зрозумів...» — три фрази-помічниці.\nРазом вони складаються в правило. Одинадцяте за рахунком. Два інструменти розвідника. Співпереживання — гальмо: спочатку відчуй, потім говори. Активне слухання — дзеркало: повтори своїми словами, щоб людина бачила — ти чуєш.\nМарко хоче перевірити.\n"
  - scene_id: ep011_s19_end
    author_text: "Марко стоїть у провулку. Один. Стіни відображають його — але відображення більше не запізнюється. Ніби зрозуміло, кого повторює.\nДва інструменти. Гальмо і дзеркало. Марко вперше не просто чув — а СЛУХАВ. І людина з напівстертим обличчям уперше за три роки відчула, що її бачать.\nАле число 40. Уранці було 41. Мінус один — за півдня.\nМарко біжить.\n"
