    author_text: "Макс сидить навпроти. Цегляна стіна за спиною. Права сторона обличчя — вицвіла, як сторінка, яку довго тримали на сонці. Контур є, а кольору немає. Ліва — жива, темні очі, різке підборіддя, шрам на брові. Одна людина і дві її половини.\nМарко вперше дивиться не через слова — через тишу. І ловить щось: страх. Не гучний, не істеричний. Глибокий, як колодязь. «Я не хочу забути його.» Це Марко не почув — він побачив. У плечах, стиснутих до вух. У руці, притиснутій до коліна.\nІ тоді в голові оформлюється інструмент. Розвідник, який кричить «ГОВОРИ НЕГАЙНО!», не працює — це солдат у масці. Щоб підійти до такої людини, потрібне ГАЛЬМО. Антена. Її ім'я — СПІВПЕРЕЖИВАННЯ.\nСпівпереживання спрацьовує ДО того, як скажеш образливе. Ти відчуваєш, що відчуває інший — і гальмуєш. Три фрази приходять самі: «Я розумію, що тобі...», «Тобі, мабуть, прикро, коли...», «Я бачу, що тобі це важливо...»\nМарко мимоволі пирхає — від того, як точно все складається. Макс піднімає брову. Ліву, живу. «Що?»\nМарко мовчить. Гальмо вже працює.\n"
  - scene_id: ep011_s05
    author_text: >
