episode_id: 6
episode_title: "Світлофор"
lang: uk
terms_introduced: ["світлофор повторень"]
terms_used: ["повторюваність", "закономірність", "збіг", "факт", "думка", "детектив правди"]

scenes:

  # ── s01 ─────────────────────────────────────────────────────
  - scene_id: ep006_s01
    author_text: >
      Марко не може перестати думати про напис на стіні. «Леон бреше. Порахуй його пальці.» Почерк Софії. Отже, Софія була в цьому підвалі. Отже, вона знала Леона. Отже... що?

      Марко повертається до підвалу. Ранок — якщо в Дзеркальному Місті буває ранок. Небо все те саме фіолетове.

      Леон на місці. Чай. Усмішка. Светр. Ніби нікуди й не виходив.
    dialogue:
      - who: Леон
        line: "Повернувся! Чудово. Чаю?"
      - who: автор
        line: >
          Марко сідає навпроти. Бере чашку. Цього разу — не п'є. Ставить поруч. Дивиться на руки Леона. Десять пальців. Звичайні. Рахує — десять. Софія написала «порахуй» — але пальців десять. Що вона мала на увазі?
    author_text_after: >
      Марко піднімає Дзеркало Повторень. Дивиться на Леона крізь скло. Крізь Дзеркало Леон виглядає інакше. Обличчя — те саме, але очі — тьмяні. І руки — руки дивні. Пальців не десять. Пальців одинадцять. Шостий палець на лівій руці — маленький, як мізинець, притиснутий до долоні. Без Дзеркала — не видно. З Дзеркалом — очевидно.

      Марко швидко опускає Дзеркало. Леон усміхається. Не помітив. Або помітив, але не подав виду.
    mood: "розвідка"

  # ── s02 ─────────────────────────────────────────────────────
  - scene_id: ep006_s02
    author_text: >
      Одинадцять пальців. Один раз. Достатньо? Софа сказала — один раз це збіг. Треба перевірити ще.
    dialogue:
      - who: автор
        line: >
          Марко піднімає Дзеркало знову. Одинадцять. Знову. І третій раз — одинадцять. Три рази. Закономірність. Але що це означає?
      - who: автор
        line: "Софа вібрує."
    mood: "наростаюча тривога"

  # ── s03 ─────────────────────────────────────────────────────
  - scene_id: ep006_s03
    author_text: "Марко дістає телефон під столом."
    dialogue:
      - who: Софа
        line: "Ти перевірив три рази. Добре. Пам'ятаєш — вчора ми назвали це «сильна гіпотеза»? У неї є ім'я."
      - who: Софа
        line: >
          СВІТЛОФОР ПОВТОРЕНЬ. Червоний — один раз. СТОП, не роби висновок. Може, збіг. Жовтий — два-три рази. Це і є «сильна гіпотеза» — цікаво, але перевіряй далі. Зелений — п'ять і більше однакових результатів, у різних умовах. Тоді — закономірність.
      - who: Софа
        line: "Леон з одинадцятьма пальцями — ти бачив три рази. Це жовтий. Перевіряй далі."
    mood: "новий інструмент"

  # ── s04 ─────────────────────────────────────────────────────
  - scene_id: ep006_s04
    interactions:
      - question: "Марко один раз побачив зайвий палець Леона крізь Дзеркало. Який колір світлофора?"
        options:
          - {id: red, text: "Червоний — СТОП, не роби висновок"}
          - {id: yellow, text: "Жовтий"}
          - {id: green, text: "Зелений"}
        correct_logic: "Один раз — червоний! СТОП, не роби висновок."
        feedback_success: "Червоний! Один раз — СТОП. Не роби висновок."
        feedback_soft_fail: "Один раз — який колір? Пам'ятай: один = червоний."
      - question: "П'ять разів із п'яти відображення Леона в Дзеркалі не повторює його усмішку. Який колір?"
        options:
          - {id: red, text: "Червоний"}
          - {id: yellow, text: "Жовтий"}
          - {id: green, text: "Зелений — закономірність"}
        correct_logic: "П'ять разів однаково — зелений! Закономірність."
        feedback_success: "Зелений! П'ять разів — стабільний результат. Закономірність."
        feedback_soft_fail: "П'ять разів одне й те саме. Який колір для п'яти і більше?"
      - question: "Марко двічі побачив зайвий палець у Леона крізь Дзеркало. Який колір?"
        options:
          - {id: red, text: "Червоний"}
          - {id: yellow, text: "Жовтий — цікаво, але перевіряй"}
          - {id: green, text: "Зелений"}
        correct_logic: "Два рази — жовтий! Цікаво, але перевіряй далі."
        feedback_success: "Жовтий! Два рази — цікаво, але рано робити висновок."
        feedback_soft_fail: "Два рази — який колір? Пам'ятай: два-три = жовтий."
      - question: "Марко підняв Дзеркало — і один раз побачив, що відображення Леона не рухається. Збіг чи закономірність?"
        options:
          - {id: pattern, text: "Закономірність"}
          - {id: coincidence, text: "Збіг — один раз, червоний"}
        correct_logic: "Один раз — червоний! Збіг."
        feedback_success: "Один раз — червоний. Збіг."
        feedback_soft_fail: "Один раз. Який колір світлофора?"
      - question: "Відображення Леона в Дзеркалі знову не махає, коли махає сам Леон. П'ять разів із п'яти. Збіг чи закономірність?"
        options:
          - {id: pattern, text: "Закономірність — стабільний результат"}
          - {id: coincidence, text: "Збіг"}
        correct_logic: "Стабільний результат! П'ять із п'яти — закономірність."
        feedback_success: "Стабільний результат! П'ять із п'яти. Закономірність."
        feedback_soft_fail: "П'ять разів одне й те саме. Що це?"
      - question: "Марко прийшов до Леона — відображення в Дзеркалі не усміхалося. Три рази. Який колір?"
        options:
          - {id: red, text: "Червоний"}
          - {id: yellow, text: "Жовтий — перевіряй далі"}
          - {id: green, text: "Зелений"}
        correct_logic: "Три рази — жовтий! Перевіряй далі."
        feedback_success: "Жовтий! Три рази — перевіряй далі."
        feedback_soft_fail: "Три рази. Який колір для двох-трьох?"
    mood: "практика світлофора"

  # ── s05 ─────────────────────────────────────────────────────
  - scene_id: ep006_s05
    dialogue:
      - who: Софа
        line: >
          Важливе правило: умови перевірки мають бути однаковими. Біг по стадіону обидва рази — чесно. Один раз по стадіону, один раз в гору — нечесно. Умови різні — результат непорівнянний.
    interactions:
      - question: "Леон усміхається щоразу, коли Марко приходить. Відображення в Дзеркалі не усміхається щоразу. Умови однакові?"
        options:
          - {id: yes, text: "Так — те саме місце, той самий Леон, те саме світло"}
          - {id: no, text: "Ні — умови різні"}
        correct_logic: "Те саме місце, той самий Леон, те саме світло."
        feedback_success: "Так! Одне місце, один Леон, одне світло. Умови однакові."
        feedback_soft_fail: "Місце змінилося? Леон змінився? Світло змінилося?"
      - question: "Марко перевіряв двері в парку три рази. Умови однакові?"
        options:
          - {id: yes, text: "Так — те саме місце, та сама рука"}
          - {id: no, text: "Ні"}
        correct_logic: "Те саме місце, та сама рука."
        feedback_success: "Так! Те саме місце, та сама рука. Умови однакові."
        feedback_soft_fail: "Рука та сама? Місце те саме? Тоді..."
    mood: "умови перевірки"

  # ── s06 ─────────────────────────────────────────────────────
    dialogue_after:
      - who: Софа
        line: "Правило... шосте. Світлофор повторень. Один раз — червоний, стоп. Два-три — жовтий, перевіряй. П'ять і більше — зелений, закономірність. І завжди: умови мають бути однаковими."
  - scene_id: ep006_s06
    dialogue:
      - who: Софа
        line: >
          З життя... Марко один раз побачив зайвий палець і вже хоче вирішити, що Леон не людина. Що скаже світлофор?
    question: "Марко один раз побачив зайвий палець і хоче зробити висновок. Який колір світлофора?"
    options:
      - {id: red, text: "Червоний — одного разу мало"}
      - {id: yellow, text: "Жовтий"}
      - {id: green, text: "Зелений"}
    correct_logic: "Один раз — червоний! СТОП, не роби висновок."
    feedback_success: "Червоний! Один раз — СТОП. Не поспішай із висновками."
    feedback_soft_fail: "Один раз. Який колір? Пам'ятай правило."
    mood: "зв'язок із життям"

  # ── s07 ─────────────────────────────────────────────────────
  - scene_id: ep006_s07
    dialogue:
      - who: автор
        line: "Леон помічає, що Марко дивиться крізь Дзеркало."
      - who: Леон
        line: "Що ти там бачиш, хлопчику?"
      - who: Марко
        line: "Нічого."
      - who: автор
        line: >
          Надто швидко. Леон нахиляє голову. Усмішка на місці. Марко навмисно підіймає Дзеркало — у склі відображення без усмішки.
      - who: Леон
        line: >
          Знаєш що, ходімо, я покажу тобі дещо. Книгу. Вона в дальній кімнаті. Там написано, як знайти тих, кого забрали.
    author_text_after: "Марко схоплюється. Книга! Інформація про Софію! Телефон вібрує — швидко, коротко."
    mood: "пастка гостинності"

  # ── s07_sofa ─────────────────────────────────────────────────
  - scene_id: ep006_s07_sofa
    dialogue:
      - who: Софа
        line: "Леон пропонує піти в дальню кімнату."
      - who: Софа
        line: "Він уже казав «безпечно» трьом людям. Один не повернувся."
      - who: Софа
        line: "Світлофор — жовтий. Що робиш?"
    mood: "попередження в чаті"

  # ── s07_choice ───────────────────────────────────────────────
  - scene_id: ep006_s07_choice
    author_text: >
      Леон стоїть у проході. Чекає. Очі теплі. Рука вказує в темряву дальньої кімнати. «Книга про тих, кого забрали» — слова ще висять у повітрі.
    question: "Що робить Марко?"
    options:
      - id: ask_first
        text: 'Спочатку запитати: «А всі, кому ти казав "безпечно", повернулися?»'
      - id: follow
        text: "Піти за Леоном мовчки — книга важливіша"
    mood: "вибір — інструмент чи порив"

  # ── s07c_ask ─────────────────────────────────────────────────
  - scene_id: ep006_s07c_ask
    author_text: >
      Марко випростується. Не йде за Леоном. Натомість — відкриває рот, щоб поставити запитання. Слова не прості: стара людина, усмішка, чай. Але четверте запитання детектива сильніше за чай.
    mood: "голос детектива вмикається"

  # ── s07c_follow ──────────────────────────────────────────────
  - scene_id: ep006_s07c_follow
    author_text: >
      Марко робить крок. Другий. «Книга про Софію» — два слова тягнуть сильніше за жовтий світлофор. Але на третьому кроці — вібрація телефона в кишені. Довга. Софа нагадує: червоний іще не став зеленим. Марко зупиняється. Обертається. Книга зачекає.
    mood: "порив — і гальмо"

  # ── s08 ─────────────────────────────────────────────────────
  - scene_id: ep006_s08
    interactions:
      - question: "Леон каже «я покажу книгу». Це можна перевірити?"
        options:
          - {id: yes, text: "Так — можна піти й побачити"}
          - {id: no, text: "Ні"}
        correct_logic: "Можна піти й побачити."
        feedback_success: "Так! Перевірювано — іди й подивись. Але..."
        feedback_soft_fail: "Є спосіб перевірити? Піти й подивитися?"
      - question: "Леон уже казав «безпечно» іншим. Один не повернувся. Чи достатньо даних, щоб іти?"
        options:
          - {id: yes, text: "Так — більшість повернулися"}
          - {id: no, text: "Недостатньо — два з трьох не є закономірністю безпеки"}
        correct_logic: "Два з трьох — не закономірність безпеки."
        feedback_success: "Недостатньо! Один не повернувся — не можна ігнорувати."
        feedback_soft_fail: "Один не повернувся. Це можна ігнорувати?"
      - question: "Що б зробив детектив правди?"
        options:
          - {id: go, text: "Пішов би одразу"}
          - {id: ask, text: "Поставив би запитання: а що сталося з тим, хто не повернувся?"}
        correct_logic: "Детектив поставив би запитання."
        feedback_success: "Детектив ставить запитання! «А що сталося з тим, хто не повернувся?»"
        feedback_soft_fail: "Детектив іде одразу? Чи спочатку запитує?"
    mood: "перевірка перед дією"

  # ── s09 ─────────────────────────────────────────────────────
  - scene_id: ep006_s09
    dialogue:
      - who: автор
        line: "Марко зупиняється."
      - who: Марко
        line: >
          Професоре... ви казали іншим, що шлях безпечний. Тим, хто приходив до мене. Усі повернулися?
      - who: автор
        line: >
          Леон кліпає. Усмішка гасне — на одну секунду. Потім повертається.
      - who: Леон
        line: "Звичайно. Звичайно, всі."
      - who: автор
        line: >
          Марко піднімає Дзеркало. У склі — відображення Леона. Відображення хитає головою. Повільно. З боку в бік. Ні.
      - who: автор
        line: >
          Марко обертається. Іде до сходів. Не біжить — іде. Спокійно.
      - who: Леон
        line: "Хлопчику! Куди ти?"
      - who: автор
        line: >
          Голос уже не м'який. Марко не озирається.
    mood: "розрив довіри"

  # ── s10 ─────────────────────────────────────────────────────
  - scene_id: ep006_s10
    author_text: >
      На верхній сходинці Марко все-таки озирається. Леон стоїть біля столу. Махає рукою. Усміхається.

      Марко піднімає Дзеркало. У склі: **відображення Леона стоїть нерухомо. Не махає.** Одна рука відображення вказує на стіну. Там — новий напис, тим самим почерком Софії: «Леон бреше. Але не зі своєї волі. Порахуй його пальці ЗНОВУ — через тиждень.»

      Через тиждень? Що зміниться через тиждень?
    mood: "два попередження і число"

  # ── s10_sofa ─────────────────────────────────────────────────
  - scene_id: ep006_s10_sofa
    dialogue:
      - who: Софа
        line: "Число... на стіні... виявлено. Марко, подивись праворуч."
    author_text: >
      Марко повертає голову. На стіні будинку, у тіні карниза, крейдою — число: 47.
    dialogue_after:
      - who: Софа
        line: "Сорок сім... запам'ятай. Це... важливо."
    mood: "загадка в чаті"
