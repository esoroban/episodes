      Він уже біля сходів. Нога на першій сходинці.

      Потім — зупиняється. Якщо показати зараз — що він скаже? «Ось записи Софії, дивіться»? Їх запитають: як перевірити? Як витримати, якщо Голос почне ухилятися?

      Поки Марко не вміє повертати до питання — він програє будь-яку розмову. Зошит — доказ, але без інструмента доказ не працює.

