      «Я не стираю — я захищаю» — Леон стертий.

      «Кожен голос важливий» — незгодних прибирають.

      «Я дбаю про дітей» — числа падають.

      «Місто — місце безпеки» — Макс стирається.

      Десятки рядків. Кожен — тріщина. Окремо — дрібниця. Разом — стіна валиться.

      Софія збирала докази. Місяцями. Кожну суперечність — зафіксовано.
