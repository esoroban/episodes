episode_id: 17
episode_title: "Сім ланок"
lang: uk
terms_introduced:
  - "своїми очима"
  - "почув від інших"
  - "три запитання для перевірки"
  - "рівні інтернету"
  - "дипфейк"
terms_used:
  - "довіра (Етос)"
  - "почуття (Пафос)"
  - "докази (Логос)"
  - "баланс способів"

scenes:

  # ── s01 ─────────────────────────────────────────────────────────────
  - scene_id: ep017_s01
    author_text: >
      Повітря в провулку зсунулось. Марко завмер. Тиша.

      Потім — голос. Тихий. Жіночий. Без луни.

      — Не обертайся. Іди за мною.
    mood: "невидимий провідник з темряви"

  # ── s02 ─────────────────────────────────────────────────────────────
  - scene_id: ep017_s02
    author_text: >
      Марко обертається. Звісно.

      Жінка. Років тридцять. Сірий одяг. Число на зап'ясті — дванадцять.
      Дванадцять зі ста. Майже стерта.
    dialogue:
      - who: "Подпольщица"
        line: "Я казала не обертатись."
      - who: Марко
        line: "Я чув."
    author_text_after: >
      Вона дивиться на Марка. Потім — на Софу в його руці. Киває. Іде.
    mood: "перший живий погляд на число, яке майже з'їдене"
    question: "Як іти за нею?"
    options:
      - id: silent
        text: "Мовчки кивнути і піти"
      - id: ask
        text: "Поставити запитання одразу: «Куди?»"

  # ── s02b ────────────────────────────────────────────────────────────
  - scene_id: ep017_s02b
    author_text: >
      Марко не зрушить з місця, поки не зрозуміє, куди йде.
    dialogue:
      - who: Марко
        line: "Куди?"
      - who: "Подпольщица"
        line: "Туди, де про Голос знають більше за тебе."
      - who: Марко
        line: "Звідки ви знаєте, що він мені потрібен?"
      - who: "Подпольщица"
        line: "Ти стоїш між двох його плакатів. Здогадалася."
    author_text_after: >
      Вона розвертається. Марко йде слідом. Розвідник перевіряє —
      навіть провідника.
    mood: "перша перевірка — ще до підвалу"

  # ── s03 ─────────────────────────────────────────────────────────────
  - scene_id: ep017_s03
    author_text: >
      Підвал. Сходи вниз. Двері без ручки — штовхнути плечем. За
      дверима — кімната. Низька стеля. Тьмяне світло. На стінах —
      записки, схеми, стрілки. Почерки різні.

      Двадцять — тридцять людей. Числа в усіх маленькі.
      П'ятнадцять, дев'ять, двадцять два. Люди, яких Голос майже
      дожував.

      Підпілля.

      Жінка з числом дванадцять сідає на ящик. Решта мовчить.
      Дивляться на Марка. На його число. На Софу.
    mood: "вперше — інші, не Голос"

  # ── s04 ─────────────────────────────────────────────────────────────
  - scene_id: ep017_s04
    dialogue:
      - who: "Подпольщица"
        line: "Голос був учителем. Звичайним учителем. Потім захотів більшого."
      - who: Марко
        line: "Звідки ви знаєте?"
    mood: "тиха впевненість підпілля — і перше запитання розвідника"

  # ── s05 ─────────────────────────────────────────────────────────────
  - scene_id: ep017_s05
    author_text: >
      Жінка киває на чоловіка в кутку: «Він сказав.» Чоловік киває на
      жінку біля стіни: «Вона розповіла.» Та — на хлопця біля дверей:
      «Мені передали.»

      Марко рахує. Один, два, три, чотири...

      Сім ланок. Сім переказів. До останньої ланки історія звучить
      так: «Голос був великим магом, який створив Місто силою думки
      і керує часом.»

      Учитель став великим магом за сім переказів. Кожна ланка
      додала шматочок — трохи перебільшення, дрібку домислу,
      краплю страху. Сім крапель — і склянка переповнилась.

      Зіпсований телефон. На живих людях. Шепіт на вході — крик на
      виході.
    mood: "наочний зіпсований телефон на живих людях"

  # ── s06 ─────────────────────────────────────────────────────────────
  - scene_id: ep017_s06
    author_text: >
      Підпілля говорить упевнено. Вони ПРОТИ Голосу — хочеться вірити.
      Але «на моєму боці» не дорівнює «говорить правду». Розвідник
      перевіряє всіх.

      Головне запитання розвідника: ЗВІДКИ ТИ ЦЕ ЗНАЄШ?

      Два типи відповіді. СВОЇМИ ОЧИМА — сам бачив, сам виміряв, сам
      зробив. Очевидець. Документ. Експеримент. Ти був там.

      ПОЧУВ ВІД ІНШИХ — переказ. «Мені друг сказав.» «В інтернеті
      написали.» «У новинах показали.» Кожен переказ може
      додати помилку.

      Підпілля — «почув від інших». Сім ланок. Жоден з них не
      бачив Голосу-вчителя своїми очима.

      Почув — не означає брехня. Але треба перевіряти.
    mood: "теорія лягає поверх щойно побаченого"

  # ── s07 ─────────────────────────────────────────────────────────────
  - scene_id: ep017_s07
    question: "Жінка підпілля каже: «Голос був учителем — мені розповів Сергій, який чув від Марини.» Своїми очима чи почув від інших?"
    options:
      - id: seen
        text: "Своїми очима"
      - id: heard
        text: "Почув від інших"
    correct_logic: "Ланцюжок: Марина → Сергій → жінка. Жоден не бачив сам. Кожна ланка — переказ."
    feedback_success: "Ланцюжок: Марина → Сергій → жінка. Жоден не бачив сам. Кожна ланка — переказ."
    feedback_soft_fail: "Хто з них стояв поряд із Голосом-учителем? Якщо жоден — це «почув від інших»."
    mood: "перший квіз — саме той випадок, який щойно бачили"

  # ── s08 ─────────────────────────────────────────────────────────────
  - scene_id: ep017_s08
    question: "«Я сам бачив, як кіт спіймав мишку!» Своїми очима чи почув від інших?"
    options:
      - id: seen
        text: "Своїми очима"
      - id: heard
        text: "Почув від інших"
    correct_logic: "Очевидець. Був на місці. Бачив сам."
    feedback_success: "Очевидець. Був на місці. Бачив сам."
    feedback_soft_fail: "«Я сам бачив» — це хто? Ти сам. Це і є «своїми очима»."
    mood: "зрозумілий випадок — для противаги"

  # ── s09 ─────────────────────────────────────────────────────────────
  - scene_id: ep017_s09
    question: "«Мені бабуся розповіла, що раніше тут був ліс.» Своїми очима чи почув від інших?"
    options:
      - id: seen
        text: "Своїми очима"
      - id: heard
        text: "Почув від інших"
    correct_logic: "Бабуся — переказувач. Для тебе це все одно переказ."
    feedback_success: "Бабуся — переказувач. Для тебе це все одно переказ."
    feedback_soft_fail: "Бабуся могла бачити ліс сама. А ти — бачив? Якщо ні — це «почув»."
    mood: "пастка: близький родич — все одно переказувач"

  # ── s10 ─────────────────────────────────────────────────────────────
  - scene_id: ep017_s10
    question: "«Мені друг сказав, що завтра не буде уроків.» Своїми очима чи почув від інших?"
    options:
      - id: seen
        text: "Своїми очима"
      - id: heard
        text: "Почув від інших"
    correct_logic: "Друг сказав — а звідки ВІН знає? Може, теж від когось. Ланцюжок!"
    feedback_success: "Друг сказав — а звідки ВІН знає? Може, теж від когось. Ланцюжок!"
    feedback_soft_fail: "Друг сам читав наказ директора? Чи теж чув? Якщо теж чув — ланцюжок довший, ніж здається."
    mood: "знайома ситуація зі школи"

  # ── s11 ─────────────────────────────────────────────────────────────
  - scene_id: ep017_s11
    question: "«Ось мій щоденник з оцінками — дивись сам.» Своїми очима чи почув від інших?"
    options:
      - id: seen
        text: "Своїми очима"
      - id: heard
        text: "Почув від інших"
    correct_logic: "Щоденник — документ. Можна відкрити, подивитись, торкнутись."
    feedback_success: "Щоденник — документ. Можна відкрити, подивитись, торкнутись."
    feedback_soft_fail: "Якщо тобі його простягли в руки — ти перевіряєш сам. Це «своїми очима»."
    mood: "документ = очевидець"

  # ── s12 ─────────────────────────────────────────────────────────────
  - scene_id: ep017_s12
    question: "«У новинах сказали, що завтра буде дощ.» Своїми очима чи почув від інших?"
    options:
      - id: seen
        text: "Своїми очима"
      - id: heard
        text: "Почув від інших"
    correct_logic: "Телевізор — переказ. Ти сам не міряв тиск і не дивився на хмари."
    feedback_success: "Телевізор — переказ. Ти сам не міряв тиск і не дивився на хмари."
    feedback_soft_fail: "Синоптики — очевидці для себе. Але для тебе екран — це переказ їхніх слів."
    mood: "екран — теж переказувач"

  # ── s13 ─────────────────────────────────────────────────────────────
  - scene_id: ep017_s13
    author_text: >
      Навіть «почув від інших» буває різним. Розвідник тримає в кишені
      ТРИ КЛЮЧІ для перевірки джерела.

      Перший: чи розуміється людина на цьому? Кожен експерт — експерт у
      СВОЇЙ темі. Кухар знає про суп, але не про ракети.

      Другий: чи хоче вона щось отримати? Продавець хвалить свій товар —
      у нього вигода.

      Третій: чи можна перевірити? Якщо ні — ліхтарик блимає червоним.

      Другий інструмент — РІВНІ ІНТЕРНЕТУ. Чотири полиці бібліотеки.
      Перша: офіційні сайти — лікарня, школа, музей. Друга:
      новини й енциклопедії. Третя: блоги і соцмережі — як оголошення
      на паркані, повісити може хто завгодно. Четверта: чати й пересилання
      — шепіт у темному коридорі. Чим нижча полиця — тим більше підозр.

      І третій інструмент. ДИПФЕЙК — глибока підробка. ШІ може
      намалювати фото неіснуючої людини, зробити відео, де
      відома людина каже те, чого не казала, написати фальшиву
      статтю. Раніше: «бачу — отже вірю». Тепер: «бачу — але ХТО мені
      це показує? І НАВІЩО?»
    mood: "три інструменти — у кишеню розвідника"

  # ── s14_sofa ────────────────────────────────────────────────────────
  - scene_id: ep017_s14_sofa
    dialogue:
      - who: Софа
        line: "Правило... сімнадцяте."
      - who: Софа
        line: >
          Звідки ти це знаєш? — головне запитання розвідника. Своїми
          очима — надійніше. Почув від інших — перевіряй.
      - who: Софа
        line: "Три ключі: розуміється? хоче отримати? можна перевірити?"
    mood: "правило стає на своє місце"

  # ── s15 ─────────────────────────────────────────────────────────────
  - scene_id: ep017_s15
    author_text: >
      Марко дивиться на записки підпілля на стінах. Десятки тверджень.
      «Голос не спить.» «У Вежі — машина стирання.» «Числа можна
      відновити.» Жодного підпису. Жодного джерела.

      Стіни підпілля — найнижча полиця. Як чат у темному коридорі.
      Шепіт без автора.
    mood: "стіни як чат — без авторів"

  # ── s16 ─────────────────────────────────────────────────────────────
  - scene_id: ep017_s16
    dialogue:
      - who: Марко
        line: "Ви розумієтесь на тому, як працює Голос?"
      - who: "Подпольщица"
        line: "Я живу в Місті три роки. Але Голосу-вчителя сама не бачила."
      - who: Марко
        line: "Ви чогось хочете від мене?"
      - who: "Подпольщица"
        line: "Ми хочемо свободи. І ми чули, що ти — той, на кого чекала Софія."
      - who: Марко
        line: "Чи можна перевірити, що Голос був учителем?"
    author_text_after: >
      Жінка мовчить. Потім дістає з-під ящика папір. Пожовклий.
      Почерк — гострі літери, гачок на «й».

      Софія.
    mood: "три ключі, три відповіді — і папір з-під ящика"

  # ── s16_sofa ────────────────────────────────────────────────────────
  - scene_id: ep017_s16_sofa
    dialogue:
      - who: Софа
        line: "Перевіряємо три ключі."
    mood: "коротка підводка перед квізами"

  # ── s17 ─────────────────────────────────────────────────────────────
  - scene_id: ep017_s17
    question: "Ветеринар каже: «Котам потрібні щеплення щороку.» Можна вірити?"
    options:
      - id: trust
        text: "Можна вірити"
      - id: check
        text: "Краще перевірити"
    correct_logic: "Розуміється — так, ветеринар. Хоче отримати? Немає очевидної вигоди. Чи можна перевірити? Так, в інших ветеринарів. Три ключі — три «так»."
    feedback_success: "Розуміється — так, ветеринар. Хоче отримати? Немає очевидної вигоди. Чи можна перевірити? Так, в інших ветеринарів. Три ключі — три «так»."
    feedback_soft_fail: "Перевір три ключі: розуміється? — так. Хоче продати? — не факт. Можна переперевірити? — так. Скільки червоних ліхтариків?"
    mood: "експерт у своїй темі, без вигоди"

  # ── s18 ─────────────────────────────────────────────────────────────
  - scene_id: ep017_s18
    question: "Продавець у магазині іграшок: «Це найкраща іграшка! Усі купують!» Можна вірити?"
    options:
      - id: trust
        text: "Можна вірити"
      - id: check
        text: "Краще перевірити"
    correct_logic: "Розуміється? У продажах — так, в іграшках — не факт. Хоче отримати? ТАК — хоче продати. Чи можна перевірити? Відгуки, інші магазини. Другий ключ червоний — треба перевіряти."
    feedback_success: "Розуміється? У продажах — так, в іграшках — не факт. Хоче отримати? ТАК — хоче продати. Чи можна перевірити? Відгуки, інші магазини. Другий ключ червоний — треба перевіряти."
    feedback_soft_fail: "Хто хоче продати — той зацікавлений. Другий ключ блимає червоним. Один червоний ключ — уже привід перевірити."
    mood: "класичний конфлікт інтересу"

  # ── s19 ─────────────────────────────────────────────────────────────
  - scene_id: ep017_s19
    question: "Мама каже: «Я бачила райдугу вчора ввечері.» Можна вірити?"
    options:
      - id: trust
        text: "Можна вірити"
      - id: check
        text: "Краще перевірити"
    correct_logic: "Мама — очевидець («своїми очима»). Хоче отримати? Ні. Чи можна перевірити? У сусідів, за зведенням погоди."
    feedback_success: "Мама — очевидець («своїми очима»). Хоче отримати? Ні. Чи можна перевірити? У сусідів, за зведенням погоди."
    feedback_soft_fail: "Райдуга — ні в кого немає вигоди брехати про неї. І мама сама бачила. Скільки червоних ліхтариків?"
    mood: "очевидець без інтересу"

  # ── s20 ─────────────────────────────────────────────────────────────
  - scene_id: ep017_s20
    question: "Сайт міської лікарні публікує графік щеплень. Надійне джерело?"
    options:
      - id: trust
        text: "Надійне"
      - id: untrust
        text: "Ненадійне"
    correct_logic: "Перша полиця: офіційний сайт. Автори — лікарі. Можна перевірити в МОЗ."
    feedback_success: "Перша полиця: офіційний сайт. Автори — лікарі. Можна перевірити в МОЗ."
    feedback_soft_fail: "Це чий сайт? Лікарні. На якій полиці бібліотеки живуть лікарні? На першій."
    mood: "офіційний сайт — перша полиця"

  # ── s21 ─────────────────────────────────────────────────────────────
  - scene_id: ep017_s21
    question: "Популярний блогер пише: «ТЕРМІНОВО! Школу закривають на ремонт!» Надійне?"
    options:
      - id: trust
        text: "Надійне"
      - id: untrust
        text: "Ненадійне"
    correct_logic: "Третя полиця: блог. Блогер — не директор. Звідки інформація?"
    feedback_success: "Третя полиця: блог. Блогер — не директор. Звідки інформація?"
    feedback_soft_fail: "«Терміново» — це крик, а не доказ. Блог — третя полиця, найненадійніша з відкритих."
    mood: "блогер ≠ адміністрація"

  # ── s22 ─────────────────────────────────────────────────────────────
  - scene_id: ep017_s22
    question: "В енциклопедії написано: «Вода замерзає за 0 градусів.» Надійне?"
    options:
      - id: trust
        text: "Надійне"
      - id: untrust
        text: "Ненадійне"
