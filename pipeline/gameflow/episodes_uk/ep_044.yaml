      Ліна мовчить. Не наполягає. Лише дивиться на три самотні
      точки. Вони — поки нічого не означають.

      За хвилину Марко видихає. Три точки — це не карта. Це
      відмова.

      Якщо він зараз піде — Голос так і залишиться без діагнозу. І
      Марко так і залишиться в чужому плані. Не знаючи, що це план.

      Піднімає крейду. Повертається до стіни. Малюю далі.
    mood: "відмова від карти = відмова від діагнозу. Повертається"

