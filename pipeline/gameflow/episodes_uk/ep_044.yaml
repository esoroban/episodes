      проти будь-якого прийому.

      «Це демагогія. Де факти?»

      Чому це працює? Демагог чекає емоцій. Страху. Злості.
      Згоди. Суперечки. Будь-яка емоція — пальне для наступного
      прийому. Однак «де факти?» — не емоція. Це вимога доказів.
      Демагог до цього не готовий, адже фактів немає — інакше
      він навів би їх одразу.

      ФОРМУЛА З ДВОХ КРОКІВ:

      КРОК 1 — Назви прийом. Одне слово: «Це демагогія».

      КРОК 2 — Запитай: де факти?

      Не потрібно вгадувати конкретний тип — узагальнення, напад,
      дилема, ланцюжок. Достатньо одного діагнозу: демагогія. І
      одного питання: де факти?

      Мовчання після такої відповіді — твій союзник. Якщо демагог
      намагається «але...», «однак...», «зате...» — повторюй: «Де
      факти?» Без емоцій. Без виправдань. Одне питання.
    mood: "карта інструмента — два кроки"

