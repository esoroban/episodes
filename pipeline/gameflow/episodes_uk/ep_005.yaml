        feedback_success: "Перевірюване! Інструмент — лічба. Просто порахуй."
        feedback_soft_fail: "Можна перерахувати повідомлення? Є інструмент?"
      - question: "«Голос у гучномовці заспокоює краще за всі голоси у світі.» Перевірюване, думка чи хитре твердження?"
        options:
          - {id: checkable, text: "Перевірюване"}
          - {id: opinion, text: "Думка"}
          - {id: tricky, text: "Хитре твердження"}
        correct_logic: "«Краще за всіх» — суб'єктивно, немає приладу."
        feedback_success: "Думка! «Краще за всіх» — суб'єктивно. Немає приладу."
        feedback_soft_fail: "Є «заспокоюмір»? Нема? Тоді що?"
      - question: "«Голос говорить правду, але тільки якщо йому не ставити запитань.» Перевірюване, думка чи хитре твердження?"
        options:
          - {id: checkable, text: "Перевірюване"}
