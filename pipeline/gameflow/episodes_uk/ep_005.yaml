  # ── s05 ─────────────────────────────────────────────────────
    dialogue_after:
      - who: Софа
        line: Дев'ять із дев'яти. Все пам'ятаєш. Три слова, п'ять інструментів, три запитання детектива. Тепер — далі. Новий урок.
  - scene_id: ep005_s05
    author_text: >
      Ліна зупиняється біля вузьких сходів, що ведуть донизу. Сходинки кам'яні, стерті. З підвалу тягне пилом і чимось солодкуватим — як старий папір.
    dialogue:
      - who: Лина
        line: "Тут. Він тебе чекає."
      - who: Марко
        line: "Хто?"
      - who: Лина
        line: "Побачиш."
    author_text_after: >
      Вони спускаються. Довгий коридор, низька стеля. Полиці до стелі — але книги без обкладинок, без назв. Просто папір. Хтось здер усі обкладинки.

      За столом — старий. Сива борода, зім'ятий светр, чашка чаю в руках. Усміхається Марку — справжньо, з зморшками навколо очей.
    mood: "оманна теплота"

  # ── s06 ─────────────────────────────────────────────────────
  - scene_id: ep005_s06
    dialogue:
      - who: Леон
        line: "О, гості! Давно не було гостей. Чаю будеш?"
      - who: автор
        line: >
          Професор Леон. Марко розслабляється миттєво. Леон нагадує діда — того, що жив на дачі й варив компот. Говорить м'яко. Не сперечається. Не тисне. Саме такій людині Марко вірить без перевірки.
      - who: автор
        line: >
          Софа вібрує — ледь помітно. Марко не дістає телефон. Не хоче. Тут тепло. Тут безпечно.
      - who: автор
        line: >
          Леон наливає чай, і Марко бере чашку обома руками — як удома. Але чай пахне незнайомо. Гіркуватий, із присмаком заліза. Дрібниця. Марко відмахується.
    author_text_after: "Софа вібрує знову. Марко дивиться на екран."
    mood: "тепло з першою тріщиною"

  # ── s06_sofa ─────────────────────────────────────────────────
  - scene_id: ep005_s06_sofa
    dialogue:
