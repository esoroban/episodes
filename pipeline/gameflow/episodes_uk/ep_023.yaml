  # ── s01 ─────────────────────────────────────────────────────
  - scene_id: ep023_s01
    author_text: >
      Вулиця за площею. Марко веде Макса в підпілля. Швидко. Тихо.

      Не встигають.

      Троє агентів. Сірий одяг. Числа високі — 80, 85, 90. Лояльні.
      Слухняні. Очі — ясні, але порожні. Наче вітрини.

      Макс стає між ними і Марком. Кулаки стиснуті.

      Агенти не б'ються. Говорять.
    mood: "агенти йдуть до Марка — Макс став щитом"

  # ── s02 ─────────────────────────────────────────────────────
  - scene_id: ep023_s02
    dialogue:
      - who: Агент 1
        line: "Макс ЗАВЖДИ кидав друзів. Спитай будь-кого."
      - who: Агент 2
        line: "НІХТО не вірить Максу. Навіть його власний брат."
      - who: Агент 3
        line: "УСІ знають, що Макс — боягуз. УСІ до одного."
    author_text_after: >
      Марко чує «УСІ знають» — і на секунду вірить. Бо «усі»
      звучить переконливо. Особливо коли троє людей говорять це
      одночасно.
    mood: "три прапори за хвилину"
    question: "Що робить Марко?"
    options:
      - id: hold
        text: "Стриматися. Запам'ятати кожне слово"
      - id: forward
        text: "Ступити вперед, до агентів"

  # ── s02b ─────────────────────────────────────────────────────
  - scene_id: ep023_s02b
    author_text: >
      Марко робить крок уперед. Горло палає. Хочеться крикнути «неправда».

      Макс — не обертаючись — підіймає руку. Долоня відкрита. Назад.

      «Не зараз, Марку. Їм слова потрібні, не кулаки.»

      Марко зупиняється. Руку стискає в кулак. Потім розтискає. Не
      кулаки. Слова. Слова лікують і слова стирають. Він повертається на
      крок.
    mood: "порив — і м'яка зупинка від друга"

  # ── s03 ─────────────────────────────────────────────────────
  - scene_id: ep023_s03
    author_text: >
      З кожною фразою — обличчя Макса меркне. Не тільки око — РИСИ.
      Лівий бік давно блідий, правий уже блідне так само. Тепер
      контур підборіддя пливе. Не артефакти. Не дзеркала. Слова.
      Слова стирають.

      Макс нічого не відповідає. Стоїть. Слухає. Кожне «ЗАВЖДИ» — як
      удар по плечу. Кожне «НІХТО» — як мішок на голову. Кожне
      «УСІ» — як бетон на ноги.

      Три фрази. Три пастки. Одного винятку... досить.
    mood: "стирання словами — уперше наживо, губляться риси обличчя"

  # ── s04 ─────────────────────────────────────────────────────
  - scene_id: ep023_s04
    author_text: >
      Чотири червоні прапори в словах: УСІ, НІХТО, ЗАВЖДИ, НІКОЛИ.
      Коли чуєш ці слова — вмикай підозру. Майже завжди —
      перебільшення.

      «УСІ в класі мають новий телефон!» — перевіряєш: двоє з
      тридцяти. «НІХТО не любить броколі!» — Маша і Оленка люблять.
      УЗАГАЛЬНЕННЯ розсипається.

      Одного винятку досить. ОДНОГО. Захист — питання «Хто
      саме?» або «Справді всі? Назви приклади.»

      Але іноді узагальнення правильне: «Усі люди дихають повітрям» — правда.
      «Місяць один» — правда. Перевіряємо щоразу.
    mood: "чотири слова-пастки — тепер упізнані"

