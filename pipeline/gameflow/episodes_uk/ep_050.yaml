scenes:

  # ── s01 ─────────────────────────────────────────────────────
  - scene_id: ep050_s01
    author_text: >
      Голос — усюди. Динаміки в класах. Екрани в холі. Телефони
      однокласників. Він говорить м'яко, спокійно, як шкільний
      психолог. Слова — правильні. Тон — теплий.

      Однокласники кивають. Віра усміхається біля дошки. Данило
      дивиться у стіл. Макс — на двері.

      Марко сидить за партою. Софія — за сусідньою. Та сама, що
      завжди була порожньою, поки її не було. Тепер — зайнята. Очі
      ясні. Голос її не дістає: уже один раз стирав, удруге — не
      чіпляється.

      Софа в кишені Марка — чорний екран. Мовчить із учора. Ні
      підказки, ні повідомлення. Та Софія поруч — і цього досить.

      Не сам.
    mood: "Голос захопив школу — та Софія за сусідньою партою не здалася"

  # ── s02 ─────────────────────────────────────────────────────
  - scene_id: ep050_s02
    dialogue:
      - who: Голос
        line: "Марко. Ти втомився."
      - who: Голос
        line: "Це нормально. Відпочинь. Перестань боротися."
      - who: Голос
        line: "Маленький хлопчик без своєї іграшки. Що ти можеш?"
    author_text_after: >
      Тон — батьківський. Теплий. Без загрози. Найнебезпечніша
      зброя Голосу — м'якість.

      Марко дивиться на новеньку за партою біля вікна. На її
      зап'ясті — тонка сіра нитка. Та, що з'явилася вчора. Вона
      пам'ятає свого брата. Більше ніхто не пам'ятає.

      Зараз Голос працює в її голові теж. М'яко. Тепло. «Забудь.»
    mood: "Голос грає в турботу — новенька в небезпеці теж"

  # ── s04 ─────────────────────────────────────────────────────
  - scene_id: ep050_s04
    author_text: >
      Марко встає. Стілець скрипить. Клас обертається. Усі —
      одночасно. Тільки новенька — ні: вона дивиться на свою сіру
      нитку.

      Марко бере крейду. Робить крок до дошки. Дошка — порожня. На
      ній — місце для восьми імен.
    dialogue:
      - who: Марко
        line: "Я не втомився. І я не перестану."
      - who: Голос
        line: "Маленький хлопчик без своєї іграшки. Що ти можеш?"
      - who: Марко
        line: "Можу."
    mood: "виклик прийнятий — Марко виходить до дошки сам"

  # ── s05 ─────────────────────────────────────────────────────
  - scene_id: ep050_s05
    author_text: >
      Голос атакує. Один прийом — один удар.

      «Якщо діти не будуть мене слухати — виростуть дурними, без
      роботи, без грошей, у злиднях, у нещасті!»
      Марко пише: СТРАШНИЙ ЛАНЦЮЖОК. Довга драбина, кожна ланка
      слабша. Динамік ліворуч — клац, тиша.

      «Або ви зі мною, або проти освіти!»
      Марко: ХИБНА ДИЛЕМА. Два варіанти замість багатьох. Динамік
      праворуч — клац.

      «Марко — дитина! Що він розуміє?»
      Марко: НАПАД НА ЛЮДИНУ. Удар по людині, не по аргументу.
      Третій динамік гасне.

      «Марко хоче ЗНИЩИТИ освіту!»
      Марко: ОПУДАЛО. Я не казав «знищити». Я сказав «не
      підкоряти». Четвертий.

      «Великі вчені всіх країн підтримують!»
      Марко: ХИБНИЙ АВТОРИТЕТ. Які вчені? Де роботи? П'ятий.

      «Свобода = хаос = руйнація!»
      Марко: ПІДМІНА ПОНЯТЬ. Свобода і хаос — різні слова. Шостий.

      «Скажи всім — давно ти збиваєш однокласників з пантелику?»
      Марко: ПИТАННЯ-ПАСТКА. Усередині сховане «ти винен». Я не
      збиваю. Сьомий.

      «Я не кажу, що діти дурні... але подивіться!»
      Марко: «Я НЕ КАЖУ, ЩО...». Після «але» — найголовніше.
      Восьмий.

      Дошка повна. Вісім імен у стовпчик. Крейда сточилася до
      недогризка. Усі вісім динаміків мовчать.

      У міру того як кожне ім'я лягало на дошку — один з
      однокласників піднімав голову. Прокидався. Олена — на
      «нападі». Артем — на «опудалі». Даша — на «підміні». До
      восьмого імені половина класу вже дивиться ясними очима.

      Софія весь цей час — за сусідньою партою. Стиснула кулаки.
      Дивиться, як брат рубає прийоми за іменами. Один раз
      підняла руку — ніби хотіла встати і підійти. Не встала.
      Чекає. Її хід ще попереду.

      Віра біля дошки — робить крок назад. Один. Другий. Сліпо
      дивиться на крейду у своїй руці. Шепоче: «Діти...» Не
      договорює.
    mood: "битва — 8 імен на дошці, клас прокидається, крейда кришиться"

  # ── s06 ─────────────────────────────────────────────────────
  - scene_id: ep050_s06
    author_text: >
      Голос — останній удар. Не через динамік. Тихо. Особисто.
      Тільки для Марка.

      Динаміки мовчать. Дошка повна. Клас наполовину прокинувся.
      Крейда в руці Марка — майже стерта. Коліна слабкі.

      Голос — майже лагідний. Як стомлений батько.
    dialogue:
      - who: Голос
        line: "Ти переміг тут. Я йду. Та дай мені одне. Маленьке."
      - who: Голос
        line: "Коли я прийду в інше місто — дозволь сказати: «Я був у Марка. Марко погоджується». Одне слово. Твоє ім'я."
      - who: Голос
        line: "Діти тобі вірять. З твоїм ім'ям — мені буде легше там. Ніхто тут не постраждає. Просто скажи «так»."
    author_text_after: >
      Гачок — найхитріший. Не загроза. І не про це місто. Про
      інші.

      Марко стоїть. Слухає. У голові на секунду проноситься: «Так.
      Іди. Тільки йди.» Коліна слабкі. Крейда ось-ось випаде.

      Дошка у нього за спиною. На ній — вісім імен прийомів. І
      п'яте згори, яким він щойно рубав Голос: ХИБНИЙ АВТОРИТЕТ.

      І тут — крок від парти. Тихий. Данило. Раніше — той самий,
      хто сказав «тобі наснилося». Зараз — перший поруч.
      Підходить, зупиняється біля дошки поряд із Марком, показує
      пальцем на п'яте ім'я.

      Тихо, щоб тільки Марко чув.
    mood: "шантаж через хибний авторитет — Данило сам підходить, показує прийом"

  # ── s06b ────────────────────────────────────────────────────
  - scene_id: ep050_s06b
    dialogue:
      - who: Данила
        line: "Це п'яте. Хибний авторитет."
      - who: Данила
        line: "Він щойно просив твоє ім'я. Щоб в інших містах казати «Марко погоджується». Без тебе. З твоїм ім'ям."
      - who: Данила
        line: "Це саме те, що ти щойно розібрав. Не давай."
    author_text_after: >
      Марко дивиться на дошку. На п'яте ім'я. Крейда в його руці
      перестає тремтіти.

      Раніше Данило в перший день сказав «тобі наснилося». Тоді
      Марко був сам. Зараз Данило перший — біля дошки, з пальцем
      на п'ятому рядку. І з ділом.

      Голос ще чекає відповіді. Та Марко вже бачить прийом на ім'я.
      Коли бачиш на ім'я — прийом не працює.
    mood: "прийом упізнаний, Марко збирається з силами"

  # ── s07 ─────────────────────────────────────────────────────
  - scene_id: ep050_s07
    author_text: >
      Марко мовчить. Шантаж висить у повітрі. Одне «так» — і світ.

      Софія встає перша. Із усіх — перша. Вона чекала цієї миті з
      битви. Підходить до брата біля дошки, кладе долоню йому на
      плече. Мовчки. Тільки потім — слова.

      Данило встає слідом. Той, хто в перший день сказав
      «наснилося». Тепер — поруч.

      Макс — біля дверей. Підійшов з глибини класу. Очі карі,
      справжні.

      Рей — у дверному проході. Зайшов у школу зранку у справі,
      залишився, коли почув. Стоїть, спершись плечем об одвірок.
      Папка під пахвою забута.

      Новенька — встала біля своєї парти. Сіра нитка на зап'ясті
      видна. Голос у неї тонкий, але вже не здригнеться.

      П'ятеро поруч. Кожен — зі своїм словом.
    dialogue:
      - who: София
        line: "Братику. Він краде ім'я, щоб в інших школах казати «Марко погоджується». Це хибний авторитет — п'яте слово на дошці."
      - who: София
        line: "Якщо віддаси ім'я — він працюватиме в інших містах твоїм голосом. Під твоїм обличчям."
      - who: Данила
        line: "Скажи: «Давай поговоримо про це завтра, коли обидва охолонемо.» Не зараз. Не сьогодні."
      - who: Макс
        line: "Або просто: «Мені треба подумати.» Не «так», не «ні». Подумати."
      - who: новенькая
        line: "Мій брат казав: «У нас різні думки. І це нормально.» Скажи так. Ім'я — твоє."
      - who: Рей
        line: "Я знаю з іншого боку. Зі сцени. Коли вони просять «одне слово» — отже, у цьому слові і є вся їхня сила. Не давай."
      - who: София
        line: "Ім'я не продають. Проженемо його — паузою."
    author_text_after: >
      П'ять голосів. З п'яти ротів. Не з чату, не з екрана. З
      живих людей.

      Марко слухає. Долоня Софії — в нього на плечі. Клас —
      наполовину вже не спить — теж слухає. Голос мовчить. Уперше
      за весь день — він не знає, що сказати.
    mood: "п'ятеро дають опору — ім'я не продають, проженемо Голос паузою"

  # ── s08 ─────────────────────────────────────────────────────
  - scene_id: ep050_s08
    author_text: >
      Марко повертається до динаміка — останнього, що ще тліє.
    dialogue:
      - who: Марко
        line: "Мені треба подумати."
      - who: Голос
        line: "Думати? Про що?! Ім'я чи гордість?!"
      - who: Марко
        line: "Це хибна дилема. Ім'я — не торг і не гордість. Ім'я — це я."
      - who: Голос
        line: "Ти... не можеш..."
      - who: Марко
        line: "Можу. У нас різні думки. І це нормально. Ім'я я тобі не дам."
    mood: "фраза-рятівник + відмова віддати ім'я — Голос позбавлений останнього"

  # ── s09 ─────────────────────────────────────────────────────
  - scene_id: ep050_s09
    author_text: >
      Тиша. Довга. Клас не дихає.

      А потім — клас прокидається. Повністю. Олена кліпає, опускає
      голову, піднімає. Артем дивиться на свої руки, не пам'ятає,
      навіщо піднімав їх до динаміка. Даша обертається на Марка,
      впізнаючи.

      Віра біля дошки — робить ще крок назад. Опускає викришену
      крейду. Тихо: «Діти. Що я казала сьогодні?» Не отримує
      відповіді. Опускає руки.

      Останній динамік — мерехтить. Раз. Два. Гасне.

      Голос — ледь чутно. Не з динаміка. З повітря. Луна.
    dialogue:
      - who: Голос
        line: "Слова — твої. Добре. Запам'ятай."
      - who: Голос
        line: "Я знайду інший спосіб. Я зроблю ваше життя небезпечним."
      - who: Голос
        line: "Не сьогодні. Скоро."
    author_text_after: >
      І — тиша.

      Голос відступив. Не загинув. Не зник. Іде. В інше місто. До
      наступної дитини. Він готує інше — не слова, а небезпеку.

      Але сьогодні — він тут не потрібен. Сьогодні тут — Марко.
      Софія. Данило. Макс. Рей. Новенька. І клас, який нарешті
      розплющив очі.
    mood: "Голос відступає — клас прокидається, Віра приходить до тями, загроза на майбутнє"

  # ── s10 ─────────────────────────────────────────────────────
  - scene_id: ep050_s10
    author_text: >
      Софа в кишені Марка — вібрує. Один раз. Марко дістає. Екран
      загорається. Яскраво. Блакитний. Чистий. І голос — інший.

      Це Софія. Сестра. Та, що вдома.

      Через вимкнений телефон. Через зламану нитку.
    dialogue:
      - who: София
        line: "Братику."
      - who: София
        line: "Ти пройшов."
      - who: София
        line: "Тепер твоя черга. Учитель — той, хто знає, які запитання поставити."
    mood: "Софія через Софу — передача естафети"

  # ── s11 ─────────────────────────────────────────────────────
  - scene_id: ep050_s11
    author_text: >
      Марко ховає телефон у кишеню. Софа гасне — повільно, тепло,
      як лампа на ніч.

      Клас тихий. Хтось ще кліпає. Хтось опускає руки.

      Новенька встає. Робить крок до Марка. Сіра нитка на її
      зап'ясті — ледь помітна, але вона тримає її рукою, ніби
      перевіряє.
    dialogue:
      - who: новенькая
        line: "А як же інші? Ті, кому ніхто не допоміг?"
      - who: новенькая
        line: "У мене в старій школі — Олена і Віка посварилися через проєкт. Костя і Артем билися за капітанство. Даша плакала через стрижку. Тимур не мив посуд, мама кричала. Михайло розбив телефон Єгора, дружба розпалася."
      - who: новенькая
        line: "Що робити їм?"
    mood: "новенька відчиняє двері до практики — іншим теж потрібно"

  # ── s12 ─────────────────────────────────────────────────────
  - scene_id: ep050_s12
    author_text: >
      Марко дивиться на новеньку. На клас. Підходить до дошки.
      Стирає «ПАУЗА» — звільняє місце.

      Бере недогризок крейди і пише поруч із вісьмома іменами:

      ОЛЕНА І ВІКА. Ділите проєкт — діліть завдання.
      Я-висловлювання: «Мені важливо малювати, бо я краще виражаю
      ідеї. Давай розділимо: я малюю, ти пишеш, потім об'єднаємо.»

      КОСТЯ І АРТЕМ. Кричать за капітанство. Спершу пауза. Потім
      про почуття: «Мені прикро, коли ти кричиш.» Потім назад до
      теми: «Зіграємо на вибування чи обере команда?»

      ДАША І СМІХ. Крик «ви тупі» — це сварка. Краще: «Мені
      боляче, коли сміються над моєю зовнішністю. Я обрала
      стрижку, яка мені подобається. У нас різні смаки — це
      нормально.»

      ТИМУР І ПОСУД. «ТИ ніколи!» від обох — звинувачення. Заміни
      на «МЕНІ коли». Мама: «Мені важко, коли я мию посуд сама.»
      Тимур: «Мені прикро, коли мою допомогу не помічають.»

      МИХАЙЛО І ЄГОР. Дружба після розбитого телефону. Єгор:
      Я-висловлювання. Михайло: визнання + рішення. «Мені дуже
      прикро. — Мені шкода. Я не навмисно. Давай подумаємо, як
      полагодити.»

      Клас пише в зошитах. Хтось швидко. Хтось повільно. Та
      всі пишуть.

      Новенька стоїть біля своєї парти. Киває після кожної
      ситуації.
    mood: "Марко вчить увесь клас — без квізів, через приклади"

  # ── s13 ─────────────────────────────────────────────────────
  - scene_id: ep050_s13
    author_text: >
      Дзвоник на перерву не дзвенить. Ніхто не виходить. Клас
      сидить. Це — інша тиша. Не страх. Увага.

      Софія весь цей час — поруч із Марком. З битви не відходила.
      Зараз сіла за свою парту, сусідню. З Марком плече до плеча
      — як і має бути.

      Данило — за сусідню парту з іншого боку. Той, хто в перший
      день сказав «наснилося».

      Макс — за наступну. Очі карі, справжні.

      Рей робить крок від дверей. Підходить до парти Марка,
      спирається рукою на її край. Стоїть поруч. Не виступає. Не
      сперечається. Слухає.

      Новенька — біля своєї парти. Не підходить. Та дивиться на
      Марка. І вперше за ранок — очей не відводить.

      П'ятеро поруч. І дівчинка навпроти.
    mood: "коло зібралося — без ворога, без сцени, просто поруч"

  # ── s14 ─────────────────────────────────────────────────────
  - scene_id: ep050_s14
    author_text: >
      Марко дивиться на новеньку. Робить паузу. Ту саму.

      Софія поруч за сусідньою партою. Мовчки кладе долоню на
      руку Марка. Не втручається. Просто — тут. На випадок.
    dialogue:
      - who: Марко
        line: "Іди сюди. Сідай поруч."
      - who: Марко
        line: "Я розкажу тобі дещо про факти і думки. Та я не знаю всіх відповідей."
      - who: Марко
        line: "І це нормально."
      - who: Марко
        line: "Ти хочеш, щоб тобі дали відповідь? Чи щоб тебе навчили шукати?"
      - who: София
        line: "А я розкажу, як триматися, якщо Голос прийде. Він ще прийде. Не зараз — але прийде."
    author_text_after: >
      Дівчинка дивиться. Уперше за ранок — не відводить очей.
      Робить перший крок до парти Марка. Потім другий. Сідає
      навпроти.

      Сіра нитка на її зап'ясті — на місці.

      Двоє тепер поруч — Марко і Софія. І новенька навпроти.
      Учитель — не один. Учителів двоє.
    mood: "передача — Марко стає тим, хто ставить запитання"

  # ── s15 ─────────────────────────────────────────────────────
  - scene_id: ep050_s15
    author_text: >
      На стіні — крейдою, хтось написав:

      1

      Однокласники не бачать. Марко бачить. Софія бачить.
      Дівчинка бачить. Данило бачить. Макс — не бачить, але
      відчуває: мурашки.

      Софа в кишені блимає востаннє. Екран — блакитний. Теплий.
      Голос — механічний. Чужий. Програма.

      «Нового користувача виявлено. Починаю підготовку.»

      Софа гасне. Не ламається. Просто — все сказано.

      Тиша.

      У тиші — далекий звук. Як тріск старого телефона. Та не
      цього. Іншого. Десь в іншому місті. Десь — динамік клацає.
      Десь — Голос готує інше. Не слова. Небезпеку.

      «Я зроблю ваше життя небезпечним. Не сьогодні. Скоро.» —
      луна його останніх слів ще тримається в повітрі.

      Та не сьогодні. Не тут.

      Марко кладе руку на стіл. Софія — за сусідньою партою,
      поруч. Данило, Макс, Рей — колом. Навпроти — дівчинка з
      сірою ниткою. Дошка у них за спиною — вісім імен прийомів,
      п'ять ситуацій для інших, слово «ПАУЗА» внизу.

      Він не знає, чим усе закінчиться. І вперше — це не
      слабкість.

      Уперше — сила.

      ──────────────────────

      КІНЕЦЬ ПЕРШОГО СЕЗОНУ.

      Голос повалений — та не знищений. Десь блимає екран. Десь
      клацає динамік. Історія триває — в іншому місті. В іншому
      сезоні. Не слова. Небезпека.

      Та тепер є ті, хто знає. І це — початок.
    mood: "кінець сезону — хепі-енд, загроза на наступний сезон"
