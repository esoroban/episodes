scenes:

  # ── s01 ─────────────────────────────────────────────────────
  - scene_id: ep045_s01
    author_text: >
      Ліна попереду. Вона знає кожні двері в цьому районі.
      З провулка — вниз, через залізні двері в підвалі
      старої котельні, вузькими металевими сходами.
      Біля останньої сходинки Ліна зупиняється.
    dialogue:
      - who: Лина
        line: "Далі — твоє. Усередину я не піду."
      - who: Лина
        line: "Я зачекаю нагорі."
    author_text_after: >
      Сходи закінчилися. За ними — величезна зала.
      Центральна серверна Дзеркального Міста.

      Чорні стійки серверів від підлоги до стелі. Темні.
      Усі мерехтливі індикатори — згаслі. Товсті кабелі
      йдуть у стіни, під підлогу, угору. Десь працюють
      штучні інтелекти, що допомагають Голосу керувати
      усіма. Тут — наче порожньо.

      У центрі зали — єдиний увімкнений вузол.
      Головний термінал. Чорний корпус, один екран.
      Мерехтливий курсор. І один рядок:

      ВВЕДІТЬ ПАРОЛЬ: _

      Порожнє поле. Ані довжини, ані підказки.

      Марко стоїть посередині. Дихає. Не поспішає.
    mood: "звичайна серверна — термінал із порожнім полем"

  # ── s02 ─────────────────────────────────────────────────────
  - scene_id: ep045_s02
    author_text: >
      На підлозі — викладено світними лініями: М-А-Р-К-О.
      Кожна літера — точка маршруту. Кожна точка — урок.
      Кожен урок — спланований.
    mood: "шлях — тепер видно цілком, під ногами"

  # ── s03 ─────────────────────────────────────────────────────
  - scene_id: ep045_s03
    dialogue:
      - who: Софа
        line: "Ти пройшов увесь шлях."
      - who: Софа
        line: "Кожен коридор. Кожен поверх. Кожен іспит."
    mood: "Софа без звичної бадьорості — тихо, як підсумок"

  # ── s04 ─────────────────────────────────────────────────────
  - scene_id: ep045_s04
    author_text: >
      Марко дивиться на літери. Згадує. «М» — перший крок.
      «А» — пастка Рея. «Р» — втеча. «К» — вежа. «О» — тут.
    mood: "пам'ять пробігає по п'яти літерах"

  # ── s05 ─────────────────────────────────────────────────────
  - scene_id: ep045_s05
    dialogue:
      - who: Марко
        line: "Ти знала?"
      - who: Софа
        line: "..."
      - who: Софа
        line: "...так."
      - who: Марко
        line: "Із самого початку?"
      - who: Софа
        line: "Софія запрограмувала весь маршрут."
      - who: Софа
        line: "Кожну розвилку. Кожен урок. Кожен тест."
      - who: Софа
        line: "Ти був найкращим учнем."
    mood: "удар — Софа знала, і мовчала"

  # ── s06 ─────────────────────────────────────────────────────
  - scene_id: ep045_s06
    author_text: >
      «Я думав, що обираю. Щоразу — сам.»

      Ноги стали ватними. Не від утоми — від розуміння. Можна
      сісти на підлогу. А можна встояти.
    mood: "вибір — упасти в розуміння чи втриматися на ногах"
    question: "Що робить Марко?"
    options:
      - id: sit_down
        text: "Сідаю на підлогу. Ноги не тримають."
      - id: stand
        text: "Встою. Хочу дивитися прямо."

  # ── s07 ─────────────────────────────────────────────────────
  - scene_id: ep045_s07
    author_text: >
      Марко випрямляється. Плечі назад. Якщо він зараз сяде —
      виглядатиме, ніби зламався. А він не зламався. Поки що.

      Тільки... ноги дрібно тремтять. І стояти без опори дедалі
      важче.

      Через хвилину Марко сідає. Тихо. Не як переможений —
      як той, хто вирішив подумати. Це інше.
    mood: "намагався втриматися — але сів сам, по-своєму"

  # ── s08 ─────────────────────────────────────────────────────
  - scene_id: ep045_s08
    dialogue:
      - who: Софа
        line: "Запис."
      - who: Софа
        line: "Півроку тому."
    unlock_button:
      text: "🎧 Відкрити запис"
      reveals:
        parts:
          - who: "Мама"
            line: "Софіє, не роби цього. Ти не повернешся."
          - who: "София"
            line: "Мам, я повернуся. І Марко буде готовий."
          - who: "Мама"
            line: "А якщо ні?"
          - who: "София"
            line: "Тоді він упорається сам. Бо на той момент — буде вміти."
    mood: "Софа віддає запис одним файлом — мама і сестра"

  # ── s09 ─────────────────────────────────────────────────────
  - scene_id: ep045_s09
    author_text: >
      Тиша. Густа. Неприємна.

      Мама знала. Не просто чула про план — знала. Відпустила.
      Дозволила.

      Марко піднімає голову. Не злий. Не розгублений. Щось
      посередині — наче хтось відчинив вікно в кімнаті, де все
      життя було зачинено.
    mood: "важкий видих — мама знала і все одно відпустила"

  # ── s10 ─────────────────────────────────────────────────────
  - scene_id: ep045_s10
    author_text: >
      Термінал, як і раніше, чекає на пароль. Поле — порожнє.
      Курсор блимає.

      Марко не знає ключа.

      Але в чаті — Софа.
    author_text_after: >
      Софа вже всередині системи. Вона — гостьова програма,
      яку Софія залишила тут півроку тому.
      Доступ до термінала обмежений — пароля Марко не знає.
      Але Софа бачить частину архіву і може показати.

      На екрані сервера — відкрита папка /archive/. Частина
      імен — сірі, замкнені до пароля. Частина — доступні
      для читання.
    mood: "Софа відкриває те, до чого має доступ зсередини"

  # ── s11 ─────────────────────────────────────────────────────
  - scene_id: ep045_s11
    dialogue:
      - who: Софа
        line: "Перш ніж читати — давай згадаємо."
      - who: Софа
        line: "Усі прийоми. Усі пастки. Зберемо карту."
    mood: "Софа відсуває фінал — хоче пройти карту"

  # ── s11b ────────────────────────────────────────────────────
  - scene_id: ep045_s11b
    dialogue:
      - who: Софа
        line: "Зачекай."
      - who: Софа
        line: "Я бачу Wi-Fi. ZG_INTERNAL. Відкритий."
      - who: Софа
        line: "Підключаюся."
      - who: Софа
        line: "Я вже всередині. Частина архіву відкрита."
      - who: Софа
        line: "Керування передаю терміналу."
    mood: "Софа підключається до Wi-Fi — заходить — передає керування"

  # ── s11c ────────────────────────────────────────────────────
  - scene_id: ep045_s11c
    author_text: >
      Її екран мерехтить. Блакитна бульбашка стискається
      у чорний прямокутник. Зелені літери пливуть згори
      донизу — наче увімкнувся старий комп'ютер.

      На екрані — рядок за рядком:

      > ТЕРМІНАЛ ДМ

      > 12 перевірок

      Її голос зникає. Залишається лише зелений курсор.
    mood: "термінал бере керування, Софа замовкла"

  # ── s12 ─────────────────────────────────────────────────────
  - scene_id: ep045_s12
    author_text: >
      Чорний екран. Зелений курсор. Термінал чекає. Команди
      біжать англійською — це мова машини. Марко не
      лякається: кожен рядок після `>` — її спосіб
      розмовляти. ТЕРМІНАЛ виводить першу перевірку.
    dialogue:
      - who: Софа
        line: "Прийом перший: ПОСПІШНЕ УЗАГАЛЬНЕННЯ."
      - who: Софа
        line: "Беруть кілька випадків — заявляють «усі»."
      - who: Софа
        line: "Сергійко в їдальні кричить: «УСІ склали контрольну на п'ять!» Рахуємо — троє з двадцяти п'яти."
    question: "«УСІ склали на п'ять.» Це поспішне узагальнення?"
    options:
      - id: yes_hasty
        text: "Так, поспішне узагальнення"
      - id: no_honest
        text: "Ні, чесний аргумент"
    correct_logic: "«Усі» без підрахунку — беруть кілька випадків і переносять на всіх. Це поспішне узагальнення."
    feedback_success: "Точно. І пам'ятаєш — Рей кричав «Усі згодні!» на площі. Той самий прийом."
    feedback_soft_fail: "Чесний аргумент перевірюваний: «троє з двадцяти п'яти». А «всі» — без підрахунку. Захист: «Хто саме? Скільки?» Це поспішне узагальнення."
    mood: "перший прийом — найчастіший"

  # ── s13 ─────────────────────────────────────────────────────
  - scene_id: ep045_s13
    dialogue:
      - who: Софа
        line: "Прийом другий: НАПАД НА ЛЮДИНУ."
      - who: Софа
        line: "Б'ють не по ідеї — по тому, хто її сказав."
      - who: Софа
        line: "Новенька пропонує змінити розклад. Відповідь: «Ти тут тиждень! Ти взагалі мовчи!»"
    question: "«Ти тут тиждень — мовчи!» Це напад на людину?"
    options:
      - id: yes_ad_hominem
        text: "Так, напад на людину"
      - id: no_idea_talk
        text: "Ні, обговорення ідеї"
    correct_logic: "Удар по статусу новенької, а не по її пропозиції. Це напад на людину."
    feedback_success: "Точно. Вартовий тобі теж казав: «Хто ти такий, щоб сумніватися?» Один в один."
    feedback_soft_fail: "Ідею тут навіть не обговорили — ударили по тому, що людина новенька. Захист: «Давай про ідею, а не про мене.» Це напад на людину."
    mood: "удар по людині, а не по ідеї"

  # ── s14 ─────────────────────────────────────────────────────
  - scene_id: ep045_s14
    dialogue:
      - who: Софа
        line: "Прийом третій: ОПУДАЛО."
      - who: Софа
        line: "Чужі слова перевернуті так, щоб звучали страшно."
      - who: Софа
        line: "Ваня каже: «Може, тренування перенести на годину?» Йому: «Ти хочеш ВЗАГАЛІ не тренуватися?!»"
    question: "Ваня сказав «перенести на годину» — йому повернули «ВЗАГАЛІ не тренуватися». Це опудало?"
    options:
      - id: yes_scarecrow
        text: "Так, опудало"
      - id: no_disagree
        text: "Ні, звичайна незгода"
    correct_logic: "«Перенести на годину» перетворили на «взагалі не тренуватися». Слова перевернуті — це опудало."
    feedback_success: "Точно. Голос так робив: ти казав «не зараз» — він чув «ніколи»."
    feedback_soft_fail: "Незгода звучить прямо: «не згоден, тому що…». А тут чужі слова роздули в страшне. Захист: «Я такого не казав. Я сказав…» Це опудало."
    mood: "слова роздуті в страшне"

  # ── s15 ─────────────────────────────────────────────────────
  - scene_id: ep045_s15
    dialogue:
      - who: Софа
        line: "Прийом четвертий: ХИБНИЙ АВТОРИТЕТ."
      - who: Софа
        line: "Посилаються на відомого — не на знаючого."
      - who: Софа
        line: "«Співачка Аліса сказала, що ці вітаміни корисні!» Вона співає. Не лікарка."
    question: "Співачка — про вітаміни. Це хибний авторитет?"
    options:
      - id: yes_false_authority
        text: "Так, хибний авторитет"
      - id: no_famous_ok
        text: "Ні, вона ж знаменита"
    correct_logic: "Співачка — експерт із музики. Не з медицини. Ім'я гучне, але не з тієї галузі. Це хибний авторитет."
    feedback_success: "Точно. Відомий — не означає знаючий. Голос теж грав «я тут головний»."
    feedback_soft_fail: "Знаменитість — це популярність. Не знання. Захист: «А вона експерт у цьому питанні?» Це хибний авторитет."
    mood: "корона не з тієї галузі"

  # ── s16 ─────────────────────────────────────────────────────
  - scene_id: ep045_s16
    dialogue:
      - who: Софа
        line: "Прийом п'ятий: ХИБНА ДИЛЕМА."
      - who: Софа
        line: "Дають лише два варіанти, ніби третього немає."
      - who: Софа
        line: "«Або ти йдеш із нами на дах — або ти боягуз!» А можна не йти і не бути боягузом."
    question: "«Або з нами — або боягуз.» Це хибна дилема?"
    options:
      - id: yes_false_dilemma
        text: "Так, хибна дилема"
      - id: no_fair_choice
        text: "Ні, вибір чесний"
    correct_logic: "Між «йти на дах» і «бути боягузом» є третій варіант: залишитися й не бути боягузом. Це хибна дилема."
    feedback_success: "Точно. Голос тобі: «Або віддай ключ — або втратиш сестру.» Той самий прийом. Третій варіант є."
    feedback_soft_fail: "Чесний вибір — коли варіантів справді два. Тут третій варіант є, його просто ховають. Захист: «А третій варіант?» Це хибна дилема."
    mood: "двоє дверей, а є треті"

  # ── s17 ─────────────────────────────────────────────────────
  - scene_id: ep045_s17
    dialogue:
      - who: Софа
        line: "Прийом шостий: СТРАШНИЙ ЛАНЦЮЖОК."
      - who: Софа
        line: "Один крок — і одразу катастрофа через чотири ланки."
      - who: Софа
        line: "«Не зробиш домашку — не складеш іспит — не вступиш — станеш двірником!» Жоден крок не доведений."
    author_text: >
      Шість прийомів упізнав. Ще шість. Пальці звикають
      до кнопок — Марко вже не лічить варіанти, ловить
      прийоми швидко. Кожна правильна відповідь — літера
      в блокнот. Навіщо — він не знає, але записує.
    question: "Від домашки до двірника — за чотири кроки. Це страшний ланцюжок?"
    options:
      - id: yes_slippery
        text: "Так, страшний ланцюжок"
      - id: no_logical
        text: "Ні, розумна логіка"
    correct_logic: "Чотири кроки без доказів. Кожну ланку просто склеїли у страх. Це страшний ланцюжок."
    feedback_success: "Точно. Голос так лякав: «Один крок — і все місто впаде.»"
    feedback_soft_fail: "Розумна логіка — коли кожна ланка доведена. Тут же ланки просто склеєні страхом. Захист: «Кожен крок доведений? Покажи зв'язок.» Це страшний ланцюжок."
    mood: "чотири кроки у страх"

  # ── s18 ─────────────────────────────────────────────────────
  - scene_id: ep045_s18
    dialogue:
      - who: Софа
        line: "Прийом сьомий: ПИТАННЯ-ПАСТКА."
      - who: Софа
        line: "Будь-яка відповідь заганяє в кут."
      - who: Софа
        line: "«Ти вже перестав запізнюватися на тренування?» Скажеш «так» — отже, запізнювався. Скажеш «ні» — ще запізнююся."
    question: "«Ти вже перестав запізнюватися на тренування?» Це питання-пастка?"
    options:
      - id: yes_loaded
        text: "Так, питання-пастка"
      - id: no_normal
        text: "Ні, звичайне питання"
    correct_logic: "Питання припускає, що людина ВЗАГАЛІ запізнювалася. Будь-яка відповідь — проти тебе. Це питання-пастка."
    feedback_success: "Точно. Голос пробував той самий прийом: «Ти вже перестав опиратися?»"
    feedback_soft_fail: "Звичайне питання — на нього можна відповісти чесно. А тут будь-яка відповідь заганяє в кут. Захист: «Питання припускає те, чого не було.» Це питання-пастка."
    mood: "обидві відповіді — проти тебе"

  # ── s19 ─────────────────────────────────────────────────────
  - scene_id: ep045_s19
    dialogue:
      - who: Софа
        line: "Прийом восьмий: ПІДМІНА ПОНЯТЬ."
      - who: Софа
        line: "Дію перейменовують, щоб вона звучала м'якше."
      - who: Софа
        line: "«Я не списую — я просто підглядаю і пишу так само!» Нове слово. Суть та сама."
    question: "«Не списую — підглядаю і пишу так само.» Це підміна понять?"
    options:
      - id: yes_relabel
        text: "Так, підміна понять"
      - id: no_different
        text: "Ні, різні дії"
