      Запис закінчився. Динамік біля термінала змовкає.

      На екрані — заставка після файла: чорно-білий знімок.
      Софія і Голос поряд, плече до плеча. Співавтори.

      Нижче — два інших файли. Два інших «play».
    mood: "після першого запису — співавтори"

