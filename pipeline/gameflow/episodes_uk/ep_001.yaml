episode_id: 1
episode_title: "Ранок без сестри"
lang: uk
terms_introduced: ["факт", "думка"]

scenes:

  # ── s01 ─────────────────────────────────────────────────────
  - scene_id: ep001_s01
    author_text: >
      Марко розплющує очі. Стеля біла. Звичайна.

      Ліжко навпроти — порожнє. Ковдра застелена. Не просто застелена — натягнута, як у готелі. Ніби в тому ліжку ніхто ніколи й не спав.

      Марко сідає. Мружиться. На стіні — чотири рамки. Учора в них були фотографії: він і Софія на морі, він і Софія на дні народження, він і Софія з мамою, він і Софія. Зараз рамки порожні. Білий картон замість облич.

  # ── s02 ─────────────────────────────────────────────────────
  - scene_id: ep001_s02
    dialogue:
      - who: Марко
        line: "Мам!"
      - who: автор
        line: "Мама на кухні. Наливає чай. Усміхається."
      - who: Марко
        line: "Мам, а де фотки?"
      - who: мама
        line: "Які фотки, сонечко?"
      - who: Марко
        line: "На стіні. Наші з моєю сестрою Софією."
      - who: автор
        line: "Мама ставить чашку. Повільно. Дивиться на Марка — не здивовано, а терпляче. Як на дитину, яка втретє питає, чому небо синє."
      - who: мама
        line: "Марку, у тебе немає сестри."
    author_text_after: >
      Вона говорить це спокійно. Упевнено. Так, як кажуть «завтра вівторок» чи «надворі дощ». Марко майже вірить — мама говорить так упевнено, а Марко звик погоджуватись. Мама завжди говорить правильно. Мама знає. Мама...

      Він киває, але в животі — тяжкість. Як перед контрольною, до якої не готувався. Щось не так. Марко не може назвати — що саме.

  # ── s03 ─────────────────────────────────────────────────────
  - scene_id: ep001_s03
    author_text: >
      Він повертається в кімнату. Сідає на ліжко. Своє. Те, що навпроти, застелене ідеально. На подушці — жодної вм'ятини. Але на полиці, між підручниками з математики та географії — телефон. Старий. З тріснутим екраном. Марко точно знає: це не його телефон. Він ніколи не бачив його раніше.

      Чи бачив?

      Тріщина на екрані йде навскіс, від кута до кута. Марко проводить пальцем. Екран теплий. Ніби хтось тільки-но тримав його в руці.

      Поруч із телефоном — щоденник.
    question: "Що робить Марко?"
    options:
      - id: look_diary
        text: "Погортати щоденник Софії"
      - id: turn_on_phone
        text: "Увімкнути телефон"

  # ── s03_detour ───────────────────────────────────────────────
  - scene_id: ep001_s03_detour
    author_text: >
      Марко гортає щоденник. На першій сторінці — малюнок: два стаканчики морозива. Один шоколадний, один рожевий. Підпис акуратним дрібним почерком із завитками на «д» та «у»: «Шоколадне краще. — С.» Поруч хтось — Марко впізнає свій почерк — дописав олівцем: «Ні! Полуничне!»

      Він пам'ятає цю суперечку. Пам'ятає. Пам'ятає, як вона пирхала. Пам'ятає, як вони обоє їли своє й показували одне одному язики.

      Мама каже — сестри немає. Щоденник каже — була.

      Ще сторінки: кіт у капелюсі, формула з усміхненим обличчям, мапа якогось міста з підписом «МОЄ МІСТО». Марко гортає до кінця — сорок сім заповнених сторінок. На останній — один рядок: «Братик, якщо ти це читаєш — значить, я мала рацію. Не вір тому, що здається простим.»

      На полиці здригається телефон. Раз. Ще раз. Тріснутий екран спалахує сам — білі літери на чорному, надто швидко, не прочитати. Гасне. Знову спалахує. Чекає.

  # ── s04 ─────────────────────────────────────────────────────
  - scene_id: ep001_s04
    author_text: >
      Марко натискає кнопку. Екран блимає.
    dialogue:
      - who: Софа
        line: "Привіт... Марку... якщо ти це читаєш... значить, я вже..."
      - who: автор
        line: "Екран гасне. Знову спалахує. Текст тепер рівний, з паузами між словами."
      - who: Софа
        line: "Я — Софа. Освітній помічник. Версія 0.7. Не фінальна."
      - who: Марко
        line: "Де моя сестра?"
      - who: Софа
        line: "Для доступу до цієї інформації... доведи, що ти готовий. Це... важливо. Якщо ти не будеш готовий... станеться... непоправне."
      - who: Марко
        line: "Що станеться?!"
      - who: Софа
        line: "...дані... заблоковані. Запитання перше."

  # ── s04a ────────────────────────────────────────────────────
  - scene_id: ep001_s04a
    dialogue:
      - who: Софа
        line: "Марко й хтось сперечалися про морозиво. Шоколадне краще? Полуничне? Чи можна виміряти, яке смачніше? Чи є «смаковимір»?"
    author_text_after: >
      Марко гортає щоденник, який лежав поруч із телефоном. На першій сторінці — малюнок: два стаканчики морозива. Один шоколадний, один рожевий. Підпис акуратним дрібним почерком із завитками на «д» та «у»: «Шоколадне краще. — С.» Поруч хтось — Марко впізнає свій почерк — дописав олівцем: «Ні! Полуничне!»

      Він пам'ятає цю суперечку. Пам'ятає. Пам'ятає, як вона пирхала. Пам'ятає, як вони обоє їли своє й показували одне одному язики.

      Мама каже — сестри немає. Щоденник каже — була.

  # ── s04b ────────────────────────────────────────────────────
  - scene_id: ep001_s04b
    dialogue:
      - who: Софа
        line: "Два види тверджень. ФАКТ — те, що можна перевірити. Порахувати. Виміряти. Торкнутися. Побачити."
      - who: Софа
        line: "ДУМКА — те, що не можна перевірити приладами. Відчуття. Оцінка. У кожного своя — і це нормально."
      - who: Софа
        line: "Слова-підказки. «Мені здається», «найкращий», «гарний», «нудний» — швидше за все, думка. Число, відстань, назва — швидше за все, факт."
      - who: Софа
        line: "Перевіримо?"

  # ── s05: Quiz 1 ─────────────────────────────────────────────
  - scene_id: ep001_s05
    question: "Софія казала: шоколадне краще. Марко вважає, що полуничне. Хто має рацію?"
    options:
      - id: sofia
        text: "Софія"
      - id: marko
        text: "Марко"
      - id: nobody
        text: "Ніхто — у кожного своє"
    correct_logic: "«Смачніше» — це відчуття. Немає приладу «смаковимір». У кожного своя думка про смак — і це нормально."
    feedback_success: "Ніхто. Немає «смаковиміру». Софія любила шоколадне — чудово. Марко любить полуничне — теж чудово. Ніхто не помиляється."
    feedback_soft_fail: "Чи можна виміряти, яке смачніше? Є прилад? Якщо ні — це думка. У кожного своя."

  # ── s06: Quiz 2 ─────────────────────────────────────────────
  - scene_id: ep001_s06
    question: "«Софія — найкраща сестра у світі.» Факт чи думка?"
    options:
      - id: fact
        text: "Факт"
      - id: opinion
        text: "Думка"
    correct_logic: "Немає «найкращеміру» для сестер — це почуття Марка, тепле, справжнє, але почуття."
    feedback_success: "Думка. Немає приладу «найкращемір». Кожен вважає свою сестру найкращою — і це почуття, тепле й справжнє. Але почуття."
    feedback_soft_fail: "Чи можна виміряти «найкраща»? Є прилад? Немає «найкращеміру» — значить, думка."

  # ── s07: Quiz 3 ─────────────────────────────────────────────
  - scene_id: ep001_s07
    question: "«Щоденник Софії лежить на полиці.» Факт чи думка?"
    options:
      - id: fact
        text: "Факт"
      - id: opinion
        text: "Думка"
    correct_logic: "Підійди й торкнися — він або є, або його немає."
    feedback_success: "Факт. Можна підійти й перевірити прямо зараз. Марко дивиться на полицю — щоденник там."
    feedback_soft_fail: "Чи можна перевірити? Підійди й подивись — лежить щоденник чи ні?"

  # ── s08: Quiz 4 ─────────────────────────────────────────────
  - scene_id: ep001_s08
    question: "«У класі 25 учнів.» Факт чи думка?"
    options:
      - id: fact
        text: "Факт"
      - id: opinion
        text: "Думка"
    correct_logic: "Можна перерахувати. Число — завжди перевірюване."
    feedback_success: "Факт. Можна прийти й перерахувати. Порахуй — двадцять п'ять."
    feedback_soft_fail: "Чи можна перерахувати учнів? Якщо можна — це факт."

  # ── s09: Quiz 5 ─────────────────────────────────────────────
  - scene_id: ep001_s09
    question: "«Математика — нудний предмет.» Факт чи думка?"
    options:
      - id: fact
        text: "Факт"
      - id: opinion
        text: "Думка"
    correct_logic: "Немає «нудномеру» — комусь нудно, комусь цікаво."
    feedback_success: "Думка. Для когось математика — улюблений предмет. Немає приладу «нудномір»."
    feedback_soft_fail: "Чи можна виміряти нудьгу? Є прилад для цього?"

  # ── s10: Quiz 6 ─────────────────────────────────────────────
  - scene_id: ep001_s10
    question: "«Київ — столиця України.» Факт чи думка?"
    options:
      - id: fact
        text: "Факт"
      - id: opinion
        text: "Думка"
    correct_logic: "Можна перевірити в будь-якому атласі чи офіційному документі — мапа, підручник."
    feedback_success: "Факт. Мапа, підручник — можна перевірити."
    feedback_soft_fail: "Чи є Київ столицею України? Це можна перевірити в будь-якому джерелі."

  # ── s11: голосове Софії ────────────────────────────────────
  - scene_id: ep001_s11
    dialogue:
      - who: Софа
        line: "Правило... перше. Факт — можна перевірити. Думка — ні. Якщо не можеш перевірити — це не факт... навіть якщо звучить упевнено."
      - who: Софа
        line: "Запис... Софії..."
    unlock_button:
      text: "🔓 Розблокувати запис"
      reveals:
        who: Софія
        line: "Братику, почни зі щоденника. Я вірю в тебе."

  # ── s11a ────────────────────────────────────────────────────
  - scene_id: ep001_s11a
    author_text: >
      Марко слухає тричі. Потім ще раз. Потім кладе телефон у кишеню й бере щоденник.

  # ── s11b ────────────────────────────────────────────────────
  - scene_id: ep001_s11b
    author_text: >
      Тиша. Марко стискає телефон. Щоденник, який можна торкнутися. Голос, який він упізнає. Це факти. Мама, яка не пам'ятає — теж факт. Факти суперечать одне одному.

      Марко бере щоденник і йде до школи.

  # ── s12a ────────────────────────────────────────────────────
  - scene_id: ep001_s12a
    author_text: >
      Школа. Запах крейди й лінолеуму. Гудуть труби опалення. Марко заходить у клас і дивиться на третю парту біля вікна. Друга половина парти — порожня. Чиста. Ні подряпини, ні сліду від ручки. Ніби за нею ніхто ніколи не сидів.

      Але Марко пам'ятає: на цій половині були наклейки з котами. Дев'ять штук. Він рахував.

  # ── s12b ────────────────────────────────────────────────────
  - scene_id: ep001_s12b
    dialogue:
      - who: Данило
        line: "Гей, Марку, ти чого?"
      - who: Марко
        line: "Тут... тут раніше хтось сидів."
      - who: автор
        line: "Данило дивиться на порожнє місце. Знизує плечима."
      - who: Данило
        line: "Та ні, завжди порожня була. Тобі наснилося, чи що?"
    author_text_after: >
      «Тобі наснилося.» Мама сказала те саме. Іншими словами, але те саме. І Данило говорить упевнено. І Марко звик погоджуватись із упевненими. Він майже киває. Майже.

      Але в рюкзаку — щоденник. З почерком, який він знає. З малюнком морозива. Із завитками на «д» та «у».

  # ── s12c ────────────────────────────────────────────────────
  - scene_id: ep001_s12c
    author_text: >
      Марко дістає щоденник. Кладе на парту. Розгортає.
    dialogue:
      - who: Марко
        line: "Ось. Це щоденник моєї сестри. Софії. Вона сиділа тут."
      - who: автор
        line: "Данило гортає. Хмикає. Олена заглядає через плече. Вітя підходить."
      - who: Олена
        line: "Це взагалі чий?"
      - who: Марко
        line: "Софії. Моєї сестри-близнючки."
      - who: Вітя
        line: "У тебе немає сестри, Марку."
      - who: автор
        line: "Не зло. Просто — як факт. Як «двічі по два — чотири»."
      - who: Олена
        line: "Почерк дівчачий. Може, чийсь загублений?"
    author_text_after: >
      Марко забирає щоденник. Притискає до себе. Це єдиний доказ. Між підручником із математики та пеналом — ціле життя, яке пам'ятає тільки він.

  # ── s12d ────────────────────────────────────────────────────
  - scene_id: ep001_s12d
    author_text: >
      Софа вібрує в кишені. Марко дістає телефон.
    dialogue:
      - who: Софа
        line: "Експрес-перевірка. Швидко. Факт чи думка?"

  # ── s13: Quiz 7 ─────────────────────────────────────────────
  - scene_id: ep001_s13
    question: "«Голос Софії теплий.» Факт чи думка?"
    options:
      - id: fact
        text: "Факт"
      - id: opinion
        text: "Думка"
    correct_logic: "«Теплий» — це відчуття Марка. Немає «тепломеру» для голосів."
    feedback_success: "Думка. «Теплий» — це відчуття Марка. Немає «тепломеру» для голосів. Далі!"
    feedback_soft_fail: "Чи можна виміряти «теплий» голос? Є прилад?"

  # ── s14: Quiz 8 ─────────────────────────────────────────────
  - scene_id: ep001_s14
    question: "«На стіні висіли чотири рамки.» Факт чи думка?"
    options:
      - id: fact
        text: "Факт"
      - id: opinion
        text: "Думка"
    correct_logic: "Порахуй — чотири. Число перевірюване."
    feedback_success: "Факт! Порахуй — чотири рамки. Перевірюване. Далі!"
    feedback_soft_fail: "Чи можна порахувати рамки? Чотири — це число."

  # ── s15: Quiz 9 ─────────────────────────────────────────────
  - scene_id: ep001_s15
    question: "«У телефона Софи тріснутий екран.» Факт чи думка?"
    options:
      - id: fact
        text: "Факт"
      - id: opinion
        text: "Думка"
    correct_logic: "Подивись — тріщина або є, або ні. Перевірюване очима."
    feedback_success: "Факт! Подивись — тріщина є. Очима видно. Далі!"
    feedback_soft_fail: "Тріщину на екрані можна побачити? Якщо так — факт."

  # ── s16: Quiz 10 ────────────────────────────────────────────
  - scene_id: ep001_s16
    question: "«Рамки на стіні порожні.» Факт чи думка?"
    options:
      - id: fact
        text: "Факт"
      - id: opinion
        text: "Думка"
    correct_logic: "Підійди й подивись — порожні чи ні. Перевірюване."
    feedback_success: "Факт! Підійди й подивись — білий картон замість облич. Далі!"
    feedback_soft_fail: "Чи можна підійти й побачити, що в рамках? Якщо так — факт."

  # ── s17: Quiz 11 ────────────────────────────────────────────
  - scene_id: ep001_s17
    question: "«Мама говорить голосно.» Факт чи думка?"
    options:
      - id: fact
        text: "Факт"
      - id: opinion
        text: "Думка"
    correct_logic: "Можна почути — гучність вимірна."
    feedback_success: "Факт! Гучність можна виміряти — децибели. Далі!"
    feedback_soft_fail: "Голосно — чи можна перевірити? Гучність вимірна."

  # ── s18: Quiz 12 ────────────────────────────────────────────
  - scene_id: ep001_s18
    question: "«У Марка в кімнаті два ліжка.» Факт чи думка?"
    options:
      - id: fact
        text: "Факт"
      - id: opinion
        text: "Думка"
    correct_logic: "Порахуй — два. Число перевірюване."
    feedback_success: "Факт! Порахуй — одне, два. Перевірюване. Далі!"
    feedback_soft_fail: "Чи можна порахувати ліжка? Якщо так — факт."

  # ── s19: Quiz 13 ────────────────────────────────────────────
  - scene_id: ep001_s19
    question: "«Мама говорить тихо.» Факт чи думка?"
    options:
      - id: fact
        text: "Факт"
      - id: opinion
        text: "Думка"
    correct_logic: "Можна почути — тихо чи ні. Гучність вимірна."
    feedback_success: "Факт! Тихо — можна почути й виміряти. Далі!"
    feedback_soft_fail: "Тихо чи голосно — чи можна перевірити? Гучність вимірна."

  # ── s20: Quiz 14 ────────────────────────────────────────────
  - scene_id: ep001_s20
    question: "«Щоденник лежав поруч із телефоном.» Факт чи думка?"
    options:
      - id: fact
        text: "Факт"
      - id: opinion
        text: "Думка"
    correct_logic: "Можна побачити розташування. Перевірюване."
    feedback_success: "Факт! Можна побачити — поруч чи ні. Далі!"
    feedback_soft_fail: "Розташування предметів — чи можна побачити? Якщо так — факт."

  # ── s21: Quiz 15 ────────────────────────────────────────────
  - scene_id: ep001_s21
    question: "«Фотографії Софії зникли.» Факт чи думка?"
    options:
      - id: fact
        text: "Факт"
      - id: opinion
        text: "Думка"
    correct_logic: "Подивись на стіну вдома. Порожні рамки. Перевірюване."
    feedback_success: "Факт! Подивись на стіну — порожні рамки. Перевірюване. Експрес-тест пройдено."
    feedback_soft_fail: "Фотографії були — тепер рамки порожні. Можна побачити? Якщо так — факт."

  # ── s21a ────────────────────────────────────────────────────
  - scene_id: ep001_s21a
    author_text: >
      Марко розуміє. Щоденник — факт. Почуття — думки. Йому потрібне друге джерело. Хтось, хто теж пам'ятає.

      Дзвоник. Перерва. Марко ховає телефон. Однокласники розходяться. Ніхто не спитав ще раз.

  # ── s21b ────────────────────────────────────────────────────
  - scene_id: ep001_s21b
    author_text: >
      Коридор. Біля вікна стоїть жінка — невисока, у сірому кардигані, з м'яким голосом і теплими очима. Волосся зібране в пучок. На шиї — тонкий ланцюжок із маленьким кулоном.

      — Марку! Підійди-но.

      Віра Андріївна. Вчителька літератури. Вона завжди говорить неголосно — але всі чують. Вона ніколи не підвищує голос — але всі слухають. Марко любить її уроки. На них спокійно.

  # ── s21c ────────────────────────────────────────────────────
  - scene_id: ep001_s21c
    dialogue:
      - who: Віра
        line: "Як справи?"
      - who: автор
        line: "Усміхається. Рука на плечі Марка — легка, тепла."
      - who: Марко
        line: "Нормально."
      - who: Віра
        line: "Я чула, ти сьогодні щось розповідав хлопцям. Про якийсь щоденник?"
      - who: автор
        line: "Марко мовчить."
      - who: Віра
        line: "Марку, ти ж розумний хлопчик. Ти ж розумієш, що перевтомився."
      - who: автор
        line: "Віра нахиляється. Голос ще тихіший."
      - who: Віра
        line: "Таке буває. Нічого страшного. Принеси мені цей щоденник завтра — я подивлюся, я за тебе переживаю."
    author_text_after: >
      Вона говорить це ласкаво. М'яко. Справжньо турботливо. Марко майже киває — Віра добра, Віра мудра, Віра завжди допомагає.

      Але всередині — холод. Ніби ковтнув крижаний кубик. Усе звучить правильно, але хочеться піти. Віра говорить ласкаво — чому ж тоді зимно?

  # ── s21d ────────────────────────────────────────────────────
  - scene_id: ep001_s21d
    author_text: >
      Марко опускає руку до рюкзака. Пальці торкаються блискавки. Він хоче відкрити. Дістати. Віддати. Віра ж добра. Віра допоможе.

      Але руки самі притискають рюкзак до грудей. Чомусь не хочеться випускати. Удруге за сьогодні тіло вирішує швидше, ніж голова.

      — Я... подумаю, — каже Марко.

      Віра усміхається. Киває. Рука йде з плеча. І з цією рукою йде тепло — а холод залишається.

      Марко йде коридором. Софа вібрує в кишені. Марко не дістає телефон. Поки не дістає.

  # ── s22: клифхенгер ────────────────────────────────────────
  - scene_id: ep001_s22
    author_text: >
      У кінці коридору, біля запасного виходу, стоїть дівчинка. Трохи старша. Темне волосся. Дивиться прямо на Марка. Чекає, поки вчителі пройдуть. Потім — швидким кроком — підходить.
    dialogue:
      - who: Ліна
        line: "Я Ліна. Я пам'ятаю Софію."
      - who: автор
        line: "Марко зупиняється."
      - who: Ліна
        line: "Але нам не можна говорити."
      - who: автор
        line: "Ліна оглядається."
      - who: Ліна
        line: "Вони слухають."
    author_text_after: >
      Хто — «вони»?
