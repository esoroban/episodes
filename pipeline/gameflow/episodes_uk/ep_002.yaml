episode_id: 2
episode_title: "Неправда та її види"
lang: uk
terms_introduced: ["неправда"]
terms_used: ["факт", "думка"]

scenes:

  # ── s01 ─────────────────────────────────────────────────────
  - scene_id: ep002_s01
    author_text: >
      Марко стоїть у кінці коридору. Ліна вже пішла — швидко, не озираючись,
      ніби й не було розмови. У руці в Марка — телефон. Екран темний.
      Софа мовчить.

      *«Я пам'ятаю Софію.»*

      Три слова. Перша людина за весь день, хто пам'ятає.

      Але наступний урок уже почався, і Марко біжить у клас.

  # ── s02 ─────────────────────────────────────────────────────
  - scene_id: ep002_s02
    author_text: >
      Сідає на своє місце. Друга половина парти — порожня. Чиста.
      Данило косить оком, але нічого не каже.

  # ── s03 ─────────────────────────────────────────────────────
  - scene_id: ep002_s03
    author_text: >
      На перерві Олена шепочеться з Вітею біля раковини. Марко чує уривки:

      — ...каже, у нього сестра зникла...

      — Яка сестра? У нього немає ніякої сестри.

      — Може, він просто хоче, щоб його пожаліли?

  # ── s03_sofa ─────────────────────────────────────────────────
  - scene_id: ep002_s03_sofa
    dialogue:
      - who: Софа
        line: "З учора ти знаєш: ФАКТ — можна перевірити, і підтверджується. ДУМКА — не можна перевірити, у кожного своя."
      - who: Софа
        line: "Сьогодні третій варіант — НЕПРАВДА. Це коли перевірити МОЖНА, але при перевірці НЕ підтверджується."
      - who: Софа
        line: "«Він хоче, щоб його пожаліли.» Чи можна це перевірити?"

  # ── s04: Quiz ───────────────────────────────────────────────
  - scene_id: ep002_s04
    question: "«Марко хоче, щоб його пожаліли.» Факт, думка чи неправда?"
    options:
      - id: fact
        text: "Факт"
      - id: opinion
        text: "Думка"
      - id: lie
        text: "Неправда"
    correct_logic: "Немає «хочеміру» — Олена не може залізти в голову Марка."
    feedback_success: "Думка. Немає «хочеміру» — Олена не може залізти в голову Марка."
    feedback_soft_fail: "Чи можна виміряти, чого хоче людина? Є прилад «хочемір»? Ні — це думка."

  # ── s05: drama з Вітею ─────────────────────────────────────
  - scene_id: ep002_s05
    author_text: >
      Марко ховає телефон. Вітя підходить:
    dialogue:
      - who: Вітя
        line: "Марку, без образ. Але всі кажуть, що ти вигадав сестру. Ніхто її не пам'ятає. Жодна людина в школі."
    author_text_after: >
      *«Всі кажуть.»* Слово «всі» б'є, як м'яч у живіт. Не тому що боляче —
      тому що Марко не може відповісти. Він ЗНАЄ, що Софія була. Але як
      довести те, чого ніхто не пам'ятає?

  # ── s05_sofa ─────────────────────────────────────────────────
  - scene_id: ep002_s05_sofa
    dialogue:
      - who: Софа
        line: "Вітя сказав «всі кажуть» і «жодна людина». Пам'ятаєш перше правило? Можна перевірити — і підтвердиться? Чи можна перевірити — і ні?"

  # ── s06: Quiz ───────────────────────────────────────────────
  - scene_id: ep002_s06
    question: "«Всі кажуть, що Марко вигадав сестру.» Факт, думка чи неправда?"
    options:
      - id: fact
        text: "Факт"
      - id: opinion
        text: "Думка"
      - id: lie
        text: "Неправда"
    correct_logic: "Можна перевірити: спитай кожного. Ліна пам'ятає — уже не «всі»."
    feedback_success: "Неправда! Перевіряне: спитай кожного. Ліна пам'ятає — уже не «всі»."
    feedback_soft_fail: "Чи можна спитати КОЖНОГО? Так. А Ліна — пам'ятає. Значить, не «всі». Неправда."

  # ── s07: Quiz ───────────────────────────────────────────────
  - scene_id: ep002_s07
    question: "«Жодна людина в школі не пам'ятає Софію.» Факт, думка чи неправда?"
    options:
      - id: fact
        text: "Факт"
      - id: opinion
        text: "Думка"
      - id: lie
        text: "Неправда"
    correct_logic: "Ліна пам'ятає — одного винятку досить."
    feedback_success: "Неправда! Ліна пам'ятає — одного винятку досить."
    feedback_soft_fail: "Чи пам'ятає хоч ОДНА людина? Ліна пам'ятає. Значить, «жодна» — неправда."

  # ── s08: чат про «вигадав сестру» ──────────────────────────
  - scene_id: ep002_s08
    author_text: >
      Марко йде коридором. У шкільному чаті (бачить на екрані чужого телефона,
      через плече):

      **«Марко з 5-Б вигадав сестру, щоб не робити домашку. Жесть.»**

      Повідомлення набрало шість лайків. Хтось переслав. Хтось відповів: «Серйозно?»
      Хтось: «Я чув, він ще й чужий щоденник приніс.»

      *Скалка. Та сама скалка, що вранці, коли мама сказала «у тебе немає сестри».
      Тільки тепер скалок багато. Цілий шкільний коридор колючок.*
    dialogue:
      - who: Софа
        line: "Те, що написано в чаті. Можна перевірити? Так — спитати Марка, подивитися щоденник. При перевірці підтвердиться? Ні. Бо Марко НЕ вигадував. Це НЕПРАВДА."
      - who: Софа
        line: "Пам'ятаєш: ФАКТ — можна перевірити І підтверджується. ДУМКА — не можна перевірити. А є третій варіант: можна перевірити — і при перевірці НЕ підтверджується. Це НЕПРАВДА."

  # ── s08_choice ───────────────────────────────────────────────
  - scene_id: ep002_s08_choice
    author_text: >
      Той, у кого телефон, обертається. Відчуває чужий погляд.
      Марко відводить очі — пізно. Вони зустрічаються. Секунда тиші.
      Що зробити?
    question: "Як реагує Марко?"
    options:
      - id: walk_away
        text: "Відвернутися і піти"
      - id: argue
        text: "Почати сперечатися"

  # ── s08_walk ─────────────────────────────────────────────────
  - scene_id: ep002_s08_walk
    author_text: >
      Марко відвертається. Слова застрягли десь між горлом і язиком.
      Іде далі — швидко, не озираючись. За спиною — чийсь смішок.
      Кулаки розтискаються тільки за рогом.

      *«Я нічого не сказав. Але якщо нічого не скажу — вони вирішать, що це
      правда. А що я МІГ сказати?»*

  # ── s08_argue ────────────────────────────────────────────────
  - scene_id: ep002_s08_argue
    author_text: >
      — Це... це неправда, — каже Марко. Слова виходять криво. — Я не
      вигадував. У мене є сестра. Я можу довести.

      Той, у кого телефон, піднімає брову. Знизує плечима.

      — Ну, доведи. Покажи сестру.

      Марко відкриває рот. Закриває. Сестри поруч немає. Голос застрягає.
      Тільки щоденник у рюкзаку — але ним нікого не переконати. Марко іде.
      Скалка глибше, ніж була.

      *«Слова не захистили. Але я хоч спробував.»*

  # ── s09: Quiz ───────────────────────────────────────────────
  - scene_id: ep002_s09
    question: "«Марко вигадав сестру, щоб не робити домашку.» Факт, думка чи неправда?"
    options:
      - id: fact
        text: "Факт"
      - id: opinion
        text: "Думка"
      - id: lie
        text: "Неправда"
    correct_logic: "Перевіряне — і при перевірці не підтвердиться."
    feedback_success: "Неправда! Перевіряне — спитай Марка, подивись щоденник. Не підтвердиться."
    feedback_soft_fail: "Чи можна перевірити? Так. При перевірці підтвердиться? Ні — Марко не вигадував. Неправда."

  # ── s10: біля кабінету біології — три види ────────────────
  - scene_id: ep002_s10
    author_text: >
      Марко йде далі. Біля кабінету біології — двоє з паралельного класу:

      — Чуєш, це той, який сестру вигадав?

      — Та ні, він просто приколюється. Типу жарт.
    dialogue:
      - who: Софа
        line: "Неправда буває різна. Хлопець сказав «типу жарт». І справді — неправда ділиться на три види. Перший — ЖАРТ. Людина ЗНАЄ, що це неправда. Хоче посмішити або привернути увагу."

  # ── s11: Quiz ───────────────────────────────────────────────
  - scene_id: ep002_s11
    question: "Однокласник на перерві: «Я бачив Софію вчора в парку!» (не бачив, хотів привернути увагу). Жарт, казка чи фейк?"
    options:
      - id: joke
        text: "Жарт"
      - id: tale
        text: "Казка"
      - id: fake
        text: "Фейк"
    correct_logic: "Знає, що неправда — хоче уваги."
    feedback_success: "Жарт! Знає, що неправда — хоче привернути увагу."
    feedback_soft_fail: "Чи хоче він, щоб ти ВСЕРЙОЗ повірив? Ні — хоче уваги. Жарт."

  # ── s12: їдальня — дракон і млинці (drama) ─────────────────
  - scene_id: ep002_s12
    author_text: >
      Марко заходить до їдальні. За столом — Данило й Олена.
      Олена розповідає молодшим щось про дракона:

      — ...і дракон їв млинці щоранку, і від цього у нього луска стала золотою!

      Молодші сміються. Усі розуміють — це казка.

  # ── s12_sofa ─────────────────────────────────────────────────
  - scene_id: ep002_s12_sofa
    dialogue:
      - who: Софа
        line: "Другий вид — КАЗКА. Усі розуміють, що не насправді. Ніхто не вірить буквально. Це фантазія."

  # ── s13: Quiz — кенгуру на крышах (sказка) ─────────────────
  - scene_id: ep002_s13
    question: "«Ночами по дахах нашого міста ходять великі кенгуру.» Жарт, казка чи фейк?"
    options:
      - id: joke
        text: "Жарт"
      - id: tale
        text: "Казка"
      - id: fake
        text: "Фейк"
    correct_logic: "Усі розуміють, що не насправді."
    feedback_success: "Казка! Усі розуміють — це фантазія, не обман."
    feedback_soft_fail: "Чи хоче хтось, щоб ти повірив буквально? Ні — всі розуміють. Казка."

  # ── s14: Quiz — невидимый лев ──────────────────────────────
  - scene_id: ep002_s14
    question: "«У Віри в учительській під столом живе невидимий лев.» Жарт, казка чи фейк?"
    options:
      - id: joke
        text: "Жарт"
      - id: tale
        text: "Казка"
      - id: fake
        text: "Фейк"
    correct_logic: "Фантазія, не обман."
    feedback_success: "Казка! Фантазія — ніхто не вірить у невидимого лева."
    feedback_soft_fail: "Хтось хоче, щоб ти СЕРЙОЗНО повірив? Ні — це фантазія. Казка."

  # ── s15: чат — мама водила до психолога ────────────────────
  - scene_id: ep002_s15
    author_text: >
      Марко сідає за стіл. Їсть мовчки. Дістає телефон під столом —
      у чаті нове повідомлення. Інша людина, інший акаунт:

      **«У Марка серйозні проблеми. Мама його водила до психолога.
      Він усім бреше про сестру.»**

      Це неправда. Жодного психолога. Але написано впевнено. З подробицями.
      І вже 11 лайків.

      *Руки стискаються. Марко хоче написати відповідь. Хоче закричати:
      «ЦЕ НЕПРАВДА!» Але пальці не рухаються. Ніби крик застряг у горлі.*
    dialogue:
      - who: Софа
        line: "Третій вид — ФЕЙК. Найнебезпечніший. Спеціально вигадано, щоб повірили. Не жарт — бо мета не посмішити. Не казка — бо написано як правда. Фейк — небезпечна неправда."

  # ── s16: Quiz ───────────────────────────────────────────────
  - scene_id: ep002_s16
    question: "У чаті: «Мама Марка водила його до психолога.» Жарт, казка чи фейк?"
    options:
      - id: joke
        text: "Жарт"
      - id: tale
        text: "Казка"
      - id: fake
        text: "Фейк"
    correct_logic: "Спеціально вигадано, щоб повірили; мета — нашкодити."
    feedback_success: "Фейк! Спеціально вигадано, щоб повірили. Написано впевнено, з подробицями — але все брехня."
    feedback_soft_fail: "Чи хоче автор, щоб УСІ повірили? Так. Хоче посмішити? Ні. Це фейк."

  # ── s17: Quiz ───────────────────────────────────────────────
  - scene_id: ep002_s17
    question: "«Я щойно бачив Софію біля спортзалу!» Жарт, казка чи фейк?"
    options:
      - id: joke
        text: "Жарт"
      - id: tale
        text: "Казка"
      - id: fake
        text: "Фейк"
    correct_logic: "Швидше за все знає, що неправда."
    feedback_success: "Жарт! Швидше за все знає, що неправда — хоче уваги або підколоти."
    feedback_soft_fail: "Чи хоче він, щоб ти всерйоз побіг до спортзалу? Скоріше ні. Жарт."

  # ── s18: підсумок — «мірило» ───────────────────────────────
  - scene_id: ep002_s18
    author_text: >
      Перерва. Марко сидить на підвіконні в кінці коридору. Сам. Телефон у руках.
    dialogue:
      - who: Софа
        line: "Підведемо підсумок. За сьогодні ти зустрів усі три види. Жарт — однокласник про Софію в парку. Казка — дракон і млинці. Фейк — чат про психолога."
      - who: Софа
        line: "Секрет складних випадків: спитай себе — чи МОЖНА це виміряти? Якщо можна — перевіряне. Якщо ні — думка. Якщо перевіряне, але при перевірці не підтверджується — неправда."

  # ── s19: Quiz — папа найсильніший ───────────────────────────
  - scene_id: ep002_s19
    question: "«Мій тато найсильніший у світі.» Факт, думка чи неправда?"
    options:
      - id: fact
        text: "Факт"
      - id: opinion
        text: "Думка"
      - id: lie
        text: "Неправда"
    correct_logic: "Силу можна виміряти — силомір, штанга, чемпіонати. «Найсильніший У СВІТІ» — у цього звання є власник (олімпійський чемпіон із важкої атлетики). Тато, на жаль, не він. Перевіряне — і не підтвердиться."
    feedback_success: "Неправда! Силу можна виміряти — штанга, силомір, олімпіада. Найсильніший у світі — це конкретна людина, олімпійський чемпіон. Тато ним, швидше за все, не є. Перевіряне — і не підтвердиться."
    feedback_soft_fail: "Силу можна виміряти? Так — штанга, силомір. Чи є у світі «найсильніший»? Так — олімпійський чемпіон. Тато — цей чемпіон? Швидше ні. Значить, неправда."

  # ── s20: Quiz — мама найкрасивіша ───────────────────────────
  - scene_id: ep002_s20
    question: "«Моя мама найкрасивіша.» Факт, думка чи неправда?"
    options:
      - id: fact
        text: "Факт"
      - id: opinion
        text: "Думка"
      - id: lie
        text: "Неправда"
    correct_logic: "«Красива» — це відчуття. Приладу немає. І на відміну від сили — немає олімпіади краси, немає чемпіона світу з краси. Перевірити нічим. Отже, думка."
    feedback_success: "Думка! Зверни увагу: фраза схожа на «найсильніший у світі» — але різниця велика. У сили є чемпіони, силоміри, рекорди — це перевіряне. У краси немає ні приладу, ні олімпіади. Перевірити нічим — значить, у кожного своя правда. У кожного мама найкрасивіша."
    feedback_soft_fail: "Чи є прилад для краси? Ні. Чи є олімпіада краси, де дають звання «найкрасивіша у світі»? Теж ні. Коли виміряти нічим — це думка."

  # ── s21: Quiz — 11 лайків ───────────────────────────────────
  - scene_id: ep002_s21
    question: "«У шкільному чаті вже одинадцять лайків на повідомленні про Марка.» Факт, думка чи неправда?"
    options:
      - id: fact
        text: "Факт"
      - id: opinion
        text: "Думка"
      - id: lie
        text: "Неправда"
    correct_logic: "Подивись на екран — кількість лайків видно очима, перевіряне."
    feedback_success: "Факт! Кількість лайків видно в чаті — 11. Перевіряне очима."
    feedback_soft_fail: "Чи можна побачити кількість лайків? Так — воно написано поруч із повідомленням. Число — факт."

  # ── s22: Quiz — Софія найкраща сестра ──────────────────────
  - scene_id: ep002_s22
    question: "«Софія — найкраща сестра у світі.» Факт, думка чи неправда?"
    options:
      - id: fact
        text: "Факт"
      - id: opinion
        text: "Думка"
      - id: lie
        text: "Неправда"
    correct_logic: "Немає «найкращеміру»."
    feedback_success: "Думка! Немає «найкращеміру» — але почуття тепле і справжнє."
    feedback_soft_fail: "Чи можна виміряти «найкраща»? Немає «найкращеміру» — думка."

  # ── s23: Quiz — 47 сторінок ────────────────────────────────
  - scene_id: ep002_s23
    question: "«У щоденнику Софії 47 сторінок.» Факт, думка чи неправда?"
    options:
      - id: fact
        text: "Факт"
      - id: opinion
        text: "Думка"
      - id: lie
        text: "Неправда"
    correct_logic: "Перерахуй сторінки — перевіряне."
    feedback_success: "Факт! Перерахуй сторінки — число перевіряне."
    feedback_soft_fail: "Сторінки можна перерахувати? Так. Число — факт."

  # ── s24: Quiz — Віра найбільше переживає ───────────────────
  - scene_id: ep002_s24
    question: "«Віра Андріївна переживає за Марка найбільше.» Факт, думка чи неправда?"
    options:
      - id: fact
        text: "Факт"
      - id: opinion
        text: "Думка"
      - id: lie
        text: "Неправда"
    correct_logic: "«Найбільше» — суб'єктивна оцінка."
    feedback_success: "Думка! «Найбільше» — не можна виміряти. Суб'єктивна оцінка."
    feedback_soft_fail: "Чи можна виміряти «найбільше переживає»? Ні — думка."

  # ── s25: Quiz — всі бачили ──────────────────────────────────
  - scene_id: ep002_s25
    question: "«Усі в школі вже бачили повідомлення про Марка.» Факт, думка чи неправда?"
    options:
      - id: fact
        text: "Факт"
      - id: opinion
        text: "Думка"
      - id: lie
        text: "Неправда"
    correct_logic: "Перевіряне: спитай кожного. Знайдеться той, хто не бачив."
    feedback_success: "Неправда! Спитай кожного — знайдеться той, хто не бачив. «Усі» — майже завжди пастка."
    feedback_soft_fail: "Чи можна спитати кожного? Так. Усі до одного бачили? Скоріше ні. Неправда."

  # ── s26: Quiz — 8 континентів ──────────────────────────────
  - scene_id: ep002_s26
    question: "«На Землі 8 континентів.» Факт, думка чи неправда?"
    options:
      - id: fact
        text: "Факт"
      - id: opinion
        text: "Думка"
      - id: lie
        text: "Неправда"
    correct_logic: "Перевіряне — мапа. Не вісім."
    feedback_success: "Неправда! Перевіряне — подивись мапу. Не вісім."
    feedback_soft_fail: "Чи можна порахувати континенти? Так — мапа. Вісім? Ні. Неправда."

  # ── s27: Quiz — чат небезпечніший за шепіт ─────────────────
  - scene_id: ep002_s27
    question: "«Шкільний чат небезпечніший за звичайний шепіт у коридорі.» Факт, думка чи неправда?"
    options:
      - id: fact
        text: "Факт"
      - id: opinion
        text: "Думка"
      - id: lie
        text: "Неправда"
    correct_logic: "Немає «небезпечноміру» — суб'єктивна оцінка."
    feedback_success: "Думка! Немає «небезпечноміру» — суб'єктивна оцінка."
    feedback_soft_fail: "Чи можна виміряти «небезпечніший»? Немає «небезпечноміру» — думка."

  # ── s28: Quiz — щоденник справжній + Правило 2 + Дмитрик ──
  - scene_id: ep002_s28
    question: "«Щоденник Софії — справжній.» Факт, думка чи неправда?"
    options:
      - id: fact
        text: "Факт"
      - id: opinion
        text: "Думка"
      - id: lie
        text: "Неправда"
    correct_logic: "Почерк можна порівняти, щоденник можна торкнутися."
    feedback_success: "Факт! Почерк можна порівняти, щоденник можна торкнутися — перевіряне."
    feedback_soft_fail: "Чи можна перевірити? Порівняй почерк, торкнись щоденника. Якщо перевіряне і підтверджується — факт."
    dialogue_after:
      - who: Софа
        line: "Правило... друге. Неправду можна викрити — бо вона перевіряна. А в суперечці думок переможця немає. Можна сказати «ок, у тебе своя думка» і піти їсти морозиво. Але якщо тобі брешуть — варто перевірити."
      - who: Софа
        line: "Пам'ятай: Уяви: хлопчик Дмитрик прибіг до школи і крикнув: «Завтра уроків не буде!» Усі повірили. Але можна було перевірити — зайти до вчительської, подивитися розклад. Перевірили — неправда. Дмитрик не брехав — сам вірив. Але інформація — все одно неправда. Людина може не брехати — а інформація все одно неправда."

  # ── s29: шепіт на літературі (drama) ───────────────────────
  - scene_id: ep002_s29
    author_text: >
      Останній урок. Віра веде літературу. Читають оповідання про хлопчика,
      який загубив собаку. Марко слухає одним вухом. Друге — ловить шепіт:

      — Чув, Марко — він і раніше таке вигадував...

  # ── s29_sofa ─────────────────────────────────────────────────
  - scene_id: ep002_s29_sofa
    dialogue:
      - who: Софа
        line: "Ще одна неправда. Перевіряне? Так — спитай учителів, батьків. Підтвердиться? Ні — Марко раніше нічого не вигадував. Це фейк чи жарт?"

  # ── s30: Quiz ───────────────────────────────────────────────
  - scene_id: ep002_s30
    question: "«Марко й раніше вигадував.» Фейк чи жарт?"
    options:
      - id: fake
        text: "Фейк"
      - id: joke
        text: "Жарт"
    correct_logic: "Мета — щоб повірили, не посмішити."
    feedback_success: "Фейк! Мета — щоб повірили, а не посмішити."
    feedback_soft_fail: "Чи хоче той, хто говорить, посмішити? Ні — хоче, щоб повірили. Фейк."

  # ── s31: Віра вдруге просить щоденник (drama) ──────────────
  - scene_id: ep002_s31
    author_text: >
      Дзвоник. Віра затримує Марка біля дошки. Рука на плечі — легка, тепла.
    dialogue:
      - who: Віра
        line: "Марку, я розмовляла з твоєю мамою. Вона теж переживає. Ми обидві хочемо тобі допомогти."
      - who: Марко
        line: "Мені не потрібна допомога. Мені потрібно, щоб мені повірили."
      - who: автор
        line: "Віра нахиляється. Голос тихіше:"
      - who: Віра
        line: "А ти сам у це віриш? Ти ВПЕВНЕНИЙ, що в тебе є сестра? Може, тобі просто... здалося?"
    author_text_after: >
      *Марко хоче кивнути. Віра говорить так турботливо. Так м'яко. І ж правда —
      а раптом здалося?*

      Але в рюкзаку — щоденник. З почерком. З малюнком. Із завитками.

      — У мене є доказ, — каже Марко тихо. — Щоденник. З її почерком.

      Віра усміхається. Трохи ширше, ніж зазвичай.

      — Принеси мені його завтра. Я подивлюся. За тебе переживаю.

  # ── s31_sofa ─────────────────────────────────────────────────
  - scene_id: ep002_s31_sofa
    dialogue:
      - who: Софа
        line: "Віра просить щоденник. Удруге. Навіщо?"

  # ── s32: потрійний квіз ──────────────────────────────────────
  - scene_id: ep002_s32
    interactions:
      - question: "Віра двічі просить щоденник. Вона хоче допомогти — чи отримати доступ до доказу?"
        options:
          - id: help
            text: "Хоче допомогти"
          - id: evidence
            text: "Хоче отримати доступ до доказу"
          - id: open
            text: "Ми поки не знаємо"
        correct_logic: "Ми поки не знаємо; але повторення — закономірність."
        feedback_success: "Правильно! Ми поки не знаємо. Але повторення — закономірність. Варто запам'ятати."
        feedback_soft_fail: "У нас поки немає доказів ні за, ні проти. Але повторення — закономірність, яку варто помітити."
      - question: "«Віра Андріївна говорить дуже м'яко.» Факт, думка чи неправда?"
        options:
          - id: fact
            text: "Факт"
          - id: opinion
            text: "Думка"
          - id: lie
            text: "Неправда"
        correct_logic: "«Дуже м'яко» — суб'єктивна оцінка."
        feedback_success: "Думка! «Дуже м'яко» — суб'єктивна оцінка. Немає «м'якоміру»."
        feedback_soft_fail: "Чи можна виміряти «дуже м'яко»? Ні — суб'єктивно. Думка."
      - question: "Ліна сказала: «Вони слухають.» Це перевіряне твердження?"
        options:
          - id: "yes"
            text: "Так — перевіряне"
          - id: "no"
            text: "Ні — думка"
        correct_logic: "Можна перевірити: хто слухає? як? Але ми поки НЕ перевіряли — результат невідомий."
        feedback_success: "Так! Перевіряне — хто слухає? як? Але ми поки НЕ перевіряли — результат невідомий."
        feedback_soft_fail: "Чи можна з'ясувати, ХТО слухає і ЯК? Так — значить, перевіряне. Але перевірка ще попереду."

  # ── s32_choice ───────────────────────────────────────────────
  - scene_id: ep002_s32_choice
    author_text: >
      Віра дивиться вичікувально. Рука все ще поруч. Щоденник — у рюкзаку,
      за кілька сантиметрів від її пальців.
    question: "Віддати щоденник Вірі?"
    options:
      - id: keep
        text: "Притиснути рюкзак і не віддавати"
      - id: give
        text: "Віддати щоденник Вірі"

  # ── s32_keep ─────────────────────────────────────────────────
  - scene_id: ep002_s32_keep
    author_text: >
      Марко притискає рюкзак до грудей. Мовчки. Віра моргає — секунду.
      Потім усміхається, ніби нічого й не було.

      — Ну, подумай. Завтра поговоримо.

      Марко виходить. У рюкзаку — щоденник. Нікому не віддав.

  # ── s32_give ─────────────────────────────────────────────────
  - scene_id: ep002_s32_give
    author_text: >
      Марко вагається. Віра усміхається м'яко — а раптом справді допоможе.
      Він відкриває рюкзак. Дістає щоденник. Кладе Вірі в руки.

      — Дякую, Марку. Розумник.

      Пальці Віри стискаються на обкладинці. Усмішка тримається. Але щось
      усередині Марка відгукується холодком — ніби він щойно відпустив
      нитку, за яку тримався.

      *Щоденник тепер у Віри. Щось пішло. Щось важливе. Можна буде перевірити
      потім: стане краще чи гірше? Поки — лише скалка, і вона гостріша,
      ніж була.*

  # ── s33: Кліфхенгер — Ліна біля воріт ──────────────────────
  - scene_id: ep002_s33
    author_text: >
      Шкільний двір. Сіре небо. Марко виходить — важкий рюкзак, важкий день.

      Біля воріт — Ліна. Стоїть, ніби чекала. Руки в кишенях куртки.
      Дивиться прямо.
    dialogue:
      - who: Ліна
        line: "Ходімо. Мені потрібно дещо тобі розповісти. Про Софію. Про те, як її забирали."
    author_text_after: >
      Марко йде за нею. *Він хоче вірити. Ліна — єдина, хто пам'ятає.
      Єдина нитка. Навіть якщо нитка тонка — вона є.*

      Софа вібрує в кишені. Марко не дістає телефон. Поки не дістає.
