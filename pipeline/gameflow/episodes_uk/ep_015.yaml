    mood: "Софа каже те, що Марко боїться почути"

  # ── s19_end ─────────────────────────────────────────────────
  - scene_id: ep015_s19_end
    author_text: >
      Софа замовкає. Не через батарею. Батарея — шість відсотків. Вистачить на фразу, вистачить на дві. Вистачить.

      Софа замовкає, тому що страшне — вже сказано.

      Число на стіні: 37.

      Марко стоїть між двома плакатами. Два способи переконання. Дві Софії. Одна кричить від страху. Інша рахує ходи.

      Якій вірити? Тій, яка відчуває? Чи тій, яка думає?

      Марко не знає. Вперше — не знає, чому вірити. І Софа не підказує.
    mood: "новий інструмент показав тріщину в сестрі — і Софа боїться власного висновку"
