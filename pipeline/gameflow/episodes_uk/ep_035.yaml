  # ── s01 ─────────────────────────────────────────────────────
  - scene_id: ep035_s01
    author_text: >
      Десятки сірих ниток. Светр Ліни — як павутина. Кожна нитка —
      контакт із Системою. Кожна — звіт.

      Ліна не відступає. Не опускає очей. Стоїть — рівно, як
      на суді.
    dialogue:
      - who: Ліна
        line: "Так. Десятки. Кожна — контакт. Кожна — звіт."
    mood: "не тікає — стоїть рівно"

  # ── s02 ─────────────────────────────────────────────────────
  - scene_id: ep035_s02
    author_text: >
      Ліна дістає блокнот. Маленький, потертий. Обкладинка — сіра.
      Сторінки — охайні, дрібний почерк. Стовпці: дата, місце, що
      сказав Марко, кому довіряв.

      Марко бере блокнот. Руки не тремтять — вони дерев'яні.

      Сторінка перша: день знайомства. «Марко — відкритий. Погоджується
      легко. Довіряє швидко.»

      Сторінка десята: «Розповів про Софу. Показав екран. Не перевірив,
      хто поряд.»

      Остання сторінка: «Він довіряє мені цілковито.»

      Блокнот падає на підлогу. Звук — глухий.
    dialogue:
      - who: Сем
        line: "Вона шпигунка!"
    author_text_after: >
      Марко мовчить. Ноги не тримають. Ліна — єдина, кому він
      довіряв після всього. Довіра була — пасткою?

      Удар у сонячне сплетіння. Кожна сторінка — доказ:
      тебе вивчали.
    mood: "блокнот як дзеркало власної наївності"

  # ── s03 ─────────────────────────────────────────────────────
  - scene_id: ep035_s03
    author_text: >
      Сем смикає Марка за рукав. Очі палають. Лють восьмирічного —
      проста і швидка.
    dialogue:
      - who: Сем
        line: "Жени її! Одразу! Я ж казав — шпигунка!"
    author_text_after: >
      Хочеться кивнути. Погодитися із Семом. Кричати. Але злість —
      кепський порадник.

      Перш ніж виганяти — треба розібратися: ЧОМУ Марко взагалі
      їй вірив? На що він спирався?
    mood: "спокуса погодитися з люттю Сема — без аналізу"
    question: "Що робить Марко?"
    options:
      - id: figure_out
        text: "Стоп. Спочатку розберуся, ЧОМУ я їй вірив."
      - id: agree_with_sem
        text: "Ти маєш рацію, Семе! Я тобі більше ніколи не повірю!"

  # ── s03b ────────────────────────────────────────────────────
  - scene_id: ep035_s03b
    dialogue:
