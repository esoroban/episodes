      Вирішив — без аналізу. Знову. Та сама стара слабкість,
      що годину тому: погодився з тим, хто сказав останнім.

      Тільки тепер не Ліна — а Сем. Слова різні, помилка одна.

      Марко видихає. Повертається.
    mood: "погодився з останнім — знову. Слабкість не зникла, перевдяглася"

