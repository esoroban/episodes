      «Перш ніж виженеш — прочитай.»

      Вона дістає з внутрішньої кишені складений аркуш — тонкий,
      потертий, зі слідами багатьох разів складання. Передає
      Маркові.

      Марко розгортає.

      Почерк. Знайомий. Завитки на «д» і «у». Той самий, що в
      щоденнику Софії. Той, який Марко знає напам'ять.

      «Брате, якщо ти це читаєш — отже, я не встигла сама. Ліна —
      моя людина. Не Голосу. Я попросила її стежити за тобою.
      Захищати. Довіряй їй. Але перевіряй.»

      Підпис: «С.»

      Та сама літера, що на ліхтарі Сема. Та сама — що на дзеркалі Ліни.
    mood: "почерк Софії — впізнаний напам'ять"

