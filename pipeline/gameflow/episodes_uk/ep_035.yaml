  # ── s05 ─────────────────────────────────────────────────────
  - scene_id: ep035_s05
    author_text: >
      АВТОРИТЕТ. Людина, якій ми довіряємо. Тому що допомагала.
      Тому що була поряд. Тому що знала те, чого інші не знали.

      Однак авторитет і компетентність — різні речі.

      КОМПЕТЕНТНІСТЬ. Коли людина реально розбирається САМЕ
      в цій темі. Вчилася. Працює. Має досвід.

      ХИБНИЙ АВТОРИТЕТ. Коли авторитет є — а компетентності немає.
      Як гарна обгортка на порожній коробці. Відомий, шанований —
      але в ЦІЙ темі не розбирається.

      Дві умови доречного посилання: людина компетентна в цій
      галузі + інші фахівці згодні.

      Дві ознаки пастки: говорить не про свою галузь + узагалі
      не експерт.

      Головне: КОМПЕТЕНТНІСТЬ НЕ ПЕРЕНОСИТЬСЯ з теми на тему. Гарний
      футболіст — не лікар. Гарний співак — не дієтолог.
    mood: "карта інструмента — три поняття поряд"

