  # ── s01 ─────────────────────────────────────────────────────
  - scene_id: ep013_s01
    author_text: >
      Марко блукає. Після Леона, після Віри, після числа 40 — ноги йдуть самі. Провулки Дзеркального Міста однакові, як копії однієї сторінки. Дзеркала на стінах — але Марко більше не дивиться в них. Досить відображень.

      Глухий кут. Стіна попереду, стіни по боках. І — дзеркало. Велике, на весь зріст. Але в ньому — не провулок.

      Кухня.

      Їхня кухня. Жовті фіранки з соняшниками. Холодильник із магнітами з Одеси. Марко знає кожен сантиметр.

      За столом — мама.
    mood: "впізнавання — дім крізь скло"
    question: "Що робить Марко?"
    options:
      - id: approach
        text: "Підійти до дзеркала"
      - id: back
        text: "Відступити на крок — придивитись"

  # ── s01b ─────────────────────────────────────────────────────
  - scene_id: ep013_s01b
    author_text: >
      Марко відступає на крок. Рама дзеркала — дерев'яна, темна. Наче хтось спеціально приніс його сюди й поставив у глухому куті. Не миготить, не тремтить — тримає кухню рівно, як скло у вікні. По краях — дрібні подряпини. Хтось уже підходив. Хтось уже дивився.

      Тиша. У провулку — ні кроків, ні дихання. Тільки кухня по той бік. І мама, яка ще не помітила.
    mood: "дзеркало поставлено — не випадково"

