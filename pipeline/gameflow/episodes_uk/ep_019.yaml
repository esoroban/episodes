  - scene_id: ep019_s01
    author_text: >
      Марко стоїть перед дзеркалом-порталом. Востаннє воно показувало маму — і мама прогнала його. Сказала «не приходь». Ударила по дзеркалу.

      Тріщина на склі — досі тут. Але за тріщиною — кухня. Мамин стілець. Мамина чашка.

      Мама.

      Марко торкається скла. Портал оживає. Тріщина світиться.
