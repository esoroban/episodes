  # ── s01 ─────────────────────────────────────────────────────
  - scene_id: ep039_s01
    author_text: >
      Вежа Голосу. Софа сказала — і виявилася правою. Скляна голка
      на горизонті. Найвища будівля Міста. Видно звідусіль — удень
      вона ловить небо, вночі світиться зсередини. Знизу не розгледіти
      верх — губиться в хмарах.

      Підійти до неї просто: ідеш на найяскравіше світло — приходиш
      до вежі. Сем знайшов службовий вхід із заднього боку. Замок —
      звичайний.

      Двадцять три поверхи. Сходи — вузькі, бетонні, без ліфта.
      Стіни — сіре скло. За ними — Місто йде вниз, усе дрібніше.

      Двадцять третій поверх. Марко дихає важко. Сем — на два
      прольоти нижче, чатує.

      Двері. Скляні. За ними — кімната. Стіни — скло. Підлога —
      скло. Стеля — скло. І в центрі — Софія.

      Марко притискає долоню до скла. Сестра. Жива. Справжня.

      Ліве око — каре. Рідне. Праве — СІРЕ. Як дзеркало. Як Місто.

      Половина сестри — вже Голос.
    mood: "сестра — але не вся"

  # ── s02 ─────────────────────────────────────────────────────
  - scene_id: ep039_s02
    author_text: >
      Марко дістає Дзеркало Повторень. Те саме, з майстерні Леона.
      У Місті воно майже весь час мовчало — тут усе разове, зроблене
      під одного глядача. Але зараз Марко піднімає його до скла.

      У маленькому диску — відображення Софії. Те, що в ній «завжди»:
      карі очі. Ті самі, з дитинства. Ластовиння над лівою бровою.
      Звичка трохи прикушувати губу.

      Сіре око — не «завжди». Сіре — нове, чуже. Не було в ній
      раніше. Дзеркало Повторень показує лише те, що в Софії
      повторюється давно, — і це її. Каре. Справжнє.

      Сіре — Голос. Софія — там. Під ним, але не він.
    mood: "Дзеркало Повторень показує «завжди» — сіре чуже, не було в ній раніше"

  # ── s03 ─────────────────────────────────────────────────────
  - scene_id: ep039_s03
    author_text: >
      Софія підіймає голову. Дивиться на Марка. Розкриває рот. Але
      слова — чужі.
    dialogue:
      - who: София
        line: "Коли ти перестав вірити мені, Марку?"
      - who: София
        line: "Чому ти кинув друзів і прийшов один?"
      - who: София
        line: "Ти все ще брешеш собі, що можеш врятувати всіх?"
    author_text_after: >
      Тон — не її. Як лялька, яку смикають за нитки. Кожне питання —
      як гачок. Хочеться відповісти. Однак будь-яка відповідь
      затягує глибше.

      Софія притискає долоню до скла. Зсередини. Навпроти долоні
      Марка. Скло між ними — холодне.
    mood: "сестра говорить словами Голосу — кожне питання пастка"

