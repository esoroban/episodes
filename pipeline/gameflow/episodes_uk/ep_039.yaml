      карим. Голос — її, справжній, тихий:
    dialogue:
      - who: София
        line: "Марку, не відповідай на його питання. Запитуй СВОЇ."
    author_text_after: >
      Праве око — знову сіре. Остаточно. Софія відходить від
      скла. Іде вглиб кімнати. У темряву.
    mood: "сестра передала ключ — і пішла"

  # ── s23 ─────────────────────────────────────────────────────
  - scene_id: ep039_s23
    dialogue:
      - who: Софа
        line: "Критичний стан. Половина сестри — вже Голос."
      - who: Софа
        line: "Вежу охороняють не замки — люди. Софія сказала: запитуй свої питання. Вона підказала шлях."
    mood: "Софа маркує наступний рівень — мова як інструмент"

  # ── s24 ─────────────────────────────────────────────────────
  - scene_id: ep039_s24
    author_text: >
      Сем з'являється на сходах. Обличчя мокре. Біг.
    dialogue:
      - who: Сем
        line: "Марку, унизу — рух. Стражники."
    mood: "запас часу — коротший, ніж здавалося"

  # ── s25_end ─────────────────────────────────────────────────
  - scene_id: ep039_s25_end
    author_text: >
      Софія за склом. Половина — вже Голос. Вона сказала: запитуй
      свої питання. Не відповідай — запитуй. Вежу охороняють люди.
      Не замки, не коди — люди, які бояться Голосу більше, ніж
      Марка.

      Щоб пройти — потрібні слова. Але які?
    mood: "кінець: питання вперед — якими словами йти"
