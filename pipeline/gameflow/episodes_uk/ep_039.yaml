    mood: "поквапився — голос крові сильніший за інструмент"

  # ── s06 ─────────────────────────────────────────────────────
  - scene_id: ep039_s06
    author_text: >
      Перший тип хитрих питань — СКЛЕЄНЕ ПИТАННЯ (його називають
      «складним»). Це коли в одному питанні склеїли одразу кілька
      різних тем.

      Приклад: «Чому ти не зробив домашку, спізнився і забув зошит?»
      Це не одне питання, а три. Їх навіщось склеїли разом.

      Правило просте: одне питання — одна тема. Якщо склеїли —
      розділи і відповідай по черзі. Чарівна фраза: «Давай по
      порядку.»

      Другий тип — ПИТАННЯ-ПАСТКА. Усередині сховане якесь
      твердження, яке ти ніби вже прийняв.

      Приклад: «Ти вже перестав брехати?» Скажеш «так» — означає,
      раніше брехав. Скажеш «ні» — означає, брешеш досі. Будь-яка
      відповідь — пастка.

      Це як мишоловка. Сир видно — це питання. Пружина не видно —
      це сховане твердження.

      Слова-підказки, що всередині пастка: «ти вже перестав…»,
      «чому ти завжди…», «коли ти нарешті…».

      ТРИ КРОКИ, щоб вибратися: один — знайди сховане твердження;
      два — скажи, що воно неправильне; три — лише потім відповідай.

      Чарівна фраза: «Твоє питання стверджує, що я… Але це не так.»
    mood: "карта інструмента: два типи + техніка трьох кроків"

