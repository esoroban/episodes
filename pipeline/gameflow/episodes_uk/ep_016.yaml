        line: "Тест..."
      - who: Марко
        line: "Вона перевіряє. Чи навчився я. Чи побачу, що кожен плакат — на одній ніжці."
      - who: Софа
        line: >
          Якщо це тест... отже, вона знає, що ти тут. Знає, що ти вчишся. Хтось їй передає.
      - who: Софа
        line: >
          У Місті є... інші. Ті, кого Голос не контролює. Підпілля.
      - who: Софа
        line: "Софія побудувала більше, ніж ми думали."
    mood: "вперше — «інші»"

  # ── s23_end ─────────────────────────────────────────────────
  - scene_id: ep016_s23_end
    author_text: >
      Марко озирається. Провулок порожній. Стіни. Бетон. Ні дзеркал, ні плакатів — крім двох.

      І тут — з темряви — звук. Не слово. Не крок. Просто — повітря зсунулось. Наче хтось, хто стояв дуже тихо, повернув голову.

      Марко завмирає.

      Число на стіні: 36.

      Хтось спостерігає. Хтось, кого Марко не бачить. Хтось, хто знає про нього більше, ніж він — про себе.

      І цей хтось — не Голос.
    mood: "вперше — не ворог, але й не свій"
