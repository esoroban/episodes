  # ── s01 ─────────────────────────────────────────────────────
  - scene_id: ep029_s01
    author_text: >
      Ранок. Марко не спав.

      Число на стіні: 24. Не змінилося. Софа тихо блимає в кишені.

      Сем поряд — серйозний, як маленький дорослий. Теж не спав.
    mood: "тиша перед хвилею звуку"

  # ── s02 ─────────────────────────────────────────────────────
  - scene_id: ep029_s02
    author_text: >
      Динаміки по всьому Місту. Одночасно. Голос Рея — гарний,
      упевнений, з тією самою інтонацією, яка змушує людей кивати.
    dialogue:
      - who: Рей
        line: "Мешканці Дзеркального Міста! Серед нас — хлопчик. Його звати Марко. І він хоче ЗНИЩИТИ наш дім."
      - who: Рей
        line: "Він ненавидить наш спокій. Він вважає, що ВСІ мають піти. Він хоче, щоб Місто перестало існувати."
    author_text_after: >
      Марко завмирає. Ноги — до підлоги. Руки — холодні.

      Він казав: «Я хочу забрати сестру.» Забрати. Сестру. Два слова.

      Натовп на площі аплодує. Марко чує оплески крізь стіну.
    mood: "його слова в чужому роті — перекручені"

