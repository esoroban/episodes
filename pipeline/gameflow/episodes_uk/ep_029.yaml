    author_text: >
      Марко тримає записку. Дрібний округлий почерк сестри. Шість слів.
      «Послухай запис 11.»

      Сем дивиться на Марка. «Що таке запис 11?»

      Марко: «Не знаю. Однак Софія залишила це для мене. Вона знала, що
      я прийду сюди.»

      Динаміки тривають. Голос Рея — упевнений, гарний, чужий.
      Натовп аплодує опудалу. Ніхто не чув справжніх слів Марка.

      Однак Марко тепер знає: крик — не відповідь. Відповідь — точність.

      Число на стіні: 24.

      Опудало стоїть на площі. Натовп б'є його палицями. Аплодує.
      А справжній лицар — тут, у підвалі, із запискою сестри в руці.

      Слова можна перекрутити. Однак правду — ні. Правда чекає того,
      хто буде точним.
    mood: "кінець дня 8.1 — сестра на наступному кроці"
