  - scene_id: ep029_s03
    dialogue:
      - who: Сем
        line: "Ти справді хочеш знищити Місто?"
    author_text_after: >
      Очі Сема — перелякані. Вісім років. Вірить кожному динаміку.
    mood: "Сем вірить динамікам — Марко обирає, як відповісти"
    question: "Що робить Марко?"
    options:
      - id: explain_calmly
        text: "Пояснити точно: «Я сказав — забрати сестру. Не знищити. Не всіх.»"
      - id: shout_back
        text: "Накричати: «Це все неправда!»"

