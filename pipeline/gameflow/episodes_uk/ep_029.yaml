  # ── s05 ─────────────────────────────────────────────────────
  - scene_id: ep029_s05
    author_text: >
      ЛИЦАР І СОЛОМ'ЯНЕ ОПУДАЛО. Один лицар хоче перемогти іншого.
      Однак справжній лицар — сильний. Тому беруть солому, набивають
      опудало, одягають у лати — і б'ють ЙОГО. Побили опудало. Оголосили
      перемогу. А справжній лицар стоїть цілий.

      ОПУДАЛО — коли чужі слова перекрутили, щоб легше сперечатися.
      Рей не сперечається зі справжніми словами Марка. Він поставив
      опудало — і побив його.

      Чотири способи зробити опудало.

      ПЕРЕБІЛЬШЕННЯ — роздути. «Трохи» → «завжди». «Іноді» →
      «щодня». Маленьке бажання доводять до абсурду.

      СПРОЩЕННЯ — обрізати. Прибирають важливу деталь — і сенс
      змінюється. «Хочу забрати сестру» → «хоче, щоб усі пішли».

      ДОДАВАННЯ — приписати. Додають те, чого людина взагалі не
      казала. «Ненавидить спокій» — Марко цього не казав.

      ЗМІНА СЕНСУ — вивернути навиворіт. «Забрати сестру» →
      «знищити Місто». Була турбота — стала агресія.

      Сигнал: коли відчуваєш «Я ЦЬОГО НЕ КАЗАВ!» — отже, перед
      тобою опудало.

      Усі ці прийоми — одна родина. ДЕМАГОГІЯ. Коли граються
      словами, щоб ти погодився, а не щоб зрозуміти правду.
    mood: "карта прийому — чотири способи + демагогія як парасолька"

