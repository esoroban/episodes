episode_id: 8
episode_title: "Ляльковод"
lang: uk
terms_introduced: ["третя причина"]
terms_used: ["причина", "наслідок", "збіг", "після — не значить тому", "закономірність", "повторюваність", "світлофор повторень", "факт", "думка", "детектив правди"]

scenes:

  # ── s01 ─────────────────────────────────────────────────────
  - scene_id: ep008_s01
    author_text: >
      Число на стіні: 43.

      Марко не торкався Дзеркала. Воно лежить у рюкзаку, загорнуте в куртку, застебнуте на блискавку. Дві години — не діставав. Не дивився. Навіть не відкривав рюкзак.

      А число — впало.

      Холод у пальцях. Той самий, що був раніше, — але інший. Раніше Марко знав, звідки холод. Тепер — не знає.

      Ліна стоїть поруч. Бліда. Руки в кишенях. Мовчить.
    mood: "невідома загроза"

  # ── s02 ─────────────────────────────────────────────────────
  - scene_id: ep008_s02
    dialogue:
      - who: Марко
        line: "Ти знала?"
      - who: автор
        line: "Ліна не відповідає. Дивиться на число. Потім — на Марка. Потім — знову на стіну."
      - who: Лина
        line: "Я думала, це тільки артефакти."
      - who: Марко
        line: "Я не використовував Дзеркало."
      - who: Лина
        line: "Я знаю."
      - who: Марко
        line: "То хто?"
      - who: автор
        line: >
          Ліна мовчить. Це не те мовчання, коли не хочуть говорити. Це коли не знають.
      - who: автор
        line: >
          Марко сідає на підлогу біля стіни. Рюкзак — поруч. Дзеркало всередині мерехтить крізь тканину — слабко, ледь помітно. Ніби дихає.
      - who: Марко
        line: >
          Раніше все було просто. Я використовую Дзеркало — число падає. Причина і наслідок. Мотузка: смикни один кінець — інший поворухнеться. Але я не смикав.
      - who: автор
        line: "Ліна сідає поруч. Не близько. На відстані витягнутої руки."
      - who: Лина
        line: "Може, стіна помиляється."
      - who: Марко
        line: "Стіна не помилялася раніше. 47, 46, 44, 43. Щоразу — точно."
      - who: Лина
        line: "Тоді хтось інший використовує артефакт."
      - who: Марко
        line: "Хто?"
      - who: автор
        line: >
          Ліна мовчить. Заноза. Та сама, що була. Тільки тепер вона глибше — не між ребрами, а десь за ними. Марко відчуває: Ліна знає більше, ніж каже. Але не все. Вона теж не розуміє.
      - who: автор
        line: "Софа вібрує. Довга вібрація. Дві короткі. Ще одна довга."
    mood: "картинка більша, ніж здавалося"

  # ── s03a_sofa ────────────────────────────────────────────────
  - scene_id: ep008_s03a_sofa
    author_text: "Марко дістає телефон."
    dialogue:
      - who: Софа
        line: "Ти не використовував Дзеркало. Число впало."
      - who: Софа
        line: "Питання: Дзеркало — єдина причина падіння?"
    mood: "питання без відповіді"

  # ── s03 ─────────────────────────────────────────────────────
  - scene_id: ep008_s03
    author_text: >
      Марко сидить, опустивши телефон. «Не єдина причина» — це він промовляє про себе. Отже, десь є інша. Або третя. І спливає в пам'яті те, що розповідав на дачі дід: «Бачиш, як ластівки літають низько? На дощ.»

      Спочатку Марко думав — ластівки кличуть дощ. Але дід сміявся: «Ні. Вони не винні. Перед дощем повітря стає вологим і важким. Мошки не можуть літати високо — опускаються. А ластівки летять за мошками, бо голодні.» Ластівки і дощ — не пов'язані напряму. Їх обох викликає одне й те саме. Вологе повітря.

      У нього є слово — ТРЕТЯ ПРИЧИНА. Коли дві події йдуть поруч, і здається, що одна викликає іншу, — а насправді обидві викликає щось третє, приховане.

      Марко уявляє: ляльковод за ширмою. Одна рука смикає мотузочку артефактів. Інша — мотузочку системи. А знизу ляльки думають, що рухаються самі.

      Він не використовував Дзеркало — а число впало. Отже, у стирання є не одна мотузочка. Отже, десь стоїть ляльковод.
    mood: "ляльковод розкривається"

  # ── s03b_sofa ────────────────────────────────────────────────
  - scene_id: ep008_s03b_sofa
    dialogue:
      - who: Софа
        line: "Запиши. ТРЕТЯ ПРИЧИНА."
      - who: Софа
        line: "Ляльковод за ширмою. Дві мотузочки."
      - who: Софа
        line: "Тепер — перевіримо на прикладах."
    mood: "термін закріплено"

  # ── s04 ─────────────────────────────────────────────────────
  - scene_id: ep008_s04
    interactions:
      - interaction_type: vote
        question: "Ластівки літають низько, потім дощ. Ластівки викликають дощ?"
        options:
          - {id: yes, text: "Так"}
          - {id: third, text: "Ні — обидві події викликані вологим повітрям (третя причина)"}
        correct_logic: "Обидві події викликані вологим повітрям — третьою причиною."
        feedback_success: "Ні! Вологе повітря — ляльковод. Він смикає за обидві мотузочки."
        feedback_soft_fail: "Забери ластівок — чи піде дощ? Так. Отже, ластівки — не причина."
      - interaction_type: vote
        question: "Морозиво викликає сонячні опіки?"
        options:
          - {id: yes, text: "Так"}
          - {id: third, text: "Ні, третя причина — спека"}
        correct_logic: "Спекотно — купують морозиво; спекотно — лежать на пляжі й обгорають."
        feedback_success: "Спека — ляльковод! Спекотно — морозиво. Спекотно — пляж. Спекотно — опіки."
        feedback_soft_fail: "Забери морозиво — опіки зникнуть? Ні. Що спільне?"
      - interaction_type: vote
        question: "Люди купують більше парасольок І більше гумових чобіт. Парасольки викликають купівлю чобіт?"
        options:
          - {id: yes, text: "Так"}
          - {id: third, text: "Ні, третя причина — дощ"}
        correct_logic: "Дощ — ляльковод, що смикає за обидві мотузочки."
        feedback_success: "Дощ! Ляльковод смикає за обидві мотузочки: парасолька І чоботи."
        feedback_soft_fail: "Парасольки змушують купувати чоботи? Або щось третє?"
      - interaction_type: vote
        question: "Я лягаю спати — надворі темніє. Моє ліжко вимикає сонце?"
        options:
          - {id: yes, text: "Так"}
          - {id: third, text: "Ні, третя причина — час доби"}
        correct_logic: "Вечір настає — і ти лягаєш, і надворі темніє."
        feedback_success: "Вечір! Час доби — ляльковод. І ти лягаєш, і темніє."
        feedback_soft_fail: "Не лягай — чи перестане темніти? Ні. Що викликає обидві події?"
      - interaction_type: vote
        question: "Взимку люди носять шапки І п'ють гарячий чай. Шапки викликають спрагу чаю?"
        options:
          - {id: yes, text: "Так"}
          - {id: third, text: "Ні, третя причина — холод"}
        correct_logic: "Мороз — і шапку вдягаєш, і чаю хочеться."
        feedback_success: "Холод — ляльковод! Він смикає і за шапку, і за чашку."
        feedback_soft_fail: "Зніми шапку — перестанеш хотіти чай? Ні. Що спільне?"
      - interaction_type: vote
        question: "Марко використовував Дзеркало — число впало. Марко не використовував — число теж впало. Дзеркало — єдина причина?"
        options:
          - {id: yes, text: "Так, Дзеркало — причина"}
          - {id: no, text: "Ні — є щось іще"}
        correct_logic: "Якщо забрати Дзеркало — число однаково падає; отже, є щось іще."
        feedback_success: "Ні! Сховав Дзеркало — число однаково падає. Є ляльковод."
        feedback_soft_fail: "Ти не торкався Дзеркала — число впало. Дзеркало — єдина причина?"
    mood: "третя причина — практика"

  # ── s05 ─────────────────────────────────────────────────────
  - scene_id: ep008_s05
    dialogue:
      - who: Софа
        line: >
          Шукай ляльководця. Хто смикає за обидві мотузочки? Хто змушує І артефакти стирати, І число падати без артефактів?
      - who: Марко
        line: "Система. Голос."
      - who: автор
        line: "Довга пауза. Екран блимає."
      - who: Софа
        line: >
          Голос... контролює... стирання. Артефакти — один інструмент. Але не єдиний. Система стирає сама — за своїми правилами. Ти — одна мотузочка. Система — інша. Голос — ляльковод.
    question: "Хто може бути ляльководцем — тим, хто смикає за обидві мотузочки (артефакти й автоматичне стирання)?"
    options:
      - {id: marko, text: "Марко — він стирає, коли використовує Дзеркало"}
      - {id: voice, text: "Головна гіпотеза — Голос: він у Місті головний, артефакти і система під його контролем"}
      - {id: lina, text: "Ліна"}
    correct_logic: "Доказів «Голос створив ОБІ системи» у Марка поки немає. Але: Голос — єдина сила, яка контролює Місто; артефакти і стирання існують у його Місті. Це сильна гіпотеза, а не доведений факт. Тримаємо як головну версію."
    feedback_success: "Головна гіпотеза — Голос. Це ще не доведено, але єдиний, хто підходить за масштабом."
    feedback_soft_fail: "Хто в Місті достатньо сильний, щоб керувати обома механізмами? Це поки гіпотеза."
    mood: "розкриття ляльководця"

  # ── s06 ─────────────────────────────────────────────────────
    dialogue_after:
      - who: Софа
        line: "Правило... восьме. ТРЕТЯ ПРИЧИНА — коли дві події здаються пов'язаними, але їх обидві викликає щось третє, приховане. Щоб знайти ляльковода — запитай: \"А що СПІЛЬНОГО стоїть за обома подіями?\""
  - scene_id: ep008_s06
    author_text: >
      Марко встає. Дивиться на число: 43. Дивиться на Ліну.
    dialogue:
      - who: Марко
        line: >
          Я зрозумів. Я думав, що я стираю пам'ять. Щоразу, коли використовую Дзеркало — мінус одна людина. І це правда. Але це не ВСЯ правда. Система стирає і без мене. Голос смикає за дві мотузочки: артефакти — одна, автоматичне стирання — інша.
      - who: Лина
        line: "Звідки ти знаєш?"
      - who: Марко
        line: "Дві години. Рюкзак застебнутий. Число впало. Хтось стирає — і це не я."
      - who: автор
        line: "Ліна відводить погляд."
      - who: Лина
        line: "Мені... потрібно щось сказати."
    author_text_after: "Телефон вібрує. Перериває."
    mood: "пропаганда — і втручання"

  # ── s06_sofa ─────────────────────────────────────────────────
  - scene_id: ep008_s06_sofa
    dialogue:
      - who: Софа
        line: "Тренування. Перш ніж слухати Ліну — перевір, чи вмієш шукати ляльководця. Швидко."
      - who: Софа
        line: "Коли хтось каже «подивись — два факти поруч, отже, роби так!» — вмикай детектива."
      - who: Софа
        line: "Запитай: «А може, тут третя причина? Може, є ляльковод, якого я не бачу?»"
    mood: "чат перериває розмову"

  # ── s07 ─────────────────────────────────────────────────────
  - scene_id: ep008_s07
    interactions:
      - interaction_type: vote
        question: "«Усі чемпіони п'ють наш напій! Пий — станеш чемпіоном!» Причина справжня чи пастка третьої причини?"
        options:
          - {id: real, text: "Справжня причина"}
          - {id: trap, text: "Пастка — третя причина: тренування"}
        correct_logic: "Чемпіони перемагають завдяки тренуванням, а не напою."
        feedback_success: "Пастка! Тренування — ось третя причина. Реклама ховає ляльководця."
        feedback_soft_fail: "Забери напій — чемпіон перестане перемагати? Або справа в тренуваннях?"
      - interaction_type: vote
        question: >
          «У Петі новий телефон — і в нього купа друзів!» Відомо ще: Петя веселий і товариський, і до нового телефона в нього теж було багато друзів. Реклама каже: «Попроси такий самий.» Причина справжня, пастка або даних поки мало?
        options:
          - {id: real, text: "Справжня — телефон причина"}
          - {id: trap, text: "Пастка — у Петі була купа друзів ще до телефона, причина в характері"}
          - {id: unknown, text: "Даних не вистачає"}
        correct_logic: "В умові є прямий факт: «до телефона в Петі теж було багато друзів». Отже телефон — не причина, третя причина (характер) є."
        feedback_success: "Пастка! В умові сказано: друзі були і до телефона. Отже, справа не в ньому."
        feedback_soft_fail: "До телефона в Петі було багато друзів чи ні? Це є в умові. Подивись ще раз."
      - interaction_type: vote
        question: >
          «Ти прийшов — і ваза впала! Це через тебе!» Відомо: ваза стояла на самому краю полиці, її хитав вітер. Реальна причина, пастка чи даних мало?
        options:
          - {id: real, text: "Справжня — ти причина"}
          - {id: trap, text: "Пастка — ваза хиталася на краю, впала б сама"}
          - {id: unknown, text: "Даних не вистачає"}
        correct_logic: "В умові прямо сказано: ваза стояла на краю і її хитало. Отже третя причина (вітер + положення вази) вже була."
        feedback_success: "Пастка! В умові є відповідь: ваза хиталася на краю. Ти просто підвернувся."
        feedback_soft_fail: "Де в умові сказано про саму вазу? Що було ДО тебе?"
      - interaction_type: vote
        question: >
          «Всі хлопці з шахового гуртка отримують хороші оцінки!» Відомо ще: до гуртка беруть тільки тих, хто любить думати й уже добре вчиться. Реклама каже: «Запишись — будуть оцінки.» Реальна причина, пастка чи мало даних?
        options:
          - {id: real, text: "Справжня — гурток покращить оцінки"}
          - {id: trap, text: "Пастка — до гуртка беруть уже сильних учнів"}
          - {id: unknown, text: "Даних не вистачає"}
        correct_logic: "В умові прямо сказано: відбір йде серед тих, хто й так добре вчиться. Отже причина оцінок — не гурток, а відбір."
        feedback_success: "Пастка! В умові є відбір: до гуртка беруть сильних. Оцінки хороші — від відбору."
        feedback_soft_fail: "Хто потрапляє до гуртка? Вже сильні учні чи будь-які? Це сказано в умові."
      - interaction_type: vote
        question: "«Не полив квітку — квітка засохла.» Причина чи пастка?"
        options:
          - {id: real, text: "Справжня причина — забери воду, квітка засохне"}
          - {id: trap, text: "Пастка третьої причини"}
        correct_logic: "Забери воду — квітка засохне; зв'язок прямий, без ляльководця."
        feedback_success: "Справжня причина! Забери воду — квітка засохне. Прямий зв'язок."
        feedback_soft_fail: "Є ляльковод? Або зв'язок прямий: немає води → засихає?"
    mood: "швидке тренування — пастка/причина"

  # ── s08 ─────────────────────────────────────────────────────
  - scene_id: ep008_s08
    dialogue:
      - who: автор
        line: "Марко зупиняється. Дихає. Дивиться на стіну."
      - who: Марко
        line: >
          Чим більше пожежників приїздить на пожежу, тим більше руйнувань. Пожежники винні?
      - who: Лина
        line: "Що?"
      - who: Марко
        line: >
          Ні. Третя причина — розмір пожежі. Велика пожежа — багато пожежників. Велика пожежа — багато руйнувань. Пожежники не винні.
      - who: автор
        line: "Пауза."
      - who: Марко
        line: >
          Як і я. Я використовував Дзеркало — число падало. Але число падає і без мене. Ми обидва — мотузочки. А ляльковод — Голос. Система стирає не ТОМУ ЩО я використовую артефакти. Система стирає, бо вона так влаштована. Артефакти — просто один зі способів.
      - who: автор
        line: >
          Тяжкість. Не полегшення — тяжкість. Бо якщо Голос стирає і без артефактів, значить, ховати Дзеркало марно. Значить, число буде падати. 43. 42. 41. Далі. Нижче. Поки не залишиться нуль.
    mood: "усвідомлення масштабу"

  # ── s09 ─────────────────────────────────────────────────────
  - scene_id: ep008_s09
    dialogue:
      - who: Софа
        line: "Швидкий раунд. Причина, збіг або третя причина?"
    interactions:
      - interaction_type: vote
        question: "Кинув м'яч у вікно — скло розбилося."
        options:
          - {id: cause, text: "Причина"}
          - {id: coincidence, text: "Збіг"}
          - {id: third, text: "Третя причина"}
        correct_logic: "Забери м'яч — скло ціле. Пряма причина."
        feedback_success: "Причина! Забери м'яч — вікно ціле."
        feedback_soft_fail: "Забери м'яч — скло розіб'ється? Якщо ні — м'яч і є причина."
      - interaction_type: vote
        question: "Свиснув — повз проїхав поїзд."
        options:
          - {id: cause, text: "Причина"}
          - {id: coincidence, text: "Збіг"}
          - {id: third, text: "Третя причина"}
        correct_logic: "Поїзд поїхав за розкладом. Свисток — збіг."
        feedback_success: "Збіг! Поїзд поїхав за розкладом."
        feedback_soft_fail: "Не свисти — поїзд залишиться? Він за розкладом."
      - interaction_type: vote
        question: "Птахи співають І люди йдуть на роботу."
        options:
          - {id: cause, text: "Причина"}
          - {id: coincidence, text: "Збіг"}
          - {id: third, text: "Третя причина — ранок"}
        correct_logic: "Ранок — ляльковод: і птахи співають, і люди виходять."
        feedback_success: "Третя причина — ранок! Ляльковод смикає за обидві мотузочки."
        feedback_soft_fail: "Птахи женуть людей на роботу? Або щось третє?"
      - interaction_type: vote
        question: "Не поснідав — до обіду голодний."
        options:
          - {id: cause, text: "Причина"}
          - {id: coincidence, text: "Збіг"}
          - {id: third, text: "Третя причина"}
        correct_logic: "Забери сніданок — голод. Пряма причина."
        feedback_success: "Причина! Забери сніданок — голод."
        feedback_soft_fail: "Поснідай — чи будеш голодним? Ні. Отже..."
    mood: "швидкий раунд"

  # ── s09_choice ───────────────────────────────────────────────
  - scene_id: ep008_s09_choice
    author_text: >
      Ліна відкриває рот — і закриває. Слова — на кінчику язика, але не сходять. Марко пам'ятає, як вона сказала: «Мені... потрібно щось сказати.» Це було до тренування Софи. До ляльководця.
    question: "Що робить Марко?"
    options:
      - id: press
        text: "«Розповідай зараз. Я слухаю.»"
      - id: wait
        text: "«Коли будеш готова — скажи. Я поруч.»"
    mood: "тиск vs простір"

  # ── s09c_press ───────────────────────────────────────────────
  - scene_id: ep008_s09c_press
    author_text: >
      Марко випрямляється. Голос — рівний, прямий: «Розповідай зараз. Я слухаю.» Ліна блимає. Такого Марка раніше не було. Не грубого, не різкого — вимогливого. Вона вдихає.
    mood: "детектив увімкнувся"

  # ── s09c_wait ────────────────────────────────────────────────
  - scene_id: ep008_s09c_wait
    author_text: >
      Марко опускає плечі. Голос тихіший: «Коли будеш готова — скажи. Я поруч.» Ліна дивиться на нього. Довго. Ніби вперше бачить. Потім — повільно — дістає руки з кишень. На зап'ясті — сіра нитка. Показує сама.
    mood: "простір — і довіра"

  # ── s10 ─────────────────────────────────────────────────────
  - scene_id: ep008_s10
    dialogue:
      - who: Лина
        line: "Марко..."
      - who: Марко
        line: "Ти хотіла щось сказати."
      - who: автор
        line: >
          Ліна дістає руки з кишень. На зап'ясті — сіра нитка. Та сама, яку Марко помітив раніше. Ліна бачить, що він дивиться. Не ховає.
      - who: Лина
        line: >
          Я знала, що система стирає сама. Не знала, що це третя причина. Думала — артефакти і система працюють окремо. Але вони... одне ціле.
      - who: Марко
        line: "Звідки ти знала?"
      - who: автор
        line: "Ліна мовчить. Потім:"
      - who: Лина
        line: >
          Софія мені розповіла. До зникнення. Вона казала: «Артефакти — приманка. Справжнє стирання йде по-іншому. Але люди дивляться на артефакти й думають, що це причина.»
    mood: "визнання"

  # ── s11 ─────────────────────────────────────────────────────
  - scene_id: ep008_s11
    interactions:
      - interaction_type: vote
        question: "Софія сказала: «Люди дивляться на артефакти й думають, що це причина.» Артефакти — причина чи одна з мотузочок ляльководця?"
        options:
          - {id: cause, text: "Причина"}
          - {id: puppet, text: "Одна з мотузочок — Голос за обома"}
        correct_logic: "Голос — ляльковод; артефакти — інструмент, але не єдиний."
        feedback_success: "Одна з мотузочок! Голос за обома — і за артефактами, і за системою."
        feedback_soft_fail: "Забери артефакти — стирання припиниться? Ні. Отже..."
      - interaction_type: vote
        question: "Марко ховав Дзеркало, щоб зупинити стирання. Це допомогло?"
        options:
          - {id: yes, text: "Так"}
          - {id: no, text: "Ні — прибрав одну мотузочку, але ляльковод смикає за іншу"}
        correct_logic: "Прибрав одну мотузочку — але ляльковод смикає за іншу."
        feedback_success: "Ні! Прибрав одну мотузочку — ляльковод смикає за іншу. Система стирає і без артефактів."
        feedback_soft_fail: "Дзеркало сховано. Число впало. Допомогло?"
    mood: "квізи в чаті"

  # ── s11b ─────────────────────────────────────────────────────
  - scene_id: ep008_s11b
    author_text: >
      Марко дивиться на Ліну. На сіру нитку. На стіну. На число.
    dialogue:
      - who: Марко
        line: "Отже, що б я не робив — число падає?"
      - who: Лина
        line: "Я не знаю. Софія... вона шукала спосіб. Не встигла."
    mood: "безвихідь → пошук рішення"

  # ── s11c_sofa ────────────────────────────────────────────────
  - scene_id: ep008_s11c_sofa
    dialogue:
      - who: Софа
        line: "Софія... шукала... ляльководця."
      - who: Софа
        line: "Щоб обрізати мотузочки — потрібно знайти... того, хто за ширмою."
    mood: "підказка в чаті"

  # ── s12 ─────────────────────────────────────────────────────
  - scene_id: ep008_s12
    author_text: >
      Число на стіні блимає. 43. 43. 43. Потім — 42.

      Марко не рухався. Ліна не рухалася. Дзеркало в рюкзаку. Застебнуте. Мінус один. Ще одна людина забула Софію. Прямо зараз. Поки вони сиділи й розмовляли.
    dialogue:
      - who: автор
        line: "Ліна встає. Швидко. Струшує штани."
      - who: Лина
        line: "Мені треба піти. Завтра. Завтра я розповім. Все."
      - who: Марко
        line: "Чому не зараз?"
      - who: Лина
        line: >
          Бо якщо я розповім зараз — ти мені не повіриш. Тобі треба побачити одну річ. Завтра.
      - who: автор
        line: "Ліна іде. Швидким кроком. Не озирається."
      - who: автор
        line: >
          Марко сидить один. Поруч — рюкзак із Дзеркалом. Над ним — число 42. Ляльковод за ширмою смикає за мотузочки, і Марко не знає, скільки їх.
    mood: "обрив — самотність"

  # ── s12_sofa ─────────────────────────────────────────────────
  - scene_id: ep008_s12_sofa
    dialogue:
      - who: Софа
        line: "Марко... два питання-рятівники."
      - who: Софа
        line: "«А що ЩЕ могло вплинути?» — ти відповів."
      - who: Софа
        line: "«А буває одне без іншого?» — ти відповів."
      - who: Софа
        line: "Третє питання... моє. «Хто за ширмою?»"
      - who: Софа
        line: "Знайди ляльководця — обріжеш усі мотузочки разом."
    author_text_after: "Екран гасне. Число на стіні: 42. І тиша."
    mood: "обрив у чаті — наступна ціль"
