  - scene_id: ep009_s18d2
    author_text: >
      Марко повторює слова Ліни — повільно, по одному. «Втратити ЩЕ когось.» Не крик — страх. Вона не нападала. Вона захищала ЇХ. А він почув тільки гучність.
    mood: "переосмислення — за криком ховається страх"

  # ── s19a ────────────────────────────────────────────────────
  - scene_id: ep009_s19a
    dialogue:
      - who: Марко
        line: "Ти вважаєш, що артефакти треба використати. Чому?"
      - who: Лина
        line: >
          Тому що число падає само. Хтось стирає без нас. Якщо ми не використовуємо артефакти — ми не бачимо, хто це робить. Не бачимо — не можемо зупинити. Не зупиняємо — Софію забудуть усі.
    mood: "аргумент замість крику"

  # ── s19 ─────────────────────────────────────────────────────
  - scene_id: ep009_s19
    question: "Ліна навела аргумент. Це мета «перемогти» чи «зрозуміти»?"
    options:
      - id: win
        text: "Перемогти"
      - id: understand
        text: "Зрозуміти"
    correct_logic: "Вона пояснила ЧОМУ, а не просто вимагала. Мета — зрозуміти."
    feedback_success: "Вона пояснила ЧОМУ. Не «дай мені!» — а «ось навіщо». Мета: зрозуміти."
    feedback_soft_fail: "Вона вимагала чи пояснювала?"
    mood: "аргумент — ознака мети «зрозуміти»"

  # ── s20a ────────────────────────────────────────────────────
  - scene_id: ep009_s20a
    dialogue:
      - who: Марко
        line: >
          А я вважаю, що кожне використання — мінус одна людина. Ми довели: Дзеркало стирає. Причина і наслідок.
      - who: Лина
        line: >
          Але якщо хтось інший стирає по п'ять на годину — а ми втрачаємо одного за використання — математика проста. Один мінус заради інформації, що врятує сорок.
      - who: Марко
        line: "А якщо інформація не врятує? Якщо ми подивимось у Дзеркало й побачимо... нічого?"
      - who: автор
        line: >
          Ліна мовчить. Потім:
      - who: Лина
        line: "Тоді ми втратимо одного. І знатимемо, що Дзеркало марне."
      - who: автор
        line: >
          Марко чує це — і всередині щось клацає. Не згода. Не суперечка. Щось третє. Наче два пазли, що не підходили одне до одного, раптом повернулися правильним боком.
    mood: "суперечка по-новому"

  # ── s20 ─────────────────────────────────────────────────────
  - scene_id: ep009_s20
    question: "Марко навів аргумент. Яка мета?"
    options:
      - id: win
        text: "Перемогти"
      - id: understand
        text: "Зрозуміти"
    correct_logic: "Пояснив свою причину, не нападав на Ліну. Мета — зрозуміти."
    feedback_success: "Пояснив причину, не нападав. Мета: зрозуміти."
    feedback_soft_fail: "Він звинуватив Ліну? Чи пояснив свою позицію?"
    mood: "суперечка без сварки"

  # ── s21 ─────────────────────────────────────────────────────
  - scene_id: ep009_s21
    author_text: >
      Софа вібрує. Софа до глядача: «Тепер — визначте мету. Швидко.»
    question: "«Я швидший, бо я завжди перший на фізкультурі! І не сперечайся!» Яка мета?"
    options:
      - id: win
        text: "Перемогти"
      - id: understand
        text: "Зрозуміти"
      - id: hurt
        text: "Образити"
    correct_logic: "Не пропонує перевірити — оголошує себе чемпіоном. Мета — перемогти."
    feedback_success: "Не пропонує перевірити — оголошує себе чемпіоном. Перемогти."
    feedback_soft_fail: "Він запропонував перевірити? Чи просто заявив?"
    mood: "визнач мету — швидко"

  # ── s22 ─────────────────────────────────────────────────────
  - scene_id: ep009_s22
    question: "«А давай пробіжимо на перерві до дерева і назад — і дізнаємося!» Яка мета?"
    options:
      - id: win
        text: "Перемогти"
      - id: understand
        text: "Зрозуміти"
      - id: hurt
        text: "Образити"
    correct_logic: "Пропонує перевірити, готовий до будь-якого результату. Мета — зрозуміти."
    feedback_success: "Пропонує перевірити, готовий до будь-якого результату. Зрозуміти."
    feedback_soft_fail: "Він уже вирішив? Чи пропонує перевірити?"
    mood: "перевірка замість заяви"

  # ── s23 ─────────────────────────────────────────────────────
  - scene_id: ep009_s23
    question: "«Ти бігаєш як черепаха, на тебе смішно дивитися!» Яка мета?"
    options:
      - id: win
        text: "Перемогти"
      - id: understand
        text: "Зрозуміти"
      - id: hurt
        text: "Образити"
    correct_logic: "Йому байдуже, хто швидший — хоче зачепити. Мета — образити."
    feedback_success: "Йому байдуже, хто швидший — хоче зачепити. Образити."
    feedback_soft_fail: "Він говорить про швидкість — чи про людину?"
    mood: "напад на людину"

  # ── s24 ─────────────────────────────────────────────────────
  - scene_id: ep009_s24
    question: "«Моя книга отримала премію — значить, вона краща, і все!» Яка мета?"
    options:
      - id: win
        text: "Перемогти"
      - id: understand
        text: "Зрозуміти"
      - id: hurt
        text: "Образити"
    correct_logic: "Тисне авторитетом премії, не обговорює. Мета — перемогти."
    feedback_success: "Тисне авторитетом премії, не обговорює. Перемогти."
    feedback_soft_fail: "Він пропонує обговорити? Чи просто тисне?"
    author_text_after: >
      Марко підіймає голову. Дивиться на Ліну.

      «Ми щойно сперечалися. По-справжньому. І не посварилися.»

      «Але ми так і не вирішили. Використовувати артефакти чи ні.»

      Марко відчуває, як сірник у грудях гасне. Не тому що він переміг. Не тому що здався. А тому що почув.
    mood: "тиск авторитетом"

  # ── s24b ────────────────────────────────────────────────────
  - scene_id: ep009_s24b
    dialogue:
      - who: Лина
        line: "Ми щойно сперечалися. По-справжньому. І не посварилися."
      - who: Лина
        line: "Бо обидва хотіли зрозуміти. Не перемогти."
      - who: Лина
        line: Може, не треба вирішувати прямо зараз. Може, треба спочатку зрозуміти, хто ще стирає. Без артефактів.
    mood: "суперечка вщухає"

  # ── s24b_sofa ───────────────────────────────────────────────
    author_text: "Марко піднімає голову. Дивиться на Ліну. І вперше за ранок — без щита. Щойно вони сперечалися по-справжньому — і не посварилися. Рішення так і не прийняте: артефакти чи ні. Але сірник у грудях гасне. Не тому, що переміг. Не тому, що здався. Тому, що почув.\n"
  - scene_id: ep009_s24b_sofa
    dialogue:
      - who: Софа
        line: "Запам'ятай..."
      - who: Софа
        line: "Коли хочеш ЗРОЗУМІТИ — знаходиш друга."
      - who: Софа
        line: "Коли хочеш ПЕРЕМОГТИ — знаходиш ворога."
    mood: "правило в чаті"

  # ── s25 ─────────────────────────────────────────────────────
  - scene_id: ep009_s25
    question: "«А розкажи, про що твоя? Може, мені теж сподобається!» Яка мета?"
    options:
      - id: win
        text: "Перемогти"
      - id: understand
        text: "Зрозуміти"
      - id: hurt
        text: "Образити"
    correct_logic: "Хоче дізнатися більше, відкрита до чужої думки. Мета — зрозуміти."
    feedback_success: "Хоче дізнатися більше, відкрита до чужої думки. Зрозуміти."
    feedback_soft_fail: "Вона закрила тему чи відкрила?"
    author_text_after: >
      Ліна встає. Обтрушує коліна. Простягає руку — допомогти встати. Марко бере її руку. Піднімається.

      Вулиця роздвоюється: прямо — до фонтана. Праворуч — темний провулок.
    followup_interaction:
      question: "Куди йде Марко?"
      options:
        - id: fountain
          text: "Піти до фонтана"
        - id: alley
          text: "Перевірити провулок"
    mood: "відкритість до чужої думки"

  # ── s25d1 ───────────────────────────────────────────────────
  - scene_id: ep009_s25d1
    author_text: >
      Провулок. Стіни гладкі, сірі. Ні вікон, ні дверей. Марко іде вглиб — і бачить тріщину. Тонку, як волосина. З тріщини — світло. Тепле, золотисте. Не фіолетове, як усе в Місті. Інше. Як сонце крізь щілину в шторах. Марко підходить ближче.
    mood: "інше світло — не міське"

  # ── s25d2 ───────────────────────────────────────────────────
  - scene_id: ep009_s25d2
    author_text: >
      Марко притискає вухо до тріщини. Шепіт. Дитячий голос — далекий, наче з-під води. «...знайди...» Пауза. Тиша. Потім — тихіше: «...не вір...» Два слова. Ті ж слова, що з'являлися раніше. Серце б'ється — гучно, у скронях. Хто шепоче? Звідки?
    mood: "передвістя — голос з-за стіни"

  # ── s25d3 ───────────────────────────────────────────────────
  - scene_id: ep009_s25d3
    author_text: >
      Тріщина звужується. Світло гасне. Стіна — гладка, наче нічого не було. Марко проводить пальцем — рівна поверхня.
    dialogue:
      - who: Софа
        line: "Сигнал втрачено. Координати збережено."
    author_text_after: >
      Марко біжить до фонтана. Провулок залишається позаду — сірий, мовчазний. Але координати — у пам'яті Софи.
    mood: "слід зник, але записаний"

  # ── s26 ─────────────────────────────────────────────────────
  - scene_id: ep009_s26
    author_text: >
      Ліна встає. Обтрушує коліна. Простягає руку — допомогти встати.

      Марко бере її руку. Піднімається. І в цю секунду — бачить знову. На зап'ясті, під рукавом, який задрався на мить.

      Сіра нитка. Та сама, що вчора. Тільки тепер — не одна.

      Три сірих нитки. Вчора була одна. Сьогодні — три.

      Марко відпускає руку. Ліна смикає рукав. Швидко. Занадто швидко.

      Вона помітила, що він помітив. І обидва вдали, що ні.

      Число на стіні: 41.

      Мінус один. Поки вони розмовляли. Без артефактів. Без Дзеркала. Просто — мінус один.
    mood: "точка неповернення — нитки множаться, число падає"

  # ── s26_sofa ────────────────────────────────────────────────
  - scene_id: ep009_s26_sofa
    dialogue:
      - who: Софа
        line: "Третя причина... активна."
      - who: Софа
        line: "Хтось стирає. Не ви."
      - who: Софа
        line: "Хто?"
    author_text_after: >
      Марко дивиться на Ліну. Ліна дивиться на число. Жоден з них не каже вголос те, що думає.
    mood: "обрив у чаті"
