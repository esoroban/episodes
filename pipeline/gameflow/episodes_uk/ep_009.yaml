    feedback_soft_fail: "Вони слухали одне одного? Чи кожен чекав своєї черги кричати?"
    mood: "знайома ситуація"

  # ── s12_retro ───────────────────────────────────────────────
  - scene_id: ep009_s12_retro
    author_text: >
      Марко згадує далі. Крик Маші і Миколи вже перейшов у плач — коли до їхнього столу підійшла Оленка. Маленька, серйозна, з двома косичками. Сказала тихо, але так, що обидва замовкли:

      «Хлопці. Знайдіть одну гарну річ у чужому малюнку.»

      Маша подивилась на малюнок Миколи — не так, як хвилину тому. Довго. І сказала: «У тебе річка красива.»

      Микола моргнув. Теж подивився. «А в тебе хмари класні.»

      Суперечка скінчилася. Обидва посміхнулися — збентежено, але справжньо. Вони почали РОЗУМІТИ одне одного.
    mood: "дитячий спогад — розв'язка"

