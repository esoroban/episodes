      продовжують переплітатися. Перед його шістнадцятьма
      знайомими символами проявляються ще чотири — блакитні.

      Частина ниток сходиться в одну точку — над головним
      терміналом. Там символи — латинські, світні —
      складаються в повну адресу:

      www. wordpowerlab.com

      Шістнадцять справа — ті самі, які він уже пробував
      тієї ночі. Знайомі. Зеленкуваті.

      Перед ними `www.` — блакитні. Щойно
      доформувалися. Мозок сам добудовує: це веб-адреса.
      `www.` — початок, якого йому бракувало.

      Повна адреса: www.wordpowerlab.com

      Ім'я системи. Ім'я пароля. Адреса лабораторії, у якій
      будували це місто.
    mood: "нитки дають ключ — 16 знайомих символів wordpowerlab.com + www. спереду"

  # ── s04 ─────────────────────────────────────────────────────
  - scene_id: ep048_s04
    author_text: >
      Марко підходить до термінала. Друкує. По одному
