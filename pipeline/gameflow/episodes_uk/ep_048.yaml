      Марко відчиняє двері. Світло.
    mood: "Голос відпускає, але попереджає — буде інший"

  # ── s33 ─────────────────────────────────────────────────────
  - scene_id: ep048_s33
    author_text: >
      Світло. Справжнє. Яскраве. Тепле. Очі сльозяться — але не
