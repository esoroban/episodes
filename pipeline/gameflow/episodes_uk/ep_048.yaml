      Марко робить крок за поріг. Софія і Макс — поруч.

      Під ногами — асфальт. Не дзеркало. Звичайна вулиця. Запах
      ранку: трава після поливальної, теплий хліб із пекарні
      навпроти. Десь гавкає собака. Десь проїхав автобус —
      справжній, не зі скла.

      Це — їхнє звичайне подвір'я. Те саме.
    mood: "перший крок назовні — звичайний світ зустрічає запахами і звуками"

  # ── s33b ────────────────────────────────────────────────────
  - scene_id: ep048_s33b
    author_text: >
      Мама стоїть біля хвіртки. У халаті, капцях, ніби щойно
      вийшла за газетою. Не знає, що Марко був десь —
      просто прокинулась і чомусь вийшла.

      Очі в мами розширюються. Довго. Беззвучно.

      Софія робить крок до мами. Один. Інший.
    dialogue:
      - who: мама
        line: "Со... Софія?"
      - who: София
        line: "Мама."
      - who: мама
        line: "Я... я не пам'ятала. Пробач."
      - who: София
        line: "Це не твоя провина."
      - who: Макс
        line: "Я піду. Мої теж. Мабуть, теж не пам'ятають."
      - who: Марко
        line: "Іди. Завтра в школі."
    author_text_after: >
      Мама обіймає Софію. Мовчки. Довго. Софія менша за маму —
      утикається лобом їй у плече.

      Макс — Марко: коротке чоловіче рукостискання, як у дорослих.
      Повертається. Іде до себе — два подвір'я через сквер. На
      розі озирається. Махає рукою. Один раз. Зникає за
      бузком.

      Будинки сусідів. Подвір'я. Тротуар. Усе на місці. Тільки
      вони — інші.
    mood: "зустріч мами і Софії — без слів, але все сказано"

  # ── s33c ────────────────────────────────────────────────────
  - scene_id: ep048_s33c
    author_text: >
      Минув день. Звичайний. Довгий, як завжди після великого.

      Кухня — пахне супом. Мама готувала і плакала, і
      сміялася. Софія сиділа поруч, не відходила ні на крок.
      Тато телефонував — мама не одразу могла пояснити. Тато сказав:
      «Зачекай. Я їду додому.»

      Зараз — пізній вечір. Світло в кімнаті Марка — настільна
      лампа. На стіні знову висять фотографії. Ті, які мама
      колись зробила. Софія на них — з усіма. Як і має
      бути.

      Марко в піжамі. Лежить на ліжку. Втома — справжня.
      Не та, що в Місті. Ця — добра.

      Телефон на тумбочці. Вібрує. Один раз. Тихо. Сам.

      Марко бере його. Блакитне світло від екрана — на обличчі.
    mood: "звичайний вечір удома — і одна вібрація, що порушує спокій"

