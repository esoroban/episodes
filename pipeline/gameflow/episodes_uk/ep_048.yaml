  # ── s10 ─────────────────────────────────────────────────────
  - scene_id: ep048_s10
    author_text: >
      ЧЕСНЕ ПРОХАННЯ — прохання, у якому можна відмовити БЕЗ
      наслідків. Скажеш «ні» — і все нормально. Ніхто не
      ображається. Ніхто не карає. Ніхто не каже, що ти
      поганий.

      МАНІПУЛЯЦІЯ — навпаки. Скажеш «ні» — і ти одразу поганий.
      Винний, боягуз чи поганий друг.

      Порівняй дві фрази:

      Чесне прохання: «Допоможеш мені із задачею? Якщо
      зайнятий — спитаю пізніше.»

      Маніпуляція: «Тобі що, байдуже, як я напишу
      контрольну?»

      Різниця — одне речення. Але відчуття —
      протилежне. Після чесного прохання ти спокійний: «так» чи
      «ні» — обидва нормально. Після маніпуляції ти відчуваєш: якщо
      скажу «ні» — я погана людина.

      Головне правило: у тебе ЗАВЖДИ є право сказати «ні»
      без почуття провини.
    mood: "тиха теорія — чесне прохання і його дзеркало"

