  # ── s32 ─────────────────────────────────────────────────────
  - scene_id: ep048_s32
    author_text: >
      Двері — справжні. Дерев'яні. З ручкою. Як у школі.

      Світло з-за них — тепле. Справжнє. Очі мружаться, але
      це не боляче — це від світла, не від Голосу.

      Марко береться за ручку. Завмирає.

      З тіні біля дверей — Голос. Тихий. Майже людський. Не
      грізний. Просто — голос.
    dialogue:
      - who: Голос
