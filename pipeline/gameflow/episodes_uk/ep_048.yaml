      сама, яку Софа підсвітила раніше. Список імен.

      Марко знаходить команду відновлення.

      Запускає.

      На екрані — прогрес-бар. Блакитна смуга повзе
      праворуч. Ім'я за ім'ям підсвічується зеленим.
    mood: "пароль введено — команду запущено"

  # ── s05 ─────────────────────────────────────────────────────
  - scene_id: ep048_s05
    author_text: >
      Нитки змінюють напрямок. Від серверів — назад до міста.
      Світна течія розвертається. По стінах — від
      стійок до виходу, по коридорах — до вулиць.

      Стіни прозоріють. Камінь стає матовим склом.
      Крізь стіни видно небо. Видно дерева. Видно хмари.

      На екрані термінала — скляна кімната Софії. Скло
      кімнати Софії тріскається зсередини. Лінія за лінією. Софія
      виходить. Обидва ока — карі. Справжні.

      Городяни на вулицях кліпають. Мружаться. Труть очі. Як
      люди, які проспали дуже-дуже довго. Місцеві мешканці
      повертаються.

      Голос працює в кількох містах. Це — звільнене.
    mood: "відновлення — місцеві мешканці повертаються"

