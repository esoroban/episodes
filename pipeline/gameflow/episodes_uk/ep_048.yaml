      На маніпуляцію — «Давай по суті.»

      Демагогія — це помилка в логіці чи фактах.
      Питаєш про факти — нічим закритися.

      Маніпуляція — це тиск на почуття. Повертаєш
      розмову до справи — кнопка не працює.

      Два інструменти. Один — на одну хворобу.
