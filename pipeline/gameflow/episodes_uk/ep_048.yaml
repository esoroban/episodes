  # ── s01 ─────────────────────────────────────────────────────
  - scene_id: ep048_s01
    author_text: >
      Голос відступив. Серверна порожня. Лише відлуння його кроків
      у коридорі нагорі.

      Марко стоїть біля головного термінала. Поле пароля —
      як і раніше порожнє. Він так і не дізнався ключ.

      У слухавці — останні слова Софії перед тим, як Голос
      пішов: «У тебе в рюкзаку. Один артефакт. Ти його жодного
      разу не використав.»

      «Коли зрозумієш — надінеш.» Слова Леона повертаються
      самі.

      Софія сказала: артефакт. Леон сказав: коли зрозумієш.

      Зараз — здається, зрозумів. Це окуляри.
    mood: "після битви — тиша і здогад, підказка Софії + заповіт Леона сходяться"

  # ── s02 ─────────────────────────────────────────────────────
  - scene_id: ep048_s02
    author_text: >
      Марко дістає з рюкзака старі окуляри в простій оправі.
      Леон віддав їх давно — перед стиранням. «Коли зрозумієш —
      надінеш.»

      «Один артефакт. Ти його жодного разу не використав.» —
      голос Софії у слухавці, хвилину тому. Вона знала. Вона
      чекала, поки він сам складе.

      Тоді не зрозумів. Зараз — час.

      Протирає рукавом. Надіває.
    author_text_after: >
      Серверна змінюється.

      Темні кабелі по стінах — наливаються блакитним. Усередині
      них видно нитки. Тисячі тонких світних ниток, як
      нерви. Кожна тягнеться до міста — до кожного мешканця.

      Нитки пульсують. Від стійок — до стін. Від стін — назовні,
      до будинків, до людей, до всього, що Голос тримав.

      І раптом — у голові Марка спливають зелені літери. Ті,
      які він збирав у CLI і записав у блокнот. Шістнадцять символів:

      wordpowerlab.com

      Він пам'ятає їх напам'ять. І пам'ятає, що минулого разу —
      без початку — не підійшло.
    mood: "окуляри Леона — нитки проявляються, спливають шістнадцять символів wordpowerlab.com"

  # ── s03 ─────────────────────────────────────────────────────
  - scene_id: ep048_s03
    author_text: >
      Марко піднімає голову. Дивиться на нитки уважно.
      Минулого разу — у підвалі серверної — він спробував
