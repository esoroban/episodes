      Що робити? Не підкорятися. Але й не сердитися.

      Відповідь зі співчуттям, але без підкорення: «Бабусю, я за тобою
      теж сумую. Давай домовимося на суботу.»

      Ти не погоджуєшся, що «забув» і «поганий». Ти не сперечаєшся
      і не виправдовуєшся. Ти пропонуєш рішення.

      У тебе ЗАВЖДИ є право сказати «ні» без почуття провини.
      Навіть бабусі. Головне — поруч із «ні» дати тепле «бачу
      тебе» і план.
    mood: "складний випадок — м'який, але твердий"

