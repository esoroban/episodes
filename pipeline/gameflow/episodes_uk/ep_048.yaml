  # ── s25 ─────────────────────────────────────────────────────
  - scene_id: ep048_s25
    author_text: >
      Маніпуляція — як кредит. У кредиті відсотки —
      гроші. У маніпуляції — довіра.

      Кажеш «так» сьогодні. Платиш довірою завтра.

      Пам'ятаєш Гришу і Машу? Гриша щодня брав у
      Маші печиво. Одна кнопка — «ти ж хороша
      подруга?» — працювала. Маша віддавала.

      Минув місяць. Та сама кнопка. Ті самі «так». Щодня.

      І ось одного разу Маша подивилася на коробочку з
      печивом — і зрозуміла, що ненавидить. Печиво.
      Перерви. Гришу.

      Кожне «так» було не від радості. Від страху бути
      «поганою подругою». Маленькі борги зібралися у
      великий рахунок. І в кінці — жодної дружби.

      Маніпуляція завжди руйнує стосунки. Завжди. Це
      її вбудований відсоток. Гриша працював однією кнопкою —
      але платив сам. Дружбою.
    mood: "продовження історії Гриші і Маші — ціна через місяць"

