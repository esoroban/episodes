  # ── s01 ─────────────────────────────────────────────────────
  - scene_id: ep026_s01
    author_text: >
      Число на стіні: 26. Марко не торкався артефактів. Не відкривав
      порталів. Не чіпав дзеркал. А число впало.

      Стирання пришвидшується. Без причини. Без контакту.

      Марко малює на стіні підпілля. Вугілля. Схема. Ланцюг.

      Віра → шкільний журнал → дані про Софію → Голос → стирання.

      Кожна ланка — перевірювана. Віра має доступ до журналу. Журнал
      містить дані. Голос використовує дані для стирання.

      Окрім однієї ланки: НАВІЩО Вірі допомагати Голосові?
    mood: "ланцюг побудований — але одна ланка порожня"

