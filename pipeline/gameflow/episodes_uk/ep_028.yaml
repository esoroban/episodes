      ОБСТАВИНИ — атака не на слова, а на те, ХТО говорить.
      «Тобі дев'ять років — ти не розумієш.» «Ти з іншого району.»
      «Ти трієчник.» Ніби вік, місце чи оцінки скасовують
      слушність.

      «САМ ТАКИЙ» — переведення стрілок. «А ти сам учора…» «На себе
      подивись.» Замість відповіді — атака у відповідь.

      Ключовий принцип: правильність думки не залежить від того, ХТО її
      говорить. Якщо маленька дитина скаже «вогонь гарячий» — це
      правда. Вік не скасовує факт.

      Захист — три кроки: 1) НАЗВИ прийом. «Це напад на мене, а не
      на мої слова.» 2) ПОВЕРНИСЯ до теми. «Повернімося до питання.»
      3) ЗАПИТАЙ: «Що не так із моїми словами?»

      Якщо б'ють по ТОБІ, а не по твоїх СЛОВАХ — отже, твої слова
      сильні.
    mood: "три прийоми ворога — три кроки захисту"

