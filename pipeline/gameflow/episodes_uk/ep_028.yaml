  # ── s05 ─────────────────────────────────────────────────────
  - scene_id: ep028_s05
    author_text: >
      НАПАД НА ЛЮДИНУ. Коли немає доброго обґрунтування — людина
      перемикається на співрозмовника. Не на те, ЩО ти кажеш. На те,
      ХТО ти.

      Три види.

      ОБРАЗА — ярлик замість відповіді. «Ти ледачий.» «Зубрило.»
      «Зануда.» Ярлик — не відповідь. Ярлик — визнання, що відповісти
