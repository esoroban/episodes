        line: "Ти маленький. Ти нічого не розумієш. Спершу виростай — потім сперечайся."
    author_text_after: >
      Марко здригається. Слова влучають туди, де живе сумнів.
      «Маленький.» Слово — як палець, що тисне на синець.
    mood: "Голос цілиться в сумнів"

