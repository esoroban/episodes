  - scene_id: ep028_s01
    author_text: >
      Марко показує зошит Семові. «Тато сказав.» «Тато сказав.» «Тато
      сказав.» Двадцять років одного й того самого.
    dialogue:
      - who: Сем
        line: "Якщо тато Віри — той, хто керує Містом… а її відправили до нашої школи… отже, Віра досі в нього в полоні?"
    author_text_after: >
