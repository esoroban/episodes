      її вид. Ті самі кроки працюють і проти інших маніпуляцій.

      Крок перший — ЗУПИНИСЬ. Не реагуй одразу. Маніпуляція хоче, щоб
      ти діяв без мислення. Пауза — перша зброя.

      Крок другий — ПОСТАВ ТРИ ПИТАННЯ-ФІЛЬТРИ. Чи це точно
      станеться? Наскільки ймовірно? Чи є інші варіанти?

      Крок третій — ПОПРОСИ ДОКАЗИ. «Звідки ти знаєш?» Маніпулятор
      рідко може довести. Він тисне — не пояснює.

      Крок четвертий — ПОДУМАЙ ПРО МОТИВИ. Навіщо ця людина тебе
      лякає? Що вона отримає, якщо ти злякаєшся?

      Погана відповідь на залякування: здався без питань. Гарна —
      поставив перевірочне питання.

      Хто бачить фокус — той більше на нього не ведеться.
    mood: "чотири кроки — чотири щити"

