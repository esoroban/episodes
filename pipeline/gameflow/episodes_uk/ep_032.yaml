    mood: "логіка тримається — навіть без доказів"

  # ── s23_sofa ────────────────────────────────────────────────
  - scene_id: ep032_s23_sofa
    dialogue:
      - who: Софа
        line: "Запис 11… розблоковано. Софія знала порядок."
    unlock_button:
      text: "Увімкнути запис 11"
      reveals:
        who: "София"
        line: "Марку, якщо ти дійшов до цієї миті — отже, ти пройшов опудало і страх. Ти не зламався. Наступний урок буде про те, чому ти довіряєш. І кому. І про зраду."
    dialogue_after:
