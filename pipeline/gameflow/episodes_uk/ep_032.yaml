  - scene_id: ep032_s03b
    author_text: >
      Марко зривається далі. Дзеркала звужуються — кожен крок
      відлунює. Мама не ближче.

      Біг без плану працює лише в кіно. У коридорах Голосу — це його
      стежка. Голос саме цього й хотів: щоб Марко біг, не думав і сам
      прибіг у потрібну точку.

      Через десяток кроків Марко зупиняється. Сем дихає поряд. Мама —
      на тій самій відстані, що й п'ять секунд тому.

      Біг не допоміг. Повертаються.
    mood: "біг = грати в гру Голосу"

