  # ── s01 ─────────────────────────────────────────────────────
  - scene_id: ep032_s01
    author_text: >
      Марко біжить. Коридори звужуються. У дзеркалах обабіч — мама.
      Іде до центру. Спокійно. Не озирається.

      «Мамо!»

      Вона не чує. Або не хоче чути.

      Сем біжить услід. Дихання — гучне. Ноги — лункі по кам'яній
      підлозі.
    mood: "наздогнати неможливо — мама йде рівно"

  # ── s02 ─────────────────────────────────────────────────────
  - scene_id: ep032_s02
    author_text: >
      Голос — спокійно, як бухгалтер, що рахує втрати.
    dialogue:
      - who: Голос
        line: "Ти втратив Софію."
      - who: Голос
        line: "Утратив Макса."
      - who: Голос
        line: "Утратив маму."
      - who: Голос
        line: "Скоро — Сема."
    author_text_after: >
      Сем спотикається. Марко хапає його за руку. Дзеркала обабіч
      порожніють. Лише мамине дзеркало попереду — вона йде далі.

      Ноги несуть уперед. Мозок вимкнений.
    mood: "Голос веде лік — холодно"

  # ── s03 ─────────────────────────────────────────────────────
  - scene_id: ep032_s03
