  # ── s12 ─────────────────────────────────────────────────────
  - scene_id: ep042_s12
    question: "«Читати книги нудно!» Обери найкращу відповідь."
    options:
      - id: with_recognition
        text: "У цьому ти маєш рацію — бувають нудні книги. Однак якщо обрати книгу за інтересом, можна так захопитися, що забудеш про час."
