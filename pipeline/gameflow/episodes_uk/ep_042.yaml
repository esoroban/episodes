scenes:

  # ── s01 ─────────────────────────────────────────────────────
  - scene_id: ep042_s01
    author_text: >
      Зала порожня. Стільці — ряди порожніх скелетів. Натовп розійшовся.
      Рей зник.

      Тиша.

      І раптом — динаміки. По всій залі. Тріск. Шипіння. І — голос.
      Не крик. Тихий. Втомлений. Як учитель після шостого уроку.
    mood: "порожня зала, динаміки оживають"

  # ── s02 ─────────────────────────────────────────────────────
  - scene_id: ep042_s02
    dialogue:
      - who: Голос
        line: "Ти перехопив мій натовп. Молодець."
      - who: Голос
        line: "Використовуючи мої прийоми. Звернення до емоцій. Узагальнення. Тиск. Усе — моє. Ти добрий учень, Марко."
      - who: Голос
        line: "Ти такий самий, як і я."
    author_text_after: >
      Голос — спокійний. Без злості. І від цього — страшніше.

      Марко стискає зуби. Правда — як опік. Він і справді
      використав ті самі інструменти.
    mood: "Голос м'який, ласкавий — і від цього пече"

  # ── s03 ─────────────────────────────────────────────────────
  - scene_id: ep042_s03
    author_text: >
      Голос хотів, щоб Марко відчув провину. І в цьому — Голос
      має рацію. Камінь у грудях справжній.

      Однак Голос — розгублений. Вікно відчинене. Можна добити, поки
      він не отямився. А можна — інакше.
    mood: "вікно відчинене — стара звичка тягне добити"

  # ── s04 ─────────────────────────────────────────────────────
  - scene_id: ep042_s04
    author_text: >
      Динаміки ще шиплять. Голос чекає на відповідь.

      Стара звичка тягне: Голос розгублений — бий. Нова звичка
      шепоче: чотири кроки, без удару.

      Сем біля стіни — дивиться. Не підказує. Це рішення Марка.
    mood: "розвилка — стара звичка проти нової"
    question: "Що робить Марко?"
    options:
      - id: respond_calm
        text: "Заперечую спокійно. Чотири кроки. Без удару."
      - id: hit_now
        text: "Добиваю. Поки Голос розгублений."

  # ── s05 ─────────────────────────────────────────────────────
  - scene_id: ep042_s05
    author_text: >
      Марко не стримується. «А ви такий самий, як я — тільки гірший!
      Ви стираєте людей! Ви — головний злочинець!»

      Динаміки мовчать. Секунду. Дві.

      Потім — клацання. Голос — холодний, без утоми:

      «Гучно. Я впізнаю себе в тобі.»

      Динаміки вимикаються. Світло в залі мерехтить. Сем хапає Марка
      за рукав. Тиша — інша. Не задумлива, а закрита.

      Марко розуміє: ударив — і Голос пішов у стіну. Нічого не
      сказав важливого. Не відкрився. Стара звичка — «добити» —
      спрацювала проти нього самого.

      Сем тихо: «Він замовк. Може, повернеться, якщо ти... інакше?»

      Марко видихає. «Інакше» — це чотири кроки. Без крику. Знову.

      За хвилину динаміки оживають — знову тріск. Голос повернувся.
      Цього разу — насторожений. Вікно майже зачинилося, однак Марко
      ще може говорити інакше.
    mood: "удар зачинив двері — вікно майже втрачене"

  # ── s06 ─────────────────────────────────────────────────────
  - scene_id: ep042_s06
    author_text: >
      Марко заплющує очі. Вдих. Видих. Розплющує.

      І говорить — спокійно. Без крику. Як учила Софа. Чотири кроки.
    dialogue:
      - who: Марко
        line: "Ви кажете, що я використав ваші прийоми."
      - who: Марко
        line: "Я розумію, чому ви так думаєте. Я й справді кричав. Узагальнював. Тиснув."
      - who: Марко
        line: "Однак я не згоден, що це робить мене таким самим."
      - who: Марко
        line: "Тому що я готовий зупинитися. А ви — ні."
    author_text_after: >
      Крок перший — повторив думку. Другий — повага. Третій —
      думка. Четвертий — причина.
    mood: "Марко заперечує за структурою — без крику"

  # ── s07 ─────────────────────────────────────────────────────
  - scene_id: ep042_s07
    author_text: >
      Тиша. Довга. Динаміки шиплять. Лампи на стелі мерехтять —
      одна, друга, третя. Наче будівля затримала подих.

      Голос мовчить. Секунду. Дві. П'ять.

      Сем дивиться на Марка. Потім — на динаміки. Потім — знову на
      Марка. Шепоче: «Він... думає?»

      Марко киває. Так. Голос думає. Не готує відповідь — саме
      думає. Це різні речі. Коли готуєш відповідь — шукаєш, чим
      ударити. Коли думаєш — слухаєш.
    mood: "тиша-роздуми — уперше"

  # ── s08 ─────────────────────────────────────────────────────
  - scene_id: ep042_s08
    author_text: >
      Голос не знає, що відповісти.

      Не тому, що аргумент сильний. Тому що тон — інший.
      Повага. Голос давно її не отримував.
    mood: "тон виявився сильнішим за аргумент"

  # ── s09 ─────────────────────────────────────────────────────
  - scene_id: ep042_s09
    author_text: >
      ВИЗНАННЯ ЧАСТКОВОЇ ПРАВОТИ — це прийом, який підсилює
      заперечення. Формула проста: «У цьому ти маєш рацію, але...».

      Навіщо визнавати чужу правоту? Це ж поступка! Ні. Це сила.
      Коли ти кажеш «у цьому ти маєш рацію» — співрозмовник перестає
      захищатися. Він почув, що почули ЙОГО. Стіна падає. І
      твій аргумент проходить далі.

      Визнати частину правди — не означає здатися. Означає: я слухав,
      я думав, і все одно не згоден.

      ТРИ РІВНІ ВІДПОВІДІ.

      РІВЕНЬ 1 — нападка. «Ти дурень і нічого не розумієш!» Б'є
      по людині. Найслабший рівень: викликає лише злість.

      РІВЕНЬ 2 — заперечення. «Я не згоден, тому що...» Б'є
      по аргументу. Сильніший: викликає думку.

      РІВЕНЬ 3 — заперечення з визнанням часткової правоти. «У
      цьому ти маєш рацію. Але я не згоден, тому що...» Найсильніший
      рівень: повага до людини І аргумент по суті.

      Кожен наступний рівень сильніший за попередній. Не слабший.
      Сильніший. Тому що знімає у співрозмовника захист, перш ніж
      ударити по ідеї.
    mood: "карта інструмента — три рівні"

  # ── s10 ─────────────────────────────────────────────────────
  - scene_id: ep042_s10
    question: "«Телефони шкодять дітям!» Обери найкращу відповідь."
