    feedback_success: "Визнання + контраргумент. Третій рівень — найсильніший."
    feedback_soft_fail: "Перший варіант — нападка («сам ти»). Другий — заперечення без визнання. Третій — визнав частину правди і додав свій аргумент. Третій рівень найсильніший, тому що знімає зі співрозмовника захист, перш ніж ударити по ідеї."
    mood: "розминка — вибір рівня"

