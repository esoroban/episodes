      - id: recognition
        text: "Визнання часткової правоти"
    correct_logic: "«Коли перестали» — слово-маркер питання-пастки. Усередині сховані два твердження: «ви любили учнів» і «ви перестали». Будь-яка відповідь Голосу (зокрема й мовчання) приймає обидва як факт. Той самий прийом, яким Голос атакував самого Марка в еп.39: «Коли ти перестав вірити мені, Марку?»"
    feedback_success: "Та сама пастка, яку Голос використав проти тебе. Упізнавано."
    feedback_soft_fail: "Заперечення вимагає всіх 4 кроків: повтор + повага + думка + причина. Тут немає жодного з них. Визнання часткової правоти — це «у цьому ви маєте рацію, але...». Тут і цього немає. «Коли перестали...» — слово-маркер пастки. Усередині: «ви любили» + «ви перестали». Будь-яка відповідь приймає обидва."
    mood: "критична зупинка — Марко застосував той самий прийом, що й Голос"

