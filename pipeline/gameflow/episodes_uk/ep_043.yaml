  # ── s01 ─────────────────────────────────────────────────────
  - scene_id: ep043_s01
    author_text: >
      За годину після порожньої зали гучномовці в усьому місті
      клацнули. Коротке оголошення однією фразою: «Сьогодні.
      Центральна площа. Остання промова.»

      Марко з Семом вийшли з вежі. Сем залишився біля виходу —
      такий натовп не для нього: «Я почекаю тут. Якщо що — я
      поряд.»

      На півдорозі до площі з провулка вигулькнула Ліна. Вона вже
      чула оголошення. «Якщо промова — остання, я рахую прийоми.
      Ти — слухаєш.»

      Центральна площа. Марко не бачив стільки людей у Дзеркальному
      місті — сотні. Може, тисяча. Стоять щільно, плече до плеча,
      обличчя підняті до балкона.

      Ліна — поряд. Тихо, у натовпі. Каптур натягнутий. Марко —
      також.

      На балконі — Голос. Не тінь. Не силует. Людина. Високий.
      Худий. Руки — широко.
    mood: "після паузи Голос скликав площу — натовп зібрався на останню промову"

  # ── s02 ─────────────────────────────────────────────────────
