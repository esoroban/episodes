      - who: Голос
        line: "Ми всі хочемо одного — безпеки."
      - who: Лина
        line: "Підміна тези. Один."
      - who: Голос
        line: "Хіба хтось хоче хаосу?"
      - who: Лина
        line: "Риторичне питання. Два."
    mood: "Ліна рахує — холодно, як хірург"

  # ── s03 ─────────────────────────────────────────────────────
  - scene_id: ep043_s03
    dialogue:
      - who: Голос
        line: "Усі знають, що до мене це місто гнило!"
      - who: Лина
        line: "Поспішне узагальнення. Три."
      - who: Голос
        line: "Я роблю це заради вас!"
      - who: Лина
        line: "Нападка навпаки. Чотири. Хто не зі мною — проти вас."
      - who: Голос
        line: "Цей хлопчик небезпечний!"
      - who: Лина
        line: "Нападка на особистість. П'ять."
      - who: Голос
        line: "Без мене місто впаде!"
      - who: Лина
        line: "Страшний ланцюжок. Шість."
    author_text_after: >
      Голос говорить красиво. Кожна фраза — на своєму місці.
      Хочеться кивати. Хочеться вірити.
    mood: "лік зростає, натовп усе глибше"

  # ── s04 ─────────────────────────────────────────────────────
  - scene_id: ep043_s04
    author_text: >
      Голос говорить красиво. Кожна фраза тисне. Марко відчуває
      теплу хвилю згоди — як у залі з Реєм.

      Можна дослухати до кінця. Дізнатися кожен прийом. Однак і
      заразитися — промова працює на слухача.

      Можна піти просто зараз. Не бруднити голову. Однак тоді —
      не побачити фінал.
    mood: "вибір: знання чи захист"
    question: "Що робить Марко?"
    options:
      - id: stay_listen
        text: "Залишаюся. Дослухаю до тринадцятого. Знання важливіше."
      - id: leave_now
        text: "Іду. Не хочу заразитися промовою."

  # ── s05 ─────────────────────────────────────────────────────
  - scene_id: ep043_s05
    author_text: >
      Марко тягне Ліну за рукав. Ідуть. Натовп змикається за ними.

      На розі площі Марко зупиняється. Чути відлуння:
      «...єдиний, хто піклується про ваших дітей.»

      Ліна — побіліла: «Тринадцятий.» Зупиняється. «Ти пішов —
      і пропустив останній. Найсильніший.»

      Марко видихає. Захистив голову — втратив картину. Натовп
      розходиться з площі — обличчя теплі, розслаблені. Вони щойно
      почули тринадцять прийомів і повірили в кожен. А Марко
      тепер навіть не зможе назвати тринадцятий.

      Повертається. За хвилину вони знову в натовпі — Голос ще
      кланяється, остання фраза висить у повітрі. Ліна тихо: «Ще
      встигнемо розібрати. Однак дослухати до кінця — це частина
      роботи.»
    mood: "пішов рано — залишився без останнього і найважливішого"

  # ── s06 ─────────────────────────────────────────────────────
  - scene_id: ep043_s06
    dialogue:
      - who: Голос
        line: "Або ви зі мною — або з хаосом!"
      - who: Лина
        line: "Хибна дилема. Сім."
      - who: Голос
        line: "Хлопчик хоче знищити все, що ми збудували!"
      - who: Лина
        line: "Опудало. Вісім."
      - who: Голос
        line: "Кожна нормальна людина це розуміє!"
      - who: Лина
        line: "Тиск на норму. Дев'ять."
      - who: Голос
        line: "Згадайте, як було ДО мене!"
      - who: Лина
        line: "Напівправда. Десять. Згадує лише погане — а добре мовчки."
      - who: Голос
        line: "Якщо я піду — хто захистить ваших дітей?"
      - who: Лина
        line: "Ще одна хибна дилема. Одинадцять."
      - who: Голос
        line: "Подивіться на результати! Місто стоїть!"
      - who: Лина
        line: "Після/внаслідок. Дванадцять."
    mood: "лік дванадцять — промова на піку"

  # ── s07 ─────────────────────────────────────────────────────
  - scene_id: ep043_s07
    author_text: >
      Голос робить паузу. Довгу. Дивиться на натовп. І промовляє
      тихо. Майже ніжно:
    dialogue:
      - who: Голос
        line: "Я єдиний, хто піклується про ваших дітей."
      - who: Лина
        line: "Тринадцять."
    author_text_after: >
      Голос Ліни — інший. Не холодний. Не аналітичний. Тихий.

      Рей стоїть у натовпі. Не на сцені. Не поряд із Голосом.
      Серед людей. Марко бачить його — три ряди вперед. Рей
      слухає. Обличчя — дивне. Не захват. Не злість. Щось між.
    mood: "тринадцятий — найм'якший і найстрашніший"

  # ── s08 ─────────────────────────────────────────────────────
  - scene_id: ep043_s08
    author_text: >
      Марко відчуває важкість у рюкзаку. Старі окуляри в простій
      оправі. Леон віддав перед стиранням: «Візьми. Коли зрозумієш
      — надінеш.» Тоді Марко не зрозумів. Поклав до кишені й забув.

      Зараз — дістає. Надіває.

      Натовп змінюється. Не обличчя — нитки. Тонкі, сірі нитки
      ідуть від кожної людини до балкона. Від балкона — назад
      униз, у натовп, як павутина. Голос тримає їх у руках, однак
      і вони тримають його.

      Рей. Від нього — нитка тонка. Коливається. Не натягнута, як
      в інших. Не йде до балкона — іде ВБІК. До когось ще.

      Марко знімає окуляри. Ховає в кишеню. Не зараз. Потім —
      розберемося.

      Натовп аплодує. Голос кланяється. Іде з балкона.
    mood: "окуляри Леона показують павутину — у Рея нитка вбік"

  # ── s09 ─────────────────────────────────────────────────────
  - scene_id: ep043_s09
    dialogue:
      - who: Софа
        line: "Тринадцять прийомів в одній промові."
      - who: Софа
        line: "Марко, у всіх цих прийомів є спільне ім'я."
    mood: "Софа підводить до спільного терміна"

  # ── s10 ─────────────────────────────────────────────────────
  - scene_id: ep043_s10
    author_text: >
      ДЕМАГОГІЯ — це коли промова ВИГЛЯДАЄ переконливою, однак
      усередині — порожнеча. Видимість аргументу без аргументу.

      Демагог не обов'язково бреше. Голос вірить у свої слова.
      Однак він веде кривою дорогою — не туди, куди ти вирішив
      іти, а туди, куди він хоче тебе привести.

      Усі тринадцять прийомів — це види демагогії. Підміна тези —
      демагогія. Нападка — демагогія. Опудало — демагогія. Хибна
      дилема — демагогія. Напівправда — демагогія. У кожного —
      своє ім'я, однак спільний діагноз один.

      СЛОВА-ТРИГЕРИ — маркери, за якими демагогію можна впізнати
      на льоту.

      «Усі знають...» — хто всі? Де список?

      «Це ж очевидно!» — для кого? Чому?

      «Будь-яка нормальна людина...» — хто вирішив, що нормально?

      «Кожен розуміє...» — кожен? Справді?

      Якщо чуєш таке — увага. Найімовірніше, за красивими словами
      немає жодного факту.

      ФІЛЬТР. Чотири літери, два слова: ДЕ ФАКТИ?

      Застосовуй до будь-якої промови. Якщо за словами немає
      фактів — демагогія. Неважливо, наскільки красиво звучить.
      Неважливо, чи вірить мовець.
    mood: "карта інструмента — спільний діагноз і фільтр"

