  # ── s23 ─────────────────────────────────────────────────────
  - scene_id: ep018_s23
    author_text: >
      Марко простежує гілку. Шкільний журнал. Доступ. Розклад. Кабінет.

      Одна гілка веде до людини, яка має доступ до журналу, знає розклад, буває в школі й у Місті. Учитель.

      Марко пише на стіні вугіллям одне слово:

      ВІРА.
    mood: "ім'я, на яке не чекали — біля кореня гілки назовні"

