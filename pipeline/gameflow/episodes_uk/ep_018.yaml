  # ── s22 ─────────────────────────────────────────────────────
  - scene_id: ep018_s22
    question: "«Через десять років усі будуть літати на машинах!» Одна людина думає чи багато перевірили?"
    options:
      - id: one
        text: "Одна людина думає"
      - id: many
        text: "Багато людей перевірили"
    correct_logic: "Фантазія. Ніхто не перевірив, бо це майбутнє. Передбачення — не факт."
    feedback_success: "Фантазія. Ніхто не перевірив, бо це майбутнє. Передбачення — не факт."
