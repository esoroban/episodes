episode_id: 18
episode_title: "Дерево зв'язків"
lang: uk
terms_introduced:
  - "правило двох джерел"
  - "одна людина думає vs багато людей перевірили"
terms_used:
  - "своїми очима"
  - "почув від інших"
  - "три питання для перевірки"
  - "рівні інтернету"
  - "дипфейк"

scenes:

  # ── s01 ─────────────────────────────────────────────────────
  - scene_id: ep018_s01
    author_text: >
      Записка Софії в кишені. Голос Софії в Софі. Марко сидить у підпіллі й малює.

      Стіна перед ним — чиста. Шматок вугілля в руці. Він малює дерево. Не те, що росте із землі. Інше. Дерево ЗВ'ЯЗКІВ.
    mood: "перехід від слів — до схеми"

  # ── s02 ─────────────────────────────────────────────────────
  - scene_id: ep018_s02
    author_text: >
      Корінь — Голос. Від нього — гілки. Кожна гілка — агент, контролер, динамік, дзеркало. Усе веде до Голосу. Кожна нитка, кожна команда, кожне стирання.

      Марко малює. Гілка — агент на Рекламній вулиці. Гілка — Рей на площі. Гілка — дзеркала-портали. Гілка — числа на зап'ястях.

      Усе веде до Голосу.
    mood: "усе сходиться в один корінь"

  # ── s03 ─────────────────────────────────────────────────────
  - scene_id: ep018_s03
    author_text: >
      Крім однієї.

      Одна гілка йде не ВСЕРЕДИНУ Міста. Вона йде НАЗОВНІ. У реальний світ. Хтось ззовні передає інформацію. Шкільний журнал — оцінки, розклад, імена. Інформація, яку Голос не міг би отримати сам.

      Марко обводить цю гілку вугіллям. Жирно. Двічі.
    mood: "тріщина в карті — промінь назовні"
    question: "Марко відчуває — треба щось робити. Що?"
    options:
      - id: check
        text: "Відступити й перевірити — одне джерело чи два?"
      - id: rush
        text: "Кинутися по цій гілці одразу"

  # ── s03b ─────────────────────────────────────────────────────
  - scene_id: ep018_s03b
    author_text: >
      Марко схоплюється. Рука вже в повітрі — побігти. Вийти. Знайти.

      Потім — зупиняється. Гілка одна. Одне джерело. Якщо він помилився — він побіжить у порожнечу. Або не в той бік.

      Розвідник перевіряє. Марко сідає назад.
    mood: "перший ривок — і перша ж зупинка"

  # ── s03_sofa ─────────────────────────────────────────────────
  - scene_id: ep018_s03_sofa
    dialogue:
      - who: Софа
        line: "Одна гілка назовні. Одне джерело. Достатньо?"
      - who: Марко
        line: "Ні."
      - who: Софа
        line: "Чому?"
      - who: Марко
        line: "Бо одне джерело — це один свідок. Може мати рацію. А може переплутати."
      - who: Софа
        line: "Саме так."
    mood: "перша перевірка — на собі"

  # ── s04 ─────────────────────────────────────────────────────
  - scene_id: ep018_s04
    author_text: >
      ПРАВИЛО ДВОХ ДЖЕРЕЛ — золоте правило журналістів: якщо два НЕЗАЛЕЖНИХ джерела кажуть одне й те саме — інформації можна вірити набагато більше.

      Ключове слово — НЕЗАЛЕЖНИХ. Троє однокласників, які дізнались з одного чату, — це одне джерело, не три. Один автор на двох платформах — одне джерело. Один плакат на двох парканах: парканів два, а плакат — один.

      Друге правило. ОДНА ЛЮДИНА ДУМАЄ — це ще не факт. Навіть якщо людина розумна. Навіть якщо людина — твоя сестра. ФАКТ — коли БАГАТО ЛЮДЕЙ незалежно перевірили й підтвердили. Сто людей не обдуриш.
    mood: "правило стає поверх власного випадку"

  # ── s05_sofa ─────────────────────────────────────────────────
  - scene_id: ep018_s05_sofa
    dialogue:
      - who: Софа
        line: >
          Підпілля каже: «Голос був учителем.» Записка Софії каже те саме. Два джерела чи одне?
      - who: Марко
        line: "Підпілля дізналось від Софії. Вона побудувала мережу."
      - who: Марко
        line: "Отже, підпілля — відлуння Софії. Одне джерело."
      - who: Софа
        line: "Саме так. Відлуння в горах — це не друга людина."
      - who: Софа
        line: "Перевіримо."
    mood: "Марко ловить правило раніше за Софу"

  # ── s06 ─────────────────────────────────────────────────────
  - scene_id: ep018_s06
    question: "Учителька й мама Марка записали екскурсію в розклад. Кожна — окремо. Два джерела чи одне?"
    options:
      - id: two
        text: "Два джерела"
      - id: one
        text: "Одне джерело"
    correct_logic: "Учителька дізналась від школи. Мама — від дитини. Кожна перевірила по-своєму. Незалежні."
    feedback_success: "Учителька дізналась від школи. Мама — від дитини. Кожна перевірила по-своєму. Незалежні."
    feedback_soft_fail: "Звідки учителька знає про екскурсію? Від школи. Звідки мама? Від дитини. Це різні шляхи — отже, незалежні."
    mood: "два різні шляхи — два джерела"

  # ── s07 ─────────────────────────────────────────────────────
  - scene_id: ep018_s07
    question: "Троє однокласників кажуть: «Завтра контрольна!» Усі троє дізналися з одного чату. Два джерела чи одне?"
    options:
      - id: two
        text: "Три джерела"
      - id: one
        text: "Одне джерело"
    correct_logic: "Один чат — один плакат. Три паркани, але плакат один."
    feedback_success: "Один чат — один плакат. Три паркани, але плакат один."
    feedback_soft_fail: "Рахуй не однокласників. Рахуй, звідки вони дізнались. Скільки «звідки»? Одне."
    mood: "класична пастка відлуння"

  # ── s08 ─────────────────────────────────────────────────────
  - scene_id: ep018_s08
    question: "Новинний сайт пише: «У парку знайшли рідкісного птаха.» Друг Марка каже: «Я сам бачив цього птаха!» Два джерела?"
    options:
      - id: two
        text: "Два джерела"
      - id: one
        text: "Одне джерело"
    correct_logic: "Сайт і очевидець дізналися окремо. Незалежні."
    feedback_success: "Сайт і очевидець дізналися окремо. Незалежні."
    feedback_soft_fail: "Друг читав новини? Ні — він бачив своїми очима. Сайт бачив? Ні — йому розповіли. Різні шляхи."
    mood: "сайт і очевидець — різні струмочки"

  # ── s09 ─────────────────────────────────────────────────────
  - scene_id: ep018_s09
    question: "Те саме відео завантажене на два сайти. Два джерела?"
    options:
      - id: two
        text: "Два джерела"
      - id: one
        text: "Одне джерело"
    correct_logic: "Одне відео — один автор. Дві платформи — два паркани, але відео одне."
    feedback_success: "Одне відео — один автор. Дві платформи — два паркани, але відео одне."
    feedback_soft_fail: "Платформа — це не джерело, це паркан. Відео зняла одна людина? Отже, джерело одне."
    mood: "два майданчики, один плакат"

  # ── s10 ─────────────────────────────────────────────────────
  - scene_id: ep018_s10
    question: "Сусідка каже: «У парку ремонт.» На сайті міста — оголошення про ремонт. Два джерела?"
    options:
      - id: two
        text: "Два джерела"
      - id: one
        text: "Одне джерело"
    correct_logic: "Сусідка бачила своїми очима. Сайт — офіційний. Незалежні."
    feedback_success: "Сусідка бачила своїми очима. Сайт — офіційний. Незалежні."
    feedback_soft_fail: "Сусідка бачила сама. Сайт написаний за документами адміністрації. Різні шляхи — два джерела."
    mood: "очевидець і офіційний сайт — підтверджують"

  # ── s11 ─────────────────────────────────────────────────────
  - scene_id: ep018_s11
    author_text: >
      На стіні підпілля — два скриншоти поруч. Двоє блогерів з різних каналів. Обидва тримають ті самі навушники. Обидва захоплено усміхаються. Обидва пишуть: «Вогонь! Рекомендую!»

      Марко придивляється. Унизу — дрібним шрифтом — один і той самий рядок: «Дякую бренду за подарунок.»

      Одні навушники. Один замовник. Двоє блогерів.
    question: "Двоє блогерів хвалять одні й ті самі навушники. Обидва отримали їх безкоштовно від виробника. Два джерела чи одне?"
    options:
      - id: two
        text: "Два джерела"
      - id: one
        text: "Одне джерело"
    correct_logic: "Обидва отримали товар від одного замовника. Залежні — в обох вигода від одного й того самого."
    feedback_success: "Обидва отримали товар від одного замовника. Залежні — в обох вигода від одного й того самого."
    feedback_soft_fail: "Хто їх мотивує? Один і той самий виробник. Один гачок — усі спіймані. Це відлуння, не два джерела."
    mood: "класика проплаченого відлуння — побачити ниточку ззаду"

  # ── s12_sofa ─────────────────────────────────────────────────
  - scene_id: ep018_s12_sofa
    dialogue:
      - who: Софа
        line: "Правило... вісімнадцяте."
      - who: Софа
        line: "Правило двох джерел: два НЕЗАЛЕЖНИХ джерела підтверджують — надійно."
      - who: Софа
        line: >
          Кількість переказувачів не дорівнює кількості джерел. Один плакат на двох парканах — це все ще один плакат.
    mood: "правило стає як пункт у схемі"

  # ── s13 ─────────────────────────────────────────────────────
  - scene_id: ep018_s13
    author_text: >
      Марко повертається до дерева на стіні. Одна гілка назовні. Потрібне друге джерело.

      Жінка з числом дванадцять показує Марку пост, який поширюється підпіллям уже давно. Записка, переписана від руки: «Зникло кошеня! Руде, з білою плямою на лобі. Того, хто знайде, прошу повернути! Востаннє бачили біля фонтана.» Миле. Зворушливе. Без підпису. Без дати.
    mood: "дрібничка з чату — а по ній видно весь інструмент"

  # ── s13_sofa ─────────────────────────────────────────────────
  - scene_id: ep018_s13_sofa
    dialogue:
      - who: Софа
        line: "Комплексна перевірка. Усі інструменти."
    mood: "короткий старт — і в бій"

  # ── s14 ─────────────────────────────────────────────────────
  - scene_id: ep018_s14
