    options:
      - id: seen
        text: "Своїми очима"
      - id: heard
        text: "Почув від інших"
    correct_logic: "Автор невідомий. Переписана від руки — переказ переказу."
    feedback_success: "Автор невідомий. Переписана від руки — переказ переказу."
    feedback_soft_fail: "Хто написав першим? Невідомо. А хто в тебе в руках тримає — переписав чуже? Це «почув від інших»."
    mood: "без автора — отже, переказ"

