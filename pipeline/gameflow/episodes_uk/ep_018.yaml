        text: "Третя полиця (блоги та соцмережі)"
      - id: fourth
        text: "Четверта полиця (чати та пересилки)"
    correct_logic: "Четвертий рівень: чати та пересилки. Шепіт у темному коридорі — найненадійніший рівень."
    feedback_success: "Четвертий рівень: чати та пересилки. Шепіт у темному коридорі — найненадійніший рівень."
    feedback_soft_fail: "Чат або пересилка «від руки» — яка полиця? Найненадійніша. Це четверта."
    mood: "нижня полиця — нижній рівень довіри"

  # ── s17 ─────────────────────────────────────────────────────
  - scene_id: ep018_s17
    question: "Записка без дати. Чому це важливо?"
    options:
