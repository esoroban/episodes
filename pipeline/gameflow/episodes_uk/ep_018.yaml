    correct_logic: "Немає контактів, немає адреси, немає імені автора. Три питання: хто написав — невідомо, чи хоче чогось — незрозуміло, перевірити — неможливо."
    feedback_success: "Немає контактів, немає адреси, немає імені автора. Три питання: хто написав — невідомо, чи хоче чогось — незрозуміло, перевірити — неможливо."
    feedback_soft_fail: "Є телефон на записці? Ім'я? Адреса? Якщо жодного — перевірити нічим."
    mood: "третій ключ — червоний"

  # ── s16 ─────────────────────────────────────────────────────
  - scene_id: ep018_s16
