    correct_logic: "Абсурдний фінал. Кожна ланка все менш імовірна. Остання — неможлива."
    feedback_success: "Найслабша — фінальна. Абсурдний фінал — типова ознака ланцюжка."
    feedback_soft_fail: "Фінальна ланка — це вже фантастика. Від запізнення до життя в коробці — п'ять стрибків, кожен менш імовірний. Найслабша — остання."
    mood: "впізнав — абсурд"

  # ── s10 ─────────────────────────────────────────────────────
  - scene_id: ep034_s10
    question: "Перевір ланцюжок Ліни: «Віддам пам'ять → Система прийме → сестра звільниться.» Перша ланка: «Система прийме пам'ять.» Це точно чи може?"
