episode_id: 34
episode_title: "Три нитки"
lang: uk
terms_introduced:
  - "три рентгенівські питання"
terms_used:
  - "страшний ланцюжок"
  - "маніпуляція страхом"
  - "три питання-фільтри"

scenes:

  # ── s01 ─────────────────────────────────────────────────────
  - scene_id: ep034_s01
    author_text: >
      Ліна закочує рукав. Повільно. Не одна нитка — три. Сірі,
      тонкі, одна вросла в шкіру. Три контакти із Системою.

      Повітря в тунелі — холодне. Дзеркала обабіч — мутні, старі.

      Сем ховається за Марка. Очі — насторожені. Не довіряє.
      Ні на грам.
    mood: "три шрами на зап'ясті — три контакти ДО всього"

  # ── s02 ─────────────────────────────────────────────────────
  - scene_id: ep034_s02
    dialogue:
      - who: Марко
        line: "Три?"
      - who: Ліна
        line: "До всього. До знайомства з тобою. До походу в Місто. Я знала про Місто раніше, ніж ти думаєш."
      - who: Марко
        line: "Ти брехала від самого початку?"
      - who: Ліна
        line: "Ні. Я мовчала. Це різні речі."
      - who: Ліна
        line: "Я можу допомогти звільнити сестру. Віддам свою пам'ять Системі — вона прийме обмін. Пам'ять за її свободу."
    author_text_after: >
      Тиша. Пропозиція висить у повітрі — важка, мов камінь
      на мотузці.

      Марко відчуває роздвоєність. Злість — вона приховувала.
      Вдячність — вона пропонує жертву. Голова паморочиться від
      суперечностей.
    mood: "мовчання ≠ брехня — однак звучить як пастка"

  # ── s03 ─────────────────────────────────────────────────────
  - scene_id: ep034_s03
    author_text: >
      Ліна чекає. Сем дивиться на Марка — не кліпає.
    dialogue:
      - who: Ліна
        line: "Час. Вікно зачиняється. Вирішуй."
    author_text_after: >
      Ліна пропонує порятунок сестри — однак обмін на її пам'ять
      дорогий і нічим не гарантований. «Погодитися без перевірки» —
      стара помилка. Та сама, на якій Марко ловив себе годину
      тому. Відмовитися без перевірки — теж помилка.
    mood: "спокуса прийняти жертву — без перевірки"
    question: "Що робить Марко?"
    options:
      - id: check_three
        text: "Стоп. Перевіримо ланки трьома питаннями."
      - id: accept_now
        text: "Згоден. Віддавай пам'ять — звільни сестру!"

  # ── s03b ────────────────────────────────────────────────────
  - scene_id: ep034_s03b
    dialogue:
      - who: Марко
        line: "Згоден! Віддавай пам'ять — звільни сестру!"
    author_text_after: >
      Ліна не рухається. Не йде до Системи. Дивиться — і чекає.

      Сем тягне за рукав. «Марку. Стій. А раптом не прийме? А раптом
      сестра не звільниться? А раптом…»

      Три «раптом». Це і є три питання, які Марко проскочив.

      Точно чи може? Який шанс? Чи можна змінити?

      Марко видихає. Повертається.
    mood: "поквапився — однак три «раптом» Сема стали трьома питаннями"

  # ── s04 ─────────────────────────────────────────────────────
  - scene_id: ep034_s04
    dialogue:
      - who: Софа
        line: "Стоп. Ланцюжок із трьох ланок. Перш ніж погодитися — просвічуємо кожну."
    mood: "Софа називає інструмент"

  # ── s05 ─────────────────────────────────────────────────────
  - scene_id: ep034_s05
    author_text: >
      ТРИ РЕНТГЕНІВСЬКІ ПИТАННЯ. Інструмент, що просвічує
      будь-який ланцюжок. Ланка за ланкою.

      ПЕРШЕ. Це ТОЧНО станеться — чи лише МОЖЕ?

      ДРУГЕ. Який шанс — великий, середній, маленький, крихітний?

      ТРЕТЄ. Чи можна щось ЗМІНИТИ на цьому кроці?

      Якщо хоч одна відповідь — «не точно», «маленький» або «так, можна
      змінити» — ланка паперова. Ланцюжок не працює.

      Ланцюжок міцний рівно настільки, наскільки міцна найслабша
      його ланка.
    mood: "три питання — рентгенівський апарат для ланцюжка"

  # ── s06 ─────────────────────────────────────────────────────
  - scene_id: ep034_s06
    question: "Ланцюжок: «Не доїм суп → мама засмутиться → не пустить гуляти → не потраплю на тренування → виженуть з команди з баскетболу!» Яка ланка найслабша?"
    options:
      - id: kicked_out
        text: "Виженуть з команди"
      - id: not_let_walk
        text: "Не пустить гуляти"
      - id: mom_upset
        text: "Мама засмутиться"
    correct_logic: "Одне пропущене тренування ≠ виключення. Точно? Ні. Шанс? Крихітний. Чи можна змінити? Так — пояснити тренеру."
    feedback_success: "Найслабша — фінальна. Одне тренування ≠ виключення."
    feedback_soft_fail: "Просвічуємо кожну трьома питаннями. «Мама засмутиться» — може бути. «Не пустить гуляти» — можливо. А ось «виженуть з команди» — за одне тренування? Маленький шанс. Це найслабша ланка."
    mood: "перший розбір — рентген"

  # ── s07 ─────────────────────────────────────────────────────
  - scene_id: ep034_s07
    question: "Ланцюжок: «Загубив телефон → не зможу зателефонувати друзям → друзі образяться → залишуся зовсім сам!» Яка ланка найслабша?"
    options:
      - id: alone_forever
        text: "Залишуся зовсім сам"
      - id: friends_offended
        text: "Друзі образяться"
      - id: cant_call
        text: "Не зможу зателефонувати"
    correct_logic: "Друзі образяться через один дзвінок? Точно? Ні. Шанс? Крихітний. Можна написати, зустрітися особисто."
    feedback_success: "Найслабша — фінальна. Від пропущеного дзвінка до самотності — прірва."
    feedback_soft_fail: "Можна зустрітися особисто, написати повідомлення, попросити батьків передати. Чи можна змінити? Так. Фінальна ланка — паперова."
    mood: "впізнав — слабка остання"

  # ── s08 ─────────────────────────────────────────────────────
  - scene_id: ep034_s08
    question: "Ланцюжок: «Не прибрав кімнату → мама знайде безлад → прийдуть гості → побачать безлад → заведуться таргани!» Яка ланка найслабша?"
    options:
