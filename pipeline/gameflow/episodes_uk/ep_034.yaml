    correct_logic: "Немає гарантії. Раніше не означає зараз. Шанс — невідомий."
    feedback_success: "«Раніше приймала» ≠ «прийме зараз». Лише може."
    feedback_soft_fail: "Якби Ліна сказала «Я знаю напам'ять, що Система ЗАВЖДИ приймає» — це було б «точно». Однак «приймала раніше» — це «може». Ланка — не залізна."
    mood: "сюжетний квіз — рентген на план Ліни"

