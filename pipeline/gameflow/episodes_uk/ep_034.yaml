        text: "Ланка два — «сестра звільниться»"
      - id: system_accepts
        text: "Ланка один — «Система прийме»"
      - id: can_change
        text: "Ланка три — «можна змінити»"
    correct_logic: "Немає гарантії повернення. Шанс маленький. Стерті не завжди повертаються."
    feedback_success: "Найслабша — найважливіша. Без звільнення сестри вся жертва безглузда."
    feedback_soft_fail: "Ланка один — «може». Ланка три — «так, можна змінити». Однак ланка два — немає гарантії звільнення сестри. Це найслабша і найважливіша."
