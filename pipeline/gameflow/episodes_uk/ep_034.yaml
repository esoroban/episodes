    feedback_success: "Три нитки — факт. Усе решта — драбина припущень."
    feedback_soft_fail: "Факт тут лише один: на руці три нитки. Далі — драбина «шпигун», «зрада», «загибель», кожен крок менш імовірний. Це страшний ланцюжок у голові."
    mood: "сюжетний квіз — відокремити факт від ланцюжка"

