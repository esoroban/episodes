        text: "Заведуться таргани"
      - id: guests_see
        text: "Гості побачать"
      - id: mom_finds
        text: "Мама знайде"
    correct_logic: "Від безладу до тарганів — величезний стрибок. Точно? Ні. Шанс? Крихітний."
    feedback_success: "Найслабша — фінальна. Безлад ≠ таргани."
    feedback_soft_fail: "Безлад — це про неприбраність, таргани — про комах. Між ними ціла прірва. Просвічуємо рентгеном — остання ланка паперова."
    mood: "розминка йде — впізнає"

  # ── s09 ─────────────────────────────────────────────────────
  - scene_id: ep034_s09
    question: "Ланцюжок: «Ліг спати пізно → просплю → запізнюся в школу → учитель насварить → пересадять за останню парту → житиму в коробці!» Яка ланка найслабша?"
    options:
