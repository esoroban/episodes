        line: "Правило тридцять четверте."
      - who: Софа
        line: "Три рентгенівські питання. Точно чи може? Який шанс? Чи можна змінити?"
      - who: Софа
        line: "Якщо хоч одна відповідь — «не точно», «маленький» або «так, можна» — ланцюжок не працює."
    mood: "інструмент названо"

  # ── s12 ─────────────────────────────────────────────────────
  - scene_id: ep034_s12
    author_text: >
      Марко стоїть перед Ліною. Застосовує рентгенівські питання. Уголос.
      Як хірург, що перевіряє кожен шов.
    dialogue:
      - who: Марко
        line: "Ланка один. Система ТОЧНО прийме твою пам'ять?"
      - who: Ліна
        line: "Вона приймала раніше."
      - who: Марко
        line: "Ланка два. Сестра ТОЧНО звільниться, якщо Система прийме пам'ять?"
      - who: Ліна
        line: "…"
      - who: Марко
        line: "Ланка три. Чи можна щось змінити?"
      - who: Марко
        line: "Так. Ми знайшли обхідний тунель для першого кроку. Може, є й інший шлях до сестри — без жертви."
