  - scene_id: ep034_s14
    question: "Три нитки Ліни — три контакти із Системою до всього. Сем думає: «Вона шпигун → вона зрадила Марка → вона приведе Голос → ми всі загинемо!» Це страшний ланцюжок чи факт?"
    options:
