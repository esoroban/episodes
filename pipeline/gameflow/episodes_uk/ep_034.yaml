    correct_logic: "Обхідний тунель довів: альтернативи існують. Жертва Ліни — не єдиний варіант."
    feedback_success: "Альтернатива вже є в досвіді: тунель Сема. Змінювати — можна."
    feedback_soft_fail: "Якщо першу ланку карти Голосу можна обійти — може, і до сестри знайдеться інший шлях. Жертва не єдиний спосіб. Третє питання відповідає «так»."
    mood: "сюжетний квіз — альтернатива є"

