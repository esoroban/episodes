scenes:

  # ── s01 ─────────────────────────────────────────────────────
  - scene_id: ep037_s01
    author_text: >
      Темний провулок. Дзеркала на стінах — погасли. Просто стіни. Без
      відбитків, без шепоту, без чужих облич. Місто вперше — темне
      по-справжньому.

      Ліна зупиняється на повороті. Не квапиться йти.
    dialogue:
      - who: Лина
        line: "Софія говорила про якесь дзеркало. У неї було. Маленьке — у долоню. Коли не розумієш, що бачиш — воно показувало, як є."
      - who: Лина
        line: "Я шукала. Не знайшла. Не знаю, як вона його ховала."
      - who: Марко
        line: "Дзеркало... у долоню."
    author_text_after: >
      Марко повільно опускає рюкзак. Розстібає. Усередині — тепло.

      Скляний диск розміром із долоню. Мерехтить ізсередини. Дзеркало
      Повторень. Те саме, від Леона — з його майстерні. Лежить на дні
      рюкзака відтоді, як Леон стерся.

      Марко виймає. Ліна дивиться. Довго.
    dialogue_after:
      - who: Лина
        line: "Леон... знав більше, ніж здавалося. Можливо, Софія і Леон — один ланцюжок."
      - who: Лина
        line: "Я знаю інший шлях до Софії. Свій. Зустрінемося нагорі."
    mood: "Ліна дала напрямок — Марко згадав, що інструмент уже в нього"

  # ── s02 ─────────────────────────────────────────────────────
  - scene_id: ep037_s02
    author_text: >
      Кроки. Повільні. Упевнені. Не з динаміків. Живі.

      Рей. Уперше — не на площі, не по радіо. Сам на сам. У провулку.
      Марко бачить його зблизька: пальці шкребуть по кишені. Губи
      усміхаються. Шия — напружена.
    dialogue:
      - who: Рей
        line: "Марко."
      - who: Рей
        line: "У мене пропозиція. Проста. Два варіанти."
      - who: Рей
        line: "Перший: ти віддаєш артефакти. Добровільно. Голос відпускає сестру. Повністю. Без сірого ока. Якою була."
      - who: Рей
        line: "Другий: ти не віддаєш. І Голос забере сам. Але сестра — залишиться зі мною. Назавжди."
    author_text_after: >
      Динаміки на стіні — мертві — оживають.
    dialogue_after:
      - who: Голос
        line: "Віддай артефакти — відпущу сестру. Залиш — вона моя назавжди."
    mood: "стіни стискаються — два варіанти, як лещата"

  # ── s03 ─────────────────────────────────────────────────────
  - scene_id: ep037_s03
    author_text: >
      Два варіанти. Лише два. Як стіни, що стискаються. Марко відчуває
      тиск у грудях. Треба обрати. ЗАРАЗ.

      Звичка тягне руку — погодитися з тим, хто сказав останнім.
      Зараз «останнього» звуть Рей і Голос. Логіка та сама.
    mood: "спокуса віддати — стара слабкість"
    question: "Що робить Марко?"
    options:
      - id: refuse_search_third
        text: "Відмовляюся. Між «віддати» і «втратити» має бути третій варіант."
      - id: agree_now
        text: "Погоджуюся віддати. Рей із Голосом сказали — цього досить."

  # ── s03b ────────────────────────────────────────────────────
  - scene_id: ep037_s03b
    author_text: >
      Рука Марка тягнеться до кишені — де артефакти. Сем хапає за
      зап'ясток. Сильно.

      «Стій», — пошепки.

      Марко завмирає. І чує всередині те саме, що чув у ep_036, біля
      блокнота Ліни. Та сама помилка. Та сама логіка «погодитися з
      останнім». Зараз «останній» — Рей. І Голос. Через динаміки —
      два голоси в один бік.

      Один голос гучніший — не означає правильний. Два голоси в один
      бік — це теж не закон.

      Марко видихає. Опускає руку. Повертається.
    mood: "поквапився — стара слабкість в одязі тиску"

  # ── s04 ─────────────────────────────────────────────────────
  - scene_id: ep037_s04
    dialogue:
      - who: Софа
        line: "Зачекай. Скільки варіантів тобі запропонували?"
      - who: Софа
        line: "Пастка. Називається — хибна дилема."
    mood: "Софа маркує пастку — без пояснення теорії"

  # ── s05 ─────────────────────────────────────────────────────
  - scene_id: ep037_s05
    author_text: >
      ХИБНА ДИЛЕМА — це пастка з двох варіантів.

      Тобі кажуть: «Або так, або так. Обирай.» І здається, що шляхів
      два. А насправді — більше. Просто решту сховали.

      Рей дав два шляхи. Голос — теж два. Випадково?

      Буває, що «або-або» працює по-справжньому. У цього правила є
      ім'я — ЗАКОН ВИКЛЮЧЕНОГО ТРЕТЬОГО. Для лампочки — горить чи не
      горить, третього немає. Для числа — парне чи непарне, третього
      немає.

      Але люди — не лампочка. Між «друг» і «ворог» є приятель,
      однокласник, сусід по парті. Між «віддай» і «втрать» — двері,
      які зачинили, щоб ти їх не побачив.

      Слова-пастки: «або… або…», «або ти з нами, або проти нас»,
      «третього не дано», «вибору немає».

      Ця пастка рідко виглядає як пастка. Частіше — як звичайний
      вибір. Три місця, де її ставлять найчастіше.

      ПЕРШЕ — погроза. «Зроби це, або буде погано.» «Або буде погано»
      зачинили, як стіну. А там — десятки шляхів.

      ДРУГЕ — поспіх. «Вирішуй просто зараз.» Якщо немає хвилини
      подумати «А що ще можна?» — її забрали навмисне.

      ТРЕТЄ — тиск від своїх. «Або з нами, або проти.» Між «свій» і
      «чужий» є приятель і просто знайомий.

      Головна ознака: запитав «А чи є третій шлях?» — людина злиться.
      Це майже завжди пастка.

      Сигнал: почув «або — або» — шукай третій шлях. Він майже завжди
      є.
    mood: "карта відмінності: закон працює / закон не працює"

  # ── s06 ─────────────────────────────────────────────────────
  - scene_id: ep037_s06
    dialogue:
      - who: Софа
