  - scene_id: ep024_s02
    dialogue:
      - who: Агент 1
        line: "Макс, ти ж хотів ЗАХИСТИТИ друга? Але захист — це боягузтво. Боягуз ховається за іншого."
      - who: Агент 2
        line: "Ваша ДРУЖБА — це залежність. Один не може без одного. Це слабкість."
      - who: Агент 3
        line: "ХОРОБРІСТЬ — це дурість. Розумні не ризикують."
    author_text_after: >
      Захист = боягузтво? Секунду тому захист був хоробрістю.

      Дружба = залежність? Слово те саме. Сенс — інший.

      Хоробрість = дурість? Наче хтось перефарбував меблі, поки Макс
      спав. Стілець той самий — колір чужий.
    mood: "три підміни за хвилину — тихо, майже ніжно"
    question: "Що робить Марко?"
    options:
