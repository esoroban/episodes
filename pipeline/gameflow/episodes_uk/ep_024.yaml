  # ── s01 ─────────────────────────────────────────────────────
  - scene_id: ep024_s01
    author_text: >
      Глухий кут. Стіни з обох боків. Марко і Макс — у пастці. Агенти
      блокують вихід. Троє. Спокійні. Не кричать.

      Говорять тихо. Майже ніжно.
    mood: "найнебезпечніша тиша епізоду"

