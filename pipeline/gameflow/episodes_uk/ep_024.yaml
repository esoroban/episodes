        text: "Запам'ятати кожну підміну — повертатиму"
      - id: shout
        text: "Крикнути Максу: «тримайся!»"

  # ── s02b ─────────────────────────────────────────────────────
  - scene_id: ep024_s02b
    author_text: >
      Марко хапає Макса за плече. Кричить:

      «Макс, тримайся! Це підміна! Вони перейменовують!»

      Макс повертає голову — повільно. Обличчя майже прозоре, очі вже
      сірі. Дивиться на Марка — і наче крізь. Не чує слів. Чує звук,
      але не слова.

      Марко відпускає плече. Крик не проходить. Треба діяти інакше.
      Через агентів. Через їхні слова.
    mood: "крик не пробиває — Макс уже всередині підміни"

  # ── s03 ─────────────────────────────────────────────────────
  - scene_id: ep024_s03
