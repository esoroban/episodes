        line: "Файл. Голос Софії. Розблоковано від втрати."
    unlock_button:
      text: "Увімкнути аудіо Софії"
      reveals:
        who: "София"
        line: "Пробач. Макса я не планувала. Його не було в програмі."
    dialogue_after:
      - who: Марко
        line: "Не планувала?"
      - who: Софа
        line: "Інформацію заблоковано."
      - who: Софа
        line: "Ти ще не готовий."
    mood: "Софія не все контролювала — і це ранить"

  # ── s24_end ─────────────────────────────────────────────────
  - scene_id: ep024_s24_end
    author_text: >
      Марко стоїть сам.

      Леон стертий. Макс стертий. Ліна — зрадила? Мама — віддала
      Софію. Віра — агент Голосу.

      Число на стіні: 28.

      Марко сам. Усі союзники — або стерті, або зрадили, або виявилися
      не тим, ким здавалися.

      Контрхід не врятував Макса. Чарівна фраза не повернула.
      Питання-детектор не зупинило стирання.

      Інструменти працюють. Але іноді — запізно.
    mood: "сам на сам із Містом"
