      Макс слухає. Плутається. Його власні слова звучать чужими.
      Захист. Дружба. Хоробрість. Він знав, що ці слова означають.
      Знав — але зараз не впевнений.

      Марко дивиться на нього і розуміє: агенти не брешуть. Вони
      ПЕРЕЙМЕНОВУЮТЬ. Ті самі предмети — інші ярлики.
    mood: "підміна заходить зсередини"

  # ── s04 ─────────────────────────────────────────────────────
  - scene_id: ep024_s04
    author_text: >
      ПІДМІНА ПОНЯТЬ. Слово не змінюється, а сенс тихо перемикається.
      Як хамелеон — колір інший, а ящірка та сама. «Свобода» може
      означати «право обирати». А може — «хаос». «Друг» може означати
      «підтримку». А може — «той, хто дає списати».

      ЗАКОН ТОТОЖНОСТІ: одне слово має зберігати ОДИН сенс упродовж
      усієї розмови. Порушив — і суперечка розсипається. Бо ти
      сперечаєшся про РІЗНІ речі одним словом.

      Захист — чарівне запитання: «Що САМЕ ти маєш на увазі під...?»
      Що розмитіше слово — то легше його підмінити. З точними словами
      (числа, факти) підміну підсунути не вдасться.

      І ще — КОНТРХІД. Спокійне уточнювальне запитання замість нападу
      чи виправдовування. Два інструменти: «Коли саме?» і «Що ти маєш
      на увазі?»

      Формула: уточнити слово + попросити приклад + відокремити емоцію
      від факту.
    mood: "три інструменти проти тихої атаки"

