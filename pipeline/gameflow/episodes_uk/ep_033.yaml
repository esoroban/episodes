  # ── s01 ─────────────────────────────────────────────────────
  - scene_id: ep033_s01
    author_text: >
      Марко не спав. Очі — сухі, гарячі. Число на стіні: 24.
      Не змінилося. Мама пам'ятає.

      Сем сидить поряд. Іноді поправляє рюкзак. Тиша — щільна,
      як стіна.

      Сем розстібає рюкзак. Дістає щось загорнуте в ганчірку —
      маленький ліхтар, простий, тьмяний, з літерою «С.» на корпусі.

      Сем тихо: «Я не показував. Коли ми брали зошит у підвалі —
      він лежав поряд. Я взяв про всяк випадок. Не знав, що це.»

      Сем кладе ліхтар між ними. Не вмикає. Просто кладе.
    mood: "тиша після втрати — Сем дістає те, що беріг мовчки"

  # ── s01b ────────────────────────────────────────────────────
  - scene_id: ep033_s01b
