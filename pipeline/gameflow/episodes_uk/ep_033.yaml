      Голова киває сама. Але долоня — холодна. Щось усередині каже:
      стій.
    mood: "спокуса погодитися на все ВІДРАЗУ — стара пастка"
    question: "Що робить Марко?"
    options:
      - id: check_each
        text: "Перевіримо кожну ланку окремо. Не на все одразу."
      - id: agree_to_all
        text: "Я згоден на все! Будь-якою ціною!"

