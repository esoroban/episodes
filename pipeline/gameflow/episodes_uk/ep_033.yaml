      «Віддав — шлях до сестри відкритий. Заходь. Сестра чекає.»

      «Зайшов — Сема не бери. Він маленький, повільний. Сам
      пройдеш швидше. Сестра поруч.»

      «Дійдеш сам — ми зустрінемось. Лицем до лиця. Сам прийшов — не
      дарма.»

      Кожен крок — маленький. А разом — драбина вниз. Само скотилось.
    mood: "Голос котить маленькі кроки — драбина тягне"

