  - scene_id: ep033_s12
    author_text: >
      Марко розбирає карту Системи. Палець на першій точці.

      «Віддати ліхтар. Це ТОЧНО потрібно? Хто сказав? — Голос.
      А Голос — джерело, якому ми довіряємо?»

      Тиша. Ні. Голос — не джерело довіри. Голос — архітектор
