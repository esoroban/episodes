episode_id: 12
episode_title: "Формула висловлювання"
lang: uk
terms_introduced: ["формула висловлювання"]
terms_used: ["емпатія (співпереживання)", "активне слухання", "солдат", "розвідник", "три цілі суперечки"]

scenes:

  # ── s01 ─────────────────────────────────────────────────────
  - scene_id: ep012_s01
    author_text: >
      Марко біжить. Провулки Дзеркального Міста — однакові, як сторінки чистого зошита. Але він вже знає дорогу. Четвертий раз.

      Четвертий раз до Леона. Перший — познайомились. Другий — число впало. Третій — Леон розповів про артефакти. Четвертий...

      Двері відчинені. Леон всередині — стоїть біля стола, пальці барабанять по стільниці. Плечі стиснуті. Погляд — на двері, на вікно, на двері.
    dialogue:
      - who: Леон
        line: "Сідай. Я мушу сказати тобі дещо. Перш ніж..."
      - who: автор
        line: >
          Він замовкає. Дістає з ящика стола кабель — короткий, з роз'ємом, якого Марко не бачив.
      - who: Леон
        line: "Дай телефон."
      - who: автор
        line: >
          Марко простягає Софу. Леон вставляє кабель. Екран спалахує — вісімнадцять відсотків.
    mood: "тривога, обладнання"

  # ── s01_sofa ─────────────────────────────────────────────────
  - scene_id: ep012_s01_sofa
    dialogue:
      - who: Софа
        line: "Заряд... прийнято."
      - who: Софа
        line: "Професоре... у вас обладнання Системи?"
    mood: "розпізнавання в чаті"

  # ── s01b ─────────────────────────────────────────────────────
  - scene_id: ep012_s01b
    dialogue:
      - who: Леон
        line: "Колишнє обладнання. Система стежить за словами. Тому — швидко."
      - who: Леон
        line: Послухай, хлопче. Одна річ. Найважливіша.
      - who: Леон
        line: "У цьому Місті є людина, яку ти зустрінеш сьогодні. Можливо, вже зустрічав. Тепла. Турботлива. З м'яким голосом.\n"
      - who: Леон
        line: "Не довіряй їй. Не розповідай нічого. Навіть якщо буде страшно, навіть якщо обійме.\n"
      - who: Леон
        line: "Я не можу сказати ім'я — мене стирає якраз за це. Але ти дізнаєшся. За відчуттям «мені стало правильно, мені стало тепло». Це — гачок. Іди від тепла, Марку.\n"
    author_text_after: >
      Леон кліпає. Ліве око — карє, тепле. Праве — карє.

      «Він вважав, що діти не мають...»

      Але тіло кричить навпаки. Марко дивиться — як навчив Макс: не на слова, а на плечі, на руки, на погляд.
    question: "Що робить Марко?"
    options:
      - id: look
        text: "Оглянути кімнату"
      - id: ask
        text: "Запитати прямо"
    mood: "тривога, невідповідність слів і тіла"

  # ── s01a1 ─────────────────────────────────────────────────────
  - scene_id: ep012_s01a1
    author_text: >
      Поки Леон ходить колами, Марко оглядається. На столі — карта. Дзеркальне Місто зверху. Половина кварталів закреслена хрестиками — сірими, жирними. Стерті будинки. Стерті вулиці. Місто зменшується з кожним днем.
    mood: "візуальний доказ стирання"

  # ── s01a2 ─────────────────────────────────────────────────────
  - scene_id: ep012_s01a2
    author_text: >
      Марко перевертає карту. На звороті — список імен. Більшість закреслені сірою ручкою. Марта. Олег. Даша. Нік. Сіре, сіре, сіре. Останнє незакреслене: «Леон». Наступним буде він. Леон знає. Тому й тремтить.
    mood: "список — Леон наступний"

  # ── s01b1 ─────────────────────────────────────────────────────
  - scene_id: ep012_s01b1
    dialogue:
      - who: Марко
        line: "Професоре, ви тремтите."
      - who: Леон
        line: "Хлопче, я відчуваю... як гумку. Всередині. Стирає по краях."
    author_text_after: >
      Леон говорить рівно. Як людина, яка давно перестала боятися — бо боятися більше нічого. Руки тремтять. Слова брешуть. Тіло — ні.
    mood: "визнання приреченого"

  # ── s01b2 ─────────────────────────────────────────────────────
  - scene_id: ep012_s01b2
    dialogue:
      - who: Леон
        line: "Вчора я пам'ятав — хто я. Сьогодні — тільки ім'я. Завтра... може, і ім'я піде."
    author_text_after: >
      Голос рівний. Руки тремтять. Слова брешуть. Тіло — ні. Марко хоче обійняти, але не наважується. Леон вже десь далеко — всередині себе, у тих кімнатах, які гумка ще не стерла.
    mood: "стирання зсередини"

  # ── s02 ─────────────────────────────────────────────────────
  - scene_id: ep012_s02
    dialogue:
      - who: Марко
        line: "Професоре, що ви приховуєте?"
      - who: Леон
        line: "Послухай, хлопче, я мушу сказати тобі дещо важливе..."
      - who: автор
        line: >
          Просто посередині фрази — очі Леона СІРІЮТЬ. Райдужка: каряє, каряє, сіре. Як вицвітаюча фотографія. Леон кліпає.
      - who: Леон
        line: "...що? Хто ти? Де я?"
      - who: автор
        line: >
          Марко не дихає. Леон встає. Оглядає кімнату — як людина, що зайшла не в ті двері. Бере куртку зі спинки стільця. Іде до виходу.
      - who: Марко
        line: "Професоре! Леоне!"
      - who: автор
        line: "Людина обертається. Порожні очі. Ввічлива усмішка незнайомця."
      - who: Леон
        line: "Моє ім'я не Леон."
    author_text_after: >
      Іде. Кроки — рівні, спокійні, чужі — затихають на сходах.

      На стіні навпроти — число. Було 40. Тепер — 39.
    mood: "шок — союзник стертий посеред фрази"

  # ── s03 ─────────────────────────────────────────────────────
  - scene_id: ep012_s03
    author_text: >
      Марко стоїть один. Стілець ще теплий. На столі — чашка чаю. Пара здіймається. Леон заварював чай. На двох. Секунду тому тут була людина, яка знала відповіді. Тепер — порожній стілець і чай, що остигає.

      Наче вирвали сторінку з книги. Саме ту, яку читав.
    mood: "порожнеча після стирання"

  # ── s04 ─────────────────────────────────────────────────────
  - scene_id: ep012_s04
    author_text: >
      Кроки. Інші — легкі, впевнені.

      Віра Андріївна. Тепла усмішка. М'який голос. Руки — розкриті, наче для обіймів.

      Вона сідає поруч. Обіймає. Тепло. Справжнє.
    dialogue:
      - who: Вера
        line: "Марку. Бідолашний хлопчику. Що сталось?"
      - who: автор
        line: "Марко відкриває рот — і слова ллються. Як вода з перекинутого стакана."
      - who: Вера
        line: "Розкажи докладніше. Що саме він говорив? Мені треба знати — щоб тебе захистити."
    mood: "тепло після шоку — але тепло чи ні?"
    question: "Що розповісти Вірі?"
    options:
      - id: part
        text: "Розповісти тільки про стирання"
      - id: all
        text: "Розповісти все"

  # ── s04d1 ─────────────────────────────────────────────────────
  - scene_id: ep012_s04d1
    dialogue:
      - who: Марко
        line: "Леон... стерся. Прямо при мені. Посередині фрази."
      - who: Вера
        line: "Бідолашний хлопчику. А що він говорив? До того, як..."
    author_text_after: >
      М'яко. Запитання всередині обіймів. Марко не помічає — шок діє краще за будь-яку маніпуляцію.
    mood: "запитання сховане в турботу"

  # ── s04d2 ─────────────────────────────────────────────────────
  - scene_id: ep012_s04d2
    author_text: >
      Марко розповідає. Все. Про Леона, про його обладнання, про те, що Леон хотів сказати про вчителя. Про число. Про артефакти.

      Віра встає. Поправляє комір. Усміхається — тепло.

      «Ти молодець. Тобі не потрібно нести це одному.»

      Іде.

      Тиша. Така, наче з кімнати винесли щось цінне.

      Стілець Леона порожній. Чай охолов. Віра пішла. А Марко сидить і не може зрозуміти — чому після теплих обіймів так холодно.
    mood: "інформація пішла — безкоштовно"

  # ── s05 ─────────────────────────────────────────────────────
  - scene_id: ep012_s05
    author_text: >
      Камінь. Важкий. Прямо в середину грудей. Марко приходив до Леона чотири рази. Чотири точки на карті. І щоразу — Голос дізнавався. Його довіра — зброя. Яка вбиває тих, кому він довіряє.

      І з Вірою — та сама історія. Вона запитала — він розповів все. Навіть не посперечався. Не закричав. Просто віддав.

      У голові спливає картинка — двоє сусідів через паркан. Один кричить: «Ти ЗАВЖДИ ставиш сміття біля моїх воріт! Ти жадний!» Другий у відповідь кричить тим самим. За хвилину вони вже не чують одне одного. Це — солдат. Слова-звинувачення: «завжди», «ніколи», «вічно», «спеціально», «ти такий-то».

      А в іншій картинці — той самий сусід говорить інакше. Повільно, без крику: «Я бачу, що сміття знову біля моїх воріт. Мені неприємно. Давай домовимось — куди його ставити?» Три кроки. Спочатку — що сталось. Без оцінки. Факт. Потім — що я відчуваю. Не «ти поганий», а «мені прикро». І на кінець — пропозиція. Не наказ. Давай. Разом.

      У цього є ім'я — ФОРМУЛА ВИСЛОВЛЮВАННЯ. Спостереження. Почуття. Пропозиція. Три кроки. І кожен — без стріли у щит.

      Головне — це працює в обидва боки. Формула — не тільки щоб говорити. Але й щоб не віддати зайвого. Розвідник, який уміє сказати своє, — уміє і промовчати про чуже.

      Марко стискає кулаки. Голос знав чотири точки. З сьогоднішнього дня — жодної більше.
    mood: "урок із болю — формула замість крику"

  # ── s05_sofa ─────────────────────────────────────────────────
  - scene_id: ep012_s05_sofa
    dialogue:
      - who: Софа
        line: "ФОРМУЛА ВИСЛОВЛЮВАННЯ. Три кроки."
      - who: Софа
        line: "«Я бачу, що...» — «Мені...» — «Давай...»"
      - who: Софа
        line: "Маркери звинувачення: «завжди», «ніколи», «вічно», «ти такий-то». Почув — стоп. Це солдат."
      - who: Софа
        line: "Голосування. Спостереження чи звинувачення?"
      - who: Софа
        line: ФОРМУЛА ВИСЛОВЛЮВАННЯ. Три кроки.
    mood: "формула в чаті"

  # ── s06 ─────────────────────────────────────────────────────
  - scene_id: ep012_s06
    author_text: >
      Марко згадує, як кричав на Ліну: «Ти ніколи не слухаєш!»
    question: "«Ти ніколи не слухаєш!» Спостереження чи звинувачення?"
    options:
      - id: description
        text: "Спостереження"
      - id: accusation
        text: "Звинувачення"
    correct_logic: "«Ніколи» — напад. Розвідник сказав би: «Зараз я відчув, що ти мене не почула.»"
    feedback_success: '"Ніколи" — маркер звинувачення! Розвідник скаже: "Я помітив, що ти не відповів." Факт без атаки.'
    feedback_soft_fail: '"Ніколи" — це правда? Жодного разу в житті? Чи перебільшення?'
    mood: "перший маркер — «ніколи»"

  # ── s07 ─────────────────────────────────────────────────────
  - scene_id: ep012_s07
    author_text: >
      Марко говорить Вірі: «Я помітив, що ви не відповіли на моє запитання.»
    question: "«Я помітив, що ти не відповів.» Спостереження чи звинувачення?"
    options:
      - id: description
        text: "Спостереження"
      - id: accusation
        text: "Звинувачення"
    correct_logic: "Конкретний факт без оцінки. «Я помітив» — спостереження, не атака."
    feedback_success: 'Факт! Без "ніколи", без "вічно". Спостереження.'
    feedback_soft_fail: "Є слово-маркер? Чи просто факт?"
    mood: "спостереження — факт без оцінки"

  # ── s08 ─────────────────────────────────────────────────────
  - scene_id: ep012_s08
    question: "«Ти вічно запізнюєшся!» Спостереження чи звинувачення?"
    options:
      - id: description
        text: "Спостереження"
      - id: accusation
        text: "Звинувачення"
    correct_logic: "«Вічно» — маркер звинувачення. Не факт, а напад."
    feedback_success: '"Вічно" — маркер! Розвідник скаже: "Сьогодні ти прийшов пізніше." Конкретний факт.'
    feedback_soft_fail: '"Вічно" — правда? Щоразу без винятку?'
    mood: "«вічно» — другий маркер"

  # ── s09 ─────────────────────────────────────────────────────
  - scene_id: ep012_s09
    question: "«Сьогодні ти прийшов пізніше, ніж ми домовлялись.» Спостереження чи звинувачення?"
    options:
      - id: description
        text: "Спостереження"
      - id: accusation
        text: "Звинувачення"
    correct_logic: "Конкретний факт: сьогодні, пізніше, ніж домовлялись. Без маркерів."
    feedback_success: 'Сьогодні. Пізніше. Конкретно. Без "вічно" — чисте спостереження.'
    feedback_soft_fail: 'Порівняй: "вічно запізнюєшся" і "сьогодні прийшов пізніше". Де факт?'
    mood: "конкретика замість узагальнення"

  # ── s10 ─────────────────────────────────────────────────────
  - scene_id: ep012_s10
    author_text: >
      Марко згадує: коли однокласники не пам'ятали Софію, він закричав: «Ви спеціально робите вигляд, що її немає!»
    question: "«Ти спеціально заважаєш!» Спостереження чи звинувачення?"
    options:
      - id: description
        text: "Спостереження"
      - id: accusation
        text: "Звинувачення"
    correct_logic: "«Спеціально» — приписування наміру. Ти не знаєш, що в іншого в голові."
    feedback_success: '"Спеціально" — ти вирішив за іншого, що він ХОТІВ завадити. Звинувачення, не факт.'
    feedback_soft_fail: "Звідки знаєш, що спеціально? Читаєш думки?"
    mood: "«спеціально» — приписаний намір"

  # ── s11 ─────────────────────────────────────────────────────
  - scene_id: ep012_s11
    question: "«Я помітила, що ти взяв мою ручку без дозволу.» Спостереження чи звинувачення?"
    options:
      - id: description
        text: "Спостереження"
      - id: accusation
        text: "Звинувачення"
    correct_logic: "Конкретне спостереження. Без маркерів, без узагальнень."
    feedback_success: "Помітила — взяв — ручку — без дозволу. Факт. Жодного маркера."
    feedback_soft_fail: 'Є "вічно", "ніколи", "спеціально"? Чи тільки факт?'
    mood: "чисте спостереження + правило"

  # ── s12 (dialogue_after belongs to s11 in RU, kept as a translated dialogue_after note) ─────
  # Note: dialogue_after is attached to s11 in RU source — translated here under s12 scene_id
  # as the YAML structure requires scene_id match.
  # The RU source has dialogue_after on s011 block above s12 scene_id line.
  # We translate the dialogue_after line here as part of the scene block it belongs to.
  # The merge will handle attachment by scene position.
  # (This overlay does not include structural fields — only text fields per spec.)

    dialogue_after:
      - who: Софа
        line: 'Правило... дванадцяте. Формула висловлювання: спостереження + почуття + пропозиція. Говори про СЕБЕ, а не нападай на ІНШОГО. "Я бачу...", "Мені...", "Давай..." — три кроки, щоб сперечатися і не сваритися.'
  - scene_id: ep012_s12
    author_text: >
      Гальмо, дзеркало, карта. Три інструменти. Співпереживання — відчуй. Активне слухання — повтори. Формула — скажи про себе. Але з Вірою... Марко не використав жодного. Віра обійняла — і він віддав все. Як солдат, який не здався, а просто відчинив ворота фортеці і вийшов назустріч.
    mood: "вина"

  # ── s12_sofa ─────────────────────────────────────────────────
  - scene_id: ep012_s12_sofa
    dialogue:
      - who: Софа
        line: "Віра обіймала й запитувала. Ти в шоці розповів все."
      - who: Софа
        line: "Формула — не тільки для атаки. Це щит."
      - who: Софа
        line: "Хто вміє говорити про себе — вміє і МОВЧАТИ про інше."
    mood: "правило в чаті"

  # ── s12_choice ───────────────────────────────────────────────
  - scene_id: ep012_s12_choice
    author_text: >
      Марко дивиться на кімнату Леона. Порожня. Чашка на столі.
    question: "Що робить Марко?"
    options:
      - id: check
        text: "Перевірити кімнату Леона"
      - id: leave
        text: "Піти одразу"
    mood: "вибір дії"

  # ── s12d1 ─────────────────────────────────────────────────────
