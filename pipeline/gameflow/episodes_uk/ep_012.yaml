  - scene_id: ep012_s23_end
    author_text: "Марко стоїть у домі Леона. Один. Стілець охолов. Чай — холодний. На стіні — число 39. Уранці було 40. Мінус один — за кілька годин.\nМарко дивиться на свої руки. На них ще тепло від обіймів Віри. Чуже тепло, яке хочеться змити — і не можна, бо воно всередині. І питання піднімається в голові само: чи повинен був мовчати? Слова вже сказані. Віра пішла. Леона немає. Задача розв'язується в один бік — і цей бік не на користь Марка.\nТри інструменти розвідника. Гальмо — відчуй. Дзеркало — повтори. Карта — скажи про себе. Марко знає всі три. Але проти обіймів Віри жоден з них не спрацював. Бо Віра не нападала. Не сперечалася. Не тиснула. Вона просто запитала з теплою турботою — і Марко віддав усе сам.\nНайнебезпечніший солдат — той, що виглядає як друг.\nЧисло 39. Софа не відповідає — уперше за весь цей час немає відповіді. Леона більше немає. Стілець порожній.\nУ голові Марка залишається тільки одне слово. Не «як?» Не «чому?» А — «хто?». Хто наступний після Леона?\n"
    mood: тиша замість відповіді — перший крок у нову самотність
