      - who: Софа
        line: "Тепер дилема. Дай йому два шляхи."
      - who: Софа
        line: "Обидва ведуть туди, куди тобі потрібно."
    mood: "Софа диктує третій прийом"

  # ── s13g ────────────────────────────────────────────────────
  - scene_id: ep040_s13g
    dialogue:
      - who: Марко
        line: "Пропускаєш — і працюєш далі. Або сам ідеш до Голосу пояснюватися. Обирай."
    author_text_after: >
      Вартовий блідне. Палиця опускається. Тіло відступає вбік —
      без наказу, саме. Ворота відчинені.

      Марко проходить. І відчуває камінь на грудях. Важкий.
      Знайомий. Той самий, що тиснув, коли маніпулювали НИМ. Коли
      Рей казав «або — або». Коли Голос бив по страху.

      Тепер він на іншому боці. Камінь — той самий.
    mood: "прийом 3 закрив стіну — однак ціна відчутна"

