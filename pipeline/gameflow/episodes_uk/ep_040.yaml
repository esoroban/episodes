      п'ятому був», суперечка лише про «до чи після».

      Радник навіть не відповів по черзі — зліпив обидві відповіді в
      одну. «Так, після інциденту на п'ятому» — видав і час, і
      причину. Безкоштовно. Адже питання було поставлене так, ніби
      Марко має право питати.
    mood: "два вибори без вибору поспіль — чотири факти в одному «так»"

