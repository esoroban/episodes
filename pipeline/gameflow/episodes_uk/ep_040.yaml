terms_used:
  - "складене питання"
  - "питання-пастка"
  - "хибна дилема"
  - "хибний авторитет"
  - "маніпуляція страхом"
  - "факт"
  - "думка"
  - "неправда"

scenes:

  # ── s01 ─────────────────────────────────────────────────────
  - scene_id: ep040_s01
    author_text: >
      Нижні поверхи вежі. Коридори — вузькі, стіни — дзеркальні, але
      темні. Без відображень. Як сліпі очі.

      Сем — позаду. Тихий. Непомітний. Як тінь.
    mood: "вежа — порожня, але не безпечна"

  # ── s02 ─────────────────────────────────────────────────────
  - scene_id: ep040_s02
    dialogue:
      - who: Софа
        line: "Марко... я маю тебе навчити... того, що мені... неприємно. Однак іншого шляху немає."
      - who: Софа
        line: "Використовувати питання. Не для захисту. Для... проходу."
    mood: "Софа попереджає — інструмент сірий"

  # ── s03 ─────────────────────────────────────────────────────
  - scene_id: ep040_s03
    author_text: >
      Перший вартовий. Біля воріт між третім і четвертим поверхом.
      Величезний. Плечі — як шафа. Однак очі бігають. Ліворуч.
      Праворуч. Угору.
    mood: "сильний зовні — однак боїться"

  # ── s04 ─────────────────────────────────────────────────────
  - scene_id: ep040_s04
    dialogue:
      - who: Софа
        line: "Він боїться. Однак не тебе."
    mood: "Софа маркує точку тиску — без пояснення"

  # ── s05 ─────────────────────────────────────────────────────
  - scene_id: ep040_s05
    author_text: >
      Раніше хитрі питання ставили ЙОМУ. Тепер Марко має ставити
      сам. Це неприємно — наче вдягти чужий одяг.

      Звичка тягне — не бруднитися. Однак Софія чекає. Двадцять
      третій поверх. Обхідного шляху немає.
    mood: "спокуса відмовитися — стара слабкість у новому одязі"
    question: "Що робить Марко?"
    options:
      - id: use_question
        text: "Ставлю питання як інструмент. Свідомо. Заради сестри."
      - id: refuse_force
        text: "Не буду маніпулювати. Спробую пройти прямо — без питань."

  # ── s05b ────────────────────────────────────────────────────
  - scene_id: ep040_s05b
    author_text: >
      Марко випрямляється і йде прямо. Не хитро. Без питань.
      «Пропусти.»

      Вартовий — на голову вищий. Перекриває прохід. Голос рівний,
      без емоцій:

      «Без наказу Голосу — ніхто.»

      Марко стоїть. Повітря в коридорі стискається. Вартовий не
      рухається. Софія нагорі — двадцять поверхів. Час спливає.

      Сем тягне за рукав. Пошепки: «Назад.»

      Марко відступає. Розуміє: «не бруднитися» — це зручно. Однак
      це теж вибір. І його ціна — Софія. Якщо в тебе немає іншого
      інструмента — відмова від єдиного — це і є капітуляція.

      Повертається. Готовий поставити питання.
    mood: "чиста відмова — це теж вибір, і його ціна — сестра"

  # ── s06 ─────────────────────────────────────────────────────
  - scene_id: ep040_s06
    author_text: >
      РИТОРИЧНЕ ПИТАННЯ — це третій тип хитрих питань. На вигляд
      питання, а всередині — твердження, заховане в обгортку.

      Людина не хоче твоєї відповіді. Вона хоче, щоб ти погодився.

      Слова-підказки: «хіба не…», «невже ти думаєш…», «хто при
      здоровому глузді…», «як можна не розуміти…».

      Цьому прийому дві з половиною тисячі років. Його придумали в
      Стародавній Греції. Досі працює.

      Як розібрати. Один крок — зняти обгортку. Два — записати як
      звичайне твердження. Три — перевірити: факт, думка чи неправда.

      Приклад: «Хіба не зрозуміло, що коти кращі за собак?» Знімаємо
      обгортку → «Коти кращі за собак.» Перевіряємо → це думка, не
      факт.

      Важливий момент: сам прийом — не поганий і не хороший.
      Наприклад: «Хіба ми не заслуговуємо на краще?» — це теж
      риторичне питання, однак воно надихає. Усе залежить від того,
      НАВІЩО його ставлять.

      Головне правило: спочатку припускай, що людина не хоче тобі
      зла. Уважність — це не підозрілість.
    mood: "карта інструмента + золоте правило"

  # ── s07 ─────────────────────────────────────────────────────
  - scene_id: ep040_s07
    question: "«Хіба чесній людині є що приховувати?» Справжнє питання чи твердження в масці?"
    options:
      - id: statement
        text: "Твердження"
      - id: real
        text: "Справжнє питання"
    correct_logic: "«Чесній людині немає чого приховувати.» Перевіряємо: думка. У кожного є право на приватність."
    feedback_success: "Твердження в масці. Це думка, не факт."
    feedback_soft_fail: "Прибираємо обгортку «хіба не» — отримуємо «чесній людині немає чого приховувати». Перевіряємо: це думка, адже в кожного є право на особистий простір, навіть у чесних. Твердження в масці."
    mood: "розминка — упізнав риторичне"

  # ── s08 ─────────────────────────────────────────────────────
  - scene_id: ep040_s08
    question: "«Невже ти думаєш, що домашка важливіша за друзів?» Справжнє питання чи твердження?"
    options:
      - id: statement
        text: "Твердження"
      - id: real
        text: "Справжнє"
    correct_logic: "«Домашка не важливіша за друзів.» Перевіряємо: думка. Залежить від ситуації."
    feedback_success: "Твердження. Думка, не факт."
    feedback_soft_fail: "«Невже» — обгортка. Усередині — «домашка не важливіша за друзів». Це думка, адже для різних людей і різних ситуацій важливість різна: іноді — домашка, іноді — друзі."
    mood: "розминка — обгортка знову помітна"

  # ── s09 ─────────────────────────────────────────────────────
  - scene_id: ep040_s09
    question: "«Хіба не кожен знає, що броколі корисна?» Твердження в масці. Це факт, думка чи неправда?"
    options:
      - id: fact
        text: "Факт"
      - id: opinion
        text: "Думка"
      - id: lie
        text: "Неправда"
    correct_logic: "«Броколі корисна» — це можна перевірити, у ній справді є вітаміни. Це факт. Однак обгортка «хіба не кожен знає» — це тиск."
    feedback_success: "У броколі справді є вітаміни. Це факт."
    feedback_soft_fail: "Знімаємо обгортку — «броколі корисна». Можна перевірити: у ній вітаміни C, K і клітковина. Це факт. Однак форма «хіба не кожен знає» — це тиск, щоб ти не сперечався."
    mood: "розминка — факт під обгорткою"

  # ── s10 ─────────────────────────────────────────────────────
  - scene_id: ep040_s10
    question: "«Хто при здоровому глузді не любить літо?» Твердження: «Усі люблять літо.» Факт, думка чи неправда?"
    options:
      - id: opinion
        text: "Думка"
      - id: fact
        text: "Факт"
      - id: lie
        text: "Неправда"
    correct_logic: "Не всі люблять спеку. Уподобання — особисті."
    feedback_success: "Не всі люблять спеку. Це думка."
    feedback_soft_fail: "Прибираємо обгортку «хто при здоровому глузді» — отримуємо «всі люблять літо». Перевіряємо: люди з алергією на пилок, які погано переносять спеку, ті, хто цінує зимовий холод — є. Це думка, не факт."
    mood: "розминка — думка під тиском"

  # ── s11 ─────────────────────────────────────────────────────
  - scene_id: ep040_s11
    question: "«Хіба чорна кішка не приносить нещастя?» Твердження: «Чорна кішка приносить нещастя.» Перевіряємо."
    options:
      - id: lie
        text: "Неправда"
      - id: fact
        text: "Факт"
      - id: opinion
        text: "Думка"
    correct_logic: "Забобон. Колір кішки не впливає на події. Перевіряється."
    feedback_success: "Забобон — перевіряється як хибний. Це неправда."
    feedback_soft_fail: "Прибираємо обгортку — «чорна кішка приносить нещастя». Перевіряємо: колір шерсті тварини ніяк не впливає на події. Це не думка (яка залежить від людини), а перевірено хибне твердження. Це неправда."
    mood: "фінал блоку — неправда під обгорткою"

  # ── s12_sofa ────────────────────────────────────────────────
  - scene_id: ep040_s12_sofa
    dialogue:
      - who: Софа
        line: "Правило сорокове."
      - who: Софа
        line: "Риторичне питання — це твердження в обгортці з питання. Знімаєш обгортку і перевіряєш: факт, думка чи неправда."
      - who: Софа
        line: "Спочатку припускай добре. Уважність — це не підозрілість."
    mood: "правило закрито — час випробування"

  # ── s13a ────────────────────────────────────────────────────
  - scene_id: ep040_s13a
    author_text: >
      Кам'яні ворота. За ними — внутрішні коридори вежі. Біля воріт —
      вартовий у формі. Не молодий. Обличчя — без виразу. У руках —
      довга палиця впоперек проходу. Не воїн — служака.

      Марко підходить. Сем — на півкроку позаду.
    dialogue:
      - who: Стражник
        line: "Стій! Хто такий? Де перепустка?"
    author_text_after: >
      Завчені фрази. Не думки — інструкція. Марко дістає телефон.
    mood: "вартовий як функція — інструкція замість думки"

  # ── s13b ────────────────────────────────────────────────────
  - scene_id: ep040_s13b
    dialogue:
      - who: Софа
        line: "Простий служака. Інструкція в голові, страх Голосу в серці."
      - who: Софа
        line: "Риторичне. Сховай відповідь усередину питання. Щоб будь-яка інша відповідь виглядала як «йти до Голосу»."
    mood: "Софа диктує перший прийом"

  # ── s13c ────────────────────────────────────────────────────
  - scene_id: ep040_s13c
    dialogue:
      - who: Марко
        line: "Ти ж не хочеш сам пояснювати Голосу, чому його посланець спізнився?"
      - who: Стражник
        line: "У мене… інструкція. Я просто стою біля воріт…"
    author_text_after: >
      Вартовий зациклюється. Повторює «інструкція, інструкція». Однак
      палицю з проходу не прибирає. Уже не впевнений — однак
      автоматика міцніша.
    mood: "прийом 1 спрацював наполовину — служака зациклений"

  # ── s13d ────────────────────────────────────────────────────
  - scene_id: ep040_s13d
    dialogue:
      - who: Софа
        line: "Не вмовляй. Сховай, що затримання вже відбулося."
      - who: Софа
        line: "Питання-пастка. Будь-яка відповідь — усередині пастки."
    mood: "Софа диктує другий прийом"

  # ── s13e ────────────────────────────────────────────────────
  - scene_id: ep040_s13e
    dialogue:
      - who: Марко
        line: "Ти вже придумав, як пояснюватимеш Голосу, що затримав мене?"
      - who: Стражник
        line: "Я… я нікого не затримую! Я тільки перевіряю!"
    author_text_after: >
      Вартовий виправдовується. Голосно. І не помічає: він уже
      прийняв, що «затримання» — це щось, за що треба
      виправдовуватися. Слово «затримав» пройшло без опору.

      Палиця опустилася на сантиметр.
    mood: "прийом 2 спрацював — вартовий прийняв сховане"

  # ── s13f ────────────────────────────────────────────────────
  - scene_id: ep040_s13f
