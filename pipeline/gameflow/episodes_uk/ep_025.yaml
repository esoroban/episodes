        text: "Ні, суперечності немає"
      - id: yes
        text: "Так, суперечність"
    correct_logic: "Слова збігаються з діями. Втомився → відпочиває. Логічно."
    feedback_success: "Слова й дії збіглися — не суперечність."
    feedback_soft_fail: "Слова: втомився, відпочину. Дія: ліг. Збіглося — це не суперечність, а нормальна поведінка."
    mood: "контрольний — щоб не плутати"

  # ── s07 ─────────────────────────────────────────────────────
  - scene_id: ep025_s07
    question: "«Я ЗАВЖДИ роблю домашку!» — а вчора не зробив. Суперечність?"
    options:
      - id: yes
        text: "Так, суперечність"
      - id: no
        text: "Ні, суперечності немає"
    correct_logic: "«Завжди» + «вчора не зробив» = не може бути водночас правдою. Слово-пастка «завжди» — і одне «ні» вже ламає."
    feedback_success: "«Завжди» означає «без винятків». Один виняток — і слово розсипається."
