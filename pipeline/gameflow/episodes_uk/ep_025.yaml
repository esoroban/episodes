scenes:

  # ── s01 ─────────────────────────────────────────────────────
  - scene_id: ep025_s01
    author_text: >
      Марко сидить на тротуарі. Спиною до стіни. Коліна до грудей.

      Леон — стертий. Макс — стертий. Ліна — зрадила? Віра — агент.
      Мама — віддала Софію.

      Софа мовчить. Просто немає чого сказати.

      Марко не рухається. Немає сил. Немає напрямку. Немає людей, яким
      можна довіряти. Наче стояти на карті, де стерті всі дороги.
    mood: "кінець другого акту — повна самотність"

  # ── s02 ─────────────────────────────────────────────────────
  - scene_id: ep025_s02
    author_text: >
      З-за рогу — кроки. Маленькі. Невпевнені.

      Хлопчик. Років вісім. Великі очі. Перелякані. Число на зап'ясті
      — 41. Високе. Новенький.
    dialogue:
      - who: Сем
        line: "Ти теж заблукав?"
      - who: Сем
        line: "Я Сем. Я не знаю, де я. Я не знаю, що це за місце. Я не знаю, хто тут головний."
    mood: "нова людина — але Марко на дні"
    question: "Що робить Марко?"
    options:
      - id: accept
        text: "Підняти голову. Відповісти."
      - id: turn_away
        text: "Відвернутися. Не зараз. Я не можу за нього відповідати."

  # ── s02b ────────────────────────────────────────────────────
  - scene_id: ep025_s02b
    author_text: >
      Марко відвертає голову. Дивиться у стіну. Не відповідає.

      У нього немає сил на чужу надію. У нього нуль артефактів і
      сіре майбутнє. Що він скаже восьмирічному — «тікай, поки
      можеш»?

      Сем не йде. Стоїть. Мовчить. Чекає. Потім робить крок ближче.

      Марко чує дихання поряд. Маленьке, нерівне. Сем не йде,
      навіть коли від нього відвертаються.

      Марко все-таки підіймає голову.
    mood: "Сем не йде — Марко здається"

  # ── s03 ─────────────────────────────────────────────────────
  - scene_id: ep025_s03
    dialogue:
      - who: Марко
        line: "Я Марко. Це Дзеркальне Місто. І тут… багато того, що треба перевіряти."
    author_text_after: >
      Сем сідає поряд. Бере Марка за руку. Просто так. Як маленькі
      діти роблять — без дозволу, без причини.

      І від цього — трохи легше.
    mood: "чужа рука — і тягар відступає"

  # ── s04 ─────────────────────────────────────────────────────
  - scene_id: ep025_s04
    dialogue:
      - who: Марко
        line: "У тебе… на щоці."
      - who: Сем
        line: "Га?"
      - who: Марко
        line: "Шоколад. Ти їв цукерки?"
      - who: Сем
        line: "Не-а."
    author_text_after: >
      Сем каже «не-а» — і тут же машинально витирає щоку краєм
      рукава. З кишені визирає ріжок обгортки.

      Слова кажуть одне. Щока — інше. Кишеня — третє.

      І в голові Марка складається слово, яке він чув від Софії
      сто разів, але вперше бачить наживо.

      СУПЕРЕЧНІСТЬ — коли людина каже одне, а робить чи каже
      протилежне. В один і той самий час. В одному й тому самому
      сенсі.

      Шоколад на щоці — і «я не їв цукерок». Слова кажуть одне. Щока
      — інше.

      ЗАКОН НЕСУПЕРЕЧНОСТІ — другий закон логіки Аристотеля. Одне й
      те саме твердження не може бути водночас істинним і хибним.
      «Двері відчинені» і «двері зачинені» — водночас не буває.

      Важливо: зміна думки з часом — НЕ суперечність. «Раніше я
      любив кашу, тепер — ні» — нормально. Різні люди — не
      суперечність. Мама любить рибу, тато — ні. Тільки ВОДНОЧАС
      і в ОДНОМУ сенсі.
    mood: "перший закон — на щоці дитини, яку щойно взяв за руку"

  # ── s05 ─────────────────────────────────────────────────────
  - scene_id: ep025_s05
    question: "«Я не боюся собак!» — і ховається за дерево. Суперечність?"
    options:
      - id: yes
        text: "Так, суперечність"
      - id: no
        text: "Ні, суперечності немає"
    correct_logic: "Слова: «не боюся». Дія: ховається. Водночас, один сенс — суперечність."
    feedback_success: "Слова й дії в один час — не збіглися."
    feedback_soft_fail: "Порівняй: «не боюся» і «ховається». В одну хвилину, про одне й те саме. Не збіглося — суперечність."
    mood: "перший розріз — найвидніший"

  # ── s06 ─────────────────────────────────────────────────────
  - scene_id: ep025_s06
    question: "«Я втомився, піду відпочивати» — і лягає на диван. Суперечність?"
    options:
