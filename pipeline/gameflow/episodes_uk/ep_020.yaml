    author_text: >
      Софія не просто пішла. Вона ГОТУВАЛА Марка. Кожен урок. Кожен інструмент. Кожну записку. Кожен тест. Вона знала, що Марко дійде до цієї миті — до миті, коли треба перевірити навіть маму.

