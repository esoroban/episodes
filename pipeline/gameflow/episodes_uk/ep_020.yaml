  - scene_id: ep020_s01
    author_text: >
      Портал гасне. Тріщина у дзеркалі темніє. Кухня мами зникає.

      Марко стоїть у темряві. Сам.

      «Я обрала тебе.»

      Три слова. Вони не йдуть. Сидять усередині — як камінь у горлі. Ні проковтнути, ні виплюнути.
    mood: "після удару — порожнеча"

