episode_id: 3
episode_title: "Хитрі твердження"
lang: uk
terms_introduced: ["хитре твердження", "виправдання", "інструменти перевірки"]
terms_used: ["факт", "думка", "неправда"]

scenes:

  # ── s01 ─────────────────────────────────────────────────────
  - scene_id: ep003_s01
    author_text: >
      Шкільний двір спорожнів. Вітер ганяє обгортку від чипсів по асфальту. Марко і Ліна сидять на лавці за спортзалом — там, де вчителі не ходять. Ліна розповідає. Швидко, тихо, озираючись.
    dialogue:
      - who: Ліна
        line: "Її забрали вночі. Я не спала — у нас вікна навпроти. Побачила світло. Машина. Двоє людей."
      - who: Марко
        line: "Яка машина?"
      - who: Ліна
        line: "Темна. Може, синя. Або чорна. Було темно."
    author_text_after: >
      Марко киває. Ліна — єдина нитка. Єдина людина, яка пам'ятає. Він слухає, як слухають рятувальний канат.

  # ── s02 ─────────────────────────────────────────────────────
  - scene_id: ep003_s02
    dialogue:
      - who: Ліна
        line: "А потім... потім уранці її вже не було. Мама твоя вийшла, спокійна. Ніби нічого не сталося. Я підійшла — спитала: «Де Софія?» Вона подивилася на мене і сказала: «Яка Софія?»"
    author_text_after: >
      Марко стискає ручку рюкзака.

  # ── s03: Quiz 1 ─────────────────────────────────────────────
  - scene_id: ep003_s03
    dialogue:
      - who: Софа
        line: "Ліна сказала «вночі»... потім «уранці». Два різні моменти."
    question: "Ліна: «Софію забрали вночі.» Потім: «Уранці її вже не було.» Чи обидва твердження можуть бути фактом одночасно?"
    options:
      - id: "yes"
        text: "Так, можуть"
      - id: "no"
        text: "Ні, суперечність"
    correct_logic: "Може, бачила рух вночі, а вранці переконалася — це не суперечність, а два різні моменти."
    feedback_success: "Так. Бачила вночі — підтвердилося вранці. Два моменти, не суперечність. Слухай далі."
    feedback_soft_fail: 'Не поспішай. "Вночі побачила" і "вранці підтвердилося" — це два різні моменти. Обидва можуть бути правдою.'

  # ── s04: drama — окно vs квартира ──────────────────────────
  - scene_id: ep003_s04
    author_text: >
      Марко ховає телефон. Продовжує слухати.
    dialogue:
      - who: Марко
        line: "А світло у вікні — з машини чи з квартири?"
      - who: Ліна
        line: "З... я не пам'ятаю точно. Було темно. Мені страшно було, тому я могла переплутати."
    author_text_after: >
      Скалка. Маленька, гостра. На кожне питання Марка — у Ліни готове пояснення. «Було темно.» «Мені страшно було.» «Я могла переплутати.»

  # ── s05: Вітя з камінцем (drama) ───────────────────────────
  - scene_id: ep003_s05
    author_text: >
      Ліна затихла. Дивиться в землю, обнімає коліна. Марко відводить очі — і помічає в іншому кутку двору трьох. Вітя, однокласник, сидить навпочіпки, тримає в долоні сірий камінчик. Поруч — двоє молодших, один сперечається:

      — Вітю, ти ж казав, він виконає бажання. Я загадав — і нічого. Перевірили. Не працює.

      — Працює, — каже Вітя впевнено. — Просто бажання було надто велике. Загадай маленьке.

      — Загадав маленьке. Теж не спрацювало.

      — Ну... мабуть, камінчик відпочивав сьогодні.

      — Давай при всіх ще раз.

      — Ні-ні, він працює тільки коли ніхто не дивиться.
    author_text_after: >
      Молодші переглядаються. Один знизує плечима, другий ледь відкрив рота — але не сперечається. Вітя стискає камінчик міцніше, усміхається.

      *Марко чує це — і в грудях щось клацає. На кожну перевірку у Віті готова відповідь. Камінчик не можна спростувати. Але... знайоме. Хтось сьогодні говорив так само.*

  # ── s05_sofa: Софа називає паттерн ─────────────────────────
  - scene_id: ep003_s05_sofa
    dialogue:
      - who: Софа
        line: >
          Ти почув те саме, що й я. «Бажання велике. Камінчик відпочивав. Працює, коли ніхто не дивиться.» На кожну перевірку — готова причина. Камінчик не можна спростувати, бо Вітя закриває кожен шлях до перевірки.
      - who: Софа
        line: >
          Це називається ХИТРЕ ТВЕРДЖЕННЯ. Виглядає як звичайна думка — але перевірити її неможливо.
      - who: Софа
        line: >
          А кожна причина, яка закриває шлях до перевірки — «не сьогодні», «не при людях», «не збереглося» — це ВИПРАВДАННЯ.
      - who: Софа
        line: >
          Вітя не брехун. Він сам вірить. Але вірити йому на слово — необов'язково. Ключове питання: «А ЯК це можна перевірити?»
      - who: Софа
        line: >
          Тепер подивись на Ліну. Її «я бачила» + «було темно, я погано пам'ятаю» + «я могла переплутати» — знайомо?
    author_text_after: >
      Марко опускає телефон. Дивиться на Ліну. Вона сидить поруч, обнявши коліна. Маленька. Злякана. Чи — ні?

  # ── s06: drama ─────────────────────────────────────────────
  - scene_id: ep003_s06
    dialogue:
      - who: Марко
        line: "Ліно, можна я спитаю ще раз? Світло — з машини чи з квартири?"
      - who: Ліна
        line: "Я ж казала — було темно. Я могла переплутати."

  # ── s06_sofa: Quiz ─────────────────────────────────────────
  - scene_id: ep003_s06_sofa
    question: "Ліна каже: «Я бачила, але було темно, тому не пам'ятаю деталей.» Нормальне пояснення чи виправдання?"
    options:
      - id: excuse
        text: "Виправдання"
      - id: normal
        text: "Нормальне пояснення"
    correct_logic: "Закриває шлях до перевірки — не можна уточнити деталі. На кожне питання одна відповідь."
    feedback_success: "Виправдання. Закриває шлях до перевірки — не можна уточнити жодну деталь."
    feedback_soft_fail: 'Темно — буває. Але якщо на КОЖНЕ питання одна відповідь — "було темно" — це закриває шлях до перевірки.'

  # ── s07: drama ─────────────────────────────────────────────
  - scene_id: ep003_s07
    dialogue:
      - who: Марко
        line: "А машина точно була? Ти її чула чи тільки бачила?"
      - who: Ліна
        line: "Бачила. Тобто... чула мотор. Або мені здалося. Була третя година ночі, я сонна була."
    author_text_after: >
      Марко хоче вірити. Ліна говорить саме те, що він хоче почути — що Софія була, що її забрали, що це не сон. І Марко звик погоджуватися з тими, хто каже те, що хочеться почути. Але скалка не зникає.

  # ── s07_sofa: Quiz ─────────────────────────────────────────
  - scene_id: ep003_s07_sofa
    question: "«Я сонна була, тому могла переплутати.» Нормальне пояснення чи виправдання?"
    options:
      - id: normal
        text: "Нормальне пояснення"
      - id: excuse
        text: "Виправдання"
    correct_logic: "О третій годині ночі справді можна бути сонною — це реальна причина. Можна перевіряти далі."
    feedback_success: "Нормальне пояснення. О третій ночі справді можна бути сонною. Одна причина — поки нормально."
    feedback_soft_fail: "Бути сонною о третій ночі — реальна причина. Не кожне пояснення — виправдання. Але якщо щоразу нова — тоді так."

  # ── s08: Ліна дістає малюнок ───────────────────────────────
  - scene_id: ep003_s08
    author_text: >
      Ліна дістає з кишені зім'ятий листок. Малюнок. Криві лінії — будинок, дерево, постать біля машини.
    dialogue:
      - who: Ліна
        line: "Я намалювала наступного дня. По пам'яті. Щоб не забути."
    author_text_after: >
      Марко бере листок. Руки трохи тремтять. Перший доказ. Перша річ, до якої можна торкнутися.

  # ── s08_sofa: Quiz — докази ────────────────────────────────
  - scene_id: ep003_s08_sofa
    question: "Ліна намалювала машину по пам'яті наступного дня. Це доказ?"
    options:
      - id: weak
        text: "Слабкий доказ"
      - id: strong
        text: "Сильний доказ"
      - id: none
        text: "Не доказ"
    correct_logic: "Малюнок по пам'яті — не фото. Але краще, ніж просто слова. Слабкий доказ."
    feedback_success: "Малюнок по пам'яті, через день. Не фото — але краще, ніж просто слова. Слабкий доказ."
    feedback_soft_fail: "Малюнок по пам'яті — не фото. Пам'ять спотворює. Але це вже щось — можна торкнутися."

  # ── s08_choice: рассмотреть или нет ────────────────────────
  - scene_id: ep003_s08_choice
    author_text: >
      Марко розглядає малюнок. Будинок — схожий на їхній під'їзд. Дерево — те саме, під яким стоїть лавочка. А машина... просто прямокутник із колесами. Можна затриматися й розглянути детальніше — а можна продовжити розмову.
    question: "Як вчинити?"
    options:
      - id: examine
        text: "Розглянути малюнок детальніше"
      - id: continue
        text: "Продовжити розмову"

  # ── s08_detour ─────────────────────────────────────────────
  - scene_id: ep003_s08_detour
    author_text: >
      Марко розглядає малюнок. Будинок — схожий на їхній під'їзд. Дерево — те саме, під яким стоїть лавочка. А машина... просто прямокутник із колесами. Це все, що Ліна пам'ятає.
    dialogue:
      - who: Марко
        line: "Це все, що ти пам'ятаєш?"
      - who: Ліна
        line: "Я була за фіранкою. Боялася, що побачать."

  # ── s08_detour_sofa ────────────────────────────────────────
  - scene_id: ep003_s08_detour_sofa
    dialogue:
      - who: Софа
        line: "Малюнок — це вже щось. Але малюнок по пам'яті — через день. Питання: чи можна за малюнком ПЕРЕВІРИТИ, чи була машина?"

  # ── s09: Quiz — страх ──────────────────────────────────────
  - scene_id: ep003_s09
    question: "«Я боялася, що побачать.» Нормальне пояснення чи виправдання?"
    options:
      - id: normal
        text: "Нормальне пояснення"
      - id: excuse
        text: "Виправдання"
    correct_logic: "Страх — реальна причина. Не закриває шлях до перевірки — малюнок все одно намальований."
    feedback_success: "Нормальне. Страх — реальна причина. І малюнок все одно намальований — шлях до перевірки не закритий."
    feedback_soft_fail: "Страх — реальна причина. Ліна боялася — але все одно намалювала. Це не закриває шлях до перевірки."

  # ── s10: drama — «они слушают» ─────────────────────────────
  - scene_id: ep003_s10
    author_text: >
      Марко складає малюнок і ховає в кишеню. На шкільному дворі тихо. Тільки вітер і далекий звук м'яча — хтось грає на сусідньому майданчику.
    dialogue:
      - who: Марко
        line: "Ліно, а ти розповідала комусь ще?"
      - who: Ліна
        line: "Ні. Не можна."
      - who: Марко
        line: "Чому?"
      - who: Ліна
        line: "Вони слухають. Я ж казала."
      - who: Марко
        line: "Хто — «вони»?"
      - who: Ліна
        line: "Не можу сказати. Але якщо розкажу комусь ще — буде гірше."

  # ── s11: Quiz — они слушают ────────────────────────────────
  - scene_id: ep003_s11
    dialogue:
      - who: Софа
        line: "«Не можу сказати.» «Буде гірше.» На кожне питання — причина не відповідати. Паттерн знайомий?"
    question: "«Я не можу розповісти, бо вони слухають.» Нормальне пояснення чи виправдання?"
    options:
      - id: border
        text: "На межі"
      - id: excuse
        text: "Виправдання"
      - id: normal
        text: "Нормальне пояснення"
    correct_logic: "Може бути справді страшно — а може, закриває шлях до перевірки. На межі. Треба перевіряти далі."
    feedback_success: "На межі. Може бути справді страшно. А може — зручна причина не відповідати. Перевіряй далі."
    feedback_soft_fail: "Не поспішай. Може бути справді страшно — а може, закриває шлях. На межі. Перевіряй далі."

  # ── s12: Quiz — точно знаю ─────────────────────────────────
  - scene_id: ep003_s12
    question: "«Я точно знаю, хто забрав Софію, але назвати не можу — вони одразу почують.» Нормальне пояснення чи виправдання?"
    options:
      - id: excuse
        text: "Виправдання"
      - id: normal
        text: "Нормальне пояснення"
    correct_logic: "Зручно — ніхто ніколи не перевірить. Закриває шлях назавжди."
    feedback_success: "Виправдання. Зручно — ніхто ніколи не перевірить. Як камінчик Віті, який працює тільки коли ніхто не дивиться."
    feedback_soft_fail: "Якщо назвати не можна — перевірити не можна. Закриває шлях назавжди. Це виправдання."

  # ── s13: піжама ────────────────────────────────────────────
  - scene_id: ep003_s13
    dialogue:
      - who: Марко
        line: "А ти пам'ятаєш, у чому Софія була вдягнена? Тієї ночі?"
      - who: Ліна
        line: "У піжамі. Синій. З хмаринками."
    author_text_after: >
      Точна відповідь. Без затинки. Марко пам'ятає цю піжаму — мама купувала дві однакових, йому і Софії. Тільки у Софії — з хмаринками, а у Марка — з ракетами. Одні відповіді розмиті, інші — чіткі. Навіщо б плутати «вікно» й «машину», але пам'ятати малюнок на піжамі?

  # ── s14: окно vs балкон drama ──────────────────────────────
  - scene_id: ep003_s14
    author_text: >
      Марко вирішує перевірити. Не грубо — акуратно. Як розвідник, а не як слідчий.
    dialogue:
      - who: Марко
        line: "Ліно, а ти з вікна бачила чи вийшла на вулицю?"
      - who: Ліна
        line: "З вікна. Точно з вікна. Я б не вийшла — було страшно."
      - who: автор
        line: "Марко запам'ятовує. Через десять хвилин питає знову — ніби ненароком."
      - who: Марко
        line: "А ти з вікна бачила чи з балкона?"
      - who: Ліна
        line: "З балкона. У нас балкон на той бік..."
      - who: автор
        line: "З вікна. З балкона. Дві різні відповіді на одне питання."

  # ── s14_sofa: Quiz — несовпадение = ложь? ──────────────────
  - scene_id: ep003_s14_sofa
    dialogue:
      - who: Софа
        line: "Невідповідність... виявлено. Це не значить, що Ліна бреше. Може, вона справді погано пам'ятає. Може, було страшно, і пам'ять плутається. Але невідповідність — це факт. Перевіряй далі."
    question: "Ліна сказала «з вікна», потім «з балкона». Це значить, що вона бреше?"
    options:
      - id: not_necessarily
        text: "Не обов'язково"
      - id: "yes"
        text: "Так, бреше"
    correct_logic: "Може плутати від страху — але треба перевіряти далі. Невідповідність — це факт, але не доказ брехні."
    feedback_success: "Не обов'язково. Може плутати від страху. Але невідповідність — це факт. Перевіряй далі."
    feedback_soft_fail: "Не поспішай. Невідповідність — не значить брехня. Пам'ять плутається. Але це факт, який треба перевіряти далі."

  # ── s15: «я не вру» ─────────────────────────────────────────
  - scene_id: ep003_s15
    author_text: >
      Марко дивиться на Ліну. Вона дивиться вбік. Пальці теребить блискавку куртки.
    dialogue:
      - who: Ліна
        line: "Я не брешу, Марку. Я справді бачила."
      - who: Марко
        line: "Я знаю."
    author_text_after: >
      І майже вірить. Майже.

  # ── s16: Quiz — «поверь мне» ───────────────────────────────
  - scene_id: ep003_s16
    question: "Ліна каже: «Повір мені.» Це аргумент?"
    options:
      - id: "no"
        text: "Ні"
      - id: "yes"
        text: "Так"
    correct_logic: "«Повір мені» — прохання, а не доказ. Не замінює перевірки."
    feedback_success: 'Ні. "Повір мені" — прохання, а не доказ.'
    feedback_soft_fail: '"Повір мені" — це прохання. Прохання не замінює перевірки.'

  # ── s17: Ліна втрачає деталі (drama) ───────────────────────
  - scene_id: ep003_s17
    author_text: >
      Тиша. Далекий дзвоник — у когось закінчується гурток. Ліна міцніше обіймає коліна.
    dialogue:
      - who: Ліна
        line: "Марку... ти єдиний, хто слухає. Усі інші забули. Взагалі всі."
      - who: Марко
        line: "Не всі. Ти пам'ятаєш."
      - who: Ліна
        line: "Я пам'ятаю. Але іноді мені здається, що і я починаю забувати. Деталі йдуть. Як пісок."

  # ── s17_sofa: п'ять інструментів ───────────────────────────
  - scene_id: ep003_s17_sofa
    dialogue:
      - who: Софа
        line: "Деталі йдуть. Це правда — так працює пам'ять. Але є речі, що не залежать від пам'яті. Речі, які можна ВИМІРЯТИ."
      - who: Софа
        line: >
          ВАГИ — перевіряють вагу. ЛІНІЙКА або рулетка — довжину, висоту, відстань. ГОДИННИК або секундомір — час, швидкість. ТЕРМОМЕТР — температуру. ЛІЧБА — просто порахувати: штуки, люди, поверхи.
      - who: Софа
        line: >
          Якщо є хоча б один підхожий інструмент і можна отримати ЧИСЛО — твердження перевірюване. Кілограми, градуси, секунди, метри, штуки. Число не обмане.
      - who: Софа
        line: "А от «найкращий», «нудний», «гарний» — це про почуття. Немає «найкращеміру». Немає «нудноміру». Немає «гарноміру». Приладів для почуттів не існує."

  # ── s18: Quiz — 20г ────────────────────────────────────────
  - scene_id: ep003_s18
    question: "«Малюнок Ліни важить 20 грамів.» Чи є інструмент перевірки чи ні?"
    options:
      - id: "yes"
        text: "Є інструмент"
      - id: "no"
        text: "Немає інструмента"
    correct_logic: "Ваги — поклав, подивився число."
    feedback_success: "Є! Ваги — поклав, подивився число."
    feedback_soft_fail: "Чи можна зважити листок? Згадай п'ять інструментів."

  # ── s19: Quiz — 18 градусів ────────────────────────────────
  - scene_id: ep003_s19
    question: "«У кімнаті Ліни було 18 градусів.» Чи є інструмент перевірки чи ні?"
    options:
      - id: "yes"
        text: "Є інструмент"
      - id: "no"
        text: "Немає інструмента"
    correct_logic: "Термометр — число є, можна перевірити."
    feedback_success: "Є! Термометр — число є, можна перевірити."
    feedback_soft_fail: "Чи можна виміряти температуру? Яким інструментом? Згадай п'ять помічників."

  # ── s20: Quiz — «самый убедительный» ───────────────────────
  - scene_id: ep003_s20
    question: "«Розповідь Ліни — найпереконливіша.» Чи є інструмент перевірки чи ні?"
    options:
      - id: "no"
        text: "Немає інструмента"
      - id: "yes"
        text: "Є інструмент"
    correct_logic: "Немає «переконливоміру» — це думка."
    feedback_success: 'Немає інструмента! Немає "переконливоміру". Це думка — у кожного своє відчуття.'
    feedback_soft_fail: 'Чим виміряти "переконливість"? Вагами? Лінійкою? Немає такого приладу. Думка.'

  # ── s21: drama про розмір ──────────────────────────────────
  - scene_id: ep003_s21
    author_text: >
      Марко дивиться на малюнок Ліни. Прямокутник із колесами.
    dialogue:
      - who: Марко
        line: "Ліно, а ти запам'ятала номер машини?"
      - who: Ліна
        line: "Ні. Далеко було."
      - who: Марко
        line: "А розмір? Велика, маленька?"
      - who: Ліна
        line: "Велика. Як... як фургон."
      - who: Марко
        line: "А фургон довший за нашу лавку чи коротший?"
      - who: автор
        line: "Ліна моргає. Дивне питання. Але Марко чекає."
      - who: Ліна
        line: "Довший. Точно довший."

  # ── s21_sofa: Quiz — секундомер ────────────────────────────
  - scene_id: ep003_s21_sofa
    dialogue:
      - who: Софа
        line: "«Довший за лавку» — це вже можна перевірити. Виміряти лавку рулеткою. Потім порівняти з розмірами фургонів. Інструмент є — лінійка."
    question: "«Машина стояла біля будинку 15 секунд.» Чи є інструмент перевірки чи ні?"
    options:
      - id: "yes"
        text: "Є інструмент"
      - id: "no"
        text: "Немає інструмента"
    correct_logic: "Секундомір — засікли час, перевірили."
    feedback_success: "Є! Секундомір — засікли час, перевірили."
    feedback_soft_fail: "Чи можна виміряти час? Яким інструментом?"

  # ── s22: Quiz — ждать страшно ──────────────────────────────
  - scene_id: ep003_s22
    question: "«Чекати біля спортзалу страшно.» Чи є інструмент перевірки чи ні?"
    options:
      - id: "no"
        text: "Немає інструмента"
      - id: "yes"
        text: "Є інструмент"
    correct_logic: "Немає «страшноміру» — це про почуття."
    feedback_success: "Немає інструмента! Немає «страшноміру». Це про почуття — у кожного своє."
    feedback_soft_fail: "Чим виміряти страх? Вагами? Термометром? Немає такого приладу. Думка."

  # ── s23: «один и тень» / «два мужчины» ─────────────────────
  - scene_id: ep003_s23
    author_text: >
      Марко ховає зошит. Дивиться на Ліну. Вітер ворушить волосся. Вона тремтить — куртка тонка.
    dialogue:
      - who: Марко
        line: "Ліно, ще одне питання. Останнє. Ти сказала — двоє людей. Чоловіки? Жінки?"
      - who: Ліна
        line: "Чоловіки. Високі. У темному."
      - who: Марко
        line: "Ти раніше казала «один і тінь». А зараз — «двоє чоловіків, високі». Деталей побільшало."
      - who: Ліна
        line: "Я... мабуть, краще згадала. Іноді так буває — спочатку не пам'ятаєш, потім спливає."

  # ── s23_sofa: Quiz — три версии чашки ──────────────────────
  - scene_id: ep003_s23_sofa
    dialogue:
      - who: Софа
        line: "П'ять інструментів. Якщо хоча б один підходить — твердження можна перевірити. Якщо жоден — швидше за все, перед тобою думка."
    question: '«Сестра: "Я не розбивала чашку! Вона сама впала. А якщо не сама — то кіт. А якщо не кіт — вона вже була тріснута."» Нормальне пояснення чи виправдання?'
    options:
      - id: excuse
        text: "Виправдання"
      - id: normal
        text: "Нормальне пояснення"
    correct_logic: "Три версії підряд — надійна ознака виправдання. Коли людина щоразу змінює пояснення."
    feedback_success: "Три версії підряд! Коли людина щоразу змінює пояснення — надійна ознака виправдання."
    feedback_soft_fail: "Одне пояснення — буває. Але три різних підряд на одне й те саме питання? Це надійна ознака."

  # ── s24: Правило третє ─────────────────────────────────────
  - scene_id: ep003_s24
    dialogue:
      - who: Софа
        line: >
          Правило третє. Якщо на кожну перевірку є виправдання — вірити на слово необов'язково. Спитай: «А ЯК це можна перевірити?» Якщо відповідь — «ніяк» або «тільки коли ніхто не дивиться» — це хитре твердження.
    author_text_after: >
      Марко мовчить. Він не хоче питати Ліну «а як це перевірити». Не хоче — бо боїться відповіді. Бо якщо Ліна не зможе відповісти, нитка обірветься. А нитка — єдина. Але є й інші способи: спитати ще раз пізніше, знайти іншого свідка, пошукати сліди. Необов'язково відмовлятися від Ліни.

  # ── s25: кліфхенгер — дверь в парке ───────────────────────
  - scene_id: ep003_s25
    dialogue:
      - who: Ліна
        line: "Ходімо. Я знаю, де двері."
      - who: Марко
        line: "Які двері?"
      - who: Ліна
        line: "Двері, через які її забрали. Вони в парку. Ти не побачиш — але вони там. Я знаю."
      - who: автор
        line: >
          Ліна йде, не озираючись. Марко стоїть. Рюкзак на одному плечі. Телефон у кишені. Ліна каже «я знаю» — впевнено, як мама вранці. Як Віра в коридорі. Як усі, кому Марко звик вірити. Ноги не хочуть іти. Але Ліна вже далеко. Марко йде слідом.

  # ── s25_sofa ─────────────────────────────────────────────────
  - scene_id: ep003_s25_sofa
    dialogue:
      - who: Софа
        line: "Двері... виявлені. Але ти не готовий. Потрібен наступний урок."
      - who: автор
        line: "Екран гасне."
