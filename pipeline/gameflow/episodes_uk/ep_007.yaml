episode_id: 7
episode_title: "47"
lang: uk
terms_introduced: ["причина", "наслідок", "після — не значить внаслідок"]
terms_used: ["збіг", "закономірність", "повторюваність", "світлофор повторень", "факт", "думка", "детектив правди"]

scenes:

  # ── s01 ─────────────────────────────────────────────────────
  - scene_id: ep007_s01
    author_text: >
      Число на стіні: 47.

      Марко стоїть і дивиться. Крейдою, великими літерами, ніби хтось хотів, щоб не пропустили. Ліна поруч — мовчить. Теж дивиться.
    dialogue:
      - who: Марко
        line: "Що це означає?"
      - who: Лина
        line: "Не знаю. Може, нічого. Просто число."
    author_text_after: >
      Марко дістає Дзеркало Повторень. Піднімає. Крізь скло число мерехтить — але нічого нового. Просто 47. Марко опускає Дзеркало. Дивиться на стіну.

      46. Число змінилося. Було 47 — стало 46. Поки Марко дивився крізь Дзеркало.
    mood: "жах відкриття"

  # ── s02 ─────────────────────────────────────────────────────
  - scene_id: ep007_s02
    dialogue:
      - who: Марко
        line: "Ліно. Було 47. Тепер 46."
      - who: Лина
        line: "Ти впевнений?"
      - who: автор
        line: >
          Марко піднімає Дзеркало знову. Дивиться крізь скло — мерехтіння, силует. На мить — обличчя. Знайоме. Розмите. Софія? Марко не встигає роздивитися. Опускає Дзеркало. Число на стіні: 44. Впало на два. За одну секунду.
      - who: автор
        line: >
          Холод. Не той холод, що від Віри — інший. Глибший. Наче щось важливе йде, і Марко не може зупинити.
      - who: автор
        line: "Софа вібрує. Довга вібрація. Як зітхання."
    mood: "жах і вина"

  # ── s03 ─────────────────────────────────────────────────────
  - scene_id: ep007_s03
    author_text: "Марко дістає телефон. Руки тремтять."
    dialogue:
      - who: Софа
        line: "Число впало. 47 → 46 → 44. Що... сталося перед кожним падінням?"
      - who: Марко
        line: "Я... використовував Дзеркало."
      - who: Софа
        line: "Щоразу, коли ти дивишся в Дзеркало — число падає. Питання: це ПРИЧИНА? Чи ЗБІГ?"
      - who: Софа
        line: >
          Причина — це те, що ВИКЛИКАЄ подію. Як мотузка: потягни один кінець — інший рушить. Наслідок — те, що відбувається ЧЕРЕЗ причину.
      - who: Софа
        line: >
          Тест — простий. Мисленно прибери першу подію. Друга все одно трапиться? Якщо так — це збіг. Якщо ні — причина.
      - who: Софа
        line: "Мисленно прибери Дзеркало. Число все одно впаде? Ми не знаємо. Поки — не знаємо."
    mood: "урок із болю"

  # ── s04 ─────────────────────────────────────────────────────
  - scene_id: ep007_s04
    interactions:
      - interaction_type: vote
        question: "Число впало з 47 до 46. Що Марко зробив перед цим?"
        options:
          - {id: mirror, text: "Подивився в Дзеркало"}
          - {id: nothing, text: "Нічого"}
        correct_logic: "Марко використав Дзеркало — число впало."
        feedback_success: "Подивився в Дзеркало. Це те, що сталося перед падінням."
        feedback_soft_fail: "Згадай — що Марко зробив саме перед тим, як число змінилося?"
      - interaction_type: vote
        question: "Це збіг чи причина?"
        options:
          - {id: cause, text: "Причина"}
          - {id: unclear, text: "Поки незрозуміло — один раз, червоний світлофор"}
        correct_logic: "Один раз — червоний світлофор. Поки незрозуміло."
        feedback_success: "Поки незрозуміло! Один раз — червоний. Треба перевіряти."
        feedback_soft_fail: "Одного разу достатньо, щоб назвати причиною? Який колір?"
      - interaction_type: vote
        question: "Як перевірити — чи це збіг?"
        options:
          - {id: no_mirror, text: "Не використовувати Дзеркало і подивитися, чи впаде число"}
          - {id: use_more, text: "Використати Дзеркало ще раз"}
        correct_logic: "Прибрати дію — чи зникне наслідок?"
        feedback_success: "Прибери дію — подивися, чи зникне наслідок. Не чіпай Дзеркало і спостерігай."
        feedback_soft_fail: "Як перевірити причину? Мисленно прибери перше — друге трапиться?"
      - interaction_type: vote
        question: "Щоразу, коли Марко використовує Дзеркало, число падає. Три рази. Це закономірність?"
        options:
          - {id: yes, text: "Так, жовтий світлофор — три рази, але треба перевіряти"}
          - {id: no, text: "Ні"}
        correct_logic: "Три рази — жовтий! Але треба перевіряти далі."
        feedback_success: "Жовтий! Три рази — схоже на закономірність, але перевіряй."
        feedback_soft_fail: "Три рази одне й те саме. Який колір?"
    mood: "практика на болі"

  # ── s05 ─────────────────────────────────────────────────────
  - scene_id: ep007_s05
    dialogue:
      - who: Софа
        line: >
          А тепер — пастка. Найпоширеніша помилка. «Після» не значить «внаслідок». Півень кричить — сонце сходить. Півень ВИКЛИКАЄ схід? Ні. Просто — одне після одного. Час — не доказ причини.
    mood: "ціна помилки"

  # ── s06 ─────────────────────────────────────────────────────
    dialogue_after:
      - who: Софа
        line: "Попередження... артефакти... стирають... Число — це люди, які пам'ятають Софію. Кожне використання Дзеркала — мінус одна людина. Мінус один спогад. (Марко: «Що?!») Число 47 — стільки людей пам'ятали Софію. Тепер — 44. Три використання Дзеркала — три втрачених спогади. Причина... і наслідок. Правило... сьоме. «Після» не значить «через». Щоб знайти причину — перевір: прибери дію. Чи зникне наслідок? Два запитання-рятівники: «А що ЩЕ могло вплинути?» і «А буває одне без іншого?»"
  - scene_id: ep007_s06
    interactions:
      - interaction_type: vote
        question: "Марко використав Дзеркало — число впало. Дзеркало викликало падіння?"
        options:
          - {id: maybe, text: "Може бути, а може — збіг"}
          - {id: yes, text: "Так, точно причина"}
        correct_logic: "«Після» не значить «внаслідок»."
        feedback_success: "Може бути! «Після» не значить «внаслідок». Треба перевірити."
        feedback_soft_fail: "Одного разу достатньо? Згадай: «після» не значить «внаслідок»."
      - interaction_type: vote
        question: "Число впало — Марко прибрав Дзеркало. Число викликало дію?"
        options:
          - {id: yes, text: "Так, причина — прибери падіння числа, Марко не прибрав би Дзеркало"}
          - {id: no, text: "Ні, збіг"}
        correct_logic: "Прибери падіння числа — Марко не прибрав би Дзеркало. Причина."
        feedback_success: "Причина! Прибери падіння — Марко продовжив би дивитися."
        feedback_soft_fail: "Мисленно прибери падіння числа. Марко все одно прибрав би Дзеркало?"
      - interaction_type: vote
        question: "Марко подумав про Софію — число впало. Думка викликала падіння?"
        options:
          - {id: yes, text: "Так — думка викликала"}
          - {id: unknown, text: "Поки незрозуміло — зв'язок між думкою і числом ми не перевіряли. Вважаємо збігом."}
          - {id: no_absolute, text: "Ні — думки і число ніколи не пов'язані"}
        correct_logic: "У звичайному світі думка не рухає число. Але тут — магіко-технологічне місто з артефактами, робити абсолютний висновок рано. Без перевірки — обережна відповідь: поки збіг, немає даних про зв'язок."
        feedback_success: "Без перевірки — поки збіг. «Ніколи» — сильне слово для світу, де Дзеркало СТИРАЄ пам'ять."
        feedback_soft_fail: "Ми перевіряли зв'язок «думка → число»? Ні. Значить — поки збіг, не абсолют."
      - interaction_type: vote
        question: "Марко подивився крізь Дзеркало — число зменшилося. Причина чи збіг?"
        options:
          - {id: cause, text: "Причина — прибери Дзеркало, число не зменшиться"}
          - {id: coincidence, text: "Збіг"}
        correct_logic: "Прибери Дзеркало — число не зменшиться."
        feedback_success: "Причина! Прибери Дзеркало — число залишиться."
        feedback_soft_fail: "Мисленно прибери Дзеркало. Число все одно впаде?"
      - interaction_type: vote
        question: "Марко перестав користуватися Дзеркалом — число перестало змінюватися. Що це?"
        options:
          - {id: cause, text: "Доведена причина — прибрав дію, зник наслідок"}
          - {id: hypothesis, text: "Гіпотеза про причину — одне спостереження, тримаємо як жовтий"}
          - {id: coincidence, text: "Збіг"}
        correct_logic: "Одне припинення + одне спостереження — це НЕ доведена причина. Щоб назвати причиною, потрібна повторна перевірка: спробувати прибирати й повертати Дзеркало кілька разів. Поки — гіпотеза, жовтий."
        feedback_success: "Гіпотеза про причину! Одного разу мало для «доведено». Потрібні повтори."
        feedback_soft_fail: "Скільки разів ми це перевіряли? Один. Достатньо для «доведено»?"
      - interaction_type: vote
        question: "Ліна підійшла до стіни — число змінилося. Що це?"
        options:
          - {id: cause, text: "Причина — Ліна викликала зміну"}
          - {id: unknown, text: "Поки невідомо — повторень немає. Може бути третя причина (хтось інший)."}
          - {id: coincidence_firm, text: "Збіг — Ліна точно ні до чого"}
        correct_logic: "Ліна — під підозрою (нитки, дивацтва). Одне спостереження НЕ доводить ні «Ліна причина», ні «Ліна ні до чого». Потрібні повтори і перевірка умов. Може бути й третя причина."
        feedback_success: "Поки невідомо! Одне спостереження — нуль висновків. А Ліна загалом під питанням."
        feedback_soft_fail: "Прибрати Ліну з картини — число перестане змінюватися? Ми це перевіряли? Ні."
    mood: "причина і наслідок — закріплення"

  # ── s07 ─────────────────────────────────────────────────────
    dialogue_after:
      - who: Софа
        line: "З життя... Друг каже: \"Я вдягнув щасливі шкарпетки — і написав контрольну на п'ятірку.\" Шкарпетки — причина? Чи підготовка?"
  - scene_id: ep007_s07
    author_text: >
      Марко стоїть перед стіною. 44. Дзеркало в руці. Тепле. Мерехтить. Крізь Дзеркало він бачив Софію — на мить, розмиту, але ЇЇ. Якщо подивитися ще раз — побачить знову. Може, розгледить, де вона.

      Але щоразу — мінус одна людина, яка пам'ятає.

      Марко хоче подивитися. Дуже хоче. Три секунди — і обличчя Софії. Справжнє. Живе. Можна ще раз.
    mood: "ціна бажання"

  # ── s07_sofa ─────────────────────────────────────────────────
  - scene_id: ep007_s07_sofa
    dialogue:
      - who: Софа
        line: "Кожне використання — мінус один."
      - who: Софа
        line: "Використовувати?"
    mood: "питання ціни в чаті"

  # ── s07_choice ───────────────────────────────────────────────
  - scene_id: ep007_s07_choice
    author_text: >
      Дзеркало тепле в долоні. Один рух — і буде обличчя Софії. Один — і мінус одна людина, яка її пам'ятає.
    question: "Що робить Марко?"
    options:
      - id: use
        text: "Зазирнути в Дзеркало ще раз — три секунди обличчя"
      - id: save
        text: "Прибрати Дзеркало — зберегти пам'ять чужим"
    mood: "ціна бажання"

  # ── s07c_use ─────────────────────────────────────────────────
  - scene_id: ep007_s07c_use
    author_text: >
      Марко піднімає Дзеркало. У склі — Софія. Три секунди. Живе обличчя, живі очі, живий поворот голови. Марко закриває очі, щоб запам'ятати.

      Коли відкриває — число на стіні вже не 44. Стало 43. Хтось забув її просто зараз. Через нього.
    mood: "бажання перемогло — хтось забув"

  # ── s07c_save ────────────────────────────────────────────────
  - scene_id: ep007_s07c_save
    author_text: >
      Марко стискає Дзеркало — і ховає в рюкзак. Ремінець — застебнути. Клапан — вниз. Три секунди обличчя коштують менше, ніж одна чужа людина. Так вирішив — поки. Число на стіні: 44. Не рухається.
    mood: "бажання програє ціні"

  # ── s08 ─────────────────────────────────────────────────────
  - scene_id: ep007_s08
    interactions:
      - interaction_type: vote
        question: "Яка дія МЕНШЕ шкодить меті знайти Софію — зазирнути в Дзеркало зараз чи зберегти пам'ять про неї?"
        options:
          - {id: see, text: "Зазирнути зараз — три секунди обличчя коштують мінус одну людину"}
          - {id: save, text: "Зберегти пам'ять — кожен, хто пам'ятає, допомагає знайти; мінус один = мінус пошук"}
          - {id: both, text: "Зараз складно вибрати — залежить від ситуації"}
        correct_logic: "Це не питання смаку, а логіка мети. Мета — знайти Софію. Чим більше людей її пам'ятають, тим більше шансів. Використання Дзеркала СКОРОЧУЄ цей ресурс. Значить — для мети «знайти» зберегти пам'ять корисніше."
        feedback_success: "Для мети «знайти Софію» — зберегти. Мінус той, хто пам'ятає = мінус можливий свідок."
        feedback_soft_fail: "Мета — знайти Софію. Що допомагає меті більше: один погляд чи десять тих, хто пам'ятає?"
      - interaction_type: vote
        question: "«Якщо Марко сховає Дзеркало в рюкзак і не чіпатиме, число завмре?» Факт чи припущення?"
        options:
          - {id: fact, text: "Факт"}
          - {id: assumption, text: "Припущення — ми не перевіряли"}
        correct_logic: "Ми не перевіряли — може, число падає і без Дзеркала."
        feedback_success: "Припущення! Ми не перевіряли. Може, число падає і без Дзеркала."
        feedback_soft_fail: "Це перевірений факт? Чи ми лише припускаємо?"
      - interaction_type: vote
        question: "Що повинен зробити Марко, щоб перевірити, чи падає число без Дзеркала?"
        options:
          - {id: no_mirror, text: "Не використовувати Дзеркало і спостерігати за числом"}
          - {id: use_mirror, text: "Використати Дзеркало і дивитися"}
        correct_logic: "Прибрати причину — чи зникне наслідок?"
        feedback_success: "Прибрати причину — подивитися, чи зникне наслідок. Не чіпай Дзеркало і спостерігай."
        feedback_soft_fail: "Як перевірити причину? Прибери дію — що станеться?"
    mood: "перевірка перед рішенням"

  # ── s09 ─────────────────────────────────────────────────────
  - scene_id: ep007_s09
    author_text: >
      Марко кладе Дзеркало в рюкзак. Не дивиться. Вирішує — не зараз. Спочатку — перевірити.

      Минає година. Марко і Ліна сидять у стіни. Чекають. Число — 44. Не змінюється. Ще година. Все ще 44. Дзеркало в рюкзаку. Не використане.

      Марко дістає Дзеркало, щоб покласти глибше. Випадково піднімає — світло падає на скло.

      43.

      Марко не дивився в Дзеркало — просто підняв. І число впало? Чи... число впало з іншої причини?
    mood: "шок — перевірка провалилася"

  # ── s10a_sofa ────────────────────────────────────────────────
  - scene_id: ep007_s10a_sofa
    dialogue:
      - who: Софа
        line: "Джерело... не визначено."
      - who: Софа
        line: "Ти... не єдина причина."
    mood: "діагноз у чаті"

  # ── s10 ─────────────────────────────────────────────────────
  - scene_id: ep007_s10
    author_text: >
      Число впало до 43 — САМО. Без Дзеркала. Без Марка. Хтось інший теж стирає. Хтось, кого Марко не бачить. Хтось, хто забирає спогади про Софію — по одному, по два, по три.

      Ліна дивиться на число. Обличчя — бліде. Руки — в кишенях. Мовчить.
    dialogue:
      - who: Марко
        line: "Ти знала?"
      - who: автор
        line: "Ліна не відповідає. Відвертається."
      - who: автор
        line: >
          Заноза. Та сама. Тільки тепер — не маленька.
    mood: "невідома загроза"

  # ── s10_sofa ─────────────────────────────────────────────────
  - scene_id: ep007_s10_sofa
    dialogue:
      - who: Софа
        line: "Два питання-рятівники."
      - who: Софа
        line: "«А що ЩЕ могло вплинути?»"
      - who: Софа
        line: "І — «А буває одне без одного?»"
      - who: Софа
        line: "Марко... дай відповідь на обидва."
    mood: "два питання в чаті"
