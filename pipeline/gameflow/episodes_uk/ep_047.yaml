scenes:

  # ── s01 ─────────────────────────────────────────────────────
  - scene_id: ep047_s01
    author_text: >
      Двері серверної відчиняються. Спокійно. Без удару. Це його
      серверна — він входить як господар.

      Ніхто не з'являється. Лише повітря — і голос. Із самого
      повітря. Наче серверна сама заговорила.

      Марко стоїть біля провідного телефона. Кручений провід.
      Слухавка біля вуха. У слухавці — тихе дихання Софії. Вона
      на 23 поверсі, у скляній кімнаті. Але зараз — за міліметр
      від його скроні.

      Мобільний — у кишені. Софа спить, екран чорний.

      Марко стискає слухавку міцніше.
    mood: "Голос входить як господар — але Марко не сам: Софія у слухавці"

  # ── s02 ─────────────────────────────────────────────────────
  - scene_id: ep047_s02
    author_text: >
      Голос — тихо. Як старий знайомий.
    dialogue:
      - who: Голос
        line: "Здоров, Марко. Поклади слухавку. Ця лінія не для тебе."
      - who: Марко
        line: "Не покладу."
      - who: Голос
        line: "Софія знає мої правила — вона ж співавтор. Назве прийом — прийом втрачає силу. Поклади слухавку."
      - who: Голос
        line: "Ти кинув Макса. Ти кинув сестру. Кожен, хто тобі довіряв, залишався сам. А ти — ішов."
    author_text_after: >
      Удар. Не в голову. У груди. Марко ковтає. Це — майже
      правда. Макс був сам на гірці. Сестра була в місті сама.
      А він жив.

      Марко стискає слухавку міцніше.
    dialogue_after:
      - who: София
        line: "Це провина."
      - who: София
        line: "«Я стільки зробив — ти зобов'язаний». Не клади. Дихай."
    mood: "перший удар — провина + перша спроба зняти слухавку"

  # ── s03 ─────────────────────────────────────────────────────
  - scene_id: ep047_s03
    dialogue:
      - who: Голос
        line: "Без мене це місто впаде. Тисячі людей. Діти. Старі."
      - who: Голос
        line: "Ти зруйнуєш усе — і будеш винен. Поклади слухавку."
    author_text_after: >
      Холодне під ребрами. Лід. Марко уявляє: тисячі людей.
      Бабуся біля вікна. Малюк із рюкзаком. І все — на його
      плечах.

      Марко не кладе.
    dialogue_after:
      - who: София
        line: "Це страх."
      - who: София
        line: "«Буде погано — ти винен». Він тисне, бо боїться сам."
    mood: "другий удар — страх + друга спроба зняти слухавку"

  # ── s04 ─────────────────────────────────────────────────────
  - scene_id: ep047_s04
    author_text: >
      Мобільний у кишені Марка вібрує. Марко однією рукою
      дістає — другою тримає слухавку. На екрані — Сем. Із
      реальної школи. З іншого боку світу. Приймає.
    dialogue:
      - who: Сем
        line: "Старший. У нас у школі щось дивне. По гучному зв'язку — голос. Не директор. Ніхто не розуміє чий."
      - who: Сем
        line: "Це він? Той, про якого ти казав?"
      - who: Марко
        line: "Так. Він. Не лякайся. Я розберуся."
      - who: Сем
        line: "Я не лякаюся. Я тебе чую. Просто говори."
    author_text_after: >
      Сем не кладе слухавку — просто замовкає. Слухає. Марко
      кладе мобільний у кишеню екраном до тіла. Сем на
      мобільному, Софія у слухавці. Усі поряд.

      Голос чекає. Він почув і Сема. У Марка тепер два дроти
      в реальне.
    mood: "Сем долучається до сцени — але лише голосом, з реальної школи"

  # ── s05 ─────────────────────────────────────────────────────
  - scene_id: ep047_s05
    dialogue:
      - who: Голос
        line: "Маленький хлопчик із телефоном думає, що розумніший за систему, яка працює роками?"
      - who: Голос
        line: "Перестань виглядати жалюгідно. Поклади слухавку."
    author_text_after: >
      Щоки горять. Хочеться зникнути. Марко ловить себе —
      голова сама опускається. Наче ховається.

      Марко випростується. Слухавка біля вуха.
    dialogue_after:
      - who: София
        line: "Це сором."
      - who: София
        line: "«Маленький — отже, не маєш права». Слухай, але не вір."
    mood: "третій удар — сором + третя спроба зняти слухавку"

  # ── s06 ─────────────────────────────────────────────────────
  - scene_id: ep047_s06
    dialogue:
      - who: Голос
        line: "Я був поруч, коли нікого не було. Я слухав, коли всі пішли."
      - who: Голос
        line: "Я — єдиний, хто залишився. І ти зрадиш єдиного?"
      - who: Голос
        line: "Поклади слухавку. Я не можу при ній. Вона називає прийом — і прийом ламається."
    author_text_after: >
      Марко здригається. Не від слів — від фрази «Я не можу
      при ній.»

      Марко дивиться на порожнє повітря — туди, де мав би
      стояти Голос. Уперше відповідає.
    dialogue_after:
      - who: София
        line: "Це шантаж дружбою."
      - who: София
        line: "«Підеш — поганий друг»."
      - who: София
        line: "Чуєш? «Не можу при ній». Він боїться."
      - who: Марко
        line: "Тоді я її точно не покладу."
    mood: "четвертий удар — але Голос проговорився: він боїться Софії"

  # ── s07 ─────────────────────────────────────────────────────
  - scene_id: ep047_s07
    author_text: >
      Голос замовкає на секунду. Марко користується паузою —
      дістає мобільний. Сем тихо відключився хвилину тому.
      Екран блимає червоним. Софа.

      Провідна слухавка біля правого вуха. Мобільний — у лівій
      руці. Якщо Софія — це серце, то Софа — голова. Зараз
      Маркові потрібні обидві.
    mood: "Марко бере мобільний — Софа прокидається"

  # ── s08 ─────────────────────────────────────────────────────
  - scene_id: ep047_s08
    dialogue:
      - who: Софа
        line: "Це не демагогія. Я не знаходжу логічних помилок."
