  # ── s01 ─────────────────────────────────────────────────────
  - scene_id: ep031_s01
    author_text: >
      Дзеркальний коридор. Вузький. Стіни — дзеркала. У кожному — Марко.
      Блідий. Руки тремтять.

      Сем поряд — але не відображається. Дзеркала показують лише Марка.
    mood: "коридор звужується — відображення б'ють по самотності"

  # ── s02 ─────────────────────────────────────────────────────
  - scene_id: ep031_s02
    author_text: >
      Голос — звідусіль. Не з динаміків. Зі стін. З підлоги. З дзеркал.
    dialogue:
      - who: Голос
        line: "Мама забуде тебе."
      - who: Голос
        line: "Ти залишишся сам."
      - who: Голос
        line: "Сем — наступний."
    author_text_after: >
      Три удари за хвилину. Кожен — точний. Голос знає, де болить.
      Здоров'я мами. Самотність. Загроза другові.

      Марко згинається. Не від болю — від слів.
    mood: "три точні удари словом"

  # ── s03 ─────────────────────────────────────────────────────
  - scene_id: ep031_s03
    author_text: >
      Дзеркало праворуч спалахує. Мама. Бліда. Стоїть у темній кімнаті.
      Не усміхається. Дивиться — але не на Марка. Крізь нього.
    mood: "мама близько і далеко водночас"

  # ── s04 ─────────────────────────────────────────────────────
  - scene_id: ep031_s04
    dialogue:
      - who: Голос
        line: "Він стоїть за тобою."
    author_text_after: >
      Дзеркало гасне.

      Марко обертається — нікого. Лише Сем. Лише порожній коридор.
      Лише страх, який тепер живе у спині.
    mood: "удар зсередини — страх за плечем"

  # ── s05 ─────────────────────────────────────────────────────
  - scene_id: ep031_s05
    author_text: >
      Марко хоче бігти. Ноги не рухаються. Хоче крикнути. Горло
      сухе. Хоче підкоритися — зробити будь-що, аби Голос
      замовк.
