        text: "Стати рівно і дихати. Зачекати слово Софи."
      - id: panic_run
        text: "Зірватися й бігти без плану."

  # ── s05b ────────────────────────────────────────────────────
  - scene_id: ep031_s05b
    author_text: >
      Марко зривається. Біжить уперед. Дзеркала звужуються — кожен крок
      відлунює. Сем ледь устигає.

      Бігти без плану — грати в гру Голосу. Голос саме й хотів,
      щоб Марко не думав. Щоб летів уперед, у будь-який бік, куди
      його скерують дзеркала.

      Через десять кроків Марко зупиняється. Сем дихає поряд важко.
      Куди вони бігли? Ні Марко, ні Сем не знають.

      Повертаються.
    mood: "бігти = слухатися Голосу"

