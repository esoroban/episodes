    author_text: >
      Дзеркало мерехтить. Мама підводиться. Дивиться прямо — але не на Марка.
      У порожнечу. Розвертається. Іде до дверей.

      І йде геть.

      Марко б'є по дзеркалу. Скло гуде. Мама не обертається.
    author_text_after: >
      Мама не стерта. Вона пішла. Сама. Як Софія.

      Число на стіні: 24. Не змінилося. Не впало. Мама пам'ятає. Мама
      обрала.

      Це… гірше за стирання.
    mood: "мама пішла добровільно — гірше за стирання"

  # ── s26 ─────────────────────────────────────────────────────
  - scene_id: ep031_s26
    dialogue:
      - who: Сем
        line: "Якщо число не впало… отже, вона пам'ятає?"
    author_text_after: >
      Марко мовчить. Притискається лобом до холодного дзеркала. Мама пішла.
      Не тому що забула. Тому що вирішила.
    mood: "дитяче питання — доросла правда"

  # ── s27_end ─────────────────────────────────────────────────
  - scene_id: ep031_s27_end
    author_text: >
      Число на стіні: 24. Не впало. Мама пам'ятає. Мама обрала.

      Стирання — це коли забирають пам'ять. Але що робити, коли
      людина йде сама? Коли пам'ятає — і все одно йде?

      Мама пам'ятає. Мама обрала. І Марко не знає, що страшніше.
    mood: "кінець дня 8.3 — що страшніше"
