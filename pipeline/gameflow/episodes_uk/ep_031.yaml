      ПОКАРАННЯ — «тебе покарають», «розкажу всім», «будуть наслідки».
      Удар по безпеці.

      Слова-маркери: «назавжди», «ніколи», «всі», «ніхто». Якщо
      зустрічаєш — вмикай увагу.

      Різниця між маніпуляцією і справжнім попередженням: справжнє
      — турбота плюс реальна небезпека плюс можна перевірити. «Не
      чіпай плиту — гаряча» — це турбота. «Не чіпай — а то все
      життя будеш без руки!» — це роздутий страх.

      ТРИ ПИТАННЯ-ФІЛЬТРИ. Перше: це точно станеться чи лише
      може? Друге: наскільки ймовірно? Третє: чи є інші
      варіанти?

      Страх не любить питань. Він як мильна бульбашка — лускає від
      першого дотику.
