  # ── s22 ─────────────────────────────────────────────────────
  - scene_id: ep036_s22
    question: "Марко знайшов гриб біля тунелю. Кому б він довірився: Сему, який «бачив схожий у книжці», чи Вірі, яка викладала біологію?"
