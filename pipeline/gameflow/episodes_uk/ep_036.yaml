  # ── s23_pre ─────────────────────────────────────────────────
  - scene_id: ep036_s23_pre
    author_text: >
      Четверо стоять перед входом до ядра Системи. Двері — відчинені.
      Усередині — тиша. Така щільна, що дзвенить у вухах.

      Ліна: «Софія казала: за цими дверима — правда про Голос. Не та,
      що він показує. Справжня.»
    mood: "біля дверей ядра — тиша перед кроком"

  # ── s23_chat ────────────────────────────────────────────────
  - scene_id: ep036_s23_chat
    dialogue:
      - who: Софа
        line: "Запис Софії триває."
    unlock_button:
      text: "Увімкнути продовження"
      reveals:
        who: "Софія"
        line: "Наступний урок — про вибір. Коли варіантів не два. І не три. Коли треба знайти свій."
    mood: "сестра передає наступний урок"

  # ── s23_end ─────────────────────────────────────────────────
  - scene_id: ep036_s23_end
    author_text: >
      Число на стіні: 30. Шестеро нових. Ліна пам'ятає — і ті, кого
      вона привела, теж пам'ятають.

      Марко робить крок. Дзеркала навколо гаснуть — одне за одним.
      Як лампочки в коридорі, які вимикає хтось невидимий. Уперше
      в Місті — темно.

      Сем хапає Марка за руку. Ліна вмикає ліхтарик на телефоні.
      Вузький промінь. Підлога — кам'яна. Стіни — матові. Без
      відбиттів.

      Місто без дзеркал — як людина без маски. Голе. Справжнє.

      Тиша.
      Темрява.
      Крок.
    mood: "кінець Дня 9 — попереду вибір, якого не пропонували"
