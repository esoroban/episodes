  # ── s01 ─────────────────────────────────────────────────────
  - scene_id: ep036_s01
    author_text: >
      Софа в кишені тріщить. Смужки біжать по дисплею. Потім — тиша.
      І блакитне світло. Файл — розблоковано.

      Екран — блакитний. Усередині — картка з відтворенням. Запис.
      Старий. Акуратно підписаний.

      Ліна не рухається. Сем завмер. Марко дістає телефон обома
      руками, наче крихке.
    mood: "запис чекав на цю мить"

  # ── s02 ─────────────────────────────────────────────────────
  - scene_id: ep036_s02
    dialogue:
      - who: Софа
        line: "Файл розблоковано. Софія залишила запис на цю мить."
    unlock_button:
      text: "Увімкнути запис Софії"
      reveals:
        who: "Софія"
        line: "Ліна — моя людина. Не Голосу. Я попросила її стежити за тобою — не шпигувати, ЗАХИЩАТИ. Кожен звіт ішов мені. Голос перехоплював копії, але оригінали — мої. Довіряй їй. Але перевіряй."
    dialogue_after:
      - who: Марко
        line: "Довіряй. Але перевіряй."
      - who: Софа
        line: "Це не суперечність. Це правило."
    mood: "сестра передає правило — не наказ"

  # ── s03 ─────────────────────────────────────────────────────
  - scene_id: ep036_s03
    dialogue:
      - who: Ліна
        line: "Софія знайшла мене першою. До Голосу. Три перші ниточки — її. Решту — Голос підключив пізніше, коли помітив."
      - who: Марко
        line: "Блокнот… був для Софії?"
      - who: Ліна
        line: "Кожна сторінка. «Він довіряє мені повністю» — це звіт для твоєї сестри. Не для ворога."
    author_text_after: >
      Слова — ті самі. Але сенс — інший.

      Число на стіні мерехтить. 24… 26… 28… 30.

      Марко завмирає. До цієї миті число було «маминою позначкою» —
      один лічильник однієї людини. Тепер — шестеро нових.

      Ліна обертається: «Число завжди рахувало тих, хто пам'ятає.
      Не лише маму. Ти знав одну — маму. Я привела шістьох.»

      Сем переводить погляд із числа на Марка: «Якщо Софія послала
      Ліну — може, і мені хтось допомагає?»
    mood: "ті самі слова, інший сенс — і шестеро нових"

  # ── s04 ─────────────────────────────────────────────────────
  - scene_id: ep036_s04
    author_text: >
      Ліна дивиться на Марка. Не квапить. Просто чекає.

      Хочеться пробачити миттєво. Запис Софії — наче наказ:
      «довіряй». Голова киває.

      Але запис Софії не закінчився на «довіряй». Було ще одне
      слово: «перевіряй».
    mood: "спокуса повірити авторитету — без другої частини"
    question: "Що робить Марко?"
    options:
      - id: trust_and_verify
        text: "Довіряю. І буду перевіряти. Як і сказала Софія."
      - id: forgive_now
        text: "Пробач мене, Ліно. Запису Софії — цього досить."

  # ── s04b ────────────────────────────────────────────────────
  - scene_id: ep036_s04b
    dialogue:
      - who: Марко
        line: "Пробач мене, Ліно. Запису Софії — цього досить."
    author_text_after: >
      Ліна не відповідає одразу. Мовчання — гостре, як голка.

      «Чи досить?» — її очі говорять те, чого губи не сказали.

      Марко згадує: Софія сказала ДВА слова. «Довіряй» — і
      «перевіряй». Якщо послухати лише перше — це знову та сама
      помилка. Погодитися з тим, хто сказав останнім. Зараз
      «останнього» звуть Софія, але логіка та сама.

      Довіра, побудована на одній фразі запису — це Пафос.
      Довіра, побудована на фактах + перевірці — це інше.

      Марко видихає. Повертається.
    mood: "поквапився — стара слабкість перевдяглася в любов до сестри"

  # ── s05 ─────────────────────────────────────────────────────
  - scene_id: ep036_s05
    dialogue:
      - who: Софа
        line: "Запис Софії — авторитет. Доречний. Але навіть доречний авторитет не скасовує перевірку."
