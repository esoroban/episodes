        line: "«Довіряй, але перевіряй» — це не недовіра. Це правило."
    mood: "Софа добудовує фразу — обидві частини рівні"

  # ── s06 ─────────────────────────────────────────────────────
  - scene_id: ep036_s06
    author_text: >
      Софія — авторитет для Марка. Але чи є запис доказом?
      Перевіряємо за двома умовами.

      УМОВА ПЕРША. Чи компетентна Софія в питанні «кому довіряти»?
      Вона знала Ліну особисто. Давала завдання. Перевіряла звіти.
      Так — компетентна.

      УМОВА ДРУГА. Чи є підтвердження? Записка з почерком Софії
      плюс її голос — подвійний доказ. Число 30 — Ліна пам'ятає
      людей, отже, не стерта Голосом. Блокнот — оригінали йшли
      Софії.

      Обидві умови виконано. Посилання на авторитет Софії —
      доречне.

      Дві ознаки ПАСТКИ: говорить не про свою область + взагалі
      не експерт. Тут жодної.

      Головне правило: навіть доречний авторитет не скасовує
      перевірку. «Довіряй, але перевіряй» — це не суперечність.
      Це інструмент.
    mood: "обидві частини одного правила — наче два кінці однієї мотузки"

