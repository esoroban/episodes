    feedback_success: "Ідею можна перевірити. Це нові двері."
    feedback_soft_fail: "Фантазія — це «сестра повернеться сама собою» (тут нічого робити). А «відв'язати» — це план: розірвати зв'язок між артефактом і людиною. План можна перевіряти, можна доопрацьовувати. Це четвертий шлях."
    mood: "сюжет — гіпотеза vs фантазія"

  # ── s22 ─────────────────────────────────────────────────────
  - scene_id: ep038_s22
    question: "Голос не сказав про зв'язок Софії з артефактами. Навіщо приховував?"
    options:
