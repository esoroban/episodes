    feedback_success: "Сховав частину правди — заховав ще один шлях."
    feedback_soft_fail: "Голос не забув розповісти — він спеціально не сказав. Кожен шматочок правди, який він ховає, прибирає ще один шлях втечі. Якби Марко знав про зв'язок — він би одразу запитав «А що як відв'язати?». Голос прибрав цей варіант, сховавши правду."
    mood: "фінал бліцу — Голос викрито"

  # ── s23 ─────────────────────────────────────────────────────
  - scene_id: ep038_s23
    dialogue:
      - who: Софа
        line: "Плану немає. Уперше... плану немає."
      - who: Софа
        line: "Ти пишеш новий."
    mood: "Софа передає ініціативу — вперше"

  # ── s24 ─────────────────────────────────────────────────────
  - scene_id: ep038_s24
    author_text: >
      Марко встає. Обтрушує коліна. Дивиться на Сема.
    dialogue:
      - who: Марко
        line: "Мені треба до Софії. Живої. Справжньої. Не запису — а її. Вона знає, як влаштовані артефакти. Вона знає, як розірвати зв'язок."
      - who: Сем
        line: "Вона — де?"
    mood: "рішення — знайти живу Софію"

  # ── s25 ─────────────────────────────────────────────────────
  - scene_id: ep038_s25
    dialogue:
      - who: Софа
        line: "Софія... у скляній кімнаті. На двадцять третьому поверсі вежі Голосу."
      - who: Софа
        line: "Вежа — висока, зі скляним фасадом. Видно через усе Місто."
      - who: Софа
        line: "Я підключилася до лічильника Системи. Тепер те саме число — у мене. Одразу, без стіни."
      - who: Софа
        line: "Число: двадцять два."
    mood: "адресу знайдено — і лічильник упав"

  # ── s25_drama ───────────────────────────────────────────────
  - scene_id: ep038_s25_drama
    author_text: >
      З тридцяти — двадцять два. Голос працював усю ніч, поки Марко
      сперечався з артефактами. Вісім імен, які Ліна повернула, —
      знову стерті.

      Двадцять три поверхи. Двадцять дві людини.

      Марко дивиться на Сема. Сем — на підлогу. Обоє мовчать.
    mood: "ціна ночі — вісім стертих імен"

  # ── s26_end ─────────────────────────────────────────────────
  - scene_id: ep038_s26_end
    dialogue:
      - who: Марко
        line: "Двадцять три поверхи."
      - who: Сем
        line: "Двадцять дві людини."
      - who: Марко
        line: "Ідемо."
    author_text_after: >
      Плану немає. Уперше — взагалі ніякого. Софія не передбачила.
      Софа не може підказати. Марко — один. Із Семом, із телефоном,
      із питанням «а що як». І двадцять три поверхи вежі попереду.

      Як розмовляти з тим, кого контролюють?
    mood: "кінець: питання вперед — як говорити з контрольованим"
