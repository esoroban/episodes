        text: "Неідеальну"
      - id: none
        text: "Ніякої"
    correct_logic: "Нуль завжди менший, ніж «не дуже». Неідеальна книга є — її можна прочитати, поправити. Ненаписаної немає взагалі."
    feedback_success: "Будь-яка більша за нуль. Завжди."
    feedback_soft_fail: "Неідеальна книга — це книга. Її можна прочитати, переписати, виправити. Ненаписана — це нуль, нічого. «Зроблю ідеально або не буду» — це найхитріша пастка. Трійка завжди краща за нуль."
    mood: "бліц — перфекціонізм програє"

  # ── s19 ─────────────────────────────────────────────────────
  - scene_id: ep038_s19
    question: "«Віддай артефакти або втратиш сестру» — хибна дилема чи ні?"
    options:
      - id: false_dilemma
        text: "Хибна дилема"
      - id: real
        text: "Справжній вибір"
    correct_logic: "Голос дав два шляхи. Марко вже знайшов третій — зламати. І просто зараз шукає четвертий — відв'язати. Їх більше двох."
    feedback_success: "Уже знайдено третій і четвертий. Двох — точно мало."
    feedback_soft_fail: "Третій шлях (зламати) — Марко його вже бачив. Четвертий (відв'язати) — придумав просто зараз. Голос запропонував два, однак їх більше. Кожного разу, коли дають «або-або» — варто запитати «А що як?»."
    mood: "сюжет зустрічає урок"

  # ── s20 ─────────────────────────────────────────────────────
  - scene_id: ep038_s20
    question: "«Не ламай артефакти або я зникну» — вибір без вибору чи справжня загроза?"
    options:
