scenes:

  # ── s01 ─────────────────────────────────────────────────────
  - scene_id: ep038_s01
    author_text: >
      Ніч. Сховище. Пил. Тиша. Сем стоїть біля дверей — на чатах.

      Артефакти перед Марком. Три штуки. Усі — її, Софії.

      Ліхтар Софії — латунний, з тріщиною на склі, теплий.
      Дзеркало Софії — маленьке, в долоню, срібний край.
      Щоденник Софії — шкіряна обкладинка, потерті кути,
      стрічка-закладка.

      З кожного — тьмяне світло з тріщин. Наче живі.

      План простий: зламати. Ні Голос, ні Рей не отримають силу.
      Третій варіант. Руки тремтять.
    mood: "третій варіант — рука завмерла над артефактами"

  # ── s02 ─────────────────────────────────────────────────────
  - scene_id: ep038_s02
    dialogue:
      - who: Софа
        line: "Ти впевнений? Третій варіант — не завжди безпечний."
    mood: "Софа маркує ризик — однак не зупиняє"

  # ── s03 ─────────────────────────────────────────────────────
  - scene_id: ep038_s03
    author_text: >
      Марко замахується —

      — і телефон ДЗВОНИТЬ. Не Софа. Не запис. Живий голос.
      Справжній.
    dialogue:
      - who: София
        line: "НЕ СМІЙ!"
    author_text_after: >
      Марко завмирає. Рука в повітрі.
    dialogue_after:
      - who: София
        line: "Якщо зламаєш — я перестану існувати. Артефакти пов'язані зі мною. Марко, будь ласка."
    mood: "сестра — вперше жива, в реальному часі"

  # ── s04 ─────────────────────────────────────────────────────
  - scene_id: ep038_s04
    author_text: >
      Тиша. Марко опускає руку. Повільно. Наче вона важить тонну.

      Третій варіант має ціну. Зламати артефакти — втратити Софію.

      Марко сідає на підлогу. Спина до стіни. Очі заплющені.
    dialogue:
      - who: Марко
        line: "Виходить, вибору немає."
    mood: "третій варіант виявився пасткою — спокуса здатися"

  # ── s05 ─────────────────────────────────────────────────────
  - scene_id: ep038_s05
    dialogue:
      - who: Софа
        line: "Нова інформація. Голос не сказав про це. Чому?"
      - who: Софа
        line: "Є. Чарівне питання: «А що як...?»"
    mood: "Софа відмовляється прийняти «вибору немає» — маркує інструмент"

  # ── s06 ─────────────────────────────────────────────────────
  - scene_id: ep038_s06
    author_text: >
      Голова важка. Кожне твердження — наче стіна. Голос: віддай або
      втратиш. Софія: не ламай. Третій варіант: зламати = втратити
      Софію.

      Усі двері ведуть в одну стіну. Здається, що вибору немає.
    mood: "спокуса здатися — стара слабкість"
    question: "Що робить Марко?"
    options:
      - id: ask_what_if
        text: "Ставлю питання: «А що як...?» Має бути двері, яких не видно."
      - id: give_up
        text: "Здаюся. Якщо всі варіанти ведуть до втрати — отже, вибору справді немає."

  # ── s06b ────────────────────────────────────────────────────
  - scene_id: ep038_s06b
    author_text: >
      Марко заплющує очі. Дихає. Хвилину. Дві.

      «Здатися» — це зручно. Не треба думати. Не треба шукати.

      Але Сем біля дверей каже — тихо, наче собі:

      «Сем-Ліна-Голос-Сема — чотири суперечності за один день.
      Раніше ти не здавався. Що змінилося?»

      Марко розплющує очі. Сем не дивиться на нього. Сем дивиться
      в коридор. Однак слова — влучили.

      «Змінилося те, що я втомився. Це не означає, що виходу
      немає.»

      Марко видихає. Повертається.
    mood: "втома перевдяглася в «вибору немає» — однак це не правда"

  # ── s07 ─────────────────────────────────────────────────────
  - scene_id: ep038_s07
    author_text: >
      ВИБІР БЕЗ ВИБОРУ — це особлива пастка. Тобі дають два варіанти,
      але обидва ведуть до одного й того самого.

      Приклад: «Спати зараз чи після прибирання?» В обох випадках ти
      йдеш спати. Здається, що ти обрав, — а насправді все вже
      вирішили за тебе. Два шляхи, одна стіна в кінці.

      Де вона ховається найчастіше:

      У рекламі. «Базовий чи преміум?» — варіант «не купувати»
      прибрали з меню. Тебе наче питають, але «ні» вже не пропонують.

      У своїй голові. «Або зроблю ідеально — або взагалі не буду.»
      Це найхитріша пастка: її ставить сам собі. Нуль завжди менший,
      ніж «неідеально». Трійка краща за нуль. Завжди.

      ЧАРІВНЕ ПИТАННЯ: «А що як...?» Воно не відповідає на пастку.
      Воно її ламає. Повертає всі сховані варіанти назад. «А що як
      просто не купувати?» «А що як зробити як вийде?»

      Це не магія. Це просто питання — однак воно відчиняє двері,
      які від тебе зачинили.
    mood: "карта інструменту: де ховається пастка + чарівне питання"

  # ── s08 ─────────────────────────────────────────────────────
  - scene_id: ep038_s08
    question: "«Роби уроки зараз або після прибирання.» Вибір без вибору чи справжній вибір?"
    options:
      - id: no_choice
        text: "Вибір без вибору"
      - id: real
        text: "Справжній вибір"
    correct_logic: "В обох випадках ти робиш уроки. Змінюється лише час. Варіант «не робити сьогодні» сховали."
    feedback_success: "Обидва шляхи в одне місце. Варіант «не робити» схований."
    feedback_soft_fail: "І «зараз», і «після прибирання» ведуть в одне місце — за уроки. Змінюється лише коли. Варіант «взагалі не робити» прибрали з меню. Це вибір без вибору."
    mood: "розминка — упізнав пастку"

  # ── s09 ─────────────────────────────────────────────────────
  - scene_id: ep038_s09
    question: "«Хочеш піцу чи бургер на обід?» Вибір без вибору чи справжній вибір?"
    options:
      - id: real
        text: "Справжній вибір"
      - id: no_choice
        text: "Вибір без вибору"
    correct_logic: "Піца та бургер — це різні страви. Два шляхи ведуть до двох різних результатів. Це справжній вибір."
    feedback_success: "Піца ≠ бургер. Два різних фінали — справжній вибір."
    feedback_soft_fail: "Тут «піца» і «бургер» — це дві різні тарілки. Кожен шлях приводить до свого обіду. Не одне й те саме. Це справжній вибір."
    mood: "контраст — справжній вибір існує"

  # ── s10 ─────────────────────────────────────────────────────
  - scene_id: ep038_s10
    question: "«Великий пакет чи маленький?» — питає продавець. Вибір без вибору?"
    options:
