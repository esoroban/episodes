  # ── s12_sofa ────────────────────────────────────────────────
  - scene_id: ep038_s12_sofa
    dialogue:
      - who: Софа
        line: "Правило тридцять восьме."
      - who: Софа
        line: "Вибір без вибору — це коли обидва шляхи ведуть в одне місце. Чарівне питання «А що як?» повертає сховані варіанти."
      - who: Софа
        line: "Пам'ятай: нуль завжди менший, ніж неідеально. Трійка краща за нуль."
    mood: "правило закрите — час застосувати до Голосу"

  # ── s13 ─────────────────────────────────────────────────────
  - scene_id: ep038_s13
    dialogue:
      - who: Марко
        line: "А що як... можна зберегти сестру і не віддавати артефакти Голосу?"
      - who: Софа
        line: "Голос сказав: віддай або втратиш. Софія сказала: не ламай. Однак що як питання поставлене неправильно?"
      - who: Марко
        line: "Голос хоче артефакти. Софія прив'язана до артефактів. А що як... відв'язати Софію?"
    mood: "Марко переписує умову задачі"

  # ── s14 ─────────────────────────────────────────────────────
  - scene_id: ep038_s14
    author_text: >
      Сем за дверима почув голос. Стук у одвірок. Тихо.
    dialogue:
      - who: Сем
        line: "Марко? Ти в порядку?"
      - who: Марко
        line: "Ні. Але я думаю."
    mood: "Сем поруч — однак Марко зараз далеко"

  # ── s15 ─────────────────────────────────────────────────────
  - scene_id: ep038_s15
    dialogue:
      - who: Софа
        line: "Цього... немає в програмі."
      - who: Софа
        line: "Софія не знала... що буде так. Ти один."
    mood: "Софа вперше визнає: плану немає"

  # ── s16 ─────────────────────────────────────────────────────
  - scene_id: ep038_s16
    question: "У магазині: «Знижка лише для базової чи преміум-підписки!» Вибір без вибору?"
    options:
      - id: yes_no_choice
        text: "Так — вибір без вибору"
      - id: no_real
        text: "Ні — справжній"
    correct_logic: "І «базова», і «преміум» — це купівля підписки. Варіант «взагалі не підписуватися» з меню прибрали."
    feedback_success: "Обидва шляхи ведуть до купівлі. «Без підписки» сховали."
    feedback_soft_fail: "Слово «знижка» відволікає, але обидва пункти приводять до одного — ти підписався. Варіант «взагалі не підписуватися» в питання не включили. Це вибір без вибору."
    mood: "бліц — упізнав торгову пастку"

  # ── s17 ─────────────────────────────────────────────────────
  - scene_id: ep038_s17
    question: "«Підпишись на місяць або на рік — перший тиждень безкоштовно!» Справжній вибір чи пастка?"
    options:
      - id: trap
        text: "Вибір без вибору"
      - id: real
        text: "Справжній вибір"
    correct_logic: "Безкоштовний тиждень — це принада. Після нього гроші списують. І «місяць», і «рік» — це купівля. Варіант «не підписуватися» схований."
    feedback_success: "Безкоштовний тиждень — принада. Фінал один: платиш."
    feedback_soft_fail: "Перший тиждень безкоштовний — це гачок. Потім гроші списують. І «місяць», і «рік» приводять до одного фіналу: ти платиш. «Не підписуватися» в меню не залишили. Це вибір без вибору."
    mood: "бліц — принада не скасовує вибору без вибору"

  # ── s18 ─────────────────────────────────────────────────────
  - scene_id: ep038_s18
    question: "Що краще — написати неідеальну книгу чи не написати ніякої?"
    options:
