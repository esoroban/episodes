        text: "Вибір без вибору"
      - id: real
        text: "Справжній вибір"
    correct_logic: "І «великий», і «маленький» — це купівля пакета. Варіант «взагалі без пакета» продавець не запропонував."
    feedback_success: "Обидва шляхи ведуть до купівлі пакета. «Без пакета» сховали."
    feedback_soft_fail: "Можна покласти продукти у свою сумку. Можна забрати в руках. Можна взагалі нічого не брати. Цей варіант продавець не запропонував — а він є. Обидва його варіанти ведуть до купівлі. Це вибір без вибору."
    mood: "торгова пастка — упізнав"

  # ── s11 ─────────────────────────────────────────────────────
  - scene_id: ep038_s11
    question: "«Винесеш сміття до вечері чи після?» Вибір без вибору чи справжній?"
    options:
