      - id: no_choice
        text: "Вибір без вибору"
    correct_logic: "Софія не тисне — вона розповідає, як усе влаштовано. Зламати артефакти = вона зникне. Це просто факт, не пастка."
    feedback_success: "Сестра пояснює, не тисне. Це правда, а не пастка."
    feedback_soft_fail: "Тут немає двох порожніх варіантів. Софія розповідає, як усе працює: зламаєш артефакти — вона зникне, тому що вони з нею пов'язані. Це не тиск, це правда. Справжня загроза."
    mood: "сюжет — відмінність тиску від факту"

  # ── s21 ─────────────────────────────────────────────────────
  - scene_id: ep038_s21
    question: "«А що як відв'язати Софію від артефактів?» — третій варіант чи фантазія?"
