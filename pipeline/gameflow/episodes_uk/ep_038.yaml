        text: "Справжній"
    correct_logic: "І «до вечері», і «після» ведуть в одне місце — сміття винесене. Змінюється лише час. Варіант «не виносити сьогодні» схований."
    feedback_success: "Два шляхи в одне відро. «Не виносити сьогодні» сховали."
    feedback_soft_fail: "І «до», і «після» — це винесене сміття. Змінюється лише час. Варіант «не виносити сьогодні» в питання не вставили. Це вибір без вибору."
