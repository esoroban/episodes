episode_id: 30
episode_title: "Правда як зброя"
lang: uk
terms_introduced:
  - "уточнення (формула захисту)"
  - "чесний переказ"
terms_used:
  - "опудало (викривлення слів)"
  - "перебільшення"
  - "спрощення"
  - "додавання"
  - "зміна сенсу"
  - "факт"
  - "обґрунтування"
  - "демагогія"

scenes:

  # ── s01 ─────────────────────────────────────────────────────
  - scene_id: ep030_s01
    author_text: >
      Марко пише записку. Вугільним олівцем на клаптику тканини. Для
      тих, кого ще не стерто. Для спротиву.

      «Я бачив, як стирають людей. Місто не таке, яким здається.»

      Передає ланцюжком. Сем — дівчинці з косою. Дівчинка — хлопчику із
      синцем на коліні. Хлопчик — далі.

      Правда — з рук у руки, як записка на уроці.
    mood: "правда — рукою по руці"

  # ── s02 ─────────────────────────────────────────────────────
  - scene_id: ep030_s02
    author_text: >
      Надвечір — динаміки. Голос Рея.
    dialogue:
      - who: Рей
        line: "Марко ЗІЗНАВСЯ. Він БАЧИВ стирання. І НІЧОГО НЕ ЗРОБИВ."
      - who: Рей
        line: "Він стояв і дивився, як стирають людину. Не допоміг. Не закричав. Стояв."
    author_text_after: >
      Марко зупиняється. Слова — його. Справжні. Він справді бачив.

      Але половина — відрізана. І від цієї половини — він став іншою
      людиною. Тим, хто стояв, а не тим, хто намагався.

      Правда стала зброєю. Слова справжні — але ранять як брехня.
    mood: "правда — однак обрізана"

  # ── s03 ─────────────────────────────────────────────────────
  - scene_id: ep030_s03
    dialogue:
      - who: Сем
        line: "Це правда? Ти бачив — і нічого не зробив?"
    author_text_after: >
      Очі Сема — звинувачують.
    mood: "звинувачувальний погляд восьми років"
    question: "Що робить Марко?"
    options:
      - id: use_formula
        text: "Застосувати формулу: «Дозволь уточнити: я сказав X, а не Y.»"
      - id: defend_panic
        text: "Виправдатися: «Ні! Я намагався допомогти!»"

  # ── s03b ────────────────────────────────────────────────────
  - scene_id: ep030_s03b
    dialogue:
      - who: Марко
        line: "Ні! Я намагався! Я хотів його витягти! Я не винен!"
    author_text_after: >
      Сем спохмурнів. «Я не винен» — це не відповідь на його запитання.
      Це захист. Захист приймає правила Рея: ніби Марко на лаві
      підсудних.

      Не в тому річ.

      Марко видихає. Виправдання визнає звинувачення. Уточнення —
      повертає розмову до справжніх слів. Марко повертається.
    mood: "виправдання = прийняти звинувачення"

  # ── s04 ─────────────────────────────────────────────────────
  - scene_id: ep030_s04
    dialogue:
      - who: Софа
        line: "Не опудало. Гірше. Правда — однак обрізана. Як фото, де відрізали половину."
      - who: Софа
        line: "Це демагогія. Коли крутять слова, щоб ти погодився, а не щоб зрозуміти правду."
    mood: "Софа називає прийом — демагогія"

  # ── s05 ─────────────────────────────────────────────────────
  - scene_id: ep030_s05
    author_text: >
      ФОРМУЛА УТОЧНЕННЯ. Коли твої слова перекрутили чи вирвали з
      контексту — ти кажеш:

      «Дозволь уточнити: я говорив, що… а не те, що…»

      Перша частина — справжні слова. Друга — те, що приписали.
      Спокійно. Конкретно.

      Погані відповіді. Крик «Сам такий!» — не повертає до суті.
      Підсилює конфлікт. Образа «Мені байдуже!» — опудало перемагає.
      Ти відступив. Відступ «Забудь, я нічого не казав.» — ти
      відмовився від своїх слів. Перемога опудала.

      Добра відповідь: спокійно, конкретно. Ось мої слова. Ось
      викривлення.

      ЧЕСНИЙ ПЕРЕКАЗ — другий інструмент. Перш ніж відповісти на
      чиїсь слова, перекажи їх і запитай: «Чи правильно я зрозумів?»

      Якщо «так» — відповідай. Якщо «ні» — уточни.

      Уточнення захищає твої слова. Чесний переказ захищає чужі.
    mood: "дві формули — два щити"

  # ── s06 ─────────────────────────────────────────────────────
  - scene_id: ep030_s06
    question: "Марко: «Я бачив стирання й намагався допомогти.» Рей: «Марко бачив стирання і НІЧОГО НЕ ЗРОБИВ.» Який вид викривлення?"
    options:
      - id: simplify
        text: "Спрощення"
      - id: amplify
        text: "Перебільшення"
      - id: change
        text: "Зміна сенсу"
    correct_logic: "Прибрали важливу деталь — «намагався допомогти». Сенс перевернувся."
    feedback_success: "Відрізали «намагався допомогти» — сенс перевернувся. Спрощення."
    feedback_soft_fail: "Це не «більше» (перебільшення) і не «навиворіт» (зміна). Це ВІДРІЗАЛИ важливу частину. Спрощення."
    mood: "перший випадок упізнано"

  # ── s07 ─────────────────────────────────────────────────────
  - scene_id: ep030_s07
    question: "Однокласник сказав: «Я іноді дивлюся мультики.» Переказ: «Він тільки мультики й дивиться!» Це чесний переказ?"
    options:
      - id: no_pugalo
        text: "Ні — опудало"
      - id: yes_honest
        text: "Так — чесний переказ"
    correct_logic: "«Іноді» роздуто до «тільки й робить». Перебільшення."
    feedback_success: "«Іноді» роздули до «тільки». Перебільшення."
    feedback_soft_fail: "Порівняй: «іноді» vs «тільки й робить». Слово роздули у десять разів. Це не чесний переказ — це опудало."
    mood: "шкільний приклад упізнаваний"

  # ── s08 ─────────────────────────────────────────────────────
  - scene_id: ep030_s08
    question: "Як краще відповісти на опудало?"
    options:
      - id: formula
        text: '«Дозволь уточнити: я говорив "іноді", а не "тільки".»'
      - id: shout
        text: "«Ти брехун! Замовкни!»"
    correct_logic: "Формула уточнення. Спокійно, конкретно, повертає до суті."
    feedback_success: "Формула уточнення. Спокійно. Конкретно."
    feedback_soft_fail: "«Ти брехун» — це напад на людину. Він не повертає до справжніх слів. Формула — повертає. Працює лише Б."
    mood: "формула в дії"

  # ── s09 ─────────────────────────────────────────────────────
  - scene_id: ep030_s09
    question: "Подруга: «Я не хочу грати в цю гру.» Переказ: «Вона не хоче грати в цю гру.» Чесний?"
    options:
      - id: honest
        text: "Так"
      - id: pugalo
        text: "Ні"
    correct_logic: "Повторює без викривлень. Зберігає «цю» — не роздуває до «взагалі не хоче грати»."
    feedback_success: "«Цю» збережено. Без роздування."
    feedback_soft_fail: "Слова повторено точно: «не хочу» → «не хоче», «цю гру» → «цю гру». Нічого не роздули і не приписали. Це чесний переказ."
    mood: "чесний переказ — упізнаваний"

  # ── s10 ─────────────────────────────────────────────────────
  - scene_id: ep030_s10
    question: "Тобі приписали: «Ти ненавидиш собак!» Ти сказав: «Мені більше подобаються коти.» Яка відповідь краща?"
    options:
      - id: formula
        text: "«Дозволь уточнити: я сказав, що люблю котів більше, а не що ненавиджу собак.»"
      - id: dont_care
        text: "«Мені байдуже, що ти думаєш!»"
    correct_logic: "Формула уточнення працює: справжні слова vs приписані."
    feedback_success: "Формула: ось справжні слова, ось приписані."
    feedback_soft_fail: "«Мені байдуже» — це образа. Опудало перемагає: ти відступив від своїх слів. Формула — повертає їх. Краще формула."
    mood: "формула на власній шкурі"

  # ── s11_sofa ────────────────────────────────────────────────
  - scene_id: ep030_s11_sofa
    dialogue:
      - who: Софа
        line: "Правило тридцяте."
      - who: Софа
        line: "Формула уточнення: «Дозволь уточнити: я говорив, що… а не те, що…» Чесний переказ: перекажи й запитай «Чи правильно я зрозумів?» — лише потім відповідай."
    mood: "правило 30 записано"

  # ── s12 ─────────────────────────────────────────────────────
  - scene_id: ep030_s12
    author_text: >
      Марко повертається до Сема. Не виправдовується. Не кричить.
      Застосовує формулу.
    dialogue:
      - who: Марко
        line: "Дозволь уточнити: я сказав, що бачив стирання й намагався допомогти. А не те, що стояв і дивився."
      - who: Сем
        line: "Але Рей сказав…"
      - who: Марко
        line: "Рей вирвав половину. Як фото, де відрізали край. Я був там. Я бачив Макса. Я намагався його витягти. Не зміг — однак намагався."
    mood: "формула вперше — на Семі"

  # ── s13 ─────────────────────────────────────────────────────
  - scene_id: ep030_s13
    dialogue:
      - who: Сем
        line: "А звідки мені знати, кому вірити — тобі чи динамікам?"
    author_text_after: >
      Добре запитання. Сем — детектив восьми років від народження.
    mood: "дитяче запитання детектива"

  # ── s13_sofa ────────────────────────────────────────────────
  - scene_id: ep030_s13_sofa
    dialogue:
      - who: Софа
        line: "Два джерела. Слова Марка. Слова Голосу через Рея. Хто може довести? Перевірка — краща за довіру."
    mood: "Софа повертає до фактів"

  # ── s14 ─────────────────────────────────────────────────────
  - scene_id: ep030_s14
    question: "Марко використав формулу уточнення: «Я сказав X, а не Y.» Це добра відповідь на викривлення?"
    options:
      - id: yes_good
        text: "Так"
      - id: no_bad
        text: "Ні"
    correct_logic: "Спокійно, конкретно. Справжні слова vs приписані. Не крик, не образа."
    feedback_success: "Спокійно, конкретно. Без крику."
    feedback_soft_fail: "Формула повертає розмову до справжніх слів. Без образ і без відступу. Це добра відповідь."
    mood: "формула протестована"

  # ── s15 ─────────────────────────────────────────────────────
  - scene_id: ep030_s15
    question: "Сем запитує: «Звідки мені знати, кому вірити?» Чи це добре запитання?"
    options:
      - id: yes_good
        text: "Так"
      - id: no_bad
        text: "Ні"
    correct_logic: "Сем не вірить на слово жодній стороні. Вимагає перевірки — як справжній детектив."
    feedback_success: "Не вірить на слово жодній стороні. Це правильно."
    feedback_soft_fail: "Якщо Сем повірить на слово — хтось його обдурить. Якщо вимагатиме перевірки — побачить, хто має рацію. Добре запитання."
    mood: "дитяче запитання — дорослий стандарт"

  # ── s16 ─────────────────────────────────────────────────────
  - scene_id: ep030_s16
    question: "Марко пропонує піти й перевірити — побачити сліди стирання на підлозі. Який тип обґрунтування він використовує?"
    options:
      - id: fact
        text: "Факт"
      - id: logic
        text: "Логіка"
      - id: source
        text: "Надійне джерело"
    correct_logic: "Фізичні сліди. Перевірювані дані. Не «повір мені» — а «ходімо подивимося»."
    feedback_success: "Фізичні сліди — це факт. Перевірювані."
    feedback_soft_fail: "Не «тому що я розумно вивів» (логіка) і не «мені сказав науковець» (джерело). Це «своїми очима побачимо». Це факт."
    mood: "перевірка важливіша за віру"

  # ── s17 ─────────────────────────────────────────────────────
  - scene_id: ep030_s17
    question: "Рей: «Марко зізнався!» Насправді Марко написав записку для спротиву. Це чесний переказ чи опудало?"
    options:
      - id: simplify
        text: "Опудало — спрощення"
      - id: honest
        text: "Чесний переказ"
      - id: change
        text: "Опудало — зміна сенсу"
    correct_logic: "Записку для допомоги перетворили на «зізнання». Прибрали контекст."
    feedback_success: "Контекст «для спротиву» прибрано. Спрощення."
    feedback_soft_fail: "Записку для допомоги перетворили на «зізнання перед судом». Контекст вирізали — це спрощення, а не «вивертання». Опудало — спрощення."
    mood: "обрізали контекст"

  # ── s18 ─────────────────────────────────────────────────────
  - scene_id: ep030_s18
    question: "Однокласник переказав твою ідею вчителеві, однак пропустив головну умову. Що краще?"
    options:
      - id: formula
        text: "«Дозволь уточнити: я говорив, що… за умови, що…»"
      - id: be_offended
        text: "Образитися"
    correct_logic: "Формула уточнення. Додай пропущену умову — поверни контекст."
    feedback_success: "Формула з пропущеною умовою. Контекст повернено."
    feedback_soft_fail: "Образа — це «відмова говорити». Умова так і залишиться втраченою. Формула — повертає умову в розмову. Краще формула."
    mood: "формула вирішує шкільний випадок"

  # ── s19 ─────────────────────────────────────────────────────
  - scene_id: ep030_s19
    question: "«Чи правильно я зрозумів: ти хочеш, щоб контрольні були коротшими?» — це чесний переказ?"
    options:
      - id: yes_honest
        text: "Так, якщо це справді те, що було сказано"
      - id: no_pugalo
        text: "Ні, будь-який переказ — це опудало"
    correct_logic: "Формула чесного переказу: повторив + запитав «чи правильно я зрозумів?»"
    feedback_success: "Повторив + запитав. Це формула чесного переказу."
    feedback_soft_fail: "Не будь-який переказ — опудало. Якщо ти повторюєш без викривлень і ЗАПИТУЄШ «чи правильно?» — це чесний переказ. Це інструмент захисту, а не нападу."
    mood: "переказ як інструмент"

  # ── s20 ─────────────────────────────────────────────────────
  - scene_id: ep030_s20
    question: "Рей вирвав правду з контексту. Це опудало якого виду?"
    options:
      - id: simplify
        text: "Спрощення"
      - id: amplify
        text: "Перебільшення"
      - id: add
        text: "Додавання"
    correct_logic: "Прибрали важливі деталі. Правда залишилась — однак половинчаста, і тому брехлива."
    feedback_success: "Половина правди — це спрощення. Не роздули і не приписали."
    feedback_soft_fail: "Слова Марка — справжні. Їх не роздули і не приписали з нуля. Їх ОБРІЗАЛИ — викинули половину. Це спрощення."
    mood: "правда обрізана = брехня"

  # ── s21_end ─────────────────────────────────────────────────
  - scene_id: ep030_s21_end
    author_text: >
      Динаміки змінюють тон. Не голос Рея. Інший голос. Тихий. Лагідний.
      Як колискова.

      Голос — сам.
    dialogue:
      - who: Голос
        line: "Марко. Я не хочу тебе лякати. Однак мама… мама сьогодні плакала."
      - who: Голос
        line: "Вона плакала, Марку. Через тебе."
    author_text_after: >
      Марко завмирає. Живіт стискається. Руки — крижані.

      Сем хапає Марка за руку. Однак Марко не відчуває. Лише слово
      «мама». І слово «плакала».

      Число на стіні: 24.

      Опудало — це коли перекручують слова. Однак є інструмент
      страшніший. Коли не брешуть. Коли б'ють туди, де болить. Коли
      вимовляють «мама» — і ти перестаєш думати.

      Голос перемкнувся. Нова зброя. Старий страх.
    mood: "опудало пройдено — попереду страх"
