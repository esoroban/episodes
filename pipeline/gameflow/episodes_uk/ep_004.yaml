episode_id: 4
episode_title: "Детектив правди"
lang: uk
terms_introduced: ["детектив правди"]
terms_used: ["факт", "думка", "неправда", "хитре твердження", "виправдання", "інструменти перевірки"]

scenes:

  # ── s01: у невидимих дверей ────────────────────────────────
  - scene_id: ep004_s01
    author_text: >
      Парк. Алея закінчується — далі кущі, паркан, за парканом пустир. Звичайне місце. Нічого особливого. Ліна зупиняється. Показує рукою — прямо на паркан.
    dialogue:
      - who: Ліна
        line: "Тут."
      - who: Марко
        line: "Тут — що?"
      - who: Ліна
        line: "Двері. Через них Софію забрали. Через них можна потрапити... туди."
      - who: Марко
        line: "Ліно, тут немає жодних дверей."
      - who: Ліна
        line: "Вони невидимі. Але вони тут. Я знаю."
      - who: Марко
        line: "Звідки?"
      - who: Ліна
        line: "Просто знаю."
    author_text_after: >
      Марко дивиться на паркан. Іржава сітка. Травинки стирчать з-під бетону. Нічого. «Просто знаю.» Два слова, які нічого не означають. Марко згадує: Софа вчила — на кожну перевірку є виправдання? Ні, Ліна не виправдовується. Вона просто — знає. І каже це так упевнено, що Марку хочеться повірити. Ліна впевнена — і цього Марку досить. Так було з мамою. Так було з Вірою. Так було завжди. Ноги не хочуть іти. Голова каже «так» — Ліна ж єдина, хто пам'ятає! А ноги кажуть «стій». Марко робить крок уперед. Софа вібрує. Не один раз — кілька. Часті короткі вібрації, як серцебиття.

  # ── s02: Quiz — невидимі двері ─────────────────────────────
  - scene_id: ep004_s02
    dialogue:
      - who: Софа
        line: "Ліна каже «просто знаю». Чи є інструмент перевірити це твердження?"
    question: "«Тут є невидимі двері.» Перевірюване, думка чи хитре твердження?"
    options:
      - id: checkable
        text: "Перевірюване"
      - id: opinion
        text: "Думка"
      - id: tricky
        text: "Хитре твердження"
    correct_logic: "Можна спробувати пройти, торкнутися — інструмент: руки."
    feedback_success: "Перевірюване! Можна торкнутися, спробувати пройти — інструмент: руки."
    feedback_soft_fail: "Чи можна торкнутися паркана? Спробувати пройти? Якщо так — є інструмент перевірки."

  # ── s03: Quiz — «просто знаю» ──────────────────────────────
  - scene_id: ep004_s03
    question: "«Просто знаю.» Це доказ?"
    options:
      - id: true
        text: "Так, Ліна впевнена"
      - id: false
        text: "Ні, це відчуття"
    correct_logic: "«Просто знаю» — не інструмент і не перевірка. Це відчуття."
    feedback_success: "Ні! «Просто знаю» — не інструмент і не перевірка. Це відчуття."
    feedback_soft_fail: "Упевненість — це доказ? Чи відчуття? Чи є в цьому інструмент перевірки?"

  # ── s04: Три питання детектива ─────────────────────────────
  - scene_id: ep004_s04
    author_text: >
      Марко дістає телефон. Софа вібрує знову.
    dialogue:
      - who: Софа
        line: >
          Стривай. Перш ніж іти — давай зберемо все, що ти вже знаєш. За два дні ти навчився розрізняти факт, думку та неправду. Навчився помічати виправдання. Знаєш п'ять інструментів перевірки. Тепер — система. Три питання, які працюють ЗАВЖДИ.
      - who: Софа
        line: >
          Питання перше: ЧИ Є ІНСТРУМЕНТ ПЕРЕВІРИТИ? Ваги, лінійка, годинник, термометр, лічба — або щось іще. Якщо є — твердження перевірюване. Якщо ні — думка або хитре твердження.
      - who: Софа
        line: >
          Питання друге: ЛЮДИНА ЗГОДНА ПЕРЕВІРИТИ — ЧИ В НЕЇ ВИПРАВДАННЯ? Якщо «не сьогодні», «не при людях», «не збереглося» — хитре твердження.
      - who: Софа
        line: >
          Питання третє: ПЕРЕВІРИЛИ — ПІДТВЕРДИЛОСЯ? Так — факт. Ні — неправда.
      - who: Софа
        line: "Три питання. Інструмент? Виправдання? Результат? Це система ДЕТЕКТИВ ПРАВДИ."
    author_text_after: >
      Марко дивиться на паркан. Потім на Ліну.

  # ── s05: drama — Марко питає дозволу ───────────────────────
  - scene_id: ep004_s05
    dialogue:
      - who: Марко
        line: "Ліно, можна я перевірю?"
      - who: Ліна
        line: "Давай."

  # ── s05_sofa: Quiz ─────────────────────────────────────────
  - scene_id: ep004_s05_sofa
    dialogue:
      - who: Софа
        line: "Ліна не виправдовується. Згодна перевірити. Друге питання — пройдено."
    question: "Ліна сказала «давай» — це згода на перевірку чи виправдання?"
    options:
      - id: agree
        text: "Згода — не закриває шлях до перевірки"
      - id: excuse
        text: "Виправдання"
    correct_logic: "Згода! Ліна не закриває шлях до перевірки. Друге питання детектива — пройдено."
    feedback_success: "Згода! Не закриває шлях до перевірки."
    feedback_soft_fail: "Ліна заважає перевірити? Чи дозволяє? Чи закритий шлях до перевірки?"

  # ── s06: Quiz — якби «просто повір мені» ───────────────────
  - scene_id: ep004_s06
    question: "А якби Ліна сказала «ні, просто повір мені, не можна чіпати» — це було б що?"
    options:
      - id: agree
        text: "Згода"
      - id: excuse
        text: "Виправдання — закриває шлях до перевірки"
    correct_logic: "Виправдання! «Не можна чіпати» закриває шлях до перевірки."
    feedback_success: "Виправдання! «Не можна чіпати» — закриває шлях до перевірки."
    feedback_soft_fail: "Якщо забороняють перевіряти — що це? Подумай про друге питання детектива."

  # ── s07: рука крізь паркан ─────────────────────────────────
  - scene_id: ep004_s07
    author_text: >
      Марко простягає руку до паркана. Пальці торкаються іржавої сітки... і проходять крізь неї. Немає опору. Ніби сітки немає. Ніби повітря. Марко смикає руку. Дивиться на пальці — цілі. Нормальні. Пробує знову. Пальці провалюються. Як у воду, тільки без води. Утретє. Те саме.

  # ── s07_sofa ─────────────────────────────────────────────────
  - scene_id: ep004_s07_sofa
    dialogue:
      - who: Софа
        line: >
          Три повторення... достатньо для гіпотези... недостатньо для закону. Але двері... виявлено. Третє питання детектива: перевірили — підтвердилося? ТАК.

  # ── s08: Quiz — підтвердилося? ─────────────────────────────
  - scene_id: ep004_s08
    question: "Марко тричі пройшов рукою крізь паркан. Твердження «тут є двері» — підтвердилося?"
    options:
      - id: true
        text: "Так — інструмент: руки; повторили тричі; результат однаковий"
      - id: false
        text: "Ні — може здалося"
    correct_logic: "Так! Інструмент — руки. Повторили тричі. Результат однаковий. Три з трьох питань детектива — пройдено."
    feedback_success: "Так! Інструмент — руки. Повторили тричі. Результат однаковий. Двері — факт."
    feedback_soft_fail: "Три повторення, три однакові результати. Інструмент є, виправдань немає, перевірка підтвердилась."

  # ── s09: батч — Лина была, 80 см, родной город, десерт ─────
  - scene_id: ep004_s09
    author_text: >
      Марко ховає телефон. Серце стукає. Двері — справжні. Невидимі, але справжні. — Там щось є, — каже Марко тихо. — Пальці проходять. Ліна киває. Ніби знала. — Тоді ходімо. — Зачекай. — Марко не рухається. — Ти кажеш «я знаю» — впевнено. Віра теж казала впевнено. Мама теж. Упевненість — це не доказ. Ти вже тут бувала? Ліна не відповідає одразу. Потім: — Один раз. Давно.
    dialogue:
      - who: Софа
        line: "Нова інформація. Ліна була тут раніше. Перевірюване?"
    interactions:
      - question: "«Ліна була тут раніше.» Перевірюване, думка чи хитре твердження?"
        options:
          - id: checkable
            text: "Перевірюване"
          - id: opinion
            text: "Думка"
          - id: tricky
            text: "Хитре твердження"
        correct_logic: "Перевірюване! Можна перевірити — вона знає дорогу, знає про двері. Але результат ще не ясний."
        feedback_success: "Перевірюване! Вона знає дорогу, знає про двері — можна перевірити. Результат — поки невідомий."
        feedback_soft_fail: "Чи є спосіб перевірити? Якщо вона була — знає дорогу. Це інструмент?"
      - question: "«Двері в паркані шириною 80 сантиметрів.» Перевірюване, думка чи хитре твердження?"
        options:
          - id: checkable
            text: "Перевірюване"
          - id: opinion
            text: "Думка"
          - id: tricky
            text: "Хитре твердження"
        correct_logic: "Перевірюване! Рулетка — інструмент є, можна виміряти."
        feedback_success: "Перевірюване! Рулетка — інструмент є, можна виміряти."
        feedback_soft_fail: "80 сантиметрів — число. Чи є інструмент для чисел?"
      - question: "«Моє рідне місто — найкраще у світі.» Перевірюване, думка чи хитре твердження?"
        options:
          - id: checkable
            text: "Перевірюване"
          - id: opinion
            text: "Думка"
          - id: tricky
            text: "Хитре твердження"
        correct_logic: "Думка! Немає «найкращеміру» для міст."
        feedback_success: "Думка! Немає «найкращеміру» для міст. «Найкращий» — суб'єктивна оцінка."
        feedback_soft_fail: "Чи є інструмент виміряти «найкращий»? Ні? Тоді що це?"
      - question: "«Цей десерт смачний — але тільки для тих, хто вміє цінувати смачне.» Перевірюване, думка чи хитре твердження?"
        options:
          - id: checkable
            text: "Перевірюване"
          - id: opinion
            text: "Думка"
          - id: tricky
            text: "Хитре твердження"
        correct_logic: "Хитре! Умова «хто вміє цінувати» — виправдання: не сподобалося — значить, «не вмієш цінувати». Шлях до перевірки закритий."
        feedback_success: "Хитре твердження! «Тільки тим, хто вміє цінувати» — виправдання. Не сподобалося? «Значить, ти не вмієш цінувати.» Перевірка закрита."
        feedback_soft_fail: "Що означає «вміє цінувати»? Ця умова закриває чи відкриває шлях до перевірки?"

  # ── s10: вхід у Зеркальний Місто ──────────────────────────
  - scene_id: ep004_s10
    author_text: >
      Ліна ступає в паркан — і зникає. Розчиняється, як ложка у склянці чаю. Була — і немає. Марко стоїть сам. Паркан перед ним. Рюкзак на плечах. Телефон у кишені. Три повторення підтвердили: двері є. Але що за ними — не перевірено. Перше питання детектива — інструмент є, руки. Друге — виправдань немає, Ліна погодилася. Третє — підтвердилось. Три з трьох. Двері — факт. А ось що за дверима — жодної відповіді з трьох. Марко робить крок. Фіолетове небо. Не синє, не блакитне — фіолетове, як синець. Будинки стоять рівно, як солдати. Вікна відбивають небо, і здається, що будинки дивляться. Гучномовці на стовпах. Голос — м'який, теплий, як тепла ковдра: «Ласкаво просимо додому, нащадку.»

  # ── s10_sofa ─────────────────────────────────────────────────
  - scene_id: ep004_s10_sofa
    dialogue:
      - who: Софа
        line: "«Ласкаво просимо додому.» Три слова. Три питання детектива."

  # ── s11: Quiz «Домой» ──────────────────────────────────────
  - scene_id: ep004_s11
    question: "Голос сказав: «Ласкаво просимо додому.» Слово «додому» — це дім Марка?"
    options:
      - id: fact
        text: "Факт — це справді його дім"
      - id: lie
        text: "Неправда — Марко живе в іншому місці"
    correct_logic: "Неправда! Перевірюване — Марко живе в іншому місці. При перевірці не підтвердиться."
    feedback_success: "Неправда! Марко живе в іншому місці. Перевірюване — і при перевірці не підтвердиться."
    feedback_soft_fail: "Де живе Марко? Це його дім? Можна перевірити?"

  # ── s12: три твердження з гучномовців ──────────────────────
  - scene_id: ep004_s12
    author_text: >
      Марко озирається. Ліна стоїть поруч — спокійна, руки в кишенях. Ні здивування, ні страху. Ніби прийшла в знайомий двір. Гучномовці продовжують: «Тут безпечно.» «Ви в найкращому місті світу.» «Ніхто не хоче вам зла.» Три твердження. Одне за одним. Упевнені. Теплі.

  # ── s12_sofa ─────────────────────────────────────────────────
  - scene_id: ep004_s12_sofa
    dialogue:
      - who: Софа
        line: "Три твердження з гучномовців. Давай перевіримо кожне."

  # ── s13: Quiz — три твердження ─────────────────────────────
  - scene_id: ep004_s13
    interactions:
      - question: "«Тут безпечно.» Перевірюване, думка чи хитре твердження?"
        options:
          - id: checkable
            text: "Перевірюване"
          - id: opinion
            text: "Думка"
          - id: tricky
            text: "Хитре твердження"
        correct_logic: "Перевірюване! Можна перевірити — але ми ТІЛЬКИ увійшли, результату поки немає."
        feedback_success: "Перевірюване! Можна перевірити — але ми ТІЛЬКИ увійшли. Результату ще немає."
        feedback_soft_fail: "Чи можна перевірити безпеку? Чи є інструмент? Чи є результат?"
      - question: "«Ви в найкращому місті світу.» Перевірюване, думка чи хитре твердження?"
        options:
          - id: checkable
            text: "Перевірюване"
          - id: opinion
            text: "Думка"
          - id: tricky
            text: "Хитре твердження"
        correct_logic: "Думка! Немає «містоміру». «Найкращий» — суб'єктивна оцінка."
        feedback_success: "Думка! Немає «містоміру». «Найкращий» — суб'єктивна оцінка."
        feedback_soft_fail: "Чи є прилад виміряти «найкращий»? Ні? Це відчуття."
      - question: "«Ніхто не хоче вам зла.» Перевірюване, думка чи хитре твердження?"
        options:
          - id: checkable
            text: "Перевірюване"
          - id: opinion
            text: "Думка"
          - id: tricky
            text: "Хитре твердження"
        correct_logic: "Хитре! Як перевірити «ніхто»? Треба спитати кожного. А якщо хтось приховає? Умова робить перевірку неможливою."
        feedback_success: "Хитре! Як перевірити «ніхто»? Треба спитати кожного. А якщо хтось приховає?"
        feedback_soft_fail: "Слово «ніхто» — чи можна перевірити? Треба спитати кожного? А якщо приховають?"
    dialogue_after:
      - who: Софа
        line: "Три твердження. Нуль підтверджених фактів. Голос каже впевнено. Але впевненість — це не інструмент перевірки."

  # ── s14: Ліна веде містом + тіні ───────────────────────────
  - scene_id: ep004_s14
    author_text: >
      Вулиця. Пряма, як лінійка. Ліхтарі горять фіолетовим. Тіні на асфальті занадто темні — чорніші, ніж мають бути. І рухаються. Не так, як люди. Трохи повільніше. Трохи пізніше. Марко помічає перше: тінь Ліни стоїть на місці, коли Ліна робить крок. На півсекунди. Потім наздоганяє. Дрібниця. Марко відмахується. Тіні — це ж просто тіні. Ліна йде впевнено. Не дивиться на боки. Знає, куди йти. Повертає ліворуч, потім праворуч, потім знову ліворуч — без вагань.
    dialogue:
      - who: Марко
        line: "Ти точно була тут один раз?"
      - who: Ліна
        line: "Один раз. Але я добре запам'ятовую дорогу."

  # ── s14_sofa ─────────────────────────────────────────────────
  - scene_id: ep004_s14_sofa
    dialogue:
      - who: Софа
        line: "Ліна впевнено веде містом. «Була один раз, але добре запам'ятовую.» Перевір детективом."

  # ── s15: Quiz — запоминаю + +20 + хороший день ─────────────
  - scene_id: ep004_s15
    interactions:
      - question: "«Я добре запам'ятовую дорогу.» Перевірюване твердження?"
        options:
          - id: checkable
            text: "Перевірюване — якщо веде правильно, підтвердиться"
          - id: opinion
            text: "Думка"
        correct_logic: "Перевірюване! Якщо Ліна веде правильно — підтвердиться. Але куди вона веде — ми не знаємо."
        feedback_success: "Перевірюване! Якщо веде правильно — підтвердиться. Але куди вона веде — ми не знаємо."
        feedback_soft_fail: "Чи можна перевірити, чи добре вона запам'ятовує? Якщо веде правильно — підтвердиться."
      - question: "«Завтра буде +20 градусів.» Перевірюване, думка чи хитре твердження?"
        options:
          - id: checkable
            text: "Перевірюване"
          - id: opinion
            text: "Думка"
          - id: tricky
            text: "Хитре твердження"
        correct_logic: "Перевірюване! Термометр — можна перевірити завтра."
        feedback_success: "Перевірюване! Інструмент — термометр. Завтра подивимось і дізнаємось."
        feedback_soft_fail: "Чи можна завтра перевірити температуру? Чи є інструмент?"
      - question: "«Завтра буде хороший день.» Перевірюване, думка чи хитре твердження?"
        options:
          - id: checkable
            text: "Перевірюване"
          - id: opinion
            text: "Думка"
          - id: tricky
            text: "Хитре твердження"
        correct_logic: "Думка! Немає «хорошеміру» для днів."
        feedback_success: "Думка! Немає «хорошеміру» для днів. «Хороший» — для кожного своє."
        feedback_soft_fail: "Чи можна виміряти «хороший»? Немає приладу для суб'єктивних оцінок."

  # ── s16: плакат «Перевіряти — неввічливо» ──────────────────
  - scene_id: ep004_s16
    author_text: >
      Вони проходять повз площу. На площі — екран. Величезний, на всю стіну. На екрані — текст, білі літери на чорному: «ПЕРЕВІРЯТИ — НЕВВІЧЛИВО. ВІРИТИ — МУДРО.» Марко читає. Перечитує.

  # ── s16_sofa ─────────────────────────────────────────────────
  - scene_id: ep004_s16_sofa
    dialogue:
      - who: Софа
        line: "«Перевіряти — неввічливо.» Цікаво. Кому вигідно, щоб ти не перевіряв?"

  # ── s17: Quiz — неввічливо + хитре з дверима ───────────────
  - scene_id: ep004_s17
    interactions:
      - question: "«Перевіряти — неввічливо.» Факт, думка чи неправда?"
        options:
          - id: fact
            text: "Факт"
          - id: opinion
            text: "Думка — немає «ввічливоміру», але подано як правило"
          - id: lie
            text: "Неправда"
        correct_logic: "Думка! Немає «ввічливоміру». Але подано як правило — думка, замаскована під факт."
        feedback_success: "Думка! Немає «ввічливоміру». Подано як правило — думка, замаскована під факт."
        feedback_soft_fail: "Чи є прилад для «неввічливо»? Ні. А подано як універсальне правило. Що це?"
      - question: "«Я знаю, куди ведуть двері, але показувати не можна — вони працюють тільки для тих, хто не перевіряє.» Перевірюване, думка чи хитре твердження?"
        options:
          - id: checkable
            text: "Перевірюване"
          - id: opinion
            text: "Думка"
          - id: tricky
            text: "Хитре твердження"
        correct_logic: "Хитре! «Тільки для тих, хто не перевіряє» — виправдання, закриває шлях до перевірки."
        feedback_success: "Хитре! «Тільки для тих, хто не перевіряє» — виправдання. Закриває перевірку!"
        feedback_soft_fail: "Що робить перевірку неможливою? Знайди виправдання в умові."

  # ── s18: Quiz — щасл. дитина не задає питань ───────────────
  - scene_id: ep004_s18
    author_text: >
      Далі — провулок. Вузький. Стіни гладкі, без вікон. На стіні — плакат. Намальована дитина із заплющеними очима й усмішкою. Підпис: «ЩАСЛИВА ДИТИНА НЕ ЗАДАЄ ПИТАНЬ.» Марко зупиняється. Ліна тягне за рукав: — Не читай це. Ходімо. — Чому? — Тому що це... просто вивіски. Вони нічого не означають. Але Марко вже прочитав. І Софа вже вібрує.
    dialogue:
      - who: Софа
        line: "«Щаслива дитина не задає питань.» Детектив правди: чи є інструмент перевірити?"
    question: "«Щаслива дитина не задає питань.» Перевірюване, думка чи хитре твердження?"
    options:
      - id: checkable
        text: "Перевірюване"
      - id: opinion
        text: "Думка"
      - id: lie
        text: "Неправда — спитай щасливих дітей, вони задають питання"
    correct_logic: "Неправда! Перевірюване: спитай щасливих дітей — чи задають вони питання? Звісно, задають. При перевірці — не підтвердиться."
    feedback_success: "Неправда! Спитай будь-яку щасливу дитину — чи задає вона питання? Ще як задає!"
    feedback_soft_fail: "Чи можна перевірити? Так — спитай щасливих дітей. Чи задають вони питання?"

  # ── s19: drama «не читай» ──────────────────────────────────
  - scene_id: ep004_s19
    author_text: >
      Марко дивиться на Ліну. Вона відводить погляд. Пальці теребить блискавку куртки — той самий жест, що на лавці біля школи.
    dialogue:
      - who: Марко
        line: "Ліно, ти сказала «не читай». Це порада чи виправдання?"
      - who: Ліна
        line: "Порада. Тут багато вивісок. Якщо читати кожну — не дійдемо."

  # ── s19_sofa ─────────────────────────────────────────────────
  - scene_id: ep004_s19_sofa
    dialogue:
      - who: Софа
        line: "Відповідь розумна. Не виправдання — є причина: часу мало. Продовжуй."

  # ── s20: калюжа — відбиття Ліни не збігається ─────────────
  - scene_id: ep004_s20
    author_text: >
      Вони виходять на широку вулицю. Попереду — калюжа. Велика, метрів два. Вода стояча, темна. У ній відбивається фіолетове небо. Марко підходить. Дивиться вниз. Його відбиття тремтить. Брижі на воді — хоч вітру немає. Відбиття Марка — тривожне, плечі підняті, очі бігають. Поруч — відбиття Ліни. Відбиття Ліни — СПОКІЙНЕ. Руки схрещені. Вираз ОЧІКУВАННЯ. Ніби вона тут бувала. Ніби знає, що буде далі. Марко дивиться на Ліну — вона стоїть, руки в кишенях, усміхається. Дивиться в калюжу — відбиття інше. Руки схрещені. Не усміхається. Чекає.
    dialogue:
      - who: Софа
        line: "Невідповідність... Ліна усміхається. Відбиття — ні. Перевірюване?"
    interactions:
      - question: "Марко бачить: Ліна усміхається, а відбиття — ні. Це перевірюваний факт?"
        options:
          - id: true
            text: "Так — інструмент: зір. Але треба повторити"
          - id: false
            text: "Ні — здалося"
        correct_logic: "Так! Марко бачить власними очима — інструмент: зір. Але одного разу мало."
        feedback_success: "Так! Інструмент — зір. Але треба повторити — одного разу мало."
        feedback_soft_fail: "Марко бачить власними очима. Це інструмент? Так. Але скільки разів треба перевірити?"
      - question: "Чи достатньо одного спостереження, щоб зробити висновок?"
        options:
          - id: true
            text: "Так, він же бачив"
          - id: false
            text: "Ні — може бути брижі, кут, здалося"
        correct_logic: "Ні! Одного разу мало — можуть бути брижі, кут, здалося."
        feedback_success: "Одного разу мало! Можуть бути брижі, кут, здалося. Треба повторити."
        feedback_soft_fail: "Згадай: скільки разів Марко перевіряв паркан? Три. Одного разу мало."

  # ── s20_choice ───────────────────────────────────────────────
  - scene_id: ep004_s20_choice
    author_text: >
      Марко завмер над калюжею. Одного спостереження мало — це він уже засвоїв. Можна затриматися й подивитися ще раз — або вдати, що нічого не було, і йти за Ліною далі.
    question: "Перевірити ще раз?"
    options:
      - id: check_again
        text: "Подивитися в калюжу ще раз"
      - id: go_on
        text: "Іти далі"

  # ── s20_detour ───────────────────────────────────────────────
  - scene_id: ep004_s20_detour
    author_text: >
      Марко дивиться знову. Ліна виймає руки з кишень — махає рукою. Відбиття в калюжі — НЕ МАХАЄ. Руки так само схрещені. Удруге. Ліна нахиляється до калюжі — відбиття НЕ НАХИЛЯЄТЬСЯ. Утретє.

  # ── s20_detour_sofa ──────────────────────────────────────────
  - scene_id: ep004_s20_detour_sofa
    dialogue:
      - who: Софа
        line: >
          Три повторення. Три невідповідності. Достатньо для гіпотези: відбиття Ліни... не збігається з Ліною. Даних... недостатньо для пояснення. Але факт зафіксовано.

  # ── s20_detour_after ─────────────────────────────────────────
  - scene_id: ep004_s20_detour_after
    author_text: >
      Марко випрямляється. Калюжа — просто калюжа. Але вона показала те, що очі не ловили: Ліна назовні та Ліна всередині — різні.
    dialogue:
      - who: Марко
        line: "Ліно, ти справді була тут лише один раз?"
      - who: автор
        line: "Ліна дивиться йому в очі. Довго. Потім:"
      - who: Ліна
        line: "Ходімо. Нам треба знайти Софію."
    author_text_after: >
      Не відповіла. Не виправдалася. Просто — змінила тему.

  # ── s21: батч — ПОЧЕМУ? ───────────────────────────────────
  - scene_id: ep004_s21
    interactions:
      - question: "«Від дверей до площі три кроки.» Чому це факт?"
        options:
          - id: lina_said
            text: "Тому що Ліна так сказала"
          - id: count
            text: "Тому що можна порахувати — інструмент: лічба"
        correct_logic: "Можна порахувати! Інструмент — лічба."
        feedback_success: "Можна порахувати! Інструмент — лічба. Встав і порахував кроки."
        feedback_soft_fail: "Чи є спосіб перевірити САМОМУ? Який інструмент?"
      - question: "«Місто добре.» Чому це думка?"
        options:
          - id: no_meter
            text: "Тому що немає «добромиру» — немає інструмента для вимірювання доброти"
          - id: city_said
            text: "Тому що місто так каже"
        correct_logic: "Немає «добромиру»! Немає інструмента для вимірювання доброти."
        feedback_success: "Немає «добромиру»! Доброту не можна виміряти приладом."
        feedback_soft_fail: "Чи є інструмент виміряти доброту? Ні? Тоді що це?"
      - question: "«Голос завжди правий, але тільки якщо йому не задають питань.» Чому це хитре твердження?"
        options:
          - id: excuse
            text: "Тому що умова «якщо не задають питань» — виправдання"
          - id: voice_lies
            text: "Тому що Голос бреше"
        correct_logic: "«Якщо не задають питань» — виправдання! Закриває шлях до перевірки."
        feedback_success: "Виправдання! «Якщо не задають питань» — закриває шлях до перевірки."
        feedback_soft_fail: "Що в цьому твердженні заважає перевірити? Знайди умову-пастку."

  # ── s22: двері зачинились ──────────────────────────────────
  - scene_id: ep004_s22
    author_text: >
      Двері за спиною — Марко обертається. Паркана немає. Замість нього — стіна. Гладка. Без тріщини. Зворотного шляху немає. Марко смикається. Робить крок назад — стіна. Ще крок — стіна. Долоня на камені — твердий, холодний, справжній.
    dialogue:
      - who: Марко
        line: "Ліно! Двері зачинилися!"
      - who: Ліна
        line: "Я знаю. Вони завжди зачиняються."
    author_text_after: >
      «Завжди.» Одне слово. Ліна знає, що двері ЗАВЖДИ зачиняються. Це слово людини, яка була тут один раз?

  # ── s23: батч — 8 пар «ПОЧЕМУ» ────────────────────────────
  - scene_id: ep004_s23
    dialogue:
      - who: Софа
        line: "«Вони завжди зачиняються.» Зворотна практика. Не «що це?» — а «ЧОМУ?»"
    interactions:
      - question: "«Від дверей до площі 5 кілометрів.» Чому це факт?"
        options:
          - id: ruler
            text: "Тому що можна виміряти — лінійка / мапа"
          - id: sounds_right
            text: "Тому що звучить правильно"
        correct_logic: "Можна виміряти! Інструмент — лінійка, мапа."
        feedback_success: "Інструмент — лінійка, мапа. Виміряв — отримав число."
        feedback_soft_fail: "Чи є інструмент для відстані? Який?"
      - question: "«До центру Міста далеко.» Чому це думка?"
        options:
          - id: feeling
            text: "Тому що «далеко» — відчуття: для когось далеко, для когось близько"
          - id: no_map
            text: "Тому що немає мапи"
        correct_logic: "«Далеко» — відчуття! Для когось далеко, для когось близько."
        feedback_success: "«Далеко» — для кожного своє. Спортсмену — дрібниця. Малюку — подорож."
        feedback_soft_fail: "Чи можна виміряти «далеко»? Це число чи відчуття?"
      - question: "«Дзеркало важить 800 грамів.» Чому це факт?"
        options:
          - id: scales
            text: "Тому що можна зважити — інструмент: ваги"
          - id: exact
            text: "Тому що 800 — точне число"
        correct_logic: "Ваги! Поклав — побачив число."
        feedback_success: "Інструмент — ваги. Зважив — отримав число."
        feedback_soft_fail: "Точне число — саме по собі не робить фактом. Яким інструментом перевірити?"
      - question: "«Дзеркало гарне.» Чому це думка?"
        options:
          - id: no_meter
            text: "Тому що немає «гарноміру» — для когось гарне, для когось ні"
          - id: everyone_thinks
            text: "Тому що всі так думають"
        correct_logic: "Немає «гарноміру»! Для когось гарне, для когось ні."
        feedback_success: "Немає «гарноміру»! Краса — суб'єктивна оцінка."
        feedback_soft_fail: "Чи є прилад для «гарний»? Ні? Тоді що це?"
      - question: "«У Місті зараз +15.» Чому це факт?"
        options:
          - id: thermometer
            text: "Термометр"
          - id: feels_like
            text: "Тому що відчувається"
        correct_logic: "Термометр! Інструмент дає число."
        feedback_success: "Термометр! Вийшов, подивився градуси — перевірив."
        feedback_soft_fail: "Відчуття чи число? Який інструмент дає число?"
      - question: "«У Місті затишно.» Чому це думка?"
        options:
          - id: feeling
            text: "«Затишно» — відчуття, для когось затишно, для когось ні"
          - id: looks_nice
            text: "Тому що місто гарне"
        correct_logic: "«Затишно» — відчуття! Для когось затишно, для когось ні."
        feedback_success: "«Затишно» — для кожного своє. Відчуття, не число."
        feedback_soft_fail: "Чи є «затишномір»? Ні. Це відчуття."
      - question: "«Ліна дійшла до площі за 40 секунд.» Чому це факт?"
        options:
          - id: stopwatch
            text: "Секундомір"
          - id: fast
            text: "Тому що швидко"
        correct_logic: "Секундомір! Засік час — отримав число."
        feedback_success: "Секундомір! Засік — отримав число. Число не обмане."
        feedback_soft_fail: "Яким інструментом перевірити час?"
      - question: "«Я знаю все Місто, але тільки коли йду сам.» Чому це хитре твердження?"
        options:
          - id: excuse
            text: "«Коли йду сам» — виправдання, закриває перевірку"
          - id: impossible
            text: "Тому що неможливо знати все місто"
        correct_logic: "«Коли йду сам» — виправдання! На кожну спробу перевірити — причина."
        feedback_success: "«Коли йду сам» — виправдання! Закриває шлях до перевірки."
        feedback_soft_fail: "Що заважає перевірити? Знайди умову, яка закриває шлях."
    dialogue_after:
      - who: Софа
        line: "Ліна сказала «завжди». Це слово того, хто проходив через двері один раз? Чи багато разів? Даних... недостатньо. Але питання... записане."

  # ── s24: гучномовці знову ──────────────────────────────────
  - scene_id: ep004_s24
    author_text: >
      Гучномовці знову: «Ви в безпеці. Місто піклується про вас. Не треба перевіряти — треба довіряти.» Марко стоїть посеред чужої вулиці. Фіолетове небо давить згори. Стіна за спиною — без щілини. Ліна поруч — але Ліна не та, ким здається. Три питання детектива. Марко повторює про себе. Чи є інструмент? Чи немає виправдань? Що показала перевірка?

  # ── s25: «Софо, а тобі можна вірити?» ──────────────────────
  - scene_id: ep004_s25
    dialogue:
      - who: Марко
        line: "Софо, а тобі можна вірити?"
      - who: Софа
        line: "...хороше питання. Перевір."

  # ── s26: Правило четверте + дідусь з інопланетянином ───────
  - scene_id: ep004_s26
    dialogue:
      - who: Софа
        line: >
