      хтось пролив воду або вимив підлогу.» Причина і наслідок.

      НАДІЙНЕ ДЖЕРЕЛО — експерт, перевірена інформація. «Лікар каже —
      потрібне щеплення.» Лікар — експерт у своїй темі.

      «Просто тому що» — НЕ обґрунтування. «Усі так кажуть» — НЕ
      обґрунтування. «Мені здається» — думка, не обґрунтування.

      «Тато каже» — який тип? Джерело. Але чи надійне? Тато — експерт
      у будівництві міст? У стиранні пам'яті? У дитячій психології?
    mood: "три інструменти-рентгени для будь-якої розмови"

