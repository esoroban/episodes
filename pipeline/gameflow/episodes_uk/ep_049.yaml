episode_id: 49
episode_title: "Повернення"
lang: uk
terms_introduced:
  - "суперечка vs сварка"
  - "Я-висловлювання"
terms_used:
  - "поспішне узагальнення"
  - "страшний ланцюжок"
  - "напад на людину"
  - "маніпуляція"
  - "чесне прохання"

scenes:

  # ── s01 ─────────────────────────────────────────────────────
  - scene_id: ep049_s01
    author_text: >
      Третій день після Дзеркального Міста.

      Шкільне подвір'я. Марко і Софія йдуть поруч. Не поспішають,
      але й не зволікають. Уранці в мами здригнувся голос, коли
      вона сказала «ідіть». Тато не вийшов проводжати — побоявся
      розплакатися в коридорі.

      Над школою — звичайне сіре небо. Дзвоник ще не пролунав.

      Мав би бути тихий ранок. Але в животі у Марка — знайоме
      відчуття. Те, яке раніше завжди виявлялося правим.
    mood: "тривожне впізнавання — зовні звично, всередині знайомий холодок"

  # ── s02 ─────────────────────────────────────────────────────
  - scene_id: ep049_s02
    author_text: >
      Зупинка. Під'їжджає автобус. На борту — величезна реклама.
      Школа на тлі щасливих дітей.

      «УСІ розумні батьки обирають нашу школу!»

      Софія мружиться — читає вголос. Зупиняється на «УСІ».
    dialogue:
      - who: София
        line: "«УСІ розумні батьки»? Прямо всі-всі?"
      - who: Марко
        line: "Пам'ятаєш, я тобі про поспішне узагальнення розповідав?"
      - who: София
        line: "Це коли один приклад приклеюють до всіх підряд?"
      - who: Марко
        line: "Так. Слово «УСІ» без доказів. Щоб кожен батько подумав: «А я що, не розумний?»"
      - who: София
        line: "Пастка."
      - who: Марко
        line: "Ага. Перша за ранок."
    author_text_after: >
      Автобус від'їжджає. Реклама їде з ним. Софія всміхається —
      уперше спіймала пастку разом із братом.
    mood: "перша пастка — спіймана вдвох, без напруги"

  # ── s03 ─────────────────────────────────────────────────────
  - scene_id: ep049_s03
    author_text: >
      Школа. Хол. Над роздягальнею — екран. Новини. Диктор
      серйозний, фон тривожний:

      «Якщо не приймемо цей закон — економіка впаде, люди
      втратять роботу, діти не отримають освіту!»

      Софія зупиняється. Слухає. Рахує на пальцях.
    dialogue:
      - who: София
        line: "Зачекай. Один, два, три... п'ять кроків від «не приймемо» до «діти без освіти»."
      - who: Марко
        line: "І кожен крок тримається на чесному слові."
      - who: София
        line: "Це той, страшний — як його? Ланцюжок?"
      - who: Марко
        line: "Страшний ланцюжок. Довга драбина з «якщо — то». Кожна сходинка — слабша."
      - who: София
        line: "А навіщо так роблять?"
      - who: Марко
        line: "Щоб стало страшно. Тоді не думаєш — погоджуєшся."
      - who: София
        line: "Друга пастка."
    mood: "друга пастка — Софія знаходить сама, рахує на пальцях"

  # ── s04 ─────────────────────────────────────────────────────
  - scene_id: ep049_s04
    author_text: >
      Коридор біля спортзалу. Учитель фізкультури — біля дверей.
      На весь коридор:

      «Хто не склав норматив — той ледачий!»

      Кілька школярів проходять повз, опустивши голови. Марко
      і Софія теж ідуть. Не швидко. Софія скоса дивиться на
      Марка.
    dialogue:
      - who: София
        line: "А «ледачий» — це що?"
      - who: Марко
        line: "Ярлик. Удар по людині, а не розбір."
      - who: София
        line: "А може, хтось хворів. Або боїться стрибати. Або просто не виспався."
      - who: Марко
        line: "Саме так. Учитель не запитав «чому». Він одразу наліпив."
      - who: София
        line: "Це напад на людину?"
      - who: Марко
        line: "Він. Третя пастка за ранок."
      - who: София
        line: "У нас тут цілий сезон пасток."
      - who: Марко
        line: "Тому ми будемо мисливцями. Не вчителями. Мисливцями."
    author_text_after: >
      Дзвоник на велику перерву. Діти висипають у коридори.

      Софія побачила однокласниць біля дверей класу — її обступили,
      ніби давно не бачились. Що так, то так.

      Софія — Маркові: «Я їх дожену. Чекай біля вікна.» Іде до
      подруг. Марко — далі коридором. До вікна в кінці.

      Там, біля вікна, хтось стоїть.
    mood: "третя пастка — і попереду біля вікна силует, не шкільний"

  # ── s07 ─────────────────────────────────────────────────────
  - scene_id: ep049_s07
    author_text: >
      Біля вікна, у кінці коридора — Рей. З текою під пахвою,
      аркуш із печаткою в руці. Зайшов у справах.

      Бачить Марка. Упізнає. На обличчі — короткий рух, наче
      хтось натиснув стару кнопку. Крок від вікна, на півдорозі —
      перегороджує Маркові шлях корпусом. Не агресивно. Але твердо.
    dialogue:
      - who: Рей
        line: "Зачекай."
      - who: Рей
        line: "Я бачив уранці біля автобуса. Ти вчив дівчинку. З таким обличчям, ніби ти тепер усе зрозумів."
      - who: Рей
        line: "Усі, хто починає вчити інших, рано чи пізно стають як я. Це завжди так. Я знаю."
      - who: Рей
        line: "У тебе два шляхи, хлопчику. Або ти зараз зупинишся — або через кілька років опинишся на сцені з мікрофоном. Третього немає."
      - who: Марко
        line: "Стоп."
      - who: Марко
        line: "«Усі, хто вчить, стають як ти» — це поспішне узагальнення. Один приклад — ти. Один приклад це не «усі»."
      - who: Марко
        line: "«Або зупинишся, або станеш як я» — хибна дилема. Можна вчити і не ставати тобою. Це дві різні справи."
      - who: Марко
        line: "А «я знаю» — це не аргумент. Це просто «я знаю»."
      - who: Рей
        line: "..."
      - who: Марко
        line: "Іди у своїх справах."
    author_text_after: >
      Рей дивиться. Довго. Потім — киває. Один раз. Не заперечує.
      Підбирає аркуш із печаткою, що впав із теки. Повертається.
      Іде до сходів.

      Тека під пахвою. Аркуш у руці. Куртка — забута на
      підвіконні. Через крок він цього ще не помітить.

      Марко стоїть ще секунду. Серце стукає, як після
      пробіжки. Але руки — спокійні.

      Сьогодні — третій раз, коли він упізнав прийом. І перший, коли
      він застосував його в живій бійці. З дорослим.
    mood: "дуель на прийомах — Марко ріже демагогію по іменах"

  # ── s09 ─────────────────────────────────────────────────────
  - scene_id: ep049_s09
    author_text: >
      На лаві біля вікна — мама. Не дивиться в очі. Руки складені
      на колінах. Чекає.

      Марко сідає поруч.

      Мама не каже «пробач». Каже інше.
    dialogue:
      - who: мама
        line: "Я боялася. Не за себе. За Софію."
      - who: мама
        line: "Голос мені тоді сказав: будеш пам'ятати — забере її назавжди. Я обрала забути. Щоб її хоч якось зберегти."
      - who: мама
        line: "Я не могла тобі сказати. Я думала: якщо ти дізнаєшся — підеш шукати. І тоді забере обох."
      - who: Марко
        line: "Я знаю."
    author_text_after: >
      Жодного ухиляння. Жодного узагальнення. Жодного «всі так роблять».
      Просто — вибір матері, який нікому не показати.

      Марко обіймає маму. Не тому що пробачив — тому що
      зрозумів.
    mood: "уперше мама каже правду без ухилянь"

  # ── s10 ─────────────────────────────────────────────────────
  - scene_id: ep049_s10
    author_text: >
      Вечір. Дім. Кухня. На столі — чай, тарілка з печивом і
      Софа. Її екран — темний. Тихо.

      Софія сидить навпроти Марка. Мама — поруч із нею. Сімейна
      рада. Перша — відколи Софія повернулася.
    dialogue:
      - who: София
        line: "Треба розповісти. Однокласникам. Учителям. Усім, хто мене знав."
      - who: Марко
        line: "Зачекай. Не так просто. Вони не повірять."
      - who: София
        line: "Це моя історія. Я маю право."
      - who: Марко
        line: "Софіє. Ніхто не пам'ятає Голосу. Це — як сказати «сонце зелене»."
    mood: "нормальна суперечка — дві думки, ще про тему"

  # ── s11 ─────────────────────────────────────────────────────
  - scene_id: ep049_s11
    dialogue:
      - who: София
        line: "ТИ завжди вирішуєш за нас! Ти вирішив за маму! Ти вирішив, що мене треба повернути! Тепер вирішуєш, кому про мене знати?!"
      - who: Марко
        line: "..."
      - who: мама
        line: "Ви почали з питання, а закінчили — чим?"
    author_text_after: >
      Слова Софії — як ляпас. Марко відкриває рот і чує
      у своїй голові готову відповідь: «А ТИ сиділа в склі!
      Тобі б помовчати!»

      Зупиняється. Це — напад. Він упізнає форму. Софія
      перейшла з теми на людину. І Марко мало не відповів тим
      самим.

      Тиша за столом. Чай вистиг.

      Софа на краю столу — блимає. Один раз. Екран загоряється.
      Блакитне сяйво на чашці чаю. Марко бере телефон.
    mood: "суперечка перейшла в сварку — Марко впізнає форму"

  # ── s12 ─────────────────────────────────────────────────────
  - scene_id: ep049_s12
    dialogue:
      - who: Софа
        line: "Марко. Софіє."
      - who: Софа
        line: "Ви щойно показали різницю."
      - who: Софа
        line: "Суперечка — про слова. Сварка — про людину."
      - who: Софа
        line: "Хочеш розібрати?"
      - who: Марко
        line: "Так."
      - who: Софа
        line: "Тоді дивимось."
    mood: "Софа підхоплює живий приклад"

  # ── s13 ─────────────────────────────────────────────────────
  - scene_id: ep049_s13
    author_text: >
      СУПЕРЕЧКА — обговорення теми. Двоє не згодні, але
      говорять про справу. «Ця ідея спрацює» — «Ця ідея не
      спрацює». Про справу. Про слова. Про думку.

      СВАРКА — напад на людину. З теми перейшли на співрозмовника.
      «ТИ дурний», «ТИ завжди», «Через ТЕБЕ». Уже не про справу — про
      людину.

      Простий тест: подивися, про що говорять. Про ТЕМУ чи про ТЕБЕ?

      «Твоя ідея не спрацює» — це суперечка. Можна відповісти
      аргументом.

      «ТИ нічого не розумієш» — це сварка. Аргументу немає, є
      удар.

      Головна ознака: якщо в розмові з'явилося «ТИ завжди»,
      «ТИ ніколи» або «Через ТЕБЕ» — суперечка вже померла. Далі йде
      сварка.
    mood: "тиха теорія — два режими розмови"

  # ── s14 ─────────────────────────────────────────────────────
  - scene_id: ep049_s14
    question: "«Мені здається, цей фільм нудний.» — «Ні, він цікавий, там класні спецефекти!» Суперечка чи сварка?"
    options:
      - id: argument
        text: "Суперечка"
      - id: fight
        text: "Сварка"
    correct_logic: "Обидва говорять про фільм. Ніхто не нападає на людину. Це нормальна суперечка: дві думки, аргументи по темі."
    feedback_success: "Обидва говорять про фільм. Ніхто не нападає на людину. Це суперечка."
    feedback_soft_fail: "Послухай ще раз: «фільм нудний» — «фільм цікавий». Про що говорять? Про фільм. Не «ТИ нудний» — а «фільм нудний». Це суперечка."
    mood: "розминка — чиста суперечка"

  # ── s15 ─────────────────────────────────────────────────────
  - scene_id: ep049_s15
    question: "«Мені здається, цей фільм нудний.» — «Ти нічого не розумієш у кіно!» Суперечка чи сварка?"
    options:
      - id: fight
        text: "Сварка"
      - id: argument
        text: "Суперечка"
    correct_logic: "Перейшли з фільму на людину. «Ти нічого не розумієш» — напад, а не аргумент. Це сварка."
    feedback_success: "«Ти нічого не розумієш» — напад на людину. Це сварка."
    feedback_soft_fail: "Перший говорить про ФІЛЬМ. Другий — про ТЕБЕ. Тема пішла, залишився удар. Це сварка."
    mood: "та сама тема — але стрибок на особистість"

  # ── s16 ─────────────────────────────────────────────────────
  - scene_id: ep049_s16
    question: "Софія сказала: «ТИ завжди вирішуєш за нас!» Це суперечка чи сварка?"
    options:
      - id: fight
        text: "Сварка"
      - id: argument
        text: "Суперечка"
    correct_logic: "Софія перейшла з теми «розповідати чи ні» на особистість Марка. «ТИ завжди» — звинувачення. Суперечка померла."
    feedback_success: "«ТИ завжди» — звинувачення на адресу Марка. Тема пішла. Це сварка."
    feedback_soft_fail: "Тема була: розповісти однокласникам чи зачекати. Софія сказала не «треба розповісти», а «ТИ завжди вирішуєш за нас». Удар по людині. Сварка."
    mood: "впізнавання власного випадку"

  # ── s17 ─────────────────────────────────────────────────────
  - scene_id: ep049_s17
    author_text: >
      Коли хочеться крикнути «ТИ завжди!» або «Через ТЕБЕ!» — є
      інший спосіб.

      Я-ВИСЛОВЛЮВАННЯ. Формула проста:

      «Мені [почуття], коли [ситуація].»

      Не «ТИ завжди вирішуєш за всіх!» — а «Мені прикро, коли
      рішення приймають без мене».

      Різниця. Звинувачення спрямоване на ІНШОГО. Я-висловлювання —
      на СЕБЕ. Ти говориш про свої почуття, а не нападаєш.

      Звинувачення починається зі слів «ТИ завжди», «ТИ ніколи»,
      «Через ТЕБЕ» — усе спрямоване на іншого.

      Я-висловлювання починається зі слів «МЕНІ сумно, коли...»,
      «Я відчуваю злість, коли...» — говориш про себе.

      Той самий конфлікт. Ті самі почуття. Але в одному випадку —
      напад, в іншому — розмова.
    mood: "друга теорія — інструмент"

  # ── s18 ─────────────────────────────────────────────────────
  - scene_id: ep049_s18
    question: "«ТИ вічно береш мої речі без дозволу!» Звинувачення чи Я-висловлювання?"
    options:
      - id: blame
        text: "Звинувачення"
      - id: i_statement
        text: "Я-висловлювання"
    correct_logic: "«ТИ вічно» — спрямоване на іншого. Немає «мені» — є «ти». Це звинувачення."
    feedback_success: "«ТИ вічно» — спрямоване на іншого. Звинувачення."
    feedback_soft_fail: "З якого слова починається? «ТИ». А Я-висловлювання починається з «Мені» або «Я». Це звинувачення."
    mood: "розминка — звинувачення"

  # ── s19 ─────────────────────────────────────────────────────
  - scene_id: ep049_s19
    question: "«Мені неприємно, коли мої речі беруть без дозволу.» Звинувачення чи Я-висловлювання?"
    options:
      - id: i_statement
        text: "Я-висловлювання"
      - id: blame
        text: "Звинувачення"
    correct_logic: "«Мені неприємно» — про свої почуття. Немає нападу на іншого. Це Я-висловлювання."
    feedback_success: "«Мені неприємно» — про свої почуття. Я-висловлювання."
    feedback_soft_fail: "Та сама ситуація про речі. Але перше слово — «мені», а не «ТИ». Це Я-висловлювання."
    mood: "та сама ситуація — інша форма"

  # ── s20 ─────────────────────────────────────────────────────
  - scene_id: ep049_s20
    question: "«Через ТЕБЕ ми спізнилися!» Звинувачення чи Я-висловлювання?"
    options:
      - id: blame
        text: "Звинувачення"
      - id: i_statement
        text: "Я-висловлювання"
    correct_logic: "«Через ТЕБЕ» — стрілка в іншого. Немає своїх почуттів — є вказівка на винного. Це звинувачення."
    feedback_success: "«Через ТЕБЕ» — вказує винного. Звинувачення."
    feedback_soft_fail: "Я-висловлювання сказало б: «Я засмучений, що ми спізнилися». А «Через ТЕБЕ» — це стрілка в іншого. Звинувачення."
    mood: "третій приклад — звинувачення"

  # ── s21 ─────────────────────────────────────────────────────
  - scene_id: ep049_s21
    dialogue:
      - who: Софа
