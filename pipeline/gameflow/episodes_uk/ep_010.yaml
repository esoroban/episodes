    author_text: "Сіра нитка — побачена. Запам'ятана. Не озвучена. Марко ховає телефон у кишеню. Повільно. Спокійно.\nВін знає, що робитиме. Спостерігати. Збирати інформацію. Не кричати. Не звинувачувати. Не тікати.\nРозвідник.\nЛіна йде перша. Підіймається сходами, не озираючись.\nМарко піднімається сходами. На останній сходинці зупиняється. Стіна підвалу. Число: 41. Не змінилося.\nАле щось змінилося. Усередині.\nСіра нитка на зап'ясті Ліни. Усмішка Віри, від якої холоне. Число 41, яке не змінюється — але має.\nТри зачіпки. Нуль відповідей. Як у справжнього розвідника.\nГучномовець на розі шепоче: «Запитання — ознака слабкості.»\nМарко усміхається. Уперше за три дні — по-справжньому.\n"
