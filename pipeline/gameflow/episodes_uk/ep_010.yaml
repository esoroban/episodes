    author_text: "Вчорашня суперечка піднімається в голові — слово в слово. Марко чує власний голос: «Артефакти небезпечні — і крапка!»\nВін сам чує це як солдата. Фортеця, щит, крапка, кінець розмови. Міг би сказати інакше? Марко подумки пробує: «Артефакти стирають пам'ять — давай подумаємо, як користуватися ними безпечно.»\nТа сама правда. Але з прочиненими воротами. Розвідник. І він би дізнався більше — про самого себе, про Ліну, про артефакти.\nПравило оформлюється саме. Десяте за рахунком — якщо рахувати від першого запитання детектива. Солдат захищає фортецю — може бути правий випадково. Розвідник досліджує світ — правий усвідомлено. Два запитання перед будь-якою суперечкою: «Я хочу перемогти, зрозуміти чи образити?» і «Я зараз солдат чи розвідник?»\n"
