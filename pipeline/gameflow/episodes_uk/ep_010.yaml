    dialogue_after:
      - who: Софа
        line: 'Помітив, як розвідник відрізняється? Він не кричить — запитує. Не нападає — досліджує. Усміхається, навіть коли чує те, з чим не згоден. І в підсумку — він ЗАВЖДИ знає більше, ніж солдат.» Ліна: «Давай потиснемо руки. По-справжньому. Мир.» Вона простягає руку.'
  - scene_id: ep010_s27
    author_text: >
      Марко бере її долоню. Рукостискання — коротке, міцне.

      І в цей момент рукав Ліни задирається. На два сантиметри. Не більше.

      На зап'ясті — нитка. Сіра. Тонка. Намотана двічі. Не браслет. Не випадкова нитка з одягу. Намотана акуратно, рівно, як по лінійці.

      Марко бачить. Одна секунда — і рукав опускається назад.

      Ліна відпускає руку. Усміхається. Звичайна усмішка. Звичайна Ліна.

      Сіра нитка. Марко бачив такі. У Дзеркальному Місті, на зап'ястях тих, хто працює на Систему. Маркер. Мітка. «Вони слухають» — сказала Ліна при першій зустрічі. Хто — вони? І чому на її руці — їхня нитка?
    question: "Сіра нитка на зап'ясті Ліни. Що робити?"
    options:
      - id: ask
        text: "Запитати прямо"
      - id: silent
        text: "Промовчати — зібрати дані"
    mood: "відкриття — маркер агента на руці друга"

