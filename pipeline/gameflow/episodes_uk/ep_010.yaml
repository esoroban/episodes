episode_id: 10
episode_title: "Розвідник"
lang: uk
terms_introduced: ["солдат", "розвідник"]
terms_used: ["три цілі суперечки", "факт", "думка"]

scenes:

  # ── s01 ─────────────────────────────────────────────────────
  - scene_id: ep010_s01
    author_text: >
      Ранок. Марко сидить на сходах біля входу в підвал Леона. Рюкзак на колінах. Пальці стискають лямку.

      Учорашня сварка з Ліною — як скалка, що застрягла під ребрами. Він пам'ятає кожне слово. «Без артефактів ми нічого не знайдемо!» — кричала вона. «Артефакти стирають пам'ять про Софію!» — кричав він. Обоє хотіли перемогти. Обоє програли.

      Марко знає: він мав рацію. Артефакти небезпечні. Але й Ліна мала рацію — без артефактів вони сліпі. Знає — і нічого не може з цим вдіяти. Бо вчора він не думав. Він кричав.
    mood: "скалка вчорашньої сварки"

  # ── s02 ─────────────────────────────────────────────────────
  - scene_id: ep010_s02
    author_text: >
      Софа вібрує. Тихо, наче не хоче заважати.
    dialogue:
      - who: Софа
        line: "Марко... вчора ви з Ліною сперечалися. Пам'ятаєш, яка була мета?"
      - who: Марко
        line: "Перемогти."
      - who: Софа
        line: "Обоє хотіли перемогти. Обоє кричали. І що вийшло?"
      - who: Марко
        line: "Нічого. Ми просто... посварилися."
      - who: Софа
        line: >
          Саме так. Коли обоє хочуть перемогти — ніхто не чує. Але... є спосіб сперечатися по-іншому. Два типи людей у суперечці. Два.
    mood: "тиха підготовка до уроку"

  # ── s03 ─────────────────────────────────────────────────────
  - scene_id: ep010_s03
    author_text: >
      Марко заплющує очі. Перед внутрішнім екраном — дві фігури.

      Одна — СОЛДАТ. Стоїть за кам'яною стіною, в руках щит, на щиті — напис «Моя думка». Ворота закриті. До солдата підходить хтось і каже: «А може, ти помиляєшся?» — і стріла б'є в щит. Солдат кричить: «Не пущу!» Для солдата визнати помилку — це здати фортецю. Тому він може навіть мати рацію — але йому важлива не істина, а перемога.

      Друга фігура — РОЗВІДНИК. Він не сидить у фортеці. Він іде по полю, з біноклем на шиї й блокнотом у руці. І — дивна річ — усміхається. Коли йому кажуть «ти помиляєшся», він не відступає, не хапається за щит. Він записує. Для нього чужа думка — не стріла, а карта. Нова територія.

      І Марко бачить їхню суперечку живцем. Два друга — що корисніше, шоколад чи яблука? Солдат у кадрі: «Яблука корисніші, це очевидно! Всі знають!» Він, мабуть, правий. Але не пояснює, не слухає. Розвідник у тому ж кадрі: «Хм, давай розберемося. У яблуках — вітамін С, клітковина. У шоколаді — какао, магній, але й цукру багато. Виходить, яблука справді корисніші — і в шоколаді теж дещо є.» Той самий висновок. Але солдат дійшов до нього випадково, а розвідник — свідомо. І дізнався по дорозі вдесятеро більше.

      Марко розплющує очі. І відчуває, як повільно стискаються долоні — кулаки. Вчора він з Ліною був солдатом. Два щити, дві стіни. Нуль інформації.
    mood: "урок приходить через картинку"

  # ── s03_sofa ─────────────────────────────────────────────────
  - scene_id: ep010_s03_sofa
    dialogue:
      - who: Софа
        line: "Два характери. Солдат і розвідник."
      - who: Софа
        line: "Солдат правий випадково. Розвідник — свідомо."
      - who: Софа
        line: "Тепер — голосуємо. Солдат чи розвідник?"
    mood: "терміни закріплені"

  # ── s05 ─────────────────────────────────────────────────────
  - scene_id: ep010_s05
    question: "Діти сперечаються, хто винайшов літак. Один: «Брати Райт! Всі це знають! І крапка!» Солдат чи розвідник?"
    options:
      - id: soldier
        text: "Солдат"
      - id: scout
        text: "Розвідник"
    correct_logic: "«Всі знають» — його улюблений щит. А що саме знають — не уточнює."
    feedback_success: '"Всі знають" — його улюблений щит. А що саме знають — не уточнює. Солдат.'
    feedback_soft_fail: "Він пояснив або просто заявив?"
    mood: "перше запитання — тиск без доказів"

  # ── s06 ─────────────────────────────────────────────────────
  - scene_id: ep010_s06
    question: "Інший: «А давай загуглимо? Може, ми обоє щось не так пам'ятаємо.» Солдат чи розвідник?"
    options:
      - id: soldier
        text: "Солдат"
      - id: scout
        text: "Розвідник"
    correct_logic: "Пропонує перевірити й допускає, що сам може помилятися. Розвідник."
    feedback_success: "Пропонує перевірити й допускає, що сам може помилятися. Розвідник!"
    feedback_soft_fail: "Він прийняв на віру або запропонував перевірити?"
    mood: "перевірка замість віри"

  # ── s07 ─────────────────────────────────────────────────────
  - scene_id: ep010_s07
    question: "Подруги сперечаються, чи можна їсти сніг. Одна: «Можна! Я їм — і нічого! Ясніше ясного, не сперечайся!» Солдат чи розвідник?"
    options:
      - id: soldier
        text: "Солдат"
      - id: scout
        text: "Розвідник"
    correct_logic: "«Я їм — значить, можна» — і фортеця закрита. Солдат."
    feedback_success: '"Я їм — значить, можна" — і фортеця закрита. Солдат.'
    feedback_soft_fail: "Вона пояснила, чому можна? Або просто заявила?"
    mood: "фортеця закрита"

  # ── s08 ─────────────────────────────────────────────────────
  - scene_id: ep010_s08
    question: "Друга: «А може, у ньому щось шкідливе, чого не видно? Давай запитаємо у лікаря.» Солдат чи розвідник?"
    options:
      - id: soldier
        text: "Солдат"
      - id: scout
        text: "Розвідник"
    correct_logic: "Думає про те, чого не видно, пропонує запитати експерта. Розвідник."
    feedback_success: "Думає про те, чого не видно, пропонує запитати експерта. Розвідник!"
    feedback_soft_fail: "Вона закрила тему або запропонувала дізнатися більше?"
    mood: "розвідник шукає те, чого не видно"

  # ── s09 ─────────────────────────────────────────────────────
  - scene_id: ep010_s09
    question: "Сперечаються, скільки планет. Один: «Дев'ять! У мене в книжці написано! Це очевидно!» Солдат чи розвідник?"
    options:
      - id: soldier
        text: "Солдат"
      - id: scout
        text: "Розвідник"
    correct_logic: "Книжка — його фортечна стіна, а книжки застарівають. Солдат."
    feedback_success: "Книжка — його фортечна стіна. А книжки застарівають. Солдат."
    feedback_soft_fail: "Книжка завжди права? Або інформація оновлюється?"
    mood: "застаріла інформація як щит"

  # ── s10 ─────────────────────────────────────────────────────
  - scene_id: ep010_s10
    question: "Інший: «Зачекай, я чув, що Плутон тепер не вважається планетою. Давай розберемося, чому.» Солдат чи розвідник?"
    options:
      - id: soldier
        text: "Солдат"
      - id: scout
        text: "Розвідник"
    correct_logic: "Готовий дізнатися нове, навіть якщо це змінить те, що він думав раніше. Розвідник."
    feedback_success: "Готовий дізнатися нове, навіть якщо це змінить те, що він думав раніше. Розвідник!"
    feedback_soft_fail: "Він боїться нового або радіє йому?"
    mood: "готовність до нового"

  # ── s11 ─────────────────────────────────────────────────────
  - scene_id: ep010_s11
    question: "Сперечаються, що важче — кілограм заліза чи кілограм вати. Один: «Залізо, звичайно! Це ж очевидно! Навіть обговорювати смішно!» Солдат чи розвідник?"
    options:
      - id: soldier
        text: "Солдат"
      - id: scout
        text: "Розвідник"
    correct_logic: "«Очевидно» + «навіть обговорювати смішно» — подвійний щит. Солдат."
    feedback_success: '"Очевидно" + "навіть обговорювати смішно" — подвійний щит. Солдат.'
    feedback_soft_fail: "Він готовий подумати або закрив тему?"
    mood: "подвійний щит"

  # ── s12 ─────────────────────────────────────────────────────
  - scene_id: ep010_s12
    question: "Інший: «Хм, наче обидва кілограм... Але залізо здається важчим. Чому? Давай подумаємо!» Солдат чи розвідник?"
    options:
      - id: soldier
        text: "Солдат"
      - id: scout
        text: "Розвідник"
    correct_logic: "Помітив суперечність, хоче розібратися. До речі — обидва важать однаково, кілограм! Але залізо займає менше місця, тому здається важчим. Розвідник."
    feedback_success: "Помітив суперечність, хоче розібратися. До речі — обидва важать однаково! Але залізо займає менше місця. Розвідник!"
    feedback_soft_fail: "Він повірив відчуттю або запропонував подумати?"
    mood: "інтуїція обманює — розвідник розбирається"

  # ── s13 ─────────────────────────────────────────────────────
  - scene_id: ep010_s13
    question: "Друг каже: «Ти не правий.» Ти відповідаєш: «Може бути. А чому ти так думаєш?» Солдат чи розвідник?"
    options:
      - id: soldier
        text: "Солдат"
      - id: scout
        text: "Розвідник"
    correct_logic: "«Може бути» — магічні слова, солдат так ніколи не скаже. Розвідник."
    feedback_success: '"Може бути" — магічні слова, солдат так ніколи не скаже. Розвідник!'
    feedback_soft_fail: "Він захищається або допускає свою помилку?"
    mood: "«може бути» — слова розвідника"

  # ── s14 ─────────────────────────────────────────────────────
  - scene_id: ep010_s14
    question: "Тобі показали, що в задачі помилка. Ти: «Ні! У мене все правильно! Це у відповідях помилка!» Солдат чи розвідник?"
    options:
      - id: soldier
        text: "Солдат"
      - id: scout
        text: "Розвідник"
    correct_logic: "Винні всі — відповіді, підручник, всесвіт. Тільки не він. Солдат."
    feedback_success: "Винні всі — відповіді, підручник, всесвіт. Тільки не він. Солдат."
    feedback_soft_fail: "Він готовий перерахувати? Або вирішив, що помилки неможливі?"
    mood: "правило + поява Ліни"
    followup_interaction:
      question: "Як розпочати розмову з Ліною?"
      options:
        - id: apologize
          text: "Почати з вибачення"
        - id: ask
          text: "Почати з питання"

  # ── s14a1 ────────────────────────────────────────────────────
  - scene_id: ep010_s14a1
    dialogue:
      - who: Марко
        line: >
          Ліно, я вчора... кричав. Я хотів перемогти. Не зрозуміти. Вибач.
      - who: Лина
        line: "Ти... вибачаєшся?"
    author_text_after: >
      Ліна моргає. Не чекала. Марко обирав слова обережно, як камені на переправі.
    mood: "відлига"

  # ── s14a2 ────────────────────────────────────────────────────
  - scene_id: ep010_s14a2
    dialogue:
      - who: Марко
        line: "Ти справді хочеш використовувати артефакти. Чому? Не «тому що хочеться» — а чому ти вважаєш, що це важливо?"
      - who: Лина
        line: >
          Тому що без них ми не знайдемо шлях до Софії. Дзеркало Повторень показує сліди. Без нього ми ходимо наосліп. Я... я теж кричала вчора. Теж хотіла перемогти.
    author_text_after: >
      Марко киває. Не тому що звик погоджуватися. Тому що почув. Різниця — як між кивком за інерцією і кивком за рішенням. Він відчуває її вперше.
    mood: "перша справжня розмова"

  # ── s14b1 ────────────────────────────────────────────────────
  - scene_id: ep010_s14b1
    dialogue:
      - who: Марко
        line: "Ліно, поясни — чому ти думаєш, що артефакти потрібні?"
    author_text_after: >
      Не атака — питання. Розвідник, а не солдат. Ліна піднімає голову. Думає.
    mood: "раціональний підхід"

  # ── s14b2 ────────────────────────────────────────────────────
  - scene_id: ep010_s14b2
    dialogue:
      - who: Лина
        line: >
          Тому що без них ми не бачимо. Місто ховає. Артефакти показують. Так, вони стирають — але сліпота стирає швидше.
    author_text_after: >
      Вперше Марко чує АРГУМЕНТ, а не крик. Ліна не нападає — вона пояснює.
    mood: "аргумент замість крику"

  # ── s15 ─────────────────────────────────────────────────────
  - scene_id: ep010_s15
    dialogue:
      - who: Марко
        line: "А що, якщо користуватися Дзеркалом по-іншому? Число падає, коли я дивлюся. Але якщо дивитися коротко, одну секунду — може, втрати будуть меншими?"
      - who: Лина
        line: "Або можна дивитися не кожного дня. Тільки коли справді потрібно."
    author_text_after: >
      Вони не кричать. Не тиснуть. Просто — думають разом. І Марко розуміє: ось для чого потрібна суперечка. Не для перемоги. Для цього.
    mood: "компроміс через дослідження"

  # ── s16 ─────────────────────────────────────────────────────
  - scene_id: ep010_s16
    author_text: >
      Кроки. Тихі, розмірені. Підбори по каменю.

      Віра. Сірий кардиган, м'які очі, тонкий ланцюжок на шиї. Спускається сходами.
    dialogue:
      - who: Вера
        line: "Я чула, ви посварилися вчора. Як ви?"
      - who: Марко
        line: "Ми... помирилися."
      - who: Вера
        line: >
          Помирилися? Це чудово. Але Марко, я хочу тобі сказати дещо важливе. Ти старший. Може, не за роками, але за відповідальністю. Ти ведеш. І коли двоє сваряться — той, хто поступається першим, не слабкий. Він — дорослий. Розумієш? Поступитися першим — це зрілість.
    author_text_after: >
      Слова теплі. Правильні. Марко хоче кивнути. Звичка — як пружина всередині, що сама штовхає голову вниз. Віра добра. Віра мудра. Віра знає краще.
    question: "Як відповісти Вірі?"
    options:
      - id: think
        text: "«Мені треба подумати»"
      - id: agree
        text: "Погодитися одразу"
    mood: "тиск через авторитет"

  # ── s16d1 ────────────────────────────────────────────────────
  - scene_id: ep010_s16d1
    dialogue:
      - who: Марко
        line: "Віро Андріївно, мені треба подумати."
      - who: Вера
        line: "Звичайно, Марко."
    author_text_after: >
      Мікропауза. Усмішка не змінюється, але очі — холодніші. Як у вчителя, який вже поставив оцінку.
    mood: "холод за ввічливістю"

  # ── s16d2 ────────────────────────────────────────────────────
  - scene_id: ep010_s16d2
    dialogue:
      - who: Лина
        line: "Розвідник."
    author_text_after: >
      Шепіт. Ліна киває — схвально. Віра іде. Її тінь на стіні — довша, ніж має бути. Набагато довша.
    mood: "схвалення Ліни, підозріла тінь"

  # ── s17 ─────────────────────────────────────────────────────
  - scene_id: ep010_s17
    author_text: >
      Марко киває. «Добре», — каже він. І йому здається, що він учинив правильно. Тепло. 

      Віра встає. Гладить Марка по голові. Усміхається Ліні. Піднімається сходами. Підбори стукають — усе тихіше, тихіше.

      Тиша.

      Марко сидить і відчуває правильність. Теплу, м'яку, зручну. Як ковдру. Але — під ковдрою щось колеться. Маленьке. Гостре. Як скалка.

      Віра сказала «поступися першим». Це означає — якщо Ліна не права, а Марко правий — все одно поступися? Бо «зрілість»? Але розвідник не поступається і не перемагає. Розвідник — досліджує. Віра жодного разу не сказала «розберіться разом». Вона сказала «поступися».

      Марко намагається впіймати думку, але вона вислизає. Правильність — як вата. М'яка. Заглушає. Через хвилину він вже не впевнений, що скалка була.
    mood: "скалка під ковдрою правильності"

  # ── s18 ─────────────────────────────────────────────────────
  - scene_id: ep010_s18
    dialogue:
      - who: Софа
        line: >
          Фінальний раунд. Ситуації — а ви визначаєте ВСЕ одразу. Яка мета: перемогти, зрозуміти або образити? І яка роль — солдат чи розвідник?
    mood: "фінальний раунд — мета + роль"

  # ── s19 ─────────────────────────────────────────────────────
  - scene_id: ep010_s19
    question: "Однокласники сперечаються, що корисніше — плавання чи біг. Один: «Плавання! Це всі лікарі кажуть! Що тут обговорювати?» Мета і роль?"
    options:
      - id: win_soldier
        text: "Перемогти + солдат"
      - id: understand_scout
        text: "Зрозуміти + розвідник"
