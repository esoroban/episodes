  - scene_id: ep010_s15_bridge
    author_text: "Кроки. Згори по сходах. Тихі, розмірені. Підбори — м'які, не міські дзвінкі, а якісь приглушені, ніби крізь вату.\nМарко піднімає голову. На верхній сходинці — постать у сірому кардигані. Знайома — до дрібниць. Тонкий ланцюжок на шиї. Волосся, зібране на потилиці. Обличчя...\nВіра Андріївна.\nМарко кліпає. Ще раз кліпає. Віра Андріївна — у Дзеркальному Місті. Цього не може бути. Віра — зі школи. З реального світу. Вона не знає про Місто, не знає про Софію, не може бути тут — і все ж вона тут, спускається повільно, підбор за підбором.\nЩось не сходиться. Щось ледь помітне. Очі у Віри — трохи світліші, ніж запам'ятав Марко. Край кардигана розмивається в тіні — не так, як одяг має поводитися. Усмішка тепла, але тінь усмішки на частку секунди запізнюється за обличчям.\nСофа вібрує. Різко. Тривожно.\n"
