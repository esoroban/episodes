    mood: "Софа підтверджує — це вже не план"

  # ── s09 ─────────────────────────────────────────────────────
  - scene_id: ep046_s09
    author_text: >
      Десь у кутку — різкий дзвін. Дротовий, не цифровий.
      Дзвенить на всю кімнату.

      Марко обертається. На столі біля стіни — старий
      телефон. Чорний, із кручений шнуром, із слухавкою
      на важелі. Раніше Марко його не помічав.

      Дзвінок. Ще. Ще.
    mood: "дзвонить старий телефон — зняти чи зачекати"
    question: "Що робить Марко?"
    options:
