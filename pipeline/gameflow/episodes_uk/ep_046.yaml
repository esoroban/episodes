  # ── s01 ─────────────────────────────────────────────────────
  - scene_id: ep046_s01
    author_text: >
      Запис змовк хвилину тому. Може, п'ять. Марко не
      рахував.

      «Співавтори.» Слово стоїть у голові й не йде. Софія
      і Голос — разом. Один аркуш. Один проєкт. Один
      підпис на двох.

      Марко не відходить від терміналу. Стоїть. Дихає.

      На екрані сервера — той самий список із флешки. Три
      файли. Перший — щойно прослуханий: «Нарада 1.
      Співавтори.»

      Курсор сам опускається на другий: «Нарада 2.
      Кожен розділ — урок.»

      Палець Марка повертається до клавіші «відтворити».
      Повільно. Сам.
    mood: "одразу після співавторів — Марко збирається слухати далі"

  # ── s02 ─────────────────────────────────────────────────────
  - scene_id: ep046_s02
    dialogue:
      - who: Софа
        line: "Слухай."
    unlock_button:
      text: "🔊 Відтворити запис 2"
      reveals:
        line: "Софія: «Він прийде по мене. Це точка входу.» Софія: «Кожен розділ — урок. Кожна втрата — іспит.» Софія: «До фіналу він думатиме сам.» Голос: «Прийнято. Роблю позначку.»"
    mood: "Марко сам натискає відтворення — співавтори говорять із флешки"

  # ── s03 ─────────────────────────────────────────────────────
  - scene_id: ep046_s03
    author_text: >
      Запис закінчився. Динамік біля терміналу змовкає.

      На екрані сервера — заставка прослуханого файлу.
      Чорно-білий знімок: Софія. Одинадцять років, може,
      дванадцять. Волосся прибране назад. Очі ясні.

      Голос поряд — обличчя розмите, наче на знімку
      загублені пікселі в цьому місці. Однак руки видно.
      Спокійні. Упевнені. Над спільним столом — схема. На
      схемі — літери М-А-Р-К-О.

      Співавтори. Партнери. Два архітектори одного
      лабіринту.

      Марко відчуває, як підлога йде з-під ніг. Усе
      сплановано. Із самого початку. Кожен страх. Кожна
      перемога.
    mood: "головний твіст — співавтори"

  # ── s04 ─────────────────────────────────────────────────────
  - scene_id: ep046_s04
    author_text: >
      Курсор на екрані сервера переходить до третього
      файлу. «Нарада 3. Стирання.»

      Палець Марка — на клавіші. Не натискає. Поки.

      Поряд — маленька чорна флешка стирчить у порту. Та
      сама. Від мами. Мама поклала її в кишеню куртки того
      ранку. Марко тоді подумав — застібка. Це не була
      застібка.

      Два записи він уже почув. Співавтори. План.

      Третій — попереду.
    mood: "пауза перед третім записом — що там?"
    question: "Що робить Марко?"
    options:
      - id: play_now
        text: "Натиснути одразу. Хочу знати."
      - id: breathe
        text: "Видихнути. Зібратися. Потім натиснути."

  # ── s05 ─────────────────────────────────────────────────────
  - scene_id: ep046_s05
    author_text: >
      Марко робить крок назад від терміналу. Один. Довгий
      видих.

      Очі на флешці. Маленька, чорна, звичайна. Та мама
      обрала її. Мама знала, що Марко знайде сервер. Мама
      знала, що записи треба слухати тут, на цьому
      терміналі, а не десь іще.

      Мама знала.

      Марко повертається до клавіатури. Палець — на клавішу.
    mood: "видих — зібратися перед третім записом"

  # ── s06 ─────────────────────────────────────────────────────
  - scene_id: ep046_s06
    dialogue:
      - who: Софа
        line: "Слухай."
    unlock_button:
      text: "🔊 Відтворити запис 3"
      reveals:
        line: "Софія: «Стирання мали бути ілюзією! Ви обіцяли!» Софія: «Ніхто не мав постраждати по-справжньому!» Голос: «Плани змінюються, Софіє. Реалістичність вимагає жертв.» Софія: «Цього не було в договорі!» Голос: «Договори теж змінюються.» Софія: «Марку, якщо ти це чуєш — я не знала. Я НЕ ЗНАЛА, що так буде.» Софія: «Тренування стало війною. Він зайшов задалеко.»"
    mood: "тренування стало війною — Голос порушив умови"

  # ── s07 ─────────────────────────────────────────────────────
  - scene_id: ep046_s07
    author_text: >
      Запис обривається на середині фрази. Динамік біля
      терміналу змовкає.

      На екрані сервера — заставка: Софія бліда, руки
      тремтять. Голос поряд — та сама фігура, та поза
      інша. Закрита. Жорстка.

      Тиша в серверній.
    mood: "договір зламано — після третього запису"

  # ── s08 ─────────────────────────────────────────────────────
  - scene_id: ep046_s08
    dialogue:
      - who: Софа
        line: "Софія заблокована."
      - who: Софа
        line: "По-справжньому. Не за сценарієм."
      - who: Марко
        line: "Де вона?"
      - who: Софа
