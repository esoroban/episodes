        line: "Пам'ятаєш Владика? З дев'ятого «Б»."
      - who: Марко
        line: "...ні. Не пам'ятаю."
      - who: Софа
        line: "Звісно. Голос його стер. З усіх, хто його знав. З тебе теж."
      - who: Софа
        line: "Я тобі розкажу. Слухай."
    mood: "стерта пам'ять — Марко не пам'ятає Владика"

  # ── s13 ─────────────────────────────────────────────────────
  - scene_id: ep046_s13
    author_text: >
      Владик. Дев'ятий клас. Розумний. Швидкий. Знав усі
      прийоми.

      Владик перемагав у кожній суперечці. Підміняв
      поняття — ніхто не помічав. Будував хибні дилеми —
      усі обирали його варіант. Лякав ланцюжками — усі
      погоджувалися. Здавалося, він король.

      А потім — день народження. Не його. Наталки. Увесь
      клас іде до Наталки. Владик чекає запрошення. Не
      отримує. Ні від кого. Сидить удома.

      Він питає однокласника: чому?

      Відповідь: «З тобою неможливо розмовляти. Ти завжди
      перемагаєш. Однак з тобою не хочеться бути.»

      Через місяць Голос прийшов до нього. Сказав: «Я
      зроблю так, що ти більше не будеш сам.» Владик
      погодився. Голос його стер.

      З усіх, хто його знав. З пам'яті. Із зошитів.

      Тому Марко його не пам'ятає. І ніхто не пам'ятає.
      Тільки Софа зберегла копію в архіві.

      Люди НЕ завжди бачать хитрість. Однак ЗАВЖДИ її
      відчувають.

      П'ЯТЬ ПРИЧИН НЕ ВИКОРИСТОВУВАТИ ДЕМАГОГІЮ.

      ПЕРША — втрата довіри. Спіймають один раз — не
      повірять і в наступні десять. Довіра будується
      роками, руйнується за секунду.

      ДРУГА — втрата друзів. Як Владик. Перемагав у
      суперечках — програв у житті. Із хитрим не хочуть
      дружити.

      ТРЕТЯ — погана репутація. Чутка швидша за інтернет.
      «Не сперечайся з ним, він усе перекрутить» — і тебе
      перестають слухати навіть коли ти маєш рацію.

      ЧЕТВЕРТА — ефект бумеранга. Користуєшся прийомами —
      інші вчаться тих самих прийомів. Проти тебе. Тією
      самою зброєю.

      П'ЯТА — не вчишся сперечатися чесно. Навіщо будувати
      аргумент, якщо можна обдурити? Однак коли зустрінеш
      того, кого не обдуриш, — у тебе немає навички. Лише
      трюки.
    mood: "історія стертого Владика + п'ять причин"

  # ── s14 ─────────────────────────────────────────────────────
  - scene_id: ep046_s14
    author_text: >
      МЕТАФОРА. Демагогія — це кредит.

      Перемога зараз — плата потім. Відсоток зростає.

      Що довше користуєшся — то дорожча виплата. І платять
