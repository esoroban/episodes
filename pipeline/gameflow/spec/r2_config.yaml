# Cloudflare R2 — конфиг для combined-сборки (v2 рендера)
#
# Что здесь:
#   public_url — публичный домен бакета (r2.dev). На этот URL ссылаются
#                абсолютные пути <img src=...> и <audio src=...> в
#                собранных HTML эпизодов (server/v2/ep_NNN/ep_NNN.html).
#   layout     — как организованы ключи в бакете. HTML собирается так,
#                чтобы ссылаться на эти пути.
#
# На Render этот же URL продублирован в переменной окружения
# R2_PUBLIC_URL (Dashboard → Environment). Локально — в server/.env.
#
# S3 API endpoint (не публичный) и access keys — НЕ здесь. Они живут
# только в секретах (локальный ~/.aws/credentials или Render env vars).
#
# Язык контента: текущий combined_output — УКРАИНСКИЙ. В бакете layout
# плоский (ep_NNN/images|audio), без префикса языка, потому что источник
# voice+image пока существует только в UK. HTML собран в server/v2/uk/.

public_url: https://pub-77b6fd849494491a8cd26f9e0df3db3f.r2.dev
bucket: sylaslovaassets
account_id: 11f288deeb77883244e15ded2e5c55d8
location: EEUR  # Eastern Europe
s3_endpoint: https://11f288deeb77883244e15ded2e5c55d8.r2.cloudflarestorage.com

layout:
  images: "{public_url}/ep_{NNN}/images/{filename}"
  audio:  "{public_url}/ep_{NNN}/audio/{filename}"
