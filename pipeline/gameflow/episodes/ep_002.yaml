episode_id: 2
episode_title: "Неправда и её виды"
lesson: "1A.2"
terms_introduced: ["неправда"]
terms_used: ["факт", "мнение"]

enter_requires:
  flags: [sofa_activated]
  previous_episode: 1

previously: >
  Марко проснулся — кровать сестры пуста, фотографии исчезли.
  Мама не помнит Софию. На полке — старый телефон с треснутым экраном.
  Софа включилась: «Я — Софа. Образовательный помощник. Версия 0.7.»
  Марко научился отличать факт от мнения. Факт — можно проверить.
  Мнение — нельзя. Вера Андреевна попросила принести дневник.
  Лина сказала: «Я помню Софию. Но нам нельзя говорить. Они слушают.»

scenes:

  # ── СЦЕНА 1: Школьный коридор ─────────────────────────────────────
  - scene_id: ep002_s01
    episode_id: 2
    source_ref: day_01.ep2.drama
    scene_type: narrative
    location: "Школа, коридор"
    time: "учебный день"
    require_flags: [sofa_activated]
    characters_present: [Марко, Софа]
    author_text: >
      Марко стоит в конце коридора. Лина ушла — быстро, не оглядываясь.
      На перемене Олена шепчется с Витей у раковины.
      «Говорит, у него сестра пропала...» — «Какая сестра? У него нет
      никакой сестры.» — «Может, он просто хочет, чтобы его пожалели?»
    mood: "одиночество, давление"
    interaction_type: vote
    question: "«Марко хочет, чтобы его пожалели.» Факт, мнение или неправда?"
    options:
      - id: fact
        text: "Факт"
        correct: false
      - id: opinion
        text: "Мнение"
        correct: true
      - id: lie
        text: "Неправда"
        correct: false
    correct_logic: "Нет «хотемера» — Олена не может залезть в голову Марко."
    feedback_success: "Софа: «Верно. Олена подаёт своё предположение как факт.»"
    feedback_soft_fail: "Софа: «Можно ли измерить, чего Марко хочет? Есть прибор?»"
    next_default: ep002_s02
    next_fail: ep002_s01
    visual_brief:
      background: "Школьный коридор, перемена, шум"
      camera: over-shoulder
      characters:
        - who: Марко
          expression: напряжённость
          pose: стоит в конце коридора, один
          position: left
      props: [телефон в кармане]
      atmosphere: "Марко один среди шёпота — мир повернулся против"
      ui_mode: quiz

  # ── СЦЕНА 2: Витя — «все говорят» ─────────────────────────────────
  - scene_id: ep002_s02
    episode_id: 2
    source_ref: day_01.ep2.drama
    scene_type: dialogue
    location: "Школа, коридор"
    time: "перемена"
    characters_present: [Марко, Витя, Софа]
    dialogue:
      - who: Витя
        line: "Марко, без обид. Но все говорят, что ты выдумал сестру. Ни один человек в школе её не помнит."
    author_text: >
      «Все говорят.» Слово «все» бьёт как мяч в живот.
      Марко ЗНАЕТ, что София была. Но как доказать то,
      чего никто не помнит?
    mood: "давление, боль"
    interaction_type: vote
    question: "«Все говорят, что Марко выдумал сестру.» Факт, мнение или неправда?"
    options:
      - id: fact
        text: "Факт"
        correct: false
      - id: opinion
        text: "Мнение"
        correct: false
      - id: lie
        text: "Неправда"
        correct: true
    correct_logic: "Можно проверить: спросить каждого. Лина помнит — значит не «все»."
    feedback_success: "Софа: «Верно. Одного исключения достаточно — Лина помнит.»"
    feedback_soft_fail: 'Софа: «Можно ли проверить, что "все" так думают? Спроси каждого. Лина — помнит.»'
    next_default: ep002_s03
    next_fail: ep002_s02
    visual_brief:
      background: "Школьный коридор, у раковины"
      camera: medium
      characters:
        - who: Витя
          expression: прямолинейность, без злости
          pose: стоит напротив Марко
          position: right
        - who: Марко
          expression: боль, сжатые кулаки
          pose: стоит, рюкзак на плече
          position: left
      atmosphere: "лобовое столкновение с «нормой»"
      ui_mode: quiz

  # ── СЦЕНА 3: Чат — фейк ───────────────────────────────────────────
  - scene_id: ep002_s03
    episode_id: 2
    source_ref: day_01.ep2.drama
    scene_type: narrative
    location: "Школа, коридор"
    time: "перемена"
    characters_present: [Марко, Софа]
    author_text: >
      Марко видит через плечо чужой телефон. В чате:
      «Марко из 5-Б выдумал сестру, чтобы не делать домашку. Жесть.»
      Шесть лайков. Пересылки. Кто-то: «Серьёзно?»
      Позже — другое сообщение: «У Марко серьёзные проблемы.
      Мама его водила к психологу. Он всем врёт про сестру.»
      Никакого психолога не было. Но написано уверенно. 11 лайков.
    mood: "удар, бессилие"
    interaction_type: vote
    question: "«Мама Марко водила его к психологу.» Шутка, сказка или фейк?"
    options:
      - id: joke
        text: "Шутка"
        correct: false
      - id: tale
        text: "Сказка"
        correct: false
      - id: fake
        text: "Фейк"
        correct: true
    correct_logic: "Специально придумано, чтобы поверили. Цель — навредить, не посмешить."
    feedback_success: "Софа: «Фейк. Самый опасный вид неправды — выглядит как правда, но придумано.»"
    feedback_soft_fail: "Софа: «Шутка — чтобы посмешить. Сказка — все понимают. А здесь цель — чтобы ПОВЕРИЛИ.»"
    next_default: ep002_s04
    next_fail: ep002_s03
    visual_brief:
      background: "Школьный коридор, экран чужого телефона"
      camera: close-up
      characters:
        - who: Марко
          expression: шок, бессилие
          pose: стоит, смотрит через плечо на чужой экран
      props: [экран телефона с чатом, лайки, пересылки]
      focus_object: "сообщение в чате с лайками"
      atmosphere: "цифровая травля — слова множатся и бьют"
      ui_mode: quiz

  # ── СЦЕНА 4: Три вида неправды ─────────────────────────────────────
  - scene_id: ep002_s04
    episode_id: 2
    source_ref: day_01.ep2.drama
    scene_type: dialogue
    location: "Школа, столовая"
    time: "обед"
    characters_present: [Марко, Софа, Олена]
    author_text: >
      Столовая. Олена рассказывает младшим про дракона,
      который ел блинчики и от этого чешуя стала золотой.
      Все смеются — все понимают, что это сказка.
    dialogue:
      - who: Софа
        line: >
          Неправда бывает трёх видов. ШУТКА — знает, что неправда,
          хочет посмешить. СКАЗКА — все понимают, что не взаправду.
          ФЕЙК — специально придумано, чтобы поверили. Самый опасный.
    mood: "обучение, систематизация"
    interaction_type: vote
    question: "«В Зеркальном Городе по ночам по крышам ходят стеклянные птицы.» Шутка, сказка или фейк?"
    options:
      - id: joke
        text: "Шутка"
        correct: false
      - id: tale
        text: "Сказка"
        correct: true
      - id: fake
        text: "Фейк"
        correct: false
    correct_logic: "Все понимают, что не взаправду. Это фантазия, а не обман."
    feedback_success: "Софа: «Сказка. Никто не верит буквально — это фантазия.»"
    feedback_soft_fail: "Софа: «Кто-то хочет, чтобы ты поверил в стеклянных птиц? Нет — все понимают, что это фантазия.»"
    next_default: ep002_s05
    next_fail: ep002_s04
    visual_brief:
      background: "Школьная столовая, шум, подносы"
      camera: wide
      characters:
        - who: Марко
          expression: отрешённость
          pose: сидит, ест молча, телефон под столом
        - who: Олена
          expression: весёлость
          pose: жестикулирует, рассказывает
      atmosphere: "обычная школьная суета вокруг Марко, который внутри — один"
      ui_mode: quiz

  # ── СЦЕНА 5: Учительская — Вера подслушана ─────────────────────────
  - scene_id: ep002_s05
    episode_id: 2
    source_ref: day_01.ep2.drama
    scene_type: narrative
    location: "Школа, у учительской"
    time: "после обеда"
    characters_present: [Марко, Софа]
    author_text: >
      Марко проходит мимо приоткрытой двери учительской.
      Голос Веры — мягкий, заботливый:
      «Мальчик утверждает, что у него есть сестра-близнец,
      которую все забыли. Возможно, переутомление.
      Я попросила принести дневник — посмотрю, что там...»
      Холод в груди. Вера говорит «утверждает» — как будто это симптом.
    mood: "предательство, холод"
    interaction_type: vote
    question: "«Марко переутомился.» Факт, мнение или неправда?"
    options:
      - id: fact
        text: "Факт"
        correct: false
      - id: opinion
        text: "Мнение"
        correct: true
      - id: lie
        text: "Неправда"
        correct: false
    correct_logic: "Нет «переутомлемера». Вера — не врач. Это её субъективная оценка."
    feedback_success: "Софа: «Верно. Мнение, которое притворяется диагнозом.»"
    feedback_soft_fail: 'Софа: «Вера — врач? Она проверяла? Есть "переутомлемер"?»'
    next_default: ep002_s06
    next_fail: ep002_s05
    visual_brief:
      background: "Школьный коридор, приоткрытая дверь учительской"
      camera: pov
      characters:
        - who: Марко
          expression: шок, замирание
          pose: стоит у двери, прислонился к стене
      props: [приоткрытая дверь, полоска света из учительской]
      focus_object: "щель в двери — голос Веры из-за неё"
      atmosphere: "подслушанное предательство — тёплый голос говорит холодные вещи"
      ui_mode: quiz

  # ── СЦЕНА 6: Софа-блок — сложные случаи ───────────────────────────
  - scene_id: ep002_s06
    episode_id: 2
    source_ref: day_01.ep2.sofa_block
    scene_type: quiz
    location: "Школа, подоконник в конце коридора"
    time: "перемена"
    characters_present: [Марко, Софа]
    author_text: >
      Перемена. Марко сидит на подоконнике. Один. Телефон в руках.
      Софа: «Секрет сложных случаев: МОЖНО ли это измерить?»
    interaction_type: vote
    question: "«Мой папа самый сильный в мире.» Факт, мнение или неправда?"
    options:
      - id: fact
        text: "Факт"
        correct: false
      - id: opinion
        text: "Мнение"
        correct: false
      - id: lie
        text: "Неправда"
        correct: true
    correct_logic: >
      Можно измерить силу — силомер. При проверке: скорее всего,
      не самый сильный В МИРЕ. Проверяемо и не подтвердится.
    feedback_success: "Софа: «Неправда — силу МОЖНО измерить, но в мире есть люди сильнее.»"
    feedback_soft_fail: "Софа: «Можно ли измерить силу? Есть силомер? Да. Тогда проверяй: самый сильный В МИРЕ?»"
    mood: "сосредоточенность"
    followup_interaction:
      interaction_type: choice
      question: "Хочешь узнать больше о том, как работает неправда?"
      options:
        - id: more
          text: "Расскажи про Дмитрика"
          next: ep002_s06_detour
        - id: go_on
          text: "Давай дальше"
          next: ep002_s07
    next_default: ep002_s07
    visual_brief:
      background: "Подоконник в школьном коридоре, Марко один"
      camera: medium
      characters:
        - who: Марко
          expression: усталая сосредоточенность
          pose: сидит на подоконнике, телефон в руках
      atmosphere: "тихий момент учёбы среди бури"
      ui_mode: quiz

  # ── СЦЕНА 6d: Flavor detour — Дмитрик ─────────────────────────────
  - scene_id: ep002_s06_detour
    episode_id: 2
    source_ref: day_01.ep2.sofa_block
    scene_type: narrative
    location: "Школа, подоконник"
    time: "перемена"
    characters_present: [Марко, Софа]
    branch_type: flavor_detour
    dialogue:
      - who: Софа
        line: >
          Помни: Дмитрик из истории про отмену уроков — не врал.
          Сам верил. Но информация — всё равно неправда.
          Человек может не врать — а информация всё равно неправда.
          Неправда — это свойство информации, а не человека.
    mood: "важный нюанс"
    merge_to: ep002_s07
    next_default: ep002_s07
    visual_brief:
      background: "Подоконник, экран телефона с текстом Софы"
      camera: close-up
      characters:
        - who: Софа
          expression: объяснение
          pose: текст на экране
      atmosphere: "ключевое различие — ложь vs неправда"
      ui_mode: reading

  # ── СЦЕНА 7: Вера просит дневник ───────────────────────────────────
  - scene_id: ep002_s07
    episode_id: 2
    source_ref: day_01.ep2.challenge
    scene_type: dialogue
    location: "Школа, класс"
    time: "последний урок"
    characters_present: [Марко, Вера, Софа]
    dialogue:
      - who: Вера
        line: "Марко, я разговаривала с твоей мамой. Она тоже переживает. Мы обе хотим тебе помочь."
      - who: Марко
        line: "Мне не нужна помощь. Мне нужно, чтобы мне поверили."
      - who: Вера
        line: "А ты сам-то веришь? Может быть, тебе просто... показалось?"
      - who: Марко
        line: "У меня есть доказательство. Дневник. С её почерком."
      - who: Вера
        line: "Принеси мне его завтра. Я посмотрю. За тебя переживаю."
    author_text: >
      Марко хочет кивнуть. Вера говорит так заботливо.
      Но в рюкзаке — дневник. С почерком. С рисунком. С завитушками.
    mood: "давление мягкой силой"
    next_default: ep002_s08
    visual_brief:
      background: "Классная комната, после звонка, пусто"
      camera: medium
      characters:
        - who: Вера
          expression: забота, чуть слишком широкая улыбка
          pose: рука на плече Марко, наклонилась
          position: right
        - who: Марко
          expression: внутренняя борьба
          pose: прижимает рюкзак к груди
          position: left
      props: [рюкзак с дневником внутри]
      focus_object: "рука Веры на плече — давление или забота?"
      atmosphere: "сладкий яд — забота, которая хочет забрать улику"
      ui_mode: dialogue

  # ── СЦЕНА 8: Quiz — финальная проверка ─────────────────────────────
  - scene_id: ep002_s08
    episode_id: 2
    source_ref: day_01.ep2.challenge
    scene_type: quiz
    location: "Школа, класс"
    time: "после урока"
    characters_present: [Марко, Софа]
    dialogue:
      - who: Софа
        line: "Вера просит дневник. Второй раз. Зачем?"
    interaction_type: vote
    question: "Вера дважды просит дневник. Она хочет помочь — или получить доступ к улике?"
    options:
      - id: help
        text: "Хочет помочь"
        correct: false
      - id: evidence
        text: "Хочет получить улику"
        correct: false
      - id: unknown
        text: "Мы пока не знаем — но повторение подозрительно"
        correct: true
    correct_logic: "Мы не можем быть уверены в мотивах Веры, но повторение — закономерность, которую стоит отметить."
    feedback_success: "Софа: «Верно. Мы не знаем мотив — но замечаем паттерн.»"
    feedback_soft_fail: "Софа: «Вспомни детектива: мы не знаем, подтвердится ли. Но повторение — не случайность.»"
    mood: "аналитическое напряжение"
    next_default: ep002_s09
    next_success: ep002_s09
    next_fail: ep002_s08_fail
    visual_brief:
      background: "Класс, экран телефона"
      camera: close-up
      characters:
        - who: Марко
          expression: думает
          pose: сидит за партой, телефон под столом
      atmosphere: "тихий момент анализа — что стоит за заботой Веры?"
      ui_mode: quiz

  # ── СЦЕНА 8f: Soft fail ───────────────────────────────────────────
  - scene_id: ep002_s08_fail
    episode_id: 2
    source_ref: day_01.ep2.challenge
    scene_type: feedback
    location: "Школа, класс"
    time: "после урока"
    characters_present: [Марко, Софа]
    branch_type: soft_fail_loop
    dialogue:
      - who: Софа
        line: >
          Подсказка: мы не можем влезть в голову Вере.
          Хочет помочь или забрать улику — это пока не проверено.
          Но факт: она просит дневник уже второй раз.
          Что мы ЗНАЕМ точно?
    mood: "мягкая помощь"
    merge_to: ep002_s08
    next_default: ep002_s08
    visual_brief:
      background: "Класс, экран Софы"
      camera: close-up
      characters:
        - who: Софа
          expression: терпеливость
          pose: текст подсказки
      atmosphere: "возврат к вопросу"
      ui_mode: feedback

  # ── СЦЕНА 9: Марко не отдаёт ──────────────────────────────────────
  - scene_id: ep002_s09
    episode_id: 2
    source_ref: day_01.ep2.challenge
    scene_type: narrative
    location: "Школа, коридор"
    time: "конец дня"
    characters_present: [Марко]
    author_text: >
      Марко выходит из класса. Рюкзак прижат к груди.
      Дневник внутри. Никому не отдал.
    dialogue:
      - who: Софа
        line: >
          Правило второе. Неправду можно разоблачить — потому что
          она проверяема. А в споре мнений победителя нет.
          Можно сказать «окей, у тебя своё мнение» — и пойти есть
          мороженое. Но если тебе врут — стоит проверить.
