  # ── СЦЕНА 9: Теория — история Владика + 5 причин ────────────────
  - scene_id: ep046_s09
    episode_id: 46
    source_ref: day_12.ep46.sofa_block
    scene_type: narrative
    location: "Зеркальный город, серверная комната Софы"
    time: "глубокая ночь"
    characters_present: [Марко]
    author_text: >
      ИСТОРИЯ ВЛАДИКА. Девятый класс. Умный. Быстрый. Знал все
      приёмы.

      Владик побеждал в каждом споре. Подменял понятия — никто не
      замечал. Строил ложные дилеммы — все выбирали его вариант.
      Пугал цепочками — все соглашались. Казалось, он король.

      А потом — день рождения. Не его. Наташи. Весь класс идёт к
      Наташе. Владик ждёт приглашение. Не получает. Ни от кого.
      Сидит дома.

      Он спрашивает одноклассника: почему?

      Ответ: «С тобой невозможно разговаривать. Ты всегда
      побеждаешь. Но с тобой не хочется быть.»

      Люди НЕ всегда видят хитрость. Но ВСЕГДА её чувствуют.

      ПЯТЬ ПРИЧИН НЕ ИСПОЛЬЗОВАТЬ ДЕМАГОГИЮ.

      ПЕРВАЯ — потеря доверия. Поймают один раз — не поверят и в
      следующие десять. Доверие строится годами, рушится за
      секунду.

      ВТОРАЯ — потеря друзей. Как Владик. Побеждал в спорах —
      проиграл в жизни. С хитрым не хотят дружить.

      ТРЕТЬЯ — плохая репутация. Молва быстрее интернета. «Не
      спорь с ним, он всё перекрутит» — и тебя перестают слушать
      даже когда ты прав.

      ЧЕТВЁРТАЯ — эффект бумеранга. Используешь приёмы — другие
      учатся тем же приёмам. Против тебя. Тем же оружием.

      ПЯТАЯ — не учишься спорить честно. Зачем строить аргумент,
      если можно обмануть? Но когда встретишь того, кого не
      обманешь, — у тебя нет навыка. Только трюки.
    mood: "пять причин — каркас урока"
    next_default: ep046_s10
    visual_brief:
      background: "Стеклянная комната в расфокусе. По центру — список из пяти строк: «1. Доверие. 2. Друзья. 3. Репутация. 4. Бумеранг. 5. Навык.»"
      camera: medium
      characters:
        - who: Марко
          expression: усваивает каркас
          pose: смотрит на список
          position: right
      props:
