      файла. Первый — только что прослушан: «Совещание 1.
      Соавторы.»

      Курсор сам опускается на второй: «Совещание 2.
      Каждая глава — урок.»

      Палец Марко возвращается к клавише «воспроизвести».
      Медленно. Сам.
