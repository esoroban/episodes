        - список из пяти пунктов
      focus_object: "список из пяти причин"
      atmosphere: "правило без украшений"
      ui_mode: reading

  # ── СЦЕНА 10: Метафора — демагогия как кредит ────────────────────
  - scene_id: ep046_s10
    episode_id: 46
    source_ref: day_12.ep46.sofa_block
    scene_type: narrative
    location: "Зеркальный город, серверная комната Софы"
    time: "глубокая ночь"
