    author_text: >
      МЕТАФОРА. Демагогия — это кредит.

      Победа сейчас — плата потом. Процент растёт.

      Чем дольше пользуешься — тем дороже выплата. И платят не
      деньгами. Платят доверием. Друзьями. Репутацией.

      София взяла кредит. Спасла Марко — но потеряла его доверие.
      Выиграла план — проиграла честность.

      Это и есть цена.
    mood: "метафора — кредит, который растёт"
    next_default: ep046_s11
