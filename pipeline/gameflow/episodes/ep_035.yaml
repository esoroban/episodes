  # ── СЦЕНА 2: Блокнот — «Он доверяет мне полностью» ────────────────
  - scene_id: ep035_s02
    episode_id: 35
    source_ref: day_09.ep35.drama
    scene_type: dialogue
    location: "Зеркальный Город, тоннель у ядра"
    time: "утро"
    characters_present: [Марко, Сем, Лина]
    author_text: >
      Лина достаёт блокнот. Маленький, потрёпанный. Обложка — серая.
      Страницы — аккуратные, мелкий почерк. Столбцы: дата, место, что
      сказал Марко, кому доверял.

      Марко берёт блокнот. Руки не дрожат — они деревянные.

      Страница первая: день знакомства. «Марко — открытый. Соглашается
      легко. Доверяет быстро.»

      Страница десятая: «Рассказал о Софе. Показал экран. Не проверил,
      кто рядом.»

      Последняя страница: «Он доверяет мне полностью.»

      Блокнот падает на пол. Звук — глухой.
    dialogue:
      - who: Сем
        line: "Она шпион!"
    author_text_after: >
      Марко молчит. Ноги не держат. Лина — единственная, кому он
      доверял после всего. Доверие было — ловушкой?

      Удар в солнечное сплетение. Каждая страница — доказательство:
      тебя изучали.
    mood: "блокнот как зеркало собственной наивности"
    next_default: ep035_s03
    visual_brief:
      background: "Тоннель. Блокнот падает на пол, страницы открыты — аккуратный мелкий почерк"
      camera: close-up
      characters:
