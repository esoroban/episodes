  # ── СЦЕНА 21: КЛИФФХЭНГЕР — шрам «С» ──────────────────────────────
  - scene_id: ep035_s21_end
    episode_id: 35
    source_ref: day_09.ep35.cliffhanger
    scene_type: cliffhanger
    location: "Зеркальный Город, тоннель у ядра"
    time: "утро"
