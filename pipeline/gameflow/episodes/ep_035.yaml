          expression: окаменел, рот приоткрыт
          pose: блокнот выпал из руки
          position: right
        - who: Сем
          expression: гнев + страх
          pose: тычет пальцем в блокнот
          position: center
        - who: Лина
          expression: спокойствие, готовность
          pose: руки вдоль тела
          position: left
      props: [блокнот на полу, мелкий почерк виден, последняя страница «Он доверяет мне полностью»]
      focus_object: "последняя страница блокнота"
      atmosphere: "удар в солнечное сплетение"
      ui_mode: dialogue

