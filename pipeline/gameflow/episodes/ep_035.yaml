  # ── СЦЕНА 5: Теория — авторитет, компетентность, ложный авторитет ──
  - scene_id: ep035_s05
    episode_id: 35
    source_ref: day_09.ep35.sofa_block
    scene_type: narrative
    location: "Зеркальный Город, тоннель у ядра"
    time: "утро"
    characters_present: [Марко]
    author_text: >
      АВТОРИТЕТ. Человек, которому мы доверяем. Потому что помогал.
      Потому что был рядом. Потому что знал то, чего другие не знали.

      Но авторитет и компетентность — разные вещи.

      КОМПЕТЕНТНОСТЬ. Когда человек реально разбирается ИМЕННО
      в этой теме. Учился. Работает. Имеет опыт.

      ЛОЖНЫЙ АВТОРИТЕТ. Когда авторитет есть — а компетентности нет.
      Как красивая обёртка на пустой коробке. Знаменитый, уважаемый —
      но в ЭТОЙ теме не разбирается.

      Два условия уместной ссылки: человек компетентен в этой
      области + другие специалисты согласны.

      Два признака ловушки: говорит не о своей области + вообще
      не эксперт.

      Главное: КОМПЕТЕНТНОСТЬ НЕ ПЕРЕНОСИТСЯ с темы на тему. Хороший
      футболист — не врач. Хороший певец — не диетолог.
    mood: "карта инструмента — три понятия рядом"
    next_default: ep035_s06
