    dialogue:
      - who: Марко
        line: "Уходи."
      - who: Лина
        line: "Прежде чем выгонишь — посмотри сюда."
    author_text_after: >
      Лина не двигается. Смотрит прямо.

      Она стягивает свитер с плеча. Медленно. Под нитками — кожа.
      Под кожей — шрам. Буква.

      «С».

      Марко замирает. «С» — как «София».

      Софа в кармане трещит. Полоски бегут по дисплею. Потом —
      тишина. И голубой свет. Файл — разблокирован. София знала
      о Лине. С самого начала.

