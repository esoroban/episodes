    feedback_soft_fail: "Посчитай ножки. Есть авторитет? Есть факт? Есть эмоция? Если все три — табуретка стоит."
    mood: "первая тренировка — всё сошлось"
    next_default: ep016_s08
    visual_brief:
      background: "Экран телефона, силуэт табуретки на все три ножки"
      camera: close-up
      characters:
        - who: Марко
          expression: сосредоточенность, лёгкая уверенность
