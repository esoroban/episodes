scenes:

  # ── СЦЕНА 1: Два плаката. Марко и чёрный экран Софы ──────────────────
  - scene_id: ep016_s01
    episode_id: 16
    source_ref: day_04.ep16.drama
    scene_type: narrative
    location: "Зеркальный Город, переулок с двумя плакатами"
    time: "вне времени"
    characters_present: [Марко]
    author_text: >
      Марко стоит перед двумя плакатами. Один. Софа — чёрный экран.
      Ни звука. Ни пузыря.

      Первый плакат, крупно: «ПОМОГИТЕ! ОН ДЕРЖИТ МЕНЯ ЗДЕСЬ!»

      Второй, ровным шрифтом: «Всё идёт по плану. Не мешай.»

      Марко читает первый — и ноги несут вперёд. Спасать. Бежать.

      Читает второй — и ноги останавливаются. Ждать. Не мешать.
    mood: "два плаката, два противоположных приказа"
    interaction_type: choice
    question: "Что делает Марко?"
    options:
      - id: reread
        text: "Перечитать первый ещё раз"
        next: ep016_s02
      - id: step_back
        text: "Отступить на шаг и посмотреть на оба сразу"
        next: ep016_s01b
    next_default: ep016_s02
    visual_brief:
      background: "Узкий переулок Зеркального Города, глухая стена. На стене — два плаката бок о бок: слева крик «ПОМОГИТЕ!», справа ровный текст «Всё идёт по плану»"
      camera: wide
      characters:
        - who: Марко
          expression: растерянность, глаза бегают от одного плаката к другому
          pose: стоит между плакатов, руки вдоль тела
          position: center
      props: [плакат-крик, плакат-план, чёрный экран телефона в руке]
      focus_object: "два плаката — два противоположных приказа"
      atmosphere: "переулок как перекрёсток двух голосов"
      ui_mode: choice

  # ── СЦЕНА 1b: Detour — Марко делает вдох, смотрит на свои руки ───────
  - scene_id: ep016_s01b
    episode_id: 16
    source_ref: day_04.ep16.drama
    scene_type: narrative
    location: "Зеркальный Город, переулок с двумя плакатами"
    time: "вне времени"
    characters_present: [Марко]
    branch_type: flavor_detour
    author_text: >
      Марко делает шаг назад. Ещё один. Теперь плакаты — оба в кадре,
      оба видно. Он специально не перечитывает. Смотрит на свои руки —
      они чуть дрожат. Не от холода.

      «Если каждый раз, когда я читаю, меня куда-то несёт — проблема
      не в плакате. Проблема во мне.»

      Переулок тихий. Плакаты ждут. Марко не спешит.
    mood: "пауза между двумя приказами"
    merge_to: ep016_s02
    next_default: ep016_s02
    visual_brief:
      background: "Тот же переулок, но камера отошла — видно оба плаката и Марко со спины"
      camera: wide
      characters:
        - who: Марко
          expression: сосредоточенность, внутреннее замедление
          pose: отступил на шаг, смотрит на свои ладони
          position: center
      props: [плакат-крик на фоне, плакат-план на фоне, ладони Марко крупным планом]
      focus_object: "ладони Марко — тело чуть дрожит"
      atmosphere: "первый раз, когда Марко не доверяет своему первому порыву"
      ui_mode: reading

  # ── СЦЕНА 2: Маятник чтения — первый, второй, первый, второй ─────────
  - scene_id: ep016_s02
    episode_id: 16
    source_ref: day_04.ep16.drama
    scene_type: narrative
    location: "Зеркальный Город, переулок с двумя плакатами"
    time: "вне времени"
    characters_present: [Марко]
    author_text: >
      Первый. Бежать.

      Второй. Стоять.

      Первый. Второй. Первый. Второй.

      Как маятник. Туда-сюда. Последнее прочитанное всегда побеждает.

      Марко замирает. Отступает на шаг. Смотрит на оба сразу.
    mood: "маятник: последнее слово — последнее решение"
    next_default: ep016_s03
    visual_brief:
      background: "Переулок с двумя плакатами, чуть размытый фон"
      camera: medium
      characters:
        - who: Марко
          expression: испуг от самого себя, зрачки дёргаются
          pose: голова поворачивается влево-вправо, как на ниточке
          position: center
      props: [плакат-крик, плакат-план, пустой воздух между ними]
      focus_object: "взгляд Марко — туда-сюда, как маятник"
      atmosphere: "чтение работает как приказ, а не как информация"
      ui_mode: reading

  # ── СЦЕНА 3: Весы без гирь — Марко пугается себя ─────────────────────
  - scene_id: ep016_s03
    episode_id: 16
    source_ref: day_04.ep16.drama
    scene_type: narrative
    location: "Зеркальный Город, переулок с двумя плакатами"
    time: "вне времени"
    characters_present: [Марко]
    author_text: >
      Это не плакаты решают. Это порядок чтения. Кто прочитан
      последним — тот и прав. Как будто внутри Марко нет собственных
      гирь. Только чужие слова — и какое слово последнее, то и
      перевешивает.

      Он пугается. Не плакатов. Себя.
    mood: "весы без гирь — своя слабость в чистом виде"
    next_default: ep016_s04
    visual_brief:
      background: "Переулок, плакаты размыты по краям, Марко в центре"
      camera: close-up
      characters:
        - who: Марко
          expression: холодный страх, понимание своей слабости
          pose: застыл, руки опущены, плечи напряжены
          position: center
      props: [плакат-крик размыт, плакат-план размыт, телефон с чёрным экраном]
      focus_object: "лицо Марко — впервые он боится не врага, а себя"
      atmosphere: "тишина, в которой слышно собственную слабость"
      ui_mode: reading

  # ── СЦЕНА 4: Софа просыпается — «Я... считала. Ножки» (CHAT) ─────────
  - scene_id: ep016_s04
