        line: "Я... считала."
      - who: Марко
        line: "Ты молчала."
      - who: Софа
        line: "Считала. Ножки."
      - who: Марко
        line: "Какие ножки?"
      - who: Софа
        line: "Табуретки."
    mood: "Софа возвращается — со странным словом"
    next_default: ep016_s04_sofa
    visual_brief:
      background: "Переулок с плакатами, но камера — на экран телефона в руке Марко"
