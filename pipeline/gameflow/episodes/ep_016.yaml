    source_ref: day_04.ep16.cliffhanger
    scene_type: dialogue
    location: "Зеркальный Город, переулок с двумя плакатами"
    time: "вне времени"
    characters_present: [Марко]
    author_text: >
      Марко возвращается к плакатам. Стоит перед ними. Не читает —
      ДУМАЕТ.

      Первый плакат — одна ножка. Второй — одна ножка. Ни один не
      стоит. Ни один не пытается УБЕДИТЬ.

      Если бы София хотела, чтобы Марко побежал спасать — она бы
      дала три ножки. Доверие: «Это я, София, твоя сестра.» Чувства:
      «Мне страшно.» Доказательства: «Вот координаты, проверь.» Одно
      послание. Одна табуретка.

      Но она РАЗДЕЛИЛА способы. Нарочно. Два плаката — два неполных
      послания.
    dialogue:
      - who: Марко
        line: "Это не послание. Это тест."
