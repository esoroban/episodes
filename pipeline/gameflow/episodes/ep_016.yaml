# s04_sofa  — Софа вводит термин «табуретка убеждения» (chat).
#
# СОФА-БЛОК (phone chain — «сбалансировано или нет», 6 квизов):
# s05 — Марко смотрит на первый плакат: одна ножка — пафос (chat + narrative).
# s06 — Марко на второй: одна ножка — логос. «Если бы София хотела...» (chat).
# s07 — Sofa quiz 1: сок + врач + витамины (vote).
# s08 — Sofa quiz 2: «Купи! Все покупают!» (vote).
# s09 — Sofa quiz 3: книжка + учителя + 100 историй (vote).
# s10 — Sofa quiz 4: плакат Голоса «Без Голоса — хаос!» (vote).
# s11 — Sofa quiz 5: «15 лет опыта + отзывы + будете довольны» (vote).
# s11b — Sofa quiz 6: Рей «Голос знает лучше! Я сам был потерян!» (vote).
#
# s11_sofa — правило 16: табуретка убеждения, три ножки, нет баланса —
#            включай подозрение (chat).
#
# ИСПЫТАНИЕ (challenge — «чего не хватает» × 6 + «А или Б» × 2):
# s12 — Марко возвращается к Рекламной улице. Не ЧТО, а СКОЛЬКО НОЖЕК
#       (narrative + Софа в чате).
# s13 — Challenge quiz 1: телефон + 5000 гривен + 50 мегапикселей + блогеры (vote).
# s14 — Challenge quiz 2: кроссовки + тренер + «как в облаках» (vote).
# s15 — Challenge quiz 3: сок + «исследования» + витамин C (vote).
# s16 — Challenge quiz 4: мячи + учитель физкультуры + 200 тестов (vote).
# s17 — Challenge quiz 5: настольная игра + психолог + «взрыв эмоций» (vote).
# s18 — Challenge quiz 6: рюкзак + 290 грамм + «приключение» (vote).
# s19 — Марко: «Табуретке нужна ДРУГАЯ ножка, не та же подлиннее» (narrative + chat).
# s20 — Challenge quiz 7: ночёвка у друга, А или Б (vote).
# s21 — Challenge quiz 8: учитель и контрольная, А или Б (vote).
#
# КЛИФФХЭНГЕР:
# s22       — Марко возвращается к плакатам. «Это не послание. Это тест.»
#             (narrative + dialogue).
# s22_sofa  — Софа: если тест, значит София знает, что Марко здесь. Кто-то
#             ей передаёт. В Городе есть Подполье (chat).
# s23_end   — Воздух сдвинулся. Марко замирает. Число: 36 (cliffhanger).
