          pose: повёрнут к первому плакату
          position: left
      props: [плакат-крик, телефон с пузырём Софы]
      focus_object: "первый плакат — пафос без других ножек"
      atmosphere: "первый диагноз"
      ui_mode: reading

  # ── СЦЕНА 6: Второй плакат = одна ножка (драма + короткий диалог) ────
  - scene_id: ep016_s06
    episode_id: 16
    source_ref: day_04.ep16.sofa_block
    scene_type: narrative
    location: "Зеркальный Город, переулок с двумя плакатами"
    time: "вне времени"
    characters_present: [Марко, Софа]
    author_text: >
      Второй плакат — тоже одна ножка. Доказательства. Логос. Ни одной
      эмоции. Ни одного «я заслуживаю доверия». Только схема.

      Два плаката. Две ножки. По одной на каждый. Ни одна табуретка
      не стоит.
    dialogue:
      - who: Марко
        line: "А если бы София хотела, чтобы я ей поверил?"
      - who: Софа
        line: >
          Использовала бы все три. «Это я, твоя сестра.» «Мне страшно.»
          «Вот факты, проверь.» Три ножки — одно послание.
      - who: Марко
        line: "Но она разделила."
      - who: Софа
        line: "Нарочно."
    mood: "София разделила способы намеренно"
    next_default: ep016_s07
    visual_brief:
      background: "Переулок, второй плакат (план) крупным планом, первый — в расфокусе"
      camera: medium
      characters:
        - who: Марко
          expression: понимание, тихий шок
          pose: повернул голову ко второму плакату
          position: right
      props: [плакат-план, плакат-крик в расфокусе, телефон Марко]
