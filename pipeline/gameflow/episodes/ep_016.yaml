    source_ref: day_04.ep16.drama
    scene_type: dialogue
    location: "Зеркальный Город, переулок с двумя плакатами"
    time: "вне времени"
    characters_present: [Марко, Софа]
    author_text: >
      Экран Софы мигает. Раз. Два. Три.
    dialogue:
