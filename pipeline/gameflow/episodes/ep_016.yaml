      focus_object: "экран Софы: три мигания, потом первый пузырь"
      atmosphere: "Софа впервые ломает собственное молчание"
      ui_mode: dialogue

  # ── СЦЕНА 4_sofa: Табуретка убеждения — образ в голове (драма + Софа) ──
  - scene_id: ep016_s04_sofa
    episode_id: 16
    source_ref: day_04.ep16.sofa_block
    scene_type: narrative
    location: "Зеркальный Город, переулок с двумя плакатами"
    time: "вне времени"
    characters_present: [Марко, Софа]
    author_text: >
      Табуретка. В голове Марко встаёт картинка — обычная деревянная
      табуретка. Три ножки. Убери одну — рухнет.

      Три способа убеждения — доверие, чувства, доказательства. Это
      ножки. Когда все три на месте — убеждение стоит. Когда одна —
      сразу падает.
    dialogue:
      - who: Софа
        line: "БАЛАНС СПОСОБОВ. Три ножки работают вместе — или не работают совсем."
    mood: "термин приходит через простую картинку"
    next_default: ep016_s05
    visual_brief:
      background: "Переулок с двумя плакатами. В кадре — силуэт воображаемой табуретки, наложенный на плакаты"
      camera: medium
      characters:
        - who: Марко
          expression: внимание, мысленное примеривание
          pose: стоит перед плакатами, телефон в опущенной руке
          position: center
      props: [два плаката, силуэт табуретки как наложение, телефон]
      focus_object: "табуретка в голове — простой образ для сложного правила"
      atmosphere: "Марко впервые смотрит на убеждение как на конструкцию"
      ui_mode: reading

  # ── СЦЕНА 5: Первый плакат = одна ножка (пафос, драма) ────────────────
  - scene_id: ep016_s05
    episode_id: 16
    source_ref: day_04.ep16.sofa_block
    scene_type: narrative
    location: "Зеркальный Город, переулок с двумя плакатами"
    time: "вне времени"
    characters_present: [Марко]
    author_text: >
      Марко смотрит на первый плакат. Крик. Мольба. Страх.

      Одна ножка. Чувства. Пафос. Ни одного факта. Ни одного «поверь
      мне, потому что». Только крик.

      Марко переводит взгляд на второй. Спокойно. Расчёт. План.
    mood: "первый плакат — одна ножка"
    next_default: ep016_s06
    visual_brief:
      background: "Переулок, первый плакат (крик) крупным планом"
