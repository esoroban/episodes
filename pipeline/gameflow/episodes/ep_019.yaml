  # ── СЦЕНА 9: Ствол / ветка / листок + формула сути (drama) ───────────
  - scene_id: ep019_s09
    episode_id: 19
    source_ref: day_05.ep19.sofa_block
    scene_type: narrative
    location: "Зеркальный Город, зеркало-портал"
    time: "вне времени"
    characters_present: [Марко]
    author_text: >
      Спор — как дерево. У дерева есть СТВОЛ — центральная идея. Один
      главный вопрос, без которого всё рухнет.

      ВЕТКИ — аргументы, доводы. Объясняют ПОЧЕМУ.

      ЛИСТЬЯ — детали, примеры. Иллюстрируют, но сами по себе не
      доказывают.

      Мамины «заботливые» ответы — это ветки без ствола. «Давай
      поговорим о другом» — ветка, которая уводит. «Все дети выдумывают»
      — листок с ЧУЖОГО дерева. «Я делаю лучше для тебя» — ветка заботы,
      но ствол-то — о другом.

      Когда ствол потерян — спор превращается в кашу. Мама это знает.
      Она увела Марко от ствола пять раз. Не потому что злая. Потому
      что ствол — страшный.

