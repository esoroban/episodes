            correct: false
        correct_logic: "Рисунок по памяти — не фото. Но лучше, чем просто слова. Слабое доказательство."
        feedback_success: "Рисунок по памяти, через день. Не фото — но лучше, чем просто слова. Слабое доказательство."
        feedback_soft_fail: "Рисунок по памяти — не фото. Память искажает. Но это уже кое-что — можно потрогать."
      - interaction_type: choice
        question: "Марко разглядывает рисунок. Дом — похож на их подъезд. Дерево — то самое. А машина — просто прямоугольник с колёсами."
        options:
          - id: examine
            text: "Рассмотреть рисунок подробнее"
            next: ep003_s08_detour
          - id: continue
            text: "Продолжить разговор"
