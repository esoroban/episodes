          expression: волнение
          pose: держит листок дрожащими руками
        - who: Лина
          expression: наблюдает за реакцией
          pose: сидит рядом
      props: [смятый листок с рисунком]
      focus_object: "рисунок — дом, дерево, прямоугольник-машина"
      atmosphere: "первая вещь, которую можно потрогать"
      ui_mode: dialogue

  # ── СЦЕНА 8_sofa: Quiz — доказательство? (CHAT) ─────────────────────
  - scene_id: ep003_s08_sofa
    episode_id: 3
    source_ref: day_01.ep3.drama
    scene_type: quiz
    location: "Школьный двор, скамейка за спортзалом"
    time: "после школы"
    characters_present: [Марко, Софа]
    interactions:
