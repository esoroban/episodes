scenes:

  # ── СЦЕНА 1: Скамейка за спортзалом — Лина рассказывает ──────────────
  - scene_id: ep003_s01
    episode_id: 3
    source_ref: day_01.ep3.drama
    scene_type: dialogue
    location: "Школьный двор, скамейка за спортзалом"
    time: "после школы"
    characters_present: [Марко, Лина]
    author_text: >
      Школьный двор опустел. Ветер гоняет обёртку от чипсов по асфальту.
      Марко и Лина сидят на скамейке за спортзалом — там, где учителя
      не ходят. Лина рассказывает. Быстро, тихо, оглядываясь.
    dialogue:
      - who: Лина
        line: "Её забрали ночью. Я не спала — у нас окна напротив. Увидела свет. Машина. Два человека."
      - who: Марко
        line: "Какая машина?"
      - who: Лина
        line: "Тёмная. Может, синяя. Или чёрная. Было темно."
    author_text_after: >
      Марко кивает. Лина — единственная нить. Единственный человек, который помнит.
      Он слушает, как слушают спасательный канат.
    mood: "напряжённое доверие"
    next_default: ep003_s02
    visual_brief:
      background: "Пустой школьный двор, скамейка за спортзалом, ветер гоняет обёртку"
      camera: medium
      characters:
        - who: Лина
          expression: нервозность, оглядывается
          pose: сидит на скамейке, обняв колени
          position: right
        - who: Марко
          expression: жадное внимание
          pose: наклонился вперёд, слушает
          position: left
      atmosphere: "тайный разговор — двое за стеной мира, который забыл"
      ui_mode: dialogue

  # ── СЦЕНА 2: Лина продолжает — «ночью» и «утром» ────────────────────
  - scene_id: ep003_s02
    episode_id: 3
    source_ref: day_01.ep3.drama
    scene_type: dialogue
    location: "Школьный двор, скамейка за спортзалом"
    time: "после школы"
    characters_present: [Марко, Лина]
    dialogue:
      - who: Лина
        line: "А потом... потом утром её уже не было. Мама твоя вышла, спокойная. Как будто ничего не случилось. Я подошла — спросила: «Где София?» Она посмотрела на меня и сказала: «Какая София?»"
    author_text_after: >
      Марко сжимает лямку рюкзака.
    mood: "нарастающее напряжение"
    next_default: ep003_s03
    visual_brief:
      background: "Скамейка за спортзалом, крупный план"
      camera: close-up
      characters:
        - who: Марко
          expression: сжимает лямку рюкзака, напряжение
          pose: сидит, слушает
        - who: Лина
          expression: говорит быстро, тихо
          pose: наклонилась вперёд
      atmosphere: "мама сказала «какая София?» — мир снова качнулся"
      ui_mode: dialogue

  # ── СЦЕНА 3: Софа quiz 1 — «ночью» и «утром» оба факт? ──────────────
  - scene_id: ep003_s03
    episode_id: 3
    source_ref: day_01.ep3.drama
    scene_type: quiz
    location: "Школьный двор, скамейка за спортзалом"
    time: "после школы"
    characters_present: [Марко, Софа]
    dialogue:
      - who: Софа
        line: "Лина сказала «ночью»... потом «утром». Два разных момента."
    interaction_type: vote
    question: "Лина: «Софию забрали ночью.» Потом: «Утром её уже не было.» Оба утверждения могут быть фактом одновременно?"
    options:
      - id: "yes"
        text: "Да, могут"
        correct: true
      - id: "no"
        text: "Нет, противоречие"
        correct: false
    correct_logic: "Может, видела движение ночью, а утром убедилась — это не противоречие, а два разных момента."
    feedback_success: "Да. Видела ночью — подтвердилось утром. Два момента, не противоречие. Слушай дальше."
    feedback_soft_fail: 'Не спеши. "Ночью увидела" и "утром подтвердилось" — это два разных момента. Оба могут быть правдой.'
    mood: "первая проверка"
    next_default: ep003_s04
    visual_brief:
      background: "Скамейка, экран телефона с текстом Софы"
      camera: close-up
      characters:
        - who: Марко
          expression: задумчивость
          pose: смотрит на телефон
      props: [телефон с треснутым экраном]
      atmosphere: "Софа учит замечать детали в рассказе Лины"
      ui_mode: quiz

  # ── СЦЕНА 4: Драма — «из окна или из машины?» + паттерн отговорок ────
  - scene_id: ep003_s04
    episode_id: 3
    source_ref: day_01.ep3.drama
    scene_type: dialogue
    location: "Школьный двор, скамейка за спортзалом"
    time: "после школы"
    characters_present: [Марко, Лина]
    author_text: >
      Марко убирает телефон. Продолжает слушать.
    dialogue:
      - who: Марко
        line: "А свет в окне — из машины или из квартиры?"
      - who: Лина
        line: "Из... я не помню точно. Было темно. Мне страшно было, поэтому я могла перепутать."
    author_text_after: >
      Заноза. Маленькая, острая. На каждый вопрос Марко — у Лины
      готовое объяснение. «Было темно.» «Мне страшно было.» «Я могла
      перепутать.»
    mood: "заноза — паттерн отговорок"
    next_default: ep003_s05
    visual_brief:
      background: "Скамейка, Лина отводит взгляд"
      camera: medium
      characters:
        - who: Лина
          expression: уклончивость, смотрит в сторону
          pose: обнимает колени
        - who: Марко
          expression: лёгкая настороженность
          pose: повернулся к Лине
      atmosphere: "на каждый вопрос — готовый ответ. Заноза."
      ui_mode: dialogue

  # ── СЦЕНА 5: Софа — история Вити и волшебный камень ──────────────────
  - scene_id: ep003_s05
    episode_id: 3
    source_ref: day_01.ep3.sofa_block
    scene_type: narrative
    location: "Школьный двор, скамейка за спортзалом"
    time: "после школы"
    characters_present: [Марко, Софа]
    dialogue:
      - who: Софа
        line: >
          Лина говорит «я видела своими глазами.» Потом: «было темно,
          я плохо помню.» На каждый вопрос — готовый ответ.
          Знакомый паттерн... Есть такая история.
      - who: Софа
        line: >
          Витя нашёл камень и верит, что камень исполняет желания.
          Загадал хорошую оценку — получил пятёрку. Друзья говорят:
          «Проверим!» Витя загадал — получил тройку. А Витя отвечает:
          «Желание было слишком большое.» Загадал маленькое — не сработало.
          «Камень отдыхал.» Загадал при друзьях — снова ничего. «Камень
          работает только когда никто не смотрит.»
      - who: Софа
        line: >
          На каждую проверку — готовый ответ. Камень нельзя опровергнуть,
          потому что Витя закрывает каждый путь к проверке.
          Это называется ХИТРОЕ УТВЕРЖДЕНИЕ.
      - who: Софа
        line: >
          А каждая причина, которая закрывает путь к проверке —
          «не сегодня», «не при людях», «не сохранилось» — это ОТГОВОРКА.
      - who: Софа
        line: >
          Витя не врун. Он сам верит. Но верить ему на слово — необязательно.
          Ключевой вопрос: «А КАК это можно проверить?»
    author_text_after: >
      Марко опускает телефон. Смотрит на Лину. Она сидит рядом, обняв
      колени. Маленькая. Испуганная. Или — нет?
    mood: "узнавание паттерна"
    next_default: ep003_s06
    visual_brief:
      background: "Скамейка, экран телефона с историей Вити"
      camera: close-up
      characters:
        - who: Марко
          expression: узнавание — паттерн Лины совпадает с Витей
          pose: смотрит на телефон, потом оглядывается на Лину
      props: [телефон с текстом Софы]
      atmosphere: "момент, когда паттерн становится видимым"
      ui_mode: reading

  # ── СЦЕНА 6: Марко переспрашивает Лину (DRAMA) ───────────────────────
  - scene_id: ep003_s06
    episode_id: 3
    source_ref: day_01.ep3.sofa_block
    scene_type: dialogue
    location: "Школьный двор, скамейка за спортзалом"
    time: "после школы"
    characters_present: [Марко, Лина]
    dialogue:
      - who: Марко
        line: "Лина, можно я спрошу ещё раз? Свет — из машины или из квартиры?"
      - who: Лина
        line: "Я же сказала — было темно. Я могла перепутать."
    mood: "первая отговорка Лины"
    next_default: ep003_s06_sofa
    visual_brief:
      background: "Скамейка, Лина повторяет жест — разводит руками"
      camera: medium
      characters:
        - who: Лина
          expression: защитная — «я же сказала»
          pose: разводит руками
        - who: Марко
          expression: заноза — узнал паттерн Вити
          pose: смотрит прямо на Лину
      atmosphere: "паттерн камня Вити — прямо перед глазами"
      ui_mode: dialogue

  # ── СЦЕНА 6_sofa: Quiz — отговорка или объяснение (CHAT) ────────────
  - scene_id: ep003_s06_sofa
    episode_id: 3
    source_ref: day_01.ep3.sofa_block
    scene_type: quiz
    location: "Школьный двор, скамейка за спортзалом"
    time: "после школы"
    characters_present: [Марко, Софа]
    interaction_type: vote
    question: "Лина говорит: «Я видела, но было темно, поэтому не помню деталей.» Нормальное объяснение или отговорка?"
    options:
      - id: excuse
        text: "Отговорка"
        correct: true
      - id: normal
        text: "Нормальное объяснение"
        correct: false
    correct_logic: "Закрывает путь к проверке — нельзя уточнить детали. На каждый вопрос одинаковый ответ."
    feedback_success: "Отговорка. Закрывает путь к проверке — нельзя уточнить ни одну деталь."
    feedback_soft_fail: 'Темно — бывает. Но если на КАЖДЫЙ вопрос один ответ — "было темно" — это закрывает путь к проверке.'
    mood: "распознаём паттерн"
    next_default: ep003_s07
    visual_brief:
      background: "Экран телефона в руке Марко, скамейка на фоне"
      camera: close-up
      characters:
        - who: Марко
          expression: детектив
          pose: смотрит на телефон
      focus_object: "экран телефона — Софа задаёт вопрос"
      atmosphere: "после Лининого «было темно» — Софа предлагает назвать"
      ui_mode: quiz

  # ── СЦЕНА 7: Марко спрашивает про машину (DRAMA) ────────────────────
  - scene_id: ep003_s07
    episode_id: 3
    source_ref: day_01.ep3.sofa_block
    scene_type: dialogue
    location: "Школьный двор, скамейка за спортзалом"
    time: "после школы"
    characters_present: [Марко, Лина]
    dialogue:
      - who: Марко
        line: "А машина точно была? Ты её слышала или только видела?"
      - who: Лина
        line: "Видела. То есть... слышала мотор. Или мне показалось. Было три часа ночи, я сонная была."
    author_text_after: >
      Марко хочет верить. Лина говорит именно то, что он хочет услышать —
      что София была, что её забрали, что это не сон. И Марко привык
      соглашаться с теми, кто говорит то, что хочется услышать.
      Но заноза не уходит.
    mood: "нюанс — не всё отговорка"
    next_default: ep003_s07_sofa
    visual_brief:
      background: "Скамейка, вечереет"
      camera: medium
      characters:
        - who: Лина
          expression: усталость, искренность
          pose: обнимает колени
        - who: Марко
          expression: хочет верить, но заноза
          pose: сидит, сжимает лямку рюкзака
      atmosphere: "нормальное объяснение — но заноза не уходит"
      ui_mode: dialogue

  # ── СЦЕНА 7_sofa: Quiz — сонная или отговорка (CHAT) ────────────────
  - scene_id: ep003_s07_sofa
    episode_id: 3
    source_ref: day_01.ep3.sofa_block
    scene_type: quiz
    location: "Школьный двор, скамейка за спортзалом"
    time: "после школы"
    characters_present: [Марко, Софа]
    interaction_type: vote
    question: "«Я сонная была, поэтому могла перепутать.» Нормальное объяснение или отговорка?"
    options:
      - id: normal
        text: "Нормальное объяснение"
        correct: true
      - id: excuse
        text: "Отговорка"
        correct: false
    correct_logic: "В три часа ночи правда можно быть сонной — это реальная причина. Можно проверить дальше."
    feedback_success: "Нормальное объяснение. В три часа ночи правда можно быть сонной. Одна причина — пока нормально."
    feedback_soft_fail: "Быть сонной в три ночи — реальная причина. Не каждое объяснение — отговорка. Но если каждый раз новая — тогда да."
    mood: "нюанс"
    next_default: ep003_s08
    visual_brief:
      background: "Экран телефона в руке Марко, скамейка на фоне"
      camera: close-up
      characters:
        - who: Марко
          expression: детектив
          pose: смотрит на телефон
      atmosphere: "Софа разграничивает — не каждая причина отговорка"
      ui_mode: quiz

  # ── СЦЕНА 8: Лина достаёт рисунок (DRAMA) ───────────────────────────
  - scene_id: ep003_s08
    episode_id: 3
    source_ref: day_01.ep3.drama
    scene_type: dialogue
    location: "Школьный двор, скамейка за спортзалом"
    time: "после школы"
    characters_present: [Марко, Лина]
    author_text: >
      Лина достаёт из кармана смятый листок. Рисунок. Кривые линии —
      дом, дерево, фигурка у машины.
    dialogue:
      - who: Лина
        line: "Я нарисовала на следующий день. По памяти. Чтобы не забыть."
    author_text_after: >
      Марко берёт листок. Руки чуть дрожат. Первое доказательство.
      Первая вещь, которую можно потрогать.
    mood: "первая физическая улика"
    next_default: ep003_s08_sofa
    visual_brief:
      background: "Крупный план смятого листка в руках Марко"
      camera: close-up
      characters:
