episode_id: 3
episode_title: "Хитрые утверждения"
lesson: "1B.1, 1B.2"
terms_introduced: ["хитрое утверждение", "отговорка", "инструменты проверки"]
terms_used: ["факт", "мнение", "неправда"]

enter_requires:
  flags: [sofa_activated]
  previous_episode: 2

previously: >
  Софа помогала Марко разбираться в школьных сплетнях — фейки в чате,
  мнения, которые притворяются фактами. Вера дважды попросила принести
  дневник: «За тебя переживаю.» Марко не отдал. Лина ждала у ворот:
  «Мне нужно рассказать, как её забирали.» Но детали путаются.

scenes:

  # ── СЦЕНА 1: Скамейка за спортзалом ───────────────────────────────
  - scene_id: ep003_s01
    episode_id: 3
    source_ref: day_01.ep3.drama
    scene_type: dialogue
    location: "Школьный двор, скамейка за спортзалом"
    time: "после школы"
    characters_present: [Марко, Лина, Софа]
    dialogue:
      - who: Лина
        line: "Её забрали ночью. Я не спала — у нас окна напротив. Увидела свет. Машина. Два человека."
      - who: Марко
        line: "Какая машина?"
      - who: Лина
        line: "Тёмная. Может, синяя. Или чёрная. Было темно."
    author_text: >
      Школьный двор опустел. Ветер гоняет обёртку. Марко и Лина сидят
      на скамейке за спортзалом. Лина — единственная нить. Марко слушает,
      как слушают спасательный канат.
    mood: "напряжённое доверие"
    next_default: ep003_s02
    visual_brief:
      background: "Скамейка за спортзалом, пустой двор, ветер"
      camera: medium
      characters:
        - who: Лина
          expression: нервозность, оглядывается
          pose: сидит на скамейке, обняв колени
          position: right
        - who: Марко
          expression: жадное внимание
          pose: наклонился вперёд, слушает
          position: left
      atmosphere: "тайный разговор — двое за стеной мира, который забыл"
      ui_mode: dialogue

  # ── СЦЕНА 2: История Вити — хитрое утверждение ────────────────────
  - scene_id: ep003_s02
    episode_id: 3
    source_ref: day_01.ep3.sofa_block
    scene_type: narrative
    location: "Школьный двор, скамейка"
    time: "после школы"
    characters_present: [Марко, Софа]
    dialogue:
      - who: Софа
        line: >
          Лина говорит «я видела своими глазами.» Потом:
          «было темно, я плохо помню.» На каждый вопрос — готовый ответ.
          Знакомый паттерн... Есть такая история.
      - who: Софа
        line: >
          Витя нашёл камень и верит, что камень исполняет желания.
          Загадал хорошую оценку — получил пятёрку. Друзья: «Проверим!»
          Загадал — тройка. «Желание слишком большое.»
          Загадал маленькое — не сработало. «Камень отдыхал.»
          При друзьях — ничего. «Камень работает, когда никто не смотрит.»
      - who: Софа
        line: >
          На каждую проверку — готовый ответ. Это ХИТРОЕ УТВЕРЖДЕНИЕ.
          А причина, которая закрывает путь к проверке — ОТГОВОРКА.
    mood: "узнавание паттерна"
    next_default: ep003_s03
    visual_brief:
      background: "Скамейка, экран телефона с историей Вити"
      camera: close-up
      characters:
        - who: Марко
          expression: узнавание
          pose: смотрит на телефон, потом на Лину
      props: [телефон с текстом Софы]
      atmosphere: "момент, когда паттерн становится видимым"
      ui_mode: reading

  # ── СЦЕНА 3: Quiz — отговорка или объяснение ──────────────────────
  - scene_id: ep003_s03
    episode_id: 3
    source_ref: day_01.ep3.sofa_block
    scene_type: quiz
    location: "Школьный двор, скамейка"
    time: "после школы"
    characters_present: [Марко, Лина, Софа]
    mood: "трудный выбор"
    interactions:
      - interaction_type: vote
        question: "Лина: «Я видела, но было темно, поэтому не помню деталей.» Нормальное объяснение или отговорка?"
        options:
          - id: excuse
            text: "Отговорка"
            correct: true
          - id: normal
            text: "Нормальное объяснение"
            correct: false
        correct_logic: "Закрывает путь к проверке — нельзя уточнить ни одну деталь."
        feedback_success: "Софа: «Отговорка — каждый раз новая причина не давать деталей.»"
        feedback_soft_fail: "Софа: «Одна причина — может быть нормально. Но на КАЖДЫЙ вопрос?»"
      - interaction_type: choice
        question: "Марко замечает листок в кармане Лины."
        options:
          - id: ask_drawing
            text: "Спросить про рисунок"
            next: ep003_s03_detour
          - id: continue
            text: "Продолжить разговор"
            next: ep003_s04
    next_default: ep003_s04
    next_fail: ep003_s03
    visual_brief:
      background: "Скамейка за спортзалом"
      camera: medium
      characters:
        - who: Лина
          expression: защита, объяснение
          pose: обнимает колени
        - who: Марко
          expression: внутренний конфликт
          pose: смотрит на Лину с сомнением
      atmosphere: "хочется верить — но заноза не уходит"
      ui_mode: quiz

  # ── СЦЕНА 3d: Flavor detour — рисунок Лины ────────────────────────
  - scene_id: ep003_s03_detour
    episode_id: 3
    source_ref: day_01.ep3.drama
    scene_type: narrative
    location: "Школьный двор, скамейка"
    time: "после школы"
    characters_present: [Марко, Лина, Софа]
    branch_type: flavor_detour
    author_text: >
      Лина достаёт из кармана смятый листок. Рисунок. Кривые линии —
      дом, дерево, фигурка у машины. «Я нарисовала на следующий день.
      По памяти. Чтобы не забыть.» Марко берёт листок.
      Руки чуть дрожат. Дом — похож на подъезд. Дерево — то самое.
      А машина — просто прямоугольник с колёсами.
    dialogue:
      - who: Софа
        line: "Рисунок — это уже кое-что. Но рисунок по памяти, через день. Можно ли по рисунку ПРОВЕРИТЬ, была ли машина?"
    mood: "хрупкая улика"
    merge_to: ep003_s04
    next_default: ep003_s04
    set_flags: [marko_saw_drawing]
    visual_brief:
      background: "Скамейка, крупный план смятого листка"
      camera: close-up
      characters:
        - who: Марко
          expression: волнение
          pose: держит листок дрожащими руками
      props: [смятый листок с детским рисунком: дом, дерево, прямоугольник-машина]
      focus_object: "рисунок — кривые линии, но знакомый двор"
      atmosphere: "первое вещественное доказательство — слабое, но осязаемое"
      ui_mode: reading

  # ── СЦЕНА 4: Марко проверяет Лину ─────────────────────────────────
  - scene_id: ep003_s04
    episode_id: 3
    source_ref: day_01.ep3.drama
    scene_type: dialogue
    location: "Школьный двор, скамейка"
    time: "после школы"
    characters_present: [Марко, Лина, Софа]
    dialogue:
      - who: Марко
        line: "Лина, а ты рассказывала кому-нибудь ещё?"
      - who: Лина
        line: "Нет. Нельзя."
      - who: Марко
        line: "Почему?"
      - who: Лина
        line: "Они слушают. Если расскажу — будет хуже."
    author_text: >
      На каждый вопрос Марко — у Лины причина не отвечать.
      «Нельзя.» «Они слушают.» «Будет хуже.»
    mood: "нарастающее сомнение"
    interaction_type: vote
    question: "«Я не могу рассказать, потому что они слушают.» Нормальное объяснение или отговорка?"
    options:
      - id: normal
        text: "Нормальное"
        correct: false
      - id: excuse
        text: "Отговорка"
        correct: false
      - id: border
        text: "На границе — может быть правда, а может отговорка"
        correct: true
    correct_logic: "Может быть правда страшно — а может, закрывает путь к проверке. Пока нельзя определить."
    feedback_success: "Софа: «На границе. Один раз — может быть правда. Каждый раз — паттерн.»"
    feedback_soft_fail: "Софа: «Бывает ли, что человеку ПРАВДА страшно? Да. Но если каждый вопрос — новая причина не отвечать?»"
    next_default: ep003_s05
    next_fail: ep003_s04
    visual_brief:
      background: "Скамейка, Лина дёргает травинку"
      camera: medium
      characters:
        - who: Лина
          expression: закрытость, страх или игра
          pose: дёргает травинку из щели
        - who: Марко
          expression: сомнение, нежелание сомневаться
          pose: смотрит на Лину
      atmosphere: "правда или спектакль — Марко не может отличить"
      ui_mode: quiz

  # ── СЦЕНА 5: Пять инструментов ────────────────────────────────────
  - scene_id: ep003_s05
    episode_id: 3
    source_ref: day_01.ep3.sofa_block
    scene_type: narrative
    location: "Школьный двор, скамейка"
    time: "после школы"
    characters_present: [Марко, Софа]
    dialogue:
      - who: Софа
        line: >
          Детали уходят — так работает память. Но есть вещи, которые
          не зависят от памяти. Пять помощников: весы, линейка, часы,
          термометр, счёт. Если есть инструмент и можно получить ЧИСЛО —
          утверждение проверяемое.
    author_text: >
      «Килограммы, градусы, секунды, метры, штуки. Число не обманет.
      А "лучший", "скучный", "красивый" — это про чувства.
      Нет "лучшемера". Приборов для чувств не существует.»
    mood: "вооружение знанием"
    next_default: ep003_s06
    visual_brief:
      background: "Скамейка, Софа на экране — схема пяти инструментов"
      camera: close-up
      characters:
        - who: Марко
          expression: внимание, запоминание
          pose: смотрит на экран
      props: [экран телефона с иконками: весы, линейка, часы, термометр, пальцы-счёт]
      focus_object: "пять иконок-инструментов на экране"
      atmosphere: "получение оружия — теперь есть чем проверять"
      ui_mode: reading

  # ── СЦЕНА 6: Quiz — есть инструмент или нет ───────────────────────
  - scene_id: ep003_s06
    episode_id: 3
    source_ref: day_01.ep3.challenge
    scene_type: quiz
    location: "Школьный двор"
    time: "после школы"
    characters_present: [Марко, Софа]
    interaction_type: vote
    question: "«Фургон длиннее скамейки.» Есть инструмент проверки или нет?"
    options:
      - id: yes
        text: "Есть — рулетка"
        correct: true
      - id: no
        text: "Нет инструмента"
        correct: false
    correct_logic: "Линейка/рулетка — измерить скамейку, сравнить с размерами фургона."
    feedback_success: "Софа: «Верно! Рулетка — инструмент. Число не обманет.»"
    feedback_soft_fail: "Софа: «Можно ли измерить длину? Каким инструментом?»"
    mood: "практика"
    next_default: ep003_s07
    next_fail: ep003_s06
    visual_brief:
      background: "Школьный двор, скамейка"
      camera: medium
      characters:
        - who: Марко
          expression: сосредоточенность
          pose: записывает в тетрадку
      props: [тетрадка с записями, рюкзак]
      atmosphere: "превращение в детектива — записывает, проверяет"
      ui_mode: quiz

  # ── СЦЕНА 7: Окно vs балкон ───────────────────────────────────────
  - scene_id: ep003_s07
    episode_id: 3
    source_ref: day_01.ep3.challenge
    scene_type: dialogue
    location: "Школьный двор, скамейка"
    time: "после школы"
    characters_present: [Марко, Лина, Софа]
    dialogue:
      - who: Марко
        line: "А ты из окна видела или вышла на улицу?"
      - who: Лина
        line: "Из окна. Точно из окна."
      - who: автор
        line: "Через десять минут Марко спрашивает снова — как будто невзначай."
      - who: Марко
        line: "А ты из окна видела или с балкона?"
      - who: Лина
        line: "С балкона. У нас балкон на ту сторону..."
    author_text: >
      Из окна. С балкона. Два разных ответа на один вопрос.
    mood: "пойманное несовпадение"
    interaction_type: vote
    question: "Лина сказала «из окна», потом «с балкона». Это значит, что она врёт?"
    options:
      - id: lies
        text: "Да, врёт"
        correct: false
      - id: not_sure
        text: "Не обязательно — но нужно проверять дальше"
        correct: true
    correct_logic: "Может путать от страха — но несовпадение это факт. Проверяй дальше."
    feedback_success: "Софа: «Несовпадение — не ложь. Но факт. Проверяй дальше.»"
    feedback_soft_fail: "Софа: «Может ли человек путать от страха? Да. Значит ли это, что не нужно проверять? Нет.»"
    next_default: ep003_s08
    next_success: ep003_s08
    next_fail: ep003_s07_fail
    visual_brief:
      background: "Скамейка, вечереет"
      camera: medium
      characters:
        - who: Лина
          expression: замешательство, пальцы на молнии
          pose: теребит молнию куртки
        - who: Марко
          expression: тихая настороженность
          pose: смотрит прямо на Лину
      atmosphere: "маленькая трещина в рассказе — Марко впервые проверяет сам"
      ui_mode: quiz

  # ── СЦЕНА 7f: Soft fail ───────────────────────────────────────────
  - scene_id: ep003_s07_fail
    episode_id: 3
    source_ref: day_01.ep3.challenge
    scene_type: feedback
    location: "Школьный двор"
    time: "после школы"
    characters_present: [Марко, Софа]
    branch_type: soft_fail_loop
    dialogue:
      - who: Софа
        line: >
          Подумай: несовпадение — это закономерность. Но одно
          несовпадение — ещё не ложь. Человек может правда путать
          от страха. Что нужно делать? Проверять дальше.
    mood: "мягкая корректировка"
    merge_to: ep003_s07
    next_default: ep003_s07
    visual_brief:
      background: "Скамейка, Софа на экране"
      camera: close-up
      characters:
        - who: Софа
          expression: терпеливость
          pose: текст подсказки
      atmosphere: "нюанс — не всё чёрное или белое"
      ui_mode: feedback

  # ── СЦЕНА 8: Правило третье ───────────────────────────────────────
  - scene_id: ep003_s08
    episode_id: 3
    source_ref: day_01.ep3.sofa_block
    scene_type: narrative
    location: "Школьный двор"
    time: "вечер"
    characters_present: [Марко, Лина, Софа]
    dialogue:
      - who: Лина
        line: "Я не вру, Марко. Я правда видела."
      - who: Марко
        line: "Я знаю."
      - who: Софа
        line: >
          Правило третье. Если на каждую проверку есть отговорка —
          верить на слово необязательно. Спроси: «А КАК это можно
          проверить?» Если ответ — «никак» — это хитрое утверждение.
    author_text: >
      Марко почти верит. Почти. Он не хочет спрашивать «а как проверить» —
      потому что боится: если Лина не сможет ответить, нить оборвётся.
      А нить — единственная.
    mood: "страх правды"
    next_default: ep003_s09
    visual_brief:
      background: "Скамейка, сумерки, ветер"
      camera: wide
      characters:
        - who: Лина
          expression: усталость, искренность или актёрство
          pose: обняла колени, смотрит на Марко
        - who: Марко
          expression: почти-вера, тень сомнения
          pose: сидит рядом, руки на коленях
      atmosphere: "два ребёнка против мира, который забыл — но один из них, может быть, тоже часть загадки"
      ui_mode: reading

  # ── СЦЕНА 9: Клиффхэнгер — дверь в парке ──────────────────────────
  - scene_id: ep003_s09
    episode_id: 3
    source_ref: day_01.ep3.cliffhanger
    scene_type: cliffhanger
    location: "Парк"
    time: "вечер"
    characters_present: [Марко, Лина, Софа]
    dialogue:
      - who: Лина
        line: "Пойдём. Я знаю, где дверь."
      - who: Марко
        line: "Какая дверь?"
      - who: Лина
        line: "Дверь, через которую её забрали. Она в парке. Ты не увидишь — но она там."
      - who: Софа
        line: "Дверь... обнаружена. Но ты не готов. Нужен следующий урок."
    author_text: >
      Лина идёт, не оглядываясь. Марко стоит. Рюкзак на плече.
      Лина говорит «я знаю» — уверенно, как мама утром. Как Вера.
      Ноги не хотят идти. Но Лина уже далеко.
      Марко идёт следом. Экран гаснет.
    mood: "тяга в неизвестность"
    next_default: ep004_s01
    visual_brief:
      background: "Парк, аллея уходит в сумерки, кусты, забор вдалеке"
      camera: wide
      characters:
        - who: Лина
          expression: уверенность, спина к зрителю
          pose: идёт вперёд, не оглядываясь
          position: right
        - who: Марко
          expression: нерешительность
          pose: стоит, рюкзак на плече
          position: left
      atmosphere: "дорога в неизвестное — Лина зовёт, Софа предупреждает"
      ui_mode: dialogue
