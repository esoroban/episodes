  - scene_id: ep014_s08
    episode_id: 14
    source_ref: day_04.ep14.sofa_block
    scene_type: narrative
    location: "Зеркальный Город, Рекламная улица (у колонны)"
    time: "день"
    characters_present: [Марко]
    author_text: >
      Поза — дверь. Но двери — разные. И есть ещё четыре канала,
      и каждый говорит своё.

      ЖЕСТЫ. Движения руками. Рука указывает направление. Рука сжата
      в кулак. Рука ложится на плечо. Одно движение — одно предложение
      без слов.

      МИМИКА. Лицо — как экран телефона: все уведомления видны сразу.
      Радость, грусть, злость, удивление, страх — читаются за секунду.

      ИНТОНАЦИЯ. КАК человек говорит. Одно слово — три разных смысла.
      Громкость, темп, высота, паузы — четыре ручки настройки на одном
      звуке.

      И шестой — САРКАЗМ. Оружие солдата. Говоришь одно — имеешь в
      виду противоположное. Специально делая неприятно.

      Марко смотрит на Рея сквозь колонну. На толпу. На чужие руки,
      чужие лица, чужие голоса. Шесть каналов. Шесть способов, которыми
      тело говорит правду, пока рот врёт.
    mood: "шесть каналов — собрано"
    next_default: ep014_s08_sofa
    visual_brief:
      background: "Колонна, сцена вдали, толпа. Марко у колонны"
      camera: medium
      characters:
        - who: Марко
          expression: собранность, уверенность
          pose: у колонны, телефон в руке
          position: left
      props: [колонна, сцена, фигуры толпы, телефон]
      focus_object: "Марко с новым набором инструментов — готов смотреть"
      atmosphere: "четыре инструмента собраны"
      ui_mode: reading

