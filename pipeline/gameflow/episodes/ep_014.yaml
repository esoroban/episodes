          expression: прищур, раскрытие тайны
          pose: стоит у билборда, читает
          position: center
      props: [билборд, мелкие приписки маркером, колонна рядом]
      focus_object: "мелкие приписки чёрным маркером в углу билборда"
      atmosphere: "громкое и тихое на одном плакате — первое противоречие"
      ui_mode: reading

  # ── СЦЕНА 2: Рей на сцене — «Город заботится» ────────────────────────
  - scene_id: ep014_s02
    episode_id: 14
    source_ref: day_04.ep14.drama
    scene_type: dialogue
    location: "Зеркальный Город, Рекламная улица (у сцены)"
    time: "день"
    characters_present: [Марко, Рей, толпа]
    author_text: >
      Марко подходит ближе — но остаётся в тени колонны. С этого места
      видно и сцену, и лица в толпе.
    dialogue:
      - who: Рей
        line: "Друзья!"
      - who: автор
        line: >
          Голос звонкий, уверенный. Рукой делает широкий жест — как
          будто обнимает всю улицу.
      - who: Рей
        line: "Город заботится о нас! Каждый день — безопаснее, чем вчера!"
      - who: Рей
        line: "Каждый из вас — важен! Голос слышит КАЖДОГО!"
      - who: автор
        line: >
          Толпа аплодирует. Дети. Подростки. Несколько взрослых.
    author_text_after: >
      Марко включает ГЛАЗ — ещё не по команде, просто по привычке.

      Рей улыбается — широко. Но пальцы правой руки сжаты в кулак.
      Левая — в кармане. Говорит «мы все свободны» — а плечи подняты
      к ушам. Как будто ждёт удара сверху.

      Слова — красивые. Тело — кричит. Фальшиво, как музыка в
      неправильной тональности. Красиво — но не так.

      Рей. Около тридцати — взрослый, харизматичный шоумен.
      Глашатай Голоса. Тот, кто стоит выше толпы и говорит за всех.
    mood: "слова сияют, тело — трещит"
    next_default: ep014_s03
    visual_brief:
      background: "Сцена с фонарями, Рей в чёрной блестящей куртке на сцене, толпа перед сценой. Колонна слева — за ней Марко"
      camera: medium
      characters:
        - who: Рей
          expression: широкая белозубая улыбка, глаза блестящие
          pose: на сцене, правая рука широко раскинута, левая — в кармане, плечи подняты
          position: center
        - who: толпа
          expression: восторг, аплодисменты
          pose: стоит лицом к сцене, часть хлопает
          position: right
        - who: Марко
          expression: прищур, наблюдение
          pose: у колонны, прячется наполовину
          position: left
      props: [сцена, фонари, микрофон в руке Рея, колонна, телефон в руке Марко]
      focus_object: "кулак правой руки Рея — сжат, не подходит к улыбке"
      atmosphere: "спектакль, в котором актёр не верит себе"
      ui_mode: reading

  # ── СЦЕНА 3: Шесть каналов — Марко учится видеть детали (драма) ──────
  - scene_id: ep014_s03
    episode_id: 14
    source_ref: day_04.ep14.sofa_block
    scene_type: narrative
    location: "Зеркальный Город, Рекламная улица (у колонны)"
    time: "день"
    characters_present: [Марко]
    author_text: >
      Марко прижимается к колонне. С этого места видно не только сцену,
      но и толпу. Десятки лиц. Десятки тел. Каждое что-то говорит —
      без единого слова.

      ГЛАЗ видит общую картину: совпадают слова и тело или нет. Но
      настоящий разведчик видит ДЕТАЛИ. А деталей — шесть.

      Первое: ЗРИТЕЛЬНЫЙ КОНТАКТ. Глаза как фонарик, направленный на
      человека. «Я тебя слушаю. Мне важно. Я не боюсь.» Куда смотрят
      глаза — там и внимание.

      Второе: ПОЗА. Как дверь. ОТКРЫТАЯ — руки свободны, тело
      повёрнуто к человеку. Дверь нараспашку. ЗАКРЫТАЯ — руки скрещены
      на груди, тело отвёрнуто. Дверь на замке.

      Марко смотрит на Рея. На первый ряд. На мальчика со скрещёнными
      руками в середине толпы. Кто открыл дверь — кто запер на замок?
    mood: "разведчик учится видеть детали"
    next_default: ep014_s04
    visual_brief:
      background: "Толпа перед сценой, Марко у колонны. В кадре — разные лица и позы из толпы"
