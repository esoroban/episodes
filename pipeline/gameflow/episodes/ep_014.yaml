  # ── СЦЕНА 1: Рекламная улица. Шум, билборды, сцена вдали ─────────────
  - scene_id: ep014_s01
    episode_id: 14
    source_ref: day_04.ep14.drama
    scene_type: narrative
    location: "Зеркальный Город, Рекламная улица"
    time: "день"
    characters_present: [Марко, толпа]
    author_text: >
      Шум. Впервые за два дня в Городе — шум. Голоса, музыка, аплодисменты.
      Марко выходит из переулка на широкую улицу — и замирает.

      Билборды. Десятки. На каждом — лицо Голоса. Тёплые карие глаза.
      Улыбка. Подписи: «МЫ ВСЕ ДОВОЛЬНЫ. ПРИСОЕДИНЯЙСЯ.» «ГОЛОС ЗНАЕТ
      ЛУЧШЕ.» «ТЫ В БЕЗОПАСНОСТИ.»

      Рекламная улица. Как торговый центр — но вместо товаров продают
      согласие.

      В конце улицы — сцена. Деревянная. Фонари. И на ней — парень.
      Пятнадцать лет, может шестнадцать. Высокий. Куртка — чёрная,
      блестящая. Волосы — аккуратно уложены. Улыбка — широкая,
      белозубая.

      Рей.
    mood: "шум после тишины, город продаёт согласие"
    interaction_type: choice
    question: "Как подойти?"
    options:
      - id: closer
        text: "Пройти ближе к сцене — прочитать билборды"
        next: ep014_s01b
      - id: edge
        text: "Наблюдать с периферии, из-за колонны"
        next: ep014_s02
    next_default: ep014_s02
    visual_brief:
      background: "Широкая улица Зеркального Города. По обе стороны — ряды билбордов с лицом Голоса. В конце улицы — деревянная сцена под фонарями, на ней фигура Рея. Толпа людей перед сценой"
      camera: wide
      characters:
        - who: Марко
          expression: настороженное замирание
          pose: стоит у входа в переулок, вытянулся
          position: left
        - who: толпа
          expression: воодушевление, улыбки
          pose: стоит лицом к сцене, часть аплодирует
          position: center
      props: [билборды с лицом Голоса, надписи «МЫ ВСЕ ДОВОЛЬНЫ», фонари над сценой, деревянные доски сцены]
      focus_object: "ряды билбордов — одно и то же лицо повторяется десятки раз"
      atmosphere: "шум, музыка и лозунги — город, который заглушает сомнения"
      ui_mode: choice

  # ── СЦЕНА 1b: Detour — ближе к сцене, билборды крупным планом ────────
  - scene_id: ep014_s01b
    episode_id: 14
    source_ref: day_04.ep14.drama
    scene_type: narrative
    location: "Зеркальный Город, Рекламная улица (под билбордом)"
    time: "день"
    characters_present: [Марко]
    branch_type: flavor_detour
    author_text: >
      Марко проходит вдоль ряда билбордов. Надписи одинаковые, но
      шрифт — разный. Как будто их делал кто-то, кто очень спешил и
      не думал.

      «ТЫ В БЕЗОПАСНОСТИ.» — крупно. В углу, мелко, почти стёрто:
      «...если не задаёшь вопросов.»

      На следующем: «ГОЛОС ЗНАЕТ ЛУЧШЕ.» И снова в уголке, совсем
      маленько: «...чем ты сам о себе.»

      Приписки — как будто кто-то добавил их позже. Рукой. Чёрным
      маркером.

      Марко отходит к колонне. В голове крутится: красивые слова
      сверху — мелкие приписки снизу. Слова могут говорить
      противоположное. Одновременно.
    mood: "приписки-шёпот под громкими лозунгами"
    merge_to: ep014_s02
    next_default: ep014_s02
    visual_brief:
      background: "Крупный план билборда: громкая надпись «ТЫ В БЕЗОПАСНОСТИ», в углу мелкими буквами «...если не задаёшь вопросов»"
      camera: close-up
      characters:
