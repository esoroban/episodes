    source_ref: day_04.ep14.cliffhanger
    scene_type: narrative
    location: "Зеркальный Город, Рекламная улица (у колонны)"
    time: "вечер"
    characters_present: [Марко, Рей]
    author_text: >
      Толпа расходится. Аплодисменты затихают. Фонари на сцене
      мигают.

      Рей стоит один. Марко наблюдает из-за колонны.

      Рей снимает улыбку. Как маску — аккуратно, привычно. Плечи
      падают. Руки — больше не в карманах, не раскинуты для публики.
      Дрожат. Рей поднимает правую руку и смотрит на запястье.

      Число. Марко не видит цифру — но видит лицо Рея. Страх.
      Настоящий. Губы — белые. Глаза — широко открытые. Как у
      человека, который смотрит на обратный отсчёт.

      Рей — не верующий. Рей — пленник. Голос не вдохновляет его —
      Голос ДЕРЖИТ его. Как держит всех.
    mood: "маска снята — под ней страх"
