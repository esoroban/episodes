          position: left
      props: [колонна, сцена на заднем плане, фигуры толпы, телефон в руке]
      focus_object: "толпа — мозаика открытых и закрытых дверей"
      atmosphere: "Марко впервые смотрит на людей как на мозаику деталей"
      ui_mode: reading

