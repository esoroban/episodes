    location: "Зеркальный Город, ступени у подвала Леона"
    time: "утро"
    characters_present: [Марко, Лина]
    author_text: >
      Марко молчит.

      Не потому что не заметил. Не потому что испугался.
      Не потому что привык соглашаться.

      Он молчит — потому что решил.

      Разведчик не кричит «Ага! Попалась!». Разведчик не хватается
      за щит. Разведчик — запоминает. Записывает в блокнот.
      Улыбается. И продолжает наблюдать.

      «Мир», — говорит Марко. И улыбается.
    mood: "разведчик молчит — и это решение"
