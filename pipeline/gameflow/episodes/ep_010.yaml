  # ── СЦЕНА 17: Осмысление (BREAKS CHAIN) ──────────────────────────────
  - scene_id: ep010_s17
    episode_id: 10
    source_ref: day_03.ep10.challenge
    scene_type: narrative
    location: "Зеркальный Город, ступени у подвала Леона"
    time: "утро"
    characters_present: [Марко]
    author_text: >
      Марко кивает. «Хорошо», — говорит он. И чувствует себя — правильно.
      Тепло. Как будто поступил верно.

      Вера встаёт. Гладит Марко по голове. Улыбается Лине. Поднимается
      по лестнице. Каблуки стучат — всё тише, тише.

      Тишина.

      Марко сидит и чувствует правильность. Тёплую, мягкую, удобную.
      Как одеяло. Но — под одеялом что-то колет. Маленькое. Острое.
      Как заноза.

      Вера сказала «уступи первым». Это значит — если Лина неправа,
      а Марко прав — всё равно уступи? Потому что «зрелость»?
      Но разведчик не уступает и не побеждает. Разведчик — исследует.
