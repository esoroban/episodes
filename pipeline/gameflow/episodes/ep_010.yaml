  # ── СЦЕНА 1: Утро. Марко на ступенях ────────────────────────────────
  - scene_id: ep010_s01
    episode_id: 10
    source_ref: day_03.ep10.drama
    scene_type: narrative
    location: "Зеркальный Город, ступени у подвала Леона"
    time: "утро"
    characters_present: [Марко]
    author_text: >
      Утро. Марко сидит на ступенях у входа в подвал Леона. Рюкзак
      на коленях. Пальцы сжимают лямку.

      Вчерашняя ссора с Линой — как осколок, застрявший под рёбрами.
      Он помнит каждое слово. «Без артефактов мы ничего не найдём!» —
      кричала она. «Артефакты стирают память о Софии!» — кричал он.
      Оба хотели победить. Оба проиграли.

      Марко знает: он был прав. Артефакты опасны. Но Лина тоже была
      права — без артефактов они слепые. Знает — и ничего не может
      с этим сделать. Потому что вчера он не думал. Он кричал.
    mood: "осколок вчерашней ссоры"
    next_default: ep010_s02
    visual_brief:
      background: "Зеркальный Город, ступени у подвала Леона, утро, фиолетовый свет"
      camera: medium
      characters:
        - who: Марко
          expression: вина, задумчивость
          pose: сидит на ступенях, рюкзак на коленях
          position: center
      props: [рюкзак, ступени подвала, дверь Леона]
      focus_object: "пальцы на лямке рюкзака — сжимают"
      atmosphere: "утро после ссоры — осколок под рёбрами"
      ui_mode: reading

