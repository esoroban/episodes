          pose: делает шаг сквозь туман
          position: center
        - who: Лина
          expression: знающий, серьёзный взгляд
          pose: уже стоит на школьной лестнице
          position: right
      props: [туман на ступенях, дверь кабинета Веры приоткрыта, знакомые стены школы]
      focus_object: "граница между мирами — один шаг"
      atmosphere: "тонкое место — Лина знает больше, чем говорит"
      ui_mode: reading

  # ── СЦЕНА 16: Вера — «Уступи первым» (CHOICE) ───────────────────────
  - scene_id: ep010_s16
    episode_id: 10
    source_ref: day_03.ep10.drama
    scene_type: dialogue
    location: "Школа, коридор у кабинета Веры Андреевны"
    time: "утро"
    characters_present: [Марко, Лина, Вера]
    author_text: >
      Шаги. Тихие, размеренные. Каблуки по линолеуму.

      Вера Андреевна выходит из кабинета. Серый кардиган, мягкие глаза,
      тонкая цепочка на шее. Школа — своя, настоящая. Но Марко всё ещё
      помнит фиолетовое небо за спиной — как будто оно где-то рядом,
      за толщиной одного шага.
    dialogue:
      - who: Вера
        line: "Я слышала, вы поссорились вчера. Как вы?"
      - who: Марко
        line: "Мы... помирились."
      - who: Вера
        line: >
          Помирились? Это замечательно. Но Марко, я хочу тебе сказать
          кое-что важное. Ты старше. Может быть, не по годам, но по
          ответственности. Ты ведёшь. И когда двое ссорятся — тот,
          кто уступает первым, не слабый. Он — взрослый. Понимаешь?
          Уступить первым — это зрелость.
    author_text_after: >
      Слова тёплые. Правильные. Марко хочет кивнуть. Привычка — как
      пружина внутри, которая сама толкает голову вниз. Вера добрая.
