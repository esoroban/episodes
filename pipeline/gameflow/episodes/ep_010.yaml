  - scene_id: ep010_s14_retro
    episode_id: 10
    source_ref: day_03.ep10.drama
    scene_type: narrative
    location: "Воспоминание: вчера, улица у дома Леона"
    time: "воспоминание"
    characters_present: [Марко]
    author_text: >
      Вчерашний спор поднимается в голове — слово в слово. Марко
      слышит собственный голос: «Артефакты опасны — и точка!»

      Он сам слышит это как солдата. Крепость, щит, точка, конец
      разговора. Мог бы сказать иначе? Марко мысленно пробует:
      «Артефакты стирают память — давай подумаем, как пользоваться
      ими безопасно.»

      Та же правда. Но с приоткрытыми воротами. Разведчик. И он бы
      узнал больше — про самого себя, про Лину, про артефакты.

      Правило оформляется само. Десятое по счёту — если считать от
      первого вопроса детектива. Солдат защищает крепость — может
      быть прав случайно. Разведчик исследует мир — прав осознанно.
      Два вопроса перед любым спором: «Я хочу победить, понять или
      обидеть?» и «Я сейчас солдат или разведчик?»
    mood: "осознание вчерашнего провала"
    next_default: ep010_s14_sofa
    visual_brief:
