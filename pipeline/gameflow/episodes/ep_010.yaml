  # ── СЦЕНА 1: Утро. Марко на ступенях ────────────────────────────────
  - scene_id: ep010_s01
    episode_id: 10
    source_ref: day_03.ep10.drama
    scene_type: narrative
    location: "Зеркальный Город, ступени у подвала Леона"
    time: "утро"
    characters_present: [Марко]
    author_text: >
      Утро. Марко сидит на ступенях у входа в подвал Леона. Рюкзак
      на коленях. Пальцы сжимают лямку.

      Вчерашняя ссора с Линой — как осколок, застрявший под рёбрами.
      Он помнит каждое слово. «Без артефактов мы ничего не найдём!» —
      кричала она. «Артефакты стирают память о Софии!» — кричал он.
      Оба хотели победить. Оба проиграли.

      Марко знает: он был прав. Артефакты опасны. Но Лина тоже была
      права — без артефактов они слепые. Знает — и ничего не может
      с этим сделать. Потому что вчера он не думал. Он кричал.
    mood: "осколок вчерашней ссоры"
    next_default: ep010_s02
    visual_brief:
      background: "Зеркальный Город, ступени у подвала Леона, утро, фиолетовый свет"
      camera: medium
      characters:
        - who: Марко
          expression: вина, задумчивость
          pose: сидит на ступенях, рюкзак на коленях
          position: center
      props: [рюкзак, ступени подвала, дверь Леона]
      focus_object: "пальцы на лямке рюкзака — сжимают"
      atmosphere: "утро после ссоры — осколок под рёбрами"
      ui_mode: reading

  # ── СЦЕНА 2: Софа — «Какая была цель?» ──────────────────────────────
  - scene_id: ep010_s02
    episode_id: 10
    source_ref: day_03.ep10.drama
    scene_type: dialogue
    location: "Зеркальный Город, ступени у подвала Леона"
    time: "утро"
    characters_present: [Марко, Софа]
    author_text: >
      Софа вибрирует. Тихо, как будто не хочет мешать.
    dialogue:
      - who: Софа
        line: "Марко... вчера вы с Линой спорили. Помнишь, какая была цель?"
      - who: Марко
        line: "Победить."
      - who: Софа
        line: "Оба хотели победить. Оба кричали. И что получилось?"
      - who: Марко
        line: "Ничего. Мы просто... поссорились."
      - who: Софа
        line: >
          Именно. Когда оба хотят победить — никто не слышит.
          Но... есть способ спорить по-другому. Два типа людей
          в споре. Два.
    mood: "тихая подготовка к уроку"
    next_default: ep010_s03
    visual_brief:
      background: "Зеркальный Город, ступени, экран телефона"
      camera: close-up
      characters:
        - who: Марко
          expression: горечь, признание
          pose: сидит, смотрит на телефон
      props: [экран телефона, ступени]
      focus_object: "экран Софы — «какая была цель?»"
      atmosphere: "тихий разбор вчерашнего"
      ui_mode: dialogue

  # ── СЦЕНА 3: Софа — солдат и разведчик (полное введение) ──────────────
  - scene_id: ep010_s03
    episode_id: 10
    source_ref: day_03.ep10.sofa_block
    scene_type: narrative
    location: "Зеркальный Город, ступени у подвала Леона"
    time: "утро"
    characters_present: [Марко, Софа]
    dialogue:
      - who: Софа
        line: "Представь двух людей. Один — СОЛДАТ. Другой — РАЗВЕДЧИК."
      - who: Софа
        line: >
          СОЛДАТ в споре — защитник крепости. Его крепость — это его мнение.
          Он стоит за стеной, закрылся щитом и кричит: «Не пущу! Моё
          мнение — самое правильное!» Если кто-то говорит: «А может,
          ты ошибаешься?» — солдат злится. Для него признать ошибку —
          это сдать крепость.
      - who: Софа
        line: >
          Причём — внимание! — солдат может быть даже ПРАВ. Но он всё
          равно солдат, потому что ему важна не истина, а победа.
      - who: Софа
        line: >
          РАЗВЕДЧИК — совсем другое дело. Он не сидит в крепости — он
          идёт в мир. С биноклем, с блокнотом и — обратите внимание —
          с улыбкой! Каждое слово собеседника — это информация. Он думает:
          «А что там на самом деле? Может, я чего-то не знаю?» Если
          кто-то говорит: «Ты ошибаешься» — разведчик не злится, а радуется:
          «О! Значит, я сейчас узнаю что-то новое!»
    author_text_after: >
      Марко: «А вчера я был...»

      Софа: «Вчера вы оба были солдатами. Два щита, две стены.
      Ноль информации.»
    mood: "новые инструменты — два характера"
    next_default: ep010_s04
    visual_brief:
      background: "Зеркальный Город, ступени, экран телефона"
      camera: close-up
      characters:
        - who: Марко
          expression: внимание, узнавание
          pose: сидит, смотрит на экран
      props: [экран телефона с двумя силуэтами — солдат со щитом и разведчик с биноклем]
      focus_object: "экран Софы — два характера спорщика"
      atmosphere: "урок из вчерашнего — теория из практики"
      ui_mode: reading

  # ── СЦЕНА 4: Пример — шоколад и яблоки ──────────────────────────────
  - scene_id: ep010_s04
    episode_id: 10
    source_ref: day_03.ep10.sofa_block
    scene_type: narrative
    location: "Зеркальный Город, ступени у подвала Леона"
    time: "утро"
    characters_present: [Марко, Софа]
    dialogue:
      - who: Софа
        line: >
          Вот пример. Два друга спорят: что полезнее — шоколад или яблоки?
          Солдат говорит: «Яблоки полезнее, это очевидно! Даже спорить глупо!
          Все знают!» Заметь — он скорее всего ПРАВ! Яблоки правда полезнее.
          Но он солдат, потому что не объясняет ПОЧЕМУ, не слушает другого,
          просто давит.
      - who: Софа
        line: >
          А разведчик? «Хм, интересно. Давай разберёмся. В яблоках есть
          витамин С и клетчатка. А в шоколаде? Какао, магний... Но ещё
          много сахара. Получается, яблоки правда полезнее — но и в шоколаде
          кое-что хорошее есть!» Видишь? Он пришёл к тому же выводу —
          но ЧЕРЕЗ исследование. И по дороге узнал больше, чем солдат
          когда-либо узнает.
      - who: Софа
        line: >
          Вот главная разница: солдат может быть прав СЛУЧАЙНО. Разведчик
          прав ОСОЗНАННО — потому что проверил. И если окажется, что он
          ошибся — спокойно скажет: «Ого, не знал! Спасибо!» А солдат?
          Он до последнего будет кричать, даже если все доказательства
          против него.
      - who: Софа
        line: "Теперь — голосуем. Солдат или разведчик?"
    mood: "пример через историю"
    next_default: ep010_s05
    visual_brief:
      background: "Зеркальный Город, ступени, экран телефона"
