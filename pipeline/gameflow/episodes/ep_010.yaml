  # ── СЦЕНА 3: Марко представляет — солдат и разведчик (драма) ──────
  - scene_id: ep010_s03
    episode_id: 10
    source_ref: day_03.ep10.sofa_block
    scene_type: narrative
    location: "Зеркальный Город, ступени у подвала Леона"
    time: "утро"
    characters_present: [Марко]
    author_text: >
      Марко закрывает глаза. Перед внутренним экраном — две фигуры.

      Одна — СОЛДАТ. Стоит за каменной стеной, в руках щит, на щите —
      надпись «Моё мнение». Ворота закрыты. К солдату подходит кто-то
      и говорит: «А может, ты ошибаешься?» — и стрела ударяет в щит.
      Солдат кричит: «Не пущу!» Для солдата признать ошибку — это сдать
      крепость. Поэтому он может быть даже прав — но ему важна не
      истина, а победа.

      Вторая фигура — РАЗВЕДЧИК. Он не сидит в крепости. Он идёт по
      полю, с биноклем на шее и блокнотом в руке. И — странное дело —
      улыбается. Когда ему говорят «ты ошибаешься», он не отступает, не
      хватается за щит. Он записывает. Для него чужое мнение — не
      стрела, а карта. Новая территория.

      И Марко видит их спор вживую. Два друга — что полезнее, шоколад
      или яблоки? Солдат в кадре: «Яблоки полезнее, это очевидно! Все
      знают!» Он, скорее всего, прав. Но не объясняет, не слушает.
      Разведчик в том же кадре: «Хм, давай разберёмся. В яблоках —
      витамин С, клетчатка. В шоколаде — какао, магний, но и сахара
      много. Получается, яблоки правда полезнее — и в шоколаде тоже
      кое-что есть.» Тот же вывод. Но солдат пришёл к нему случайно,
      а разведчик — осознанно. И узнал по дороге в десять раз больше.

      Марко открывает глаза. И чувствует, как медленно сжимаются
      ладони — кулаки. Вчера он с Линой был солдатом. Два щита, две
      стены. Ноль информации.
    mood: "урок приходит через картинку"
    next_default: ep010_s03_sofa
    visual_brief:
      background: "Зеркальный Город, ступени — размыто. На переднем плане: мысленный образ солдата у стены и разведчика с биноклем"
      camera: medium
      characters:
        - who: Марко
          expression: закрытые глаза, внутренний взгляд
          pose: сидит на ступенях, ладони сжаты
          position: center
      props: [призрачные образы: солдат со щитом, разведчик с биноклем, двое спорят о яблоках]
      focus_object: "два силуэта в сознании Марко"
      atmosphere: "сравнение характеров — через визуализацию"
      ui_mode: reading

