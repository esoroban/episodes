      по линейке.

      Марко видит. Одна секунда — и рукав опускается обратно.

      Лина отпускает руку. Улыбается. Обычная улыбка. Обычная Лина.

      Серая нитка. Марко видел такие. В Зеркальном Городе, на запястьях
      тех, кто работает на Систему. Маркер. Метка. «Они слушают» —
