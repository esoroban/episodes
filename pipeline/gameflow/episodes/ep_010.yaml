  # ── СЦЕНА 27: Клиффхэнгер — серая нитка (CHOICE) ─────────────────────
    dialogue_after:
      - who: Софа
        line: 'Заметил, как разведчик отличается? Он не кричит — спрашивает. Не нападает — исследует. Улыбается, даже когда слышит то, с чем не согласен. И в итоге — он ВСЕГДА знает больше, чем солдат.» Лина: «Давай пожмём руки. По-настоящему. Мир.» Она протягивает руку.'
  - scene_id: ep010_s27
    episode_id: 10
    source_ref: day_03.ep10.cliffhanger
    scene_type: cliffhanger
    location: "Зеркальный Город, ступени у подвала Леона"
    time: "утро"
    characters_present: [Марко, Лина]
    author_text: >
      Марко берёт её ладонь. Пожатие — короткое, крепкое.

      И в этот момент рукав Лины задирается. На два сантиметра.
      Не больше.

      На запястье — серая нитка. Обмотана дважды. Аккуратно, ровно.
      Марко уже видел эту нитку — два дня назад, одну; вчера утром —
      три. Сегодня он знает, что значит счёт.

      Марко видит. Одна секунда — и рукав опускается обратно. Лина
      отпускает руку. Улыбается. Обычная улыбка. Обычная Лина.

      И что-то щёлкает в голове. У ЛЕОНА — тогда, в подвале, через
      Зеркало — на запястье была такая же. Он даже отмахнулся: случайная
      нитка. Не случайная. Одинаковая. Одинаковый узел, одинаковая
      намотка, одинаковый серый оттенок. У того, кто «лжёт, но не по
      своей воле». И у Лины — той, кто уверенно шагнула в Зеркальный
      Город в первый день. Маркер. Метка. Тех, кто «работает на Систему» —
      или тех, кого Система держит.
    interaction_type: choice
    question: "Серая нитка на запястье Лины. Что делать?"
    options:
      - id: ask
        text: "Спросить прямо"
        next: ep010_s27a1
      - id: silent
        text: "Промолчать — собрать данные"
        next: ep010_s27b1
    mood: "открытие — маркер агента на руке друга"
    next_default: ep010_s27a1
    visual_brief:
      background: "Зеркальный Город, ступени, рукопожатие"
      camera: close-up
      characters:
        - who: Марко
          expression: шок, скрытый за улыбкой
          pose: держит руку Лины
          position: left
        - who: Лина
          expression: обычная улыбка
          pose: пожимает руку, рукав задрался
          position: right
      props: [серая нитка на запястье — аккуратная, ровная, как по линейке]
      focus_object: "серая нитка — маркер Системы"
      atmosphere: "рукопожатие дружбы — и маркер, который всё меняет"
      ui_mode: choice

