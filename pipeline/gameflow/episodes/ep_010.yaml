  # ── СЦЕНА 15_bridge: Лина ведёт через «тонкое место» в школу (драма) ─
  - scene_id: ep010_s15_bridge
    episode_id: 10
    source_ref: day_03.ep10.drama
    scene_type: narrative
    location: "Зеркальный Город → тонкое место → школа"
    time: "утро"
    characters_present: [Марко, Лина]
    author_text: >
      Лина встаёт. Отряхивает джинсы. «Идём. Есть место, где нам надо
      побывать.»

      Марко поднимает голову. Ступени за её спиной уходят не во
      вчерашнюю дверь подвала. Выше. В туман — молочный, как
      запотевшее стекло.

      «Что это?»

      «Тонкое место, — тихо говорит Лина. — Их несколько в Городе.
      Одно — здесь. Другое — у школы. Через них можно выйти обратно
      на ту сторону. Ненадолго.»

      Марко оглядывается на фиолетовое небо Зеркального Города. Потом —
      снова на ступени. Туман прозрачнеет. Там — знакомые серые стены.
      Дневной свет, не фиолетовый.

      Он делает шаг. Ступени скрипят — по-школьному, не по-городски.
      Запах — мел, куртки, библиотечная пыль. Они на лестничном
      пролёте своей школы. Этаж второй. Коридор.

      Кабинет Веры Андреевны — приоткрыт. Внутри горит свет.
    mood: "переход — тонкое место между мирами"
    next_default: ep010_s16
    set_flags: [thin_place_known]
    visual_brief:
      background: "Переход: фиолетовые ступени Зеркального Города растворяются в серый школьный коридор"
      camera: wide
      characters:
        - who: Марко
