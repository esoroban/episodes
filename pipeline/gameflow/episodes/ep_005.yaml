  # ── СЦЕНА 1: Зеркальный Город, плакаты ──────────────────────────────
  - scene_id: ep005_s01
    episode_id: 5
    source_ref: day_02.ep5.drama
    scene_type: narrative
    location: "Зеркальный Город, улица"
    time: "вне времени"
    characters_present: [Марко, Лина]
    author_text: >
      Зеркальный Город. Небо фиолетовое. Тени живут своей жизнью — иногда
      отстают от хозяев, иногда забегают вперёд.

      Громкоговорители на каждом углу. Голос — мягкий, обволакивающий:
      «Здесь безопасно. Вы в лучшем городе мира. Никто не хочет вам зла.»

      Марко идёт по улице. Каждый шаг — эхо. Лина рядом, молчит. Дома
      одинаковые — стекло и бетон, без вывесок, без рекламы, без цвета.
      На стенах — плакаты: «Голос знает лучше.» «Доверяй — и будешь счастлив.»
      «Вопросы — признак слабости.»
    author_text_after: >
      Марко читает последний плакат дважды. «Вопросы — признак слабости.»
      Софа учит задавать вопросы. Город просит не задавать. Кто-то врёт.
    mood: "тревожная красота"
    next_default: ep005_s02
    visual_brief:
      background: "Зеркальный Город: стекло и бетон, фиолетовое небо, громкоговорители, плакаты на стенах"
      camera: wide
      characters:
        - who: Марко
          expression: настороженность, озирается
          pose: идёт медленно, руки прижаты к телу
          position: center
        - who: Лина
          expression: молчаливое спокойствие
          pose: идёт рядом
          position: right
      props: [громкоговорители на столбах, плакаты «Голос знает лучше», «Вопросы — признак слабости», одинаковые дома]
      focus_object: "плакат «Вопросы — признак слабости»"
      atmosphere: "город, который улыбается, но не моргает"
      ui_mode: reading

  # ── СЦЕНА 2: Софа — разминка перед Городом ──────────────────────────
  - scene_id: ep005_s02
    episode_id: 5
    source_ref: day_02.ep5.drama
    scene_type: dialogue
    location: "Зеркальный Город, улица"
    time: "вне времени"
    characters_present: [Марко, Софа]
    author_text: "Софа вибрирует."
    dialogue:
      - who: Софа
        line: >
          Марко... прежде чем идти дальше — быстрая проверка. Город пытается
          тебя запутать. Три слова. Пять инструментов. Три вопроса детектива.
          Давай убедимся, что всё на месте.
      - who: Софа
        line: >
          Плакат на стене: «Здесь безопасно.» Можно проверить? Да — посмотреть
          вокруг. Но подтвердится ли? Мы пока не знаем. А вот это...
    mood: "мобилизация"
    next_default: ep005_s03
    visual_brief:
      background: "Зеркальный Город, улица, экран телефона"
      camera: close-up
      characters:
        - who: Марко
          expression: внимание, сосредоточенность
          pose: смотрит на экран телефона
      props: [телефон с треснутым экраном]
      focus_object: "экран Софы — разминка"
      atmosphere: "урок посреди чужого города — знания как оружие"
      ui_mode: dialogue

  # ── СЦЕНА 3: Разминка quiz batch 1 — факт/мнение/неправда ───────────
  - scene_id: ep005_s03
    episode_id: 5
    source_ref: day_02.ep5.challenge
    scene_type: quiz
    location: "Зеркальный Город, улица"
    time: "вне времени"
    characters_present: [Марко, Софа]
    interactions:
      - interaction_type: vote
        question: "Плакат: «Вы в лучшем городе мира.» Факт, мнение или неправда?"
        options:
          - {id: fact, text: "Факт", correct: false}
          - {id: opinion, text: "Мнение", correct: true}
          - {id: falsehood, text: "Неправда", correct: false}
        correct_logic: "Нет «лучшемера» — «лучший» субъективно."
        feedback_success: 'Софа: «Нет "лучшемера"! "Лучший" — субъективно. Мнение.»'
        feedback_soft_fail: 'Софа: «Есть прибор для "лучший"? Нет? Что это тогда?»'
      - interaction_type: vote
        question: "Плакат: «Никто не хочет вам зла.» Факт, мнение или неправда?"
        options:
          - {id: fact, text: "Факт", correct: false}
          - {id: opinion, text: "Мнение", correct: false}
          - {id: falsehood, text: "Неправда", correct: true}
        correct_logic: "Проверяемо: Голос уже причинял зло — стирал людей. При проверке не подтвердится."
        feedback_success: "Софа: «Неправда! Проверяемо — и при проверке не подтвердится. Голос уже причинял зло.»"
        feedback_soft_fail: "Софа: «Можно ли проверить? Да. Подтвердится ли? Вспомни, что делает Голос.»"
      - interaction_type: vote
        question: "Плакат: «Вопросы — признак слабости.» Факт, мнение или неправда?"
        options:
          - {id: fact, text: "Факт", correct: false}
          - {id: opinion, text: "Мнение", correct: true}
          - {id: falsehood, text: "Неправда", correct: false}
        correct_logic: "Нет инструмента измерить «слабость вопросов» — это чьё-то ощущение."
        feedback_success: "Софа: «Мнение! Нет прибора для «слабости вопросов». Чьё-то ощущение, выданное за правило.»"
        feedback_soft_fail: "Софа: «Есть «слабомер» для вопросов? Нет? Тогда это чьё ощущение?»"
    author_text_after: >
      Софа: «Три из трёх. Помнишь. Теперь — инструменты проверки. Город
      вешает плакаты без цифр. А мы — с цифрами.»
    mood: "разминка — уверенный старт"
    next_default: ep005_s04
    visual_brief:
      background: "Зеркальный Город, улица, экран телефона"
      camera: close-up
      characters:
        - who: Марко
          expression: сосредоточенность
          pose: смотрит на телефон
      atmosphere: "факт/мнение/неправда — система работает"
      ui_mode: quiz

  # ── СЦЕНА 4: Разминка quiz batch 2 — проверяемое/мнение/хитрое ──────
  - scene_id: ep005_s04
    episode_id: 5
    source_ref: day_02.ep5.challenge
    scene_type: quiz
    location: "Зеркальный Город, улица"
    time: "вне времени"
    characters_present: [Марко, Софа]
    interactions:
      - interaction_type: vote
        question: "«Дверь Леона находится на глубине 20 метров под землёй.» Проверяемое, мнение или хитрое утверждение?"
        options:
          - {id: checkable, text: "Проверяемое", correct: true}
          - {id: opinion, text: "Мнение", correct: false}
          - {id: tricky, text: "Хитрое утверждение", correct: false}
        correct_logic: "Инструмент — рулетка, даст число."
        feedback_success: "Софа: «Проверяемое! Инструмент — рулетка. Измерил — получил число.»"
        feedback_soft_fail: "Софа: «Есть инструмент для глубины? Рулетка? Линейка?»"
      - interaction_type: vote
        question: "«Подвал Леона — самое уютное место в Городе.» Проверяемое, мнение или хитрое утверждение?"
        options:
          - {id: checkable, text: "Проверяемое", correct: false}
          - {id: opinion, text: "Мнение", correct: true}
          - {id: tricky, text: "Хитрое утверждение", correct: false}
        correct_logic: "Нет «уютномера»."
        feedback_success: "Софа: «Мнение! Нет «уютномера». «Уютно» — для каждого своё.»"
        feedback_soft_fail: "Софа: «Есть прибор для «уютно»? Нет? Что это тогда?»"
      - interaction_type: vote
        question: "«Подвал Леона безопасный, но только если не смотреть через Зеркало.» Проверяемое, мнение или хитрое утверждение?"
        options:
          - {id: checkable, text: "Проверяемое", correct: false}
          - {id: opinion, text: "Мнение", correct: false}
          - {id: tricky, text: "Хитрое утверждение", correct: true}
        correct_logic: "Отговорка — «только если не смотреть» — блокирует любую проверку."
        feedback_success: "Софа: «Хитрое! «Только если не смотреть» — отговорка. Блокирует проверку.»"
        feedback_soft_fail: "Софа: «Что мешает проверить? Найди условие, которое закрывает путь.»"
      - interaction_type: vote
        question: "«Леон уже говорил трём людям одно и то же.» Проверяемое, мнение или хитрое утверждение?"
        options:
          - {id: checkable, text: "Проверяемое", correct: true}
          - {id: opinion, text: "Мнение", correct: false}
          - {id: tricky, text: "Хитрое утверждение", correct: false}
        correct_logic: "Инструмент — счёт, можно проверить через Зеркало."
        feedback_success: "Софа: «Проверяемое! Инструмент — счёт. Через Зеркало можно проверить.»"
        feedback_soft_fail: "Софа: «Можно ли пересчитать людей? Есть инструмент?»"
      - interaction_type: vote
        question: "«Леон успокаивает лучше всех взрослых.» Проверяемое, мнение или хитрое утверждение?"
        options:
          - {id: checkable, text: "Проверяемое", correct: false}
          - {id: opinion, text: "Мнение", correct: true}
          - {id: tricky, text: "Хитрое утверждение", correct: false}
        correct_logic: "«Лучше всех» — субъективно, нет прибора."
        feedback_success: "Софа: «Мнение! «Лучше всех» — субъективно. Нет прибора.»"
        feedback_soft_fail: "Софа: «Есть «успокаивомер»? Нет? Тогда что?»"
      - interaction_type: vote
        question: "«Леон прав, но только если ему не задавать лишних вопросов.» Проверяемое, мнение или хитрое утверждение?"
        options:
          - {id: checkable, text: "Проверяемое", correct: false}
          - {id: opinion, text: "Мнение", correct: false}
          - {id: tricky, text: "Хитрое утверждение", correct: true}
        correct_logic: "Отговорка: «если не задавать вопросов» — невозможно опровергнуть."
        feedback_success: "Софа: «Хитрое! «Если не задавать вопросов» — отговорка. Закрывает проверку.»"
        feedback_soft_fail: "Софа: «Что блокирует проверку? Найди условие-ловушку.»"
    author_text_after: >
      Софа: «Девять из девяти. Всё помнишь. Три слова, пять инструментов,
      три вопроса детектива. Теперь — дальше. Новый урок.»
    mood: "разминка завершена — всё на месте"
    next_default: ep005_s05
    visual_brief:
      background: "Зеркальный Город, улица, экран телефона"
      camera: close-up
      characters:
        - who: Марко
          expression: уверенность
          pose: смотрит на телефон
      atmosphere: "инструменты проверки — проверены"
      ui_mode: quiz

  # ── СЦЕНА 5: Лестница вниз, Леон ────────────────────────────────────
  - scene_id: ep005_s05
    episode_id: 5
    source_ref: day_02.ep5.drama
    scene_type: narrative
    location: "Подвал библиотеки, Зеркальный Город"
    time: "вне времени"
    characters_present: [Марко, Лина, Леон]
    author_text: >
      Лина останавливается у узкой лестницы, ведущей вниз. Ступени каменные,
      стёртые. Из подвала тянет пылью и чем-то сладковатым — как старая бумага.
    dialogue:
      - who: Лина
        line: "Здесь. Он тебя ждёт."
      - who: Марко
        line: "Кто?"
      - who: Лина
        line: "Увидишь."
    author_text_after: >
      Они спускаются. Длинный коридор, низкий потолок. Полки до потолка — но
      книги без обложек, без названий. Просто бумага. Кто-то содрал все обложки.

      За столом — старик. Седая борода, мятый свитер, чашка чая в руках.
      Улыбается Марко — по-настоящему, с морщинками вокруг глаз.
    mood: "обманчивое тепло"
    next_default: ep005_s06
    visual_brief:
      background: "Лестница вниз, подвал библиотеки, стеллажи с книгами без обложек"
      camera: wide
      characters:
        - who: Леон
          expression: тёплая улыбка, морщинки вокруг глаз
          pose: сидит за столом с чашкой чая
          position: center
        - who: Марко
          expression: облегчение, доверие
          pose: стоит у входа
          position: left
        - who: Лина
          expression: настороженность
          pose: стоит чуть позади
          position: left
      props: [книги без обложек, чашка чая, стёртые каменные ступени]
      focus_object: "улыбка Леона — тёплая, приглашающая"
      atmosphere: "уютный подвал, как убежище — но что-то не так"
      ui_mode: reading

  # ── СЦЕНА 6: Леон — чай, Зеркало, тень ──────────────────────────────
  - scene_id: ep005_s06
    episode_id: 5
    source_ref: day_02.ep5.drama
    scene_type: dialogue
    location: "Подвал библиотеки, Зеркальный Город"
    time: "вне времени"
    characters_present: [Марко, Лина, Леон]
    dialogue:
      - who: Леон
        line: "А, гости! Давно не было гостей. Чай будешь?"
      - who: автор
        line: >
          Профессор Леон. Марко расслабляется мгновенно. Леон напоминает деда —
          того, который жил на даче и варил компот. Говорит мягко. Не спорит.
          Не давит. Именно такому человеку Марко верит без проверки.
      - who: автор
        line: >
          Софа вибрирует — еле заметно. Марко не достаёт телефон. Не хочет.
          Здесь тепло. Здесь безопасно.
      - who: автор
        line: >
          Леон наливает чай, и Марко берёт чашку обеими руками — как дома.
          Но чай пахнет незнакомо. Горьковатый, с привкусом железа. Мелочь.
          Марко отмахивается.
      - who: автор
        line: "Софа вибрирует снова."
      - who: Софа
        line: "Чай пахнет железом. Один раз — мелочь. Запомни. Считай."
      - who: автор
        line: >
          Марко убирает телефон. Леон рассказывает про библиотеку — как собирал
          книги, как Голос приказал снять обложки, как он прятал самые важные.
      - who: Леон
        line: "Я тут давно. Многое видел. Многое помню."
      - who: Марко
        line: "Вы знаете, где София?"
      - who: автор
        line: "Леон улыбается шире."
      - who: Леон
        line: >
          Софию? Нет. Но знаю кое-что получше. Знаю путь, которым можно
          пройти незаметно. Через северный тоннель. Безопасно. Я проверял.
      - who: автор
        line: >
          На полке за Леоном — странный предмет. Стеклянный диск, размером
          с ладонь. Внутри что-то мерцает — как свет в тумане.
      - who: Марко
        line: "Что это?"
      - who: Леон
        line: >
          Зеркало Повторений. Показывает то, что повторяется. Закономерности.
          Паттерны. Бери, если хочешь. Тебе пригодится.
      - who: автор
        line: "Марко берёт диск. Тёплый. Мерцает."
    mood: "тепло с трещиной"
    next_default: ep005_s07
    set_flags: [mirror_of_repetitions_found]
    visual_brief:
      background: "Подвал библиотеки, стол с чашками, тёплый свет, стеллажи"
      camera: over-shoulder
      characters:
        - who: Леон
          expression: дружелюбие, открытость
          pose: наливает чай, улыбается
          position: right
        - who: Марко
          expression: доверие, расслабленность
          pose: держит чашку обеими руками
          position: left
      props: [чашки с чаем, книги без обложек, Зеркало Повторений на полке]
      focus_object: "Зеркало Повторений — стеклянный диск, мерцает"
      atmosphere: "тепло, которому хочется верить"
      ui_mode: dialogue

  # ── СЦЕНА 7: Софа — тень не улыбается ───────────────────────────────
  - scene_id: ep005_s07
    episode_id: 5
    source_ref: day_02.ep5.drama
    scene_type: dialogue
    location: "Подвал библиотеки, Зеркальный Город"
    time: "вне времени"
    characters_present: [Марко, Леон]
    dialogue:
      - who: автор
        line: "Софа вибрирует — настойчиво."
      - who: Софа
        line: "Марко. Леон улыбается. Посмотри на стену за ним."
      - who: автор
        line: >
          Марко оглядывается. Леон сидит у стола, чашка в руках, губы
          растянуты — улыбка. Но на стене за ним — тень. И у тени рот сжат.
          Прямая линия.
