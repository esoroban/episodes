  # ── СЦЕНА 8: Марко вспоминает — Дмитрик, камень, звезда (драма) ─────
  - scene_id: ep005_s08
    episode_id: 5
    source_ref: day_02.ep5.sofa_block
    scene_type: narrative
    location: "Подвал библиотеки, Зеркальный Город"
    time: "вне времени"
    characters_present: [Марко]
    author_text: >
      Три раза. Три раза подряд отражение Леона в Зеркале ведёт себя иначе, чем сам Леон.
      В голове Марко что-то щёлкает — и всплывает история, которую когда-то
      рассказывала ему София.

      Дмитрик хвалился на весь двор: «Я самый быстрый в школе!» Сашко
      усмехнулся: «Проверим.» Сто метров, секундомер, честный забег —
      Сашко первый. «Нечестно, шнурок развязался!» Перебежали — Сашко
      снова быстрее. «Ну я не выспался.» Как Витя с волшебным камнем —
      опять отговорки. Но есть отличие: Сашко победил ДВАЖДЫ. Не раз.
      Два.

      Марко вспоминает камень, который они с сестрой — Софией — бросали
      со стола, когда проверяли гравитацию. Раз — упал. Два — упал. Пять — упал.
      Пятьдесят — упал. Камень не может не упасть. Так работает
      ЗАКОНОМЕРНОСТЬ: результат повторяется ВСЕГДА, без нас, без
      настроения.

      И вспоминает красную футболку своего старого друга, в которой тот
      один раз выиграл в мяч — и потом носил её «на удачу», пока не
      проиграл пять раз подряд. Это было СОВПАДЕНИЕ: мозг запомнил один
      раз, когда сошлось, и забыл все разы, когда нет.

      Между «один раз» и «всегда» — серая зона. Два-три раза подряд —
      ещё не закономерность. Это сильный сигнал, интересно, но
      проверяй. У Леона отражение в Зеркале не улыбалось три раза. Это как Сашко,
      обогнавший Дмитрика дважды: один раз мало, два раза — уже нельзя
      отмахнуться шнурком.
    mood: "урок через память"
    next_default: ep005_s08_sofa
    visual_brief:
      background: "Подвал библиотеки — размыто. На переднем плане — память Марко: двор школы, бегущие мальчишки, камень на ладони"
