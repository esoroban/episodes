  # ── СЦЕНА 8: Софа — Дмитрик, повторяемость, закономерность, совпадение ──
  - scene_id: ep005_s08
    episode_id: 5
    source_ref: day_02.ep5.sofa_block
    scene_type: narrative
    location: "Подвал библиотеки, Зеркальный Город"
    time: "вне времени"
    characters_present: [Марко, Софа]
    dialogue:
      - who: Софа
        line: "Три раза одно и то же. Это случайность — или тут есть правило? Давай разберёмся."
      - who: Софа
        line: >
          Послушай историю. Дмитрик заявил на весь школьный двор: «Я самый
          быстрый в школе!» Сашко усмехнулся: «Правда? Давай проверим!»
          Договорились: сто метров, секундомер, честный забег. Побежали —
          Сашко финишировал первым! Дмитрик не поверил: «Нечестно! Шнурок
          развязался!» Перебежали. Сашко — снова быстрее. «Ну я просто
          не выспался!» — не сдаётся Дмитрик.
      - who: Софа
        line: >
          Знакомо? Отговорки, как у Вити с волшебным камнем. Но есть кое-что
          новое. Сашко победил ДВАЖДЫ. Одна проверка — мало. А две?
      - who: Софа
        line: >
          Вот ключевое слово: ПОВТОРЯЕМОСТЬ. Если результат получается каждый
          раз — при одинаковых условиях — это надёжно. Если один раз да,
          другой раз нет — совпадение.
      - who: Софа
        line: >
          ЗАКОНОМЕРНОСТЬ — когда результат повторяется ВСЕГДА. Работает без нас.
          Камень бросили — упал. Бросили снова — упал. И снова. Камень не может
          не упасть. Вода нагрелась до ста градусов — закипела. Всегда. Это не
          зависит от настроения камня или желания воды.
      - who: Софа
        line: >
          СОВПАДЕНИЕ — когда мозг придумал связь, которой нет. Красная футболка
          и победа. Счастливая ручка и пятёрка. Желание на падающую звезду. Мозг
          запомнил один раз, когда совпало — и забыл все разы, когда не совпало.
          Мозг — великий выдумщик: обожает находить связи, даже там, где их нет.
      - who: Софа
        line: "Четвёртый вопрос детектива правды: «А это повторяется?»"
      - who: Софа
        line: "Теперь — проверим на Леоне."
    mood: "новые термины через историю"
    next_default: ep005_s09
    visual_brief:
      background: "Подвал библиотеки, экран телефона светится"
      camera: close-up
      characters:
        - who: Марко
