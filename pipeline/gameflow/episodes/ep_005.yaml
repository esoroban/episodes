    author_text: >
      Зеркальный Город. Небо фиолетовое. Тени живут своей жизнью — иногда
      отстают от хозяев, иногда забегают вперёд.

      Громкоговорители на каждом углу. Голос — мягкий, обволакивающий:
      «Здесь безопасно. Вы в лучшем городе мира. Никто не хочет вам зла.»

      Марко идёт по улице. Каждый шаг — эхо. Лина рядом, молчит. Дома
      одинаковые — стекло и бетон, без вывесок, без рекламы, без цвета.
      На стенах — плакаты: «Голос знает лучше.» «Доверяй — и будешь счастлив.»
      «Вопросы — признак слабости.»
    author_text_after: >
      Марко читает последний плакат дважды. «Вопросы — признак слабости.»
      Софа учит задавать вопросы. Город просит не задавать. Кто-то врёт.
