      который на самом деле не вопрос, а утверждение в маскировке.
      Человек не хочет ответа — хочет, чтобы ты согласился.

      Слова-маркеры: «разве не...», «неужели ты думаешь...», «кто в
      здравом уме...», «как можно не понимать...».

      Связь с Древней Грецией: риторика — искусство убеждать словами.
      Приёму — 2500 лет. И он до сих пор работает.

      ТЕХНИКА. Убери обёртку → верни в утверждение → проверь: факт,
      мнение или неправда.

      Пример: «Разве не понятно, что кошки лучше собак?» Убираем
      обёртку → «Кошки лучше собак.» Проверяем → мнение. Не факт.

      НЮАНС. Инструменты нейтральны. Риторический вопрос может и
      вдохновлять: «Разве мы не заслуживаем лучшего?» Важно
      намерение, а не форма.

      Золотое правило: сначала предполагай доброе намерение.
      Критическое мышление — не паранойя. Это внимательность.
    mood: "карта инструмента + золотое правило"
    next_default: ep040_s07
    visual_brief:
