  # ── СЦЕНА 5: Теория — рыцарь и соломенное чучело + 4 способа ────────
  - scene_id: ep029_s05
    episode_id: 29
    source_ref: day_08.ep29.sofa_block
    scene_type: narrative
    location: "Зеркальный Город, переулок у площади"
    time: "утро"
    characters_present: [Марко]
    author_text: >
      РЫЦАРЬ И СОЛОМЕННОЕ ПУГАЛО. Один рыцарь хочет победить другого.
      Но настоящий рыцарь — сильный. Поэтому берут солому, набивают
      чучело, одевают в доспехи — и бьют ЕГО. Побили пугало. Объявили
      победу. А настоящий рыцарь стоит целый.

      ПУГАЛО — когда чужие слова перекрутили, чтобы легче спорить.
      Рей не спорит с настоящими словами Марко. Он поставил пугало —
      и побил его.

      Четыре способа сделать пугало.

      ПРЕУВЕЛИЧЕНИЕ — раздуть. «Немного» → «всегда». «Иногда» →
      «каждый день». Маленькое желание доводят до абсурда.

      УПРОЩЕНИЕ — обрезать. Убирают важную деталь — и смысл меняется.
      «Хочу забрать сестру» → «хочет, чтобы все ушли».

      ДОБАВЛЕНИЕ — приписать. Добавляют то, чего человек вообще не
      говорил. «Ненавидит покой» — Марко этого не говорил.

      ИЗМЕНЕНИЕ СМЫСЛА — вывернуть наизнанку. «Забрать сестру» →
      «уничтожить Город». Была забота — стала агрессия.

      Сигнал: когда чувствуешь «Я ЭТОГО НЕ ГОВОРИЛ!» — значит, перед
      тобой пугало.
    mood: "карта приёма — четыре способа в одном кадре"
    next_default: ep029_s06
    visual_brief:
      background: "Переулок в расфокусе. По центру — фигура рыцаря в доспехах и рядом — соломенное чучело в таких же доспехах. Над ними — четыре пиктограммы: 1) пузырь, раздувающийся стрелками наружу (преувеличение), 2) ножницы, отрезающие кусок ленты (упрощение), 3) знак «+» с маленькой деталью (добавление), 4) лента с двумя стрелками, разворачивающимися наизнанку (изменение смысла)"
      camera: medium
      characters:
