      Динамики продолжают. Голос Рея — уверенный, красивый, чужой.
      Толпа аплодирует пугалу. Никто не слышал настоящих слов Марко.

      Но Марко теперь знает: крик — не ответ. Ответ — точность.

      Число на стене: 24.

      Пугало стоит на площади. Толпа бьёт его палками. Аплодирует.
      А настоящий рыцарь — здесь, в подвале, с запиской сестры в руке.

      Слова можно перекрутить. Но правда — нет. Правда ждёт того,
