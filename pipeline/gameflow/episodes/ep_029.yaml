        - четыре пиктограммы способов искажения (раздуть / отрезать / приписать / вывернуть)
      focus_object: "рыцарь и чучело — рядом, чтобы виден был контраст"
      atmosphere: "карта инструментов собрана — без слов, только символы"
      ui_mode: reading

