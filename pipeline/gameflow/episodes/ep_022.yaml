    author_text: >
      Марко встаёт. Хватает тетрадь. Сейчас же — наверх, в подполье.
      Показать всем. Десятки противоречий — как не увидеть?

      Он уже у лестницы. Нога на первой ступеньке.

      Потом — останавливается. Если показать сейчас — что он скажет?
      «Вот записи Софии, смотрите»? Их спросят: как проверить? Как
      выдержать, если Голос начнёт уклоняться?

      Пока Марко не умеет возвращать к вопросу — он проиграет любой
      разговор. Тетрадь — улика, но без инструмента улика не работает.

      Марко возвращается к столу. Садится.
    mood: "рывок — и трезвый откат"
    merge_to: ep022_s03
    next_default: ep022_s03
