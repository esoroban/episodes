        - три схематичных руки-жеста подряд на стене (раскрытая ладонь → ладонь тянет назад → ладонь-щит опущена)
        - тетрадь Софии на столе
      focus_object: "два значка на стене — глаз-детектор и три жеста волшебной фразы"
      atmosphere: "инструменты добавляются к карману"
      ui_mode: reading

