  # ── СЦЕНА 4: Теория — вопрос-детектор + волшебная фраза (drama) ──────
  - scene_id: ep022_s04
    episode_id: 22
    source_ref: day_06.ep22.sofa_block
    scene_type: narrative
    location: "Зеркальный Город, подвал подполья"
    time: "после полудня"
    characters_present: [Марко]
    author_text: >
      Голос уклонялся три раза. Мама — пять. Рей — три. Вера — каждый
      день. Все включают поворотники.

      Но как ПОЙМАТЬ поворотник?

      ВОПРОС-ДЕТЕКТОР — проверочный вопрос самому себе: «Ответил ли
      человек на ТОТ вопрос, который я задал?» Если нет — он включил
      поворотник.

      Как на контрольной: спросили «2+2», а написал «я люблю
      математику» — неверно. Красиво, но неверно.

      И вторая часть — ВОЛШЕБНАЯ ФРАЗА: «Это интересно, но я спрашивал
      о другом...» Варианты: «Подожди, я спросил о...», «Давай вернёмся
      к моему вопросу...»

      Формула из трёх шагов: ПРИЗНАТЬ сказанное → ВЕРНУТЬ разговор к
      своему вопросу → НЕ НАПАДАТЬ.

      «Это интересно» — это признать. «Я спрашивал о другом» — это
      вернуть. Обвинять и давить — нельзя: собеседник закроется и
      поворотник сработает ещё раз.
    mood: "инструмент разведчика — детектор и волшебная фраза"
    next_default: ep022_s05
    visual_brief:
      background: "Подвал, Марко у стены. Углём нарисованы два символа: крупный глаз (детектор вопроса) и дуга из трёх стрелок — рука раскрыта, рука тянет назад, рука опущена щитом вниз. Рядом — записная тетрадь Софии"
