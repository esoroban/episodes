  # ── СЦЕНА 2: Две колонки — «Что сказал / Что сделал» ─────────────────
  - scene_id: ep022_s02
    episode_id: 22
    source_ref: day_06.ep22.drama
    scene_type: narrative
    location: "Зеркальный Город, подвал подполья"
    time: "после полудня"
    characters_present: [Марко]
    author_text: >
      Левая колонка — «Что он сказал». Правая — «Что он сделал».

      «Я даю свободу» — запер двери.

      «Я не стираю — я защищаю» — Леон стёрт.

      «Каждый голос важен» — несогласных убирают.

      «Я забочусь о детях» — числа падают.

      «Город — место безопасности» — Макс стирается.

      Десятки строк. Каждая — трещина. По отдельности — мелочь. Вместе
      — стена рушится.

      София собирала доказательства. Месяцами. Каждое противоречие —
      зафиксировано.
    mood: "пять строк — уже стена"
    interaction_type: choice
    question: "Что делает Марко?"
    options:
      - id: learn
        text: "Остаться. Сначала научиться возвращать к вопросу"
        next: ep022_s03
      - id: rush
        text: "Броситься к подполью — показать записи сейчас"
        next: ep022_s02b
    next_default: ep022_s03
    visual_brief:
