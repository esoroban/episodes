      focus_object: "пять подсвеченных пар — каждая трещина"
      atmosphere: "архив противоречий, собранный сестрой"
      ui_mode: choice

  # ── СЦЕНА 2b: Detour — рывок к подполью, остановка ───────────────────
  - scene_id: ep022_s02b
    episode_id: 22
    source_ref: day_06.ep22.drama
    scene_type: narrative
    location: "Зеркальный Город, подвал подполья"
    time: "после полудня"
