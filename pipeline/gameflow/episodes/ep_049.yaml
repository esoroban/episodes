      - who: Марко
        line: "Ярлык. Удар по человеку, а не разбор."
      - who: София
        line: "А может, кто-то болел. Или боится прыгать. Или просто не выспался."
      - who: Марко
        line: "Именно. Учитель не спросил «почему». Он сразу наклеил."
      - who: София
        line: "Это нападка на человека?"
