      atmosphere: "новый день — обычный, но рядом — сестра"
      ui_mode: reading

  # ── СЦЕНА 2: По дороге — автобус с рекламой ──────────────────────
  - scene_id: ep049_s02
    episode_id: 49
    source_ref: day_13.ep49.drama
    scene_type: dialogue
    location: "Улица, автобусная остановка"
    time: "утро"
    characters_present: [Марко, София]
    author_text: >
      Остановка. Подъезжает автобус. На борту — огромная реклама.
      Школа на фоне детей с пятёрками.

      «ВСЕ умные родители выбирают нашу школу!»

      София щурится — читает вслух. Останавливается на «ВСЕ».
    dialogue:
      - who: София
        line: "«ВСЕ умные родители»? Прям все-все?"
      - who: Марко
        line: "Помнишь, я тебе про поспешное обобщение рассказывал?"
      - who: София
        line: "Это когда один пример приклеивают ко всем подряд?"
      - who: Марко
        line: "Да. Слово «ВСЕ» без доказательств. Чтобы каждый родитель подумал: «А я что, не умный?»"
      - who: София
        line: "Ловушка."
      - who: Марко
        line: "Ага. Первая за утро."
    author_text_after: >
      Автобус уезжает. Реклама уезжает с ним. София улыбается —
      впервые поймала ловушку вместе с братом.
    mood: "первая ловушка — поймана вдвоём, без напряжения"
    next_default: ep049_s03
    visual_brief:
