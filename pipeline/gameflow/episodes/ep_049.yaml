  # ── СЦЕНА 13: Теория — спор vs ссора ─────────────────────────────
  - scene_id: ep049_s13
    episode_id: 49
    source_ref: day_13.ep49.sofa_block
    scene_type: narrative
    location: "Дом Марко, кухня"
    time: "вечер"
    characters_present: [Марко]
    author_text: >
      СПОР — обсуждение темы. Два человека не согласны, но
      говорят о деле. «Эта идея сработает» — «Эта идея не
      сработает». О деле. О словах. О мысли.

      ССОРА — нападка на человека. С темы перешли на собеседника.
      «ТЫ глупый», «ТЫ всегда», «Из-за ТЕБЯ». Уже не о деле — о
      человеке.

      Простой тест: посмотри, о чём говорят. О ТЕМЕ или о ТЕБЕ?

      «Твоя идея не сработает» — это спор. Можно ответить
      аргументом.

      «ТЫ ничего не понимаешь» — это ссора. Аргумента нет, есть
      удар.

      Главный признак: если в разговоре появилось «ТЫ всегда»,
      «ТЫ никогда» или «Из-за ТЕБЯ» — спор уже умер. Дальше идёт
      ссора.
    mood: "тихая теория — два режима разговора"
    next_default: ep049_s14
    visual_brief:
      background: "Расфокус кухни. По центру — две колонки рядом: слева «СПОР: о теме» с пиктограммой двух идей, справа «ССОРА: о человеке» с пиктограммой двух силуэтов с указующими пальцами"
      camera: medium
