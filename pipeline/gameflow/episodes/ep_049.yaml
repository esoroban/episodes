  # ── СЦЕНА 17: Теория — Я-высказывание ────────────────────────────
  - scene_id: ep049_s17
    episode_id: 49
    source_ref: day_13.ep49.sofa_block
    scene_type: narrative
    location: "Дом Марко, кухня"
    time: "вечер"
    characters_present: [Марко]
    author_text: >
      Когда хочется крикнуть «ТЫ всегда!» или «Из-за ТЕБЯ!» — есть
      другой способ.

      Я-ВЫСКАЗЫВАНИЕ. Формула простая:

      «Мне [чувство], когда [ситуация].»

      Не «ТЫ всегда решаешь за всех!» — а «Мне обидно, когда
      решения принимают без меня».

      Разница. Обвинение направлено на ДРУГОГО. Я-высказывание —
      на СЕБЯ. Ты говоришь о своих чувствах, а не нападаешь.

      Обвинение начинается со слов «ТЫ всегда», «ТЫ никогда»,
      «Из-за ТЕБЯ» — всё направлено на другого.

      Я-высказывание начинается со слов «МНЕ грустно, когда...»,
      «Я чувствую злость, когда...» — говоришь о себе.

      Тот же конфликт. Те же чувства. Но в одном случае —
      нападка, в другом — разговор.
    mood: "вторая теория — инструмент"
    next_default: ep049_s18
    visual_brief:
      background: "Расфокус кухни. По центру — две большие фразы рядом: «ТЫ всегда решаешь за всех!» и «Мне обидно, когда решения принимают без меня». Между ними — стрелка-сравнение «ТЫ → Я»"
      camera: medium
