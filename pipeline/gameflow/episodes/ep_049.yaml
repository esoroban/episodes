    scene_type: dialogue
    location: "Школа, холл у раздевалки"
    time: "утро"
    characters_present: [Марко, София]
    author_text: >
      Школа. Холл. Над раздевалкой — экран. Новости. Диктор
      серьёзный, фон тревожный:

      «Если не примем этот закон — экономика рухнет, люди
