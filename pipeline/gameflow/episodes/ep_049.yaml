  # ── СЦЕНА 1: Утро. Марко и София выходят в школу ─────────────────
  - scene_id: ep049_s01
    episode_id: 49
    source_ref: day_13.ep49.drama
    scene_type: dialogue
    location: "Дом Марко, прихожая → улица"
    time: "утро"
    characters_present: [Марко, София, мама]
    author_text: >
      Утро. Тёплое. Обычное.

      Кухня — пахнет тостами. Папа уже уехал. Мама в халате — у
      плиты. Каждые тридцать секунд оборачивается и проверяет,
      что София ещё на табуретке. София — есть. Жуёт хлеб с
      маслом. Болтает ногами.

      Софа в кармане Марко — молчит со вчерашнего вечера. Чёрный
      экран. Голос Софии теперь — не из трубки. Из кухни.
    dialogue:
      - who: мама
        line: "Идите потихоньку. У вас новый день."
      - who: София
        line: "Мам, мы вдвоём — как обычно."
      - who: Марко
        line: "Я приведу её к классу. Не потеряется."
      - who: мама
        line: "Знаю."
    author_text_after: >
      Марко и София выходят из подъезда. Воздух прохладный.
      Двор — обычный. Скамейка. Песочница. Соседский кот.

      Они идут к остановке. Не спеша. По дороге у них будет
      время поговорить.
    mood: "первое обычное утро — сестра рядом, телефон молчит, идут к школе"
    next_default: ep049_s02
    visual_brief:
      background: "Двор у подъезда. Утренний свет, серый асфальт, скамейка, песочница, кот соседа на бордюре. Дальше — улица с автобусной остановкой"
      camera: wide
      characters:
        - who: Марко
          expression: спокойная улыбка, рюкзак за плечами
          pose: шаг от подъезда, поправляет лямку
          position: center
        - who: София
          expression: первый школьный день после стекла — лёгкая,  бодрая
          pose: рядом, портфель в руке
          position: right
        - who: мама
          expression: смотрит в окно, удерживается, чтобы не выйти
          pose: за стеклом окна, силуэт
