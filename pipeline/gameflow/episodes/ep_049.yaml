      София останавливается. Слушает. Считает на пальцах.
    dialogue:
      - who: София
        line: "Подожди. Один, два, три... пять шагов от «не примем» до «дети без образования»."
      - who: Марко
        line: "И каждый шаг держится на честном слове."
      - who: София
        line: "Это та, страшная — как её? Цепочка?"
      - who: Марко
        line: "Страшная цепочка. Длинная лестница из «если — то». Каждая ступенька — слабее."
      - who: София
        line: "А зачем так делают?"
      - who: Марко
        line: "Чтобы стало страшно. Тогда не думаешь — соглашаешься."
      - who: София
        line: "Вторая ловушка."
