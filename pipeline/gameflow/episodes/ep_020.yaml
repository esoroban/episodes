      Портал гаснет. Трещина в зеркале темнеет. Кухня мамы исчезает.

      Марко стоит в темноте. Один.

      «Я выбрала тебя.»

      Три слова. Они не уходят. Сидят внутри — как камень в горле. Ни
      проглотить, ни выплюнуть.
