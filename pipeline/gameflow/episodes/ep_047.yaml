  # ── СЦЕНА 32: Марко говорит сам — трубку оставлю ─────────────────
  - scene_id: ep047_s32
    episode_id: 47
    source_ref: day_12.ep47.challenge
    scene_type: dialogue
    location: "Зеркальный Город, серверная комната Софы"
    time: "продолжение"
    characters_present: [Марко, Голос]
    author_text: >
      Голос — почти шёпотом, как уговор:
    dialogue:
      - who: Голос
        line: "Положи её. Последний раз. Скажи «да» — и всё закончится."
    author_text_after: >
      Марко молчит долго. Потом — тихо. Без крика. Без приёмов.
      От себя.
    dialogue_after:
      - who: Марко
        line: "Я не знаю, правы вы или нет."
      - who: Марко
        line: "Может, я бросил Макса. Может, виноват перед сестрой. Может, город рухнет."
      - who: Марко
        line: "Но это мои ошибки. Не ваши. И я хочу их совершать сам."
      - who: Марко
        line: "А трубку — оставлю."
    author_text_after_2: >
      В трубке — голос Софии, едва слышно, на выдохе:
      «Получилось.»

      Голос замирает. Никто — никогда — не говорил ему «я не
      знаю». Все приходили уверенные. Голос знает, как разворачивать
      уверенных.

      Три слова из первого эпизода. «Я не знаю.» Тогда —
      слабость. Сейчас — оружие. Потому что Голос привык к
      людям, которые знают. Которых можно развернуть.

      «Я не знаю» — не за что зацепиться.

      Голос — молчит. Впервые — не потому что думает. Потому
      что не может ответить.
    mood: "три слова — оружие. Голос замирает"
    next_default: ep047_s33
    visual_brief:
      background: "Серверная. Старый чёрный телефон на столе. Марко стоит ровно, проводная трубка крепко у правого уха. Мобильный — в кармане"
