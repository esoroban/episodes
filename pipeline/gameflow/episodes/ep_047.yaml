  # ── СЦЕНА 9: Drama theory — голова vs сердце ─────────────────────
  - scene_id: ep047_s09
    episode_id: 47
    source_ref: day_12.ep47.sofa_block
    scene_type: narrative
    location: "Зеркальный Город, серверная комната Софы"
    time: "продолжение"
    characters_present: [Марко]
    author_text: >
      Демагогия и манипуляция — родственники. Но бьют по разным
      местам.

      Демагогия путает ГОЛОВУ. Кривая логика. Подмена слов.
      Поспешные обобщения. Мозг не может разобраться.

      После демагогии человек думает: «Что-то не сходится.»

      Манипуляция — другое. Она давит на ЧУВСТВА. Не на разум —
      на эмоции. После манипуляции человек чувствует: «Мне
      плохо, но я не понимаю, почему я должен соглашаться.»

      Демагогия запутывает голову. Манипуляция сжимает сердце.

      Голос только что сжимал сердце Марко четыре раза подряд.

      Но сердце Марко держится — потому что у него в трубке
      София.
    mood: "первое имя для боли — манипуляция"
    next_default: ep047_s10
    visual_brief:
      background: "Серверная в расфокусе. По центру — два больших слова: «ГОЛОВА» и «СЕРДЦЕ», между ними тонкая линия"
      camera: medium
      characters:
