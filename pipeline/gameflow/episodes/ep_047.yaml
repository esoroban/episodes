      Голос отступает. Воздух в дверном проёме редеет ещё.
    dialogue_after:
      - who: Голос
        line: "Будет другой ребёнок. Другое исчезновение. Я не единственный."
      - who: Марко
        line: "Знаю. И всё равно остаюсь."
    author_text_after_2: >
      В трубке — тихое дыхание Софии. Долгое. Ровное. Как у
