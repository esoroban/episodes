  # ── СЦЕНА 36: КЛИФФХЭНГЕР — Голос отступает ──────────────────────
  - scene_id: ep047_s36
    episode_id: 47
    source_ref: day_12.ep47.cliffhanger
    scene_type: cliffhanger
    location: "Зеркальный Город, серверная комната Софы"
    time: "продолжение"
    characters_present: [Марко, Голос]
    author_text: >
      Голос замирает. Воздух в серверной впервые за весь
      разговор чуть редеет — как будто Голос делает шаг назад.

      Ни гула серверов. Ни треска под потолком. Ни шёпота стен.
      Тишина — оглушительная.

      Марко говорит. Не Голосу. Себе. Но Голос слышит.
    dialogue:
      - who: Марко
        line: "Я не умнее вас. Я не сильнее. Я просто хочу уйти отсюда вместе с сестрой."
    author_text_after: >
      Первые слова от СЕБЯ. Не из учебника. Не из правил.
      Просто свои.

      Голос отступает. Воздух в проёме редеет ещё.
    dialogue_after:
      - who: Голос
        line: "Будет другой ребёнок. Другое исчезновение. Я не единственный."
      - who: Марко
        line: "Знаю. Поэтому остаюсь — пока не найду как её забрать."
    author_text_after_2: >
      В трубке — голос Софии. Тихий. Уставший.

      «Братик. Слушай. У тебя в рюкзаке — один артефакт. Ты его
      ни разу не использовал.»

      «Когда я скажу — наденешь. Сейчас не время.»

      Марко не отвечает. Запоминает.

      В трубке — дыхание Софии. Долгое. Ровное. Как у того, кто
      впервые за месяцы выдохнул.

      Голос уходит. Серверная пуста. Только Марко, проводной
      телефон, и за стеклом на 23 этаже — сестра, которую он
      ещё не вытащил.

      Но впервые за всю битву он точно знает: вытащит.
    mood: "Голос отпустил. Но предупредил: будет другой"
    next_default: ep048_s01
    visual_brief:
      background: "Серверная. Открытая дверь, пустой проём. Старый чёрный телефон на столе, трубка крепко в руке Марко. Свет в проёме чуть редеет"
      camera: wide
      characters:
        - who: Марко
          expression: тихая решимость, без победного вида
          pose: ровно стоит, трубка проводного телефона по-прежнему у правого уха
          position: center
      props: [старый чёрный телефон, трубка у уха, витой провод, открытая дверь серверной, редеющий воздух в проёме]
      focus_object: "трубка у уха Марко — не положена ни разу"
      atmosphere: "Голос замолк, выход впереди"
      ui_mode: reading
