  # ── СЦЕНА 30: Марко говорит сам ──────────────────────────────────
  - scene_id: ep047_s30
    episode_id: 47
    source_ref: day_12.ep47.challenge
    scene_type: dialogue
    location: "Зеркальный Город, финальная комната"
    time: "продолжение"
    characters_present: [Марко, Голос, София, Сем]
    author_text: >
      Марко кладёт телефон обратно на пол. Окончательно. Стоит.
      Молчит. Долго.

      Потом говорит. Тихо. Без крика. Без приёмов. От себя.
    dialogue:
      - who: Марко
        line: "Я не знаю, правы вы или нет."
      - who: Марко
        line: "Может, я бросил маму. Может, я виноват перед Софией. Может, город рухнет."
      - who: Марко
        line: "Но это мои ошибки. Не ваши. И я хочу их совершать сам."
    author_text_after: >
      Песня в наушниках продолжается. Тихо. Не учит. Не спорит.
      Просто звучит.

      Голос замирает. Никто — никогда — не говорил ему «я не
      знаю». Все приходили уверенные. Голос знает, как разворачивать
      уверенных.

      Три слова из первого эпизода. «Я не знаю.» Тогда —
      слабость. Сейчас — оружие. Потому что Голос привык к
      людям, которые знают. Которых можно развернуть.

      «Я не знаю» — не за что зацепиться.

      Голос — молчит. Впервые — не потому что думает. Потому
      что не может ответить.
    mood: "три слова — оружие. Голос замирает"
    next_default: ep047_s31_sofa
    visual_brief:
      background: "Каменный зал. Телефон на полу экраном вниз. Марко стоит ровно, наушник в одном ухе"
