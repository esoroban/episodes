  - scene_id: ep047_s08
    episode_id: 47
    source_ref: day_12.ep47.sofa_block
    scene_type: narrative
    location: "Зеркальный Город, финальная комната"
    time: "продолжение"
    characters_present: [Марко, София, Сем]
    author_text: >
