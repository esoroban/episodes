  # ── СЦЕНА 11: Drama theory — Гриша, кнопки, лифт ─────────────────
  - scene_id: ep047_s11
    episode_id: 47
    source_ref: day_12.ep47.sofa_block
    scene_type: narrative
    location: "Зеркальный Город, серверная комната Софы"
    time: "продолжение"
    characters_present: [Марко]
    author_text: >
      ИСТОРИЯ. Гриша и Маша учились в одном классе. Каждый день
      Гриша брал у Маши печенье из коробочки. Не просил. Не
      уговаривал. Не приводил аргументов. Просто говорил: «Ты
      же хорошая подруга?»

      И Маша отдавала. Каждый день. Потому что если не отдашь —
      значит, ты ПЛОХАЯ подруга.

      Гриша не врал. Не обобщал. Не путал логику. Он нажимал
      одну кнопку — и кнопка работала.

      ЧЕТЫРЕ КНОПКИ МАНИПУЛЯЦИИ. Как кнопки в лифте: манипулятор
      нажимает кнопку — и ты едешь туда, куда нужно ЕМУ. Не
      тебе. Ему.

      1. ВИНА — «Я столько для тебя сделал, а ты...»
      2. СТРАХ — «Будет плохо! Ты пожалеешь!»
      3. СТЫД — «Что, боишься? Маленький ещё?»
      4. ШАНТАЖ ДРУЖБОЙ — «Настоящие друзья так не поступают.»

      Четыре кнопки. Четыре чувства. Логики — ноль.
    mood: "карта инструмента — четыре кнопки"
    next_default: ep047_s12
    visual_brief:
      background: "Серверная в расфокусе. По центру — пиктограмма панели лифта с четырьмя кнопками: ВИНА, СТРАХ, СТЫД, ДРУЖБА"
      camera: medium
      characters:
        - who: Марко
          expression: усваивает
          pose: смотрит на схему, проводная трубка у уха
          position: right
      props:
