      Перфекционизм — самая опасная ложная дилемма. Та, которую
      ставишь сам себе.

      Ноль всегда меньше, чем неидеально. Всегда.

      ВОЛШЕБНЫЙ ВОПРОС: «А что если...?» Он не отвечает на ловушку. Он
      её ломает. Возвращает варианты, которые Голос (внешний или
      внутренний) спрятал. Это инструмент, не магия.
