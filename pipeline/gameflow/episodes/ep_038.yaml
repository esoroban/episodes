      background: "Экран телефона, пузырь Софы и крупно — число «22» с мерцающим следом «30 → 22»"
      camera: close-up
      characters:
        - who: Марко
          expression: впитывает адрес и потерю
          pose: телефон в руках
          position: center
      props: [число «22» крупно, мерцающий след «30 → 22», иконка синхронизации]
      focus_object: "число 22 на экране Софы — синхронизировано со стеной"
      atmosphere: "цена ночи — Голос отыграл восемь"
      ui_mode: dialogue

