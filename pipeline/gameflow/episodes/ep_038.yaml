        line: "И ещё. Я подключилась к счётчику Системы. Теперь то же число — у меня. Сразу, без стены."
    author_text_after: >
      Число на экране Софы: 22.

      Из тридцати. Голос работал всю ночь, пока Марко спорил с
      артефактами. Восемь имён, которых Лина вернула, — снова
      стёрты. То же правило, что в ep_036, только в обратную
      сторону: счётчик считает помнящих. Помнящих стало меньше.

      Двадцать три этажа. Двадцать два человека.
    mood: "адрес найден — и цена ночи понятна"
    next_default: ep038_s26_end
