  # ── СЦЕНА 25: Софа — «Стеклянная комната. 23 этаж» ───────────────
  - scene_id: ep038_s25
    episode_id: 38
    source_ref: day_10.ep38.cliffhanger
    scene_type: dialogue
    location: "Зеркальный Город, заброшенное хранилище артефактов"
