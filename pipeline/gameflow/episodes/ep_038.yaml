  # ── СЦЕНА 7: Теория — выбор без выбора + «А что если?» ───────────
  - scene_id: ep038_s07
    episode_id: 38
    source_ref: day_10.ep38.sofa_block
    scene_type: narrative
    location: "Зеркальный Город, заброшенное хранилище артефактов"
    time: "ночь"
    characters_present: [Марко]
    author_text: >
      ВЫБОР БЕЗ ВЫБОРА — это особая ловушка. Тебе дают два варианта,
      но оба ведут к одному и тому же.

      Пример: «Спать сейчас или после уборки?» В обоих случаях ты
      идёшь спать. Кажется, что ты выбрал, — а на самом деле всё уже
      решили за тебя. Два пути, одна стена в конце.

      Где она прячется чаще всего:

      В рекламе. «Базовый или премиум?» — вариант «не покупать» убрали
      из меню. Тебя как будто спрашивают, но «нет» уже не предлагают.

      В своей голове. «Или сделаю идеально — или вообще не буду.» Это
      самая хитрая ловушка: её ставит сам себе. Ноль всегда меньше,
      чем «неидеально». Тройка лучше нуля. Всегда.

      ВОЛШЕБНЫЙ ВОПРОС: «А что если...?» Он не отвечает на ловушку.
      Он её ломает. Возвращает все спрятанные варианты обратно. «А что
      если просто не покупать?» «А что если сделать как получится?»

      Это не магия. Это просто вопрос — но он открывает дверь, которую
      от тебя закрыли.
    mood: "карта инструмента: где прячется ловушка + волшебный вопрос"
    next_default: ep038_s08
