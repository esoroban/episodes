#   школьная история + бинарный выбор), Софа закрывает блок правилом.
#
# ДРАМА — СЕРВЕРНАЯ, БУКВЫ М-А-Р-К-О, ЗАПИСЬ МАМЫ:
# s01  — Серверная, чёрные экраны, зелёный код (drama narrative).
