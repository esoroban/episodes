#
# СОФА-БЛОК — КАРТА ДЕМАГОГИИ (12 chat-quiz сцен + правило):
# s09  — Sofa quiz 1: поспешное обобщение (Серёжа «все сдали»).
# s10  — Sofa quiz 2: нападка на человека (новенькая «ты неделю — молчи»).
# s11  — Sofa quiz 3: пугало (Ваня «перенести на час» → «вообще не…»).
# s12  — Sofa quiz 4: ложный авторитет (певица про витамины).
# s13  — Sofa quiz 5: ложная дилемма («или с нами на крышу — или трус»).
# s14  — Sofa quiz 6: страшная цепочка (домашка → дворник за 4 шага).
# s15  — Sofa quiz 7: вопрос-ловушка («ты уже перестал списывать?»).
# s16  — Sofa quiz 8: подмена понятий («не списываю — подсматриваю»).
# s17  — Sofa quiz 9: ложная причина (красные носки → победа).
# s18  — Sofa quiz 10: уклонение от ответа («где велик?» — «комнату убрал?»).
# s19  — Sofa quiz 11: красивые слова без фактов («покорим вершины»).
# s20  — Sofa quiz 12: «я не говорю, что…» («…не врёшь, но…»).
# s29  — Правило 45: карта демагогии (chat).
#
# ИСПЫТАНИЕ — РАЗБОР ЗАПИСЕЙ (4 драм-бита + 8 квизов):
# s30 — Софа: «Голос использовал все двенадцать. Вспомни.» (chat подводка).
# s31 — Запись 1: Рей «Все согласны!» Марко: «Поспешное обобщение.» (drama).
# s32 — Запись 2: Голос «Или отдай — или потеряешь.» Марко: «Ложная дилемма.» (drama).
