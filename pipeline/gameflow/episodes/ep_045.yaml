  # ── СЦЕНА 6b: Очки Леона — нити проявляются — пароль виден ──────
  - scene_id: ep045_s07_glasses
    episode_id: 45
    source_ref: day_12.ep45.drama
    scene_type: narrative
    location: "Зеркальный Город, серверная комната Софы"
    time: "глубокая ночь"
    characters_present: [Марко]
    author_text: >
      Что-то тяжёлое в рюкзаке. Марко вспоминает.

      Старые очки в простой оправе. Леон отдал ему перед
      стиранием — давно. «Возьми. Когда поймёшь — наденешь.»

      Тогда Марко не понял. Сейчас — кажется, понял.

      Вытаскивает очки. Протирает рукавом. Надевает.
    author_text_after: >
      Серверная меняется.

      Тёмные кабели по стенам — наливаются голубым.
      Внутри них видно нити. Тысячи тонких светящихся
      нитей, как нервы. Они пульсируют. Каждая тянется
      к городу — к каждому жителю.

      Нити сходятся к одной точке: над главным терминалом.
      Там они переплетаются — медленно — образуя символы.
      Латинские. Светящиеся. Складываются в адрес:

      www.wordpowerlab.com

      Имя системы. Имя пароля. Адрес лаборатории, в которой
      строили этот город.

      Марко подходит к терминалу. Печатает. По одному
      символу. W-W-W. Точка. W-O-R-D-P-O-W-E-R-L-A-B.
      Точка. C-O-M.

      На экране — зелёная вспышка.

      ДОСТУП ОТКРЫТ.

      Все индикаторы на стойках — оживают. Гул серверов
      нарастает. На экране терминала — список файлов.
      Папка `/archive/`. Внутри — три файла.
    mood: "очки Леона — нити проявляются — пароль виден — система проснулась"
    next_default: ep045_s08
    visual_brief:
      background: "Серверная преобразилась. Чёрные стойки — теперь с голубыми мигающими индикаторами. Из стен выходят светящиеся голубые нити — тысячи, как нервы — сходятся над терминалом, где переплетаются в светящийся адрес «www.wordpowerlab.com». Марко перед терминалом, в очках, печатает"
      camera: medium
      characters:
        - who: Марко
          expression: тихое озарение
          pose: стоит у терминала в очках Леона, пальцы на клавиатуре
          position: center
      props: [старые очки Леона на лице Марко, светящиеся голубые нити сходящиеся над терминалом, переплетение нитей в светящийся адрес www.wordpowerlab.com, ожившие индикаторы на стойках, список файлов /archive/ на экране терминала, три имени файлов]
      focus_object: "нити сплетаются в адрес www.wordpowerlab.com — пароль; на экране открывается /archive/ с тремя файлами"
      atmosphere: "система просыпается — Марко её ключ, архив открыт"
      ui_mode: reading

