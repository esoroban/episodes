  - scene_id: ep045_s01
    episode_id: 45
    source_ref: day_12.ep45.drama
    scene_type: dialogue
    location: "Зеркальный Город, серверная комната Софы"
    time: "глубокая ночь"
    characters_present: [Марко, Лина]
    author_text: >
      Лина впереди. Она знает каждую дверь в этом районе.
      Из переулка — вниз, через железную дверь в подвале
      старой котельной, по узкой металлической лестнице.
      У последней ступени Лина останавливается.
    dialogue:
      - who: Лина
        line: "Дальше — твоё. Внутрь я не пойду."
      - who: Лина
        line: "Я подожду наверху."
    author_text_after: >
      Лестница закончилась. За ней — огромный зал.
      Центральная серверная Зеркального Города.

      Чёрные стойки серверов от пола до потолка. Тёмные.
      Все мигающие индикаторы — потушены. Толстые кабели
      уходят в стены, под пол, наверх. Где-то работают
      искусственные интеллекты, помогающие Голосу
      управлять всеми. Здесь — будто пусто.

      В центре зала — единственный включённый узел.
      Главный терминал. Чёрный корпус, один экран.
      Мерцающий курсор. И одна строка:

      ВВЕДИТЕ ПАРОЛЬ: _

      Пустое поле. Ни длины, ни подсказки.

      Марко стоит посередине. Дышит. Не торопится.
    mood: "обычная серверная — терминал с пустым полем"
    next_default: ep045_s02
    visual_brief:
      background: "Огромный зал. Чёрные стойки серверов от пола до потолка с потушенными индикаторами. Толстые тёмные кабели уходят в стены/пол/потолок. В центре зала — главный терминал: чёрный корпус, один светящийся экран. На экране — строка «ВВЕДИТЕ ПАРОЛЬ: _» с мерцающим курсором"
