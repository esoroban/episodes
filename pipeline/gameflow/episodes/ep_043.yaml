  # ── СЦЕНА 1: Площадь — Голос на балконе ──────────────────────────
  - scene_id: ep043_s01
    episode_id: 43
    source_ref: day_11.ep43.drama
    scene_type: narrative
    location: "Центральная площадь Зеркального города"
    time: "поздняя ночь"
    characters_present: [Марко, Лина, толпа]
    author_text: >
      Через час после пустого зала динамики во всём городе щёлкнули.
      Короткое объявление одной фразой: «Сегодня. Центральная
      площадь. Последняя речь.»

      Марко с Семом вышли из башни. Сем остался у выхода — такая
      толпа не для него: «Я подожду здесь. Если что — я близко.»

      На полпути к площади из переулка вынырнула Лина. Она уже
      слышала объявление. «Если речь — последняя, я считаю приёмы.
      Ты — слушаешь.»

      Центральная площадь. Марко не видел столько людей в Зеркальном
      городе — сотни. Может, тысяча. Стоят плотно, плечом к плечу,
      лица подняты к балкону.

      Лина — рядом. Тихо, в толпе. Капюшон надвинут. Марко — тоже.

      На балконе — Голос. Не тень. Не силуэт. Человек. Высокий.
      Худой. Руки — широко.
    mood: "после паузы Голос созвал площадь — толпа собралась к последней речи"
    next_default: ep043_s02
