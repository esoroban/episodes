  # ── СЦЕНА 7: Очки Леона — нити от толпы к балкону ────────────────
  - scene_id: ep043_s08
    episode_id: 43
    source_ref: day_11.ep43.drama
    scene_type: narrative
    location: "Центральная площадь Зеркального города"
    time: "ночь"
    characters_present: [Марко, Лина, Голос, толпа]
    author_text: >
