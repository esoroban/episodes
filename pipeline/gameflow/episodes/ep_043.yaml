  # ── СЦЕНА 9: Теория — демагогия + триггеры + фильтр ─────────────
  - scene_id: ep043_s10
    episode_id: 43
    source_ref: day_11.ep43.sofa_block
    scene_type: narrative
    location: "Центральная площадь Зеркального города"
    time: "ночь"
    characters_present: [Марко]
    author_text: >
      ДЕМАГОГИЯ — это когда речь ВЫГЛЯДИТ убедительной, но внутри —
      пустота. Видимость аргумента без аргумента.

      Демагог не обязательно врёт. Голос верит в свои слова. Но он
      ведёт кривой дорогой — не туда, куда ты решил идти, а туда,
      куда он хочет тебя привести.

      Все тринадцать приёмов — это виды демагогии. Подмена тезиса —
      демагогия. Нападка — демагогия. Пугало — демагогия. Ложная
      дилемма — демагогия. Вишнёвый отбор — демагогия. У каждого —
      своё имя, но общий диагноз один.

      СЛОВА-ТРИГГЕРЫ — маркеры, по которым демагогию можно опознать
      на лету.

      «Все знают...» — кто все? Где список?

      «Это же очевидно!» — для кого? Почему?

      «Любой нормальный человек...» — кто решил, что нормально?

      «Каждый понимает...» — каждый? Правда?

      Если слышишь такое — внимание. Скорее всего, за красивыми
      словами нет ни одного факта.

      ФИЛЬТР. Четыре буквы, два слова: ГДЕ ФАКТЫ?

      Применяй к любой речи. Если за словами нет фактов — демагогия.
      Неважно, насколько красиво звучит. Неважно, верит ли
      говорящий.
    mood: "карта инструмента — общий диагноз и фильтр"
    next_default: ep043_s11
    visual_brief:
      background: "Площадь в расфокусе. По центру — большой круг «ДЕМАГОГИЯ» с тринадцатью лучами-приёмами. Сбоку — список слов-триггеров и большая надпись «ГДЕ ФАКТЫ?»"
      camera: medium
      characters:
        - who: Марко
          expression: усваивает технику
          pose: смотрит на схему
          position: right
      props:
        - круг «демагогия» с 13 лучами
        - список слов-триггеров
        - фильтр «где факты?»
      focus_object: "круг демагогии + фильтр"
      atmosphere: "карта инструмента"
      ui_mode: reading

