      оправе. Леон отдал перед стиранием: «Возьми. Когда поймёшь —
      наденешь.» Тогда Марко не понял. Положил в карман и забыл.

      Сейчас — достаёт. Надевает.

      Толпа меняется. Не лица — нити. Тонкие, серые нити идут от
      каждого человека к балкону. От балкона — обратно вниз, в
      толпу, как паутина. Голос держит их в руках, но и они
      держат его.

      Рей. От него — нить тонкая. Колеблется. Не натянута, как у
      других. Не уходит к балкону — уходит ВБОК. К кому-то ещё.

      Марко снимает очки. Прячет в карман. Не сейчас. Потом —
      разберёмся.

      Толпа аплодирует. Голос кланяется. Уходит с балкона.
