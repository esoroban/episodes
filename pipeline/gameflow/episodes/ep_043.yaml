  - scene_id: ep043_s05
    episode_id: 43
    source_ref: day_11.ep43.drama
    scene_type: narrative
    location: "Центральная площадь Зеркального города"
    time: "ночь"
    characters_present: [Марко, Лина]
    branch_type: flavor_detour
    author_text: >
      Марко тянет Лину за рукав. Уходят. Толпа смыкается за ними.

      На углу площади Марко останавливается. Слышно эхо:
      «...единственный, кто заботится о ваших детях.»

      Лина — побелевшая: «Тринадцатый.» Останавливается. «Ты ушёл —
      и пропустил последний. Самый сильный.»

      Марко выдыхает. Защитил голову — потерял картину. Толпа
      расходится с площади — лица тёплые, расслабленные. Они только
      что услышали тринадцать приёмов и поверили в каждый. А Марко
      теперь даже не сможет назвать тринадцатый.

      Возвращается. Через минуту они снова в толпе — Голос ещё
      кланяется, последняя фраза висит в воздухе. Лина тихо: «Ещё
      успеем разобрать. Но дослушать до конца — это часть работы.»
    mood: "ушёл рано — остался без последнего и самого важного"
    merge_to: ep043_s06
    next_default: ep043_s06
    visual_brief:
