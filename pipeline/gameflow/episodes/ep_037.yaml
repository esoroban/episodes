        line: "ТРЕТЬЕ — давление через своих: «или с нами, или против». Между «свой» и «чужой» — приятель, знакомый, человек со своим мнением."
      - who: Софа
        line: "Главный признак: если человек злится на вопрос «А есть третий?» — почти всегда дилемма ложная."
      - who: Софа
        line: "Сейчас — десять примеров. Все выглядят как настоящий выбор. У каждого — третий путь."
    mood: "Софа углубляет — три места ловушки + признак"
    next_default: ep037_s07
    visual_brief:
