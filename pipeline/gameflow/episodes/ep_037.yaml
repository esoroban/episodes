  # ── СЦЕНА 5: Теория ложной дилеммы + закон исключённого третьего ──
  - scene_id: ep037_s05
    episode_id: 37
    source_ref: day_10.ep37.sofa_block
    scene_type: narrative
    location: "Зеркальный Город, тёмный переулок у разрушенной площади"
    time: "ночь"
    characters_present: [Марко]
    author_text: >
      ЛОЖНАЯ ДИЛЕММА — это ловушка из двух вариантов.

      Тебе говорят: «Или так, или так. Выбирай.» И кажется, что путей
      два. А на самом деле — больше. Просто остальные спрятали.

      Рей дал два пути. Голос — тоже два. Случайно?

      Бывает, что «или-или» работает по-настоящему. У этого правила
      есть имя — ЗАКОН ИСКЛЮЧЁННОГО ТРЕТЬЕГО. Для лампочки — горит
      или не горит, третьего нет. Для числа — чётное или нечётное,
      третьего нет.

      Но люди — не лампочка. Между «друг» и «враг» есть приятель,
      одноклассник, сосед по парте. Между «отдай» и «потеряй» — дверь,
      которую закрыли, чтобы ты её не увидел.

      Слова-ловушки: «или… или…», «или ты с нами, или против нас»,
      «третьего не дано», «выбора нет».

      Эта ловушка редко выглядит как ловушка. Чаще — как обычный
      выбор. Три места, где её ставят чаще всего.

      ПЕРВОЕ — угроза. «Сделай это, или будет плохо.» «Или будет
      плохо» закрыли, как стену. А там — десятки путей.

      ВТОРОЕ — спешка. «Решай прямо сейчас.» Если нет минуты подумать
      «А что ещё можно?» — её отняли нарочно.

      ТРЕТЬЕ — давление от своих. «Или с нами, или против.» Между
      «свой» и «чужой» есть приятель и просто знакомый.

      Главный признак: спросил «А есть третий путь?» — человек
      злится. Это почти всегда ловушка.

      Сигнал: услышал «или — или» — ищи третий путь. Он почти всегда
      есть.
    mood: "карта различия: закон работает / закон не работает"
    next_default: ep037_s06
