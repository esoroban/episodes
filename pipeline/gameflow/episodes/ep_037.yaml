        line: "София говорила про какое-то зеркало. У неё было. Маленькое — в ладонь. Когда не понимаешь, что видишь — оно показывало, как есть."
      - who: Лина
        line: "Я искала. Не нашла. Не знаю, как она его прятала."
      - who: Марко
        line: "Зеркало... в ладонь."
