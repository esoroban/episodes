  # ── СЦЕНА 5: Теория ложной дилеммы + закон исключённого третьего ──
  - scene_id: ep037_s05
    episode_id: 37
    source_ref: day_10.ep37.sofa_block
    scene_type: narrative
    location: "Зеркальный Город, тёмный переулок у разрушенной площади"
    time: "ночь"
    characters_present: [Марко]
    author_text: >
      ЛОЖНАЯ ДИЛЕММА. Когда говорят «или так, или так», а на самом деле
      вариантов больше. Рей дал два. Голос — тоже два. Совпадение?

      ЗАКОН ИСКЛЮЧЁННОГО ТРЕТЬЕГО. Один из трёх законов Аристотеля.
      Утверждение или истинно, или ложно. Третьего нет. Для лампочки —
      работает: горит или не горит. Для числа — работает: чётное или
      нечётное.

      Но жизнь — не лампочка. Между «другом» и «врагом» есть приятель,
      знакомый, одноклассник. Между «отдай» и «потеряй» — может быть
      дверь, которую спрятали.

      Фразы-ловушки: «или... или...», «или ты с нами, или против нас»,
      «есть только два пути», «третьего не дано».

      Сигнал: слышишь «или — или» — проверь, нет ли третьего.
    mood: "карта различия: закон работает / закон не работает"
    next_default: ep037_s06
    visual_brief:
      background: "Тёмный переулок в расфокусе. По центру — две колонки: слева «ЗАКОН РАБОТАЕТ» (лампочка / число), справа «ЗАКОН НЕ РАБОТАЕТ» (фигура «друг» / «приятель» / «знакомый» / «враг»). Стрелка вниз — «ищи третий вариант»"
