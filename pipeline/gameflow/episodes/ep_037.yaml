      Стеклянный диск размером с ладонь. Мерцает изнутри. Зеркало
      Повторений. То самое, от Леона. С Дня 2. Лежит на дне рюкзака
      с тех пор, как Леон стёрся.

      Марко вынимает. Лина смотрит. Долго.
    dialogue_after:
