  # ── СЦЕНА 5: Теория — нападение, три вида, защита три шага ───────────
  - scene_id: ep028_s05
    episode_id: 28
    source_ref: day_07.ep28.sofa_block
    scene_type: narrative
    location: "Зеркальный Город, центральная площадь"
    time: "вечер"
    characters_present: [Марко]
    author_text: >
      НАПАДЕНИЕ НА ЧЕЛОВЕКА. Когда нет хорошего обоснования — человек
      переключается на собеседника. Не на то, ЧТО ты говоришь. На то,
      КТО ты.

      Три вида.

      ОСКОРБЛЕНИЕ — ярлык вместо ответа. «Ты ленивый.» «Зубрилка.»
      «Зануда.» Ярлык — не аргумент. Ярлык — признание, что аргументов
      нет.

      ОБСТОЯТЕЛЬСТВА — дисквалификация. «Тебе девять лет — ты не
      понимаешь.» «Ты из другого района.» «Ты троечник.» Как будто
      возраст, место или оценки отменяют правоту.

      «САМ ТАКОЙ» — перевод стрелок. «А ты сам вчера…» «На себя
      посмотри.» Вместо ответа — атака в ответ.

      Ключевой принцип: правильность идеи не зависит от того, КТО её
      говорит. Если маленький ребёнок скажет «огонь горячий» — это
      правда. Возраст не отменяет факт.

      Защита — три шага: 1) НАЗОВИ приём. «Это нападение на меня, не
      на мой аргумент.» 2) ВЕРНИСЬ к теме. «Давай вернёмся к вопросу.»
      3) СПРОСИ: «Что не так с моим аргументом?»

      Если бьют по ТЕБЕ, а не по твоим СЛОВАМ — значит, твои слова
      сильные.
    mood: "три приёма врага — три шага защиты"
    next_default: ep028_s06
    visual_brief:
