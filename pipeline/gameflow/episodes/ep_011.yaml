  # ── СЦЕНА 2: Макс — «Слова врут. Тело — нет.» ────────────────────────
  - scene_id: ep011_s02
    episode_id: 11
    source_ref: day_03.ep11.drama
    scene_type: dialogue
    location: "Зеркальный Город, переулок"
    time: "вне времени"
    characters_present: [Марко, Макс]
    dialogue:
      - who: Макс
        line: "Не пялься. Все пялятся. Надоело."
      - who: Марко
        line: "Извини. Это... стирание?"
      - who: Макс
        line: "Макс. Ты тот, кто ищет сестру."
      - who: Марко
        line: "Откуда ты знаешь?"
      - who: Макс
        line: >
          В Городе мало секретов. У меня был брат. Младший. Два года
          назад стирание забрало память о нём. Сначала — его лицо в голове.
          Потом — его имя. Потом — чувство, что кто-то был рядом.
          Осталось только вот это.
    author_text_after: >
      Макс проводит пальцем по правой стороне лица. По тому, что осталось.

      «Все говорили: "Всё будет хорошо."» — Макс смотрит на стену
      напротив. — «Правильные слова. Тёплые. Но никто ни разу не спросил:
      "А каково тебе?" Никто не повторил то, что я сказал. Никто не
      попробовал почувствовать, что чувствую я. Говорили про себя —
      как им жалко, как им больно. А мне — ни слова.»

      Тепло. И больно. Одновременно. Марко смотрит на Макса и видит —
      зеркало. Не то зеркало, что на стенах. Другое. Живое. Макс знает,
      каково это — потерять. Его полустёртое лицо — это то, что может
      случиться с Марко. С памятью о Софии.

      Хочется рассказать всё. Про Софу. Про артефакты. Про Лину и
      серую нитку. Хочется довериться — потому что Макс понимает.
      Но после Леона... Доверие стоит жизней. Марко это уже знает.
    mood: "боль и узнавание"
    next_default: ep011_s03
    visual_brief:
      background: "Зеркальный Город, переулок, двое у стены"
      camera: medium
      characters:
        - who: Макс
          expression: спокойная боль, палец на стёртой щеке
