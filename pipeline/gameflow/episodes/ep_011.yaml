  # ── СЦЕНА 1: Переулок. Тень (CHOICE) ──────────────────────────────────
  - scene_id: ep011_s01
    episode_id: 11
    source_ref: day_03.ep11.drama
    scene_type: narrative
    location: "Зеркальный Город, переулок"
    time: "вне времени"
    characters_present: [Марко]
    author_text: >
      Переулок. Узкий, как щель между двумя зеркалами. Стены отражают
      Марко — но отражение чуть запаздывает, как будто думает, прежде
      чем повторить.

      Марко идёт один. После разговора с Линой, после Веры, после серой
      нитки — ему нужно побыть одному. В правом кармане — телефон.
      Софа молчит. Три процента батареи — как последние три слова,
      которые нужно потратить с умом.

      Серая нитка. Марко видит её каждый раз, когда закрывает глаза.
      Аккуратная. Ровная. Намотанная, как по линейке. Маркер агента
      Системы. На запястье Лины.

      Разведчик не кричит. Разведчик наблюдает.

      Шаги впереди. Тяжёлые, неровные. Кто-то идёт навстречу.

      Из тени выходит парень. Высокий — на голову выше Марко.
      Четырнадцать, может пятнадцать лет. Куртка с капюшоном, руки
      в карманах. И лицо...

      Левая сторона лица — нормальная. Тёмные глаза, резкий подбородок,
      шрам на брови. Живая. А правая — как выцветшая фотография.
      Контуры есть, но цвет ушёл. Глаз — бледный, почти прозрачный.
      Щека — как будто кто-то стёр ластиком и не дорисовал.
    mood: "настороженность, встреча"
    interaction_type: choice
    question: "Что делает Марко?"
    options:
      - id: approach
        text: "Подойти"
        next: ep011_s02
      - id: observe
        text: "Наблюдать из тени"
        next: ep011_s01d1
    next_default: ep011_s02
    visual_brief:
      background: "Зеркальный Город, узкий переулок, отражения на стенах запаздывают"
      camera: wide
      characters:
