          expression: настороженность
          pose: идёт, замедляет шаг
          position: left
      props: [тень человека с капюшоном, полустёртое лицо, отражения на стенах]
      focus_object: "силуэт незнакомца — половина лица стёрта"
      atmosphere: "переулок как щель — узко, тесно, отражения запаздывают"
      ui_mode: choice

  # ── ВЕТКА 11.1: Наблюдение (flavor_detour) ────────────────────────────

  - scene_id: ep011_s01d1
    episode_id: 11
    source_ref: day_03.ep11.drama
    scene_type: narrative
    location: "Зеркальный Город, переулок"
    time: "вне времени"
    characters_present: [Марко]
    branch_type: flavor_detour
    author_text: >
      Марко прижимается к стене. Смотрит. Парень — старше его,
