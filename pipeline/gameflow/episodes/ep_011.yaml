      увидел. В плечах, сжатых к ушам. В руке, прижатой к колену.

      И тогда в голове оформляется инструмент. Разведчик, который
      кричит «ГОВОРИ НЕМЕДЛЕННО!», не работает — это солдат в маске.
      Чтобы подойти к такому человеку, нужен ТОРМОЗ. Антенна. Её имя —
      СОПЕРЕЖИВАНИЕ.

      Сопереживание срабатывает ДО того, как скажешь обидное. Ты
      чувствуешь, что чувствует другой — и тормозишь. Три фразы
      приходят сами: «Я понимаю, что тебе...», «Тебе, наверное,
      обидно, когда...», «Я вижу, что тебе это важно...»

      Марко невольно фыркает — от того, как точно всё складывается.
      Макс поднимает бровь. Левую, живую. «Что?»

      Марко молчит. Тормоз уже работает.
