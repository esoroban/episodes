  # ── СЦЕНА 4: Теория — противоречие + закон непротиворечия ────────────
  - scene_id: ep025_s04
    episode_id: 25
    source_ref: day_07.ep25.sofa_block
    scene_type: narrative
    location: "Зеркальный Город, пустая улица"
    time: "утро"
    characters_present: [Марко, Сем]
    author_text: >
      ПРОТИВОРЕЧИЕ — когда человек говорит одно, а делает или говорит
      противоположное. В одно и то же время. В одном и том же смысле.

      Шоколад на щеке — и «я не ел конфеты». Слова говорят одно. Щека
      — другое.

      ЗАКОН НЕПРОТИВОРЕЧИЯ — второй закон логики Аристотеля. Одно и то
      же утверждение не может быть одновременно истинным и ложным.
      «Дверь открыта» и «дверь закрыта» — одновременно не бывает.

      Важно: смена мнения со временем — НЕ противоречие. «Раньше я
      любил кашу, теперь — нет» — нормально. Разные люди — не
      противоречие. Мама любит рыбу, папа — нет. Только ОДНОВРЕМЕННО
      и в ОДНОМ смысле.
    mood: "первый закон, который видно глазами"
    next_default: ep025_s05
    visual_brief:
      background: "Серая улица в расфокусе. В центре — детский эскиз: щека с пятном шоколада и закрытый рот, пиктограмма-маска с поднесённым пальцем «тс-с»"
