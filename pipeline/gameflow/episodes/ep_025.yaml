    author_text: >
      Марко отворачивает голову. Смотрит в стену. Не отвечает.

      У него нет сил на чужую надежду. У него ноль артефактов и
      серое будущее. Что он скажет десятилетнему — «беги, пока
      можешь»?

      Сем не уходит. Стоит. Молчит. Ждёт. Потом делает шаг ближе.

      Марко слышит дыхание рядом. Маленькое, неровное. Сем не уходит,
