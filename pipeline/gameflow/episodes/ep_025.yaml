  # ── СЦЕНА 22: КЛИФФХЭНГЕР — Число 27. Как указать, не обвиняя? ───────
  - scene_id: ep025_s22_end
    episode_id: 25
    source_ref: day_07.ep25.cliffhanger
    scene_type: cliffhanger
    location: "Зеркальный Город, пустая улица"
    time: "утро"
    characters_present: [Марко, Сем]
    author_text: >
      Число на стене: 27.

      Вера противоречит себе. «Защищаю детей» — и числа падают. Слова —
      одно. Действия — другое. В одно время. В одном смысле.

      Как указать на это — не обвиняя? Как спросить — не нападая?
