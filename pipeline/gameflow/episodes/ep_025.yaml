    scene_type: narrative
    location: "Зеркальный Город, пустая улица"
    time: "утро"
    characters_present: [Марко]
    author_text: >
      Марко сидит на тротуаре. Спиной к стене. Колени к груди.

      Леон — стёрт. Макс — стёрт. Лина — предала? Вера — агент. Мама —
      отдала Софию.

      Софа молчит. Батарея — четыре процента. Или просто нечего сказать.

      Марко не двигается. Нет сил. Нет направления. Нет людей, которым
      можно доверять. Как стоять на карте, где стёрты все дороги.
    mood: "конец второго акта — полное одиночество"
    next_default: ep025_s02
    visual_brief:
      background: "Серая улица Зеркального Города, тусклый утренний свет, длинная тень от стены"
      camera: wide
      characters:
        - who: Марко
          expression: пустота, безразличие, опустевшие глаза
          pose: сидит на тротуаре спиной к стене, колени к груди, телефон в одной ладони
          position: center
      props: [серая стена, треснувший тротуар, телефон с почти разряженным экраном, длинная тень]
      focus_object: "Марко, маленький силуэт у большой стены"
      atmosphere: "одиночество — тяжёлое, без направления"
      ui_mode: reading

