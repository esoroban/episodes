  # ── СЦЕНА 7: Теория — манипуляция страхом + 4 кнопки + 3 фильтра ────
  - scene_id: ep031_s07
    episode_id: 31
    source_ref: day_08.ep31.sofa_block
    scene_type: narrative
    location: "Зеркальный Город, зеркальный коридор"
    time: "вечер"
    characters_present: [Марко]
    author_text: >
      МАНИПУЛЯЦИЯ СТРАХОМ. Когда кто-то давит на страх, чтобы ты не
      думал, а подчинился. Страх — выключатель для мозга. Пока ты
      боишься — ты не рассуждаешь.

      Четыре маски запугивания — четыре кнопки.

      ЗДОРОВЬЕ — «заболеешь», «не вырастешь», «будет плохо». Удар по
      телу.

      ОДИНОЧЕСТВО — «все уйдут», «останешься один», «никто не будет
      дружить». Удар по связям.

      НЕУДАЧА — «не получится», «опозоришься», «будешь жалеть». Удар
      по будущему.

      НАКАЗАНИЕ — «тебя накажут», «расскажу всем», «будут последствия».
      Удар по безопасности.

      Слова-маркеры: «навсегда», «никогда», «все», «никто». Если
      встречаешь — включай внимание.

      Разница между манипуляцией и реальным предупреждением: реальное
      — забота плюс настоящая опасность плюс можно проверить. «Не
      трогай плиту — горячая» — это забота. «Не трогай — а то всю
      жизнь будешь без руки!» — это раздутый страх.

      ТРИ ВОПРОСА-ФИЛЬТРА. Первый: это точно произойдёт или только
      может? Второй: насколько вероятно? Третий: есть ли другие
      варианты?

      Страх не любит вопросов. Он как мыльный пузырь — лопается от
      первого прикосновения.
    mood: "карта приёма + три фильтра"
    next_default: ep031_s08
