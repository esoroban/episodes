  # ── СЦЕНА 5: Теория — обоснование, три типа ──────────────────────────
  - scene_id: ep027_s05
    episode_id: 27
    source_ref: day_07.ep27.sofa_block
    scene_type: narrative
    location: "Зеркальный Город, подвал подполья"
    time: "вечер"
    characters_present: [Марко]
    author_text: >
      ОБОСНОВАНИЕ. Когда человек говорит что-то — он должен объяснить
      ПОЧЕМУ. Не «просто потому что». Не «все так говорят». А ПОЧЕМУ.

      Вопрос-рентген: «Почему ты так думаешь?» Этот вопрос — уважение к
      разговору.

      Три типа обоснования.

      ФАКТ — проверяемые данные, цифры, измерения. «Вода замерзает при
      нуле» — факт. Проверено тысячами экспериментов.

      ЛОГИКА — одно следует из другого. «Если мокрый пол — значит, кто-то
      пролил воду или вымыл пол.» Причина и следствие.

      НАДЁЖНЫЙ ИСТОЧНИК — эксперт, проверенная информация. «Врач
      говорит — нужна прививка.» Врач — эксперт в своей теме.

      «Просто потому что» — НЕ обоснование. «Все так говорят» — НЕ
      обоснование. «Мне кажется» — мнение, не обоснование.

      «Папа говорит» — какой тип? Источник. Но надёжный ли? Папа —
      эксперт в строительстве городов? В стирании памяти? В детской
      психологии?
    mood: "три инструмента-рентгена для любого разговора"
    next_default: ep027_s06
    visual_brief:
      background: "Подвал в расфокусе. По центру — три большие пиктограммы в ряд, без подписей. 1) Линейка с делениями и цифрой «100» рядом (факт). 2) Две стрелки в виде «→→» — причина и следствие (логика). 3) Силуэт человека с поднятой ладонью и квадратной академической шапочкой / свитком (источник)."
