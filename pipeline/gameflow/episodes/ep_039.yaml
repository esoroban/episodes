  # ── СЦЕНА 6: Теория — составной + вопрос-ловушка ─────────────────
  - scene_id: ep039_s06
    episode_id: 39
    source_ref: day_10.ep39.sofa_block
    scene_type: narrative
    location: "Башня Голоса, двадцать третий этаж, стеклянная комната"
    time: "ночь"
    characters_present: [Марко]
    author_text: >
      Первый тип хитрых вопросов — СКЛЕЕННЫЙ ВОПРОС (его называют
      «составной»). Это когда в одном вопросе склеили сразу несколько
      разных тем.

      Пример: «Почему ты не сделал домашку, опоздал и забыл тетрадь?»
      Это не один вопрос, а три. Их зачем-то склеили вместе.

      Правило простое: один вопрос — одна тема. Если склеили — раздели
      и отвечай по очереди. Волшебная фраза: «Давай по порядку.»

      Второй тип — ВОПРОС-ЛОВУШКА. Внутри спрятано какое-то
      утверждение, которое ты вроде как уже принял.

      Пример: «Ты уже перестал врать?» Скажешь «да» — значит, раньше
      врал. Скажешь «нет» — значит, врёшь до сих пор. Любой ответ —
      ловушка.

      Это как мышеловка. Сыр виден — это вопрос. Пружина не видна —
      это спрятанное утверждение.

      Слова-подсказки, что внутри ловушка: «ты уже перестал…», «почему
      ты всегда…», «когда ты наконец…».

      ТРИ ШАГА, чтобы выбраться: один — найди спрятанное утверждение;
      два — скажи, что оно неверно; три — только потом отвечай.

      Волшебная фраза: «Твой вопрос думает, что я… Но это не так.»
    mood: "карта инструмента: два типа + техника трёх шагов"
