    location: "Зеркальный город, серверная комната Софы"
    time: "утро"
    characters_present: [Марко]
    author_text: >
      Сложный случай. Бабушка звонит и говорит: «Ты совсем забыл
      бабушку! Никогда не приходишь!»

      Это форма манипуляции — кнопка «вина». Но бабушка — не
      злая. Бабушка — одинокая. Она скучает. Она не хочет тебя
      ранить — ей просто грустно одной.

      Что делать? Не подчиняться. Но и не злиться.

      Ответ с эмпатией, но без подчинения: «Бабушка, я по тебе
      тоже скучаю. Давай договоримся на субботу.»

      Ты не соглашаешься, что «забыл» и «плохой». Ты не споришь
      и не оправдываешься. Ты предлагаешь решение.

      У тебя ВСЕГДА есть право сказать «нет» без чувства вины.
      Даже бабушке. Главное — рядом с «нет» дать тёплое «вижу
      тебя» и план.
