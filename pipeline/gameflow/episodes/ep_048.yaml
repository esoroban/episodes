      Перед ними `www.` — голубые. Сзади `.com` — голубые.
      Только что доформировались. Мозг сам достраивает:
      это веб-адрес. `www.` — начало, `.com` — конец.

      Полный адрес: www.wordpowerlab.com

      Имя системы. Имя пароля. Адрес лаборатории, в которой
