  # ── СЦЕНА 10: Теория — честная просьба vs манипуляция ─────────────
  - scene_id: ep048_s10
    episode_id: 48
    source_ref: day_12.ep48.sofa_block
    scene_type: narrative
    location: "Зеркальный город, серверная комната Софы"
    time: "утро"
    characters_present: [Марко]
    author_text: >
      ЧЕСТНАЯ ПРОСЬБА — просьба, при которой можно отказать БЕЗ
      последствий. Скажешь «нет» — и всё нормально. Никто не
      обижается. Никто не наказывает. Никто не говорит, что ты
      плохой.

      МАНИПУЛЯЦИЯ — наоборот. Скажешь «нет» — и ты сразу плохой.
      Виноват, трус или плохой друг.

      Сравни две фразы:

      Честная просьба: «Поможешь мне с задачей? Если занят —
      спрошу позже.»

      Манипуляция: «Тебе что, всё равно, как я напишу
      контрольную?»

      Разница — одно предложение. Но ощущение —
      противоположное. После честной просьбы ты спокоен: да или
      нет — оба нормально. После манипуляции ты чувствуешь: если
      скажу «нет» — я плохой человек.

      Главное правило: у тебя ВСЕГДА есть право сказать «нет»
      без чувства вины.
    mood: "тихая теория — честная просьба и её зеркало"
    next_default: ep048_s11
    visual_brief:
      background: "Расфокус комнаты. По центру — две большие фразы рядом: «Если занят — спрошу позже» и «Тебе что, всё равно?». Между ними — стрелка-сравнение"
