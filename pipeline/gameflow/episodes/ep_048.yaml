  # ── СЦЕНА 25: Манипуляция как кредит. Гриша и Маша (drama) ───────
  - scene_id: ep048_s25
    episode_id: 48
    source_ref: day_12.ep48.challenge
    scene_type: narrative
    location: "Зеркальный город, прозрачные улицы"
    time: "утро"
    characters_present: [Марко]
    author_text: >
      Манипуляция — как кредит. В кредите проценты —
      деньги. В манипуляции — доверие.

      Говоришь «да» сегодня. Платишь доверием завтра.

      Гриша приносил Маше печенье каждый день. И каждый
      раз о чём-то просил. Маша соглашалась — печенье же.

      Через месяц Маша возненавидела и печенье, и перемены,
      и самого Гришу.

      Каждое «да» было не от радости. От страха быть
      «плохой подругой». Маленькие долги собрались в
      большой счёт. И в конце — никакой дружбы.

      Манипуляция всегда разрушает отношения. Всегда. Это
      её встроенный процент.
    mood: "цена манипуляции — потеря дружбы"
    next_default: ep048_s26
    visual_brief:
      background: "Прозрачная улица. По центру — пиктограмма счёта «доверие» с растущим столбиком; внизу две фигурки спиной друг к другу"
      camera: medium
