scenes:

  # ── СЦЕНА 1: Марко выходит из подполья. Рей с обобщениями ────────────
  - scene_id: ep021_s01
    episode_id: 21
    source_ref: day_06.ep21.drama
    scene_type: narrative
    location: "Зеркальный Город, центральная площадь"
    time: "день"
    characters_present: [Марко, Рей]
    author_text: >
      Марко выходит из подполья. Лестница вверх. Свет бьёт в глаза.

      Площадь. Народ. Рей на ящике — как всегда. Красивый. Уверенный.
      Говорит так, что хочется кивать.
    dialogue:
      - who: Рей
        line: "ВСЕ, кто помогал мальчику — пожалели. КАЖДЫЙ его друг — стёрт. НИКТО не побеждает Голос. НИКОГДА."
    author_text_after: >
      Толпа кивает. Тридцать человек. Сорок. Кивают — и числа у всех
      чуть ярче. Как будто согласие прибавляет баллы.

      Марко хочет крикнуть «это неправда!». Но горло сжимается. Не от
      страха. От того, что часть него тоже кивает. Как будто голова
      решила за Марко — без спроса.
    mood: "речь Рея — и кивающая толпа вокруг"
    interaction_type: choice
    question: "Что делает Марко?"
    options:
      - id: silent
        text: "Промолчать. Слушать дальше"
        next: ep021_s02
      - id: shout
        text: "Поднять руку, попытаться крикнуть"
        next: ep021_s01b
    next_default: ep021_s02
    visual_brief:
      background: "Центральная площадь Зеркального Города. Рей на деревянном ящике, толпа в полумраке, динамики на столбах"
      camera: wide
      characters:
        - who: Марко
          expression: сжатые губы, внутренний бунт
          pose: только что вышел из люка подполья, телефон в руке
          position: left
        - who: Рей
          expression: страстный оратор, глаза горят
          pose: стоит на ящике, рука поднята
          position: right
      props: [люк подполья, ящик Рея, толпа киваяющих, динамики на столбах]
      focus_object: "Марко один из десятков — но один, кто не кивает"
      atmosphere: "соглашение прибавляет числа — Марко не согласен"
      ui_mode: choice

  # ── СЦЕНА 1b: Detour — Марко поднимает руку, но голова кивает ────────
  - scene_id: ep021_s01b
    episode_id: 21
    source_ref: day_06.ep21.drama
    scene_type: narrative
    location: "Зеркальный Город, центральная площадь"
    time: "день"
    characters_present: [Марко]
    branch_type: flavor_detour
    author_text: >
      Марко поднимает руку. Открывает рот. И — тишина.

      Голова кивает. Сама. Пока горло не придумало слова. «ВСЕ
      пожалели» — и Марко ловит себя на лёгком кивке. На
      микродвижении. Ещё секунду — и он согласится с тем, чего не
      проверял.

      Он опускает руку. Сжимает телефон в кулаке.

      Лучше послушать. Сначала.
    mood: "тело соглашается раньше головы — и Марко это ловит"
    merge_to: ep021_s02
    next_default: ep021_s02
    visual_brief:
      background: "Площадь, Марко у края толпы"
      camera: close-up
      characters:
        - who: Марко
          expression: ловит собственный кивок, пугается
          pose: рука приподнята, потом опускается, пальцы сжимают телефон
          position: center
      props: [толпа на фоне, Рей дальше, телефон в кулаке]
      focus_object: "микрокивок, который Марко поймал в себе"
      atmosphere: "первая проверка — на себе, не на Голосе"
      ui_mode: reading

  # ── СЦЕНА 2: Голос через динамики — тёплый, отцовский ────────────────
  - scene_id: ep021_s02
    episode_id: 21
    source_ref: day_06.ep21.drama
    scene_type: dialogue
    location: "Зеркальный Город, центральная площадь"
    time: "день"
