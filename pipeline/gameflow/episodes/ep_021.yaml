      Тёплый. Отцовский. Как колыбельная.
    dialogue:
      - who: Голос
        line: "Марко. Я знаю, что ты здесь."
      - who: Голос
        line: "Я знаю, что ты ищешь. Но ты ищешь не то."
    author_text_after: >
      Марко замирает. Голос такой тёплый, что хочется закрыть глаза и
      слушать. Как колыбельная. Но от колыбельных не потеют ладони.
    mood: "тёплый голос, потеющие ладони"
    next_default: ep021_s03
    visual_brief:
      background: "Площадь, динамики на столбах светятся тёплым жёлтым, Марко в центре, толпа вокруг слушает"
      camera: medium
      characters:
        - who: Марко
          expression: замер, внимание+подозрение
          pose: телефон у груди, плечи напряжены
          position: center
      props: [динамики со свечением, толпа в полумраке, фонари]
      focus_object: "свечение динамиков — источник тёплого голоса без лица"
      atmosphere: "колыбельная, от которой мурашки"
      ui_mode: dialogue

  # ── СЦЕНА 3: Первый поворотник — смена темы ──────────────────────────
  - scene_id: ep021_s03
    episode_id: 21
    source_ref: day_06.ep21.drama
    scene_type: dialogue
    location: "Зеркальный Город, центральная площадь"
    time: "день"
