# =====================================================================
#
# Flow:
#   s01 → s01b(detour) → s02 → s03 → s04 → s05 → s06
#   s06 → s07 → s08 → s09 → s10 → s11 → s12 → s13
#   s13 → s14_sofa → s15 → s16 → s17 → s18 → s19 → s20 → s21
#   s21 → s22 → s22_sofa → s23_end
#
# BRANCH (s01 → s01b → s02): после речи Рея Марко выбирает —
#   крикнуть «неправда» или промолчать и слушать дальше. Первый путь
#   = flavor_detour → merges в s02.
#
# ПРАВИЛО УРОКА: теория — в drama author_text (voice-over).
#   Софа-чат только для подводки + квиза + правила. Марко никогда не
#   последний в чате — закрывающий пузырь Софы.
#
# ДРАМА — ПЛОЩАДЬ, РЕЙ, ГОЛОС:
# s01  — Марко выходит из подполья. Рей на ящике: «ВСЕ/КАЖДЫЙ/НИКТО/НИКОГДА» (narrative + choice).
# s01b — Detour: Марко поднимает руку, хочет крикнуть — но голова кивает (narrative).
# s02  — Динамики включаются. Голос — тёплый, отцовский (drama dialogue).
# s03  — Первый поворотник: смена темы («как свет падает на площадь») (drama dialogue).
# s04  — Второй поворотник: смена тональности («какое грубое слово») (drama dialogue).
# s05  — Третий поворотник: ответ на другой вопрос («а ты уверен, что хочешь знать?») (drama dialogue).
# s06  — Голос серьёзно: «У Макса — 72 часа» (drama dialogue).
# s07  — Теория: уклонение от ответа = поворотник; три способа (narrative, drama).
#
# СОФА-БЛОК (phone chain — 6 квизов «какой поворотник»):
# s08 — Sofa quiz 1: домашка / мультик (смена темы) (vote).
# s09 — Sofa quiz 2: конфета / Древний Египет (смена темы) (vote).
# s10 — Sofa quiz 3: комната / «ты всегда меня ругаешь» (смена тональности) (vote).
# s11 — Sofa quiz 4: книга / «много читал на каникулах» (ответ на другой) (vote).
# s12 — Sofa quiz 5: домашка / «вот тетрадь» (честный ответ) (vote).
# s13 — Sofa quiz 6: опоздал / история про собаку (смена тональности) (vote).
# s14_sofa — Правило 21 (chat — канон).
#
# ИСПЫТАНИЕ (6 challenge квизов — Рей, Голос, Вера, мама):
# s15  — Драма 1-на-1: Марко↔Рей. ТРИ поворотника Рея за одну сцену.
# s16  — Sofa-recall quiz 1: Рей «я тоже когда-то задавал» (vote).
# s17  — Sofa-recall quiz 2: Рей «ты думаешь, ты один страдаешь» (vote).
# s18  — Sofa-recall quiz 3: Рей «пойдём, покажу кое-что» (vote).
# s19  — Challenge quiz 4: Голос «все, кто сопротивлялся, были забыты» (vote).
# s20  — Challenge quiz 5: Вера «пойдём выпьем чаю» (vote).
# s21  — Challenge quiz 6: Мама «как у тебя в школе?» (vote).
#
# ПРИНЦИП ИСПЫТАНИЯ: Марко↔Рей — сначала ПРОЖИТАЯ драма (s15 целиком),
# потом ТОЛЬКО ТОГДА Софа-чат разбирает каждую реплику Рея по шагам
# как recall. Чат не повторяет диалог — он ссылается на него.
#
# КЛИФФХЭНГЕР:
# s22       — Макс у фонтана. Правая сторона уже бледная (с Дня 3), левая впервые гаснет (drama dialogue).
# s22_sofa  — Софа: 72 часа, визуальное подтверждение = факт (chat).
# s23_end   — Число: 31 (cliffhanger).
# =====================================================================

