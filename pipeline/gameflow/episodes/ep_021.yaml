      focus_object: "Марко, который заметил третью уклонку"
      atmosphere: "паттерн виден"
      ui_mode: dialogue

  # ── СЦЕНА 6: «У Макса — 72 часа» ─────────────────────────────────────
  - scene_id: ep021_s06
    episode_id: 21
    source_ref: day_06.ep21.drama
    scene_type: dialogue
    location: "Зеркальный Город, центральная площадь"
    time: "день"
    characters_present: [Марко, Голос]
    author_text: >
      Потом Голос — серьёзно. Без тепла. Без колыбельной.
    dialogue:
      - who: Голос
        line: "У Макса — 72 часа."
    author_text_after: >
      Динамики гаснут. Тёплый свет уходит. Площадь снова — обычная.

      Три ответа. Ноль по существу. Три раза Голос включил поворотник
      и уехал. А последним — ударил по живому.
    mood: "колыбельная оборвалась — остался только удар"
    next_default: ep021_s07
    visual_brief:
      background: "Площадь, динамики гаснут, тёплый свет уходит, Марко один в толпе"
      camera: wide
      characters:
        - who: Марко
          expression: напряжённый удар — услышал «72 часа»
          pose: замер, рука с телефоном сжалась
          position: center
      props: [погасшие динамики, толпа разбредается, Рей уже не на ящике]
      focus_object: "Марко, которому только что назвали срок Макса"
      atmosphere: "после колыбельной — часы тикают"
      ui_mode: dialogue

  # ── СЦЕНА 7: Теория — поворотник, три способа (drama voice-over) ─────
  - scene_id: ep021_s07
    episode_id: 21
    source_ref: day_06.ep21.sofa_block
    scene_type: narrative
    location: "Зеркальный Город, центральная площадь"
    time: "день"
    characters_present: [Марко]
    author_text: >
      Голос ответил три раза. И ни разу по существу. Как машина —
      включил поворотник и уехал в другую сторону.

      УКЛОНЕНИЕ ОТ ОТВЕТА. Когда человек вроде бы отвечает, но на ТВОЙ
      вопрос не отвечает. Метафора — ПОВОРОТНИК. Включил и уехал от
      вопроса.

      Три способа включить поворотник.

      Первый — СМЕНА ТЕМЫ: начинает говорить о другом. «Зачем
      стираешь?» — «Какой чудесный день!» Надеется, что ты забудешь
      вопрос.

      Второй — СМЕНА ТОНАЛЬНОСТИ: шутит или показывает эмоцию вместо
      ответа. «Стирание — какое грубое слово!» Шутка вместо ответа.
      Или крик: «Почему ты ВСЕГДА меня допрашиваешь?!» — эмоция вместо
      ответа.

      Третий — самый коварный: ОТВЕТ НА ДРУГОЙ ВОПРОС. Похож на
      настоящий ответ. «Ты уверен, что хочешь знать?» — вроде бы про
      твой вопрос. Но не ответ. Поворотник без мигалки.
    mood: "три способа уехать от вопроса — теперь разложены"
    next_default: ep021_s08
    visual_brief:
      background: "Площадь в расфокусе, в центре — силуэт машины с включённым поворотником"
      camera: medium
      characters:
