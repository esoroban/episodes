      ui_mode: dialogue

  # ── СЦЕНА 5: Третий поворотник — ответ на другой вопрос ──────────────
  - scene_id: ep021_s05
    episode_id: 21
    source_ref: day_06.ep21.drama
    scene_type: dialogue
    location: "Зеркальный Город, центральная площадь"
