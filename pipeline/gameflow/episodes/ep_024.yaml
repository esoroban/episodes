      Как хамелеон — цвет другой, а ящерица та же. «Свобода» может
      значить «право выбирать». А может — «хаос». «Друг» может значить
      «поддержка». А может — «тот, кто даёт списать».

      ЗАКОН ТОЖДЕСТВА: одно слово должно сохранять ОДИН смысл на
      протяжении всего разговора. Нарушил — и спор рассыпается. Потому
      что ты споришь о РАЗНЫХ вещах одним словом.

      Защита — волшебный вопрос: «Что ИМЕННО ты имеешь в виду под...?»
      Чем размытее слово — тем легче его подменить. С точными словами
      (числа, факты) подмены не бывает.

      И ещё — КОНТР-ХОД. Спокойный уточняющий вопрос вместо нападения
      или оправдания. Два инструмента: «Когда именно?» и «Что ты
      имеешь в виду?»

      Формула: уточнить слово + попросить пример + отделить эмоцию от
      факта.
