      focus_object: "доска с восемью именами — все приёмы названы"
      atmosphere: "битва закончена — Голос лишён голоса"
      ui_mode: reading

  # ── СЦЕНА 6: Шантаж — Голос обещает мир за подчинение ────────────
  - scene_id: ep050_s06
    episode_id: 50
    source_ref: day_13.ep50.battle
    scene_type: dialogue
    location: "Школа, класс 5-Б, у доски"
    time: "утро"
    characters_present: [Марко, Голос]
    author_text: >
      Голос — последний удар. Не через динамик. Тихо. Лично.
      Только для Марко.

      Динамики молчат. Доска полна. Класс наполовину проснулся.
      Мел в руке у Марко — почти стёрт. Колени слабые.

      Голос — почти ласковый. Как уставший родитель.
    dialogue:
      - who: Голос
        line: "Ты устал. Я устал. Все устали."
      - who: Голос
        line: "Скажи одно слово — «да» — и я уйду. Навсегда. Больше никаких стираний. Ни братьев, ни сестёр. Все будут жить спокойно."
      - who: Голос
        line: "Подумай: одно слово — и мир. Ты этого хотел, правда?"
    author_text_after: >
      Кнопка — самая хитрая. Не угроза. Обещание.

      Марко смотрит на новенькую с серой ниткой. На Данилу,
      который наконец поднял голову. На Веру, у которой мел
      выкрошился.

      Хочется сказать «да». Чтобы они все жили спокойно. Чтобы
      больше никого не забирали. Одно слово.

      Хочется всем телом.

      Что сделает Марко?
    mood: "шантаж через ложное обещание мира — кнопка через любовь"
    next_default: ep050_s06_choice
    visual_brief:
      background: "Класс. Тишина. Все динамики тёмные. Мел почти стёрт. Марко стоит у доски — колени дрожат, рука у груди. На фоне доски — восемь имён в столбик, как восемь зарубок"
      camera: close-up
      characters:
