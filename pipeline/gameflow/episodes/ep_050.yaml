      своего брата. Никто больше не помнит.

      Сейчас Голос работает в её голове тоже. Мягко. Тепло.
      «Забудь.»
    mood: "Голос играет в заботу — новенькая в опасности тоже"
    next_default: ep050_s04
    visual_brief:
      background: "Класс. Динамик на стене с голубым свечением, лица одноклассников повёрнуты в его сторону. Новенькая у окна — серая нитка на запястье"
      camera: medium
      characters:
