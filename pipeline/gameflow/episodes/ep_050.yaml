  # ── СЦЕНА 7: Друзья дают опору словами ───────────────────────────
  - scene_id: ep050_s07
    episode_id: 50
    source_ref: day_13.ep50.live_drama
    scene_type: dialogue
    location: "Школа, класс 5-Б, у доски"
    time: "утро"
    characters_present: [Марко, София, Данила, Макс, Рей, новенькая]
    author_text: >
      Марко молчит. Шантаж висит в воздухе. Одно «да» — и мир.

      София встаёт первая. Из всех — первая. Она ждала этого
      момента с битвы. Подходит к брату у доски, кладёт ладонь
      ему на плечо. Молча. Только потом — слова.

      Данила встаёт следом. Тот, кто в первый день сказал
      «приснилось». Теперь — рядом.

      Макс — у двери. Подошёл из глубины класса. Глаза карие,
      настоящие.

      Рей — в дверном проёме. Зашёл в школу утром по делу,
      остался, когда услышал. Стоит, опираясь плечом о косяк.
      Папка под мышкой забыта.

      Новенькая — встала у своей парты. Серая нитка на запястье
      видна. Голос у неё тонкий, но уже не дрогнет.

      Пятеро рядом. Каждый — со своим словом.
    dialogue:
      - who: София
        line: "Братик. Я здесь. Я не пропаду снова."
      - who: София
        line: "Не плати ему «да» за меня. Я уже дома."
      - who: Данила
        line: "Когда мне дома кричат, отец говорит маме: «Давай поговорим об этом завтра, когда оба остынем.» Это работает."
      - who: Макс
        line: "Скажи: «Мне нужно подумать.» Не «да», не «нет». Подумать."
      - who: новенькая
        line: "Мой брат, до того как пропал, говорил: «У нас разные мнения. И это нормально.» Я запомнила."
      - who: Рей
        line: "Я знаю с другой стороны. Со сцены. Когда они говорят «одно слово» — значит, торгуют. Не торгуйся."
      - who: София
        line: "Возьми паузу, Марко. Это и есть твой ответ."
    author_text_after: >
      Пять голосов. Из пяти ртов. Не из чата, не с экрана. Из
      живых людей. И первая — сестра, ради которой Голос пытался
      его купить.

      Марко слушает. Ладонь Софии — у него на плече. Класс —
      наполовину уже не спит — тоже слушает. Голос молчит.
      Впервые за весь день — он не знает, что сказать.
    mood: "пятеро дают опору — первая София, та самая, ради которой Голос торговал"
    next_default: ep050_s08
    visual_brief:
      background: "Класс. Доска с восемью именами на заднем плане. София у доски рядом с Марко, рука на плече. Данила, Макс, новенькая — каждый со своего места. Рей в дверном проёме. Пятеро вокруг Марко. Класс смотрит"
      camera: wide
      characters:
        - who: Марко
          expression: слушает, лицо смягчается
          pose: у доски, голова повёрнута к каждому по очереди
          position: center
        - who: София
          expression: твёрдая, спокойная — она вернулась и говорит
