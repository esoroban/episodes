  # ── СЦЕНА 35: Марко: «У нас разные мнения.» Голос отступает ──────
  - scene_id: ep050_s35
    episode_id: 50
    source_ref: day_13.ep50.battle
    scene_type: dialogue
    location: "Школа, класс 5-Б, у доски"
    time: "утро"
    characters_present: [Марко, Данила, Макс, Рей, новенькая, Вера, Голос]
    dialogue:
      - who: Марко
        line: "Это ложная дилемма. Я хочу вернуть сестру. И я хочу сделать это сам. Оба варианта — мои."
      - who: Голос
        line: "Ты... не можешь..."
      - who: Марко
        line: "У нас разные мнения. И это нормально."
      - who: Голос
        line: "Слова — твои. Хорошо. Запомни."
      - who: Голос
        line: "Я найду другой способ. Я сделаю вашу жизнь опасной."
      - who: Голос
        line: "Не сегодня. Скоро."
    author_text_after: >
      Тишина. Долгая. Класс не дышит.

      А потом — класс просыпается. По очереди. Сначала те, кто
      сидел ближе к доске. Лена — моргает, опускает голову,
      потом поднимает. Артём — смотрит на свои руки, не помнит,
      зачем поднимал их к динамику. Даша — оглядывается на
      Марко, узнавая.

      Вера — у доски. Делает шаг назад. Один. Другой.
      Замирает. Слепо смотрит на мел в своей руке — он
      выкрошился. Тихо: «Дети. Что я...» Не договаривает.
      Опускает руки.

      Динамики — один за другим — замолкают. Щёлк. Щёлк. Щёлк.
      Как лампочки, которые выключает кто-то невидимый.

      Последний экран в конце коридора — мигает. Раз. Два.
      Гаснет.

      И — тишина.

      Голос отступил. Не погиб. Не исчез. Спрятался. Где-то
      далеко — мигает экран. Где-то в другом городе — щёлкает
      динамик. Он готовит другое: не слова, а опасность. Жизнь,
      где надо знать, где безопасно, а где нет.

      Это будет следующая история. Не сегодня.

      Но сегодня — он здесь не нужен. Сегодня здесь — Марко.
      Данила. Макс. Рей. Новенькая. И класс, который наконец
      открыл глаза.
    mood: "Голос отступает — класс просыпается, Вера приходит в себя"
    next_default: ep050_s36
    visual_brief:
      background: "Класс. Все динамики тёмные. Экран в коридоре гаснет. Доска: восемь имён + «ПАУЗА». Одноклассники — головы поднимаются, лица будто после сна. Вера у доски — делает шаг назад, мел выкрошился"
      camera: wide
      characters:
        - who: Марко
          expression: спокойствие победы — без триумфа
          pose: у доски, мел опущен
          position: center
        - who: Вера
          expression: возвращается в себя, лицо мягчает
          pose: шаг назад от доски, мел в руке
          position: right
        - who: Данила
          expression: облегчение
          pose: рядом с Марко
          position: foreground
        - who: новенькая
          expression: первая улыбка
          pose: у парты, плечи распрямились
          position: left
      props: [доска с восемью именами и «ПАУЗА», тёмные динамики, гаснущий экран в коридоре, выкрошенный мел Веры, просыпающиеся одноклассники]
      focus_object: "просыпающийся класс и Вера, возвращающаяся в себя"
      atmosphere: "победа тихая — Голос уходит, не убит"
      ui_mode: dialogue

