          pose: у доски, мел опущен
          position: center
        - who: Вера
          expression: возвращается в себя, лицо мягчает
          pose: шаг назад, мел выпадает из руки
          position: right
        - who: новенькая
          expression: первая улыбка
          pose: у парты, плечи распрямились
          position: left
      props: [доска с восемью именами и «ПАУЗА», тёмные динамики, гаснущий экран в коридоре, выкрошенный мел Веры, просыпающиеся одноклассники]
      focus_object: "просыпающийся класс и Вера, возвращающаяся в себя"
      atmosphere: "победа тихая — Голос уходит с угрозой на потом"
      ui_mode: dialogue

  # ── СЦЕНА 10: Софа загорается. Голос Софии ───────────────────────
  - scene_id: ep050_s10
