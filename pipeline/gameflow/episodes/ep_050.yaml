  # ── СЦЕНА 1: Голос захватил школу. Софа молчит ───────────────────
  - scene_id: ep050_s01
    episode_id: 50
    source_ref: day_13.ep50.drama
    scene_type: narrative
    location: "Школа, класс 5-Б"
    time: "утро"
    characters_present: [Марко, София]
    author_text: >
      Голос — везде. Динамики в классах. Экраны в холле. Телефоны
      одноклассников. Он говорит мягко, спокойно, как школьный
      психолог. Слова — правильные. Тон — тёплый.

      Одноклассники кивают. Вера улыбается у доски. Данила смотрит
      в стол. Макс — на дверь.

      Марко сидит за партой. София — за соседней. Та самая, что
      всегда была пустой, пока её не было. Теперь — занятая. Глаза
      ясные. Голос её не достаёт: уже один раз стирал, второй —
      не цепляется.

      Софа в кармане Марко — чёрный экран. Молчит со вчера. Ни
      подсказки, ни сообщения. Но София рядом — и этого хватает.

      Не один.
    mood: "Голос захватил школу — но София у соседней парты не сдалась"
    next_default: ep050_s02
    visual_brief:
      background: "Класс 5-Б. Парты в ряд. Динамики в углах. На экранах в коридоре — тёплый голубой свет. Одноклассники сидят расслабленно, головы подняты к динамикам. Вера у доски — улыбается. В среднем ряду две парты Марко и Софии — рядом"
