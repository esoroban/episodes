          pose: чуть позади Софии у доски
          position: right
        - who: Макс
          expression: серьёзно
          pose: у двери, шаг вперёд
          position: left
        - who: новенькая
          expression: тихая твёрдость
          pose: у парты, ладонь на столе
          position: foreground
        - who: Рей
          expression: спокойно, опирается о косяк
          pose: в дверном проёме, плечом к косяку
          position: background
      props: [доска с восемью именами, пять карточек-фраз как парашюты в воздухе, серая нитка новенькой, ладонь Софии на плече Марко]
      focus_object: "София рядом — её ладонь на плече брата, первая и главная опора"
      atmosphere: "опора собирается из живых ртов — Голос молчит, Софию он не получил"
      ui_mode: dialogue

