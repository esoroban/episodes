      props: [доска с восемью приёмами + пятью ситуациями, огрызок мела, тетради одноклассников]
      focus_object: "Марко у доски — учитель"
      atmosphere: "финальный урок — через примеры из жизни"
      ui_mode: reading

  # ── СЦЕНА 13: Финальный круг — София, Данила, Макс, Рей, новенькая
  - scene_id: ep050_s13
    episode_id: 50
    source_ref: day_13.ep50.finale
    scene_type: narrative
    location: "Школа, класс 5-Б"
    time: "утро"
    characters_present: [Марко, София, Данила, Макс, Рей, новенькая]
    author_text: >
      Звонок на перемену не звенит. Никто не выходит. Класс сидит.
      Это — другая тишина. Не страх. Внимание.

      София всё это время — рядом с Марко. С битвы не отходила.
      Сейчас села обратно за свою парту, соседнюю. Та самая
      парта, что до возвращения была пустой. Теперь занята —
      окончательно.

      Данила — за соседнюю парту с другой стороны. Тот, кто в
      первый день сказал «приснилось».

      Макс — за следующую. Глаза карие, настоящие.

      Рей делает шаг от двери. Подходит к парте Марко, опирается
      рукой о её край. Стоит рядом. Не выступает. Не спорит.
      Слушает.

      Новенькая — у своей парты. Не подходит. Но смотрит на
      Марко. И впервые за утро — глаза не отводит.

      Пятеро рядом. И девочка напротив.
    mood: "круг собрался — без врага, без сцены, просто рядом"
    next_default: ep050_s14
    visual_brief:
      background: "Класс после битвы. Доска с восемью именами + пятью ситуациями. Тёмные динамики. Данила и Макс за соседними партами с Марко. Рей у парты Марко стоит. Новенькая напротив за своей партой"
      camera: wide
      characters:
        - who: Марко
          expression: спокойствие, без триумфа
          pose: за партой, ладони на столе
          position: center
        - who: Данила
          expression: впервые рядом — не напротив
          pose: за соседней партой, корпус к Марко
          position: right
        - who: Макс
          expression: настоящий, спокойный
          pose: за другой соседней партой
          position: left
        - who: Рей
          expression: впервые — без сценической маски
          pose: стоит у парты Марко, опирается о край
          position: background
        - who: новенькая
          expression: первый кивок, узнавание
          pose: за партой напротив, рука с серой ниткой
          position: foreground
      props: [доска, парты, рюкзаки, серая нитка новенькой]
      focus_object: "круг детей и Рей — без врага"
      atmosphere: "круг собрался — впервые не против, а рядом"
      ui_mode: reading

  # ── СЦЕНА 14: Марко новенькой — «садись, я расскажу» ─────────────
  - scene_id: ep050_s14
    episode_id: 50
    source_ref: day_13.ep50.finale
    scene_type: dialogue
    location: "Школа, класс 5-Б"
    time: "утро"
    characters_present: [Марко, София, новенькая]
    author_text: >
      Марко смотрит на новенькую. Делает паузу. Ту самую.

      София рядом за соседней партой. Молча кладёт ладонь на
      Маркову руку. Не вмешивается. Просто — здесь. На случай.
