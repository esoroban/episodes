      - who: Данила
        line: "Оба кричат. Что им сказать, чтобы ссора стала спором?"
    author_text_after: >
      Марко смотрит на Данилу. Данила — на одноклассников.

      «Сначала пауза. Потом чувства. Потом — обратно к теме.»

      «Давайте сделаем паузу. Мне обидно, что вы кричите.
      Решим по-другому: сыграем на выбывание или выберет
      команда.»

      Кто-то в третьем ряду кивает. Артём из этого класса —
      опускает глаза.
    mood: "вторая ситуация — Данила приносит знакомых из двора"
    next_default: ep050_s40
