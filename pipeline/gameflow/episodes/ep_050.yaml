  # ── СЦЕНА 4: Марко встаёт у доски ────────────────────────────────
  - scene_id: ep050_s04
    episode_id: 50
    source_ref: day_13.ep50.drama
    scene_type: dialogue
    location: "Школа, класс 5-Б, у доски"
