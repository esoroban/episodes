  # ── СЦЕНА 5: Битва — 8 приёмов в одном плотном раунде ────────────
  - scene_id: ep050_s05
    episode_id: 50
    source_ref: day_13.ep50.battle
    scene_type: narrative
    location: "Школа, класс 5-Б, у доски"
    time: "утро"
    characters_present: [Марко, София, Голос]
    author_text: >
      Голос атакует. Один приём — один удар.

      «Если дети не будут меня слушать — вырастут глупыми, без
      работы, без денег, в нищете, в несчастье!»
      Марко пишет: СТРАШНАЯ ЦЕПОЧКА. Длинная лестница, каждое
      звено слабее. Динамик слева — щёлк, тишина.

      «Либо вы со мной, либо против образования!»
      Марко: ЛОЖНАЯ ДИЛЕММА. Два варианта вместо многих. Динамик
      справа — щёлк.

      «Марко — ребёнок! Что он понимает?»
      Марко: НАПАДКА НА ЧЕЛОВЕКА. Удар по человеку, не по
      аргументу. Третий динамик гаснет.

      «Марко хочет УНИЧТОЖИТЬ образование!»
      Марко: ПУГАЛО. Я не говорил «уничтожить». Я сказал «не
      подчинять». Четвёртый.

      «Великие учёные всех стран поддерживают!»
      Марко: ЛОЖНЫЙ АВТОРИТЕТ. Какие учёные? Где работы? Пятый.

      «Свобода = хаос = разрушение!»
      Марко: ПОДМЕНА ПОНЯТИЙ. Свобода и хаос — разные слова.
      Шестой.

      «Скажи всем — давно ты сбиваешь одноклассников с толку?»
      Марко: ВОПРОС-ЛОВУШКА. Внутри спрятано «ты виноват». Я не
      сбиваю. Седьмой.

      «Я не говорю, что дети глупые... но посмотрите!»
      Марко: «Я НЕ ГОВОРЮ, ЧТО...». После «но» — самое важное.
      Восьмой.

      Доска полна. Восемь имён в столбик. Мел сточился до огрызка.
      Все восемь динамиков молчат.

      По мере того как каждое имя ложилось на доску — один из
      одноклассников поднимал голову. Просыпался. Лена — на
      «нападке». Артём — на «пугале». Даша — на «подмене». К
      восьмому имени половина класса уже смотрит ясными глазами.

      София всё это время — за соседней партой. Сжала кулаки.
      Смотрит, как брат рубит приёмы по именам. Один раз подняла
      руку — будто хотела встать и подойти. Не встала. Ждёт. Её
      ход ещё впереди.

      Вера у доски — делает шаг назад. Один. Другой. Слепо смотрит
      на мел в своей руке. Шепчет: «Дети...» Не договаривает.
    mood: "битва — 8 имён на доске, класс просыпается, мел крошится"
    next_default: ep050_s06
    visual_brief:
