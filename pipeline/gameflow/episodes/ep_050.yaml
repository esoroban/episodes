  # ── СЦЕНА 12: Марко рассказывает 5 ситуаций — для класса ─────────
  - scene_id: ep050_s12
    episode_id: 50
    source_ref: day_13.ep50.open_practice
    scene_type: narrative
    location: "Школа, класс 5-Б"
    time: "утро"
    characters_present: [Марко]
    author_text: >
      Марко смотрит на новенькую. На класс. Подходит к доске.
      Стирает «ПАУЗА» — освобождает место.

      Берёт огрызок мела и пишет рядом с восемью именами:

      ЛЕНА И ВИКА. Делите проект — делите задачи. Я-высказывание:
      «Мне важно рисовать, потому что я лучше выражаю идеи. Давай
      разделим: я рисую, ты пишешь, потом объединим.»

      КОСТЯ И АРТЁМ. Кричат за капитанство. Сначала пауза. Потом
      о чувствах: «Мне обидно, когда ты кричишь.» Потом обратно к
      теме: «Сыграем на выбывание или выберет команда?»

      ДАША И СМЕХ. Крик «вы тупые» — это ссора. Лучше: «Мне
      больно, когда смеются над моей внешностью. Я выбрала стрижку,
      которая мне нравится. У нас разные вкусы — это нормально.»

      ТИМУР И ПОСУДА. «ТЫ никогда!» от обоих — обвинения. Замени
      на «МНЕ когда». Мама: «Мне тяжело, когда я мою посуду одна.»
      Тимур: «Мне обидно, когда мою помощь не замечают.»

      МИША И ЕГОР. Дружба после разбитого телефона. Егор:
      Я-высказывание. Миша: признание + решение. «Мне очень
      обидно. — Мне жаль. Я не специально. Давай подумаем, как
      починить.»

      Класс пишет в тетради. Кто-то быстро. Кто-то медленно. Но
      все пишут.

      Новенькая стоит у своей парты. Кивает после каждой ситуации.
    mood: "Марко учит весь класс — без квизов, через примеры"
    next_default: ep050_s13
    visual_brief:
      background: "Класс. Доска: слева — восемь имён приёмов, справа — пять примеров от Марко («Лена и Вика», «Костя и Артём», «Даша», «Тимур», «Миша и Егор»). Одноклассники пишут в тетрадях"
