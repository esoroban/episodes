  # ── СЦЕНА 23: Новенькая шепчет первую фразу ──────────────────────
  - scene_id: ep050_s23
    episode_id: 50
    source_ref: day_13.ep50.live_drama
    scene_type: dialogue
    location: "Школа, класс 5-Б, у доски"
    time: "утро"
    characters_present: [Марко, Данила, новенькая, Макс, Рей]
    author_text: >
      Новенькая. Парта у окна. Серая нитка на запястье. Глаза —
      огромные. Она шепчет — еле слышно. Но Марко слышит. И
      класс слышит.

      Она знает, как это бывает. У неё тоже был брат. Кого-то
      она уже теряла.
    dialogue:
      - who: новенькая
        line: "Когда мне давят, мой брат говорил себе: «Мне нужно подумать.»"
      - who: новенькая
        line: "Просто эти три слова. И давление становится меньше."
      - who: Макс
        line: "А мне отец говорит: «Давай вернёмся к этому позже.» Чтобы остыть."
      - who: Рей
        line: "Есть и такая: «У нас разные мнения, и это нормально.» Я её слышал на ринге. Работает."
      - who: Данила
        line: "Или просто: «Давай сделаем паузу.»"
    author_text_after: >
      Четыре фразы. Из четырёх ртов. Не из чата. Не с экрана.
      Из живых людей.

      ФРАЗЫ-СПАСАТЕЛИ. Парашют для разговора, когда всё кипит.
      Когда хочется крикнуть «ДА!» или «ЗАМОЛЧИ!» — скажи одну
      из этих:

      «Мне нужно подумать.»
      «Давай вернёмся к этому позже.»
      «У нас разные мнения, и это нормально.»
      «Давай сделаем паузу.»

      Не надо решать сейчас. Не надо соглашаться. Не надо
      нападать. Надо — остановиться.

      Марко слушает. Класс слушает. Голос — впервые молчит.
    mood: "четверо детей складывают парашют — теория из живых ртов"
