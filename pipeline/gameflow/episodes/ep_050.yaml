          position: center
      props: [огрызок мела в кулаке, тёмные динамики, доска с восемью именами как зарубки, серая нитка на запястье новенькой за партой]
      focus_object: "лицо Марко — момент выбора, серая нитка на фоне"
      atmosphere: "хитрейшая кнопка — обещание мира за подчинение"
      ui_mode: dialogue

