#
# КЛЮЧЕВОЕ:
#   Софа МОЛЧИТ всю битву и почти весь эпизод (выключена в финале
#   ep_049). Один-единственный её момент — s36 (голос Софии через
#   Софу). После этого Софа гаснет навсегда (s45).
#
#   Фразам-спасателям учат НЕ Софа, а живые рядом — одноклассники
#   (Данила, Макс, новенькая) и Рей (30 лет, зашёл в школу по делу
#   с утра и остался в коридоре, когда Голос захватил школу).
#   Данила — тот самый, кто в ep_001 сказал Марко «тебе приснилось».
#   Теперь он первый встаёт рядом — арка от скептика к союзнику
#   закрывается.
#   Это разговор живых, не чат-бот. Каждый произносит фразу — Марко
#   оценивает. Это и есть quiz.
#
#   Голос — побеждён, но не убит. Уходит «в другой город» — будет
#   разбираться в следующем сезоне. Финал — полноценный хэппи-энд:
#   круг друзей, новенькая садится, цифра «1» на стене, Софа
#   мирно гаснет.
#
# BRANCH (s21 → s21_choice):
#   После шантажа сестрой Марко выбирает реакцию:
#     - «Да.» (поддался шантажу) → s21_fail (soft_fail_loop) → откат
#     - Молчание / пауза → s22 (друзья начинают помогать)
#   Это самая трудная кнопка — «вина» через сестру. Формула «пауза
#   → потом слова» проверяется до того, как Марко знает фразы-
#   спасатели по имени.
#
# ДРАМА — НАЧАЛО (Софа молчит, выключена):
# s01 — Голос везде. Софа в кармане — чёрный экран. Класс под гипнозом.
# s02 — Голос мягко: «Ты устал. Отдохни.»
# s03 — Новенькая с серой ниткой на запястье.
# s04 — Марко встаёт. «Я не устал. И я не перестану.»
#
# БИТВА — 8 раундов, каждый раунд = драма + квиз:
# s05 — Раунд 1: страшная цепочка (Голос). drama narrative.
# s06 — Quiz 1 (vote): страшная цепочка.
# s07 — Раунд 2: ложная дилемма. drama narrative.
# s08 — Quiz 2 (vote): ложная дилемма.
# s09 — Раунд 3: нападка на человека.
# s10 — Quiz 3 (vote): нападка на человека.
# s11 — Раунд 4: пугало.
# s12 — Quiz 4 (vote): пугало.
# s13 — Раунд 5: ложный авторитет.
# s14 — Quiz 5 (vote): ложный авторитет.
# s15 — Раунд 6: подмена понятий.
# s16 — Quiz 6 (vote): подмена понятий.
# s17 — Раунд 7: вопрос-ловушка.
# s18 — Quiz 7 (vote): вопрос-ловушка.
# s19 — Раунд 8: «я не говорю, что...».
# s20 — Quiz 8 (vote): «я не говорю, что...».
#
# ШАНТАЖ + BRANCH:
# s21 — Голос лично, шёпотом: «Скажи "да". Верни сестру.»
# s21_choice — выбор: «Да» (fail loop) или молчание (продолжение).
# s21_fail — soft fail: Марко крикнул «Да!», его одёргивает Данила рукой.
#
# ЖИВОЙ РАЗГОВОР С ДЕТЬМИ (Софа всё ещё молчит):
# s22 — Данила встаёт рядом, кладёт руку Марко на плечо.
# s23 — Новенькая шепчет первую фразу. Дети начинают помогать.
# s24 — Live quiz 9: Данила — «давай поговорим завтра» — спасёт.
# s25 — Live quiz 10: Макс горячо — «ой всё, делай что хочешь!» — ухудшит.
# s26 — Live quiz 11: новенькая — «у нас разные мнения» — спасёт.
# s27 — Live quiz 12: Рей с сарказмом — «ну конечно, ты же ВСЕГДА прав!» — ухудшит.
# s28 — Live quiz 13: Данила — «мне нужно подумать» — спасёт.
# s29 — Live quiz 14: Макс — «мне всё равно» — ухудшит.
# s30 — Live quiz 15: новенькая — «я тебя уважаю» — спасёт.
# s31 — Live quiz 16: Рей-старый — «или соглашайся, или ты не друг!» — ухудшит.
# s32 — Марко синтезирует правило вслух — для друзей и для класса.
#
# ФИНАЛ БИТВЫ:
# s33 — Марко выбирает фразу: «Мне нужно подумать.»
# s34 — Quiz 17 (vote): «сестра или гордость?!» — ложная дилемма.
# s35 — Марко: «У нас разные мнения.» Класс просыпается. Голос отступает.
# s36 — Софа загорается ОДИН раз. Голос Софии: «братик, ты прошёл.»
#
# ПРАКТИКА — 5 живых ситуаций (дети спрашивают Марко):
# s37 — Новенькая поднимает голову. «А как же другие?»
# s38 — Open 1 (новенькая спрашивает): Лена и Вика — проект.
# s39 — Open 2 (Данила спрашивает): Костя и Артём — футбол.
# s40 — Open 3 (Макс спрашивает): Даша — стрижка.
# s41 — Open 4 (Рей спрашивает): Тимур — посуда.
# s42 — Open 5 (новенькая спрашивает): Миша и Егор — телефон.
#
# ФИНАЛ:
# s43 — Класс. Рей рядом. Данила, Макс — рядом. Девочка ждёт.
# s44 — Марко к девочке: «Садись. Я расскажу про факты и мнения.»
# s45 — Цифра «1» на стене. Софа гаснет навсегда. КОНЕЦ ПЕРВОГО СЕЗОНА.
