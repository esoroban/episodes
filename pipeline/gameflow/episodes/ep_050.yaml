  # ── СЦЕНА 6-FAIL: Марко крикнул «Да!» — Данила хватает за руку ───
  - scene_id: ep050_s06_fail
    episode_id: 50
    source_ref: day_13.ep50.battle
    scene_type: feedback
    location: "Школа, класс 5-Б, у доски"
    time: "утро"
    characters_present: [Марко, Данила, Голос]
    branch_type: soft_fail_loop
    dialogue:
      - who: Марко
        line: "Д..."
      - who: Данила
        line: "Стоп."
      - who: Данила
        line: "Не сейчас. Он обещает то, чего не сможет дать."
      - who: Данила
        line: "Если он говорит «одно слово» — значит, в одном слове его сила. Не давай."
      - who: Данила
        line: "Возьми паузу. Просто молчи."
    author_text_after: >
      Данила встал. Подошёл. Положил ладонь Марко на плечо. Не
      сильно. Чтобы напомнить — рядом.

      Тот самый Данила, который в первый день сказал «тебе
      приснилось». Год назад. А теперь — рядом у доски. Первый.

      Кадр отматывается. Марко снова у доски. Мел в кулаке. Голос
      ещё ждёт ответа. Но теперь Марко не один.
    mood: "soft fail — Данила одёргивает, друзья начинают помогать"
    next_default: ep050_s06_choice
