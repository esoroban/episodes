# =====================================================================
# GAMEFLOW — Эпизод 50: «1» (ФИНАЛ СЕЗОНА)
# Урок: 13A.2 — фразы-спасатели применены в живой драме
# Source: pipeline/source/episodes/day_13.yaml → ep: 50
# Book:   server/book/ep_050.md
# КОНЕЦ ПЕРВОГО СЕЗОНА.
# =====================================================================
#
# КЛЮЧЕВОЕ:
#   Финал сезона — ПОЛНОСТЬЮ ДРАМА. Никаких квизов, никаких выборов
#   ответов, кроме одного шантаж-branch'а (нужен валидатору).
#   Курс завершён за 24 предыдущих урока. Здесь дети просто СМОТРЯТ,
#   как Марко применяет всё, чему научился. Это не проверка — это
#   спектакль.
#
#   Софа МОЛЧИТ всю битву и почти весь эпизод (выключена в финале
#   ep_049). Один-единственный её момент — голос Софии после
#   победы. Потом Софа гаснет навсегда.
#
#   Шантаж — НЕ про сестру (София уже дома с ep_048). Голос
#   обещает «уйти навсегда — никто больше не пропадёт» в обмен на
#   подчинение. Ложное обещание мира — кнопка через страх за всех.
#
#   Голос побеждён, но не убит. Уходит — и обещает: «Я найду
#   другой способ. Я сделаю вашу жизнь опасной.» (Мост в сезон 2.)
#
#   Хэппи-энд: круг друзей, новенькая садится, цифра «1» на стене,
#   Софа мирно гаснет.
#
# BRANCH (s06 → s06_choice):
#   После шантажа Марко выбирает реакцию:
#     - «Да.» → s06_fail (soft_fail_loop) → откат, Данила одёргивает
#     - Молчание / пауза → s07 (друзья дают опору)
#   Это единственная интерактивная точка эпизода.
#
# СЦЕНЫ (~16 сцен вместо 47):
# s01 — Голос захватил школу. София рядом за соседней партой
#       (иммунитет — её уже стирали). Софа в кармане — чёрный экран.
# s02 — Голос мягко: «Ты устал. Отдохни.» Новенькая под угрозой.
# s04 — Марко встаёт у доски. «Я не устал. И я не перестану.»
# s05 — Битва — 8 приёмов одним плотным narrative. Марко режет
#       каждый по имени, пишет на доске, динамики гаснут, класс
#       просыпается по очереди. София у соседней парты — наблюдает,
#       сжав кулаки.
# s06 — Шантаж: «Скажи "да" — я уйду навсегда. Никто больше не
#       пропадёт.» Голос обещает мир за подчинение.
# s06_choice — выбор: «Да» (fail) или молчание.
# s06_fail — Данила одёргивает: «Не сейчас. Не давай "да".»
# s07 — Опора пятью голосами: София первая («Я здесь. Не плати
#       ему "да" за меня. Я уже дома.»), затем Данила, Макс,
#       новенькая, Рей. Живой разговор, не чат.
# s08 — Марко применяет: «Мне нужно подумать.» Голос пытается
#       ложной дилеммой. Марко: «У нас разные мнения.»
# s09 — Голос отступает. Класс просыпается. Вера приходит в себя.
#       Угроза-мост: «Я сделаю вашу жизнь опасной.»
# s10 — Софа загорается ОДИН раз. Голос Софии: «братик, ты прошёл.»
# s11 — Новенькая делает шаг к Марко. «А как же другие?»
# s12 — Марко рассказывает 5 ситуаций для одноклассников (без
#       квизов, просто разбор примеров — Лена/Вика, Костя/Артём,
#       Даша, Тимур, Миша/Егор).
# s13 — Финальный круг: София рядом, Данила, Макс, Рей, новенькая.
# s14 — Марко новенькой: «Садись. Я расскажу про факты и мнения.»
#       София: «А я расскажу, как это — когда тебя забывают.»
#       Учителей теперь двое.
# s15 — Цифра «1» на стене. Софа гаснет навсегда. КОНЕЦ.
# =====================================================================

