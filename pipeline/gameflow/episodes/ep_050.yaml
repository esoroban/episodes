  # ── СЦЕНА 15: «1» — КОНЕЦ ПЕРВОГО СЕЗОНА ─────────────────────────
  - scene_id: ep050_s15
    episode_id: 50
    source_ref: day_13.ep50.finale
    scene_type: cliffhanger
    location: "Школа, класс 5-Б"
    time: "утро"
    characters_present: [Марко, София, новенькая, Данила, Макс, Рей]
    author_text: >
      На стене — мелом, кто-то написал:

      1

      Одноклассники не видят. Марко видит. София видит. Девочка
      видит. Данила видит. Макс — не видит, но чувствует:
      мурашки.

      Софа в кармане мигает последний раз. Экран — голубой.
      Тёплый. Голос — механический. Чужой. Программа.

      «Новый пользователь обнаружен. Начинаю подготовку.»

      Софа гаснет. Не ломается. Просто — всё сказано.

      Тишина.

      В тишине — далёкий звук. Как треск старого телефона. Но не
      этого. Другого. Где-то в другом городе. Где-то — динамик
      щёлкает. Где-то — Голос готовит другое. Не слова. Опасность.

      «Я сделаю вашу жизнь опасной. Не сегодня. Скоро.» — эхо
      его последних слов ещё держится в воздухе.

      Но не сегодня. Не здесь.

      Марко кладёт руку на стол. София — за соседней партой,
      рядом. Данила, Макс, Рей — кругом. Напротив — девочка с
      серой ниткой. Доска у них за спиной — восемь имён приёмов,
      пять ситуаций для других, слово «ПАУЗА» внизу.

      Он не знает, чем всё закончится. И впервые — это не
      слабость.

      Впервые — сила.

      ──────────────────────

      КОНЕЦ ПЕРВОГО СЕЗОНА.

      50 эпизодов. 13 дней. 25 уроков. 1 изъян героя. 1 злодей с
      философией. 1 демагог. 1 тихий манипулятор. 1 битва,
      выигранная словами. 0 уроков-лекций.

      Голос повержен — но не уничтожен. Где-то мигает экран.
      Где-то щёлкает динамик. История продолжается — в другом
      городе. В другом сезоне. Не слова. Опасность.

      Но теперь есть те, кто знает. И это — начало.
