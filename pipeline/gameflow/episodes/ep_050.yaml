  # ── СЦЕНА 9: Голос отступает. Класс просыпается ──────────────────
  - scene_id: ep050_s09
    episode_id: 50
    source_ref: day_13.ep50.battle
    scene_type: dialogue
    location: "Школа, класс 5-Б"
    time: "утро"
    characters_present: [Марко, София, Данила, Макс, Рей, новенькая, Вера, Голос]
    author_text: >
      Тишина. Долгая. Класс не дышит.

      А потом — класс просыпается. Полностью. Лена моргает,
      опускает голову, поднимает. Артём смотрит на свои руки, не
      помнит, зачем поднимал их к динамику. Даша оглядывается на
      Марко, узнавая.

      Вера у доски — делает ещё шаг назад. Опускает выкрошенный
      мел. Тихо: «Дети. Что я говорила сегодня?» Не получает
      ответа. Опускает руки.

      Последний динамик — мигает. Раз. Два. Гаснет.

      Голос — еле слышно. Не из динамика. Из воздуха. Эхо.
    dialogue:
      - who: Голос
        line: "Слова — твои. Хорошо. Запомни."
      - who: Голос
        line: "Я найду другой способ. Я сделаю вашу жизнь опасной."
      - who: Голос
        line: "Не сегодня. Скоро."
    author_text_after: >
      И — тишина.

      Голос отступил. Не погиб. Не исчез. Уходит. В другой
      город. К следующему ребёнку. Он готовит другое — не
      слова, а опасность.

      Но сегодня — он здесь не нужен. Сегодня здесь — Марко.
      София. Данила. Макс. Рей. Новенькая. И класс, который
      наконец открыл глаза.
    mood: "Голос отступает — класс просыпается, Вера приходит в себя, угроза на будущее"
    next_default: ep050_s10
    visual_brief:
      background: "Класс. Все динамики тёмные. Доска: восемь имён + «ПАУЗА». Одноклассники с поднятыми головами, лица будто после сна. Вера у доски — шаг назад, выкрошенный мел падает"
      camera: wide
