  # ── СЦЕНА 45: «1» — КОНЕЦ ПЕРВОГО СЕЗОНА ─────────────────────────
  - scene_id: ep050_s45
    episode_id: 50
    source_ref: day_13.ep50.finale
    scene_type: cliffhanger
    location: "Школа, класс 5-Б"
    time: "утро"
    characters_present: [Марко, новенькая, Данила, Макс, Рей]
    author_text: >
      На стене — мелом, кто-то написал:

      1

      Одноклассники не видят. Марко видит. Девочка видит. Данила
      видит. Макс не видит, но чувствует: мурашки.

      Софа в кармане мигает последний раз. Экран — голубой.
      Тёплый. Голос — механический. Чужой. Программа.

      «Новый пользователь обнаружен. Начинаю подготовку.»

      Софа гаснет. Не ломается. Просто — всё сказано.

      Тишина.

      В тишине — далёкий звук. Как треск старого телефона. Но
      не этого. Другого. Где-то в другом городе. Где-то —
      динамик щёлкает. Где-то — Голос готовит другое. Не
      слова. Опасность.

      «Я сделаю вашу жизнь опасной. Не сегодня. Скоро.» — эхо
      его последних слов ещё держится в воздухе.

      Но не сегодня. Не здесь.

      Марко кладёт руку на стол. Рядом — Данила, Макс, Рей.
      Напротив — девочка с серой ниткой. Доска у них за
      спиной — восемь имён приёмов и слово «ПАУЗА».

      Он не знает, чем всё закончится. И впервые — это не
      слабость.

      Впервые — сила.

      ──────────────────────

      КОНЕЦ ПЕРВОГО СЕЗОНА.

      50 эпизодов. 13 дней. 25 уроков. 1 изъян героя. 1 злодей
      с философией. 1 демагог. 1 тихий манипулятор. 1 битва,
      выигранная словами. 0 уроков-лекций.

      Голос повержен — но не уничтожен. Где-то мигает экран.
      Где-то щёлкает динамик. История продолжается — в другом
      городе. В другом сезоне. Не слова. Опасность.

      Но теперь есть те, кто знает. И это — начало.
    mood: "конец сезона — 1 на стене, новый круг, Марко в силе, Голос ушёл в другой город"
    next_default: null
    visual_brief:
      background: "Класс. На стене — крупно мелом «1». На столе — телефон Софы с экраном «Новый пользователь обнаружен», свет от экрана медленно тускнеет. На заднем плане — доска с восемью именами приёмов и словом «ПАУЗА». Свет — тёплый утренний, без угрозы"
      camera: wide
      characters:
        - who: Марко
          expression: впервые улыбка — настоящая, спокойная
          pose: рука на столе, рядом — четверо
          position: center
        - who: новенькая
          expression: первый кивок, узнавание
          pose: за партой напротив, серая нитка видна
          position: foreground
        - who: Данила
          expression: рядом, твёрдо
          pose: слева от Марко
          position: left
        - who: Макс
          expression: настоящий, спокойный
          pose: справа
          position: right
        - who: Рей
          expression: тихая поддержка, без позы
          pose: за плечом, руки в карманах
          position: background
      props: [цифра «1» на стене, гаснущий телефон Софы, доска с восемью приёмами и «ПАУЗА», серая нитка новенькой]
      focus_object: "цифра «1» — первый ученик, начало нового круга"
      atmosphere: "конец сезона — хэппи-энд, но не конец истории"
      ui_mode: reading
