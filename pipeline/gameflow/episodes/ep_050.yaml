  # ── СЦЕНА 43: Финал. Класс. Рей рядом ────────────────────────────
  - scene_id: ep050_s43
    episode_id: 50
    source_ref: day_13.ep50.finale
    scene_type: narrative
    location: "Школа, класс 5-Б"
    time: "утро"
    characters_present: [Марко, Данила, Макс, Рей, новенькая]
    author_text: >
      Марко поворачивается к новенькой. Она сидит. Руки — на
      коленях. Глаза — огромные. Ждёт.

      Рей делает шаг от двери. Тихо. Подходит к парте Марко,
      опирается рукой о её край. Стоит рядом. Впервые — не
      напротив. Не выступает. Не спорит. Слушает.

      Данила — с другой стороны. Макс — за спиной.

      Класс затих. Не от страха — от внимания. Голоса нет. Есть
      трое ребят, взрослый рядом — и девочка с серой ниткой.
    mood: "круг свой — Рей впервые рядом, не напротив"
