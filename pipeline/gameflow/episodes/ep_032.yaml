    location: "Зеркальный Город, сужающиеся коридоры"
    time: "вечер"
    characters_present: [Марко]
    author_text: >
      ЧЕТЫРЕ ШАГА ЗАЩИТЫ ОТ МАНИПУЛЯЦИИ. Запугивание — самый частый
      её вид. Те же шаги работают и против других манипуляций.

      Шаг первый — ОСТАНОВИСЬ. Не реагируй сразу. Манипуляция хочет,
      чтобы ты действовал без мышления. Пауза — первое оружие.

      Шаг второй — ЗАДАЙ ТРИ ВОПРОСА-ФИЛЬТРА. Это точно произойдёт?
      Насколько вероятно? Есть ли другие варианты?

      Шаг третий — ПОПРОСИ ДОКАЗАТЕЛЬСТВА. «Откуда ты знаешь?»
      Манипулятор редко может доказать. Он давит — не объясняет.

      Шаг четвёртый — ПОДУМАЙ О МОТИВАХ. Зачем этот человек тебя
      пугает? Что он получит, если ты испугаешься?

      Плохой ответ на запугивание: сдался без вопросов. Хороший —
      задал проверочный вопрос.

      Кто видит фокус — тот больше на него не попадается.
