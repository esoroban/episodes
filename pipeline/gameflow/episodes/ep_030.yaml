  # ── СЦЕНА 5: Теория — формула уточнения + честный пересказ ──────────
  - scene_id: ep030_s05
    episode_id: 30
    source_ref: day_08.ep30.sofa_block
    scene_type: narrative
    location: "Зеркальный Город, подвальная стена"
    time: "вечер"
    characters_present: [Марко]
    author_text: >
      ФОРМУЛА УТОЧНЕНИЯ. Когда твои слова перекрутили или вырвали из
      контекста — ты говоришь:

      «Позволь уточнить: я говорил, что… а не то, что…»

      Первая часть — настоящие слова. Вторая — то, что приписали.
      Спокойно. Конкретно.

      Плохие ответы. Крик «Сам такой!» — не возвращает к сути.
      Усиливает конфликт. Обида «Мне всё равно!» — пугало побеждает.
      Ты отступил. Отступление «Забудь, я ничего не говорил.» — ты
      отказался от своих слов. Победа пугала.

      Хороший ответ: спокойно, конкретно. Вот мои слова. Вот искажение.

      ЧЕСТНЫЙ ПЕРЕСКАЗ — второй инструмент. Прежде чем ответить на
      чьи-то слова, перескажи их и спроси: «Правильно я понял?»

      Если «да» — отвечай. Если «нет» — уточни.

      Уточнение защищает твои слова. Честный пересказ защищает чужие.
    mood: "две формулы — два щита"
    next_default: ep030_s06
