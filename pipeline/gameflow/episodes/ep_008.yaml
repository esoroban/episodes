  # ── СЦЕНА 2: Марко и Лина обсуждают ─────────────────────────────────
  - scene_id: ep008_s02
    episode_id: 8
    source_ref: day_02.ep8.drama
    scene_type: dialogue
    location: "Зеркальный Город, улица у библиотеки"
    time: "вне времени"
    characters_present: [Марко, Лина]
    dialogue:
      - who: Марко
        line: "Ты знала?"
      - who: автор
        line: "Лина не отвечает. Смотрит на число. Потом — на Марко. Потом — снова на стену."
