        line: 'Правило... восьмое. ТРЕТЬЯ ПРИЧИНА — когда два события кажутся связанными, но их оба вызывает что-то третье, спрятанное. Чтобы найти кукловода — спроси: "А что ОБЩЕЕ стоит за обоими событиями?'
  - scene_id: ep008_s06
    episode_id: 8
    source_ref: day_02.ep8.challenge
    scene_type: narrative
    location: "Зеркальный Город, улица у библиотеки"
    time: "вне времени"
    characters_present: [Марко, Лина]
    author_text: >
      Марко встаёт. Смотрит на число: 43. Смотрит на Лину.
