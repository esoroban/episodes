      - who: Марко
        line: "Я не использовал Зеркало."
      - who: Лина
        line: "Я знаю."
      - who: Марко
        line: "Тогда кто?"
      - who: автор
        line: >
          Лина молчит. Это не то молчание, когда не хотят говорить. Это когда
          не знают.
      - who: автор
        line: >
          Марко садится на пол у стены. Рюкзак — рядом. Зеркало внутри
          мерцает сквозь ткань — слабо, чуть заметно. Как будто дышит.
      - who: Марко
        line: >
          Раньше всё было просто. Я использую Зеркало — число падает. Причина
