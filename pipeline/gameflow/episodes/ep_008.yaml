          Система стирает и без меня. Голос дёргает за две верёвочки: артефакты —
          одна, автоматическое стирание — другая.
      - who: Лина
        line: "Откуда ты знаешь?"
      - who: Марко
        line: "Два часа. Рюкзак застёгнут. Число упало. Кто-то стирает — и это не я."
      - who: автор
        line: "Лина отводит взгляд."
      - who: Лина
        line: "Мне... нужно кое-что сказать."
    author_text_after: "Телефон вибрирует. Прерывает."
    mood: "пропаганда — и вмешательство"
    next_default: ep008_s06_sofa
