  - scene_id: ep008_s01
    episode_id: 8
    source_ref: day_02.ep8.drama
    scene_type: narrative
    location: "Зеркальный Город, улица у библиотеки"
    time: "вне времени"
    characters_present: [Марко, Лина]
    author_text: >
      Число на стене: 43.

      Марко не трогал Зеркало. Оно лежит в рюкзаке, завёрнутое в куртку,
      застёгнутое на молнию. Два часа — не доставал. Не смотрел. Даже
      не открывал рюкзак.

      А число — упало.

      Холод в пальцах. Тот же, что был раньше, — но другой. Раньше Марко
      знал, откуда холод. Теперь — не знает.

      Лина стоит рядом. Бледная. Руки в карманах. Молчит.
    mood: "неизвестная угроза"
    next_default: ep008_s02
