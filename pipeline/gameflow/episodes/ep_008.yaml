  # ── СЦЕНА 3: Софа — третья причина, кукловод ────────────────────────
  - scene_id: ep008_s03
    episode_id: 8
    source_ref: day_02.ep8.sofa_block
    scene_type: narrative
    location: "Зеркальный Город, улица у библиотеки"
    time: "вне времени"
    characters_present: [Марко, Софа]
    author_text: "Марко достаёт телефон."
    dialogue:
      - who: Софа
        line: "Марко... Ты не использовал Зеркало. Число упало. Вопрос: Зеркало — единственная причина падения?"
      - who: Марко
        line: "Нет. Я не трогал его. Значит, что-то другое стирает."
      - who: Софа
        line: >
          Хорошо. Ты думал: я использую Зеркало → число падает. Я — причина.
          Но теперь ты не использовал — а число упало. Значит...
      - who: Марко
        line: "Значит, я не единственная причина. Или вообще не причина."
      - who: Софа
        line: "Или... Новое слово. Слушай внимательно."
      - who: Софа
        line: >
          Ласточки летают низко — потом дождь. Ласточки НЕ вызывают дождь.
          Но связь настоящая. Как? Перед дождём воздух тяжёлый, влажный.
          Мошки не могут летать высоко — опускаются. Ласточки летят за
          мошками — хотят есть. А дождь идёт, потому что воздух влажный.
          Ласточки и дождь не связаны напрямую. Их оба вызывает ТРЕТИЙ —
          влажный воздух.
      - who: Софа
        line: >
          ТРЕТЬЯ ПРИЧИНА — когда два события кажутся связанными, но на самом
          деле их ОБА вызывает что-то третье, спрятанное. Как кукловод за
          ширмой — дёргает за две верёвочки, а куклы думают, что они сами
          двигаются.
    mood: "кукловод"
    next_default: ep008_s04
    visual_brief:
