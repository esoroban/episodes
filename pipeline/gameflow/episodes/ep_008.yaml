      - who: автор
        line: "Лина садится рядом. Не близко. На расстоянии вытянутой руки."
      - who: Лина
        line: "Может, стена ошибается."
      - who: Марко
        line: "Стена не ошибалась раньше. 47, 46, 44, 43. Каждый раз — точно."
      - who: Лина
        line: "Тогда кто-то другой использует артефакт."
      - who: Марко
        line: "Кто?"
      - who: автор
        line: >
          Лина молчит. Заноза. Та же, что была. Только теперь она глубже —
          не между рёбрами, а где-то за ними. Марко чувствует: Лина знает
          больше, чем говорит. Но не всё. Она тоже не понимает.
      - who: автор
        line: "Софа вибрирует. Долгая вибрация. Две короткие. Ещё одна долгая."
