          - {id: third, text: "Нет, третья причина — дождь", correct: true}
        correct_logic: "Дождь — кукловод, который дёргает за обе верёвочки."
        feedback_success: "Дождь! Кукловод дёргает за обе верёвочки: зонт И сапоги."
        feedback_soft_fail: "Зонты заставляют покупать сапоги? Или что-то третье?"
      - interaction_type: vote
        question: "Я ложусь спать — на улице темнеет. Моя кровать выключает солнце?"
        options:
          - {id: yes, text: "Да", correct: false}
          - {id: third, text: "Нет, третья причина — время суток", correct: true}
        correct_logic: "Вечер наступает — и ты ложишься, и на улице темнеет."
        feedback_success: "Вечер! Время суток — кукловод. И ты ложишься, и темнеет."
        feedback_soft_fail: "Не ложись — темнеть перестанет? Нет. Что вызывает оба события?"
      - interaction_type: vote
        question: "Зимой люди носят шапки И пьют горячий чай. Шапки вызывают жажду чая?"
        options:
          - {id: yes, text: "Да", correct: false}
          - {id: third, text: "Нет, третья причина — холод", correct: true}
        correct_logic: "Мороз — и шапку надеваешь, и чай хочется."
        feedback_success: "Холод — кукловод! Он дёргает за шапку И за чашку."
        feedback_soft_fail: "Сними шапку — перестанешь хотеть чай? Нет. Что общее?"
      - interaction_type: vote
        question: "Марко использовал Зеркало — число упало. Марко не использовал — число тоже упало. Зеркало — единственная причина?"
        options:
          - {id: yes, text: "Да, Зеркало — причина", correct: false}
          - {id: no, text: "Нет — есть что-то ещё", correct: true}
        correct_logic: "Если убрать Зеркало — число всё равно падает; значит, есть что-то ещё."
        feedback_success: "Нет! Убрал Зеркало — число всё равно падает. Есть кукловод."
        feedback_soft_fail: "Ты не трогал Зеркало — число упало. Зеркало — единственная причина?"
