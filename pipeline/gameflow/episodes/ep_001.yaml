# s11b       — Рефлексия: факты противоречат (narrative)
# s12a       — Школа: запах мела, пустая парта, 9 наклеек (narrative)
# s12b       — Данила «Тебе приснилось» (dialogue)
# s12c       — Марко показывает дневник, Олена/Витя не верят (dialogue)
# s12d       — Софа вибрирует, экспресс-тест (narrative)
# s13        — Quiz: «Голос Софии тёплый» → Мнение
# s14        — Quiz: «На стене четыре рамки» → Факт
# s15        — Quiz: «У телефона треснут экран» → Факт
# s16        — Quiz: «Рамки на стене пустые» → Факт
# s17        — Quiz: «Мама говорит громко» → Факт
# s18        — Quiz: «У Марко две кровати» → Факт
# s19        — Quiz: «Вера говорит тихо» → Факт
# s20        — Quiz: «Дневник рядом с телефоном» → Факт
# s21        — Quiz: «Фотографии Софии исчезли» → Факт
# s21a       — Марко понимает — нужен второй источник (narrative)
# s21b       — Вера в коридоре, описание (narrative)
# s21c       — Вера манипулирует, просит дневник (dialogue)
# s21d       — Марко почти отдаёт, тело решает (narrative)
# s22        — Клиффхэнгер: Лина «Я помню Софию. Они слушают.» (cliffhanger)
