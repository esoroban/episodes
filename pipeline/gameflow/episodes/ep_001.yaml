# s07        — Quiz: «Дневник лежит на полке» → Факт
# s08        — Quiz: «В классе 25 учеников» → Факт
# s09        — Quiz: «Математика — скучный предмет» → Мнение
# s10        — Quiz: «Киев — столица Украины» → Факт
# s11        — Голосовое сообщение Софии (dialogue+unlock)
# s11a_quiz  — Quiz (life_question): «Все так делают» → Мнение
