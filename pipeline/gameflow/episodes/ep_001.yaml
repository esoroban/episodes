episode_id: 1
episode_title: "Утро без сестры"
lesson: "1A.1"
terms_introduced: ["факт", "мнение"]

scenes:

  # ═══════════════════════════════════════════════════════════════════
  # КВАРТИРА (утро)
  # ═══════════════════════════════════════════════════════════════════

  # ── СЦЕНА s01: Пробуждение ────────────────────────────────────────
  - scene_id: ep001_s01
    episode_id: 1
    source_ref: day_01.ep1.drama
    scene_type: narrative
    location: "Квартира Марко, комната"
    time: "утро"
    characters_present: [Марко]
    author_text: >
      Марко открывает глаза. Потолок белый. Обычный.

      Кровать напротив — пуста. Одеяло заправлено. Не просто заправлено —
      подтянуто, как в гостинице. Будто на этой кровати никто никогда не спал.

      Марко садится. Щурится. На стене — четыре рамки. Вчера в них были
      фотографии: он и София на море, он и София на дне рождения, он и София
      с мамой, он и София. Сейчас рамки пустые. Белый картон вместо лиц.
    mood: "тихая тревога"
    next_default: ep001_s02
    visual_brief:
      background: "Детская комната, две кровати, утренний свет сквозь шторы"
      camera: wide
      characters:
        - who: Марко
          expression: сонная растерянность
          pose: садится на кровати, щурится
      props: [пустая кровать с идеально заправленным одеялом, четыре пустые рамки на стене]
      focus_object: "пустые рамки на стене"
      atmosphere: "тихое утро, но что-то сломано — пустота вместо привычного"
      ui_mode: reading

  # ── СЦЕНА s02: Диалог с мамой ─────────────────────────────────────
  - scene_id: ep001_s02
    episode_id: 1
    source_ref: day_01.ep1.drama
    scene_type: dialogue
    location: "Квартира Марко, кухня"
    time: "утро"
    characters_present: [Марко, мама]
    dialogue:
      - who: Марко
        line: "Мам!"
      - who: автор
        line: "Мама в кухне. Наливает чай. Улыбается."
      - who: Марко
        line: "Мам, где фотки?"
      - who: мама
        line: "Какие фотки, солнце?"
      - who: Марко
        line: "На стене. Наши с Софией."
      - who: автор
        line: "Мама ставит чашку. Медленно. Смотрит на Марко — не удивлённо, а терпеливо. Как на ребёнка, который в третий раз спрашивает, почему небо синее."
      - who: мама
        line: "Марко, у тебя нет сестры."
    author_text_after: >
      Она говорит это спокойно. Уверенно. Как говорят «завтра вторник» или
      «на улице дождь». Марко почти верит — мама говорит так уверенно, а Марко
      привык соглашаться. Мама всегда говорит правильно. Мама знает. Мама...

      Он кивает, но в животе — тяжесть. Как перед контрольной, к которой
      не готовился. Что-то не так. Марко не может назвать что.
    mood: "нарастающая тревога"
    next_default: ep001_s03
    visual_brief:
      background: "Кухня, мягкий утренний свет, мама с чашкой чая"
      camera: over-shoulder
      characters:
        - who: мама
          expression: терпеливая уверенность
          pose: стоит у стола с чашкой
          position: center
        - who: Марко
          expression: растерянность, смятение
          pose: стоит в дверном проёме
          position: left
      props: [чашка чая]
      atmosphere: "обычное утро, которое перестало быть обычным"
      ui_mode: dialogue

  # ── СЦЕНА s03: Находка телефона + дневник ──────────────────────────
  - scene_id: ep001_s03
    episode_id: 1
    source_ref: day_01.ep1.drama
    scene_type: narrative
    location: "Квартира Марко, комната"
    time: "утро"
    characters_present: [Марко]
    author_text: >
      Он возвращается в комнату. Садится на кровать. Свою. Та, напротив,
      заправлена идеально. На подушке — ни одной вмятины. Но на полке,
      между учебниками математики и географии — телефон. Старый. С треснутым
      экраном. Марко точно знает: это не его телефон. Он никогда не видел
      его раньше.

      Или видел?

      Трещина на экране идёт наискосок, от угла к углу. Марко проводит
      пальцем. Экран тёплый. Как будто кто-то только что держал его в руке.

      Рядом с телефоном — дневник.
    mood: "находка, тонкая надежда"
    interaction_type: choice
    question: "Что Марко делает?"
    options:
      - id: look_diary
        text: "Полистать дневник Софии"
        next: ep001_s03_detour
      - id: turn_on_phone
        text: "Включить телефон"
        next: ep001_s04
    next_default: ep001_s04
    set_flags: [marko_found_diary]
    visual_brief:
      background: "Комната Марко, полка с учебниками"
      camera: close-up
      characters:
        - who: Марко
          expression: напряжённое внимание
          pose: стоит у полки, протягивает руку
      props: [телефон с треснутым экраном, дневник с рисунком мороженого]
      focus_object: "телефон с трещиной на экране"
      atmosphere: "маленькое открытие — след того, кто исчез"
      ui_mode: choice

  # ── СЦЕНА s03_detour: Flavor detour — дневник ─────────────────────
  - scene_id: ep001_s03_detour
    episode_id: 1
    source_ref: day_01.ep1.drama
    scene_type: narrative
    location: "Квартира Марко, комната"
    time: "утро"
    characters_present: [Марко]
    branch_type: flavor_detour
    author_text: >
      Марко листает дневник. На первой странице — рисунок: два стаканчика
      мороженого. Один шоколадный, один розовый. Подпись аккуратным мелким
      почерком с завитушками на «д» и «у»: «Шоколадное лучше. — С.»
      Рядом кто-то — Марко узнаёт свой почерк — дописал карандашом:
      «Нет! Клубничное!»

      Он помнит этот спор. Помнит. Помнит, как она фыркала. Помнит,
      как они оба ели своё и показывали друг другу языки.

      Мама говорит — сестры нет. Дневник говорит — была.

      Ещё страницы: кот в шляпе, формула с улыбающимся лицом, карта
      какого-то города с подписью «МОЙ ГОРОД». На последней заполненной
      странице — одна строчка: «Братик, если ты это читаешь — значит,
      я была права. Не верь тому, что кажется простым.»

      На полке вздрагивает телефон. Раз. Ещё раз. Треснутый экран
      загорается сам — белые буквы на чёрном, слишком быстро, не прочесть.
      Гаснет. Снова загорается. Ждёт.
    mood: "тёплая тоска, связь с сестрой"
    set_flags: [seen_diary_detail]
    merge_to: ep001_s04
    next_default: ep001_s04
    visual_brief:
      background: "Комната Марко, крупный план дневника"
      camera: close-up
      characters:
        - who: Марко
          expression: грусть, нежность
          pose: сидит на полу, держит дневник
      props: [раскрытый дневник с рисунками, детский почерк с завитушками]
      focus_object: "страница дневника с рисунком мороженого и спором"
      atmosphere: "интимный момент — брат читает записи пропавшей сестры"
      ui_mode: reading

  # ── СЦЕНА s04: Софа включается ────────────────────────────────────
  - scene_id: ep001_s04
    episode_id: 1
    source_ref: day_01.ep1.drama
    scene_type: dialogue
    location: "Квартира Марко, комната"
    time: "утро"
    characters_present: [Марко, Софа]
    author_text: >
      Марко нажимает кнопку. Экран мигает. Треск. Голос — наполовину
      знакомый, наполовину электронный.
    dialogue:
      - who: Софа
        line: "Привет... Марко... если ты это слышишь... значит, я уже..."
      - who: автор
        line: "Обрыв. Перезагрузка. Другой голос — ровный, с паузами."
      - who: Софа
        line: "Я — Софа. Образовательный помощник. Версия 0.7. Не финальная."
      - who: Марко
        line: "Где моя сестра?"
      - who: Софа
        line: "Для доступа к этой информации... докажи, что ты готов. Это... важно. Если ты не будешь готов... произойдёт... непоправимое."
      - who: Марко
        line: "Что произойдёт?!"
      - who: Софа
        line: "...данные... заблокированы. Вопрос первый."
    mood: "удивление, надежда, напряжение"
    set_flags: [sofa_activated]
    next_default: ep001_s04a
    visual_brief:
      background: "Комната Марко, экран телефона светится"
      camera: close-up
      characters:
        - who: Марко
          expression: шок, надежда
          pose: держит телефон обеими руками
      props: [телефон со светящимся треснутым экраном]
      focus_object: "экран телефона с мерцающим текстом"
      atmosphere: "момент контакта — что-то ожило"
      ui_mode: dialogue

  # ── СЦЕНА s04a: Софа привязывает к мороженому ─────────────────────
  - scene_id: ep001_s04a
    episode_id: 1
    source_ref: day_01.ep1.sofa_block
    scene_type: narrative
    location: "Квартира Марко, комната"
    time: "утро"
    characters_present: [Марко, Софа]
    branch_type: gated_response
    dialogue:
      - who: Софа
        line: "Марко и кто-то спорили про мороженое. Шоколадное лучше? Клубничное? Можно измерить, какое вкуснее? Есть «вкусомер»?"
    author_text_after: >
      Марко листает дневник, который лежал рядом с телефоном. На первой
      странице — рисунок: два стаканчика мороженого. Один шоколадный, один
      розовый. Подпись аккуратным мелким почерком с завитушками на «д» и «у»:
      «Шоколадное лучше. — С.» Рядом кто-то — Марко узнаёт свой почерк —
      дописал карандашом: «Нет! Клубничное!»

      Он помнит этот спор. Помнит. Помнит, как она фыркала. Помнит,
      как они оба ели своё и показывали друг другу языки.

      Мама говорит — сестры нет. Дневник говорит — была.
    # IF seen_diary_detail: player already read the diary in detail, so Софа's
    # reference to ice cream connects instantly. The author_text_after above
    # reinforces for those who skipped the detour. Players who read the detour
    # already know the diary content — the repetition feels like recognition.
    mood: "мягкий ввод, привязка к личному"
    next_default: ep001_s04b
    visual_brief:
      background: "Комната Марко, дневник раскрыт на странице с мороженым"
      camera: close-up
      characters:
        - who: Марко
          expression: узнавание, грусть
          pose: держит дневник и телефон
      props: [раскрытый дневник с рисунком мороженого, телефон]
      focus_object: "страница дневника — два стаканчика мороженого"
      atmosphere: "личное воспоминание, пробуждённое Софой"
      ui_mode: reading

  # ── СЦЕНА s04b: Ввод терминов ФАКТ / МНЕНИЕ ──────────────────────
  - scene_id: ep001_s04b
    episode_id: 1
    source_ref: day_01.ep1.sofa_block
    scene_type: narrative
    location: "Квартира Марко, комната"
    time: "утро"
    characters_present: [Марко, Софа]
    dialogue:
      - who: Софа
        line: "Никто. Потому что «вкуснее» — это кому как. Нет прибора «вкусомер». Нет линейки для красоты. Нет весов для скуки. Когда нельзя проверить — это МНЕНИЕ. Личное ощущение. У каждого своё — и это нормально."
      - who: Софа
        line: "София любила шоколадное — отлично. Марко любит клубничное — тоже отлично. Никто не ошибается."
      - who: Софа
        line: "А дневник... Дневник лежит на полке. Можно подойти. Потрогать. Он или есть, или его нет. Если проверили и подтвердилось — это ФАКТ."
      - who: Софа
        line: "Слова-подсказки. «Мне кажется», «самый лучший», «красивый», «скучный» — скорее всего мнение. А если можно посчитать, измерить, потрогать — факт. Подумай..."
    mood: "сосредоточенность, ввод терминов"
    next_default: ep001_s05
    visual_brief:
      background: "Комната Марко, экран телефона с текстом"
      camera: close-up
      characters:
        - who: Марко
          expression: внимание, понимание
          pose: смотрит на телефон
      focus_object: "экран телефона с текстом Софы"
      atmosphere: "начало урока — правила игры заданы через историю"
      ui_mode: dialogue

  # ═══════════════════════════════════════════════════════════════════
  # SOFA BLOCK — 6 квизов (s05–s10)
  # ═══════════════════════════════════════════════════════════════════

  # ── СЦЕНА s05: Quiz 1 — мороженое, кто прав? (3 варианта) ────────
  - scene_id: ep001_s05
    episode_id: 1
    source_ref: day_01.ep1.sofa_block
    scene_type: quiz
    location: "Квартира Марко, комната"
    time: "утро"
    characters_present: [Марко, Софа]
    interaction_type: vote
    question: "София говорила: шоколадное лучше. Марко считает, что клубничное. Кто прав?"
    options:
      - id: sofia
        text: "София"
        correct: false
      - id: marko
        text: "Марко"
        correct: false
      - id: nobody
        text: "Никто — у каждого своё"
        correct: true
    correct_logic: "«Вкуснее» — это ощущение. Нет прибора «вкусомер». У каждого своё мнение о вкусе — и это нормально."
    feedback_success: "Софа: «Никто. Нет «вкусомера». София любила шоколадное — отлично. Марко любит клубничное — тоже отлично. Никто не ошибается.»"
    feedback_soft_fail: "Софа: «Можно ли измерить, какое вкуснее? Есть прибор? Если нет — это мнение. У каждого своё.»"
    mood: "мягкий ввод через личное"
    next_default: ep001_s06
    next_fail: ep001_s05
    visual_brief:
      background: "Комната Марко, экран телефона"
      camera: close-up
      characters:
        - who: Марко
          expression: задумчивость
          pose: смотрит на телефон
      props: [дневник с рисунком мороженого рядом]
      atmosphere: "первый вопрос — личный и тёплый"
      ui_mode: quiz

  # ── СЦЕНА s06: Quiz 2 — «София — лучшая сестра» → Мнение ─────────
  - scene_id: ep001_s06
    episode_id: 1
    source_ref: day_01.ep1.sofa_block
    scene_type: quiz
    location: "Квартира Марко, комната"
    time: "утро"
    characters_present: [Марко, Софа]
    interaction_type: vote
    question: "«София — лучшая сестра в мире.» Факт или мнение?"
    options:
      - id: fact
        text: "Факт"
        correct: false
      - id: opinion
        text: "Мнение"
        correct: true
    correct_logic: "Нет «лучшемера» для сестёр — это чувство Марко, тёплое, настоящее, но чувство."
    feedback_success: "Софа: «Мнение. Нет прибора «лучшемер». Каждый считает свою сестру лучшей — и это чувство, тёплое и настоящее. Но чувство.»"
    feedback_soft_fail: "Софа: «Можно ли измерить «лучшая»? Есть прибор? Нет «лучшемера» — значит, мнение.»"
    mood: "практика"
    next_default: ep001_s07
    next_fail: ep001_s06
    visual_brief:
      background: "Комната Марко, экран телефона"
      camera: close-up
      characters:
