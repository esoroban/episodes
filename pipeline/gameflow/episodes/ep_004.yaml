    location: "Зеркальный Город, первая улица"
    time: "вне времени"
    characters_present: [Марко, Лина]
    author_text: >
      Лина шагает в забор — и исчезает. Растворяется, как ложка в стакане чая.
      Была — и нет.
      Марко стоит один. Забор перед ним. Рюкзак на плечах.
      Телефон в кармане.
      Три повторения подтвердили: дверь есть. Но что за ней — не проверено.
