  # ── СЦЕНА 20: Лужа — отражение Лины не совпадает ──────────────────
  - scene_id: ep004_s20
    episode_id: 4
    source_ref: day_01.ep4.drama
    scene_type: narrative
    location: "Зеркальный Город, широкая улица"
    time: "вне времени"
    characters_present: [Марко, Лина, Софа]
    author_text: >
      Они выходят на широкую улицу. Впереди — лужа. Большая, метра два.
      Вода стоячая, тёмная. В ней отражается фиолетовое небо.
      Марко подходит. Смотрит вниз.
      Его отражение дрожит. Рябь на воде — хотя ветра нет.
      Отражение Марко — тревожное, плечи подняты, глаза бегают.
      Рядом — отражение Лины.
      Отражение Лины — СПОКОЙНОЕ. Руки скрещены. Выражение ОЖИДАНИЯ.
      Как будто она здесь бывала. Как будто знает, что будет дальше.
      Марко смотрит на Лину — она стоит, руки в карманах, улыбается.
      Смотрит в лужу — отражение другое. Руки скрещены. Не улыбается. Ждёт.
    dialogue:
      - who: Софа
        line: "Несоответствие... Лина улыбается. Отражение — нет. Проверяемо?"
    interactions:
      - interaction_type: vote
        question: "Марко видит: Лина улыбается, а отражение — нет. Это проверяемый факт?"
        options:
          - id: yes
            text: "Да — инструмент: зрение. Но нужно повторить"
            correct: true
          - id: no
            text: "Нет — показалось"
            correct: false
        correct_logic: "Да! Марко видит своими глазами — инструмент: зрение. Но одного раза мало."
        feedback_success: "Да! Инструмент — зрение. Но нужно повторить — одного раза мало."
        feedback_soft_fail: "Марко видит своими глазами. Это инструмент? Да. Но сколько раз нужно проверить?"
      - interaction_type: vote
        question: "Одного наблюдения достаточно, чтобы сделать вывод?"
        options:
          - id: yes
            text: "Да, он же видел"
            correct: false
          - id: no
            text: "Нет — может быть рябь, угол, показалось"
            correct: true
        correct_logic: "Нет! Одного раза мало — может быть рябь, угол, показалось."
        feedback_success: "Одного раза мало! Может быть рябь, угол, показалось. Нужно повторить."
        feedback_soft_fail: "Вспомни: сколько раз Марко проверял забор? Три. Одного раза мало."
    mood: "жуткое открытие"
    next_default: ep004_s20_choice
    set_flags: [spotted_reflection]
