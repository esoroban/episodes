      Марко делает шаг.
      Фиолетовое небо. Не синее, не голубое — фиолетовое, как синяк.
      Дома стоят ровно, как солдаты. Окна отражают небо,
      и кажется, что дома смотрят.
      Громкоговорители на столбах. Голос — мягкий, тёплый, как тёплое одеяло:
      «Добро пожаловать домой, потомок.»
