            text: "Потому что все так думают"
            correct: false
        correct_logic: "Нет «красивомера»! Для кого-то красивое, для кого-то нет."
        feedback_success: "Нет «красивомера»! Красота — субъективная оценка."
        feedback_soft_fail: "Есть прибор для «красивый»? Нет? Тогда что это?"
      - interaction_type: vote
        question: "«В Городе сейчас +15.» Почему это факт?"
        options:
          - id: thermometer
            text: "Термометр"
            correct: true
          - id: feels_like
            text: "Потому что чувствуется"
            correct: false
        correct_logic: "Термометр! Инструмент даёт число."
        feedback_success: "Термометр! Вышел, посмотрел градусы — проверил."
        feedback_soft_fail: "Ощущение или число? Какой инструмент даёт число?"
      - interaction_type: vote
        question: "«В Городе уютно.» Почему это мнение?"
        options:
          - id: feeling
            text: "«Уютно» — ощущение, для кого-то уютно, для кого-то нет"
            correct: true
          - id: looks_nice
            text: "Потому что город красивый"
            correct: false
        correct_logic: "«Уютно» — ощущение! Для кого-то уютно, для кого-то нет."
        feedback_success: "«Уютно» — для каждого своё. Ощущение, не число."
        feedback_soft_fail: "Есть «уютомер»? Нет. Это ощущение."
      - interaction_type: vote
        question: "«Лина дошла до площади за 40 секунд.» Почему это факт?"
        options:
          - id: stopwatch
            text: "Секундомер"
            correct: true
          - id: fast
            text: "Потому что быстро"
            correct: false
        correct_logic: "Секундомер! Засёк время — получил число."
        feedback_success: "Секундомер! Засёк — получил число. Число не обманет."
        feedback_soft_fail: "Каким инструментом проверить время?"
