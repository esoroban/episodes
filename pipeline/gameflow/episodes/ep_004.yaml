            correct: false
        correct_logic: "«Далеко» — ощущение! Для кого-то далеко, для кого-то близко."
        feedback_success: "«Далеко» — для каждого своё. Спортсмену — ерунда. Малышу — путешествие."
        feedback_soft_fail: "Можно ли измерить «далеко»? Это число или ощущение?"
