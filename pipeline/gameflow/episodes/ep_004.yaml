          - id: impossible
            text: "Потому что невозможно знать весь город"
            correct: false
        correct_logic: "«Когда иду один» — отговорка! На каждую попытку проверить — причина."
        feedback_success: "«Когда иду один» — отговорка! Закрывает путь к проверке."
        feedback_soft_fail: "Что мешает проверить? Найди условие, которое закрывает путь."
    mood: "обратная практика — восемь пар по контрасту"
