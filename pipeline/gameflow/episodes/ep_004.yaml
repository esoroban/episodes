          Если есть — утверждение проверяемое. Если нет — мнение или хитрое утверждение.
      - who: Софа
        line: >
          Вопрос второй: ЧЕЛОВЕК СОГЛАСЕН ПРОВЕРИТЬ — ИЛИ У НЕГО ОТГОВОРКА?
          Если «не сегодня», «не при людях», «не сохранилось» — хитрое утверждение.
      - who: Софа
        line: >
          Вопрос третий: ПРОВЕРИЛИ — ПОДТВЕРДИЛОСЬ?
