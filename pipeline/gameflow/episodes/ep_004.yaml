  # ── СЦЕНА 1: Парк — невидимая дверь ───────────────────────────────
  - scene_id: ep004_s01
    episode_id: 4
    source_ref: day_01.ep4.drama
    scene_type: dialogue
    location: "Парк, аллея, забор"
    time: "вечер"
    characters_present: [Марко, Лина]
    author_text: >
      Парк. Аллея кончается — дальше кусты, забор, за забором пустырь.
      Обычное место. Ничего особенного.
      Лина останавливается. Показывает рукой — прямо на забор.
    dialogue:
      - who: Лина
        line: "Здесь."
      - who: Марко
        line: "Здесь — что?"
      - who: Лина
        line: "Дверь. Через неё Софию забрали. Через неё можно попасть... туда."
      - who: Марко
        line: "Лина, тут нет никакой двери."
      - who: Лина
        line: "Она невидимая. Но она здесь. Я знаю."
      - who: Марко
        line: "Откуда?"
      - who: Лина
        line: "Просто знаю."
    author_text_after: >
      Марко смотрит на забор. Ржавая сетка. Травинки торчат из-под бетона. Ничего.
      «Просто знаю.» Два слова, которые ничего не значат. Марко вспоминает: Софа учила —
      на каждую проверку есть отговорка? Нет, Лина не отговаривается. Она просто — знает.
      И говорит это так уверенно, что Марко хочется поверить.
      Лина уверена — и этого Марко достаточно. Так было с мамой. Так было с Верой.
      Так было всегда.
      Ноги не хотят идти. Голова говорит «да» — Лина же единственная, кто помнит!
      А ноги говорят «стой». Марко делает шаг вперёд.
      Софа вибрирует. Не один раз — несколько. Частые короткие вибрации, как сердцебиение.
    mood: "страх у порога"
    next_default: ep004_s02
    visual_brief:
      background: "Парк, аллея заканчивается, ржавый забор, кусты, пустырь за забором"
      camera: wide
      characters:
        - who: Лина
          expression: уверенность, показывает рукой
