        correct_logic: "Весы! Положил — увидел число."
        feedback_success: "Инструмент — весы. Взвесил — получил число."
        feedback_soft_fail: "Точное число — само по себе не делает фактом. Каким инструментом проверить?"
      - interaction_type: vote
        question: "«Зеркало красивое.» Почему это мнение?"
