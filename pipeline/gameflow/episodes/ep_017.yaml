  # ── СЦЕНА 13: Три ключа + уровни интернета + дипфейк (drama) ─────────
  - scene_id: ep017_s13
    episode_id: 17
    source_ref: day_05.ep17.sofa_block
    scene_type: narrative
    location: "Зеркальный Город, подвал подполья"
    time: "вне времени"
    characters_present: [Марко]
    author_text: >
      Даже «услышал от других» бывает разным. Разведчик держит в кармане
      ТРИ КЛЮЧА для проверки источника.

      Первый: разбирается ли человек в этом? Каждый эксперт — эксперт в
      СВОЕЙ теме. Повар знает про суп, но не про ракеты.

      Второй: хочет ли он что-то получить? Продавец хвалит свой товар —
      у него выгода.

      Третий: можно ли проверить? Если нельзя — фонарик мигает красным.

      Второй инструмент — УРОВНИ ИНТЕРНЕТА. Четыре полки библиотеки.
      Первая: официальные сайты — больница, школа, музей. Вторая:
      новости и энциклопедии. Третья: блоги и соцсети — как объявление
      на заборе, повесить может кто угодно. Четвёртая: чаты и пересылки
      — шёпот в тёмном коридоре. Чем ниже полка — тем больше подозрений.

      И третий инструмент. ДИПФЕЙК — глубокая подделка. ИИ может
      нарисовать фото несуществующего человека, сделать видео, где
      известный человек говорит то, чего не говорил, написать фальшивую
      статью. Раньше: «вижу — значит верю». Теперь: «вижу — но КТО мне
      это показывает? И ЗАЧЕМ?»
    mood: "три инструмента — в карман разведчика"
    next_default: ep017_s14_sofa
    visual_brief:
      background: "Подвал, Марко у стены подполья, рядом три пометки углём: «3 КЛЮЧА», «ПОЛКИ», «ДИПФЕЙК»"
      camera: medium
      characters:
        - who: Марко
          expression: сосредоточенная работа, губы плотно сжаты
          pose: стоит у стены, кусок угля в руке после трёх пометок
          position: center
      props: [стена с записками, три пометки углём, тусклая лампа]
      focus_object: "три свежие пометки углём рядом с «ГЛАЗАМИ / ОТ ДРУГИХ»"
      atmosphere: "Марко собирает инструменты один за другим"
      ui_mode: reading

