scenes:

  # ── СЦЕНА 1: Воздух в переулке сдвинулся — шёпот ─────────────────────
  - scene_id: ep017_s01
    episode_id: 17
    source_ref: day_05.ep17.drama
    scene_type: narrative
    location: "Зеркальный Город, переулок с двумя плакатами"
    time: "вне времени"
    characters_present: [Марко]
    author_text: >
      Воздух в переулке сдвинулся. Марко замер. Тишина.

      Потом — голос. Тихий. Женский. Без эха.

      — Не оборачивайся. Иди за мной.
    mood: "невидимый проводник из темноты"
    next_default: ep017_s02
    visual_brief:
      background: "Переулок с двумя плакатами, сумерки. Тёмный угол справа, где «сдвинулся воздух»"
      camera: medium
      characters:
        - who: Марко
          expression: замирание, обостренное внимание
          pose: застыл между плакатов, голова чуть наклонена к тёмному углу
          position: center
      props: [плакат-крик, плакат-план, тёмный угол с контуром фигуры, телефон в опущенной руке]
      focus_object: "тёмный угол — оттуда звучит голос без источника"
      atmosphere: "кто-то стоял рядом и заговорил"
      ui_mode: reading

  # ── СЦЕНА 2: Марко оборачивается. Подпольщица ────────────────
  - scene_id: ep017_s02
    episode_id: 17
    source_ref: day_05.ep17.drama
    scene_type: dialogue
    location: "Зеркальный Город, переулок с двумя плакатами"
    time: "вне времени"
    characters_present: [Марко, "Подпольщица"]
    author_text: >
      Марко оборачивается. Конечно.

      Женщина. Лет тридцать. Серая одежда. Число на запястье — двенадцать.
      Двенадцать из ста. Почти стёрта.
    dialogue:
      - who: "Подпольщица"
        line: "Я сказала не оборачиваться."
      - who: Марко
        line: "Я слышал."
    author_text_after: >
      Она смотрит на Марко. Потом — на Софу в его руке. Кивает. Идёт.
    mood: "первый живой взгляд на число, которое почти съедено"
    interaction_type: choice
    question: "Как идти за ней?"
    options:
      - id: silent
        text: "Молча кивнуть и пойти"
        next: ep017_s03
      - id: ask
        text: "Задать вопрос сразу: «Куда?»"
        next: ep017_s02b
    next_default: ep017_s03
    visual_brief:
      background: "Переулок с двумя плакатами, сумерки"
      camera: medium
      characters:
        - who: Марко
          expression: напряжённое внимание, готовность
          pose: обернулся, рука с телефоном чуть приподнята
          position: left
        - who: "Подпольщица"
          expression: спокойная собранность, глаза на Софе в руке Марко
          pose: стоит вполоборота, числа «12» видны на запястье
          position: right
      props: [плакат-крик на заднем плане, плакат-план на заднем плане, число 12 на запястье женщины, телефон в руке Марко]
      focus_object: "запястье с числом 12 — почти стёртое, но живое"
      atmosphere: "первый свой — среди чужого"
      ui_mode: choice

  # ── СЦЕНА 2b: Detour — Марко задаёт вопрос ───────────────────────────
  - scene_id: ep017_s02b
    episode_id: 17
    source_ref: day_05.ep17.drama
    scene_type: dialogue
    location: "Зеркальный Город, переулок с двумя плакатами"
    time: "вне времени"
    characters_present: [Марко, "Подпольщица"]
    branch_type: flavor_detour
    author_text: >
      Марко не шевельнётся, пока не поймёт, куда идёт.
    dialogue:
      - who: Марко
        line: "Куда?"
      - who: "Подпольщица"
        line: "Туда, где про Голос знают больше твоего."
      - who: Марко
        line: "Откуда вы знаете, что он мне нужен?"
      - who: "Подпольщица"
        line: "Ты стоишь между двух его плакатов. Догадалась."
    author_text_after: >
      Она разворачивается. Марко идёт следом. Разведчик проверяет —
      даже проводника.
    mood: "первая проверка — ещё до подвала"
    merge_to: ep017_s03
    next_default: ep017_s03
    visual_brief:
      background: "Переулок, плакаты по сторонам, Марко и женщина в профиль"
      camera: medium
      characters:
        - who: Марко
          expression: собранный прищур, проверочный вопрос
          pose: стоит, плечи прямые, телефон в руке
          position: left
        - who: "Подпольщица"
          expression: тихое признание взрослого собеседника
          pose: вполоборота, рука на дверной ручке впереди
          position: right
      props: [плакат-крик, плакат-план, силуэт двери в стене впереди, число 12 на запястье]
      focus_object: "Марко задаёт вопрос — первый шаг разведчика"
      atmosphere: "проверить проводника — тоже работа"
      ui_mode: reading

  # ── СЦЕНА 3: Подвал. Подполье. 20–30 человек ─────────────────────────
  - scene_id: ep017_s03
    episode_id: 17
    source_ref: day_05.ep17.drama
    scene_type: narrative
    location: "Зеркальный Город, подвал подполья"
    time: "вне времени"
    characters_present: [Марко, "Подпольщица", "горожане подполья"]
    author_text: >
      Подвал. Лестница вниз. Дверь без ручки — толкнуть плечом. За
      дверью — комната. Низкий потолок. Тусклый свет. На стенах —
      записки, схемы, стрелки. Почерка разные.

      Двадцать — тридцать человек. Числа у всех маленькие.
      Пятнадцать, девять, двадцать два. Люди, которых Голос почти
      дожевал.

      Подполье.

      Женщина с числом двенадцать садится на ящик. Остальные молчат.
      Смотрят на Марко. На его число. На Софу.
    mood: "впервые — другие, не Голос"
    next_default: ep017_s04
    visual_brief:
      background: "Низкий подвал, тусклый свет одной лампы, стены в записках и схемах. Около тридцати силуэтов сидят и стоят"
      camera: wide
      characters:
        - who: Марко
          expression: настороженность, острый интерес
          pose: стоит в дверях, телефон прижат к груди
          position: center
        - who: "Подпольщица"
          expression: усталая собранность
          pose: садится на деревянный ящик
          position: right
      props: [ящик как стул, стены в записках и стрелках, лампа без абажура, числа 15/9/22 на запястьях дальних силуэтов]
      focus_object: "комната со стенами-архивом, полная маленьких чисел"
      atmosphere: "подвал, где собрались те, кого Голос почти доел"
      ui_mode: reading

  # ── СЦЕНА 4: «Голос был учителем» ────────────────────────────────────
  - scene_id: ep017_s04
    episode_id: 17
    source_ref: day_05.ep17.drama
    scene_type: dialogue
    location: "Зеркальный Город, подвал подполья"
    time: "вне времени"
    characters_present: [Марко, "Подпольщица"]
    dialogue:
      - who: "Подпольщица"
        line: "Голос был учителем. Обычным учителем. Потом захотел большего."
      - who: Марко
        line: "Откуда вы знаете?"
    mood: "тихая уверенность подполья — и первый вопрос разведчика"
    next_default: ep017_s05
    visual_brief:
      background: "Подвал, стена с записками за спиной женщины"
      camera: medium
      characters:
        - who: Марко
          expression: внимательное «откуда?»
          pose: стоит перед ящиком, плечи прямые
          position: left
        - who: "Подпольщица"
          expression: спокойное заявление давно известного
          pose: сидит, руки на коленях
          position: right
      props: [ящик как сиденье, стены в записках, тусклая лампа]
      focus_object: "женщина говорит как о факте — Марко спрашивает как о слухе"
      atmosphere: "первый поединок доверия"
      ui_mode: dialogue

  # ── СЦЕНА 5: Семь звеньев — учитель стал великим магом ───────────────
  - scene_id: ep017_s05
    episode_id: 17
    source_ref: day_05.ep17.drama
    scene_type: narrative
    location: "Зеркальный Город, подвал подполья"
    time: "вне времени"
    characters_present: [Марко, "Подпольщица", "горожане подполья"]
    author_text: >
      Женщина кивает на мужчину в углу: «Он сказал.» Мужчина кивает на
      женщину у стены: «Она рассказала.» Та — на парня у двери: «Мне
      передали.»

      Марко считает. Один, два, три, четыре...

      Семь звеньев. Семь пересказов. К последнему звену история звучит
      так: «Голос был великим магом, который создал Город силой мысли
      и управляет временем.»

      Учитель стал великим магом за семь пересказов. Каждое звено
      добавило кусочек — чуть-чуть преувеличения, щепотку домысла,
      каплю страха. Семь капель — и стакан переполнился.

      Испорченный телефон. На живых людях. Шёпот на входе — крик на
      выходе.
    mood: "наглядный испорченный телефон на живых людях"
    next_default: ep017_s06
    visual_brief:
      background: "Подвал, пять-шесть силуэтов в разных углах, стрелка взгляда идёт от одного к другому"
      camera: wide
      characters:
        - who: Марко
          expression: считает, пальцы слегка двигаются
          pose: стоит в центре, поворачивается, считая
          position: center
        - who: "Подпольщица"
          expression: кивок — «дальше к нему»
          pose: указывает жестом на мужчину в углу
          position: right
      props: [силуэты горожан в углах, стрелки-взгляды между ними, стены в записках]
      focus_object: "цепочка взглядов — семь звеньев шёпота"
      atmosphere: "испорченный телефон в подвале, вживую"
      ui_mode: reading

  # ── СЦЕНА 6: Теория — «откуда ты это знаешь?» (drama voice-over) ─────
  - scene_id: ep017_s06
    episode_id: 17
    source_ref: day_05.ep17.sofa_block
    scene_type: narrative
    location: "Зеркальный Город, подвал подполья"
    time: "вне времени"
    characters_present: [Марко]
    author_text: >
      Подполье говорит уверенно. Они ПРОТИВ Голоса — хочется верить.
      Но «на моей стороне» не равно «говорит правду». Разведчик
      проверяет всех.

      Главный вопрос разведчика: ОТКУДА ТЫ ЭТО ЗНАЕШЬ?

      Два типа ответа. СВОИМИ ГЛАЗАМИ — сам видел, сам измерил, сам
      сделал. Очевидец. Документ. Эксперимент. Ты был там.

      УСЛЫШАЛ ОТ ДРУГИХ — пересказ. «Мне друг сказал.» «В интернете
      написали.» «По телевизору показали.» Каждый пересказ может
      добавить ошибку.

      Подполье — «услышал от других». Семь звеньев. Ни один из них не
      видел Голоса-учителя своими глазами.

      Услышал — не значит враньё. Но надо проверять.
    mood: "теория ложится поверх только что увиденного"
    next_default: ep017_s07
    visual_brief:
      background: "Подвал, стена с записками, Марко стоит перед ней — два слова углём: «ГЛАЗАМИ» и «ОТ ДРУГИХ»"
      camera: medium
      characters:
        - who: Марко
          expression: концентрированная работа
          pose: стоит перед стеной, кусок угля в руке после двух слов
          position: center
      props: [стена с записками, два слова углём «ГЛАЗАМИ» / «ОТ ДРУГИХ», тусклая лампа]
      focus_object: "две надписи углём — два типа источников"
      atmosphere: "Марко впервые получает карманный инструмент"
      ui_mode: reading

  # ── СЦЕНА 7: Sofa quiz 1 — цепочка Марина → Сергей → женщина ─────────
  - scene_id: ep017_s07
    episode_id: 17
    source_ref: day_05.ep17.sofa_block
    scene_type: quiz
    location: "Зеркальный Город, подвал подполья"
    time: "вне времени"
    characters_present: [Марко, Софа]
    interaction_type: vote
    question: "Женщина подполья говорит: «Голос был учителем — мне рассказал Сергей, который слышал от Марины.» Своими глазами или услышал от других?"
    options:
      - id: seen
        text: "Своими глазами"
        correct: false
      - id: heard
        text: "Услышал от других"
        correct: true
    correct_logic: "Цепочка: Марина → Сергей → женщина. Ни один не видел сам. Каждое звено — пересказ."
    feedback_success: "Цепочка: Марина → Сергей → женщина. Ни один не видел сам. Каждое звено — пересказ."
    feedback_soft_fail: "Кто из них стоял рядом с Голосом-учителем? Если ни один — это «услышал от других»."
    mood: "первый квиз — ровно тот случай, который только что видели"
    next_default: ep017_s08
    visual_brief:
      background: "Экран телефона, пузырь Софы с вопросом, пунктирная стрелка Марина → Сергей → женщина"
      camera: close-up
      characters:
        - who: Марко
          expression: сосредоточенный кивок
          pose: смотрит в экран
          position: center
      focus_object: "цепочка из трёх имён — пересказ чистой воды"
      atmosphere: "живой пример сразу превращается в проверку"
      ui_mode: quiz

  # ── СЦЕНА 8: Sofa quiz 2 — кошка ─────────────────────────────────────
  - scene_id: ep017_s08
    episode_id: 17
    source_ref: day_05.ep17.sofa_block
    scene_type: quiz
    location: "Зеркальный Город, подвал подполья"
    time: "вне времени"
    characters_present: [Марко, Софа]
    interaction_type: vote
    question: "«Я сам видел, как кошка поймала мышку!» Своими глазами или услышал от других?"
    options:
      - id: seen
        text: "Своими глазами"
        correct: true
      - id: heard
        text: "Услышал от других"
        correct: false
    correct_logic: "Очевидец. Был на месте. Видел сам."
    feedback_success: "Очевидец. Был на месте. Видел сам."
    feedback_soft_fail: "«Я сам видел» — это кто? Ты сам. Это и есть «своими глазами»."
    mood: "ясный случай — для противовеса"
    next_default: ep017_s09
    visual_brief:
      background: "Экран телефона, пузырь с вопросом, маленький силуэт кошки"
      camera: close-up
