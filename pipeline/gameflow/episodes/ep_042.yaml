  # ── СЦЕНА 7: Теория — признание частичной правоты ───────────────
  - scene_id: ep042_s09
    episode_id: 42
    source_ref: day_11.ep42.sofa_block
    scene_type: narrative
    location: "Башня Голоса, опустевший зал"
    time: "ночь"
    characters_present: [Марко]
    author_text: >
      ПРИЗНАНИЕ ЧАСТИЧНОЙ ПРАВОТЫ — это приём, который усиливает
      возражение. Формула простая: «В этом ты прав, но...».

      Зачем признавать чужую правоту? Это же уступка! Нет. Это сила.
      Когда ты говоришь «в этом ты прав» — собеседник перестаёт
      защищаться. Он услышал, что услышали ЕГО. Стена падает. И
      твой аргумент проходит дальше.

      Признать часть правды — не значит сдаться. Значит: я слушал,
      я думал, и всё равно не согласен.

      ТРИ УРОВНЯ ОТВЕТА.

      УРОВЕНЬ 1 — нападка. «Ты дурак и ничего не понимаешь!» Бьёт
      по человеку. Самый слабый уровень: вызывает только злость.

      УРОВЕНЬ 2 — возражение. «Я не согласен, потому что...» Бьёт
      по аргументу. Сильнее: вызывает мысль.

      УРОВЕНЬ 3 — возражение с признанием частичной правоты. «В
      этом ты прав. Но я не согласен, потому что...» Самый сильный
      уровень: уважение к человеку И аргумент по делу.

      Каждый следующий уровень сильнее предыдущего. Не слабее.
      Сильнее. Потому что снимает у собеседника защиту прежде, чем
      ударить по идее.
    mood: "карта инструмента — три уровня"
    next_default: ep042_s10
    visual_brief:
      background: "Зал в расфокусе. По центру — три ступени: «нападка → возражение → возражение с признанием». Сбоку — формула «в этом ты прав, но...»"
