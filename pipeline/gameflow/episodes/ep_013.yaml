      Тело — нет. Тело — честный болтун, оно не умеет молчать. Мама
      спрашивает: «Как суп?» Рот говорит «вкусно!» — а руки отодвигают
      тарелку. Чему верить — словам или рукам?

      Передача информации без слов. Самая древняя — ещё до того, как
      люди научились говорить, они уже умели читать друг друга. По лицу.
      По рукам. По позе. По голосу. НЕВЕРБАЛЬНАЯ КОММУНИКАЦИЯ.

      У того, что Марко увидел, есть имя. Четвёртый инструмент
      разведчика — ГЛАЗ. Видеть то, что слова прячут.
