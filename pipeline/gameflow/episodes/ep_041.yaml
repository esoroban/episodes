  # ── СЦЕНА 8: Теория — возражение + структура ─────────────────────
  - scene_id: ep041_s08
    episode_id: 41
    source_ref: day_11.ep41.sofa_block
    scene_type: narrative
    location: "Башня Голоса, край сцены"
    time: "ночь"
    characters_present: [Марко]
    author_text: >
      ВОЗРАЖЕНИЕ — это спокойный, обоснованный ответ на чужой
      аргумент. Не «нет!» — а «нет, и вот почему».

      У возражения и нападки разные мишени. Нападка бьёт по ЧЕЛОВЕКУ:
      «ты дурак», «только глупые так думают». Возражение бьёт по
      АРГУМЕНТУ: «я думаю иначе, потому что...».

      Марко на сцене бил по Рею — «посредник, которого никто не
      назначал». Это нападка. Аргумент Рея — про порядок — остался
      нетронутым.

      СТРУКТУРА ВОЗРАЖЕНИЯ — четыре шага.

      ШАГ 1. Повтори мысль собеседника. Так ты показываешь, что
      услышал, а не просто закричал поперёк.

      ШАГ 2. Покажи уважение. «Я понимаю, почему ты так думаешь.»
      Этот шаг снимает с собеседника защиту.

      ШАГ 3. Скажи своё мнение. Чётко, без оскорблений. «Но я думаю
      иначе.»

      ШАГ 4. Дай причину. Факт, пример, логика. Не «потому что я так
      сказал», а «потому что вот данные / вот случай / вот вывод».

      Фразы-помощники: «Я не согласен с идеей...», «Мне кажется,
      есть ошибка...», «Я понимаю тебя, но думаю иначе, потому
      что...».

      Главное: возражение — не слабее нападки. Оно сильнее. Потому
      что нападка только злит. Возражение — заставляет думать.
    mood: "карта инструмента — четыре шага"
