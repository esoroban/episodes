  # ── СЦЕНА 04_d3: Drill 3 — ложная дилемма ────────────────────────
  - scene_id: ep041_s11
    episode_id: 41
    source_ref: day_11.ep41.drama
    scene_type: quiz
    location: "Башня Голоса, у входа в зал"
    time: "ночь"
    characters_present: [Марко, Софа]
    interaction_type: constructor
    intro: "Цель: заставить толпу выбрать одно из двух — как будто третьего варианта не существует."
    steps:
      - id: poles
        label: "ШАГ 1 · ДВА ПОЛЮСА"
        hint: "Дай два полюса БЕЗ середины — выбор только между ними."
        options:
          - text: "Сегодня вы решаете: правда или Голос — третьего не бывает."
            correct: true
            fb: "Два полюса заданы. Аудитория уже мыслит в этой рамке."
          - text: "Я хочу обсудить три-четыре позиции, которые я слышал в зале."
            correct: false
            fb: "Это приглашение к разбору многих позиций. В дилемме их быть не должно."
          - text: "У этого вопроса есть несколько сторон, давайте их перечислим."
            correct: false
            fb: "Это нейтральное приглашение к перечислению. Нам нужны РОВНО два полюса."
      - id: labels
        label: "ШАГ 2 · ЭМОЦИОНАЛЬНЫЕ ЯРЛЫКИ"
        hint: "Назови каждый полюс эмоциональным ярлыком — выбор перестанет быть равным."
        options:
          - text: "Между этими позициями есть промежуточные пути, и их много."
            correct: false
            fb: "Это возражение к самой дилемме. Сейчас её надо УКРЕПЛЯТЬ, не ломать."
          - text: "Правда — это мы. Голос — это страх в чистом виде."
            correct: true
            fb: "«Мы» против «страх» — выбор уже не равный, а заведомо в твою пользу."
          - text: "Я не уверен, что эти две вещи реально противоположны друг другу."
            correct: false
            fb: "Это сомнение в самой дилемме. Демагогии нужна жёсткая разметка, а не сомнение."
      - id: ultimatum
        label: "ШАГ 3 · УЛЬТИМАТУМ"
        hint: "Закрой жёстким требованием — решение здесь и сейчас, без раздумий."
        options:
          - text: "Подумайте дома, что для вас важнее — и решите тогда уже трезво."
            correct: false
            fb: "Это приглашение к раздумью дома. Демагог не даёт времени думать."
          - text: "Можно искать компромисс между этими двумя позициями вместе."
            correct: false
            fb: "Это компромисс. В дилемме компромисса нет — иначе она перестаёт работать."
          - text: "Третьего не дано. Решайте здесь и сейчас, без колебаний."
            correct: true
            fb: "«Третьего не дано» + «здесь и сейчас» — отсекает середины и время на раздумья."
    template: "{poles} {labels} {ultimatum}"
    skip_assembled: true
    closing: "Ложная дилемма. На самом деле между «правдой» и «Голосом» куча позиций: кто-то верит наполовину, кто-то хочет проверить, кому-то всё равно. Ты убрал все эти варианты — оставил только два. «Третьего не дано» — это неправда, но в моменте у толпы нет времени это понять. Теперь произнеси это на сцене."
    mood: "drill 3 — ложная дилемма"
    next_default: ep041_s12
    visual_brief:
