#   Все живые (Сем, Рей, толпа) — только в drama-сценах.
#   Теория «возражение + 4 шага» — drama narrative с author_text,
#   Софа НЕ учит (только подводки/правило/квизы).
#
# ДРАМА — ЗАЛ + РЕЙ + ПЕРЕХВАТ + ВОПРОС СЕМА:
# s01  — Марко у двери, видит зал и Рея на сцене (drama narrative).
# s02  — Рей говорит: «Друзья. Мы потеряли...» «Голос дал...» (drama dialogue).
# s03  — Софа: «Перехвати толпу. Словами.» (chat подводка).
# s04  — Choice: выйти на сцену / остаться в тени (drama choice).
# s04b — Detour: остался — толпа уходит в страх, возвращается (drama).
# s05  — Марко поднимается на сцену, тирада с тремя приёмами (drama dialogue).
# s06  — Толпа переключается. Рей замолкает (drama narrative).
# s07  — Сем дёргает за рукав: «В чём разница?» (drama dialogue).
#
# СОФА-БЛОК (теория + 12 квизов в двух волнах + правило):
# s08      — Теория: возражение + структура (drama narrative, author_text).
# Волна 1 — бинар нападка / возражение (6 квизов):
# s09      — «Только глупые так думают!» → нападка (ярлык).
# s10      — «Я не согласен — данные за прошлый год.» → возражение (факт).
# s11      — «Ты совсем не разбираешься в жизни города!» → нападка (компетентность).
# s12      — «Я понимаю твою позицию. Но факты говорят иначе.» → возражение (уважение + факт).
# s13      — «Ты неправ, потому что ты ничего не видел!» → нападка (фальшивое «потому что»).
# s14      — «Я понимаю, что ты веришь Рею. Но не согласен — нет фактов.» → возражение (4 шага).
# s14_marker — Софа: «Это разминка. Теперь — внутрь возражения.»
# Волна 2 — узнавание шагов и целостность (6 квизов):
# s14a     — ШАГ 1 (повтор) — какой вариант зеркало?
# s14b     — ШАГ 2 (уважение) — какой не уступка и не уход?
# s14c     — ШАГ 3 (мнение) — какой прямое, не оценка?
# s14d     — ШАГ 4 (причина) — какой факт, не эмоция?
# s14e     — Какие шаги отсутствуют в «Я понимаю. Я не согласен.»?
# s14f     — Что не так в «Я понимаю, что X. Но это полная глупость!»?
# s15_sofa — Правило 41 (chat).
#
# ИСПЫТАНИЕ — ОТКРЫТЫЙ ВОПРОС + 8 БЛИЦЕВ + 3 КОНСТРУКТОРА:
# s16  — Open vote: «Цели разные — инструменты одинаковые. Допустимо?» (нет правильного).
# s17  — Quiz: «Только дураки верят Голосу!» — нападка.
# s18  — Quiz: «Я понимаю, ты веришь...» — возражение.
# s19  — Quiz: «Своих мозгов нет!» — нападка.
# s20  — Quiz: «Порядок через страх — клетка» — возражение.
# s21  — Quiz: Марко крикнул «КАЖДЫЙ потерял!» — манипуляция.
# s21a — Quiz: Сем «ты сделал то же, что Рей» — возражение (наблюдение).
# s21b — Quiz: «Я не согласен.» — голое мнение vs полное возражение.
# s21c — Quiz: какая реплика на «трус убегает» правильно собрана по 4 шагам.
# s22  — Софа подводка к конструкторам (chat).
# s23  — Constructor 4-step: «не понимаешь жизнь города».
# s24  — Constructor 2-step: «трус убегает от Голоса».
# s25  — Constructor 2-step: «кто слушает детей — сам ребёнок».
#
# КЛИФФХЭНГЕР:
# s26     — Сем «Можно по-другому?» Рей в углу: «Голос когда-то говорил без крика» (drama).
# s27_end — Софа: «Рей сказал важное.» Число 18. (drama cliffhanger).
