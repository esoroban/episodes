            correct: true
            fb: "«Я просто привёл» — формальный выход. Обвинение прозвучало, ответственности нет."
    template: "{deny} {hint} {shift}"
    skip_assembled: true
    closing: "Приём «я не говорю, что...». Ты громко произнёс слово «предатель» — и сразу добавил «я не говорю». Слово прозвучало, ответственности за него у тебя нет. «Каждый сделает вывод» — ты переложил вину на слушателей. Если кто-то потом скажет «ты назвал Рея предателем» — ответишь: «я как раз сказал, что НЕ называл». Самая хитрая ловушка из девяти. Теперь произнеси это на сцене."
