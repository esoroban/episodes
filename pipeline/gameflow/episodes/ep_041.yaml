  # ── СЦЕНА 04_d2: Drill 2 — ложный авторитет ──────────────────────
  - scene_id: ep041_s09
    episode_id: 41
    source_ref: day_11.ep41.drama
    scene_type: quiz
    location: "Башня Голоса, у входа в зал"
    time: "ночь"
    characters_present: [Марко, Софа]
    interaction_type: constructor
    intro: "Цель: укрепить свои слова ссылкой на человека, который в этой теме не разбирается."
    steps:
      - id: persona
        label: "ШАГ 1 · ВВЕДИ ПЕРСОНУ"
        hint: "Введи человека, который НЕ разбирается в теме — просто кого-то с улицы."
        options:
          - text: "По данным городского архива — десять пропавших за месяц."
            correct: false
            fb: "Это настоящий источник с цифрами. Нам нужен ЛОЖНЫЙ авторитет, не реальный."
          - text: "Я разговаривал с двумя сотрудниками полиции вчера вечером."
            correct: false
            fb: "Полицейские разбираются в пропажах — это настоящий авторитет в теме. Нам нужен НЕ ИЗ ТЕМЫ."
          - text: "Я говорил со старым продавцом на углу нашей улицы."
            correct: true
            fb: "Точно — обычный человек, в теме не разбирается."
      - id: weight
        label: "ШАГ 2 · ДАЙ ЛОЖНЫЙ ВЕС"
        hint: "Дай ему ложный вес через возраст/стаж жизни, не через знания темы."
        options:
          - text: "Он живёт здесь сорок лет — он знает этот город насквозь."
            correct: true
            fb: "Сорок лет жизни — но в политике он не разбирается. Идеальный ложный вес."
          - text: "Он работал в полиции пятнадцать лет — у него есть данные."
            correct: false
            fb: "Полиция разбирается в пропажах — это настоящее знание темы. Нам нужно знание НЕ ИЗ ТЕМЫ."
          - text: "Он сосед, и у него есть своё мнение, как у каждого из нас."
            correct: false
            fb: "Нейтральная характеристика — никакого ложного веса не дано."
      - id: close
        label: "ШАГ 3 · ЗАКРОЙ БЕЗ ПРОВЕРКИ"
        hint: "Закрой выводом «из его авторитета» и не давай возможности проверить."
        options:
          - text: "Можно сходить к нему вместе и записать его слова на диктофон."
            correct: false
            fb: "Это приглашение к проверке. Демагогия — закрыть тему, не открыть к проверке."
          - text: "И он сказал — Голос принёс хаос. Этого достаточно."
            correct: true
            fb: "«Этого достаточно» закрывает тему до того, как кто-то спросит источник."
          - text: "Если хотите — я сведу вас с ним, поговорите сами с глазу на глаз."
            correct: false
            fb: "Тоже приглашение проверить. Демагогии нужен ультимативный финал, не диалог."
    template: "{persona} {weight} {close}"
    skip_assembled: true
    closing: "Ложный авторитет. Сорок лет жизни — это не то же самое, что знание темы. «Этого достаточно» закрывает разговор раньше, чем кто-то спросит — а кто этот человек, и откуда он знает? Толпа слышит «сорок лет» и сразу верит — мы любим истории и уважаем возраст. Но никто не проверил, что именно сказал старик. Теперь произнеси это на сцене."
    mood: "drill 2 — ложный авторитет"
    next_default: ep041_s10
