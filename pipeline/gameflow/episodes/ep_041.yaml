  # ── СЦЕНА 04_d8: Drill 8 — tu quoque ─────────────────────────────
  - scene_id: ep041_s21
    episode_id: 41
    source_ref: day_11.ep41.drama
    scene_type: quiz
    location: "Башня Голоса, у входа в зал"
    time: "ночь"
    characters_present: [Марко, Софа]
    interaction_type: constructor
    intro: "Цель: не отвечать на упрёк Рея, а вернуть упрёк ему обратно. Приём называется «встречный укор» — «а ты сам такой»."
    steps:
      - id: echo
        label: "ШАГ 1 · ПОВТОРИ ОБВИНЕНИЕ"
        hint: "Повтори обвинение Рея — но не обещай отвечать на него по существу."
        options:
          - text: "Рей привёл свой аргумент про мой план — давайте его разберём по пунктам."
            correct: false
            fb: "Это приглашение разобрать обвинение. Tu quoque — уход от разбора, не разбор."
          - text: "Я готов обсудить, что у меня есть, и где у меня план, а где его нет."
            correct: false
            fb: "Это приглашение к собственному разбору. Tu quoque не разбирает себя."
          - text: "Рей говорит, что у меня нет плана — это его слова, прямо как звучат."
            correct: true
            fb: "Эхо обвинения без обещания ответить — заходишь во встречный укор."
      - id: flip
        label: "ШАГ 2 · ПЕРЕВЕРНИ СТРЕЛКУ"
        hint: "Переверни стрелку на Рея — найди ЕГО слабое место в ТОЙ ЖЕ теме."
        options:
          - text: "А у самого Рея есть свой план? Кроме повторения слов Голоса вслух?"
            correct: true
            fb: "Стрелка перевёрнута — теперь объясняться должен Рей."
          - text: "План — действительно важная вещь, и о нём стоит говорить серьёзно."
            correct: false
            fb: "Это возражение по существу. Tu quoque не разбирает тему."
          - text: "Я могу рассказать про свои конкретные шаги и подробно их объяснить вам."
            correct: false
            fb: "Это свой аргумент. Во встречном укоре своих аргументов нет — только удар в обратную сторону."
      - id: shift
        label: "ШАГ 3 · ПЕРЕЛОЖИ БРЕМЯ"
        hint: "Закрой через «пусть он сначала» — переложи бремя ответа обратно на Рея."
        options:
          - text: "План — действительно важный фактор, и его наличие реально что-то значит."
            correct: false
            fb: "Это признание важности обвинения. Tu quoque не признаёт — оно перекладывает."
          - text: "Так что разговоры про «план» — пусть он сначала покажет свой, потом мой."
            correct: true
            fb: "«Пусть он сначала» — снимает с тебя обязанность отвечать."
          - text: "Я подумаю над тем, что скажу про свой план, и вернусь к этому позже."
            correct: false
            fb: "Это пауза, обещание ответить позже. Бремя не переложено."
    template: "{echo} {flip} {shift}"
    skip_assembled: true
    closing: "Встречный укор — «и ты сам такой». Ты НЕ ОТВЕТИЛ на обвинение про план. Ты сделал так, чтобы толпа забыла исходный вопрос и переключилась на Рея. Это очень распространённый приём — родители его узнают по детским спорам «а сам-то». Теперь произнеси это на сцене."
