    episode_id: 41
    source_ref: day_11.ep41.drama
    scene_type: narrative
    location: "Башня Голоса, у входа в зал"
    time: "ночь"
    characters_present: [Марко, Сем, Рей, толпа]
    branch_type: flavor_detour
    author_text: >
      Марко остаётся у двери. Не выходит. «Я не хочу быть как он.»

      Рей продолжает. Слова — гладкие, тёплые. Толпа кивает. Один за
      другим — встают. Аплодируют. Рей кланяется. Толпа выходит из
