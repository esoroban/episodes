# =====================================================================
# GAMEFLOW — Эпизод 41: «Передемагогировать»
# Урок: возражение + структура возражения (11A.1)
# Source: pipeline/source/episodes/day_11.yaml → ep: 41
# Book:   server/book/ep_041.md
# Quizzes: 33 (drill: 9 demagogue constructors / sofa_block: 12 / challenge: 12)
#          + 1 open vote (s16) + 3 constructor возражения (s23 4-step, s24/s25 2-step)
# Все квизы — про демагогию и возражение (тема 11A.1).
# DRILL (s04_drill_intro → s04_d1..s04_d9 → s04_drill_outro):
#   Софа готовит Марко за минуту до сцены — 9 канонических демагогических
#   приёмов (ad hominem, ad verecundiam, false dichotomy, slippery slope,
#   hasty generalization + ad populum, straw man, post hoc, tu quoque NEW,
#   praeteritio NEW). Drill-mode: Софа подсказывает перед каждым шагом,
#   игрок собирает 9 манипулятивных фраз руками. После каждой — разбор
#   от Софы: что сработало, почему это манипуляция.
# =====================================================================
#
# Flow:
#   s01 → s02 → s03 (Софа: «Как Рей. Но по-другому») → s04
#   s04 take_stage → s05 / stay_shadow → s04b → merge_to s05
#   s05 (Марко на сцене, Софа в кармане) → s04_drill_intro
#   DRILL — Софа суфлирует, Марко применяет на сцене после каждого приёма:
#   s04_drill_intro → s04_d1 (chat) → s04_d1_stage (drama) →
#   s04_d2 → s04_d2_stage → s04_d3 → s04_d3_stage → ... → s04_d9 → s04_d9_stage
#   → s04_drill_outro → s06 (Рей замолкает) → s07 (Сем: «в чём разница?»)
#   → s07b (Анна из зала спокойно возражает) → s07c (Софа маркирует «это возражение»)
#   → s08 (теория возражения, привязана к Анне) → ...
#   s07 → s08 → s09 → s10 → s11 → s12 → s13 → s14 → s14_marker
#   s14_marker → s14a → s14b → s14c → s14d → s14e → s14f → s15_sofa
#   s15_sofa → s16 → s17 → s18 → s19 → s20 → s21
#   s21 → s21a → s21b → s21c → s22 → s23 → s24 → s25 → s26 → s27_end
#
# BRANCH (s04 → s04b → s05): выйти на сцену / остаться в тени.
#   Choice: использовать слово как Рей / остаться в стороне.
#
# ПРАВИЛО ЧАТА (Дня 11):
#   В Telegram-чате — ТОЛЬКО [Марко, Софа]. Без автора-VO.
#   Все живые (Сем, Рей, толпа) — только в drama-сценах.
#   Теория «возражение + 4 шага» — drama narrative с author_text,
#   Софа НЕ учит (только подводки/правило/квизы).
#
# ДРАМА — ЗАЛ + РЕЙ + DRILL + ПЕРЕХВАТ + ВОПРОС СЕМА:
# s01  — Марко у двери, видит зал и Рея на сцене (drama narrative).
# s02  — Рей говорит: «Друзья. Мы потеряли...» «Голос дал...» (drama dialogue).
# s03  — Софа: «Перехвати толпу. Словами. Как Рей. Но по-другому.» (chat подводка).
# DRILL: Софа сразу после s03 показывает арсенал (9 конструкторов демагогии):
# s04_drill_intro — Софа: «"По-другому" — это значит сначала разобраться, КАК у Рея.»
# s04_d1  — Constructor 1: нападка на личность (ad hominem) — Рей-рупор.
# s04_d2  — Constructor 2: ложный авторитет (ad verecundiam) — старый продавец.
# s04_d3  — Constructor 3: ложная дилемма — правда или Голос.
# s04_d4  — Constructor 4: страшная цепочка — молчание → потеря детей.
# s04_d5  — Constructor 5: поспешное обобщение + ad populum — «ВСЕ родители».
# s04_d6  — Constructor 6: соломенное чучело — «Голос — единственное, что нас защищает».
# s04_d7  — Constructor 7: после = вследствие — «Рей выходит — люди исчезают».
# s04_d8  — Constructor 8: tu quoque (NEW) — «А у Рея есть свой план?».
# s04_d9  — Constructor 9: праетериция (NEW) — «Я не говорю, что Рей предатель, но...».
# s04_drill_outro — Софа: «Арсенал получен. Решай — пользоваться или нет.»
# s04  — Choice: выйти на сцену / остаться в тени (drama choice — теперь информированный).
# s04b — Detour: остался — толпа уходит в страх, возвращается (drama).
# s05  — Марко поднимается на сцену, тирада с приёмами (drama dialogue).
# s06  — Толпа переключается. Рей замолкает (drama narrative).
# s07  — Сем дёргает за рукав: «В чём разница?» (drama dialogue, удар двойной силы — игрок только что собирал эти приёмы).
# МОСТ — живое возражение из зала перед теорией:
# s07b — Анна (новый персонаж, одноразовый) встаёт в третьем ряду и спокойно возражает Марко: понимаю, уважаю, но не согласна — нет доказательств. Без давления, без ярлыков. Контраст к девяти приёмам Марко (drama dialogue).
# s07c — Софа в чате: «Это и есть возражение. Сейчас разберём как устроено» (chat).
#
# СОФА-БЛОК (теория + 12 квизов в двух волнах + правило):
# s08      — Теория: возражение + структура (drama narrative, author_text).
# Волна 1 — бинар нападка / возражение (6 квизов):
# s09      — «Только глупые так думают!» → нападка (ярлык).
# s10      — «Я не согласен — данные за прошлый год.» → возражение (факт).
# s11      — «Ты совсем не разбираешься в жизни города!» → нападка (компетентность).
# s12      — «Я понимаю твою позицию. Но факты говорят иначе.» → возражение (уважение + факт).
# s13      — «Ты неправ, потому что ты ничего не видел!» → нападка (фальшивое «потому что»).
# s14      — «Я понимаю, что ты веришь Рею. Но не согласен — нет фактов.» → возражение (4 шага).
# s14_marker — Софа: «Это разминка. Теперь — внутрь возражения.»
# Волна 2 — узнавание шагов и целостность (6 квизов):
# s14a     — ШАГ 1 (повтор) — какой вариант зеркало?
# s14b     — ШАГ 2 (уважение) — какой не уступка и не уход?
# s14c     — ШАГ 3 (мнение) — какой прямое, не оценка?
# s14d     — ШАГ 4 (причина) — какой факт, не эмоция?
# s14e     — Какие шаги отсутствуют в «Я понимаю. Я не согласен.»?
# s14f     — Что не так в «Я понимаю, что X. Но это полная глупость!»?
# s15_sofa — Правило 41 (chat).
#
# ИСПЫТАНИЕ — ОТКРЫТЫЙ ВОПРОС + 8 БЛИЦЕВ + 3 КОНСТРУКТОРА:
# s16  — Open vote: «Цели разные — инструменты одинаковые. Допустимо?» (нет правильного).
# s17  — Quiz: «Только дураки верят Голосу!» — нападка.
# s18  — Quiz: «Я понимаю, ты веришь...» — возражение.
# s19  — Quiz: «Своих мозгов нет!» — нападка.
# s20  — Quiz: «Порядок через страх — клетка» — возражение.
# s21  — Quiz: Марко крикнул «КАЖДЫЙ потерял!» — манипуляция.
# s21a — Quiz: Сем «ты сделал то же, что Рей» — возражение (наблюдение).
# s21b — Quiz: «Я не согласен.» — голое мнение vs полное возражение.
# s21c — Quiz: какая реплика на «трус убегает» правильно собрана по 4 шагам.
# s22  — Софа подводка к конструкторам (chat).
# s23  — Constructor 4-step: «не понимаешь жизнь города».
# s24  — Constructor 2-step: «трус убегает от Голоса».
# s25  — Constructor 2-step: «кто слушает детей — сам ребёнок».
#
# КЛИФФХЭНГЕР:
# s26     — Сем «Можно по-другому?» Рей в углу: «Голос когда-то говорил без крика» (drama).
# s27_end — Софа: «Рей сказал важное.» Число 18. (drama cliffhanger).
# =====================================================================

