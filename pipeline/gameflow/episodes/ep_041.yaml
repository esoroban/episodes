            correct: true
            fb: "Намёк подвешен — без конкретики, но с весом «фактов»."
          - text: "У меня нет информации, чтобы судить — поэтому я воздержусь от выводов."
            correct: false
            fb: "Это честное признание, что ты НЕ ЗНАЕШЬ. Демагогия так не делает."
      - id: shift
        label: "ШАГ 3 · ПЕРЕЛОЖИ ВЫВОД"
        hint: "Закрой через «каждый сам» — пусть слушатели додумают вывод."
        options:
          - text: "Готов разобрать конкретные эпизоды — приводите их, и мы их обсудим вместе."
            correct: false
            fb: "Это приглашение к разбору. Сейчас вывод нужно ПЕРЕЛОЖИТЬ, не разбирать."
          - text: "Я бы воздержался от ярлыков — это не то, что нам сейчас нужно делать."
