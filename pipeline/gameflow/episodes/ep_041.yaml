      забытых. Если у тебя нет другого инструмента — отказаться от
      единственного значит проиграть.

      Возвращается. Готов выйти на сцену. Толпа снова в зале — Рей
      ещё говорит: ровно, как заведённая пластинка, словно не
      замечал, что зал на секунду пустел.
