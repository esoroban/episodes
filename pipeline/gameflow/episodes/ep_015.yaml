      Стены без зеркал — просто серый бетон, бетон, бетон.

      И вдруг — бумага. Два листа. Приклеены скотчем прямо к стене.
      Пожелтевшие по краям, как будто провисели здесь не день и не два.

      Марко подходит ближе. Почерк — знакомый. Острые буквы. Крючок
      на «й». Кружок вместо точки над «ё».

      София.
