  - scene_id: ep036_s06
    episode_id: 36
    source_ref: day_09.ep36.sofa_block
    scene_type: narrative
    location: "Зеркальный Город, тоннель у ядра"
    time: "утро"
    characters_present: [Марко]
    author_text: >
      София — авторитет для Марко. Но является ли запись доказательством?
      Проверяем по двум условиям.

      УСЛОВИЕ ПЕРВОЕ. Компетентна ли София в вопросе «кому доверять»?
      Она знала Лину лично. Давала задания. Проверяла отчёты. Да —
      компетентна.

      УСЛОВИЕ ВТОРОЕ. Есть ли подтверждение? Записка с почерком
      Софии плюс её голос — двойное доказательство. Число 30 —
      Лина помнит людей, значит, не стёрта Голосом. Блокнот —
      оригиналы шли Софии.

      Оба условия выполнены. Ссылка на авторитет Софии — уместная.

      Два признака ЛОВУШКИ: говорит не о своей области + вообще
      не эксперт. Здесь ни одного.

      Главное правило: даже уместный авторитет не отменяет проверку.
      «Доверяй, но проверяй» — это не противоречие. Это инструмент.
