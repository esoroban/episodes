          - {id: yellow, text: "Жёлтый", correct: false}
          - {id: green, text: "Зелёный — закономерность", correct: true}
        correct_logic: "Пять раз одинаково — зелёный! Закономерность."
        feedback_success: "Зелёный! Пять раз — стабильный результат. Закономерность."
        feedback_soft_fail: "Пять раз одно и то же. Какой цвет для пяти и больше?"
      - interaction_type: vote
        question: "Марко дважды увидел лишний палец у Леона через Зеркало. Какой цвет?"
        options:
          - {id: red, text: "Красный", correct: false}
          - {id: yellow, text: "Жёлтый — интересно, но проверяй", correct: true}
          - {id: green, text: "Зелёный", correct: false}
        correct_logic: "Два раза — жёлтый! Интересно, но проверяй дальше."
        feedback_success: "Жёлтый! Два раза — интересно, но рано делать вывод."
        feedback_soft_fail: "Два раза — какой цвет? Вспомни: два-три = жёлтый."
      - interaction_type: vote
        question: "Марко поднял Зеркало — и один раз увидел, что отражение Леона не двигается. Совпадение или закономерность?"
        options:
          - {id: pattern, text: "Закономерность", correct: false}
          - {id: coincidence, text: "Совпадение — один раз, красный", correct: true}
        correct_logic: "Один раз — красный! Совпадение."
        feedback_success: "Один раз — красный. Совпадение."
        feedback_soft_fail: "Один раз. Какой цвет светофора?"
      - interaction_type: vote
        question: "Отражение Леона в Зеркале снова не машет, когда машет сам Леон. Пять раз из пяти. Совпадение или закономерность?"
        options:
          - {id: pattern, text: "Закономерность — стабильный результат", correct: true}
          - {id: coincidence, text: "Совпадение", correct: false}
        correct_logic: "Стабильный результат! Пять из пяти — закономерность."
        feedback_success: "Стабильный результат! Пять из пяти. Закономерность."
        feedback_soft_fail: "Пять раз одно и то же. Что это?"
      - interaction_type: vote
