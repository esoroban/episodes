          - {id: yellow, text: "Жёлтый — проверяй дальше", correct: true}
          - {id: green, text: "Зелёный", correct: false}
        correct_logic: "Три раза — жёлтый! Проверяй дальше."
        feedback_success: "Жёлтый! Три раза — проверяй дальше."
        feedback_soft_fail: "Три раза. Какой цвет для двух-трёх?"
    mood: "практика светофора"
    next_default: ep006_s05
    visual_brief:
      background: "Подвал библиотеки, экран телефона"
