  # ── СЦЕНА 10: Клиффхэнгер — тень не машет, надпись Софии, число 47 ──
  - scene_id: ep006_s10
    episode_id: 6
    source_ref: day_02.ep6.cliffhanger
    scene_type: cliffhanger
    location: "Подвал библиотеки, лестница наверх, улица"
    time: "вне времени"
    characters_present: [Марко, Леон]
    author_text: >
      На верхней ступеньке Марко всё-таки оглядывается. Леон стоит у стола.
      Машет рукой. Улыбается.

      Его ТЕНЬ НЕ МАШЕТ. Тень указывает на стену. Там — новая надпись, тем
      же почерком Софии:
      «Леон лжёт. Но не по своей воле. Посчитай его пальцы СНОВА — через неделю.»

      Через неделю? Что изменится через неделю?
    dialogue:
      - who: Софа
        line: "Число... на стене... обнаружено. Марко, посмотри направо."
      - who: автор
        line: >
          Марко поворачивает голову. На стене дома, в тени карниза, мелом — число:
      - who: автор
        line: "47"
      - who: Софа
        line: "Сорок семь... запомни. Это... важно."
    mood: "предупреждение и загадка"
    next_default: ep007_s01
    visual_brief:
      background: "Лестница из подвала, Леон внизу, стена с числом 47"
      camera: wide
      characters:
        - who: Марко
          expression: шок, тревога
          pose: стоит на ступенях, оглядывается
          position: left
        - who: Леон
          expression: улыбка, машет рукой
          pose: стоит внизу у стола
          position: right
      props: [надпись Софии на стене, тень указывает, число 47 мелом]
      focus_object: "число 47 на стене дома"
      atmosphere: "два предупреждения Софии — и число, которое ещё не понятно"
      ui_mode: reading
