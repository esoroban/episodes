  # ── СЦЕНА 1: Возвращение к Леону, 11 пальцев ────────────────────────
  - scene_id: ep006_s01
    episode_id: 6
    source_ref: day_02.ep6.drama
    scene_type: narrative
    location: "Подвал библиотеки, Зеркальный Город"
    time: "вне времени"
    characters_present: [Марко, Лина, Леон]
    author_text: >
      Марко не может перестать думать о надписи на стене. «Леон лжёт. Посчитай
      его пальцы.» Почерк Софии. Значит, София была в этом подвале. Значит,
      она знала Леона. Значит... что?

      Марко возвращается в подвал. Утро — если в Зеркальном Городе бывает утро.
      Небо всё то же фиолетовое.

      Леон на месте. Чай. Улыбка. Свитер. Как будто никуда не уходил.
    dialogue:
      - who: Леон
        line: "Вернулся! Отлично. Чай?"
      - who: автор
        line: >
          Марко садится напротив. Берёт чашку. На этот раз — не пьёт. Ставит
          рядом. Смотрит на руки Леона. Десять пальцев. Обычные. Считает —
          десять. София написала «посчитай» — но пальцев десять. Что она
          имела в виду?
    author_text_after: >
      Марко поднимает Зеркало Повторений. Смотрит на Леона сквозь стекло.
      Сквозь Зеркало Леон выглядит иначе. Лицо — то же, но глаза — тусклые.
      И руки — руки странные. Пальцев не десять. Пальцев одиннадцать. Шестой
      палец на левой руке — маленький, как мизинец, прижат к ладони. Без
      Зеркала — не видно. С Зеркалом — очевидно.

      Марко быстро опускает Зеркало. Леон улыбается. Не заметил. Или
      заметил, но не подал виду.
    mood: "разведка"
    next_default: ep006_s02
    visual_brief:
      background: "Подвал библиотеки, Леон за столом, чай, книги"
      camera: medium
      characters:
        - who: Марко
          expression: напряжённое внимание, считает пальцы
          pose: сидит напротив, не пьёт чай
          position: left
        - who: Леон
          expression: тёплая улыбка, как всегда
          pose: сидит за столом
          position: right
      props: [Зеркало Повторений в руке Марко, чашка нетронутого чая]
      focus_object: "руки Леона — десять пальцев... или одиннадцать?"
      atmosphere: "внешне уютно — но Марко уже не верит на слово"
      ui_mode: reading

