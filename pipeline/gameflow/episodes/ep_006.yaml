        line: "Марко останавливается."
      - who: Марко
        line: >
          Профессор... вы говорили другим, что путь безопасен. Тем, кто
          приходил до меня. Все вернулись?
      - who: автор
        line: >
          Леон моргает. Улыбка гаснет — на одну секунду. Потом возвращается.
      - who: Леон
        line: "Конечно. Конечно, все."
      - who: автор
        line: >
          Марко смотрит на тень Леона. Тень качает головой. Медленно.
          Из стороны в сторону. Нет.
      - who: автор
        line: >
          Марко разворачивается. Идёт к лестнице. Не бежит — идёт. Спокойно.
      - who: Леон
        line: "Мальчик! Куда ты?"
      - who: автор
        line: >
          Голос уже не мягкий. Марко не оглядывается.
