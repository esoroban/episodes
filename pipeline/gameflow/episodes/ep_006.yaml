          Может, совпадение. Жёлтый — два-три раза. Интересно, но проверяй
          дальше. Зелёный — пять и больше одинаковых результатов. Похоже
          на закономерность.
      - who: Софа
        line: "Леон с одиннадцатью пальцами — ты видел три раза. Это жёлтый. Проверяй дальше."
    mood: "новый инструмент"
    next_default: ep006_s04
