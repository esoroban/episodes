        - круглые часы со стрелкой на 12 (сейчас) под цифрой 2
        - знак «?» в круге под цифрой 3
      focus_object: "три кружка 1-2-3 с пиктограммами под каждым"
      atmosphere: "формула собралась — без слов, только цифры и символы"
      ui_mode: reading

