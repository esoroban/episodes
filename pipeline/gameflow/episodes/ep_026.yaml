  - scene_id: ep026_s01
    episode_id: 26
    source_ref: day_07.ep26.drama
    scene_type: narrative
    location: "Зеркальный Город, подвал подполья"
    time: "после полудня"
    characters_present: [Марко, Сем]
    author_text: >
      Число на стене: 26. Марко не прикасался к артефактам. Не открывал
      порталы. Не трогал зеркала. А число упало.

      Стирание ускоряется. Без причины. Без контакта.

      Марко рисует на стене подполья. Уголь. Схема. Цепочка.

      Вера → школьный журнал → данные о Софии → Голос → стирание.

      Каждое звено — проверяемо. Вера имеет доступ к журналу. Журнал
      содержит данные. Голос использует данные для стирания.

      Кроме одного звена: ЗАЧЕМ Вере помогать Голосу?
    mood: "цепочка построена — но одно звено пустое"
    next_default: ep026_s02
    visual_brief:
      background: "Подвал подполья. На стене углём — пять пиктограмм, соединённых стрелками-углём. Слева направо: 1) силуэт фигуры с указкой, 2) раскрытая тетрадь с волнистыми линиями (без читаемого текста), 3) стопка карточек с волнистыми линиями, 4) конус громкоговорителя, 5) силуэт человека пунктиром. Между 4 и 5 — стрелка с большим знаком «?»"
