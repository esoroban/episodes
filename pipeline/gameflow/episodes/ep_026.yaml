      На четвёртой ступеньке — останавливается.

      Спросит — что? «Вы предатель?» Вера — взрослый человек с
      работой, кабинетом и званием. Она ответит: «Что-что?» — и
      Марко выйдет с пустыми руками.

      Без формулы — без шансов. Так же, как в день, когда Макс
      ушёл с агентами.

      Марко спускается обратно. Берёт уголь. Возвращается к стене.
    mood: "старый порыв замечен и пойман"
    merge_to: ep026_s03
    next_default: ep026_s03
    visual_brief:
