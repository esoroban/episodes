        - стрелка со знаком «?» на последнем звене
        - тусклая лампа сверху
      focus_object: "знак «?» в звене между громкоговорителем и пунктирным силуэтом"
      atmosphere: "детектив без последнего ключа — без слов, только символы"
      ui_mode: reading

  # ── СЦЕНА 2: Звено «зачем Вере помогать?» ────────────────────────────
