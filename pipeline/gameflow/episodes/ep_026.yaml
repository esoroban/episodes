      Число на стене: 26. Марко не прикасался к артефактам. Не открывал
      порталы. Не трогал зеркала. А число упало.

      Стирание ускоряется. Без причины. Без контакта.

      Марко рисует на стене подполья. Уголь. Схема. Цепочка.

      Вера → школьный журнал → данные о Софии → Голос → стирание.

      Каждое звено — проверяемо. Вера имеет доступ к журналу. Журнал
      содержит данные. Голос использует данные для стирания.

      Кроме одного звена: ЗАЧЕМ Вере помогать Голосу?
    mood: "цепочка построена — но одно звено пустое"
    next_default: ep026_s02
