        line: "Не могу просто спросить «Ты предатель?» — она уйдёт от ответа. Как Голос. Как мама. Как все."
    author_text_after: >
      Марко смотрит на пустое звено. Хочется крикнуть: «Ты предатель!»
      Но после Макса — он знает, что бывает с криком. Крик не вернул
      Макса. Крик не остановил стирание.

      Нужен инструмент. Точный. Спокойный.
    mood: "крик уже не работает — нужен другой инструмент"
    interaction_type: choice
    question: "Что делает Марко?"
    options:
