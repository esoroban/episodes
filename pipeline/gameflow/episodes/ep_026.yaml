  # ── СЦЕНА 4: Теория — корректное напоминание (три шага) ──────────────
  - scene_id: ep026_s04
    episode_id: 26
    source_ref: day_07.ep26.sofa_block
    scene_type: narrative
    location: "Зеркальный Город, подвал подполья"
    time: "после полудня"
    characters_present: [Марко]
    author_text: >
      КОРРЕКТНОЕ НАПОМИНАНИЕ. Формула из трёх шагов.

      Первый шаг — РАНЬШЕ: «Раньше ты говорил, что…»

      Второй шаг — СЕЙЧАС: «Сейчас ты говоришь, что…»

      Третий шаг — ВОПРОС: «Ты передумал — или имеешь в виду что-то
      другое?»

      Принцип: не нападать — уточнять. Не обвинять — просить объяснить.
      Сильный человек не кричит «Ты врёшь!» — он спокойно спрашивает.

      Иногда противоречие — из-за неточных слов, не из-за вранья.
      Уточняющий вопрос — суперход: и правда станет яснее, и отношения
      не пострадают.
    mood: "скальпель вместо топора"
    next_default: ep026_s05
