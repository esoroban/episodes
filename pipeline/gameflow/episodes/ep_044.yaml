  # ── СЦЕНА 9: Теория — универсальный ответ ───────────────────────
  - scene_id: ep044_s10
    episode_id: 44
    source_ref: day_11.ep44.sofa_block
    scene_type: narrative
    location: "Зеркальный город, переулок за площадью"
    time: "глубокая ночь"
    characters_present: [Марко]
    author_text: >
      УНИВЕРСАЛЬНЫЙ ОТВЕТ — четыре слова. Одна формула. Работает
      против любого приёма.

      «Это демагогия. Где факты?»

      Почему это работает? Демагог ожидает эмоций. Страха. Злости.
      Согласия. Спора. Любая эмоция — топливо для следующего
      приёма. Но «где факты?» — не эмоция. Это требование
      доказательств. Демагог к этому не готов, потому что фактов
      нет — иначе он привёл бы их сразу.

      ФОРМУЛА ИЗ ДВУХ ШАГОВ:

      ШАГ 1 — Назови приём. Одно слово: «Это демагогия».

      ШАГ 2 — Спроси: где факты?

      Не нужно угадывать конкретный тип — обобщение, нападка,
      дилемма, цепочка. Достаточно одного диагноза: демагогия. И
      одного вопроса: где факты?

      Молчание после такого ответа — твой союзник. Если демагог
      пытается «но...», «однако...», «зато...» — повторяй: «Где
      факты?» Без эмоций. Без оправданий. Один вопрос.
    mood: "карта инструмента — два шага"
