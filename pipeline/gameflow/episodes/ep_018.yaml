      ui_mode: reading

  # ── СЦЕНА 3: Одна ветка наружу — выбор Марко ─────────────────────────
  - scene_id: ep018_s03
    episode_id: 18
    source_ref: day_05.ep18.drama
    scene_type: narrative
    location: "Зеркальный Город, подвал подполья — стена со схемой"
    time: "вне времени"
    characters_present: [Марко]
    author_text: >
      Кроме одного.

      Одна ветка идёт не ВНУТРЬ Города. Она идёт НАРУЖУ. В реальный мир.
      Кто-то снаружи передаёт информацию. Школьный журнал — оценки,
      расписание, имена. Информация, которую Голос не мог бы получить
      сам.

      Марко обводит эту ветку углём. Жирно. Дважды.
    mood: "трещина в карте — луч наружу"
    interaction_type: choice
    question: "Марко чувствует — нужно что-то делать. Что?"
    options:
