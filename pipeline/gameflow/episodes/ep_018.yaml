  # ── СЦЕНА 24: КЛИФФХЭНГЕР — Число 34. Стирание без артефактов ────────
  - scene_id: ep018_s24_end
    episode_id: 18
    source_ref: day_05.ep18.cliffhanger
    scene_type: cliffhanger
    location: "Зеркальный Город, подвал подполья — стена со схемой"
    time: "вне времени"
    characters_present: [Марко, Софа]
    author_text: >
      Число на стене: 34.

      Но Марко не использовал артефакты. Не прикасался к зеркалам. Не
      открывал порталы. А число упало.

      Стирание продолжается без его участия. Кто-то другой стирает. Или
      что-то другое.
    dialogue:
      - who: Софа
        line: "Стирание ускоряется. Раньше — по одному за эпизод. Теперь — быстрее."
      - who: Софа
        line: "Ты должен быть быстрее."
    author_text_after: >
      Марко стоит перед деревом на стене. Все ветки ведут к Голосу.
      Кроме одной. И эта одна ведёт к Вере.

      К учительнице, которая обнимала и расспрашивала. К женщине, которая
      знала слишком много. К человеку, которому Марко доверял.

      Доверие — первая ножка табуретки. И она только что треснула.
    mood: "имя на стене + число на стене + трещина в доверии"
    next_default: ep019_s01
    visual_brief:
      background: "Стена с деревом, крупно число «34» над именем «ВЕРА»"
      camera: wide
