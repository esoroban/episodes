      динамик, зеркало. Всё ведёт к Голосу. Каждая нитка, каждая команда,
      каждое стирание.

      Марко рисует. Ветка — агент на Рекламной улице. Ветка — Рей на
      площади. Ветка — зеркала-порталы. Ветка — числа на запястьях.

