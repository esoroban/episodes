    scene_type: narrative
    location: "Зеркальный Город, заброшенный коридор у Системы"
    time: "утро"
    characters_present: [Марко, Сем]
    author_text: >
      Марко не спал. Глаза — сухие, горячие. Число на стене: 24.
      Не изменилось. Мама помнит.

      Сем сидит рядом. Не говорит. Просто сидит. Иногда поправляет
      рюкзак. Иногда смотрит на Марко и отводит взгляд.

      Тишина — плотная, как стена.
    mood: "утро после ухода мамы — тишина, в которой ждут карту"
    next_default: ep033_s02
    visual_brief:
      background: "Заброшенный коридор у Системы. Зеркальные стены, потёртые от времени. Число «24» углём на стене"
