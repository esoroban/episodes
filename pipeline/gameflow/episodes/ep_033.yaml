      characters:
        - who: Марко
          expression: тёмные круги под глазами, сухой взгляд
          pose: сидит у стены, телефон в руке
          position: right
        - who: Сем
          expression: серьёзная поддержка, тихая
          pose: сидит рядом, обхватив колени
