    time: "воспоминание"
    characters_present: [Марко]
    author_text: >
      Первый класс. Урок рисования. У каждого на столе — лист с лесом.
      Маша и Микола сидят напротив друг друга.

      Маша глянула на рисунок Миколы. Громко, на весь класс:

      «МОЙ ЛУЧШЕ!»

      Микола обиделся: «Нет, МОЙ!» Голос всё громче.

      «У тебя деревья кривые!»

      «А у тебя небо ЗЕЛЁНОЕ!»

      Оба покраснели. Руки в кулаки. Никто не слушает. Каждый хочет
      только одного — чтобы другой сдался.

      Марко сидел за соседним столом и смотрел. Тогда он думал: «Глупо.
      Оба рисунки — нормальные. Чего они орут?» Сейчас — понимает
      иначе.
    mood: "детское воспоминание"
    next_default: ep009_s12
