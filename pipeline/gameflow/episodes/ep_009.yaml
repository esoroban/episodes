  # ── СЦЕНА 26: Клиффхэнгер — серая нитка (три!), число 41 ──────────────
  - scene_id: ep009_s26
    episode_id: 9
    source_ref: day_03.ep9.cliffhanger
    scene_type: narrative
    location: "Зеркальный Город, улица"
    time: "утро, третий день"
    characters_present: [Марко, Лина]
    author_text: >
      Лина встаёт. Отряхивает колени. Протягивает руку — помочь встать.

      Марко берёт её руку. Поднимается. И в эту секунду — видит снова.
      На запястье, под рукавом, который задрался на мгновение.

      Серая нитка. Та же, что вчера. Только теперь — не одна.

      Три серых нитки. Вчера была одна. Сегодня — три.

      Марко отпускает руку. Лина одёргивает рукав. Быстро.
      Слишком быстро.

      Она заметила, что он заметил. И оба сделали вид, что нет.

      Число на стене: 41.

      Минус один. Пока они разговаривали. Без артефактов. Без Зеркала.
      Просто — минус один.
    mood: "точка невозврата — нитки множатся, число падает"
    next_default: ep009_s26_sofa
    visual_brief:
      background: "Зеркальный Город, улица, стена с числом 41"
      camera: close-up
      characters:
        - who: Марко
          expression: шок, замер
          pose: отпускает руку Лины, смотрит на запястье
          position: left
        - who: Лина
          expression: напряжение, одёргивает рукав
          pose: быстрое движение — скрыть запястье
          position: right
      props: [три серых нитки на запястье Лины, число 41 на стене]
      focus_object: "три серых нитки — вчера была одна, сегодня три"
      atmosphere: "оба заметили. Оба молчат. Число упало."
      ui_mode: reading

