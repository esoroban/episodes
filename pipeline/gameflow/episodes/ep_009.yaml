  - scene_id: ep009_s01
    episode_id: 9
    source_ref: day_03.ep9.drama
    scene_type: narrative
    location: "Зеркальный Город, улица у дома Леона"
    time: "утро, третий день"
    characters_present: [Марко, Лина]
    author_text: >
      Утро. Третий день.

      Марко сидит на полу у стены с числом. 43. Не изменилось. Пока.

      Лина стоит у двери. Руки скрещены. Молчит. Но молчит не так,
      как вчера, — не виновато. Сегодня она молчит, как человек,
      который ждёт, пока другой скажет глупость.
    mood: "напряжение перед ссорой"
    next_default: ep009_s02
    visual_brief:
      background: "Зеркальный Город, улица у дома Леона, стена с числом 43, утренний фиолетовый свет"
      camera: medium
      characters:
        - who: Марко
          expression: тревога, вина
          pose: сидит на полу у стены
          position: left
        - who: Лина
          expression: напряжение, скрещённые руки
          pose: стоит у двери, ждёт
          position: right
      props: [число 43 на стене, дом Леона за спиной]
      focus_object: "число 43 на стене — пока не изменилось"
      atmosphere: "утренняя тишина, заряженная конфликтом"
      ui_mode: reading

  # ── СЦЕНА 2: Ссора — «слепые лучше, чем убийцы» (CHOICE) ────────────
  - scene_id: ep009_s02
    episode_id: 9
    source_ref: day_03.ep9.drama
    scene_type: dialogue
    location: "Зеркальный Город, улица у дома Леона"
    time: "утро, третий день"
    characters_present: [Марко, Лина]
    dialogue:
      - who: Лина
        line: "Нам нужно использовать артефакты."
      - who: Марко
        line: "Нет."
      - who: Лина
        line: >
          Марко, число падает САМО. Без нас. Кто-то стирает память о Софии.
          Каждый час — минус один человек. Если мы ничего не делаем...
      - who: Марко
        line: >
          Артефакты тоже стирают! Зеркало — минус один за каждое
          использование. Мы проверили. Причина и следствие.
      - who: Лина
        line: "Да, одного человека. А пока мы сидим без Зеркала — теряем больше. Без артефактов мы слепые!"
      - who: Марко
        line: "Слепые лучше, чем убийцы."
    author_text_after: >
      Лина дёргается. Как от пощёчины.

      «Ты назвал меня убийцей?» — «Я не тебя. Я про артефакты.» — «Ты сказал
      "мы убийцы". Я — часть "мы".»

      Марко чувствует, как пол уходит. Он не хотел так сказать. Или хотел?
      Он не уверен. Лина говорит уверенно — и Марко привык соглашаться
      с уверенными. Но вчера он решил быть внимательнее. Вчера он увидел
      серую нитку на её запястье и промолчал.

      «Я не это имел в виду», — говорит Марко. «Тогда что ты имел в виду?» —
      Лина делает шаг. — «Что я плохая, потому что хочу найти Софию?» —
      «Я тоже хочу найти Софию!» — «Тогда ДАЙ МНЕ ИНСТРУМЕНТЫ!»

      Голос Лины — громкий. Звенящий. Эхо отскакивает от стен.

      Марко открывает рот. Хочет крикнуть в ответ. Хочет сказать:
      «Ты ничего не понимаешь!» Или: «Ты сама во всём виновата!»
      Или что угодно, лишь бы последнее слово осталось за ним.

      В груди — жар. Как будто кто-то зажёг спичку между рёбрами.
      Марко знает это чувство. Это не злость на Лину. Это злость на себя —
      потому что он не может найти правильные слова.
    interaction_type: choice
    question: "Что делает Марко?"
    options:
      - id: shout
        text: "Крикнуть громче"
        next: ep009_s03
      - id: explain
        text: "Попытаться объяснить"
        next: ep009_s02d1
    mood: "взрыв — ссора на полную"
    next_default: ep009_s03
    visual_brief:
      background: "Зеркальный Город, улица, эхо крика между стенами"
      camera: close-up
      characters:
        - who: Марко
          expression: злость, горло горит
          pose: кричит, кулаки сжаты
          position: left
        - who: Лина
          expression: ярость, дёргается как от пощёчины
          pose: делает шаг вперёд, кричит
          position: right
      props: [число 43 на стене, эхо между стенами]
      focus_object: "два лица — зеркальный крик"
      atmosphere: "одинаковые слова летят в обе стороны — никто не слышит"
      ui_mode: choice

