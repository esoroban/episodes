# LESSON BRIEF — lesson_10B
# Сгенерирован из lessons_ru/lesson_10B.yaml

lesson_id: lesson_10B
title: "Хитрые вопросы"

terms_introduced:
  - term: "составной вопрос"
    definition: "когда в одном вопросе склеены несколько вопросов (несколько тем, обвинений); нужно разделить и отвечать по порядку"
  - term: "вопрос-ловушка"
    definition: "вопрос со скрытым предположением внутри; любой ответ «да» или «нет» подтверждает то, чего не было"
  - term: "риторический вопрос (вопрос-утверждение)"
    definition: "вопрос, который на самом деле не вопрос, а утверждение (мнение) в маскировке; человек не хочет ответа — хочет, чтобы вы согласились"

blocks:

  - id: "10B.1"
    title: "Составной вопрос — много тем в одном"
    scenes: [sc1, sc2]
    terms_introduced: ["составной вопрос"]
    terms_used: []
    votes: 11
    summary: >
      Зацепка: история Дмитрика, которому за один день задали пять вопросов,
      на которые он не смог ответить — не потому что не знал, а потому что
      вопросы были построены как ловушки. Друг Сашко объясняет: проблема не в
      Дмитрике, а в вопросах. Вводится первый тип хитрых вопросов — составной
      вопрос: когда в одном вопросе склеены несколько тем/обвинений. Правило:
      один вопрос — одна тема. Если склеили — разделяй и отвечай по порядку.
      Практика: определить, простой вопрос или составной (9 голосований в sc2).
    key_material:
      - "История Дмитрика: 5 хитрых вопросов за день (брат про наушники, Микола про списывание, учитель про домашку, бабушка про телефон)"
      - "Правило: один вопрос — одна тема; составной вопрос нужно разделить"
      - "Фраза: «Давайте по порядку. Отвечу на каждый вопрос отдельно.»"
      - "Пример: «Почему ты не сделал домашку, опоздал и забыл тетрадь?» — три вопроса склеены в один"
    practice_summary: >
      sc1: 2 vote — сколько вопросов спрятано в вопросе Тараса (три) +
      какое скрытое предположение в вопросе Миколы (ты раньше списывал).
      sc2: 9 vote — определить, простой вопрос или составной
      (любимый цвет, тренировка, мороженое, где был вчера, поделка, обедал,
      день рождения, музыка, карандаш).

  - id: "10B.2"
    title: "Вопрос-ловушка — скрытое предположение"
    scenes: [sc3]
    terms_introduced: ["вопрос-ловушка"]
    terms_used: ["составной вопрос"]
    votes: 8
    summary: >
      Вводится второй тип хитрых вопросов — вопрос-ловушка. Это когда внутри
      вопроса спрятано утверждение, с которым вы автоматически соглашаетесь,
      отвечая «да» или «нет». Аналогия: мышеловка, где приманка — сам вопрос,
      а капкан — скрытое предположение. Слова-маркеры: «Ты уже перестал...?»,
      «Почему ты всегда...?», «Когда ты наконец...?». Техника из трёх шагов:
      найди скрытое предположение, скажи что оно неверно, потом отвечай.
      Практика: определить, честный вопрос или ловушка (8 голосований).
    key_material:
      - "Определение: вопрос, внутри которого спрятано утверждение; любой ответ подтверждает ложное предположение"
      - "Аналогия с мышеловкой: приманка — вопрос, капкан — скрытое предположение"
      - "Слова-маркеры: «ты уже перестал...», «почему ты всегда...», «когда ты наконец...», «признай, что ты...»"
      - "Техника трёх шагов: найди предположение → скажи, что неверно → отвечай"
      - "Волшебные фразы: «Твой вопрос предполагает, что... Но это не так!»"
    practice_summary: >
      sc3: 8 vote — честный вопрос или ловушка (врал родителям, книга,
      забываешь обещания, пойти гулять, признай что неправ, рассказал секрет,
      как прошёл день, не нравится класс).

  - id: "10B.3"
    title: "Риторический вопрос и обзор всех типов"
    scenes: [sc4, sc5, sc6, sc7, sc8]
    terms_introduced: ["риторический вопрос (вопрос-утверждение)"]
    terms_used: ["составной вопрос", "вопрос-ловушка", "факт", "мнение", "неправда", "ложная дилемма"]
    votes: 18
    summary: >
      Вводится третий тип — риторический вопрос (вопрос-утверждение): вопрос,
      который на самом деле не вопрос, а мнение в маскировке. Слова-маркеры:
      «Разве не...», «Неужели ты думаешь...», «Кто в здравом уме...».
      Техника ответа: убери обёртку, верни в утверждение, проверь — факт,
      мнение или неправда. Связь с Древней Грецией и риторикой. Практика:
      определить тип (9 голосований в sc4). Творческий блок (sc5): дети сами
      придумывают хитрые вопросы всех трёх типов — лучший способ разоблачить
      трюк. Обзор дня 10 (sc6): смешанный тест на все типы, включая ложные
      дилеммы из 10A (9 голосований). Нюансы (sc7): не всякий составной
      вопрос — манипуляция (мама торопится); риторика — инструмент, может
      вдохновлять; важно намерение, а не форма. Золотое правило: сначала
      предполагай доброе намерение. Закрытие (sc8): итоги дня, задание
      наблюдать хитрые вопросы в жизни.
    key_material:
      - "Определение: вопрос, который на самом деле — утверждение (мнение) в маскировке"
      - "Связь с Древней Грецией: риторика — искусство убеждать словами, приём работает 2500 лет"
      - "Слова-маркеры: «разве не...», «неужели ты думаешь...», «кто в здравом уме...», «как можно не понимать...»"
      - "Техника: убери обёртку → верни в утверждение → проверь: факт, мнение или неправда?"
      - "Пример: «Разве не понятно, что кошки лучше собак?» → «Кошки лучше собак» → мнение"
      - "Нюанс: инструменты нейтральны; важно намерение, а не форма"
      - "Золотое правило: сначала предполагай доброе намерение; критическое мышление — не паранойя, а внимательность"
    practice_summary: >
      sc4: 9 vote — настоящий вопрос или утверждение в маскировке + раскрытие
      утверждения и определение факт/мнение/неправда (честно?, домашка,
      брокколи, овощ, лето, приметы, время на игры, Земля вокруг Солнца).
      sc5: 0 vote — творческие задания (discussion): придумать составной,
      ловушку, риторический вопрос на заданные ситуации.
      sc6: 9 vote — обзорный тест на все типы дня 10 + ложные дилеммы
      из дня 10A (или-или, составной, ловушка, риторический, дилемма —
      вперемешку, включая закон непротиворечия).
      sc7: 0 vote — 6 discussion: нюансы и контраргументы (мама торопится,
      оратор вдохновляет, как не обидеть друга, инструменты для добра,
      случайный хитрый вопрос, как не стать параноиком).
