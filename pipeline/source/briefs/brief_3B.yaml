# LESSON BRIEF — lesson_3B
# Сгенерирован из lessons_ru/lesson_3B.yaml

lesson_id: lesson_3B
title: "Три инструмента разведчика"

terms_introduced:
  - term: "эмпатия (сопереживание)"
    definition: "умение почувствовать то же, что чувствует другой человек; в споре — тормоз, который срабатывает ДО того, как скажешь обидное"
  - term: "активное слушание"
    definition: "слушать так, чтобы человек видел, что ты правда слышишь; ключевой приём — пересказ (повторить своими словами то, что услышал)"
  - term: "формула высказывания"
    definition: "умение говорить про себя, а не нападать на другого; три шага: наблюдение («Я вижу, что…»), чувство («Мне…»), предложение («Давай…»)"

blocks:

  - id: "3B.1"
    title: "Эмпатия — тормоз разведчика"
    scenes: [sc1, sc2]
    terms_introduced: ["эмпатия (сопереживание)"]
    terms_used: ["солдат", "разведчик"]
    votes: 7
    summary: >
      Открытие: напоминание о солдате и разведчике из прошлого урока.
      Юмористический пример — разведчик, который кричит «ГОВОРИ НЕМЕДЛЕННО!»
      (инструменты без уважения не работают). Кратко анонсируются три инструмента.
      Подробно вводится первый — эмпатия (сопереживание): умение заглянуть в
      чужую душу, тормоз, который срабатывает до обидных слов. Примеры: Микола
      и его рисунок («Некрасиво!» vs «Что тут нарисовано?»), спор о мультиках
      (принцессы vs роботы), опоздание на тренировку. Три фразы-помощника:
      «Я понимаю, что тебе…», «Тебе, наверное, обидно, когда…»,
      «Я вижу, что тебе это важно…». Практика: 7 голосований — есть
      сопереживание или нет.
    key_material:
      - "Юмор: разведчик с биноклем, который кричит «ГОВОРИ НЕМЕДЛЕННО!» — инструменты без уважения не работают"
      - "Определение: эмпатия — умение почувствовать то же, что чувствует другой; сопереживание — антенна разведчика"
      - "Метафора: сопереживание — ТОРМОЗ (сначала почувствуй, потом говори)"
      - "История: Микола нарисовал картинку, Дмитрик сказал «Некрасиво!» — без тормоза"
      - "История: спор о мультиках — принцессы vs роботы (солдат обидел, разведчик предложил подбросить монетку)"
      - "История: Микола опоздал на тренировку, Маша сказала «Сам виноват» — правда без сопереживания звучит как удар"
      - "Три фразы-помощника: «Я понимаю, что тебе…», «Тебе, наверное, обидно, когда…», «Я вижу, что тебе это важно…»"
    practice_summary: >
      sc2: 7 vote — есть сопереживание или нет (фразы персонажей в конфликтных ситуациях:
      «Мне всё равно», «Я понимаю, что тебе обидно», «Хватит ныть», «Тебе, наверное,
      было неприятно?», «Ты всегда так говоришь», «Я вижу, что тебе важна эта игра»,
      «Если не согласишься — обижусь»).

  - id: "3B.2"
    title: "Активное слушание — зеркало разведчика"
    scenes: [sc3]
    terms_introduced: ["активное слушание"]
    terms_used: ["эмпатия (сопереживание)"]
    votes: 5
    summary: >
      Вводится второй инструмент — активное слушание. Ключевой приём — пересказ:
      повторить своими словами то, что услышал. Контраст: Маша кивает «Угу, понятно»
      (не видно, что поняла) vs Маша пересказывает «То есть тебя не позвали, и тебе
      обидно?» (Дмитрик сразу видит: она поняла). Три причины пересказа: проверка
      себя (испорченный телефон — «кошка» → «картошка»), управление разговором
      (человек перестаёт повторять и повышать голос), ключ к решению (оба знают,
      о чём разговор). Три фразы-помощника: «Правильно ли я понял, что…»,
      «Ты имеешь в виду, что…», «То есть ты хочешь…». Важно: пересказывать не
      каждую фразу, а когда разговор начинает ломаться. Практика: 5 голосований —
      есть пересказ или нет.
    key_material:
      - "Определение: активное слушание — слушать так, чтобы человек ВИДЕЛ, что ты слышишь"
      - "Ключевой приём: пересказ — повторить своими словами то, что услышал"
      - "Контраст: «Угу, понятно» (кивок) vs «То есть тебя не позвали, и тебе обидно?» (пересказ)"
      - "Три причины пересказа: проверка себя, управление разговором, ключ к решению"
      - "Аналогия: испорченный телефон — «кошка» превращается в «картошку»"
      - "Пример: карандаши без разрешения — «Ладно, не буду» (непонятно что понял) vs «Ты хочешь, чтобы я спрашивал?» (ясность)"
      - "Три фразы-помощника: «Правильно ли я понял, что…», «Ты имеешь в виду, что…», «То есть ты хочешь…»"
      - "Ограничение: не повторять каждую фразу как попугай — инструмент для эмоций и споров"
    practice_summary: >
      sc3: 5 vote — есть пересказ или нет (фразы: «То есть тебе важно, чтобы я
      приходила вовремя?», «Да-да, я понял, давай дальше», «Ты говоришь, что хочешь
      играть вместе?», «Ну ладно, не переживай», «Если я правильно понял, тебе
      обидно, что не позвали?»).

  - id: "3B.3"
    title: "Формула высказывания — карта разведчика"
    scenes: [sc4, sc5, sc6]
    terms_introduced: ["формула высказывания"]
    terms_used: ["эмпатия (сопереживание)", "активное слушание"]
    votes: 24
    summary: >
      Вводится третий инструмент — формула высказывания. Три шага: наблюдение
      («Я вижу, что…» — факт без оценки), чувство («Мне…» — своё переживание,
      не обвинение), предложение («Давай…» — приглашение, не приказ). Контрасты:
      солдат «Ты всегда берёшь мои вещи! Ты жадный!» vs разведчик «Я вижу, что ты
      взял мой карандаш. Мне неприятно. Давай спрашивать друг друга?». Слова-маркеры
      обвинения: «всегда», «никогда», «вечно», «специально», «ты такой-то».
      Практика sc4: описание или обвинение (6 голосований). Смешанная практика sc5:
      определить, какой из трёх инструментов использован (6 голосований). Комбинированный
      пример: Маша и стул Дмитрика — все три инструмента вместе. Закрытие: метафоры
      инструментов (тормоз, зеркало, карта), домашнее задание — дневник разведчика.
      Экстра-практика sc6: в одном высказывании несколько элементов — выбрать ВСЕ
      подходящие (12 голосований vote_multichoice).
    key_material:
      - "Определение: формула высказывания — говорить про себя, а не нападать на другого"
      - "Три шага: наблюдение («Я вижу, что…»), чувство («Мне…»), предложение («Давай…»)"
      - "Контраст: солдат «Ты вечно опаздываешь! Ужасная подруга!» vs разведчик «Я ждал 20 минут. Мне было обидно. Давай напишем, если опаздываем?»"
      - "Контраст: «Выключи свою музыку!» vs «Музыка громкая. Мне сложно сосредоточиться. Давай наушники?»"
      - "Слова-маркеры обвинения: «всегда», «никогда», «вечно», «специально», «ты такой-то»"
      - "Комбинированный пример: Маша и стул — сопереживание → активное слушание → формула (три инструмента вместе)"
      - "Метафоры: сопереживание — тормоз, активное слушание — зеркало, формула высказывания — карта"
      - "Важное уточнение: сопереживание — про ЧУЖИЕ чувства; «мне обидно» — своё чувство, не сопереживание"
      - "Домашнее задание: дневник разведчика — использовать один инструмент в реальном споре"
    practice_summary: >
      sc4: 6 vote — описание или обвинение (шаг «наблюдение» формулы: «Ты никогда
      не слушаешь», «Я заметил, что ты не ответил», «Ты вечно опаздываешь»,
      «Сегодня ты пришёл позже», «Ты специально мешаешь», «Я заметила, что ты
      взял ручку»).
      sc5: 6 vote — какой инструмент использован: сопереживание, активное слушание
      или формула высказывания (смешанные ситуации).
      sc6: 12 vote_multichoice — выбрать ВСЕ подходящие инструменты в одном
      высказывании (комбинации: все три, только один, два из трёх, или ни одного).
