# LESSON BRIEF — lesson_3A
# Сгенерирован из lessons_ru/lesson_3A.yaml

lesson_id: lesson_3A
title: "Как спорить и не ссориться"

terms_introduced:
  - term: "три цели спора"
    definition: "победить (хочешь последнее слово), понять (хочешь разобраться) и обидеть (хочешь сделать больно); полезная цель — только понять"
  - term: "солдат"
    definition: "роль в споре — защитник крепости своего мнения; не слушает, не меняет позицию; может быть прав случайно"
  - term: "разведчик"
    definition: "роль в споре — исследователь с биноклем и улыбкой; слушает, проверяет, готов изменить мнение; прав осознанно"

blocks:

  - id: "3A.1"
    title: "Три цели спора"
    scenes: [sc1, sc2, sc3, sc4]
    terms_introduced: ["три цели спора"]
    terms_used: ["факт", "мнение", "неправда", "причина", "совпадение", "третья причина"]
    votes: 36
    summary: >
      Разминка по предыдущим урокам: 10 голосований на факт/мнение/неправду (sc1)
      и 16 голосований на причину/совпадение/третью причину (sc2).
      Затем история-зацепка: Маша и Микола спорят о рисунках — каждый кричит
      «мой лучше!», пока Оленка не предлагает найти хорошее в чужой работе.
      Ключевой вывод: когда хочешь ПОНЯТЬ — находишь друга, когда хочешь
      ПОБЕДИТЬ — находишь врага. Вводятся три цели спора: победить, понять,
      обидеть. На примере велосипедов показана разница между тремя целями.
      Практика: 8 голосований — определить цель спорящего (победить, понять
      или обидеть).
    key_material:
      - "История: Маша и Микола спорят о рисунках, Оленка мирит — «найди одну хорошую вещь в чужом рисунке»"
      - "Ключевая фраза: «когда хочешь ПОНЯТЬ — находишь друга; когда хочешь ПОБЕДИТЬ — находишь врага»"
      - "Три цели спора: ПОБЕДИТЬ (последнее слово), ПОНЯТЬ (разобраться), ОБИДЕТЬ (нападение на человека)"
      - "Пример велосипедов: «мой быстрее, и точка!» vs «давай измерим!» vs «у тебя некрасивый старый велосипед»"
      - "Закономерность: победить — хотя бы говорит о теме; понять — спрашивает и проверяет; обидеть — нападает на человека"
    practice_summary: >
      sc1: 10 vote — разминка: факт, мнение или неправда (повторение уроков 1A).
      sc2: 16 vote — разминка: причина, совпадение или третья причина (повторение уроков 2A).
      sc3: 2 vote — чего хотели Маша и Микола в начале и в конце спора.
      sc4: 8 vote — определить цель: победить, понять или обидеть (бег, книга, игра и др.).

  - id: "3A.2"
    title: "Солдат и разведчик"
    scenes: [sc5, sc6, sc7]
    terms_introduced: ["солдат", "разведчик"]
    terms_used: ["три цели спора"]
    votes: 21
    summary: >
      Вводятся две роли в споре: СОЛДАТ — защитник крепости своего мнения
      (стоит за стеной, закрылся щитом, кричит «не пущу!»; признать ошибку
      для него — сдать крепость) и РАЗВЕДЧИК — исследователь (идёт в мир
      с биноклем, блокнотом и улыбкой; каждое слово собеседника — информация).
      Ключевая разница: солдат может быть прав СЛУЧАЙНО, разведчик — ОСОЗНАННО.
      Пример: спор о шоколаде и яблоках — солдат давит «очевидно!», разведчик
      разбирается через витамины и состав. Практика: 10 голосований «солдат
      или разведчик» (парные ситуации). Финальная практика: 11 голосований
      на всё сразу — цель (победить/понять/обидеть) + роль (солдат/разведчик).
      Закрытие: три итога урока и домашнее задание «Дневник разведчика».
    key_material:
      - "СОЛДАТ — защитник крепости; его крепость — его мнение; признать ошибку = сдать крепость"
      - "РАЗВЕДЧИК — идёт в мир с биноклем, блокнотом и улыбкой; «А вдруг я узнаю что-то новое?»"
      - "Главная разница: солдат прав СЛУЧАЙНО, разведчик прав ОСОЗНАННО — потому что проверил"
      - "Пример: яблоки vs шоколад — солдат давит «очевидно!», разведчик разбирает состав и приходит к выводу через исследование"
      - "Два контрольных вопроса: «Я хочу победить, понять или обидеть?» и «Я сейчас солдат или разведчик?»"
      - "Домашнее задание: «Дневник разведчика» — хотя бы раз переключиться из солдата в разведчика"
    practice_summary: >
      sc5: 10 vote — солдат или разведчик (парные ситуации: самолёт, снег, планеты, железо vs вата, ошибка в задаче).
      sc6: 11 vote — финальная практика: цель + роль (плавание vs бег, карандаш, лев vs тигр, мультик, собаки vs кошки, город vs село).
