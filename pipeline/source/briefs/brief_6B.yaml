# LESSON BRIEF — lesson_6B
# Сгенерирован из lessons_ru/lesson_6B.yaml

lesson_id: lesson_6B
title: "Ловушки слов"

terms_introduced:
  - term: "обобщение (ловушка слов)"
    definition: "слова «все», «никто», «всегда», «никогда» — красные флаги; почти всегда преувеличение; одного исключения достаточно, чтобы обобщение рассыпалось"
  - term: "подмена понятий"
    definition: "когда в одном разговоре слово тихо меняет смысл, но никто этого не замечает; нарушение закона тождества"
  - term: "закон тождества"
    definition: "одно слово должно сохранять один смысл на протяжении всего разговора"
  - term: "контр-ход"
    definition: "спокойный уточняющий вопрос вместо нападения или оправдания; формула: уточнить слово, попросить пример, отделить эмоцию от факта"

blocks:

  - id: "6B.1"
    title: "Обобщение — ловушка слов"
    scenes: [sc1, sc2, sc3, sc4, sc5]
    terms_introduced: ["обобщение (ловушка слов)"]
    terms_used: ["поворотники (из 6А)", "возврат к вопросу (из 6А)"]
    votes: 22
    summary: >
      Повторение 6А: дети определяют виды поворотников (смена темы, смена тональности,
      ответ на другой вопрос) на примерах с котом и бабушкой, тренируют вежливый возврат
      к вопросу. Затем вводится новое понятие — ловушки слов: четыре опасных слова
      («все», «никто», «всегда», «никогда») как красные флаги. История Артёма: «ВСЕ
      в классе имеют новый телефон» оказывается двумя из тридцати. История о брокколи:
      Дмитрик говорит «никто не любит», но Маша и Оленка опровергают — и он отступает
      от «никто» к «почти никто» к «большинство». Вывод: одного исключения достаточно,
      чтобы обобщение рассыпалось. Практика: 8 голосований — верное обобщение или есть
      исключение (птицы, Луна, учителя, кошки, зима, уроки, воздух, футбол).
    key_material:
      - "Четыре красных флага: «все», «никто», «всегда», «никогда»"
      - "История Артёма: «Все имеют телефон» → два из тридцати"
      - "История Артёма (продолжение): «Никто не хочет играть» → Влад и Даша, но Артём и Миша хотят"
      - "История о брокколи: Дмитрик отступает «никто → почти никто → большинство»"
      - "Защита: спроси «Кто именно?» или «Правда все? Назови примеры»"
      - "Одного исключения достаточно, чтобы обобщение рассыпалось"
      - "Иногда обобщение верно (Луна, воздух) — проверяем каждый раз"
    practice_summary: >
      sc1: 9 vote — повторение поворотников из 6А (кот, бабушка) + выбор вежливого возврата.
      sc2: 5 vote_multichoice — выбор красивого возврата к вопросу (концерт, Саша, чашка, доклад, Катя).
      sc5: 8 vote — верное обобщение или есть исключение (птицы, Луна, учителя, кошки, зима, уроки, воздух, футбол).

  - id: "6B.2"
    title: "Подмена понятий и закон тождества"
    scenes: [sc6, sc7, sc8]
    terms_introduced: ["подмена понятий", "закон тождества"]
    terms_used: ["обобщение (ловушка слов)"]
    votes: 15
    summary: >
      Вводится новая ловушка — подмена понятий: слово не меняется, а его значение тихо
      переключается. Семь историй-примеров: «свобода» (право выбирать → хаос), «друг»
      (поддержка → даёт списать), «уважение» (вежливость → подчинение), «честность»
      (искренность → грубость), «успешный» (ранний подъём → деньги), «ответственный»
      (делает уроки → приносит всё), «справедливость» (поровну → по заслугам). Вводится
      закон тождества: одно слово должно сохранять один смысл на протяжении всего разговора.
      Защита — волшебный вопрос: «Что именно ты имеешь в виду под...?» Практика: дети
      определяют, есть ли подмена в диалогах (помочь, утро, дважды два, честный, играть,
      Земля, лидер, старался, опоздал, сложный, честно, фильм, обман, шумно, ответственный).
    key_material:
      - "Подмена понятий: слово не меняется, а смысл тихо переключается"
      - "Закон тождества: одно слово = один смысл в рамках разговора"
      - "Защита: «Что именно ты имеешь в виду под...?»"
      - "Семь историй: свобода, друг, уважение, честность, успешный, ответственный, справедливость"
      - "Шутки-примеры: «Шёл дождь и два студента», «коляска синего цвета»"
      - "Чем размытее слово, тем легче его подменить"
      - "С точными словами (числа, факты) подмены не бывает"
    practice_summary: >
      sc7: 6 vote — есть подмена или нет (помочь, утро, дважды два, честный, играть, Земля).
      sc8: 9 vote — была подмена или нет в споре (лидер, старался, опоздал, сложный, честно, фильм, обман, шумно, ответственный).

  - id: "6B.3"
    title: "Контр-ход: спокойный ответ на ловушку"
    scenes: [sc9, sc10]
    terms_introduced: ["контр-ход"]
    terms_used: ["обобщение (ловушка слов)", "подмена понятий"]
    votes: 20
    summary: >
      От теории к практике в лицо: ребёнку предлагают ситуацию, где ему говорят фразу
      с ловушкой, и он выбирает между зрелым (сильным) и эмоциональным (слабым) ответом.
      Вводится инструмент «контр-ход»: спокойный уточняющий вопрос вместо нападения
      или оправдания. Два универсальных инструмента: «Когда именно?» и «Что ты имеешь
      в виду?». Формула силы: уточнить слово + попросить пример + отделить эмоцию от факта.
      Закрытие урока: три итога (обобщение — красный флаг, подмена понятий — уточнять,
      контр-ход — спокойный вопрос). Главный вывод: привычка переспрашивать — вот что
      отличает человека, которого трудно обмануть.
    key_material:
      - "Два универсальных инструмента: «Когда именно?» и «Что ты имеешь в виду?»"
      - "Формула силы: уточнить слово, попросить пример, отделить эмоцию от факта"
      - "Спокойствие + уточнение = контроль ситуации"
      - "Зрелый ответ почти всегда начинается с вопроса"
      - "Примеры ловушек: «Ты всегда всё портишь», «Все уже согласились», «Если ты мой друг — дашь списать», «Нормальные люди так не делают», «Будь взрослым»"
      - "Привычка переспрашивать — три вопроса и большинство ловушек разваливаются"
    practice_summary: >
      sc9: 20 vote — выбор зрелого ответа на ловушку (всегда портишь, все согласились,
      друг и списать, безответственный, мальчики ленивые, неправильно ведёшь, нормальные
      люди, уважение, всем понятно, пожалеешь, правильно, один раз пробовал, ленивый,
      ответственный без ошибок, хотел бы — смог, взрослый, командный игрок, безопасно,
      хороший — уступи, умный).
