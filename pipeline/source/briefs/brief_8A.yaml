# LESSON BRIEF — lesson_8A
# Сгенерирован из lessons_ru/lesson_8A.yaml

lesson_id: lesson_8A
title: "Искажение слов — «Пугало»"

terms_introduced:
  - term: "пугало (искажение слов)"
    definition: "нечестный приём в споре: изменить чужие слова, чтобы легче с ними спорить — победить не настоящий аргумент, а его искажённую версию"
  - term: "преувеличение"
    definition: "способ сделать пугало: берут «немножко» и раздувают до «всегда», маленькое желание доводят до абсурда"
  - term: "упрощение"
    definition: "способ сделать пугало: убирают важную деталь — и смысл меняется"
  - term: "добавление"
    definition: "способ сделать пугало: приписывают то, чего человек вообще не говорил"
  - term: "изменение смысла"
    definition: "способ сделать пугало: делают идею злой или глупой, выворачивают смысл наизнанку"
  - term: "уточнение (формула защиты)"
    definition: "формула ответа на пугало: «Позволь уточнить: я говорил, что… а не то, что…» — возвращает разговор к настоящим словам"
  - term: "честный пересказ"
    definition: "правило честного спора: прежде чем ответить, повтори своими словами, что сказал собеседник, и спроси «Правильно я понял?»"

blocks:

  - id: "8A.1"
    title: "Пугало и четыре способа искажения"
    scenes: [sc1, sc2, sc3, sc4, sc5, sc6]
    terms_introduced: ["пугало (искажение слов)", "преувеличение", "упрощение", "добавление", "изменение смысла"]
    terms_used: ["факт", "мнение", "неправда", "причина", "совпадение", "доверие (этос)", "эмоции (пафос)", "факты (логос)", "ловушка слов", "противоречие", "обоснование", "нападение на человека"]
    votes: 29
    summary: >
      Разминка по предыдущим урокам (8 раундов: факт/мнение, причина/совпадение, этос/пафос/логос,
      ловушки слов, противоречие, обоснование, нападение). Затем — зацепка: история о Маше,
      которая предложила шоколадную фабрику, а Микола исказил её слова до «дети едят только конфеты».
      Метафора рыцаря и соломенного пугала: побить пугало — не значит победить рыцаря.
      Вводится термин «пугало» — искажение слов собеседника, чтобы легче спорить.
      Развёрнутая сценка: Витя предлагает музей космонавтики, Дмитрик превращает это в
      «целый год по музеям», Оленка разоблачает пугало. Затем — четыре способа сделать пугало:
      преувеличение (Ира и пижама), упрощение (Богдан и калькулятор), добавление (Катя и суп),
      изменение смысла (Максим и футбол). Главный сигнал: «Я этого не говорил!»
      Две серии практики: 10 раундов «пугало или нет» + 10 раундов «какой вид пугала»,
      включая финальный раунд с двойным пугалом (преувеличение + добавление).
    key_material:
      - "История Маши: «иногда можно сладкое» → «только конфеты и испортить зубы»"
      - "Метафора: рыцарь и соломенное пугало — побил пугало, а не настоящий аргумент"
      - "Сценка: Витя → «один раз в музей космонавтики», Дмитрик → «целый год по музеям»; Оленка разоблачает"
      - "4 способа: преувеличение (раздуть), упрощение (убрать деталь), добавление (приписать лишнее), изменение смысла (вывернуть)"
      - "Сигнал пугала: «Я этого не говорил!»"
      - "Двойное пугало — когда используют сразу два способа"
    practice_summary: >
      sc1: 8 vote — разминка по прошлым урокам (факт/мнение, причина/совпадение, этос, ловушки, противоречие, обоснование, нападение).
      sc5: 10 vote — пугало или нет (компьютер, кошки, сон в выходные, уборка, яблоки, пешком в школу, шум в классе, тренировки, телефоны, домашки).
      sc6: 11 vote — какой вид пугала: преувеличение, упрощение или добавление (перерывы, правила школы, контрольные, шум на перемене, фильм, время на задание, эмоции, сладкое, телефон для учёбы, расписание, двойное пугало).

  - id: "8A.2"
    title: "Техника уточнения — защита от пугала"
    scenes: [sc7, sc8]
    terms_introduced: ["уточнение (формула защиты)"]
    terms_used: ["пугало (искажение слов)", "преувеличение", "упрощение", "добавление"]
    votes: 5
    summary: >
      Вводится формула защиты от пугала — уточнение: «Позволь уточнить: я говорил, что… а не то, что…»
      Первая часть — настоящие слова, вторая — то, что приписали. Пять примеров для тренировки
      (мультики, побыть одному, овощи vs чипсы, телефон, традиции), включая случай с двойным пугалом.
      Затем — пять ситуаций с выбором лучшего возражения: спокойное уточнение по формуле
      vs крик/обида/отступление. Ключевой вывод: крик не возвращает разговор к сути,
      обида — не аргумент, отступление — победа пугала. Уточнение гасит конфликт.
    key_material:
      - "Формула: «Позволь уточнить: я говорил, что… а не то, что…»"
      - "Формула работает даже против двойного пугала — два удара, два уточнения"
      - "Плохие ответы: крик («Сам такой!»), обида («Мне всё равно!»), отступление («Забудь, я ничего не говорил»)"
      - "Хороший ответ: спокойно, конкретно — вот мои слова, вот искажение"
      - "Уточнение гасит конфликт, крик — усиливает"
    practice_summary: >
      sc7: 0 vote, 5 discussion — тренировка формулы уточнения на примерах (мультики, побыть одному, овощи, телефон, традиции).
      sc8: 5 vote — выбор лучшего возражения из двух вариантов (уточнение vs крик/обида/отступление).

  - id: "8A.3"
    title: "Честный пересказ и закрытие"
    scenes: [sc9]
    terms_introduced: ["честный пересказ"]
    terms_used: ["пугало (искажение слов)", "уточнение (формула защиты)"]
    votes: 4
    summary: >
      Вводится правило честного спора: прежде чем ответить, повтори своими словами, что
      сказал собеседник, и спроси «Правильно я понял?». Если «да» — отвечай, если «нет» — уточни.
      Четыре раунда практики: два пересказа (честный и пугало) — выбери правильный.
      Примеры: домашние задания, перемены, лето vs зима, игрушки в школе.
      Закрытие урока: итог трёх навыков — находить пугало, определять вид, уточнять.
      Главная мысль: настоящий мастер спора не ставит пугал — он сражается с настоящим рыцарем.
    key_material:
      - "Правило: прежде чем ответить — перескажи и спроси «Правильно я понял?»"
      - "Честный пересказ сохраняет мягкость оригинала («иногда», «кажется», «больше люблю»)"
      - "Итог: настоящий мастер спора не ставит пугал — он сражается с настоящим рыцарем"
    practice_summary: >
      sc9: 4 vote — выбор честного пересказа из двух вариантов (домашки, перемены, лето/зима, игрушки в школе).
