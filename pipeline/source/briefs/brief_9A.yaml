# LESSON BRIEF — lesson_9A
# Сгенерирован из lessons_ru/lesson_9A.yaml

lesson_id: lesson_9A
title: "Страшные цепочки"

terms_introduced:
  - term: "страшная цепочка"
    definition: "когда берут маленькое событие и строят из него длинную цепочку всё более страшных и всё менее вероятных последствий до катастрофы"
  - term: "три рентгеновских вопроса"
    definition: "инструмент проверки звеньев цепочки: (1) это ТОЧНО произойдёт или только может? (2) какой шанс? (3) можно ли что-то изменить на этом шаге?"

blocks:

  - id: "9A.1"
    title: "Страшная цепочка — что это и как отличить от реальной опасности"
    scenes: [sc1, sc2, sc3, sc4, sc5, sc6]
    terms_introduced: ["страшная цепочка"]
    terms_used: ["пугало", "манипуляция страхом"]
    votes: 6
    summary: >
      Разминка: повторение «пугала» и «манипуляции страхом» из Дня 8 (5 голосований) +
      практика ответов на эти приёмы (4 открытых обсуждения). Затем три истории-зацепки:
      сестра пугает братом из-за игрушек, брат — из-за стиха, подруга — из-за конфеты.
      Во всех случаях маленькое событие раздувается до катастрофы через длинную цепочку.
      Вводится термин «страшная цепочка» и объясняется отличие от простой манипуляции страхом:
      не одно пугающее последствие, а целая лестница, где каждая ступенька страшнее предыдущей.
      История Дмитрика показывает механику: плохая оценка → плохая четверть → плохой год →
      второй год → выгонят → жить под мостом. Оленка разбирает цепочку по звеньям.
      Объясняется, почему цепочки не работают: каждое звено менее вероятно, и на каждом
      шаге можно что-то изменить. Практика: 5 голосований «цепочка или реальная опасность?»
      (опоздание, красный свет, конфета, немытые руки, сломанный карандаш).
    key_material:
      - "Три истории-зацепки: игрушки → улица, стих → дворник, конфета → одиночество навсегда"
      - "Определение: страшная цепочка — длинная лестница ужасов из мелочи, каждая ступенька страшнее предыдущей"
      - "Отличие от манипуляции страхом: не одно последствие, а цепочка"
      - "История Дмитрика: плохая оценка → под мостом; Оленка разбирает по звеньям"
      - "Главное правило: каждое следующее звено менее вероятно; на каждом шаге можно что-то изменить"
      - "Ловушка: красный свет и немытые руки — реальная опасность (короткая цепочка, высокий шанс каждого звена)"
    practice_summary: >
      sc1: 5 vote — повторение пугала и манипуляции страхом (Катя и фильм, реклама рюкзака,
      Андрей и контрольные, шлем, рисование vs футбол).
      sc2: 0 vote, 4 discussion — открытые ответы на пугало и манипуляцию страхом.
      sc3: 1 vote — что объединяет три истории (длинная цепочка ужасов из мелочи).
      sc6: 5 vote — цепочка или реальная опасность (опоздание, красный свет, конфета,
      немытые руки, сломанный карандаш).

  - id: "9A.2"
    title: "Три рентгеновских вопроса и творческая практика"
    scenes: [sc7, sc8, sc9]
    terms_introduced: ["три рентгеновских вопроса"]
    terms_used: ["страшная цепочка"]
    votes: 4
    summary: >
      Вводится инструмент проверки звеньев — «три рентгеновских вопроса»:
      (1) это ТОЧНО произойдёт или только может? (2) какой шанс — большой, средний,
      маленький, крошечный? (3) можно ли что-то изменить на этом шаге?
      Практика: 4 голосования — найти самое слабое звено в цепочке (суп → баскетбол,
      телефон → одиночество, комната → тараканы, сон → коробка).
      Творческая практика: дети сами строят абсурдные цепочки из начала и конца
      (8 обсуждений: зонтик → море, сок → профессия, автобус → друзья, кот → животные,
      цветок → экология, ключ → палатка, жвачка → выпускной, тарелка → ресторан,
      свет → электричество, чих → школы). Через юмор закрепляется понимание: чем длиннее
      цепочка — тем абсурднее.
      Закрытие: примеры цепочек в реальной жизни (реклама, новости, споры, собственная
      голова). Повтор трёх рентгеновских вопросов. Если хоть один ответ — «не точно»,
      «маленький» или «да, можно изменить» — цепочка не работает.
    key_material:
      - "Три рентгеновских вопроса: (1) точно или может? (2) какой шанс? (3) можно ли изменить?"
      - "Пример разбора: домашка → учитель расстроится → плохая оценка → не поступишь — каждое звено бумажное"
      - "Практика: найди самое слабое звено (суп-баскетбол, телефон-одиночество, тараканы-домашка, сон-коробка)"
      - "Творческая практика: строим абсурдные цепочки (зонтик → море, кот → вымирание животных)"
      - "Реальная жизнь: цепочки в рекламе, новостях, спорах и в собственной голове"
      - "Правило: если хоть один ответ — «не точно», «маленький» или «да» — цепочка не работает"
    practice_summary: >
      sc7: 4 vote — найди самое слабое звено в цепочке (суп → баскетбол, телефон → одиночество,
      комната → тараканы, сон → коробка).
      sc8: 0 vote, 8 discussion — построй свою абсурдную цепочку (начало + конец даны).
      sc9: 0 vote — закрытие, примеры из реальной жизни, итог.
