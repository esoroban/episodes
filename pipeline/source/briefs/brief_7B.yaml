# LESSON BRIEF — lesson_7B
# Сгенерирован из lessons_ru/lesson_7B.yaml

lesson_id: lesson_7B
title: "Достаточное основание и нападение на человека"

terms_introduced:
  - term: "обоснование"
    definition: "каждое утверждение должно быть обоснованным — объяснено, почему ты так думаешь"
  - term: "три типа обоснования"
    definition: "факт (проверяемые данные), логика (одно следует из другого), надёжный источник (эксперт или проверенная информация)"
  - term: "нападение на человека"
    definition: "вместо ответа на аргумент — атака на самого человека; не является аргументом"
  - term: "три вида нападения"
    definition: "оскорбление (ярлык вместо ответа), обстоятельства (дисквалификация по возрасту/полу/месту), «сам такой» (перевод стрелок)"
  - term: "защита от нападения (три шага)"
    definition: "назови приём, вернись к теме, спроси «что не так с моим аргументом?»"

blocks:

  - id: "7B.1"
    title: "Обоснование и три его типа"
    scenes: [sc1, sc2, sc3]
    terms_introduced: ["обоснование", "три типа обоснования"]
    terms_used: ["факт"]
    votes: 10
    summary: >
      Вводится понятие обоснования через вопрос-рентген «Почему ты так думаешь?».
      Пример: «Витамины полезные» — «потому что брат так сказал» — а брат врач?
      Разбираются три типа обоснования: факт (проверяемые данные), логика (одно
      следует из другого), надёжный источник (эксперт). Подчёркивается, что «просто
      потому что» и «все так говорят» — не обоснование. Практика: сначала пять
      тройных кейсов (определить, где факт, где логика, где источник), затем десять
      одиночных голосований на определение типа обоснования.
    key_material:
      - "Вопрос-рентген: «Почему ты так думаешь?»"
      - "Определение: обоснование — объяснение, почему ты так думаешь (уважение к разговору)"
      - "Три типа: факт (данные, измерения), логика (причина и следствие), надёжный источник (эксперт)"
      - "Не обоснование: «просто потому что», «все так говорят», «мне кажется»"
      - "Сильное обоснование часто сочетает два или три типа сразу"
      - "Пример с витаминами: «брат так сказал» — а брат врач?"
    practice_summary: >
      sc2: 5 тройных кейсов (discussion) — три объяснения к одному утверждению,
      распределить по типам (факт, логика, источник). Темы: ремень безопасности,
      чистка зубов, мокрый пол, домашнее задание, шапка зимой.
      sc3: 10 vote — одно утверждение и одно обоснование, определить тип
      (факт, логика или источник). Примеры: лёд скользкий, перепись населения,
      водный баланс, разрядка телефона, моргание, разминка, окно зимой,
      планеты вокруг Солнца, таблица умножения, сидение без движения.

  - id: "7B.2"
    title: "Нападение на человека и защита"
    scenes: [sc4, sc5, sc6]
    terms_introduced: ["нападение на человека", "три вида нападения", "защита от нападения (три шага)"]
    terms_used: ["обоснование", "факт"]
    votes: 3
    summary: >
      История-зацепка: спор о выборе игры (футбол vs бадминтон), где дети вместо
      обсуждения игр начинают нападать друг на друга. Вводится понятие «нападение
      на человека» — когда нет хорошего обоснования, человек переключается на
      собеседника. Три вида: оскорбление («ты ленивая», «зубрилка», «зануда»),
      обстоятельства («тебе девять лет», «ты из другого района», «ты троечник»),
      «сам такой» («на себя посмотри», «ты сам забыл»). Ключевой принцип:
      правильность идеи не зависит от того, кто её говорит. Практика на
      распознавание видов нападения (3 голосования). Затем тренажёр защиты:
      три шага (назови приём, вернись к теме, спроси «что не так с аргументом?»)
      на трёх примерах с пошаговым разбором.
    key_material:
      - "История: спор Дмитрика и Маши о футболе/бадминтоне — перешли на личности"
      - "Определение: нападение на человека — не ответ на аргумент, а атака на собеседника"
      - "Три вида: оскорбление, обстоятельства, «сам такой»"
      - "Оскорбление = ярлык вместо ответа (ленивая, зубрилка, тормоз)"
      - "Обстоятельства = дисквалификация по возрасту/полу/месту (тебе 9 лет, ты девочка, ты из другого района)"
      - "«Сам такой» = перевод стрелок (а ты сам вчера...)"
      - "Ключевой принцип: если маленький ребёнок скажет «огонь горячий» — это правда"
      - "Три шага защиты: назови приём, вернись к теме, спроси «что не так с аргументом?»"
    practice_summary: >
      sc5: 3 vote — определить вид нападения (оскорбление, обстоятельства, «сам такой»).
      sc6: 3 тренировочных примера (discussion) — пошаговая отработка трёх шагов
      защиты от нападения на каждом примере (помощь новенькому, телефон на уроке,
      овощи vs чипсы).

  - id: "7B.3"
    title: "Большая практика за весь день"
    scenes: [sc7, sc8, sc9]
    terms_introduced: []
    terms_used: ["закон непротиворечия", "обоснование", "нападение на человека", "оскорбление", "обстоятельства", "«сам такой»", "факт", "логика", "надёжный источник"]
    votes: 10
    summary: >
      Финальная практика, объединяющая материал всего дня (7A + 7B). Первая часть —
      повторение закона непротиворечия из 7A: пять историй с поиском противоречия
      и тренировкой вежливого напоминания (Катя и обещания, тренер и любимчик,
      бабушка и конфета, Вася и бургер — хитрый неоднозначный случай, Максим и
      списывание). Вторая часть — повторение обоснования и нападения из 7B:
      пять диалогов, в каждом нужно определить — это обоснование (какого типа)
      или нападение (какого вида). Закрытие: подведение итогов дня, три суперсилы
      (замечать противоречия, требовать обоснование, распознавать нападение),
      домашнее задание — найти утверждение без обоснования или противоречие.
    key_material:
      - "Хитрый случай: Вася и бургер — «за здоровое питание» не обязательно значит «никогда ни одного бургера»"
      - "Переименованное действие: «просто проверяю» = списывание — закон непротиворечия не обманешь словами"
      - "Главное правило различения: если говорят о теме — аргумент, если о собеседнике — нападение"
      - "Три суперсилы дня: замечать противоречия, требовать обоснование, распознавать нападение"
      - "Домашнее задание: найти утверждение без обоснования или противоречие в реальном разговоре"
    practice_summary: >
      sc7: 5 vote — повторение 7A, поиск противоречия в историях (да/нет/неоднозначно)
      + обсуждение вежливого напоминания. Темы: обещания, равенство в команде,
      баловство внуков, здоровое питание (хитрый случай), списывание.
      sc8: 5 vote — повторение 7B, обоснование или нападение на человека.
      Диалоги: сон (источник), домашка (сам такой), собаки (обстоятельства),
      книги vs видео (логика), школьная форма (оскорбление).
