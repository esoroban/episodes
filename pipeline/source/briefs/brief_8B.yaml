# LESSON BRIEF — lesson_8B
# Сгенерирован из lessons_ru/lesson_8B.yaml

lesson_id: lesson_8B
title: "Когда пугают — манипуляция страхом"

terms_introduced:
  - term: "манипуляция страхом"
    definition: "когда кто-то давит на эмоции (страх), чтобы вы подчинились не думая, а не объясняет и не доказывает"
  - term: "четыре вида запугивания"
    definition: "четыре маски страха — угроза здоровьем, одиночеством, неудачей, наказанием"
  - term: "три вопроса-фильтра"
    definition: "это точно произойдёт или только может? насколько это вероятно? есть ли другие варианты?"
  - term: "четыре шага защиты от запугивания"
    definition: "остановись, задай три вопроса, попроси доказательства, подумай о мотивах"

blocks:

  - id: "8B.1"
    title: "Манипуляция страхом и четыре вида запугивания"
    scenes: [sc1, sc2, sc3, sc4, sc5]
    terms_introduced: ["манипуляция страхом", "четыре вида запугивания"]
    terms_used: []
    votes: 8
    summary: >
      Зацепка: знакомые фразы-страшилки из жизни («не съешь суп — заболеешь»,
      «не купишь сейчас — пожалеешь»). Вводится идея: страх — выключатель для мозга,
      им пользуются, чтобы вы не думали, а послушались.
      Сценка: Дмитрик приносит рекламу йогурта, которая пугает мягкими костями;
      Оленка разоблачает — кальций есть в других продуктах, реклама раздула опасность.
      Вводятся четыре вида (маски) запугивания: здоровье, одиночество, неудача, наказание.
      Практика: дети определяют вид запугивания по фразам.
      Творческое задание: дети сами придумывают запугивающие фразы по заданному виду,
      чтобы понять механику изнутри.
    key_material:
      - "Страх — выключатель для мозга; манипулятор хочет, чтобы вы не думали, а подчинились"
      - "Сценка: реклама йогурта — «кости станут мягкими» (Дмитрик паникует, Оленка разоблачает)"
      - "Четыре маски страха: здоровье, одиночество, неудача, наказание"
      - "Слова-маркеры запугивания: «навсегда», «никогда», «все», «никто»"
      - "Творческое задание: придумай запугивание сам — бери тему, раздувай последствия, добавляй «навсегда»"
    practice_summary: >
      sc2: 1 vote — реклама йогурта использовала страх честно или нечестно.
      sc4: 7 vote — определить вид запугивания (здоровье/одиночество/неудача/наказание) по фразам.
      sc5: 4 discussion — придумать запугивающую фразу заданного вида на заданную тему.

  - id: "8B.2"
    title: "Реальное предупреждение или манипуляция — три вопроса-фильтра"
    scenes: [sc6, sc7]
    terms_introduced: ["три вопроса-фильтра"]
    terms_used: ["манипуляция страхом", "четыре вида запугивания"]
    votes: 8
    summary: >
      Проблема: не все предупреждения — манипуляция. «Не трогай горячую плиту» — забота, не фокус.
      Вводится понятие манипуляции (давить на чувства ради своей выгоды) vs реального предупреждения
      (забота + реальная опасность). Разница — в честности: реальное предупреждение можно проверить.
      Три вопроса-фильтра: (1) это точно произойдёт или только может?
      (2) насколько это вероятно? (3) есть ли другие варианты?
      Практика: восемь жизненных ситуаций — бабушка и мороз, шантаж одноклассника,
      мокрый кафель у бассейна, интернет-реклама, тренер перед соревнованиями,
      старшеклассник во дворе, немытые ягоды, подруга с платьем.
    key_material:
      - "Манипуляция — давление на чувства ради чужой выгоды; реальное предупреждение — забота + настоящая опасность"
      - "Три вопроса-фильтра: точно ли? вероятно ли? есть ли другие варианты?"
      - "Страх не любит вопросов — он как мыльный пузырь, лопается от первого прикосновения"
      - "Примеры реального: мороз −15 + лёгкая куртка; мокрый кафель у бассейна; немытые ягоды"
      - "Примеры манипуляции: шантаж пауками за списывание; реклама с тройным ударом; старшеклассник «защита»"
    practice_summary: >
      sc7: 8 vote — реальное предупреждение или манипуляция (восемь жизненных ситуаций).

  - id: "8B.3"
    title: "Четыре шага защиты от запугивания"
    scenes: [sc8, sc9, sc10, sc11, sc12]
    terms_introduced: ["четыре шага защиты от запугивания"]
    terms_used: ["манипуляция страхом", "четыре вида запугивания", "три вопроса-фильтра"]
    votes: 13
    summary: >
      Вводятся четыре шага реагирования на запугивание: (1) остановись — не реагируй сразу,
      (2) задай три вопроса-фильтра, (3) попроси доказательства — «откуда ты знаешь?»,
      (4) подумай о мотивах — зачем этот человек тебя пугает?
      Практика: пять ситуаций с готовыми ответами — хороший или плохой ответ на запугивание.
      Открытые ситуации: дети сами формулируют ответ (лагерь и вышка, реклама антивируса,
      обмен карточками, групповой проект, новая ручка).
      Итог дня: повторение обеих тем 8-го дня (пугало из 8A + манипуляция страхом из 8B).
      Блиц: восемь быстрых вопросов — пугало, манипуляция страхом или ни то ни другое.
      Закрытие: два инструмента дня — формула уточнения (8A) и три вопроса-фильтра (8B).
    key_material:
      - "Четыре шага: остановись, задай вопросы, попроси доказательства, подумай о мотивах"
      - "Плохой ответ: сдался без вопросов. Хороший ответ: задал проверочный вопрос"
      - "Открытые кейсы: вожатый с вышкой, реклама антивируса с таймером, шантаж карточкой, проект Кирилла, новая ручка"
      - "Блиц: различение пугала (8A) и манипуляции страхом (8B) в смешанных примерах"
      - "Итоговая мысль: кто видит фокус — тот больше на него не попадается"
    practice_summary: >
      sc8: 5 vote — хороший или плохой ответ на запугивание.
      sc9: 5 discussion — придумать свой ответ на запугивание, используя четыре шага.
      sc11: 8 vote — блиц: пугало, манипуляция страхом или ни то ни другое.
