# LESSON BRIEF — lesson_4A
# Сгенерирован из lessons_ru/lesson_4A.yaml

lesson_id: lesson_4A
title: "Язык тела и голос"

terms_introduced:
  - term: "невербальная коммуникация"
    definition: "передача информации без слов — лицом, руками, позой, голосом"
  - term: "ГЛАЗ"
    definition: "четвёртый инструмент разведчика — умение видеть то, что слова прячут"
  - term: "зрительный контакт"
    definition: "когда ты смотришь человеку в глаза — сигнал внимания, интереса и уверенности"
  - term: "открытая поза"
    definition: "руки свободны, тело повёрнуто к человеку — приглашение, дверь нараспашку"
  - term: "закрытая поза"
    definition: "руки скрещены на груди, тело отвёрнуто — стена, дверь на замке"
  - term: "жесты"
    definition: "движения руками — указательные, выразительные, успокаивающие"
  - term: "мимика"
    definition: "выражение лица — экран, на котором видны радость, грусть, злость, удивление, страх"
  - term: "интонация"
    definition: "КАК ты говоришь — четыре настройки голоса (громкость, темп, высота, паузы) складываются вместе и меняют смысл"
  - term: "сарказм"
    definition: "когда говоришь одно, а имеешь в виду противоположное, специально делая неприятно; оружие солдата"

blocks:

  - id: "4A.1"
    title: "Невербальная коммуникация и ГЛАЗ"
    scenes: [sc1, sc2, sc3, sc4, sc5]
    terms_introduced: ["невербальная коммуникация", "ГЛАЗ"]
    terms_used: ["факт", "мнение", "неправда", "причина", "совпадение", "солдат", "разведчик", "сопереживание", "активное слушание", "формула высказывания"]
    votes: 13
    summary: >
      Разминка по пройденному материалу: факт/мнение/неправда, причина/совпадение,
      солдат и разведчик, три инструмента разведчика (тормоз, зеркало, карта).
      Повторение через новые примеры (спор об экскурсии, вратарь, совместный проект).
      Затем открытие: все инструменты работают со словами, но иногда слова врут,
      а тело — почти никогда. Вводится термин «невербальная коммуникация» (передача
      информации без слов) и четвёртый инструмент разведчика — ГЛАЗ. История Дмитрика:
      говорит «да, хочу играть», но руки скрещены, глаза отведены, голос скучный —
      Витя видит несоответствие и узнаёт настоящую причину.
    key_material:
      - "Три инструмента разведчика до сегодняшнего урока: тормоз (сопереживание), зеркало (активное слушание), карта (формула высказывания)"
      - "Пример: мама спрашивает про суп — рот говорит «вкусно», а руки отодвигают тарелку"
      - "Определение невербальной коммуникации: передача информации лицом, руками, позой, голосом"
      - "ГЛАЗ — четвёртый инструмент разведчика: видеть то, что слова прячут"
      - "Тело — честный болтун, оно не умеет молчать"
      - "История Дмитрика: три подсказки (скрещённые руки, взгляд в сторону, скучный голос) — все без единого слова"
    practice_summary: >
      sc1: 7 vote — разминка: 3 по факт/мнение/неправда + 4 по причина/совпадение.
      sc2: 5 vote — повторение: 3 по цели спора (победить/понять/обидеть),
      1 солдат/разведчик, 1 какой инструмент (сопереживание/слушание/формула).
      sc5: 1 vote — что тело Дмитрика говорило на самом деле.

  - id: "4A.2"
    title: "Зрительный контакт и поза"
    scenes: [sc6]
    terms_introduced: ["зрительный контакт", "открытая поза", "закрытая поза"]
    terms_used: ["невербальная коммуникация", "ГЛАЗ"]
    votes: 4
    summary: >
      Первая часть языка тела. Зрительный контакт — фонарик, направленный на человека:
      три невербальных сообщения (слушаю, мне важно, не боюсь). Поза — как дверь:
      открытая (руки свободны, тело повёрнуто к человеку) или закрытая (руки скрещены,
      тело отвёрнуто). Примеры: Маша рассказывает про каникулы — Дмитрик смотрит
      в глаза vs уткнулся в телефон; Микола подходит к Маше — открытая vs закрытая поза.
      К концу блока ребёнок различает открытость и закрытость по описанию поведения.
    key_material:
      - "Зрительный контакт — фонарик: три сообщения без слов (слушаю, мне важно, не боюсь)"
      - "Глаза — окно: куда смотрят глаза — там и внимание"
      - "Открытая поза — дверь нараспашку; закрытая — дверь на замке"
      - "Пример: Маша рассказывает — Дмитрик смотрит в глаза vs в телефон"
    practice_summary: >
      sc6: 4 vote — открытость или закрытость по описанию поведения
      (смотрит и улыбается; руки скрещены и в пол; повернулся и кивает; отвернулся спиной).

  - id: "4A.3"
    title: "Жесты и мимика"
    scenes: [sc7]
    terms_introduced: ["жесты", "мимика"]
    terms_used: ["невербальная коммуникация", "ГЛАЗ"]
    votes: 6
    summary: >
      Вторая часть языка тела. Жесты — движения руками: указательные (направление),
      выразительные (усиливают слова), успокаивающие (рука на плечо). Мимика — выражение
      лица, как экран телефона: радость, грусть, злость, удивление, страх читаются
      мгновенно. Примеры: Микола с плохой оценкой — плечи опущены, уголки рта вниз;
      Дмитрик забегает с новостью — глаза горят, улыбка до ушей. Разведчик пользуется
      этой суперспособностью сознательно.
    key_material:
      - "Три вида жестов: указательные, выразительные, успокаивающие"
      - "Мимика — экран телефона: все уведомления видны сразу"
      - "Пример: Микола с плохой оценкой — ни слова не сказал, а Маша всё прочитала"
      - "Пример: Дмитрик с новостью — глаза горят, улыбка до ушей"
      - "Суперспособность: мы читаем эмоции по лицу мгновенно, за секунду"
    practice_summary: >
      sc7: 6 vote — определение эмоции по описанию мимики (радость/грусть/злость):
      улыбка + сияющие глаза; брови сдвинуты + губы сжаты; уголки рта опущены;
      смех + хлопки; кулаки + красное лицо; голова опущена + плечи подняты.

  - id: "4A.4"
    title: "Голос, интонация и сарказм"
    scenes: [sc8, sc9, sc10]
    terms_introduced: ["интонация", "сарказм"]
    terms_used: ["невербальная коммуникация", "ГЛАЗ", "зрительный контакт", "открытая поза", "закрытая поза", "жесты", "мимика", "солдат", "разведчик"]
    votes: 14
    summary: >
      Третья часть языка тела — голос. Четыре настройки голоса: громкость, темп, высота,
      паузы. Интонация — как все настройки складываются вместе. Одно слово «Отлично» —
      три разных смысла в зависимости от интонации. Вводится термин «сарказм»: говоришь
      одно, имеешь в виду противоположное, подлое оружие солдата. Ударение меняет смысл
      фразы: «Я не брал твой карандаш» — три разных оправдания. Закрытие: итог всех
      четырёх инструментов разведчика (тормоз, зеркало, карта, глаз). Финальная задачка
      (Маша говорит «мне всё равно», а тело кричит «мне обидно»). Экстра-практика:
      игра на тон и ударения.
    key_material:
      - "Четыре настройки голоса: громкость, темп, высота, паузы"
      - "Интонация — КАК ты говоришь; одно слово может означать радость, грусть или злость"
      - "Определение сарказма: говоришь одно, имеешь в виду противоположное, специально делая неприятно"
      - "Сарказм — оружие солдата; разведчик говорит честно"
      - "Магия ударения: «Я не брал твой карандаш» — три разных смысла"
      - "Полный набор разведчика: тормоз, зеркало, карта, глаз"
      - "Финальная задачка: Маша — «мне всё равно» + скрещённые руки + сжатые губы = ей НЕ всё равно"
    practice_summary: >
      sc8: 5 vote — определение настроения по интонации (радостно/грустно/сердито).
      sc9: 0 vote, 1 discussion — задачка про Машу (слова vs тело).
      sc10: 9 vote — экстра-практика: 3 на тон (радость/сарказм/злость),
      2 на «ну ладно» (согласие/обида/раздражение), 2 на «спасибо» (благодарность/сарказм),
      3 на ударения в фразе «Я не говорил это Маше».
