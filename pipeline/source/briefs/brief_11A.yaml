# LESSON BRIEF — lesson_11A
# Сгенерирован из lessons_ru/lesson_11A.yaml

lesson_id: lesson_11A
title: "Как правильно возражать"

terms_introduced:
  - term: "возражение"
    definition: "обоснованный ответ на аргумент собеседника — не просто «нет!», а «нет, и вот почему...»"
  - term: "структура возражения"
    definition: "четыре шага: повтори мысль собеседника, покажи уважение, скажи своё мнение, дай причину"
  - term: "признание частичной правоты"
    definition: "приём «В этом ты прав, но...» — показывает, что выслушал и уважаешь собеседника, делает возражение сильнее"

blocks:

  - id: "11A.1"
    title: "Возражение: определение, структура и практика"
    scenes: [sc1, sc2, sc3, sc4, sc5, sc6, sc7, sc8]
    terms_introduced: ["возражение", "структура возражения"]
    terms_used: ["нападка на человека", "ложный авторитет", "ложная дилемма", "хитрый вопрос", "противоречие", "запугивание"]
    votes: 30
    summary: >
      Разминка повторяет приёмы из прошлых уроков (ложный авторитет, ложная дилемма, нападка,
      хитрый вопрос, противоречие, запугивание). Затем через серию кейсов «нападка vs спокойный ответ»
      дети интуитивно чувствуют разницу между грубым и конструктивным ответом.
      История Саши, Дмитрика и Оленки показывает, как нападка («ты дурак!») ломает разговор,
      а возражение с причиной — продолжает его. В sc4 вводится формальное определение возражения
      и его четырёхшаговая структура: повтори мысль → покажи уважение → скажи своё мнение → дай причину.
      Далее два раунда практики «возражение или нападка?» и открытая практика переделки нападок
      в возражения закрепляют навык.
    key_material:
      - "История: Дмитрик заявляет «футбол лучший», Саша нападает («ты дурак!»), Оленка показывает правильный путь"
      - "Определение: возражение — обоснованный ответ на аргумент, а не просто «нет!»"
      - "Структура возражения: 1) повтори мысль, 2) покажи уважение, 3) скажи мнение, 4) дай причину"
      - "Фразы-помощники: «Я не согласен с идеей...», «Мне кажется, есть ошибка...», «Я понимаю тебя, но думаю иначе...»"
      - "Фразы-маркеры нападки: «Ты дурак!», «Только глупые так думают!», «Ты ничего не понимаешь!»"
      - "Открытая практика: переделка нападок в возражения (8 кейсов с обсуждением)"
    practice_summary: >
      sc1: 10 vote — разминка по приёмам из прошлых уроков (ложный авторитет, ложная дилемма, нападка, хитрый вопрос, противоречие, запугивание).
      sc2: 8 vote — выбор между грубым и спокойным ответом на нападку (кейсы про музыку, темноту, фильм, шахматы, вегетарианство, Майнкрафт, домашку, хомяка).
      sc3: 1 vote — главная ошибка Саши (напал на человека, а не на аргумент).
      sc4: 1 vote — сколько шагов в структуре возражения.
      sc5: 5 vote — возражение или нападка (раунд 1).
      sc6: 1 vote — грубоватое, но по делу возражение (пограничный случай).
      sc7: 5 vote — возражение или нападка (раунд 2, хитрые формулировки).
      sc8: 0 vote (8 discussion-шагов — переделка нападок в возражения).

  - id: "11A.2"
    title: "Признание частичной правоты"
    scenes: [sc9, sc10, sc11]
    terms_introduced: ["признание частичной правоты"]
    terms_used: ["возражение", "структура возражения", "нападка на человека"]
    votes: 10
    summary: >
      Вводится приём «признание частичной правоты» — формула «В этом ты прав, но...».
      Показано, что признание части аргумента собеседника не ослабляет, а усиливает возражение:
      оно демонстрирует уважение и делает контраргумент убедительнее.
      Практика: выбор между грубым отказом и возражением с частичным согласием (книги, режим,
      собаки vs кошки, спорт, кулинария). Финальная практика смешивает все три категории
      (нападка / возражение / возражение с признанием). Закрытие: итог урока — формула
      «понимание + мнение + причина» и секретное оружие «в этом ты прав, но...».
    key_material:
      - "Приём: признание частичной правоты — «В этом ты прав, но...»"
      - "Пример: «Овощи полезны — ты прав. Но необязательно каждый день, ведь витамины есть и во фруктах.»"
      - "Итог урока: нападка — когда кончились аргументы; возражение — когда аргументы только начинаются"
      - "Формула урока: понимание + мнение + причина"
    practice_summary: >
      sc9: 5 vote — выбор между грубым ответом и возражением с признанием частичной правоты (книги, режим, собаки/кошки, спорт, кулинария).
      sc10: 5 vote — финальная проверка, три категории вперемешку (нападка, возражение, возражение с признанием).
