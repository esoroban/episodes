# LESSON BRIEF — lesson_1B
# Сгенерирован из lessons_ru/lesson_1B.yaml

lesson_id: lesson_1B
title: "Можно ли это проверить?"

terms_introduced:
  - term: "хитрое утверждение"
    definition: "утверждение, которое нельзя опровергнуть, потому что на любую проверку есть отговорка"
  - term: "отговорка"
    definition: "причина, которая закрывает путь к проверке (не сегодня, не при людях, не сохранилось)"
  - term: "инструменты проверки"
    definition: "пять помощников: весы, линейка/рулетка, часы/секундомер, термометр, счёт — если есть подходящий инструмент и можно получить число, утверждение проверяемое"
  - term: "детектив правды"
    definition: "система из трёх вопросов: 1) есть ли инструмент проверить? 2) человек согласен проверить или отговорка? 3) проверили — подтвердилось или нет?"

blocks:

  - id: "1B.1"
    title: "Хитрые утверждения и отговорки"
    scenes: [sc1, sc2, sc3]
    terms_introduced: ["хитрое утверждение", "отговорка"]
    terms_used: ["факт", "мнение", "неправда"]
    votes: 16
    summary: >
      Разминка: повторение трёх слов из урока 1A (факт, мнение, неправда) через 6 быстрых
      голосований. Переход к вопросу: а ЧТО значит «проверить»?
      История Вити и волшебного камня: Витя верит, что камень исполняет желания, но на каждую
      неудачную проверку у него есть отговорка (желание слишком большое, камень отдыхал,
      работает только когда никто не смотрит). Вводится понятие «хитрое утверждение» — его
      нельзя опровергнуть, потому что отговорки закрывают путь к проверке. Важно: Витя не врун,
      он сам верит. Но верить на слово необязательно. Ключевой вопрос: «А КАК это можно
      проверить?» Практика: 10 голосований — нормальное объяснение или отговорка (сальто,
      ручная ворона, кот разбросал, собака съела тетрадку, НЛО, сообщение не дошло, бегун,
      чашка, медведь в городе, задержка дыхания).
    key_material:
      - "История: Витя и волшебный камень — на каждую проверку новая отговорка"
      - "Витя не врун — сам верит, но его слова невозможно проверить"
      - "Определение: хитрые утверждения нельзя опровергнуть — на любой вопрос готов ответ"
      - "Отговорки закрывают путь к проверке: «не при людях», «не сегодня», «не сохранилось»"
      - "Ключевой вопрос: «А КАК это можно проверить?»"
      - "Если проверить нельзя — верить на слово необязательно"
    practice_summary: >
      sc1: 6 vote — повторение: факт, мнение или неправда (Земля вокруг Солнца, кошки лучше
      собак, месяц без воды, пицца самая популярная, у слона четыре ноги, понедельник тяжёлый).
      sc3: 10 vote — нормальное объяснение или отговорка (бытовые ситуации из школы и двора).

  - id: "1B.2"
    title: "Пять инструментов проверки"
    scenes: [sc4]
    terms_introduced: ["инструменты проверки"]
    terms_used: ["факт", "мнение", "хитрое утверждение"]
    votes: 8
    summary: >
      Вводятся пять инструментов проверки: весы (вес), линейка/рулетка (длина, высота,
      расстояние), часы/секундомер (время, скорость), термометр (температура), счёт (количество).
      Правило: если есть хотя бы один подходящий инструмент и можно получить число — утверждение
      проверяемое. Если ни один не подходит — скорее всего мнение или хитрое утверждение.
      Ключевая мысль: число не обманет (килограммы, градусы, секунды, метры, штуки), а вот
      «лучший», «скучный», «красивый» — это про чувства, приборов для них нет.
    key_material:
      - "Пять инструментов: весы, линейка/рулетка, часы/секундомер, термометр, счёт"
      - "Если можно получить ЧИСЛО — утверждение проверяемое"
      - "Нет «лучшемера», «скучномера», «красивомера» — это про чувства"
    practice_summary: >
      sc4: 8 vote — есть инструмент или нет (книжка 500 г, вода горячая, фильм лучший,
      стометровка за 15 секунд, класс самый дружный, 12 карандашей, комната длиннее коридора,
      делать уроки скучно).

  - id: "1B.3"
    title: "Детектив правды"
    scenes: [sc5, sc6, sc7, sc8]
    terms_introduced: ["детектив правды"]
    terms_used: ["факт", "мнение", "неправда", "хитрое утверждение", "отговорка", "инструменты проверки"]
    votes: 68
    summary: >
      Синтез всего урока в систему «детектив правды» из трёх вопросов: 1) есть ли инструмент
      проверить? 2) человек согласен проверить или у него отговорка? 3) проверили — подтвердилось
      или нет? Три категории: проверяемое, мнение, хитрое утверждение. Финальная тренировка:
      7 голосований по трём категориям. Обратная практика (sc6): даётся фраза и ответ, ребёнок
      должен объяснить ПОЧЕМУ — выбирая правильное обоснование из трёх вариантов (11 голосований).
      Контрастные пары: «арбуз весит 8 кг» (факт — весы) vs «арбуз сладкий» (мнение — нет
      сладкомера); «на улице +15» (факт — термометр) vs «на улице тепло» (мнение — ощущение);
      «пробежал за 40 секунд» (факт — секундомер) vs «бегаю быстрее всех, но только один»
      (хитрое — отговорка). Закрытие: итог — вопрос «А как это проверить?» важнее, чем кажется;
      большинство взрослых его не задают. Домашнее задание: послушать ТВ, интернет, двор
      и применить систему. Дополнительная практика (sc8): 50 экспресс-голосований — тройки
      (факт + мнение + неправда) на одну тему (жираф, килограмм, пальцы, час, молоко,
      треугольник, зима, лёд, рыба, метр, солнце, паук, неделя, кошка, воздух, литр, птица).
    key_material:
      - "Система «детектив правды»: три вопроса (инструмент? согласен проверить? результат?)"
      - "Три категории ответа: проверяемое, мнение, хитрое утверждение"
      - "Контрастные пары: одна и та же вещь — факт и мнение (арбуз, улица, бег)"
      - "Обратная практика: не «что это?», а «ПОЧЕМУ это факт/мнение/хитрое?»"
      - "Итог: если нельзя проверить — верить необязательно"
    practice_summary: >
      sc5: 7 vote — проверяемое, мнение или хитрое утверждение (собака 10 кг, собака лучшая,
      собака говорит когда никого нет, завтра +20, завтра хороший день, подтягивания когда
      один, дедушка видел инопланетянина).
      sc6: 11 vote — обратная практика: объясни ПОЧЕМУ это факт/мнение/хитрое (контрастные
      пары: ученики, учительница добрая, кот отвечает, расстояние, далеко, арбуз вес, арбуз
      сладкий, температура, тепло, бег за 40 секунд, бегаю быстрее всех).
      sc8: 50 vote — экспресс-тройки: факт + мнение + неправда на одну тему (17 тематических
      троек).
