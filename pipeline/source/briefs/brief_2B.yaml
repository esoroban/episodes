# LESSON BRIEF — lesson_2B
# Сгенерирован из lessons_ru/lesson_2B.yaml

lesson_id: lesson_2B
title: "Причина и следствие"

terms_introduced:
  - term: "причина"
    definition: "то, что ВЫЗЫВАЕТ событие; если мысленно убрать причину — следствие не случится"
  - term: "следствие"
    definition: "то, что ПРОИСХОДИТ из-за причины"
  - term: "после — не значит вследствие"
    definition: "то, что случилось раньше, НЕ обязательно вызвало то, что случилось позже; время — не доказательство"
  - term: "третья причина"
    definition: "когда два события кажутся связанными, но на самом деле их ОБА вызывает что-то третье, спрятанное — как кукловод за ширмой"

blocks:

  - id: "2B.1"
    title: "Причина, следствие и совпадение"
    scenes: [sc1, sc2, sc3]
    terms_introduced: ["причина", "следствие", "после — не значит вследствие"]
    terms_used: ["совпадение"]
    votes: 17
    summary: >
      Зацепка: история Петрика, который съел мороженое и решил, что оно вызвало дождь.
      Параллельная история — Витя и «волшебная» ручка (хорошие оценки из-за подготовки, а не
      ручки). Вводятся термины «причина» и «следствие» как связь, подобная верёвке: дёрни один
      конец — другой пошевелится. Тест: мысленно убери первое событие — второе всё равно случится?
      Да — совпадение. Нет — причина. Вводится правило «после — не значит вследствие» (петух
      и восход). Два вопроса-спасателя: «А что ЕЩЁ могло повлиять?» и «А бывает одно без другого?»
      Обратная ловушка (sc3): иногда кажется «просто не повезло», а на самом деле — настоящее
      последствие (стройка в темноте, потерянный учебник, грязные руки). Понимаешь причину —
      можешь изменить результат.
    key_material:
      - "История Петрика: съел мороженое → пошёл дождь → ложная связь"
      - "История Вити: «волшебная» ручка vs подготовка к контрольной"
      - "Определение: причина — то, что вызывает событие; следствие — то, что происходит из-за причины"
      - "Тест: мысленно убери первое событие — второе случится? Да — совпадение, нет — причина"
      - "Правило: после — не значит вследствие (петух и восход солнца)"
      - "Два вопроса-спасателя: «А что ЕЩЁ могло повлиять?» и «А бывает ОДНО без другого?»"
      - "Обратная ловушка: «просто не повезло» — удобная отговорка; детектив ищет настоящую причину"
    practice_summary: >
      sc1: 1 vote — что реально вызывает хорошую оценку (ручка или подготовка).
      sc2: 10 vote — причина или совпадение (дождь→зонт, соль→плохой день, чайник→кипение,
      ласточки→дождь, подготовка→оценка, кроссовки→победа, лёд→тает, бабушка→снег,
      зеркало→невезение, цветок→засох).
      sc3: 6 vote — причина или «просто не повезло» (стройка в темноте, потерял учебник,
      мокрый пол, не позавтракал, кричал на концерте, ел грязными руками).

  - id: "2B.2"
    title: "Третья причина — спрятанный кукловод"
    scenes: [sc4, sc5, sc6, sc7]
    terms_introduced: ["третья причина"]
    terms_used: ["причина", "следствие", "совпадение", "после — не значит вследствие"]
    votes: 38
    summary: >
      Возврат к ласточкам из sc2: они не вызывают дождь, но связь реальная — оба события
      вызывает влажный воздух (третья причина). Вводится термин «третья причина» — кукловод
      за ширмой, который дёргает за две верёвочки. Главный пример: мороженое и солнечные ожоги
      (третья причина — жара). Практика на поиск третьей причины (sc4): зонты и сапоги (дождь),
      сон и темнота (время суток), шапки и чай (холод), реклама и папа на кухне (пауза в фильме).
      Развитие в манипулятивную ловушку (sc5): реклама («чемпионы пьют наш напиток!»), социальное
      давление («у Пети телефон — и куча друзей!»), ложные обвинения («ты пришёл — ваза упала!»).
      Финальная практика (sc6): скоростной раунд из всех трёх типов — причина, совпадение, третья
      причина. Закрытие (sc7): итог всех понятий, домашнее задание «Детектив связей».
    key_material:
      - "Определение: третья причина — когда два события кажутся связанными, но их оба вызывает что-то третье, спрятанное"
      - "Метафора: кукловод за ширмой дёргает за две верёвочки"
      - "Пример-эталон: мороженое и солнечные ожоги — третья причина жара"
      - "Пример: ласточки и дождь — третья причина влажный воздух"
      - "Пример: пожарные и разрушения — третья причина размер пожара"
      - "Ловушки в рекламе: «все чемпионы пьют наш напиток» (третья причина — тренировки)"
      - "Защита от обвинений: «ты пришёл — ваза упала» (ваза уже стояла на краю)"
      - "Итог: причина (убери первое — второе не случится), совпадение (случится всё равно), третья причина (ищи кукловода)"
      - "Домашняя игра «Детектив связей»: замечай два случая за день + найди ловушку в рекламе"
    practice_summary: >
      sc4: 4 vote — найди третью причину (зонты+сапоги, сон+темнота, шапки+чай, реклама+папа).
      sc5: 7 vote — причина настоящая или ловушка третьей причины (напиток чемпионов,
      телефон Пети, полив цветка, витамины, шахматный кружок, ваза, шапка блогера).
      sc6: 27 vote — финальный скоростной раунд, все три типа вперемешку (мяч→окно,
      свист→поезд, птицы+работа, завтрак→голод, футболка→контрольная, мультики+сон,
      яйцо→кипяток, дерево→здоровье, врачи+больные, лужа→ботинок, нос→звонок,
      дождь→пробки+магазины, обогреватель→тепло, банан→гол, ёлки+мандарины, рыбка→голодная,
      шоколад+санки, руки→радуга, чтение+сочинения, домино, звезда→желание, спортсмены,
      телефон→глаза, кошка→монета, окна+птицы, столовая+кружки, собаки+прогулки+здоровье).
