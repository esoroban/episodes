# LESSON BRIEF — lesson_4B
# Сгенерирован из lessons_ru/lesson_4B.yaml

lesson_id: lesson_4B
title: "Три способа убедить"

origin:
  note: |
    Три способа убеждения придумали древние греки — больше 2000 лет назад.
    Философ Аристотель дал им имена, которые мы используем до сих пор:
    Этос, Пафос, Логос. Это три греческих слова, и каждое объясняет, ПОЧЕМУ
    мы верим тому, что нам говорят. Когда объясняешь термин 10-летнему
    ребёнку — всегда давай греческое слово: имя не выдумано только что,
    у него есть история.

terms_introduced:
  - term: "доверие (Этос)"
    greek: "ἦθος — «характер», «нрав», «репутация»"
    definition: "способ убеждения, когда мы верим ЧЕЛОВЕКУ, а не словам — его авторитету, репутации, опыту"
    why_explain: |
      У греков «этос» означало «характер». Мы доверяем человеку, потому что
      знаем: он знает тему (врач, учитель) или мы его давно знаем (друг,
      родитель). Имя и репутация — вот рычаг. «Я врач» = «мне можно верить,
      потому что я учился».
    trap: |
      популярность ≠ экспертиза. Миллион подписчиков не заменяет диплом.
      У блогера этос, но он не врач — и его совет про витамины ничего не стоит.

  - term: "чувства (Пафос)"
    greek: "πάθος — «страсть», «чувство», «переживание»"
    definition: "способ убеждения через эмоции: жалость, радость, страх, стыд"
    why_explain: |
      Пафос не спорит с головой — он обращается к сердцу. Картинка грустного
      котёнка, крик «последний шанс!», обещание «ты будешь крутым» — всё
      это рычаги эмоций. Когда я ЧУВСТВУЮ — я хочу действовать не потому,
      что подумал, а потому, что сжалось, обрадовалось или испугалось.
    trap: |
      чистый пафос без фактов — манипуляция. Эмоция прошла — остался
      вопрос: «а где правда?»

  - term: "доказательства (Логос)"
    greek: "λόγος — «слово», «мысль», «разум», «рассуждение»"
    definition: "способ убеждения через факты, цифры, примеры — то, что можно проверить"
    why_explain: |
      Логос — это рычаг ума. Цифры, проценты, исследования, расписания —
      всё, что имеет источник и может быть перепроверено. «50% витамина C
      от дневной нормы» = можно открыть упаковку, можно сравнить с нормой.
    trap: |
      цифра без источника — это не логос, а имитация. «Исследования показали...»
      кем проведённые? «97% довольны» — кто считал, сколько спросил? Логос
      без ссылки — пустая форма.

  - term: "баланс способов"
    definition: "правило разведчика: настоящее убеждение — когда работают все три способа вместе, как табуретка на трёх ножках; если одной не хватает — включай подозрение"

blocks:

  - id: "4B.1"
    title: "Три способа убеждения: доверие, чувства, доказательства"
    scenes: [sc1, sc2, sc3, sc4, sc5]
    terms_introduced: ["доверие (Этос)", "чувства (Пафос)", "доказательства (Логос)"]
    terms_used: ["факт"]
    votes: 27
    summary: >
      Зацепка: как убедить маму купить паука? Три ребёнка убеждают по-разному — через обещание,
      жалость и факты. История об экскурсии: Маша давит репутацией, Дмитрик — эмоциями,
      Оленка — цифрами и расчётами. Вводятся три способа убеждения: доверие (Этос) — верим
      человеку; чувства (Пафос) — задевают эмоции; доказательства (Логос) — показывают факты.
      Ловушка: популярность не равна экспертизе (блогер с миллионом подписчиков — не врач).
      Практика: определить один способ убеждения в рекламных фразах (sc4), затем найти
      два-три способа в одной фразе (sc5).
    key_material:
      - "История: Маша (доверие), Дмитрик (чувства), Оленка (доказательства) убеждают учительницу взять на экскурсию"
      - "Определение доверия (Этос): верим ЧЕЛОВЕКУ — его авторитету, репутации"
      - "Определение чувств (Пафос): убеждают через эмоции — жалость, радость, страх, стыд"
      - "Определение доказательств (Логос): показывают факты, цифры, примеры"
      - "Ловушка: популярность ≠ экспертиза (миллион подписчиков не заменяют диплом)"
      - "Ключевая фраза: «Иногда способы перемешиваются — в одной фразе два способа сразу»"
    practice_summary: >
      sc2: 4 vote — кто из троих привёл факты + определить способ каждого (Маша, Дмитрик, Оленка).
      sc3: 3 vote — определить способ убеждения (блогер-витамины, «последний шанс», учёные-шоколад).
      sc4: 10 vote — определить один способ в рекламных фразах (конструктор, рюкзак, площадка, шампунь, наборы, планшет, скейтборд, английский, настольная игра, грустный щенок).
      sc5: 10 vote_multichoice — найти несколько способов в одной фразе (конструктор+счастье, скидка+жалеть, велосипед+спокойствие, ребёнок+исследования, миллион детей, сок+витамин, друзья+лагерь, планшет+безопасность, чтение+преимущество, последние наборы).

  - id: "4B.2"
    title: "Баланс способов и практика убеждения"
    scenes: [sc6, sc7, sc8, sc9, sc10, sc11]
    terms_introduced: ["баланс способов"]
    terms_used: ["доверие (Этос)", "чувства (Пафос)", "доказательства (Логос)"]
    votes: 33
    summary: >
      Вводится правило баланса: настоящее убеждение — когда все три способа работают вместе,
      как табуретка на трёх ножках. Если только чувства — «а где факты?», если только факты —
      «а кто проверил?» Нет баланса — включай подозрение. Практика: определить, сбалансировано
      ли убеждение (sc6). Затем — найти недостающую ножку (sc7). Сравнить сильное и слабое
      убеждение в жизненных ситуациях (sc8). Определить способы в реальной жизни — друзья,
      семья, школа (sc9). Починить слабое убеждение, добавив другую ножку (sc10).
      Закрытие: итог дня, связь трёх способов с языком тела (урок 4A), домашнее задание —
      замечать убеждения вокруг.
    key_material:
      - "Метафора табуретки: три ножки — доверие, чувства, доказательства; убери одну — всё рухнет"
      - "Правило разведчика: нет баланса — включай подозрение"
      - "Пример идеальной рекламы: «Рекомендуют диетологи (доверие), вкус детства (чувства), без сахара (доказательства)»"
      - "Ключевой вывод: табуретке нужна ДРУГАЯ ножка, а не та же самая подлиннее"
      - "Сравнение: «пожааалуйста» (одна ножка) vs доверие+факты+чувства (три ножки) — побеждает второй"
      - "Домашнее задание: замечать убеждения вокруг, определять ножки, запомнить интересный пример"
    practice_summary: >
      sc6: 9 vote — сбалансировано или нет (сок+врач, купи+все покупают, книжка+учителя, не купишь+пожалеешь, 15 лет работы, крем+ужасная кожа, паста+стоматологи, скидка+мечта, рюкзак+школьники).
      sc7: 6 vote — чего не хватает в убеждении (телефон — нет чувств, кроссовки — нет доказательств, сок — нет доверия, мячи — нет чувств, настольная игра — нет доказательств, рюкзак — нет доверия).
      sc8: 5 vote — кто убедительнее, вариант А или Б (ночёвка у друга, домашка, игра, велосипед, ядовитая змея).
      sc9: 8 vote — определить способ в жизненных ситуациях (капитан команды, будущая победа, три матча, страх насмешек, папа-инженер, мама расстроится, 18 из 25 сдали, бабушка так делала).
      sc10: 5 vote — выбрать правильную добавку для починки слабого убеждения (игрушка, витамин, книга, уроки, самокат).
