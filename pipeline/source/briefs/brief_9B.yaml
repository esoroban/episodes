# LESSON BRIEF — lesson_9B
# Сгенерирован из lessons_ru/lesson_9B.yaml

lesson_id: lesson_9B
title: "Если эксперт сказал"

terms_introduced:
  - term: "авторитет"
    definition: "человек, которому мы доверяем — звезда, взрослый, учитель, учёный"
  - term: "компетентность"
    definition: "человек реально разбирается именно в этой теме — учился, работает, имеет опыт"
  - term: "ложный авторитет"
    definition: "авторитет есть, а компетентности нет — как красивая обёртка на пустой коробке"

blocks:

  - id: "9B.1"
    title: "Авторитет, компетентность и ложный авторитет"
    scenes: [sc1, sc2, sc3, sc4]
    terms_introduced: ["авторитет", "компетентность", "ложный авторитет"]
    terms_used: []
    votes: 13
    summary: >
      Зацепка: пять примеров, где нас убеждают не фактами, а тем, КТО сказал —
      футболист рекомендует велосипед, врач рекламирует крем, певец советует сок,
      блогер предлагает диету, бабушка ссылается на «в моё время». История: Дмитрик
      приносит сок «ЗвёздоСила» с лицом певца Макса Звёздного, Сашко и Оленка разоблачают —
      знаменитый не значит разбирается. Вводятся три термина: авторитет (кому доверяем),
      компетентность (реально разбирается в теме), ложный авторитет (авторитет без
      компетентности). Два условия уместной ссылки: человек компетентен в этой области +
      другие специалисты согласны. Два признака ловушки: говорит не о своей области +
      вообще не эксперт. Базовая практика: 11 ситуаций «разбирается или нет» — ветеринар
      и собака, блогер и простуда, повар и стейк, актёр и банк, учитель физкультуры
      и разминка, старший брат и шоколад, Маша и роботы, Маша и собаки, Артём и шахматы,
      Артём и котлеты, Лиза и рассада.
    key_material:
      - "Пять зацепок: футболист-велосипед, врач-крем, певец-сок, блогер-диета, бабушка-«в моё время»"
      - "История: Дмитрик и сок «ЗвёздоСила» с лицом Макса Звёздного"
      - "Оленка: «Мой кот тоже знаменитый — у него тысяча лайков. Но я не спрашиваю у кота, какие витамины пить»"
      - "Определение авторитета: человек, которому мы доверяем"
      - "Определение компетентности: реально разбирается именно в этой теме"
      - "Определение ложного авторитета: авторитет есть, а компетентности нет"
      - "Два условия уместной ссылки: компетентен в области + другие специалисты согласны"
      - "Два признака ловушки: говорит не о своей области + вообще не эксперт"
      - "Ключевая фраза: «Компетентность не переносится с темы на тему!»"
    practice_summary: >
      sc1: 1 vote — что объединяет пять примеров (все ссылаются на кого-то известного).
      sc2: 1 vote — почему Дмитрик поверил рекламе (авторитет Макса Звёздного).
      sc4: 11 vote — разбирается человек или нет (ветеринар, блогер, повар, актёр,
      учитель физкультуры, старший брат, Маша-роботы, Маша-собаки, Артём-шахматы,
      Артём-котлеты, Лиза-рассада). Три варианта: да/нет/нужно уточнить.

  - id: "9B.2"
    title: "Продвинутая практика и применение в жизни"
    scenes: [sc5, sc6, sc7, sc8]
    terms_introduced: []
    terms_used: ["авторитет", "компетентность", "ложный авторитет"]
    votes: 18
    summary: >
      Усложнённая практика: ситуации с контекстом и подвохом — нужно определить,
      уместная ссылка на авторитет или ложный авторитет. Ключевые кейсы: реклама
      зубной пасты «рекомендовано 12 стоматологами из миллионов» (нужно уточнить —
      мало!), учёные из 50 стран с публикациями (уместная), тиктокер против вакцин
      (ложный), бабушка с 50-летним опытом выпечки (уместная), «один учёный из Америки»
      (ложный), механик с 40-летним стажем (уместная). Обратное упражнение: по
      утверждению определить, кому бы поверили (вода, гриб, тропинка, аллергия, игра,
      собака, погода, телефон, фильм, инопланетяне). Хитрый момент: «лучший фильм» —
      это мнение, тут авторитет не работает. Блиц-повторение Дня 9: 6 вопросов
      на страшные цепочки (из урока 9A) + 6 вопросов на ложных авторитетов. Закрытие:
      пять сфер применения в жизни — реклама, лидеры мнений, продавцы курсов,
      споры, здоровье. Волшебный вопрос: «Разбирается ли этот человек ИМЕННО в этом?»
    key_material:
      - "Кейс-ловушка: «рекомендовано стоматологами» — но только 12 из миллионов (второе условие не выполнено)"
      - "Учёные из 50 стран + публикации = оба условия выполнены"
      - "Хитрый момент: «лучший фильм года» — мнение, авторитет не работает"
      - "Продавцы курсов: «единственный бизнес — продавать курсы о том, как заработать» — как тренер по плаванию, который не заходил в воду"
      - "Пять сфер ложного авторитета в жизни: реклама, блогеры, продавцы курсов, споры, здоровье"
      - "Волшебный вопрос: «Разбирается ли этот человек ИМЕННО в этом?»"
      - "Три шага: если да — слушаем, если нет — ищем того, кто разбирается, если не знаем — проверяем"
    practice_summary: >
      sc5: 6 vote — уместная ссылка или ошибка (зубная паста, учёные 50 стран,
      тиктокер и вакцины, бабушка и пироги, «один учёный», дедушка-механик).
      sc6: 0 vote, 9 discussion — обратное упражнение «кому бы вы поверили»
      (вода, гриб, тропинка, аллергия, игра, собака, дождь, телефон, фильм, инопланетяне).
      sc7: 12 vote — блиц Дня 9: 6 на страшные цепочки (цепочка или реальная опасность,
      какое звено самое слабое) + 6 на ложных авторитетов (настоящий эксперт или ложный).
