# EPISODE PLAN — День 10
# Уроки: 10A, 10B
# Акт: III — Предательство
# Source episodes: 24, 25, 26
# Статус: УТВЕРЖДЁН

day: 10
lessons: ["10A", "10B"]
story_arc: "Акт III: Предательство"
story_summary: "Ложный выбор Рея и Голоса. Стеклянная комната Софии. Башня Голоса"
source_episodes: [24, 25, 26]

episodes:

  # =====================================================================
  # ЭПИЗОД 37 — «Или — или»
  # =====================================================================
  - ep: 37
    blocks: ["10A.1"]
    title: "Или — или"
    terms_introduced: ["ложная дилемма", "закон исключённого третьего"]
    terms_used: ["страшная цепочка", "ложный авторитет", "причина и следствие", "пугало (искажение слов)", "манипуляция страхом", "четыре шага защиты от запугивания", "доверие (Этос)", "чувства (Пафос)", "доказательства (Логос)"]
    total_quizzes: 14

    drama:
      duration: "3-4 мин"
      location: "Зеркальный Город, тёмный переулок у разрушенной площади"
      characters: ["Марко", "Софа", "Рей"]
      summary: >
        После откровения Дня 9 — Лина работала на Софию —
        Марко один. Лина ушла искать свой путь к Софии.
        Рей появляется лично. Впервые — не по радио, не
        на площади. Один на один. «Отдай артефакты
        добровольно. Голос вернёт Макса. Или он заберёт
        сам.» Марко впервые видит Рея вблизи: пальцы скребут
        по карману, губы улыбаются, а шея напряжена. Рей
        говорит за Голоса — но боится его больше, чем Марко.
        Затем — сам Голос через динамики: «Отдай артефакты —
        верну Макса. Оставь — Макс исчезнет навсегда.»
      gut_feeling: >
        Два варианта. Только два. Как стены, которые
        сжимаются. Марко чувствует давление — надо выбрать
        СЕЙЧАС. Но Софа мигает: «Подожди. Сколько вариантов
        тебе предложили?» Воздух сгущается. Рей ждёт ответа.
      marko_flaw: >
        Марко хочет согласиться — отдать артефакты, лишь
        бы вернуть Макса. Привычка: согласиться с тем, кто
        говорит уверенно. Но уверенность — не доказательство.

    sofa_block:
      duration: "4-5 мин"
      term_introduced: "ложная дилемма, закон исключённого третьего"
      trigger: >
        Софа: «Ловушка... называется ложная дилемма. Когда
        говорят "или так, или так" — а на самом деле вариантов
        больше. Рей дал два варианта. Голос — тоже два.
        Совпадение?» Затем: «Три закона Аристотеля. Третий —
        закон исключённого третьего: утверждение или истинно,
        или ложно, третьего нет. Для лампочек — работает.
        Горит или не горит. Для чисел — работает. Чётное или
        нечётное. Но жизнь — не лампочка. Между "другом" и
        "врагом" есть приятель, знакомый, одноклассник.»
        Фразы-ловушки: «или... или...», «или ты с нами, или
        против нас», «есть только два пути», «третьего не
        дано». Сигнал: когда слышишь «или — или» — проверь,
        нет ли третьего варианта.
      quizzes:
        count: 6
        source: "brief sc1 (10v разминка) + sc2 (2v)"
        description: >
          sc1 (4v): разминка — страшная цепочка или реальное
          предупреждение (2), ложный авторитет (1), причина
          или совпадение (1).
          sc2 (2v): были ли у Дмитрика другие варианты;
          ловушка или честный выбор.
      rule: >
        «Ложная дилемма — когда говорят "или так, или так",
        а вариантов больше. Закон исключённого третьего
        работает для лампочек и чисел, но не для жизни.
        Сигнал: слышишь "или — или" — ищи третий вариант.»
      life_question: >
        «Друг говорит: "Или ты со мной, или ты мне не друг."
        Это ложная дилемма? Какие ещё варианты есть?»

    challenge:
      duration: "5-6 мин"
      summary: >
        Марко применяет знание: «Рей, ты дал два варианта.
        Но кто сказал, что их только два?» Рей: «Голос
        сказал.» Марко: «Голос — не закон природы.» Софа
        подсказывает зрителям: «Голос применяет закон
        исключённого третьего к жизни. Лампочка — горит
        или нет. Но дружба — не лампочка. Макс — не
        лампочка.» Рей колеблется — впервые. Его пальцы
        перестают скрести карман. «У тебя нет третьего
        варианта.» Марко: «Пока нет. Но я его найду.»
        Практика: десять примеров — ловушка или настоящий
        выбор.
      quizzes:
        count: 8
        source: "sc3 (4v) + sc4 (10v, выбираем 4)"
        description: >
          sc3 (4v): закон работает или есть третий вариант
          (вода кипит, голоден/сыт, дверь, вторник).
          sc4 (4v): ловушка или настоящий выбор
          (команда/предатель, лампа, отличник/неудачник,
          чётное/нечётное).
      vera_role: ""
      rey_role: >
        Рей — посланник Голоса. Впервые один на один.
        Боится Голоса больше, чем Марко. Колеблется,
        когда Марко ищет третий вариант.
      voice_role: >
        Голос — через динамики. Ультиматум: «Отдай или
        потеряй.» Классическая ложная дилемма.

    cliffhanger:
      duration: "1-2 мин"
      summary: >
        Рей уходит. Напоследок: «У тебя до утра.»
        Софа: «Марко... третий вариант существует. Но я
        не могу подсказать. Этого... нет в программе.»
        Марко: «Сломать артефакты. Распылить силу.
        Тогда никто не получит.» Софа молчит. Долго.
        «Есть... последствия.»
      sofa_reaction: "«Есть... последствия. София... не предусмотрела этот путь.»"
      next_episode_hook: "Третий вариант — сломать артефакты. Но какая цена?"

    quiz_distribution:
      from_brief: 14
      added_story: 0
      moved_to_extra: 12
      total: 14

    extra_practice:
      count: 12
      source: "sc1 остаток (6v) + sc4 остаток (6v)"
      description: >
        Оставшиеся квизы на разминку (пугало, этос/пафос/
        логос) и ловушка или настоящий выбор. Допрактика
        после эпизода.

  # =====================================================================
  # ЭПИЗОД 38 — «Цена третьего варианта»
  # =====================================================================
  - ep: 38
    blocks: ["10A.2", "10A.3"]
    title: "Цена третьего варианта"
    terms_introduced: ["выбор без выбора"]
    terms_used: ["ложная дилемма", "закон исключённого третьего", "манипуляция страхом", "три вопроса-фильтра"]
    total_quizzes: 11

    drama:
      duration: "3-4 мин"
      location: "Зеркальный Город, заброшенное хранилище артефактов"
      characters: ["Марко", "Софа", "София (голос)"]
      summary: >
        Ночь. Марко в хранилище. Артефакты перед ним.
        План: сломать — и ни Голос, ни Рей не получат
        силу. Третий вариант. Руки дрожат. Софа: «Ты
        уверен? Третий вариант — не всегда безопасный.»
        Марко замахивается — и телефон ЗВОНИТ. Голос
        Софии. Живой. Настоящий. «НЕ СМЕЙ! Если
        сломаешь — я перестану существовать. Артефакты
        связаны со мной.» Тишина. Марко опускает руку.
        Третий вариант имеет цену: спасти Макса = потерять
        Софию. Софа: «Новая информация. Голос не сказал
        об этом. Почему?»
      gut_feeling: >
        Надежда рухнула. Третий вариант оказался ещё одной
        ловушкой. Марко чувствует: каждый выход ведёт
        к потере. Как будто все двери — в одну стену.
      marko_flaw: >
        Марко хочет сдаться: «Значит, выбора нет.»
        Но отсутствие очевидного выхода — не отсутствие
        выхода. Нужен волшебный вопрос: «А что если...?»

    sofa_block:
      duration: "4-5 мин"
      term_introduced: "выбор без выбора"
      trigger: >
        Софа: «Волшебный вопрос: "А что если...?" Он
        ломает любую ложную дилемму.» Затем: «Новый вид
        ловушки — выбор без выбора. Когда дают два
        варианта, но оба ведут к одному результату.
        "Спать сейчас или после уборки?" — в обоих
        случаях идёшь спать. Иллюзия выбора.» Три места,
        где прячется «или-или»: выбор без выбора, реклама
        («Базовый или премиум?» — вариант «не покупать»
        исчез), ловушка в своей голове («Или идеально —
        или никак»). Перфекционизм — самая опасная
        ложная дилемма: ту, которую ставишь сам себе.
        «Ноль всегда меньше, чем неидеально. Всегда.»
      quizzes:
        count: 4
        source: "brief sc6 (6v)"
        description: >
          sc6 (4v): выбор без выбора или настоящий
          выбор (спать, уроки, пакет, мусор).
      rule: >
        «Выбор без выбора — оба варианта ведут к одному
        результату. Волшебный вопрос "А что если...?"
        ломает любую ложную дилемму. Ноль всегда меньше,
        чем неидеально.»
      life_question: >
        «Мама: "Делай уроки сейчас или после уборки."
        Это выбор без выбора? Какой вариант спрятан?»

    challenge:
      duration: "5-6 мин"
      summary: >
        Марко применяет «А что если...?» к своей ситуации.
        «А что если можно спасти обоих — и Макса, и Софию?»
        Софа: «Голос сказал: отдай или потеряй. София
        сказала: не ломай. Но что если вопрос поставлен
        неправильно?» Марко: «Голос хочет артефакты. София
        привязана к артефактам. А что если... отвязать
        Софию?» Софа мигает. «Этого... нет в программе.
        София не знала... что будет так. Ты один.» Впервые
        Софа признаёт: плана нет. Блиц: смешанные примеры
        ложных дилемм и выборов без выбора.
      quizzes:
        count: 7
        source: "sc6 остаток (2v) + sc7 (1v) + story (4v, added)"
        description: >
          sc6 (2v): выбор без выбора (скидка, подписка).
          sc7 (1v): что лучше — неидеальная книга или
          никакой.
          4 сюжетных (added): «Отдай или потеряй» — ложная
          дилемма или нет; «Не ломай или я исчезну» — выбор
          без выбора или настоящая угроза; «А что если
          отвязать Софию?» — третий вариант или фантазия;
          Голос не сказал про связь Софии — зачем скрывал.
      vera_role: ""
      rey_role: ""
      voice_role: >
        Голос — отсутствует напрямую, но его ультиматум
        давит. Скрыл связь Софии с артефактами.

    cliffhanger:
      duration: "1-2 мин"
      summary: >
        Софа: «Марко... я не могу подсказать. Этого...
        нет в программе. София не знала... что будет так.
        Ты один.» Марко: «Не один. Есть ещё один человек,
        который знает, как устроены артефакты. София.
        Мне нужно до неё добраться.» Софа: «София...
        в стеклянной комнате. На двадцать третьем этаже
        башни.» Число на экране Софы: 22. Упало на два.
      sofa_reaction: "«Плана нет. Впервые... плана нет. Ты пишешь новый.»"
      next_episode_hook: "София — в стеклянной комнате. Но Голос заставляет её говорить. Как разговаривать с тем, кого контролируют?"

    quiz_distribution:
      from_brief: 7
      added_story: 4
      moved_to_extra: 2
      total: 11

    extra_practice:
      count: 2
      source: "sc5 (2 discussion adapted to vote)"
      description: >
        Адаптированные дискуссии из sc5: дети придумывают
        третий вариант для ловушки «суп или голод» и
        «согласись или уходи». Допрактика после эпизода.

  # =====================================================================
  # ЭПИЗОД 39 — «Стеклянная комната»
  # =====================================================================
  - ep: 39
    blocks: ["10B.1", "10B.2"]
    title: "Стеклянная комната"
    terms_introduced: ["составной вопрос", "вопрос-ловушка"]
    terms_used: ["ложная дилемма", "выбор без выбора", "манипуляция страхом", "факт", "мнение"]
    total_quizzes: 13

    drama:
      duration: "3-4 мин"
      location: "Башня Голоса, двадцать третий этаж, стеклянная комната"
      characters: ["Марко", "Софа", "София", "Голос"]
      summary: >
        Марко добрался до стеклянной комнаты. София —
        за стеклом. Видна, но говорит не своими словами.
        Голос заставляет её задавать вопросы Марко:
        «Когда ты перестал верить мне, Марко?» Марко
        хочет ответить — но Софа: «Стой. Разбери вопрос.»
        Голос через Софию: «Почему ты бросил друзей и
        пришёл один?» Три вопроса склеены в один.
        «Ты всё ещё врёшь себе, что можешь спасти всех?»
        Любой ответ — ловушка. София прижимает ладонь
        к стеклу. Левый глаз — карий. Правый — СЕРЫЙ.
        Половина сестры — уже Голос.
      gut_feeling: >
        Голос Софии — знакомый, родной. Но слова — чужие.
        Каждый вопрос — как крючок: хочется ответить,
        но любой ответ затягивает глубже. Марко чувствует:
        это не София говорит. Это Голос говорит её голосом.
      marko_flaw: >
        Марко хочет ответить сестре — на любой вопрос,
        лишь бы она услышала. Но отвечать на ловушку —
        значит принять ложное предположение внутри неё.

    sofa_block:
      duration: "4-5 мин"
      term_introduced: "составной вопрос, вопрос-ловушка"
      trigger: >
        Софа: «Два типа хитрых вопросов. Первый —
        составной вопрос: когда в одном вопросе склеены
        несколько тем или обвинений. "Почему ты не сделал
        домашку, опоздал и забыл тетрадь?" — три вопроса
        в одном. Правило: один вопрос — одна тема. Если
        склеили — раздели и отвечай по порядку. Фраза:
        "Давайте по порядку."» Затем: «Второй тип —
        вопрос-ловушка. Внутри спрятано предположение.
        "Ты уже перестал врать?" — если скажешь "да",
        значит раньше врал. Если "нет" — до сих пор
        врёшь. Любой ответ — капкан.» Аналогия с
        мышеловкой: приманка — вопрос, капкан — скрытое
        предположение. Слова-маркеры: «ты уже перестал...»,
        «почему ты всегда...», «когда ты наконец...».
        Техника трёх шагов: найди скрытое предположение,
        скажи что оно неверно, потом отвечай.
      quizzes:
        count: 5
        source: "brief 10B sc1 (2v) + sc2 (5v, выбираем 3)"
        description: >
          sc1 (2v): сколько вопросов спрятано в вопросе
          Голоса через Софию; какое скрытое предположение.
          sc2 (3v): простой вопрос или составной (любимый
          цвет, тренировка+мороженое, где был вчера).
      rule: >
        «Составной вопрос — несколько тем склеены в один.
        Раздели и отвечай по порядку. Вопрос-ловушка —
        внутри спрятано предположение. Найди его, скажи
        что неверно, потом отвечай. Волшебная фраза:
        "Твой вопрос предполагает, что... Но это не так!"»
      life_question: >
        «Учитель: "Почему ты опять не слушал и мешал
        другим?" Сколько тут вопросов? Как ответить
        правильно?»

    challenge:
      duration: "5-6 мин"
      summary: >
        Марко применяет знание. Голос через Софию:
        «Когда ты перестал верить сестре?» Марко: «Твой
        вопрос предполагает, что я перестал. Но это не
        так. Я здесь — потому что верю.» Голос: «Почему
        ты бросил друзей и пришёл один?» Марко: «Давай
        по порядку. Первое: я не бросил. Второе: я не
        один — Софа со мной.» Голос давит сильнее:
        «Ты всё ещё врёшь себе?» Марко: «Предположение:
        я вру. Но это не факт — это твоё мнение.»
        София на секунду — своя. Прижимает ладонь к
        стеклу: «ОН ЗАСТАВЛЯЕТ МЕНЯ.» Практика: честный
        вопрос или ловушка.
      quizzes:
        count: 8
        source: "sc2 остаток (6v) + sc3 (8v, выбираем 2)"
        description: >
          sc2 (4v): простой вопрос или составной (поделка,
          обедал, день рождения, музыка).
          sc3 (2v): честный вопрос или ловушка (врал
          родителям, забываешь обещания).
          2 сюжетных: Голос через Софию — «когда ты
          перестал верить?» (найди предположение); София
          ответила на загруженный вопрос Голоса — приняла
          ли она предположение.
      vera_role: ""
      rey_role: ""
      voice_role: >
        Голос заставляет Софию задавать хитрые вопросы
        Марко. Составные, загруженные — каждый с ловушкой
        внутри. Контролирует половину Софии.

    cliffhanger:
      duration: "1-2 мин"
      summary: >
        София — на секунду своя: «Марко, не отвечай на
        его вопросы. Задавай СВОИ.» Правый глаз снова
        серый. София уходит вглубь комнаты. Софа: «Критическое
        состояние. Половина сестры — уже Голос. Марко,
        чтобы добраться до Софии — нужно пройти через
        башню. А башню охраняют не замки — люди.»
      sofa_reaction: "«София сказала: задавай свои вопросы. Она... подсказала путь.»"
      next_episode_hook: "Башня Голоса. Стражники. Чтобы пройти — нужны слова. Но какие?"

    quiz_distribution:
      from_brief: 11
      added_story: 2
      moved_to_extra: 8
      total: 13

    extra_practice:
      count: 8
      source: "sc2 остаток (2v) + sc3 остаток (6v)"
      description: >
        Оставшиеся квизы: простой или составной вопрос,
        честный вопрос или ловушка. Допрактика после
        эпизода.

  # =====================================================================
  # ЭПИЗОД 40 — «Разведчик в башне»
  # =====================================================================
  - ep: 40
    blocks: ["10B.3"]
