    drama:
      duration: "3-4 мин"
      location: "Башня Голоса, нижние этажи и коридоры"
      characters: ["Марко", "Софа", "Стражник", "Советник"]
      summary: >
        Чтобы спасти Софию, Марко должен проникнуть глубже
        в башню. Двери охраняют не замки — люди. Нужно
        ПРОЙТИ мимо, используя слова. Софа (тихо): «Марко...
        я должна тебя научить... чему-то, что мне...
        неприятно. Но другого пути нет.» Первый стражник
        у ворот — огромный, но глаза бегают. Боится.
        Софа: «Он боится. Но не тебя.» Марко должен
        использовать вопросы — не силу.
      gut_feeling: >
        Марко на другой стороне. Раньше хитрые вопросы
        задавали ему. Теперь он должен задавать сам.
        Это неприятно — как надеть чужую одежду. Но
        другого пути нет. София ждёт.
      marko_flaw: >
        Марко не хочет манипулировать — он помнит, каково
        это, когда манипулируют тобой. Но иногда вопрос —
        не манипуляция, а инструмент.

    sofa_block:
      duration: "4-5 мин"
      term_introduced: "риторический вопрос (вопрос-утверждение)"
      trigger: >
        Софа: «Третий тип хитрых вопросов — риторический
        вопрос. Это вопрос, который на самом деле не
        вопрос, а утверждение в маскировке. Человек не
        хочет ответа — хочет, чтобы ты согласился.»
        Слова-маркеры: «разве не...», «неужели ты
        думаешь...», «кто в здравом уме...», «как можно
        не понимать...». Связь с Древней Грецией: риторика —
        искусство убеждать словами, приёму 2500 лет.
        Техника: убери обёртку, верни в утверждение,
        проверь — факт, мнение или неправда. Пример:
        «Разве не понятно, что кошки лучше собак?» →
        «Кошки лучше собак» → мнение. Нюанс: инструменты
        нейтральны. Риторический вопрос может вдохновлять.
        Важно намерение, а не форма. Золотое правило:
        сначала предполагай доброе намерение.
      quizzes:
        count: 5
        source: "brief 10B sc4 (9v, выбираем 5)"
        description: >
          sc4 (5v): настоящий вопрос или утверждение в
          маскировке + раскрытие утверждения и определение
          факт/мнение/неправда (честно?, домашка, брокколи,
          лето, приметы).
      rule: >
        «Риторический вопрос — утверждение (мнение) в
        маскировке вопроса. Техника: убери обёртку → верни
        в утверждение → проверь: факт, мнение или неправда.
        Инструмент нейтрален — важно намерение.»
      life_question: >
        «Реклама: "Разве не каждый ребёнок заслуживает
        лучшего?" Это вопрос или утверждение? Что именно
        продвигают?»

    challenge:
      duration: "5-6 мин"
      summary: >
        Марко проникает в башню. Стражник у ворот —
        Софа: «Он боится. Задай вопрос.» Марко: «Если
        не пропустишь — Голос узнает, что задержал
        посланника.» Стражник пропускает. Марко чувствует
        тяжёлый камень на груди — тот же, что раньше,
        когда манипулировали ИМ. Теперь он на другой
        стороне. Камень тот же. Софа молчит. Советник
        в коридоре — Марко строит вопрос: «Когда Голос
        в последний раз менял код от зала?» Советник
        отвечает машинально, выдавая информацию. Софа:
        «Ты только что сделал то, что Голос делает каждый
        день. Как ощущения?» Обзорный блиц: все типы
        хитрых вопросов вперемешку + ложные дилеммы
        из урока 10A.
      quizzes:
        count: 9
        source: "sc4 остаток (4v) + sc6 (9v, выбираем 5)"
        description: >
          sc4 (4v): настоящий вопрос или утверждение
          (овощ, время на игры, Земля вокруг Солнца,
          карандаш — adapted to story).
          sc6 (5v): обзорный тест — все типы дня 10
          вперемешку (или-или, составной, ловушка,
          риторический, ложная дилемма).
      vera_role: ""
      rey_role: ""
      voice_role: >
        Голос — незримое присутствие. Его система
        охраняет башню. Стражники и советники — его
        инструменты.

    cliffhanger:
      duration: "1-2 мин"
      summary: >
        Марко проник в башню. Но внутри — зал. Рей
        на сцене. Толпа. Марко понимает: чтобы пройти
        дальше, нужно перехватить толпу у Рея. Софа:
        «Марко... следующий шаг — самый опасный. Нужно
        не просто пройти мимо. Нужно говорить. Как Рей.
        Но — по-другому.» Число на экране: 20. Упало
        ещё на два. Время уходит.
      sofa_reaction: "«Ты использовал вопросы как оружие. Теперь — речь. Это... другой уровень.»"
      next_episode_hook: "Рей на сцене. Толпа. Марко должен перехватить аудиторию. Слова — оружие. Но какой ценой?"

    quiz_distribution:
