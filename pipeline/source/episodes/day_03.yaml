# EPISODE PLAN — День 3
# Уроки: 3A, 3B
# Акт: I — Пробуждение
# Source episodes: 7, 8
# Статус: ЧЕРНОВИК

day: 3
lessons: ["3A", "3B"]
story_arc: "Акт I: Пробуждение"
story_summary: "Ссора с Линой. Макс. ПЕРВОЕ СТИРАНИЕ Леона. Вера вытягивает информацию"
source_episodes: [7, 8]

# =====================================================================
# ЭПИЗОД 9 — «Три цели спора»
# =====================================================================
episodes:

  - ep: 9
    blocks: ["3A.1"]
    title: "Три цели спора"
    terms_introduced: ["три цели спора"]
    terms_used: ["факт", "мнение", "неправда", "причина", "совпадение", "третья причина"]
    total_quizzes: 15

    drama:
      duration: "3-4 мин"
      location: "Зеркальный Город, улица у дома Леона"
      characters: ["Марко", "Лина", "Софа"]
      summary: >
        Марко и Лина вернулись от Леона. Марко хочет отказаться от
        артефактов — каждый раз, когда он их использует, число падает.
        Лина взрывается: «Без них мы слепые! Ты хочешь потерять
        ещё кого-то?!» Марко кричит в ответ: «Ты ничего не понимаешь!»
        Настоящая ссора — громкая, злая, с обидными словами. Лина
        разворачивается и уходит. Марко стоит один. В кармане вибрирует
        Софа.
      gut_feeling: >
        Жжёт в горле — как будто наглотался чего-то горячего.
        Марко знает, что сказал лишнее. Но остановиться не смог.
        Тело помнит крик раньше, чем голова.
      marko_flaw: >
        Марко не слушал Лину — он защищался. Каждое её слово
        было атакой, на которую нужно ответить громче. Он спорил
        не чтобы понять, а чтобы победить. И победил — но Лина ушла.

    sofa_block:
      duration: "4-5 мин"
      term_introduced: "три цели спора"
      trigger: >
        Софа: «Марко... модуль конфликта... загружаю. Ты только что
        спорил с Линой. Зачем? Чего ты хотел — победить, понять
        или обидеть?» Разминка: 6 вопросов на повторение (факт/мнение/неправда,
        причина/совпадение/третья причина). Через историю Маши и Миколы:
        двое спорят, чей рисунок лучше, пока Оленка не предлагает
        найти хорошее в чужой работе. Вводятся три цели спора:
        ПОБЕДИТЬ, ПОНЯТЬ, ОБИДЕТЬ. Ключевая фраза: «Когда хочешь
        ПОНЯТЬ — находишь друга. Когда хочешь ПОБЕДИТЬ — находишь врага.»
        Пример велосипедов: «мой быстрее, и точка!» vs «давай измерим!»
        vs «у тебя некрасивый старый велосипед».
      quizzes:
        count: 6
        source: "book ep_009"
        description: >
          Разминка (6v повторение): «В сутках 24 часа» → факт,
          «Собаки — лучшие» → мнение, «Луна больше Солнца» → неправда,
          «Уронил телефон» → причина, «Помыл машину» → совпадение,
          «Зонты и сапоги» → третья причина. Затем 2v Маша/Микола +
          4v велосипед/бег/книга/игра (вошли в sofa_block).
      rule: >
        «У спора три цели: победить, понять или обидеть.
        Полезная цель — только ПОНЯТЬ. Прежде чем открыть рот —
        спроси себя: я сейчас хочу что?»
      life_question: >
        «Друг говорит: "Твоя команда — отстой!" Какая у него цель —
        победить, понять или обидеть?»

    challenge:
      duration: "5-6 мин"
      summary: >
        Марко вспоминает ссору с Линой. Софа разбирает каждую
        реплику: «"Ты ничего не понимаешь!" — цель?» Марко
        честно: «Победить.» «"Без них мы слепые!" — цель Лины?»
        Марко думает. «Понять... она боится за нас.» Новый взгляд:
        Лина не нападала — она боялась. А Марко атаковал в ответ.
        Практика: определить цель в разных ситуациях, включая
        сложные случаи из повседневной жизни.
      quizzes:
        count: 9
        source: "book ep_009"
        description: >
          Марко и Лина пробуют заново — цель «понять». Лина привела
          аргумент → понять. Марко привёл аргумент → понять.
          Бег: 3v (победить/понять/обидеть).
          Книга: 2v (победить/понять). Всего 7 основных квизов
          + 2 жизненных ситуации (игра, друг с мячом).
      vera_role: ""
      rey_role: ""
      voice_role: ""

    cliffhanger:
      duration: "1-2 мин"
      summary: >
        Лина протягивает руку — помочь встать. При рукопожатии
        Марко видит серые нитки на запястье: вчера была одна,
        сегодня — три. Лина одёргивает рукав. Оба заметили,
        оба молчат. Число: 42. Минус один — без артефактов.
        Софа: «Третья причина... активна. Кто-то стирает.»
      sofa_reaction: "«Передача данных... обнаружена. Источник... Лина.»"
      next_episode_hook: "Что Лина передавала? Кому? Можно ли ей доверять?"

    quiz_distribution:
      from_brief: 36
      added_story: 0
      moved_to_extra: 21
      total: 15

    extra_practice:
      count: 21
      source: "sc1 остаток (5v повторение факт/мнение/неправда) + sc2 целиком (16v повторение причина/совпадение/третья причина)"
      description: >
        Разминка по предыдущим урокам: факт/мнение/неправда
        и причина/совпадение/третья причина. Повторение
        ранее введённых терминов. Допрактика после эпизода.

  # =====================================================================
  # ЭПИЗОД 10 — «Солдат и разведчик»
  # =====================================================================
  - ep: 10
    blocks: ["3A.2"]
    title: "Солдат и разведчик"
    terms_introduced: ["солдат", "разведчик"]
    terms_used: ["три цели спора", "факт", "мнение"]
    total_quizzes: 15

    drama:
      duration: "3-4 мин"
      location: "Зеркальный Город, ступени у подвала Леона"
      characters: ["Марко", "Лина", "Вера", "Софа"]
      summary: >
        Утро. Марко на ступенях подвала Леона. Софа напоминает
        о вчерашней цели — «победить». Вводятся солдат и разведчик.
        Лина приходит. Марко извиняется / задаёт вопрос.
        Компромисс: артефакты — только когда нужно. Вера: «Уступи
        первым — это зрелость.» Марко соглашается, но внутри —
        заноза. Вера не сказала «разберитесь», сказала «уступи».
        Правильность как вата — заглушает сомнение.
      gut_feeling: >
        «Поступил по-взрослому» — но почему тогда внутри пусто?
        Как будто уступил не потому что хотел, а потому что Вера
        попросила. Её улыбка — тёплая снаружи, холодная внутри.
      marko_flaw: >
        Марко согласился с Верой — не потому что подумал, а потому
        что она взрослая и говорит уверенно. Привычный паттерн:
        соглашаться с авторитетным голосом.

    sofa_block:
      duration: "4-5 мин"
      term_introduced: "солдат, разведчик"
      trigger: >
        Драма-ретроспектива (НЕ в чат Софы, а в автор-нарратив):
        Марко закрывает глаза и перед внутренним экраном представляет
        две фигуры. Первая — СОЛДАТ: за каменной стеной, в руках щит
        «Моё мнение», на любой вопрос стрелой — кричит «не пущу!».
        Может быть даже прав — но ему важна победа, не истина. Вторая —
        РАЗВЕДЧИК: идёт по полю с биноклем и блокнотом, улыбается.
        Для него чужое мнение не стрела, а карта. В тот же кадр
        приходит спор о шоколаде и яблоках — солдат давит «очевидно!»,
        разведчик разбирается через витамины и сахар. Тот же вывод,
        но солдат пришёл случайно, разведчик — осознанно. Из этой
        визуализации Марко собирает термины. В чате Софы — короткий
        итог и переход к голосованию.
      quizzes:
        count: 6
        source: "book ep_010"
        description: >
          Парные ситуации солдат/разведчик из книги:
          самолёт (2v), снег (2v), планеты (2v).
          Далее: железо vs вата (2v), «может быть» (1v),
          ошибка в задаче (1v) — всего 10v, 6 в sofa_block.
      rule: >
        «Солдат защищает позицию. Разведчик ищет истину.
        Солдат прав случайно. Разведчик прав осознанно —
        потому что проверил. Прежде чем спорить — выбери, кто ты.»
      life_question: >
        «Ты споришь с другом о фильме. Друг: "Этот фильм — лучший!"
        Ты: "Нет, худший!" Вы оба сейчас — кто?»

    challenge:
      duration: "5-6 мин"
      summary: >
        Софа разбирает сцену с Верой: «Лина предложила: "Давай
        использовать артефакты осторожно." Это компромисс или
        уступка? Кто здесь уступил?» Марко понимает: компромисс
        нашли с Линой, а потом Вера заставила его уступить больше,
        чем нужно. Марко разведчик с Линой — но солдат-который-сдался
        с Верой. Финальная практика: смешанные ситуации на всё —
        цель (победить/понять/обидеть) + роль (солдат/разведчик).
      quizzes:
        count: 9
        source: "book ep_010"
        description: >
          Финальный раунд — цель + роль одновременно:
          плавание vs бег (3v: солдат/разведчик/обидеть),
          карандаш (2v: солдат/разведчик),
          лев vs тигр (2v: солдат/разведчик),
          мультик (1v: обидеть), собаки/кошки (1v: разведчик).
      vera_role: >
        «Вы оба правы. Но ты старше — уступи первым.»
        Давление через ответственность + апелляция к зрелости.
        Марко ещё не распознаёт этот приём.
      rey_role: ""
      voice_role: ""

    cliffhanger:
      duration: "1-2 мин"
      summary: >
        При рукопожатии рукав Лины задирается — серая нитка.
        Тонкая, обмотана дважды, как по линейке. Маркер Системы.
        Марко молчит — он теперь разведчик. Разведчик запоминает,
        записывает в блокнот, улыбается. Софа фиксирует.
        Три зацепки: нитка, улыбка Веры, число 42.
        Громкоговоритель: «Вопросы — признак слабости.»
        Марко улыбается — впервые за три дня по-настоящему.
      sofa_reaction: "Мигает тревожно, но молчит — как и Марко"
      next_episode_hook: "Серая нитка — маркер агента. Лина работает на Систему? Что видел Марко?"

    quiz_distribution:
      from_brief: 21
      added_story: 0
      moved_to_extra: 6
      total: 15

    extra_practice:
      count: 6
      source: "sc6 остаток (6v финальная практика: цель + роль)"
      description: >
        Финальная практика на все термины дня: определить и цель,
        и роль спорящего. Смешанные ситуации из повседневной жизни.
        Допрактика после эпизода.

  # =====================================================================
  # ЭПИЗОД 11 — «Слова врут. Тело — нет»
  # =====================================================================
  - ep: 11
    blocks: ["3B.1", "3B.2"]
    title: "Слова врут. Тело — нет"
    terms_introduced: ["эмпатия (сопереживание)", "активное слушание"]
    terms_used: ["солдат", "разведчик", "три цели спора"]
    total_quizzes: 12

    drama:
      duration: "3-4 мин"
      location: "Зеркальный Город, переулок"
      characters: ["Марко", "Макс", "Софа"]
      summary: >
        Марко один — идёт по переулку Зеркального Города.
        Из тени выходит парень — Макс, 14 лет. Наполовину стёртое
        лицо: левая сторона — нормальная, правая — как выцветшая
        фотография. Потерял брата — стирание забрало память о нём.
        Макс: «Слова врут. Тело — нет. Когда брат пропал, все
        говорили "всё будет хорошо". Но их руки дрожали.» Макс
        учит Марко: смотри не на слова — на плечи, на руки, на
        взгляд. Марко впервые встречает кого-то, кто ПОНИМАЕТ.
      gut_feeling: >
        Тепло и больно одновременно. Макс знает, каково это —
        потерять. Его полустёртое лицо — как зеркало того,
        что может случиться с Марко.
      marko_flaw: >
        Марко хочет сразу рассказать всё — про Софию, про
        артефакты, про Лину. Хочет довериться, потому что Макс
        понимает. Но после Леона — страшно. Доверие стоит жизней.

    sofa_block:
      duration: "4-5 мин"
      term_introduced: "эмпатия (сопереживание), активное слушание"
      trigger: >
        Софа: «Макс сказал: "Тело не врёт." София записала:
        "Это спасёт тебе жизнь." Но сначала — инструменты
        разведчика.» Напоминание: разведчик без инструментов —
        как юмористический пример из урока: разведчик с биноклем,
        который кричит «ГОВОРИ НЕМЕДЛЕННО!» (инструменты без
        уважения не работают). Первый инструмент — ЭМПАТИЯ
        (сопереживание): тормоз, который срабатывает ДО того,
        как скажешь обидное. Метафора: сопереживание — антенна
        разведчика. Три фразы-помощника: «Я понимаю, что тебе...»,
        «Тебе, наверное, обидно, когда...», «Я вижу, что тебе
        это важно...». Второй инструмент — АКТИВНОЕ СЛУШАНИЕ:
        слушать так, чтобы человек ВИДЕЛ, что ты слышишь.
        Ключевой приём — пересказ. Контраст: «Угу, понятно»
        vs «То есть тебя не позвали, и тебе обидно?».
        Три фразы-помощника: «Правильно ли я понял, что...»,
        «Ты имеешь в виду, что...», «То есть ты хочешь...».
      quizzes:
        count: 5
        source: "book ep_011"
        description: >
          Есть сопереживание или нет — 5v из книги:
          «Мне всё равно» → нет, «Я понимаю, что тебе страшно» → да,
          «Хватит ныть» → нет, «Тебе, наверное, было больно» → да,
          «Ты всегда так говоришь» → нет.
      rule: >
        «Два инструмента разведчика: сопереживание — тормоз
        (сначала почувствуй, потом говори). Активное слушание —
        зеркало (повтори своими словами, чтобы человек видел:
        ты слышишь).»
      life_question: >
        «Друг говорит: "Меня не взяли в команду." Ты отвечаешь:
        "Ну и ладно, в следующий раз возьмут." Есть тут
        сопереживание?»

    challenge:
      duration: "5-6 мин"
      summary: >
        Марко пробует инструменты на Максе. Макс рассказывает
        про брата — Марко пересказывает: «То есть ты видел,
        как его лицо начало бледнеть, и ничего не мог сделать?»
        Макс: «Да. Именно так.» Впервые кто-то его УСЛЫШАЛ.
        Практика: определить — есть пересказ или нет, есть
        сопереживание или нет. Ситуации из повседневной жизни.
      quizzes:
        count: 7
        source: "book ep_011"
        description: >
          Сопереживание (1v): «Если не согласишься — обижусь» → нет.
          Пересказ (5v из книги): «То есть ты видел...» → да,
          «Да-да, понял» → нет, «Ты говоришь, что хочешь помнить?» → да,
          «Ну ладно, не переживай» → нет,
          «Если я правильно понял, ты злишься на себя?» → да.
          + 1v «Я вижу, что тебе важно найти брата» (Марко к Максу).
      vera_role: ""
      rey_role: ""
      voice_role: ""

    cliffhanger:
      duration: "1-2 мин"
      summary: >
        Макс: «Есть человек — профессор. Он знает про Систему
        больше всех.» Марко: «Леон?» Макс: «Он последний, кто помнит.
        Но торопись — число падает быстрее.» Софа: «Число... 41.
        Стирание... ускоряется.» Экран гаснет. 1% батареи.
        Марко бежит.
      sofa_reaction: "«Число... 41. Стирание... ускоряется.»"
      next_episode_hook: "Марко идёт к Леону — но успеет ли? Число падает быстрее."

    quiz_distribution:
      from_brief: 12
      added_story: 0
      moved_to_extra: 0
      total: 12

  # =====================================================================
  # ЭПИЗОД 12 — «Формула высказывания»
  # =====================================================================
  - ep: 12
    blocks: ["3B.3"]
    title: "Формула высказывания"
    terms_introduced: ["формула высказывания"]
    terms_used: ["эмпатия (сопереживание)", "активное слушание", "солдат", "разведчик", "три цели спора"]
    total_quizzes: 15

    drama:
      duration: "3-4 мин"
      location: "Зеркальный Город, дом Леона"
      characters: ["Марко", "Леон", "Вера", "Софа"]
      summary: >
        Марко бежит к Леону (четвёртый визит). Леон нервничает:
        плечи сжаты, взгляд бегает. Достаёт кабель — оборудование
        Системы — заряжает Софу до 18%. Начинает рассказывать:
        «Система не всегда была такой. Был учитель...» Прямо
        посередине фразы глаза Леона СЕРЕЮТ. Радужка: карая, карая,
        серая. «Кто ты? Где я?» — «Моё имя не Леон.» Уходит как
        чужой. ПЕРВЫЙ СОЮЗНИК — СТЁРТ. Число: 40.
      gut_feeling: >
        Как будто вырвали страницу из книги — прямо ту, которую
        читал. Леон стоял здесь секунду назад. Говорил. А теперь —
        чужой человек с пустыми глазами. Марко не может вдохнуть.
      marko_flaw: >
        Софа скажет позже: Марко приходил к Леону четыре раза.
        Каждый раз Голос узнавал, где он. Леон стёрт не случайно.
        Марко привёл их к нему. Доверие Марко — оружие, которое
        убивает тех, кому он доверяет.

    sofa_block:
      duration: "4-5 мин"
      term_introduced: "формула высказывания"
      trigger: >
        Драма-ретроспектива (НЕ в чат Софы, а в автор-нарратив).
        Вера появилась, обняла, спросила — Марко в шоке рассказал всё.
        После её ухода — тишина, как будто из комнаты вынесли что-то
        ценное. Марко сидит один и разбирает. Четыре визита к Леону —
        четыре точки на карте. Доверие — оружие. В голове всплывают
        две картинки: два соседа через забор. В одной оба кричат
        «ты ВСЕГДА ставишь мусор у моих ворот, ты жадный!» — через
        минуту они уже не слышат друг друга. Во второй — тот же сосед
        говорит медленно: «я вижу, что мусор снова у моих ворот. мне
        неприятно. давай договоримся куда его ставить?» Из этой
        картинки Марко собирает: ФОРМУЛА ВЫСКАЗЫВАНИЯ — наблюдение
        («я вижу, что...» — факт без оценки) + чувство («мне...» —
        своё, не обвинение) + предложение («давай...» — приглашение).
        Формула работает в обе стороны: инструмент говорить и щит
        чтобы не отдать лишнего. Маркеры обвинения: «всегда», «никогда»,
        «вечно», «специально», «ты такой-то». В чате Софы — короткий
        итог: формула + маркеры + вопрос «описание или обвинение?».
      quizzes:
        count: 6
        source: "book ep_012"
        description: >
          Описание или обвинение — 6v из книги:
          «Ты никогда не слушаешь» → обвинение,
          «Я заметил, что ты не ответил» → описание,
          «Ты вечно опаздываешь» → обвинение,
          «Сегодня ты пришёл позже» → описание,
          «Ты специально мешаешь» → обвинение,
          «Я заметила, что ты взял ручку» → описание.
      rule: >
        «Формула высказывания: наблюдение + чувство + предложение.
        Говори про СЕБЯ, а не нападай на ДРУГОГО. "Я вижу...",
        "Мне...", "Давай..." — три шага, чтобы спорить и не
        ссориться.»
      life_question: >
        «Друг взял твой телефон без спроса. Солдат скажет:
        "Ты вечно берёшь чужое!" А разведчик? Попробуй
        формулу.»

    challenge:
      duration: "5-6 мин"
      summary: >
        Марко понимает: Вера вытянула информацию через заботу.
        Он не нападал — но и не защитился. Формула высказывания —
        не только для атаки, но и для защиты. Смешанная практика:
        какой инструмент использован (сопереживание, активное
        слушание или формула)? Комбинированный пример: Маша и стул
        Дмитрика — все три инструмента вместе. Метафоры
        инструментов: сопереживание — тормоз, активное слушание —
        зеркало, формула — карта.
      quizzes:
        count: 9
        source: "book ep_012"
        description: >
          Какой инструмент — 6v из книги:
          формула (Марко Максу), активное слушание (Марко Лине),
          сопереживание (Марко Максу про «будь сильным»),
          формула (ластик), активное слушание (рюкзак),
          сопереживание (пустой стул).
          Multichoice 3v: все три инструмента (Марко Максу),
          Вера без формулы, формула бы защитила.
      vera_role: >
        Вера обнимает и вытягивает информацию через заботу.
        Марко рассказал всё — в шоке от стирания Леона.
        Пока — «заботливая учительница». Правда откроется позже.
      rey_role: ""
      voice_role: ""

    cliffhanger:
      duration: "1-2 мин"
      summary: >
        Софа: «Ты привёл их к Леону. И только что рассказал
        Вере — всё. Кому попадёт информация?» Число: 40. Марко
        смотрит на руки — тепло от объятий Веры. «Я должен был
        молчать?» Софа молчит. Экран мигает и гаснет.
        Самый опасный солдат — тот, который выглядит как друг.
      sofa_reaction: "Молчит. Экран мигает и гаснет — впервые нет ответа"
      next_episode_hook: "Куда попала информация, которую Марко рассказал Вере? Кто следующий после Леона?"

