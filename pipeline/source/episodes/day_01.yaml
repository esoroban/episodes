# EPISODE PLAN — День 1
# Уроки: 1A, 1B
# Акт: I — Пробуждение
# Source episodes: 1, 2
# Статус: УТВЕРЖДЁН (2026-04-12)

day: 1
lessons: ["1A", "1B"]
story_arc: "Акт I: Пробуждение"
story_summary: "Исчезновение Софии. Мама не помнит. Софа включается. Лина помнит"
source_episodes: [1, 2]

# =====================================================================
# ЭПИЗОД 1 — «Утро без сестры»
# =====================================================================
episodes:

  - ep: 1
    blocks: ["1A.1"]
    title: "Утро без сестры"
    terms_introduced: ["факт", "мнение"]
    terms_used: []
    total_quizzes: 15

    drama:
      duration: "3-4 мин"
      location: "Квартира Марко, утро"
      characters: ["Марко", "мама", "Софа"]
      summary: >
        Марко просыпается. Кровать Софии пуста. Мама не помнит дочь.
        Фото на стене — пусты. Марко почти верит маме: она говорит
        уверенно, а он привык соглашаться. Находит старый телефон
        с треснутым экраном в комнате Софии. Включает. Софа: «Я — Софа.
        Образовательный помощник. Версия 0.7. Не финальная.»
      gut_feeling: >
        Тяжесть в животе, как перед контрольной, к которой не готовился.
        Мама говорит уверенно — но что-то не так. Марко не может назвать что.
      marko_flaw: >
        Марко почти кивает маме. Она говорит так уверенно, а он привык
        соглашаться с уверенными. Ещё секунда — и он бы поверил.

    sofa_block:
      duration: "4-5 мин"
      term_introduced: "факт, мнение"
      trigger: >
        Софа берёт спор из дневника: «Шоколадное лучше? Клубничное?
        Кто прав — София или Марко?» Мягкий ввод через близкое, знакомое.
      quizzes:
        count: 6
        source: "book ep_001"
        description: >
          Только два варианта: факт или мнение (неправда ещё НЕ введена).
          1. «Шоколадное лучше? Клубничное? Кто прав?» (мнение — нет «вкусомера», у каждого своё)
          2. «"София — лучшая сестра." Факт или мнение?» (мнение — нельзя измерить)
          3. «Дневник Софии лежит на полке. Факт или мнение?» (факт — можно потрогать)
          4. «"В классе 25 учеников." Факт или мнение?» (факт — можно посчитать)
          5. «"Математика — скучный предмет." Факт или мнение?» (мнение — нет «скучномера»)
          6. «"Киев — столица Украины." Факт или мнение?» (факт — можно проверить)
      rule: >
        «Факт — можно проверить. Мнение — нельзя. Если не можешь проверить —
        это не факт, даже если звучит уверенно.»
      life_question: >
        «Друг сказал: "Все так делают." Это факт или мнение?»

    challenge:
      duration: "5-6 мин"
      summary: >
        Софа разблокирует запись Софии (3 секунды): «Братик, начни с дневника.
        Я верю в тебя.» Марко слушает три раза. Решает идти в школу с дневником.
        Школа: пустая парта с девятью наклейками котов. Данила: «Тебе приснилось.»
        Марко показывает дневник — Олена, Витя не верят. Софа вибрирует в кармане,
        запускает экспресс-тест. Все квизы привязаны к сюжету.
      quizzes:
        count: 9
        source: "book ep_001"
        description: >
          Экспресс-голосование: только факт или мнение (без неправды!).
          Все привязаны к сюжету — к тому, что Марко видел/слышал:
          1. «Голос Софии тёплый.» (мнение — «тёплый» нельзя измерить)
          2. «На стене висели четыре рамки.» (факт — можно посчитать)
          3. «У телефона Софы треснут экран.» (факт — видно глазами)
          4. «Рамки на стене пустые.» (факт — можно посмотреть)
          5. «Мама говорит громко.» (факт — громкость измерима)
          6. «У Марко в комнате две кровати.» (факт — посчитай)
          7. «Вера Андреевна говорит тихо.» (факт — тихо/громко измеримо)
          8. «Дневник лежал рядом с телефоном.» (факт — видел своими глазами)
          9. «Фотографии Софии исчезли.» (факт — рамки пусты)
      vera_role: >
        «Ты переутомился. Принеси мне дневник — я за тебя переживаю.»
        Манипуляция: лесть + забота как извлечение информации.
      rey_role: ""
      voice_role: ""

    cliffhanger:
      duration: "1-2 мин"
      summary: >
        Вера в коридоре: серый кардиган, тёплые глаза, рука на плече.
        «Ты переутомился. Принеси мне дневник.» Марко почти отдаёт —
        тело решает быстрее головы, руки прижимают рюкзак к груди.
        У запасного выхода — Лина: «Я помню Софию. Но нам нельзя
        говорить. Они слушают.» Кто — «они»?
      sofa_reaction: "Вибрирует тревожно, но молчит"
      next_episode_hook: "Кто такая Лина? Кто «они»? Можно ли ей верить?"

    quiz_distribution:
      from_brief: 15
      added_story: 0
      moved_to_extra: 0
      total: 15

  # =====================================================================
  # ЭПИЗОД 2 — «Неправда и её виды»
  # =====================================================================
  - ep: 2
    blocks: ["1A.2"]
    title: "Неправда и её виды"
    terms_introduced: ["неправда"]
    terms_used: ["факт", "мнение"]
    total_quizzes: 23

    drama:
      duration: "3-4 мин"
      location: "Школа, коридор, столовая, класс"
      characters: ["Марко", "Вера", "Олена", "Витя", "Данила", "Софа"]
      summary: >
        После ухода Лины. Марко бежит на урок. Пустая парта, Данила косится.
        На перемене — Олена шепчется («хочет, чтобы пожалели»), Витя подходит
        прямо («все говорят», «ни один человек»). В школьном чате — «выдумал
        сестру, чтобы не делать домашку» (6 лайков). У кабинета биологии —
        «типа шутка». В столовой — дракон с блинчиками (сказка). В чате —
        «мама водила к психологу» (11 лайков, фейк). Софа реагирует на каждую
        реплику, вплетая урок. Школа — стена неверия, но Софа превращает
        каждую колючку в упражнение.
      gut_feeling: >
        Заноза. Та же заноза, что утром. Только теперь заноз много.
        Целый школьный коридор колючек. «Все говорят» бьёт как мяч в живот.
      marko_flaw: >
        Марко не может ответить Вите — слово «все» парализует.
        Хочет закричать в чате «ЭТО НЕПРАВДА!» — но пальцы не двигаются.

    sofa_block:
      duration: "4-5 мин"
      term_introduced: "неправда"
      trigger: >
        Софа реагирует прямо на реплики одноклассников: «Он хочет,
        чтобы пожалели» (мнение — нет «хотемера»), «Все говорят» (неправда —
        Лина помнит), чат про домашку (неправда — проверяемо). У кабинета
        биологии парень говорит «типа шутка» — Софа вводит три вида:
        шутка, сказка, фейк. Дракон с блинчиками = сказка, чат про
        психолога = фейк. Итог на подоконнике: «измеример» — можно ли
        измерить? Дмитрик и отмена уроков — неправда как свойство информации.
      quizzes:
        count: 10
        source: "book ep_002"
        description: >
          Все привязаны к сюжету. На подоконнике — сложные случаи:
          1. «Мой папа самый сильный в мире» → неправда (силомер есть, «в мире» не подтвердится)
          2. «Моя мама самая красивая» → мнение (нет «красивомера»)
          3. «В чате 7 сообщений про Марко» → факт (посчитай)
          4. «София — лучшая сестра» → мнение (нет «лучшемера»)
          5. «В дневнике Софии 47 страниц» → факт (посчитай)
          6. «Вера переживает больше всех» → мнение (нет «переживомера»)
          7. «Все видели сообщение» → неправда (спроси каждого)
          8. «На Земле 8 континентов» → неправда (карта)
          9. «Школьный чат опаснее шёпота» → мнение (нет «опасномера»)
          10. «Дневник Софии — настоящий» → факт (потрогай, сравни почерк)
      rule: >
        «Неправду можно разоблачить — потому что она проверяема.
        А в споре мнений победителя нет. Можно сказать "окей, у тебя своё
        мнение" и пойти есть мороженое.»
      life_question: >
        «"На Земле 8 континентов." Факт, мнение или неправда?»
        (Неправда — можно проверить, при проверке не подтверждается.)

    challenge:
      duration: "5-6 мин"
      summary: >
        Последний урок, литература. Шёпот: «Марко и раньше выдумывал» — фейк.
        Вера задерживает Марко, второй раз просит дневник. «А ты сам-то
        веришь?» — давление на согласие. Марко: «У меня есть доказательство.»
        Вера улыбается шире обычного. Тройной квиз: Вера просит дневник
        дважды — помочь или получить улику? (открытый вопрос); «Вера
        говорит очень мягко» (мнение); «Они слушают» — проверяемо? (да).
        Марко не отдаёт дневник.
      quizzes:
        count: 5
        source: "book ep_002"
        description: >
          Из книги, привязаны к сюжету:
          1. «Марко и раньше выдумывал» → фейк (цель — чтобы поверили)
          2. Вера дважды просит дневник — помочь или улика? → открытый вопрос (не знаем)
          3. «Вера говорит очень мягко» → мнение (субъективная оценка)
          4. «Они слушают» → проверяемо (можно выяснить кто и как)
          (последние три — в одной сцене через interactions)
      vera_role: >
        «Принеси мне дневник, я переживаю за тебя.»
        Забота как извлечение информации — Марко ещё не понимает приём.
      rey_role: ""
      voice_role: ""

    cliffhanger:
      duration: "1-2 мин"
      summary: >
        Школьный двор, серое небо. У ворот — Лина. «Пойдём. Мне нужно
        тебе кое-что рассказать. Про Софию. Про то, как её забирали.»
        Марко идёт за ней — единственная нить. Но детали путаются:
        то «ночью», то «утром», то «в школе», то «на улице». Заноза.
        Софа вибрирует — Марко не достаёт телефон. Пока.
      sofa_reaction: "Вибрирует в кармане. Марко не достаёт — пока."
      next_episode_hook: "Детали путаются — можно ли верить Лине? Что за дверь?"

    quiz_distribution:
      from_brief: 34
      added_story: 0
      moved_to_extra: 11
      total: 23

    extra_practice:
      count: 11
      source: "sc10 брифа 1A.2 (оставшиеся финальные голосования) + sc8 (оставшиеся)"
      description: >
        Финальная проверка всех трёх терминов вперемешку.
        Включает ловушки: «все дети любят сладкое»,
        «если не съешь суп — заболеешь». Допрактика после эпизода.

  # =====================================================================
  # ЭПИЗОД 3 — «Хитрые утверждения»
  # =====================================================================
  - ep: 3
    blocks: ["1B.1", "1B.2"]
    title: "Хитрые утверждения"
    terms_introduced: ["хитрое утверждение", "отговорка", "инструменты проверки"]
    terms_used: ["факт", "мнение", "неправда"]
    total_quizzes: 15

    drama:
      duration: "3-4 мин"
      location: "Улица после школы, двор"
      characters: ["Марко", "Лина", "Софа"]
      summary: >
        После школы. Марко и Лина. Лина рассказывает: она видела,
        как Софию забирали. Но детали путаются — то «ночью», то «утром»,
        то «в школе». На каждый вопрос Марко — у Лины есть объяснение:
        «было темно», «я плохо помню», «мне страшно было, поэтому
        перепутала». Марко хочет поверить — Лина первая, кто помнит.
      gut_feeling: >
        Заноза. Когда Лина путает «ночью» и «утром» — у Марко
        дёргается что-то внутри. Он отмахивается. Не хочет замечать.
      marko_flaw: >
        Лина говорит именно то, что Марко хочет услышать. Он не замечает
        противоречий, потому что ХОЧЕТ верить. Соглашается — не потому
        что проверил, а потому что удобно.

    sofa_block:
      duration: "4-5 мин"
      term_introduced: "хитрое утверждение, отговорка, инструменты проверки"
      trigger: >
        Софа: «Лина говорит "я видела своими глазами." Потом: "было темно,
        я плохо помню." На каждый вопрос — готовый ответ. Знакомый паттерн...»
        Вводится «хитрое утверждение» через историю Вити и волшебного камня
        (из брифа). Затем «отговорка»: причина, которая закрывает путь
        к проверке. Затем «инструменты проверки»: 5 помощников.
      quizzes:
        count: 6
        source: "book ep_003"
        description: >
          Все привязаны к рассказу Лины — нормальное объяснение или отговорка?
          1. «ночью» и «утром» — оба факт одновременно? (да — два разных момента)
          2. «видела, но было темно, не помню деталей» (отговорка — закрывает проверку)
          3. «я сонная была в три ночи» (нормальное — реальная причина)
          4. рисунок по памяти на следующий день — доказательство? (слабое)
          5. «боялась, что увидят» (нормальное — страх реален, рисунок нарисован)
          6. «не могу рассказать, они слушают» (на границе — может быть правда)
      rule: >
        «Если на каждую проверку есть отговорка — верить на слово
        необязательно. Спроси: "А КАК это можно проверить?"»
      life_question: >
        «Друг говорит: "Я пробежал 100 м за 8 секунд, но только когда
        никто не смотрит." Хитрое утверждение?»

    challenge:
      duration: "5-6 мин"
      summary: >
        Марко пробует проверить Лину. Задаёт один и тот же вопрос
        дважды, в разное время. Ответы не совпадают — но Лина объясняет.
        Софа: «Несовпадение — не значит ложь. Но значит — проверяй
        дальше.» Квизы на инструменты проверки: есть подходящий
        инструмент или нет?
      quizzes:
        count: 9
        source: "book ep_003"
        description: >
          Привязаны к сюжету — отговорки Лины + инструменты проверки:
          7. «точно знаю кто забрал, назвать не могу» (отговорка)
          8. «из окна» vs «с балкона» — врёт? (не обязательно)
          9. «поверь мне» — аргумент? (нет — просьба)
          10. рисунок Лины весит 20г — инструмент? (есть — весы)
          11. в комнате 18 градусов — инструмент? (есть — термометр)
          12. рассказ самый убедительный — инструмент? (нет)
          13. машина стояла 15 секунд — инструмент? (есть — секундомер)
          14. ждать у спортзала страшно — инструмент? (нет)
          15. сестра и чашка — три версии подряд (отговорка)
      vera_role: ""
      rey_role: ""
      voice_role: ""

    cliffhanger:
      duration: "1-2 мин"
      summary: >
        Лина ведёт Марко в парк. «Здесь дверь.» Марко не видит ничего.
        Софа мигает: «Дверь... обнаружена. Но ты не готов.
        Нужен следующий урок.» Экран гаснет.
      sofa_reaction: "«Дверь... обнаружена. Но ты не готов.»"
      next_episode_hook: "Что за дверь? Почему Софа говорит «не готов»?"

    quiz_distribution:
      from_brief: 24
      added_story: 0
      moved_to_extra: 9
      total: 15

    extra_practice:
      count: 9
      source: "sc1 брифа 1B.1 (6v повторение факт/мнение/неправда) + sc4 остаток (3v)"
      description: >
        Повторение: факт, мнение или неправда (быстрые голосования).
        Допрактика после эпизода.

  # =====================================================================
  # ЭПИЗОД 4 — «Детектив правды»
  # =====================================================================
  - ep: 4
    blocks: ["1B.3"]
    title: "Детектив правды"
    terms_introduced: ["детектив правды"]
    terms_used: ["факт", "мнение", "неправда", "хитрое утверждение", "отговорка", "инструменты проверки"]
    total_quizzes: 36

    drama:
      duration: "3-4 мин"
      location: "Парк, невидимая дверь"
      characters: ["Марко", "Лина", "Софа"]
      summary: >
        Парк. Невидимая дверь. Лина: «Она здесь. Я знаю.» Марко: «Откуда?»
        Лина: «Просто знаю.» Марко не видит — но Лина уверена, а он привык
        соглашаться с уверенными. Софа видит дверь — но у неё другой вопрос.
      gut_feeling: >
        Ноги не хотят идти. Голова говорит «да», а ноги говорят «стой».
        Марко идёт — потому что Лина уже шагнула.
      marko_flaw: >
        Лина шагает уверенно — и этого Марко достаточно.
        Он не спрашивает «откуда ты знаешь?» — потому что боится
        услышать ответ. Идёт следом, как всегда.

    sofa_block:
      duration: "4-5 мин"
      term_introduced: "детектив правды"
      trigger: >
        Софа: «Лина говорит "просто знаю." Это проверяемое утверждение?»
        Синтез всего урока в систему «детектив правды» из трёх вопросов:
        1) есть ли инструмент? 2) человек согласен проверить или отговорка?
        3) проверили — подтвердилось?
      quizzes:
        count: 10
        source: "book ep_004"
        description: >
          Сюжетные quizы из книги: «невидимая дверь» — проверяемое (руки);
          «просто знаю» — не доказательство (ощущение);
          «давай» — согласие на проверку; «просто поверь мне» — отговорка;
          трижды сквозь забор — подтвердилось (три из трёх);
          батч: Лина была здесь (проверяемое), дверь 80 см (проверяемое),
          лучший город (мнение), Голос и доверие (хитрое).
      rule: >
        «Три вопроса детектива: есть инструмент? Нет отговорок?
        Что показала проверка? Если нельзя проверить — верить
        необязательно.»
      life_question: >
        «Одноклассник говорит: "Я видел НЛО, но фотографировать
        было нельзя — они запрещают." Что скажет детектив?»

    challenge:
      duration: "5-6 мин"
      summary: >
