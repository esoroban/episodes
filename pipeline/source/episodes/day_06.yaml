# EPISODE PLAN — День 6
# Уроки: 6A, 6B
# Акт: II — Обучение через боль
# Source episodes: 14, 15, 16
# Статус: ЧЕРНОВИК

day: 6
lessons: ["6A", "6B"]
story_arc: "Акт II: Обучение через боль"
story_summary: "72 часа Макса. Противоречия Голоса. СТИРАНИЕ МАКСА"
source_episodes: [14, 15, 16]

episodes:

  # =====================================================================
  # ЭПИЗОД 21 — «Поворотник»
  # =====================================================================
  - ep: 21
    blocks: ["6A.1", "6A.2"]
    title: "Поворотник"
    terms_introduced: ["уклонение от ответа (поворотник)", "смена темы", "смена тональности", "ответ на другой вопрос"]
    terms_used: ["баланс способов", "доверие (Этос)", "чувства (Пафос)", "доказательства (Логос)", "обобщение"]
    total_quizzes: 12

    drama:
      duration: "3-4 мин"
      location: "Зеркальный Город, центральная площадь"
      characters: ["Марко", "Рей", "Макс", "Софа", "Голос"]
      summary: >
        Марко выходит из подполья. На площади — Рей. Речь:
        «ВСЕ, кто помогал мальчику — пожалели. КАЖДЫЙ его друг
        стёрт. НИКТО не побеждает Голос.» Толпа кивает. Марко
        хочет крикнуть — но часть его тоже кивает. Голос говорит
        Марко лично — тёплый, отцовский. Марко спрашивает:
        «Зачем ты стираешь?» Голос не отвечает: переключает
        тему («Как тебе нравится Город?»), шутит («Стирание —
        какое грубое слово!»), задаёт встречный вопрос («А ты
        уверен, что хочешь знать?»). Три поворотника за минуту.
        Потом — серьёзно: «У Макса — 72 часа.»
      gut_feeling: >
        Голос такой тёплый, что хочется закрыть глаза и слушать.
        Как колыбельная. Но от колыбельных не потеют ладони.
      marko_flaw: >
        Марко принимает каждый увод за ответ. Только Софа
        указывает: ни на один вопрос не ответил.

    sofa_block:
      duration: "4-5 мин"
      term_introduced: "уклонение от ответа (поворотник), смена темы, смена тональности, ответ на другой вопрос"
      trigger: >
        Софа: «Марко спросил "зачем стираешь?" Голос ответил
        ТРИ раза — и ни разу по существу. Как машина: включил
        поворотник и уехал в другую сторону.» Уклонение от
        ответа = поворотник. Три способа: смена темы (говорит
        о другом), смена тональности (шутка или эмоция вместо
        ответа), ответ на другой вопрос (самый коварный —
        похож на настоящий).
      quizzes:
        count: 6
        source: "brief sc6"
        description: >
          sc6 (6v): определи способ уклонения — смена темы,
          смена тональности, ответ на другой вопрос или
          честный ответ.
      rule: >
        «Поворотник — включил и уехал от вопроса. Три способа:
        сменить тему, сменить тональность, ответить на другой
        вопрос. Самый коварный — третий: похож на настоящий ответ.»
      life_question: >
        «Ты спрашиваешь друга: "Ты брал мой ластик?" Друг:
        "А ты видел мой новый пенал?" Какой поворотник?»

    challenge:
      duration: "5-6 мин"
      summary: >
        ДРАМА СНАЧАЛА, РАЗБОР ПОТОМ. Рей спускается с ящика,
        подходит к Марко. 1-на-1 на пустой площади. Марко трижды
        спрашивает «зачем Голос стирает?» — Рей трижды отвечает
        поворотниками: (1) «Я тоже когда-то задавал этот вопрос,
        сейчас понимаю больше» — ответ на другой вопрос, (2)
        «Ты думаешь, ты один страдаешь?» — смена тональности
        (обвинение), (3) «Пойдём, покажу кое-что интересное» —
        смена темы. Весь диалог — в драме, полностью. Только
        ПОСЛЕ проигранной сцены Софа в чате делает recall: по
        одной реплике Рея за квиз, разбор типа поворотника. Затем
        ещё 3 квиза — Голос/Вера/мама (воспоминания/угрозы).
      quizzes:
        count: 6
        source: "drama-then-recall + story-based"
        description: >
          3 recall-квиза по драме Марко↔Рей (с15) — по одной
          реплике Рея за квиз. Плюс 3 сюжетных квиза: Голос
          «все сопротивлявшиеся забыты», Вера «пойдём выпьем
          чаю», мама «как у тебя в школе».
      rey_role: >
        Рей — мастер поворотников. В драме s15 проигрывает все
        три типа за одну сцену. Чат не повторяет диалог — он
        ссылается на только что прожитое.
      voice_role: >
        Голос — мастер уклонения. Тёплый тон маскирует
        отсутствие ответов.
      structure_rule: >
        Диалог Марко↔Рей — ТОЛЬКО в драме, целиком. Софа-чат
        после драмы разбирает каждую реплику Рея коротким
        recall-квизом. Чат НЕ дублирует диалог.

    cliffhanger:
      duration: "1-2 мин"
      summary: >
        Марко смотрит на Макса. Правая сторона лица — уже
        совсем бледная (это старое, со встречи в Дне 3). НОВОЕ:
        левая щека впервые теряет цвет, контур размывается,
        левый глаз гаснет. То, что казалось пределом, оказалось
        началом. 72 часа. Софа: «72 часа. Проверяемо. Визуальное
        подтверждение совпадает. Это факт.» Число: 31.
      sofa_reaction: "«72 часа. Это факт. Не обобщение.»"
      next_episode_hook: "Как остановить стирание Макса? Софиины записи — ключ?"
      face_state_rule: >
        ПРАВИЛО АРКИ ЛИЦА (Day 6): базовая точка — ep_011 (День 3):
        правая сторона лица Макса уже полустёртая. Day 6 —
        ЭСКАЛАЦИЯ, не дубль. ep21: левая щека впервые теряет
        цвет. ep22: оба контура размыты. ep23: слова стирают
        ЛИЦО (не только глаз). ep23 finale: лицо почти
        прозрачное, черты не считываются. ep24: только общий
        силуэт, Макс уходит одним лицом среди десятков.

    quiz_distribution:
      from_brief: 6
      added_story: 6
      moved_to_extra: 14
      total: 12

    extra_practice:
      count: 14
      source: "sc1 (6v блиц-повторение курса) + sc2 (8v повторение 5А-5Б)"
      description: >
        Блиц по всему курсу + повторение источников.
        Допрактика после эпизода.

  # =====================================================================
  # ЭПИЗОД 22 — «Что сказал — что сделал»
  # =====================================================================
  - ep: 22
    blocks: ["6A.3", "6A.4"]
    title: "Что сказал — что сделал"
    terms_introduced: ["вопрос-детектор", "волшебная фраза (возврат к вопросу)"]
    terms_used: ["уклонение от ответа (поворотник)", "смена темы", "смена тональности", "ответ на другой вопрос"]
    total_quizzes: 14

    drama:
      duration: "3-4 мин"
      location: "Зеркальный Город, подполье"
      characters: ["Марко", "Макс", "Софа"]
      summary: >
        Марко находит файл в Софе — Софиины записи. Два
        столбца: «Что он сказал» / «Что он сделал». Десятки
        строк. «Я даю свободу» / «Запер двери». «Я не стираю —
        я защищаю» / «Леон стёрт». «Я забочусь о детях» /
        «Числа падают». София собирала доказательства. Каждое
        противоречие — зафиксировано. Последняя запись —
        дрожащий почерк.
      gut_feeling: >
        Десятки строк. Каждая — как трещина в стене. По
        отдельности — мелочь. Вместе — стена рушится.
      marko_flaw: >
        Марко хочет показать записи подполью — действовать.
        Но Софа: «Сначала научись возвращать к вопросу.
        Иначе Голос уведёт снова.»

    sofa_block:
      duration: "4-5 мин"
      term_introduced: "вопрос-детектор, волшебная фраза (возврат к вопросу)"
      trigger: >
        Софа: «Вопрос-детектор: "Ответил ли человек на ТОТ
        вопрос, который я задал?" Как на контрольной: спросили
        2+2, а написал "я люблю математику" — неверно.»
        Волшебная фраза: «Это интересно, но я спрашивал
        о другом...» Принцип: сначала признаём сказанное,
        потом спокойно возвращаемся к вопросу. Метафора GPS:
        маршрут перестроен, возвращаемся к вопросу.
      quizzes:
        count: 6
        source: "brief sc7"
        description: >
          sc7 (6v из 10): пары вопрос–ответ — определи,
          ответил или поворотник (ластик, фильм, печенье,
          телефон, окно, ещё один).
      rule: >
        «Вопрос-детектор: "Это ответ на МОЙ вопрос или на
        ДРУГОЙ?" Волшебная фраза: "Это интересно, но я
        спрашивал о другом..." — GPS разговора.»
      life_question: >
        «Ты спрашиваешь: "Можно я пойду гулять?" Мама:
        "Какая сегодня погода!" Ответила она или нет?»

    challenge:
      duration: "5-6 мин"
      summary: >
        Марко тренируется на записях Софии: в каждой паре
        «сказал/сделал» — применить вопрос-детектор. Затем
        практика волшебной фразы: вежливый возврат к вопросу.
        Финальная проверка: один вопрос — пять ответов.
      quizzes:
        count: 8
        source: "brief sc7 остаток + sc9 + sc10"
        description: >
          sc7 (4v): оставшиеся пары ответил/поворотник.
          sc9 (2v из 5): выбор вежливого возврата.
          sc10 (2v из 5): финальная проверка — ответил
          или поворотник.
      vera_role: ""
      rey_role: ""
      voice_role: ""

    cliffhanger:
      duration: "1-2 мин"
      summary: >
        Последняя запись Софии — дрожащий почерк: «Я спросила:
        "Как это совмещается?" Он ответил: "Ты не понимаешь,
        потому что ты ребёнок."» Десять страниц ВЫРВАНЫ. На
        корешке — «...ера». Вера. Лицо Макса — оба контура
        уже размыты, не только глаза. 48 часов. Число: 30.
      sofa_reaction: "«Вера... вырвала страницы. Что было на них?»"
      next_episode_hook: "Страницы Веры вырваны. Что она прячет? И почему Макс тускнеет?"

    quiz_distribution:
      from_brief: 14
      added_story: 0
      moved_to_extra: 6
      total: 14

    extra_practice:
      count: 6
      source: "sc9 остаток (3v) + sc10 остаток (3v)"
      description: >
        Оставшиеся квизы на вежливый возврат и
        финальную проверку. Допрактика после эпизода.

  # =====================================================================
  # ЭПИЗОД 23 — «Все, каждый, никто»
  # =====================================================================
  - ep: 23
    blocks: ["6B.1"]
    title: "Все, каждый, никто"
    terms_introduced: ["обобщение (ловушка слов)"]
    terms_used: ["уклонение от ответа (поворотник)", "вопрос-детектор", "волшебная фраза"]
    total_quizzes: 14

    drama:
      duration: "3-4 мин"
      location: "Зеркальный Город, улица у площади"
      characters: ["Марко", "Макс", "Софа", "агенты Голоса"]
      summary: >
        Агенты настигают Марко. Макс встаёт между ними.
        Агенты не дерутся — ГОВОРЯТ. «Макс ВСЕГДА бросал
        друзей.» «НИКТО не верит Максу.» «ВСЕ знают, что
        Макс — трус.» С каждой фразой — лицо Макса меркнет.
        Не только глаз — черты стираются. Слова стирают не
        хуже артефактов.
      gut_feeling: >
        Слова — не кулаки. Но от них Макс тускнеет быстрее,
        чем от артефактов. Как будто слова попадают туда,
        куда руки не дотянутся.
      marko_flaw: >
        Марко слышит «ВСЕ знают» — и на секунду верит.
        Потому что «все» звучит убедительно. Даже когда
        «все» — это двое из тридцати.

    sofa_block:
      duration: "4-5 мин"
      term_introduced: "обобщение (ловушка слов)"
      trigger: >
        Софа: «Четыре красных флага: ВСЕ, НИКТО, ВСЕГДА,
        НИКОГДА. Почти всегда — преувеличение. Одного
        исключения достаточно, чтобы обобщение рассыпалось.»
        Защита: «Кто именно?» или «Правда все? Назови
        примеры.» Иногда обобщение верно (Луна одна,
        воздух нужен всем) — проверяем каждый раз.
      quizzes:
        count: 6
        source: "brief sc5 (6v из 8)"
        description: >
          sc5 (6v): верное обобщение или есть исключение
          (птицы, Луна, учителя, кошки, зима, уроки).
      rule: >
        «Все, каждый, никто, всегда, никогда — пять
        слов-ловушек. Одного исключения достаточно,
        чтобы сломать обобщение. Спроси: "Кто именно?"»
      life_question: >
        «Друг говорит: "ВСЕ в классе имеют новый телефон!"
        Правда все? Или двое из тридцати?»

    challenge:
      duration: "5-6 мин"
      summary: >
        Марко ищет исключения в обобщениях агентов. «Макс
        ВСЕГДА бросал друзей? Нет — Макс стоит здесь, между
        мной и ними. Вот контрпример.» «НИКТО не верит
        Максу? Я верю. Вот исключение.» «ВСЕ знают, что
        Макс трус? Назовите всех.» Практика + сюжетные квизы.
      quizzes:
        count: 8
        source: "brief sc5 остаток + story"
        description: >
          sc5 (2v): оставшиеся — воздух, футбол.
          6 сюжетных квизов: обобщения агентов и Рея,
          Марко ищет исключения.
      vera_role: ""
      rey_role: >
        Речь Рея разбирается: три обобщения за минуту.
      voice_role: ""

    cliffhanger:
      duration: "1-2 мин"
      summary: >
        Лицо Макса — почти прозрачное. Черты почти не
        считываются. Оба глаза — серые. 24 часа. Макс: «Марко,
        они правы. Я действительно бросил брата. Давно.
        До Города.» Марко: «Один случай — не "всегда".»
        Макс: «А если один случай — самый важный?»
        Число: 29.
      sofa_reaction: "«Макс... начинает верить обобщениям. Это ускоряет стирание.»"
      next_episode_hook: "Макс верит словам агентов. 24 часа. Можно ли остановить?"

    quiz_distribution:
      from_brief: 8
      added_story: 6
      moved_to_extra: 14
      total: 14

    extra_practice:
      count: 14
      source: "sc1 (9v повторение поворотников) + sc2 (5v возврат к вопросу)"
      description: >
        Повторение поворотников из 6А + тренировка
        вежливого возврата к вопросу. Допрактика.

  # =====================================================================
  # ЭПИЗОД 24 — «Скажи моё имя»
  # =====================================================================
  - ep: 24
    blocks: ["6B.2", "6B.3"]
    title: "Скажи моё имя"
    terms_introduced: ["подмена понятий", "закон тождества", "контр-ход"]
    terms_used: ["обобщение (ловушка слов)", "вопрос-детектор"]
    total_quizzes: 15

    drama:
      duration: "3-4 мин"
      location: "Зеркальный Город, тупик"
      characters: ["Марко", "Макс", "Софа", "агенты Голоса"]
      summary: >
        Агенты меняют тактику. Больше не кричат. Говорят
        тихо. Спокойно. Слова Макса подменяют: «защита»
        становится «трусостью», «дружба» — «зависимостью»,
        «храбрость» — «глупостью». Макс путается — его
        собственные слова звучат чужими. Как будто кто-то
        тихо перекрасил мебель, пока он спал.
      gut_feeling: >
        Агенты не врут — они ПЕРЕИМЕНОВЫВАЮТ. Те же
        предметы, другие ярлыки. И от этого всё
        выглядит не так, как было.
      marko_flaw: >
        Марко слышит «зависимость» вместо «дружбы» —
        и на секунду сомневается. Может, правда?
        Может, дружба — это зависимость?

    sofa_block:
      duration: "4-5 мин"
      term_introduced: "подмена понятий, закон тождества, контр-ход"
      trigger: >
        Софа: «Подмена понятий: слово не меняется, а смысл
        тихо переключается. Как хамелеон — цвет другой,
        а ящерица та же.» Закон тождества: одно слово =
        один смысл в рамках разговора. Защита — волшебный
        вопрос: «Что именно ты имеешь в виду под...?»
        Контр-ход: спокойный уточняющий вопрос вместо
        нападения или оправдания. Два инструмента: «Когда
        именно?» и «Что ты имеешь в виду?» Формула:
        уточнить слово + попросить пример + отделить
        эмоцию от факта.
      quizzes:
        count: 6
        source: "brief sc7"
        description: >
          sc7 (6v): есть подмена или нет (помочь, утро,
          дважды два, честный, играть, Земля).
      rule: >
        «Подмена понятий — хамелеон слов: слово то же,
        смысл другой. Закон тождества: одно слово = один
        смысл. Контр-ход: спокойный вопрос вместо крика.»
      life_question: >
        «Друг: "Будь настоящим другом — дай списать!"
        Что подменено — слово "друг" или слово "помощь"?»

    challenge:
      duration: "5-6 мин"
      summary: >
        Марко пытается защитить Макса контр-ходами.
        «Что именно вы имеете в виду под "трусостью"?»
        «Когда именно он "бросил"?» Агенты отступают
        на шаг — но Макс уже не слышит. Контр-ход
        бесполезен, если человек не помнит, о чём спорил.
        Практика: выбор зрелого ответа на ловушку.
      quizzes:
        count: 9
        source: "brief sc8 (4v) + sc9 (5v)"
        description: >
          sc8 (4v из 9): подмена в споре (лидер, старался,
          опоздал, сложный).
          sc9 (5v из 20): выбор зрелого ответа на ловушку
          (всегда портишь, все согласились, друг и списать,
          нормальные люди, взрослый).
      vera_role: ""
      rey_role: ""
      voice_role: ""

    cliffhanger:
      duration: "1-2 мин"
      summary: >
        СТИРАНИЕ МАКСА. Лицо Макса — только общий силуэт,
        черты почти не считываются. Оба глаза — полностью
        серые. Макс улыбается. Спокойно. Как будто засыпает.
        «Скажи моё имя. Быстро. Я забываю.»
        Марко кричит: «МАКС!»
