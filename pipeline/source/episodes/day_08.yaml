# EPISODE PLAN — День 8
# Уроки: 8A, 8B
# Акт: III — Предательство
# Source episodes: 19, 20, 21
# Статус: УТВЕРЖДЁН

day: 8
lessons: ["8A", "8B"]
story_arc: "Акт III: Предательство"
story_summary: "Пропаганда Рея. Правда вырвана из контекста. Манипуляция страхом. Мама уходит"
source_episodes: [19, 20, 21]

episodes:

  # =====================================================================
  # ЭПИЗОД 29 — «Соломенное чучело»
  # =====================================================================
  - ep: 29
    blocks: ["8A.1"]
    title: "Соломенное чучело"
    terms_introduced: ["пугало (искажение слов)", "преувеличение", "упрощение", "добавление", "изменение смысла"]
    terms_used: ["факт", "мнение", "неправда", "причина", "совпадение", "доверие (Этос)", "чувства (Пафос)", "доказательства (Логос)", "обобщение (ловушка слов)", "противоречие", "обоснование", "нападение на человека"]
    total_quizzes: 14

    drama:
      duration: "3-4 мин"
      location: "Зеркальный Город, улицы с динамиками"
      characters: ["Марко", "Сем", "Софа", "Рей (голос)"]
      summary: >
        Утро. Динамики по всему Городу: голос Рея. Красиво,
        уверенно. «Мальчик по имени Марко хочет УНИЧТОЖИТЬ
        наш город!» Марко замирает. Он говорил: «Я хочу
        забрать сестру.» «Забрать» → «уничтожить». «Сестру» →
        «город». Как будто его одежду надели наизнанку — слова
        его, но воняют. Сем: «Ты правда хочешь уничтожить?»
        Марко: «Нет! Я сказал "забрать сестру"!» Софа: «Вот.
        Запомни это чувство. "Я этого не говорил!" — это сигнал.»
      gut_feeling: >
        Марко слышит свои слова в чужом рту — перекрученные,
        неузнаваемые. Как будто кто-то надел его одежду
        наизнанку. Рей читает текст красиво — толпа аплодирует.
        Внутри Марко — бессилие. Все слышат ложь, и никто
        не слышал правду.
      marko_flaw: >
        Марко хочет крикнуть «Неправда!». Но крик — не
        аргумент. Марко должен научиться отвечать точно,
        а не громко.

    sofa_block:
      duration: "4-5 мин"
      term_introduced: "пугало (искажение слов), преувеличение, упрощение, добавление, изменение смысла"
      trigger: >
        Софа: «Рыцарь и соломенное пугало. Рей не спорит
        с твоими настоящими словами — он поставил пугало
        и побил ЕГО. Пугало — когда твои слова перекрутили,
        чтобы легче спорить.» Четыре способа: преувеличение
        (раздуть «немного» до «всегда»), упрощение (убрать
        важную деталь), добавление (приписать то, чего не
        было), изменение смысла (вывернуть наизнанку).
        Сигнал: «Я этого не говорил!»
      quizzes:
        count: 6
        source: "brief sc1 (8v warmup) + sc5-sc6 (6v из 21)"
        description: >
          sc1 (8v): разминка по прошлым урокам (факт/мнение,
          причина/совпадение, этос/пафос/логос, ловушки,
          противоречие, обоснование, нападение).
          sc5-sc6 (6v): пугало или нет + какой вид пугала.
      rule: >
        «Пугало — когда твои слова перекрутили. Сигнал:
        "Я этого не говорил!" Четыре способа: раздуть,
        обрезать, приписать, вывернуть.»
      life_question: >
        «Ты сказал "не хочу играть сейчас". Друг пересказал:
        "Он вообще с нами не дружит." Где пугало? Какой вид?»

    challenge:
      duration: "5-6 мин"
      summary: >
        Марко с Семом находят чернильные пятна на стене —
        рукописные тексты для радио. Кто-то пишет Рею
        сценарии. Софа: «Леон стёрт, но руки помнят работу.»
        Тексты: «Марко ненавидит покой» (изменение смысла),
        «Он хочет, чтобы ВСЕ ушли» (преувеличение + добавление),
        «Мальчик считает город плохим» (упрощение). Марко
        разбирает каждый текст: какой вид пугала, как звучала
        бы правда.
      quizzes:
        count: 8
        source: "sc5-sc6 остаток + story"
        description: >
          4v из sc5-sc6: виды пугала в примерах.
          4 сюжетных: тексты радио + Рей и пафос + тень Леона.
      vera_role: ""
      rey_role: >
        Рей — голос пропаганды. Читает красиво, толпа
        аплодирует. Не его слова — чужие сценарии.
      voice_role: >
        Голос — автор сценариев через стёртого Леона.

    cliffhanger:
      duration: "1-2 мин"
      summary: >
        Тень Леона показывает 11 пальцев. Шестой указывает
        на черновики. Софа: «Одиннадцать пальцев. София
        писала: "Посчитай пальцы." Тень помнит то, что
        человек забыл.» Среди черновиков — строчка другим
        почерком. Мелким, круглым. Почерком Софии:
        «Послушай запись 11.»
      sofa_reaction: "«Тень... помнит. Человек — нет. Но тело не забывает.»"
      next_episode_hook: "Запись 11. Что оставила София? Правда — оружие?"

    quiz_distribution:
      from_brief: 20
      added_story: 4
      moved_to_extra: 10
      total: 14

    extra_practice:
      count: 10
      source: "sc5 остаток (4v) + sc6 остаток (6v)"
      description: >
        Оставшиеся квизы на «пугало или нет» и «какой вид
        пугала». Допрактика после эпизода.

  # =====================================================================
  # ЭПИЗОД 30 — «Правда как оружие»
  # =====================================================================
  - ep: 30
    blocks: ["8A.2", "8A.3"]
    title: "Правда как оружие"
    terms_introduced: ["уточнение (формула защиты)", "честный пересказ"]
    terms_used: ["пугало (искажение слов)", "преувеличение", "упрощение", "добавление"]
    total_quizzes: 12

    drama:
      duration: "3-4 мин"
      location: "Зеркальный Город, площадь с динамиками"
      characters: ["Марко", "Сем", "Софа", "Рей (голос)"]
      summary: >
        Марко пишет правду — записку для сопротивления:
        «Я видел, как стирают людей. Город не тот, чем
        кажется.» Передаёт через цепочку. К вечеру —
        динамики Рея: «Марко ПРИЗНАЛСЯ: он ВИДЕЛ стирание
        и НИЧЕГО НЕ СДЕЛАЛ.» Правда — но вырванная из
        контекста. Слова настоящие, а смысл — чужой.
        Сем: «Это правда? Ты видел и ничего не сделал?»
        Глаза Сема — обвиняющие. Марко теряется.
      gut_feeling: >
        Правда стала оружием. Слова настоящие — но ранят
        как ложь. Марко чувствует: даже если ты говоришь
        правду, кто-то может превратить её в удар.
      marko_flaw: >
        Марко хочет оправдываться: «Нет, я помогал!»
        Но оправдание — слабая позиция. Нужна формула.

    sofa_block:
      duration: "4-5 мин"
      term_introduced: "уточнение (формула защиты), честный пересказ"
      trigger: >
        Софа: «Формула защиты от пугала — уточнение:
        "Позволь уточнить: я говорил, что... а не то, что..."
        Первая часть — настоящие слова, вторая — то, что
        приписали.» Плохие ответы: крик («Сам такой!»),
        обида («Мне всё равно!»), отступление («Забудь»).
        Хороший: спокойно, конкретно. Затем — честный
        пересказ: прежде чем ответить — перескажи и спроси
        «Правильно я понял?»
      quizzes:
        count: 5
        source: "brief sc7-sc8 (5v) + sc9 (4v)"
        description: >
          sc7 (0v, 5 discussion): формула уточнения на примерах.
          sc8 (5v): выбор лучшего возражения.
          sc9 (4v): честный пересказ или пугало.
      rule: >
        «Формула уточнения: "Позволь уточнить: я говорил,
        что... а не то, что..." Честный пересказ: перескажи
        и спроси "Правильно я понял?" — только потом отвечай.»
      life_question: >
        «Одноклассник пересказал твою идею учителю, но упустил
        главное условие. Что делать — обидеться или уточнить?»

    challenge:
      duration: "5-6 мин"
      summary: >
        Марко объясняет Сему — не оправдывается, а показывает
        искажение. Использует формулу: «Позволь уточнить:
        я сказал, что видел стирание и пытался помочь. А не
        то, что стоял и смотрел.» Сем: «А откуда мне знать,
        кому верить?» Софа: «Два источника: слова Марко
        и слова Голоса. Кто может доказать?» Марко предлагает
        Сему проверить — пойти туда, где стирали Макса.
      quizzes:
        count: 7
        source: "sc7 adapted + story"
        description: >
          4 adapted: формула уточнения в сюжетных ситуациях.
          3 сюжетных: Марко применяет формулу к словам Рея,
          Сем выбирает честный пересказ, правда как оружие.
      vera_role: ""
      rey_role: >
        Рей — инструмент Голоса. Вырывает правду из контекста.
      voice_role: ""

    cliffhanger:
      duration: "1-2 мин"
      summary: >
        Софа: «Урок усвоен? Потому что дальше — будет хуже.»
        Динамики меняют тон. Не голос Рея. Голос — сам.
        Тихий. Ласковый. «Марко. Я не хочу тебя пугать.
        Но мама… мама сегодня плакала.»
      sofa_reaction: "«Это... не пугало. Это другое. Другой инструмент.»"
      next_episode_hook: "Голос переключился с искажения слов на страх. Новое оружие."

    quiz_distribution:
      from_brief: 9
      added_story: 3
      moved_to_extra: 0
      total: 12

    extra_practice:
      count: 0
      source: ""
      description: ""

  # =====================================================================
  # ЭПИЗОД 31 — «Четыре кнопки страха»
  # =====================================================================
  - ep: 31
    blocks: ["8B.1", "8B.2"]
    title: "Четыре кнопки страха"
    terms_introduced: ["манипуляция страхом", "четыре вида запугивания", "три вопроса-фильтра"]
    terms_used: ["пугало (искажение слов)", "нападение на человека"]
    total_quizzes: 13

    drama:
      duration: "3-4 мин"
      location: "Зеркальный Город, зеркальный коридор"
      characters: ["Марко", "Сем", "Софа", "Голос", "Мама (через зеркало)"]
      summary: >
        Голос давит: «Мама забудет тебя.» «Ты останешься
        один.» «Сем — следующий.» Три удара за минуту.
        Марко чувствует — каждая фраза попадает в живот.
        Не в голову — в живот. Мама через зеркало — бледная,
        стоит в тёмной комнате. «Он стоит за тобой.»
        Зеркало гаснет.
      gut_feeling: >
        Страх — физический. Живот сжимается. Руки холодные.
        Голос знает, где болит. Каждый удар — точный.
        Марко хочет бежать, но ноги не двигаются.
      marko_flaw: >
        Марко хочет подчиниться — сделать что угодно, чтобы
        Голос замолчал. Страх выключает мышление.

    sofa_block:
      duration: "4-5 мин"
      term_introduced: "манипуляция страхом, четыре вида запугивания, три вопроса-фильтра"
      trigger: >
        Софа: «Страх — выключатель для мозга. Манипулятор
        хочет, чтобы ты не думал, а подчинился.» Четыре
        маски запугивания: здоровье, одиночество, неудача,
        наказание. Слова-маркеры: «навсегда», «никогда»,
        «все», «никто». Три вопроса-фильтра: (1) это точно
        произойдёт или только может? (2) насколько вероятно?
        (3) есть ли другие варианты? Разница между манипуляцией
        и реальным предупреждением: реальное — забота +
        настоящая опасность + можно проверить.
      quizzes:
        count: 5
        source: "brief sc4 (7v) + sc7 (6v)"
        description: >
          sc4 (4v): определить вид запугивания по фразам.
          sc7 (5v): реальное предупреждение или манипуляция.
          + 4 сюжетных: кнопки Голоса + мама через зеркало.
      rule: >
        «Манипуляция страхом — давление на чувства, чтобы ты
        подчинился не думая. Четыре маски: здоровье, одиночество,
        неудача, наказание. Три вопроса-фильтра: точно ли?
        вероятно ли? есть ли другие варианты? Страх не любит
        вопросов.»
      life_question: >
        «Реклама: "Без этого витамина ваш ребёнок не вырастет!"
        Манипуляция или забота? Примени три вопроса.»

    challenge:
      duration: "5-6 мин"
      summary: >
        Мама исчезает из зеркала. На столе — фото: молодой
        Голос и молодая мама. Они были друзьями. Голос:
        «Выбери одного — Софию или маму. Ты не можешь
        спасти обеих.» Софа: «Ложный выбор + страх потери.
        Обязательно ли выбирать?» Марко применяет фильтры:
        «Точно ли нельзя спасти обеих? Кто это доказал?»
      quizzes:
        count: 8
        source: "sc4 остаток + sc7 остаток + story"
        description: >
          3v из sc4: виды запугивания.
          3v из sc7: реальное или манипуляция.
          2 сюжетных: Голос + фото мамы.
      vera_role: ""
      rey_role: ""
      voice_role: >
        Голос — мастер страха. Три кнопки за минуту.
        Потом — ложный выбор как финальный удар.

    cliffhanger:
      duration: "1-2 мин"
      summary: >
        Мама ИСЧЕЗЛА. Не стёрта — ушла. Сама. В Зеркальный
        Город. Софа: «Мама не стёрта. Она ушла. Как София.
        Число не изменилось — мама помнит.» Число: 24.
        Не упало. Мама помнит — но ушла добровольно.
        Это хуже стирания.
      sofa_reaction: "«Мама помнит. Мама выбрала. Это... хуже стирания.»"
      next_episode_hook: "Мама ушла добровольно. Марко потерял всех. Что делать, когда страх — реальный?"

    quiz_distribution:
      from_brief: 15
      added_story: 2
      moved_to_extra: 4
      total: 13

    extra_practice:
      count: 4
      source: "sc4 остаток (3v) + sc7 остаток (1v)"
      description: >
        Оставшиеся квизы на виды запугивания и реальное
        vs манипуляция. Допрактика после эпизода.

  # =====================================================================
  # ЭПИЗОД 32 — «Остановись»
  # =====================================================================
  - ep: 32
    blocks: ["8B.3"]
    title: "Остановись"
    terms_introduced: ["четыре шага защиты от запугивания"]
    terms_used: ["манипуляция страхом", "четыре вида запугивания", "три вопроса-фильтра", "пугало (искажение слов)", "уточнение (формула защиты)"]
    total_quizzes: 14

    drama:
      duration: "3-4 мин"
      location: "Зеркальный Город, сужающиеся коридоры"
      characters: ["Марко", "Сем", "Софа", "Голос"]
      summary: >
        Марко бежит за мамой. Сем — за ним. Коридоры
        сужаются. Зеркала показывают маму — она идёт
        к центру. Спокойно. Не оглядывается. Марко
        кричит — она не слышит. Голос: «Ты потерял всех.
        Софию. Макса. Маму. Скоро — Сема.» Каждое слово —
        удар. Марко хочет бежать без плана. Софа: «Стой.»
        Одно слово. Марко останавливается.
      gut_feeling: >
        Паника. Ноги несут сами. Мозг выключен. Каждое
        зеркало — мама, уходящая дальше. Голос считает
        потери, как бухгалтер. Слово Софы — «Стой» —
        как стена. Марко упирается в неё и останавливается.
      marko_flaw: >
        Марко хочет действовать — немедленно, без плана.
        Страх толкает вперёд. Но вперёд без плана —
        это ловушка.

    sofa_block:
      duration: "4-5 мин"
      term_introduced: "четыре шага защиты от запугивания"
      trigger: >
        Софа: «Шаг первый — остановись. Не реагируй сразу.
        Шаг второй — задай три вопроса-фильтра. Шаг
        третий — попроси доказательства: "откуда ты знаешь?"
        Шаг четвёртый — подумай о мотивах: зачем он тебя
        пугает?» Плохой ответ: сдался без вопросов. Хороший
        ответ: задал проверочный вопрос.
      quizzes:
        count: 5
        source: "brief sc8 (5v)"
        description: >
          sc8 (5v): хороший или плохой ответ на запугивание.
      rule: >
        «Четыре шага: остановись — задай вопросы — потребуй
        доказательств — подумай, зачем тебя пугают. Кто видит
        фокус — тот больше на него не попадается.»
      life_question: >
        «Старшеклассник: "Если не дашь списать — скажу
        всем, что ты ябеда." Пройди четыре шага.»

    challenge:
      duration: "5-6 мин"
      summary: >
        Марко применяет четыре шага прямо сейчас.
        Шаг 1: Остановился. Дышит.
        Шаг 2: «Мама точно не хочет, чтобы я её нашёл?
        Насколько вероятно? Есть ли другие варианты?»
        → Мама могла уйти, чтобы НАЙТИ Софию.
        Шаг 3: «Откуда ты знаешь, чего хочет моя мама?»
        Голос молчит.
        Шаг 4: «Зачем ты хочешь, чтобы я остановился?
        Потому что я БЛИЗКО.»
        Затем — блиц: смешанные примеры из уроков 8A и 8B.
      quizzes:
        count: 9
        source: "brief sc9 (5 discussion) + sc11 (8v blitz) + story"
        description: >
          5 open (sc9 adapted): сформулируй ответ по четырём шагам
          (вожатый с вышкой, реклама антивируса, шантаж карточкой,
          проект Кирилла, новая ручка).
          4 blitz (sc11 adapted): пугало, манипуляция страхом или
          ни то ни другое — смешанные примеры дня.
      vera_role: ""
      rey_role: ""
      voice_role: >
        Голос считает потери Марко как рычаг давления.
        Молчит, когда Марко просит доказательства.

    cliffhanger:
      duration: "1-2 мин"
      summary: >
        Марко: «Мама ушла не от меня. Она ушла ЗА Софией.»
        Сем: «Откуда ты знаешь?» Марко: «Потому что я бы
