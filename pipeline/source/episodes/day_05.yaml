# EPISODE PLAN — День 5
# Уроки: 5A, 5B
# Акт: II — Обучение через боль
# Source episodes: 11, 12, 13
# Статус: ЧЕРНОВИК

day: 5
lessons: ["5A", "5B"]
story_arc: "Акт II: Обучение через боль"
story_summary: "Сопротивление. Дерево связей. МИДСЕЗОННАЯ БОМБА: мама выбрала"
source_episodes: [11, 12, 13]

# =====================================================================
# ЭПИЗОД 17 — «Семь звеньев»
# =====================================================================
episodes:

  - ep: 17
    blocks: ["5A.1", "5A.2", "5A.3", "5A.4"]
    title: "Семь звеньев"
    terms_introduced: ["своими глазами", "услышал от других", "три вопроса для проверки", "уровни интернета", "дипфейк"]
    terms_used: ["доверие (Этос)", "чувства (Пафос)", "доказательства (Логос)", "баланс способов"]
    total_quizzes: 14

    drama:
      duration: "3-4 мин"
      location: "Зеркальный Город, подземелье под Рекламной улицей"
      characters: ["Марко", "Софа", "горожане подполья"]
      summary: >
        Шёпот из ep_016 ведёт Марко в подземелье. Подпольное
        сопротивление — 20–30 горожан с потускневшими числами.
        Тусклый свет. Стены в записках. Лидер (женщина с числом 12)
        говорит: «Голос был учителем. Потом захотел большего.»
        Марко спрашивает: «Откуда вы знаете?» Цепочка: она
        слышала от того, кто слышал от того... Семь звеньев.
        К седьмому — «учитель» превратился в «великого мага,
        который создал Город силой мысли». Марко: «Это же
        испорченный телефон.»
      gut_feeling: >
        Подполье говорит уверенно. Хочется верить — они же
        ПРОТИВ Голоса. Но уверенность — не доказательство.
        Марко чувствует: тут тоже нужна проверка.
      marko_flaw: >
        Марко хочет верить подполью — они на его стороне.
        Но «на моей стороне» ≠ «говорит правду». Разведчик
        проверяет всех.

    sofa_block:
      duration: "4-5 мин"
      term_introduced: "своими глазами, услышал от других, три вопроса для проверки, уровни интернета, дипфейк"
      trigger: >
        Софа: «"Учитель" стал "великим магом" за семь пересказов.
        Два типа источников: СВОИМИ ГЛАЗАМИ — сам видел, сам
        измерил, сам сделал. УСЛЫШАЛ ОТ ДРУГИХ — пересказ.
        Подполье — "услышал от других". Каждый пересказ добавляет
        ошибку.» Три вопроса для проверки: 1) разбирается ли
        человек в этом? 2) хочет ли что-то получить? 3) можно ли
        проверить? Уровни интернета — четыре полки библиотеки:
        от официальных сайтов до шёпота в чатах. Записки
        подполья — как чаты: шёпот без подписи. Дипфейк:
        даже «своими глазами» можно подделать — ИИ создаёт
        фальшивые фото, видео, голос. Новое правило: «Вижу —
        но КТО показывает? И ЗАЧЕМ?»
      quizzes:
        count: 6
        source: "brief sc3 + sc4"
        description: >
          sc3 (1v): почему дети не поверили Дмитрику.
          sc4 (5v): своими глазами или услышал от других
          (кошка, бабушка, друг, дневник, телевизор).
      rule: >
        «Откуда ты это знаешь? — главный вопрос разведчика.
        Своими глазами — надёжнее. Услышал от других — проверяй.
        Три ключа: разбирается? хочет получить? можно проверить?»
      life_question: >
        «Друг показывает видео: "Учёные доказали, что шоколад
        полезнее овощей!" Какой уровень источника? Какие три
        вопроса задать?»

    challenge:
      duration: "5-6 мин"
      summary: >
        Марко проверяет информацию подполья тремя вопросами.
        Лидер разбирается? — Живёт в Городе давно, но видела
        Голос-учителя сама или слышала? Хочет получить? — Хочет
        свободы. Можно проверить? — Записка Софии. Марко идёт
        по цепочке назад, ищет первоисточник. Применяет уровни
        к артефактам Города. Дипфейк-проверка: голос Голоса
        в динамиках — настоящий или подделка?
      quizzes:
        count: 8
        source: "brief sc5 + sc6 + sc7"
        description: >
          sc5 (3v из 5): можно верить / проверить (ветеринар,
          продавец, мама). sc6 (3v из 6): надёжный / ненадёжный
          (сайт больницы, пост блогера, энциклопедия). sc7 (2v
          из 5): доверять / проверить (друг с фото, сайт зоопарка).
      vera_role: ""
      rey_role: ""
      voice_role: ""

    cliffhanger:
      duration: "1-2 мин"
      summary: >
        Первоисточник найден — записка Софии. Настоящая.
        София СОЗДАЛА сопротивление. За полгода до исчезновения.
        11-летняя девочка построила подпольную сеть. Лина —
        единственная, кто не удивлён. Софа разблокирует файл:
        «София записала: "Я построила сеть. Лина помогала."»
        Марко: если Лина помогала Софии строить подполье —
        она всё знала. С самого начала. Число: 35.
      sofa_reaction: "«Лина... помогала. Файл подтверждает.»"
      next_episode_hook: "Лина знала о подполье. Знала о плане Софии. Что ещё она скрывает?"

    quiz_distribution:
      from_brief: 14
      added_story: 0
      moved_to_extra: 13
      total: 14

    extra_practice:
      count: 13
      source: "sc1 (5v разминка: повторение трёх способов убеждения) + sc5 остаток (2v) + sc6 остаток (3v) + sc7 остаток (3v)"
      description: >
        Разминка по пройденным урокам (три способа убеждения).
        Оставшиеся квизы по проверке источников, уровням
        интернета и дипфейкам. Допрактика после эпизода.

  # =====================================================================
  # ЭПИЗОД 18 — «Дерево связей»
  # =====================================================================
  - ep: 18
    blocks: ["5A.5", "5A.6"]
    title: "Дерево связей"
    terms_introduced: ["правило двух источников", "один человек думает vs много людей проверили"]
    terms_used: ["своими глазами", "услышал от других", "три вопроса для проверки", "уровни интернета", "дипфейк"]
    total_quizzes: 14

    drama:
      duration: "3-4 мин"
      location: "Зеркальный Город, подполье — стена со схемой"
      characters: ["Марко", "Софа"]
      summary: >
        Марко строит дерево — схему связей Системы на стене
        подполья. Корень — Голос. Ветки — агенты. Нитки —
        связи. Каждая ветка ведёт к Голосу. Кроме одной.
        Одна ветка уходит НАРУЖУ — в реальный мир. Кто-то
        передаёт информацию из школы. Голос говорит по
        динамикам: «Я защищаю город.» Марко: какие
        доказательства? «Без меня будет хаос» — запугивание.
        «Я забочусь о детях» — мнение. Ветки слабые.
      gut_feeling: >
        Одна ветка наружу — как трещина в стене. Маленькая,
        но через неё видно свет. Кто-то из реального мира
        связан с Голосом. Марко чувствует: это важнее
        всего остального.
      marko_flaw: >
        Марко хочет сразу бежать по этой ветке. Но
        разведчик проверяет: одна ветка — один источник.
        Нужен второй.

    sofa_block:
      duration: "4-5 мин"
      term_introduced: "правило двух источников, один человек думает vs много людей проверили"
      trigger: >
        Софа: «Одна ветка наружу. Один источник. Достаточно?
        Нет. ПРАВИЛО ДВУХ ИСТОЧНИКОВ: если два НЕЗАВИСИМЫХ
        источника говорят одно и то же — информации можно
        верить больше.» Ключевое: НЕЗАВИСИМЫХ. Три пересказчика
        одного чата — один источник, не три. Метафора: один
        плакат на двух заборах — заборов два, а плакат один.
        «Один человек думает vs много людей проверили» — мнение
        даже умного человека ещё не факт. Факт — когда много
        людей независимо проверили и подтвердили.
      quizzes:
        count: 6
        source: "brief sc8"
        description: >
          sc8 (6v): два источника или один (экскурсия,
          три одноклассника из чата, новостной сайт + друг,
          одно видео на двух платформах, соседка + сайт города,
          два блогера от одного заказчика).
      rule: >
        «Правило двух источников: два НЕЗАВИСИМЫХ источника
        подтверждают — надёжно. Количество пересказчиков ≠
        количество источников. Один плакат на двух заборах —
        всё ещё один плакат.»
      life_question: >
        «Трое друзей говорят, что завтра контрольная. Все
        узнали из одного чата. Сколько источников — три
        или один?»

    challenge:
      duration: "5-6 мин"
      summary: >
        Комплексная проверка. Кейс «пропавший котёнок» — пост
        гуляет по чатам 5 лет, автор неизвестен, фото милое,
        контактов нет. Все инструменты: тип источника, три
        вопроса, уровень интернета, дата, правило двух
        источников. Котёнок давно вырос в наглого кота.
        Затем: проверка ветки Системы. Два источника указывают
        на одного человека: школьный журнал (доступ ограничен)
        + записи подполья. Кто передаёт информацию?
      quizzes:
        count: 8
        source: "brief sc9 + sc10"
        description: >
          sc9 (5v): комплексная проверка кейса «пропавший
          котёнок» (тип, проверка, уровень, дата, два источника).
          sc10 (3v из 5): много проверили / один думает
          (кипение воды, учитель про бег, летающие машины).
      vera_role: >
        Вера пока не названа — но ветка указывает на
        человека с доступом к школьному журналу.
      rey_role: ""
      voice_role: >
        Голос защищает город — но доказательства слабые.
        Все ветки ведут к нему, кроме одной.

    cliffhanger:
      duration: "1-2 мин"
      summary: >
        Все ветки ведут к Голосу. Кроме одной. Марко
        прослеживает её: школьный журнал, доступ, расписание,
        кабинет. Источник — ВЕРА. Учительница. Число: 34.
        Но Марко НЕ использовал артефакты. Стирание
        продолжается без его участия. Кто-то другой стирает.
        Софа: «Стирание ускоряется. Ты должен быть быстрее.»
      sofa_reaction: "«Вера... передаёт информацию. Но кому — Голосу или подполью?»"
      next_episode_hook: "Вера связана с Голосом. Но КАК? И зачем число падает без артефактов?"

    quiz_distribution:
      from_brief: 14
      added_story: 0
      moved_to_extra: 12
      total: 14

    extra_practice:
      count: 12
      source: "sc10 остаток (2v) + sc12 (10v: финальный блиц — все инструменты вперемешку)"
      description: >
        Оставшиеся квизы «один думает vs много проверили»
        + финальный блиц по всем инструментам проверки
        источников. Допрактика после эпизода.

  # =====================================================================
  # ЭПИЗОД 19 — «О чём мы вообще спорим?»
  # =====================================================================
  - ep: 19
    blocks: ["5B.1", "5B.2"]
    title: "О чём мы вообще спорим?"
    terms_introduced: ["центральная идея", "дерево спора", "ствол", "ветка (аргумент)", "листок (деталь)", "формула сути"]
    terms_used: ["три вопроса для проверки", "правило двух источников"]
    total_quizzes: 13

    drama:
      duration: "3-4 мин"
      location: "Зеркальный Город, зеркало-портал"
      characters: ["Марко", "Мама", "Софа"]
      summary: >
        Марко вызывает маму через зеркало-портал. Пять
        прямых вопросов. Мама увиливает каждый раз.
        «Давай поговорим о другом.» (смена темы)
        «Все дети иногда выдумывают.» (обобщение)
        «А ты уверен, что хочешь знать?» (вопрос вместо ответа)
        «Я делаю то, что лучше для тебя.» (апелляция к заботе)
        «Не нужно ворошить прошлое.» (обесценивание)
        Пять вопросов — ноль ответов. Марко теряется
        в ветках маминых увиливаний. Забывает, о чём спрашивал.
      gut_feeling: >
        Каждый ответ мамы звучит заботливо. Хочется
        остановиться, не давить. Но забота — как подушка
        на лице: мягкая, а дышать нечем. Марко чувствует:
        мама уводит его от чего-то конкретного.
      marko_flaw: >
        Марко соглашается с каждым увиливанием по отдельности.
        «Да, может, я выдумываю.» «Да, может, не стоит.»
        Каждая ветка убедительна — но ствол потерян.

    sofa_block:
      duration: "4-5 мин"
      term_introduced: "центральная идея, дерево спора, ствол, ветка (аргумент), листок (деталь), формула сути"
      trigger: >
        Софа: «Мама увела тебя от ствола. Пять раз. Спор —
        как дерево. СТВОЛ — центральная идея, один главный
        вопрос. ВЕТКИ — аргументы, доводы (почему так думаем).
        ЛИСТЬЯ — детали, примеры (иллюстрируют, но не
        доказывают). Мамины "заботливые" ответы — это ветки
        без ствола. Они уводят от вопроса.» ФОРМУЛА СУТИ:
        «Мы спорим о том, ... или ...» — одно предложение,
        которое возвращает спор к стволу. Самый сильный
        вопрос в споре: «О чём мы вообще спорим?»
      quizzes:
        count: 5
        source: "brief sc4"
        description: >
          sc4 (5v из 6): найти центральную идею (ствол)
          в пяти спорах с ловушками (старые обиды,
          побочные детали — ветки с чужих деревьев).
      rule: >
        «Спор — дерево. Ствол — главный вопрос. Ветки —
        доводы. Листья — примеры. Потерял ствол — спор
        превращается в кашу. Формула: "Мы спорим о том,
        ... или ..." — возвращает к сути.»
      life_question: >
        «Друзья спорят: "Ты всегда опаздываешь!" — "А ты
        вечно придираешься!" Где ствол? Как вернуть спор
        к сути?»

    challenge:
      duration: "5-6 мин"
      summary: >
        Марко строит дерево маминого разговора. Где ствол?
        «Мама, ты знала, что София исчезнет?» Где ветки?
        Мамины увиливания — ветки без ствола. Где листья?
        «Все дети выдумывают» — листок с чужого дерева.
        Марко формулирует суть: «Мы спорим о том, знала
        ты или нет.» Ствол найден. Мама не может увиливать.
        Практика: определить ствол/ветка/листок в шести
        примерах из жизни.
      quizzes:
        count: 8
        source: "brief sc4 остаток + sc5 + sc6"
        description: >
          sc4 (1v): оставшийся квиз на ствол.
          sc5 (6v): определить ствол, ветка или листок
          (две серии: обед и компьютерные игры).
          sc6 (1v): выбрать правильную формулировку сути.
      vera_role: ""
      rey_role: ""
      voice_role: ""

    cliffhanger:
      duration: "1-2 мин"
      summary: >
        Мама не может увиливать. Плачет. Потом — мёртвым
        голосом: «Мне дали выбрать. Софию — или тебя.
        Они не знали про близнецов. Я выбрала тебя.
        Потому что София сильнее. Она выживет. Ты — нет.»
        МИДСЕЗОННАЯ БОМБА. Число: 33.
      sofa_reaction: "Молчит. Экран мигает. Не из-за батареи."
      next_episode_hook: "Мама выбрала Марко. Отдала Софию. Но согласилась ли София?"

    quiz_distribution:
      from_brief: 13
      added_story: 0
      moved_to_extra: 0
      total: 13

    extra_practice:
      count: 0
      source: ""
      description: >
        Все квизы из брифа распределены в основной эпизод.
        Допрактика не требуется.

  # =====================================================================
  # ЭПИЗОД 20 — «Мам, я бы тоже выбрала его»
  # =====================================================================
  - ep: 20
    blocks: ["5B.3", "5B.4"]
    title: "Мам, я бы тоже выбрала его"
    terms_introduced: ["независимые источники", "зависимые источники"]
    terms_used: ["правило двух источников", "своими глазами", "услышал от других", "ствол", "ветка (аргумент)", "листок (деталь)"]
    total_quizzes: 14

    drama:
      duration: "3-4 мин"
      location: "Зеркальный Город, темнота после зеркала-портала"
      characters: ["Марко", "Софа"]
      summary: >
        Портал гаснет. Марко стоит в темноте. Слова мамы —
        как удар. «Я выбрала тебя.» Значит — отдала Софию.
        Марко принимает это как правду — мама плакала,
        а плачущим верят. Но Софа: «Слёзы — горячие.
        Слова — холодные. Как будто плачет одна мама,
        а говорит другая.» Марко не спрашивает главного:
        а София согласилась? Или ей не оставили выбора?
      gut_feeling: >
        Плачущей маме хочется верить. Слёзы — самый сильный
        пафос. Но разведчик проверяет даже слёзы. Не потому
        что мама врёт — а потому что боль искажает память.
        Плачущий человек верит в свою версию сильнее.
      marko_flaw: >
        Марко принимает слова мамы целиком — потому что
        она плачет. Эмоция заменяет проверку. Старая слабость:
        сильное чувство = правда.

    sofa_block:
      duration: "4-5 мин"
      term_introduced: "независимые источники, зависимые источники"
      trigger: >
        Софа: «Мама — один источник. Достаточно? Вспомни
        правило двух.» Блиц-повторение: своими глазами —
        самый надёжный. ИИ — как умный друг, который иногда
        уверенно несёт чушь. Новое: НЕЗАВИСИМЫЕ ИСТОЧНИКИ —
        два человека узнали по отдельности, каждый проверил
        сам. ЗАВИСИМЫЕ — один повторяет за другим, это эхо,
        не подтверждение. Метафора: крикнул в горах, услышал
        свой голос — это не второй человек. Мама и Софа
        повторяют одно и то же — но Софа загружена Софией.
        Зависимые? Или независимые?
      quizzes:
