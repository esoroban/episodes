# EPISODE PLAN — День 11
# Уроки: 11A, 11B
# Акт: III-IV — Откровение
# Source episodes: 27, 28, 29
# Статус: ЧЕРНОВИК

day: 11
lessons: ["11A", "11B"]
story_arc: "Акт III-IV: Откровение"
story_summary: "Марко перехватывает толпу у Рея. Последняя речь Голоса. Карта = МАРКО"
source_episodes: [27, 28, 29]

episodes:

  # =====================================================================
  # ЭПИЗОД 41 — «Передемагогировать»
  # =====================================================================
  - ep: 41
    blocks: ["11A.1"]
    title: "Передемагогировать"
    terms_introduced: ["возражение", "структура возражения"]
    terms_used: ["нападка на человека", "ложный авторитет", "ложная дилемма", "вопрос-ловушка", "противоречие", "манипуляция страхом", "поспешное обобщение", "подмена понятий", "страшная цепочка", "доверие (Этос)", "чувства (Пафос)", "доказательства (Логос)"]
    total_quizzes: 14

    drama:
      duration: "3-4 мин"
      location: "Башня Голоса, внутренний зал. Рей на сцене перед толпой"
      characters: ["Марко", "Софа", "Рей", "Сем", "толпа"]
      summary: >
        Продолжение с эп.40: Марко проник в башню, перед ним
        зал. Рей на сцене — в ударе. Толпа кивает в такт.
        «Разве мы не заслуживаем порядка?» Рей использует
        все приёмы: апелляция к эмоциям, обобщение, ложный
        авторитет. Софа: «Марко... ты должен перехватить
        толпу. Не кулаками — словами.» Марко поднимается
        на сцену. Рей удивлён — не ожидал. Марко начинает
        говорить. Использует те же приёмы, что и Рей, но
        разворачивает в другую сторону: «Вам не страшно, что
        ваших детей СТИРАЮТ?» (апелляция к эмоциям), «КАЖДЫЙ
        из вас потерял кого-то!» (обобщение), «Рей говорит
        от имени Голоса — но Голос ему ни разу не ответил
        лично!» (удар по ложному авторитету). Толпа
        переходит на сторону Марко. Рей замолкает — впервые
        в жизни. Победа? Сем дёргает Марко за рукав:
        «Ты только что сделал то же самое, что он. В чём
        разница?»
      gut_feeling: >
        Эйфория перехвата — и холодный душ от Сема. Марко
        победил, но победил ТЕМИ ЖЕ приёмами. Камень на
        груди — тот же, что в башне, когда манипулировал
        стражником. Софа молчит. Вопрос Сема висит в
        воздухе: действительно, в чём разница?
      marko_flaw: >
        Марко использовал демагогию ради «правильной» цели.
        Привычка: делать то, что работает, лишь бы
        результат. Но Сем — младший, наивный — видит
        очевидное: приёмы одинаковые.

    sofa_block:
      duration: "4-5 мин"
      term_introduced: "возражение, структура возражения"
      trigger: >
        Софа: «Сем прав. Ты передемагогировал Рея. Но
        передемагогировать — не значит победить. Это значит...
        стать таким же.» Пауза. «Есть другой путь. Он
        называется — возражение.» Определение: возражение —
        это когда ты говоришь «я не согласен» спокойно, с
        причиной, без оскорблений. Не нападка, не крик —
        аргумент. Контраст: нападка — «Ты дурак, ничего не
        понимаешь!» vs возражение — «Я думаю иначе, потому
        что...». Структура возражения — четыре шага: (1)
        Повтори мысль собеседника («Ты говоришь, что...»),
        (2) Покажи уважение («Я понимаю твою точку зрения»),
        (3) Скажи своё мнение («Но я думаю иначе»),
        (4) Дай причину («Потому что...»). Софа: «Нападка
        бьёт по человеку. Возражение — по аргументу. Марко,
        ты бил по Рею. Надо было бить по его словам.»
      quizzes:
        count: 6
        source: "brief sc1 (10v, выбираем 4) + sc5 (5v, выбираем 2)"
        description: >
          sc1 (4v): разминка вразнобой — ложный авторитет
          (хоккеист/учебник), ложная дилемма (день рождения),
          нападка (очки/спорт), вопрос-ловушка (списывать).
          sc5 (2v): возражение или нападка — раунд 1
          (скрипка/классика, рисование).
      rule: >
        «Возражение — "я не согласен" спокойно, с причиной,
        без оскорблений. Четыре шага: повтори мысль, покажи
        уважение, скажи мнение, дай причину. Нападка бьёт
        по человеку, возражение — по аргументу.»
      life_question: >
        «Одноклассник говорит: "Твоя команда — отстой!"
        Как возразить по четырём шагам, не превращаясь
        в нападающего?»

    challenge:
      duration: "5-6 мин"
      summary: >
        Марко осознаёт разницу. Софа: «Ты использовал те
        же приёмы, что Рей. Цели разные — инструменты
        одинаковые. Это допустимо?» Голосование без
        правильного ответа: «Да, цель оправдывает» / «Нет,
        это манипуляция» / «Зависит от ситуации» / «Не
        знаю». Любой ответ принимается. Затем практика:
        нападка или возражение — десять примеров вперемешку.
        Сем наблюдает. Марко тренируется возражать —
        правильно, по четырём шагам. Софа после каждого
        примера: «Нападка — бьёт по человеку» или
        «Возражение — бьёт по аргументу». Финальный пример
        из сюжета: речь Марко перед толпой — «Рей говорит
        от имени Голоса, но Голос ему ни разу не ответил
        лично» — это нападка или возражение?
      quizzes:
        count: 8
        source: "sc5 остаток (3v) + sc7 (5v)"
        description: >
          sc5 (3v): возражение или нападка — раунд 1
          (чтение, велосипед, шахматы).
          sc7 (5v): возражение или нападка — раунд 2
          (контроллер, танцы, плавание, рисование, футбол).
      vera_role: ""
      rey_role: >
        Рей замолк на сцене. Впервые побеждён — но не
        аргументами, а его же приёмами. Потрясён.
      voice_role: ""

    cliffhanger:
      duration: "1-2 мин"
      summary: >
        Сем: «Значит, можно по-другому? Без крика?» Марко:
        «Можно. Я просто... забыл.» Софа: «Не забыл.
        Не знал. Теперь знаешь.» Рей — из угла зала,
        тихо: «Голос тоже когда-то говорил без крика.
        Потом перестал.» Число на экране Софы: 18.
      sofa_reaction: "«Рей сказал важное. Голос... когда-то был другим. Что изменилось?»"
      next_episode_hook: "Марко научился возражать. Но Голос — не Рей. С ним нужно говорить иначе. Как?"

    quiz_distribution:
      from_brief: 14
      added_story: 0
      moved_to_extra: 12
      total: 14

    extra_practice:
      count: 12
      source: "sc1 остаток (6v) + sc2 (8v, выбираем 3) + sc5/sc7 остатки (3v)"
      description: >
        Оставшиеся квизы: разминка вразнобой (противоречие,
        запугивание, ложная дилемма, ложный авторитет,
        вопрос-ловушка, нападка), кейсы нападка vs спокойный
        ответ, возражение или нападка. Допрактика после
        эпизода.

  # =====================================================================
  # ЭПИЗОД 42 — «Когда вы перестали любить учеников?»
  # =====================================================================
  - ep: 42
    blocks: ["11A.2"]
    title: "Когда вы перестали любить учеников?"
    terms_introduced: ["признание частичной правоты"]
    terms_used: ["возражение", "структура возражения", "нападка на человека", "факт", "мнение"]
    total_quizzes: 10

    drama:
      duration: "3-4 мин"
      location: "Башня Голоса, зал после ухода толпы"
      characters: ["Марко", "Софа", "Голос"]
      summary: >
        Толпа разошлась. Рей ушёл. Марко один в зале.
        Динамики оживают — Голос. Но не крик, не ультиматум.
        Голос говорит тихо, почти устало: «Ты перехватил
        мою толпу. Молодец. Используя мои приёмы.» Марко
        чувствует укол — Голос прав. Софа: «Он хочет, чтобы
        ты почувствовал вину. Но... в этом он прав.» Марко
        впервые говорит с Голосом как с равным. Без крика.
        С уважением. Четыре шага возражения: «Вы говорите,
        что я использовал ваши приёмы. Я понимаю, почему
        вы так думаете. Но я не согласен, что это делает
        меня таким же. Потому что я готов остановиться —
        а вы нет.» Голос поражён. Не аргументом — тоном.
        Марко не нападает. Не кричит. Но Голос потрясён
        сильнее, чем от крика. Софа: «Почему? Потому что
        возражение — это уважение. А уважение... Голос
        давно не получал.»
      gut_feeling: >
        Странное чувство: говорить с врагом уважительно.
        Марко ожидал крик — получил тишину. Голос слушает.
        Впервые — слушает. Как будто вспоминает что-то
        давно забытое.
      marko_flaw: >
        Марко хочет добить, пока Голос растерян. Привычка:
        использовать слабость. Но Софа учит: возражение —
        не оружие, а мост. Если ударить сейчас — мост
        рухнет.

    sofa_block:
      duration: "4-5 мин"
      term_introduced: "признание частичной правоты"
      trigger: >
        Софа: «Ты возразил правильно. Но есть приём ещё
        мощнее — признание частичной правоты. Формула:
        "В этом ты прав, но..." Когда ты признаёшь часть
        правды собеседника — он перестаёт защищаться. Стена
        падает. И твой аргумент проходит.» Пример: «Голос
        сказал — ты использовал мои приёмы. Ответ: "В этом
        вы правы — я использовал ваши приёмы. Но разница
        в том, что я готов учиться другому способу."»
        Контраст: нападка — «Заткнись, ты сам хуже!»,
        возражение — «Я думаю иначе, потому что...»,
        возражение с признанием — «В этом ты прав, но
        я думаю иначе, потому что...» Три уровня: каждый
        следующий сильнее предыдущего. Признание — не
        слабость, а сила. Показывает: ты слушал, ты
        понял, и всё равно не согласен.
      quizzes:
        count: 4
        source: "sc9 (5v, выбираем 4)"
        description: >
          sc9 (4v): признание частичной правоты — выбрать
          лучший ответ с формулой «В этом ты прав, но...»
          (спорт/очки, рисование, чтение, музыка).
      rule: >
        «Признание частичной правоты — формула "В этом ты
        прав, но..." Показывает: слушал, понял, уважаю —
        и всё равно не согласен. Три уровня: нападка →
        возражение → возражение с признанием. Каждый
        следующий сильнее.»
      life_question: >
        «Друг: "Ты всегда опаздываешь!" Ты знаешь, что
        иногда опаздываешь. Как использовать "В этом ты
        прав, но..."?»

    challenge:
      duration: "5-6 мин"
      summary: >
        Марко применяет признание частичной правоты к
        Голосу. «В этом вы правы — я использовал ваши
        приёмы. Но я не согласен, что отнять выбор — это
        защита. Потому что защита — это когда человек
        СОХРАНЯЕТ право решать.» Голос замирает. Тишина.
        Марко задаёт вопрос — тот самый: «Когда вы
        перестали любить своих учеников?» Десять секунд
        тишины. Город вздрагивает. Софа: «...брешь в
        системе. Голос... уязвим.» Практика: финальный
        микс — нападка, возражение или возражение с
        признанием частичной правоты. Три варианта ответа
        на каждый пример.
      quizzes:
        count: 6
        source: "sc9 остаток (1v) + sc10 (5v)"
        description: >
          sc9 (1v): признание частичной правоты (музыка —
          оставшийся).
          sc10 (5v): финальный микс — нападка, возражение
          или возражение с признанием (спор о фильме,
          контрольная, рисование, книга, подарок).
      vera_role: ""
      rey_role: ""
      voice_role: >
        Голос — впервые слушает. Тихий, усталый. Вопрос
        Марко о любви к ученикам — удар в уязвимое место.
        Голос — бывший учитель. Когда-то любил. Перестал.

    cliffhanger:
      duration: "1-2 мин"
      summary: >
        Голос молчит. Долго. Потом — тихо: «Когда они
        перестали слушать.» Динамики выключаются. Софа:
        «Марко... Голос ответил. Честно. Впервые.» Число:
        16. Упало на два. «Но это не победа. Голос
        готовит последнюю речь. И она будет... искренней.
        Искренняя демагогия — самая опасная.»
      sofa_reaction: "«Голос ответил честно. Но честность демагога — не честность. Это... новый уровень.»"
      next_episode_hook: "Голос готовит последнюю речь. Не ложь — искренность. Как разобрать того, кто верит в каждое слово?"

    quiz_distribution:
      from_brief: 10
      added_story: 0
      moved_to_extra: 1
      total: 10

    extra_practice:
      count: 1
      source: "sc2 остаток (adapted)"
      description: >
        Адаптированный кейс из sc2: переделать нападку в
        возражение с признанием частичной правоты. Допрактика
        после эпизода.

  # =====================================================================
  # ЭПИЗОД 43 — «Тринадцатый приём»
  # =====================================================================
  - ep: 43
    blocks: ["11B.1"]
    title: "Тринадцатый приём"
    terms_introduced: ["демагогия", "слова-триггеры", "фильтр «Где факты?»"]
    terms_used: ["возражение", "признание частичной правоты", "нападка на человека", "ложный авторитет", "ложная дилемма", "подмена понятий", "поспешное обобщение", "вопрос-ловушка", "страшная цепочка", "манипуляция страхом", "пугало (искажение слов)", "уклонение от ответа", "ложная причина"]
    total_quizzes: 15

    drama:
      duration: "3-4 мин"
      location: "Центральная площадь Зеркального Города"
      characters: ["Марко", "Софа", "Лина", "Рей", "Голос", "толпа"]
      summary: >
        Площадь. Голос — последняя речь перед городом.
        Красивая. ИСКРЕННЯЯ. Голос верит в каждое слово.
        Рей — в толпе. Впервые не на сцене, а среди людей.
        Слушает как зритель. Лина рядом с Марко — считает
        приёмы. Голос: «Мы все хотим одного — чтобы дети
        были в безопасности.» Лина: «Подмена тезиса. Один.»
        «Разве кто-то хочет хаоса?» — «Вопрос-ловушка.
        Два.» «Я делаю это ради вас!» — «Апелляция к
        эмоциям. Три.» «Этот мальчик опасен!» — «Нападка
        на человека. Четыре.» «Без меня город падёт!» —
        «Страшная цепочка. Пять.» Речь продолжается.
        Шесть, семь, восемь... двенадцать приёмов. И —
        тринадцатый: «Я единственный, кто заботится о
        ваших детях.» Лина замирает: «Тринадцать.»
      gut_feeling: >
        Речь красивая. Даже Марко чувствует: хочется
        поверить. Голос не лжёт — он ВЕРИТ. Это страшнее
        лжи. Лина считает приёмы холодно, как хирург.
        Но руки дрожат. Рей в толпе — впервые слушает
        и ВИДИТ приёмы. Трещина в его зависимости от Голоса.
      marko_flaw: >
        Марко хочет поверить. Голос говорит искренне —
        а Марко привык верить искренним. Но искренность —
        не доказательство. Можно искренне заблуждаться.

    sofa_block:
      duration: "4-5 мин"
      term_introduced: "демагогия, слова-триггеры, фильтр «Где факты?»"
      trigger: >
        Софа: «Тринадцать приёмов в одной речи. У всех
        них есть общее имя — демагогия. Демагогия — когда
        создают видимость аргумента, но внутри — пустота.
        Демагог не врёт напрямую — он ведёт тебя кривой
        дорогой, чтобы ты пришёл к его выводу сам.» Затем:
        «Слова-триггеры — сигналы демагогии. Если слышишь:
        "Все знают, что...", "Это же очевидно!", "Любой
        нормальный человек...", "Только дурак не понимает..."
        — включай фильтр.» Ещё хитрая фраза: «Я не
        говорю, что он врёт... но задумайтесь...» — вроде
        ничего не сказал, а подозрение посеяно. Главный
        фильтр: «ГДЕ ФАКТЫ?» Если в ответ тишина или
        новые уловки — перед вами демагог. Парад десяти
        видов демагогии (все уже знакомы по курсу): ложная
        причина, поспешное обобщение, уклонение от ответа,
        подмена понятий, нападка на человека, пугало,
        страшная цепочка, ложный авторитет, ложная дилемма,
        вопрос-ловушка. Теперь у них общее имя — демагогия.
      quizzes:
        count: 6
        source: "brief 11B sc2 (1v) + sc3 (3v) + sc5 (30v, выбираем 2)"
        description: >
          sc2 (1v): какие факты привёл Богдан на школьном
          собрании — ни одного.
          sc3 (3v): блогер vs стример — чья оценка демагогия;
          фехтование — есть ли факты; закономерность.
          sc5 (2v): узнай приём — из большой практики
          (первые два примера).
      rule: >
        «Демагогия — видимость аргумента без аргумента. Все
        уловки, которые вы изучили — это виды демагогии.
        Слова-триггеры: "все знают", "это очевидно", "любой
        нормальный". Фильтр: "ГДЕ ФАКТЫ?" Нет фактов —
        демагогия.»
      life_question: >
        «Одноклассник: "Все нормальные люди играют в эту
        игру!" Какие слова-триггеры ты слышишь? Что
        спросить в ответ?»

    challenge:
      duration: "5-6 мин"
      summary: >
        Лина и Марко разбирают речь Голоса приём за приёмом.
        Софа: «Считай приёмы.» После каждого фрагмента —
