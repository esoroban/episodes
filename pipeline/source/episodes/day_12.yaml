  # =====================================================================
  # ЭПИЗОД 47 — «Интеллектуальная битва»
  # =====================================================================
  - ep: 47
    blocks: ["12B.1"]
    title: "Интеллектуальная битва"
    terms_introduced: ["манипуляция", "четыре кнопки манипуляции", "универсальный ответ на манипуляцию"]
    terms_used: ["демагогия", "карта демагогии (12 видов)", "пять причин не использовать демагогию", "ложная дилемма", "красивые слова без фактов", "нападка на человека"]
    total_quizzes: 14

    drama:
      duration: "4-5 мин"
      location: "Зеркальный Город, финальная комната — зал Голоса"
      characters: ["Марко", "Софа", "Голос", "София"]
      summary: >
        Финальная комната. Голос и Марко — лицом к лицу.
        Голос не кричит. Говорит тихо. «Я защищал тебя.
        Я единственный, кому не всё равно.» Марко узнаёт
        приёмы: красивые слова без фактов. Но Голос
        переключается. Больше не демагогия — давление на
        чувства. «Ты бросил Макса. Ты бросил сестру. Ты
        бросаешь всех, кто тебя любит.» — вина. «Без
        меня этот город рухнет. И ты будешь виноват.» —
        страх. «Ты думаешь, что умнее всех? Маленький
        мальчик с телефоном?» — стыд. «Я был рядом, когда
        никого не было. Ты предашь единственного, кто
        остался?» — шантаж дружбой. Марко чувствует каждый
        удар. Не в голову — в сердце. Это другое. Демагогия
        путала мысли. Это — сжимает грудь. Софа мигает:
        «Марко... это не демагогия. Это... другое.»
      gut_feeling: >
        Каждое слово Голоса — как крючок в рёбра. Марко
        хочет согласиться — не потому что Голос прав, а
        потому что БОЛЬНО не соглашаться. Вина, страх,
        стыд — три удара подряд. А потом — «ты мне друг» —
        и Марко почти кивает. Почти.
      marko_flaw: >
        Марко хочет согласиться, чтобы боль прекратилась.
        Его слабость — соглашаться с тем, кто говорит
        уверенно — работает на все четыре кнопки. Голос
        знает это. Голос выстроил весь маршрут вокруг
        этой слабости.

    sofa_block:
      duration: "5-6 мин"
      term_introduced: "манипуляция, четыре кнопки манипуляции, универсальный ответ на манипуляцию"
      trigger: >
        Софа: «Мост. Демагогия запутывает ГОЛОВУ. То, что
        делает Голос сейчас, — сжимает СЕРДЦЕ. Это называется
        манипуляция — давление на ЧУВСТВА, чтобы заставить
        что-то сделать. Не на разум — на эмоции.» История
        Гриши и Маши: Гриша каждый день забирал печенье
        Маши. Не приводил аргументов. Просто: «Ты же
        хорошая подруга?» Маша отдавала — и чувствовала
        себя плохо. Но не понимала, ПОЧЕМУ должна
        соглашаться. Главный признак: после манипуляции
        тебе ПЛОХО. «Четыре кнопки: вина ("Я столько
        для тебя сделал"), страх ("Будет плохо!"), стыд
        ("Что, боишься?"), шантаж дружбой ("Настоящие
        друзья так не поступают").» Аналогия: кнопки
        лифта — манипулятор нажимает нужную кнопку, и ты
        едешь куда ОН хочет. Универсальный ответ: «Это
        манипуляция. Давай по существу.» — работает на
        все четыре кнопки. Софа: «Голос только что нажал
        все четыре. По очереди. Вина — страх — стыд —
        дружба. Ты почувствовал?»
      quizzes:
        count: 6
        source: "brief sc2 (2v) + sc4 (12v, выбираем 4)"
        description: >
          sc2 (2v): что делал Гриша (давил на чувства) +
          какое чувство вызывал (вину).
          sc4 (4v): демагогия или манипуляция — Никита с
          очками (демагогия — ложный авторитет), бабушка Даши
          (манипуляция — вина), Матвей про домашку (демагогия —
          поспешное обобщение), Тимур с велосипедом (манипуляция
          — шантаж дружбой).
      rule: >
        «Манипуляция — давление на ЧУВСТВА, а не на разум.
        Четыре кнопки: вина, страх, стыд, шантаж дружбой.
        Универсальный ответ: "Это манипуляция. Давай по
        существу." Демагог путает голову. Манипулятор
        сжимает сердце.»
      life_question: >
        «Одноклассник говорит: "Настоящие друзья так не
        поступают!" Какую кнопку он нажимает? Что ответить?»

    challenge:
      duration: "5-6 мин"
      summary: >
        Марко принимает решение. Берёт телефон. Смотрит
        на Софу. И — выключает. Кладёт на пол. «Я должен
        сам.» Зритель тоже — без подсказок. Голос
        аргументирует: «Без меня ты бы не дошёл сюда.
        Ты обязан мне.» (вина) «Город рухнет без порядка.
        Хаос!» (страх) «Маленький мальчик думает, что
        умнее системы?» (стыд + нападка) «Я был рядом.
        Всегда.» (шантаж дружбой) Зритель определяет
        кнопки сам. Марко: «Я не знаю, правы вы или нет.
        Но это мои ошибки. Не ваши. И я хочу их совершать
        сам.» Голос замирает. Не потому что побеждён —
        потому что впервые кто-то сказал «я не знаю»
        и не сломался. Три слова, которые Марко не мог
        произнести в эпизоде 1, — теперь его оружие.
        Практика: демагогия или манипуляция + определи тип/
        кнопку.
      quizzes:
        count: 8
        source: "sc4 остаток (8v)"
        description: >
          sc4 (8v): демагогия или манипуляция — Аня с Оскаром
          (демагогия — ложный авторитет), мама Коли (манипуляция
          — страх), продавец (демагогия — красивые слова),
          подружки Сони (манипуляция — стыд), блогер (демагогия),
          одноклассник-шантажист Олега (манипуляция — шантаж
          дружбой), реклама йогурта (демагогия), подруга Кати
          (манипуляция — вина).
      vera_role: ""
      rey_role: ""
      voice_role: >
        Голос — главный противник. Лицом к лицу. Использует
        все четыре кнопки манипуляции по очереди. Замирает,
        когда Марко говорит «я не знаю» и не ломается.

    cliffhanger:
      duration: "1-2 мин"
      summary: >
        Голос замирает. Руки дрожат. Город ЗАМОЛКАЕТ.
        Марко впервые говорит от СЕБЯ — не повторяет чужие
        слова, не соглашается, не спорит. Просто видит
        и называет. София: «Пойдём с нами.» Тень Голоса
        встаёт и идёт к двери. Человек — за тенью.
        Но Голос оборачивается: «Будет другой ребёнок.
        Другое исчезновение. Я не единственный.» Марко:
        «Знаю. И всё равно выхожу.»
      sofa_reaction: "Софа выключена. Впервые Марко говорит без подсказок. И справляется."
      next_episode_hook: "Голос замолк. Город молчит. Но стены — всё ещё стоят. Что произойдёт, когда они станут прозрачными?"

    quiz_distribution:
      from_brief: 14
      added_story: 0
      moved_to_extra: 9
      total: 14

    extra_practice:
      count: 9
      source: "sc5 (9v)"
      description: >
