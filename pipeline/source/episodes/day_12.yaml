    title: "Лучший ученик"
    terms_introduced: ["карта демагогии (12 видов)", "поспешное обобщение", "нападка на человека", "пугало", "ложный авторитет", "ложная дилемма", "страшная цепочка", "вопрос-ловушка", "подмена понятий", "ложная причина", "уклонение от ответа", "красивые слова без фактов", "«я не говорю, что...»"]
    terms_used: ["демагогия", "факт", "мнение", "неправда", "причина", "совпадение", "манипуляция страхом", "пугало (искажение слов)", "ложный авторитет", "вопрос-ловушка", "подмена понятий", "составной вопрос", "риторический вопрос (вопрос-утверждение)"]
    total_quizzes: 14

    drama:
      duration: "4-5 мин"
      location: "Зеркальный Город, центральная серверная — командный пункт Зеркального Города"
      characters: ["Марко", "Софа", "София (запись)", "мама (запись)"]
      summary: >
        После Дня 11 — Лина ведёт Марко с площади через переулок,
        вниз по железной двери в подвале старой котельной, по узкой
        металлической лестнице. У нижней площадки Лина останавливается:
        «Дальше — твоё. Внутрь я не пойду. Я подожду наверху.»
        Марко открывает дверь — это не комната Софы, а ЦЕНТРАЛЬНАЯ
        серверная Зеркального Города (командный центр). Чёрные стойки,
        потушенные индикаторы, тёмные кабели уходят в стены/пол/потолок.
        В центре — главный терминал с пустым полем пароля:
        «ВВЕДИТЕ ПАРОЛЬ: _». На полу выложено буквами М-А-Р-К-О.
        Софа тихо: «Ты прошёл весь путь.» Марко: «Ты знала?»
        Софа: «...да.» «С самого начала?» «София запрограммировала
        весь маршрут.» Марко садится на пол. Софа открывает в чате
        аудиофайл (короткое подводящее: «Запись. Полгода назад.»).
        Голос мамы: «София, не делай этого. Ты не вернёшься.»
        София: «Мам, я вернусь. И Марко будет готов.» Мама:
        «А если нет?» «Тогда он справится сам.» Запись обрывается.
        Мама знала. Отпустила. Позволила. Марко вспоминает старые
        очки Леона из эпизода 43 («Когда поймёшь — наденешь»),
        достаёт их из рюкзака, надевает. Серверная меняется: тёмные
        кабели наливаются голубым, тысячи светящихся нитей пульсируют,
        тянутся к городу. Сходятся над терминалом, переплетаются
        в светящийся адрес — www.wordpowerlab.com. Имя системы —
        имя пароля. Марко вводит букву за буквой:
        W-W-W. Точка. W-O-R-D-P-O-W-E-R-L-A-B. Точка. C-O-M.
        ДОСТУП ОТКРЫТ. Индикаторы оживают. У дальней стены принтер
        щёлкает, греется. Софа: «Пароль принят. Я внутри. Принтер
        уже греет первую страницу. Прежде — карта.» Софа предлагает
        обзор всего, чему Марко научился — карту приёмов.
      gut_feeling: >
        Предательство? Нет. Хуже. Забота, которая решила за тебя.
        Марко чувствует: каждый его шаг был написан сестрой.
        Каждая опасность — декорация. Но знания — настоящие.
        Инструменты работают. Вопрос: если тебя научили обманом —
        знания настоящие или нет?
      marko_flaw: >
        Марко хочет разозлиться и сдаться — бросить всё,
        раз это «не настоящее». Но Софа: «Тренировка стала
        войной. Голос зашёл слишком далеко. Знания настоящие.
        Они тебе сейчас нужнее, чем когда-либо.»

    sofa_block:
      duration: "5-6 мин"
      term_introduced: "карта демагогии (12 видов), поспешное обобщение, нападка на человека, пугало, ложный авторитет, ложная дилемма, страшная цепочка, вопрос-ловушка, подмена понятий, ложная причина, уклонение от ответа, красивые слова без фактов, «я не говорю, что...»"
      trigger: >
        Софа: «Прежде чем смотреть видео — вспомни всё, чему
        научился. Карта демагогии — двенадцать приёмов, которые
        ты уже видел в действии. Теперь у каждого есть имя.»
        Систематический каталог. Каждый вид — через историю
        из школьной жизни + определение + фраза-защита:
        1) Поспешное обобщение — Дима: «ВСЕ сдали деньги!»
        (сдали 3 из 25). Защита: «Кто именно? Сколько?»
        2) Нападка на человека — Лена: «Да что ты понимаешь,
        ты вообще новенькая!» Защита: «Давай про идею, а не
        про меня.»
        3) Пугало — Саша: «То есть ты хочешь, чтобы мы вообще
        не тренировались?!» Защита: «Я такого не говорил.»
        4) Ложный авторитет — певица рекламирует витамины.
        Защита: «Она эксперт в этом?»
        5) Ложная дилемма — «Или ты с нами, или ты предатель!»
        Защита: «А третий вариант?»
        6) Страшная цепочка — мама: «Не сделаешь домашку —
        не поступишь — будешь дворником!» Защита: «Каждый
        шаг доказан?»
        7) Вопрос-ловушка — «Ты уже перестал списывать?»
        Защита: «Твой вопрос предполагает, что я списывал.»
        8) Подмена понятий — Миша: «Я не списываю, я
        креативно заимствую!» Защита: «Подожди, это одно
        и то же.»
        9) Ложная причина — «Артём надел красные носки —
        и мы выиграли!» Защита: «Это совпадение, а не
        причина.»
        10) Уклонение от ответа — «Где велосипед?» — «А ты
        свою комнату убрал?» Защита: «Не меняй тему.»
        11) Красивые слова без фактов — Богдан на совете:
        «Наш класс самый дружный! Мы покорим вершину!» —
        «А куда едем-то?» Защита: «Красиво, но где факты?»
        12) «Я не говорю, что...» — Лиза: «Я не хочу
        сказать, что ты плохая подруга, но...» — камень
        в коробке с бантиком. Защита: «Ты только что
        именно это и сказала.»
        Универсальный ответ на все 12: «Это демагогия.
        Где факты?» Софа: «Голос использовал все двенадцать.
        Теперь ты знаешь их имена.»
      quizzes:
        count: 6
        source: "brief sc1 (15v, выбираем 4) + sc2 (10v, выбираем 2)"
        description: >
          sc1 (4v): разминка по курсу — способы проверки, причина/
          совпадение, ловушка слов, факт/мнение (4 из 15).
          sc2 (2v): демагогия или честный аргумент — «Все
          нормальные дети уже посмотрели!» (поспешное обобщение),
          «Ты ещё маленький, чтобы понимать» (нападка на человека).
      rule: >
        «Карта демагогии — двенадцать приёмов. Каждый имеет имя,
        определение и фразу-защиту. Универсальный ответ: "Это
        демагогия. Где факты?"»
      life_question: >
        «В рекламе, мультиках, на школьном дворе — какой из
        двенадцати приёмов ты замечаешь чаще всего?»

    challenge:
      duration: "5-6 мин"
      summary: >
        Софа: «Голос использовал все двенадцать. Давай
        вспомним.» На экране — моменты из предыдущих
        эпизодов. Каждый приём Голоса получает имя из карты.
        Рей на площади: «Все согласны!» — поспешное обобщение.
        Голос через динамики: «Или отдай, или потеряй» —
        ложная дилемма. Стражник: «Кто ты такой, чтобы
        сомневаться?» — нападка на человека. Марко впервые
        видит СИСТЕМУ целиком: не отдельные хитрости, а
        скоординированную атаку по всем фронтам. Практика:
        блиц — демагогия или честный аргумент, определи тип.
      quizzes:
        count: 8
        source: "sc2 остаток (8v)"
        description: >
          sc2 (8v): демагогия или честный аргумент — «Или ты
          с нами, или предатель» (ложная дилемма), «Я не хочу
          сказать, что ты плохой друг, но...» («я не говорю,
          что...»), и ещё 6 примеров из блица по разным типам.
      vera_role: ""
      rey_role: ""
      voice_role: >
        Голос — через записи и воспоминания. Все его приёмы
        из предыдущих эпизодов получают формальные имена.
        Система становится видимой.

    cliffhanger:
      duration: "1-2 мин"
      summary: >
        Софа: «Карта готова. Принтер допечатывает.» Принтер
        серверной шумит, выплёвывает первый лист — тёплый,
        чернила блестят. В шапке листа — чёрно-белая фотография:
        София и Голос рядом, плечо к плечу, у общего стола
        со схемой М-А-Р-К-О. Под фото — заголовок:
        «ПРОЕКТ ЗЕРКАЛЬНЫЙ ГОРОД. АРХИТЕКТОРЫ: СОФИЯ. ГОЛОС.»
        Соавторы. Софа: «Ты уверен, что хочешь читать дальше?»
        Марко: «Я должен.»
      sofa_reaction: "«Архив открыт. Но Марко... то, что ты прочитаешь, изменит всё.»"
      next_episode_hook: "Распечатка: София и Голос — СОАВТОРЫ. Тренировка стала войной."

