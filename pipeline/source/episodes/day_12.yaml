    drama:
      duration: "4-5 мин"
      location: "Зеркальный Город, центральная серверная → стеклянная комната Софии"
      characters: ["Марко", "Софа", "София (видео)", "Голос (видео)", "София"]
      summary: >
        ГЛАВНЫЙ ТВИСТ. Принтер серверной выплёвывает первую
        страницу — фото в шапке: София и Голос ВМЕСТЕ, соавторы,
        у общего стола со схемой М-А-Р-К-О. Под фото —
        расшифровка совещания. Заголовок: «Совещание. Авторы:
        София. Голос». София говорит: «Он придёт за мной.
        Каждая глава — урок. Каждая потеря — экзамен.» В сноске —
        пометка курсивом: «Голос кивает. Делает запись.»
        Соавторы. Цель Софии — научить брата мыслить. Зеркальный
        Город — её проект. Голос согласился помочь. Принтер
        выплёвывает вторую страницу, дата другая, позже. В шапке —
        другая фотография: София бледная, руки дрожат. Голос
        рядом — поза другая, закрытая, жёсткая. Заголовок:
        «Внеплановое совещание». Расшифровка: София в панике:
        «Стирания должны были быть иллюзией! Вы обещали!» Голос
        спокойно: «Планы меняются.» «Это не было в договоре!»
        «Договоры меняются тоже.» Последние строки разрывают
        ровный шрифт: «Марко, если ты это читаешь — я не знала.
        Тренировка стала войной. Он зашёл слишком далеко.»
        Расшифровка обрывается на середине строки. София заперта
        по-настоящему — не по сценарию. Софа: «Цель Софии —
        научить. Цель Голоса — контролировать. Инструменты
        одинаковые. Цели разные.» Марко входит к Софии. Один
        глаз серый, один карий. «Ты написала план. Каждый урок.
        Каждая потеря.» София кивает. «Макс?» — «Макса я не
        планировала.» Идеальных планов не бывает. Марко: «Я не
        знаю, правильно ли ты поступила. Но я здесь.» «Может
        быть» — не слабость, а честность.
      gut_feeling: >
        Земля уходит из-под ног. Сестра — не жертва, а
        архитектор. Голос — не абсолютное зло, а партнёр,
        который предал условия. Нет чёрного и белого. Марко
        хочет ненавидеть кого-то одного — но нельзя. Оба
        виноваты. Оба хотели помочь. Оба зашли слишком далеко.
      marko_flaw: >
        Марко хочет простить сразу — привычка соглашаться.
        Но «может быть» — честнее, чем «да» или «нет».
        Впервые Марко позволяет себе не знать ответа.

    sofa_block:
      duration: "4-5 мин"
      term_introduced: "пять причин не использовать демагогию"
      trigger: >
        Софа: «София использовала демагогию ради блага Марко.
        Голос — ради контроля. Оба проиграли. Почему?» История
        Владика — мастера слова, который побеждал каждый спор
        с помощью демагогии (поспешное обобщение, нападка,
        пугало), но потерял друзей: его не позвали на день
        рождения. «Люди НЕ всегда видят хитрость, но ВСЕГДА
        её чувствуют.» Пять причин не использовать демагогию:
        1) Теряешь доверие — каждый раз, когда ловят.
        2) Теряешь друзей — как Владик, как Голос с Софией.
        3) Плохая репутация — слух идёт впереди тебя.
        4) Эффект бумеранга — те же приёмы используют
        против тебя.
        5) Не учишься спорить честно — слабеешь, как мышца
        без нагрузки.
        Метафора: «Демагогия — как кредит: победа сейчас,
        платишь потом. Честные аргументы — как вклад.»
        Параллель: София взяла «кредит» — спасла Марко,
        но потеряла его доверие. Голос взял «кредит» побольше —
        и потерял всё.
      quizzes:
        count: 5
        source: "brief sc6 (12v, выбираем 5)"
        description: >
          sc6 (5v): финальный блиц — по одному на каждый тип
          демагогии: поспешное обобщение, нападка, пугало,
          ложная дилемма, подмена понятий (демагогия или честный
          аргумент + определи тип).
      rule: >
        «Пять причин не использовать демагогию: потеря доверия,
        потеря друзей, плохая репутация, эффект бумеранга, не
        учишься спорить честно. Демагогия — кредит. Победа
        сейчас — плата потом.»
      life_question: >
        «София манипулировала Марко ради его блага. Голос —
        ради контроля. Результат одинаковый: оба потеряли
        доверие. Добрая манипуляция — это всё ещё манипуляция?»

    challenge:
      duration: "5-6 мин"
      summary: >
        Марко стоит перед Софией. Один глаз серый, один карий.
        Софа: «София использовала все двенадцать приёмов.
        Голос — тоже. Но инструменты нейтральны. Важна цель.
        И ещё важнее — согласие. София не спросила Марко.
