        и телефон, Вика и спектакль, папа Димы, Ксюша и
        танцы, Саша и домашка, сестра Кости, тренер по
        футболу). Допрактика после эпизода.

  # =====================================================================
  # ЭПИЗОД 48 — «Стены прозрачнеют»
  # =====================================================================
  - ep: 48
    blocks: ["12B.2", "12B.3"]
    title: "Стены прозрачнеют"
    terms_introduced: ["честная просьба"]
    terms_used: ["манипуляция", "четыре кнопки манипуляции", "универсальный ответ на манипуляцию", "демагогия", "карта демагогии (12 видов)"]
    total_quizzes: 14

    drama:
      duration: "4-5 мин"
      location: "Зеркальный Город — стены, улицы, выход"
      characters: ["Марко", "Софа", "София", "Макс", "Голос"]
      summary: >
        Стены прозрачнеют. Впервые — свет. Горожане моргают,
        оглядываются. Помнят. Входит Макс — глаза карие.
        Настоящие. «Ты кричал моё имя. Очень громко. Я
        услышал.» Марко включает Софу. Экран мигает. Софа:
        «Привет, Марко. Я скучала.» Последний квиз Софы —
        не экзамен, а разговор. Число на стене? Стены нет.
        ВСЕ вспомнили Софию. Марко, София, Макс идут к
        выходу. Город обычный. Голос у двери — тихий, почти
        человеческий: «Будет другой ребёнок.» Марко: «Знаю.
        И всё равно выхожу.» Софа включается сама. Экран
        мигает: «Новый пользователь... обнаружен. Имя... не
        определено. Начинаю подготовку.» Софа уже готовит
        следующего ребёнка.
      gut_feeling: >
        Свет. Настоящий свет, а не зеркальные отражения.
        Макс — живой, настоящий, с карими глазами. Но
        радость с привкусом горечи: Голос не побеждён. Он
        отпустил. И найдёт другого. Марко знает это — и
        всё равно выходит.
      marko_flaw: >
        Марко хочет остаться — исправить всё, спасти всех
        горожан. Привычка: пытаться угодить всем. Но
        понимает: нельзя спасти всех. Можно — себя, сестру,
        друга. И передать знания дальше.

    sofa_block:
      duration: "4-5 мин"
      term_introduced: "честная просьба"
      trigger: >
        Софа: «Последний термин. Манипуляция — давление на
        чувства. Но есть другой путь — честная просьба.
        При честной просьбе можно отказать БЕЗ последствий.
        Никто не обидится, не назовёт плохим, не перестанет
        дружить.» Главное правило: при честной просьбе можно
        сказать «нет» — и всё нормально. При манипуляции
        отказ = ты виноват, трус или плохой друг. Примеры
        пар: «Поможешь с задачей? Если занят — спрошу
        позже» (честная) vs «Тебе что, всё равно, как я
        напишу контрольную?» (манипуляция — вина). «Пойдём
        в кино? Если другие планы — всё нормально» (честная)
        vs «Тебе наша дружба не важна?» (манипуляция —
        шантаж дружбой). Сложная ситуация: бабушка не злая —
        она скучает; ответ с эмпатией, но без подчинения.
        «У тебя ВСЕГДА есть право сказать "нет" без чувства
        вины.» Параллель: Голос никогда не просил. Всегда
        требовал. София тоже не спросила Марко. Честная
        просьба — единственный путь, при котором оба
        остаются людьми.
      quizzes:
        count: 5
        source: "brief sc6 (8v, выбираем 5)"
        description: >
          sc6 (5v): честная просьба или манипуляция — помощь
          с задачей (честная), «тебе всё равно» (манипуляция —
          вина), приглашение в кино (честная), шантаж дружбой
          кино (манипуляция), книжка на неделю (честная).
      rule: >
        «Честная просьба — просьба, при которой можно
        отказать БЕЗ последствий. Никто не обидится,
        не назовёт плохим. При манипуляции отказ = ты
        виноват, трус или плохой друг. У тебя ВСЕГДА
        есть право сказать "нет" без чувства вины.»
      life_question: >
        «Друг: "Одолжи велик, а то я расскажу всем твой
        секрет!" Это честная просьба или манипуляция?
        Какая кнопка нажата? Как ответить?»

    challenge:
      duration: "5-6 мин"
      summary: >
        Финальный микс — всё вперемешку из уроков 12A и 12B.
        Марко, София, Макс идут через прозрачный город.
        На стенах — надписи, фразы, объявления. Каждая —
        демагогия, манипуляция или честная просьба. Зритель
        определяет тип. Софа ведёт последний квиз — не как
        экзамен, а как разговор: «Марко прошёл двенадцать
        дней. Какой приём ты заметишь первым? Кому ты
        доверяешь — и почему?» Философское закрытие: манипуляция
        как кредит с огромными процентами — получаешь «да»
        сегодня, платишь доверием завтра. Возврат к Грише:
        Маша ненавидела и перемены, и Гришу через месяц.
        Честность эффективнее. Два суперответа: на демагогию —
        «Где факты?», на манипуляцию — «Давай по существу».
        Главное правило: у вас ЕСТЬ право сказать «нет» без
        чувства вины — всегда.
      quizzes:
        count: 9
        source: "sc6 остаток (3v) + sc8 (15v, выбираем 6)"
        description: >
          sc6 (3v): честная просьба или манипуляция — «жадина
          расскажу всем» (манипуляция — страх), «мне грустно
          но я понимаю» (честная), «столько делаю а ты»
          (манипуляция — вина).
          sc8 (6v): финальный микс — демагогия (ложный
          авторитет, ложная дилемма, поспешное обобщение),
          манипуляция с указанием кнопки (вина, стыд, шантаж
          дружбой), честная просьба. Пограничные случаи.
      vera_role: ""
      rey_role: ""
      voice_role: >
        Голос — на пороге. Тихий, почти человеческий.
        Не побеждён — отпустил. «Будет другой ребёнок.»
        Предупреждение, а не угроза.

    cliffhanger:
      duration: "1-2 мин"
      summary: >
        Марко, София и Макс выходят из Зеркального Города.
        Свет. Настоящий. Софа включается сама: «Новый
        пользователь... обнаружен. Имя... не определено.
        Начинаю подготовку.» Марко улыбается. Не грустно —
        понимающе. Знания не исчезают. Они передаются.
        Софа уже готовит следующего ребёнка. Цикл
        продолжается — но теперь у Марко есть выбор.
        Настоящий выбор.
      sofa_reaction: "«Новый пользователь обнаружен. Марко... спасибо. За всё.»"
      next_episode_hook: "Город позади. Школа впереди. Но мир — тот же. Марко — другой."

    quiz_distribution:
      from_brief: 14
      added_story: 0
      moved_to_extra: 14
      total: 14

    extra_practice:
      count: 14
      source: "sc7 (5 discussion, adapted) + sc8 остаток (9v)"
      description: >
        Адаптированные дискуссии из открытой практики (ластик
        + стыд, день рождения + шантаж дружбой, брат-шантажист,
        бабушка + вина, крыша + стыд, домашка + вина) +
        оставшиеся вопросы финального микса. Допрактика
