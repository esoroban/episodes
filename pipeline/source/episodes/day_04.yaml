# EPISODE PLAN — День 4
# Уроки: 4A, 4B
# Акт: II — Обучение через боль
# Source episodes: 9, 10
# Статус: ЧЕРНОВИК

day: 4
lessons: ["4A", "4B"]
story_arc: "Акт II: Обучение через боль"
story_summary: "Зеркало-портал: мама. Рекламная улица. Рей. Два плаката Софии"
source_episodes: [9, 10]

# =====================================================================
# ЭПИЗОД 13 — «То, что слова прячут»
# =====================================================================
episodes:

  - ep: 13
    blocks: ["4A.1"]
    title: "То, что слова прячут"
    terms_introduced: ["невербальная коммуникация", "ГЛАЗ"]
    terms_used: ["солдат", "разведчик", "эмпатия (сопереживание)", "активное слушание", "формула высказывания"]
    total_quizzes: 12

    drama:
      duration: "3-4 мин"
      location: "Зеркальный Город, тупик с зеркалом-порталом"
      characters: ["Марко", "Мама", "Софа"]
      summary: >
        После потери Леона Марко бродит по Городу. В тупике
        находит зеркало, которое показывает реальный мир — кухню
        дома. Мама сидит за столом. Чашка в руках. Говорит:
        «У меня всё хорошо.» Но руки сжимают чашку добела.
        Глаза — не на Марко. На дверь. Как будто ждёт, что
        кто-то войдёт. Мама знает больше, чем говорит.
      gut_feeling: >
        Мама улыбается — но улыбка не доходит до глаз. Как
        фотография: всё правильно, но что-то мёртвое. Тело
        Марко чувствует: мама врёт. Но зачем?
      marko_flaw: >
        Марко хочет верить маме. Хочет, чтобы «всё хорошо»
        было правдой. Но после Леона и Веры — каждому тёплому
        слову нужна проверка.

    sofa_block:
      duration: "4-5 мин"
      term_introduced: "невербальная коммуникация, ГЛАЗ"
      trigger: >
        Софа: «Мама сказала "хорошо". Но ты видел руки.
        Видел глаза. Три инструмента разведчика работают
        со словами. Но иногда слова врут — а тело почти
        никогда.» Вводится невербальная коммуникация —
        передача информации без слов (лицом, руками,
        позой, голосом). Четвёртый инструмент — ГЛАЗ:
        видеть то, что слова прячут. Пример из урока:
        мама спрашивает про суп — рот говорит «вкусно»,
        а руки отодвигают тарелку. Тело — честный болтун.
      quizzes:
        count: 5
        source: "story + brief concept"
        description: >
          Квизы на определение: совпадают слова и тело или нет.
          Основаны на сцене с мамой + базовые примеры невербальной
          коммуникации.
      rule: >
        «Четвёртый инструмент разведчика — ГЛАЗ. Слова можно
        подготовить. Тело — нет. Когда слова говорят одно,
        а тело — другое — верь телу.»
      life_question: >
        «Друг говорит "мне не обидно", но руки скрещены
        и голос дрожит. Чему верить — словам или телу?»

    challenge:
      duration: "5-6 мин"
      summary: >
        Марко применяет ГЛАЗ к воспоминаниям: Вера обнимала,
        но глаза сканировали комнату. Леон нервничал — пальцы
        барабанили по столу. Мама говорит «хорошо» — руки
        сжимают чашку. Практика: определить, что тело говорит
        в разных ситуациях.
      quizzes:
        count: 7
        source: "story + brief sc5"
        description: >
          Ситуации из сюжета (мама, Вера, Леон) + адаптация
          sc5 (Дмитрик: «да, хочу играть» + закрытое тело).
      vera_role: ""
      rey_role: ""
      voice_role: ""

    cliffhanger:
      duration: "1-2 мин"
      summary: >
        Мама вдруг смотрит прямо в зеркало. Глаза — мокрые.
        «Не приходи больше. Пожалуйста.» Бьёт по зеркалу
        с той стороны. Трещина. Изображение рассыпается.
        Но Марко видел: мама ПЛАКАЛА. Защищала его —
        или прогоняла? Тело сказало одно. Слова — другое.
        Число: 39.
      sofa_reaction: "«Мама... знает. Вопрос — что именно.»"
      next_episode_hook: "Мама знает про Город. Но почему она прогнала Марко?"

    quiz_distribution:
      from_brief: 1
      added_story: 11
      moved_to_extra: 12
      total: 12

    extra_practice:
      count: 12
      source: "sc1 (7v разминка: факт/мнение/неправда + причина/совпадение) + sc2 (5v повторение: цели спора, солдат/разведчик, инструменты)"
      description: >
        Разминка по пройденным урокам. Повторение всех
        предыдущих терминов в новых ситуациях. Допрактика
        после эпизода.

  # =====================================================================
  # ЭПИЗОД 14 — «Рекламная улица»
  # =====================================================================
  - ep: 14
    blocks: ["4A.2", "4A.3", "4A.4"]
    title: "Рекламная улица"
    terms_introduced: ["зрительный контакт", "открытая поза", "закрытая поза", "жесты", "мимика", "интонация", "сарказм"]
    terms_used: ["невербальная коммуникация", "ГЛАЗ", "солдат", "разведчик"]
    total_quizzes: 15

    drama:
      duration: "3-4 мин"
      location: "Зеркальный Город, Рекламная улица"
      characters: ["Марко", "Рей", "Софа"]
      summary: >
        Марко выходит на центральную улицу Города. Билборды.
        Плакаты. Голос везде. «ВСЕ ДОВОЛЬНЫ. ПРИСОЕДИНЯЙСЯ.»
        На сцене — Рей. Пятнадцать лет. Красивый. Уверенный.
        Говорит так, что хочется аплодировать. Но Марко
        включает ГЛАЗ: Рей улыбается — но пальцы сжаты.
        Говорит «мы все свободны» — но плечи подняты к ушам.
        Слова красивые. Тело кричит другое.
      gut_feeling: >
        Рей говорит правильные вещи. Толпа кивает. Но у Марко
        мурашки по спине — как будто музыка играет в неправильной
        тональности. Красиво, но фальшиво.
      marko_flaw: >
        Марко хочет подойти и сказать «ты врёшь!» — солдат
        рвётся наружу. Но разведчик наблюдает. Пока.

    sofa_block:
      duration: "4-5 мин"
      term_introduced: "зрительный контакт, открытая поза, закрытая поза, жесты, мимика, интонация, сарказм"
      trigger: >
        Софа разбирает Рея по деталям. Зрительный контакт —
        фонарик (три сообщения: слушаю, мне важно, не боюсь).
        Поза — как дверь: открытая (руки свободны) или закрытая
        (руки скрещены). Жесты — руками (указательные,
        выразительные, успокаивающие). Мимика — экран телефона
        (все уведомления видны). Интонация — КАК говоришь
        (громкость, темп, высота, паузы). Сарказм — оружие
        солдата (говоришь одно, имеешь в виду противоположное).
      quizzes:
        count: 4
        source: "brief sc6"
        description: >
          sc6 (4v): определить открытость или закрытость
          по описанию поведения (смотрит и улыбается; руки
          скрещены; повернулся и кивает; отвернулся спиной).
      rule: >
        «Полный набор разведчика: тормоз (сопереживание),
        зеркало (слушание), карта (формула), ГЛАЗ
        (невербальная коммуникация). Четыре инструмента —
        и ни один спор не застанет врасплох.»
      life_question: >
        «Друг говорит "мне всё равно", но руки скрещены
        и губы сжаты. Что видит ГЛАЗ?»

    challenge:
      duration: "5-6 мин"
      summary: >
        Марко наблюдает за толпой вокруг Рея. Читает мимику,
        жесты, интонации. Кто верит Рею? Кто сомневается?
        Тело выдаёт каждого. Финальное открытие: Рей сам
        говорит «Отлично!» три раза — с разной интонацией.
        Марко учится различать радость, сарказм и злость
        по голосу.
      quizzes:
        count: 11
        source: "brief sc7 + sc8"
        description: >
          sc7 (6v): определение эмоции по описанию мимики.
          sc8 (5v): определение настроения по интонации.
      vera_role: ""
      rey_role: >
        Рей — глашатай Голоса. Красивые слова, контролируемое
        тело. Но в момент, когда никто не смотрит — маска
        падает. Рей боится.
      voice_role: ""

    cliffhanger:
      duration: "1-2 мин"
      summary: >
        Толпа расходится. Рей остаётся на сцене один.
        Марко наблюдает из-за угла. Рей снимает улыбку —
        как маску. Плечи падают. Руки дрожат. Смотрит
        на своё запястье — там число. Его число. Оно тоже
        падает. Рей — не верующий. Рей — пленник.
        Число на стене: 38.
      sofa_reaction: "«Рей... тоже стирается. Голос не щадит даже своих.»"
      next_episode_hook: "Рей работает на Голос не по убеждению — по страху. Можно ли его перетянуть?"

    quiz_distribution:
      from_brief: 15
      added_story: 0
      moved_to_extra: 9
      total: 15

    extra_practice:
      count: 9
      source: "sc10 (9v): тон (радость/сарказм/злость), «ну ладно» (согласие/обида/раздражение), «спасибо» (благодарность/сарказм), ударения"
      description: >
        Экстра-практика: игра на тон и ударения.
        Тренировка различения интонации в одних и тех же
        словах. Допрактика после эпизода.

  # =====================================================================
  # ЭПИЗОД 15 — «Два плаката»
  # =====================================================================
  - ep: 15
    blocks: ["4B.1"]
    title: "Два плаката"
    terms_introduced: ["доверие (Этос)", "чувства (Пафос)", "доказательства (Логос)"]
    terms_used: ["факт", "невербальная коммуникация", "ГЛАЗ"]
    total_quizzes: 13

    drama:
      duration: "3-4 мин"
      location: "Зеркальный Город, заброшенный переулок за Рекламной улицей"
      characters: ["Марко", "Софа"]
      summary: >
        После наблюдения за Реем Марко заходит в переулок.
        На стене — два плаката. Оба — почерком Софии. Первый:
        «ПОМОГИТЕ! ОН ДЕРЖИТ МЕНЯ ЗДЕСЬ! Я НЕ МОГУ ВЫБРАТЬСЯ!»
        Второй: «Всё идёт по плану. Он ещё не знает. Не мешай.»
        Один давит на чувства. Другой — на логику. Оба —
        почерком Софии. Оба — настоящие. Какой верить?
      gut_feeling: >
        Первый плакат — крик. Хочется бежать спасать.
        Второй — холодный расчёт. Хочется довериться.
        Оба тянут в разные стороны. Как будто два голоса
        в одной голове. И ни один не слышит другого.
      marko_flaw: >
        Марко соглашается с последним прочитанным. Если
        прочитал «ПОМОГИТЕ» — бежит спасать. Если прочитал
        «не мешай» — останавливается. Порядок чтения
        определяет решение. Это его старая слабость.

    sofa_block:
      duration: "4-5 мин"
      term_introduced: "доверие (Этос), чувства (Пафос), доказательства (Логос)"
      trigger: >
        Софа: «Два плаката. Два способа убедить. Но способов
        на самом деле три.» Через историю экскурсии из урока:
        Маша давит репутацией (мы же лучший класс!), Дмитрик —
        эмоциями (будет так весело!), Оленка — фактами
        (стоимость, расстояние, расписание). Три способа
        убеждения: ДОВЕРИЕ (Этос) — верим человеку, его
        авторитету. ЧУВСТВА (Пафос) — задевают эмоции.
        ДОКАЗАТЕЛЬСТВА (Логос) — факты, которые можно
        проверить. Первый плакат Софии — пафос (крик,
        страх, жалость). Второй — логос (план, расчёт,
        факты). А этос? Марко верит обоим, потому что
        это СОФИЯ. Её авторитет — этос.
      quizzes:
        count: 6
        source: "brief sc2 + sc3 + sc4"
        description: >
          sc2 (4v): определить способ убеждения каждого
          из трёх персонажей + кто привёл факты.
          sc3 (2v из 3): определить способ в рекламных
          фразах.
      rule: >
        «Три способа убеждения: доверие (верю ЧЕЛОВЕКУ),
        чувства (задевают ЭМОЦИИ), доказательства (показывают
        ФАКТЫ). Разведчик проверяет: каким способом меня
        убеждают — и есть ли за ним правда?»
      life_question: >
        «Блогер с миллионом подписчиков говорит: "Эти
        витамины — лучшие!" Какой способ он использует?
        И достаточно ли этого?»

    challenge:
      duration: "5-6 мин"
      summary: >
        Марко разбирает плакаты Города и рекламу Рея через
        призму трёх способов. «ВСЕ ДОВОЛЬНЫ» — пафос или
        логос? «Голос знает лучше» — этос. «97% жителей
        согласны» — логос (но можно ли проверить?).
        Ловушка: популярность не равна экспертизе.
      quizzes:
        count: 7
        source: "brief sc3 + sc4"
        description: >
          sc3 (1v): оставшийся квиз. sc4 (6v из 10):
          определить один способ убеждения в рекламных
          фразах (конструктор, рюкзак, площадка, шампунь,
          наборы, планшет).
      vera_role: ""
      rey_role: >
        Реклама Рея разбирается как пример: красивые
        слова (пафос), авторитет Голоса (этос), но где
        доказательства (логос)?
      voice_role: >
        Голос убеждает через все три способа, но
        доказательства всегда непроверяемы.

    cliffhanger:
      duration: "1-2 мин"
      summary: >
        Софа анализирует оба плаката. Первый — чистый пафос.
        Второй — чистый логос. Ни в одном нет всех трёх
        способов. «Если София хотела, чтобы ты поверил —
        она бы использовала все три. А она разделила их.
        Зачем?» Софа замолкает. Впервые — не из-за батареи.
        Просто замолкает. Как будто боится ответа.
        Число: 37.
      sofa_reaction: "Молчит. Не из-за батареи — из-за ответа."
      next_episode_hook: "Зачем София разделила способы убеждения на два плаката? Она пленница или сообщница?"

    quiz_distribution:
      from_brief: 13
      added_story: 0
      moved_to_extra: 14
      total: 13

    extra_practice:
      count: 14
      source: "sc4 остаток (4v) + sc5 (10v multichoice: несколько способов в одной фразе)"
      description: >
        Определить один способ в рекламных фразах (остаток)
        + найти несколько способов в одной фразе (multichoice).
        Допрактика после эпизода.

  # =====================================================================
  # ЭПИЗОД 16 — «Табуретка»
  # =====================================================================
  - ep: 16
    blocks: ["4B.2"]
    title: "Табуретка"
    terms_introduced: ["баланс способов"]
    terms_used: ["доверие (Этос)", "чувства (Пафос)", "доказательства (Логос)", "ГЛАЗ", "невербальная коммуникация"]
    total_quizzes: 14

    drama:
      duration: "3-4 мин"
      location: "Зеркальный Город, переулок с двумя плакатами"
      characters: ["Марко", "Софа"]
      summary: >
        Марко один перед двумя плакатами. Софа молчит — экран чёрный.
        Марко перечитывает оба. Первый — крик. Второй — расчёт.
        Читает первый — ноги несут бежать. Читает второй — ноги
        останавливаются. Порядок определяет решение. Марко замечает
        собственную слабость: он — весы без гирь, соглашается
        с последним прочитанным. Пугается. Софа перезагружается.
        Экран мигает. «Я... считала.» — «Что?» — «Ножки.»
      gut_feeling: >
        Марко ловит себя на том, что меняет решение каждый раз,
        когда перечитывает. Как будто внутри нет якоря. Последнее
        слово всегда побеждает — и это страшно.
      marko_flaw: >
        Главная слабость Марко в чистом виде: порядок чтения
        определяет решение. Он осознаёт это впервые — и именно
        это осознание позволяет Софе ввести инструмент защиты.

    sofa_block:
      duration: "4-5 мин"
      term_introduced: "баланс способов"
      trigger: >
        Софа: «Табуретка. Три ножки — доверие, чувства,
        доказательства. Убери одну — рухнет. Первый плакат
        Софии — одна ножка: пафос. Второй — одна ножка: логос.
        Ни один не устойчив.» Правило: нет баланса — включай
        подозрение. Если бы София хотела убедить — использовала бы
        все три. Она разделила нарочно. Пример идеальной рекламы:
        «Рекомендуют диетологи (доверие), вкус детства (чувства),
        без сахара (доказательства)». Сравнение: «пожааалуйста»
        (одна ножка) vs три ножки — побеждает второй.
      quizzes:
        count: 6
        source: "brief sc6"
        description: >
          sc6 (6v из 9): сбалансировано или нет (сок+врач,
          купи+все покупают, книжка+учителя, не купишь+пожалеешь,
          15 лет работы, крем+ужасная кожа).
      rule: >
        «Табуретка убеждения: три ножки — доверие, чувства,
        доказательства. Нет одной — рухнет. Нет баланса —
        включай подозрение.»
      life_question: >
        «Друг уговаривает попробовать новую игру: "Все играют!
        Это так круто!" Сколько ножек? Чего не хватает?»

    challenge:
      duration: "5-6 мин"
      summary: >
        Марко применяет баланс к рекламе Города и речам Рея.
        «ВСЕ ДОВОЛЬНЫ» — какой ножки не хватает? Речь Рея:
        доверие (авторитет Голоса) + чувства (страх) — а где
        доказательства? Плакаты Софии: каждый — одна ножка.
        Практика «починки»: как добавить недостающую ножку,
        чтобы убеждение стало устойчивым. Финальное открытие:
        табуретке нужна ДРУГАЯ ножка, а не та же самая подлиннее.
      quizzes:
        count: 8
        source: "brief sc7 + sc8"
        description: >
          sc7 (6v): чего не хватает в убеждении (телефон,
