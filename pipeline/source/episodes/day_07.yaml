day: 7
lessons: ["7A", "7B"]
story_arc: "Акт II: Обучение через боль"
story_summary: "Марко один. Сем. Число падает без артефактов. Голос — ОТЕЦ Веры"
source_episodes: [17, 18]

episodes:

  # =====================================================================
  # ЭПИЗОД 25 — «Шоколад на щеке»
  # =====================================================================
  - ep: 25
    blocks: ["7A.1"]
    title: "Шоколад на щеке"
    terms_introduced: ["противоречие", "закон непротиворечия"]
    terms_used: ["закон тождества", "обобщение", "контр-ход"]
    total_quizzes: 14

    drama:
      duration: "3-4 мин"
      location: "Зеркальный Город, пустая улица"
      characters: ["Марко", "Сем", "Софа"]
      summary: >
        Марко один. Леон стёрт. Макс стёрт. Лина — предала?
        Вера — агент Голоса. Мама — отдала Софию. Марко сидит
        на тротуаре. Не двигается. Из-за угла — мальчик.
        Восемь лет. Испуганный. Большие глаза. «Ты тоже
        заблудился?» Сем. Софа: «Не в программе Софии.
        Но полезен. Объяснять другому = учиться самому.»
        Сем: «Что это за место?» Марко: «Зеркальный Город.»
        Сем: «А почему всё серое?» Марко начинает объяснять —
        и сам вспоминает то, что начал забывать.
      gut_feeling: >
        Сем смотрит с надеждой. Как щенок. Марко хочется
        отвернуться — у него нет сил на чужую надежду.
        Но Сем берёт его за руку. И от этого становится
        чуть легче.
      marko_flaw: >
        Марко хочет бежать дальше один — быстрее, без
        обузы. Но Софа права: объясняя Сему, он учится сам.

    sofa_block:
      duration: "4-5 мин"
      term_introduced: "противоречие, закон непротиворечия"
      trigger: >
        Сем: «А учительница сказала "я никогда не вру".
        А потом соврала про расписание. Это как?» Софа:
        «Это — противоречие. Когда слова говорят одно,
        а действия — противоположное. В одно и то же время,
        в одном и том же смысле.» Закон непротиворечия
        Аристотеля: одно утверждение не может быть
        одновременно истинным и ложным. Важно: смена
        мнения со временем — не противоречие. Разные
        люди — не противоречие. Только одновременно
        и в одном смысле. Пример: шоколад на щеке
        и «я не ел конфеты» — противоречие.
      quizzes:
        count: 6
        source: "brief sc4 (6v из 10)"
        description: >
          sc4 (6v): противоречие или нет (собака, устал,
          домашка, погода, обманываю, каша/суп).
      rule: >
        «Противоречие — когда слова и действия не совпадают.
        В одно время, в одном смысле. Закон непротиворечия:
        одно утверждение не может быть одновременно да и нет.»
      life_question: >
        «Друг говорит: "Мне всё равно, кто победит."
        А через минуту злится, что проиграл. Противоречие?»

    challenge:
      duration: "5-6 мин"
      summary: >
        Марко учит Сема замечать противоречия в Городе.
        Голос говорит «свобода» — но двери заперты.
        Вера говорит «защищаю» — но числа падают.
        Продвинутые случаи: двойные стандарты, ложные
        абсолюты, смена мнения со временем (не противоречие).
      quizzes:
        count: 8
        source: "brief sc4 остаток + sc5"
        description: >
          sc4 (4v): честная игра, не жадная, спорт, мультик.
          sc5 (4v из 8): продвинутые — свобода vs запрет,
          истина у каждого vs ты неправ, правила vs исключения,
          никогда сладкое vs торт через год.
      vera_role: >
        Вера — пример противоречия: «защищаю» vs числа падают.
      voice_role: >
        Голос — системное противоречие: «свобода» и запертые двери.

    cliffhanger:
      duration: "1-2 мин"
      summary: >
        Сем: «А учительница? Она сказала "я защищаю
        детей". Но число Леона упало после её урока.»
        Марко замирает. Сем — незнакомый ребёнок — увидел
        то, что Марко пропустил. Вера. Противоречие.
        Число: 27.
      sofa_reaction: "«Сем... заметил. Ты — нет. Объяснять = учиться.»"
      next_episode_hook: "Вера противоречит себе. Как указать на это — не обвиняя?"

    quiz_distribution:
      from_brief: 14
      added_story: 0
      moved_to_extra: 5
      total: 14

    extra_practice:
      count: 5
      source: "sc2 (1v Витя) + sc5 остаток (4v: думаю головой, один поступок, все мнения, честный разговор)"
      description: >
        Оставшиеся продвинутые квизы на противоречия.
        Допрактика после эпизода.

  # =====================================================================
  # ЭПИЗОД 26 — «Раньше ты говорил...»
  # =====================================================================
  - ep: 26
    blocks: ["7A.2"]
    title: "Раньше ты говорил..."
    terms_introduced: ["корректное напоминание"]
    terms_used: ["противоречие", "закон непротиворечия", "контр-ход"]
    total_quizzes: 12

    drama:
      duration: "3-4 мин"
      location: "Зеркальный Город, стена с деревом связей"
      characters: ["Марко", "Сем", "Софа"]
      summary: >
        Число: 26. Марко НЕ использовал артефакты. Стирание
        ускоряется. Кто стирает? Марко строит цепочку с Семом:
        Вера → журнал → данные → Голос → стирание. Каждое
        звено проверяемо. Кроме одного: ЗАЧЕМ Вере помогать?
        Сем: «Может, она не хочет. Может, её заставляют.»
        Марко готовится к встрече с Верой. Ему нужен
        инструмент — вежливый, но точный.
      gut_feeling: >
        Марко хочет крикнуть Вере «Ты предатель!». Но
        после Макса — знает: крик не работает. Нужен
        вопрос. Спокойный. Точный.
      marko_flaw: >
        Марко хочет обвинять. Солдат рвётся наружу.
        Но разведчик помнит: обвинение — не вопрос.

    sofa_block:
      duration: "4-5 мин"
      term_introduced: "корректное напоминание"
      trigger: >
        Софа: «Корректное напоминание. Формула: "Раньше
        ты говорил, что... Сейчас ты говоришь, что...
        Ты передумал или имеешь в виду что-то другое?"
        Три шага: раньше → сейчас → вопрос. Принцип:
        не нападать, а уточнять. Не обвинять — просить
        объяснить. Сильный человек не кричит "Ты врёшь!" —
        он спокойно спрашивает.»
      quizzes:
        count: 6
        source: "brief sc6"
        description: >
          sc6 (6v): выбор между грубым и вежливым
          способом указать на противоречие (кино, торт,
          уважаю мнение, все равны, проект готов, никому).
      rule: >
        «Корректное напоминание: "Раньше ты говорил...
        Как это совмещается с...?" Не нападай — уточняй.
        Вопрос сильнее обвинения.»
      life_question: >
        «Друг обещал пойти в кино, но пошёл с другими.
        Как напомнить — грубо или вежливо?»

    challenge:
      duration: "5-6 мин"
      summary: >
        Марко тренирует Сема формулировать вежливые вопросы.
        Готовится к встрече с Верой. Каждая ситуация — выбор
        между обвинением и вопросом. Марко составляет фразу
        для Веры: «Вы говорили, что защищаете детей. Но
        Макс был вашим учеником — и стёрся после вашего
        урока. Как это совмещается?»
      quizzes:
        count: 6
        source: "story-based"
        description: >
          6 сюжетных квизов: Марко формулирует корректные
          напоминания для Веры, Рея, Голоса. Выбор между
          грубым и вежливым вариантом.
      vera_role: >
        Вера — цель корректного напоминания. Марко
        готовит формулу для встречи.
      voice_role: ""

    cliffhanger:
      duration: "1-2 мин"
      summary: >
        Марко встаёт, идёт к дальней полке подполья.
        Среди пыльного барахла находит потрёпанную
        тетрадь — углы обтрёпаны, корешок перетянут
        резинкой. Открывает: на первой странице
        детская разноцветная подпись с сердечками
        «Дневник Веры. Никому не читать! Вера, 8 лет.
        Моё.» Не Софиина — Верина, двадцатилетней
        давности. Сем: «Веры — это нашей Веры?»
        Марко складывает: восемь лет, двадцать лет
        назад. Первая строчка дневника: «Папа
        сказал, что Зеркальный Город — это дом.»
        Число: 26. Софа в этой сцене не появляется
        — Марко сам опознаёт хозяйку через подпись.
      sofa_reaction: ""
      next_episode_hook: "Тетрадь Веры. «Папа сказал...» Кто папа Веры?"

    quiz_distribution:
      from_brief: 6
      added_story: 6
      moved_to_extra: 0
      total: 12

    extra_practice:
      count: 0
      source: ""
      description: ""

  # =====================================================================
  # ЭПИЗОД 27 — «Папа сказал»
  # =====================================================================
  - ep: 27
    blocks: ["7B.1"]
    title: "Папа сказал"
    terms_introduced: ["обоснование", "три типа обоснования"]
    terms_used: ["факт", "противоречие", "корректное напоминание"]
    total_quizzes: 12

    drama:
      duration: "3-4 мин"
      location: "Зеркальный Город, подполье"
      characters: ["Марко", "Сем", "Софа"]
      summary: >
        Марко читает тетрадь Веры. Детский почерк. Каждая
        запись начинается с «Папа говорит»: «Папа говорит,
        что Город — для тех, кого любят.» «Папа говорит,
        что стирание — это защита.» «Папа говорит, что
        я никогда не уйду.» Ни одного факта. Ни одной
        логической цепочки. Только голос отца. Авторитет.
        Сем: «Она верила папе. Как я верю своему.»
      gut_feeling: >
        Каждая строчка — детская. Беззащитная. Вера —
        не злодейка. Вера — девочка, которая верила папе.
        И папа оказался Голосом.
      marko_flaw: >
        Марко хочет осудить Веру. Но тетрадь показывает:
        Вера была как Сем — маленькая и верящая.

    sofa_block:
      duration: "4-5 мин"
      term_introduced: "обоснование, три типа обоснования"
      trigger: >
        Софа: «"Папа говорит" — это обоснование? Обоснование —
        это объяснение, ПОЧЕМУ ты так думаешь. Уважение к
        разговору. Три типа: ФАКТ — проверяемые данные, цифры.
        ЛОГИКА — одно следует из другого. НАДЁЖНЫЙ ИСТОЧНИК —
        эксперт, проверенная информация.» «"Папа говорит" —
        это источник. Но надёжный ли? "Просто потому что" и
        "все так говорят" — не обоснование.»
      quizzes:
        count: 4
        source: "brief sc3 (4v из 10)"
        description: >
          sc3 (4v): определить тип обоснования — факт,
          логика или источник (лёд скользкий, перепись,
          водный баланс, разрядка телефона).
      rule: >
        «Обоснование: ПОЧЕМУ ты так думаешь? Три типа:
        факт (проверяемые данные), логика (одно следует
        из другого), надёжный источник (эксперт). "Просто
        потому что" — не обоснование.»
      life_question: >
        «"Витамины полезные — брат так сказал." А брат — врач?
        Какой тип обоснования — и надёжный ли?»

    challenge:
      duration: "5-6 мин"
      summary: >
        Марко проверяет обоснования из тетради Веры.
        «Город — для тех, кого любят» — какой тип?
        Источник (папа). Но надёжный ли? «Стирание —
        защита» — факт, логика или источник? Практика
        определения типов обоснования.
      quizzes:
        count: 8
        source: "brief sc3 остаток + story"
        description: >
          sc3 (6v): моргание, разминка, окно зимой,
          планеты, таблица умножения, сидение.
          2 сюжетных: обоснования из тетради Веры.
      vera_role: >
        Файл Веры — ключевой артефакт. Каждая запись
        разбирается через призму обоснования.
      voice_role: >
        «Папа говорит» — Голос как единственный источник.
        Надёжный? Проверяемый?

    cliffhanger:
      duration: "1-2 мин"
      summary: >
        Последняя запись: «Папа сказал, что я никогда
        не уйду.» Дата — двадцать лет назад, дневник
        обрывается. Вера прожила в Городе двадцать лет
        с восьми. Сейчас она снаружи — учительница в
        школе Марко. Голос её не отпускал — он её
        ОТПРАВИЛ к детям. «Никогда не уйду» — это не
        про Город, это про неё: куда бы она ни пошла,
        он внутри. Она не агент — она ПЛЕННИЦА, которой
        дали поводок. Число: 25.
      sofa_reaction: "«Голос её не отпускал — он её отправил. Пленница без замка.»"
      next_episode_hook: "Вера — выпускница Города. Кто её папа?"

    quiz_distribution:
      from_brief: 10
      added_story: 2
      moved_to_extra: 0
      total: 12

    extra_practice:
      count: 0
      source: ""
      description: ""

  # =====================================================================
  # ЭПИЗОД 28 — «Отец Веры»
  # =====================================================================
  - ep: 28
    blocks: ["7B.2", "7B.3"]
    title: "Отец Веры"
    terms_introduced: ["нападение на человека", "три вида нападения", "защита от нападения (три шага)"]
    terms_used: ["обоснование", "факт", "противоречие", "контр-ход"]
    total_quizzes: 13

    drama:
      duration: "3-4 мин"
      location: "Зеркальный Город, центральная площадь"
      characters: ["Марко", "Сем", "Софа", "Голос"]
      summary: >
        Марко показывает тетрадь Сему. Сем: «Если папа Веры —
        Голос... а её отправили в нашу школу... значит, Вера
        до сих пор у него в плену?» Голос
        вмешивается. Не через динамики. Напрямую — голос
        в голове Марко. Тёплый. Отцовский. «Ты маленький.
        Ты ничего не понимаешь. Сначала вырасти — потом
        спорь.» Нападение на человека. Не на аргумент —
        на самого Марко. Потом — на Сема: «А ты вообще
        потерялся. Тебе бы домой, а не играть в детектива.»
      gut_feeling: >
        «Ты маленький» — и Марко чувствует себя маленьким.
        Слова попадают туда, где живёт сомнение. Как будто
        Голос знает, где болит.
      marko_flaw: >
        Марко хочет оправдываться: «Я не маленький!»
        Но оправдание — не ответ. Оправдание — это
        принятие чужих правил игры.

    sofa_block:
      duration: "4-5 мин"
      term_introduced: "нападение на человека, три вида нападения, защита от нападения (три шага)"
      trigger: >
        Софа: «Нападение на человека — атака на собеседника,
        не на аргумент. Когда нет хорошего обоснования —
        переключаются на ТЕБЯ. Три вида: ОСКОРБЛЕНИЕ — ярлык
        вместо ответа ("ленивый", "зубрилка"). ОБСТОЯТЕЛЬСТВА —
        дисквалификация ("тебе девять лет", "ты из другого
        района"). "САМ ТАКОЙ" — перевод стрелок ("а ты сам
        вчера...").» Защита — три шага: 1) назови приём,
        2) вернись к теме, 3) спроси «что не так с моим
        аргументом?» Принцип: если бьют по тебе, а не по
        словам — значит, слова сильные.
      quizzes:
        count: 5
        source: "brief sc5 + story"
        description: >
          sc5 (3v): определить вид нападения (оскорбление,
          обстоятельства, «сам такой»).
          2 сюжетных: Голос атакует Марко и Сема — какой вид?
      rule: >
        «Нападение на человека — не ответ на аргумент. Три
        вида: оскорбление, обстоятельства, "сам такой".
        Защита: назови приём, вернись к теме, спроси "что
        не так с моим аргументом?"»
      life_question: >
        «Одноклассник: "Ты двоечник, значит ты не прав."
        Это атака на аргумент или на человека?»

    challenge:
      duration: "5-6 мин"
      summary: >
        Голос замолчал. Софа подслушивает Город и
        подбрасывает Марко обрывки чужих разговоров —
        со школьного двора, из коридора, с улицы.
        Марко на ходу разбирает: где противоречие, где
        обоснование, где нападение на человека. Без
        «частей» и «практик» — живые примеры из мира
        Города. Финал: Марко применяет защиту-три-шага
        прямо против Голоса.
      quizzes:
        count: 8
        source: "brief sc7 + sc8"
        description: >
          sc7 (5v): повторение 7A — противоречие в
          историях (обещания, равенство, баловство,
          здоровое питание, списывание).
          sc8 (3v из 5): обоснование или нападение
          (сон-источник, домашка-сам такой,
          собаки-обстоятельства).
      vera_role: ""
      rey_role: ""
      voice_role: >
        Голос — мастер нападения на человека. Использует
        обстоятельства (возраст) как атаку — будто возраст
        отменяет правоту.

    cliffhanger:
      duration: "1-2 мин"
      summary: >
        Голос: «Вера — моя дочь. Я СОЗДАЛ Город для неё.
        Двадцать лет назад. Всё, что ты видишь — мой дом.
        И ты — гость. Незваный.» Софа: «Файл разблокирован.
        София знала. Она готовила тебя к этому.» Марко:
        «К чему?» Софа молчит. Сем сжимает руку Марко.
        Число: 24.
      sofa_reaction: "«София знала... про Голоса. Про Веру. Про всё.»"
      next_episode_hook: "Голос — отец Веры. Город — его дом. София знала. Что дальше?"

    quiz_distribution:
      from_brief: 11
      added_story: 2
      moved_to_extra: 0
      total: 13

    extra_practice:
      count: 0
      source: ""
      description: ""


