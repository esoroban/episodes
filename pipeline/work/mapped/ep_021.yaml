    original_ref: "6A.sc6 adapted"
    mapped_text: "Марко: «Почему ты стираешь?» Голос: «Стирание — какое грубое слово! Ты меня обижаешь!» Какой поворотник?"
    options: ["Смена темы", "Смена тональности", "Ответ на другой вопрос", "Честный ответ"]
    answer: "Смена тональности"
    explanation: "Голос изобразил обиду вместо ответа. Эмоция — мощное оружие: неловко продолжать спрашивать"

