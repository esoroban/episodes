    type: story
    original_ref: "6A.sc6 adapted"
    mapped_text: "Марко спрашивает Голос: «Зачем ты стираешь людей?» Голос отвечает: «Как тебе нравится Город? Красиво, правда?» Какой поворотник?"
    options: ["Смена темы", "Смена тональности", "Ответ на другой вопрос", "Честный ответ"]
    answer: "Смена темы"
    explanation: "Голос заговорил о красоте Города вместо ответа на вопрос о стирании. Переключил тему — надеется, что Марко забудет"

