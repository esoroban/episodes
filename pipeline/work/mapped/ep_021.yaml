    original_ref: "6A.sc6 adapted"
    mapped_text: "Марко: «Почему ты стираешь?» Голос: «Я даю свободу тем, кто заслужил.» Какой поворотник?"
    options: ["Смена темы", "Смена тональности", "Ответ на другой вопрос", "Честный ответ"]
    answer: "Ответ на другой вопрос"
    explanation: "Звучит как ответ — но Марко спрашивал «почему стираешь», а Голос ответил про «свободу». Самый коварный поворотник — похож на настоящий"

