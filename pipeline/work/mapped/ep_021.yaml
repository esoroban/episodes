theory_delivery:
  term: "уклонение от ответа (поворотник), смена темы, смена тональности, ответ на другой вопрос"
  scene_trigger: >
    Марко выходит из подполья. На площади — Рей с речью.
    Голос говорит Марко лично — тёплый, отцовский. Марко
    спрашивает: «Зачем ты стираешь?» Голос не отвечает:
    переключает тему («Как тебе нравится Город?»), шутит
    («Стирание — какое грубое слово!»), задаёт встречный
    вопрос («А ты уверен, что хочешь знать?»). Три
    поворотника за минуту. Потом — серьёзно: «У Макса —
    72 часа.»
  sofa_introduction: >
    Софа: «Марко спросил "зачем стираешь?" Голос ответил
    ТРИ раза — и ни разу по существу. Как машина: включил
    поворотник и уехал в другую сторону.» Уклонение от
    ответа = поворотник. Три способа: смена темы (говорит
    о другом), смена тональности (шутка или эмоция вместо
    ответа), ответ на другой вопрос (самый коварный —
    похож на настоящий).
  rule: >
    «Поворотник — включил и уехал от вопроса. Три способа:
    сменить тему, сменить тональность, ответить на другой
    вопрос. Самый коварный — третий: похож на настоящий ответ.»

sofa_quizzes:
