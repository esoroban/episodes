  - id: "sq4"
    type: story
    original_ref: "sc2.4"
    original_text: "«Тебе, наверное, было неприятно?» Есть сопереживание или нет?"
    mapped_text: "Марко говорит Максу: «Тебе, наверное, было больно — видеть, как его лицо начинает бледнеть?» Есть тут сопереживание?"
    options: ["Есть", "Нет"]
    answer: "Есть"
    explanation: "Марко пытается почувствовать то, что чувствовал Макс. Антенна разведчика работает"
    rationale: "Пересажено в сюжет — Марко впервые проявляет эмпатию к Максу"

  - id: "sq5"
    type: generic
    original_ref: "sc2.5"
    original_text: "«Ты всегда так говоришь.» Есть сопереживание или нет?"
    mapped_text: "«Ты всегда так говоришь!» Есть тут сопереживание?"
    options: ["Есть", "Нет"]
    answer: "Нет"
    explanation: "Обвинение, а не сопереживание. «Всегда» — маркер нападения, а не понимания"
    rationale: "Generic — обвинение вместо эмпатии, связано с маркерами из 3B.3"

