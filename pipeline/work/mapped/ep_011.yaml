# =====================================================================
# ТЕОРИЯ — как Софа вводит термины
# =====================================================================
theory_delivery:

  term: "эмпатия (сопереживание), активное слушание"
  scene_trigger: >
    Марко один в переулке Зеркального Города. Из тени выходит Макс —
    14 лет, половина лица стёрта (левая — нормальная, правая — как
    выцветшая фотография). Потерял брата — стирание забрало память
    о нём. Макс: «Никто ни разу не спросил: а каково тебе? Никто
    не попробовал почувствовать, что чувствую я.»
  sofa_introduction: >
    Софа: «Макс сказал: "Никто не спросил." София записала: "Научись
    слышать — это спасёт тебе жизнь." Но сначала — инструменты
    разведчика.» Напоминание:
    разведчик без инструментов — как юмористический пример из урока:
    разведчик с биноклем, который кричит «ГОВОРИ НЕМЕДЛЕННО!»
    (инструменты без уважения не работают). Первый инструмент —
    ЭМПАТИЯ (сопереживание): тормоз, который срабатывает ДО того,
    как скажешь обидное. Метафора: сопереживание — антенна
    разведчика. Три фразы-помощника: «Я понимаю, что тебе...»,
    «Тебе, наверное, обидно, когда...», «Я вижу, что тебе это
    важно...». Второй инструмент — АКТИВНОЕ СЛУШАНИЕ: слушать так,
    чтобы человек ВИДЕЛ, что ты слышишь. Ключевой приём — пересказ.
    Контраст: «Угу, понятно» vs «То есть тебя не позвали, и тебе
    обидно?». Три фразы-помощника: «Правильно ли я понял, что...»,
    «Ты имеешь в виду, что...», «То есть ты хочешь...».
  generic_story_kept: >
    Юмористический пример — разведчик с биноклем, который кричит
    «ГОВОРИ НЕМЕДЛЕННО!» — оставлен из урока. История Маши и
    Дмитрика: «Угу, понятно» vs пересказ — оставлена как аналогия
    Софы. Аналогия «испорченный телефон» (кошка → картошка) —
    оставлена для объяснения пересказа.
  rule: >
    «Два инструмента разведчика: сопереживание — тормоз (сначала
    почувствуй, потом говори). Активное слушание — зеркало (повтори
    своими словами, чтобы человек видел: ты слышишь).»
  life_question: >
    «Друг говорит: "Меня не взяли в команду." Ты отвечаешь:
    "Ну и ладно, в следующий раз возьмут." Есть тут сопереживание?»

