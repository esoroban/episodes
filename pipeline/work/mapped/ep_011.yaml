sofa_quizzes:

  - id: "sq1"
    type: story
    original_ref: "sc2.1"
    original_text: "«Мне всё равно.» Есть сопереживание или нет?"
    mapped_text: "Марко вспоминает: когда он рассказал однокласснику про Софию, тот ответил: «Мне всё равно.» Есть тут сопереживание?"
    options: ["Есть", "Нет"]
    answer: "Нет"
    explanation: "«Мне всё равно» — стена. Человек даже не пытается понять, что чувствует другой. Тормоз не сработал — его просто нет"
    rationale: "Пересажено в сюжет — Марко вспоминает реакцию на исчезновение Софии"

  - id: "sq2"
    type: story
    original_ref: "sc2.2"
    original_text: "«Я понимаю, что тебе обидно.» Есть сопереживание или нет?"
    mapped_text: "Макс говорит Марко: «Я понимаю, что тебе страшно. Я тоже боялся, когда брат начал исчезать.» Есть тут сопереживание?"
    options: ["Есть", "Нет"]
    answer: "Есть"
    explanation: "Макс чувствует то же, что Марко. Тормоз сработал — сначала почувствовал, потом сказал"
    rationale: "Пересажено в сюжет — Макс как пример естественной эмпатии"

  - id: "sq3"
    type: generic
    original_ref: "sc2.3"
    original_text: "«Хватит ныть.» Есть сопереживание или нет?"
    mapped_text: "«Хватит ныть!» Есть тут сопереживание?"
    options: ["Есть", "Нет"]
    answer: "Нет"
    explanation: "Тормоз отключен. Человек не хочет понимать — хочет, чтобы другой замолчал"
