# EPISODE MAP — Эпизод 002
# Пересадка квизов и теории в сюжет
# Источник: episodes/day_01.yaml (ep.2) + briefs/brief_1A.yaml (блок 1A.2)
# Статус: DRAFT

episode: 2
day: 1
blocks: ["1A.2"]
title: "Неправда и её виды"
terms_introduced: ["неправда"]
terms_available: ["факт", "мнение", "неправда"]

# =====================================================================
# ТЕОРИЯ — как Софа вводит термин
# =====================================================================
theory_delivery:

  term: "неправда"
  scene_trigger: >
    Вера уверенно сказала «ты переутомился». Софа уже разобрала в эп.1:
    это мнение (нет «переутомлемера»). Теперь переход: «А бывает так,
    что ПРОВЕРИТЬ можно, но при проверке — не подтверждается?»
    Возврат к истории Дмитрика из урока: его новость про отмену уроков
    можно было проверить — и она не подтвердилась.
  sofa_introduction: >
    Софа: «Мама сказала "нет сестры." Это можно проверить? Да.
    Если проверим и подтвердится — это факт. А если проверим и
    НЕ подтвердится?» Вводится термин НЕПРАВДА. Три вида неправды:
    шутка (знает, что неправда, хочет посмешить), сказка (все понимают,
    что не взаправду), фейк (специально придумано, чтобы поверили).
  generic_story_kept: >
    История Дмитрика (цепочка: Петрик ← старший брат ← интернет ← ?)
    оставлена как аналогия Софы — классический пример «сломанного телефона».
    Три вида неправды иллюстрируются через generic-примеры из урока
    (паук на плече = шутка, дракон с блинчиками = сказка, школы закроют = фейк).
  rule: >
    «Неправду можно разоблачить — потому что она проверяема.
    А в споре мнений победителя нет.»
  life_question: >
    «"На Земле 8 континентов." Факт, мнение или неправда?» (неправда)

# =====================================================================
# КВИЗЫ СОФА-БЛОКА (6 квизов)
# =====================================================================
sofa_quizzes:

  - id: "sq1"
    type: story
    original_ref: "sc8.61"
    original_text: "«На плечо сел паук!» (а его нет) — шутка, сказка или фейк?"
    mapped_text: "Одноклассник говорит: «Я видел Софию вчера в парке!» (не видел, хотел посмешить). Шутка, сказка или фейк?"
    options: ["шутка", "сказка", "фейк"]
    answer: "шутка"
    explanation: "Знает, что неправда. Хочет посмешить (или привлечь внимание)"
    rationale: "Пересажено в сюжет — одноклассник шутит про Софию"

  - id: "sq2"
    type: generic
    original_ref: "sc8.62"
    original_text: "«Дракон любит блинчики.» Шутка, сказка или фейк?"
    mapped_text: "«Дракон любит блинчики.» Шутка, сказка или фейк?"
    options: ["шутка", "сказка", "фейк"]
    answer: "сказка"
    explanation: "Все понимают, что не взаправду. Дракон — персонаж"
    rationale: "Generic — классический пример сказки"

  - id: "sq3"
    type: story
    original_ref: "sc8.63"
    original_text: "«Школы закроют навсегда!» — шутка, сказка или фейк?"
    mapped_text: "В школьном чате: «Марко выдумал сестру, чтобы не ходить на уроки!» Шутка, сказка или фейк?"
    options: ["шутка", "сказка", "фейк"]
    answer: "фейк"
    explanation: "Специально придумано. Кто-то хочет, чтобы другие поверили. Цель — навредить"
    rationale: "Пересажено в сюжет — фейк про Марко"

  - id: "sq4"
    type: generic
    original_ref: "sc8.64"
    original_text: "«Собака съела мою домашку!» Шутка, сказка или фейк?"
    mapped_text: "«Собака съела мою домашку!» Шутка, сказка или фейк?"
    options: ["шутка", "сказка", "фейк"]
    answer: "шутка"
    explanation: "Скорее всего знает, что неправда. Хочет отмазаться (посмешить или избежать)"
    rationale: "Generic — знакомая ситуация"

  - id: "sq5"
    type: story
    original_ref: "sc8.66"
    original_text: "«WiFi вызывает простуду!» Шутка, сказка или фейк?"
    mapped_text: "Вера говорит маме Марко: «У мальчика галлюцинации от экранного времени.» Шутка, сказка или фейк?"
    options: ["шутка", "сказка", "фейк"]
    answer: "фейк"
    explanation: "Специально придумано. Вера не врач. Хочет, чтобы мама поверила и забрала дневник"
    rationale: "Сюжетный — Вера создаёт фейк, но ребёнок пока не знает о её мотивах"
    spoiler_check: "Нет — Вера выглядит как заботливая учительница, которая ошибается, не как злодей"

  - id: "sq6"
    type: generic
    original_ref: "sc8.65"
    original_text: "«Единорог живёт в моём шкафу.» Шутка, сказка или фейк?"
    mapped_text: "«Единорог живёт в моём шкафу.» Шутка, сказка или фейк?"
    options: ["шутка", "сказка", "фейк"]
    answer: "сказка"
    explanation: "Все понимают, что не взаправду. Фантазия"
    rationale: "Generic — контраст с фейком"

# =====================================================================
# КВИЗЫ ИСПЫТАНИЯ (8 квизов)
# =====================================================================
challenge_quizzes:

  - id: "cq1"
    type: story
    original_ref: "sc9.69"
    original_text: "«Мой папа самый сильный в мире.» Факт, мнение или неправда?"
    mapped_text: "Марко говорит: «Моя сестра существует!» Факт, мнение или неправда?"
    options: ["факт", "мнение", "неправда"]
    answer: "факт"
    explanation: "Можно проверить: дневник с почерком, записи. При проверке подтвердится"
    rationale: "Ключевой момент: Марко утверждает факт, но никто не верит"

  - id: "cq2"
    type: story
    original_ref: "sc9.70"
    original_text: "«Моя мама самая красивая.» Факт, мнение или неправда?"
    mapped_text: "«Мама Марко — хорошая мать.» Факт, мнение или неправда?"
    options: ["факт", "мнение", "неправда"]
    answer: "мнение"
    explanation: "«Хорошая» — оценка. Нет «мамомера». У каждого своё понятие"
    rationale: "Эмоционально сложный: Марко любит маму, но она его обманывает"

  - id: "cq3"
    type: story
    original_ref: "sc10.73"
    original_text: "«Все дети любят сладкое.» Факт, мнение или неправда?"
    mapped_text: "«Все в классе считают, что Софии не было.» Факт, мнение или неправда?"
    options: ["факт", "мнение", "неправда"]
    answer: "неправда"
    explanation: "Можно проверить: спросить каждого. Лина помнит → уже не «все»"
    rationale: "Обобщение, которое рушится от одного исключения (Лина)"

  - id: "cq4"
    type: generic
    original_ref: "sc10.74"
    original_text: "«На Земле 8 континентов.» Факт, мнение или неправда?"
    mapped_text: "«На Земле 8 континентов.» Факт, мнение или неправда?"
    options: ["факт", "мнение", "неправда"]
    answer: "неправда"
    explanation: "Можно проверить (учебник, карта). При проверке — 6 или 7, не 8"
    rationale: "Классическая ловушка из урока: проверяемое ≠ правдивое"

  - id: "cq5"
    type: story
    original_ref: "sc10.75"
    original_text: "«Наша школа самая лучшая.» Факт, мнение или неправда?"
    mapped_text: "«Вера Андреевна — лучшая учительница в школе.» Факт, мнение или неправда?"
    options: ["факт", "мнение", "неправда"]
    answer: "мнение"
    explanation: "«Лучшая» — оценка. Нет «учительницемера». Субъективно"
    rationale: "Сюжетный — закладка. Вера кажется лучшей, но это мнение"

  - id: "cq6"
    type: story
    original_ref: null
    original_text: null
    mapped_text: "Вера говорит: «Марко, ты переутомился.» Факт, мнение или неправда?"
    options: ["факт", "мнение", "неправда"]
    answer: "мнение"
    explanation: "Нет «переутомлемера». Вера не проверяла. Это её оценка"
    rationale: "Ключевой квиз эпизода. Вера подаёт мнение как факт"
    spoiler_check: "Нет — Вера ошибается, не злодействует (с точки зрения ребёнка)"

  - id: "cq7"
    type: story
    original_ref: null
    original_text: null
    mapped_text: "«Дневник Софии — настоящий.» Факт, мнение или неправда?"
    options: ["факт", "мнение", "неправда"]
    answer: "факт"
    explanation: "Почерк можно сравнить. Дневник можно потрогать. При проверке подтверждается"
    rationale: "Финальный — дневник = улика = факт. Основа для следующих эпизодов"

  - id: "cq8"
    type: story
    original_ref: null
    original_text: null
    mapped_text: "Лина шепчет: «Они слушают.» Факт, мнение или неправда?"
    options: ["факт", "мнение", "неправда"]
    answer: "факт"
    explanation: "Можно проверить: кто слушает? как? Лина утверждает проверяемое. Но мы пока не знаем, подтвердится ли"
    rationale: "Клиффхэнгер-квиз. Факт, но ещё не проверенный — интрига"

# =====================================================================
# ЗАМЕНА ПЕРСОНАЖЕЙ
# =====================================================================
character_map:
  - from: "Дмитрик (приносит новость)"
    to: "безымянный одноклассник"
    rationale: "Проходная роль — пересказывает слух. Не тратим главных персонажей"
  - from: "Оленка (задаёт вопрос)"
    to: "Софа"
    rationale: "Софа выполняет функцию «того, кто задаёт правильный вопрос»"

# =====================================================================
# ПРОВЕРКИ
# =====================================================================
validation:
  term_order: PASS
  content_correctness: PASS
  spoiler_check: PASS
  future_leak_check: PASS
  notes: >
    Все три термина доступны: факт, мнение, неправда. Квизы трёхвариантные.
    Виды неправды (шутка/сказка/фейк) — подвиды, не отдельные термины.
    Вера — «заботливая, ошибающаяся» (не злодей). Лина — «помнит» (не агент).
    3 added story quizzes (cq6, cq7, cq8) — привязаны к клиффхэнгеру.
