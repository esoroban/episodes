theory_delivery:
  term: "обобщение (ловушка слов)"
  scene_trigger: >
    Агенты настигают Марко. Макс встаёт между ними.
    Агенты не дерутся — ГОВОРЯТ. «Макс ВСЕГДА бросал
    друзей.» «НИКТО не верит Максу.» «ВСЕ знают, что
    Макс — трус.» С каждой фразой — глаз Макса сереет.
    Слова стирают не хуже артефактов.
  sofa_introduction: >
    Софа: «Четыре красных флага: ВСЕ, НИКТО, ВСЕГДА,
    НИКОГДА. Почти всегда — преувеличение. Одного
    исключения достаточно, чтобы обобщение рассыпалось.»
    Защита: «Кто именно?» или «Правда все? Назови
    примеры.» Иногда обобщение верно (Луна одна,
    воздух нужен всем) — проверяем каждый раз.
  rule: >
    «Все, каждый, никто, всегда, никогда — пять
    слов-ловушек. Одного исключения достаточно,
    чтобы сломать обобщение. Спроси: "Кто именно?"»

sofa_quizzes:
  - id: "sq1"
    type: generic
    original_ref: "6B.sc5 #1"
    mapped_text: "«Все птицы летают.» Верное обобщение или есть исключение?"
    options: ["Верное обобщение", "Есть исключение"]
    answer: "Есть исключение"
    explanation: "Пингвины, страусы, киви — не летают. Одного исключения достаточно, чтобы обобщение рассыпалось"

  - id: "sq2"
    type: generic
    original_ref: "6B.sc5 #2"
    mapped_text: "«У Земли одна Луна.» Верное обобщение или есть исключение?"
    options: ["Верное обобщение", "Есть исключение"]
    answer: "Верное обобщение"
    explanation: "У Земли действительно одна Луна. Это проверяемый факт. Иногда обобщение верно — проверяем каждый раз"

  - id: "sq3"
    type: generic
    original_ref: "6B.sc5 #3"
    mapped_text: "«Все учителя строгие.» Верное обобщение или есть исключение?"
    options: ["Верное обобщение", "Есть исключение"]
    answer: "Есть исключение"
    explanation: "Конечно, есть добрые учителя. Одного примера достаточно: вспомни хотя бы одного нестрогого учителя"

  - id: "sq4"
    type: generic
    original_ref: "6B.sc5 #4"
    mapped_text: "«Все кошки боятся воды.» Верное обобщение или есть исключение?"
    options: ["Верное обобщение", "Есть исключение"]
    answer: "Есть исключение"
    explanation: "Турецкий ван, бенгальская кошка — любят воду. Одного исключения достаточно"

  - id: "sq5"
    type: generic
    original_ref: "6B.sc5 #5"
    mapped_text: "«Зимой всегда холодно.» Верное обобщение или есть исключение?"
    options: ["Верное обобщение", "Есть исключение"]
    answer: "Есть исключение"
    explanation: "В Австралии зимой тепло — у них лето! Зависит от страны и климата"

  - id: "sq6"
    type: generic
    original_ref: "6B.sc5 #6"
    mapped_text: "«Никому не нравятся уроки.» Верное обобщение или есть исключение?"
    options: ["Верное обобщение", "Есть исключение"]
    answer: "Есть исключение"
    explanation: "Кому-то нравится рисование, кому-то — физкультура. Одного исключения достаточно: тебе же что-то нравится?"

challenge_quizzes:
  - id: "cq1"
    type: generic
    original_ref: "6B.sc5 #7"
    mapped_text: "«Всем людям нужен воздух, чтобы дышать.» Верное обобщение или есть исключение?"
    options: ["Верное обобщение", "Есть исключение"]
    answer: "Верное обобщение"
    explanation: "Все люди дышат воздухом — это биологический факт. Обобщение верно"

  - id: "cq2"
    type: generic
    original_ref: "6B.sc5 #8"
    mapped_text: "«Все мальчики любят футбол.» Верное обобщение или есть исключение?"
    options: ["Верное обобщение", "Есть исключение"]
    answer: "Есть исключение"
    explanation: "Многие мальчики предпочитают шахматы, рисование или плавание. «Все» — ловушка"

  - id: "cq3"
    type: story
    original_ref: "story adapted"
    mapped_text: "Агент Голоса: «Макс ВСЕГДА бросал друзей.» Марко ищет исключение. Макс стоит между Марко и агентами. Рассыпается ли обобщение?"
    options: ["Да, Макс прямо сейчас защищает — контрпример", "Нет, может, раньше бросал"]
    answer: "Да, Макс прямо сейчас защищает — контрпример"
    explanation: "Макс стоит здесь, рискует собой. Одного исключения достаточно: «всегда бросал» — нет, вот он, защищает"

  - id: "cq4"
    type: story
    original_ref: "story adapted"
    mapped_text: "Агент: «НИКТО не верит Максу.» Марко хочет сломать обобщение. Что сказать?"
    options: ["«Это неправда!»", "«Я верю Максу. Вот исключение.»", "«Вы сами не верите себе!»"]
    answer: "«Я верю Максу. Вот исключение.»"
    explanation: "Одного исключения достаточно. Марко верит — значит «никто» неверно. Спокойный контрпример сильнее крика"

  - id: "cq5"
    type: story
    original_ref: "story adapted"
    mapped_text: "Агент: «ВСЕ знают, что Макс — трус.» Марко: «Назовите всех.» Агенты замолкают. Почему вопрос сработал?"
    options: ["Потому что «все» — ловушка, и назвать всех невозможно", "Потому что агенты испугались", "Потому что Марко крикнул громче"]
    answer: "Потому что «все» — ловушка, и назвать всех невозможно"
    explanation: "«Все» — красный флаг. Спроси «кто именно?» — и обобщение рассыпается. Агенты не могут назвать «всех»"

  - id: "cq6"
    type: story
    original_ref: "story adapted"
    mapped_text: "Рей на площади: «КАЖДЫЙ, кто помогал мальчику, пожалел.» Марко вспоминает — Лина помогала и не жалела (до предательства). Обобщение рассыпается?"
    options: ["Да, Лина — контрпример", "Нет, Лина потом предала"]
    answer: "Да, Лина — контрпример"
    explanation: "Рей сказал «каждый пожалел» — Лина не жалела, пока помогала. Предательство — отдельная тема. Обобщение «каждый» рассыпалось"

  - id: "cq7"
    type: story
    original_ref: "story adapted"
    mapped_text: "Рей: «НИКТО не побеждает Голос.» Марко вспоминает: София создала подпольную сеть и Софу. Побеждала ли она?"
    options: ["София не побеждала — она исчезла", "София сопротивлялась — это контрпример"]
    answer: "София сопротивлялась — это контрпример"
    explanation: "София создала подполье, программировала Софу, собирала доказательства. «Никто» не побеждает? София боролась. Одного исключения достаточно"

  - id: "cq8"
    type: story
    original_ref: "story adapted"
    mapped_text: "Макс: «Они правы. Я ДЕЙСТВИТЕЛЬНО бросил брата. Давно.» Это обобщение или факт?"
    options: ["Обобщение — один случай не «всегда»", "Факт — Макс сам признаёт"]
    answer: "Обобщение — один случай не «всегда»"
    explanation: "Один случай — не «всегда бросал». Макс путает один поступок с характером. Агенты превратили один случай в обобщение, и Макс поверил"

character_map:
  - from: "История Артёма: «ВСЕ имеют телефон» → два из тридцати"
    to: "Агенты: «ВСЕ знают, что Макс — трус» — Марко ищет контрпримеры"
    rationale: "Обобщения агентов ломаются тем же способом — контрпример"
  - from: "Защита: «Кто именно?» и «Правда все?»"
    to: "Марко: «Назовите всех» и «Я верю — вот исключение»"
    rationale: "Те же защитные вопросы, но в контексте стирания Макса"
  - from: "Дмитрик и брокколи: «никто → почти никто → большинство»"
    to: "Агенты отступают, когда Марко спрашивает «кто именно?»"
    rationale: "Обобщение рассыпается под давлением конкретных вопросов"

