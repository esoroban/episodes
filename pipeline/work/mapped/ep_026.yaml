theory_delivery:
  term: "корректное напоминание"
  scene_trigger: >
    Число: 26. Марко НЕ использовал артефакты. Стирание
    ускоряется. Марко строит цепочку с Семом: Вера →
    журнал → данные → Голос → стирание. Марко хочет
    крикнуть Вере «Ты предатель!». Но после Макса —
    знает: крик не работает. Нужен вопрос. Спокойный.
    Точный.
  sofa_introduction: >
    Софа: «Корректное напоминание. Формула: "Раньше
    ты говорил, что... Сейчас ты говоришь, что...
    Ты передумал или имеешь в виду что-то другое?"
    Три шага: раньше → сейчас → вопрос. Принцип:
    не нападать, а уточнять. Не обвинять — просить
    объяснить. Сильный человек не кричит "Ты врёшь!" —
    он спокойно спрашивает.»
  rule: >
    «Корректное напоминание: "Раньше ты говорил...
    Как это совмещается с...?" Не нападай — уточняй.
    Вопрос сильнее обвинения.»

sofa_quizzes:
  - id: "sq1"
    type: generic
    original_ref: "7A.sc6 #1"
    mapped_text: "Друг обещал пойти с тобой в кино, но пошёл с другими. Как указать на противоречие?"
    options: ["«Ты предатель! Ты обещал!»", "«Ты говорил, что пойдёшь со мной. Как это совмещается с тем, что ты пошёл с другими?»"]
    answer: "«Ты говорил, что пойдёшь со мной. Как это совмещается с тем, что ты пошёл с другими?»"
    explanation: "Корректное напоминание: раньше → сейчас → вопрос. Без обвинений, с просьбой объяснить"

  - id: "sq2"
    type: generic
    original_ref: "7A.sc6 #2"
    mapped_text: "Подруга сказала «я против сладкого», а сама ест торт. Как указать на противоречие?"
    options: ["«Ты врушка! Сама ешь торт!»", "«Ты говорила, что против сладкого. Как это совмещается с тортом? Передумала?»"]
    answer: "«Ты говорила, что против сладкого. Как это совмещается с тортом? Передумала?»"
    explanation: "Формула: раньше говорила → сейчас делаешь → передумала? Может, у неё есть объяснение"

  - id: "sq3"
    type: generic
    original_ref: "7A.sc6 #3"
    mapped_text: "Одноклассник: «Я уважаю все мнения!» А потом высмеял твою идею. Как указать?"
    options: ["«Ты лицемер!»", "«Ты говорил, что уважаешь все мнения. Как это совмещается с тем, что ты высмеял мою идею?»"]
    answer: "«Ты говорил, что уважаешь все мнения. Как это совмещается с тем, что ты высмеял мою идею?»"
    explanation: "Корректное напоминание: не нападаем, а уточняем. Может, он не заметил, что высмеял"

  - id: "sq4"
    type: generic
    original_ref: "7A.sc6 #4"
    mapped_text: "Тренер: «В нашей команде все равны.» А потом даёт одному игроку больше времени. Как указать?"
    options: ["«Это нечестно! У вас есть любимчики!»", "«Вы говорили, что все равны. Как это совмещается с тем, что Саша играет больше?»"]
    answer: "«Вы говорили, что все равны. Как это совмещается с тем, что Саша играет больше?»"
    explanation: "Спокойный вопрос. Может, тренер объяснит: Саша тренируется перед соревнованиями. А может — действительно противоречие"

  - id: "sq5"
    type: generic
    original_ref: "7A.sc6 #5"
    mapped_text: "Друг: «Мой проект полностью готов!» А потом весь вечер доделывает. Как указать?"
    options: ["«Ты обманщик! Проект не готов!»", "«Ты говорил, что проект готов. Как это совмещается с тем, что ты его доделываешь?»"]
    answer: "«Ты говорил, что проект готов. Как это совмещается с тем, что ты его доделываешь?»"
    explanation: "Формула: раньше → сейчас → вопрос. Может, «готов» означало «основная часть готова»"

  - id: "sq6"
    type: generic
    original_ref: "7A.sc6 #6"
    mapped_text: "Одноклассница: «Я никому ничего не должна!» А потом просит помочь с домашкой. Как указать?"
    options: ["«Раз ты никому не должна — я тебе тоже не помогу!»", "«Ты говорила, что никому не должна. Как это совмещается с просьбой о помощи? Может, мы всё-таки помогаем друг другу?»"]
    answer: "«Ты говорила, что никому не должна. Как это совмещается с просьбой о помощи? Может, мы всё-таки помогаем друг другу?»"
    explanation: "Корректное напоминание + мягкое предложение. Не месть, а уточнение. Вопрос сильнее обвинения"

challenge_quizzes:
  - id: "cq1"
    type: story
    original_ref: "story adapted"
    mapped_text: "Марко готовит фразу для Веры. Вера говорила: «Я защищаю детей.» Но число Леона упало после её урока. Какой вариант корректного напоминания?"
    options: ["«Вы предали нас, Вера Андреевна!»", "«Вы говорили, что защищаете детей. Но число Леона упало после вашего урока. Как это совмещается?»", "«Ладно, может, вы правы...»"]
    answer: "«Вы говорили, что защищаете детей. Но число Леона упало после вашего урока. Как это совмещается?»"
    explanation: "Корректное напоминание: раньше → сейчас → вопрос. Марко не обвиняет — он спрашивает. Вопрос сильнее крика"

  - id: "cq2"
    type: story
    original_ref: "story adapted"
    mapped_text: "Марко тренирует Сема. Ситуация: Рей говорил «Голос даёт свободу», но двери Города заперты. Сем выбирает фразу:"
    options: ["«Рей врёт! Двери заперты!»", "«Рей говорил, что Голос даёт свободу. Как это совмещается с запертыми дверями?»", "«Может, двери заперты для безопасности?»"]
    answer: "«Рей говорил, что Голос даёт свободу. Как это совмещается с запертыми дверями?»"
    explanation: "Сем учится формуле: раньше → сейчас → вопрос. Спокойно, без крика, с фактами"

  - id: "cq3"
    type: story
    original_ref: "story adapted"
    mapped_text: "Марко вспоминает: Голос говорил «Я забочусь о детях». Но Макса стёрли. Какое корректное напоминание?"
    options: ["«Ты убил Макса!»", "«Ты говорил, что заботишься о детях. Как это совмещается с тем, что Макс стёрт?»", "«Макс сам виноват?»"]
    answer: "«Ты говорил, что заботишься о детях. Как это совмещается с тем, что Макс стёрт?»"
    explanation: "Формула: забочусь о детях (раньше) → Макс стёрт (сейчас) → как совмещается? Факт сильнее эмоции"

  - id: "cq4"
    type: story
    original_ref: "story adapted"
    mapped_text: "Сем: «А Вера? Она говорила, что не знает, куда делся Леон. Но в Софиных записях — страницы с её почерком.» Какое корректное напоминание для Веры?"
    options: ["«Вы врали нам!»", "«Вы говорили, что не знаете про Леона. Но в записях — ваш почерк. Как это совмещается?»", "«Записи могут быть поддельными.»"]
    answer: "«Вы говорили, что не знаете про Леона. Но в записях — ваш почерк. Как это совмещается?»"
    explanation: "Корректное напоминание с доказательством (почерк). Факт + формула = сильный вопрос"

  - id: "cq5"
    type: story
    original_ref: "story adapted"
    mapped_text: "Марко составляет фразу для встречи с Верой. Какой вариант самый сильный?"
    options: ["«Вера Андреевна, вы обманщица!»", "«Вера Андреевна, раньше вы говорили, что защищаете детей. Сейчас числа падают, Леон стёрт, Макс стёрт. Вы передумали или имеете в виду что-то другое?»", "«Вера Андреевна, мне всё равно, что вы скажете.»"]
    answer: "«Вера Андреевна, раньше вы говорили, что защищаете детей. Сейчас числа падают, Леон стёрт, Макс стёрт. Вы передумали или имеете в виду что-то другое?»"
    explanation: "Полная формула: раньше → сейчас (три факта!) → передумали или другое? Сильный человек спокойно спрашивает"

  - id: "cq6"
    type: story
    original_ref: "story adapted"
    mapped_text: "Сем спрашивает Марко: «А если Вера заплачет?» Марко: «Слёзы — не ответ. Мы повторим вопрос.» Каким инструментом?"
    options: ["Крикнуть громче", "Волшебная фраза: «Это важно, давайте вернёмся к вопросу...»", "Замолчать и уйти"]
    answer: "Волшебная фраза: «Это важно, давайте вернёмся к вопросу...»"
    explanation: "Волшебная фраза (из эпизода 22) + корректное напоминание = два инструмента вместе. GPS разговора работает и со слезами"

