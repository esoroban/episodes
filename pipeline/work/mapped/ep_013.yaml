episode: 13
day: 4
blocks: ["4A.1"]
title: "То, что слова прячут"
terms_introduced: ["невербальная коммуникация", "ГЛАЗ"]
terms_available: ["факт", "мнение", "неправда", "хитрое утверждение", "отговорка", "инструменты проверки", "детектив правды", "повторяемость", "закономерность", "совпадение", "светофор повторений", "причина", "следствие", "после — не значит вследствие", "третья причина", "три цели спора", "солдат", "разведчик", "эмпатия (сопереживание)", "активное слушание", "формула высказывания", "невербальная коммуникация", "ГЛАЗ"]

theory_delivery:
  term: "невербальная коммуникация, ГЛАЗ"
  scene_trigger: >
    Марко находит зеркало-портал в тупике. Видит маму на кухне.
    Мама говорит «у меня всё хорошо» — руки сжимают чашку
    добела, глаза бегают к двери.
  sofa_introduction: >
    Софа: «Мама сказала "хорошо". Ты видел руки. Видел глаза.
    Три инструмента работают со словами. Но слова можно
    подготовить. Тело — нет.» Невербальная коммуникация —
    передача информации без слов (лицом, руками, позой,
    голосом). ГЛАЗ — четвёртый инструмент: видеть то, что
    слова прячут. Пример из урока: мама спрашивает про суп —
    рот говорит «вкусно», руки отодвигают тарелку.
  rule: >
    «Четвёртый инструмент разведчика — ГЛАЗ. Слова можно
    подготовить. Тело — нет. Когда слова говорят одно,
    а тело — другое — верь телу.»

sofa_quizzes:
  - id: "sq1"
    type: story
    mapped_text: "Мама говорит «у меня всё хорошо», но руки сжимают чашку добела. Слова и тело совпадают?"
    options: ["Да", "Нет"]
    answer: "Нет"
    explanation: "Тело кричит тревогу — руки сжаты. ГЛАЗ видит: нет"

  - id: "sq2"
    type: generic
    mapped_text: "Что такое невербальная коммуникация?"
    options: ["Передача информации без слов", "Громкий разговор", "Письменное сообщение"]
    answer: "Передача информации без слов"
    explanation: "Лицо, руки, поза, голос — всё, что говорит тело, когда рот молчит"

  - id: "sq3"
    type: generic
    mapped_text: "Человек улыбается и говорит «мне не обидно», но руки скрещены. Совпадают?"
    options: ["Да", "Нет"]
    answer: "Нет"
    explanation: "Скрещённые руки — стена. Тело защищается"

  - id: "sq4"
    type: story
    mapped_text: "Мама смотрит Марко в глаза и говорит «я люблю тебя». Совпадают?"
    options: ["Да", "Нет"]
    answer: "Да"
    explanation: "Глаза — окно. Прямой взгляд + слова = тело и слова говорят одно"

  - id: "sq5"
    type: generic
    mapped_text: "ГЛАЗ — это инструмент разведчика для чего?"
    options: ["Видеть то, что слова прячут", "Читать мысли", "Видеть в темноте"]
    answer: "Видеть то, что слова прячут"
    explanation: "Когда слова говорят одно, а тело — другое, ГЛАЗ видит правду"

challenge_quizzes:
  - id: "cq1"
    type: story
    mapped_text: "Мама поднимает чашку — руки дрожат. Говорит: «Я спокойна.» Что говорит тело?"
    options: ["Она спокойна", "Она НЕ спокойна"]
    answer: "Она НЕ спокойна"
    explanation: "Дрожь в руках — тревога. Слова врут, тело — нет"

  - id: "cq2"
    type: story
    mapped_text: "Вера обнимала Марко — руки мягкие. Но глаза сканировали комнату. Совпадали?"
    options: ["Да", "Нет"]
    answer: "Нет"
    explanation: "Объятия — «забота». Глаза — «сбор информации». ГЛАЗ бы заметил"

  - id: "cq3"
    type: story
    mapped_text: "Леон барабанил пальцами по столу, пытаясь рассказать про Систему. Что тело говорило?"
    options: ["Спокойствие", "Нервность, срочность"]
    answer: "Нервность, срочность"
    explanation: "Пальцы барабанят — тело торопится. Леон знал, что времени мало"

  - id: "cq4"
    type: generic
    mapped_text: "Друг говорит «мне всё равно», но наклоняется вперёд, глаза широко открыты. Ему всё равно?"
    options: ["Да", "Нет"]
    answer: "Нет"
    explanation: "Наклон + широкие глаза = интерес. Тело кричит: «мне НЕ всё равно!»"

  - id: "cq5"
    type: story
    mapped_text: "Мама прикрывает рот рукой, когда Марко спрашивает про Софию. Что это значит?"
    options: ["Она скрывает реакцию", "Ей холодно"]
    answer: "Она скрывает реакцию"
    explanation: "Рука у рта — тело пытается удержать то, что рот хочет сказать"

  - id: "cq6"
    type: generic
    mapped_text: "Человек говорит «я тебе доверяю», руки скрещены, тело отвёрнуто. Доверяет?"
    options: ["Да", "Нет"]
    answer: "Нет"
    explanation: "Скрещённые руки + отвёрнутое тело = стена. Слова — «открыто», тело — «закрыто»"

  - id: "cq7"
    type: story
    original_ref: "sc5"
    mapped_text: "Одноклассник: «Да, хочу играть!» — руки скрещены, глаза в сторону, голос скучный. Хочет?"
    options: ["Да", "Нет"]
    answer: "Нет"
    explanation: "Три подсказки: закрытые руки, отведённый взгляд, скучный голос. Тело: не хочу"

character_map:
  - from: "Мама и суп (рот vs руки)"
