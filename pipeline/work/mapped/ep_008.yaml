    options: ["Причина настоящая", "Совпадение", "Третья причина"]
    answer: "Третья причина"
    explanation: "Третья причина — Лина передаёт данные. Артефакт активируется — Лина пользуется моментом, чтобы передать информацию. Оба действия вызваны ситуацией «остановка»"
    rationale: "Пересажено в сюжет — Лина использует паузы. Не спойлер: мы ещё не знаем, КОМУ она передаёт"
    spoiler_check: "Нет — поведение Лины подозрительно, но мы не раскрываем, на чьей она стороне"

  - id: "sq5"
    type: generic
    original_ref: "sc5.83"
    original_text: "«Все чемпионы пьют наш напиток! Пей — и тоже станешь чемпионом!»"
    mapped_text: "«Все чемпионы пьют наш напиток! Пей — и тоже станешь чемпионом!» Причина настоящая или ловушка третьей причины?"
