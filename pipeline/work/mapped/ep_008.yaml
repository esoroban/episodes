sofa_quizzes:

  - id: "sq1"
    type: story
    original_ref: "sc4.69"
    original_text: "«Люди покупают больше зонтов — и одновременно покупают больше резиновых сапог.» Что третье?"
    mapped_text: "В Зеркальном Городе одновременно: громкоговорители говорят громче И тени становятся длиннее. Что третье?"
    options: ["Голос усиливает контроль", "Время суток", "Третья причина"]
    answer: "Голос усиливает контроль"
    explanation: "Голос — кукловод: усиливает контроль — и громкоговорители громче, и тени активнее. Оба события вызваны одним"
    rationale: "Пересажено в сюжет — Голос как третья причина двух наблюдений в Городе"

