  - id: "sq6"
    type: story
    original_ref: "sc5.85"
    original_text: "«У Пети новый телефон — и у него куча друзей! Попроси у мамы такой же!»"
    mapped_text: "«Леон знает много о Городе — и Леон варит чай. Значит, чай даёт знания!» Причина настоящая или ловушка третьей причины?"
    options: ["Причина настоящая", "Ловушка третьей причины"]
    answer: "Ловушка третьей причины"
    explanation: "Третья причина — Леон живёт в Городе давно. Поэтому он и знает много, и привык варить чай. Чай не даёт знания — годы жизни дают"
    rationale: "Пересажено в сюжет — Леон и его чай. Знакомый персонаж"

