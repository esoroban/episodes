# =====================================================================
# ТЕОРИЯ — как Софа вводит термин
# =====================================================================
theory_delivery:

  term: "третья причина"
  scene_trigger: >
    Число упало САМО — без артефакта. Марко: «Это не я. Значит, кто-то
    ещё стирает.» Софа анализирует: два события происходят одновременно —
    использование артефактов И что-то другое. Оба стирают. Но может, их
    ОБА вызывает что-то третье?
  sofa_introduction: >
    Софа: «Ласточки из прошлого квиза — помнишь? Они не вызывают
    дождь. Но летают низко перед ним. Что их связывает? Влажный
    воздух. Он дёргает за обе верёвочки.» Вводится ТРЕТЬЯ ПРИЧИНА —
    кукловод за ширмой, который дёргает за две верёвочки. Два события
    кажутся связанными, но их ОБА вызывает что-то третье, спрятанное.
    Примеры: мороженое и солнечные ожоги (третья причина — жара),
    пожарные и разрушения (третья причина — размер пожара).
    Возврат к Городу: артефакты стирают И число падает само — может,
    третья причина — сам Голос?
  generic_story_kept: >
    История ласточек и дождя (влажный воздух) оставлена как аналогия Софы.
    Примеры мороженого и ожогов, пожарных и разрушений — классические
    иллюстрации третьей причины из урока.
  rule: >
    «Третья причина — спрятанный кукловод. Когда два события
    кажутся связанными — ищи: может, их оба вызывает что-то
    третье? Мороженое и ожоги — оба от жары.»
  life_question: >
    «У Пети новый телефон — и много друзей. Телефон приносит
    друзей? Или есть третья причина?»

