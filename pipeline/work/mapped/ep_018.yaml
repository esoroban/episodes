terms_available: ["факт", "мнение", "неправда", "хитрое утверждение", "отговорка", "инструменты проверки", "детектив правды", "повторяемость", "закономерность", "совпадение", "светофор повторений", "причина", "следствие", "после — не значит вследствие", "третья причина", "три цели спора", "солдат", "разведчик", "эмпатия (сопереживание)", "активное слушание", "формула высказывания", "невербальная коммуникация", "ГЛАЗ", "зрительный контакт", "открытая поза", "закрытая поза", "жесты", "мимика", "интонация", "сарказм", "доверие (Этос)", "чувства (Пафос)", "доказательства (Логос)", "баланс способов", "своими глазами", "услышал от других", "три вопроса для проверки", "уровни интернета", "дипфейк", "правило двух источников", "один человек думает vs много людей проверили"]

theory_delivery:
  term: "правило двух источников, один человек думает vs много людей проверили"
  scene_trigger: >
    Марко строит дерево связей Системы на стене подполья.
    Все ветки ведут к Голосу. Кроме одной — она уходит НАРУЖУ.
    Один источник. Достаточно ли? Марко хочет сразу бежать
    по этой ветке, но разведчик проверяет.
  sofa_introduction: >
    Софа: «Одна ветка наружу. Один источник. Достаточно?
    Нет. ПРАВИЛО ДВУХ ИСТОЧНИКОВ: если два НЕЗАВИСИМЫХ
    источника говорят одно и то же — информации можно
    верить больше. Три пересказчика одного чата — один
    источник, не три. Один плакат на двух заборах — заборов
    два, а плакат один. ОДИН ЧЕЛОВЕК ДУМАЕТ vs МНОГО ЛЮДЕЙ
    ПРОВЕРИЛИ: мнение даже умного человека — ещё не факт.
    Факт — когда много людей независимо проверили.»
  rule: >
    «Правило двух источников: два НЕЗАВИСИМЫХ источника
    подтверждают — надёжно. Количество пересказчиков ≠
    количество источников. Один плакат на двух заборах —
    всё ещё один плакат.»

sofa_quizzes:
  - id: "sq1"
    type: story
    original_ref: "5A.sc8"
    mapped_text: "Два горожанина подполья говорят: «За стеной — реальный мир.» Один слышал от лидера, другой нашёл записку Софии. Два источника или один?"
    options: ["Два источника — надёжно", "Один источник — проверяй"]
    answer: "Два источника — надёжно"
    explanation: "Лидер и записка Софии — независимые источники. Они не списывались. Оба указывают на одно и то же — надёжнее"

  - id: "sq2"
    type: story
    original_ref: "5A.sc8"
    mapped_text: "Трое горожан говорят: «Голос теряет силу.» Но все трое слышали это от одного и того же шёпота в подземелье."
    options: ["Два источника — надёжно", "Один источник — проверяй"]
    answer: "Один источник — проверяй"
    explanation: "Три человека — но все пересказывают ОДИН шёпот. Это не три источника — это одно сообщение, трижды пересказанное. Количество пересказчиков ≠ количество источников"

  - id: "sq3"
    type: story
    original_ref: "5A.sc8"
    mapped_text: "Записка на стене подполья говорит «Город создан 10 лет назад», а Софа воспроизводит файл Софии с той же датой."
    options: ["Два источника — надёжно", "Один источник — проверяй"]
    answer: "Два источника — надёжно"
    explanation: "Записка и файл Софии — независимы. Записку оставил неизвестный горожанин, файл создала София. Разные пути — одна информация"

  - id: "sq4"
    type: story
    original_ref: "5A.sc8"
    mapped_text: "Голос транслирует по динамикам: «Город процветает.» Те же слова высечены на стене площади. Два источника?"
    options: ["Два источника — надёжно", "Один источник — проверяй"]
    answer: "Один источник — проверяй"
    explanation: "Один автор (Голос) распространил одно сообщение через два канала. Как один плакат на двух заборах — заборов два, а плакат один"

  - id: "sq5"
    type: story
    original_ref: "5A.sc8"
    mapped_text: "Горожанка своими глазами видела рабочих, которые строят новую стену. А на схеме подполья отмечено то же строительство."
    options: ["Два источника — надёжно", "Один источник — проверяй"]
    answer: "Два источника — надёжно"
    explanation: "Горожанка видела лично — один источник. Схема подполья — независимая информация. Они не сговаривались, но говорят одно и то же"

  - id: "sq6"
    type: story
    original_ref: "5A.sc8"
    mapped_text: "Два горожанина пересказывают одну и ту же записку со стены, добавляя каждый свои подробности."
    options: ["Два источника — надёжно", "Один источник — проверяй"]
    answer: "Один источник — проверяй"
    explanation: "Два горожанина — но записка одна. Это не два свидетеля, а два пересказчика одного текста. Источник один, подробности — фантазия"

challenge_quizzes:
  - id: "cq1"
    type: story
    original_ref: "5A.sc9"
    mapped_text: "Марко находит в подполье пост: «ПОМОГИТЕ! Пропал горожанин с числом 8!» Записка пришла через цепочку пересказов, автор неизвестен. Какой это источник?"
    options: ["Своими глазами", "Услышал от других"]
    answer: "Услышал от других"
    explanation: "Цепочка пересылок. Никто из передавших не видел пропавшего. Автор — неизвестен. Уже подозрительно"

  - id: "cq2"
    type: story
    original_ref: "5A.sc9"
    mapped_text: "Автор записки о пропавшем горожанине неизвестен, адрес не указан, время исчезновения не написано. Можно ли проверить?"
    options: ["Да, можно проверить", "Нет, нельзя проверить"]
    answer: "Нет, нельзя проверить"
    explanation: "Ни адреса, ни времени, ни имени автора. Как искать пропавшего, если неизвестно даже в каком районе Города он жил?"

  - id: "cq3"
    type: story
    original_ref: "5A.sc9"
    mapped_text: "Записка о пропавшем пришла через цепочку пересказов в подполье. Какой уровень источника?"
    options: ["Надёжный", "Ненадёжный"]
    answer: "Ненадёжный"
    explanation: "Четвёртый уровень — пересылки и шёпот. Как чат без подписи. Шёпот в тёмном коридоре подполья"

  - id: "cq4"
    type: story
    original_ref: "5A.sc9"
    mapped_text: "Марко замечает: записка о пропавшем горожанине датирована тремя годами назад. Номер горожанина был 8, а сейчас минимальный номер в Городе — 12."
    options: ["Записка актуальна", "Записка устарела"]
    answer: "Записка устарела"
    explanation: "Три года назад! Горожанин с числом 8 давно либо нашёлся, либо стёрся. Старая информация путешествует по подполью, как вечный турист"

  - id: "cq5"
    type: story
    original_ref: "5A.sc9"
    mapped_text: "Записка о пропавшем гуляет по подполью, но ни один из лидеров не подтвердил, Софа не нашла данных, схема не показывает. Два источника есть?"
    options: ["Два источника есть", "Только один источник"]
    answer: "Только один источник"
    explanation: "Одна записка, которую копируют и пересылают. Никакого подтверждения. Если бы горожанин реально пропал — лидеры бы знали"

  - id: "cq6"
    type: story
    original_ref: "5A.sc10"
    mapped_text: "Голос заявляет: «Мой Город — лучший. Я построил идеальную систему.» Что это?"
    options: ["Много людей проверили", "Один человек думает", "Слух"]
    answer: "Один человек думает"
    explanation: "Мнение одного Голоса. Другие не подтверждали. «Идеальный» — не факт, а самооценка. Даже если Голос очень уверен"

  - id: "cq7"
    type: story
    original_ref: "5A.sc10"
    mapped_text: "Все горожане подполья, которые жили в Городе больше пяти лет, подтверждают: числа падают с каждым годом."
    options: ["Много людей проверили", "Один человек думает", "Слух"]
    answer: "Много людей проверили"
    explanation: "Много горожан независимо наблюдали одно и то же. Не мнение одного — коллективная проверка. Числа реально падают"

  - id: "cq8"
    type: story
    original_ref: "5A.sc10"
    mapped_text: "По динамикам: «Говорят, за стеной — чудесный мир.» Кто говорит — неизвестно."
    options: ["Много людей проверили", "Один человек думает", "Слух"]
    answer: "Слух"
    explanation: "«Говорят» — кто говорит? Где? Какие доказательства? Облако тумана без единого факта"

character_map:
  - from: "Одноклассник + мама из родительского чата (экскурсия)"
    to: "Лидер подполья + записка Софии (ветка наружу)"
    rationale: "Два независимых источника указывают на одно — связь с реальным миром"
  - from: "Три одноклассника из одного чата"
    to: "Три горожанина, пересказывающие один шёпот"
    rationale: "Количество пересказчиков ≠ количество источников"
  - from: "Кейс «пропавший котёнок»"
    to: "Записка о «пропавшем горожанине» в подполье"
    rationale: "Полная проверка всеми инструментами: тип, три вопроса, уровень, дата, два источника"

extra_practice:
  count: 12
  source: "sc10 остаток (2v) + sc12 (10v)"
  items:
    - id: "ep1"
      type: generic
      original_ref: "5A.sc10"
      mapped_text: "«Все врачи говорят, что сон важен для здоровья.» Что это?"
      options: ["Много людей проверили", "Один человек думает", "Слух"]
      answer: "Много людей проверили"
      explanation: "Все врачи согласны, есть научные исследования. Не мнение одного — результат проверки тысячами специалистов"

    - id: "ep2"
      type: generic
      original_ref: "5A.sc10"
      mapped_text: "«Один мальчик говорит, что его собака — самая умная в мире.» Что это?"
      options: ["Много людей проверили", "Один человек думает", "Слух"]
      answer: "Один человек думает"
      explanation: "Мальчик любит свою собаку. Но «самая умная в мире» — чувства, не проверенный факт"

    - id: "ep3"
      type: generic
      original_ref: "5A.sc12"
      mapped_text: "«Сосед говорит, что видел, как в соседний дом заехали новые жильцы.» Какой тип источника для тебя?"
      options: ["Своими глазами", "Услышал от других"]
      answer: "Услышал от других"
      explanation: "Сосед видел своими глазами, но ТЫ не видел. Для тебя — пересказ"

    - id: "ep4"
      type: generic
      original_ref: "5A.sc12"
      mapped_text: "«Тренер по плаванию говорит, что плавание полезно для спины.» Можно верить?"
      options: ["Можно верить", "Лучше не верить"]
      answer: "Можно верить"
      explanation: "Разбирается — да, тренер. Хочет продать — немножко. Но врачи тоже подтверждают — два источника"

    - id: "ep5"
      type: generic
      original_ref: "5A.sc12"
      mapped_text: "Пост в чате: «СРОЧНО! Завтра закроют все магазины!!!» Надёжный?"
      options: ["Надёжный", "Ненадёжный"]
      answer: "Ненадёжный"
      explanation: "Чат, восклицательные знаки, «СРОЧНО» — три красных флага за одну секунду"

    - id: "ep6"
      type: generic
      original_ref: "5A.sc12"
      mapped_text: "Видео в соцсетях: кот играет на пианино. Снял хозяин, выложил на свою страницу. Можно доверять?"
      options: ["Можно доверять", "Стоит проверить"]
      answer: "Стоит проверить"
      explanation: "ИИ уже делает такие видео. Кот-пианист — хочется верить, но разведчик сначала проверяет"

    - id: "ep7"
      type: generic
      original_ref: "5A.sc12"
      mapped_text: "Одноклассник: «В парке новые качели, сам катался.» На странице парка — фото тех же качелей. Два источника?"
      options: ["Два источника — надёжно", "Один источник — проверяй"]
      answer: "Два источника — надёжно"
      explanation: "Одноклассник был лично, страница парка — отдельно. Независимы. Качели настоящие"

    - id: "ep8"
      type: generic
      original_ref: "5A.sc12"
      mapped_text: "«Бабушка считает, что её варенье — лучшее в мире.» Что это?"
      options: ["Много людей проверили", "Один человек думает", "Слух"]
      answer: "Один человек думает"
      explanation: "Бабушка любит своё варенье. «Лучшее в мире» — мнение, не факт"

    - id: "ep9"
      type: generic
      original_ref: "5A.sc12"
      mapped_text: "Фото на странице одноклассника: он стоит рядом с президентом. Можно доверять?"
      options: ["Можно доверять", "Стоит проверить"]
      answer: "Стоит проверить"
      explanation: "ИИ делает такие фото за минуту. Одноклассник + президент — подозрительная комбинация"

    - id: "ep10"
      type: generic
      original_ref: "5A.sc12"
      mapped_text: "Два разных блогера выложили одинаковый текст про «чудо-крем». Оба получили деньги от одной компании. Два источника?"
      options: ["Два источника — надёжно", "Один источник — проверяй"]
      answer: "Один источник — проверяй"
      explanation: "Два блогера — но заказчик один. Два рекламных плаката от одной фирмы. Заборов два, плакат один"

    - id: "ep11"
      type: generic
      original_ref: "5A.sc12"
      mapped_text: "Статья на сайте национального музея о новой выставке. Надёжный источник?"
      options: ["Надёжный", "Ненадёжный"]
      answer: "Надёжный"
      explanation: "Официальный сайт, первый уровень. Музею нет смысла выдумывать выставку — он сам её делает"

    - id: "ep12"
      type: generic
      original_ref: "5A.sc12"
      mapped_text: "«Учёные доказали, что шоколад лечит все болезни» — переслали в родительский чат без ссылки. Что это?"
      options: ["Много людей проверили", "Один человек думает", "Слух"]
      answer: "Слух"
      explanation: "«Учёные доказали» — какие учёные? Где исследование? Ссылка? Пересылка без источника — классика четвёртого уровня"

