theory_delivery:
  term: "подмена понятий, закон тождества, контр-ход"
  scene_trigger: >
    Агенты меняют тактику. Больше не кричат. Говорят
    тихо. Спокойно. Слова Макса подменяют: «защита»
    становится «трусостью», «дружба» — «зависимостью»,
    «храбрость» — «глупостью». Макс путается — его
    собственные слова звучат чужими. Как будто кто-то
    тихо перекрасил мебель, пока он спал.
  sofa_introduction: >
    Софа: «Подмена понятий: слово не меняется, а смысл
    тихо переключается. Как хамелеон — цвет другой,
    а ящерица та же.» Закон тождества: одно слово =
    один смысл в рамках разговора. Защита — волшебный
    вопрос: «Что именно ты имеешь в виду под...?»
    Контр-ход: спокойный уточняющий вопрос вместо
    нападения или оправдания. Два инструмента: «Когда
    именно?» и «Что ты имеешь в виду?» Формула:
    уточнить слово + попросить пример + отделить
    эмоцию от факта.
  rule: >
    «Подмена понятий — хамелеон слов: слово то же,
    смысл другой. Закон тождества: одно слово = один
    смысл. Контр-ход: спокойный вопрос вместо крика.»

sofa_quizzes:
  - id: "sq1"
    type: generic
    original_ref: "6B.sc7 #1"
    mapped_text: "«Хороший друг всегда помогает.» — «Тогда помоги мне списать — ты же мой друг!» Есть подмена понятий?"
    options: ["Да, есть подмена", "Нет, всё честно"]
    answer: "Да, есть подмена"
    explanation: "«Помогать» сначала значило «поддерживать», а потом стало «дать списать». Слово то же — смысл другой"

  - id: "sq2"
    type: generic
    original_ref: "6B.sc7 #2"
    mapped_text: "«Утром я встал в семь часов.» — «А в школу пришёл в восемь.» Есть подмена понятий?"
    options: ["Да, есть подмена", "Нет, всё честно"]
    answer: "Нет, всё честно"
    explanation: "«Утро» и «школа» — разные слова с разным смыслом. Подмены нет — просто два факта"

  - id: "sq3"
    type: generic
    original_ref: "6B.sc7 #3"
    mapped_text: "«Дважды два — четыре.» — «А дважды два — тоже четыре!» Есть подмена понятий?"
    options: ["Да, есть подмена", "Нет, всё честно"]
    answer: "Нет, всё честно"
    explanation: "Точные числа — подмена невозможна. Чем точнее слово, тем труднее его подменить"

  - id: "sq4"
    type: generic
    original_ref: "6B.sc7 #4"
    mapped_text: "«Будь честным!» — «Ты хотела честно? Ладно: ты плохо рисуешь!» Есть подмена понятий?"
    options: ["Да, есть подмена", "Нет, всё честно"]
    answer: "Да, есть подмена"
    explanation: "«Честность» сначала = искренность, потом стала = грубость. Хамелеон: слово то же, смысл перекрашен"

  - id: "sq5"
    type: generic
    original_ref: "6B.sc7 #5"
    mapped_text: "«Дети должны играть.» — «Тогда давай играть в компьютер до ночи!» Есть подмена понятий?"
    options: ["Да, есть подмена", "Нет, всё честно"]
    answer: "Да, есть подмена"
    explanation: "«Играть» сначала = активность и развитие, потом стало = сидеть за экраном до ночи. Подмена: слово «играть» тихо сменило смысл"

  - id: "sq6"
    type: generic
    original_ref: "6B.sc7 #6"
    mapped_text: "«Земля вращается вокруг Солнца.» — «Один оборот — 365 дней.» Есть подмена понятий?"
    options: ["Да, есть подмена", "Нет, всё честно"]
    answer: "Нет, всё честно"
    explanation: "Два научных факта, одно дополняет другое. Подмены нет — точные данные не переключаются"

challenge_quizzes:
  - id: "cq1"
    type: generic
    original_ref: "6B.sc8 #1"
    mapped_text: "Спор: «Настоящий лидер ведёт за собой.» — «Вот и веди — неси мой рюкзак!» Была подмена?"
    options: ["Да, была подмена", "Нет, подмены не было"]
    answer: "Да, была подмена"
    explanation: "«Вести за собой» = вдохновлять, а не носить рюкзак. Лидерство тихо превратилось в обслуживание"

  - id: "cq2"
    type: generic
    original_ref: "6B.sc8 #2"
    mapped_text: "Спор: «Ты старался.» — «Нет, я старался — а ты просто делал!» Была подмена?"
    options: ["Да, была подмена", "Нет, подмены не было"]
    answer: "Да, была подмена"
    explanation: "«Стараться» для первого = прикладывать усилия, для второго = делать больше. Смысл тихо переключился"

  - id: "cq3"
    type: generic
    original_ref: "6B.sc8 #3"
    mapped_text: "Спор: «Ты опоздал на пять минут.» — «Пять минут — это ничего!» Была подмена?"
    options: ["Да, была подмена", "Нет, подмены не было"]
    answer: "Нет, подмены не было"
    explanation: "«Пять минут» не изменили смысл — просто разная оценка. Это не подмена, а разногласие"

  - id: "cq4"
    type: generic
    original_ref: "6B.sc8 #4"
    mapped_text: "Спор: «Задание сложное.» — «Ты просто ленишься!» — «Я не ленюсь, оно СЛОЖНОЕ!» — «Сложное — значит, непосильное? Тогда бросай.» Была подмена?"
    options: ["Да, была подмена", "Нет, подмены не было"]
    answer: "Да, была подмена"
    explanation: "«Сложное» = требует усилий, а собеседник превратил в «непосильное». Тихо перекрасил — и предложил бросить"

  - id: "cq5"
    type: story
    original_ref: "story adapted"
    mapped_text: "Агент Максу: «Ты говоришь "дружба" — но цепляешься за Марко, потому что один не справляешься. Это не дружба — это зависимость.» Была подмена?"
    options: ["Да, «дружба» подменена на «зависимость»", "Нет, агент прав"]
    answer: "Да, «дружба» подменена на «зависимость»"
    explanation: "Дружба = взаимная поддержка. Зависимость = слабость. Агент переклеил ярлык: слово «дружба» тихо стало «зависимостью»"

  - id: "cq6"
    type: story
    original_ref: "story adapted"
    mapped_text: "Агент: «Макс говорит "храбрость". Но лезть против Голоса — это не храбрость, это глупость.» Была подмена?"
    options: ["Да, «храбрость» подменена на «глупость»", "Нет, агент прав — это глупость"]
    answer: "Да, «храбрость» подменена на «глупость»"
    explanation: "Храбрость = действие вопреки страху. Глупость = бездумное действие. Агент перекрасил мебель, пока Макс не смотрел"

  - id: "cq7"
    type: story
    original_ref: "6B.sc9 adapted"
    mapped_text: "Агент: «Ты ВСЕГДА всё портишь, Макс!» Марко хочет ответить контр-ходом. Какой вариант?"
    options: ["«Нет, ты всё портишь!»", "«Когда именно он портил? Назови пример.»", "«Замолчи!»"]
    answer: "«Когда именно он портил? Назови пример.»"
    explanation: "Контр-ход: спокойный уточняющий вопрос. «Когда именно?» — один из двух универсальных инструментов. Зрелый ответ начинается с вопроса"

  - id: "cq8"
    type: story
    original_ref: "6B.sc9 adapted"
    mapped_text: "Агент: «Если ты настоящий друг — уйди. Настоящие друзья не подвергают друг друга опасности.» Марко хочет ответить контр-ходом. Какой вариант?"
    options: ["«Сам уходи!»", "«Что ты имеешь в виду под "настоящий друг"? Настоящий друг — тот, кто остаётся.»", "«Ладно, может, ты прав...»"]
    answer: "«Что ты имеешь в виду под "настоящий друг"? Настоящий друг — тот, кто остаётся.»"
    explanation: "Контр-ход: уточнить слово + отделить эмоцию от факта. «Настоящий друг» — размытое слово, его легко подменить. Спокойствие + уточнение = контроль"

  - id: "cq9"
    type: story
    original_ref: "6B.sc9 adapted"
    mapped_text: "Агент: «Все уже согласились с Голосом. Ты один упрямишься.» Марко хочет ответить контр-ходом. Какой вариант?"
    options: ["«Ну и пусть!»", "«Кто именно "все"? Назови хотя бы троих, кто сам проверил и согласился.»", "«Может, я и правда один...»"]
    answer: "«Кто именно "все"? Назови хотя бы троих, кто сам проверил и согласился.»"
    explanation: "Двойной контр-ход: «все» — обобщение (ловушка слов) + «согласились» — проверить, сами ли решили. Спокойный вопрос разрушает ловушку"

