challenge_quizzes:

  - id: "cq1"
    type: generic
    original_ref: "sc5.120"
    original_text: "Спорят, что тяжелее — килограмм железа или ваты. Один: «Железо, конечно! Это же очевидно!»"
    mapped_text: "Спорят, что тяжелее — килограмм железа или килограмм ваты. Один: «Железо, конечно! Это же очевидно! Даже обсуждать смешно!» Солдат или разведчик?"
    options: ["Солдат", "Разведчик"]
    answer: "Солдат"
    explanation: "«Очевидно» + «даже обсуждать смешно» — двойной щит. А подумать?"
    rationale: "Generic — двойной щит солдата"

  - id: "cq2"
    type: generic
    original_ref: "sc5.122"
    original_text: "Спорят, что тяжелее. Другой: «Хм, вроде оба килограмм... Но железо кажется тяжелее. Почему? Давай подумаем!»"
    mapped_text: "Спорят, что тяжелее — килограмм железа или килограмм ваты. Другой: «Хм, вроде оба килограмм... Но железо кажется тяжелее. Почему? Давай подумаем!» Солдат или разведчик?"
    options: ["Солдат", "Разведчик"]
    answer: "Разведчик"
    explanation: "Заметил противоречие и хочет разобраться. Оба весят одинаково, но железо занимает меньше места — поэтому КАЖЕТСЯ тяжелее"
    rationale: "Generic — парный контраст к cq1"

  - id: "cq3"
    type: story
    original_ref: "sc5.124"
    original_text: "Друг: «Ты неправ.» Ты: «Может быть. А почему ты так думаешь?»"
    mapped_text: "Лина: «Ты неправ насчёт артефактов.» Марко: «Может быть. А почему ты так думаешь?» Солдат или разведчик?"
    options: ["Солдат", "Разведчик"]
    answer: "Разведчик"
    explanation: "«Может быть» — магические слова. Солдат так никогда не скажет! Марко учится быть разведчиком"
    rationale: "Пересажено в сюжет — Марко переключается в режим разведчика"

  - id: "cq4"
    type: story
    original_ref: "sc5.126"
    original_text: "Тебе показали ошибку в задаче. Ты: «Нет! У меня всё правильно! Это в ответах ошибка!»"
    mapped_text: "Софа показывает данные: «Число падает каждый раз после артефакта.» Марко раньше: «Нет! Это совпадение! Данные ошибаются!» Солдат или разведчик?"
    options: ["Солдат", "Разведчик"]
    answer: "Солдат"
    explanation: "Виноваты все — данные, совпадение, вселенная. Только не артефакт! Солдат защищает крепость"
    rationale: "Пересажено в сюжет — Марко-солдат, отказывающийся принять факты"

  - id: "cq5"
    type: story
    original_ref: "sc6.129"
    original_text: "Спорят, что полезнее — плавание или бег. Один: «Плавание! Это все врачи говорят! Что тут обсуждать?»"
    mapped_text: "Вера говорит Марко: «Ты должен уступить! Так поступают взрослые! Что тут обсуждать?» Какая цель и роль?"
    options: ["Победить / Солдат", "Понять / Разведчик", "Обидеть"]
    answer: "Победить / Солдат"
    explanation: "Вера давит авторитетом взрослого. «Что тут обсуждать» — закрыла ворота крепости. Не объясняет, не слушает"
    rationale: "Пересажено в сюжет — Вера как скрытый солдат, давящий через «зрелость»"
    spoiler_check: "Нет — Вера выглядит заботливой, но её метод — давление. Это видно без знания её мотивов"

  - id: "cq6"
    type: story
    original_ref: "sc6.131"
    original_text: "«А давай сравним — плавание тренирует одни мышцы, бег другие.»"
    mapped_text: "Лина: «А давай подумаем — артефакты дают информацию, но стирают память. Может, использовать их только когда очень нужно?» Какая цель и роль?"
    options: ["Победить / Солдат", "Понять / Разведчик", "Обидеть"]
    answer: "Понять / Разведчик"
    explanation: "Лина исследует. Видит плюсы и минусы. Предлагает компромисс — настоящий разведчик"
    rationale: "Пересажено в сюжет — Лина-разведчик предлагает средний путь"

  - id: "cq7"
    type: story
    original_ref: null
    original_text: null
    mapped_text: "Марко уступил Вере, не задумавшись. Потом чувствует пустоту: «Почему я уступил?» Марко был солдат или разведчик?"
    options: ["Солдат", "Разведчик"]
    answer: "Солдат"
    explanation: "Солдат, который СДАЛ крепость. Марко не исследовал — просто подчинился. Разведчик спросил бы: «Почему я должен уступить?»"
    rationale: "Ключевой квиз эпизода — Марко-солдат, сдавший крепость под давлением Веры"

  - id: "cq8"
    type: story
    original_ref: null
    original_text: null
    mapped_text: "Софа после разговора с Верой: «Лина предложила компромисс. Вера заставила уступить. Чем компромисс отличается от уступки?»"
    options: ["Компромисс — оба уступают немного; уступка — один сдаётся полностью", "Это одно и то же", "Компромисс — когда взрослый решает"]
    answer: "Компромисс — оба уступают немного; уступка — один сдаётся полностью"
    explanation: "Компромисс Лины: оба решают вместе. Уступка по Вере: Марко сдаётся один. Разведчик ищет компромисс, а не сдаётся"
    rationale: "Добавленный квиз — углубляет тему: разведчик vs солдат-который-сдался"

  - id: "cq9"
    type: story
    original_ref: null
    original_text: null
    mapped_text: "При рукопожатии Марко замечает серую нитку на запястье Лины. Он молчит и наблюдает. Марко сейчас — солдат или разведчик?"
    options: ["Солдат", "Разведчик"]
    answer: "Разведчик"
    explanation: "Разведчик не кричит — собирает информацию. Марко заметил, запомнил и не выдал себя. Бинокль и блокнот!"
    rationale: "Клиффхэнгер-квиз. Марко впервые действует как настоящий разведчик"
    spoiler_check: "Нет — серая нитка замечена, но её значение пока не раскрыто полностью (это клиффхэнгер)"

