title: "Солдат и разведчик"
terms_introduced: ["солдат", "разведчик"]
terms_available: ["факт", "мнение", "неправда", "хитрое утверждение", "отговорка", "инструменты проверки", "детектив правды", "повторяемость", "закономерность", "совпадение", "светофор повторений", "причина", "следствие", "после — не значит вследствие", "третья причина", "три цели спора", "солдат", "разведчик"]

# =====================================================================
# ТЕОРИЯ — как Софа вводит термин
# =====================================================================
theory_delivery:

  term: "солдат, разведчик"
  scene_trigger: >
    Марко пробует заново — говорит с Линой не как солдат. Вместо
    «ты не понимаешь» — «объясни, почему ты так думаешь». Лина
    удивлена. Разговор идёт иначе. Появляется Вера — мягкая, тёплая:
    «Вы оба правы. Но Марко, ты же старше, ты должен уступить первым.»
  sofa_introduction: >
    Софа: «Марко, ты сейчас говорил с Линой. Сначала — кричал.
    Потом — спрашивал. Два способа спорить. Два характера.»
    Вводятся роли: СОЛДАТ — защитник крепости своего мнения
    (стоит за стеной, закрылся щитом, кричит «не пущу!»; признать
    ошибку — сдать крепость). РАЗВЕДЧИК — исследователь (идёт
    с биноклем, блокнотом и улыбкой; каждое слово собеседника —
    информация). Ключевая разница: солдат может быть прав
    СЛУЧАЙНО, разведчик — ОСОЗНАННО. Пример из урока: спор о
    шоколаде и яблоках — солдат давит «очевидно!», разведчик
    разбирается через витамины и состав.
  generic_story_kept: >
    Пример шоколада и яблок оставлен как аналогия Софы — разница
    между «прав случайно» и «прав осознанно». Парные ситуации
    (самолёт, снег, планеты) — в квизах как generic.
  rule: >
    «Солдат защищает позицию. Разведчик ищет истину.
    Солдат прав случайно. Разведчик прав осознанно —
    потому что проверил. Прежде чем спорить — выбери, кто ты.»
  life_question: >
    «Ты споришь с другом о фильме. Друг: "Этот фильм — лучший!"
    Ты: "Нет, худший!" Вы оба сейчас — кто?»

# =====================================================================
# КВИЗЫ СОФА-БЛОКА (6 квизов)
# =====================================================================
sofa_quizzes:

  - id: "sq1"
    type: generic
    original_ref: "sc5.108"
    original_text: "Дети спорят, кто изобрёл самолёт. Один: «Братья Райт! Все это знают! И точка!»"
    mapped_text: "Дети спорят, кто изобрёл самолёт. Один: «Братья Райт! Все это знают! И точка!» Солдат или разведчик?"
    options: ["Солдат", "Разведчик"]
    answer: "Солдат"
    explanation: "«Все знают» — его любимый щит. А что именно знают — не уточняет"
    rationale: "Generic — классический пример солдата из урока"

  - id: "sq2"
    type: generic
    original_ref: "sc5.110"
    original_text: "Дети спорят, кто изобрёл самолёт. Другой: «А давай загуглим? Может, мы оба что-то не так помним.»"
    mapped_text: "Дети спорят, кто изобрёл самолёт. Другой: «А давай загуглим? Может, мы оба что-то не так помним.» Солдат или разведчик?"
    options: ["Солдат", "Разведчик"]
    answer: "Разведчик"
    explanation: "Предлагает проверить и допускает, что сам может ошибаться. Бинокль наготове!"
    rationale: "Generic — парный контраст к sq1"

  - id: "sq3"
    type: story
    original_ref: "sc5.112"
    original_text: "Подруги спорят, можно ли есть снег. Одна: «Можно! Я ем — и ничего! Не спорь!»"
    mapped_text: "Марко раньше говорил: «Артефакты безопасны! Я же использовал — и ничего! Не спорь!» Солдат или разведчик?"
    options: ["Солдат", "Разведчик"]
    answer: "Солдат"
    explanation: "«Я же использовал — значит, можно» — и крепость закрыта! Не проверял последствия"
    rationale: "Пересажено в сюжет — Марко-солдат до ссоры с Линой"

  - id: "sq4"
    type: story
    original_ref: "sc5.114"
    original_text: "Подруги спорят, можно ли есть снег. Вторая: «А может, в нём что-то вредное? Давай спросим у врача.»"
    mapped_text: "Софа после ссоры: «А может, артефакты действительно стирают? Давай проверим — сколько раз число падало после использования.» Солдат или разведчик?"
    options: ["Солдат", "Разведчик"]
    answer: "Разведчик"
    explanation: "Думает о том, чего не видно. Предлагает проверить данные. Настоящий разведчик"
    rationale: "Пересажено в сюжет — Софа как модель разведчика"

  - id: "sq5"
    type: generic
    original_ref: "sc5.116"
    original_text: "Дети спорят, сколько планет. Один: «Девять! У меня в книжке написано! Это очевидно!»"
    mapped_text: "Дети спорят, сколько планет в Солнечной системе. Один: «Девять! У меня в книжке написано! Это очевидно!» Солдат или разведчик?"
    options: ["Солдат", "Разведчик"]
    answer: "Солдат"
    explanation: "Книжка — его крепостная стена. А книжки, между прочим, устаревают!"
    rationale: "Generic — солдат, который прячется за авторитетом книги"

  - id: "sq6"
    type: generic
    original_ref: "sc5.118"
    original_text: "Дети спорят, сколько планет. Другой: «Подожди, Плутон теперь не считается. Давай разберёмся, почему.»"
    mapped_text: "Дети спорят, сколько планет. Другой: «Подожди, я слышал, что Плутон теперь не считается планетой. Давай разберёмся, почему.» Солдат или разведчик?"
    options: ["Солдат", "Разведчик"]
    answer: "Разведчик"
    explanation: "Готов узнать новое, даже если это поменяет то, что он думал раньше"
    rationale: "Generic — парный контраст к sq5"

