# LESSON MAPPING — lesson_1A
# Маппинг урока на сюжет (шаг 0.5)
# Источник: pipeline/briefs/brief_1A.yaml
# Сгенерирован из lessons_ru/lesson_1A.yaml + source/

lesson_id: lesson_1A
title: "Факт, мнение и неправда"
target_episodes: [1, 2]

# ──────────────────────────────────────────────
# ЗАМЕНА ПЕРСОНАЖЕЙ (глобально для всего урока)
# ──────────────────────────────────────────────

character_map:
  - from: "Микола"
    to: "Марко"
    rationale: "протагонист; его позиция в споре о вкусах"
  - from: "Маша"
    to: "Макс"
    rationale: "верный друг, простой и честный — контраст во вкусах"
  - from: "Дмитрик"
    to: "одноклассник"
    rationale: >
      Проходная роль — приносит непроверенную новость.
      Не привязываем к главному персонажу, чтобы не нагружать
      чью-то арку в первом же уроке.
  - from: "Петрик"
    to: "безымянный (его друг)"
    rationale: "промежуточное звено цепочки пересказов"
  - from: "Оленка"
    to: "одноклассница"
    rationale: "задаёт правильный вопрос — безымянная, чтобы не тратить персонажа"

# ══════════════════════════════════════════════
# БЛОК 1A.1 — Факт и мнение
# ══════════════════════════════════════════════

blocks:

  - id: "1A.1"
    title: "Факт и мнение"

    # ── ИСТОРИИ ──

    stories:

      - original: >
          Спор о мороженом: Микола — шоколадное лучше,
          Маша — клубничное лучше. Нельзя проверить — у каждого своё.
        action: keep
        mapped: >
          Марко и Макс спорят о мороженом на переменке у школьного ларька.
          Марко: «Шоколадное — лучше всех!» Макс: «Клубничное в сто раз
          вкуснее!» Обстоятельства те же — только имена.

      - original: >
          Новость Дмитрика: «Завтра уроков не будет!»
          Цепочка: Петрик ← старший брат ← интернет ← ?
        action: adapt
        mapped: >
          Одноклассник прибегает на переменке: «Завтра контрольной не будет!
          Мне сказал друг, а ему — старший брат!» Та же цепочка «сломанного
          телефона». Одноклассница хмурится: «А откуда старший брат это знает?»

      - original: >
          Ловушка: «На Земле 8 континентов» — проверяемо, но неправда.
        action: keep
        mapped: >
          Без изменений — generic научный пример, не привязан к персонажу.

    # ── ПРАКТИКА (15 votes) ──
    # Баланс: 3 generic / 5 story / 7 plot = 15 итого

    practice:

      # ── Разминка: 3 generic ──
      warmup:

        - quiz: "«В нашем классе есть окно.»"
          type: generic
          answer: "факт"
          original_step: "sc4.32"

        - quiz: "«Математика — скучный предмет.»"
          type: generic
          answer: "нельзя проверить / мнение"
          original_step: "sc4.34"

        - quiz: "«Этот фильм очень смешной.»"
          type: generic
          answer: "мнение"
          original_step: "sc6.44"

      # ── Середина: 5 из жизни Марко ──
      middle:

        - quiz: "«Софа — самый лучший помощник.»"
          type: story
          answer: "мнение"
          replaces: "sc6.48"
          rationale: "слово-подсказка «самый лучший», привязка к Софе"

        - quiz: "«У Марко есть телефон с треснутым экраном.»"
          type: story
          answer: "факт"
          replaces: "sc6.50"
          rationale: "привязка к артефакту Софы, проверяемо — телефон в руках"

        - quiz: "«Макс — лучший друг, чем все остальные.»"
          type: story
          answer: "мнение"
          replaces: "sc6.52"
          rationale: "привязка к персонажам, «лучший» — слово-подсказка"

        - quiz: "«Уроки Веры Андреевны скучные.»"
          type: story
          answer: "мнение"
          replaces: "sc6.54"
          rationale: "первое упоминание Веры, «скучные» — личная оценка"

        - quiz: "«В классе Марко двадцать пять учеников.»"
          type: story
          answer: "факт"
          replaces: "sc6.56"
          rationale: "из текста эпизода 1, проверяемо — посчитать"

      # ── Финал: 7 провокационных сюжетных ──
      finale:

        - quiz: "«Фильм идёт два часа.»"
          type: generic
          answer: "факт"
          original_step: "sc6.46"
          rationale: "контраст перед сюжетными — простой факт для разгона"

        - quiz: "«Пицца вкуснее каши.»"
          type: generic
          answer: "мнение"
          original_step: "sc6.58"
          rationale: "контраст — лёгкий generic перед тяжёлыми"

        - quiz: "«София — лучшая сестра в мире.»"
          type: plot
          answer: "мнение"
          replaces: "sc6.62"
          rationale: "«лучшая» — слово-подсказка; но главное — Марко говорит о сестре, которую все забыли"
          spoiler_check: "нет — факт существования Софии уже известен из эпизода 1"

        - quiz: "«У Марко нет сестры.»"
          type: plot
          answer: "неправда (можно проверить — дневник!)"
          replaces: "sc6.60"
          rationale: "ловушка-мост к блоку 1A.2: проверяемо, но не подтверждается"
          spoiler_check: "нет — центральная завязка, уже известна"

        - quiz: "«Лина сказала: "Я помню Софию." Это факт или мнение?»"
          type: plot
          answer: "факт о чувствах Лины (она это утверждает) — но правдив ли факт?"
          replaces: "новый"
          rationale: "клиффхэнгер эпизода 1, сложный случай — ребёнок задумается"
          spoiler_check: "нет — Лина действительно это говорит, вопрос открытый"

        - quiz: "«Дневник с почерком Софии лежит в рюкзаке Марко.»"
          type: plot
          answer: "факт"
          replaces: "новый"
          rationale: "ключевое доказательство из эпизода 1 — можно проверить, подтверждается"
          spoiler_check: "нет — дневник уже найден"

        - quiz: "«Вера Андреевна сказала: "Ты переутомился." Это факт?»"
          type: plot
          answer: "нельзя проверить как факт — это её мнение/оценка"
          replaces: "новый"
          rationale: "первая реплика Веры из эпизода 1 — звучит заботливо, но это давление"
          spoiler_check: "нет — ребёнок пока воспринимает Веру как добрую, квиз не раскрывает манипуляцию"

  # ══════════════════════════════════════════════
  # БЛОК 1A.2 — Неправда и её виды
  # ══════════════════════════════════════════════

  - id: "1A.2"
    title: "Неправда и её виды"

    # ── ИСТОРИИ ──

    stories:

      - original: >
          Шутка: «У тебя паук на плече!»
          Знает, что неправда — хочет посмешить.
        action: keep
        mapped: >
          Макс говорит Марко: «У тебя паук на плече!»
          Марко подпрыгивает — Макс смеётся. Типичная шутка Макса,
          характерна для его простого юмора.

      - original: >
          Сказка: дракон, который любит блинчики.
          Все понимают, что не взаправду.
        action: keep
        mapped: >
          Без изменений — generic пример, работает.

      - original: >
          Фейк: «Школы закроют навсегда.»
          Специально придумано, чтобы напугать.
        action: adapt
        mapped: >
          Одноклассник говорит в школе: «Слышали? Директор сказал,
          что нашу школу закрывают навсегда!» Никто не проверил —
          все запаниковали. А директор ничего такого не говорил.

      - original: >
          Дмитрик не врал — сам верил, но информация всё равно неправда.
        action: keep
        mapped: >
          Одноклассник не врал — он сам поверил другу. Но информация
          всё равно оказалась неправдой. Намерение ≠ результат.

      - original: >
          Сложный случай: «Мой папа самый сильный» — можно измерить силу.
        action: adapt
        mapped: >
          «Марко — самый храбрый в классе.» Можно ли измерить храбрость?
          Нет → мнение.

      - original: >
          Сложный случай: «Моя мама самая красивая» — нельзя измерить красоту.
        action: keep
        mapped: >
          Без изменений — generic, хорошо работает как контраст.

    # ── ПРАКТИКА (34 votes) ──
    # Баланс: 8 generic / 10 story / 16 plot = 34 итого

    practice:

      # ── Разминка: 8 generic (виды неправды, sc8) ──
      # Первые 6 из 10 vote в sc8 — оставляем generic
      warmup:

        - quiz: "«Друг говорит: "Завтра будет снег!" — а на улице лето.»"
          type: generic
          answer: "шутка"
          original_step: "sc8"
          rationale: "простой пример для разогрева"

        - quiz: "«Жил-был кот, который летал на Луну.»"
          type: generic
          answer: "сказка"
          original_step: "sc8"

        - quiz: "«В интернете написали: от телефона растут рога!»"
          type: generic
          answer: "фейк"
          original_step: "sc8"

        - quiz: "«Подруга говорит: "У тебя развязался шнурок!" — а ты в кроссовках без шнурков.»"
          type: generic
          answer: "шутка"
          original_step: "sc8"

        - quiz: "«Давным-давно деревья умели разговаривать.»"
          type: generic
          answer: "сказка"
          original_step: "sc8"

        - quiz: "«Кто-то написал в чате: завтра школу затопит!»"
          type: generic
          answer: "фейк"
          original_step: "sc8"

        # Ещё 2 generic из финальной проверки sc10
        - quiz: "«Все дети любят сладкое.»"
          type: generic
          answer: "неправда (можно проверить — не все)"
          original_step: "sc10"

        - quiz: "«Если не съешь суп — заболеешь.»"
          type: generic
          answer: "неправда (можно проверить — не обязательно заболеешь)"
          original_step: "sc10"

      # ── Середина: 10 из жизни Марко ──
      middle:

        # 4 вида неправды — сюжетные
        - quiz: "«Макс говорит: "Вчера в школу залетел дрон!" — и хитро улыбается.»"
          type: story
          answer: "шутка"
          replaces: "sc8"
          rationale: "характерный юмор Макса, хитрая улыбка — подсказка"

        - quiz: "«Марко рассказывает Максу историю про рыцаря, который боялся мышей.»"
          type: story
          answer: "сказка"
          replaces: "sc8"
          rationale: "Марко как рассказчик — развивает его характер"

        - quiz: "«Одноклассник шепчет: "Слышал? Нашу учительницу уволили!" — а Вера Андреевна стоит за его спиной.»"
          type: story
          answer: "фейк (или ошибка — но информация неправдивая)"
          replaces: "sc8"
          rationale: "привязка к Вере, комичная ситуация"

        - quiz: "«Макс: "Я вчера съел десять порций мороженого!" — и подмигивает.»"
          type: story
          answer: "шутка (или неправда — можно проверить)"
          replaces: "sc8"
          rationale: "обратная отсылка к спору о мороженом из блока 1A.1"

        # 4 сложных случая (sc9) — все сюжетные
        - quiz: "«Марко — самый храбрый в классе.»"
          type: story
          answer: "мнение (нельзя измерить храбрость)"
          replaces: "sc9"
          rationale: "параллель с «папа самый сильный» из урока"

        - quiz: "«Софа знает больше, чем учебник.»"
          type: story
          answer: "можно проверить → зависит от проверки (скорее неправда)"
          replaces: "sc9"
          rationale: "привязка к Софе, вопрос о надёжности ИИ"

        - quiz: "«Макс всегда говорит правду.»"
          type: story
          answer: "можно проверить → «всегда» — ловушка-обобщение"
          replaces: "sc9"
          rationale: "знакомый персонаж + слово-ловушка «всегда»"

        - quiz: "«Вера Андреевна — самая добрая учительница в школе.»"
          type: story
          answer: "мнение (нельзя измерить доброту)"
          replaces: "sc9"
          rationale: "ребёнок пока верит — квиз безопасный, но ирония для перечитывания"
          spoiler_check: "нет — на этом этапе Вера воспринимается как добрая"

        # 2 из финальной проверки sc10
        - quiz: "«В классе Марко есть аквариум с рыбками.»"
          type: story
          answer: "факт (можно проверить — посмотреть)"
          replaces: "sc10"

        - quiz: "«Дневник лежит в рюкзаке Марко.»"
          type: story
          answer: "факт (можно проверить — открыть рюкзак)"
          replaces: "sc10"
          rationale: "ключевой предмет из эпизода 1"

      # ── Финал: 16 провокационных сюжетных ──
      finale:

        # Финальная проверка (sc10) — 20 vote → 16 сюжетных
        - quiz: "«У Марко нет сестры.»"
          type: plot
          answer: "неправда (проверяемо — дневник с почерком Софии)"
          replaces: "sc10"
          spoiler_check: "нет — центральная завязка"

        - quiz: "«София запрограммировала Софу.»"
          type: plot
          answer: "факт (подтверждается — Софа работает)"
          replaces: "sc10"
          spoiler_check: "нет — из экспозиции эп.1"

        - quiz: "«Софа — настоящий ИИ.»"
          type: plot
          answer: "факт (проверяемо — она отвечает на вопросы)"
          replaces: "sc10"

        - quiz: "«Телефон Софы глючит.»"
          type: plot
          answer: "факт (наблюдаемо — экран мигает, речь с паузами)"
          replaces: "sc10"

        - quiz: "«Вера Андреевна переживает за Марко.»"
          type: plot
          answer: "мнение (нельзя проверить чужие чувства)"
          replaces: "sc10"
          spoiler_check: "нет — ребёнок пока верит, квиз учит: чувства других — мнение"

        - quiz: "«Марко чувствует, что София существует.»"
          type: plot
          answer: "факт о чувствах Марко (он это чувствует) — но чувство ≠ доказательство"
          replaces: "sc10"
          rationale: "из квиза эпизода 1, тонкий случай"

        - quiz: "«Фото в телефоне пустые — Софии на них нет.»"
          type: plot
          answer: "факт (проверяемо — посмотреть фото)"
          replaces: "sc10"

        - quiz: "«Марко переутомился.»"
          type: plot
          answer: "мнение (так сказала Вера, но это её оценка, не проверяемый факт)"
          replaces: "sc10"

        - quiz: "«В дневнике почерк Софии.»"
          type: plot
          answer: "факт (проверяемо — сравнить почерк)"
          replaces: "sc10"

        - quiz: "«Лина — друг Марко.»"
          type: plot
          answer: "мнение (что значит «друг»? нельзя измерить)"
          replaces: "sc10"
          spoiler_check: "нет — на этом этапе ребёнок верит, вопрос про проверяемость"

        - quiz: "«Одноклассники не помнят Софию.»"
          type: plot
          answer: "факт (наблюдаемо — никто не реагирует на её имя)"
          replaces: "sc10"

        - quiz: "«Лина сказала: "Они слушают."»"
          type: plot
          answer: "факт — она это сказала. Но правда ли то, ЧТО она сказала?"
          replaces: "sc10"
          rationale: "двойной уровень: факт высказывания vs правдивость содержания"
          spoiler_check: "нет — открытый вопрос"

        - quiz: "«Всё, что говорит Софа, — правда.»"
          type: plot
          answer: "неправда (проверяемо — Софа иногда глючит)"
          replaces: "sc10"
          rationale: "из правил мира: Софа — ненадёжный источник. Учит проверять даже ИИ"
          spoiler_check: "нет — Софа сама предупреждает о глюках"

        - quiz: "«Марко — соглашатель.»"
          type: plot
          answer: "мнение? или факт? (можно наблюдать — он соглашается с последним говорившим)"
          replaces: "sc10"
          rationale: "центральный изъян героя, открытый вопрос"

        - quiz: "«В школе Марко тридцать учителей.»"
          type: story
          answer: "факт (проверяемо — посчитать)"
          replaces: "sc10"
          rationale: "простой факт для передышки между сложными"

        - quiz: "«Софа сказала: "Если ты не будешь готов — произойдёт непоправимое."»"
          type: plot
          answer: "факт — она это сказала. Но правда ли это предупреждение?"
          replaces: "sc10"
          rationale: "финальный квиз — сильный, тревожный, мотивирует продолжать"
          spoiler_check: "нет — Софа это говорит в эп.1, ответ неизвестен"
