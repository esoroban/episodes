profile_id: school-mystery-investigation-v1
status: active
purpose: >
  Canonical prose style profile for StoryLab3. Use this file instead of
  prompting with author names. The profile converts broad literary references
  into stable writing constraints that can be executed consistently in Stages 6-7.

elevator_pitch: >
  Clear middle-grade mystery prose with a child's emotional immediacy, a tight
  clue chain, and scene-by-scene forward motion. The language stays simple,
  concrete, and playable. Mystery weight is carried by evidence, denial
  patterns, and emotional dissonance, not by ornate worldbuilding or essayistic
  narration.

style_model:
  primary_mode: school_mystery_clarity
  secondary_mode: detective_clue_chain
  tertiary_mode: moral_emotional_sincerity
  anti_modes:
    - high_epic_gravity
    - ornate_mythic_description
    - adult_ironic_distance
    - essay_like_explanation

reader_target:
  age_band: 9-15
  comprehension_priority: immediate
  emotional_access: direct

narrative_defaults:
  focalization: close_to_marko
  scene_engine: question -> test -> contradiction -> clue -> consequence
  progression_unit: one concrete discovery or pressure increase per scene
  mystery_driver: physical evidence plus repeated social denial
  preferred_world_feel: ordinary world with one impossible wrongness

narration_rules:
  sentence_length: short_to_medium
  paragraph_density: low
  description_bias: concrete_over_lyrical
  abstract_language_level: minimal
  allowed:
    - physical inventory
    - sensory detail
    - precise spatial staging
    - child-legible inference
  avoid:
    - metaphysical fog language
    - historical grandeur
    - long reflective passages
    - narrator philosophizing
    - decorative adjective stacking

dialogue_rules:
  default_shape: short exchanges with pressure
  subtext_source: mismatch between words, tone, and evidence
  character_speech:
    marko: searching, precise, emotionally exposed, stubborn when evidence appears
    author: warm, clean, scenic, never interpretive
    adults_in_denial: calm, confident, specific, wrong in a tidy way
    antagonists: persuasive before threatening
  avoid:
    - witty adult banter
    - literary monologues
    - villain speeches too early

lexicon_rules:
  prefer:
    - school objects
    - household objects
    - body sensations
    - evidence verbs
    - plain emotional words
  avoid:
    - archaic diction
    - pseudo-mythic naming
    - bureaucratic abstraction unless diegetically required

rhythm_rules:
  opening_hook_by_minute_1: true
  clue_or_pattern_per_scene: true
  explanation_after_evidence: false
  scene_end_bias:
    - unease
    - pressure
    - new question
    - partial proof

forbidden_moves:
  - Do not use "write like <author>" as a production instruction.
  - Do not imitate epic fantasy cadence or mythic register.
  - Do not solve tension with narrator explanation.
  - Do not let the prose sound smarter than the child viewpoint.
  - Do not trade clue density for atmospheric vagueness.

prompt_contract:
  preferred_reference: >
    Use profile_id plus field names as the style control surface.
  preferred_prompt_snippet: >
    Follow STORY_STYLE_PROFILE.yaml profile_id=school-mystery-investigation-v1:
    close Marko focalization, concrete scenic narration, short-to-medium
    sentences, one clue or pressure increase per scene, no epic or essayistic
    language.

reference_notes:
  explanation: >
    If humans want a shorthand, this profile is functionally closer to
    school-mystery clarity plus detective clue discipline than to epic fantasy.
    Author names may be used in discussion, but the pipeline should run on the
    dimensions above.
