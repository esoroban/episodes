        за этой дверью — правда о Голосе. Не та, что он
        показывает. Настоящая.» Софа: «Число: 30. Шесть
        новых. Лина помнит — и те, кого она привела,
        тоже помнят.» Марко делает шаг. Зеркала вокруг
        гаснут — впервые в Городе темно. Софа: «Марко...
        следующий урок Софии — о выборе. Когда вариантов
        не два. И не три. Когда нужно найти свой.»
      sofa_reaction: "«Темно... Зеркала не работают. Город меняется. Мы близко.»"
