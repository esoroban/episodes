        вообще не эксперт. Даже уместный авторитет —
        проверяй.»
      life_question: >
        «Старший брат говорит: "Поверь мне, я знаю лучше."
        Он — авторитет. Но компетентен ли он именно
        в этом вопросе? Как проверить?»

    challenge:
      duration: "5-6 мин"
      summary: >
        Блиц-повторение всего Дня 9. Первая часть: страшные
