# EPISODE PLAN — День 9
# Уроки: 9A, 9B
# Акт: III — Предательство
# Source episodes: 22, 23
# Статус: УТВЕРЖДЁН

day: 9
lessons: ["9A", "9B"]
story_arc: "Акт III: Предательство"
story_summary: "План вернуть Макса. Три серых нитки Лины. ПРЕДАТЕЛЬСТВО. Лина — агент Софии"
source_episodes: [22, 23]

episodes:

  # =====================================================================
  # ЭПИЗОД 33 — «Цена каждого шага»
  # =====================================================================
  - ep: 33
    blocks: ["9A.1"]
    title: "Цена каждого шага"
    terms_introduced: ["страшная цепочка"]
    terms_used: ["манипуляция страхом", "четыре шага защиты от запугивания", "пугало (искажение слов)", "три вопроса-фильтра"]
    total_quizzes: 12

    drama:
      duration: "3-4 мин"
      location: "Зеркальный Город, заброшенный коридор у Системы"
      characters: ["Марко", "Сем", "Софа"]
      summary: >
        Утро после исчезновения мамы. Марко не спал. Сем
        тихо сидит рядом — не говорит, просто рядом. Софа
        разблокировала карту Системы — путь к ядру, где
        хранятся стёртые. Макс — там. Но путь состоит
        из пяти точек, и каждая — цена. Первая точка —
        отдать один артефакт. Вторая — пройти через зону
        стирания. Третья — оставить Сема. Четвёртая —
        встретить Голос лично. Пятая — неизвестна. Марко
        смотрит на карту: «Каждый шаг хуже предыдущего.»
        Софа: «Именно. Запомни это ощущение.»
      gut_feeling: >
        Ступени лестницы — каждая ниже предыдущей. Марко
        чувствует, как план затягивает: стоит согласиться
        на первый шаг — и остальные кажутся неизбежными.
        Как будто стоишь на горке — начал скользить,
        и остановиться уже нельзя.
      marko_flaw: >
        Марко хочет согласиться на всё сразу — спасти
        Макса любой ценой. Но «любой ценой» — это
        ловушка. Каждую цену нужно проверить отдельно.

    sofa_block:
      duration: "4-5 мин"
      term_introduced: "страшная цепочка"
      trigger: >
        Софа: «Эта карта — страшная цепочка. Маленький
        шаг → большой шаг → катастрофа. Страшная цепочка —
        когда берут маленькое событие и строят длинную
        лестницу всё более страшных последствий. Каждая
        ступенька страшнее предыдущей — но каждая
        менее вероятна.» Разминка: повторение пугала
        и манипуляции страхом из Дня 8. Затем: «Голос
        построил план спасения как цепочку: отдай
        артефакт → пройди стирание → потеряй друга →
        встреть врага. Каждый шаг "неизбежно" ведёт
        к следующему. Но так ли это?» Отличие от простой
        манипуляции страхом: не одно пугающее последствие,
        а целая лестница — каждая ступенька страшнее.
        Главное правило: каждое следующее звено менее
        вероятно, и на каждом шаге можно что-то изменить.
      quizzes:
        count: 5
        source: "brief sc1 (5v warmup) + sc6 (2v из 5)"
        description: >
          sc1 (3v): разминка — повторение пугала и манипуляции
          страхом (Катя и фильм, реклама рюкзака, Андрей
          и контрольные).
          sc6 (2v): цепочка или реальная опасность
          (опоздание на урок, красный свет на дороге).
      rule: >
        «Страшная цепочка — длинная лестница ужасов из
        мелочи. Каждая ступенька страшнее — но менее
        вероятна. На каждом шаге можно остановиться.»
      life_question: >
        «Мама говорит: "Если не сделаешь домашку — получишь
        двойку — останешься на второй год — не поступишь
        никуда." Страшная цепочка или реальная опасность?»

    challenge:
      duration: "5-6 мин"
      summary: >
        Марко разбирает карту Системы по звеньям. Софа:
        «Проверяем каждый шаг. Первый: отдать артефакт —
        это ТОЧНО необходимо? Кто сказал?» Марко: «Голос.»
        Софа: «А Голос — источник, которому мы доверяем?»
        Марко проверяет: можно ли обойти первую точку?
        Сем находит обходной путь — старый тоннель. Первое
        звено — сломано. Марко: «Если первое звено можно
        сломать — может, и остальные?» Софа: «Вот. Цепочка
        не неизбежна. Между звеньями всегда можно
        остановиться.»
      quizzes:
        count: 7
        source: "sc6 остаток (3v) + sc3 (1v) + story (3 added)"
        description: >
          sc6 (3v): цепочка или реальная опасность (конфета,
          немытые руки, сломанный карандаш).
          sc3 (1v): что объединяет три истории (длинная
          цепочка ужасов из мелочи).
          3 added (сюжетных): Марко разбирает карту по звеньям —
          какое звено можно сломать; план Голоса — страшная
          цепочка или реальный путь; обходной тоннель Сема —
          что это доказывает о цепочке.
      vera_role: ""
      rey_role: ""
      voice_role: >
        Голос — архитектор плана-ловушки. Построил путь как
        цепочку неизбежных шагов. Но цепочка — не неизбежна.

    cliffhanger:
      duration: "1-2 мин"
      summary: >
        Марко и Сем идут обходным тоннелем. Стены — зеркальные.
        В отражении — не они. Лина. Стоит за углом. Смотрит
        на Марко. Тихо. Не прячется. Софа: «Лина... здесь.
        Давно. Она ждала.» Лина поднимает руки: «Мне нужно
        тебе кое-что показать.» Рукав задирается — серая
        нитка на запястье. Не одна.
      sofa_reaction: "«Лина... ждала. Не пряталась. Зачем?»"
      next_episode_hook: "Лина вернулась. Что она хочет показать? И сколько ниток под рукавом?"

    quiz_distribution:
      from_brief: 9
      added_story: 3
      moved_to_extra: 2
      total: 12

    extra_practice:
      count: 2
      source: "sc1 остаток (2v)"
      description: >
        Оставшиеся квизы разминки из sc1: шлем и рисование
        vs футбол. Допрактика после эпизода.

  # =====================================================================
  # ЭПИЗОД 34 — «Три нитки»
  # =====================================================================
  - ep: 34
    blocks: ["9A.2"]
    title: "Три нитки"
    terms_introduced: ["три рентгеновских вопроса"]
    terms_used: ["страшная цепочка", "манипуляция страхом", "три вопроса-фильтра"]
    total_quizzes: 12

    drama:
      duration: "3-4 мин"
      location: "Зеркальный Город, тоннель у ядра Системы"
      characters: ["Марко", "Сем", "Софа", "Лина"]
      summary: >
        Лина закатывает рукав. Не одна серая нитка — ТРИ.
        Одна вросла в кожу. Три контакта с Системой ДО
        всего — до знакомства с Марко, до похода в Город.
        Лина: «Я знала о Городе раньше, чем ты думаешь.»
        Марко: «Ты лгала с самого начала?» Лина: «Нет. Я
        молчала. Это разные вещи.» Сем прячется за Марко —
        не доверяет. Лина: «Я могу помочь вернуть Макса.
        Отдам свою память Системе — она примет обмен.»
        Софа: «Стоп. Проверяем.»
      gut_feeling: >
        Три нитки — как три шрама. Лина знала больше,
        чем говорила. Марко чувствует двойственность:
        злость (она скрывала) и благодарность (она
        предлагает жертву). Голова кружится от
        противоречий.
      marko_flaw: >
        Марко хочет согласиться — Лина предлагает
        спасение Макса. Но согласиться без проверки —
        это старая ошибка. Каждое звено нужно просветить.

    sofa_block:
      duration: "4-5 мин"
      term_introduced: "три рентгеновских вопроса"
      trigger: >
        Софа: «Лина построила цепочку: отдам память →
        Система примет → Макс вернётся. Три звена. Проверяем
        каждое — тремя рентгеновскими вопросами.» Три
        рентгеновских вопроса: (1) это ТОЧНО произойдёт
        или только может? (2) какой шанс — большой, средний,
        маленький, крошечный? (3) можно ли что-то изменить
        на этом шаге? Практика на примере Лины: «Система
        ТОЧНО примет память?» — только может. «Какой шанс?» —
        неизвестно. «Можно ли изменить?» — да, можно искать
        другой путь. Затем — практика на бытовых цепочках:
        найти самое слабое звено.
      quizzes:
        count: 5
        source: "brief sc7 (4v)"
        description: >
          sc7 (4v): найди самое слабое звено в цепочке
          (суп → баскетбол, телефон → одиночество,
          комната → тараканы, сон → коробка).
          + 1 added (сюжетный): проверь цепочку Лины
          тремя рентгеновскими вопросами.
      rule: >
        «Три рентгеновских вопроса: (1) это ТОЧНО или
        только может? (2) какой шанс? (3) можно ли
        изменить? Если хоть один ответ — "не точно",
        "маленький" или "да, можно" — цепочка не работает.»
      life_question: >
        «Друг говорит: "Если не придёшь на мой день рождения —
        я обижусь — перестану дружить — и все перестанут."
        Примени три рентгеновских вопроса к каждому звену.»

    challenge:
      duration: "5-6 мин"
      summary: >
        Марко применяет рентгеновские вопросы к плану Лины.
        Звено 1: «Система ТОЧНО примет память?» Лина: «Она
        принимала раньше.» Софа: «Раньше — не значит сейчас.
        Шанс — средний.» Звено 2: «Макс ТОЧНО вернётся?»
        Лина молчит. Софа: «Нет гарантии. Шанс — маленький.»
        Звено 3: «Можно ли изменить?» Марко: «Да. Мы нашли
        обходной тоннель. Может, есть другой путь и для
        Макса.» Лина: «Хорошо. Тогда идём вместе. Но я
        должна показать тебе кое-что ещё.» Она тянется
        к свитеру — но останавливается. «Не сейчас.
        Сначала — Макс.»
      quizzes:
        count: 7
        source: "story (4 added) + sc8 adapted (3 из 8 discussion)"
        description: >
          4 added (сюжетных): Марко проверяет план Лины —
          какое звено самое слабое; три нитки Лины — страшная
          цепочка «она шпион» или реальная опасность; жертва
          Лины — проверяем рентгеновскими вопросами; Сем
          не доверяет Лине — цепочка в его голове или факт.
          3 adapted (sc8): построй абсурдную цепочку — три
          пары начало-конец (зонтик → море, сок → профессия,
          автобус → друзья) адаптированы в сюжет.
      vera_role: ""
      rey_role: ""
      voice_role: ""

    cliffhanger:
      duration: "1-2 мин"
      summary: >
        Они идут к ядру вместе. Тоннель расширяется.
        Впереди — свет. Марко направляет свет артефакта
        на Лину — случайно. И видит: не три нитки.
        ДЕСЯТКИ. Весь свитер пронизан серыми нитками.
        Лина замирает. «Марко... позволь объяснить.»
        Софа: «...файл заблокирован. Уровень: "Когда
        будет готов." Марко, смотри внимательно.»
      sofa_reaction: "«Десятки... ниток. София знала. Файл заблокирован. Но ненадолго.»"
      next_episode_hook: "Три нитки оказались десятками. Кто такая Лина на самом деле?"

    quiz_distribution:
      from_brief: 4
      added_story: 5
      moved_to_extra: 5
      total: 12

    extra_practice:
      count: 5
      source: "sc8 остаток (5 discussion)"
      description: >
        Оставшиеся творческие задания: построй абсурдную
        цепочку (кот → животные, цветок → экология,
        ключ → палатка, жвачка → выпускной,
        тарелка → ресторан). Допрактика после эпизода.

  # =====================================================================
  # ЭПИЗОД 35 — «Десятки»
  # =====================================================================
  - ep: 35
    blocks: ["9B.1"]
    title: "Десятки"
    terms_introduced: ["авторитет", "компетентность", "ложный авторитет"]
    terms_used: ["факт", "мнение", "доверие (Этос)", "чувства (Пафос)", "доказательства (Логос)", "страшная цепочка"]
    total_quizzes: 13

    drama:
      duration: "3-4 мин"
      location: "Зеркальный Город, тоннель у ядра"
      characters: ["Марко", "Сем", "Софа", "Лина"]
      summary: >
        Десятки серых ниток. Свитер Лины — как паутина.
        Лина не отступает. «Да, десятки. Каждая — контакт
        с Системой. Каждая — отчёт.» Она достаёт блокнот.
        Страницы — аккуратные, мелкий почерк. Отчёты
        о каждом шаге Марко. Дата, место, что сказал,
        кому доверял. Последняя страница: «Он доверяет
        мне полностью.» Сем: «Она шпион!» Марко молчит.
        Ноги не держат. Лина — единственная, кому он
        доверял после Макса. И доверие было — ловушкой?
      gut_feeling: >
        Удар в солнечное сплетение. Блокнот — как зеркало,
        в котором видишь собственную наивность. Каждая
        страница — доказательство: тебя изучали. Тебя
        использовали. Или нет?
      marko_flaw: >
        Марко хочет выгнать Лину — немедленно. Злость
        заливает голову. Но злость — плохой советчик.
        Нужно разобраться: ПОЧЕМУ он доверял?

    sofa_block:
      duration: "4-5 мин"
      term_introduced: "авторитет, компетентность, ложный авторитет"
      trigger: >
        Софа: «Марко верил Лине. Почему? Потому что она
        помогала. Потому что была рядом с самого начала.
        Потому что знала вещи, которых другие не знали.
        Это — авторитет. Авторитет — человек, которому
        мы доверяем.» Но авторитет и компетентность —
        разные вещи. Компетентность — когда человек
        реально разбирается именно в этой теме. Ложный
        авторитет — когда авторитет есть, а компетентности
        нет. Как красивая обёртка на пустой коробке.
        Два условия уместной ссылки: человек компетентен
        в этой области + другие специалисты согласны.
        Два признака ловушки: говорит не о своей области +
        вообще не эксперт. Ключевая фраза: «Компетентность
        не переносится с темы на тему!»
      quizzes:
        count: 5
        source: "brief sc1 (1v) + sc2 (1v) + sc4 (3v из 11)"
        description: >
          sc1 (1v): что объединяет пять примеров (все
          ссылаются на кого-то известного).
          sc2 (1v): почему Дмитрик поверил рекламе сока
          «ЗвёздоСила».
          sc4 (3v): разбирается или нет — ветеринар
          и собака, блогер и простуда, повар и стейк.
      rule: >
        «Авторитет — кому доверяем. Компетентность —
        реально разбирается в теме. Ложный авторитет —
        авторитет без компетентности. Компетентность
        не переносится с темы на тему!»
      life_question: >
        «Известный блогер рекламирует витамины. У него
        миллион подписчиков. Он — авторитет? А компетентен
        ли он в медицине?»

    challenge:
      duration: "5-6 мин"
      summary: >
        Софа: «Марко верил Лине как ДРУГУ — это авторитет
        доверия. Но была ли Лина компетентна в том, что
        обещала? Она говорила: "Я знаю путь." Знала ли?
        Или пересказывала чужие инструкции?» Марко
        разбирает: Лина знала дорогу — факт. Лина
        помогала — факт. Лина доносила — тоже факт. Оба
        факта верны. Софа: «Доверие основано на чём —
        на фактах или на чувствах? Лина была рядом —
        это Пафос. Лина знала дорогу — это может быть
        компетентность. А может — ложный авторитет,
        если знания не её.» Практика: 11 ситуаций
        «разбирается или нет» из урока.
      quizzes:
        count: 8
        source: "sc4 остаток (8v из 11)"
        description: >
          sc4 (8v): разбирается или нет — актёр и банк,
          учитель физкультуры и разминка, старший брат
          и шоколад, Маша и роботы, Маша и собаки,
          Артём и шахматы, Артём и котлеты, Лиза и рассада.
      vera_role: ""
      rey_role: ""
      voice_role: ""

    cliffhanger:
      duration: "1-2 мин"
      summary: >
        Марко: «Уходи.» Лина не двигается. «Прежде чем
        выгонишь — посмотри сюда.» Она стягивает свитер
        с плеча. Под нитками — шрам. Буква. «С». Марко
        замирает. «С» — как «София». Софа мигает. Экран
        трещит. Файл разблокирован.
      sofa_reaction: "«Файл... разблокирован. София... знала о Лине. С самого начала.»"
      next_episode_hook: "Шрам «С» — София. Лина работала не на Голос. На кого?"

    quiz_distribution:
      from_brief: 13
      added_story: 0
      moved_to_extra: 0
      total: 13

    extra_practice:
      count: 0
      source: ""
      description: ""

  # =====================================================================
  # ЭПИЗОД 36 — «Агент "С"»
  # =====================================================================
  - ep: 36
    blocks: ["9B.2"]
    title: "Агент «С»"
    terms_introduced: []
    terms_used: ["авторитет", "компетентность", "ложный авторитет", "факт", "мнение", "доверие (Этос)", "чувства (Пафос)", "доказательства (Логос)", "страшная цепочка", "три рентгеновских вопроса"]
    total_quizzes: 14

    drama:
      duration: "3-4 мин"
      location: "Зеркальный Город, тоннель у ядра"
      characters: ["Марко", "Сем", "Софа", "Лина", "голос Софии (запись)"]
      summary: >
        Софа разблокирует файл. Голос Софии — запись:
        «Лина — мой человек. Не Голоса. Я попросила её
        следить за тобой — не шпионить, а ЗАЩИЩАТЬ. Каждый
        отчёт шёл мне. Голос перехватывал копии, но
        оригиналы — мои. Доверяй ей. Но проверяй.» Марко
        смотрит на Лину. Лина: «София нашла меня первой.
        До Голоса. Три первых нитки — её. Остальные —
        Голос подключил позже, когда заметил.» Число
        на стене: 30. Шесть новых — Лина помнит.
        Сем: «Если София послала Лину — может, и мне
        кто-то помогает?» Софа: «Вопрос не "кто помогает",
        а "кто КОМПЕТЕНТЕН помогать".»
      gut_feeling: >
        Облегчение и растерянность. Лина — не враг. Но
        доверие сломано и заново не склеивается одной
        записью. Марко хочет верить — но помнит блокнот.
        «Он доверяет мне полностью» — это писала Лина
        для Софии. Не для Голоса. Но слова те же.
      marko_flaw: >
        Марко хочет простить мгновенно — запись Софии
        как приказ «доверяй». Но Софа добавила: «проверяй».
        Доверие нужно перестроить на фактах, не на чувствах.

    sofa_block:
      duration: "4-5 мин"
      term_introduced: ""
      trigger: >
        Софа: «София — авторитет для Марко. Но является ли
        запись доказательством? Проверяем.» Условие 1:
        компетентна ли София в вопросе «кому доверять»?
        Она знала Лину лично, давала задания — да,
        компетентна. Условие 2: есть ли подтверждение?
        Шрам «С» — физическое доказательство. Число 30 —
        Лина помнит, значит не стёрта Голосом. Вывод:
        ссылка на авторитет Софии — уместная. Но: «Доверяй,
        но проверяй» — даже уместный авторитет не отменяет
        проверку. Усложнённая практика: ситуации с контекстом
        и подвохом из урока 9B.
      quizzes:
