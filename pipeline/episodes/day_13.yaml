# EPISODE PLAN — День 13
# Уроки: 13A
# Акт: V — Возвращение
# Source episodes: 37, 38, 39, 40
# Статус: УТВЕРЖДЁН

day: 13
lessons: ["13A"]
story_arc: "Акт V: Возвращение"
story_summary: "Школа. Марко видит приёмы. Рей — обычный. Мама — правда. Финальная битва с Голосом. Новая девочка. Финал «1»"
source_episodes: [37, 38, 39, 40]

episodes:

  # =====================================================================
  # ЭПИЗОД 49 — «Возвращение»
  # =====================================================================
  - ep: 49
    blocks: ["13A.1"]
    title: "Возвращение"
    terms_introduced: ["спор vs ссора", "Я-высказывание"]
    terms_used: ["поспешное обобщение", "страшная цепочка", "нападка на человека"]
    total_quizzes: 14
    open_questions: 1

    drama:
      duration: "3-4 мин"
      location: "Школа, обычный мир"
      characters: ["Марко", "Сем", "Макс", "Рей", "мама", "Вера", "Софа"]
      summary: >
        Школа. Обычная жизнь. Марко видит приёмы повсюду: реклама —
        обобщение, новости — страшная цепочка, учитель — нападка.
        Не достаёт Софу. Рей — потерянный, обычный подросток. Мама
        приходит в школу, говорит правду: «Я боялась. За себя.»
        Без увиливания — впервые. Марко обнимает. Вечер: Марко и Сем
        спорят — рассказывать ли одноклассникам? Сем переходит на
        личность: «ТЫ всегда решаешь за всех!» Спор стал ссорой.

    sofa_block:
      duration: "4-5 мин"
      trigger: "Марко и Сем начали с темы, закончили оскорблениями"
      terms_taught: ["спор vs ссора", "Я-высказывание"]
      quizzes: 6
      quiz_types: ["спор или ссора (3)", "обвинение или Я-высказывание (3)"]
      sofa_rule: >
        «Спор — про слова. Ссора — про человека. Если перешли на "ТЫ" —
        спор умер. Я-высказывание: "Мне [чувство], когда [ситуация]" —
        говори о себе, не нападай.»

    challenge:
      duration: "5-6 мин"
      description: >
        Марко применяет Я-высказывание к Сему. Сем отвечает тем же.
        Практика: выбор Я-высказывания в конфликтах (друг кричит,
        одноклассница критикует, брат обвиняет, подруга жалуется,
        сосед по парте). 1 ✎ открытый вопрос.
      quizzes: 8
      open_questions: 1

    cliffhanger: >
      Новая девочка у двери класса: «У меня был брат. Никто не помнит.»
      Софа мигает — и гаснет. Динамики щёлкают. Голос вернулся.

  # =====================================================================
  # ЭПИЗОД 50 — «1» (ФИНАЛ СЕЗОНА)
  # =====================================================================
  - ep: 50
    blocks: ["13A.2"]
    title: "1"
    terms_introduced: ["фразы-спасатели"]
    terms_used: ["страшная цепочка", "ложная дилемма", "нападка на человека", "пугало", "ложный авторитет", "подмена понятий", "вопрос-ловушка", "«я не говорю, что...»", "манипуляция", "спор vs ссора", "Я-высказывание"]
    total_quizzes: 10
    open_questions: 5

    drama:
      duration: "3-4 мин"
      location: "Школа — Голос захватывает динамики и экраны"
      characters: ["Марко", "Сем", "Макс", "Рей", "Софа", "София (запись)", "Голос", "новая девочка", "Вера"]
      summary: >
        Голос — везде. Динамики, экраны, телефоны одноклассников.
        Софа мертва. Марко один. Новая девочка с серой ниткой.
        Марко встаёт: «Я не устал. И я не перестану.»

    battle:
      duration: "6-7 мин"
      description: >
        ФИНАЛЬНАЯ БИТВА. Голос атакует 8 приёмами по очереди.
        Марко пишет на доске название каждого и отбивает.
        Раунды: страшная цепочка → ложная дилемма → нападка →
        пугало → ложный авторитет → подмена понятий →
        вопрос-ловушка → «я не говорю, что...»
        С каждым названным приёмом — динамик/экран гаснет.
        Последний удар: манипуляция — «Хочешь вернуть сестру? Скажи да.»
        Марко: фраза-спасатель «Мне нужно подумать.»
        Голос повержен, но не уничтожен — отступает.
      quizzes: 10
      quiz_types: ["определи приём Голоса (8)", "фраза спасёт или ухудшит (8)", "сюжетный (2 added)"]

    sofa_block:
      duration: "3-4 мин"
      trigger: "Марко нужна пауза перед последним ударом Голоса"
      terms_taught: ["фразы-спасатели"]
      quizzes: 8
      sofa_rule: >
        «Четыре фразы-спасателя — парашют для разговора. Когда эмоции
        зашкаливают — сначала пауза, потом слова. Спор — о теме, не о человеке.»

    open_practice:
      description: >
        5 ✎ открытых вопросов: Лена и Вика (проект), Костя и Артём
        (футбол), Даша (стрижка), Тимур (посуда), Миша и Егор (телефон).
        Дети сами формулируют выход из конфликта.
      open_questions: 5

    finale: >
      Софа включается. Голос Софии: «Братик. Ты прошёл. Учитель —
      тот, кто знает, какие вопросы задать.» Марко — девочке: «Садись.
      Я расскажу про факты и мнения. Но я не знаю всех ответов.
      И это нормально.» Рей садится рядом — впервые слушает. Число «1»
      на стене. Софа: «Новый пользователь обнаружен.» Экран гаснет.
      Треск другого телефона. Где-то в другом городе.
      КОНЕЦ ПЕРВОГО СЕЗОНА.

