# EPISODE PLAN — День 2
# Уроки: 2A, 2B
# Акт: I — Пробуждение
# Source episodes: 3, 4, 5, 6
# Статус: ЧЕРНОВИК

day: 2
lessons: ["2A", "2B"]
story_arc: "Акт I: Пробуждение"
story_summary: "Невидимая дверь. Вход в Зеркальный Город. Леон. Число 47"
source_episodes: [3, 4, 5, 6]

# =====================================================================
# ЭПИЗОД 5 — «Невидимая дверь»
# =====================================================================
episodes:

  - ep: 5
    blocks: ["2A.1"]
    title: "Невидимая дверь"
    terms_introduced: ["повторяемость", "закономерность", "совпадение"]
    terms_used: ["факт", "мнение", "неправда", "хитрое утверждение", "отговорка", "инструменты проверки", "детектив правды"]
    total_quizzes: 15

    drama:
      duration: "3-4 мин"
      location: "Парк, невидимая дверь → вход в Зеркальный Город"
      characters: ["Марко", "Лина", "Софа"]
      summary: >
        Марко подносит руку к невидимой двери — пальцы проваливаются.
        Повторяет: два раза, три. Дверь открывается. Фиолетовое небо.
        Зеркальный Город. Громкоговорители: «Добро пожаловать домой,
        потомок.» Лина шагает первой — без колебаний. Дверь
        ЗАХЛОПЫВАЕТСЯ. Обратного пути нет. Небо фиолетовое. Тени живут
        своей жизнью. Громкоговорители транслируют утверждения:
        «Здесь безопасно.» «Вы в лучшем городе мира.» «Никто не хочет
        вам зла.» Марко оглядывается — всё выглядит как город, но что-то
        сдвинуто, как в кривом зеркале.
      gut_feeling: >
        Ноги не хотят идти. Голова говорит «да», а ноги говорят «стой».
        Потом — дверь захлопнулась, и в груди стало пусто.
        Громкоговорители говорят ласково, но от этой ласки хочется
        сжаться, как от холодного ветра.
      marko_flaw: >
        Лина шагнула уверенно — и этого Марко достаточно.
        Он не спрашивает «откуда ты знаешь?» — потому что боится
        услышать ответ. Идёт следом, как всегда.

    sofa_block:
      duration: "4-5 мин"
      term_introduced: "повторяемость, закономерность, совпадение"
      trigger: >
        Софа: «Марко, ты подносил руку три раза — и три раза пальцы
        проваливались. Один раз — странно. Два — подозрительно. Три —
        похоже на закономерность.» Вводится понятие «повторяемость»:
        если результат получается каждый раз — это надёжно.
        Если один раз да, один раз нет — совпадение.
        Закономерность — работает без нас (камень падает, вода кипит,
        сахар растворяется). Совпадение — мозг придумал связь, которой
        нет (красная футболка и победа, желание на звезду).
        Мозг — великий выдумщик: обожает находить связи, даже там, где
        их нет. Четвёртый вопрос детектива правды: «А это повторяется?»
      quizzes:
        count: 6
        source: "brief"
        description: >
          sc3 брифа 2A.1 (6v): закономерность или совпадение
          (камень падает вниз, желание на звезду, вода кипит при 100°,
          парта и хорошая оценка, солнце встаёт на востоке,
          счастливые носки).
      rule: >
        «Закономерность повторяется каждый раз, без нас. Совпадение —
        мозг придумал связь. Четвёртый вопрос детектива: "А это
        повторяется?"»
      life_question: >
        «Ты надел новую футболку — и написал контрольную на 12.
        Надел снова — написал на 8. Футболка помогает?»

    challenge:
      duration: "5-6 мин"
      summary: >
        Громкоговорители Города повторяют: «Здесь безопасно.»
        Софа: «Проверяемо? А сколько раз мы слышали это?
        А сколько раз проверяли?» Марко смотрит в лужу.
        Его отражение дрожит. Отражение Лины — СПОКОЙНО, руки
        скрещены, выражение ожидания. Как будто она здесь бывала.
        Софа: «Несоответствие... обнаружено. Один раз — совпадение.
        Продолжай наблюдать.» Квизы-тренировка: повторение
        терминов из Дня 1 + новые термины.
      quizzes:
        count: 9
        source: "brief"
        description: >
          sc1 брифа 2A.1 (9v): повторение урока 1A — факт/мнение/неправда
          (3v) + проверяемое/мнение/хитрое утверждение (6v).
          Используются ТОЛЬКО термины, введённые ранее: факт, мнение,
          неправда, хитрое утверждение + новые: закономерность, совпадение.
      vera_role: ""
      rey_role: ""
      voice_role: >
        Громкоговорители: «Здесь безопасно. Вы в лучшем городе мира.
        Никто не хочет вам зла.» — мнения, выданные за факты.

    cliffhanger:
      duration: "1-2 мин"
      summary: >
        Марко идёт по улице Города. Тени людей движутся не так,
        как сами люди. Софа мигает: «София... записала... "Он войдёт.
        Я его знаю."» София знала. Снова. Впереди — тусклый свет
        в подвале библиотеки. Кто-то варит чай.
      sofa_reaction: >
        «Предупреждение... уровень опасности... не определён.
        Обнаружен... тепловой сигнал... один человек... внизу.»
      next_episode_hook: "Кто в подвале? Можно ли ему верить?"

    quiz_distribution:
      from_brief: 17
      added_story: 0
      moved_to_extra: 2
      total: 15

    extra_practice:
      count: 2
      source: "sc2 брифа 2A.1 (2v): утверждение Дмитрика + ведёт ли себя как Витя с камнем"
      description: >
        Два голосования на связь историй из брифа: Дмитрик и
        повторяемость. Допрактика после эпизода.

  # =====================================================================
  # ЭПИЗОД 6 — «Светофор повторений»
  # =====================================================================
  - ep: 6
    blocks: ["2A.2"]
    title: "Светофор повторений"
    terms_introduced: ["светофор повторений"]
    terms_used: ["повторяемость", "закономерность", "совпадение", "факт", "мнение", "детектив правды"]
    total_quizzes: 15

    drama:
      duration: "3-4 мин"
      location: "Подвал библиотеки Зеркального Города"
      characters: ["Марко", "Лина", "Леон", "Софа"]
      summary: >
        Подвал библиотеки. Профессор Леон — чудаковатый, тёплый,
        варит чай. Марко расслабляется мгновенно: Леон напоминает деда,
        говорит мягко, не спорит. Именно такому человеку Марко верит
        без проверки. Леон наливает чай, Марко берёт чашку обеими
        руками — как дома. Но чай пахнет незнакомо. Мелочь. Марко
        отмахивается. Леон рассказывает о Городе: «Здесь всё работает
        по правилам. Повторяемым правилам.» Тень Леона — не улыбается.
        Один раз. Два. Три.
      gut_feeling: >
        Тепло от чая в руках. Хочется остаться. Леон говорит правильные
        слова. Но чай пахнет чужим — и Марко отмахивается от этого.
        Заноза, которую не хочется замечать.
      marko_flaw: >
        Леон мягкий, добрый, не спорит — и этого достаточно.
        Марко не проверяет его слова, потому что проверять «своих»
        неприятно. Соглашается по умолчанию.

    sofa_block:
      duration: "4-5 мин"
      term_introduced: "светофор повторений"
      trigger: >
        Софа: «Леон улыбается... тень НЕ улыбается. Один раз.
        Два. Три. Марко, ты заметил?» Марко: «Может, свет так
        падает.» Софа: «Может. А может — нет. Сколько раз нужно
        увидеть, чтобы решить?» Вводится «светофор повторений»:
        один раз — красный (стоп, не делай вывод), два-три раза —
        жёлтый (проверяй дальше), пять и больше одинаковых
        результатов — зелёный (похоже на закономерность).
        Условия проверки должны быть одинаковые: бег по стадиону
        оба раза — честно, один раз в гору — нечестно.
      quizzes:
        count: 6
        source: "brief"
        description: >
          sc4 брифа 2A.2 (2v): один раз хватит или нужно больше проверок
          (Петя и Миша) + закономерность или совпадение (лампочка 100
          из 100). Плюс первые 4 из sc5 (4v): закономерность или
          совпадение (мороженое тает на солнце, машина мыта и дождь,
          кепка и победа, бабушка чихнула перед дождём).
      rule: >
        «Светофор повторений: красный — одного раза мало.
        Жёлтый — два-три, проверяй дальше. Зелёный — пять и больше
        одинаковых. Но условия должны быть одинаковые!»
      life_question: >
        «Ты съел витамин утром — и не заболел. Один раз. Витамин
        помогает? Что скажет светофор?»

    challenge:
      duration: "5-6 мин"
      summary: >
        Марко находит первый артефакт — Зеркало Повторений.
        Леон: «Этот путь безопасен. Я проверял.» Софа: «Сколько раз
        он проверял?» Марко спрашивает — «Один раз.» Софа:
        «Достаточно? Какой цвет светофора?» Зеркало Повторений
        показывает: Леон говорил «безопасно» трём людям. Двое прошли.
        Один не вернулся. Квизы на закономерность/совпадение
        в скоростном режиме.
      quizzes:
        count: 9
        source: "brief"
        description: >
          sc5 брифа 2A.2 (оставшиеся 11v из 15): закономерность
          или совпадение (сахар в чае, друг позвонил, бумага в воде,
          растение и комплимент, чёрная кошка, лёд на батарее,
          улыбка и солнце, стакан на полу, хлопок и собака,
          морозильник, контрольная и холод).
          Из 11v берём 9 в основной блок. 2 — в extra_practice.
      vera_role: ""
      rey_role: ""
      voice_role: ""

    cliffhanger:
      duration: "1-2 мин"
      summary: >
        Уходя, Марко оглядывается. Леон машет рукой. Его ТЕНЬ
        НЕ МАШЕТ. Тень указывает на стену. Почерк Софии:
        «Посчитай его пальцы.» Софа мигает: «Предупреждение...
        уровень доверия к Леону... пересчитывается...»
        Марко использует Зеркало Повторений — видит силуэт Софии
        на миг. На стене число: 47.
      sofa_reaction: >
        «Предупреждение... уровень доверия к Леону...
        пересчитывается... Четвёртый вопрос детектива: повторяется ли?»
      next_episode_hook: "Что значит число 47? Почему тень Леона живёт своей жизнью?"

    quiz_distribution:
      from_brief: 17
      added_story: 0
      moved_to_extra: 2
      total: 15

    extra_practice:
      count: 2
      source: "sc5 брифа 2A.2 (оставшиеся 2v из 15)"
      description: >
        Два оставшихся голосования из sc5: закономерность или
        совпадение. Допрактика после эпизода.

  # =====================================================================
  # ЭПИЗОД 7 — «После — не значит из-за»
  # =====================================================================
  - ep: 7
    blocks: ["2B.1"]
    title: "После — не значит из-за"
    terms_introduced: ["причина", "следствие", "после — не значит вследствие"]
    terms_used: ["совпадение", "закономерность", "повторяемость", "светофор повторений", "факт", "мнение", "детектив правды"]
    total_quizzes: 15

    drama:
      duration: "3-4 мин"
      location: "Библиотека Зеркального Города, стена с числом"
      characters: ["Марко", "Лина", "Софа"]
      summary: >
        Марко использует Зеркало Повторений — видит силуэт Софии.
        Число на стене: 47. Использует артефакт снова: 46. Ещё раз: 44.
        Число падает каждый раз, когда Марко использует артефакт.
        Софа (тихо): «Предупреждение... артефакты... стирают...
        Число — это люди, которые помнят Софию.» Марко замирает.
        Каждый раз, когда он хотел увидеть сестру — кто-то забывал её.
      gut_feeling: >
        Холод в животе. Как будто это ОН стирает Софию — своими руками.
        Хотел увидеть — и навредил. Вина, которая жжёт.
      marko_flaw: >
        Марко использовал артефакт три раза подряд, не задумавшись
        о последствиях. Действовал по желанию, а не по логике.
        Хотел увидеть — и не спросил, какая цена.

    sofa_block:
      duration: "4-5 мин"
      term_introduced: "причина, следствие, после — не значит вследствие"
      trigger: >
        Софа: «Число упало. Что... произошло перед этим?
        Марко использовал артефакт — число упало. Это причина или
        просто "после"?» Вводится понятие «причина» — то, что
        ВЫЗЫВАЕТ событие. «Следствие» — то, что ПРОИСХОДИТ из-за
        причины. Тест: мысленно убери первое событие — второе всё
        равно случится? Да — совпадение. Нет — причина.
        Правило «после — не значит вследствие»: петух кричит перед
        рассветом, но не вызывает солнце. Два вопроса-спасателя:
        «А что ЕЩЁ могло повлиять?» и «А бывает одно без другого?»
      quizzes:
        count: 6
        source: "brief"
        description: >
          sc2 брифа 2B.1 (6 из 10v): причина или совпадение
          (дождь→зонт, соль→плохой день, чайник→кипение,
          ласточки→дождь, подготовка→оценка, кроссовки→победа).
      rule: >
        «Причина ВЫЗЫВАЕТ событие. Убери её мысленно — исчезнет ли
        следствие? Да — настоящая причина. Нет — совпадение.
        "После" не значит "из-за": время — не доказательство.»
      life_question: >
        «Ты помыл машину — пошёл дождь. Ты вызвал дождь?»

    challenge:
      duration: "5-6 мин"
      summary: >
        Марко хочет использовать артефакт ещё раз — увидеть сестру.
        Софа: «Каждое использование — минус один человек, помнящий
        Софию. Использовать?» Это вопрос к зрителю. Затем:
        обратная ловушка — иногда кажется «просто не повезло»,
        а на самом деле есть настоящая причина (стройка в темноте,
        потерянный учебник, грязные руки). Понимаешь причину —
        можешь изменить результат.
      quizzes:
        count: 9
        source: "brief"
        description: >
          sc2 брифа 2B.1 (оставшиеся 4v): причина или совпадение
          (лёд→тает, бабушка→снег, зеркало→невезение, цветок→засох).
          sc3 брифа 2B.1 (5 из 6v): причина или «просто не повезло»
          (стройка в темноте, потерял учебник, мокрый пол,
          не позавтракал, кричал на концерте).
      vera_role: ""
      rey_role: ""
      voice_role: ""

    cliffhanger:
      duration: "1-2 мин"
      summary: >
        Марко отказывается от артефакта. Но число падает до 43 САМО.
        Кто-то другой тоже стирает. Софа: «Источник... не определён.
        Ты... не единственная причина.» Марко и Лина переглядываются.
        Если не Марко стирает — то кто?
      sofa_reaction: >
        «Источник... не определён. Ты... не единственная причина.
        Два вопроса-спасателя: что ещё могло повлиять?»
      next_episode_hook: "Кто ещё стирает память о Софии? И зачем?"

    quiz_distribution:
      from_brief: 17
      added_story: 0
      moved_to_extra: 2
      total: 15

    extra_practice:
      count: 2
      source: "sc1 брифа 2B.1 (1v) + sc3 остаток (1v)"
      description: >
        Один вопрос на историю Вити и ручку (что вызывает хорошую оценку)
        + одно голосование из sc3 (ел грязными руками).
        Допрактика после эпизода.

  # =====================================================================
  # ЭПИЗОД 8 — «Третья причина»
  # =====================================================================
  - ep: 8
    blocks: ["2B.2"]
    title: "Третья причина"
    terms_introduced: ["третья причина"]
    terms_used: ["причина", "следствие", "совпадение", "после — не значит вследствие", "закономерность", "повторяемость", "светофор повторений", "факт", "мнение", "детектив правды"]
    total_quizzes: 15

    drama:
      duration: "3-4 мин"
      location: "Зеркальный Город, улица у библиотеки"
      characters: ["Марко", "Лина", "Софа"]
      summary: >
        Число упало САМО — без артефакта. Марко: «Это не я.
        Значит, кто-то ещё стирает.» Лина: «Может, Город сам
        стирает? Может, так работают правила?» Софа анализирует:
        два события происходят одновременно — использование артефактов
        И что-то другое. Оба стирают. Но может, их ОБА вызывает
        что-то третье? Марко вспоминает ласточек — они не вызывают
        дождь, но летают низко перед ним. Что-то третье стоит за обоими.
      gut_feeling: >
        Как будто за стеной кто-то дёргает за ниточки — а Марко видит
        только куклу. Ощущение, что картинка больше, чем он думал.
        Не страшно — но неуютно.
      marko_flaw: >
        Марко хочет простого ответа: «это я виноват» или «это не я».
        А правда — сложнее. Есть кто-то третий, и Марко пока
        не готов думать, кто это.

    sofa_block:
      duration: "4-5 мин"
      term_introduced: "третья причина"
      trigger: >
        Софа: «Ласточки из прошлого квиза — помнишь? Они не вызывают
        дождь. Но летают низко перед ним. Что их связывает? Влажный
        воздух. Он дёргает за обе верёвочки.» Вводится «третья
        причина» — кукловод за ширмой, который дёргает за две
        верёвочки. Два события кажутся связанными, но их ОБА вызывает
        что-то третье, спрятанное. Примеры: мороженое и солнечные
        ожоги (третья причина — жара), пожарные и разрушения (третья
        причина — размер пожара). Возврат к Городу: артефакты стирают
        И число падает само — может, третья причина — сам Голос?
      quizzes:
        count: 6
        source: "brief"
        description: >
          sc4 брифа 2B.2 (4v): найди третью причину (зонты+сапоги →
