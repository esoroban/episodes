# EPISODE PLAN — День 1
# Уроки: 1A, 1B
# Акт: I — Пробуждение
# Source episodes: 1, 2
# Статус: УТВЕРЖДЁН (2026-04-12)

day: 1
lessons: ["1A", "1B"]
story_arc: "Акт I: Пробуждение"
story_summary: "Исчезновение Софии. Мама не помнит. Софа включается. Лина помнит"
source_episodes: [1, 2]

# =====================================================================
# ЭПИЗОД 1 — «Утро без сестры»
# =====================================================================
episodes:

  - ep: 1
    blocks: ["1A.1"]
    title: "Утро без сестры"
    terms_introduced: ["факт", "мнение"]
    terms_used: []
    total_quizzes: 15

    drama:
      duration: "3-4 мин"
      location: "Квартира Марко, утро"
      characters: ["Марко", "мама", "Софа"]
      summary: >
        Марко просыпается. Кровать Софии пуста. Мама не помнит дочь.
        Фото на стене — пусты. Марко почти верит маме: она говорит
        уверенно, а он привык соглашаться. Находит старый телефон
        с треснутым экраном в комнате Софии. Включает. Софа: «Я — Софа.
        Образовательный помощник. Версия 0.7. Не финальная.»
      gut_feeling: >
        Тяжесть в животе, как перед контрольной, к которой не готовился.
        Мама говорит уверенно — но что-то не так. Марко не может назвать что.
      marko_flaw: >
        Марко почти кивает маме. Она говорит так уверенно, а он привык
        соглашаться с уверенными. Ещё секунда — и он бы поверил.

    sofa_block:
      duration: "4-5 мин"
      term_introduced: "факт, мнение"
      trigger: >
        Софа: «Мама сказала: "У тебя нет сестры." Это факт или мнение?
        Подумай...» Ситуация из драмы — мама утверждает, Марко сомневается.
      quizzes:
        count: 6
        source: "brief"
        description: >
          Только два варианта: факт или мнение (неправда ещё НЕ введена).
          1. «Мама сказала: "У тебя нет сестры." Факт или мнение?» (факт — можно проверить)
          2. «"София — лучшая сестра." Факт или мнение?» (мнение — нельзя измерить)
          3. «Дневник лежит на полке. Факт или мнение?» (факт — можно потрогать)
          4. «"В классе 25 учеников." Факт или мнение?» (факт — можно посчитать)
          5. «"Математика — скучный предмет." Факт или мнение?» (мнение — нет «скучномера»)
          6. «"Киев — столица Украины." Факт или мнение?» (факт — можно проверить)
      rule: >
        «Факт — можно проверить. Мнение — нельзя. Если не можешь проверить —
        это не факт, даже если звучит уверенно.»
      life_question: >
        «Друг сказал: "Все так делают." Это факт или мнение?»

    challenge:
      duration: "5-6 мин"
      summary: >
        Софа разблокирует запись Софии (3 секунды): «Братик, начни с дневника.
        Я верю в тебя.» Марко берёт дневник — почерк Софии, записи, рисунки.
        Это можно потрогать. Это факт. Марко собирается в школу с дневником
        как единственным доказательством. Но мама не видит проблемы.
      quizzes:
        count: 9
        source: "brief"
        description: >
          Экспресс-голосование: только факт или мнение (без неправды!).
          Из sc6 брифа 1A.1: фильм смешной (мнение), фильм идёт два часа
          (факт), зелёный красивый (мнение), трава зелёная (факт),
          собаки лучше кошек (мнение), делать уроки скучно (мнение),
          в сутках 24 часа (факт), пицца вкуснее каши (мнение),
          вода кипит при 100° (факт).
      vera_role: ""
      rey_role: ""
      voice_role: ""

    cliffhanger:
      duration: "1-2 мин"
      summary: >
        Марко идёт в школу с дневником. В коридоре — учительница
        Вера Андреевна, мягкая улыбка: «Как дела, Марко?»
        Софа вибрирует в кармане.
      sofa_reaction: "Вибрирует тревожно, но молчит"
      next_episode_hook: "Что скажет Вера? Поверят ли в школе?"

    quiz_distribution:
      from_brief: 15
      added_story: 0
      moved_to_extra: 0
      total: 15

  # =====================================================================
  # ЭПИЗОД 2 — «Неправда и её виды»
  # =====================================================================
  - ep: 2
    blocks: ["1A.2"]
    title: "Неправда и её виды"
    terms_introduced: ["неправда"]
    terms_used: ["факт", "мнение"]
    total_quizzes: 14

    drama:
      duration: "3-4 мин"
      location: "Школа, класс, коридор"
      characters: ["Марко", "Вера", "одноклассники", "Софа"]
      summary: >
        Школа. Марко показывает дневник одноклассникам — не верят, смеются.
        Вера Андреевна: «Марко, ты же умный мальчик, ты понимаешь, что
        переутомился.» Лесть + давление на согласие. Вера просит дневник:
        «Мне нужно посмотреть, я переживаю за тебя» — забота как извлечение
        информации. Руки Марко прижимают дневник к груди — тело помнит.
      gut_feeling: >
        Как будто проглотил что-то холодное. Всё звучит правильно,
        но хочется уйти. Вера говорит ласково — почему тогда зябко?
      marko_flaw: >
        Марко почти кивает Вере — она взрослая, добрая, говорит мягко.
        Он привык соглашаться с ласковыми. Почти отдаёт дневник.

    sofa_block:
      duration: "4-5 мин"
      term_introduced: "неправда"
      trigger: >
        Софа: «Вера сказала "ты переутомился." Факт или мнение?
        Есть "переутомлемер"? Нет. Это мнение — но Вера подаёт его
        как факт.» Затем переход: а бывает так, что ПРОВЕРИТЬ можно,
        но при проверке — не подтверждается? Возврат к Дмитрику из урока:
        его новость можно было проверить — не подтвердилась.
        Вводится термин «неправда»: можно проверить, но не подтверждается.
        Три вида: шутка (хочет посмешить), сказка (все понимают),
        фейк (специально придумано, чтобы поверили).
      quizzes:
        count: 6
        source: "brief"
        description: >
          Из sc8 брифа 1A.2: определить вид неправды — шутка, сказка или фейк
          (6 из 10 голосований). Примеры: паук на плече, дракон с блинчиками,
          школы закроют навсегда, собака съела домашку, единорог,
          WiFi вызывает простуду.
      rule: >
        «Неправду можно разоблачить — потому что она проверяема.
        А в споре мнений победителя нет. Можно сказать "окей, у тебя своё
        мнение" и пойти есть мороженое.»
      life_question: >
        «"На Земле 8 континентов." Факт, мнение или неправда?»
        (Неправда — можно проверить, при проверке не подтверждается.)

    challenge:
      duration: "5-6 мин"
      summary: >
        Финальная проверка: факт, мнение или неправда вперемешку.
        Сложные случаи: «Мой папа самый сильный» — можно измерить силу →
        проверяемо → скорее неправда. «Моя мама самая красивая» —
        нельзя измерить → мнение. Секрет: спроси — МОЖНО ли это измерить?
        Вера, услышав про дневник, ещё раз: «Принеси завтра, я за тебя
        переживаю.» Марко хочет отдать — Вера же добрая!
      quizzes:
        count: 8
        source: "brief"
        description: >
          sc9 (4v): сложные пограничные случаи (факт/мнение/неправда).
          sc10 (первые 4 из 20v): финальная проверка, все три термина
          вперемешку, включая ловушки.
      vera_role: >
        «Принеси мне дневник, я переживаю за тебя.»
        Забота как извлечение информации — Марко ещё не понимает приём.
      rey_role: ""
      voice_role: ""

    cliffhanger:
      duration: "1-2 мин"
      summary: >
        Конец учебного дня. Лина подходит, когда никто не видит:
        «Я помню Софию. Но нам нельзя говорить. Они слушают.»
        Кто — «они»?
      sofa_reaction: "Мигает тревожно. «Новый... контакт... обнаружен.»"
      next_episode_hook: "Кто такая Лина? Кто «они»? Можно ли ей верить?"

    quiz_distribution:
      from_brief: 34
      added_story: 0
      moved_to_extra: 20
      total: 14

    extra_practice:
      count: 20
      source: "sc10 брифа 1A.2 (оставшиеся 16 из 20 финальных голосований) + sc8 (оставшиеся 4)"
      description: >
        Финальная проверка всех трёх терминов вперемешку.
        Включает ловушки: «все дети любят сладкое»,
        «если не съешь суп — заболеешь». Допрактика после эпизода.

  # =====================================================================
  # ЭПИЗОД 3 — «Хитрые утверждения»
  # =====================================================================
  - ep: 3
    blocks: ["1B.1", "1B.2"]
    title: "Хитрые утверждения"
    terms_introduced: ["хитрое утверждение", "отговорка", "инструменты проверки"]
    terms_used: ["факт", "мнение", "неправда"]
    total_quizzes: 15

    drama:
      duration: "3-4 мин"
      location: "Улица после школы, двор"
      characters: ["Марко", "Лина", "Софа"]
      summary: >
        После школы. Марко и Лина. Лина рассказывает: она видела,
        как Софию забирали. Но детали путаются — то «ночью», то «утром»,
        то «в школе». На каждый вопрос Марко — у Лины есть объяснение:
        «было темно», «я плохо помню», «мне страшно было, поэтому
        перепутала». Марко хочет поверить — Лина первая, кто помнит.
      gut_feeling: >
        Заноза. Когда Лина путает «ночью» и «утром» — у Марко
        дёргается что-то внутри. Он отмахивается. Не хочет замечать.
      marko_flaw: >
        Лина говорит именно то, что Марко хочет услышать. Он не замечает
        противоречий, потому что ХОЧЕТ верить. Соглашается — не потому
        что проверил, а потому что удобно.

    sofa_block:
      duration: "4-5 мин"
      term_introduced: "хитрое утверждение, отговорка, инструменты проверки"
      trigger: >
        Софа: «Лина говорит "я видела своими глазами." Потом: "было темно,
        я плохо помню." На каждый вопрос — готовый ответ. Знакомый паттерн...»
        Вводится «хитрое утверждение» через историю Вити и волшебного камня
        (из брифа). Затем «отговорка»: причина, которая закрывает путь
        к проверке. Затем «инструменты проверки»: 5 помощников.
      quizzes:
        count: 6
        source: "brief"
        description: >
          sc3 брифа 1B.1 (6 из 10v): нормальное объяснение или отговорка?
          Бытовые ситуации: сальто, ручная ворона, кот разбросал, собака
          съела тетрадку, бегун, чашка.
      rule: >
        «Если на каждую проверку есть отговорка — верить на слово
        необязательно. Спроси: "А КАК это можно проверить?"»
      life_question: >
        «Друг говорит: "Я пробежал 100 м за 8 секунд, но только когда
        никто не смотрит." Хитрое утверждение?»

    challenge:
      duration: "5-6 мин"
      summary: >
        Марко пробует проверить Лину. Задаёт один и тот же вопрос
        дважды, в разное время. Ответы не совпадают — но Лина объясняет.
        Софа: «Несовпадение — не значит ложь. Но значит — проверяй
        дальше.» Квизы на инструменты проверки: есть подходящий
        инструмент или нет?
      quizzes:
        count: 9
        source: "brief"
        description: >
          sc3 (оставшиеся 4v): ещё отговорки из бытовых примеров.
          sc4 брифа 1B.2 (5 из 8v): есть инструмент или нет
          (книжка 500 г — весы, вода горячая — термометр,
          фильм лучший — нет инструмента, стометровка — секундомер,
          класс дружный — нет инструмента).
      vera_role: ""
      rey_role: ""
      voice_role: ""

    cliffhanger:
      duration: "1-2 мин"
      summary: >
        Лина ведёт Марко в парк. «Здесь дверь.» Марко не видит ничего.
        Софа мигает: «Дверь... обнаружена. Но ты не готов.
        Нужен следующий урок.» Экран гаснет.
      sofa_reaction: "«Дверь... обнаружена. Но ты не готов.»"
      next_episode_hook: "Что за дверь? Почему Софа говорит «не готов»?"

    quiz_distribution:
      from_brief: 24
      added_story: 0
      moved_to_extra: 9
      total: 15

    extra_practice:
      count: 9
      source: "sc1 брифа 1B.1 (6v повторение факт/мнение/неправда) + sc4 остаток (3v)"
      description: >
        Повторение: факт, мнение или неправда (быстрые голосования).
        Допрактика после эпизода.

  # =====================================================================
  # ЭПИЗОД 4 — «Детектив правды»
  # =====================================================================
  - ep: 4
    blocks: ["1B.3"]
    title: "Детектив правды"
    terms_introduced: ["детектив правды"]
    terms_used: ["факт", "мнение", "неправда", "хитрое утверждение", "отговорка", "инструменты проверки"]
    total_quizzes: 15

    drama:
      duration: "3-4 мин"
      location: "Парк, невидимая дверь"
      characters: ["Марко", "Лина", "Софа"]
      summary: >
        Парк. Невидимая дверь. Лина: «Она здесь. Я знаю.» Марко: «Откуда?»
        Лина: «Просто знаю.» Марко не видит — но Лина уверена, а он привык
        соглашаться с уверенными. Софа видит дверь — но у неё другой вопрос.
      gut_feeling: >
        Ноги не хотят идти. Голова говорит «да», а ноги говорят «стой».
        Марко идёт — потому что Лина уже шагнула.
      marko_flaw: >
        Лина шагает уверенно — и этого Марко достаточно.
        Он не спрашивает «откуда ты знаешь?» — потому что боится
        услышать ответ. Идёт следом, как всегда.

    sofa_block:
      duration: "4-5 мин"
      term_introduced: "детектив правды"
      trigger: >
        Софа: «Лина говорит "просто знаю." Это проверяемое утверждение?»
        Синтез всего урока в систему «детектив правды» из трёх вопросов:
        1) есть ли инструмент? 2) человек согласен проверить или отговорка?
        3) проверили — подтвердилось?
      quizzes:
        count: 6
        source: "brief"
        description: >
          sc5 брифа 1B.3 (6 из 7v): проверяемое, мнение или хитрое
          утверждение (собака 10 кг, собака лучшая, собака говорит
          когда никого нет, завтра +20, завтра хороший день,
          подтягивания когда один).
      rule: >
        «Три вопроса детектива: есть инструмент? Нет отговорок?
        Что показала проверка? Если нельзя проверить — верить
        необязательно.»
      life_question: >
        «Одноклассник говорит: "Я видел НЛО, но фотографировать
        было нельзя — они запрещают." Что скажет детектив?»

    challenge:
      duration: "5-6 мин"
      summary: >
        Марко подносит руку к невидимой двери — пальцы проваливаются.
        Повторяет. Два раза, три. Софа: «Три повторения... достаточно
        для гипотезы... недостаточно для закона.» Дверь открывается.
        Фиолетовое небо. Громкоговорители: «Добро пожаловать домой,
        потомок.» Софа: «"Добро пожаловать" — проверяемо? "Домой" —
        факт?» Обратная практика: не «что это?», а «ПОЧЕМУ?»
      quizzes:
        count: 9
        source: "brief"
        description: >
          sc6 брифа 1B.3 (9 из 11v): обратная практика — объясни ПОЧЕМУ
          это факт/мнение/хитрое. Контрастные пары: ученики в классе
          (факт — счёт), учительница добрая (мнение — нет «добромера»),
          кот отвечает когда один (хитрое — отговорка),
          расстояние 5 км (факт — линейка), далеко (мнение — ощущение).
      vera_role: ""
      rey_role: ""
      voice_role: ""

    cliffhanger:
      duration: "1-2 мин"
      summary: >
        Дверь ЗАХЛОПЫВАЕТСЯ. Обратного пути нет. Фиолетовое небо.
        Зеркальный Город. Лина шагнула первой — без колебаний.
        Софа: «Предупреждение... уровень опасности... не определён.
        София записала: "Он войдёт. Я его знаю."» София знала. Снова.
      sofa_reaction: >
        «Предупреждение... уровень опасности... не определён.
        София... записала... "Он войдёт. Я его знаю."»
      next_episode_hook: >
        Обратного пути нет. Что за Зеркальный Город?
        Почему Лина шагнула без колебаний — она бывала здесь?

    quiz_distribution:
      from_brief: 68
      added_story: 0
      moved_to_extra: 53
      total: 15

    extra_practice:
      count: 53
      source: "sc5 остаток (1v) + sc6 остаток (2v) + sc8 целиком (50v экспресс-тройки)"
      description: >
        Основная масса — sc8: 50 экспресс-голосований, тройки
        (факт + мнение + неправда на одну тему): жираф, килограмм,
        пальцы, час, молоко, треугольник, зима, лёд, рыба, метр,
        солнце, паук, неделя, кошка, воздух, литр, птица.
        Скоростная тренировка после основного эпизода.


